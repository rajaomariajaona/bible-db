document_id: LEV.8,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Entrée en fonction des prêtres
  - type: heading
    content: 8.1–10.20
  - type: heading
    content: Consécration d'Aaron et de ses fils
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '10':
  - type: text
    content: 'Moïse prit l''huile d''onction. Il en versa sur le sanctuaire et tout ce qui s''y trouvait, et ainsi il le consacra. '
  '11':
  - type: text
    content: 'Il aspergea sept fois l''autel d''huile, il versa de l''huile sur l''autel et tous ses ustensiles, ainsi que sur la cuve avec sa base, afin de les consacrer. '
  '12':
  - type: text
    content: 'Il versa de l''huile d''onction sur la tête d''Aaron, il lui fit cette onction afin de le consacrer. '
  '13':
  - type: text
    content: Moïse fit aussi approcher les fils d'Aaron; il les habilla de tuniques, leur passa des ceintures et leur attacha des coiffes comme l'Eternel le lui avait ordonné.
  '14':
  - type: text
    content: 'Il fit approcher le taureau expiatoire, et Aaron et ses fils posèrent leurs mains sur sa tête. '
  '15':
  - type: text
    content: 'Moïse l''égorgea, prit du sang et en mit avec son doigt sur les cornes du pourtour de l''autel pour le purifier. Il versa le sang au pied de l''autel pour le consacrer en vue d''y faire l''expiation. '
  '16':
  - type: text
    content: 'Il prit toute la graisse qui couvre les entrailles, le grand lobe du foie et les deux rognons avec leur graisse, et il brûla cela sur l''autel. '
  '17':
  - type: text
    content: Mais il brûla dans un feu à l'extérieur du camp le taureau, sa peau, sa viande et ses excréments, comme l'Eternel le lui avait ordonné.
  '18':
  - type: text
    content: 'Il fit approcher le bélier de l''holocauste, et Aaron et ses fils posèrent leurs mains sur sa tête. '
  '19':
  - type: text
    content: 'Moïse l''égorgea et versa le sang sur le pourtour de l''autel. '
  '2':
  - type: text
    content: '«Prends Aaron et ses fils avec lui, les vêtements, l''huile d''onction, le taureau expiatoire, les deux béliers et la corbeille de pains sans levain, '
  '20':
  - type: text
    content: 'Il coupa le bélier par morceaux et brûla la tête, les morceaux et la graisse. '
  '21':
  - type: text
    content: Il lava avec de l'eau les entrailles et les pattes, et il brûla tout le bélier sur l'autel. Ce fut l'holocauste, un sacrifice brûlé au feu dont l'odeur fut agréable à l'Eternel, comme l'Eternel l'avait ordonné à Moïse.
  '22':
  - type: text
    content: 'Il fit approcher l''autre bélier, le bélier de consécration, et Aaron et ses fils posèrent leurs mains sur sa tête. '
  '23':
  - type: text
    content: 'Moïse égorgea le bélier, prit de son sang et en mit sur le lobe de l''oreille droite d''Aaron, sur le pouce de sa main droite et sur le gros orteil de son pied droit. '
  '24':
  - type: text
    content: 'Il fit approcher les fils d''Aaron, mit du sang sur le lobe de leur oreille droite, sur le pouce de leur main droite et sur le gros orteil de leur pied droit, et il versa le sang sur le pourtour de l''autel. '
  '25':
  - type: text
    content: 'Il prit la graisse, la queue, toute la graisse qui couvre les entrailles, le grand lobe du foie, les deux rognons avec leur graisse et la cuisse droite; '
  '26':
  - type: text
    content: 'il prit aussi dans la corbeille de pains sans levain placée devant l''Eternel un gâteau sans levain, un gâteau de pain à l''huile et une galette, et il les posa sur les graisses et sur la cuisse droite. '
  '27':
  - type: text
    content: 'Il mit tous ces éléments sur les mains d''Aaron et sur celles de ses fils, et il fit le geste de présentation devant l''Eternel. '
  '28':
  - type: text
    content: 'Puis il les retira de leurs mains et les brûla sur l''autel, par-dessus l''holocauste. Ce fut le sacrifice de consécration, un sacrifice passé par le feu dont l''odeur fut agréable à l''Eternel. '
  '29':
  - type: text
    content: Moïse prit la poitrine du bélier de consécration et fit avec elle le geste de présentation devant l'Eternel. Ce fut la portion de Moïse, comme l'Eternel le lui avait ordonné.
  '3':
  - type: text
    content: et convoque toute l'assemblée à l'entrée de la tente de la rencontre.»
  '30':
  - type: text
    content: Moïse prit de l'huile d'onction et du sang qui était sur l'autel et en aspergea Aaron et ses vêtements, de même que les fils d'Aaron et leurs vêtements. C'est ainsi qu'il consacra Aaron et ses vêtements, de même que les fils d'Aaron et leurs vêtements.
  '31':
  - type: text
    content: 'Moïse dit à Aaron et à ses fils: «Faites cuire la viande à l''entrée de la tente de la rencontre; c''est là que vous la mangerez, avec le pain qui est dans la corbeille de consécration, comme je l''ai ordonné en disant: ‘Aaron et ses descendants la mangeront.’ '
  '32':
  - type: text
    content: 'Vous brûlerez dans le feu ce qui restera de la viande et du pain. '
  '33':
  - type: text
    content: 'Pendant 7 jours, vous ne sortirez pas de l''entrée de la tente de la rencontre, jusqu''à ce que prenne fin la période de votre entrée en fonction. En effet, 7 jours seront employés à vous établir dans vos fonctions. '
  '34':
  - type: text
    content: 'Ce qui s''est fait aujourd''hui, l''Eternel a ordonné de le faire comme expiation pour vous. '
  '35':
  - type: text
    content: 'Vous resterez donc 7 jours à l''entrée de la tente de la rencontre, jour et nuit, vous respecterez les commandements de l''Eternel. Ainsi vous ne mourrez pas, car c''est l''ordre que j''ai reçu.» '
  '36':
  - type: text
    content: Aaron et ses fils firent tout ce que l'Eternel avait ordonné par l'intermédiaire de Moïse.
  '4':
  - type: text
    content: 'Moïse fit ce que l''Eternel lui avait ordonné et l''assemblée se réunit à l''entrée de la tente de la rencontre. '
  '5':
  - type: text
    content: 'Moïse dit à l''assemblée: «Voici ce que l''Eternel a ordonné de faire.» '
  '6':
  - type: text
    content: 'Il fit approcher Aaron et ses fils, et il les lava avec de l''eau. '
  '7':
  - type: text
    content: Il mit la tunique à Aaron, lui passa la ceinture, l'habilla de la robe et plaça sur lui l'éphod
  - type: note
    content: 'L''éphod: deux pièces de tissu reliées par des bretelles qui portaient deux pierres avec les noms des fils de Jacob.'
  - type: text
    content: ', qu''il serra avec l''écharpe de l''éphod dont il l''habilla. '
  '8':
  - type: text
    content: Il lui mit le pectoral
  - type: note
    content: 'Le pectoral: pièce d''étoffe carrée et double portée sur le devant de l''éphod et garnie de douze pierres avec les noms des fils de Jacob.'
  - type: text
    content: ', dans lequel il plaça l''urim et le thummim'
  - type: note
    content: 'L''urim et le thummim: objets mal connus dont le grand-prêtre se servait pour connaître la volonté de Dieu pour le peuple.'
  - type: text
    content: '. '
  '9':
  - type: text
    content: Il posa la tiare sur sa tête et plaça sur le devant de la tiare la lame d'or, le diadème sacré, comme l'Eternel le lui avait ordonné.
