document_id: LEV.8
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Entrée en fonction des prêtres
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 8.1–10.20
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Consécration d'Aaron et de ses fils
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Prends Aaron et ses fils avec lui, les vêtements, l''huile d''onction, le taureau expiatoire, les deux béliers et la corbeille de pains sans levain, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: et convoque toute l'assemblée à l'entrée de la tente de la rencontre.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Moïse fit ce que l''Eternel lui avait ordonné et l''assemblée se réunit à l''entrée de la tente de la rencontre. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Moïse dit à l''assemblée: «Voici ce que l''Eternel a ordonné de faire.» '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il fit approcher Aaron et ses fils, et il les lava avec de l''eau. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il mit la tunique à Aaron, lui passa la ceinture, l'habilla de la robe et plaça sur lui l'éphod
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''éphod: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: deux pièces de tissu reliées par des bretelles qui portaient deux pierres avec les noms des fils de Jacob.
    marker-yv: yv-n
  - type: text
    text: ', qu''il serra avec l''écharpe de l''éphod dont il l''habilla. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il lui mit le pectoral
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le pectoral: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: pièce d'étoffe carrée et double portée sur le devant de l'éphod et garnie de douze pierres avec les noms des fils de Jacob.
    marker-yv: yv-n
  - type: text
    text: ', dans lequel il plaça l''urim et le thummim'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''urim et le thummim: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: objets mal connus dont le grand-prêtre se servait pour connaître la volonté de Dieu pour le peuple.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il posa la tiare sur sa tête et plaça sur le devant de la tiare la lame d'or, le diadème sacré, comme l'Eternel le lui avait ordonné.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Moïse prit l''huile d''onction. Il en versa sur le sanctuaire et tout ce qui s''y trouvait, et ainsi il le consacra. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il aspergea sept fois l''autel d''huile, il versa de l''huile sur l''autel et tous ses ustensiles, ainsi que sur la cuve avec sa base, afin de les consacrer. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il versa de l''huile d''onction sur la tête d''Aaron, il lui fit cette onction afin de le consacrer. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Moïse fit aussi approcher les fils d'Aaron; il les habilla de tuniques, leur passa des ceintures et leur attacha des coiffes comme l'Eternel le lui avait ordonné.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il fit approcher le taureau expiatoire, et Aaron et ses fils posèrent leurs mains sur sa tête. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Moïse l''égorgea, prit du sang et en mit avec son doigt sur les cornes du pourtour de l''autel pour le purifier. Il versa le sang au pied de l''autel pour le consacrer en vue d''y faire l''expiation. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il prit toute la graisse qui couvre les entrailles, le grand lobe du foie et les deux rognons avec leur graisse, et il brûla cela sur l''autel. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mais il brûla dans un feu à l'extérieur du camp le taureau, sa peau, sa viande et ses excréments, comme l'Eternel le lui avait ordonné.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il fit approcher le bélier de l''holocauste, et Aaron et ses fils posèrent leurs mains sur sa tête. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Moïse l''égorgea et versa le sang sur le pourtour de l''autel. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il coupa le bélier par morceaux et brûla la tête, les morceaux et la graisse. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Il lava avec de l'eau les entrailles et les pattes, et il brûla tout le bélier sur l'autel. Ce fut l'holocauste, un sacrifice brûlé au feu dont l'odeur fut agréable à l'Eternel, comme l'Eternel l'avait ordonné à Moïse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il fit approcher l''autre bélier, le bélier de consécration, et Aaron et ses fils posèrent leurs mains sur sa tête. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Moïse égorgea le bélier, prit de son sang et en mit sur le lobe de l''oreille droite d''Aaron, sur le pouce de sa main droite et sur le gros orteil de son pied droit. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il fit approcher les fils d''Aaron, mit du sang sur le lobe de leur oreille droite, sur le pouce de leur main droite et sur le gros orteil de leur pied droit, et il versa le sang sur le pourtour de l''autel. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il prit la graisse, la queue, toute la graisse qui couvre les entrailles, le grand lobe du foie, les deux rognons avec leur graisse et la cuisse droite; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'il prit aussi dans la corbeille de pains sans levain placée devant l''Eternel un gâteau sans levain, un gâteau de pain à l''huile et une galette, et il les posa sur les graisses et sur la cuisse droite. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il mit tous ces éléments sur les mains d''Aaron et sur celles de ses fils, et il fit le geste de présentation devant l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Puis il les retira de leurs mains et les brûla sur l''autel, par-dessus l''holocauste. Ce fut le sacrifice de consécration, un sacrifice passé par le feu dont l''odeur fut agréable à l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Moïse prit la poitrine du bélier de consécration et fit avec elle le geste de présentation devant l'Eternel. Ce fut la portion de Moïse, comme l'Eternel le lui avait ordonné.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Moïse prit de l'huile d'onction et du sang qui était sur l'autel et en aspergea Aaron et ses vêtements, de même que les fils d'Aaron et leurs vêtements. C'est ainsi qu'il consacra Aaron et ses vêtements, de même que les fils d'Aaron et leurs vêtements.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Moïse dit à Aaron et à ses fils: «Faites cuire la viande à l''entrée de la tente de la rencontre; c''est là que vous la mangerez, avec le pain qui est dans la corbeille de consécration, comme je l''ai ordonné en disant: ‘Aaron et ses descendants la mangeront.’ '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Vous brûlerez dans le feu ce qui restera de la viande et du pain. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Pendant 7 jours, vous ne sortirez pas de l''entrée de la tente de la rencontre, jusqu''à ce que prenne fin la période de votre entrée en fonction. En effet, 7 jours seront employés à vous établir dans vos fonctions. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ce qui s''est fait aujourd''hui, l''Eternel a ordonné de le faire comme expiation pour vous. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Vous resterez donc 7 jours à l''entrée de la tente de la rencontre, jour et nuit, vous respecterez les commandements de l''Eternel. Ainsi vous ne mourrez pas, car c''est l''ordre que j''ai reçu.» '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Aaron et ses fils firent tout ce que l'Eternel avait ordonné par l'intermédiaire de Moïse.
