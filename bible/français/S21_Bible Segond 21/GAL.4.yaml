document_id: GAL.4,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Voici ce que je veux dire: aussi longtemps que l''héritier est un enfant, il ne diffère en rien d''un esclave, quoiqu''il soit le maître de tout: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Vous faites très attention aux jours, aux mois, aux saisons et aux années! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: J'ai peur d'avoir inutilement travaillé pour vous.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Frères et sœurs, je vous en supplie, soyez comme moi, car moi aussi j''ai été comme vous. Vous ne m''avez fait aucun tort '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'mais, vous le savez, c''est à cause d''un problème physique que je vous ai annoncé l''Evangile pour la première fois. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Et mis à l''épreuve par mon corps, vous n''avez montré ni mépris ni dégoût; au contraire, vous m''avez accueilli comme un ange de Dieu, comme Jésus-Christ lui-même. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Où donc est l''expression de votre bonheur? En effet, je vous rends ce témoignage: si cela avait été possible, vous vous seriez arraché les yeux pour me les donner. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Suis-je donc devenu votre ennemi en vous disant la vérité?
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Le zèle que ces gens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ces gens: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ceux qui troublent les Galates et cherchent à les détourner du véritable Evangile (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '1.7'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' manifestent pour vous n''est pas pur, mais ils veulent vous détacher de nous afin que vous soyez zélés pour eux. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Il est beau d''avoir constamment du zèle pour ce qui est bien, et pas seulement quand je suis présent parmi vous. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Mes enfants, j''éprouve de nouveau les douleurs de l''accouchement pour vous, jusqu''à ce que Christ soit formé en vous. '
  '2':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'il est soumis à des tuteurs et à des administrateurs jusqu''au moment fixé par son père. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Je voudrais être en ce moment auprès de vous et pouvoir changer de ton, car je suis dans l'embarras à votre sujet.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les deux descendances d'Abraham
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Dites-moi, vous qui voulez être sous la loi, ne comprenez-vous pas la loi? '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: En effet, il est écrit qu'Abraham a eu deux fils
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Deux fils: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ismaël, né de l'esclave égyptienne Agar, et Isaac, né de Sara, la femme d'Abraham.
      marker-yv: yv-n
    - type: text
      text: ', un de la femme esclave et un de la femme libre. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Mais celui de l''esclave est né par volonté humaine, et celui de la femme libre est le fruit de la promesse. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ces faits ont une valeur allégorique, car ces femmes représentent deux alliances. L'une vient du mont Sinaï
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Mont Sinaï: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: l'endroit où la loi de Moïse a été donnée aux Israélites.
      marker-yv: yv-n
    - type: text
      text: ' et donne naissance à des esclaves: c''est Agar. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'En effet, Agar, c''est le mont Sinaï en Arabie, et elle correspond à la Jérusalem actuelle qui vit dans l''esclavage avec ses enfants. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Mais la Jérusalem d''en haut est libre, c''est elle qui est notre mère. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'De fait, il est écrit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Réjouis-toi, stérile, toi qui n'as pas eu d'enfant! Eclate de joie et pousse des cris de triomphe, toi qui n'as pas connu les douleurs de l'accouchement! En effet, les enfants de la femme délaissée seront plus nombreux que ceux de la femme mariée.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Réjouis-toi… mariée: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 54.1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Nous, frères et sœurs, comme Isaac nous sommes les enfants de la promesse. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Le fils né par volonté humaine persécutait alors celui qui était né grâce à l''Esprit, et il en va de même maintenant encore. '
  '3':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Nous aussi, de la même manière, lorsque nous étions des enfants, nous étions esclaves des principes élémentaires qui régissent le monde
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Principes… le monde: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: littéralement éléments du monde, c'est-à-dire les éléments et rites des religions humaines ou les puissances spirituelles, selon les interprétations.
      marker-yv: yv-n
    - type: text
      text: '. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Mais que dit l''Ecriture? '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Chasse l'esclave et son fils, car le fils de l'esclave n'héritera pas avec le fils de la femme libre.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.30 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Chasse… libre: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Genèse 21.10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Ainsi, frères et sœurs, nous ne sommes pas les enfants de l'esclave, mais de la femme libre.
  '4':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Mais, lorsque le moment est vraiment venu, Dieu a envoyé son Fils, né d''une femme, né sous la loi, '
  '5':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'pour racheter ceux qui étaient sous la loi afin que nous recevions le statut d''enfants adoptifs. '
  '6':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Et parce que vous êtes ses fils, Dieu a envoyé dans votre cœur l''Esprit de son Fils qui crie: «Abba! Père!» '
  '7':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ainsi tu n'es plus esclave, mais fils; et si tu es fils, tu es aussi héritier de Dieu par Christ.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'inquiétude de Paul pour les Galates
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Autrefois vous ne connaissiez pas Dieu, vous serviez des dieux qui par nature ne le sont pas. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Mais maintenant que vous avez connu Dieu, ou plutôt que vous avez été connus de Dieu, comment pouvez-vous retourner à ces principes élémentaires sans force et sans valeur auxquels vous voulez vous asservir encore? '
