document_id: GAL.4,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Voici ce que je veux dire: aussi longtemps que l''héritier est un enfant, il ne diffère en rien d''un esclave, quoiqu''il soit le maître de tout: '
  '10':
  - type: text
    content: 'Vous faites très attention aux jours, aux mois, aux saisons et aux années! '
  '11':
  - type: text
    content: J'ai peur d'avoir inutilement travaillé pour vous.
  '12':
  - type: text
    content: 'Frères et sœurs, je vous en supplie, soyez comme moi, car moi aussi j''ai été comme vous. Vous ne m''avez fait aucun tort '
  '13':
  - type: text
    content: 'mais, vous le savez, c''est à cause d''un problème physique que je vous ai annoncé l''Evangile pour la première fois. '
  '14':
  - type: text
    content: 'Et mis à l''épreuve par mon corps, vous n''avez montré ni mépris ni dégoût; au contraire, vous m''avez accueilli comme un ange de Dieu, comme Jésus-Christ lui-même. '
  '15':
  - type: text
    content: 'Où donc est l''expression de votre bonheur? En effet, je vous rends ce témoignage: si cela avait été possible, vous vous seriez arraché les yeux pour me les donner. '
  '16':
  - type: text
    content: Suis-je donc devenu votre ennemi en vous disant la vérité?
  '17':
  - type: text
    content: Le zèle que ces gens
  - type: note
    content: 'Ces gens: ceux qui troublent les Galates et cherchent à les détourner du véritable Evangile (voir 1.7).'
  - type: text
    content: ' manifestent pour vous n''est pas pur, mais ils veulent vous détacher de nous afin que vous soyez zélés pour eux. '
  '18':
  - type: text
    content: 'Il est beau d''avoir constamment du zèle pour ce qui est bien, et pas seulement quand je suis présent parmi vous. '
  '19':
  - type: text
    content: 'Mes enfants, j''éprouve de nouveau les douleurs de l''accouchement pour vous, jusqu''à ce que Christ soit formé en vous. '
  '2':
  - type: text
    content: 'il est soumis à des tuteurs et à des administrateurs jusqu''au moment fixé par son père. '
  '20':
  - type: text
    content: Je voudrais être en ce moment auprès de vous et pouvoir changer de ton, car je suis dans l'embarras à votre sujet.
  - type: heading
    content: Les deux descendances d'Abraham
  '21':
  - type: text
    content: 'Dites-moi, vous qui voulez être sous la loi, ne comprenez-vous pas la loi? '
  '22':
  - type: text
    content: En effet, il est écrit qu'Abraham a eu deux fils
  - type: note
    content: 'Deux fils: Ismaël, né de l''esclave égyptienne Agar, et Isaac, né de Sara, la femme d''Abraham.'
  - type: text
    content: ', un de la femme esclave et un de la femme libre. '
  '23':
  - type: text
    content: 'Mais celui de l''esclave est né par volonté humaine, et celui de la femme libre est le fruit de la promesse. '
  '24':
  - type: text
    content: Ces faits ont une valeur allégorique, car ces femmes représentent deux alliances. L'une vient du mont Sinaï
  - type: note
    content: 'Mont Sinaï: l''endroit où la loi de Moïse a été donnée aux Israélites.'
  - type: text
    content: ' et donne naissance à des esclaves: c''est Agar. '
  '25':
  - type: text
    content: 'En effet, Agar, c''est le mont Sinaï en Arabie, et elle correspond à la Jérusalem actuelle qui vit dans l''esclavage avec ses enfants. '
  '26':
  - type: text
    content: 'Mais la Jérusalem d''en haut est libre, c''est elle qui est notre mère. '
  '27':
  - type: text
    content: 'De fait, il est écrit: '
  - type: text
    content: Réjouis-toi, stérile, toi qui n'as pas eu d'enfant! Eclate de joie et pousse des cris de triomphe, toi qui n'as pas connu les douleurs de l'accouchement! En effet, les enfants de la femme délaissée seront plus nombreux que ceux de la femme mariée.
  - type: note
    content: 'Réjouis-toi… mariée: citation d''Esaïe 54.1.'
  '28':
  - type: text
    content: 'Nous, frères et sœurs, comme Isaac nous sommes les enfants de la promesse. '
  '29':
  - type: text
    content: 'Le fils né par volonté humaine persécutait alors celui qui était né grâce à l''Esprit, et il en va de même maintenant encore. '
  '3':
  - type: text
    content: Nous aussi, de la même manière, lorsque nous étions des enfants, nous étions esclaves des principes élémentaires qui régissent le monde
  - type: note
    content: 'Principes… le monde: littéralement éléments du monde, c''est-à-dire les éléments et rites des religions humaines ou les puissances spirituelles, selon les interprétations.'
  - type: text
    content: '. '
  '30':
  - type: text
    content: 'Mais que dit l''Ecriture? '
  - type: text
    content: Chasse l'esclave et son fils, car le fils de l'esclave n'héritera pas avec le fils de la femme libre.
  - type: note
    content: 'Chasse… libre: citation de Genèse 21.10.'
  - type: text
    content: ' '
  '31':
  - type: text
    content: Ainsi, frères et sœurs, nous ne sommes pas les enfants de l'esclave, mais de la femme libre.
  '4':
  - type: text
    content: 'Mais, lorsque le moment est vraiment venu, Dieu a envoyé son Fils, né d''une femme, né sous la loi, '
  '5':
  - type: text
    content: 'pour racheter ceux qui étaient sous la loi afin que nous recevions le statut d''enfants adoptifs. '
  '6':
  - type: text
    content: 'Et parce que vous êtes ses fils, Dieu a envoyé dans votre cœur l''Esprit de son Fils qui crie: «Abba! Père!» '
  '7':
  - type: text
    content: Ainsi tu n'es plus esclave, mais fils; et si tu es fils, tu es aussi héritier de Dieu par Christ.
  - type: heading
    content: L'inquiétude de Paul pour les Galates
  '8':
  - type: text
    content: 'Autrefois vous ne connaissiez pas Dieu, vous serviez des dieux qui par nature ne le sont pas. '
  '9':
  - type: text
    content: 'Mais maintenant que vous avez connu Dieu, ou plutôt que vous avez été connus de Dieu, comment pouvez-vous retourner à ces principes élémentaires sans force et sans valeur auxquels vous voulez vous asservir encore? '
