document_id: GEN.2,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'C''est ainsi que furent terminés le ciel et la terre et toute leur armée. '
  '10':
  - type: text
    content: 'Un fleuve sortait d''Eden pour arroser le jardin, et de là il se divisait en quatre bras. '
  '11':
  - type: text
    content: 'Le nom du premier est Pishon: il entoure tout le pays de Havila où se trouve l''or. '
  '12':
  - type: text
    content: 'L''or de ce pays est pur. On y trouve aussi le bdellium et la pierre d''onyx. '
  '13':
  - type: text
    content: 'Le nom du deuxième fleuve est Guihon: il entoure tout le pays de Cush. '
  '14':
  - type: text
    content: 'Le nom du troisième est le Tigre: il coule à l''est de l''Assyrie. Le quatrième fleuve, c''est l''Euphrate.'
  '15':
  - type: text
    content: 'L''Eternel Dieu prit l''homme et le plaça dans le jardin d''Eden pour qu''il le cultive et le garde. '
  '16':
  - type: text
    content: 'L''Eternel Dieu donna cet ordre à l''homme: «Tu pourras manger les fruits de tous les arbres du jardin, '
  '17':
  - type: text
    content: mais tu ne mangeras pas le fruit de l'arbre de la connaissance du bien et du mal, car le jour où tu en mangeras, tu mourras, c'est certain.»
  '18':
  - type: text
    content: 'L''Eternel Dieu dit: «Il n''est pas bon que l''homme soit seul. Je lui ferai une aide qui soit son vis-à-vis.» '
  '19':
  - type: text
    content: 'L''Eternel Dieu façonna à partir de la terre tous les animaux sauvages et tous les oiseaux du ciel, puis il les fit venir vers l''homme pour voir comment il les appellerait. Il voulait que tout être vivant porte le nom que l''homme lui donnerait. '
  '2':
  - type: text
    content: Le septième jour, Dieu mit un terme à son travail de création. *Il se reposa de toute son activité le septième jour.
  - type: note
    content: 'Il se reposa… jour: cité en Hébreux 4.4 et repris en Exode 20.11 comme raison d''être du sabbat.'
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'L''homme donna des noms à tout le bétail, aux oiseaux du ciel et à tous les animaux sauvages, mais pour lui-même il ne trouva pas d''aide qui soit son vis-à-vis. '
  '21':
  - type: text
    content: 'Alors l''Eternel Dieu fit tomber un profond sommeil sur l''homme, qui s''endormit. Il prit une de ses côtes et referma la chair à sa place. '
  '22':
  - type: text
    content: 'L''Eternel Dieu forma une femme à partir de la côte qu''il avait prise à l''homme et il l''amena vers l''homme. '
  '23':
  - type: text
    content: 'L''homme dit: «Voici cette fois celle qui est faite des mêmes os et de la même chair que moi. On l''appellera femme parce qu''elle a été tirée de l''homme'
  - type: note
    content: 'Femme… homme: en hébreu ''isha… ''ish.'
  - type: text
    content: .»
  '24':
  - type: text
    content: '*C''est pourquoi l''homme quittera son père et sa mère et s''attachera à sa femme, et ils ne feront qu''un.'
  - type: note
    content: 'C''est pourquoi… qu''un: cité en Matthieu 19.5; Marc 10.7-8; Ephésiens 5.31 et partiellement en 1 Corinthiens 6.16.'
  '25':
  - type: text
    content: L'homme et sa femme étaient tous les deux nus, et ils n'en avaient pas honte.
  '3':
  - type: text
    content: Dieu bénit le septième jour et en fit un jour saint, parce que ce jour-là il se reposa de toute son activité, de tout ce qu'il avait créé.
  - type: heading
    content: Le jardin d'Eden
  '4':
  - type: text
    content: 'Telle fut l''histoire du ciel et de la terre quand ils furent créés. '
  '5':
  - type: text
    content: Lorsque l'Eternel Dieu
  - type: note
    content: 'L''Eternel Dieu: dans cette version, l''Eternel traduit le tétragramme Yhvh que les Juifs, par respect, ont depuis longtemps cessé de prononcer. Ce tétragramme est à rapprocher de la racine hébraïque du verbe être (voir aussi Exode 3.14-15). Dieu traduit le plus souvent l''hébreu ''elohim (comme ici) ou ''el.'
  - type: text
    content: ' fit la terre et le ciel, il n''y avait encore aucun arbuste des champs sur la terre et aucune herbe des champs ne poussait encore, car l''Eternel Dieu n''avait pas fait pleuvoir sur la terre et il n''y avait pas d''homme pour cultiver le sol. '
  '6':
  - type: text
    content: Cependant, une vapeur montait de la terre et arrosait toute la surface du sol.
  '7':
  - type: text
    content: L'Eternel Dieu façonna l'homme avec la poussière de la terre. Il insuffla un souffle de vie dans ses narines et *l'homme devint un être vivant
  - type: note
    content: 'L''homme… vivant: cité en 1 Corinthiens 15.45.'
  - type: text
    content: .
  '8':
  - type: text
    content: 'L''Eternel Dieu planta un jardin en Eden, du côté de l''est, et il y mit l''homme qu''il avait façonné. '
  '9':
  - type: text
    content: 'L''Eternel Dieu fit pousser du sol des arbres de toute sorte, agréables à voir et porteurs de fruits bons à manger. Il fit pousser l''arbre de la vie au milieu du jardin, ainsi que l''arbre de la connaissance du bien et du mal. '
