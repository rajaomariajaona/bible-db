document_id: GEN.2,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'C''est ainsi que furent terminés le ciel et la terre et toute leur armée. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un fleuve sortait d''Eden pour arroser le jardin, et de là il se divisait en quatre bras. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le nom du premier est Pishon: il entoure tout le pays de Havila où se trouve l''or. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''or de ce pays est pur. On y trouve aussi le bdellium et la pierre d''onyx. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le nom du deuxième fleuve est Guihon: il entoure tout le pays de Cush. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le nom du troisième est le Tigre: il coule à l''est de l''Assyrie. Le quatrième fleuve, c''est l''Euphrate.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel Dieu prit l''homme et le plaça dans le jardin d''Eden pour qu''il le cultive et le garde. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel Dieu donna cet ordre à l''homme: «Tu pourras manger les fruits de tous les arbres du jardin, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mais tu ne mangeras pas le fruit de l'arbre de la connaissance du bien et du mal, car le jour où tu en mangeras, tu mourras, c'est certain.»
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel Dieu dit: «Il n''est pas bon que l''homme soit seul. Je lui ferai une aide qui soit son vis-à-vis.» '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel Dieu façonna à partir de la terre tous les animaux sauvages et tous les oiseaux du ciel, puis il les fit venir vers l''homme pour voir comment il les appellerait. Il voulait que tout être vivant porte le nom que l''homme lui donnerait. '
  '2':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: Le septième jour, Dieu mit un terme à son travail de création. *Il se reposa de toute son activité le septième jour.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il se reposa… jour: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hébreux 4.4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' et repris en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Exode 20.11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' comme raison d''être du sabbat.'
      marker-yv: yv-n
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''homme donna des noms à tout le bétail, aux oiseaux du ciel et à tous les animaux sauvages, mais pour lui-même il ne trouva pas d''aide qui soit son vis-à-vis. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors l''Eternel Dieu fit tomber un profond sommeil sur l''homme, qui s''endormit. Il prit une de ses côtes et referma la chair à sa place. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel Dieu forma une femme à partir de la côte qu''il avait prise à l''homme et il l''amena vers l''homme. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''homme dit: «Voici cette fois celle qui est faite des mêmes os et de la même chair que moi. On l''appellera femme parce qu''elle a été tirée de l''homme'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Femme… homme: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en hébreu '
        - type: usfm
          marker: tl
          children:
          - type: text
            text: '''isha… ''ish'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .»
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '*C''est pourquoi l''homme quittera son père et sa mère et s''attachera à sa femme, et ils ne feront qu''un.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'C''est pourquoi… qu''un: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Matthieu 19.5
        - type: text
          text: '; '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Marc 10.7-8
        - type: text
          text: '; '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Ephésiens 5.31
        - type: text
          text: ' et partiellement en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Corinthiens 6.16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L'homme et sa femme étaient tous les deux nus, et ils n'en avaient pas honte.
  '3':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: Dieu bénit le septième jour et en fit un jour saint, parce que ce jour-là il se reposa de toute son activité, de tout ce qu'il avait créé.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le jardin d'Eden
    marker-yv: yv-h
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Telle fut l''histoire du ciel et de la terre quand ils furent créés. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Lorsque l'Eternel Dieu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'L''Eternel Dieu: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'dans cette version, l''Eternel traduit le tétragramme '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Yhvh
        - type: text
          text: ' que les Juifs, par respect, ont depuis longtemps cessé de prononcer. Ce tétragramme est à rapprocher de la racine hébraïque du verbe être (voir aussi '
        - type: usfm
          marker: ref
          children:
          - type: text
            text: Exode 3.14-15
        - type: text
          text: '). Dieu traduit le plus souvent l''hébreu '
        - type: usfm
          marker: tl
          children:
          - type: text
            text: '''elohim'
        - type: text
          text: ' (comme ici) ou '
        - type: usfm
          marker: tl
          children:
          - type: text
            text: '''el'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' fit la terre et le ciel, il n''y avait encore aucun arbuste des champs sur la terre et aucune herbe des champs ne poussait encore, car l''Eternel Dieu n''avait pas fait pleuvoir sur la terre et il n''y avait pas d''homme pour cultiver le sol. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cependant, une vapeur montait de la terre et arrosait toute la surface du sol.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L'Eternel Dieu façonna l'homme avec la poussière de la terre. Il insuffla un souffle de vie dans ses narines et *l'homme devint un être vivant
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'L''homme… vivant: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: cité en 1 Corinthiens 15.45.
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel Dieu planta un jardin en Eden, du côté de l''est, et il y mit l''homme qu''il avait façonné. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel Dieu fit pousser du sol des arbres de toute sorte, agréables à voir et porteurs de fruits bons à manger. Il fit pousser l''arbre de la vie au milieu du jardin, ainsi que l''arbre de la connaissance du bien et du mal. '
