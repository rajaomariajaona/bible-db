document_id: DAN.8,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vision du bélier et du bouc
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'La troisième année de règne de Belshatsar, moi, Daniel, j''ai eu une vision, après la première que j''avais eue. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Elle a grandi jusqu''au niveau des corps célestes. Elle a fait tomber par terre une partie de ces corps et des étoiles, et elle les a piétinés. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Elle a grandi jusqu''au niveau du chef de l''armée. Elle lui a enlevé le sacrifice perpétuel et a bouleversé les fondations de son sanctuaire. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'L''armée lui a été livrée avec le sacrifice perpétuel, à cause de la transgression. La corne a jeté la vérité par terre et réussi dans ses entreprises. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'J''ai entendu un saint parler et un autre saint dire à celui qui parlait: «Jusqu''à quand durera cette vision à propos du sacrifice perpétuel et de la transgression dévastatrice? Jusqu''à quand le sanctuaire et l''armée seront-ils livrés au piétinement?» '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Et il m''a dit: «Encore 2300 soirs et matins, puis le sanctuaire sera purifié.»'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Tandis que moi, Daniel, j''avais cette vision et que je cherchais à la comprendre, quelqu''un qui avait l''apparence d''un guerrier se tenait en face de moi. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'J''ai entendu la voix d''un homme au milieu du fleuve Oulaï; il a crié: «Gabriel, fais comprendre à celui-ci ce qu''il a vu!» '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Il est alors venu près de l''endroit où je me trouvais. Terrifié à son approche, je suis tombé le visage contre terre. Il m''a dit: «Sois attentif, fils de l''homme, car la vision concerne le moment de la fin.» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Pendant qu''il me parlait, j''étais plongé dans une profonde torpeur, le visage contre terre. Il m''a touché et m''a fait me tenir debout là où je me trouvais. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Puis il m''a dit: «Je vais te faire connaître ce qui arrivera au terme de la colère, car il y a un moment fixé pour la fin. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Dans cette vision, j'ai vu que je me trouvais à Suse, la capitale, dans la province d'Elam. Dans la vision, j'ai vu que j'étais près du fleuve Oulaï.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Le bélier que tu as vu et qui avait des cornes, ce sont les rois des Mèdes et des Perses. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Le bouc, c''est le roi de Grèce. La grande corne entre ses yeux, c''est le premier roi. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Les quatre cornes qui l''ont remplacée, une fois qu''elle a été brisée, ce sont quatre royaumes qui surgiront de cette nation, mais sans avoir autant de force qu''elle. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'A la fin de leur règne, quand les pécheurs auront mis le comble à leur révolte, un roi au visage dur et expert en énigmes surgira. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Sa puissance grandira, mais non par sa propre force. Il accomplira d''extraordinaires dévastations, il réussira dans ses entreprises, il détruira les puissants et le peuple des saints. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Grâce à son habileté, il réussira dans ses manœuvres trompeuses, et il aura le cœur rempli d''arrogance. Il fera mourir beaucoup d''hommes qui vivaient dans la tranquillité et il se dressera contre le prince des princes. Cependant, il sera brisé sans aucune intervention extérieure. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ce que tu as vu à propos des soirs et des matins et qui t'a été dit est vrai. Quant à toi, tiens cette vision cachée, car elle concerne une époque éloignée.»
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Moi, Daniel, je suis resté affaibli et malade durant plusieurs jours. Puis je me suis levé pour m'occuper des affaires du roi, mais j'étais effaré à cause de la vision et je ne la comprenais pas.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'J''ai levé les yeux et regardé: un bélier se tenait devant le fleuve et il avait des cornes. Ces cornes étaient hautes. L''une était plus haute que l''autre, mais c''était la plus haute qui avait poussé la dernière. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: J'ai vu le bélier frapper avec ses cornes vers l'ouest, le nord et le sud. Aucun animal ne pouvait lui résister et il n'y avait personne pour délivrer ses victimes de son pouvoir. Il faisait ce qu'il voulait et il est devenu grand.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Pendant que je regardais attentivement, un bouc est arrivé de l''ouest, parcourant toute la surface de la terre sans toucher la terre. Ce bouc avait une corne impressionnante entre les yeux. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Il est arrivé jusqu''au bélier qui avait des cornes et que j''avais vu se tenir devant le fleuve, et il a foncé sur lui dans toute l''ardeur de sa force. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Je l''ai vu s''approcher du bélier et manifester son amertume contre lui: il a frappé le bélier et lui a brisé les deux cornes sans que le bélier n''ait la force de lui résister. Il l''a jeté par terre et l''a piétiné, et il n''y a eu personne pour délivrer le bélier de son pouvoir. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Le bouc est devenu très grand mais, lorsqu'il a été puissant, sa grande corne s'est brisée. Quatre grandes cornes ont poussé à sa place, aux quatre coins du ciel.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'De l''une d''elles est sortie une petite corne. Elle a beaucoup grandi vers le sud, vers l''est et vers le plus beau des pays. '
