document_id: REV.17,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La chute de Babylone
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis un des sept anges qui tenaient les sept coupes vint me parler et dit: «Viens, je te montrerai le jugement de la grande prostituée qui est assise sur les grandes eaux. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce sont aussi sept rois: cinq sont tombés, l''un règne, l''autre n''est pas encore venu. Et quand il sera venu, il ne doit rester que peu de temps. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant à la bête qui existait et qui n''existe plus, elle est elle-même un huitième roi; elle fait partie des sept et s''en va à la perdition. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les dix cornes que tu as vues sont dix rois qui n''ont pas encore reçu de royaume, mais ils reçoivent le pouvoir de régner pendant une heure avec la bête. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ont une même pensée et ils donnent leur puissance et leur pouvoir à la bête. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils combattront contre l'Agneau et l'Agneau les vaincra parce qu'il est le Seigneur des seigneurs et le Roi des rois. Ceux qui ont été appelés, choisis et fidèles et sont avec lui les vaincront aussi.»
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il me dit: «Les eaux que tu as vues, sur lesquelles la prostituée est assise, ce sont des peuples, des foules, des nations et des langues. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les dix cornes que tu as vues et la bête détesteront la prostituée; elles la dépouilleront et la mettront à nu, elles mangeront sa chair et la détruiront par le feu. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, Dieu leur a mis à cœur de réaliser son propre projet en ayant la même pensée et en donnant leur royauté à la bête jusqu''à ce que les paroles de Dieu soient accomplies. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et la femme que tu as vue, c'est la grande ville qui exerce la royauté sur les rois de la terre.»
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C'est avec elle que les rois de la terre se sont livrés à l'immoralité, et c'est du vin de sa prostitution que les habitants de la terre se sont enivrés.»
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors il me transporta en esprit dans un désert et je vis une femme assise sur une bête écarlate, couverte de noms blasphématoires et qui avait sept têtes et dix cornes. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cette femme était habillée de pourpre et d''écarlate et parée d''or, de pierres précieuses et de perles. Elle tenait dans sa main une coupe d''or remplie d''abominations et des souillures de sa prostitution. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sur son front était écrit un nom, un mystère: «Babylone la grande, la mère des prostituées et des abominations de la terre.» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je vis cette femme ivre du sang des saints, du sang des témoins de Jésus. En la voyant, je fus saisi d'un grand étonnement.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''ange me dit: «Pourquoi t''étonnes-tu? Je te dirai le mystère de la femme et de la bête qui la porte, celle qui a les sept têtes et les dix cornes. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La bête que tu as vue existait et elle n''existe plus. Elle va monter de l''abîme et s''en aller à la perdition. Les habitants de la terre, ceux dont le nom n''a pas été inscrit dès la création du monde dans le livre de vie, s''étonneront en voyant que la bête existait, qu''elle n''existe plus et qu''elle reparaîtra. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est ici qu''il faut une intelligence éclairée par la sagesse. Les sept têtes sont sept montagnes sur lesquelles la femme est assise. '
