document_id: EZR.9,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Consternation et prière d'Esdras
  - type: text
    content: 'Cela fait, les chefs se sont approchés de moi en disant: «Le peuple d''Israël, les prêtres et les Lévites ne se sont pas séparés des populations installées dans la région; ils imitent leurs pratiques abominables, oui, celles des Cananéens, des Hittites, des Phéréziens, des Jébusiens, des Ammonites, des Moabites, des Egyptiens et des Amoréens. '
  '10':
  - type: text
    content: '»Et maintenant, notre Dieu, que pouvons-nous dire après cela? En effet, nous avons abandonné tes commandements, '
  '11':
  - type: text
    content: 'ceux que tu nous avais prescrits par l''intermédiaire de tes serviteurs les prophètes. Tu avais dit: ‘Le pays dans lequel vous entrez pour en prendre possession est un pays souillé par les impuretés des populations installées dans la région, par les pratiques abominables dont elles l''ont rempli, d''un bout à l''autre, avec leur impureté. '
  '12':
  - type: text
    content: Ne donnez donc pas vos filles en mariage à leurs fils et ne prenez pas leurs filles comme femmes pour vos fils. Ne recherchez jamais leur prospérité ni leur bien-être. Ainsi, vous deviendrez forts, vous mangerez les meilleurs produits du pays et vous le laisserez en héritage perpétuel à vos fils.’
  '13':
  - type: text
    content: '»Après tout ce qui nous est arrivé à cause de nos mauvaises actions et de notre grande culpabilité, et même si toi, notre Dieu, tu ne nous as pas punis avec toute la sévérité que méritaient nos fautes et nous as accordé ces rescapés, '
  '14':
  - type: text
    content: 'allons-nous recommencer à violer tes commandements et à nous allier par mariage avec des peuples capables de pratiques aussi abominables? Ne t''irriterais-tu pas contre nous au point de nous exterminer, sans laisser ni reste ni rescapés? '
  '15':
  - type: text
    content: Eternel, Dieu d'Israël, tu es juste, car nous ne sommes plus, aujourd'hui, qu'un reste de rescapés. Nous voici devant toi avec notre culpabilité, alors que nous ne devrions pas pouvoir nous tenir ainsi devant toi.»
  '2':
  - type: text
    content: En effet, ils ont pris certaines de leurs filles comme femmes pour eux et pour leurs fils, ils ont mêlé la sainte lignée aux populations installées dans la région. Les chefs et les magistrats ont été les premiers à commettre cet acte d'infidélité.»
  '3':
  - type: text
    content: 'A cette nouvelle, j''ai déchiré mes vêtements et mon manteau, je me suis arraché les cheveux et la barbe et je me suis assis, accablé. '
  '4':
  - type: text
    content: 'A mes côtés se sont rassemblés tous ceux qui tremblaient devant les paroles prononcées par le Dieu d''Israël contre l''infidélité des exilés. Pour ma part, je suis resté assis, accablé, jusqu''à l''offrande du soir. '
  '5':
  - type: text
    content: 'Puis, au moment de l''offrande du soir, j''ai abandonné mon attitude d''humiliation, tout en gardant mes vêtements et mon manteau déchirés, suis tombé à genoux, ai tendu les mains vers l''Eternel, mon Dieu, '
  '6':
  - type: text
    content: 'et j''ai dit:'
  - type: text
    content: '«Mon Dieu, je suis dans la confusion. J''ai honte, mon Dieu, de lever le visage vers toi, car nos fautes sont nombreuses au point de nous submerger et notre culpabilité est si grande qu''elle atteint le ciel. '
  '7':
  - type: text
    content: Depuis l'époque de nos ancêtres et jusqu'à aujourd'hui, nous avons été grandement coupables, et c'est à cause de nos fautes que nous avons été livrés, nous, nos rois et nos prêtres, à la domination des rois étrangers, à l'épée, à la déportation, au pillage, à une honte pareille à celle qui couvre aujourd'hui notre visage.
  '8':
  - type: text
    content: '»Pourtant, l''Eternel, notre Dieu, vient de nous faire grâce en nous laissant quelques rescapés et en nous permettant de nous installer dans son saint lieu, en rendant la clarté à notre regard et en nous redonnant un peu de vie au milieu de notre esclavage. '
  '9':
  - type: text
    content: 'Oui, nous sommes des esclaves, mais notre Dieu ne nous a pas abandonnés dans notre esclavage: il a manifesté sa bonté en nous attirant la faveur des rois de Perse, en nous redonnant la vie afin que nous puissions reconstruire son temple et réparer ses ruines, et en nous fournissant un abri sûr en Juda et à Jérusalem.'
