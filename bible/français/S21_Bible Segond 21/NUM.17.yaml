document_id: NUM.17
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Ordonne à Eléazar, le fils du prêtre Aaron, de retirer les brûle-parfums de l''incendie et de disperser leurs braises au loin, car ils sont saints. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Avec les brûle-parfums de ces hommes, qui ont péché au prix de leur vie, que l''on fasse des lames bien plates dont on couvrira l''autel. Puisque les brûle-parfums ont été présentés devant l''Eternel et sont saints, ils serviront de souvenir aux Israélites.» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le prêtre Eléazar prit les brûle-parfums en bronze qu''avaient présentés les victimes de l''incendie et en fit des lames pour couvrir l''autel. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: C'est un souvenir pour les Israélites afin qu'aucune personne étrangère à la branche d'Aaron ne s'approche pour offrir du parfum devant l'Eternel et ne subisse le même sort que Koré et sa bande, conformément à ce que l'Eternel avait déclaré par l'intermédiaire de Moïse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dès le lendemain, toute l''assemblée des Israélites murmura contre Moïse et Aaron en disant: «Vous avez fait mourir le peuple de l''Eternel.» '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Comme l''assemblée se liguait contre Moïse et Aaron et qu''ils tournaient les regards vers la tente de la rencontre, la nuée la couvrit et la gloire de l''Eternel apparut. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Moïse et Aaron arrivèrent devant la tente de la rencontre, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'et l''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '«Retirez-vous de cette assemblée, que je les détruise en un instant.» Ils tombèrent le visage contre terre, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'et Moïse dit à Aaron: «Prends le brûle-parfum, mets-y du feu provenant de l''autel, poses-y du parfum, va vite vers l''assemblée et fais l''expiation pour eux. En effet, la colère de l''Eternel a éclaté, le fléau a commencé.» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Aaron prit le brûle-parfum, comme Moïse le lui avait dit, et courut au milieu de l''assemblée. Le fléau avait effectivement commencé parmi le peuple. Il offrit le parfum et fit l''expiation pour le peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il se plaça entre les morts et les vivants, et le fléau fut arrêté. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il y eut 14''700 personnes qui moururent de ce fléau, en plus de celles qui étaient mortes à cause de Koré. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Aaron retourna auprès de Moïse à l'entrée de la tente de la rencontre. Le fléau était arrêté.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le bâton d'Aaron
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '«Demande aux Israélites de te remettre un bâton par tribu, soit 12 bâtons remis par tous leurs princes en fonction de leur famille. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tu écriras le nom de chacun sur son bâton et celui d''Aaron sur le bâton de Lévi. Il y aura un bâton pour chaque chef de famille. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tu les déposeras dans la tente de la rencontre, devant le témoignage où je vous rencontre. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: L'homme que je choisirai sera celui dont le bâton fleurira, et je ferai cesser devant moi les murmures que les Israélites profèrent contre vous.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Moïse parla aux Israélites et tous leurs princes lui donnèrent un bâton, chacun un, en fonction de leur famille, soit 12 bâtons. Le bâton d''Aaron se trouvait parmi les leurs. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Moïse déposa les bâtons devant l''Eternel dans la tente du témoignage. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Le lendemain, lorsque Moïse entra dans la tente du témoignage, le bâton d''Aaron, pour la famille de Lévi, avait fleuri. Il avait bourgeonné, donné des fleurs et des amandes. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Moïse retira tous les bâtons de devant l'Eternel et les apporta à tous les Israélites, afin qu'ils les voient et qu'ils reprennent chacun leur bâton.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'L''Eternel dit à Moïse: «Rapporte le bâton d''Aaron devant le témoignage, pour qu''il y soit conservé comme un signe pour ces rebelles. Ainsi tu feras cesser leurs murmures devant moi et ils ne mourront pas.» '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: C'est ce que fit Moïse, il se conforma à l'ordre que l'Eternel lui avait donné.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Les Israélites dirent à Moïse: «Voici que nous expirons, nous disparaissons. Nous disparaissons tous! '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Toute personne qui s'approche du tabernacle de l'Eternel meurt. Nous faudra-t-il tous expirer?»
