document_id: EXO.9,152
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Fléau n° 5: la mort du bétail'
  - type: text
    content: 'L''Eternel dit à Moïse: «Va trouver le pharaon et tu lui annonceras: ‘Voici ce que dit l''Eternel, le Dieu des Hébreux: Laisse partir mon peuple afin qu''il me serve. '
  '10':
  - type: text
    content: 'Ils prirent de la cendre de fourneau et se présentèrent devant le pharaon. Moïse la jeta vers le ciel et elle produisit sur les hommes et sur les animaux des ulcères formés par une éruption de pustules. '
  '11':
  - type: text
    content: 'Les magiciens furent incapables de se présenter devant Moïse à cause des ulcères. En effet, ils étaient couverts d''ulcères comme tous les Egyptiens. '
  '12':
  - type: text
    content: L'Eternel endurcit le cœur du pharaon et celui-ci n'écouta pas Moïse et Aaron. Cela se passa comme l'Eternel l'avait dit à Moïse.
  - type: heading
    content: 'Fléau n° 7: la grêle et la foudre'
  '13':
  - type: text
    content: 'L''Eternel dit à Moïse: «Lève-toi de bon matin et présente-toi devant le pharaon. Tu lui annonceras: ‘Voici ce que dit l''Eternel, le Dieu des Hébreux: Laisse partir mon peuple afin qu''il me serve. '
  '14':
  - type: text
    content: 'En effet, cette fois, je vais envoyer tous mes fléaux contre ton cœur, contre tes serviteurs et contre ton peuple, afin que tu saches qu''il n''y a personne qui soit pareil à moi sur toute la terre. '
  '15':
  - type: text
    content: 'Si j''étais intervenu pour te frapper de la peste, toi et ton peuple, tu aurais disparu de la terre. '
  '16':
  - type: text
    content: 'Mais *voilà pourquoi je t''ai suscité: c''est pour te montrer ma puissance et afin que mon nom soit proclamé sur toute la terre'
  - type: note
    content: 'Voilà… terre: cité en Romains 9.17 par l''apôtre Paul.'
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Si tu t''attaques encore à mon peuple et ne le laisses pas partir, '
  '18':
  - type: text
    content: 'alors je ferai pleuvoir demain, à cette heure, une grêle si forte qu''il n''y en a pas eu de pareille en Egypte depuis le jour de sa fondation jusqu''à maintenant. '
  '19':
  - type: text
    content: 'Fais donc mettre en sécurité tes troupeaux et tout ce qui t''appartient dans les champs. La grêle tombera sur tous les hommes et sur tous les animaux qui se trouveront dans les champs et qui n''auront pas été rassemblés dans les maisons, et ils mourront.’» '
  '2':
  - type: text
    content: 'Si tu refuses de le laisser partir et si tu le retiens encore, '
  '20':
  - type: text
    content: 'Les serviteurs du pharaon qui prirent la parole de l''Eternel au sérieux mirent leurs serviteurs et leurs troupeaux à l''abri dans les maisons, '
  '21':
  - type: text
    content: tandis que ceux qui ne prirent pas la parole de l'Eternel à cœur laissèrent leurs serviteurs et leurs troupeaux dans les champs.
  '22':
  - type: text
    content: 'L''Eternel dit à Moïse: «Tends ta main vers le ciel et qu''il tombe de la grêle dans toute l''Egypte. Qu''elle tombe sur les hommes, sur les animaux et sur toutes les herbes des champs en Egypte.» '
  '23':
  - type: text
    content: 'Moïse tendit son bâton vers le ciel et l''Eternel envoya des coups de tonnerre et de la grêle; la foudre s''abattit sur la terre. L''Eternel fit pleuvoir de la grêle sur l''Egypte. '
  '24':
  - type: text
    content: 'Il tomba de la grêle accompagnée de foudre; elle était tellement forte qu''il n''y en avait pas eu de pareille dans toute l''Egypte depuis qu''elle existe en tant que nation. '
  '25':
  - type: text
    content: 'Dans toute l''Egypte, la grêle frappa tout ce qui se trouvait dans les champs, hommes ou animaux; elle frappa aussi toute la végétation et brisa tous les arbres. '
  '26':
  - type: text
    content: Ce fut seulement dans la région de Gosen, là où se trouvaient les Israélites, qu'il n'y eut pas de grêle.
  '27':
  - type: text
    content: 'Le pharaon fit appeler Moïse et Aaron, et il leur dit: «Cette fois-ci, j''ai péché. C''est l''Eternel qui est juste, et mon peuple et moi nous sommes coupables. '
  '28':
  - type: text
    content: 'Priez l''Eternel pour qu''il n''y ait plus de coups de tonnerre ni de grêle et je vous laisserai partir, on ne vous retiendra plus.» '
  '29':
  - type: text
    content: 'Moïse lui dit: «Quand je sortirai de la ville, je lèverai les mains vers l''Eternel. Les coups de tonnerre cesseront et il n''y aura plus de grêle, afin que tu saches que la terre appartient à l''Eternel. '
  '3':
  - type: text
    content: 'la main de l''Eternel frappera tes troupeaux dans les champs, les chevaux, les ânes, les chameaux, les bœufs et les brebis; il y aura une mortalité très importante. '
  '30':
  - type: text
    content: Cependant, je sais que toi et tes serviteurs, vous ne craindrez pas encore l'Eternel Dieu.»
  '31':
  - type: text
    content: 'Le lin et l''orge avaient été touchés parce que l''orge était déjà en épis et que c''était l''époque de la floraison du lin. '
  '32':
  - type: text
    content: 'Quant au blé et à l''épeautre, ils n''avaient pas été touchés parce qu''ils sont plus tardifs. '
  '33':
  - type: text
    content: 'Moïse sortit de chez le pharaon pour se rendre à l''extérieur de la ville, et il leva les mains vers l''Eternel. Les coups de tonnerre et la grêle s''arrêtèrent et la pluie ne tomba plus sur la terre. '
  '34':
  - type: text
    content: 'Voyant que la pluie, la grêle et les coups de tonnerre s''étaient arrêtés, le pharaon continua de pécher et rendit son cœur plus insensible encore, tout comme ses serviteurs. '
  '35':
  - type: text
    content: Le cœur du pharaon s'endurcit et il ne laissa pas partir les Israélites. Cela se passa comme l'Eternel l'avait dit par l'intermédiaire de Moïse.
  '4':
  - type: text
    content: 'L''Eternel traitera de manière différente les troupeaux d''Israël et ceux des Egyptiens: rien de tout ce qui appartient aux Israélites ne mourra.’» '
  '5':
  - type: text
    content: 'L''Eternel fixa un moment précis en disant: «Demain, l''Eternel fera cela dans le pays», '
  '6':
  - type: text
    content: 'et il agit ainsi dès le lendemain. Tous les troupeaux des Egyptiens moururent, tandis que pas une seule bête des troupeaux des Israélites ne mourut. '
  '7':
  - type: text
    content: Le pharaon s'informa de ce qui était arrivé et constata que pas une seule bête des troupeaux d'Israël n'était morte. Cependant, le cœur du pharaon resta insensible et il ne laissa pas partir le peuple.
  - type: heading
    content: 'Fléau n° 6: les ulcères'
  '8':
  - type: text
    content: 'L''Eternel dit à Moïse et à Aaron: «Remplissez vos mains de cendre de fourneau et que Moïse la jette vers le ciel sous les yeux du pharaon. '
  '9':
  - type: text
    content: 'Elle deviendra une poussière qui couvrira toute l''Egypte et dans toute l''Egypte elle produira, sur les hommes et sur les animaux, des ulcères formés par une éruption de pustules.» '
