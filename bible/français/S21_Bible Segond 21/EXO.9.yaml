document_id: EXO.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Fléau n° 5: la mort du bétail'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Moïse: «Va trouver le pharaon et tu lui annonceras: ‘Voici ce que dit l''Eternel, le Dieu des Hébreux: Laisse partir mon peuple afin qu''il me serve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Si tu refuses de le laisser partir et si tu le retiens encore, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'la main de l''Eternel frappera tes troupeaux dans les champs, les chevaux, les ânes, les chameaux, les bœufs et les brebis; il y aura une mortalité très importante. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L''Eternel traitera de manière différente les troupeaux d''Israël et ceux des Egyptiens: rien de tout ce qui appartient aux Israélites ne mourra.’» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L''Eternel fixa un moment précis en disant: «Demain, l''Eternel fera cela dans le pays», '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'et il agit ainsi dès le lendemain. Tous les troupeaux des Egyptiens moururent, tandis que pas une seule bête des troupeaux des Israélites ne mourut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le pharaon s'informa de ce qui était arrivé et constata que pas une seule bête des troupeaux d'Israël n'était morte. Cependant, le cœur du pharaon resta insensible et il ne laissa pas partir le peuple.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Fléau n° 6: les ulcères'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L''Eternel dit à Moïse et à Aaron: «Remplissez vos mains de cendre de fourneau et que Moïse la jette vers le ciel sous les yeux du pharaon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Elle deviendra une poussière qui couvrira toute l''Egypte et dans toute l''Egypte elle produira, sur les hommes et sur les animaux, des ulcères formés par une éruption de pustules.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils prirent de la cendre de fourneau et se présentèrent devant le pharaon. Moïse la jeta vers le ciel et elle produisit sur les hommes et sur les animaux des ulcères formés par une éruption de pustules. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les magiciens furent incapables de se présenter devant Moïse à cause des ulcères. En effet, ils étaient couverts d''ulcères comme tous les Egyptiens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: L'Eternel endurcit le cœur du pharaon et celui-ci n'écouta pas Moïse et Aaron. Cela se passa comme l'Eternel l'avait dit à Moïse.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Fléau n° 7: la grêle et la foudre'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'L''Eternel dit à Moïse: «Lève-toi de bon matin et présente-toi devant le pharaon. Tu lui annonceras: ‘Voici ce que dit l''Eternel, le Dieu des Hébreux: Laisse partir mon peuple afin qu''il me serve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'En effet, cette fois, je vais envoyer tous mes fléaux contre ton cœur, contre tes serviteurs et contre ton peuple, afin que tu saches qu''il n''y a personne qui soit pareil à moi sur toute la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Si j''étais intervenu pour te frapper de la peste, toi et ton peuple, tu aurais disparu de la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais *voilà pourquoi je t''ai suscité: c''est pour te montrer ma puissance et afin que mon nom soit proclamé sur toute la terre'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Voilà… terre: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 9.17
      metadata:
        usfm: ROM.9.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' par l''apôtre Paul.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Si tu t''attaques encore à mon peuple et ne le laisses pas partir, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'alors je ferai pleuvoir demain, à cette heure, une grêle si forte qu''il n''y en a pas eu de pareille en Egypte depuis le jour de sa fondation jusqu''à maintenant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fais donc mettre en sécurité tes troupeaux et tout ce qui t''appartient dans les champs. La grêle tombera sur tous les hommes et sur tous les animaux qui se trouveront dans les champs et qui n''auront pas été rassemblés dans les maisons, et ils mourront.’» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les serviteurs du pharaon qui prirent la parole de l''Eternel au sérieux mirent leurs serviteurs et leurs troupeaux à l''abri dans les maisons, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: tandis que ceux qui ne prirent pas la parole de l'Eternel à cœur laissèrent leurs serviteurs et leurs troupeaux dans les champs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'L''Eternel dit à Moïse: «Tends ta main vers le ciel et qu''il tombe de la grêle dans toute l''Egypte. Qu''elle tombe sur les hommes, sur les animaux et sur toutes les herbes des champs en Egypte.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Moïse tendit son bâton vers le ciel et l''Eternel envoya des coups de tonnerre et de la grêle; la foudre s''abattit sur la terre. L''Eternel fit pleuvoir de la grêle sur l''Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il tomba de la grêle accompagnée de foudre; elle était tellement forte qu''il n''y en avait pas eu de pareille dans toute l''Egypte depuis qu''elle existe en tant que nation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dans toute l''Egypte, la grêle frappa tout ce qui se trouvait dans les champs, hommes ou animaux; elle frappa aussi toute la végétation et brisa tous les arbres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ce fut seulement dans la région de Gosen, là où se trouvaient les Israélites, qu'il n'y eut pas de grêle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Le pharaon fit appeler Moïse et Aaron, et il leur dit: «Cette fois-ci, j''ai péché. C''est l''Eternel qui est juste, et mon peuple et moi nous sommes coupables. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Priez l''Eternel pour qu''il n''y ait plus de coups de tonnerre ni de grêle et je vous laisserai partir, on ne vous retiendra plus.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Moïse lui dit: «Quand je sortirai de la ville, je lèverai les mains vers l''Eternel. Les coups de tonnerre cesseront et il n''y aura plus de grêle, afin que tu saches que la terre appartient à l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Cependant, je sais que toi et tes serviteurs, vous ne craindrez pas encore l'Eternel Dieu.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Le lin et l''orge avaient été touchés parce que l''orge était déjà en épis et que c''était l''époque de la floraison du lin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Quant au blé et à l''épeautre, ils n''avaient pas été touchés parce qu''ils sont plus tardifs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Moïse sortit de chez le pharaon pour se rendre à l''extérieur de la ville, et il leva les mains vers l''Eternel. Les coups de tonnerre et la grêle s''arrêtèrent et la pluie ne tomba plus sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Voyant que la pluie, la grêle et les coups de tonnerre s''étaient arrêtés, le pharaon continua de pécher et rendit son cœur plus insensible encore, tout comme ses serviteurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Le cœur du pharaon s'endurcit et il ne laissa pas partir les Israélites. Cela se passa comme l'Eternel l'avait dit par l'intermédiaire de Moïse.
