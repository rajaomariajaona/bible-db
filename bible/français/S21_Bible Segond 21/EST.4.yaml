document_id: EST.4,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Démarche de Mardochée auprès d'Esther
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Informé de tout ce qui se passait, Mardochée déchira ses vêtements, se couvrit d''un sac et de cendre, puis sillonna la ville en criant à pleine voix son amertume. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Celle-ci le chargea alors d''aller dire à Mardochée: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '«Tous les serviteurs du roi et la population de ses provinces savent que toute personne, homme ou femme, qui pénètre chez le roi, dans la cour intérieure, sans avoir été convoquée n''a droit qu''à un seul verdict: la mort. La seule personne qui reste en vie est celle à qui le roi tend le sceptre en or. Or, en ce qui me concerne, cela fait 30 jours que je n''ai pas été appelée vers lui.»'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'On rapporta donc à Mardochée les paroles d''Esther, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'et Mardochée lui fit répondre: «Ne t''imagine pas que ta position au palais te permettra d''être sauvée, au contraire de tous les Juifs. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: En effet, si tu gardes le silence maintenant, le secours et la délivrance surgiront d'autre part pour les Juifs, tandis que ta famille et toi vous mourrez. Qui sait? Peut-être est-ce pour une circonstance telle que celle-ci que tu es parvenue à la royauté.»
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Esther fit répondre à Mardochée: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '«Va rassembler tous les Juifs qui se trouvent à Suse et jeûnez pour moi! Ne mangez et ne buvez rien pendant trois jours, ni la nuit ni le jour. Moi aussi, je respecterai un tel jeûne avec mes servantes, et c''est dans ces dispositions que je pénétrerai chez le roi: j''enfreindrai la loi et, si je dois mourir, je mourrai.»'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Mardochée s'en alla faire tout ce qu'Esther lui avait ordonné.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il alla ainsi jusqu''aux abords de la porte du roi, car son entrée était interdite à toute personne habillée d''un sac. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Dans chaque province, partout où arrivait le message du roi, qui avait valeur de loi, les Juifs menaient grand deuil, avec jeûne, pleurs et lamentations; beaucoup avaient pour lit le sac et la cendre.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Lorsque ses servantes et ses eunuques vinrent lui rapporter ce qui se passait, la reine Esther en fut toute bouleversée. Elle fit parvenir des vêtements à Mardochée pour le pousser à s''habiller et à retirer son sac, mais il ne les accepta pas. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Elle appela alors Hathac, l''un des eunuques que le roi avait attachés à son service, et le chargea d''aller demander à Mardochée ce qu''il avait et pourquoi il se comportait de cette manière. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Hathac rejoignit Mardochée sur la place de la ville qui fait face à la porte du roi, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'et Mardochée lui raconta tout ce qui lui arrivait. Il lui précisa même la quantité d''argent qu''Haman avait promis de verser dans le trésor du roi pour pouvoir faire disparaître les Juifs. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Il lui donna aussi une copie de l'édit proclamé dans Suse en vue de leur extermination afin qu'il le montre à Esther et lui fasse un rapport, en la chargeant de se rendre chez le roi pour lui demander grâce et plaider la cause de son peuple.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Hathac vint rapporter à Esther les paroles de Mardochée. '
