document_id: JER.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophéties sur Juda
  - type: heading
    content: 1.1–45.5
  - type: heading
    content: Appel et mission de Jérémie
  - type: text
    content: 'Paroles de Jérémie, fils de Hilkija, l''un des prêtres qui se trouvaient à Anathoth, dans le pays de Benjamin, '
  '10':
  - type: text
    content: 'Vois, aujourd''hui je te confie une responsabilité envers les nations et les royaumes: celle d''arracher et de démolir, de faire disparaître et de détruire, de construire et de planter.»'
  '11':
  - type: text
    content: 'La parole de l''Eternel m''a été adressée: «Que vois-tu, Jérémie?» J''ai répondu: «Je vois une branche d''amandier'
  - type: note
    content: 'Amandier: vient en hébreu de la racine qui signifie veiller (voir verset 12), probablement parce que c''est le premier arbre à fleurir au printemps. Il symbolise ici la vigilance divine qui ne s''interrompt jamais.'
  - type: text
    content: '.» '
  '12':
  - type: text
    content: 'Et l''Eternel m''a dit: «Tu as bien vu, car je veille à ce que ma parole s''accomplisse.»'
  '13':
  - type: text
    content: 'La parole de l''Eternel m''a été adressée une deuxième fois: «Que vois-tu?» J''ai répondu: «Je vois une marmite bouillante. Son ouverture est orientée vers le nord.» '
  '14':
  - type: text
    content: 'Et l''Eternel m''a dit: «C''est du nord que le mal se déversera sur tous les habitants du pays. '
  '15':
  - type: text
    content: 'En effet, je vais appeler tous les peuples des royaumes du nord, déclare l''Eternel. Ils viendront et ils placeront leur trône à l''entrée des portes de Jérusalem, tout autour de ses murailles, et contre toutes les villes de Juda. '
  '16':
  - type: text
    content: Je prononcerai mes jugements contre eux à cause de toute leur méchanceté, parce qu'ils m'ont abandonné et ont fait brûler de l'encens en l'honneur d'autres dieux, parce qu'ils se sont prosternés devant ce que leurs mains avaient fabriqué.
  '17':
  - type: text
    content: '»Quant à toi, tu attacheras ta ceinture autour de ta taille, tu te lèveras et tu leur diras tout ce que je t''ordonnerai. Ne tremble pas en leur présence, sinon je te ferai trembler devant eux. '
  '18':
  - type: text
    content: 'Aujourd''hui, j''ai fait de toi une ville fortifiée, une colonne de fer, un mur de bronze contre tout le pays: contre les rois de Juda, contre ses chefs, ses prêtres et la population du pays. '
  '19':
  - type: text
    content: Ils te combattront, mais ils ne pourront rien faire contre toi, car je suis moi-même avec toi pour te délivrer, déclare l'Eternel.»
  '2':
  - type: text
    content: 'parole de l''Eternel qui lui fut adressée durant la treizième année du règne de Josias, fils d''Amon, sur Juda '
  '3':
  - type: text
    content: ainsi que durant le règne de Jojakim, fils de Josias, sur Juda et jusqu'à la fin de la onzième année du règne de Sédécias, fils de Josias, sur Juda, jusqu'au cinquième mois, moment où les habitants de Jérusalem furent emmenés en exil.
  '4':
  - type: text
    content: 'La parole de l''Eternel m''a été adressée: '
  '5':
  - type: text
    content: '«Avant de te former dans le ventre de ta mère, je te connaissais, et avant que tu naisses, je t''avais consacré, je t''avais désigné prophète pour les nations.» '
  '6':
  - type: text
    content: 'J''ai répondu: «Ah! Seigneur Eternel, je ne sais pas parler, car je suis trop jeune.»'
  '7':
  - type: text
    content: 'L''Eternel m''a dit: «Ne prétends pas que tu es trop jeune, car tu iras trouver tous ceux vers qui je t''enverrai et tu diras tout ce que je t''ordonnerai. '
  '8':
  - type: text
    content: 'N''aie pas peur d''eux, car je suis moi-même avec toi pour te délivrer, déclare l''Eternel.» '
  '9':
  - type: text
    content: 'Puis l''Eternel a tendu la main et a touché ma bouche avant d''ajouter: «J''ai mis mes paroles dans ta bouche. '
