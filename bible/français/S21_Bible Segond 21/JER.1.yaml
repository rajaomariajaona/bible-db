document_id: JER.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Prophéties sur Juda
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 1.1–45.5
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Appel et mission de Jérémie
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Paroles de Jérémie, fils de Hilkija, l''un des prêtres qui se trouvaient à Anathoth, dans le pays de Benjamin, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'parole de l''Eternel qui lui fut adressée durant la treizième année du règne de Josias, fils d''Amon, sur Juda '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ainsi que durant le règne de Jojakim, fils de Josias, sur Juda et jusqu'à la fin de la onzième année du règne de Sédécias, fils de Josias, sur Juda, jusqu'au cinquième mois, moment où les habitants de Jérusalem furent emmenés en exil.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'La parole de l''Eternel m''a été adressée: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '«Avant de te former dans le ventre de ta mère, je te connaissais, et avant que tu naisses, je t''avais consacré, je t''avais désigné prophète pour les nations.» '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'J''ai répondu: «Ah! Seigneur Eternel, je ne sais pas parler, car je suis trop jeune.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L''Eternel m''a dit: «Ne prétends pas que tu es trop jeune, car tu iras trouver tous ceux vers qui je t''enverrai et tu diras tout ce que je t''ordonnerai. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'N''aie pas peur d''eux, car je suis moi-même avec toi pour te délivrer, déclare l''Eternel.» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Puis l''Eternel a tendu la main et a touché ma bouche avant d''ajouter: «J''ai mis mes paroles dans ta bouche. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Vois, aujourd''hui je te confie une responsabilité envers les nations et les royaumes: celle d''arracher et de démolir, de faire disparaître et de détruire, de construire et de planter.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'La parole de l''Eternel m''a été adressée: «Que vois-tu, Jérémie?» J''ai répondu: «Je vois une branche d''amandier'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Amandier: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: vient en hébreu de la racine qui signifie veiller (voir verset 12), probablement parce que c'est le premier arbre à fleurir au printemps. Il symbolise ici la vigilance divine qui ne s'interrompt jamais.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et l''Eternel m''a dit: «Tu as bien vu, car je veille à ce que ma parole s''accomplisse.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'La parole de l''Eternel m''a été adressée une deuxième fois: «Que vois-tu?» J''ai répondu: «Je vois une marmite bouillante. Son ouverture est orientée vers le nord.» '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et l''Eternel m''a dit: «C''est du nord que le mal se déversera sur tous les habitants du pays. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'En effet, je vais appeler tous les peuples des royaumes du nord, déclare l''Eternel. Ils viendront et ils placeront leur trône à l''entrée des portes de Jérusalem, tout autour de ses murailles, et contre toutes les villes de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Je prononcerai mes jugements contre eux à cause de toute leur méchanceté, parce qu'ils m'ont abandonné et ont fait brûler de l'encens en l'honneur d'autres dieux, parce qu'ils se sont prosternés devant ce que leurs mains avaient fabriqué.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '»Quant à toi, tu attacheras ta ceinture autour de ta taille, tu te lèveras et tu leur diras tout ce que je t''ordonnerai. Ne tremble pas en leur présence, sinon je te ferai trembler devant eux. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Aujourd''hui, j''ai fait de toi une ville fortifiée, une colonne de fer, un mur de bronze contre tout le pays: contre les rois de Juda, contre ses chefs, ses prêtres et la population du pays. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ils te combattront, mais ils ne pourront rien faire contre toi, car je suis moi-même avec toi pour te délivrer, déclare l'Eternel.»
