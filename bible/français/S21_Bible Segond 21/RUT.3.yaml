document_id: RUT.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mariage de Ruth et Boaz
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Sa belle-mère Naomi lui dit: «Ma fille, je voudrais assurer ton repos afin que tu sois heureuse. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Eh bien! Boaz, l''homme dont tu as accompagné les servantes, n''est-il pas notre parent? Or, il doit procéder cette nuit au tri de l''orge qui est dans l''aire de battage. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Lave-toi et parfume-toi, puis remets tes habits et descends à l''aire. Tu ne te feras pas connaître à lui jusqu''à ce qu''il ait fini de manger et de boire. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Quand il ira se coucher, observe l''endroit où il se couche. Ensuite va découvrir ses pieds et te coucher. Il te dira lui-même ce que tu as à faire.» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ruth lui répondit: «Je ferai tout ce que tu as dit.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Elle descendit à l''aire de battage et fit tout ce qu''avait ordonné sa belle-mère. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Boaz mangea et but, et son cœur était joyeux. Il alla se coucher au bout du tas de gerbes. Ruth vint alors tout doucement, découvrit ses pieds et se coucha. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Au milieu de la nuit, Boaz eut un frisson; il se pencha et vit une femme couchée à ses pieds. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il dit: «Qui es-tu?» Elle répondit: «Je suis Ruth, ta servante. Etends le pan de ton manteau sur ta servante, car tu as droit de rachat.» '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il dit: «Sois bénie de l''Eternel, ma fille! Ce dernier trait témoigne encore plus en ta faveur que le premier, car tu n''as pas recherché des jeunes gens, pauvres ou riches. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Maintenant, ma fille, n''aie pas peur! Je ferai pour toi tout ce que tu diras, car tout le monde chez nous sait que tu es une femme de valeur. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il est bien vrai que j''ai droit de rachat, mais il existe un autre parent, plus proche que moi, qui a ce droit. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Passe la nuit ici. Demain, s'il veut exercer envers toi son droit de rachat, c'est bien, qu'il le fasse; mais s'il ne lui plaît pas de l'exercer envers toi, je le ferai, moi, l'Eternel est vivant! Reste couchée jusqu'au matin.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Elle resta couchée à ses pieds jusqu''au matin et se leva avant qu''on puisse se reconnaître l''un l''autre. Boaz dit: «Qu''on ne sache pas que cette femme est entrée dans l''aire de battage.» '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et il ajouta: «Donne le manteau qui est sur toi, tiens-le.» Elle le tint et il compta 6 mesures d''orge qu''il chargea sur elle. Puis il entra dans la ville.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ruth revint chez sa belle-mère et Naomi dit: «Est-ce toi, ma fille?» Ruth lui raconta tout ce que cet homme avait fait pour elle. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Elle dit: «Il m''a donné ces 6 mesures d''orge en disant: ‘Tu ne retourneras pas les mains vides vers ta belle-mère.’» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Naomi dit: «Ma fille, reste tranquille jusqu''à ce que tu saches comment finira l''affaire, car cet homme ne se donnera pas de repos avant de l''avoir réglée aujourd''hui.»'
