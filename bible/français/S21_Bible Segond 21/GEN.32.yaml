document_id: GEN.32,152
type_code: fra
verses:
  '1':
  - type: text
    content: Laban se leva de bon matin, embrassa ses petits-enfants et ses filles et les bénit, puis il partit pour retourner chez lui.
  - type: heading
    content: Préparatifs de la rencontre avec Esaü
  '10':
  - type: text
    content: 'Jacob dit: «Dieu de mon grand-père Abraham, Dieu de mon père Isaac, Eternel, toi qui m''as dit: ‘Retourne dans ton pays, dans ton lieu de naissance, et je te ferai du bien’, '
  '11':
  - type: text
    content: 'je suis trop petit pour toutes les grâces et pour toute la fidélité dont tu as fait preuve envers moi, ton serviteur. En effet, j''ai passé ce Jourdain avec mon bâton et maintenant je peux former deux camps. '
  '12':
  - type: text
    content: 'Délivre-moi de mon frère Esaü, car j''ai peur qu''il ne vienne et ne me frappe, sans épargner ni la mère ni les enfants. '
  '13':
  - type: text
    content: 'C''est toi-même qui as dit: ‘Je te ferai du bien et je rendrai ta descendance *pareille au sable de la mer, si abondant qu''on ne peut le compter'
  - type: note
    content: 'Pareille… compter: cité en Hébreux 11.12.'
  - type: text
    content: .’»
  '14':
  - type: text
    content: 'C''est à cet endroit-là que Jacob passa la nuit. Il prit dans ce qu''il avait sous la main pour faire un cadeau à son frère Esaü: '
  '15':
  - type: text
    content: '200 chèvres et 20 boucs, 200 brebis et 20 béliers, '
  '16':
  - type: text
    content: '30 chamelles avec leurs petits qu''elles allaitaient, 40 vaches et 10 taureaux, 20 ânesses et 10 ânes. '
  '17':
  - type: text
    content: 'Il les remit à ses serviteurs, troupeau par troupeau séparément, et il dit à ses serviteurs: «Passez devant moi en laissant un intervalle entre chaque troupeau.» '
  '18':
  - type: text
    content: 'Il donna cet ordre au premier: «Quand mon frère Esaü te rencontrera et te demandera: ‘A qui es-tu? Où vas-tu? A qui appartient ce troupeau devant toi?’ '
  '19':
  - type: text
    content: 'tu répondras: ‘A ton serviteur Jacob, c''est un cadeau envoyé à mon seigneur Esaü. Le voici qui vient lui-même derrière nous.’» '
  '2':
  - type: text
    content: 'Jacob poursuivit son chemin et des anges de Dieu vinrent à sa rencontre. '
  '20':
  - type: text
    content: 'Il donna le même ordre au deuxième, au troisième et à tous ceux qui suivaient les troupeaux: «C''est ce message que vous transmettrez à mon seigneur Esaü quand vous le rencontrerez. '
  '21':
  - type: text
    content: 'Vous annoncerez aussi: ‘Ton serviteur Jacob vient derrière nous.’» Il se disait en effet: «Je l''apaiserai par ce cadeau qui me précède. Ensuite je le verrai en face et peut-être m''accueillera-t-il favorablement.» '
  '22':
  - type: text
    content: Le cadeau passa devant lui et il resta cette nuit-là dans le camp.
  '23':
  - type: text
    content: 'Il se leva la même nuit, prit ses deux femmes, ses deux servantes et ses onze enfants et passa le gué du Jabbok. '
  '24':
  - type: text
    content: Il les prit, leur fit passer le torrent et le fit passer à tout ce qui lui appartenait.
  - type: heading
    content: Jacob à Peniel
  '25':
  - type: text
    content: 'Jacob resta seul. C''est alors qu''un homme lutta avec lui jusqu''au lever de l''aurore. '
  '26':
  - type: text
    content: 'Voyant qu''il n''était pas vainqueur contre lui, cet homme le frappa à l''emboîture de la hanche. Celle-ci se déboîta pendant qu''il luttait avec lui. '
  '27':
  - type: text
    content: 'Il dit: «Laisse-moi partir, car l''aurore se lève.» Jacob répondit: «Je ne te laisserai pas partir avant que tu ne m''aies béni.» '
  '28':
  - type: text
    content: 'Il lui demanda: «Quel est ton nom?» Il répondit: «Jacob.» '
  '29':
  - type: text
    content: 'Il ajouta: «Ton nom ne sera plus Jacob, mais tu seras appelé Israël'
  - type: note
    content: 'Israël: littéralement celui qui lutte (ou persévère) avec Dieu ou Dieu a lutté (ou persévéré).'
  - type: text
    content: ', car tu as lutté avec Dieu et avec des hommes et tu as été vainqueur.» '
  '3':
  - type: text
    content: 'A leur vue, Jacob dit: «C''est le camp de Dieu!» et il appela cet endroit Mahanaïm.'
  '30':
  - type: text
    content: 'Jacob lui demanda: «Révèle-moi donc ton nom.» Il répondit: «Pourquoi demandes-tu mon nom?» et il le bénit là. '
  '31':
  - type: text
    content: 'Jacob appela cet endroit Peniel, car, dit-il, «j''ai vu Dieu face à face et ma vie a été sauvée.» '
  '32':
  - type: text
    content: 'Le soleil se levait lorsqu''il passa Peniel. Il boitait de la hanche. '
  '33':
  - type: text
    content: 'Voilà pourquoi, aujourd''hui encore, les Israélites ne mangent pas le tendon qui est à l''emboîture de la hanche: parce que Dieu frappa Jacob à l''emboîture de la hanche, au tendon.'
  '4':
  - type: text
    content: 'Jacob envoya devant lui des messagers à son frère Esaü dans le pays de Séir, dans le territoire d''Edom. '
  '5':
  - type: text
    content: 'Il leur donna cet ordre: «Vous transmettrez ce message à mon seigneur Esaü: ‘Voici ce que dit ton serviteur Jacob: J''ai séjourné chez Laban et j''y suis resté jusqu''à maintenant. '
  '6':
  - type: text
    content: J'ai des bœufs, des ânes, des brebis, des serviteurs et des servantes, et j'envoie des messagers te l'annoncer, mon seigneur, pour trouver grâce à tes yeux.’»
  '7':
  - type: text
    content: 'Les messagers revinrent vers Jacob en disant: «Nous sommes allés trouver ton frère Esaü; il marche à ta rencontre avec 400 hommes.» '
  '8':
  - type: text
    content: 'Jacob fut très effrayé et saisi d''angoisse. Il partagea en deux camps ceux qui étaient avec lui, les brebis, les bœufs et les chameaux. '
  '9':
  - type: text
    content: 'Il se disait: «Si Esaü attaque l''un des camps et le bat, le camp qui restera pourra se sauver.»'
