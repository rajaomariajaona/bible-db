document_id: GEN.32,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: Laban se leva de bon matin, embrassa ses petits-enfants et ses filles et les bénit, puis il partit pour retourner chez lui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Préparatifs de la rencontre avec Esaü
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob dit: «Dieu de mon grand-père Abraham, Dieu de mon père Isaac, Eternel, toi qui m''as dit: ‘Retourne dans ton pays, dans ton lieu de naissance, et je te ferai du bien’, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'je suis trop petit pour toutes les grâces et pour toute la fidélité dont tu as fait preuve envers moi, ton serviteur. En effet, j''ai passé ce Jourdain avec mon bâton et maintenant je peux former deux camps. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Délivre-moi de mon frère Esaü, car j''ai peur qu''il ne vienne et ne me frappe, sans épargner ni la mère ni les enfants. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est toi-même qui as dit: ‘Je te ferai du bien et je rendrai ta descendance *pareille au sable de la mer, si abondant qu''on ne peut le compter'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Pareille… compter: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hébreux 11.12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .’»
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est à cet endroit-là que Jacob passa la nuit. Il prit dans ce qu''il avait sous la main pour faire un cadeau à son frère Esaü: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '200 chèvres et 20 boucs, 200 brebis et 20 béliers, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '30 chamelles avec leurs petits qu''elles allaitaient, 40 vaches et 10 taureaux, 20 ânesses et 10 ânes. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il les remit à ses serviteurs, troupeau par troupeau séparément, et il dit à ses serviteurs: «Passez devant moi en laissant un intervalle entre chaque troupeau.» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il donna cet ordre au premier: «Quand mon frère Esaü te rencontrera et te demandera: ‘A qui es-tu? Où vas-tu? A qui appartient ce troupeau devant toi?’ '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tu répondras: ‘A ton serviteur Jacob, c''est un cadeau envoyé à mon seigneur Esaü. Le voici qui vient lui-même derrière nous.’» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob poursuivit son chemin et des anges de Dieu vinrent à sa rencontre. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il donna le même ordre au deuxième, au troisième et à tous ceux qui suivaient les troupeaux: «C''est ce message que vous transmettrez à mon seigneur Esaü quand vous le rencontrerez. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous annoncerez aussi: ‘Ton serviteur Jacob vient derrière nous.’» Il se disait en effet: «Je l''apaiserai par ce cadeau qui me précède. Ensuite je le verrai en face et peut-être m''accueillera-t-il favorablement.» '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le cadeau passa devant lui et il resta cette nuit-là dans le camp.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il se leva la même nuit, prit ses deux femmes, ses deux servantes et ses onze enfants et passa le gué du Jabbok. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il les prit, leur fit passer le torrent et le fit passer à tout ce qui lui appartenait.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob à Peniel
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob resta seul. C''est alors qu''un homme lutta avec lui jusqu''au lever de l''aurore. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voyant qu''il n''était pas vainqueur contre lui, cet homme le frappa à l''emboîture de la hanche. Celle-ci se déboîta pendant qu''il luttait avec lui. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit: «Laisse-moi partir, car l''aurore se lève.» Jacob répondit: «Je ne te laisserai pas partir avant que tu ne m''aies béni.» '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il lui demanda: «Quel est ton nom?» Il répondit: «Jacob.» '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il ajouta: «Ton nom ne sera plus Jacob, mais tu seras appelé Israël'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.29 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Israël: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: littéralement celui qui lutte (ou persévère) avec Dieu ou Dieu a lutté (ou persévéré).
      marker-yv: yv-n
    - type: text
      text: ', car tu as lutté avec Dieu et avec des hommes et tu as été vainqueur.» '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A leur vue, Jacob dit: «C''est le camp de Dieu!» et il appela cet endroit Mahanaïm.'
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob lui demanda: «Révèle-moi donc ton nom.» Il répondit: «Pourquoi demandes-tu mon nom?» et il le bénit là. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob appela cet endroit Peniel, car, dit-il, «j''ai vu Dieu face à face et ma vie a été sauvée.» '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le soleil se levait lorsqu''il passa Peniel. Il boitait de la hanche. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voilà pourquoi, aujourd''hui encore, les Israélites ne mangent pas le tendon qui est à l''emboîture de la hanche: parce que Dieu frappa Jacob à l''emboîture de la hanche, au tendon.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob envoya devant lui des messagers à son frère Esaü dans le pays de Séir, dans le territoire d''Edom. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur donna cet ordre: «Vous transmettrez ce message à mon seigneur Esaü: ‘Voici ce que dit ton serviteur Jacob: J''ai séjourné chez Laban et j''y suis resté jusqu''à maintenant. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J'ai des bœufs, des ânes, des brebis, des serviteurs et des servantes, et j'envoie des messagers te l'annoncer, mon seigneur, pour trouver grâce à tes yeux.’»
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les messagers revinrent vers Jacob en disant: «Nous sommes allés trouver ton frère Esaü; il marche à ta rencontre avec 400 hommes.» '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob fut très effrayé et saisi d''angoisse. Il partagea en deux camps ceux qui étaient avec lui, les brebis, les bœufs et les chameaux. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il se disait: «Si Esaü attaque l''un des camps et le bat, le camp qui restera pourra se sauver.»'
