document_id: 1CH.19
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guerre contre les Ammonites et leurs alliés
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après cela, Nachash, le roi des Ammonites, mourut et son fils devint roi à sa place. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'David se dit: «Je vais montrer de la bonté envers Hanun, le fils de Nachash, car son père en a montré envers moi.» Et il envoya des messagers le consoler au sujet de son père. Lorsque les serviteurs de David arrivèrent dans le pays des Ammonites vers Hanun pour le consoler, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'les chefs des Ammonites dirent à Hanun: «Penses-tu que ce soit pour honorer ton père que David t''envoie des consolateurs? N''est-ce pas pour faire une reconnaissance de la ville et la détruire, pour explorer le pays, que ses serviteurs sont venus vers toi?» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Alors Hanun arrêta les serviteurs de David, les fit raser et fit couper leurs habits par le milieu jusqu''en haut des cuisses. Puis il les renvoya. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'On vint informer David de ce qui était arrivé à ces hommes et il envoya des messagers à leur rencontre, car ils étaient couverts de honte. Le roi leur fit dire: «Restez à Jéricho jusqu''à ce que votre barbe ait repoussé et ne revenez qu''ensuite.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les Ammonites virent qu''ils avaient provoqué le dégoût de David, et Hanun et les Ammonites envoyèrent 30 tonnes d''argent pour engager des chars et des cavaliers chez les Syriens de Mésopotamie et chez ceux de Maaca et de Tsoba. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils engagèrent 32''000 chars ainsi que le roi de Maaca avec son peuple, qui vinrent installer leur camp devant Médeba. Les Ammonites sortirent de leurs villes et se rassemblèrent pour marcher au combat. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'A cette nouvelle, David envoya contre eux Joab et toute l''armée, les hommes vaillants. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les Ammonites sortirent et se rangèrent en ordre de bataille à l'entrée de la ville. Les rois venus en renfort étaient à part dans la campagne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Joab vit qu''il avait à combattre par-devant et par-derrière. Il choisit alors sur toute l''élite d''Israël un groupe qu''il plaça en face des Syriens. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il plaça le reste du peuple sous le commandement de son frère Abishaï, pour qu''il s''oppose aux Ammonites. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il lui dit: «Si les Syriens sont plus forts que moi, tu viendras à mon secours, et si les Ammonites sont plus forts que toi, je viendrai au tien. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Sois fort, montrons du courage pour notre peuple et pour les villes de notre Dieu, et que l''Eternel fasse ce qui lui semblera bon!» '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Joab s''avança avec sa troupe pour attaquer les Syriens, et ceux-ci prirent la fuite devant lui. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Quand les Ammonites virent que les Syriens s'étaient enfuis, ils prirent eux aussi la fuite devant Abishaï, le frère de Joab, et rentrèrent dans la ville. Et Joab revint à Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Voyant qu''ils avaient été battus par Israël, les Syriens envoyèrent chercher les Syriens qui habitaient de l''autre côté de l''Euphrate. Shophach, le chef de l''armée d''Hadarézer, était à leur tête. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'On l''annonça à David, qui rassembla tout Israël, passa le Jourdain, marcha contre eux et se prépara à les attaquer. David se rangea en ordre de bataille contre les Syriens, mais, après avoir combattu contre lui, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'ils prirent la fuite devant Israël. David tua parmi eux l''équipage de 7000 chars et 40''000 fantassins. Il fit aussi mourir Shophach, le chef de l''armée. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ceux qui étaient soumis à Hadarézer, se voyant battus par Israël, firent la paix avec David et lui furent asservis. Quant aux Syriens, ils ne voulurent plus se porter au secours des Ammonites.
