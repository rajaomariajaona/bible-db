document_id: SNG.6
type_code: fra
segments:
- type: usfm
  marker: sp
  children:
  - type: text
    text: Les filles de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Où est allé ton bien-aimé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi la plus belle des femmes?
- type: usfm
  marker: q1
  children:
  - type: text
    text: De quel côté ton bien-aimé s'est-il dirigé?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous le chercherons avec toi.
- type: usfm
  marker: sp
  children:
  - type: text
    text: La jeune femme
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mon bien-aimé est descendu à son jardin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au parterre d'aromates,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour prendre soin de son troupeau dans les jardins
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour cueillir des lis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Je suis à mon bien-aimé, et mon bien-aimé est à moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a conduit son troupeau parmi les lis.
- type: usfm
  marker: sp
  children:
  - type: text
    text: Le jeune homme
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tu es aussi belle que Thirtsa, mon amie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aussi charmante que Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aussi majestueuse que des troupes sous leurs étendards.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Détourne ton regard de moi, car il me trouble!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes cheveux sont pareils à un troupeau de chèvres
- type: usfm
  marker: q1
  children:
  - type: text
    text: bondissant sur les montagnes de Galaad.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tes dents sont comme un troupeau de brebis
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'qui remontent du lavoir:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: chacune a sa jumelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aucune d'elles n'est seule.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ta joue est comme une moitié de grenade
- type: usfm
  marker: q1
  children:
  - type: text
    text: derrière ton voile.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il peut y avoir 60 reines, 80 concubines
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des jeunes filles en quantité incalculable,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ma colombe, ma parfaite, est unique.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle est unique pour sa mère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle est la préférée de celle qui lui a donné le jour.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les filles la voient et la disent heureuse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les reines et les concubines aussi, et elles font son éloge.
- type: usfm
  marker: sp
  children:
  - type: text
    text: Les filles de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Qui est celle qui apparaît, pareille à l'aurore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aussi belle que la lune, aussi pure que le soleil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aussi majestueuse que des troupes sous leurs étendards?
- type: usfm
  marker: sp
  children:
  - type: text
    text: Le jeune homme
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je suis descendu au jardin des noyers
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour voir la verdure au fond du vallon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour voir si la vigne pousse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si les grenadiers fleurissent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: J'ignore comment, mais mon désir m'a poussé
- type: usfm
  marker: q1
  children:
  - type: text
    text: vers les chars de mon noble peuple.
