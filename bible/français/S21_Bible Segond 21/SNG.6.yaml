document_id: SNG.6,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les filles de Jérusalem
  - type: text
    content: Où est allé ton bien-aimé,
  - type: text
    content: toi la plus belle des femmes?
  - type: text
    content: De quel côté ton bien-aimé s'est-il dirigé?
  - type: text
    content: Nous le chercherons avec toi.
  - type: heading
    content: La jeune femme
  '10':
  - type: text
    content: Qui est celle qui apparaît, pareille à l'aurore,
  - type: text
    content: aussi belle que la lune, aussi pure que le soleil,
  - type: text
    content: aussi majestueuse que des troupes sous leurs étendards?
  - type: heading
    content: Le jeune homme
  '11':
  - type: text
    content: Je suis descendu au jardin des noyers
  - type: text
    content: pour voir la verdure au fond du vallon,
  - type: text
    content: pour voir si la vigne pousse,
  - type: text
    content: si les grenadiers fleurissent.
  '12':
  - type: text
    content: J'ignore comment, mais mon désir m'a poussé
  - type: text
    content: vers les chars de mon noble peuple.
  '2':
  - type: text
    content: Mon bien-aimé est descendu à son jardin,
  - type: text
    content: au parterre d'aromates,
  - type: text
    content: pour prendre soin de son troupeau dans les jardins
  - type: text
    content: et pour cueillir des lis.
  '3':
  - type: text
    content: Je suis à mon bien-aimé, et mon bien-aimé est à moi.
  - type: text
    content: Il a conduit son troupeau parmi les lis.
  - type: heading
    content: Le jeune homme
  '4':
  - type: text
    content: Tu es aussi belle que Thirtsa, mon amie,
  - type: text
    content: aussi charmante que Jérusalem,
  - type: text
    content: aussi majestueuse que des troupes sous leurs étendards.
  '5':
  - type: text
    content: Détourne ton regard de moi, car il me trouble!
  - type: text
    content: Tes cheveux sont pareils à un troupeau de chèvres
  - type: text
    content: bondissant sur les montagnes de Galaad.
  '6':
  - type: text
    content: Tes dents sont comme un troupeau de brebis
  - type: text
    content: 'qui remontent du lavoir:'
  - type: text
    content: chacune a sa jumelle,
  - type: text
    content: aucune d'elles n'est seule.
  '7':
  - type: text
    content: Ta joue est comme une moitié de grenade
  - type: text
    content: derrière ton voile.
  '8':
  - type: text
    content: Il peut y avoir 60 reines, 80 concubines
  - type: text
    content: et des jeunes filles en quantité incalculable,
  '9':
  - type: text
    content: ma colombe, ma parfaite, est unique.
  - type: text
    content: Elle est unique pour sa mère,
  - type: text
    content: elle est la préférée de celle qui lui a donné le jour.
  - type: text
    content: Les filles la voient et la disent heureuse,
  - type: text
    content: les reines et les concubines aussi, et elles font son éloge.
  - type: heading
    content: Les filles de Jérusalem
