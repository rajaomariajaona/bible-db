document_id: NUM.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miriam frappée de lèpre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Miriam et Aaron parlèrent contre Moïse au sujet de la femme cushite qu''il avait épousée. En effet, il avait épousé une femme cushite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ils dirent: «Est-ce seulement par Moïse que l''Eternel parle? N''est-ce pas aussi par nous qu''il parle?» L''Eternel l''entendit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Or, Moïse était un homme très humble, plus humble que n'importe quel homme à la surface de la terre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Soudain l''Eternel dit à Moïse, à Aaron et à Miriam: «Vous trois, allez à la tente de la rencontre!» et ils y allèrent tous les trois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L''Eternel descendit dans la colonne de nuée et se tint à l''entrée de la tente. Il appela Aaron et Miriam, qui s''avancèrent tous les deux, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'et il dit: «Ecoutez bien mes paroles! Lorsqu''il y aura parmi vous un prophète, c''est dans une vision que moi, l''Eternel, je me révélerai à lui, c''est dans un rêve que je lui parlerai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ce n'est pas le cas avec *mon serviteur Moïse. Il est fidèle dans toute ma maison
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Mon serviteur… maison: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cité en Hébreux 3.5.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Je lui parle directement, je me révèle à lui sans énigmes et il voit une représentation de l'Eternel. Comment se fait-il que vous n'ayez pas eu peur de parler contre mon serviteur Moïse?»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'La colère de l''Eternel s''enflamma contre eux. Il s''en alla, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'et la nuée se retira de dessus la tente. Et voici que Miriam était frappée de lèpre, elle était blanche comme la neige. Aaron se tourna vers Miriam et vit qu''elle avait la lèpre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors il dit à Moïse: «De grâce, mon seigneur, ne nous fais pas supporter les conséquences du péché que nous avons eu la folie de commettre et dont nous nous sommes rendus coupables! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Qu''elle ne soit pas comme l''enfant mort-né qui sort à moitié décharné du ventre de sa mère!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Moïse cria à l''Eternel en disant: «O Dieu, je t''en prie, guéris-la!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et l''Eternel dit à Moïse: «Si son père lui avait craché au visage, ne serait-elle pas pendant 7 jours un objet de honte? Qu''elle soit enfermée 7 jours à l''extérieur du camp; après quoi, on l''y réintégrera.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Miriam fut enfermée 7 jours à l'extérieur du camp, et le peuple ne partit pas jusqu'à sa réintégration.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Après cela, le peuple partit de Hatséroth et campa dans le désert de Paran.
