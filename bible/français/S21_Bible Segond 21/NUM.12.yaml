document_id: NUM.12,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Miriam frappée de lèpre
  - type: text
    content: 'Miriam et Aaron parlèrent contre Moïse au sujet de la femme cushite qu''il avait épousée. En effet, il avait épousé une femme cushite. '
  '10':
  - type: text
    content: 'et la nuée se retira de dessus la tente. Et voici que Miriam était frappée de lèpre, elle était blanche comme la neige. Aaron se tourna vers Miriam et vit qu''elle avait la lèpre. '
  '11':
  - type: text
    content: 'Alors il dit à Moïse: «De grâce, mon seigneur, ne nous fais pas supporter les conséquences du péché que nous avons eu la folie de commettre et dont nous nous sommes rendus coupables! '
  '12':
  - type: text
    content: 'Qu''elle ne soit pas comme l''enfant mort-né qui sort à moitié décharné du ventre de sa mère!» '
  '13':
  - type: text
    content: 'Moïse cria à l''Eternel en disant: «O Dieu, je t''en prie, guéris-la!» '
  '14':
  - type: text
    content: 'Et l''Eternel dit à Moïse: «Si son père lui avait craché au visage, ne serait-elle pas pendant 7 jours un objet de honte? Qu''elle soit enfermée 7 jours à l''extérieur du camp; après quoi, on l''y réintégrera.» '
  '15':
  - type: text
    content: Miriam fut enfermée 7 jours à l'extérieur du camp, et le peuple ne partit pas jusqu'à sa réintégration.
  '16':
  - type: text
    content: Après cela, le peuple partit de Hatséroth et campa dans le désert de Paran.
  '2':
  - type: text
    content: 'Ils dirent: «Est-ce seulement par Moïse que l''Eternel parle? N''est-ce pas aussi par nous qu''il parle?» L''Eternel l''entendit. '
  '3':
  - type: text
    content: Or, Moïse était un homme très humble, plus humble que n'importe quel homme à la surface de la terre.
  '4':
  - type: text
    content: 'Soudain l''Eternel dit à Moïse, à Aaron et à Miriam: «Vous trois, allez à la tente de la rencontre!» et ils y allèrent tous les trois. '
  '5':
  - type: text
    content: 'L''Eternel descendit dans la colonne de nuée et se tint à l''entrée de la tente. Il appela Aaron et Miriam, qui s''avancèrent tous les deux, '
  '6':
  - type: text
    content: 'et il dit: «Ecoutez bien mes paroles! Lorsqu''il y aura parmi vous un prophète, c''est dans une vision que moi, l''Eternel, je me révélerai à lui, c''est dans un rêve que je lui parlerai. '
  '7':
  - type: text
    content: Ce n'est pas le cas avec *mon serviteur Moïse. Il est fidèle dans toute ma maison
  - type: note
    content: 'Mon serviteur… maison: cité en Hébreux 3.5.'
  - type: text
    content: '. '
  '8':
  - type: text
    content: Je lui parle directement, je me révèle à lui sans énigmes et il voit une représentation de l'Eternel. Comment se fait-il que vous n'ayez pas eu peur de parler contre mon serviteur Moïse?»
  '9':
  - type: text
    content: 'La colère de l''Eternel s''enflamma contre eux. Il s''en alla, '
