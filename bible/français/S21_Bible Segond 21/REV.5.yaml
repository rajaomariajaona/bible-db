document_id: REV.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'Agneau et le livre scellé
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Puis je vis dans la main droite de celui qui était assis sur le trône un livre écrit à l'intérieur et à l'extérieur, fermé grâce à sept sceaux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sceaux: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: l'empreinte d'un sceau (bague ou objet cylindrique) apposée sur un document servait à le protéger, à l'authentifier ou à signaler son propriétaire.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je vis aussi un ange puissant proclamer d''une voix forte: «Qui est digne d''ouvrir le livre et d''en briser les sceaux?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais personne, ni dans le ciel ni sur la terre ni sous la terre, ne pouvait ouvrir le livre ni le regarder. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je pleurais beaucoup parce que personne n''avait été trouvé digne d''ouvrir le livre et de le regarder. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors l''un des anciens me dit: «Ne pleure pas, car le lion de la tribu de Juda, le rejeton de la racine de David, a vaincu pour ouvrir le livre et ses sept sceaux.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Puis je vis, au milieu du trône et des quatre êtres vivants et au milieu des anciens, un agneau debout comme offert en sacrifice. Il avait sept cornes et sept yeux, qui sont les sept esprits de Dieu envoyés par toute la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il vint prendre [le livre] de la main droite de celui qui était assis sur le trône.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Quand il eut pris le livre, les quatre êtres vivants et les vingt-quatre anciens se prosternèrent devant l'agneau. Chacun tenait une harpe et des coupes d'or remplies de parfums, qui sont les prières des saints
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Saints: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: manière de désigner les chrétiens en tant que personnes consacrées à Dieu et appelées à avoir le comportement qui découle de leur appartenance à ce Dieu.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'et ils chantaient un cantique nouveau en disant: «Tu es digne de prendre le livre et d''en ouvrir les sceaux, car tu as été offert en sacrifice et tu as racheté pour Dieu par ton sang des hommes de toute tribu, de toute langue, de tout peuple et de toute nation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tu as fait d'eux des rois et des prêtres pour notre Dieu, et ils régneront sur la terre.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Je regardai et j''entendis la voix de nombreux anges rassemblés autour du trône, des êtres vivants et des anciens; ils étaient des myriades de myriades et des milliers de milliers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils disaient d''une voix forte: «L''Agneau qui a été offert en sacrifice est digne de recevoir la puissance, la richesse, la sagesse, la force, l''honneur, la gloire et la louange.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Toutes les créatures qui sont dans le ciel, sur la terre, sous la terre, sur la mer, tous les êtres qui s''y trouvent, je les entendis s''écrier: «A celui qui est assis sur le trône et à l''Agneau soient la louange, l''honneur, la gloire et la domination, aux siècles des siècles!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les quatre êtres vivants répondaient: «Amen!» Et les anciens se prosternèrent et adorèrent.'
