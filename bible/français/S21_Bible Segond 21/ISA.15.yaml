document_id: ISA.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie sur Moab
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Message sur Moab.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, en une nuit Ar-Moab est dévastée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle est détruite!
- type: usfm
  marker: q1
  children:
  - type: text
    text: En une nuit Kir-Moab est dévastée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle est détruite!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: On monte au temple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dibon monte sur les hauts lieux pour pleurer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moab se lamente sur Nebo et sur Médeba.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toutes les têtes sont rasées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toutes les barbes coupées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dans ses rues on est habillé de sacs;
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur ses toits et ses places,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous gémissent et fondent en larmes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Hesbon et Elealé poussent des cris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on les entend jusqu'à Jahats. Voilà pourquoi les soldats de Moab hurlent. Moab est abattu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mon cœur pousse des cris pour Moab.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses fugitifs vont jusqu'à Tsoar,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu'à Eglath-Shelishija.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils gravissent en pleurant la montée de Louhith
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils poussent des cris de détresse sur le chemin de Horonaïm
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: parce que l'eau de Nimrim a entièrement disparu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'herbe est sèche, le gazon est détruit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toute la verdure a disparu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: C'est pourquoi ils rassemblent ce qui leur reste
- type: usfm
  marker: q1
  children:
  - type: text
    text: et transportent leurs biens de l'autre côté du torrent des saules.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Oui, les cris font le tour du territoire de Moab,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses lamentations retentissent jusqu'à Eglaïm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles retentissent jusqu'à Beer-Elim.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L'eau de Dimon est pleine de sang,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'mais j''envoie de nouveaux malheurs sur Dimon:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: un lion contre les rescapés de Moab,
- type: usfm
  marker: q1
  children:
  - type: text
    text: contre le reste du pays.
