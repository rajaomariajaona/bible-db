document_id: ISA.15,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie sur Moab
  - type: text
    content: Message sur Moab.
  - type: text
    content: Oui, en une nuit Ar-Moab est dévastée,
  - type: text
    content: elle est détruite!
  - type: text
    content: En une nuit Kir-Moab est dévastée,
  - type: text
    content: elle est détruite!
  '2':
  - type: text
    content: On monte au temple,
  - type: text
    content: Dibon monte sur les hauts lieux pour pleurer.
  - type: text
    content: Moab se lamente sur Nebo et sur Médeba.
  - type: text
    content: Toutes les têtes sont rasées,
  - type: text
    content: toutes les barbes coupées.
  '3':
  - type: text
    content: Dans ses rues on est habillé de sacs;
  - type: text
    content: sur ses toits et ses places,
  - type: text
    content: tous gémissent et fondent en larmes.
  '4':
  - type: text
    content: Hesbon et Elealé poussent des cris,
  - type: text
    content: on les entend jusqu'à Jahats. Voilà pourquoi les soldats de Moab hurlent. Moab est abattu.
  '5':
  - type: text
    content: Mon cœur pousse des cris pour Moab.
  - type: text
    content: Ses fugitifs vont jusqu'à Tsoar,
  - type: text
    content: jusqu'à Eglath-Shelishija.
  - type: text
    content: Ils gravissent en pleurant la montée de Louhith
  - type: text
    content: et ils poussent des cris de détresse sur le chemin de Horonaïm
  '6':
  - type: text
    content: parce que l'eau de Nimrim a entièrement disparu,
  - type: text
    content: l'herbe est sèche, le gazon est détruit,
  - type: text
    content: toute la verdure a disparu.
  '7':
  - type: text
    content: C'est pourquoi ils rassemblent ce qui leur reste
  - type: text
    content: et transportent leurs biens de l'autre côté du torrent des saules.
  '8':
  - type: text
    content: Oui, les cris font le tour du territoire de Moab,
  - type: text
    content: ses lamentations retentissent jusqu'à Eglaïm,
  - type: text
    content: elles retentissent jusqu'à Beer-Elim.
  '9':
  - type: text
    content: L'eau de Dimon est pleine de sang,
  - type: text
    content: 'mais j''envoie de nouveaux malheurs sur Dimon:'
  - type: text
    content: un lion contre les rescapés de Moab,
  - type: text
    content: contre le reste du pays.
