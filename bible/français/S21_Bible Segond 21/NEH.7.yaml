    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Parmi les portiers: les descendants de Shallum, d''Ather, de Thalmon, d''Akkub, de Hathitha et de Shobaï, 138.'
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: '»En ce qui concerne les serviteurs du temple: les descendants de Tsicha, de Hasupha, de Thabbaoth, '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'de Kéros, de Sia, de Padon, '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'de Lebana, de Hagaba, de Salmaï, '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'de Hanan, de Guiddel, de Gachar, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Mon Dieu m''a mis à cœur de rassembler les nobles, les magistrats et le peuple pour les dénombrer. J''ai trouvé le registre généalogique des premiers Israélites revenus de déportation et j''y ai vu écrit ce qui suit:'
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'de Reaja, de Retsin, de Nekoda, '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'de Gazzam, d''Uzza, de Paséach, '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'de Bésaï, de Mehunim, de Nephishsim, '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
