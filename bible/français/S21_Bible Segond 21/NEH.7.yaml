document_id: NEH.7
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Installation et reprise des activités
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 7.1–13.31
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les Israélites revenus d'exil avec Zorobabel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Une fois la muraille reconstruite et les battants des portes posés, on a établi dans leurs fonctions les portiers, les musiciens et les Lévites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'J''ai confié l''administration de Jérusalem à mon frère Hanani et à Hanania, le chef de la citadelle. C''était en effet un homme intègre qui craignait Dieu plus que beaucoup d''autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je leur ai dit: «Ne faites pas ouvrir les portes de Jérusalem tant que le soleil n''aura pas fait sentir sa chaleur et faites fermer leurs battants en les bloquant alors que les gardes sont encore à leur poste. Instaurez des tours de garde pour les habitants de Jérusalem: que l''un soit à son poste de guet, l''autre devant sa maison.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: La ville était étendue et grande, mais sa population n'était pas nombreuse et ses maisons pas encore reconstruites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mon Dieu m''a mis à cœur de rassembler les nobles, les magistrats et le peuple pour les dénombrer. J''ai trouvé le registre généalogique des premiers Israélites revenus de déportation et j''y ai vu écrit ce qui suit:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '*«Voici les habitants de la province de Juda revenus de déportation, ceux que Nebucadnetsar, le roi de Babylone, avait exilés et qui retournèrent à Jérusalem et en Juda, chacun dans sa ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils revinrent avec Zorobabel, Josué, Néhémie, Azaria, Raamia, Nachamani, Mardochée, Bilshan, Mispéreth, Bigvaï, Nehum et Baana. Voici la liste des hommes du peuple d''Israël: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'les descendants de Pareosh, 2172; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'de Shephathia, 372; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'd''Arach, 652; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'les descendants de Pachath-Moab issus de Josué et de Joab, 2818; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'les descendants d''Elam, 1254; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'de Zatthu, 845; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'de Zaccaï, 760; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'de Binnuï, 648; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'de Bébaï, 628; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'd''Azgad, 2322; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'd''Adonikam, 667; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'de Bigvaï, 2067; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'd''Adin, 655; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'les descendants d''Ather de la famille d''Ezéchias, 98; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'les descendants de Hashum, 328; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'de Betsaï, 324; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'de Hariph, 112; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'de Gabaon, 95; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'les habitants de Bethléhem et de Nethopha, 188; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'les habitants d''Anathoth, 128; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'les habitants de Beth-Azmaveth, 42; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'les habitants de Kirjath-Jearim, de Kephira et de Beéroth, 743; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'les habitants de Rama et de Guéba, 621; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'les habitants de Micmas, 122; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'les habitants de Béthel et d''Aï, 123; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'les habitants de l''autre Nebo, 52; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'les descendants de l''autre Elam, 1254; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'de Harim, 320; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'les hommes originaires de Jéricho, 345; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'les hommes originaires de Lod, de Hadid et d''Ono, 721; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: les hommes originaires de Senaa, 3930.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: '»En ce qui concerne les prêtres: les descendants de Jedaeja, de la famille de Josué, 973; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'les descendants d''Immer, 1052; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'de Pashhur, 1247; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: de Harim, 1017.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: '»En ce qui concerne les Lévites: les descendants de Josué et de Kadmiel issus d''Hodva, 74. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Parmi les musiciens: les descendants d''Asaph, 148. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Parmi les portiers: les descendants de Shallum, d''Ather, de Thalmon, d''Akkub, de Hathitha et de Shobaï, 138.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: '»En ce qui concerne les serviteurs du temple: les descendants de Tsicha, de Hasupha, de Thabbaoth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'de Kéros, de Sia, de Padon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'de Lebana, de Hagaba, de Salmaï, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'de Hanan, de Guiddel, de Gachar, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'de Reaja, de Retsin, de Nekoda, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'de Gazzam, d''Uzza, de Paséach, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'de Bésaï, de Mehunim, de Nephishsim, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'de Bakbuk, de Hakupha, de Harhur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'de Batsluth, de Mehida, de Harsha, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'de Barkos, de Sisera, de Thamach, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: de Netsiach et de Hathipha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: '»En ce qui concerne les descendants des serviteurs de Salomon: les descendants de Sothaï, de Sophéreth, de Perida, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'de Jaala, de Darkon, de Guiddel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: de Shephathia, de Hatthil, de Pokéreth-Hatsebaïm et d'Amon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: '»Nombre total des serviteurs du temple et des descendants des serviteurs de Salomon: 392.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: '»Voici ceux qui revinrent de Thel-Mélach, de Thel-Harsha, de Kerub-Addon et d''Immer et qui ne purent pas prouver qu''ils étaient bien d''Israël par leur famille et leur origine: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'les descendants de Delaja, de Tobija, de Nekoda, 642; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'parmi les prêtres: les descendants de Hobaja, d''Hakkots et de Barzillaï, qui avait épousé une des filles de Barzillaï le Galaadite et avait porté son nom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Ils avaient cherché leurs actes généalogiques mais ne les avaient pas trouvés, de sorte qu''ils furent déclarés impurs pour l''exercice de la fonction de prêtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: Le gouverneur de Juda leur interdit de manger des offrandes très saintes, et ce jusqu'à ce qu'un prêtre ait pu consulter l'urim et le thummim.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: '»L''assemblée d''Israël tout entière se composait de 42''360 personnes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'sans compter leurs serviteurs et leurs servantes, au nombre de 7337. Parmi eux se trouvaient 245 musiciens, hommes et femmes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: '[Ils avaient 736 chevaux, 245 mulets,] 435 chameaux et 6720 ânes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: '»Plusieurs des chefs de famille firent des dons pour les travaux: le gouverneur, 1000 pièces en or, 50 coupes et 530 tuniques destinées aux prêtres; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: 'les chefs de famille, 20''000 pièces en or et 1320 kilos d''argent; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '71'
  - type: text
    text: le reste du peuple, 20'000 pièces en or, 1200 kilos d'argent et 67 tuniques destinées aux prêtres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '72'
  - type: text
    text: »Les prêtres et les Lévites, les portiers, les musiciens, quelques membres du peuple et les serviteurs du temple, de même que tout Israël, s'installèrent dans leurs villes respectives.»
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.6-72 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Reprise de la liste d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esdras 2
      metadata:
        usfm: EZR.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lecture et explication de la loi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: A l'aube du septième mois, les Israélites étaient installés dans leurs villes.
