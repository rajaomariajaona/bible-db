  - type: heading
    content: Les Israélites revenus d'exil avec Zorobabel
  - type: text
    content: 'Une fois la muraille reconstruite et les battants des portes posés, on a établi dans leurs fonctions les portiers, les musiciens et les Lévites. '
  '10':
  - type: text
    content: 'd''Arach, 652; '
  '11':
  - type: text
    content: 'les descendants de Pachath-Moab issus de Josué et de Joab, 2818; '
  '12':
  - type: text
    content: 'les descendants d''Elam, 1254; '
  '13':
  - type: text
    content: 'de Zatthu, 845; '
  '14':
  - type: text
    content: 'de Zaccaï, 760; '
  '15':
  - type: text
    content: 'de Binnuï, 648; '
  '16':
  - type: text
    content: 'de Bébaï, 628; '
  '17':
  - type: text
    content: 'd''Azgad, 2322; '
  '18':
  - type: text
    content: 'd''Adonikam, 667; '
  '19':
  - type: text
    content: 'de Bigvaï, 2067; '
  '2':
  - type: text
    content: 'J''ai confié l''administration de Jérusalem à mon frère Hanani et à Hanania, le chef de la citadelle. C''était en effet un homme intègre qui craignait Dieu plus que beaucoup d''autres. '
  '20':
  - type: text
    content: 'd''Adin, 655; '
  '21':
  - type: text
    content: 'les descendants d''Ather de la famille d''Ezéchias, 98; '
  '22':
  - type: text
    content: 'les descendants de Hashum, 328; '
  '23':
  - type: text
    content: 'de Betsaï, 324; '
  '24':
  - type: text
    content: 'de Hariph, 112; '
  '25':
  - type: text
    content: 'de Gabaon, 95; '
  '26':
  - type: text
    content: 'les habitants de Bethléhem et de Nethopha, 188; '
  '27':
  - type: text
    content: 'les habitants d''Anathoth, 128; '
  '28':
  - type: text
    content: 'les habitants de Beth-Azmaveth, 42; '
  '29':
  - type: text
    content: 'les habitants de Kirjath-Jearim, de Kephira et de Beéroth, 743; '
  '3':
  - type: text
    content: 'Je leur ai dit: «Ne faites pas ouvrir les portes de Jérusalem tant que le soleil n''aura pas fait sentir sa chaleur et faites fermer leurs battants en les bloquant alors que les gardes sont encore à leur poste. Instaurez des tours de garde pour les habitants de Jérusalem: que l''un soit à son poste de guet, l''autre devant sa maison.» '
  '30':
  - type: text
    content: 'les habitants de Rama et de Guéba, 621; '
  '31':
  - type: text
    content: 'les habitants de Micmas, 122; '
  '32':
  - type: text
    content: 'les habitants de Béthel et d''Aï, 123; '
  '33':
  - type: text
    content: 'les habitants de l''autre Nebo, 52; '
  '34':
  - type: text
    content: 'les descendants de l''autre Elam, 1254; '
  '35':
  - type: text
    content: 'de Harim, 320; '
  '36':
  - type: text
    content: 'les hommes originaires de Jéricho, 345; '
  '37':
  - type: text
    content: 'les hommes originaires de Lod, de Hadid et d''Ono, 721; '
  '38':
  - type: text
    content: les hommes originaires de Senaa, 3930.
  '39':
  - type: text
    content: '»En ce qui concerne les prêtres: les descendants de Jedaeja, de la famille de Josué, 973; '
  '4':
  - type: text
    content: La ville était étendue et grande, mais sa population n'était pas nombreuse et ses maisons pas encore reconstruites.
  '40':
  - type: text
    content: 'les descendants d''Immer, 1052; '
  '41':
  - type: text
    content: 'de Pashhur, 1247; '
  '42':
  - type: text
    content: de Harim, 1017.
  '43':
  - type: text
    content: '»En ce qui concerne les Lévites: les descendants de Josué et de Kadmiel issus d''Hodva, 74. '
  '44':
  - type: text
    content: 'Parmi les musiciens: les descendants d''Asaph, 148. '
  '45':
  - type: text
    content: 'Parmi les portiers: les descendants de Shallum, d''Ather, de Thalmon, d''Akkub, de Hathitha et de Shobaï, 138.'
  '46':
  - type: text
    content: '»En ce qui concerne les serviteurs du temple: les descendants de Tsicha, de Hasupha, de Thabbaoth, '
  '47':
  - type: text
    content: 'de Kéros, de Sia, de Padon, '
  '48':
  - type: text
    content: 'de Lebana, de Hagaba, de Salmaï, '
  '49':
  - type: text
    content: 'de Hanan, de Guiddel, de Gachar, '
  '5':
  - type: text
    content: 'Mon Dieu m''a mis à cœur de rassembler les nobles, les magistrats et le peuple pour les dénombrer. J''ai trouvé le registre généalogique des premiers Israélites revenus de déportation et j''y ai vu écrit ce qui suit:'
  '50':
  - type: text
    content: 'de Reaja, de Retsin, de Nekoda, '
  '51':
  - type: text
    content: 'de Gazzam, d''Uzza, de Paséach, '
  '52':
  - type: text
    content: 'de Bésaï, de Mehunim, de Nephishsim, '
  '53':
  - type: text
    content: 'de Bakbuk, de Hakupha, de Harhur, '
  '54':
  - type: text
    content: 'de Batsluth, de Mehida, de Harsha, '
  '55':
  - type: text
    content: 'de Barkos, de Sisera, de Thamach, '
  '56':
  - type: text
    content: de Netsiach et de Hathipha.
  '57':
  - type: text
    content: '»En ce qui concerne les descendants des serviteurs de Salomon: les descendants de Sothaï, de Sophéreth, de Perida, '
  '58':
  - type: text
    content: 'de Jaala, de Darkon, de Guiddel, '
  '59':
  - type: text
    content: de Shephathia, de Hatthil, de Pokéreth-Hatsebaïm et d'Amon.
  '6':
  - type: text
    content: '*«Voici les habitants de la province de Juda revenus de déportation, ceux que Nebucadnetsar, le roi de Babylone, avait exilés et qui retournèrent à Jérusalem et en Juda, chacun dans sa ville. '
  '60':
  - type: text
    content: '»Nombre total des serviteurs du temple et des descendants des serviteurs de Salomon: 392.'
  '61':
  - type: text
    content: '»Voici ceux qui revinrent de Thel-Mélach, de Thel-Harsha, de Kerub-Addon et d''Immer et qui ne purent pas prouver qu''ils étaient bien d''Israël par leur famille et leur origine: '
  '62':
  - type: text
    content: 'les descendants de Delaja, de Tobija, de Nekoda, 642; '
  '63':
  - type: text
    content: 'parmi les prêtres: les descendants de Hobaja, d''Hakkots et de Barzillaï, qui avait épousé une des filles de Barzillaï le Galaadite et avait porté son nom. '
  '64':
  - type: text
    content: 'Ils avaient cherché leurs actes généalogiques mais ne les avaient pas trouvés, de sorte qu''ils furent déclarés impurs pour l''exercice de la fonction de prêtre. '
  '65':
  - type: text
    content: Le gouverneur de Juda leur interdit de manger des offrandes très saintes, et ce jusqu'à ce qu'un prêtre ait pu consulter l'urim et le thummim.
  '66':
  - type: text
    content: '»L''assemblée d''Israël tout entière se composait de 42''360 personnes, '
  '67':
  - type: text
    content: 'sans compter leurs serviteurs et leurs servantes, au nombre de 7337. Parmi eux se trouvaient 245 musiciens, hommes et femmes. '
  '68':
  - type: text
    content: '[Ils avaient 736 chevaux, 245 mulets,] 435 chameaux et 6720 ânes.'
  '69':
  - type: text
    content: '»Plusieurs des chefs de famille firent des dons pour les travaux: le gouverneur, 1000 pièces en or, 50 coupes et 530 tuniques destinées aux prêtres; '
  '7':
  - type: text
    content: 'Ils revinrent avec Zorobabel, Josué, Néhémie, Azaria, Raamia, Nachamani, Mardochée, Bilshan, Mispéreth, Bigvaï, Nehum et Baana. Voici la liste des hommes du peuple d''Israël: '
  '70':
  - type: text
    content: 'les chefs de famille, 20''000 pièces en or et 1320 kilos d''argent; '
  '71':
  - type: text
    content: le reste du peuple, 20'000 pièces en or, 1200 kilos d'argent et 67 tuniques destinées aux prêtres.
  '72':
  - type: text
    content: »Les prêtres et les Lévites, les portiers, les musiciens, quelques membres du peuple et les serviteurs du temple, de même que tout Israël, s'installèrent dans leurs villes respectives.»
  - type: note
    content: Reprise de la liste d'Esdras 2.
  - type: heading
    content: Lecture et explication de la loi
  - type: text
    content: A l'aube du septième mois, les Israélites étaient installés dans leurs villes.
  '8':
  - type: text
    content: 'les descendants de Pareosh, 2172; '
  '9':
  - type: text
    content: 'de Shephathia, 372; '
