document_id: 2CO.5,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Nous savons, en effet, que si notre habitation terrestre, qui n''est qu''une tente, est détruite, nous avons dans le ciel un édifice qui est l''œuvre de Dieu, une habitation éternelle qui n''est pas faite par la main de l''homme. '
  '10':
  - type: text
    content: En effet, il nous faudra tous comparaître devant le tribunal de Christ afin que chacun reçoive le salaire de ce qu'il aura fait, bien ou mal, alors qu'il était dans son corps.
  - type: heading
    content: Un ministère de réconciliation
  '11':
  - type: text
    content: 'Ainsi donc, puisque nous savons ce qu''est la crainte du Seigneur, nous cherchons à convaincre les hommes. Quant à Dieu, il nous connaît, et j''espère que dans votre conscience vous nous connaissez aussi. '
  '12':
  - type: text
    content: 'Nous n''allons pas de nouveau nous recommander nous-mêmes auprès de vous, mais nous voulons vous donner l''occasion de vous montrer fiers à notre sujet, afin que vous puissiez répondre à ceux qui mettent leur fierté dans les apparences et non dans ce qui relève du cœur. '
  '13':
  - type: text
    content: 'En effet, si nous avons fait preuve de folie, c''était pour Dieu; si nous sommes raisonnables, c''est pour vous. '
  '14':
  - type: text
    content: 'C''est que l''amour de Christ nous presse, parce que nous sommes convaincus que si un seul est mort pour tous, tous donc sont morts. '
  '15':
  - type: text
    content: 'Et s''il est mort pour tous, c''était afin que ceux qui vivent ne vivent plus pour eux-mêmes, mais pour celui qui est mort et ressuscité pour eux. '
  '16':
  - type: text
    content: Ainsi, désormais, nous ne percevons plus personne de manière humaine; et si nous avons connu Christ de manière purement humaine, maintenant nous ne le connaissons plus ainsi.
  '17':
  - type: text
    content: 'Si quelqu''un est en Christ, il est une nouvelle créature. Les choses anciennes sont passées; voici, toutes choses sont devenues nouvelles. '
  '18':
  - type: text
    content: 'Et tout cela vient de Dieu qui nous a réconciliés avec lui par [Jésus-]Christ et qui nous a donné le ministère de la réconciliation. '
  '19':
  - type: text
    content: 'En effet, Dieu était en Christ: il réconciliait le monde avec lui-même en ne chargeant pas les hommes de leurs fautes, et il a mis en nous la parole de la réconciliation. '
  '2':
  - type: text
    content: 'Et nous gémissons dans cette tente, avec l''ardent désir de revêtir notre domicile céleste, '
  '20':
  - type: text
    content: 'Nous sommes donc des ambassadeurs pour Christ, comme si Dieu adressait par nous son appel. Nous supplions au nom de Christ: «Soyez réconciliés avec Dieu! '
  '21':
  - type: text
    content: '[En effet,] celui qui n''a pas connu le péché, il l''a fait devenir péché pour nous afin qu''en lui nous devenions justice de Dieu.»'
  '3':
  - type: text
    content: 'puisque, après avoir été ainsi revêtus, nous ne serons pas trouvés nus. '
  '4':
  - type: text
    content: 'En effet, nous qui sommes dans cette tente, nous gémissons, accablés, parce que nous voulons non pas nous dévêtir, mais au contraire nous revêtir, afin que ce qui est mortel soit englouti par la vie. '
  '5':
  - type: text
    content: Et celui qui nous a préparés pour cela, c'est Dieu, qui nous a donné le gage de l'Esprit.
  '6':
  - type: text
    content: 'Nous sommes donc toujours pleins de confiance et nous savons que, tant que nous habitons dans ce corps, nous sommes loin de notre patrie, loin du Seigneur, '
  '7':
  - type: text
    content: 'car nous marchons par la foi et non par la vue. '
  '8':
  - type: text
    content: 'Oui, nous sommes pleins de confiance et nous aimerions mieux quitter ce corps pour aller vivre auprès du Seigneur. '
  '9':
  - type: text
    content: 'C''est aussi pour cela que nous nous efforçons de lui être agréables, soit que nous vivions dans ce corps, soit que nous le quittions. '
