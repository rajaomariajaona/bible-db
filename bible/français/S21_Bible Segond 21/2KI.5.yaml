document_id: 2KI.5,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Naaman, le chef de l''armée du roi de Syrie, jouissait de la faveur et de l''estime de son seigneur, car c''était par lui que l''Eternel avait donné la victoire aux Syriens. Toutefois, cet homme fort et vaillant était lépreux. '
  '10':
  - type: text
    content: 'Elisée lui fit dire par un messager: «Va te laver 7 fois dans le Jourdain. Ta chair deviendra saine et tu seras pur.» '
  '11':
  - type: text
    content: 'Naaman fut indigné et il s''en alla en disant: «Je me disais: ‘Il sortira en personne vers moi, il fera appel au nom de l''Eternel, son Dieu, il fera un mouvement de la main sur l''endroit malade et guérira ma lèpre.’ '
  '12':
  - type: text
    content: 'Les fleuves de Damas, l''Abana et le Parpar, ne valent-ils pas mieux que tous les cours d''eau d''Israël? Ne pourrais-je pas m''y laver pour devenir pur?» Il tourna le dos, et il partait plein de colère '
  '13':
  - type: text
    content: 'lorsque ses serviteurs s''approchèrent de lui pour lui parler. Ils dirent: «Mon père, si le prophète t''avait demandé quelque chose de difficile, ne l''aurais-tu pas fait? Tu dois d''autant plus volontiers faire ce qu''il t''a dit: ‘Lave-toi et tu seras pur!’» '
  '14':
  - type: text
    content: Il descendit alors se plonger 7 fois dans le Jourdain, conformément à la parole de l'homme de Dieu. Sa chair redevint comme celle d'un jeune enfant et il fut pur.
  '15':
  - type: text
    content: 'Naaman retourna vers l''homme de Dieu avec toute sa suite. Dès son arrivée, il se présenta devant lui et dit: «Je reconnais qu''il n''y a aucun Dieu sur toute la terre, sauf en Israël. Maintenant, accepte, je t''en prie, un cadeau de la part de ton serviteur.» '
  '16':
  - type: text
    content: 'Elisée répondit: «L''Eternel, dont je suis le serviteur, est vivant! Je n''accepterai rien.» Naaman insista pour qu''il accepte, mais il refusa. '
  '17':
  - type: text
    content: 'Alors Naaman dit: «Puisque tu refuses, permets que l''on me donne de la terre d''ici'
  - type: note
    content: 'De la terre d''ici: conformément à une opinion courante dans l''Antiquité, Naaman pensait ne pouvoir adorer le Dieu d''Israël que sur le sol d''Israël.'
  - type: text
    content: ', à moi ton serviteur. Qu''on m''en donne l''équivalent de la charge de deux mulets, car moi ton serviteur, je ne veux plus offrir ni holocauste ni sacrifice à d''autres dieux qu''à l''Eternel. '
  '18':
  - type: text
    content: 'Cependant, que l''Eternel veuille pardonner ceci à ton serviteur: quand mon seigneur entre dans le temple de Rimmon'
  - type: note
    content: 'Rimmon: un des 12 principaux dieux syriens, considéré comme le dieu de l''orage et de la fécondité.'
  - type: text
    content: ' pour s''y prosterner, il s''appuie sur ma main et je m''y prosterne aussi. Que l''Eternel veuille bien me pardonner, à moi ton serviteur, lorsque je me prosternerai dans le temple de Rimmon!» '
  '19':
  - type: text
    content: 'Elisée lui dit: «Pars dans la paix.»'
  - type: text
    content: 'Lorsque Naaman eut quitté Elisée et qu''il fut à une certaine distance, '
  '2':
  - type: text
    content: 'Or, les Syriens avaient mené des expéditions, et ils avaient ramené prisonnière une petite fille du pays d''Israël. Celle-ci était au service de la femme de Naaman, '
  '20':
  - type: text
    content: 'Guéhazi, le serviteur d''Elisée, l''homme de Dieu, se dit en lui-même: «Mon maître a ménagé Naaman, ce Syrien, en n''acceptant pas de prendre ce qu''il avait apporté. L''Eternel est vivant! Je vais courir derrière lui et j''obtiendrai quelque chose de sa part.» '
  '21':
  - type: text
    content: 'Guéhazi courut donc derrière Naaman. Le voyant courir derrière lui, Naaman s''empressa de descendre de son char pour aller à sa rencontre et demanda: «Est-ce que tout va bien?» '
  '22':
  - type: text
    content: 'Il répondit: «Tout va bien. Mon maître m''envoie te dire: ‘Deux jeunes gens de la région montagneuse d''Ephraïm, des membres de la communauté de prophètes, viennent d''arriver chez moi. Donne-moi pour eux, je t''en prie, 30 kilos d''argent et 2 habits de rechange.’» '
  '23':
  - type: text
    content: 'Naaman dit: «Accepte de prendre 60 kilos.» Il insista et mit 60 kilos d''argent dans deux sacs, lui donna 2 habits de rechange et les fit porter devant Guéhazi par deux de ses serviteurs. '
  '24':
  - type: text
    content: 'Arrivé à la colline, Guéhazi les prit de leurs mains et les déposa chez lui, puis il renvoya ces hommes, qui partirent. '
  '25':
  - type: text
    content: 'Il alla ensuite se présenter à son seigneur. Elisée lui demanda: «D''où viens-tu, Guéhazi?» Il répondit: «Ton serviteur n''est parti nulle part.» '
  '26':
  - type: text
    content: 'Mais Elisée lui dit: «Mon esprit non plus n''était pas parti lorsque cet homme a quitté son char pour venir à ta rencontre. Est-ce le moment de prendre de l''argent pour acheter des habits, des oliviers, des vignes, des brebis, des bœufs, des serviteurs et des servantes? '
  '27':
  - type: text
    content: La lèpre de Naaman va s'attacher à toi et à ta descendance pour toujours.» Guéhazi quitta Elisée, atteint d'une lèpre blanche comme la neige.
  '3':
  - type: text
    content: 'et elle dit à sa maîtresse: «Si seulement mon seigneur pouvait voir le prophète qui se trouve à Samarie, il le guérirait de sa lèpre!» '
  '4':
  - type: text
    content: 'Naaman alla dire à son seigneur: «La jeune fille du pays d''Israël a parlé de telle et telle manière.» '
  '5':
  - type: text
    content: 'Le roi de Syrie dit: «Vas-y, rends-toi à Samarie. Je vais envoyer une lettre au roi d''Israël.» Naaman partit, prenant avec lui 300 kilos d''argent, 70 d''or et 10 habits de rechange, '
  '6':
  - type: text
    content: 'et il apporta la lettre au roi d''Israël. Celle-ci disait: «Maintenant que cette lettre t''est parvenue, tu sais que je t''envoie Naaman, mon serviteur, afin que tu le guérisses de sa lèpre.» '
  '7':
  - type: text
    content: 'Après avoir lu la lettre, le roi d''Israël déchira ses habits et dit: «Suis-je Dieu, pour faire mourir et pour faire vivre? En effet, il s''adresse à moi afin que je guérisse un homme de sa lèpre! Sachez-le donc et comprenez-le: il cherche une occasion de dispute avec moi.»'
  '8':
  - type: text
    content: 'Lorsque Elisée, l''homme de Dieu, apprit que le roi d''Israël avait déchiré ses habits, il fit dire au roi: «Pourquoi as-tu déchiré tes habits? Fais-le venir vers moi et il saura qu''il y a un prophète en Israël.» '
  '9':
  - type: text
    content: 'Naaman vint avec ses chevaux et son char, et il s''arrêta à la porte de la maison d''Elisée. '
