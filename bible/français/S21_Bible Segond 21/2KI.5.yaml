document_id: 2KI.5
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Naaman, le chef de l''armée du roi de Syrie, jouissait de la faveur et de l''estime de son seigneur, car c''était par lui que l''Eternel avait donné la victoire aux Syriens. Toutefois, cet homme fort et vaillant était lépreux. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Or, les Syriens avaient mené des expéditions, et ils avaient ramené prisonnière une petite fille du pays d''Israël. Celle-ci était au service de la femme de Naaman, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'et elle dit à sa maîtresse: «Si seulement mon seigneur pouvait voir le prophète qui se trouve à Samarie, il le guérirait de sa lèpre!» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Naaman alla dire à son seigneur: «La jeune fille du pays d''Israël a parlé de telle et telle manière.» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le roi de Syrie dit: «Vas-y, rends-toi à Samarie. Je vais envoyer une lettre au roi d''Israël.» Naaman partit, prenant avec lui 300 kilos d''argent, 70 d''or et 10 habits de rechange, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'et il apporta la lettre au roi d''Israël. Celle-ci disait: «Maintenant que cette lettre t''est parvenue, tu sais que je t''envoie Naaman, mon serviteur, afin que tu le guérisses de sa lèpre.» '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Après avoir lu la lettre, le roi d''Israël déchira ses habits et dit: «Suis-je Dieu, pour faire mourir et pour faire vivre? En effet, il s''adresse à moi afin que je guérisse un homme de sa lèpre! Sachez-le donc et comprenez-le: il cherche une occasion de dispute avec moi.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Lorsque Elisée, l''homme de Dieu, apprit que le roi d''Israël avait déchiré ses habits, il fit dire au roi: «Pourquoi as-tu déchiré tes habits? Fais-le venir vers moi et il saura qu''il y a un prophète en Israël.» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Naaman vint avec ses chevaux et son char, et il s''arrêta à la porte de la maison d''Elisée. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Elisée lui fit dire par un messager: «Va te laver 7 fois dans le Jourdain. Ta chair deviendra saine et tu seras pur.» '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Naaman fut indigné et il s''en alla en disant: «Je me disais: ‘Il sortira en personne vers moi, il fera appel au nom de l''Eternel, son Dieu, il fera un mouvement de la main sur l''endroit malade et guérira ma lèpre.’ '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les fleuves de Damas, l''Abana et le Parpar, ne valent-ils pas mieux que tous les cours d''eau d''Israël? Ne pourrais-je pas m''y laver pour devenir pur?» Il tourna le dos, et il partait plein de colère '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'lorsque ses serviteurs s''approchèrent de lui pour lui parler. Ils dirent: «Mon père, si le prophète t''avait demandé quelque chose de difficile, ne l''aurais-tu pas fait? Tu dois d''autant plus volontiers faire ce qu''il t''a dit: ‘Lave-toi et tu seras pur!’» '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il descendit alors se plonger 7 fois dans le Jourdain, conformément à la parole de l'homme de Dieu. Sa chair redevint comme celle d'un jeune enfant et il fut pur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Naaman retourna vers l''homme de Dieu avec toute sa suite. Dès son arrivée, il se présenta devant lui et dit: «Je reconnais qu''il n''y a aucun Dieu sur toute la terre, sauf en Israël. Maintenant, accepte, je t''en prie, un cadeau de la part de ton serviteur.» '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Elisée répondit: «L''Eternel, dont je suis le serviteur, est vivant! Je n''accepterai rien.» Naaman insista pour qu''il accepte, mais il refusa. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors Naaman dit: «Puisque tu refuses, permets que l''on me donne de la terre d''ici'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'De la terre d''ici: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: conformément à une opinion courante dans l'Antiquité, Naaman pensait ne pouvoir adorer le Dieu d'Israël que sur le sol d'Israël.
    marker-yv: yv-n
  - type: text
    text: ', à moi ton serviteur. Qu''on m''en donne l''équivalent de la charge de deux mulets, car moi ton serviteur, je ne veux plus offrir ni holocauste ni sacrifice à d''autres dieux qu''à l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Cependant, que l''Eternel veuille pardonner ceci à ton serviteur: quand mon seigneur entre dans le temple de Rimmon'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Rimmon: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: un des 12 principaux dieux syriens, considéré comme le dieu de l'orage et de la fécondité.
    marker-yv: yv-n
  - type: text
    text: ' pour s''y prosterner, il s''appuie sur ma main et je m''y prosterne aussi. Que l''Eternel veuille bien me pardonner, à moi ton serviteur, lorsque je me prosternerai dans le temple de Rimmon!» '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Elisée lui dit: «Pars dans la paix.»'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Lorsque Naaman eut quitté Elisée et qu''il fut à une certaine distance, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Guéhazi, le serviteur d''Elisée, l''homme de Dieu, se dit en lui-même: «Mon maître a ménagé Naaman, ce Syrien, en n''acceptant pas de prendre ce qu''il avait apporté. L''Eternel est vivant! Je vais courir derrière lui et j''obtiendrai quelque chose de sa part.» '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Guéhazi courut donc derrière Naaman. Le voyant courir derrière lui, Naaman s''empressa de descendre de son char pour aller à sa rencontre et demanda: «Est-ce que tout va bien?» '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il répondit: «Tout va bien. Mon maître m''envoie te dire: ‘Deux jeunes gens de la région montagneuse d''Ephraïm, des membres de la communauté de prophètes, viennent d''arriver chez moi. Donne-moi pour eux, je t''en prie, 30 kilos d''argent et 2 habits de rechange.’» '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Naaman dit: «Accepte de prendre 60 kilos.» Il insista et mit 60 kilos d''argent dans deux sacs, lui donna 2 habits de rechange et les fit porter devant Guéhazi par deux de ses serviteurs. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Arrivé à la colline, Guéhazi les prit de leurs mains et les déposa chez lui, puis il renvoya ces hommes, qui partirent. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il alla ensuite se présenter à son seigneur. Elisée lui demanda: «D''où viens-tu, Guéhazi?» Il répondit: «Ton serviteur n''est parti nulle part.» '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Mais Elisée lui dit: «Mon esprit non plus n''était pas parti lorsque cet homme a quitté son char pour venir à ta rencontre. Est-ce le moment de prendre de l''argent pour acheter des habits, des oliviers, des vignes, des brebis, des bœufs, des serviteurs et des servantes? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: La lèpre de Naaman va s'attacher à toi et à ta descendance pour toujours.» Guéhazi quitta Elisée, atteint d'une lèpre blanche comme la neige.
