document_id: JHN.21,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La pêche miraculeuse
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Après cela, Jésus se montra encore aux disciples sur les rives du lac de Tibériade. Voici de quelle manière il se montra. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Jésus leur dit: «Apportez quelques-uns des poissons que vous venez de prendre.» '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Simon Pierre monta dans la barque et tira le filet plein de 153 gros poissons à terre; malgré leur grand nombre, le filet ne se déchira pas. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Jésus leur dit: «Venez manger!» Aucun des disciples n''osait lui demander: «Qui es-tu?» car ils savaient que c''était le Seigneur. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Jésus s''approcha, prit le pain et leur en donna; il fit de même avec le poisson. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: C'était déjà la troisième fois que Jésus se montrait à ses disciples depuis qu'il était ressuscité.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Lorsqu''ils eurent mangé, Jésus dit à Simon Pierre: «Simon, fils de Jonas, m''aimes-tu plus que ceux-ci?» Il lui répondit: «Oui, Seigneur, tu sais que j''ai de l''amour pour toi.» Jésus lui dit: «Nourris mes agneaux.» '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Il lui dit une deuxième fois: «Simon, fils de Jonas, m''aimes-tu?» Pierre lui répondit: «Oui, Seigneur, tu sais que j''ai de l''amour pour toi.» Jésus lui dit: «Prends soin de mes brebis.» '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Il lui dit, la troisième fois: «Simon, fils de Jonas, as-tu de l''amour pour moi?» Pierre fut attristé de ce qu''il lui avait dit, la troisième fois: «As-tu de l''amour pour moi?» et il lui répondit: «Seigneur, tu sais tout, tu sais que j''ai de l''amour pour toi.» Jésus lui dit: «Nourris mes brebis. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'En vérité, en vérité, je te le dis, quand tu étais plus jeune, tu mettais toi-même ta ceinture et tu allais où tu voulais; mais quand tu seras vieux, tu tendras les mains et c''est un autre qui attachera ta ceinture et te conduira où tu ne voudras pas.» '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Il dit cela pour indiquer par quelle mort Pierre révélerait la gloire de Dieu. Puis il lui dit: «Suis-moi.»'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Simon Pierre, Thomas, appelé Didyme, Nathanaël, qui venait de Cana en Galilée, les fils de Zébédée et deux autres disciples de Jésus se trouvaient ensemble. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Pierre se retourna et vit venir derrière eux le disciple que Jésus aimait, celui qui, pendant le souper, s''était penché vers Jésus et avait dit: «Seigneur, qui est celui qui va te trahir?» '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'En le voyant, Pierre dit à Jésus: «Et lui, Seigneur, que lui arrivera-t-il?» '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Jésus lui dit: «Si je veux qu''il vive jusqu''à ce que je revienne, en quoi cela te concerne-t-il? Toi, suis-moi.» '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Là-dessus, le bruit courut parmi les frères
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Les frères: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire les chrétiens.
      marker-yv: yv-n
    - type: text
      text: ' que ce disciple ne mourrait pas. Cependant, Jésus n''avait pas dit à Pierre qu''il ne mourrait pas, mais: «Si je veux qu''il vive jusqu''à ce que je revienne, en quoi cela te concerne-t-il?»'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'C''est ce disciple qui rend témoignage de ces choses et qui les a écrites, et nous savons que son témoignage est vrai. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Jésus a fait encore beaucoup d'autres choses. Si on les écrivait en détail, je ne pense pas que le monde entier pourrait contenir les livres qu'on écrirait.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Simon Pierre leur dit: «Je vais pêcher.» Ils lui dirent: «Nous allons aussi avec toi.» Ils sortirent et montèrent [aussitôt] dans une barque, mais cette nuit-là ils ne prirent rien.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Le matin venu, Jésus se trouva sur le rivage, mais les disciples ne savaient pas que c''était lui. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il leur dit: «Les enfants, n''avez-vous rien à manger?» Ils lui répondirent: «Non.» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Il leur dit: «Jetez le filet du côté droit de la barque et vous trouverez.» Ils le jetèrent donc et ils ne parvinrent plus à le retirer, tant il y avait de poissons. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Alors le disciple que Jésus aimait dit à Pierre: «C''est le Seigneur!» Dès qu''il eut entendu que c''était le Seigneur, Simon Pierre remit son vêtement et sa ceinture, car il s''était déshabillé, et se jeta dans le lac. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Les autres disciples vinrent avec la barque en tirant le filet plein de poissons, car ils n'étaient pas loin de la rive, à une centaine de mètres.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Lorsqu''ils furent descendus à terre, ils virent là un feu de braises avec du poisson dessus et du pain. '
