document_id: 1SA.4,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Mort d'Eli et de ses deux fils
  - type: text
    content: 'La parole de Samuel s''adressait à tout Israël. Les Israélites sortirent à la rencontre des Philistins pour les combattre. Ils installèrent leur camp près d''Eben-Ezer, tandis que les Philistins campaient à Aphek. '
  '10':
  - type: text
    content: 'Les Philistins livrèrent bataille et Israël fut battu. Chacun s''enfuit dans sa tente. La défaite fut très grande et 30''000 fantassins israélites furent tués. '
  '11':
  - type: text
    content: L'arche de Dieu fut prise et les deux fils d'Eli, Hophni et Phinées, moururent.
  '12':
  - type: text
    content: 'Un Benjaminite accourut du champ de bataille et vint à Silo le même jour, les vêtements déchirés et la tête couverte de terre. '
  '13':
  - type: text
    content: 'Lorsqu''il arriva, Eli était dans l''attente, assis sur un siège près du chemin, car son cœur était inquiet pour l''arche de Dieu. Cet homme entra dans la ville et donna la nouvelle, et toute la ville poussa des cris. '
  '14':
  - type: text
    content: 'Eli entendit ces cris et demanda: «Que signifie ce vacarme?» Aussitôt l''homme vint lui annoncer la nouvelle. '
  '15':
  - type: text
    content: 'Or Eli était âgé de 98 ans, il avait les yeux fixes et ne pouvait plus voir. '
  '16':
  - type: text
    content: 'L''homme dit à Eli: «J''arrive du champ de bataille et c''est du champ de bataille que je me suis enfui aujourd''hui.» Eli demanda: «Que s''est-il passé, mon fils?» '
  '17':
  - type: text
    content: 'Celui qui apportait la nouvelle répondit: «Israël a pris la fuite devant les Philistins et le peuple a subi une grande défaite. Même tes deux fils, Hophni et Phinées, sont morts et l''arche de Dieu a été prise.» '
  '18':
  - type: text
    content: Il avait à peine fait mention de l'arche de Dieu qu'Eli tomba à la renverse de son siège, à côté de la porte; il se brisa la nuque et mourut. C'était en effet un homme âgé et lourd. Il avait été juge en Israël pendant 40 ans.
  '19':
  - type: text
    content: 'Sa belle-fille, la femme de Phinées, était enceinte et sur le point d''accoucher. Lorsqu''elle entendit la nouvelle de la prise de l''arche de Dieu ainsi que de la mort de son beau-père et de son mari, elle se courba et accoucha, car les douleurs la surprirent. '
  '2':
  - type: text
    content: 'Les Philistins se rangèrent en ordre de bataille contre Israël et le combat s''engagea. Israël fut battu par les Philistins, qui tuèrent environ 4000 hommes sur le champ de bataille. '
  '20':
  - type: text
    content: 'Comme elle allait mourir, les femmes qui étaient avec elle lui dirent: «N''aie pas peur, car tu as mis au monde un fils!» Mais elle ne répondit pas et n''y fit pas attention. '
  '21':
  - type: text
    content: Elle appela l'enfant I-Kabod
  - type: note
    content: 'I-Kabod: littéralement pas de gloire.'
  - type: text
    content: ', en disant: «La gloire est bannie d''Israël!» C''était à cause de la prise de l''arche de Dieu et à cause de son beau-père et de son mari. '
  '22':
  - type: text
    content: 'Elle dit: «La gloire est bannie d''Israël, car l''arche de Dieu est prise!»'
  '3':
  - type: text
    content: 'Le peuple rentra au camp et les anciens d''Israël dirent: «Pourquoi l''Eternel a-t-il laissé aujourd''hui les Philistins nous battre? Allons chercher l''arche de l''alliance de l''Eternel à Silo. Qu''elle vienne au milieu de nous et nous délivre de la domination de nos ennemis.» '
  '4':
  - type: text
    content: Le peuple envoya des messagers à Silo et l'on apporta de là-bas l'arche de l'alliance de l'Eternel, le maître de l'univers, qui siège entre les chérubins. Les deux fils d'Eli, Hophni et Phinées, étaient là, avec l'arche de l'alliance de Dieu.
  '5':
  - type: text
    content: 'Lorsque l''arche de l''alliance de l''Eternel entra dans le camp, tout Israël poussa de grands cris de joie, et la terre en fut ébranlée. '
  '6':
  - type: text
    content: 'Les Philistins entendirent le vacarme de ces cris et dirent: «Que signifient ces grands cris qui retentissent dans le camp des Hébreux?» Lorsqu''ils apprirent que l''arche de l''Eternel était arrivée au camp, '
  '7':
  - type: text
    content: 'les Philistins eurent peur, parce qu''ils crurent que Dieu était désormais dans le camp des Hébreux. «Malheur à nous, disaient-ils, car ce n''était pas le cas jusqu''à présent. '
  '8':
  - type: text
    content: 'Malheur à nous! Qui nous délivrera du pouvoir de ces dieux puissants? Ce sont eux qui ont frappé les Egyptiens de toutes sortes de fléaux dans le désert. '
  '9':
  - type: text
    content: 'Fortifiez-vous et soyez des hommes, Philistins, sinon vous serez esclaves des Hébreux comme ils ont été les vôtres. Soyez des hommes et combattez!» '
