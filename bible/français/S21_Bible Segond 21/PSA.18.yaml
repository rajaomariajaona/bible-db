document_id: PSA.18,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Louanges après la délivrance
  - type: text
    content: 'Au chef de chœur. Du serviteur de l''Eternel, de David. Il adressa les paroles de ce chant à l''Eternel après qu''il l''eut délivré de tous ses ennemis et de Saül. Il dit:'
  '10':
  - type: text
    content: Il a incliné le ciel et il est descendu,
  - type: text
    content: une épaisse nuée sous ses pieds.
  '11':
  - type: text
    content: Il était monté sur un chérubin, et il volait,
  - type: text
    content: il planait sur les ailes du vent.
  '12':
  - type: text
    content: 'Il faisait des ténèbres sa retraite, sa tente autour de lui:'
  - type: text
    content: c'étaient des eaux obscures, de sombres nuages.
  '13':
  - type: text
    content: Une lumière éclatante le précédait, d'où provenaient ses nuées,
  - type: text
    content: de la grêle et des charbons de feu.
  '14':
  - type: text
    content: L'Eternel a tonné dans le ciel,
  - type: text
    content: le Très-Haut a fait retentir sa voix,
  - type: text
    content: avec la grêle et les charbons de feu.
  '15':
  - type: text
    content: Il a lancé ses flèches et dispersé mes ennemis,
  - type: text
    content: il a multiplié les éclairs et les a mis en déroute.
  '16':
  - type: text
    content: Le fond des océans est apparu,
  - type: text
    content: les fondements du monde ont été découverts
  - type: text
    content: à ta menace, Eternel,
  - type: text
    content: au souffle de tes narines.
  '17':
  - type: text
    content: Il est intervenu d'en haut, il m'a pris,
  - type: text
    content: il m'a retiré des grandes eaux,
  '18':
  - type: text
    content: il m'a délivré de mon adversaire puissant,
  - type: text
    content: de mes ennemis qui étaient plus forts que moi.
  '19':
  - type: text
    content: Ils m'avaient surpris lorsque j'étais dans la détresse,
  - type: text
    content: mais l'Eternel a été mon appui.
  '2':
  - type: text
    content: Je t'aime, Eternel, ma force,
  '20':
  - type: text
    content: Il m'a mis au large,
  - type: text
    content: il m'a sauvé, parce qu'il m'aime.
  '21':
  - type: text
    content: L'Eternel m'a récompensé de ma justice,
  - type: text
    content: il m'a traité conformément à la pureté de mes mains,
  '22':
  - type: text
    content: car j'ai suivi les voies de l'Eternel,
  - type: text
    content: je n'ai pas été coupable envers mon Dieu.
  '23':
  - type: text
    content: Toutes ses règles ont été devant moi
  - type: text
    content: et je ne me suis pas écarté de ses prescriptions.
  '24':
  - type: text
    content: J'ai été intègre envers lui
  - type: text
    content: et je me suis tenu en garde contre mon péché.
  '25':
  - type: text
    content: Alors l'Eternel m'a traité conformément à ma justice,
  - type: text
    content: à la pureté qu'il a vue sur mes mains.
  '26':
  - type: text
    content: Avec celui qui est fidèle tu te montres fidèle,
  - type: text
    content: avec l'homme intègre tu agis avec intégrité,
  '27':
  - type: text
    content: avec celui qui est pur tu te montres pur,
  - type: text
    content: et avec l'homme faux tu te montres habile.
  '28':
  - type: text
    content: Tu sauves le peuple qui s'humilie,
  - type: text
    content: et tu abaisses les regards hautains.
  '29':
  - type: text
    content: Oui, tu fais briller ma lumière.
  - type: text
    content: L'Eternel, mon Dieu, éclaire mes ténèbres.
  '3':
  - type: text
    content: Eternel, mon rocher, ma forteresse, mon libérateur,
  - type: text
    content: mon Dieu, mon rocher où je trouve un abri,
  - type: text
    content: mon bouclier, la force qui me sauve, mon rempart!
  '30':
  - type: text
    content: Avec toi je me précipite sur une troupe tout armée,
  - type: text
    content: avec mon Dieu je franchis une muraille.
  '31':
  - type: text
    content: Les voies de Dieu sont parfaites,
  - type: text
    content: la parole de l'Eternel est pure;
  - type: text
    content: il est un bouclier pour tous ceux qui se confient en lui.
  '32':
  - type: text
    content: Qui est Dieu en dehors de l'Eternel,
  - type: text
    content: et qui est un rocher, sinon notre Dieu?
  '33':
  - type: text
    content: C'est Dieu qui me donne de la force
  - type: text
    content: et qui me trace une voie droite.
  '34':
  - type: text
    content: Il rend mes pieds aussi agiles que ceux des biches,
  - type: text
    content: et il me fait tenir debout sur les hauteurs.
  '35':
  - type: text
    content: Il exerce mes mains au combat,
  - type: text
    content: et mes bras tendent l'arc de bronze.
  '36':
  - type: text
    content: Tu me donnes le bouclier de ton salut,
  - type: text
    content: ta main droite me soutient,
  - type: text
    content: et je deviens grand par ta bonté.
  '37':
  - type: text
    content: Tu élargis le chemin sous mes pas,
  - type: text
    content: et mes pieds ne trébuchent pas.
  '38':
  - type: text
    content: Je poursuis mes ennemis, je les atteins,
  - type: text
    content: et je ne reviens pas avant de les avoir exterminés.
  '39':
  - type: text
    content: Je les frappe, et ils ne peuvent plus se relever,
  - type: text
    content: ils tombent sous mes pieds.
  '4':
  - type: text
    content: Loué soit l'Eternel! Je crie à lui
  - type: text
    content: et je suis délivré de mes ennemis.
  '40':
  - type: text
    content: Tu me donnes de la force pour le combat,
  - type: text
    content: tu fais plier sous moi mes adversaires.
  '41':
  - type: text
    content: Tu mets mes ennemis en fuite devant moi,
  - type: text
    content: et je réduis au silence ceux qui me détestent.
  '42':
  - type: text
    content: Ils crient, et personne pour les sauver!
  - type: text
    content: Ils crient à l'Eternel, et il ne leur répond pas!
  '43':
  - type: text
    content: Je les réduis en miettes, je les rends pareils à la poussière que le vent emporte,
  - type: text
    content: je les balaie comme la boue des rues.
  '44':
  - type: text
    content: Tu me délivres des révoltes du peuple,
  - type: text
    content: tu me mets à la tête des nations;
  - type: text
    content: un peuple que je ne connaissais pas m'est soumis.
  '45':
  - type: text
    content: Ils m'obéissent au premier ordre;
  - type: text
    content: les étrangers me flattent,
  '46':
  - type: text
    content: les étrangers perdent courage,
  - type: text
    content: ils sortent en tremblant de leurs forteresses.
  '47':
  - type: text
    content: L'Eternel est vivant! Béni soit mon rocher!
  - type: text
    content: Que l'on dise la grandeur du Dieu de mon salut!
  '48':
  - type: text
    content: C'est le Dieu qui m'accorde la vengeance,
  - type: text
    content: qui me soumet les peuples,
  '49':
  - type: text
    content: qui me délivre de mes ennemis!
  - type: text
    content: Tu m'élèves au-dessus de mes adversaires,
  - type: text
    content: tu me sauves de l'homme violent.
  '5':
  - type: text
    content: Les liens de la mort m'avaient enserré,
  - type: text
    content: et les torrents dévastateurs m'avaient épouvanté;
  '50':
  - type: text
    content: '*C''est pourquoi je te louerai parmi les nations, Eternel,'
  - type: text
    content: et je chanterai à la gloire de ton nom.
  - type: note
    content: 'C''est pourquoi… ton nom: cité en Romains 15.9 comme annonçant la louange des non-Juifs.'
  '51':
  - type: text
    content: Il accorde de grandes délivrances à son roi,
  - type: text
    content: il agit avec bonté envers celui qu'il a désigné par onction,
  - type: text
    content: envers David et sa descendance, pour toujours.
  '6':
  - type: text
    content: les liens du séjour des morts m'avaient entouré,
  - type: text
    content: les pièges de la mort m'avaient surpris.
  '7':
  - type: text
    content: Dans ma détresse, j'ai fait appel à l'Eternel,
  - type: text
    content: j'ai crié à mon Dieu;
  - type: text
    content: de son palais, il a entendu ma voix,
  - type: text
    content: mon cri est parvenu à ses oreilles.
  '8':
  - type: text
    content: La terre a été ébranlée, elle a tremblé;
  - type: text
    content: les fondements des montagnes ont vacillé,
  - type: text
    content: ils ont été ébranlés, parce qu'il était irrité.
  '9':
  - type: text
    content: Une fumée s'élevait de ses narines,
  - type: text
    content: et un feu dévorant sortait de sa bouche,
  - type: text
    content: avec des charbons embrasés.
