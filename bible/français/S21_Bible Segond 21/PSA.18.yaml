document_id: PSA.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Louanges après la délivrance
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Au chef de chœur. Du serviteur de l''Eternel, de David. Il adressa les paroles de ce chant à l''Eternel après qu''il l''eut délivré de tous ses ennemis et de Saül. Il dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je t'aime, Eternel, ma force,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Eternel, mon rocher, ma forteresse, mon libérateur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon Dieu, mon rocher où je trouve un abri,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon bouclier, la force qui me sauve, mon rempart!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Loué soit l'Eternel! Je crie à lui
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je suis délivré de mes ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les liens de la mort m'avaient enserré,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les torrents dévastateurs m'avaient épouvanté;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: les liens du séjour des morts m'avaient entouré,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les pièges de la mort m'avaient surpris.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Dans ma détresse, j'ai fait appel à l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ai crié à mon Dieu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: de son palais, il a entendu ma voix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon cri est parvenu à ses oreilles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: La terre a été ébranlée, elle a tremblé;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les fondements des montagnes ont vacillé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ont été ébranlés, parce qu'il était irrité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Une fumée s'élevait de ses narines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et un feu dévorant sortait de sa bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec des charbons embrasés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il a incliné le ciel et il est descendu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une épaisse nuée sous ses pieds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il était monté sur un chérubin, et il volait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il planait sur les ailes du vent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il faisait des ténèbres sa retraite, sa tente autour de lui:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'étaient des eaux obscures, de sombres nuages.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Une lumière éclatante le précédait, d'où provenaient ses nuées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de la grêle et des charbons de feu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: L'Eternel a tonné dans le ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Très-Haut a fait retentir sa voix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec la grêle et les charbons de feu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il a lancé ses flèches et dispersé mes ennemis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a multiplié les éclairs et les a mis en déroute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Le fond des océans est apparu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les fondements du monde ont été découverts
- type: usfm
  marker: q1
  children:
  - type: text
    text: à ta menace, Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au souffle de tes narines.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il est intervenu d'en haut, il m'a pris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il m'a retiré des grandes eaux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: il m'a délivré de mon adversaire puissant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de mes ennemis qui étaient plus forts que moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ils m'avaient surpris lorsque j'étais dans la détresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais l'Eternel a été mon appui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il m'a mis au large,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il m'a sauvé, parce qu'il m'aime.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: L'Eternel m'a récompensé de ma justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il m'a traité conformément à la pureté de mes mains,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: car j'ai suivi les voies de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je n'ai pas été coupable envers mon Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Toutes ses règles ont été devant moi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je ne me suis pas écarté de ses prescriptions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: J'ai été intègre envers lui
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je me suis tenu en garde contre mon péché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Alors l'Eternel m'a traité conformément à ma justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la pureté qu'il a vue sur mes mains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Avec celui qui est fidèle tu te montres fidèle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec l'homme intègre tu agis avec intégrité,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: avec celui qui est pur tu te montres pur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et avec l'homme faux tu te montres habile.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Tu sauves le peuple qui s'humilie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu abaisses les regards hautains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Oui, tu fais briller ma lumière.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Eternel, mon Dieu, éclaire mes ténèbres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Avec toi je me précipite sur une troupe tout armée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec mon Dieu je franchis une muraille.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Les voies de Dieu sont parfaites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la parole de l'Eternel est pure;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est un bouclier pour tous ceux qui se confient en lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Qui est Dieu en dehors de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui est un rocher, sinon notre Dieu?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: C'est Dieu qui me donne de la force
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui me trace une voie droite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Il rend mes pieds aussi agiles que ceux des biches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il me fait tenir debout sur les hauteurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Il exerce mes mains au combat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mes bras tendent l'arc de bronze.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Tu me donnes le bouclier de ton salut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta main droite me soutient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je deviens grand par ta bonté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Tu élargis le chemin sous mes pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mes pieds ne trébuchent pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Je poursuis mes ennemis, je les atteins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je ne reviens pas avant de les avoir exterminés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Je les frappe, et ils ne peuvent plus se relever,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils tombent sous mes pieds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Tu me donnes de la force pour le combat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu fais plier sous moi mes adversaires.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Tu mets mes ennemis en fuite devant moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je réduis au silence ceux qui me détestent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Ils crient, et personne pour les sauver!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils crient à l'Eternel, et il ne leur répond pas!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Je les réduis en miettes, je les rends pareils à la poussière que le vent emporte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je les balaie comme la boue des rues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Tu me délivres des révoltes du peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu me mets à la tête des nations;
- type: usfm
  marker: q1
  children:
  - type: text
    text: un peuple que je ne connaissais pas m'est soumis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Ils m'obéissent au premier ordre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les étrangers me flattent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: les étrangers perdent courage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sortent en tremblant de leurs forteresses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: L'Eternel est vivant! Béni soit mon rocher!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que l'on dise la grandeur du Dieu de mon salut!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: C'est le Dieu qui m'accorde la vengeance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui me soumet les peuples,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: qui me délivre de mes ennemis!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu m'élèves au-dessus de mes adversaires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu me sauves de l'homme violent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: '*C''est pourquoi je te louerai parmi les nations, Eternel,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je chanterai à la gloire de ton nom.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.50 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'C''est pourquoi… ton nom: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 15.9
      metadata:
        usfm: ROM.15.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' comme annonçant la louange des non-Juifs.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Il accorde de grandes délivrances à son roi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il agit avec bonté envers celui qu'il a désigné par onction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: envers David et sa descendance, pour toujours.
