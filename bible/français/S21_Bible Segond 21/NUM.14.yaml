document_id: NUM.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Cause du séjour de 40 ans dans le désert
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Toute l''assemblée se souleva et poussa des cris, et le peuple pleura pendant la nuit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tous les Israélites murmurèrent contre Moïse et Aaron, et toute l''assemblée leur dit: «Si seulement nous étions morts en Egypte ou dans ce désert! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Pourquoi l''Eternel nous fait-il aller dans ce pays où nous tomberons par l''épée, où nos femmes et nos petits enfants deviendront une proie? Ne vaut-il pas mieux pour nous retourner en Egypte?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Et ils se dirent l''un à l''autre: «Nommons un chef et retournons en Egypte.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Moïse et Aaron tombèrent le visage contre terre devant toute l''assemblée réunie des Israélites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Membres de l''équipe qui avait exploré le pays, Josué, fils de Nun, et Caleb, fils de Jephunné, déchirèrent leurs vêtements '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et dirent à toute l''assemblée des Israélites: «Le pays que nous avons parcouru pour l''explorer est un pays très bon, excellent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Si l''Eternel nous est favorable, il nous y conduira et nous le donnera. C''est un pays où coulent le lait et le miel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Seulement, ne vous révoltez pas contre l'Eternel et n'ayez pas peur des habitants de ce pays, car nous ne ferons d'eux qu'une bouchée. Ils n'ont plus de protection et l'Eternel est avec nous. N'ayez pas peur d'eux!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Toute l''assemblée parlait de les lapider lorsque la gloire de l''Eternel apparut sur la tente de la rencontre, devant tous les Israélites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L''Eternel dit à Moïse: «Jusqu''à quand ce peuple me méprisera-t-il? Jusqu''à quand ne croira-t-il pas en moi, malgré tous les signes que j''ai accomplis au milieu de lui? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je le frapperai par la peste et je le détruirai, mais je ferai de toi une nation plus grande et plus puissante que lui.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Moïse dit à l''Eternel: «Les Egyptiens ont appris que tu as fait sortir ce peuple de chez eux par ta puissance, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'et ils l''ont dit aux habitants de ce pays. Ils ont appris que toi, l''Eternel, tu es au milieu de ce peuple, que tu apparais visiblement, toi, l''Eternel, que ta nuée se tient sur lui, que tu marches devant lui le jour dans une colonne de nuée, et la nuit dans une colonne de feu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Si tu fais mourir ce peuple d''un seul coup, les nations qui ont entendu parler de toi diront: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '‘L''Eternel n''avait pas le pouvoir de conduire ce peuple dans le pays qu''il avait juré de lui donner; c''est pour cela qu''il l''a exterminé dans le désert.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Maintenant, que la puissance du Seigneur se montre dans sa grandeur, conformément à ce que tu as déclaré: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '‘L''Eternel est lent à la colère et riche en bonté, il pardonne la faute et la révolte, mais il ne traite pas le coupable en innocent et il punit la faute des pères sur les enfants jusqu''à la troisième et la quatrième génération.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Pardonne la faute de ce peuple, conformément à la grandeur de ta bonté, tout comme tu lui as pardonné depuis l'Egypte jusqu'ici.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'L''Eternel dit: «Je pardonne comme tu l''as demandé, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'mais je suis vivant et la gloire de l''Eternel remplira toute la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ces hommes ont vu ma gloire et les signes que j''ai accomplis en Egypte et dans le désert, ils m''ont provoqué déjà 10 fois et ne m''ont pas écouté: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'aucun d''eux ne verra le pays que j''ai juré à leurs ancêtres de leur donner. Aucun de ceux qui m''ont méprisé ne le verra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Quant à mon serviteur Caleb, parce qu''il a été animé d''un autre esprit et qu''il a pleinement suivi ma voie, je le ferai entrer dans le pays où il est allé et sa descendance le possédera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Les Amalécites et les Cananéens habitent la vallée. Demain, tournez-vous et partez pour le désert, dans la direction de la mer des Roseaux.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'L''Eternel dit à Moïse et à Aaron: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '«Jusqu''à quand laisserai-je cette méchante assemblée murmurer contre moi? J''ai entendu les plaintes des Israélites qui murmuraient contre moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Annonce-leur: ‘Aussi vrai que je suis vivant, déclare l''Eternel, je vous ferai exactement ce que je vous ai entendus dire: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'vos cadavres tomberont dans ce désert. Vous tous, dont on a fait le dénombrement en vous comptant depuis l''âge de 20 ans et au-dessus et qui avez murmuré contre moi, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'vous n''entrerez pas dans le pays que j''avais juré de vous faire habiter. Aucun de vous n''y entrera, excepté Caleb, fils de Jephunné, et Josué, fils de Nun. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Quant à vos petits enfants, eux dont vous avez dit qu''ils deviendraient une proie, je les y ferai entrer et ils connaîtront le pays que vous avez dédaigné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Vos cadavres, à vous, tomberont dans le désert, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'et vos enfants seront nomades pendant 40 ans dans le désert. Ils supporteront les conséquences de vos infidélités jusqu''à ce que tous vos cadavres soient tombés dans le désert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Vous avez mis 40 jours à explorer le pays, vous supporterez donc les conséquences de vos fautes pendant 40 ans, une année pour chaque jour. Ainsi vous saurez ce que c''est que d''être privé de ma présence.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Moi, l''Eternel, j''ai parlé et c''est ainsi que je traiterai cette méchante assemblée qui s''est réunie contre moi: ils seront détruits dans ce désert, ils y mourront.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Les hommes que Moïse avait envoyés pour explorer le pays et qui, à leur retour, avaient fait murmurer toute l''assemblée contre lui en dénigrant le pays, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'ces hommes qui avaient dénigré le pays moururent frappés d''un fléau devant l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Josué, fils de Nun, et Caleb, fils de Jephunné, furent les seuls à rester en vie parmi les hommes partis explorer le pays.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Moïse rapporta ces paroles à tous les Israélites et le peuple mena grand deuil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ils se levèrent de bon matin et montèrent au sommet de la montagne en disant: «Nous voici! Nous monterons à l''endroit dont l''Eternel a parlé. En effet, nous avons péché.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Moïse dit: «Pourquoi enfreignez-vous l''ordre de l''Eternel? Cela ne réussira pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ne montez pas, car l''Eternel n''est pas au milieu de vous. Ne vous faites pas battre par vos ennemis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'En effet, les Amalécites et les Cananéens sont là devant vous et vous tomberez par l''épée. Puisque vous vous êtes détournés de lui, l''Eternel ne sera pas avec vous.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ils s''obstinèrent à monter au sommet de la montagne, tandis que l''arche de l''alliance et Moïse ne quittaient pas le camp. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Alors les Amalécites et les Cananéens qui habitaient cette montagne descendirent; ils les battirent et les taillèrent en pièces jusqu'à Horma.
