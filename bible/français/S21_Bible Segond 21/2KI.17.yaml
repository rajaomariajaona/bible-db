document_id: 2KI.17,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Règne d'Osée sur Israël
  - type: text
    content: La douzième année du règne d'Achaz sur Juda, Osée, le fils d'Ela, devint roi d'Israël à Samarie. Il régna 9 ans.
  '10':
  - type: text
    content: 'Ils se sont dressé des statues et des poteaux sacrés sur toute colline élevée et sous tout arbre vert. '
  '11':
  - type: text
    content: 'Là, sur tous les hauts lieux, ils ont brûlé des parfums, comme les nations que l''Eternel avait exilées devant eux, et ils ont eu des activités mauvaises, par lesquelles ils ont irrité l''Eternel. '
  '12':
  - type: text
    content: 'Ils ont servi les idoles alors que l''Eternel leur avait dit: «Vous ne ferez pas cela.»'
  '13':
  - type: text
    content: 'L''Eternel avait averti Israël et Juda par l''intermédiaire de tous ses prophètes, de tous les voyants. Il leur avait dit: «Renoncez à votre mauvaise conduite et respectez mes commandements et mes prescriptions, en suivant entièrement la loi que j''ai donnée à vos ancêtres et que je vous ai envoyée par l''intermédiaire de mes serviteurs les prophètes.» '
  '14':
  - type: text
    content: 'Mais ils n''ont pas écouté, ils se sont montrés réfractaires comme leurs ancêtres, qui n''avaient pas cru en l''Eternel, leur Dieu. '
  '15':
  - type: text
    content: 'Ils ont rejeté ses prescriptions, l''alliance qu''il avait conclue avec leurs ancêtres et les avertissements qu''il leur avait adressés. Ils ont suivi des idoles sans consistance au point de perdre eux-mêmes toute consistance, ils ont suivi les nations qui les entouraient et que l''Eternel leur avait défendu d''imiter. '
  '16':
  - type: text
    content: 'Ils ont abandonné tous les commandements de l''Eternel, leur Dieu. Ils se sont fait deux veaux en métal fondu, ils ont fabriqué des poteaux d''Astarté, ils se sont prosternés devant tous les corps célestes et ils ont servi Baal. '
  '17':
  - type: text
    content: 'Ils ont fait passer leurs fils et leurs filles par le feu, ils ont pratiqué la divination et la magie, ils se sont eux-mêmes vendus pour faire ce qui est mal aux yeux de l''Eternel, au point d''exciter sa colère. '
  '18':
  - type: text
    content: 'Aussi, l''Eternel s''est fortement irrité contre les Israélites et il les a éloignés de lui. Il n''est resté que la seule tribu de Juda. '
  '19':
  - type: text
    content: 'Les Judéens eux-mêmes n''ont pas gardé les commandements de l''Eternel, leur Dieu, et ils ont suivi les coutumes établies par Israël. '
  '2':
  - type: text
    content: 'Il fit ce qui est mal aux yeux de l''Eternel, mais pas autant que les rois d''Israël qui l''avaient précédé. '
  '20':
  - type: text
    content: 'L''Eternel a rejeté le peuple d''Israël dans son entier. Il les a humiliés, il les a livrés entre les mains des pillards et il a fini par les chasser loin de lui. '
  '21':
  - type: text
    content: 'En effet, les Israélites s''étaient détachés de la famille de David et avaient proclamé roi Jéroboam, fils de Nebath, qui les avait détournés de l''Eternel et avait fait commettre à Israël un grand péché. '
  '22':
  - type: text
    content: 'Les Israélites s''étaient livrés à tous les péchés que Jéroboam avait commis, ils ne s''en étaient pas détournés, '
  '23':
  - type: text
    content: jusqu'à ce que l'Eternel chasse Israël loin de lui, comme il l'avait annoncé par l'intermédiaire de tous ses serviteurs les prophètes. C'est ainsi qu'Israël a été exilé loin de son pays, en Assyrie, où il est resté jusqu'à aujourd'hui.
  - type: heading
    content: Repeuplement de la Samarie
  '24':
  - type: text
    content: 'Le roi d''Assyrie fit venir des gens de Babylone, de Cutha, d''Avva, de Hamath et de Sepharvaïm, et il les installa dans les villes de la Samarie à la place des Israélites. Ils prirent donc possession de la Samarie et habitèrent dans ses villes. '
  '25':
  - type: text
    content: 'Au début de leur installation, ils ne craignaient pas l''Eternel, et l''Eternel envoya contre eux des lions qui tuèrent plusieurs d''entre eux. '
  '26':
  - type: text
    content: 'On dit au roi d''Assyrie: «Les nations que tu as exilées et installées dans les villes de la Samarie ne connaissent pas la manière d''adorer le dieu du pays, et il a envoyé contre elles des lions qui les font mourir parce qu''elles ne connaissent pas la manière d''adorer le dieu du pays.» '
  '27':
  - type: text
    content: 'Le roi d''Assyrie donna cet ordre: «Envoyez-y l''un des prêtres que vous avez exilés de là-bas. Qu''il aille s''y installer et qu''il leur enseigne la manière d''adorer le dieu du pays.»'
  '28':
  - type: text
    content: 'Un des prêtres qui avaient été exilés de Samarie vint s''installer à Béthel et leur enseigna comment ils devaient craindre l''Eternel. '
  '29':
  - type: text
    content: 'Cependant, ces nations fabriquèrent chacune leurs dieux dans les villes qu''elles habitaient, et elles les placèrent dans les centres de hauts lieux construits par les Samaritains. '
  '3':
  - type: text
    content: 'Salmanasar, le roi d''Assyrie, monta contre Osée, qui lui fut asservi et lui paya un tribut. '
  '30':
  - type: text
    content: 'Les gens de Babylone firent Succoth-Benoth, ceux de Cuth firent Nergal, ceux de Hamath firent Ashima, '
  '31':
  - type: text
    content: 'ceux d''Avva firent Nibchaz et Tharthak. Ceux de Sepharvaïm brûlaient leurs enfants par le feu en l''honneur d''Adrammélec et d''Anammélec, les dieux de Sepharvaïm. '
  '32':
  - type: text
    content: 'Ils craignaient aussi l''Eternel et ils se firent des prêtres de hauts lieux, pris parmi eux, qui offraient pour eux des sacrifices dans les centres de hauts lieux. '
  '33':
  - type: text
    content: Ainsi, ils craignaient l'Eternel tout en servant leurs dieux d'après la coutume des nations d'où on les avait exilés.
  '34':
  - type: text
    content: 'Aujourd''hui encore, ils suivent leurs premières coutumes: ils ne craignent pas l''Eternel et ils ne se conforment ni à leurs propres prescriptions et règles, ni à la loi et aux commandements donnés par l''Eternel aux descendants de Jacob, celui qu''il a appelé Israël. '
  '35':
  - type: text
    content: 'L''Eternel avait fait alliance avec eux, il leur avait donné cet ordre: «Vous ne craindrez pas d''autres dieux, vous ne les adorerez pas, vous ne les servirez pas et vous ne leur offrirez pas de sacrifices. '
  '36':
  - type: text
    content: 'Mais l''Eternel qui vous a fait sortir d''Egypte avec une grande puissance et avec force, c''est lui que vous craindrez, c''est lui que vous adorerez, c''est à lui que vous offrirez des sacrifices. '
  '37':
  - type: text
    content: 'Vous respecterez et mettrez toujours en pratique les prescriptions, les règles, la loi et les commandements qu''il a écrits pour vous, et vous ne craindrez pas d''autres dieux. '
  '38':
  - type: text
    content: 'Vous n''oublierez pas l''alliance que j''ai faite avec vous et vous ne craindrez pas d''autres dieux. '
  '39':
  - type: text
    content: 'Mais c''est l''Eternel, votre Dieu, que vous craindrez, et lui, il vous délivrera de tous vos ennemis.» '
  '4':
  - type: text
    content: 'Cependant, le roi d''Assyrie découvrit qu''Osée avait conspiré contre lui en envoyant des messagers à So, le roi d''Egypte, et qu''il ne lui payait plus le tribut annuel. Il le fit alors enfermer et enchaîner dans une prison. '
  '40':
  - type: text
    content: 'Ils n''ont pas écouté, ils ont suivi leurs premières coutumes. '
  '41':
  - type: text
    content: Ces nations craignaient l'Eternel tout en servant leurs idoles, et leurs enfants et petits-enfants agissent jusqu'à aujourd'hui exactement comme leurs ancêtres.
  '5':
  - type: text
    content: 'En outre, le roi d''Assyrie envahit tout le pays et attaqua Samarie. Il en fit le siège pendant 3 ans. '
  '6':
  - type: text
    content: La neuvième année du règne d'Osée, le roi d'Assyrie prit Samarie et exila les Israélites en Assyrie. Il les fit habiter à Chalach ainsi que sur les rives du Chabor, le fleuve de Gozan, et dans les villes des Mèdes.
  - type: heading
    content: Les raisons de l'exil d'Israël
  '7':
  - type: text
    content: 'Tout cela est arrivé parce que les Israélites ont péché contre l''Eternel, leur Dieu, celui qui les avait fait sortir d''Egypte en les délivrant de l''oppression du pharaon, du roi d''Egypte, et parce qu''ils ont craint d''autres dieux. '
  '8':
  - type: text
    content: 'Ils ont suivi les coutumes des nations que l''Eternel avait dépossédées devant eux et celles que les rois d''Israël avaient établies. '
  '9':
  - type: text
    content: 'Les Israélites ont commis en secret des actes inadmissibles contre l''Eternel, leur Dieu. Ils se sont construit des hauts lieux dans toutes leurs villes, qu''il s''agisse de simples tours de garde ou de villes fortifiées. '
