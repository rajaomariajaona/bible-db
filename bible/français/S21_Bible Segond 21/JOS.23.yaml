document_id: JOS.23,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Encouragements de Josué aux chefs d'Israël
  - type: text
    content: 'L''Eternel avait depuis longtemps donné du repos à Israël en le délivrant de tous les ennemis qui l''entouraient. Josué était vieux, il était d''un âge avancé. '
  '10':
  - type: text
    content: 'Un seul parmi vous en poursuivait 1000 parce que l''Eternel, votre Dieu, combattait pour vous, comme il vous l''a dit. '
  '11':
  - type: text
    content: 'Veillez donc attentivement sur vous-mêmes afin d''aimer l''Eternel, votre Dieu. '
  '12':
  - type: text
    content: 'Si vous vous détournez de l''Eternel et que vous vous attachez aux nations qui restent encore parmi vous, si vous vous unissez à elles par des mariages et que vous vous mélangez les uns aux autres, '
  '13':
  - type: text
    content: soyez certains que l'Eternel, votre Dieu, ne continuera pas à chasser ces nations devant vous. Elles seront au contraire un filet et un piège pour vous, un fouet contre vos flancs et des épines dans vos yeux, jusqu'à ce que vous ayez disparu de ce bon terrain que l'Eternel, votre Dieu, vous a donné.
  '14':
  - type: text
    content: '»Je m''en vais maintenant par le chemin commun à toute la terre. Reconnaissez de tout votre cœur et de toute votre âme qu''aucune des bonnes paroles dites à votre sujet par l''Eternel, votre Dieu, n''est restée sans effet. Toutes se sont réalisées pour vous, aucune n''est restée sans effet. '
  '15':
  - type: text
    content: 'Et de même que toutes les bonnes paroles que l''Eternel, votre Dieu, vous avait dites se sont accomplies pour vous, de même il accomplira toutes les paroles mauvaises contre vous, jusqu''à ce qu''il vous ait détruits et fait disparaître de ce bon terrain qu''il vous a donné. '
  '16':
  - type: text
    content: Si vous violez l'alliance que l'Eternel, votre Dieu, vous a prescrite et si vous allez servir d'autres dieux et vous prosterner devant eux, la colère de l'Eternel s'enflammera contre vous et vous ne tarderez pas à disparaître du bon pays qu'il vous a donné.»
  '2':
  - type: text
    content: 'Alors Josué convoqua tout Israël, ses anciens, ses chefs, ses juges et ses officiers. Il leur dit: «Je suis vieux, je suis d''un âge avancé. '
  '3':
  - type: text
    content: 'Vous avez vu tout ce que l''Eternel, votre Dieu, a fait à toutes ces nations devant vous. En effet, c''est l''Eternel, votre Dieu, qui a combattu pour vous. '
  '4':
  - type: text
    content: 'Voyez, par tirage au sort je vous ai donné en héritage pour vos tribus les nations qui restent et toutes celles que j''ai exterminées, à partir du Jourdain et jusqu''à la mer Méditerranée vers le soleil couchant. '
  '5':
  - type: text
    content: C'est l'Eternel, votre Dieu, qui les détruira et les chassera devant vous. Vous posséderez leur pays, comme l'Eternel, votre Dieu, vous l'a dit.
  '6':
  - type: text
    content: '»Appliquez-vous avec force à respecter et à mettre en pratique tout ce qui est écrit dans le livre de la loi de Moïse, sans vous en écarter ni à droite ni à gauche. '
  '7':
  - type: text
    content: 'Ne vous mélangez pas avec les nations qui sont restées parmi vous. Ne prononcez pas le nom de leurs dieux et ne l''employez pas pour prêter serment. Ne les servez pas et ne vous prosternez pas devant eux. '
  '8':
  - type: text
    content: 'Attachez-vous au contraire à l''Eternel, votre Dieu, comme vous l''avez fait jusqu''à aujourd''hui. '
  '9':
  - type: text
    content: 'L''Eternel a chassé devant vous des nations grandes et puissantes et personne, jusqu''à aujourd''hui, n''a pu vous résister. '
