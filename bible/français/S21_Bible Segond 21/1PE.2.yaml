document_id: 1PE.2
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Débarrassez-vous donc de toute méchanceté et toute ruse, de l''hypocrisie, l''envie et toute médisance, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'et comme des enfants nouveau-nés désirez le lait pur de la parole. Ainsi, grâce à lui vous grandirez [pour le salut], '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'si du moins vous avez '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: goûté que le Seigneur est bon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Goûté… bon: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 34.9
      metadata:
        usfm: PSA.34.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Christ, la pierre angulaire
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Approchez-vous de Christ, la pierre vivante rejetée par les hommes mais choisie et précieuse devant Dieu, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'et vous-mêmes, en tant que pierres vivantes, laissez-vous édifier pour former une maison spirituelle, un groupe de prêtres saints, afin d''offrir des sacrifices spirituels que Dieu peut accepter par Jésus-Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'En effet, il est dit dans l''Ecriture: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Je mets dans Sion une pierre angulaire, choisie, précieuse. Celui qui croit en elle n'en aura jamais honte.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je mets… honte: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 28.16
      metadata:
        usfm: ISA.28.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Elle est donc précieuse pour vous qui croyez. Quant à ceux qui désobéissent, '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: la pierre rejetée par ceux qui construisaient est devenue la pierre angulaire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La pierre rejetée… angulaire: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 118.22
      metadata:
        usfm: PSA.118.22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Elle est aussi '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: une pierre qui fait obstacle et un rocher propre à faire trébucher
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Une pierre… trébucher: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 8.14
      metadata:
        usfm: ISA.8.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. Ils s''y heurtent parce qu''ils désobéissent à la parole, et c''est à cela qu''ils ont été destinés. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Vous, au contraire, vous êtes
  - type: usfm
    marker: qt
    children:
    - type: text
      text: un peuple choisi, des prêtres royaux, une nation sainte, un peuple racheté afin de proclamer les louanges
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Un peuple… louanges: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 19.5-6
      metadata:
        usfm: EXO.19.5+EXO.19.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' et '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 43.20-21
      metadata:
        usfm: ISA.43.20+ISA.43.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' de celui qui vous a appelés des ténèbres à sa merveilleuse lumière. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Vous qui autrefois n''étiez '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: pas un peuple
  - type: text
    text: ', '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: vous êtes
  - type: text
    text: 'maintenant '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: le peuple de Dieu
  - type: text
    text: '; vous qui n''aviez '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: pas obtenu compassion
  - type: text
    text: ', '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: vous avez
  - type: text
    text: ' maintenant '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: obtenu compassion
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Pas un peuple… compassion: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: extraits d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Osée 2.1
      metadata:
        usfm: HOS.2.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '25'
      metadata:
        usfm: HOS.2.25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les relations dans le monde
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Bien-aimés, je vous encourage, en tant que résidents temporaires et étrangers sur la terre, à vous abstenir des désirs de votre nature propre qui font la guerre à l''âme. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ayez une bonne conduite au milieu des non-croyants, afin que, là même où ils vous calomnient comme si vous faisiez le mal, ils remarquent votre belle manière d'agir et rendent gloire à Dieu le jour où il interviendra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'A cause du Seigneur, soumettez-vous à toutes les institutions établies parmi les hommes: soit au roi parce qu''il est au-dessus de tous, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'soit aux gouverneurs parce qu''ils sont envoyés par lui pour punir ceux qui font le mal et approuver ceux qui font le bien. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'En effet, c''est la volonté de Dieu qu''en pratiquant le bien vous réduisiez au silence l''ignorance des hommes dépourvus de bon sens. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Comportez-vous en hommes libres, sans faire de la liberté un voile qui couvre la méchanceté mais en agissant au contraire comme des serviteurs de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Respectez chacun, aimez les frères et sœurs, craignez Dieu, honorez le roi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Serviteurs, soumettez-vous avec le plus grand respect à vos maîtres, non seulement à ceux qui font preuve de bonté et de douceur, mais aussi à ceux qui ont l''esprit pervers, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'car c''est une grâce de supporter des difficultés en souffrant injustement pour garder bonne conscience envers Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'En effet, quelle gloire y a-t-il à endurer de mauvais traitements si vous commettez des fautes? Mais si vous endurez la souffrance alors que vous faites ce qui est bien, c''est une grâce aux yeux de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'De fait, c''est à cela que vous avez été appelés, parce que Christ aussi a souffert pour nous, vous laissant un exemple afin que vous suiviez ses traces, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: lui qui n'a pas commis de péché et dans la bouche duquel on n'a pas trouvé de tromperie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Lui qui… tromperie: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 53.9
      metadata:
        usfm: ISA.53.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'lui qui insulté ne rendait pas l''insulte, maltraité ne faisait pas de menaces mais s''en remettait à celui qui juge justement, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'lui qui a lui-même porté nos péchés dans son corps à la croix afin que, libérés du péché, nous vivions pour la justice. '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: C'est par ses blessures que vous avez été guéris.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'C''est par… guéris: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 53.5
      metadata:
        usfm: ISA.53.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Vous étiez en effet '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: comme des brebis égarées
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Comme des brebis égarées: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'image présente en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 53.6
      metadata:
        usfm: ISA.53.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', mais maintenant vous êtes retournés vers le berger et le protecteur de votre âme.'
