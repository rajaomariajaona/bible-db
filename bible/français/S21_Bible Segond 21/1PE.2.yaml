document_id: 1PE.2,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Débarrassez-vous donc de toute méchanceté et toute ruse, de l''hypocrisie, l''envie et toute médisance, '
  '10':
  - type: text
    content: 'Vous qui autrefois n''étiez '
  - type: text
    content: pas un peuple
  - type: text
    content: ', '
  - type: text
    content: vous êtes
  - type: text
    content: 'maintenant '
  - type: text
    content: le peuple de Dieu
  - type: text
    content: '; vous qui n''aviez '
  - type: text
    content: pas obtenu compassion
  - type: text
    content: ', '
  - type: text
    content: vous avez
  - type: text
    content: ' maintenant '
  - type: text
    content: obtenu compassion
  - type: note
    content: 'Pas un peuple… compassion: extraits d''Osée 2.1, 25.'
  - type: text
    content: .
  - type: heading
    content: Les relations dans le monde
  '11':
  - type: text
    content: 'Bien-aimés, je vous encourage, en tant que résidents temporaires et étrangers sur la terre, à vous abstenir des désirs de votre nature propre qui font la guerre à l''âme. '
  '12':
  - type: text
    content: Ayez une bonne conduite au milieu des non-croyants, afin que, là même où ils vous calomnient comme si vous faisiez le mal, ils remarquent votre belle manière d'agir et rendent gloire à Dieu le jour où il interviendra.
  '13':
  - type: text
    content: 'A cause du Seigneur, soumettez-vous à toutes les institutions établies parmi les hommes: soit au roi parce qu''il est au-dessus de tous, '
  '14':
  - type: text
    content: 'soit aux gouverneurs parce qu''ils sont envoyés par lui pour punir ceux qui font le mal et approuver ceux qui font le bien. '
  '15':
  - type: text
    content: 'En effet, c''est la volonté de Dieu qu''en pratiquant le bien vous réduisiez au silence l''ignorance des hommes dépourvus de bon sens. '
  '16':
  - type: text
    content: 'Comportez-vous en hommes libres, sans faire de la liberté un voile qui couvre la méchanceté mais en agissant au contraire comme des serviteurs de Dieu. '
  '17':
  - type: text
    content: Respectez chacun, aimez les frères et sœurs, craignez Dieu, honorez le roi.
  '18':
  - type: text
    content: 'Serviteurs, soumettez-vous avec le plus grand respect à vos maîtres, non seulement à ceux qui font preuve de bonté et de douceur, mais aussi à ceux qui ont l''esprit pervers, '
  '19':
  - type: text
    content: 'car c''est une grâce de supporter des difficultés en souffrant injustement pour garder bonne conscience envers Dieu. '
  '2':
  - type: text
    content: 'et comme des enfants nouveau-nés désirez le lait pur de la parole. Ainsi, grâce à lui vous grandirez [pour le salut], '
  '20':
  - type: text
    content: 'En effet, quelle gloire y a-t-il à endurer de mauvais traitements si vous commettez des fautes? Mais si vous endurez la souffrance alors que vous faites ce qui est bien, c''est une grâce aux yeux de Dieu. '
  '21':
  - type: text
    content: 'De fait, c''est à cela que vous avez été appelés, parce que Christ aussi a souffert pour nous, vous laissant un exemple afin que vous suiviez ses traces, '
  '22':
  - type: text
    content: lui qui n'a pas commis de péché et dans la bouche duquel on n'a pas trouvé de tromperie
  - type: note
    content: 'Lui qui… tromperie: citation d''Esaïe 53.9.'
  - type: text
    content: ', '
  '23':
  - type: text
    content: 'lui qui insulté ne rendait pas l''insulte, maltraité ne faisait pas de menaces mais s''en remettait à celui qui juge justement, '
  '24':
  - type: text
    content: 'lui qui a lui-même porté nos péchés dans son corps à la croix afin que, libérés du péché, nous vivions pour la justice. '
  - type: text
    content: C'est par ses blessures que vous avez été guéris.
  - type: note
    content: 'C''est par… guéris: citation d''Esaïe 53.5.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Vous étiez en effet '
  - type: text
    content: comme des brebis égarées
  - type: note
    content: 'Comme des brebis égarées: image présente en Esaïe 53.6.'
  - type: text
    content: ', mais maintenant vous êtes retournés vers le berger et le protecteur de votre âme.'
  '3':
  - type: text
    content: 'si du moins vous avez '
  - type: text
    content: goûté que le Seigneur est bon
  - type: note
    content: 'Goûté… bon: citation du Psaume 34.9.'
  - type: text
    content: .
  - type: heading
    content: Christ, la pierre angulaire
  '4':
  - type: text
    content: 'Approchez-vous de Christ, la pierre vivante rejetée par les hommes mais choisie et précieuse devant Dieu, '
  '5':
  - type: text
    content: 'et vous-mêmes, en tant que pierres vivantes, laissez-vous édifier pour former une maison spirituelle, un groupe de prêtres saints, afin d''offrir des sacrifices spirituels que Dieu peut accepter par Jésus-Christ. '
  '6':
  - type: text
    content: 'En effet, il est dit dans l''Ecriture: '
  - type: text
    content: Je mets dans Sion une pierre angulaire, choisie, précieuse. Celui qui croit en elle n'en aura jamais honte.
  - type: note
    content: 'Je mets… honte: citation d''Esaïe 28.16.'
  '7':
  - type: text
    content: 'Elle est donc précieuse pour vous qui croyez. Quant à ceux qui désobéissent, '
  - type: text
    content: la pierre rejetée par ceux qui construisaient est devenue la pierre angulaire
  - type: note
    content: 'La pierre rejetée… angulaire: citation du Psaume 118.22.'
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Elle est aussi '
  - type: text
    content: une pierre qui fait obstacle et un rocher propre à faire trébucher
  - type: note
    content: 'Une pierre… trébucher: citation d''Esaïe 8.14.'
  - type: text
    content: '. Ils s''y heurtent parce qu''ils désobéissent à la parole, et c''est à cela qu''ils ont été destinés. '
  '9':
  - type: text
    content: Vous, au contraire, vous êtes
  - type: text
    content: un peuple choisi, des prêtres royaux, une nation sainte, un peuple racheté afin de proclamer les louanges
  - type: note
    content: 'Un peuple… louanges: citation d''Exode 19.5-6 et Esaïe 43.20-21.'
  - type: text
    content: ' de celui qui vous a appelés des ténèbres à sa merveilleuse lumière. '
