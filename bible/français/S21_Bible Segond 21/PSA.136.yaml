document_id: PSA.136,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La bonté éternelle de Dieu
  - type: text
    content: Louez l'Eternel, car il est bon!
  - type: text
    content: – Oui, sa bonté dure éternellement. –
  '10':
  - type: text
    content: Il a frappé les Egyptiens à travers leurs premiers-nés,
  - type: text
    content: – Oui, sa bonté dure éternellement. –
  '11':
  - type: text
    content: il a fait sortir Israël du milieu d'eux,
  - type: text
    content: – Oui, sa bonté dure éternellement. –
  '12':
  - type: text
    content: avec puissance et force.
  - type: text
    content: – Oui, sa bonté dure éternellement. –
  '13':
  - type: text
    content: Il a coupé en deux la mer des Roseaux,
  - type: text
    content: – Oui, sa bonté dure éternellement. –
  '14':
  - type: text
    content: il a fait passer Israël en plein milieu,
  - type: text
    content: – Oui, sa bonté dure éternellement. –
  '15':
  - type: text
    content: puis il a précipité le pharaon et son armée dans la mer des Roseaux.
  - type: text
    content: – Oui, sa bonté dure éternellement. –
  '16':
  - type: text
    content: Il a conduit son peuple dans le désert,
  - type: text
    content: – Oui, sa bonté dure éternellement. –
  '17':
  - type: text
    content: il a frappé de grands rois,
  - type: text
    content: – Oui, sa bonté dure éternellement. –
  '18':
  - type: text
    content: 'il a tué des rois puissants:'
  - type: text
    content: – Oui, sa bonté dure éternellement. –
  '19':
  - type: text
    content: Sihon, le roi des Amoréens,
  - type: text
    content: – Oui, sa bonté dure éternellement. –
  '2':
  - type: text
    content: Louez le Dieu des dieux!
  - type: text
    content: – Oui, sa bonté dure éternellement. –
  '20':
  - type: text
    content: et Og, le roi du Basan.
  - type: text
    content: – Oui, sa bonté dure éternellement. –
  '21':
  - type: text
    content: Il a donné leur pays en héritage,
  - type: text
    content: – Oui, sa bonté dure éternellement. –
  '22':
  - type: text
    content: en héritage à Israël, son serviteur.
  - type: text
    content: – Oui, sa bonté dure éternellement. –
  '23':
  - type: text
    content: Il s'est souvenu de nous quand nous étions humiliés,
  - type: text
    content: – Oui, sa bonté dure éternellement. –
  '24':
  - type: text
    content: il nous a délivrés de nos adversaires.
  - type: text
    content: – Oui, sa bonté dure éternellement. –
  '25':
  - type: text
    content: Il donne la nourriture à tout être vivant.
  - type: text
    content: – Oui, sa bonté dure éternellement. –
  '26':
  - type: text
    content: Louez le Dieu du ciel!
  - type: text
    content: – Oui, sa bonté dure éternellement. –
  '3':
  - type: text
    content: Louez le Seigneur des seigneurs!
  - type: text
    content: – Oui, sa bonté dure éternellement. –
  '4':
  - type: text
    content: Lui seul fait de grands miracles.
  - type: text
    content: – Oui, sa bonté dure éternellement. –
  '5':
  - type: text
    content: Il a fait le ciel avec intelligence.
  - type: text
    content: – Oui, sa bonté dure éternellement. –
  '6':
  - type: text
    content: Il a disposé la terre sur l'eau.
  - type: text
    content: – Oui, sa bonté dure éternellement. –
  '7':
  - type: text
    content: 'Il a fait les grands luminaires:'
  - type: text
    content: – Oui, sa bonté dure éternellement. –
  '8':
  - type: text
    content: le soleil pour présider au jour,
  - type: text
    content: – Oui, sa bonté dure éternellement. –
  '9':
  - type: text
    content: la lune et les étoiles pour présider à la nuit.
  - type: text
    content: – Oui, sa bonté dure éternellement. –
