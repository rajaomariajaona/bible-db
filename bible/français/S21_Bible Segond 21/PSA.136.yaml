document_id: PSA.136,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La bonté éternelle de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l'Eternel, car il est bon!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Oui, sa bonté dure éternellement. –
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a frappé les Egyptiens à travers leurs premiers-nés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Oui, sa bonté dure éternellement. –
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a fait sortir Israël du milieu d'eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Oui, sa bonté dure éternellement. –
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec puissance et force.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Oui, sa bonté dure éternellement. –
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a coupé en deux la mer des Roseaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Oui, sa bonté dure éternellement. –
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a fait passer Israël en plein milieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Oui, sa bonté dure éternellement. –
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puis il a précipité le pharaon et son armée dans la mer des Roseaux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Oui, sa bonté dure éternellement. –
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a conduit son peuple dans le désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Oui, sa bonté dure éternellement. –
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a frappé de grands rois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Oui, sa bonté dure éternellement. –
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'il a tué des rois puissants:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Oui, sa bonté dure éternellement. –
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sihon, le roi des Amoréens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Oui, sa bonté dure éternellement. –
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez le Dieu des dieux!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Oui, sa bonté dure éternellement. –
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Og, le roi du Basan.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Oui, sa bonté dure éternellement. –
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a donné leur pays en héritage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Oui, sa bonté dure éternellement. –
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en héritage à Israël, son serviteur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Oui, sa bonté dure éternellement. –
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s'est souvenu de nous quand nous étions humiliés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Oui, sa bonté dure éternellement. –
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il nous a délivrés de nos adversaires.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Oui, sa bonté dure éternellement. –
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il donne la nourriture à tout être vivant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Oui, sa bonté dure éternellement. –
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez le Dieu du ciel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Oui, sa bonté dure éternellement. –
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez le Seigneur des seigneurs!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Oui, sa bonté dure éternellement. –
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lui seul fait de grands miracles.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Oui, sa bonté dure éternellement. –
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a fait le ciel avec intelligence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Oui, sa bonté dure éternellement. –
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a disposé la terre sur l'eau.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Oui, sa bonté dure éternellement. –
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il a fait les grands luminaires:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Oui, sa bonté dure éternellement. –
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le soleil pour présider au jour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Oui, sa bonté dure éternellement. –
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la lune et les étoiles pour présider à la nuit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – Oui, sa bonté dure éternellement. –
