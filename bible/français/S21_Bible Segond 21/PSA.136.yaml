document_id: PSA.136
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La bonté éternelle de Dieu
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Louez l'Eternel, car il est bon!
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Oui, sa bonté dure éternellement. –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Louez le Dieu des dieux!
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Oui, sa bonté dure éternellement. –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Louez le Seigneur des seigneurs!
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Oui, sa bonté dure éternellement. –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Lui seul fait de grands miracles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Oui, sa bonté dure éternellement. –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il a fait le ciel avec intelligence.
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Oui, sa bonté dure éternellement. –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il a disposé la terre sur l'eau.
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Oui, sa bonté dure éternellement. –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il a fait les grands luminaires:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Oui, sa bonté dure éternellement. –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: le soleil pour présider au jour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Oui, sa bonté dure éternellement. –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: la lune et les étoiles pour présider à la nuit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Oui, sa bonté dure éternellement. –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il a frappé les Egyptiens à travers leurs premiers-nés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Oui, sa bonté dure éternellement. –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: il a fait sortir Israël du milieu d'eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Oui, sa bonté dure éternellement. –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: avec puissance et force.
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Oui, sa bonté dure éternellement. –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Il a coupé en deux la mer des Roseaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Oui, sa bonté dure éternellement. –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: il a fait passer Israël en plein milieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Oui, sa bonté dure éternellement. –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: puis il a précipité le pharaon et son armée dans la mer des Roseaux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Oui, sa bonté dure éternellement. –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il a conduit son peuple dans le désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Oui, sa bonté dure éternellement. –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: il a frappé de grands rois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Oui, sa bonté dure éternellement. –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'il a tué des rois puissants:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Oui, sa bonté dure éternellement. –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Sihon, le roi des Amoréens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Oui, sa bonté dure éternellement. –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: et Og, le roi du Basan.
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Oui, sa bonté dure éternellement. –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Il a donné leur pays en héritage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Oui, sa bonté dure éternellement. –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: en héritage à Israël, son serviteur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Oui, sa bonté dure éternellement. –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Il s'est souvenu de nous quand nous étions humiliés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Oui, sa bonté dure éternellement. –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: il nous a délivrés de nos adversaires.
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Oui, sa bonté dure éternellement. –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Il donne la nourriture à tout être vivant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Oui, sa bonté dure éternellement. –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Louez le Dieu du ciel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: – Oui, sa bonté dure éternellement. –
