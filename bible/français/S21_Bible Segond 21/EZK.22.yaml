document_id: EZK.22,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Crimes et jugement de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'La parole de l''Eternel m''a été adressée: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Chez toi, on dévoile la nudité d''un père. Chez toi, on humilie une femme impure à cause de ses règles. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Chez toi, chacun se livre à des pratiques abominables avec la femme de son prochain: l''un rend sa belle-fille impure par un acte scandaleux, l''autre viole sa sœur, la fille de son père. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Chez toi, on accepte des pots-de-vin pour verser le sang. Tu exiges un intérêt, tu cherches à faire du profit, tu dépouilles ton prochain, tu l'exploites, et moi, tu m'oublies, déclare le Seigneur, l'Eternel.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '»Je vais frapper des mains à cause de tes profits malhonnêtes et du sang versé au milieu de toi. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ton cœur résistera-t-il, tes mains auront-elles de la force lorsque j''interviendrai contre toi? Moi, l''Eternel, j''ai parlé, et j''agirai. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Je t''éparpillerai parmi les nations, je te disperserai dans divers pays et je mettrai fin à l''état d''impureté qui est le tien. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tu t'es salie toi-même aux yeux des nations, mais tu reconnaîtras que je suis l'Eternel.’»
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'La parole de l''Eternel m''a été adressée: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '«Fils de l''homme, la communauté d''Israël s''est transformée en impuretés pour moi. Ils ne sont tous que du bronze, de l''étain, du fer ou du plomb dans le four, ce n''est que de l''argent impur. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'C''est pourquoi, voici ce que dit le Seigneur, l''Eternel: Puisque vous vous êtes tous transformés en impuretés, je vais vous rassembler au milieu de Jérusalem. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: «Et toi, fils de l'homme, vas-tu la juger? Vas-tu juger la ville sanguinaire? Fais-lui connaître toutes ses pratiques abominables!
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Tout comme on rassemble l''argent, le bronze, le fer, le plomb et l''étain au milieu du four et qu''on y attise le feu pour les faire fondre, je vous rassemblerai dans ma colère et dans ma fureur et je vous déposerai là pour vous faire fondre. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Je vous entasserai et j''attiserai contre vous le feu de ma fureur, si bien que vous fondrez au milieu de Jérusalem. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Vous fondrez au milieu d'elle, tout comme l'argent fond dans le four. Vous reconnaîtrez alors que c'est moi, l'Eternel, qui ai déversé ma colère sur vous.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Péchés des chefs et du peuple d'Israël
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'La parole de l''Eternel m''a été adressée: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '«Fils de l''homme, dis à Jérusalem: ‘Tu es une terre non purifiée, non trempée par la pluie un jour de colère.’'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '»Ses prophètes conspirent au milieu d''elle. Pareils à des lions rugissants qui déchirent leur proie, ils dévorent des vies, ils s''emparent des richesses et de biens précieux, ils multiplient les veuves au milieu d''elle. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ses prêtres font violence à ma loi et profanent ce qui m''est consacré. Ils ne distinguent pas ce qui est saint de ce qui est profane, ils ne font pas connaître la différence entre ce qui est impur et ce qui est pur, ils ferment les yeux sur mes sabbats et je suis déshonoré au milieu d''eux. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ses chefs sont, à l''intérieur d''elle, pareils à des loups qui déchirent leur proie: ils versent le sang, ils font disparaître des vies afin de faire des profits malhonnêtes. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ses prophètes recouvrent tout cela de crépi, par leurs fausses visions et leurs prédictions mensongères. Ils affirment: ‘Voici ce que dit le Seigneur, l''Eternel’ alors que l''Eternel n''a pas parlé. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Quant à la population du pays, elle pratique l'exploitation, elle commet des extorsions, elle opprime le malheureux et le pauvre, elle exploite l'étranger au mépris de toute justice.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '»Tu annonceras: ‘Voici ce que dit le Seigneur, l''Eternel: Voilà une ville qui verse le sang au milieu d''elle, de sorte que son heure est arrivée, et qui s''est fabriqué des idoles, se rendant ainsi impure! '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: '»Je cherche parmi eux quelqu''un qui construise un mur, qui se tienne à la brèche devant moi en faveur du pays, pour que je ne le détruise pas, mais je ne trouve pas. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Je déverserai mon indignation sur eux, je les achèverai par le feu de ma fureur. Je ferai retomber leur conduite sur leur tête, déclare le Seigneur, l'Eternel.»
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Tu es coupable à cause du sang que tu as versé, et tu t''es rendue impure par les idoles que tu as fabriquées. Tu as ainsi raccourci tes jours et tu es parvenue au terme de tes années. C''est pourquoi je fais de toi un objet d''insulte pour les nations et de moquerie pour tous les pays. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Aussi bien ceux qui sont près que ceux qui sont loin se moqueront de toi. Ta réputation est salie et tu es pleine de trouble.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '»Chez toi, les princes d''Israël profitent de leur pouvoir pour verser le sang. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Chez toi, on méprise père et mère, on maltraite l''étranger, on opprime l''orphelin et la veuve. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Tu méprises ce qui m''est consacré, tu violes mes sabbats. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Chez toi, on s''adonne à la calomnie pour verser le sang. Chez toi, on mange sur les montagnes, on commet des actes scandaleux au milieu de toi. '
