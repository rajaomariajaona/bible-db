document_id: HEB.5
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'En effet, tout grand-prêtre pris parmi les hommes est établi en faveur des hommes dans le service de Dieu afin de présenter des offrandes et des sacrifices pour les péchés. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il peut avoir de la compréhension pour les personnes ignorantes et égarées, puisqu''il est lui-même aussi sujet à la faiblesse. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C'est d'ailleurs à cause de cette faiblesse qu'il doit offrir des sacrifices pour ses propres péchés aussi bien que pour ceux du peuple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Personne ne peut s''attribuer l''honneur de cette charge à moins d''être appelé par Dieu comme l''a été Aaron. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Christ non plus ne s''est pas attribué la gloire de devenir grand-prêtre, il la tient de celui qui lui a dit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu es mon Fils, je t'ai engendré aujourd'hui!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu es… aujourd''hui: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'reprise de la citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 2.7
      metadata:
        usfm: PSA.2.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (voir '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '1.5'
      metadata:
        usfm: HEB.1.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il dit aussi ailleurs: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu es prêtre pour toujours à la manière de Melchisédek.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu es…Melchisédek: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 110.4
      metadata:
        usfm: PSA.110.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Pendant sa vie terrestre, Christ a présenté avec de grands cris et avec larmes des prières et des supplications à celui qui pouvait le sauver de la mort, et il a été exaucé à cause de sa piété. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ainsi, bien qu''étant Fils, il a appris l''obéissance par ce qu''il a souffert. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et parfaitement qualifié, il est devenu pour tous ceux qui lui obéissent l''auteur d''un salut éternel, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: car Dieu l'a déclaré grand-prêtre à la manière de Melchisédek.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nous avons beaucoup à dire à ce sujet, et des choses difficiles à expliquer parce que vous êtes devenus lents à comprendre. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors que vous devriez avec le temps être des enseignants, vous en êtes au point d''avoir besoin qu''on vous enseigne les éléments de base de la révélation de Dieu; vous en êtes arrivés à avoir besoin de lait et non d''une nourriture solide. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Or celui qui en est au lait est inexpérimenté dans la parole de justice, car il est un petit enfant. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mais la nourriture solide est pour les adultes, pour ceux qui, en raison de leur expérience, ont le jugement exercé à discerner ce qui est bien et ce qui est mal.
