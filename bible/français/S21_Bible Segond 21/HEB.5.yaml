document_id: HEB.5,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'En effet, tout grand-prêtre pris parmi les hommes est établi en faveur des hommes dans le service de Dieu afin de présenter des offrandes et des sacrifices pour les péchés. '
  '10':
  - type: text
    content: car Dieu l'a déclaré grand-prêtre à la manière de Melchisédek.
  '11':
  - type: text
    content: 'Nous avons beaucoup à dire à ce sujet, et des choses difficiles à expliquer parce que vous êtes devenus lents à comprendre. '
  '12':
  - type: text
    content: 'Alors que vous devriez avec le temps être des enseignants, vous en êtes au point d''avoir besoin qu''on vous enseigne les éléments de base de la révélation de Dieu; vous en êtes arrivés à avoir besoin de lait et non d''une nourriture solide. '
  '13':
  - type: text
    content: 'Or celui qui en est au lait est inexpérimenté dans la parole de justice, car il est un petit enfant. '
  '14':
  - type: text
    content: Mais la nourriture solide est pour les adultes, pour ceux qui, en raison de leur expérience, ont le jugement exercé à discerner ce qui est bien et ce qui est mal.
  '2':
  - type: text
    content: 'Il peut avoir de la compréhension pour les personnes ignorantes et égarées, puisqu''il est lui-même aussi sujet à la faiblesse. '
  '3':
  - type: text
    content: C'est d'ailleurs à cause de cette faiblesse qu'il doit offrir des sacrifices pour ses propres péchés aussi bien que pour ceux du peuple.
  '4':
  - type: text
    content: 'Personne ne peut s''attribuer l''honneur de cette charge à moins d''être appelé par Dieu comme l''a été Aaron. '
  '5':
  - type: text
    content: 'Christ non plus ne s''est pas attribué la gloire de devenir grand-prêtre, il la tient de celui qui lui a dit: '
  - type: text
    content: Tu es mon Fils, je t'ai engendré aujourd'hui!
  - type: note
    content: 'Tu es… aujourd''hui: reprise de la citation du Psaume 2.7 (voir 1.5).'
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Il dit aussi ailleurs: '
  - type: text
    content: Tu es prêtre pour toujours à la manière de Melchisédek.
  - type: note
    content: 'Tu es…Melchisédek: citation du Psaume 110.4.'
  '7':
  - type: text
    content: 'Pendant sa vie terrestre, Christ a présenté avec de grands cris et avec larmes des prières et des supplications à celui qui pouvait le sauver de la mort, et il a été exaucé à cause de sa piété. '
  '8':
  - type: text
    content: 'Ainsi, bien qu''étant Fils, il a appris l''obéissance par ce qu''il a souffert. '
  '9':
  - type: text
    content: 'Et parfaitement qualifié, il est devenu pour tous ceux qui lui obéissent l''auteur d''un salut éternel, '
