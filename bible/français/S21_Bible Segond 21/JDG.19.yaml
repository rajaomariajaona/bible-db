document_id: JDG.19
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Viol et guerre fratricide
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A l''époque où il n''y avait pas de roi en Israël, un Lévite qui résidait à l''extrémité de la région montagneuse d''Ephraïm prit pour concubine une femme de Bethléhem en Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Sa concubine lui fut infidèle et le quitta pour retourner chez son père à Bethléhem en Juda, où elle resta durant 4 mois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Son mari se leva et alla la trouver pour parler à son cœur et la ramener. Il avait avec lui son serviteur et deux ânes. Elle le fit entrer chez son père. Quand le père de la jeune femme le vit, il l''accueillit avec joie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Son beau-père, le père de la jeune femme, le retint 3 jours chez lui. Ils mangèrent et burent, et ils passèrent la nuit là.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le quatrième jour, ils se levèrent de bon matin. Le Lévite se préparait à partir, mais le père de la jeune femme dit à son gendre: «Mange un morceau de pain pour prendre des forces. Vous partirez ensuite.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ils s''assirent donc et ils mangèrent et burent tous deux ensemble. Puis le père de la jeune femme dit au mari: «Décide-toi donc à passer la nuit ici et que ton cœur se réjouisse.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le mari se préparait à partir, mais, sur l'insistance de son beau-père, il passa encore la nuit là.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le cinquième jour, il se leva de bon matin pour partir. Alors le père de la jeune femme dit: «Prends donc des forces et restez jusqu''au soir.» Et ils mangèrent tous les deux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le mari se préparait à partir avec sa concubine et son serviteur, mais son beau-père, le père de la jeune femme, lui dit: «Voici que le jour baisse, il se fait tard. Passez donc la nuit ici. C''est déjà le soir. Passe la nuit ici et que ton cœur se réjouisse. Demain vous vous lèverez de bon matin pour vous mettre en route, et tu retourneras dans ta tente.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le mari ne voulut pas passer la nuit là. Il se leva donc et partit. Il arriva jusque devant Jébus, c''est-à-dire Jérusalem, avec les deux ânes munis de leur selle et avec sa concubine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le jour avait beaucoup baissé lorsqu''ils furent près de Jébus. Le serviteur dit alors à son maître: «Allons, dirigeons-nous vers cette ville des Jébusiens pour y passer la nuit.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Son maître lui répondit: «Nous n''entrerons pas dans une ville d''étrangers, où il n''y a pas d''Israélites. Nous irons jusqu''à Guibea.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il dit encore à son serviteur: «Allons, approchons-nous de Guibea ou Rama et passons la nuit dans l''une de ces localités.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils continuèrent à marcher, et le soleil se couchait quand ils furent près de Guibea, ville de la tribu de Benjamin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils prirent cette direction pour aller passer la nuit à Guibea. Le Lévite entra et s''arrêta sur la place de la ville. Il n''y eut personne qui l''accueille chez lui pour la nuit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Toutefois, un vieil homme revint le soir de son travail aux champs. Cet homme était originaire de la région montagneuse d''Ephraïm et s''était installé à Guibea, alors que les habitants de l''endroit étaient benjaminites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Levant les yeux, le vieil homme vit le voyageur sur la place de la ville et lui dit: «Où vas-tu et d''où viens-tu?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le Lévite lui répondit: «Nous allons de Bethléhem en Juda jusqu''à l''extrémité de la région montagneuse d''Ephraïm, d''où je viens. J''étais allé à Bethléhem en Juda et je me rends à la maison de l''Eternel, mais il n''y a personne qui m''accueille chez lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nous avons cependant de la paille et du fourrage pour nos ânes. Nous avons aussi du pain et du vin pour moi, pour ta servante et pour le garçon qui accompagne tes serviteurs. Nous ne manquons de rien.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le vieil homme dit: «Que la paix soit avec toi! Je me charge de tous tes besoins, tu ne passeras pas la nuit sur la place.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Il les fit entrer dans sa maison et donna du fourrage aux ânes. Les voyageurs se lavèrent les pieds, puis ils mangèrent et burent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Pendant qu''ils étaient en train de se réjouir, les hommes de la ville, hommes mauvais, entourèrent la maison, frappèrent à la porte et dirent au vieil homme qui était le maître de maison: «Fais sortir l''homme qui est entré chez toi, pour que nous couchions avec lui.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Le maître de maison se présenta à eux et leur dit: «Non, mes frères, ne faites pas le mal, je vous en prie. Puisque cet homme est entré chez moi, ne commettez pas cet acte odieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ecoutez! J''ai une fille vierge et cet homme a une concubine. Je vous les amènerai dehors. Vous les déshonorerez, vous leur ferez ce qu''il vous plaira. Mais ne commettez pas sur cet homme un acte aussi odieux.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ces hommes ne voulurent pas l'écouter. Alors le Lévite prit sa concubine et la leur amena dehors. Ils eurent des relations avec elle, ils la violèrent toute la nuit jusqu'au matin. Puis, au lever de l'aurore, ils la renvoyèrent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Au petit matin, cette femme alla s''écrouler à l''entrée de la maison de l''homme qui hébergeait son mari, et elle resta là jusqu''à ce qu''il fasse jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Le matin, son mari se leva, ouvrit la porte de la maison et sortit pour continuer son chemin. Mais voici que la femme, sa concubine, était étendue à l''entrée de la maison, les mains sur le seuil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Il lui dit: «Lève-toi, allons-nous-en.» Elle ne répondit pas. Alors son mari la mit sur son âne et partit pour retourner chez lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Arrivé chez lui, il prit un couteau, s''empara de sa concubine et la coupa membre par membre en 12 morceaux, qu''il envoya dans tout le territoire d''Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Tous ceux qui virent cela dirent: «Jamais rien de pareil n''est arrivé et ne s''est vu depuis que les Israélites sont sortis d''Egypte jusqu''à aujourd''hui. Prenez la chose à cœur, tenez conseil et donnez votre réponse!»'
