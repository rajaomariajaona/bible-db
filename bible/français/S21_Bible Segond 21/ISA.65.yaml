document_id: ISA.65,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Réponse de Dieu
  - type: text
    content: '*Je me suis laissé consulter par ceux qui ne me demandaient rien,'
  - type: text
    content: je me suis laissé trouver par ceux qui ne me cherchaient pas.
  - type: note
    content: 'Je me suis… cherchaient pas: cité en Romains 10.20.'
  - type: text
    content: 'J''ai dit: «Me voici! Me voici!»'
  - type: text
    content: à une nation qui ne faisait pas appel à mon nom.
  '10':
  - type: text
    content: Pour mon peuple, pour ceux qui m'auront recherché,
  - type: text
    content: le Saron servira de domaine au petit bétail,
  - type: text
    content: et la vallée d'Acor de lieu de repos au gros bétail.
  '11':
  - type: text
    content: Quant à vous qui abandonnez l'Eternel,
  - type: text
    content: qui oubliez ma montagne sainte,
  - type: text
    content: qui dressez une table pour le dieu de la chance
  - type: text
    content: et remplissez une coupe pour le dieu du destin,
  '12':
  - type: text
    content: je vous destine à l'épée
  - type: text
    content: et vous devrez tous vous agenouiller pour être égorgés.
  - type: text
    content: En effet, j'ai appelé et vous n'avez pas répondu,
  - type: text
    content: j'ai parlé et vous n'avez pas écouté.
  - type: text
    content: Au contraire, vous avez fait ce qui est mal à mes yeux
  - type: text
    content: et vous avez choisi ce qui ne me plaît pas.
  '13':
  - type: text
    content: 'C''est pourquoi, voici ce que dit le Seigneur, l''Eternel:'
  - type: text
    content: Mes serviteurs mangeront tandis que vous, vous aurez faim;
  - type: text
    content: ils boiront tandis que vous, vous aurez soif;
  - type: text
    content: ils seront dans la joie tandis que vous, vous connaîtrez la honte;
  '14':
  - type: text
    content: ils chanteront de bonheur
  - type: text
    content: tandis que vous, vous crierez de douleur
  - type: text
    content: et vous lamenterez, l'esprit brisé.
  '15':
  - type: text
    content: Vous laisserez votre nom comme une formule de malédiction à ceux que j'ai choisis.
  - type: text
    content: 'Ils diront: «Que le Seigneur, l''Eternel, te fasse mourir comme eux!»'
  - type: text
    content: Quant à ses serviteurs, l'Eternel leur donnera un autre nom.
  '16':
  - type: text
    content: Celui qui voudra être béni dans le pays
  - type: text
    content: voudra l'être par le Dieu de vérité,
  - type: text
    content: et celui qui prêtera serment dans le pays
  - type: text
    content: le fera au nom du Dieu de vérité.
  - type: text
    content: Les détresses passées seront oubliées,
  - type: text
    content: elles seront cachées à mes yeux.
  '17':
  - type: text
    content: En effet, je crée un nouveau ciel
  - type: text
    content: et une nouvelle terre.
  - type: text
    content: On ne se souviendra plus des premiers événements,
  - type: text
    content: ils ne viendront plus à l'esprit.
  '18':
  - type: text
    content: Réjouissez-vous plutôt et soyez pour toujours dans l'allégresse
  - type: text
    content: à cause de ce que je crée,
  - type: text
    content: car je crée Jérusalem pour qu'elle soit une source d'allégresse
  - type: text
    content: et son peuple pour qu'il soit une source de joie.
  '19':
  - type: text
    content: Je ferai de Jérusalem mon allégresse
  - type: text
    content: et de mon peuple ma joie.
  - type: text
    content: On n'y entendra plus le bruit des pleurs ni les cris de détresse.
  '2':
  - type: text
    content: '*A longueur de journée, j''ai tendu mes mains vers un peuple rebelle'
  - type: note
    content: 'Alongueur… rebelle: cité en Romains 10.21 à propos d''Israël.'
  - type: text
    content: qui marche sur une mauvaise voie,
  - type: text
    content: en suivant ses propres pensées.
  '20':
  - type: text
    content: Il n'y aura plus de nouveau-né qui vive quelques jours seulement,
  - type: text
    content: ni de vieillard qui meure avant d'avoir terminé tout son parcours.
  - type: text
    content: Celui qui mourra à 100 ans sera considéré comme jeune
  - type: text
    content: et celui qui n'atteindra pas 100 ans sera considéré comme maudit.
  '21':
  - type: text
    content: Ils reconstruiront des maisons et les habiteront,
  - type: text
    content: ils planteront des vignes et en mangeront le fruit.
  '22':
  - type: text
    content: Ils ne construiront pas des maisons pour qu'un autre les habite,
  - type: text
    content: ils ne feront pas des plantations pour qu'un autre en mange,
  - type: text
    content: car la vie des membres de mon peuple sera aussi longue que celle des arbres
  - type: text
    content: et ceux que j'ai choisis jouiront du fruit de leur travail.
  '23':
  - type: text
    content: Ils ne se fatigueront pas pour rien
  - type: text
    content: et ils n'auront pas des enfants qui soient pour eux une source d'inquiétude.
  - type: text
    content: En effet, ils formeront une lignée de personnes bénies de l'Eternel
  - type: text
    content: et leur progéniture sera avec eux.
  '24':
  - type: text
    content: Alors, avant même qu'ils ne fassent appel à moi, je leur répondrai;
  - type: text
    content: avant même qu'ils n'aient fini de parler, je les exaucerai.
  '25':
  - type: text
    content: Le loup et l'agneau brouteront ensemble,
  - type: text
    content: le lion, comme le bœuf, mangera de la paille
  - type: text
    content: et le serpent aura la poussière pour nourriture.
  - type: text
    content: On ne commettra ni mal ni destruction
  - type: text
    content: sur toute ma montagne sainte, dit l'Eternel.
  '3':
  - type: text
    content: C'est un peuple qui ne cesse de m'irriter en face
  - type: text
    content: en offrant des sacrifices dans les jardins
  - type: text
    content: et faisant brûler de l'encens sur les briques.
  '4':
  - type: text
    content: Il habite dans les tombeaux
  - type: text
    content: et passe la nuit dans des endroits bien gardés,
  - type: text
    content: il mange de la viande de porc
  - type: text
    content: et remplit ses plats d'aliments impurs.
  '5':
  - type: text
    content: 'Il prétend: «Reste à l''écart,'
  - type: text
    content: ne t'approche pas de moi, car je suis trop saint pour toi!»
  - type: text
    content: Une telle attitude fait monter dans mes narines une fumée,
  - type: text
    content: un feu qui brûle toujours.
  '6':
  - type: text
    content: Tout cela reste écrit devant moi.
  - type: text
    content: Je ne garderai pas le silence mais je réglerai mes comptes,
  - type: text
    content: oui, je réglerai mes comptes avec eux.
  '7':
  - type: text
    content: Je vous ferai payer vos fautes ainsi que celles de vos ancêtres, dit l'Eternel,
  - type: text
    content: parce qu'ils ont fait brûler de l'encens sur les montagnes
  - type: text
    content: et m'ont insulté sur les collines.
  - type: text
    content: Je calculerai le salaire de leurs actions passées et le leur paierai.
  '8':
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: Quand on trouve du jus dans une grappe,
  - type: text
    content: 'on dit: «Ne la détruis pas, car elle contient une bénédiction!»'
  - type: text
    content: 'J''agirai de la même manière à cause de mes serviteurs:'
  - type: text
    content: je ne détruirai pas tout.
  '9':
  - type: text
    content: Je ferai sortir de Jacob une descendance,
  - type: text
    content: 'et de Juda celui qui prendra possession de mes montagnes:'
  - type: text
    content: ceux que j'ai choisis en prendront possession,
  - type: text
    content: mes serviteurs y habiteront.
