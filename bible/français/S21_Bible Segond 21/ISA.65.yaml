document_id: ISA.65
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Réponse de Dieu
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '*Je me suis laissé consulter par ceux qui ne me demandaient rien,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je me suis laissé trouver par ceux qui ne me cherchaient pas.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '65.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je me suis… cherchaient pas: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 10.20
      metadata:
        usfm: ROM.10.20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'J''ai dit: «Me voici! Me voici!»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: à une nation qui ne faisait pas appel à mon nom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '*A longueur de journée, j''ai tendu mes mains vers un peuple rebelle'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '65.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Alongueur… rebelle: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 10.21
      metadata:
        usfm: ROM.10.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' à propos d''Israël.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui marche sur une mauvaise voie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: en suivant ses propres pensées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C'est un peuple qui ne cesse de m'irriter en face
- type: usfm
  marker: q1
  children:
  - type: text
    text: en offrant des sacrifices dans les jardins
- type: usfm
  marker: q1
  children:
  - type: text
    text: et faisant brûler de l'encens sur les briques.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il habite dans les tombeaux
- type: usfm
  marker: q1
  children:
  - type: text
    text: et passe la nuit dans des endroits bien gardés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il mange de la viande de porc
- type: usfm
  marker: q1
  children:
  - type: text
    text: et remplit ses plats d'aliments impurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il prétend: «Reste à l''écart,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne t'approche pas de moi, car je suis trop saint pour toi!»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une telle attitude fait monter dans mes narines une fumée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un feu qui brûle toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tout cela reste écrit devant moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne garderai pas le silence mais je réglerai mes comptes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oui, je réglerai mes comptes avec eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je vous ferai payer vos fautes ainsi que celles de vos ancêtres, dit l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu'ils ont fait brûler de l'encens sur les montagnes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et m'ont insulté sur les collines.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je calculerai le salaire de leurs actions passées et le leur paierai.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand on trouve du jus dans une grappe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'on dit: «Ne la détruis pas, car elle contient une bénédiction!»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'J''agirai de la même manière à cause de mes serviteurs:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne détruirai pas tout.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je ferai sortir de Jacob une descendance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et de Juda celui qui prendra possession de mes montagnes:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux que j'ai choisis en prendront possession,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mes serviteurs y habiteront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Pour mon peuple, pour ceux qui m'auront recherché,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Saron servira de domaine au petit bétail,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la vallée d'Acor de lieu de repos au gros bétail.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Quant à vous qui abandonnez l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui oubliez ma montagne sainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui dressez une table pour le dieu de la chance
- type: usfm
  marker: q1
  children:
  - type: text
    text: et remplissez une coupe pour le dieu du destin,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: je vous destine à l'épée
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous devrez tous vous agenouiller pour être égorgés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, j'ai appelé et vous n'avez pas répondu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ai parlé et vous n'avez pas écouté.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au contraire, vous avez fait ce qui est mal à mes yeux
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous avez choisi ce qui ne me plaît pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'C''est pourquoi, voici ce que dit le Seigneur, l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mes serviteurs mangeront tandis que vous, vous aurez faim;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils boiront tandis que vous, vous aurez soif;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils seront dans la joie tandis que vous, vous connaîtrez la honte;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ils chanteront de bonheur
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que vous, vous crierez de douleur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous lamenterez, l'esprit brisé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Vous laisserez votre nom comme une formule de malédiction à ceux que j'ai choisis.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils diront: «Que le Seigneur, l''Eternel, te fasse mourir comme eux!»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quant à ses serviteurs, l'Eternel leur donnera un autre nom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Celui qui voudra être béni dans le pays
- type: usfm
  marker: q1
  children:
  - type: text
    text: voudra l'être par le Dieu de vérité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celui qui prêtera serment dans le pays
- type: usfm
  marker: q1
  children:
  - type: text
    text: le fera au nom du Dieu de vérité.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les détresses passées seront oubliées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles seront cachées à mes yeux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: En effet, je crée un nouveau ciel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et une nouvelle terre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On ne se souviendra plus des premiers événements,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ne viendront plus à l'esprit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Réjouissez-vous plutôt et soyez pour toujours dans l'allégresse
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de ce que je crée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je crée Jérusalem pour qu'elle soit une source d'allégresse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son peuple pour qu'il soit une source de joie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Je ferai de Jérusalem mon allégresse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de mon peuple ma joie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On n'y entendra plus le bruit des pleurs ni les cris de détresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il n'y aura plus de nouveau-né qui vive quelques jours seulement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni de vieillard qui meure avant d'avoir terminé tout son parcours.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui mourra à 100 ans sera considéré comme jeune
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celui qui n'atteindra pas 100 ans sera considéré comme maudit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ils reconstruiront des maisons et les habiteront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils planteront des vignes et en mangeront le fruit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ils ne construiront pas des maisons pour qu'un autre les habite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ne feront pas des plantations pour qu'un autre en mange,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car la vie des membres de mon peuple sera aussi longue que celle des arbres
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ceux que j'ai choisis jouiront du fruit de leur travail.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ils ne se fatigueront pas pour rien
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils n'auront pas des enfants qui soient pour eux une source d'inquiétude.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, ils formeront une lignée de personnes bénies de l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur progéniture sera avec eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Alors, avant même qu'ils ne fassent appel à moi, je leur répondrai;
- type: usfm
  marker: q1
  children:
  - type: text
    text: avant même qu'ils n'aient fini de parler, je les exaucerai.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Le loup et l'agneau brouteront ensemble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le lion, comme le bœuf, mangera de la paille
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le serpent aura la poussière pour nourriture.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On ne commettra ni mal ni destruction
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur toute ma montagne sainte, dit l'Eternel.
