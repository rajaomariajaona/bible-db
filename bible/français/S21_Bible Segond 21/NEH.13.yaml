document_id: NEH.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dégradation de la situation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A ce moment-là, on a fait la lecture du livre de Moïse au peuple et l''on y a trouvé écrit que l''Ammonite et le Moabite ne pourraient jamais entrer dans l''assemblée de Dieu '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'parce qu''ils n''étaient pas venus à la rencontre des Israélites avec du pain et de l''eau et parce qu''ils avaient soudoyé Balaam à leurs dépens afin qu''il les maudisse. Cependant, notre Dieu avait changé la malédiction en bénédiction. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Après avoir entendu ce passage de la loi, on a exclu tout métissage d'Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Avant cet événement, le prêtre Eliashib, qui avait reçu la responsabilité des salles de la maison de notre Dieu et qui était un proche de Tobija, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: avait aménagé une grande pièce pour ce dernier. C'était une salle où l'on déposait auparavant les offrandes, l'encens, les ustensiles, la dîme du blé, du vin nouveau et de l'huile, c'est-à-dire la part due aux Lévites, aux musiciens et aux portiers et les prélèvements destinés aux prêtres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je n''étais pas à Jérusalem au moment où tout cela se passait, car j''étais retourné auprès du roi la trente-deuxième année du règne d''Artaxerxès, roi de Babylone. A la fin de l''année, j''ai demandé au roi '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'la permission de revenir à Jérusalem et je me suis aperçu du mal qu''avait commis Eliashib, au profit de Tobija, en lui aménageant une pièce dans les parvis de la maison de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'J''en ai éprouvé un très grand déplaisir et j''ai jeté hors de cette pièce tous les objets qui appartenaient à Tobija. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Puis j'ai ordonné qu'on purifie les salles avant d'y faire redéposer les ustensiles de la maison de Dieu ainsi que les offrandes et l'encens.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'J''ai aussi appris que les Lévites n''avaient pas reçu leurs parts et qu''ils s''étaient repliés sur leurs terres, en particulier les musiciens chargés du service. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'J''ai adressé des reproches aux magistrats en leur demandant: «Pourquoi la maison de Dieu a-t-elle été abandonnée?» puis j''ai rassemblé les Lévites et les ai réinstallés à leur poste. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors tout Juda a amené la dîme du blé, du vin nouveau et de l''huile dans les entrepôts. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: J'ai confié la surveillance de ces derniers au prêtre Shélémia, au scribe Tsadok et à Pedaja, l'un des Lévites, en leur associant Hanan, fils de Zaccur et petit-fils de Matthania, car ces hommes avaient la réputation d'être dignes de confiance, et je les ai chargés de faire les distributions à leurs frères.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Souviens-toi de moi, mon Dieu, à cause de cela, mon Dieu, et n'oublie pas mes actes de fidélité envers la maison de mon Dieu et son fonctionnement!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'A la même époque, j''ai vu en Juda des hommes fouler le raisin dans les pressoirs pendant le sabbat, rentrer des gerbes et charger même du vin, des raisins et des figues, en plus de toutes sortes de produits, sur des ânes pour les amener à Jérusalem le jour du sabbat. Je les ai avertis, le jour où ils vendaient leurs denrées. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il y avait aussi des Tyriens, installés là, qui apportaient du poisson ainsi que toutes sortes de marchandises et qui les vendaient aux Judéens, et ce à Jérusalem, le jour du sabbat. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'J''ai adressé des reproches aux nobles de Juda en leur demandant: «Que signifie cette mauvaise action de votre part? Vous violez le jour du sabbat! '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: N'est-ce pas de cette manière que vos ancêtres ont agi? Notre Dieu a alors fait venir tous ces malheurs sur nous et sur cette ville, et vous, vous voulez attiser sa colère contre Israël en violant le sabbat!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Puis j''ai ordonné qu''on ferme les portes de Jérusalem dès qu''elles seraient dans l''ombre, avant le sabbat, et qu''on ne les rouvre qu''après le sabbat. De plus, j''ai placé quelques-uns de mes serviteurs aux portes pour empêcher l''entrée de tout fardeau ce jour-là. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les marchands et les vendeurs de produits de toute sorte ont alors passé une fois, puis une deuxième fois, la nuit à l''extérieur de Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Je les ai donc avertis en leur disant: «Pourquoi passez-vous la nuit devant la muraille? Si vous recommencez, je porterai la main contre vous.» Dès ce moment, ils ne sont plus venus pendant le sabbat. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: J'ai aussi ordonné aux Lévites de se purifier et de venir garder les portes pour respecter la sainteté du jour du sabbat.
- type: usfm
  marker: p
  children:
  - type: text
    text: Souviens-toi de moi, mon Dieu, à cause de cela, mon Dieu, et aie pitié de moi conformément à ta grande bonté!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'A la même époque encore, j''ai vu des Juifs qui avaient installé chez eux des femmes asdodiennes, ammonites, moabites. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'La moitié de leurs fils parlaient l''asdodien mais ne savaient pas parler la langue des Juifs: c''était comme une langue étrangère pour eux. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Je leur ai adressé des reproches et les ai menacés de malédictions. J''ai frappé quelques-uns de ces hommes, leur ai arraché des cheveux et leur ai fait prêter serment au nom de Dieu en disant: «Vous ne donnerez pas vos filles en mariage à leurs fils et vous ne prendrez leurs filles comme épouses ni pour vos fils ni pour vous. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'N''est-ce pas à cause de cela que Salomon, le roi d''Israël, a péché? Aucun roi n''était son pareil, parmi toutes les nations. Il était aimé de son Dieu et Dieu l''avait établi roi sur tout Israël. Pourtant, même lui, les femmes étrangères l''ont amené à pécher. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Nous faut-il donc apprendre que vous commettez un aussi grand crime et que vous faites preuve d'infidélité envers notre Dieu en installant chez vous des femmes étrangères?»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Un des fils de Jojada, le fils du grand-prêtre Eliashib, était le gendre de Sanballat, le Horonite: je l''ai chassé loin de moi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Souviens-toi d'eux, mon Dieu, car ils ont sali la fonction de prêtre et l'alliance contractée par les prêtres et les Lévites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ainsi donc, je les ai purifiés de tout étranger, j''ai réinstauré le service des prêtres et des Lévites, chacun dans son activité, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: et j'ai rétabli l'offrande de bois aux moments fixés ainsi que celle des premières récoltes.
- type: usfm
  marker: p
  children:
  - type: text
    text: Souviens-toi de moi pour mon bien, mon Dieu!
