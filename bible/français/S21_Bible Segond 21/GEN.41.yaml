document_id: GEN.41,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Joseph devant le pharaon
  - type: text
    content: 'Au bout de 2 ans, le pharaon fit un rêve dans lequel il se tenait près du fleuve. '
  '10':
  - type: text
    content: 'Le pharaon s''était irrité contre ses serviteurs, et il m''avait fait mettre en prison dans la maison du chef des gardes, ainsi que le chef des boulangers. '
  '11':
  - type: text
    content: 'Nous avons tous les deux fait un rêve au cours d''une même nuit, et chacun de nous a reçu une explication en rapport avec le rêve qu''il avait fait. '
  '12':
  - type: text
    content: 'Il y avait là avec nous un jeune Hébreu, un esclave du chef des gardes. Nous lui avons raconté nos rêves et il nous les a expliqués. '
  '13':
  - type: text
    content: 'Tout s''est produit conformément à l''explication qu''il nous avait donnée: le pharaon m''a rétabli dans mes fonctions et a fait pendre le chef des boulangers.»'
  '14':
  - type: text
    content: 'Le pharaon fit appeler Joseph. On s''empressa de le faire sortir de prison. Il se rasa, changea de vêtements et se rendit vers le pharaon. '
  '15':
  - type: text
    content: 'Le pharaon dit à Joseph: «J''ai fait un rêve. Personne ne peut l''expliquer, et j''ai appris à ton sujet que tu peux expliquer un rêve après l''avoir entendu.» '
  '16':
  - type: text
    content: 'Joseph répondit au pharaon: «Ce n''est pas moi, c''est Dieu qui donnera une réponse favorable au pharaon.»'
  '17':
  - type: text
    content: 'Le pharaon dit alors à Joseph: «Dans mon rêve, je me tenais sur le bord du fleuve. '
  '18':
  - type: text
    content: 'Alors sept vaches grasses et belles sont sorties du fleuve et se sont mises à brouter dans la prairie. '
  '19':
  - type: text
    content: 'Sept autres vaches sont sorties après elles, maigres, très laides et décharnées; je n''en ai pas vu d''aussi laides dans toute l''Egypte. '
  '2':
  - type: text
    content: 'Alors sept vaches belles et grasses sortirent du fleuve et se mirent à brouter dans la prairie. '
  '20':
  - type: text
    content: 'Les vaches décharnées et laides ont mangé les sept premières vaches qui étaient grasses. '
  '21':
  - type: text
    content: 'Elles les ont englouties dans leur ventre sans qu''on s''aperçoive qu''elles y étaient entrées: leur apparence était aussi laide qu''avant. Puis je me suis réveillé. '
  '22':
  - type: text
    content: 'J''ai vu encore en rêve sept épis pleins et beaux qui montaient sur une même tige. '
  '23':
  - type: text
    content: 'Sept épis vides, maigres, brûlés par le vent d''est, ont poussé après eux. '
  '24':
  - type: text
    content: Les épis maigres ont englouti les sept beaux épis. Je l'ai dit aux magiciens, mais personne ne m'a donné l'explication.»
  '25':
  - type: text
    content: 'Joseph dit au pharaon: «Ce qu''a rêvé le pharaon correspond à un seul événement. Dieu a révélé au pharaon ce qu''il va faire. '
  '26':
  - type: text
    content: 'Les sept belles vaches sont sept années, et les sept beaux épis aussi: c''est un seul rêve. '
  '27':
  - type: text
    content: 'Les sept vaches décharnées et laides sorties après les premières sont sept années, tout comme les sept épis vides brûlés par le vent d''est. Ce sont sept années de famine. '
  '28':
  - type: text
    content: 'C''est comme je viens de le dire au pharaon, Dieu montre au pharaon ce qu''il va faire: '
  '29':
  - type: text
    content: 'il y aura sept années de grande abondance dans toute l''Egypte; '
  '3':
  - type: text
    content: 'Sept autres vaches laides et maigres sortirent du fleuve après elles et se tinrent à côté d''elles au bord du fleuve. '
  '30':
  - type: text
    content: 'sept années de famine les suivront, et l''on oubliera toute cette abondance en Egypte. La famine détruira le pays. '
  '31':
  - type: text
    content: 'Cette famine qui suivra sera si forte qu''on ne s''apercevra plus de l''abondance dans le pays. '
  '32':
  - type: text
    content: 'Si le pharaon a vu le rêve se répéter, c''est que la décision est ferme de la part de Dieu et qu''il la mettra rapidement en œuvre. '
  '33':
  - type: text
    content: 'Maintenant, que le pharaon choisisse un homme intelligent et sage et qu''il le mette à la tête de l''Egypte. '
  '34':
  - type: text
    content: 'Que le pharaon établisse des commissaires sur le pays pour prélever un cinquième des récoltes de l''Egypte pendant les sept années d''abondance. '
  '35':
  - type: text
    content: 'Qu''ils rassemblent tous les produits de ces bonnes années à venir, qu''ils amassent, sous l''autorité du pharaon, du blé et des vivres dans les villes et qu''ils en aient la garde. '
  '36':
  - type: text
    content: Ces provisions formeront une réserve pour le pays, pour les sept années de famine qui frapperont l'Egypte, afin que le pays ne soit pas détruit par la famine.»
  - type: heading
    content: Joseph gouverneur de l'Egypte
  '37':
  - type: text
    content: 'Ces paroles plurent au pharaon et à tous ses serviteurs. '
  '38':
  - type: text
    content: 'Le pharaon dit à ses serviteurs: «Pourrions-nous trouver un homme tel que celui-ci, qui a en lui l''Esprit de Dieu?» '
  '39':
  - type: text
    content: 'Et le pharaon dit à Joseph: «Puisque Dieu t''a fait connaître tout cela, il n''y a personne qui soit aussi intelligent et aussi sage que toi. '
  '4':
  - type: text
    content: Les vaches laides et maigres mangèrent les sept vaches belles et grasses. Puis le pharaon se réveilla.
  '40':
  - type: text
    content: 'Tu seras responsable de ma maison et tout mon peuple obéira à tes ordres. Le trône seul m''élèvera au-dessus de toi.» '
  '41':
  - type: text
    content: 'Le pharaon dit à Joseph: «Vois, je te donne le commandement de toute l''Egypte.» '
  '42':
  - type: text
    content: 'Le pharaon retira l''anneau de son doigt et le passa au doigt de Joseph. Il lui donna des habits en fin lin et lui mit un collier d''or au cou. '
  '43':
  - type: text
    content: 'Il le fit monter sur le char qui suivait le sien et l''on criait devant lui: «A genoux!» C''est ainsi que le pharaon lui donna le commandement de toute l''Egypte. '
  '44':
  - type: text
    content: 'Il dit encore à Joseph: «C''est moi qui suis le pharaon, mais sans ton accord personne ne lèvera la main ni le pied dans toute l''Egypte.»'
  '45':
  - type: text
    content: Le pharaon appela Joseph Tsaphnath-Paenéach
  - type: note
    content: 'Tsaphnath-Paenéach: littéralement celui qui découvre des choses cachées.'
  - type: text
    content: ' et lui donna pour femme Asnath, fille de Poti-Phéra, le prêtre d''On'
  - type: note
    content: 'On: ville de la Basse-Egypte qui était le centre du culte du soleil.'
  - type: text
    content: '. Joseph partit pour visiter l''Egypte. '
  '46':
  - type: text
    content: Il était âgé de 30 ans lorsqu'il se présenta devant le pharaon, le roi d'Egypte. Il quitta le pharaon et parcourut toute l'Egypte.
  '47':
  - type: text
    content: 'Pendant les sept années de fertilité, la terre rapporta abondamment. '
  '48':
  - type: text
    content: 'Joseph rassembla tous les produits de ces sept années en Egypte. Il entreposa des vivres dans les villes en mettant à l''intérieur de chaque ville les produits des campagnes environnantes. '
  '49':
  - type: text
    content: 'Joseph amassa du blé comme le sable de la mer: en quantité si considérable que l''on cessa de compter parce qu''il n''y avait plus de nombre.'
  - type: heading
    content: Naissance de Manassé et d'Ephraïm
  '5':
  - type: text
    content: 'Il se rendormit et fit un second rêve: sept épis gros et beaux montaient sur une même tige. '
  '50':
  - type: text
    content: 'Avant les années de famine, Joseph eut deux fils que lui donna Asnath, fille de Poti-Phéra, le prêtre d''On. '
  '51':
  - type: text
    content: 'Joseph appela l''aîné Manassé, car, dit-il, «Dieu m''a fait oublier toutes mes peines et toute ma famille.» '
  '52':
  - type: text
    content: Et il appela le second Ephraïm, car, dit-il, «Dieu m'a donné des enfants dans le pays de mon malheur.»
  '53':
  - type: text
    content: 'Les sept années d''abondance qu''il y eut en Egypte passèrent, '
  '54':
  - type: text
    content: 'et les sept années de famine commencèrent à venir, comme Joseph l''avait annoncé. La famine régna dans tous les pays, mais dans toute l''Egypte il y avait du pain. '
  '55':
  - type: text
    content: 'Quand toute l''Egypte commença aussi à avoir faim, le peuple cria au pharaon pour avoir du pain. Le pharaon dit à tous les Egyptiens: «Allez vers Joseph et faites ce qu''il vous dira.» '
  '56':
  - type: text
    content: 'La famine régnait sur tout le pays. Joseph ouvrit tous les centres d''approvisionnement et vendit du blé aux Egyptiens, car la famine était forte en Egypte. '
  '57':
  - type: text
    content: On arrivait de tous les pays en Egypte pour acheter du blé à Joseph, car la famine était forte partout.
  '6':
  - type: text
    content: 'Sept épis maigres et brûlés par le vent d''est poussèrent après eux. '
  '7':
  - type: text
    content: 'Les épis maigres engloutirent les sept épis gros et pleins. Puis le pharaon se réveilla. Voilà quel était le rêve. '
  '8':
  - type: text
    content: Le matin, le pharaon eut l'esprit troublé et il fit appeler tous les magiciens et tous les sages de l'Egypte. Il leur raconta ses rêves, mais personne ne put les lui expliquer.
  '9':
  - type: text
    content: 'Alors le grand responsable des boissons prit la parole et dit au pharaon: «Je vais rappeler aujourd''hui le souvenir de ma faute. '
