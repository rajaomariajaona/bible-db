document_id: GEN.41
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joseph devant le pharaon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Au bout de 2 ans, le pharaon fit un rêve dans lequel il se tenait près du fleuve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alors sept vaches belles et grasses sortirent du fleuve et se mirent à brouter dans la prairie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Sept autres vaches laides et maigres sortirent du fleuve après elles et se tinrent à côté d''elles au bord du fleuve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les vaches laides et maigres mangèrent les sept vaches belles et grasses. Puis le pharaon se réveilla.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il se rendormit et fit un second rêve: sept épis gros et beaux montaient sur une même tige. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Sept épis maigres et brûlés par le vent d''est poussèrent après eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les épis maigres engloutirent les sept épis gros et pleins. Puis le pharaon se réveilla. Voilà quel était le rêve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le matin, le pharaon eut l'esprit troublé et il fit appeler tous les magiciens et tous les sages de l'Egypte. Il leur raconta ses rêves, mais personne ne put les lui expliquer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors le grand responsable des boissons prit la parole et dit au pharaon: «Je vais rappeler aujourd''hui le souvenir de ma faute. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le pharaon s''était irrité contre ses serviteurs, et il m''avait fait mettre en prison dans la maison du chef des gardes, ainsi que le chef des boulangers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nous avons tous les deux fait un rêve au cours d''une même nuit, et chacun de nous a reçu une explication en rapport avec le rêve qu''il avait fait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il y avait là avec nous un jeune Hébreu, un esclave du chef des gardes. Nous lui avons raconté nos rêves et il nous les a expliqués. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tout s''est produit conformément à l''explication qu''il nous avait donnée: le pharaon m''a rétabli dans mes fonctions et a fait pendre le chef des boulangers.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Le pharaon fit appeler Joseph. On s''empressa de le faire sortir de prison. Il se rasa, changea de vêtements et se rendit vers le pharaon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le pharaon dit à Joseph: «J''ai fait un rêve. Personne ne peut l''expliquer, et j''ai appris à ton sujet que tu peux expliquer un rêve après l''avoir entendu.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Joseph répondit au pharaon: «Ce n''est pas moi, c''est Dieu qui donnera une réponse favorable au pharaon.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le pharaon dit alors à Joseph: «Dans mon rêve, je me tenais sur le bord du fleuve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors sept vaches grasses et belles sont sorties du fleuve et se sont mises à brouter dans la prairie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Sept autres vaches sont sorties après elles, maigres, très laides et décharnées; je n''en ai pas vu d''aussi laides dans toute l''Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les vaches décharnées et laides ont mangé les sept premières vaches qui étaient grasses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Elles les ont englouties dans leur ventre sans qu''on s''aperçoive qu''elles y étaient entrées: leur apparence était aussi laide qu''avant. Puis je me suis réveillé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'J''ai vu encore en rêve sept épis pleins et beaux qui montaient sur une même tige. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Sept épis vides, maigres, brûlés par le vent d''est, ont poussé après eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Les épis maigres ont englouti les sept beaux épis. Je l'ai dit aux magiciens, mais personne ne m'a donné l'explication.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Joseph dit au pharaon: «Ce qu''a rêvé le pharaon correspond à un seul événement. Dieu a révélé au pharaon ce qu''il va faire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Les sept belles vaches sont sept années, et les sept beaux épis aussi: c''est un seul rêve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Les sept vaches décharnées et laides sorties après les premières sont sept années, tout comme les sept épis vides brûlés par le vent d''est. Ce sont sept années de famine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'C''est comme je viens de le dire au pharaon, Dieu montre au pharaon ce qu''il va faire: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'il y aura sept années de grande abondance dans toute l''Egypte; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'sept années de famine les suivront, et l''on oubliera toute cette abondance en Egypte. La famine détruira le pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Cette famine qui suivra sera si forte qu''on ne s''apercevra plus de l''abondance dans le pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Si le pharaon a vu le rêve se répéter, c''est que la décision est ferme de la part de Dieu et qu''il la mettra rapidement en œuvre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Maintenant, que le pharaon choisisse un homme intelligent et sage et qu''il le mette à la tête de l''Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Que le pharaon établisse des commissaires sur le pays pour prélever un cinquième des récoltes de l''Egypte pendant les sept années d''abondance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Qu''ils rassemblent tous les produits de ces bonnes années à venir, qu''ils amassent, sous l''autorité du pharaon, du blé et des vivres dans les villes et qu''ils en aient la garde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Ces provisions formeront une réserve pour le pays, pour les sept années de famine qui frapperont l'Egypte, afin que le pays ne soit pas détruit par la famine.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joseph gouverneur de l'Egypte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ces paroles plurent au pharaon et à tous ses serviteurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Le pharaon dit à ses serviteurs: «Pourrions-nous trouver un homme tel que celui-ci, qui a en lui l''Esprit de Dieu?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Et le pharaon dit à Joseph: «Puisque Dieu t''a fait connaître tout cela, il n''y a personne qui soit aussi intelligent et aussi sage que toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Tu seras responsable de ma maison et tout mon peuple obéira à tes ordres. Le trône seul m''élèvera au-dessus de toi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Le pharaon dit à Joseph: «Vois, je te donne le commandement de toute l''Egypte.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Le pharaon retira l''anneau de son doigt et le passa au doigt de Joseph. Il lui donna des habits en fin lin et lui mit un collier d''or au cou. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Il le fit monter sur le char qui suivait le sien et l''on criait devant lui: «A genoux!» C''est ainsi que le pharaon lui donna le commandement de toute l''Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Il dit encore à Joseph: «C''est moi qui suis le pharaon, mais sans ton accord personne ne lèvera la main ni le pied dans toute l''Egypte.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Le pharaon appela Joseph Tsaphnath-Paenéach
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.45 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tsaphnath-Paenéach: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: littéralement celui qui découvre des choses cachées.
    marker-yv: yv-n
  - type: text
    text: ' et lui donna pour femme Asnath, fille de Poti-Phéra, le prêtre d''On'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.45 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'On: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ville de la Basse-Egypte qui était le centre du culte du soleil.
    marker-yv: yv-n
  - type: text
    text: '. Joseph partit pour visiter l''Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Il était âgé de 30 ans lorsqu'il se présenta devant le pharaon, le roi d'Egypte. Il quitta le pharaon et parcourut toute l'Egypte.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Pendant les sept années de fertilité, la terre rapporta abondamment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Joseph rassembla tous les produits de ces sept années en Egypte. Il entreposa des vivres dans les villes en mettant à l''intérieur de chaque ville les produits des campagnes environnantes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Joseph amassa du blé comme le sable de la mer: en quantité si considérable que l''on cessa de compter parce qu''il n''y avait plus de nombre.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Naissance de Manassé et d'Ephraïm
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Avant les années de famine, Joseph eut deux fils que lui donna Asnath, fille de Poti-Phéra, le prêtre d''On. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Joseph appela l''aîné Manassé, car, dit-il, «Dieu m''a fait oublier toutes mes peines et toute ma famille.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Et il appela le second Ephraïm, car, dit-il, «Dieu m'a donné des enfants dans le pays de mon malheur.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Les sept années d''abondance qu''il y eut en Egypte passèrent, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'et les sept années de famine commencèrent à venir, comme Joseph l''avait annoncé. La famine régna dans tous les pays, mais dans toute l''Egypte il y avait du pain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Quand toute l''Egypte commença aussi à avoir faim, le peuple cria au pharaon pour avoir du pain. Le pharaon dit à tous les Egyptiens: «Allez vers Joseph et faites ce qu''il vous dira.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'La famine régnait sur tout le pays. Joseph ouvrit tous les centres d''approvisionnement et vendit du blé aux Egyptiens, car la famine était forte en Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: On arrivait de tous les pays en Egypte pour acheter du blé à Joseph, car la famine était forte partout.
