document_id: PSA.41,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière d'un homme trahi par son ami
  - type: text
    content: Au chef de chœur. Psaume de David.
  '10':
  - type: text
    content: Même celui avec qui j'étais en paix,
  - type: text
    content: en qui j'avais confiance et *qui mangeait mon pain,
  - type: text
    content: lève le talon contre moi
  - type: note
    content: 'Qui mangeait… contre moi: cité en Jean 13.18 par Jésus à propos de la trahison de Judas.'
  - type: text
    content: .
  '11':
  - type: text
    content: Mais toi, Eternel, aie pitié de moi et relève-moi,
  - type: text
    content: et je leur rendrai ce qu'ils méritent.
  '12':
  - type: text
    content: Je saurai que tu m'aimes,
  - type: text
    content: si mon ennemi ne triomphe pas de moi.
  '13':
  - type: text
    content: Tu m'as soutenu à cause de mon intégrité,
  - type: text
    content: et tu m'établis pour toujours dans ta présence.
  '14':
  - type: text
    content: Béni soit l'Eternel, le Dieu d'Israël, d'éternité en éternité. Amen! Amen!
  '2':
  - type: text
    content: Heureux celui qui se soucie du pauvre!
  - type: text
    content: Le jour du malheur, l'Eternel le délivre,
  '3':
  - type: text
    content: l'Eternel le garde et lui conserve la vie.
  - type: text
    content: Il est heureux sur la terre,
  - type: text
    content: et tu ne le livres pas au pouvoir de ses ennemis.
  '4':
  - type: text
    content: L'Eternel le soutient sur son lit de souffrance,
  - type: text
    content: il le soulage dans toutes ses maladies.
  '5':
  - type: text
    content: 'Je dis: «Eternel, aie pitié de moi,'
  - type: text
    content: guéris mon âme, car j'ai péché contre toi.»
  '6':
  - type: text
    content: 'Mes ennemis disent méchamment de moi:'
  - type: text
    content: «Quand mourra-t-il? Quand s'éteindra son nom?»
  '7':
  - type: text
    content: Si quelqu'un vient me voir, il adopte un langage faux;
  - type: text
    content: il récolte des sujets de médire,
  - type: text
    content: puis il s'en va et en parle à l'extérieur.
  '8':
  - type: text
    content: Tous mes ennemis chuchotent entre eux contre moi,
  - type: text
    content: 'ils méditent sur mon malheur:'
  '9':
  - type: text
    content: «Il est gravement atteint.
  - type: text
    content: Le voilà couché, il ne se relèvera pas.»
