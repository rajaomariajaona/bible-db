document_id: PSA.41
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière d'un homme trahi par son ami
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Heureux celui qui se soucie du pauvre!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le jour du malheur, l'Eternel le délivre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: l'Eternel le garde et lui conserve la vie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est heureux sur la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu ne le livres pas au pouvoir de ses ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: L'Eternel le soutient sur son lit de souffrance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il le soulage dans toutes ses maladies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je dis: «Eternel, aie pitié de moi,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: guéris mon âme, car j'ai péché contre toi.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mes ennemis disent méchamment de moi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Quand mourra-t-il? Quand s'éteindra son nom?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Si quelqu'un vient me voir, il adopte un langage faux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il récolte des sujets de médire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puis il s'en va et en parle à l'extérieur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tous mes ennemis chuchotent entre eux contre moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ils méditent sur mon malheur:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: «Il est gravement atteint.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le voilà couché, il ne se relèvera pas.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Même celui avec qui j'étais en paix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: en qui j'avais confiance et *qui mangeait mon pain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lève le talon contre moi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Qui mangeait… contre moi: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jean 13.18
      metadata:
        usfm: JHN.13.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' par Jésus à propos de la trahison de Judas.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mais toi, Eternel, aie pitié de moi et relève-moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je leur rendrai ce qu'ils méritent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je saurai que tu m'aimes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si mon ennemi ne triomphe pas de moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tu m'as soutenu à cause de mon intégrité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu m'établis pour toujours dans ta présence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Béni soit l'Eternel, le Dieu d'Israël, d'éternité en éternité. Amen! Amen!
