document_id: GEN.20,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Séjour d'Abraham à Guérar
  - type: text
    content: 'Abraham partit de là pour la région du Néguev. Il s''installa entre Kadès et Shur et fit un séjour à Guérar. '
  '10':
  - type: text
    content: 'Abimélec dit encore à Abraham: «Quelle intention avais-tu pour agir ainsi?» '
  '11':
  - type: text
    content: 'Abraham répondit: «Je me disais qu''il n''y avait sans doute aucune crainte de Dieu dans ce pays et que l''on me tuerait à cause de ma femme. '
  '12':
  - type: text
    content: 'De plus, il est vrai qu''elle est ma sœur, puisqu''elle est la fille de mon père; seulement, elle n''est pas la fille de ma mère et elle est devenue ma femme. '
  '13':
  - type: text
    content: 'Lorsque Dieu m''a fait errer loin de ma famille, j''ai dit à Sara: ‘Voici l''acte de bonté dont tu pourras faire preuve envers moi: partout où nous irons, présente-moi comme ton frère.’»'
  '14':
  - type: text
    content: 'Abimélec prit des brebis et des bœufs, des serviteurs et des servantes, et il les donna à Abraham. De plus, il lui rendit sa femme Sara '
  '15':
  - type: text
    content: 'en disant: «Mon pays est devant toi. Installe-toi où il te plaira.» '
  '16':
  - type: text
    content: 'Quant à Sara, il lui dit: «Je donne à ton frère 1000 pièces d''argent. Ce sera pour toi comme un voile sur les yeux pour tous ceux qui sont avec toi. Ainsi, ton innocence sera prouvée devant tous.»'
  '17':
  - type: text
    content: 'Abraham pria Dieu, et Dieu guérit Abimélec, sa femme et ses servantes, de sorte qu''elles purent avoir des enfants. '
  '18':
  - type: text
    content: En effet, l'Eternel avait frappé de stérilité tout le foyer d'Abimélec à cause de Sara, la femme d'Abraham.
  '2':
  - type: text
    content: 'Abraham disait à propos de sa femme Sara: «C''est ma sœur.» Abimélec, roi de Guérar, fit enlever Sara. '
  '3':
  - type: text
    content: 'Alors Dieu apparut à Abimélec dans un rêve pendant la nuit et lui dit: «Tu vas mourir à cause de la femme que tu as enlevée, car elle est mariée.» '
  '4':
  - type: text
    content: 'Abimélec, qui ne s''était pas encore approché d''elle, répondit: «Seigneur, détruirais-tu même une nation juste? '
  '5':
  - type: text
    content: 'Ne m''a-t-il pas dit qu''elle était sa sœur et elle-même n''a-t-elle pas dit qu''il était son frère? C''est avec un cœur intègre et des mains innocentes que j''ai agi.» '
  '6':
  - type: text
    content: 'Dieu lui dit dans son rêve: «Je sais moi aussi que tu as agi avec un cœur intègre, si bien que je t''ai moi-même empêché de pécher contre moi. Voilà pourquoi je n''ai pas permis que tu la touches. '
  '7':
  - type: text
    content: Maintenant, rends la femme de cet homme, car c'est un prophète. Il priera pour toi et tu vivras. Mais, si tu ne la rends pas, sache que tu mourras, toi et tout ce qui t'appartient.»
  '8':
  - type: text
    content: 'Abimélec se leva de bon matin, appela tous ses serviteurs et leur raconta toute l''affaire. Ces gens furent alors saisis d''une grande frayeur. '
  '9':
  - type: text
    content: 'Abimélec appela aussi Abraham et lui dit: «Qu''est-ce que tu nous as fait? Quel péché ai-je commis contre toi pour que tu fasses venir sur moi et sur mon royaume un si grand péché? Tu as commis envers moi des actes qui ne doivent pas se commettre.» '
