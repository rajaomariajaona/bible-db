document_id: LEV.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le sacrifice d'expiation
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Transmets ces instructions aux Israélites: Lorsque quelqu''un péchera involontairement contre l''un des commandements de l''Eternel en faisant des choses qui ne doivent pas se faire, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: si c'est le prêtre consacré par onction
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le prêtre consacré par onction: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'c''est-à-dire le grand-prêtre (voir '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16.32'
      metadata:
        usfm: LEV.16.32
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 29.7
      metadata:
        usfm: EXO.29.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' qui a péché et a rendu par là le peuple coupable, il offrira à l''Eternel, en sacrifice d''expiation pour le péché qu''il a commis, un jeune taureau sans défaut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il amènera le taureau à l''entrée de la tente de la rencontre, devant l''Eternel. Il posera sa main sur la tête du taureau et l''égorgera devant l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le prêtre consacré par onction prendra du sang du taureau et l''apportera dans la tente de la rencontre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il trempera son doigt dans le sang et il en fera 7 fois l''aspersion devant l''Eternel, en face du voile du sanctuaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le prêtre mettra du sang sur les cornes de l''autel des parfums odoriférants, qui est devant l''Eternel dans la tente de la rencontre. Il versera tout le sang du taureau au pied de l''autel des holocaustes, qui est à l''entrée de la tente de la rencontre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il enlèvera toute la graisse du taureau expiatoire, la graisse qui couvre les entrailles et toute celle qui y est attachée, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'les deux rognons et la graisse qui les entoure, qui couvre les flancs, et le grand lobe du foie, qu''il détachera près des rognons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le prêtre enlèvera ces parties comme on les enlève du taureau dans le sacrifice de communion et il les brûlera sur l''autel des holocaustes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mais la peau du taureau, toute sa viande avec sa tête, ses pattes, ses entrailles et ses excréments, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: le taureau entier, il l'emportera à l'extérieur du camp, dans un endroit pur où l'on jette les cendres, et il le brûlera au feu sur du bois; c'est sur le tas de cendres qu'on le brûlera.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '»Si c''est toute l''assemblée d''Israël qui a péché involontairement, si sans y prêter attention elle a fait contre l''un des commandements de l''Eternel des choses qui ne doivent pas se faire et s''est ainsi rendue coupable, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'et si le péché commis vient à être découvert, l''assemblée offrira un jeune taureau en sacrifice d''expiation et on l''amènera devant la tente de la rencontre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les anciens d''Israël poseront leurs mains sur la tête du taureau devant l''Eternel et l''on égorgera le taureau devant l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le prêtre consacré par onction apportera du sang du taureau dans la tente de la rencontre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il trempera son doigt dans le sang et il en fera 7 fois l''aspersion devant l''Eternel, en face du voile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il mettra du sang sur les cornes de l''autel qui est devant l''Eternel dans la tente de la rencontre. Puis il versera tout le sang au pied de l''autel des holocaustes, qui est à l''entrée de la tente de la rencontre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il enlèvera toute la graisse du taureau et la brûlera sur l''autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il procédera avec ce taureau exactement comme pour le taureau expiatoire. C''est ainsi que le prêtre fera l''expiation pour eux, et le pardon leur sera accordé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Il emportera le taureau à l'extérieur du camp et il le brûlera comme le premier taureau. C'est un sacrifice d'expiation pour l'assemblée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '»Si c''est un chef qui a péché, s''il a fait involontairement contre l''un des commandements de l''Eternel, son Dieu, des choses qui ne doivent pas se faire et s''est ainsi rendu coupable, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'et s''il vient à découvrir le péché qu''il a commis, il offrira en sacrifice un bouc mâle sans défaut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il posera sa main sur la tête du bouc et l''égorgera à l''endroit où l''on égorge les holocaustes devant l''Eternel. C''est un sacrifice d''expiation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Le prêtre prendra avec son doigt du sang de la victime expiatoire, il en mettra sur les cornes de l''autel des holocaustes et il versera le sang au pied de l''autel des holocaustes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Il brûlera toute la graisse sur l'autel, comme la graisse du sacrifice de communion. C'est ainsi que le prêtre fera pour ce chef l'expiation de son péché, et le pardon lui sera accordé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '»Si c''est quelqu''un du peuple qui a péché involontairement en faisant contre l''un des commandements de l''Eternel des choses qui ne doivent pas se faire et en se rendant ainsi coupable, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'et s''il vient à découvrir le péché qu''il a commis, il offrira en sacrifice une chèvre, une femelle sans défaut, pour le péché qu''il a commis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Il posera sa main sur la tête de la victime expiatoire et l''égorgera à l''endroit où l''on égorge les holocaustes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Le prêtre prendra avec son doigt du sang de la victime, il en mettra sur les cornes de l''autel des holocaustes et il versera tout le sang au pied de l''autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Le prêtre enlèvera toute la graisse, comme on enlève la graisse du sacrifice de communion, et il la brûlera sur l'autel; son odeur sera agréable à l'Eternel. C'est ainsi que le prêtre fera l'expiation pour cet homme, et le pardon lui sera accordé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '»Si c''est un agneau qu''il offre en sacrifice d''expiation, il offrira une femelle sans défaut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Il posera sa main sur la tête de la victime et l''égorgera en sacrifice d''expiation à l''endroit où l''on égorge les holocaustes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Le prêtre prendra avec son doigt du sang de la victime, il en mettra sur les cornes de l''autel des holocaustes et il versera tout le sang au pied de l''autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Le prêtre enlèvera toute la graisse comme on enlève la graisse de l'agneau dans le sacrifice de communion, et il la brûlera sur l'autel comme un sacrifice passé par le feu pour l'Eternel. C'est ainsi que le prêtre fera pour cet homme l'expiation du péché qu'il a commis, et le pardon lui sera accordé.
