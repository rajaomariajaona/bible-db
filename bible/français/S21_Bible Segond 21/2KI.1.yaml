document_id: 2KI.1,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Jusqu'à la chute du royaume d'Israël
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 1.1–17.41
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Maladie et mort d'Achazia, le roi d'Israël
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Les Moabites se révoltèrent contre Israël après la mort d''Achab. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Elie répondit au chef de cinquantaine: «Si je suis un homme de Dieu, que le feu descende du ciel et te dévore, toi et tes 50 hommes!» Et le feu descendit du ciel et le dévora, lui et ses 50 hommes.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Achazia envoya de nouveau vers lui un chef de cinquantaine avec ses 50 hommes. Ce chef prit la parole et dit à Elie: «Homme de Dieu, voici ce que dit le roi: ‘Dépêche-toi de descendre!’» '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Elie leur répondit: «Si je suis un homme de Dieu, que le feu descende du ciel et te dévore, toi et tes 50 hommes!» Et le feu de Dieu descendit du ciel et le dévora, lui et ses 50 hommes.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Achazia envoya encore un troisième chef de cinquantaine avec ses 50 hommes. Ce troisième chef de cinquantaine monta vers Elie et, à son arrivée, il plia les genoux devant lui et lui demanda grâce en disant: «Homme de Dieu, veuille accorder un peu de valeur à ma vie et à celle de ces 50 hommes, tes serviteurs! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Le feu est descendu du ciel et a dévoré les deux premiers chefs de cinquantaine et leurs 50 hommes. Mais maintenant, veuille accorder un peu de valeur à ma vie!»
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'L''ange de l''Eternel dit à Elie: «Descends avec lui, n''aie pas peur de lui!» Elie se leva et descendit avec ce chef vers le roi. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Il lui annonça: «Voici ce que dit l''Eternel: Parce que tu as envoyé des messagers consulter Baal-Zebub, le dieu d''Ekron, comme s''il n''y avait pas, en Israël, de Dieu dont on puisse consulter la parole, tu ne redescendras pas du lit sur lequel tu es monté, car tu mourras.»'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Achazia mourut, conformément à la parole de l'Eternel prononcée par Elie. Comme il n'avait pas de fils, son frère Joram devint roi à sa place. Cela se passa la deuxième année du règne de Joram, le fils de Josaphat, sur Juda.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Le reste des actes d'Achazia, ce qu'il a accompli, cela est décrit dans les annales des rois d'Israël.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Achazia tomba par le treillis de sa chambre à l''étage, à Samarie, et il se blessa gravement. Il fit partir des messagers en leur disant: «Allez consulter Baal-Zebub, le dieu d''Ekron, pour savoir si je guérirai de cette blessure.» '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Mais l''ange de l''Eternel dit à Elie le Thishbite: «Lève-toi, monte à la rencontre des messagers du roi de Samarie et dis-leur: ‘Est-ce parce qu''il n''y a pas de Dieu en Israël que vous allez consulter Baal-Zebub, le dieu d''Ekron? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'C''est pourquoi, voici ce que dit l''Eternel: Tu ne redescendras pas du lit sur lequel tu es monté, car tu mourras.’» Puis Elie s''en alla.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Les messagers retournèrent vers Achazia, qui leur demanda: «Pourquoi revenez-vous?» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ils lui répondirent: «Un homme est monté à notre rencontre et nous a dit: ‘Allez-y, retournez vers le roi qui vous a envoyés et annoncez-lui: Voici ce que dit l''Eternel: Est-ce parce qu''il n''y a pas de Dieu en Israël que tu envoies consulter Baal-Zebub, le dieu d''Ekron? C''est pourquoi tu ne redescendras pas du lit sur lequel tu es monté, car tu mourras.’» '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Achazia leur demanda: «Quel air avait l''homme qui est monté à votre rencontre et qui vous a dit ces paroles?» '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ils lui répondirent: «C''était un homme avec un vêtement en poil et une ceinture de cuir autour de la taille.» Achazia dit alors: «C''est Elie le Thishbite.»'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Il envoya vers lui un chef de cinquantaine avec ses 50 hommes. Ce chef monta vers Elie qui était assis au sommet de la montagne. Il lui dit: «Homme de Dieu, le roi te dit: ‘Descends!’» '
