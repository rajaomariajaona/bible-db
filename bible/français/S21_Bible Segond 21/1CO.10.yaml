document_id: 1CO.10,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Exemple d'Israël dans le désert
  - type: text
    content: 'Frères et sœurs, je ne veux pas vous laisser ignorer que nos ancêtres ont tous été sous la nuée et qu''ils ont tous passé à travers la mer; '
  '10':
  - type: text
    content: 'Ne murmurez pas comme certains d''entre eux l''ont fait, de sorte qu''ils sont morts sous les coups du destructeur. '
  '11':
  - type: text
    content: 'Tous ces faits leur sont arrivés pour servir d''exemples, et ils ont été écrits pour notre instruction, à nous qui sommes parvenus à la fin des temps. '
  '12':
  - type: text
    content: Ainsi donc, que celui qui croit être debout fasse attention à ne pas tomber!
  - type: heading
    content: 'Conclusion: agir pour la gloire de Dieu'
  '13':
  - type: text
    content: Aucune tentation ne vous est survenue qui n'ait été humaine. Dieu est fidèle, et il ne permettra pas que vous soyez tentés au-delà de vos forces; mais avec la tentation il préparera aussi le moyen d'en sortir, afin que vous puissiez la supporter.
  '14':
  - type: text
    content: 'C''est pourquoi, mes bien-aimés, fuyez l''idolâtrie. '
  '15':
  - type: text
    content: 'Je vous parle comme à des personnes intelligentes; jugez vous-mêmes de ce que je dis. '
  '16':
  - type: text
    content: 'La coupe de bénédiction que nous bénissons n''est-elle pas la communion au sang de Christ? Le pain que nous rompons n''est-il pas la communion au corps de Christ? '
  '17':
  - type: text
    content: 'Puisqu''il y a un seul pain, nous qui sommes nombreux, nous formons un seul corps, car nous participons tous à un même pain. '
  '18':
  - type: text
    content: 'Voyez les Israélites: ceux qui mangent les animaux offerts en sacrifice ne sont-ils pas en communion avec l''autel? '
  '19':
  - type: text
    content: 'Que veux-je donc dire? Que la viande sacrifiée aux idoles aurait de l''importance, ou qu''une idole serait quelque chose? Pas du tout. '
  '2':
  - type: text
    content: 'ils ont tous été baptisés en Moïse dans la nuée et dans la mer, '
  '20':
  - type: text
    content: 'Mais ce que les non-Juifs sacrifient, ils le sacrifient à des démons, et non à Dieu; or, je ne veux pas que vous soyez en communion avec les démons. '
  '21':
  - type: text
    content: 'Vous ne pouvez pas boire à la coupe du Seigneur et à la coupe des démons; vous ne pouvez pas participer à la table du Seigneur et à la table des démons. '
  '22':
  - type: text
    content: Ou bien voulons-nous provoquer la jalousie du Seigneur? Sommes-nous plus forts que lui?
  '23':
  - type: text
    content: 'Tout [m'']est permis, mais tout n''est pas utile; tout [m'']est permis, mais tout n''édifie pas. '
  '24':
  - type: text
    content: 'Que personne ne cherche son propre intérêt, mais plutôt celui de l''autre. '
  '25':
  - type: text
    content: 'Mangez de tout ce qui se vend au marché sans vous poser de question par motif de conscience, '
  '26':
  - type: text
    content: car la terre avec tout ce qu'elle contient appartient au Seigneur
  - type: note
    content: 'Car la terre… Seigneur: citation du Psaume 24.1.'
  - type: text
    content: '. '
  '27':
  - type: text
    content: 'Si un non-croyant vous invite et que vous acceptiez d''y aller, mangez de tout ce qu''on vous présentera sans vous poser de question par motif de conscience. '
  '28':
  - type: text
    content: 'Mais si quelqu''un vous dit: «C''est de la viande offerte aux idoles», n''en mangez pas à cause de celui qui vous a informés et par motif de conscience. '
  '29':
  - type: text
    content: 'Je parle ici non de votre conscience, mais de celle de l''autre personne. Pourquoi, en effet, ma liberté serait-elle jugée par une conscience étrangère? '
  '3':
  - type: text
    content: 'ils ont tous mangé la même nourriture spirituelle '
  '30':
  - type: text
    content: Si moi, je mange avec reconnaissance, pourquoi devrais-je être blâmé à propos d'un aliment pour lequel je remercie Dieu?
  '31':
  - type: text
    content: 'Ainsi donc, que vous mangiez, que vous buviez ou quoi que vous fassiez, faites tout pour la gloire de Dieu. '
  '32':
  - type: text
    content: 'Ne soyez une cause de faux pas ni pour les non-Juifs, ni pour les Juifs, ni pour l''Eglise de Dieu. '
  '33':
  - type: text
    content: 'Faites comme moi: je m''efforce en tout de plaire à tous, recherchant non mon avantage mais celui du plus grand nombre afin qu''ils soient sauvés.'
  '4':
  - type: text
    content: 'et ils ont tous bu la même boisson spirituelle. En effet, ils buvaient à un rocher spirituel qui les accompagnait, et ce rocher était Christ. '
  '5':
  - type: text
    content: Mais la plupart d'entre eux n'ont pas été approuvés par Dieu, puisqu'ils sont morts dans le désert.
  '6':
  - type: text
    content: 'Or ces faits sont arrivés pour nous servir d''exemples, afin que nous n''ayons pas de mauvais désirs comme eux en ont eu. '
  '7':
  - type: text
    content: 'Ne devenez pas idolâtres comme certains d''entre eux. En effet, il est écrit: '
  - type: text
    content: Le peuple s'assit pour manger et pour boire; puis ils se levèrent pour s'amuser.
  - type: note
    content: 'Le peuple… s''amuser: citation d''Exode 32.6 et renvoi à l''épisode du veau d''or.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Ne nous livrons pas non plus à l''immoralité sexuelle comme certains d''entre eux l''ont fait, de sorte que 23''000 sont tombés en un seul jour. '
  '9':
  - type: text
    content: 'Ne provoquons pas Christ comme certains d''entre eux l''ont fait, si bien qu''ils sont morts, victimes des serpents. '
