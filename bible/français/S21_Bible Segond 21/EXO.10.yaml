document_id: EXO.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Fléau n° 8: les sauterelles'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Moïse: «Va trouver le pharaon, car j''ai moi-même rendu son cœur insensible, de même que celui de ses serviteurs, pour faire éclater mes signes miraculeux au milieu d''eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: C'est aussi pour que tu racontes à tes enfants et petits-enfants comment je suis intervenu contre les Egyptiens et quels signes miraculeux j'ai fait éclater au milieu d'eux. Vous saurez ainsi que je suis l'Eternel.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Moïse et Aaron allèrent trouver le pharaon et lui annoncèrent: «Voici ce que dit l''Eternel, le Dieu des Hébreux: Jusqu''à quand refuseras-tu de t''humilier devant moi? Laisse partir mon peuple, afin qu''il me serve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Si tu refuses de laisser partir mon peuple, je ferai venir demain des sauterelles sur tout ton territoire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Elles recouvriront la surface du sol si bien que l''on ne pourra plus le voir. Elles dévoreront tout ce qui n''a pas encore été touché, ce que la grêle vous a laissé; elles dévoreront tous les arbres qui poussent dans vos campagnes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Elles rempliront tes maisons ainsi que celles de tous tes serviteurs et celles de tous les Egyptiens. Tes parents et tes grands-parents n''auront rien vu de pareil depuis qu''ils existent jusqu''à aujourd''hui.» Moïse se détourna du pharaon et sortit de chez lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les serviteurs du pharaon lui dirent: «Jusqu''à quand cet homme sera-t-il un piège pour nous? Laisse partir ces gens et qu''ils servent l''Eternel, leur Dieu! Ne vois-tu pas encore que l''Egypte court à sa perte?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'On fit revenir Moïse et Aaron vers le pharaon: «Allez servir l''Eternel, votre Dieu, leur dit-il. Qui sont ceux qui partiront?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Moïse répondit: «Nous partirons avec nos enfants et nos vieillards, avec nos fils et nos filles, avec notre petit et notre gros bétail, car c''est pour nous une fête en l''honneur de l''Eternel.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le pharaon leur dit: «Que l''Eternel soit avec vous aussi sûrement que je vais vous laisser partir, vous et vos enfants! Attention, car le malheur est devant vous! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Non et non. Allez servir l'Eternel, mais seulement vous les hommes, puisque c'est ce que vous demandez.» Et on les chassa de chez le pharaon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L''Eternel dit à Moïse: «Tends ta main sur l''Egypte et que les sauterelles montent sur le pays. Qu''elles dévorent toute la végétation du pays, tout ce que la grêle a laissé.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Moïse tendit son bâton sur l''Egypte et l''Eternel fit souffler un vent d''est sur le pays toute cette journée-là et toute la nuit. Quand ce fut le matin, le vent d''est avait amené les sauterelles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Elles montèrent sur le pays et se posèrent sur tout le territoire de l''Egypte. Elles étaient en si grande quantité qu''il n''y avait jamais eu et qu''il n''y aura jamais rien de pareil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Elles recouvrirent toute la surface du sol au point que celui-ci fut obscurci. Elles dévorèrent toute la végétation du pays et tous les fruits des arbres, tout ce que la grêle avait laissé, et dans toute l'Egypte il ne resta aucune verdure, ni aux arbres ni à la végétation.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le pharaon se dépêcha d''appeler Moïse et Aaron et dit: «J''ai péché contre l''Eternel, votre Dieu, et contre vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Cependant, pardonne mon péché pour cette fois encore et priez l''Eternel, votre Dieu, afin qu''il éloigne ce fléau mortel de moi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Moïse sortit de chez le pharaon et pria l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L''Eternel fit souffler un vent d''ouest très fort qui emporta les sauterelles et les précipita dans la mer des Roseaux. Il ne resta pas une seule sauterelle sur tout le territoire de l''Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: L'Eternel endurcit le cœur du pharaon et celui-ci ne laissa pas partir les Israélites.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Fléau n° 9: les ténèbres'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'L''Eternel dit à Moïse: «Tends ta main vers le ciel et qu''il y ait des ténèbres sur l''Egypte, si fortes qu''on puisse les toucher.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Moïse tendit sa main vers le ciel et il y eut d''épaisses ténèbres dans toute l''Egypte pendant 3 jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Les gens ne se voyaient pas les uns les autres et personne ne bougea de sa place pendant 3 jours. En revanche, il y avait de la lumière partout où habitaient les Israélites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Le pharaon appela Moïse et dit: «Allez servir l''Eternel. Seul votre petit et votre gros bétail restera, et même vos enfants pourront vous accompagner.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Moïse répondit: «Tu mettras toi-même entre nos mains de quoi faire les sacrifices et les holocaustes que nous offrirons à l''Eternel, notre Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'De plus, nos troupeaux partiront avec nous; pas un sabot ne restera. En effet, c''est parmi eux que nous prendrons de quoi servir l''Eternel, notre Dieu, et nous ne saurons pas avant d''être arrivés là-bas ce que nous choisirons pour le service de l''Eternel.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'L''Eternel endurcit le cœur du pharaon et celui-ci ne voulut pas les laisser partir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Il dit même à Moïse: «Sors de chez moi! Veille bien à ne plus te présenter devant moi, car le jour où tu le feras, tu mourras.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: «Tu l'as dit, répliqua Moïse, je ne me présenterai plus devant toi.»
