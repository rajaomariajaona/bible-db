document_id: EXO.10,152
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Fléau n° 8: les sauterelles'
  - type: text
    content: 'L''Eternel dit à Moïse: «Va trouver le pharaon, car j''ai moi-même rendu son cœur insensible, de même que celui de ses serviteurs, pour faire éclater mes signes miraculeux au milieu d''eux. '
  '10':
  - type: text
    content: 'Le pharaon leur dit: «Que l''Eternel soit avec vous aussi sûrement que je vais vous laisser partir, vous et vos enfants! Attention, car le malheur est devant vous! '
  '11':
  - type: text
    content: Non et non. Allez servir l'Eternel, mais seulement vous les hommes, puisque c'est ce que vous demandez.» Et on les chassa de chez le pharaon.
  '12':
  - type: text
    content: 'L''Eternel dit à Moïse: «Tends ta main sur l''Egypte et que les sauterelles montent sur le pays. Qu''elles dévorent toute la végétation du pays, tout ce que la grêle a laissé.» '
  '13':
  - type: text
    content: 'Moïse tendit son bâton sur l''Egypte et l''Eternel fit souffler un vent d''est sur le pays toute cette journée-là et toute la nuit. Quand ce fut le matin, le vent d''est avait amené les sauterelles. '
  '14':
  - type: text
    content: 'Elles montèrent sur le pays et se posèrent sur tout le territoire de l''Egypte. Elles étaient en si grande quantité qu''il n''y avait jamais eu et qu''il n''y aura jamais rien de pareil. '
  '15':
  - type: text
    content: Elles recouvrirent toute la surface du sol au point que celui-ci fut obscurci. Elles dévorèrent toute la végétation du pays et tous les fruits des arbres, tout ce que la grêle avait laissé, et dans toute l'Egypte il ne resta aucune verdure, ni aux arbres ni à la végétation.
  '16':
  - type: text
    content: 'Le pharaon se dépêcha d''appeler Moïse et Aaron et dit: «J''ai péché contre l''Eternel, votre Dieu, et contre vous. '
  '17':
  - type: text
    content: 'Cependant, pardonne mon péché pour cette fois encore et priez l''Eternel, votre Dieu, afin qu''il éloigne ce fléau mortel de moi.» '
  '18':
  - type: text
    content: 'Moïse sortit de chez le pharaon et pria l''Eternel. '
  '19':
  - type: text
    content: 'L''Eternel fit souffler un vent d''ouest très fort qui emporta les sauterelles et les précipita dans la mer des Roseaux. Il ne resta pas une seule sauterelle sur tout le territoire de l''Egypte. '
  '2':
  - type: text
    content: C'est aussi pour que tu racontes à tes enfants et petits-enfants comment je suis intervenu contre les Egyptiens et quels signes miraculeux j'ai fait éclater au milieu d'eux. Vous saurez ainsi que je suis l'Eternel.»
  '20':
  - type: text
    content: L'Eternel endurcit le cœur du pharaon et celui-ci ne laissa pas partir les Israélites.
  - type: heading
    content: 'Fléau n° 9: les ténèbres'
  '21':
  - type: text
    content: 'L''Eternel dit à Moïse: «Tends ta main vers le ciel et qu''il y ait des ténèbres sur l''Egypte, si fortes qu''on puisse les toucher.» '
  '22':
  - type: text
    content: 'Moïse tendit sa main vers le ciel et il y eut d''épaisses ténèbres dans toute l''Egypte pendant 3 jours. '
  '23':
  - type: text
    content: Les gens ne se voyaient pas les uns les autres et personne ne bougea de sa place pendant 3 jours. En revanche, il y avait de la lumière partout où habitaient les Israélites.
  '24':
  - type: text
    content: 'Le pharaon appela Moïse et dit: «Allez servir l''Eternel. Seul votre petit et votre gros bétail restera, et même vos enfants pourront vous accompagner.» '
  '25':
  - type: text
    content: 'Moïse répondit: «Tu mettras toi-même entre nos mains de quoi faire les sacrifices et les holocaustes que nous offrirons à l''Eternel, notre Dieu. '
  '26':
  - type: text
    content: 'De plus, nos troupeaux partiront avec nous; pas un sabot ne restera. En effet, c''est parmi eux que nous prendrons de quoi servir l''Eternel, notre Dieu, et nous ne saurons pas avant d''être arrivés là-bas ce que nous choisirons pour le service de l''Eternel.» '
  '27':
  - type: text
    content: 'L''Eternel endurcit le cœur du pharaon et celui-ci ne voulut pas les laisser partir. '
  '28':
  - type: text
    content: 'Il dit même à Moïse: «Sors de chez moi! Veille bien à ne plus te présenter devant moi, car le jour où tu le feras, tu mourras.» '
  '29':
  - type: text
    content: «Tu l'as dit, répliqua Moïse, je ne me présenterai plus devant toi.»
  '3':
  - type: text
    content: 'Moïse et Aaron allèrent trouver le pharaon et lui annoncèrent: «Voici ce que dit l''Eternel, le Dieu des Hébreux: Jusqu''à quand refuseras-tu de t''humilier devant moi? Laisse partir mon peuple, afin qu''il me serve. '
  '4':
  - type: text
    content: 'Si tu refuses de laisser partir mon peuple, je ferai venir demain des sauterelles sur tout ton territoire. '
  '5':
  - type: text
    content: 'Elles recouvriront la surface du sol si bien que l''on ne pourra plus le voir. Elles dévoreront tout ce qui n''a pas encore été touché, ce que la grêle vous a laissé; elles dévoreront tous les arbres qui poussent dans vos campagnes. '
  '6':
  - type: text
    content: 'Elles rempliront tes maisons ainsi que celles de tous tes serviteurs et celles de tous les Egyptiens. Tes parents et tes grands-parents n''auront rien vu de pareil depuis qu''ils existent jusqu''à aujourd''hui.» Moïse se détourna du pharaon et sortit de chez lui. '
  '7':
  - type: text
    content: 'Les serviteurs du pharaon lui dirent: «Jusqu''à quand cet homme sera-t-il un piège pour nous? Laisse partir ces gens et qu''ils servent l''Eternel, leur Dieu! Ne vois-tu pas encore que l''Egypte court à sa perte?»'
  '8':
  - type: text
    content: 'On fit revenir Moïse et Aaron vers le pharaon: «Allez servir l''Eternel, votre Dieu, leur dit-il. Qui sont ceux qui partiront?» '
  '9':
  - type: text
    content: 'Moïse répondit: «Nous partirons avec nos enfants et nos vieillards, avec nos fils et nos filles, avec notre petit et notre gros bétail, car c''est pour nous une fête en l''honneur de l''Eternel.» '
