document_id: JOB.42
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Aveu par Job de son ignorance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Job répondit à l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Je reconnais que tout est possible pour toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que rien ne peut s'opposer à tes projets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ‘Qui est celui qui dissimule mes plans par un manque de savoir?’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, j'ai parlé, sans les comprendre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de merveilles qui me dépassent et que je ne connais pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ‘Ecoute-moi et je parlerai!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t'interrogerai et tu me renseigneras.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mon oreille avait entendu parler de toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais maintenant mon œil t'a vu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: C'est pourquoi je me condamne et je reconnais mes torts
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur la poussière et sur la cendre.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Retour de Job à la prospérité
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Après avoir adressé ces paroles à Job, l''Eternel dit à Eliphaz de Théman: «Je suis en colère contre toi et contre tes deux amis parce que vous n''avez pas parlé de moi correctement comme l''a fait mon serviteur Job. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Prenez maintenant 7 taureaux et 7 béliers, allez trouver mon serviteur Job et offrez un holocauste pour vous. Mon serviteur Job priera pour vous, et c'est parce que j'ai de la considération pour lui que je ne vous traiterai pas conformément à votre folie. En effet, vous n'avez pas parlé de moi correctement comme l'a fait mon serviteur Job.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Eliphaz de Théman, Bildad de Shuach et Tsophar de Naama allèrent faire comme l'Eternel leur avait dit, et l'Eternel eut de la considération pour Job.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: L'Eternel rétablit la situation de Job quand celui-ci eut prié pour ses amis; il lui accorda le double de tout ce qu'il avait possédé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Les frères, les sœurs et les anciennes connaissances de Job vinrent tous lui rendre visite, et ils mangèrent avec lui dans sa maison. Ils lui exprimèrent leur compassion et le réconfortèrent à cause de tout le malheur que l'Eternel avait fait venir sur lui. Chacun lui donna une pièce d'argent et un anneau d'or.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L''Eternel bénit la dernière partie de la vie de Job beaucoup plus que la première. Il posséda 14''000 brebis, 6000 chameaux, 1000 paires de bœufs et 1000 ânesses. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il eut aussi 7 fils et 3 filles: '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'il appela la première Jemima, la deuxième Ketsia et la troisième Kéren-Happuc. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Dans tout le pays on ne trouvait pas d'aussi belles femmes que les filles de Job. Leur père leur accorda une part d'héritage parmi leurs frères.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Job vécut après cela 140 ans, et il vit ses fils et les descendants de ses fils jusqu''à la quatrième génération. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Puis il mourut, âgé et rassasié de jours.
