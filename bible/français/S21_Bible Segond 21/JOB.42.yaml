document_id: JOB.42,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Aveu par Job de son ignorance
  - type: text
    content: 'Job répondit à l''Eternel:'
  '10':
  - type: text
    content: L'Eternel rétablit la situation de Job quand celui-ci eut prié pour ses amis; il lui accorda le double de tout ce qu'il avait possédé.
  '11':
  - type: text
    content: Les frères, les sœurs et les anciennes connaissances de Job vinrent tous lui rendre visite, et ils mangèrent avec lui dans sa maison. Ils lui exprimèrent leur compassion et le réconfortèrent à cause de tout le malheur que l'Eternel avait fait venir sur lui. Chacun lui donna une pièce d'argent et un anneau d'or.
  '12':
  - type: text
    content: 'L''Eternel bénit la dernière partie de la vie de Job beaucoup plus que la première. Il posséda 14''000 brebis, 6000 chameaux, 1000 paires de bœufs et 1000 ânesses. '
  '13':
  - type: text
    content: 'Il eut aussi 7 fils et 3 filles: '
  '14':
  - type: text
    content: 'il appela la première Jemima, la deuxième Ketsia et la troisième Kéren-Happuc. '
  '15':
  - type: text
    content: Dans tout le pays on ne trouvait pas d'aussi belles femmes que les filles de Job. Leur père leur accorda une part d'héritage parmi leurs frères.
  '16':
  - type: text
    content: 'Job vécut après cela 140 ans, et il vit ses fils et les descendants de ses fils jusqu''à la quatrième génération. '
  '17':
  - type: text
    content: Puis il mourut, âgé et rassasié de jours.
  '2':
  - type: text
    content: «Je reconnais que tout est possible pour toi
  - type: text
    content: et que rien ne peut s'opposer à tes projets.
  '3':
  - type: text
    content: ‘Qui est celui qui dissimule mes plans par un manque de savoir?’
  - type: text
    content: Oui, j'ai parlé, sans les comprendre,
  - type: text
    content: de merveilles qui me dépassent et que je ne connais pas.
  '4':
  - type: text
    content: ‘Ecoute-moi et je parlerai!
  - type: text
    content: Je t'interrogerai et tu me renseigneras.’
  '5':
  - type: text
    content: Mon oreille avait entendu parler de toi,
  - type: text
    content: mais maintenant mon œil t'a vu.
  '6':
  - type: text
    content: C'est pourquoi je me condamne et je reconnais mes torts
  - type: text
    content: sur la poussière et sur la cendre.»
  - type: heading
    content: Retour de Job à la prospérité
  '7':
  - type: text
    content: 'Après avoir adressé ces paroles à Job, l''Eternel dit à Eliphaz de Théman: «Je suis en colère contre toi et contre tes deux amis parce que vous n''avez pas parlé de moi correctement comme l''a fait mon serviteur Job. '
  '8':
  - type: text
    content: Prenez maintenant 7 taureaux et 7 béliers, allez trouver mon serviteur Job et offrez un holocauste pour vous. Mon serviteur Job priera pour vous, et c'est parce que j'ai de la considération pour lui que je ne vous traiterai pas conformément à votre folie. En effet, vous n'avez pas parlé de moi correctement comme l'a fait mon serviteur Job.»
  '9':
  - type: text
    content: Eliphaz de Théman, Bildad de Shuach et Tsophar de Naama allèrent faire comme l'Eternel leur avait dit, et l'Eternel eut de la considération pour Job.
