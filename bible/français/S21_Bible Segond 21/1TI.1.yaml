document_id: 1TI.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salutation et instructions de Paul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'De la part de Paul, apôtre de Jésus-Christ par ordre de Dieu notre Sauveur et du [Seigneur] Jésus-Christ notre espérance, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'à Timothée, mon enfant véritable dans la foi: que la grâce, la compassion et la paix te soient données de la part de Dieu notre Père et de Jésus-Christ notre Seigneur!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'A mon départ pour la Macédoine, je t''ai encouragé à rester à Ephèse pour donner instruction à certaines personnes de ne pas enseigner d''autres doctrines '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'et de ne pas s''attacher à des fables et des généalogies sans fin, qui produisent des controverses au lieu de servir le projet de Dieu qui s''accomplit dans la foi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le but de ces instructions, c''est un amour qui provienne d''un cœur pur, d''une bonne conscience et d''une foi sincère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Certains se sont écartés de cette ligne et se sont égarés dans des discours creux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ils veulent être des professeurs de la loi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Des professeurs de la loi: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire des spécialistes de la loi de Moïse et de son interprétation.
    marker-yv: yv-n
  - type: text
    text: ', mais ils ne comprennent rien à ce qu''ils disent ni à ce qu''ils affirment avec assurance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nous savons que la loi est bonne, pourvu qu''on en fasse un usage légitime, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'en sachant bien qu''elle n''est pas faite pour les justes mais pour les malfaiteurs et les rebelles, les impies et les pécheurs, les sacrilèges et les profanateurs, ceux qui tueraient père et mère, les meurtriers, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ceux qui vivent dans l''immoralité sexuelle, les homosexuels, les trafiquants d''esclaves, les menteurs, les parjures et tout ce qui est contraire à la saine doctrine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Voilà ce qui est conforme au glorieux Evangile du Dieu bienheureux tel qu'il m'a été confié.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je suis reconnaissant envers celui qui m''a fortifié, Jésus-Christ notre Seigneur, car il m''a jugé digne de confiance en m''établissant à son service, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: moi qui étais auparavant un blasphémateur, un persécuteur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Un persécuteur: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: attitude de Paul envers Christ et envers l'Eglise avant sa conversion.
    marker-yv: yv-n
  - type: text
    text: ', un homme violent. Cependant, il m''a été fait grâce parce que j''agissais par ignorance, dans mon incrédulité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Et la grâce de notre Seigneur a surabondé, avec la foi et l'amour qui sont en Jésus-Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Cette parole est certaine et digne d''être acceptée sans réserve: Jésus-Christ est venu dans le monde pour sauver des pécheurs. Je suis moi-même le premier'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le premier: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire le pire.
    marker-yv: yv-n
  - type: text
    text: ' d''entre eux, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'mais il m''a été fait grâce afin que Jésus-Christ montre en moi le premier toute sa patience et que je serve ainsi d''exemple à ceux qui croiraient en lui pour la vie éternelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Au roi des siècles, au Dieu immortel, invisible et seul [sage] soient honneur et gloire aux siècles des siècles! Amen!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Timothée, mon enfant, voici l''instruction que je t''adresse, conformément aux prophéties faites précédemment à ton sujet: t''appuyant sur elles, combats le bon combat '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'en gardant la foi et une bonne conscience. Cette conscience, quelques-uns l''ont rejetée, et ils ont fait naufrage par rapport à la foi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: C'est le cas d'Hyménée et d'Alexandre, que j'ai livrés à Satan
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Livrés à Satan: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire exclus de la communion de l'Eglise.
    marker-yv: yv-n
  - type: text
    text: ' afin qu''ils apprennent à ne plus blasphémer'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Blasphémer: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire avoir une attitude ou des propos insultants vis-à-vis de Dieu.
    marker-yv: yv-n
  - type: text
    text: .
