document_id: 1TI.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation et instructions de Paul
  - type: text
    content: 'De la part de Paul, apôtre de Jésus-Christ par ordre de Dieu notre Sauveur et du [Seigneur] Jésus-Christ notre espérance, '
  '10':
  - type: text
    content: 'ceux qui vivent dans l''immoralité sexuelle, les homosexuels, les trafiquants d''esclaves, les menteurs, les parjures et tout ce qui est contraire à la saine doctrine. '
  '11':
  - type: text
    content: Voilà ce qui est conforme au glorieux Evangile du Dieu bienheureux tel qu'il m'a été confié.
  '12':
  - type: text
    content: 'Je suis reconnaissant envers celui qui m''a fortifié, Jésus-Christ notre Seigneur, car il m''a jugé digne de confiance en m''établissant à son service, '
  '13':
  - type: text
    content: moi qui étais auparavant un blasphémateur, un persécuteur
  - type: note
    content: 'Un persécuteur: attitude de Paul envers Christ et envers l''Eglise avant sa conversion.'
  - type: text
    content: ', un homme violent. Cependant, il m''a été fait grâce parce que j''agissais par ignorance, dans mon incrédulité. '
  '14':
  - type: text
    content: Et la grâce de notre Seigneur a surabondé, avec la foi et l'amour qui sont en Jésus-Christ.
  '15':
  - type: text
    content: 'Cette parole est certaine et digne d''être acceptée sans réserve: Jésus-Christ est venu dans le monde pour sauver des pécheurs. Je suis moi-même le premier'
  - type: note
    content: 'Le premier: c''est-à-dire le pire.'
  - type: text
    content: ' d''entre eux, '
  '16':
  - type: text
    content: 'mais il m''a été fait grâce afin que Jésus-Christ montre en moi le premier toute sa patience et que je serve ainsi d''exemple à ceux qui croiraient en lui pour la vie éternelle. '
  '17':
  - type: text
    content: Au roi des siècles, au Dieu immortel, invisible et seul [sage] soient honneur et gloire aux siècles des siècles! Amen!
  '18':
  - type: text
    content: 'Timothée, mon enfant, voici l''instruction que je t''adresse, conformément aux prophéties faites précédemment à ton sujet: t''appuyant sur elles, combats le bon combat '
  '19':
  - type: text
    content: 'en gardant la foi et une bonne conscience. Cette conscience, quelques-uns l''ont rejetée, et ils ont fait naufrage par rapport à la foi. '
  '2':
  - type: text
    content: 'à Timothée, mon enfant véritable dans la foi: que la grâce, la compassion et la paix te soient données de la part de Dieu notre Père et de Jésus-Christ notre Seigneur!'
  '20':
  - type: text
    content: C'est le cas d'Hyménée et d'Alexandre, que j'ai livrés à Satan
  - type: note
    content: 'Livrés à Satan: c''est-à-dire exclus de la communion de l''Eglise.'
  - type: text
    content: ' afin qu''ils apprennent à ne plus blasphémer'
  - type: note
    content: 'Blasphémer: c''est-à-dire avoir une attitude ou des propos insultants vis-à-vis de Dieu.'
  - type: text
    content: .
  '3':
  - type: text
    content: 'A mon départ pour la Macédoine, je t''ai encouragé à rester à Ephèse pour donner instruction à certaines personnes de ne pas enseigner d''autres doctrines '
  '4':
  - type: text
    content: 'et de ne pas s''attacher à des fables et des généalogies sans fin, qui produisent des controverses au lieu de servir le projet de Dieu qui s''accomplit dans la foi. '
  '5':
  - type: text
    content: 'Le but de ces instructions, c''est un amour qui provienne d''un cœur pur, d''une bonne conscience et d''une foi sincère. '
  '6':
  - type: text
    content: 'Certains se sont écartés de cette ligne et se sont égarés dans des discours creux. '
  '7':
  - type: text
    content: Ils veulent être des professeurs de la loi
  - type: note
    content: 'Des professeurs de la loi: c''est-à-dire des spécialistes de la loi de Moïse et de son interprétation.'
  - type: text
    content: ', mais ils ne comprennent rien à ce qu''ils disent ni à ce qu''ils affirment avec assurance. '
  '8':
  - type: text
    content: 'Nous savons que la loi est bonne, pourvu qu''on en fasse un usage légitime, '
  '9':
  - type: text
    content: 'en sachant bien qu''elle n''est pas faite pour les justes mais pour les malfaiteurs et les rebelles, les impies et les pécheurs, les sacrilèges et les profanateurs, ceux qui tueraient père et mère, les meurtriers, '
