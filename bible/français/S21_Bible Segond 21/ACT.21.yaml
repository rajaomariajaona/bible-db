document_id: ACT.21
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Retour en Judée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après nous être séparés, nous avons pris la mer pour aller directement à Cos, puis le lendemain à Rhodes, et de là à Patara. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ayant trouvé un bateau qui faisait la traversée vers la Phénicie, nous sommes montés à bord et sommes partis. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Arrivés en vue de l''île de Chypre, nous l''avons laissée à gauche, poursuivant notre route du côté de la Syrie pour débarquer à Tyr. Le bateau devait en effet décharger sa cargaison. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Comme nous avons trouvé des disciples, nous sommes restés 7 jours avec eux. Poussés par l''Esprit, les disciples disaient à Paul de ne pas monter à Jérusalem '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'mais, une fois les 7 jours passés, nous sommes repartis pour continuer notre route. Tous nous ont accompagnés avec leur femme et leurs enfants jusqu''à l''extérieur de la ville. Nous nous sommes agenouillés sur le rivage et avons prié. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Puis, après avoir pris congé les uns des autres, nous sommes montés sur le bateau tandis qu'ils retournaient chez eux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mettant un terme à notre navigation, nous sommes allés de Tyr à Ptolémaïs où nous avons salué les frères et sœurs et passé un jour avec eux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nous sommes repartis le lendemain pour Césarée. Là, nous sommes entrés chez Philippe l'évangéliste, qui était l'un des sept
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''un des sept: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'c''est-à-dire un des sept hommes élus à Jérusalem dans les débuts de l''Eglise (voir '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '6.3'
      metadata:
        usfm: ACT.6.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', et nous avons logé chez lui. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il avait quatre filles vierges qui prophétisaient. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nous étions là depuis plusieurs jours lorsqu''un prophète du nom d''Agabus est descendu de Judée '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'et est venu nous trouver. Il a pris la ceinture de Paul, s''est attaché les pieds et les mains et a dit: «Voici ce que déclare le Saint-Esprit: ‘L''homme à qui appartient cette ceinture, les Juifs l''attacheront de la même manière à Jérusalem et le livreront entre les mains des non-Juifs.’» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'En entendant cela, nous-mêmes et les croyants de Césarée, nous avons supplié Paul de ne pas monter à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il a alors répondu: «Que faites-vous là à pleurer et à me briser le cœur? Je suis prêt non seulement à être emprisonné, mais encore à mourir à Jérusalem pour le nom du Seigneur Jésus.» '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Comme il ne se laissait pas persuader, nous n''avons pas insisté et avons dit: «Que la volonté du Seigneur soit faite!»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Arrivée à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'A la fin de ces quelques jours, nous avons fait nos préparatifs et sommes montés à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Quelques disciples de Césarée sont aussi venus avec nous et nous ont conduits chez un certain Mnason, originaire de l''île de Chypre. Il était disciple depuis longtemps et nous devions loger chez lui. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: A notre arrivée à Jérusalem, les frères et sœurs nous ont accueillis avec joie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le lendemain, Paul s''est rendu avec nous chez Jacques, où tous les anciens se sont réunis. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Après les avoir salués, il a raconté en détail ce que Dieu avait fait au milieu des non-Juifs à travers son ministère. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Après l''avoir entendu, ils se sont mis à célébrer la gloire du Seigneur. Puis ils lui ont dit: «Tu vois, frère, combien de milliers de Juifs on compte parmi les croyants, et tous sont zélés pour la loi. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Or, ils ont entendu dire que tu enseignes à tous les Juifs vivant parmi les non-Juifs d''abandonner la loi de Moïse; tu leur dirais de ne pas circoncire leurs enfants et de ne pas se conformer aux coutumes. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Que faire donc? Sans aucun doute [une foule se rassemblera, car] on apprendra que tu es venu. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'C''est pourquoi, fais ce que nous allons te dire. Il y a parmi nous quatre hommes qui ont fait un vœu. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Prends-les avec toi, accomplis la cérémonie de purification avec eux et pourvois à leurs dépenses afin qu''ils se rasent la tête. Ainsi, tous sauront que ce qu''ils ont entendu dire sur ton compte est faux, mais que toi aussi tu vis en respectant la loi. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Quant aux croyants d''origine non juive, nous leur avons communiqué par écrit notre décision: ils doivent [seulement] s''abstenir des viandes sacrifiées aux idoles, du sang, des animaux étouffés et de l''immoralité sexuelle.»'
- type: usfm
  marker: ms1
  children:
  - type: text
    text: De Jérusalem à Rome
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 21.26–28.31
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Arrestation de Paul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Paul prit alors ces hommes, se purifia avec eux et entra le lendemain dans le temple pour annoncer à quelle date la période de purification prendrait fin et l''offrande serait présentée pour chacun d''eux. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Vers la fin des 7 jours, les Juifs d''Asie qui avaient vu Paul dans le temple soulevèrent toute la foule et s''emparèrent de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ils criaient: «Israélites, au secours! Voici l''homme qui donne partout et à tout le monde un enseignement dirigé contre le peuple, contre la loi et contre cet endroit. Il a même introduit des non-Juifs dans le temple et profané ce saint lieu.» '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: En effet, ils avaient vu Trophime d'Ephèse avec lui dans la ville et croyaient que Paul l'avait fait entrer dans le temple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Toute la ville fut dans l''agitation et le peuple accourut de tous côtés. Ils s''emparèrent de Paul et le traînèrent à l''extérieur du temple, dont on ferma aussitôt les portes. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ils cherchaient à le tuer quand on informa le commandant de la garnison romaine que tout Jérusalem était dans le désordre. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il prit immédiatement des soldats et des officiers et courut vers la foule. Quand ils virent le commandant et les soldats, ils arrêtèrent de frapper Paul. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Alors le commandant s''approcha, s''empara de lui et ordonna qu''on l''attache avec deux chaînes. Puis il demanda qui il était et ce qu''il avait fait. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Cependant, dans la foule les uns criaient une chose, les autres une autre. Comme il ne pouvait rien apprendre de certain à cause du tumulte, il ordonna de conduire Paul dans la forteresse. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Lorsque celui-ci arriva sur les marches de l''escalier, il dut être porté par les soldats à cause de la violence de la foule, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'car l''ensemble du peuple suivait en criant: «A mort!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Au moment où on allait le faire entrer dans la forteresse, Paul demanda au commandant: «M''est-il permis de te dire quelque chose?» Le commandant répondit: «Tu sais le grec? '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Tu n''es donc pas cet Egyptien qui s''est révolté dernièrement et qui a emmené 4000 rebelles dans le désert?» '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Paul reprit: «Je suis juif de Tarse en Cilicie, citoyen d''une ville qui n''est pas sans importance. Je t''en prie, permets-moi de parler au peuple!» '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Le commandant le lui permit et Paul, debout sur les marches, fit signe de la main au peuple. Un profond silence s''établit. Paul leur adressa la parole en langue hébraïque:'
