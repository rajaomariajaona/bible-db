document_id: ROM.7,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le péché et la loi
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ignorez-vous, frères et sœurs – je parle ici à des gens qui connaissent la loi – que la loi n''exerce son pouvoir sur l''homme qu''aussi longtemps qu''il vit? '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il s''est trouvé que le commandement qui devait conduire à la vie m''a conduit à la mort. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, le péché, saisissant l''occasion offerte par le commandement, m''a trompé et par lui m''a donné la mort. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi donc, la loi est sainte, et le commandement est saint, juste et bon.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce qui est bon est-il donc devenu synonyme de mort pour moi? Certainement pas! Au contraire, c'est la faute du péché. Il s'est manifesté comme péché en me donnant la mort par ce qui est bon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ce qui est bon: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire la loi.
      marker-yv: yv-n
    - type: text
      text: ', et ainsi, par l''intermédiaire du commandement, il montre son caractère extrêmement mauvais. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous savons, en effet, que la loi est spirituelle; mais moi, je suis marqué par ma nature, vendu au péché. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ne comprends pas ce que je fais: je ne fais pas ce que je veux et je fais ce que je déteste. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, si je fais ce que je ne veux pas, je reconnais par là que la loi est bonne. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En réalité, ce n''est plus moi qui agis ainsi, mais le péché qui habite en moi. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, je sais que le bien n''habite pas en moi, c''est-à-dire dans ma nature propre: j''ai la volonté de faire le bien, mais je ne parviens pas à l''accomplir. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, je ne fais pas le bien que je veux mais je fais au contraire le mal que je ne veux pas. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, une femme mariée est liée par la loi à son mari tant qu''il est vivant, mais si son mari meurt, elle est dégagée de la loi qui la liait à lui. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Or, si je fais ce que je ne veux pas, ce n'est plus moi qui le fais, mais le péché qui habite en moi.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je découvre donc cette loi: alors que je veux faire le bien, c''est le mal qui est à ma portée. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, je prends plaisir à la loi de Dieu, dans mon être intérieur, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais je constate qu''il y a dans mes membres une autre loi; elle lutte contre la loi de mon intelligence et me rend prisonnier de la loi du péché qui est dans mes membres. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Malheureux être humain que je suis! Qui me délivrera de ce corps de mort? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J'en remercie Dieu, c'est possible par Jésus-Christ notre Seigneur. Ainsi donc, par mon intelligence, je suis esclave de la loi de Dieu, mais par ma nature propre je suis esclave de la loi du péché.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si donc elle devient la femme d'un autre homme du vivant de son mari, elle sera considérée comme adultère. Mais si son mari meurt, elle est libérée de cette loi, de sorte qu'elle n'est pas adultère en devenant la femme d'un autre.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De même, mes frères et sœurs, vous aussi vous avez été mis à mort par rapport à la loi à travers le corps de Christ pour appartenir à un autre, à celui qui est ressuscité afin que nous portions des fruits pour Dieu. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, lorsque nous étions livrés à notre nature propre, les passions pécheresses éveillées par la loi agissaient dans nos membres, de sorte que nous portions des fruits pour la mort. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais maintenant nous avons été libérés de la loi, car nous sommes morts à ce qui nous retenait prisonniers, de sorte que nous servons sous le régime nouveau de l'Esprit et non sous le régime périmé de la loi écrite.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que dirons-nous donc? La loi est-elle péché? Certainement pas! Mais je n''ai connu le péché que par l''intermédiaire de la loi. En effet, je n''aurais pas su ce qu''est la convoitise si la loi n''avait pas dit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu ne convoiteras pas
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu ne convoiteras pas: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation du dernier des dix commandements (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Exode 20.17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deutéronome 5.21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saisissant l''occasion offerte par ce commandement, le péché a produit en moi toutes sortes de désirs. En effet, sans loi le péché est mort. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour ma part, sans la loi, je vivais autrefois; mais quand le commandement est venu, le péché a repris vie et moi, je suis mort. '
