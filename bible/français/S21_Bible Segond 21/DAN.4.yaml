document_id: DAN.4
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Moi, Nebucadnetsar, je vivais tranquille chez moi, heureux dans mon palais. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'J''ai eu un rêve qui m''a effrayé. Les pensées qui me poursuivaient sur mon lit et les visions de mon esprit me terrifiaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'J''ai ordonné qu''on fasse venir devant moi tous les sages de Babylone afin qu''ils me fassent connaître l''explication du rêve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Alors les magiciens, les astrologues, les prêtres chaldéens et les devins sont venus. Je leur ai raconté le rêve, mais ils ont été incapables de m''en faire connaître l''explication. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le dernier à se présenter devant moi a été Daniel, appelé Beltshatsar d''après le nom de mon dieu et qui a en lui l''esprit des dieux saints. Je lui ai raconté le rêve:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '»‘Beltshatsar, chef des magiciens qui as en toi, je le sais, l''esprit des dieux saints et pour qui aucun secret n''est trop difficile, donne-moi l''explication des visions que j''ai eues en rêve! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Voici quelles étaient les visions de mon esprit pendant que j''étais sur mon lit. Je regardais et j''ai vu qu''il y avait au milieu de la terre un très grand arbre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Cet arbre était devenu grand et fort. Sa cime touchait le ciel et on le voyait des extrémités de la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Son feuillage était beau et ses fruits abondants. Il portait de la nourriture pour tous. Les bêtes sauvages s''abritaient sous son ombre, les oiseaux faisaient leur nid dans ses branches et toutes les créatures tiraient leur nourriture de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dans les visions qui se présentaient à mon esprit pendant que j''étais sur mon lit, voici ce que j''ai vu: un veilleur, un saint'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Un veilleur, un saint: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: désignation d'un ange.
    marker-yv: yv-n
  - type: text
    text: ', est descendu du ciel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il a crié avec force en disant: Abattez l''arbre et coupez ses branches, secouez son feuillage et dispersez ses fruits! Que les bêtes s''enfuient loin de son abri et les oiseaux loin de ses branches! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais laissez en terre le tronc avec ses racines! Attachez-le avec des chaînes en fer et en bronze au milieu de l''herbe des champs! Qu''il soit trempé par la rosée du ciel et qu''il ait, comme les bêtes, l''herbe de la terre pour nourriture! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Son cœur d''homme lui sera enlevé et un cœur de bête lui sera donné. Puis sept temps passeront sur lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Cette parole est un décret des veilleurs, cette décision est un ordre des saints afin que les êtres vivants reconnaissent que le Très-Haut domine sur toute royauté humaine, qu''il la donne à qui il le désire et qu''il peut y faire accéder le plus bas des hommes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Voilà le rêve que j'ai eu, moi, le roi Nebucadnetsar. Quant à toi, Beltshatsar, donnes-en l'explication, puisque tous les sages de mon royaume sont incapables de me la faire connaître. Toi, tu en es capable, car il y a en toi l'esprit des dieux saints.’»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors Daniel, appelé Beltshatsar, resta un moment stupéfait, terrifié par ses pensées. Le roi reprit: «Beltshatsar, que le rêve et l''explication ne soient pas source de terreur pour toi!» Beltshatsar répondit: «Mon seigneur, si seulement ce rêve était pour tes ennemis, et son explication pour tes adversaires!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '»L''arbre que tu as vu, qui était devenu grand et fort, dont la cime touchait le ciel et qu''on voyait de toute la terre, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'cet arbre dont le feuillage était beau et les fruits abondants, qui portait de la nourriture pour tous, sous lequel habitaient les bêtes sauvages et dans les branches duquel les oiseaux résidaient, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'c''est toi, roi. Tu es devenu grand et fort. Ta grandeur a augmenté jusqu''à toucher le ciel et ta domination s''étend jusqu''aux extrémités de la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le roi a vu un veilleur, un saint, descendre du ciel et dire: ‘Abattez l''arbre et détruisez-le, mais laissez en terre le tronc avec ses racines et attachez-le avec des chaînes en fer et en bronze au milieu de l''herbe des champs! Qu''il soit trempé par la rosée du ciel et qu''il ait sa nourriture avec les bêtes sauvages jusqu''à ce que sept temps soient passés sur lui.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '»Voici l''explication, roi, voici le décret du Très-Haut qui s''accomplira pour mon seigneur le roi: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'on te chassera du milieu des hommes; tu habiteras avec les bêtes sauvages et l''on te donnera comme aux bœufs de l''herbe à manger; tu seras trempé par la rosée du ciel et sept temps passeront sur toi jusqu''à ce que tu reconnaisses que le Très-Haut domine sur toute royauté humaine et qu''il la donne à qui il le désire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'L''ordre de laisser le tronc avec les racines de l''arbre signifie que la royauté te sera rendue quand tu reconnaîtras que le véritable dominateur est au ciel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'C''est pourquoi, roi, veuille écouter mon conseil: mets un terme à tes péchés en pratiquant la justice, à tes fautes en faisant grâce aux plus humbles, et ton bonheur pourra se prolonger.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tout cela devint réalité pour le roi Nebucadnetsar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Douze mois plus tard, tout en se promenant dans le palais royal à Babylone, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'le roi prit la parole et s''exclama: «N''est-ce pas Babylone la grande, celle que j''ai moi-même construite, pour en faire la résidence royale, par la puissance de ma force et pour la gloire de ma majesté?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Il parlait encore quand une voix venant du ciel se fit entendre: «Apprends, roi Nebucadnetsar, que la royauté t''est retirée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: On te chassera du milieu des hommes. Tu habiteras avec les bêtes sauvages. On te donnera comme aux bœufs de l'herbe à manger et sept temps passeront sur toi jusqu'à ce que tu reconnaisses que le Très-Haut domine sur toute royauté humaine et qu'il la donne à qui il le désire.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Au moment même la parole fut accomplie pour Nebucadnetsar: il fut chassé du milieu des hommes, il mangea de l''herbe comme les bœufs, son corps fut trempé par la rosée du ciel, jusqu''à ce que ses cheveux poussent comme les plumes des aigles, et ses ongles comme les griffes des oiseaux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '«Au moment indiqué, moi, Nebucadnetsar, j''ai levé les yeux vers le ciel et la raison m''est revenue. J''ai béni le Très-Haut, j''ai célébré la louange et la gloire de celui qui vit éternellement, dont la domination est éternelle et dont la royauté subsiste de génération en génération. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Les habitants de la terre, tous autant qu''ils sont, n''ont pas plus de poids que le vide. Il agit comme il le désire avec les corps célestes et avec les habitants de la terre. Il n''y a personne qui puisse lui résister et qui lui dise: ‘Que fais-tu?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'A ce moment-là, la raison m''est revenue. La gloire de mon royaume, ma majesté et ma splendeur m''ont été rendues. Mes conseillers et mes hauts fonctionnaires m''ont réclamé. J''ai été rétabli dans mes fonctions royales et ma puissance n''a fait que grandir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Maintenant, moi, Nebucadnetsar, je célèbre la louange, la grandeur et la gloire du roi du ciel. Tous ses actes sont vrais, ses voies sont justes et il peut abaisser ceux qui marchent dans l'orgueil.»
