document_id: GEN.18,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Confirmation de la naissance d'Isaac
  - type: text
    content: 'L''Eternel apparut à Abraham parmi les chênes de Mamré, alors qu''il était assis à l''entrée de sa tente pendant la chaleur du jour. '
  '10':
  - type: text
    content: 'L''un d''eux dit: «Je reviendrai vers toi à la même époque, et ta femme Sara aura un fils.» Sara écoutait à l''entrée de la tente, derrière lui.'
  '11':
  - type: text
    content: 'Abraham et Sara étaient vieux, d''un âge avancé, et Sara ne pouvait plus espérer avoir des enfants. '
  '12':
  - type: text
    content: 'Elle rit en elle-même en se disant: «Maintenant que je suis usée, aurai-je encore des désirs? Mon seigneur aussi est vieux.» '
  '13':
  - type: text
    content: 'L''Eternel dit à Abraham: «Pourquoi donc Sara a-t-elle ri en se disant: ‘Est-ce que vraiment j''aurai un enfant, moi qui suis vieille?’ '
  '14':
  - type: text
    content: Y a-t-il quoi que ce soit d'étonnant de la part de l'Eternel? Au moment fixé *je reviendrai vers toi, à la même époque, et Sara aura un fils
  - type: note
    content: 'Je reviendrai… fils: cité en Romains 9.9.'
  - type: text
    content: '.» '
  '15':
  - type: text
    content: 'Sara mentit en disant: «Je n''ai pas ri», car elle eut peur, mais il dit: «Au contraire, tu as ri.»'
  - type: heading
    content: Intercession d'Abraham en faveur de Sodome
  '16':
  - type: text
    content: Ces hommes se levèrent pour partir en se dirigeant du côté de Sodome. Abraham les accompagna pour les reconduire.
  '17':
  - type: text
    content: 'Alors l''Eternel dit: «Cacherai-je à Abraham ce que je vais faire? '
  '18':
  - type: text
    content: 'Abraham deviendra une nation grande et puissante, et toutes les nations de la terre seront bénies en lui. '
  '19':
  - type: text
    content: 'En effet, je l''ai choisi afin qu''il ordonne à ses fils et à sa famille après lui de garder la voie de l''Eternel en pratiquant la droiture et la justice. Ainsi l''Eternel accomplira en faveur d''Abraham les promesses qu''il lui a faites.» '
  '2':
  - type: text
    content: 'Il leva les yeux et vit trois hommes debout non loin de lui. Quand il les vit, il courut depuis l''entrée de sa tente à leur rencontre et se prosterna jusqu''à terre. '
  '20':
  - type: text
    content: 'Et l''Eternel dit: «Le cri contre Sodome et Gomorrhe a augmenté, et leur péché est énorme. '
  '21':
  - type: text
    content: C'est pourquoi je vais descendre et je verrai s'ils ont agi entièrement d'après le bruit venu jusqu'à moi. Si ce n'est pas le cas, je le saurai.»
  '22':
  - type: text
    content: 'Les hommes s''éloignèrent et allèrent vers Sodome, mais Abraham se tint encore devant l''Eternel. '
  '23':
  - type: text
    content: 'Abraham s''approcha et dit: «Supprimeras-tu vraiment le juste avec le méchant? '
  '24':
  - type: text
    content: 'Peut-être y a-t-il 50 justes dans la ville. Les supprimeras-tu aussi et ne pardonneras-tu pas à cette ville à cause des 50 justes qui sont au milieu d''elle? '
  '25':
  - type: text
    content: 'Faire mourir le juste avec le méchant, si bien que le sort du juste serait identique à celui du méchant, cela ne correspond certainement pas à ta manière d''agir! Celui qui juge toute la terre n''appliquera-t-il pas le droit?» '
  '26':
  - type: text
    content: 'L''Eternel dit: «Si je trouve à Sodome 50 justes, je pardonnerai à toute la ville à cause d''eux.»'
  '27':
  - type: text
    content: 'Abraham reprit: «Voici que j''ai eu l''audace de parler au Seigneur, moi qui ne suis que poussière et cendre. '
  '28':
  - type: text
    content: 'Peut-être, à ces 50 justes, en manquera-t-il 5. Pour 5, détruiras-tu toute la ville?» L''Eternel dit: «Je ne la détruirai pas si j''y trouve 45 justes.»'
  '29':
  - type: text
    content: 'Abraham continua de lui parler et dit: «Peut-être s''y trouvera-t-il 40 justes.» L''Eternel dit: «Je ne lui ferai rien à cause de ces 40.»'
  '3':
  - type: text
    content: 'Il dit: «Seigneur, si j''ai trouvé grâce à tes yeux, ne passe pas loin de ton serviteur. '
  '30':
  - type: text
    content: 'Abraham dit: «Que le Seigneur ne s''irrite pas et je parlerai. Peut-être s''y trouvera-t-il 30 justes.» L''Eternel dit: «Je ne lui ferai rien si j''y trouve 30 justes.»'
  '31':
  - type: text
    content: 'Abraham dit: «Voici que j''ai eu l''audace de parler au Seigneur. Peut-être s''y trouvera-t-il 20 justes.» L''Eternel dit: «Je ne la détruirai pas à cause de ces 20.»'
  '32':
  - type: text
    content: 'Abraham dit: «Que le Seigneur ne s''irrite pas et je ne parlerai plus que cette fois. Peut-être s''y trouvera-t-il 10 justes.» L''Eternel dit: «Je ne la détruirai pas à cause de ces 10 justes.»'
  '33':
  - type: text
    content: L'Eternel s'en alla lorsqu'il eut fini de parler à Abraham, et Abraham retourna chez lui.
  '4':
  - type: text
    content: 'Permettez qu''on apporte un peu d''eau pour vous laver les pieds et reposez-vous sous cet arbre. '
  '5':
  - type: text
    content: 'J''irai prendre un morceau de pain pour vous restaurer, puis vous continuerez votre route, car c''est pour cela que vous passez près de votre serviteur.» Ils répondirent: «Fais comme tu l''as dit.» '
  '6':
  - type: text
    content: 'Abraham s''empressa d''aller trouver Sara dans la tente et dit: «Prends vite 22 litres de fleur de farine! Pétris-la et fais des gâteaux.» '
  '7':
  - type: text
    content: 'Abraham courut à son troupeau, prit un veau tendre et bon et le donna à un serviteur qui se dépêcha de le préparer. '
  '8':
  - type: text
    content: Il prit encore du lait caillé et du lait, avec le veau qu'on avait préparé, et il les mit devant eux. Il se tint lui-même à leurs côtés, sous l'arbre, et ils mangèrent.
  '9':
  - type: text
    content: 'Puis ils lui dirent: «Où est ta femme Sara?» Il répondit: «Elle est là, dans la tente.» '
