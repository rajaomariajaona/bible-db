document_id: EXO.38,152
type_code: fra
verses:
  '1':
  - type: heading
    content: L'autel des holocaustes et la cuve en bronze
  - type: text
    content: 'Il fit l''autel des holocaustes en bois d''acacia. Sa longueur et sa largeur étaient de 2 mètres et demi, il était carré. Sa hauteur était d''un mètre et demi. '
  '10':
  - type: text
    content: 'avec 20 colonnes reposant sur 20 bases en bronze. Les crochets des colonnes et leurs tringles étaient en argent. '
  '11':
  - type: text
    content: 'Du côté nord, il y avait 50 mètres de toiles, avec 20 colonnes et leurs 20 bases en bronze. Les crochets des colonnes et leurs tringles étaient en argent. '
  '12':
  - type: text
    content: 'Du côté ouest, il y avait 25 mètres de toiles, avec 10 colonnes et leurs 10 bases. Les crochets des colonnes et leurs tringles étaient en argent. '
  '13':
  - type: text
    content: 'Du côté est, sur les 25 mètres de largeur, '
  '14':
  - type: text
    content: 'il y avait pour une aile 7 mètres et demi de toiles, avec 3 colonnes et leurs 3 bases, '
  '15':
  - type: text
    content: 'et pour la seconde aile, celle qui lui correspondait de l''autre côté de la porte du parvis, 7 mètres et demi de toiles, avec 3 colonnes et leurs 3 bases. '
  '16':
  - type: text
    content: 'Toutes les toiles qui formaient l''enceinte du parvis étaient en fin lin retors. '
  '17':
  - type: text
    content: 'Les bases pour les colonnes étaient en bronze, les crochets des colonnes et leurs tringles étaient en argent, et leurs chapiteaux étaient couverts d''argent. Toutes les colonnes du parvis étaient reliées par des tringles en argent. '
  '18':
  - type: text
    content: 'Le rideau de la porte du parvis était un ouvrage de broderie en fil bleu, pourpre et cramoisi et en fin lin retors; il avait une longueur de 10 mètres et sa hauteur était de 2 mètres et demi, comme la largeur des toiles du parvis. '
  '19':
  - type: text
    content: 'Ses 4 colonnes et leurs 4 bases étaient en bronze, les crochets et leurs tringles étaient en argent, et leurs chapiteaux étaient couverts d''argent. '
  '2':
  - type: text
    content: 'Aux 4 coins, il fit des cornes qui sortaient de l''autel et il le couvrit de bronze. '
  '20':
  - type: text
    content: Tous les pieux de l'enceinte du tabernacle et du parvis étaient en bronze.
  - type: heading
    content: Matériel utilisé
  '21':
  - type: text
    content: 'Voici les comptes du tabernacle, du tabernacle du témoignage. Ils furent établis suivant l''ordre de Moïse par les soins des Lévites, sous la direction d''Ithamar, le fils du prêtre Aaron. '
  '22':
  - type: text
    content: 'Betsaleel, fils d''Uri et petit-fils de Hur, de la tribu de Juda, fit tout ce que l''Eternel avait ordonné à Moïse. '
  '23':
  - type: text
    content: 'Il eut pour aide Oholiab, fils d''Ahisamac, de la tribu de Dan, un homme habile à graver, à inventer et à broder sur les étoffes teintes en bleu, en pourpre, en cramoisi et sur le fin lin. '
  '24':
  - type: text
    content: 'La quantité totale d''or employée à ce travail, pour tous les travaux du sanctuaire, et qui était le produit des offrandes s''élevait à 943 kilos, d''après la valeur étalon du sanctuaire. '
  '25':
  - type: text
    content: 'La quantité d''argent provenant des membres de l''assemblée que l''on avait dénombrés s''élevait à près de 3017 kilos et 750 grammes, d''après la valeur étalon du sanctuaire. '
  '26':
  - type: text
    content: 'Cela correspondait à 5 grammes par personne, la moitié d''une pièce d''après la valeur étalon du sanctuaire, pour chaque homme âgé de 20 ans et plus compris dans le dénombrement, c''est-à-dire pour 603''550 hommes. '
  '27':
  - type: text
    content: 'Avec 3000 kilos d''argent, on fondit les bases du sanctuaire et les bases du voile, 100 bases pour les 3000 kilos, 30 kilos par base. '
  '28':
  - type: text
    content: 'Et avec les 17 kilos et 750 grammes restants on fit les crochets et les tringles pour les colonnes et on couvrit les chapiteaux. '
  '29':
  - type: text
    content: 'La quantité de bronze provenant des offrandes s''élevait à 2340 kilos. '
  '3':
  - type: text
    content: 'Il fit tous les ustensiles de l''autel: les cendriers, les pelles, les bassins, les fourchettes et les brûle-parfums; il fit tous ses ustensiles en bronze. '
  '30':
  - type: text
    content: 'On en fit les bases de l''entrée de la tente de la rencontre, l''autel de bronze avec sa grille et tous les ustensiles de l''autel, '
  '31':
  - type: text
    content: les bases du pourtour du parvis, celles de la porte de cette cour et tous les pieux de l'enceinte du tabernacle et du parvis.
  '4':
  - type: text
    content: 'Il fit pour l''autel une grille en bronze, en forme de treillis. Il la plaça sous le rebord de l''autel, dans la partie inférieure; elle arrivait à mi-hauteur de l''autel. '
  '5':
  - type: text
    content: 'Il fondit 4 anneaux, qu''il mit aux 4 coins de la grille de bronze, pour recevoir les barres. '
  '6':
  - type: text
    content: 'Il fit ces barres en bois d''acacia et les couvrit de bronze. '
  '7':
  - type: text
    content: Il passa dans les anneaux situés sur les côtés de l'autel les barres destinées à son transport. Il le fit creux, avec des planches.
  '8':
  - type: text
    content: Il fit la cuve en bronze avec sa base en bronze en employant les miroirs des femmes qui se rassemblaient à l'entrée de la tente de la rencontre.
  - type: heading
    content: Le parvis et son entrée
  '9':
  - type: text
    content: 'Il fit le parvis. Pour former cette cour, du côté sud, il y avait des toiles en fin lin retors, sur une longueur de 50 mètres, '
