document_id: 1TI.5,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Conseils à propos des membres de l'Eglise
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne reprends pas le vieillard avec dureté, mais encourage-le comme un père. Encourage les jeunes gens comme des frères, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et qu''elle soit connue pour de belles œuvres: qu''elle ait élevé ses enfants, exercé l''hospitalité, lavé les pieds des saints'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Saints: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: manière de désigner les chrétiens en tant que personnes consacrées à Dieu et appelées à avoir le comportement qui découle de leur appartenance à ce Dieu.
      marker-yv: yv-n
    - type: text
      text: ', porté secours aux opprimés, cherché à faire le bien en toute occasion.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Par contre, écarte de la liste les jeunes veuves, car lorsque leurs désirs les dressent contre Christ, elles veulent se remarier '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et se rendent ainsi coupables d''avoir rompu leur engagement initial. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De plus, étant désœuvrées, elles prennent l''habitude d''aller de maison en maison. Et non contentes d''être désœuvrées, elles se montrent encore bavardes et indiscrètes en parlant de ce qu''il ne faut pas. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je veux donc que les jeunes veuves se marient, qu''elles aient des enfants, qu''elles dirigent leur maison, qu''elles ne donnent à l''adversaire aucune occasion de dire du mal de nous. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, certaines se sont déjà détournées pour suivre Satan.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si un croyant, homme ou femme, a des veuves dans sa famille, qu'il les assiste et que l'Eglise n'en ait pas la charge, afin qu'elle puisse aider celles qui sont vraiment veuves.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que les anciens qui dirigent bien soient jugés dignes d''une double marque d''honneur, surtout ceux qui travaillent à la prédication et à l''enseignement. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, l''Ecriture dit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu ne mettras pas de muselière au bœuf quand il foule le grain
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu ne… grain: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deutéronome 25.4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' et: «*L''ouvrier mérite son salaire.»'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L''ouvrier… salaire: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luc 10.7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'N''accepte pas d''accusation contre un ancien, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: si ce n'est sur la déposition de deux ou trois témoins
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Si ce n''est… témoins: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: principe repris de l'Ancien Testament (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deutéronome 19.15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: les femmes âgées comme des mères, celles qui sont jeunes comme des sœurs, en toute pureté.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceux qui pèchent, reprends-les devant tous, afin que les autres aussi éprouvent de la crainte. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je t''en supplie devant Dieu, devant [le Seigneur] Jésus-Christ et devant les anges élus: suis ces instructions sans préjugé et ne fais rien par favoritisme.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne pose les mains sur personne avec précipitation et ne t''associe pas aux péchés d''autrui. Toi-même, garde-toi pur. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cesse de ne boire que de l''eau, prends un peu de vin à cause de ton estomac et de tes fréquents malaises. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les péchés de certains hommes sont évidents avant même qu''on les juge, mais chez d''autres ils ne se découvrent que par la suite. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: De même, les belles œuvres sont évidentes et celles qui ne le sont pas ne peuvent rester cachées.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Honore les veuves qui sont vraiment veuves. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si une veuve a des enfants ou des petits-enfants, qu''ils apprennent à exercer la piété d''abord envers leur propre famille et à rendre à leurs parents ce qu''ils ont reçu d''eux, car cela est agréable à Dieu. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La vraie veuve, celle qui est restée toute seule, a mis son espérance en Dieu et persévère nuit et jour dans les supplications et les prières. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Par contre, celle qui vit dans les plaisirs est morte, bien que vivante. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Donne-leur ces instructions afin qu''elles soient irréprochables. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si quelqu'un ne prend pas soin des siens, et en particulier des membres de sa famille proche, il a renié la foi et il est pire qu'un non-croyant.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pour être inscrite sur la liste
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'La liste: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: celle des veuves qui s'engageaient à un service pour Dieu et bénéficiaient d'une assistance matérielle de l'Eglise.
      marker-yv: yv-n
    - type: text
      text: ', une veuve ne doit pas avoir moins de 60 ans. Il faut qu''elle ait été fidèle à son mari '
