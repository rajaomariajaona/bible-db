document_id: 1TI.5,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Conseils à propos des membres de l'Eglise
  - type: text
    content: 'Ne reprends pas le vieillard avec dureté, mais encourage-le comme un père. Encourage les jeunes gens comme des frères, '
  '10':
  - type: text
    content: 'et qu''elle soit connue pour de belles œuvres: qu''elle ait élevé ses enfants, exercé l''hospitalité, lavé les pieds des saints'
  - type: note
    content: 'Saints: manière de désigner les chrétiens en tant que personnes consacrées à Dieu et appelées à avoir le comportement qui découle de leur appartenance à ce Dieu.'
  - type: text
    content: ', porté secours aux opprimés, cherché à faire le bien en toute occasion.'
  '11':
  - type: text
    content: 'Par contre, écarte de la liste les jeunes veuves, car lorsque leurs désirs les dressent contre Christ, elles veulent se remarier '
  '12':
  - type: text
    content: 'et se rendent ainsi coupables d''avoir rompu leur engagement initial. '
  '13':
  - type: text
    content: 'De plus, étant désœuvrées, elles prennent l''habitude d''aller de maison en maison. Et non contentes d''être désœuvrées, elles se montrent encore bavardes et indiscrètes en parlant de ce qu''il ne faut pas. '
  '14':
  - type: text
    content: 'Je veux donc que les jeunes veuves se marient, qu''elles aient des enfants, qu''elles dirigent leur maison, qu''elles ne donnent à l''adversaire aucune occasion de dire du mal de nous. '
  '15':
  - type: text
    content: En effet, certaines se sont déjà détournées pour suivre Satan.
  '16':
  - type: text
    content: Si un croyant, homme ou femme, a des veuves dans sa famille, qu'il les assiste et que l'Eglise n'en ait pas la charge, afin qu'elle puisse aider celles qui sont vraiment veuves.
  '17':
  - type: text
    content: 'Que les anciens qui dirigent bien soient jugés dignes d''une double marque d''honneur, surtout ceux qui travaillent à la prédication et à l''enseignement. '
  '18':
  - type: text
    content: 'En effet, l''Ecriture dit: '
  - type: text
    content: Tu ne mettras pas de muselière au bœuf quand il foule le grain
  - type: note
    content: 'Tu ne… grain: citation de Deutéronome 25.4.'
  - type: text
    content: ' et: «*L''ouvrier mérite son salaire.»'
  - type: note
    content: 'L''ouvrier… salaire: citation de Luc 10.7.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'N''accepte pas d''accusation contre un ancien, '
  - type: text
    content: si ce n'est sur la déposition de deux ou trois témoins
  - type: note
    content: 'Si ce n''est… témoins: principe repris de l''Ancien Testament (Deutéronome 19.15).'
  - type: text
    content: '. '
  '2':
  - type: text
    content: les femmes âgées comme des mères, celles qui sont jeunes comme des sœurs, en toute pureté.
  '20':
  - type: text
    content: 'Ceux qui pèchent, reprends-les devant tous, afin que les autres aussi éprouvent de la crainte. '
  '21':
  - type: text
    content: 'Je t''en supplie devant Dieu, devant [le Seigneur] Jésus-Christ et devant les anges élus: suis ces instructions sans préjugé et ne fais rien par favoritisme.'
  '22':
  - type: text
    content: 'Ne pose les mains sur personne avec précipitation et ne t''associe pas aux péchés d''autrui. Toi-même, garde-toi pur. '
  '23':
  - type: text
    content: 'Cesse de ne boire que de l''eau, prends un peu de vin à cause de ton estomac et de tes fréquents malaises. '
  '24':
  - type: text
    content: 'Les péchés de certains hommes sont évidents avant même qu''on les juge, mais chez d''autres ils ne se découvrent que par la suite. '
  '25':
  - type: text
    content: De même, les belles œuvres sont évidentes et celles qui ne le sont pas ne peuvent rester cachées.
  '3':
  - type: text
    content: 'Honore les veuves qui sont vraiment veuves. '
  '4':
  - type: text
    content: 'Si une veuve a des enfants ou des petits-enfants, qu''ils apprennent à exercer la piété d''abord envers leur propre famille et à rendre à leurs parents ce qu''ils ont reçu d''eux, car cela est agréable à Dieu. '
  '5':
  - type: text
    content: 'La vraie veuve, celle qui est restée toute seule, a mis son espérance en Dieu et persévère nuit et jour dans les supplications et les prières. '
  '6':
  - type: text
    content: 'Par contre, celle qui vit dans les plaisirs est morte, bien que vivante. '
  '7':
  - type: text
    content: 'Donne-leur ces instructions afin qu''elles soient irréprochables. '
  '8':
  - type: text
    content: Si quelqu'un ne prend pas soin des siens, et en particulier des membres de sa famille proche, il a renié la foi et il est pire qu'un non-croyant.
  '9':
  - type: text
    content: Pour être inscrite sur la liste
  - type: note
    content: 'La liste: celle des veuves qui s''engageaient à un service pour Dieu et bénéficiaient d''une assistance matérielle de l''Eglise.'
  - type: text
    content: ', une veuve ne doit pas avoir moins de 60 ans. Il faut qu''elle ait été fidèle à son mari '
