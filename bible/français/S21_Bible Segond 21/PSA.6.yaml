document_id: PSA.6,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Appel à la bonté de Dieu
  - type: text
    content: Au chef de chœur, avec instruments à cordes, sur la harpe à huit cordes. Psaume de David.
  '10':
  - type: text
    content: L'Eternel exauce mes supplications,
  - type: text
    content: l'Eternel accueille ma prière.
  '11':
  - type: text
    content: Tous mes ennemis sont remplis de confusion et d'effroi;
  - type: text
    content: ils reculent, soudain couverts de honte.
  '2':
  - type: text
    content: Eternel, ne me punis pas dans ta colère
  - type: text
    content: et ne me corrige pas dans ta fureur.
  '3':
  - type: text
    content: Aie pitié de moi, Eternel, car je suis sans force!
  - type: text
    content: Guéris-moi, Eternel, car je tremble de tous mes os!
  '4':
  - type: text
    content: '*Mon âme est toute troublée.'
  - type: text
    content: Et toi, Eternel, jusqu'à quand me traiteras-tu ainsi?
  '5':
  - type: text
    content: Reviens, Eternel, délivre-moi
  - type: note
    content: 'Mon âme est toute troublée… délivre-moi: cité par Jésus peu avant son arrestation en Jean 12.27.'
  - type: text
    content: ','
  - type: text
    content: sauve-moi à cause de ta bonté,
  '6':
  - type: text
    content: 'car dans la mort on n''évoque plus ton souvenir:'
  - type: text
    content: qui te louera dans le séjour des morts?
  '7':
  - type: text
    content: Je m'épuise à force de gémir;
  - type: text
    content: chaque nuit mon lit est trempé de mes larmes,
  - type: text
    content: il est inondé de mes pleurs.
  '8':
  - type: text
    content: 'Mes yeux sont usés par le chagrin:'
  - type: text
    content: tous ceux qui me persécutent les affaiblissent.
  '9':
  - type: text
    content: '*Eloignez-vous de moi, vous tous qui commettez l''injustice'
  - type: note
    content: 'Eloignez-vous… l''injustice: cité par Jésus dans un enseignement sur le jugement dernier en Matthieu 7.23.'
  - type: text
    content: ','
  - type: text
    content: car l'Eternel entend mes pleurs!
