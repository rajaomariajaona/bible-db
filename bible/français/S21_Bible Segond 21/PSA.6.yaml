document_id: PSA.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Appel à la bonté de Dieu
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur, avec instruments à cordes, sur la harpe à huit cordes. Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Eternel, ne me punis pas dans ta colère
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne me corrige pas dans ta fureur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aie pitié de moi, Eternel, car je suis sans force!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Guéris-moi, Eternel, car je tremble de tous mes os!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '*Mon âme est toute troublée.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et toi, Eternel, jusqu'à quand me traiteras-tu ainsi?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Reviens, Eternel, délivre-moi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.4, 5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Mon âme est toute troublée… délivre-moi: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité par Jésus peu avant son arrestation en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jean 12.27
      metadata:
        usfm: JHN.12.27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: sauve-moi à cause de ta bonté,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'car dans la mort on n''évoque plus ton souvenir:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui te louera dans le séjour des morts?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je m'épuise à force de gémir;
- type: usfm
  marker: q1
  children:
  - type: text
    text: chaque nuit mon lit est trempé de mes larmes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est inondé de mes pleurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mes yeux sont usés par le chagrin:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous ceux qui me persécutent les affaiblissent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '*Eloignez-vous de moi, vous tous qui commettez l''injustice'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Eloignez-vous… l''injustice: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité par Jésus dans un enseignement sur le jugement dernier en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 7.23
      metadata:
        usfm: MAT.7.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: car l'Eternel entend mes pleurs!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: L'Eternel exauce mes supplications,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'Eternel accueille ma prière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tous mes ennemis sont remplis de confusion et d'effroi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils reculent, soudain couverts de honte.
