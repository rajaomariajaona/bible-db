document_id: HEB.12,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Persévérer dans la vie chrétienne
  - type: text
    content: 'Nous donc aussi, puisque nous sommes entourés d''une si grande nuée de témoins, rejetons tout fardeau et le péché qui nous enveloppe si facilement, et courons avec persévérance l''épreuve qui nous est proposée. '
  '10':
  - type: text
    content: 'Nos pères nous corrigeaient pour un peu de temps, comme ils le trouvaient bon, tandis que Dieu le fait pour notre bien, afin que nous participions à sa sainteté. '
  '11':
  - type: text
    content: 'Certes, au premier abord, toute correction semble un sujet de tristesse, et non de joie, mais elle produit plus tard chez ceux qu''elle a ainsi exercés un fruit porteur de paix: la justice.'
  '12':
  - type: text
    content: ' '
  - type: text
    content: Fortifiez donc vos mains défaillantes et vos genoux flageolants
  - type: text
    content: ' '
  - type: note
    content: 'Fortifiez… flageolants: renvoi à Esaïe 35.3 .'
  '13':
  - type: text
    content: 'et '
  - type: text
    content: faites des voies droites pour vos pieds
  - type: note
    content: 'Faites… pieds: citation de Proverbes 4.26.'
  - type: text
    content: ', afin que ce qui est boiteux ne se démette pas mais plutôt soit guéri. '
  '14':
  - type: text
    content: 'Recherchez la paix avec tous et la progression dans la sainteté: sans elle, personne ne verra le Seigneur. '
  '15':
  - type: text
    content: 'Veillez à ce que personne ne se prive de la grâce de Dieu, à ce qu''aucune racine d''amertume, produisant des rejetons, ne cause du trouble et que beaucoup n''en soient infectés. '
  '16':
  - type: text
    content: Veillez à ce qu'aucun de vous ne fasse preuve d'immoralité sexuelle ou ne se montre profanateur comme Esaü, qui pour un seul repas a vendu son droit d'aînesse
  - type: note
    content: 'Droit d''aînesse: privilège du premier-né dans une famille.'
  - type: text
    content: '. '
  '17':
  - type: text
    content: Vous savez que plus tard il a voulu obtenir la bénédiction mais a été rejeté; en effet, il n'a pas pu amener son père à changer d'attitude, bien qu'il l'ait cherché avec larmes.
  '18':
  - type: text
    content: 'Vous ne vous êtes pas approchés d''une montagne qu''on pouvait toucher et qui était embrasée par le feu, ni de l''obscurité, ni des ténèbres, ni de la tempête, '
  '19':
  - type: text
    content: 'ni du retentissement de la trompette, ni du bruit des paroles. Ce bruit était tel que ceux qui l''ont entendu ont refusé qu''il leur soit adressé un mot de plus. '
  '2':
  - type: text
    content: 'Faisons-le en gardant les regards sur Jésus, qui fait naître la foi et la mène à la perfection. En échange de la joie qui lui était réservée, il a souffert la croix en méprisant la honte qui s''y attachait et il s''est assis à la droite du trône de Dieu. '
  '20':
  - type: text
    content: 'Ils ne supportaient pas, en effet, cette consigne: '
  - type: text
    content: Si même une bête touche la montagne, elle sera lapidée
  - type: text
    content: .
  - type: note
    content: 'Si… lapidée: citation d''Exode 19.12-13.'
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'Le spectacle était si terrifiant que Moïse a dit: '
  - type: text
    content: Je suis épouvanté et tremblant de peur!
  - type: note
    content: 'Je suis… peur: citation de Deutéronome 9.19.'
  '22':
  - type: text
    content: 'Au contraire, vous vous êtes approchés du mont Sion, de la cité du Dieu vivant, la Jérusalem céleste, et ses dizaines de milliers d''anges '
  '23':
  - type: text
    content: 'en fête, de l''assemblée des premiers-nés inscrits dans le ciel. Vous vous êtes approchés de Dieu qui est le juge de tous, des esprits des justes parvenus à la perfection, '
  '24':
  - type: text
    content: de Jésus, qui est le médiateur d'une alliance nouvelle, et du sang purificateur porteur d'un meilleur message que celui d'Abel.
  '25':
  - type: text
    content: 'Faites attention! Ne refusez pas d''écouter celui qui parle. En effet, les hommes qui ont rejeté celui qui les avertissait sur la terre n''en ont pas réchappé. Combien moins échapperons-nous si nous nous détournons de celui qui parle du haut du ciel! '
  '26':
  - type: text
    content: 'Lui dont la voix avait alors ébranlé la terre, il a maintenant fait cette promesse: '
  - type: text
    content: Une fois encore je fais trembler non seulement la terre, mais aussi le ciel.
  - type: note
    content: 'Une fois… ciel: citation d''Aggée 2.6.'
  - type: text
    content: ' '
  '27':
  - type: text
    content: 'Les mots '
  - type: text
    content: une fois encore
  - type: text
    content: ' indiquent bien que les choses qui, appartenant au monde créé, peuvent être ébranlées disparaîtront, afin que celles qui sont inébranlables subsistent. '
  '28':
  - type: text
    content: 'C''est pourquoi, puisque nous recevons un royaume inébranlable, attachons-nous à la grâce qui nous permet de rendre à Dieu un culte qui lui soit agréable, avec respect et avec piété. '
  '29':
  - type: text
    content: 'Notre '
  - type: text
    content: Dieu est
  - type: text
    content: ' en effet '
  - type: text
    content: un feu dévorant
  - type: note
    content: 'Dieu… dévorant: citation de Deutéronome 4.24.'
  - type: text
    content: .
  '3':
  - type: text
    content: Pensez en effet à celui qui a supporté une telle opposition contre lui de la part des pécheurs, afin de ne pas vous laisser abattre par le découragement.
  '4':
  - type: text
    content: 'Vous n''avez pas encore résisté jusqu''au sang dans votre combat contre le péché '
  '5':
  - type: text
    content: 'et vous avez oublié l''encouragement qui vous est adressé comme à des fils: '
  - type: text
    content: Mon fils, ne méprise pas la correction du Seigneur et ne perds pas courage lorsqu'il te reprend.
  - type: text
    content: ' '
  '6':
  - type: text
    content: En effet, le Seigneur corrige celui qu'il aime et il punit tous ceux qu'il reconnaît comme ses fils.
  - type: note
    content: 'Mon fils… ses fils: citation de Proverbes 3.11-12.'
  '7':
  - type: text
    content: 'Supportez la correction: c''est comme des fils que Dieu vous traite. Quel est le fils qu''un père ne corrige pas? '
  '8':
  - type: text
    content: 'Mais si vous êtes dispensés de la correction à laquelle tous ont part, c''est donc que vous êtes des enfants illégitimes et non des fils. '
  '9':
  - type: text
    content: 'D''ailleurs, puisque nos pères terrestres nous ont corrigés et que nous les avons respectés, ne devons-nous pas d''autant plus nous soumettre à notre Père céleste pour avoir la vie? '
