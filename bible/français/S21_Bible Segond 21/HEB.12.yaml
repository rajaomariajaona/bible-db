document_id: HEB.12,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Persévérer dans la vie chrétienne
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Nous donc aussi, puisque nous sommes entourés d''une si grande nuée de témoins, rejetons tout fardeau et le péché qui nous enveloppe si facilement, et courons avec persévérance l''épreuve qui nous est proposée. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Nos pères nous corrigeaient pour un peu de temps, comme ils le trouvaient bon, tandis que Dieu le fait pour notre bien, afin que nous participions à sa sainteté. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Certes, au premier abord, toute correction semble un sujet de tristesse, et non de joie, mais elle produit plus tard chez ceux qu''elle a ainsi exercés un fruit porteur de paix: la justice.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Fortifiez donc vos mains défaillantes et vos genoux flageolants
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Fortifiez… flageolants: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'renvoi à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 35.3
      - type: text
        text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'et '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: faites des voies droites pour vos pieds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Faites… pieds: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Proverbes 4.26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', afin que ce qui est boiteux ne se démette pas mais plutôt soit guéri. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Recherchez la paix avec tous et la progression dans la sainteté: sans elle, personne ne verra le Seigneur. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Veillez à ce que personne ne se prive de la grâce de Dieu, à ce qu''aucune racine d''amertume, produisant des rejetons, ne cause du trouble et que beaucoup n''en soient infectés. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Veillez à ce qu'aucun de vous ne fasse preuve d'immoralité sexuelle ou ne se montre profanateur comme Esaü, qui pour un seul repas a vendu son droit d'aînesse
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Droit d''aînesse: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: privilège du premier-né dans une famille.
      marker-yv: yv-n
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Vous savez que plus tard il a voulu obtenir la bénédiction mais a été rejeté; en effet, il n'a pas pu amener son père à changer d'attitude, bien qu'il l'ait cherché avec larmes.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Vous ne vous êtes pas approchés d''une montagne qu''on pouvait toucher et qui était embrasée par le feu, ni de l''obscurité, ni des ténèbres, ni de la tempête, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'ni du retentissement de la trompette, ni du bruit des paroles. Ce bruit était tel que ceux qui l''ont entendu ont refusé qu''il leur soit adressé un mot de plus. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Faisons-le en gardant les regards sur Jésus, qui fait naître la foi et la mène à la perfection. En échange de la joie qui lui était réservée, il a souffert la croix en méprisant la honte qui s''y attachait et il s''est assis à la droite du trône de Dieu. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ils ne supportaient pas, en effet, cette consigne: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Si même une bête touche la montagne, elle sera lapidée
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Si… lapidée: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Exode 19.12-13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Le spectacle était si terrifiant que Moïse a dit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Je suis épouvanté et tremblant de peur!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je suis… peur: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deutéronome 9.19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Au contraire, vous vous êtes approchés du mont Sion, de la cité du Dieu vivant, la Jérusalem céleste, et ses dizaines de milliers d''anges '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'en fête, de l''assemblée des premiers-nés inscrits dans le ciel. Vous vous êtes approchés de Dieu qui est le juge de tous, des esprits des justes parvenus à la perfection, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: de Jésus, qui est le médiateur d'une alliance nouvelle, et du sang purificateur porteur d'un meilleur message que celui d'Abel.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Faites attention! Ne refusez pas d''écouter celui qui parle. En effet, les hommes qui ont rejeté celui qui les avertissait sur la terre n''en ont pas réchappé. Combien moins échapperons-nous si nous nous détournons de celui qui parle du haut du ciel! '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Lui dont la voix avait alors ébranlé la terre, il a maintenant fait cette promesse: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Une fois encore je fais trembler non seulement la terre, mais aussi le ciel.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Une fois… ciel: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Aggée 2.6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Les mots '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: une fois encore
    - type: text
      text: ' indiquent bien que les choses qui, appartenant au monde créé, peuvent être ébranlées disparaîtront, afin que celles qui sont inébranlables subsistent. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'C''est pourquoi, puisque nous recevons un royaume inébranlable, attachons-nous à la grâce qui nous permet de rendre à Dieu un culte qui lui soit agréable, avec respect et avec piété. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Notre '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Dieu est
    - type: text
      text: ' en effet '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: un feu dévorant
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.29 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dieu… dévorant: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deutéronome 4.24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Pensez en effet à celui qui a supporté une telle opposition contre lui de la part des pécheurs, afin de ne pas vous laisser abattre par le découragement.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Vous n''avez pas encore résisté jusqu''au sang dans votre combat contre le péché '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'et vous avez oublié l''encouragement qui vous est adressé comme à des fils: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Mon fils, ne méprise pas la correction du Seigneur et ne perds pas courage lorsqu'il te reprend.
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: En effet, le Seigneur corrige celui qu'il aime et il punit tous ceux qu'il reconnaît comme ses fils.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.5-6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Mon fils… ses fils: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Proverbes 3.11-12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Supportez la correction: c''est comme des fils que Dieu vous traite. Quel est le fils qu''un père ne corrige pas? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mais si vous êtes dispensés de la correction à laquelle tous ont part, c''est donc que vous êtes des enfants illégitimes et non des fils. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'D''ailleurs, puisque nos pères terrestres nous ont corrigés et que nous les avons respectés, ne devons-nous pas d''autant plus nous soumettre à notre Père céleste pour avoir la vie? '
