document_id: JER.11,152
type_code: fra
verses:
  '1':
  - type: heading
    content: L'alliance violée
  - type: text
    content: Voici la parole de l'Eternel adressée à Jérémie par l'Eternel.
  '10':
  - type: text
    content: Ils sont retournés aux fautes de leurs ancêtres,
  - type: text
    content: qui ont refusé d'écouter mes paroles
  - type: text
    content: et qui ont suivi d'autres dieux pour les servir.
  - type: text
    content: La communauté d'Israël et celle de Juda ont violé mon alliance,
  - type: text
    content: celle que j'avais conclue avec leurs ancêtres.
  '11':
  - type: text
    content: '»C''est pourquoi, voici ce que dit l''Eternel:'
  - type: text
    content: Je vais faire venir sur eux un malheur
  - type: text
    content: dont ils ne pourront s'extirper.
  - type: text
    content: Ils crieront vers moi, et je ne les écouterai pas.
  '12':
  - type: text
    content: Alors les villes de Juda et les habitants de Jérusalem
  - type: text
    content: iront crier vers les dieux en l'honneur desquels ils font brûler de l'encens,
  - type: text
    content: mais ceux-ci ne les sauveront absolument pas quand ils seront dans le malheur.
  '13':
  - type: text
    content: Oui, tu as autant de dieux que de villes, Juda!
  - type: text
    content: Et autant Jérusalem a de rues,
  - type: text
    content: autant vous avez dressé d'autels dédiés à la honte,
  - type: text
    content: d'autels pour faire brûler de l'encens en l'honneur de Baal.
  '14':
  - type: text
    content: »Quant à toi, n'intercède pas pour ce peuple,
  - type: text
    content: ne fais entendre ni supplications ni prières pour eux,
  - type: text
    content: parce que je n'écouterai pas
  - type: text
    content: quand ils feront appel à moi à cause de leur malheur.
  '15':
  - type: text
    content: »Que viendrait faire mon bien-aimé dans mon temple,
  - type: text
    content: alors qu'on s'y livre à de nombreuses manigances?
  - type: text
    content: Qu'on enlève la viande sacrée de chez toi,
  - type: text
    content: puisque c'est quand tu fais le mal que tu éprouves de la joie!
  '16':
  - type: text
    content: ‘Olivier verdoyant, magnifique par l'allure de son fruit’,
  - type: text
    content: voilà le nom que l'Eternel t'avait donné.
  - type: text
    content: Dans un grand fracas, il lui a mis le feu,
  - type: text
    content: et ses branches ne valent plus rien.
  '17':
  - type: text
    content: L'Eternel, le maître de l'univers, celui qui t'a planté,
  - type: text
    content: appelle le malheur sur toi
  - type: text
    content: à cause du mal que la communauté d'Israël et celle de Juda
  - type: text
    content: se sont fait en m'irritant, en faisant brûler de l'encens en l'honneur de Baal.»
  - type: heading
    content: Complot contre Jérémie
  '18':
  - type: text
    content: L'Eternel me l'a fait savoir, et je l'ai su.
  - type: text
    content: «A ce moment-là, tu m'as fait voir leurs agissements.
  '19':
  - type: text
    content: J'étais comme un agneau confiant qu'on conduit à l'abattoir,
  - type: text
    content: 'j''ignorais les projets qu''ils avaient formés contre moi:'
  - type: text
    content: ‘Détruisons l'arbre avec son fruit!
  - type: text
    content: Supprimons-le de la terre des vivants
  - type: text
    content: et qu'on ne se souvienne plus de son nom!’
  '2':
  - type: text
    content: «Ecoutez les paroles de cette alliance!
  - type: text
    content: Tu les répéteras aux hommes de Juda et aux habitants de Jérusalem
  '20':
  - type: text
    content: Mais l'Eternel, le maître de l'univers, est un juste juge qui examine les reins et les cœurs. Je verrai ta vengeance s'exercer contre eux, car c'est à toi que j'ai confié ma cause.»
  '21':
  - type: text
    content: «C'est pourquoi, voici ce que dit l'Eternel au sujet des habitants d'Anathoth
  - type: text
    content: 'qui en veulent à ta vie et qui disent:'
  - type: text
    content: ‘Ne prophétise pas au nom de l'Eternel,
  - type: text
    content: sinon tu mourras de nos mains’,
  '22':
  - type: text
    content: 'voici ce que dit l''Eternel, le maître de l''univers:'
  - type: text
    content: Je vais intervenir contre eux.
  - type: text
    content: Les jeunes hommes mourront par l'épée,
  - type: text
    content: leurs fils et leurs filles mourront par la famine.
  '23':
  - type: text
    content: Il n'y aura aucun survivant,
  - type: text
    content: car je ferai venir le malheur sur les habitants d'Anathoth,
  - type: text
    content: l'année où j'interviendrai contre eux.»
  '3':
  - type: text
    content: 'et tu leur diras: ‘Voici ce que dit l''Eternel, le Dieu d''Israël:'
  - type: text
    content: Maudit soit l'homme qui n'écoute pas les paroles de cette alliance,
  '4':
  - type: text
    content: celle que j'ai prescrite à vos ancêtres
  - type: text
    content: le jour où je les ai fait sortir d'Egypte,
  - type: text
    content: 'de la fournaise où l''on fait fondre le fer, en disant:'
  - type: text
    content: Ecoutez ma voix et faites tout ce que je vous ordonnerai,
  - type: text
    content: alors vous serez mon peuple et je serai votre Dieu.
  '5':
  - type: text
    content: Ainsi, j'accomplirai le serment que j'ai fait à vos ancêtres
  - type: text
    content: de leur donner un pays où coulent le lait et le miel
  - type: text
    content: comme, vous pouvez le constater, c'est le cas aujourd'hui.’»
  - type: text
    content: 'J''ai répondu: «Amen, Eternel!»'
  '6':
  - type: text
    content: 'L''Eternel m''a dit: «Proclame toutes ces paroles dans les villes de Juda'
  - type: text
    content: 'et dans les rues de Jérusalem:'
  - type: text
    content: ‘Ecoutez les paroles de cette alliance
  - type: text
    content: et mettez-les en pratique!
  '7':
  - type: text
    content: En effet, j'ai plus qu'assez averti vos ancêtres,
  - type: text
    content: depuis le jour où je les ai fait sortir d'Egypte jusqu'à aujourd'hui.
  - type: text
    content: 'Je les ai avertis inlassablement en disant:'
  - type: text
    content: Ecoutez ma voix!
  '8':
  - type: text
    content: mais ils n'ont pas écouté, ils n'ont pas tendu l'oreille.
  - type: text
    content: Ils ont persévéré, chacun, dans les penchants de leur cœur mauvais.
  - type: text
    content: Alors j'ai fait en sorte que toutes les paroles de cette alliance s'accomplissent contre eux,
  - type: text
    content: ces paroles que je leur avais ordonné de mettre en pratique et qu'ils n'ont pas mises en pratique.’»
  '9':
  - type: text
    content: 'L''Eternel m''a dit: «Il y a une conspiration chez les hommes de Juda'
  - type: text
    content: et les habitants de Jérusalem.
