document_id: JER.11,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'alliance violée
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Voici la parole de l'Eternel adressée à Jérémie par l'Eternel.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont retournés aux fautes de leurs ancêtres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui ont refusé d'écouter mes paroles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui ont suivi d'autres dieux pour les servir.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La communauté d'Israël et celle de Juda ont violé mon alliance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celle que j'avais conclue avec leurs ancêtres.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»C''est pourquoi, voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais faire venir sur eux un malheur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dont ils ne pourront s'extirper.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils crieront vers moi, et je ne les écouterai pas.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors les villes de Juda et les habitants de Jérusalem
  - type: usfm
    marker: q1
    children:
    - type: text
      text: iront crier vers les dieux en l'honneur desquels ils font brûler de l'encens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ceux-ci ne les sauveront absolument pas quand ils seront dans le malheur.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, tu as autant de dieux que de villes, Juda!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et autant Jérusalem a de rues,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: autant vous avez dressé d'autels dédiés à la honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d'autels pour faire brûler de l'encens en l'honneur de Baal.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Quant à toi, n'intercède pas pour ce peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne fais entendre ni supplications ni prières pour eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce que je n'écouterai pas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand ils feront appel à moi à cause de leur malheur.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Que viendrait faire mon bien-aimé dans mon temple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors qu'on s'y livre à de nombreuses manigances?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'on enlève la viande sacrée de chez toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puisque c'est quand tu fais le mal que tu éprouves de la joie!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Olivier verdoyant, magnifique par l'allure de son fruit’,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voilà le nom que l'Eternel t'avait donné.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans un grand fracas, il lui a mis le feu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses branches ne valent plus rien.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel, le maître de l'univers, celui qui t'a planté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: appelle le malheur sur toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause du mal que la communauté d'Israël et celle de Juda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: se sont fait en m'irritant, en faisant brûler de l'encens en l'honneur de Baal.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Complot contre Jérémie
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel me l'a fait savoir, et je l'ai su.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «A ce moment-là, tu m'as fait voir leurs agissements.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'étais comme un agneau confiant qu'on conduit à l'abattoir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'j''ignorais les projets qu''ils avaient formés contre moi:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Détruisons l'arbre avec son fruit!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Supprimons-le de la terre des vivants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'on ne se souvienne plus de son nom!’
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ecoutez les paroles de cette alliance!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu les répéteras aux hommes de Juda et aux habitants de Jérusalem
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais l'Eternel, le maître de l'univers, est un juste juge qui examine les reins et les cœurs. Je verrai ta vengeance s'exercer contre eux, car c'est à toi que j'ai confié ma cause.»
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «C'est pourquoi, voici ce que dit l'Eternel au sujet des habitants d'Anathoth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'qui en veulent à ta vie et qui disent:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Ne prophétise pas au nom de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sinon tu mourras de nos mains’,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'voici ce que dit l''Eternel, le maître de l''univers:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais intervenir contre eux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les jeunes hommes mourront par l'épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leurs fils et leurs filles mourront par la famine.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n'y aura aucun survivant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je ferai venir le malheur sur les habitants d'Anathoth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'année où j'interviendrai contre eux.»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et tu leur diras: ‘Voici ce que dit l''Eternel, le Dieu d''Israël:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maudit soit l'homme qui n'écoute pas les paroles de cette alliance,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celle que j'ai prescrite à vos ancêtres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le jour où je les ai fait sortir d'Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'de la fournaise où l''on fait fondre le fer, en disant:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoutez ma voix et faites tout ce que je vous ordonnerai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors vous serez mon peuple et je serai votre Dieu.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi, j'accomplirai le serment que j'ai fait à vos ancêtres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de leur donner un pays où coulent le lait et le miel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme, vous pouvez le constater, c'est le cas aujourd'hui.’»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'J''ai répondu: «Amen, Eternel!»'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L''Eternel m''a dit: «Proclame toutes ces paroles dans les villes de Juda'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et dans les rues de Jérusalem:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Ecoutez les paroles de cette alliance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mettez-les en pratique!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, j'ai plus qu'assez averti vos ancêtres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: depuis le jour où je les ai fait sortir d'Egypte jusqu'à aujourd'hui.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je les ai avertis inlassablement en disant:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoutez ma voix!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ils n'ont pas écouté, ils n'ont pas tendu l'oreille.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont persévéré, chacun, dans les penchants de leur cœur mauvais.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors j'ai fait en sorte que toutes les paroles de cette alliance s'accomplissent contre eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ces paroles que je leur avais ordonné de mettre en pratique et qu'ils n'ont pas mises en pratique.’»
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L''Eternel m''a dit: «Il y a une conspiration chez les hommes de Juda'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les habitants de Jérusalem.
