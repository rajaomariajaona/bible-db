document_id: DEU.8,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Terre promise et reconnaissance
  - type: text
    content: '»Vous respecterez et mettrez en pratique tous les commandements que je vous prescris aujourd''hui afin de vivre, de devenir nombreux et d''entrer en possession du pays que l''Eternel a juré de donner à vos ancêtres. '
  '10':
  - type: text
    content: 'Lorsque tu mangeras à satiété, tu béniras l''Eternel, ton Dieu, pour le bon pays qu''il t''a donné. '
  '11':
  - type: text
    content: 'Veille bien à ne pas oublier l''Eternel, ton Dieu, au point de ne pas respecter ses commandements, ses règles et ses prescriptions, que je te donne aujourd''hui. '
  '12':
  - type: text
    content: 'Lorsque tu mangeras à satiété, lorsque tu construiras et habiteras de belles maisons, '
  '13':
  - type: text
    content: 'lorsque tu verras ton gros et ton petit bétail se multiplier, ton argent et ton or augmenter et tout ce qui est à toi se développer, '
  '14':
  - type: text
    content: 'attention! Ne laisse pas ton cœur s''enorgueillir et n''oublie pas l''Eternel, ton Dieu. C''est lui qui t''a fait sortir d''Egypte, de la maison d''esclavage, '
  '15':
  - type: text
    content: 'qui t''a fait marcher dans ce grand et affreux désert où il y a des serpents brûlants et des scorpions, dans des endroits arides et sans eau, et qui a fait jaillir pour toi de l''eau du rocher le plus dur, '
  '16':
  - type: text
    content: 'qui t''a fait manger dans le désert la manne, inconnue de tes ancêtres, afin de t''humilier et de te mettre à l''épreuve pour te faire ensuite du bien. '
  '17':
  - type: text
    content: 'Fais bien attention à ne pas dire dans ton cœur: ‘C''est ma force et la puissance de ma main qui m''ont permis d''acquérir ces richesses.’ '
  '18':
  - type: text
    content: Souviens-toi de l'Eternel, ton Dieu, car c'est lui qui te donnera de la force pour les acquérir afin de confirmer, comme il le fait aujourd'hui, son alliance qu'il a conclue avec tes ancêtres en prêtant serment.
  '19':
  - type: text
    content: '»Si tu oublies l''Eternel, ton Dieu, et suis d''autres dieux, si tu les sers et te prosternes devant eux, je vous avertis expressément aujourd''hui que vous périrez. '
  '2':
  - type: text
    content: 'Souviens-toi de tout le chemin que l''Eternel, ton Dieu, t''a fait faire pendant ces 40 années dans le désert. Il voulait t''humilier et te mettre à l''épreuve pour connaître les dispositions de ton cœur et savoir si tu respecterais ou non ses commandements. '
  '20':
  - type: text
    content: Vous périrez comme les nations que l'Eternel fait disparaître devant vous, parce que vous n'aurez pas écouté l'Eternel, votre Dieu.
  '3':
  - type: text
    content: Il t'a humilié, il t'a fait connaître la faim et il t'a nourri de la manne, que tu ne connaissais pas et que tes ancêtres non plus n'avaient pas connue, afin de t'apprendre que *l'homme ne vit pas de pain seulement, mais de tout ce qui sort de la bouche de l'Eternel
  - type: note
    content: 'L''homme… l''Eternel: cité par Jésus en Matthieu 4.4 et Luc 4.4.'
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Pendant ces 40 années, ton vêtement ne s''est pas usé sur toi et ton pied n''a pas enflé. '
  '5':
  - type: text
    content: Reconnais dans ton cœur que l'Eternel, ton Dieu, t'éduque comme un homme éduque son enfant.
  '6':
  - type: text
    content: '»Tu respecteras les commandements de l''Eternel, ton Dieu, pour marcher dans ses voies et pour le craindre. '
  '7':
  - type: text
    content: 'En effet, l''Eternel, ton Dieu, va te faire entrer dans un bon pays. C''est un pays de cours d''eau, de sources et de lacs qui jaillissent dans les vallées et dans les montagnes; '
  '8':
  - type: text
    content: 'un pays de blé, d''orge, de vignes, de figuiers et de grenadiers; un pays d''oliviers et de miel; '
  '9':
  - type: text
    content: 'un pays où tu mangeras du pain avec abondance, où tu ne manqueras de rien; un pays dont les pierres sont du fer et où tu pourras extraire le cuivre des montagnes. '
