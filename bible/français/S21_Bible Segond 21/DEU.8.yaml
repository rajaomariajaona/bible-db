document_id: DEU.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Terre promise et reconnaissance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Vous respecterez et mettrez en pratique tous les commandements que je vous prescris aujourd''hui afin de vivre, de devenir nombreux et d''entrer en possession du pays que l''Eternel a juré de donner à vos ancêtres. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Souviens-toi de tout le chemin que l''Eternel, ton Dieu, t''a fait faire pendant ces 40 années dans le désert. Il voulait t''humilier et te mettre à l''épreuve pour connaître les dispositions de ton cœur et savoir si tu respecterais ou non ses commandements. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il t'a humilié, il t'a fait connaître la faim et il t'a nourri de la manne, que tu ne connaissais pas et que tes ancêtres non plus n'avaient pas connue, afin de t'apprendre que *l'homme ne vit pas de pain seulement, mais de tout ce qui sort de la bouche de l'Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''homme… l''Eternel: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité par Jésus en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 4.4
      metadata:
        usfm: MAT.4.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' et '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luc 4.4
      metadata:
        usfm: LUK.4.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pendant ces 40 années, ton vêtement ne s''est pas usé sur toi et ton pied n''a pas enflé. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Reconnais dans ton cœur que l'Eternel, ton Dieu, t'éduque comme un homme éduque son enfant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '»Tu respecteras les commandements de l''Eternel, ton Dieu, pour marcher dans ses voies et pour le craindre. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'En effet, l''Eternel, ton Dieu, va te faire entrer dans un bon pays. C''est un pays de cours d''eau, de sources et de lacs qui jaillissent dans les vallées et dans les montagnes; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'un pays de blé, d''orge, de vignes, de figuiers et de grenadiers; un pays d''oliviers et de miel; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'un pays où tu mangeras du pain avec abondance, où tu ne manqueras de rien; un pays dont les pierres sont du fer et où tu pourras extraire le cuivre des montagnes. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Lorsque tu mangeras à satiété, tu béniras l''Eternel, ton Dieu, pour le bon pays qu''il t''a donné. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Veille bien à ne pas oublier l''Eternel, ton Dieu, au point de ne pas respecter ses commandements, ses règles et ses prescriptions, que je te donne aujourd''hui. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lorsque tu mangeras à satiété, lorsque tu construiras et habiteras de belles maisons, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'lorsque tu verras ton gros et ton petit bétail se multiplier, ton argent et ton or augmenter et tout ce qui est à toi se développer, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'attention! Ne laisse pas ton cœur s''enorgueillir et n''oublie pas l''Eternel, ton Dieu. C''est lui qui t''a fait sortir d''Egypte, de la maison d''esclavage, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'qui t''a fait marcher dans ce grand et affreux désert où il y a des serpents brûlants et des scorpions, dans des endroits arides et sans eau, et qui a fait jaillir pour toi de l''eau du rocher le plus dur, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'qui t''a fait manger dans le désert la manne, inconnue de tes ancêtres, afin de t''humilier et de te mettre à l''épreuve pour te faire ensuite du bien. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fais bien attention à ne pas dire dans ton cœur: ‘C''est ma force et la puissance de ma main qui m''ont permis d''acquérir ces richesses.’ '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Souviens-toi de l'Eternel, ton Dieu, car c'est lui qui te donnera de la force pour les acquérir afin de confirmer, comme il le fait aujourd'hui, son alliance qu'il a conclue avec tes ancêtres en prêtant serment.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '»Si tu oublies l''Eternel, ton Dieu, et suis d''autres dieux, si tu les sers et te prosternes devant eux, je vous avertis expressément aujourd''hui que vous périrez. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Vous périrez comme les nations que l'Eternel fait disparaître devant vous, parce que vous n'aurez pas écouté l'Eternel, votre Dieu.
