document_id: 1KI.13,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Or, un homme de Dieu arriva de Juda à Béthel, sur l''ordre de l''Eternel, pendant que Jéroboam se tenait près de l''autel pour brûler des parfums. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Et il repartit par un autre chemin, il ne prit pas à son retour le chemin par lequel il était venu à Béthel.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Or il y avait un vieux prophète qui habitait à Béthel. Ses fils vinrent lui raconter tout ce que l''homme de Dieu avait fait à Béthel ce jour-là ainsi que les paroles qu''il avait dites au roi. Leur récit terminé, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'leur père leur demanda: «Par quel chemin est-il reparti?» Ses fils avaient vu par quel chemin était reparti l''homme de Dieu venu de Juda. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Il leur dit: «Sellez-moi l''âne.» C''est ce qu''ils firent et il monta dessus. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Il partit à la poursuite de l''homme de Dieu et le trouva assis sous un térébinthe. Il lui dit: «Es-tu l''homme de Dieu venu de Juda?» Il répondit: «C''est bien moi.» '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Alors il lui demanda: «Viens avec moi à la maison et tu mangeras un peu.» '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Mais l''homme de Dieu répondit: «Je ne peux ni revenir en arrière avec toi ni entrer chez toi. Je ne mangerai rien et je ne boirai rien avec toi à cet endroit, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'car il m''a été dit dans une parole de l''Eternel: ‘Tu ne mangeras rien et tu ne boiras rien là-bas, et tu ne prendras pas à ton retour le même chemin qu''à l''aller.’» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'L''autre lui répliqua: «Moi aussi, je suis un prophète, comme toi, et un ange m''a parlé de la part de l''Eternel. Il m''a dit: ‘Ramène-le avec toi dans ta maison et qu''il mange et boive.’» Il lui mentait.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'L''homme de Dieu revint en arrière avec lui, et il mangea et but dans sa maison. '
  '2':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il cria contre l''autel, sur l''ordre de l''Eternel, et il dit: «Autel! Autel! Voici ce que dit l''Eternel: ‘Un fils naîtra dans la famille de David. Son nom sera Josias. Il offrira en sacrifice sur toi les prêtres des hauts lieux qui brûlent des parfums sur toi, et l''on brûlera sur toi des ossements humains!’» '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ils étaient installés à table quand la parole de l''Eternel fut adressée au prophète qui l''avait ramené, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'et il cria à l''homme de Dieu venu de Juda: «Voici ce que dit l''Eternel: Parce que tu t''es rebellé contre l''ordre de l''Eternel et que tu n''as pas respecté le commandement que l''Eternel, ton Dieu, t''avait donné, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'parce que tu es revenu en arrière et que tu as mangé et bu à l''endroit même dont il t''avait dit: ‘Tu ne mangeras rien et tu ne boiras rien là-bas’, ton cadavre n''entrera pas dans le tombeau de tes ancêtres.» '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Puis, quand le prophète qu'il avait ramené eut mangé et bu, il sella l'âne pour lui.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'L''homme de Dieu repartit et il rencontra en chemin un lion qui le tua. Son cadavre resta étendu sur le chemin, l''âne et le lion à côté de lui. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Des voyageurs virent le cadavre étendu sur le chemin, avec le lion à côté de lui, et ils en parlèrent à leur arrivée dans la ville où habitait le vieux prophète. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Lorsque le prophète qui avait fait revenir en arrière l''homme de Dieu en entendit parler, il se dit: «C''est l''homme de Dieu qui s''est révolté contre l''ordre de l''Eternel! L''Eternel l''a livré au lion, qui l''a mis en pièces et l''a fait mourir, conformément à la parole qu''il lui avait dite.» '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Puis, s''adressant à ses fils, il demanda: «Sellez-moi l''âne.» C''est ce qu''ils firent, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'et il partit. Il trouva le cadavre étendu sur le chemin, et l''âne et le lion à côté de lui. Le lion n''avait pas dévoré le cadavre ni mis l''âne en pièces. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Le vieux prophète souleva le cadavre de l''homme de Dieu, le déposa sur son âne et le ramena, il retourna dans sa ville pour le pleurer et l''enterrer. '
  '3':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Le même jour il donna un signe en disant: «Voici le signe que c''est l''Eternel qui a parlé: l''autel se fendra et la cendre qui se trouve dessus sera dispersée.»'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Il déposa son cadavre dans son propre tombeau et l''on pleura sur lui en disant: «Quel malheur, mon frère!» '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Après l''avoir enterré, le vieux prophète dit à ses fils: «Quand je serai mort, vous m''enterrerez dans le tombeau où est enterré l''homme de Dieu, vous déposerez mes ossements à côté des siens. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: En effet, elle s'accomplira, la parole qu'il a criée, sur l'ordre de l'Eternel, contre l'autel de Béthel et contre tous les centres de hauts lieux présents dans les villes de Samarie.»
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Même après cet événement, Jéroboam ne se détourna pas de sa mauvaise voie. Il continua à instituer des prêtres de hauts lieux pris parmi l''ensemble du peuple. Celui qui en émettait le désir, il l''établissait dans la fonction de prêtre des hauts lieux. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Cela fut une cause de péché pour la famille de Jéroboam, et c'est pour cela qu'elle a été exterminée et détruite de la surface de la terre.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Lorsque le roi entendit la parole que l''homme de Dieu avait criée contre l''autel de Béthel, il avança la main par-dessus l''autel en disant: «Arrêtez-le!» La main que Jéroboam avait tendue contre lui devint alors paralysée et il ne put la ramener à lui. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: L'autel se fendit et la cendre qui se trouvait dessus fut dispersée, conformément au signe qu'avait donné l'homme de Dieu sur l'ordre de l'Eternel.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Alors le roi prit la parole, il dit à l''homme de Dieu: «Implore l''Eternel, ton Dieu, et prie pour moi, afin que je puisse retirer ma main.» L''homme de Dieu implora l''Eternel et le roi put retirer sa main, qui redevint comme avant. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Le roi dit à l''homme de Dieu: «Viens avec moi dans mon palais! Tu mangeras et je te donnerai un cadeau.» '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'L''homme de Dieu répondit au roi: «Même si tu me donnais la moitié de ton palais, je ne viendrais pas avec toi. Je ne mangerai rien et je ne boirai rien à cet endroit, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'car voici l''ordre qui m''a été donné dans une parole de l''Eternel: ‘Tu ne mangeras rien et tu ne boiras rien, et tu ne prendras pas à ton retour le même chemin qu''à l''aller.’» '
