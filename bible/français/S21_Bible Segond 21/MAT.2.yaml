document_id: MAT.2,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les mages et Hérode
  - type: text
    content: Jésus naquit à Bethléhem en Judée, à l'époque du roi Hérode. Or, des mages
  - type: note
    content: 'Mages: c''est-à-dire des sages chez les Mèdes, les Perses et les Babyloniens.'
  - type: text
    content: ' venus d''Orient arrivèrent à Jérusalem '
  '10':
  - type: text
    content: 'Quand ils aperçurent l''étoile, ils furent remplis d''une très grande joie. '
  '11':
  - type: text
    content: 'Ils entrèrent dans la maison, virent le petit enfant avec Marie, sa mère, se prosternèrent et l''adorèrent. Ensuite, ils ouvrirent leurs trésors et lui offrirent en cadeau de l''or, de l''encens et de la myrrhe. '
  '12':
  - type: text
    content: Puis, avertis dans un rêve de ne pas retourner vers Hérode, ils regagnèrent leur pays par un autre chemin.
  '13':
  - type: text
    content: 'Lorsqu''ils furent partis, un ange du Seigneur apparut dans un rêve à Joseph et dit: «Lève-toi, prends le petit enfant et sa mère, fuis en Egypte et restes-y jusqu''à ce que je te parle, car Hérode va rechercher le petit enfant pour le faire mourir.» '
  '14':
  - type: text
    content: 'Joseph se leva, prit de nuit le petit enfant et sa mère et se retira en Egypte. '
  '15':
  - type: text
    content: 'Il y resta jusqu''à la mort d''Hérode, afin que s''accomplisse ce que le Seigneur avait annoncé par le prophète: '
  - type: text
    content: J'ai appelé mon fils à sortir d'Egypte
  - type: text
    content: .
  - type: note
    content: 'J''ai appelé… d''Egypte: citation d''Osée 11.1 (8e siècle av. J.-C.).'
  '16':
  - type: text
    content: 'Quand Hérode vit que les mages l''avaient trompé, il se mit dans une grande colère, et il envoya tuer tous les enfants de deux ans et au-dessous qui étaient à Bethléhem et dans tout son territoire, selon la date qu''il s''était fait préciser par les mages. '
  '17':
  - type: text
    content: 'Alors s''accomplit ce que le prophète Jérémie avait annoncé: '
  '18':
  - type: text
    content: 'On a entendu des cris à Rama, des pleurs et de grandes lamentations: c''est Rachel qui pleure ses enfants et n''a pas voulu être consolée, parce qu''ils ne sont plus là'
  - type: text
    content: .
  - type: note
    content: Citation de Jérémie 31.15.
  '19':
  - type: text
    content: 'Après la mort d''Hérode, un ange du Seigneur apparut dans un rêve à Joseph, en Egypte, '
  '2':
  - type: text
    content: 'et dirent: «Où est le roi des Juifs qui vient de naître? En effet, nous avons vu son étoile en Orient et nous sommes venus pour l''adorer.»'
  '20':
  - type: text
    content: 'et dit: «Lève-toi, prends le petit enfant et sa mère et va dans le pays d''Israël, car ceux qui en voulaient à la vie du petit enfant sont morts.» '
  '21':
  - type: text
    content: 'Joseph se leva, prit le petit enfant et sa mère et alla dans le pays d''Israël. '
  '22':
  - type: text
    content: 'Cependant, quand il apprit qu''Archélaüs régnait sur la Judée à la place de son père Hérode, il eut peur de s''y rendre. Averti dans un rêve, il se retira dans le territoire de la Galilée '
  '23':
  - type: text
    content: 'et vint habiter dans une ville appelée Nazareth, afin que s''accomplisse ce que les prophètes avaient annoncé: «Il sera appelé nazaréen.»'
  '3':
  - type: text
    content: 'Quand le roi Hérode apprit cela, il fut troublé et tout Jérusalem avec lui. '
  '4':
  - type: text
    content: Il rassembla tous les chefs des prêtres
  - type: note
    content: 'Prêtres: ils officiaient dans le temple de Jérusalem.'
  - type: text
    content: ' et spécialistes de la loi que comptait le peuple et leur demanda où le Messie devait naître. '
  '5':
  - type: text
    content: 'Ils lui dirent: «A Bethléhem en Judée, car voici ce qui a été écrit par le prophète: '
  '6':
  - type: text
    content: Et toi, Bethléhem, terre de Juda, tu n'es certes pas la plus petite parmi les principales villes de Juda, car de toi sortira un chef qui prendra soin d'Israël, mon peuple
  - type: text
    content: .
  - type: note
    content: 'Et toi… peuple: citation de Michée 5.1 (8e siècle av. J.-C.) complétée par 2 Samuel 5.2, texte relatif à l''ancien grand roi d''Israël David.'
  - type: text
    content: »
  '7':
  - type: text
    content: 'Alors Hérode fit appeler en secret les mages; il s''informa soigneusement auprès d''eux du moment où l''étoile était apparue, '
  '8':
  - type: text
    content: 'puis il les envoya à Bethléhem en disant: «Allez prendre des informations exactes sur le petit enfant. Quand vous l''aurez trouvé, faites-le-moi savoir, afin que j''aille moi aussi l''adorer.»'
  '9':
  - type: text
    content: 'Après avoir entendu le roi, ils partirent. L''étoile qu''ils avaient vue en Orient allait devant eux jusqu''au moment où, arrivée au-dessus de l''endroit où était le petit enfant, elle s''arrêta. '
