document_id: MAT.2,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les mages et Hérode
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Jésus naquit à Bethléhem en Judée, à l'époque du roi Hérode. Or, des mages
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Mages: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire des sages chez les Mèdes, les Perses et les Babyloniens.
      marker-yv: yv-n
    - type: text
      text: ' venus d''Orient arrivèrent à Jérusalem '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Quand ils aperçurent l''étoile, ils furent remplis d''une très grande joie. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ils entrèrent dans la maison, virent le petit enfant avec Marie, sa mère, se prosternèrent et l''adorèrent. Ensuite, ils ouvrirent leurs trésors et lui offrirent en cadeau de l''or, de l''encens et de la myrrhe. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Puis, avertis dans un rêve de ne pas retourner vers Hérode, ils regagnèrent leur pays par un autre chemin.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Lorsqu''ils furent partis, un ange du Seigneur apparut dans un rêve à Joseph et dit: «Lève-toi, prends le petit enfant et sa mère, fuis en Egypte et restes-y jusqu''à ce que je te parle, car Hérode va rechercher le petit enfant pour le faire mourir.» '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Joseph se leva, prit de nuit le petit enfant et sa mère et se retira en Egypte. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Il y resta jusqu''à la mort d''Hérode, afin que s''accomplisse ce que le Seigneur avait annoncé par le prophète: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: J'ai appelé mon fils à sortir d'Egypte
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'J''ai appelé… d''Egypte: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Osée 11.1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (8e siècle av. J.-C.).'
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Quand Hérode vit que les mages l''avaient trompé, il se mit dans une grande colère, et il envoya tuer tous les enfants de deux ans et au-dessous qui étaient à Bethléhem et dans tout son territoire, selon la date qu''il s''était fait préciser par les mages. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Alors s''accomplit ce que le prophète Jérémie avait annoncé: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'On a entendu des cris à Rama, des pleurs et de grandes lamentations: c''est Rachel qui pleure ses enfants et n''a pas voulu être consolée, parce qu''ils ne sont plus là'
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jérémie 31.15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Après la mort d''Hérode, un ange du Seigneur apparut dans un rêve à Joseph, en Egypte, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'et dirent: «Où est le roi des Juifs qui vient de naître? En effet, nous avons vu son étoile en Orient et nous sommes venus pour l''adorer.»'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'et dit: «Lève-toi, prends le petit enfant et sa mère et va dans le pays d''Israël, car ceux qui en voulaient à la vie du petit enfant sont morts.» '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Joseph se leva, prit le petit enfant et sa mère et alla dans le pays d''Israël. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Cependant, quand il apprit qu''Archélaüs régnait sur la Judée à la place de son père Hérode, il eut peur de s''y rendre. Averti dans un rêve, il se retira dans le territoire de la Galilée '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'et vint habiter dans une ville appelée Nazareth, afin que s''accomplisse ce que les prophètes avaient annoncé: «Il sera appelé nazaréen.»'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Quand le roi Hérode apprit cela, il fut troublé et tout Jérusalem avec lui. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Il rassembla tous les chefs des prêtres
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Prêtres: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ils officiaient dans le temple de Jérusalem.
      marker-yv: yv-n
    - type: text
      text: ' et spécialistes de la loi que comptait le peuple et leur demanda où le Messie devait naître. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ils lui dirent: «A Bethléhem en Judée, car voici ce qui a été écrit par le prophète: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Et toi, Bethléhem, terre de Juda, tu n'es certes pas la plus petite parmi les principales villes de Juda, car de toi sortira un chef qui prendra soin d'Israël, mon peuple
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Et toi… peuple: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Michée 5.1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (8e siècle av. J.-C.) complétée par 2 Samuel 5.2, texte relatif à l''ancien grand roi d''Israël David.'
      marker-yv: yv-n
    - type: text
      text: »
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Alors Hérode fit appeler en secret les mages; il s''informa soigneusement auprès d''eux du moment où l''étoile était apparue, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'puis il les envoya à Bethléhem en disant: «Allez prendre des informations exactes sur le petit enfant. Quand vous l''aurez trouvé, faites-le-moi savoir, afin que j''aille moi aussi l''adorer.»'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Après avoir entendu le roi, ils partirent. L''étoile qu''ils avaient vue en Orient allait devant eux jusqu''au moment où, arrivée au-dessus de l''endroit où était le petit enfant, elle s''arrêta. '
