document_id: PSA.129
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jugement des oppresseurs
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Chant des montées.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On m'a souvent combattu depuis ma jeunesse
- type: usfm
  marker: q1
  children:
  - type: text
    text: – qu'Israël le dise –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: on m'a souvent combattu depuis ma jeunesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais on ne m'a pas vaincu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Des laboureurs ont labouré mon dos,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils y ont tracé de longs sillons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L''Eternel est juste:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a coupé les cordes de ces méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Qu'ils soient couverts de honte et qu'ils reculent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous ceux qui détestent Sion!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Qu'ils soient comme l'herbe des toits
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'qui sèche avant qu''on l''arrache:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: le moissonneur n'en remplit pas sa main,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui lie les gerbes n'en fait pas une brassée
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'et les passants ne disent pas:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Que la bénédiction de l'Eternel soit sur vous!»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous vous bénissons au nom de l'Eternel!
