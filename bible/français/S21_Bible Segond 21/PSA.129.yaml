document_id: PSA.129,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Jugement des oppresseurs
  - type: text
    content: Chant des montées.
  - type: text
    content: On m'a souvent combattu depuis ma jeunesse
  - type: text
    content: – qu'Israël le dise –
  '2':
  - type: text
    content: on m'a souvent combattu depuis ma jeunesse,
  - type: text
    content: mais on ne m'a pas vaincu.
  '3':
  - type: text
    content: Des laboureurs ont labouré mon dos,
  - type: text
    content: ils y ont tracé de longs sillons.
  '4':
  - type: text
    content: 'L''Eternel est juste:'
  - type: text
    content: il a coupé les cordes de ces méchants.
  '5':
  - type: text
    content: Qu'ils soient couverts de honte et qu'ils reculent,
  - type: text
    content: tous ceux qui détestent Sion!
  '6':
  - type: text
    content: Qu'ils soient comme l'herbe des toits
  - type: text
    content: 'qui sèche avant qu''on l''arrache:'
  '7':
  - type: text
    content: le moissonneur n'en remplit pas sa main,
  - type: text
    content: celui qui lie les gerbes n'en fait pas une brassée
  '8':
  - type: text
    content: 'et les passants ne disent pas:'
  - type: text
    content: «Que la bénédiction de l'Eternel soit sur vous!»
  - type: text
    content: Nous vous bénissons au nom de l'Eternel!
