document_id: JDG.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Samson prisonnier des Philistins
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Samson partit pour Gaza. Il y vit une prostituée et entra chez elle. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'On dit aux habitants de Gaza: «Samson est arrivé ici.» Ils l''encerclèrent et se tinrent toute la nuit en embuscade à la porte de la ville. Ils restèrent tranquilles toute la nuit, se disant: «Au lever du jour, nous le tuerons.» '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Samson resta couché jusqu'à minuit. Vers minuit, il se leva, attrapa les battants de la porte de la ville ainsi que leurs deux montants, les arracha avec la barre, les mit sur ses épaules et les transporta au sommet de la montagne qui fait face à Hébron.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Après cela, il aima une femme dans la vallée de Sorek. Elle s''appelait Delila. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les princes des Philistins montèrent vers elle et lui dirent: «Flatte-le pour savoir d''où lui vient sa grande force et comment nous pourrions le maîtriser. Nous l''attacherons pour le dompter et nous te donnerons chacun 1100 pièces d''argent.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Delila dit à Samson: «Dis-moi donc d''où vient ta grande force et avec quoi il faudrait t''attacher pour te dompter.» '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Samson lui répondit: «Si on m''attachait avec 7 cordes fraîches, qui ne soient pas encore sèches, je deviendrais faible et je serais pareil à un autre homme.» '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les princes des Philistins apportèrent à Delila 7 cordes fraîches, qui n''étaient pas encore sèches. Elle l''attacha avec ces cordes. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Or des hommes se tenaient en embuscade chez elle, dans une chambre. Elle dit à Samson: «Les Philistins sont sur toi, Samson!» Il cassa les cordes aussi facilement qu''un cordon de chanvre rongé par le feu, et l''on ne sut pas d''où venait sa force.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Delila dit à Samson: «Tu t''es moqué de moi, tu m''as dit des mensonges. Maintenant, indique-moi donc avec quoi il faut t''attacher.» '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il lui dit: «Si on m''attachait avec des cordes neuves, dont on ne se soit jamais servi, je deviendrais faible et je serais pareil à un autre homme.» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Delila prit des cordes neuves, avec lesquelles elle l''attacha. Puis elle lui dit: «Les Philistins sont sur toi, Samson!» Or des hommes se tenaient en embuscade dans une chambre. Samson cassa comme un simple fil les cordes qu''il avait aux bras.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Delila dit à Samson: «Jusqu''à maintenant tu t''es moqué de moi, tu m''as dit des mensonges. Indique-moi avec quoi il faut t''attacher.» Il lui dit: «Tu n''as qu''à tisser les 7 tresses de ma tête avec la chaîne d''un métier à tisser.» '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Elle les fixa au moyen d''une cheville. Puis elle lui dit: «Les Philistins sont sur toi, Samson!» Il se réveilla et arracha la cheville du métier à tisser ainsi que le tissu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Elle lui dit: «Comment peux-tu dire: ‘Je t''aime!’ puisque ton cœur n''est pas avec moi? Voilà 3 fois que tu t''es moqué de moi et tu ne m''as pas indiqué d''où vient ta grande force.» '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Comme elle était chaque jour à le harceler de paroles et à le pousser à bout, il perdit patience au point de désirer la mort. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il lui ouvrit tout son cœur et lui dit: «Le rasoir n''est pas passé sur ma tête parce que je suis consacré à Dieu depuis le ventre de ma mère. Si j''étais rasé, ma force m''abandonnerait, je deviendrais faible et je serais pareil à tout autre homme.» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Voyant qu''il lui avait ouvert tout son cœur, Delila envoya appeler les princes des Philistins et leur fit dire: «Montez cette fois-ci, car il m''a ouvert tout son cœur.» Les princes des Philistins montèrent vers elle et apportèrent l''argent. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Elle endormit Samson sur ses genoux. Puis, ayant appelé un homme, elle lui fit raser les 7 tresses de la tête de Samson et commença ainsi à le dompter. Il perdit sa force. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Elle dit alors: «Les Philistins sont sur toi, Samson!» Il se réveilla et dit: «Je m''en tirerai comme les autres fois, je me dégagerai.» Il ne savait pas que l''Eternel s''était retiré de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Les Philistins s'emparèrent de lui et lui crevèrent les yeux. Ils le firent descendre à Gaza et l'attachèrent avec des chaînes en bronze. Il dut tourner la meule pour le blé dans la prison.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mort de Samson
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Cependant les cheveux de Samson recommençaient à pousser, depuis le moment où il avait été rasé. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Or les princes des Philistins se rassemblèrent pour offrir un grand sacrifice à Dagon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Dagon: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: père de Baal d'après la mythologie, dieu de l'agriculture et de la mer, considéré comme l'inventeur de la charrue.
    marker-yv: yv-n
  - type: text
    text: ', leur dieu, et pour se réjouir. Ils disaient: «Notre dieu a livré Samson, notre ennemi, entre nos mains.» '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'En le voyant, les membres du peuple célébrèrent leur dieu en disant: «Notre dieu a livré entre nos mains notre ennemi, celui qui semait la dévastation dans notre pays et qui multipliait nos morts.» '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dans leur joie, ils dirent: «Qu''on appelle Samson et qu''il nous amuse!» On fit sortir Samson de la prison et il joua devant eux. Lorsqu''on le plaça entre les colonnes, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Samson dit au jeune homme qui le tenait par la main: «Laisse-moi toucher les colonnes sur lesquelles repose la maison et m''appuyer contre elles.» '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'La maison était remplie d''hommes et de femmes. Tous les princes des Philistins étaient là, et il y avait sur le toit environ 3000 personnes, hommes et femmes, qui regardaient Samson jouer. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Alors Samson fit appel à l''Eternel en disant: «Seigneur Eternel, souviens-toi de moi, je t''en prie! O Dieu, donne-moi de la force cette fois seulement, et que d''un seul coup je tire vengeance des Philistins pour mes deux yeux!» '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Puis il attrapa les deux colonnes du milieu sur lesquelles reposait la maison et s''appuya contre elles. L''une était à sa droite, et l''autre à sa gauche. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Samson dit: «Que je meure avec les Philistins!» Il se pencha de toutes ses forces, et la maison tomba sur les princes et sur tout le peuple qui s''y trouvait. Ceux qu''il tua à sa mort furent plus nombreux que ceux qu''il avait tués pendant sa vie. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ses frères et toute la famille de son père descendirent et l'emportèrent. Lorsqu'ils furent remontés chez eux, ils l'enterrèrent entre Tsorea et Eshthaol dans le tombeau de son père Manoach. Il avait été juge en Israël pendant 20 ans.
