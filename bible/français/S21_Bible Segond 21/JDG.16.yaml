document_id: JDG.16,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Samson prisonnier des Philistins
  - type: text
    content: 'Samson partit pour Gaza. Il y vit une prostituée et entra chez elle. '
  '10':
  - type: text
    content: 'Delila dit à Samson: «Tu t''es moqué de moi, tu m''as dit des mensonges. Maintenant, indique-moi donc avec quoi il faut t''attacher.» '
  '11':
  - type: text
    content: 'Il lui dit: «Si on m''attachait avec des cordes neuves, dont on ne se soit jamais servi, je deviendrais faible et je serais pareil à un autre homme.» '
  '12':
  - type: text
    content: 'Delila prit des cordes neuves, avec lesquelles elle l''attacha. Puis elle lui dit: «Les Philistins sont sur toi, Samson!» Or des hommes se tenaient en embuscade dans une chambre. Samson cassa comme un simple fil les cordes qu''il avait aux bras.'
  '13':
  - type: text
    content: 'Delila dit à Samson: «Jusqu''à maintenant tu t''es moqué de moi, tu m''as dit des mensonges. Indique-moi avec quoi il faut t''attacher.» Il lui dit: «Tu n''as qu''à tisser les 7 tresses de ma tête avec la chaîne d''un métier à tisser.» '
  '14':
  - type: text
    content: 'Elle les fixa au moyen d''une cheville. Puis elle lui dit: «Les Philistins sont sur toi, Samson!» Il se réveilla et arracha la cheville du métier à tisser ainsi que le tissu.'
  '15':
  - type: text
    content: 'Elle lui dit: «Comment peux-tu dire: ‘Je t''aime!’ puisque ton cœur n''est pas avec moi? Voilà 3 fois que tu t''es moqué de moi et tu ne m''as pas indiqué d''où vient ta grande force.» '
  '16':
  - type: text
    content: 'Comme elle était chaque jour à le harceler de paroles et à le pousser à bout, il perdit patience au point de désirer la mort. '
  '17':
  - type: text
    content: 'Il lui ouvrit tout son cœur et lui dit: «Le rasoir n''est pas passé sur ma tête parce que je suis consacré à Dieu depuis le ventre de ma mère. Si j''étais rasé, ma force m''abandonnerait, je deviendrais faible et je serais pareil à tout autre homme.» '
  '18':
  - type: text
    content: 'Voyant qu''il lui avait ouvert tout son cœur, Delila envoya appeler les princes des Philistins et leur fit dire: «Montez cette fois-ci, car il m''a ouvert tout son cœur.» Les princes des Philistins montèrent vers elle et apportèrent l''argent. '
  '19':
  - type: text
    content: 'Elle endormit Samson sur ses genoux. Puis, ayant appelé un homme, elle lui fit raser les 7 tresses de la tête de Samson et commença ainsi à le dompter. Il perdit sa force. '
  '2':
  - type: text
    content: 'On dit aux habitants de Gaza: «Samson est arrivé ici.» Ils l''encerclèrent et se tinrent toute la nuit en embuscade à la porte de la ville. Ils restèrent tranquilles toute la nuit, se disant: «Au lever du jour, nous le tuerons.» '
  '20':
  - type: text
    content: 'Elle dit alors: «Les Philistins sont sur toi, Samson!» Il se réveilla et dit: «Je m''en tirerai comme les autres fois, je me dégagerai.» Il ne savait pas que l''Eternel s''était retiré de lui. '
  '21':
  - type: text
    content: Les Philistins s'emparèrent de lui et lui crevèrent les yeux. Ils le firent descendre à Gaza et l'attachèrent avec des chaînes en bronze. Il dut tourner la meule pour le blé dans la prison.
  - type: heading
    content: Mort de Samson
  '22':
  - type: text
    content: 'Cependant les cheveux de Samson recommençaient à pousser, depuis le moment où il avait été rasé. '
  '23':
  - type: text
    content: Or les princes des Philistins se rassemblèrent pour offrir un grand sacrifice à Dagon
  - type: note
    content: 'Dagon: père de Baal d''après la mythologie, dieu de l''agriculture et de la mer, considéré comme l''inventeur de la charrue.'
  - type: text
    content: ', leur dieu, et pour se réjouir. Ils disaient: «Notre dieu a livré Samson, notre ennemi, entre nos mains.» '
  '24':
  - type: text
    content: 'En le voyant, les membres du peuple célébrèrent leur dieu en disant: «Notre dieu a livré entre nos mains notre ennemi, celui qui semait la dévastation dans notre pays et qui multipliait nos morts.» '
  '25':
  - type: text
    content: 'Dans leur joie, ils dirent: «Qu''on appelle Samson et qu''il nous amuse!» On fit sortir Samson de la prison et il joua devant eux. Lorsqu''on le plaça entre les colonnes, '
  '26':
  - type: text
    content: 'Samson dit au jeune homme qui le tenait par la main: «Laisse-moi toucher les colonnes sur lesquelles repose la maison et m''appuyer contre elles.» '
  '27':
  - type: text
    content: 'La maison était remplie d''hommes et de femmes. Tous les princes des Philistins étaient là, et il y avait sur le toit environ 3000 personnes, hommes et femmes, qui regardaient Samson jouer. '
  '28':
  - type: text
    content: 'Alors Samson fit appel à l''Eternel en disant: «Seigneur Eternel, souviens-toi de moi, je t''en prie! O Dieu, donne-moi de la force cette fois seulement, et que d''un seul coup je tire vengeance des Philistins pour mes deux yeux!» '
  '29':
  - type: text
    content: 'Puis il attrapa les deux colonnes du milieu sur lesquelles reposait la maison et s''appuya contre elles. L''une était à sa droite, et l''autre à sa gauche. '
  '3':
  - type: text
    content: Samson resta couché jusqu'à minuit. Vers minuit, il se leva, attrapa les battants de la porte de la ville ainsi que leurs deux montants, les arracha avec la barre, les mit sur ses épaules et les transporta au sommet de la montagne qui fait face à Hébron.
  '30':
  - type: text
    content: 'Samson dit: «Que je meure avec les Philistins!» Il se pencha de toutes ses forces, et la maison tomba sur les princes et sur tout le peuple qui s''y trouvait. Ceux qu''il tua à sa mort furent plus nombreux que ceux qu''il avait tués pendant sa vie. '
  '31':
  - type: text
    content: Ses frères et toute la famille de son père descendirent et l'emportèrent. Lorsqu'ils furent remontés chez eux, ils l'enterrèrent entre Tsorea et Eshthaol dans le tombeau de son père Manoach. Il avait été juge en Israël pendant 20 ans.
  '4':
  - type: text
    content: 'Après cela, il aima une femme dans la vallée de Sorek. Elle s''appelait Delila. '
  '5':
  - type: text
    content: 'Les princes des Philistins montèrent vers elle et lui dirent: «Flatte-le pour savoir d''où lui vient sa grande force et comment nous pourrions le maîtriser. Nous l''attacherons pour le dompter et nous te donnerons chacun 1100 pièces d''argent.»'
  '6':
  - type: text
    content: 'Delila dit à Samson: «Dis-moi donc d''où vient ta grande force et avec quoi il faudrait t''attacher pour te dompter.» '
  '7':
  - type: text
    content: 'Samson lui répondit: «Si on m''attachait avec 7 cordes fraîches, qui ne soient pas encore sèches, je deviendrais faible et je serais pareil à un autre homme.» '
  '8':
  - type: text
    content: 'Les princes des Philistins apportèrent à Delila 7 cordes fraîches, qui n''étaient pas encore sèches. Elle l''attacha avec ces cordes. '
  '9':
  - type: text
    content: 'Or des hommes se tenaient en embuscade chez elle, dans une chambre. Elle dit à Samson: «Les Philistins sont sur toi, Samson!» Il cassa les cordes aussi facilement qu''un cordon de chanvre rongé par le feu, et l''on ne sut pas d''où venait sa force.'
