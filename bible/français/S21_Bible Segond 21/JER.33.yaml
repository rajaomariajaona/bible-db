document_id: JER.33,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Promesses de restauration
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l''Eternel fut adressée à Jérémie une deuxième fois, alors qu''il était encore enfermé dans la cour de la prison:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»Voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On entendra encore, dans cet endroit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que vous présentez
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme un désert sans hommes ni bêtes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on entendra dans les villes de Juda et dans les rues de Jérusalem
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dévastées, dépourvues d'hommes, d'habitants et de bêtes
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les cris de réjouissance et de joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les chants du fiancé et de la fiancée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'On entendra la voix de ceux qui disent:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Célébrez l'Eternel, le maître de l'univers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il est bon. Oui, sa bonté dure éternellement’,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la voix de ceux qui offrent des sacrifices de reconnaissance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans la maison de l'Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, je ramènerai les déportés du pays pour qu'ils retrouvent leur condition passée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dit l'Eternel.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»Voici ce que dit l''Eternel, le maître de l''univers:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y aura encore, dans cet endroit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: désert, sans hommes ni bêtes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et dans toutes les villes qui en dépendent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il y aura encore un domaine où les bergers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pourront faire reposer leurs troupeaux.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans les villes de la montagne, dans celles de la plaine
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et du sud,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans le pays de Benjamin, les environs de Jérusalem
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les villes de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les brebis défileront encore devant celui qui les compte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dit l'Eternel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Des alliances irrévocables
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Voici que les jours viennent, déclare l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où j'accomplirai la bonne parole
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que j'ai prononcée à l'intention de la communauté d'Israël et de celle de Juda.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Durant ces jours-là, à ce moment-là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ferai pousser pour David un germe de justice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il exercera le droit et la justice dans le pays.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cette époque-là, Juda sera sauvé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'on habitera en sécurité à Jérusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici comment on l''appellera:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘L'Eternel notre justice’.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.15-16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Renvoi à la prophétie de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 23.5-6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»En effet, voici ce qu''a dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*David ne manquera jamais d''un successeur'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour siéger sur le trône de la communauté d'Israël.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '33.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'David… d''Israël: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Rois 2.4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les prêtres lévitiques non plus ne manqueront pas d'un successeur qui se tienne devant moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour offrir des holocaustes, faire brûler des offrandes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et présenter des sacrifices tous les jours.»
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'La parole de l''Eternel fut adressée à Jérémie:'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Voici ce que dit l'Eternel qui met en œuvre ces événements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'Eternel qui leur donne forme en les préparant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'celui dont le nom est l''Eternel:'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '«Voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si vous pouviez rompre mon alliance avec le jour
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et avec la nuit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et faire en sorte qu'ils n'apparaissent plus au moment fixé pour eux,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors mon alliance serait aussi rompue avec mon serviteur David
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il n'aurait plus de fils pour occuper son trône.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il en irait de même pour mon alliance avec les Lévites, les prêtres qui sont à mon service.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De même qu'on ne peut compter tous les corps célestes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni peser le sable de la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de même je rendrai innombrables la descendance de mon serviteur David
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les Lévites qui sont à mon service.»
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'La parole de l''Eternel fut adressée à Jérémie:'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «N'as-tu pas remarqué ce que dit ce peuple?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils affirment que l'Eternel a rejeté les deux familles qu'il avait choisies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils méprisent ainsi mon peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au point de ne plus le considérer comme une nation.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»Voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si je n'avais pas établi mon alliance avec le jour et avec la nuit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les règles fixées au ciel et à la terre,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors je pourrais aussi rejeter la descendance de Jacob et de mon serviteur David
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne plus prendre dans la lignée de ce dernier les dominateurs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des descendants d'Abraham, d'Isaac et de Jacob.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cependant, je ramènerai leurs déportés et j'aurai compassion d'eux.»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais appel à moi et je te répondrai.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te révélerai des réalités importantes et inaccessibles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des réalités que tu ne connais pas.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »En effet, voici ce que dit l'Eternel, le Dieu d'Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au sujet des maisons de cette ville
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et des palais des rois de Juda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'démolis par les remblais et par l''épée:'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand ils s'avanceront pour combattre les Babyloniens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils les rempliront des cadavres des hommes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que j'aurai frappés en raison de ma colère et de ma fureur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c'est à cause de toute leur méchanceté que je me cache à cette ville.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Cependant, je vais lui donner la guérison et la santé.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les guérirai
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je leur ouvrirai une source abondante de paix et de vérité.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ramènerai les déportés de Juda et d'Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je leur rendrai leur condition passée.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les purifierai de toute leur mauvaise conduite, celle par laquelle ils ont péché contre moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je leur pardonnerai toutes leurs fautes, celles par lesquelles ils ont péché contre moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et se sont révoltés contre moi.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jérusalem deviendra pour moi synonyme de réjouissance, elle sera ma gloire et mon honneur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: devant toutes les nations de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsqu'elles apprendront tout le bien que je leur ferai.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles trembleront et seront bouleversées à cause de tout le bonheur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de tout le bien-être que je lui accorderai.
