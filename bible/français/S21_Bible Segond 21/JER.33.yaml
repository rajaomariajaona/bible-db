document_id: JER.33,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Promesses de restauration
  - type: text
    content: 'La parole de l''Eternel fut adressée à Jérémie une deuxième fois, alors qu''il était encore enfermé dans la cour de la prison:'
  '10':
  - type: text
    content: '»Voici ce que dit l''Eternel:'
  - type: text
    content: On entendra encore, dans cet endroit
  - type: text
    content: que vous présentez
  - type: text
    content: comme un désert sans hommes ni bêtes,
  - type: text
    content: on entendra dans les villes de Juda et dans les rues de Jérusalem
  - type: text
    content: dévastées, dépourvues d'hommes, d'habitants et de bêtes
  '11':
  - type: text
    content: les cris de réjouissance et de joie,
  - type: text
    content: les chants du fiancé et de la fiancée.
  - type: text
    content: 'On entendra la voix de ceux qui disent:'
  - type: text
    content: ‘Célébrez l'Eternel, le maître de l'univers,
  - type: text
    content: car il est bon. Oui, sa bonté dure éternellement’,
  - type: text
    content: la voix de ceux qui offrent des sacrifices de reconnaissance
  - type: text
    content: dans la maison de l'Eternel.
  - type: text
    content: En effet, je ramènerai les déportés du pays pour qu'ils retrouvent leur condition passée,
  - type: text
    content: dit l'Eternel.
  '12':
  - type: text
    content: '»Voici ce que dit l''Eternel, le maître de l''univers:'
  - type: text
    content: Il y aura encore, dans cet endroit
  - type: text
    content: désert, sans hommes ni bêtes,
  - type: text
    content: et dans toutes les villes qui en dépendent,
  - type: text
    content: il y aura encore un domaine où les bergers
  - type: text
    content: pourront faire reposer leurs troupeaux.
  '13':
  - type: text
    content: Dans les villes de la montagne, dans celles de la plaine
  - type: text
    content: et du sud,
  - type: text
    content: dans le pays de Benjamin, les environs de Jérusalem
  - type: text
    content: et les villes de Juda,
  - type: text
    content: les brebis défileront encore devant celui qui les compte,
  - type: text
    content: dit l'Eternel.
  - type: heading
    content: Des alliances irrévocables
  '14':
  - type: text
    content: »Voici que les jours viennent, déclare l'Eternel,
  - type: text
    content: où j'accomplirai la bonne parole
  - type: text
    content: que j'ai prononcée à l'intention de la communauté d'Israël et de celle de Juda.
  '15':
  - type: text
    content: Durant ces jours-là, à ce moment-là,
  - type: text
    content: je ferai pousser pour David un germe de justice.
  - type: text
    content: Il exercera le droit et la justice dans le pays.
  '16':
  - type: text
    content: A cette époque-là, Juda sera sauvé
  - type: text
    content: et l'on habitera en sécurité à Jérusalem.
  - type: text
    content: 'Voici comment on l''appellera:'
  - type: text
    content: ‘L'Eternel notre justice’.
  - type: note
    content: Renvoi à la prophétie de 23.5-6.
  '17':
  - type: text
    content: '»En effet, voici ce qu''a dit l''Eternel:'
  - type: text
    content: '*David ne manquera jamais d''un successeur'
  - type: text
    content: pour siéger sur le trône de la communauté d'Israël.
  - type: note
    content: 'David… d''Israël: voir 1 Rois 2.4.'
  '18':
  - type: text
    content: Les prêtres lévitiques non plus ne manqueront pas d'un successeur qui se tienne devant moi
  - type: text
    content: pour offrir des holocaustes, faire brûler des offrandes
  - type: text
    content: et présenter des sacrifices tous les jours.»
  '19':
  - type: text
    content: 'La parole de l''Eternel fut adressée à Jérémie:'
  '2':
  - type: text
    content: «Voici ce que dit l'Eternel qui met en œuvre ces événements,
  - type: text
    content: l'Eternel qui leur donne forme en les préparant,
  - type: text
    content: 'celui dont le nom est l''Eternel:'
  '20':
  - type: text
    content: '«Voici ce que dit l''Eternel:'
  - type: text
    content: Si vous pouviez rompre mon alliance avec le jour
  - type: text
    content: et avec la nuit
  - type: text
    content: et faire en sorte qu'ils n'apparaissent plus au moment fixé pour eux,
  '21':
  - type: text
    content: alors mon alliance serait aussi rompue avec mon serviteur David
  - type: text
    content: et il n'aurait plus de fils pour occuper son trône.
  - type: text
    content: Il en irait de même pour mon alliance avec les Lévites, les prêtres qui sont à mon service.
  '22':
  - type: text
    content: De même qu'on ne peut compter tous les corps célestes
  - type: text
    content: ni peser le sable de la mer,
  - type: text
    content: de même je rendrai innombrables la descendance de mon serviteur David
  - type: text
    content: et les Lévites qui sont à mon service.»
  '23':
  - type: text
    content: 'La parole de l''Eternel fut adressée à Jérémie:'
  '24':
  - type: text
    content: «N'as-tu pas remarqué ce que dit ce peuple?
  - type: text
    content: Ils affirment que l'Eternel a rejeté les deux familles qu'il avait choisies.
  - type: text
    content: Ils méprisent ainsi mon peuple,
  - type: text
    content: au point de ne plus le considérer comme une nation.
  '25':
  - type: text
    content: '»Voici ce que dit l''Eternel:'
  - type: text
    content: Si je n'avais pas établi mon alliance avec le jour et avec la nuit,
  - type: text
    content: les règles fixées au ciel et à la terre,
  '26':
  - type: text
    content: alors je pourrais aussi rejeter la descendance de Jacob et de mon serviteur David
  - type: text
    content: et ne plus prendre dans la lignée de ce dernier les dominateurs
  - type: text
    content: des descendants d'Abraham, d'Isaac et de Jacob.
  - type: text
    content: Cependant, je ramènerai leurs déportés et j'aurai compassion d'eux.»
  '3':
  - type: text
    content: Fais appel à moi et je te répondrai.
  - type: text
    content: Je te révélerai des réalités importantes et inaccessibles,
  - type: text
    content: des réalités que tu ne connais pas.
  '4':
  - type: text
    content: »En effet, voici ce que dit l'Eternel, le Dieu d'Israël,
  - type: text
    content: au sujet des maisons de cette ville
  - type: text
    content: et des palais des rois de Juda
  - type: text
    content: 'démolis par les remblais et par l''épée:'
  '5':
  - type: text
    content: Quand ils s'avanceront pour combattre les Babyloniens,
  - type: text
    content: ils les rempliront des cadavres des hommes
  - type: text
    content: que j'aurai frappés en raison de ma colère et de ma fureur,
  - type: text
    content: car c'est à cause de toute leur méchanceté que je me cache à cette ville.
  '6':
  - type: text
    content: »Cependant, je vais lui donner la guérison et la santé.
  - type: text
    content: Je les guérirai
  - type: text
    content: et je leur ouvrirai une source abondante de paix et de vérité.
  '7':
  - type: text
    content: Je ramènerai les déportés de Juda et d'Israël,
  - type: text
    content: et je leur rendrai leur condition passée.
  '8':
  - type: text
    content: Je les purifierai de toute leur mauvaise conduite, celle par laquelle ils ont péché contre moi,
  - type: text
    content: je leur pardonnerai toutes leurs fautes, celles par lesquelles ils ont péché contre moi
  - type: text
    content: et se sont révoltés contre moi.
  '9':
  - type: text
    content: Jérusalem deviendra pour moi synonyme de réjouissance, elle sera ma gloire et mon honneur
  - type: text
    content: devant toutes les nations de la terre,
  - type: text
    content: lorsqu'elles apprendront tout le bien que je leur ferai.
  - type: text
    content: Elles trembleront et seront bouleversées à cause de tout le bonheur
  - type: text
    content: et de tout le bien-être que je lui accorderai.
