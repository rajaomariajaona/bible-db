document_id: 1KI.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les hauts fonctionnaires de Salomon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Salomon était roi sur tout Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici les hauts fonctionnaires qu''il avait à son service. Azaria, le petit-fils du prêtre Tsadok, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Elihoreph et Achija, le fils de Shisha, étaient secrétaires. Josaphat, le fils d''Achilud, était archiviste. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Benaja, le fils de Jehojada, était à la tête de l''armée. Tsadok et Abiathar étaient prêtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Azaria, le fils de Nathan, était le chef des intendants. Zabud, le fils de Nathan, était prêtre. C''était un proche du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Achishar était chef du palais royal et Adoniram, le fils d'Abda, était préposé aux corvées.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Salomon avait douze intendants sur tout Israël. Ils pourvoyaient à l''entretien du roi et de son entourage, chacun pendant un mois de l''année. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Voici leurs noms: le fils de Hur, dans la région montagneuse d''Ephraïm; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'le fils de Déker, à Makats, Saalbim, Beth-Shémesh, Elon et Beth-Hanan; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'le fils de Hésed, à Arubboth, qui était responsable de Soco et de toute la région de Hépher; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'le fils d''Abinadab, qui était responsable de toute la région de Dor et qui avait Thaphath, la fille de Salomon, pour femme; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Baana, le fils d''Achilud, qui était responsable de Thaanac et Meguiddo, et tout Beth-Shean, toute la région qui se situe près de Tsarthan au-dessous de Jizreel et qui va de Beth-Shean jusqu''à Abel-Mehola et après Jokmeam; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'le fils de Guéber, à Ramoth en Galaad, qui était responsable des bourgs de Jaïr, fils de Manassé, en Galaad ainsi que de la région d''Argob en Basan, soit de 60 grandes villes dotées de murailles et de verrous en bronze; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Achinadab, le fils d''Iddo, à Mahanaïm; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Achimaats, qui avait pris pour femme Basmath, la fille de Salomon, en Nephthali; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Baana, le fils de Hushaï, en Aser et à Bealoth; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Josaphat, le fils de Paruach, en Issacar; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Shimeï, le fils d''Ela, en Benjamin; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Guéber, le fils d'Uri, dans le pays de Galaad. Ce dernier était responsable de la région de Sihon, le roi des Amoréens, et d'Og, le roi du Basan. Il y avait un seul intendant pour ce pays.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Puissance de Salomon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Juda et Israël étaient aussi nombreux que le sable qui est au bord de la mer. Ils mangeaient, buvaient et se réjouissaient.
