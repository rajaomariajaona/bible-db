document_id: ZEC.4,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vision d'un chandelier d'or et de deux oliviers
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''ange qui me parlait est revenu, et il m''a réveillé comme un homme que l''on réveille de son sommeil. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, ceux qui méprisaient le jour des petits commencements se réjouiront en voyant la pierre d'étain dans la main de Zorobabel. Ces sept sont les yeux de l'Eternel, qui parcourent toute la terre.»
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai pris la parole et lui ai dit: «Que signifient les deux oliviers à droite et à gauche du chandelier?» '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai repris la parole: «Que signifient les deux rameaux d''olivier qui sont près des deux conduits d''or d''où découle l''or'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'L''or: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire l'huile dorée.
      marker-yv: yv-n
    - type: text
      text: '?» '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il m''a répondu: «Ne sais-tu pas ce qu''ils signifient?» J''ai dit: «Non, mon seigneur.» '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il a dit: «Ce sont les deux hommes désignés par onction qui se tiennent devant le Seigneur de toute la terre.»'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il m''a dit: «Que vois-tu?» J''ai répondu: «Je regarde, et je vois un chandelier tout en or, surmonté d''un réservoir et portant sept lampes, avec sept conduits pour les lampes qui sont à son sommet. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Près de lui se trouvent deux oliviers, l''un à la droite du réservoir et l''autre à sa gauche.» '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Reprenant la parole, j''ai dit à l''ange qui me parlait: «Que signifie cela, mon seigneur?» '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''ange qui me parlait m''a répondu: «Ne sais-tu pas ce que cela signifie?» J''ai dit: «Non, mon seigneur.»'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors il a repris et m''a dit: «Voici la parole que l''Eternel adresse à Zorobabel: Ce n''est ni par la puissance ni par la force, mais c''est par mon Esprit, dit l''Eternel, le maître de l''univers. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qui es-tu, grande montagne, devant Zorobabel? Une plaine. Il en extraira la pierre principale au milieu des acclamations: ‘Grâce, grâce pour elle!’»'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l''Eternel m''a été adressée: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Les mains de Zorobabel ont posé les fondations de ce temple, et ses mains le termineront. Tu sauras alors que l''Eternel, le maître de l''univers, m''a envoyé vers vous. '
