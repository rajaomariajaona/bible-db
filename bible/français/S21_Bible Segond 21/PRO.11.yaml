document_id: PRO.11,152
type_code: fra
verses:
  '1':
  - type: text
    content: La balance faussée fait horreur à l'Eternel,
  - type: text
    content: mais un poids exact lui est agréable.
  '10':
  - type: text
    content: Quand les justes sont heureux, la ville est dans la joie,
  - type: text
    content: et quand les méchants disparaissent, on pousse des cris d'allégresse.
  '11':
  - type: text
    content: La ville prospère grâce à la bénédiction des hommes droits,
  - type: text
    content: mais elle est démolie par la bouche des méchants.
  '12':
  - type: text
    content: Celui qui méprise son prochain manque de bon sens,
  - type: text
    content: mais l'homme qui a de l'intelligence se tait.
  '13':
  - type: text
    content: Celui qui propage des calomnies dévoile des secrets,
  - type: text
    content: tandis que l'homme digne de confiance les garde.
  '14':
  - type: text
    content: En l'absence de directives, le peuple tombe;
  - type: text
    content: le salut réside dans un grand nombre de conseillers.
  '15':
  - type: text
    content: Celui qui se porte garant pour autrui se retrouvera en mauvaise posture,
  - type: text
    content: mais celui qui déteste les engagements est en sécurité.
  '16':
  - type: text
    content: Une femme qui a de la grâce obtient la gloire,
  - type: text
    content: et les hommes violents la richesse.
  '17':
  - type: text
    content: L'homme bon se fait du bien à lui-même,
  - type: text
    content: mais l'homme cruel provoque son propre trouble.
  '18':
  - type: text
    content: Le méchant réalise un gain trompeur,
  - type: text
    content: mais semer la justice procure un vrai salaire.
  '19':
  - type: text
    content: Ainsi, la justice conduit à la vie,
  - type: text
    content: mais celui qui poursuit le mal trouve la mort.
  '2':
  - type: text
    content: Quand vient l'orgueil, vient aussi le mépris,
  - type: text
    content: mais la sagesse est avec les humbles.
  '20':
  - type: text
    content: Ceux dont le cœur est perverti font horreur à l'Eternel,
  - type: text
    content: mais les hommes intègres dans leur conduite lui sont agréables.
  '21':
  - type: text
    content: C'est certain, le méchant ne restera pas impuni,
  - type: text
    content: tandis que la descendance des justes sera sauvée.
  '22':
  - type: text
    content: Un anneau d'or au groin d'un porc,
  - type: text
    content: voilà ce qu'est une femme belle mais dépourvue de discernement.
  '23':
  - type: text
    content: Tout ce que désirent les justes, c'est le bien;
  - type: text
    content: ce que peuvent attendre les méchants, c'est la colère.
  '24':
  - type: text
    content: L'un, qui donne avec largesse, devient encore plus riche;
  - type: text
    content: l'autre, qui épargne à l'excès, ne fait que s'appauvrir.
  '25':
  - type: text
    content: L'âme généreuse sera comblée,
  - type: text
    content: celui qui arrose sera lui-même arrosé.
  '26':
  - type: text
    content: Le peuple maudit celui qui lui refuse le blé,
  - type: text
    content: mais la bénédiction repose sur la tête de celui qui le vend.
  '27':
  - type: text
    content: Celui qui recherche le bien s'attire la faveur,
  - type: text
    content: mais celui qui poursuit le mal en devient la victime.
  '28':
  - type: text
    content: Celui qui se confie dans ses richesses tombera,
  - type: text
    content: tandis que les justes verdiront comme le feuillage.
  '29':
  - type: text
    content: Celui qui trouble sa maison héritera du vent,
  - type: text
    content: et le fou sera l'esclave de l'homme sage.
  '3':
  - type: text
    content: L'intégrité des hommes droits est leur guide,
  - type: text
    content: mais les tromperies des traîtres causent leur ruine.
  '30':
  - type: text
    content: Le fruit que porte le juste est un arbre de vie
  - type: text
    content: et le sage gagne des âmes.
  '31':
  - type: text
    content: '*Si le juste est rétribué sur la terre,'
  - type: text
    content: d'autant plus le méchant et le pécheur!
  - type: note
    content: 'Si… pécheur: cité en 1 Pierre 4.18.'
  '4':
  - type: text
    content: 'Le jour de la colère, la richesse ne sert à rien:'
  - type: text
    content: c'est la justice qui délivre de la mort.
  '5':
  - type: text
    content: La justice de l'homme intègre rend sa voie droite,
  - type: text
    content: mais le méchant tombe par sa méchanceté.
  '6':
  - type: text
    content: La justice des hommes droits les délivre,
  - type: text
    content: mais les traîtres sont prisonniers de leur avidité.
  '7':
  - type: text
    content: A la mort du méchant, son attente meurt avec lui;
  - type: text
    content: c'est en pure perte qu'il plaçait son espoir dans les richesses.
  '8':
  - type: text
    content: Le juste est délivré de la détresse
  - type: text
    content: et le méchant y prend sa place.
  '9':
  - type: text
    content: Par sa bouche, l'impie perd son prochain,
  - type: text
    content: tandis que les justes sont délivrés par leur connaissance.
