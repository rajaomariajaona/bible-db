document_id: PRO.11
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: La balance faussée fait horreur à l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais un poids exact lui est agréable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Quand vient l'orgueil, vient aussi le mépris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais la sagesse est avec les humbles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: L'intégrité des hommes droits est leur guide,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais les tromperies des traîtres causent leur ruine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le jour de la colère, la richesse ne sert à rien:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est la justice qui délivre de la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: La justice de l'homme intègre rend sa voie droite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais le méchant tombe par sa méchanceté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: La justice des hommes droits les délivre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais les traîtres sont prisonniers de leur avidité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: A la mort du méchant, son attente meurt avec lui;
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est en pure perte qu'il plaçait son espoir dans les richesses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le juste est délivré de la détresse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le méchant y prend sa place.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Par sa bouche, l'impie perd son prochain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que les justes sont délivrés par leur connaissance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Quand les justes sont heureux, la ville est dans la joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et quand les méchants disparaissent, on pousse des cris d'allégresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: La ville prospère grâce à la bénédiction des hommes droits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais elle est démolie par la bouche des méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Celui qui méprise son prochain manque de bon sens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais l'homme qui a de l'intelligence se tait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Celui qui propage des calomnies dévoile des secrets,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que l'homme digne de confiance les garde.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: En l'absence de directives, le peuple tombe;
- type: usfm
  marker: q1
  children:
  - type: text
    text: le salut réside dans un grand nombre de conseillers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Celui qui se porte garant pour autrui se retrouvera en mauvaise posture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui déteste les engagements est en sécurité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Une femme qui a de la grâce obtient la gloire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les hommes violents la richesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: L'homme bon se fait du bien à lui-même,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais l'homme cruel provoque son propre trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Le méchant réalise un gain trompeur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais semer la justice procure un vrai salaire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ainsi, la justice conduit à la vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui poursuit le mal trouve la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ceux dont le cœur est perverti font horreur à l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais les hommes intègres dans leur conduite lui sont agréables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: C'est certain, le méchant ne restera pas impuni,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que la descendance des justes sera sauvée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Un anneau d'or au groin d'un porc,
- type: usfm
  marker: q1
  children:
  - type: text
    text: voilà ce qu'est une femme belle mais dépourvue de discernement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tout ce que désirent les justes, c'est le bien;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce que peuvent attendre les méchants, c'est la colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: L'un, qui donne avec largesse, devient encore plus riche;
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'autre, qui épargne à l'excès, ne fait que s'appauvrir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: L'âme généreuse sera comblée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui arrose sera lui-même arrosé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Le peuple maudit celui qui lui refuse le blé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais la bénédiction repose sur la tête de celui qui le vend.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Celui qui recherche le bien s'attire la faveur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui poursuit le mal en devient la victime.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Celui qui se confie dans ses richesses tombera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que les justes verdiront comme le feuillage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Celui qui trouble sa maison héritera du vent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le fou sera l'esclave de l'homme sage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Le fruit que porte le juste est un arbre de vie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le sage gagne des âmes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '*Si le juste est rétribué sur la terre,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: d'autant plus le méchant et le pécheur!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Si… pécheur: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pierre 4.18
      metadata:
        usfm: 1PE.4.18
    - type: usfm
      marker: ft
      children:
