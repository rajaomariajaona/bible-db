document_id: GEN.36
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Origine d'Edom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici la lignée d''Esaü, c''est-à-dire Edom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Esaü avait épousé des femmes cananéennes: Ada, fille d''Elon le Hittite, et Oholibama, fille d''Ana et petite-fille de Tsibeon le Hévien, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'ainsi que Basmath, fille d''Ismaël et sœur de Nebajoth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ada donna à Esaü Eliphaz, et Basmath Réuel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Quant à Oholibama, elle donna naissance à Jéush, Jaelam et Koré. Voilà quels sont les fils d'Esaü, ceux qu'il eut dans le pays de Canaan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Esaü prit ses femmes, ses fils et ses filles, tous les membres de sa famille, ses troupeaux, tout son bétail, tout ce qui lui appartenait et dont il était devenu propriétaire dans le pays de Canaan, et il s''en alla dans un autre pays, loin de son frère Jacob. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'En effet, leurs biens étaient trop nombreux pour qu''ils habitent ensemble et la région où ils séjournaient ne suffisait plus pour eux à cause de leurs troupeaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Esaü s'installa dans la région montagneuse de Séir. Esaü, c'est Edom.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Voici la lignée d''Esaü, l''ancêtre des Edomites, dans la région montagneuse de Séir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Voici les noms des fils d''Esaü: Eliphaz, fils d''Ada, la femme d''Esaü; Réuel, fils de Basmath, la femme d''Esaü.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les fils d''Eliphaz furent Théman, Omar, Tsepho, Gaetham et Kenaz. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Thimna était la concubine d'Eliphaz, le fils d'Esaü; elle donna à Eliphaz Amalek. Voilà quels sont les descendants d'Ada, la femme d'Esaü.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Voici les fils de Réuel: Nahath, Zérach, Shamma et Mizza. Voilà quels sont les descendants de Basmath, la femme d''Esaü.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Voici les fils d''Oholibama, fille d''Ana et petite-fille de Tsibeon, femme d''Esaü: elle donna à Esaü Jéush, Jaelam et Koré.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Voici les chefs des descendants d''Esaü. Voici les fils d''Eliphaz, le fils aîné d''Esaü: les chefs Théman, Omar, Tsepho, Kenaz, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Koré, Gaetham et Amalek. Voilà quels sont les chefs issus d''Eliphaz dans le pays d''Edom. Ce sont les descendants d''Ada. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Voici les fils de Réuel, le fils d''Esaü: les chefs Nahath, Zérach, Shamma et Mizza. Voilà quels sont les chefs issus de Réuel dans le pays d''Edom. Voilà quels sont les descendants de Basmath, la femme d''Esaü. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Voici les fils d''Oholibama, la femme d''Esaü: les chefs Jéush, Jaelam et Koré. Voilà quels sont les chefs issus d''Oholibama, fille d''Ana et femme d''Esaü. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Voilà quels sont les descendants d'Esaü et voilà quels sont leurs chefs. Voilà pour Edom.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Voici les fils de Séir le Horien qui étaient les premiers habitants du pays: Lothan, Shobal, Tsibeon, Ana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dishon, Etser et Dishan. Voilà quels sont les chefs des Horiens et les fils de Séir dans le pays d''Edom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les fils de Lothan furent Hori et Hémam. La sœur de Lothan fut Thimna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Voici les fils de Shobal: Alvan, Manahath, Ebal, Shepho et Onam. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Voici les fils de Tsibeon: Ajja et Ana. C''est cet Ana-là qui découvrit les sources d''eau chaude dans le désert alors qu''il prenait soin des ânes de son père Tsibeon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Voici les enfants d''Ana: Dishon et sa fille Oholibama. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Voici les fils de Dishon: Hemdan, Eshban, Jithran et Keran. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Voici les fils d''Etser: Bilhan, Zaavan et Akan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Voici les fils de Dishan: Uts et Aran.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Voici les chefs des Horiens: Lothan, Shobal, Tsibeon, Ana, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Dishon, Etser et Dishan. Voilà quels sont les chefs des Horiens, les chefs qu'ils eurent dans le pays de Séir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Voici les rois qui ont régné sur le pays d''Edom avant que les Israélites n''aient un roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Béla, fils de Beor, régna sur Edom; le nom de sa ville était Dinhaba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Béla mourut et Jobab, fils de Zérach, de Botsra, devint roi à sa place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jobab mourut et Husham, du pays des Thémanites, devint roi à sa place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Husham mourut et Hadad, fils de Bedad, devint roi à sa place. C''est lui qui battit les Madianites dans la campagne de Moab. Le nom de sa ville était Avith. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Hadad mourut et Samla, de Masréka, devint roi à sa place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Samla mourut et Saül, de Rehoboth-Nahar, devint roi à sa place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Saül mourut et Baal-Hanan, fils d''Acbor, devint roi à sa place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Baal-Hanan, fils d'Acbor, mourut et Hadad devint roi à sa place. Le nom de sa ville était Pau, et celui de sa femme Mehéthabeel. Elle était la fille de Mathred et la petite-fille de Mézahab.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Voici les noms des chefs issus d''Esaü, d''après leurs clans, leurs territoires et leurs noms: Thimna, Alva, Jetheth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Oholibama, Ela, Pinon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Kenaz, Théman, Mibtsar, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Magdiel et Iram. Voilà quels sont les chefs d'Edom d'après leur lieu d'habitation dans le pays qu'ils possédaient.
- type: usfm
  marker: p
  children:
  - type: text
    text: Voilà pour Esaü, l'ancêtre des Edomites.
