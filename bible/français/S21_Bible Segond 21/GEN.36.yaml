document_id: GEN.36,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Origine d'Edom
  - type: text
    content: 'Voici la lignée d''Esaü, c''est-à-dire Edom. '
  '10':
  - type: text
    content: 'Voici les noms des fils d''Esaü: Eliphaz, fils d''Ada, la femme d''Esaü; Réuel, fils de Basmath, la femme d''Esaü.'
  '11':
  - type: text
    content: 'Les fils d''Eliphaz furent Théman, Omar, Tsepho, Gaetham et Kenaz. '
  '12':
  - type: text
    content: Thimna était la concubine d'Eliphaz, le fils d'Esaü; elle donna à Eliphaz Amalek. Voilà quels sont les descendants d'Ada, la femme d'Esaü.
  '13':
  - type: text
    content: 'Voici les fils de Réuel: Nahath, Zérach, Shamma et Mizza. Voilà quels sont les descendants de Basmath, la femme d''Esaü.'
  '14':
  - type: text
    content: 'Voici les fils d''Oholibama, fille d''Ana et petite-fille de Tsibeon, femme d''Esaü: elle donna à Esaü Jéush, Jaelam et Koré.'
  '15':
  - type: text
    content: 'Voici les chefs des descendants d''Esaü. Voici les fils d''Eliphaz, le fils aîné d''Esaü: les chefs Théman, Omar, Tsepho, Kenaz, '
  '16':
  - type: text
    content: 'Koré, Gaetham et Amalek. Voilà quels sont les chefs issus d''Eliphaz dans le pays d''Edom. Ce sont les descendants d''Ada. '
  '17':
  - type: text
    content: 'Voici les fils de Réuel, le fils d''Esaü: les chefs Nahath, Zérach, Shamma et Mizza. Voilà quels sont les chefs issus de Réuel dans le pays d''Edom. Voilà quels sont les descendants de Basmath, la femme d''Esaü. '
  '18':
  - type: text
    content: 'Voici les fils d''Oholibama, la femme d''Esaü: les chefs Jéush, Jaelam et Koré. Voilà quels sont les chefs issus d''Oholibama, fille d''Ana et femme d''Esaü. '
  '19':
  - type: text
    content: Voilà quels sont les descendants d'Esaü et voilà quels sont leurs chefs. Voilà pour Edom.
  '2':
  - type: text
    content: 'Esaü avait épousé des femmes cananéennes: Ada, fille d''Elon le Hittite, et Oholibama, fille d''Ana et petite-fille de Tsibeon le Hévien, '
  '20':
  - type: text
    content: 'Voici les fils de Séir le Horien qui étaient les premiers habitants du pays: Lothan, Shobal, Tsibeon, Ana, '
  '21':
  - type: text
    content: 'Dishon, Etser et Dishan. Voilà quels sont les chefs des Horiens et les fils de Séir dans le pays d''Edom. '
  '22':
  - type: text
    content: 'Les fils de Lothan furent Hori et Hémam. La sœur de Lothan fut Thimna. '
  '23':
  - type: text
    content: 'Voici les fils de Shobal: Alvan, Manahath, Ebal, Shepho et Onam. '
  '24':
  - type: text
    content: 'Voici les fils de Tsibeon: Ajja et Ana. C''est cet Ana-là qui découvrit les sources d''eau chaude dans le désert alors qu''il prenait soin des ânes de son père Tsibeon. '
  '25':
  - type: text
    content: 'Voici les enfants d''Ana: Dishon et sa fille Oholibama. '
  '26':
  - type: text
    content: 'Voici les fils de Dishon: Hemdan, Eshban, Jithran et Keran. '
  '27':
  - type: text
    content: 'Voici les fils d''Etser: Bilhan, Zaavan et Akan. '
  '28':
  - type: text
    content: 'Voici les fils de Dishan: Uts et Aran.'
  '29':
  - type: text
    content: 'Voici les chefs des Horiens: Lothan, Shobal, Tsibeon, Ana, '
  '3':
  - type: text
    content: 'ainsi que Basmath, fille d''Ismaël et sœur de Nebajoth. '
  '30':
  - type: text
    content: Dishon, Etser et Dishan. Voilà quels sont les chefs des Horiens, les chefs qu'ils eurent dans le pays de Séir.
  '31':
  - type: text
    content: 'Voici les rois qui ont régné sur le pays d''Edom avant que les Israélites n''aient un roi. '
  '32':
  - type: text
    content: 'Béla, fils de Beor, régna sur Edom; le nom de sa ville était Dinhaba. '
  '33':
  - type: text
    content: 'Béla mourut et Jobab, fils de Zérach, de Botsra, devint roi à sa place. '
  '34':
  - type: text
    content: 'Jobab mourut et Husham, du pays des Thémanites, devint roi à sa place. '
  '35':
  - type: text
    content: 'Husham mourut et Hadad, fils de Bedad, devint roi à sa place. C''est lui qui battit les Madianites dans la campagne de Moab. Le nom de sa ville était Avith. '
  '36':
  - type: text
    content: 'Hadad mourut et Samla, de Masréka, devint roi à sa place. '
  '37':
  - type: text
    content: 'Samla mourut et Saül, de Rehoboth-Nahar, devint roi à sa place. '
  '38':
  - type: text
    content: 'Saül mourut et Baal-Hanan, fils d''Acbor, devint roi à sa place. '
  '39':
  - type: text
    content: Baal-Hanan, fils d'Acbor, mourut et Hadad devint roi à sa place. Le nom de sa ville était Pau, et celui de sa femme Mehéthabeel. Elle était la fille de Mathred et la petite-fille de Mézahab.
  '4':
  - type: text
    content: 'Ada donna à Esaü Eliphaz, et Basmath Réuel. '
  '40':
  - type: text
    content: 'Voici les noms des chefs issus d''Esaü, d''après leurs clans, leurs territoires et leurs noms: Thimna, Alva, Jetheth, '
  '41':
  - type: text
    content: 'Oholibama, Ela, Pinon, '
  '42':
  - type: text
    content: 'Kenaz, Théman, Mibtsar, '
  '43':
  - type: text
    content: Magdiel et Iram. Voilà quels sont les chefs d'Edom d'après leur lieu d'habitation dans le pays qu'ils possédaient.
  - type: text
    content: Voilà pour Esaü, l'ancêtre des Edomites.
  '5':
  - type: text
    content: Quant à Oholibama, elle donna naissance à Jéush, Jaelam et Koré. Voilà quels sont les fils d'Esaü, ceux qu'il eut dans le pays de Canaan.
  '6':
  - type: text
    content: 'Esaü prit ses femmes, ses fils et ses filles, tous les membres de sa famille, ses troupeaux, tout son bétail, tout ce qui lui appartenait et dont il était devenu propriétaire dans le pays de Canaan, et il s''en alla dans un autre pays, loin de son frère Jacob. '
  '7':
  - type: text
    content: 'En effet, leurs biens étaient trop nombreux pour qu''ils habitent ensemble et la région où ils séjournaient ne suffisait plus pour eux à cause de leurs troupeaux. '
  '8':
  - type: text
    content: Esaü s'installa dans la région montagneuse de Séir. Esaü, c'est Edom.
  '9':
  - type: text
    content: 'Voici la lignée d''Esaü, l''ancêtre des Edomites, dans la région montagneuse de Séir. '
