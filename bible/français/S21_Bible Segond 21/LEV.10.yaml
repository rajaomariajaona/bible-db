document_id: LEV.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faute et mort de Nadab et Abihu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les fils d''Aaron, Nadab et Abihu, prirent chacun un brûle-parfum, y mirent du feu et posèrent du parfum dessus. Ils apportèrent devant l''Eternel du feu étranger, ce qu''il ne leur avait pas ordonné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Alors un feu sortit de devant l'Eternel et les brûla. Ils moururent devant l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Moïse dit à Aaron: «C''est ce que l''Eternel a déclaré lorsqu''il a dit: ‘Ma sainteté devra être respectée par ceux qui s''approchent de moi et ma gloire révélée devant tout le peuple.’» Aaron garda le silence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Moïse appela Mishaël et Eltsaphan, les fils d''Uziel, oncle d''Aaron, et leur dit: «Approchez-vous, emportez vos frères loin du sanctuaire, à l''extérieur du camp.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils s'approchèrent et les emportèrent dans leurs tuniques à l'extérieur du camp, comme Moïse l'avait dit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Moïse dit à Aaron et à ses fils Eléazar et Ithamar: «Vous ne déferez pas votre chevelure et vous ne déchirerez pas vos vêtements'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Déferez… vos vêtements: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: gestes que l'on accomplissait en signe de deuil.
    marker-yv: yv-n
  - type: text
    text: '; ainsi vous ne mourrez pas et n''attirerez pas la colère contre toute l''assemblée. Laissez vos frères, toute la communauté d''Israël, pleurer sur le brasier que l''Eternel a allumé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Vous ne sortirez pas de l'entrée de la tente de la rencontre, sinon vous mourrez, car l'huile de l'onction de l'Eternel est sur vous.» Ils firent ce que Moïse avait dit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L''Eternel dit à Aaron: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '«Tu ne boiras ni vin ni boisson alcoolisée, toi ainsi que tes fils, lorsque vous entrerez dans la tente de la rencontre, sinon vous mourrez. Ce sera une prescription perpétuelle pour vous au fil des générations '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'afin que vous puissiez distinguer ce qui est saint de ce qui est profane, ce qui est impur de ce qui est pur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: et enseigner aux Israélites toutes les prescriptions que l'Eternel leur a données par l'intermédiaire de Moïse.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Moïse dit à Aaron et aux deux fils qui lui restaient, Eléazar et Ithamar: «Prenez ce qui reste de l''offrande parmi les sacrifices passés par le feu pour l''Eternel et mangez-le sans levain près de l''autel, car c''est une chose très sainte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Vous le mangerez dans un lieu saint. C''est la part à laquelle vous avez droit, toi et tes descendants, sur les offrandes passées par le feu pour l''Eternel, car c''est l''ordre que j''ai reçu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Vous mangerez aussi dans un endroit pur, toi ainsi que tes fils et tes filles, la poitrine pour laquelle on a fait le geste de présentation et la cuisse prélevée. En effet, elles vous sont données comme la part à laquelle vous avez droit, toi et tes descendants, dans les sacrifices de communion des Israélites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils apporteront avec les graisses destinées à être passées par le feu la cuisse prélevée et la poitrine avec laquelle on fait le geste de présentation devant l''Eternel: elles seront pour toi ainsi que pour tes descendants, par une prescription perpétuelle, comme l''Eternel l''a ordonné.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Moïse chercha le bouc expiatoire, et voici qu''il avait été brûlé. Alors il s''irrita contre Eléazar et Ithamar, les fils qui restaient à Aaron: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '«Pourquoi n''avez-vous pas mangé la victime expiatoire dans le lieu saint? C''est une chose très sainte. L''Eternel vous l''a donnée pour que vous portiez la faute de l''assemblée, afin de faire l''expiation pour elle devant l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Or le sang de la victime n''a pas été porté à l''intérieur du sanctuaire. Vous deviez la manger dans le sanctuaire, comme j''en avais donné l''ordre.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Aaron dit à Moïse: «Ils ont offert aujourd''hui leur sacrifice d''expiation et leur holocauste devant l''Eternel. Après ce qui m''est arrivé, si j''avais mangé aujourd''hui la victime expiatoire, cela aurait-il plu à l''Eternel?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Moïse entendit et approuva ces paroles.
