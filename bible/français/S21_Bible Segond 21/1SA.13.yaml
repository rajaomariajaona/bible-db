document_id: 1SA.13,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Règne de Saül
  - type: heading
    content: 13.1–31.13
  - type: heading
    content: Guerre contre les Philistins
  - type: text
    content: 'Saül était âgé de 30 ans lorsqu''il devint roi. Il régnait depuis 2 ans sur Israël '
  '10':
  - type: text
    content: 'Il finissait d''offrir l''holocauste lorsque Samuel arriva. Saül sortit à sa rencontre pour le saluer. '
  '11':
  - type: text
    content: 'Samuel dit: «Qu''as-tu fait?» Saül répondit: «Lorsque j''ai vu que le peuple se dispersait loin de moi, que tu n''arrivais pas dans le délai fixé et que les Philistins étaient rassemblés à Micmash, '
  '12':
  - type: text
    content: 'je me suis dit: ‘Les Philistins vont descendre m''attaquer à Guilgal et je n''ai pas imploré l''Eternel!’ C''est alors que je me suis fait violence et que j''ai offert l''holocauste.» '
  '13':
  - type: text
    content: 'Samuel dit à Saül: «Tu t''es comporté de façon stupide! Tu n''as pas respecté le commandement que l''Eternel, ton Dieu, t''avait donné. L''Eternel aurait affermi pour toujours ton règne sur Israël, '
  '14':
  - type: text
    content: mais maintenant ton règne ne durera pas. L'Eternel s'est choisi *un homme selon son cœur
  - type: note
    content: 'Un homme selon son cœur: expression reprise en Actes 13.22.'
  - type: text
    content: ', et il l''a destiné à être le chef de son peuple. Cela arrivera parce que tu n''as pas respecté ce que l''Eternel t''avait ordonné.»'
  '15':
  - type: text
    content: 'Puis Samuel se leva et monta de Guilgal à Guibea de Benjamin. Saül passa en revue le peuple qui se trouvait avec lui: il y avait environ 600 hommes.'
  '16':
  - type: text
    content: 'Saül, son fils Jonathan et le peuple qui se trouvait avec eux avaient pris position à Guéba de Benjamin, et les Philistins avaient leur camp à Micmash. '
  '17':
  - type: text
    content: 'Trois troupes sortirent du camp des Philistins pour semer la dévastation: l''une prit le chemin d''Ophra, vers le pays de Shual, '
  '18':
  - type: text
    content: l'autre le chemin de Beth-Horon, et la troisième le chemin de la frontière qui domine la vallée de Tseboïm, du côté du désert.
  '19':
  - type: text
    content: 'On ne trouvait aucun forgeron dans tout le pays d''Israël, car les Philistins s''étaient dit: «Empêchons les Hébreux de fabriquer des épées ou des lances.» '
  '2':
  - type: text
    content: 'quand il choisit 3000 Israélites: 2000 étaient avec lui à Micmash et sur la montagne de Béthel, et 1000 étaient avec Jonathan à Guibea de Benjamin. Quant au reste du peuple, il le renvoya, chacun dans sa tente. '
  '20':
  - type: text
    content: 'Chaque Israélite descendait donc chez les Philistins pour aiguiser son soc de charrue, sa pioche, sa hache ou sa bêche. '
  '21':
  - type: text
    content: 'Cela coûtait deux tiers d''une pièce d''argent pour aiguiser des bêches, des pioches, des fourches et des haches ou remettre en état des aiguillons. '
  '22':
  - type: text
    content: Ainsi, le jour du combat, le peuple qui était avec Saül et Jonathan ne disposait d'aucune épée ni lance; Saül et son fils Jonathan, en revanche, en possédaient.
  '23':
  - type: text
    content: Un poste avancé des Philistins vint s'établir au défilé de Micmash.
  '3':
  - type: text
    content: 'Jonathan battit la garnison de Philistins qui se trouvait à Guéba et les Philistins l''apprirent. Saül fit sonner de la trompette dans tout le pays en disant: «Que les Hébreux l''apprennent!» '
  '4':
  - type: text
    content: 'Tout Israël apprit que Saül avait battu la garnison des Philistins et qu''Israël avait ainsi provoqué le dégoût des Philistins. Le peuple fut convoqué vers Saül à Guilgal. '
  '5':
  - type: text
    content: 'Les Philistins se rassemblèrent pour combattre Israël. Ils avaient 30''000 chars et 6000 cavaliers, et ils formaient un peuple innombrable, comme le sable qui est au bord de la mer. Ils vinrent installer leur camp à Micmash, à l''est de Beth-Aven. '
  '6':
  - type: text
    content: 'Les Israélites se virent menacés, car ils étaient serrés de près, et ils se cachèrent dans les grottes, les buissons, les rochers, les caveaux et les citernes. '
  '7':
  - type: text
    content: Il y eut aussi des Hébreux qui passèrent le Jourdain pour se rendre dans le pays de Gad et de Galaad. Quant à Saül, il était encore à Guilgal, et tout le peuple qui se trouvait à ses côtés tremblait.
  '8':
  - type: text
    content: 'Saül attendit 7 jours, conformément au délai fixé par Samuel, mais celui-ci n''arrivait pas à Guilgal et le peuple se dispersait loin de Saül. '
  '9':
  - type: text
    content: 'Saül dit alors: «Amenez-moi les victimes destinées à l''holocauste et aux sacrifices de communion», et il offrit l''holocauste. '
