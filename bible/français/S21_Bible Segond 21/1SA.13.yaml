document_id: 1SA.13
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Règne de Saül
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 13.1–31.13
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guerre contre les Philistins
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Saül était âgé de 30 ans lorsqu''il devint roi. Il régnait depuis 2 ans sur Israël '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'quand il choisit 3000 Israélites: 2000 étaient avec lui à Micmash et sur la montagne de Béthel, et 1000 étaient avec Jonathan à Guibea de Benjamin. Quant au reste du peuple, il le renvoya, chacun dans sa tente. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jonathan battit la garnison de Philistins qui se trouvait à Guéba et les Philistins l''apprirent. Saül fit sonner de la trompette dans tout le pays en disant: «Que les Hébreux l''apprennent!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tout Israël apprit que Saül avait battu la garnison des Philistins et qu''Israël avait ainsi provoqué le dégoût des Philistins. Le peuple fut convoqué vers Saül à Guilgal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les Philistins se rassemblèrent pour combattre Israël. Ils avaient 30''000 chars et 6000 cavaliers, et ils formaient un peuple innombrable, comme le sable qui est au bord de la mer. Ils vinrent installer leur camp à Micmash, à l''est de Beth-Aven. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les Israélites se virent menacés, car ils étaient serrés de près, et ils se cachèrent dans les grottes, les buissons, les rochers, les caveaux et les citernes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il y eut aussi des Hébreux qui passèrent le Jourdain pour se rendre dans le pays de Gad et de Galaad. Quant à Saül, il était encore à Guilgal, et tout le peuple qui se trouvait à ses côtés tremblait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Saül attendit 7 jours, conformément au délai fixé par Samuel, mais celui-ci n''arrivait pas à Guilgal et le peuple se dispersait loin de Saül. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Saül dit alors: «Amenez-moi les victimes destinées à l''holocauste et aux sacrifices de communion», et il offrit l''holocauste. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il finissait d''offrir l''holocauste lorsque Samuel arriva. Saül sortit à sa rencontre pour le saluer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Samuel dit: «Qu''as-tu fait?» Saül répondit: «Lorsque j''ai vu que le peuple se dispersait loin de moi, que tu n''arrivais pas dans le délai fixé et que les Philistins étaient rassemblés à Micmash, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'je me suis dit: ‘Les Philistins vont descendre m''attaquer à Guilgal et je n''ai pas imploré l''Eternel!’ C''est alors que je me suis fait violence et que j''ai offert l''holocauste.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Samuel dit à Saül: «Tu t''es comporté de façon stupide! Tu n''as pas respecté le commandement que l''Eternel, ton Dieu, t''avait donné. L''Eternel aurait affermi pour toujours ton règne sur Israël, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: mais maintenant ton règne ne durera pas. L'Eternel s'est choisi *un homme selon son cœur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Un homme selon son cœur: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'expression reprise en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Actes 13.22
      metadata:
        usfm: ACT.13.22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', et il l''a destiné à être le chef de son peuple. Cela arrivera parce que tu n''as pas respecté ce que l''Eternel t''avait ordonné.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Puis Samuel se leva et monta de Guilgal à Guibea de Benjamin. Saül passa en revue le peuple qui se trouvait avec lui: il y avait environ 600 hommes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Saül, son fils Jonathan et le peuple qui se trouvait avec eux avaient pris position à Guéba de Benjamin, et les Philistins avaient leur camp à Micmash. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Trois troupes sortirent du camp des Philistins pour semer la dévastation: l''une prit le chemin d''Ophra, vers le pays de Shual, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: l'autre le chemin de Beth-Horon, et la troisième le chemin de la frontière qui domine la vallée de Tseboïm, du côté du désert.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'On ne trouvait aucun forgeron dans tout le pays d''Israël, car les Philistins s''étaient dit: «Empêchons les Hébreux de fabriquer des épées ou des lances.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Chaque Israélite descendait donc chez les Philistins pour aiguiser son soc de charrue, sa pioche, sa hache ou sa bêche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Cela coûtait deux tiers d''une pièce d''argent pour aiguiser des bêches, des pioches, des fourches et des haches ou remettre en état des aiguillons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ainsi, le jour du combat, le peuple qui était avec Saül et Jonathan ne disposait d'aucune épée ni lance; Saül et son fils Jonathan, en revanche, en possédaient.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Un poste avancé des Philistins vint s'établir au défilé de Micmash.
