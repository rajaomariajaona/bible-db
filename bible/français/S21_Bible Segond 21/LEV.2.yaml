document_id: LEV.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'offrande végétale
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Lorsque quelqu''un apportera une offrande en cadeau à l''Eternel, son offrande sera de fleur de farine. Il versera de l''huile dessus et il y ajoutera de l''encens. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il l''apportera aux prêtres, aux descendants d''Aaron. Le prêtre prendra une poignée de cette fleur de farine arrosée d''huile avec tout l''encens et il brûlera cela sur l''autel comme souvenir. C''est une offrande dont l''odeur est agréable à l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ce qui restera de l'offrande sera pour Aaron et pour ses descendants. C'est une chose très sainte parmi les offrandes passées par le feu pour l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '»Si tu fais une offrande de ce qui est cuit au four, qu''on se serve de fleur de farine et que ce soient des gâteaux sans levain pétris à l''huile et des galettes sans levain arrosées d''huile. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Si ton offrande est un gâteau cuit à la poêle, il sera de fleur de farine pétrie à l''huile, sans levain. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tu le couperas en morceaux et tu verseras de l''huile dessus. C''est une offrande. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Si ton offrande est un gâteau cuit sur le gril, il sera fait de fleur de farine pétrie à l'huile.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '»Tu apporteras l''offrande qui sera faite à l''Eternel avec ces éléments-là; elle sera remise au prêtre, qui la présentera sur l''autel. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le prêtre en prélèvera ce qui doit être offert comme souvenir et le brûlera sur l''autel. C''est une offrande dont l''odeur est agréable à l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ce qui restera de l'offrande sera pour Aaron et pour ses descendants; c'est une chose très sainte parmi les offrandes passées par le feu pour l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '»Aucune des offrandes que vous présenterez à l''Eternel ne sera faite avec du levain. En effet vous ne brûlerez rien qui contienne du levain ou du miel parmi les offrandes passées par le feu pour l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Vous pourrez en offrir à l''Eternel comme offrande de premiers produits, mais on n''en présentera pas sur l''autel comme offrande dont l''odeur est agréable. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tu mettras du sel sur toutes tes offrandes. Tu ne laisseras pas ton offrande manquer de sel, signe de l'alliance de ton Dieu. Sur toutes tes offrandes tu mettras du sel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '»Si tu fais à l''Eternel une offrande des premières récoltes, tu présenteras des épis nouveaux, rôtis au feu et broyés, comme offrande de tes premières récoltes. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tu verseras de l''huile dessus et tu y ajouteras de l''encens. C''est une offrande. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Le prêtre brûlera comme souvenir une portion des épis broyés et de l'huile, avec tout l'encens. C'est une offrande passée par le feu pour l'Eternel.
