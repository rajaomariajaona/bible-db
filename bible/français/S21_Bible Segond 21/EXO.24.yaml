document_id: EXO.24,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moïse sur le mont Sinaï
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu dit à Moïse: «Monte vers l''Eternel avec Aaron, Nadab et Abihu ainsi que 70 anciens d''Israël, et vous vous prosternerez de loin. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils virent le Dieu d''Israël. Sous ses pieds, c''était comme une œuvre en saphir transparent, comme le ciel lui-même dans sa pureté. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il ne porta pas la main contre les personnalités israélites. Ils virent Dieu, puis ils mangèrent et burent.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel dit à Moïse: «Monte vers moi sur la montagne et restes-y. Je te donnerai des tables de pierre, la loi et le commandement que j''ai écrits pour les enseigner.» '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse se leva avec son assistant Josué et commença à gravir la montagne de Dieu. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il avait dit aux anciens: «Attendez-nous ici jusqu''à ce que nous revenions vers vous. Aaron et Hur vont rester avec vous; si quelqu''un a une affaire à régler, c''est à eux qu''il devra s''adresser.»'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse monta sur la montagne, qui fut recouverte par la nuée. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La gloire de l''Eternel reposa sur le mont Sinaï et la nuée le recouvrit pendant 6 jours. Le septième jour, l''Eternel appela Moïse du milieu de la nuée. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La gloire de l''Eternel avait l''apparence d''un feu dévorant au sommet de la montagne, aux yeux des Israélites. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moïse pénétra au milieu de la nuée et continua de gravir la montagne. Il y resta 40 jours et 40 nuits.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse s''approchera seul de l''Eternel: les autres ne s''approcheront pas et le peuple ne montera pas avec lui.»'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse vint rapporter au peuple toutes les paroles de l''Eternel et toutes les règles. Le peuple entier répondit d''une seule voix: «Nous ferons tout ce que l''Eternel a dit.»'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse écrivit toutes les paroles de l''Eternel. Puis il se leva de bon matin, construisit un autel au pied de la montagne et dressa 12 pierres pour les 12 tribus d''Israël. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il envoya de jeunes Israélites offrir à l''Eternel des holocaustes ainsi que des taureaux en sacrifices de communion. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse prit la moitié du sang et la mit dans des bassines, et avec l''autre moitié il aspergea l''autel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il prit le livre de l'alliance
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le livre de l''alliance: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: livre écrit par Moïse, contenant les paroles et les lois données par Dieu.
      marker-yv: yv-n
    - type: text
      text: ' et le lut en présence du peuple. Ils dirent: «Nous ferons tout ce que l''Eternel a dit, nous y obéirons.» '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse prit le sang et en aspergea le peuple en disant: «*Voici le sang de l''alliance que l''Eternel a conclue avec vous'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Voici… vous: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hébreux 9.20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' et évoqué par Jésus en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matthieu 26.28
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Marc 14.24
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luc 22.20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' sur la base de toutes ces paroles.»'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse monta avec Aaron, Nadab et Abihu ainsi que 70 anciens d''Israël. '
