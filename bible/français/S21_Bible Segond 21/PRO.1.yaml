document_id: PRO.1,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: A propos de la sagesse
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 1.1–9.18
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Objectif de l'enseignement
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Proverbes de Salomon
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Salomon: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: roi d'Israël de 970 à 931 av. J.-C., réputé pour sa sagesse.
      marker-yv: yv-n
    - type: text
      text: ', fils de David, roi d''Israël, '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mon fils, si des pécheurs veulent t'entraîner,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne cède pas!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Peut-être te diront-ils: «Viens avec nous!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dressons des embuscades pour verser du sang,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tendons sans raison un piège
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux innocents!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Engloutissons-les vivants, comme le séjour des morts!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, engloutissons-les tout entiers comme ceux qui descendent dans la tombe!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Nous trouverons toutes sortes de biens précieux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et nous remplirons nos maisons de butin.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Tu auras ta part avec nous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n'y aura qu'une bourse pour nous tous!»
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Mon fils, ne te mets pas en chemin avec eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: écarte ton pied de leur sentier!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: En effet, leurs pieds courent au mal
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils sont pressés de verser le sang.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Or, il ne sert à rien de poser un piège
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sous les yeux de tout ce qui peut voler.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Eux, c'est contre leur propre vie qu'ils dressent des embuscades,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est à eux-mêmes qu'ils tendent un piège.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tel est le sentier de tout homme assoiffé de profit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le gain malhonnête cause la perte de son propriétaire.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'appel de la sagesse
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'pour connaître la sagesse et l''instruction, pour comprendre les paroles de l''intelligence, '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: La sagesse crie dans les rues,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle parle tout haut sur les places,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: elle appelle à l'entrée des endroits bruyants.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Aux portes, dans la ville, elle fait entendre ses paroles:'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: «Jusqu'à quand, vous qui manquez d'expérience, aimerez-vous la naïveté?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu'à quand les moqueurs trouveront-ils leur plaisir dans la moquerie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les hommes stupides détesteront-ils la connaissance?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Revenez pour écouter mes reproches!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je veux déverser mon Esprit sur vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je veux vous faire connaître mes paroles.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: »Puisque j'appelle et que vous résistez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puisque je tends la main et que personne n'y prête attention,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: puisque vous négligez tous mes conseils
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et n'acceptez pas mes reproches,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: moi aussi je rirai quand vous serez dans le malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je me moquerai quand la terreur fondra sur vous,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: quand la terreur fondra sur vous comme une tempête
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que le malheur vous enveloppera comme un tourbillon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand la détresse et l'angoisse s'empareront de vous.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: »Alors ils m'appelleront et je ne répondrai pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils me chercheront et ils ne me trouveront pas.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Parce qu'ils ont détesté la connaissance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et n'ont pas choisi la crainte de l'Eternel,
  '3':
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'pour recevoir des leçons de bon sens, de justice, d''équité et de droiture, '
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: parce qu'ils n'ont pas accepté mes conseils
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ont méprisé tous mes reproches,
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: ils se nourriront du fruit de leur conduite
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils se rassasieront de leurs propres conseils.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: En effet, l'égarement de ceux qui manquent d'expérience les tue
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'insouciance des hommes stupides provoque leur perte.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: En revanche, celui qui m'écoute habitera en sécurité.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il vivra tranquille et n'aura à redouter aucun mal.»
  '4':
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: pour donner du discernement à ceux qui manquent d'expérience, de la connaissance et de la réflexion aux jeunes.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Que le sage écoute, et il augmentera son savoir!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui est intelligent gagnera en habileté
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: pour comprendre les proverbes et les paraboles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les paroles des sages et leurs énigmes.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: La connaissance commence par la crainte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Crainte: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire une attitude de profond respect et de révérence qui pousse à se conformer à la volonté divine.
      marker-yv: yv-n
    - type: text
      text: ' de l''Eternel.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il faut être fou pour mépriser la sagesse et l'instruction.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mon fils, écoute l'instruction de ton père
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne rejette pas l'enseignement de ta mère!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: En effet, ce sera une couronne de grâce pour ta tête
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et un collier pour ton cou.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les mauvaises compagnies
    marker-yv: yv-h
