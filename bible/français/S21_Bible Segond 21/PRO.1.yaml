document_id: PRO.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: A propos de la sagesse
  - type: heading
    content: 1.1–9.18
  - type: heading
    content: Objectif de l'enseignement
  - type: text
    content: Proverbes de Salomon
  - type: note
    content: 'Salomon: roi d''Israël de 970 à 931 av. J.-C., réputé pour sa sagesse.'
  - type: text
    content: ', fils de David, roi d''Israël, '
  '10':
  - type: text
    content: Mon fils, si des pécheurs veulent t'entraîner,
  - type: text
    content: ne cède pas!
  '11':
  - type: text
    content: 'Peut-être te diront-ils: «Viens avec nous!'
  - type: text
    content: Dressons des embuscades pour verser du sang,
  - type: text
    content: tendons sans raison un piège
  - type: text
    content: aux innocents!
  '12':
  - type: text
    content: Engloutissons-les vivants, comme le séjour des morts!
  - type: text
    content: Oui, engloutissons-les tout entiers comme ceux qui descendent dans la tombe!
  '13':
  - type: text
    content: Nous trouverons toutes sortes de biens précieux
  - type: text
    content: et nous remplirons nos maisons de butin.
  '14':
  - type: text
    content: Tu auras ta part avec nous,
  - type: text
    content: il n'y aura qu'une bourse pour nous tous!»
  '15':
  - type: text
    content: Mon fils, ne te mets pas en chemin avec eux,
  - type: text
    content: écarte ton pied de leur sentier!
  '16':
  - type: text
    content: En effet, leurs pieds courent au mal
  - type: text
    content: et ils sont pressés de verser le sang.
  '17':
  - type: text
    content: Or, il ne sert à rien de poser un piège
  - type: text
    content: sous les yeux de tout ce qui peut voler.
  '18':
  - type: text
    content: Eux, c'est contre leur propre vie qu'ils dressent des embuscades,
  - type: text
    content: c'est à eux-mêmes qu'ils tendent un piège.
  '19':
  - type: text
    content: 'Tel est le sentier de tout homme assoiffé de profit:'
  - type: text
    content: le gain malhonnête cause la perte de son propriétaire.
  - type: heading
    content: L'appel de la sagesse
  '2':
  - type: text
    content: 'pour connaître la sagesse et l''instruction, pour comprendre les paroles de l''intelligence, '
  '20':
  - type: text
    content: La sagesse crie dans les rues,
  - type: text
    content: elle parle tout haut sur les places,
  '21':
  - type: text
    content: elle appelle à l'entrée des endroits bruyants.
  - type: text
    content: 'Aux portes, dans la ville, elle fait entendre ses paroles:'
  '22':
  - type: text
    content: «Jusqu'à quand, vous qui manquez d'expérience, aimerez-vous la naïveté?
  - type: text
    content: Jusqu'à quand les moqueurs trouveront-ils leur plaisir dans la moquerie
  - type: text
    content: et les hommes stupides détesteront-ils la connaissance?
  '23':
  - type: text
    content: Revenez pour écouter mes reproches!
  - type: text
    content: Je veux déverser mon Esprit sur vous,
  - type: text
    content: je veux vous faire connaître mes paroles.
  '24':
  - type: text
    content: »Puisque j'appelle et que vous résistez,
  - type: text
    content: puisque je tends la main et que personne n'y prête attention,
  '25':
  - type: text
    content: puisque vous négligez tous mes conseils
  - type: text
    content: et n'acceptez pas mes reproches,
  '26':
  - type: text
    content: moi aussi je rirai quand vous serez dans le malheur,
  - type: text
    content: je me moquerai quand la terreur fondra sur vous,
  '27':
  - type: text
    content: quand la terreur fondra sur vous comme une tempête
  - type: text
    content: et que le malheur vous enveloppera comme un tourbillon,
  - type: text
    content: quand la détresse et l'angoisse s'empareront de vous.
  '28':
  - type: text
    content: »Alors ils m'appelleront et je ne répondrai pas,
  - type: text
    content: ils me chercheront et ils ne me trouveront pas.
  '29':
  - type: text
    content: Parce qu'ils ont détesté la connaissance
  - type: text
    content: et n'ont pas choisi la crainte de l'Eternel,
  '3':
  - type: text
    content: 'pour recevoir des leçons de bon sens, de justice, d''équité et de droiture, '
  '30':
  - type: text
    content: parce qu'ils n'ont pas accepté mes conseils
  - type: text
    content: et ont méprisé tous mes reproches,
  '31':
  - type: text
    content: ils se nourriront du fruit de leur conduite
  - type: text
    content: et ils se rassasieront de leurs propres conseils.
  '32':
  - type: text
    content: En effet, l'égarement de ceux qui manquent d'expérience les tue
  - type: text
    content: et l'insouciance des hommes stupides provoque leur perte.
  '33':
  - type: text
    content: En revanche, celui qui m'écoute habitera en sécurité.
  - type: text
    content: Il vivra tranquille et n'aura à redouter aucun mal.»
  '4':
  - type: text
    content: pour donner du discernement à ceux qui manquent d'expérience, de la connaissance et de la réflexion aux jeunes.
  '5':
  - type: text
    content: Que le sage écoute, et il augmentera son savoir!
  - type: text
    content: Celui qui est intelligent gagnera en habileté
  '6':
  - type: text
    content: pour comprendre les proverbes et les paraboles,
  - type: text
    content: les paroles des sages et leurs énigmes.
  '7':
  - type: text
    content: La connaissance commence par la crainte
  - type: note
    content: 'Crainte: c''est-à-dire une attitude de profond respect et de révérence qui pousse à se conformer à la volonté divine.'
  - type: text
    content: ' de l''Eternel.'
  - type: text
    content: Il faut être fou pour mépriser la sagesse et l'instruction.
  '8':
  - type: text
    content: Mon fils, écoute l'instruction de ton père
  - type: text
    content: et ne rejette pas l'enseignement de ta mère!
  '9':
  - type: text
    content: En effet, ce sera une couronne de grâce pour ta tête
  - type: text
    content: et un collier pour ton cou.
  - type: heading
    content: Les mauvaises compagnies
