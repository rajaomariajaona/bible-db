document_id: JHN.14,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus encourage les siens
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Que votre cœur ne se trouble pas! Croyez en Dieu, croyez aussi en moi. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne crois-tu pas que je suis dans le Père et que le Père est en moi? Les paroles que je vous dis, je ne les dis pas de moi-même; c''est le Père qui vit en moi qui fait lui-même ces œuvres. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Croyez-moi: je suis dans le Père et le Père est en moi. Sinon, croyez[-moi] au moins à cause de ces œuvres!'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»En vérité, en vérité, je vous le dis, celui qui croit en moi fera aussi les œuvres que je fais, et il en fera même de plus grandes, parce que je vais vers mon Père. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout ce que vous demanderez en mon nom, je le ferai afin que la gloire du Père soit révélée dans le Fils. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si vous [me] demandez quelque chose en mon nom, je le ferai.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Promesse de l'envoi du Saint-Esprit
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Si vous m''aimez, respectez mes commandements. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant à moi, je prierai le Père et il vous donnera un autre défenseur afin qu''il reste éternellement avec vous: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'l''Esprit de la vérité, que le monde ne peut pas accepter parce qu''il ne le voit pas et ne le connaît pas. [Mais] vous, vous le connaissez, car il reste avec vous et il sera en vous. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ne vous laisserai pas orphelins, je reviens vers vous. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Encore un peu de temps et le monde ne me verra plus; mais vous, vous me verrez parce que je vis et que vous vivrez aussi. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y a beaucoup de demeures dans la maison de mon Père. Si ce n''était pas le cas, je vous l''aurais dit. Je vais vous préparer une place. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce jour-là, vous saurez que je suis en mon Père, que vous êtes en moi et moi en vous. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Celui qui a mes commandements et qui les garde, c'est celui qui m'aime; celui qui m'aime sera aimé de mon Père et moi aussi, je l'aimerai et je me ferai connaître à lui.»
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jude – à distinguer de l''Iscariot – lui dit: «Seigneur, comment se fait-il que tu te feras connaître à nous et non au monde?» '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui répondit: «Si quelqu''un m''aime, il gardera ma parole et mon Père l''aimera; nous viendrons vers lui et nous établirons domicile chez lui. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Celui qui ne m'aime pas ne garde pas mes paroles, et la parole que vous entendez ne vient pas de moi, mais du Père qui m'a envoyé.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Je vous ai dit cela pendant que je suis encore avec vous, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mais le défenseur, l'Esprit saint que le Père enverra en mon nom, vous enseignera toutes choses et vous rappellera tout ce que je vous ai dit.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Je vous laisse la paix, je vous donne ma paix. Je ne vous la donne pas comme le monde donne. Que votre cœur ne se trouble pas et ne se laisse pas effrayer. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous avez entendu que je vous ai dit: ‘Je m''en vais et je reviens vers vous.’ Si vous m''aimiez, vous vous réjouiriez de ce que je vais auprès du Père, car mon Père est plus grand que moi. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous ai dit ces choses maintenant, avant qu''elles n''arrivent, afin que, lorsqu''elles arriveront, vous croyiez. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et puisque je vais vous préparer une place, je reviendrai et je vous prendrai avec moi afin que, là où je suis, vous y soyez aussi. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ne parlerai plus beaucoup avec vous, car le prince du monde vient, et il n''a rien en moi. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cependant, ainsi, le monde saura que j'aime le Père et que j'agis conformément à l'ordre que le Père m'a donné. Levez-vous, partons d'ici.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous savez où je vais et vous en savez le chemin.»
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Thomas lui dit: «Seigneur, nous ne savons pas où tu vas. Comment pouvons-nous en savoir le chemin?» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui dit: «C''est moi qui suis le chemin, la vérité et la vie. On ne vient au Père qu''en passant par moi. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si vous me connaissiez, vous connaîtriez aussi mon Père. Et dès maintenant vous le connaissez et vous l'avez vu.»
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Philippe lui dit: «Seigneur, montre-nous le Père, et cela nous suffit.» '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui dit: «Il y a si longtemps que je suis avec vous et tu ne me connais pas, Philippe! Celui qui m''a vu a vu le Père. Comment peux-tu dire: ‘Montre-nous le Père’? '
