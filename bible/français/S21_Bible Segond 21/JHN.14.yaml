document_id: JHN.14,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus encourage les siens
  - type: text
    content: '»Que votre cœur ne se trouble pas! Croyez en Dieu, croyez aussi en moi. '
  '10':
  - type: text
    content: 'Ne crois-tu pas que je suis dans le Père et que le Père est en moi? Les paroles que je vous dis, je ne les dis pas de moi-même; c''est le Père qui vit en moi qui fait lui-même ces œuvres. '
  '11':
  - type: text
    content: 'Croyez-moi: je suis dans le Père et le Père est en moi. Sinon, croyez[-moi] au moins à cause de ces œuvres!'
  '12':
  - type: text
    content: '»En vérité, en vérité, je vous le dis, celui qui croit en moi fera aussi les œuvres que je fais, et il en fera même de plus grandes, parce que je vais vers mon Père. '
  '13':
  - type: text
    content: 'Tout ce que vous demanderez en mon nom, je le ferai afin que la gloire du Père soit révélée dans le Fils. '
  '14':
  - type: text
    content: Si vous [me] demandez quelque chose en mon nom, je le ferai.
  - type: heading
    content: Promesse de l'envoi du Saint-Esprit
  '15':
  - type: text
    content: '»Si vous m''aimez, respectez mes commandements. '
  '16':
  - type: text
    content: 'Quant à moi, je prierai le Père et il vous donnera un autre défenseur afin qu''il reste éternellement avec vous: '
  '17':
  - type: text
    content: 'l''Esprit de la vérité, que le monde ne peut pas accepter parce qu''il ne le voit pas et ne le connaît pas. [Mais] vous, vous le connaissez, car il reste avec vous et il sera en vous. '
  '18':
  - type: text
    content: 'Je ne vous laisserai pas orphelins, je reviens vers vous. '
  '19':
  - type: text
    content: 'Encore un peu de temps et le monde ne me verra plus; mais vous, vous me verrez parce que je vis et que vous vivrez aussi. '
  '2':
  - type: text
    content: 'Il y a beaucoup de demeures dans la maison de mon Père. Si ce n''était pas le cas, je vous l''aurais dit. Je vais vous préparer une place. '
  '20':
  - type: text
    content: 'Ce jour-là, vous saurez que je suis en mon Père, que vous êtes en moi et moi en vous. '
  '21':
  - type: text
    content: Celui qui a mes commandements et qui les garde, c'est celui qui m'aime; celui qui m'aime sera aimé de mon Père et moi aussi, je l'aimerai et je me ferai connaître à lui.»
  '22':
  - type: text
    content: 'Jude – à distinguer de l''Iscariot – lui dit: «Seigneur, comment se fait-il que tu te feras connaître à nous et non au monde?» '
  '23':
  - type: text
    content: 'Jésus lui répondit: «Si quelqu''un m''aime, il gardera ma parole et mon Père l''aimera; nous viendrons vers lui et nous établirons domicile chez lui. '
  '24':
  - type: text
    content: Celui qui ne m'aime pas ne garde pas mes paroles, et la parole que vous entendez ne vient pas de moi, mais du Père qui m'a envoyé.
  '25':
  - type: text
    content: '»Je vous ai dit cela pendant que je suis encore avec vous, '
  '26':
  - type: text
    content: mais le défenseur, l'Esprit saint que le Père enverra en mon nom, vous enseignera toutes choses et vous rappellera tout ce que je vous ai dit.
  '27':
  - type: text
    content: '»Je vous laisse la paix, je vous donne ma paix. Je ne vous la donne pas comme le monde donne. Que votre cœur ne se trouble pas et ne se laisse pas effrayer. '
  '28':
  - type: text
    content: 'Vous avez entendu que je vous ai dit: ‘Je m''en vais et je reviens vers vous.’ Si vous m''aimiez, vous vous réjouiriez de ce que je vais auprès du Père, car mon Père est plus grand que moi. '
  '29':
  - type: text
    content: 'Je vous ai dit ces choses maintenant, avant qu''elles n''arrivent, afin que, lorsqu''elles arriveront, vous croyiez. '
  '3':
  - type: text
    content: 'Et puisque je vais vous préparer une place, je reviendrai et je vous prendrai avec moi afin que, là où je suis, vous y soyez aussi. '
  '30':
  - type: text
    content: 'Je ne parlerai plus beaucoup avec vous, car le prince du monde vient, et il n''a rien en moi. '
  '31':
  - type: text
    content: Cependant, ainsi, le monde saura que j'aime le Père et que j'agis conformément à l'ordre que le Père m'a donné. Levez-vous, partons d'ici.
  '4':
  - type: text
    content: Vous savez où je vais et vous en savez le chemin.»
  '5':
  - type: text
    content: 'Thomas lui dit: «Seigneur, nous ne savons pas où tu vas. Comment pouvons-nous en savoir le chemin?» '
  '6':
  - type: text
    content: 'Jésus lui dit: «C''est moi qui suis le chemin, la vérité et la vie. On ne vient au Père qu''en passant par moi. '
  '7':
  - type: text
    content: Si vous me connaissiez, vous connaîtriez aussi mon Père. Et dès maintenant vous le connaissez et vous l'avez vu.»
  '8':
  - type: text
    content: 'Philippe lui dit: «Seigneur, montre-nous le Père, et cela nous suffit.» '
  '9':
  - type: text
    content: 'Jésus lui dit: «Il y a si longtemps que je suis avec vous et tu ne me connais pas, Philippe! Celui qui m''a vu a vu le Père. Comment peux-tu dire: ‘Montre-nous le Père’? '
