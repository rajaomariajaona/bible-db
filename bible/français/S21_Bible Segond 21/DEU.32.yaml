document_id: DEU.32
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '«Ciel, prête l''oreille et je parlerai! Terre, écoute les paroles de ma bouche! '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Que mes instructions se déversent comme la pluie, que ma parole tombe comme la rosée, comme des ondées sur la verdure, comme des gouttes d'eau sur l'herbe!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '»Oui, je proclamerai le nom de l''Eternel. Rendez gloire à notre Dieu! '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il est le rocher. Ce qu'il accomplit est parfait, car toutes ses voies sont justes. C'est un Dieu fidèle et dépourvu d'injustice, il est juste et droit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '»S''ils se sont corrompus, ce n''est pas sa faute; la honte en repose sur ses enfants, cette génération fausse et tordue. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Est-ce l'Eternel que vous en rendrez responsable, peuple fou et dépourvu de sagesse? N'est-il pas ton père, ton maître? N'est-ce pas lui qui t'a formé et qui t'a établi?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '»Souviens-toi des jours d''autrefois, passe en revue les années, génération par génération. Interroge ton père et il te l''apprendra, tes vieillards et ils te le diront: '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: quand le Très-Haut a donné un héritage aux nations, quand il a séparé les humains, il a fixé les frontières des peuples d'après le nombre des Israélites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '»En effet, la part de l''Eternel, c''est son peuple, Jacob est sa part d''héritage. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il l''a trouvé dans une région déserte, dans un chaos rempli d''effroyables hurlements. Il l''a entouré, il a pris soin de lui, il l''a gardé comme la prunelle de son œil. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il s'est montré pareil à l'aigle qui réveille sa couvée, voltige sur ses petits, déploie ses ailes, les prend et les porte sur ses plumes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '»L''Eternel seul a conduit son peuple: il n''y avait avec lui aucun dieu étranger. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il l''a fait monter sur les hauteurs du pays et Israël a mangé les produits des champs. Il lui a fait sucer le miel du rocher, l''huile qui sort du rocher le plus dur, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: le lait caillé des vaches et le lait des brebis, avec la graisse des agneaux, des béliers du Basan et des boucs, avec la fleur du blé, et tu as bu le sang du raisin, le vin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: »Jeshurun
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jeshurun: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nom poétique d'Israël signifiant probablement celui qui est droit, celui qui est juste.
    marker-yv: yv-n
  - type: text
    text: ' est devenu gras et il s''est cabré. Tu es devenu gras, épais, dodu! Il a abandonné Dieu, son créateur, il a méprisé le rocher de son salut. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils ont excité sa jalousie par des dieux étrangers, ils l''ont irrité par des pratiques abominables; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'ils ont offert des sacrifices à des démons qui ne sont pas Dieu, à des dieux qu''ils ne connaissaient pas, des dieux nouveaux, apparus depuis peu, et que vos ancêtres n''avaient pas craints. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tu as abandonné le rocher qui t'a donné naissance, tu as oublié le Dieu qui t'a mis au monde.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '»L''Eternel l''a vu et il s''est irrité, indigné contre ses fils et ses filles. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il a dit: ‘Je me cacherai à eux et je verrai bien quelle sera leur fin, car c''est une génération perverse, ce sont des enfants infidèles. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ils ont provoqué ma jalousie par ce qui n'est pas Dieu, ils m'ont irrité par leurs idoles sans consistance. Et moi, *je provoquerai leur jalousie par ce qui n'est pas un peuple, je provoquerai leur irritation par une nation sans intelligence
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je provoquerai… intelligence: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 10.19
      metadata:
        usfm: ROM.10.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'car le feu de ma colère s''est allumé et il brûlera tout jusqu''au fond du séjour des morts. Il dévorera la terre et ses produits, il embrasera les fondements des montagnes. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'J''accumulerai les malheurs sur eux, je tirerai toutes mes flèches contre eux. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ils seront desséchés par la faim, consumés par la fièvre et par des maladies violentes. J''enverrai parmi eux la dent des bêtes féroces et le venin des serpents. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Dehors leurs enfants mourront par l'épée, et dedans par la terreur. Le jeune homme connaîtra le même sort que la jeune fille, et le nourrisson le même sort que le vieillard.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '»Je voudrais dire: Je les emporterai d''un souffle, je ferai disparaître leur souvenir parmi les hommes, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'mais je crains les insultes de l''ennemi, je crains que leurs adversaires n''interprètent mal et ne disent: C''est notre main qui est puissante, ce n''est pas l''Eternel qui a accompli tout cela.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '»C''est une nation qui a perdu tout bon sens et il n''y a pas d''intelligence en eux. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'S''ils étaient sages, voici ce qu''ils comprendraient, et ils penseraient à ce qui leur arrivera: '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'comment un seul pourrait-il en poursuivre 1000, et deux en mettre 10''000 en fuite, si leur rocher ne les avait pas vendus, si l''Eternel ne les avait pas livrés? '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'En effet, leur rocher n''est pas comme notre rocher, nos ennemis en sont juges. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Mais leur vigne vient des plants de Sodome et du terroir de Gomorrhe. Leurs raisins sont des raisins empoisonnés, leurs grappes sont amères. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Leur vin, c'est le venin des serpents, c'est le poison cruel des vipères.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: '»Cela n''est-il pas caché près de moi, scellé dans mes trésors? '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: '*C''est à moi qu''appartient la vengeance, c''est moi qui leur donnerai ce qu''ils méritent'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.35 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'C''est à… méritent: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 12.19
      metadata:
        usfm: ROM.12.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hébreux 10.30
      metadata:
        usfm: HEB.10.30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' quand leur pied trébuchera! En effet, le jour de leur malheur est proche et ce qui les attend ne tardera pas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: »*L'Eternel jugera son peuple, mais il aura pitié de ses serviteurs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.36 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''Eternel… serviteurs: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité au Psaume 135.14 et partiellement en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hébreux 10.30
      metadata:
        usfm: HEB.10.30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' en voyant que leur force est épuisée et qu''il n''y a plus ni esclave ni homme libre. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Il dira: ‘Où sont leurs dieux, le rocher qui leur servait de refuge, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'ces dieux qui mangeaient la graisse de leurs sacrifices, qui buvaient le vin de leurs offrandes? Qu''ils se lèvent, qu''ils vous secourent, qu''ils vous couvrent de leur protection! '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Voyez donc que c''est moi qui suis Dieu et qu''il n''y a pas d''autre dieu que moi. C''est moi qui fais vivre et mourir, qui blesse et guéris, et personne ne peut délivrer de ma main. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'En effet, je lève ma main vers le ciel et je dis: Je vis éternellement!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: '»Si j''aiguise mon épée fulgurante et si ma main s''empare du jugement, je me vengerai de mes adversaires et je punirai ceux qui me détestent. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Mon épée dévorera leur chair et j'enivrerai mes flèches de sang, du sang des blessés et des prisonniers, de la tête des chefs de l'ennemi.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: »*Nations, réjouissez-vous avec son peuple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.43 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Nations… avec son peuple: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 15.10
      metadata:
        usfm: ROM.15.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', car l''Eternel venge le sang de ses serviteurs. Il se venge de ses adversaires et fait l''expiation pour son pays, pour son peuple.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Moïse vint prononcer toutes les paroles de ce cantique en présence du peuple. Josué, fils de Nun, était avec lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Lorsque Moïse eut fini de prononcer toutes ces paroles devant tous les Israélites, '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'il leur dit: «Prenez à cœur toutes les paroles que je vous supplie aujourd''hui de recommander à vos enfants, afin qu''ils respectent et mettent en pratique toutes les paroles de cette loi. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'En effet, ce n''est pas une parole sans importance pour vous: c''est votre vie, et c''est par elle que vous pourrez vivre longtemps dans le pays dont vous aurez la possession une fois le Jourdain passé.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ordre à Moïse de gravir le mont Nebo
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Le même jour, l''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: '«Monte sur ce sommet des montagnes d''Abarim, sur le mont Nebo dans le pays de Moab, vis-à-vis de Jéricho, et regarde le pays de Canaan que je donne en propriété aux Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Tu mourras sur la montagne où tu vas monter et tu iras rejoindre les tiens, tout comme ton frère Aaron est mort sur le mont Hor et est allé rejoindre les siens. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'En effet, vous avez péché contre moi au milieu des Israélites, près des eaux de Meriba, à Kadès, dans le désert de Tsin, et vous n''avez pas respecté ma sainteté au milieu des Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Tu verras le pays devant toi, mais tu n'entreras pas dans le pays que je donne aux Israélites.»
