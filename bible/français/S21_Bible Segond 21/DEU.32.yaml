document_id: DEU.32,152
type_code: fra
verses:
  '1':
  - type: text
    content: '«Ciel, prête l''oreille et je parlerai! Terre, écoute les paroles de ma bouche! '
  '10':
  - type: text
    content: 'Il l''a trouvé dans une région déserte, dans un chaos rempli d''effroyables hurlements. Il l''a entouré, il a pris soin de lui, il l''a gardé comme la prunelle de son œil. '
  '11':
  - type: text
    content: Il s'est montré pareil à l'aigle qui réveille sa couvée, voltige sur ses petits, déploie ses ailes, les prend et les porte sur ses plumes.
  '12':
  - type: text
    content: '»L''Eternel seul a conduit son peuple: il n''y avait avec lui aucun dieu étranger. '
  '13':
  - type: text
    content: 'Il l''a fait monter sur les hauteurs du pays et Israël a mangé les produits des champs. Il lui a fait sucer le miel du rocher, l''huile qui sort du rocher le plus dur, '
  '14':
  - type: text
    content: le lait caillé des vaches et le lait des brebis, avec la graisse des agneaux, des béliers du Basan et des boucs, avec la fleur du blé, et tu as bu le sang du raisin, le vin.
  '15':
  - type: text
    content: »Jeshurun
  - type: note
    content: 'Jeshurun: nom poétique d''Israël signifiant probablement celui qui est droit, celui qui est juste.'
  - type: text
    content: ' est devenu gras et il s''est cabré. Tu es devenu gras, épais, dodu! Il a abandonné Dieu, son créateur, il a méprisé le rocher de son salut. '
  '16':
  - type: text
    content: 'Ils ont excité sa jalousie par des dieux étrangers, ils l''ont irrité par des pratiques abominables; '
  '17':
  - type: text
    content: 'ils ont offert des sacrifices à des démons qui ne sont pas Dieu, à des dieux qu''ils ne connaissaient pas, des dieux nouveaux, apparus depuis peu, et que vos ancêtres n''avaient pas craints. '
  '18':
  - type: text
    content: Tu as abandonné le rocher qui t'a donné naissance, tu as oublié le Dieu qui t'a mis au monde.
  '19':
  - type: text
    content: '»L''Eternel l''a vu et il s''est irrité, indigné contre ses fils et ses filles. '
  '2':
  - type: text
    content: Que mes instructions se déversent comme la pluie, que ma parole tombe comme la rosée, comme des ondées sur la verdure, comme des gouttes d'eau sur l'herbe!
  '20':
  - type: text
    content: 'Il a dit: ‘Je me cacherai à eux et je verrai bien quelle sera leur fin, car c''est une génération perverse, ce sont des enfants infidèles. '
  '21':
  - type: text
    content: Ils ont provoqué ma jalousie par ce qui n'est pas Dieu, ils m'ont irrité par leurs idoles sans consistance. Et moi, *je provoquerai leur jalousie par ce qui n'est pas un peuple, je provoquerai leur irritation par une nation sans intelligence
  - type: note
    content: 'Je provoquerai… intelligence: cité en Romains 10.19.'
  - type: text
    content: ', '
  '22':
  - type: text
    content: 'car le feu de ma colère s''est allumé et il brûlera tout jusqu''au fond du séjour des morts. Il dévorera la terre et ses produits, il embrasera les fondements des montagnes. '
  '23':
  - type: text
    content: 'J''accumulerai les malheurs sur eux, je tirerai toutes mes flèches contre eux. '
  '24':
  - type: text
    content: 'Ils seront desséchés par la faim, consumés par la fièvre et par des maladies violentes. J''enverrai parmi eux la dent des bêtes féroces et le venin des serpents. '
  '25':
  - type: text
    content: Dehors leurs enfants mourront par l'épée, et dedans par la terreur. Le jeune homme connaîtra le même sort que la jeune fille, et le nourrisson le même sort que le vieillard.
  '26':
  - type: text
    content: '»Je voudrais dire: Je les emporterai d''un souffle, je ferai disparaître leur souvenir parmi les hommes, '
  '27':
  - type: text
    content: 'mais je crains les insultes de l''ennemi, je crains que leurs adversaires n''interprètent mal et ne disent: C''est notre main qui est puissante, ce n''est pas l''Eternel qui a accompli tout cela.’'
  '28':
  - type: text
    content: '»C''est une nation qui a perdu tout bon sens et il n''y a pas d''intelligence en eux. '
  '29':
  - type: text
    content: 'S''ils étaient sages, voici ce qu''ils comprendraient, et ils penseraient à ce qui leur arrivera: '
  '3':
  - type: text
    content: '»Oui, je proclamerai le nom de l''Eternel. Rendez gloire à notre Dieu! '
  '30':
  - type: text
    content: 'comment un seul pourrait-il en poursuivre 1000, et deux en mettre 10''000 en fuite, si leur rocher ne les avait pas vendus, si l''Eternel ne les avait pas livrés? '
  '31':
  - type: text
    content: 'En effet, leur rocher n''est pas comme notre rocher, nos ennemis en sont juges. '
  '32':
  - type: text
    content: 'Mais leur vigne vient des plants de Sodome et du terroir de Gomorrhe. Leurs raisins sont des raisins empoisonnés, leurs grappes sont amères. '
  '33':
  - type: text
    content: Leur vin, c'est le venin des serpents, c'est le poison cruel des vipères.
  '34':
  - type: text
    content: '»Cela n''est-il pas caché près de moi, scellé dans mes trésors? '
  '35':
  - type: text
    content: '*C''est à moi qu''appartient la vengeance, c''est moi qui leur donnerai ce qu''ils méritent'
  - type: note
    content: 'C''est à… méritent: cité en Romains 12.19; Hébreux 10.30.'
  - type: text
    content: ' quand leur pied trébuchera! En effet, le jour de leur malheur est proche et ce qui les attend ne tardera pas.'
  '36':
  - type: text
    content: »*L'Eternel jugera son peuple, mais il aura pitié de ses serviteurs
  - type: note
    content: 'L''Eternel… serviteurs: cité au Psaume 135.14 et partiellement en Hébreux 10.30.'
  - type: text
    content: ' en voyant que leur force est épuisée et qu''il n''y a plus ni esclave ni homme libre. '
  '37':
  - type: text
    content: 'Il dira: ‘Où sont leurs dieux, le rocher qui leur servait de refuge, '
  '38':
  - type: text
    content: 'ces dieux qui mangeaient la graisse de leurs sacrifices, qui buvaient le vin de leurs offrandes? Qu''ils se lèvent, qu''ils vous secourent, qu''ils vous couvrent de leur protection! '
  '39':
  - type: text
    content: 'Voyez donc que c''est moi qui suis Dieu et qu''il n''y a pas d''autre dieu que moi. C''est moi qui fais vivre et mourir, qui blesse et guéris, et personne ne peut délivrer de ma main. '
  '4':
  - type: text
    content: Il est le rocher. Ce qu'il accomplit est parfait, car toutes ses voies sont justes. C'est un Dieu fidèle et dépourvu d'injustice, il est juste et droit.
  '40':
  - type: text
    content: 'En effet, je lève ma main vers le ciel et je dis: Je vis éternellement!'
  '41':
  - type: text
    content: '»Si j''aiguise mon épée fulgurante et si ma main s''empare du jugement, je me vengerai de mes adversaires et je punirai ceux qui me détestent. '
  '42':
  - type: text
    content: Mon épée dévorera leur chair et j'enivrerai mes flèches de sang, du sang des blessés et des prisonniers, de la tête des chefs de l'ennemi.’
  '43':
  - type: text
    content: »*Nations, réjouissez-vous avec son peuple
  - type: note
    content: 'Nations… avec son peuple: cité en Romains 15.10.'
  - type: text
    content: ', car l''Eternel venge le sang de ses serviteurs. Il se venge de ses adversaires et fait l''expiation pour son pays, pour son peuple.»'
  '44':
  - type: text
    content: Moïse vint prononcer toutes les paroles de ce cantique en présence du peuple. Josué, fils de Nun, était avec lui.
  '45':
  - type: text
    content: 'Lorsque Moïse eut fini de prononcer toutes ces paroles devant tous les Israélites, '
  '46':
  - type: text
    content: 'il leur dit: «Prenez à cœur toutes les paroles que je vous supplie aujourd''hui de recommander à vos enfants, afin qu''ils respectent et mettent en pratique toutes les paroles de cette loi. '
  '47':
  - type: text
    content: 'En effet, ce n''est pas une parole sans importance pour vous: c''est votre vie, et c''est par elle que vous pourrez vivre longtemps dans le pays dont vous aurez la possession une fois le Jourdain passé.»'
  - type: heading
    content: Ordre à Moïse de gravir le mont Nebo
  '48':
  - type: text
    content: 'Le même jour, l''Eternel dit à Moïse: '
  '49':
  - type: text
    content: '«Monte sur ce sommet des montagnes d''Abarim, sur le mont Nebo dans le pays de Moab, vis-à-vis de Jéricho, et regarde le pays de Canaan que je donne en propriété aux Israélites. '
  '5':
  - type: text
    content: '»S''ils se sont corrompus, ce n''est pas sa faute; la honte en repose sur ses enfants, cette génération fausse et tordue. '
  '50':
  - type: text
    content: 'Tu mourras sur la montagne où tu vas monter et tu iras rejoindre les tiens, tout comme ton frère Aaron est mort sur le mont Hor et est allé rejoindre les siens. '
  '51':
  - type: text
    content: 'En effet, vous avez péché contre moi au milieu des Israélites, près des eaux de Meriba, à Kadès, dans le désert de Tsin, et vous n''avez pas respecté ma sainteté au milieu des Israélites. '
  '52':
  - type: text
    content: Tu verras le pays devant toi, mais tu n'entreras pas dans le pays que je donne aux Israélites.»
  '6':
  - type: text
    content: Est-ce l'Eternel que vous en rendrez responsable, peuple fou et dépourvu de sagesse? N'est-il pas ton père, ton maître? N'est-ce pas lui qui t'a formé et qui t'a établi?
  '7':
  - type: text
    content: '»Souviens-toi des jours d''autrefois, passe en revue les années, génération par génération. Interroge ton père et il te l''apprendra, tes vieillards et ils te le diront: '
  '8':
  - type: text
    content: quand le Très-Haut a donné un héritage aux nations, quand il a séparé les humains, il a fixé les frontières des peuples d'après le nombre des Israélites.
  '9':
  - type: text
    content: '»En effet, la part de l''Eternel, c''est son peuple, Jacob est sa part d''héritage. '
