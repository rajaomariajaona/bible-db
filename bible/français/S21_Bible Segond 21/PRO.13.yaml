document_id: PRO.13,152
type_code: fra
verses:
  '1':
  - type: text
    content: Un fils sage écoute l'instruction de son père,
  - type: text
    content: mais le moqueur n'écoute pas la menace.
  '10':
  - type: text
    content: Ce n'est que par orgueil qu'on attise les querelles,
  - type: text
    content: mais la sagesse est avec ceux qui écoutent les conseils.
  '11':
  - type: text
    content: Une fortune mal acquise diminue,
  - type: text
    content: mais celui qui amasse peu à peu augmente son bien.
  '12':
  - type: text
    content: Un espoir différé rend le cœur malade,
  - type: text
    content: mais un désir accompli est un arbre de vie.
  '13':
  - type: text
    content: Celui qui méprise la parole se perd,
  - type: text
    content: mais celui qui craint le commandement est récompensé.
  '14':
  - type: text
    content: L'enseignement du sage est une source de vie
  - type: text
    content: pour détourner des pièges de la mort.
  '15':
  - type: text
    content: Le bon sens a pour fruit la grâce,
  - type: text
    content: mais la voie des traîtres est sans issue.
  '16':
  - type: text
    content: Tout homme prudent agit en connaissance de cause,
  - type: text
    content: mais l'homme stupide fait étalage de sa folie.
  '17':
  - type: text
    content: Un envoyé méchant tombe dans le malheur,
  - type: text
    content: mais un messager fidèle apporte la guérison.
  '18':
  - type: text
    content: La pauvreté et la honte sont pour qui néglige l'instruction,
  - type: text
    content: l'honneur pour qui tient compte du reproche.
  '19':
  - type: text
    content: Il est agréable de voir un désir se réaliser,
  - type: text
    content: mais s'éloigner du mal fait horreur aux hommes stupides.
  '2':
  - type: text
    content: Grâce au fruit de la bouche on jouit du bien;
  - type: text
    content: mais ce que désirent les traîtres, c'est la violence.
  '20':
  - type: text
    content: Celui qui marche en compagnie des sages devient sage
  - type: text
    content: et celui qui fréquente des hommes stupides se retrouvera en mauvaise posture.
  '21':
  - type: text
    content: Le malheur poursuit les pécheurs,
  - type: text
    content: tandis que le bonheur récompense les justes.
  '22':
  - type: text
    content: L'homme de bien laisse un héritage aux enfants de ses enfants,
  - type: text
    content: tandis que les richesses du pécheur sont en réserve pour le juste.
  '23':
  - type: text
    content: Le champ que défriche le pauvre donne une nourriture abondante,
  - type: text
    content: mais l'absence d'équité provoque la perte de certains.
  '24':
  - type: text
    content: Il déteste son fils, celui qui ménage son bâton;
  - type: text
    content: celui qui l'aime cherche à le discipliner.
  '25':
  - type: text
    content: Le juste mange et satisfait son appétit,
  - type: text
    content: tandis que le ventre des méchants n'a jamais assez.
  '3':
  - type: text
    content: Celui qui veille sur sa bouche se garde lui-même,
  - type: text
    content: mais celui qui ouvre de grandes lèvres court à sa perte.
  '4':
  - type: text
    content: Le paresseux a des désirs qu'il ne peut satisfaire,
  - type: text
    content: tandis que les personnes actives sont comblées.
  '5':
  - type: text
    content: Le juste déteste les paroles mensongères;
  - type: text
    content: le méchant se rend odieux et se couvre de honte.
  '6':
  - type: text
    content: La justice garde celui dont la conduite est intègre,
  - type: text
    content: mais la méchanceté cause la ruine du pécheur.
  '7':
  - type: text
    content: L'un fait le riche et n'a rien du tout,
  - type: text
    content: l'autre fait le pauvre et a de grands biens.
  '8':
  - type: text
    content: La richesse d'un homme peut servir de rançon pour sa vie,
  - type: text
    content: mais le pauvre n'a pas à subir la menace.
  '9':
  - type: text
    content: La lumière des justes brille joyeusement,
  - type: text
    content: tandis que la lampe des méchants s'éteint.
