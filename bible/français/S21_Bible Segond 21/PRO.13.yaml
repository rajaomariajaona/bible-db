document_id: PRO.13
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Un fils sage écoute l'instruction de son père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais le moqueur n'écoute pas la menace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Grâce au fruit de la bouche on jouit du bien;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ce que désirent les traîtres, c'est la violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Celui qui veille sur sa bouche se garde lui-même,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui ouvre de grandes lèvres court à sa perte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Le paresseux a des désirs qu'il ne peut satisfaire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que les personnes actives sont comblées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Le juste déteste les paroles mensongères;
- type: usfm
  marker: q1
  children:
  - type: text
    text: le méchant se rend odieux et se couvre de honte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: La justice garde celui dont la conduite est intègre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais la méchanceté cause la ruine du pécheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: L'un fait le riche et n'a rien du tout,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'autre fait le pauvre et a de grands biens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: La richesse d'un homme peut servir de rançon pour sa vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais le pauvre n'a pas à subir la menace.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: La lumière des justes brille joyeusement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que la lampe des méchants s'éteint.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ce n'est que par orgueil qu'on attise les querelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais la sagesse est avec ceux qui écoutent les conseils.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Une fortune mal acquise diminue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui amasse peu à peu augmente son bien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Un espoir différé rend le cœur malade,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais un désir accompli est un arbre de vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Celui qui méprise la parole se perd,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui craint le commandement est récompensé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: L'enseignement du sage est une source de vie
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour détourner des pièges de la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Le bon sens a pour fruit la grâce,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais la voie des traîtres est sans issue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tout homme prudent agit en connaissance de cause,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais l'homme stupide fait étalage de sa folie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Un envoyé méchant tombe dans le malheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais un messager fidèle apporte la guérison.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: La pauvreté et la honte sont pour qui néglige l'instruction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'honneur pour qui tient compte du reproche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il est agréable de voir un désir se réaliser,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais s'éloigner du mal fait horreur aux hommes stupides.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Celui qui marche en compagnie des sages devient sage
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celui qui fréquente des hommes stupides se retrouvera en mauvaise posture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Le malheur poursuit les pécheurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que le bonheur récompense les justes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: L'homme de bien laisse un héritage aux enfants de ses enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que les richesses du pécheur sont en réserve pour le juste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Le champ que défriche le pauvre donne une nourriture abondante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais l'absence d'équité provoque la perte de certains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Il déteste son fils, celui qui ménage son bâton;
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui l'aime cherche à le discipliner.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Le juste mange et satisfait son appétit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que le ventre des méchants n'a jamais assez.
