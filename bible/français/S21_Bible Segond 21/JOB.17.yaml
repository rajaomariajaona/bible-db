document_id: JOB.17,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Mon souffle se perd,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mes jours s'éteignent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la tombe m'attend.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Quant à vous tous, vous pouvez répéter les mêmes discours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne trouverai pas un sage parmi vous.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment! Mes jours sont passés, mes projets sont anéantis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ces projets qui remplissaient mon cœur,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils prétendent que la nuit, c'est le jour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que la lumière est proche quand les ténèbres sont là!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Qu'ai-je à espérer? Le séjour des morts sera mon domicile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est dans les ténèbres que je prépare mon lit.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je crie à la tombe: ‘Tu es mon père!’'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et aux vers: ‘Vous êtes ma mère et ma sœur!’'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'ai-je donc à espérer?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon espérance, qui peut l'entrevoir?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle descendra vers les portes du séjour des morts
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand nous serons étendus ensemble dans la poussière.»
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis environné de moqueurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je connais l'insomnie à cause de leurs insultes.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois donc mon garant auprès de toi-même!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui d'autre s'engagerait pour moi?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, tu as fermé leur cœur au bon sens;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est pourquoi tu ne les laisseras pas triompher.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »On invite des amis au partage du butin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors que l'on a des enfants dont les yeux sont épuisés.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a fait de moi un sujet de proverbes pour les peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je suis devenu celui sur le visage duquel on crache.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma vue est affaiblie par l'exaspération,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous mes membres sont pareils à une ombre.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les hommes droits en sont stupéfaits
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'innocent se dresse contre l'impie.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le juste néanmoins persévère dans sa voie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui a les mains pures se fortifie de plus en plus.
