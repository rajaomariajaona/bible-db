document_id: JOB.17,152
type_code: fra
verses:
  '1':
  - type: text
    content: »Mon souffle se perd,
  - type: text
    content: mes jours s'éteignent,
  - type: text
    content: la tombe m'attend.
  '10':
  - type: text
    content: »Quant à vous tous, vous pouvez répéter les mêmes discours,
  - type: text
    content: je ne trouverai pas un sage parmi vous.
  '11':
  - type: text
    content: Comment! Mes jours sont passés, mes projets sont anéantis,
  - type: text
    content: ces projets qui remplissaient mon cœur,
  '12':
  - type: text
    content: et ils prétendent que la nuit, c'est le jour,
  - type: text
    content: que la lumière est proche quand les ténèbres sont là!
  '13':
  - type: text
    content: »Qu'ai-je à espérer? Le séjour des morts sera mon domicile,
  - type: text
    content: c'est dans les ténèbres que je prépare mon lit.
  '14':
  - type: text
    content: 'Je crie à la tombe: ‘Tu es mon père!’'
  - type: text
    content: 'et aux vers: ‘Vous êtes ma mère et ma sœur!’'
  '15':
  - type: text
    content: Qu'ai-je donc à espérer?
  - type: text
    content: Mon espérance, qui peut l'entrevoir?
  '16':
  - type: text
    content: Elle descendra vers les portes du séjour des morts
  - type: text
    content: quand nous serons étendus ensemble dans la poussière.»
  '2':
  - type: text
    content: Je suis environné de moqueurs,
  - type: text
    content: je connais l'insomnie à cause de leurs insultes.
  '3':
  - type: text
    content: Sois donc mon garant auprès de toi-même!
  - type: text
    content: Qui d'autre s'engagerait pour moi?
  '4':
  - type: text
    content: En effet, tu as fermé leur cœur au bon sens;
  - type: text
    content: c'est pourquoi tu ne les laisseras pas triompher.
  '5':
  - type: text
    content: »On invite des amis au partage du butin,
  - type: text
    content: alors que l'on a des enfants dont les yeux sont épuisés.
  '6':
  - type: text
    content: Il a fait de moi un sujet de proverbes pour les peuples,
  - type: text
    content: je suis devenu celui sur le visage duquel on crache.
  '7':
  - type: text
    content: Ma vue est affaiblie par l'exaspération,
  - type: text
    content: tous mes membres sont pareils à une ombre.
  '8':
  - type: text
    content: Les hommes droits en sont stupéfaits
  - type: text
    content: et l'innocent se dresse contre l'impie.
  '9':
  - type: text
    content: Le juste néanmoins persévère dans sa voie,
  - type: text
    content: celui qui a les mains pures se fortifie de plus en plus.
