document_id: EST.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Accession d'Esther au trône
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 1.1–2.23
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Destitution de la reine Vasthi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'C''était à l''époque d''Assuérus, de cet Assuérus qui régnait sur 127 provinces depuis l''Inde jusqu''en Ethiopie. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le roi Assuérus siégeait à ce moment-là à Suse, la capitale. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'La troisième année de son règne, il organisa un banquet pour tous ses princes et serviteurs. Les responsables militaires des Perses et des Mèdes, les nobles et les chefs des provinces furent réunis devant lui. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il étala la glorieuse richesse de son royaume et l''éclatante splendeur de sa grandeur. Cela dura longtemps: 180 jours.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'A la fin de cette période, le roi organisa un banquet pour toute la population de Suse, la capitale, du plus grand au plus petit. Celui-ci dura 7 jours et eut pour cadre le jardin du palais. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Des tentures blanches, vertes et bleues étaient attachées par des cordons de fin lin et de pourpre à des anneaux d''argent et à des colonnes de marbre. Des lits en or et en argent reposaient sur un pavé de porphyre, de marbre, de nacre et de pierres noires. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'On servait à boire dans des récipients en or, tous différents les uns des autres, et il y avait du vin royal dans une abondance qui reflétait la puissance du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Cependant, conformément au décret, on ne forçait personne à boire. En effet, le roi avait ordonné à tous ses serviteurs de se conformer à la volonté de chacun. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: De son côté, la reine Vasthi organisa aussi un banquet pour les femmes du palais royal d'Assuérus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le septième jour, placé dans de joyeuses dispositions par le vin, le roi Assuérus ordonna à Mehuman, Biztha, Harbona, Bigtha, Abagtha, Zéthar et Carcas, les sept eunuques qui étaient à son service, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'de faire venir devant lui la reine Vasthi, coiffée de la couronne royale, pour montrer sa beauté aux peuples et aux princes. En effet, c''était une belle femme. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Cependant, la reine Vasthi refusa de venir quand les eunuques lui transmirent le message du roi. Le roi s''en montra très fâché et en nourrit une ardente colère. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il s''adressa donc aux sages astrologues, car c''était ainsi que se traitaient les affaires royales: devant tous ceux qui connaissaient les lois et le droit. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Son proche entourage était composé de Carshena, Shéthar, Admatha, Tarsis, Mérès, Marsena, Memucan. Ces sept princes de Perse et de Médie étaient admis en présence du roi et occupaient les premières places dans le royaume. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il leur demanda: «D''après la loi, comment faut-il traiter la reine Vasthi suite à son refus de respecter l''ordre du roi Assuérus transmis par les eunuques?» '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Memucan répondit devant le roi et les princes: «Ce n''est pas seulement vis-à-vis du roi que la reine Vasthi s''est mal comportée, c''est aussi vis-à-vis de tous les princes et de tous les peuples qui habitent toutes les provinces du roi Assuérus. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'En effet, l''attitude de la reine déteindra sur l''ensemble des femmes et les incitera à porter un regard méprisant sur leur mari. Elles diront: ‘Le roi Assuérus avait ordonné qu''on fasse venir la reine Vasthi devant lui, et elle n''y est pas allée.’ '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Aujourd''hui déjà, les princesses de Perse et de Médie qui ont entendu parler de l''attitude de la reine s''adresseront de la même manière à tous les princes du roi, ce qui entraînera beaucoup de mépris et de colère. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Si le roi le juge bon, il devrait émettre un édit royal et l''inscrire dans les lois des Perses et des Mèdes, avec défense de l''enfreindre. Cet édit interdirait à Vasthi de se présenter devant le roi Assuérus et préciserait que le roi donnera le titre de reine à une autre qui soit meilleure qu''elle. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Le décret du roi sera connu dans tout son royaume, malgré son immensité, et toutes les femmes honoreront leur mari, du plus grand au plus petit.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le roi et les princes trouvèrent le conseil bon, et le roi agit conformément à la parole de Memucan: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: il envoya des lettres à toutes ses provinces, à chaque province dans son écriture et à chaque peuple dans sa langue, pour dire que tout homme devait être le chef de son foyer et y parler sa langue maternelle.
