document_id: DEU.4,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Appel à découvrir la sagesse de la loi
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Maintenant, Israël, écoute les prescriptions et les règles que je vous enseigne. Mettez-les en pratique afin de vivre et afin d''entrer en possession du pays que vous donne l''Eternel, le Dieu de vos ancêtres. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Souviens-toi du jour où tu t''es présenté devant l''Eternel, ton Dieu, à Horeb, lorsque l''Eternel m''a dit: ‘Rassemble le peuple auprès de moi! Je veux leur faire entendre mes paroles, afin qu''ils apprennent à me craindre tout le temps qu''ils vivront sur la terre et qu''ils les enseignent à leurs enfants.’ '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous vous êtes approchés et vous vous êtes tenus au pied de la montagne. La montagne était embrasée et les flammes s''élevaient jusqu''en plein ciel. Il y avait des ténèbres, des nuées, de l''obscurité. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel vous a parlé du milieu du feu; vous avez entendu le son des paroles, mais vous n''avez pas vu de représentation, vous avez seulement entendu une voix. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il a proclamé son alliance qu'il vous a ordonné de respecter, les dix commandements, et il les a écrits sur deux tables de pierre.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »A cette époque-là, l'Eternel m'a ordonné de vous enseigner des prescriptions et des règles, afin que vous les mettiez en pratique dans le pays dont vous allez prendre possession.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Puisque vous n''avez vu aucune représentation le jour où l''Eternel vous a parlé du milieu du feu, à Horeb, veillez attentivement sur vous-mêmes: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ne vous corrompez pas et ne vous faites pas de sculpture sacrée, de représentation d''une idole quelconque, que ce soit sous la forme d''un homme ou d''une femme, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'd''un animal qui vit sur la terre, d''un oiseau qui vole dans le ciel, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'd''une bête qui rampe sur le sol ou d''un poisson qui vit dans l''eau sous la terre. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Veille sur toi-même. Sinon, en levant les yeux vers le ciel et en voyant le soleil, la lune et les étoiles, tous les corps célestes, tu te laisserais entraîner à te prosterner devant eux et à leur rendre un culte. Cela, c''est la part que l''Eternel, ton Dieu, a attribuée à tous les peuples qui vivent sous le ciel. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous n'ajouterez ni n'enlèverez rien à ce que je vous prescris; vous garderez les commandements de l'Eternel, votre Dieu, tels que je vous les prescris.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais vous, l''Eternel vous a pris et vous a fait sortir de la fournaise de fer de l''Egypte afin que vous soyez un peuple qui lui appartienne en propre, comme c''est le cas aujourd''hui. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel s''est irrité contre moi à cause de vous. Il a juré que je ne passerais pas le Jourdain et que je n''entrerais pas dans le bon pays que l''Eternel, ton Dieu, te donne en héritage. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je mourrai donc dans ce pays-ci, je ne passerai pas le Jourdain, tandis que vous, vous le passerez et vous posséderez ce bon pays. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Veillez bien à ne pas oublier l''alliance que l''Eternel, votre Dieu, a conclue avec vous et à ne pas vous faire de sculpture sacrée, de représentation quelconque que l''Eternel, ton Dieu, t''ait défendue. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, l'Eternel, ton *Dieu, est un feu dévorant
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dieu… dévorant: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hébreux 12.29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', un Dieu jaloux.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Lorsque tu auras des enfants et des petits-enfants et que vous vivrez depuis longtemps dans ce pays, si vous vous corrompez, si vous faites des sculptures sacrées, des représentations de quoi que ce soit, si vous faites ce qui est mal aux yeux de l''Eternel, votre Dieu, pour l''irriter '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '– j''en prends aujourd''hui à témoin contre vous le ciel et la terre – vous disparaîtrez bien vite du pays dont vous allez prendre possession de l''autre côté du Jourdain. Vous n''y vivrez pas longtemps, car vous serez détruits. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel vous dispersera parmi les peuples et vous ne resterez qu''en petit nombre au milieu des nations où il vous conduira. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous y servirez des dieux fabriqués par la main de l''homme, du bois et de la pierre, qui ne peuvent ni voir ni entendre, ni manger, ni sentir. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De là, tu chercheras l''Eternel, ton Dieu, et tu le trouveras si tu le cherches de tout ton cœur et de toute ton âme. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Vos yeux ont vu ce que l''Eternel a fait au dieu Baal-Peor: l''Eternel, ton Dieu, a détruit du milieu de toi tous ceux qui avaient suivi Baal-Peor, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans ta détresse, quand tout cela t''arrivera, dans l''avenir, tu retourneras à l''Eternel, ton Dieu, et tu écouteras sa voix. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Oui, l'Eternel, ton Dieu, est un Dieu de compassion. Il ne t'abandonnera pas et ne t'anéantira pas, il n'oubliera pas l'alliance de tes ancêtres, celle qu'il a conclue avec eux en prêtant serment.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Interroge le passé, les jours qui t''ont précédé depuis celui où Dieu a créé l''homme sur la terre, et informe-toi d''une extrémité du ciel à l''autre: y a-t-il déjà eu si grand événement et a-t-on déjà entendu chose pareille? '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Y a-t-il déjà eu un peuple qui entende Dieu parler du milieu du feu, comme tu l''as entendu, et qui soit resté en vie? '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Y a-t-il déjà eu un dieu qui cherche à venir se prendre une nation du milieu d''une autre nation, par des épreuves, des signes, des miracles et des combats, avec puissance et force et avec des actes terrifiants? C''est pourtant exactement ainsi que l''Eternel, votre Dieu, a agi pour vous en Egypte et sous vos yeux. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et toi, tu as eu la possibilité de voir cela afin que tu reconnaisses que c'est l'Eternel qui est Dieu et qu'il *n'y en a pas d'autre que lui
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.35 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il n''y en a pas d''autre que lui: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'affirmation reprise au verset 39 et en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Marc 12.32
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Du ciel il t''a fait entendre sa voix pour t''instruire et sur la terre il t''a fait voir son grand feu, et tu as entendu ses paroles du milieu du feu. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a aimé tes ancêtres et il a choisi leur descendance après eux. Il t''a fait lui-même sortir d''Egypte par sa grande puissance. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il a chassé devant toi des nations supérieures en nombre et en force pour te faire entrer dans leur pays, pour te le donner en possession, comme tu le vois aujourd''hui. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sache donc aujourd''hui et retiens dans ton cœur que c''est l''Eternel qui est Dieu, en haut dans le ciel et en bas sur la terre, et qu''il n''y en a pas d''autre. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: tandis que vous, qui vous êtes attachés à l'Eternel, votre Dieu, vous êtes aujourd'hui tous vivants.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Respecte ses prescriptions et ses commandements, que je te donne aujourd'hui, afin d'être heureux, toi et tes enfants après toi, et de vivre longtemps sur le territoire que l'Eternel, ton Dieu, te donne en propriété perpétuelle.»
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse choisit alors trois villes de l''autre côté du Jourdain, à l''est, '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'afin qu''elles servent de refuge à l''auteur d''un homicide, à celui qui aurait involontairement tué son prochain sans avoir été auparavant son ennemi, afin qu''il puisse sauver sa vie en s''enfuyant dans l''une de ces villes. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C'étaient Betser dans le désert, dans la plaine, chez les Rubénites, Ramoth en Galaad chez les Gadites et Golan en Basan chez les Manassites.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rappel des dix commandements
    marker-yv: yv-h
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici la loi que Moïse exposa aux Israélites. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les instructions, les prescriptions et les règles que Moïse donna aux Israélites après leur sortie d''Egypte. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''était de l''autre côté du Jourdain, dans la vallée qui se trouve vis-à-vis de Beth-Peor, dans le pays de Sihon, le roi des Amoréens qui habitait à Hesbon et qui fut battu par Moïse et les Israélites après leur sortie d''Egypte. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils s''emparèrent de son pays et de celui d''Og, le roi du Basan. Ces deux rois des Amoréens habitaient de l''autre côté du Jourdain, à l''est. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Leur territoire s''étendait depuis Aroër sur les bords du torrent de l''Arnon jusqu''au mont Sirion, c''est-à-dire l''Hermon, '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et il embrassait toute la plaine de l'autre côté du Jourdain, à l'est, jusqu'à la mer de la plaine
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.49 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'La mer de la plaine: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'c''est-à-dire la mer Morte (cf. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3.17'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' au pied du Pisga.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Voici, je vous ai enseigné des prescriptions et des règles, comme l''Eternel, mon Dieu, me l''a ordonné, afin que vous les mettiez en pratique dans le pays dont vous allez prendre possession. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous les respecterez et vous les mettrez en pratique, car ce sera là votre sagesse et votre intelligence aux yeux des autres peuples. Lorsqu''ils entendront parler de toutes ces prescriptions, ils diront: ‘Cette grande nation est un peuple vraiment sage et intelligent!’'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Quelle est, en effet, la grande nation qui ait des dieux aussi proches que l''Eternel, notre Dieu, l''est de nous toutes les fois que nous faisons appel à lui? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et quelle est la grande nation qui ait des prescriptions et des règles aussi justes que toute cette loi que je vous présente aujourd'hui?
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Seulement, fais bien attention à toi! Veille attentivement sur toi-même tous les jours de ta vie, afin de ne pas oublier ce que tes yeux ont vu et de ne pas le laisser sortir de ton cœur. Enseigne-le à tes enfants et à tes petits-enfants. '
