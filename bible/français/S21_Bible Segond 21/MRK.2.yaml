document_id: MRK.2,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Guérison d'un paralysé
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelques jours après, Jésus revint à Capernaüm. On apprit qu''il était à la maison, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Afin que vous sachiez que le Fils de l'homme
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Fils de l''homme: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'expression par laquelle Jésus se désignait fréquemment lui-même, avec une probable allusion à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Daniel 7.13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' a sur la terre le pouvoir de pardonner les péchés, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'je te l''ordonne – dit-il au paralysé –, lève-toi, prends ton brancard et retourne chez toi.» '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aussitôt il se leva, prit son brancard et sortit devant tout le monde, de sorte qu''ils étaient tous très étonnés et célébraient la gloire de Dieu en disant: «Nous n''avons jamais rien vu de pareil.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Réactions face à Jésus
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus sortit de nouveau du côté du lac. Toute la foule venait à lui et il l''enseignait. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En passant, il vit Lévi, fils d''Alphée, assis au bureau des taxes. Il lui dit: «Suis-moi.» Lévi se leva et le suivit.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Comme Jésus était à table dans la maison de Lévi, beaucoup de collecteurs d'impôts et de pécheurs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Pécheurs: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire jugés comme tels par ceux qui se croyaient justes.
      marker-yv: yv-n
    - type: text
      text: ' se mirent aussi à table avec lui et avec ses disciples, car ils étaient nombreux à le suivre. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le voyant manger avec les collecteurs d'impôts et les pécheurs, les spécialistes de la loi et les pharisiens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Pharisiens: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: membres d'un courant du judaïsme caractérisé par un fort intérêt pour les questions de pureté rituelle et par le souci de respecter le plus strictement possible la loi de Moïse ainsi que les traditions.
      marker-yv: yv-n
    - type: text
      text: ' dirent à ses disciples: «Pourquoi mange-t-il avec les collecteurs d''impôts et les pécheurs?» '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus, qui avait entendu, leur dit: «Ce ne sont pas les bien portants qui ont besoin de médecin, mais les malades. Je ne suis pas venu appeler des justes, mais des pécheurs, [à changer d''attitude].»'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les disciples de Jean et les pharisiens jeûnaient. Ils vinrent dire à Jésus: «Pourquoi les disciples de Jean et ceux des pharisiens jeûnent-ils, tandis que tes disciples ne jeûnent pas?» '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur répondit: «Les invités à la noce peuvent-ils jeûner pendant que le marié est avec eux? Aussi longtemps que le marié est avec eux, ils ne peuvent pas jeûner. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et un si grand nombre de personnes se rassemblèrent qu'il n'y avait plus de place, pas même devant la porte. Il leur annonçait la parole.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les jours viendront où le marié leur sera enlevé, et alors ils jeûneront durant ces jours-là. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Personne ne coud un morceau de tissu neuf sur un vieil habit, sinon la pièce neuve ajoutée arrache une partie du vieux, et la déchirure devient pire. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et personne ne met du vin nouveau dans de vieilles outres, sinon les outres éclatent, le vin coule et les outres sont perdues; mais [il faut mettre] le vin nouveau dans des outres neuves.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus et le sabbat
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un jour de sabbat, Jésus traversait des champs de blé. Tout en marchant, ses disciples se mirent à arracher des épis. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les pharisiens lui dirent: «Regarde! Pourquoi font-ils ce qui n''est pas permis pendant le sabbat'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sabbat: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: jour du repos, où l'on ne devait faire aucun travail pénible.
      marker-yv: yv-n
    - type: text
      text: '?» '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur répondit: «N''avez-vous jamais lu ce qu''a fait David, lorsqu''il a été dans le besoin et qu''il a eu faim, lui et ses compagnons? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il est entré dans la maison de Dieu, à l''époque du grand-prêtre Abiathar, a mangé les pains consacrés qu''il n''est permis qu''aux prêtres de manger et en a même donné à ses compagnons!» '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il leur dit: «Le sabbat a été fait pour l''homme, et non l''homme pour le sabbat, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: de sorte que le Fils de l'homme est le Seigneur même du sabbat.»
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On vint lui amener un paralysé porté par quatre hommes. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme ils ne pouvaient pas l''aborder à cause de la foule, ils découvrirent le toit au-dessus de l''endroit où il se tenait et descendirent par cette ouverture le brancard sur lequel le paralysé était couché. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voyant leur foi, Jésus dit au paralysé: «Mon enfant, tes péchés te sont pardonnés.» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait là quelques spécialistes de la loi qui étaient assis et qui se disaient en eux-mêmes: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Pourquoi cet homme parle-t-il ainsi? Il blasphème. Qui peut pardonner les péchés, si ce n''est Dieu seul?» '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus sut aussitôt dans son esprit qu''ils raisonnaient ainsi en eux-mêmes, et il leur dit: «Pourquoi raisonnez-vous ainsi dans vos cœurs? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qu''est-ce qui est le plus facile à dire au paralysé: ‘Tes péchés sont pardonnés’, ou: ‘Lève-toi, prends ton brancard et marche’? '
