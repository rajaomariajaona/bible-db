document_id: MRK.2,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Guérison d'un paralysé
  - type: text
    content: 'Quelques jours après, Jésus revint à Capernaüm. On apprit qu''il était à la maison, '
  '10':
  - type: text
    content: Afin que vous sachiez que le Fils de l'homme
  - type: note
    content: 'Fils de l''homme: expression par laquelle Jésus se désignait fréquemment lui-même, avec une probable allusion à Daniel 7.13.'
  - type: text
    content: ' a sur la terre le pouvoir de pardonner les péchés, '
  '11':
  - type: text
    content: 'je te l''ordonne – dit-il au paralysé –, lève-toi, prends ton brancard et retourne chez toi.» '
  '12':
  - type: text
    content: 'Aussitôt il se leva, prit son brancard et sortit devant tout le monde, de sorte qu''ils étaient tous très étonnés et célébraient la gloire de Dieu en disant: «Nous n''avons jamais rien vu de pareil.»'
  - type: heading
    content: Réactions face à Jésus
  '13':
  - type: text
    content: 'Jésus sortit de nouveau du côté du lac. Toute la foule venait à lui et il l''enseignait. '
  '14':
  - type: text
    content: 'En passant, il vit Lévi, fils d''Alphée, assis au bureau des taxes. Il lui dit: «Suis-moi.» Lévi se leva et le suivit.'
  '15':
  - type: text
    content: Comme Jésus était à table dans la maison de Lévi, beaucoup de collecteurs d'impôts et de pécheurs
  - type: note
    content: 'Pécheurs: c''est-à-dire jugés comme tels par ceux qui se croyaient justes.'
  - type: text
    content: ' se mirent aussi à table avec lui et avec ses disciples, car ils étaient nombreux à le suivre. '
  '16':
  - type: text
    content: Le voyant manger avec les collecteurs d'impôts et les pécheurs, les spécialistes de la loi et les pharisiens
  - type: note
    content: 'Pharisiens: membres d''un courant du judaïsme caractérisé par un fort intérêt pour les questions de pureté rituelle et par le souci de respecter le plus strictement possible la loi de Moïse ainsi que les traditions.'
  - type: text
    content: ' dirent à ses disciples: «Pourquoi mange-t-il avec les collecteurs d''impôts et les pécheurs?» '
  '17':
  - type: text
    content: 'Jésus, qui avait entendu, leur dit: «Ce ne sont pas les bien portants qui ont besoin de médecin, mais les malades. Je ne suis pas venu appeler des justes, mais des pécheurs, [à changer d''attitude].»'
  '18':
  - type: text
    content: 'Les disciples de Jean et les pharisiens jeûnaient. Ils vinrent dire à Jésus: «Pourquoi les disciples de Jean et ceux des pharisiens jeûnent-ils, tandis que tes disciples ne jeûnent pas?» '
  '19':
  - type: text
    content: 'Jésus leur répondit: «Les invités à la noce peuvent-ils jeûner pendant que le marié est avec eux? Aussi longtemps que le marié est avec eux, ils ne peuvent pas jeûner. '
  '2':
  - type: text
    content: et un si grand nombre de personnes se rassemblèrent qu'il n'y avait plus de place, pas même devant la porte. Il leur annonçait la parole.
  '20':
  - type: text
    content: 'Les jours viendront où le marié leur sera enlevé, et alors ils jeûneront durant ces jours-là. '
  '21':
  - type: text
    content: 'Personne ne coud un morceau de tissu neuf sur un vieil habit, sinon la pièce neuve ajoutée arrache une partie du vieux, et la déchirure devient pire. '
  '22':
  - type: text
    content: Et personne ne met du vin nouveau dans de vieilles outres, sinon les outres éclatent, le vin coule et les outres sont perdues; mais [il faut mettre] le vin nouveau dans des outres neuves.»
  - type: heading
    content: Jésus et le sabbat
  '23':
  - type: text
    content: 'Un jour de sabbat, Jésus traversait des champs de blé. Tout en marchant, ses disciples se mirent à arracher des épis. '
  '24':
  - type: text
    content: 'Les pharisiens lui dirent: «Regarde! Pourquoi font-ils ce qui n''est pas permis pendant le sabbat'
  - type: note
    content: 'Sabbat: jour du repos, où l''on ne devait faire aucun travail pénible.'
  - type: text
    content: '?» '
  '25':
  - type: text
    content: 'Jésus leur répondit: «N''avez-vous jamais lu ce qu''a fait David, lorsqu''il a été dans le besoin et qu''il a eu faim, lui et ses compagnons? '
  '26':
  - type: text
    content: 'Il est entré dans la maison de Dieu, à l''époque du grand-prêtre Abiathar, a mangé les pains consacrés qu''il n''est permis qu''aux prêtres de manger et en a même donné à ses compagnons!» '
  '27':
  - type: text
    content: 'Puis il leur dit: «Le sabbat a été fait pour l''homme, et non l''homme pour le sabbat, '
  '28':
  - type: text
    content: de sorte que le Fils de l'homme est le Seigneur même du sabbat.»
  '3':
  - type: text
    content: 'On vint lui amener un paralysé porté par quatre hommes. '
  '4':
  - type: text
    content: 'Comme ils ne pouvaient pas l''aborder à cause de la foule, ils découvrirent le toit au-dessus de l''endroit où il se tenait et descendirent par cette ouverture le brancard sur lequel le paralysé était couché. '
  '5':
  - type: text
    content: 'Voyant leur foi, Jésus dit au paralysé: «Mon enfant, tes péchés te sont pardonnés.» '
  '6':
  - type: text
    content: 'Il y avait là quelques spécialistes de la loi qui étaient assis et qui se disaient en eux-mêmes: '
  '7':
  - type: text
    content: '«Pourquoi cet homme parle-t-il ainsi? Il blasphème. Qui peut pardonner les péchés, si ce n''est Dieu seul?» '
  '8':
  - type: text
    content: 'Jésus sut aussitôt dans son esprit qu''ils raisonnaient ainsi en eux-mêmes, et il leur dit: «Pourquoi raisonnez-vous ainsi dans vos cœurs? '
  '9':
  - type: text
    content: 'Qu''est-ce qui est le plus facile à dire au paralysé: ‘Tes péchés sont pardonnés’, ou: ‘Lève-toi, prends ton brancard et marche’? '
