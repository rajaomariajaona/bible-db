document_id: HAG.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La gloire future du temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le vingt et unième jour du septième mois, la parole de l''Eternel fut révélée par l''intermédiaire du prophète Aggée:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Parle au gouverneur de Juda Zorobabel, fils de Shealthiel, au grand-prêtre Josué, fils de Jotsadak, et au reste du peuple. Dis-leur:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ‘Quel est parmi vous le survivant
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui a vu ce temple dans sa gloire première?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et comment le voyez-vous maintenant?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tel qu'il est, ne paraît-il pas comme rien à vos yeux?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: »Maintenant, fortifie-toi, Zorobabel! déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fortifie-toi, Josué, fils de Jotsadak, grand-prêtre!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fortifie-toi, peuple entier du pays, déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et travaillez, car je suis moi-même avec vous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l'Eternel, le maître de l'univers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Conformément à l'engagement que j'ai conclu avec vous
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand vous êtes sortis d'Egypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon Esprit est au milieu de vous.
- type: usfm
  marker: q1
  children:
  - type: text
    text: N'ayez pas peur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '»En effet, voici ce que dit l''Eternel, le maître de l''univers:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '*Une fois encore et dans peu de temps,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ferai trembler le ciel et la terre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Une fois… terre: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hébreux 12.26
      metadata:
        usfm: HEB.12.26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: la mer et le sec,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: je ferai trembler toutes les nations;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les trésors de toutes les nations afflueront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je remplirai de gloire ce temple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit l'Eternel, le maître de l'univers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L'argent m'appartient, l'or m'appartient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l'Eternel, le maître de l'univers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: La gloire de ce dernier temple sera plus grande
- type: usfm
  marker: q1
  children:
  - type: text
    text: que celle du premier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit l'Eternel, le maître de l'univers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c'est dans ce lieu que je donnerai la paix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l'Eternel, le maître de l'univers.’»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Appel à la pureté
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le vingt-quatrième jour du neuvième mois, la deuxième année du règne de Darius, la parole de l''Eternel fut adressée au prophète Aggée: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '«Voici ce que dit l''Eternel, le maître de l''univers: Propose aux prêtres cette question sur la loi: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '‘Si quelqu''un porte dans le pan de son habit de la viande consacrée, et qu''il touche avec son habit du pain, des plats, du vin, de l''huile ou un aliment quelconque, ces choses seront-elles saintes?’» Les prêtres répondirent: «Non.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Aggée dit: «Si une personne rendue impure par le contact d''un cadavre touche toutes ces choses, seront-elles impures?» Les prêtres répondirent: «Elles seront impures.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors Aggée reprit la parole:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«C''est ainsi qu''est ce peuple, qu''est cette nation devant moi, déclare l''Eternel, c''est ainsi que sont toutes les œuvres de leurs mains: ce qu''ils m''offrent est impur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Maintenant, réfléchissez donc attentivement à ce qui va se produire dès aujourd''hui! Avant qu''on ne pose pierre sur pierre au temple de l''Eternel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'quand on venait à un tas de 20 mesures, il n''y en avait que 10; quand on venait à la cuve pour puiser 50 mesures, il n''y en avait que 20. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Je vous ai frappés par la rouille, par la nielle
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Rouille… nielle: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: maladies des céréales.
    marker-yv: yv-n
  - type: text
    text: ' et par la grêle, j''ai frappé tout le travail de vos mains. Malgré cela, vous n''êtes pas revenus à moi, déclare l''Eternel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '»Réfléchissez attentivement à ce qui va se produire dès aujourd''hui, dès le vingt-quatrième jour du neuvième mois, dès le jour de la fondation du temple de l''Eternel! Réfléchissez-y attentivement! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Y avait-il encore de la semence dans les greniers? Même la vigne, le figuier, le grenadier et l'olivier n'ont rien rapporté, mais dès aujourd'hui, je bénirai.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Choix de Zorobabel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'La parole de l''Eternel fut adressée une seconde fois à Aggée, le vingt-quatrième jour du mois: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '«Dis à Zorobabel, le gouverneur de Juda: ‘J''ébranlerai le ciel et la terre, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'je renverserai le trône des royaumes, je détruirai la force des royaumes des nations, je renverserai les chars et ceux qui les montent; les chevaux et leurs cavaliers seront abattus, chacun par l''épée de l''autre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ce jour-là, déclare l'Eternel, le maître de l'univers, je te prendrai, Zorobabel, fils de Shealthiel, mon serviteur, déclare l'Eternel, et je ferai de toi comme un sceau, car je t'ai choisi, déclare l'Eternel, le maître de l'univers.’»
