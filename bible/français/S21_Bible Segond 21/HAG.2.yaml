document_id: HAG.2,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La gloire future du temple
  - type: text
    content: 'Le vingt et unième jour du septième mois, la parole de l''Eternel fut révélée par l''intermédiaire du prophète Aggée:'
  '10':
  - type: text
    content: 'Le vingt-quatrième jour du neuvième mois, la deuxième année du règne de Darius, la parole de l''Eternel fut adressée au prophète Aggée: '
  '11':
  - type: text
    content: '«Voici ce que dit l''Eternel, le maître de l''univers: Propose aux prêtres cette question sur la loi: '
  '12':
  - type: text
    content: '‘Si quelqu''un porte dans le pan de son habit de la viande consacrée, et qu''il touche avec son habit du pain, des plats, du vin, de l''huile ou un aliment quelconque, ces choses seront-elles saintes?’» Les prêtres répondirent: «Non.» '
  '13':
  - type: text
    content: 'Aggée dit: «Si une personne rendue impure par le contact d''un cadavre touche toutes ces choses, seront-elles impures?» Les prêtres répondirent: «Elles seront impures.» '
  '14':
  - type: text
    content: 'Alors Aggée reprit la parole:'
  - type: text
    content: '«C''est ainsi qu''est ce peuple, qu''est cette nation devant moi, déclare l''Eternel, c''est ainsi que sont toutes les œuvres de leurs mains: ce qu''ils m''offrent est impur. '
  '15':
  - type: text
    content: 'Maintenant, réfléchissez donc attentivement à ce qui va se produire dès aujourd''hui! Avant qu''on ne pose pierre sur pierre au temple de l''Eternel, '
  '16':
  - type: text
    content: 'quand on venait à un tas de 20 mesures, il n''y en avait que 10; quand on venait à la cuve pour puiser 50 mesures, il n''y en avait que 20. '
  '17':
  - type: text
    content: Je vous ai frappés par la rouille, par la nielle
  - type: note
    content: 'Rouille… nielle: maladies des céréales.'
  - type: text
    content: ' et par la grêle, j''ai frappé tout le travail de vos mains. Malgré cela, vous n''êtes pas revenus à moi, déclare l''Eternel.'
  '18':
  - type: text
    content: '»Réfléchissez attentivement à ce qui va se produire dès aujourd''hui, dès le vingt-quatrième jour du neuvième mois, dès le jour de la fondation du temple de l''Eternel! Réfléchissez-y attentivement! '
  '19':
  - type: text
    content: Y avait-il encore de la semence dans les greniers? Même la vigne, le figuier, le grenadier et l'olivier n'ont rien rapporté, mais dès aujourd'hui, je bénirai.»
  - type: heading
    content: Choix de Zorobabel
  '2':
  - type: text
    content: '«Parle au gouverneur de Juda Zorobabel, fils de Shealthiel, au grand-prêtre Josué, fils de Jotsadak, et au reste du peuple. Dis-leur:'
  '20':
  - type: text
    content: 'La parole de l''Eternel fut adressée une seconde fois à Aggée, le vingt-quatrième jour du mois: '
  '21':
  - type: text
    content: '«Dis à Zorobabel, le gouverneur de Juda: ‘J''ébranlerai le ciel et la terre, '
  '22':
  - type: text
    content: 'je renverserai le trône des royaumes, je détruirai la force des royaumes des nations, je renverserai les chars et ceux qui les montent; les chevaux et leurs cavaliers seront abattus, chacun par l''épée de l''autre. '
  '23':
  - type: text
    content: Ce jour-là, déclare l'Eternel, le maître de l'univers, je te prendrai, Zorobabel, fils de Shealthiel, mon serviteur, déclare l'Eternel, et je ferai de toi comme un sceau, car je t'ai choisi, déclare l'Eternel, le maître de l'univers.’»
  '3':
  - type: text
    content: ‘Quel est parmi vous le survivant
  - type: text
    content: qui a vu ce temple dans sa gloire première?
  - type: text
    content: Et comment le voyez-vous maintenant?
  - type: text
    content: Tel qu'il est, ne paraît-il pas comme rien à vos yeux?
  '4':
  - type: text
    content: »Maintenant, fortifie-toi, Zorobabel! déclare l'Eternel.
  - type: text
    content: Fortifie-toi, Josué, fils de Jotsadak, grand-prêtre!
  - type: text
    content: Fortifie-toi, peuple entier du pays, déclare l'Eternel,
  - type: text
    content: et travaillez, car je suis moi-même avec vous,
  - type: text
    content: déclare l'Eternel, le maître de l'univers.
  '5':
  - type: text
    content: Conformément à l'engagement que j'ai conclu avec vous
  - type: text
    content: quand vous êtes sortis d'Egypte,
  - type: text
    content: mon Esprit est au milieu de vous.
  - type: text
    content: N'ayez pas peur!
  '6':
  - type: text
    content: '»En effet, voici ce que dit l''Eternel, le maître de l''univers:'
  - type: text
    content: '*Une fois encore et dans peu de temps,'
  - type: text
    content: je ferai trembler le ciel et la terre
  - type: note
    content: 'Une fois… terre: cité en Hébreux 12.26.'
  - type: text
    content: ','
  - type: text
    content: la mer et le sec,
  '7':
  - type: text
    content: je ferai trembler toutes les nations;
  - type: text
    content: les trésors de toutes les nations afflueront,
  - type: text
    content: et je remplirai de gloire ce temple,
  - type: text
    content: dit l'Eternel, le maître de l'univers.
  '8':
  - type: text
    content: L'argent m'appartient, l'or m'appartient,
  - type: text
    content: déclare l'Eternel, le maître de l'univers.
  '9':
  - type: text
    content: La gloire de ce dernier temple sera plus grande
  - type: text
    content: que celle du premier,
  - type: text
    content: dit l'Eternel, le maître de l'univers,
  - type: text
    content: et c'est dans ce lieu que je donnerai la paix,
  - type: text
    content: déclare l'Eternel, le maître de l'univers.’»
  - type: heading
    content: Appel à la pureté
