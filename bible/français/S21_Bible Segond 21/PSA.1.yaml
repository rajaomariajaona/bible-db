document_id: PSA.1,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Premier livre
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 1–41
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Deux hommes, deux destinées
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux l'homme qui ne suit pas le conseil des méchants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui ne s'arrête pas sur la voie des pécheurs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne s'assied pas en compagnie des moqueurs,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais qui trouve son plaisir dans la loi de l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la médite jour et nuit!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il ressemble à un arbre planté près d''un cours d''eau:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il donne son fruit en sa saison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son feuillage ne se flétrit pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout ce qu'il fait lui réussit.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les méchants, au contraire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ressemblent à la paille que le vent disperse.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà pourquoi les méchants ne résistent pas lors du jugement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni les pécheurs dans l'assemblée des justes.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, l'Eternel connaît la voie des justes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la voie des méchants mène à la ruine.
