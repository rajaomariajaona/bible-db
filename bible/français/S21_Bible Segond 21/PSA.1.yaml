document_id: PSA.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Premier livre
  - type: heading
    content: 1–41
  - type: heading
    content: Deux hommes, deux destinées
  - type: text
    content: Heureux l'homme qui ne suit pas le conseil des méchants,
  - type: text
    content: qui ne s'arrête pas sur la voie des pécheurs
  - type: text
    content: et ne s'assied pas en compagnie des moqueurs,
  '2':
  - type: text
    content: mais qui trouve son plaisir dans la loi de l'Eternel
  - type: text
    content: et la médite jour et nuit!
  '3':
  - type: text
    content: 'Il ressemble à un arbre planté près d''un cours d''eau:'
  - type: text
    content: il donne son fruit en sa saison,
  - type: text
    content: et son feuillage ne se flétrit pas.
  - type: text
    content: Tout ce qu'il fait lui réussit.
  '4':
  - type: text
    content: Les méchants, au contraire,
  - type: text
    content: ressemblent à la paille que le vent disperse.
  '5':
  - type: text
    content: Voilà pourquoi les méchants ne résistent pas lors du jugement,
  - type: text
    content: ni les pécheurs dans l'assemblée des justes.
  '6':
  - type: text
    content: En effet, l'Eternel connaît la voie des justes,
  - type: text
    content: mais la voie des méchants mène à la ruine.
