document_id: PSA.86,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Appel à la grâce de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Prière de David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, prête l'oreille, exauce-moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je suis malheureux et pauvre.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: car tu es grand, tu accomplis des merveilles.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi seul, tu es Dieu.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Enseigne-moi tes voies, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je marcherai dans ta vérité.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dispose mon cœur à craindre ton nom!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Je te louerai de tout mon cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seigneur, mon Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j'honorerai toujours ton nom,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: car ta bonté envers moi est grande,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu délivres mon âme des profondeurs du séjour des morts.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: O Dieu, des arrogants s'attaquent à moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une bande d'hommes violents en veulent à ma vie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne tiennent pas compte de toi.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Mais toi, Seigneur, tu es un *Dieu de grâce et de compassion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lent à la colère, riche en bonté et en vérité
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '86.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dieu… vérité: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'même présentation de l''Eternel à Moïse en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Exode 34.6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: tourne-toi vers moi et fais-moi grâce,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: donne ta force à ton serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sauve le fils de ta servante!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Accomplis un signe en ma faveur!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ceux qui me détestent le voient et soient honteux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tu me secours et tu me consoles, Eternel!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Garde mon âme, car je suis fidèle!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon Dieu, sauve ton serviteur qui se confie en toi!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Fais-moi grâce, Seigneur, car je crie à toi tout le jour.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Réjouis l'âme de ton serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seigneur, car c'est vers toi que je me tourne.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Oui, tu es bon, Seigneur, tu pardonnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu es plein d'amour pour tous ceux qui font appel à toi.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Eternel, prête l'oreille à ma prière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sois attentif à mes supplications!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Je fais appel à toi lorsque je suis dans la détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tu m'exauces.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Personne n'est comme toi parmi les dieux, Seigneur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et rien n'est comparable à ta manière d'agir.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Toutes les nations que tu as faites viendront
  - type: usfm
    marker: q1
    children:
    - type: text
      text: se prosterner devant toi, Seigneur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour rendre gloire à ton nom,
