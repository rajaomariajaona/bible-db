document_id: PSA.86,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Appel à la grâce de Dieu
  - type: text
    content: Prière de David.
  - type: text
    content: Eternel, prête l'oreille, exauce-moi,
  - type: text
    content: car je suis malheureux et pauvre.
  '10':
  - type: text
    content: car tu es grand, tu accomplis des merveilles.
  - type: text
    content: Toi seul, tu es Dieu.
  '11':
  - type: text
    content: Enseigne-moi tes voies, Eternel,
  - type: text
    content: et je marcherai dans ta vérité.
  - type: text
    content: Dispose mon cœur à craindre ton nom!
  '12':
  - type: text
    content: Je te louerai de tout mon cœur,
  - type: text
    content: Seigneur, mon Dieu,
  - type: text
    content: et j'honorerai toujours ton nom,
  '13':
  - type: text
    content: car ta bonté envers moi est grande,
  - type: text
    content: et tu délivres mon âme des profondeurs du séjour des morts.
  '14':
  - type: text
    content: O Dieu, des arrogants s'attaquent à moi,
  - type: text
    content: une bande d'hommes violents en veulent à ma vie;
  - type: text
    content: ils ne tiennent pas compte de toi.
  '15':
  - type: text
    content: Mais toi, Seigneur, tu es un *Dieu de grâce et de compassion,
  - type: text
    content: lent à la colère, riche en bonté et en vérité
  - type: note
    content: 'Dieu… vérité: même présentation de l''Eternel à Moïse en Exode 34.6.'
  - type: text
    content: ;
  '16':
  - type: text
    content: tourne-toi vers moi et fais-moi grâce,
  - type: text
    content: donne ta force à ton serviteur,
  - type: text
    content: sauve le fils de ta servante!
  '17':
  - type: text
    content: Accomplis un signe en ma faveur!
  - type: text
    content: Que ceux qui me détestent le voient et soient honteux,
  - type: text
    content: car tu me secours et tu me consoles, Eternel!
  '2':
  - type: text
    content: Garde mon âme, car je suis fidèle!
  - type: text
    content: Mon Dieu, sauve ton serviteur qui se confie en toi!
  '3':
  - type: text
    content: Fais-moi grâce, Seigneur, car je crie à toi tout le jour.
  '4':
  - type: text
    content: Réjouis l'âme de ton serviteur,
  - type: text
    content: Seigneur, car c'est vers toi que je me tourne.
  '5':
  - type: text
    content: Oui, tu es bon, Seigneur, tu pardonnes,
  - type: text
    content: tu es plein d'amour pour tous ceux qui font appel à toi.
  '6':
  - type: text
    content: Eternel, prête l'oreille à ma prière,
  - type: text
    content: sois attentif à mes supplications!
  '7':
  - type: text
    content: Je fais appel à toi lorsque je suis dans la détresse,
  - type: text
    content: car tu m'exauces.
  '8':
  - type: text
    content: Personne n'est comme toi parmi les dieux, Seigneur,
  - type: text
    content: et rien n'est comparable à ta manière d'agir.
  '9':
  - type: text
    content: Toutes les nations que tu as faites viendront
  - type: text
    content: se prosterner devant toi, Seigneur,
  - type: text
    content: pour rendre gloire à ton nom,
