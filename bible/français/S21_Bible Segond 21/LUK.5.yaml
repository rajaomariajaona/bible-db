document_id: LUK.5,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La pêche miraculeuse
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un jour, Jésus se trouvait au bord du lac de Génésareth et la foule se pressait autour de lui pour entendre la parole de Dieu. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il en allait de même pour Jacques et Jean, les fils de Zébédée, les associés de Simon. Jésus dit à Simon: «N''aie pas peur, désormais tu seras pêcheur d''hommes.» '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors ils ramenèrent les barques à terre, laissèrent tout et le suivirent.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Guérison d'un lépreux et d'un paralysé
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors que Jésus était dans une des villes, un homme couvert de lèpre le vit, tomba le visage contre terre et lui adressa cette prière: «Seigneur, si tu le veux, tu peux me rendre pur.» '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus tendit la main, le toucha et dit: «Je le veux, sois pur.» Aussitôt la lèpre le quitta. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis Jésus lui ordonna de n'en parler à personne. «Mais, dit-il, va te montrer au prêtre et offre pour ta purification ce que Moïse a prescrit, afin que cela leur serve de témoignage.»
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On parlait de plus en plus de lui et les gens venaient en foule pour l''entendre et pour être guéris [par lui] de leurs maladies. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais lui, il se retirait dans les déserts et priait.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Un jour, Jésus enseignait. Des pharisiens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Pharisiens: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: membres d'un courant du judaïsme caractérisé par un fort intérêt pour les questions de pureté rituelle et par le souci de respecter le plus strictement possible la loi de Moïse ainsi que les traditions.
      marker-yv: yv-n
    - type: text
      text: ' et des professeurs de la loi, venus de tous les villages de la Galilée, de la Judée et de Jérusalem, étaient assis là et la puissance du Seigneur se manifestait par des guérisons. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et voici que des hommes qui portaient un paralysé sur une civière cherchaient à le faire entrer et à le placer devant Jésus. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme ils n''avaient pas trouvé moyen de l''introduire à cause de la foule, ils montèrent sur le toit et, par une ouverture, ils le descendirent sur sa civière au milieu de l''assemblée, devant Jésus. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il vit au bord du lac deux barques; les pêcheurs en étaient descendus pour laver leurs filets. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voyant leur foi, Jésus dit: «Mon ami, tes péchés te sont pardonnés.» '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les spécialistes de la loi et les pharisiens se mirent à raisonner et à dire: «Qui est cet homme qui profère des blasphèmes? Qui peut pardonner les péchés, si ce n''est Dieu seul?» '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus connaissait leurs pensées; il prit la parole et leur dit: «Pourquoi raisonnez-vous ainsi dans vos cœurs? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qu''est-ce qui est le plus facile à dire: ‘Tes péchés [te] sont pardonnés’, ou: ‘Lève-toi et marche’? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Afin que vous sachiez que le Fils de l'homme
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Fils de l''homme: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'expression par laquelle Jésus se désignait fréquemment lui-même, avec une probable allusion à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Daniel 7.13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' a sur la terre le pouvoir de pardonner les péchés, je te l''ordonne – dit-il au paralysé –, lève-toi, prends ta civière et rentre chez toi.» '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui-ci se leva immédiatement en leur présence, prit la civière sur laquelle il était couché et rentra chez lui en rendant gloire à Dieu. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous étaient dans l''étonnement et célébraient la gloire de Dieu; remplis de crainte, ils disaient: «Nous avons vu aujourd''hui des choses extraordinaires.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Réactions face à Jésus
    marker-yv: yv-h
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après cela, Jésus sortit et il vit un collecteur d''impôts du nom de Lévi assis au bureau des taxes. Il lui dit: «Suis-moi.» '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et laissant tout, il se leva et le suivit. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lévi lui offrit un grand festin dans sa maison, et beaucoup de collecteurs d''impôts et d''autres personnes étaient à table avec eux. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il monta dans l'une de ces barques, qui appartenait à Simon, et il le pria de s'éloigner un peu du rivage. Puis il s'assit, et de la barque il enseignait la foule.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les pharisiens et leurs spécialistes de la loi murmurèrent et dirent à ses disciples: «Pourquoi mangez-vous et buvez-vous avec les collecteurs d''impôts et les pécheurs?» '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus prit la parole et leur dit: «Ce ne sont pas les gens en bonne santé qui ont besoin de médecin, mais les malades. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je ne suis pas venu appeler des justes, mais des pécheurs, à changer d'attitude.»
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui dirent: «Pourquoi les disciples de Jean, tout comme ceux des pharisiens, jeûnent-ils fréquemment et font-ils des prières, tandis que les tiens mangent et boivent?» '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur répondit: «Pouvez-vous faire jeûner les invités à la noce pendant que le marié est avec eux? '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les jours viendront où le marié leur sera enlevé, alors ils jeûneront durant ces jours-là.» '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il leur dit aussi une parabole
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.36 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Parabole: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: histoire visant à faire comprendre une vérité spirituelle au moyen d'un exemple tiré de la vie courante.
      marker-yv: yv-n
    - type: text
      text: ': «Personne ne déchire un morceau de tissu d''un habit neuf pour le mettre à un vieil habit, sinon il déchire l''habit neuf et le morceau qu''il en a pris n''est pas assorti avec le vieux. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et personne ne met du vin nouveau dans de vieilles outres, sinon le vin nouveau fait éclater les outres, il coule et les outres sont perdues. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais il faut mettre le vin nouveau dans des outres neuves [et les deux se conservent]. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et [aussitôt] après avoir bu du vin vieux, personne ne veut du nouveau, car il dit: ‘Le vieux est meilleur.’»'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand il eut fini de parler, il dit à Simon: «Avance là où l''eau est profonde et jetez vos filets pour pêcher.» '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon lui répondit: «Maître, nous avons travaillé toute la nuit sans rien prendre; mais sur ta parole, je jetterai les filets.» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils les jetèrent et prirent une grande quantité de poissons, et leurs filets se déchiraient. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils firent signe à leurs compagnons qui étaient dans l''autre barque de venir les aider. Ils vinrent et remplirent les deux barques, au point qu''elles s''enfonçaient. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand il vit cela, Simon Pierre tomba aux genoux de Jésus et dit: «Seigneur, éloigne-toi de moi, parce que je suis un homme pécheur.» '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, lui et tous ceux qui étaient avec lui étaient remplis de frayeur à cause de la pêche qu''ils avaient faite. '
