document_id: NEH.3
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Reconstruction de la muraille
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 3.1–6.19
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Répartition du travail
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le grand-prêtre Eliashib s''est levé avec ses frères, les prêtres, et ils ont reconstruit la porte des brebis. Ils l''ont consacrée et ont posé les battants de la porte. Ils ont consacré la muraille jusqu''à la tour de Méa et jusqu''à celle de Hananeel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: A côté d'Eliashib ont travaillé les habitants de Jéricho, ainsi que Zaccur, fils d'Imri.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Les fils de Senaa ont reconstruit la porte des poissons. Ils l''ont couverte d''un toit et en ont posé les battants, les verrous et les barres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'A côté d''eux, c''est Merémoth, fils d''Urie et petit-fils d''Hakkots, qui a travaillé aux réparations, ainsi que Meshullam, fils de Bérékia et petit-fils de Meshézabeel, et Tsadok, fils de Baana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: A côté d'eux ont travaillé les habitants de Tekoa, même si les plus influents d'entre eux refusaient de se plier au service de leur Seigneur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jojada, fils de Paséach, et Meshullam, fils de Besodia, ont réparé la vieille porte. Ils l''ont couverte d''un toit et en ont posé les battants, les verrous et les barres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'A côté d''eux, c''est Melatia le Gabaonite qui a travaillé aux réparations, ainsi que Jadon le Méronothite et les habitants de Gabaon et de Mitspa, qui dépendaient du gouverneur de la région située à l''ouest de l''Euphrate. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: A côté d'eux a travaillé Uzziel, fils de Harhaja, qui était orfèvre, et à côté de lui Hanania, un parfumeur. Ils n'ont quitté Jérusalem qu'une fois arrivés à la muraille large.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'A côté d''eux, c''est Rephaja, fils de Hur, chef de la moitié du district de Jérusalem, qui a travaillé aux réparations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'A côté d''eux, en face de sa maison, a travaillé Jedaja, fils de Harumaph, et à côté de lui Hattush, fils de Hashabnia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Une autre partie de la muraille et la tour des fours ont été réparées par Malkija, fils de Harim, et par Hashub, fils de Pachath-Moab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'A côté d''eux a travaillé Shallum, fils d''Hallochesh, chef de la moitié du district de Jérusalem, accompagné de ses filles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: La porte de la vallée a été réparée par Hanun et par les habitants de Zanoach. Ils l'ont reconstruite et en ont posé les battants, les verrous et les barres. Ils ont fait, de plus, 500 mètres de mur jusqu'à la porte du fumier.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: C'est Malkija, fils de Récab, chef du district de Beth-Hakkérem, qui a réparé la porte du fumier. Il l'a reconstruite et en a posé les battants, les verrous et les barres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Shallum, fils de Col-Hozé, chef du district de Mitspa, réparait la porte de la source. Il l'a reconstruite, l'a couverte d'un toit et en a posé les battants, les verrous et les barres. De plus, il a fait le mur du bassin de Siloé, près du jardin du roi, et a poursuivi son travail jusqu'aux marches qui descendent de la ville de David.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Après lui, c''est Néhémie, fils d''Azbuk, chef de la moitié du district de Beth-Tsur, qui a travaillé aux réparations. Il est allé jusqu''en face des tombeaux de David, jusqu''au bassin artificiel et jusqu''à la maison des hommes vaillants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Après lui ont travaillé les Lévites sous la direction de Rehum, fils de Bani. A côté de lui a travaillé Hashabia, chef de la moitié du district de Keïla, pour son district. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Après lui ont travaillé leurs frères sous la direction de Bavvaï, fils de Hénadad, chef de la moitié du district de Keïla. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: A côté de lui, c'est Ezer, fils de Josué, chef de Mitspa, qui a réparé une autre partie de la muraille, en face de la montée de l'arsenal, à l'angle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Après lui, Baruc, fils de Zabbaï, s''est montré plein d''ardeur: il a réparé une autre partie, depuis l''angle jusqu''à la porte de la maison du grand-prêtre Eliashib. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Après lui, Merémoth, fils d''Urie et petit-fils d''Hakkots, a réparé une autre partie, depuis la porte de la maison d''Eliashib jusqu''à l''extrémité de cette maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Après lui ont travaillé les prêtres qui habitaient la plaine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Après eux, Benjamin et Hashub ont travaillé en face de leur maison. Après eux, Azaria, fils de Maaséja et petit-fils d''Anania, a travaillé à côté de la sienne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Après lui, c'est Binnuï, fils de Hénadad, qui a réparé une autre partie, depuis la maison d'Azaria jusqu'à l'angle et jusqu'au coin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Palal, fils d''Uzaï, a travaillé en face de l''angle et de la haute tour qui dépasse du palais royal et est adjacente à la cour de la prison. Après lui a travaillé Pedaja, fils de Pareosh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Les serviteurs du temple installés sur la colline de l''Ophel ont travaillé jusqu''en face de la porte des eaux, à l''est, et de la tour qui dépasse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Après eux les habitants de Tekoa ont réparé une autre partie, en face de la grande tour qui dépasse et jusqu'au mur de la colline.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Au-dessus de la porte des chevaux, les prêtres ont travaillé chacun devant sa maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Après eux, c''est Tsadok, fils d''Immer, qui a travaillé devant la sienne. Après lui a travaillé Shemaeja, fils de Shecania, gardien de la porte de l''est. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Après lui, ce sont Hanania, fils de Shélémia, et Hanun, le sixième fils de Tsalaph, qui ont réparé une autre partie de la muraille. Après eux, Meshullam, fils de Bérékia, a travaillé en face de sa chambre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Après lui, Malkija, un orfèvre, a travaillé jusqu''à la maison des serviteurs du temple et des marchands, en face de la porte de Miphkad, et jusqu''à la chambre à l''étage qui se trouve au coin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Les orfèvres et les marchands ont travaillé entre la chambre à l'étage qui se trouve au coin et la porte des brebis.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Poursuite des travaux malgré l'opposition
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Lorsque Sanballat a appris que nous étions en train de reconstruire la muraille, il s''est mis en colère et s''est montré très irrité. Il s''est moqué des Juifs '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'et a dit devant ses frères et devant les soldats de Samarie: «Que font donc ces misérables Juifs? Va-t-on les laisser faire? Vont-ils offrir des sacrifices? Vont-ils finir leur tâche dans la journée? Vont-ils redonner vie à des pierres ensevelies sous des tas de poussière et réduites en cendres?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Tobija l''Ammonite était à côté de lui. Il a dit: «Qu''ils construisent seulement leur muraille de pierres! Si un renard grimpe dessus, il la fera crouler!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ecoute, notre Dieu, avec quel mépris on nous traite! Fais retomber leurs insultes sur leur tête et livre-les au pillage et à la déportation! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ne pardonne pas leur faute et que leur péché ne soit pas effacé devant toi, car ils ont provoqué de front ceux qui construisent!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Nous avons continué à reconstruire la muraille de telle sorte qu'elle soit partout consolidée jusqu'à la moitié de sa hauteur, et le peuple a pris ce travail à cœur.
