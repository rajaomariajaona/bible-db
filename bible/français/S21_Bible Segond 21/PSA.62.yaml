document_id: PSA.62,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu le seul refuge
  - type: text
    content: Au chef de chœur, d'après Jeduthun. Psaume de David.
  '10':
  - type: text
    content: Oui, les fils d'Adam ne sont qu'un souffle,
  - type: text
    content: les hommes ne sont que mensonge.
  - type: text
    content: S'ils montaient sur une balance,
  - type: text
    content: tous ensemble ils seraient plus légers qu'un souffle.
  '11':
  - type: text
    content: Ne comptez pas sur l'oppression
  - type: text
    content: et ne mettez pas un espoir illusoire dans le pillage!
  - type: text
    content: Quand les richesses augmentent,
  - type: text
    content: n'y attachez pas votre cœur!
  '12':
  - type: text
    content: Dieu a parlé une fois,
  - type: text
    content: 'deux fois j''ai entendu ceci:'
  - type: text
    content: c'est que la force appartient à Dieu.
  '13':
  - type: text
    content: A toi aussi, Seigneur, appartient la bonté,
  - type: text
    content: car *tu traites chacun conformément à ses actes
  - type: note
    content: 'Tu traites… actes: principe cité en Matthieu 16.27; Romains 2.6; 2 Timothée 4.14; 1 Pierre 1.17.'
  - type: text
    content: .
  '2':
  - type: text
    content: Oui, c'est en Dieu que mon âme se confie;
  - type: text
    content: de lui vient mon salut.
  '3':
  - type: text
    content: Oui, c'est lui mon rocher et mon salut,
  - type: text
    content: 'ma forteresse: je ne serai guère ébranlé.'
  '4':
  - type: text
    content: Jusqu'à quand vous jetterez-vous sur un homme
  - type: text
    content: pour chercher tous à l'abattre
  - type: text
    content: comme un mur qui penche,
  - type: text
    content: comme une clôture qui s'écroule?
  '5':
  - type: text
    content: Ils conspirent pour le faire tomber de son poste élevé;
  - type: text
    content: ils prennent plaisir au mensonge.
  - type: text
    content: Ils bénissent de leur bouche,
  - type: text
    content: 'et ils maudissent dans leur cœur. '
  - type: text
    content: – Pause.
  '6':
  - type: text
    content: Oui, mon âme, repose-toi sur Dieu,
  - type: text
    content: car c'est de lui que vient mon espérance.
  '7':
  - type: text
    content: Oui, c'est lui mon rocher et mon salut,
  - type: text
    content: 'ma forteresse: je ne serai pas ébranlé.'
  '8':
  - type: text
    content: Sur Dieu reposent mon salut et ma gloire;
  - type: text
    content: le rocher de ma force, mon refuge, est en Dieu.
  '9':
  - type: text
    content: En tout temps, peuples, confiez-vous en lui,
  - type: text
    content: épanchez votre cœur devant lui!
  - type: text
    content: 'Dieu est notre refuge. '
  - type: text
    content: – Pause.
