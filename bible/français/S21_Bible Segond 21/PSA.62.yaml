document_id: PSA.62
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu le seul refuge
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur, d'après Jeduthun. Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Oui, c'est en Dieu que mon âme se confie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: de lui vient mon salut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Oui, c'est lui mon rocher et mon salut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ma forteresse: je ne serai guère ébranlé.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Jusqu'à quand vous jetterez-vous sur un homme
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour chercher tous à l'abattre
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un mur qui penche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme une clôture qui s'écroule?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils conspirent pour le faire tomber de son poste élevé;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils prennent plaisir au mensonge.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils bénissent de leur bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et ils maudissent dans leur cœur. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Oui, mon âme, repose-toi sur Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car c'est de lui que vient mon espérance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Oui, c'est lui mon rocher et mon salut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ma forteresse: je ne serai pas ébranlé.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Sur Dieu reposent mon salut et ma gloire;
- type: usfm
  marker: q1
  children:
  - type: text
    text: le rocher de ma force, mon refuge, est en Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: En tout temps, peuples, confiez-vous en lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: épanchez votre cœur devant lui!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dieu est notre refuge. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Oui, les fils d'Adam ne sont qu'un souffle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les hommes ne sont que mensonge.
- type: usfm
  marker: q1
  children:
  - type: text
    text: S'ils montaient sur une balance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous ensemble ils seraient plus légers qu'un souffle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ne comptez pas sur l'oppression
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne mettez pas un espoir illusoire dans le pillage!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand les richesses augmentent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: n'y attachez pas votre cœur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dieu a parlé une fois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'deux fois j''ai entendu ceci:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est que la force appartient à Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: A toi aussi, Seigneur, appartient la bonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car *tu traites chacun conformément à ses actes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '62.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu traites… actes: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'principe cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 16.27
      metadata:
        usfm: MAT.16.27
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 2.6
      metadata:
        usfm: ROM.2.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Timothée 4.14
      metadata:
        usfm: 2TI.4.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pierre 1.17
      metadata:
        usfm: 1PE.1.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
