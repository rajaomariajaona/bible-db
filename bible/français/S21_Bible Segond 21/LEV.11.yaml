document_id: LEV.11
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: La pureté et l'impureté rituelles
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 11.1–15.33
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les animaux purs et impurs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Moïse et à Aaron: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Transmettez ces instructions aux Israélites: Voici les animaux que vous pourrez manger parmi toutes les bêtes qui vivent sur la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Vous pourrez manger de tout animal qui a le sabot fendu ou le pied fourchu et qui rumine. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'En revanche, vous ne mangerez aucun de ceux qui ruminent seulement ou qui ont seulement le sabot fendu. Ainsi, vous ne mangerez pas le chameau, qui rumine mais n''a pas le sabot fendu; vous le considérerez comme impur. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Vous ne mangerez pas le daman, qui rumine mais n''a pas le sabot fendu; vous le considérerez comme impur. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Vous ne mangerez pas le lièvre, qui rumine mais n''a pas le sabot fendu; vous le considérerez comme impur. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Vous ne mangerez pas le porc, qui a le sabot fendu, le pied fourchu mais ne rumine pas; vous le considérerez comme impur. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Vous ne mangerez pas leur viande et ne toucherez pas leur cadavre; vous les considérerez comme impurs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '»Voici les animaux que vous pourrez manger parmi tous ceux qui vivent dans l''eau. Vous pourrez manger de tous ceux qui ont des nageoires et des écailles et qui vivent dans l''eau, soit dans les mers, soit dans les rivières. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'En revanche, parmi tous ceux qui grouillent et ceux qui vivent dans l''eau, soit dans les mers, soit dans les rivières, vous considérerez comme abominables tous ceux qui sont dépourvus de nageoires et d''écailles. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Vous les considérerez comme abominables, vous ne mangerez pas leur chair et vous considérerez leur cadavre comme abominable. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Vous considérerez comme abominables tous ceux qui, dans l'eau, sont dépourvus de nageoires et d'écailles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '»Voici, parmi les oiseaux, ceux que vous considérerez comme abominables et dont on ne mangera pas: l''aigle, l''orfraie, l''aigle de mer, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'le milan, les diverses espèces de vautours, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'toutes les espèces de corbeaux, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'l''autruche, le hibou, la mouette, les diverses espèces d''éperviers, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'le chat-huant, le plongeon, la chouette, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'le cygne, le pélican, le cormoran, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: la cigogne, les diverses espèces de hérons, la huppe et la chauve-souris.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '»Vous considérerez comme abominable tout reptile qui vole et qui marche sur quatre pattes. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'En revanche, parmi tous les reptiles qui volent et qui marchent sur quatre pattes, vous pourrez manger ceux qui ont sur leurs pattes des articulations qui leur permettent de sauter sur la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Voici ceux que vous pourrez manger: les diverses espèces de sauterelles, de criquets, de grillons et de locustes. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Vous considérerez comme abominables tous les autres reptiles qui volent et qui ont quatre pattes. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ils vous rendront impurs. Si quelqu''un touche leur cadavre, il sera impur jusqu''au soir, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: et si quelqu'un porte leur cadavre, il lavera ses vêtements et sera impur jusqu'au soir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '»Vous considérerez comme impur tout animal qui a le sabot fendu mais n''a pas le pied fourchu et ne rumine pas. Si quelqu''un le touche, il sera impur. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Vous considérerez comme impurs tous les quadrupèdes qui marchent sur la plante des pieds. Si quelqu''un touche leur cadavre, il sera impur jusqu''au soir, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: et si quelqu'un porte leur cadavre, il lavera ses vêtements et sera impur jusqu'au soir. Vous les considérerez comme impurs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '»Voici, parmi les animaux qui rampent sur la terre, ceux que vous considérerez comme impurs: la taupe, la souris, les diverses espèces de lézards, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'le gecko, la salamandre, la tortue, la limace et le caméléon. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Vous les considérerez comme impurs parmi tous les reptiles. Si quelqu''un les touche morts, il sera impur jusqu''au soir. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tout objet sur lequel tombera un de leurs cadavres sera impur, qu''il s''agisse d''un ustensile en bois, d''un vêtement, d''une peau, d''un sac ou de n''importe quel objet utilitaire. On le passera dans l''eau et il restera impur jusqu''au soir; après quoi, il sera pur. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Si un de leurs cadavres tombe dans un récipient en terre, tout son contenu sera impur et vous briserez le récipient. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Tout aliment comestible sur lequel il sera tombé de cette eau sera impur, et toute boisson potable, quel que soit le récipient qui la contient, sera impure. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Tout objet sur lequel tombera un de leurs cadavres sera impur. S''il s''agit d''un four ou d''un foyer, on les détruira; ils seront impurs et vous les considérerez comme impurs. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Seules les sources et les citernes qui forment une réserve d''eau resteront pures. Mais si quelqu''un touche leur cadavre, il sera impur. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Si un de leurs cadavres tombe sur une semence qui doit être semée, elle restera pure. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Mais si l'on a mis de l'eau sur la semence et qu'un de leurs cadavres y tombe, vous la considérerez comme impure.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: '»Si un des animaux que vous pouvez manger meurt, celui qui touchera son cadavre sera impur jusqu''au soir. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Celui qui mangera de ce cadavre lavera ses vêtements et sera impur jusqu'au soir, et celui qui portera le cadavre lavera ses vêtements et sera impur jusqu'au soir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: '»Vous considérerez comme abominable tout reptile qui rampe sur la terre. On n''en mangera pas. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Parmi tous les reptiles qui rampent sur la terre, vous ne mangerez aucun de ceux qui se traînent sur le ventre, ni de ceux qui marchent sur quatre pattes ou sur un grand nombre de pattes, car vous les considérerez comme abominables. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Ne vous rendez pas vous-mêmes abominables par tous ces reptiles qui rampent; ne vous rendez pas impurs par eux, ne vous souillez pas par eux. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: En effet, je suis l'Eternel, votre Dieu. Vous vous consacrerez et *vous serez saints, car je suis saint
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.44 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Vous serez… saint: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou soyez saints car je suis saint; rappelé en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19.2'
      metadata:
        usfm: LEV.19.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' et cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pierre 1.16
      metadata:
        usfm: 1PE.1.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '; vous ne vous rendrez pas impurs par tous ces reptiles qui rampent sur la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: En effet, je suis l'Eternel, qui vous ai fait sortir d'Egypte pour être votre Dieu, et vous serez saints car je suis saint.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: '»Telle est la loi concernant les animaux, les oiseaux, tous les êtres qui vivent dans l''eau et tous ceux qui rampent sur la terre, '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: afin que vous distinguiez ce qui est impur et ce qui est pur, l'animal qui se mange et celui qui ne se mange pas.»
