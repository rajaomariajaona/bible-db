document_id: 2SA.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sacre de David et d'Ish-Bosheth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après cela, David consulta l''Eternel en disant: «Dois-je monter dans une des villes de Juda?» L''Eternel lui répondit: «Monte.» David dit: «Où dois-je monter?» Et l''Eternel répondit: «A Hébron.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'David y monta alors avec ses deux femmes, Achinoam de Jizreel et Abigaïl de Carmel, la femme de Nabal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: David y fit aussi monter ceux qui étaient à ses côtés, chacun avec sa famille, et ils habitèrent dans les villes qui dépendaient d'Hébron.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Les hommes de Juda vinrent et c''est là qu''ils consacrèrent par onction David comme roi sur la communauté de Juda. On informa David que c''étaient les habitants de Jabès en Galaad qui avaient enterré Saül. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il leur envoya alors des messagers pour leur dire: «Soyez bénis de l''Eternel, puisque vous avez fait preuve d''une telle bonté envers Saül, votre maître, et que vous l''avez enterré. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Que l''Eternel agisse maintenant envers vous avec bonté et fidélité. Moi aussi, je vous ferai du bien, puisque vous avez agi de cette manière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Que vos mains se fortifient! Soyez de vaillants hommes! En effet, votre maître Saül est mort et c'est moi que la communauté de Juda a désigné par onction comme roi sur elle.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Cependant Abner, fils de Ner et chef de l''armée de Saül, avait pris Ish-Bosheth, le fils de Saül, et l''avait fait passer à Mahanaïm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il l''avait proclamé roi sur Galaad, sur les Asérites, sur Jizreel, sur Ephraïm, sur Benjamin et sur tout Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ish-Bosheth, fils de Saül, était âgé de 40 ans lorsqu''il devint roi d''Israël et il régna 2 ans. Seule la communauté de Juda suivit David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: La période pendant laquelle David régna à Hébron sur la communauté de Juda fut de 7 ans et 6 mois.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Abner, fils de Ner, et les serviteurs d''Ish-Bosheth, le fils de Saül, sortirent de Mahanaïm en direction de Gabaon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Joab, le fils de Tseruja, et les serviteurs de David se mirent eux aussi en marche. Ils se rencontrèrent près de l'étang de Gabaon et ils s'arrêtèrent, les uns d'un côté de l'étang, les autres de l'autre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Abner dit à Joab: «Que les jeunes se lèvent donc et combattent devant nous!» Joab répondit: «Qu''ils se lèvent!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils se levèrent et s''avancèrent en nombre égal: 12 pour Benjamin et Ish-Bosheth, le fils de Saül, et 12 serviteurs de David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Chacun attrapa son adversaire par la tête et lui enfonça son épée dans le côté; ils tombèrent tous ensemble. On appela alors cet endroit, qui se trouve près de Gabaon, Helkath-Hatsurim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il y eut ce jour-là un combat très rude, au cours duquel Abner et les hommes d'Israël furent battus par les serviteurs de David.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les trois fils de Tseruja, Joab, Abishaï et Asaël, se trouvaient là. Asaël était agile comme une gazelle sauvage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il poursuivit Abner sans se détourner de lui pour aller à droite ou à gauche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Abner regarda derrière lui et dit: «Est-ce toi, Asaël?» Il répondit: «C''est moi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Abner lui dit: «Détourne-toi à droite ou à gauche! Attrape un de ces jeunes gens et prends ses dépouilles.» Mais Asaël ne voulut pas se détourner de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Abner insista auprès d''Asaël: «Ecarte-toi de moi! Pourquoi devrais-je te frapper et t''abattre? Comment pourrais-je ensuite regarder ton frère Joab en face?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mais Asaël refusa de s'écarter. Alors Abner le frappa au ventre avec l'extrémité inférieure de sa lance, et la lance sortit par-derrière. Il tomba et mourut sur place. Tous ceux qui arrivaient à l'endroit où Asaël était tombé mort s'y arrêtaient.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Joab et Abishaï poursuivirent Abner, et le soleil se couchait quand ils arrivèrent à la colline d'Amma, qui se trouve en face de Guiach, sur le chemin du désert de Gabaon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Les Benjaminites se rassemblèrent derrière Abner pour former un seul bloc et ils s''arrêtèrent au sommet d''une colline. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Abner cria à Joab: «L''épée va-t-elle nous dévorer indéfiniment? Ne sais-tu pas que cela débouchera sur de l''amertume? Quand diras-tu enfin à ton peuple de ne plus poursuivre ses frères?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Joab répondit: «Dieu est vivant! Si tu n''avais pas parlé, l''armée n''aurait pas cessé de poursuivre ses frères avant le matin.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Il sonna alors de la trompette et toute l'armée s'arrêta. Ils cessèrent de poursuivre Israël et de combattre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Abner et ses hommes marchèrent toute la nuit dans la plaine. Ils passèrent le Jourdain, traversèrent tout le Bithron et arrivèrent à Mahanaïm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Joab mit fin à leur poursuite d''Abner et rassembla toute l''armée. Il manquait 19 serviteurs de David et Asaël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Cependant, les serviteurs de David avaient frappé à mort 360 des hommes de Benjamin et d''Abner. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ils emportèrent Asaël et l'enterrèrent dans le tombeau de son père à Bethléhem. Puis Joab et ses hommes marchèrent toute la nuit, et ils arrivèrent à Hébron au lever du jour.
