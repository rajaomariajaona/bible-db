document_id: 1CH.28,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Instructions de David pour la construction du temple
  - type: text
    content: 'David convoqua à Jérusalem tous les chefs d''Israël: les chefs des tribus, les chefs des divisions militaires au service du roi, les chefs de milliers et de centaines, ceux qui étaient intendants de tous les biens et troupeaux du roi et de ses fils, ainsi que les eunuques, les guerriers et tous les hommes vaillants. '
  '10':
  - type: text
    content: Considère maintenant que l'Eternel t'a choisi pour construire une maison qui serve de sanctuaire. Fortifie-toi et agis.»
  '11':
  - type: text
    content: 'David donna à son fils Salomon le plan du portique et des bâtiments annexes, des chambres du trésor, des chambres à l''étage et des chambres intérieures, ainsi que du bâtiment abritant le propitiatoire. '
  '12':
  - type: text
    content: 'Il lui donna le plan de tout ce qui lui avait été révélé par l''Esprit concernant les parvis de la maison de l''Eternel et toutes les pièces qui, tout autour, devaient être réservées aux trésors de la maison de Dieu et aux trésors sacrés, '
  '13':
  - type: text
    content: 'concernant les classes des prêtres et des Lévites et concernant tout le service de la maison de l''Eternel, y compris les ustensiles. '
  '14':
  - type: text
    content: 'Il lui donna aussi le modèle des ustensiles en or, avec le poids correspondant en or pour tous les ustensiles de chaque service, et de tous les ustensiles en argent, avec le poids correspondant pour tous les ustensiles de chaque service. '
  '15':
  - type: text
    content: 'Il donna le poids correspondant aux chandeliers en or et à leurs lampes en or, en indiquant le poids de chaque chandelier et de ses lampes, et le poids correspondant aux chandeliers en argent, en indiquant le poids de chaque chandelier et de ses lampes, en fonction de l''usage que l''on ferait de chaque chandelier. '
  '16':
  - type: text
    content: 'Il lui donna le poids d''or correspondant aux tables des pains consacrés, à chaque table, et l''argent pour les tables en argent. '
  '17':
  - type: text
    content: 'Il lui donna le modèle des fourchettes, des bassins et des gobelets en or pur, le modèle des coupes en or, avec le poids correspondant pour chaque coupe, et celui des coupes en argent avec le poids correspondant pour chaque coupe, '
  '18':
  - type: text
    content: 'et le modèle de l''autel des parfums en or épuré, avec le poids correspondant. Il lui donna encore le modèle du char, des chérubins en or qui étendent leurs ailes par-dessus l''arche de l''alliance de l''Eternel et la couvrent. '
  '19':
  - type: text
    content: «C'est par un écrit de sa main, dit David, que l'Eternel m'a fait comprendre tout cela, tous les travaux de ce plan.»
  '2':
  - type: text
    content: 'Le roi David se mit debout et dit: «Ecoutez-moi, mes frères et mon peuple! J''avais l''intention de construire une maison qui soit un lieu de repos pour l''arche de l''alliance de l''Eternel, pour le marchepied de notre Dieu, et je me préparais à construire, '
  '20':
  - type: text
    content: 'David dit à son fils Salomon: «Fortifie-toi, prends courage et agis! N''aie pas peur, ne te laisse pas effrayer, car l''Eternel Dieu, mon Dieu, sera avec toi. *Il ne te délaissera pas, il ne t''abandonnera pas'
  - type: note
    content: 'Il ne te… t''abandonnera pas: reprise de la promesse de Deutéronome 31.8; voir Josué 1.5.'
  - type: text
    content: ' avant que tous les travaux pour le service de la maison de l''Eternel soient terminés. '
  '21':
  - type: text
    content: Voici les classes des prêtres et des Lévites pour tout le service de la maison de Dieu; tu as avec toi, pour tout ce travail, des hommes bien disposés et habiles pour toutes sortes de services, et les chefs ainsi que tout le peuple sont à tes ordres.»
  '3':
  - type: text
    content: 'mais Dieu m''a dit: ‘Tu ne pourras pas construire une maison en mon honneur, car tu es un homme de guerre et tu as versé du sang.’ '
  '4':
  - type: text
    content: 'L''Eternel, le Dieu d''Israël, m''a choisi dans toute la famille de mon père pour que je sois à toujours le roi d''Israël. Oui, il a choisi Juda pour chef, dans la tribu de Juda il a choisi la famille de mon père et, parmi les fils de mon père, c''est moi qu''il a voulu faire régner sur tout Israël. '
  '5':
  - type: text
    content: 'Parmi tous mes fils – en effet, l''Eternel m''en a donné beaucoup – il a choisi mon fils Salomon pour le faire asseoir sur le trône du royaume de l''Eternel, au-dessus d''Israël. '
  '6':
  - type: text
    content: 'Il m''a dit: ‘C''est ton fils Salomon qui construira ma maison et mes parvis, car je l''ai choisi pour qu''il soit mon fils et je serai pour lui un père. '
  '7':
  - type: text
    content: 'J''affermirai pour toujours son royaume, s''il reste attaché comme aujourd''hui à la pratique de mes commandements et de mes règles.’ '
  '8':
  - type: text
    content: 'Maintenant, devant tout Israël, qui est l''assemblée de l''Eternel, et en présence de notre Dieu, respectez et prenez à cœur tous les commandements de l''Eternel, votre Dieu. Ainsi vous pourrez posséder ce bon pays et le laisser en héritage à vos fils après vous, et ce à perpétuité. '
  '9':
  - type: text
    content: 'Quant à toi, Salomon, mon fils, connais le Dieu de ton père et sers-le avec un cœur sans réserve et un esprit bien disposé, car l''Eternel examine tous les cœurs et discerne toutes leurs intentions. Si tu le cherches, il se laissera trouver par toi, mais si tu l''abandonnes, il te rejettera pour toujours. '
