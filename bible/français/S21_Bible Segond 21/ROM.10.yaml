document_id: ROM.10
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Frères et sœurs, le vœu de mon cœur et ma prière à Dieu pour les Israélites, c''est qu''ils soient sauvés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'En effet, je leur rends ce témoignage: ils ont du zèle pour Dieu, mais pas conformément à la vraie connaissance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils ignorent la justice de Dieu et cherchent à établir la leur propre; ils ne se sont donc pas soumis à la justice de Dieu, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: car Christ est la fin de la loi pour que tous ceux qui croient reçoivent la justice.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'En effet, Moïse décrit ainsi la justice qui vient de la loi: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: L'homme qui mettra ces prescriptions en pratique vivra par elles
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''homme… par elles: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lévitique 18.5
      metadata:
        usfm: LEV.18.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais voici comment parle la justice qui vient de la foi: «Ne dis pas dans ton cœur: ‘Qui montera au ciel?’ ce serait en faire descendre Christ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'ou: ‘Qui descendra dans l''abîme?’ ce serait faire remonter Christ de chez les morts.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Que dit-elle donc? '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: La parole est tout près de toi, dans ta bouche et dans ton cœur
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La parole… cœur: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 30.14
      metadata:
        usfm: DEU.30.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' Or cette parole est celle de la foi, que nous prêchons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Si tu reconnais publiquement de ta bouche que Jésus est le Seigneur et si tu crois dans ton cœur que Dieu l''a ressuscité, tu seras sauvé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'En effet, c''est avec le cœur que l''on croit et parvient à la justice, et c''est avec la bouche que l''on affirme une conviction et parvient au salut, comme le dit l''Ecriture: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Celui qui croit en lui ne sera pas couvert de honte
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Celui… honte: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: reprise de la citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 28.16
      metadata:
        usfm: ISA.28.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (voir '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9.33'
      metadata:
        usfm: ROM.9.33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' et la note).'
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ainsi, il n''y a aucune différence entre le Juif et le non-Juif, puisqu''ils ont tous le même Seigneur, qui se montre généreux pour tous ceux qui font appel à lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'En effet, '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: toute personne qui fera appel au nom du Seigneur sera sauvée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Toute personne… sauvée: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joël 3.5
      metadata:
        usfm: JOL.3.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais comment donc feront-ils appel à celui en qui ils n''ont pas cru? Et comment croiront-ils en celui dont ils n''ont pas entendu parler? Et comment entendront-ils parler de lui, si personne ne l''annonce? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et comment l''annoncera-t-on, si personne n''est envoyé? Comme il est écrit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Qu'ils sont beaux les pieds [de ceux qui annoncent la paix,] de ceux qui annoncent de bonnes nouvelles!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Qu''ils sont beaux… nouvelles: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 52.7
      metadata:
        usfm: ISA.52.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais tous n''ont pas obéi à la bonne nouvelle. En effet, Esaïe dit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Seigneur, qui a cru à notre prédication?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Seigneur… prédication: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 53.1
      metadata:
        usfm: ISA.53.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ainsi la foi vient de ce qu''on entend et ce qu''on entend vient de la parole de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Je demande alors: «N''auraient-ils pas entendu?» Au contraire! '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Leur voix est allée par toute la terre, et leurs discours jusqu'aux extrémités du monde
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Leur voix… du monde: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 19.5
      metadata:
        usfm: PSA.19.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Je demande encore: «Israël n''aurait-il pas compris?» Moïse, le premier, dit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Je provoquerai votre jalousie par ceux qui ne sont pas une nation, je provoquerai votre irritation par une nation sans intelligence
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je provoquerai… intelligence: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 32.21
      metadata:
        usfm: DEU.32.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Quant à Esaïe, il pousse la hardiesse jusqu''à déclarer: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Je me suis laissé trouver par ceux qui ne me cherchaient pas, je me suis révélé à ceux qui ne me demandaient rien
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais au sujet d''Israël il dit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: A longueur de journée, j'ai tendu mes mains vers un peuple désobéissant et rebelle
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.20-21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je me suis… et rebelle: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 65.1
      metadata:
        usfm: ISA.65.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '2'
      metadata:
        usfm: ISA.65.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
