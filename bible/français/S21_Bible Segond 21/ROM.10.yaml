document_id: ROM.10,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Frères et sœurs, le vœu de mon cœur et ma prière à Dieu pour les Israélites, c''est qu''ils soient sauvés. '
  '10':
  - type: text
    content: 'En effet, c''est avec le cœur que l''on croit et parvient à la justice, et c''est avec la bouche que l''on affirme une conviction et parvient au salut, comme le dit l''Ecriture: '
  '11':
  - type: text
    content: Celui qui croit en lui ne sera pas couvert de honte
  - type: text
    content: .
  - type: note
    content: 'Celui… honte: reprise de la citation d''Esaïe 28.16 (voir 9.33 et la note).'
  '12':
  - type: text
    content: 'Ainsi, il n''y a aucune différence entre le Juif et le non-Juif, puisqu''ils ont tous le même Seigneur, qui se montre généreux pour tous ceux qui font appel à lui. '
  '13':
  - type: text
    content: 'En effet, '
  - type: text
    content: toute personne qui fera appel au nom du Seigneur sera sauvée
  - type: note
    content: 'Toute personne… sauvée: citation de Joël 3.5.'
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Mais comment donc feront-ils appel à celui en qui ils n''ont pas cru? Et comment croiront-ils en celui dont ils n''ont pas entendu parler? Et comment entendront-ils parler de lui, si personne ne l''annonce? '
  '15':
  - type: text
    content: 'Et comment l''annoncera-t-on, si personne n''est envoyé? Comme il est écrit: '
  - type: text
    content: Qu'ils sont beaux les pieds [de ceux qui annoncent la paix,] de ceux qui annoncent de bonnes nouvelles!
  - type: note
    content: 'Qu''ils sont beaux… nouvelles: citation d''Esaïe 52.7.'
  '16':
  - type: text
    content: 'Mais tous n''ont pas obéi à la bonne nouvelle. En effet, Esaïe dit: '
  - type: text
    content: Seigneur, qui a cru à notre prédication?
  - type: note
    content: 'Seigneur… prédication: citation d''Esaïe 53.1.'
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Ainsi la foi vient de ce qu''on entend et ce qu''on entend vient de la parole de Dieu. '
  '18':
  - type: text
    content: 'Je demande alors: «N''auraient-ils pas entendu?» Au contraire! '
  - type: text
    content: Leur voix est allée par toute la terre, et leurs discours jusqu'aux extrémités du monde
  - type: text
    content: .
  - type: note
    content: 'Leur voix… du monde: citation du Psaume 19.5.'
  '19':
  - type: text
    content: 'Je demande encore: «Israël n''aurait-il pas compris?» Moïse, le premier, dit: '
  - type: text
    content: Je provoquerai votre jalousie par ceux qui ne sont pas une nation, je provoquerai votre irritation par une nation sans intelligence
  - type: text
    content: .
  - type: note
    content: 'Je provoquerai… intelligence: citation de Deutéronome 32.21.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'En effet, je leur rends ce témoignage: ils ont du zèle pour Dieu, mais pas conformément à la vraie connaissance. '
  '20':
  - type: text
    content: 'Quant à Esaïe, il pousse la hardiesse jusqu''à déclarer: '
  - type: text
    content: Je me suis laissé trouver par ceux qui ne me cherchaient pas, je me suis révélé à ceux qui ne me demandaient rien
  - type: text
    content: '. '
  '21':
  - type: text
    content: 'Mais au sujet d''Israël il dit: '
  - type: text
    content: A longueur de journée, j'ai tendu mes mains vers un peuple désobéissant et rebelle
  - type: text
    content: .
  - type: note
    content: 'Je me suis… et rebelle: citation d''Esaïe 65.1, 2.'
  '3':
  - type: text
    content: 'Ils ignorent la justice de Dieu et cherchent à établir la leur propre; ils ne se sont donc pas soumis à la justice de Dieu, '
  '4':
  - type: text
    content: car Christ est la fin de la loi pour que tous ceux qui croient reçoivent la justice.
  '5':
  - type: text
    content: 'En effet, Moïse décrit ainsi la justice qui vient de la loi: '
  - type: text
    content: L'homme qui mettra ces prescriptions en pratique vivra par elles
  - type: text
    content: .
  - type: note
    content: 'L''homme… par elles: citation de Lévitique 18.5.'
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Mais voici comment parle la justice qui vient de la foi: «Ne dis pas dans ton cœur: ‘Qui montera au ciel?’ ce serait en faire descendre Christ; '
  '7':
  - type: text
    content: 'ou: ‘Qui descendra dans l''abîme?’ ce serait faire remonter Christ de chez les morts.» '
  '8':
  - type: text
    content: 'Que dit-elle donc? '
  - type: text
    content: La parole est tout près de toi, dans ta bouche et dans ton cœur
  - type: text
    content: .
  - type: note
    content: 'La parole… cœur: citation de Deutéronome 30.14.'
  - type: text
    content: ' Or cette parole est celle de la foi, que nous prêchons. '
  '9':
  - type: text
    content: 'Si tu reconnais publiquement de ta bouche que Jésus est le Seigneur et si tu crois dans ton cœur que Dieu l''a ressuscité, tu seras sauvé. '
