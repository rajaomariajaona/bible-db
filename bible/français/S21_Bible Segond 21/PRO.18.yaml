document_id: PRO.18,152
type_code: fra
verses:
  '1':
  - type: text
    content: Celui qui se tient à l'écart cherche ce qui lui plaît,
  - type: text
    content: il s'irrite contre tout ce qui est raisonnable.
  '10':
  - type: text
    content: 'Le nom de l''Eternel est une tour fortifiée:'
  - type: text
    content: le juste s'y réfugie et se trouve en sécurité.
  '11':
  - type: text
    content: 'La fortune du riche est sa forteresse:'
  - type: text
    content: dans son imagination, elle est comme une haute muraille.
  '12':
  - type: text
    content: Avant la ruine, le cœur de l'homme se montre fier,
  - type: text
    content: mais avant la gloire se trouve l'humilité.
  '13':
  - type: text
    content: Celui qui répond avant d'avoir écouté
  - type: text
    content: fait un acte de folie et se couvre de honte.
  '14':
  - type: text
    content: L'esprit de l'homme le soutient dans sa maladie
  - type: text
    content: mais, si l'esprit est abattu, qui le relèvera?
  '15':
  - type: text
    content: Un cœur intelligent acquiert la connaissance,
  - type: text
    content: et l'oreille des sages la recherche.
  '16':
  - type: text
    content: Les cadeaux qu'offre un homme lui ouvrent la voie
  - type: text
    content: et le conduisent auprès des grands.
  '17':
  - type: text
    content: Le premier qui défend sa cause paraît avoir raison;
  - type: text
    content: vient sa partie adverse et on lui demande des preuves.
  '18':
  - type: text
    content: Le tirage au sort met fin aux conflits
  - type: text
    content: et tranche entre les puissants.
  '19':
  - type: text
    content: Un frère offensé est pire qu'une forteresse
  - type: text
    content: et les conflits sont pareils aux verrous d'un château.
  '2':
  - type: text
    content: Ce n'est pas à l'intelligence que l'homme stupide prend plaisir,
  - type: text
    content: c'est à l'étalage de ses pensées.
  '20':
  - type: text
    content: C'est grâce au fruit de sa bouche que l'homme rassasie son ventre,
  - type: text
    content: c'est du produit de ses lèvres qu'il se rassasie.
  '21':
  - type: text
    content: La langue a pouvoir de vie et de mort;
  - type: text
    content: ceux qui aiment parler en goûteront les fruits.
  '22':
  - type: text
    content: Celui qui trouve une femme a trouvé le bonheur;
  - type: text
    content: c'est une faveur qu'il a reçue de l'Eternel.
  '23':
  - type: text
    content: Le pauvre parle en suppliant,
  - type: text
    content: mais le riche répond avec dureté.
  '24':
  - type: text
    content: Celui qui a beaucoup de compagnons les a pour son malheur,
  - type: text
    content: mais il y a des amis plus attachés que des frères.
  '3':
  - type: text
    content: Quand vient le méchant, vient aussi le mépris,
  - type: text
    content: et avec la honte vient l'insulte.
  '4':
  - type: text
    content: Les paroles d'un homme sont des eaux profondes,
  - type: text
    content: la source de la sagesse est un torrent qui jaillit.
  '5':
  - type: text
    content: Il n'est pas bon de favoriser le méchant
  - type: text
    content: en faisant tort au juste lors d'un jugement.
  '6':
  - type: text
    content: Les lèvres de l'homme stupide se mêlent aux querelles,
  - type: text
    content: et sa bouche appelle les coups.
  '7':
  - type: text
    content: La bouche de l'homme stupide provoque sa ruine,
  - type: text
    content: et ses lèvres sont un piège pour lui-même.
  '8':
  - type: text
    content: 'Les paroles du critiqueur sont comme des friandises:'
  - type: text
    content: elles descendent au plus profond de l'être.
  '9':
  - type: text
    content: Celui qui se relâche dans son travail
  - type: text
    content: est frère de celui qui détruit.
