document_id: PRO.18,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Celui qui se tient à l'écart cherche ce qui lui plaît,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il s'irrite contre tout ce qui est raisonnable.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Le nom de l''Eternel est une tour fortifiée:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le juste s'y réfugie et se trouve en sécurité.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'La fortune du riche est sa forteresse:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans son imagination, elle est comme une haute muraille.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Avant la ruine, le cœur de l'homme se montre fier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais avant la gloire se trouve l'humilité.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Celui qui répond avant d'avoir écouté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fait un acte de folie et se couvre de honte.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: L'esprit de l'homme le soutient dans sa maladie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais, si l'esprit est abattu, qui le relèvera?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Un cœur intelligent acquiert la connaissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'oreille des sages la recherche.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Les cadeaux qu'offre un homme lui ouvrent la voie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le conduisent auprès des grands.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Le premier qui défend sa cause paraît avoir raison;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vient sa partie adverse et on lui demande des preuves.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Le tirage au sort met fin aux conflits
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tranche entre les puissants.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Un frère offensé est pire qu'une forteresse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les conflits sont pareils aux verrous d'un château.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ce n'est pas à l'intelligence que l'homme stupide prend plaisir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est à l'étalage de ses pensées.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: C'est grâce au fruit de sa bouche que l'homme rassasie son ventre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est du produit de ses lèvres qu'il se rassasie.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: La langue a pouvoir de vie et de mort;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui aiment parler en goûteront les fruits.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Celui qui trouve une femme a trouvé le bonheur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est une faveur qu'il a reçue de l'Eternel.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Le pauvre parle en suppliant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le riche répond avec dureté.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Celui qui a beaucoup de compagnons les a pour son malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il y a des amis plus attachés que des frères.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Quand vient le méchant, vient aussi le mépris,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et avec la honte vient l'insulte.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Les paroles d'un homme sont des eaux profondes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la source de la sagesse est un torrent qui jaillit.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Il n'est pas bon de favoriser le méchant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en faisant tort au juste lors d'un jugement.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Les lèvres de l'homme stupide se mêlent aux querelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sa bouche appelle les coups.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: La bouche de l'homme stupide provoque sa ruine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses lèvres sont un piège pour lui-même.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Les paroles du critiqueur sont comme des friandises:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles descendent au plus profond de l'être.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Celui qui se relâche dans son travail
  - type: usfm
    marker: q1
    children:
    - type: text
      text: est frère de celui qui détruit.
