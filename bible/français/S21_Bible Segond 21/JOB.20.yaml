document_id: JOB.20,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Intervention n° 2 de Tsophar
  - type: text
    content: 'Tsophar de Naama prit la parole et dit:'
  '10':
  - type: text
    content: Ses fils devront solliciter la pitié des pauvres
  - type: text
    content: et ses mains restitueront ce qu'il a acquis par la force.
  '11':
  - type: text
    content: La vigueur de la jeunesse qui remplissait ses membres
  - type: text
    content: se couchera avec lui dans la poussière.
  '12':
  - type: text
    content: »Le mal était doux à sa bouche,
  - type: text
    content: il le cachait sous sa langue,
  '13':
  - type: text
    content: il le savourait sans l'abandonner,
  - type: text
    content: il le retenait au milieu de son palais,
  '14':
  - type: text
    content: mais sa nourriture se transformera dans ses intestins,
  - type: text
    content: elle deviendra à l'intérieur de lui un venin de vipère.
  '15':
  - type: text
    content: 'Il a englouti des richesses, il les vomira:'
  - type: text
    content: Dieu les chassera de son ventre.
  '16':
  - type: text
    content: Il a sucé du venin de vipère,
  - type: text
    content: la langue du cobra le tuera.
  '17':
  - type: text
    content: »Qu'il ne fixe plus les regards sur les ruisseaux,
  - type: text
    content: sur les rivières, sur les torrents de miel et de lait caillé!
  '18':
  - type: text
    content: Il rendra ce qu'il a péniblement acquis et n'en profitera plus,
  - type: text
    content: il restituera toute la fortune de son commerce et n'en jouira plus.
  '19':
  - type: text
    content: »En effet, il a opprimé et abandonné les pauvres, il s'est approprié des maisons au lieu d'en construire.
  '2':
  - type: text
    content: «Mes pensées me forcent à répondre,
  - type: text
    content: je bouillonne d'impatience.
  '20':
  - type: text
    content: Son appétit n'a pas connu de limite. Dans son avidité,
  - type: text
    content: il ne laissait rien échapper,
  '21':
  - type: text
    content: rien n'était soustrait à sa voracité.
  - type: text
    content: C'est pourquoi son bien-être ne durera pas.
  '22':
  - type: text
    content: Au milieu de l'abondance il sera dans la détresse,
  - type: text
    content: les coups de tous les malheureux s'abattront sur lui.
  '23':
  - type: text
    content: Pour lui remplir le ventre,
  - type: text
    content: Dieu enverra sur lui sa colère ardente;
  - type: text
    content: il la fera pleuvoir sur lui et l'en rassasiera.
  '24':
  - type: text
    content: »S'il échappe à l'armure de fer,
  - type: text
    content: l'arc de bronze le transpercera.
  '25':
  - type: text
    content: S'il arrache de son dos une flèche,
  - type: text
    content: ou une lame étincelante de son ventre,
  - type: text
    content: il sera en proie aux terreurs de la mort.
  '26':
  - type: text
    content: Toutes les calamités sont réservées à ses trésors.
  - type: text
    content: Il sera brûlé par un feu que personne n'attise
  - type: text
    content: et qui dévorera ce qui restera dans sa tente.
  '27':
  - type: text
    content: Le ciel dévoilera sa faute
  - type: text
    content: et la terre se dressera contre lui.
  '28':
  - type: text
    content: Les biens amassés dans sa maison seront balayés,
  - type: text
    content: ils seront emportés, le jour de la colère de Dieu.
  '29':
  - type: text
    content: Telle est la part que Dieu réserve au méchant,
  - type: text
    content: tel est l'héritage que Dieu lui destine.»
  '3':
  - type: text
    content: J'ai entendu des reproches que je considère comme un affront.
  - type: text
    content: Mon intelligence inspirera ma réplique.
  '4':
  - type: text
    content: »Ne sais-tu pas que depuis toujours,
  - type: text
    content: depuis que l'homme a été placé sur la terre,
  '5':
  - type: text
    content: le triomphe des méchants a été de courte durée
  - type: text
    content: et la joie de l'impie momentanée?
  '6':
  - type: text
    content: Même s'il s'élevait jusqu'au ciel
  - type: text
    content: et si sa tête touchait les nuages,
  '7':
  - type: text
    content: il disparaîtra définitivement comme ses excréments
  - type: text
    content: 'et ceux qui le voyaient diront: ‘Où est-il?’'
  '8':
  - type: text
    content: Il s'envolera comme un rêve et on ne le trouvera plus.
  - type: text
    content: Il disparaîtra comme une vision nocturne.
  '9':
  - type: text
    content: L'œil qui le regardait ne le regardera plus,
  - type: text
    content: l'endroit qu'il habitait ne l'apercevra plus.
