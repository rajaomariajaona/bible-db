document_id: JOB.20,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Intervention n° 2 de Tsophar
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsophar de Naama prit la parole et dit:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses fils devront solliciter la pitié des pauvres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses mains restitueront ce qu'il a acquis par la force.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La vigueur de la jeunesse qui remplissait ses membres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: se couchera avec lui dans la poussière.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Le mal était doux à sa bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il le cachait sous sa langue,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il le savourait sans l'abandonner,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il le retenait au milieu de son palais,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais sa nourriture se transformera dans ses intestins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle deviendra à l'intérieur de lui un venin de vipère.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il a englouti des richesses, il les vomira:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu les chassera de son ventre.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a sucé du venin de vipère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la langue du cobra le tuera.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Qu'il ne fixe plus les regards sur les ruisseaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur les rivières, sur les torrents de miel et de lait caillé!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il rendra ce qu'il a péniblement acquis et n'en profitera plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il restituera toute la fortune de son commerce et n'en jouira plus.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »En effet, il a opprimé et abandonné les pauvres, il s'est approprié des maisons au lieu d'en construire.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Mes pensées me forcent à répondre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je bouillonne d'impatience.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son appétit n'a pas connu de limite. Dans son avidité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne laissait rien échapper,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rien n'était soustrait à sa voracité.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est pourquoi son bien-être ne durera pas.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au milieu de l'abondance il sera dans la détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les coups de tous les malheureux s'abattront sur lui.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour lui remplir le ventre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu enverra sur lui sa colère ardente;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il la fera pleuvoir sur lui et l'en rassasiera.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »S'il échappe à l'armure de fer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'arc de bronze le transpercera.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S'il arrache de son dos une flèche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou une lame étincelante de son ventre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il sera en proie aux terreurs de la mort.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes les calamités sont réservées à ses trésors.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il sera brûlé par un feu que personne n'attise
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui dévorera ce qui restera dans sa tente.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le ciel dévoilera sa faute
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la terre se dressera contre lui.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les biens amassés dans sa maison seront balayés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils seront emportés, le jour de la colère de Dieu.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Telle est la part que Dieu réserve au méchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tel est l'héritage que Dieu lui destine.»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'ai entendu des reproches que je considère comme un affront.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon intelligence inspirera ma réplique.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Ne sais-tu pas que depuis toujours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: depuis que l'homme a été placé sur la terre,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le triomphe des méchants a été de courte durée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la joie de l'impie momentanée?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même s'il s'élevait jusqu'au ciel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et si sa tête touchait les nuages,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il disparaîtra définitivement comme ses excréments
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et ceux qui le voyaient diront: ‘Où est-il?’'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s'envolera comme un rêve et on ne le trouvera plus.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il disparaîtra comme une vision nocturne.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'œil qui le regardait ne le regardera plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'endroit qu'il habitait ne l'apercevra plus.
