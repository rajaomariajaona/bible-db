document_id: ROM.2
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Qui que tu sois, homme, toi qui juges, tu es donc inexcusable. En effet, en jugeant les autres tu te condamnes toi-même, puisque toi qui juges tu agis comme eux. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nous savons que le jugement de Dieu contre ceux qui agissent ainsi est conforme à la vérité. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et penses-tu, toi qui juges les auteurs de tels actes et qui les fais aussi, que tu échapperas au jugement de Dieu? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ou méprises-tu les richesses de sa bonté, de sa patience et de sa générosité en ne reconnaissant pas que la bonté de Dieu te pousse à changer d''attitude? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Par ton endurcissement et ton refus de te repentir, tu t''amasses un trésor de colère pour le jour où Dieu révélera sa colère et son juste jugement. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: traitera chacun conformément à ses actes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Traitera… actes: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'principe tiré du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 62.13
      metadata:
        usfm: PSA.62.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ': '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'à ceux qui, par leur persévérance à faire le bien, recherchent l''honneur, la gloire et l''incorruptibilité, il donnera la vie éternelle; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'mais il réserve son indignation et sa colère à ceux qui, par esprit de révolte, rejettent la vérité et obéissent à l''injustice. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'La détresse et l''angoisse atteindront tout être humain qui fait le mal, le Juif d''abord, mais aussi le non-Juif. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'La gloire, l''honneur et la paix seront pour tout homme qui fait le bien, le Juif d''abord, mais aussi le non-Juif, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: car devant Dieu il n'y a pas de favoritisme.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tous ceux qui ont péché sans la loi périront aussi sans la loi, et tous ceux qui ont péché sous la loi seront jugés au moyen de la loi. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'En effet, ce ne sont pas ceux qui écoutent la loi qui sont justes devant Dieu, mais ce sont ceux qui la mettent en pratique qui seront déclarés justes. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Quand des non-Juifs qui n''ont pas la loi font naturellement ce que prescrit la loi, ils se tiennent lieu de loi à eux-mêmes, bien qu''ils n''aient pas la loi. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils montrent que l''œuvre de la loi est écrite dans leur cœur, car leur conscience en rend témoignage et leurs pensées les accusent ou les défendent tour à tour. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: C'est ce qui paraîtra le jour où, conformément à l'Evangile que je prêche, Dieu jugera par Jésus-Christ le comportement secret des hommes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Culpabilité des Juifs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Toi qui te donnes le nom de Juif, tu te reposes sur la loi, tu places ta fierté dans ton Dieu, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'tu connais sa volonté et tu discernes ce qui est important, car tu es instruit par la loi. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tu es convaincu d''être le conducteur des aveugles, la lumière de ceux qui sont dans les ténèbres, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'l''éducateur des ignorants, le maître des enfants parce que tu possèdes dans la loi l''expression de la connaissance et de la vérité. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Toi donc qui enseignes les autres, tu ne t''enseignes pas toi-même! Toi qui prêches de ne pas voler, tu voles! '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Toi qui dis de ne pas commettre d''adultère, tu commets l''adultère! Toi qui as les idoles en horreur, tu pilles les temples! '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Toi qui places ta fierté dans la loi, tu déshonores Dieu en la transgressant! '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'En effet, '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: le nom de Dieu est blasphémé parmi les nations à cause de vous
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le nom… de vous: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 52.5
      metadata:
        usfm: ISA.52.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', comme cela est écrit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Certes, la circoncision
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La circoncision: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ordonnée par Dieu à Abraham comme signe de son alliance avec lui et avec ses descendants, cette opération consistant à enlever le prépuce était obligatoire pour les étrangers qui souhaitaient participer à la Pâque et intégrer la communauté d'Israël.
    marker-yv: yv-n
  - type: text
    text: ' est utile si tu mets en pratique la loi; mais si tu la violes, ta circoncision devient incirconcision. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Si donc l'incirconcis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''incirconcis: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire le non-Juif.
    marker-yv: yv-n
  - type: text
    text: ' respecte les commandements de la loi, son incirconcision ne sera-t-elle pas comptée comme circoncision? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ainsi, l''homme qui accomplit la loi sans être circoncis physiquement ne te condamnera-t-il pas, toi qui la transgresses tout en ayant la loi écrite et la circoncision? '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Le Juif, ce n''est pas celui qui en a l''apparence, et la circoncision, ce n''est pas celle qui est visible dans le corps. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Mais le Juif, c'est celui qui l'est intérieurement, et la circoncision, c'est celle du cœur, accomplie par l'Esprit et non par la loi écrite. La louange que reçoit ce Juif ne vient pas des hommes, mais de Dieu.
