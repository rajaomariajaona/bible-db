document_id: PRO.28
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Le méchant prend la fuite sans même qu'on le poursuive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que le juste a autant de confiance qu'un jeune lion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Quand un pays est en révolte, ses chefs sont nombreux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais avec un homme qui a de l'intelligence et de la connaissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'ordre est maintenu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Un homme pauvre qui opprime les faibles
- type: usfm
  marker: q1
  children:
  - type: text
    text: est une pluie dévastatrice qui prive de récolte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ceux qui abandonnent la loi font l'éloge du méchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ceux qui la respectent les combattent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les hommes adonnés au mal ne comprennent pas ce qui est juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que ceux qui cherchent l'Eternel comprennent tout.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mieux vaut un pauvre qui marche dans l'intégrité
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'un riche qui emprunte des voies tortueuses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Celui qui respecte la loi est un fils intelligent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui fréquente des voyous fait honte à son père.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Celui qui augmente ses biens à l'aide de l'intérêt et de taux excessifs
- type: usfm
  marker: q1
  children:
  - type: text
    text: les amasse pour celui qui fait grâce aux plus faibles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Si quelqu'un détourne l'oreille pour ne pas écouter la loi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa prière même fait horreur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Celui qui égare les hommes droits dans la mauvaise voie
- type: usfm
  marker: q1
  children:
  - type: text
    text: tombera dans la fosse qu'il a creusée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais les hommes intègres hériteront du bonheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L'homme riche se croit sage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais le faible qui est intelligent vérifie sa valeur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Quand les justes triomphent, la gloire est générale;
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand les méchants gagnent en importance, chacun se cache.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Celui qui cache ses transgressions ne réussira pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais on aura compassion de celui qui les reconnaît et les abandonne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Heureux l'homme qui est constamment sur ses gardes!
- type: usfm
  marker: q1
  children:
  - type: text
    text: En revanche, celui qui endurcit son cœur tombera dans le malheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Un lion rugissant, un ours affamé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: voilà ce qu'est le méchant qui domine sur un peuple sans ressources.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Un prince dépourvu d'intelligence multiplie les actes d'extorsion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui déteste le profit malhonnête prolongera sa vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Un homme chargé du sang d'un autre
- type: usfm
  marker: q1
  children:
  - type: text
    text: fuit-il jusqu'à la tombe? Qu'on ne le retienne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Retienne: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ou soutienne.
    marker-yv: yv-n
  - type: text
    text: ' pas!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Celui qui marche dans l'intégrité sera sauvé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui suit deux voies tortueuses tombera dans l'une d'elles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Celui qui cultive son terrain est rassasié de pain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui poursuit des réalités sans valeur est rassasié de pauvreté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Un homme fidèle est comblé de bénédictions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui est pressé de s'enrichir ne restera pas impuni.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Il n'est pas bon de se montrer partial.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourtant, des hommes sont prêts à la transgression en échange d'un morceau de pain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: L'homme envieux est pressé de s'enrichir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il ne sait pas que la misère viendra sur lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Celui qui reprend les autres gagne finalement plus leur faveur
- type: usfm
  marker: q1
  children:
  - type: text
    text: que celui dont la langue est flatteuse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Celui qui vole son père et sa mère
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et qui dit: «Ce n''est pas une transgression!»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: est le complice des brigands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: L'homme trop ambitieux pousse au conflit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais c'est celui qui se confie en l'Eternel qui sera comblé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Celui qui a confiance en son propre cœur est stupide,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui marche dans la sagesse sera délivré.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Celui qui donne au pauvre ne connaît pas la misère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ceux qui fuient son regard sont chargés de malédictions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Quand les méchants gagnent en importance, chacun se cache,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et quand ils disparaissent, les justes se multiplient.
