document_id: PRO.28,152
type_code: fra
verses:
  '1':
  - type: text
    content: Le méchant prend la fuite sans même qu'on le poursuive,
  - type: text
    content: tandis que le juste a autant de confiance qu'un jeune lion.
  '10':
  - type: text
    content: Celui qui égare les hommes droits dans la mauvaise voie
  - type: text
    content: tombera dans la fosse qu'il a creusée,
  - type: text
    content: mais les hommes intègres hériteront du bonheur.
  '11':
  - type: text
    content: L'homme riche se croit sage,
  - type: text
    content: mais le faible qui est intelligent vérifie sa valeur.
  '12':
  - type: text
    content: Quand les justes triomphent, la gloire est générale;
  - type: text
    content: quand les méchants gagnent en importance, chacun se cache.
  '13':
  - type: text
    content: Celui qui cache ses transgressions ne réussira pas,
  - type: text
    content: mais on aura compassion de celui qui les reconnaît et les abandonne.
  '14':
  - type: text
    content: Heureux l'homme qui est constamment sur ses gardes!
  - type: text
    content: En revanche, celui qui endurcit son cœur tombera dans le malheur.
  '15':
  - type: text
    content: Un lion rugissant, un ours affamé,
  - type: text
    content: voilà ce qu'est le méchant qui domine sur un peuple sans ressources.
  '16':
  - type: text
    content: Un prince dépourvu d'intelligence multiplie les actes d'extorsion,
  - type: text
    content: mais celui qui déteste le profit malhonnête prolongera sa vie.
  '17':
  - type: text
    content: Un homme chargé du sang d'un autre
  - type: text
    content: fuit-il jusqu'à la tombe? Qu'on ne le retienne
  - type: note
    content: 'Retienne: ou soutienne.'
  - type: text
    content: ' pas!'
  '18':
  - type: text
    content: Celui qui marche dans l'intégrité sera sauvé,
  - type: text
    content: mais celui qui suit deux voies tortueuses tombera dans l'une d'elles.
  '19':
  - type: text
    content: Celui qui cultive son terrain est rassasié de pain,
  - type: text
    content: celui qui poursuit des réalités sans valeur est rassasié de pauvreté.
  '2':
  - type: text
    content: Quand un pays est en révolte, ses chefs sont nombreux,
  - type: text
    content: mais avec un homme qui a de l'intelligence et de la connaissance,
  - type: text
    content: l'ordre est maintenu.
  '20':
  - type: text
    content: Un homme fidèle est comblé de bénédictions,
  - type: text
    content: mais celui qui est pressé de s'enrichir ne restera pas impuni.
  '21':
  - type: text
    content: Il n'est pas bon de se montrer partial.
  - type: text
    content: Pourtant, des hommes sont prêts à la transgression en échange d'un morceau de pain.
  '22':
  - type: text
    content: L'homme envieux est pressé de s'enrichir,
  - type: text
    content: mais il ne sait pas que la misère viendra sur lui.
  '23':
  - type: text
    content: Celui qui reprend les autres gagne finalement plus leur faveur
  - type: text
    content: que celui dont la langue est flatteuse.
  '24':
  - type: text
    content: Celui qui vole son père et sa mère
  - type: text
    content: 'et qui dit: «Ce n''est pas une transgression!»'
  - type: text
    content: est le complice des brigands.
  '25':
  - type: text
    content: L'homme trop ambitieux pousse au conflit,
  - type: text
    content: mais c'est celui qui se confie en l'Eternel qui sera comblé.
  '26':
  - type: text
    content: Celui qui a confiance en son propre cœur est stupide,
  - type: text
    content: mais celui qui marche dans la sagesse sera délivré.
  '27':
  - type: text
    content: Celui qui donne au pauvre ne connaît pas la misère,
  - type: text
    content: mais ceux qui fuient son regard sont chargés de malédictions.
  '28':
  - type: text
    content: Quand les méchants gagnent en importance, chacun se cache,
  - type: text
    content: et quand ils disparaissent, les justes se multiplient.
  '3':
  - type: text
    content: Un homme pauvre qui opprime les faibles
  - type: text
    content: est une pluie dévastatrice qui prive de récolte.
  '4':
  - type: text
    content: Ceux qui abandonnent la loi font l'éloge du méchant,
  - type: text
    content: mais ceux qui la respectent les combattent.
  '5':
  - type: text
    content: Les hommes adonnés au mal ne comprennent pas ce qui est juste,
  - type: text
    content: tandis que ceux qui cherchent l'Eternel comprennent tout.
  '6':
  - type: text
    content: Mieux vaut un pauvre qui marche dans l'intégrité
  - type: text
    content: qu'un riche qui emprunte des voies tortueuses.
  '7':
  - type: text
    content: Celui qui respecte la loi est un fils intelligent,
  - type: text
    content: mais celui qui fréquente des voyous fait honte à son père.
  '8':
  - type: text
    content: Celui qui augmente ses biens à l'aide de l'intérêt et de taux excessifs
  - type: text
    content: les amasse pour celui qui fait grâce aux plus faibles.
  '9':
  - type: text
    content: Si quelqu'un détourne l'oreille pour ne pas écouter la loi,
  - type: text
    content: sa prière même fait horreur.
