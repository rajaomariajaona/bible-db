document_id: JOB.30,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Et maintenant, je suis un objet de moquerie pour de plus jeunes que moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour ceux dont je méprisais trop les pères
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour les mettre parmi les chiens de mon troupeau.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont horreur de moi et se tiennent loin de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne se retiennent pas de me cracher au visage.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puisque Dieu m'a privé de ressources et m'a humilié,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: plus rien ne les arrête.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Ces misérables se lèvent à ma droite
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Droite: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: place occupée par un accusateur.
      marker-yv: yv-n
    - type: text
      text: ' et me tendent des croche-pieds.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se construisent des chemins jusqu'à moi, mais c'est pour ma ruine.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils me coupent toute issue et travaillent à ma perte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eux à qui personne ne viendrait en aide.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils affluent comme par une large brèche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se précipitent au milieu des décombres.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des terreurs m'assaillent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma dignité est emportée comme par le vent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ma prospérité s'en va comme un nuage.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Et maintenant, je me liquéfie de l'intérieur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les jours de souffrance se sont emparés de moi.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La nuit me transperce les os,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les douleurs qui me rongent ne s'accordent aucun repos.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La force du mal est telle que mon habit perd toute forme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il me serre comme le col de ma tunique.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu m'a jeté dans la boue
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je ressemble à la poussière et à la cendre.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Mais à quoi me servirait la force de leurs mains?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils n'ont pas la moindre vigueur.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Je t'appelle au secours, mais tu ne me réponds pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me tiens debout, mais tu te bornes à me regarder.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu t'es changé en ennemi cruel contre moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu me combats avec toute la force de ta main.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu me soulèves et me fais voler au-dessus du vent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu me dissous au plus profond de moi-même.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, je le sais, c'est à la mort que tu me conduis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au rendez-vous de tous les êtres vivants.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Cependant, celui qui va sombrer ne tend-il pas les mains?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui est dans le malheur n'appelle-t-il pas au secours?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N'avais-je pas des larmes pour celui qui rencontrait des difficultés?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N'étais-je pas triste pour le pauvre?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De fait, j'attendais le bonheur, mais c'est le malheur qui est arrivé;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'espérais la lumière, mais c'est l'obscurité qui est venue.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Je suis sans arrêt profondément bouleversé.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les jours de souffrance m'ont surpris.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je marche noirci, mais pas par le soleil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si je me lève en pleine assemblée, c'est pour appeler au secours.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis devenu le frère des chacals,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le compagnon des autruches.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Desséchés par la privation et la faim,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils rongent les endroits arides,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: depuis longtemps dévastés et déserts.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma peau devient noire et pèle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mes os sont brûlants de fièvre.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma harpe n'est plus qu'un instrument de deuil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ma flûte se confond avec la voix des pleureurs.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils arrachent des herbes sauvages à côté des buissons
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et se nourrissent de la racine des genêts.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On les chasse du milieu des hommes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on crie après eux comme après un voleur.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils habitent dans d'affreux ravins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans les grottes de la terre et dans les rochers,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils hurlent au milieu des buissons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils s'entassent près des broussailles.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Espèces de fous sans identité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on les chassait du pays,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et maintenant je suis l'objet de leurs chansons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: me voilà devenu le thème de leurs discussions.
