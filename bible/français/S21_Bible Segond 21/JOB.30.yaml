document_id: JOB.30,152
type_code: fra
verses:
  '1':
  - type: text
    content: »Et maintenant, je suis un objet de moquerie pour de plus jeunes que moi,
  - type: text
    content: pour ceux dont je méprisais trop les pères
  - type: text
    content: pour les mettre parmi les chiens de mon troupeau.
  '10':
  - type: text
    content: Ils ont horreur de moi et se tiennent loin de moi,
  - type: text
    content: ils ne se retiennent pas de me cracher au visage.
  '11':
  - type: text
    content: Puisque Dieu m'a privé de ressources et m'a humilié,
  - type: text
    content: plus rien ne les arrête.
  '12':
  - type: text
    content: »Ces misérables se lèvent à ma droite
  - type: note
    content: 'Droite: place occupée par un accusateur.'
  - type: text
    content: ' et me tendent des croche-pieds.'
  - type: text
    content: Ils se construisent des chemins jusqu'à moi, mais c'est pour ma ruine.
  '13':
  - type: text
    content: Ils me coupent toute issue et travaillent à ma perte,
  - type: text
    content: eux à qui personne ne viendrait en aide.
  '14':
  - type: text
    content: Ils affluent comme par une large brèche,
  - type: text
    content: ils se précipitent au milieu des décombres.
  '15':
  - type: text
    content: Des terreurs m'assaillent.
  - type: text
    content: Ma dignité est emportée comme par le vent,
  - type: text
    content: ma prospérité s'en va comme un nuage.
  '16':
  - type: text
    content: »Et maintenant, je me liquéfie de l'intérieur.
  - type: text
    content: Les jours de souffrance se sont emparés de moi.
  '17':
  - type: text
    content: La nuit me transperce les os,
  - type: text
    content: les douleurs qui me rongent ne s'accordent aucun repos.
  '18':
  - type: text
    content: La force du mal est telle que mon habit perd toute forme,
  - type: text
    content: il me serre comme le col de ma tunique.
  '19':
  - type: text
    content: Dieu m'a jeté dans la boue
  - type: text
    content: et je ressemble à la poussière et à la cendre.
  '2':
  - type: text
    content: »Mais à quoi me servirait la force de leurs mains?
  - type: text
    content: Ils n'ont pas la moindre vigueur.
  '20':
  - type: text
    content: »Je t'appelle au secours, mais tu ne me réponds pas.
  - type: text
    content: Je me tiens debout, mais tu te bornes à me regarder.
  '21':
  - type: text
    content: Tu t'es changé en ennemi cruel contre moi,
  - type: text
    content: tu me combats avec toute la force de ta main.
  '22':
  - type: text
    content: Tu me soulèves et me fais voler au-dessus du vent,
  - type: text
    content: tu me dissous au plus profond de moi-même.
  '23':
  - type: text
    content: En effet, je le sais, c'est à la mort que tu me conduis,
  - type: text
    content: au rendez-vous de tous les êtres vivants.
  '24':
  - type: text
    content: »Cependant, celui qui va sombrer ne tend-il pas les mains?
  - type: text
    content: Celui qui est dans le malheur n'appelle-t-il pas au secours?
  '25':
  - type: text
    content: N'avais-je pas des larmes pour celui qui rencontrait des difficultés?
  - type: text
    content: N'étais-je pas triste pour le pauvre?
  '26':
  - type: text
    content: De fait, j'attendais le bonheur, mais c'est le malheur qui est arrivé;
  - type: text
    content: j'espérais la lumière, mais c'est l'obscurité qui est venue.
  '27':
  - type: text
    content: »Je suis sans arrêt profondément bouleversé.
  - type: text
    content: Les jours de souffrance m'ont surpris.
  '28':
  - type: text
    content: Je marche noirci, mais pas par le soleil.
  - type: text
    content: Si je me lève en pleine assemblée, c'est pour appeler au secours.
  '29':
  - type: text
    content: Je suis devenu le frère des chacals,
  - type: text
    content: le compagnon des autruches.
  '3':
  - type: text
    content: Desséchés par la privation et la faim,
  - type: text
    content: ils rongent les endroits arides,
  - type: text
    content: depuis longtemps dévastés et déserts.
  '30':
  - type: text
    content: Ma peau devient noire et pèle,
  - type: text
    content: mes os sont brûlants de fièvre.
  '31':
  - type: text
    content: Ma harpe n'est plus qu'un instrument de deuil,
  - type: text
    content: et ma flûte se confond avec la voix des pleureurs.
  '4':
  - type: text
    content: Ils arrachent des herbes sauvages à côté des buissons
  - type: text
    content: et se nourrissent de la racine des genêts.
  '5':
  - type: text
    content: On les chasse du milieu des hommes,
  - type: text
    content: on crie après eux comme après un voleur.
  '6':
  - type: text
    content: Ils habitent dans d'affreux ravins,
  - type: text
    content: dans les grottes de la terre et dans les rochers,
  '7':
  - type: text
    content: ils hurlent au milieu des buissons,
  - type: text
    content: ils s'entassent près des broussailles.
  '8':
  - type: text
    content: »Espèces de fous sans identité,
  - type: text
    content: on les chassait du pays,
  '9':
  - type: text
    content: et maintenant je suis l'objet de leurs chansons,
  - type: text
    content: me voilà devenu le thème de leurs discussions.
