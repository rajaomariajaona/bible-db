document_id: JDG.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Victoire de Débora et Barak sur Sisera
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les Israélites firent encore ce qui déplaît à l''Eternel, après la mort d''Ehud. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: L'Eternel les vendit alors à Jabin, le roi de Canaan, qui régnait à Hatsor. Le chef de son armée était Sisera et habitait à Harosheth-Goïm.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Les Israélites crièrent à l'Eternel, car Jabin avait 900 chars de fer et les opprimait avec violence depuis 20 ans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'A cette époque, Débora, une prophétesse mariée à un certain Lappidoth, était juge en Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Elle siégeait sous le palmier de Débora, entre Rama et Béthel, dans la région montagneuse d''Ephraïm, et les Israélites montaient vers elle pour être jugés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Elle fit appeler Barak, fils d''Abinoam, originaire de Kédesh-Nephthali, et elle lui dit: «L''Eternel, le Dieu d''Israël, t''a donné l''ordre suivant: ‘Vas-y, prends la direction du mont Thabor en emmenant 10''000 hommes des tribus de Nephthali et de Zabulon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'J''attirerai vers toi, au torrent du Kison, Sisera, le chef de l''armée de Jabin, avec ses chars et ses troupes, et je le livrerai entre tes mains.’» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Barak dit à Débora: «Si tu viens avec moi, je partirai. Mais si tu ne viens pas avec moi, je ne partirai pas.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Elle répondit: «J''irai donc avec toi, mais tu n''auras aucune gloire sur la voie où tu t''engages, car c''est entre les mains d''une femme que l''Eternel livrera Sisera.» Débora se leva et se rendit avec Barak à Kédesh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Barak convoqua les tribus de Zabulon et Nephthali à Kédesh; 10'000 hommes marchèrent à sa suite et Débora partit avec lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Héber, le Kénien, s'était séparé des autres Kéniens qui descendaient de Hobab, le beau-frère de Moïse, et il s'était rendu jusqu'au chêne de Tsaannaïm, près de Kédesh, pour y dresser sa tente.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'On informa Sisera que Barak, fils d''Abinoam, avait pris la direction du mont Thabor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Et, depuis Harosheth-Goïm, Sisera rassembla vers le torrent du Kison tous ses chars, 900 chars en fer, et tout le peuple qui était avec lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors Débora dit à Barak: «Lève-toi, car voici le jour où l''Eternel livre Sisera entre tes mains. L''Eternel ne marche-t-il pas devant toi?» Barak descendit du mont Thabor, avec 10''000 hommes à sa suite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L''Eternel mit en déroute Sisera, tous ses chars et tout le camp et les livra à l''épée de Barak. Sisera descendit de son char et s''enfuit à pied. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Barak poursuivit les chars et l'armée jusqu'à Harosheth-Goïm. Toute l'armée de Sisera tomba sous le tranchant de l'épée, sans qu'il en reste un seul homme.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Toujours à pied, Sisera se réfugia dans la tente de Jaël, la femme de Héber le Kénien. En effet, il y avait paix entre Jabin, le roi de Hatsor, et la famille de Héber le Kénien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Jaël sortit à la rencontre de Sisera et lui dit: «Entre, mon seigneur, entre chez moi, n''aie pas peur.» Il entra chez elle dans la tente et elle le cacha sous une couverture. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il lui dit: «Donne-moi, je t''en prie, un peu d''eau à boire, car j''ai soif.» Elle ouvrit l''outre du lait, lui donna à boire et le couvrit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il lui dit encore: «Tiens-toi à l''entrée de la tente et, si l''on vient te demander: ‘Y a-t-il quelqu''un ici?’ tu répondras: ‘Non.’» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jaël, la femme de Héber, s''empara d''un pieu de la tente, prit un marteau, s''approcha de lui doucement et lui enfonça le pieu dans la tempe. Il pénétra jusqu''en terre. Sisera se trouvait alors dans un état de sommeil profond, car il était accablé de fatigue, et il mourut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Voici que survint Barak, qui était à la poursuite de Sisera. Jaël sortit à sa rencontre et lui dit: «Viens, je vais te montrer l''homme que tu cherches.» Il entra chez elle et vit Sisera étendu mort, le pieu dans la tempe.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ce jour-là, Dieu humilia Jabin, le roi de Canaan, devant les Israélites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: La pression des Israélites se fit de plus en plus lourde contre Jabin, le roi de Canaan, jusqu'à son extermination.
