document_id: ACT.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Guérison d'un boiteux
  - type: text
    content: 'Il était trois heures de l''après-midi, l''heure de la prière. Pierre et Jean montaient ensemble au temple. '
  '10':
  - type: text
    content: 'Ils reconnaissaient que c''était bien celui qui était assis à la Belle porte du temple pour demander l''aumône, et ils furent remplis d''étonnement et de stupeur à cause de ce qui lui était arrivé. '
  '11':
  - type: text
    content: Comme il ne quittait pas Pierre et Jean, tout le peuple stupéfait accourut vers eux au portique appelé portique de Salomon.
  '12':
  - type: text
    content: 'Quand Pierre vit cela, il dit au peuple: «Israélites, pourquoi vous étonnez-vous de ce qui s''est passé? Pourquoi fixez-vous les regards sur nous, comme si c''était par notre propre puissance ou par notre piété que nous avions fait marcher cet homme? '
  '13':
  - type: text
    content: Le Dieu d'Abraham, d'Isaac et de Jacob, le Dieu de nos ancêtres
  - type: note
    content: 'Le Dieu… ancêtres: présentation de Dieu tirée d''Exode 3.6, 15.'
  - type: text
    content: ', a révélé la gloire de son serviteur Jésus, celui que vous avez fait arrêter et renié devant Pilate qui était, lui, d''avis de le relâcher. '
  '14':
  - type: text
    content: 'Mais vous, vous avez renié celui qui était saint et juste et vous avez demandé qu''on vous accorde la grâce d''un meurtrier. '
  '15':
  - type: text
    content: 'Vous avez fait mourir le Prince de la vie que Dieu a ressuscité, nous en sommes témoins. '
  '16':
  - type: text
    content: C'est par la foi en son nom qu'il a raffermi celui que vous voyez et connaissez; c'est la foi en Jésus qui a donné à cet homme une entière guérison en présence de vous tous.
  '17':
  - type: text
    content: '»Maintenant, frères, je sais que vous avez agi par ignorance, tout comme vos chefs. '
  '18':
  - type: text
    content: Mais Dieu a ainsi accompli ce qu'il avait annoncé d'avance par la bouche de tous les prophètes, à savoir que son Messie devait souffrir.
  '19':
  - type: text
    content: '»Changez donc d''attitude et convertissez-vous pour que vos péchés soient effacés! '
  '2':
  - type: text
    content: 'Or, on amenait un homme boiteux de naissance, qu''on installait tous les jours à la porte du temple appelée la Belle pour qu''il demande l''aumône à ceux qui entraient dans le temple. '
  '20':
  - type: text
    content: 'Alors, des temps de rafraîchissement viendront de la part du Seigneur et il enverra le Messie qui vous était destiné, Jésus. '
  '21':
  - type: text
    content: 'C''est lui que le ciel doit accueillir jusqu''au moment de la restauration totale dont Dieu a parlé depuis longtemps par la bouche de [tous] ses saints prophètes. '
  '22':
  - type: text
    content: 'Moïse a dit [en effet à nos ancêtres]: '
  - type: text
    content: Le Seigneur votre Dieu fera surgir pour vous, parmi vos frères, un prophète comme moi; vous l'écouterez dans tout ce qu'il vous dira;
  - type: text
    content: ' '
  '23':
  - type: text
    content: celui qui n'écoutera pas ce prophète sera exterminé du milieu du peuple.
  - type: note
    content: 'Le Seigneur… peuple: renvoi à Deutéronome 18.15, 19.'
  - type: text
    content: ' '
  '24':
  - type: text
    content: 'Tous les prophètes qui ont parlé depuis Samuel et ses successeurs ont aussi annoncé ces jours-là. '
  '25':
  - type: text
    content: 'Vous êtes les héritiers des prophètes et de l''alliance que Dieu a conclue avec nos ancêtres en disant à Abraham: '
  - type: text
    content: Toutes les familles de la terre seront bénies en ta descendance.
  - type: note
    content: 'Toutes les familles… descendance: citation de Genèse 22.18.'
  - type: text
    content: ' '
  '26':
  - type: text
    content: C'est pour vous d'abord que Dieu a fait surgir son serviteur [Jésus], et il l'a envoyé pour vous bénir en détournant chacun de vous de ses mauvaises actions.»
  '3':
  - type: text
    content: 'Voyant Pierre et Jean sur le point d''y entrer, cet homme leur demanda l''aumône. '
  '4':
  - type: text
    content: 'Pierre, accompagné de Jean, fixa les yeux sur lui et dit: «Regarde-nous!» '
  '5':
  - type: text
    content: 'Il les regardait attentivement, s''attendant à recevoir d''eux quelque chose. '
  '6':
  - type: text
    content: 'Alors Pierre lui dit: «Je n''ai ni argent ni or, mais ce que j''ai, je te le donne: au nom de Jésus-Christ de Nazareth, [lève-toi et] marche!» '
  '7':
  - type: text
    content: 'Puis il le prit par la main droite et le fit lever. Ses pieds et ses chevilles s''affermirent immédiatement; '
  '8':
  - type: text
    content: d'un bond il fut debout et se mit à marcher. Il entra avec eux dans le temple, marchant, sautant et adressant des louanges à Dieu.
  '9':
  - type: text
    content: 'Tout le peuple le vit marcher et louer Dieu. '
