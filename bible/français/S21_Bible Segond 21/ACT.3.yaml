document_id: ACT.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guérison d'un boiteux
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Il était trois heures de l''après-midi, l''heure de la prière. Pierre et Jean montaient ensemble au temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Or, on amenait un homme boiteux de naissance, qu''on installait tous les jours à la porte du temple appelée la Belle pour qu''il demande l''aumône à ceux qui entraient dans le temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Voyant Pierre et Jean sur le point d''y entrer, cet homme leur demanda l''aumône. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pierre, accompagné de Jean, fixa les yeux sur lui et dit: «Regarde-nous!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il les regardait attentivement, s''attendant à recevoir d''eux quelque chose. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Alors Pierre lui dit: «Je n''ai ni argent ni or, mais ce que j''ai, je te le donne: au nom de Jésus-Christ de Nazareth, [lève-toi et] marche!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Puis il le prit par la main droite et le fit lever. Ses pieds et ses chevilles s''affermirent immédiatement; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: d'un bond il fut debout et se mit à marcher. Il entra avec eux dans le temple, marchant, sautant et adressant des louanges à Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tout le peuple le vit marcher et louer Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils reconnaissaient que c''était bien celui qui était assis à la Belle porte du temple pour demander l''aumône, et ils furent remplis d''étonnement et de stupeur à cause de ce qui lui était arrivé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Comme il ne quittait pas Pierre et Jean, tout le peuple stupéfait accourut vers eux au portique appelé portique de Salomon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Quand Pierre vit cela, il dit au peuple: «Israélites, pourquoi vous étonnez-vous de ce qui s''est passé? Pourquoi fixez-vous les regards sur nous, comme si c''était par notre propre puissance ou par notre piété que nous avions fait marcher cet homme? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Le Dieu d'Abraham, d'Isaac et de Jacob, le Dieu de nos ancêtres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le Dieu… ancêtres: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: présentation de Dieu tirée d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 3.6
      metadata:
        usfm: EXO.3.6
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15'
      metadata:
        usfm: EXO.3.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', a révélé la gloire de son serviteur Jésus, celui que vous avez fait arrêter et renié devant Pilate qui était, lui, d''avis de le relâcher. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais vous, vous avez renié celui qui était saint et juste et vous avez demandé qu''on vous accorde la grâce d''un meurtrier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Vous avez fait mourir le Prince de la vie que Dieu a ressuscité, nous en sommes témoins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: C'est par la foi en son nom qu'il a raffermi celui que vous voyez et connaissez; c'est la foi en Jésus qui a donné à cet homme une entière guérison en présence de vous tous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '»Maintenant, frères, je sais que vous avez agi par ignorance, tout comme vos chefs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mais Dieu a ainsi accompli ce qu'il avait annoncé d'avance par la bouche de tous les prophètes, à savoir que son Messie devait souffrir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '»Changez donc d''attitude et convertissez-vous pour que vos péchés soient effacés! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Alors, des temps de rafraîchissement viendront de la part du Seigneur et il enverra le Messie qui vous était destiné, Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'C''est lui que le ciel doit accueillir jusqu''au moment de la restauration totale dont Dieu a parlé depuis longtemps par la bouche de [tous] ses saints prophètes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Moïse a dit [en effet à nos ancêtres]: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Le Seigneur votre Dieu fera surgir pour vous, parmi vos frères, un prophète comme moi; vous l'écouterez dans tout ce qu'il vous dira;
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: celui qui n'écoutera pas ce prophète sera exterminé du milieu du peuple.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.22-23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le Seigneur… peuple: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'renvoi à '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 18.15
      metadata:
        usfm: DEU.18.15
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19'
      metadata:
        usfm: DEU.18.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tous les prophètes qui ont parlé depuis Samuel et ses successeurs ont aussi annoncé ces jours-là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Vous êtes les héritiers des prophètes et de l''alliance que Dieu a conclue avec nos ancêtres en disant à Abraham: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Toutes les familles de la terre seront bénies en ta descendance.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Toutes les familles… descendance: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Genèse 22.18
      metadata:
        usfm: GEN.22.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: C'est pour vous d'abord que Dieu a fait surgir son serviteur [Jésus], et il l'a envoyé pour vous bénir en détournant chacun de vous de ses mauvaises actions.»
