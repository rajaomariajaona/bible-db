document_id: DAN.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Daniel et les souverains
  - type: heading
    content: 1.1–6.29
  - type: heading
    content: Arrivée de Daniel à Babylone
  - type: text
    content: 'La troisième année du règne de Jojakim sur Juda, Nebucadnetsar, le roi de Babylone, marcha contre Jérusalem et en fit le siège. '
  '10':
  - type: text
    content: 'Ce dernier dit à Daniel: «Je redoute mon seigneur le roi. C''est lui qui a fixé ce que vous devez manger et boire. Pourquoi devrait-il vous voir arborer une moins bonne mine que les jeunes gens de votre âge? A cause de vous, je risquerais ma tête auprès du roi.» '
  '11':
  - type: text
    content: 'Daniel dit alors à l''intendant auquel le chef des eunuques avait confié la responsabilité de lui-même, Hanania, Mishaël et Azaria: '
  '12':
  - type: text
    content: '«Fais donc un essai avec tes serviteurs pendant 10 jours: qu''on nous donne des légumes à manger et de l''eau à boire. '
  '13':
  - type: text
    content: 'On examinera ensuite devant toi notre apparence et celle des jeunes gens qui mangent les plats servis à la table du roi. Puis, agis avec nous, tes serviteurs, en fonction de ce que tu auras constaté.» '
  '14':
  - type: text
    content: 'Il leur accorda ce qu''ils demandaient et fit un essai avec eux pendant 10 jours. '
  '15':
  - type: text
    content: 'Au bout de 10 jours, ils avaient meilleure apparence et avaient pris plus de poids que tous les jeunes gens qui mangeaient les plats servis à la table du roi. '
  '16':
  - type: text
    content: L'intendant retirait donc les plats et le vin qui leur étaient destinés, et il leur donnait des légumes à la place.
  '17':
  - type: text
    content: 'Dieu accorda à ces quatre jeunes gens de la connaissance et de la perspicacité dans tout ce qui concernait la littérature et la sagesse. De plus, Daniel était capable d''expliquer toutes les visions et tous les rêves. '
  '18':
  - type: text
    content: 'Au moment fixé par le roi pour qu''on les lui amène, le chef des eunuques les présenta à Nebucadnetsar. '
  '19':
  - type: text
    content: 'Le roi discuta avec eux et, parmi tous ces jeunes gens, il n''en trouva aucun comme Daniel, Hanania, Mishaël et Azaria. Ils furent donc admis au service du roi. '
  '2':
  - type: text
    content: Le Seigneur livra entre ses mains Jojakim, le roi de Juda, et une partie des ustensiles de la maison de Dieu. Nebucadnetsar emporta les ustensiles dans le pays de Shinear, dans le temple de son dieu; il les mit dans la maison du trésor de son dieu.
  '20':
  - type: text
    content: 'Sur tous les sujets qui réclamaient de la sagesse et de l''intelligence et sur lesquels il les interrogeait, le roi les trouvait dix fois supérieurs à tous les magiciens et astrologues présents dans tout son royaume. '
  '21':
  - type: text
    content: Telle fut la situation de Daniel jusqu'à la première année de règne de Cyrus.
  '3':
  - type: text
    content: 'Le roi donna l''ordre à Ashpenaz, le responsable de ses eunuques, de faire venir quelques Israélites de sang royal ou de famille noble. '
  '4':
  - type: text
    content: 'Ce devaient être de jeunes garçons sans défaut physique, beaux, doués de perspicacité et de sagesse, instruits et intelligents, capables de servir dans le palais du roi. On leur enseignerait la littérature et la langue des Babyloniens. '
  '5':
  - type: text
    content: 'Le roi leur réservait pour chaque jour une portion des plats servis à sa table et du vin de ses banquets. Il voulait les former pendant trois ans à la suite desquels ils entreraient à son service. '
  '6':
  - type: text
    content: 'Il y avait parmi eux des Judéens: Daniel, Hanania, Mishaël et Azaria. '
  '7':
  - type: text
    content: 'Le chef des eunuques leur donna des noms: à Daniel celui de Beltshatsar, à Hanania celui de Shadrak, à Mishaël celui de Méshak, et à Azaria celui d''Abed-Nego.'
  '8':
  - type: text
    content: 'Daniel prit la ferme décision de ne pas se souiller en consommant les plats servis à la table du roi et le vin de ses banquets. Il demanda alors au chef des eunuques de ne pas l''obliger à se souiller. '
  '9':
  - type: text
    content: 'Dieu gagna à Daniel la bienveillance et la compassion du chef des eunuques. '
