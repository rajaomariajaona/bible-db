document_id: PSA.50,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les sacrifices agréables à Dieu
  - type: text
    content: Psaume d'Asaph.
  - type: text
    content: Dieu, Dieu, l'Eternel, parle et convoque la terre
  - type: text
    content: du lever du soleil jusqu'à son coucher.
  '10':
  - type: text
    content: car tous les animaux des forêts sont à moi,
  - type: text
    content: toutes les bêtes des montagnes par milliers.
  '11':
  - type: text
    content: Je connais tous les oiseaux des montagnes,
  - type: text
    content: et tous les animaux sauvages m'appartiennent.
  '12':
  - type: text
    content: Si j'avais faim, je ne te le dirais pas,
  - type: text
    content: car le monde est à moi, avec tout ce qu'il contient.
  '13':
  - type: text
    content: Est-ce que je mange la viande des taureaux?
  - type: text
    content: Est-ce que je bois le sang des boucs?
  '14':
  - type: text
    content: Offre en sacrifice à Dieu ta reconnaissance,
  - type: text
    content: et accomplis tes vœux envers le Très-Haut.
  '15':
  - type: text
    content: 'Fais appel à moi quand tu es dans la détresse:'
  - type: text
    content: je te délivrerai, et tu m'honoreras.»
  '16':
  - type: text
    content: 'Dieu dit au méchant:'
  - type: text
    content: «Quoi donc! Tu énumères mes prescriptions
  - type: text
    content: et tu as mon alliance à la bouche,
  '17':
  - type: text
    content: toi qui détestes l'instruction
  - type: text
    content: et qui rejettes mes paroles derrière toi!
  '18':
  - type: text
    content: Si tu vois un voleur, tu te plais en sa compagnie,
  - type: text
    content: et tu prends place avec les adultères.
  '19':
  - type: text
    content: Tu livres ta bouche au mal,
  - type: text
    content: et ta langue est un tissu de tromperies.
  '2':
  - type: text
    content: De Sion, beauté parfaite,
  - type: text
    content: Dieu resplendit.
  '20':
  - type: text
    content: Si tu t'assieds, c'est pour parler contre ton frère,
  - type: text
    content: pour dénigrer le fils de ta mère.
  '21':
  - type: text
    content: Voilà ce que tu as fait et, parce que je n'ai rien dit,
  - type: text
    content: tu t'es imaginé que je te ressemblais;
  - type: text
    content: mais je vais te reprendre et tout mettre sous tes yeux.
  '22':
  - type: text
    content: Comprenez donc bien cela, vous qui oubliez Dieu,
  - type: text
    content: de peur que je ne vous déchire sans personne pour vous délivrer.
  '23':
  - type: text
    content: Celui qui offre en sacrifice sa reconnaissance m'honore,
  - type: text
    content: et à celui qui veille sur sa conduite
  - type: text
    content: je ferai voir le salut de Dieu.»
  '3':
  - type: text
    content: Il vient, notre Dieu, il ne reste pas silencieux;
  - type: text
    content: devant lui est un feu dévorant,
  - type: text
    content: autour de lui une violente tempête.
  '4':
  - type: text
    content: Il convoque le ciel en haut,
  - type: text
    content: 'il convoque aussi la terre, pour le jugement de son peuple:'
  '5':
  - type: text
    content: «Rassemblez-moi mes fidèles,
  - type: text
    content: ceux qui ont fait alliance avec moi par un sacrifice!»
  '6':
  - type: text
    content: Le ciel proclamera sa justice,
  - type: text
    content: 'car c''est Dieu qui est juge. '
  - type: text
    content: – Pause.
  '7':
  - type: text
    content: «Ecoute, mon peuple, et je parlerai,
  - type: text
    content: Israël, et je t'avertirai.
  - type: text
    content: Je suis Dieu, ton Dieu.
  '8':
  - type: text
    content: 'Ce n''est pas pour tes sacrifices que je te fais des reproches:'
  - type: text
    content: tes holocaustes sont constamment devant moi.
  '9':
  - type: text
    content: Je ne prendrai pas un taureau dans ta maison,
  - type: text
    content: ni des boucs dans tes bergeries,
