document_id: PSA.50,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les sacrifices agréables à Dieu
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Psaume d'Asaph.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu, Dieu, l'Eternel, parle et convoque la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du lever du soleil jusqu'à son coucher.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: car tous les animaux des forêts sont à moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toutes les bêtes des montagnes par milliers.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Je connais tous les oiseaux des montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous les animaux sauvages m'appartiennent.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Si j'avais faim, je ne te le dirais pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car le monde est à moi, avec tout ce qu'il contient.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Est-ce que je mange la viande des taureaux?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-ce que je bois le sang des boucs?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Offre en sacrifice à Dieu ta reconnaissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et accomplis tes vœux envers le Très-Haut.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Fais appel à moi quand tu es dans la détresse:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te délivrerai, et tu m'honoreras.»
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dieu dit au méchant:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Quoi donc! Tu énumères mes prescriptions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu as mon alliance à la bouche,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: toi qui détestes l'instruction
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui rejettes mes paroles derrière toi!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Si tu vois un voleur, tu te plais en sa compagnie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu prends place avec les adultères.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tu livres ta bouche au mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ta langue est un tissu de tromperies.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: De Sion, beauté parfaite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu resplendit.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Si tu t'assieds, c'est pour parler contre ton frère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour dénigrer le fils de ta mère.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Voilà ce que tu as fait et, parce que je n'ai rien dit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu t'es imaginé que je te ressemblais;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais je vais te reprendre et tout mettre sous tes yeux.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Comprenez donc bien cela, vous qui oubliez Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de peur que je ne vous déchire sans personne pour vous délivrer.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Celui qui offre en sacrifice sa reconnaissance m'honore,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et à celui qui veille sur sa conduite
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ferai voir le salut de Dieu.»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Il vient, notre Dieu, il ne reste pas silencieux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: devant lui est un feu dévorant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: autour de lui une violente tempête.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Il convoque le ciel en haut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'il convoque aussi la terre, pour le jugement de son peuple:'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: «Rassemblez-moi mes fidèles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui ont fait alliance avec moi par un sacrifice!»
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Le ciel proclamera sa justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'car c''est Dieu qui est juge. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: «Ecoute, mon peuple, et je parlerai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël, et je t'avertirai.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis Dieu, ton Dieu.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ce n''est pas pour tes sacrifices que je te fais des reproches:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tes holocaustes sont constamment devant moi.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Je ne prendrai pas un taureau dans ta maison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni des boucs dans tes bergeries,
