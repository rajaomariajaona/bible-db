document_id: JOB.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Intervention n° 2 d'Eliphaz
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Eliphaz de Théman prit la parole et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Le sage répliquerait-il par un savoir qui n'est que du vent?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Se gonflerait-il la poitrine du vent d'est?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Est-ce par des paroles sans intérêt qu'il se défendrait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: par des propos qui ne servent à rien?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Toi, tu détruis même la crainte de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu supprimes toute réflexion devant Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: En effet, c'est ta faute qui dirige ta bouche
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu adoptes le langage des hommes rusés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: »Ce n'est pas moi, ce sont tes propres paroles qui te condamnent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce sont tes propres lèvres qui témoignent contre toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Es-tu le premier homme?
- type: usfm
  marker: q1
  children:
  - type: text
    text: As-tu été mis au monde avant les collines?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: As-tu entendu ce qui se dit dans le conseil secret de Dieu?
- type: usfm
  marker: q1
  children:
  - type: text
    text: As-tu confisqué la sagesse?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Que sais-tu que nous ne sachions pas?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quelle connaissance as-tu que nous n'ayons pas?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il y a parmi nous des hommes aux cheveux blancs, des vieillards
- type: usfm
  marker: q1
  children:
  - type: text
    text: plus riches de jours que ton père.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: »Considères-tu comme insignifiantes les consolations de Dieu
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les paroles qu'on t'adresse avec douceur?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Où ton cœur t'entraîne-t-il
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que signifie ce clignement de tes yeux?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Oui, c'est contre Dieu que tu tournes ta colère
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que tu avances de pareils discours!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: »Qu'est donc l'homme pour prétendre à la pureté?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui est né de la femme pourrait-il être juste?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Si Dieu ne peut faire confiance à ses saints
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Saints: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: probable allusion aux anges de Dieu.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: si le ciel n'est pas pur devant lui,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ce sera d'autant moins le cas de cet être abominable et corrompu
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'est l'homme, qui boit l'injustice comme de l'eau!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '»Je vais te parler: écoute-moi!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je raconterai ce que j'ai vu,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ce que les sages ont fait connaître,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce qu'ils ont révélé après l'avoir appris de leurs ancêtres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Le pays leur appartenait alors à eux seuls
- type: usfm
  marker: q1
  children:
  - type: text
    text: et aucun étranger n'était encore venu se mêler à eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: »Le méchant passe dans l'angoisse tous les jours de sa vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toutes les années qui sont réservées à l'homme violent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Un bruit terrifiant retentit à ses oreilles:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: au beau milieu de la paix, le dévastateur fond sur lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Il ne peut espérer échapper aux ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lui qui est guetté par l'épée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Il court çà et là pour chercher du pain, mais où en trouver?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il sait que le jour des ténèbres l'attend.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: La détresse et l'angoisse le tourmentent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles l'assaillent comme un roi prêt à combattre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: car il a levé la main contre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a défié le Tout-Puissant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Il a eu l'audace de foncer contre lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: abrité par l'épaisseur de ses boucliers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Il avait le visage tout potelé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les flancs chargés d'embonpoint,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: mais il habitera des villes détruites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des maisons abandonnées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur le point de tomber en ruine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Il ne s'enrichira plus, sa fortune ne se relèvera pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa prospérité ne couvrira plus la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Il ne pourra s'écarter des ténèbres;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les flammes dessécheront ses rejetons
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Dieu l'écartera par le souffle de sa bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Qu'il ne se fie pas à la fausseté! Il serait déçu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car c'est la fausseté qui serait sa récompense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Cela s'accomplira avant la fin de ses jours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son rameau ne verdira plus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Comme une vigne, il se dépouillera de ses fruits encore verts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un olivier il fera tomber ses fleurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: »La compagnie de l'impie est stérile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le feu dévorera les tentes des hommes corrompus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Il conçoit le mal et donne naissance au malheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il couve la tromperie.»
