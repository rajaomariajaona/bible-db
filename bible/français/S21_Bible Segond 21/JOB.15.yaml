document_id: JOB.15,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Intervention n° 2 d'Eliphaz
  - type: text
    content: 'Eliphaz de Théman prit la parole et dit:'
  '10':
  - type: text
    content: Il y a parmi nous des hommes aux cheveux blancs, des vieillards
  - type: text
    content: plus riches de jours que ton père.
  '11':
  - type: text
    content: »Considères-tu comme insignifiantes les consolations de Dieu
  - type: text
    content: et les paroles qu'on t'adresse avec douceur?
  '12':
  - type: text
    content: Où ton cœur t'entraîne-t-il
  - type: text
    content: et que signifie ce clignement de tes yeux?
  '13':
  - type: text
    content: Oui, c'est contre Dieu que tu tournes ta colère
  - type: text
    content: et que tu avances de pareils discours!
  '14':
  - type: text
    content: »Qu'est donc l'homme pour prétendre à la pureté?
  - type: text
    content: Celui qui est né de la femme pourrait-il être juste?
  '15':
  - type: text
    content: Si Dieu ne peut faire confiance à ses saints
  - type: note
    content: 'Saints: probable allusion aux anges de Dieu.'
  - type: text
    content: ','
  - type: text
    content: si le ciel n'est pas pur devant lui,
  '16':
  - type: text
    content: ce sera d'autant moins le cas de cet être abominable et corrompu
  - type: text
    content: qu'est l'homme, qui boit l'injustice comme de l'eau!
  '17':
  - type: text
    content: '»Je vais te parler: écoute-moi!'
  - type: text
    content: Je raconterai ce que j'ai vu,
  '18':
  - type: text
    content: ce que les sages ont fait connaître,
  - type: text
    content: ce qu'ils ont révélé après l'avoir appris de leurs ancêtres.
  '19':
  - type: text
    content: Le pays leur appartenait alors à eux seuls
  - type: text
    content: et aucun étranger n'était encore venu se mêler à eux.
  '2':
  - type: text
    content: «Le sage répliquerait-il par un savoir qui n'est que du vent?
  - type: text
    content: Se gonflerait-il la poitrine du vent d'est?
  '20':
  - type: text
    content: »Le méchant passe dans l'angoisse tous les jours de sa vie,
  - type: text
    content: toutes les années qui sont réservées à l'homme violent.
  '21':
  - type: text
    content: 'Un bruit terrifiant retentit à ses oreilles:'
  - type: text
    content: au beau milieu de la paix, le dévastateur fond sur lui.
  '22':
  - type: text
    content: Il ne peut espérer échapper aux ténèbres,
  - type: text
    content: lui qui est guetté par l'épée.
  '23':
  - type: text
    content: Il court çà et là pour chercher du pain, mais où en trouver?
  - type: text
    content: Il sait que le jour des ténèbres l'attend.
  '24':
  - type: text
    content: La détresse et l'angoisse le tourmentent,
  - type: text
    content: elles l'assaillent comme un roi prêt à combattre,
  '25':
  - type: text
    content: car il a levé la main contre Dieu,
  - type: text
    content: il a défié le Tout-Puissant.
  '26':
  - type: text
    content: Il a eu l'audace de foncer contre lui,
  - type: text
    content: abrité par l'épaisseur de ses boucliers.
  '27':
  - type: text
    content: Il avait le visage tout potelé,
  - type: text
    content: les flancs chargés d'embonpoint,
  '28':
  - type: text
    content: mais il habitera des villes détruites,
  - type: text
    content: des maisons abandonnées,
  - type: text
    content: sur le point de tomber en ruine.
  '29':
  - type: text
    content: Il ne s'enrichira plus, sa fortune ne se relèvera pas,
  - type: text
    content: sa prospérité ne couvrira plus la terre.
  '3':
  - type: text
    content: Est-ce par des paroles sans intérêt qu'il se défendrait,
  - type: text
    content: par des propos qui ne servent à rien?
  '30':
  - type: text
    content: Il ne pourra s'écarter des ténèbres;
  - type: text
    content: les flammes dessécheront ses rejetons
  - type: text
    content: et Dieu l'écartera par le souffle de sa bouche.
  '31':
  - type: text
    content: Qu'il ne se fie pas à la fausseté! Il serait déçu,
  - type: text
    content: car c'est la fausseté qui serait sa récompense.
  '32':
  - type: text
    content: Cela s'accomplira avant la fin de ses jours,
  - type: text
    content: et son rameau ne verdira plus.
  '33':
  - type: text
    content: Comme une vigne, il se dépouillera de ses fruits encore verts,
  - type: text
    content: comme un olivier il fera tomber ses fleurs.
  '34':
  - type: text
    content: »La compagnie de l'impie est stérile,
  - type: text
    content: et le feu dévorera les tentes des hommes corrompus.
  '35':
  - type: text
    content: Il conçoit le mal et donne naissance au malheur,
  - type: text
    content: il couve la tromperie.»
  '4':
  - type: text
    content: Toi, tu détruis même la crainte de Dieu,
  - type: text
    content: tu supprimes toute réflexion devant Dieu.
  '5':
  - type: text
    content: En effet, c'est ta faute qui dirige ta bouche
  - type: text
    content: et tu adoptes le langage des hommes rusés.
  '6':
  - type: text
    content: »Ce n'est pas moi, ce sont tes propres paroles qui te condamnent,
  - type: text
    content: ce sont tes propres lèvres qui témoignent contre toi.
  '7':
  - type: text
    content: Es-tu le premier homme?
  - type: text
    content: As-tu été mis au monde avant les collines?
  '8':
  - type: text
    content: As-tu entendu ce qui se dit dans le conseil secret de Dieu?
  - type: text
    content: As-tu confisqué la sagesse?
  '9':
  - type: text
    content: Que sais-tu que nous ne sachions pas?
  - type: text
    content: Quelle connaissance as-tu que nous n'ayons pas?
