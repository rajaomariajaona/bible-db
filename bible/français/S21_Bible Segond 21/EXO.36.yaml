document_id: EXO.36,152
type_code: fra
verses:
  '1':
  - type: text
    content: »Betsaleel, Oholiab et tous les artisans en qui l'Eternel a mis de l'habileté et de l'intelligence pour savoir faire ces travaux réaliseront les objets destinés au service du sanctuaire en se conformant à tous les commandements de l'Eternel.»
  '10':
  - type: text
    content: 'On attacha 5 de ces tapis ensemble, les 5 autres furent aussi attachés ensemble. '
  '11':
  - type: text
    content: 'On fit des lacets bleus sur le bord du tapis terminant le premier assemblage et on fit de même sur le bord du tapis terminant le second assemblage. '
  '12':
  - type: text
    content: 'On mit 50 lacets au premier tapis et 50 lacets sur le bord du tapis terminant le second assemblage; ces lacets correspondaient les uns aux autres. '
  '13':
  - type: text
    content: On fit 50 agrafes en or et l'on attacha les tapis l'un à l'autre avec les agrafes. Ainsi le tabernacle forma un tout.
  '14':
  - type: text
    content: 'On fit des tapis en poil de chèvre destinés à servir de tenture par-dessus le tabernacle. On en fit 11. '
  '15':
  - type: text
    content: 'La longueur d''un tapis était de 15 mètres et sa largeur de 2 mètres. La mesure était la même pour les 11 tapis. '
  '16':
  - type: text
    content: 'On attacha 5 de ces tapis, puis les 6 autres à part. '
  '17':
  - type: text
    content: 'On mit 50 lacets sur le bord du tapis terminant un assemblage et 50 lacets sur le bord du tapis du second assemblage. '
  '18':
  - type: text
    content: On fit 50 agrafes en bronze pour assembler la tenture afin qu'elle forme un tout.
  '19':
  - type: text
    content: On fit pour la tenture une couverture de peaux de béliers teintes en rouge et une couverture de peaux de dauphins, qui devaient être mises par-dessus.
  - type: heading
    content: Les planches et leurs bases
  '2':
  - type: text
    content: 'Moïse appela Betsaleel, Oholiab et tous les artisans dans l''esprit desquels l''Eternel avait mis de l''habileté, tous ceux dont le cœur était disposé à s''appliquer à ce travail pour le réaliser. '
  '20':
  - type: text
    content: 'On fit les planches pour le tabernacle. Elles étaient en bois d''acacia et placées debout. '
  '21':
  - type: text
    content: 'La longueur d''une planche était de 5 mètres et sa largeur de 75 centimètres. '
  '22':
  - type: text
    content: 'Il y avait pour chaque planche 2 tenons parallèles. On fit de même pour toutes les planches du tabernacle. '
  '23':
  - type: text
    content: 'On fit 20 planches pour le côté sud du tabernacle. '
  '24':
  - type: text
    content: 'On fit 40 bases en argent à placer sous les 20 planches, 2 bases sous chaque planche correspondant à ses deux tenons. '
  '25':
  - type: text
    content: 'On fit 20 planches pour le deuxième côté du tabernacle, le côté nord, '
  '26':
  - type: text
    content: 'ainsi que leurs 40 bases en argent, 2 bases sous chaque planche. '
  '27':
  - type: text
    content: 'On fit 6 planches pour le fond du tabernacle, le côté ouest. '
  '28':
  - type: text
    content: 'On fit 2 planches pour les angles du tabernacle dans le fond. '
  '29':
  - type: text
    content: 'Elles étaient doubles depuis le bas et bien reliées à leur sommet par un anneau; on fit de même pour les deux planches placées aux deux angles. '
  '3':
  - type: text
    content: 'Ils prirent devant Moïse toutes les offrandes qu''avaient apportées les Israélites pour faire les objets destinés au service du sanctuaire. Chaque matin, on apportait encore à Moïse des offrandes volontaires. '
  '30':
  - type: text
    content: 'Il y avait ainsi 8 planches avec leurs bases en argent, soit 16 bases, 2 sous chaque planche. '
  '31':
  - type: text
    content: 'On fit 5 barres en bois d''acacia pour les planches de l''un des côtés du tabernacle, '
  '32':
  - type: text
    content: '5 barres pour les planches du deuxième côté du tabernacle et 5 barres pour les planches du côté du tabernacle qui formait le fond, orienté à l''ouest. '
  '33':
  - type: text
    content: 'On fit la barre du milieu pour traverser les planches d''une extrémité à l''autre. '
  '34':
  - type: text
    content: On couvrit les planches d'or, on fit leurs anneaux destinés à recevoir les barres en or et l'on couvrit les barres d'or.
  - type: heading
    content: Les deux voiles
  '35':
  - type: text
    content: 'On fit le voile en fil bleu, pourpre et cramoisi et en fin lin retors. On le fit selon l''art du brodeur et l''on y représenta des chérubins. '
  '36':
  - type: text
    content: On fit pour lui 4 colonnes en acacia et on les couvrit d'or. Elles avaient des crochets en or et l'on fondit pour elles 4 bases en argent.
  '37':
  - type: text
    content: 'On fit pour l''entrée de la tente un rideau en fil bleu, pourpre et cramoisi et en fin lin retors. C''était un ouvrage de broderie. '
  '38':
  - type: text
    content: On fit ses 5 colonnes et leurs crochets et l'on couvrit d'or leurs chapiteaux et leurs tringles. Leurs 5 bases étaient en bronze.
  '4':
  - type: text
    content: 'Alors tous les hommes habiles qui réalisaient tous les travaux du sanctuaire quittèrent chacun l''ouvrage auquel ils étaient occupés '
  '5':
  - type: text
    content: 'et vinrent dire à Moïse: «Le peuple apporte beaucoup plus qu''il ne faut pour réaliser le travail que l''Eternel a ordonné de faire.» '
  '6':
  - type: text
    content: 'Moïse fit faire cette proclamation dans le camp: «Que personne, homme ou femme, ne prépare plus d''offrandes pour le sanctuaire.» On empêcha ainsi le peuple d''en apporter. '
  '7':
  - type: text
    content: Les objets préparés suffisaient pour tous les travaux à réaliser, et il y en avait même trop.
  - type: heading
    content: Les couvertures
  '8':
  - type: text
    content: 'Tous les artisans qui accomplirent ce travail firent le tabernacle avec 10 tapis en fin lin retors et en fil bleu, pourpre et cramoisi. On y représenta des chérubins selon l''art du brodeur. '
  '9':
  - type: text
    content: 'La longueur d''un tapis était de 14 mètres et sa largeur de 2 mètres. La mesure était la même pour tous les tapis. '
