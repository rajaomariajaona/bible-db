document_id: ISA.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guerre contre Juda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A l''époque d''Achaz, fils de Jotham, lui-même fils d''Ozias qui était roi de Juda, Retsin, le roi de Syrie, monta avec Pékach, le fils de Remalia, le roi d''Israël, contre Jérusalem pour l''attaquer, mais sans parvenir à s''en emparer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'On annonça aux membres de la dynastie de David: «Les Syriens ont pris position sur le territoire d''Ephraïm.» Achaz et son peuple en furent tout secoués, comme les arbres de la forêt lorsqu''ils sont secoués par le vent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors l''Eternel dit à Esaïe: «Sors donc à la rencontre d''Achaz avec ton fils Shear-Jashub, au bout de l''aqueduc du réservoir supérieur, sur la route du champ du teinturier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tu lui diras:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Sois tranquille, n'aie pas peur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que ton cœur ne se trouble pas
- type: usfm
  marker: q1
  children:
  - type: text
    text: devant ces deux bouts de bois fumants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: devant la colère de Retsin et de la Syrie ainsi que du fils de Remalia!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ne sois pas troublé parce que la Syrie a décidé de te faire du mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'parce qu''Ephraïm et le fils de Remalia disent:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Montons contre Juda, semons-y la panique,
- type: usfm
  marker: q1
  children:
  - type: text
    text: frayons-nous un passage
- type: usfm
  marker: q1
  children:
  - type: text
    text: et proclamons-y roi le fils de Tabeel.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '»Voici ce que dit le Seigneur, l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cela ne se produira pas, cela n'aura pas lieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Certes, Damas est la capitale de la Syrie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Retsin le souverain de Damas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais d'ici 65 ans
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ephraïm ne sera plus un peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Samarie est la capitale d'Ephraïm
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le fils de Remalia le souverain de Samarie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si vous ne croyez pas, vous ne subsisterez pas.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Annonce de la naissance d'Emmanuel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L''Eternel dit encore à Achaz: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '«Demande pour toi un signe à l''Eternel, ton Dieu! Demande-le, que ce soit dans les plus extrêmes profondeurs ou les lieux les plus élevés.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Achaz répondit: «Je ne demanderai rien, je ne provoquerai pas l''Eternel.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Esaïe dit alors:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ecoutez donc, membres de la dynastie de David!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est-ce trop peu pour vous de fatiguer les hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que vous abusiez encore de la patience de mon Dieu?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Voilà pourquoi c''est le Seigneur lui-même qui vous donnera un signe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '*la vierge sera enceinte,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle mettra au monde un fils
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'appellera Emmanuel.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La vierge… Emmanuel: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 1.23
      metadata:
        usfm: MAT.1.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Emmanuel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ': littéralement Dieu avec nous.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il se nourrira de lait caillé et de miel
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu'à ce qu'il sache rejeter le mal et choisir le bien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Cependant, avant que l'enfant sache rejeter le mal et choisir le bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le territoire dont tu redoutes les deux rois sera abandonné.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jugement d'Israël
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: »Par l'intermédiaire du roi d'Assyrie, l'Eternel fera venir sur toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur ton peuple et sur ta famille
- type: usfm
  marker: q1
  children:
  - type: text
    text: des jours tels qu'il n'y en a jamais eu de pareils
- type: usfm
  marker: q1
  children:
  - type: text
    text: depuis le jour où Ephraïm s'est séparé de Juda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ce jour-là, l'Eternel sifflera les mouches
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui sont dans le delta du Nil en Egypte
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les abeilles qui se trouvent en Assyrie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Elles viendront et se poseront toutes dans les pentes abruptes des torrents
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les fentes des rochers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur tous les buissons et les pâturages.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: »Ce jour-là, à l'aide d'un rasoir loué
- type: usfm
  marker: q1
  children:
  - type: text
    text: de l'autre côté de l'Euphrate, à l'aide du roi d'Assyrie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Seigneur rasera la tête et les poils des jambes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il coupera même la barbe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Il arrivera, ce jour-là, que
- type: usfm
  marker: q1
  children:
  - type: text
    text: chacun élèvera une jeune vache et deux brebis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Il y aura une telle abondance de lait
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'on se nourrira de lait caillé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, c'est de lait caillé et de miel que se nourriront
- type: usfm
  marker: q1
  children:
  - type: text
    text: toutes les personnes restées dans le pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: »Ce jour-là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout endroit où il y aura 1000 ceps de vigne
- type: usfm
  marker: q1
  children:
  - type: text
    text: d'une valeur de 1000 pièces d'argent
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sera livré aux ronces et aux buissons épineux:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: on y viendra muni de flèches et d'un arc,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tout le pays ne sera que ronces et buissons épineux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Aucune des montagnes que l'on cultivait avec la bêche
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne sera plus fréquentée, par crainte des ronces et des buissons épineux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On y lâchera le bœuf et le petit bétail foulera son sol.»
