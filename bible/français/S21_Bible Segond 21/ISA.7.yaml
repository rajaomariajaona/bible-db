document_id: ISA.7,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Guerre contre Juda
  - type: text
    content: 'A l''époque d''Achaz, fils de Jotham, lui-même fils d''Ozias qui était roi de Juda, Retsin, le roi de Syrie, monta avec Pékach, le fils de Remalia, le roi d''Israël, contre Jérusalem pour l''attaquer, mais sans parvenir à s''en emparer. '
  '10':
  - type: text
    content: 'L''Eternel dit encore à Achaz: '
  '11':
  - type: text
    content: '«Demande pour toi un signe à l''Eternel, ton Dieu! Demande-le, que ce soit dans les plus extrêmes profondeurs ou les lieux les plus élevés.» '
  '12':
  - type: text
    content: 'Achaz répondit: «Je ne demanderai rien, je ne provoquerai pas l''Eternel.»'
  '13':
  - type: text
    content: 'Esaïe dit alors:'
  - type: text
    content: «Ecoutez donc, membres de la dynastie de David!
  - type: text
    content: Est-ce trop peu pour vous de fatiguer les hommes,
  - type: text
    content: pour que vous abusiez encore de la patience de mon Dieu?
  '14':
  - type: text
    content: 'Voilà pourquoi c''est le Seigneur lui-même qui vous donnera un signe:'
  - type: text
    content: '*la vierge sera enceinte,'
  - type: text
    content: elle mettra au monde un fils
  - type: text
    content: et l'appellera Emmanuel.
  - type: note
    content: 'La vierge… Emmanuel: cité en Matthieu 1.23. Emmanuel: littéralement Dieu avec nous.'
  '15':
  - type: text
    content: Il se nourrira de lait caillé et de miel
  - type: text
    content: jusqu'à ce qu'il sache rejeter le mal et choisir le bien.
  '16':
  - type: text
    content: Cependant, avant que l'enfant sache rejeter le mal et choisir le bien,
  - type: text
    content: le territoire dont tu redoutes les deux rois sera abandonné.
  - type: heading
    content: Jugement d'Israël
  '17':
  - type: text
    content: »Par l'intermédiaire du roi d'Assyrie, l'Eternel fera venir sur toi,
  - type: text
    content: sur ton peuple et sur ta famille
  - type: text
    content: des jours tels qu'il n'y en a jamais eu de pareils
  - type: text
    content: depuis le jour où Ephraïm s'est séparé de Juda.
  '18':
  - type: text
    content: Ce jour-là, l'Eternel sifflera les mouches
  - type: text
    content: qui sont dans le delta du Nil en Egypte
  - type: text
    content: et les abeilles qui se trouvent en Assyrie.
  '19':
  - type: text
    content: Elles viendront et se poseront toutes dans les pentes abruptes des torrents
  - type: text
    content: et les fentes des rochers,
  - type: text
    content: sur tous les buissons et les pâturages.
  '2':
  - type: text
    content: 'On annonça aux membres de la dynastie de David: «Les Syriens ont pris position sur le territoire d''Ephraïm.» Achaz et son peuple en furent tout secoués, comme les arbres de la forêt lorsqu''ils sont secoués par le vent.'
  '20':
  - type: text
    content: »Ce jour-là, à l'aide d'un rasoir loué
  - type: text
    content: de l'autre côté de l'Euphrate, à l'aide du roi d'Assyrie,
  - type: text
    content: le Seigneur rasera la tête et les poils des jambes;
  - type: text
    content: il coupera même la barbe.
  '21':
  - type: text
    content: Il arrivera, ce jour-là, que
  - type: text
    content: chacun élèvera une jeune vache et deux brebis.
  '22':
  - type: text
    content: Il y aura une telle abondance de lait
  - type: text
    content: qu'on se nourrira de lait caillé.
  - type: text
    content: Oui, c'est de lait caillé et de miel que se nourriront
  - type: text
    content: toutes les personnes restées dans le pays.
  '23':
  - type: text
    content: »Ce jour-là,
  - type: text
    content: tout endroit où il y aura 1000 ceps de vigne
  - type: text
    content: d'une valeur de 1000 pièces d'argent
  - type: text
    content: 'sera livré aux ronces et aux buissons épineux:'
  '24':
  - type: text
    content: on y viendra muni de flèches et d'un arc,
  - type: text
    content: car tout le pays ne sera que ronces et buissons épineux.
  '25':
  - type: text
    content: Aucune des montagnes que l'on cultivait avec la bêche
  - type: text
    content: ne sera plus fréquentée, par crainte des ronces et des buissons épineux.
  - type: text
    content: On y lâchera le bœuf et le petit bétail foulera son sol.»
  '3':
  - type: text
    content: 'Alors l''Eternel dit à Esaïe: «Sors donc à la rencontre d''Achaz avec ton fils Shear-Jashub, au bout de l''aqueduc du réservoir supérieur, sur la route du champ du teinturier. '
  '4':
  - type: text
    content: 'Tu lui diras:'
  - type: text
    content: ‘Sois tranquille, n'aie pas peur
  - type: text
    content: et que ton cœur ne se trouble pas
  - type: text
    content: devant ces deux bouts de bois fumants,
  - type: text
    content: devant la colère de Retsin et de la Syrie ainsi que du fils de Remalia!
  '5':
  - type: text
    content: Ne sois pas troublé parce que la Syrie a décidé de te faire du mal,
  - type: text
    content: 'parce qu''Ephraïm et le fils de Remalia disent:'
  '6':
  - type: text
    content: Montons contre Juda, semons-y la panique,
  - type: text
    content: frayons-nous un passage
  - type: text
    content: et proclamons-y roi le fils de Tabeel.’
  '7':
  - type: text
    content: '»Voici ce que dit le Seigneur, l''Eternel:'
  - type: text
    content: Cela ne se produira pas, cela n'aura pas lieu.
  '8':
  - type: text
    content: Certes, Damas est la capitale de la Syrie
  - type: text
    content: et Retsin le souverain de Damas,
  - type: text
    content: mais d'ici 65 ans
  - type: text
    content: Ephraïm ne sera plus un peuple.
  '9':
  - type: text
    content: Samarie est la capitale d'Ephraïm
  - type: text
    content: et le fils de Remalia le souverain de Samarie.
  - type: text
    content: Si vous ne croyez pas, vous ne subsisterez pas.»
  - type: heading
    content: Annonce de la naissance d'Emmanuel
