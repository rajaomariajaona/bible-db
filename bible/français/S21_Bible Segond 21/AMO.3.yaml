document_id: AMO.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Raisons du jugement
  - type: heading
    content: 3.1–6.14
  - type: heading
    content: Impossibilité d'échapper au jugement
  - type: text
    content: Ecoutez cette parole que l'Eternel prononce contre vous, Israélites,
  - type: text
    content: contre toute la famille que j'ai fait sortir d'Egypte!
  '10':
  - type: text
    content: Ils ne savent pas agir avec droiture, déclare l'Eternel,
  - type: text
    content: ils entassent dans leurs palais le produit de la violence et du pillage.
  '11':
  - type: text
    content: 'C''est pourquoi, voici ce que dit le Seigneur, l''Eternel:'
  - type: text
    content: L'ennemi encerclera le pays,
  - type: text
    content: il détruira ta force
  - type: text
    content: et tes palais seront pillés.
  '12':
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: Le berger ne peut arracher à la gueule du lion
  - type: text
    content: que deux jambes ou un bout d'oreille,
  - type: text
    content: et c'est ainsi que seront sauvés les Israélites qui sont assis dans Samarie
  - type: text
    content: à l'angle d'un lit et sur des tapis de Damas.
  '13':
  - type: text
    content: Ecoutez et donnez cet avertissement à la communauté de Jacob,
  - type: text
    content: 'déclare le Seigneur, l''Eternel, le Dieu de l''univers:'
  '14':
  - type: text
    content: Le jour où je punirai Israël pour ses transgressions,
  - type: text
    content: je frapperai sur les autels de Béthel;
  - type: text
    content: les cornes de l'autel seront brisées
  - type: text
    content: et tomberont par terre.
  '15':
  - type: text
    content: Je démolirai les maisons d'hiver et les maisons d'été;
  - type: text
    content: les palais d'ivoire seront détruits,
  - type: text
    content: les maisons des grands disparaîtront, déclare l'Eternel.
  '2':
  - type: text
    content: Je vous ai choisis, vous seuls parmi toutes les familles de la terre,
  - type: text
    content: c'est pourquoi j'interviendrai contre vous pour tous vos péchés.
  '3':
  - type: text
    content: Deux hommes marchent-ils ensemble
  - type: text
    content: sans s'être concertés?
  '4':
  - type: text
    content: Le lion rugit-il dans la forêt
  - type: text
    content: sans avoir une proie?
  - type: text
    content: Le lionceau pousse-t-il des cris du fond de sa tanière
  - type: text
    content: sans avoir fait une capture?
  '5':
  - type: text
    content: L'oiseau tombe-t-il dans le filet qui est à terre
  - type: text
    content: sans qu'il y ait d'appât?
  - type: text
    content: Le filet se referme-t-il
  - type: text
    content: sans avoir pris quelque chose?
  '6':
  - type: text
    content: Sonne-t-on de la trompette dans une ville
  - type: text
    content: sans que le peuple soit dans l'épouvante?
  - type: text
    content: Arrive-t-il un malheur dans une ville
  - type: text
    content: sans que l'Eternel en soit l'auteur?
  '7':
  - type: text
    content: En effet, le Seigneur, l'Eternel, ne fait rien
  - type: text
    content: sans avoir révélé son secret à ses serviteurs les prophètes.
  '8':
  - type: text
    content: 'Le lion rugit: qui ne serait pas effrayé?'
  - type: text
    content: 'Le Seigneur, l''Eternel, parle: qui pourrait ne pas prophétiser?'
  '9':
  - type: text
    content: Faites retentir votre voix dans les palais d'Asdod
  - type: text
    content: et dans les palais de l'Egypte,
  - type: text
    content: 'et dites: «Rassemblez-vous sur les montagnes de Samarie'
  - type: text
    content: et voyez quel immense désordre au milieu d'elle,
  - type: text
    content: quelles violences s'y commettent!»
