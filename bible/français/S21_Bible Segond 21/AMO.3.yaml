document_id: AMO.3
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Raisons du jugement
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 3.1–6.14
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Impossibilité d'échapper au jugement
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ecoutez cette parole que l'Eternel prononce contre vous, Israélites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: contre toute la famille que j'ai fait sortir d'Egypte!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je vous ai choisis, vous seuls parmi toutes les familles de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est pourquoi j'interviendrai contre vous pour tous vos péchés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Deux hommes marchent-ils ensemble
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans s'être concertés?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Le lion rugit-il dans la forêt
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans avoir une proie?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le lionceau pousse-t-il des cris du fond de sa tanière
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans avoir fait une capture?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: L'oiseau tombe-t-il dans le filet qui est à terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans qu'il y ait d'appât?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le filet se referme-t-il
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans avoir pris quelque chose?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Sonne-t-on de la trompette dans une ville
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans que le peuple soit dans l'épouvante?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Arrive-t-il un malheur dans une ville
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans que l'Eternel en soit l'auteur?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: En effet, le Seigneur, l'Eternel, ne fait rien
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans avoir révélé son secret à ses serviteurs les prophètes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le lion rugit: qui ne serait pas effrayé?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Le Seigneur, l''Eternel, parle: qui pourrait ne pas prophétiser?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Faites retentir votre voix dans les palais d'Asdod
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dans les palais de l'Egypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et dites: «Rassemblez-vous sur les montagnes de Samarie'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et voyez quel immense désordre au milieu d'elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quelles violences s'y commettent!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ils ne savent pas agir avec droiture, déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils entassent dans leurs palais le produit de la violence et du pillage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'C''est pourquoi, voici ce que dit le Seigneur, l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'ennemi encerclera le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il détruira ta force
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tes palais seront pillés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le berger ne peut arracher à la gueule du lion
- type: usfm
  marker: q1
  children:
  - type: text
    text: que deux jambes ou un bout d'oreille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c'est ainsi que seront sauvés les Israélites qui sont assis dans Samarie
- type: usfm
  marker: q1
  children:
  - type: text
    text: à l'angle d'un lit et sur des tapis de Damas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ecoutez et donnez cet avertissement à la communauté de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'déclare le Seigneur, l''Eternel, le Dieu de l''univers:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Le jour où je punirai Israël pour ses transgressions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je frapperai sur les autels de Béthel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les cornes de l'autel seront brisées
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tomberont par terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je démolirai les maisons d'hiver et les maisons d'été;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les palais d'ivoire seront détruits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les maisons des grands disparaîtront, déclare l'Eternel.
