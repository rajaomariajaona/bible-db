document_id: 2CH.34
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne de Josias
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Josias avait 8 ans lorsqu''il devint roi et il régna 31 ans à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il fit ce qui est droit aux yeux de l'Eternel et il marcha sur les voies de son ancêtre David, il ne s'en écarta ni à droite ni à gauche.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'La huitième année de son règne, alors qu''il était encore jeune, il commença à rechercher le Dieu de son ancêtre David, et la douzième année il commença à purifier Juda et Jérusalem des hauts lieux, des poteaux sacrés, des sculptures sacrées et des idoles en métal fondu. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'On démolit en sa présence les autels des Baals et il abattit les piliers consacrés au soleil qui étaient dessus; il brisa les poteaux sacrés, les sculptures sacrées et les idoles en métal fondu et les réduisit en poussière, et il dispersa la poussière sur les tombeaux de ceux qui leur avaient offert des sacrifices. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Quant aux ossements des prêtres, il les brûla sur leurs autels. C''est ainsi qu''il purifia Juda et Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Dans les villes de Manassé, d''Ephraïm, de Siméon et même de Nephthali, et dans leurs ruines tout autour, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: il démolit les autels, mit en pièces les poteaux sacrés et les sculptures sacrées jusqu'à les réduire en poussière, et il abattit tous les piliers consacrés au soleil dans tout le pays d'Israël. Puis il retourna à Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'La dix-huitième année de son règne, après avoir purifié le pays et le temple, il envoya Shaphan, fils d''Atsalia, Maaséja, chef de la ville, et l''archiviste Joach, fils de Joachaz, réparer la maison de l''Eternel, son Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ils allèrent trouver le grand-prêtre Hilkija et lui donnèrent l''argent qui avait été apporté dans la maison de Dieu. Les Lévites gardiens des portes l''avaient reçu de Manassé, d''Ephraïm et de tout le reste d''Israël ainsi que de tout Juda et Benjamin et des habitants de Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'On le confia aux responsables chargés des travaux dans la maison de l''Eternel. Et ils l''employèrent pour ceux qui travaillaient aux réparations de la maison de l''Eternel, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'pour les charpentiers et les maçons, pour les achats de pierres de taille et de bois destiné aux poutres et à la charpente des bâtiments que les rois de Juda avaient détruits. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ces hommes agirent avec honnêteté dans leur travail. Ils étaient sous la surveillance de Jachath et Abdias, Lévites issus des descendants de Merari, de Zacharie et Meshullam, qui descendaient des Kehathites, et de tous les Lévites qui étaient d''habiles musiciens. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ils étaient responsables des porteurs et dirigeaient tous les ouvriers occupés aux divers travaux. Il y avait aussi des Lévites secrétaires, commissaires et portiers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Au moment où l''on sortait l''argent qui avait été apporté dans la maison de l''Eternel, le prêtre Hilkija trouva le livre de la loi de l''Eternel transmise par Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Alors Hilkija prit la parole et dit à Shaphan, le secrétaire: «J''ai trouvé le livre de la loi dans la maison de l''Eternel.» Hilkija donna le livre à Shaphan. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Shaphan apporta le livre au roi lorsqu''il lui fit son rapport. Il dit: «Tes serviteurs ont fait tout ce qui leur a été ordonné. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ils ont ramassé l''argent qui se trouvait dans la maison de l''Eternel et l''ont confié aux inspecteurs et aux ouvriers.» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Puis Shaphan, le secrétaire, annonça au roi: «Le prêtre Hilkija m''a donné un livre.» Et Shaphan le lut devant le roi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'A l''écoute des paroles de la loi, le roi déchira ses habits. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ensuite, il donna cet ordre à Hilkija, à Achikam, fils de Shaphan, à Abdon, fils de Michée, à Shaphan, le secrétaire, et à son propre serviteur Asaja: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: «Allez consulter l'Eternel pour moi et pour ce qui reste en Israël et en Juda au sujet des paroles de ce livre qu'on a trouvé. En effet, elle doit être grande, la colère de l'Eternel prête à se déverser sur nous, parce que nos ancêtres n'ont pas respecté la parole de l'Eternel et ne se sont pas conformés à tout ce qui est prescrit dans ce livre.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hilkija et les hommes désignés par le roi allèrent trouver la prophétesse Hulda. Elle était la femme de Shallum, le gardien des habits, le fils de Thokehath et petit-fils de Hasra, et elle habitait à Jérusalem, dans la ville neuve. Une fois qu''ils lui eurent parlé comme convenu, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'elle leur répondit: «Voici ce que dit l''Eternel, le Dieu d''Israël: Annoncez à l''homme qui vous a envoyés vers moi: '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '‘Voici ce que dit l''Eternel: Je vais faire venir des malheurs sur cet endroit et sur ses habitants, conformément à toutes les malédictions écrites dans le livre qu''on a lu devant le roi de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Puisqu''ils m''ont abandonné et qu''ils ont offert des parfums à d''autres dieux afin de m''irriter par tout ce que leurs mains faisaient, ma colère se déverse sur cet endroit et elle ne s''éteindra pas.’ '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Mais vous annoncerez au roi de Juda qui vous a envoyés pour consulter l''Eternel: ‘Voici ce que dit l''Eternel, le Dieu d''Israël, au sujet des paroles que tu as entendues: '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ton cœur a été touché, tu t''es humilié devant Dieu en entendant ses paroles contre cet endroit et contre ses habitants, tu t''es humilié devant moi, tu as déchiré tes habits et tu as pleuré devant moi. Eh bien, moi aussi, j''ai entendu cela, dit l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Je te ferai rejoindre tes ancêtres, tu rejoindras la tombe dans la paix et tes yeux ne verront pas tous les malheurs que je ferai venir sur cet endroit et sur ses habitants.’» Ils rapportèrent cette réponse au roi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Le roi fit rassembler tous les anciens de Juda et de Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Puis il monta à la maison de l''Eternel avec tous les hommes de Juda et les habitants de Jérusalem, les prêtres, les Lévites et tout le peuple, du plus grand au plus petit. Il lut devant eux toutes les paroles du livre de l''alliance qu''on avait trouvé dans la maison de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Le roi se tenait sur son estrade et il conclut une alliance devant l''Eternel: il s''engagea à suivre l''Eternel et à respecter ses commandements, ses instructions et ses prescriptions de tout son cœur et de toute son âme, en appliquant les paroles de l''alliance écrites dans ce livre. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Il fit s'engager dans l'alliance tous ceux qui se trouvaient à Jérusalem et en Benjamin, et les habitants de Jérusalem se conformèrent à l'alliance de Dieu, du Dieu de leurs ancêtres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Josias fit disparaître toutes les pratiques abominables de tous les territoires appartenant aux Israélites, et il obligea tous ceux qui se trouvaient en Israël à servir l'Eternel, leur Dieu. Pendant toute sa vie, ils ne se détournèrent pas de l'Eternel, le Dieu de leurs ancêtres.
