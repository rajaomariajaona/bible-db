document_id: 2CH.34,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Règne de Josias
  - type: text
    content: 'Josias avait 8 ans lorsqu''il devint roi et il régna 31 ans à Jérusalem. '
  '10':
  - type: text
    content: 'On le confia aux responsables chargés des travaux dans la maison de l''Eternel. Et ils l''employèrent pour ceux qui travaillaient aux réparations de la maison de l''Eternel, '
  '11':
  - type: text
    content: 'pour les charpentiers et les maçons, pour les achats de pierres de taille et de bois destiné aux poutres et à la charpente des bâtiments que les rois de Juda avaient détruits. '
  '12':
  - type: text
    content: 'Ces hommes agirent avec honnêteté dans leur travail. Ils étaient sous la surveillance de Jachath et Abdias, Lévites issus des descendants de Merari, de Zacharie et Meshullam, qui descendaient des Kehathites, et de tous les Lévites qui étaient d''habiles musiciens. '
  '13':
  - type: text
    content: Ils étaient responsables des porteurs et dirigeaient tous les ouvriers occupés aux divers travaux. Il y avait aussi des Lévites secrétaires, commissaires et portiers.
  '14':
  - type: text
    content: 'Au moment où l''on sortait l''argent qui avait été apporté dans la maison de l''Eternel, le prêtre Hilkija trouva le livre de la loi de l''Eternel transmise par Moïse. '
  '15':
  - type: text
    content: 'Alors Hilkija prit la parole et dit à Shaphan, le secrétaire: «J''ai trouvé le livre de la loi dans la maison de l''Eternel.» Hilkija donna le livre à Shaphan. '
  '16':
  - type: text
    content: 'Shaphan apporta le livre au roi lorsqu''il lui fit son rapport. Il dit: «Tes serviteurs ont fait tout ce qui leur a été ordonné. '
  '17':
  - type: text
    content: 'Ils ont ramassé l''argent qui se trouvait dans la maison de l''Eternel et l''ont confié aux inspecteurs et aux ouvriers.» '
  '18':
  - type: text
    content: 'Puis Shaphan, le secrétaire, annonça au roi: «Le prêtre Hilkija m''a donné un livre.» Et Shaphan le lut devant le roi.'
  '19':
  - type: text
    content: 'A l''écoute des paroles de la loi, le roi déchira ses habits. '
  '2':
  - type: text
    content: Il fit ce qui est droit aux yeux de l'Eternel et il marcha sur les voies de son ancêtre David, il ne s'en écarta ni à droite ni à gauche.
  '20':
  - type: text
    content: 'Ensuite, il donna cet ordre à Hilkija, à Achikam, fils de Shaphan, à Abdon, fils de Michée, à Shaphan, le secrétaire, et à son propre serviteur Asaja: '
  '21':
  - type: text
    content: «Allez consulter l'Eternel pour moi et pour ce qui reste en Israël et en Juda au sujet des paroles de ce livre qu'on a trouvé. En effet, elle doit être grande, la colère de l'Eternel prête à se déverser sur nous, parce que nos ancêtres n'ont pas respecté la parole de l'Eternel et ne se sont pas conformés à tout ce qui est prescrit dans ce livre.»
  '22':
  - type: text
    content: 'Hilkija et les hommes désignés par le roi allèrent trouver la prophétesse Hulda. Elle était la femme de Shallum, le gardien des habits, le fils de Thokehath et petit-fils de Hasra, et elle habitait à Jérusalem, dans la ville neuve. Une fois qu''ils lui eurent parlé comme convenu, '
  '23':
  - type: text
    content: 'elle leur répondit: «Voici ce que dit l''Eternel, le Dieu d''Israël: Annoncez à l''homme qui vous a envoyés vers moi: '
  '24':
  - type: text
    content: '‘Voici ce que dit l''Eternel: Je vais faire venir des malheurs sur cet endroit et sur ses habitants, conformément à toutes les malédictions écrites dans le livre qu''on a lu devant le roi de Juda. '
  '25':
  - type: text
    content: 'Puisqu''ils m''ont abandonné et qu''ils ont offert des parfums à d''autres dieux afin de m''irriter par tout ce que leurs mains faisaient, ma colère se déverse sur cet endroit et elle ne s''éteindra pas.’ '
  '26':
  - type: text
    content: 'Mais vous annoncerez au roi de Juda qui vous a envoyés pour consulter l''Eternel: ‘Voici ce que dit l''Eternel, le Dieu d''Israël, au sujet des paroles que tu as entendues: '
  '27':
  - type: text
    content: 'Ton cœur a été touché, tu t''es humilié devant Dieu en entendant ses paroles contre cet endroit et contre ses habitants, tu t''es humilié devant moi, tu as déchiré tes habits et tu as pleuré devant moi. Eh bien, moi aussi, j''ai entendu cela, dit l''Eternel. '
  '28':
  - type: text
    content: Je te ferai rejoindre tes ancêtres, tu rejoindras la tombe dans la paix et tes yeux ne verront pas tous les malheurs que je ferai venir sur cet endroit et sur ses habitants.’» Ils rapportèrent cette réponse au roi.
  '29':
  - type: text
    content: 'Le roi fit rassembler tous les anciens de Juda et de Jérusalem. '
  '3':
  - type: text
    content: 'La huitième année de son règne, alors qu''il était encore jeune, il commença à rechercher le Dieu de son ancêtre David, et la douzième année il commença à purifier Juda et Jérusalem des hauts lieux, des poteaux sacrés, des sculptures sacrées et des idoles en métal fondu. '
  '30':
  - type: text
    content: 'Puis il monta à la maison de l''Eternel avec tous les hommes de Juda et les habitants de Jérusalem, les prêtres, les Lévites et tout le peuple, du plus grand au plus petit. Il lut devant eux toutes les paroles du livre de l''alliance qu''on avait trouvé dans la maison de l''Eternel. '
  '31':
  - type: text
    content: 'Le roi se tenait sur son estrade et il conclut une alliance devant l''Eternel: il s''engagea à suivre l''Eternel et à respecter ses commandements, ses instructions et ses prescriptions de tout son cœur et de toute son âme, en appliquant les paroles de l''alliance écrites dans ce livre. '
  '32':
  - type: text
    content: Il fit s'engager dans l'alliance tous ceux qui se trouvaient à Jérusalem et en Benjamin, et les habitants de Jérusalem se conformèrent à l'alliance de Dieu, du Dieu de leurs ancêtres.
  '33':
  - type: text
    content: Josias fit disparaître toutes les pratiques abominables de tous les territoires appartenant aux Israélites, et il obligea tous ceux qui se trouvaient en Israël à servir l'Eternel, leur Dieu. Pendant toute sa vie, ils ne se détournèrent pas de l'Eternel, le Dieu de leurs ancêtres.
  '4':
  - type: text
    content: 'On démolit en sa présence les autels des Baals et il abattit les piliers consacrés au soleil qui étaient dessus; il brisa les poteaux sacrés, les sculptures sacrées et les idoles en métal fondu et les réduisit en poussière, et il dispersa la poussière sur les tombeaux de ceux qui leur avaient offert des sacrifices. '
  '5':
  - type: text
    content: 'Quant aux ossements des prêtres, il les brûla sur leurs autels. C''est ainsi qu''il purifia Juda et Jérusalem. '
  '6':
  - type: text
    content: 'Dans les villes de Manassé, d''Ephraïm, de Siméon et même de Nephthali, et dans leurs ruines tout autour, '
  '7':
  - type: text
    content: il démolit les autels, mit en pièces les poteaux sacrés et les sculptures sacrées jusqu'à les réduire en poussière, et il abattit tous les piliers consacrés au soleil dans tout le pays d'Israël. Puis il retourna à Jérusalem.
  '8':
  - type: text
    content: 'La dix-huitième année de son règne, après avoir purifié le pays et le temple, il envoya Shaphan, fils d''Atsalia, Maaséja, chef de la ville, et l''archiviste Joach, fils de Joachaz, réparer la maison de l''Eternel, son Dieu. '
  '9':
  - type: text
    content: 'Ils allèrent trouver le grand-prêtre Hilkija et lui donnèrent l''argent qui avait été apporté dans la maison de Dieu. Les Lévites gardiens des portes l''avaient reçu de Manassé, d''Ephraïm et de tout le reste d''Israël ainsi que de tout Juda et Benjamin et des habitants de Jérusalem. '
