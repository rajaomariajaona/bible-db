document_id: PSA.81
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Invitation à écouter le Seigneur
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur, sur la guitthith. D'Asaph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Chantez avec allégresse vers Dieu, notre force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: poussez des cris de joie vers le Dieu de Jacob!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Entonnez un chant, faites résonner le tambourin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la harpe mélodieuse et le luth!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Sonnez de la trompette au début du mois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la pleine lune, pour le jour de notre fête!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: En effet, c'est une prescription pour Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une règle pour le Dieu de Jacob.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il en a fait une instruction pour Joseph,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand il s'est attaqué à l'Egypte.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'J''entends un langage qui m''est inconnu:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: «J'ai déchargé son épaule du fardeau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses mains ont lâché la corbeille.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tu as crié dans la détresse, et je t'ai délivré;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je t'ai répondu au cœur de l'orage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'je t''ai mis à l''épreuve près des eaux de Meriba. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ecoute, mon peuple, et je t'avertirai!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël, si seulement tu m'écoutais!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Qu'il n'y ait au milieu de toi aucun autre dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne te prosterne pas devant des dieux étrangers!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '*Je suis l''Eternel, ton Dieu, qui t''ai fait sortir d''Egypte.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '81.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je suis… d''Egypte: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 5.6
      metadata:
        usfm: DEU.5.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ouvre ta bouche, et je la remplirai!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mais mon peuple ne m'a pas écouté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël n'a pas voulu de moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Alors je les ai livrés aux penchants de leur cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ont suivi leurs propres projets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Si seulement mon peuple m'écoutait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si seulement Israël marchait dans mes voies!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: En un instant j'humilierais leurs ennemis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je tournerais ma main contre leurs adversaires.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ceux qui détestent l'Eternel le flatteraient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le bonheur d'Israël durerait toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Je le nourrirais du meilleur blé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je le rassasierais de miel sauvage.
