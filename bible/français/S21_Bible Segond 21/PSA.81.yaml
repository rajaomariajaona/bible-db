document_id: PSA.81,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Invitation à écouter le Seigneur
  - type: text
    content: Au chef de chœur, sur la guitthith. D'Asaph.
  '10':
  - type: text
    content: Qu'il n'y ait au milieu de toi aucun autre dieu!
  - type: text
    content: Ne te prosterne pas devant des dieux étrangers!
  '11':
  - type: text
    content: '*Je suis l''Eternel, ton Dieu, qui t''ai fait sortir d''Egypte.'
  - type: note
    content: 'Je suis… d''Egypte: voir Deutéronome 5.6.'
  - type: text
    content: Ouvre ta bouche, et je la remplirai!
  '12':
  - type: text
    content: Mais mon peuple ne m'a pas écouté,
  - type: text
    content: Israël n'a pas voulu de moi.
  '13':
  - type: text
    content: Alors je les ai livrés aux penchants de leur cœur,
  - type: text
    content: et ils ont suivi leurs propres projets.
  '14':
  - type: text
    content: Si seulement mon peuple m'écoutait,
  - type: text
    content: si seulement Israël marchait dans mes voies!
  '15':
  - type: text
    content: En un instant j'humilierais leurs ennemis,
  - type: text
    content: je tournerais ma main contre leurs adversaires.
  '16':
  - type: text
    content: Ceux qui détestent l'Eternel le flatteraient,
  - type: text
    content: et le bonheur d'Israël durerait toujours.
  '17':
  - type: text
    content: Je le nourrirais du meilleur blé,
  - type: text
    content: et je le rassasierais de miel sauvage.
  '2':
  - type: text
    content: Chantez avec allégresse vers Dieu, notre force,
  - type: text
    content: poussez des cris de joie vers le Dieu de Jacob!
  '3':
  - type: text
    content: Entonnez un chant, faites résonner le tambourin,
  - type: text
    content: la harpe mélodieuse et le luth!
  '4':
  - type: text
    content: Sonnez de la trompette au début du mois,
  - type: text
    content: à la pleine lune, pour le jour de notre fête!
  '5':
  - type: text
    content: En effet, c'est une prescription pour Israël,
  - type: text
    content: une règle pour le Dieu de Jacob.
  '6':
  - type: text
    content: Il en a fait une instruction pour Joseph,
  - type: text
    content: quand il s'est attaqué à l'Egypte.
  - type: text
    content: 'J''entends un langage qui m''est inconnu:'
  '7':
  - type: text
    content: «J'ai déchargé son épaule du fardeau,
  - type: text
    content: et ses mains ont lâché la corbeille.»
  '8':
  - type: text
    content: Tu as crié dans la détresse, et je t'ai délivré;
  - type: text
    content: je t'ai répondu au cœur de l'orage,
  - type: text
    content: 'je t''ai mis à l''épreuve près des eaux de Meriba. '
  - type: text
    content: – Pause.
  '9':
  - type: text
    content: Ecoute, mon peuple, et je t'avertirai!
  - type: text
    content: Israël, si seulement tu m'écoutais!
