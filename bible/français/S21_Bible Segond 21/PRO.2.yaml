document_id: PRO.2,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les bienfaits de la sagesse
  - type: text
    content: Mon fils, si tu fais bon accueil à mes paroles
  - type: text
    content: et si tu retiens mes commandements
  '10':
  - type: text
    content: En effet, la sagesse viendra dans ton cœur
  - type: text
    content: et la connaissance fera les délices de ton âme;
  '11':
  - type: text
    content: la réflexion veillera sur toi,
  - type: text
    content: l'intelligence te protégera,
  '12':
  - type: text
    content: et ainsi tu seras délivré de la voie du mal,
  - type: text
    content: de l'homme qui tient des discours pervers,
  '13':
  - type: text
    content: de ceux qui abandonnent les sentiers de la droiture
  - type: text
    content: pour marcher dans des chemins ténébreux,
  '14':
  - type: text
    content: qui éprouvent de la joie à faire le mal,
  - type: text
    content: qui mettent leur plaisir dans la perversité,
  '15':
  - type: text
    content: qui suivent des sentiers tortueux
  - type: text
    content: et des routes pleines de détours.
  '16':
  - type: text
    content: Tu seras délivré de la femme étrangère,
  - type: text
    content: de l'inconnue au discours flatteur
  '17':
  - type: text
    content: qui abandonne l'ami de sa jeunesse
  - type: text
    content: et qui oublie l'alliance de son Dieu.
  '18':
  - type: text
    content: En effet, sa maison penche vers la mort
  - type: text
    content: 'et sa route conduit vers les défunts:'
  '19':
  - type: text
    content: aucun de ceux qui vont vers elle ne revient
  - type: text
    content: ni ne retrouve les sentiers de la vie.
  '2':
  - type: text
    content: en prêtant une oreille attentive à la sagesse
  - type: text
    content: et en inclinant ton cœur à l'intelligence,
  '20':
  - type: text
    content: Tu marcheras ainsi sur la voie des hommes de bien,
  - type: text
    content: tu persévéreras sur les sentiers des justes.
  '21':
  - type: text
    content: En effet, les hommes droits habiteront le pays,
  - type: text
    content: les hommes intègres y resteront,
  '22':
  - type: text
    content: tandis que les méchants seront exclus du pays,
  - type: text
    content: les infidèles en seront arrachés.
  '3':
  - type: text
    content: oui, si tu appelles la sagesse
  - type: text
    content: et si tu élèves ta voix vers l'intelligence,
  '4':
  - type: text
    content: si tu la cherches comme l'argent,
  - type: text
    content: si tu la poursuis comme un trésor,
  '5':
  - type: text
    content: alors tu comprendras ce qu'est la crainte de l'Eternel
  - type: text
    content: et tu trouveras la connaissance de Dieu.
  '6':
  - type: text
    content: En effet, c'est l'Eternel qui donne la sagesse,
  - type: text
    content: c'est de sa bouche que sortent la connaissance et l'intelligence.
  '7':
  - type: text
    content: Il tient le succès en réserve pour les hommes droits,
  - type: text
    content: il est un bouclier pour ceux qui marchent dans l'intégrité.
  '8':
  - type: text
    content: Il protège ainsi les sentiers de l'équité
  - type: text
    content: et il veille sur le chemin de ses fidèles.
  '9':
  - type: text
    content: Tu comprendras alors ce que sont la justice, l'équité,
  - type: text
    content: la droiture, toutes les routes qui mènent au bien.
