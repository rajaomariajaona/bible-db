document_id: PRO.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les bienfaits de la sagesse
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mon fils, si tu fais bon accueil à mes paroles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et si tu retiens mes commandements
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: en prêtant une oreille attentive à la sagesse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et en inclinant ton cœur à l'intelligence,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: oui, si tu appelles la sagesse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et si tu élèves ta voix vers l'intelligence,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: si tu la cherches comme l'argent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si tu la poursuis comme un trésor,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: alors tu comprendras ce qu'est la crainte de l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu trouveras la connaissance de Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: En effet, c'est l'Eternel qui donne la sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est de sa bouche que sortent la connaissance et l'intelligence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il tient le succès en réserve pour les hommes droits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est un bouclier pour ceux qui marchent dans l'intégrité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il protège ainsi les sentiers de l'équité
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il veille sur le chemin de ses fidèles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tu comprendras alors ce que sont la justice, l'équité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la droiture, toutes les routes qui mènent au bien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: En effet, la sagesse viendra dans ton cœur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la connaissance fera les délices de ton âme;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: la réflexion veillera sur toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'intelligence te protégera,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: et ainsi tu seras délivré de la voie du mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de l'homme qui tient des discours pervers,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: de ceux qui abandonnent les sentiers de la droiture
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour marcher dans des chemins ténébreux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: qui éprouvent de la joie à faire le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui mettent leur plaisir dans la perversité,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: qui suivent des sentiers tortueux
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des routes pleines de détours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tu seras délivré de la femme étrangère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de l'inconnue au discours flatteur
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: qui abandonne l'ami de sa jeunesse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui oublie l'alliance de son Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: En effet, sa maison penche vers la mort
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et sa route conduit vers les défunts:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: aucun de ceux qui vont vers elle ne revient
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni ne retrouve les sentiers de la vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tu marcheras ainsi sur la voie des hommes de bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu persévéreras sur les sentiers des justes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: En effet, les hommes droits habiteront le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les hommes intègres y resteront,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: tandis que les méchants seront exclus du pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les infidèles en seront arrachés.
