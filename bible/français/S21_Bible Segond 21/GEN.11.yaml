document_id: GEN.11,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La tour de Babel
  - type: text
    content: 'Toute la terre avait une seule langue et les mêmes mots. '
  '10':
  - type: text
    content: 'Voici la lignée de Sem. A l''âge de 100 ans, Sem eut pour fils Arpacshad, 2 ans après le déluge. '
  '11':
  - type: text
    content: 'Sem vécut 500 ans après la naissance d''Arpacshad et il eut des fils et des filles. '
  '12':
  - type: text
    content: 'A l''âge de 35 ans, Arpacshad eut pour fils Shélach. '
  '13':
  - type: text
    content: Arpacshad vécut 403 ans après la naissance de Shélach et il eut des fils et des filles.
  '14':
  - type: text
    content: 'A l''âge de 30 ans, Shélach eut pour fils Héber. '
  '15':
  - type: text
    content: Shélach vécut 403 ans après la naissance d'Héber et il eut des fils et des filles.
  '16':
  - type: text
    content: 'A l''âge de 34 ans, Héber eut pour fils Péleg. '
  '17':
  - type: text
    content: Héber vécut 430 ans après la naissance de Péleg et il eut des fils et des filles.
  '18':
  - type: text
    content: 'A l''âge de 30 ans, Péleg eut pour fils Rehu. '
  '19':
  - type: text
    content: Péleg vécut 209 ans après la naissance de Rehu et il eut des fils et des filles.
  '2':
  - type: text
    content: 'Après avoir quitté l''est, ils trouvèrent une plaine dans le pays de Shinear et s''y installèrent. '
  '20':
  - type: text
    content: 'A l''âge de 32 ans, Rehu eut pour fils Serug. '
  '21':
  - type: text
    content: Rehu vécut 207 ans après la naissance de Serug et il eut des fils et des filles.
  '22':
  - type: text
    content: 'A l''âge de 30 ans, Serug eut pour fils Nachor. '
  '23':
  - type: text
    content: Serug vécut 200 ans après la naissance de Nachor et il eut des fils et des filles.
  '24':
  - type: text
    content: 'A l''âge de 29 ans, Nachor eut pour fils Térach. '
  '25':
  - type: text
    content: Nachor vécut 119 ans après la naissance de Térach et il eut des fils et des filles.
  '26':
  - type: text
    content: Térach était âgé de 70 ans lorsqu'il eut Abram, Nachor et Haran.
  '27':
  - type: text
    content: 'Voici la lignée de Térach. Térach eut pour fils Abram, Nachor et Haran. Haran eut Lot. '
  '28':
  - type: text
    content: Haran mourut du vivant de son père Térach dans le pays de sa naissance, à Ur en Chaldée
  - type: note
    content: 'Ur en Chaldée: ville située traditionnellement dans l''Irak actuel, non loin du golfe Persique, parfois dans la Turquie actuelle.'
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'Abram et Nachor se marièrent. La femme d''Abram s''appelait Saraï, et la femme de Nachor Milca. Elle était la fille d''Haran, qui était le père de Milca et de Jisca. '
  '3':
  - type: text
    content: 'Ils se dirent l''un à l''autre: «Allons! Faisons des briques et cuisons-les au feu!» La brique leur servit de pierre, et le bitume de ciment. '
  '30':
  - type: text
    content: Saraï était stérile, elle n'avait pas d'enfants.
  '31':
  - type: text
    content: Térach prit son fils Abram, son petit-fils Lot, qui était le fils d'Haran, et sa belle-fille Saraï, la femme de son fils Abram. Ils sortirent ensemble d'Ur en Chaldée pour se rendre dans le pays de Canaan mais, arrivés à Charan
  - type: note
    content: 'Charan: ville située dans la Turquie actuelle, près de la frontière avec la Syrie.'
  - type: text
    content: ', ils s''y installèrent.'
  '32':
  - type: text
    content: Térach vécut 205 ans, puis il mourut à Charan.
  '4':
  - type: text
    content: 'Ils dirent encore: «Allons! Construisons-nous une ville et une tour dont le sommet touche le ciel et faisons-nous un nom afin de ne pas être dispersés sur toute la surface de la terre.»'
  '5':
  - type: text
    content: 'L''Eternel descendit pour voir la ville et la tour que construisaient les hommes, '
  '6':
  - type: text
    content: 'et il dit: «Les voici qui forment un seul peuple et ont tous une même langue, et voilà ce qu''ils ont entrepris! Maintenant, rien ne les retiendra de faire tout ce qu''ils ont projeté. '
  '7':
  - type: text
    content: 'Allons! Descendons et là brouillons leur langage afin qu''ils ne se comprennent plus mutuellement.» '
  '8':
  - type: text
    content: 'L''Eternel les dispersa loin de là sur toute la surface de la terre. Alors ils arrêtèrent de construire la ville. '
  '9':
  - type: text
    content: 'C''est pourquoi on l''appela Babel: parce que c''est là que l''Eternel brouilla le langage de toute la terre et c''est de là qu''il les dispersa sur toute la surface de la terre.'
  - type: heading
    content: Histoire d'Abraham
  - type: heading
    content: 11.10–25.18
  - type: heading
    content: Les ancêtres d'Abram
