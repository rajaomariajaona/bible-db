document_id: GEN.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La tour de Babel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Toute la terre avait une seule langue et les mêmes mots. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Après avoir quitté l''est, ils trouvèrent une plaine dans le pays de Shinear et s''y installèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils se dirent l''un à l''autre: «Allons! Faisons des briques et cuisons-les au feu!» La brique leur servit de pierre, et le bitume de ciment. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils dirent encore: «Allons! Construisons-nous une ville et une tour dont le sommet touche le ciel et faisons-nous un nom afin de ne pas être dispersés sur toute la surface de la terre.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L''Eternel descendit pour voir la ville et la tour que construisaient les hommes, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'et il dit: «Les voici qui forment un seul peuple et ont tous une même langue, et voilà ce qu''ils ont entrepris! Maintenant, rien ne les retiendra de faire tout ce qu''ils ont projeté. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Allons! Descendons et là brouillons leur langage afin qu''ils ne se comprennent plus mutuellement.» '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L''Eternel les dispersa loin de là sur toute la surface de la terre. Alors ils arrêtèrent de construire la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'C''est pourquoi on l''appela Babel: parce que c''est là que l''Eternel brouilla le langage de toute la terre et c''est de là qu''il les dispersa sur toute la surface de la terre.'
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Histoire d'Abraham
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 11.10–25.18
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les ancêtres d'Abram
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Voici la lignée de Sem. A l''âge de 100 ans, Sem eut pour fils Arpacshad, 2 ans après le déluge. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Sem vécut 500 ans après la naissance d''Arpacshad et il eut des fils et des filles. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'A l''âge de 35 ans, Arpacshad eut pour fils Shélach. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Arpacshad vécut 403 ans après la naissance de Shélach et il eut des fils et des filles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'A l''âge de 30 ans, Shélach eut pour fils Héber. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Shélach vécut 403 ans après la naissance d'Héber et il eut des fils et des filles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'A l''âge de 34 ans, Héber eut pour fils Péleg. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Héber vécut 430 ans après la naissance de Péleg et il eut des fils et des filles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'A l''âge de 30 ans, Péleg eut pour fils Rehu. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Péleg vécut 209 ans après la naissance de Rehu et il eut des fils et des filles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'A l''âge de 32 ans, Rehu eut pour fils Serug. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Rehu vécut 207 ans après la naissance de Serug et il eut des fils et des filles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'A l''âge de 30 ans, Serug eut pour fils Nachor. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Serug vécut 200 ans après la naissance de Nachor et il eut des fils et des filles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'A l''âge de 29 ans, Nachor eut pour fils Térach. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Nachor vécut 119 ans après la naissance de Térach et il eut des fils et des filles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Térach était âgé de 70 ans lorsqu'il eut Abram, Nachor et Haran.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Voici la lignée de Térach. Térach eut pour fils Abram, Nachor et Haran. Haran eut Lot. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Haran mourut du vivant de son père Térach dans le pays de sa naissance, à Ur en Chaldée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ur en Chaldée: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ville située traditionnellement dans l'Irak actuel, non loin du golfe Persique, parfois dans la Turquie actuelle.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Abram et Nachor se marièrent. La femme d''Abram s''appelait Saraï, et la femme de Nachor Milca. Elle était la fille d''Haran, qui était le père de Milca et de Jisca. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Saraï était stérile, elle n'avait pas d'enfants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Térach prit son fils Abram, son petit-fils Lot, qui était le fils d'Haran, et sa belle-fille Saraï, la femme de son fils Abram. Ils sortirent ensemble d'Ur en Chaldée pour se rendre dans le pays de Canaan mais, arrivés à Charan
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.31'
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Charan: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ville située dans la Turquie actuelle, près de la frontière avec la Syrie.
    marker-yv: yv-n
  - type: text
    text: ', ils s''y installèrent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Térach vécut 205 ans, puis il mourut à Charan.
