document_id: JOS.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Deux monuments de pierres
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque toute la nation eut fini de passer le Jourdain, l''Eternel dit à Josué: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Prenez douze hommes parmi le peuple, un de chaque tribu. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Donnez-leur cet ordre: ‘Retirez d''ici, du milieu du Jourdain, là où les prêtres se sont arrêtés de pied ferme, douze pierres que vous emporterez avec vous et que vous déposerez à l''endroit où vous passerez cette nuit.’» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Josué appela les douze hommes qu''il choisit parmi les Israélites, un de chaque tribu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il leur dit: «Passez devant l''arche de l''Eternel, votre Dieu, au milieu du Jourdain et que chacun de vous charge une pierre sur son épaule, selon le nombre des tribus israélites, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'afin que cela soit un signe au milieu de vous. Lorsque vos enfants demanderont un jour: ‘Que signifient pour vous ces pierres?’ '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'vous leur direz: ‘L''eau du Jourdain a été coupée devant l''arche de l''alliance de l''Eternel. Lorsqu''elle a passé le Jourdain, l''eau du Jourdain a été coupée, et ces pierres seront pour toujours un souvenir pour les Israélites.’»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les Israélites firent ce que Josué leur avait ordonné. Ils retirèrent douze pierres du milieu du Jourdain, comme l''Eternel l''avait dit à Josué, selon le nombre des tribus israélites. Ils les emportèrent avec eux et les déposèrent à l''endroit où ils devaient passer la nuit. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Josué dressa aussi douze pierres au milieu du Jourdain, là où s''étaient arrêtés les pieds des prêtres qui portaient l''arche de l''alliance, et elles y sont restées jusqu''à aujourd''hui. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les prêtres qui portaient l''arche se tinrent au milieu du Jourdain jusqu''à l''entière réalisation de ce que l''Eternel avait ordonné à Josué de dire au peuple, en conformité avec tout ce que Moïse avait prescrit à Josué. Et le peuple s''empressa de passer. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lorsque tout le peuple eut fini de passer, l''arche de l''Eternel et les prêtres passèrent devant le peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les Rubénites, les Gadites et la demi-tribu de Manassé passèrent en ordre de bataille devant les Israélites, comme Moïse le leur avait dit. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Environ 40'000 hommes, équipés pour la guerre et prêts à combattre, passèrent devant l'Eternel dans les plaines de Jéricho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ce jour-là, l'Eternel rendit Josué grand aux yeux de tout Israël, et ils le respectèrent comme ils avaient respecté Moïse, tous les jours de sa vie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L''Eternel dit à Josué: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '«Ordonne aux prêtres qui portent l''arche du témoignage de sortir du Jourdain.» '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Josué donna cet ordre aux prêtres: «Sortez du Jourdain.» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Lorsque les prêtres qui portaient l'arche de l'alliance de l'Eternel furent sortis du milieu du Jourdain et que la plante de leurs pieds se posa sur le sec, l'eau du Jourdain retourna à sa place et inonda toutes ses rives comme avant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Le peuple sortit du Jourdain le dixième jour du premier mois et campa à Guilgal, à l'extrémité est de Jéricho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Josué dressa à Guilgal les douze pierres qu''ils avaient retirées du Jourdain. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il dit aux Israélites: «Lorsque vos enfants demanderont un jour à leur père: ‘Que signifient ces pierres?’ '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'vous les instruirez en disant: ‘Israël a passé le Jourdain que voici à pied sec.’ '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Oui, l''Eternel, votre Dieu, a asséché devant vous l''eau du Jourdain jusqu''à ce que vous soyez passés, tout comme il l''avait fait à la mer des Roseaux, qu''il a asséchée devant nous jusqu''à ce que nous soyons passés. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ainsi, tous les peuples de la terre sauront que la main de l'Eternel est puissante et vous craindrez toujours l'Eternel, votre Dieu.»
