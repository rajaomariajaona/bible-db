document_id: JOS.4,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Deux monuments de pierres
  - type: text
    content: 'Lorsque toute la nation eut fini de passer le Jourdain, l''Eternel dit à Josué: '
  '10':
  - type: text
    content: 'Les prêtres qui portaient l''arche se tinrent au milieu du Jourdain jusqu''à l''entière réalisation de ce que l''Eternel avait ordonné à Josué de dire au peuple, en conformité avec tout ce que Moïse avait prescrit à Josué. Et le peuple s''empressa de passer. '
  '11':
  - type: text
    content: 'Lorsque tout le peuple eut fini de passer, l''arche de l''Eternel et les prêtres passèrent devant le peuple. '
  '12':
  - type: text
    content: 'Les Rubénites, les Gadites et la demi-tribu de Manassé passèrent en ordre de bataille devant les Israélites, comme Moïse le leur avait dit. '
  '13':
  - type: text
    content: Environ 40'000 hommes, équipés pour la guerre et prêts à combattre, passèrent devant l'Eternel dans les plaines de Jéricho.
  '14':
  - type: text
    content: Ce jour-là, l'Eternel rendit Josué grand aux yeux de tout Israël, et ils le respectèrent comme ils avaient respecté Moïse, tous les jours de sa vie.
  '15':
  - type: text
    content: 'L''Eternel dit à Josué: '
  '16':
  - type: text
    content: '«Ordonne aux prêtres qui portent l''arche du témoignage de sortir du Jourdain.» '
  '17':
  - type: text
    content: 'Josué donna cet ordre aux prêtres: «Sortez du Jourdain.» '
  '18':
  - type: text
    content: Lorsque les prêtres qui portaient l'arche de l'alliance de l'Eternel furent sortis du milieu du Jourdain et que la plante de leurs pieds se posa sur le sec, l'eau du Jourdain retourna à sa place et inonda toutes ses rives comme avant.
  '19':
  - type: text
    content: Le peuple sortit du Jourdain le dixième jour du premier mois et campa à Guilgal, à l'extrémité est de Jéricho.
  '2':
  - type: text
    content: '«Prenez douze hommes parmi le peuple, un de chaque tribu. '
  '20':
  - type: text
    content: 'Josué dressa à Guilgal les douze pierres qu''ils avaient retirées du Jourdain. '
  '21':
  - type: text
    content: 'Il dit aux Israélites: «Lorsque vos enfants demanderont un jour à leur père: ‘Que signifient ces pierres?’ '
  '22':
  - type: text
    content: 'vous les instruirez en disant: ‘Israël a passé le Jourdain que voici à pied sec.’ '
  '23':
  - type: text
    content: 'Oui, l''Eternel, votre Dieu, a asséché devant vous l''eau du Jourdain jusqu''à ce que vous soyez passés, tout comme il l''avait fait à la mer des Roseaux, qu''il a asséchée devant nous jusqu''à ce que nous soyons passés. '
  '24':
  - type: text
    content: Ainsi, tous les peuples de la terre sauront que la main de l'Eternel est puissante et vous craindrez toujours l'Eternel, votre Dieu.»
  '3':
  - type: text
    content: 'Donnez-leur cet ordre: ‘Retirez d''ici, du milieu du Jourdain, là où les prêtres se sont arrêtés de pied ferme, douze pierres que vous emporterez avec vous et que vous déposerez à l''endroit où vous passerez cette nuit.’» '
  '4':
  - type: text
    content: 'Josué appela les douze hommes qu''il choisit parmi les Israélites, un de chaque tribu. '
  '5':
  - type: text
    content: 'Il leur dit: «Passez devant l''arche de l''Eternel, votre Dieu, au milieu du Jourdain et que chacun de vous charge une pierre sur son épaule, selon le nombre des tribus israélites, '
  '6':
  - type: text
    content: 'afin que cela soit un signe au milieu de vous. Lorsque vos enfants demanderont un jour: ‘Que signifient pour vous ces pierres?’ '
  '7':
  - type: text
    content: 'vous leur direz: ‘L''eau du Jourdain a été coupée devant l''arche de l''alliance de l''Eternel. Lorsqu''elle a passé le Jourdain, l''eau du Jourdain a été coupée, et ces pierres seront pour toujours un souvenir pour les Israélites.’»'
  '8':
  - type: text
    content: 'Les Israélites firent ce que Josué leur avait ordonné. Ils retirèrent douze pierres du milieu du Jourdain, comme l''Eternel l''avait dit à Josué, selon le nombre des tribus israélites. Ils les emportèrent avec eux et les déposèrent à l''endroit où ils devaient passer la nuit. '
  '9':
  - type: text
    content: 'Josué dressa aussi douze pierres au milieu du Jourdain, là où s''étaient arrêtés les pieds des prêtres qui portaient l''arche de l''alliance, et elles y sont restées jusqu''à aujourd''hui. '
