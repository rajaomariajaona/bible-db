document_id: ACT.13
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Premier voyage missionnaire
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 13.1–15.35
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Envoi de Barnabas et Saul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Il y avait dans l''Eglise d''Antioche des prophètes et des enseignants: Barnabas, Siméon appelé le Noir, Lucius de Cyrène, Manahen, qui avait été élevé avec Hérode le tétrarque'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tétrarque: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: titre donné par les Romains aux princes de moins grande importance que les rois. Il s'agit ici d'Hérode Antipas.
    marker-yv: yv-n
  - type: text
    text: ', et Saul. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Pendant qu''ils rendaient un culte au Seigneur et qu''ils jeûnaient, le Saint-Esprit dit: «Mettez-moi à part Barnabas et Saul pour la tâche à laquelle je les ai appelés.» '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Alors, après avoir jeûné, prié et posé les mains sur eux, ils les laissèrent partir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Envoyés par le Saint-Esprit, Barnabas et Saul descendirent à Séleucie, d''où ils embarquèrent pour l''île de Chypre. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Arrivés à Salamine, ils annoncèrent la parole de Dieu dans les synagogues des Juifs. Ils avaient aussi Jean pour aide.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ensuite, ils traversèrent [toute] l''île jusqu''à Paphos, où ils trouvèrent un magicien, un prétendu prophète juif appelé Bar-Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il faisait partie de l''entourage du gouverneur Sergius Paulus, un homme intelligent. Ce dernier fit appeler Barnabas et Saul et exprima le désir d''entendre la parole de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais Elymas le magicien – c''est en effet ce que signifie son nom – s''opposait à eux et cherchait à détourner le gouverneur de la foi. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors Saul, appelé aussi Paul, rempli du Saint-Esprit, fixa les regards sur lui et dit: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '«Homme plein de toute sorte de ruse et de méchanceté, fils du diable, ennemi de toute justice, ne vas-tu pas cesser de pervertir les voies droites du Seigneur? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Maintenant, voici que la main du Seigneur est sur toi: tu seras aveugle et pour un temps tu ne verras pas le soleil.» L''obscurité et les ténèbres tombèrent immédiatement sur lui et il se tournait de tous côtés en cherchant quelqu''un pour le guider. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Quand il vit ce qui était arrivé, le gouverneur crut, frappé qu'il était par l'enseignement du Seigneur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Paul et ses compagnons embarquèrent à Paphos pour se rendre à Perge en Pamphylie, mais Jean se sépara d'eux et retourna à Jérusalem.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'Evangile à Antioche de Pisidie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'De Perge ils poursuivirent leur route et arrivèrent à Antioche de Pisidie. Ils entrèrent dans la synagogue le jour du sabbat et s''assirent. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Après la lecture de la loi et des prophètes, les chefs de la synagogue leur firent dire: «Frères, si vous avez quelques mots d''encouragement à adresser au peuple, parlez!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Paul se leva, fit un signe de la main et dit: «Israélites et vous qui craignez Dieu, écoutez! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le Dieu de ce peuple, [d''Israël,] a choisi nos ancêtres. Il a fait grandir le peuple pendant son séjour en Egypte et il l''en a fait sortir par sa puissance. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il les a supportés près de 40 ans dans le désert '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'et, après avoir détruit sept nations dans le pays de Canaan, il [leur] a accordé leur territoire comme propriété. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Après cela, durant 450 ans environ, il leur a donné des juges, jusqu''au prophète Samuel. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ils ont alors demandé un roi, et Dieu leur a donné pendant 40 ans Saül, fils de Kis, de la tribu de Benjamin. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Puis il l''a rejeté et leur a donné pour roi David, auquel il a rendu ce témoignage: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: J'ai trouvé David, fils d'Isaï, un homme selon mon cœur, qui accomplira toutes mes volontés.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'J''ai trouvé… volontés: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Samuel 13.14
      metadata:
        usfm: 1SA.13.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '»C''est de la descendance de David que Dieu, conformément à sa promesse, a amené à Israël un Sauveur qui est Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Avant sa venue, Jean avait prêché le baptême de repentance à tout le peuple d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Et, lorsqu''il terminait sa course, Jean disait: ‘Je ne suis pas celui que vous pensez, mais le voici qui vient après moi et je ne suis pas digne de détacher ses sandales.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '»Mes frères, descendants d''Abraham et vous qui craignez Dieu, c''est à vous que cette parole de salut a été envoyée. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'En effet, les habitants de Jérusalem et leurs chefs n''ont pas reconnu qui était Jésus, mais en le condamnant ils ont accompli les paroles des prophètes qu''on lit chaque sabbat. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Bien que n''ayant rien trouvé en lui qui mérite la mort, ils ont demandé à Pilate de le faire mourir. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Après avoir accompli tout ce qui est écrit à son sujet, ils l''ont descendu de la croix et l''ont déposé dans un tombeau. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Mais Dieu l''a ressuscité. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Il est apparu pendant plusieurs jours à ceux qui étaient montés avec lui de la Galilée à Jérusalem et qui sont [maintenant] ses témoins auprès du peuple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '»Et nous, nous vous annonçons cette bonne nouvelle: la promesse faite à nos ancêtres, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dieu l''a accomplie pour nous, leurs descendants, en ressuscitant Jésus, conformément à ce qui est écrit dans le Psaume 2: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu es mon Fils, je t'ai engendré aujourd'hui.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.33 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu es… aujourd''hui: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 2.7
      metadata:
        usfm: PSA.2.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Il l''a ressuscité, de telle sorte qu''il ne retournera pas à la décomposition; c''est ce qu''il a déclaré en disant: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Je vous donnerai les grâces saintes et sûres promises à David.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.34 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je vous donnerai… David: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 55.3
      metadata:
        usfm: ISA.55.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'C''est pourquoi il dit encore ailleurs: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu ne permettras pas que ton saint connaisse la décomposition.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.35 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu ne permettras… décomposition: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 16.10
      metadata:
        usfm: PSA.16.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Or, après avoir dans sa propre génération été au service de la volonté de Dieu, David est mort, a rejoint ses ancêtres et a connu la décomposition. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: En revanche, celui que Dieu a ressuscité ne l'a pas connue.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: '»Sachez-le donc, mes frères: c''est par lui que le pardon des péchés vous est annoncé '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'et c''est par lui que toute personne qui croit est libérée de toutes les fautes dont vous ne pouviez pas être libérés par la loi de Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ainsi, faites attention qu''il ne vous arrive pas ce qui est dit dans les prophètes: '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Regardez, vous qui êtes pleins de mépris, soyez étonnés et disparaissez, car je vais faire à votre époque une œuvre que vous ne croiriez pas si on vous la racontait.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.41 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Regardez… racontait: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Habakuk 1.5
      metadata:
        usfm: HAB.1.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Lorsqu''ils sortirent [de la synagogue des Juifs], les non-Juifs les invitèrent à parler du même sujet le sabbat suivant. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Quand l'assemblée se dispersa, beaucoup de Juifs et de non-Juifs pieux convertis au judaïsme suivirent Paul et Barnabas, qui s'entretinrent avec eux et les convainquirent de rester attachés à la grâce de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Le sabbat suivant, presque toute la ville se rassembla pour écouter la parole de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Quand ils virent cette foule, les Juifs furent remplis de jalousie, et ils s''opposaient à ce que disait Paul [en le contredisant et] en l''insultant. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Paul et Barnabas leur dirent avec assurance: «C''était à vous d''abord que la parole de Dieu devait être annoncée mais, puisque vous la rejetez et que vous vous jugez vous-mêmes indignes de la vie éternelle, nous nous tournons vers les non-Juifs. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'En effet, tel est l''ordre que le Seigneur nous a donné: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Je t'ai établi pour être la lumière des nations, pour apporter le salut jusqu'aux extrémités de la terre.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.47 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je t''ai établi… terre: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 49.6
      metadata:
        usfm: ISA.49.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Les non-Juifs se réjouissaient en entendant cela, ils célébraient la parole du Seigneur, et tous ceux qui étaient destinés à la vie éternelle crurent. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'La parole du Seigneur se propageait dans tout le pays. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Mais les Juifs excitèrent les femmes pieuses de la haute société et les personnalités de la ville, ils provoquèrent une persécution contre Paul et Barnabas et les chassèrent de leur territoire. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Paul et Barnabas secouèrent contre eux la poussière de leurs pieds
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.51 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Secouèrent… pieds: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: les Juifs avaient l'habitude de secouer la poussière de leurs pieds en quittant une ville non juive; ils exprimaient ainsi leur séparation d'avec ceux qui n'adoraient pas Dieu.
    marker-yv: yv-n
  - type: text
    text: ' et allèrent à Iconium. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Quant aux disciples, ils étaient remplis de joie et du Saint-Esprit.
