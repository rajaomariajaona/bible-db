document_id: ACT.13,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Premier voyage missionnaire
  - type: heading
    content: 13.1–15.35
  - type: heading
    content: Envoi de Barnabas et Saul
  - type: text
    content: 'Il y avait dans l''Eglise d''Antioche des prophètes et des enseignants: Barnabas, Siméon appelé le Noir, Lucius de Cyrène, Manahen, qui avait été élevé avec Hérode le tétrarque'
  - type: note
    content: 'Tétrarque: titre donné par les Romains aux princes de moins grande importance que les rois. Il s''agit ici d''Hérode Antipas.'
  - type: text
    content: ', et Saul. '
  '10':
  - type: text
    content: '«Homme plein de toute sorte de ruse et de méchanceté, fils du diable, ennemi de toute justice, ne vas-tu pas cesser de pervertir les voies droites du Seigneur? '
  '11':
  - type: text
    content: 'Maintenant, voici que la main du Seigneur est sur toi: tu seras aveugle et pour un temps tu ne verras pas le soleil.» L''obscurité et les ténèbres tombèrent immédiatement sur lui et il se tournait de tous côtés en cherchant quelqu''un pour le guider. '
  '12':
  - type: text
    content: Quand il vit ce qui était arrivé, le gouverneur crut, frappé qu'il était par l'enseignement du Seigneur.
  '13':
  - type: text
    content: Paul et ses compagnons embarquèrent à Paphos pour se rendre à Perge en Pamphylie, mais Jean se sépara d'eux et retourna à Jérusalem.
  - type: heading
    content: L'Evangile à Antioche de Pisidie
  '14':
  - type: text
    content: 'De Perge ils poursuivirent leur route et arrivèrent à Antioche de Pisidie. Ils entrèrent dans la synagogue le jour du sabbat et s''assirent. '
  '15':
  - type: text
    content: 'Après la lecture de la loi et des prophètes, les chefs de la synagogue leur firent dire: «Frères, si vous avez quelques mots d''encouragement à adresser au peuple, parlez!»'
  '16':
  - type: text
    content: 'Paul se leva, fit un signe de la main et dit: «Israélites et vous qui craignez Dieu, écoutez! '
  '17':
  - type: text
    content: 'Le Dieu de ce peuple, [d''Israël,] a choisi nos ancêtres. Il a fait grandir le peuple pendant son séjour en Egypte et il l''en a fait sortir par sa puissance. '
  '18':
  - type: text
    content: 'Il les a supportés près de 40 ans dans le désert '
  '19':
  - type: text
    content: 'et, après avoir détruit sept nations dans le pays de Canaan, il [leur] a accordé leur territoire comme propriété. '
  '2':
  - type: text
    content: 'Pendant qu''ils rendaient un culte au Seigneur et qu''ils jeûnaient, le Saint-Esprit dit: «Mettez-moi à part Barnabas et Saul pour la tâche à laquelle je les ai appelés.» '
  '20':
  - type: text
    content: 'Après cela, durant 450 ans environ, il leur a donné des juges, jusqu''au prophète Samuel. '
  '21':
  - type: text
    content: 'Ils ont alors demandé un roi, et Dieu leur a donné pendant 40 ans Saül, fils de Kis, de la tribu de Benjamin. '
  '22':
  - type: text
    content: 'Puis il l''a rejeté et leur a donné pour roi David, auquel il a rendu ce témoignage: '
  - type: text
    content: J'ai trouvé David, fils d'Isaï, un homme selon mon cœur, qui accomplira toutes mes volontés.
  - type: note
    content: 'J''ai trouvé… volontés: citation de 1 Samuel 13.14.'
  '23':
  - type: text
    content: '»C''est de la descendance de David que Dieu, conformément à sa promesse, a amené à Israël un Sauveur qui est Jésus. '
  '24':
  - type: text
    content: 'Avant sa venue, Jean avait prêché le baptême de repentance à tout le peuple d''Israël. '
  '25':
  - type: text
    content: 'Et, lorsqu''il terminait sa course, Jean disait: ‘Je ne suis pas celui que vous pensez, mais le voici qui vient après moi et je ne suis pas digne de détacher ses sandales.’'
  '26':
  - type: text
    content: '»Mes frères, descendants d''Abraham et vous qui craignez Dieu, c''est à vous que cette parole de salut a été envoyée. '
  '27':
  - type: text
    content: 'En effet, les habitants de Jérusalem et leurs chefs n''ont pas reconnu qui était Jésus, mais en le condamnant ils ont accompli les paroles des prophètes qu''on lit chaque sabbat. '
  '28':
  - type: text
    content: 'Bien que n''ayant rien trouvé en lui qui mérite la mort, ils ont demandé à Pilate de le faire mourir. '
  '29':
  - type: text
    content: 'Après avoir accompli tout ce qui est écrit à son sujet, ils l''ont descendu de la croix et l''ont déposé dans un tombeau. '
  '3':
  - type: text
    content: Alors, après avoir jeûné, prié et posé les mains sur eux, ils les laissèrent partir.
  '30':
  - type: text
    content: 'Mais Dieu l''a ressuscité. '
  '31':
  - type: text
    content: Il est apparu pendant plusieurs jours à ceux qui étaient montés avec lui de la Galilée à Jérusalem et qui sont [maintenant] ses témoins auprès du peuple.
  '32':
  - type: text
    content: '»Et nous, nous vous annonçons cette bonne nouvelle: la promesse faite à nos ancêtres, '
  '33':
  - type: text
    content: 'Dieu l''a accomplie pour nous, leurs descendants, en ressuscitant Jésus, conformément à ce qui est écrit dans le Psaume 2: '
  - type: text
    content: Tu es mon Fils, je t'ai engendré aujourd'hui.
  - type: note
    content: 'Tu es… aujourd''hui: citation du Psaume 2.7.'
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'Il l''a ressuscité, de telle sorte qu''il ne retournera pas à la décomposition; c''est ce qu''il a déclaré en disant: '
  - type: text
    content: Je vous donnerai les grâces saintes et sûres promises à David.
  - type: note
    content: 'Je vous donnerai… David: citation d''Esaïe 55.3.'
  - type: text
    content: ' '
  '35':
  - type: text
    content: 'C''est pourquoi il dit encore ailleurs: '
  - type: text
    content: Tu ne permettras pas que ton saint connaisse la décomposition.
  - type: note
    content: 'Tu ne permettras… décomposition: citation du Psaume 16.10.'
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'Or, après avoir dans sa propre génération été au service de la volonté de Dieu, David est mort, a rejoint ses ancêtres et a connu la décomposition. '
  '37':
  - type: text
    content: En revanche, celui que Dieu a ressuscité ne l'a pas connue.
  '38':
  - type: text
    content: '»Sachez-le donc, mes frères: c''est par lui que le pardon des péchés vous est annoncé '
  '39':
  - type: text
    content: 'et c''est par lui que toute personne qui croit est libérée de toutes les fautes dont vous ne pouviez pas être libérés par la loi de Moïse. '
  '4':
  - type: text
    content: 'Envoyés par le Saint-Esprit, Barnabas et Saul descendirent à Séleucie, d''où ils embarquèrent pour l''île de Chypre. '
  '40':
  - type: text
    content: 'Ainsi, faites attention qu''il ne vous arrive pas ce qui est dit dans les prophètes: '
  '41':
  - type: text
    content: Regardez, vous qui êtes pleins de mépris, soyez étonnés et disparaissez, car je vais faire à votre époque une œuvre que vous ne croiriez pas si on vous la racontait.
  - type: note
    content: 'Regardez… racontait: citation d''Habakuk 1.5.'
  - type: text
    content: »
  '42':
  - type: text
    content: 'Lorsqu''ils sortirent [de la synagogue des Juifs], les non-Juifs les invitèrent à parler du même sujet le sabbat suivant. '
  '43':
  - type: text
    content: Quand l'assemblée se dispersa, beaucoup de Juifs et de non-Juifs pieux convertis au judaïsme suivirent Paul et Barnabas, qui s'entretinrent avec eux et les convainquirent de rester attachés à la grâce de Dieu.
  '44':
  - type: text
    content: 'Le sabbat suivant, presque toute la ville se rassembla pour écouter la parole de Dieu. '
  '45':
  - type: text
    content: 'Quand ils virent cette foule, les Juifs furent remplis de jalousie, et ils s''opposaient à ce que disait Paul [en le contredisant et] en l''insultant. '
  '46':
  - type: text
    content: 'Paul et Barnabas leur dirent avec assurance: «C''était à vous d''abord que la parole de Dieu devait être annoncée mais, puisque vous la rejetez et que vous vous jugez vous-mêmes indignes de la vie éternelle, nous nous tournons vers les non-Juifs. '
  '47':
  - type: text
    content: 'En effet, tel est l''ordre que le Seigneur nous a donné: '
  - type: text
    content: Je t'ai établi pour être la lumière des nations, pour apporter le salut jusqu'aux extrémités de la terre.
  - type: note
    content: 'Je t''ai établi… terre: citation d''Esaïe 49.6.'
  - type: text
    content: »
  '48':
  - type: text
    content: 'Les non-Juifs se réjouissaient en entendant cela, ils célébraient la parole du Seigneur, et tous ceux qui étaient destinés à la vie éternelle crurent. '
  '49':
  - type: text
    content: 'La parole du Seigneur se propageait dans tout le pays. '
  '5':
  - type: text
    content: Arrivés à Salamine, ils annoncèrent la parole de Dieu dans les synagogues des Juifs. Ils avaient aussi Jean pour aide.
  '50':
  - type: text
    content: 'Mais les Juifs excitèrent les femmes pieuses de la haute société et les personnalités de la ville, ils provoquèrent une persécution contre Paul et Barnabas et les chassèrent de leur territoire. '
  '51':
  - type: text
    content: Paul et Barnabas secouèrent contre eux la poussière de leurs pieds
  - type: note
    content: 'Secouèrent… pieds: les Juifs avaient l''habitude de secouer la poussière de leurs pieds en quittant une ville non juive; ils exprimaient ainsi leur séparation d''avec ceux qui n''adoraient pas Dieu.'
  - type: text
    content: ' et allèrent à Iconium. '
  '52':
  - type: text
    content: Quant aux disciples, ils étaient remplis de joie et du Saint-Esprit.
  '6':
  - type: text
    content: 'Ensuite, ils traversèrent [toute] l''île jusqu''à Paphos, où ils trouvèrent un magicien, un prétendu prophète juif appelé Bar-Jésus. '
  '7':
  - type: text
    content: 'Il faisait partie de l''entourage du gouverneur Sergius Paulus, un homme intelligent. Ce dernier fit appeler Barnabas et Saul et exprima le désir d''entendre la parole de Dieu. '
  '8':
  - type: text
    content: 'Mais Elymas le magicien – c''est en effet ce que signifie son nom – s''opposait à eux et cherchait à détourner le gouverneur de la foi. '
  '9':
  - type: text
    content: 'Alors Saul, appelé aussi Paul, rempli du Saint-Esprit, fixa les regards sur lui et dit: '
