document_id: JER.19
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Illustration de la cruche brisée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici ce qu''a dit l''Eternel: «Va acheter une cruche en terre chez un potier et prends avec toi des anciens du peuple et des responsables parmi les prêtres. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Rends-toi dans la vallée de Ben-Hinnom, qui est à l''entrée de la porte des tessons, et là, tu proclameras les paroles que je te dirai. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu diras:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Ecoutez la parole de l'Eternel, rois de Juda, et vous, habitants de Jérusalem!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: '»Voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je vais faire venir ici un malheur
- type: usfm
  marker: q1
  children:
  - type: text
    text: tel que tous ceux qui en entendront parler en resteront abasourdis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Cela arrivera parce qu'ils m'ont abandonné et ont rendu cet endroit méconnaissable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu'ils y ont fait brûler de l'encens en l'honneur d'autres dieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des dieux que ni eux, ni leurs ancêtres, ni les rois de Juda ne connaissaient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ont rempli cet endroit de sang innocent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils ont construit des hauts lieux en l'honneur de Baal
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour brûler leurs enfants en holocauste à Baal.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cela, je ne l'avais ni ordonné ni prescrit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: cela ne m'était pas venu à la pensée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: »C'est pourquoi, voici que les jours viennent, déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: où cet endroit ne sera plus appelé Topheth et vallée de Ben-Hinnom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais sera appelé vallée du carnage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: J'anéantirai ici le conseil de Juda et de Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les ferai tomber par l'épée devant leurs ennemis
- type: usfm
  marker: q1
  children:
  - type: text
    text: et par l'intermédiaire de ceux qui en veulent à leur vie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je donnerai leurs cadavres comme nourriture
- type: usfm
  marker: q1
  children:
  - type: text
    text: aux oiseaux du ciel et aux bêtes de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Je ferai de cette ville un sujet de consternation et de moquerie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ceux qui passeront près d'elle
- type: usfm
  marker: q1
  children:
  - type: text
    text: seront consternés et siffleront à la vue de toutes ses blessures.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je leur ferai manger la chair de leurs fils et de leurs filles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils se mangeront les uns les autres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause du siège et de l'angoisse
- type: usfm
  marker: q1
  children:
  - type: text
    text: que leur imposeront leurs ennemis
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ceux qui en veulent à leur vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: »Tu briseras ensuite la cruche
- type: usfm
  marker: q1
  children:
  - type: text
    text: sous les yeux des hommes qui t'auront accompagné
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'et tu leur diras:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '‘Voici ce que dit l''Eternel, le maître de l''univers:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est ainsi que je briserai ce peuple et cette ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout comme on brise le vase d'un potier
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ne peut plus être réparé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'on enterrera les morts à Topheth, faute de place pour les enterrer ailleurs.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Voilà ce que je ferai à cet endroit et à ses habitants, déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je rendrai cette ville pareille à Topheth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Les maisons de Jérusalem et les palais des rois de Juda
- type: usfm
  marker: q1
  children:
  - type: text
    text: seront impurs comme l'emplacement de Topheth,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toutes les maisons où, sur leurs toits, ils ont fait brûler de l'encens
- type: usfm
  marker: q1
  children:
  - type: text
    text: en l'honneur de tous les corps célestes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et versé des offrandes liquides en l'honneur d'autres dieux.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jérémie emprisonné
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ensuite, Jérémie revint de Topheth, où l''Eternel l''avait envoyé prophétiser. Puis il se tint dans le parvis de la maison de l''Eternel et dit à tout le peuple: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '«Voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël: Je vais faire venir sur cette ville et sur toutes les villes qui dépendent d''elle tout le mal que je lui ai prédit, parce qu''ils se sont montrés réfractaires au lieu d''écouter mes paroles.»'
