document_id: JER.19,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Illustration de la cruche brisée
  - type: text
    content: 'Voici ce qu''a dit l''Eternel: «Va acheter une cruche en terre chez un potier et prends avec toi des anciens du peuple et des responsables parmi les prêtres. '
  '10':
  - type: text
    content: »Tu briseras ensuite la cruche
  - type: text
    content: sous les yeux des hommes qui t'auront accompagné
  '11':
  - type: text
    content: 'et tu leur diras:'
  - type: text
    content: '‘Voici ce que dit l''Eternel, le maître de l''univers:'
  - type: text
    content: C'est ainsi que je briserai ce peuple et cette ville,
  - type: text
    content: tout comme on brise le vase d'un potier
  - type: text
    content: qui ne peut plus être réparé,
  - type: text
    content: et l'on enterrera les morts à Topheth, faute de place pour les enterrer ailleurs.’
  '12':
  - type: text
    content: Voilà ce que je ferai à cet endroit et à ses habitants, déclare l'Eternel,
  - type: text
    content: et je rendrai cette ville pareille à Topheth.
  '13':
  - type: text
    content: Les maisons de Jérusalem et les palais des rois de Juda
  - type: text
    content: seront impurs comme l'emplacement de Topheth,
  - type: text
    content: toutes les maisons où, sur leurs toits, ils ont fait brûler de l'encens
  - type: text
    content: en l'honneur de tous les corps célestes
  - type: text
    content: et versé des offrandes liquides en l'honneur d'autres dieux.»
  - type: heading
    content: Jérémie emprisonné
  '14':
  - type: text
    content: 'Ensuite, Jérémie revint de Topheth, où l''Eternel l''avait envoyé prophétiser. Puis il se tint dans le parvis de la maison de l''Eternel et dit à tout le peuple: '
  '15':
  - type: text
    content: '«Voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël: Je vais faire venir sur cette ville et sur toutes les villes qui dépendent d''elle tout le mal que je lui ai prédit, parce qu''ils se sont montrés réfractaires au lieu d''écouter mes paroles.»'
  '2':
  - type: text
    content: 'Rends-toi dans la vallée de Ben-Hinnom, qui est à l''entrée de la porte des tessons, et là, tu proclameras les paroles que je te dirai. '
  '3':
  - type: text
    content: 'Tu diras:'
  - type: text
    content: ‘Ecoutez la parole de l'Eternel, rois de Juda, et vous, habitants de Jérusalem!’
  - type: text
    content: '»Voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël:'
  - type: text
    content: Je vais faire venir ici un malheur
  - type: text
    content: tel que tous ceux qui en entendront parler en resteront abasourdis.
  '4':
  - type: text
    content: Cela arrivera parce qu'ils m'ont abandonné et ont rendu cet endroit méconnaissable,
  - type: text
    content: parce qu'ils y ont fait brûler de l'encens en l'honneur d'autres dieux,
  - type: text
    content: des dieux que ni eux, ni leurs ancêtres, ni les rois de Juda ne connaissaient,
  - type: text
    content: et ont rempli cet endroit de sang innocent.
  '5':
  - type: text
    content: Ils ont construit des hauts lieux en l'honneur de Baal
  - type: text
    content: pour brûler leurs enfants en holocauste à Baal.
  - type: text
    content: Cela, je ne l'avais ni ordonné ni prescrit,
  - type: text
    content: cela ne m'était pas venu à la pensée.
  '6':
  - type: text
    content: »C'est pourquoi, voici que les jours viennent, déclare l'Eternel,
  - type: text
    content: où cet endroit ne sera plus appelé Topheth et vallée de Ben-Hinnom,
  - type: text
    content: mais sera appelé vallée du carnage.
  '7':
  - type: text
    content: J'anéantirai ici le conseil de Juda et de Jérusalem.
  - type: text
    content: Je les ferai tomber par l'épée devant leurs ennemis
  - type: text
    content: et par l'intermédiaire de ceux qui en veulent à leur vie.
  - type: text
    content: Je donnerai leurs cadavres comme nourriture
  - type: text
    content: aux oiseaux du ciel et aux bêtes de la terre.
  '8':
  - type: text
    content: Je ferai de cette ville un sujet de consternation et de moquerie.
  - type: text
    content: Tous ceux qui passeront près d'elle
  - type: text
    content: seront consternés et siffleront à la vue de toutes ses blessures.
  '9':
  - type: text
    content: Je leur ferai manger la chair de leurs fils et de leurs filles
  - type: text
    content: et ils se mangeront les uns les autres,
  - type: text
    content: à cause du siège et de l'angoisse
  - type: text
    content: que leur imposeront leurs ennemis
  - type: text
    content: et ceux qui en veulent à leur vie.
