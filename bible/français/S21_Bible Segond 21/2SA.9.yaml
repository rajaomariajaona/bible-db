document_id: 2SA.9,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Respect d'une promesse par David
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'David demanda: «Reste-t-il encore quelqu''un de la famille de Saül, pour que je lui fasse du bien à cause de Jonathan'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Acause de Jonathan: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: voir l'alliance conclue entre David et ce fils de Saül (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Samuel 20.12-16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '?» '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Tu cultiveras les terres pour lui, avec tes fils et tes serviteurs, et tu feras les récoltes, afin que le fils de ton maître ait du pain, de quoi manger. En outre, Mephibosheth, le fils de ton maître, mangera constamment à ma table.» Or Tsiba avait 15 fils et 20 serviteurs. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Il dit au roi: «Ton serviteur fera tout ce que le roi mon seigneur ordonne à son serviteur.» Mephibosheth mangea donc à la table de David comme s''il était l''un des fils du roi. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Il avait un jeune fils du nom de Mica et tous ceux qui habitaient chez Tsiba étaient à son service. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Mephibosheth habitait à Jérusalem, car il mangeait constamment à la table du roi. Il était estropié des deux pieds.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il y avait un serviteur de la famille de Saül, un dénommé Tsiba, que l''on fit venir vers David. Le roi lui dit: «Es-tu Tsiba?» Il répondit: «Pour te servir!» '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Le roi dit: «N''y a-t-il plus personne de la famille de Saül, pour que je fasse preuve envers lui de la bonté de Dieu?» Tsiba répondit au roi: «Il y a encore un fils de Jonathan; il est handicapé aux deux jambes.» '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Le roi lui demanda: «Où est-il?» Et Tsiba répondit au roi: «Il est chez Makir, fils d''Ammiel, à Lodebar.»'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Le roi David l''envoya chercher chez Makir, le fils d''Ammiel, à Lodebar. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Mephibosheth, fils de Jonathan et petit-fils de Saül, vint vers David, tomba le visage contre terre et se prosterna. David dit: «Mephibosheth!» Il répondit: «Me voici, je suis ton serviteur.» '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'David lui dit: «N''aie pas peur, car je veux te faire du bien à cause de ton père Jonathan. Je te rendrai toutes les terres de Saül, ton grand-père, et tu mangeras toujours à ma table.» '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mephibosheth se prosterna et dit: «Que suis-je, moi ton serviteur, pour que tu prêtes attention à un chien mort tel que moi?»'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Le roi appela Tsiba, le serviteur de Saül, et lui dit: «Je donne au fils de ton maître tout ce qui appartenait à Saül et à toute sa famille. '
