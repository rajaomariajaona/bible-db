document_id: ISA.34
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie sur Edom
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Approchez-vous, nations, pour bien entendre!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Peuples, soyez attentifs!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que la terre écoute avec tout ce qu'elle contient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le monde avec tout ce qu'il produit!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: En effet, la colère de l'Eternel s'abat sur toutes les nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et sa fureur sur toute leur armée:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il les voue à la destruction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il les livre au carnage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Leurs victimes sont jetées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs cadavres exhalent la puanteur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les montagnes ruissellent de leur sang.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tous les corps célestes se désagrègent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: le ciel est roulé comme un livre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et *tous ses corps tomberont
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tous… tomberont: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 24.29
      metadata:
        usfm: MAT.24.29
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Marc 13.25
      metadata:
        usfm: MRK.13.25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme la feuille de la vigne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme celle du figuier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: C'est que mon épée s'est enivrée dans le ciel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La voici qui descend pour frapper Edom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce peuple que, pour respecter le droit, j'ai voué à la destruction définitive.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: L'épée de l'Eternel est pleine de sang, recouverte de graisse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: du sang des agneaux et des boucs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de la graisse des rognons des béliers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, c'est un repas sacrificiel pour l'Eternel qui se déroule à Botsra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un grand carnage dans le pays d'Edom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les buffles tombent avec eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les bœufs avec les taureaux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leur pays s'enivre de ce sang
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur poussière est imprégnée de graisse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: En effet, c'est un jour de vengeance pour l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une année de représailles pour la cause de Sion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L'eau des torrents d'Edom sera changée en goudron
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa poussière en soufre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son pays deviendra du goudron brûlant
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: qui ne s'éteindra ni la nuit ni le jour.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa fumée s'élèvera éternellement.
- type: usfm
  marker: q1
  children:
  - type: text
    text: De génération en génération il restera désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: plus jamais personne n'y passera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le pélican et le hérisson en prendront possession,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la chouette et le corbeau y habiteront.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On y étendra le ruban à mesurer du vide
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le fil à plomb du chaos.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ses notables n'y proclameront plus de roi, tous ses princes auront disparu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Les buissons d'épines pousseront dans ses palais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les ronces et les orties dans ses forteresses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce sera le domaine des chacals,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le repaire des autruches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les bêtes du désert y rencontreront les hyènes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les boucs s'y appelleront l'un l'autre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le spectre de la nuit y aura sa résidence
- type: usfm
  marker: q1
  children:
  - type: text
    text: et y trouvera son endroit de repos.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Le serpent y fera son nid, y déposera ses œufs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les couvera et rassemblera ses petits sous son ombre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Là se rassembleront les vautours, chaque femelle avec son compagnon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Cherchez dans le livre de l'Eternel et lisez!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aucune de ces bêtes ne sera absente,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aucune femelle avec son compagnon ne manquera.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, c'est l'Eternel qui l'a ordonné
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c'est son Esprit qui les rassemblera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il a procédé à un tirage au sort pour eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa main leur a partagé ce pays au ruban à mesurer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils en prendront possession pour toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils y auront leur résidence de génération en génération.
