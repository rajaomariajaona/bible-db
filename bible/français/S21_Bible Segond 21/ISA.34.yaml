document_id: ISA.34,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie sur Edom
  - type: text
    content: Approchez-vous, nations, pour bien entendre!
  - type: text
    content: Peuples, soyez attentifs!
  - type: text
    content: Que la terre écoute avec tout ce qu'elle contient,
  - type: text
    content: le monde avec tout ce qu'il produit!
  '10':
  - type: text
    content: qui ne s'éteindra ni la nuit ni le jour.
  - type: text
    content: Sa fumée s'élèvera éternellement.
  - type: text
    content: De génération en génération il restera désert,
  - type: text
    content: plus jamais personne n'y passera.
  '11':
  - type: text
    content: Le pélican et le hérisson en prendront possession,
  - type: text
    content: la chouette et le corbeau y habiteront.
  - type: text
    content: On y étendra le ruban à mesurer du vide
  - type: text
    content: et le fil à plomb du chaos.
  '12':
  - type: text
    content: Ses notables n'y proclameront plus de roi, tous ses princes auront disparu.
  '13':
  - type: text
    content: Les buissons d'épines pousseront dans ses palais,
  - type: text
    content: les ronces et les orties dans ses forteresses.
  - type: text
    content: Ce sera le domaine des chacals,
  - type: text
    content: le repaire des autruches.
  '14':
  - type: text
    content: Les bêtes du désert y rencontreront les hyènes
  - type: text
    content: et les boucs s'y appelleront l'un l'autre.
  - type: text
    content: Le spectre de la nuit y aura sa résidence
  - type: text
    content: et y trouvera son endroit de repos.
  '15':
  - type: text
    content: Le serpent y fera son nid, y déposera ses œufs,
  - type: text
    content: les couvera et rassemblera ses petits sous son ombre.
  - type: text
    content: Là se rassembleront les vautours, chaque femelle avec son compagnon.
  '16':
  - type: text
    content: Cherchez dans le livre de l'Eternel et lisez!
  - type: text
    content: Aucune de ces bêtes ne sera absente,
  - type: text
    content: aucune femelle avec son compagnon ne manquera.
  - type: text
    content: Oui, c'est l'Eternel qui l'a ordonné
  - type: text
    content: et c'est son Esprit qui les rassemblera.
  '17':
  - type: text
    content: Il a procédé à un tirage au sort pour eux,
  - type: text
    content: sa main leur a partagé ce pays au ruban à mesurer.
  - type: text
    content: Ils en prendront possession pour toujours,
  - type: text
    content: ils y auront leur résidence de génération en génération.
  '2':
  - type: text
    content: En effet, la colère de l'Eternel s'abat sur toutes les nations
  - type: text
    content: 'et sa fureur sur toute leur armée:'
  - type: text
    content: il les voue à la destruction,
  - type: text
    content: il les livre au carnage.
  '3':
  - type: text
    content: Leurs victimes sont jetées,
  - type: text
    content: leurs cadavres exhalent la puanteur
  - type: text
    content: et les montagnes ruissellent de leur sang.
  '4':
  - type: text
    content: Tous les corps célestes se désagrègent;
  - type: text
    content: le ciel est roulé comme un livre
  - type: text
    content: et *tous ses corps tomberont
  - type: note
    content: 'Tous… tomberont: cité en Matthieu 24.29; Marc 13.25.'
  - type: text
    content: comme la feuille de la vigne,
  - type: text
    content: comme celle du figuier.
  '5':
  - type: text
    content: C'est que mon épée s'est enivrée dans le ciel.
  - type: text
    content: La voici qui descend pour frapper Edom,
  - type: text
    content: ce peuple que, pour respecter le droit, j'ai voué à la destruction définitive.
  '6':
  - type: text
    content: L'épée de l'Eternel est pleine de sang, recouverte de graisse,
  - type: text
    content: du sang des agneaux et des boucs,
  - type: text
    content: de la graisse des rognons des béliers.
  - type: text
    content: Oui, c'est un repas sacrificiel pour l'Eternel qui se déroule à Botsra,
  - type: text
    content: un grand carnage dans le pays d'Edom.
  '7':
  - type: text
    content: Les buffles tombent avec eux,
  - type: text
    content: et les bœufs avec les taureaux.
  - type: text
    content: Leur pays s'enivre de ce sang
  - type: text
    content: et leur poussière est imprégnée de graisse.
  '8':
  - type: text
    content: En effet, c'est un jour de vengeance pour l'Eternel,
  - type: text
    content: une année de représailles pour la cause de Sion.
  '9':
  - type: text
    content: L'eau des torrents d'Edom sera changée en goudron
  - type: text
    content: et sa poussière en soufre.
  - type: text
    content: Son pays deviendra du goudron brûlant
