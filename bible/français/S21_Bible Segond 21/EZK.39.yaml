document_id: EZK.39
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jugement de Gog
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Quant à toi, fils de l''homme, prophétise contre Gog! Tu annonceras: ‘Voici ce que dit le Seigneur, l''Eternel: Je m''en prends à toi, Gog, prince de Rosh, de Méshec et de Tubal! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je t''entraînerai, je te conduirai, je te ferai venir de l''extrême nord et je t''amènerai sur les montagnes d''Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je fracasserai l''arc qui est dans ta main gauche et je ferai tomber les flèches qui sont dans ta main droite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tu tomberas sur les montagnes d''Israël, ainsi que toutes tes troupes et les peuples qui t''accompagnent. Je te donnerai en guise de nourriture aux rapaces de toute sorte et aux bêtes sauvages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu tomberas à la surface des champs. En effet, c'est moi qui ai parlé, déclare le Seigneur, l'Eternel.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '»J''enverrai le feu sur Magog et sur ceux qui habitent en toute sécurité les îles. Ils reconnaîtront alors que je suis l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je ferai connaître mon saint nom au milieu de mon peuple, Israël, et je ne laisserai plus déshonorer mon saint nom. Les nations reconnaîtront alors que je suis l'Eternel, le Saint en Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '»Tout cela vient, cela arrive, déclare le Seigneur, l''Eternel. C''est le jour dont j''ai parlé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors les habitants des villes d''Israël sortiront. Ils allumeront un feu et brûleront le matériel de guerre, les petits et les grands boucliers, les arcs et les flèches, les piques et les lances. Ils pourront en faire du feu pendant sept ans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ils n'auront pas à prendre de bois dans les champs ni à en couper dans les forêts, car c'est avec le matériel de guerre qu'ils feront du feu. Ils dépouilleront ceux qui les ont dépouillés, ils pilleront ceux qui les ont pillés, déclare le Seigneur, l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '»Ce jour-là, je donnerai à Gog un endroit qui lui servira de tombe en Israël: la vallée des voyageurs, à l''est de la mer. Elle fermera le passage aux voyageurs. C''est là qu''on enterrera Gog et toute sa foule bruyante, et on appellera cette vallée ‘vallée de la foule bruyante de Gog’. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'La communauté d''Israël les enterrera afin de purifier le pays, et cela durera sept mois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Toute la population du pays les enterrera et ils y gagneront en réputation, le jour où je manifesterai ma gloire, déclare le Seigneur, l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Puis ils choisiront des hommes qui parcourront sans cesse le pays et qui enterreront, avec l''aide des voyageurs, les cadavres qui restent encore à la surface de la terre. Ils commenceront à prospecter le pays pour le purifier au bout des sept mois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ces inspecteurs parcourront le pays et, quand l''un d''eux verra un ossement humain, il mettra un repère à côté de lui jusqu''à ce que les fossoyeurs aillent l''enterrer dans la vallée de la foule bruyante de Gog. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il y aura même une ville appelée Hamona
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '39.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Hamona: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nom tiré du mot hébreu traduit par «foule bruyante».
    marker-yv: yv-n
  - type: text
    text: . C'est ainsi qu'ils purifieront le pays.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '»Quant à toi, fils de l''homme, voici ce que dit le Seigneur, l''Eternel: Dis aux oiseaux, à tout ce qui a des ailes et à toutes les bêtes sauvages: ‘Réunissez-vous, venez, rassemblez-vous de tous côtés pour le sacrifice que je vous offre, un grand sacrifice sur les montagnes d''Israël! Vous mangerez de la viande et vous boirez du sang. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Vous mangerez la chair des guerriers et vous boirez le sang des princes de la terre, comme si c''étaient des béliers, des agneaux, des boucs, des taureaux, tous engraissés en Basan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'A ce sacrifice que je vous offre, vous mangerez de la graisse jusqu''à saturation et vous boirez du sang jusqu''à l''ivresse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Vous vous rassasierez à ma table de la chair des chevaux et des cavaliers, de la chair des guerriers et de tous les hommes de guerre, déclare le Seigneur, l'Eternel.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '»Je rétablirai mon honneur parmi les nations. Toutes les nations verront la mise en œuvre de mes jugements et le déploiement de ma puissance contre eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'La communauté d''Israël reconnaîtra alors que je suis l''Eternel, son Dieu, dès ce jour et à l''avenir, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'et les nations sauront que c''est à cause de ses fautes que la communauté d''Israël a dû partir en exil: c''est parce que les Israélites m''ont été infidèles, si bien que je me suis détourné d''eux et les ai livrés entre les mains de leurs adversaires afin de les faire tous tomber par l''épée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Je les ai traités d'après leur impureté et leurs transgressions, et je me suis détourné d'eux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '»C''est pourquoi, voici ce que dit le Seigneur, l''Eternel: Maintenant je vais ramener les déportés de Jacob. J''aurai pitié de toute la communauté d''Israël et je ferai respecter mon saint nom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ils porteront le souvenir de leur humiliation et de tous leurs actes d''infidélité envers moi à l''époque où ils habitaient en sécurité sur leur territoire, sans personne pour les effrayer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Quand je les ramènerai du milieu des peuples, quand je les rassemblerai en les tirant des pays de leurs ennemis, à travers eux ma sainteté sera manifestée aux yeux de beaucoup de nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ils reconnaîtront alors que je suis l''Eternel, leur Dieu, qui les ai exilés parmi les nations et qui les réunis sur leur territoire sans laisser aucun d''eux là-bas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Je ne me détournerai plus d'eux, parce que je déverserai mon Esprit sur la communauté d'Israël, déclare le Seigneur, l'Eternel.»
