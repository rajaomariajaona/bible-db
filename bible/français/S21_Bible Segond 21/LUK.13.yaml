document_id: LUK.13,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'A ce moment-là, quelques personnes qui se trouvaient là racontèrent à Jésus ce qui était arrivé à des Galiléens dont Pilate avait mélangé le sang avec celui de leurs sacrifices. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus enseignait dans une des synagogues, le jour du sabbat. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or il y avait là une femme habitée par un esprit qui la rendait infirme depuis 18 ans; elle était courbée et ne pouvait pas du tout se redresser. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu''il la vit, Jésus lui adressa la parole et lui dit: «Femme, tu es délivrée de ton infirmité.» '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il posa les mains sur elle; immédiatement elle se redressa, et elle se mit à célébrer la gloire de Dieu. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais le chef de la synagogue, indigné de ce que Jésus avait fait une guérison un jour de sabbat, dit à la foule: «Il y a six jours pour travailler, venez donc vous faire guérir ces jours-là et non pas le jour du sabbat.» '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le Seigneur lui répondit en ces termes: «Hypocrites! Le jour du sabbat, chacun de vous ne détache-t-il pas son bœuf ou son âne de la mangeoire pour le mener boire? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et cette femme, qui est une fille d''Abraham et que Satan tenait attachée depuis 18 ans, ne fallait-il pas la délivrer de cette chaîne le jour du sabbat?» '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ces paroles remplirent de honte tous ses adversaires, et la foule entière se réjouissait de toutes les merveilles qu'il faisait.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La graine de moutarde et le levain
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit encore: «A quoi le royaume de Dieu ressemble-t-il et à quoi le comparerai-je? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il ressemble à une graine de moutarde qu'un homme a prise et plantée dans son jardin; elle pousse, devient un [grand] arbre, et les oiseaux du ciel habitent dans ses branches.»
  '2':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Jésus leur répondit: «Pensez-vous que ces Galiléens étaient de plus grands pécheurs que tous les autres Galiléens, parce qu''ils ont subi un tel sort? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit encore: «A quoi comparerai-je le royaume de Dieu? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il ressemble à du levain qu'une femme a pris et mis dans trois mesures de farine pour faire lever toute la pâte.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'entrée dans le royaume
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus traversait les villes et les villages, et il enseignait en faisant route vers Jérusalem. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelqu''un lui dit: «Seigneur, n''y a-t-il que peu de gens qui soient sauvés?» Il leur répondit: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Efforcez-vous d''entrer par la porte étroite. En effet, je vous le dis, beaucoup chercheront à entrer et ne le pourront pas. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand le maître de la maison se sera levé et aura fermé la porte, vous qui êtes dehors, vous commencerez à frapper à la porte en disant: ‘Seigneur, [Seigneur,] ouvre-nous!’ Il vous répondra: ‘Je ne sais pas d''où vous êtes.’ '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors vous vous mettrez à dire: ‘Nous avons mangé et bu devant toi, et tu as enseigné dans nos rues.’ '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il répondra: ‘Je vous le dis, je ne sais pas d''où vous êtes; éloignez-vous de moi, vous tous qui commettez l''injustice.’ '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est là qu''il y aura des pleurs et des grincements de dents, quand vous verrez Abraham, Isaac, Jacob et tous les prophètes dans le royaume de Dieu et que vous, vous serez jetés dehors. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On viendra de l''est et de l''ouest, du nord et du sud, et l''on se mettra à table dans le royaume de Dieu. '
  '3':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Non, je vous le dis. Mais si vous ne changez pas d''attitude, vous périrez tous de même. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Certains parmi les derniers seront les premiers, et d'autres parmi les premiers seront les derniers.»
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce même jour, des pharisiens vinrent lui dire: «Va-t''en, pars d''ici, car Hérode veut te faire mourir.» '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur répondit: «Allez dire à ce renard: ‘Voici, je chasse les démons et je fais des guérisons aujourd''hui et demain, et le troisième jour j''aurai fini. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais il faut que je poursuive ma route aujourd'hui, demain et le jour suivant, car il ne convient pas qu'un prophète meure ailleurs qu'à Jérusalem.’
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Jérusalem, Jérusalem, toi qui tues les prophètes et qui lapides ceux qui te sont envoyés, combien de fois j''ai voulu rassembler tes enfants comme une poule rassemble sa couvée sous ses ailes, et vous ne l''avez pas voulu! '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici que votre maison vous sera laissée [déserte]. Je vous le dis, vous ne me verrez plus jusqu''à ce que vienne le temps où vous direz: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ‘Béni soit celui qui vient au nom du Seigneur!’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.35 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Béni… Seigneur: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 118.26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: »
  '4':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Ou bien ces 18 personnes sur qui la tour de Siloé est tombée et qu''elle a tuées, pensez-vous qu''elles étaient plus coupables que tous les autres habitants de Jérusalem? '
  '5':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: Non, je vous le dis. Mais si vous ne changez pas d'attitude, vous périrez tous de même.»
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit aussi cette parabole: «Un homme avait un figuier planté dans sa vigne. Il vint y chercher du fruit et il n''en trouva pas. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors il dit au vigneron: ‘Voilà trois ans que je viens chercher du fruit sur ce figuier et je n''en trouve pas. Coupe-le: pourquoi occupe-t-il la terre inutilement?’ '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le vigneron lui répondit: ‘Seigneur, laisse-le encore cette année! Je creuserai tout autour et j''y mettrai du fumier. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Peut-être à l'avenir donnera-t-il du fruit; sinon, tu le couperas.’»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Guérison de la femme courbée
    marker-yv: yv-h
