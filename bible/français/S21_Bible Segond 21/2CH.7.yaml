document_id: 2CH.7
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque Salomon eut fini de prier, le feu descendit du ciel et brûla l''holocauste et les sacrifices, et la gloire de l''Eternel remplit le temple. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les prêtres ne pouvaient entrer dans la maison de l''Eternel, car la gloire de l''Eternel la remplissait. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tous les Israélites virent descendre le feu et la gloire de l''Eternel sur le temple. Ils s''agenouillèrent, le visage contre terre, sur le pavé, ils adorèrent et célébrèrent l''Eternel en disant: «Il est bon, oui, sa bonté dure éternellement!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le roi et tout le peuple offrirent des sacrifices devant l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le roi Salomon offrit 22''000 bœufs et 120''000 brebis en sacrifice. C''est ainsi que le roi et tout le peuple firent la dédicace de la maison de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les prêtres se tenaient à leur poste, ainsi que les Lévites avec les instruments fabriqués en l''honneur de l''Eternel par le roi David pour célébrer l''Eternel en chantant: «Oui, sa bonté dure éternellement!» d''après le cantique que David leur avait transmis. Les prêtres sonnaient de la trompette en face d''eux et tout Israël était là.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Salomon consacra le milieu du parvis qui se trouvait devant la maison de l'Eternel; en effet, c'est là qu'il offrit les holocaustes et les graisses des sacrifices de communion, parce que l'autel en bronze qu'il avait fait faire ne pouvait contenir les holocaustes, les offrandes et les graisses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Salomon célébra la fête des tentes à ce moment-là, et tout Israël avec lui, pendant 7 jours. Une grande foule était venue des environs de Hamath jusqu''au torrent d''Egypte. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le lendemain, ils eurent une assemblée solennelle, car ils avaient célébré la dédicace de l''autel pendant 7 jours, puis la fête pendant 7 autres jours. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Le vingt-troisième jour du septième mois, Salomon renvoya le peuple chez lui. Ils étaient remplis de joie et avaient le cœur content pour le bien que l'Eternel avait fait à David, à Salomon et à Israël, son peuple.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nouvelle apparition de l'Eternel à Salomon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lorsque Salomon eut terminé la maison de l''Eternel et le palais royal et qu''il eut réussi à accomplir tout ce qu''il avait décidé de faire dans la maison de l''Eternel et dans sa propre maison, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'l''Eternel lui apparut pendant la nuit et lui dit: «J''exauce ta prière et je choisis cet endroit comme le temple où l''on devra m''offrir des sacrifices. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quand je fermerai le ciel et qu''il n''y aura pas de pluie, quand j''ordonnerai aux sauterelles de dévorer le pays, quand j''enverrai la peste parmi mon peuple, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'si mon peuple, celui qui porte mon nom, s''humilie, prie et me cherche et s''il renonce à ses mauvaises voies, je l''écouterai du haut du ciel, je lui pardonnerai son péché et je guérirai son pays. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Désormais, mes yeux seront ouverts et mes oreilles attentives à la prière faite à cet endroit. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Maintenant, je choisis et je consacre cette maison pour que mon nom y réside éternellement, et j''y aurai toujours mes yeux et mon cœur. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Quant à toi, si tu marches devant moi comme l''a fait ton père David, en accomplissant tout ce que je t''ai commandé, si tu respectes mes prescriptions et mes règles, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'j''affermirai ton autorité royale, comme je l''ai promis par alliance à ton père David lorsque j''ai dit: ‘Tu ne manqueras jamais d''un successeur qui exerce la domination en Israël.’ '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Si en revanche vous vous détournez de moi, si vous abandonnez les prescriptions et les commandements que je vous ai donnés, mais que vous allez servir d''autres dieux et vous prosterner devant eux, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'je vous arracherai de mon territoire, que je vous ai donné, je rejetterai loin de moi cette maison, que j''ai consacrée en l''honneur de mon nom, et j''en ferai un sujet de proverbe et de raillerie parmi tous les peuples. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Si important qu''ait été ce temple, toute personne qui passera près de lui sera dans l''étonnement et dira: ‘Pourquoi l''Eternel a-t-il traité de cette manière ce pays et ce temple?’ '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Et l''on répondra: ‘C''est parce qu''ils ont abandonné l''Eternel, le Dieu de leurs ancêtres, qui les avait fait sortir d''Egypte, parce qu''ils se sont attachés à d''autres dieux, se sont prosternés devant eux et les ont servis. Voilà pourquoi il a fait venir tous ces malheurs sur eux.’»'
