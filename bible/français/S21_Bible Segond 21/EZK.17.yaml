document_id: EZK.17,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Parabole des deux aigles
  - type: text
    content: 'La parole de l''Eternel m''a été adressée: '
  '10':
  - type: text
    content: Oui, elle a été plantée, mais prospérera-t-elle?
  - type: text
    content: Quand le vent d'est l'atteindra,
  - type: text
    content: ne séchera-t-elle pas?
  - type: text
    content: Elle séchera sur la terrasse où elle a poussé.’»
  '11':
  - type: text
    content: 'La parole de l''Eternel m''a été adressée: '
  '12':
  - type: text
    content: '«Dis à cette communauté de rebelles: ‘Ne savez-vous pas ce que cela signifie?’ Explique-leur: ‘Le roi de Babylone est venu à Jérusalem, il a capturé son roi et ses chefs et les a emmenés avec lui à Babylone. '
  '13':
  - type: text
    content: 'Il a choisi un homme de sang royal, a conclu une alliance avec lui et lui a fait prêter serment. Puis il a emmené les grands du pays '
  '14':
  - type: text
    content: 'pour que le royaume reste fragile et ne puisse pas se relever. Ainsi, il serait obligé de respecter son alliance pour se maintenir. '
  '15':
  - type: text
    content: Cependant, le nouveau roi s'est révolté contre lui en envoyant ses messagers en Egypte pour se procurer des chevaux et un grand nombre d'hommes. Celui qui s'est permis d'agir de cette manière pourra-t-il arriver à ses fins? Pourra-t-il s'en sortir? Il a violé une alliance et il s'en sortirait?’
  '16':
  - type: text
    content: '»Aussi vrai que je suis vivant, déclare le Seigneur, l''Eternel, il mourra au milieu de Babylone, chez le roi qui l''avait mis sur le trône, puisqu''il a ignoré son engagement envers lui et a violé son alliance avec lui. '
  '17':
  - type: text
    content: 'Le pharaon ne pourra rien faire pour lui au moment du combat, malgré sa grande armée et sa population nombreuse, quand on mettra en place des remblais et qu''on construira des retranchements pour éliminer un grand nombre de vies. '
  '18':
  - type: text
    content: 'Il a ignoré un engagement en violant l''alliance. Alors qu''il avait donné sa main, il s''est permis d''agir de cette manière. Il ne s''en sortira pas! '
  '19':
  - type: text
    content: 'C''est pourquoi, voici ce que dit le Seigneur, l''Eternel: Aussi vrai que je suis vivant, c''est un engagement pris en mon nom qu''il a ignoré, c''est mon alliance qu''il a violée. Je ferai retomber cela sur sa tête. '
  '2':
  - type: text
    content: '«Fils de l''homme, propose une énigme, raconte une parabole à la communauté d''Israël! '
  '20':
  - type: text
    content: 'J''étendrai mon piège sur lui et il sera pris dans mon filet. Je l''emmènerai à Babylone et là, je le ferai passer en jugement pour son infidélité envers moi. '
  '21':
  - type: text
    content: Tous ses fugitifs, dans toutes ses troupes, tomberont par l'épée, et ceux qui resteront seront éparpillés à tout vent. Vous reconnaîtrez alors que c'est moi, l'Eternel, qui ai parlé.
  '22':
  - type: text
    content: '»Voici ce que dit le Seigneur, l''Eternel: J''enlèverai moi-même une pousse de la cime du cèdre majestueux et je la déplacerai. J''arracherai du sommet de ses jeunes branches une pousse délicate et je la planterai sur une montagne particulièrement haute. '
  '23':
  - type: text
    content: 'Je la planterai sur une haute montagne d''Israël. Elle portera des branches et produira des fruits, elle deviendra un cèdre magnifique. Toutes sortes d''oiseaux y feront leur nid, tout ce qui a des ailes s''abritera dans ses branches. '
  '24':
  - type: text
    content: Tous les arbres des champs reconnaîtront alors que c'est moi, l'Eternel, qui ai abaissé l'arbre qui s'élevait et élevé l'arbre qui était abaissé, qui ai desséché l'arbre vert et fait verdir l'arbre sec. Moi, l'Eternel, j'ai parlé, et j'agirai.»
  '3':
  - type: text
    content: 'Tu annonceras: ‘Voici ce que dit le Seigneur, l''Eternel:'
  - type: text
    content: »Un grand aigle, d'une grande envergure,
  - type: text
    content: aux longues ailes,
  - type: text
    content: couvert de plumes de toutes les couleurs,
  - type: text
    content: vint sur le Liban et enleva la cime d'un cèdre.
  '4':
  - type: text
    content: Il arracha la plus haute de ses branches,
  - type: text
    content: l'emporta dans un pays de marchands
  - type: text
    content: et la déposa dans une ville de commerçants.
  '5':
  - type: text
    content: Il prit un plant du pays
  - type: text
    content: et le plaça dans un terrain fertile.
  - type: text
    content: Il le mit près d'une eau abondante
  - type: text
    content: et le planta comme un saule.
  '6':
  - type: text
    content: Ce rejeton poussa et devint un cep de vigne
  - type: text
    content: qui prenait de l'ampleur mais restait bas.
  - type: text
    content: Ses branches étaient tournées vers l'aigle
  - type: text
    content: et ses racines étaient sous lui.
  - type: text
    content: Il devint un cep de vigne,
  - type: text
    content: donna des pousses et produisit des rameaux.
  '7':
  - type: text
    content: »Puis il y eut un autre grand aigle,
  - type: text
    content: de grande envergure, au plumage épais.
  - type: text
    content: De la terrasse où elle était plantée,
  - type: text
    content: cette vigne dirigea ses racines de son côté
  - type: text
    content: et tendit ses branches vers lui pour qu'il l'arrose.
  '8':
  - type: text
    content: Elle était pourtant plantée dans un bon terrain,
  - type: text
    content: près d'une eau abondante,
  - type: text
    content: de manière à produire des sarments et à porter du fruit
  - type: text
    content: pour devenir une vigne magnifique.’
  '9':
  - type: text
    content: '»Annonce: ‘Voici ce que dit le Seigneur, l''Eternel:'
  - type: text
    content: Prospérera-t-elle?
  - type: text
    content: Le premier aigle ne va-t-il pas arracher ses racines,
  - type: text
    content: la dépouiller de son fruit
  - type: text
    content: et dessécher toutes ses jeunes pousses? Elle se desséchera
  - type: text
    content: et il ne faudra ni beaucoup de force
  - type: text
    content: ni un peuple nombreux
  - type: text
    content: pour la déraciner.
