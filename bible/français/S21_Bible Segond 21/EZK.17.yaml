document_id: EZK.17,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Parabole des deux aigles
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'La parole de l''Eternel m''a été adressée: '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Oui, elle a été plantée, mais prospérera-t-elle?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand le vent d'est l'atteindra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne séchera-t-elle pas?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle séchera sur la terrasse où elle a poussé.’»
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'La parole de l''Eternel m''a été adressée: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '«Dis à cette communauté de rebelles: ‘Ne savez-vous pas ce que cela signifie?’ Explique-leur: ‘Le roi de Babylone est venu à Jérusalem, il a capturé son roi et ses chefs et les a emmenés avec lui à Babylone. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Il a choisi un homme de sang royal, a conclu une alliance avec lui et lui a fait prêter serment. Puis il a emmené les grands du pays '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'pour que le royaume reste fragile et ne puisse pas se relever. Ainsi, il serait obligé de respecter son alliance pour se maintenir. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Cependant, le nouveau roi s'est révolté contre lui en envoyant ses messagers en Egypte pour se procurer des chevaux et un grand nombre d'hommes. Celui qui s'est permis d'agir de cette manière pourra-t-il arriver à ses fins? Pourra-t-il s'en sortir? Il a violé une alliance et il s'en sortirait?’
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '»Aussi vrai que je suis vivant, déclare le Seigneur, l''Eternel, il mourra au milieu de Babylone, chez le roi qui l''avait mis sur le trône, puisqu''il a ignoré son engagement envers lui et a violé son alliance avec lui. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Le pharaon ne pourra rien faire pour lui au moment du combat, malgré sa grande armée et sa population nombreuse, quand on mettra en place des remblais et qu''on construira des retranchements pour éliminer un grand nombre de vies. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Il a ignoré un engagement en violant l''alliance. Alors qu''il avait donné sa main, il s''est permis d''agir de cette manière. Il ne s''en sortira pas! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'C''est pourquoi, voici ce que dit le Seigneur, l''Eternel: Aussi vrai que je suis vivant, c''est un engagement pris en mon nom qu''il a ignoré, c''est mon alliance qu''il a violée. Je ferai retomber cela sur sa tête. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '«Fils de l''homme, propose une énigme, raconte une parabole à la communauté d''Israël! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'J''étendrai mon piège sur lui et il sera pris dans mon filet. Je l''emmènerai à Babylone et là, je le ferai passer en jugement pour son infidélité envers moi. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Tous ses fugitifs, dans toutes ses troupes, tomberont par l'épée, et ceux qui resteront seront éparpillés à tout vent. Vous reconnaîtrez alors que c'est moi, l'Eternel, qui ai parlé.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '»Voici ce que dit le Seigneur, l''Eternel: J''enlèverai moi-même une pousse de la cime du cèdre majestueux et je la déplacerai. J''arracherai du sommet de ses jeunes branches une pousse délicate et je la planterai sur une montagne particulièrement haute. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Je la planterai sur une haute montagne d''Israël. Elle portera des branches et produira des fruits, elle deviendra un cèdre magnifique. Toutes sortes d''oiseaux y feront leur nid, tout ce qui a des ailes s''abritera dans ses branches. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Tous les arbres des champs reconnaîtront alors que c'est moi, l'Eternel, qui ai abaissé l'arbre qui s'élevait et élevé l'arbre qui était abaissé, qui ai desséché l'arbre vert et fait verdir l'arbre sec. Moi, l'Eternel, j'ai parlé, et j'agirai.»
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tu annonceras: ‘Voici ce que dit le Seigneur, l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Un grand aigle, d'une grande envergure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux longues ailes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: couvert de plumes de toutes les couleurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vint sur le Liban et enleva la cime d'un cèdre.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Il arracha la plus haute de ses branches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'emporta dans un pays de marchands
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la déposa dans une ville de commerçants.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Il prit un plant du pays
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le plaça dans un terrain fertile.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il le mit près d'une eau abondante
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le planta comme un saule.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ce rejeton poussa et devint un cep de vigne
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui prenait de l'ampleur mais restait bas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses branches étaient tournées vers l'aigle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses racines étaient sous lui.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il devint un cep de vigne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: donna des pousses et produisit des rameaux.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: »Puis il y eut un autre grand aigle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de grande envergure, au plumage épais.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De la terrasse où elle était plantée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cette vigne dirigea ses racines de son côté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tendit ses branches vers lui pour qu'il l'arrose.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Elle était pourtant plantée dans un bon terrain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: près d'une eau abondante,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de manière à produire des sarments et à porter du fruit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour devenir une vigne magnifique.’
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '»Annonce: ‘Voici ce que dit le Seigneur, l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prospérera-t-elle?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le premier aigle ne va-t-il pas arracher ses racines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la dépouiller de son fruit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et dessécher toutes ses jeunes pousses? Elle se desséchera
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il ne faudra ni beaucoup de force
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni un peuple nombreux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour la déraciner.
