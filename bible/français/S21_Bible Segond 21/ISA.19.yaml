document_id: ISA.19,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie sur l'Egypte
  - type: text
    content: Message sur l'Egypte.
  - type: text
    content: L'Eternel monte un nuage rapide, il vient en Egypte;
  - type: text
    content: les faux dieux de l'Egypte tremblent devant lui
  - type: text
    content: et les Egyptiens perdent courage.
  '10':
  - type: text
    content: Les soutiens du pays seront écrasés,
  - type: text
    content: tous les travailleurs salariés seront dans l'abattement.
  '11':
  - type: text
    content: Les princes de Tsoan sont autant de fous,
  - type: text
    content: les sages conseillers du pharaon forment un conseil stupide.
  - type: text
    content: 'Comment pouvez-vous oser dire au pharaon:'
  - type: text
    content: «Je suis un fils des sages, un descendant des rois du passé»?
  '12':
  - type: text
    content: Où sont-ils donc, tes sages?
  - type: text
    content: Qu'ils te fassent donc des révélations
  - type: text
    content: et que l'on découvre quelle décision l'Eternel, le maître de l'univers, a prise contre l'Egypte!
  '13':
  - type: text
    content: Les princes de Tsoan font preuve de folie,
  - type: text
    content: les princes de Memphis se bercent d'illusions,
  - type: text
    content: ses chefs de tribus égarent l'Egypte.
  '14':
  - type: text
    content: L'Eternel a déversé au milieu d'elle un esprit de vertige
  - type: text
    content: et ils égarent les Egyptiens dans tout ce qu'ils font;
  - type: text
    content: ils sont pareils à un homme ivre qui titube en vomissant.
  '15':
  - type: text
    content: L'Egypte sera incapable de faire quoi que ce soit,
  - type: text
    content: du plus important au plus insignifiant, du sommet au bas de la société.
  '16':
  - type: text
    content: 'Ce jour-là, l''Egypte sera pareille à des femmelettes:'
  - type: text
    content: elle sera terrifiée, elle tremblera de peur
  - type: text
    content: en voyant l'Eternel, le maître de l'univers, brandir sa main
  - type: text
    content: et la lever contre elle.
  '17':
  - type: text
    content: 'Le pays de Juda sera une source de terreur pour l''Egypte:'
  - type: text
    content: dès qu'on le mentionnera devant elle, elle sera saisie de frayeur
  - type: text
    content: à cause de la décision que l'Eternel, le maître de l'univers, a prise contre elle.
  '18':
  - type: text
    content: Ce jour-là, il y aura cinq villes en Egypte
  - type: text
    content: qui parleront la langue de Canaan
  - type: text
    content: et qui prêteront serment par l'Eternel, le maître de l'univers.
  - type: text
    content: L'une d'elles sera appelée ville de la destruction.
  '19':
  - type: text
    content: Ce jour-là, il y aura un autel consacré à l'Eternel
  - type: text
    content: au cœur de l'Egypte,
  - type: text
    content: et près de la frontière du pays un monument en l'honneur de l'Eternel.
  '2':
  - type: text
    content: Je dresserai l'Egyptien contre l'Egyptien
  - type: text
    content: et l'on se battra frère contre frère, ami contre ami,
  - type: text
    content: '*ville contre ville, royaume contre royaume'
  - type: note
    content: 'Ville… royaume: renvoi à ce verset en Matthieu 24.7; Marc 13.8; Luc 21.10.'
  - type: text
    content: .
  '20':
  - type: text
    content: Ce sera un signe et un témoignage
  - type: text
    content: 'pour l''Eternel, le maître de l''univers, en Egypte:'
  - type: text
    content: quand ils crieront à l'Eternel à cause de ceux qui les oppriment,
  - type: text
    content: il leur enverra un sauveur, un défenseur qui les délivrera.
  '21':
  - type: text
    content: Ce jour-là, l'Eternel sera connu des Egyptiens
  - type: text
    content: et les Egyptiens connaîtront l'Eternel;
  - type: text
    content: ils le serviront avec des sacrifices et des offrandes,
  - type: text
    content: ils feront des vœux à l'Eternel et les accompliront.
  '22':
  - type: text
    content: Ainsi, l'Eternel frappera les Egyptiens.
  - type: text
    content: Il les frappera, mais il les guérira
  - type: text
    content: et ils se convertiront à lui.
  - type: text
    content: Il répondra à leurs prières et les guérira.
  '23':
  - type: text
    content: Ce jour-là, il y aura une route entre l'Egypte et l'Assyrie.
  - type: text
    content: Les Assyriens se rendront en Egypte et les Egyptiens en Assyrie,
  - type: text
    content: et les Egyptiens serviront l'Eternel avec les Assyriens.
  '24':
  - type: text
    content: Ce jour-là, Israël sera le troisième,
  - type: text
    content: avec l'Egypte et l'Assyrie,
  - type: text
    content: à être une bénédiction pour toute la terre.
  '25':
  - type: text
    content: 'L''Eternel, le maître de l''univers, les bénira en disant:'
  - type: text
    content: «Bénis soient l'Egypte, mon peuple,
  - type: text
    content: l'Assyrie, que j'ai créée de mes mains,
  - type: text
    content: et Israël, mon héritage!»
  '3':
  - type: text
    content: L'Egypte perdra l'esprit
  - type: text
    content: et j'anéantirai ses projets.
  - type: text
    content: On aura beau consulter les faux dieux et les morts,
  - type: text
    content: ceux qui invoquent les esprits et les spirites,
  '4':
  - type: text
    content: je livrerai l'Egypte entre les mains de maîtres sévères.
  - type: text
    content: Un roi cruel dominera sur eux,
  - type: text
    content: déclare le Seigneur, l'Eternel, le maître de l'univers.
  '5':
  - type: text
    content: L'eau de la mer disparaîtra,
  - type: text
    content: le fleuve deviendra sec et aride;
  '6':
  - type: text
    content: les rivières empesteront,
  - type: text
    content: le delta de l'Egypte sera bas et desséché,
  - type: text
    content: les roseaux et les joncs se flétriront.
  '7':
  - type: text
    content: Tout le paysage sera nu le long du Nil et à son embouchure;
  - type: text
    content: tout ce qui aura été semé sur ses rives se desséchera,
  - type: text
    content: se transformera en poussière et disparaîtra.
  '8':
  - type: text
    content: Les pêcheurs gémiront,
  - type: text
    content: tous ceux qui jettent l'hameçon dans le Nil seront dans le deuil,
  - type: text
    content: ceux qui étendent des filets à la surface de l'eau dépériront.
  '9':
  - type: text
    content: Ceux qui travaillent le fin lin
  - type: text
    content: et qui tissent des étoffes blanches seront couverts de honte.
