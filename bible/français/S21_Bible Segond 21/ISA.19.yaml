document_id: ISA.19,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophétie sur l'Egypte
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Message sur l'Egypte.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel monte un nuage rapide, il vient en Egypte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les faux dieux de l'Egypte tremblent devant lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les Egyptiens perdent courage.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les soutiens du pays seront écrasés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les travailleurs salariés seront dans l'abattement.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les princes de Tsoan sont autant de fous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les sages conseillers du pharaon forment un conseil stupide.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Comment pouvez-vous oser dire au pharaon:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Je suis un fils des sages, un descendant des rois du passé»?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où sont-ils donc, tes sages?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'ils te fassent donc des révélations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que l'on découvre quelle décision l'Eternel, le maître de l'univers, a prise contre l'Egypte!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les princes de Tsoan font preuve de folie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les princes de Memphis se bercent d'illusions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses chefs de tribus égarent l'Egypte.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel a déversé au milieu d'elle un esprit de vertige
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils égarent les Egyptiens dans tout ce qu'ils font;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont pareils à un homme ivre qui titube en vomissant.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Egypte sera incapable de faire quoi que ce soit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du plus important au plus insignifiant, du sommet au bas de la société.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ce jour-là, l''Egypte sera pareille à des femmelettes:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle sera terrifiée, elle tremblera de peur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en voyant l'Eternel, le maître de l'univers, brandir sa main
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la lever contre elle.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le pays de Juda sera une source de terreur pour l''Egypte:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dès qu'on le mentionnera devant elle, elle sera saisie de frayeur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de la décision que l'Eternel, le maître de l'univers, a prise contre elle.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce jour-là, il y aura cinq villes en Egypte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui parleront la langue de Canaan
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui prêteront serment par l'Eternel, le maître de l'univers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'une d'elles sera appelée ville de la destruction.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce jour-là, il y aura un autel consacré à l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au cœur de l'Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et près de la frontière du pays un monument en l'honneur de l'Eternel.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je dresserai l'Egyptien contre l'Egyptien
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'on se battra frère contre frère, ami contre ami,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*ville contre ville, royaume contre royaume'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ville… royaume: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'renvoi à ce verset en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matthieu 24.7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Marc 13.8
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luc 21.10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sera un signe et un témoignage
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'pour l''Eternel, le maître de l''univers, en Egypte:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand ils crieront à l'Eternel à cause de ceux qui les oppriment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il leur enverra un sauveur, un défenseur qui les délivrera.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce jour-là, l'Eternel sera connu des Egyptiens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les Egyptiens connaîtront l'Eternel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils le serviront avec des sacrifices et des offrandes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils feront des vœux à l'Eternel et les accompliront.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi, l'Eternel frappera les Egyptiens.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les frappera, mais il les guérira
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils se convertiront à lui.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il répondra à leurs prières et les guérira.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce jour-là, il y aura une route entre l'Egypte et l'Assyrie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les Assyriens se rendront en Egypte et les Egyptiens en Assyrie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les Egyptiens serviront l'Eternel avec les Assyriens.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce jour-là, Israël sera le troisième,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec l'Egypte et l'Assyrie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à être une bénédiction pour toute la terre.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L''Eternel, le maître de l''univers, les bénira en disant:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Bénis soient l'Egypte, mon peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'Assyrie, que j'ai créée de mes mains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Israël, mon héritage!»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Egypte perdra l'esprit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j'anéantirai ses projets.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On aura beau consulter les faux dieux et les morts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui invoquent les esprits et les spirites,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je livrerai l'Egypte entre les mains de maîtres sévères.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un roi cruel dominera sur eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare le Seigneur, l'Eternel, le maître de l'univers.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'eau de la mer disparaîtra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le fleuve deviendra sec et aride;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les rivières empesteront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le delta de l'Egypte sera bas et desséché,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les roseaux et les joncs se flétriront.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout le paysage sera nu le long du Nil et à son embouchure;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout ce qui aura été semé sur ses rives se desséchera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: se transformera en poussière et disparaîtra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les pêcheurs gémiront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous ceux qui jettent l'hameçon dans le Nil seront dans le deuil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui étendent des filets à la surface de l'eau dépériront.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui travaillent le fin lin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui tissent des étoffes blanches seront couverts de honte.
