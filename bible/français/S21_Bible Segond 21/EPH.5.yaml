document_id: EPH.5,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Soyez donc les imitateurs de Dieu, puisque vous êtes ses enfants bien-aimés, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Discernez ce qui est agréable au Seigneur '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'et ne participez pas aux œuvres stériles des ténèbres, mais démasquez-les plutôt. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'En effet, ce que ces hommes font en secret, il est même honteux d''en parler; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'mais tout ce qui est démasqué par la lumière apparaît clairement, car tout ce qui apparaît ainsi est lumière. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'C''est pourquoi il est dit: «Réveille-toi, toi qui dors, relève-toi d''entre les morts, et Christ t''éclairera.»'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Faites donc bien attention à la façon dont vous vous conduisez: ne vous comportez pas comme des fous, mais comme des sages: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'rachetez le temps, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: car les jours sont mauvais
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Car… mauvais: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Amos 5.13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (même texte en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Michée 2.3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: C'est pourquoi ne soyez pas stupides, mais comprenez quelle est la volonté du Seigneur.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les relations mutuelles
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ne vous enivrez pas de vin: cela mène à la débauche. Soyez au contraire remplis de l''Esprit: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'dites-vous des psaumes, des hymnes et des cantiques spirituels; chantez et célébrez de tout votre cœur les louanges du Seigneur; '
  '2':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: et vivez dans l'amour en suivant l'exemple de Christ, qui nous a aimés et qui s'est donné lui-même pour nous comme une offrande et un sacrifice dont l'odeur est agréable à Dieu.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'remerciez constamment Dieu le Père pour tout, au nom de notre Seigneur Jésus-Christ; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: soumettez-vous les uns aux autres dans la crainte de Dieu.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Femmes, [soumettez-vous] à votre mari comme au Seigneur, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'car le mari est le chef de la femme, comme Christ est le chef de l''Eglise qui est son corps et dont il est le Sauveur. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Mais tout comme l'Eglise se soumet à Christ, que les femmes aussi se soumettent en tout à leur mari.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Maris, aimez votre femme comme Christ a aimé l''Eglise. Il s''est donné lui-même pour elle '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'afin de la conduire à la sainteté après l''avoir purifiée et lavée par l''eau de la parole, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'pour faire paraître devant lui cette Eglise glorieuse, sans tache, ni ride, ni rien de semblable, mais sainte et irréprochable. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'C''est ainsi que les maris doivent aimer leur femme comme leur propre corps. Celui qui aime sa femme s''aime lui-même. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'En effet, jamais personne n''a détesté son propre corps. Au contraire, il le nourrit et en prend soin, tout comme le Seigneur le fait pour l''Eglise '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Que l''immoralité sexuelle, l''impureté sous toutes ses formes ou la soif de posséder ne soient même pas mentionnées parmi vous, comme il convient à des saints. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'parce que nous sommes les membres de son corps, [formés de sa chair et de ses os]. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: C'est pourquoi l'homme quittera son père et sa mère, s'attachera à sa femme, et les deux ne feront qu'un.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.31 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'C''est pourquoi… qu''un: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Genèse 2.24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ce mystère est grand, et je dis cela par rapport à Christ et à l''Eglise. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Du reste, que chacun de vous aime sa femme comme lui-même et que la femme respecte son mari.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Qu''on n''entende pas de paroles grossières, de propos stupides ou équivoques – c''est inconvenant – mais plutôt des paroles de reconnaissance. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Vous le savez bien en effet, aucun être immoral, impur ou toujours désireux de posséder plus – c'est-à-dire idolâtre – n'a d'héritage dans le royaume de Christ et de Dieu.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Que personne ne vous trompe par des paroles sans fondement, car c''est pour cela que la colère de Dieu vient sur les hommes rebelles. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'N''ayez donc aucune part avec eux, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'car si autrefois vous étiez ténèbres, maintenant vous êtes lumière dans le Seigneur. Conduisez-vous comme des enfants de lumière! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Le fruit de l''Esprit consiste en effet dans toute forme de bonté, de justice et de vérité. '
