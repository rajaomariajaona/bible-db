document_id: EPH.5,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Soyez donc les imitateurs de Dieu, puisque vous êtes ses enfants bien-aimés, '
  '10':
  - type: text
    content: 'Discernez ce qui est agréable au Seigneur '
  '11':
  - type: text
    content: 'et ne participez pas aux œuvres stériles des ténèbres, mais démasquez-les plutôt. '
  '12':
  - type: text
    content: 'En effet, ce que ces hommes font en secret, il est même honteux d''en parler; '
  '13':
  - type: text
    content: 'mais tout ce qui est démasqué par la lumière apparaît clairement, car tout ce qui apparaît ainsi est lumière. '
  '14':
  - type: text
    content: 'C''est pourquoi il est dit: «Réveille-toi, toi qui dors, relève-toi d''entre les morts, et Christ t''éclairera.»'
  '15':
  - type: text
    content: 'Faites donc bien attention à la façon dont vous vous conduisez: ne vous comportez pas comme des fous, mais comme des sages: '
  '16':
  - type: text
    content: 'rachetez le temps, '
  - type: text
    content: car les jours sont mauvais
  - type: note
    content: 'Car… mauvais: citation d''Amos 5.13 (même texte en Michée 2.3).'
  - type: text
    content: '. '
  '17':
  - type: text
    content: C'est pourquoi ne soyez pas stupides, mais comprenez quelle est la volonté du Seigneur.
  - type: heading
    content: Les relations mutuelles
  '18':
  - type: text
    content: 'Ne vous enivrez pas de vin: cela mène à la débauche. Soyez au contraire remplis de l''Esprit: '
  '19':
  - type: text
    content: 'dites-vous des psaumes, des hymnes et des cantiques spirituels; chantez et célébrez de tout votre cœur les louanges du Seigneur; '
  '2':
  - type: text
    content: et vivez dans l'amour en suivant l'exemple de Christ, qui nous a aimés et qui s'est donné lui-même pour nous comme une offrande et un sacrifice dont l'odeur est agréable à Dieu.
  '20':
  - type: text
    content: 'remerciez constamment Dieu le Père pour tout, au nom de notre Seigneur Jésus-Christ; '
  '21':
  - type: text
    content: soumettez-vous les uns aux autres dans la crainte de Dieu.
  '22':
  - type: text
    content: 'Femmes, [soumettez-vous] à votre mari comme au Seigneur, '
  '23':
  - type: text
    content: 'car le mari est le chef de la femme, comme Christ est le chef de l''Eglise qui est son corps et dont il est le Sauveur. '
  '24':
  - type: text
    content: Mais tout comme l'Eglise se soumet à Christ, que les femmes aussi se soumettent en tout à leur mari.
  '25':
  - type: text
    content: 'Maris, aimez votre femme comme Christ a aimé l''Eglise. Il s''est donné lui-même pour elle '
  '26':
  - type: text
    content: 'afin de la conduire à la sainteté après l''avoir purifiée et lavée par l''eau de la parole, '
  '27':
  - type: text
    content: 'pour faire paraître devant lui cette Eglise glorieuse, sans tache, ni ride, ni rien de semblable, mais sainte et irréprochable. '
  '28':
  - type: text
    content: 'C''est ainsi que les maris doivent aimer leur femme comme leur propre corps. Celui qui aime sa femme s''aime lui-même. '
  '29':
  - type: text
    content: 'En effet, jamais personne n''a détesté son propre corps. Au contraire, il le nourrit et en prend soin, tout comme le Seigneur le fait pour l''Eglise '
  '3':
  - type: text
    content: 'Que l''immoralité sexuelle, l''impureté sous toutes ses formes ou la soif de posséder ne soient même pas mentionnées parmi vous, comme il convient à des saints. '
  '30':
  - type: text
    content: 'parce que nous sommes les membres de son corps, [formés de sa chair et de ses os]. '
  '31':
  - type: text
    content: C'est pourquoi l'homme quittera son père et sa mère, s'attachera à sa femme, et les deux ne feront qu'un.
  - type: note
    content: 'C''est pourquoi… qu''un: citation de Genèse 2.24.'
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'Ce mystère est grand, et je dis cela par rapport à Christ et à l''Eglise. '
  '33':
  - type: text
    content: Du reste, que chacun de vous aime sa femme comme lui-même et que la femme respecte son mari.
  '4':
  - type: text
    content: 'Qu''on n''entende pas de paroles grossières, de propos stupides ou équivoques – c''est inconvenant – mais plutôt des paroles de reconnaissance. '
  '5':
  - type: text
    content: Vous le savez bien en effet, aucun être immoral, impur ou toujours désireux de posséder plus – c'est-à-dire idolâtre – n'a d'héritage dans le royaume de Christ et de Dieu.
  '6':
  - type: text
    content: 'Que personne ne vous trompe par des paroles sans fondement, car c''est pour cela que la colère de Dieu vient sur les hommes rebelles. '
  '7':
  - type: text
    content: 'N''ayez donc aucune part avec eux, '
  '8':
  - type: text
    content: 'car si autrefois vous étiez ténèbres, maintenant vous êtes lumière dans le Seigneur. Conduisez-vous comme des enfants de lumière! '
  '9':
  - type: text
    content: 'Le fruit de l''Esprit consiste en effet dans toute forme de bonté, de justice et de vérité. '
