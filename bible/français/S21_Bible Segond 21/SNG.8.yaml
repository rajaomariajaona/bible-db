document_id: SNG.8,152
type_code: fra
verses:
  '1':
  - type: text
    content: Si seulement tu étais comme mon frère,
  - type: text
    content: si seulement tu avais été allaité par ma mère!
  - type: text
    content: Je te rencontrerais dehors, je t'embrasserais
  - type: text
    content: et l'on ne me mépriserait même pas.
  '10':
  - type: text
    content: Je suis un rempart
  - type: text
    content: et mes seins sont comme des tours.
  - type: text
    content: A ses yeux, j'ai été pareille à celle qui trouve la paix.
  '11':
  - type: text
    content: Salomon avait une vigne à Baal-Hamon.
  - type: text
    content: 'Il a confié la vigne à des gardiens:'
  - type: text
    content: chacun apportait 1000 pièces d'argent pour récolter son fruit.
  '12':
  - type: text
    content: Ma vigne à moi, je la garde.
  - type: text
    content: A toi, Salomon, les 1000 pièces,
  - type: text
    content: et 200 à ceux qui gardent son fruit!
  - type: heading
    content: Le jeune homme
  '13':
  - type: text
    content: Habitante des jardins,
  - type: text
    content: des compagnons prêtent attention à ta voix.
  - type: text
    content: Fais-la-moi entendre!
  - type: heading
    content: La jeune femme
  '14':
  - type: text
    content: Prends la fuite, mon bien-aimé!
  - type: text
    content: Montre-toi pareil à la gazelle ou au jeune cerf
  - type: text
    content: sur les montagnes aux aromates!
  '2':
  - type: text
    content: Je te conduirais, je t'amènerais chez ma mère,
  - type: text
    content: tu m'instruirais et je te ferais boire du vin parfumé,
  - type: text
    content: du jus de mes grenades.
  '3':
  - type: text
    content: Que sa main gauche soutienne ma tête
  - type: text
    content: et que de sa main droite il m'enlace!
  - type: heading
    content: Le jeune homme
  '4':
  - type: text
    content: Je vous en supplie, filles de Jérusalem,
  - type: text
    content: ne réveillez pas, ne réveillez pas l'amour
  - type: text
    content: avant qu'elle ne le veuille!
  - type: heading
    content: Les filles de Jérusalem
  '5':
  - type: text
    content: Qui est celle qui monte du désert,
  - type: text
    content: appuyée sur son bien-aimé?
  - type: heading
    content: La jeune femme
  - type: text
    content: Je t'ai réveillé sous le pommier.
  - type: text
    content: C'est là que ta mère est tombée enceinte de toi,
  - type: text
    content: c'est là qu'elle est tombée enceinte et t'a donné le jour.
  '6':
  - type: text
    content: Fais de moi comme une empreinte sur ton cœur,
  - type: text
    content: comme une empreinte sur ton bras,
  - type: text
    content: car l'amour est aussi fort que la mort,
  - type: text
    content: la passion est aussi inflexible que le séjour des morts.
  - type: text
    content: Ses ardeurs sont des ardeurs de feu,
  - type: text
    content: une flamme de l'Eternel.
  '7':
  - type: text
    content: Les grandes eaux ne pourront pas éteindre l'amour,
  - type: text
    content: ni les fleuves le submerger.
  - type: text
    content: Même si un homme offrait tous les biens de sa maison contre l'amour,
  - type: text
    content: il ne s'attirerait que le mépris.
  - type: heading
    content: Les frères de la jeune femme
  '8':
  - type: text
    content: Nous avons une petite sœur
  - type: text
    content: qui n'a pas encore de poitrine.
  - type: text
    content: Que ferons-nous de notre sœur,
  - type: text
    content: le jour où on la réclamera?
  '9':
  - type: text
    content: Si elle est un rempart,
  - type: text
    content: nous construirons sur elle des créneaux en argent;
  - type: text
    content: si elle est une porte,
  - type: text
    content: nous la fermerons avec une planche de cèdre.
  - type: heading
    content: La jeune femme
