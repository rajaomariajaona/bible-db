document_id: SNG.8
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Si seulement tu étais comme mon frère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si seulement tu avais été allaité par ma mère!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te rencontrerais dehors, je t'embrasserais
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'on ne me mépriserait même pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je te conduirais, je t'amènerais chez ma mère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu m'instruirais et je te ferais boire du vin parfumé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: du jus de mes grenades.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Que sa main gauche soutienne ma tête
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que de sa main droite il m'enlace!
- type: usfm
  marker: sp
  children:
  - type: text
    text: Le jeune homme
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je vous en supplie, filles de Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne réveillez pas, ne réveillez pas l'amour
- type: usfm
  marker: q1
  children:
  - type: text
    text: avant qu'elle ne le veuille!
- type: usfm
  marker: sp
  children:
  - type: text
    text: Les filles de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Qui est celle qui monte du désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: appuyée sur son bien-aimé?
- type: usfm
  marker: sp
  children:
  - type: text
    text: La jeune femme
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t'ai réveillé sous le pommier.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est là que ta mère est tombée enceinte de toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est là qu'elle est tombée enceinte et t'a donné le jour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Fais de moi comme une empreinte sur ton cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme une empreinte sur ton bras,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car l'amour est aussi fort que la mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la passion est aussi inflexible que le séjour des morts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses ardeurs sont des ardeurs de feu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une flamme de l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les grandes eaux ne pourront pas éteindre l'amour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni les fleuves le submerger.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Même si un homme offrait tous les biens de sa maison contre l'amour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne s'attirerait que le mépris.
- type: usfm
  marker: sp
  children:
  - type: text
    text: Les frères de la jeune femme
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Nous avons une petite sœur
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui n'a pas encore de poitrine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que ferons-nous de notre sœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le jour où on la réclamera?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Si elle est un rempart,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous construirons sur elle des créneaux en argent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: si elle est une porte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous la fermerons avec une planche de cèdre.
- type: usfm
  marker: sp
  children:
  - type: text
    text: La jeune femme
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Je suis un rempart
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mes seins sont comme des tours.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A ses yeux, j'ai été pareille à celle qui trouve la paix.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Salomon avait une vigne à Baal-Hamon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il a confié la vigne à des gardiens:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: chacun apportait 1000 pièces d'argent pour récolter son fruit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ma vigne à moi, je la garde.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A toi, Salomon, les 1000 pièces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et 200 à ceux qui gardent son fruit!
- type: usfm
  marker: sp
  children:
  - type: text
    text: Le jeune homme
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Habitante des jardins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des compagnons prêtent attention à ta voix.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais-la-moi entendre!
- type: usfm
  marker: sp
  children:
  - type: text
    text: La jeune femme
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Prends la fuite, mon bien-aimé!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Montre-toi pareil à la gazelle ou au jeune cerf
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur les montagnes aux aromates!
