document_id: PSA.94,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jugement des méchants
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Dieu des vengeances, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu des vengeances, révèle-toi!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Celui qui corrige les nations ne punirait-il pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lui qui enseigne à l'homme la connaissance?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '*L''Eternel connaît les pensées de l''homme:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il sait qu'elles sont sans valeur.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '94.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'L''Eternel… valeur: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Corinthiens 3.20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' à propos de la prétendue sagesse du monde.'
      marker-yv: yv-n
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Heureux l'homme que tu corriges, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que tu enseignes, par ta loi,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: pour lui donner de la tranquillité quand vient le malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que la tombe est creusée pour le méchant!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: L'Eternel ne délaisse pas son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n'abandonne pas son héritage;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: car on rendra de nouveau un jugement juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous ceux dont le cœur est droit s'y conformeront.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Qui se lèvera pour moi contre ceux qui font le mal?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui me soutiendra contre ceux qui commettent l'injustice?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Si l'Eternel n'était pas mon secours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'habiterais bien vite dans le monde du silence.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Quand je dis: «Mon pied est en train de glisser»,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ta bonté, Eternel, me sert d'appui.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Quand mon cœur est agité par une foule de pensées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tes consolations me rendent la joie.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Lève-toi, juge de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: paie aux orgueilleux le salaire qu'ils méritent!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Comment pourrais-tu être le complice de mauvais juges
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui commettent des crimes au mépris de la loi?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ils se liguent contre le juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils condamnent l'innocent,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: mais l'Eternel est ma forteresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon Dieu est le rocher où je trouve un refuge.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Il fera retomber leur crime sur eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il les réduira au silence par leur méchanceté.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel, notre Dieu, les réduira au silence.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Jusqu'à quand les méchants, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu'à quand les méchants vont-ils triompher?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ils fanfaronnent, ils parlent avec arrogance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous ceux qui commettent l'injustice se vantent.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Eternel, ils écrasent ton peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils humilient ton héritage,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ils égorgent la veuve et l'étranger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils assassinent les orphelins,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'et ils disent: «L''Eternel ne le voit pas.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Dieu de Jacob n'y fait pas attention.»
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Faites attention, idiots!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hommes stupides, quand ferez-vous preuve de bon sens?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Celui qui a fixé l'oreille n'entendrait-il pas?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui a formé l'œil ne verrait-il pas?
