document_id: PSA.94,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Jugement des méchants
  - type: text
    content: Dieu des vengeances, Eternel,
  - type: text
    content: Dieu des vengeances, révèle-toi!
  '10':
  - type: text
    content: Celui qui corrige les nations ne punirait-il pas,
  - type: text
    content: lui qui enseigne à l'homme la connaissance?
  '11':
  - type: text
    content: '*L''Eternel connaît les pensées de l''homme:'
  - type: text
    content: il sait qu'elles sont sans valeur.
  - type: note
    content: 'L''Eternel… valeur: cité en 1 Corinthiens 3.20 à propos de la prétendue sagesse du monde.'
  '12':
  - type: text
    content: Heureux l'homme que tu corriges, Eternel,
  - type: text
    content: et que tu enseignes, par ta loi,
  '13':
  - type: text
    content: pour lui donner de la tranquillité quand vient le malheur,
  - type: text
    content: tandis que la tombe est creusée pour le méchant!
  '14':
  - type: text
    content: L'Eternel ne délaisse pas son peuple,
  - type: text
    content: il n'abandonne pas son héritage;
  '15':
  - type: text
    content: car on rendra de nouveau un jugement juste,
  - type: text
    content: et tous ceux dont le cœur est droit s'y conformeront.
  '16':
  - type: text
    content: Qui se lèvera pour moi contre ceux qui font le mal?
  - type: text
    content: Qui me soutiendra contre ceux qui commettent l'injustice?
  '17':
  - type: text
    content: Si l'Eternel n'était pas mon secours,
  - type: text
    content: j'habiterais bien vite dans le monde du silence.
  '18':
  - type: text
    content: 'Quand je dis: «Mon pied est en train de glisser»,'
  - type: text
    content: ta bonté, Eternel, me sert d'appui.
  '19':
  - type: text
    content: Quand mon cœur est agité par une foule de pensées,
  - type: text
    content: tes consolations me rendent la joie.
  '2':
  - type: text
    content: Lève-toi, juge de la terre,
  - type: text
    content: paie aux orgueilleux le salaire qu'ils méritent!
  '20':
  - type: text
    content: Comment pourrais-tu être le complice de mauvais juges
  - type: text
    content: qui commettent des crimes au mépris de la loi?
  '21':
  - type: text
    content: Ils se liguent contre le juste,
  - type: text
    content: ils condamnent l'innocent,
  '22':
  - type: text
    content: mais l'Eternel est ma forteresse,
  - type: text
    content: mon Dieu est le rocher où je trouve un refuge.
  '23':
  - type: text
    content: Il fera retomber leur crime sur eux,
  - type: text
    content: il les réduira au silence par leur méchanceté.
  - type: text
    content: L'Eternel, notre Dieu, les réduira au silence.
  '3':
  - type: text
    content: Jusqu'à quand les méchants, Eternel,
  - type: text
    content: jusqu'à quand les méchants vont-ils triompher?
  '4':
  - type: text
    content: Ils fanfaronnent, ils parlent avec arrogance,
  - type: text
    content: tous ceux qui commettent l'injustice se vantent.
  '5':
  - type: text
    content: Eternel, ils écrasent ton peuple,
  - type: text
    content: ils humilient ton héritage,
  '6':
  - type: text
    content: ils égorgent la veuve et l'étranger,
  - type: text
    content: ils assassinent les orphelins,
  '7':
  - type: text
    content: 'et ils disent: «L''Eternel ne le voit pas.'
  - type: text
    content: Le Dieu de Jacob n'y fait pas attention.»
  '8':
  - type: text
    content: Faites attention, idiots!
  - type: text
    content: Hommes stupides, quand ferez-vous preuve de bon sens?
  '9':
  - type: text
    content: Celui qui a fixé l'oreille n'entendrait-il pas?
  - type: text
    content: Celui qui a formé l'œil ne verrait-il pas?
