document_id: EZK.21,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Jugement d'Israël et des Ammonites
  - type: text
    content: 'La parole de l''Eternel m''a été adressée: '
  '10':
  - type: text
    content: Tous reconnaîtront alors que c'est moi, l'Eternel, qui ai tiré mon épée de son fourreau. Elle n'y rentrera plus.
  '11':
  - type: text
    content: '»Quant à toi, fils de l''homme, gémis! Plié en deux et rempli d''amertume, gémis sous leurs yeux! '
  '12':
  - type: text
    content: 'S''ils te demandent: ‘Pourquoi gémis-tu?’ tu répondras: ‘A cause d''une nouvelle qui arrive. Le courage fondra, tous baisseront les bras, tous les esprits seront défaillants, tous auront les genoux qui flanchent. La voici qui arrive, elle est là! déclare le Seigneur, l''Eternel.’»'
  '13':
  - type: text
    content: 'La parole de l''Eternel m''a été adressée: '
  '14':
  - type: text
    content: '«Fils de l''homme, prophétise! Tu diras: ‘Voici ce que dit le Seigneur.’'
  - type: text
    content: Annonce l'épée, l'épée!
  - type: text
    content: Elle est aiguisée, elle est bien polie.
  '15':
  - type: text
    content: C'est pour massacrer qu'elle est aiguisée,
  - type: text
    content: c'est pour étinceler qu'elle est polie.
  - type: text
    content: Comment pourrions-nous nous réjouir
  - type: text
    content: du sceptre de mon fils? L'épée méprise tout ce qui est en bois.
  '16':
  - type: text
    content: On l'a donnée à polir
  - type: text
    content: pour qu'elle soit prête à l'emploi.
  - type: text
    content: Elle est aiguisée, l'épée, elle est polie
  - type: text
    content: pour armer la main du tueur.
  '17':
  - type: text
    content: »Crie et lamente-toi, fils de l'homme,
  - type: text
    content: car elle est utilisée contre mon peuple,
  - type: text
    content: 'contre tous les princes d''Israël:'
  - type: text
    content: ils sont livrés à l'épée avec mon peuple.
  - type: text
    content: Frappe-toi donc la cuisse!
  '18':
  - type: text
    content: Oui, c'est la mise à l'épreuve!
  - type: text
    content: Et que se passera-t-il, si même le sceptre méprisé n'est plus là?
  - type: text
    content: déclare le Seigneur, l'Eternel.
  '19':
  - type: text
    content: »Quant à toi, fils de l'homme, prophétise!
  - type: text
    content: Frappe des mains
  - type: text
    content: et les coups d'épée redoubleront, tripleront!
  - type: text
    content: C'est l'épée du carnage, l'épée du grand carnage,
  - type: text
    content: l'épée qui doit les poursuivre
  '2':
  - type: text
    content: '«Fils de l''homme, tourne ton visage vers la droite et interpelle le sud! Prophétise à l''intention de la forêt qui est dans la région du Néguev! '
  '20':
  - type: text
    content: pour que les cœurs se liquéfient,
  - type: text
    content: que les chutes se multiplient.
  - type: text
    content: »A toutes leurs portes, je les menace de l'épée.
  - type: text
    content: Ah! elle est faite pour étinceler,
  - type: text
    content: elle est aiguisée pour massacrer.
  '21':
  - type: text
    content: Rassemble tes forces, tourne-toi à droite!
  - type: text
    content: Replace-toi, tourne-toi à gauche!
  - type: text
    content: Fais face de tous les côtés!
  '22':
  - type: text
    content: Moi aussi, je frapperai des mains
  - type: text
    content: et j'assouvirai ma fureur.
  - type: text
    content: C'est moi, l'Eternel, qui ai parlé.»
  '23':
  - type: text
    content: 'La parole de l''Eternel m''a été adressée: '
  '24':
  - type: text
    content: '«Et toi, fils de l''homme, trace deux chemins que pourra emprunter l''épée du roi de Babylone. Tous les deux doivent sortir du même pays. Au début des chemins, place un panneau qui signale la ville où ils conduisent. '
  '25':
  - type: text
    content: 'Tu traceras l''un des chemins pour que l''épée arrive à Rabba, la capitale des Ammonites, et l''autre pour qu''elle arrive en Juda, à Jérusalem, la ville fortifiée. '
  '26':
  - type: text
    content: 'En effet, le roi de Babylone se tient au carrefour, au début des deux chemins, pour faire des prédictions: il secoue les flèches, il interroge les théraphim, il examine le foie. '
  '27':
  - type: text
    content: 'Dans sa main droite se trouve le sort qui désigne Jérusalem: on devra y placer des machines de guerre, commander la tuerie et pousser des cris de guerre; on positionnera des machines de guerre contre les portes, on mettra en place des remblais, on construira des retranchements. '
  '28':
  - type: text
    content: Ils ne voient là que de fausses prédictions, eux qui se sont engagés par serment. Mais lui se souvient de leur faute, de sorte qu'ils seront capturés.
  '29':
  - type: text
    content: '»C''est pourquoi, voici ce que dit le Seigneur, l''Eternel: Puisque vous avez fait en sorte qu''on se souvienne de votre faute en dévoilant vos transgressions, en faisant apparaître vos péchés dans tous vos agissements, puisqu''on n''a pas pu vous oublier, il vous capturera.'
  '3':
  - type: text
    content: 'Tu diras à la forêt du Néguev: ‘Ecoute la parole de l''Eternel! Voici ce que dit le Seigneur, l''Eternel: Je vais allumer un feu à l''intérieur de toi, et il dévorera tout arbre vert et tout arbre sec. Cet incendie ne s''éteindra pas et tous les visages en porteront les cicatrices, du sud au nord.’ '
  '30':
  - type: text
    content: '»Quant à toi, méchant et sacrilège prince d''Israël, ton heure arrive au moment où la faute est à son comble. '
  '31':
  - type: text
    content: 'Voici ce que dit le Seigneur, l''Eternel: La tiare sera retirée, le diadème sera enlevé. Tout va changer: ce qui est bas sera élevé, et ce qui est haut sera abaissé. '
  '32':
  - type: text
    content: J'en ferai une ruine, une terrible ruine. Il n'y en aura plus de pareille jusqu'à la venue de celui à qui appartient le jugement, celui à qui je l'aurai remis.
  '33':
  - type: text
    content: '»Quant à toi, fils de l''homme, prophétise! Tu annonceras: ‘Voici ce que dit le Seigneur, l''Eternel, au sujet des Ammonites et de leurs insultes.’ Tu annonceras l''épée, l''épée. Elle est tirée pour massacrer, elle est polie pour dévorer, pour étinceler! '
  '34':
  - type: text
    content: '‘Malgré tes fausses visions et tes prédictions mensongères, l''épée te fera tomber parmi les cadavres des méchants, ceux dont l''heure arrive au moment où la faute est à son comble. '
  '35':
  - type: text
    content: 'Remets ton épée dans son fourreau! Je te jugerai là où tu as été créé, dans ton pays d''origine. '
  '36':
  - type: text
    content: 'Je déverserai mon indignation sur toi, je soufflerai contre toi avec le feu de ma fureur et je te livrerai à des hommes brutaux, spécialistes de la destruction. '
  '37':
  - type: text
    content: Tu ne serviras qu'à nourrir le feu; ton sang coulera au milieu du pays; on ne se souviendra plus de toi.’ En effet, moi, l'Eternel, j'ai parlé.»
  '4':
  - type: text
    content: Tous comprendront alors que c'est moi, l'Eternel, qui ai allumé ce feu. Il ne s'éteindra pas.»
  '5':
  - type: text
    content: 'J''ai dit: «Ah! Seigneur Eternel! Eux, ils disent de moi: ‘Ne raconte-t-il pas des histoires?’»'
  '6':
  - type: text
    content: 'La parole de l''Eternel m''a été adressée: '
  '7':
  - type: text
    content: '«Fils de l''homme, tourne ton visage vers Jérusalem et interpelle les lieux saints! Prophétise à l''intention du territoire d''Israël! '
  '8':
  - type: text
    content: 'Tu diras au territoire d''Israël: ‘Voici ce que dit l''Eternel: Je m''en prends à toi. Je tirerai mon épée de son fourreau et j''éliminerai de chez toi le juste et le méchant. '
  '9':
  - type: text
    content: 'Puisque je veux éliminer de chez toi le juste et le méchant, mon épée sortira de son fourreau pour les frapper tous, du sud au nord.’ '
