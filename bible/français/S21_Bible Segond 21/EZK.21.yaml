document_id: EZK.21
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jugement d'Israël et des Ammonites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La parole de l''Eternel m''a été adressée: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Fils de l''homme, tourne ton visage vers la droite et interpelle le sud! Prophétise à l''intention de la forêt qui est dans la région du Néguev! '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu diras à la forêt du Néguev: ‘Ecoute la parole de l''Eternel! Voici ce que dit le Seigneur, l''Eternel: Je vais allumer un feu à l''intérieur de toi, et il dévorera tout arbre vert et tout arbre sec. Cet incendie ne s''éteindra pas et tous les visages en porteront les cicatrices, du sud au nord.’ '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tous comprendront alors que c'est moi, l'Eternel, qui ai allumé ce feu. Il ne s'éteindra pas.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'J''ai dit: «Ah! Seigneur Eternel! Eux, ils disent de moi: ‘Ne raconte-t-il pas des histoires?’»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'La parole de l''Eternel m''a été adressée: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '«Fils de l''homme, tourne ton visage vers Jérusalem et interpelle les lieux saints! Prophétise à l''intention du territoire d''Israël! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tu diras au territoire d''Israël: ‘Voici ce que dit l''Eternel: Je m''en prends à toi. Je tirerai mon épée de son fourreau et j''éliminerai de chez toi le juste et le méchant. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Puisque je veux éliminer de chez toi le juste et le méchant, mon épée sortira de son fourreau pour les frapper tous, du sud au nord.’ '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tous reconnaîtront alors que c'est moi, l'Eternel, qui ai tiré mon épée de son fourreau. Elle n'y rentrera plus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '»Quant à toi, fils de l''homme, gémis! Plié en deux et rempli d''amertume, gémis sous leurs yeux! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'S''ils te demandent: ‘Pourquoi gémis-tu?’ tu répondras: ‘A cause d''une nouvelle qui arrive. Le courage fondra, tous baisseront les bras, tous les esprits seront défaillants, tous auront les genoux qui flanchent. La voici qui arrive, elle est là! déclare le Seigneur, l''Eternel.’»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'La parole de l''Eternel m''a été adressée: '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '«Fils de l''homme, prophétise! Tu diras: ‘Voici ce que dit le Seigneur.’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Annonce l'épée, l'épée!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle est aiguisée, elle est bien polie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: C'est pour massacrer qu'elle est aiguisée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est pour étinceler qu'elle est polie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comment pourrions-nous nous réjouir
- type: usfm
  marker: q1
  children:
  - type: text
    text: du sceptre de mon fils? L'épée méprise tout ce qui est en bois.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: On l'a donnée à polir
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour qu'elle soit prête à l'emploi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle est aiguisée, l'épée, elle est polie
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour armer la main du tueur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: »Crie et lamente-toi, fils de l'homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car elle est utilisée contre mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'contre tous les princes d''Israël:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sont livrés à l'épée avec mon peuple.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Frappe-toi donc la cuisse!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Oui, c'est la mise à l'épreuve!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et que se passera-t-il, si même le sceptre méprisé n'est plus là?
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare le Seigneur, l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: »Quant à toi, fils de l'homme, prophétise!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Frappe des mains
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les coups d'épée redoubleront, tripleront!
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est l'épée du carnage, l'épée du grand carnage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'épée qui doit les poursuivre
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: pour que les cœurs se liquéfient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que les chutes se multiplient.
- type: usfm
  marker: q1
  children:
  - type: text
    text: »A toutes leurs portes, je les menace de l'épée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ah! elle est faite pour étinceler,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle est aiguisée pour massacrer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Rassemble tes forces, tourne-toi à droite!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Replace-toi, tourne-toi à gauche!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais face de tous les côtés!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Moi aussi, je frapperai des mains
- type: usfm
  marker: q1
  children:
  - type: text
    text: et j'assouvirai ma fureur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est moi, l'Eternel, qui ai parlé.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'La parole de l''Eternel m''a été adressée: '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '«Et toi, fils de l''homme, trace deux chemins que pourra emprunter l''épée du roi de Babylone. Tous les deux doivent sortir du même pays. Au début des chemins, place un panneau qui signale la ville où ils conduisent. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tu traceras l''un des chemins pour que l''épée arrive à Rabba, la capitale des Ammonites, et l''autre pour qu''elle arrive en Juda, à Jérusalem, la ville fortifiée. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'En effet, le roi de Babylone se tient au carrefour, au début des deux chemins, pour faire des prédictions: il secoue les flèches, il interroge les théraphim, il examine le foie. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dans sa main droite se trouve le sort qui désigne Jérusalem: on devra y placer des machines de guerre, commander la tuerie et pousser des cris de guerre; on positionnera des machines de guerre contre les portes, on mettra en place des remblais, on construira des retranchements. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ils ne voient là que de fausses prédictions, eux qui se sont engagés par serment. Mais lui se souvient de leur faute, de sorte qu'ils seront capturés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '»C''est pourquoi, voici ce que dit le Seigneur, l''Eternel: Puisque vous avez fait en sorte qu''on se souvienne de votre faute en dévoilant vos transgressions, en faisant apparaître vos péchés dans tous vos agissements, puisqu''on n''a pas pu vous oublier, il vous capturera.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '»Quant à toi, méchant et sacrilège prince d''Israël, ton heure arrive au moment où la faute est à son comble. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Voici ce que dit le Seigneur, l''Eternel: La tiare sera retirée, le diadème sera enlevé. Tout va changer: ce qui est bas sera élevé, et ce qui est haut sera abaissé. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: J'en ferai une ruine, une terrible ruine. Il n'y en aura plus de pareille jusqu'à la venue de celui à qui appartient le jugement, celui à qui je l'aurai remis.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '»Quant à toi, fils de l''homme, prophétise! Tu annonceras: ‘Voici ce que dit le Seigneur, l''Eternel, au sujet des Ammonites et de leurs insultes.’ Tu annonceras l''épée, l''épée. Elle est tirée pour massacrer, elle est polie pour dévorer, pour étinceler! '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: '‘Malgré tes fausses visions et tes prédictions mensongères, l''épée te fera tomber parmi les cadavres des méchants, ceux dont l''heure arrive au moment où la faute est à son comble. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Remets ton épée dans son fourreau! Je te jugerai là où tu as été créé, dans ton pays d''origine. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Je déverserai mon indignation sur toi, je soufflerai contre toi avec le feu de ma fureur et je te livrerai à des hommes brutaux, spécialistes de la destruction. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Tu ne serviras qu'à nourrir le feu; ton sang coulera au milieu du pays; on ne se souviendra plus de toi.’ En effet, moi, l'Eternel, j'ai parlé.»
