document_id: EZK.12,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jugement du roi et dispersion d'Israël
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l''Eternel m''a été adressée: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Annonce-leur: ‘Voici ce que dit le Seigneur, l''Eternel: Ce message concerne le prince qui est à Jérusalem et toute la communauté d''Israël qui s''y trouve.’'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»Dis: ‘Je suis pour vous un signe.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ce que j''ai fait, c''est ce qui leur sera fait:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils iront en exil, en déportation.’
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le prince qui est au milieu d'eux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: portera ses affaires sur l'épaule en pleine obscurité.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il sortira par l'endroit où l'on aura percé la muraille pour le faire sortir.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il se couvrira le visage
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de façon à ne pas voir lui-même où il va.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'étendrai mon piège sur lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il sera pris dans mon filet.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je l'emmènerai à Babylone, dans le pays des Babyloniens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il ne le verra pas et il y mourra.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout son entourage, ses aides
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et toutes ses troupes, je les disperserai à tout vent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je les poursuivrai avec l'épée.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils reconnaîtront que je suis l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand je les éparpillerai parmi les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand je les disperserai dans divers pays.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Cependant, je laisserai parmi eux quelques hommes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui échapperont à l'épée, à la famine et à la peste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin qu'ils racontent quelles ont été toutes leurs pratiques abominables
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parmi les nations où ils arriveront.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils reconnaîtront alors que je suis l'Eternel.»
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l''Eternel m''a été adressée:'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Fils de l'homme, tu mangeras ton pain en tremblant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu boiras ton eau dans l'inquiétude et l'angoisse.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu diras au peuple du pays:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Voici ce que dit le Seigneur, l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au sujet des habitants de Jérusalem qui vivent sur le territoire d'Israël!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils mangeront leur pain dans l'angoisse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils boiront leur eau avec frayeur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce que leur pays sera dépouillé de tout ce qu'il contient
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de la violence de tous ses habitants.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Fils de l''homme, tu habites au milieu d''une communauté de rebelles qui ont des yeux pour voir mais qui ne voient pas, des oreilles pour entendre mais qui n''entendent pas. En effet, c''est une communauté de rebelles. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les villes peuplées seront dévastées
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le pays deviendra un désert.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous reconnaîtrez alors que je suis l'Eternel.’»
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l''Eternel m''a été adressée:'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Fils de l'homme, que signifie ce proverbe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'qui circule parmi vous à propos du territoire d''Israël:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Le temps passe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et aucune vision ne s'est réalisée’?
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C''est pourquoi, annonce-leur:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘Voici ce que dit le Seigneur, l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai taire ce proverbe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on ne le prononcera plus en Israël.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dis-leur au contraire:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Il est proche, le temps où toutes les visions deviendront réalité.’
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »En effet, il n'y aura plus de fausse vision
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni d'oracle flatteur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au milieu de la communauté d'Israël.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, moi, l'Eternel, je dirai
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce que j'ai à dire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et cela s'accomplira sans plus aucun délai.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, de votre vivant, communauté de rebelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je prononcerai une parole et je l'accomplirai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare le Seigneur, l'Eternel.»
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l''Eternel m''a été adressée:'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '«Fils de l''homme, la communauté d''Israël dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Les visions qu'il a ne sont pas près de s'accomplir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est pour des temps éloignés qu'il prophétise.’
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C''est pourquoi, annonce-leur:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘Voici ce que dit le Seigneur, l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n'y aura plus de délai pour aucune de mes paroles.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La parole que je prononcerai s'accomplira,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare le Seigneur, l'Eternel.’»
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant à toi, fils de l''homme, prépare tes affaires comme le font ceux qui partent en exil et pars en exil sous leurs yeux, en plein jour! Tu partiras en exil de l''endroit où tu habites vers un autre endroit, et ce sous leurs yeux. Peut-être comprendront-ils qu''ils sont une communauté de rebelles. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu sortiras tes affaires d''homme exilé en plein jour, sous leurs yeux, mais toi, tu partiras le soir, en leur présence, comme le font des exilés. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sous leurs yeux, perce le mur par lequel tu sortiras tes affaires! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sous leurs yeux, tu les porteras sur l'épaule, tu les sortiras en pleine obscurité et tu te couvriras le visage de façon à ne pas voir où tu vas, car je veux que tu sois un signe pour la communauté d'Israël.»
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai donc fait ce qui m''avait été ordonné: j''ai sorti mes affaires d''homme exilé en plein jour. Le soir, sous leurs yeux, j''ai fait à la main un trou dans le mur, je les ai sorties en pleine obscurité et je les ai portées sur l''épaule.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le matin, la parole de l''Eternel m''a été adressée: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Fils de l''homme, la communauté d''Israël, cette communauté de rebelles, ne t''a-t-elle pas demandé: ‘Que fais-tu?’ '
