document_id: EZK.12,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Jugement du roi et dispersion d'Israël
  - type: text
    content: 'La parole de l''Eternel m''a été adressée: '
  '10':
  - type: text
    content: 'Annonce-leur: ‘Voici ce que dit le Seigneur, l''Eternel: Ce message concerne le prince qui est à Jérusalem et toute la communauté d''Israël qui s''y trouve.’'
  '11':
  - type: text
    content: '»Dis: ‘Je suis pour vous un signe.'
  - type: text
    content: 'Ce que j''ai fait, c''est ce qui leur sera fait:'
  - type: text
    content: ils iront en exil, en déportation.’
  '12':
  - type: text
    content: Le prince qui est au milieu d'eux
  - type: text
    content: portera ses affaires sur l'épaule en pleine obscurité.
  - type: text
    content: Il sortira par l'endroit où l'on aura percé la muraille pour le faire sortir.
  - type: text
    content: Il se couvrira le visage
  - type: text
    content: de façon à ne pas voir lui-même où il va.
  '13':
  - type: text
    content: J'étendrai mon piège sur lui
  - type: text
    content: et il sera pris dans mon filet.
  - type: text
    content: Je l'emmènerai à Babylone, dans le pays des Babyloniens,
  - type: text
    content: mais il ne le verra pas et il y mourra.
  '14':
  - type: text
    content: Tout son entourage, ses aides
  - type: text
    content: et toutes ses troupes, je les disperserai à tout vent
  - type: text
    content: et je les poursuivrai avec l'épée.
  '15':
  - type: text
    content: Ils reconnaîtront que je suis l'Eternel,
  - type: text
    content: quand je les éparpillerai parmi les nations,
  - type: text
    content: quand je les disperserai dans divers pays.
  '16':
  - type: text
    content: »Cependant, je laisserai parmi eux quelques hommes
  - type: text
    content: qui échapperont à l'épée, à la famine et à la peste,
  - type: text
    content: afin qu'ils racontent quelles ont été toutes leurs pratiques abominables
  - type: text
    content: parmi les nations où ils arriveront.
  - type: text
    content: Ils reconnaîtront alors que je suis l'Eternel.»
  '17':
  - type: text
    content: 'La parole de l''Eternel m''a été adressée:'
  '18':
  - type: text
    content: «Fils de l'homme, tu mangeras ton pain en tremblant,
  - type: text
    content: tu boiras ton eau dans l'inquiétude et l'angoisse.
  '19':
  - type: text
    content: 'Tu diras au peuple du pays:'
  - type: text
    content: ‘Voici ce que dit le Seigneur, l'Eternel,
  - type: text
    content: au sujet des habitants de Jérusalem qui vivent sur le territoire d'Israël!
  - type: text
    content: Ils mangeront leur pain dans l'angoisse
  - type: text
    content: et ils boiront leur eau avec frayeur,
  - type: text
    content: parce que leur pays sera dépouillé de tout ce qu'il contient
  - type: text
    content: à cause de la violence de tous ses habitants.
  '2':
  - type: text
    content: '«Fils de l''homme, tu habites au milieu d''une communauté de rebelles qui ont des yeux pour voir mais qui ne voient pas, des oreilles pour entendre mais qui n''entendent pas. En effet, c''est une communauté de rebelles. '
  '20':
  - type: text
    content: Les villes peuplées seront dévastées
  - type: text
    content: et le pays deviendra un désert.
  - type: text
    content: Vous reconnaîtrez alors que je suis l'Eternel.’»
  '21':
  - type: text
    content: 'La parole de l''Eternel m''a été adressée:'
  '22':
  - type: text
    content: «Fils de l'homme, que signifie ce proverbe
  - type: text
    content: 'qui circule parmi vous à propos du territoire d''Israël:'
  - type: text
    content: ‘Le temps passe
  - type: text
    content: et aucune vision ne s'est réalisée’?
  '23':
  - type: text
    content: 'C''est pourquoi, annonce-leur:'
  - type: text
    content: '‘Voici ce que dit le Seigneur, l''Eternel:'
  - type: text
    content: Je ferai taire ce proverbe,
  - type: text
    content: on ne le prononcera plus en Israël.’
  - type: text
    content: 'Dis-leur au contraire:'
  - type: text
    content: ‘Il est proche, le temps où toutes les visions deviendront réalité.’
  '24':
  - type: text
    content: »En effet, il n'y aura plus de fausse vision
  - type: text
    content: ni d'oracle flatteur
  - type: text
    content: au milieu de la communauté d'Israël.
  '25':
  - type: text
    content: En effet, moi, l'Eternel, je dirai
  - type: text
    content: ce que j'ai à dire
  - type: text
    content: et cela s'accomplira sans plus aucun délai.
  - type: text
    content: Oui, de votre vivant, communauté de rebelles,
  - type: text
    content: je prononcerai une parole et je l'accomplirai,
  - type: text
    content: déclare le Seigneur, l'Eternel.»
  '26':
  - type: text
    content: 'La parole de l''Eternel m''a été adressée:'
  '27':
  - type: text
    content: '«Fils de l''homme, la communauté d''Israël dit:'
  - type: text
    content: ‘Les visions qu'il a ne sont pas près de s'accomplir,
  - type: text
    content: c'est pour des temps éloignés qu'il prophétise.’
  '28':
  - type: text
    content: 'C''est pourquoi, annonce-leur:'
  - type: text
    content: '‘Voici ce que dit le Seigneur, l''Eternel:'
  - type: text
    content: Il n'y aura plus de délai pour aucune de mes paroles.
  - type: text
    content: La parole que je prononcerai s'accomplira,
  - type: text
    content: déclare le Seigneur, l'Eternel.’»
  '3':
  - type: text
    content: 'Quant à toi, fils de l''homme, prépare tes affaires comme le font ceux qui partent en exil et pars en exil sous leurs yeux, en plein jour! Tu partiras en exil de l''endroit où tu habites vers un autre endroit, et ce sous leurs yeux. Peut-être comprendront-ils qu''ils sont une communauté de rebelles. '
  '4':
  - type: text
    content: 'Tu sortiras tes affaires d''homme exilé en plein jour, sous leurs yeux, mais toi, tu partiras le soir, en leur présence, comme le font des exilés. '
  '5':
  - type: text
    content: 'Sous leurs yeux, perce le mur par lequel tu sortiras tes affaires! '
  '6':
  - type: text
    content: Sous leurs yeux, tu les porteras sur l'épaule, tu les sortiras en pleine obscurité et tu te couvriras le visage de façon à ne pas voir où tu vas, car je veux que tu sois un signe pour la communauté d'Israël.»
  '7':
  - type: text
    content: 'J''ai donc fait ce qui m''avait été ordonné: j''ai sorti mes affaires d''homme exilé en plein jour. Le soir, sous leurs yeux, j''ai fait à la main un trou dans le mur, je les ai sorties en pleine obscurité et je les ai portées sur l''épaule.'
  '8':
  - type: text
    content: 'Le matin, la parole de l''Eternel m''a été adressée: '
  '9':
  - type: text
    content: '«Fils de l''homme, la communauté d''Israël, cette communauté de rebelles, ne t''a-t-elle pas demandé: ‘Que fais-tu?’ '
