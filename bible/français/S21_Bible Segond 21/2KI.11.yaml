document_id: 2KI.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne d'Athalie sur Juda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Quand Athalie, la mère d''Achazia, vit que son fils était mort, elle se leva et fit disparaître toute la descendance royale. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Cependant Joshéba, fille du roi Joram et sœur d''Achazia, prit Joas, le fils d''Achazia, et l''enleva du groupe des fils du roi quand on les fit mourir. Elle le mit avec sa nourrice dans une chambre à coucher du temple. C''est ainsi qu''on le cacha à Athalie et il ne fut pas mis à mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il resta 6 ans caché avec Joshéba dans la maison de l'Eternel, tandis qu'Athalie régnait sur le pays.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Au bout de 7 ans, Jehojada envoya chercher les chefs de centaines des Kéréthiens et des gardes, et il les fit venir vers lui dans la maison de l''Eternel. Il fit alliance avec eux, leur fit prêter serment dans la maison de l''Eternel et leur montra le fils du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Puis il leur donna les ordres suivants: «Voici ce que vous ferez. Parmi ceux d''entre vous qui prennent leur service le jour du sabbat, un tiers devra monter la garde au palais royal, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'un tiers à la porte de Sur et un tiers à la porte située derrière les gardes. Vous garderez le temple de manière à en contrôler l''accès. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Vos deux autres divisions, c''est-à-dire tous ceux qui sortent de service le jour du sabbat, monteront la garde à la maison de l''Eternel vers le roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Vous entourerez le roi de tous les côtés, chacun les armes à la main, et l'on donnera la mort à toute personne qui voudra forcer les rangs. Vous serez près du roi dans toutes ses allées et venues.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Les chefs de centaines suivirent tous les ordres qu''avait donnés le prêtre Jehojada. Ils prirent chacun leurs hommes, aussi bien ceux qui entraient en service que ceux qui sortaient de service le jour du sabbat, et ils se rendirent vers le prêtre Jehojada. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le prêtre remit aux chefs de centaines les lances et les boucliers qui venaient du roi David et qui se trouvaient dans la maison de l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Chacun les armes à la main, les gardes entourèrent le roi en se plaçant en demi-cercle devant l''autel et le temple, depuis le côté droit jusqu''au côté gauche du bâtiment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le prêtre fit avancer le fils du roi, mit sur lui la couronne et lui donna le témoignage
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le témoignage: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: terme qui désignait en général les tables de la loi conservées dans l'arche de l'alliance.
    marker-yv: yv-n
  - type: text
    text: '. Ils le proclamèrent roi, le consacrèrent par onction et dirent en tapant des mains: «Vive le roi!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Athalie entendit le bruit que faisaient les gardes et le peuple, et elle vint vers le peuple à la maison de l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Elle regarda et vit le roi qui se tenait sur l''estrade, conformément à la coutume; les chefs et les joueurs de trompette se tenaient près de lui. Tout le peuple du pays était dans la joie, et l''on sonnait de la trompette. Athalie déchira ses habits et cria: «C''est une conspiration! C''est une conspiration!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Alors le prêtre Jehojada donna cet ordre aux chefs de centaines qui étaient à la tête de l''armée: «Faites-la sortir des rangs et tuez par l''épée toute personne qui la suivra.» En effet, le prêtre avait interdit qu''elle soit mise à mort dans la maison de l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: On l'entraîna de force et elle arriva au palais royal par l'entrée des chevaux. C'est là qu'elle fut mise à mort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jehojada conclut entre l''Eternel, le roi et le peuple une alliance par laquelle ils devaient être le peuple de l''Eternel; il établit aussi une alliance entre le roi et le peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tout le peuple du pays se rua vers le temple de Baal. Ils le démolirent, brisèrent entièrement ses autels et ses statues, et ils tuèrent Matthan, le prêtre de Baal, devant les autels. Le prêtre Jehojada établit des surveillants chargés de la maison de l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il prit les chefs de centaines, les Kéréthiens et les gardes, ainsi que tout le peuple du pays, et ils firent descendre le roi de la maison de l''Eternel. Ils entrèrent dans le palais royal par la porte des gardes et Joas s''assit sur le trône royal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tout le peuple du pays se réjouissait et la ville était tranquille. On avait fait mourir Athalie par l'épée dans le palais royal.
