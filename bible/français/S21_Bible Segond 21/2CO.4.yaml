document_id: 2CO.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Un ministère parsemé de difficultés
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ainsi donc, puisque par la bonté de Dieu nous avons ce ministère, nous ne perdons pas courage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nous rejetons les actions honteuses qui se font en secret, nous ne nous conduisons pas avec ruse et nous ne falsifions pas la parole de Dieu. Au contraire, en faisant connaître clairement la vérité, nous nous recommandons à toute conscience d''homme devant Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Si notre Evangile est encore voilé, il l''est pour ceux qui périssent, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'pour les incrédules dont le dieu de ce monde a aveuglé l''intelligence afin qu''ils ne voient pas briller l''éclat que projette l''Evangile de la gloire de Christ, qui est l''image de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nous ne nous prêchons pas nous-mêmes: c''est Jésus-Christ le Seigneur que nous prêchons, et nous nous déclarons vos serviteurs à cause de Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: En effet, le Dieu qui a ordonné que la lumière brille du sein des ténèbres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Que la lumière… ténèbres: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'renvoi à '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Genèse 1.3
      metadata:
        usfm: GEN.1.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (récit de la création).'
    marker-yv: yv-n
  - type: text
    text: ' a aussi fait briller sa lumière dans notre cœur pour faire resplendir la connaissance de la gloire de Dieu dans la personne de [Jésus-]Christ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nous portons ce trésor dans des vases de terre afin que cette puissance extraordinaire soit attribuée à Dieu, et non à nous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nous sommes pressés de toutes parts, mais non écrasés; inquiets, mais non désespérés; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'persécutés, mais non abandonnés; abattus, mais non anéantis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Nous portons toujours avec nous dans notre corps l''agonie du [Seigneur] Jésus afin que la vie de Jésus soit aussi manifestée dans notre corps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'En effet, nous qui vivons, nous sommes sans cesse livrés à la mort à cause de Jésus afin que la vie de Jésus soit elle aussi révélée dans notre corps mortel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ainsi la mort est à l'œuvre en nous, et la vie en vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et comme nous avons le même esprit de foi que celui exprimé dans cette parole de l''Ecriture: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: J'ai cru, c'est pourquoi j'ai parlé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'J''ai cru… parlé: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 116.10
      metadata:
        usfm: PSA.116.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', nous aussi nous croyons, et c''est pour cela que nous parlons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nous savons en effet que celui qui a ressuscité le Seigneur Jésus nous ressuscitera aussi par Jésus et nous fera paraître avec vous dans sa présence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Oui, tout cela arrive à cause de vous afin que la grâce, en se multipliant, fasse abonder la reconnaissance d'un plus grand nombre, à la gloire de Dieu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'espérance du ciel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Voilà pourquoi nous ne perdons pas courage. Et même si notre être extérieur se détruit, notre être intérieur se renouvelle de jour en jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'En effet, nos légères difficultés du moment présent produisent pour nous, au-delà de toute mesure, un poids éternel de gloire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ainsi nous regardons non pas à ce qui est visible, mais à ce qui est invisible, car les réalités visibles sont passagères et les invisibles sont éternelles.
