document_id: 2CO.4,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Un ministère parsemé de difficultés
  - type: text
    content: 'Ainsi donc, puisque par la bonté de Dieu nous avons ce ministère, nous ne perdons pas courage. '
  '10':
  - type: text
    content: 'Nous portons toujours avec nous dans notre corps l''agonie du [Seigneur] Jésus afin que la vie de Jésus soit aussi manifestée dans notre corps. '
  '11':
  - type: text
    content: 'En effet, nous qui vivons, nous sommes sans cesse livrés à la mort à cause de Jésus afin que la vie de Jésus soit elle aussi révélée dans notre corps mortel. '
  '12':
  - type: text
    content: Ainsi la mort est à l'œuvre en nous, et la vie en vous.
  '13':
  - type: text
    content: 'Et comme nous avons le même esprit de foi que celui exprimé dans cette parole de l''Ecriture: '
  - type: text
    content: J'ai cru, c'est pourquoi j'ai parlé
  - type: note
    content: 'J''ai cru… parlé: citation du Psaume 116.10.'
  - type: text
    content: ', nous aussi nous croyons, et c''est pour cela que nous parlons. '
  '14':
  - type: text
    content: 'Nous savons en effet que celui qui a ressuscité le Seigneur Jésus nous ressuscitera aussi par Jésus et nous fera paraître avec vous dans sa présence. '
  '15':
  - type: text
    content: Oui, tout cela arrive à cause de vous afin que la grâce, en se multipliant, fasse abonder la reconnaissance d'un plus grand nombre, à la gloire de Dieu.
  - type: heading
    content: L'espérance du ciel
  '16':
  - type: text
    content: 'Voilà pourquoi nous ne perdons pas courage. Et même si notre être extérieur se détruit, notre être intérieur se renouvelle de jour en jour. '
  '17':
  - type: text
    content: 'En effet, nos légères difficultés du moment présent produisent pour nous, au-delà de toute mesure, un poids éternel de gloire. '
  '18':
  - type: text
    content: Ainsi nous regardons non pas à ce qui est visible, mais à ce qui est invisible, car les réalités visibles sont passagères et les invisibles sont éternelles.
  '2':
  - type: text
    content: 'Nous rejetons les actions honteuses qui se font en secret, nous ne nous conduisons pas avec ruse et nous ne falsifions pas la parole de Dieu. Au contraire, en faisant connaître clairement la vérité, nous nous recommandons à toute conscience d''homme devant Dieu. '
  '3':
  - type: text
    content: 'Si notre Evangile est encore voilé, il l''est pour ceux qui périssent, '
  '4':
  - type: text
    content: 'pour les incrédules dont le dieu de ce monde a aveuglé l''intelligence afin qu''ils ne voient pas briller l''éclat que projette l''Evangile de la gloire de Christ, qui est l''image de Dieu. '
  '5':
  - type: text
    content: 'Nous ne nous prêchons pas nous-mêmes: c''est Jésus-Christ le Seigneur que nous prêchons, et nous nous déclarons vos serviteurs à cause de Jésus. '
  '6':
  - type: text
    content: En effet, le Dieu qui a ordonné que la lumière brille du sein des ténèbres
  - type: note
    content: 'Que la lumière… ténèbres: renvoi à Genèse 1.3 (récit de la création).'
  - type: text
    content: ' a aussi fait briller sa lumière dans notre cœur pour faire resplendir la connaissance de la gloire de Dieu dans la personne de [Jésus-]Christ.'
  '7':
  - type: text
    content: 'Nous portons ce trésor dans des vases de terre afin que cette puissance extraordinaire soit attribuée à Dieu, et non à nous. '
  '8':
  - type: text
    content: 'Nous sommes pressés de toutes parts, mais non écrasés; inquiets, mais non désespérés; '
  '9':
  - type: text
    content: 'persécutés, mais non abandonnés; abattus, mais non anéantis. '
