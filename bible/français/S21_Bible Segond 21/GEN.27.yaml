document_id: GEN.27,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Histoire de Jacob
  - type: heading
    content: 27.1–36.43
  - type: heading
    content: Vol de la bénédiction d'Esaü
  - type: text
    content: 'Isaac devenait vieux et ses yeux s''étaient affaiblis au point qu''il ne voyait plus. Alors il appela son fils aîné Esaü et lui dit: «Mon fils!» Il lui répondit: «Me voici!» '
  '10':
  - type: text
    content: 'et tu le lui apporteras à manger afin qu''il te bénisse avant sa mort.» '
  '11':
  - type: text
    content: 'Jacob répondit à sa mère: «Mon frère Esaü est velu, tandis que moi, je n''ai pas de poils. '
  '12':
  - type: text
    content: 'Peut-être mon père me touchera-t-il et je passerai à ses yeux pour un menteur. J''attirerai alors sur moi la malédiction, et non la bénédiction.» '
  '13':
  - type: text
    content: 'Sa mère lui dit: «Que cette malédiction retombe sur moi, mon fils! Ecoute-moi seulement et va me prendre les chevreaux.» '
  '14':
  - type: text
    content: 'Jacob alla les prendre et les apporta à sa mère, qui prépara un plat comme son père les aimait. '
  '15':
  - type: text
    content: 'Ensuite, Rebecca prit les vêtements de son fils aîné Esaü, les plus beaux qui se trouvaient à la maison, et elle les fit mettre à son fils cadet Jacob. '
  '16':
  - type: text
    content: 'Elle couvrit ses mains et la partie lisse de son cou de la peau des chevreaux, '
  '17':
  - type: text
    content: puis elle plaça dans la main de son fils Jacob le plat et le pain qu'elle avait préparés.
  '18':
  - type: text
    content: 'Il vint vers son père et dit: «Mon père!» Isaac dit: «Me voici. Lequel de mes fils es-tu?» '
  '19':
  - type: text
    content: 'Jacob répondit à son père: «Je suis ton fils aîné Esaü. Je me suis conformé à tes instructions. Lève-toi donc, installe-toi et mange de mon gibier afin de me bénir.» '
  '2':
  - type: text
    content: 'Isaac dit: «Je suis maintenant âgé et je ne connais pas le jour de ma mort. '
  '20':
  - type: text
    content: 'Isaac dit à son fils: «Comment cela? Tu en as vite trouvé, mon fils!» Jacob répondit: «C''est que l''Eternel, ton Dieu, l''a fait venir devant moi.» '
  '21':
  - type: text
    content: 'Isaac dit à Jacob: «Approche-toi donc, que je te touche, mon fils, pour savoir si tu es mon fils Esaü ou non.» '
  '22':
  - type: text
    content: 'Jacob s''approcha de son père Isaac qui le toucha et dit: «La voix est celle de Jacob, mais les mains sont celles d''Esaü.» '
  '23':
  - type: text
    content: 'Il ne le reconnut pas parce que ses mains étaient velues comme celles de son frère Esaü, et il le bénit. '
  '24':
  - type: text
    content: 'Il dit: «Est-ce bien toi, mon fils Esaü?» Jacob répondit: «C''est moi.» '
  '25':
  - type: text
    content: 'Isaac dit: «Sers-moi et que je mange de ton gibier, mon fils, afin de te bénir.» Jacob le servit et il mangea. Il lui apporta aussi du vin et il but.'
  '26':
  - type: text
    content: 'Puis son père Isaac lui dit: «Approche-toi donc et embrasse-moi, mon fils.» '
  '27':
  - type: text
    content: 'Jacob s''approcha et l''embrassa. Isaac sentit l''odeur de ses vêtements. Il le bénit alors en disant: «L''odeur de mon fils est pareille à celle d''un champ que l''Eternel a béni. '
  '28':
  - type: text
    content: 'Que Dieu te donne de la rosée du ciel et des richesses de la terre, du blé et du vin en abondance! '
  '29':
  - type: text
    content: Que des peuples te soient asservis et que des nations se prosternent devant toi! Sois le maître de tes frères et que les fils de ta mère se prosternent devant toi! *Maudits soient tous ceux qui te maudiront et bénis soient tous ceux qui te béniront.
  - type: note
    content: 'Maudits… béniront: tournure reprise en Nombres 24.9.'
  - type: text
    content: »
  '3':
  - type: text
    content: 'Prends donc tes armes, ton carquois et ton arc, va dans les champs chasser du gibier pour moi. '
  '30':
  - type: text
    content: 'Isaac avait fini de bénir Jacob et celui-ci avait à peine quitté son père Isaac lorsque son frère Esaü revint de la chasse. '
  '31':
  - type: text
    content: 'Il prépara, lui aussi, un plat qu''il apporta à son père. Il dit à son père: «Que mon père se lève et mange du gibier de son fils, afin que tu me bénisses!» '
  '32':
  - type: text
    content: 'Son père Isaac lui demanda: «Qui es-tu?» Il répondit: «Je suis ton fils aîné Esaü.» '
  '33':
  - type: text
    content: 'Isaac fut saisi d''une grande, d''une violente émotion et dit: «Qui est donc celui qui a chassé du gibier et me l''a apporté? J''ai mangé de tout avant que tu ne viennes et je l''ai béni. Et effectivement, il sera béni.» '
  '34':
  - type: text
    content: 'Lorsque Esaü entendit les paroles de son père, il poussa de grands cris pleins d''amertume et il dit à son père: «Bénis-moi aussi, mon père!» '
  '35':
  - type: text
    content: 'Isaac dit: «Ton frère est venu avec ruse et a pris ta bénédiction.» '
  '36':
  - type: text
    content: 'Esaü dit: «Est-ce parce qu''on l''a appelé Jacob'
  - type: note
    content: 'Jacob: fait assonance en hébreu avec supplanter.'
  - type: text
    content: ' qu''il m''a supplanté deux fois? Il a pris mon droit d''aînesse, et voici maintenant qu''il a pris ma bénédiction.» Il ajouta: «N''as-tu pas de bénédiction en réserve pour moi?» '
  '37':
  - type: text
    content: 'Isaac répondit à Esaü: «Je l''ai désigné comme ton maître et je lui ai donné tous ses frères pour serviteurs, je l''ai pourvu en blé et en vin. Que puis-je donc faire pour toi, mon fils?» '
  '38':
  - type: text
    content: 'Esaü dit à son père: «N''as-tu que cette seule bénédiction, mon père? Bénis-moi aussi, mon père!» et il se mit à pleurer tout haut. '
  '39':
  - type: text
    content: 'Son père Isaac lui répondit: «Ton lieu d''habitation sera privé des richesses de la terre et de la rosée du ciel, d''en haut. '
  '4':
  - type: text
    content: Prépare-moi un plat comme je les aime et apporte-le-moi à manger afin que je te bénisse avant de mourir.»
  '40':
  - type: text
    content: Tu vivras de ton épée et tu seras asservi à ton frère. Cependant, en errant librement çà et là, tu échapperas à la domination qu'il t'aura imposée.»
  - type: heading
    content: Fuite de Jacob
  '41':
  - type: text
    content: 'Esaü éprouva de la haine contre Jacob à cause de la bénédiction que son père lui avait accordée. Il disait dans son cœur: «Le moment où l''on mènera le deuil sur mon père va approcher et je tuerai mon frère Jacob.» '
  '42':
  - type: text
    content: 'Rebecca fut informée des paroles de son fils aîné Esaü. Elle fit alors appeler son fils cadet Jacob et lui dit: «Ton frère Esaü veut se venger de toi en te tuant. '
  '43':
  - type: text
    content: 'Maintenant, mon fils, écoute-moi! Lève-toi, enfuis-toi chez mon frère Laban à Charan. '
  '44':
  - type: text
    content: 'Reste chez lui quelque temps, jusqu''à ce que la fureur de ton frère s''apaise, '
  '45':
  - type: text
    content: jusqu'à ce que la colère de ton frère se détourne de toi et qu'il oublie ce que tu lui as fait. Alors je te ferai revenir. Pourquoi serais-je privée de vous deux en un seul jour?»
  '46':
  - type: text
    content: 'Rebecca dit à Isaac: «Je suis dégoûtée de la vie à cause de nos belles-filles hittites. Si Jacob prend une femme comme celles-ci parmi les Hittites, parmi les filles du pays, à quoi me sert la vie?»'
  '5':
  - type: text
    content: 'Rebecca entendit ce qu''Isaac disait à son fils Esaü. Esaü s''en alla dans les champs pour chasser du gibier et le rapporter. '
  '6':
  - type: text
    content: 'Quant à Rebecca, elle dit à son fils Jacob: «J''ai entendu ton père dire à ton frère Esaü: '
  '7':
  - type: text
    content: '‘Apporte-moi du gibier et prépare-moi un plat que je mangerai. Je te bénirai alors devant l''Eternel avant ma mort.’ '
  '8':
  - type: text
    content: 'Maintenant, mon fils, écoute-moi et fais ce que je t''ordonne: '
  '9':
  - type: text
    content: 'va me prendre deux bons chevreaux dans le troupeau. J''en ferai pour ton père un plat comme il les aime, '
