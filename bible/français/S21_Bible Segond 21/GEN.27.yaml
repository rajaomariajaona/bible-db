document_id: GEN.27
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Histoire de Jacob
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 27.1–36.43
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vol de la bénédiction d'Esaü
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Isaac devenait vieux et ses yeux s''étaient affaiblis au point qu''il ne voyait plus. Alors il appela son fils aîné Esaü et lui dit: «Mon fils!» Il lui répondit: «Me voici!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Isaac dit: «Je suis maintenant âgé et je ne connais pas le jour de ma mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Prends donc tes armes, ton carquois et ton arc, va dans les champs chasser du gibier pour moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Prépare-moi un plat comme je les aime et apporte-le-moi à manger afin que je te bénisse avant de mourir.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Rebecca entendit ce qu''Isaac disait à son fils Esaü. Esaü s''en alla dans les champs pour chasser du gibier et le rapporter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Quant à Rebecca, elle dit à son fils Jacob: «J''ai entendu ton père dire à ton frère Esaü: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '‘Apporte-moi du gibier et prépare-moi un plat que je mangerai. Je te bénirai alors devant l''Eternel avant ma mort.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Maintenant, mon fils, écoute-moi et fais ce que je t''ordonne: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'va me prendre deux bons chevreaux dans le troupeau. J''en ferai pour ton père un plat comme il les aime, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'et tu le lui apporteras à manger afin qu''il te bénisse avant sa mort.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jacob répondit à sa mère: «Mon frère Esaü est velu, tandis que moi, je n''ai pas de poils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Peut-être mon père me touchera-t-il et je passerai à ses yeux pour un menteur. J''attirerai alors sur moi la malédiction, et non la bénédiction.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Sa mère lui dit: «Que cette malédiction retombe sur moi, mon fils! Ecoute-moi seulement et va me prendre les chevreaux.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jacob alla les prendre et les apporta à sa mère, qui prépara un plat comme son père les aimait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ensuite, Rebecca prit les vêtements de son fils aîné Esaü, les plus beaux qui se trouvaient à la maison, et elle les fit mettre à son fils cadet Jacob. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Elle couvrit ses mains et la partie lisse de son cou de la peau des chevreaux, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: puis elle plaça dans la main de son fils Jacob le plat et le pain qu'elle avait préparés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il vint vers son père et dit: «Mon père!» Isaac dit: «Me voici. Lequel de mes fils es-tu?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jacob répondit à son père: «Je suis ton fils aîné Esaü. Je me suis conformé à tes instructions. Lève-toi donc, installe-toi et mange de mon gibier afin de me bénir.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Isaac dit à son fils: «Comment cela? Tu en as vite trouvé, mon fils!» Jacob répondit: «C''est que l''Eternel, ton Dieu, l''a fait venir devant moi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Isaac dit à Jacob: «Approche-toi donc, que je te touche, mon fils, pour savoir si tu es mon fils Esaü ou non.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jacob s''approcha de son père Isaac qui le toucha et dit: «La voix est celle de Jacob, mais les mains sont celles d''Esaü.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Il ne le reconnut pas parce que ses mains étaient velues comme celles de son frère Esaü, et il le bénit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il dit: «Est-ce bien toi, mon fils Esaü?» Jacob répondit: «C''est moi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Isaac dit: «Sers-moi et que je mange de ton gibier, mon fils, afin de te bénir.» Jacob le servit et il mangea. Il lui apporta aussi du vin et il but.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Puis son père Isaac lui dit: «Approche-toi donc et embrasse-moi, mon fils.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Jacob s''approcha et l''embrassa. Isaac sentit l''odeur de ses vêtements. Il le bénit alors en disant: «L''odeur de mon fils est pareille à celle d''un champ que l''Eternel a béni. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Que Dieu te donne de la rosée du ciel et des richesses de la terre, du blé et du vin en abondance! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Que des peuples te soient asservis et que des nations se prosternent devant toi! Sois le maître de tes frères et que les fils de ta mère se prosternent devant toi! *Maudits soient tous ceux qui te maudiront et bénis soient tous ceux qui te béniront.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Maudits… béniront: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tournure reprise en Nombres 24.9.
    marker-yv: yv-n
  - type: text
    text: »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Isaac avait fini de bénir Jacob et celui-ci avait à peine quitté son père Isaac lorsque son frère Esaü revint de la chasse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Il prépara, lui aussi, un plat qu''il apporta à son père. Il dit à son père: «Que mon père se lève et mange du gibier de son fils, afin que tu me bénisses!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Son père Isaac lui demanda: «Qui es-tu?» Il répondit: «Je suis ton fils aîné Esaü.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Isaac fut saisi d''une grande, d''une violente émotion et dit: «Qui est donc celui qui a chassé du gibier et me l''a apporté? J''ai mangé de tout avant que tu ne viennes et je l''ai béni. Et effectivement, il sera béni.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Lorsque Esaü entendit les paroles de son père, il poussa de grands cris pleins d''amertume et il dit à son père: «Bénis-moi aussi, mon père!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Isaac dit: «Ton frère est venu avec ruse et a pris ta bénédiction.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Esaü dit: «Est-ce parce qu''on l''a appelé Jacob'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.36 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jacob: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fait assonance en hébreu avec supplanter.
    marker-yv: yv-n
  - type: text
    text: ' qu''il m''a supplanté deux fois? Il a pris mon droit d''aînesse, et voici maintenant qu''il a pris ma bénédiction.» Il ajouta: «N''as-tu pas de bénédiction en réserve pour moi?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Isaac répondit à Esaü: «Je l''ai désigné comme ton maître et je lui ai donné tous ses frères pour serviteurs, je l''ai pourvu en blé et en vin. Que puis-je donc faire pour toi, mon fils?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Esaü dit à son père: «N''as-tu que cette seule bénédiction, mon père? Bénis-moi aussi, mon père!» et il se mit à pleurer tout haut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Son père Isaac lui répondit: «Ton lieu d''habitation sera privé des richesses de la terre et de la rosée du ciel, d''en haut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Tu vivras de ton épée et tu seras asservi à ton frère. Cependant, en errant librement çà et là, tu échapperas à la domination qu'il t'aura imposée.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fuite de Jacob
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Esaü éprouva de la haine contre Jacob à cause de la bénédiction que son père lui avait accordée. Il disait dans son cœur: «Le moment où l''on mènera le deuil sur mon père va approcher et je tuerai mon frère Jacob.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Rebecca fut informée des paroles de son fils aîné Esaü. Elle fit alors appeler son fils cadet Jacob et lui dit: «Ton frère Esaü veut se venger de toi en te tuant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Maintenant, mon fils, écoute-moi! Lève-toi, enfuis-toi chez mon frère Laban à Charan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Reste chez lui quelque temps, jusqu''à ce que la fureur de ton frère s''apaise, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: jusqu'à ce que la colère de ton frère se détourne de toi et qu'il oublie ce que tu lui as fait. Alors je te ferai revenir. Pourquoi serais-je privée de vous deux en un seul jour?»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Rebecca dit à Isaac: «Je suis dégoûtée de la vie à cause de nos belles-filles hittites. Si Jacob prend une femme comme celles-ci parmi les Hittites, parmi les filles du pays, à quoi me sert la vie?»'
