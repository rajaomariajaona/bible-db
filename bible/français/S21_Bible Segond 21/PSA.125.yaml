document_id: PSA.125,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu, un rempart pour son peuple
  - type: text
    content: Chant des montées.
  - type: text
    content: Ceux qui se confient en l'Eternel
  - type: text
    content: 'sont comme le mont Sion: il est inébranlable,'
  - type: text
    content: il demeure pour toujours.
  '2':
  - type: text
    content: Pareil aux montagnes qui entourent Jérusalem,
  - type: text
    content: l'Eternel entoure son peuple,
  - type: text
    content: dès maintenant et pour toujours.
  '3':
  - type: text
    content: Un pouvoir méchant ne pèsera pas sur la part des justes,
  - type: text
    content: afin qu'ils ne tendent pas les mains vers le mal.
  '4':
  - type: text
    content: Eternel, montre-toi bon pour les hommes bons,
  - type: text
    content: pour ceux dont le cœur est droit!
  '5':
  - type: text
    content: Mais ceux qui s'engagent dans des voies tortueuses,
  - type: text
    content: que l'Eternel les détruise avec ceux qui font le mal!
  - type: text
    content: Que la paix soit sur Israël!
