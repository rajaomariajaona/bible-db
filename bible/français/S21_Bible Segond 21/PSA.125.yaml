document_id: PSA.125
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu, un rempart pour son peuple
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Chant des montées.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui se confient en l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sont comme le mont Sion: il est inébranlable,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il demeure pour toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Pareil aux montagnes qui entourent Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'Eternel entoure son peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dès maintenant et pour toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Un pouvoir méchant ne pèsera pas sur la part des justes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin qu'ils ne tendent pas les mains vers le mal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Eternel, montre-toi bon pour les hommes bons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour ceux dont le cœur est droit!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mais ceux qui s'engagent dans des voies tortueuses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que l'Eternel les détruise avec ceux qui font le mal!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que la paix soit sur Israël!
