document_id: JOS.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Territoire accordé à Juda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: La part attribuée par tirage au sort aux clans de la tribu de Juda s'étendait en direction de la frontière avec Edom jusqu'au désert de Tsin au sud, à l'extrême sud.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ainsi, leur frontière sud partait de l''extrémité de la mer Morte, de la langue de mer qui fait face au Néguev. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Elle se prolongeait au sud de la montée d''Akrabbim, passait par Tsin et montait au sud de Kadès-Barnéa. Elle passait de là par Hetsron, montait vers Addar et tournait à Karkaa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Elle passait ensuite par Atsmon et continuait jusqu'au torrent d'Egypte pour déboucher sur la mer. «Voilà quelle sera votre frontière sud.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'La frontière est était constituée par la mer Morte jusqu''à l''embouchure du Jourdain. La frontière nord partait de la langue de mer qui se trouve à l''embouchure du Jourdain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Elle montait vers Beth-Hogla, passait au nord de Beth-Araba et s''élevait jusqu''à la pierre de Bohan, fils de Ruben. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Elle montait à Debir en passant par la vallée d''Acor et se dirigeait vers le nord du côté de Guilgal, qui se trouve vis-à-vis de la montée d''Adummim au sud du torrent. Elle passait près des eaux d''En-Shémesh et se prolongeait jusqu''à En-Roguel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Elle montait de là par la vallée de Ben-Hinnom au côté sud de Jébus, c''est-à-dire Jérusalem, puis s''élevait jusqu''au sommet de la montagne qui est à l''ouest de la vallée de Hinnom et à l''extrémité nord de la vallée des Rephaïm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Du sommet de la montagne, elle s''étendait jusqu''à la source des eaux de Nephthoach, continuait vers les villes du mont Ephron et se prolongeait par Baala, c''est-à-dire Kirjath-Jearim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'De Baala elle tournait à l''ouest vers la région montagneuse de Séir, traversait le côté nord du mont Jearim, à Kesalon, descendait à Beth-Shémesh et passait par Thimna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Elle continuait sur le côté nord d'Ekron, s'étendait vers Shicron, passait par le mont Baala et se prolongeait jusqu'à Jabneel pour déboucher sur la mer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: La frontière ouest était constituée par la mer Méditerranée. Tel fut le pourtour du territoire des clans des Judéens.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'On donna à Caleb, fils de Jephunné, une part au milieu des Judéens, comme l''Eternel l''avait ordonné à Josué. On lui donna Kirjath-Arba, c''est-à-dire Hébron. Arba était l''ancêtre d''Anak. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Caleb chassa de cette ville les trois descendants d''Anak: Shéshaï, Ahiman et Talmaï, enfants d''Anak. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'De là il monta contre les habitants de Debir, qui s''appelait autrefois Kirjath-Sépher. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Caleb dit: «Je donnerai ma fille Acsa en mariage à celui qui battra Kirjath-Sépher et s''en emparera.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Othniel, fils de Kenaz, le frère de Caleb, s''en empara et Caleb lui donna sa fille Acsa pour femme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Dès son arrivée chez Othniel, elle le persuada de demander un champ à son père. Elle descendit de son âne et Caleb lui dit: «Qu''as-tu?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Elle répondit: «Fais-moi un cadeau. Puisque tu m''as donné une terre située au sud, donne-moi aussi des sources d''eau.» Et Caleb lui donna les sources supérieures et les sources inférieures.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tel fut l'héritage des clans de la tribu de Juda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les villes situées dans la région du Néguev, à l''extrémité du territoire des Judéens, vers la frontière avec Edom, étaient: Kabtseel, Eder, Jagur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Kina, Dimona, Adada, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Kédesh, Hatsor, Ithnan, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ziph, Thélem, Bealoth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Hatsor-Hadattha, Kerijoth-Hetsron, c''est-à-dire Hatsor, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Amam, Shema, Molada, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Hatsar-Gadda, Heshmon, Beth-Paleth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Hatsar-Shual, Beer-Shéba, Bizjothja, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Baala, Ijjim, Atsem, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Eltholad, Kesil, Horma, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Tsiklag, Madmanna, Sansanna, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Lebaoth, Shilhim, Aïn et Rimmon. Total des villes: 29, avec leurs villages.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dans la plaine: Eshthaol, Tsorea, Ashna, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Zanoach, En-Gannim, Tappuach, Enam, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jarmuth, Adullam, Soco, Azéka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Shaaraïm, Adithaïm, Guedéra et Guedérothaïm, soit 14 villes avec leurs villages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Tsenan, Hadasha, Migdal-Gad, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Dilean, Mitspé, Joktheel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Lakis, Botskath, Eglon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Cabbon, Lachmas, Kithlish, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Guedéroth, Beth-Dagon, Naama et Makkéda, soit 16 villes avec leurs villages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Libna, Ether, Ashan, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Jiphtach, Ashna, Netsib, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Keïla, Aczib et Marésha, soit 9 villes avec leurs villages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Ekron, les villes qui en dépendent et ses villages; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'depuis Ekron et à l''ouest, toutes les villes situées près d''Asdod et leurs villages; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Asdod, les villes qui en dépendent et ses villages; Gaza, les villes qui en dépendent et ses villages jusqu'au torrent d'Egypte et à la mer Méditerranée, qui sert de limite.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Dans la montagne: Shamir, Jatthir, Soco, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Danna, Kirjath-Sanna, c''est-à-dire Debir, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Anab, Eshthemo, Anim, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Gosen, Holon et Guilo, soit 11 villes avec leurs villages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Arab, Duma, Eshean, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Janum, Beth-Tappuach, Aphéka, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Humta, Kirjath-Arba, c''est-à-dire Hébron, et Tsior, soit 9 villes avec leurs villages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Maon, Carmel, Ziph, Juta, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Jizreel, Jokdeam, Zanoach, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Kaïn, Guibea et Thimna, soit 10 villes avec leurs villages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Halhul, Beth-Tsur, Guedor, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Maarath, Beth-Anoth et Elthekon, soit 6 villes avec leurs villages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: Kirjath-Baal, c'est-à-dire Kirjath-Jearim, et Rabba, soit 2 villes avec leurs villages.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Dans le désert: Beth-Araba, Middin, Secaca, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: Nibshan, Ir-Hammélach et En-Guédi, soit 6 villes avec leurs villages.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: Les Judéens ne parvinrent pas à chasser les Jébusiens qui habitaient à Jérusalem, et les Jébusiens ont habité avec eux à Jérusalem jusqu'à aujourd'hui.
