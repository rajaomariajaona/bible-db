document_id: REV.8,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ouverture du septième sceau
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Quand l'Agneau ouvrit le septième sceau, il y eut dans le ciel un silence d'environ une demi-heure.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Le troisième ange sonna de la trompette, et du ciel tomba une grande étoile qui brûlait comme un flambeau; elle tomba sur le tiers des fleuves et sur les sources d''eau. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Le nom de cette étoile est «Absinthe». Le tiers des eaux fut changé en absinthe et beaucoup d'hommes moururent à cause de ces eaux, parce qu'elles étaient devenues amères.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Le quatrième ange sonna de la trompette, et le tiers du soleil fut frappé, ainsi que le tiers de la lune et le tiers des étoiles, de sorte qu'ils s'obscurcirent d'un tiers; le jour perdit un tiers de sa clarté, et la nuit de même.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Je regardai et j''entendis un aigle qui volait très haut dans le ciel et qui disait d''une voix forte: «Malheur, malheur, malheur aux habitants de la terre à cause des autres sonneries de trompette, celles que les trois anges vont encore faire retentir!»'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Puis je vis les sept anges qui se tiennent devant Dieu; sept trompettes leur furent données. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Un autre ange vint. Il se plaça vers l''autel, tenant un encensoir d''or. On lui donna beaucoup de parfums afin qu''il les offre, avec les prières de tous les saints, sur l''autel d''or qui est devant le trône. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'La fumée des parfums monta de la main de l''ange devant Dieu avec les prières des saints. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: L'ange prit l'encensoir, le remplit du feu de l'autel et le jeta sur la terre. Il y eut alors des coups de tonnerre, des voix, des éclairs et un tremblement de terre.
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Sept trompettes
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 8.6–11.19
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les six premières trompettes
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Puis les sept anges qui avaient les sept trompettes se préparèrent à en sonner.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Le premier sonna de la trompette, et de la grêle et du feu mêlés de sang s'abattirent sur la terre. Le tiers de la terre fut brûlé, le tiers des arbres fut brûlé et toute herbe verte fut brûlée.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Le deuxième ange sonna de la trompette, et quelque chose qui ressemblait à une grande montagne embrasée [par le feu] fut précipité dans la mer. Le tiers de la mer devint du sang, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: le tiers des créatures qui vivaient dans la mer mourut, et le tiers des bateaux fut détruit.
