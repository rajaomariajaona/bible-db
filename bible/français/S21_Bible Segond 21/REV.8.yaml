document_id: REV.8,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Ouverture du septième sceau
  - type: text
    content: Quand l'Agneau ouvrit le septième sceau, il y eut dans le ciel un silence d'environ une demi-heure.
  '10':
  - type: text
    content: 'Le troisième ange sonna de la trompette, et du ciel tomba une grande étoile qui brûlait comme un flambeau; elle tomba sur le tiers des fleuves et sur les sources d''eau. '
  '11':
  - type: text
    content: Le nom de cette étoile est «Absinthe». Le tiers des eaux fut changé en absinthe et beaucoup d'hommes moururent à cause de ces eaux, parce qu'elles étaient devenues amères.
  '12':
  - type: text
    content: Le quatrième ange sonna de la trompette, et le tiers du soleil fut frappé, ainsi que le tiers de la lune et le tiers des étoiles, de sorte qu'ils s'obscurcirent d'un tiers; le jour perdit un tiers de sa clarté, et la nuit de même.
  '13':
  - type: text
    content: 'Je regardai et j''entendis un aigle qui volait très haut dans le ciel et qui disait d''une voix forte: «Malheur, malheur, malheur aux habitants de la terre à cause des autres sonneries de trompette, celles que les trois anges vont encore faire retentir!»'
  '2':
  - type: text
    content: 'Puis je vis les sept anges qui se tiennent devant Dieu; sept trompettes leur furent données. '
  '3':
  - type: text
    content: 'Un autre ange vint. Il se plaça vers l''autel, tenant un encensoir d''or. On lui donna beaucoup de parfums afin qu''il les offre, avec les prières de tous les saints, sur l''autel d''or qui est devant le trône. '
  '4':
  - type: text
    content: 'La fumée des parfums monta de la main de l''ange devant Dieu avec les prières des saints. '
  '5':
  - type: text
    content: L'ange prit l'encensoir, le remplit du feu de l'autel et le jeta sur la terre. Il y eut alors des coups de tonnerre, des voix, des éclairs et un tremblement de terre.
  - type: heading
    content: Sept trompettes
  - type: heading
    content: 8.6–11.19
  - type: heading
    content: Les six premières trompettes
  '6':
  - type: text
    content: Puis les sept anges qui avaient les sept trompettes se préparèrent à en sonner.
  '7':
  - type: text
    content: Le premier sonna de la trompette, et de la grêle et du feu mêlés de sang s'abattirent sur la terre. Le tiers de la terre fut brûlé, le tiers des arbres fut brûlé et toute herbe verte fut brûlée.
  '8':
  - type: text
    content: 'Le deuxième ange sonna de la trompette, et quelque chose qui ressemblait à une grande montagne embrasée [par le feu] fut précipité dans la mer. Le tiers de la mer devint du sang, '
  '9':
  - type: text
    content: le tiers des créatures qui vivaient dans la mer mourut, et le tiers des bateaux fut détruit.
