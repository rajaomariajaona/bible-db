document_id: 2SA.20
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Il y avait là un méchant homme du nom de Shéba. C''était un fils de Bicri, un Benjaminite. Il sonna de la trompette et dit: «Il n''y a aucune part pour nous avec David, aucun héritage pour nous avec le fils d''Isaï! Chacun à sa tente, Israël!» '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Et tous les Israélites s'éloignèrent de David pour suivre Shéba, fils de Bicri. Quant aux Judéens, ils restèrent fidèles à leur roi et l'accompagnèrent depuis le Jourdain jusqu'à Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: David rentra chez lui à Jérusalem. Le roi prit les dix concubines qu'il avait laissées pour garder le palais et les installa dans une maison bien surveillée. Il pourvut à leur entretien, mais il n'eut plus de relations avec elles. Elles restèrent enfermées jusqu'au jour de leur mort, vivant dans un état de veuvage.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le roi dit à Amasa: «Convoque-moi les hommes de Juda pour dans 3 jours et toi, présente-toi aussi ici.» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Amasa partit pour convoquer Juda, mais il eut du retard par rapport au délai que le roi avait fixé. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'David dit alors à Abishaï: «Shéba, le fils de Bicri, va maintenant nous faire plus de mal qu''Absalom. Prends toi-même les serviteurs de ton maître et va à sa poursuite. Sinon, il risque de trouver des villes fortifiées et d''échapper à nos regards.» '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Abishaï partit en campagne, suivi des hommes de Joab, des Kéréthiens et des Péléthiens ainsi que de tous les vaillants hommes. Ils sortirent de Jérusalem afin d'aller à la poursuite de Shéba, fils de Bicri.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils étaient près de la grande pierre qui se trouve à Gabaon lorsque Amasa arriva devant eux. Joab avait une épée à la ceinture, par-dessus les habits qu''il avait mis. Elle était attachée à sa taille, dans son fourreau, et elle en glissa tandis que Joab s''avançait. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Joab dit à Amasa: «Te portes-tu bien, mon frère?» et de la main droite il attrapa la barbe d''Amasa pour l''embrasser. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Amasa ne fit pas attention à l''épée qui était dans la main de Joab, et Joab l''en frappa au ventre. Il déversa ses entrailles par terre sans avoir à lui porter un deuxième coup. C''est ainsi qu''Amasa mourut. Joab et son frère Abishaï marchèrent à la poursuite de Shéba, fils de Bicri. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Un des hommes de Joab resta près d''Amasa et il disait: «Qui aime Joab et qui est pour David? Qu''il suive Joab!» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Amasa se roulait dans le sang au milieu de la route. Voyant que tout le peuple s''arrêtait, cet homme le poussa hors de la route dans un champ et jeta un vêtement sur lui. C''est ce qu''il fit lorsqu''il vit que tous ceux qui arrivaient près de lui s''arrêtaient. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Quand il fut enlevé de la route, chacun suivit Joab afin de poursuivre Shéba, fils de Bicri.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Joab traversa toutes les tribus d''Israël dans la direction d''Abel-Beth-Maaca, et tous les hommes d''élite se rassemblèrent et le suivirent. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils vinrent assiéger Shéba dans Abel-Beth-Maaca et ils érigèrent un remblai qui allait jusqu''au rempart de la ville. Tout le peuple qui était avec Joab sapait la muraille pour la faire tomber. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors une femme pleine de sagesse se mit à crier depuis la ville: «Ecoutez, écoutez! Dites donc à Joab: ‘Approche-toi jusqu''ici, je veux te parler!’» '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il s''approcha d''elle et la femme demanda: «Es-tu Joab?» Il répondit: «C''est bien moi.» Elle lui dit: «Ecoute les paroles de ta servante.» Il répondit: «J''écoute.» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Elle dit alors: «Autrefois on avait l''habitude de dire: ‘Que l''on procède à une consultation dans Abel!’ et c''est ainsi que tout se réglait. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Je suis une des villes paisibles et fidèles d''Israël, et tu cherches à faire disparaître une ville qui est une mère en Israël! Pourquoi veux-tu détruire l''héritage de l''Eternel?» '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Joab répondit: «Je n''ai certainement pas l''intention de vous détruire et vous ruiner! '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il n''en est pas question. Mais un homme de la région montagneuse d''Ephraïm, un dénommé Shéba, fils de Bicri, a levé la main contre le roi David. Livrez-le-moi, et lui seulement, et je m''éloignerai de la ville.» La femme dit à Joab: «Sa tête te sera jetée par la muraille.» '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Cette femme alla parler à tout son peuple avec sa sagesse, et ils coupèrent la tête de Shéba, fils de Bicri, et la jetèrent à Joab. Joab sonna alors de la trompette. On se dispersa loin de la ville et chacun repartit dans sa tente. Quant à Joab, il retourna à Jérusalem vers le roi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Joab commandait toute l''armée d''Israël; Benaja, fils de Jehojada, était à la tête des Kéréthiens et des Péléthiens; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Adoram était préposé aux corvées; Josaphat, fils d''Achilud, était archiviste; '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Sheja était secrétaire; Tsadok et Abiathar étaient prêtres; '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: et Ira de Jaïr était ministre d'Etat de David.
