document_id: REV.12,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Sept signes
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 12.1–15.8
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La femme, le dragon et l'enfant
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un grand signe apparut dans le ciel: c''était une femme enveloppée du soleil, la lune sous les pieds et une couronne de douze étoiles sur la tête. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis j''entendis dans le ciel une voix forte qui disait: «Maintenant le salut est arrivé, ainsi que la puissance, le règne de notre Dieu et l''autorité de son Messie. En effet, il a été jeté dehors, l''accusateur de nos frères et sœurs, celui qui les accusait jour et nuit devant notre Dieu. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils l''ont vaincu grâce au sang de l''Agneau et grâce à la parole de leur témoignage, et ils n''ont pas aimé leur vie au point de craindre la mort. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C'est pourquoi réjouis-toi, ciel, et vous qui habitez le ciel. Mais malheur à vous, habitants de la terre et de la mer, car le diable est descendu vers vous, animé d'une grande colère, sachant qu'il lui reste peu de temps.»
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand le dragon vit qu''il avait été précipité sur la terre, il poursuivit la femme qui avait mis au monde l''enfant mâle. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais les deux ailes du grand aigle furent données à la femme, afin qu''elle s''envole au désert, vers l''endroit où elle doit être nourrie un temps, des temps et la moitié d''un temps, loin du serpent. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le serpent vomit de sa gueule comme un fleuve d''eau derrière la femme, afin qu''elle soit entraînée par le courant. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais la terre secourut la femme: elle s''ouvrit et engloutit le fleuve que le dragon avait lancé de sa gueule. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Furieux contre la femme, le dragon s''en alla faire la guerre au reste de sa descendance, à ceux qui respectent les commandements de Dieu et qui gardent le témoignage de Jésus. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et je me tins sur le sable de la mer.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elle était enceinte et elle criait, car elle était en travail, dans les douleurs de l'accouchement.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un autre signe apparut dans le ciel; c''était un grand dragon rouge feu, qui avait sept têtes et dix cornes, et sur ses têtes sept diadèmes. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sa queue entraîna le tiers des étoiles du ciel et les jeta sur la terre.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le dragon se plaça devant la femme qui allait accoucher, afin de dévorer son enfant dès qu''il serait né. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle mit au monde un fils, un enfant mâle qui doit '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: diriger toutes les nations avec un sceptre de fer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Diriger… fer: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'reprise de la citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 2.9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '2.27'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', et son enfant fut enlevé vers Dieu et vers son trône. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quant à la femme, elle s'enfuit dans le désert, où Dieu lui avait préparé une place, afin d'y être nourrie pendant 1260 jours.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y eut alors une bataille dans le ciel. Michel et ses anges combattirent contre le dragon. Le dragon et ses anges combattirent aussi, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais ils ne furent pas les plus forts, et il n''y eut plus de place pour eux dans le ciel. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il fut jeté dehors, le grand dragon, le serpent ancien, appelé le diable et Satan, celui qui égare toute la terre; il fut jeté sur la terre et ses anges furent jetés avec lui.
