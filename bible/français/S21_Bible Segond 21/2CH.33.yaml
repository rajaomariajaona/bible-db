document_id: 2CH.33,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Règne de Manassé
  - type: text
    content: 'Manassé avait 12 ans lorsqu''il devint roi et il régna 55 ans à Jérusalem. '
  '10':
  - type: text
    content: L'Eternel parla à Manassé et à son peuple, mais ils n'y firent pas attention.
  '11':
  - type: text
    content: 'Alors l''Eternel fit venir contre eux les chefs de l''armée du roi d''Assyrie. Ils capturèrent Manassé et lui mirent des crochets, l''attachèrent avec des chaînes en bronze et le conduisirent à Babylone. '
  '12':
  - type: text
    content: 'Lorsqu''il fut dans la détresse, il implora l''Eternel, son Dieu, et il s''humilia profondément devant le Dieu de ses ancêtres. '
  '13':
  - type: text
    content: 'Il lui adressa des prières et l''Eternel se laissa fléchir: il exauça ses supplications et le ramena à Jérusalem dans son royaume. Manassé reconnut alors que c''est l''Eternel qui est Dieu.'
  '14':
  - type: text
    content: Après cela, il construisit à l'extérieur de la ville de David, à l'ouest, vers Guihon dans la vallée, une muraille qui se prolongeait jusqu'à la porte des poissons et faisait le tour de la colline de l'Ophel. Il la fit très haute. Il mit aussi des chefs militaires dans toutes les villes fortifiées de Juda.
  '15':
  - type: text
    content: 'Il enleva les dieux étrangers et l''idole de la maison de l''Eternel, ainsi que tous les autels qu''il avait construits sur la montagne de la maison de l''Eternel et à Jérusalem, et il les jeta à l''extérieur de la ville. '
  '16':
  - type: text
    content: 'Il restaura l''autel de l''Eternel, y offrit des sacrifices de communion et de reconnaissance et ordonna à Juda de servir l''Eternel, le Dieu d''Israël. '
  '17':
  - type: text
    content: Certes, le peuple offrait encore des sacrifices sur les hauts lieux, mais seulement en l'honneur de l'Eternel, son Dieu.
  '18':
  - type: text
    content: 'Le reste des actes de Manassé, la prière qu''il a adressée à son Dieu et les paroles des voyants qui lui ont parlé au nom de l''Eternel, le Dieu d''Israël, cela se trouve dans les annales des rois d''Israël. '
  '19':
  - type: text
    content: Sa prière et la manière dont Dieu l'a exaucé, tous ses péchés et ses infidélités, les endroits où il a construit des hauts lieux et dressé des poteaux sacrés et des sculptures sacrées avant de s'humilier, cela est décrit dans les annales de Hozaï.
  '2':
  - type: text
    content: 'Il fit ce qui est mal aux yeux de l''Eternel, en imitant les pratiques abominables des nations que l''Eternel avait dépossédées devant les Israélites. '
  '20':
  - type: text
    content: Manassé se coucha avec ses ancêtres et on l'enterra dans son palais. Son fils Amon devint roi à sa place.
  - type: heading
    content: Règne d'Amon
  '21':
  - type: text
    content: Amon avait 22 ans lorsqu'il devint roi et il régna 2 ans à Jérusalem.
  '22':
  - type: text
    content: 'Il fit ce qui est mal aux yeux de l''Eternel, comme l''avait fait son père Manassé. Il offrit des sacrifices à toutes les sculptures sacrées que son père Manassé avait fabriquées et les servit. '
  '23':
  - type: text
    content: 'En revanche, il ne s''humilia pas devant l''Eternel comme l''avait fait son père Manassé, car lui, Amon, accumula la culpabilité. '
  '24':
  - type: text
    content: 'Ses serviteurs conspirèrent contre lui et le firent mourir chez lui, '
  '25':
  - type: text
    content: mais la population du pays frappa tous ceux qui avaient conspiré contre le roi Amon et proclama son fils Josias roi à sa place.
  '3':
  - type: text
    content: 'Il reconstruisit les hauts lieux que son père Ezéchias avait démolis, il érigea des autels en l''honneur des Baals et il fit des poteaux sacrés. Il se prosterna devant tous les corps célestes et les servit. '
  '4':
  - type: text
    content: 'Il construisit des autels dans la maison de l''Eternel, alors que l''Eternel avait dit: «C''est à Jérusalem que mon nom résidera pour toujours.» '
  '5':
  - type: text
    content: 'Il construisit des autels en l''honneur de tous les corps célestes dans les deux parvis de la maison de l''Eternel. '
  '6':
  - type: text
    content: 'Il fit passer ses fils par le feu dans la vallée des fils de Hinnom, il pratiqua la divination et l''occultisme, il s''adonna à la magie et il mit en place des gens capables d''invoquer les esprits et des spirites. Il fit de plus en plus ce qui est mal aux yeux de l''Eternel, provoquant ainsi sa colère. '
  '7':
  - type: text
    content: 'Il mit la statue de l''idole qu''il avait fabriquée dans la maison de Dieu, alors que Dieu avait dit à David et à son fils Salomon: «C''est dans cette maison et c''est à Jérusalem, que j''ai choisie parmi toutes les tribus d''Israël, que je veux éternellement établir mon nom. '
  '8':
  - type: text
    content: 'Je n''éloignerai plus les pas des Israélites du territoire que j''ai destiné à vos ancêtres, à condition seulement qu''ils veillent à mettre en pratique tous les commandements que je leur ai donnés, en suivant toute la loi, les prescriptions et les règles transmises par Moïse.» '
  '9':
  - type: text
    content: 'Mais Manassé égara Juda et les habitants de Jérusalem à un tel point qu''ils firent plus encore le mal que les nations que l''Eternel avait détruites devant les Israélites. '
