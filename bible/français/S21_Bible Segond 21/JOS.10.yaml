document_id: JOS.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Conquêtes dans le centre et au sud
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Adoni-Tsédek, le roi de Jérusalem, apprit que Josué s''était emparé d''Aï et l''avait vouée à la destruction, qu''il avait traité Aï et son roi comme il avait traité Jéricho et son roi et que les habitants de Gabaon avaient fait la paix avec Israël et vivaient au milieu d''eux. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il éprouva alors une forte peur, car Gabaon était une grande ville, comme une des villes royales, plus grande même qu''Aï, et tous ses hommes étaient vaillants. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Adoni-Tsédek, roi de Jérusalem, fit dire à Hoham, roi d''Hébron, à Piream, roi de Jarmuth, à Japhia, roi de Lakis, et à Debir, roi d''Eglon: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '«Montez vers moi et aidez-moi à détruire Gabaon, car elle a fait la paix avec Josué et avec les Israélites.» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Cinq rois amoréens – les rois de Jérusalem, d'Hébron, de Jarmuth, de Lakis et d'Eglon – s'allièrent ainsi et montèrent avec toutes leurs troupes. Ils vinrent installer leur camp près de Gabaon et l'attaquèrent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les habitants de Gabaon envoyèrent dire à Josué, au camp de Guilgal: «N''abandonne pas tes serviteurs, monte vite vers nous pour nous sauver et nous secourir, car tous les rois des Amoréens qui habitent la montagne se sont ligués contre nous.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Josué monta de Guilgal avec tous les hommes de guerre et tous les vaillants hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L''Eternel dit à Josué: «N''aie pas peur de ces rois, car je les livre entre tes mains et aucun d''eux ne te résistera.» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Josué arriva sur eux par surprise après avoir marché toute la nuit depuis Guilgal. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L''Eternel les mit en déroute devant Israël et Israël leur infligea une grande défaite près de Gabaon, les poursuivit sur le chemin qui monte à Beth-Horon et leur porta des coups jusqu''à Azéka et Makkéda. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Alors que les Amoréens fuyaient devant Israël et qu'ils se trouvaient sur la descente de Beth-Horon, l'Eternel fit tomber du ciel sur eux d'énormes grêlons jusqu'à Azéka et ils moururent. Ceux qui furent tués par ces grêlons furent plus nombreux que ceux qui moururent sous les coups d'épée des Israélites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors Josué parla à l''Eternel, le jour où l''Eternel livra les Amoréens aux Israélites, et il dit devant Israël: «Soleil, arrête-toi sur Gabaon et toi, lune, sur la vallée d''Ajalon!» '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Le soleil s'arrêta et la lune suspendit sa course jusqu'à ce que la nation se soit vengée de ses ennemis. Cela n'est-il pas écrit dans le livre du Juste? «Le soleil s'arrêta au milieu du ciel et ne s'empressa pas de se coucher, durant presque tout un jour.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il n''y a pas eu de jour comme celui-là, ni avant ni après, où l''Eternel ait écouté la voix d''un homme, car l''Eternel combattait pour Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Josué, et tout Israël avec lui, retourna au camp à Guilgal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les cinq rois s''enfuirent et se cachèrent dans une grotte à Makkéda. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'On annonça à Josué: «Les cinq rois se trouvent cachés dans une grotte à Makkéda.» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Josué dit: «Roulez de grosses pierres à l''entrée de la grotte et mettez-y des hommes pour les garder. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Quant à vous, ne vous arrêtez pas, poursuivez vos ennemis et attaquez-les par-derrière. Ne les laissez pas entrer dans leurs villes, car l'Eternel, votre Dieu, les a livrés entre vos mains.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Après que Josué et les Israélites leur eurent infligé une très grande défaite et les eurent complètement battus, ceux qui purent leur échapper se sauvèrent dans les villes fortifiées. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tout le peuple revint tranquillement au camp vers Josué à Makkéda, sans que personne n'ose dire quoi que ce soit contre les Israélites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Josué dit alors: «Ouvrez l''entrée de la grotte, faites-en sortir ces cinq rois et amenez-les-moi.» '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'C''est ce qu''on fit, et on lui amena les cinq rois qu''on avait fait sortir de la grotte; c''étaient les rois de Jérusalem, d''Hébron, de Jarmuth, de Lakis et d''Eglon. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Lorsqu''on eut amené ces rois devant lui, Josué appela tous les hommes d''Israël et dit aux chefs des hommes de guerre qui avaient marché avec lui: «Approchez-vous, mettez votre pied sur le cou de ces rois.» Ils s''approchèrent et mirent le pied sur leur cou. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Josué leur dit: «N''ayez pas peur et ne vous laissez pas effrayer, fortifiez-vous et ayez du courage, car c''est ainsi que l''Eternel traitera tous vos ennemis contre lesquels vous combattez.» '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Après cela, Josué les frappa à mort. Il les pendit à cinq arbres et ils y restèrent pendus jusqu''au soir. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Vers le coucher du soleil, Josué ordonna qu'on les descende des arbres. On les jeta dans la grotte où ils s'étaient cachés et l'on en boucha l'entrée avec de grosses pierres qui y sont restées jusqu'à aujourd'hui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Josué s'empara de Makkéda le même jour et la frappa du tranchant de l'épée. Il voua à la destruction le roi, la ville et tous ceux qui s'y trouvaient. Il ne laissa aucun survivant et il traita le roi de Makkéda comme il avait traité le roi de Jéricho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Josué passa avec tout Israël de Makkéda à Libna et attaqua Libna. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: L'Eternel la livra aussi, avec son roi, entre les mains d'Israël, et il la frappa du tranchant de l'épée, elle et tous ceux qui s'y trouvaient. Il ne laissa aucun survivant et il traita son roi comme il avait traité le roi de Jéricho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Josué passa avec tout Israël de Libna à Lakis. Il installa son camp devant elle et l''attaqua. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: L'Eternel livra Lakis entre les mains d'Israël, qui la prit le deuxième jour et la frappa du tranchant de l'épée, elle et tous ceux qui s'y trouvaient, comme il avait traité Libna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Alors Horam, le roi de Guézer, monta pour secourir Lakis. Josué les battit, lui et son peuple, sans laisser un seul survivant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Josué passa avec tout Israël de Lakis à Eglon. Ils installèrent leur camp devant elle et l''attaquèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ils s'en emparèrent le même jour et la frappèrent du tranchant de l'épée, elle et tous ceux qui s'y trouvaient. Josué la voua à la destruction le jour même, comme il avait traité Lakis.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Josué monta avec tout Israël d''Eglon à Hébron et ils l''attaquèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Ils s'en emparèrent et la frappèrent du tranchant de l'épée, elle, son roi, toutes les villes qui en dépendaient et tous ceux qui s'y trouvaient. Josué ne laissa aucun survivant, comme il l'avait fait à Eglon, et il la voua à la destruction avec tous ceux qui s'y trouvaient.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Josué se dirigea avec tout Israël sur Debir et l''attaqua. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Il s'empara d'elle, de son roi et de toutes les villes qui en dépendaient. Ils les frappèrent du tranchant de l'épée et vouèrent à la destruction tous ceux qui s'y trouvaient, sans laisser un seul survivant. Josué traita Debir et son roi comme il avait traité Hébron et comme il avait traité Libna et son roi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Josué conquit tout le pays, la montagne, le Néguev, la vallée et les coteaux, et il en battit tous les rois. Il ne laissa aucun survivant et il extermina tout ce qui respirait, comme l''avait ordonné l''Eternel, le Dieu d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Josué les battit de Kadès-Barnéa à Gaza, il conquit toute la région de Gosen jusqu''à Gabaon. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Josué s''empara en même temps de tous ces rois et de leur pays, car l''Eternel, le Dieu d''Israël, combattait pour Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Puis Josué retourna avec tout Israël au camp à Guilgal.
