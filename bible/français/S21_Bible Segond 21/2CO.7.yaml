document_id: 2CO.7,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Puisque nous avons de telles promesses, bien-aimés, purifions-nous de tout ce qui souille notre corps et notre esprit et poursuivons jusqu'au bout la sainteté dans la crainte de Dieu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Des nouvelles encourageantes
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: En effet, la tristesse selon Dieu produit une repentance
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Repentance: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: même mot grec que changer d'attitude (verset 9); désignant littéralement un changement de pensée, le mot renvoie à une transformation radicale de la personne, qui renonce à ses attitudes fautives pour adopter un nouveau comportement et une nouvelle perspective, conformes à la volonté de Dieu.
      marker-yv: yv-n
    - type: text
      text: ' qui conduit au salut et que l''on ne regrette jamais, tandis que la tristesse du monde produit la mort. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Cette même tristesse selon Dieu, voyez quel empressement elle a produit en vous! Quelles excuses, quelle indignation, quelle crainte, quel désir ardent, quel zèle, quelle punition! Vous avez démontré à tout point de vue que vous étiez purs dans cette affaire.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Si donc je vous ai écrit, ce n''était ni à cause de celui qui a commis le tort, ni à cause de celui qui l''a subi; c''était afin de rendre évident à votre esprit, devant Dieu, votre empressement pour nous. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Voilà ce qui nous a réconfortés. Mais nous n''avons pas seulement été réconfortés: nous avons été beaucoup plus encore réjouis de constater la joie de Tite, qui a eu l''esprit tranquillisé par vous tous. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Si je me suis quelque peu vanté à votre sujet devant lui, je n''ai pas eu à en rougir; mais, comme nous vous avons toujours dit la vérité, ce dont nous nous sommes montrés fiers auprès de Tite s''est aussi trouvé être la vérité. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Et son affection pour vous est d''autant plus grande quand il se souvient de votre obéissance à tous et de l''accueil que vous lui avez réservé avec crainte et profond respect. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Je me réjouis de pouvoir entièrement compter sur vous.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Faites-nous une place dans votre cœur! Nous n''avons fait de tort à personne, nous n''avons ruiné personne, nous n''avons exploité personne. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ce n''est pas pour vous condamner que je parle ainsi, car j''ai déjà dit que vous êtes dans notre cœur à la vie et à la mort. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'J''ai une grande confiance en vous, j''ai toute raison d''être fier de vous; je suis pleinement réconforté, débordant de joie au milieu de toutes nos difficultés. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Depuis notre arrivée en Macédoine en effet, nous n''avons connu aucun repos; nous étions au contraire pressés de toutes parts: luttes au-dehors, craintes au-dedans. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Mais Dieu, qui réconforte ceux qui sont abattus, nous a encouragés par l''arrivée de Tite, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: et non seulement par son arrivée, mais encore par le réconfort qu'il avait reçu de vous. Il nous a raconté votre vive affection, vos larmes, votre zèle pour moi, de sorte que ma joie a été d'autant plus grande.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Même si je vous ai attristés par ma lettre, je ne le regrette pas. Et si je l''ai regretté – car je vois que cette lettre vous a momentanément attristés – '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'je me réjouis maintenant, non pas de ce que vous avez été attristés, mais de ce que votre tristesse vous a amenés à changer d''attitude, car vous avez été attristés selon Dieu, si bien que vous n''avez subi aucun dommage de notre part. '
