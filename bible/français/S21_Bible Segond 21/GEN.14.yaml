document_id: GEN.14,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Abram vainqueur de plusieurs rois
  - type: text
    content: 'Durant leur règne, Amraphel, roi de Shinear, Arjoc, roi d''Ellasar, Kedorlaomer, roi d''Elam, et Tideal, roi de Gojim, '
  '10':
  - type: text
    content: 'La vallée de Siddim était couverte de puits de bitume. Le roi de Sodome et celui de Gomorrhe prirent la fuite et y tombèrent; le reste s''enfuit vers la montagne. '
  '11':
  - type: text
    content: 'Les vainqueurs s''emparèrent de toutes les richesses de Sodome et de Gomorrhe et de toutes leurs provisions, puis ils s''en allèrent. '
  '12':
  - type: text
    content: Ils s'emparèrent aussi, avec ses biens, de Lot, le fils du frère d'Abram, avant de s'en aller. C'est qu'il habitait à Sodome.
  '13':
  - type: text
    content: 'Un rescapé vint l''annoncer à Abram l''Hébreu. Celui-ci habitait parmi les chênes de Mamré l''Amoréen, un frère d''Eshcol et d''Aner. En effet, ils avaient fait alliance avec lui. '
  '14':
  - type: text
    content: 'Dès qu''Abram apprit que son neveu avait été fait prisonnier, il arma 318 de ses plus braves serviteurs, nés chez lui, et il poursuivit les rois jusqu''à Dan. '
  '15':
  - type: text
    content: 'Il divisa sa troupe pour les attaquer de nuit avec ses serviteurs. Il les battit et les poursuivit jusqu''à Choba, qui est au nord de Damas. '
  '16':
  - type: text
    content: Il ramena toutes les richesses. Il ramena même son neveu Lot avec ses biens, ainsi que les femmes et le peuple.
  - type: heading
    content: Abram béni par Melchisédek
  '17':
  - type: text
    content: Lorsque Abram revint de sa victoire sur Kedorlaomer et sur les rois qui étaient ses alliés, le roi de Sodome sortit à sa rencontre dans la vallée de Shavé, c'est-à-dire la vallée du roi.
  '18':
  - type: text
    content: 'Melchisédek, roi de Salem, fit apporter du pain et du vin. Il était prêtre du Dieu très-haut. '
  '19':
  - type: text
    content: 'Il bénit Abram en disant: «Qu''Abram soit béni par le Dieu très-haut, le maître du ciel et de la terre! '
  '2':
  - type: text
    content: 'firent la guerre à Béra, roi de Sodome, à Birsha, roi de Gomorrhe, à Shineab, roi d''Adma, à Shémeéber, roi de Tseboïm, et au roi de Béla, c''est-à-dire Tsoar. '
  '20':
  - type: text
    content: Béni soit le Dieu très-haut qui a livré tes ennemis entre tes mains!» *Abram lui donna la dîme de tout
  - type: note
    content: 'Abram… tout: cité en Hébreux 7.2. La dîme correspond au dixième.'
  - type: text
    content: .
  '21':
  - type: text
    content: 'Le roi de Sodome dit à Abram: «Donne-moi les personnes et prends pour toi les richesses.» '
  '22':
  - type: text
    content: 'Abram répondit au roi de Sodome: «Je le jure, la main levée vers l''Eternel, le Dieu très-haut, le maître du ciel et de la terre: '
  '23':
  - type: text
    content: 'je ne prendrai rien de tout ce qui t''appartient, pas même un fil ni un cordon de sandale, afin que tu ne puisses pas dire: ‘C''est moi qui ai enrichi Abram.’ '
  '24':
  - type: text
    content: 'Il n''y aura rien pour moi, sauf ce qu''ont mangé les jeunes gens et la part des hommes qui m''ont accompagné: Aner, Eshcol et Mamré. Eux, ils prendront leur part.»'
  '3':
  - type: text
    content: 'Ces derniers s''étaient tous rassemblés dans la vallée de Siddim, c''est-à-dire la mer Morte. '
  '4':
  - type: text
    content: 'Pendant 12 ans ils avaient été soumis à Kedorlaomer, mais la treizième année ils s''étaient révoltés. '
  '5':
  - type: text
    content: 'Cependant, la quatorzième année, Kedorlaomer et les rois qui étaient ses alliés se mirent en marche et battirent les Rephaïm à Ashteroth-Karnaïm, les Zuzim à Ham, les Emim à Shavé-Kirjathaïm '
  '6':
  - type: text
    content: 'et les Horiens dans leur région montagneuse de Séir, jusqu''au chêne de Paran qui se trouve près du désert. '
  '7':
  - type: text
    content: 'Puis ils repartirent, vinrent à En-Mishpath, c''est-à-dire Kadès, et battirent les Amalécites sur tout leur territoire, ainsi que les Amoréens installés à Hatsatson-Thamar. '
  '8':
  - type: text
    content: 'Alors les rois de Sodome, de Gomorrhe, d''Adma, de Tseboïm et de Béla, c''est-à-dire Tsoar, s''avancèrent. Ils se rangèrent en ordre de bataille contre eux dans la vallée de Siddim: '
  '9':
  - type: text
    content: contre Kedorlaomer, roi d'Elam, Tideal, roi de Gojim, Amraphel, roi de Shinear, et Arjoc, roi d'Ellasar. Ils étaient 4 rois contre 5.
