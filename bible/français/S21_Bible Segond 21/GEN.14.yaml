document_id: GEN.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abram vainqueur de plusieurs rois
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Durant leur règne, Amraphel, roi de Shinear, Arjoc, roi d''Ellasar, Kedorlaomer, roi d''Elam, et Tideal, roi de Gojim, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'firent la guerre à Béra, roi de Sodome, à Birsha, roi de Gomorrhe, à Shineab, roi d''Adma, à Shémeéber, roi de Tseboïm, et au roi de Béla, c''est-à-dire Tsoar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ces derniers s''étaient tous rassemblés dans la vallée de Siddim, c''est-à-dire la mer Morte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pendant 12 ans ils avaient été soumis à Kedorlaomer, mais la treizième année ils s''étaient révoltés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Cependant, la quatorzième année, Kedorlaomer et les rois qui étaient ses alliés se mirent en marche et battirent les Rephaïm à Ashteroth-Karnaïm, les Zuzim à Ham, les Emim à Shavé-Kirjathaïm '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'et les Horiens dans leur région montagneuse de Séir, jusqu''au chêne de Paran qui se trouve près du désert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Puis ils repartirent, vinrent à En-Mishpath, c''est-à-dire Kadès, et battirent les Amalécites sur tout leur territoire, ainsi que les Amoréens installés à Hatsatson-Thamar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors les rois de Sodome, de Gomorrhe, d''Adma, de Tseboïm et de Béla, c''est-à-dire Tsoar, s''avancèrent. Ils se rangèrent en ordre de bataille contre eux dans la vallée de Siddim: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: contre Kedorlaomer, roi d'Elam, Tideal, roi de Gojim, Amraphel, roi de Shinear, et Arjoc, roi d'Ellasar. Ils étaient 4 rois contre 5.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'La vallée de Siddim était couverte de puits de bitume. Le roi de Sodome et celui de Gomorrhe prirent la fuite et y tombèrent; le reste s''enfuit vers la montagne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les vainqueurs s''emparèrent de toutes les richesses de Sodome et de Gomorrhe et de toutes leurs provisions, puis ils s''en allèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils s'emparèrent aussi, avec ses biens, de Lot, le fils du frère d'Abram, avant de s'en aller. C'est qu'il habitait à Sodome.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Un rescapé vint l''annoncer à Abram l''Hébreu. Celui-ci habitait parmi les chênes de Mamré l''Amoréen, un frère d''Eshcol et d''Aner. En effet, ils avaient fait alliance avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dès qu''Abram apprit que son neveu avait été fait prisonnier, il arma 318 de ses plus braves serviteurs, nés chez lui, et il poursuivit les rois jusqu''à Dan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il divisa sa troupe pour les attaquer de nuit avec ses serviteurs. Il les battit et les poursuivit jusqu''à Choba, qui est au nord de Damas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il ramena toutes les richesses. Il ramena même son neveu Lot avec ses biens, ainsi que les femmes et le peuple.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abram béni par Melchisédek
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Lorsque Abram revint de sa victoire sur Kedorlaomer et sur les rois qui étaient ses alliés, le roi de Sodome sortit à sa rencontre dans la vallée de Shavé, c'est-à-dire la vallée du roi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Melchisédek, roi de Salem, fit apporter du pain et du vin. Il était prêtre du Dieu très-haut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il bénit Abram en disant: «Qu''Abram soit béni par le Dieu très-haut, le maître du ciel et de la terre! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Béni soit le Dieu très-haut qui a livré tes ennemis entre tes mains!» *Abram lui donna la dîme de tout
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Abram… tout: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hébreux 7.2
      metadata:
        usfm: HEB.7.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . La dîme correspond au dixième.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le roi de Sodome dit à Abram: «Donne-moi les personnes et prends pour toi les richesses.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Abram répondit au roi de Sodome: «Je le jure, la main levée vers l''Eternel, le Dieu très-haut, le maître du ciel et de la terre: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'je ne prendrai rien de tout ce qui t''appartient, pas même un fil ni un cordon de sandale, afin que tu ne puisses pas dire: ‘C''est moi qui ai enrichi Abram.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il n''y aura rien pour moi, sauf ce qu''ont mangé les jeunes gens et la part des hommes qui m''ont accompagné: Aner, Eshcol et Mamré. Eux, ils prendront leur part.»'
