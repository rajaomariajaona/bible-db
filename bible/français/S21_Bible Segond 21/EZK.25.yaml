document_id: EZK.25,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Prophéties contre les nations
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 25.1–32.32
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sur Ammon
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l''Eternel m''a été adressée: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je l''ouvre aux nomades de l''est qui marchent contre les Ammonites et je le leur donne en possession, afin qu''on n''ait plus aucun souvenir des Ammonites parmi les nations. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je mettrai mes jugements en œuvre contre Moab, et ils reconnaîtront que je suis l'Eternel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sur Edom
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Voici ce que dit le Seigneur, l''Eternel: Edom a commis des actes de vengeance contre la communauté de Juda, il s''est rendu gravement coupable en se vengeant d''elle. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A cause de cela, voici ce que dit le Seigneur, l''Eternel: Je vais déployer ma puissance contre Edom. J''en éliminerai hommes et bêtes, je le réduirai en ruine de Théman à Dedan. Ils tomberont par l''épée. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J'exercerai ma vengeance contre Edom par l'intermédiaire de mon peuple, d'Israël. Il traitera Edom conformément à ma colère et à ma fureur. Ils reconnaîtront alors que c'est ma vengeance, déclare le Seigneur, l'Eternel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sur les Philistins
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Voici ce que dit le Seigneur, l''Eternel: Les Philistins ont commis des actes de vengeance, ils se sont vengés avec la hargne qui était en eux, en voulant tout détruire dans leur haine perpétuelle. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A cause de cela, voici ce que dit le Seigneur, l''Eternel: Je vais déployer ma puissance contre les Philistins. J''éliminerai les Kéréthiens et je ferai disparaître le reste installé sur la côte de la mer. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je mettrai de grandes vengeances en œuvre contre eux, en les punissant avec fureur, et ils reconnaîtront que je suis l'Eternel, quand j'exercerai ma vengeance contre eux.»
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Fils de l''homme, tourne ton visage vers les Ammonites et prophétise contre eux! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu annonceras aux Ammonites: ‘Ecoutez la parole du Seigneur, de l''Eternel!’ Voici ce que dit le Seigneur, l''Eternel: Tu as affirmé: ‘C''est bien fait!’ à propos de mon sanctuaire parce qu''il était profané, du territoire d''Israël parce qu''il était dévasté et de la communauté de Juda parce qu''elle partait en exil. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A cause de cela, je vais te donner en possession aux nomades de l''est. Ils installeront leurs campements chez toi, ils dresseront leurs tentes au milieu de toi. Ce sont eux qui mangeront tes fruits et qui boiront ton lait. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je ferai de Rabba un domaine pour les chameaux, et du pays des Ammonites un bercail pour les brebis. Vous reconnaîtrez alors que je suis l'Eternel.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Oui, voici ce que dit le Seigneur, l''Eternel: Parce que tu as applaudi et sauté de joie, parce que tu t''es réjoui avec toute la hargne qui était en toi à propos du territoire d''Israël, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: à cause de cela, me voici! Je vais déployer ma puissance contre toi. Je vais te donner en pillage aux nations, t'éliminer du milieu des peuples, te faire disparaître de la liste des pays, te détruire. Tu reconnaîtras alors que je suis l'Eternel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sur Moab
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Voici ce que dit le Seigneur, l''Eternel: Moab et Séir ont affirmé: ‘La communauté de Juda est comme toutes les nations.’ '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A cause de cela, je vais ouvrir le territoire de Moab du côté des villes, de ses villes frontières qui sont les joyaux du pays: Beth-Jeshimoth, Baal-Meon et Kirjathaïm. '
