document_id: JDG.13,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Naissance de Samson
  - type: text
    content: Les Israélites firent encore ce qui déplaît à l'Eternel et l'Eternel les livra entre les mains des Philistins pendant 40 ans.
  '10':
  - type: text
    content: 'Elle courut vite annoncer la nouvelle à son mari et lui dit: «L''homme qui est venu l''autre jour vers moi m''est apparu.»'
  '11':
  - type: text
    content: 'Manoach se leva pour suivre sa femme, alla vers l''homme et lui demanda: «Est-ce toi qui as parlé à ma femme?» Il répondit: «C''est moi.» '
  '12':
  - type: text
    content: 'Manoach dit: «Lorsque ta parole s''accomplira, comment faudra-t-il agir vis-à-vis de l''enfant et qu''y aura-t-il à faire?» '
  '13':
  - type: text
    content: 'L''ange de l''Eternel répondit à Manoach: «Ta femme s''abstiendra de tout ce que je lui ai dit. '
  '14':
  - type: text
    content: Elle ne goûtera à aucun produit de la vigne, elle ne boira ni vin ni liqueur forte et elle ne mangera rien d'impur. Elle respectera tout ce que je lui ai prescrit.»
  '15':
  - type: text
    content: 'Manoach dit à l''ange de l''Eternel: «Permets-nous de te retenir et de te préparer un chevreau.» '
  '16':
  - type: text
    content: 'L''ange de l''Eternel répondit à Manoach: «Même si tu me retiens, je ne mangerai pas de ton plat. En revanche, si tu veux faire un holocauste, offre-le à l''Eternel.» Manoach ne savait pas que c''était un ange de l''Eternel. '
  '17':
  - type: text
    content: 'Il dit à l''ange de l''Eternel: «Quel est ton nom, afin que nous te donnions gloire quand ta parole s''accomplira?» '
  '18':
  - type: text
    content: 'L''ange de l''Eternel lui répondit: «Pourquoi demandes-tu mon nom? Il est merveilleux.»'
  '19':
  - type: text
    content: 'Manoach prit le chevreau et l''offrande, et il fit un sacrifice à l''Eternel sur le rocher. Il se produisit quelque chose de merveilleux, pendant que Manoach et sa femme regardaient: '
  '2':
  - type: text
    content: 'Il y avait un homme de Tsorea, du clan des Danites, qui s''appelait Manoach. Sa femme était stérile et n''avait pas d''enfants. '
  '20':
  - type: text
    content: 'pendant que la flamme montait de l''autel vers le ciel, l''ange de l''Eternel monta dans cette flamme. A cette vue, Manoach et sa femme tombèrent le visage contre terre. '
  '21':
  - type: text
    content: 'L''ange de l''Eternel ne leur fut plus visible. Manoach comprit alors que c''était l''ange de l''Eternel, '
  '22':
  - type: text
    content: 'et il dit à sa femme: «Nous allons mourir, car nous avons vu Dieu.» '
  '23':
  - type: text
    content: 'Sa femme lui répondit: «Si l''Eternel avait voulu nous faire mourir, il n''aurait pas pris de nos mains l''holocauste et l''offrande, il ne nous aurait pas fait voir tout cela et il ne nous aurait pas maintenant fait entendre de pareilles choses.»'
  '24':
  - type: text
    content: 'La femme mit au monde un fils et l''appela Samson. L''enfant grandit et l''Eternel le bénit. '
  '25':
  - type: text
    content: L'Esprit de l'Eternel commença à le pousser à l'action à Machané-Dan, entre Tsorea et Eshthaol.
  '3':
  - type: text
    content: 'L''ange de l''Eternel apparut à la femme et lui dit: «Te voici stérile, sans enfants. Tu deviendras enceinte et tu mettras au monde un fils. '
  '4':
  - type: text
    content: 'Maintenant fais bien attention de ne boire ni vin ni liqueur forte et de ne rien manger d''impur, '
  '5':
  - type: text
    content: car tu vas devenir enceinte et tu mettras au monde un fils. Le rasoir ne passera pas sur sa tête, parce que cet enfant sera consacré à Dieu dès le ventre de sa mère. Ce sera lui qui commencera à délivrer Israël de la domination des Philistins.»
  '6':
  - type: text
    content: 'La femme alla dire à son mari: «Un homme de Dieu est venu vers moi et il ressemblait à un ange de Dieu, il avait l''air effrayant. Je ne lui ai pas demandé d''où il venait et il ne m''a pas fait connaître son nom, '
  '7':
  - type: text
    content: 'mais il m''a dit: ‘Tu vas devenir enceinte et tu mettras au monde un fils. Maintenant ne bois ni vin ni liqueur forte et ne mange rien d''impur, parce que cet enfant sera consacré à Dieu dès le ventre de sa mère jusqu''au jour de sa mort.’»'
  '8':
  - type: text
    content: 'Manoach fit cette prière à l''Eternel: «Ah! Seigneur, que l''homme de Dieu que tu as envoyé vienne encore vers nous et qu''il nous enseigne ce que nous devons faire pour l''enfant qui naîtra!» '
  '9':
  - type: text
    content: 'Dieu exauça la prière de Manoach et l''ange de Dieu vint encore vers la femme. Elle se trouvait dans un champ et Manoach, son mari, n''était pas avec elle. '
