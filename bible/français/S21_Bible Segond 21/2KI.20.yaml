document_id: 2KI.20,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Maladie et guérison d'Ezéchias
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A cette époque-là, Ezéchias fut atteint d''une maladie mortelle. Le prophète Esaïe, fils d''Amots, vint le trouver et lui annonça: «Voici ce que dit l''Eternel: Donne tes ordres à ta famille car tu vas mourir, tu ne vivras plus.»'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ezéchias répondit: «C''est facile pour l''ombre d''avancer de 10 marches. Qu''elle recule plutôt de 10 marches!» '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors le prophète Esaïe fit appel à l'Eternel et celui-ci fit reculer l'ombre de 10 marches sur l'escalier d'Achaz, où elle était déjà descendue.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Erreur d'Ezéchias
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A la même époque, le roi de Babylone Berodac-Baladan, fils de Baladan, envoya une lettre et un cadeau à Ezéchias, car il avait appris sa maladie. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ezéchias donna audience aux envoyés et leur montra l'endroit où étaient ses objets de valeur, l'argent et l'or, les aromates et l'huile précieuse, son arsenal et tout ce qui se trouvait dans ses trésors. Ezéchias leur montra absolument tout dans son palais et sur tout son territoire.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le prophète Esaïe vint ensuite trouver le roi Ezéchias et lui demanda: «Qu''ont dit ces gens-là et d''où sont-ils venus pour te voir?» Ezéchias répondit: «Ils sont venus d''un pays éloigné, de Babylone.» '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esaïe ajouta: «Qu''ont-ils vu dans ton palais?» Ezéchias répondit: «Ils ont vu tout ce qu''il y a chez moi, je leur ai montré absolument tout dans mes trésors.» '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Esaïe dit à Ezéchias: «Ecoute la parole de l''Eternel! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les jours viendront où l''on emportera à Babylone tout ce qu''il y a chez toi et que tes ancêtres ont accumulé jusqu''à aujourd''hui. Il n''en restera rien, dit l''Eternel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De plus, on prendra plusieurs de tes fils, de ceux qui sont issus de toi et dont tu es le père, pour faire d''eux des eunuques dans le palais du roi de Babylone.» '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ezéchias répondit à Esaïe: «La parole de l''Eternel, que tu viens de dire, est bonne.» Il ajouta: «N''y aura-t-il pas paix et sécurité pendant ma vie?»'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ezéchias tourna le visage contre le mur et fit cette prière à l''Eternel: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le reste des actes d'Ezéchias, tous ses exploits, la manière dont il a fait le réservoir et l'aqueduc pour amener l'eau dans la ville, cela est décrit dans les annales des rois de Juda.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ezéchias se coucha avec ses ancêtres. Son fils Manassé devint roi à sa place.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Eternel, souviens-toi que j'ai marché devant toi dans la vérité, avec un cœur intègre, et que j'ai fait ce qui est bien à tes yeux!» Puis il pleura abondamment.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esaïe était sorti, mais il n''avait pas encore atteint la cour du milieu que la parole de l''Eternel lui fut adressée: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Retourne annoncer à Ezéchias, le chef de mon peuple: ‘Voici ce que dit l''Eternel, le Dieu de ton ancêtre David: J''ai entendu ta prière, j''ai vu tes larmes. Je vais te guérir et dès après-demain tu pourras monter à la maison de l''Eternel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J'ajouterai 15 années à ta vie. Je te délivrerai, de même que cette ville, du roi d'Assyrie. Je protégerai cette ville à cause de moi-même et à cause de mon serviteur David.’»
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esaïe dit: «Prenez un gâteau aux figues.» On le prit et on l''appliqua sur l''ulcère, et Ezéchias guérit. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ezéchias avait demandé à Esaïe: «Quel est le signe que l''Eternel me guérira et que je pourrai monter dès après-demain à la maison de l''Eternel?» '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esaïe dit: «Voici pour toi, de la part de l''Eternel, le signe qu''il accomplira la parole qu''il a prononcée: l''ombre doit-elle avancer ou reculer de 10 marches?» '
