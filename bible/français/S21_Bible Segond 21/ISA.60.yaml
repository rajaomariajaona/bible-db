document_id: ISA.60,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Gloire future de Jérusalem
  - type: text
    content: Lève-toi, brille, car ta lumière arrive
  - type: text
    content: et la gloire de l'Eternel se lève sur toi.
  '10':
  - type: text
    content: Des étrangers reconstruiront tes murailles
  - type: text
    content: et leurs rois te serviront,
  - type: text
    content: car dans mon irritation je t'avais frappée,
  - type: text
    content: mais dans ma grâce j'ai compassion de toi.
  '11':
  - type: text
    content: Tes portes seront constamment ouvertes,
  - type: text
    content: elles ne seront fermées ni le jour ni la nuit
  - type: text
    content: pour laisser entrer chez toi les ressources des nations,
  - type: text
    content: ainsi que leurs rois en cortège.
  '12':
  - type: text
    content: En effet, la nation et le royaume qui ne te seront pas asservis disparaîtront,
  - type: text
    content: ces nations-là seront totalement ruinées.
  '13':
  - type: text
    content: Ce qui fait la gloire du Liban viendra chez toi
  - type: text
    content: – le cyprès, l'orme et le buis tous ensemble –
  - type: text
    content: pour donner de la splendeur à l'emplacement de mon sanctuaire,
  - type: text
    content: et j'honorerai l'endroit où je me tiens.
  '14':
  - type: text
    content: Les fils de tes oppresseurs viendront s'incliner devant toi
  - type: text
    content: et tous ceux qui te méprisaient se prosterneront à tes pieds.
  - type: text
    content: Ils t'appelleront «ville de l'Eternel»,
  - type: text
    content: «Sion du Saint d'Israël».
  '15':
  - type: text
    content: Toi qui étais abandonnée et détestée,
  - type: text
    content: toi que personne ne traversait plus,
  - type: text
    content: je ferai de toi un ornement éternel,
  - type: text
    content: un sujet de joie de génération en génération.
  '16':
  - type: text
    content: Tu te nourriras du lait des nations,
  - type: text
    content: tu te rassasieras des richesses des rois,
  - type: text
    content: et tu sauras que c'est moi qui suis l'Eternel, ton sauveur,
  - type: text
    content: celui qui te rachète, le Dieu puissant de Jacob.
  '17':
  - type: text
    content: Au lieu du bronze je ferai venir de l'or,
  - type: text
    content: au lieu du fer je ferai venir de l'argent,
  - type: text
    content: au lieu du bois, du bronze,
  - type: text
    content: et au lieu des pierres, du fer.
  - type: text
    content: Je désignerai la paix pour te surveiller et la justice pour dominer sur toi.
  '18':
  - type: text
    content: Il ne sera plus jamais question de violence dans ton pays,
  - type: text
    content: ni de destruction et de malheur sur ton territoire.
  - type: text
    content: Tu appelleras tes murailles «salut»
  - type: text
    content: et tes portes «louange».
  '19':
  - type: text
    content: Ce ne sera plus le soleil qui te servira de lumière pendant le jour,
  - type: text
    content: ni la lune qui t'éclairera de sa lueur [pendant la nuit],
  - type: text
    content: mais c'est l'Eternel qui sera ta lumière éternelle,
  - type: text
    content: c'est ton Dieu qui fera ta splendeur.
  '2':
  - type: text
    content: Certes, les ténèbres recouvrent la terre
  - type: text
    content: et l'obscurité profonde enveloppe les peuples,
  - type: text
    content: mais sur toi l'Eternel se lèvera,
  - type: text
    content: sur toi sa gloire apparaîtra.
  '20':
  - type: text
    content: Ton soleil ne se couchera plus
  - type: text
    content: et ta lune ne s'obscurcira plus,
  - type: text
    content: car l'Eternel sera ta lumière pour toujours
  - type: text
    content: et ta période de deuil sera terminée.
  '21':
  - type: text
    content: Ton peuple ne sera plus composé que de justes
  - type: text
    content: et ils hériteront pour toujours de la terre,
  - type: text
    content: eux le rejeton planté par moi, le produit de mes mains
  - type: text
    content: destiné à manifester ma splendeur.
  '22':
  - type: text
    content: Le plus petit se transformera en millier
  - type: text
    content: et le plus insignifiant en nation puissante.
  - type: text
    content: C'est moi, l'Eternel, qui ferai survenir cela très vite, au moment voulu.
  '3':
  - type: text
    content: Des nations marcheront à ta lumière, et des rois à la clarté de ton aurore.
  '4':
  - type: text
    content: 'Lève tes yeux et regarde autour de toi:'
  - type: text
    content: ils se rassemblent tous, ils viennent vers toi;
  - type: text
    content: tes fils arrivent de loin
  - type: text
    content: et tes filles sont portées dans les bras.
  '5':
  - type: text
    content: En le voyant, tu rayonneras de joie,
  - type: text
    content: ton cœur bondira et se dilatera,
  - type: text
    content: car les richesses de la mer se tourneront vers toi,
  - type: text
    content: les ressources des nations viendront chez toi.
  '6':
  - type: text
    content: Tu seras couverte d'une foule de chameaux,
  - type: text
    content: de tout jeunes dromadaires venus de Madian et d'Epha.
  - type: text
    content: Ils viendront tous de Séba,
  - type: text
    content: porteurs d'or et d'encens,
  - type: text
    content: et annonceront les louanges de l'Eternel.
  '7':
  - type: text
    content: Les troupeaux de Kédar seront tous réunis chez toi,
  - type: text
    content: 'les béliers de Nebajoth serviront à ton culte:'
  - type: text
    content: ils seront offerts en holocauste sur mon autel et je les accepterai,
  - type: text
    content: et j'illuminerai le temple de ma splendeur.
  '8':
  - type: text
    content: Qui sont ces hommes qui volent comme un nuage,
  - type: text
    content: comme des colombes vers leurs pigeonniers?
  '9':
  - type: text
    content: C'est que les îles placent leur attente en moi
  - type: text
    content: et les bateaux long-courriers sont en tête
  - type: text
    content: pour ramener tes enfants de loin.
  - type: text
    content: Ils apportent leur argent et leur or
  - type: text
    content: en l'honneur de l'Eternel, ton Dieu,
  - type: text
    content: en l'honneur du Saint d'Israël, parce qu'il t'a accordé la splendeur.
