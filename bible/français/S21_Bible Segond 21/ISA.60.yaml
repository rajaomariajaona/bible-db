document_id: ISA.60,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Gloire future de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lève-toi, brille, car ta lumière arrive
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la gloire de l'Eternel se lève sur toi.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des étrangers reconstruiront tes murailles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leurs rois te serviront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car dans mon irritation je t'avais frappée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais dans ma grâce j'ai compassion de toi.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes portes seront constamment ouvertes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles ne seront fermées ni le jour ni la nuit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour laisser entrer chez toi les ressources des nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi que leurs rois en cortège.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, la nation et le royaume qui ne te seront pas asservis disparaîtront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ces nations-là seront totalement ruinées.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce qui fait la gloire du Liban viendra chez toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – le cyprès, l'orme et le buis tous ensemble –
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour donner de la splendeur à l'emplacement de mon sanctuaire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j'honorerai l'endroit où je me tiens.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les fils de tes oppresseurs viendront s'incliner devant toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous ceux qui te méprisaient se prosterneront à tes pieds.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils t'appelleront «ville de l'Eternel»,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Sion du Saint d'Israël».
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi qui étais abandonnée et détestée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi que personne ne traversait plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ferai de toi un ornement éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un sujet de joie de génération en génération.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu te nourriras du lait des nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu te rassasieras des richesses des rois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu sauras que c'est moi qui suis l'Eternel, ton sauveur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui te rachète, le Dieu puissant de Jacob.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au lieu du bronze je ferai venir de l'or,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au lieu du fer je ferai venir de l'argent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au lieu du bois, du bronze,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et au lieu des pierres, du fer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je désignerai la paix pour te surveiller et la justice pour dominer sur toi.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne sera plus jamais question de violence dans ton pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni de destruction et de malheur sur ton territoire.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu appelleras tes murailles «salut»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tes portes «louange».
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce ne sera plus le soleil qui te servira de lumière pendant le jour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni la lune qui t'éclairera de sa lueur [pendant la nuit],
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais c'est l'Eternel qui sera ta lumière éternelle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est ton Dieu qui fera ta splendeur.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Certes, les ténèbres recouvrent la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'obscurité profonde enveloppe les peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais sur toi l'Eternel se lèvera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur toi sa gloire apparaîtra.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton soleil ne se couchera plus
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ta lune ne s'obscurcira plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l'Eternel sera ta lumière pour toujours
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ta période de deuil sera terminée.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton peuple ne sera plus composé que de justes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils hériteront pour toujours de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eux le rejeton planté par moi, le produit de mes mains
  - type: usfm
    marker: q1
    children:
    - type: text
      text: destiné à manifester ma splendeur.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le plus petit se transformera en millier
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le plus insignifiant en nation puissante.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est moi, l'Eternel, qui ferai survenir cela très vite, au moment voulu.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des nations marcheront à ta lumière, et des rois à la clarté de ton aurore.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lève tes yeux et regarde autour de toi:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se rassemblent tous, ils viennent vers toi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tes fils arrivent de loin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tes filles sont portées dans les bras.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En le voyant, tu rayonneras de joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ton cœur bondira et se dilatera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car les richesses de la mer se tourneront vers toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les ressources des nations viendront chez toi.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu seras couverte d'une foule de chameaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de tout jeunes dromadaires venus de Madian et d'Epha.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils viendront tous de Séba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: porteurs d'or et d'encens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et annonceront les louanges de l'Eternel.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les troupeaux de Kédar seront tous réunis chez toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'les béliers de Nebajoth serviront à ton culte:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils seront offerts en holocauste sur mon autel et je les accepterai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j'illuminerai le temple de ma splendeur.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui sont ces hommes qui volent comme un nuage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme des colombes vers leurs pigeonniers?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est que les îles placent leur attente en moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les bateaux long-courriers sont en tête
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour ramener tes enfants de loin.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils apportent leur argent et leur or
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en l'honneur de l'Eternel, ton Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en l'honneur du Saint d'Israël, parce qu'il t'a accordé la splendeur.
