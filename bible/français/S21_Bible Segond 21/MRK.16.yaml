document_id: MRK.16,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Résurrection de Jésus
  - type: text
    content: 'Lorsque le sabbat fut passé, Marie de Magdala, Marie la mère de Jacques et Salomé achetèrent des aromates afin d''aller embaumer Jésus. '
  '10':
  - type: text
    content: 'Elle partit l''annoncer à ceux qui avaient été avec lui et qui étaient tristes et pleuraient, '
  '11':
  - type: text
    content: mais quand ils entendirent qu'il était vivant et qu'elle l'avait vu, ils ne la crurent pas.
  '12':
  - type: text
    content: 'Après cela, il apparut sous une autre forme à deux d''entre eux qui se rendaient à la campagne. '
  '13':
  - type: text
    content: Eux aussi revinrent l'annoncer aux autres, qui ne les crurent pas non plus.
  '14':
  - type: text
    content: Enfin, il apparut aux onze pendant qu'ils étaient à table, et il leur reprocha leur incrédulité et la dureté de leur cœur, parce qu'ils n'avaient pas cru ceux qui l'avaient vu ressuscité.
  '15':
  - type: text
    content: 'Puis il leur dit: «Allez dans le monde entier proclamer la bonne nouvelle à toute la création. '
  '16':
  - type: text
    content: 'Celui qui croira et qui sera baptisé sera sauvé, mais celui qui ne croira pas sera condamné. '
  '17':
  - type: text
    content: 'Voici les signes qui accompagneront ceux qui auront cru: en mon nom, ils pourront chasser des démons, parler de nouvelles langues, '
  '18':
  - type: text
    content: attraper des serpents, et s'ils boivent un breuvage mortel, celui-ci ne leur fera aucun mal; ils poseront les mains sur les malades et ceux-ci seront guéris.»
  '19':
  - type: text
    content: 'Après leur avoir parlé, le Seigneur fut enlevé au ciel, et il s''assit à la droite de Dieu. '
  '2':
  - type: text
    content: 'Le dimanche, elles se rendirent au tombeau de grand matin, au lever du soleil. '
  '20':
  - type: text
    content: Quant à eux, ils s'en allèrent prêcher partout. Le Seigneur travaillait avec eux et confirmait la parole par les signes qui l'accompagnaient.]
  '3':
  - type: text
    content: 'Elles se disaient entre elles: «Qui nous roulera la pierre qui ferme l''entrée du tombeau?» '
  '4':
  - type: text
    content: 'Mais quand elles levèrent les yeux, elles s''aperçurent que la pierre, qui était très grande, avait été roulée. '
  '5':
  - type: text
    content: 'Elles pénétrèrent dans le tombeau, virent un jeune homme assis à droite, habillé d''une robe blanche, et elles furent épouvantées. '
  '6':
  - type: text
    content: 'Il leur dit: «N''ayez pas peur. Vous cherchez Jésus de Nazareth, celui qui a été crucifié. Il est ressuscité, il n''est pas ici! Voici l''endroit où on l''avait déposé. '
  '7':
  - type: text
    content: 'Mais allez dire à ses disciples et à Pierre qu''il vous précède en Galilée: c''est là que vous le verrez, comme il vous l''a dit.» '
  '8':
  - type: text
    content: Elles sortirent du tombeau et s'enfuirent, toutes tremblantes et bouleversées, et elles ne dirent rien à personne car elles étaient effrayées.
  - type: heading
    content: Apparitions de Jésus ressuscité
  '9':
  - type: text
    content: '[Ressuscité le dimanche matin, Jésus apparut d''abord à Marie de Magdala, dont il avait chassé sept démons. '
