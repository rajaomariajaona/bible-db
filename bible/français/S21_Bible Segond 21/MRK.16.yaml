document_id: MRK.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Résurrection de Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque le sabbat fut passé, Marie de Magdala, Marie la mère de Jacques et Salomé achetèrent des aromates afin d''aller embaumer Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le dimanche, elles se rendirent au tombeau de grand matin, au lever du soleil. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Elles se disaient entre elles: «Qui nous roulera la pierre qui ferme l''entrée du tombeau?» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mais quand elles levèrent les yeux, elles s''aperçurent que la pierre, qui était très grande, avait été roulée. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Elles pénétrèrent dans le tombeau, virent un jeune homme assis à droite, habillé d''une robe blanche, et elles furent épouvantées. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il leur dit: «N''ayez pas peur. Vous cherchez Jésus de Nazareth, celui qui a été crucifié. Il est ressuscité, il n''est pas ici! Voici l''endroit où on l''avait déposé. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais allez dire à ses disciples et à Pierre qu''il vous précède en Galilée: c''est là que vous le verrez, comme il vous l''a dit.» '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Elles sortirent du tombeau et s'enfuirent, toutes tremblantes et bouleversées, et elles ne dirent rien à personne car elles étaient effrayées.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Apparitions de Jésus ressuscité
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '[Ressuscité le dimanche matin, Jésus apparut d''abord à Marie de Magdala, dont il avait chassé sept démons. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Elle partit l''annoncer à ceux qui avaient été avec lui et qui étaient tristes et pleuraient, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: mais quand ils entendirent qu'il était vivant et qu'elle l'avait vu, ils ne la crurent pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Après cela, il apparut sous une autre forme à deux d''entre eux qui se rendaient à la campagne. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Eux aussi revinrent l'annoncer aux autres, qui ne les crurent pas non plus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Enfin, il apparut aux onze pendant qu'ils étaient à table, et il leur reprocha leur incrédulité et la dureté de leur cœur, parce qu'ils n'avaient pas cru ceux qui l'avaient vu ressuscité.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Puis il leur dit: «Allez dans le monde entier proclamer la bonne nouvelle à toute la création. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Celui qui croira et qui sera baptisé sera sauvé, mais celui qui ne croira pas sera condamné. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Voici les signes qui accompagneront ceux qui auront cru: en mon nom, ils pourront chasser des démons, parler de nouvelles langues, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: attraper des serpents, et s'ils boivent un breuvage mortel, celui-ci ne leur fera aucun mal; ils poseront les mains sur les malades et ceux-ci seront guéris.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Après leur avoir parlé, le Seigneur fut enlevé au ciel, et il s''assit à la droite de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Quant à eux, ils s'en allèrent prêcher partout. Le Seigneur travaillait avec eux et confirmait la parole par les signes qui l'accompagnaient.]
