document_id: 1CH.27,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Chefs d'armée de David
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Voici, d'après leur nombre, les Israélites qui étaient chefs de famille, chefs de milliers et de centaines, ou encore officiers au service du roi pour tout ce qui concernait les divisions militaires, leur arrivée et leur départ, mois par mois, pendant tous les mois de l'année. Chaque division comptait 24'000 hommes.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Le septième, pour le septième mois, était Hélets le Pelonite, de la tribu d'Ephraïm. Il était responsable d'une division de 24'000 hommes.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Le huitième, pour le huitième mois, était Sibbecaï le Hushatite, de la famille des Zérachites. Il était responsable d'une division de 24'000 hommes.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Le neuvième, pour le neuvième mois, était Abiézer, d'Anathoth, un Benjaminite. Il était responsable d'une division de 24'000 hommes.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Le dixième, pour le dixième mois, était Maharaï, de Nethopha, de la famille des Zérachites. Il était responsable d'une division de 24'000 hommes.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Le onzième, pour le onzième mois, était Benaja, de Pirathon, de la tribu d'Ephraïm. Il était responsable d'une division de 24'000 hommes.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Le douzième, pour le douzième mois, était Heldaï, de Nethopha, de la famille d'Othniel. Il était responsable d'une division de 24'000 hommes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Chefs des tribus d'Israël
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Voici les chefs des tribus d''Israël. Prince des Rubénites: Eliézer, fils de Zicri; des Siméonites: Shephathia, fils de Maaca; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'des Lévites: Hashabia, fils de Kemuel; de la famille d''Aaron: Tsadok; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'de Juda: Elihu, l''un des frères de David; d''Issacar: Omri, fils de Micaël; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'de Zabulon: Jishemaeja, fils d''Abdias; de Nephthali: Jerimoth, fils d''Azriel; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'A la tête de la première division, pour le premier mois, se trouvait Jashobeam, fils de Zabdiel. Il était responsable d''une division de 24''000 hommes. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'des fils d''Ephraïm: Hosée, fils d''Azazia; de la demi-tribu de Manassé: Joël, fils de Pedaja; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'de la demi-tribu de Manassé installée en Galaad: Jiddo, fils de Zacharie; de Benjamin: Jaasiel, fils d''Abner; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'de Dan: Azareel, fils de Jerocham. Voilà quels étaient les chefs des tribus d''Israël.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'David ne fit pas le dénombrement des Israélites âgés de moins de 20 ans, car l''Eternel avait promis de multiplier Israël comme les étoiles du ciel. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Joab, fils de Tseruja, avait commencé le dénombrement, mais il ne le termina pas, car la colère de Dieu avait éclaté contre Israël à cause de lui, et son résultat ne fut pas inscrit dans les chiffres des annales du roi David.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Administrateurs et conseillers de David
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Azmaveth, fils d''Adiel, était responsable des trésors du roi; Jonathan, fils d''Ozias, des réserves dans les campagnes, les villes, les villages et les tours; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Ezri, fils de Kelub, des ouvriers de la campagne qui cultivaient la terre; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Shimeï, de Rama, des vignes; Zabdi, de Shepham, des réserves de vin provenant de ces vignes; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Baal-Hanan, de Guéder, des oliviers et des sycomores dans la plaine; Joash, des réserves d''huile; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Shithraï, du Saron, des bœufs qui se trouvaient dans les pâturages du Saron; Shaphath, fils d''Adlaï, des bœufs qui se trouvaient dans les vallées; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Il faisait partie des descendants de Pérets et il commandait tous les chefs des troupes du premier mois.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Obil, l''Ismaélite, des chameaux; Jechdia, de Méronoth, des ânesses; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Jaziz, l'Hagarénien, des brebis. Tous ces hommes étaient intendants des biens du roi David.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Jonathan, l''oncle de David, faisait office de conseiller; c''était un homme compétent et instruit. Jehiel, fils de Hacmoni, avait la charge des fils du roi. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Achitophel était le conseiller du roi. Hushaï l''Arkien était le confident du roi. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Jehojada, fils de Benaja, et Abiathar succédèrent à Achitophel. Joab était le chef de l'armée du roi.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: A la tête de la division du deuxième mois se trouvait Dodaï, l'Achochite. Mikloth commandait sa division de 24'000 hommes.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Le chef de la troisième armée, pour le troisième mois, était Benaja, fils de Jehojada, le grand-prêtre. Il était responsable d''une division de 24''000 hommes. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ce Benaja était un héros parmi les trente et dépassait les trente; son fils Ammizadab faisait partie de sa division.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Le quatrième, pour le quatrième mois, était Asaël, frère de Joab, suivi de son fils Zebadia. Il était responsable d'une division de 24'000 hommes.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Le cinquième, pour le cinquième mois, était le chef Shamehuth, le Jizrachite. Il était responsable d'une division de 24'000 hommes.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Le sixième, pour le sixième mois, était Ira, fils d'Ikkesh, le Tekoïte. Il était responsable d'une division de 24'000 hommes.
