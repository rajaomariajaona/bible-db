document_id: 1CH.27,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Chefs d'armée de David
  - type: text
    content: Voici, d'après leur nombre, les Israélites qui étaient chefs de famille, chefs de milliers et de centaines, ou encore officiers au service du roi pour tout ce qui concernait les divisions militaires, leur arrivée et leur départ, mois par mois, pendant tous les mois de l'année. Chaque division comptait 24'000 hommes.
  '10':
  - type: text
    content: Le septième, pour le septième mois, était Hélets le Pelonite, de la tribu d'Ephraïm. Il était responsable d'une division de 24'000 hommes.
  '11':
  - type: text
    content: Le huitième, pour le huitième mois, était Sibbecaï le Hushatite, de la famille des Zérachites. Il était responsable d'une division de 24'000 hommes.
  '12':
  - type: text
    content: Le neuvième, pour le neuvième mois, était Abiézer, d'Anathoth, un Benjaminite. Il était responsable d'une division de 24'000 hommes.
  '13':
  - type: text
    content: Le dixième, pour le dixième mois, était Maharaï, de Nethopha, de la famille des Zérachites. Il était responsable d'une division de 24'000 hommes.
  '14':
  - type: text
    content: Le onzième, pour le onzième mois, était Benaja, de Pirathon, de la tribu d'Ephraïm. Il était responsable d'une division de 24'000 hommes.
  '15':
  - type: text
    content: Le douzième, pour le douzième mois, était Heldaï, de Nethopha, de la famille d'Othniel. Il était responsable d'une division de 24'000 hommes.
  - type: heading
    content: Chefs des tribus d'Israël
  '16':
  - type: text
    content: 'Voici les chefs des tribus d''Israël. Prince des Rubénites: Eliézer, fils de Zicri; des Siméonites: Shephathia, fils de Maaca; '
  '17':
  - type: text
    content: 'des Lévites: Hashabia, fils de Kemuel; de la famille d''Aaron: Tsadok; '
  '18':
  - type: text
    content: 'de Juda: Elihu, l''un des frères de David; d''Issacar: Omri, fils de Micaël; '
  '19':
  - type: text
    content: 'de Zabulon: Jishemaeja, fils d''Abdias; de Nephthali: Jerimoth, fils d''Azriel; '
  '2':
  - type: text
    content: 'A la tête de la première division, pour le premier mois, se trouvait Jashobeam, fils de Zabdiel. Il était responsable d''une division de 24''000 hommes. '
  '20':
  - type: text
    content: 'des fils d''Ephraïm: Hosée, fils d''Azazia; de la demi-tribu de Manassé: Joël, fils de Pedaja; '
  '21':
  - type: text
    content: 'de la demi-tribu de Manassé installée en Galaad: Jiddo, fils de Zacharie; de Benjamin: Jaasiel, fils d''Abner; '
  '22':
  - type: text
    content: 'de Dan: Azareel, fils de Jerocham. Voilà quels étaient les chefs des tribus d''Israël.'
  '23':
  - type: text
    content: 'David ne fit pas le dénombrement des Israélites âgés de moins de 20 ans, car l''Eternel avait promis de multiplier Israël comme les étoiles du ciel. '
  '24':
  - type: text
    content: Joab, fils de Tseruja, avait commencé le dénombrement, mais il ne le termina pas, car la colère de Dieu avait éclaté contre Israël à cause de lui, et son résultat ne fut pas inscrit dans les chiffres des annales du roi David.
  - type: heading
    content: Administrateurs et conseillers de David
  '25':
  - type: text
    content: 'Azmaveth, fils d''Adiel, était responsable des trésors du roi; Jonathan, fils d''Ozias, des réserves dans les campagnes, les villes, les villages et les tours; '
  '26':
  - type: text
    content: 'Ezri, fils de Kelub, des ouvriers de la campagne qui cultivaient la terre; '
  '27':
  - type: text
    content: 'Shimeï, de Rama, des vignes; Zabdi, de Shepham, des réserves de vin provenant de ces vignes; '
  '28':
  - type: text
    content: 'Baal-Hanan, de Guéder, des oliviers et des sycomores dans la plaine; Joash, des réserves d''huile; '
  '29':
  - type: text
    content: 'Shithraï, du Saron, des bœufs qui se trouvaient dans les pâturages du Saron; Shaphath, fils d''Adlaï, des bœufs qui se trouvaient dans les vallées; '
  '3':
  - type: text
    content: Il faisait partie des descendants de Pérets et il commandait tous les chefs des troupes du premier mois.
  '30':
  - type: text
    content: 'Obil, l''Ismaélite, des chameaux; Jechdia, de Méronoth, des ânesses; '
  '31':
  - type: text
    content: Jaziz, l'Hagarénien, des brebis. Tous ces hommes étaient intendants des biens du roi David.
  '32':
  - type: text
    content: 'Jonathan, l''oncle de David, faisait office de conseiller; c''était un homme compétent et instruit. Jehiel, fils de Hacmoni, avait la charge des fils du roi. '
  '33':
  - type: text
    content: 'Achitophel était le conseiller du roi. Hushaï l''Arkien était le confident du roi. '
  '34':
  - type: text
    content: Jehojada, fils de Benaja, et Abiathar succédèrent à Achitophel. Joab était le chef de l'armée du roi.
  '4':
  - type: text
    content: A la tête de la division du deuxième mois se trouvait Dodaï, l'Achochite. Mikloth commandait sa division de 24'000 hommes.
  '5':
  - type: text
    content: 'Le chef de la troisième armée, pour le troisième mois, était Benaja, fils de Jehojada, le grand-prêtre. Il était responsable d''une division de 24''000 hommes. '
  '6':
  - type: text
    content: Ce Benaja était un héros parmi les trente et dépassait les trente; son fils Ammizadab faisait partie de sa division.
  '7':
  - type: text
    content: Le quatrième, pour le quatrième mois, était Asaël, frère de Joab, suivi de son fils Zebadia. Il était responsable d'une division de 24'000 hommes.
  '8':
  - type: text
    content: Le cinquième, pour le cinquième mois, était le chef Shamehuth, le Jizrachite. Il était responsable d'une division de 24'000 hommes.
  '9':
  - type: text
    content: Le sixième, pour le sixième mois, était Ira, fils d'Ikkesh, le Tekoïte. Il était responsable d'une division de 24'000 hommes.
