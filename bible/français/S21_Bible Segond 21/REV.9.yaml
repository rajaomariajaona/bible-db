document_id: REV.9,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Le cinquième ange sonna de la trompette et je vis une étoile qui était tombée du ciel sur la terre. La clé du puits de l''abîme lui fut donnée. '
  '10':
  - type: text
    content: 'Elles avaient des queues armées de dards comme les scorpions, et c''est dans leur queue que se trouvait leur pouvoir de faire du mal aux hommes durant cinq mois. '
  '11':
  - type: text
    content: A leur tête, elles avaient comme roi l'ange de l'abîme, appelé en hébreu Abaddon et en grec Apollyon.
  '12':
  - type: text
    content: Le premier malheur est passé. Voici que deux malheurs viennent encore après cela.
  '13':
  - type: text
    content: 'Le sixième ange sonna de la trompette, et j''entendis une voix venant des quatre cornes de l''autel d''or qui est devant Dieu. '
  '14':
  - type: text
    content: 'Elle disait au sixième ange qui tenait la trompette: «Relâche les quatre anges qui sont enchaînés près du grand fleuve, l''Euphrate.» '
  '15':
  - type: text
    content: 'Ainsi les quatre anges qui étaient prêts pour l''heure, le jour, le mois et l''année furent relâchés afin de faire mourir le tiers des hommes. '
  '16':
  - type: text
    content: 'Le nombre des troupes de la cavalerie était de 200 millions; j''en entendis le nombre. '
  '17':
  - type: text
    content: 'Voici comment, dans la vision, je vis les chevaux et ceux qui les montaient: ils avaient des cuirasses couleur de feu, d''hyacinthe et de soufre. Les têtes des chevaux étaient comme des têtes de lions, et de leur bouche sortaient du feu, de la fumée et du soufre. '
  '18':
  - type: text
    content: 'Le tiers des hommes fut tué par ces trois fléaux: le feu, la fumée et le soufre, qui sortaient de leur bouche. '
  '19':
  - type: text
    content: 'En effet, le pouvoir des chevaux se trouvait dans leur bouche et dans leur queue. Leurs queues ressemblaient à des serpents; elles avaient des têtes, et c''est par elles qu''ils faisaient du mal. '
  '2':
  - type: text
    content: 'Elle ouvrit le puits de l''abîme et une fumée pareille à celle d''une grande fournaise monta du puits; le soleil et l''air furent obscurcis par la fumée du puits. '
  '20':
  - type: text
    content: 'Les autres hommes, ceux qui n''avaient pas été tués par ces fléaux, ne se détournèrent pas de ce que leurs mains avaient fait: ils ne cessèrent pas d''adorer les démons et les idoles en or, en argent, en bronze, en pierre et en bois qui ne peuvent ni voir, ni entendre, ni marcher, '
  '21':
  - type: text
    content: et ils ne se repentirent pas de leurs meurtres, ni de leur sorcellerie, ni de leur immoralité sexuelle, ni de leurs vols.
  '3':
  - type: text
    content: 'Des sauterelles sortirent de la fumée et couvrirent la terre, et un pouvoir semblable à celui des scorpions de la terre leur fut donné. '
  '4':
  - type: text
    content: 'Elles reçurent l''ordre de ne pas faire de mal à l''herbe de la terre, ni à aucune verdure, ni à aucun arbre, mais seulement aux hommes qui n''avaient pas l''empreinte de Dieu sur le front. '
  '5':
  - type: text
    content: Il leur fut permis, non de les tuer, mais de les tourmenter pendant cinq mois. Le tourment qu'elles causaient était comme celui causé par le scorpion quand il pique un homme.
  '6':
  - type: text
    content: 'Durant ces jours-là, les hommes rechercheront la mort et ne la trouveront pas. Ils désireront mourir, mais la mort fuira loin d''eux. '
  '7':
  - type: text
    content: 'Ces sauterelles ressemblaient à des chevaux préparés pour le combat. Elles avaient sur la tête comme une couronne d''or, et leur visage était pareil à celui d''un homme. '
  '8':
  - type: text
    content: 'Elles avaient des cheveux semblables à des cheveux de femme et leurs dents étaient comme celles des lions. '
  '9':
  - type: text
    content: 'Leur poitrine était comme une cuirasse de fer et le bruit de leurs ailes ressemblait à celui de chars tirés par plusieurs chevaux qui courent au combat. '
