document_id: JHN.18,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Mort et résurrection de Jésus
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 18.1–21.25
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Arrestation de Jésus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après avoir dit ces paroles, Jésus alla avec ses disciples de l''autre côté du torrent du Cédron où se trouvait un jardin; il y entra, lui et ses disciples. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Simon Pierre, qui avait une épée, la tira, frappa le serviteur du grand-prêtre et lui coupa l''oreille droite. Ce serviteur s''appelait Malchus. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus dit à Pierre: «Remets ton épée dans son fourreau. Ne boirai-je pas la coupe que le Père m''a donnée à boire?»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus devant les autorités juives
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La troupe, le commandant et les gardes des Juifs s''emparèrent alors de Jésus et l''attachèrent. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils l''emmenèrent d''abord chez Anne, car il était le beau-père de Caïphe qui était grand-prêtre cette année-là. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or Caïphe était celui qui avait donné ce conseil aux Juifs: «Il vaut mieux qu''un seul homme meure pour le peuple.»'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon Pierre et un autre disciple suivaient Jésus. Ce disciple était connu du grand-prêtre, et il entra avec Jésus dans la cour de la maison du grand-prêtre, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tandis que Pierre restait dehors près de la porte. Alors l''autre disciple, qui était connu du grand-prêtre, sortit, parla à la femme qui gardait la porte et fit entrer Pierre. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La servante qui gardait la porte dit à Pierre: «Ne fais-tu pas partie, toi aussi, des disciples de cet homme?» Il répliqua: «Je n''en fais pas partie.» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les serviteurs et les gardes qui étaient là avaient allumé un feu de braises pour se réchauffer, car il faisait froid. Pierre se tenait avec eux et se chauffait aussi.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le grand-prêtre interrogea Jésus sur ses disciples et sur son enseignement. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Judas, celui qui le trahissait, connaissait aussi l''endroit parce que Jésus et ses disciples s''y étaient souvent réunis. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui répondit: «J''ai parlé ouvertement à tout le monde; j''ai toujours enseigné dans les synagogues et dans le temple, où les Juifs se réunissent constamment, et je n''ai rien dit en secret. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pourquoi m''interroges-tu? Interroge ceux qui m''ont entendu sur ce que je leur ai dit; ils savent, eux, ce que j''ai dit.» '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A ces mots, un des gardes qui se trouvait là donna une gifle à Jésus en disant: «C''est ainsi que tu réponds au grand-prêtre?» '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui dit: «Si j''ai mal parlé, explique-moi ce que j''ai dit de mal; et si j''ai bien parlé, pourquoi me frappes-tu?» '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors Anne l'envoya attaché à Caïphe, le grand-prêtre.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon Pierre était là et se chauffait. On lui dit: «Ne fais-tu pas partie, toi aussi, de ses disciples?» Il le nia et dit: «Je n''en fais pas partie.» '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un des serviteurs du grand-prêtre, un parent de celui à qui Pierre avait coupé l''oreille, dit: «Ne t''ai-je pas vu avec lui dans le jardin?» '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pierre le nia de nouveau. Et aussitôt un coq chanta.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus devant les autorités romaines
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: De chez Caïphe, ils conduisirent Jésus au prétoire; c'était le matin. Ils n'entrèrent pas eux-mêmes dans le prétoire afin de ne pas se souiller
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Se souiller: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: d'après la tradition, le contact avec des non-Juifs était source d'impureté rituelle.
      marker-yv: yv-n
    - type: text
      text: ' et de pouvoir manger le repas de la Pâque. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pilate sortit donc à leur rencontre et dit: «De quoi accusez-vous cet homme?» '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Judas prit donc la troupe de soldats romains ainsi que des gardes envoyés par les chefs des prêtres et les pharisiens, et il s'y rendit avec des lanternes, des torches et des armes.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui répondirent: «Si ce n''était pas un malfaiteur, nous ne te l''aurions pas livré.» '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sur quoi Pilate leur dit: «Prenez-le vous-mêmes et jugez-le d''après votre loi.» Les Juifs lui dirent: «Nous n''avons pas le droit de mettre quelqu''un à mort.» '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C'était afin que s'accomplisse la parole que Jésus avait dite pour indiquer de quelle mort il allait mourir.
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pilate rentra dans le prétoire, appela Jésus et lui dit: «Es-tu le roi des Juifs?» '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus [lui] répondit: «Est-ce de toi-même que tu dis cela ou d''autres te l''ont-ils dit de moi?» '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pilate répondit: «Suis-je un Juif, moi? Ta nation et les chefs des prêtres t''ont livré à moi. Qu''as-tu fait?» '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus répondit: «Mon royaume n''est pas de ce monde. Si mon royaume était de ce monde, mes serviteurs auraient combattu pour moi afin que je ne sois pas livré aux Juifs; mais en réalité, mon royaume n''est pas d''ici-bas.» '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pilate lui dit: «Tu es donc roi?» Jésus répondit: «Tu le dis, je suis roi. Si je suis né et si je suis venu dans le monde, c''est pour rendre témoignage à la vérité. Toute personne qui est de la vérité écoute ma voix.» '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pilate lui répliqua: «Qu''est-ce que la vérité?»'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sur ces mots, il sortit de nouveau à la rencontre des Juifs et leur dit: «Pour ma part, je ne trouve en lui aucun motif de le condamner. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais, comme c''est une coutume parmi vous que je vous relâche quelqu''un lors de la Pâque, voulez-vous que je vous relâche le roi des Juifs?» '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus, qui savait tout ce qui devait lui arriver, s''avança alors et leur dit: «Qui cherchez-vous?» '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors de nouveau ils crièrent [tous]: «Non, pas lui, mais Barabbas!» Or, Barabbas était un brigand.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui répondirent: «Jésus de Nazareth.» Jésus leur dit: «C''est moi.» Judas, celui qui le trahissait, était avec eux. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Jésus leur dit: «C''est moi», ils reculèrent et tombèrent par terre. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur demanda de nouveau: «Qui cherchez-vous?» Ils dirent: «Jésus de Nazareth.» '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus répondit: «Je vous ai dit que c''est moi. Si donc c''est moi que vous cherchez, laissez partir ceux-ci.» '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit cela afin que s''accomplisse la parole qu''il avait prononcée: «Je n''ai perdu aucun de ceux que tu m''as donnés.»'
