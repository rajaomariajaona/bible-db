document_id: JHN.18,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Mort et résurrection de Jésus
  - type: heading
    content: 18.1–21.25
  - type: heading
    content: Arrestation de Jésus
  - type: text
    content: 'Après avoir dit ces paroles, Jésus alla avec ses disciples de l''autre côté du torrent du Cédron où se trouvait un jardin; il y entra, lui et ses disciples. '
  '10':
  - type: text
    content: 'Alors Simon Pierre, qui avait une épée, la tira, frappa le serviteur du grand-prêtre et lui coupa l''oreille droite. Ce serviteur s''appelait Malchus. '
  '11':
  - type: text
    content: 'Jésus dit à Pierre: «Remets ton épée dans son fourreau. Ne boirai-je pas la coupe que le Père m''a donnée à boire?»'
  - type: heading
    content: Jésus devant les autorités juives
  '12':
  - type: text
    content: 'La troupe, le commandant et les gardes des Juifs s''emparèrent alors de Jésus et l''attachèrent. '
  '13':
  - type: text
    content: 'Ils l''emmenèrent d''abord chez Anne, car il était le beau-père de Caïphe qui était grand-prêtre cette année-là. '
  '14':
  - type: text
    content: 'Or Caïphe était celui qui avait donné ce conseil aux Juifs: «Il vaut mieux qu''un seul homme meure pour le peuple.»'
  '15':
  - type: text
    content: 'Simon Pierre et un autre disciple suivaient Jésus. Ce disciple était connu du grand-prêtre, et il entra avec Jésus dans la cour de la maison du grand-prêtre, '
  '16':
  - type: text
    content: 'tandis que Pierre restait dehors près de la porte. Alors l''autre disciple, qui était connu du grand-prêtre, sortit, parla à la femme qui gardait la porte et fit entrer Pierre. '
  '17':
  - type: text
    content: 'La servante qui gardait la porte dit à Pierre: «Ne fais-tu pas partie, toi aussi, des disciples de cet homme?» Il répliqua: «Je n''en fais pas partie.» '
  '18':
  - type: text
    content: Les serviteurs et les gardes qui étaient là avaient allumé un feu de braises pour se réchauffer, car il faisait froid. Pierre se tenait avec eux et se chauffait aussi.
  '19':
  - type: text
    content: 'Le grand-prêtre interrogea Jésus sur ses disciples et sur son enseignement. '
  '2':
  - type: text
    content: 'Judas, celui qui le trahissait, connaissait aussi l''endroit parce que Jésus et ses disciples s''y étaient souvent réunis. '
  '20':
  - type: text
    content: 'Jésus lui répondit: «J''ai parlé ouvertement à tout le monde; j''ai toujours enseigné dans les synagogues et dans le temple, où les Juifs se réunissent constamment, et je n''ai rien dit en secret. '
  '21':
  - type: text
    content: 'Pourquoi m''interroges-tu? Interroge ceux qui m''ont entendu sur ce que je leur ai dit; ils savent, eux, ce que j''ai dit.» '
  '22':
  - type: text
    content: 'A ces mots, un des gardes qui se trouvait là donna une gifle à Jésus en disant: «C''est ainsi que tu réponds au grand-prêtre?» '
  '23':
  - type: text
    content: 'Jésus lui dit: «Si j''ai mal parlé, explique-moi ce que j''ai dit de mal; et si j''ai bien parlé, pourquoi me frappes-tu?» '
  '24':
  - type: text
    content: Alors Anne l'envoya attaché à Caïphe, le grand-prêtre.
  '25':
  - type: text
    content: 'Simon Pierre était là et se chauffait. On lui dit: «Ne fais-tu pas partie, toi aussi, de ses disciples?» Il le nia et dit: «Je n''en fais pas partie.» '
  '26':
  - type: text
    content: 'Un des serviteurs du grand-prêtre, un parent de celui à qui Pierre avait coupé l''oreille, dit: «Ne t''ai-je pas vu avec lui dans le jardin?» '
  '27':
  - type: text
    content: Pierre le nia de nouveau. Et aussitôt un coq chanta.
  - type: heading
    content: Jésus devant les autorités romaines
  '28':
  - type: text
    content: De chez Caïphe, ils conduisirent Jésus au prétoire; c'était le matin. Ils n'entrèrent pas eux-mêmes dans le prétoire afin de ne pas se souiller
  - type: note
    content: 'Se souiller: d''après la tradition, le contact avec des non-Juifs était source d''impureté rituelle.'
  - type: text
    content: ' et de pouvoir manger le repas de la Pâque. '
  '29':
  - type: text
    content: 'Pilate sortit donc à leur rencontre et dit: «De quoi accusez-vous cet homme?» '
  '3':
  - type: text
    content: Judas prit donc la troupe de soldats romains ainsi que des gardes envoyés par les chefs des prêtres et les pharisiens, et il s'y rendit avec des lanternes, des torches et des armes.
  '30':
  - type: text
    content: 'Ils lui répondirent: «Si ce n''était pas un malfaiteur, nous ne te l''aurions pas livré.» '
  '31':
  - type: text
    content: 'Sur quoi Pilate leur dit: «Prenez-le vous-mêmes et jugez-le d''après votre loi.» Les Juifs lui dirent: «Nous n''avons pas le droit de mettre quelqu''un à mort.» '
  '32':
  - type: text
    content: C'était afin que s'accomplisse la parole que Jésus avait dite pour indiquer de quelle mort il allait mourir.
  '33':
  - type: text
    content: 'Pilate rentra dans le prétoire, appela Jésus et lui dit: «Es-tu le roi des Juifs?» '
  '34':
  - type: text
    content: 'Jésus [lui] répondit: «Est-ce de toi-même que tu dis cela ou d''autres te l''ont-ils dit de moi?» '
  '35':
  - type: text
    content: 'Pilate répondit: «Suis-je un Juif, moi? Ta nation et les chefs des prêtres t''ont livré à moi. Qu''as-tu fait?» '
  '36':
  - type: text
    content: 'Jésus répondit: «Mon royaume n''est pas de ce monde. Si mon royaume était de ce monde, mes serviteurs auraient combattu pour moi afin que je ne sois pas livré aux Juifs; mais en réalité, mon royaume n''est pas d''ici-bas.» '
  '37':
  - type: text
    content: 'Pilate lui dit: «Tu es donc roi?» Jésus répondit: «Tu le dis, je suis roi. Si je suis né et si je suis venu dans le monde, c''est pour rendre témoignage à la vérité. Toute personne qui est de la vérité écoute ma voix.» '
  '38':
  - type: text
    content: 'Pilate lui répliqua: «Qu''est-ce que la vérité?»'
  - type: text
    content: 'Sur ces mots, il sortit de nouveau à la rencontre des Juifs et leur dit: «Pour ma part, je ne trouve en lui aucun motif de le condamner. '
  '39':
  - type: text
    content: 'Mais, comme c''est une coutume parmi vous que je vous relâche quelqu''un lors de la Pâque, voulez-vous que je vous relâche le roi des Juifs?» '
  '4':
  - type: text
    content: 'Jésus, qui savait tout ce qui devait lui arriver, s''avança alors et leur dit: «Qui cherchez-vous?» '
  '40':
  - type: text
    content: 'Alors de nouveau ils crièrent [tous]: «Non, pas lui, mais Barabbas!» Or, Barabbas était un brigand.'
  '5':
  - type: text
    content: 'Ils lui répondirent: «Jésus de Nazareth.» Jésus leur dit: «C''est moi.» Judas, celui qui le trahissait, était avec eux. '
  '6':
  - type: text
    content: 'Lorsque Jésus leur dit: «C''est moi», ils reculèrent et tombèrent par terre. '
  '7':
  - type: text
    content: 'Il leur demanda de nouveau: «Qui cherchez-vous?» Ils dirent: «Jésus de Nazareth.» '
  '8':
  - type: text
    content: 'Jésus répondit: «Je vous ai dit que c''est moi. Si donc c''est moi que vous cherchez, laissez partir ceux-ci.» '
  '9':
  - type: text
    content: 'Il dit cela afin que s''accomplisse la parole qu''il avait prononcée: «Je n''ai perdu aucun de ceux que tu m''as donnés.»'
