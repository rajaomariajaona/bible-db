document_id: 1SA.23
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Délivrance de Keïla par David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'On vint dire à David: «Les Philistins ont attaqué Keïla et pillent les aires de battage.» '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'David consulta l''Eternel en disant: «Dois-je y aller? Est-ce que je battrai ces Philistins?» L''Eternel lui répondit: «Vas-y, tu battras les Philistins et tu délivreras Keïla.» '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais les hommes de David lui dirent: «Nous vivons dans la peur ici même en Juda. Que se passera-t-il si nous allons à Keïla pour combattre les troupes des Philistins?» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'David consulta de nouveau l''Eternel, et l''Eternel lui répondit: «Lève-toi, descends à Keïla, car je livre les Philistins entre tes mains.» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: David alla donc avec ses hommes à Keïla et il se battit contre les Philistins. Il emmena leur bétail et leur infligea une grande défaite. C'est ainsi que David délivra les habitants de Keïla.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Lorsque Abiathar, le fils d'Achimélec, s'était réfugié auprès de David à Keïla, il avait apporté l'éphod avec lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Saül fut informé de l''arrivée de David à Keïla et il se dit: «Dieu le livre entre mes mains, car il est venu s''enfermer dans une ville munie de portes et de verrous.» '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Saül convoqua donc tout le peuple à la guerre afin de descendre à Keïla et d''assiéger David et ses hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'David eut connaissance du mauvais projet de Saül contre lui. Il dit au prêtre Abiathar: «Apporte l''éphod!» '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Puis David dit: «Eternel, Dieu d''Israël, moi, ton serviteur, j''apprends que Saül veut venir à Keïla pour détruire cette ville à cause de moi. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les habitants de Keïla me livreront-ils entre ses mains? Saül descendra-t-il, conformément à ce que ton serviteur a appris? Eternel, Dieu d''Israël, veuille le révéler à ton serviteur!» L''Eternel répondit: «Il descendra.» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'David répéta: «Les habitants de Keïla me livreront-ils, ainsi que mes hommes, entre les mains de Saül?» Et l''Eternel répondit: «Ils te livreront entre ses mains.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: David dans les déserts de Ziph et de Maon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors David se leva avec ses hommes au nombre d''environ 600; ils sortirent de Keïla et s''en allèrent où ils purent. Informé que David s''était sauvé de Keïla, Saül renonça à son expédition. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'David habita dans le désert, dans des endroits escarpés, et il resta sur la montagne dans le désert de Ziph. Saül le cherchait toujours, mais Dieu ne le livra pas entre ses mains. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Voyant que Saül partait en campagne pour attenter à sa vie, David restait dans le désert de Ziph, dans la forêt. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ce fut alors que Jonathan, fils de Saül, se leva pour aller trouver David dans la forêt. Il fortifia sa confiance en Dieu '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'et lui dit: «N''aie pas peur, car mon père Saül ne parviendra pas à t''attraper. Tu régneras sur Israël et moi, je serai ton bras droit. Mon père Saül le sait bien aussi.» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ils firent tous deux alliance devant l'Eternel. David resta dans la forêt et Jonathan retourna chez lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les Ziphiens montèrent vers Saül à Guibea et dirent: «David n''est-il pas caché chez nous dans les endroits escarpés, dans la forêt, sur la colline de Hakila qui se trouve au sud du désert? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Descends donc, roi, si c''est ce que tu désires. C''est à nous qu''il reviendra de le livrer entre les mains du roi.» '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Saül dit: «Que l''Eternel vous bénisse pour avoir eu pitié de moi! '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Allez donc prendre encore des informations pour bien examiner et savoir où il se tient et qui l''y a vu, car il est très rusé, à ce qu''on m''a dit. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Voyez et reconnaissez tous les endroits où il se cache, puis revenez vers moi avec des renseignements certains, et je partirai avec vous. S''il est dans le pays, je le chercherai parmi tous les milliers de Juda.» '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ils se levèrent donc et retournèrent à Ziph avant Saül. David et ses hommes se trouvaient dans le désert de Maon, dans la plaine située au sud de ce désert.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Saül partit avec ses hommes à la recherche de David. On en informa David, qui descendit dans un endroit rocheux, dans le désert de Maon. L''ayant appris, Saül poursuivit David au désert de Maon. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Saül marchait d''un côté de la montagne, David et ses hommes de l''autre côté. David se dépêchait pour échapper à Saül. Cependant, déjà Saül et ses hommes l''encerclaient, ainsi que les siens, pour s''emparer d''eux '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'lorsqu''un messager vint dire à Saül: «Viens vite, car les Philistins ont lancé une attaque contre le pays.» '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Saül cessa de poursuivre David et repartit pour aller combattre les Philistins. C'est pourquoi l'on appela cet endroit Séla-Hammachlekoth
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Séla-Hammachlekoth: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: littéralement rocher des séparations.
    marker-yv: yv-n
  - type: text
    text: .
