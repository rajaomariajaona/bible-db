document_id: 1SA.23,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Délivrance de Keïla par David
  - type: text
    content: 'On vint dire à David: «Les Philistins ont attaqué Keïla et pillent les aires de battage.» '
  '10':
  - type: text
    content: 'Puis David dit: «Eternel, Dieu d''Israël, moi, ton serviteur, j''apprends que Saül veut venir à Keïla pour détruire cette ville à cause de moi. '
  '11':
  - type: text
    content: 'Les habitants de Keïla me livreront-ils entre ses mains? Saül descendra-t-il, conformément à ce que ton serviteur a appris? Eternel, Dieu d''Israël, veuille le révéler à ton serviteur!» L''Eternel répondit: «Il descendra.» '
  '12':
  - type: text
    content: 'David répéta: «Les habitants de Keïla me livreront-ils, ainsi que mes hommes, entre les mains de Saül?» Et l''Eternel répondit: «Ils te livreront entre ses mains.»'
  - type: heading
    content: David dans les déserts de Ziph et de Maon
  '13':
  - type: text
    content: 'Alors David se leva avec ses hommes au nombre d''environ 600; ils sortirent de Keïla et s''en allèrent où ils purent. Informé que David s''était sauvé de Keïla, Saül renonça à son expédition. '
  '14':
  - type: text
    content: 'David habita dans le désert, dans des endroits escarpés, et il resta sur la montagne dans le désert de Ziph. Saül le cherchait toujours, mais Dieu ne le livra pas entre ses mains. '
  '15':
  - type: text
    content: 'Voyant que Saül partait en campagne pour attenter à sa vie, David restait dans le désert de Ziph, dans la forêt. '
  '16':
  - type: text
    content: 'Ce fut alors que Jonathan, fils de Saül, se leva pour aller trouver David dans la forêt. Il fortifia sa confiance en Dieu '
  '17':
  - type: text
    content: 'et lui dit: «N''aie pas peur, car mon père Saül ne parviendra pas à t''attraper. Tu régneras sur Israël et moi, je serai ton bras droit. Mon père Saül le sait bien aussi.» '
  '18':
  - type: text
    content: Ils firent tous deux alliance devant l'Eternel. David resta dans la forêt et Jonathan retourna chez lui.
  '19':
  - type: text
    content: 'Les Ziphiens montèrent vers Saül à Guibea et dirent: «David n''est-il pas caché chez nous dans les endroits escarpés, dans la forêt, sur la colline de Hakila qui se trouve au sud du désert? '
  '2':
  - type: text
    content: 'David consulta l''Eternel en disant: «Dois-je y aller? Est-ce que je battrai ces Philistins?» L''Eternel lui répondit: «Vas-y, tu battras les Philistins et tu délivreras Keïla.» '
  '20':
  - type: text
    content: 'Descends donc, roi, si c''est ce que tu désires. C''est à nous qu''il reviendra de le livrer entre les mains du roi.» '
  '21':
  - type: text
    content: 'Saül dit: «Que l''Eternel vous bénisse pour avoir eu pitié de moi! '
  '22':
  - type: text
    content: 'Allez donc prendre encore des informations pour bien examiner et savoir où il se tient et qui l''y a vu, car il est très rusé, à ce qu''on m''a dit. '
  '23':
  - type: text
    content: 'Voyez et reconnaissez tous les endroits où il se cache, puis revenez vers moi avec des renseignements certains, et je partirai avec vous. S''il est dans le pays, je le chercherai parmi tous les milliers de Juda.» '
  '24':
  - type: text
    content: Ils se levèrent donc et retournèrent à Ziph avant Saül. David et ses hommes se trouvaient dans le désert de Maon, dans la plaine située au sud de ce désert.
  '25':
  - type: text
    content: 'Saül partit avec ses hommes à la recherche de David. On en informa David, qui descendit dans un endroit rocheux, dans le désert de Maon. L''ayant appris, Saül poursuivit David au désert de Maon. '
  '26':
  - type: text
    content: 'Saül marchait d''un côté de la montagne, David et ses hommes de l''autre côté. David se dépêchait pour échapper à Saül. Cependant, déjà Saül et ses hommes l''encerclaient, ainsi que les siens, pour s''emparer d''eux '
  '27':
  - type: text
    content: 'lorsqu''un messager vint dire à Saül: «Viens vite, car les Philistins ont lancé une attaque contre le pays.» '
  '28':
  - type: text
    content: Saül cessa de poursuivre David et repartit pour aller combattre les Philistins. C'est pourquoi l'on appela cet endroit Séla-Hammachlekoth
  - type: note
    content: 'Séla-Hammachlekoth: littéralement rocher des séparations.'
  - type: text
    content: .
  '3':
  - type: text
    content: 'Mais les hommes de David lui dirent: «Nous vivons dans la peur ici même en Juda. Que se passera-t-il si nous allons à Keïla pour combattre les troupes des Philistins?» '
  '4':
  - type: text
    content: 'David consulta de nouveau l''Eternel, et l''Eternel lui répondit: «Lève-toi, descends à Keïla, car je livre les Philistins entre tes mains.» '
  '5':
  - type: text
    content: David alla donc avec ses hommes à Keïla et il se battit contre les Philistins. Il emmena leur bétail et leur infligea une grande défaite. C'est ainsi que David délivra les habitants de Keïla.
  '6':
  - type: text
    content: Lorsque Abiathar, le fils d'Achimélec, s'était réfugié auprès de David à Keïla, il avait apporté l'éphod avec lui.
  '7':
  - type: text
    content: 'Saül fut informé de l''arrivée de David à Keïla et il se dit: «Dieu le livre entre mes mains, car il est venu s''enfermer dans une ville munie de portes et de verrous.» '
  '8':
  - type: text
    content: 'Saül convoqua donc tout le peuple à la guerre afin de descendre à Keïla et d''assiéger David et ses hommes. '
  '9':
  - type: text
    content: 'David eut connaissance du mauvais projet de Saül contre lui. Il dit au prêtre Abiathar: «Apporte l''éphod!» '
