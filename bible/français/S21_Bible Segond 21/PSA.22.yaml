document_id: PSA.22,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les souffrances et la gloire du Sauveur
  - type: text
    content: Au chef de chœur, sur la mélodie de «Biche de l'aurore». Psaume de David.
  '10':
  - type: text
    content: Oui, tu m'as fait sortir du ventre de ma mère,
  - type: text
    content: tu m'as mis en sécurité contre sa poitrine;
  '11':
  - type: text
    content: dès ma conception j'ai été sous ta garde,
  - type: text
    content: dès le ventre de ma mère tu as été mon Dieu.
  '12':
  - type: text
    content: Ne t'éloigne pas de moi quand la détresse est proche,
  - type: text
    content: quand personne ne vient à mon secours!
  '13':
  - type: text
    content: De nombreux taureaux sont autour de moi,
  - type: text
    content: des taureaux du Basan m'encerclent.
  '14':
  - type: text
    content: Ils ouvrent leur gueule contre moi,
  - type: text
    content: pareils au lion qui déchire et rugit.
  '15':
  - type: text
    content: Mes forces s'en vont comme l'eau qui s'écoule,
  - type: text
    content: et tous mes os se disloquent;
  - type: text
    content: mon cœur est comme de la cire,
  - type: text
    content: il se liquéfie au fond de moi.
  '16':
  - type: text
    content: Ma force se dessèche comme l'argile,
  - type: text
    content: et ma langue s'attache à mon palais;
  - type: text
    content: tu me réduis à la poussière de la mort.
  '17':
  - type: text
    content: Oui, des chiens m'environnent,
  - type: text
    content: une bande de scélérats rôdent autour de moi;
  - type: text
    content: ils ont percé mes mains et mes pieds.
  '18':
  - type: text
    content: Je pourrais compter tous mes os;
  - type: text
    content: eux, ils observent, ils me regardent,
  '19':
  - type: text
    content: '*ils se partagent mes vêtements,'
  - type: text
    content: ils tirent au sort mon habit.
  - type: note
    content: 'Ils se partagent… habit: cité en Matthieu 27.35; Jean 19.24 comme réalisé par les soldats qui assistaient à la crucifixion de Jésus.'
  '2':
  - type: text
    content: '*Mon Dieu, mon Dieu, pourquoi m''as-tu abandonné?'
  - type: note
    content: 'Mon Dieu… abandonné: cité par Jésus sur la croix en Matthieu 27.46; Marc 15.34.'
  - type: text
    content: Pourquoi t'éloignes-tu sans me secourir, sans écouter mes plaintes?
  '20':
  - type: text
    content: Mais toi, Eternel, ne t'éloigne pas!
  - type: text
    content: Toi qui es ma force, viens vite à mon secours!
  '21':
  - type: text
    content: Protège mon âme contre l'épée,
  - type: text
    content: ma vie contre le pouvoir des chiens!
  '22':
  - type: text
    content: Sauve-moi de la gueule du lion
  - type: text
    content: et des cornes du buffle!
  - type: text
    content: Tu m'as répondu!
  '23':
  - type: text
    content: '*J''annoncerai ton nom à mes frères,'
  - type: text
    content: je te célébrerai au milieu de l'assemblée.
  - type: note
    content: 'J''annoncerai… l''assemblée: cité comme une parole de Jésus en Hébreux 2.12.'
  '24':
  - type: text
    content: Vous qui craignez l'Eternel, louez-le!
  - type: text
    content: Vous tous, descendants de Jacob, honorez-le!
  - type: text
    content: Tremblez devant lui, vous tous, descendants d'Israël!
  '25':
  - type: text
    content: En effet, il ne méprise pas, il ne repousse pas le malheureux dans sa misère
  - type: text
    content: et il ne lui cache pas son visage,
  - type: text
    content: mais il l'écoute quand il crie à lui.
  '26':
  - type: text
    content: Tu seras dans la grande assemblée l'objet de mes louanges,
  - type: text
    content: j'accomplirai mes vœux en présence de ceux qui te craignent.
  '27':
  - type: text
    content: Les malheureux mangeront et seront rassasiés,
  - type: text
    content: ceux qui cherchent l'Eternel le célébreront.
  - type: text
    content: Que votre cœur vive à perpétuité!
  '28':
  - type: text
    content: Tous les peuples de la terre se souviendront de l'Eternel et se tourneront vers lui,
  - type: text
    content: toutes les familles des nations se prosterneront devant toi,
  '29':
  - type: text
    content: 'car c''est à l''Eternel qu''appartient le règne:'
  - type: text
    content: il domine sur les nations.
  '3':
  - type: text
    content: Mon Dieu, je crie le jour, et tu ne réponds pas,
  - type: text
    content: la nuit, et je ne trouve pas de repos.
  '30':
  - type: text
    content: Tous les grands de la terre mangeront et se prosterneront;
  - type: text
    content: devant lui s'inclineront tous ceux qui retournent à la poussière,
  - type: text
    content: ceux qui ne peuvent pas conserver leur vie.
  '31':
  - type: text
    content: Leur descendance le servira;
  - type: text
    content: on parlera du Seigneur à la génération future,
  '32':
  - type: text
    content: et quand elle viendra, elle annoncera sa justice,
  - type: text
    content: elle annoncera son œuvre au peuple à naître.
  '4':
  - type: text
    content: Pourtant tu es le Saint,
  - type: text
    content: tu sièges au milieu des louanges d'Israël.
  '5':
  - type: text
    content: 'C''est en toi que nos ancêtres se confiaient:'
  - type: text
    content: ils se confiaient en toi, et tu les délivrais;
  '6':
  - type: text
    content: ils criaient à toi, et ils étaient sauvés;
  - type: text
    content: ils se confiaient en toi, et ils n'étaient pas déçus.
  '7':
  - type: text
    content: Mais moi, je suis un ver et non un homme,
  - type: text
    content: la honte de l'humanité, celui que le peuple méprise.
  '8':
  - type: text
    content: Tous ceux qui me voient se moquent de moi,
  - type: text
    content: 'ils ricanent, ils hochent la tête:'
  '9':
  - type: text
    content: '*«Recommande ton sort à l''Eternel!'
  - type: text
    content: L'Eternel le sauvera,
  - type: text
    content: il le délivrera, puisqu'il l'aime!»
  - type: note
    content: 'Recommande… l''aime: cité par ceux qui se moquaient de Jésus en Matthieu 27.43.'
