document_id: PSA.22,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les souffrances et la gloire du Sauveur
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Au chef de chœur, sur la mélodie de «Biche de l'aurore». Psaume de David.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, tu m'as fait sortir du ventre de ma mère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu m'as mis en sécurité contre sa poitrine;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dès ma conception j'ai été sous ta garde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dès le ventre de ma mère tu as été mon Dieu.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne t'éloigne pas de moi quand la détresse est proche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand personne ne vient à mon secours!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De nombreux taureaux sont autour de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des taureaux du Basan m'encerclent.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ouvrent leur gueule contre moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pareils au lion qui déchire et rugit.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes forces s'en vont comme l'eau qui s'écoule,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous mes os se disloquent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon cœur est comme de la cire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il se liquéfie au fond de moi.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma force se dessèche comme l'argile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ma langue s'attache à mon palais;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu me réduis à la poussière de la mort.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, des chiens m'environnent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une bande de scélérats rôdent autour de moi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont percé mes mains et mes pieds.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je pourrais compter tous mes os;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eux, ils observent, ils me regardent,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*ils se partagent mes vêtements,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils tirent au sort mon habit.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ils se partagent… habit: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matthieu 27.35
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jean 19.24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' comme réalisé par les soldats qui assistaient à la crucifixion de Jésus.'
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*Mon Dieu, mon Dieu, pourquoi m''as-tu abandonné?'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Mon Dieu… abandonné: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité par Jésus sur la croix en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matthieu 27.46
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Marc 15.34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi t'éloignes-tu sans me secourir, sans écouter mes plaintes?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais toi, Eternel, ne t'éloigne pas!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi qui es ma force, viens vite à mon secours!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Protège mon âme contre l'épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ma vie contre le pouvoir des chiens!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sauve-moi de la gueule du lion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et des cornes du buffle!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu m'as répondu!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*J''annoncerai ton nom à mes frères,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te célébrerai au milieu de l'assemblée.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'J''annoncerai… l''assemblée: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité comme une parole de Jésus en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hébreux 2.12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous qui craignez l'Eternel, louez-le!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous tous, descendants de Jacob, honorez-le!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tremblez devant lui, vous tous, descendants d'Israël!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, il ne méprise pas, il ne repousse pas le malheureux dans sa misère
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il ne lui cache pas son visage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il l'écoute quand il crie à lui.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu seras dans la grande assemblée l'objet de mes louanges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'accomplirai mes vœux en présence de ceux qui te craignent.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les malheureux mangeront et seront rassasiés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui cherchent l'Eternel le célébreront.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que votre cœur vive à perpétuité!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les peuples de la terre se souviendront de l'Eternel et se tourneront vers lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toutes les familles des nations se prosterneront devant toi,
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'car c''est à l''Eternel qu''appartient le règne:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il domine sur les nations.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon Dieu, je crie le jour, et tu ne réponds pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la nuit, et je ne trouve pas de repos.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les grands de la terre mangeront et se prosterneront;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: devant lui s'inclineront tous ceux qui retournent à la poussière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui ne peuvent pas conserver leur vie.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur descendance le servira;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on parlera du Seigneur à la génération future,
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et quand elle viendra, elle annoncera sa justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle annoncera son œuvre au peuple à naître.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourtant tu es le Saint,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu sièges au milieu des louanges d'Israël.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C''est en toi que nos ancêtres se confiaient:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se confiaient en toi, et tu les délivrais;
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils criaient à toi, et ils étaient sauvés;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se confiaient en toi, et ils n'étaient pas déçus.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais moi, je suis un ver et non un homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la honte de l'humanité, celui que le peuple méprise.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui me voient se moquent de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ils ricanent, ils hochent la tête:'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*«Recommande ton sort à l''Eternel!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel le sauvera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il le délivrera, puisqu'il l'aime!»
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Recommande… l''aime: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité par ceux qui se moquaient de Jésus en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matthieu 27.43
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
