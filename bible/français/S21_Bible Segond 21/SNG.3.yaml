document_id: SNG.3
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Sur mon lit, pendant les nuits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ai cherché celui que mon cœur aime.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je l'ai cherché, mais je ne l'ai pas trouvé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Je veux me lever pour faire le tour de la ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dans les rues et sur les places:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je veux chercher celui que mon cœur aime.»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je l'ai cherché, mais je ne l'ai pas trouvé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ce sont les gardes qui font la ronde dans la ville qui m''ont trouvée:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Avez-vous vu celui que mon cœur aime?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: A peine les avais-je dépassés
- type: usfm
  marker: q1
  children:
  - type: text
    text: que j'ai trouvé celui que mon cœur aime.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je l'ai attrapé et je ne l'ai pas lâché
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu'à ce que je l'aie amené dans la maison de ma mère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans la chambre de celle qui m'a donné naissance.
- type: usfm
  marker: sp
  children:
  - type: text
    text: Le jeune homme
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je vous en supplie, filles de Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: par les gazelles et les biches des champs, ne réveillez pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne réveillez pas l'amour
- type: usfm
  marker: q1
  children:
  - type: text
    text: avant qu'elle ne le veuille!
- type: usfm
  marker: sp
  children:
  - type: text
    text: Les filles de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Qui donc monte du désert c
- type: usfm
  marker: q1
  children:
  - type: text
    text: omme des colonnes de fumée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au milieu des vapeurs de myrrhe et d'encens
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de tous les aromates des marchands?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Voici la litière de Salomon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et autour d'elle 60 hommes vaillants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parmi les plus vaillants d'Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tous sont armés de l'épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous sont formés au combat.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chacun porte l'épée à sa hanche
- type: usfm
  marker: q1
  children:
  - type: text
    text: en vue des alertes nocturnes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Le roi Salomon s'est fait une litière
- type: usfm
  marker: q1
  children:
  - type: text
    text: en bois du Liban.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il a fait ses colonnes en argent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: son dossier en or,
- type: usfm
  marker: q1
  children:
  - type: text
    text: son siège en pourpre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'intérieur est tout brodé, travail fait avec amour
- type: usfm
  marker: q1
  children:
  - type: text
    text: par les filles de Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Sortez, filles de Sion! Regardez
- type: usfm
  marker: q1
  children:
  - type: text
    text: le roi Salomon
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec sa couronne, celle dont sa mère l'a couronné
- type: usfm
  marker: q1
  children:
  - type: text
    text: le jour de son mariage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le jour où son cœur est rempli de joie!
