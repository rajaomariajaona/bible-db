document_id: SNG.3,152
type_code: fra
verses:
  '1':
  - type: text
    content: Sur mon lit, pendant les nuits,
  - type: text
    content: j'ai cherché celui que mon cœur aime.
  - type: text
    content: Je l'ai cherché, mais je ne l'ai pas trouvé.
  '10':
  - type: text
    content: Il a fait ses colonnes en argent,
  - type: text
    content: son dossier en or,
  - type: text
    content: son siège en pourpre.
  - type: text
    content: L'intérieur est tout brodé, travail fait avec amour
  - type: text
    content: par les filles de Jérusalem.
  '11':
  - type: text
    content: Sortez, filles de Sion! Regardez
  - type: text
    content: le roi Salomon
  - type: text
    content: avec sa couronne, celle dont sa mère l'a couronné
  - type: text
    content: le jour de son mariage,
  - type: text
    content: le jour où son cœur est rempli de joie!
  '2':
  - type: text
    content: «Je veux me lever pour faire le tour de la ville,
  - type: text
    content: 'dans les rues et sur les places:'
  - type: text
    content: je veux chercher celui que mon cœur aime.»
  - type: text
    content: Je l'ai cherché, mais je ne l'ai pas trouvé.
  '3':
  - type: text
    content: 'Ce sont les gardes qui font la ronde dans la ville qui m''ont trouvée:'
  - type: text
    content: «Avez-vous vu celui que mon cœur aime?»
  '4':
  - type: text
    content: A peine les avais-je dépassés
  - type: text
    content: que j'ai trouvé celui que mon cœur aime.
  - type: text
    content: Je l'ai attrapé et je ne l'ai pas lâché
  - type: text
    content: jusqu'à ce que je l'aie amené dans la maison de ma mère,
  - type: text
    content: dans la chambre de celle qui m'a donné naissance.
  - type: heading
    content: Le jeune homme
  '5':
  - type: text
    content: Je vous en supplie, filles de Jérusalem,
  - type: text
    content: par les gazelles et les biches des champs, ne réveillez pas,
  - type: text
    content: ne réveillez pas l'amour
  - type: text
    content: avant qu'elle ne le veuille!
  - type: heading
    content: Les filles de Jérusalem
  '6':
  - type: text
    content: Qui donc monte du désert c
  - type: text
    content: omme des colonnes de fumée,
  - type: text
    content: au milieu des vapeurs de myrrhe et d'encens
  - type: text
    content: et de tous les aromates des marchands?
  '7':
  - type: text
    content: Voici la litière de Salomon,
  - type: text
    content: et autour d'elle 60 hommes vaillants,
  - type: text
    content: parmi les plus vaillants d'Israël.
  '8':
  - type: text
    content: Tous sont armés de l'épée,
  - type: text
    content: tous sont formés au combat.
  - type: text
    content: Chacun porte l'épée à sa hanche
  - type: text
    content: en vue des alertes nocturnes.
  '9':
  - type: text
    content: Le roi Salomon s'est fait une litière
  - type: text
    content: en bois du Liban.
