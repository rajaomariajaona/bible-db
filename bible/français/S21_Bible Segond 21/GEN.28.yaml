document_id: GEN.28,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Isaac appela Jacob, le bénit et lui ordonna: «Tu ne prendras pas une femme cananéenne. '
  '10':
  - type: text
    content: 'Jacob partit de Beer-Shéba et prit la direction de Charan. '
  '11':
  - type: text
    content: 'Arrivé à un certain endroit, il y passa la nuit car le soleil était couché. Il prit une pierre dont il fit son oreiller et il se coucha à cet endroit. '
  '12':
  - type: text
    content: 'Il fit un rêve: une échelle était appuyée sur la terre et son sommet touchait le ciel; des anges de Dieu montaient et descendaient par cette échelle. '
  '13':
  - type: text
    content: 'L''Eternel se tenait au-dessus d''elle, et il dit: «Je suis l''Eternel, le Dieu de ton grand-père Abraham et le Dieu d''Isaac. La terre sur laquelle tu es couché, je te la donnerai, à toi et à ta descendance. '
  '14':
  - type: text
    content: 'Ta descendance sera pareille à la poussière de la terre: tu t''étendras à l''ouest et à l''est, au nord et au sud, et toutes les familles de la terre seront bénies en toi et en ta descendance. '
  '15':
  - type: text
    content: Je suis moi-même avec toi, je te garderai partout où tu iras et je te ramènerai dans ce pays, car je ne t'abandonnerai pas tant que je n'aurai pas accompli ce que je te dis.»
  '16':
  - type: text
    content: 'Jacob se réveilla et se dit: «C''est certain, l''Eternel est dans cet endroit et moi, je ne le savais pas!» '
  '17':
  - type: text
    content: 'Il eut peur et dit: «Que cet endroit est redoutable! C''est ici que se trouve la maison de Dieu, c''est ici que se trouve la porte du ciel!» '
  '18':
  - type: text
    content: 'Jacob se leva de bon matin. Il prit la pierre dont il avait fait son oreiller, en fit un monument et versa de l''huile sur son sommet. '
  '19':
  - type: text
    content: Il appela cet endroit Béthel
  - type: note
    content: 'Béthel: littéralement maison de Dieu.'
  - type: text
    content: ', mais la ville s''appelait auparavant Luz. '
  '2':
  - type: text
    content: 'Lève-toi, va à Paddan-Aram, chez Bethuel, le père de ta mère, et prends-y une femme parmi les filles de Laban, le frère de ta mère. '
  '20':
  - type: text
    content: 'Jacob fit ce vœu: «Si Dieu est avec moi et me garde pendant mon voyage, s''il me donne du pain à manger et des habits à mettre, '
  '21':
  - type: text
    content: 'et si je reviens dans la paix chez mon père, alors l''Eternel sera mon Dieu. '
  '22':
  - type: text
    content: Cette pierre dont j'ai fait un monument sera la maison de Dieu et je te donnerai la dîme de tout ce que tu me donneras.»
  '3':
  - type: text
    content: 'Que le Dieu tout-puissant te bénisse, te fasse proliférer et te multiplie afin que tu donnes naissance à tout un groupe de peuples! '
  '4':
  - type: text
    content: 'Qu''il te donne la bénédiction d''Abraham, à toi et à ta descendance avec toi, afin que tu possèdes le pays où tu séjournes en étranger et qu''il a donné à Abraham!» '
  '5':
  - type: text
    content: Isaac fit donc partir Jacob et celui-ci s'en alla à Paddan-Aram, chez Laban, fils de Bethuel l'Araméen et frère de Rebecca, la mère de Jacob et d'Esaü.
  '6':
  - type: text
    content: 'Esaü vit qu''Isaac avait béni Jacob et l''avait envoyé à Paddan-Aram pour y prendre une femme. Il vit aussi qu''en le bénissant il lui avait donné cet ordre: «Tu ne prendras pas une femme cananéenne.» '
  '7':
  - type: text
    content: 'Il vit que Jacob avait écouté son père et sa mère et qu''il était parti pour Paddan-Aram. '
  '8':
  - type: text
    content: 'Esaü comprit ainsi que les Cananéennes déplaisaient à son père Isaac, '
  '9':
  - type: text
    content: et il alla trouver Ismaël. Il prit pour femme, en plus des femmes qu'il avait, Mahalath, qui était la fille d'Ismaël, le fils d'Abraham, et la sœur de Nebajoth.
  - type: heading
    content: Vision d'une échelle
