document_id: GEN.28,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Isaac appela Jacob, le bénit et lui ordonna: «Tu ne prendras pas une femme cananéenne. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob partit de Beer-Shéba et prit la direction de Charan. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Arrivé à un certain endroit, il y passa la nuit car le soleil était couché. Il prit une pierre dont il fit son oreiller et il se coucha à cet endroit. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit un rêve: une échelle était appuyée sur la terre et son sommet touchait le ciel; des anges de Dieu montaient et descendaient par cette échelle. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel se tenait au-dessus d''elle, et il dit: «Je suis l''Eternel, le Dieu de ton grand-père Abraham et le Dieu d''Isaac. La terre sur laquelle tu es couché, je te la donnerai, à toi et à ta descendance. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ta descendance sera pareille à la poussière de la terre: tu t''étendras à l''ouest et à l''est, au nord et au sud, et toutes les familles de la terre seront bénies en toi et en ta descendance. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je suis moi-même avec toi, je te garderai partout où tu iras et je te ramènerai dans ce pays, car je ne t'abandonnerai pas tant que je n'aurai pas accompli ce que je te dis.»
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob se réveilla et se dit: «C''est certain, l''Eternel est dans cet endroit et moi, je ne le savais pas!» '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il eut peur et dit: «Que cet endroit est redoutable! C''est ici que se trouve la maison de Dieu, c''est ici que se trouve la porte du ciel!» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob se leva de bon matin. Il prit la pierre dont il avait fait son oreiller, en fit un monument et versa de l''huile sur son sommet. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il appela cet endroit Béthel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Béthel: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: littéralement maison de Dieu.
      marker-yv: yv-n
    - type: text
      text: ', mais la ville s''appelait auparavant Luz. '
  '2':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Lève-toi, va à Paddan-Aram, chez Bethuel, le père de ta mère, et prends-y une femme parmi les filles de Laban, le frère de ta mère. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob fit ce vœu: «Si Dieu est avec moi et me garde pendant mon voyage, s''il me donne du pain à manger et des habits à mettre, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et si je reviens dans la paix chez mon père, alors l''Eternel sera mon Dieu. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cette pierre dont j'ai fait un monument sera la maison de Dieu et je te donnerai la dîme de tout ce que tu me donneras.»
  '3':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Que le Dieu tout-puissant te bénisse, te fasse proliférer et te multiplie afin que tu donnes naissance à tout un groupe de peuples! '
  '4':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Qu''il te donne la bénédiction d''Abraham, à toi et à ta descendance avec toi, afin que tu possèdes le pays où tu séjournes en étranger et qu''il a donné à Abraham!» '
  '5':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: Isaac fit donc partir Jacob et celui-ci s'en alla à Paddan-Aram, chez Laban, fils de Bethuel l'Araméen et frère de Rebecca, la mère de Jacob et d'Esaü.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esaü vit qu''Isaac avait béni Jacob et l''avait envoyé à Paddan-Aram pour y prendre une femme. Il vit aussi qu''en le bénissant il lui avait donné cet ordre: «Tu ne prendras pas une femme cananéenne.» '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il vit que Jacob avait écouté son père et sa mère et qu''il était parti pour Paddan-Aram. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esaü comprit ainsi que les Cananéennes déplaisaient à son père Isaac, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et il alla trouver Ismaël. Il prit pour femme, en plus des femmes qu'il avait, Mahalath, qui était la fille d'Ismaël, le fils d'Abraham, et la sœur de Nebajoth.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vision d'une échelle
    marker-yv: yv-h
