document_id: EZK.44,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les serviteurs de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Puis l''homme m''a ramené du côté de l''entrée extérieure du sanctuaire qui était orientée vers l''est, mais elle était fermée. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '»En ce qui concerne les Lévites qui se sont éloignés de moi lorsque Israël s''égarait loin de moi en suivant ses idoles, ils supporteront les conséquences de leur faute. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ils seront dans mon sanctuaire en tant que serviteurs. Ils seront chargés de la garde des entrées du temple et du service du temple. Ils égorgeront pour le peuple les victimes destinées aux holocaustes et aux autres sacrifices, ils se tiendront à son service. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Puisqu''ils l''ont servi devant ses idoles et ont poussé la communauté d''Israël à la faute, je m''engage envers eux, déclare le Seigneur, l''Eternel, à ce qu''ils supportent les conséquences de leur faute. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ils ne s''approcheront plus de moi pour exercer la fonction de prêtres, ils ne s''approcheront plus d''aucune de mes offrandes saintes ou très saintes. Ils supporteront les conséquences de leurs actes honteux et des pratiques abominables auxquelles ils se sont adonnés. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Je les charge du service du temple, de tout le travail et de tout ce qui doit s'y faire.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '»Quant aux prêtres, aux Lévites qui descendent de Tsadok et ont persévéré dans le service de mon sanctuaire lorsque les Israélites s''égaraient loin de moi, ils s''approcheront de moi pour me servir. Ils se tiendront devant moi pour me présenter la graisse et le sang, déclare le Seigneur, l''Eternel. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ils entreront dans mon sanctuaire et s''approcheront de ma table pour me servir, ils assureront mon service. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Lorsqu''ils franchiront les entrées du parvis intérieur, ils mettront des habits en lin. Ils ne porteront rien qui soit en laine, quand ils feront le service aux entrées du parvis intérieur et dans le temple. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ils porteront des coiffes en lin sur la tête et des caleçons en lin sur les hanches. Ils ne mettront pas de ceinture pour ne pas provoquer la transpiration. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Lorsqu''ils sortiront pour aller rejoindre le peuple dans le parvis extérieur, ils enlèveront les habits avec lesquels ils font le service et les déposeront dans les salles du lieu saint. Ils mettront d''autres habits afin de ne pas exposer le peuple à la sainteté à travers leurs habits sacrés. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Alors l''Eternel m''a dit: «Cette entrée restera fermée. Elle ne s''ouvrira plus et plus personne n''y passera, car l''Eternel, le Dieu d''Israël, est entré par là. Elle restera fermée. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ils ne se raseront pas la tête, mais ils ne laisseront pas non plus pousser leurs cheveux. Ils ne devront pas oublier de couper leurs cheveux. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Aucun prêtre ne boira du vin lorsqu''il pénétrera dans le parvis intérieur. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ils n''épouseront ni une veuve, ni une femme rejetée par son mari, mais ils prendront des femmes vierges issues de la communauté d''Israël. Ils pourront aussi épouser la veuve d''un prêtre. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ils enseigneront à mon peuple à distinguer ce qui est saint de ce qui est profane, ils lui feront connaître la différence entre ce qui est impur et ce qui est pur. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'En cas de conflit, ils rendront la justice, et ils jugeront d''après mes règles. Ils respecteront aussi mes lois et mes prescriptions dans toutes mes fêtes, et ils feront de mes sabbats des jours saints. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Un prêtre n''ira pas vers un mort, de peur de se rendre impur. Il ne pourra se rendre impur que pour un père, pour une mère, pour un fils, pour une fille, pour un frère et pour une sœur qui n''était pas mariée. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Après sa purification, on le fera patienter sept jours. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Le jour où il pénétrera dans le parvis intérieur pour faire le service dans le lieu saint, il offrira un sacrifice d'expiation, déclare le Seigneur, l'Eternel.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: '»Ils auront un héritage: c''est moi qui serai leur héritage. Vous ne leur donnerez pas de propriété en Israël: c''est moi qui serai leur propriété. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ils se nourriront des offrandes, des sacrifices d''expiation et des sacrifices de culpabilité. Tout ce qui sera voué à Dieu en Israël sera pour eux. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: En ce qui concerne le prince, étant le prince, il pourra s'y asseoir pour manger devant l'Eternel. Il y entrera en passant par le vestibule de l'entrée et il sortira par le même chemin.»
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Les premiers de tous les fruits et la totalité de vos prélèvements appartiendront aux prêtres. Vous donnerez vos premières fournées aux prêtres, afin de faire reposer une bénédiction sur votre maison. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Les prêtres ne mangeront d'aucun oiseau et d'aucun animal trouvé mort ou déchiqueté.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ensuite, il m''a conduit du côté de l''entrée nord, devant le temple. J''ai regardé et j''ai vu que la gloire de l''Eternel remplissait la maison de l''Eternel. Je suis alors tombé le visage contre terre. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'L''Eternel m''a dit: «Fils de l''homme, fais attention, observe bien de tes yeux! Ouvre bien tes oreilles pour écouter tout ce que je te dirai à propos de toutes les prescriptions et de toutes les lois relatives à la maison de l''Eternel! Tu examineras attentivement l''entrée du temple et toutes les issues du sanctuaire. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Tu annonceras à ces rebelles, à la communauté d''Israël: ‘Voici ce que dit le Seigneur, l''Eternel: En voilà assez avec toutes vos pratiques abominables, communauté d''Israël!'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '»Vous avez introduit des étrangers, des incirconcis de cœur et de corps, dans mon sanctuaire afin de profaner mon temple, quand vous avez présenté ma nourriture, la graisse et le sang. Vous avez violé mon alliance au profit de toutes vos pratiques abominables. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Vous n''avez pas pris soin de mes offrandes saintes, mais vous avez établi ces étrangers pour qu''ils en prennent la responsabilité à votre place dans mon sanctuaire.’ '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Voici ce que dit le Seigneur, l''Eternel: Aucun étranger, incirconcis de cœur et de corps, n''entrera dans mon sanctuaire, aucun étranger qui vit au milieu des Israélites.'
