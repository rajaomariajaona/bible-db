document_id: PSA.4,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La sécurité qu'accorde l'Eternel
  - type: text
    content: Au chef de chœur, avec instruments à cordes. Psaume de David.
  '2':
  - type: text
    content: Quand je crie, réponds-moi, Dieu de ma justice!
  - type: text
    content: Quand j'étais dans la détresse, tu m'as mis au large.
  - type: text
    content: Aie pitié de moi, écoute ma prière!
  '3':
  - type: text
    content: Vous les hommes, jusqu'à quand mépriserez-vous ma gloire?
  - type: text
    content: Jusqu'à quand aimerez-vous ce qui est sans valeur
  - type: text
    content: 'et rechercherez-vous le mensonge? '
  - type: text
    content: – Pause.
  '4':
  - type: text
    content: Sachez que l'Eternel s'est choisi un homme fidèle.
  - type: text
    content: L'Eternel entend quand je crie à lui.
  '5':
  - type: text
    content: '*Si vous vous mettez en colère, ne péchez pas!'
  - type: note
    content: 'Si… péchez pas: cité en Ephésiens 4.26.'
  - type: text
    content: 'Parlez dans votre cœur, sur votre lit, et faites silence. '
  - type: text
    content: – Pause.
  '6':
  - type: text
    content: Offrez des sacrifices conformes à la justice
  - type: text
    content: et confiez-vous en l'Eternel.
  '7':
  - type: text
    content: 'Beaucoup disent: «Qui nous fera voir le bonheur?»'
  - type: text
    content: Fais briller la lumière de ton visage sur nous, Eternel!
  '8':
  - type: text
    content: Tu mets dans mon cœur plus de joie qu'ils n'en éprouvent
  - type: text
    content: quand abondent leur blé, leur vin [et leur huile].
  '9':
  - type: text
    content: Je me couche et aussitôt je m'endors en paix,
  - type: text
    content: car c'est toi seul, Eternel, qui me donnes la sécurité dans ma demeure.
