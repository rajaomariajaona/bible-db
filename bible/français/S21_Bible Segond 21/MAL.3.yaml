document_id: MAL.3,152
type_code: fra
verses:
  '1':
  - type: text
    content: '*Voici que j''enverrai mon messager'
  - type: text
    content: pour me préparer le chemin.
  - type: note
    content: 'Voici… chemin: cité en Matthieu 11.10; Marc 1.2; Luc 7.27 à propos de Jean-Baptiste.'
  - type: text
    content: Et soudain, il entrera dans son temple, le Seigneur que vous cherchez;
  - type: text
    content: le messager de l'alliance que vous désirez, le voici qui arrive,
  - type: text
    content: dit l'Eternel, le maître de l'univers.
  '10':
  - type: text
    content: Apportez toutes les dîmes à la maison du trésor
  - type: text
    content: afin qu'il y ait de la nourriture dans ma maison.
  - type: text
    content: Mettez-moi ainsi à l'épreuve,
  - type: text
    content: dit l'Eternel, le maître de l'univers,
  - type: text
    content: et vous verrez si je n'ouvre pas pour vous les fenêtres du ciel,
  - type: text
    content: si je ne déverse pas sur vous la bénédiction en abondance.
  '11':
  - type: text
    content: Pour vous je menacerai l'insecte vorace
  - type: text
    content: afin qu'il ne détruise pas les produits du sol
  - type: text
    content: et que la vigne ne soit pas stérile dans vos campagnes,
  - type: text
    content: dit l'Eternel, le maître de l'univers.
  '12':
  - type: text
    content: Toutes les nations vous déclareront heureux
  - type: text
    content: car vous serez un pays de délices,
  - type: text
    content: dit l'Eternel, le maître de l'univers.
  - type: heading
    content: La justice de Dieu et le jour du jugement
  '13':
  - type: text
    content: Vos paroles sont dures contre moi, dit l'Eternel,
  - type: text
    content: 'et vous dites: «Qu''avons-nous dit contre toi?»'
  '14':
  - type: text
    content: 'Vous avez dit: «C''est inutile de servir Dieu.'
  - type: text
    content: Qu'avons-nous gagné à respecter ses ordres
  - type: text
    content: et à marcher dans le deuil
  - type: text
    content: à cause de l'Eternel, le maître de l'univers?
  '15':
  - type: text
    content: Maintenant nous déclarons heureux les hommes arrogants.
  - type: text
    content: Oui, ceux qui font le mal prospèrent;
  - type: text
    content: ils mettent Dieu à l'épreuve, et ils en réchappent!»
  '16':
  - type: text
    content: Alors ceux qui craignent l'Eternel se parlèrent l'un à l'autre;
  - type: text
    content: l'Eternel fut attentif, et il écouta.
  - type: text
    content: Un livre de souvenir fut écrit devant lui
  - type: text
    content: pour ceux qui craignent l'Eternel
  - type: text
    content: et qui respectent son nom.
  '17':
  - type: text
    content: Ils seront à moi, dit l'Eternel, le maître de l'univers,
  - type: text
    content: ils m'appartiendront, le jour que je prépare;
  - type: text
    content: j'aurai compassion d'eux
  - type: text
    content: comme un homme a compassion de son fils qui le sert,
  '18':
  - type: text
    content: et vous verrez de nouveau la différence
  - type: text
    content: entre le juste et le méchant,
  - type: text
    content: entre celui qui sert Dieu
  - type: text
    content: et celui qui ne le sert pas.
  '19':
  - type: text
    content: En effet, voici venir ce jour,
  - type: text
    content: brûlant comme un four.
  - type: text
    content: 'Tous les hommes arrogants et tous ceux qui font le mal seront comme la paille:'
  - type: text
    content: le jour qui vient les embrasera,
  - type: text
    content: dit l'Eternel, le maître de l'univers,
  - type: text
    content: il ne leur laissera ni racine ni rameau.
  '2':
  - type: text
    content: Qui pourra supporter le jour de sa venue?
  - type: text
    content: Qui restera debout quand il apparaîtra?
  - type: text
    content: En effet, il sera pareil à un feu purificateur,
  - type: text
    content: à la lessive des blanchisseurs.
  '20':
  - type: text
    content: Mais pour vous qui craignez mon nom
  - type: text
    content: le soleil de justice se lèvera,
  - type: text
    content: et la guérison sera dans ses rayons.
  - type: text
    content: Vous sortirez en bondissant comme les veaux d'une étable,
  '21':
  - type: text
    content: vous piétinerez les méchants,
  - type: text
    content: car ils seront comme de la poussière
  - type: text
    content: sous la plante de vos pieds,
  - type: text
    content: le jour que je prépare,
  - type: text
    content: dit l'Eternel, le maître de l'univers.
  '22':
  - type: text
    content: Souvenez-vous de la loi de mon serviteur Moïse!
  - type: text
    content: Je lui ai donné en Horeb
  - type: note
    content: 'Horeb: autre nom du mont Sinaï. Voir Exode 19–24.'
  - type: text
    content: ', pour tout Israël,'
  - type: text
    content: des prescriptions et des règles.
  '23':
  - type: text
    content: Je vous enverrai le prophète Elie
  - type: text
    content: avant que n'arrive le jour de l'Eternel,
  - type: text
    content: ce jour grand et redoutable.
  '24':
  - type: text
    content: '*Il ramènera le cœur des pères vers leurs enfants'
  - type: note
    content: 'Il ramènera… enfants: cité en Luc 1.17 à propos de Jean-Baptiste.'
  - type: text
    content: et le cœur des enfants vers leurs pères,
  - type: text
    content: de peur que je ne vienne frapper le pays de destruction.
  '3':
  - type: text
    content: Il s'assiéra pour fondre et purifier l'argent,
  - type: text
    content: il purifiera les descendants de Lévi,
  - type: text
    content: il les rendra purs comme on rend purs l'or et l'argent,
  - type: text
    content: et c'est suivant la justice qu'ils présenteront des offrandes à l'Eternel.
  '4':
  - type: text
    content: Alors l'offrande de Juda et de Jérusalem sera agréable à l'Eternel
  - type: text
    content: comme autrefois, comme par le passé.
  '5':
  - type: text
    content: Je m'approcherai de vous pour le jugement,
  - type: text
    content: et je m'empresserai de témoigner contre les magiciens et les adultères,
  - type: text
    content: contre ceux qui prêtent de faux serments,
  - type: text
    content: contre ceux qui exploitent le salarié,
  - type: text
    content: qui oppriment la veuve et l'orphelin,
  - type: text
    content: qui font tort à l'étranger et ne me craignent pas,
  - type: text
    content: dit l'Eternel, le maître de l'univers.
  - type: heading
    content: Les dîmes et les offrandes
  '6':
  - type: text
    content: Je suis l'Eternel, je ne change pas,
  - type: text
    content: et vous, descendants de Jacob, vous n'avez pas été détruits.
  '7':
  - type: text
    content: Dès l'époque de vos ancêtres, vous vous êtes écartés de mes prescriptions,
  - type: text
    content: vous ne les avez pas respectées.
  - type: text
    content: Revenez à moi, et je reviendrai à vous, dit l'Eternel, le maître de l'univers.
  - type: text
    content: 'Et vous dites: «En quoi devons-nous revenir?»'
  '8':
  - type: text
    content: Un homme peut-il tromper Dieu?
  - type: text
    content: En effet, vous me trompez
  - type: text
    content: 'et vous dites: «En quoi t''avons-nous trompé?» Dans les dîmes et les offrandes.'
  '9':
  - type: text
    content: Vous êtes frappés par la malédiction et vous me trompez, la nation tout entière!
