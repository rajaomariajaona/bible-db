document_id: ISA.47,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Jugement de Babylone
  - type: text
    content: Descends et assieds-toi dans la poussière,
  - type: text
    content: fille de Babylone! Assieds-toi par terre faute de trône,
  - type: text
    content: fille des Babyloniens!
  - type: text
    content: En effet, on ne t'appellera plus délicate et raffinée.
  '10':
  - type: text
    content: Tu avais confiance dans ta méchanceté,
  - type: text
    content: 'tu disais: «Personne ne me voit!»'
  - type: text
    content: Ce sont ta sagesse et ton savoir qui t'ont égarée
  - type: text
    content: 'et t''ont amenée à dire dans ton cœur: «Il n''y a que moi et personne d''autre!»'
  '11':
  - type: text
    content: Le malheur te frappera
  - type: text
    content: sans même que tu le voies surgir,
  - type: text
    content: le désastre tombera sur toi
  - type: text
    content: sans que tu puisses l'écarter,
  - type: text
    content: la dévastation fondra sur toi tout à coup, sans que tu t'en aperçoives.
  '12':
  - type: text
    content: Continue donc tes pratiques magiques
  - type: text
    content: et tous tes rites de sorcellerie,
  - type: text
    content: avec lesquels tu t'es fatiguée depuis ta jeunesse!
  - type: text
    content: Peut-être pourras-tu en tirer profit,
  - type: text
    content: peut-être deviendras-tu redoutable.
  '13':
  - type: text
    content: Tu t'es épuisée à force de consulter les devins.
  - type: text
    content: Qu'ils se présentent donc et te sauvent,
  - type: text
    content: les spécialistes du ciel,
  - type: text
    content: ceux qui observent les astres
  - type: text
    content: et qui sont censés annoncer chaque début de mois
  - type: text
    content: ce qui doit t'arriver!
  '14':
  - type: text
    content: 'En réalité, ils sont pareils à de la paille: le feu les brûle entièrement.'
  - type: text
    content: Ils ne pourront pas échapper aux flammes.
  - type: text
    content: Ce ne sera pas un simple feu de braises qui permet de se réchauffer,
  - type: text
    content: ni un feu près duquel on s'assied.
  '15':
  - type: text
    content: Voilà tout ce que peuvent t'apporter ceux que tu t'es fatiguée à consulter.
  - type: text
    content: Ceux qui ont fait des affaires avec toi depuis ta jeunesse
  - type: text
    content: 'se perdront chacun de leur côté:'
  - type: text
    content: il n'y aura personne pour te sauver.
  '2':
  - type: text
    content: Prends le moulin et mouds de la farine!
  - type: text
    content: Retire ton voile, relève les pans de ta robe,
  - type: text
    content: découvre tes jambes et traverse les fleuves!
  '3':
  - type: text
    content: Ta nudité sera dévoilée
  - type: text
    content: et ta honte sera exposée.
  - type: text
    content: J'exercerai ma vengeance
  - type: text
    content: sans aucune opposition.
  '4':
  - type: text
    content: Celui qui nous rachète s'appelle l'Eternel, le maître de l'univers.
  - type: text
    content: C'est le Saint d'Israël.
  '5':
  - type: text
    content: Assieds-toi en silence et enfonce-toi dans les ténèbres,
  - type: text
    content: fille des Babyloniens,
  - type: text
    content: car on ne t'appellera plus «souveraine des royaumes».
  '6':
  - type: text
    content: J'étais irrité contre mon peuple,
  - type: text
    content: j'avais déshonoré mon héritage
  - type: text
    content: 'et je les avais livrés entre tes mains:'
  - type: text
    content: tu n'as montré aucune compassion pour eux;
  - type: text
    content: même au vieillard tu as très lourdement fait ressentir ta domination.
  '7':
  - type: text
    content: 'Tu disais: «Je serai toujours souveraine»,'
  - type: text
    content: à tel point que tu n'as rien pris de tout cela à cœur,
  - type: text
    content: tu ne t'es pas rappelé que cela prendrait fin.
  '8':
  - type: text
    content: Ecoute donc, amatrice de plaisirs,
  - type: text
    content: toi qui t'assieds pleine de confiance
  - type: text
    content: 'et qui dis dans ton cœur: «Il n''y a que moi et personne d''autre!'
  - type: text
    content: Je ne serai jamais veuve
  - type: text
    content: et ne perdrai jamais d'enfant!»
  '9':
  - type: text
    content: Ces deux souffrances – la perte d'enfants et le veuvage –
  - type: text
    content: t'atteindront en un instant, en un seul jour.
  - type: text
    content: Elles te frapperont de plein fouet
  - type: text
    content: malgré tous tes rites de sorcellerie,
  - type: text
    content: malgré toute la puissance de tes pratiques magiques.
