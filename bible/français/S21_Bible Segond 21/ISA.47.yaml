document_id: ISA.47
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jugement de Babylone
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Descends et assieds-toi dans la poussière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fille de Babylone! Assieds-toi par terre faute de trône,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fille des Babyloniens!
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, on ne t'appellera plus délicate et raffinée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Prends le moulin et mouds de la farine!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Retire ton voile, relève les pans de ta robe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: découvre tes jambes et traverse les fleuves!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ta nudité sera dévoilée
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ta honte sera exposée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'exercerai ma vengeance
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans aucune opposition.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Celui qui nous rachète s'appelle l'Eternel, le maître de l'univers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est le Saint d'Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Assieds-toi en silence et enfonce-toi dans les ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fille des Babyloniens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car on ne t'appellera plus «souveraine des royaumes».
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: J'étais irrité contre mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'avais déshonoré mon héritage
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et je les avais livrés entre tes mains:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu n'as montré aucune compassion pour eux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: même au vieillard tu as très lourdement fait ressentir ta domination.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tu disais: «Je serai toujours souveraine»,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: à tel point que tu n'as rien pris de tout cela à cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu ne t'es pas rappelé que cela prendrait fin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ecoute donc, amatrice de plaisirs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi qui t'assieds pleine de confiance
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et qui dis dans ton cœur: «Il n''y a que moi et personne d''autre!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne serai jamais veuve
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne perdrai jamais d'enfant!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ces deux souffrances – la perte d'enfants et le veuvage –
- type: usfm
  marker: q1
  children:
  - type: text
    text: t'atteindront en un instant, en un seul jour.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles te frapperont de plein fouet
- type: usfm
  marker: q1
  children:
  - type: text
    text: malgré tous tes rites de sorcellerie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: malgré toute la puissance de tes pratiques magiques.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tu avais confiance dans ta méchanceté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tu disais: «Personne ne me voit!»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce sont ta sagesse et ton savoir qui t'ont égarée
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et t''ont amenée à dire dans ton cœur: «Il n''y a que moi et personne d''autre!»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le malheur te frappera
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans même que tu le voies surgir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le désastre tombera sur toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans que tu puisses l'écarter,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la dévastation fondra sur toi tout à coup, sans que tu t'en aperçoives.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Continue donc tes pratiques magiques
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous tes rites de sorcellerie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec lesquels tu t'es fatiguée depuis ta jeunesse!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Peut-être pourras-tu en tirer profit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: peut-être deviendras-tu redoutable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tu t'es épuisée à force de consulter les devins.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu'ils se présentent donc et te sauvent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les spécialistes du ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui observent les astres
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui sont censés annoncer chaque début de mois
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce qui doit t'arriver!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'En réalité, ils sont pareils à de la paille: le feu les brûle entièrement.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne pourront pas échapper aux flammes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce ne sera pas un simple feu de braises qui permet de se réchauffer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni un feu près duquel on s'assied.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Voilà tout ce que peuvent t'apporter ceux que tu t'es fatiguée à consulter.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui ont fait des affaires avec toi depuis ta jeunesse
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'se perdront chacun de leur côté:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n'y aura personne pour te sauver.
