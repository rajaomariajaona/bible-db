document_id: MAT.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus et le sabbat
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A cette époque-là, Jésus traversa des champs de blé un jour de sabbat. Ses disciples, qui avaient faim, se mirent à arracher des épis et à manger. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'A cette vue, les pharisiens lui dirent: «Regarde, tes disciples font ce qu''il n''est pas permis de faire pendant le sabbat'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sabbat: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'jour du repos, où l''on ne devait faire aucun travail pénible (voir '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 20.8-11
      metadata:
        usfm: EXO.20.8+EXO.20.9+EXO.20.10+EXO.20.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais Jésus leur répondit: «N''avez-vous pas lu ce qu''a fait David lorsqu''il a eu faim, lui et ses compagnons? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il est entré dans la maison de Dieu et a mangé les pains consacrés que ni lui ni ses compagnons n''avaient le droit de manger et qui étaient réservés aux prêtres seuls! '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ou n''avez-vous pas lu dans la loi que, les jours de sabbat, les prêtres violent le sabbat dans le temple sans se rendre coupables? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Or, je vous le dis, il y a ici plus grand que le temple. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Si vous saviez ce que signifie: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Je désire la bonté, et non les sacrifices
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je désire… sacrifices: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Osée 6.6
      metadata:
        usfm: HOS.6.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', vous n''auriez pas condamné des innocents. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: En effet, le Fils de l'homme est le Seigneur du sabbat.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Jésus partit de là et entra dans la synagogue. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il s''y trouvait un homme qui avait la main paralysée. Ils demandèrent à Jésus: «Est-il permis de faire une guérison le jour du sabbat?» C''était afin de pouvoir l''accuser. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il leur répondit: «Lequel de vous, s''il n''a qu''une brebis et qu''elle tombe dans un trou le jour du sabbat, n''ira pas la retirer de là? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Or, un homme vaut beaucoup plus qu''une brebis! Il est donc permis de faire du bien les jours de sabbat.» '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors il dit à l''homme: «Tends la main.» Il la tendit, et elle devint saine [comme l''autre].'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus, le serviteur de l'Eternel contesté
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les pharisiens sortirent et tinrent conseil sur les moyens de le faire mourir. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jésus le sut et s''éloigna de là. Une grande foule le suivit. Il guérit tous les malades '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'et leur recommanda sévèrement de ne pas le faire connaître, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'afin que s''accomplisse ce que le prophète Esaïe avait annoncé: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Voici mon serviteur que j'ai choisi, mon bien-aimé qui a toute mon approbation. Je mettrai mon Esprit sur lui, et il annoncera la justice aux nations.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Il ne contestera pas, il ne criera pas, et personne n'entendra sa voix dans les rues.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Il ne cassera pas le roseau abîmé et n'éteindra pas la mèche qui fume encore, jusqu'à ce qu'il ait fait triompher la justice.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Les nations espéreront en son nom.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.18-21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Voici… son nom: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 42.1-5
      metadata:
        usfm: ISA.42.1+ISA.42.2+ISA.42.3+ISA.42.4+ISA.42.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Alors on lui amena un démoniaque aveugle et muet, et il le guérit, de sorte que le muet parlait et voyait. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Toute la foule disait, étonnée: «N''est-ce pas là le Fils de David'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le Fils de David: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire le Messie.
    marker-yv: yv-n
  - type: text
    text: ?»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Lorsque les pharisiens entendirent cela, ils dirent: «Cet homme ne chasse les démons que par Béelzébul'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Béelzébul: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir la note en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10.25'
      metadata:
        usfm: MAT.10.25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', le prince des démons.» '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Comme Jésus connaissait leurs pensées, il leur dit: «Tout royaume confronté à des luttes internes est dévasté, et aucune ville ou famille confrontée à des luttes internes ne peut subsister. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Si Satan chasse Satan, il lutte contre lui-même. Comment donc son royaume subsistera-t-il? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Et si moi, je chasse les démons par Béelzébul, vos disciples, par qui les chassent-ils? C''est pourquoi ils seront eux-mêmes vos juges. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Mais si c''est par l''Esprit de Dieu que je chasse les démons, alors le royaume de Dieu est venu jusqu''à vous. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ou encore, comment quelqu''un peut-il entrer dans la maison d''un homme fort et piller ses biens, s''il n''a pas d''abord attaché cet homme fort? Alors seulement il pillera sa maison. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Celui qui n'est pas avec moi est contre moi, et celui qui ne rassemble pas avec moi disperse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '»C''est pourquoi je vous dis: Tout péché, tout blasphème sera pardonné aux hommes, mais le blasphème contre l''Esprit ne leur sera pas pardonné. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Celui qui parlera contre le Fils de l''homme, cela lui sera pardonné; mais celui qui parlera contre le Saint-Esprit, le pardon ne lui sera accordé ni dans le monde présent ni dans le monde à venir. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dites que l''arbre est bon et que son fruit est bon, ou bien dites que l''arbre est mauvais et que son fruit est mauvais, car on reconnaît l''arbre à son fruit. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Races de vipères, comment pourriez-vous dire de bonnes choses, mauvais comme vous l''êtes? En effet, la bouche exprime ce dont le cœur est plein. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'L''homme bon tire de bonnes choses de son bon trésor et l''homme mauvais tire de mauvaises choses de son mauvais trésor. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Je vous le dis: le jour du jugement, les hommes rendront compte de toute parole inutile qu''ils auront prononcée. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: En effet, d'après tes paroles tu seras déclaré juste et d'après tes paroles tu seras condamné.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Alors quelques-uns des spécialistes de la loi et des pharisiens prirent la parole et dirent: «Maître, nous voudrions voir un signe miraculeux de ta part.» '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Il leur répondit: «Une génération mauvaise et adultère réclame un signe miraculeux, il ne lui sera pas donné d''autre signe que celui du prophète Jonas. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'En effet, de même que '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Jonas fut trois jours et trois nuits dans le ventre d'un grand poisson
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.40 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jonas… poisson: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jonas 2.1
      metadata:
        usfm: JON.2.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ; Jésus annonce sa mort et sa résurrection.
    marker-yv: yv-n
  - type: text
    text: ', de même le Fils de l''homme sera trois jours et trois nuits dans la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Lors du jugement, les habitants de Ninive se lèveront avec cette génération et la condamneront, parce qu''ils ont changé d''attitude à la prédication de Jonas. Or, il y a ici plus que Jonas. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Lors du jugement, la reine du Midi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.42 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La reine du Midi: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'elle est venue du Séba (aujourd''hui le Yémen) pour mettre à l''épreuve la sagesse du roi Salomon (10e siècle av. J.-C.; voir '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Rois 10
      metadata:
        usfm: 1KI.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' se lèvera avec cette génération et la condamnera, parce qu''elle est venue des extrémités de la terre pour entendre la sagesse de Salomon. Or, il y a ici plus que Salomon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: '»Lorsqu''un esprit impur est sorti d''un homme, il va dans des endroits arides pour chercher du repos, et il n''en trouve pas. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Alors il dit: ‘Je retournerai dans ma maison, d''où je suis sorti.’ A son arrivée, il la trouve vide, balayée et bien rangée. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Alors il s'en va prendre avec lui sept autres esprits plus mauvais que lui; ils entrent dans la maison, s'y installent, et la dernière condition de cet homme est pire que la première. Il en ira de même pour cette génération mauvaise.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Comme Jésus parlait encore à la foule, sa mère et ses frères, qui étaient dehors, cherchaient à lui parler. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: '[Quelqu''un lui dit: «Ta mère et tes frères sont dehors et cherchent à te parler.»] '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Mais Jésus répondit à celui qui lui parlait: «Qui est ma mère et qui sont mes frères?» '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Puis il tendit la main vers ses disciples et dit: «Voici ma mère et mes frères. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: En effet, celui qui fait la volonté de mon Père céleste, celui-là est mon frère, ma sœur, ma mère.»
