document_id: ISA.55,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le salut pour tous
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Vous tous qui avez soif, venez vers l'eau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: même celui qui n'a pas d'argent!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Venez, achetez et mangez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: venez, achetez du vin et du lait sans argent, sans rien payer!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: La pluie et la neige descendent du ciel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et n'y retournent pas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans avoir arrosé la terre, sans l'avoir fécondée et avoir fait germer ses plantes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans avoir *fourni de la semence au semeur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et du pain à celui qui mange
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '55.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Fourni… mange: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Corinthiens 9.10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Il en va de même pour ma parole, celle qui sort de ma bouche:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle ne revient pas à moi sans effet,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans avoir fait ce que je désire et rempli la mission que je lui ai confiée.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Oui, vous sortirez dans la joie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous serez conduits dans la paix.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les montagnes et les collines éclateront en cris de joie devant vous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous les arbres de la campagne battront des mains.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Au lieu des buissons épineux poussera le cyprès,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au lieu de l'ortie poussera le myrte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et cela contribuera à la réputation de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce sera un signe éternel qui ne disparaîtra jamais.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Pourquoi dépensez-vous de l'argent pour ce qui ne nourrit pas?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi travaillez-vous pour ce qui ne rassasie pas?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoutez-moi vraiment et vous mangerez ce qui est bon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous savourerez des plats succulents.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tendez l'oreille et venez à moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: écoutez donc et vous vivrez!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je conclurai avec vous une alliance éternelle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*pour vous assurer les grâces promises à David'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '55.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Pour… David: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ouconstituée des grâces sûres promises à David; cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Actes 13.34
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' en rapport avec la résurrection de Jésus.'
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Je l'ai établi comme un témoin pour les peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme un guide et un chef pour eux.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tu appelleras des nations que tu ne connais pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et des nations qui ne te connaissent pas accourront vers toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de l'Eternel, ton Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du Saint d'Israël, parce qu'il te donne sa splendeur.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Recherchez l'Eternel pendant qu'il se laisse trouver!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faites appel à lui tant qu'il est près!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Que le méchant abandonne sa voie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'homme injuste ses pensées!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qu''il retourne à l''Eternel: il aura compassion de lui.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'il retourne à notre Dieu, car il pardonne abondamment.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: En effet, vos pensées ne sont pas mes pensées
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mes voies ne sont pas vos voies, déclare l'Eternel.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Le ciel est bien plus haut que la terre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De même, mes voies sont bien au-dessus de vos voies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mes pensées bien au-dessus de vos pensées.
