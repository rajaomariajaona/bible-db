document_id: ISA.55,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le salut pour tous
  - type: text
    content: Vous tous qui avez soif, venez vers l'eau,
  - type: text
    content: même celui qui n'a pas d'argent!
  - type: text
    content: Venez, achetez et mangez,
  - type: text
    content: venez, achetez du vin et du lait sans argent, sans rien payer!
  '10':
  - type: text
    content: La pluie et la neige descendent du ciel
  - type: text
    content: et n'y retournent pas
  - type: text
    content: sans avoir arrosé la terre, sans l'avoir fécondée et avoir fait germer ses plantes,
  - type: text
    content: sans avoir *fourni de la semence au semeur
  - type: text
    content: et du pain à celui qui mange
  - type: note
    content: 'Fourni… mange: cité en 2 Corinthiens 9.10.'
  - type: text
    content: .
  '11':
  - type: text
    content: 'Il en va de même pour ma parole, celle qui sort de ma bouche:'
  - type: text
    content: elle ne revient pas à moi sans effet,
  - type: text
    content: sans avoir fait ce que je désire et rempli la mission que je lui ai confiée.
  '12':
  - type: text
    content: Oui, vous sortirez dans la joie
  - type: text
    content: et vous serez conduits dans la paix.
  - type: text
    content: Les montagnes et les collines éclateront en cris de joie devant vous
  - type: text
    content: et tous les arbres de la campagne battront des mains.
  '13':
  - type: text
    content: Au lieu des buissons épineux poussera le cyprès,
  - type: text
    content: au lieu de l'ortie poussera le myrte,
  - type: text
    content: et cela contribuera à la réputation de l'Eternel,
  - type: text
    content: ce sera un signe éternel qui ne disparaîtra jamais.
  '2':
  - type: text
    content: Pourquoi dépensez-vous de l'argent pour ce qui ne nourrit pas?
  - type: text
    content: Pourquoi travaillez-vous pour ce qui ne rassasie pas?
  - type: text
    content: Ecoutez-moi vraiment et vous mangerez ce qui est bon,
  - type: text
    content: vous savourerez des plats succulents.
  '3':
  - type: text
    content: Tendez l'oreille et venez à moi,
  - type: text
    content: écoutez donc et vous vivrez!
  - type: text
    content: Je conclurai avec vous une alliance éternelle
  - type: text
    content: '*pour vous assurer les grâces promises à David'
  - type: note
    content: 'Pour… David: ouconstituée des grâces sûres promises à David; cité en Actes 13.34 en rapport avec la résurrection de Jésus.'
  - type: text
    content: .
  '4':
  - type: text
    content: Je l'ai établi comme un témoin pour les peuples,
  - type: text
    content: comme un guide et un chef pour eux.
  '5':
  - type: text
    content: Tu appelleras des nations que tu ne connais pas,
  - type: text
    content: et des nations qui ne te connaissent pas accourront vers toi
  - type: text
    content: à cause de l'Eternel, ton Dieu,
  - type: text
    content: du Saint d'Israël, parce qu'il te donne sa splendeur.
  '6':
  - type: text
    content: Recherchez l'Eternel pendant qu'il se laisse trouver!
  - type: text
    content: Faites appel à lui tant qu'il est près!
  '7':
  - type: text
    content: Que le méchant abandonne sa voie,
  - type: text
    content: et l'homme injuste ses pensées!
  - type: text
    content: 'Qu''il retourne à l''Eternel: il aura compassion de lui.'
  - type: text
    content: Qu'il retourne à notre Dieu, car il pardonne abondamment.
  '8':
  - type: text
    content: En effet, vos pensées ne sont pas mes pensées
  - type: text
    content: et mes voies ne sont pas vos voies, déclare l'Eternel.
  '9':
  - type: text
    content: Le ciel est bien plus haut que la terre.
  - type: text
    content: De même, mes voies sont bien au-dessus de vos voies,
  - type: text
    content: et mes pensées bien au-dessus de vos pensées.
