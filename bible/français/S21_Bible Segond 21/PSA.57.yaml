document_id: PSA.57
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Confiance dans la difficulté
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur, sur la mélodie de «Ne détruis pas». Hymne de David, lorsqu'il se réfugia dans la grotte, poursuivi par Saül.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Fais-moi grâce, ô Dieu, fais-moi grâce,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car c'est en toi que mon âme cherche un refuge;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je cherche un refuge à l'ombre de tes ailes
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu'à ce que le malheur soit passé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Je crie au Dieu très-haut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au Dieu qui agit en ma faveur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il m'enverra du ciel le secours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'car celui qui me harcèle me couvre d''insultes. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu enverra sa bonté et sa vérité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mon âme est au milieu de lions;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je suis entouré d'hommes qui crachent le feu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: d'hommes dont les dents sont des lances
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des flèches, et la langue une épée tranchante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Elève-toi au-dessus du ciel, ô Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que ta gloire soit sur toute la terre!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ils avaient tendu un piège sous mes pas
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour me faire plier;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ils avaient creusé une fosse devant moi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ils y sont tombés. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mon cœur est rassuré, ô Dieu, mon cœur est rassuré;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je chanterai, je ferai retentir mes instruments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Réveille-toi, mon âme, réveillez-vous, mon luth et ma harpe!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je veux réveiller l'aurore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Je te louerai parmi les peuples, Seigneur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je te chanterai parmi les nations,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: car ta bonté s'élève jusqu'au ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ta vérité atteint les nuages.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Elève-toi au-dessus du ciel, ô Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que ta gloire resplendisse sur toute la terre!
