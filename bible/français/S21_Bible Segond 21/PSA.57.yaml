document_id: PSA.57,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Confiance dans la difficulté
  - type: text
    content: Au chef de chœur, sur la mélodie de «Ne détruis pas». Hymne de David, lorsqu'il se réfugia dans la grotte, poursuivi par Saül.
  '10':
  - type: text
    content: Je te louerai parmi les peuples, Seigneur,
  - type: text
    content: je te chanterai parmi les nations,
  '11':
  - type: text
    content: car ta bonté s'élève jusqu'au ciel,
  - type: text
    content: et ta vérité atteint les nuages.
  '12':
  - type: text
    content: Elève-toi au-dessus du ciel, ô Dieu,
  - type: text
    content: que ta gloire resplendisse sur toute la terre!
  '2':
  - type: text
    content: Fais-moi grâce, ô Dieu, fais-moi grâce,
  - type: text
    content: car c'est en toi que mon âme cherche un refuge;
  - type: text
    content: je cherche un refuge à l'ombre de tes ailes
  - type: text
    content: jusqu'à ce que le malheur soit passé.
  '3':
  - type: text
    content: Je crie au Dieu très-haut,
  - type: text
    content: au Dieu qui agit en ma faveur.
  '4':
  - type: text
    content: Il m'enverra du ciel le secours,
  - type: text
    content: 'car celui qui me harcèle me couvre d''insultes. '
  - type: text
    content: – Pause.
  - type: text
    content: Dieu enverra sa bonté et sa vérité.
  '5':
  - type: text
    content: Mon âme est au milieu de lions;
  - type: text
    content: je suis entouré d'hommes qui crachent le feu,
  - type: text
    content: d'hommes dont les dents sont des lances
  - type: text
    content: et des flèches, et la langue une épée tranchante.
  '6':
  - type: text
    content: Elève-toi au-dessus du ciel, ô Dieu,
  - type: text
    content: que ta gloire soit sur toute la terre!
  '7':
  - type: text
    content: Ils avaient tendu un piège sous mes pas
  - type: text
    content: pour me faire plier;
  - type: text
    content: 'ils avaient creusé une fosse devant moi:'
  - type: text
    content: 'ils y sont tombés. '
  - type: text
    content: – Pause.
  '8':
  - type: text
    content: Mon cœur est rassuré, ô Dieu, mon cœur est rassuré;
  - type: text
    content: je chanterai, je ferai retentir mes instruments.
  '9':
  - type: text
    content: Réveille-toi, mon âme, réveillez-vous, mon luth et ma harpe!
  - type: text
    content: Je veux réveiller l'aurore.
