document_id: EXO.6,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Encouragements de Dieu à Moïse
  - type: text
    content: 'L''Eternel dit à Moïse: «Tu vas voir maintenant ce que je ferai au pharaon. Une main puissante le forcera à les laisser partir, une main puissante le forcera à les chasser de son pays.»'
  '10':
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '11':
  - type: text
    content: '«Va parler au pharaon, au roi d''Egypte, pour qu''il laisse les Israélites partir de son pays.» '
  '12':
  - type: text
    content: 'Moïse répondit en présence de l''Eternel: «Les Israélites ne m''ont pas écouté. Comment le pharaon m''écouterait-il, moi qui n''ai pas la parole facile?»'
  '13':
  - type: text
    content: Cependant l'Eternel parla à Moïse et à Aaron, et il leur donna des ordres au sujet des Israélites et au sujet du pharaon, du roi d'Egypte, pour faire sortir les Israélites d'Egypte.
  - type: heading
    content: Généalogie de Moïse et d'Aaron
  '14':
  - type: text
    content: 'Voici leurs chefs de famille. Fils de Ruben, le fils aîné d''Israël: Hénoc, Pallu, Hetsron et Carmi. Tels sont les clans de Ruben.'
  '15':
  - type: text
    content: 'Fils de Siméon: Jemuel, Jamin, Ohad, Jakin et Tsochar, ainsi que Saül, le fils de la Cananéenne. Tels sont les clans de Siméon.'
  '16':
  - type: text
    content: 'Voici les noms des fils de Lévi en fonction de leur lignée: Guershon, Kehath et Merari. Lévi vécut 137 ans. '
  '17':
  - type: text
    content: 'Fils de Guershon: Libni et Shimeï et leurs clans. '
  '18':
  - type: text
    content: 'Fils de Kehath: Amram, Jitsehar, Hébron et Uziel. Kehath vécut 133 ans. '
  '19':
  - type: text
    content: 'Fils de Merari: Machli et Mushi. Tels sont les clans de Lévi en fonction de leur lignée.'
  '2':
  - type: text
    content: 'Dieu s''adressa encore à Moïse et dit: «Je suis l''Eternel. '
  '20':
  - type: text
    content: Amram prit pour femme sa tante Jokébed, et elle lui donna pour fils Aaron et Moïse. Amram vécut 137 ans.
  '21':
  - type: text
    content: 'Fils de Jitsehar: Koré, Népheg et Zicri.'
  '22':
  - type: text
    content: 'Fils d''Uziel: Mishaël, Eltsaphan et Sithri.'
  '23':
  - type: text
    content: Aaron prit pour femme Elishéba, fille d'Amminadab et sœur de Nachshon, et elle lui donna pour fils Nadab, Abihu, Eléazar et Ithamar.
  '24':
  - type: text
    content: 'Fils de Koré: Assir, Elkana et Abiasaph. Tels sont les clans des Koréites.'
  '25':
  - type: text
    content: Eléazar, fils d'Aaron, prit pour femme une des filles de Puthiel, et elle lui donna pour fils Phinées. Tels sont les chefs de famille des Lévites avec leurs clans.
  '26':
  - type: text
    content: 'C''est à cet Aaron et ce Moïse que l''Eternel dit: «Faites sortir les Israélites d''Egypte en corps d''armée.» '
  '27':
  - type: text
    content: Ce sont eux qui parlèrent au pharaon, au roi d'Egypte, pour faire sortir les Israélites d'Egypte. Il s'agit de ce Moïse-là et de cet Aaron-là.
  '28':
  - type: text
    content: 'Lorsque l''Eternel parla à Moïse en Egypte, '
  '29':
  - type: text
    content: 'il lui dit: «Je suis l''Eternel. Répète au pharaon, au roi d''Egypte, tout ce que je te dis.» '
  '3':
  - type: text
    content: Je suis apparu à Abraham, à Isaac et à Jacob comme le Dieu tout-puissant, mais je ne me suis pas pleinement fait connaître à eux sous mon nom, l'Eternel
  - type: note
    content: 'Je ne… l''Eternel: ou je n''ai pas été connu d''eux dans ma réputation en tant qu''Eternel ou je n''ai pas été reconnu par eux comme l''être immuable, littéralement mon nom Yhvh je n''ai pas été connu (ou ne me suis pas fait connaître) pour eux.'
  - type: text
    content: '. '
  '30':
  - type: text
    content: 'Moïse répondit en présence de l''Eternel: «Je n''ai pas la parole facile. Comment le pharaon m''écouterait-il?»'
  '4':
  - type: text
    content: J'ai aussi établi mon alliance
  - type: note
    content: 'Mon alliance: voir Genèse 15.18-21; 17.2-8.'
  - type: text
    content: ' avec eux: j''ai promis de leur donner le pays de Canaan, le pays où ils ont séjourné en étrangers. '
  '5':
  - type: text
    content: 'J''ai entendu les gémissements des Israélites, que les Egyptiens tiennent dans l''esclavage, et je me suis souvenu de mon alliance. '
  '6':
  - type: text
    content: 'C''est pourquoi dis aux Israélites: ‘Je suis l''Eternel, je vous libérerai des travaux dont vous chargent les Egyptiens, je vous délivrerai de leur esclavage et je vous rachèterai avec puissance et par de grands actes de jugement. '
  '7':
  - type: text
    content: 'Je vous prendrai pour que vous soyez mon peuple, je serai votre Dieu et vous saurez que c''est moi, l''Eternel, votre Dieu, qui vous libère des travaux dont vous chargent les Egyptiens. '
  '8':
  - type: text
    content: Je vous ferai entrer dans le pays que j'ai juré de donner à Abraham, à Isaac et à Jacob; je vous le donnerai en possession, moi l'Eternel.’»
  '9':
  - type: text
    content: C'est ainsi que Moïse s'adressa aux Israélites, mais leur impatience et la dureté de l'esclavage les empêchèrent de l'écouter.
