document_id: EXO.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Encouragements de Dieu à Moïse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Moïse: «Tu vas voir maintenant ce que je ferai au pharaon. Une main puissante le forcera à les laisser partir, une main puissante le forcera à les chasser de son pays.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dieu s''adressa encore à Moïse et dit: «Je suis l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Je suis apparu à Abraham, à Isaac et à Jacob comme le Dieu tout-puissant, mais je ne me suis pas pleinement fait connaître à eux sous mon nom, l'Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je ne… l''Eternel: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ou je n'ai pas été connu d'eux dans ma réputation en tant qu'Eternel ou je n'ai pas été reconnu par eux comme l'être immuable, littéralement mon nom Yhvh je n'ai pas été connu (ou ne me suis pas fait connaître) pour eux.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: J'ai aussi établi mon alliance
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Mon alliance: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Genèse 15.18-21
      metadata:
        usfm: GEN.15.18+GEN.15.19+GEN.15.20+GEN.15.21
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 17.2-8
      metadata:
        usfm: GEN.17.2+GEN.17.3+GEN.17.4+GEN.17.5+GEN.17.6+GEN.17.7+GEN.17.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' avec eux: j''ai promis de leur donner le pays de Canaan, le pays où ils ont séjourné en étrangers. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'J''ai entendu les gémissements des Israélites, que les Egyptiens tiennent dans l''esclavage, et je me suis souvenu de mon alliance. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'C''est pourquoi dis aux Israélites: ‘Je suis l''Eternel, je vous libérerai des travaux dont vous chargent les Egyptiens, je vous délivrerai de leur esclavage et je vous rachèterai avec puissance et par de grands actes de jugement. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Je vous prendrai pour que vous soyez mon peuple, je serai votre Dieu et vous saurez que c''est moi, l''Eternel, votre Dieu, qui vous libère des travaux dont vous chargent les Egyptiens. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Je vous ferai entrer dans le pays que j'ai juré de donner à Abraham, à Isaac et à Jacob; je vous le donnerai en possession, moi l'Eternel.’»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: C'est ainsi que Moïse s'adressa aux Israélites, mais leur impatience et la dureté de l'esclavage les empêchèrent de l'écouter.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '«Va parler au pharaon, au roi d''Egypte, pour qu''il laisse les Israélites partir de son pays.» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Moïse répondit en présence de l''Eternel: «Les Israélites ne m''ont pas écouté. Comment le pharaon m''écouterait-il, moi qui n''ai pas la parole facile?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Cependant l'Eternel parla à Moïse et à Aaron, et il leur donna des ordres au sujet des Israélites et au sujet du pharaon, du roi d'Egypte, pour faire sortir les Israélites d'Egypte.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Généalogie de Moïse et d'Aaron
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Voici leurs chefs de famille. Fils de Ruben, le fils aîné d''Israël: Hénoc, Pallu, Hetsron et Carmi. Tels sont les clans de Ruben.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Fils de Siméon: Jemuel, Jamin, Ohad, Jakin et Tsochar, ainsi que Saül, le fils de la Cananéenne. Tels sont les clans de Siméon.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Voici les noms des fils de Lévi en fonction de leur lignée: Guershon, Kehath et Merari. Lévi vécut 137 ans. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fils de Guershon: Libni et Shimeï et leurs clans. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fils de Kehath: Amram, Jitsehar, Hébron et Uziel. Kehath vécut 133 ans. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fils de Merari: Machli et Mushi. Tels sont les clans de Lévi en fonction de leur lignée.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Amram prit pour femme sa tante Jokébed, et elle lui donna pour fils Aaron et Moïse. Amram vécut 137 ans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Fils de Jitsehar: Koré, Népheg et Zicri.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Fils d''Uziel: Mishaël, Eltsaphan et Sithri.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Aaron prit pour femme Elishéba, fille d'Amminadab et sœur de Nachshon, et elle lui donna pour fils Nadab, Abihu, Eléazar et Ithamar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fils de Koré: Assir, Elkana et Abiasaph. Tels sont les clans des Koréites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Eléazar, fils d'Aaron, prit pour femme une des filles de Puthiel, et elle lui donna pour fils Phinées. Tels sont les chefs de famille des Lévites avec leurs clans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'C''est à cet Aaron et ce Moïse que l''Eternel dit: «Faites sortir les Israélites d''Egypte en corps d''armée.» '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ce sont eux qui parlèrent au pharaon, au roi d'Egypte, pour faire sortir les Israélites d'Egypte. Il s'agit de ce Moïse-là et de cet Aaron-là.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Lorsque l''Eternel parla à Moïse en Egypte, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'il lui dit: «Je suis l''Eternel. Répète au pharaon, au roi d''Egypte, tout ce que je te dis.» '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Moïse répondit en présence de l''Eternel: «Je n''ai pas la parole facile. Comment le pharaon m''écouterait-il?»'
