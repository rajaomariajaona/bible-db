document_id: DEU.9,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Souvenir des rébellions d'Israël
  - type: text
    content: '»Ecoute, Israël! Tu vas aujourd''hui passer le Jourdain pour te rendre maître de nations plus grandes et plus puissantes que toi, de villes grandes et fortifiées jusqu''au ciel, '
  '10':
  - type: text
    content: 'L''Eternel m''a donné les deux tables de pierre écrites du doigt de Dieu et contenant toutes les paroles que l''Eternel vous avait dites sur la montagne du milieu du feu, le jour de l''assemblée. '
  '11':
  - type: text
    content: 'C''est au bout des 40 jours et des 40 nuits que l''Eternel m''a donné les deux tables de pierre, les tables de l''alliance. '
  '12':
  - type: text
    content: 'L''Eternel m''a dit alors: ‘Lève-toi, dépêche-toi de descendre d''ici. En effet, ton peuple, celui que tu as fait sortir d''Egypte, s''est corrompu. Ils se sont bien vite écartés de la voie que je leur avais prescrite: ils se sont fait une idole en métal fondu.’ '
  '13':
  - type: text
    content: 'L''Eternel m''a dit: ‘Je vois que ce peuple est un peuple réfractaire. '
  '14':
  - type: text
    content: 'Laisse-moi les détruire et effacer leur nom de dessous le ciel, tandis que je ferai de toi une nation plus puissante et plus nombreuse que ce peuple.’ '
  '15':
  - type: text
    content: 'Je suis reparti et je suis descendu de la montagne tout en feu, les deux tables de l''alliance dans les deux mains. '
  '16':
  - type: text
    content: 'J''ai regardé et j''ai vu que vous aviez péché contre l''Eternel, votre Dieu. Vous vous étiez fait un veau en métal fondu, vous vous étiez bien vite écartés de la voie que l''Eternel vous avait prescrite. '
  '17':
  - type: text
    content: 'Je tenais les deux tables; je les ai jetées et brisées sous vos yeux. '
  '18':
  - type: text
    content: 'Je me suis prosterné devant l''Eternel, comme précédemment, 40 jours et 40 nuits, sans manger de pain et sans boire d''eau, à cause de tous les péchés que vous aviez commis en faisant ce qui est mal aux yeux de l''Eternel pour l''irriter. '
  '19':
  - type: text
    content: En effet, *j'étais tremblant de peur
  - type: note
    content: 'J''étais… peur: évoqué en Hébreux 12.21.'
  - type: text
    content: ' en voyant la colère et la fureur dont l''Eternel était animé contre vous au point de vouloir vous détruire. Mais l''Eternel m''a écouté cette fois encore. '
  '2':
  - type: text
    content: 'd''un peuple grand et de haute taille, les descendants d''Anak, que tu connais et à propos desquels tu as entendu dire: ‘Qui pourrait résister aux descendants d''Anak?’ '
  '20':
  - type: text
    content: 'L''Eternel était aussi très irrité contre Aaron, qu''il voulait faire mourir, et j''ai encore intercédé pour lui à cette époque-là. '
  '21':
  - type: text
    content: J'ai pris le veau que vous aviez fait, ce produit de votre péché, je l'ai brûlé au feu, je l'ai broyé jusqu'à ce qu'il soit réduit en poudre et j'ai jeté cette poudre dans le torrent qui descend de la montagne.
  '22':
  - type: text
    content: »A Tabeéra, à Massa et à Kibroth-Hattaava, vous avez excité la colère de l'Eternel.
  '23':
  - type: text
    content: '»Lorsque l''Eternel vous a envoyés à Kadès-Barnéa en disant: ‘Montez, prenez possession du pays que je vous donne!’ vous vous êtes révoltés contre l''ordre de l''Eternel, votre Dieu, vous n''avez pas eu foi en lui et vous n''avez pas obéi à sa voix.'
  '24':
  - type: text
    content: »Vous avez été rebelles contre l'Eternel depuis que je vous connais.
  '25':
  - type: text
    content: '»Je me suis prosterné 40 jours et 40 nuits, parce que l''Eternel avait dit qu''il voulait vous détruire. '
  '26':
  - type: text
    content: 'J''ai prié l''Eternel, j''ai dit: ‘Seigneur Eternel, ne détruis pas ton peuple, ton héritage, que tu as racheté dans ta grandeur, que tu as fait sortir d''Egypte par ta main puissante. '
  '27':
  - type: text
    content: 'Souviens-toi de tes serviteurs Abraham, Isaac et Jacob. Ne regarde pas à la dureté de ce peuple, à sa méchanceté et à son péché. '
  '28':
  - type: text
    content: 'Sinon, les habitants du pays d''où tu nous as fait sortir diront: C''est parce que l''Eternel n''avait pas le pouvoir de les conduire dans le pays qu''il leur avait promis et parce qu''il les détestait qu''il les a fait sortir pour les faire mourir dans le désert. '
  '29':
  - type: text
    content: Ils sont pourtant ton peuple et ton héritage, que tu as fait sortir d'Egypte avec puissance et force.’
  '3':
  - type: text
    content: 'Sache aujourd''hui que l''Eternel, ton Dieu, marchera lui-même devant toi comme un feu dévorant. C''est lui qui les détruira, qui les humiliera devant toi, et tu les chasseras, tu les feras disparaître rapidement, comme l''Eternel te l''a dit. '
  '4':
  - type: text
    content: 'Lorsque l''Eternel, ton Dieu, les aura chassés devant toi, ne dis pas dans ton cœur: ‘C''est à cause de ma justice que l''Eternel me fait entrer en possession de ce pays.’ En effet, c''est à cause de la méchanceté de ces nations que l''Eternel les chasse devant toi. '
  '5':
  - type: text
    content: 'Non, ce n''est pas à cause de ta justice et de la droiture de ton cœur que tu entres en possession de leur pays, c''est à cause de la méchanceté de ces nations que l''Eternel, ton Dieu, les chasse devant toi, et c''est pour confirmer la promesse que l''Eternel a faite avec serment à tes ancêtres, à Abraham, à Isaac et à Jacob. '
  '6':
  - type: text
    content: Sache donc que ce n'est pas à cause de ta justice que l'Eternel, ton Dieu, te donne ce bon pays à posséder, car tu es un peuple réfractaire.
  '7':
  - type: text
    content: »Souviens-toi, n'oublie pas de quelle manière tu as excité la colère de l'Eternel, ton Dieu, dans le désert. Depuis le jour où tu es sorti d'Egypte jusqu'à votre arrivée ici, vous vous êtes révoltés contre l'Eternel.
  '8':
  - type: text
    content: '»A Horeb, vous avez excité la colère de l''Eternel et l''Eternel s''est irrité contre vous au point de vouloir vous détruire. '
  '9':
  - type: text
    content: 'Lorsque je suis monté sur la montagne pour prendre les tables de pierre, les tables de l''alliance que l''Eternel a conclue avec vous, je suis resté là 40 jours et 40 nuits, sans manger de pain et sans boire d''eau. '
