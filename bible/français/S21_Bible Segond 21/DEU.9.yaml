document_id: DEU.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Souvenir des rébellions d'Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Ecoute, Israël! Tu vas aujourd''hui passer le Jourdain pour te rendre maître de nations plus grandes et plus puissantes que toi, de villes grandes et fortifiées jusqu''au ciel, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'd''un peuple grand et de haute taille, les descendants d''Anak, que tu connais et à propos desquels tu as entendu dire: ‘Qui pourrait résister aux descendants d''Anak?’ '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Sache aujourd''hui que l''Eternel, ton Dieu, marchera lui-même devant toi comme un feu dévorant. C''est lui qui les détruira, qui les humiliera devant toi, et tu les chasseras, tu les feras disparaître rapidement, comme l''Eternel te l''a dit. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Lorsque l''Eternel, ton Dieu, les aura chassés devant toi, ne dis pas dans ton cœur: ‘C''est à cause de ma justice que l''Eternel me fait entrer en possession de ce pays.’ En effet, c''est à cause de la méchanceté de ces nations que l''Eternel les chasse devant toi. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Non, ce n''est pas à cause de ta justice et de la droiture de ton cœur que tu entres en possession de leur pays, c''est à cause de la méchanceté de ces nations que l''Eternel, ton Dieu, les chasse devant toi, et c''est pour confirmer la promesse que l''Eternel a faite avec serment à tes ancêtres, à Abraham, à Isaac et à Jacob. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Sache donc que ce n'est pas à cause de ta justice que l'Eternel, ton Dieu, te donne ce bon pays à posséder, car tu es un peuple réfractaire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: »Souviens-toi, n'oublie pas de quelle manière tu as excité la colère de l'Eternel, ton Dieu, dans le désert. Depuis le jour où tu es sorti d'Egypte jusqu'à votre arrivée ici, vous vous êtes révoltés contre l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '»A Horeb, vous avez excité la colère de l''Eternel et l''Eternel s''est irrité contre vous au point de vouloir vous détruire. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Lorsque je suis monté sur la montagne pour prendre les tables de pierre, les tables de l''alliance que l''Eternel a conclue avec vous, je suis resté là 40 jours et 40 nuits, sans manger de pain et sans boire d''eau. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L''Eternel m''a donné les deux tables de pierre écrites du doigt de Dieu et contenant toutes les paroles que l''Eternel vous avait dites sur la montagne du milieu du feu, le jour de l''assemblée. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'C''est au bout des 40 jours et des 40 nuits que l''Eternel m''a donné les deux tables de pierre, les tables de l''alliance. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L''Eternel m''a dit alors: ‘Lève-toi, dépêche-toi de descendre d''ici. En effet, ton peuple, celui que tu as fait sortir d''Egypte, s''est corrompu. Ils se sont bien vite écartés de la voie que je leur avais prescrite: ils se sont fait une idole en métal fondu.’ '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'L''Eternel m''a dit: ‘Je vois que ce peuple est un peuple réfractaire. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Laisse-moi les détruire et effacer leur nom de dessous le ciel, tandis que je ferai de toi une nation plus puissante et plus nombreuse que ce peuple.’ '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Je suis reparti et je suis descendu de la montagne tout en feu, les deux tables de l''alliance dans les deux mains. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'J''ai regardé et j''ai vu que vous aviez péché contre l''Eternel, votre Dieu. Vous vous étiez fait un veau en métal fondu, vous vous étiez bien vite écartés de la voie que l''Eternel vous avait prescrite. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Je tenais les deux tables; je les ai jetées et brisées sous vos yeux. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Je me suis prosterné devant l''Eternel, comme précédemment, 40 jours et 40 nuits, sans manger de pain et sans boire d''eau, à cause de tous les péchés que vous aviez commis en faisant ce qui est mal aux yeux de l''Eternel pour l''irriter. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: En effet, *j'étais tremblant de peur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'J''étais… peur: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'évoqué en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hébreux 12.21
      metadata:
        usfm: HEB.12.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' en voyant la colère et la fureur dont l''Eternel était animé contre vous au point de vouloir vous détruire. Mais l''Eternel m''a écouté cette fois encore. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'L''Eternel était aussi très irrité contre Aaron, qu''il voulait faire mourir, et j''ai encore intercédé pour lui à cette époque-là. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: J'ai pris le veau que vous aviez fait, ce produit de votre péché, je l'ai brûlé au feu, je l'ai broyé jusqu'à ce qu'il soit réduit en poudre et j'ai jeté cette poudre dans le torrent qui descend de la montagne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: »A Tabeéra, à Massa et à Kibroth-Hattaava, vous avez excité la colère de l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '»Lorsque l''Eternel vous a envoyés à Kadès-Barnéa en disant: ‘Montez, prenez possession du pays que je vous donne!’ vous vous êtes révoltés contre l''ordre de l''Eternel, votre Dieu, vous n''avez pas eu foi en lui et vous n''avez pas obéi à sa voix.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: »Vous avez été rebelles contre l'Eternel depuis que je vous connais.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '»Je me suis prosterné 40 jours et 40 nuits, parce que l''Eternel avait dit qu''il voulait vous détruire. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'J''ai prié l''Eternel, j''ai dit: ‘Seigneur Eternel, ne détruis pas ton peuple, ton héritage, que tu as racheté dans ta grandeur, que tu as fait sortir d''Egypte par ta main puissante. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Souviens-toi de tes serviteurs Abraham, Isaac et Jacob. Ne regarde pas à la dureté de ce peuple, à sa méchanceté et à son péché. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Sinon, les habitants du pays d''où tu nous as fait sortir diront: C''est parce que l''Eternel n''avait pas le pouvoir de les conduire dans le pays qu''il leur avait promis et parce qu''il les détestait qu''il les a fait sortir pour les faire mourir dans le désert. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ils sont pourtant ton peuple et ton héritage, que tu as fait sortir d'Egypte avec puissance et force.’
