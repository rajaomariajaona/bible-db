document_id: 2CH.9,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Visite de la reine de Séba
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La reine de Séba apprit quelle était la réputation de Salomon et elle vint à Jérusalem pour le mettre à l''épreuve par des énigmes. Elle avait une suite très nombreuse, avec des chameaux chargés d''aromates, d''or en grande quantité et de pierres précieuses. Elle se rendit auprès de Salomon et lui exposa toutes ses réflexions. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les serviteurs de Hiram et ceux de Salomon qui rapportèrent de l''or d''Ophir ramenèrent aussi du bois de santal et des pierres précieuses. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Avec ce bois de santal, le roi fit des escaliers pour la maison de l'Eternel et pour le palais royal, ainsi que des harpes et des luths pour les musiciens. On n'en avait pas vu de pareils auparavant dans le pays de Juda.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le roi Salomon donna à la reine de Séba tout ce qu'elle désira, ce qu'elle demanda, plus qu'elle ne lui avait apporté. Puis elle repartit et rentra dans son pays avec ses serviteurs.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Richesses de Salomon
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le poids de l''or qui arrivait chez Salomon chaque année était de près de 20 tonnes, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: en plus de ce qu'il retirait des négociants et des marchands qui en apportaient, ainsi que de tous les rois d'Arabie et des gouverneurs du pays qui lui apportaient de l'or et de l'argent.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi Salomon fit 200 grands boucliers en or battu, pour chacun desquels il employa 7 kilos d''or battu, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et 300 autres boucliers en or battu, pour chacun desquels il employa près de 2 kilos d''or. Il les plaça dans la maison de la forêt du Liban. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi fit aussi un grand trône en ivoire et il le couvrit d''or pur. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce trône avait 6 marches et un marchepied en or qui lui était fixé. Il y avait des bras de chaque côté du siège; deux lions se trouvaient près des bras, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et 12 lions sur les 6 marches, de chaque côté. On n''a rien fait de pareil pour aucun royaume. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salomon répondit à toutes ses questions; il n''y eut aucun mystère pour Salomon: il lui expliqua tout.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toutes les coupes du roi Salomon étaient en or et toute la vaisselle de la maison de la forêt du Liban était en or pur. Rien n''était en argent: on n''en faisait aucun cas à l''époque de Salomon. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, le roi avait des bateaux long-courriers qui naviguaient avec les serviteurs de Hiram. Tous les 3 ans, les bateaux long-courriers arrivaient, chargés d''or, d''argent, d''ivoire, de singes et de paons. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi Salomon dépassa tous les rois de la terre par ses richesses et sa sagesse. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les rois de la terre cherchaient à le voir pour bénéficier de la sagesse que Dieu lui avait donnée, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et chacun d''eux apportait son cadeau: des objets en argent et en or, des habits, des armes, des aromates, des chevaux et des mulets. Cela se passait de cette manière chaque année. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salomon avait 4000 stalles pour les chevaux destinés à ses chars et 12''000 cavaliers qu''il plaça dans les villes où il gardait ses chars et à Jérusalem, près de lui. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dominait sur tous les rois établis entre l''Euphrate et le pays des Philistins, et jusqu''à la frontière de l''Egypte. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi rendit l''argent aussi commun à Jérusalem que les pierres, et les cèdres aussi nombreux que les sycomores qui poussent dans la plaine. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C'était en Egypte et dans tous les pays que l'on achetait des chevaux pour Salomon.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mort de Salomon
    marker-yv: yv-h
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le reste des actes de Salomon, des premiers aux derniers, est décrit dans les annales du prophète Nathan, dans la prophétie d'Achija de Silo et dans les révélations du voyant Jéedo sur Jéroboam, fils de Nebath.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La reine de Séba vit la sagesse de Salomon, le palais qu''il avait construit, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salomon régna 40 ans à Jérusalem sur l''ensemble d''Israël. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis il se coucha avec ses ancêtres et on l'enterra dans la ville de son père David. Son fils Roboam devint roi à sa place.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les plats servis à sa table, le lieu d''habitation de ses serviteurs, les fonctions et les tenues de ceux qui le servaient, ses responsables des boissons et leurs tenues ainsi que les holocaustes qu''il offrait pour monter à la maison de l''Eternel. Elle en eut le souffle coupé '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et dit au roi: «C''était donc vrai ce que j''ai appris dans mon pays au sujet de ta situation et de ta sagesse! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ne le croyais pas avant de venir et de le voir de mes yeux. Et l''on ne m''avait même pas raconté la moitié de la grandeur de ta sagesse! Tu surpasses ce que j''avais appris par la rumeur. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Heureux tes hommes, heureux tes serviteurs, puisqu''ils sont constamment devant toi et peuvent bénéficier de ta sagesse! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Béni soit l'Eternel, ton Dieu, qui t'a choisi pour te placer sur son trône comme roi pour l'Eternel, ton Dieu! C'est parce que ton Dieu aime Israël et veut le faire subsister éternellement qu'il t'a établi roi sur lui pour que tu exerces le droit et la justice.»
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elle donna au roi plus de 3 tonnes et demie d'or, une très grande quantité d'aromates et des pierres précieuses. Il n'y eut plus d'aromates pareils à ceux que la reine de Séba donna au roi Salomon.
