document_id: JHN.19
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors Pilate ordonna de prendre Jésus et de le fouetter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les soldats tressèrent une couronne d''épines qu''ils posèrent sur sa tête et lui mirent un manteau de couleur pourpre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Puis, [s''approchant de lui] ils disaient: «Salut, roi des Juifs!» et ils lui donnaient des gifles.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pilate sortit de nouveau et dit aux Juifs: «Voilà, je vous l''amène dehors afin que vous sachiez que je ne trouve en lui aucun motif de le condamner.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jésus sortit donc, portant la couronne d''épines et le manteau de couleur pourpre. Pilate leur dit: «Voici l''homme.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Lorsque les chefs des prêtres et les gardes le virent, ils s''écrièrent: «Crucifie-le! Crucifie-le!» Pilate leur dit: «Prenez-le vous-mêmes et crucifiez-le, car pour ma part, je ne trouve en lui aucun motif de le condamner.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les Juifs lui répondirent: «Nous avons une loi et, d''après notre loi, il doit mourir parce qu''il s''est fait Fils de Dieu.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Quand il entendit cette parole, Pilate eut très peur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il rentra dans le prétoire et dit à Jésus: «D''où es-tu?» mais Jésus ne lui donna aucune réponse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Pilate lui dit: «C''est à moi que tu refuses de parler? Ne sais-tu pas que j''ai le pouvoir de te relâcher et que j''ai le pouvoir de te crucifier?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jésus répondit: «Tu n''aurais aucun pouvoir sur moi s''il ne t''avait pas été donné d''en haut. C''est pourquoi celui qui me livre à toi est coupable d''un plus grand péché.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dès ce moment-là, Pilate chercha à le relâcher, mais les Juifs criaient: «Si tu le relâches, tu n''es pas l''ami de l''empereur. Tout homme qui se fait roi se déclare contre l''empereur.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Après avoir entendu ces paroles, Pilate amena Jésus dehors et siégea au tribunal à l''endroit appelé «le Pavé», en hébreu Gabbatha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'C''était le jour de la préparation de la Pâque, il était environ midi. Pilate dit aux Juifs: «Voici votre roi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils s''écrièrent alors: «A mort! A mort! Crucifie-le!» Pilate leur dit: «Dois-je crucifier votre roi?» Les chefs des prêtres répondirent: «Nous n''avons pas d''autre roi que l''empereur.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Alors il le leur livra pour qu'il soit crucifié. Ils prirent donc Jésus et l'emmenèrent.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Crucifixion et mort de Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jésus, portant sa croix, sortit de la ville pour aller vers l''endroit appelé «le Crâne», qui se dit en hébreu Golgotha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: C'est là qu'ils le crucifièrent, et avec lui deux autres, un de chaque côté et Jésus au milieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Pilate rédigea aussi un écriteau qu''il plaça sur la croix; il y était écrit: «Jésus de Nazareth, le roi des Juifs.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Beaucoup de Juifs lurent cette inscription parce que l''endroit où Jésus fut crucifié était près de la ville. Elle était écrite en hébreu, en grec et en latin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les chefs des prêtres des Juifs dirent à Pilate: «N''écris pas: ‘Le roi des Juifs’, mais plutôt: ‘Cet homme a dit: Je suis le roi des Juifs.’» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Pilate répondit: «Ce que j''ai écrit, je l''ai écrit.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Après avoir crucifié Jésus, les soldats prirent ses vêtements et en firent quatre parts, une pour chaque soldat. Ils prirent aussi sa tunique, qui était sans couture, d''une seule pièce depuis le haut jusqu''en bas. Ils se dirent entre eux: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '«Ne la déchirons pas, mais tirons au sort pour savoir à qui elle sera.» C''est ainsi que s''accomplit cette parole de l''Ecriture: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Ils se sont partagé mes vêtements et ils ont tiré au sort mon habit.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ils se sont… habit: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 22.19
      metadata:
        usfm: PSA.22.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' Voilà ce que firent les soldats.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Près de la croix de Jésus se tenaient sa mère, la sœur de sa mère, Marie la femme de Clopas et Marie de Magdala. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jésus vit sa mère et, près d''elle, le disciple qu''il aimait. Il dit à sa mère: «Femme, voici ton fils.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Puis il dit au disciple: «Voici ta mère.» Dès ce moment-là, le disciple la prit chez lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Après cela, Jésus, qui savait que tout était déjà accompli, dit, afin que l'Ecriture
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''Ecriture: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'probable allusion au '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 69.22
      metadata:
        usfm: PSA.69.22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '; voir aussi '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 22.16
      metadata:
        usfm: PSA.22.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' se réalise pleinement: «J''ai soif.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Il y avait là un vase plein de vinaigre. Les soldats en remplirent une éponge, la fixèrent à une branche d''hysope et l''approchèrent de sa bouche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Quand Jésus eut pris le vinaigre, il dit: «Tout est accompli.» Puis il baissa la tête et rendit l''esprit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: C'était la préparation de la Pâque
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La préparation de la Pâque: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: le vendredi; le sabbat juif va du vendredi soir au samedi soir.
    marker-yv: yv-n
  - type: text
    text: ' et ce sabbat allait être un jour solennel. Craignant que les corps ne restent en croix pendant le sabbat, les Juifs demandèrent à Pilate qu''on brise les jambes aux crucifiés et qu''on enlève les corps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Les soldats vinrent donc briser les jambes du premier, puis du second des condamnés qui avaient été crucifiés avec Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Quand ils s''approchèrent de lui, ils virent qu''il était déjà mort. Ils ne lui brisèrent pas les jambes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'mais un des soldats lui transperça le côté avec une lance et aussitôt il en sortit du sang et de l''eau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Celui qui a vu ces choses en rend témoignage et son témoignage est vrai. Il sait qu''il dit la vérité afin que vous croyiez aussi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'En effet, cela est arrivé afin que ce passage de l''Ecriture soit accompli: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Aucun de ses os ne sera brisé
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.36 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Aucun… brisé: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: déclaration faite dans l'Ancien Testament à propos de l'agneau pascal (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 12.46
      metadata:
        usfm: EXO.12.46
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Nombres 9.12
      metadata:
        usfm: NUM.9.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) et du juste (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 34.21
      metadata:
        usfm: PSA.34.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ailleurs l''Ecriture dit encore: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Ils verront celui qu'ils ont transpercé
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.37 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ils verront… transpercé: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Zacharie 12.10
      metadata:
        usfm: ZEC.12.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mise au tombeau du corps de Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Après cela, Joseph d''Arimathée, qui était disciple de Jésus, mais en secret par crainte des chefs juifs, demanda à Pilate la permission d''enlever le corps de Jésus. Pilate le lui permit. Il vint donc et enleva le corps de Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Nicodème, l''homme qui auparavant était allé trouver Jésus de nuit, vint aussi. Il apportait un mélange d''environ 30 kilos de myrrhe et d''aloès. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ils prirent donc le corps de Jésus et l''enveloppèrent de bandelettes, avec les aromates, comme c''est la coutume d''ensevelir chez les Juifs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Or, il y avait un jardin à l''endroit où Jésus avait été crucifié, et dans le jardin un tombeau neuf où personne encore n''avait été mis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Ce fut là qu'ils déposèrent Jésus parce que c'était la préparation de la Pâque des Juifs et que le tombeau était proche.
