document_id: JHN.19,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Alors Pilate ordonna de prendre Jésus et de le fouetter. '
  '10':
  - type: text
    content: 'Pilate lui dit: «C''est à moi que tu refuses de parler? Ne sais-tu pas que j''ai le pouvoir de te relâcher et que j''ai le pouvoir de te crucifier?» '
  '11':
  - type: text
    content: 'Jésus répondit: «Tu n''aurais aucun pouvoir sur moi s''il ne t''avait pas été donné d''en haut. C''est pourquoi celui qui me livre à toi est coupable d''un plus grand péché.»'
  '12':
  - type: text
    content: 'Dès ce moment-là, Pilate chercha à le relâcher, mais les Juifs criaient: «Si tu le relâches, tu n''es pas l''ami de l''empereur. Tout homme qui se fait roi se déclare contre l''empereur.» '
  '13':
  - type: text
    content: 'Après avoir entendu ces paroles, Pilate amena Jésus dehors et siégea au tribunal à l''endroit appelé «le Pavé», en hébreu Gabbatha. '
  '14':
  - type: text
    content: 'C''était le jour de la préparation de la Pâque, il était environ midi. Pilate dit aux Juifs: «Voici votre roi.» '
  '15':
  - type: text
    content: 'Ils s''écrièrent alors: «A mort! A mort! Crucifie-le!» Pilate leur dit: «Dois-je crucifier votre roi?» Les chefs des prêtres répondirent: «Nous n''avons pas d''autre roi que l''empereur.» '
  '16':
  - type: text
    content: Alors il le leur livra pour qu'il soit crucifié. Ils prirent donc Jésus et l'emmenèrent.
  - type: heading
    content: Crucifixion et mort de Jésus
  '17':
  - type: text
    content: 'Jésus, portant sa croix, sortit de la ville pour aller vers l''endroit appelé «le Crâne», qui se dit en hébreu Golgotha. '
  '18':
  - type: text
    content: C'est là qu'ils le crucifièrent, et avec lui deux autres, un de chaque côté et Jésus au milieu.
  '19':
  - type: text
    content: 'Pilate rédigea aussi un écriteau qu''il plaça sur la croix; il y était écrit: «Jésus de Nazareth, le roi des Juifs.» '
  '2':
  - type: text
    content: 'Les soldats tressèrent une couronne d''épines qu''ils posèrent sur sa tête et lui mirent un manteau de couleur pourpre. '
  '20':
  - type: text
    content: 'Beaucoup de Juifs lurent cette inscription parce que l''endroit où Jésus fut crucifié était près de la ville. Elle était écrite en hébreu, en grec et en latin. '
  '21':
  - type: text
    content: 'Les chefs des prêtres des Juifs dirent à Pilate: «N''écris pas: ‘Le roi des Juifs’, mais plutôt: ‘Cet homme a dit: Je suis le roi des Juifs.’» '
  '22':
  - type: text
    content: 'Pilate répondit: «Ce que j''ai écrit, je l''ai écrit.»'
  '23':
  - type: text
    content: 'Après avoir crucifié Jésus, les soldats prirent ses vêtements et en firent quatre parts, une pour chaque soldat. Ils prirent aussi sa tunique, qui était sans couture, d''une seule pièce depuis le haut jusqu''en bas. Ils se dirent entre eux: '
  '24':
  - type: text
    content: '«Ne la déchirons pas, mais tirons au sort pour savoir à qui elle sera.» C''est ainsi que s''accomplit cette parole de l''Ecriture: '
  - type: text
    content: Ils se sont partagé mes vêtements et ils ont tiré au sort mon habit.
  - type: note
    content: 'Ils se sont… habit: citation du Psaume 22.19.'
  - type: text
    content: ' Voilà ce que firent les soldats.'
  '25':
  - type: text
    content: 'Près de la croix de Jésus se tenaient sa mère, la sœur de sa mère, Marie la femme de Clopas et Marie de Magdala. '
  '26':
  - type: text
    content: 'Jésus vit sa mère et, près d''elle, le disciple qu''il aimait. Il dit à sa mère: «Femme, voici ton fils.» '
  '27':
  - type: text
    content: 'Puis il dit au disciple: «Voici ta mère.» Dès ce moment-là, le disciple la prit chez lui.'
  '28':
  - type: text
    content: Après cela, Jésus, qui savait que tout était déjà accompli, dit, afin que l'Ecriture
  - type: note
    content: 'L''Ecriture: probable allusion au Psaume 69.22; voir aussi Psaume 22.16.'
  - type: text
    content: ' se réalise pleinement: «J''ai soif.» '
  '29':
  - type: text
    content: 'Il y avait là un vase plein de vinaigre. Les soldats en remplirent une éponge, la fixèrent à une branche d''hysope et l''approchèrent de sa bouche. '
  '3':
  - type: text
    content: 'Puis, [s''approchant de lui] ils disaient: «Salut, roi des Juifs!» et ils lui donnaient des gifles.'
  '30':
  - type: text
    content: 'Quand Jésus eut pris le vinaigre, il dit: «Tout est accompli.» Puis il baissa la tête et rendit l''esprit.'
  '31':
  - type: text
    content: C'était la préparation de la Pâque
  - type: note
    content: 'La préparation de la Pâque: le vendredi; le sabbat juif va du vendredi soir au samedi soir.'
  - type: text
    content: ' et ce sabbat allait être un jour solennel. Craignant que les corps ne restent en croix pendant le sabbat, les Juifs demandèrent à Pilate qu''on brise les jambes aux crucifiés et qu''on enlève les corps. '
  '32':
  - type: text
    content: 'Les soldats vinrent donc briser les jambes du premier, puis du second des condamnés qui avaient été crucifiés avec Jésus. '
  '33':
  - type: text
    content: 'Quand ils s''approchèrent de lui, ils virent qu''il était déjà mort. Ils ne lui brisèrent pas les jambes, '
  '34':
  - type: text
    content: 'mais un des soldats lui transperça le côté avec une lance et aussitôt il en sortit du sang et de l''eau. '
  '35':
  - type: text
    content: 'Celui qui a vu ces choses en rend témoignage et son témoignage est vrai. Il sait qu''il dit la vérité afin que vous croyiez aussi. '
  '36':
  - type: text
    content: 'En effet, cela est arrivé afin que ce passage de l''Ecriture soit accompli: '
  - type: text
    content: Aucun de ses os ne sera brisé
  - type: text
    content: .
  - type: note
    content: 'Aucun… brisé: déclaration faite dans l''Ancien Testament à propos de l''agneau pascal (Exode 12.46; Nombres 9.12) et du juste (Psaume 34.21).'
  - type: text
    content: ' '
  '37':
  - type: text
    content: 'Ailleurs l''Ecriture dit encore: '
  - type: text
    content: Ils verront celui qu'ils ont transpercé
  - type: text
    content: .
  - type: note
    content: 'Ils verront… transpercé: citation de Zacharie 12.10.'
  - type: heading
    content: Mise au tombeau du corps de Jésus
  '38':
  - type: text
    content: 'Après cela, Joseph d''Arimathée, qui était disciple de Jésus, mais en secret par crainte des chefs juifs, demanda à Pilate la permission d''enlever le corps de Jésus. Pilate le lui permit. Il vint donc et enleva le corps de Jésus. '
  '39':
  - type: text
    content: 'Nicodème, l''homme qui auparavant était allé trouver Jésus de nuit, vint aussi. Il apportait un mélange d''environ 30 kilos de myrrhe et d''aloès. '
  '4':
  - type: text
    content: 'Pilate sortit de nouveau et dit aux Juifs: «Voilà, je vous l''amène dehors afin que vous sachiez que je ne trouve en lui aucun motif de le condamner.» '
  '40':
  - type: text
    content: 'Ils prirent donc le corps de Jésus et l''enveloppèrent de bandelettes, avec les aromates, comme c''est la coutume d''ensevelir chez les Juifs. '
  '41':
  - type: text
    content: 'Or, il y avait un jardin à l''endroit où Jésus avait été crucifié, et dans le jardin un tombeau neuf où personne encore n''avait été mis. '
  '42':
  - type: text
    content: Ce fut là qu'ils déposèrent Jésus parce que c'était la préparation de la Pâque des Juifs et que le tombeau était proche.
  '5':
  - type: text
    content: 'Jésus sortit donc, portant la couronne d''épines et le manteau de couleur pourpre. Pilate leur dit: «Voici l''homme.» '
  '6':
  - type: text
    content: 'Lorsque les chefs des prêtres et les gardes le virent, ils s''écrièrent: «Crucifie-le! Crucifie-le!» Pilate leur dit: «Prenez-le vous-mêmes et crucifiez-le, car pour ma part, je ne trouve en lui aucun motif de le condamner.» '
  '7':
  - type: text
    content: 'Les Juifs lui répondirent: «Nous avons une loi et, d''après notre loi, il doit mourir parce qu''il s''est fait Fils de Dieu.»'
  '8':
  - type: text
    content: 'Quand il entendit cette parole, Pilate eut très peur. '
  '9':
  - type: text
    content: 'Il rentra dans le prétoire et dit à Jésus: «D''où es-tu?» mais Jésus ne lui donna aucune réponse. '
