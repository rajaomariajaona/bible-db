document_id: NUM.32,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Installation de Ruben et Gad en Galaad
  - type: text
    content: 'Les Rubénites et les Gadites avaient une quantité considérable de troupeaux, et ils virent que le pays de Jaezer et le pays de Galaad étaient un endroit approprié pour des troupeaux. '
  '10':
  - type: text
    content: 'La colère de l''Eternel s''est enflammée ce jour-là et il a juré: '
  '11':
  - type: text
    content: '‘Ces hommes âgés de 20 ans et plus qui sont montés d''Egypte ne verront pas le pays que j''ai juré de donner à Abraham, à Isaac et à Jacob, car ils n''ont pas suivi pleinement ma voie, '
  '12':
  - type: text
    content: 'excepté Caleb, fils de Jephunné, le Kénizien, et Josué, fils de Nun, qui ont pleinement suivi la voie de l''Eternel.’ '
  '13':
  - type: text
    content: 'La colère de l''Eternel s''est enflammée contre Israël et il les a fait errer dans le désert pendant 40 ans, jusqu''à la disparition de toute la génération qui avait fait le mal à ses yeux. '
  '14':
  - type: text
    content: 'Et voici que vous prenez la place de vos pères, en dignes rejetons d''hommes pécheurs, pour augmenter encore la colère de l''Eternel contre Israël. '
  '15':
  - type: text
    content: En effet, si vous vous détournez de lui, il continuera de laisser Israël dans le désert et vous provoquerez ainsi la perte de tout ce peuple.»
  '16':
  - type: text
    content: 'Ils s''approchèrent de Moïse et dirent: «Nous construirons ici des enclos pour nos troupeaux et des villes pour nos petits enfants. '
  '17':
  - type: text
    content: 'Puis nous-mêmes, nous nous empresserons de prendre les armes pour marcher en tête des Israélites jusqu''à ce que nous les ayons fait entrer chez eux. Quant à nos petits enfants, ils resteront dans les villes fortifiées à cause des habitants du pays. '
  '18':
  - type: text
    content: 'Nous ne retournerons pas chez nous avant que chacun des Israélites ait pris possession de son héritage, '
  '19':
  - type: text
    content: et nous ne posséderons rien avec eux de l'autre côté du Jourdain ni plus loin, puisque nous aurons notre héritage de ce côté-ci du Jourdain, à l'est.»
  '2':
  - type: text
    content: 'Alors les Gadites et les Rubénites vinrent trouver Moïse, le prêtre Eléazar et les princes de l''assemblée, et ils leur dirent: '
  '20':
  - type: text
    content: 'Moïse leur dit: «Si vous faites ce que vous avez dit, si vous prenez les armes pour combattre devant l''Eternel, '
  '21':
  - type: text
    content: 'si tous vos hommes équipés passent le Jourdain devant l''Eternel jusqu''à ce qu''il ait chassé ses ennemis loin de lui '
  '22':
  - type: text
    content: 'et si vous ne revenez qu''une fois le pays soumis à l''Eternel, vous serez alors sans reproche vis-à-vis de l''Eternel et vis-à-vis d''Israël, et cette région-ci sera votre propriété devant l''Eternel. '
  '23':
  - type: text
    content: 'Mais si vous n''agissez pas ainsi, vous péchez contre l''Eternel et, sachez-le, votre péché vous atteindra. '
  '24':
  - type: text
    content: Construisez des villes pour vos petits enfants et des enclos pour vos troupeaux, et faites ce que vous avez déclaré.»
  '25':
  - type: text
    content: 'Les Gadites et les Rubénites répondirent à Moïse: «Tes serviteurs feront ce que mon seigneur ordonne. '
  '26':
  - type: text
    content: 'Nos petits enfants, nos femmes, nos troupeaux et tout notre bétail resteront dans les villes de Galaad, '
  '27':
  - type: text
    content: tandis que tes serviteurs, tous équipés pour la guerre, iront combattre devant l'Eternel conformément à la parole de mon seigneur.»
  '28':
  - type: text
    content: 'Moïse donna des ordres à leur sujet au prêtre Eléazar, à Josué, fils de Nun, et aux chefs de famille dans les tribus des Israélites. '
  '29':
  - type: text
    content: 'Il leur dit: «Si les Gadites et les Rubénites passent le Jourdain avec vous, tous équipés pour combattre devant l''Eternel, et que le pays vous soit soumis, vous leur donnerez en propriété la région de Galaad. '
  '3':
  - type: text
    content: '«Atharoth, Dibon, Jaezer, Nimra, Hesbon, Elealé, Sebam, Nebo et Beon, '
  '30':
  - type: text
    content: Mais s'ils ne marchent pas tout équipés avec vous, ils s'établiront parmi vous dans le pays de Canaan.»
  '31':
  - type: text
    content: 'Les Gadites et les Rubénites répondirent: «Nous ferons ce que l''Eternel a dit à tes serviteurs. '
  '32':
  - type: text
    content: Nous passerons tout équipés devant l'Eternel au pays de Canaan, mais nous posséderons notre héritage de ce côté-ci du Jourdain.»
  '33':
  - type: text
    content: Moïse donna aux Gadites et aux Rubénites, ainsi qu'à la moitié de la tribu de Manassé, fils de Joseph, le royaume de Sihon, le roi des Amoréens, et le royaume d'Og, le roi du Basan. Il leur donna ce pays avec ses villes et les territoires environnants.
  '34':
  - type: text
    content: 'Les Gadites reconstruisirent Dibon, Atharoth, Aroër, '
  '35':
  - type: text
    content: 'Athroth-Shophan, Jaezer, Jogbeha, '
  '36':
  - type: text
    content: Beth-Nimra et Beth-Haran, des villes fortifiées, et ils firent des enclos pour les troupeaux.
  '37':
  - type: text
    content: 'Les Rubénites reconstruisirent Hesbon, Elealé et Kirjathaïm, '
  '38':
  - type: text
    content: Nebo et Baal-Meon, dont les noms furent changés, ainsi que Sibma, et ils donnèrent des noms aux villes qu'ils construisirent.
  '39':
  - type: text
    content: 'Les descendants de Makir, fils de Manassé, attaquèrent Galaad et s''en emparèrent. Ils chassèrent les Amoréens qui s''y trouvaient. '
  '4':
  - type: text
    content: 'ce pays que l''Eternel a frappé devant l''assemblée d''Israël, est un endroit approprié pour des troupeaux. Or, tes serviteurs ont des troupeaux.» '
  '40':
  - type: text
    content: 'Moïse donna Galaad à Makir, fils de Manassé, qui s''y établit. '
  '41':
  - type: text
    content: 'Jaïr, fils de Manassé, se mit en marche, prit les villages et les appela «bourgs de Jaïr». '
  '42':
  - type: text
    content: Nobach se mit en marche, prit Kenath avec les villes qui en dépendaient et l'appela Nobach, d'après son nom.
  '5':
  - type: text
    content: 'Ils ajoutèrent: «Si nous avons trouvé grâce à tes yeux, que la possession de ce pays soit accordée à tes serviteurs. Ne nous fais pas passer le Jourdain.»'
  '6':
  - type: text
    content: 'Moïse répondit aux Gadites et aux Rubénites: «Vos frères iraient à la guerre pendant que vous, vous resteriez ici? '
  '7':
  - type: text
    content: 'Pourquoi voulez-vous décourager les Israélites de passer dans le pays que l''Eternel leur donne? '
  '8':
  - type: text
    content: 'C''est ce que vos pères ont fait quand je les ai envoyés de Kadès-Barnéa examiner le pays. '
  '9':
  - type: text
    content: 'Ils sont montés jusqu''à la vallée d''Eshcol et, après avoir examiné le pays, ils ont découragé les Israélites d''aller dans le pays que l''Eternel leur donnait. '
