document_id: MRK.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus rejeté à Nazareth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus partit de là et se rendit dans sa patrie. Ses disciples le suivirent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le jour du sabbat, il se mit à enseigner dans la synagogue. Beaucoup de gens l''entendirent; ils étaient étonnés et disaient: «D''où cela lui vient-il? Quelle est cette sagesse qui lui a été donnée? Et comment de tels miracles se font-ils par son intermédiaire? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'N''est-il pas le charpentier, le fils de Marie, le frère de Jacques, de Joses, de Jude et de Simon? Et ses sœurs ne sont-elles pas ici parmi nous?» Et il représentait un obstacle pour eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mais Jésus leur dit: «Un prophète n''est méprisé que dans sa patrie, parmi ses parents et dans sa famille.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il ne put faire là aucun miracle, si ce n''est qu''il guérit quelques malades en posant les mains sur eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Et il s'étonnait de leur incrédulité.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mission des douze apôtres
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Jésus parcourait les villages des environs en enseignant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors il appela les douze et commença à les envoyer deux à deux, et il leur donna autorité sur les esprits impurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il leur recommanda de ne rien prendre pour le voyage, sauf un bâton, de n''avoir ni pain, ni sac, ni argent dans la ceinture, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: de chausser des sandales et de ne pas mettre deux chemises.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Puis il leur dit: «Si quelque part vous entrez dans une maison, restez-y jusqu''à votre départ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Et si, dans une ville, les gens ne vous accueillent pas et ne vous écoutent pas, retirez-vous de là et secouez la poussière de vos pieds
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Secouez… pieds: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: les Juifs avaient l'habitude de secouer la poussière de leurs pieds en quittant une ville non juive; ils exprimaient ainsi leur séparation d'avec ceux qui n'adoraient pas le vrai Dieu.
    marker-yv: yv-n
  - type: text
    text: ' en témoignage contre eux. [Je vous le dis en vérité, le jour du jugement, Sodome et Gomorrhe seront traitées moins sévèrement que cette ville-là.]»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils partirent et prêchèrent en appelant chacun à changer d''attitude. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ils chassaient beaucoup de démons, appliquaient de l'huile à beaucoup de malades et les guérissaient.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Exécution de Jean-Baptiste
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Le roi Hérode entendit parler de Jésus, car son nom était devenu célèbre. Il disait: «Jean-Baptiste est ressuscité, et c''est pour cela qu''il a le pouvoir de faire des miracles.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'D''autres disaient: «C''est Elie.» Et d''autres disaient: «C''est un prophète comme l''un de nos prophètes.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais Hérode, en apprenant cela, disait: «Ce Jean que j''ai fait décapiter, c''est lui, il est ressuscité.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'En effet, Hérode lui-même avait fait arrêter Jean et l''avait fait enchaîner en prison à cause d''Hérodiade, la femme de son frère Philippe, qu''il avait épousée, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'car Jean lui disait: «Il ne t''est pas permis d''avoir pour femme l''épouse de ton frère.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Furieuse contre Jean, Hérodiade voulait le faire mourir, mais elle ne le pouvait pas, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: car Hérode redoutait Jean, sachant que c'était un homme juste et saint, et il le protégeait. Après l'avoir entendu, il était souvent perplexe, et c'était avec plaisir qu'il l'écoutait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Cependant, un jour propice arriva lorsque Hérode, pour son anniversaire, donna un festin à ses grands, aux chefs militaires et aux personnalités de la Galilée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'La fille d''Hérodiade entra dans la salle, elle dansa et plut à Hérode et à ses invités. Le roi dit à la jeune fille: «Demande-moi ce que tu veux, et je te le donnerai.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Il ajouta avec serment: «Ce que tu me demanderas, je te le donnerai, même si c''était la moitié de mon royaume.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Elle sortit et dit à sa mère: «Que demanderai-je?» Sa mère répondit: «La tête de Jean-Baptiste.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Elle s''empressa aussitôt de rentrer vers le roi et lui fit cette demande: «Je veux que tu me donnes à l''instant, sur un plat, la tête de Jean-Baptiste.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Le roi fut attristé, mais, à cause de ses serments et des invités, il ne voulut pas refuser. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il envoya sur-le-champ un garde, avec ordre d''apporter la tête de Jean-Baptiste. Le garde alla décapiter Jean dans la prison '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'et apporta la tête sur un plat. Il la donna à la jeune fille et la jeune fille la donna à sa mère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Quand les disciples de Jean apprirent cette nouvelle, ils vinrent prendre son corps et le mirent dans un tombeau.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Multiplication des pains pour 5000 hommes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Les apôtres se rassemblèrent autour de Jésus et lui racontèrent tout ce qu''ils avaient fait et tout ce qu''ils avaient enseigné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Jésus leur dit: «Venez à l''écart dans un endroit désert et reposez-vous un peu.» En effet, il y avait beaucoup de monde qui allait et venait, et ils n''avaient même pas le temps de manger.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ils partirent donc dans une barque pour aller à l''écart dans un endroit désert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Beaucoup de gens les virent s''en aller et le reconnurent, et de toutes les villes on accourut à pied et on les devança à l''endroit où ils se rendaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Quand il sortit de la barque, Jésus vit une grande foule et fut rempli de compassion pour eux, parce qu''ils étaient '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: comme des brebis qui n'ont pas de berger
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.34 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Comme… berger: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Nombres 27.17
      metadata:
        usfm: NUM.27.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', et il se mit à leur enseigner beaucoup de choses.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Comme l''heure était déjà bien tardive, ses disciples s''approchèrent de lui et dirent: «Cet endroit est désert, et il est déjà tard. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Renvoie-les afin qu''ils aillent dans les campagnes et dans les villages des environs pour s''acheter du pain, car ils n''ont rien à manger.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Jésus leur répondit: «Donnez-leur vous-mêmes à manger!» Mais ils lui dirent: «Faut-il aller acheter des pains pour 200 pièces d''argent et leur donner à manger?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Il leur dit: «Combien de pains avez-vous? Allez voir.» Ils s''en assurèrent et répondirent: «Cinq, et deux poissons.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Alors il leur ordonna de les faire tous asseoir par groupes sur l''herbe verte; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'ils s''assirent par rangées de 100 et de 50. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Il prit les cinq pains et les deux poissons, leva les yeux vers le ciel et prononça la prière de bénédiction. Puis il rompit les pains et les donna aux disciples afin qu''ils les distribuent à la foule. Il partagea aussi les deux poissons entre tous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Tous mangèrent et furent rassasiés, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'et l''on emporta douze paniers pleins de morceaux de pain et de ce qui restait des poissons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Ceux qui avaient mangé les pains étaient au nombre de 5000 hommes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Aussitôt après, il obligea ses disciples à monter dans la barque et à le précéder sur l''autre rive, vers Bethsaïda, pendant que lui-même renverrait la foule. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Quand il l'eut renvoyée, il s'en alla sur la montagne pour prier.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Le soir venu, la barque était au milieu du lac et Jésus était seul à terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Il vit qu''ils avaient beaucoup de peine à ramer, car le vent leur était contraire. Vers la fin de la nuit, il alla vers eux en marchant sur le lac, et il voulait les dépasser. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Quand ils le virent marcher sur le lac, ils crurent que c''était un fantôme et ils poussèrent des cris, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'car ils le voyaient tous et ils étaient affolés. Jésus leur parla aussitôt et leur dit: «Rassurez-vous, c''est moi. N''ayez pas peur!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Puis il monta près d''eux dans la barque, et le vent tomba. Ils étaient en eux-mêmes extrêmement stupéfaits [et étonnés] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: car ils n'avaient pas compris le miracle des pains, parce que leur cœur était endurci.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Après avoir traversé le lac, ils arrivèrent dans la région de Génésareth et y abordèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Dès qu''ils furent sortis de la barque, les gens reconnurent Jésus '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'et parcoururent tous les environs; ils se mirent à apporter les malades sur des brancards là où ils apprenaient sa présence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Partout où il arrivait, dans les villages, dans les villes ou dans les campagnes, on mettait les malades sur les places publiques et on le suppliait de leur permettre seulement de toucher le bord de son vêtement. Tous ceux qui le touchaient étaient guéris.
