document_id: MRK.6,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus rejeté à Nazareth
  - type: text
    content: 'Jésus partit de là et se rendit dans sa patrie. Ses disciples le suivirent. '
  '10':
  - type: text
    content: 'Puis il leur dit: «Si quelque part vous entrez dans une maison, restez-y jusqu''à votre départ. '
  '11':
  - type: text
    content: Et si, dans une ville, les gens ne vous accueillent pas et ne vous écoutent pas, retirez-vous de là et secouez la poussière de vos pieds
  - type: note
    content: 'Secouez… pieds: les Juifs avaient l''habitude de secouer la poussière de leurs pieds en quittant une ville non juive; ils exprimaient ainsi leur séparation d''avec ceux qui n''adoraient pas le vrai Dieu.'
  - type: text
    content: ' en témoignage contre eux. [Je vous le dis en vérité, le jour du jugement, Sodome et Gomorrhe seront traitées moins sévèrement que cette ville-là.]»'
  '12':
  - type: text
    content: 'Ils partirent et prêchèrent en appelant chacun à changer d''attitude. '
  '13':
  - type: text
    content: Ils chassaient beaucoup de démons, appliquaient de l'huile à beaucoup de malades et les guérissaient.
  - type: heading
    content: Exécution de Jean-Baptiste
  '14':
  - type: text
    content: 'Le roi Hérode entendit parler de Jésus, car son nom était devenu célèbre. Il disait: «Jean-Baptiste est ressuscité, et c''est pour cela qu''il a le pouvoir de faire des miracles.» '
  '15':
  - type: text
    content: 'D''autres disaient: «C''est Elie.» Et d''autres disaient: «C''est un prophète comme l''un de nos prophètes.» '
  '16':
  - type: text
    content: 'Mais Hérode, en apprenant cela, disait: «Ce Jean que j''ai fait décapiter, c''est lui, il est ressuscité.»'
  '17':
  - type: text
    content: 'En effet, Hérode lui-même avait fait arrêter Jean et l''avait fait enchaîner en prison à cause d''Hérodiade, la femme de son frère Philippe, qu''il avait épousée, '
  '18':
  - type: text
    content: 'car Jean lui disait: «Il ne t''est pas permis d''avoir pour femme l''épouse de ton frère.» '
  '19':
  - type: text
    content: 'Furieuse contre Jean, Hérodiade voulait le faire mourir, mais elle ne le pouvait pas, '
  '2':
  - type: text
    content: 'Le jour du sabbat, il se mit à enseigner dans la synagogue. Beaucoup de gens l''entendirent; ils étaient étonnés et disaient: «D''où cela lui vient-il? Quelle est cette sagesse qui lui a été donnée? Et comment de tels miracles se font-ils par son intermédiaire? '
  '20':
  - type: text
    content: car Hérode redoutait Jean, sachant que c'était un homme juste et saint, et il le protégeait. Après l'avoir entendu, il était souvent perplexe, et c'était avec plaisir qu'il l'écoutait.
  '21':
  - type: text
    content: 'Cependant, un jour propice arriva lorsque Hérode, pour son anniversaire, donna un festin à ses grands, aux chefs militaires et aux personnalités de la Galilée. '
  '22':
  - type: text
    content: 'La fille d''Hérodiade entra dans la salle, elle dansa et plut à Hérode et à ses invités. Le roi dit à la jeune fille: «Demande-moi ce que tu veux, et je te le donnerai.» '
  '23':
  - type: text
    content: 'Il ajouta avec serment: «Ce que tu me demanderas, je te le donnerai, même si c''était la moitié de mon royaume.» '
  '24':
  - type: text
    content: 'Elle sortit et dit à sa mère: «Que demanderai-je?» Sa mère répondit: «La tête de Jean-Baptiste.» '
  '25':
  - type: text
    content: 'Elle s''empressa aussitôt de rentrer vers le roi et lui fit cette demande: «Je veux que tu me donnes à l''instant, sur un plat, la tête de Jean-Baptiste.» '
  '26':
  - type: text
    content: 'Le roi fut attristé, mais, à cause de ses serments et des invités, il ne voulut pas refuser. '
  '27':
  - type: text
    content: 'Il envoya sur-le-champ un garde, avec ordre d''apporter la tête de Jean-Baptiste. Le garde alla décapiter Jean dans la prison '
  '28':
  - type: text
    content: 'et apporta la tête sur un plat. Il la donna à la jeune fille et la jeune fille la donna à sa mère. '
  '29':
  - type: text
    content: Quand les disciples de Jean apprirent cette nouvelle, ils vinrent prendre son corps et le mirent dans un tombeau.
  - type: heading
    content: Multiplication des pains pour 5000 hommes
  '3':
  - type: text
    content: 'N''est-il pas le charpentier, le fils de Marie, le frère de Jacques, de Joses, de Jude et de Simon? Et ses sœurs ne sont-elles pas ici parmi nous?» Et il représentait un obstacle pour eux. '
  '30':
  - type: text
    content: 'Les apôtres se rassemblèrent autour de Jésus et lui racontèrent tout ce qu''ils avaient fait et tout ce qu''ils avaient enseigné. '
  '31':
  - type: text
    content: 'Jésus leur dit: «Venez à l''écart dans un endroit désert et reposez-vous un peu.» En effet, il y avait beaucoup de monde qui allait et venait, et ils n''avaient même pas le temps de manger.'
  '32':
  - type: text
    content: 'Ils partirent donc dans une barque pour aller à l''écart dans un endroit désert. '
  '33':
  - type: text
    content: 'Beaucoup de gens les virent s''en aller et le reconnurent, et de toutes les villes on accourut à pied et on les devança à l''endroit où ils se rendaient. '
  '34':
  - type: text
    content: 'Quand il sortit de la barque, Jésus vit une grande foule et fut rempli de compassion pour eux, parce qu''ils étaient '
  - type: text
    content: comme des brebis qui n'ont pas de berger
  - type: note
    content: 'Comme… berger: citation de Nombres 27.17.'
  - type: text
    content: ', et il se mit à leur enseigner beaucoup de choses.'
  '35':
  - type: text
    content: 'Comme l''heure était déjà bien tardive, ses disciples s''approchèrent de lui et dirent: «Cet endroit est désert, et il est déjà tard. '
  '36':
  - type: text
    content: 'Renvoie-les afin qu''ils aillent dans les campagnes et dans les villages des environs pour s''acheter du pain, car ils n''ont rien à manger.» '
  '37':
  - type: text
    content: 'Jésus leur répondit: «Donnez-leur vous-mêmes à manger!» Mais ils lui dirent: «Faut-il aller acheter des pains pour 200 pièces d''argent et leur donner à manger?» '
  '38':
  - type: text
    content: 'Il leur dit: «Combien de pains avez-vous? Allez voir.» Ils s''en assurèrent et répondirent: «Cinq, et deux poissons.» '
  '39':
  - type: text
    content: 'Alors il leur ordonna de les faire tous asseoir par groupes sur l''herbe verte; '
  '4':
  - type: text
    content: 'Mais Jésus leur dit: «Un prophète n''est méprisé que dans sa patrie, parmi ses parents et dans sa famille.» '
  '40':
  - type: text
    content: 'ils s''assirent par rangées de 100 et de 50. '
  '41':
  - type: text
    content: 'Il prit les cinq pains et les deux poissons, leva les yeux vers le ciel et prononça la prière de bénédiction. Puis il rompit les pains et les donna aux disciples afin qu''ils les distribuent à la foule. Il partagea aussi les deux poissons entre tous. '
  '42':
  - type: text
    content: 'Tous mangèrent et furent rassasiés, '
  '43':
  - type: text
    content: 'et l''on emporta douze paniers pleins de morceaux de pain et de ce qui restait des poissons. '
  '44':
  - type: text
    content: Ceux qui avaient mangé les pains étaient au nombre de 5000 hommes.
  '45':
  - type: text
    content: 'Aussitôt après, il obligea ses disciples à monter dans la barque et à le précéder sur l''autre rive, vers Bethsaïda, pendant que lui-même renverrait la foule. '
  '46':
  - type: text
    content: Quand il l'eut renvoyée, il s'en alla sur la montagne pour prier.
  '47':
  - type: text
    content: 'Le soir venu, la barque était au milieu du lac et Jésus était seul à terre. '
  '48':
  - type: text
    content: 'Il vit qu''ils avaient beaucoup de peine à ramer, car le vent leur était contraire. Vers la fin de la nuit, il alla vers eux en marchant sur le lac, et il voulait les dépasser. '
  '49':
  - type: text
    content: 'Quand ils le virent marcher sur le lac, ils crurent que c''était un fantôme et ils poussèrent des cris, '
  '5':
  - type: text
    content: 'Il ne put faire là aucun miracle, si ce n''est qu''il guérit quelques malades en posant les mains sur eux. '
  '50':
  - type: text
    content: 'car ils le voyaient tous et ils étaient affolés. Jésus leur parla aussitôt et leur dit: «Rassurez-vous, c''est moi. N''ayez pas peur!» '
  '51':
  - type: text
    content: 'Puis il monta près d''eux dans la barque, et le vent tomba. Ils étaient en eux-mêmes extrêmement stupéfaits [et étonnés] '
  '52':
  - type: text
    content: car ils n'avaient pas compris le miracle des pains, parce que leur cœur était endurci.
  '53':
  - type: text
    content: 'Après avoir traversé le lac, ils arrivèrent dans la région de Génésareth et y abordèrent. '
  '54':
  - type: text
    content: 'Dès qu''ils furent sortis de la barque, les gens reconnurent Jésus '
  '55':
  - type: text
    content: 'et parcoururent tous les environs; ils se mirent à apporter les malades sur des brancards là où ils apprenaient sa présence. '
  '56':
  - type: text
    content: Partout où il arrivait, dans les villages, dans les villes ou dans les campagnes, on mettait les malades sur les places publiques et on le suppliait de leur permettre seulement de toucher le bord de son vêtement. Tous ceux qui le touchaient étaient guéris.
  '6':
  - type: text
    content: Et il s'étonnait de leur incrédulité.
  - type: heading
    content: Mission des douze apôtres
  - type: text
    content: 'Jésus parcourait les villages des environs en enseignant. '
  '7':
  - type: text
    content: 'Alors il appela les douze et commença à les envoyer deux à deux, et il leur donna autorité sur les esprits impurs. '
  '8':
  - type: text
    content: 'Il leur recommanda de ne rien prendre pour le voyage, sauf un bâton, de n''avoir ni pain, ni sac, ni argent dans la ceinture, '
  '9':
  - type: text
    content: de chausser des sandales et de ne pas mettre deux chemises.
