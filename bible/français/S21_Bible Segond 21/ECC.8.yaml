document_id: ECC.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Réflexions diverses
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Qui est comme le sage et sait expliquer les choses? La sagesse d'un homme fait briller son visage et la sévérité de son visage en est transformée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je te le dis, respecte les ordres du roi, et cela à cause du serment fait à Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ne sois pas pressé de t''éloigner de lui et ne persévère pas dans une mauvaise situation! En effet, le roi peut faire tout ce qu''il désire, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'parce que sa parole est puissante. Qui pourra lui dire: «Que fais-tu?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Celui qui respecte le commandement ne se retrouvera pas dans une mauvaise situation, et le cœur du sage connaît le moment opportun et les règles à suivre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Oui, pour toute activité il y a un moment opportun et des règles, mais il y a un malheur qui accable l''homme: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'il ne sait pas ce qui arrivera. Et qui lui annoncera comment cela arrivera? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L'homme n'est pas maître de son souffle pour pouvoir le retenir, et il n'exerce aucun contrôle sur le jour de sa mort. Il n'existe aucun moyen d'échapper à ce combat; même la méchanceté est incapable d'en délivrer son maître.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tout cela, je l''ai vu et j''ai prêté attention à tout ce qui se fait sous le soleil. C''est un temps où l''homme domine sur l''homme pour le rendre malheureux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ainsi, j''ai vu des méchants être enterrés et entrer dans leur repos tandis que ceux qui avaient agi avec droiture devaient s''éloigner du lieu saint et étaient oubliés dans la ville. Cela aussi, c''est de la fumée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Parce qu''une sentence contre de mauvaises actions n''est pas rapidement appliquée, le cœur des humains se remplit du désir de faire le mal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'En effet, le pécheur peut faire 100 fois le mal et continuer à vivre. Mais je sais aussi que le bonheur est pour ceux qui craignent Dieu parce qu''ils éprouvent de la crainte devant lui, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'et qu''il ne sera pas pour le méchant: il ne prolongera pas plus son existence que l''ombre, parce qu''il n''éprouve pas de crainte devant Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il y a une réalité qui n''est que fumée et qui se produit sur la terre: il y a des justes qui sont traités d''après la manière d''agir des méchants et des méchants qui sont traités d''après la manière d''agir des justes. Je dis que cela aussi, c''est de la fumée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: J'ai donc fait l'éloge de la joie, puisque le seul bonheur de l'homme sous le soleil consiste à manger, à boire et à se réjouir; voilà ce qui l'accompagne dans sa peine, durant la vie que Dieu lui donne sous le soleil.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Lorsque j''ai appliqué mon cœur à connaître la sagesse et à examiner les activités qui se déroulent sur la terre – en effet, les yeux de l''homme ne goûtent le sommeil ni le jour ni la nuit – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: j'ai vu tout ce que Dieu fait. J'ai vu que l'homme ne peut pas comprendre l'œuvre qui est accomplie sous le soleil. Il a beau se fatiguer à chercher, il n'y parvient pas, et même si un sage prétend avoir cette connaissance, il est incapable d'y parvenir.
