document_id: JDG.11,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Jephthé le Galaadite était un vaillant guerrier. Il était le fils d''une prostituée et son père était un certain Galaad. '
  '10':
  - type: text
    content: 'Les anciens de Galaad dirent à Jephthé: «Que l''Eternel soit témoin entre nous, si nous ne faisons pas ce que tu dis.» '
  '11':
  - type: text
    content: Jephthé partit alors avec les anciens de Galaad. Le peuple le mit à sa tête et l'établit comme chef, et Jephthé répéta devant l'Eternel, à Mitspa, toutes les paroles qu'il avait prononcées.
  '12':
  - type: text
    content: 'Jephthé envoya des messagers au roi des Ammonites pour lui dire: «Que me veux-tu, pour que tu viennes m''attaquer et faire la guerre à mon pays?» '
  '13':
  - type: text
    content: 'Le roi des Ammonites répondit aux messagers de Jephthé: «C''est qu''Israël, quand il est parti d''Egypte, s''est emparé de mon pays, depuis l''Arnon jusqu''au Jabbok et au Jourdain. Rends-le maintenant de bon gré.»'
  '14':
  - type: text
    content: 'Jephthé envoya de nouveau des messagers au roi des Ammonites '
  '15':
  - type: text
    content: 'pour lui dire: «Voici ce que dit Jephthé: Israël ne s''est pas emparé du pays de Moab, ni du pays des Ammonites. '
  '16':
  - type: text
    content: 'En effet, lorsque Israël est parti d''Egypte, il a marché dans le désert jusqu''à la mer des Roseaux et il est arrivé à Kadès. '
  '17':
  - type: text
    content: 'Il a alors envoyé des messagers au roi d''Edom pour lui dire: ‘Laisse-moi passer par ton pays.’ Mais le roi d''Edom n''a pas voulu. Il en a aussi envoyé au roi de Moab, qui a refusé. Et Israël est resté à Kadès. '
  '18':
  - type: text
    content: 'Puis il a repris sa marche dans le désert, a contourné le pays d''Edom et le pays de Moab, et il est arrivé à l''est du pays de Moab. Ils ont campé de l''autre côté de l''Arnon, sans entrer sur le territoire de Moab, car l''Arnon marque la frontière de Moab. '
  '19':
  - type: text
    content: 'Israël a envoyé des messagers à Sihon, le roi des Amoréens, roi de Hesbon, et lui a dit: ‘Laisse-nous passer par ton pays jusqu''à l''endroit où nous allons.’ '
  '2':
  - type: text
    content: 'La femme de Galaad lui donna des fils qui, devenus grands, chassèrent Jephthé et lui dirent: «Tu n''auras pas d''héritage dans la famille de notre père, car tu es le fils d''une autre femme.» '
  '20':
  - type: text
    content: 'Mais Sihon n''a pas eu assez confiance en Israël pour le laisser passer sur son territoire. Il a rassemblé tout son peuple, a établi son camp à Jahats et a combattu Israël. '
  '21':
  - type: text
    content: 'L''Eternel, le Dieu d''Israël, a livré Sihon et tout son peuple entre les mains d''Israël, qui les a battus. Israël a alors pris possession de tout le pays des Amoréens installés dans cette région. '
  '22':
  - type: text
    content: Ils ont pris possession de tout le territoire des Amoréens, depuis l'Arnon jusqu'au Jabbok et depuis le désert jusqu'au Jourdain.
  '23':
  - type: text
    content: '»Maintenant que l''Eternel, le Dieu d''Israël, a chassé les Amoréens devant son peuple, Israël, est-ce toi qui devrais avoir la possession de leur pays? '
  '24':
  - type: text
    content: 'Ce que ton Dieu Kemosh te donne à posséder, ne le possèdes-tu pas? Et tout ce que l''Eternel, notre Dieu, a mis en notre possession devant nous, nous ne pourrions pas le posséder! '
  '25':
  - type: text
    content: 'Vaux-tu donc mieux que Balak, fils de Tsippor, le roi de Moab? A-t-il cherché querelle à Israël ou lui a-t-il fait la guerre? '
  '26':
  - type: text
    content: 'Voilà 300 ans qu''Israël habite à Hesbon et dans les villes qui en dépendent, à Aroër et dans les villes qui en dépendent, et dans toutes les villes situées sur les rives de l''Arnon. Pourquoi ne les lui avez-vous pas enlevées à ce moment-là? '
  '27':
  - type: text
    content: Je ne t'ai pas offensé et tu agis mal avec moi en me faisant la guerre. Que l'Eternel, le juge, soit aujourd'hui juge entre les Israélites et les Ammonites!»
  '28':
  - type: text
    content: Le roi des Ammonites n'écouta pas les paroles que Jephthé lui fit dire.
  '29':
  - type: text
    content: 'L''Esprit de l''Eternel reposa sur Jephthé. Il traversa Galaad et Manassé, puis il passa à Mitspé de Galaad. De là, il marcha contre les Ammonites. '
  '3':
  - type: text
    content: Jephthé s'enfuit loin de ses frères et habita dans le pays de Tob. Des vauriens se rassemblèrent à ses côtés, et ils faisaient avec lui les expéditions guerrières.
  '30':
  - type: text
    content: 'Jephthé fit un vœu à l''Eternel. Il dit: «Si tu livres les Ammonites entre mes mains, '
  '31':
  - type: text
    content: toute personne qui, à mon heureux retour de chez les Ammonites, sortira de chez moi pour venir à ma rencontre appartiendra à l'Eternel, et je l'offrirai en holocauste.»
  '32':
  - type: text
    content: 'Jephthé marcha contre les Ammonites et l''Eternel les livra entre ses mains. '
  '33':
  - type: text
    content: Il leur infligea une très grande défaite, depuis Aroër jusque vers Minnith, espace qui comptait 20 villes, et jusqu'à Abel-Keramim. Les Ammonites furent humiliés devant les Israélites.
  '34':
  - type: text
    content: 'Jephthé retourna chez lui à Mitspa. Et voici que sa fille sortit à sa rencontre avec des tambourins et des danses. C''était son seul enfant: il n''avait pas de fils et pas d''autre fille. '
  '35':
  - type: text
    content: 'Dès qu''il la vit, il déchira ses vêtements et dit: «Ah! ma fille! Tu me jettes dans l''abattement, tu fais partie de ceux qui me troublent! J''ai fait un vœu à l''Eternel et je ne peux revenir en arrière.» '
  '36':
  - type: text
    content: 'Elle lui dit: «Mon père, si tu as fait un vœu à l''Eternel, traite-moi conformément à tes paroles, maintenant que l''Eternel t''a vengé de tes ennemis, des Ammonites.» '
  '37':
  - type: text
    content: 'Elle dit encore à son père: «Accorde-moi seulement ceci: laisse-moi partir pendant deux mois! Je m''en irai, je me rendrai dans les montagnes et j''y pleurerai ma virginité avec mes compagnes.» '
  '38':
  - type: text
    content: 'Jephthé répondit: «Vas-y!» et il la laissa partir pour deux mois. Elle s''en alla avec ses compagnes et pleura sa virginité sur les montagnes. '
  '39':
  - type: text
    content: 'Au bout des deux mois, elle revint vers son père et il accomplit sur elle le vœu qu''il avait fait. Elle n''avait pas eu de relations avec un homme. Il y eut depuis lors une prescription en Israël: '
  '4':
  - type: text
    content: 'Quelque temps après, les Ammonites firent la guerre à Israël. '
  '40':
  - type: text
    content: tous les ans, 4 jours par an, les filles d'Israël s'en vont célébrer la fille de Jephthé le Galaadite.
  '5':
  - type: text
    content: 'Face à cette situation, les anciens de Galaad allèrent chercher Jephthé au pays de Tob. '
  '6':
  - type: text
    content: 'Ils lui dirent: «Viens, tu seras notre chef et nous combattrons les Ammonites.» '
  '7':
  - type: text
    content: 'Jephthé répondit aux anciens de Galaad: «N''avez-vous pas eu de la haine pour moi et ne m''avez-vous pas chassé de chez mon père? Pourquoi venez-vous vers moi, maintenant que vous êtes dans la détresse?» '
  '8':
  - type: text
    content: 'Les anciens de Galaad dirent à Jephthé: «Nous revenons vers toi maintenant afin que tu marches avec nous, que tu combattes les Ammonites et que tu sois notre chef, celui de tous les habitants de Galaad.» '
  '9':
  - type: text
    content: 'Jephthé répondit aux anciens de Galaad: «Si vous me faites revenir pour combattre les Ammonites et que l''Eternel me les livre, je serai votre chef.» '
