document_id: JDG.11
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jephthé le Galaadite était un vaillant guerrier. Il était le fils d''une prostituée et son père était un certain Galaad. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'La femme de Galaad lui donna des fils qui, devenus grands, chassèrent Jephthé et lui dirent: «Tu n''auras pas d''héritage dans la famille de notre père, car tu es le fils d''une autre femme.» '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Jephthé s'enfuit loin de ses frères et habita dans le pays de Tob. Des vauriens se rassemblèrent à ses côtés, et ils faisaient avec lui les expéditions guerrières.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Quelque temps après, les Ammonites firent la guerre à Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Face à cette situation, les anciens de Galaad allèrent chercher Jephthé au pays de Tob. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ils lui dirent: «Viens, tu seras notre chef et nous combattrons les Ammonites.» '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jephthé répondit aux anciens de Galaad: «N''avez-vous pas eu de la haine pour moi et ne m''avez-vous pas chassé de chez mon père? Pourquoi venez-vous vers moi, maintenant que vous êtes dans la détresse?» '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les anciens de Galaad dirent à Jephthé: «Nous revenons vers toi maintenant afin que tu marches avec nous, que tu combattes les Ammonites et que tu sois notre chef, celui de tous les habitants de Galaad.» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Jephthé répondit aux anciens de Galaad: «Si vous me faites revenir pour combattre les Ammonites et que l''Eternel me les livre, je serai votre chef.» '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les anciens de Galaad dirent à Jephthé: «Que l''Eternel soit témoin entre nous, si nous ne faisons pas ce que tu dis.» '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Jephthé partit alors avec les anciens de Galaad. Le peuple le mit à sa tête et l'établit comme chef, et Jephthé répéta devant l'Eternel, à Mitspa, toutes les paroles qu'il avait prononcées.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jephthé envoya des messagers au roi des Ammonites pour lui dire: «Que me veux-tu, pour que tu viennes m''attaquer et faire la guerre à mon pays?» '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le roi des Ammonites répondit aux messagers de Jephthé: «C''est qu''Israël, quand il est parti d''Egypte, s''est emparé de mon pays, depuis l''Arnon jusqu''au Jabbok et au Jourdain. Rends-le maintenant de bon gré.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jephthé envoya de nouveau des messagers au roi des Ammonites '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'pour lui dire: «Voici ce que dit Jephthé: Israël ne s''est pas emparé du pays de Moab, ni du pays des Ammonites. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'En effet, lorsque Israël est parti d''Egypte, il a marché dans le désert jusqu''à la mer des Roseaux et il est arrivé à Kadès. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il a alors envoyé des messagers au roi d''Edom pour lui dire: ‘Laisse-moi passer par ton pays.’ Mais le roi d''Edom n''a pas voulu. Il en a aussi envoyé au roi de Moab, qui a refusé. Et Israël est resté à Kadès. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Puis il a repris sa marche dans le désert, a contourné le pays d''Edom et le pays de Moab, et il est arrivé à l''est du pays de Moab. Ils ont campé de l''autre côté de l''Arnon, sans entrer sur le territoire de Moab, car l''Arnon marque la frontière de Moab. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Israël a envoyé des messagers à Sihon, le roi des Amoréens, roi de Hesbon, et lui a dit: ‘Laisse-nous passer par ton pays jusqu''à l''endroit où nous allons.’ '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais Sihon n''a pas eu assez confiance en Israël pour le laisser passer sur son territoire. Il a rassemblé tout son peuple, a établi son camp à Jahats et a combattu Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'L''Eternel, le Dieu d''Israël, a livré Sihon et tout son peuple entre les mains d''Israël, qui les a battus. Israël a alors pris possession de tout le pays des Amoréens installés dans cette région. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ils ont pris possession de tout le territoire des Amoréens, depuis l'Arnon jusqu'au Jabbok et depuis le désert jusqu'au Jourdain.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '»Maintenant que l''Eternel, le Dieu d''Israël, a chassé les Amoréens devant son peuple, Israël, est-ce toi qui devrais avoir la possession de leur pays? '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ce que ton Dieu Kemosh te donne à posséder, ne le possèdes-tu pas? Et tout ce que l''Eternel, notre Dieu, a mis en notre possession devant nous, nous ne pourrions pas le posséder! '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Vaux-tu donc mieux que Balak, fils de Tsippor, le roi de Moab? A-t-il cherché querelle à Israël ou lui a-t-il fait la guerre? '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Voilà 300 ans qu''Israël habite à Hesbon et dans les villes qui en dépendent, à Aroër et dans les villes qui en dépendent, et dans toutes les villes situées sur les rives de l''Arnon. Pourquoi ne les lui avez-vous pas enlevées à ce moment-là? '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Je ne t'ai pas offensé et tu agis mal avec moi en me faisant la guerre. Que l'Eternel, le juge, soit aujourd'hui juge entre les Israélites et les Ammonites!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Le roi des Ammonites n'écouta pas les paroles que Jephthé lui fit dire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'L''Esprit de l''Eternel reposa sur Jephthé. Il traversa Galaad et Manassé, puis il passa à Mitspé de Galaad. De là, il marcha contre les Ammonites. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jephthé fit un vœu à l''Eternel. Il dit: «Si tu livres les Ammonites entre mes mains, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: toute personne qui, à mon heureux retour de chez les Ammonites, sortira de chez moi pour venir à ma rencontre appartiendra à l'Eternel, et je l'offrirai en holocauste.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Jephthé marcha contre les Ammonites et l''Eternel les livra entre ses mains. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Il leur infligea une très grande défaite, depuis Aroër jusque vers Minnith, espace qui comptait 20 villes, et jusqu'à Abel-Keramim. Les Ammonites furent humiliés devant les Israélites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jephthé retourna chez lui à Mitspa. Et voici que sa fille sortit à sa rencontre avec des tambourins et des danses. C''était son seul enfant: il n''avait pas de fils et pas d''autre fille. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Dès qu''il la vit, il déchira ses vêtements et dit: «Ah! ma fille! Tu me jettes dans l''abattement, tu fais partie de ceux qui me troublent! J''ai fait un vœu à l''Eternel et je ne peux revenir en arrière.» '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Elle lui dit: «Mon père, si tu as fait un vœu à l''Eternel, traite-moi conformément à tes paroles, maintenant que l''Eternel t''a vengé de tes ennemis, des Ammonites.» '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Elle dit encore à son père: «Accorde-moi seulement ceci: laisse-moi partir pendant deux mois! Je m''en irai, je me rendrai dans les montagnes et j''y pleurerai ma virginité avec mes compagnes.» '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Jephthé répondit: «Vas-y!» et il la laissa partir pour deux mois. Elle s''en alla avec ses compagnes et pleura sa virginité sur les montagnes. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Au bout des deux mois, elle revint vers son père et il accomplit sur elle le vœu qu''il avait fait. Elle n''avait pas eu de relations avec un homme. Il y eut depuis lors une prescription en Israël: '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: tous les ans, 4 jours par an, les filles d'Israël s'en vont célébrer la fille de Jephthé le Galaadite.
