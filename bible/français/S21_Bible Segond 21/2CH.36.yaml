document_id: 2CH.36
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règnes de Joachaz, Jojakim et Jojakin
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le peuple du pays prit Joachaz, fils de Josias, pour le faire roi à la place de son père à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Joachaz avait 23 ans lorsqu'il devint roi et il régna 3 mois à Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le roi d''Egypte le destitua à Jérusalem et imposa au pays un tribut de 3000 kilos d''argent et 30 kilos d''or. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Le roi d'Egypte établit Eliakim, le frère de Joachaz, roi sur Juda et sur Jérusalem, et il changea son nom en Jojakim. Quant à son frère Joachaz, il le captura et l'emmena en Egypte.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Jojakim avait 25 ans lorsqu'il devint roi et il régna 11 ans à Jérusalem. Il fit ce qui est mal aux yeux de l'Eternel son Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nebucadnetsar, roi de Babylone, monta contre lui et l''attacha avec des chaînes en bronze pour le conduire à Babylone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nebucadnetsar emporta des ustensiles de la maison de l'Eternel à Babylone et les mit dans son temple à Babylone.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le reste des actes de Jojakim, les actes abominables dont il s'est fait l'auteur et ce qu'on a pu relever contre lui, cela est décrit dans les annales des rois d'Israël et de Juda. Son fils Jojakin devint roi à sa place.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Jojakin avait 18 ans lorsqu'il devint roi et il régna 3 mois et 10 jours à Jérusalem. Il fit ce qui est mal aux yeux de l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: L'année suivante, le roi Nebucadnetsar le fit emmener à Babylone avec les ustensiles précieux de la maison de l'Eternel, et il établit roi sur Juda et sur Jérusalem Sédécias, le frère du père de Jojakin.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne de Sédécias
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Sédécias avait 21 ans lorsqu''il devint roi et il régna 11 ans à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il fit ce qui est mal aux yeux de l''Eternel, son Dieu. Il ne s''humilia pas devant le prophète Jérémie, qui lui parlait de la part de l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il se révolta même contre le roi Nebucadnetsar, alors que celui-ci lui avait fait prêter serment au nom de Dieu. Il se montra réfractaire et endurcit son cœur, au lieu de revenir à l''Eternel, le Dieu d''Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tous les chefs des prêtres et le peuple multiplièrent eux aussi les infidélités en imitant toutes les pratiques abominables des nations. Ils rendirent impure la maison de l''Eternel, celle qu''il avait consacrée à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L''Eternel, le Dieu de leurs ancêtres, leur envoya très tôt et sans se lasser des messagers, car il voulait épargner son peuple et sa propre demeure, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: mais ils se moquèrent des messagers de Dieu, méprisèrent ses paroles et rirent de ses prophètes, jusqu'à ce que la colère de l'Eternel contre son peuple devienne sans remède.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors l''Eternel fit monter contre eux le roi des Babyloniens et il tua leurs jeunes gens par l''épée dans leur sanctuaire. Il n''épargna ni le jeune homme ni la jeune fille, ni l''ancien ni le vieillard: il livra tout entre ses mains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Nebucadnetsar emporta à Babylone tous les ustensiles de la maison de Dieu, grands et petits, les trésors de la maison de l''Eternel et ceux du roi et de ses chefs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les Babyloniens brûlèrent la maison de Dieu, démolirent les murailles de Jérusalem, livrèrent au feu tous ses palais et détruisirent tous les objets précieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nebucadnetsar exila à Babylone ceux qui échappèrent à l''épée et ils lui furent asservis, à lui et à ses fils, jusqu''à ce que le royaume de Perse prenne le pouvoir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ainsi s''accomplit la parole de l''Eternel prononcée par Jérémie: jusqu''à ce que le pays ait compensé ses sabbats'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Compensé ses sabbats: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'd''après '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lévitique 25.1-7
      metadata:
        usfm: LEV.25.1+LEV.25.2+LEV.25.3+LEV.25.4+LEV.25.5+LEV.25.6+LEV.25.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', la terre devait être laissée en repos, en friche, durant une année tous les 7 ans; cette règle n''avait pas été respectée.'
    marker-yv: yv-n
  - type: text
    text: ', durant toute la période où il fut dévasté, il se reposa, jusqu''à la fin des 70 ans.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Edit de Cyrus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'La première année du règne de Cyrus sur la Perse, l''Eternel réveilla l''esprit de Cyrus, roi de Perse, afin que s''accomplisse la parole qu''il avait prononcée par Jérémie, et celui-ci fit faire de vive voix, et même par écrit, la proclamation que voici dans tout son royaume: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '«Voici ce que dit Cyrus, roi de Perse: L''Eternel, le Dieu du ciel, m''a donné tous les royaumes de la terre et m''a désigné pour lui construire un temple à Jérusalem, en Juda. Qui parmi vous fait partie de son peuple? Que l''Eternel, son Dieu, soit avec lui et qu''il y monte!»'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.22-23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La première année… monte: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'texte identique en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esdras 1.1-3
      metadata:
        usfm: EZR.1.1+EZR.1.2+EZR.1.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
