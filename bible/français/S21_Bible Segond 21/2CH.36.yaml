document_id: 2CH.36,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Règnes de Joachaz, Jojakim et Jojakin
  - type: text
    content: 'Le peuple du pays prit Joachaz, fils de Josias, pour le faire roi à la place de son père à Jérusalem. '
  '10':
  - type: text
    content: L'année suivante, le roi Nebucadnetsar le fit emmener à Babylone avec les ustensiles précieux de la maison de l'Eternel, et il établit roi sur Juda et sur Jérusalem Sédécias, le frère du père de Jojakin.
  - type: heading
    content: Règne de Sédécias
  '11':
  - type: text
    content: 'Sédécias avait 21 ans lorsqu''il devint roi et il régna 11 ans à Jérusalem. '
  '12':
  - type: text
    content: 'Il fit ce qui est mal aux yeux de l''Eternel, son Dieu. Il ne s''humilia pas devant le prophète Jérémie, qui lui parlait de la part de l''Eternel. '
  '13':
  - type: text
    content: 'Il se révolta même contre le roi Nebucadnetsar, alors que celui-ci lui avait fait prêter serment au nom de Dieu. Il se montra réfractaire et endurcit son cœur, au lieu de revenir à l''Eternel, le Dieu d''Israël. '
  '14':
  - type: text
    content: 'Tous les chefs des prêtres et le peuple multiplièrent eux aussi les infidélités en imitant toutes les pratiques abominables des nations. Ils rendirent impure la maison de l''Eternel, celle qu''il avait consacrée à Jérusalem. '
  '15':
  - type: text
    content: 'L''Eternel, le Dieu de leurs ancêtres, leur envoya très tôt et sans se lasser des messagers, car il voulait épargner son peuple et sa propre demeure, '
  '16':
  - type: text
    content: mais ils se moquèrent des messagers de Dieu, méprisèrent ses paroles et rirent de ses prophètes, jusqu'à ce que la colère de l'Eternel contre son peuple devienne sans remède.
  '17':
  - type: text
    content: 'Alors l''Eternel fit monter contre eux le roi des Babyloniens et il tua leurs jeunes gens par l''épée dans leur sanctuaire. Il n''épargna ni le jeune homme ni la jeune fille, ni l''ancien ni le vieillard: il livra tout entre ses mains. '
  '18':
  - type: text
    content: 'Nebucadnetsar emporta à Babylone tous les ustensiles de la maison de Dieu, grands et petits, les trésors de la maison de l''Eternel et ceux du roi et de ses chefs. '
  '19':
  - type: text
    content: 'Les Babyloniens brûlèrent la maison de Dieu, démolirent les murailles de Jérusalem, livrèrent au feu tous ses palais et détruisirent tous les objets précieux. '
  '2':
  - type: text
    content: Joachaz avait 23 ans lorsqu'il devint roi et il régna 3 mois à Jérusalem.
  '20':
  - type: text
    content: 'Nebucadnetsar exila à Babylone ceux qui échappèrent à l''épée et ils lui furent asservis, à lui et à ses fils, jusqu''à ce que le royaume de Perse prenne le pouvoir. '
  '21':
  - type: text
    content: 'Ainsi s''accomplit la parole de l''Eternel prononcée par Jérémie: jusqu''à ce que le pays ait compensé ses sabbats'
  - type: note
    content: 'Compensé ses sabbats: d''après Lévitique 25.1-7, la terre devait être laissée en repos, en friche, durant une année tous les 7 ans; cette règle n''avait pas été respectée.'
  - type: text
    content: ', durant toute la période où il fut dévasté, il se reposa, jusqu''à la fin des 70 ans.'
  - type: heading
    content: Edit de Cyrus
  '22':
  - type: text
    content: 'La première année du règne de Cyrus sur la Perse, l''Eternel réveilla l''esprit de Cyrus, roi de Perse, afin que s''accomplisse la parole qu''il avait prononcée par Jérémie, et celui-ci fit faire de vive voix, et même par écrit, la proclamation que voici dans tout son royaume: '
  '23':
  - type: text
    content: '«Voici ce que dit Cyrus, roi de Perse: L''Eternel, le Dieu du ciel, m''a donné tous les royaumes de la terre et m''a désigné pour lui construire un temple à Jérusalem, en Juda. Qui parmi vous fait partie de son peuple? Que l''Eternel, son Dieu, soit avec lui et qu''il y monte!»'
  - type: note
    content: 'La première année… monte: texte identique en Esdras 1.1-3.'
  '3':
  - type: text
    content: 'Le roi d''Egypte le destitua à Jérusalem et imposa au pays un tribut de 3000 kilos d''argent et 30 kilos d''or. '
  '4':
  - type: text
    content: Le roi d'Egypte établit Eliakim, le frère de Joachaz, roi sur Juda et sur Jérusalem, et il changea son nom en Jojakim. Quant à son frère Joachaz, il le captura et l'emmena en Egypte.
  '5':
  - type: text
    content: Jojakim avait 25 ans lorsqu'il devint roi et il régna 11 ans à Jérusalem. Il fit ce qui est mal aux yeux de l'Eternel son Dieu.
  '6':
  - type: text
    content: 'Nebucadnetsar, roi de Babylone, monta contre lui et l''attacha avec des chaînes en bronze pour le conduire à Babylone. '
  '7':
  - type: text
    content: Nebucadnetsar emporta des ustensiles de la maison de l'Eternel à Babylone et les mit dans son temple à Babylone.
  '8':
  - type: text
    content: Le reste des actes de Jojakim, les actes abominables dont il s'est fait l'auteur et ce qu'on a pu relever contre lui, cela est décrit dans les annales des rois d'Israël et de Juda. Son fils Jojakin devint roi à sa place.
  '9':
  - type: text
    content: Jojakin avait 18 ans lorsqu'il devint roi et il régna 3 mois et 10 jours à Jérusalem. Il fit ce qui est mal aux yeux de l'Eternel.
