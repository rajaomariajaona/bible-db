document_id: ISA.5,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Israël, vigne de l'Eternel
  - type: text
    content: Je veux chanter à mon ami
  - type: text
    content: le cantique de mon bien-aimé sur sa vigne.
  - type: text
    content: Mon bien-aimé avait une vigne
  - type: text
    content: sur un coteau fertile.
  '10':
  - type: text
    content: Oui, deux hectares de vigne ne produiront qu'un baril de vin
  - type: text
    content: et dix mesures de semence n'en produiront qu'une.
  '11':
  - type: text
    content: Malheur à ceux qui courent de bon matin
  - type: text
    content: après les boissons enivrantes
  - type: text
    content: et qui s'attardent, le soir,
  - type: text
    content: parce qu'ils sont échauffés par le vin!
  '12':
  - type: text
    content: La harpe et le luth, le tambourin, la flûte et le vin animent leurs banquets,
  - type: text
    content: mais ils ne font pas attention à l'activité de l'Eternel
  - type: text
    content: et ne voient pas ce qu'il fait.
  '13':
  - type: text
    content: Voilà pourquoi mon peuple sera soudain emmené en exil;
  - type: text
    content: son corps d'élite sera composé d'hommes affamés
  - type: text
    content: et sa population sera desséchée par la soif.
  '14':
  - type: text
    content: Voilà pourquoi le séjour des morts s'ouvre
  - type: text
    content: et s'élargit démesurément;
  - type: text
    content: la splendeur et la richesse de Sion y descendent,
  - type: text
    content: tout comme son joyeux tapage.
  '15':
  - type: text
    content: L'être humain devra s'incliner, l'homme sera abaissé,
  - type: text
    content: tout comme les regards des hautains.
  '16':
  - type: text
    content: L'Eternel, le maître de l'univers, sera élevé par le jugement,
  - type: text
    content: le Dieu saint sera reconnu comme tel par la justice.
  '17':
  - type: text
    content: Des agneaux brouteront là comme sur leur pâturage
  - type: text
    content: et des étrangers dévoreront les décombres des riches.
  '18':
  - type: text
    content: Malheur à ceux qui sont attachés à leur faute par les ficelles de l'illusion
  - type: text
    content: et au péché comme par les cordes d'un chariot
  '19':
  - type: text
    content: 'et qui disent: «Qu''il se dépêche, qu''il accélère son œuvre'
  - type: text
    content: afin que nous la voyions!
  - type: text
    content: Que le plan du Saint d'Israël se réalise bientôt,
  - type: text
    content: afin que nous en ayons connaissance!»
  '2':
  - type: text
    content: Il a remué son sol, enlevé les pierres et y a mis des plants de premier choix.
  - type: text
    content: Il a construit une tour au milieu d'elle
  - type: text
    content: et y a installé aussi un pressoir.
  - type: text
    content: Puis il a espéré qu'elle produirait de bons raisins,
  - type: text
    content: mais elle en a produit de mauvais.
  '20':
  - type: text
    content: Malheur à ceux qui appellent le mal bien et le bien mal,
  - type: text
    content: qui changent les ténèbres en lumière et la lumière en ténèbres,
  - type: text
    content: qui changent l'amertume en douceur et la douceur en amertume!
  '21':
  - type: text
    content: Malheur à ceux qui sont sages à leurs propres yeux
  - type: text
    content: et qui se croient intelligents!
  '22':
  - type: text
    content: Malheur à ceux qui sont forts pour boire du vin
  - type: text
    content: et experts dans la préparation des liqueurs fortes,
  '23':
  - type: text
    content: qui pour un pot-de-vin déclarent juste le coupable
  - type: text
    content: et refusent de rendre justice aux innocents!
  '24':
  - type: text
    content: Voilà pourquoi, tout comme la langue de feu ne fait qu'une bouchée du chaume
  - type: text
    content: et tout comme l'herbe sèche est incapable de résister à la flamme,
  - type: text
    content: leur racine sera pareille à de la pourriture
  - type: text
    content: et leur fleur se dissipera comme de la poussière.
  - type: text
    content: En effet, ils ont rejeté la loi de l'Eternel, le maître de l'univers,
  - type: text
    content: et ils ont repoussé la parole du Saint d'Israël.
  '25':
  - type: text
    content: Voilà pourquoi la colère de l'Eternel s'enflamme contre son peuple
  - type: text
    content: et il déploie sa puissance contre lui pour le frapper.
  - type: text
    content: Les montagnes tremblent
  - type: text
    content: et les cadavres sont comme des ordures au milieu des rues.
  - type: text
    content: Mais malgré tout cela, sa colère ne s'est pas détournée
  - type: text
    content: et sa puissance est encore déployée.
  '26':
  - type: text
    content: Il dresse un étendard pour les peuples lointains,
  - type: text
    content: 'il en siffle un d''une extrémité de la terre:'
  - type: text
    content: le voici qui arrive avec rapidité et légèreté.
  '27':
  - type: text
    content: Chez lui, personne n'est fatigué, personne ne trébuche,
  - type: text
    content: personne ne somnole ni ne dort;
  - type: text
    content: aucun n'a sa ceinture détachée, ni la courroie de ses sandales cassée.
  '28':
  - type: text
    content: Ses flèches sont affûtées,
  - type: text
    content: et tous ses arcs tendus.
  - type: text
    content: Les sabots de ses chevaux sont durs comme de la pierre
  - type: text
    content: et les roues de ses chars ont l'aspect d'un tourbillon.
  '29':
  - type: text
    content: Son rugissement est pareil à celui d'une lionne;
  - type: text
    content: 'il rugit comme le font de jeunes lions: il gronde, s''empare de sa proie'
  - type: text
    content: et l'emporte en lieu sûr, sans personne pour la délivrer.
  '3':
  - type: text
    content: Et maintenant, habitants de Jérusalem et de Juda,
  - type: text
    content: je vous en prie, soyez juges entre ma vigne et moi!
  '30':
  - type: text
    content: Ce jour-là, on fera entendre contre lui un grondement
  - type: text
    content: pareil à celui d'une tempête sur la mer.
  - type: text
    content: En regardant la terre, on ne verra que ténèbres
  - type: text
    content: et angoisses, et la lumière sera obscurcie par des nuages.
  '4':
  - type: text
    content: Qu'y avait-il encore à faire à ma vigne
  - type: text
    content: que je n'aie pas fait pour elle?
  - type: text
    content: Pourquoi, quand j'ai espéré qu'elle produirait de bons raisins,
  - type: text
    content: en a-t-elle produit de mauvais?
  '5':
  - type: text
    content: Je vais vous faire savoir maintenant
  - type: text
    content: 'ce que je vais faire à ma vigne:'
  - type: text
    content: j'arracherai sa haie pour qu'elle soit dévorée,
  - type: text
    content: j'abattrai sa clôture pour qu'elle soit piétinée.
  '6':
  - type: text
    content: 'Je ferai d''elle un endroit saccagé: elle ne sera plus taillée ni cultivée,'
  - type: text
    content: les ronces et les buissons épineux y pousseront
  - type: text
    content: et je donnerai mes ordres aux nuages
  - type: text
    content: afin qu'ils ne laissent plus tomber la pluie sur elle.
  '7':
  - type: text
    content: Oui, la vigne de l'Eternel, le maître de l'univers, c'est la communauté d'Israël,
  - type: text
    content: et Juda, c'est le plant qui faisait son plaisir.
  - type: text
    content: Il avait espéré de la droiture et voici de l'injustice,
  - type: text
    content: de la justice et voici des cris d'accusation!
  '8':
  - type: text
    content: Malheur à vous qui ajoutez maison à maison
  - type: text
    content: et qui joignez champ à champ
  - type: text
    content: jusqu'à ce qu'il n'y ait plus d'espace,
  - type: text
    content: au point que vous êtes les seuls à habiter au milieu du pays!
  '9':
  - type: text
    content: 'Voici ce que m''a fait savoir l''Eternel, le maître de l''univers:'
  - type: text
    content: c'est certain, ces nombreuses maisons seront dévastées,
  - type: text
    content: ces grandes et belles maisons n'auront plus d'habitants.
