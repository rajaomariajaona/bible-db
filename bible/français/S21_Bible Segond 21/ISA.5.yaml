document_id: ISA.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israël, vigne de l'Eternel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Je veux chanter à mon ami
- type: usfm
  marker: q1
  children:
  - type: text
    text: le cantique de mon bien-aimé sur sa vigne.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon bien-aimé avait une vigne
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur un coteau fertile.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il a remué son sol, enlevé les pierres et y a mis des plants de premier choix.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a construit une tour au milieu d'elle
- type: usfm
  marker: q1
  children:
  - type: text
    text: et y a installé aussi un pressoir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puis il a espéré qu'elle produirait de bons raisins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais elle en a produit de mauvais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Et maintenant, habitants de Jérusalem et de Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vous en prie, soyez juges entre ma vigne et moi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Qu'y avait-il encore à faire à ma vigne
- type: usfm
  marker: q1
  children:
  - type: text
    text: que je n'aie pas fait pour elle?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi, quand j'ai espéré qu'elle produirait de bons raisins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: en a-t-elle produit de mauvais?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je vais vous faire savoir maintenant
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ce que je vais faire à ma vigne:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'arracherai sa haie pour qu'elle soit dévorée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'abattrai sa clôture pour qu'elle soit piétinée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je ferai d''elle un endroit saccagé: elle ne sera plus taillée ni cultivée,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: les ronces et les buissons épineux y pousseront
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je donnerai mes ordres aux nuages
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin qu'ils ne laissent plus tomber la pluie sur elle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Oui, la vigne de l'Eternel, le maître de l'univers, c'est la communauté d'Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Juda, c'est le plant qui faisait son plaisir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il avait espéré de la droiture et voici de l'injustice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de la justice et voici des cris d'accusation!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Malheur à vous qui ajoutez maison à maison
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui joignez champ à champ
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu'à ce qu'il n'y ait plus d'espace,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au point que vous êtes les seuls à habiter au milieu du pays!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Voici ce que m''a fait savoir l''Eternel, le maître de l''univers:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est certain, ces nombreuses maisons seront dévastées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ces grandes et belles maisons n'auront plus d'habitants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Oui, deux hectares de vigne ne produiront qu'un baril de vin
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dix mesures de semence n'en produiront qu'une.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Malheur à ceux qui courent de bon matin
- type: usfm
  marker: q1
  children:
  - type: text
    text: après les boissons enivrantes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui s'attardent, le soir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu'ils sont échauffés par le vin!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: La harpe et le luth, le tambourin, la flûte et le vin animent leurs banquets,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ils ne font pas attention à l'activité de l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne voient pas ce qu'il fait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Voilà pourquoi mon peuple sera soudain emmené en exil;
- type: usfm
  marker: q1
  children:
  - type: text
    text: son corps d'élite sera composé d'hommes affamés
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa population sera desséchée par la soif.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Voilà pourquoi le séjour des morts s'ouvre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et s'élargit démesurément;
- type: usfm
  marker: q1
  children:
  - type: text
    text: la splendeur et la richesse de Sion y descendent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout comme son joyeux tapage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: L'être humain devra s'incliner, l'homme sera abaissé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout comme les regards des hautains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: L'Eternel, le maître de l'univers, sera élevé par le jugement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Dieu saint sera reconnu comme tel par la justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Des agneaux brouteront là comme sur leur pâturage
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des étrangers dévoreront les décombres des riches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Malheur à ceux qui sont attachés à leur faute par les ficelles de l'illusion
- type: usfm
  marker: q1
  children:
  - type: text
    text: et au péché comme par les cordes d'un chariot
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'et qui disent: «Qu''il se dépêche, qu''il accélère son œuvre'
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin que nous la voyions!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que le plan du Saint d'Israël se réalise bientôt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin que nous en ayons connaissance!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Malheur à ceux qui appellent le mal bien et le bien mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui changent les ténèbres en lumière et la lumière en ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui changent l'amertume en douceur et la douceur en amertume!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Malheur à ceux qui sont sages à leurs propres yeux
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui se croient intelligents!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Malheur à ceux qui sont forts pour boire du vin
- type: usfm
  marker: q1
  children:
  - type: text
    text: et experts dans la préparation des liqueurs fortes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: qui pour un pot-de-vin déclarent juste le coupable
- type: usfm
  marker: q1
  children:
  - type: text
    text: et refusent de rendre justice aux innocents!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Voilà pourquoi, tout comme la langue de feu ne fait qu'une bouchée du chaume
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tout comme l'herbe sèche est incapable de résister à la flamme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leur racine sera pareille à de la pourriture
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur fleur se dissipera comme de la poussière.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, ils ont rejeté la loi de l'Eternel, le maître de l'univers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ont repoussé la parole du Saint d'Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Voilà pourquoi la colère de l'Eternel s'enflamme contre son peuple
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il déploie sa puissance contre lui pour le frapper.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les montagnes tremblent
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les cadavres sont comme des ordures au milieu des rues.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais malgré tout cela, sa colère ne s'est pas détournée
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa puissance est encore déployée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Il dresse un étendard pour les peuples lointains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'il en siffle un d''une extrémité de la terre:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: le voici qui arrive avec rapidité et légèreté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Chez lui, personne n'est fatigué, personne ne trébuche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: personne ne somnole ni ne dort;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aucun n'a sa ceinture détachée, ni la courroie de ses sandales cassée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ses flèches sont affûtées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous ses arcs tendus.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les sabots de ses chevaux sont durs comme de la pierre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les roues de ses chars ont l'aspect d'un tourbillon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Son rugissement est pareil à celui d'une lionne;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'il rugit comme le font de jeunes lions: il gronde, s''empare de sa proie'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'emporte en lieu sûr, sans personne pour la délivrer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ce jour-là, on fera entendre contre lui un grondement
- type: usfm
  marker: q1
  children:
  - type: text
    text: pareil à celui d'une tempête sur la mer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En regardant la terre, on ne verra que ténèbres
- type: usfm
  marker: q1
  children:
  - type: text
    text: et angoisses, et la lumière sera obscurcie par des nuages.
