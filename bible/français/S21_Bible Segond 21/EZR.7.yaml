document_id: EZR.7,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Retour d'exil avec Esdras
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 7.1–10.44
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Esdras à Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Après cela, au cours du règne d''Artaxerxès sur la Perse, arriva Esdras, fils de Seraja, petit-fils d''Azaria et descendant de Hilkija, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: En effet, Esdras avait appliqué son cœur à étudier et mettre en pratique la loi de l'Eternel, et à enseigner ses prescriptions et règles en Israël.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Voici la copie de la lettre donnée par le roi Artaxerxès à Esdras, le prêtre et scribe expert dans le domaine des commandements et prescriptions de l''Eternel relatifs à Israël:'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '«Artaxerxès, roi des rois, à Esdras, prêtre et scribe de la loi du Dieu du ciel, etc. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'J''ai donné l''ordre de laisser partir tous les membres du peuple d''Israël, ses prêtres et les Lévites qui se trouvent dans mon royaume et qui sont volontaires pour t''accompagner à Jérusalem. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'En effet, le roi et ses sept conseillers t''envoient pour inspecter Juda et Jérusalem d''après la loi de ton Dieu, qui est entre tes mains, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'et pour y apporter l''argent et l''or que le roi et ses conseillers ont volontairement offerts au Dieu d''Israël qui a sa demeure à Jérusalem, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ainsi que tout l'argent et l'or que tu trouveras dans toute la province de Babylone, avec les dons volontaires faits par le peuple et les prêtres pour la maison de leur Dieu à Jérusalem.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '»Par conséquent, tu veilleras à acheter avec cet argent des taureaux, des béliers et des agneaux, ainsi que les éléments nécessaires pour les offrandes végétales et les offrandes liquides qui les accompagnent, et tu les offriras sur l''autel de la maison de votre Dieu à Jérusalem. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Avec le reste de l''argent et de l''or, vous ferez ce que vous jugerez bon de faire, toi et tes frères, en vous conformant à la volonté de votre Dieu. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'En ce qui concerne les ustensiles qui te sont remis pour le service de la maison de ton Dieu, dépose-les tous devant le Dieu de Jérusalem. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Shallum, Tsadok, Achithub, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Quant aux dépenses qu'il te faudra encore faire pour la maison de ton Dieu, pourvois-y en puisant dans le dépôt des trésors royaux.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '»Moi, le roi Artaxerxès, voici l''ordre que je donne à tous les trésoriers de la région située à l''ouest de l''Euphrate: On respectera scrupuleusement toutes les demandes d''Esdras, prêtre et scribe de la loi du Dieu du ciel, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'jusqu''à concurrence de 3 tonnes d''argent, 22''000 litres de blé, 2200 litres de vin et 2200 litres d''huile. Quant au sel, il sera livré à volonté. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Qu''on mette du zèle à respecter tous les ordres du Dieu du ciel concernant son temple, afin que sa colère ne vienne pas frapper le royaume, le roi et ses fils. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Nous vous informons qu'il n'est permis de prélever aucune taxe, aucun impôt ni aucun droit de passage sur aucun des prêtres, des Lévites, des musiciens, des portiers, des serviteurs du temple ou autres assistants de cette maison de Dieu.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '»Quant à toi, Esdras, conformément à la sagesse divine qui t''habite, désigne des juges et des magistrats chargés de rendre la justice pour toute la population de la région située à l''ouest de l''Euphrate, pour tous ceux qui connaissent les lois de ton Dieu, et fais-les connaître à ceux qui les ignorent! '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Toute personne qui ne respectera pas fidèlement la loi de ton Dieu et celle du roi devra être condamnée à la mort, à l'exil, à une amende ou à la prison.»
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Béni soit l''Eternel, le Dieu de nos ancêtres, qui a mis dans le cœur du roi un tel intérêt pour la gloire de la maison de l''Eternel à Jérusalem '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: et qui a manifesté sa bonté en m'attirant la faveur du roi, de ses conseillers et de tous ses puissants princes! Pour ma part, fortifié par le fait que la main de l'Eternel, mon Dieu, reposait sur moi, j'ai rassemblé les chefs d'Israël afin qu'ils montent à Jérusalem avec moi.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Amaria, Azaria, Merajoth, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Zerachja, Uzzi, Bukki, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Abishua, Phinées, Eléazar et Aaron, le grand-prêtre. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Cet Esdras monta de Babylone. C''était un scribe versé dans la loi de Moïse donnée par l''Eternel, le Dieu d''Israël. Et comme la main de l''Eternel, son Dieu, reposait sur lui, le roi lui accorda tout ce qu''il avait demandé. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Plusieurs des Israélites, des prêtres et des Lévites, des musiciens, des portiers et des serviteurs du temple, montèrent aussi à Jérusalem, la septième année du roi Artaxerxès. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Esdras arriva à Jérusalem le cinquième mois de la septième année de règne d''Artaxerxès; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'parti de Babylone le premier jour du premier mois, il arriva à Jérusalem le premier jour du cinquième mois, car la bonne main de son Dieu reposait sur lui. '
