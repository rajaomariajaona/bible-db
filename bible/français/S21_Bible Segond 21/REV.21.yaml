document_id: REV.21,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Un nouveau ciel et une nouvelle terre
  - type: text
    content: 'Puis je vis un nouveau ciel et une nouvelle terre, car le premier ciel et la première terre avaient disparu et la mer n''existait plus. '
  '10':
  - type: text
    content: 'Il me transporta en esprit sur une grande et haute montagne et me montra la ville sainte, Jérusalem, qui descendait du ciel, d''auprès de Dieu. '
  '11':
  - type: text
    content: 'Elle rayonnait de la gloire de Dieu. Son éclat ressemblait à celui d''une pierre très précieuse, d''une pierre de jaspe transparente comme du cristal. '
  '12':
  - type: text
    content: 'Elle était entourée d''une grande et haute muraille avec douze portes, et à ces portes douze anges; des noms y étaient inscrits: ceux des douze tribus d''Israël. '
  '13':
  - type: text
    content: 'Il y avait à l''est trois portes, au nord trois portes, au sud trois portes et à l''ouest trois portes. '
  '14':
  - type: text
    content: La muraille de la ville avait douze fondations qui portaient les noms des douze apôtres de l'Agneau.
  '15':
  - type: text
    content: 'Celui qui me parlait avait pour mesure un roseau d''or afin de mesurer la ville, ses portes et sa muraille. '
  '16':
  - type: text
    content: La ville avait la forme d'un carré et sa longueur était égale à sa largeur. L'ange mesura la ville avec le roseau et trouva 2200 kilomètres
  - type: note
    content: '2200 kilomètres: littéralement 12''000 stades.'
  - type: text
    content: '; sa longueur, sa largeur et sa hauteur étaient égales. '
  '17':
  - type: text
    content: Il mesura aussi la muraille et trouva 72 mètres
  - type: note
    content: '72 mètres: littéralement 144 coudées.'
  - type: text
    content: ', selon la mesure humaine qu''employait l''ange.'
  '18':
  - type: text
    content: 'La muraille était construite en jaspe et la ville était en or pur, transparent comme du verre pur. '
  '19':
  - type: text
    content: 'Les fondations de la muraille de la ville étaient ornées de pierres précieuses de toutes sortes: la première fondation était ornée de jaspe, la deuxième de saphir, la troisième de calcédoine, la quatrième d''émeraude, '
  '2':
  - type: text
    content: 'Je vis descendre du ciel, d''auprès de Dieu, la ville sainte, la nouvelle Jérusalem, préparée comme une mariée qui s''est faite belle pour son époux. '
  '20':
  - type: text
    content: 'la cinquième de sardoine, la sixième de cornaline, la septième de chrysolithe, la huitième de béryl, la neuvième de topaze, la dixième de chrysoprase, la onzième d''hyacinthe, la douzième d''améthyste. '
  '21':
  - type: text
    content: Les douze portes étaient douze perles; chaque porte était faite d'une seule perle. La place de la ville était en or pur, comme du verre transparent.
  '22':
  - type: text
    content: 'Je ne vis pas de temple dans la ville, car le Seigneur, le Dieu tout-puissant, est son temple, ainsi que l''Agneau. '
  '23':
  - type: text
    content: 'La ville n''a besoin ni du soleil ni de la lune pour l''éclairer, car la gloire de Dieu l''éclaire et l''Agneau est son flambeau. '
  '24':
  - type: text
    content: 'Les nations marcheront à sa lumière et les rois de la terre y apporteront leur gloire. '
  '25':
  - type: text
    content: 'Ses portes ne seront pas fermées de toute la journée, car il n''y aura plus de nuit. '
  '26':
  - type: text
    content: 'On y apportera la gloire et l''honneur des nations. '
  '27':
  - type: text
    content: Il n'entrera chez elle rien de souillé, ni personne qui se livre à des pratiques abominables et au mensonge; il n'entrera que ceux qui sont inscrits dans le livre de vie de l'Agneau.
  '3':
  - type: text
    content: 'J''entendis une voix forte venant du ciel qui disait: «Voici le tabernacle de Dieu parmi les hommes! '
  - type: text
    content: Il habitera avec eux, ils seront son peuple
  - type: note
    content: 'Il habitera… peuple: citation d''Ezéchiel 37.27.'
  - type: text
    content: ' et Dieu lui-même sera avec eux, [il sera leur Dieu]. '
  '4':
  - type: text
    content: Il essuiera toute larme de leurs yeux, la mort ne sera plus et il n'y aura plus ni deuil, ni cri, ni douleur, car ce qui existait avant a disparu.»
  '5':
  - type: text
    content: 'Celui qui était assis sur le trône dit: «Voici que je fais toutes choses nouvelles.» Il ajouta: «Ecris cela, car ces paroles sont dignes de confiance et vraies.» '
  '6':
  - type: text
    content: 'Puis il me dit: «Je suis l''Alpha et l''Oméga, le commencement et la fin. A celui qui a soif, je donnerai à boire gratuitement de la source de l''eau de la vie. '
  '7':
  - type: text
    content: 'Le vainqueur recevra cet héritage, je serai son Dieu et il sera mon fils. '
  '8':
  - type: text
    content: Quant aux lâches, aux incrédules, [aux pécheurs,] aux abominables, aux meurtriers, à ceux qui vivent dans l'immoralité sexuelle, aux sorciers, aux idolâtres et à tous les menteurs, leur part sera dans l'étang ardent de feu et de soufre. C'est la seconde mort.»
  - type: heading
    content: La nouvelle Jérusalem
  '9':
  - type: text
    content: 'Puis un des sept anges qui tenaient les sept coupes remplies des sept derniers fléaux vint m''adresser la parole et dit: «Viens, je te montrerai la femme, l''épouse de l''Agneau.» '
