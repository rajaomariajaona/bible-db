document_id: REV.21
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Un nouveau ciel et une nouvelle terre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Puis je vis un nouveau ciel et une nouvelle terre, car le premier ciel et la première terre avaient disparu et la mer n''existait plus. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je vis descendre du ciel, d''auprès de Dieu, la ville sainte, la nouvelle Jérusalem, préparée comme une mariée qui s''est faite belle pour son époux. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'J''entendis une voix forte venant du ciel qui disait: «Voici le tabernacle de Dieu parmi les hommes! '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Il habitera avec eux, ils seront son peuple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il habitera… peuple: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezéchiel 37.27
      metadata:
        usfm: EZK.37.27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et Dieu lui-même sera avec eux, [il sera leur Dieu]. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il essuiera toute larme de leurs yeux, la mort ne sera plus et il n'y aura plus ni deuil, ni cri, ni douleur, car ce qui existait avant a disparu.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Celui qui était assis sur le trône dit: «Voici que je fais toutes choses nouvelles.» Il ajouta: «Ecris cela, car ces paroles sont dignes de confiance et vraies.» '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Puis il me dit: «Je suis l''Alpha et l''Oméga, le commencement et la fin. A celui qui a soif, je donnerai à boire gratuitement de la source de l''eau de la vie. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le vainqueur recevra cet héritage, je serai son Dieu et il sera mon fils. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Quant aux lâches, aux incrédules, [aux pécheurs,] aux abominables, aux meurtriers, à ceux qui vivent dans l'immoralité sexuelle, aux sorciers, aux idolâtres et à tous les menteurs, leur part sera dans l'étang ardent de feu et de soufre. C'est la seconde mort.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: La nouvelle Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Puis un des sept anges qui tenaient les sept coupes remplies des sept derniers fléaux vint m''adresser la parole et dit: «Viens, je te montrerai la femme, l''épouse de l''Agneau.» '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il me transporta en esprit sur une grande et haute montagne et me montra la ville sainte, Jérusalem, qui descendait du ciel, d''auprès de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Elle rayonnait de la gloire de Dieu. Son éclat ressemblait à celui d''une pierre très précieuse, d''une pierre de jaspe transparente comme du cristal. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Elle était entourée d''une grande et haute muraille avec douze portes, et à ces portes douze anges; des noms y étaient inscrits: ceux des douze tribus d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il y avait à l''est trois portes, au nord trois portes, au sud trois portes et à l''ouest trois portes. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: La muraille de la ville avait douze fondations qui portaient les noms des douze apôtres de l'Agneau.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Celui qui me parlait avait pour mesure un roseau d''or afin de mesurer la ville, ses portes et sa muraille. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: La ville avait la forme d'un carré et sa longueur était égale à sa largeur. L'ange mesura la ville avec le roseau et trouva 2200 kilomètres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: '2200 kilomètres: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: littéralement 12'000 stades.
    marker-yv: yv-n
  - type: text
    text: '; sa longueur, sa largeur et sa hauteur étaient égales. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il mesura aussi la muraille et trouva 72 mètres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: '72 mètres: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: littéralement 144 coudées.
    marker-yv: yv-n
  - type: text
    text: ', selon la mesure humaine qu''employait l''ange.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'La muraille était construite en jaspe et la ville était en or pur, transparent comme du verre pur. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les fondations de la muraille de la ville étaient ornées de pierres précieuses de toutes sortes: la première fondation était ornée de jaspe, la deuxième de saphir, la troisième de calcédoine, la quatrième d''émeraude, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'la cinquième de sardoine, la sixième de cornaline, la septième de chrysolithe, la huitième de béryl, la neuvième de topaze, la dixième de chrysoprase, la onzième d''hyacinthe, la douzième d''améthyste. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Les douze portes étaient douze perles; chaque porte était faite d'une seule perle. La place de la ville était en or pur, comme du verre transparent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Je ne vis pas de temple dans la ville, car le Seigneur, le Dieu tout-puissant, est son temple, ainsi que l''Agneau. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'La ville n''a besoin ni du soleil ni de la lune pour l''éclairer, car la gloire de Dieu l''éclaire et l''Agneau est son flambeau. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les nations marcheront à sa lumière et les rois de la terre y apporteront leur gloire. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ses portes ne seront pas fermées de toute la journée, car il n''y aura plus de nuit. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'On y apportera la gloire et l''honneur des nations. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Il n'entrera chez elle rien de souillé, ni personne qui se livre à des pratiques abominables et au mensonge; il n'entrera que ceux qui sont inscrits dans le livre de vie de l'Agneau.
