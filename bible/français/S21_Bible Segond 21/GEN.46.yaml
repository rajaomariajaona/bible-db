document_id: GEN.46,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob et sa famille en Egypte
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Israël partit donc avec tout ce qui lui appartenait. Arrivé à Beer-Shéba, il offrit des sacrifices au Dieu de son père Isaac. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Siméon: Jemuel, Jamin, Ohad, Jakin et Tsochar, ainsi que Saül, le fils de la Cananéenne. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Lévi: Guershon, Kehath et Merari. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Juda: Er, Onan, Shéla, Pérets et Zérach; cependant, Er et Onan moururent dans le pays de Canaan. Les fils de Pérets furent Hetsron et Hamul. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils d''Issacar: Thola, Puva, Job et Shimron. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Zabulon: Séred, Elon et Jahleel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voilà quels étaient les descendants que Léa avait donnés à Jacob à Paddan-Aram, en plus de sa fille Dina. Ses descendants et descendantes étaient 33 au total.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Gad: Tsiphjon, Haggi, Shuni, Etsbon, Eri, Arodi et Areéli. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils d''Aser: Jimna, Jishva, Jishvi et Beria ainsi que Sérach, leur sœur. Fils de Beria: Héber et Malkiel. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voilà quels étaient les descendants de Zilpa, la servante dont Laban avait fait cadeau à sa fille Léa; elle donna ces enfants à Jacob, 16 personnes au total.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Rachel, la femme de Jacob: Joseph et Benjamin. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu parla à Israël dans une vision pendant la nuit. Il dit: «Jacob! Jacob!» Israël répondit: «Me voici!» '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En Egypte, Joseph eut Manassé et Ephraïm, que lui donna Asnath, fille de Poti-Phéra, le prêtre d''On. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Benjamin: Béla, Béker, Ashbel, Guéra, Naaman, Ehi, Rosh, Muppim, Huppim et Ard. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voilà quels sont les descendants que Jacob eut par Rachel, 14 personnes au total.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Dan: Hushim. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Nephthali: Jahtseel, Guni, Jetser et Shillem. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voilà quels sont les descendants de Bilha, la servante dont Laban avait fait cadeau à sa fille Rachel; elle donna ces enfants à Jacob, 7 personnes au total.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le nombre total des personnes qui accompagnèrent Jacob en Egypte et qui étaient issues de lui était de 66, sans compter les femmes des fils de Jacob. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joseph avait 2 fils qui lui étaient nés en Egypte. Le nombre total des personnes de la famille de Jacob qui vinrent en Egypte était de 70.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob envoya Juda vers Joseph avant lui pour qu''il lui prépare la voie en Gosen, et ils arrivèrent dans la région de Gosen. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph attela son char et y monta pour aller à la rencontre de son père Israël en Gosen. Dès qu''il le vit, il se jeta à son cou et pleura longtemps sur son épaule. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu dit: «Je suis Dieu, le Dieu de ton père. N''aie pas peur de descendre en Egypte, car là-bas je ferai de toi une grande nation. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Israël dit à Joseph: «Je peux mourir maintenant, puisque tu es encore en vie et que j''ai vu ton visage.»'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph dit à ses frères et à la famille de son père: «Je vais avertir le pharaon et je lui dirai: ‘Mes frères et la famille de mon père, qui étaient dans le pays de Canaan, sont venus vers moi. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces hommes sont bergers, car ils élèvent du bétail. Ils ont amené leurs brebis, leurs bœufs et tout ce qui leur appartient.’ '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand le pharaon vous appellera et demandera: ‘Quelle est votre occupation?’ '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'vous répondrez: ‘Tes serviteurs ont élevé du bétail depuis leur jeunesse jusqu''à présent, tout comme leurs ancêtres.’ De cette manière vous pourrez habiter dans la région de Gosen, puisque tous les bergers font horreur aux Egyptiens.»'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je descendrai moi-même avec toi en Egypte et je t'en ferai moi-même remonter. C'est Joseph qui te fermera les yeux.»
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob quitta Beer-Shéba. Les fils d''Israël installèrent leur père Jacob avec leurs enfants et leurs femmes sur les chariots que le pharaon avait envoyés pour les transporter. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils prirent aussi leurs troupeaux et les biens dont ils étaient devenus propriétaires dans le pays de Canaan. C''est ainsi que Jacob se rendit en Egypte avec toute sa famille. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il emmena avec lui en Egypte ses fils et ses petits-fils, ses filles et ses petites-filles et toute sa famille.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici le nom des descendants d''Israël qui vinrent en Egypte. Il y avait Jacob et ses fils. Fils aîné de Jacob: Ruben. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fils de Ruben: Hénoc, Pallu, Hetsron et Carmi. '
