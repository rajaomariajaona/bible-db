document_id: GAL.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salutation et reproche
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'De la part de Paul, apôtre établi non par des hommes ni par l''intermédiaire d''un homme, mais par Jésus-Christ et par Dieu le Père qui l''a ressuscité, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'et de tous les frères qui sont avec moi aux Eglises de la Galatie: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'que la grâce et la paix vous soient données de la part de Dieu notre Père et du Seigneur Jésus-Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il s''est donné lui-même pour nos péchés afin de nous arracher à l''actuel monde mauvais, conformément à la volonté de notre Dieu et Père '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: à qui soit la gloire aux siècles des siècles! Amen!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je m''étonne que vous vous détourniez si vite de celui qui vous a appelés par la grâce de Christ pour passer à un autre évangile. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ce n''est pas qu''il y ait un autre évangile, mais il y a des gens qui vous troublent et qui veulent déformer l''Evangile de Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais si quelqu''un – même nous ou même un ange venu du ciel – vous annonçait un évangile différent de celui que nous vous avons prêché, qu''il soit maudit! '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nous l''avons déjà dit, et je le répète maintenant: si quelqu''un vous annonce un autre évangile que celui que vous avez reçu, qu''il soit maudit! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Maintenant, est-ce la faveur des hommes que je recherche ou celle de Dieu? Est-ce que je cherche à plaire aux hommes? Si je plaisais encore aux hommes, je ne serais pas serviteur de Christ.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Paul et les autres apôtres: un même Evangile'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Je vous le déclare, frères et sœurs: l''Evangile que j''ai annoncé ne vient pas de l''homme. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'En effet, je ne l''ai moi-même ni reçu ni appris d''un homme, mais par une révélation de Jésus-Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Vous avez d''ailleurs entendu parler de mon comportement autrefois dans le judaïsme: je persécutais à outrance l''Eglise de Dieu, je cherchais à la détruire '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'et j''étais plus avancé dans le judaïsme que beaucoup de ceux de mon âge parmi mon peuple, car j''étais animé d''un zèle excessif pour les traditions de mes ancêtres. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mais Dieu m''avait mis à part dès le ventre de ma mère et m''a appelé par sa grâce. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Lorsqu''il a trouvé bon de révéler son Fils en moi afin que je l''annonce parmi les non-Juifs, je n''ai consulté personne, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: je ne suis même pas monté à Jérusalem vers ceux qui étaient apôtres avant moi, mais je suis aussitôt parti pour l'Arabie; puis je suis retourné à Damas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Trois ans plus tard, je suis monté à Jérusalem pour faire la connaissance de Pierre, et je suis resté quinze jours chez lui. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mais je n''ai vu aucun autre apôtre, si ce n''est Jacques, le frère du Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: En vous écrivant cela, je l'affirme devant Dieu, je ne mens pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Je suis allé ensuite dans les régions de la Syrie et de la Cilicie. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Or, mon visage était inconnu des Eglises de Judée qui sont en Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Elles avaient seulement entendu dire: «Celui qui nous persécutait auparavant annonce maintenant la foi qu''il s''efforçait alors de détruire» '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: et elles rendaient gloire à Dieu à cause de moi.
