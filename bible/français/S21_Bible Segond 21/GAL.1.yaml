document_id: GAL.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation et reproche
  - type: text
    content: 'De la part de Paul, apôtre établi non par des hommes ni par l''intermédiaire d''un homme, mais par Jésus-Christ et par Dieu le Père qui l''a ressuscité, '
  '10':
  - type: text
    content: Maintenant, est-ce la faveur des hommes que je recherche ou celle de Dieu? Est-ce que je cherche à plaire aux hommes? Si je plaisais encore aux hommes, je ne serais pas serviteur de Christ.
  - type: heading
    content: 'Paul et les autres apôtres: un même Evangile'
  '11':
  - type: text
    content: 'Je vous le déclare, frères et sœurs: l''Evangile que j''ai annoncé ne vient pas de l''homme. '
  '12':
  - type: text
    content: 'En effet, je ne l''ai moi-même ni reçu ni appris d''un homme, mais par une révélation de Jésus-Christ. '
  '13':
  - type: text
    content: 'Vous avez d''ailleurs entendu parler de mon comportement autrefois dans le judaïsme: je persécutais à outrance l''Eglise de Dieu, je cherchais à la détruire '
  '14':
  - type: text
    content: 'et j''étais plus avancé dans le judaïsme que beaucoup de ceux de mon âge parmi mon peuple, car j''étais animé d''un zèle excessif pour les traditions de mes ancêtres. '
  '15':
  - type: text
    content: 'Mais Dieu m''avait mis à part dès le ventre de ma mère et m''a appelé par sa grâce. '
  '16':
  - type: text
    content: 'Lorsqu''il a trouvé bon de révéler son Fils en moi afin que je l''annonce parmi les non-Juifs, je n''ai consulté personne, '
  '17':
  - type: text
    content: je ne suis même pas monté à Jérusalem vers ceux qui étaient apôtres avant moi, mais je suis aussitôt parti pour l'Arabie; puis je suis retourné à Damas.
  '18':
  - type: text
    content: 'Trois ans plus tard, je suis monté à Jérusalem pour faire la connaissance de Pierre, et je suis resté quinze jours chez lui. '
  '19':
  - type: text
    content: 'Mais je n''ai vu aucun autre apôtre, si ce n''est Jacques, le frère du Seigneur. '
  '2':
  - type: text
    content: 'et de tous les frères qui sont avec moi aux Eglises de la Galatie: '
  '20':
  - type: text
    content: En vous écrivant cela, je l'affirme devant Dieu, je ne mens pas.
  '21':
  - type: text
    content: 'Je suis allé ensuite dans les régions de la Syrie et de la Cilicie. '
  '22':
  - type: text
    content: 'Or, mon visage était inconnu des Eglises de Judée qui sont en Christ. '
  '23':
  - type: text
    content: 'Elles avaient seulement entendu dire: «Celui qui nous persécutait auparavant annonce maintenant la foi qu''il s''efforçait alors de détruire» '
  '24':
  - type: text
    content: et elles rendaient gloire à Dieu à cause de moi.
  '3':
  - type: text
    content: 'que la grâce et la paix vous soient données de la part de Dieu notre Père et du Seigneur Jésus-Christ. '
  '4':
  - type: text
    content: 'Il s''est donné lui-même pour nos péchés afin de nous arracher à l''actuel monde mauvais, conformément à la volonté de notre Dieu et Père '
  '5':
  - type: text
    content: à qui soit la gloire aux siècles des siècles! Amen!
  '6':
  - type: text
    content: 'Je m''étonne que vous vous détourniez si vite de celui qui vous a appelés par la grâce de Christ pour passer à un autre évangile. '
  '7':
  - type: text
    content: 'Ce n''est pas qu''il y ait un autre évangile, mais il y a des gens qui vous troublent et qui veulent déformer l''Evangile de Christ. '
  '8':
  - type: text
    content: 'Mais si quelqu''un – même nous ou même un ange venu du ciel – vous annonçait un évangile différent de celui que nous vous avons prêché, qu''il soit maudit! '
  '9':
  - type: text
    content: 'Nous l''avons déjà dit, et je le répète maintenant: si quelqu''un vous annonce un autre évangile que celui que vous avez reçu, qu''il soit maudit! '
