document_id: GEN.7,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le déluge
  - type: text
    content: 'L''Eternel dit à Noé: «Entre dans l''arche avec toute ta famille, car je t''ai vu comme juste devant moi dans cette génération. '
  '10':
  - type: text
    content: 'L''eau du déluge frappa la terre 7 jours après. '
  '11':
  - type: text
    content: 'L''an 600 de la vie de Noé, le dix-septième jour du deuxième mois, toutes les sources du grand abîme jaillirent et les écluses du ciel s''ouvrirent. '
  '12':
  - type: text
    content: 'La pluie tomba sur la terre pendant 40 jours et 40 nuits. '
  '13':
  - type: text
    content: 'C''est ce jour-là précisément que Noé, Sem, Cham et Japhet, les fils de Noé, la femme de Noé et les trois femmes de ses fils avec eux étaient entrés dans l''arche, '
  '14':
  - type: text
    content: 'ainsi que tous les animaux selon leur espèce, tout le bétail selon son espèce, tous les reptiles qui rampent sur la terre selon leur espèce, tous les oiseaux selon leur espèce, tous les petits oiseaux, tout ce qui a des ailes. '
  '15':
  - type: text
    content: 'Ils entrèrent dans l''arche avec Noé, deux par deux, issus de toutes les créatures qui ont souffle de vie. '
  '16':
  - type: text
    content: Il en entra, mâle et femelle, de toute espèce, comme Dieu l'avait ordonné à Noé. Puis l'Eternel ferma la porte sur lui.
  '17':
  - type: text
    content: 'Le déluge frappa la terre pendant 40 jours. L''eau grossit et souleva l''arche, et celle-ci s''éleva au-dessus de la terre. '
  '18':
  - type: text
    content: 'L''eau monta et grossit beaucoup sur la terre, et l''arche flotta à la surface de l''eau. '
  '19':
  - type: text
    content: 'L''eau augmenta de plus en plus et toutes les hautes montagnes qui sont sous le ciel tout entier furent recouvertes. '
  '2':
  - type: text
    content: 'Tu prendras avec toi 7 couples de tous les animaux purs, le mâle et sa femelle, une paire des animaux impurs, le mâle et sa femelle, '
  '20':
  - type: text
    content: L'eau monta de 7 mètres et demi au-dessus des montagnes, si bien qu'elles furent recouvertes.
  '21':
  - type: text
    content: 'Tout ce qui vivait sur la terre expira, tant les oiseaux que le bétail et les animaux, tout ce qui pullulait sur la terre et tous les hommes. '
  '22':
  - type: text
    content: 'Tout ce qui avait un souffle de vie dans ses narines et qui se trouvait sur la terre ferme mourut. '
  '23':
  - type: text
    content: 'Dieu fit disparaître tous les êtres qui étaient à la surface du sol, depuis l''homme jusqu''au bétail, aux reptiles et aux oiseaux: ils furent exterminés de la terre. Il ne resta que Noé et ceux qui étaient avec lui dans l''arche. '
  '24':
  - type: text
    content: La crue de l'eau sur la terre dura 150 jours.
  '3':
  - type: text
    content: 'ainsi que 7 couples des oiseaux, mâle et femelle, afin de conserver leur espèce en vie sur toute la surface de la terre. '
  '4':
  - type: text
    content: En effet, encore 7 jours et je ferai tomber la pluie sur la terre pendant 40 jours et 40 nuits. J'exterminerai ainsi de la surface du sol tous les êtres que j'ai créés.»
  '5':
  - type: text
    content: Noé se conforma à tous les ordres que Dieu lui avait donnés.
  '6':
  - type: text
    content: 'Noé avait 600 ans lorsque le déluge frappa la terre. '
  '7':
  - type: text
    content: 'Noé entra dans l''arche avec ses fils, sa femme et les femmes de ses fils pour échapper à l''eau du déluge. '
  '8':
  - type: text
    content: 'Parmi les animaux purs et les animaux impurs, les oiseaux et tout ce qui se déplace sur le sol, '
  '9':
  - type: text
    content: un mâle et une femelle entrèrent dans l'arche avec Noé, deux par deux, comme Dieu l'avait ordonné à Noé.
