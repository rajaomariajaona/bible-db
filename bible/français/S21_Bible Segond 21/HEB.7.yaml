document_id: HEB.7,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Supériorité de Melchisédek sur les Lévites
  - type: text
    content: 'Ce Melchisédek était roi de Salem et prêtre du Dieu très-haut. Il est allé à la rencontre d''Abraham alors que celui-ci revenait de la défaite infligée aux rois; il l''a béni '
  '10':
  - type: text
    content: Il était en effet encore dans les reins de son ancêtre lorsque Melchisédek est allé à la rencontre d'Abraham.
  '11':
  - type: text
    content: 'Si donc la perfection avait été possible à travers le ministère des prêtres lévitiques – car c''est bien sur lui que repose la loi donnée au peuple – était-il encore nécessaire que surgisse un autre prêtre, établi à la manière de Melchisédek, et qu''il soit présenté comme n''étant pas établi à la manière d''Aaron? '
  '12':
  - type: text
    content: 'Puisque le ministère de prêtre a été changé, il y a nécessairement aussi un changement de loi. '
  '13':
  - type: text
    content: 'En effet, celui que visent les passages cités appartient à une autre tribu, dont aucun membre n''a fait le service de l''autel. '
  '14':
  - type: text
    content: 'De fait, il est parfaitement clair que notre Seigneur est issu de Juda, tribu dont Moïse n''a absolument pas parlé concernant la fonction de prêtre. '
  '15':
  - type: text
    content: 'C''est plus évident encore quand cet autre prêtre qui surgit est semblable à Melchisédek, '
  '16':
  - type: text
    content: 'établi non d''après un principe de filiation prescrit par la loi, mais d''après la puissance d''une vie impérissable. '
  '17':
  - type: text
    content: 'De fait, ce témoignage lui est rendu: '
  - type: text
    content: Tu es prêtre pour toujours à la manière de Melchisédek
  - type: text
    content: .
  - type: note
    content: 'Tu es… Melchisédek: reprise de la citation du Psaume 110.4 (voir 5.6).'
  - type: text
    content: ' '
  '18':
  - type: text
    content: 'Il y a ainsi abolition de la règle précédente à cause de son impuissance et de son inutilité, '
  '19':
  - type: text
    content: puisque la loi n'a rien amené à la perfection. Mais par ailleurs, il y a l'introduction d'une meilleure espérance, par laquelle nous nous approchons de Dieu.
  '2':
  - type: text
    content: 'et '
  - type: text
    content: Abraham lui a donné la dîme de tout
  - type: note
    content: 'Abraham… tout: citation de Genèse 14.20.'
  - type: text
    content: '. D''après la signification de son nom, Melchisédek est d''abord roi de justice; ensuite il est roi de Salem, c''est-à-dire roi de paix. '
  '20':
  - type: text
    content: 'Cela ne s''est pas fait sans prestation de serment. '
  '21':
  - type: text
    content: 'En effet, si les Lévites sont devenus prêtres sans qu''un serment soit prêté, Jésus l''est devenu à travers le serment prêté par Dieu qui lui a dit: '
  - type: text
    content: 'Le Seigneur l''a juré, et il ne se rétractera pas: ‘Tu es prêtre pour toujours [à la manière de Melchisédek].’'
  - type: text
    content: ' '
  '22':
  - type: text
    content: C'est pour cela que Jésus est le garant d'une bien meilleure alliance.
  '23':
  - type: text
    content: 'De plus, il y a eu des prêtres lévitiques en assez grand nombre, parce que la mort les empêchait de rester en fonction; '
  '24':
  - type: text
    content: 'mais lui, parce qu''il demeure éternellement, possède la fonction de prêtre qui ne se transmet pas. '
  '25':
  - type: text
    content: Par conséquent, il peut aussi sauver parfaitement ceux qui s'approchent de Dieu à travers lui, puisqu'il est toujours vivant pour intercéder en leur faveur.
  '26':
  - type: text
    content: 'C''est bien un tel grand-prêtre qu''il nous fallait: saint, irréprochable, sans souillure, séparé des pécheurs et plus élevé que le ciel. '
  '27':
  - type: text
    content: 'Il n''a pas besoin comme les autres grands-prêtres d''offrir chaque jour des sacrifices, d''abord pour ses propres péchés, ensuite pour ceux du peuple, car il a accompli ce service une fois pour toutes en s''offrant lui-même en sacrifice. '
  '28':
  - type: text
    content: En effet, la loi établit comme grands-prêtres des hommes sujets à la faiblesse, tandis que la parole du serment prononcé après l'instauration de la loi
  - type: note
    content: 'Serment… loi: écrit par David vers 1000 av. J.-C., le Psaume 110 où apparaît ce serment (voir la citation au verset 21) est en effet postérieur de 300 à 500 ans à la révélation de la loi à Moïse.'
  - type: text
    content: ' établit le Fils, qui est parfait pour l''éternité.'
  '3':
  - type: text
    content: On ne lui connaît ni père ni mère, ni généalogie, ni commencement de jours ni fin de vie, mais, rendu semblable au Fils de Dieu, il reste prêtre pour toujours.
  '4':
  - type: text
    content: 'Remarquez quelle est la grandeur de ce personnage, puisque le patriarche Abraham lui a donné [même] le dixième de son butin. '
  '5':
  - type: text
    content: 'D''après la loi, ceux des descendants de Lévi qui remplissent la fonction de prêtre ont l''ordre de prélever la dîme sur le peuple, c''est-à-dire sur leurs frères, qui sont pourtant issus d''Abraham. '
  '6':
  - type: text
    content: 'Mais Melchisédek, bien que ne figurant pas dans leur généalogie, a prélevé la dîme sur Abraham, et il a béni celui qui avait les promesses. '
  '7':
  - type: text
    content: 'Or, indiscutablement, c''est l''inférieur qui est béni par le supérieur. '
  '8':
  - type: text
    content: 'De plus, dans le cas des descendants de Lévi, ceux qui perçoivent la dîme sont des hommes mortels, tandis que dans le cas de Melchisédek, c''est quelqu''un dont on atteste qu''il est vivant. '
  '9':
  - type: text
    content: 'En outre Lévi, qui perçoit la dîme, l''a pour ainsi dire aussi payée par l''intermédiaire d''Abraham. '
