document_id: HEB.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Supériorité de Melchisédek sur les Lévites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ce Melchisédek était roi de Salem et prêtre du Dieu très-haut. Il est allé à la rencontre d''Abraham alors que celui-ci revenait de la défaite infligée aux rois; il l''a béni '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'et '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Abraham lui a donné la dîme de tout
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Abraham… tout: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Genèse 14.2
      metadata:
        usfm: GEN.14.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '0.'
    marker-yv: yv-n
  - type: text
    text: '. D''après la signification de son nom, Melchisédek est d''abord roi de justice; ensuite il est roi de Salem, c''est-à-dire roi de paix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: On ne lui connaît ni père ni mère, ni généalogie, ni commencement de jours ni fin de vie, mais, rendu semblable au Fils de Dieu, il reste prêtre pour toujours.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Remarquez quelle est la grandeur de ce personnage, puisque le patriarche Abraham lui a donné [même] le dixième de son butin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'D''après la loi, ceux des descendants de Lévi qui remplissent la fonction de prêtre ont l''ordre de prélever la dîme sur le peuple, c''est-à-dire sur leurs frères, qui sont pourtant issus d''Abraham. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais Melchisédek, bien que ne figurant pas dans leur généalogie, a prélevé la dîme sur Abraham, et il a béni celui qui avait les promesses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Or, indiscutablement, c''est l''inférieur qui est béni par le supérieur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'De plus, dans le cas des descendants de Lévi, ceux qui perçoivent la dîme sont des hommes mortels, tandis que dans le cas de Melchisédek, c''est quelqu''un dont on atteste qu''il est vivant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'En outre Lévi, qui perçoit la dîme, l''a pour ainsi dire aussi payée par l''intermédiaire d''Abraham. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il était en effet encore dans les reins de son ancêtre lorsque Melchisédek est allé à la rencontre d'Abraham.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Si donc la perfection avait été possible à travers le ministère des prêtres lévitiques – car c''est bien sur lui que repose la loi donnée au peuple – était-il encore nécessaire que surgisse un autre prêtre, établi à la manière de Melchisédek, et qu''il soit présenté comme n''étant pas établi à la manière d''Aaron? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Puisque le ministère de prêtre a été changé, il y a nécessairement aussi un changement de loi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'En effet, celui que visent les passages cités appartient à une autre tribu, dont aucun membre n''a fait le service de l''autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'De fait, il est parfaitement clair que notre Seigneur est issu de Juda, tribu dont Moïse n''a absolument pas parlé concernant la fonction de prêtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'C''est plus évident encore quand cet autre prêtre qui surgit est semblable à Melchisédek, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'établi non d''après un principe de filiation prescrit par la loi, mais d''après la puissance d''une vie impérissable. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'De fait, ce témoignage lui est rendu: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu es prêtre pour toujours à la manière de Melchisédek
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu es… Melchisédek: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'reprise de la citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 110.4
      metadata:
        usfm: PSA.110.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (voir '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5.6'
      metadata:
        usfm: HEB.5.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il y a ainsi abolition de la règle précédente à cause de son impuissance et de son inutilité, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: puisque la loi n'a rien amené à la perfection. Mais par ailleurs, il y a l'introduction d'une meilleure espérance, par laquelle nous nous approchons de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Cela ne s''est pas fait sans prestation de serment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'En effet, si les Lévites sont devenus prêtres sans qu''un serment soit prêté, Jésus l''est devenu à travers le serment prêté par Dieu qui lui a dit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'Le Seigneur l''a juré, et il ne se rétractera pas: ‘Tu es prêtre pour toujours [à la manière de Melchisédek].’'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: C'est pour cela que Jésus est le garant d'une bien meilleure alliance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'De plus, il y a eu des prêtres lévitiques en assez grand nombre, parce que la mort les empêchait de rester en fonction; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'mais lui, parce qu''il demeure éternellement, possède la fonction de prêtre qui ne se transmet pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Par conséquent, il peut aussi sauver parfaitement ceux qui s'approchent de Dieu à travers lui, puisqu'il est toujours vivant pour intercéder en leur faveur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'C''est bien un tel grand-prêtre qu''il nous fallait: saint, irréprochable, sans souillure, séparé des pécheurs et plus élevé que le ciel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il n''a pas besoin comme les autres grands-prêtres d''offrir chaque jour des sacrifices, d''abord pour ses propres péchés, ensuite pour ceux du peuple, car il a accompli ce service une fois pour toutes en s''offrant lui-même en sacrifice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: En effet, la loi établit comme grands-prêtres des hommes sujets à la faiblesse, tandis que la parole du serment prononcé après l'instauration de la loi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Serment… loi: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'écrit par David vers 1000 av. J.-C., le '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 110
      metadata:
        usfm: PSA.110
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' où apparaît ce serment (voir la citation au verset 21) est en effet postérieur de 300 à 500 ans à la révélation de la loi à Moïse.'
    marker-yv: yv-n
  - type: text
    text: ' établit le Fils, qui est parfait pour l''éternité.'
