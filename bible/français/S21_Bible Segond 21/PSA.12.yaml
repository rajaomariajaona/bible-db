document_id: PSA.12,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les paroles mensongères
  - type: text
    content: Au chef de chœur, sur la harpe à huit cordes. Psaume de David.
  '2':
  - type: text
    content: Sauve-nous, Eternel, car il n'y a plus d'hommes loyaux!
  - type: text
    content: Les fidèles disparaissent du milieu des hommes.
  '3':
  - type: text
    content: On se dit des mensonges les uns aux autres,
  - type: text
    content: on a sur les lèvres des paroles flatteuses,
  - type: text
    content: on parle avec un cœur double.
  '4':
  - type: text
    content: Que l'Eternel extermine toutes les lèvres flatteuses,
  - type: text
    content: la langue qui parle avec arrogance,
  '5':
  - type: text
    content: 'ceux qui disent: «Nous sommes forts par notre langue,'
  - type: text
    content: nous avons nos lèvres avec nous.
  - type: text
    content: Qui pourrait devenir notre maître?»
  '6':
  - type: text
    content: «Parce que les malheureux sont opprimés et que les pauvres gémissent,
  - type: text
    content: maintenant, dit l'Eternel, je me lève,
  - type: text
    content: j'apporte le salut à ceux qui soupirent après lui.»
  '7':
  - type: text
    content: Les paroles de l'Eternel sont des paroles pures,
  - type: text
    content: un argent affiné dans un creuset en argile
  - type: text
    content: et sept fois épuré.
  '8':
  - type: text
    content: Toi, Eternel, tu les garderas,
  - type: text
    content: tu les préserveras pour toujours de ces gens.
  '9':
  - type: text
    content: Les méchants rôdent partout
  - type: text
    content: quand la bassesse règne parmi les hommes.
