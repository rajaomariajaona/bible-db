document_id: PSA.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les paroles mensongères
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur, sur la harpe à huit cordes. Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sauve-nous, Eternel, car il n'y a plus d'hommes loyaux!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les fidèles disparaissent du milieu des hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: On se dit des mensonges les uns aux autres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on a sur les lèvres des paroles flatteuses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on parle avec un cœur double.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Que l'Eternel extermine toutes les lèvres flatteuses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la langue qui parle avec arrogance,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'ceux qui disent: «Nous sommes forts par notre langue,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous avons nos lèvres avec nous.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui pourrait devenir notre maître?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: «Parce que les malheureux sont opprimés et que les pauvres gémissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: maintenant, dit l'Eternel, je me lève,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'apporte le salut à ceux qui soupirent après lui.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les paroles de l'Eternel sont des paroles pures,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un argent affiné dans un creuset en argile
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sept fois épuré.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Toi, Eternel, tu les garderas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu les préserveras pour toujours de ces gens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les méchants rôdent partout
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand la bassesse règne parmi les hommes.
