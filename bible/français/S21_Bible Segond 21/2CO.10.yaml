document_id: 2CO.10
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Défense de l'apostolat de Paul
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 10.1–13.13
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Faiblesse et autorité de Paul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moi Paul, je vous adresse un appel par la douceur et la bonté de Christ, moi qui suis humble quand je suis parmi vous mais plein de hardiesse envers vous quand je suis loin: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: je vous en prie, ne me forcez pas, lorsque je serai présent, à recourir avec hardiesse à l'assurance dont je compte faire preuve contre quelques-uns, contre ceux qui estiment que nous nous conduisons de façon purement humaine.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Si en effet nous vivons dans la réalité humaine, nous ne combattons pas de façon purement humaine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'En effet, les armes avec lesquelles nous combattons ne sont pas humaines, mais elles sont puissantes, grâce à Dieu, pour renverser des forteresses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nous renversons les raisonnements et tout obstacle qui s''élève avec orgueil contre la connaissance de Dieu, et nous faisons toute pensée prisonnière pour qu''elle obéisse à Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nous sommes aussi prêts à punir toute désobéissance dès que votre obéissance sera entière.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Regardez les choses en face! Si quelqu''un est convaincu d''appartenir à Christ, qu''il se dise bien en lui-même que, tout comme il est de Christ, nous le sommes aussi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et même si je me montre un peu trop fier de l''autorité que le Seigneur nous a donnée, pour votre édification et non pour votre ruine, je n''en aurai pas honte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'De fait, je ne veux pas avoir l''air de vous intimider par mes lettres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'En effet, «ses lettres sont sévères et fortes – dit-on – mais quand il est présent, il est faible et sa parole est méprisable.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Que celui qui parle ainsi s''en rende bien compte: nous sommes dans nos actes, une fois présents, exactement tels que nous sommes en paroles dans nos lettres quand nous sommes absents.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nous n''oserions pas nous déclarer égaux ou nous comparer à quelques-uns de ceux qui se recommandent eux-mêmes. Mais en fait, en se mesurant à leur propre mesure et en se comparant à eux-mêmes, ils manquent d''intelligence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quant à nous, nous ne voulons pas nous montrer excessivement fiers, mais seulement dans la limite du champ d''action que Dieu nous a attribué en nous faisant parvenir jusqu''à vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nous ne dépassons pas nos limites, comme si nous n''étions pas venus jusqu''à vous; car c''est bien jusqu''à vous que nous sommes arrivés avec l''Evangile de Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ainsi nous ne nous vantons pas des travaux d''autrui qui sont en dehors de nos limites. Mais nous avons l''espérance, si votre foi augmente, de voir notre œuvre grandir encore parmi vous, dans notre propre champ d''action. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Nous pourrons alors évangéliser les régions situées au-delà de chez vous sans nous vanter du travail déjà fait par d''autres dans leur propre champ d''action. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Que celui qui veut éprouver de la fierté mette sa fierté dans le Seigneur
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Que celui… Seigneur: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jérémie 9.23
      metadata:
        usfm: JER.9.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: En effet, ce n'est pas celui qui se recommande lui-même qui est approuvé, c'est celui que le Seigneur recommande.
