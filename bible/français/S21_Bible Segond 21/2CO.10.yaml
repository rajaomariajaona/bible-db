document_id: 2CO.10,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Défense de l'apostolat de Paul
  - type: heading
    content: 10.1–13.13
  - type: heading
    content: Faiblesse et autorité de Paul
  - type: text
    content: 'Moi Paul, je vous adresse un appel par la douceur et la bonté de Christ, moi qui suis humble quand je suis parmi vous mais plein de hardiesse envers vous quand je suis loin: '
  '10':
  - type: text
    content: 'En effet, «ses lettres sont sévères et fortes – dit-on – mais quand il est présent, il est faible et sa parole est méprisable.» '
  '11':
  - type: text
    content: 'Que celui qui parle ainsi s''en rende bien compte: nous sommes dans nos actes, une fois présents, exactement tels que nous sommes en paroles dans nos lettres quand nous sommes absents.'
  '12':
  - type: text
    content: 'Nous n''oserions pas nous déclarer égaux ou nous comparer à quelques-uns de ceux qui se recommandent eux-mêmes. Mais en fait, en se mesurant à leur propre mesure et en se comparant à eux-mêmes, ils manquent d''intelligence. '
  '13':
  - type: text
    content: 'Quant à nous, nous ne voulons pas nous montrer excessivement fiers, mais seulement dans la limite du champ d''action que Dieu nous a attribué en nous faisant parvenir jusqu''à vous. '
  '14':
  - type: text
    content: 'Nous ne dépassons pas nos limites, comme si nous n''étions pas venus jusqu''à vous; car c''est bien jusqu''à vous que nous sommes arrivés avec l''Evangile de Christ. '
  '15':
  - type: text
    content: 'Ainsi nous ne nous vantons pas des travaux d''autrui qui sont en dehors de nos limites. Mais nous avons l''espérance, si votre foi augmente, de voir notre œuvre grandir encore parmi vous, dans notre propre champ d''action. '
  '16':
  - type: text
    content: 'Nous pourrons alors évangéliser les régions situées au-delà de chez vous sans nous vanter du travail déjà fait par d''autres dans leur propre champ d''action. '
  '17':
  - type: text
    content: Que celui qui veut éprouver de la fierté mette sa fierté dans le Seigneur
  - type: text
    content: .
  - type: note
    content: 'Que celui… Seigneur: citation de Jérémie 9.23.'
  - type: text
    content: ' '
  '18':
  - type: text
    content: En effet, ce n'est pas celui qui se recommande lui-même qui est approuvé, c'est celui que le Seigneur recommande.
  '2':
  - type: text
    content: je vous en prie, ne me forcez pas, lorsque je serai présent, à recourir avec hardiesse à l'assurance dont je compte faire preuve contre quelques-uns, contre ceux qui estiment que nous nous conduisons de façon purement humaine.
  '3':
  - type: text
    content: 'Si en effet nous vivons dans la réalité humaine, nous ne combattons pas de façon purement humaine. '
  '4':
  - type: text
    content: 'En effet, les armes avec lesquelles nous combattons ne sont pas humaines, mais elles sont puissantes, grâce à Dieu, pour renverser des forteresses. '
  '5':
  - type: text
    content: 'Nous renversons les raisonnements et tout obstacle qui s''élève avec orgueil contre la connaissance de Dieu, et nous faisons toute pensée prisonnière pour qu''elle obéisse à Christ. '
  '6':
  - type: text
    content: Nous sommes aussi prêts à punir toute désobéissance dès que votre obéissance sera entière.
  '7':
  - type: text
    content: 'Regardez les choses en face! Si quelqu''un est convaincu d''appartenir à Christ, qu''il se dise bien en lui-même que, tout comme il est de Christ, nous le sommes aussi. '
  '8':
  - type: text
    content: 'Et même si je me montre un peu trop fier de l''autorité que le Seigneur nous a donnée, pour votre édification et non pour votre ruine, je n''en aurai pas honte. '
  '9':
  - type: text
    content: 'De fait, je ne veux pas avoir l''air de vous intimider par mes lettres. '
