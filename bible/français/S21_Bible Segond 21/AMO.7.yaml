document_id: AMO.7,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Visions de l'avenir
  - type: heading
    content: 7.1–9.15
  - type: heading
    content: Visions des sauterelles, du feu et du niveau
  - type: text
    content: 'Le Seigneur, l''Eternel, m''a envoyé cette vision: il formait des sauterelles, au moment où le regain commençait à pousser; c''était le regain après la coupe réservée au roi. '
  '10':
  - type: text
    content: 'Alors Amatsia, prêtre de Béthel, fit dire à Jéroboam, le roi d''Israël: «Amos conspire contre toi au milieu de la communauté d''Israël. Le pays ne peut pas supporter toutes ses paroles. '
  '11':
  - type: text
    content: 'En effet, voici ce que dit Amos: ‘Jéroboam mourra par l''épée et Israël sera exilé loin de son pays.’» '
  '12':
  - type: text
    content: 'Et Amatsia dit à Amos: «Visionnaire, va-t''en, fuis dans le pays de Juda, manges-y ton pain, et là tu prophétiseras. '
  '13':
  - type: text
    content: Mais ne continue pas à prophétiser à Béthel, car c'est un sanctuaire du roi, c'est une maison royale.»
  '14':
  - type: text
    content: 'Amos répondit à Amatsia: «Je ne suis pas prophète, ni fils de prophète, mais je suis berger et je cultive des sycomores. '
  '15':
  - type: text
    content: 'L''Eternel m''a pris derrière le troupeau et c''est lui qui m''a dit: ‘Va prophétiser à mon peuple, Israël!’ '
  '16':
  - type: text
    content: 'Ecoute maintenant la parole de l''Eternel, toi qui dis: ‘Ne prophétise pas contre Israël et ne parle pas contre la famille d''Isaac!’ '
  '17':
  - type: text
    content: 'A cause de cela, voici ce que dit l''Eternel: ‘Ta femme se prostituera dans la ville, tes fils et tes filles tomberont par l''épée, ton champ sera partagé au ruban à mesurer. Toi, tu mourras sur une terre impure, et Israël sera exilé loin de son pays.’»'
  '2':
  - type: text
    content: 'Comme elles dévoraient entièrement l''herbe de la terre, j''ai dit: «Seigneur Eternel, pardonne donc! Comment Jacob subsistera-t-il? Il est si petit!» '
  '3':
  - type: text
    content: 'L''Eternel l''a regretté: «Cela n''arrivera pas», a dit l''Eternel.'
  '4':
  - type: text
    content: 'Le Seigneur, l''Eternel, m''a envoyé cette vision: le Seigneur, l''Eternel, proclamait le jugement par le feu, et le feu avait dévoré le grand abîme et dévorait le territoire. '
  '5':
  - type: text
    content: 'J''ai dit: «Seigneur Eternel, arrête donc! Comment Jacob subsistera-t-il? Il est si petit!» '
  '6':
  - type: text
    content: L'Eternel l'a regretté. «Cela non plus n'arrivera pas», a dit le Seigneur, l'Eternel.
  '7':
  - type: text
    content: 'Il m''a envoyé cette vision: le Seigneur se tenait sur un mur mesuré au ruban, et il avait un niveau dans la main. '
  '8':
  - type: text
    content: 'L''Eternel m''a dit: «Que vois-tu, Amos?» J''ai répondu: «Un niveau.» Et le Seigneur a dit: «Je mettrai le niveau au milieu de mon peuple, d''Israël, je ne lui pardonnerai plus. '
  '9':
  - type: text
    content: Les hauts lieux
  - type: note
    content: 'Hauts lieux: lieux de culte souvent situés sur des hauteurs.'
  - type: text
    content: ' d''Isaac'
  - type: note
    content: 'Isaac: fils d''Abraham et père de Jacob, l''ancêtre d''Israël.'
  - type: text
    content: ' seront dévastés, les sanctuaires d''Israël seront détruits et je me lèverai contre la famille de Jéroboam avec l''épée.»'
  - type: heading
    content: Amos et le prêtre Amatsia
