document_id: AMO.7
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Visions de l'avenir
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 7.1–9.15
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Visions des sauterelles, du feu et du niveau
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le Seigneur, l''Eternel, m''a envoyé cette vision: il formait des sauterelles, au moment où le regain commençait à pousser; c''était le regain après la coupe réservée au roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Comme elles dévoraient entièrement l''herbe de la terre, j''ai dit: «Seigneur Eternel, pardonne donc! Comment Jacob subsistera-t-il? Il est si petit!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'L''Eternel l''a regretté: «Cela n''arrivera pas», a dit l''Eternel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le Seigneur, l''Eternel, m''a envoyé cette vision: le Seigneur, l''Eternel, proclamait le jugement par le feu, et le feu avait dévoré le grand abîme et dévorait le territoire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'J''ai dit: «Seigneur Eternel, arrête donc! Comment Jacob subsistera-t-il? Il est si petit!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: L'Eternel l'a regretté. «Cela non plus n'arrivera pas», a dit le Seigneur, l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il m''a envoyé cette vision: le Seigneur se tenait sur un mur mesuré au ruban, et il avait un niveau dans la main. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L''Eternel m''a dit: «Que vois-tu, Amos?» J''ai répondu: «Un niveau.» Et le Seigneur a dit: «Je mettrai le niveau au milieu de mon peuple, d''Israël, je ne lui pardonnerai plus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les hauts lieux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Hauts lieux: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lieux de culte souvent situés sur des hauteurs.
    marker-yv: yv-n
  - type: text
    text: ' d''Isaac'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Isaac: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fils d'Abraham et père de Jacob, l'ancêtre d'Israël.
    marker-yv: yv-n
  - type: text
    text: ' seront dévastés, les sanctuaires d''Israël seront détruits et je me lèverai contre la famille de Jéroboam avec l''épée.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Amos et le prêtre Amatsia
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors Amatsia, prêtre de Béthel, fit dire à Jéroboam, le roi d''Israël: «Amos conspire contre toi au milieu de la communauté d''Israël. Le pays ne peut pas supporter toutes ses paroles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'En effet, voici ce que dit Amos: ‘Jéroboam mourra par l''épée et Israël sera exilé loin de son pays.’» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Et Amatsia dit à Amos: «Visionnaire, va-t''en, fuis dans le pays de Juda, manges-y ton pain, et là tu prophétiseras. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mais ne continue pas à prophétiser à Béthel, car c'est un sanctuaire du roi, c'est une maison royale.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Amos répondit à Amatsia: «Je ne suis pas prophète, ni fils de prophète, mais je suis berger et je cultive des sycomores. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L''Eternel m''a pris derrière le troupeau et c''est lui qui m''a dit: ‘Va prophétiser à mon peuple, Israël!’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ecoute maintenant la parole de l''Eternel, toi qui dis: ‘Ne prophétise pas contre Israël et ne parle pas contre la famille d''Isaac!’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'A cause de cela, voici ce que dit l''Eternel: ‘Ta femme se prostituera dans la ville, tes fils et tes filles tomberont par l''épée, ton champ sera partagé au ruban à mesurer. Toi, tu mourras sur une terre impure, et Israël sera exilé loin de son pays.’»'
