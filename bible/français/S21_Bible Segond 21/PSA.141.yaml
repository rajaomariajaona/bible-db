document_id: PSA.141
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière pour être délivré des hommes violents
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, je fais appel à toi. Viens vite à mon secours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: écoute-moi quand je fais appel à toi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Que ma prière soit devant toi comme de l'encens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mes mains tendues vers toi comme l'offrande du soir!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Eternel, garde ma bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: veille sur la porte de mes lèvres!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ne permets pas que mon cœur se livre au mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à des actions coupables avec les hommes qui commettent l'injustice!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que je ne prenne aucune part à leurs festins!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Si le juste me frappe, c''est une faveur; s''il me corrige, c''est de l''huile sur ma tête:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle ne s'y refusera pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais je continuerai de prier face à leurs méchancetés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Que leurs juges soient précipités contre les rochers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'on écoutera mes paroles, car elles sont agréables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tout comme lorsqu'on laboure et fend la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nos os sont dispersés devant le séjour des morts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: C'est vers toi, Eternel, Seigneur, que je tourne le regard,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'c''est en toi que je cherche un refuge:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: n'abandonne pas ma vie!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Garde-moi du piège qu'ils me tendent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des embuscades de ceux qui commettent l'injustice!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Que les méchants tombent dans leurs filets
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que moi-même, pendant ce temps, j'y échappe!
