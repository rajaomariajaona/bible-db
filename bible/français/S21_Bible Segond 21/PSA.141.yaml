document_id: PSA.141,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière pour être délivré des hommes violents
  - type: text
    content: Psaume de David.
  - type: text
    content: Eternel, je fais appel à toi. Viens vite à mon secours,
  - type: text
    content: écoute-moi quand je fais appel à toi!
  '10':
  - type: text
    content: Que les méchants tombent dans leurs filets
  - type: text
    content: et que moi-même, pendant ce temps, j'y échappe!
  '2':
  - type: text
    content: Que ma prière soit devant toi comme de l'encens,
  - type: text
    content: et mes mains tendues vers toi comme l'offrande du soir!
  '3':
  - type: text
    content: Eternel, garde ma bouche,
  - type: text
    content: veille sur la porte de mes lèvres!
  '4':
  - type: text
    content: Ne permets pas que mon cœur se livre au mal,
  - type: text
    content: à des actions coupables avec les hommes qui commettent l'injustice!
  - type: text
    content: Que je ne prenne aucune part à leurs festins!
  '5':
  - type: text
    content: 'Si le juste me frappe, c''est une faveur; s''il me corrige, c''est de l''huile sur ma tête:'
  - type: text
    content: elle ne s'y refusera pas,
  - type: text
    content: mais je continuerai de prier face à leurs méchancetés.
  '6':
  - type: text
    content: Que leurs juges soient précipités contre les rochers,
  - type: text
    content: et l'on écoutera mes paroles, car elles sont agréables.
  '7':
  - type: text
    content: Tout comme lorsqu'on laboure et fend la terre,
  - type: text
    content: nos os sont dispersés devant le séjour des morts.
  '8':
  - type: text
    content: C'est vers toi, Eternel, Seigneur, que je tourne le regard,
  - type: text
    content: 'c''est en toi que je cherche un refuge:'
  - type: text
    content: n'abandonne pas ma vie!
  '9':
  - type: text
    content: Garde-moi du piège qu'ils me tendent,
  - type: text
    content: des embuscades de ceux qui commettent l'injustice!
