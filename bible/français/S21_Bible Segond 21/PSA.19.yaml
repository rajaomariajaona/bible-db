document_id: PSA.19,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les œuvres et la parole de Dieu
  - type: text
    content: Au chef de chœur. Psaume de David.
  '10':
  - type: text
    content: La crainte de l'Eternel est pure, elle subsiste pour toujours;
  - type: text
    content: les jugements de l'Eternel sont vrais, ils sont tous justes.
  '11':
  - type: text
    content: Ils sont plus précieux que l'or, que beaucoup d'or fin;
  - type: text
    content: ils sont plus doux que le miel, même le miel qui coule des rayons.
  '12':
  - type: text
    content: Ton serviteur aussi est éclairé par eux;
  - type: text
    content: pour celui qui les respecte, la récompense est grande.
  '13':
  - type: text
    content: Qui discerne ses erreurs?
  - type: text
    content: Pardonne-moi celles que j'ignore.
  '14':
  - type: text
    content: 'Préserve aussi ton serviteur du sentiment d''orgueil:'
  - type: text
    content: qu'il ne domine pas sur moi!
  - type: text
    content: Alors je serai intègre, je ne commettrai pas de grands péchés.
  '15':
  - type: text
    content: Fais bon accueil aux paroles de ma bouche
  - type: text
    content: et aux sentiments de mon cœur,
  - type: text
    content: Eternel, mon rocher, toi qui me rachètes!
  '2':
  - type: text
    content: Le ciel raconte la gloire de Dieu
  - type: text
    content: et l'étendue révèle l'œuvre de ses mains.
  '3':
  - type: text
    content: Le jour en instruit un autre jour,
  - type: text
    content: la nuit en donne connaissance à une autre nuit.
  '4':
  - type: text
    content: Ce n'est pas un langage, ce ne sont pas des paroles,
  - type: text
    content: on n'entend pas leur son.
  '5':
  - type: text
    content: Cependant, *leur voix parcourt toute la terre,
  - type: text
    content: leurs discours vont jusqu'aux extrémités du monde
  - type: note
    content: 'Leur voix… du monde: cité en Romains 10.18 pour illustrer l''annonce de l''Evangile.'
  - type: text
    content: ' où il a dressé une tente pour le soleil.'
  '6':
  - type: text
    content: Et le soleil, pareil à un époux qui sort de sa chambre,
  - type: text
    content: s'élance dans la course avec la joie d'un héros;
  '7':
  - type: text
    content: il se lève à une extrémité du ciel
  - type: text
    content: 'et termine sa course à l''autre extrémité:'
  - type: text
    content: rien n'échappe à sa chaleur.
  '8':
  - type: text
    content: La loi de l'Eternel est parfaite, elle donne du réconfort;
  - type: text
    content: le témoignage de l'Eternel est vrai, il rend sage celui qui manque d'expérience.
  '9':
  - type: text
    content: Les décrets de l'Eternel sont droits, ils réjouissent le cœur;
  - type: text
    content: les commandements de l'Eternel sont clairs, ils éclairent la vue.
