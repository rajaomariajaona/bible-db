document_id: PSA.19
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les œuvres et la parole de Dieu
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Le ciel raconte la gloire de Dieu
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'étendue révèle l'œuvre de ses mains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Le jour en instruit un autre jour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la nuit en donne connaissance à une autre nuit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ce n'est pas un langage, ce ne sont pas des paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on n'entend pas leur son.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Cependant, *leur voix parcourt toute la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs discours vont jusqu'aux extrémités du monde
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Leur voix… du monde: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 10.18
      metadata:
        usfm: ROM.10.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' pour illustrer l''annonce de l''Evangile.'
    marker-yv: yv-n
  - type: text
    text: ' où il a dressé une tente pour le soleil.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Et le soleil, pareil à un époux qui sort de sa chambre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: s'élance dans la course avec la joie d'un héros;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: il se lève à une extrémité du ciel
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et termine sa course à l''autre extrémité:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: rien n'échappe à sa chaleur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: La loi de l'Eternel est parfaite, elle donne du réconfort;
- type: usfm
  marker: q1
  children:
  - type: text
    text: le témoignage de l'Eternel est vrai, il rend sage celui qui manque d'expérience.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les décrets de l'Eternel sont droits, ils réjouissent le cœur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les commandements de l'Eternel sont clairs, ils éclairent la vue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: La crainte de l'Eternel est pure, elle subsiste pour toujours;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les jugements de l'Eternel sont vrais, ils sont tous justes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ils sont plus précieux que l'or, que beaucoup d'or fin;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sont plus doux que le miel, même le miel qui coule des rayons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ton serviteur aussi est éclairé par eux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour celui qui les respecte, la récompense est grande.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Qui discerne ses erreurs?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pardonne-moi celles que j'ignore.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Préserve aussi ton serviteur du sentiment d''orgueil:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'il ne domine pas sur moi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors je serai intègre, je ne commettrai pas de grands péchés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Fais bon accueil aux paroles de ma bouche
- type: usfm
  marker: q1
  children:
  - type: text
    text: et aux sentiments de mon cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, mon rocher, toi qui me rachètes!
