document_id: ACT.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Témoignage à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 1.1–8.3
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ascension de Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Cher Théophile, dans mon premier livre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Théophile… premier livre: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'une comparaison avec '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luc 1.1-4
      metadata:
        usfm: LUK.1.1+LUK.1.2+LUK.1.3+LUK.1.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' montre que le livre des Actes est la suite de l''Evangile de Luc.'
    marker-yv: yv-n
  - type: text
    text: ', j''ai parlé de tout ce que Jésus a commencé de faire et d''enseigner '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'jusqu''au jour où il a été enlevé au ciel après avoir donné ses ordres, par le Saint-Esprit, aux apôtres qu''il avait choisis. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Après avoir souffert, il se présenta à eux vivant et leur en donna de nombreuses preuves: pendant 40 jours, il se montra à eux et parla de ce qui concerne le royaume de Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Alors qu''il se trouvait en leur compagnie, il leur recommanda de ne pas s''éloigner de Jérusalem, mais d''attendre ce que le Père avait promis, «ce que je vous ai annoncé, leur dit-il, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'car Jean a baptisé d''eau, mais vous, dans peu de jours, vous serez baptisés du Saint-Esprit.» '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Alors que les apôtres étaient réunis, ils lui demandèrent: «Seigneur, est-ce à ce moment-là que tu rétabliras le royaume pour Israël?» '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il leur répondit: «Ce n''est pas à vous de connaître les temps ou les moments que le Père a fixés de sa propre autorité. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mais vous recevrez une puissance lorsque le Saint-Esprit viendra sur vous, et vous serez mes témoins à Jérusalem, dans toute la Judée, dans la Samarie et jusqu'aux extrémités de la terre.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Après avoir dit cela, il s''éleva dans les airs pendant qu''ils le regardaient et une nuée le cacha à leurs yeux. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et comme ils avaient les regards fixés vers le ciel pendant qu''il s''en allait, deux hommes habillés de blanc leur apparurent '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'et dirent: «Hommes de Galilée, pourquoi restez-vous à regarder le ciel? Ce Jésus qui a été enlevé au ciel du milieu de vous reviendra de la même manière que vous l''avez vu aller au ciel.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors ils retournèrent à Jérusalem, de la colline appelée mont des Oliviers qui est près de Jérusalem, à la distance d''un kilomètre environ. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Quand ils furent arrivés, ils montèrent à l'étage dans la pièce où ils se tenaient d'ordinaire; il y avait là Pierre, Jean, Jacques, André, Philippe, Thomas, Barthélémy, Matthieu, Jacques, fils d'Alphée, Simon le zélote
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Zélote: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: terme qui désignait une personne zélée pour la loi ou le membre d'un parti de patriotes juifs créé afin de résister aux Romains.
    marker-yv: yv-n
  - type: text
    text: ' et Jude, fils de Jacques. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tous persévéraient d'un commun accord dans la prière avec les femmes, avec Marie la mère de Jésus et avec les frères de Jésus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Matthias désigné à la place de Judas
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'A cette époque-là, Pierre se leva au milieu des disciples; le nombre des personnes réunies était d''environ 120. Il dit: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: «Mes frères, il fallait que s'accomplisse l'Ecriture
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''Ecriture: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire l'Ancien Testament.
    marker-yv: yv-n
  - type: text
    text: ', ce que le Saint-Esprit avait annoncé d''avance par la bouche de David au sujet de Judas, devenu le guide de ceux qui ont arrêté Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il était l''un des nôtres et il avait part au même ministère. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Cet homme a acheté un champ avec le salaire du crime; il y est tombé en avant, s''est éventré et toutes ses entrailles sont sorties. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tous les habitants de Jérusalem l''ont appris, c''est pourquoi ce champ a été appelé dans leur langue ‘Hakeldama’, c''est-à-dire ‘le champ du sang’. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Or il est écrit dans le livre des Psaumes: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Que sa maison devienne déserte et que personne ne l'habite!
  - type: text
    text: 'et: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Qu'un autre prenne sa charge!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Que sa maison… sa charge: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation des '
    - type: text
      text: 'Psaumes 69.26 et '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '109.8'
      metadata:
        usfm: PSA.109.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '»Il faut donc choisir un homme parmi ceux qui nous ont accompagnés tout le temps où le Seigneur Jésus a vécu avec nous, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: depuis le baptême de Jean jusqu'au jour où il a été enlevé du milieu de nous. Il nous sera associé comme témoin de sa résurrection.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ils en présentèrent deux: Joseph appelé Barsabbas, surnommé Justus, et Matthias. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Puis ils firent cette prière: «Seigneur, toi qui connais le cœur de tous, désigne lequel de ces deux hommes tu as choisi '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'pour prendre part à ce ministère et à cette charge d''apôtre que Judas a abandonnés pour aller à la place qui est la sienne.» '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ils tirèrent au sort et le sort tomba sur Matthias, qui fut associé aux onze apôtres.
