document_id: ACT.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Témoignage à Jérusalem
  - type: heading
    content: 1.1–8.3
  - type: heading
    content: Ascension de Christ
  - type: text
    content: Cher Théophile, dans mon premier livre
  - type: note
    content: 'Théophile… premier livre: une comparaison avec Luc 1.1-4 montre que le livre des Actes est la suite de l''Evangile de Luc.'
  - type: text
    content: ', j''ai parlé de tout ce que Jésus a commencé de faire et d''enseigner '
  '10':
  - type: text
    content: 'Et comme ils avaient les regards fixés vers le ciel pendant qu''il s''en allait, deux hommes habillés de blanc leur apparurent '
  '11':
  - type: text
    content: 'et dirent: «Hommes de Galilée, pourquoi restez-vous à regarder le ciel? Ce Jésus qui a été enlevé au ciel du milieu de vous reviendra de la même manière que vous l''avez vu aller au ciel.»'
  '12':
  - type: text
    content: 'Alors ils retournèrent à Jérusalem, de la colline appelée mont des Oliviers qui est près de Jérusalem, à la distance d''un kilomètre environ. '
  '13':
  - type: text
    content: Quand ils furent arrivés, ils montèrent à l'étage dans la pièce où ils se tenaient d'ordinaire; il y avait là Pierre, Jean, Jacques, André, Philippe, Thomas, Barthélémy, Matthieu, Jacques, fils d'Alphée, Simon le zélote
  - type: note
    content: 'Zélote: terme qui désignait une personne zélée pour la loi ou le membre d''un parti de patriotes juifs créé afin de résister aux Romains.'
  - type: text
    content: ' et Jude, fils de Jacques. '
  '14':
  - type: text
    content: Tous persévéraient d'un commun accord dans la prière avec les femmes, avec Marie la mère de Jésus et avec les frères de Jésus.
  - type: heading
    content: Matthias désigné à la place de Judas
  '15':
  - type: text
    content: 'A cette époque-là, Pierre se leva au milieu des disciples; le nombre des personnes réunies était d''environ 120. Il dit: '
  '16':
  - type: text
    content: «Mes frères, il fallait que s'accomplisse l'Ecriture
  - type: note
    content: 'L''Ecriture: c''est-à-dire l''Ancien Testament.'
  - type: text
    content: ', ce que le Saint-Esprit avait annoncé d''avance par la bouche de David au sujet de Judas, devenu le guide de ceux qui ont arrêté Jésus. '
  '17':
  - type: text
    content: 'Il était l''un des nôtres et il avait part au même ministère. '
  '18':
  - type: text
    content: 'Cet homme a acheté un champ avec le salaire du crime; il y est tombé en avant, s''est éventré et toutes ses entrailles sont sorties. '
  '19':
  - type: text
    content: 'Tous les habitants de Jérusalem l''ont appris, c''est pourquoi ce champ a été appelé dans leur langue ‘Hakeldama’, c''est-à-dire ‘le champ du sang’. '
  '2':
  - type: text
    content: 'jusqu''au jour où il a été enlevé au ciel après avoir donné ses ordres, par le Saint-Esprit, aux apôtres qu''il avait choisis. '
  '20':
  - type: text
    content: 'Or il est écrit dans le livre des Psaumes: '
  - type: text
    content: Que sa maison devienne déserte et que personne ne l'habite!
  - type: text
    content: 'et: '
  - type: text
    content: Qu'un autre prenne sa charge!
  - type: note
    content: 'Que sa maison… sa charge: citation des Psaumes 69.26 et 109.8.'
  '21':
  - type: text
    content: '»Il faut donc choisir un homme parmi ceux qui nous ont accompagnés tout le temps où le Seigneur Jésus a vécu avec nous, '
  '22':
  - type: text
    content: depuis le baptême de Jean jusqu'au jour où il a été enlevé du milieu de nous. Il nous sera associé comme témoin de sa résurrection.»
  '23':
  - type: text
    content: 'Ils en présentèrent deux: Joseph appelé Barsabbas, surnommé Justus, et Matthias. '
  '24':
  - type: text
    content: 'Puis ils firent cette prière: «Seigneur, toi qui connais le cœur de tous, désigne lequel de ces deux hommes tu as choisi '
  '25':
  - type: text
    content: 'pour prendre part à ce ministère et à cette charge d''apôtre que Judas a abandonnés pour aller à la place qui est la sienne.» '
  '26':
  - type: text
    content: Ils tirèrent au sort et le sort tomba sur Matthias, qui fut associé aux onze apôtres.
  '3':
  - type: text
    content: 'Après avoir souffert, il se présenta à eux vivant et leur en donna de nombreuses preuves: pendant 40 jours, il se montra à eux et parla de ce qui concerne le royaume de Dieu.'
  '4':
  - type: text
    content: 'Alors qu''il se trouvait en leur compagnie, il leur recommanda de ne pas s''éloigner de Jérusalem, mais d''attendre ce que le Père avait promis, «ce que je vous ai annoncé, leur dit-il, '
  '5':
  - type: text
    content: 'car Jean a baptisé d''eau, mais vous, dans peu de jours, vous serez baptisés du Saint-Esprit.» '
  '6':
  - type: text
    content: 'Alors que les apôtres étaient réunis, ils lui demandèrent: «Seigneur, est-ce à ce moment-là que tu rétabliras le royaume pour Israël?» '
  '7':
  - type: text
    content: 'Il leur répondit: «Ce n''est pas à vous de connaître les temps ou les moments que le Père a fixés de sa propre autorité. '
  '8':
  - type: text
    content: Mais vous recevrez une puissance lorsque le Saint-Esprit viendra sur vous, et vous serez mes témoins à Jérusalem, dans toute la Judée, dans la Samarie et jusqu'aux extrémités de la terre.»
  '9':
  - type: text
    content: 'Après avoir dit cela, il s''éleva dans les airs pendant qu''ils le regardaient et une nuée le cacha à leurs yeux. '
