document_id: PSA.63,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La soif de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Psaume de David, lorsqu'il était dans le désert de Juda.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: mais ceux qui cherchent à ruiner ma vie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: iront dans les profondeurs de la terre.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ils seront livrés à l'épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils seront la proie des chacals.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Le roi se réjouira en Dieu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout homme qui prête serment par lui pourra s'en féliciter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car la bouche des menteurs sera fermée.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: O Dieu, tu es mon Dieu, je te cherche.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon âme a soif de toi, mon corps soupire après toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans une terre aride, desséchée, sans eau.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: C'est pourquoi je t'ai contemplé dans le sanctuaire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour voir ta force et ta gloire,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: car ta bonté vaut mieux que la vie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes lèvres célèbrent tes louanges.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ainsi je te bénirai toute ma vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je lèverai mes mains en faisant appel à toi.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Je serai rassasié comme par une nourriture succulente et abondante,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, avec des cris de joie sur les lèvres, je te célébrerai,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: lorsque je penserai à toi sur mon lit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsque je méditerai sur toi pendant les heures de la nuit.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Oui, tu es mon secours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je crie de joie à l'ombre de tes ailes.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mon âme est attachée à toi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta main droite me soutient,
