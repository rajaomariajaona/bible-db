document_id: PSA.63,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La soif de Dieu
  - type: text
    content: Psaume de David, lorsqu'il était dans le désert de Juda.
  '10':
  - type: text
    content: mais ceux qui cherchent à ruiner ma vie
  - type: text
    content: iront dans les profondeurs de la terre.
  '11':
  - type: text
    content: Ils seront livrés à l'épée,
  - type: text
    content: ils seront la proie des chacals.
  '12':
  - type: text
    content: Le roi se réjouira en Dieu;
  - type: text
    content: tout homme qui prête serment par lui pourra s'en féliciter,
  - type: text
    content: car la bouche des menteurs sera fermée.
  '2':
  - type: text
    content: O Dieu, tu es mon Dieu, je te cherche.
  - type: text
    content: Mon âme a soif de toi, mon corps soupire après toi,
  - type: text
    content: dans une terre aride, desséchée, sans eau.
  '3':
  - type: text
    content: C'est pourquoi je t'ai contemplé dans le sanctuaire
  - type: text
    content: pour voir ta force et ta gloire,
  '4':
  - type: text
    content: car ta bonté vaut mieux que la vie.
  - type: text
    content: Mes lèvres célèbrent tes louanges.
  '5':
  - type: text
    content: Ainsi je te bénirai toute ma vie,
  - type: text
    content: je lèverai mes mains en faisant appel à toi.
  '6':
  - type: text
    content: Je serai rassasié comme par une nourriture succulente et abondante,
  - type: text
    content: et, avec des cris de joie sur les lèvres, je te célébrerai,
  '7':
  - type: text
    content: lorsque je penserai à toi sur mon lit,
  - type: text
    content: lorsque je méditerai sur toi pendant les heures de la nuit.
  '8':
  - type: text
    content: Oui, tu es mon secours,
  - type: text
    content: et je crie de joie à l'ombre de tes ailes.
  '9':
  - type: text
    content: Mon âme est attachée à toi.
  - type: text
    content: Ta main droite me soutient,
