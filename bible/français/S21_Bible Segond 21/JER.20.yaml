document_id: JER.20,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Pashhur, fils d''Immer, prêtre et inspecteur en chef dans la maison de l''Eternel, entendit Jérémie prophétiser cela. '
  '10':
  - type: text
    content: En effet, j'entends les calomnies de plusieurs,
  - type: text
    content: 'la terreur règne de tous côtés:'
  - type: text
    content: '‘Dénoncez-le!’ ou: ‘Nous le dénoncerons!’'
  - type: text
    content: Tous ceux qui étaient en paix avec moi
  - type: text
    content: 'm''observent pour voir si je vais trébucher:'
  - type: text
    content: ‘Peut-être se laissera-t-il surprendre,
  - type: text
    content: alors nous serons plus forts que lui
  - type: text
    content: et nous nous vengerons de lui!’
  '11':
  - type: text
    content: »Cependant, l'Eternel est avec moi, pareil à un héros redoutable.
  - type: text
    content: C'est pourquoi mes persécuteurs trébucheront,
  - type: text
    content: ils ne seront pas les plus forts.
  - type: text
    content: Leur honte sera grande car ils ne réussiront pas,
  - type: text
    content: ils seront déshonorés pour toujours, et cela ne s'oubliera pas.
  '12':
  - type: text
    content: L'Eternel, le maître de l'univers, met le juste à l'épreuve,
  - type: text
    content: il examine les reins et le cœur.
  - type: text
    content: »Je verrai ta vengeance s'exercer contre eux,
  - type: text
    content: car c'est à toi que j'ai confié ma cause.
  '13':
  - type: text
    content: Chantez en l'honneur de l'Eternel, louez l'Eternel!
  - type: text
    content: Oui, il délivre le faible des méchants.
  '14':
  - type: text
    content: »Maudit soit le jour où je suis né!
  - type: text
    content: Que le jour où ma mère m'a mis au monde
  - type: text
    content: ne soit pas béni!
  '15':
  - type: text
    content: 'Maudit soit l''homme qui a annoncé à mon père:'
  - type: text
    content: ‘Tu as eu un fils’ et qui l'a comblé de joie!
  '16':
  - type: text
    content: Que cet homme soit pareil aux villes
  - type: text
    content: 'que l''Eternel a démolies sans aucun regret:'
  - type: text
    content: qu'il entende des plaintes le matin
  - type: text
    content: et des cris de guerre au milieu de la journée,
  '17':
  - type: text
    content: parce qu'il ne m'a pas fait mourir dans le ventre de ma mère.
  - type: text
    content: Ma mère m'aurait servi de tombeau,
  - type: text
    content: elle m'aurait porté sans fin.
  '18':
  - type: text
    content: Pourquoi suis-je sorti du ventre maternel,
  - type: text
    content: si c'est pour connaître le malheur et la douleur
  - type: text
    content: et pour finir ma vie dans la honte?»
  '2':
  - type: text
    content: 'Il frappa alors le prophète Jérémie et le mit en prison à la porte supérieure de Benjamin, dans la maison de l''Eternel. '
  '3':
  - type: text
    content: 'Le lendemain, Pashhur fit sortir Jérémie de prison. Jérémie lui dit: «Ce n''est plus par le nom de Pashhur que l''Eternel t''appelle, mais par celui de Magor-Missabib, '
  '4':
  - type: text
    content: 'car voici ce que dit l''Eternel: ‘Je vais te livrer à la terreur, toi et tous tes amis. Ils tomberont sous les coups d''épée de leurs ennemis, et tes yeux le verront. Je livrerai aussi tout Juda entre les mains du roi de Babylone: il les emmènera prisonniers à Babylone et les frappera avec l''épée. '
  '5':
  - type: text
    content: 'Je livrerai toutes les richesses de cette ville, tout ce qu''elle a mis en réserve, tout ce qu''elle a de précieux, tous les trésors des rois de Juda, je livrerai tout à leurs ennemis. Ils pilleront, enlèveront et transporteront tout à Babylone. '
  '6':
  - type: text
    content: Et toi, Pashhur, tu partiras en exil avec tous ceux qui habitent chez toi. Tu iras à Babylone et c'est là que tu mourras, c'est là que tu seras enterré, toi et tous tes amis auxquels tu as prophétisé des faussetés.’
  '7':
  - type: text
    content: »Tu m'as persuadé, Eternel, et je me suis laissé persuader.
  - type: text
    content: Tu y es allé fort avec moi et tu as gagné.
  - type: text
    content: Je suis chaque jour un sujet de raillerie,
  - type: text
    content: tout le monde se moque de moi.
  '8':
  - type: text
    content: En effet, chaque fois que je parle, il faut que je crie,
  - type: text
    content: que je crie pour dénoncer la violence et la persécution!
  - type: text
    content: Oui, la parole de l'Eternel m'expose constamment
  - type: text
    content: à la honte et aux moqueries.
  '9':
  - type: text
    content: '»Si je dis: ‘Je ne ferai plus mention de lui,'
  - type: text
    content: je ne parlerai plus en son nom’,
  - type: text
    content: alors il y a dans mon cœur comme un feu dévorant
  - type: text
    content: qui est retenu dans mes os.
  - type: text
    content: Je me fatigue à essayer de le contenir, sans y parvenir.
