document_id: JER.20,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Pashhur, fils d''Immer, prêtre et inspecteur en chef dans la maison de l''Eternel, entendit Jérémie prophétiser cela. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: En effet, j'entends les calomnies de plusieurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'la terreur règne de tous côtés:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘Dénoncez-le!’ ou: ‘Nous le dénoncerons!’'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui étaient en paix avec moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'm''observent pour voir si je vais trébucher:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Peut-être se laissera-t-il surprendre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors nous serons plus forts que lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et nous nous vengerons de lui!’
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: »Cependant, l'Eternel est avec moi, pareil à un héros redoutable.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est pourquoi mes persécuteurs trébucheront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne seront pas les plus forts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur honte sera grande car ils ne réussiront pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils seront déshonorés pour toujours, et cela ne s'oubliera pas.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: L'Eternel, le maître de l'univers, met le juste à l'épreuve,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il examine les reins et le cœur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Je verrai ta vengeance s'exercer contre eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c'est à toi que j'ai confié ma cause.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Chantez en l'honneur de l'Eternel, louez l'Eternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, il délivre le faible des méchants.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: »Maudit soit le jour où je suis né!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le jour où ma mère m'a mis au monde
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne soit pas béni!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Maudit soit l''homme qui a annoncé à mon père:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Tu as eu un fils’ et qui l'a comblé de joie!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Que cet homme soit pareil aux villes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'que l''Eternel a démolies sans aucun regret:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'il entende des plaintes le matin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et des cris de guerre au milieu de la journée,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: parce qu'il ne m'a pas fait mourir dans le ventre de ma mère.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma mère m'aurait servi de tombeau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle m'aurait porté sans fin.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Pourquoi suis-je sorti du ventre maternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si c'est pour connaître le malheur et la douleur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour finir ma vie dans la honte?»
  '2':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il frappa alors le prophète Jérémie et le mit en prison à la porte supérieure de Benjamin, dans la maison de l''Eternel. '
  '3':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Le lendemain, Pashhur fit sortir Jérémie de prison. Jérémie lui dit: «Ce n''est plus par le nom de Pashhur que l''Eternel t''appelle, mais par celui de Magor-Missabib, '
  '4':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'car voici ce que dit l''Eternel: ‘Je vais te livrer à la terreur, toi et tous tes amis. Ils tomberont sous les coups d''épée de leurs ennemis, et tes yeux le verront. Je livrerai aussi tout Juda entre les mains du roi de Babylone: il les emmènera prisonniers à Babylone et les frappera avec l''épée. '
  '5':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Je livrerai toutes les richesses de cette ville, tout ce qu''elle a mis en réserve, tout ce qu''elle a de précieux, tous les trésors des rois de Juda, je livrerai tout à leurs ennemis. Ils pilleront, enlèveront et transporteront tout à Babylone. '
  '6':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Et toi, Pashhur, tu partiras en exil avec tous ceux qui habitent chez toi. Tu iras à Babylone et c'est là que tu mourras, c'est là que tu seras enterré, toi et tous tes amis auxquels tu as prophétisé des faussetés.’
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: »Tu m'as persuadé, Eternel, et je me suis laissé persuader.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu y es allé fort avec moi et tu as gagné.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis chaque jour un sujet de raillerie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout le monde se moque de moi.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: En effet, chaque fois que je parle, il faut que je crie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que je crie pour dénoncer la violence et la persécution!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, la parole de l'Eternel m'expose constamment
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à la honte et aux moqueries.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '»Si je dis: ‘Je ne ferai plus mention de lui,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne parlerai plus en son nom’,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors il y a dans mon cœur comme un feu dévorant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui est retenu dans mes os.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me fatigue à essayer de le contenir, sans y parvenir.
