document_id: 2KI.6,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Les membres de la communauté de prophètes dirent à Elisée: «L''endroit où nous nous tenons assis devant toi est trop petit pour nous. '
  '10':
  - type: text
    content: 'Le roi d''Israël envoya des hommes se tenir en observation à l''endroit que lui avait mentionné et signalé l''homme de Dieu. Cela ne se produisit pas seulement une ou deux fois, '
  '11':
  - type: text
    content: 'si bien que le roi de Syrie en eut le cœur tout troublé. Il appela ses serviteurs et leur dit: «Allez-vous enfin me dire lequel de nous est partisan du roi d''Israël?» '
  '12':
  - type: text
    content: 'L''un de ses serviteurs répondit: «Personne, mon seigneur le roi. C''est Elisée, le prophète qui est en Israël, qui rapporte au roi d''Israël les paroles que tu prononces dans ta chambre à coucher.» '
  '13':
  - type: text
    content: 'Le roi dit: «Allez repérer où il est et je le ferai capturer.» On vint lui dire: «Il est à Dothan.» '
  '14':
  - type: text
    content: 'Le roi de Syrie y envoya des chevaux, des chars et une forte troupe, qui arrivèrent de nuit et qui encerclèrent la ville. '
  '15':
  - type: text
    content: 'Le serviteur de l''homme de Dieu se leva de bon matin pour sortir de la ville, et il vit qu''une troupe la cernait, avec des chevaux et des chars. Il dit alors à l''homme de Dieu: «Ah, mon seigneur, comment ferons-nous?» '
  '16':
  - type: text
    content: 'Il répondit: «N''aie pas peur, car ceux qui sont avec nous sont plus nombreux que ceux qui sont avec eux.» '
  '17':
  - type: text
    content: 'Puis Elisée pria: «Eternel, ouvre ses yeux pour qu''il voie.» L''Eternel ouvrit les yeux du serviteur, et il vit la montagne pleine de chevaux et de chars de feu tout autour d''Elisée.'
  '18':
  - type: text
    content: 'Les Syriens descendirent vers Elisée. Il adressa alors cette prière à l''Eternel: «Veuille frapper cette nation d''aveuglement!» Et l''Eternel les frappa d''aveuglement, conformément à la parole d''Elisée. '
  '19':
  - type: text
    content: 'Elisée leur dit: «Ce n''est pas le bon chemin et ce n''est pas la bonne ville. Suivez-moi et je vous conduirai vers l''homme que vous cherchez.» Il les conduisit à Samarie. '
  '2':
  - type: text
    content: 'Allons jusqu''au Jourdain! Nous y prendrons chacun une poutre et nous nous y ferons un lieu de réunion.» Elisée répondit: «Allez-y.» '
  '20':
  - type: text
    content: 'Lorsqu''ils furent entrés dans Samarie, Elisée dit: «Eternel, ouvre les yeux de ces hommes pour qu''ils voient!» L''Eternel ouvrit leurs yeux, et ils virent qu''ils étaient en plein milieu de Samarie. '
  '21':
  - type: text
    content: 'A leur vue, le roi d''Israël dit à Elisée: «Faut-il les tuer, mon père?» '
  '22':
  - type: text
    content: 'Elisée répondit: «Tu ne les tueras pas. Est-ce que tu mets à mort ceux que tu fais prisonniers grâce à ton épée et ton arc? Donne-leur du pain et de l''eau, afin qu''ils mangent et boivent, et qu''ils repartent ensuite vers leur seigneur.» '
  '23':
  - type: text
    content: Le roi d'Israël leur fit servir un grand repas, et ils mangèrent et burent. Puis il les renvoya et ils repartirent vers leur maître. Les troupes des Syriens ne revinrent plus sur le territoire d'Israël.
  - type: heading
    content: Siège et délivrance de Samarie
  '24':
  - type: text
    content: 'Après cela, Ben-Hadad, le roi de Syrie, rassembla toute son armée, monta contre Samarie et l''assiégea. '
  '25':
  - type: text
    content: 'Il y eut une grande famine dans la ville. Le siège fut si long qu''une tête d''âne valait 80 pièces d''argent, et le quart de litre de crotte de pigeon 5 pièces d''argent. '
  '26':
  - type: text
    content: 'Alors que le roi passait sur la muraille, une femme lui cria: «Sauve-moi, mon seigneur le roi!» '
  '27':
  - type: text
    content: 'Il répondit: «Si l''Eternel ne te sauve pas, avec quoi pourrais-je te sauver? Avec les ressources de l''aire de battage ou du pressoir?» '
  '28':
  - type: text
    content: 'Et le roi ajouta: «Qu''as-tu?» Elle répondit: «Cette femme-là m''a dit: ‘Donne-moi ton fils! Nous le mangerons aujourd''hui, et demain c''est mon fils que nous mangerons.’ '
  '29':
  - type: text
    content: 'Nous avons fait cuire mon fils et nous l''avons mangé. Le lendemain, je lui ai dit: ‘Donne-moi ton fils pour que nous le mangions’, mais elle l''a caché.» '
  '3':
  - type: text
    content: 'L''un d''eux dit: «Accepte de venir avec tes serviteurs!» Il répondit: «Je vais venir.» '
  '30':
  - type: text
    content: Lorsque le roi entendit les paroles de cette femme, il déchira ses habits; comme il marchait sur la muraille, le peuple vit qu'il portait en dessous un sac à même la peau.
  '31':
  - type: text
    content: 'Le roi dit: «Que Dieu me traite avec la plus grande sévérité si la tête d''Elisée, fils de Shaphath, reste aujourd''hui sur ses épaules!» '
  '32':
  - type: text
    content: 'Or Elisée se trouvait chez lui, et les anciens étaient assis avec lui. Le roi envoya quelqu''un de son entourage, mais avant même l''arrivée de ce messager, Elisée dit aux anciens: «Le voyez-vous? Ce fils d''assassin envoie quelqu''un pour me couper la tête. Ecoutez! Quand le messager arrivera, fermez-lui la porte et repoussez-le avec la porte. N''entend-on pas derrière lui le bruit des pas de son seigneur?» '
  '33':
  - type: text
    content: 'Il était encore en train de leur parler quand le messager arriva vers lui, disant: «Ce malheur vient de l''Eternel. Que puis-je encore espérer de l''Eternel?»'
  '4':
  - type: text
    content: 'Il partit donc avec eux. Arrivés au Jourdain, ils coupèrent du bois. '
  '5':
  - type: text
    content: 'Alors que l''un d''eux abattait une poutre, le fer de sa hache tomba dans l''eau. Il s''écria: «Ah, mon seigneur, je l''avais empruntée!» '
  '6':
  - type: text
    content: 'L''homme de Dieu demanda: «Où est-il tombé?» Il lui montra l''endroit. Alors Elisée coupa un morceau de bois, le jeta à la même place et fit ainsi surnager le fer. '
  '7':
  - type: text
    content: 'Puis il dit: «Prends-le!» Il tendit la main et le prit.'
  '8':
  - type: text
    content: 'Le roi de Syrie était en guerre avec Israël. Dans un conseil qu''il tint avec ses serviteurs, il dit: «Mon camp sera à tel endroit.» '
  '9':
  - type: text
    content: 'Mais l''homme de Dieu fit dire au roi d''Israël: «Attention, ne passe pas à cet endroit, car c''est là que les Syriens descendent.» '
