document_id: 2KI.10
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Il y avait à Samarie 70 fils d''Achab. Jéhu écrivit des lettres qu''il envoya à Samarie aux chefs de Jizreel, aux anciens et aux responsables des enfants d''Achab. Il leur disait: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Maintenant que cette lettre vous est parvenue, puisque vous avez avec vous les fils de votre seigneur, ainsi que des chars et des chevaux, une ville fortifiée et des armes, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'voyez lequel des fils de votre seigneur est le meilleur et convient le mieux, mettez-le sur le trône de son père et combattez pour la famille de votre seigneur!» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils eurent très peur et dirent: «Deux rois ont été incapables de lui résister. Comment pourrions-nous résister, nous?» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le chef du palais, le chef de la ville, les anciens et les responsables des enfants d''Achab envoyèrent dire à Jéhu: «Nous sommes tes serviteurs et nous ferons tout ce que tu nous diras. Nous ne proclamerons personne roi, fais ce qui te semble bon.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jéhu leur écrivit une seconde lettre où il disait: «Si vous êtes avec moi et si vous êtes prêts à m''obéir, prenez les têtes des fils de votre seigneur et venez me trouver demain à la même heure, à Jizreel.» Or les 70 fils du roi se trouvaient avec les grands de la ville qui les élevaient. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Quand la lettre leur fut parvenue, ils prirent les fils du roi et ils égorgèrent ces 70 hommes. Puis ils mirent leurs têtes dans des corbeilles et les envoyèrent à Jéhu, à Jizreel. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le messager vint lui annoncer: «On a apporté les têtes des fils du roi.» Jéhu dit: «Répartissez-les en deux tas à l''entrée de la ville et qu''ils y restent jusqu''au matin.» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le matin, il sortit, se tint devant tout le peuple et dit: «Vous, vous êtes justes. En ce qui me concerne, j''ai conspiré contre mon seigneur et je l''ai tué, mais qui a frappé tous ceux-ci? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Sachez donc que rien, dans la parole de l''Eternel, dans la parole que l''Eternel a prononcée contre la famille d''Achab, ne restera sans effet. L''Eternel accomplit ce qu''il a déclaré par l''intermédiaire de son serviteur Elie.» '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Et Jéhu tua tous ceux qui restaient de la famille d'Achab à Jizreel, ainsi que tous ses grands, ses proches et ses prêtres, sans laisser un seul survivant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Puis il se leva et partit pour Samarie. A Beth-Equed-Haroïm, sur le chemin, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jéhu rencontra les frères d''Achazia, le roi de Juda, et il demanda: «Qui êtes-vous?» Ils répondirent: «Nous sommes les frères d''Achazia et nous descendons pour saluer les fils du roi et de la reine.» '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jéhu dit: «Prenez-les vivants.» On les prit vivants et on les égorgea à la citerne de Beth-Equed. Ils étaient 42. Jéhu ne laissa aucun survivant. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Parti de là, il rencontra Jonadab, le fils de Récab, qui venait à sa rencontre. Il le salua et lui demanda: «Ton cœur est-il sincère comme mon cœur l''est envers le tien?» Jonadab répondit: «Il l''est.» «S''il l''est, répliqua Jéhu, donne-moi ta main.» Jonadab lui donna la main. Jéhu le fit monter avec lui dans son char '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'et dit: «Viens avec moi et tu verras mon zèle pour l''Eternel.» Il l''emmena ainsi dans son char. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Une fois arrivé à Samarie, Jéhu tua tous les survivants de la famille d'Achab à Samarie. Il les détruisit entièrement, conformément à la parole que l'Eternel avait dite à Elie.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Politique religieuse de Jéhu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Puis Jéhu rassembla tout le peuple et il leur dit: «Achab a un peu servi Baal, Jéhu le servira beaucoup. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Maintenant convoquez vers moi tous les prophètes de Baal, tous ses serviteurs et tous ses prêtres, sans qu''il en manque un seul, car je veux offrir un grand sacrifice à Baal. Si quelqu''un manque, il ne survivra pas.» Jéhu agissait de cette manière par ruse, pour exterminer les serviteurs de Baal. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il dit: «Proclamez une fête en l''honneur de Baal», et on la proclama. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il envoya des messagers dans tout Israël et tous les serviteurs de Baal arrivèrent, sans aucune exception. Ils entrèrent dans le temple de Baal, et celui-ci fut rempli d''un bout à l''autre. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jéhu dit à celui qui avait la garde du vestiaire: «Sors des habits pour tous les serviteurs de Baal.» C''est ce que fit cet homme. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Alors Jéhu vint au temple de Baal avec Jonadab, fils de Récab, et il dit aux serviteurs de Baal: «Assurez-vous qu''il n''y ait ici aucun des serviteurs de l''Eternel, mais seulement des serviteurs de Baal.» '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ils entrèrent pour offrir des sacrifices et des holocaustes. Or, Jéhu avait placé dehors 80 hommes en leur disant: «Si l''un de vous laisse s''échapper un seul des hommes dont je vous confie la responsabilité, il mourra à sa place.» '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Lorsqu''on eut fini d''offrir les holocaustes, Jéhu dit aux gardes et aux officiers: «Entrez, frappez-les, que pas un ne sorte vivant.» Et ils les frappèrent du tranchant de l''épée. Les gardes et les officiers jetèrent les corps, puis revinrent jusqu''à la ville où se trouvait le temple de Baal. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ils sortirent les statues du temple et les brûlèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ils renversèrent la statue de Baal; ils démolirent aussi son temple et en firent des toilettes publiques qui ont subsisté jusqu'à aujourd'hui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Jéhu fit disparaître Baal du milieu d''Israël, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'mais il ne se détourna pas des péchés de Jéroboam, fils de Nebath, qui avait fait pécher Israël: il n''abandonna pas les veaux d''or qui se trouvaient à Béthel et à Dan. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'L''Eternel dit à Jéhu: «Parce que tu as bien agi en accomplissant ce qui était droit à mes yeux et parce que tu as fait à la famille d''Achab tout ce qui était conforme à ma volonté, tes descendants jusqu''à la quatrième génération seront assis sur le trône d''Israël.» '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Toutefois, Jéhu ne veilla pas à marcher de tout son cœur suivant la loi de l'Eternel, le Dieu d'Israël, il ne se détourna pas des péchés que Jéroboam avait fait commettre à Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'A cette époque-là, l''Eternel commença à diminuer le territoire des Israélites, et Hazaël les battit sur toute la frontière d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Depuis le Jourdain et en direction du soleil levant, il conquit tout le pays de Galaad, celui des Gadites, des Rubénites et des Manassites, depuis Aroër, qui se trouve sur le torrent de l'Arnon, jusqu'à Galaad et au Basan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Le reste des actes de Jéhu, tout ce qu'il a accompli et tous ses exploits, cela est décrit dans les annales des rois d'Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jéhu se coucha avec ses ancêtres et on l''enterra à Samarie. Son fils Joachaz devint roi à sa place. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Jéhu avait régné 28 ans sur Israël à Samarie.
