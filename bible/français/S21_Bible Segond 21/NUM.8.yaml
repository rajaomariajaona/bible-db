document_id: NUM.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Arrangement des lampes et du chandelier
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Transmets ces instructions à Aaron: Lorsque tu placeras les lampes sur le chandelier, les sept lampes devront éclairer en face.» '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'C''est ce que fit Aaron: il plaça les lampes sur le devant du chandelier, comme l''Eternel l''avait ordonné à Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Le chandelier était en or battu. Il était en or battu de son pied à ses fleurs. Moïse avait fait le chandelier d'après le modèle que l'Eternel lui avait montré.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Consécration des Lévites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '«Prends les Lévites du milieu des Israélites et purifie-les. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Voici comment tu les purifieras. Asperge-les d''eau expiatoire. Qu''ils fassent passer le rasoir sur tout leur corps, qu''ils lavent leurs vêtements et qu''ils se purifient. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils prendront ensuite un jeune taureau, avec l''offrande de fleur de farine pétrie à l''huile qui l''accompagne. Tu prendras un autre jeune taureau pour le sacrifice d''expiation. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tu feras approcher les Lévites devant la tente de la rencontre et tu convoqueras toute l''assemblée des Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tu feras approcher les Lévites devant l''Eternel et les Israélites poseront leurs mains sur eux. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Aaron fera pour les Lévites le geste de présentation devant l''Eternel, comme pour une offrande des Israélites, et ils seront consacrés au service de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les Lévites poseront leurs mains sur la tête des taureaux et tu offriras l''un en sacrifice d''expiation, l''autre en holocauste, afin de faire l''expiation pour les Lévites. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tu feras tenir les Lévites debout devant Aaron et devant ses fils, et tu feras pour eux le geste de présentation, comme pour une offrande à l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tu sépareras ainsi les Lévites des autres Israélites et les Lévites m''appartiendront. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Après cela, les Lévites viendront faire le service dans la tente de la rencontre. C''est ainsi que tu les purifieras et que tu feras pour eux le geste de présentation, comme pour une offrande, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'car ils me sont donnés comme des dons pris du milieu des Israélites: je les ai pris pour moi à la place de tous les premiers-nés des Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'En effet, tout premier-né des Israélites m''appartient, aussi bien des hommes que des animaux. Le jour où j''ai frappé tous les premiers-nés en Egypte, je me les suis consacrés, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'et j''ai pris les Lévites à la place de tous les premiers-nés des Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: J'ai donné les Lévites à Aaron et à ses fils, comme des dons pris du milieu des Israélites, pour qu'ils effectuent le service des Israélites dans la tente de la rencontre, qu'ils fassent l'expiation pour les Israélites et que les Israélites ne soient frappés d'aucun fléau en s'approchant du sanctuaire.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Moïse, Aaron et toute l''assemblée des Israélites firent pour les Lévites tout ce que l''Eternel avait ordonné à Moïse à leur sujet. C''est ainsi que les Israélites agirent envers eux. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les Lévites se purifièrent et lavèrent leurs vêtements. Aaron fit pour eux le geste de présentation, comme pour une offrande, devant l''Eternel, et il fit l''expiation pour eux afin de les purifier. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Après cela, les Lévites vinrent faire leur service dans la tente de la rencontre, aux côtés d'Aaron et de ses fils, conformément à ce que l'Eternel avait ordonné à Moïse à leur sujet. C'est ainsi que l'on agit envers eux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '«Voici ce qui concerne les Lévites. Dès l''âge de 25 ans, tout Lévite entrera au service de la tente de la rencontre pour y exercer une fonction. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dès l''âge de 50 ans, il quittera sa fonction et ne servira plus. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Il aidera ses frères dans la tente de la rencontre pour garder ce qui est confié à leur responsabilité, mais il ne fera plus de service. Voilà comment tu agiras envers les Lévites pour ce qui concerne leurs fonctions.»
