document_id: 2KI.8,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Famine annoncée par Elisée
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elisée dit à la femme dont il avait fait revivre le fils: «Lève-toi, pars avec ta famille et installe-toi où tu pourras. En effet, l''Eternel appelle la famine. Elle vient même sur le pays pour 7 ans.» '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elisée lui répondit: «Va lui dire qu''il survivra. Toutefois, l''Eternel m''a révélé qu''il mourra.» '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''homme de Dieu fixa Hazaël du regard, avec insistance, puis il pleura. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hazaël demanda: «Pourquoi mon seigneur pleure-t-il?» Elisée répondit: «Parce que je sais le mal que tu vas faire aux Israélites. Tu vas mettre le feu à leurs villes fortifiées, tuer par l''épée leurs jeunes gens, écraser leurs petits enfants et fendre le ventre de leurs femmes enceintes.» '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hazaël dit: «Mais qu''est donc ton serviteur, ce chien, pour accomplir de si grandes choses?» Elisée répondit: «L''Eternel m''a révélé que tu seras roi de Syrie.» '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hazaël quitta Elisée et revint vers son seigneur, qui lui demanda: «Que t''a dit Elisée?» Il répondit: «Il m''a dit que tu survivrais.» '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le lendemain, Hazaël prit une couverture qu'il plongea dans l'eau, puis il en couvrit le visage du roi, qui mourut. Hazaël devint roi à sa place.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règne de Joram sur Juda
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La cinquième année du règne de Joram, le fils d''Achab, sur Israël, Joram, fils de Josaphat, le roi de Juda, devint roi. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il avait 32 ans lorsqu'il devint roi et il régna 8 ans à Jérusalem.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il marcha sur la voie des rois d''Israël comme l''avait fait la famille d''Achab – en effet, sa femme était une fille d''Achab – et il fit ce qui est mal aux yeux de l''Eternel. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toutefois, l'Eternel ne voulut pas détruire Juda à cause de son serviteur David. Il voulait respecter la promesse qu'il lui avait faite de lui donner toujours un successeur, ainsi qu'à ses descendants.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La femme se leva et agit conformément à la parole de l''homme de Dieu: elle partit avec sa famille et s''installa pour 7 ans dans le pays des Philistins. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A son époque, les Edomites se révoltèrent contre l''autorité de Juda et se donnèrent un roi. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joram partit pour Tsaïr avec tous ses chars. Il s''était levé de nuit et il battit les Edomites qui l''encerclaient, ainsi que les chefs des chars. Quant au peuple, il se réfugia dans ses tentes. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La rébellion d'Edom contre l'autorité de Juda a duré jusqu'à aujourd'hui. Libna se révolta aussi à la même époque.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le reste des actes de Joram, tout ce qu'il a accompli, cela est décrit dans les annales des rois de Juda.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joram se coucha avec ses ancêtres et il fut enterré à leurs côtés dans la ville de David. Son fils Achazia devint roi à sa place.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règne d'Achazia sur Juda
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La douzième année du règne de Joram, le fils d''Achab, sur Israël, Achazia, fils de Joram, le roi de Juda, devint roi. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Achazia avait 22 ans lorsqu'il devint roi et il régna un an à Jérusalem. Sa mère s'appelait Athalie et c'était la petite-fille d'Omri, le roi d'Israël.
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Achazia marcha sur la voie de la famille d'Achab, il fit comme elle ce qui est mal aux yeux de l'Eternel, car il était allié par mariage à cette famille.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il partit avec Joram, le fils d''Achab, en guerre contre Hazaël, le roi de Syrie, à Ramoth en Galaad. Les Syriens blessèrent Joram. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le roi Joram repartit à Jizreel pour se faire soigner des blessures que les Syriens lui avaient infligées à Rama, lorsqu'il se battait contre Hazaël, le roi de Syrie. Achazia, fils de Joram et roi de Juda, descendit alors pour voir Joram, le fils d'Achab, à Jizreel, parce qu'il était blessé.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au bout des 7 ans, elle revint du pays des Philistins et elle alla chercher secours auprès du roi pour récupérer sa maison et son champ. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi était en pleine discussion avec Guéhazi, le serviteur de l''homme de Dieu, et il disait: «Raconte-moi donc toutes les grandes choses qu''Elisée a accomplies.» '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il racontait justement au roi comment Elisée avait rendu la vie à un mort quand la femme dont il avait fait revivre le fils vint chercher secours auprès du roi pour récupérer sa maison et son champ. Guéhazi dit: «Mon seigneur le roi, voici la femme en question et voici son fils, celui qu''Elisée a fait revivre.» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi interrogea la femme et elle lui raconta toute l''histoire. Puis le roi mit un eunuque à sa disposition en lui donnant cette consigne: «Fais restituer à cette femme tout ce qui lui appartient, y compris tous les revenus de son champ, depuis le jour où elle a quitté le pays jusqu''à maintenant.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Annonce du règne de Hazaël sur la Syrie
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elisée se rendit à Damas, alors que Ben-Hadad, le roi de Syrie, était malade. On lui annonça: «L''homme de Dieu est venu jusqu''ici.» '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi dit à Hazaël: «Prends un cadeau avec toi et va à la rencontre de l''homme de Dieu. Consulte l''Eternel par son intermédiaire: demande si je vais survivre à cette maladie.» '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hazaël partit à la rencontre d''Elisée. Il avait en cadeau avec lui tout ce qu''il y avait de meilleur à Damas, l''équivalent de la charge de 40 chameaux. A son arrivée, il se présenta à lui et dit: «Ton fils Ben-Hadad, le roi de Syrie, m''envoie vers toi pour demander s''il va survivre à cette maladie.» '
