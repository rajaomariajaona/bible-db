document_id: HEB.13,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Instructions diverses et salutations
  - type: text
    content: 'Persévérez dans l''amour fraternel. '
  '10':
  - type: text
    content: 'Nous avons un autel dont ceux qui accomplissent le service du tabernacle n''ont pas le droit de tirer leur nourriture. '
  '11':
  - type: text
    content: 'En ce qui concerne les animaux dont le sang est apporté par le grand-prêtre dans le sanctuaire pour l''expiation du péché, leur corps est brûlé à l''extérieur du camp. '
  '12':
  - type: text
    content: 'Voilà pourquoi Jésus aussi, afin de procurer la sainteté au peuple au moyen de son propre sang, a souffert à l''extérieur de la ville. '
  '13':
  - type: text
    content: 'Sortons donc pour aller à lui à l''extérieur du camp, en supportant d''être humiliés comme lui. '
  '14':
  - type: text
    content: En effet, ici-bas nous n'avons pas de cité permanente, mais nous recherchons celle qui est à venir.
  '15':
  - type: text
    content: 'Par Christ, offrons [donc] sans cesse à Dieu un sacrifice de louange, c''est-à-dire le fruit de lèvres qui reconnaissent publiquement lui appartenir. '
  '16':
  - type: text
    content: Et n'oubliez pas de faire le bien et de vous entraider, car c'est à de tels sacrifices que Dieu prend plaisir.
  '17':
  - type: text
    content: Obéissez à vos conducteurs et soumettez-vous à eux, car ils veillent sur votre âme en hommes qui devront rendre des comptes. Ils pourront ainsi le faire avec joie et non en soupirant, ce qui ne vous serait d'aucun avantage.
  '18':
  - type: text
    content: 'Priez pour nous. Nous sommes en effet convaincus d''avoir une bonne conscience, puisque nous voulons bien nous conduire en toute circonstance. '
  '19':
  - type: text
    content: Je vous invite plus particulièrement à prier pour que je vous sois rendu plus tôt.
  '2':
  - type: text
    content: N'oubliez pas l'hospitalité, car en l'exerçant certains ont sans le savoir logé des anges.
  '20':
  - type: text
    content: 'Le Dieu de la paix a ramené d''entre les morts notre Seigneur Jésus, devenu le grand berger des brebis grâce au sang d''une alliance éternelle. '
  '21':
  - type: text
    content: Qu'il vous rende capables de toute bonne œuvre pour l'accomplissement de sa volonté, qu'il fasse en vous ce qui lui est agréable par Jésus-Christ, à qui soit la gloire aux siècles des siècles! Amen!
  '22':
  - type: text
    content: Je vous invite, frères et sœurs, à faire bon accueil à ces paroles d'encouragement, car je vous ai écrit brièvement.
  '23':
  - type: text
    content: 'Sachez que notre frère Timothée a été relâché; s''il vient assez tôt, j''irai vous voir avec lui. '
  '24':
  - type: text
    content: Saluez tous vos conducteurs ainsi que tous les saints. Ceux d'Italie vous saluent.
  '25':
  - type: text
    content: Que la grâce soit avec vous tous!
  '3':
  - type: text
    content: Souvenez-vous des prisonniers comme si vous étiez prisonniers avec eux, et de ceux qui sont maltraités comme si vous étiez dans leur corps.
  '4':
  - type: text
    content: 'Que le mariage soit honoré de tous et le lit conjugal épargné par la souillure: ceux qui se livrent à l''immoralité sexuelle et à l''adultère, Dieu les jugera.'
  '5':
  - type: text
    content: 'Que votre conduite ne soit pas guidée par l''amour de l''argent, contentez-vous de ce que vous avez. En effet, Dieu lui-même a dit: '
  - type: text
    content: Je ne te délaisserai pas et je ne t'abandonnerai pas
  - type: text
    content: .
  - type: note
    content: 'Je ne te… t''abandonnerai pas: citation de Josué 1.5.'
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'C''est donc avec assurance que nous pouvons dire: '
  - type: text
    content: Le Seigneur est mon secours, je n'aurai peur de rien. Que peut me faire un homme?
  - type: note
    content: 'Le Seigneur… homme: citation du Psaume 118.6.'
  '7':
  - type: text
    content: Souvenez-vous de vos conducteurs qui vous ont annoncé la parole de Dieu. Considérez quel est le bilan de leur vie et imitez leur foi.
  '8':
  - type: text
    content: 'Jésus-Christ est le même hier, aujourd''hui et pour l''éternité. '
  '9':
  - type: text
    content: 'Ne vous laissez pas entraîner par toutes sortes de doctrines étrangères. Il est bon en effet que le cœur soit affermi par la grâce, et non par des aliments qui n''ont été d''aucun profit à ceux qui s''en sont fait une règle. '
