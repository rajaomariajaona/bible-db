document_id: PSA.77
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les hauts faits de Dieu dans le passé
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur, d'après Jeduthun. Psaume d'Asaph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ma voix s'élève vers Dieu, et je crie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ma voix s'élève vers Dieu, et il m'écoutera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Quand je suis dans la détresse, je cherche le Seigneur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: la nuit, mes mains se tendent vers lui, sans se lasser;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je refuse toute consolation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je me souviens de Dieu et je gémis;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'je médite, et mon esprit est abattu. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu tiens mes paupières ouvertes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je suis troublé, incapable de parler.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Je pense aux jours lointains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aux années passées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je me souviens de mes chants pendant la nuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je médite dans mon cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et mon esprit s''interroge:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: «Le Seigneur me rejettera-t-il pour toujours?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne se montrera-t-il plus favorable?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Sa bonté est-elle définitivement épuisée?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa parole a-t-elle disparu pour l'éternité?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dieu a-t-il oublié de faire grâce?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'A-t-il, dans sa colère, retiré sa compassion?» '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Je me dis: «Ce qui fait ma souffrance,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est que la main droite du Très-Haut n'est plus la même.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je me rappelle la manière d'agir de l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, je veux me souvenir de tes miracles passés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je réfléchis à toute ton activité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je veux méditer tes hauts faits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: O Dieu, tes voies sont saintes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quel dieu est grand comme Dieu?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tu es le Dieu qui fait des miracles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as fait connaître ta puissance parmi les peuples;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: par ton bras tu as racheté ton peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'les descendants de Jacob et de Joseph. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: L'eau t'a vu, ô Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'l''eau t''a vu: elle a tremblé,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: les abîmes ont été ébranlés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Les nuages ont déversé des torrents d'eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le tonnerre a retenti dans le ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tes flèches ont volé de tous côtés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ton tonnerre a éclaté dans le tourbillon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les éclairs ont illuminé le monde;
- type: usfm
  marker: q1
  children:
  - type: text
    text: la terre a été ébranlée, elle a tremblé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tu as fait ton chemin dans la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ton sentier au fond de l'eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et personne n'a reconnu tes traces.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tu as conduit ton peuple comme un troupeau
- type: usfm
  marker: q1
  children:
  - type: text
    text: par l'intermédiaire de Moïse et d'Aaron.
