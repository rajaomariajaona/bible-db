document_id: PSA.77,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les hauts faits de Dieu dans le passé
  - type: text
    content: Au chef de chœur, d'après Jeduthun. Psaume d'Asaph.
  '10':
  - type: text
    content: Dieu a-t-il oublié de faire grâce?
  - type: text
    content: 'A-t-il, dans sa colère, retiré sa compassion?» '
  - type: text
    content: – Pause.
  '11':
  - type: text
    content: 'Je me dis: «Ce qui fait ma souffrance,'
  - type: text
    content: c'est que la main droite du Très-Haut n'est plus la même.»
  '12':
  - type: text
    content: Je me rappelle la manière d'agir de l'Eternel.
  - type: text
    content: Oui, je veux me souvenir de tes miracles passés.
  '13':
  - type: text
    content: Je réfléchis à toute ton activité,
  - type: text
    content: je veux méditer tes hauts faits.
  '14':
  - type: text
    content: O Dieu, tes voies sont saintes.
  - type: text
    content: Quel dieu est grand comme Dieu?
  '15':
  - type: text
    content: Tu es le Dieu qui fait des miracles.
  - type: text
    content: Tu as fait connaître ta puissance parmi les peuples;
  '16':
  - type: text
    content: par ton bras tu as racheté ton peuple,
  - type: text
    content: 'les descendants de Jacob et de Joseph. '
  - type: text
    content: – Pause.
  '17':
  - type: text
    content: L'eau t'a vu, ô Dieu,
  - type: text
    content: 'l''eau t''a vu: elle a tremblé,'
  - type: text
    content: les abîmes ont été ébranlés.
  '18':
  - type: text
    content: Les nuages ont déversé des torrents d'eau,
  - type: text
    content: le tonnerre a retenti dans le ciel,
  - type: text
    content: et tes flèches ont volé de tous côtés.
  '19':
  - type: text
    content: Ton tonnerre a éclaté dans le tourbillon,
  - type: text
    content: les éclairs ont illuminé le monde;
  - type: text
    content: la terre a été ébranlée, elle a tremblé.
  '2':
  - type: text
    content: Ma voix s'élève vers Dieu, et je crie;
  - type: text
    content: ma voix s'élève vers Dieu, et il m'écoutera.
  '20':
  - type: text
    content: Tu as fait ton chemin dans la mer,
  - type: text
    content: ton sentier au fond de l'eau,
  - type: text
    content: et personne n'a reconnu tes traces.
  '21':
  - type: text
    content: Tu as conduit ton peuple comme un troupeau
  - type: text
    content: par l'intermédiaire de Moïse et d'Aaron.
  '3':
  - type: text
    content: Quand je suis dans la détresse, je cherche le Seigneur;
  - type: text
    content: la nuit, mes mains se tendent vers lui, sans se lasser;
  - type: text
    content: je refuse toute consolation.
  '4':
  - type: text
    content: Je me souviens de Dieu et je gémis;
  - type: text
    content: 'je médite, et mon esprit est abattu. '
  - type: text
    content: – Pause.
  '5':
  - type: text
    content: Tu tiens mes paupières ouvertes;
  - type: text
    content: je suis troublé, incapable de parler.
  '6':
  - type: text
    content: Je pense aux jours lointains,
  - type: text
    content: aux années passées.
  '7':
  - type: text
    content: Je me souviens de mes chants pendant la nuit,
  - type: text
    content: je médite dans mon cœur,
  - type: text
    content: 'et mon esprit s''interroge:'
  '8':
  - type: text
    content: «Le Seigneur me rejettera-t-il pour toujours?
  - type: text
    content: Ne se montrera-t-il plus favorable?
  '9':
  - type: text
    content: Sa bonté est-elle définitivement épuisée?
  - type: text
    content: Sa parole a-t-elle disparu pour l'éternité?
