document_id: PRO.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La femme débauchée
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mon fils, retiens mes paroles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et garde mes commandements avec toi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Retiens mes commandements et tu vivras.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Garde mon enseignement comme la prunelle de tes yeux!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Attache-les sur tes doigts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: écris-les sur la table de ton cœur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dis à la sagesse: «Tu es ma sœur»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et appelle l'intelligence ton amie
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: pour qu'elles te préservent de la femme étrangère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de l'inconnue au discours flatteur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Alors que j'étais à la fenêtre de ma maison
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que je regardais à travers mon treillis,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: j'ai vu parmi ceux qui manquent d'expérience,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ai remarqué parmi les jeunes gens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un garçon dépourvu de bon sens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il passait dans la rue, près de l'angle où se tenait une de ces femmes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il prenait le chemin de sa maison;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: c'était au crépuscule, en fin de journée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au moment où viennent la nuit et l'obscurité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: La femme est venue à sa rencontre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: habillée comme une prostituée, la ruse dans le cœur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Elle était bruyante et sans pudeur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ses pieds ne tenaient pas en place chez elle:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: tantôt dans la rue, tantôt sur les places,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à tous les carrefours elle était aux aguets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Elle l'a agrippé et embrassé
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et, d''un air effronté, lui a dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: «Je devais un sacrifice de communion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aujourd'hui j'ai accompli mes vœux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Voilà pourquoi je suis sortie à ta rencontre
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour te chercher, et je t'ai trouvé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: J'ai orné mon divan de couvertures,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de tissus en lin d'Egypte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: J'ai parfumé mon lit
- type: usfm
  marker: q1
  children:
  - type: text
    text: de myrrhe, d'aloès et de cinnamome.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Viens, enivrons-nous d'amour jusqu'au matin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: livrons-nous aux jouissances de la passion!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: En effet, mon mari n'est pas à la maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est parti pour un voyage lointain;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: il a pris la bourse avec lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne reviendra à la maison qu'à la pleine lune.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Elle l'a attiré à force de persuasion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle l'a séduit par la flatterie de ses lèvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Il s'est tout à coup mis à la suivre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pareil au bœuf qui va à la boucherie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au fou qu'on attache pour le corriger,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: jusqu'à ce qu'une flèche lui transperce le foie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il était pareil à l'oiseau qui se précipite dans un piège
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans savoir que c'est au prix de sa vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Et maintenant, mes fils, écoutez-moi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et soyez attentifs aux paroles de ma bouche!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Que ton cœur ne se tourne pas vers les voies d'une telle femme!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne t'égare pas dans ses sentiers!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: En effet, elle a fait beaucoup de victimes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont nombreux, tous ceux qu'elle a détruits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Sa maison, c'est le chemin du séjour des morts
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui descend vers les chambres de la mort.
