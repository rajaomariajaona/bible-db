document_id: PRO.7,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La femme débauchée
  - type: text
    content: Mon fils, retiens mes paroles
  - type: text
    content: et garde mes commandements avec toi!
  '10':
  - type: text
    content: La femme est venue à sa rencontre,
  - type: text
    content: habillée comme une prostituée, la ruse dans le cœur.
  '11':
  - type: text
    content: Elle était bruyante et sans pudeur.
  - type: text
    content: 'Ses pieds ne tenaient pas en place chez elle:'
  '12':
  - type: text
    content: tantôt dans la rue, tantôt sur les places,
  - type: text
    content: à tous les carrefours elle était aux aguets.
  '13':
  - type: text
    content: Elle l'a agrippé et embrassé
  - type: text
    content: 'et, d''un air effronté, lui a dit:'
  '14':
  - type: text
    content: «Je devais un sacrifice de communion,
  - type: text
    content: aujourd'hui j'ai accompli mes vœux.
  '15':
  - type: text
    content: Voilà pourquoi je suis sortie à ta rencontre
  - type: text
    content: pour te chercher, et je t'ai trouvé.
  '16':
  - type: text
    content: J'ai orné mon divan de couvertures,
  - type: text
    content: de tissus en lin d'Egypte.
  '17':
  - type: text
    content: J'ai parfumé mon lit
  - type: text
    content: de myrrhe, d'aloès et de cinnamome.
  '18':
  - type: text
    content: Viens, enivrons-nous d'amour jusqu'au matin,
  - type: text
    content: livrons-nous aux jouissances de la passion!
  '19':
  - type: text
    content: En effet, mon mari n'est pas à la maison,
  - type: text
    content: il est parti pour un voyage lointain;
  '2':
  - type: text
    content: Retiens mes commandements et tu vivras.
  - type: text
    content: Garde mon enseignement comme la prunelle de tes yeux!
  '20':
  - type: text
    content: il a pris la bourse avec lui,
  - type: text
    content: il ne reviendra à la maison qu'à la pleine lune.»
  '21':
  - type: text
    content: Elle l'a attiré à force de persuasion,
  - type: text
    content: elle l'a séduit par la flatterie de ses lèvres.
  '22':
  - type: text
    content: Il s'est tout à coup mis à la suivre,
  - type: text
    content: pareil au bœuf qui va à la boucherie,
  - type: text
    content: au fou qu'on attache pour le corriger,
  '23':
  - type: text
    content: jusqu'à ce qu'une flèche lui transperce le foie.
  - type: text
    content: Il était pareil à l'oiseau qui se précipite dans un piège
  - type: text
    content: sans savoir que c'est au prix de sa vie.
  '24':
  - type: text
    content: Et maintenant, mes fils, écoutez-moi
  - type: text
    content: et soyez attentifs aux paroles de ma bouche!
  '25':
  - type: text
    content: Que ton cœur ne se tourne pas vers les voies d'une telle femme!
  - type: text
    content: Ne t'égare pas dans ses sentiers!
  '26':
  - type: text
    content: En effet, elle a fait beaucoup de victimes.
  - type: text
    content: Ils sont nombreux, tous ceux qu'elle a détruits.
  '27':
  - type: text
    content: Sa maison, c'est le chemin du séjour des morts
  - type: text
    content: qui descend vers les chambres de la mort.
  '3':
  - type: text
    content: Attache-les sur tes doigts,
  - type: text
    content: écris-les sur la table de ton cœur!
  '4':
  - type: text
    content: 'Dis à la sagesse: «Tu es ma sœur»'
  - type: text
    content: et appelle l'intelligence ton amie
  '5':
  - type: text
    content: pour qu'elles te préservent de la femme étrangère,
  - type: text
    content: de l'inconnue au discours flatteur.
  '6':
  - type: text
    content: Alors que j'étais à la fenêtre de ma maison
  - type: text
    content: et que je regardais à travers mon treillis,
  '7':
  - type: text
    content: j'ai vu parmi ceux qui manquent d'expérience,
  - type: text
    content: j'ai remarqué parmi les jeunes gens,
  - type: text
    content: un garçon dépourvu de bon sens.
  '8':
  - type: text
    content: Il passait dans la rue, près de l'angle où se tenait une de ces femmes,
  - type: text
    content: et il prenait le chemin de sa maison;
  '9':
  - type: text
    content: c'était au crépuscule, en fin de journée,
  - type: text
    content: au moment où viennent la nuit et l'obscurité.
