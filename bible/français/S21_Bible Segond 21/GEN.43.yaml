document_id: GEN.43
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Deuxième voyage des frères de Joseph en Egypte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La famine pesait lourdement sur le pays. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Lorsqu''ils eurent fini de manger le blé qu''ils avaient rapporté d''Egypte, Jacob dit à ses fils: «Retournez nous acheter un peu de nourriture.» '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Juda lui répondit: «Cet homme nous a formellement déclaré: ‘Vous ne serez pas admis en ma présence à moins que votre frère ne soit avec vous.’ '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Si donc tu veux bien laisser notre frère partir avec nous, nous descendrons t''acheter de la nourriture. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'En revanche, si tu ne veux pas le laisser partir, nous ne descendrons pas. En effet, cet homme nous a dit: ‘Vous ne serez pas admis en ma présence à moins que votre frère ne soit avec vous.’» '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Israël dit alors: «Pourquoi avez-vous mal agi envers moi en révélant à cet homme que vous aviez encore un frère?» '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils répondirent: «Cet homme nous a interrogés sur nous et sur notre origine en disant: ‘Votre père est-il encore en vie? Avez-vous un frère?’ et nous avons répondu à ces questions-là. Pouvions-nous savoir qu''il dirait: ‘Faites venir votre frère’?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Juda dit à son père Israël: «Laisse le garçon partir avec moi, pour que nous puissions nous mettre en route. Ainsi nous resterons en vie et ne mourrons pas, ni nous, ni toi ni nos enfants. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Je me porte moi-même garant pour lui, c''est à moi que tu le réclameras. Si je ne te le ramène pas et ne te permets pas de le revoir, je serai pour toujours coupable envers toi. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'En effet, si nous n''avions pas tardé, nous serions déjà deux fois de retour.» '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Leur père Israël leur dit: «Puisqu''il le faut, faites ceci: prenez dans vos sacs des meilleurs produits du pays pour en apporter en cadeau à cet homme, un peu de baume et un peu de miel, des aromates, de la myrrhe, des pistaches et des amandes. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Prenez le double d''argent avec vous et rapportez l''argent qu''on avait mis à l''entrée de vos sacs: peut-être était-ce une erreur. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quant à votre frère, prenez-le! Levez-vous et retournez vers cet homme. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Que le Dieu tout-puissant éveille la compassion de cet homme envers vous et qu'il laisse revenir votre autre frère et Benjamin avec vous! De mon côté, si je dois être privé d'enfants, que j'en sois privé!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ces hommes prirent le cadeau. Ils prirent aussi le double d'argent avec eux, ainsi que Benjamin. Puis ils se levèrent, descendirent en Egypte et se présentèrent devant Joseph.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dès que Joseph vit Benjamin avec eux, il dit à son intendant: «Fais entrer ces hommes dans la maison, tue une bête et prépare un repas, car ils mangeront avec moi à midi.» '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'L''homme se conforma à ses instructions et les conduisit dans la maison de Joseph. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils eurent peur lorsqu''ils furent conduits à la maison de Joseph et se dirent: «C''est à cause de l''argent remis l''autre fois dans nos sacs qu''on nous emmène. C''est pour se jeter sur nous, se précipiter sur nous. C''est pour nous prendre comme esclaves et s''emparer de nos ânes.» '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ils s''approchèrent de l''intendant de Joseph et lui adressèrent la parole à l''entrée de la maison. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ils dirent: «Pardon, seigneur, nous sommes déjà descendus une fois pour acheter de la nourriture. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Quand nous sommes arrivés à l''endroit où nous devions passer la nuit, nous avons ouvert nos sacs et constaté que l''argent de chacun était à l''entrée de son sac, notre poids exact d''argent. Nous le rapportons avec nous. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nous avons amené une autre somme d''argent pour acheter de la nourriture. Nous ne savons pas qui avait mis notre argent dans nos sacs.» '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'L''intendant répondit: «Soyez tranquilles! N''ayez pas peur: c''est votre Dieu, le Dieu de votre père, qui vous a donné un trésor dans vos sacs. Votre argent m''était bien parvenu.» Puis il leur amena Siméon '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'et les fit entrer dans la maison de Joseph. Il leur donna de l''eau pour qu''ils puissent se laver les pieds; il donna aussi du fourrage à leurs ânes. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ils préparèrent leur cadeau en attendant que Joseph vienne à midi, car on les avait informés qu'ils mangeraient chez lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Quand Joseph fut arrivé à la maison, ils lui offrirent le cadeau qu''ils avaient apporté et se prosternèrent jusqu''à terre devant lui. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il leur demanda comment ils allaient et dit: «Votre vieux père, dont vous aviez parlé, est-il en bonne santé? Est-il encore en vie?» '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ils répondirent: «Ton serviteur, notre père, est en bonne santé; il est encore en vie.» Puis ils s''inclinèrent et se prosternèrent.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Joseph leva les yeux et jeta un regard sur son frère Benjamin, le fils de sa mère. Il demanda: «Est-ce votre jeune frère, celui dont vous m''aviez parlé?» Et il ajouta: «Que Dieu te fasse grâce, mon fils!» '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Il était profondément ému à la vue de son frère et avait besoin de pleurer. Il entra précipitamment dans une chambre et y pleura. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Après s''être lavé le visage, il en sortit. Retenant son émotion, il ordonna qu''on serve à manger. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'On servit séparément Joseph et ses frères. Les Egyptiens qui mangeaient avec lui furent aussi servis séparément, car les Egyptiens ne pouvaient pas manger avec les Hébreux: c''est une pratique abominable à leurs yeux. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Les frères de Joseph s''assirent en sa présence, de l''aîné au plus jeune en fonction de leur âge. Ils se regardaient les uns les autres avec étonnement. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Joseph leur fit porter des plats qui étaient devant lui et Benjamin en eut cinq fois plus que les autres. Ils burent tout leur soûl avec lui.
