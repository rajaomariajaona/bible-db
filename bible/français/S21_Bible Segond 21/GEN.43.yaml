document_id: GEN.43,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Deuxième voyage des frères de Joseph en Egypte
  - type: text
    content: 'La famine pesait lourdement sur le pays. '
  '10':
  - type: text
    content: 'En effet, si nous n''avions pas tardé, nous serions déjà deux fois de retour.» '
  '11':
  - type: text
    content: 'Leur père Israël leur dit: «Puisqu''il le faut, faites ceci: prenez dans vos sacs des meilleurs produits du pays pour en apporter en cadeau à cet homme, un peu de baume et un peu de miel, des aromates, de la myrrhe, des pistaches et des amandes. '
  '12':
  - type: text
    content: 'Prenez le double d''argent avec vous et rapportez l''argent qu''on avait mis à l''entrée de vos sacs: peut-être était-ce une erreur. '
  '13':
  - type: text
    content: 'Quant à votre frère, prenez-le! Levez-vous et retournez vers cet homme. '
  '14':
  - type: text
    content: Que le Dieu tout-puissant éveille la compassion de cet homme envers vous et qu'il laisse revenir votre autre frère et Benjamin avec vous! De mon côté, si je dois être privé d'enfants, que j'en sois privé!»
  '15':
  - type: text
    content: Ces hommes prirent le cadeau. Ils prirent aussi le double d'argent avec eux, ainsi que Benjamin. Puis ils se levèrent, descendirent en Egypte et se présentèrent devant Joseph.
  '16':
  - type: text
    content: 'Dès que Joseph vit Benjamin avec eux, il dit à son intendant: «Fais entrer ces hommes dans la maison, tue une bête et prépare un repas, car ils mangeront avec moi à midi.» '
  '17':
  - type: text
    content: 'L''homme se conforma à ses instructions et les conduisit dans la maison de Joseph. '
  '18':
  - type: text
    content: 'Ils eurent peur lorsqu''ils furent conduits à la maison de Joseph et se dirent: «C''est à cause de l''argent remis l''autre fois dans nos sacs qu''on nous emmène. C''est pour se jeter sur nous, se précipiter sur nous. C''est pour nous prendre comme esclaves et s''emparer de nos ânes.» '
  '19':
  - type: text
    content: 'Ils s''approchèrent de l''intendant de Joseph et lui adressèrent la parole à l''entrée de la maison. '
  '2':
  - type: text
    content: 'Lorsqu''ils eurent fini de manger le blé qu''ils avaient rapporté d''Egypte, Jacob dit à ses fils: «Retournez nous acheter un peu de nourriture.» '
  '20':
  - type: text
    content: 'Ils dirent: «Pardon, seigneur, nous sommes déjà descendus une fois pour acheter de la nourriture. '
  '21':
  - type: text
    content: 'Quand nous sommes arrivés à l''endroit où nous devions passer la nuit, nous avons ouvert nos sacs et constaté que l''argent de chacun était à l''entrée de son sac, notre poids exact d''argent. Nous le rapportons avec nous. '
  '22':
  - type: text
    content: 'Nous avons amené une autre somme d''argent pour acheter de la nourriture. Nous ne savons pas qui avait mis notre argent dans nos sacs.» '
  '23':
  - type: text
    content: 'L''intendant répondit: «Soyez tranquilles! N''ayez pas peur: c''est votre Dieu, le Dieu de votre père, qui vous a donné un trésor dans vos sacs. Votre argent m''était bien parvenu.» Puis il leur amena Siméon '
  '24':
  - type: text
    content: 'et les fit entrer dans la maison de Joseph. Il leur donna de l''eau pour qu''ils puissent se laver les pieds; il donna aussi du fourrage à leurs ânes. '
  '25':
  - type: text
    content: Ils préparèrent leur cadeau en attendant que Joseph vienne à midi, car on les avait informés qu'ils mangeraient chez lui.
  '26':
  - type: text
    content: 'Quand Joseph fut arrivé à la maison, ils lui offrirent le cadeau qu''ils avaient apporté et se prosternèrent jusqu''à terre devant lui. '
  '27':
  - type: text
    content: 'Il leur demanda comment ils allaient et dit: «Votre vieux père, dont vous aviez parlé, est-il en bonne santé? Est-il encore en vie?» '
  '28':
  - type: text
    content: 'Ils répondirent: «Ton serviteur, notre père, est en bonne santé; il est encore en vie.» Puis ils s''inclinèrent et se prosternèrent.'
  '29':
  - type: text
    content: 'Joseph leva les yeux et jeta un regard sur son frère Benjamin, le fils de sa mère. Il demanda: «Est-ce votre jeune frère, celui dont vous m''aviez parlé?» Et il ajouta: «Que Dieu te fasse grâce, mon fils!» '
  '3':
  - type: text
    content: 'Juda lui répondit: «Cet homme nous a formellement déclaré: ‘Vous ne serez pas admis en ma présence à moins que votre frère ne soit avec vous.’ '
  '30':
  - type: text
    content: 'Il était profondément ému à la vue de son frère et avait besoin de pleurer. Il entra précipitamment dans une chambre et y pleura. '
  '31':
  - type: text
    content: 'Après s''être lavé le visage, il en sortit. Retenant son émotion, il ordonna qu''on serve à manger. '
  '32':
  - type: text
    content: 'On servit séparément Joseph et ses frères. Les Egyptiens qui mangeaient avec lui furent aussi servis séparément, car les Egyptiens ne pouvaient pas manger avec les Hébreux: c''est une pratique abominable à leurs yeux. '
  '33':
  - type: text
    content: 'Les frères de Joseph s''assirent en sa présence, de l''aîné au plus jeune en fonction de leur âge. Ils se regardaient les uns les autres avec étonnement. '
  '34':
  - type: text
    content: Joseph leur fit porter des plats qui étaient devant lui et Benjamin en eut cinq fois plus que les autres. Ils burent tout leur soûl avec lui.
  '4':
  - type: text
    content: 'Si donc tu veux bien laisser notre frère partir avec nous, nous descendrons t''acheter de la nourriture. '
  '5':
  - type: text
    content: 'En revanche, si tu ne veux pas le laisser partir, nous ne descendrons pas. En effet, cet homme nous a dit: ‘Vous ne serez pas admis en ma présence à moins que votre frère ne soit avec vous.’» '
  '6':
  - type: text
    content: 'Israël dit alors: «Pourquoi avez-vous mal agi envers moi en révélant à cet homme que vous aviez encore un frère?» '
  '7':
  - type: text
    content: 'Ils répondirent: «Cet homme nous a interrogés sur nous et sur notre origine en disant: ‘Votre père est-il encore en vie? Avez-vous un frère?’ et nous avons répondu à ces questions-là. Pouvions-nous savoir qu''il dirait: ‘Faites venir votre frère’?»'
  '8':
  - type: text
    content: 'Juda dit à son père Israël: «Laisse le garçon partir avec moi, pour que nous puissions nous mettre en route. Ainsi nous resterons en vie et ne mourrons pas, ni nous, ni toi ni nos enfants. '
  '9':
  - type: text
    content: 'Je me porte moi-même garant pour lui, c''est à moi que tu le réclameras. Si je ne te le ramène pas et ne te permets pas de le revoir, je serai pour toujours coupable envers toi. '
