document_id: 1JN.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Caractéristiques de l'Esprit de vérité
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Bien-aimés, ne vous fiez pas à tout esprit mais mettez les esprits à l''épreuve pour savoir s''ils sont de Dieu, car plusieurs prétendus prophètes sont venus dans le monde. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici comment identifier l''Esprit de Dieu: tout esprit qui reconnaît que Jésus est le Messie venu en homme est de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et si un esprit ne reconnaît pas que Jésus est le Messie venu en homme, il n''est pas de Dieu: c''est l''esprit de l''Antichrist. Vous avez appris sa venue, et maintenant déjà il est dans le monde.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Vous, petits enfants, vous êtes de Dieu et vous avez vaincu ces prétendus prophètes parce que celui qui est en vous est plus grand que celui qui est dans le monde. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Eux, ils sont du monde; voilà pourquoi ils parlent d''après le monde et le monde les écoute. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nous, nous sommes de Dieu; celui qui connaît Dieu nous écoute, celui qui n'est pas de Dieu ne nous écoute pas. C'est ainsi que nous identifions l'Esprit de la vérité et l'esprit de l'erreur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'amour de Dieu et l'amour mutuel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Bien-aimés, aimons-nous les uns les autres, car l''amour vient de Dieu, et toute personne qui aime est née de Dieu et connaît Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Celui qui n''aime pas n''a pas connu Dieu, car Dieu est amour. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Voici comment l''amour de Dieu s''est manifesté envers nous: Dieu a envoyé son Fils unique dans le monde afin que par lui nous ayons la vie. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et cet amour consiste non pas dans le fait que nous, nous avons aimé Dieu, mais dans le fait que lui nous a aimés et a envoyé son Fils comme victime expiatoire pour nos péchés. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Bien-aimés, puisque Dieu nous a tant aimés, nous devons nous aussi nous aimer les uns les autres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Personne n''a jamais vu Dieu. Si nous nous aimons les uns les autres, Dieu demeure en nous et son amour est parfait en nous. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nous reconnaissons que nous demeurons en lui et qu''il demeure en nous au fait qu''il nous a donné de son Esprit. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et nous, nous avons vu et nous attestons que le Père a envoyé le Fils comme Sauveur du monde. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Celui qui déclare publiquement que Jésus est le Fils de Dieu, Dieu demeure en lui et lui en Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Or nous, nous avons connu l''amour que Dieu a pour nous et nous y avons cru. Dieu est amour et celui qui demeure dans l''amour demeure en Dieu, et Dieu demeure en lui. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'C''est en cela que l''amour est parfait en nous, de sorte que nous aurons de l''assurance le jour du jugement parce que nous sommes dans ce monde tels que lui, il est. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il n''y a pas de peur dans l''amour; au contraire, l''amour parfait chasse la peur, car la peur implique une punition. Celui qui éprouve de la peur n''est pas parfait dans l''amour. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Quant à nous, nous [l']aimons parce qu'il nous a aimés le premier.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Si quelqu''un dit: «J''aime Dieu», alors qu''il déteste son frère, c''est un menteur. En effet, si quelqu''un n''aime pas son frère qu''il voit, comment peut-il aimer Dieu qu''il ne voit pas? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Or, voici le commandement que nous avons reçu de lui: celui qui aime Dieu doit aussi aimer son frère.'
