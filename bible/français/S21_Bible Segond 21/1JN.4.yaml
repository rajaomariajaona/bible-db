document_id: 1JN.4,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Caractéristiques de l'Esprit de vérité
  - type: text
    content: 'Bien-aimés, ne vous fiez pas à tout esprit mais mettez les esprits à l''épreuve pour savoir s''ils sont de Dieu, car plusieurs prétendus prophètes sont venus dans le monde. '
  '10':
  - type: text
    content: 'Et cet amour consiste non pas dans le fait que nous, nous avons aimé Dieu, mais dans le fait que lui nous a aimés et a envoyé son Fils comme victime expiatoire pour nos péchés. '
  '11':
  - type: text
    content: Bien-aimés, puisque Dieu nous a tant aimés, nous devons nous aussi nous aimer les uns les autres.
  '12':
  - type: text
    content: 'Personne n''a jamais vu Dieu. Si nous nous aimons les uns les autres, Dieu demeure en nous et son amour est parfait en nous. '
  '13':
  - type: text
    content: 'Nous reconnaissons que nous demeurons en lui et qu''il demeure en nous au fait qu''il nous a donné de son Esprit. '
  '14':
  - type: text
    content: 'Et nous, nous avons vu et nous attestons que le Père a envoyé le Fils comme Sauveur du monde. '
  '15':
  - type: text
    content: 'Celui qui déclare publiquement que Jésus est le Fils de Dieu, Dieu demeure en lui et lui en Dieu. '
  '16':
  - type: text
    content: 'Or nous, nous avons connu l''amour que Dieu a pour nous et nous y avons cru. Dieu est amour et celui qui demeure dans l''amour demeure en Dieu, et Dieu demeure en lui. '
  '17':
  - type: text
    content: 'C''est en cela que l''amour est parfait en nous, de sorte que nous aurons de l''assurance le jour du jugement parce que nous sommes dans ce monde tels que lui, il est. '
  '18':
  - type: text
    content: 'Il n''y a pas de peur dans l''amour; au contraire, l''amour parfait chasse la peur, car la peur implique une punition. Celui qui éprouve de la peur n''est pas parfait dans l''amour. '
  '19':
  - type: text
    content: Quant à nous, nous [l']aimons parce qu'il nous a aimés le premier.
  '2':
  - type: text
    content: 'Voici comment identifier l''Esprit de Dieu: tout esprit qui reconnaît que Jésus est le Messie venu en homme est de Dieu. '
  '20':
  - type: text
    content: 'Si quelqu''un dit: «J''aime Dieu», alors qu''il déteste son frère, c''est un menteur. En effet, si quelqu''un n''aime pas son frère qu''il voit, comment peut-il aimer Dieu qu''il ne voit pas? '
  '21':
  - type: text
    content: 'Or, voici le commandement que nous avons reçu de lui: celui qui aime Dieu doit aussi aimer son frère.'
  '3':
  - type: text
    content: 'Et si un esprit ne reconnaît pas que Jésus est le Messie venu en homme, il n''est pas de Dieu: c''est l''esprit de l''Antichrist. Vous avez appris sa venue, et maintenant déjà il est dans le monde.'
  '4':
  - type: text
    content: 'Vous, petits enfants, vous êtes de Dieu et vous avez vaincu ces prétendus prophètes parce que celui qui est en vous est plus grand que celui qui est dans le monde. '
  '5':
  - type: text
    content: 'Eux, ils sont du monde; voilà pourquoi ils parlent d''après le monde et le monde les écoute. '
  '6':
  - type: text
    content: Nous, nous sommes de Dieu; celui qui connaît Dieu nous écoute, celui qui n'est pas de Dieu ne nous écoute pas. C'est ainsi que nous identifions l'Esprit de la vérité et l'esprit de l'erreur.
  - type: heading
    content: L'amour de Dieu et l'amour mutuel
  '7':
  - type: text
    content: 'Bien-aimés, aimons-nous les uns les autres, car l''amour vient de Dieu, et toute personne qui aime est née de Dieu et connaît Dieu. '
  '8':
  - type: text
    content: 'Celui qui n''aime pas n''a pas connu Dieu, car Dieu est amour. '
  '9':
  - type: text
    content: 'Voici comment l''amour de Dieu s''est manifesté envers nous: Dieu a envoyé son Fils unique dans le monde afin que par lui nous ayons la vie. '
