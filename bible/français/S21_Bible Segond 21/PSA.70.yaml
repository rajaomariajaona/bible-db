document_id: PSA.70,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière pour la délivrance
  - type: text
    content: Au chef de chœur. De David, comme mémorial.
  '2':
  - type: text
    content: O Dieu, délivre-moi sans tarder!
  - type: text
    content: Eternel, viens vite à mon aide!
  '3':
  - type: text
    content: Qu'ils soient honteux et remplis de confusion, ceux qui en veulent à ma vie!
  - type: text
    content: Qu'ils reculent et rougissent, ceux qui désirent ma perte!
  '4':
  - type: text
    content: Qu'ils fassent demi-tour, saisis de honte,
  - type: text
    content: 'ceux qui disent: «Ha! ha!»'
  '5':
  - type: text
    content: Que tous ceux qui te cherchent
  - type: text
    content: soient dans l'allégresse et se réjouissent en toi!
  - type: text
    content: Que ceux qui aiment ton salut
  - type: text
    content: 'disent sans cesse: «Que Dieu est grand!»'
  '6':
  - type: text
    content: 'Moi, je suis malheureux et pauvre:'
  - type: text
    content: ô Dieu, viens vite à mon secours!
  - type: text
    content: Tu es mon aide et mon libérateur,
  - type: text
    content: Eternel, ne tarde pas!
