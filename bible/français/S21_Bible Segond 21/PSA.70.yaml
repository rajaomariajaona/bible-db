document_id: PSA.70,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière pour la délivrance
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au chef de chœur. De David, comme mémorial.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: O Dieu, délivre-moi sans tarder!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, viens vite à mon aide!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Qu'ils soient honteux et remplis de confusion, ceux qui en veulent à ma vie!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'ils reculent et rougissent, ceux qui désirent ma perte!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Qu'ils fassent demi-tour, saisis de honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ceux qui disent: «Ha! ha!»'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Que tous ceux qui te cherchent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: soient dans l'allégresse et se réjouissent en toi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ceux qui aiment ton salut
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'disent sans cesse: «Que Dieu est grand!»'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Moi, je suis malheureux et pauvre:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ô Dieu, viens vite à mon secours!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es mon aide et mon libérateur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, ne tarde pas!
