document_id: NUM.34,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Instructions pour le partage du pays
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '10':
  - type: text
    content: '»Vous tracerez votre frontière est de Hatsar-Enan à Shepham. '
  '11':
  - type: text
    content: 'Elle descendra de Shepham vers Ribla, à l''est d''Aïn. Elle descendra et s''étendra le long du lac de Génésareth, à l''est. '
  '12':
  - type: text
    content: Elle descendra encore vers le Jourdain pour aboutir à la mer Morte. Tel sera votre pays avec ses frontières tout autour.»
  '13':
  - type: text
    content: 'Moïse transmit cet ordre aux Israélites en ajoutant: «Voilà le pays que vous partagerez par tirage au sort et que l''Eternel a décidé de donner aux neuf tribus et demie. '
  '14':
  - type: text
    content: 'En effet, la tribu des Rubénites et celle des Gadites ont reçu leur héritage en fonction de leur famille. La demi-tribu de Manassé a aussi reçu son héritage. '
  '15':
  - type: text
    content: Ces deux tribus et demie ont reçu leur héritage de ce côté-ci du Jourdain, vis-à-vis de Jéricho, du côté est.»
  '16':
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '17':
  - type: text
    content: '«Voici le nom des hommes qui partageront le pays entre vous: le prêtre Eléazar et Josué, fils de Nun. '
  '18':
  - type: text
    content: 'Vous prendrez aussi un prince de chaque tribu pour faire le partage du pays. '
  '19':
  - type: text
    content: 'Voici le nom de ces hommes. Pour la tribu de Juda: Caleb, fils de Jephunné; '
  '2':
  - type: text
    content: '«Donne l''ordre suivant aux Israélites: Quand vous serez entrés dans le pays de Canaan, ce pays deviendra votre héritage. C''est le pays de Canaan dont voici les limites.'
  '20':
  - type: text
    content: 'pour la tribu des Siméonites: Samuel, fils d''Ammihud; '
  '21':
  - type: text
    content: 'pour la tribu de Benjamin: Elidad, fils de Kislon; '
  '22':
  - type: text
    content: 'pour la tribu des Danites: le prince Buki, fils de Jogli; '
  '23':
  - type: text
    content: 'pour les fils de Joseph, pour la tribu des Manassites: le prince Hanniel, fils d''Ephod, '
  '24':
  - type: text
    content: 'et pour la tribu des Ephraïmites: le prince Kemuel, fils de Shiphtan; '
  '25':
  - type: text
    content: 'pour la tribu des Zabulonites: le prince Elitsaphan, fils de Parnac; '
  '26':
  - type: text
    content: 'pour la tribu des Issacarites: le prince Paltiel, fils d''Azzan; '
  '27':
  - type: text
    content: 'pour la tribu des Asérites: le prince Ahihud, fils de Shelomi; '
  '28':
  - type: text
    content: 'pour la tribu des Nephthalites: le prince Pedahel, fils d''Ammihud.»'
  '29':
  - type: text
    content: Tels sont les hommes à qui l'Eternel ordonna de partager le pays de Canaan entre les Israélites.
  '3':
  - type: text
    content: '»Le côté sud commencera au désert de Tsin près d''Edom. Ainsi, votre frontière sud partira de l''extrémité de la mer Morte, à l''est. '
  '4':
  - type: text
    content: 'Elle tournera au sud de la montée d''Akrabbim, passera par Tsin et s''étendra jusqu''au sud de Kadès-Barnéa. Elle continuera par Hatsar-Addar et passera vers Atsmon. '
  '5':
  - type: text
    content: Depuis Atsmon, elle tournera jusqu'au torrent d'Egypte pour aboutir à la mer.
  '6':
  - type: text
    content: '»Votre frontière ouest sera la mer Méditerranée: ce sera votre frontière à l''ouest.'
  '7':
  - type: text
    content: '»Voici quelle sera votre frontière nord: à partir de la Méditerranée, vous la tracerez jusqu''au mont Hor; '
  '8':
  - type: text
    content: 'depuis le mont Hor, vous la ferez passer par Hamath et arriver à Tsedad. '
  '9':
  - type: text
    content: 'Elle continuera par Ziphron pour aboutir à Hatsar-Enan: ce sera votre frontière au nord.'
