document_id: PSA.83
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière contre les ennemis d'Israël
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Chant, psaume d'Asaph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: O Dieu, ne garde pas le silence!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne te tais pas et ne reste pas inactif, ô Dieu!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: En effet, tes ennemis s'agitent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui te détestent relèvent la tête.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ils forment de perfides complots contre ton peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ils conspirent contre ceux que tu protèges:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: «Venez, disent-ils, exterminons-les du milieu des nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu'on ne se souvienne plus du nom d'Israël!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils intriguent tous d'un même cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ils font une alliance contre toi:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: les Edomites et les Ismaélites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les Moabites et les Hagaréniens,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Guebal, Ammon, Amalek,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les Philistins avec les habitants de Tyr.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L'Assyrie aussi se joint à eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'elle prête main forte aux descendants de Lot. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Traite-les comme Madian,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme Sisera, comme Jabin au torrent du Kison!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ils ont été détruits à En-Dor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sont devenus du fumier pour la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Traite leurs chefs comme Oreb et Zeeb,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous leurs princes comme Zébach et Tsalmunna,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'car ils disent: «Emparons-nous'
- type: usfm
  marker: q1
  children:
  - type: text
    text: des domaines de Dieu!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mon Dieu, fais-les tourbillonner
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme la paille emportée par le vent!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Comme le feu brûle la forêt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme la flamme embrase les montagnes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: poursuis-les de ta tempête
- type: usfm
  marker: q1
  children:
  - type: text
    text: et épouvante-les par ton ouragan!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Couvre leur visage de honte
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin qu'ils cherchent ton nom, Eternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Qu'ils soient confondus et épouvantés pour toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'ils soient honteux et perdus!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Qu'ils reconnaissent que toi seul, toi dont le nom est l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu es le Très-Haut sur toute la terre!
