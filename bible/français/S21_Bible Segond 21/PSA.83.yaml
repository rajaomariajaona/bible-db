document_id: PSA.83,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière contre les ennemis d'Israël
  - type: text
    content: Chant, psaume d'Asaph.
  '10':
  - type: text
    content: Traite-les comme Madian,
  - type: text
    content: comme Sisera, comme Jabin au torrent du Kison!
  '11':
  - type: text
    content: Ils ont été détruits à En-Dor,
  - type: text
    content: ils sont devenus du fumier pour la terre.
  '12':
  - type: text
    content: Traite leurs chefs comme Oreb et Zeeb,
  - type: text
    content: et tous leurs princes comme Zébach et Tsalmunna,
  '13':
  - type: text
    content: 'car ils disent: «Emparons-nous'
  - type: text
    content: des domaines de Dieu!»
  '14':
  - type: text
    content: Mon Dieu, fais-les tourbillonner
  - type: text
    content: comme la paille emportée par le vent!
  '15':
  - type: text
    content: Comme le feu brûle la forêt,
  - type: text
    content: comme la flamme embrase les montagnes,
  '16':
  - type: text
    content: poursuis-les de ta tempête
  - type: text
    content: et épouvante-les par ton ouragan!
  '17':
  - type: text
    content: Couvre leur visage de honte
  - type: text
    content: afin qu'ils cherchent ton nom, Eternel!
  '18':
  - type: text
    content: Qu'ils soient confondus et épouvantés pour toujours,
  - type: text
    content: qu'ils soient honteux et perdus!
  '19':
  - type: text
    content: Qu'ils reconnaissent que toi seul, toi dont le nom est l'Eternel,
  - type: text
    content: tu es le Très-Haut sur toute la terre!
  '2':
  - type: text
    content: O Dieu, ne garde pas le silence!
  - type: text
    content: Ne te tais pas et ne reste pas inactif, ô Dieu!
  '3':
  - type: text
    content: En effet, tes ennemis s'agitent,
  - type: text
    content: ceux qui te détestent relèvent la tête.
  '4':
  - type: text
    content: Ils forment de perfides complots contre ton peuple,
  - type: text
    content: 'ils conspirent contre ceux que tu protèges:'
  '5':
  - type: text
    content: «Venez, disent-ils, exterminons-les du milieu des nations,
  - type: text
    content: et qu'on ne se souvienne plus du nom d'Israël!»
  '6':
  - type: text
    content: Ils intriguent tous d'un même cœur,
  - type: text
    content: 'ils font une alliance contre toi:'
  '7':
  - type: text
    content: les Edomites et les Ismaélites,
  - type: text
    content: les Moabites et les Hagaréniens,
  '8':
  - type: text
    content: Guebal, Ammon, Amalek,
  - type: text
    content: les Philistins avec les habitants de Tyr.
  '9':
  - type: text
    content: L'Assyrie aussi se joint à eux,
  - type: text
    content: 'elle prête main forte aux descendants de Lot. '
  - type: text
    content: – Pause.
