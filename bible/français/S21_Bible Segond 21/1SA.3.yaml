document_id: 1SA.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Appel de Samuel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le jeune Samuel était au service de l''Eternel devant Eli. La parole de l''Eternel était rare à cette époque, les visions n''étaient pas fréquentes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Un jour, Eli, dont la vue commençait à faiblir et qui ne pouvait plus bien voir, était couché à sa place habituelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'La lampe de Dieu n''était pas encore éteinte et Samuel était couché dans le temple de l''Eternel, où se trouvait l''arche de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Alors l''Eternel appela Samuel. Il répondit: «Me voici», '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'courut vers Eli et dit: «Me voici, car tu m''as appelé.» Eli répondit: «Je n''ai pas appelé, retourne te coucher.» Et Samuel alla se coucher.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L''Eternel appela de nouveau Samuel. Samuel se leva, alla vers Eli et dit: «Me voici, car tu m''as appelé.» Eli répondit: «Je n''ai pas appelé, mon fils, retourne te coucher.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Samuel ne connaissait pas encore l'Eternel, la parole de l'Eternel ne lui avait pas encore été révélée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L''Eternel appela de nouveau Samuel, pour la troisième fois. Samuel se leva, alla vers Eli et dit: «Me voici, car tu m''as appelé.» Eli comprit alors que c''était l''Eternel qui appelait l''enfant, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'et il dit à Samuel: «Va te coucher et, si l''on t''appelle, dis: ‘Parle, Eternel, car ton serviteur écoute.’» Et Samuel alla se coucher à sa place.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L''Eternel vint se tenir près de lui et appela comme les autres fois: «Samuel, Samuel!» Samuel répondit: «Parle, car ton serviteur écoute.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors l''Eternel dit à Samuel: «Je vais faire en Israël une chose telle que toute personne qui l''apprendra en restera abasourdie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ce jour-là j''accomplirai vis-à-vis d''Eli tout ce que j''ai prononcé contre sa famille; je le commencerai et je le finirai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Je le lui ai déclaré, je veux punir sa famille pour toujours. En effet, il avait connaissance du crime par lequel ses fils se sont maudits et il ne leur a pas fait de reproches. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: C'est pourquoi je jure à la famille d'Eli que jamais son crime ne sera expié, ni par des sacrifices ni par des offrandes.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Samuel resta couché jusqu''au matin, puis il ouvrit les portes de la maison de l''Eternel. Il avait peur de raconter la vision à Eli, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'mais Eli l''appela et dit: «Samuel, mon fils!» Il répondit: «Me voici!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Eli dit: «Quelle est la parole que l''Eternel t''a adressée? Ne m''en cache rien. Que Dieu te traite avec la plus grande sévérité, si tu me caches quoi que ce soit de tout ce qu''il t''a dit!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Samuel lui raconta tout, sans rien lui cacher, et Eli dit: «C''est l''Eternel, qu''il fasse ce qui lui semblera bon!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Samuel grandissait. L''Eternel était avec lui et ne laissa aucune de ses paroles rester sans effet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tout Israël, depuis Dan jusqu''à Beer-Shéba, reconnut que Samuel était établi prophète de l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: L'Eternel continuait à apparaître à Silo; en effet l'Eternel se révélait à Samuel à Silo en lui adressant la parole.
