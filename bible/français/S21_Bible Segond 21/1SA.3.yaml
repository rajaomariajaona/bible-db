document_id: 1SA.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Appel de Samuel
  - type: text
    content: 'Le jeune Samuel était au service de l''Eternel devant Eli. La parole de l''Eternel était rare à cette époque, les visions n''étaient pas fréquentes. '
  '10':
  - type: text
    content: 'L''Eternel vint se tenir près de lui et appela comme les autres fois: «Samuel, Samuel!» Samuel répondit: «Parle, car ton serviteur écoute.» '
  '11':
  - type: text
    content: 'Alors l''Eternel dit à Samuel: «Je vais faire en Israël une chose telle que toute personne qui l''apprendra en restera abasourdie. '
  '12':
  - type: text
    content: 'Ce jour-là j''accomplirai vis-à-vis d''Eli tout ce que j''ai prononcé contre sa famille; je le commencerai et je le finirai. '
  '13':
  - type: text
    content: 'Je le lui ai déclaré, je veux punir sa famille pour toujours. En effet, il avait connaissance du crime par lequel ses fils se sont maudits et il ne leur a pas fait de reproches. '
  '14':
  - type: text
    content: C'est pourquoi je jure à la famille d'Eli que jamais son crime ne sera expié, ni par des sacrifices ni par des offrandes.»
  '15':
  - type: text
    content: 'Samuel resta couché jusqu''au matin, puis il ouvrit les portes de la maison de l''Eternel. Il avait peur de raconter la vision à Eli, '
  '16':
  - type: text
    content: 'mais Eli l''appela et dit: «Samuel, mon fils!» Il répondit: «Me voici!» '
  '17':
  - type: text
    content: 'Eli dit: «Quelle est la parole que l''Eternel t''a adressée? Ne m''en cache rien. Que Dieu te traite avec la plus grande sévérité, si tu me caches quoi que ce soit de tout ce qu''il t''a dit!» '
  '18':
  - type: text
    content: 'Samuel lui raconta tout, sans rien lui cacher, et Eli dit: «C''est l''Eternel, qu''il fasse ce qui lui semblera bon!»'
  '19':
  - type: text
    content: 'Samuel grandissait. L''Eternel était avec lui et ne laissa aucune de ses paroles rester sans effet. '
  '2':
  - type: text
    content: 'Un jour, Eli, dont la vue commençait à faiblir et qui ne pouvait plus bien voir, était couché à sa place habituelle. '
  '20':
  - type: text
    content: 'Tout Israël, depuis Dan jusqu''à Beer-Shéba, reconnut que Samuel était établi prophète de l''Eternel. '
  '21':
  - type: text
    content: L'Eternel continuait à apparaître à Silo; en effet l'Eternel se révélait à Samuel à Silo en lui adressant la parole.
  '3':
  - type: text
    content: 'La lampe de Dieu n''était pas encore éteinte et Samuel était couché dans le temple de l''Eternel, où se trouvait l''arche de Dieu. '
  '4':
  - type: text
    content: 'Alors l''Eternel appela Samuel. Il répondit: «Me voici», '
  '5':
  - type: text
    content: 'courut vers Eli et dit: «Me voici, car tu m''as appelé.» Eli répondit: «Je n''ai pas appelé, retourne te coucher.» Et Samuel alla se coucher.'
  '6':
  - type: text
    content: 'L''Eternel appela de nouveau Samuel. Samuel se leva, alla vers Eli et dit: «Me voici, car tu m''as appelé.» Eli répondit: «Je n''ai pas appelé, mon fils, retourne te coucher.» '
  '7':
  - type: text
    content: Samuel ne connaissait pas encore l'Eternel, la parole de l'Eternel ne lui avait pas encore été révélée.
  '8':
  - type: text
    content: 'L''Eternel appela de nouveau Samuel, pour la troisième fois. Samuel se leva, alla vers Eli et dit: «Me voici, car tu m''as appelé.» Eli comprit alors que c''était l''Eternel qui appelait l''enfant, '
  '9':
  - type: text
    content: 'et il dit à Samuel: «Va te coucher et, si l''on t''appelle, dis: ‘Parle, Eternel, car ton serviteur écoute.’» Et Samuel alla se coucher à sa place.'
