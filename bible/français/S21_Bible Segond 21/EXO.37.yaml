document_id: EXO.37
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'arche de l'alliance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Betsaleel fit l''arche en bois d''acacia. Sa longueur était de 125 centimètres, sa largeur et sa hauteur de 75 centimètres. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il la couvrit d''or pur intérieurement et extérieurement et il lui fit une bordure en or tout autour. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il fondit pour elle 4 anneaux en or, qu''il mit à ses 4 coins, 2 d''un côté et 2 de l''autre. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il fit des barres en bois d''acacia et les couvrit d''or. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il passa les barres destinées à son transport dans les anneaux situés sur les côtés du coffre. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il fit un couvercle en or pur. Sa longueur était de 125 centimètres et sa largeur de 75 centimètres. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il fit 2 chérubins en or, en or battu, aux 2 extrémités de ce couvercle, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'un chérubin à l''une des extrémités et un chérubin à l''autre extrémité. Il fit sortir les chérubins du propitiatoire à ses 2 extrémités. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les chérubins étendaient les ailes par-dessus le propitiatoire, ils le couvraient de leurs ailes et se regardaient l'un l'autre; ils avaient le visage tourné vers ce couvercle.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La table des pains consacrés
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il fit la table en bois d''acacia. Sa longueur était d''un mètre, sa largeur de 50 centimètres et sa hauteur de 75 centimètres. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il la couvrit d''or pur et lui fit une bordure en or tout autour. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il fit tout autour un cadre de 8 centimètres de large sur lequel il mit une bordure d''or. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il fondit pour la table 4 anneaux en or et les mit aux 4 coins, à ses 4 pieds. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les anneaux étaient situés près du cadre et recevaient les barres destinées au transport de la table. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il fit ces barres en bois d''acacia et les couvrit d''or; elles servaient à porter la table. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il fit les ustensiles qu'on devait mettre sur la table, ses plats, ses coupes, ses gobelets et ses tasses destinés aux offrandes de produits liquides; il les fit en or pur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le chandelier en or
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il fit le chandelier d''or pur. Il le fit en or battu; son pied, sa tige, ses coupes, ses pommes et ses fleurs étaient d''une seule pièce. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il y avait 6 branches qui sortaient de ses côtés, 3 branches du chandelier de l''un des côtés et 3 de l''autre côté. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il y avait sur une branche 3 coupes en forme d''amande, avec pommes et fleurs, et sur une autre branche 3 coupes en forme d''amande, avec pommes et fleurs; il en allait de même pour les 6 branches sortant du chandelier. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Sur la tige du chandelier étaient fixées 4 coupes en forme d''amande, avec leurs pommes et leurs fleurs. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il y avait une pomme sous 2 des branches qui sortaient du chandelier, une pomme sous 2 autres branches et une pomme sous 2 autres branches; il en allait de même pour les 6 branches sortant du chandelier. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les pommes et les branches du chandelier étaient d''une seule pièce. Il était tout entier en or battu, en or pur. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Il fit ses 7 lampes, ses mouchettes et ses vases à cendre en or pur. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Il employa 30 kilos d'or pur pour faire le chandelier avec tous ses ustensiles.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'autel des parfums
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il fit l''autel des parfums en bois d''acacia. Sa longueur et sa largeur étaient de 50 centimètres, il était carré. Sa hauteur était d''un mètre. Des cornes sortaient de l''autel. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il le couvrit d''or pur – le dessus, les côtés tout autour et les cornes – et il fit une bordure en or tout autour. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il fit sous la bordure 2 anneaux en or à placer sur les 2 côtés; il les mit sur les 2 côtés pour y passer les barres destinées à son transport. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Il fit des barres en bois d'acacia et les couvrit d'or.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Il fit l'huile pour l'onction sainte ainsi que le parfum odoriférant et pur, mélangé selon l'art du parfumeur.
