document_id: JOS.5
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lorsque tous les rois des Amoréens qui se trouvaient à l'ouest du Jourdain et tous les rois des Cananéens près de la mer Méditerranée apprirent que l'Eternel avait asséché l'eau du Jourdain devant les Israélites jusqu'à ce qu'ils aient traversé, ils perdirent courage et leur esprit fut abattu devant eux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Circoncision et célébration de la Pâque
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'A cette époque-là, l''Eternel dit à Josué: «Fais-toi des couteaux de pierre et circoncis une nouvelle fois les Israélites.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Josué se fit des couteaux de pierre et circoncit les Israélites sur la colline d''Araloth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voici la raison pour laquelle Josué les circoncit: tout le peuple sorti d''Egypte, les hommes, tous les hommes de guerre, étaient morts dans le désert pendant la route, après leur sortie d''Egypte; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'or, tout ce peuple sorti d''Egypte était circoncis, tandis que le peuple né dans le désert pendant la route, après la sortie d''Egypte, n''avait pas été circoncis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'En effet, les Israélites avaient marché 40 ans dans le désert jusqu''à la destruction de toute la nation des hommes de guerre qui étaient sortis d''Egypte et qui n''avaient pas écouté l''Eternel. L''Eternel leur avait juré de ne pas leur faire voir le pays qu''il avait juré à leurs ancêtres de nous donner, pays où coulent le lait et le miel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ce sont leurs enfants qu''il donna à leur place, et Josué les circoncit. Ils étaient en effet incirconcis, puisqu''on ne les avait pas circoncis pendant la route. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Lorsqu'on eut fini de circoncire toute la nation, ils restèrent sur place dans le camp jusqu'à leur guérison.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'L''Eternel dit à Josué: «Aujourd''hui, j''ai fait rouler loin de vous la honte de l''Egypte», et cet endroit a été appelé Guilgal'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Guilgal: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: littéralement action de rouler.
    marker-yv: yv-n
  - type: text
    text: ' jusqu''à aujourd''hui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les Israélites campèrent à Guilgal. Ils célébrèrent la Pâque le quatorzième jour du mois, sur le soir, dans les plaines de Jéricho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils mangèrent du blé du pays le lendemain de la Pâque, des pains sans levain et du grain rôti. Ils en mangèrent ce jour-là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: La manne cessa le lendemain de la Pâque, au moment où ils mangèrent du blé du pays. Les Israélites n'eurent plus de manne et ils mangèrent des produits du pays de Canaan cette année-là.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prise de Jéricho
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Comme Josué était près de Jéricho, il leva les yeux et regarda. Voici qu''un homme se tenait debout devant lui, son épée dégainée dans la main. Josué alla vers lui et lui dit: «Es-tu pour nous ou pour nos ennemis?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il répondit: «Non. Je suis le chef de l''armée de l''Eternel, j''arrive maintenant.» Josué tomba le visage contre terre, adora et dit: «Que dit mon seigneur à son serviteur?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le chef de l''armée de l''Eternel dit à Josué: «Enlève tes sandales de tes pieds, car l''endroit où tu te tiens est saint.» Josué se conforma à cet ordre.'
