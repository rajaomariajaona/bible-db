document_id: PSA.109
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Imprécation contre le méchant
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu que je célèbre, ne te tais pas,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: car le méchant et le trompeur ouvrent la bouche contre moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils me parlent avec une langue mensongère,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ils m'enveloppent de discours haineux
- type: usfm
  marker: q1
  children:
  - type: text
    text: et me font la guerre sans raison.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Alors que je les aime, ils sont mes adversaires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais moi, je recours à la prière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils me rendent le mal pour le bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de la haine pour mon amour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Place-le sous l'autorité d'un méchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu'un accusateur se tienne à sa droite!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Quand on le jugera, qu'il soit déclaré coupable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que sa prière passe pour un péché!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Que sa vie dure peu longtemps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et *qu'un autre prenne sa charge
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '109.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Qu''un autre… charge: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Actes 1.20
      metadata:
        usfm: ACT.1.20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' en faveur de la désignation d''un remplaçant de Judas dans le collège des apôtres.'
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Que ses enfants deviennent orphelins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa femme veuve!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Que ses enfants soient vagabonds et mendiants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'ils cherchent leur nourriture loin de leur maison en ruine!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Que le créancier s'empare de tout ce qui lui appartient
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que les étrangers pillent le fruit de son travail!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Que personne ne lui montre plus de bonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que personne ne fasse grâce à ses orphelins!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Que ses descendants soient exterminés
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que leur nom disparaisse dans la génération suivante!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Que la faute de ses ancêtres soit rappelée devant l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que le péché de sa mère ne soit pas effacé,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: qu'ils soient toujours présents devant l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu'il supprime leur souvenir de la terre!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: En effet, il ne s'est pas souvenu d'exercer la bonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a persécuté le malheureux et le pauvre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu'à faire mourir l'homme au cœur brisé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il aimait la malédiction: qu''elle tombe sur lui!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il ne voulait pas de la bénédiction: qu''elle s''éloigne de lui!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Qu'il revête la malédiction comme un habit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'elle pénètre en lui comme de l'eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme de l'huile dans ses os!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Qu'elle l'enveloppe comme un vêtement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'elle l'enserre constamment comme une ceinture!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Voilà, de la part de l'Eternel, le salaire de mes ennemis
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de ceux qui disent du mal de moi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Et toi, Eternel, Seigneur, interviens en ma faveur à cause de ton nom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ta bonté est grande, et délivre-moi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Je suis malheureux et pauvre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mon cœur est blessé au fond de moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Je m'en vais comme l'ombre à son déclin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je suis chassé comme la sauterelle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mes genoux sont affaiblis par le jeûne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon corps est épuisé et amaigri.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Je suis pour eux un sujet de moquerie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils me regardent et secouent la tête.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Secours-moi, Eternel, mon Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sauve-moi par ta bonté!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Qu'ils sachent que c'est ta main,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que c'est toi, Eternel, qui es intervenu!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: S'ils maudissent, toi tu béniras;
- type: usfm
  marker: q1
  children:
  - type: text
    text: s'ils se lèvent, ils seront couverts de honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ton serviteur se réjouira.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Que mes adversaires soient couverts de confusion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'ils s'enveloppent de leur honte comme d'un manteau!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Je louerai l'Eternel de ma bouche, à voix haute,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je le célébrerai au milieu de la foule,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: car il se tient à la droite du pauvre
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour le délivrer de ceux qui le condamnent.
