document_id: PSA.109,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Imprécation contre le méchant
  - type: text
    content: Au chef de chœur. Psaume de David.
  - type: text
    content: Dieu que je célèbre, ne te tais pas,
  '10':
  - type: text
    content: Que ses enfants soient vagabonds et mendiants,
  - type: text
    content: qu'ils cherchent leur nourriture loin de leur maison en ruine!
  '11':
  - type: text
    content: Que le créancier s'empare de tout ce qui lui appartient
  - type: text
    content: et que les étrangers pillent le fruit de son travail!
  '12':
  - type: text
    content: Que personne ne lui montre plus de bonté,
  - type: text
    content: que personne ne fasse grâce à ses orphelins!
  '13':
  - type: text
    content: Que ses descendants soient exterminés
  - type: text
    content: et que leur nom disparaisse dans la génération suivante!
  '14':
  - type: text
    content: Que la faute de ses ancêtres soit rappelée devant l'Eternel
  - type: text
    content: et que le péché de sa mère ne soit pas effacé,
  '15':
  - type: text
    content: qu'ils soient toujours présents devant l'Eternel,
  - type: text
    content: et qu'il supprime leur souvenir de la terre!
  '16':
  - type: text
    content: En effet, il ne s'est pas souvenu d'exercer la bonté,
  - type: text
    content: il a persécuté le malheureux et le pauvre,
  - type: text
    content: jusqu'à faire mourir l'homme au cœur brisé.
  '17':
  - type: text
    content: 'Il aimait la malédiction: qu''elle tombe sur lui!'
  - type: text
    content: 'Il ne voulait pas de la bénédiction: qu''elle s''éloigne de lui!'
  '18':
  - type: text
    content: Qu'il revête la malédiction comme un habit,
  - type: text
    content: qu'elle pénètre en lui comme de l'eau,
  - type: text
    content: comme de l'huile dans ses os!
  '19':
  - type: text
    content: Qu'elle l'enveloppe comme un vêtement,
  - type: text
    content: qu'elle l'enserre constamment comme une ceinture!
  '2':
  - type: text
    content: car le méchant et le trompeur ouvrent la bouche contre moi,
  - type: text
    content: ils me parlent avec une langue mensongère,
  '20':
  - type: text
    content: Voilà, de la part de l'Eternel, le salaire de mes ennemis
  - type: text
    content: et de ceux qui disent du mal de moi!
  '21':
  - type: text
    content: Et toi, Eternel, Seigneur, interviens en ma faveur à cause de ton nom,
  - type: text
    content: car ta bonté est grande, et délivre-moi!
  '22':
  - type: text
    content: Je suis malheureux et pauvre,
  - type: text
    content: et mon cœur est blessé au fond de moi.
  '23':
  - type: text
    content: Je m'en vais comme l'ombre à son déclin,
  - type: text
    content: je suis chassé comme la sauterelle.
  '24':
  - type: text
    content: Mes genoux sont affaiblis par le jeûne,
  - type: text
    content: mon corps est épuisé et amaigri.
  '25':
  - type: text
    content: Je suis pour eux un sujet de moquerie;
  - type: text
    content: ils me regardent et secouent la tête.
  '26':
  - type: text
    content: Secours-moi, Eternel, mon Dieu,
  - type: text
    content: sauve-moi par ta bonté!
  '27':
  - type: text
    content: Qu'ils sachent que c'est ta main,
  - type: text
    content: que c'est toi, Eternel, qui es intervenu!
  '28':
  - type: text
    content: S'ils maudissent, toi tu béniras;
  - type: text
    content: s'ils se lèvent, ils seront couverts de honte,
  - type: text
    content: et ton serviteur se réjouira.
  '29':
  - type: text
    content: Que mes adversaires soient couverts de confusion,
  - type: text
    content: qu'ils s'enveloppent de leur honte comme d'un manteau!
  '3':
  - type: text
    content: ils m'enveloppent de discours haineux
  - type: text
    content: et me font la guerre sans raison.
  '30':
  - type: text
    content: Je louerai l'Eternel de ma bouche, à voix haute,
  - type: text
    content: je le célébrerai au milieu de la foule,
  '31':
  - type: text
    content: car il se tient à la droite du pauvre
  - type: text
    content: pour le délivrer de ceux qui le condamnent.
  '4':
  - type: text
    content: Alors que je les aime, ils sont mes adversaires,
  - type: text
    content: mais moi, je recours à la prière.
  '5':
  - type: text
    content: Ils me rendent le mal pour le bien,
  - type: text
    content: et de la haine pour mon amour.
  '6':
  - type: text
    content: Place-le sous l'autorité d'un méchant,
  - type: text
    content: et qu'un accusateur se tienne à sa droite!
  '7':
  - type: text
    content: Quand on le jugera, qu'il soit déclaré coupable,
  - type: text
    content: et que sa prière passe pour un péché!
  '8':
  - type: text
    content: Que sa vie dure peu longtemps,
  - type: text
    content: et *qu'un autre prenne sa charge
  - type: note
    content: 'Qu''un autre… charge: cité en Actes 1.20 en faveur de la désignation d''un remplaçant de Judas dans le collège des apôtres.'
  - type: text
    content: '!'
  '9':
  - type: text
    content: Que ses enfants deviennent orphelins,
  - type: text
    content: et sa femme veuve!
