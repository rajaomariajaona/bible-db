document_id: JOB.41,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: »Tout espoir de le vaincre est trompeur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A son seul aspect n'est-on pas terrassé?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: »Ses éternuements dégagent de la lumière;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses yeux sont pareils aux paupières de l'aurore.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Des flammes jaillissent de sa bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des étincelles de feu s'en échappent.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Une fumée sort de ses narines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme d'une marmite qui bout ou d'un chaudron surchauffé.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Son souffle allume des charbons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de sa gueule sort une flamme.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: La force se loge dans son cou.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Devant lui on bondit d'épouvante.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: »Les éléments de son corps tiennent solidement ensemble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme coulés d'une pièce, inébranlables.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Son cœur est aussi résistant que la pierre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aussi résistant que la pierre de meule du bas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Pierre de meule du bas: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: on écrasait le blé entre deux meules; celle du bas, fixe, devait être particulièrement solide.
      marker-yv: yv-n
    - type: text
      text: .
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Quand il se lève, les plus puissants ont peur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et s'enfuient, affolés.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: L'approcher avec l'épée est inefficace,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout comme avec la lance, le javelot et la cuirasse.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: A ses yeux, le fer n'est que de la paille
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le bronze du bois pourri.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Si personne n'est assez courageux pour l'exciter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui donc pourrait me résister en face?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: La flèche ne le fait pas fuir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les pierres de la fronde sont des brins de paille pour lui.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Il ne voit dans la massue qu'un brin de paille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il rit au sifflement du javelot.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '»Sous son ventre se trouvent des pointes aiguës:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on dirait une herse qu'il traîne sur de la vase.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Il fait bouillonner le fond de la mer comme une marmite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il l'agite comme un vase rempli de parfum.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Il laisse après lui un sentier lumineux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les flots prennent une teinte blanche.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Sur la terre personne n'est son maître;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a été créé pour n'éprouver aucune peur.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Il défie tout ce qui est grand,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est le roi des plus fiers animaux.»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '*Qui m''a donné le premier pour que je le paie en retour?'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '41.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qui… retour: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: cité en Romains 11.35.
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout ce qui est sous le ciel m'appartient.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: »Je veux encore parler de ses membres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de sa puissance et de la beauté de sa constitution.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Qui l'a dépouillé de son habit?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui pourra pénétrer entre ses mâchoires?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Qui a ouvert les portes de sa gueule?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Autour de ses dents, c'est la terreur!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ses fiers et puissants boucliers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sont étroitement et solidement liés.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ils sont si serrés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que l'air ne passe pas entre eux.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Collés l'un contre l'autre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont imbriqués, inséparables.
