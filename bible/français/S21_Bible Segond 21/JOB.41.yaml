document_id: JOB.41,152
type_code: fra
verses:
  '1':
  - type: text
    content: »Tout espoir de le vaincre est trompeur.
  - type: text
    content: A son seul aspect n'est-on pas terrassé?
  '10':
  - type: text
    content: »Ses éternuements dégagent de la lumière;
  - type: text
    content: ses yeux sont pareils aux paupières de l'aurore.
  '11':
  - type: text
    content: Des flammes jaillissent de sa bouche,
  - type: text
    content: des étincelles de feu s'en échappent.
  '12':
  - type: text
    content: Une fumée sort de ses narines,
  - type: text
    content: comme d'une marmite qui bout ou d'un chaudron surchauffé.
  '13':
  - type: text
    content: Son souffle allume des charbons,
  - type: text
    content: de sa gueule sort une flamme.
  '14':
  - type: text
    content: La force se loge dans son cou.
  - type: text
    content: Devant lui on bondit d'épouvante.
  '15':
  - type: text
    content: »Les éléments de son corps tiennent solidement ensemble,
  - type: text
    content: comme coulés d'une pièce, inébranlables.
  '16':
  - type: text
    content: Son cœur est aussi résistant que la pierre,
  - type: text
    content: aussi résistant que la pierre de meule du bas
  - type: note
    content: 'Pierre de meule du bas: on écrasait le blé entre deux meules; celle du bas, fixe, devait être particulièrement solide.'
  - type: text
    content: .
  '17':
  - type: text
    content: Quand il se lève, les plus puissants ont peur
  - type: text
    content: et s'enfuient, affolés.
  '18':
  - type: text
    content: L'approcher avec l'épée est inefficace,
  - type: text
    content: tout comme avec la lance, le javelot et la cuirasse.
  '19':
  - type: text
    content: A ses yeux, le fer n'est que de la paille
  - type: text
    content: et le bronze du bois pourri.
  '2':
  - type: text
    content: Si personne n'est assez courageux pour l'exciter,
  - type: text
    content: qui donc pourrait me résister en face?
  '20':
  - type: text
    content: La flèche ne le fait pas fuir,
  - type: text
    content: les pierres de la fronde sont des brins de paille pour lui.
  '21':
  - type: text
    content: Il ne voit dans la massue qu'un brin de paille,
  - type: text
    content: il rit au sifflement du javelot.
  '22':
  - type: text
    content: '»Sous son ventre se trouvent des pointes aiguës:'
  - type: text
    content: on dirait une herse qu'il traîne sur de la vase.
  '23':
  - type: text
    content: Il fait bouillonner le fond de la mer comme une marmite,
  - type: text
    content: il l'agite comme un vase rempli de parfum.
  '24':
  - type: text
    content: Il laisse après lui un sentier lumineux,
  - type: text
    content: les flots prennent une teinte blanche.
  '25':
  - type: text
    content: Sur la terre personne n'est son maître;
  - type: text
    content: il a été créé pour n'éprouver aucune peur.
  '26':
  - type: text
    content: Il défie tout ce qui est grand,
  - type: text
    content: il est le roi des plus fiers animaux.»
  '3':
  - type: text
    content: '*Qui m''a donné le premier pour que je le paie en retour?'
  - type: note
    content: 'Qui… retour: cité en Romains 11.35.'
  - type: text
    content: Tout ce qui est sous le ciel m'appartient.
  '4':
  - type: text
    content: »Je veux encore parler de ses membres,
  - type: text
    content: de sa puissance et de la beauté de sa constitution.
  '5':
  - type: text
    content: Qui l'a dépouillé de son habit?
  - type: text
    content: Qui pourra pénétrer entre ses mâchoires?
  '6':
  - type: text
    content: Qui a ouvert les portes de sa gueule?
  - type: text
    content: Autour de ses dents, c'est la terreur!
  '7':
  - type: text
    content: Ses fiers et puissants boucliers
  - type: text
    content: sont étroitement et solidement liés.
  '8':
  - type: text
    content: Ils sont si serrés
  - type: text
    content: que l'air ne passe pas entre eux.
  '9':
  - type: text
    content: Collés l'un contre l'autre,
  - type: text
    content: ils sont imbriqués, inséparables.
