document_id: EST.9
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le treizième jour du douzième mois, c''est-à-dire le mois d''Adar, le jour où le message du roi, qui avait valeur de loi, aurait dû entrer en vigueur, le jour où les ennemis des Juifs avaient espéré dominer sur eux, ce fut le contraire qui arriva: ce fut au tour des Juifs de dominer ceux qui les détestaient. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ils se rassemblèrent dans leurs villes respectives, dans toutes les provinces du roi Assuérus, pour porter la main contre ceux qui leur voulaient du mal. Personne ne leur opposa de résistance, tant les autres peuples avaient peur d''eux. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'De plus, tous les chefs de province, les satrapes, les gouverneurs et les fonctionnaires du roi soutenaient les Juifs, tant ils avaient peur de Mardochée. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: En effet, celui-ci jouait un rôle important au palais et sa réputation atteignait toutes les provinces car il exerçait une influence grandissante.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les Juifs frappèrent tous leurs ennemis à coups d''épée, les tuant et les faisant disparaître. Ils traitèrent selon leur bon plaisir ceux qui les détestaient. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'A Suse, la capitale, ils tuèrent et firent disparaître 500 hommes, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'sans compter Parshandatha, Dalphon, Aspatha, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Poratha, Adalia, Aridatha, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Parmashtha, Arizaï, Aridaï et Vajezatha, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: les dix fils d'Haman, fils d'Hammedatha, l'adversaire des Juifs. En revanche, ils ne se livrèrent à aucun pillage.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le jour même, le nombre de personnes tuées à Suse, la capitale, fut communiqué au roi, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'et celui-ci dit à la reine Esther: «A Suse, la capitale, les Juifs ont tué et fait disparaître 500 hommes, sans compter les dix fils d''Haman. Qu''auront-ils fait dans le reste de mes provinces? Cependant, quel est l''objet de ta demande? Il te sera accordé. Que désires-tu encore? Tu l''obtiendras.» '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Esther répondit: «Si tu le juges bon, il faudrait autoriser les Juifs de Suse à agir demain encore conformément à la loi en vigueur aujourd''hui et pendre le corps des dix fils d''Haman à une potence.» '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Le roi ordonna d'agir de cette manière.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Cet édit fut donc proclamé à Suse et l''on pendit le corps des dix fils d''Haman; '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'de plus, les Juifs de Suse se rassemblèrent de nouveau le quatorzième jour du mois d''Adar et tuèrent 300 hommes à Suse. En revanche, ils ne se livrèrent à aucun pillage. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Quant au reste des Juifs, ceux qui se trouvaient dans les autres provinces du roi, ils se rassemblèrent pour défendre leur vie et obtenir le repos vis-à-vis de leurs ennemis. Ils tuèrent 75''000 personnes parmi ceux qui les détestaient. En revanche, ils ne se livrèrent à aucun pillage. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ils firent cela le treizième jour du mois d''Adar et se reposèrent le quatorzième, et ils en firent un jour réservé aux banquets et à la joie. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'De leur côté, les Juifs de Suse s''étaient rassemblés les treizième et quatorzième jours et se reposèrent le quinzième; c''est donc ce jour-là qu''ils réservèrent aux banquets et à la joie. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Voilà pourquoi pour les Juifs de la campagne, ceux qui habitent des villes dépourvues de murailles, c'est le quatorzième jour du mois d'Adar qui est un jour réservé à la joie, aux banquets et à la fête, où l'on s'envoie des cadeaux les uns aux autres.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Conséquences de la délivrance
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 9.20–10.3
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Institution de la fête des Pourim
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mardochée enregistra ces événements par écrit et envoya des lettres à tous les Juifs installés dans toutes les provinces du roi Assuérus, qu''ils soient près ou loin. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il leur prescrivait de célébrer chaque année les quatorzième et quinzième jours du mois d''Adar. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'En effet, c''étaient les jours où les Juifs avaient obtenu le repos vis-à-vis de leurs ennemis, le mois où leur tristesse avait été transformée en joie et leur deuil en fête. Ils devaient donc faire de ces jours des jours réservés aux banquets et à la joie, où l''on s''envoie des cadeaux les uns aux autres et où l''on fait des offrandes aux pauvres. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Les Juifs s'engagèrent à poursuivre ce qu'ils avaient déjà commencé de faire et ce que Mardochée leur avait prescrit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'En effet, Haman, fils d''Hammedatha, l''Agaguite qui était l''adversaire de tous les Juifs, avait projeté de les faire disparaître et il avait jeté le «pour», c''est-à-dire le sort, en vue de semer le trouble parmi eux et de les faire disparaître. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Cependant, Esther s''était présentée devant le roi, et celui-ci avait ordonné par écrit de faire retomber sur la tête d''Haman le funeste projet qu''il avait formé contre les Juifs et de le pendre à une potence, ainsi que ses fils. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Voilà pourquoi on appela ces jours Pourim, d''après le mot «pour». Voilà pourquoi aussi, en s''appuyant sur toutes les instructions de cette lettre, sur ce qu''ils avaient eux-mêmes vu et sur ce qui leur était arrivé, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'les Juifs prirent l''engagement irrévocable pour eux, pour leur descendance et pour tous ceux qui se joindraient à eux, de célébrer ces deux jours en respectant ce qui était prescrit et la date fixée, et ce chaque année, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: de garder le souvenir de ces jours et les célébrer de génération en génération dans chaque famille, dans chaque province et dans chaque ville, et de ne jamais laisser ces jours de Pourim disparaître du milieu des Juifs ni leur souvenir s'effacer parmi leurs descendants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'La reine Esther, fille d''Abichaïl, et le Juif Mardochée écrivirent une seconde fois, avec toute l''autorité qui était la leur, pour confirmer la lettre relative aux Pourim. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'On envoya des lettres à tous les Juifs, dans les 127 provinces du roi Assuérus. Porteuses d''un message de paix et de vérité, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'elles confirmaient la date fixée pour les jours de Pourim par le Juif Mardochée et la reine Esther, mais aussi par les Juifs eux-mêmes, pour eux et leur descendance et contenaient les instructions relatives aux jeûnes et aux cris qui les accompagnaient. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ainsi, l'ordre d'Esther confirma ces instructions relatives aux Pourim et il fut enregistré par écrit dans un livre.
