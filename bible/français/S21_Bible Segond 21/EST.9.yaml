document_id: EST.9,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Le treizième jour du douzième mois, c''est-à-dire le mois d''Adar, le jour où le message du roi, qui avait valeur de loi, aurait dû entrer en vigueur, le jour où les ennemis des Juifs avaient espéré dominer sur eux, ce fut le contraire qui arriva: ce fut au tour des Juifs de dominer ceux qui les détestaient. '
  '10':
  - type: text
    content: les dix fils d'Haman, fils d'Hammedatha, l'adversaire des Juifs. En revanche, ils ne se livrèrent à aucun pillage.
  '11':
  - type: text
    content: 'Le jour même, le nombre de personnes tuées à Suse, la capitale, fut communiqué au roi, '
  '12':
  - type: text
    content: 'et celui-ci dit à la reine Esther: «A Suse, la capitale, les Juifs ont tué et fait disparaître 500 hommes, sans compter les dix fils d''Haman. Qu''auront-ils fait dans le reste de mes provinces? Cependant, quel est l''objet de ta demande? Il te sera accordé. Que désires-tu encore? Tu l''obtiendras.» '
  '13':
  - type: text
    content: 'Esther répondit: «Si tu le juges bon, il faudrait autoriser les Juifs de Suse à agir demain encore conformément à la loi en vigueur aujourd''hui et pendre le corps des dix fils d''Haman à une potence.» '
  '14':
  - type: text
    content: Le roi ordonna d'agir de cette manière.
  - type: text
    content: 'Cet édit fut donc proclamé à Suse et l''on pendit le corps des dix fils d''Haman; '
  '15':
  - type: text
    content: 'de plus, les Juifs de Suse se rassemblèrent de nouveau le quatorzième jour du mois d''Adar et tuèrent 300 hommes à Suse. En revanche, ils ne se livrèrent à aucun pillage. '
  '16':
  - type: text
    content: 'Quant au reste des Juifs, ceux qui se trouvaient dans les autres provinces du roi, ils se rassemblèrent pour défendre leur vie et obtenir le repos vis-à-vis de leurs ennemis. Ils tuèrent 75''000 personnes parmi ceux qui les détestaient. En revanche, ils ne se livrèrent à aucun pillage. '
  '17':
  - type: text
    content: 'Ils firent cela le treizième jour du mois d''Adar et se reposèrent le quatorzième, et ils en firent un jour réservé aux banquets et à la joie. '
  '18':
  - type: text
    content: 'De leur côté, les Juifs de Suse s''étaient rassemblés les treizième et quatorzième jours et se reposèrent le quinzième; c''est donc ce jour-là qu''ils réservèrent aux banquets et à la joie. '
  '19':
  - type: text
    content: Voilà pourquoi pour les Juifs de la campagne, ceux qui habitent des villes dépourvues de murailles, c'est le quatorzième jour du mois d'Adar qui est un jour réservé à la joie, aux banquets et à la fête, où l'on s'envoie des cadeaux les uns aux autres.
  - type: heading
    content: Conséquences de la délivrance
  - type: heading
    content: 9.20–10.3
  - type: heading
    content: Institution de la fête des Pourim
  '2':
  - type: text
    content: 'Ils se rassemblèrent dans leurs villes respectives, dans toutes les provinces du roi Assuérus, pour porter la main contre ceux qui leur voulaient du mal. Personne ne leur opposa de résistance, tant les autres peuples avaient peur d''eux. '
  '20':
  - type: text
    content: 'Mardochée enregistra ces événements par écrit et envoya des lettres à tous les Juifs installés dans toutes les provinces du roi Assuérus, qu''ils soient près ou loin. '
  '21':
  - type: text
    content: 'Il leur prescrivait de célébrer chaque année les quatorzième et quinzième jours du mois d''Adar. '
  '22':
  - type: text
    content: 'En effet, c''étaient les jours où les Juifs avaient obtenu le repos vis-à-vis de leurs ennemis, le mois où leur tristesse avait été transformée en joie et leur deuil en fête. Ils devaient donc faire de ces jours des jours réservés aux banquets et à la joie, où l''on s''envoie des cadeaux les uns aux autres et où l''on fait des offrandes aux pauvres. '
  '23':
  - type: text
    content: Les Juifs s'engagèrent à poursuivre ce qu'ils avaient déjà commencé de faire et ce que Mardochée leur avait prescrit.
  '24':
  - type: text
    content: 'En effet, Haman, fils d''Hammedatha, l''Agaguite qui était l''adversaire de tous les Juifs, avait projeté de les faire disparaître et il avait jeté le «pour», c''est-à-dire le sort, en vue de semer le trouble parmi eux et de les faire disparaître. '
  '25':
  - type: text
    content: 'Cependant, Esther s''était présentée devant le roi, et celui-ci avait ordonné par écrit de faire retomber sur la tête d''Haman le funeste projet qu''il avait formé contre les Juifs et de le pendre à une potence, ainsi que ses fils. '
  '26':
  - type: text
    content: 'Voilà pourquoi on appela ces jours Pourim, d''après le mot «pour». Voilà pourquoi aussi, en s''appuyant sur toutes les instructions de cette lettre, sur ce qu''ils avaient eux-mêmes vu et sur ce qui leur était arrivé, '
  '27':
  - type: text
    content: 'les Juifs prirent l''engagement irrévocable pour eux, pour leur descendance et pour tous ceux qui se joindraient à eux, de célébrer ces deux jours en respectant ce qui était prescrit et la date fixée, et ce chaque année, '
  '28':
  - type: text
    content: de garder le souvenir de ces jours et les célébrer de génération en génération dans chaque famille, dans chaque province et dans chaque ville, et de ne jamais laisser ces jours de Pourim disparaître du milieu des Juifs ni leur souvenir s'effacer parmi leurs descendants.
  '29':
  - type: text
    content: 'La reine Esther, fille d''Abichaïl, et le Juif Mardochée écrivirent une seconde fois, avec toute l''autorité qui était la leur, pour confirmer la lettre relative aux Pourim. '
  '3':
  - type: text
    content: 'De plus, tous les chefs de province, les satrapes, les gouverneurs et les fonctionnaires du roi soutenaient les Juifs, tant ils avaient peur de Mardochée. '
  '30':
  - type: text
    content: 'On envoya des lettres à tous les Juifs, dans les 127 provinces du roi Assuérus. Porteuses d''un message de paix et de vérité, '
  '31':
  - type: text
    content: 'elles confirmaient la date fixée pour les jours de Pourim par le Juif Mardochée et la reine Esther, mais aussi par les Juifs eux-mêmes, pour eux et leur descendance et contenaient les instructions relatives aux jeûnes et aux cris qui les accompagnaient. '
  '32':
  - type: text
    content: Ainsi, l'ordre d'Esther confirma ces instructions relatives aux Pourim et il fut enregistré par écrit dans un livre.
  '4':
  - type: text
    content: En effet, celui-ci jouait un rôle important au palais et sa réputation atteignait toutes les provinces car il exerçait une influence grandissante.
  '5':
  - type: text
    content: 'Les Juifs frappèrent tous leurs ennemis à coups d''épée, les tuant et les faisant disparaître. Ils traitèrent selon leur bon plaisir ceux qui les détestaient. '
  '6':
  - type: text
    content: 'A Suse, la capitale, ils tuèrent et firent disparaître 500 hommes, '
  '7':
  - type: text
    content: 'sans compter Parshandatha, Dalphon, Aspatha, '
  '8':
  - type: text
    content: 'Poratha, Adalia, Aridatha, '
  '9':
  - type: text
    content: 'Parmashtha, Arizaï, Aridaï et Vajezatha, '
