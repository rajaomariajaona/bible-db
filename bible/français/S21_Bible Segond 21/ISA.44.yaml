document_id: ISA.44,152
type_code: fra
verses:
  '1':
  - type: heading
    content: L'Eternel et les idoles
  - type: text
    content: Ecoute maintenant, Jacob, mon serviteur,
  - type: text
    content: Israël, toi que j'ai choisi!
  '10':
  - type: text
    content: Qui est-ce qui façonne un dieu ou coule une sculpture sacrée
  - type: text
    content: pour n'en retirer aucune utilité?
  '11':
  - type: text
    content: Tous ses associés seront couverts de honte.
  - type: text
    content: Les artisans ne sont eux-mêmes que des êtres humains.
  - type: text
    content: Qu'ils se rassemblent là, qu'ils se présentent tous,
  - type: text
    content: et tous ensemble ils seront tremblants et couverts de honte.
  '12':
  - type: text
    content: Pour confectionner une hache, le forgeron
  - type: text
    content: travaille avec des braises,
  - type: text
    content: et il la façonne à coups de marteau,
  - type: text
    content: il la travaille d'un bras vigoureux.
  - type: text
    content: Cependant, il suffit qu'il ait faim et le voilà sans force,
  - type: text
    content: qu'il n'ait pas bu d'eau et le voilà épuisé.
  '13':
  - type: text
    content: Le charpentier étire le ruban à mesurer,
  - type: text
    content: il fait un tracé à la craie
  - type: text
    content: et travaille le bois au ciseau,
  - type: text
    content: tout en faisant des marques au compas.
  - type: text
    content: Il le travaille sur le modèle d'un homme,
  - type: text
    content: d'un être humain dans toute sa beauté,
  - type: text
    content: pour qu'il soit installé dans un temple.
  '14':
  - type: text
    content: Pour cela, il se coupe des cèdres,
  - type: text
    content: il se procure des chênes et de grands arbres
  - type: text
    content: qu'il choisit bien vigoureux dans la forêt,
  - type: text
    content: il plante des pins que la pluie fait grandir.
  '15':
  - type: text
    content: 'L''homme utilise ces arbres pour faire du feu:'
  - type: text
    content: il en prend une partie pour se chauffer,
  - type: text
    content: il en brûle aussi pour faire cuire son pain.
  - type: text
    content: Cependant, il les utilise aussi pour se fabriquer un dieu qu'il adore,
  - type: text
    content: il en fait une statue devant laquelle il se prosterne!
  '16':
  - type: text
    content: Il brûle la moitié de son bois afin de pouvoir manger de la viande,
  - type: text
    content: préparer un rôti et se rassasier.
  - type: text
    content: 'Il l''utilise aussi pour se chauffer et dit: «Ah!'
  - type: text
    content: Je me chauffe, je vois la flamme!»
  '17':
  - type: text
    content: Et avec le reste il se fait un dieu, une sculpture sacrée!
  - type: text
    content: Il se prosterne devant lui et l'adore, il lui adresse des prières
  - type: text
    content: 'en s''écriant: «Sauve-moi,'
  - type: text
    content: car c'est toi qui es mon dieu!»
  '18':
  - type: text
    content: Ils n'ont ni discernement ni intelligence,
  - type: text
    content: car on leur a fermé les yeux pour qu'ils ne voient pas
  - type: text
    content: et le cœur pour qu'ils ne fassent pas preuve de bon sens.
  '19':
  - type: text
    content: Il ne se met pas à réfléchir,
  - type: text
    content: 'il n''a ni le discernement ni l''intelligence de se dire:'
  - type: text
    content: «J'ai brûlé une moitié du bois,
  - type: text
    content: j'ai cuit du pain sur ses braises,
  - type: text
    content: j'y ai rôti de la viande pour la manger,
  - type: text
    content: et avec le reste je ferais une horreur!
  - type: text
    content: Je me prosternerais devant un morceau de bois!»
  '2':
  - type: text
    content: Voici ce que dit l'Eternel, celui qui t'a fait
  - type: text
    content: et qui t'a façonné depuis le ventre de ta mère,
  - type: text
    content: 'celui qui est ton soutien:'
  - type: text
    content: N'aie pas peur, Jacob mon serviteur,
  - type: text
    content: Jeshurun
  - type: note
    content: 'Jeshurun: nom poétique d''Israël signifiant probablement celui qui est droit, celui qui est juste.'
  - type: text
    content: ', toi que j''ai choisi.'
  '20':
  - type: text
    content: Il se nourrit de cendres,
  - type: text
    content: son cœur s'est laissé tromper et l'égare.
  - type: text
    content: 'Il est incapable de se délivrer lui-même et de dire:'
  - type: text
    content: «N'est-ce pas une fausseté que j'ai dans la main?»
  - type: heading
    content: Retour d'Israël chez lui
  '21':
  - type: text
    content: Souviens-toi de cela, Jacob!
  - type: text
    content: Souviens-t'en, Israël, car tu es mon serviteur.
  - type: text
    content: Je t'ai façonné pour que tu sois mon serviteur,
  - type: text
    content: Israël, je ne t'oublierai pas.
  '22':
  - type: text
    content: J'ai effacé tes transgressions comme un nuage,
  - type: text
    content: tes péchés comme la brume.
  - type: text
    content: Reviens vers moi,
  - type: text
    content: car je t'ai racheté.
  '23':
  - type: text
    content: Ciel, réjouis-toi, car l'Eternel a agi!
  - type: text
    content: Profondeurs de la terre, criez d'allégresse!
  - type: text
    content: Montagnes, éclatez en cris de joie,
  - type: text
    content: et vous aussi, forêts, avec tous vos arbres!
  - type: text
    content: En effet, l'Eternel a racheté Jacob,
  - type: text
    content: il a montré sa splendeur en Israël.
  '24':
  - type: text
    content: Voici ce que dit l'Eternel, celui qui te rachète,
  - type: text
    content: 'celui qui t''a façonné dès le ventre de ta mère:'
  - type: text
    content: C'est moi, l'Eternel, qui suis l'auteur de tout.
  - type: text
    content: Tout seul j'ai déployé le ciel, par moi-même j'ai disposé la terre.
  '25':
  - type: text
    content: Je fais échec aux signes des faiseurs de prédictions
  - type: text
    content: et je frappe de folie les devins;
  - type: text
    content: je fais reculer les sages
  - type: text
    content: et montre la stupidité de leur savoir.
  '26':
  - type: text
    content: Je confirme la parole de mon serviteur
  - type: text
    content: et je mets à exécution les décisions annoncées par mes messagers.
  - type: text
    content: 'Je dis à propos de Jérusalem: «Elle sera habitée»'
  - type: text
    content: 'et à propos des villes de Juda: «Elles seront reconstruites'
  - type: text
    content: et je relèverai leurs ruines.»
  '27':
  - type: text
    content: 'Je dis aux profondeurs de la mer: «Asséchez-vous!'
  - type: text
    content: Je vais faire disparaître vos courants.»
  '28':
  - type: text
    content: 'Je dis à propos de Cyrus: «Il est mon berger'
  - type: text
    content: et il *accomplira toute ma volonté
  - type: note
    content: 'Accomplira… volonté: cité en Actes 13.22 avec application à David.'
  - type: text
    content: .
  - type: text
    content: 'Il dira à Jérusalem: ‘Sois reconstruite!’'
  - type: text
    content: 'et au temple: ‘Que tes fondations soient posées!’»'
  '3':
  - type: text
    content: En effet, je verserai de l'eau sur la terre qui a soif
  - type: text
    content: et des ruisseaux sur le terrain sec;
  - type: text
    content: je déverserai mon Esprit sur ta descendance
  - type: text
    content: et ma bénédiction sur tes rejetons.
  '4':
  - type: text
    content: Ils pousseront au milieu de l'herbe
  - type: text
    content: comme les saules près des cours d'eau.
  '5':
  - type: text
    content: 'L''un dira: «J''appartiens à l''Eternel»,'
  - type: text
    content: l'autre voudra porter le nom de Jacob,
  - type: text
    content: 'un autre écrira sur sa main: «Propriété de l''Eternel!»'
  - type: text
    content: et prendra avec fierté le nom d'Israël.
  '6':
  - type: text
    content: Voici ce que dit l'Eternel, le roi d'Israël et celui qui le rachète,
  - type: text
    content: 'l''Eternel, le maître de l''univers:'
  - type: text
    content: Je suis le premier et le dernier.
  - type: text
    content: En dehors de moi, il n'y a pas de Dieu.
  '7':
  - type: text
    content: Qui est pareil à moi? Qu'il le proclame,
  - type: text
    content: qu'il le révèle et m'expose tout ce qui s'est passé depuis que j'ai fondé le peuple ancien!
  - type: text
    content: Qu'on révèle aussi l'avenir et ce qui doit arriver!
  '8':
  - type: text
    content: Ne tremblez pas, n'ayez pas peur!
  - type: text
    content: Ne te l'ai-je pas depuis longtemps annoncé et révélé?
  - type: text
    content: 'Vous êtes mes témoins:'
  - type: text
    content: y a-t-il un autre Dieu en dehors de moi?
  - type: text
    content: Il n'y a pas d'autre rocher, je n'en connais pas.
  '9':
  - type: text
    content: Ceux qui fabriquent des sculptures sacrées ne sont tous que vide
  - type: text
    content: et celles qui font leur plus grand plaisir ne servent à rien.
  - type: text
    content: 'Du reste, elles en témoignent elles-mêmes:'
  - type: text
    content: elles ne voient rien et ne savent rien,
  - type: text
    content: si bien qu'ils seront couverts de honte.
