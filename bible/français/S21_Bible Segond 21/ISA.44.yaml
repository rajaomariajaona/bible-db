document_id: ISA.44
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'Eternel et les idoles
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ecoute maintenant, Jacob, mon serviteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël, toi que j'ai choisi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Voici ce que dit l'Eternel, celui qui t'a fait
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui t'a façonné depuis le ventre de ta mère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'celui qui est ton soutien:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: N'aie pas peur, Jacob mon serviteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jeshurun
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jeshurun: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nom poétique d'Israël signifiant probablement celui qui est droit, celui qui est juste.
    marker-yv: yv-n
  - type: text
    text: ', toi que j''ai choisi.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: En effet, je verserai de l'eau sur la terre qui a soif
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des ruisseaux sur le terrain sec;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je déverserai mon Esprit sur ta descendance
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ma bénédiction sur tes rejetons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ils pousseront au milieu de l'herbe
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme les saules près des cours d'eau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L''un dira: «J''appartiens à l''Eternel»,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'autre voudra porter le nom de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'un autre écrira sur sa main: «Propriété de l''Eternel!»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et prendra avec fierté le nom d'Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Voici ce que dit l'Eternel, le roi d'Israël et celui qui le rachète,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'l''Eternel, le maître de l''univers:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis le premier et le dernier.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En dehors de moi, il n'y a pas de Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Qui est pareil à moi? Qu'il le proclame,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'il le révèle et m'expose tout ce qui s'est passé depuis que j'ai fondé le peuple ancien!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu'on révèle aussi l'avenir et ce qui doit arriver!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ne tremblez pas, n'ayez pas peur!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne te l'ai-je pas depuis longtemps annoncé et révélé?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Vous êtes mes témoins:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: y a-t-il un autre Dieu en dehors de moi?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n'y a pas d'autre rocher, je n'en connais pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ceux qui fabriquent des sculptures sacrées ne sont tous que vide
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celles qui font leur plus grand plaisir ne servent à rien.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Du reste, elles en témoignent elles-mêmes:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles ne voient rien et ne savent rien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si bien qu'ils seront couverts de honte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Qui est-ce qui façonne un dieu ou coule une sculpture sacrée
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour n'en retirer aucune utilité?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tous ses associés seront couverts de honte.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les artisans ne sont eux-mêmes que des êtres humains.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu'ils se rassemblent là, qu'ils se présentent tous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous ensemble ils seront tremblants et couverts de honte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Pour confectionner une hache, le forgeron
- type: usfm
  marker: q1
  children:
  - type: text
    text: travaille avec des braises,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il la façonne à coups de marteau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il la travaille d'un bras vigoureux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cependant, il suffit qu'il ait faim et le voilà sans force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'il n'ait pas bu d'eau et le voilà épuisé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Le charpentier étire le ruban à mesurer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il fait un tracé à la craie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et travaille le bois au ciseau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout en faisant des marques au compas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il le travaille sur le modèle d'un homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: d'un être humain dans toute sa beauté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour qu'il soit installé dans un temple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Pour cela, il se coupe des cèdres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il se procure des chênes et de grands arbres
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'il choisit bien vigoureux dans la forêt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il plante des pins que la pluie fait grandir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L''homme utilise ces arbres pour faire du feu:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il en prend une partie pour se chauffer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il en brûle aussi pour faire cuire son pain.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cependant, il les utilise aussi pour se fabriquer un dieu qu'il adore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il en fait une statue devant laquelle il se prosterne!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il brûle la moitié de son bois afin de pouvoir manger de la viande,
- type: usfm
  marker: q1
  children:
  - type: text
    text: préparer un rôti et se rassasier.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il l''utilise aussi pour se chauffer et dit: «Ah!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je me chauffe, je vois la flamme!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Et avec le reste il se fait un dieu, une sculpture sacrée!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il se prosterne devant lui et l'adore, il lui adresse des prières
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'en s''écriant: «Sauve-moi,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: car c'est toi qui es mon dieu!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ils n'ont ni discernement ni intelligence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car on leur a fermé les yeux pour qu'ils ne voient pas
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le cœur pour qu'ils ne fassent pas preuve de bon sens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il ne se met pas à réfléchir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'il n''a ni le discernement ni l''intelligence de se dire:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «J'ai brûlé une moitié du bois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ai cuit du pain sur ses braises,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'y ai rôti de la viande pour la manger,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et avec le reste je ferais une horreur!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je me prosternerais devant un morceau de bois!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il se nourrit de cendres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: son cœur s'est laissé tromper et l'égare.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il est incapable de se délivrer lui-même et de dire:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «N'est-ce pas une fausseté que j'ai dans la main?»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Retour d'Israël chez lui
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Souviens-toi de cela, Jacob!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Souviens-t'en, Israël, car tu es mon serviteur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t'ai façonné pour que tu sois mon serviteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël, je ne t'oublierai pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: J'ai effacé tes transgressions comme un nuage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tes péchés comme la brume.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Reviens vers moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je t'ai racheté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ciel, réjouis-toi, car l'Eternel a agi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Profondeurs de la terre, criez d'allégresse!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Montagnes, éclatez en cris de joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous aussi, forêts, avec tous vos arbres!
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, l'Eternel a racheté Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a montré sa splendeur en Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Voici ce que dit l'Eternel, celui qui te rachète,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'celui qui t''a façonné dès le ventre de ta mère:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est moi, l'Eternel, qui suis l'auteur de tout.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout seul j'ai déployé le ciel, par moi-même j'ai disposé la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Je fais échec aux signes des faiseurs de prédictions
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je frappe de folie les devins;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je fais reculer les sages
- type: usfm
  marker: q1
  children:
  - type: text
    text: et montre la stupidité de leur savoir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Je confirme la parole de mon serviteur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je mets à exécution les décisions annoncées par mes messagers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je dis à propos de Jérusalem: «Elle sera habitée»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et à propos des villes de Juda: «Elles seront reconstruites'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je relèverai leurs ruines.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Je dis aux profondeurs de la mer: «Asséchez-vous!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je vais faire disparaître vos courants.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Je dis à propos de Cyrus: «Il est mon berger'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il *accomplira toute ma volonté
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '44.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Accomplira… volonté: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Actes 13.22
      metadata:
        usfm: ACT.13.22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' avec application à David.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il dira à Jérusalem: ‘Sois reconstruite!’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et au temple: ‘Que tes fondations soient posées!’»'
