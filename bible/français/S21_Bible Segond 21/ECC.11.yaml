document_id: ECC.11,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Activité saine et réjouissance
  - type: text
    content: 'Jette ton pain à la surface de l''eau, car avec le temps tu le retrouveras. '
  '10':
  - type: text
    content: Chasse le chagrin de ton cœur et éloigne le mal de ton corps, car l'adolescence et la jeunesse partent en fumée.
  '2':
  - type: text
    content: 'Donnes-en une part à sept et même à huit personnes, car tu ne sais pas quel malheur peut arriver sur la terre. '
  '3':
  - type: text
    content: 'Quand les nuages sont gorgés d''eau, ils la déversent sur la terre. Si un arbre tombe, que ce soit au sud ou au nord, il reste là où il est tombé. '
  '4':
  - type: text
    content: 'Celui qui observe le vent ne sèmera pas et celui qui regarde les nuages ne moissonnera pas. '
  '5':
  - type: text
    content: 'Tu ne sais pas quel parcours le vent suit ni comment les os se forment dans le ventre de la femme enceinte; de même tu ne connais pas l''œuvre de Dieu, l''auteur de tout ce qui existe. '
  '6':
  - type: text
    content: 'Sème tes graines dès le matin et le soir ne laisse pas ta main en repos, car tu ne sais pas ce qui réussira: est-ce que ce sera ceci ou cela? Est-ce que l''un et l''autre seront également bons?'
  '7':
  - type: text
    content: 'La lumière est douce et il est agréable, pour les yeux, de voir le soleil. '
  '8':
  - type: text
    content: Si donc un homme vit longtemps, qu'il se réjouisse pendant toutes ces années, tout en se souvenant des jours sombres, car ils seront nombreux. Tout ce qui arrive n'est que fumée.
  - type: heading
    content: Le moment favorable pour rechercher Dieu
  '9':
  - type: text
    content: 'Jeune homme, réjouis-toi dans ton adolescence, livre ton cœur à la joie durant ta jeunesse, marche en suivant les voies de ton cœur et les regards de tes yeux! Cependant, sache que pour tout cela Dieu t''appellera en jugement. '
