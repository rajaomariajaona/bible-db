document_id: ECC.11,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Activité saine et réjouissance
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jette ton pain à la surface de l''eau, car avec le temps tu le retrouveras. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Chasse le chagrin de ton cœur et éloigne le mal de ton corps, car l'adolescence et la jeunesse partent en fumée.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Donnes-en une part à sept et même à huit personnes, car tu ne sais pas quel malheur peut arriver sur la terre. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Quand les nuages sont gorgés d''eau, ils la déversent sur la terre. Si un arbre tombe, que ce soit au sud ou au nord, il reste là où il est tombé. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Celui qui observe le vent ne sèmera pas et celui qui regarde les nuages ne moissonnera pas. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Tu ne sais pas quel parcours le vent suit ni comment les os se forment dans le ventre de la femme enceinte; de même tu ne connais pas l''œuvre de Dieu, l''auteur de tout ce qui existe. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Sème tes graines dès le matin et le soir ne laisse pas ta main en repos, car tu ne sais pas ce qui réussira: est-ce que ce sera ceci ou cela? Est-ce que l''un et l''autre seront également bons?'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'La lumière est douce et il est agréable, pour les yeux, de voir le soleil. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Si donc un homme vit longtemps, qu'il se réjouisse pendant toutes ces années, tout en se souvenant des jours sombres, car ils seront nombreux. Tout ce qui arrive n'est que fumée.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le moment favorable pour rechercher Dieu
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Jeune homme, réjouis-toi dans ton adolescence, livre ton cœur à la joie durant ta jeunesse, marche en suivant les voies de ton cœur et les regards de tes yeux! Cependant, sache que pour tout cela Dieu t''appellera en jugement. '
