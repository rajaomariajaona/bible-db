document_id: JER.16,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Annonce de l'exil et de la restauration
  - type: text
    content: 'La parole de l''Eternel m''a été adressée:'
  '10':
  - type: text
    content: »Lorsque tu annonceras tout cela à ce peuple,
  - type: text
    content: 'ils te diront:'
  - type: text
    content: ‘Pourquoi l'Eternel a-t-il décrété que tous ces grands malheurs nous arriveraient?
  - type: text
    content: Quelle est notre faute?
  - type: text
    content: Quel péché avons-nous commis contre l'Eternel, notre Dieu?’
  '11':
  - type: text
    content: 'Alors tu leur répondras:'
  - type: text
    content: ‘Vos ancêtres m'ont abandonné, déclare l'Eternel.
  - type: text
    content: Ils ont suivi d'autres dieux,
  - type: text
    content: les ont servis et se sont prosternés devant eux.
  - type: text
    content: Ils m'ont abandonné, ils n'ont pas respecté ma loi.
  '12':
  - type: text
    content: Et vous, vous avez fait le mal plus encore que vos ancêtres.
  - type: text
    content: Chacun de vous suit les penchants de son cœur mauvais
  - type: text
    content: au lieu de m'écouter.
  '13':
  - type: text
    content: Je vous expulserai de ce pays
  - type: text
    content: dans un pays inconnu
  - type: text
    content: aussi bien de vous que de vos ancêtres,
  - type: text
    content: et là vous servirez d'autres dieux jour et nuit,
  - type: text
    content: car je ne vous accorderai plus aucune faveur.’
  '14':
  - type: text
    content: »Voilà pourquoi les jours viennent, déclare l'Eternel,
  - type: text
    content: 'où l''on ne dira plus: ‘L''Eternel est vivant,'
  - type: text
    content: lui qui a fait sortir les Israélites d'Egypte’,
  '15':
  - type: text
    content: 'mais: ‘L''Eternel est vivant,'
  - type: text
    content: lui qui a fait sortir les Israélites du pays du nord
  - type: text
    content: et de tous les pays où il les avait chassés.’
  - type: text
    content: Je les ramènerai dans leur pays,
  - type: text
    content: celui que j'avais donné à leurs ancêtres.
  '16':
  - type: text
    content: Je vais envoyer une foule de pêcheurs, déclare l'Eternel, et ils les pêcheront.
  - type: text
    content: Après cela, j'enverrai une foule de chasseurs, et ils les chasseront
  - type: text
    content: sur toutes les montagnes et sur toutes les collines,
  - type: text
    content: jusque dans les fentes des rochers.
  '17':
  - type: text
    content: »En effet, mes yeux sont attentifs à toutes leurs voies,
  - type: text
    content: elles ne sont pas cachées devant moi,
  - type: text
    content: et leur faute n'échappe pas à mon regard.
  '18':
  - type: text
    content: Je leur rendrai d'abord le double de ce que méritent leur faute et leur péché,
  - type: text
    content: parce qu'ils ont porté atteinte à mon pays,
  - type: text
    content: ils ont rempli mon héritage
  - type: text
    content: des cadavres de leurs monstrueuses idoles et de leurs horreurs.»
  '19':
  - type: text
    content: «Eternel, tu es ma force et mon abri, mon refuge lorsque je suis dans la détresse!
  - type: text
    content: Les nations viendront vers toi depuis les extrémités de la terre
  - type: text
    content: 'et elles diront: ‘Nos ancêtres n''ont hérité que le mensonge,'
  - type: text
    content: des idoles sans consistance qui ne servent à rien.
  '2':
  - type: text
    content: «Tu ne prendras pas de femme
  - type: text
    content: et tu n'auras ni fils ni filles dans cet endroit.
  '20':
  - type: text
    content: L'homme pourrait-il se faire des dieux?
  - type: text
    content: Ce ne sont pas des dieux!’»
  '21':
  - type: text
    content: «Voilà pourquoi je vais leur faire connaître,
  - type: text
    content: cette fois-ci je vais leur faire connaître ma puissance et ma force.
  - type: text
    content: Ils sauront que mon nom est l'Eternel.
  '3':
  - type: text
    content: En effet, voici ce que dit l'Eternel au sujet des fils et des filles
  - type: text
    content: qui naissent ici,
  - type: text
    content: de leurs mères qui les ont mis au monde
  - type: text
    content: 'et de leurs pères qui les ont eus dans ce pays:'
  '4':
  - type: text
    content: Ils mourront de maladies graves,
  - type: text
    content: sans que personne ne les pleure et ne les ensevelisse.
  - type: text
    content: Ils deviendront pareils à du fumier sur la terre.
  - type: text
    content: Ils seront exterminés par l'épée et par la famine,
  - type: text
    content: et leurs cadavres serviront de nourriture
  - type: text
    content: aux oiseaux du ciel et aux bêtes de la terre.
  '5':
  - type: text
    content: '»Oui, voici ce qu''a dit l''Eternel:'
  - type: text
    content: N'entre pas dans une maison où l'on s'est réuni pour un deuil,
  - type: text
    content: n'y va pas pour pleurer, ne les plains pas,
  - type: text
    content: car j'ai retiré ma paix à ce peuple, déclare l'Eternel,
  - type: text
    content: ainsi que ma bonté et ma compassion.
  '6':
  - type: text
    content: Grands et petits mourront dans ce pays.
  - type: text
    content: Ils ne seront pas ensevelis,
  - type: text
    content: on ne les pleurera pas,
  - type: text
    content: on ne se fera pas d'incision rituelle
  - type: text
    content: et l'on ne se rasera pas pour eux.
  '7':
  - type: text
    content: On ne rompra pas le pain, quand on mènera le deuil,
  - type: text
    content: pour consoler quelqu'un au sujet d'un mort.
  - type: text
    content: On ne lui offrira pas la coupe de consolation
  - type: text
    content: au décès de son père ou de sa mère.
  '8':
  - type: text
    content: »Tu n'entreras pas non plus dans une maison où l'on festoie
  - type: text
    content: pour t'asseoir avec eux,
  - type: text
    content: pour manger et pour boire,
  '9':
  - type: text
    content: 'car voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël:'
  - type: text
    content: Je vais faire cesser dans cet endroit, sous vos yeux et avant la fin de votre vie,
  - type: text
    content: les cris de réjouissance et de joie,
  - type: text
    content: les chants du fiancé et de la fiancée.
