document_id: JER.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Annonce de l'exil et de la restauration
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La parole de l''Eternel m''a été adressée:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Tu ne prendras pas de femme
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu n'auras ni fils ni filles dans cet endroit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: En effet, voici ce que dit l'Eternel au sujet des fils et des filles
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui naissent ici,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de leurs mères qui les ont mis au monde
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et de leurs pères qui les ont eus dans ce pays:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ils mourront de maladies graves,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans que personne ne les pleure et ne les ensevelisse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils deviendront pareils à du fumier sur la terre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils seront exterminés par l'épée et par la famine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leurs cadavres serviront de nourriture
- type: usfm
  marker: q1
  children:
  - type: text
    text: aux oiseaux du ciel et aux bêtes de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '»Oui, voici ce qu''a dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: N'entre pas dans une maison où l'on s'est réuni pour un deuil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: n'y va pas pour pleurer, ne les plains pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car j'ai retiré ma paix à ce peuple, déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ainsi que ma bonté et ma compassion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Grands et petits mourront dans ce pays.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne seront pas ensevelis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on ne les pleurera pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on ne se fera pas d'incision rituelle
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'on ne se rasera pas pour eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: On ne rompra pas le pain, quand on mènera le deuil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour consoler quelqu'un au sujet d'un mort.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On ne lui offrira pas la coupe de consolation
- type: usfm
  marker: q1
  children:
  - type: text
    text: au décès de son père ou de sa mère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: »Tu n'entreras pas non plus dans une maison où l'on festoie
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour t'asseoir avec eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour manger et pour boire,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'car voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je vais faire cesser dans cet endroit, sous vos yeux et avant la fin de votre vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les cris de réjouissance et de joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les chants du fiancé et de la fiancée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: »Lorsque tu annonceras tout cela à ce peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ils te diront:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Pourquoi l'Eternel a-t-il décrété que tous ces grands malheurs nous arriveraient?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quelle est notre faute?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quel péché avons-nous commis contre l'Eternel, notre Dieu?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors tu leur répondras:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Vos ancêtres m'ont abandonné, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont suivi d'autres dieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les ont servis et se sont prosternés devant eux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils m'ont abandonné, ils n'ont pas respecté ma loi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Et vous, vous avez fait le mal plus encore que vos ancêtres.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chacun de vous suit les penchants de son cœur mauvais
- type: usfm
  marker: q1
  children:
  - type: text
    text: au lieu de m'écouter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je vous expulserai de ce pays
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans un pays inconnu
- type: usfm
  marker: q1
  children:
  - type: text
    text: aussi bien de vous que de vos ancêtres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et là vous servirez d'autres dieux jour et nuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je ne vous accorderai plus aucune faveur.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: »Voilà pourquoi les jours viennent, déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'où l''on ne dira plus: ‘L''Eternel est vivant,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: lui qui a fait sortir les Israélites d'Egypte’,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'mais: ‘L''Eternel est vivant,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: lui qui a fait sortir les Israélites du pays du nord
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de tous les pays où il les avait chassés.’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les ramènerai dans leur pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui que j'avais donné à leurs ancêtres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Je vais envoyer une foule de pêcheurs, déclare l'Eternel, et ils les pêcheront.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Après cela, j'enverrai une foule de chasseurs, et ils les chasseront
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur toutes les montagnes et sur toutes les collines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusque dans les fentes des rochers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: »En effet, mes yeux sont attentifs à toutes leurs voies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles ne sont pas cachées devant moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur faute n'échappe pas à mon regard.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Je leur rendrai d'abord le double de ce que méritent leur faute et leur péché,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu'ils ont porté atteinte à mon pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ont rempli mon héritage
- type: usfm
  marker: q1
  children:
  - type: text
    text: des cadavres de leurs monstrueuses idoles et de leurs horreurs.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: «Eternel, tu es ma force et mon abri, mon refuge lorsque je suis dans la détresse!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les nations viendront vers toi depuis les extrémités de la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et elles diront: ‘Nos ancêtres n''ont hérité que le mensonge,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: des idoles sans consistance qui ne servent à rien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: L'homme pourrait-il se faire des dieux?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce ne sont pas des dieux!’»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: «Voilà pourquoi je vais leur faire connaître,
- type: usfm
  marker: q1
  children:
  - type: text
    text: cette fois-ci je vais leur faire connaître ma puissance et ma force.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sauront que mon nom est l'Eternel.
