document_id: EZK.3,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Il m''a dit: «Fils de l''homme, mange ce qui est devant toi! Mange ce livre et va parler à la communauté d''Israël!»'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Il m''a dit: «Fils de l''homme, que ton cœur accepte et que tes oreilles écoutent toutes les paroles que je te dirai! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Va trouver les exilés, les membres de ton peuple! Tu leur parleras et, qu''ils écoutent ou qu''ils n''écoutent pas, tu leur diras: ‘Voici ce que dit le Seigneur, l''Eternel.’»'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Puis l''Esprit m''a enlevé et j''ai entendu derrière moi le bruit d''une grande exclamation: «Bénie soit la gloire de l''Eternel qui se manifeste depuis l''endroit où il réside!» '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'J''ai entendu le bruit des ailes des êtres vivants qui se touchaient l''une l''autre, le bruit des roues auprès d''eux et le bruit de cette grande exclamation. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'L''Esprit m''a donc enlevé et m''a emporté. Je suis parti, amer et furieux, tandis que la main de l''Eternel agissait sur moi avec puissance. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Je suis arrivé à Thel-Abib, vers les exilés qui habitaient près du fleuve Kebar, et je me suis assis là où ils s'asseyaient. Je suis resté là durant sept jours, consterné, au milieu d'eux.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Au bout de sept jours, la parole de l''Eternel m''a été adressée: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '«Fils de l''homme, je te donne comme sentinelle à la communauté d''Israël. Tu écouteras la parole qui sort de ma bouche et tu les avertiras de ma part. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Quand je dirai au méchant: ‘Tu vas mourir, c''est certain’, si tu ne l''avertis pas, si tu ne parles pas pour avertir le méchant afin qu''il renonce à sa mauvaise conduite et reste en vie, ce méchant mourra à cause de sa faute, mais je te réclamerai son sang. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Si au contraire tu avertis le méchant et qu''il ne renonce pas à sa méchanceté ni à sa mauvaise conduite, il mourra à cause de sa faute, mais toi, tu auras délivré ton âme. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: J'ai ouvert ma bouche et il m'a donné ce livre à manger.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Si un juste renonce à sa justice et commet l''injustice, je mettrai un piège devant lui et il mourra. Parce que tu ne l''auras pas averti, il mourra à cause de son péché et l''on ne se souviendra plus de la justice qu''il avait pratiquée, mais je te réclamerai son sang. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Si au contraire tu avertis le juste pour qu'il ne commette pas de péché, et qu'il ne pèche pas, il restera en vie parce qu'il s'est laissé avertir et toi, tu auras délivré ton âme.»
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Là encore la main de l''Eternel reposait sur moi. Il m''a dit: «Lève-toi, sors dans la vallée et là-bas je te parlerai.» '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Je me suis levé et je suis sorti dans la vallée. Et voici que la gloire de l''Eternel se tenait là, telle que je l''avais vue près du fleuve Kebar. Alors je suis tombé le visage contre terre. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'L''Esprit est entré en moi et m''a mis debout sur mes pieds. Il m''a parlé et m''a dit: «Va t''enfermer chez toi. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Fils de l''homme, on mettra sur toi des cordes, avec lesquelles on t''attachera afin que tu ne puisses pas aller au milieu d''eux. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Je collerai ta langue à ton palais pour que tu sois muet et ne puisses pas leur adresser de reproches, car c''est une communauté de rebelles. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Cependant, quand je te parlerai, j''ouvrirai ta bouche pour que tu leur dises: ‘Voici ce que dit le Seigneur, l''Eternel.’ Que celui qui voudra écouter écoute, et que celui qui ne voudra pas n''écoute pas! En effet, c''est une communauté de rebelles.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Il m''a dit: «Fils de l''homme, nourris ton ventre et remplis tes intestins avec ce livre, celui que je te donne!» Alors *je l''ai avalé, et dans ma bouche il a été doux comme du miel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je l''ai… miel: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'repris en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Apocalypse 10.10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il m''a dit: «Fils de l''homme, va trouver la communauté d''Israël et communique-leur mes paroles! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'En effet, ce n''est pas vers un peuple dont le langage est obscur et la langue difficile que tu es envoyé, c''est vers la communauté d''Israël. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Non, ce n''est pas vers de nombreux peuples dont le langage est obscur et la langue difficile, dont tu ne comprends pas les paroles. Si je t''envoyais vers eux, eux, ils t''écouteraient. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Mais la communauté d''Israël ne voudra pas t''écouter parce qu''elle ne veut pas m''écouter. En effet, toute la communauté d''Israël a le front dur et le cœur endurci. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Cependant, j''ai endurci ton visage pour résister à leur visage, et ton front pour résister à leur front. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'J''ai rendu ton front aussi dur qu''un diamant, plus dur que la pierre. Tu n''auras pas peur d''eux et tu ne te laisseras pas effrayer par eux, même si c''est une communauté de rebelles.» '
