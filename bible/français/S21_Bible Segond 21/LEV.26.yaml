document_id: LEV.26
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Bénédictions et malédictions
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Vous ne vous ferez pas de faux dieux, vous ne vous dresserez ni sculpture sacrée ni statue et vous ne placerez dans votre pays aucune pierre ornée de figures pour vous prosterner devant elle, car je suis l''Eternel, votre Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Vous respecterez mes sabbats et vous traiterez mon sanctuaire avec déférence. Je suis l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '»Si vous suivez mes prescriptions, si vous gardez mes commandements et les mettez en pratique, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'je vous enverrai des pluies en leur saison, la terre donnera ses produits et les arbres des champs leurs fruits. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le battage du blé durera jusqu''à la vendange, et la vendange jusqu''aux semailles. Vous mangerez du pain à satiété et vous habiterez en sécurité dans votre pays. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je mettrai la paix dans le pays et personne ne troublera votre sommeil. Je ferai disparaître du pays les bêtes féroces et l''épée ne passera pas par votre pays. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Vous poursuivrez vos ennemis et ils tomberont devant vous par l''épée. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ainsi, 5 parmi vous en poursuivront 100, et 100 parmi vous en poursuivront 10''000, et vos ennemis tomberont devant vous par l''épée. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Je me tournerai vers vous, je vous donnerai des enfants et vous rendrai nombreux, et je maintiendrai mon alliance avec vous. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Vous mangerez des anciennes récoltes et vous devrez les sortir pour faire place aux nouvelles. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '*J''établirai mon habitation au milieu de vous et je ne montrerai pas de dégoût envers vous. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je marcherai au milieu de vous, je serai votre Dieu et vous serez mon peuple.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.11-12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'J''établirai… peuple: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'reprise d''Exode 29.45 citée partiellement en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jérémie 32.38
      metadata:
        usfm: JER.32.38
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ezéchiel 37.27
      metadata:
        usfm: EZK.37.27
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Corinthiens 6.16
      metadata:
        usfm: 2CO.6.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Apocalypse 21.3
      metadata:
        usfm: REV.21.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je suis l'Eternel, votre Dieu, qui vous ai fait sortir d'Egypte, qui vous ai tirés de l'esclavage; j'ai mis un terme à l'oppression qui pesait sur vous et je vous ai fait marcher la tête haute.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '»Mais si vous ne m''écoutez pas et ne mettez pas tous ces commandements en pratique, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'si vous méprisez mes prescriptions et si vous montrez du dégoût envers mes règles au point de ne pas mettre tous mes commandements en pratique et de rompre mon alliance, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'voici alors ce que je vous ferai: j''enverrai sur vous la terreur, le dépérissement et la fièvre qui épuisent le regard et rongent la vie. Vous sèmerez vos semences pour rien: ce sont vos ennemis qui les mangeront. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Je me tournerai contre vous et vous serez battus devant vos ennemis. Ceux qui vous détestent domineront sur vous et vous fuirez sans même que l'on vous poursuive.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '»Si, malgré cela, vous ne m''écoutez pas, je vous punirai 7 fois plus pour vos péchés. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Je briserai la force qui fait votre orgueil, je rendrai votre ciel pareil à du fer et votre terre pareille à du bronze. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Votre force s'épuisera inutilement, votre terre ne donnera pas ses produits et les arbres de la terre ne donneront pas leurs fruits.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '»Si vous me résistez et ne voulez pas m''écouter, je vous frapperai 7 fois plus, conformément à vos péchés. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: J'enverrai contre vous les animaux sauvages; ils vous priveront de vos enfants, détruiront votre bétail et vous réduiront à un petit nombre, si bien que vos chemins seront déserts.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '»Si, malgré cela, vous ne vous laissez pas corriger par moi et me résistez, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'je vous résisterai aussi et je vous frapperai encore 7 fois plus pour vos péchés. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Je ferai venir contre vous l''épée chargée de venger l''alliance. Quand vous vous rassemblerez dans vos villes, j''enverrai la peste au milieu de vous et vous serez livrés aux mains de l''ennemi. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Lorsque je vous priverai de pain, dix femmes cuiront votre pain dans un seul four et le rapporteront par rations. Vous mangerez et vous ne serez pas rassasiés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '»Si, malgré cela, vous ne m''écoutez pas et me résistez, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'je vous résisterai aussi avec fureur et je vous punirai encore 7 fois plus pour vos péchés. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Vous mangerez la chair de vos fils et de vos filles. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Je détruirai vos hauts lieux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Hauts lieux: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lieux de culte consacrés à diverses divinités, souvent situés sur des hauteurs.
    marker-yv: yv-n
  - type: text
    text: ', j''abattrai vos statues consacrées au soleil, je mettrai vos cadavres sur les cadavres de vos idoles et je montrerai du dégoût envers vous. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Je ferai de vos villes des déserts, je dévasterai vos sanctuaires et je ne respirerai plus l''odeur de vos parfums apaisants. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Je dévasterai moi-même le pays à un tel point que vos ennemis venus l''habiter seront stupéfaits. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Je vous disperserai parmi les nations et je dégainerai l'épée pour vous poursuivre. Votre pays sera dévasté et vos villes seront désertes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: '»Alors le pays compensera ses sabbats durant toute la période où il sera dévasté et où vous serez dans le pays de vos ennemis; oui, alors le pays se reposera et compensera ses sabbats. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Durant toute la période où il sera dévasté, il aura le repos qu''il n''avait pas eu pendant vos sabbats, tandis que vous l''habitiez. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ceux parmi vous qui survivront, je remplirai leur cœur d''angoisse dans les pays de leurs ennemis; le bruit d''une feuille agitée les poursuivra. Ils prendront la fuite comme on le fait devant l''épée et ils tomberont sans qu''on les poursuive. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ils trébucheront les uns sur les autres comme devant l''épée, sans qu''on les poursuive. Vous ne subsisterez pas en face de vos ennemis. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Vous disparaîtrez parmi les nations et le pays de vos ennemis vous dévorera. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Ceux parmi vous qui survivront seront frappés de dépérissement pour leurs fautes dans les pays de leurs ennemis; ils seront aussi frappés de dépérissement pour les fautes de leurs ancêtres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: '»Ils confesseront leur faute et celle de leurs ancêtres, l''infidélité dont ils auront fait preuve envers moi et la résistance qu''ils m''auront opposée. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'C''est à cause de ces fautes que moi aussi je leur résisterai et les conduirai dans le pays de leurs ennemis. Alors leur cœur incirconcis s''humiliera et ils paieront la dette de leur faute. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Je me souviendrai de mon alliance avec Jacob, je me souviendrai de mon alliance avec Isaac et de mon alliance avec Abraham, et je me souviendrai du pays. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Le pays sera abandonné par eux et compensera ses sabbats durant la période où il restera dévasté loin d''eux. Ils paieront la dette de leur faute, parce qu''ils auront méprisé mes règles et qu''ils auront montré du dégoût envers mes prescriptions. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Pourtant, lorsqu''ils seront dans le pays de leurs ennemis, je ne les rejetterai pas et je ne montrerai pas du dégoût envers eux au point de les exterminer, au point de rompre mon alliance avec eux, car je suis l''Eternel, leur Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: Je me souviendrai en leur faveur de l'ancienne alliance, par laquelle je les ai fait sortir d'Egypte aux yeux des nations pour être leur Dieu. Je suis l'Eternel.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Telles sont les prescriptions, les règles et les lois que l'Eternel établit entre lui et les Israélites par l'intermédiaire de Moïse sur le mont Sinaï.
