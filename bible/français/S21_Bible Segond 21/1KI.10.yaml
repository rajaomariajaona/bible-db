document_id: 1KI.10,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Visite de la reine de Séba
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'La reine de Séba apprit quelle était la réputation de Salomon, à la gloire de l''Eternel, et elle vint pour le mettre à l''épreuve par des énigmes. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Elle donna au roi plus de 3 tonnes et demie d'or, une très grande quantité d'aromates et des pierres précieuses. Il ne vint plus autant d'aromates que la reine de Séba en donna au roi Salomon.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Les bateaux de Hiram qui rapportèrent de l''or d''Ophir ramenèrent aussi une grande quantité de bois de santal et des pierres précieuses. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Avec ce bois de santal, le roi fit des balustrades pour la maison de l'Eternel et pour le palais royal, ainsi que des harpes et des luths pour les musiciens. Il ne vint plus de ce bois de santal et l'on n'en a plus vu jusqu'à aujourd'hui.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Le roi Salomon donna à la reine de Séba tout ce qu'elle désira, ce qu'elle demanda. Il lui fit en outre des cadeaux dignes d'un roi tel que lui. Puis elle repartit et rentra dans son pays avec ses serviteurs.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Richesse et sagesse de Salomon
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Le poids de l''or qui arrivait chez Salomon chaque année était de près de 20 tonnes, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: en plus de ce qu'il retirait des négociants et du trafic commercial, ainsi que de tous les rois d'Arabie et des gouverneurs du pays.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Le roi Salomon fit 200 grands boucliers en or battu, pour chacun desquels il employa 7 kilos d''or, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'et 300 autres boucliers en or battu, pour chacun desquels il employa près de 2 kilos d''or. Il les plaça dans la maison de la forêt du Liban. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Le roi fit aussi un grand trône en ivoire et il le couvrit d''or pur. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ce trône avait 6 marches et son dossier était arrondi par-derrière. Il y avait des bras de chaque côté du siège; deux lions se trouvaient près des bras, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Elle arriva à Jérusalem avec une suite très nombreuse, avec des chameaux chargés d''aromates, d''or en très grande quantité et de pierres précieuses. Elle se rendit auprès de Salomon et lui exposa toutes ses réflexions. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'et 12 lions sur les six marches, de chaque côté. On n''a rien fait de pareil pour aucun royaume. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Toutes les coupes du roi Salomon étaient en or, et toute la vaisselle de la maison de la forêt du Liban était en or pur. Rien n''était en argent: on n''en faisait aucun cas à l''époque de Salomon. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: En effet, le roi avait des bateaux long-courriers en mer avec ceux de Hiram. Tous les 3 ans les bateaux long-courriers arrivaient, chargés d'or, d'argent, d'ivoire, de singes et de paons.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Le roi Salomon dépassa tous les rois de la terre par ses richesses et sa sagesse. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Tout le monde cherchait à le voir pour bénéficier de la sagesse que Dieu lui avait donnée, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'et chacun apportait son cadeau: des objets en argent et en or, des habits, des armes, des aromates, des chevaux et des mulets. Cela se passait de cette manière chaque année. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Salomon réunit des chars et de la cavalerie. Il avait 1400 chars et 12''000 cavaliers, qu''il plaça dans les villes où il gardait ses chars et à Jérusalem, près de lui. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Le roi rendit l''argent aussi commun à Jérusalem que les pierres, et les cèdres aussi nombreux que les sycomores qui poussent dans la plaine. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'C''était en Egypte que Salomon achetait ses chevaux. Une caravane de marchands du roi allait les chercher par groupes à un prix fixe: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: il fallait 600 pièces d'argent pour faire venir un char d'Egypte, et 150 pièces pour un cheval. Ils en ramenaient de même pour tous les rois des Hittites et pour les rois de Syrie.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Salomon répondit à toutes ses questions; il n''y eut aucun mystère pour le roi: il lui expliqua tout.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'La reine de Séba vit toute la sagesse de Salomon, le palais qu''il avait construit, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'les plats servis à sa table, le lieu d''habitation de ses serviteurs, les fonctions et les tenues de ceux qui le servaient, ses responsables des boissons ainsi que les holocaustes qu''il offrait dans la maison de l''Eternel. Elle en eut le souffle coupé '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'et dit au roi: «C''était donc vrai, ce que j''ai appris dans mon pays au sujet de ta situation et de ta sagesse! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Je ne le croyais pas avant de venir et de le voir de mes yeux. Et l''on ne m''en avait même pas raconté la moitié! Tu as plus de sagesse et de prospérité que je ne l''avais appris par la rumeur. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Heureux tes hommes, heureux tes serviteurs, puisqu''ils sont constamment devant toi et peuvent bénéficier de ta sagesse! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Béni soit l'Eternel, ton Dieu, qui t'a choisi pour te placer sur le trône d'Israël! C'est parce que l'Eternel aime éternellement Israël qu'il t'a établi roi pour que tu exerces le droit et la justice.»
