document_id: 1CO.13,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les dons spirituels et l'amour
  - type: text
    content: 'Si je parle les langues des hommes, et même celles des anges, mais que je n''ai pas l''amour, je suis un cuivre qui résonne ou une cymbale qui retentit. '
  '10':
  - type: text
    content: 'mais quand ce qui est parfait sera venu, ce qui est partiel disparaîtra. '
  '11':
  - type: text
    content: 'Lorsque j''étais enfant, je parlais comme un enfant, je pensais comme un enfant, je raisonnais comme un enfant; lorsque je suis devenu un homme, j''ai mis fin à ce qui était de l''enfant. '
  '12':
  - type: text
    content: Aujourd'hui nous voyons au moyen d'un miroir, de manière peu claire, mais alors nous verrons face à face; aujourd'hui je connais partiellement, mais alors je connaîtrai complètement, tout comme j'ai été connu.
  '13':
  - type: text
    content: 'Maintenant donc ces trois choses restent: la foi, l''espérance, l''amour; mais la plus grande des trois, c''est l''amour.'
  '2':
  - type: text
    content: 'Si j''ai le don de prophétie, la compréhension de tous les mystères et toute la connaissance, si j''ai même toute la foi jusqu''à transporter des montagnes, mais que je n''ai pas l''amour, je ne suis rien. '
  '3':
  - type: text
    content: Et si je distribue tous mes biens aux pauvres, si même je livre mon corps aux flammes, mais que je n'ai pas l'amour, cela ne me sert à rien.
  '4':
  - type: text
    content: 'L''amour est patient, il est plein de bonté; l''amour n''est pas envieux; l''amour ne se vante pas, il ne s''enfle pas d''orgueil, '
  '5':
  - type: text
    content: 'il ne fait rien de malhonnête, il ne cherche pas son intérêt, il ne s''irrite pas, il ne soupçonne pas le mal, '
  '6':
  - type: text
    content: 'il ne se réjouit pas de l''injustice, mais il se réjouit de la vérité; '
  '7':
  - type: text
    content: il pardonne tout, il croit tout, il espère tout, il supporte tout.
  '8':
  - type: text
    content: 'L''amour ne meurt jamais. Les prophéties disparaîtront, les langues cesseront, la connaissance disparaîtra. '
  '9':
  - type: text
    content: 'En effet, nous connaissons partiellement et nous prophétisons partiellement, '
