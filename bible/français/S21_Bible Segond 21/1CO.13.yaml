document_id: 1CO.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les dons spirituels et l'amour
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Si je parle les langues des hommes, et même celles des anges, mais que je n''ai pas l''amour, je suis un cuivre qui résonne ou une cymbale qui retentit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Si j''ai le don de prophétie, la compréhension de tous les mystères et toute la connaissance, si j''ai même toute la foi jusqu''à transporter des montagnes, mais que je n''ai pas l''amour, je ne suis rien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Et si je distribue tous mes biens aux pauvres, si même je livre mon corps aux flammes, mais que je n'ai pas l'amour, cela ne me sert à rien.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L''amour est patient, il est plein de bonté; l''amour n''est pas envieux; l''amour ne se vante pas, il ne s''enfle pas d''orgueil, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'il ne fait rien de malhonnête, il ne cherche pas son intérêt, il ne s''irrite pas, il ne soupçonne pas le mal, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'il ne se réjouit pas de l''injustice, mais il se réjouit de la vérité; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: il pardonne tout, il croit tout, il espère tout, il supporte tout.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L''amour ne meurt jamais. Les prophéties disparaîtront, les langues cesseront, la connaissance disparaîtra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'En effet, nous connaissons partiellement et nous prophétisons partiellement, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'mais quand ce qui est parfait sera venu, ce qui est partiel disparaîtra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lorsque j''étais enfant, je parlais comme un enfant, je pensais comme un enfant, je raisonnais comme un enfant; lorsque je suis devenu un homme, j''ai mis fin à ce qui était de l''enfant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Aujourd'hui nous voyons au moyen d'un miroir, de manière peu claire, mais alors nous verrons face à face; aujourd'hui je connais partiellement, mais alors je connaîtrai complètement, tout comme j'ai été connu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Maintenant donc ces trois choses restent: la foi, l''espérance, l''amour; mais la plus grande des trois, c''est l''amour.'
