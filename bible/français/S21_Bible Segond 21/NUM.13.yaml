document_id: NUM.13,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Des espions en Canaan
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '10':
  - type: text
    content: 'pour la tribu de Zabulon: Gaddiel, fils de Sodi; '
  '11':
  - type: text
    content: 'pour la tribu de Joseph, la tribu de Manassé: Gaddi, fils de Susi; '
  '12':
  - type: text
    content: 'pour la tribu de Dan: Ammiel, fils de Guemalli; '
  '13':
  - type: text
    content: 'pour la tribu d''Aser: Sethur, fils de Micaël; '
  '14':
  - type: text
    content: 'pour la tribu de Nephthali: Nachbi, fils de Vophsi; '
  '15':
  - type: text
    content: 'pour la tribu de Gad: Guéuel, fils de Maki. '
  '16':
  - type: text
    content: Tels sont les noms des hommes que Moïse envoya pour explorer le pays. Moïse donna à Hosée, fils de Nun, le nom de Josué
  - type: note
    content: 'Hosée… Josué: respectivement salut… l''Eternel est salut.'
  - type: text
    content: .
  '17':
  - type: text
    content: 'Moïse les envoya explorer le pays de Canaan. Il leur dit: «Montez ici, par le sud, montez sur la montagne '
  '18':
  - type: text
    content: 'et examinez le pays. Vous examinerez comment il est, quel est le peuple qui l''habite, s''il est fort ou faible, s''il est nombreux ou non. '
  '19':
  - type: text
    content: 'Vous examinerez quel genre de pays il habite – s''il est bon ou mauvais –, quel genre de villes il habite – si elles sont ouvertes ou fortifiées. '
  '2':
  - type: text
    content: '«Envoie des hommes explorer le pays de Canaan que je donne aux Israélites. Tu enverras un homme issu de chacune des tribus de leurs ancêtres. Ils seront choisis parmi leurs princes.» '
  '20':
  - type: text
    content: 'Vous examinerez aussi comment est le terrain: s''il est fertile ou pauvre, s''il y a des arbres ou non. Armez-vous de courage et prenez des fruits du pays.» C''était l''époque des premiers raisins.'
  '21':
  - type: text
    content: 'Ces hommes montèrent et explorèrent le pays, depuis le désert de Tsin jusqu''à Rehob, sur le chemin de Hamath. '
  '22':
  - type: text
    content: 'Ils montèrent par le sud et allèrent jusqu''à Hébron, où se trouvaient Ahiman, Shéshaï et Talmaï, les descendants d''Anak. Hébron avait été construite 7 ans avant Tsoan en Egypte. '
  '23':
  - type: text
    content: 'Ils arrivèrent jusqu''à la vallée d''Eshcol, où ils coupèrent une branche de vigne avec une grappe de raisin. Ils la portèrent à deux au moyen d''une perche. Ils prirent aussi des grenades et des figues. '
  '24':
  - type: text
    content: On appela cet endroit vallée d'Eshcol à cause de la grappe que les Israélites y coupèrent.
  '25':
  - type: text
    content: 'Ils furent de retour de l''exploration du pays au bout de 40 jours. '
  '26':
  - type: text
    content: 'A leur arrivée, ils se rendirent auprès de Moïse, d''Aaron et de toute l''assemblée des Israélites à Kadès dans le désert de Paran. Ils leur firent un rapport, ainsi qu''à toute l''assemblée, et ils leur montrèrent les fruits du pays. '
  '27':
  - type: text
    content: 'Voici ce qu''ils racontèrent à Moïse: «Nous sommes allés dans le pays où tu nous as envoyés. C''est vraiment un pays où coulent le lait et le miel, et en voici les fruits. '
  '28':
  - type: text
    content: 'Mais le peuple qui habite ce pays est puissant, les villes sont fortifiées, très grandes. Nous y avons vu des descendants d''Anak. '
  '29':
  - type: text
    content: Les Amalécites habitent la région du sud, les Hittites, les Jébusiens et les Amoréens habitent la montagne, et les Cananéens habitent au bord de la mer Méditerranée et le long du Jourdain.»
  '3':
  - type: text
    content: Moïse envoya ces hommes du désert de Paran, d'après l'ordre de l'Eternel; ils étaient tous chefs des Israélites.
  '30':
  - type: text
    content: 'Caleb fit taire le peuple qui murmurait contre Moïse. Il dit: «Montons, emparons-nous du pays, nous y serons vainqueurs!» '
  '31':
  - type: text
    content: 'Mais les hommes qui l''y avaient accompagné dirent: «Nous ne pouvons pas monter contre ce peuple, car il est plus fort que nous», '
  '32':
  - type: text
    content: 'et ils dénigrèrent devant les Israélites le pays qu''ils avaient exploré. Ils dirent: «Le pays que nous avons parcouru pour l''explorer est un pays qui dévore ses habitants. Tous ceux que nous y avons vus sont des hommes de haute taille. '
  '33':
  - type: text
    content: Nous y avons vu les géants, les descendants d'Anak qui sont issus des géants. A nos yeux et aux leurs, nous étions comme des sauterelles.»
  '4':
  - type: text
    content: 'Voici leurs noms. Pour la tribu de Ruben: Shammua, fils de Zaccur; '
  '5':
  - type: text
    content: 'pour la tribu de Siméon: Shaphath, fils de Hori; '
  '6':
  - type: text
    content: 'pour la tribu de Juda: Caleb, fils de Jephunné; '
  '7':
  - type: text
    content: 'pour la tribu d''Issacar: Jigual, fils de Joseph; '
  '8':
  - type: text
    content: 'pour la tribu d''Ephraïm: Hosée, fils de Nun; '
  '9':
  - type: text
    content: 'pour la tribu de Benjamin: Palthi, fils de Raphu; '
