document_id: NUM.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Des espions en Canaan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Envoie des hommes explorer le pays de Canaan que je donne aux Israélites. Tu enverras un homme issu de chacune des tribus de leurs ancêtres. Ils seront choisis parmi leurs princes.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Moïse envoya ces hommes du désert de Paran, d'après l'ordre de l'Eternel; ils étaient tous chefs des Israélites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voici leurs noms. Pour la tribu de Ruben: Shammua, fils de Zaccur; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'pour la tribu de Siméon: Shaphath, fils de Hori; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'pour la tribu de Juda: Caleb, fils de Jephunné; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'pour la tribu d''Issacar: Jigual, fils de Joseph; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'pour la tribu d''Ephraïm: Hosée, fils de Nun; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'pour la tribu de Benjamin: Palthi, fils de Raphu; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'pour la tribu de Zabulon: Gaddiel, fils de Sodi; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'pour la tribu de Joseph, la tribu de Manassé: Gaddi, fils de Susi; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'pour la tribu de Dan: Ammiel, fils de Guemalli; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'pour la tribu d''Aser: Sethur, fils de Micaël; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'pour la tribu de Nephthali: Nachbi, fils de Vophsi; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'pour la tribu de Gad: Guéuel, fils de Maki. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tels sont les noms des hommes que Moïse envoya pour explorer le pays. Moïse donna à Hosée, fils de Nun, le nom de Josué
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Hosée… Josué: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: respectivement salut… l'Eternel est salut.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Moïse les envoya explorer le pays de Canaan. Il leur dit: «Montez ici, par le sud, montez sur la montagne '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'et examinez le pays. Vous examinerez comment il est, quel est le peuple qui l''habite, s''il est fort ou faible, s''il est nombreux ou non. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Vous examinerez quel genre de pays il habite – s''il est bon ou mauvais –, quel genre de villes il habite – si elles sont ouvertes ou fortifiées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Vous examinerez aussi comment est le terrain: s''il est fertile ou pauvre, s''il y a des arbres ou non. Armez-vous de courage et prenez des fruits du pays.» C''était l''époque des premiers raisins.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ces hommes montèrent et explorèrent le pays, depuis le désert de Tsin jusqu''à Rehob, sur le chemin de Hamath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ils montèrent par le sud et allèrent jusqu''à Hébron, où se trouvaient Ahiman, Shéshaï et Talmaï, les descendants d''Anak. Hébron avait été construite 7 ans avant Tsoan en Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ils arrivèrent jusqu''à la vallée d''Eshcol, où ils coupèrent une branche de vigne avec une grappe de raisin. Ils la portèrent à deux au moyen d''une perche. Ils prirent aussi des grenades et des figues. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: On appela cet endroit vallée d'Eshcol à cause de la grappe que les Israélites y coupèrent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ils furent de retour de l''exploration du pays au bout de 40 jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'A leur arrivée, ils se rendirent auprès de Moïse, d''Aaron et de toute l''assemblée des Israélites à Kadès dans le désert de Paran. Ils leur firent un rapport, ainsi qu''à toute l''assemblée, et ils leur montrèrent les fruits du pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Voici ce qu''ils racontèrent à Moïse: «Nous sommes allés dans le pays où tu nous as envoyés. C''est vraiment un pays où coulent le lait et le miel, et en voici les fruits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Mais le peuple qui habite ce pays est puissant, les villes sont fortifiées, très grandes. Nous y avons vu des descendants d''Anak. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Les Amalécites habitent la région du sud, les Hittites, les Jébusiens et les Amoréens habitent la montagne, et les Cananéens habitent au bord de la mer Méditerranée et le long du Jourdain.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Caleb fit taire le peuple qui murmurait contre Moïse. Il dit: «Montons, emparons-nous du pays, nous y serons vainqueurs!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Mais les hommes qui l''y avaient accompagné dirent: «Nous ne pouvons pas monter contre ce peuple, car il est plus fort que nous», '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'et ils dénigrèrent devant les Israélites le pays qu''ils avaient exploré. Ils dirent: «Le pays que nous avons parcouru pour l''explorer est un pays qui dévore ses habitants. Tous ceux que nous y avons vus sont des hommes de haute taille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Nous y avons vu les géants, les descendants d'Anak qui sont issus des géants. A nos yeux et aux leurs, nous étions comme des sauterelles.»
