document_id: LUK.6,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus et le sabbat
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Un jour de sabbat [appelé second-premier], Jésus traversait des champs de blé. Ses disciples arrachaient des épis et les mangeaient après les avoir froissés dans leurs mains. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Alors il promena son regard sur eux tous et dit à l''homme: «Tends ta main.» Il le fit et sa main fut guérie, [elle fut saine comme l''autre]. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ils furent remplis de fureur et se consultèrent pour savoir ce qu'ils feraient à Jésus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Choix des douze apôtres
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'A cette époque-là, Jésus se retira sur la montagne pour prier; il passa toute la nuit à prier Dieu. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Quand le jour fut levé, il appela ses disciples et il en choisit parmi eux douze auxquels il donna le nom d''apôtres: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Simon, qu''il appela aussi Pierre; André, son frère; Jacques; Jean; Philippe; Barthélémy; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Matthieu; Thomas; Jacques, fils d'Alphée; Simon, appelé le zélote
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Zélote: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: terme qui désignait une personne zélée pour la loi ou le membre d'un parti de patriotes juifs créé afin de résister aux Romains.
      marker-yv: yv-n
    - type: text
      text: '; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Jude, fils de Jacques; et Judas l'Iscariot
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Iscariot: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire homme de Karioth, ville de Judée.
      marker-yv: yv-n
    - type: text
      text: ', celui qui devint un traître.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Il descendit avec eux et s''arrêta sur un plateau où se trouvaient une foule de ses disciples et une multitude de personnes de toute la Judée, de Jérusalem et du littoral de Tyr et de Sidon. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ils étaient venus pour l''entendre et pour être guéris de leurs maladies. Ceux qui étaient tourmentés par des esprits impurs étaient guéris, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: et toute la foule cherchait à le toucher parce qu'une force sortait de lui et les guérissait tous.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sermon sur la montagne
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Quelques pharisiens leur dirent: «Pourquoi faites-vous ce qu''il n''est pas permis de faire pendant le sabbat?» '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Alors Jésus leva les yeux sur ses disciples et dit: «Heureux vous qui êtes pauvres, car le royaume de Dieu est à vous! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Heureux vous qui avez faim maintenant, car vous serez rassasiés! Heureux vous qui pleurez maintenant, car vous rirez! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Heureux serez-vous lorsque les hommes vous détesteront, lorsqu''ils vous chasseront, vous insulteront et vous rejetteront comme des êtres infâmes à cause du Fils de l''homme! '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Réjouissez-vous, ce jour-là, et sautez de joie, parce que votre récompense sera grande dans le ciel. En effet, c'est de la même manière que leurs ancêtres traitaient les prophètes.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '»Mais malheur à vous, riches, car vous avez votre consolation! '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Malheur à vous qui êtes comblés [maintenant], car vous aurez faim! Malheur à vous qui riez maintenant, car vous serez dans le deuil et dans les larmes! '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Malheur lorsque tous les hommes diront du bien de vous, car c'est de la même manière que leurs ancêtres traitaient les prétendus prophètes!
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: '»Mais je vous dis, à vous qui m''écoutez: Aimez vos ennemis, faites du bien à ceux qui vous détestent, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'bénissez ceux qui vous maudissent, priez pour ceux qui vous maltraitent. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Si quelqu''un te frappe sur une joue, présente-lui aussi l''autre. Si quelqu''un prend ton manteau, ne l''empêche pas de prendre encore ta chemise. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Jésus leur répondit: «N''avez-vous pas lu ce qu''a fait David, lorsqu''il a eu faim, lui et ses compagnons? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Donne à toute personne qui t''adresse une demande et ne réclame pas ton bien à celui qui s''en empare. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Ce que vous voulez que les hommes fassent pour vous, faites-le [vous aussi] de même pour eux. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Si vous aimez ceux qui vous aiment, quelle reconnaissance en avez-vous? En effet, les pécheurs aussi aiment ceux qui les aiment. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Si vous faites du bien à ceux qui vous font du bien, quelle estime en avez-vous? [En effet,] les pécheurs aussi agissent de même. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Et si vous prêtez à ceux dont vous espérez recevoir en retour, quel gré vous en sait-on? [En effet,] les pécheurs aussi prêtent aux pécheurs afin de recevoir l''équivalent. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Mais aimez vos ennemis, faites du bien et prêtez sans rien espérer en retour. Votre récompense sera grande et vous serez fils du Très-Haut, car il est bon pour les ingrats et pour les méchants. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Soyez donc pleins de compassion, tout comme votre Père [aussi] est plein de compassion.
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: '»Ne jugez pas et vous ne serez pas jugés; ne condamnez pas et vous ne serez pas condamnés; pardonnez et vous serez pardonnés. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Donnez et on vous donnera: on versera dans le pan de votre vêtement une bonne mesure, tassée, secouée et qui déborde, car on utilisera pour vous la même mesure que celle dont vous vous serez servis.»'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Il leur dit aussi cette parabole: «Un aveugle peut-il conduire un aveugle? Ne tomberont-ils pas tous deux dans un fossé? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il est entré dans la maison de Dieu, a pris les pains consacrés, en a mangé et en a donné même à ses compagnons, bien qu''il ne soit permis qu''aux prêtres de les manger!» '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Le disciple n'est pas supérieur à son maître, mais tout disciple bien formé sera comme son maître.
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: '»Pourquoi vois-tu la paille qui est dans l''œil de ton frère et ne remarques-tu pas la poutre qui est dans ton propre œil? '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Ou comment peux-tu dire à ton frère: ‘Frère, laisse-moi enlever la paille qui est dans ton œil’, toi qui ne vois pas la poutre qui est dans le tien? Hypocrite, enlève d''abord la poutre de ton œil, et alors tu verras clair pour retirer la paille qui est dans l''œil de ton frère.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: '»Un bon arbre ne porte pas de mauvais fruits ni un mauvais arbre de bons fruits. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'En effet, chaque arbre se reconnaît à son fruit. On ne cueille pas des figues sur des ronces et l''on ne vendange pas des raisins sur des ronces. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: L'homme bon tire de bonnes choses du bon trésor de son cœur, et celui qui est mauvais tire de mauvaises choses du mauvais [trésor de son cœur]. En effet, sa bouche exprime ce dont son cœur est plein.
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: '»Pourquoi m''appelez-vous ‘Seigneur, Seigneur!’ et ne faites-vous pas ce que je dis? '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Je vais vous montrer à qui ressemble tout homme qui vient à moi, entend mes paroles et les met en pratique: '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'il ressemble à un homme qui, pour construire une maison, a creusé, creusé profondément et a posé les fondations sur le rocher. Une inondation est venue, le torrent s''est jeté contre cette maison sans pouvoir l''ébranler, parce qu''elle était fondée sur le rocher. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Mais celui qui entend et ne met pas en pratique est semblable à un homme qui a construit une maison sur la terre, sans fondations. Le torrent s'est jeté contre elle et aussitôt elle s'est écroulée; la ruine de cette maison a été grande.»
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Puis il leur dit: «Le Fils de l''homme est le Seigneur [même] du sabbat.»'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Un autre jour de sabbat, Jésus entra dans la synagogue et se mit à enseigner. Là se trouvait un homme dont la main droite était paralysée. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Les spécialistes de la loi et les pharisiens observaient Jésus pour voir s''il ferait une guérison le jour du sabbat, afin d''avoir un motif pour l''accuser. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mais Jésus connaissait leurs pensées et il dit à l''homme qui avait la main paralysée: «Lève-toi et tiens-toi là au milieu.» Il se leva et se tint debout. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Jésus leur dit: «Je vous demande s''il est permis, le jour du sabbat, de faire du bien ou de faire du mal, de sauver une personne ou de la tuer.» '
