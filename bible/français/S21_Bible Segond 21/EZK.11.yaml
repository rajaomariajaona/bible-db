document_id: EZK.11,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Jugement et promesse de rétablissement
  - type: text
    content: 'L''Esprit m''a enlevé et m''a transporté à la porte de la maison de l''Eternel qui est à l''est, celle qui est orientée vers l''est. A l''entrée, il y avait 25 hommes. Au milieu d''eux, j''ai remarqué Jaazania, le fils d''Azzur, et Pelathia, le fils de Benaja. C''étaient des chefs du peuple. '
  '10':
  - type: text
    content: Vous tomberez par l'épée
  - type: text
    content: et je vous jugerai à la frontière d'Israël.
  - type: text
    content: Vous reconnaîtrez alors que je suis l'Eternel.
  '11':
  - type: text
    content: La ville ne sera pas une marmite pour vous
  - type: text
    content: 'et vous ne serez pas comme de la viande à l''intérieur:'
  - type: text
    content: c'est à la frontière d'Israël que je vous jugerai.
  '12':
  - type: text
    content: Vous reconnaîtrez alors que je suis l'Eternel,
  - type: text
    content: celui dont vous n'avez pas suivi les prescriptions
  - type: text
    content: ni respecté les règles,
  - type: text
    content: tout en vous conformant aux règles en vigueur chez les nations qui vous entourent.’»
  '13':
  - type: text
    content: 'Pendant que je prophétisais, Pelathia, fils de Benaja, est mort. Je suis alors tombé le visage contre terre et me suis écrié à pleine voix: «Ah! Seigneur Eternel, vas-tu exterminer ce qui reste d''Israël?»'
  '14':
  - type: text
    content: 'La parole de l''Eternel m''a été adressée:'
  '15':
  - type: text
    content: «Fils de l'homme, c'est à tes frères, à tes frères,
  - type: text
    content: aux membres de ta parenté ainsi qu'à la communauté d'Israël tout entière
  - type: text
    content: 'que les habitants de Jérusalem disent:'
  - type: text
    content: ‘Restez loin de l'Eternel!
  - type: text
    content: C'est à nous que le pays a été donné en propriété.’
  '16':
  - type: text
    content: 'C''est pourquoi, annonce: ‘Voici ce que dit le Seigneur, l''Eternel:'
  - type: text
    content: Même si je les tiens éloignés parmi les nations,
  - type: text
    content: même si je les ai éparpillés dans divers pays,
  - type: text
    content: je serai pour eux un sanctuaire, durant quelque temps,
  - type: text
    content: dans les pays où ils sont allés.’
  '17':
  - type: text
    content: 'C''est pourquoi, annonce: ‘Voici ce que dit le Seigneur, l''Eternel:'
  - type: text
    content: Je vous rassemblerai du milieu des peuples,
  - type: text
    content: je vous réunirai des pays où vous êtes éparpillés
  - type: text
    content: et je vous donnerai le territoire d'Israël.’
  '18':
  - type: text
    content: »C'est là qu'ils iront,
  - type: text
    content: et ils en retireront toutes les monstruosités et toutes les pratiques abominables.
  '19':
  - type: text
    content: Je leur donnerai un seul cœur
  - type: text
    content: et je mettrai en eux un esprit nouveau.
  - type: text
    content: Je retirerai de leur corps le cœur de pierre
  - type: text
    content: et je leur donnerai un cœur de chair.
  '2':
  - type: text
    content: 'L''Eternel m''a dit: «Fils de l''homme, voilà les hommes qui projettent l''injustice et qui donnent de mauvais conseils dans cette ville. '
  '20':
  - type: text
    content: Ainsi ils pourront suivre mes prescriptions,
  - type: text
    content: garder et respecter mes règles.
  - type: text
    content: Alors ils seront mon peuple et je serai leur Dieu.
  '21':
  - type: text
    content: »Quant à ceux qui ont le cœur attaché à leurs monstruosités et à leurs horreurs,
  - type: text
    content: je ferai retomber leur conduite sur leur tête,
  - type: text
    content: déclare le Seigneur, l'Eternel.»
  - type: heading
    content: Départ de la gloire de Dieu
  '22':
  - type: text
    content: 'Les chérubins ont déployé leurs ailes, accompagnés des roues, et la gloire du Dieu d''Israël était au-dessus d''eux, tout en haut. '
  '23':
  - type: text
    content: 'La gloire de l''Eternel est montée au-dessus du centre de la ville et s''est arrêtée sur la montagne qui se trouve à l''est de la ville. '
  '24':
  - type: text
    content: 'Ensuite l''Esprit m''a enlevé et m''a transporté en Babylonie vers les exilés, dans la même vision et par l''Esprit de Dieu. La vision que j''avais eue a alors disparu au-dessus de moi, '
  '25':
  - type: text
    content: et j'ai rapporté aux exilés tout ce que l'Eternel m'avait révélé.
  '3':
  - type: text
    content: 'Ils disent: ‘Ce n''est pas pour tout de suite! Profitons de construire des maisons! La ville est la marmite et nous sommes la viande.’ '
  '4':
  - type: text
    content: C'est pourquoi prophétise contre eux, prophétise, fils de l'homme!»
  '5':
  - type: text
    content: 'Alors l''Esprit de l''Eternel est tombé sur moi et m''a dit:'
  - type: text
    content: '«Annonce: ‘Voici ce que dit l''Eternel:'
  - type: text
    content: C'est donc ainsi que vous parlez, communauté d'Israël!
  - type: text
    content: Je sais ce qui vous vient à l'esprit.
  '6':
  - type: text
    content: Vous avez multiplié le nombre de vos victimes dans cette ville,
  - type: text
    content: vous avez rempli ses rues de vos victimes.
  '7':
  - type: text
    content: '»C''est pourquoi, voici ce que dit le Seigneur, l''Eternel:'
  - type: text
    content: Les victimes que vous avez exposées au milieu d'elle,
  - type: text
    content: c'est elles qui sont la viande, et la marmite, c'est la ville.
  - type: text
    content: Quant à vous, on vous en fera sortir.
  '8':
  - type: text
    content: Vous avez peur de l'épée?
  - type: text
    content: Je ferai venir l'épée contre vous,
  - type: text
    content: déclare le Seigneur, l'Eternel.
  '9':
  - type: text
    content: Je vous ferai sortir du milieu d'elle,
  - type: text
    content: je vous livrerai entre les mains des étrangers
  - type: text
    content: et je mettrai mes jugements en œuvre contre vous.
