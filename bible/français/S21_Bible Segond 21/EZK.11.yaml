document_id: EZK.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jugement et promesse de rétablissement
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Esprit m''a enlevé et m''a transporté à la porte de la maison de l''Eternel qui est à l''est, celle qui est orientée vers l''est. A l''entrée, il y avait 25 hommes. Au milieu d''eux, j''ai remarqué Jaazania, le fils d''Azzur, et Pelathia, le fils de Benaja. C''étaient des chefs du peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'L''Eternel m''a dit: «Fils de l''homme, voilà les hommes qui projettent l''injustice et qui donnent de mauvais conseils dans cette ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils disent: ‘Ce n''est pas pour tout de suite! Profitons de construire des maisons! La ville est la marmite et nous sommes la viande.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: C'est pourquoi prophétise contre eux, prophétise, fils de l'homme!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors l''Esprit de l''Eternel est tombé sur moi et m''a dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '«Annonce: ‘Voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est donc ainsi que vous parlez, communauté d'Israël!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je sais ce qui vous vient à l'esprit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Vous avez multiplié le nombre de vos victimes dans cette ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous avez rempli ses rues de vos victimes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '»C''est pourquoi, voici ce que dit le Seigneur, l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les victimes que vous avez exposées au milieu d'elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est elles qui sont la viande, et la marmite, c'est la ville.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quant à vous, on vous en fera sortir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Vous avez peur de l'épée?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ferai venir l'épée contre vous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare le Seigneur, l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je vous ferai sortir du milieu d'elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vous livrerai entre les mains des étrangers
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je mettrai mes jugements en œuvre contre vous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Vous tomberez par l'épée
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je vous jugerai à la frontière d'Israël.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous reconnaîtrez alors que je suis l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: La ville ne sera pas une marmite pour vous
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et vous ne serez pas comme de la viande à l''intérieur:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est à la frontière d'Israël que je vous jugerai.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Vous reconnaîtrez alors que je suis l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui dont vous n'avez pas suivi les prescriptions
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni respecté les règles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout en vous conformant aux règles en vigueur chez les nations qui vous entourent.’»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Pendant que je prophétisais, Pelathia, fils de Benaja, est mort. Je suis alors tombé le visage contre terre et me suis écrié à pleine voix: «Ah! Seigneur Eternel, vas-tu exterminer ce qui reste d''Israël?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'La parole de l''Eternel m''a été adressée:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: «Fils de l'homme, c'est à tes frères, à tes frères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aux membres de ta parenté ainsi qu'à la communauté d'Israël tout entière
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'que les habitants de Jérusalem disent:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Restez loin de l'Eternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est à nous que le pays a été donné en propriété.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'C''est pourquoi, annonce: ‘Voici ce que dit le Seigneur, l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Même si je les tiens éloignés parmi les nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: même si je les ai éparpillés dans divers pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je serai pour eux un sanctuaire, durant quelque temps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans les pays où ils sont allés.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'C''est pourquoi, annonce: ‘Voici ce que dit le Seigneur, l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je vous rassemblerai du milieu des peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vous réunirai des pays où vous êtes éparpillés
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je vous donnerai le territoire d'Israël.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: »C'est là qu'ils iront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils en retireront toutes les monstruosités et toutes les pratiques abominables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Je leur donnerai un seul cœur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je mettrai en eux un esprit nouveau.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je retirerai de leur corps le cœur de pierre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je leur donnerai un cœur de chair.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ainsi ils pourront suivre mes prescriptions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: garder et respecter mes règles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors ils seront mon peuple et je serai leur Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: »Quant à ceux qui ont le cœur attaché à leurs monstruosités et à leurs horreurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ferai retomber leur conduite sur leur tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare le Seigneur, l'Eternel.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Départ de la gloire de Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les chérubins ont déployé leurs ailes, accompagnés des roues, et la gloire du Dieu d''Israël était au-dessus d''eux, tout en haut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'La gloire de l''Eternel est montée au-dessus du centre de la ville et s''est arrêtée sur la montagne qui se trouve à l''est de la ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ensuite l''Esprit m''a enlevé et m''a transporté en Babylonie vers les exilés, dans la même vision et par l''Esprit de Dieu. La vision que j''avais eue a alors disparu au-dessus de moi, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: et j'ai rapporté aux exilés tout ce que l'Eternel m'avait révélé.
