document_id: DEU.20,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les exemptions du service militaire
  - type: text
    content: »Lorsque tu iras à la guerre contre tes ennemis et que tu verras des chevaux et des chars, un peuple plus nombreux que toi, tu n'auras pas peur d'eux, car l'Eternel, ton Dieu, qui t'a fait sortir d'Egypte, est avec toi.
  '10':
  - type: text
    content: '»Quand tu t''approcheras d''une ville pour l''attaquer, tu lui offriras la paix. '
  '11':
  - type: text
    content: 'Si elle accepte la paix et t''ouvre ses portes, tu imposeras corvées et esclavage à tout le peuple qui s''y trouvera. '
  '12':
  - type: text
    content: 'Si elle n''accepte pas de faire la paix avec toi et qu''elle veuille te faire la guerre, alors tu l''assiégeras. '
  '13':
  - type: text
    content: 'Et une fois que l''Eternel, ton Dieu, l''aura livrée entre tes mains, tu feras passer tous ses hommes au fil de l''épée. '
  '14':
  - type: text
    content: 'En revanche, tu prendras pour toi les femmes, les enfants, le bétail, tout ce qui sera dans la ville, tout son butin, et tu mangeras le butin de tes ennemis que l''Eternel, ton Dieu, t''aura livrés. '
  '15':
  - type: text
    content: 'C''est ainsi que tu agiras envers toutes les villes qui sont très loin de toi et ne font pas partie de ces nations-ci. '
  '16':
  - type: text
    content: 'Mais dans les villes des peuples dont l''Eternel, ton Dieu, te donne le pays pour héritage, tu ne laisseras la vie à rien de ce qui respire. '
  '17':
  - type: text
    content: 'Oui, tu extermineras ces peuples – les Hittites, les Amoréens, les Cananéens, les Phéréziens, les Héviens et les Jébusiens – comme l''Eternel, ton Dieu, te l''a ordonné, '
  '18':
  - type: text
    content: afin qu'ils ne vous apprennent pas à imiter toutes les pratiques abominables auxquelles ils se livrent en l'honneur de leurs dieux et que vous ne péchiez pas contre l'Eternel, votre Dieu.
  '19':
  - type: text
    content: '»Si tu fais un long siège pour t''emparer d''une ville contre laquelle tu es en guerre, tu ne détruiras pas les arbres en y portant la hache. Tu t''en nourriras, mais tu ne les abattras pas. En effet, l''arbre des champs est-il un homme pour être assiégé par toi? '
  '2':
  - type: text
    content: '»A l''approche du combat, le prêtre s''avancera et parlera au peuple. '
  '20':
  - type: text
    content: En revanche, tu pourras détruire et abattre les arbres dont tu sauras qu'ils ne servent pas à la nourriture et les utiliser pour construire des retranchements contre la ville qui te fait la guerre, jusqu'à ce qu'elle capitule.
  '3':
  - type: text
    content: 'Il leur dira: ‘Ecoute, Israël! Vous allez aujourd''hui livrer bataille à vos ennemis. Que votre cœur ne se trouble pas. N''ayez pas peur, ne vous laissez pas effrayer, ne soyez pas épouvantés devant eux, '
  '4':
  - type: text
    content: car l'Eternel, votre Dieu, marche avec vous pour combattre vos ennemis, pour vous sauver.’
  '5':
  - type: text
    content: '»Puis les officiers transmettront ces instructions au peuple: ‘Qui a construit une maison neuve et ne l''a pas encore inaugurée? Qu''il s''en aille et retourne chez lui, de peur qu''il ne meure dans la bataille et que ce ne soit un autre qui l''inaugure. '
  '6':
  - type: text
    content: 'Qui a planté une vigne et n''en a pas encore joui? Qu''il s''en aille et retourne chez lui, de peur qu''il ne meure dans la bataille et que ce ne soit un autre qui en jouisse. '
  '7':
  - type: text
    content: 'Qui est fiancé à une femme et ne l''a pas encore épousée? Qu''il s''en aille et retourne chez lui, de peur qu''il ne meure dans la bataille et que ce ne soit un autre qui l''épouse.’ '
  '8':
  - type: text
    content: 'Les officiers continueront à transmettre ces instructions au peuple: ‘Qui a peur et manque de courage? Qu''il s''en aille et retourne chez lui, afin que ses frères ne se découragent pas comme lui.’ '
  '9':
  - type: text
    content: Quand les officiers auront fini de parler au peuple, ils placeront les chefs des troupes à sa tête.
  - type: heading
    content: Règles pour la conquête de villes
