document_id: DEU.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les exemptions du service militaire
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: »Lorsque tu iras à la guerre contre tes ennemis et que tu verras des chevaux et des chars, un peuple plus nombreux que toi, tu n'auras pas peur d'eux, car l'Eternel, ton Dieu, qui t'a fait sortir d'Egypte, est avec toi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '»A l''approche du combat, le prêtre s''avancera et parlera au peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il leur dira: ‘Ecoute, Israël! Vous allez aujourd''hui livrer bataille à vos ennemis. Que votre cœur ne se trouble pas. N''ayez pas peur, ne vous laissez pas effrayer, ne soyez pas épouvantés devant eux, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: car l'Eternel, votre Dieu, marche avec vous pour combattre vos ennemis, pour vous sauver.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '»Puis les officiers transmettront ces instructions au peuple: ‘Qui a construit une maison neuve et ne l''a pas encore inaugurée? Qu''il s''en aille et retourne chez lui, de peur qu''il ne meure dans la bataille et que ce ne soit un autre qui l''inaugure. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Qui a planté une vigne et n''en a pas encore joui? Qu''il s''en aille et retourne chez lui, de peur qu''il ne meure dans la bataille et que ce ne soit un autre qui en jouisse. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Qui est fiancé à une femme et ne l''a pas encore épousée? Qu''il s''en aille et retourne chez lui, de peur qu''il ne meure dans la bataille et que ce ne soit un autre qui l''épouse.’ '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les officiers continueront à transmettre ces instructions au peuple: ‘Qui a peur et manque de courage? Qu''il s''en aille et retourne chez lui, afin que ses frères ne se découragent pas comme lui.’ '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Quand les officiers auront fini de parler au peuple, ils placeront les chefs des troupes à sa tête.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règles pour la conquête de villes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '»Quand tu t''approcheras d''une ville pour l''attaquer, tu lui offriras la paix. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Si elle accepte la paix et t''ouvre ses portes, tu imposeras corvées et esclavage à tout le peuple qui s''y trouvera. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Si elle n''accepte pas de faire la paix avec toi et qu''elle veuille te faire la guerre, alors tu l''assiégeras. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et une fois que l''Eternel, ton Dieu, l''aura livrée entre tes mains, tu feras passer tous ses hommes au fil de l''épée. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'En revanche, tu prendras pour toi les femmes, les enfants, le bétail, tout ce qui sera dans la ville, tout son butin, et tu mangeras le butin de tes ennemis que l''Eternel, ton Dieu, t''aura livrés. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'C''est ainsi que tu agiras envers toutes les villes qui sont très loin de toi et ne font pas partie de ces nations-ci. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais dans les villes des peuples dont l''Eternel, ton Dieu, te donne le pays pour héritage, tu ne laisseras la vie à rien de ce qui respire. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Oui, tu extermineras ces peuples – les Hittites, les Amoréens, les Cananéens, les Phéréziens, les Héviens et les Jébusiens – comme l''Eternel, ton Dieu, te l''a ordonné, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: afin qu'ils ne vous apprennent pas à imiter toutes les pratiques abominables auxquelles ils se livrent en l'honneur de leurs dieux et que vous ne péchiez pas contre l'Eternel, votre Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '»Si tu fais un long siège pour t''emparer d''une ville contre laquelle tu es en guerre, tu ne détruiras pas les arbres en y portant la hache. Tu t''en nourriras, mais tu ne les abattras pas. En effet, l''arbre des champs est-il un homme pour être assiégé par toi? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: En revanche, tu pourras détruire et abattre les arbres dont tu sauras qu'ils ne servent pas à la nourriture et les utiliser pour construire des retranchements contre la ville qui te fait la guerre, jusqu'à ce qu'elle capitule.
