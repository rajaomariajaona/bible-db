document_id: ISA.30
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Annonce de la punition de Juda
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Malheur aux enfants rebelles
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui forment des projets en me tenant à l'écart, déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui concluent des alliances sans se laisser inspirer par moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: accumulant ainsi péché sur péché!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ils descendent en Egypte sans me demander mon avis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour chercher refuge dans la protection du pharaon
- type: usfm
  marker: q1
  children:
  - type: text
    text: et s'abriter sous l'ombre de l'Egypte!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: La protection du pharaon tournera à votre honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'abri trouvé sous l'ombre de l'Egypte à votre humiliation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: En effet, ses ministres sont à Tsoan
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses messagers ont atteint Hanès!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tous se couvrent de honte à cause d'un peuple qui ne leur sera d'aucune utilité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni pour les secourir, ni pour les aider,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais qui fera leur honte et leur déshonneur.
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Message sur les bêtes du Néguev.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A travers une région de détresse et de désarroi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: patrie de la lionne et du lion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de la vipère et du serpent volant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils portent leurs richesses à dos d'âne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils portent leurs trésors sur la bosse des chameaux
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour les donner à un peuple qui ne leur sera d'aucune utilité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: En effet, le secours de l'Egypte est illusoire et creux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est pourquoi je l'ai appelée «le monstre au repos».
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Maintenant, viens écrire cette parole devant eux sur une table
- type: usfm
  marker: q1
  children:
  - type: text
    text: et enregistre-la dans un livre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin qu'elle reste comme un témoignage éternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour les jours à venir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: En effet, c'est un peuple rebelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce sont des enfants menteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des enfants qui ne veulent pas écouter la loi de l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils disent aux voyants: «N''ayez pas de visions»,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'aux prophètes: «Ne nous révélez pas des vérités!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dites-nous des choses flatteuses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: révélez-nous des chimères!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Détournez-vous du bon chemin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: écartez-vous du bon sentier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: cessez de nous confronter au Saint d'Israël!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'C''est pourquoi, voici ce que dit le Saint d''Israël:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puisque vous rejetez cette parole,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puisque vous placez votre confiance dans l'exploitation et la perversion
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les prenez pour appuis,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: cette faute sera pareille, pour vous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à une fissure menaçante
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui grossit dans une haute muraille
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et dont l''écroulement arrive tout à coup, en un instant:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: elle se brise comme un vase en terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: cassé sans ménagement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'on ne trouve aucun morceau, parmi les débris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour aller prendre du feu au foyer
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou puiser de l'eau à la citerne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'En effet, voici ce qu''avait dit le Seigneur, l''Eternel, le Saint d''Israël:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «C'est dans le retour à moi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Amoi: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: non exprimé en hébreu.
    marker-yv: yv-n
  - type: text
    text: ' et le repos que sera votre salut,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est dans le calme et la confiance que sera votre force»,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais vous ne l'avez pas voulu!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Vous avez dit: «Non! Nous nous enfuirons à cheval!»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voilà pourquoi vous vous enfuirez.
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Nous monterons des chevaux rapides!»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voilà pourquoi vos poursuivants seront rapides.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Un millier fuira à la menace d'un seul,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous fuirez à la menace de cinq hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu'à ce qu'il n'y ait plus de vous qu'un reste isolé
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme une perche au sommet de la montagne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un étendard sur la colline.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Promesses pour l'avenir
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Cependant, l'Eternel n'attend que le moment de vous faire grâce,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est pourquoi il se lèvera pour vous manifester sa compassion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, l'Eternel est un Dieu d'équité.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Heureux tous ceux qui comptent sur lui!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Oui, un peuple habitera encore à Sion, à Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu ne pleureras plus!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il te fera grâce quand tu crieras;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dès qu'il aura entendu, il te répondra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Le Seigneur vous donnera du pain quand vous serez dans la détresse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de l'eau au milieu de l'oppression.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ton maître ne se cachera plus
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tes yeux le verront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tes oreilles entendront dire derrière toi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Voici le chemin à prendre, marchez-y!»
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand vous irez à droite ou quand vous irez à gauche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Vous considérerez comme impurs l'argent qui recouvre vos sculptures sacrées
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'or dont elles sont plaquées;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tu disperseras leurs débris comme un linge souillé:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Dehors!» leur diras-tu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Alors il arrosera de pluie la semence que tu auras mise en terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le pain que produira la terre sera savoureux et nourrissant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce jour-là, tes troupeaux brouteront dans de vastes pâturages.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Les bœufs et les ânes qui labourent la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: mangeront un fourrage salé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'on aura étalé avec la fourche et la pelle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Sur toute haute montagne et sur toute colline élevée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il y aura des canaux, des courants d'eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le jour du grand massacre, l
- type: usfm
  marker: q1
  children:
  - type: text
    text: orsque les tours s'écrouleront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: La lumière de la lune sera aussi forte que celle du soleil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la lumière du soleil sera sept fois plus grande
- type: usfm
  marker: q1
  children:
  - type: text
    text: – pareille à la lumière de sept jours –
- type: usfm
  marker: q1
  children:
  - type: text
    text: le jour où l'Eternel soignera les fractures de son peuple
- type: usfm
  marker: q1
  children:
  - type: text
    text: et guérira ses blessures.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jugement des Assyriens
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: L'Eternel arrive de loin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa colère est ardente, elle pèse lourdement.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses lèvres sont pleines de fureur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa langue est comme un feu dévorant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Son souffle est pareil à un torrent qui submerge tout jusqu'à la hauteur du cou.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il passera les nations au crible de la destruction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il passera aux mâchoires des peuples le mors de l'égarement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Vous chanterez comme la nuit où l'on célèbre la fête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous aurez le cœur joyeux, comme celui qui marche au son de la flûte
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour aller à la montagne de l'Eternel, vers le rocher d'Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: L'Eternel fera retentir sa voix dans toute sa majesté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il montrera son bras prêt à frapper
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de l'ardeur de sa colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au milieu de la flamme d'un feu dévorant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de l'inondation, de la tempête et des pierres de grêle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: A la voix de l'Eternel, l'Assyrien tremblera.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Eternel le frappera à coups de bâton,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: et à chaque coup de bâton qui lui est destiné
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que l'Eternel fera tomber sur lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on entendra les tambourins et les harpes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est ouvertement que l'Eternel combattra contre lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Depuis longtemps le bûcher est prêt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c'est pour le roi qu'il a été préparé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est un endroit profond et large.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son bûcher est composé de feu et de beaucoup de bois;
- type: usfm
  marker: q1
  children:
  - type: text
    text: le souffle de l'Eternel l'enflamme comme un torrent embrasé de soufre.
