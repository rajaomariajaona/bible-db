document_id: ISA.30,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Annonce de la punition de Juda
  - type: text
    content: Malheur aux enfants rebelles
  - type: text
    content: qui forment des projets en me tenant à l'écart, déclare l'Eternel,
  - type: text
    content: et qui concluent des alliances sans se laisser inspirer par moi,
  - type: text
    content: accumulant ainsi péché sur péché!
  '10':
  - type: text
    content: 'Ils disent aux voyants: «N''ayez pas de visions»,'
  - type: text
    content: 'aux prophètes: «Ne nous révélez pas des vérités!'
  - type: text
    content: Dites-nous des choses flatteuses,
  - type: text
    content: révélez-nous des chimères!
  '11':
  - type: text
    content: Détournez-vous du bon chemin,
  - type: text
    content: écartez-vous du bon sentier,
  - type: text
    content: cessez de nous confronter au Saint d'Israël!»
  '12':
  - type: text
    content: 'C''est pourquoi, voici ce que dit le Saint d''Israël:'
  - type: text
    content: Puisque vous rejetez cette parole,
  - type: text
    content: puisque vous placez votre confiance dans l'exploitation et la perversion
  - type: text
    content: et les prenez pour appuis,
  '13':
  - type: text
    content: cette faute sera pareille, pour vous,
  - type: text
    content: à une fissure menaçante
  - type: text
    content: qui grossit dans une haute muraille
  - type: text
    content: 'et dont l''écroulement arrive tout à coup, en un instant:'
  '14':
  - type: text
    content: elle se brise comme un vase en terre
  - type: text
    content: cassé sans ménagement,
  - type: text
    content: et l'on ne trouve aucun morceau, parmi les débris,
  - type: text
    content: pour aller prendre du feu au foyer
  - type: text
    content: ou puiser de l'eau à la citerne.
  '15':
  - type: text
    content: 'En effet, voici ce qu''avait dit le Seigneur, l''Eternel, le Saint d''Israël:'
  - type: text
    content: «C'est dans le retour à moi
  - type: note
    content: 'Amoi: non exprimé en hébreu.'
  - type: text
    content: ' et le repos que sera votre salut,'
  - type: text
    content: c'est dans le calme et la confiance que sera votre force»,
  - type: text
    content: mais vous ne l'avez pas voulu!
  '16':
  - type: text
    content: 'Vous avez dit: «Non! Nous nous enfuirons à cheval!»'
  - type: text
    content: Voilà pourquoi vous vous enfuirez.
  - type: text
    content: «Nous monterons des chevaux rapides!»
  - type: text
    content: Voilà pourquoi vos poursuivants seront rapides.
  '17':
  - type: text
    content: Un millier fuira à la menace d'un seul,
  - type: text
    content: vous fuirez à la menace de cinq hommes,
  - type: text
    content: jusqu'à ce qu'il n'y ait plus de vous qu'un reste isolé
  - type: text
    content: comme une perche au sommet de la montagne,
  - type: text
    content: comme un étendard sur la colline.
  - type: heading
    content: Promesses pour l'avenir
  '18':
  - type: text
    content: Cependant, l'Eternel n'attend que le moment de vous faire grâce,
  - type: text
    content: c'est pourquoi il se lèvera pour vous manifester sa compassion.
  - type: text
    content: En effet, l'Eternel est un Dieu d'équité.
  - type: text
    content: Heureux tous ceux qui comptent sur lui!
  '19':
  - type: text
    content: Oui, un peuple habitera encore à Sion, à Jérusalem.
  - type: text
    content: Tu ne pleureras plus!
  - type: text
    content: Il te fera grâce quand tu crieras;
  - type: text
    content: dès qu'il aura entendu, il te répondra.
  '2':
  - type: text
    content: Ils descendent en Egypte sans me demander mon avis,
  - type: text
    content: pour chercher refuge dans la protection du pharaon
  - type: text
    content: et s'abriter sous l'ombre de l'Egypte!
  '20':
  - type: text
    content: Le Seigneur vous donnera du pain quand vous serez dans la détresse
  - type: text
    content: et de l'eau au milieu de l'oppression.
  - type: text
    content: Ton maître ne se cachera plus
  - type: text
    content: et tes yeux le verront.
  '21':
  - type: text
    content: 'Tes oreilles entendront dire derrière toi:'
  - type: text
    content: «Voici le chemin à prendre, marchez-y!»
  - type: text
    content: quand vous irez à droite ou quand vous irez à gauche.
  '22':
  - type: text
    content: Vous considérerez comme impurs l'argent qui recouvre vos sculptures sacrées
  - type: text
    content: et l'or dont elles sont plaquées;
  - type: text
    content: 'tu disperseras leurs débris comme un linge souillé:'
  - type: text
    content: «Dehors!» leur diras-tu.
  '23':
  - type: text
    content: Alors il arrosera de pluie la semence que tu auras mise en terre
  - type: text
    content: et le pain que produira la terre sera savoureux et nourrissant.
  - type: text
    content: Ce jour-là, tes troupeaux brouteront dans de vastes pâturages.
  '24':
  - type: text
    content: Les bœufs et les ânes qui labourent la terre
  - type: text
    content: mangeront un fourrage salé,
  - type: text
    content: qu'on aura étalé avec la fourche et la pelle.
  '25':
  - type: text
    content: Sur toute haute montagne et sur toute colline élevée,
  - type: text
    content: il y aura des canaux, des courants d'eau,
  - type: text
    content: le jour du grand massacre, l
  - type: text
    content: orsque les tours s'écrouleront.
  '26':
  - type: text
    content: La lumière de la lune sera aussi forte que celle du soleil,
  - type: text
    content: et la lumière du soleil sera sept fois plus grande
  - type: text
    content: – pareille à la lumière de sept jours –
  - type: text
    content: le jour où l'Eternel soignera les fractures de son peuple
  - type: text
    content: et guérira ses blessures.
  - type: heading
    content: Jugement des Assyriens
  '27':
  - type: text
    content: L'Eternel arrive de loin.
  - type: text
    content: Sa colère est ardente, elle pèse lourdement.
  - type: text
    content: Ses lèvres sont pleines de fureur
  - type: text
    content: et sa langue est comme un feu dévorant.
  '28':
  - type: text
    content: Son souffle est pareil à un torrent qui submerge tout jusqu'à la hauteur du cou.
  - type: text
    content: Il passera les nations au crible de la destruction,
  - type: text
    content: il passera aux mâchoires des peuples le mors de l'égarement.
  '29':
  - type: text
    content: Vous chanterez comme la nuit où l'on célèbre la fête,
  - type: text
    content: vous aurez le cœur joyeux, comme celui qui marche au son de la flûte
  - type: text
    content: pour aller à la montagne de l'Eternel, vers le rocher d'Israël.
  '3':
  - type: text
    content: La protection du pharaon tournera à votre honte,
  - type: text
    content: et l'abri trouvé sous l'ombre de l'Egypte à votre humiliation.
  '30':
  - type: text
    content: L'Eternel fera retentir sa voix dans toute sa majesté,
  - type: text
    content: il montrera son bras prêt à frapper
  - type: text
    content: à cause de l'ardeur de sa colère,
  - type: text
    content: au milieu de la flamme d'un feu dévorant,
  - type: text
    content: de l'inondation, de la tempête et des pierres de grêle.
  '31':
  - type: text
    content: A la voix de l'Eternel, l'Assyrien tremblera.
  - type: text
    content: L'Eternel le frappera à coups de bâton,
  '32':
  - type: text
    content: et à chaque coup de bâton qui lui est destiné
  - type: text
    content: et que l'Eternel fera tomber sur lui,
  - type: text
    content: on entendra les tambourins et les harpes.
  - type: text
    content: C'est ouvertement que l'Eternel combattra contre lui.
  '33':
  - type: text
    content: Depuis longtemps le bûcher est prêt,
  - type: text
    content: et c'est pour le roi qu'il a été préparé.
  - type: text
    content: C'est un endroit profond et large.
  - type: text
    content: Son bûcher est composé de feu et de beaucoup de bois;
  - type: text
    content: le souffle de l'Eternel l'enflamme comme un torrent embrasé de soufre.
  '4':
  - type: text
    content: En effet, ses ministres sont à Tsoan
  - type: text
    content: et ses messagers ont atteint Hanès!
  '5':
  - type: text
    content: Tous se couvrent de honte à cause d'un peuple qui ne leur sera d'aucune utilité,
  - type: text
    content: ni pour les secourir, ni pour les aider,
  - type: text
    content: mais qui fera leur honte et leur déshonneur.
  '6':
  - type: text
    content: Message sur les bêtes du Néguev.
  - type: text
    content: A travers une région de détresse et de désarroi,
  - type: text
    content: patrie de la lionne et du lion,
  - type: text
    content: de la vipère et du serpent volant,
  - type: text
    content: ils portent leurs richesses à dos d'âne,
  - type: text
    content: ils portent leurs trésors sur la bosse des chameaux
  - type: text
    content: pour les donner à un peuple qui ne leur sera d'aucune utilité.
  '7':
  - type: text
    content: En effet, le secours de l'Egypte est illusoire et creux,
  - type: text
    content: c'est pourquoi je l'ai appelée «le monstre au repos».
  '8':
  - type: text
    content: Maintenant, viens écrire cette parole devant eux sur une table
  - type: text
    content: et enregistre-la dans un livre,
  - type: text
    content: afin qu'elle reste comme un témoignage éternel
  - type: text
    content: pour les jours à venir.
  '9':
  - type: text
    content: En effet, c'est un peuple rebelle,
  - type: text
    content: ce sont des enfants menteurs,
  - type: text
    content: des enfants qui ne veulent pas écouter la loi de l'Eternel.
