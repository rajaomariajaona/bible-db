document_id: LUK.8
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ensuite, Jésus alla de ville en ville et de village en village. Il prêchait et annonçait la bonne nouvelle du royaume de Dieu. Les douze l''accompagnaient, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'avec quelques femmes qui avaient été guéries d''esprits mauvais et de maladies: Marie, dite de Magdala, dont étaient sortis sept démons, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Jeanne, femme de Chuza l'intendant d'Hérode, Susanne et beaucoup d'autres, qui le servaient en l'assistant de leurs biens.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le semeur et les terrains
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Une grande foule se rassembla et des gens vinrent vers lui de diverses villes. Alors il dit cette parabole: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '«Un semeur sortit pour semer sa semence. Comme il semait, une partie de la semence tomba le long du chemin; elle fut piétinée et les oiseaux du ciel la mangèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Une autre partie tomba sur un sol pierreux; quand elle eut poussé, elle sécha, parce qu''elle manquait d''humidité. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Une autre partie tomba au milieu des ronces; les ronces poussèrent avec elle et l''étouffèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Une autre partie tomba dans la bonne terre; quand elle eut poussé, elle produisit du fruit au centuple.» Après cela, Jésus dit à haute voix: «Que celui qui a des oreilles pour entendre entende.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ses disciples lui demandèrent ce que signifiait cette parabole. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il répondit: «Il vous a été donné, à vous, de connaître les mystères du royaume de Dieu; mais pour les autres, cela est dit en paraboles, '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: afin qu'en voyant ils ne voient pas et qu'en entendant ils ne comprennent pas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Afin… comprennent pas: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 6.9-10
      metadata:
        usfm: ISA.6.9+ISA.6.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Voici ce que signifie cette parabole: la semence, c''est la parole de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ceux qui sont le long du chemin, ce sont ceux qui entendent; puis le diable vient et enlève la parole de leur cœur, de peur qu''ils ne croient et soient sauvés. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ceux qui sont sur le sol pierreux, ce sont ceux qui, lorsqu''ils entendent la parole, l''acceptent avec joie; mais ils n''ont pas de racine, ils croient pour un temps et abandonnent au moment de l''épreuve. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ce qui est tombé parmi les ronces, ce sont ceux qui ont entendu la parole, mais en cours de route ils la laissent étouffer par les préoccupations, les richesses et les plaisirs de la vie, et ils ne parviennent pas à maturité. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ce qui est tombé dans la bonne terre, ce sont ceux qui ont entendu la parole avec un cœur honnête et bon, la retiennent et portent du fruit avec persévérance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '»Personne n''allume une lampe pour la couvrir d''un vase ou la mettre sous un lit, mais il la met sur un support, afin que ceux qui entrent voient la lumière. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il n''y a en effet rien de caché qui ne doive être mis en lumière, rien de secret qui ne doive être connu et mis au jour. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Faites donc bien attention à la manière dont vous écoutez, car on donnera à celui qui a, mais à celui qui n'a pas on enlèvera même ce qu'il croit avoir.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'La mère et les frères de Jésus vinrent le trouver, mais ils ne pouvaient pas l''approcher à cause de la foule. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'On lui dit: «Ta mère et tes frères sont dehors et ils désirent te voir.» '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais il répondit: «Ma mère et mes frères, ce sont ceux qui écoutent la parole de Dieu et qui la mettent en pratique.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus plus fort que la nature et les démons
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Un jour, Jésus monta dans une barque avec ses disciples. Il leur dit: «Passons sur l''autre rive du lac.» Et ils partirent. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Pendant qu''ils naviguaient, Jésus s''endormit. Un tourbillon s''abattit sur le lac, la barque se remplissait d''eau et ils étaient en danger. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ils s''approchèrent et le réveillèrent en disant: «Maître, maître, nous allons mourir.» Il se réveilla et menaça le vent et les flots. Ceux-ci s''apaisèrent et il y eut un calme plat. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Puis il leur dit: «Où est votre foi?» Saisis de frayeur et d''étonnement, ils se dirent les uns aux autres: «Qui est donc cet homme? Il donne des ordres même au vent et à l''eau, et ils lui obéissent!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ils abordèrent dans le pays des Gadaréniens, qui est vis-à-vis de la Galilée. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Lorsque Jésus fut descendu à terre, un homme de la ville vint à sa rencontre; il avait des démons depuis assez longtemps. Il ne portait pas de vêtement et n''habitait pas dans une maison, mais dans les tombeaux. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Quand il vit Jésus, il poussa un cri, se jeta à ses pieds et dit d''une voix forte: «Que me veux-tu, Jésus, Fils du Dieu très-haut? Je t''en supplie, ne me tourmente pas.» '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jésus ordonnait en effet à l''esprit impur de sortir de cet homme, car il s''était emparé de lui depuis longtemps. On attachait le démoniaque avec des chaînes et on lui mettait les fers aux pieds pour le garder, mais il rompait les liens et il était entraîné par le démon dans les endroits déserts. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jésus lui demanda: «Quel est ton nom?» «Légion», répondit-il, car de nombreux démons étaient entrés en lui. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ils suppliaient Jésus de ne pas leur ordonner d''aller dans l''abîme. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il y avait là, sur la montagne, un grand troupeau de porcs en train de chercher à manger. Les démons supplièrent Jésus de leur permettre d''entrer dans ces porcs. Il le leur permit. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Les démons sortirent de cet homme, entrèrent dans les porcs, et le troupeau se précipita du haut de la falaise dans le lac et se noya. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Quand les gardiens du troupeau virent ce qui était arrivé, ils s''enfuirent et rapportèrent la nouvelle dans la ville et dans les campagnes. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Les gens allèrent voir ce qui était arrivé. Ils vinrent vers Jésus et trouvèrent assis à ses pieds l''homme dont les démons étaient sortis; il était habillé et dans son bon sens. Ils furent saisis de frayeur. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ceux qui avaient été témoins de la scène leur racontèrent comment le démoniaque avait été guéri. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Alors tous les habitants du pays des Gadaréniens demandèrent à Jésus de s''en aller de chez eux, car ils étaient saisis d''une grande crainte. Jésus monta dans la barque pour repartir. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'L''homme dont les démons étaient sortis le priait de le laisser rester avec lui, mais Jésus le renvoya en disant: '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: «Retourne dans ta maison et raconte tout ce que Dieu a fait pour toi.» Il s'en alla et proclama dans toute la ville tout ce que Jésus avait fait pour lui.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guérison d'une femme et résurrection d'une fillette
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'A son retour, Jésus fut accueilli par la foule, car tous l''attendaient. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Voici qu''arriva un homme du nom de Jaïrus; il était chef de la synagogue. Il se jeta à ses pieds et le supplia d''entrer dans sa maison, '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: parce qu'il avait une fille unique d'environ 12 ans qui était mourante. Pendant que Jésus s'y rendait, la foule le serrait de tous côtés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Or il y avait une femme qui souffrait d''hémorragies depuis 12 ans; elle avait dépensé tout son bien chez les médecins, mais aucun n''avait pu la guérir. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Elle s''approcha par-derrière et toucha le bord du vêtement de Jésus. Son hémorragie s''arrêta immédiatement. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Jésus dit: «Qui m''a touché?» Comme tous s''en défendaient, Pierre et ceux qui étaient avec lui dirent: «Maître, la foule t''entoure et te presse, [et tu dis: ‘Qui m''a touché?’]» '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Mais Jésus répondit: «Quelqu''un m''a touché, car j''ai senti qu''une force était sortie de moi.» '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Voyant qu''elle n''était pas passée inaperçue, la femme vint toute tremblante se jeter à ses pieds; elle déclara devant tout le peuple pourquoi elle l''avait touché et comment elle avait été immédiatement guérie. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Alors il lui dit: «Ma fille, [prends courage,] ta foi t''a sauvée. Pars dans la paix!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Jésus parlait encore quand quelqu''un arriva de chez le chef de la synagogue et [lui] dit: «Ta fille est morte, ne dérange plus le maître.» '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Mais Jésus, qui avait entendu, dit au chef de la synagogue: «N''aie pas peur, crois seulement, et elle sera sauvée.» '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Lorsqu''il fut arrivé à la maison, il ne laissa personne entrer [avec lui], sauf Pierre, Jean et Jacques, ainsi que le père et la mère de l''enfant. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Tous pleuraient et se lamentaient sur elle. Alors Jésus dit: «Ne pleurez pas, [car] elle n''est pas morte, mais elle dort.» '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Ils se moquaient de lui, sachant qu''elle était morte. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Mais il [les fit tous sortir,] prit la jeune fille par la main et dit d''une voix forte: «Mon enfant, lève-toi.» '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Son esprit revint en elle et elle se leva immédiatement; Jésus ordonna de lui donner à manger. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Les parents de la jeune fille furent remplis d'étonnement; il leur recommanda de ne dire à personne ce qui était arrivé.
