document_id: ROM.16,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutations
  - type: text
    content: 'Je vous recommande notre sœur Phœbé, qui est diaconesse de l''Eglise de Cenchrées. '
  '10':
  - type: text
    content: 'Saluez Apellès, qui a fait ses preuves en Christ. Saluez ceux de l''entourage d''Aristobule. '
  '11':
  - type: text
    content: 'Saluez Hérodion, mon compatriote. Saluez ceux de l''entourage de Narcisse qui appartiennent au Seigneur. '
  '12':
  - type: text
    content: 'Saluez Tryphène et Tryphose, elles qui travaillent pour le Seigneur. Saluez la bien-aimée Perside, qui a beaucoup travaillé pour le Seigneur. '
  '13':
  - type: text
    content: 'Saluez Rufus, celui qui a été choisi dans le Seigneur, et sa mère, qui est aussi la mienne. '
  '14':
  - type: text
    content: 'Saluez Asyncrite, Phlégon, Hermès, Patrobas, Hermas et les frères et sœurs qui sont avec eux. '
  '15':
  - type: text
    content: 'Saluez Philologue et Julie, Nérée et sa sœur, ainsi qu''Olympe et tous les saints qui sont avec eux. '
  '16':
  - type: text
    content: Saluez-vous les uns les autres par un saint baiser. [Toutes] les Eglises de Christ vous saluent.
  '17':
  - type: text
    content: 'Je vous en supplie, frères et sœurs, méfiez-vous de ceux qui provoquent des divisions et font trébucher les autres en s''opposant à l''enseignement que vous avez reçu. Eloignez-vous d''eux, '
  '18':
  - type: text
    content: 'car de tels hommes ne servent pas Christ notre Seigneur, mais leur propre ventre. Par des paroles douces et flatteuses, ils trompent le cœur des gens simples. '
  '19':
  - type: text
    content: 'Quant à vous, votre obéissance est connue de tous. Je me réjouis donc à votre sujet et je désire que vous soyez sages en ce qui concerne le bien et sans compromis en ce qui concerne le mal. '
  '2':
  - type: text
    content: Accueillez-la dans le Seigneur d'une manière digne des saints et aidez-la pour toute affaire où elle pourrait avoir besoin de vous, car elle en a aidé beaucoup, moi y compris.
  '20':
  - type: text
    content: Le Dieu de la paix écrasera bientôt Satan sous vos pieds. Que la grâce de notre Seigneur Jésus[-Christ] soit avec vous!
  '21':
  - type: text
    content: 'Timothée, mon collaborateur, vous salue, ainsi que Lucius, Jason et Sosipater, mes compatriotes. '
  '22':
  - type: text
    content: 'Je vous salue dans le Seigneur, moi Tertius, qui ai écrit cette lettre. '
  '23':
  - type: text
    content: 'Gaïus, qui m''accueille et chez qui toute l''Eglise se réunit, vous salue. Eraste, le trésorier de la ville, vous salue, ainsi que le frère Quartus. '
  '24':
  - type: text
    content: '[Que la grâce de notre Seigneur Jésus-Christ soit avec vous tous! Amen!]'
  '25':
  - type: text
    content: 'Dieu peut vous affermir selon l''Evangile que j''annonce, la prédication de Jésus-Christ, conformément à la révélation du mystère qui a été tenu secret pendant des siècles. '
  '26':
  - type: text
    content: 'Ce mystère a maintenant été manifesté et porté à la connaissance de toutes les nations par les écrits des prophètes d''après l''ordre du Dieu éternel, afin qu''elles obéissent à la foi. '
  '27':
  - type: text
    content: A ce Dieu, seul sage, soit la gloire aux siècles des siècles, par Jésus-Christ! Amen!
  '3':
  - type: text
    content: 'Saluez Prisca et Aquilas, mes collaborateurs en Jésus-Christ. '
  '4':
  - type: text
    content: 'Ils ont risqué leur tête pour me sauver la vie. Je ne suis pas le seul à leur être reconnaissant, c''est aussi le cas de toutes les Eglises des non-Juifs. '
  '5':
  - type: text
    content: 'Saluez aussi l''Eglise qui est dans leur maison. Saluez Epaïnète, mon bien-aimé, qui a été le premier fruit pour Christ en Asie. '
  '6':
  - type: text
    content: 'Saluez Marie, qui a beaucoup travaillé pour vous. '
  '7':
  - type: text
    content: 'Saluez Andronicus et Junia, mes compatriotes et mes compagnons de détention; ils sont très estimés parmi les apôtres et ils se sont même convertis à Christ avant moi. '
  '8':
  - type: text
    content: 'Saluez Amplias, mon bien-aimé dans le Seigneur. '
  '9':
  - type: text
    content: 'Saluez Urbain, notre collaborateur en Christ, et mon bien-aimé Stachys. '
