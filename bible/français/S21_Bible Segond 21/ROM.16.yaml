document_id: ROM.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salutations
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Je vous recommande notre sœur Phœbé, qui est diaconesse de l''Eglise de Cenchrées. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Accueillez-la dans le Seigneur d'une manière digne des saints et aidez-la pour toute affaire où elle pourrait avoir besoin de vous, car elle en a aidé beaucoup, moi y compris.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Saluez Prisca et Aquilas, mes collaborateurs en Jésus-Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils ont risqué leur tête pour me sauver la vie. Je ne suis pas le seul à leur être reconnaissant, c''est aussi le cas de toutes les Eglises des non-Juifs. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Saluez aussi l''Eglise qui est dans leur maison. Saluez Epaïnète, mon bien-aimé, qui a été le premier fruit pour Christ en Asie. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Saluez Marie, qui a beaucoup travaillé pour vous. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Saluez Andronicus et Junia, mes compatriotes et mes compagnons de détention; ils sont très estimés parmi les apôtres et ils se sont même convertis à Christ avant moi. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Saluez Amplias, mon bien-aimé dans le Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Saluez Urbain, notre collaborateur en Christ, et mon bien-aimé Stachys. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Saluez Apellès, qui a fait ses preuves en Christ. Saluez ceux de l''entourage d''Aristobule. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Saluez Hérodion, mon compatriote. Saluez ceux de l''entourage de Narcisse qui appartiennent au Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Saluez Tryphène et Tryphose, elles qui travaillent pour le Seigneur. Saluez la bien-aimée Perside, qui a beaucoup travaillé pour le Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Saluez Rufus, celui qui a été choisi dans le Seigneur, et sa mère, qui est aussi la mienne. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Saluez Asyncrite, Phlégon, Hermès, Patrobas, Hermas et les frères et sœurs qui sont avec eux. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Saluez Philologue et Julie, Nérée et sa sœur, ainsi qu''Olympe et tous les saints qui sont avec eux. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Saluez-vous les uns les autres par un saint baiser. [Toutes] les Eglises de Christ vous saluent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Je vous en supplie, frères et sœurs, méfiez-vous de ceux qui provoquent des divisions et font trébucher les autres en s''opposant à l''enseignement que vous avez reçu. Eloignez-vous d''eux, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'car de tels hommes ne servent pas Christ notre Seigneur, mais leur propre ventre. Par des paroles douces et flatteuses, ils trompent le cœur des gens simples. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Quant à vous, votre obéissance est connue de tous. Je me réjouis donc à votre sujet et je désire que vous soyez sages en ce qui concerne le bien et sans compromis en ce qui concerne le mal. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Le Dieu de la paix écrasera bientôt Satan sous vos pieds. Que la grâce de notre Seigneur Jésus[-Christ] soit avec vous!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Timothée, mon collaborateur, vous salue, ainsi que Lucius, Jason et Sosipater, mes compatriotes. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Je vous salue dans le Seigneur, moi Tertius, qui ai écrit cette lettre. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Gaïus, qui m''accueille et chez qui toute l''Eglise se réunit, vous salue. Eraste, le trésorier de la ville, vous salue, ainsi que le frère Quartus. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '[Que la grâce de notre Seigneur Jésus-Christ soit avec vous tous! Amen!]'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dieu peut vous affermir selon l''Evangile que j''annonce, la prédication de Jésus-Christ, conformément à la révélation du mystère qui a été tenu secret pendant des siècles. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ce mystère a maintenant été manifesté et porté à la connaissance de toutes les nations par les écrits des prophètes d''après l''ordre du Dieu éternel, afin qu''elles obéissent à la foi. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: A ce Dieu, seul sage, soit la gloire aux siècles des siècles, par Jésus-Christ! Amen!
