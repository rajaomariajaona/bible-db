document_id: DEU.30,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Promesses et menaces
  - type: text
    content: '»Lorsque toutes ces choses t''arriveront, la bénédiction et la malédiction que je mets devant toi, si tu les prends à cœur au milieu de toutes les nations chez lesquelles l''Eternel, ton Dieu, t''aura chassé, '
  '10':
  - type: text
    content: lorsque tu obéiras à l'Eternel, ton Dieu, en respectant ses commandements et ses prescriptions écrits dans ce livre de la loi, lorsque tu reviendras à l'Eternel, ton Dieu, de tout ton cœur et de toute ton âme.
  '11':
  - type: text
    content: '»Le commandement que je te prescris aujourd''hui n''est certainement pas au-dessus de tes forces ni hors de ta portée. '
  '12':
  - type: text
    content: 'Il n''est pas dans le ciel pour que tu dises: ‘Qui montera pour nous au ciel et ira nous le chercher? Qui nous le fera entendre afin que nous le mettions en pratique?’ '
  '13':
  - type: text
    content: 'Il n''est pas de l''autre côté de la mer pour que tu dises: ‘Qui passera pour nous de l''autre côté de la mer et ira nous le chercher? Qui nous le fera entendre, afin que nous le mettions en pratique?’ '
  '14':
  - type: text
    content: '*C''est une parole, au contraire, qui est tout près de toi, dans ta bouche et dans ton cœur,'
  - type: note
    content: 'C''est une… cœur: cité en Romains 10.8.'
  - type: text
    content: ' afin que tu la mettes en pratique.'
  '15':
  - type: text
    content: '»Regarde! Je mets aujourd''hui devant toi la vie et le bien, ou la mort et le mal. '
  '16':
  - type: text
    content: 'En effet, je te prescris aujourd''hui d''aimer l''Eternel, ton Dieu, de marcher dans ses voies et de respecter ses commandements, ses prescriptions et ses règles afin de vivre et de te multiplier, afin que l''Eternel, ton Dieu, te bénisse dans le pays dont tu vas entrer en possession. '
  '17':
  - type: text
    content: 'Mais si ton cœur se détourne de lui, si tu ne lui obéis pas et si tu te laisses entraîner à te prosterner devant d''autres dieux et à les servir, '
  '18':
  - type: text
    content: 'je vous déclare aujourd''hui que vous périrez. Vous ne vivrez pas longtemps sur le territoire dont vous allez prendre possession une fois le Jourdain passé. '
  '19':
  - type: text
    content: 'J''en prends aujourd''hui à témoin contre vous le ciel et la terre: j''ai mis devant toi la vie et la mort, la bénédiction et la malédiction. Choisis la vie afin de vivre, toi et ta descendance, '
  '2':
  - type: text
    content: 'si tu reviens à l''Eternel, ton Dieu, et si tu lui obéis de tout ton cœur et de toute ton âme, ainsi que tes enfants, en te conformant à tout ce que je te prescris aujourd''hui, '
  '20':
  - type: text
    content: en aimant l'Eternel, ton Dieu, en lui obéissant et en t'attachant à lui. Oui, c'est de lui que dépendent ta vie et sa durée, et c'est ainsi que tu pourras rester dans le pays que l'Eternel a juré de donner à tes ancêtres Abraham, Isaac et Jacob.»
  '3':
  - type: text
    content: 'alors l''Eternel, ton Dieu, ramènera tes déportés et aura compassion de toi. Il te rassemblera encore du milieu de tous les peuples parmi lesquels il t''aura lui-même dispersé. '
  '4':
  - type: text
    content: 'Même si tu étais exilé à l''autre extrémité du ciel, l''Eternel, ton Dieu, te rassemblera de là, il ira te chercher jusque-là. '
  '5':
  - type: text
    content: 'L''Eternel, ton Dieu, te ramènera dans le pays que tes ancêtres possédaient et tu le posséderas. Il te fera du bien et te rendra plus nombreux que tes ancêtres. '
  '6':
  - type: text
    content: 'L''Eternel, ton Dieu, circoncira ton cœur et celui de ta descendance, et tu aimeras l''Eternel, ton Dieu, de tout ton cœur et de toute ton âme, afin de vivre. '
  '7':
  - type: text
    content: 'L''Eternel, ton Dieu, fera tomber toutes ces malédictions sur tes ennemis, sur ceux qui t''auront détesté et persécuté. '
  '8':
  - type: text
    content: 'Quant à toi, tu reviendras à l''Eternel, tu lui obéiras et tu mettras en pratique tous les commandements que je te prescris aujourd''hui. '
  '9':
  - type: text
    content: 'L''Eternel, ton Dieu, te comblera de biens en faisant prospérer tout le travail de tes mains, tes enfants, les portées de tes troupeaux et le produit de ton sol. En effet, l''Eternel prendra de nouveau plaisir à ton bonheur, tout comme il prenait plaisir à celui de tes ancêtres, '
