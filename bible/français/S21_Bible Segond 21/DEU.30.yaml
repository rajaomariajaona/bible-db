document_id: DEU.30,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Promesses et menaces
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Lorsque toutes ces choses t''arriveront, la bénédiction et la malédiction que je mets devant toi, si tu les prends à cœur au milieu de toutes les nations chez lesquelles l''Eternel, ton Dieu, t''aura chassé, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: lorsque tu obéiras à l'Eternel, ton Dieu, en respectant ses commandements et ses prescriptions écrits dans ce livre de la loi, lorsque tu reviendras à l'Eternel, ton Dieu, de tout ton cœur et de toute ton âme.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Le commandement que je te prescris aujourd''hui n''est certainement pas au-dessus de tes forces ni hors de ta portée. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il n''est pas dans le ciel pour que tu dises: ‘Qui montera pour nous au ciel et ira nous le chercher? Qui nous le fera entendre afin que nous le mettions en pratique?’ '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il n''est pas de l''autre côté de la mer pour que tu dises: ‘Qui passera pour nous de l''autre côté de la mer et ira nous le chercher? Qui nous le fera entendre, afin que nous le mettions en pratique?’ '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '*C''est une parole, au contraire, qui est tout près de toi, dans ta bouche et dans ton cœur,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '30.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'C''est une… cœur: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Romains 10.8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' afin que tu la mettes en pratique.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Regarde! Je mets aujourd''hui devant toi la vie et le bien, ou la mort et le mal. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, je te prescris aujourd''hui d''aimer l''Eternel, ton Dieu, de marcher dans ses voies et de respecter ses commandements, ses prescriptions et ses règles afin de vivre et de te multiplier, afin que l''Eternel, ton Dieu, te bénisse dans le pays dont tu vas entrer en possession. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si ton cœur se détourne de lui, si tu ne lui obéis pas et si tu te laisses entraîner à te prosterner devant d''autres dieux et à les servir, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'je vous déclare aujourd''hui que vous périrez. Vous ne vivrez pas longtemps sur le territoire dont vous allez prendre possession une fois le Jourdain passé. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''en prends aujourd''hui à témoin contre vous le ciel et la terre: j''ai mis devant toi la vie et la mort, la bénédiction et la malédiction. Choisis la vie afin de vivre, toi et ta descendance, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'si tu reviens à l''Eternel, ton Dieu, et si tu lui obéis de tout ton cœur et de toute ton âme, ainsi que tes enfants, en te conformant à tout ce que je te prescris aujourd''hui, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: en aimant l'Eternel, ton Dieu, en lui obéissant et en t'attachant à lui. Oui, c'est de lui que dépendent ta vie et sa durée, et c'est ainsi que tu pourras rester dans le pays que l'Eternel a juré de donner à tes ancêtres Abraham, Isaac et Jacob.»
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'alors l''Eternel, ton Dieu, ramènera tes déportés et aura compassion de toi. Il te rassemblera encore du milieu de tous les peuples parmi lesquels il t''aura lui-même dispersé. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Même si tu étais exilé à l''autre extrémité du ciel, l''Eternel, ton Dieu, te rassemblera de là, il ira te chercher jusque-là. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel, ton Dieu, te ramènera dans le pays que tes ancêtres possédaient et tu le posséderas. Il te fera du bien et te rendra plus nombreux que tes ancêtres. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel, ton Dieu, circoncira ton cœur et celui de ta descendance, et tu aimeras l''Eternel, ton Dieu, de tout ton cœur et de toute ton âme, afin de vivre. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel, ton Dieu, fera tomber toutes ces malédictions sur tes ennemis, sur ceux qui t''auront détesté et persécuté. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant à toi, tu reviendras à l''Eternel, tu lui obéiras et tu mettras en pratique tous les commandements que je te prescris aujourd''hui. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel, ton Dieu, te comblera de biens en faisant prospérer tout le travail de tes mains, tes enfants, les portées de tes troupeaux et le produit de ton sol. En effet, l''Eternel prendra de nouveau plaisir à ton bonheur, tout comme il prenait plaisir à celui de tes ancêtres, '
