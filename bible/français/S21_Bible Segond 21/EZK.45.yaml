document_id: EZK.45,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Territoire réservé à l'Eternel et au prince
  - type: text
    content: '»Lorsque diviserez le pays en parts d''héritage, vous en prélèverez une à titre de sainte contribution pour l''Eternel. Elle sera longue de 12 kilomètres et demi et large de 5. Elle sera sainte dans toute sa superficie. '
  '10':
  - type: text
    content: '»Ayez des balances justes, des mesures de solides justes et des mesures de liquides justes! '
  '11':
  - type: text
    content: 'La mesure pour les solides et la mesure pour les liquides auront la même capacité: le bath contiendra 22 litres, et l''épha 22 litres. Leur capacité sera réglée d''après le homer. '
  '12':
  - type: text
    content: La pièce étalon sera de 10 grammes. La mine vaudra chez vous 20 pièces étalons, plus 25 pièces étalons, plus 15 pièces étalons.
  '13':
  - type: text
    content: '»Voici la contribution que vous prélèverez: 4 litres pour 220 litres de blé et 4 litres pour 220 litres d''orge. '
  '14':
  - type: text
    content: 'Voici ce qui est prescrit pour l''huile, pour une mesure d''huile: un dixième de bath pour un cor, qui correspond à 220 litres, puisque 10 baths font un homer. '
  '15':
  - type: text
    content: 'Sur un troupeau de 200 brebis provenant d''une région fertile d''Israël, une brebis sera réservée pour l''offrande, l''holocauste et le sacrifice de communion afin de servir à leur expiation, déclare le Seigneur, l''Eternel. '
  '16':
  - type: text
    content: 'Toute la population du pays devra prélever cette contribution pour le prince d''Israël. '
  '17':
  - type: text
    content: Le prince sera chargé des holocaustes, des offrandes végétales et des offrandes liquides lors des célébrations, des débuts de mois, des sabbats, lors de toutes les fêtes de la communauté d'Israël. C'est lui qui présentera le sacrifice d'expiation, l'offrande, l'holocauste et le sacrifice de communion pour faire l'expiation en faveur de la communauté d'Israël.
  '18':
  - type: text
    content: '»Voici ce que dit le Seigneur, l''Eternel: Le premier jour du premier mois, tu prendras un jeune taureau sans défaut et tu purifieras le sanctuaire du péché. '
  '19':
  - type: text
    content: 'Le prêtre prendra du sang de la victime du sacrifice d''expiation, et il en mettra sur les montants des portes du temple, sur les quatre angles du socle de l''autel et sur les montants des portes du parvis intérieur. '
  '2':
  - type: text
    content: 'De cette part d''héritage, vous prendrez pour le lieu saint un carré de 250 mètres sur 250 mètres, et 25 mètres pour un espace libre tout autour. '
  '20':
  - type: text
    content: Tu feras de même le septième jour du mois pour toute personne qui a commis une faute sans le vouloir ou sans le savoir. Vous ferez ainsi l'expiation pour le temple.
  '21':
  - type: text
    content: »Le quatorzième jour du premier mois, vous aurez la Pâque
  - type: note
    content: 'La Pâque: une des principales fêtes juives, qui commémore la libération de l''esclavage des Israélites et leur départ d''Egypte à l''époque de Moïse (Exode 12).'
  - type: text
    content: '. La fête durera sept jours, durant lesquels on mangera des pains sans levain. '
  '22':
  - type: text
    content: 'Le prince offrira ce jour-là un taureau en sacrifice d''expiation pour lui et pour toute la population du pays. '
  '23':
  - type: text
    content: 'Pendant les sept jours de la fête, il offrira en holocauste à l''Eternel sept taureaux et sept béliers sans défaut, chacun des sept jours, ainsi que chaque jour un bouc en sacrifice d''expiation. '
  '24':
  - type: text
    content: Il fera aussi une offrande végétale de 22 litres pour chaque taureau et de 22 litres pour chaque bélier, avec 4 litres d'huile par offrande.
  '25':
  - type: text
    content: »Lors de la fête
  - type: note
    content: 'Lors de la fête: c''est-à-dire la fête des tentes ou fête des cabanes.'
  - type: text
    content: ' qui aura lieu le quinzième jour du septième mois, il offrira pendant sept jours les mêmes sacrifices d''expiation, les mêmes holocaustes et la même offrande végétale avec l''huile.'
  '3':
  - type: text
    content: 'Sur ce qui a été mesuré, tu mesureras un territoire de 12 kilomètres et demi de long et 5 de large. C''est là que se trouvera le sanctuaire, le lieu très saint. '
  '4':
  - type: text
    content: 'C''est la partie sainte du pays. Elle appartiendra aux prêtres qui font le service du sanctuaire, qui s''approchent de l''Eternel pour le servir. C''est là que seront leurs maisons, et cet endroit sera comme un sanctuaire pour le sanctuaire. '
  '5':
  - type: text
    content: Un territoire de 12 kilomètres et demi de long et 5 de large formera la propriété des Lévites, des serviteurs du temple, avec 20 logements.
  '6':
  - type: text
    content: »Comme propriété de la ville, vous définirez un territoire de 2 kilomètres et demi de large et 12 kilomètres et demi de long, à côté de la contribution sainte. Il sera pour toute la communauté d'Israël.
  '7':
  - type: text
    content: '»Pour le prince vous réserverez un espace des deux côtés de la contribution sainte et de la propriété de la ville, le long de la contribution sainte et le long de la propriété de la ville, du côté ouest vers l''ouest et du côté est vers l''est, sur une longueur correspondant à l''une des parts, depuis la frontière ouest jusqu''à la frontière est. '
  '8':
  - type: text
    content: Ce sera sa terre, sa propriété en Israël. Ainsi mes princes n'opprimeront plus mon peuple, mais ils laisseront le pays à la communauté d'Israël, d'après ses tribus.
  - type: heading
    content: Prescriptions sur les sacrifices
  '9':
  - type: text
    content: '»Voici ce que dit le Seigneur, l''Eternel: En voilà assez, princes d''Israël! Renoncez à la violence et à l''oppression, appliquez le droit et la justice, mettez fin à vos exactions envers mon peuple, déclare le Seigneur, l''Eternel.'
