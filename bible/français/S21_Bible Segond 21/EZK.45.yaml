document_id: EZK.45
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Territoire réservé à l'Eternel et au prince
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Lorsque diviserez le pays en parts d''héritage, vous en prélèverez une à titre de sainte contribution pour l''Eternel. Elle sera longue de 12 kilomètres et demi et large de 5. Elle sera sainte dans toute sa superficie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'De cette part d''héritage, vous prendrez pour le lieu saint un carré de 250 mètres sur 250 mètres, et 25 mètres pour un espace libre tout autour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Sur ce qui a été mesuré, tu mesureras un territoire de 12 kilomètres et demi de long et 5 de large. C''est là que se trouvera le sanctuaire, le lieu très saint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'C''est la partie sainte du pays. Elle appartiendra aux prêtres qui font le service du sanctuaire, qui s''approchent de l''Eternel pour le servir. C''est là que seront leurs maisons, et cet endroit sera comme un sanctuaire pour le sanctuaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Un territoire de 12 kilomètres et demi de long et 5 de large formera la propriété des Lévites, des serviteurs du temple, avec 20 logements.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: »Comme propriété de la ville, vous définirez un territoire de 2 kilomètres et demi de large et 12 kilomètres et demi de long, à côté de la contribution sainte. Il sera pour toute la communauté d'Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '»Pour le prince vous réserverez un espace des deux côtés de la contribution sainte et de la propriété de la ville, le long de la contribution sainte et le long de la propriété de la ville, du côté ouest vers l''ouest et du côté est vers l''est, sur une longueur correspondant à l''une des parts, depuis la frontière ouest jusqu''à la frontière est. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ce sera sa terre, sa propriété en Israël. Ainsi mes princes n'opprimeront plus mon peuple, mais ils laisseront le pays à la communauté d'Israël, d'après ses tribus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prescriptions sur les sacrifices
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '»Voici ce que dit le Seigneur, l''Eternel: En voilà assez, princes d''Israël! Renoncez à la violence et à l''oppression, appliquez le droit et la justice, mettez fin à vos exactions envers mon peuple, déclare le Seigneur, l''Eternel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '»Ayez des balances justes, des mesures de solides justes et des mesures de liquides justes! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'La mesure pour les solides et la mesure pour les liquides auront la même capacité: le bath contiendra 22 litres, et l''épha 22 litres. Leur capacité sera réglée d''après le homer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: La pièce étalon sera de 10 grammes. La mine vaudra chez vous 20 pièces étalons, plus 25 pièces étalons, plus 15 pièces étalons.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '»Voici la contribution que vous prélèverez: 4 litres pour 220 litres de blé et 4 litres pour 220 litres d''orge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Voici ce qui est prescrit pour l''huile, pour une mesure d''huile: un dixième de bath pour un cor, qui correspond à 220 litres, puisque 10 baths font un homer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Sur un troupeau de 200 brebis provenant d''une région fertile d''Israël, une brebis sera réservée pour l''offrande, l''holocauste et le sacrifice de communion afin de servir à leur expiation, déclare le Seigneur, l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Toute la population du pays devra prélever cette contribution pour le prince d''Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Le prince sera chargé des holocaustes, des offrandes végétales et des offrandes liquides lors des célébrations, des débuts de mois, des sabbats, lors de toutes les fêtes de la communauté d'Israël. C'est lui qui présentera le sacrifice d'expiation, l'offrande, l'holocauste et le sacrifice de communion pour faire l'expiation en faveur de la communauté d'Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '»Voici ce que dit le Seigneur, l''Eternel: Le premier jour du premier mois, tu prendras un jeune taureau sans défaut et tu purifieras le sanctuaire du péché. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le prêtre prendra du sang de la victime du sacrifice d''expiation, et il en mettra sur les montants des portes du temple, sur les quatre angles du socle de l''autel et sur les montants des portes du parvis intérieur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tu feras de même le septième jour du mois pour toute personne qui a commis une faute sans le vouloir ou sans le savoir. Vous ferez ainsi l'expiation pour le temple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: »Le quatorzième jour du premier mois, vous aurez la Pâque
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La Pâque: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: une des principales fêtes juives, qui commémore la libération de l'esclavage des Israélites et leur départ d'Egypte à l'époque de Moïse (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 12
      metadata:
        usfm: EXO.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. La fête durera sept jours, durant lesquels on mangera des pains sans levain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le prince offrira ce jour-là un taureau en sacrifice d''expiation pour lui et pour toute la population du pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Pendant les sept jours de la fête, il offrira en holocauste à l''Eternel sept taureaux et sept béliers sans défaut, chacun des sept jours, ainsi que chaque jour un bouc en sacrifice d''expiation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Il fera aussi une offrande végétale de 22 litres pour chaque taureau et de 22 litres pour chaque bélier, avec 4 litres d'huile par offrande.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: »Lors de la fête
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Lors de la fête: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire la fête des tentes ou fête des cabanes.
    marker-yv: yv-n
  - type: text
    text: ' qui aura lieu le quinzième jour du septième mois, il offrira pendant sept jours les mêmes sacrifices d''expiation, les mêmes holocaustes et la même offrande végétale avec l''huile.'
