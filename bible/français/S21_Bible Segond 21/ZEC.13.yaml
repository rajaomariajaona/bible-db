document_id: ZEC.13,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ce jour-là, une source jaillira pour la famille de David et les habitants de Jérusalem, pour laver péché et souillure. '
  '2':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ce jour-là, déclare l'Eternel, le maître de l'univers, j'éliminerai du pays les noms des idoles, afin qu'on ne s'en souvienne plus. Je ferai aussi disparaître du pays les prophètes et l'esprit d'impureté.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Si quelqu''un prophétise encore, son père et sa mère, ceux qui lui ont donné naissance, lui diront: «Tu ne vivras pas, car tu dis des mensonges au nom de l''Eternel!» Son père et sa mère, les auteurs de ses jours, le transperceront quand il prophétisera.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ce jour-là, les prophètes rougiront chacun de leurs visions quand ils prophétiseront, et ils ne mettront plus un manteau de poil
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Manteau de poil: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: tenue du prophète Elie (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Rois 1.8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' pour tromper. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Chacun d''eux dira: «Je ne suis pas prophète, je suis cultivateur, quelqu''un m''a acheté dès ma jeunesse.» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Et si on lui demande: «D''où viennent ces blessures'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Blessures: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: certains prétendus prophètes se faisaient des incisions.
      marker-yv: yv-n
    - type: text
      text: ' que tu as aux mains?» il répondra: «C''est dans la maison de ceux qui m''aimaient que je les ai reçues.»'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Epée, réveille-toi contre mon berger et l'homme qui est mon compagnon, déclare l'Eternel, le maître de l'univers. *Frappe le berger et que les brebis soient dispersées
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Frappe… dispersées: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matthieu 26.31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Marc 14.2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.'
      marker-yv: yv-n
    - type: text
      text: ', et je porterai la main contre les faibles. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dans tout le pays, déclare l''Eternel, les deux tiers seront éliminés et mourront, mais l''autre tiers subsistera. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Je mettrai ce tiers dans le feu et je le purifierai comme on purifie l''argent, je l''éprouverai comme on éprouve l''or. Il fera appel à mon nom et moi, je lui répondrai; je dirai: «C''est mon peuple», et lui, il dira: «L''Eternel est mon Dieu.»'
