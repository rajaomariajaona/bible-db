document_id: 1KI.5,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Salomon dominait sur tous les royaumes situés entre l'Euphrate et le pays des Philistins, et jusqu'à la frontière de l'Egypte. Ils apportaient un tribut à Salomon et ils lui furent asservis durant toute sa vie.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'La sagesse de Salomon dépassait celle de tous les nomades de l''est et toute la sagesse des Egyptiens. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Il était plus sage que n''importe quel homme, plus sage qu''Ethan, l''Ezrachite, ou qu''Héman, Calcol et Darda, les fils de Machol, et son nom était connu parmi toutes les nations environnantes. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Il a prononcé 3000 sentences et composé 1005 cantiques. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Il a parlé des arbres, depuis le cèdre du Liban jusqu''à l''hysope qui sort de la muraille. Il a aussi parlé des animaux, des oiseaux, des reptiles et des poissons. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: De tous les peuples on venait pour écouter la sagesse de Salomon, de la part de tous les rois de la terre qui en avaient entendu parler.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Préparatifs pour la construction du temple
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Hiram, le roi de Tyr, envoya ses serviteurs vers Salomon, lorsqu'il apprit qu'on l'avait consacré par onction comme roi à la place de son père. En effet, il avait toujours aimé David.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Salomon fit dire à Hiram: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '«Tu sais que mon père David n''a pas pu construire de maison pour l''Eternel, son Dieu, à cause des guerres qu''on lui a livrées de tous les côtés jusqu''à ce que l''Eternel lui ait soumis ses ennemis. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Désormais, l''Eternel, mon Dieu, m''a donné du repos de tous les côtés: plus d''adversaires, plus de malheur qui menace! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'J''ai l''intention de construire une maison en l''honneur de l''Eternel, mon Dieu, comme l''Eternel l''a déclaré à mon père David: ‘Ton fils, celui que je mettrai à ta place sur ton trône, ce sera lui qui me construira une maison.’ '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Chaque jour Salomon consommait en vivres: 6600 litres de fleur de farine et 13''200 litres de farine, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ordonne maintenant que l'on coupe pour moi des cèdres du Liban. Mes serviteurs seront avec les tiens et je te paierai le salaire de tes serviteurs au prix que tu auras fixé. Tu le sais en effet, il n'y a personne chez nous qui sache couper aussi bien les arbres que les Sidoniens.»
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Lorsqu''il entendit les paroles de Salomon, Hiram fut tout réjoui et il dit: «Béni soit aujourd''hui l''Eternel, qui a donné à David un fils sage pour qu''il devienne le chef de ce grand peuple!» '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Et il fit répondre à Salomon: «J''ai bien entendu ce que tu m''as envoyé dire. Je vais faire tout ce que tu désires au sujet des cèdres et des cyprès. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Mes serviteurs les descendront des montagnes du Liban
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Liban: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: chaîne de montagnes neigeuses, dans l'actuel Liban, réputée pour ses forêts de cèdres.
      marker-yv: yv-n
    - type: text
      text: ' jusqu''à la mer et je les expédierai par mer, attachés en radeaux, jusqu''à l''endroit que tu m''indiqueras. Là, je les ferai détacher et tu pourras les prendre. Quant à toi, ce que je désire, c''est que tu fournisses des vivres pour ma maison.»'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Hiram donna à Salomon autant de bois de cèdre et de cyprès qu''il voulut. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: De son côté, Salomon donna à Hiram 4'400'000 litres de blé pour l'entretien de sa maison ainsi que 4400 litres d'huile d'olives vierge. Voilà ce que Salomon donna chaque année à Hiram.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: L'Eternel avait donné de la sagesse à Salomon, comme il le lui avait promis. La paix régna entre Hiram et lui, et ils firent alliance ensemble.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Le roi Salomon leva sur tout Israël 30''000 hommes de corvée. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Il les envoya au Liban, 10''000 par mois alternativement. Ils étaient un mois au Liban et deux mois chez eux. Adoniram était responsable de ces hommes. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Salomon disposait encore de 70''000 hommes pour porter les fardeaux et de 80''000 pour tailler les pierres dans la montagne, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 10 bœufs engraissés, 20 bœufs de pâturage et 100 brebis, en plus des cerfs, des gazelles, des daims et des volailles engraissées.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'sans compter les chefs. Ils étaient au nombre de 3300, désignés par Salomon comme responsables des travaux et chargés de surveiller les ouvriers. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Le roi ordonna d''extraire de grandes et magnifiques pierres de taille pour les fondations du temple. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Les ouvriers de Salomon, ceux de Hiram et les artisans de Guebal les taillèrent. Ils préparèrent ainsi le bois et les pierres nécessaires pour construire le temple.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Son pouvoir s''étendait sur toute la région située à l''ouest de l''Euphrate, sur tous les rois établis à l''ouest de l''Euphrate. Son pouvoir s''étendait de Thiphsach à Gaza, et il avait la paix de tous les côtés. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Juda et Israël, depuis Dan jusqu''à Beer-Shéba, habitèrent en sécurité, chacun au milieu de ses vignes et de ses figuiers durant tout le règne de Salomon. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Salomon avait 40'000 stalles pour les chevaux destinés à ses chars et 12'000 cavaliers.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Les intendants pourvoyaient à l''entretien du roi Salomon et de tous ceux qui étaient admis à sa table, chacun pendant le mois qui lui était attribué. Ils ne les laissaient manquer de rien. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ils faisaient aussi venir de l'orge et de la paille pour les chevaux et les coursiers à l'endroit où se trouvait le roi, chacun selon ses directives.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dieu donna à Salomon de la sagesse, une très grande intelligence et des connaissances aussi nombreuses que le sable qui est au bord de la mer. '
