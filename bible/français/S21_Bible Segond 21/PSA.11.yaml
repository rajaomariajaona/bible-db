document_id: PSA.11,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Confiance dans l'intervention de Dieu
  - type: text
    content: Au chef de chœur. De David.
  - type: text
    content: C'est en l'Eternel que je cherche un refuge.
  - type: text
    content: 'Comment pouvez-vous me dire:'
  - type: text
    content: «Fuis dans les montagnes comme un oiseau»?
  '2':
  - type: text
    content: Les méchants bandent leur arc,
  - type: text
    content: ils ajustent leur flèche sur la corde
  - type: text
    content: pour tirer dans l'ombre sur ceux dont le cœur est droit.
  '3':
  - type: text
    content: Quand les fondements sont renversés,
  - type: text
    content: que peut faire le juste?
  '4':
  - type: text
    content: L'Eternel est dans son saint temple,
  - type: text
    content: l'Eternel a son trône dans le ciel.
  - type: text
    content: Ses yeux regardent,
  - type: text
    content: il examine les hommes.
  '5':
  - type: text
    content: L'Eternel examine le juste;
  - type: text
    content: il déteste le méchant et celui qui aime la violence.
  '6':
  - type: text
    content: Il fait pleuvoir sur les méchants
  - type: text
    content: des charbons, du feu et du soufre.
  - type: text
    content: Un vent brûlant, tel est le lot qu'ils ont en partage,
  '7':
  - type: text
    content: car l'Eternel est juste, il aime la justice;
  - type: text
    content: les hommes droits contemplent son visage.
