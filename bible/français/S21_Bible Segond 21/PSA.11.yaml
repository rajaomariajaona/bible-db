document_id: PSA.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Confiance dans l'intervention de Dieu
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. De David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est en l'Eternel que je cherche un refuge.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Comment pouvez-vous me dire:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Fuis dans les montagnes comme un oiseau»?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Les méchants bandent leur arc,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ajustent leur flèche sur la corde
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour tirer dans l'ombre sur ceux dont le cœur est droit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Quand les fondements sont renversés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que peut faire le juste?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: L'Eternel est dans son saint temple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'Eternel a son trône dans le ciel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses yeux regardent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il examine les hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: L'Eternel examine le juste;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il déteste le méchant et celui qui aime la violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il fait pleuvoir sur les méchants
- type: usfm
  marker: q1
  children:
  - type: text
    text: des charbons, du feu et du soufre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un vent brûlant, tel est le lot qu'ils ont en partage,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: car l'Eternel est juste, il aime la justice;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les hommes droits contemplent son visage.
