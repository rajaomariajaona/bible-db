document_id: ACT.19
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Pendant qu''Apollos était à Corinthe, Paul arriva à Ephèse après avoir traversé les hautes provinces de l''Asie. Il rencontra quelques disciples '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'et leur dit: «Avez-vous reçu le Saint-Esprit lorsque vous avez cru?» Ils lui répondirent: «Nous n''avons même pas entendu parler d''un Saint-Esprit.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il demanda: «Quel baptême avez-vous donc reçu?» Ils répondirent: «Le baptême de Jean.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Alors Paul dit: «Jean a baptisé du baptême de repentance, en disant au peuple de croire en celui qui venait après lui, c''est-à-dire en Jésus [le Messie].» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Sur ces paroles, ils furent baptisés au nom du Seigneur Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Lorsque Paul posa les mains sur eux, le Saint-Esprit vint sur eux et ils se mirent à parler en langues et à prophétiser. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il y avait une douzaine d'hommes en tout.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ensuite Paul entra dans la synagogue où il parla avec assurance. Pendant 3 mois, il discuta de ce qui concerne le royaume de Dieu et il s''efforça de persuader ceux qui l''écoutaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Cependant, quelques-uns restaient endurcis et incrédules et disaient du mal de la voie du Seigneur devant la foule. Alors il les quitta, prit les disciples à part et enseigna chaque jour dans l''école d''un dénommé Tyrannus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Cela dura 2 ans, si bien que tous les habitants de l''Asie, juifs et non juifs, entendirent la parole du Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dieu faisait des miracles extraordinaires par l''intermédiaire de Paul, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: au point qu'on appliquait sur les malades des linges ou des mouchoirs qui avaient touché son corps; les maladies les quittaient et les esprits mauvais sortaient [d'eux].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quelques exorcistes juifs ambulants essayèrent de prononcer le nom du Seigneur Jésus sur ceux qui avaient des esprits mauvais; ils disaient: «Nous vous conjurons par le Jésus que Paul prêche!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ceux qui faisaient cela étaient sept fils de Scéva, un Juif chef des prêtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L''esprit mauvais leur répondit: «Je connais Jésus et je sais qui est Paul; mais vous, qui êtes-vous?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors l''homme qui avait l''esprit mauvais en lui se jeta sur eux, les maîtrisa tous et les maltraita de telle sorte qu''ils s''enfuirent de cette maison nus et blessés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Cela fut connu de tous les habitants d''Ephèse, juifs et non juifs; la crainte s''empara de tous et on célébrait la grandeur du nom du Seigneur Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Beaucoup de croyants venaient reconnaître publiquement ce qu''ils avaient fait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Un grand nombre de ceux qui avaient pratiqué la magie apportèrent leurs livres et les brûlèrent devant tout le monde. On en estima la valeur à 50''000 pièces d''argent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: C'est ainsi que la parole du Seigneur se propageait et gagnait en puissance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Après ces événements, Paul forma le projet d''aller à Jérusalem en traversant la Macédoine et l''Achaïe. «Quand j''y serai allé, disait-il, il faudra aussi que je me rende à Rome.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Il envoya en Macédoine deux de ses aides, Timothée et Eraste, et resta lui-même encore quelque temps en Asie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'A cette époque, il se produisit un grand trouble au sujet de la voie du Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'En effet, un orfèvre du nom de Démétrius fabriquait des temples d''Artémis en argent et procurait un gain considérable aux artisans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il les rassembla avec ceux qui exerçaient une activité similaire et dit: «Vous savez que notre prospérité dépend de cette industrie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Or, vous voyez et entendez dire que non seulement à Ephèse, mais dans presque toute l''Asie, ce Paul a persuadé et détourné une grande foule en disant que les dieux fabriqués par la main de l''homme ne sont pas des dieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Cela risque non seulement de discréditer notre activité, mais aussi de réduire à néant l'importance du temple de la grande déesse Artémis et même de dépouiller de sa majesté celle que toute l'Asie et le monde entier vénèrent.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'A ces mots, ils furent remplis de colère et se mirent à crier: «Grande est l''Artémis des Ephésiens!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Toute la ville fut dans l''agitation. Ils se précipitèrent tous ensemble au théâtre en entraînant avec eux Gaïus et Aristarque, des Macédoniens compagnons de voyage de Paul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Paul voulait se présenter devant le peuple, mais les disciples l''en empêchèrent, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: et même quelques Asiarques
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Asiarques: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: délégués nommés annuellement par plusieurs villes de la province d'Asie, ils étaient chargés de la surveillance des affaires religieuses et des jeux publics (notamment du culte impérial).
    marker-yv: yv-n
  - type: text
    text: ' qui étaient ses amis envoyèrent quelqu''un vers lui pour l''inviter à ne pas se rendre au théâtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Les uns criaient une chose, les autres une autre, car la confusion régnait dans l''assemblée et la plupart ne savaient pas pourquoi ils s''étaient réunis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Alors on fit sortir de la foule Alexandre, que les Juifs poussaient en avant, et Alexandre fit signe de la main qu''il voulait parler au peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Mais quand ils reconnurent qu''il était juif, tous crièrent d''une seule voix pendant près de deux heures: «Grande est l''Artémis des Ephésiens!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Cependant le secrétaire de la ville put calmer la foule: «Ephésiens, dit-il, quelle est la personne qui ignore que la ville d''Ephèse est la gardienne du temple de la grande [déesse] Artémis et de sa statue tombée du ciel? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'C''est un fait incontestable! Vous devez vous calmer et ne rien faire avec précipitation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'En effet, vous avez amené ces hommes ici alors qu''ils ne sont coupables ni de sacrilège ni de blasphème envers notre déesse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Si donc Démétrius et les artisans qui l''accompagnent ont à se plaindre de quelqu''un, il y a des jours d''audience et des gouverneurs: qu''ils portent plainte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Et si vous avez d''autres réclamations, cela se réglera dans une assemblée légale. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Nous risquons en effet d'être accusés de révolte pour ce qui s'est passé aujourd'hui, puisqu'il n'existe aucun motif qui nous permette de justifier cet attroupement.» Avec ces paroles, il congédia l'assemblée.
