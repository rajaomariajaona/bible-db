document_id: ACT.19,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Pendant qu''Apollos était à Corinthe, Paul arriva à Ephèse après avoir traversé les hautes provinces de l''Asie. Il rencontra quelques disciples '
  '10':
  - type: text
    content: 'Cela dura 2 ans, si bien que tous les habitants de l''Asie, juifs et non juifs, entendirent la parole du Seigneur. '
  '11':
  - type: text
    content: 'Dieu faisait des miracles extraordinaires par l''intermédiaire de Paul, '
  '12':
  - type: text
    content: au point qu'on appliquait sur les malades des linges ou des mouchoirs qui avaient touché son corps; les maladies les quittaient et les esprits mauvais sortaient [d'eux].
  '13':
  - type: text
    content: 'Quelques exorcistes juifs ambulants essayèrent de prononcer le nom du Seigneur Jésus sur ceux qui avaient des esprits mauvais; ils disaient: «Nous vous conjurons par le Jésus que Paul prêche!» '
  '14':
  - type: text
    content: 'Ceux qui faisaient cela étaient sept fils de Scéva, un Juif chef des prêtres. '
  '15':
  - type: text
    content: 'L''esprit mauvais leur répondit: «Je connais Jésus et je sais qui est Paul; mais vous, qui êtes-vous?» '
  '16':
  - type: text
    content: 'Alors l''homme qui avait l''esprit mauvais en lui se jeta sur eux, les maîtrisa tous et les maltraita de telle sorte qu''ils s''enfuirent de cette maison nus et blessés. '
  '17':
  - type: text
    content: 'Cela fut connu de tous les habitants d''Ephèse, juifs et non juifs; la crainte s''empara de tous et on célébrait la grandeur du nom du Seigneur Jésus. '
  '18':
  - type: text
    content: 'Beaucoup de croyants venaient reconnaître publiquement ce qu''ils avaient fait. '
  '19':
  - type: text
    content: 'Un grand nombre de ceux qui avaient pratiqué la magie apportèrent leurs livres et les brûlèrent devant tout le monde. On en estima la valeur à 50''000 pièces d''argent. '
  '2':
  - type: text
    content: 'et leur dit: «Avez-vous reçu le Saint-Esprit lorsque vous avez cru?» Ils lui répondirent: «Nous n''avons même pas entendu parler d''un Saint-Esprit.» '
  '20':
  - type: text
    content: C'est ainsi que la parole du Seigneur se propageait et gagnait en puissance.
  '21':
  - type: text
    content: 'Après ces événements, Paul forma le projet d''aller à Jérusalem en traversant la Macédoine et l''Achaïe. «Quand j''y serai allé, disait-il, il faudra aussi que je me rende à Rome.» '
  '22':
  - type: text
    content: Il envoya en Macédoine deux de ses aides, Timothée et Eraste, et resta lui-même encore quelque temps en Asie.
  '23':
  - type: text
    content: 'A cette époque, il se produisit un grand trouble au sujet de la voie du Seigneur. '
  '24':
  - type: text
    content: 'En effet, un orfèvre du nom de Démétrius fabriquait des temples d''Artémis en argent et procurait un gain considérable aux artisans. '
  '25':
  - type: text
    content: 'Il les rassembla avec ceux qui exerçaient une activité similaire et dit: «Vous savez que notre prospérité dépend de cette industrie. '
  '26':
  - type: text
    content: 'Or, vous voyez et entendez dire que non seulement à Ephèse, mais dans presque toute l''Asie, ce Paul a persuadé et détourné une grande foule en disant que les dieux fabriqués par la main de l''homme ne sont pas des dieux. '
  '27':
  - type: text
    content: Cela risque non seulement de discréditer notre activité, mais aussi de réduire à néant l'importance du temple de la grande déesse Artémis et même de dépouiller de sa majesté celle que toute l'Asie et le monde entier vénèrent.»
  '28':
  - type: text
    content: 'A ces mots, ils furent remplis de colère et se mirent à crier: «Grande est l''Artémis des Ephésiens!» '
  '29':
  - type: text
    content: 'Toute la ville fut dans l''agitation. Ils se précipitèrent tous ensemble au théâtre en entraînant avec eux Gaïus et Aristarque, des Macédoniens compagnons de voyage de Paul. '
  '3':
  - type: text
    content: 'Il demanda: «Quel baptême avez-vous donc reçu?» Ils répondirent: «Le baptême de Jean.» '
  '30':
  - type: text
    content: 'Paul voulait se présenter devant le peuple, mais les disciples l''en empêchèrent, '
  '31':
  - type: text
    content: et même quelques Asiarques
  - type: note
    content: 'Asiarques: délégués nommés annuellement par plusieurs villes de la province d''Asie, ils étaient chargés de la surveillance des affaires religieuses et des jeux publics (notamment du culte impérial).'
  - type: text
    content: ' qui étaient ses amis envoyèrent quelqu''un vers lui pour l''inviter à ne pas se rendre au théâtre. '
  '32':
  - type: text
    content: 'Les uns criaient une chose, les autres une autre, car la confusion régnait dans l''assemblée et la plupart ne savaient pas pourquoi ils s''étaient réunis. '
  '33':
  - type: text
    content: 'Alors on fit sortir de la foule Alexandre, que les Juifs poussaient en avant, et Alexandre fit signe de la main qu''il voulait parler au peuple. '
  '34':
  - type: text
    content: 'Mais quand ils reconnurent qu''il était juif, tous crièrent d''une seule voix pendant près de deux heures: «Grande est l''Artémis des Ephésiens!»'
  '35':
  - type: text
    content: 'Cependant le secrétaire de la ville put calmer la foule: «Ephésiens, dit-il, quelle est la personne qui ignore que la ville d''Ephèse est la gardienne du temple de la grande [déesse] Artémis et de sa statue tombée du ciel? '
  '36':
  - type: text
    content: 'C''est un fait incontestable! Vous devez vous calmer et ne rien faire avec précipitation. '
  '37':
  - type: text
    content: 'En effet, vous avez amené ces hommes ici alors qu''ils ne sont coupables ni de sacrilège ni de blasphème envers notre déesse. '
  '38':
  - type: text
    content: 'Si donc Démétrius et les artisans qui l''accompagnent ont à se plaindre de quelqu''un, il y a des jours d''audience et des gouverneurs: qu''ils portent plainte. '
  '39':
  - type: text
    content: 'Et si vous avez d''autres réclamations, cela se réglera dans une assemblée légale. '
  '4':
  - type: text
    content: 'Alors Paul dit: «Jean a baptisé du baptême de repentance, en disant au peuple de croire en celui qui venait après lui, c''est-à-dire en Jésus [le Messie].» '
  '40':
  - type: text
    content: Nous risquons en effet d'être accusés de révolte pour ce qui s'est passé aujourd'hui, puisqu'il n'existe aucun motif qui nous permette de justifier cet attroupement.» Avec ces paroles, il congédia l'assemblée.
  '5':
  - type: text
    content: 'Sur ces paroles, ils furent baptisés au nom du Seigneur Jésus. '
  '6':
  - type: text
    content: 'Lorsque Paul posa les mains sur eux, le Saint-Esprit vint sur eux et ils se mirent à parler en langues et à prophétiser. '
  '7':
  - type: text
    content: Il y avait une douzaine d'hommes en tout.
  '8':
  - type: text
    content: 'Ensuite Paul entra dans la synagogue où il parla avec assurance. Pendant 3 mois, il discuta de ce qui concerne le royaume de Dieu et il s''efforça de persuader ceux qui l''écoutaient. '
  '9':
  - type: text
    content: 'Cependant, quelques-uns restaient endurcis et incrédules et disaient du mal de la voie du Seigneur devant la foule. Alors il les quitta, prit les disciples à part et enseigna chaque jour dans l''école d''un dénommé Tyrannus. '
