document_id: ACT.17,152
type_code: fra
verses:
  '1':
  - type: heading
    content: L'Evangile à Thessalonique et à Bérée
  - type: text
    content: 'Paul et Silas passèrent par Amphipolis et Apollonie et arrivèrent à Thessalonique, où les Juifs avaient une synagogue. '
  '10':
  - type: text
    content: 'Aussitôt les frères firent partir de nuit Paul et Silas pour Bérée. Dès leur arrivée, ils entrèrent dans la synagogue des Juifs. '
  '11':
  - type: text
    content: 'Ces derniers avaient des sentiments plus nobles que ceux de Thessalonique. Ils accueillirent la parole avec beaucoup d''empressement, et ils examinaient chaque jour les Ecritures pour voir si ce qu''on leur disait était exact. '
  '12':
  - type: text
    content: 'Beaucoup d''entre eux crurent donc ainsi que, parmi les non-Juifs, un grand nombre de femmes en vue et d''hommes. '
  '13':
  - type: text
    content: 'Mais quand les Juifs de Thessalonique apprirent que Paul annonçait la parole de Dieu aussi à Bérée, ils y vinrent pour agiter [et troubler] la foule. '
  '14':
  - type: text
    content: Alors les frères firent aussitôt partir Paul du côté de la mer, tandis que Silas et Timothée restaient à Bérée.
  - type: heading
    content: L'Evangile à Athènes
  '15':
  - type: text
    content: Ceux qui accompagnaient Paul le conduisirent jusqu'à Athènes. Puis ils repartirent, chargés de transmettre à Silas et à Timothée l'ordre de le rejoindre au plus tôt.
  '16':
  - type: text
    content: 'Pendant que Paul les attendait à Athènes, son esprit était profondément indigné à la vue de cette ville pleine d''idoles. '
  '17':
  - type: text
    content: 'Il s''entretenait donc dans la synagogue avec les Juifs et les non-Juifs qui craignaient Dieu, et chaque jour sur la place publique avec ceux qu''il rencontrait. '
  '18':
  - type: text
    content: 'Quelques philosophes épicuriens et stoïciens se mirent à parler avec lui. Les uns disaient: «Que veut dire ce discoureur?» D''autres, parce qu''il annonçait Jésus et la résurrection, disaient: «Il semble qu''il annonce des divinités étrangères.» '
  '19':
  - type: text
    content: 'Alors ils l''attrapèrent et le conduisirent à l''Aréopage en disant: «Pourrions-nous savoir quel est ce nouvel enseignement que tu apportes? '
  '2':
  - type: text
    content: Paul y entra, conformément à son habitude. Pendant trois sabbats, il discuta avec eux à partir des Ecritures
  - type: note
    content: 'Ecritures: c''est-à-dire l''Ancien Testament; il était disponible en hébreu et dans sa traduction grecque.'
  - type: text
    content: ' '
  '20':
  - type: text
    content: 'En effet, tu nous fais entendre des choses étranges. Nous voudrions donc savoir ce que cela veut dire.» '
  '21':
  - type: text
    content: Or tous les Athéniens et les étrangers qui résidaient là ne passaient leur temps qu'à dire ou à écouter les dernières nouveautés.
  '22':
  - type: text
    content: 'Paul, debout au milieu de l''Aréopage, dit: «Athéniens, je vous trouve à tout point de vue extrêmement religieux. '
  '23':
  - type: text
    content: 'En effet, en parcourant votre ville et en examinant les objets de votre culte, j''ai même découvert un autel avec cette inscription: ‘A un dieu inconnu’! Celui que vous révérez sans le connaître, c''est celui que je vous annonce. '
  '24':
  - type: text
    content: 'Le Dieu qui a fait le monde et tout ce qui s''y trouve est le Seigneur du ciel et de la terre, et il n''habite pas dans des temples faits par la main de l''homme. '
  '25':
  - type: text
    content: 'Il n''est pas servi par des mains humaines, comme s''il avait besoin de quoi que ce soit, lui qui donne à tous la vie, le souffle et toute chose. '
  '26':
  - type: text
    content: 'Il a fait en sorte que tous les peuples, issus d''un seul homme, habitent sur toute la surface de la terre, et il a déterminé la durée des temps et les limites de leur lieu d''habitation. '
  '27':
  - type: text
    content: 'Il a voulu qu''ils cherchent le Seigneur et qu''ils s''efforcent de le trouver en tâtonnant, bien qu''il ne soit pas loin de chacun de nous. '
  '28':
  - type: text
    content: 'En effet, c''est en lui que nous avons la vie, le mouvement et l''être, comme l''ont aussi dit quelques-uns de vos poètes: ‘Nous sommes aussi de sa race.’ '
  '29':
  - type: text
    content: 'Ainsi donc, puisque nous sommes de la race de Dieu, nous ne devons pas croire que la divinité ressemble à de l''or, à de l''argent ou à de la pierre, sculptés par l''art et l''imagination de l''être humain. '
  '3':
  - type: text
    content: 'en expliquant et démontrant que le Messie devait souffrir et ressusciter. «Ce Jésus que je vous annonce, disait-il, c''est lui qui est le Messie.» '
  '30':
  - type: text
    content: 'Sans tenir compte des temps d''ignorance, Dieu annonce maintenant à tous les êtres humains, partout où ils se trouvent, qu''ils doivent changer d''attitude, '
  '31':
  - type: text
    content: parce qu'il a fixé un jour où il jugera le monde avec justice par l'homme qu'il a désigné. Il en a donné à tous une preuve certaine en le ressuscitant.»
  '32':
  - type: text
    content: 'Lorsqu''ils entendirent parler de résurrection des morts, les uns se moquèrent et les autres dirent: «Nous t''entendrons là-dessus une autre fois.» '
  '33':
  - type: text
    content: 'Ainsi Paul se retira du milieu d''eux. '
  '34':
  - type: text
    content: Quelques-uns cependant se joignirent à lui et crurent. Parmi eux figuraient Denys l'aréopagite, une femme du nom de Damaris et d'autres avec eux.
  '4':
  - type: text
    content: 'Quelques-uns d''entre eux furent convaincus et se joignirent à Paul et à Silas, ainsi qu''un grand nombre de non-Juifs qui craignaient Dieu et beaucoup de femmes importantes. '
  '5':
  - type: text
    content: 'Cependant, les Juifs restés incrédules prirent avec eux quelques vauriens qui traînaient sur les places, provoquèrent des attroupements et semèrent ainsi le trouble dans la ville. Puis ils se rendirent à la maison de Jason et cherchèrent Paul et Silas pour les amener vers le peuple. '
  '6':
  - type: text
    content: 'Ne les ayant pas trouvés, ils traînèrent Jason et quelques frères devant les magistrats de la ville en criant: «Ces gens qui ont bouleversé le monde sont aussi venus ici, '
  '7':
  - type: text
    content: 'et Jason les a accueillis. Ils agissent tous contre les édits de l''empereur en prétendant qu''il y a un autre roi, Jésus.» '
  '8':
  - type: text
    content: 'Par ces paroles ils troublèrent la foule et les magistrats, '
  '9':
  - type: text
    content: qui ne relâchèrent Jason et les autres qu'après avoir obtenu d'eux une caution.
