document_id: ROM.3,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Quel est donc l''avantage des Juifs ou quelle est l''utilité de la circoncision? '
  '10':
  - type: text
    content: 'comme cela est écrit: '
  - type: text
    content: Il n'y a pas de juste, pas même un seul;
  - type: text
    content: ' '
  '11':
  - type: text
    content: aucun n'est intelligent, aucun ne cherche Dieu;
  - type: text
    content: ' '
  '12':
  - type: text
    content: tous se sont détournés, ensemble ils se sont pervertis; il n'y en a aucun qui fasse le bien, pas même un seul;
  - type: text
    content: ' '
  '13':
  - type: text
    content: leur gosier est une tombe ouverte, ils se servent de leur langue pour tromper. Ils ont sur les lèvres un venin de vipère;
  - type: text
    content: ' '
  '14':
  - type: text
    content: leur bouche est pleine de malédiction et d'amertume.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Leurs pieds courent pour verser le sang,
  - type: text
    content: ' '
  '16':
  - type: text
    content: la destruction et le malheur marquent leur passage,
  - type: text
    content: ' '
  '17':
  - type: text
    content: ils ne connaissent pas le chemin de la paix.
  - type: text
    content: ' '
  '18':
  - type: text
    content: Il n'y a aucune crainte de Dieu devant leurs yeux.
  - type: note
    content: 'Il n''y a… yeux: citation combinant successivement Psaume 14.1-3 (= 53.2-4); 5.10; 140.4; 10.7; Esaïe 59.7-8; Psaume 36.2.'
  '19':
  - type: text
    content: 'Or nous savons que tout ce que dit la loi, c''est à ceux qui vivent sous la loi qu''elle le dit, afin que toute bouche soit fermée et que le monde entier soit reconnu coupable devant Dieu. '
  '2':
  - type: text
    content: 'Cet avantage est grand de toute manière. Tout d''abord, c''est à eux que les paroles révélées de Dieu ont été confiées. '
  '20':
  - type: text
    content: En effet, personne ne sera considéré comme juste devant lui sur la base des œuvres de la loi, puisque c'est par l'intermédiaire de la loi que vient la connaissance du péché.
  - type: heading
    content: Déclarés justes par la foi en Christ
  '21':
  - type: text
    content: 'Mais maintenant, la justice de Dieu dont témoignent la loi et les prophètes a été manifestée indépendamment de la loi: '
  '22':
  - type: text
    content: 'c''est la justice de Dieu par la foi en Jésus-Christ pour tous ceux qui croient. Il n''y a pas de différence: '
  '23':
  - type: text
    content: 'tous ont péché et sont privés de la gloire de Dieu, '
  '24':
  - type: text
    content: 'et ils sont gratuitement déclarés justes par sa grâce, par le moyen de la libération qui se trouve en Jésus-Christ. '
  '25':
  - type: text
    content: C'est lui que Dieu a destiné à être par son sang une victime expiatoire
  - type: note
    content: 'Victime expiatoire: victime offerte en sacrifice pour satisfaire les exigences de la justice divine.'
  - type: text
    content: ' pour ceux qui croiraient. Il démontre ainsi sa justice, puisqu''il avait laissé impunis les péchés commis auparavant, à l''époque de sa patience. '
  '26':
  - type: text
    content: Il la démontre dans le temps présent de manière à être juste tout en déclarant juste celui qui a la foi en Jésus.
  '27':
  - type: text
    content: 'Où est donc la raison de se montrer fier? Elle a été exclue. Par quelle loi? Par celle des œuvres? Non, par la loi de la foi. '
  '28':
  - type: text
    content: 'En effet, nous estimons que l''homme est déclaré juste par la foi, indépendamment des œuvres de la loi. '
  '29':
  - type: text
    content: 'Ou bien Dieu est-il seulement le Dieu des Juifs? N''est-il pas aussi celui des non-Juifs? Oui, il est aussi le Dieu des non-Juifs, '
  '3':
  - type: text
    content: 'Que dire si quelques-uns n''ont pas cru? Leur incrédulité annulera-t-elle la fidélité de Dieu? '
  '30':
  - type: text
    content: puisqu'il y a un seul Dieu, qui déclarera les circoncis justes sur la base de la foi et qui déclarera aussi les incirconcis justes au moyen de la foi.
  '31':
  - type: text
    content: Cela signifie-t-il donc que, par l'intermédiaire de la foi, nous annulions la loi? Certainement pas! Au contraire, nous confirmons la loi.
  '4':
  - type: text
    content: 'Certainement pas! Reconnaissons que Dieu est vrai et tout homme menteur, comme cela est écrit: '
  - type: text
    content: Ainsi tu as été trouvé juste dans tes paroles et tu triomphes dans ton jugement.
  - type: note
    content: 'Ainsi… jugement: citation du Psaume 51.6.'
  '5':
  - type: text
    content: 'Mais si notre injustice met en évidence la justice de Dieu, que dirons-nous? Dieu est-il injuste quand il déchaîne sa colère? – Je parle ici à la manière des hommes. – '
  '6':
  - type: text
    content: 'Certainement pas! Autrement, comment Dieu pourrait-il juger le monde? '
  '7':
  - type: text
    content: 'Et si mon mensonge fait d''autant plus éclater la vérité de Dieu pour sa gloire, pourquoi donc serais-je moi-même encore jugé comme pécheur? '
  '8':
  - type: text
    content: Et pourquoi ne ferions-nous pas le mal afin qu'il en résulte du bien? Quelques-uns, pour nous calomnier, prétendent que c'est ce que nous disons. La condamnation de ces gens est juste.
  '9':
  - type: text
    content: 'Que dire donc? Sommes-nous supérieurs aux autres? Pas du tout. En effet, nous avons déjà prouvé que Juifs et non-Juifs sont tous sous la domination du péché, '
