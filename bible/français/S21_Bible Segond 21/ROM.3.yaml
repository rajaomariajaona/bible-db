document_id: ROM.3
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Quel est donc l''avantage des Juifs ou quelle est l''utilité de la circoncision? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Cet avantage est grand de toute manière. Tout d''abord, c''est à eux que les paroles révélées de Dieu ont été confiées. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Que dire si quelques-uns n''ont pas cru? Leur incrédulité annulera-t-elle la fidélité de Dieu? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Certainement pas! Reconnaissons que Dieu est vrai et tout homme menteur, comme cela est écrit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Ainsi tu as été trouvé juste dans tes paroles et tu triomphes dans ton jugement.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ainsi… jugement: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 51.6
      metadata:
        usfm: PSA.51.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais si notre injustice met en évidence la justice de Dieu, que dirons-nous? Dieu est-il injuste quand il déchaîne sa colère? – Je parle ici à la manière des hommes. – '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Certainement pas! Autrement, comment Dieu pourrait-il juger le monde? '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et si mon mensonge fait d''autant plus éclater la vérité de Dieu pour sa gloire, pourquoi donc serais-je moi-même encore jugé comme pécheur? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Et pourquoi ne ferions-nous pas le mal afin qu'il en résulte du bien? Quelques-uns, pour nous calomnier, prétendent que c'est ce que nous disons. La condamnation de ces gens est juste.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Que dire donc? Sommes-nous supérieurs aux autres? Pas du tout. En effet, nous avons déjà prouvé que Juifs et non-Juifs sont tous sous la domination du péché, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'comme cela est écrit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Il n'y a pas de juste, pas même un seul;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: aucun n'est intelligent, aucun ne cherche Dieu;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: tous se sont détournés, ensemble ils se sont pervertis; il n'y en a aucun qui fasse le bien, pas même un seul;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: leur gosier est une tombe ouverte, ils se servent de leur langue pour tromper. Ils ont sur les lèvres un venin de vipère;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: leur bouche est pleine de malédiction et d'amertume.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Leurs pieds courent pour verser le sang,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: la destruction et le malheur marquent leur passage,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ils ne connaissent pas le chemin de la paix.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Il n'y a aucune crainte de Dieu devant leurs yeux.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10-18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il n''y a… yeux: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation combinant successivement '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 14.1-3
      metadata:
        usfm: PSA.14.1+PSA.14.2+PSA.14.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (= 53.2-4); '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '5.10'
      metadata:
        usfm: ROM.5.10
    - type: text
      text: '; 140.4; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10.7'
      metadata:
        usfm: ROM.10.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 59.7-8
      metadata:
        usfm: ISA.59.7+ISA.59.8
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 36.2
      metadata:
        usfm: PSA.36.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Or nous savons que tout ce que dit la loi, c''est à ceux qui vivent sous la loi qu''elle le dit, afin que toute bouche soit fermée et que le monde entier soit reconnu coupable devant Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: En effet, personne ne sera considéré comme juste devant lui sur la base des œuvres de la loi, puisque c'est par l'intermédiaire de la loi que vient la connaissance du péché.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Déclarés justes par la foi en Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais maintenant, la justice de Dieu dont témoignent la loi et les prophètes a été manifestée indépendamment de la loi: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'c''est la justice de Dieu par la foi en Jésus-Christ pour tous ceux qui croient. Il n''y a pas de différence: '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'tous ont péché et sont privés de la gloire de Dieu, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'et ils sont gratuitement déclarés justes par sa grâce, par le moyen de la libération qui se trouve en Jésus-Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: C'est lui que Dieu a destiné à être par son sang une victime expiatoire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Victime expiatoire: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: victime offerte en sacrifice pour satisfaire les exigences de la justice divine.
    marker-yv: yv-n
  - type: text
    text: ' pour ceux qui croiraient. Il démontre ainsi sa justice, puisqu''il avait laissé impunis les péchés commis auparavant, à l''époque de sa patience. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Il la démontre dans le temps présent de manière à être juste tout en déclarant juste celui qui a la foi en Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Où est donc la raison de se montrer fier? Elle a été exclue. Par quelle loi? Par celle des œuvres? Non, par la loi de la foi. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'En effet, nous estimons que l''homme est déclaré juste par la foi, indépendamment des œuvres de la loi. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ou bien Dieu est-il seulement le Dieu des Juifs? N''est-il pas aussi celui des non-Juifs? Oui, il est aussi le Dieu des non-Juifs, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: puisqu'il y a un seul Dieu, qui déclarera les circoncis justes sur la base de la foi et qui déclarera aussi les incirconcis justes au moyen de la foi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Cela signifie-t-il donc que, par l'intermédiaire de la foi, nous annulions la loi? Certainement pas! Au contraire, nous confirmons la loi.
