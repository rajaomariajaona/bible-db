document_id: 2CH.12,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Invasion de Juda
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Lorsque Roboam eut affermi sa royauté et qu'il fut devenu plus fort, il abandonna la loi de l'Eternel et tout Israël l'abandonna avec lui.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Le roi Roboam fabriqua à leur place des boucliers en bronze et il en confia la responsabilité aux chefs des gardes qui surveillaient l''entrée du palais. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Chaque fois que le roi se rendait à la maison de l'Eternel, les gardes venaient et les portaient. Puis ils les rapportaient dans la salle des gardes.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Comme Roboam s'était humilié, l'Eternel détourna sa colère de lui et ne le détruisit pas entièrement. De plus, il y avait encore de bonnes choses en Juda.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Le roi Roboam s''affermit dans Jérusalem et y régna. Il avait 41 ans lorsqu''il devint roi et il régna 17 ans à Jérusalem, la ville que l''Eternel avait choisie parmi toutes les tribus d''Israël pour y établir son nom. Sa mère s''appelait Naama et c''était une Ammonite. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Il fit le mal parce qu'il n'appliqua pas son cœur à chercher l'Eternel.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Les actes de Roboam, des premiers aux derniers, sont décrits dans les annales de Shemaeja, le prophète, et d'Iddo, le voyant, parmi les registres généalogiques. Il y eut toujours guerre entre Roboam et Jéroboam.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Roboam se coucha avec ses ancêtres et il fut enterré dans la ville de David. Son fils Abija devint roi à sa place.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'La cinquième année du règne de Roboam, Shishak, le roi d''Egypte, monta contre Jérusalem, parce qu''ils avaient fait preuve d''infidélité envers l''Eternel. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Il disposait de 1200 chars et 60''000 cavaliers, et avec lui vint d''Egypte une armée innombrable composée de Libyens, de Sukkiens et d''Ethiopiens. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Il s'empara des villes fortifiées qui appartenaient à Juda et arriva jusqu'à Jérusalem.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Alors le prophète Shemaeja alla trouver Roboam et les chefs de Juda, qui s''étaient tous retirés dans Jérusalem à l''approche de Shishak, et il leur annonça: «Voici ce que dit l''Eternel: Vous m''avez abandonné. Je vous abandonne moi aussi et je vous livre entre les mains de Shishak.» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Les chefs d''Israël et le roi s''humilièrent et dirent: «L''Eternel est juste!» '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Quand l''Eternel vit qu''ils s''humiliaient, il adressa la parole à Shemaeja: «Puisqu''ils se sont humiliés, je ne les détruirai pas. Je ne tarderai pas à les secourir et ma colère ne se déversera pas contre Jérusalem par l''intermédiaire de Shishak. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Cependant, ils lui seront asservis et ils sauront quelle différence cela fait de me servir ou de servir les royaumes des autres pays.»
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Shishak, roi d''Egypte, monta contre Jérusalem. Il prit les trésors de la maison de l''Eternel et ceux du palais royal, il prit tout. Il prit les boucliers en or que Salomon avait faits. '
