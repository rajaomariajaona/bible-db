document_id: NUM.15,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règles relatives aux sacrifices
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L''Eternel dit à Moïse: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'et tu feras une offrande de 2 litres de vin: c''est un sacrifice passé par le feu, dont l''odeur est agréable à l''Eternel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'On agira ainsi pour chaque bœuf, pour chaque bélier, pour chaque petit des brebis ou des chèvres. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Quel que soit le nombre des victimes, voilà comment vous agirez pour chacune en fonction de leur nombre.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '»C''est ainsi que tout Israélite agira lorsqu''il offrira un sacrifice passé par le feu dont l''odeur est agréable à l''Eternel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Si un étranger en séjour chez vous de façon temporaire ou depuis plusieurs générations offre un sacrifice passé par le feu dont l''odeur est agréable à l''Eternel, il l''offrira de la même manière que vous. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Il y aura une seule prescription pour toute l''assemblée, pour vous et pour l''étranger en séjour parmi vous. Ce sera une prescription perpétuelle au fil des générations: devant l''Eternel, l''étranger sera traité comme vous. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Il y aura une seule loi et une seule règle pour vous et pour l'étranger en séjour parmi vous.»
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'L''Eternel dit à Moïse: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '«Transmets ces instructions aux Israélites: Quand vous serez arrivés dans le pays où je vous ferai entrer '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'et que vous mangerez du pain de ce pays, vous prélèverez une offrande pour l''Eternel. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '«Transmets ces instructions aux Israélites: Quand vous serez entrés dans le pays que je vous donne pour y établir votre demeure '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Vous présenterez à titre de prélèvement un gâteau tiré de votre première fournée. Vous le présenterez comme l''offrande qu''on prélève de l''aire de battage. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Vous prélèverez sur votre première fournée une offrande pour l'Eternel, au fil des générations.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '»Lorsque vous pécherez involontairement en ne respectant pas tous les commandements que l''Eternel a fait connaître à Moïse, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'tout ce qu''il vous a ordonné par l''intermédiaire de Moïse depuis le jour où il a donné des commandements et plus tard au fil des générations, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'si l''on a péché involontairement, sans que l''assemblée s''en aperçoive, toute l''assemblée offrira un jeune taureau en holocauste dont l''odeur est agréable à l''Eternel, avec l''offrande végétale et l''offrande liquide qui l''accompagnent, conformément à la règle établie. Elle offrira encore un bouc en sacrifice d''expiation. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Le prêtre fera l''expiation pour toute l''assemblée des Israélites et le pardon leur sera accordé. En effet, ils ont péché involontairement et ils ont apporté leur offrande, un sacrifice passé par le feu en l''honneur de l''Eternel et une victime expiatoire devant l''Eternel, à cause de cette faute involontaire. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Le pardon sera accordé à toute l'assemblée des Israélites et à l'étranger en séjour parmi eux, car c'est involontairement que tout le peuple a péché.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: '»Si c''est une seule personne qui a péché involontairement, elle offrira une chèvre d''un an en sacrifice d''expiation. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Le prêtre fera l''expiation pour la personne qui a péché involontairement devant l''Eternel. Quand il aura fait l''expiation pour elle, le pardon lui sera accordé. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Que l''on soit israélite ou étranger, il y aura pour vous une même loi quand on péchera involontairement. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'et que vous offrirez à l''Eternel un sacrifice passé par le feu – soit un holocauste, soit un sacrifice en accomplissement d''un vœu ou en offrande volontaire, ou bien lors de vos fêtes, pour produire avec votre gros ou votre petit bétail une odeur agréable à l''Eternel – '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Mais si quelqu''un, qu''il soit israélite ou étranger, agit de manière délibérée, il insulte l''Eternel. Il sera exclu du milieu de son peuple. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Il a méprisé la parole de l''Eternel et il a violé son commandement: il sera exclu, il supportera les conséquences de sa faute.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Un viol du sabbat
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Alors que les Israélites étaient dans le désert, on surprit un homme en train de ramasser du bois le jour du sabbat. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ceux qui l''avaient surpris à faire cela l''amenèrent à Moïse, à Aaron et à toute l''assemblée. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'On le mit en prison car on n''avait pas reçu de directive sur ce qu''il fallait lui faire. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'L''Eternel dit à Moïse: «Cet homme sera puni de mort, toute l''assemblée le lapidera à l''extérieur du camp.» '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Toute l'assemblée le fit sortir du camp et le lapida, et il mourut, comme l'Eternel l'avait ordonné à Moïse.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La frange au bord des vêtements
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'L''Eternel dit à Moïse: '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: '«Parle aux Israélites, dis-leur de se faire, au fil des générations, une frange au bord de leurs vêtements et de mettre un cordon bleu sur cette frange qui borde leurs vêtements. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Quand vous aurez cette frange, vous la regarderez, vous vous souviendrez de tous les commandements de l''Eternel et les mettrez en pratique, et vous ne suivrez pas les désirs de votre cœur et de vos yeux en vous laissant entraîner par eux à l''infidélité. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'celui qui fera son offrande à l''Eternel présentera en offrande 2 litres de fleur de farine pétrie avec un litre d''huile. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Ainsi, vous vous souviendrez de mes commandements, vous les mettrez en pratique et vous serez saints pour votre Dieu. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Je suis l'Eternel, votre Dieu, qui vous ai fait sortir d'Egypte pour être votre Dieu. Je suis l'Eternel, votre Dieu.»
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Tu feras une offrande d''un litre de vin avec l''holocauste ou le sacrifice, pour chaque agneau. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Pour un bélier, tu présenteras en offrande 4 litres et demi de fleur de farine pétrie avec un litre et demi d''huile, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'et tu feras une offrande d''un litre et demi de vin, comme offrande dont l''odeur est agréable à l''Eternel. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Si tu offres un veau – soit comme holocauste, soit comme sacrifice en accomplissement d''un vœu, ou encore comme sacrifice de communion pour l''Eternel – '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'tu présenteras en offrande avec le veau 6 litres et demi de fleur de farine pétrie dans 2 litres d''huile, '
