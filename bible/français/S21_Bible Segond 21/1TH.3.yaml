document_id: 1TH.3,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'C''est pourquoi, n''y tenant plus, nous avons jugé bon de rester seuls à Athènes '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Nuit et jour, nous le prions avec beaucoup d''insistance de nous permettre de vous revoir et de compléter ce qui manque à votre foi. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Que Dieu lui-même, notre Père, et notre Seigneur Jésus[-Christ] dirigent notre parcours jusque chez vous! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Que le Seigneur fasse grandir et déborder l''amour que vous avez les uns pour les autres et pour tous les hommes, à l''exemple de celui que nous avons pour vous! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Qu'il affermisse ainsi votre cœur pour qu'il soit irréprochable dans la sainteté devant Dieu notre Père, lors du retour de notre Seigneur Jésus avec tous ses saints
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Saints: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: manière de désigner les chrétiens en tant que personnes consacrées à Dieu et appelées à avoir le comportement qui découle de leur appartenance à ce Dieu.
      marker-yv: yv-n
    - type: text
      text: '!'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'et vous avons envoyé notre frère Timothée, serviteur de Dieu [et notre collaborateur] dans l''Evangile de Christ, pour vous affermir et [vous] encourager dans votre foi, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'afin que personne ne soit ébranlé au milieu des difficultés présentes. En effet, vous le savez vous-mêmes, c''est à cela que nous sommes destinés. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'De fait, lorsque nous étions chez vous, nous vous annoncions d''avance que nous allions connaître la persécution, et c''est ce qui est arrivé, comme vous le savez. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Voilà pourquoi, n'y tenant plus, je l'ai envoyé pour m'informer de votre foi, dans la crainte que le tentateur ne vous ait tentés et que nous n'ayons travaillé pour rien.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Mais Timothée vient de nous arriver de chez vous, et il nous a donné de bonnes nouvelles de votre foi et de votre amour; il nous a dit que vous avez toujours de nous un bon souvenir et que vous désirez nous revoir autant que nous le désirons aussi. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'C''est pourquoi, frères et sœurs, dans nos angoisses et nos épreuves, nous avons été encouragés à votre sujet par votre foi. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'En effet, maintenant nous vivons, puisque vous tenez ferme dans le Seigneur. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Comment exprimer en retour toute notre reconnaissance à Dieu à votre sujet pour toute la joie que nous éprouvons à cause de vous devant notre Dieu? '
