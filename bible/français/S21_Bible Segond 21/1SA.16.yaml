document_id: 1SA.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Onction de David comme roi d'Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Samuel: «Quand cesseras-tu de pleurer sur Saül? Je l''ai rejeté afin qu''il ne règne plus sur Israël. Remplis ta corne d''huile et pars! Je t''envoie chez Isaï, le Bethléhémite, car j''ai vu parmi ses fils celui que je désire pour roi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Samuel dit: «Comment pourrais-je y aller? Saül l''apprendra et me tuera.» L''Eternel dit: «Tu prendras une génisse avec toi et tu diras: ‘Je viens pour offrir un sacrifice à l''Eternel.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tu inviteras Isaï au sacrifice. Je te préciserai ce que tu dois faire et tu désigneras par onction pour moi celui que je t'indiquerai.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Samuel fit ce que l''Eternel avait dit et se rendit à Bethléhem. Les anciens de la ville accoururent effrayés à sa rencontre et demandèrent: «Ton arrivée annonce-t-elle quelque chose d''heureux?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il répondit: «Oui, je viens pour offrir un sacrifice à l''Eternel. Consacrez-vous et venez avec moi au sacrifice.» Il fit aussi consacrer Isaï et ses fils et les invita au sacrifice.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Lorsqu''ils entrèrent, il se dit, en voyant Eliab: «Certainement, celui que l''Eternel désigne par onction est ici devant lui.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais l''Eternel dit à Samuel: «Ne prête pas attention à son apparence et à sa grande taille, car je l''ai rejeté. En effet, l''Eternel n''a pas le même regard que l''homme: l''homme regarde à ce qui frappe les yeux, mais l''Eternel regarde au cœur.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Isaï appela Abinadab et le fit passer devant Samuel. Samuel dit: «L''Eternel n''a pas non plus choisi celui-ci.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Isaï fit passer Shamma et Samuel dit: «L''Eternel n''a pas non plus choisi celui-ci.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Isaï fit passer sept de ses fils devant Samuel et Samuel dit à Isaï: «L''Eternel n''a choisi aucun d''eux.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Puis Samuel dit à Isaï: «Tous tes fils sont-ils là?» Il répondit: «Il reste encore le plus jeune, mais il garde les brebis.» Alors Samuel dit à Isaï: «Envoie quelqu''un le chercher, car nous ne prendrons pas place avant qu''il ne soit arrivé.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Isaï envoya quelqu''un le chercher. Il était roux, avec de beaux yeux et une belle apparence. L''Eternel dit à Samuel: «Lève-toi, verse de l''huile sur lui, car c''est lui!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Samuel prit la corne d'huile et le consacra par onction au milieu de ses frères. L'Esprit de l'Eternel vint sur David, à partir de ce jour et par la suite. Samuel se leva et partit à Rama.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'L''Esprit de l''Eternel se retira de Saül, et celui-ci fut tourmenté par un mauvais esprit envoyé par l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les serviteurs de Saül lui dirent: «Voici qu''un mauvais esprit envoyé par Dieu te tourmente. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Que notre seigneur parle! Tes serviteurs sont à ta disposition. Ils chercheront un homme qui sache jouer de la harpe. Quand le mauvais esprit envoyé par Dieu sera sur toi, il en jouera et tu seras soulagé.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Saül répondit à ses serviteurs: «Trouvez-moi donc un homme qui joue bien et amenez-le-moi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'L''un des serviteurs prit la parole et dit: «J''ai vu un fils d''Isaï, le Bethléhémite, qui sait jouer. C''est aussi un homme fort et vaillant, un guerrier. Il parle bien, a une belle apparence et l''Eternel est avec lui.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Saül envoya des messagers à Isaï pour lui dire: «Envoie-moi ton fils David, celui qui est avec les brebis.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Isaï prit un âne qu''il chargea de pain, d''une outre de vin et d''un chevreau, et il envoya tout cela à Saül par l''intermédiaire de son fils David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'David arriva vers Saül et se présenta devant lui. Il plut beaucoup à Saül et il fut désigné pour porter ses armes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Saül fit dire à Isaï: «Je t''en prie, laisse David à mon service, car il a trouvé grâce à mes yeux.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Lorsque le mauvais esprit envoyé par Dieu était sur Saül, David prenait la harpe et en jouait. Saül se calmait alors et se sentait mieux, et le mauvais esprit s'éloignait de lui.
