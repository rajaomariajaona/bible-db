document_id: MIC.7,152
type_code: fra
verses:
  '1':
  - type: text
    content: Malheur à moi, car je suis comme à la récolte des fruits,
  - type: text
    content: 'comme au grappillage après la vendange:'
  - type: text
    content: il n'y a pas de grappes à manger,
  - type: text
    content: pas une de ces figues précoces que je désire.
  '10':
  - type: text
    content: Mon ennemie le verra et sera couverte de honte,
  - type: text
    content: 'elle qui me disait: «Où est l''Eternel, ton Dieu?»'
  - type: text
    content: Mes yeux se réjouiront à sa vue;
  - type: text
    content: alors elle sera piétinée comme la boue des rues.
  '11':
  - type: text
    content: Le jour où l'on reconstruira tes murs,
  - type: text
    content: ce jour-là tes limites seront reculées.
  '12':
  - type: text
    content: Ce jour-là, on viendra vers toi
  - type: text
    content: de l'Assyrie et des villes d'Egypte,
  - type: text
    content: de l'Egypte jusqu'au fleuve,
  - type: text
    content: d'une mer à l'autre et d'une montagne à l'autre.
  '13':
  - type: text
    content: Le pays sera dévasté à cause de ses habitants,
  - type: text
    content: à cause du fruit de leurs agissements.
  '14':
  - type: text
    content: Conduis ton peuple avec ta houlette, le troupeau de ton héritage
  - type: text
    content: qui habite solitaire dans la forêt au milieu du Carmel;
  - type: text
    content: qu'ils broutent sur le Basan et en Galaad, comme autrefois!
  '15':
  - type: text
    content: Comme à l'époque où tu es sorti de l'Egypte,
  - type: text
    content: je te ferai voir des prodiges.
  '16':
  - type: text
    content: Les nations le verront et seront couvertes de honte,
  - type: text
    content: avec toute leur puissance;
  - type: text
    content: elles mettront la main sur la bouche,
  - type: text
    content: leurs oreilles seront assourdies.
  '17':
  - type: text
    content: Elles lécheront la poussière, comme le serpent,
  - type: text
    content: comme les reptiles de la terre;
  - type: text
    content: elles sortiront effrayées de leurs forteresses,
  - type: text
    content: elles trembleront devant l'Eternel, notre Dieu,
  - type: text
    content: elles te craindront.
  '18':
  - type: text
    content: Quel Dieu est semblable à toi?
  - type: text
    content: Tu pardonnes la faute, tu oublies la révolte
  - type: text
    content: du reste de ton héritage.
  - type: text
    content: Il ne garde pas sa colère à toujours,
  - type: text
    content: car il prend plaisir à la bonté.
  '19':
  - type: text
    content: Il aura encore compassion de nous, il piétinera nos fautes.
  - type: text
    content: Tu jetteras au fond de la mer tous leurs péchés.
  '2':
  - type: text
    content: L'homme de bien a disparu du pays,
  - type: text
    content: et il n'y a plus de juste parmi les hommes.
  - type: text
    content: Ils sont tous en embuscade pour verser le sang,
  - type: text
    content: chacun tend un piège à son frère.
  '20':
  - type: text
    content: Tu témoigneras de la fidélité à Jacob,
  - type: text
    content: de la bonté à Abraham,
  - type: text
    content: comme tu l'as juré à nos ancêtres autrefois.
  '3':
  - type: text
    content: Leurs mains sont habiles à faire le mal.
  - type: text
    content: Le prince a des exigences,
  - type: text
    content: le juge réclame un salaire,
  - type: text
    content: le grand exprime ses désirs,
  - type: text
    content: et ils font ainsi cause commune.
  '4':
  - type: text
    content: Le meilleur parmi eux est pareil à une ronce,
  - type: text
    content: le plus droit est pire qu'un buisson d'épines.
  - type: text
    content: Le jour annoncé par tes prophètes, le jour de ta punition approche.
  - type: text
    content: C'est alors qu'ils seront consternés.
  '5':
  - type: text
    content: Ne crois pas un ami,
  - type: text
    content: ne te fie pas à un intime;
  - type: text
    content: devant celle qui repose sur ta poitrine,
  - type: text
    content: garde-toi bien d'ouvrir la bouche,
  '6':
  - type: text
    content: car le fils méprise le père,
  - type: text
    content: la fille se soulève contre sa mère,
  - type: text
    content: la belle-fille contre sa belle-mère;
  - type: text
    content: '*chacun a pour ennemis les membres de sa famille'
  - type: note
    content: 'Chacun a… famille: cité par Jésus en Matthieu 10.36.'
  - type: text
    content: .
  - type: heading
    content: Espérance et promesses pour Israël
  '7':
  - type: text
    content: Mais moi, je regarderai vers l'Eternel,
  - type: text
    content: je mettrai mon espérance dans le Dieu de mon salut,
  - type: text
    content: mon Dieu m'exaucera.
  '8':
  - type: text
    content: Ne te réjouis pas à mon sujet, mon ennemie,
  - type: text
    content: car si je suis tombée, je me relèverai;
  - type: text
    content: si je suis assise dans les ténèbres,
  - type: text
    content: l'Eternel sera ma lumière.
  '9':
  - type: text
    content: Je supporterai la colère de l'Eternel,
  - type: text
    content: puisque j'ai péché contre lui,
  - type: text
    content: jusqu'à ce qu'il défende ma cause et me fasse droit.
  - type: text
    content: Il me conduira à la lumière,
  - type: text
    content: et je contemplerai sa justice.
