document_id: MIC.7,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malheur à moi, car je suis comme à la récolte des fruits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'comme au grappillage après la vendange:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n'y a pas de grappes à manger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pas une de ces figues précoces que je désire.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon ennemie le verra et sera couverte de honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'elle qui me disait: «Où est l''Eternel, ton Dieu?»'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes yeux se réjouiront à sa vue;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors elle sera piétinée comme la boue des rues.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le jour où l'on reconstruira tes murs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce jour-là tes limites seront reculées.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce jour-là, on viendra vers toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de l'Assyrie et des villes d'Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de l'Egypte jusqu'au fleuve,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d'une mer à l'autre et d'une montagne à l'autre.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le pays sera dévasté à cause de ses habitants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause du fruit de leurs agissements.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Conduis ton peuple avec ta houlette, le troupeau de ton héritage
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui habite solitaire dans la forêt au milieu du Carmel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'ils broutent sur le Basan et en Galaad, comme autrefois!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme à l'époque où tu es sorti de l'Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te ferai voir des prodiges.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les nations le verront et seront couvertes de honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec toute leur puissance;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles mettront la main sur la bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leurs oreilles seront assourdies.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles lécheront la poussière, comme le serpent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme les reptiles de la terre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles sortiront effrayées de leurs forteresses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles trembleront devant l'Eternel, notre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles te craindront.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quel Dieu est semblable à toi?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu pardonnes la faute, tu oublies la révolte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du reste de ton héritage.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne garde pas sa colère à toujours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il prend plaisir à la bonté.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il aura encore compassion de nous, il piétinera nos fautes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu jetteras au fond de la mer tous leurs péchés.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'homme de bien a disparu du pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il n'y a plus de juste parmi les hommes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont tous en embuscade pour verser le sang,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: chacun tend un piège à son frère.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu témoigneras de la fidélité à Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de la bonté à Abraham,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme tu l'as juré à nos ancêtres autrefois.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs mains sont habiles à faire le mal.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le prince a des exigences,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le juge réclame un salaire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le grand exprime ses désirs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils font ainsi cause commune.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le meilleur parmi eux est pareil à une ronce,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le plus droit est pire qu'un buisson d'épines.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le jour annoncé par tes prophètes, le jour de ta punition approche.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est alors qu'ils seront consternés.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne crois pas un ami,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne te fie pas à un intime;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: devant celle qui repose sur ta poitrine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: garde-toi bien d'ouvrir la bouche,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car le fils méprise le père,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la fille se soulève contre sa mère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la belle-fille contre sa belle-mère;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*chacun a pour ennemis les membres de sa famille'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Chacun a… famille: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité par Jésus en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matthieu 10.36
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Espérance et promesses pour Israël
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais moi, je regarderai vers l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je mettrai mon espérance dans le Dieu de mon salut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon Dieu m'exaucera.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne te réjouis pas à mon sujet, mon ennemie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car si je suis tombée, je me relèverai;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si je suis assise dans les ténèbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'Eternel sera ma lumière.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je supporterai la colère de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puisque j'ai péché contre lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu'à ce qu'il défende ma cause et me fasse droit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il me conduira à la lumière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je contemplerai sa justice.
