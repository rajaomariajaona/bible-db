document_id: PSA.26,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière de l'homme intègre
  - type: text
    content: De David.
  - type: text
    content: Rends-moi justice, Eternel, car je marche dans l'intégrité!
  - type: text
    content: 'Je me confie en l''Eternel: je ne faiblis pas.'
  '10':
  - type: text
    content: Leurs mains sont souillées de crimes,
  - type: text
    content: leur main droite est pleine de pots-de-vin,
  '11':
  - type: text
    content: mais moi, je marche dans l'intégrité.
  - type: text
    content: Délivre-moi et aie pitié de moi!
  '12':
  - type: text
    content: Mon pied tient ferme dans la droiture;
  - type: text
    content: je bénirai l'Eternel dans les assemblées.
  '2':
  - type: text
    content: Examine-moi, Eternel, mets-moi à l'épreuve,
  - type: text
    content: purifie au creuset mes reins et mon cœur,
  '3':
  - type: text
    content: car ta grâce est devant mes yeux,
  - type: text
    content: et je marche dans ta vérité.
  '4':
  - type: text
    content: Je ne m'assieds pas avec les hommes faux,
  - type: text
    content: je ne vais pas avec les hypocrites.
  '5':
  - type: text
    content: Je déteste l'assemblée de ceux qui font le mal,
  - type: text
    content: je ne m'assieds pas avec les méchants.
  '6':
  - type: text
    content: Je lave mes mains en signe d'innocence,
  - type: text
    content: et je fais le tour de ton autel, Eternel,
  '7':
  - type: text
    content: pour exprimer ma reconnaissance
  - type: text
    content: et raconter toutes tes merveilles.
  '8':
  - type: text
    content: Eternel, j'aime la maison où tu résides,
  - type: text
    content: le lieu où ta gloire habite.
  '9':
  - type: text
    content: N'entraîne pas mon âme dans la ruine des pécheurs,
  - type: text
    content: ni ma vie dans celle des hommes sanguinaires.
