document_id: PSA.26
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière de l'homme intègre
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: De David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rends-moi justice, Eternel, car je marche dans l'intégrité!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je me confie en l''Eternel: je ne faiblis pas.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Examine-moi, Eternel, mets-moi à l'épreuve,
- type: usfm
  marker: q1
  children:
  - type: text
    text: purifie au creuset mes reins et mon cœur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: car ta grâce est devant mes yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je marche dans ta vérité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je ne m'assieds pas avec les hommes faux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne vais pas avec les hypocrites.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je déteste l'assemblée de ceux qui font le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne m'assieds pas avec les méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Je lave mes mains en signe d'innocence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je fais le tour de ton autel, Eternel,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: pour exprimer ma reconnaissance
- type: usfm
  marker: q1
  children:
  - type: text
    text: et raconter toutes tes merveilles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Eternel, j'aime la maison où tu résides,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le lieu où ta gloire habite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: N'entraîne pas mon âme dans la ruine des pécheurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni ma vie dans celle des hommes sanguinaires.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Leurs mains sont souillées de crimes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leur main droite est pleine de pots-de-vin,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: mais moi, je marche dans l'intégrité.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Délivre-moi et aie pitié de moi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mon pied tient ferme dans la droiture;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je bénirai l'Eternel dans les assemblées.
