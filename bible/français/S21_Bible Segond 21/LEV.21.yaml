document_id: LEV.21,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règlements concernant les prêtres
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel dit à Moïse: «Transmets ces instructions aux prêtres, aux fils d''Aaron: Un prêtre ne se rendra pas impur parmi son peuple pour un mort, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Le prêtre qui a la supériorité sur ses frères, celui sur la tête duquel a été versée l''huile d''onction et qui a été établi dans ses fonctions et habillé des vêtements sacrés, ne défera pas sa chevelure et ne déchirera pas ses vêtements. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il ne s''approchera d''aucun mort, il ne se rendra pas impur, ni pour son père ni pour sa mère. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il ne sortira pas du sanctuaire et ne profanera pas le sanctuaire de son Dieu, car l'huile d'onction de son Dieu est une couronne sur lui. Je suis l'Eternel.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Il épousera une femme vierge. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il n''épousera ni une veuve, ni une femme rejetée par son mari, ni une femme déshonorée ou prostituée. Mais il épousera une femme vierge qui soit membre de son peuple. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi il ne déshonorera pas sa descendance parmi son peuple, car je suis l'Eternel qui le considère comme saint.»
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel dit à Moïse: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Transmets ces instructions à Aaron: Aucun de tes descendants qui, au fil des générations, aura un défaut corporel ne s''approchera pour offrir la nourriture de son Dieu. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aucun homme avec un défaut corporel ne pourra s''approcher, qu''il soit aveugle, boiteux, défiguré ou difforme, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'qu''il ait une fracture au pied ou à la main, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'excepté pour ses plus proches parents: sa mère, son père, son fils, son frère. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'qu''il soit bossu ou nain, qu''il ait une tache à l''œil, la gale, une dartre ou les testicules écrasés. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aucun homme de la tribu du prêtre Aaron avec un défaut corporel ne s''approchera pour offrir à l''Eternel les sacrifices passés par le feu. Il a un défaut corporel, il ne s''approchera pas pour offrir la nourriture de son Dieu. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il pourra manger la nourriture de son Dieu, des offrandes très saintes et saintes, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mais il n'ira pas vers le voile et ne s'approchera pas de l'autel, car il a un défaut corporel. Il ne profanera pas mes sanctuaires, car je suis l'Eternel qui les considère comme saints.»
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moïse transmit tout cela à Aaron et à ses fils, ainsi qu'à tous les Israélites.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour sa sœur encore vierge, qui lui est proche puisqu''elle n''est pas mariée, il peut aussi se rendre impur. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Chef parmi son peuple, il ne se rendra pas impur: il se profanerait.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Les prêtres ne se feront pas de tonsure sur la tête, ils ne raseront pas les coins de leur barbe et ne feront pas d''incisions sur leur corps. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils seront saints pour leur Dieu et ils ne déshonoreront pas son nom, car ils offrent à l''Eternel les sacrifices passés par le feu, la nourriture de leur Dieu; ils seront donc saints. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils n''épouseront pas une femme prostituée ou déshonorée, ni une femme rejetée par son mari, car ils sont saints pour leur Dieu. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu considéreras un prêtre comme saint, car il offre l''aliment de ton Dieu. Il sera saint pour toi, car je suis saint, moi, l''Eternel, qui vous considère comme saints. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si la fille d'un prêtre se déshonore en se prostituant, elle déshonore son père. Elle sera brûlée au feu.
