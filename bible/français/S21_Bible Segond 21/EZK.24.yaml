document_id: EZK.24,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Signes de la ruine de Jérusalem
  - type: text
    content: 'La neuvième année, le dixième jour du dixième mois, la parole de l''Eternel m''a été adressée: '
  '10':
  - type: text
    content: 'Entasse le bois, allume le feu, cuis bien la viande, assaisonne-la et que les os soient brûlés. '
  '11':
  - type: text
    content: 'Puis mets la marmite vide sur les braises afin qu''elle chauffe, que son métal rougisse, que son impureté fonde à l''intérieur et que sa rouille disparaisse. '
  '12':
  - type: text
    content: 'Les efforts ont été inutiles: la rouille dont elle est pleine ne se détache pas, même par le feu. '
  '13':
  - type: text
    content: 'Ton impureté est un crime, parce que j''ai voulu te purifier et que tu ne t''es pas laissé purifier. Tu ne seras plus purifiée de ton impureté jusqu''à ce que j''aie assouvi ma fureur contre toi. '
  '14':
  - type: text
    content: C'est moi, l'Eternel, qui ai parlé. Cela arrivera, je l'accomplirai. Je ne ferai preuve d'aucune négligence, je n'aurai aucune pitié, aucun regret. On te jugera en fonction de ta conduite et de tes agissements, déclare le Seigneur, l'Eternel.»
  '15':
  - type: text
    content: 'La parole de l''Eternel m''a été adressée: '
  '16':
  - type: text
    content: '«Fils de l''homme, je vais t''enlever par une mort soudaine ce qui fait les délices de tes yeux. Tu ne te lamenteras pas, tu ne pleureras pas et tes larmes ne couleront pas. '
  '17':
  - type: text
    content: Sanglote en silence, ne prends pas le deuil des morts, attache ton turban, mets tes sandales à tes pieds, ne te couvre pas la barbe et ne mange pas le pain des autres.»
  '18':
  - type: text
    content: 'J''ai parlé au peuple le matin, et ma femme est morte le soir. Le lendemain matin, je me suis comporté comme cela m''avait été ordonné. '
  '19':
  - type: text
    content: 'Le peuple m''a dit: «Ne nous expliqueras-tu pas ce que signifie ton comportement pour nous?»'
  '2':
  - type: text
    content: '«Fils de l''homme, mets par écrit la date de ce jour, de ce jour précisément! En effet, le roi de Babylone commence le siège de Jérusalem aujourd''hui même. '
  '20':
  - type: text
    content: 'Je leur ai répondu: «Voici la parole de l''Eternel qui m''a été adressée: '
  '21':
  - type: text
    content: '‘Annonce à la communauté d''Israël: Voici ce que dit le Seigneur, l''Eternel: Je vais profaner mon sanctuaire, lui qui fait l''orgueil de votre force, les délices de vos yeux et qui est l''objet de votre attachement. Puis vos fils et vos filles, ceux que vous avez laissés, tomberont par l''épée.’'
  '22':
  - type: text
    content: '»Vous vous comporterez alors comme je l''ai fait. Vous ne vous couvrirez pas la barbe, vous ne mangerez pas le pain des autres, '
  '23':
  - type: text
    content: 'vous garderez vos turbans sur la tête et vos chaussures aux pieds. Vous ne vous lamenterez pas et vous ne pleurerez pas, mais vous dépérirez à cause de vos fautes et vous vous plaindrez mutuellement. '
  '24':
  - type: text
    content: '‘Ezéchiel est un signe pour vous: vous vous comporterez exactement comme il l''a fait. Quand cela arrivera, vous reconnaîtrez que je suis le Seigneur, l''Eternel.’'
  '25':
  - type: text
    content: '»Quant à toi, fils de l''homme, le jour où je leur enlèverai ce qui fait leur sécurité, leur joie et leur splendeur, ce qui fait les délices de leurs yeux et est l''objet de leurs préoccupations – leurs fils et leurs filles – '
  '26':
  - type: text
    content: 'ce jour-là un rescapé viendra vers toi pour te l''annoncer. '
  '27':
  - type: text
    content: Ce jour-là, ta bouche s'ouvrira et tu parleras au rescapé, tu ne seras plus muet. Tu seras un signe pour eux et ils reconnaîtront que je suis l'Eternel.»
  '3':
  - type: text
    content: 'Propose une parabole à cette communauté de rebelles! Tu leur diras:'
  - type: text
    content: '»‘Voici ce que dit le Seigneur, l''Eternel:'
  - type: text
    content: Installe la marmite, installe-la et verses-y de l'eau.
  '4':
  - type: text
    content: Mets-y les morceaux de viande, tous les bons morceaux,
  - type: text
    content: la cuisse et l'épaule, remplis-la des meilleurs os!
  '5':
  - type: text
    content: Prends le meilleur mouton,
  - type: text
    content: entasse aussi des os sous la marmite!
  - type: text
    content: Fais bouillir à gros bouillons
  - type: text
    content: et que les os qui sont dedans cuisent aussi!’
  '6':
  - type: text
    content: '»En effet, voici ce que dit le Seigneur, l''Eternel: Malheur à la ville sanguinaire, marmite pleine de rouille et dont la rouille ne se détache pas! Tires-en les morceaux les uns après les autres, sans recourir au tirage au sort! '
  '7':
  - type: text
    content: 'Oui, le sang qu''elle a versé reste incrusté au milieu d''elle; c''est qu''elle l''a fait couler sur la roche nue, elle ne l''a pas versé sur la terre pour qu''il soit recouvert par la poussière. '
  '8':
  - type: text
    content: Pour faire éclater ma fureur, pour me venger, j'ai laissé son sang sur la roche nue afin qu'il ne soit pas recouvert.
  '9':
  - type: text
    content: '»C''est pourquoi, voici ce que dit le Seigneur, l''Eternel: Malheur à la ville sanguinaire! Je vais moi-même faire un plus grand bûcher. '
