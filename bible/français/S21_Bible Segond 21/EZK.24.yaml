document_id: EZK.24
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Signes de la ruine de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La neuvième année, le dixième jour du dixième mois, la parole de l''Eternel m''a été adressée: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Fils de l''homme, mets par écrit la date de ce jour, de ce jour précisément! En effet, le roi de Babylone commence le siège de Jérusalem aujourd''hui même. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Propose une parabole à cette communauté de rebelles! Tu leur diras:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '»‘Voici ce que dit le Seigneur, l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Installe la marmite, installe-la et verses-y de l'eau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mets-y les morceaux de viande, tous les bons morceaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la cuisse et l'épaule, remplis-la des meilleurs os!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Prends le meilleur mouton,
- type: usfm
  marker: q1
  children:
  - type: text
    text: entasse aussi des os sous la marmite!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais bouillir à gros bouillons
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que les os qui sont dedans cuisent aussi!’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '»En effet, voici ce que dit le Seigneur, l''Eternel: Malheur à la ville sanguinaire, marmite pleine de rouille et dont la rouille ne se détache pas! Tires-en les morceaux les uns après les autres, sans recourir au tirage au sort! '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Oui, le sang qu''elle a versé reste incrusté au milieu d''elle; c''est qu''elle l''a fait couler sur la roche nue, elle ne l''a pas versé sur la terre pour qu''il soit recouvert par la poussière. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Pour faire éclater ma fureur, pour me venger, j'ai laissé son sang sur la roche nue afin qu'il ne soit pas recouvert.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '»C''est pourquoi, voici ce que dit le Seigneur, l''Eternel: Malheur à la ville sanguinaire! Je vais moi-même faire un plus grand bûcher. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Entasse le bois, allume le feu, cuis bien la viande, assaisonne-la et que les os soient brûlés. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Puis mets la marmite vide sur les braises afin qu''elle chauffe, que son métal rougisse, que son impureté fonde à l''intérieur et que sa rouille disparaisse. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les efforts ont été inutiles: la rouille dont elle est pleine ne se détache pas, même par le feu. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ton impureté est un crime, parce que j''ai voulu te purifier et que tu ne t''es pas laissé purifier. Tu ne seras plus purifiée de ton impureté jusqu''à ce que j''aie assouvi ma fureur contre toi. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: C'est moi, l'Eternel, qui ai parlé. Cela arrivera, je l'accomplirai. Je ne ferai preuve d'aucune négligence, je n'aurai aucune pitié, aucun regret. On te jugera en fonction de ta conduite et de tes agissements, déclare le Seigneur, l'Eternel.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'La parole de l''Eternel m''a été adressée: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '«Fils de l''homme, je vais t''enlever par une mort soudaine ce qui fait les délices de tes yeux. Tu ne te lamenteras pas, tu ne pleureras pas et tes larmes ne couleront pas. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Sanglote en silence, ne prends pas le deuil des morts, attache ton turban, mets tes sandales à tes pieds, ne te couvre pas la barbe et ne mange pas le pain des autres.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'J''ai parlé au peuple le matin, et ma femme est morte le soir. Le lendemain matin, je me suis comporté comme cela m''avait été ordonné. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le peuple m''a dit: «Ne nous expliqueras-tu pas ce que signifie ton comportement pour nous?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Je leur ai répondu: «Voici la parole de l''Eternel qui m''a été adressée: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '‘Annonce à la communauté d''Israël: Voici ce que dit le Seigneur, l''Eternel: Je vais profaner mon sanctuaire, lui qui fait l''orgueil de votre force, les délices de vos yeux et qui est l''objet de votre attachement. Puis vos fils et vos filles, ceux que vous avez laissés, tomberont par l''épée.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '»Vous vous comporterez alors comme je l''ai fait. Vous ne vous couvrirez pas la barbe, vous ne mangerez pas le pain des autres, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'vous garderez vos turbans sur la tête et vos chaussures aux pieds. Vous ne vous lamenterez pas et vous ne pleurerez pas, mais vous dépérirez à cause de vos fautes et vous vous plaindrez mutuellement. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '‘Ezéchiel est un signe pour vous: vous vous comporterez exactement comme il l''a fait. Quand cela arrivera, vous reconnaîtrez que je suis le Seigneur, l''Eternel.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '»Quant à toi, fils de l''homme, le jour où je leur enlèverai ce qui fait leur sécurité, leur joie et leur splendeur, ce qui fait les délices de leurs yeux et est l''objet de leurs préoccupations – leurs fils et leurs filles – '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'ce jour-là un rescapé viendra vers toi pour te l''annoncer. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ce jour-là, ta bouche s'ouvrira et tu parleras au rescapé, tu ne seras plus muet. Tu seras un signe pour eux et ils reconnaîtront que je suis l'Eternel.»
