document_id: PSA.106,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'infidélité d'Israël et la bonté de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Louez l'Eternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Célébrez l'Eternel, car il est bon!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, sa bonté dure éternellement.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Il les a sauvés de celui qui les détestait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il les a rachetés du pouvoir de l'ennemi.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'L''eau a recouvert leurs adversaires:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pas un seul n'a survécu.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Alors ils ont cru à ses paroles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont chanté ses louanges,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: mais bien vite ils ont oublié ce qu'il avait fait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils n'ont pas attendu la réalisation de ses plans.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ils ont été saisis de convoitise dans le désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont provoqué Dieu dans les lieux arides.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Il leur a accordé ce qu'ils demandaient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puis il a envoyé le dépérissement dans leur corps.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Dans le camp, ils se sont montrés jaloux de Moïse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et d''Aaron, le saint de l''Eternel:'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: la terre s'est ouverte, elle a englouti Dathan
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et s'est refermée sur la troupe d'Abiram;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: le feu a embrasé leur troupe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la flamme a dévoré les méchants.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ils ont fabriqué un veau à Horeb,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se sont prosternés devant une image en métal fondu.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Qui pourra dire l'extraordinaire façon d'agir de l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et proclamer toute sa louange?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ils ont échangé leur gloire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre la représentation d'un bœuf qui mange l'herbe!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ils ont oublié Dieu, leur sauveur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui avait fait de grandes choses en Egypte,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: des miracles dans le pays de Cham,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des prodiges à la mer des Roseaux.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Il parlait de les exterminer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais Moïse, celui qu'il avait choisi, s'est tenu à la brèche devant lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour détourner sa fureur et l'empêcher de les détruire.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ils ont méprisé le pays des délices,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils n'ont pas cru à la parole de l'Eternel,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ils ont murmuré dans leurs tentes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils n'ont pas écouté l'Eternel.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Alors il a levé la main pour jurer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de les faire tomber dans le désert,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: de faire tomber leur descendance parmi les nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de les disperser dans tous les pays.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ils se sont attachés au dieu Baal-Peor
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ont mangé des sacrifices offerts à des morts.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Ils ont offensé l'Eternel par leurs agissements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et un fléau a éclaté parmi eux.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Heureux ceux qui respectent le droit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui pratiquent la justice en tout temps!
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Phinées s'est levé pour intervenir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le fléau s'est arrêté;
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: cela lui a été compté comme justice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de génération en génération, pour toujours.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Ils ont irrité l'Eternel près des eaux de Meriba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Moïse a été puni à cause d'eux,
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: car ils l'ont exaspéré
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il a parlé sans réfléchir.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Ils n'ont pas exterminé les peuples
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que l'Eternel leur avait ordonné de détruire;
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ils se sont mêlés aux autres nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ont imité leur manière de faire.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: Ils ont servi leurs idoles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui ont été un piège pour eux;
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ils ont sacrifié leurs fils
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leurs filles aux démons,
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: ils ont versé le sang innocent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le sang de leurs fils et de leurs filles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'ils ont offerts en sacrifice aux idoles de Canaan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le pays a été souillé par ces meurtres.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Ils se sont rendus impurs par leurs actes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se sont prostitués par leurs agissements.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Eternel, souviens-toi de moi dans ta bienveillance pour ton peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: interviens pour moi en accordant ton secours!
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: La colère de l'Eternel s'est enflammée contre son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a pris son héritage en horreur.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Il les a livrés au pouvoir des nations:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui les détestaient ont dominé sur eux,
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: leurs ennemis les ont opprimés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils ont été humiliés sous leur main.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Plusieurs fois, il les a délivrés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais eux, ils s'obstinaient dans leur révolte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils se sont enfoncés dans leur faute.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Il a vu leur détresse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsqu'il a écouté leurs plaintes.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Il s'est souvenu en leur faveur de son alliance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a eu pitié d'eux, conformément à sa grande bonté,
  '46':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: et il a éveillé pour eux la compassion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de tous ceux qui les retenaient prisonniers.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: Sauve-nous, Eternel, notre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et rassemble-nous du milieu des nations!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi nous célébrerons ton saint nom
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et nous mettrons notre gloire à te louer:'
  '48':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: «Béni soit l'Eternel, le Dieu d'Israël, d'éternité en éternité!»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et tout le peuple dira: «Amen! Louez l''Eternel!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '106.47-48 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Nous mettrons… l''Eternel: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chroniques 16.34-36
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: »
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ainsi je pourrai voir le bonheur de ceux que tu as choisis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: me réjouir de la joie de ton peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et partager les louanges de ton héritage!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Nous avons péché comme nos ancêtres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous avons fait le mal, nous sommes coupables.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Nos ancêtres en Egypte n'ont pas compris tes miracles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne se sont pas rappelé le grand nombre de tes bontés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se sont révoltés près de la mer, près de la mer des Roseaux.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Mais il les a sauvés à cause de son nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour faire connaître sa puissance.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Il a menacé la mer des Roseaux, et elle s'est desséchée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il les a fait marcher à travers les abîmes comme dans un désert.
