document_id: PSA.106,152
type_code: fra
verses:
  '1':
  - type: heading
    content: L'infidélité d'Israël et la bonté de Dieu
  - type: text
    content: Louez l'Eternel!
  - type: text
    content: Célébrez l'Eternel, car il est bon!
  - type: text
    content: Oui, sa bonté dure éternellement.
  '10':
  - type: text
    content: Il les a sauvés de celui qui les détestait,
  - type: text
    content: il les a rachetés du pouvoir de l'ennemi.
  '11':
  - type: text
    content: 'L''eau a recouvert leurs adversaires:'
  - type: text
    content: pas un seul n'a survécu.
  '12':
  - type: text
    content: Alors ils ont cru à ses paroles,
  - type: text
    content: ils ont chanté ses louanges,
  '13':
  - type: text
    content: mais bien vite ils ont oublié ce qu'il avait fait,
  - type: text
    content: ils n'ont pas attendu la réalisation de ses plans.
  '14':
  - type: text
    content: Ils ont été saisis de convoitise dans le désert,
  - type: text
    content: ils ont provoqué Dieu dans les lieux arides.
  '15':
  - type: text
    content: Il leur a accordé ce qu'ils demandaient,
  - type: text
    content: puis il a envoyé le dépérissement dans leur corps.
  '16':
  - type: text
    content: Dans le camp, ils se sont montrés jaloux de Moïse
  - type: text
    content: 'et d''Aaron, le saint de l''Eternel:'
  '17':
  - type: text
    content: la terre s'est ouverte, elle a englouti Dathan
  - type: text
    content: et s'est refermée sur la troupe d'Abiram;
  '18':
  - type: text
    content: le feu a embrasé leur troupe,
  - type: text
    content: la flamme a dévoré les méchants.
  '19':
  - type: text
    content: Ils ont fabriqué un veau à Horeb,
  - type: text
    content: ils se sont prosternés devant une image en métal fondu.
  '2':
  - type: text
    content: Qui pourra dire l'extraordinaire façon d'agir de l'Eternel
  - type: text
    content: et proclamer toute sa louange?
  '20':
  - type: text
    content: Ils ont échangé leur gloire
  - type: text
    content: contre la représentation d'un bœuf qui mange l'herbe!
  '21':
  - type: text
    content: Ils ont oublié Dieu, leur sauveur,
  - type: text
    content: qui avait fait de grandes choses en Egypte,
  '22':
  - type: text
    content: des miracles dans le pays de Cham,
  - type: text
    content: des prodiges à la mer des Roseaux.
  '23':
  - type: text
    content: Il parlait de les exterminer,
  - type: text
    content: mais Moïse, celui qu'il avait choisi, s'est tenu à la brèche devant lui
  - type: text
    content: pour détourner sa fureur et l'empêcher de les détruire.
  '24':
  - type: text
    content: Ils ont méprisé le pays des délices,
  - type: text
    content: ils n'ont pas cru à la parole de l'Eternel,
  '25':
  - type: text
    content: ils ont murmuré dans leurs tentes,
  - type: text
    content: ils n'ont pas écouté l'Eternel.
  '26':
  - type: text
    content: Alors il a levé la main pour jurer
  - type: text
    content: de les faire tomber dans le désert,
  '27':
  - type: text
    content: de faire tomber leur descendance parmi les nations
  - type: text
    content: et de les disperser dans tous les pays.
  '28':
  - type: text
    content: Ils se sont attachés au dieu Baal-Peor
  - type: text
    content: et ont mangé des sacrifices offerts à des morts.
  '29':
  - type: text
    content: Ils ont offensé l'Eternel par leurs agissements,
  - type: text
    content: et un fléau a éclaté parmi eux.
  '3':
  - type: text
    content: Heureux ceux qui respectent le droit,
  - type: text
    content: qui pratiquent la justice en tout temps!
  '30':
  - type: text
    content: Phinées s'est levé pour intervenir,
  - type: text
    content: et le fléau s'est arrêté;
  '31':
  - type: text
    content: cela lui a été compté comme justice
  - type: text
    content: de génération en génération, pour toujours.
  '32':
  - type: text
    content: Ils ont irrité l'Eternel près des eaux de Meriba,
  - type: text
    content: et Moïse a été puni à cause d'eux,
  '33':
  - type: text
    content: car ils l'ont exaspéré
  - type: text
    content: et il a parlé sans réfléchir.
  '34':
  - type: text
    content: Ils n'ont pas exterminé les peuples
  - type: text
    content: que l'Eternel leur avait ordonné de détruire;
  '35':
  - type: text
    content: ils se sont mêlés aux autres nations
  - type: text
    content: et ont imité leur manière de faire.
  '36':
  - type: text
    content: Ils ont servi leurs idoles,
  - type: text
    content: qui ont été un piège pour eux;
  '37':
  - type: text
    content: ils ont sacrifié leurs fils
  - type: text
    content: et leurs filles aux démons,
  '38':
  - type: text
    content: ils ont versé le sang innocent,
  - type: text
    content: le sang de leurs fils et de leurs filles
  - type: text
    content: qu'ils ont offerts en sacrifice aux idoles de Canaan,
  - type: text
    content: et le pays a été souillé par ces meurtres.
  '39':
  - type: text
    content: Ils se sont rendus impurs par leurs actes,
  - type: text
    content: ils se sont prostitués par leurs agissements.
  '4':
  - type: text
    content: Eternel, souviens-toi de moi dans ta bienveillance pour ton peuple,
  - type: text
    content: interviens pour moi en accordant ton secours!
  '40':
  - type: text
    content: La colère de l'Eternel s'est enflammée contre son peuple,
  - type: text
    content: il a pris son héritage en horreur.
  '41':
  - type: text
    content: 'Il les a livrés au pouvoir des nations:'
  - type: text
    content: ceux qui les détestaient ont dominé sur eux,
  '42':
  - type: text
    content: leurs ennemis les ont opprimés,
  - type: text
    content: et ils ont été humiliés sous leur main.
  '43':
  - type: text
    content: Plusieurs fois, il les a délivrés,
  - type: text
    content: mais eux, ils s'obstinaient dans leur révolte,
  - type: text
    content: et ils se sont enfoncés dans leur faute.
  '44':
  - type: text
    content: Il a vu leur détresse
  - type: text
    content: lorsqu'il a écouté leurs plaintes.
  '45':
  - type: text
    content: Il s'est souvenu en leur faveur de son alliance,
  - type: text
    content: il a eu pitié d'eux, conformément à sa grande bonté,
  '46':
  - type: text
    content: et il a éveillé pour eux la compassion
  - type: text
    content: de tous ceux qui les retenaient prisonniers.
  '47':
  - type: text
    content: Sauve-nous, Eternel, notre Dieu,
  - type: text
    content: et rassemble-nous du milieu des nations!
  - type: text
    content: Ainsi nous célébrerons ton saint nom
  - type: text
    content: 'et nous mettrons notre gloire à te louer:'
  '48':
  - type: text
    content: «Béni soit l'Eternel, le Dieu d'Israël, d'éternité en éternité!»
  - type: text
    content: 'Et tout le peuple dira: «Amen! Louez l''Eternel!'
  - type: note
    content: 'Nous mettrons… l''Eternel: voir 1 Chroniques 16.34-36.'
  - type: text
    content: »
  '5':
  - type: text
    content: Ainsi je pourrai voir le bonheur de ceux que tu as choisis,
  - type: text
    content: me réjouir de la joie de ton peuple
  - type: text
    content: et partager les louanges de ton héritage!
  '6':
  - type: text
    content: Nous avons péché comme nos ancêtres,
  - type: text
    content: nous avons fait le mal, nous sommes coupables.
  '7':
  - type: text
    content: Nos ancêtres en Egypte n'ont pas compris tes miracles,
  - type: text
    content: ils ne se sont pas rappelé le grand nombre de tes bontés,
  - type: text
    content: ils se sont révoltés près de la mer, près de la mer des Roseaux.
  '8':
  - type: text
    content: Mais il les a sauvés à cause de son nom,
  - type: text
    content: pour faire connaître sa puissance.
  '9':
  - type: text
    content: Il a menacé la mer des Roseaux, et elle s'est desséchée,
  - type: text
    content: et il les a fait marcher à travers les abîmes comme dans un désert.
