document_id: HEB.10,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le sacrifice de la nouvelle alliance
  - type: text
    content: 'La loi, en effet, possède une ombre des biens à venir, et non l''exacte représentation de la réalité; elle ne peut jamais, par l''offrande annuelle et toujours répétée des mêmes sacrifices, conduire à la perfection ceux qui y participent. '
  '10':
  - type: text
    content: Et c'est en raison de cette volonté que nous avons été rendus saints par l'offrande du corps de Jésus-Christ une fois pour toutes.
  '11':
  - type: text
    content: 'Tout prêtre se tient chaque jour debout pour faire le service et offrir fréquemment les mêmes sacrifices, qui ne peuvent jamais enlever les péchés, '
  '12':
  - type: text
    content: 'tandis que Christ, après avoir offert un seul sacrifice pour les péchés, s''est assis pour toujours à la droite de Dieu. '
  '13':
  - type: text
    content: 'Il attend désormais que ses ennemis soient réduits à lui servir de marchepied. '
  '14':
  - type: text
    content: 'En effet, par une seule offrande il a conduit à la perfection pour toujours ceux qu''il rend saints. '
  '15':
  - type: text
    content: 'C''est ce que le Saint-Esprit nous atteste aussi, car après avoir dit: '
  '16':
  - type: text
    content: 'Voici l''alliance que je ferai avec eux après ces jours-là, dit le Seigneur: je mettrai mes lois dans leur cœur et je les écrirai dans leur esprit,'
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'il ajoute: '
  - type: text
    content: Je ne me souviendrai plus de leurs péchés ni de leurs fautes.
  - type: note
    content: 'Voici… fautes: reprise de la citation de Jérémie 31.33, 34 (voir 8.10, 12).'
  '18':
  - type: text
    content: 'Or là où il y a pardon des péchés, il n''y a plus à présenter d''offrande pour le péché. '
  '19':
  - type: text
    content: 'Ainsi, frères et sœurs, nous avons par le sang de Jésus l''assurance d''un libre accès au sanctuaire. '
  '2':
  - type: text
    content: 'Sinon, n''aurait-on pas cessé de les offrir? Ceux qui rendent ce culte, purifiés une fois pour toutes, n''auraient en effet plus du tout conscience de leurs péchés. '
  '20':
  - type: text
    content: 'Cette route nouvelle et vivante, il l''a inaugurée pour nous au travers du voile, c''est-à-dire de son propre corps. '
  '21':
  - type: text
    content: 'De plus, nous avons un souverain prêtre établi sur la maison de Dieu. '
  '22':
  - type: text
    content: Approchons-nous donc avec un cœur sincère, une foi inébranlable, le cœur purifié d'une mauvaise conscience et le corps lavé d'une eau pure.
  - type: heading
    content: Persévérance dans la foi
  - type: heading
    content: 10.23–13.25
  - type: heading
    content: Persévérer dans l'espérance
  '23':
  - type: text
    content: 'Retenons fermement l''espérance que nous proclamons, car celui qui a fait la promesse est fidèle. '
  '24':
  - type: text
    content: 'Veillons les uns sur les autres pour nous inciter à l''amour et à de belles œuvres. '
  '25':
  - type: text
    content: 'N''abandonnons pas notre assemblée, comme certains en ont l''habitude, mais encourageons-nous mutuellement. Faites cela d''autant plus que vous voyez s''approcher le jour. '
  '26':
  - type: text
    content: 'En effet, si nous péchons volontairement après avoir reçu la connaissance de la vérité, il ne reste plus de sacrifice pour les péchés, '
  '27':
  - type: text
    content: 'mais une terrible attente du jugement et l''ardeur du '
  - type: text
    content: feu qui dévorera les adversaires de Dieu
  - type: note
    content: 'Feu… de Dieu: citation d''Esaïe 26.11.'
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Celui qui a violé la loi de Moïse '
  - type: text
    content: est mis à mort
  - type: text
    content: ' sans pitié, '
  - type: text
    content: sur la déposition de deux ou de trois témoins
  - type: note
    content: 'Est mis… témoins: citation de Deutéronome 17.6.'
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'Quelle peine bien plus sévère méritera-t-il donc, à votre avis, celui qui aura foulé aux pieds le Fils de Dieu, qui aura jugé sans valeur le sang de l''alliance grâce auquel il a été déclaré saint et aura insulté l''Esprit de la grâce? '
  '3':
  - type: text
    content: 'Mais en réalité, le souvenir des péchés est rappelé chaque année par ces sacrifices, '
  '30':
  - type: text
    content: 'Nous connaissons en effet celui qui a dit: '
  - type: text
    content: C'est à moi qu'appartient la vengeance, c'est moi qui donnerai à chacun ce qu'il mérite!
  - type: text
    content: ' Il a ajouté: '
  - type: text
    content: Le Seigneur jugera son peuple.
  - type: note
    content: 'C''est à moi… peuple: citation de Deutéronome 32.35, 36.'
  - type: text
    content: ' '
  '31':
  - type: text
    content: Oui, c'est une chose terrible que de tomber entre les mains du Dieu vivant.
  '32':
  - type: text
    content: 'Souvenez-vous des premiers jours: après avoir été éclairés'
  - type: note
    content: 'Après avoir été éclairés: c''est-à-dire après que Dieu a ouvert leurs yeux à la vérité et qu''ils se sont convertis.'
  - type: text
    content: ', vous avez supporté un grand et douloureux combat. '
  '33':
  - type: text
    content: 'Tantôt vous étiez publiquement exposés aux injures et aux persécutions, tantôt vous vous montriez solidaires de ceux qui se trouvaient dans la même situation. '
  '34':
  - type: text
    content: En effet, vous avez eu de la compassion pour moi dans ma prison et vous avez accepté avec joie qu'on prenne vos biens, sachant que vous aviez [au ciel] des richesses meilleures et qui durent toujours.
  '35':
  - type: text
    content: 'N''abandonnez donc pas votre assurance, qui est porteuse d''une grande récompense. '
  '36':
  - type: text
    content: 'Oui, vous avez besoin de persévérance pour accomplir la volonté de Dieu et obtenir ainsi ce qui vous est promis. '
  '37':
  - type: text
    content: 'Encore bien peu, bien peu de temps, et '
  - type: text
    content: celui qui doit venir viendra, il ne tardera pas.
  - type: text
    content: ' '
  '38':
  - type: text
    content: Et le juste vivra par la foi; mais s'il revient en arrière, je ne prends pas plaisir en lui.
  - type: note
    content: 'Celui… en lui: citation d''Habakuk 2.3-4.'
  - type: text
    content: ' '
  '39':
  - type: text
    content: Quant à nous, nous ne faisons pas partie de ceux qui reviennent en arrière pour leur perte, mais de ceux qui ont la foi pour le salut de leur âme.
  '4':
  - type: text
    content: car il est impossible que le sang de taureaux et de boucs enlève les péchés.
  '5':
  - type: text
    content: 'C''est pourquoi, en entrant dans le monde, Christ dit: '
  - type: text
    content: Tu n'as voulu ni sacrifices ni offrandes, mais tu m'as formé un corps;
  - type: text
    content: ' '
  '6':
  - type: text
    content: tu n'as accepté ni holocaustes ni sacrifices pour le péché,
  - type: text
    content: ' '
  '7':
  - type: text
    content: 'alors j''ai dit: ‘Me voici, je viens – dans le rouleau du livre il est écrit à mon sujet – pour faire, ô Dieu, ta volonté.’'
  - type: note
    content: 'Tu n''as voulu… ta volonté: citation du Psaume 40.7-9.'
  '8':
  - type: text
    content: 'Il a d''abord dit: '
  - type: text
    content: Tu n'as voulu et tu n'as accepté ni sacrifices ni offrandes, ni holocaustes ni sacrifices pour le péché
  - type: text
    content: ' – qui sont pourtant offerts conformément à la loi – '
  '9':
  - type: text
    content: 'et ensuite il a déclaré: '
  - type: text
    content: Me voici, je viens, [ô Dieu,] pour faire ta volonté.
  - type: text
    content: 'Il abolit ainsi le premier culte pour établir le second. '
