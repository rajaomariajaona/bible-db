document_id: HEB.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le sacrifice de la nouvelle alliance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La loi, en effet, possède une ombre des biens à venir, et non l''exacte représentation de la réalité; elle ne peut jamais, par l''offrande annuelle et toujours répétée des mêmes sacrifices, conduire à la perfection ceux qui y participent. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Sinon, n''aurait-on pas cessé de les offrir? Ceux qui rendent ce culte, purifiés une fois pour toutes, n''auraient en effet plus du tout conscience de leurs péchés. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais en réalité, le souvenir des péchés est rappelé chaque année par ces sacrifices, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: car il est impossible que le sang de taureaux et de boucs enlève les péchés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'C''est pourquoi, en entrant dans le monde, Christ dit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu n'as voulu ni sacrifices ni offrandes, mais tu m'as formé un corps;
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: tu n'as accepté ni holocaustes ni sacrifices pour le péché,
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'alors j''ai dit: ‘Me voici, je viens – dans le rouleau du livre il est écrit à mon sujet – pour faire, ô Dieu, ta volonté.’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.5-7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu n''as voulu… ta volonté: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 40.7-9
      metadata:
        usfm: PSA.40.7+PSA.40.8+PSA.40.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il a d''abord dit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu n'as voulu et tu n'as accepté ni sacrifices ni offrandes, ni holocaustes ni sacrifices pour le péché
  - type: text
    text: ' – qui sont pourtant offerts conformément à la loi – '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'et ensuite il a déclaré: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Me voici, je viens, [ô Dieu,] pour faire ta volonté.
  - type: text
    text: 'Il abolit ainsi le premier culte pour établir le second. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Et c'est en raison de cette volonté que nous avons été rendus saints par l'offrande du corps de Jésus-Christ une fois pour toutes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tout prêtre se tient chaque jour debout pour faire le service et offrir fréquemment les mêmes sacrifices, qui ne peuvent jamais enlever les péchés, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'tandis que Christ, après avoir offert un seul sacrifice pour les péchés, s''est assis pour toujours à la droite de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il attend désormais que ses ennemis soient réduits à lui servir de marchepied. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'En effet, par une seule offrande il a conduit à la perfection pour toujours ceux qu''il rend saints. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'C''est ce que le Saint-Esprit nous atteste aussi, car après avoir dit: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'Voici l''alliance que je ferai avec eux après ces jours-là, dit le Seigneur: je mettrai mes lois dans leur cœur et je les écrirai dans leur esprit,'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'il ajoute: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Je ne me souviendrai plus de leurs péchés ni de leurs fautes.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.16-17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Voici… fautes: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'reprise de la citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jérémie 31.33
      metadata:
        usfm: JER.31.33
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '34'
      metadata:
        usfm: JER.31.34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (voir '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8.10'
      metadata:
        usfm: HEB.8.10
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: HEB.8.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Or là où il y a pardon des péchés, il n''y a plus à présenter d''offrande pour le péché. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ainsi, frères et sœurs, nous avons par le sang de Jésus l''assurance d''un libre accès au sanctuaire. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Cette route nouvelle et vivante, il l''a inaugurée pour nous au travers du voile, c''est-à-dire de son propre corps. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'De plus, nous avons un souverain prêtre établi sur la maison de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Approchons-nous donc avec un cœur sincère, une foi inébranlable, le cœur purifié d'une mauvaise conscience et le corps lavé d'une eau pure.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Persévérance dans la foi
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 10.23–13.25
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Persévérer dans l'espérance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Retenons fermement l''espérance que nous proclamons, car celui qui a fait la promesse est fidèle. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Veillons les uns sur les autres pour nous inciter à l''amour et à de belles œuvres. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'N''abandonnons pas notre assemblée, comme certains en ont l''habitude, mais encourageons-nous mutuellement. Faites cela d''autant plus que vous voyez s''approcher le jour. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'En effet, si nous péchons volontairement après avoir reçu la connaissance de la vérité, il ne reste plus de sacrifice pour les péchés, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'mais une terrible attente du jugement et l''ardeur du '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: feu qui dévorera les adversaires de Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Feu… de Dieu: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 26.1
      metadata:
        usfm: ISA.26.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Celui qui a violé la loi de Moïse '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: est mis à mort
  - type: text
    text: ' sans pitié, '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: sur la déposition de deux ou de trois témoins
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Est mis… témoins: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 17.6
      metadata:
        usfm: DEU.17.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Quelle peine bien plus sévère méritera-t-il donc, à votre avis, celui qui aura foulé aux pieds le Fils de Dieu, qui aura jugé sans valeur le sang de l''alliance grâce auquel il a été déclaré saint et aura insulté l''Esprit de la grâce? '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Nous connaissons en effet celui qui a dit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: C'est à moi qu'appartient la vengeance, c'est moi qui donnerai à chacun ce qu'il mérite!
  - type: text
    text: ' Il a ajouté: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Le Seigneur jugera son peuple.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'C''est à moi… peuple: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 32.35
      metadata:
        usfm: DEU.32.35
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '36'
      metadata:
        usfm: DEU.32.36
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Oui, c'est une chose terrible que de tomber entre les mains du Dieu vivant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Souvenez-vous des premiers jours: après avoir été éclairés'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.32 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Après avoir été éclairés: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire après que Dieu a ouvert leurs yeux à la vérité et qu'ils se sont convertis.
    marker-yv: yv-n
  - type: text
    text: ', vous avez supporté un grand et douloureux combat. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Tantôt vous étiez publiquement exposés aux injures et aux persécutions, tantôt vous vous montriez solidaires de ceux qui se trouvaient dans la même situation. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: En effet, vous avez eu de la compassion pour moi dans ma prison et vous avez accepté avec joie qu'on prenne vos biens, sachant que vous aviez [au ciel] des richesses meilleures et qui durent toujours.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'N''abandonnez donc pas votre assurance, qui est porteuse d''une grande récompense. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Oui, vous avez besoin de persévérance pour accomplir la volonté de Dieu et obtenir ainsi ce qui vous est promis. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Encore bien peu, bien peu de temps, et '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: celui qui doit venir viendra, il ne tardera pas.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Et le juste vivra par la foi; mais s'il revient en arrière, je ne prends pas plaisir en lui.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.37-38 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Celui… en lui: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Habakuk 2.3-4
      metadata:
        usfm: HAB.2.3+HAB.2.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Quant à nous, nous ne faisons pas partie de ceux qui reviennent en arrière pour leur perte, mais de ceux qui ont la foi pour le salut de leur âme.
