document_id: 2KI.7,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Elisée dit: «Ecoutez la parole de l''Eternel! ‘Voici ce que dit l''Eternel: Demain, à la même heure, on pourra avoir 7 litres de fleur de farine pour une pièce d''argent et 14 litres d''orge pour une pièce d''argent, à la porte de Samarie.’» '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ils partirent, appelèrent un homme qui gardait la porte de la ville et annoncèrent: «Nous sommes entrés dans le camp des Syriens et il n''y a personne. On n''y entend aucune voix d''homme; il n''y a que des chevaux et des ânes attachés, et les tentes sont restées telles quelles.» '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Le garde appela les autres gardes et ils transmirent ce rapport à l'intérieur du palais royal.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Le roi se leva alors qu''il faisait encore nuit et dit à ses serviteurs: «Je vais vous dire ce que nous font les Syriens. Comme ils savent que nous sommes affamés, ils ont quitté le camp pour se cacher dans les champs et ils se sont dit: ‘Quand ils sortiront de la ville, nous nous emparerons d''eux vivants et nous entrerons dans la ville.’» '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'L''un des serviteurs du roi répondit: «Que l''on prenne cinq des chevaux qui restent encore dans la ville. De toute façon, ils sont comme toute la population d''Israël qui est restée là: ils sont à bout, comme toute la population d''Israël. Prenons-les et envoyons quelqu''un voir ce qui se passe.» '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'On prit deux chars avec leurs chevaux, et le roi envoya des hommes sur les traces de l''armée syrienne en disant: «Allez voir!» '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ils suivirent les Syriens jusqu'au Jourdain et virent que toute la route était pleine d'habits et d'objets qu'ils avaient jetés dans leur précipitation. Les messagers revinrent en informer le roi.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Le peuple sortit et pilla le camp des Syriens. On eut 7 litres de fleur de farine pour une pièce d''argent et 14 litres d''orge pour une pièce d''argent, conformément à la parole de l''Eternel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Le roi avait confié la garde de la porte à l''officier qui le soutenait, mais cet officier fut écrasé à la porte par le peuple et il mourut, conformément à ce qu''avait dit l''homme de Dieu quand le roi était descendu vers lui. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'L''homme de Dieu avait alors dit au roi: «On pourra avoir 14 litres d''orge pour une pièce d''argent et 7 litres de fleur de farine pour une pièce d''argent, demain, à la même heure, à la porte de Samarie.» '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'L''officier avait répondu à l''homme de Dieu: «Même si l''Eternel faisait des fenêtres au ciel, une telle chose ne pourrait pas se produire!» Et Elisée avait dit: «Tu le verras de tes yeux, mais tu n''en mangeras pas.» '
  '2':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'L''officier chargé de soutenir le roi répondit à l''homme de Dieu: «Même si l''Eternel faisait des fenêtres au ciel, une telle chose ne pourrait pas se produire!» Elisée dit: «Tu le verras de tes yeux, mais tu n''en mangeras pas.»'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'C''est en effet ce qui arriva à cet homme: il fut écrasé à la porte par le peuple et il mourut.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Il y avait à l''entrée de la ville quatre lépreux qui se dirent l''un à l''autre: «Pourquoi rester ici jusqu''à notre mort? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Si nous envisageons d''entrer dans la ville, la famine y règne et nous mourrons. Mais si nous restons ici, nous mourrons aussi. Allons nous livrer dans le camp des Syriens! S''ils nous laissent vivre, nous vivrons, et s''ils nous font mourir, nous mourrons.» '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ils partirent donc au crépuscule pour se rendre au camp des Syriens. Lorsqu''ils arrivèrent à l''entrée du camp, il n''y avait personne. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'En effet, le Seigneur y avait fait entendre un bruit de chars et de chevaux, le bruit d''une grande armée, et ils s''étaient dit l''un à l''autre: «Le roi d''Israël a enrôlé contre nous les rois des Hittites et ceux des Egyptiens pour venir nous attaquer.» '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ils s''étaient levés et avaient pris la fuite au crépuscule, en abandonnant leurs tentes, leurs chevaux et leurs ânes; le camp était resté tel quel. Ils s''étaient enfuis pour sauver leur vie. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Arrivés à l''entrée du camp, les lépreux pénétrèrent dans une tente, mangèrent et burent. Ils en emportèrent aussi de l''argent, de l''or et des habits qu''ils allèrent cacher. Ils revinrent, pénétrèrent dans une autre tente et en emportèrent des objets qu''ils allèrent cacher. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Puis ils se dirent l''un à l''autre: «Nous n''agissons pas bien. Cette journée est une journée de bonne nouvelle. Si nous gardons le silence et que nous attendions jusqu''à la lumière du matin, nous en serons punis. Venez maintenant, allons faire un rapport au palais royal.» '
