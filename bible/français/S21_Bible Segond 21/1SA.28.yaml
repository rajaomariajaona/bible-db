document_id: 1SA.28
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Saül et la magicienne d'En-Dor
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A cette époque-là, les Philistins rassemblèrent leurs troupes et formèrent une armée pour faire la guerre à Israël. Akish dit à David: «Tu dois savoir que vous ferez cette campagne avec moi, toi et tes hommes.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'David répondit à Akish: «Eh bien! Tu verras ce que ton serviteur fera.» Akish dit à David: «Eh bien! Je t''établirai pour toujours comme mon garde du corps.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Samuel était mort. Tout Israël l'avait pleuré et on l'avait enterré à Rama, dans sa ville. Saül avait supprimé du pays ceux qui invoquaient les esprits et les spirites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Les Philistins se rassemblèrent et vinrent installer leur camp à Sunem. Saül rassembla tout Israël et ils établirent leur camp à Guilboa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'A la vue du camp des Philistins, Saül fut rempli de peur et son cœur trembla violemment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il consulta l''Eternel, mais l''Eternel ne lui répondit pas, ni par des rêves, ni par l''urim ni par les prophètes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Saül dit alors à ses serviteurs: «Cherchez-moi une femme capable d''invoquer les esprits et j''irai la consulter.» Ses serviteurs lui dirent: «A En-Dor il y a une femme capable d''invoquer les esprits.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors Saül se déguisa en enfilant d''autres vêtements et partit avec deux hommes. Ils arrivèrent de nuit chez la femme. Saül lui dit: «Pratique donc la divination pour moi en invoquant un mort, en faisant monter pour moi celui que je t''indiquerai.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'La femme lui répondit: «Tu sais ce que Saül a fait, la manière dont il a fait disparaître du pays ceux qui sont capables d''invoquer les esprits et les spirites. Pourquoi donc tends-tu un piège à ma vie? Veux-tu me faire mourir?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Saül lui jura par l''Eternel: «L''Eternel est vivant! Il ne t''arrivera aucun mal pour cela.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'La femme demanda: «Qui veux-tu que je fasse monter pour toi?» Il répondit: «Fais-moi monter Samuel.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lorsque la femme vit Samuel, elle poussa un grand cri et dit à Saül: «Pourquoi m''as-tu trompée? Tu es Saül!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le roi lui dit: «N''aie pas peur! Dis-moi plutôt ce que tu vois.» La femme dit à Saül: «Je vois un dieu monter de la terre.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il lui dit: «Quelle est son apparence?» Elle répondit: «C''est un vieillard qui monte et il est enveloppé d''un manteau.» Saül comprit alors que c''était Samuel et il s''inclina le visage contre terre et se prosterna.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Samuel dit à Saül: «Pourquoi as-tu troublé mon repos en me faisant monter?» Saül répondit: «Je suis dans une grande détresse: les Philistins me font la guerre et Dieu s''est détourné de moi. Il ne m''a répondu ni par les prophètes ni par des rêves. Je t''ai appelé pour que tu me fasses connaître ce que je dois faire.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Samuel dit: «Pourquoi donc me consultes-tu, puisque l''Eternel s''est détourné de toi et qu''il est devenu ton ennemi? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'L''Eternel te traite comme je te l''avais annoncé de sa part: il a arraché la royauté de tes mains et l''a donnée à un autre, à David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tu n''as pas obéi à l''Eternel, tu n''as pas fait sentir à Amalek l''ardeur de sa colère. Voilà pourquoi l''Eternel te traite aujourd''hui de cette manière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: L'Eternel livrera même Israël avec toi entre les mains des Philistins. Demain, tes fils et toi, vous serez avec moi et l'Eternel livrera le camp d'Israël entre les mains des Philistins.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Aussitôt Saül tomba à terre de tout son long. Les paroles de Samuel le remplissaient d'épouvante. De plus, il manquait de force, car il n'avait pris aucune nourriture de toute la journée et de toute la nuit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'La femme s''approcha de Saül et, le voyant très effrayé, elle lui dit: «Ta servante t''a écouté. J''ai risqué ma vie en obéissant aux paroles que tu m''as dites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ecoute maintenant, toi aussi, ta servante: laisse-moi t''offrir un morceau de pain à manger. Ainsi, tu auras la force de te remettre en route.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mais Saül refusa et déclara: «Je ne mangerai pas.» Ses serviteurs, et même la femme, insistèrent et il les écouta. Il se leva de terre et s''assit sur le lit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'La femme avait chez elle un veau gras, qu''elle s''empressa de tuer. Elle prit de la farine, la pétrit et fit cuire des pains sans levain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Elle déposa le tout devant Saül et ses serviteurs, et ils mangèrent. Puis ils se levèrent et partirent la nuit même.
