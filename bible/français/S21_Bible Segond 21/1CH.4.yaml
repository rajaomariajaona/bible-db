document_id: 1CH.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Autres descendants de Juda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Descendants de Juda: Pérets, Hetsron, Carmi, Hur et Shobal.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Reaja, fils de Shobal, eut pour fils Jachath; Jachath eut Achumaï et Lahad. Ce sont les clans des Tsoreathiens.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Voici les descendants d''Etham: Jizreel, Jishma et Jidbash; leur sœur s''appelait Hatselelponi. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Penuel, le père de Guedor, et Ezer, le père de Husha, étaient les fils de Hur, le fils aîné d'Ephrata, père de Bethléhem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ashchur, père de Tekoa, eut deux femmes: Hélea et Naara. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Naara lui donna Achuzzam, Hépher, Thémeni et Achashthari. Ce sont là les fils de Naara. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Quant aux fils de Hélea, ce sont Tséreth, Tsochar et Ethnan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Kots eut pour descendants Anub et Hatsobéba, ainsi que les clans d''Acharchel, le fils d''Harum. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Jaebets fut plus honoré que ses frères. Sa mère l''avait appelé Jaebets en disant: «C''est parce que je lui ai donné naissance dans la douleur.» '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jaebets fit appel au Dieu d''Israël en disant: «Veuille me bénir et agrandir mon territoire! Que ta main soit avec moi! Préserve-moi du mal, afin que je ne vive pas dans la douleur!» Et Dieu lui accorda ce qu''il avait demandé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Kelub, frère de Shucha, eut pour fils Mechir, le père d''Eshthon. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Eshthon eut pour descendants la famille de Rapha, Paséach et Thechinna, le père de la ville de Nachash. Ce sont les habitants de Réca.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Fils de Kenaz: Othniel et Seraja. Fils d''Othniel: Hathath. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Meonothaï eut pour fils Ophra. Seraja eut Joab, père de la vallée des artisans. En effet, c'étaient des artisans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Descendants de Caleb, le fils de Jephunné: Iru, Ela et Naam, ainsi que les fils d''Ela et Kenaz. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Fils de Jehalléleel: Ziph, Zipha, Thirja et Asareel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fils d''Esdras: Jéther, Méred, Epher et Jalon. La femme de Méred lui donna Miriam, Shammaï et Jishbach, le père d''Eshthemoa. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Sa femme judéenne mit au monde Jéred, père de Guedor, Héber, père de Soco, et Jekuthiel, père de Zanoach. Les autres étaient les enfants de Bithja, la fille du pharaon, que Méred avait prise pour femme.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Fils de la femme d''Hodija, qui était une sœur de Nacham: le père de Kehila le Garmien et Eshthemoa le Maacathien.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Fils de Simon: Amnon, Rinna, Ben-Hanan et Thilon. Descendants de Jisheï: Zocheth et Ben-Zocheth.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Descendants de Shéla, le fils de Juda: Er, le père de Léca, Laeda, le père de Marésha, ainsi que les clans qui travaillent le textile à Beth-Ashbéa. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il avait aussi pour descendants Jokim, les habitants de Cozéba, Joas et Saraph – qui dominèrent sur Moab – et Jashubi-Léchem. Ces événements sont anciens. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: C'étaient les potiers et les habitants des plantations et des parcs; ils habitaient là près du roi et travaillaient pour lui.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendance de Siméon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fils de Siméon: Nemuel, Jamin, Jarib, Zérach, Saül. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Descendants de Saül: Shallum, lui-même père de Mibsam, père de Mishma. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Descendants de Mishma: Hammuel, lui-même père de Zaccur, père de Shimeï. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Shimeï eut 16 fils et 6 filles. Ses frères n''eurent pas beaucoup de fils et leur clan tout entier n''atteignit pas le nombre des descendants de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ils habitaient à Beer-Shéba, Molada, Hatsar-Shual, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Bilha, Etsem, Tholad, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Bethuel, Horma, Tsiklag, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Beth-Marcaboth, Hatsar-Susim, Beth-Bireï et Shaaraïm. Telles furent leurs villes jusqu''au règne de David, avec leurs villages. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ils avaient encore Etham, Aïn, Rimmon, Thoken et Ashan, ce qui fait 5 villes, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: et tous les villages situés aux environs de ces villes, jusqu'à Baal. Voilà leurs lieux d'habitation et leur généalogie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Quant à Meshobab, Jamlec, Josha, le fils d''Amatsia, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Joël, Jéhu, le fils de Joshibia, lui-même fils de Seraja, fils d''Asiel, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Eljoénaï, Jaakoba, Jeshochaja, Asaja, Adiel, Jesimiel, Benaja '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'et Ziza, le fils de Shipheï, lui-même fils d''Allon, fils de Jedaja, fils de Shimri, fils de Shemaeja, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'ces hommes, qui viennent d''être désignés par leur nom, étaient chefs de leur clan, et leurs familles grandirent tant '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'qu''ils allèrent du côté de Guedor, jusqu''à l''est de la vallée, afin de chercher des pâturages pour leurs troupeaux. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ils y trouvèrent de riches et bons pâturages et une région vaste, tranquille et paisible, car ceux qui l''habitaient auparavant descendaient de Cham. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Ces hommes mentionnés par leur nom arrivèrent là durant le règne d'Ezéchias sur Juda. Ils attaquèrent leurs tentes et les habitations qui se trouvaient là, ils les vouèrent à la destruction, et ce jusqu'à aujourd'hui. Puis ils s'installèrent à leur place, car il y avait là des pâturages pour leurs troupeaux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Il y eut aussi 500 hommes parmi eux, parmi les descendants de Siméon, qui se rendirent dans la région montagneuse de Séir. Ils avaient à leur tête Pelathia, Nearia, Rephaja et Uziel, fils de Jisheï. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Ils battirent le reste des survivants amalécites et s'installèrent là jusqu'à aujourd'hui.
