document_id: 1CH.4,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Autres descendants de Juda
  - type: text
    content: 'Descendants de Juda: Pérets, Hetsron, Carmi, Hur et Shobal.'
  '10':
  - type: text
    content: 'Jaebets fit appel au Dieu d''Israël en disant: «Veuille me bénir et agrandir mon territoire! Que ta main soit avec moi! Préserve-moi du mal, afin que je ne vive pas dans la douleur!» Et Dieu lui accorda ce qu''il avait demandé.'
  '11':
  - type: text
    content: 'Kelub, frère de Shucha, eut pour fils Mechir, le père d''Eshthon. '
  '12':
  - type: text
    content: Eshthon eut pour descendants la famille de Rapha, Paséach et Thechinna, le père de la ville de Nachash. Ce sont les habitants de Réca.
  '13':
  - type: text
    content: 'Fils de Kenaz: Othniel et Seraja. Fils d''Othniel: Hathath. '
  '14':
  - type: text
    content: Meonothaï eut pour fils Ophra. Seraja eut Joab, père de la vallée des artisans. En effet, c'étaient des artisans.
  '15':
  - type: text
    content: 'Descendants de Caleb, le fils de Jephunné: Iru, Ela et Naam, ainsi que les fils d''Ela et Kenaz. '
  '16':
  - type: text
    content: 'Fils de Jehalléleel: Ziph, Zipha, Thirja et Asareel.'
  '17':
  - type: text
    content: 'Fils d''Esdras: Jéther, Méred, Epher et Jalon. La femme de Méred lui donna Miriam, Shammaï et Jishbach, le père d''Eshthemoa. '
  '18':
  - type: text
    content: Sa femme judéenne mit au monde Jéred, père de Guedor, Héber, père de Soco, et Jekuthiel, père de Zanoach. Les autres étaient les enfants de Bithja, la fille du pharaon, que Méred avait prise pour femme.
  '19':
  - type: text
    content: 'Fils de la femme d''Hodija, qui était une sœur de Nacham: le père de Kehila le Garmien et Eshthemoa le Maacathien.'
  '2':
  - type: text
    content: Reaja, fils de Shobal, eut pour fils Jachath; Jachath eut Achumaï et Lahad. Ce sont les clans des Tsoreathiens.
  '20':
  - type: text
    content: 'Fils de Simon: Amnon, Rinna, Ben-Hanan et Thilon. Descendants de Jisheï: Zocheth et Ben-Zocheth.'
  '21':
  - type: text
    content: 'Descendants de Shéla, le fils de Juda: Er, le père de Léca, Laeda, le père de Marésha, ainsi que les clans qui travaillent le textile à Beth-Ashbéa. '
  '22':
  - type: text
    content: 'Il avait aussi pour descendants Jokim, les habitants de Cozéba, Joas et Saraph – qui dominèrent sur Moab – et Jashubi-Léchem. Ces événements sont anciens. '
  '23':
  - type: text
    content: C'étaient les potiers et les habitants des plantations et des parcs; ils habitaient là près du roi et travaillaient pour lui.
  - type: heading
    content: Descendance de Siméon
  '24':
  - type: text
    content: 'Fils de Siméon: Nemuel, Jamin, Jarib, Zérach, Saül. '
  '25':
  - type: text
    content: 'Descendants de Saül: Shallum, lui-même père de Mibsam, père de Mishma. '
  '26':
  - type: text
    content: 'Descendants de Mishma: Hammuel, lui-même père de Zaccur, père de Shimeï. '
  '27':
  - type: text
    content: 'Shimeï eut 16 fils et 6 filles. Ses frères n''eurent pas beaucoup de fils et leur clan tout entier n''atteignit pas le nombre des descendants de Juda. '
  '28':
  - type: text
    content: 'Ils habitaient à Beer-Shéba, Molada, Hatsar-Shual, '
  '29':
  - type: text
    content: 'Bilha, Etsem, Tholad, '
  '3':
  - type: text
    content: 'Voici les descendants d''Etham: Jizreel, Jishma et Jidbash; leur sœur s''appelait Hatselelponi. '
  '30':
  - type: text
    content: 'Bethuel, Horma, Tsiklag, '
  '31':
  - type: text
    content: 'Beth-Marcaboth, Hatsar-Susim, Beth-Bireï et Shaaraïm. Telles furent leurs villes jusqu''au règne de David, avec leurs villages. '
  '32':
  - type: text
    content: 'Ils avaient encore Etham, Aïn, Rimmon, Thoken et Ashan, ce qui fait 5 villes, '
  '33':
  - type: text
    content: et tous les villages situés aux environs de ces villes, jusqu'à Baal. Voilà leurs lieux d'habitation et leur généalogie.
  '34':
  - type: text
    content: 'Quant à Meshobab, Jamlec, Josha, le fils d''Amatsia, '
  '35':
  - type: text
    content: 'Joël, Jéhu, le fils de Joshibia, lui-même fils de Seraja, fils d''Asiel, '
  '36':
  - type: text
    content: 'Eljoénaï, Jaakoba, Jeshochaja, Asaja, Adiel, Jesimiel, Benaja '
  '37':
  - type: text
    content: 'et Ziza, le fils de Shipheï, lui-même fils d''Allon, fils de Jedaja, fils de Shimri, fils de Shemaeja, '
  '38':
  - type: text
    content: 'ces hommes, qui viennent d''être désignés par leur nom, étaient chefs de leur clan, et leurs familles grandirent tant '
  '39':
  - type: text
    content: 'qu''ils allèrent du côté de Guedor, jusqu''à l''est de la vallée, afin de chercher des pâturages pour leurs troupeaux. '
  '4':
  - type: text
    content: Penuel, le père de Guedor, et Ezer, le père de Husha, étaient les fils de Hur, le fils aîné d'Ephrata, père de Bethléhem.
  '40':
  - type: text
    content: 'Ils y trouvèrent de riches et bons pâturages et une région vaste, tranquille et paisible, car ceux qui l''habitaient auparavant descendaient de Cham. '
  '41':
  - type: text
    content: Ces hommes mentionnés par leur nom arrivèrent là durant le règne d'Ezéchias sur Juda. Ils attaquèrent leurs tentes et les habitations qui se trouvaient là, ils les vouèrent à la destruction, et ce jusqu'à aujourd'hui. Puis ils s'installèrent à leur place, car il y avait là des pâturages pour leurs troupeaux.
  '42':
  - type: text
    content: 'Il y eut aussi 500 hommes parmi eux, parmi les descendants de Siméon, qui se rendirent dans la région montagneuse de Séir. Ils avaient à leur tête Pelathia, Nearia, Rephaja et Uziel, fils de Jisheï. '
  '43':
  - type: text
    content: Ils battirent le reste des survivants amalécites et s'installèrent là jusqu'à aujourd'hui.
  '5':
  - type: text
    content: 'Ashchur, père de Tekoa, eut deux femmes: Hélea et Naara. '
  '6':
  - type: text
    content: 'Naara lui donna Achuzzam, Hépher, Thémeni et Achashthari. Ce sont là les fils de Naara. '
  '7':
  - type: text
    content: Quant aux fils de Hélea, ce sont Tséreth, Tsochar et Ethnan.
  '8':
  - type: text
    content: 'Kots eut pour descendants Anub et Hatsobéba, ainsi que les clans d''Acharchel, le fils d''Harum. '
  '9':
  - type: text
    content: 'Jaebets fut plus honoré que ses frères. Sa mère l''avait appelé Jaebets en disant: «C''est parce que je lui ai donné naissance dans la douleur.» '
