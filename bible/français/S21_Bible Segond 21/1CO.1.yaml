document_id: 1CO.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Discordes et désordres dans l'Eglise
  - type: heading
    content: 1.1–6.20
  - type: heading
    content: Salutation et louange
  - type: text
    content: 'De la part de Paul, appelé à être un apôtre de Jésus-Christ par la volonté de Dieu, et du frère Sosthène '
  '10':
  - type: text
    content: 'Je vous supplie, frères et sœurs, par le nom de notre Seigneur Jésus-Christ, de tenir tous le même langage. Qu''il n''y ait pas de divisions parmi vous, mais soyez parfaitement unis dans le même état d''esprit et dans la même pensée. '
  '11':
  - type: text
    content: 'En effet, mes frères et sœurs, j''ai appris à votre sujet, par l''entourage de Chloé, qu''il y a des rivalités entre vous. '
  '12':
  - type: text
    content: 'Je veux dire par là que chacun de vous affirme: «Moi, je me rattache à Paul!» «Et moi, à Apollos!» «Et moi, à Céphas'
  - type: note
    content: 'Céphas: nom de l''apôtre Pierre en araméen.'
  - type: text
    content: '!» «Et moi, à Christ!» '
  '13':
  - type: text
    content: 'Christ est-il divisé? Paul a-t-il été crucifié pour vous ou est-ce au nom de Paul que vous avez été baptisés? '
  '14':
  - type: text
    content: 'Je remercie [Dieu] de ce que je n''ai baptisé aucun de vous, excepté Crispus et Gaïus. '
  '15':
  - type: text
    content: 'Ainsi, personne ne peut dire que j''ai baptisé en mon nom. '
  '16':
  - type: text
    content: J'ai encore baptisé la famille de Stéphanas. Pour le reste, que je sache, je n'ai baptisé personne d'autre.
  '17':
  - type: text
    content: 'De fait, ce n''est pas pour baptiser que Christ m''a envoyé, c''est pour annoncer l''Evangile, et cela sans recourir à la sagesse du langage, afin que la croix de Christ ne soit pas vidée de sa force. '
  '18':
  - type: text
    content: 'En effet, le message de la croix est une folie pour ceux qui périssent, mais pour nous qui sommes sauvés, il est la puissance de Dieu. '
  '19':
  - type: text
    content: 'Du reste, il est écrit: '
  - type: text
    content: Je ferai disparaître la sagesse des sages et j'anéantirai l'intelligence des intelligents
  - type: text
    content: .
  - type: note
    content: 'Je ferai… intelligents: citation d''Esaïe 29.14.'
  '2':
  - type: text
    content: 'à l''Eglise de Dieu qui est à Corinthe, à ceux qui ont été conduits à la sainteté par Jésus-Christ, appelés à être saints, et à tous ceux qui, partout, font appel au nom de notre Seigneur Jésus-Christ, leur Seigneur et le nôtre: '
  '20':
  - type: text
    content: 'Où est le sage? Où est le spécialiste de la loi? Où est le discoureur de l''ère actuelle? Dieu n''a-t-il pas convaincu de folie la sagesse de ce monde? '
  '21':
  - type: text
    content: 'Puisque à travers cette sagesse le monde n''a pas connu Dieu en voyant sa sagesse, il a plu à Dieu de sauver les croyants à travers la folie de la prédication. '
  '22':
  - type: text
    content: 'Les Juifs demandent un signe miraculeux et les Grecs recherchent la sagesse. '
  '23':
  - type: text
    content: 'Or nous, nous prêchons un Messie crucifié, scandale pour les Juifs et folie pour les non-Juifs, '
  '24':
  - type: text
    content: 'mais puissance de Dieu et sagesse de Dieu pour ceux qui sont appelés, qu''ils soient juifs ou non. '
  '25':
  - type: text
    content: En effet, la folie de Dieu est plus sage que les hommes et la faiblesse de Dieu est plus forte que les hommes.
  '26':
  - type: text
    content: 'Considérez, frères et sœurs, votre propre appel: il n''y a parmi vous ni beaucoup de sages selon les critères humains, ni beaucoup de puissants, ni beaucoup de nobles. '
  '27':
  - type: text
    content: 'Mais Dieu a choisi les choses folles du monde pour couvrir de honte les sages, et Dieu a choisi les choses faibles du monde pour couvrir de honte les fortes. '
  '28':
  - type: text
    content: 'Dieu a choisi les choses basses et méprisées du monde, celles qui ne sont rien, pour réduire à néant celles qui sont, '
  '29':
  - type: text
    content: 'afin que personne ne puisse faire le fier devant Dieu. '
  '3':
  - type: text
    content: que la grâce et la paix vous soient données de la part de Dieu notre Père et du Seigneur Jésus-Christ!
  '30':
  - type: text
    content: 'C''est grâce à lui que vous êtes en Jésus-Christ, lui qui est devenu, par la volonté de Dieu, notre sagesse, notre justice, la source de notre sainteté et notre libérateur, '
  '31':
  - type: text
    content: 'afin, comme il est écrit, '
  - type: text
    content: que celui qui veut éprouver de la fierté mette sa fierté dans le Seigneur
  - type: note
    content: 'Que celui… le Seigneur: citation de Jérémie 9.23.'
  - type: text
    content: .
  '4':
  - type: text
    content: 'Je dis constamment à mon Dieu toute ma reconnaissance à votre sujet pour la grâce de Dieu qui vous a été accordée en Jésus-Christ. '
  '5':
  - type: text
    content: 'En effet, en lui vous avez été comblés de toutes les richesses, en particulier en ce qui concerne la parole et la connaissance, '
  '6':
  - type: text
    content: 'dans la mesure où le témoignage de Christ a été solidement établi parmi vous. '
  '7':
  - type: text
    content: 'Ainsi, il ne vous manque aucun don, à vous qui attendez le moment où notre Seigneur Jésus-Christ apparaîtra. '
  '8':
  - type: text
    content: 'C''est lui aussi qui vous affermira jusqu''à la fin pour que vous soyez irréprochables le jour de notre Seigneur Jésus-Christ. '
  '9':
  - type: text
    content: Dieu est fidèle, lui qui vous a appelés à vivre en communion avec son Fils, Jésus-Christ notre Seigneur.
  - type: heading
    content: Rivalités humaines et sagesse divine
