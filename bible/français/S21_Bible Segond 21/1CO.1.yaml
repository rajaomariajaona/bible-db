document_id: 1CO.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Discordes et désordres dans l'Eglise
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 1.1–6.20
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salutation et louange
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'De la part de Paul, appelé à être un apôtre de Jésus-Christ par la volonté de Dieu, et du frère Sosthène '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'à l''Eglise de Dieu qui est à Corinthe, à ceux qui ont été conduits à la sainteté par Jésus-Christ, appelés à être saints, et à tous ceux qui, partout, font appel au nom de notre Seigneur Jésus-Christ, leur Seigneur et le nôtre: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: que la grâce et la paix vous soient données de la part de Dieu notre Père et du Seigneur Jésus-Christ!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je dis constamment à mon Dieu toute ma reconnaissance à votre sujet pour la grâce de Dieu qui vous a été accordée en Jésus-Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'En effet, en lui vous avez été comblés de toutes les richesses, en particulier en ce qui concerne la parole et la connaissance, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'dans la mesure où le témoignage de Christ a été solidement établi parmi vous. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ainsi, il ne vous manque aucun don, à vous qui attendez le moment où notre Seigneur Jésus-Christ apparaîtra. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'C''est lui aussi qui vous affermira jusqu''à la fin pour que vous soyez irréprochables le jour de notre Seigneur Jésus-Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dieu est fidèle, lui qui vous a appelés à vivre en communion avec son Fils, Jésus-Christ notre Seigneur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rivalités humaines et sagesse divine
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Je vous supplie, frères et sœurs, par le nom de notre Seigneur Jésus-Christ, de tenir tous le même langage. Qu''il n''y ait pas de divisions parmi vous, mais soyez parfaitement unis dans le même état d''esprit et dans la même pensée. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'En effet, mes frères et sœurs, j''ai appris à votre sujet, par l''entourage de Chloé, qu''il y a des rivalités entre vous. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je veux dire par là que chacun de vous affirme: «Moi, je me rattache à Paul!» «Et moi, à Apollos!» «Et moi, à Céphas'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Céphas: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nom de l'apôtre Pierre en araméen.
    marker-yv: yv-n
  - type: text
    text: '!» «Et moi, à Christ!» '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Christ est-il divisé? Paul a-t-il été crucifié pour vous ou est-ce au nom de Paul que vous avez été baptisés? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Je remercie [Dieu] de ce que je n''ai baptisé aucun de vous, excepté Crispus et Gaïus. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ainsi, personne ne peut dire que j''ai baptisé en mon nom. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: J'ai encore baptisé la famille de Stéphanas. Pour le reste, que je sache, je n'ai baptisé personne d'autre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'De fait, ce n''est pas pour baptiser que Christ m''a envoyé, c''est pour annoncer l''Evangile, et cela sans recourir à la sagesse du langage, afin que la croix de Christ ne soit pas vidée de sa force. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'En effet, le message de la croix est une folie pour ceux qui périssent, mais pour nous qui sommes sauvés, il est la puissance de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Du reste, il est écrit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Je ferai disparaître la sagesse des sages et j'anéantirai l'intelligence des intelligents
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je ferai… intelligents: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 29.14
      metadata:
        usfm: ISA.29.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Où est le sage? Où est le spécialiste de la loi? Où est le discoureur de l''ère actuelle? Dieu n''a-t-il pas convaincu de folie la sagesse de ce monde? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Puisque à travers cette sagesse le monde n''a pas connu Dieu en voyant sa sagesse, il a plu à Dieu de sauver les croyants à travers la folie de la prédication. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les Juifs demandent un signe miraculeux et les Grecs recherchent la sagesse. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Or nous, nous prêchons un Messie crucifié, scandale pour les Juifs et folie pour les non-Juifs, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'mais puissance de Dieu et sagesse de Dieu pour ceux qui sont appelés, qu''ils soient juifs ou non. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: En effet, la folie de Dieu est plus sage que les hommes et la faiblesse de Dieu est plus forte que les hommes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Considérez, frères et sœurs, votre propre appel: il n''y a parmi vous ni beaucoup de sages selon les critères humains, ni beaucoup de puissants, ni beaucoup de nobles. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Mais Dieu a choisi les choses folles du monde pour couvrir de honte les sages, et Dieu a choisi les choses faibles du monde pour couvrir de honte les fortes. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dieu a choisi les choses basses et méprisées du monde, celles qui ne sont rien, pour réduire à néant celles qui sont, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'afin que personne ne puisse faire le fier devant Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'C''est grâce à lui que vous êtes en Jésus-Christ, lui qui est devenu, par la volonté de Dieu, notre sagesse, notre justice, la source de notre sainteté et notre libérateur, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'afin, comme il est écrit, '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: que celui qui veut éprouver de la fierté mette sa fierté dans le Seigneur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Que celui… le Seigneur: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jérémie 9.23
      metadata:
        usfm: JER.9.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
