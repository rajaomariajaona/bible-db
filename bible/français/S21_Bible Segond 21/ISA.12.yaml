document_id: ISA.12,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière de reconnaissance
  - type: text
    content: 'Ce jour-là, tu diras:'
  - type: text
    content: «Je te célèbre, Eternel,
  - type: text
    content: car tu as été irrité contre moi.
  - type: text
    content: Ta colère s'est détournée et tu m'as consolé.
  '2':
  - type: text
    content: Dieu est mon Sauveur.
  - type: text
    content: Je serai plein de confiance et je n'aurai plus peur,
  - type: text
    content: car l'Eternel, oui, *l'Eternel est ma force et le sujet de mes louanges.
  - type: text
    content: C'est lui qui m'a sauvé.
  - type: note
    content: 'L''Eternel est… m''a sauvé: paroles du cantique de Moïse et des Israélites après la traversée de la mer en Exode 15.2, reprises aussi au Psaume 118.14.'
  - type: text
    content: »
  '3':
  - type: text
    content: Vous puiserez avec joie de l'eau
  - type: text
    content: aux sources du salut
  '4':
  - type: text
    content: 'et vous direz, ce jour-là:'
  - type: text
    content: «Célébrez l'Eternel, faites appel à lui,
  - type: text
    content: faites connaître ses actes parmi les peuples,
  - type: text
    content: rappelez combien son nom est grand!
  '5':
  - type: text
    content: 'Chantez l''Eternel, car il a fait des choses magnifiques:'
  - type: text
    content: qu'on les fasse connaître sur toute la terre!»
  '6':
  - type: text
    content: Pousse des cris de joie, exprime ton allégresse, habitante de Sion!
  - type: text
    content: En effet, il est grand au milieu de toi, le Saint d'Israël.
