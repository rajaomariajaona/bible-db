document_id: ISA.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière de reconnaissance
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ce jour-là, tu diras:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Je te célèbre, Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu as été irrité contre moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ta colère s'est détournée et tu m'as consolé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dieu est mon Sauveur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je serai plein de confiance et je n'aurai plus peur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car l'Eternel, oui, *l'Eternel est ma force et le sujet de mes louanges.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est lui qui m'a sauvé.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''Eternel est… m''a sauvé: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'paroles du cantique de Moïse et des Israélites après la traversée de la mer en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 15.2
      metadata:
        usfm: EXO.15.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', reprises aussi au '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 118.14
      metadata:
        usfm: PSA.118.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Vous puiserez avec joie de l'eau
- type: usfm
  marker: q1
  children:
  - type: text
    text: aux sources du salut
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'et vous direz, ce jour-là:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Célébrez l'Eternel, faites appel à lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: faites connaître ses actes parmi les peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rappelez combien son nom est grand!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Chantez l''Eternel, car il a fait des choses magnifiques:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'on les fasse connaître sur toute la terre!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Pousse des cris de joie, exprime ton allégresse, habitante de Sion!
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, il est grand au milieu de toi, le Saint d'Israël.
