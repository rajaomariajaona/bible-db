document_id: 2TI.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation et louange
  - type: text
    content: 'De la part de Paul, apôtre de Jésus-Christ par la volonté de Dieu pour annoncer la promesse de la vie qui est en Jésus-Christ, '
  '10':
  - type: text
    content: 'et qui a maintenant été révélée par la venue de notre Sauveur Jésus-Christ. C''est lui qui a réduit la mort à l''impuissance et a mis en lumière la vie et l''immortalité par l''Evangile, '
  '11':
  - type: text
    content: pour lequel j'ai été établi prédicateur et apôtre, chargé d'enseigner [les non-Juifs].
  '12':
  - type: text
    content: Voilà pourquoi j'endure ces souffrances, mais je n'en ai pas honte, car je sais en qui j'ai cru et je suis persuadé qu'il a la puissance de garder le dépôt qu'il m'a confié jusqu'à ce jour-là
  - type: note
    content: 'Ce jour-là: c''est-à-dire le jour du jugement et des récompenses.'
  - type: text
    content: .
  '13':
  - type: text
    content: 'Prends pour modèle les saines paroles que tu as entendues de moi, dans la foi et l''amour qui sont en Jésus-Christ. '
  '14':
  - type: text
    content: Grâce au Saint-Esprit qui habite en nous, garde le beau dépôt qui t'a été confié.
  '15':
  - type: text
    content: 'Tu sais que tous ceux qui sont en Asie m''ont abandonné, notamment Phygelle et Hermogène. '
  '16':
  - type: text
    content: 'Que le Seigneur accorde sa compassion à la famille d''Onésiphore, car il m''a souvent réconforté et n''a pas eu honte de ma situation de prisonnier. '
  '17':
  - type: text
    content: 'Au contraire, lorsqu''il est venu à Rome, il m''a cherché avec beaucoup d''empressement et m''a trouvé. '
  '18':
  - type: text
    content: Que le Seigneur lui donne d'obtenir grâce auprès du Seigneur ce jour-là. Tu sais mieux que personne combien de services il a rendus à Ephèse.
  '2':
  - type: text
    content: 'à Timothée, mon enfant bien-aimé: que la grâce, la compassion et la paix te soient données de la part de Dieu le Père et de Jésus-Christ notre Seigneur!'
  '3':
  - type: text
    content: 'Je suis reconnaissant envers Dieu – que je sers, à l''exemple de mes ancêtres, avec une conscience pure – lorsque sans cesse, nuit et jour, je me souviens de toi dans mes prières. '
  '4':
  - type: text
    content: 'Je me rappelle tes larmes et je désire te voir afin d''être rempli de joie. '
  '5':
  - type: text
    content: Je garde en effet le souvenir de la foi sincère qui est en toi. Elle a d'abord habité ta grand-mère Loïs et ta mère Eunice, et je suis persuadé qu'elle habite aussi en toi.
  - type: heading
    content: Encouragement à la fidélité
  '6':
  - type: text
    content: 'C''est pourquoi, je te le rappelle, ranime la flamme du don de Dieu que tu as reçu lorsque j''ai posé mes mains sur toi. '
  '7':
  - type: text
    content: 'En effet, ce n''est pas un esprit de timidité que Dieu nous a donné, mais un esprit de force, d''amour et de sagesse. '
  '8':
  - type: text
    content: 'N''aie donc pas honte du témoignage à rendre à notre Seigneur, ni de moi son prisonnier, mais souffre avec moi pour l''Evangile en comptant sur la puissance de Dieu. '
  '9':
  - type: text
    content: 'Il nous a sauvés et nous a adressé un saint appel. Et il ne l''a pas fait à cause de nos œuvres, mais à cause de son propre plan et de sa grâce, qui nous a été accordée en Jésus-Christ de toute éternité '
