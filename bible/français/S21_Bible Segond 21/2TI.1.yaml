document_id: 2TI.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salutation et louange
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'De la part de Paul, apôtre de Jésus-Christ par la volonté de Dieu pour annoncer la promesse de la vie qui est en Jésus-Christ, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'à Timothée, mon enfant bien-aimé: que la grâce, la compassion et la paix te soient données de la part de Dieu le Père et de Jésus-Christ notre Seigneur!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je suis reconnaissant envers Dieu – que je sers, à l''exemple de mes ancêtres, avec une conscience pure – lorsque sans cesse, nuit et jour, je me souviens de toi dans mes prières. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je me rappelle tes larmes et je désire te voir afin d''être rempli de joie. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je garde en effet le souvenir de la foi sincère qui est en toi. Elle a d'abord habité ta grand-mère Loïs et ta mère Eunice, et je suis persuadé qu'elle habite aussi en toi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Encouragement à la fidélité
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'C''est pourquoi, je te le rappelle, ranime la flamme du don de Dieu que tu as reçu lorsque j''ai posé mes mains sur toi. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'En effet, ce n''est pas un esprit de timidité que Dieu nous a donné, mais un esprit de force, d''amour et de sagesse. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'N''aie donc pas honte du témoignage à rendre à notre Seigneur, ni de moi son prisonnier, mais souffre avec moi pour l''Evangile en comptant sur la puissance de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il nous a sauvés et nous a adressé un saint appel. Et il ne l''a pas fait à cause de nos œuvres, mais à cause de son propre plan et de sa grâce, qui nous a été accordée en Jésus-Christ de toute éternité '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'et qui a maintenant été révélée par la venue de notre Sauveur Jésus-Christ. C''est lui qui a réduit la mort à l''impuissance et a mis en lumière la vie et l''immortalité par l''Evangile, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: pour lequel j'ai été établi prédicateur et apôtre, chargé d'enseigner [les non-Juifs].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Voilà pourquoi j'endure ces souffrances, mais je n'en ai pas honte, car je sais en qui j'ai cru et je suis persuadé qu'il a la puissance de garder le dépôt qu'il m'a confié jusqu'à ce jour-là
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ce jour-là: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire le jour du jugement et des récompenses.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Prends pour modèle les saines paroles que tu as entendues de moi, dans la foi et l''amour qui sont en Jésus-Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Grâce au Saint-Esprit qui habite en nous, garde le beau dépôt qui t'a été confié.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tu sais que tous ceux qui sont en Asie m''ont abandonné, notamment Phygelle et Hermogène. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Que le Seigneur accorde sa compassion à la famille d''Onésiphore, car il m''a souvent réconforté et n''a pas eu honte de ma situation de prisonnier. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Au contraire, lorsqu''il est venu à Rome, il m''a cherché avec beaucoup d''empressement et m''a trouvé. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Que le Seigneur lui donne d'obtenir grâce auprès du Seigneur ce jour-là. Tu sais mieux que personne combien de services il a rendus à Ephèse.
