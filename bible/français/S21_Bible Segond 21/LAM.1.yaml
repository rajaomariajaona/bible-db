document_id: LAM.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le malheur de Jérusalem
  - type: text
    content: Comment! Elle est assise solitaire, cette ville
  - type: note
    content: 'Cette ville: c''est-à-dire Jérusalem.'
  - type: text
    content: ' si peuplée,'
  - type: text
    content: elle est pareille à une veuve! Elle qui était grande parmi les nations, elle qui était une princesse parmi les provinces,
  - type: text
    content: la voilà maintenant astreinte à la corvée!
  '10':
  - type: text
    content: L'adversaire a étendu la main
  - type: text
    content: sur tout ce qu'elle avait de précieux.
  - type: text
    content: En effet, Jérusalem a vu les nations pénétrer dans son sanctuaire,
  - type: text
    content: alors que tu leur avais interdit d'entrer dans ton assemblée.
  '11':
  - type: text
    content: Toute sa population gémit, elle cherche du pain.
  - type: text
    content: Ils ont donné tout ce qu'ils avaient de précieux pour de la nourriture
  - type: text
    content: afin de retrouver des forces.
  - type: text
    content: «Vois, Eternel, regarde, car je suis méprisée!
  '12':
  - type: text
    content: Que cela ne vous arrive pas, à vous qui passez sur le chemin!
  - type: text
    content: Regardez et voyez s'il y a une souffrance pareille à la mienne,
  - type: text
    content: à celle qui me fait si mal,
  - type: text
    content: à celle que l'Eternel m'a infligée le jour où il a déversé toute l'ardeur de sa colère.
  '13':
  - type: text
    content: D'en haut il a lancé un feu dans mes os et il les piétine.
  - type: text
    content: Il a tendu un piège sous mes pieds,
  - type: text
    content: il m'a fait tomber en arrière.
  - type: text
    content: Il m'a livrée à la dévastation, je suis constamment souffrante.
  '14':
  - type: text
    content: Sa main a fait de mes transgressions une charge,
  - type: text
    content: elles se sont entremêlées, hissées sur ma nuque. Il a brisé ma force.
  - type: text
    content: Le Seigneur m'a livrée entre des mains auxquelles je suis incapable de résister.
  '15':
  - type: text
    content: Le Seigneur a terrassé tous les guerriers qui étaient avec moi,
  - type: text
    content: il a convoqué contre moi un rassemblement
  - type: text
    content: pour briser mes jeunes hommes.
  - type: text
    content: Le Seigneur a écrasé au pressoir la jeune fille, la fille de Juda.
  '16':
  - type: text
    content: C'est pour cela que je pleure. Mes yeux fondent en larmes
  - type: text
    content: car il s'est éloigné de moi, celui qui pourrait me consoler,
  - type: text
    content: celui qui aurait pu me redonner des forces.
  - type: text
    content: Mes fils sont désespérés car l'ennemi est puissant.»
  '17':
  - type: text
    content: Sion a tendu les mains
  - type: text
    content: et personne ne l'a consolée;
  - type: text
    content: l'Eternel a donné ses ordres contre Jacob aux adversaires qui l'entouraient
  - type: text
    content: et Jérusalem est devenue un objet d'horreur au milieu d'eux.
  '18':
  - type: text
    content: «L'Eternel est juste,
  - type: text
    content: car je me suis révoltée contre ses ordres.
  - type: text
    content: Ecoutez donc, vous, tous les peuples, et voyez ma douleur!
  - type: text
    content: Mes jeunes filles et mes jeunes hommes sont partis en déportation;
  '19':
  - type: text
    content: j'ai appelé mes amis et ils m'ont trompée;
  - type: text
    content: mes prêtres et mes anciens ont expiré dans la ville,
  - type: text
    content: alors qu'ils cherchaient de la nourriture
  - type: text
    content: pour retrouver des forces.
  '2':
  - type: text
    content: Elle pleure durant la nuit et ses joues sont couvertes de larmes.
  - type: text
    content: 'Parmi tous ceux qui l''aimaient, pas un ne la console:'
  - type: text
    content: tous ses amis l'ont trahie,
  - type: text
    content: ils sont devenus ses ennemis.
  '20':
  - type: text
    content: Regarde, Eternel, car je suis dans la détresse!
  - type: text
    content: Je suis profondément tourmentée,
  - type: text
    content: profondément bouleversée,
  - type: text
    content: car j'ai été vraiment rebelle.
  - type: text
    content: Dehors, l'épée m'a privée d'enfants; dedans, c'est la mort.
  '21':
  - type: text
    content: On a entendu mes gémissements et personne ne m'a consolée.
  - type: text
    content: Tous mes ennemis ont appris mon malheur,
  - type: text
    content: et ils se sont réjouis de ce que tu en étais l'auteur.
  - type: text
    content: Tu as fait venir le jour que tu avais annoncé. Qu'ils deviennent eux aussi pareils à moi!
  '22':
  - type: text
    content: Que toute leur méchanceté vienne devant toi!
  - type: text
    content: Traite-les comme tu m'as traitée
  - type: text
    content: à cause de toutes mes transgressions,
  - type: text
    content: car mes soupirs sont nombreux et mon cœur est souffrant!»
  '3':
  - type: text
    content: Juda est en exil, accablé par la misère et un grand esclavage.
  - type: text
    content: Il habite au milieu des nations
  - type: text
    content: sans y trouver de repos.
  - type: text
    content: Tous ses persécuteurs l'ont rattrapé au beau milieu des détresses.
  '4':
  - type: text
    content: Les chemins de Sion sont dans le deuil, car on ne va plus aux fêtes.
  - type: text
    content: Toutes ses portes sont désertes,
  - type: text
    content: ses prêtres gémissent,
  - type: text
    content: ses jeunes filles sont pleines de chagrin et elle-même est remplie d'amertume.
  '5':
  - type: text
    content: Ses adversaires ont pris le dessus, ses ennemis sont tranquilles,
  - type: text
    content: car c'est l'Eternel qui l'a plongée dans le chagrin
  - type: text
    content: à cause du grand nombre de ses transgressions.
  - type: text
    content: Ses enfants ont marché en déportés devant l'adversaire.
  '6':
  - type: text
    content: La fille de Sion a perdu toute sa splendeur.
  - type: text
    content: Ses chefs sont pareils à des cerfs
  - type: text
    content: qui n'ont rien trouvé à brouter
  - type: text
    content: et qui fuient, sans force, devant celui qui les pourchasse.
  '7':
  - type: text
    content: Durant ces jours de misère et d'errance,
  - type: text
    content: Jérusalem s'est souvenue
  - type: text
    content: de tous les biens précieux dont elle jouissait par le passé.
  - type: text
    content: 'Quand sa population est tombée entre les mains de l''adversaire, il n''y a eu personne pour l''aider:'
  - type: text
    content: ses ennemis l'ont regardée et ont ri de sa chute.
  '8':
  - type: text
    content: Jérusalem a gravement péché.
  - type: text
    content: Voilà pourquoi elle inspire le dégoût.
  - type: text
    content: Tous ceux qui l'honoraient la méprisent, car ils ont vu sa nudité.
  - type: text
    content: Elle-même gémit et tourne le dos.
  '9':
  - type: text
    content: Son impureté se trouve dans les pans de sa robe. Elle n'avait pas imaginé sa fin;
  - type: text
    content: elle est tombée d'une manière étonnante et personne ne la console.
  - type: text
    content: «Vois ma misère, Eternel,
  - type: text
    content: face à l'arrogance de l'ennemi!»
