document_id: LAM.1,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le malheur de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment! Elle est assise solitaire, cette ville
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Cette ville: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire Jérusalem.
      marker-yv: yv-n
    - type: text
      text: ' si peuplée,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle est pareille à une veuve! Elle qui était grande parmi les nations, elle qui était une princesse parmi les provinces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la voilà maintenant astreinte à la corvée!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'adversaire a étendu la main
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur tout ce qu'elle avait de précieux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, Jérusalem a vu les nations pénétrer dans son sanctuaire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors que tu leur avais interdit d'entrer dans ton assemblée.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toute sa population gémit, elle cherche du pain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont donné tout ce qu'ils avaient de précieux pour de la nourriture
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin de retrouver des forces.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Vois, Eternel, regarde, car je suis méprisée!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que cela ne vous arrive pas, à vous qui passez sur le chemin!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Regardez et voyez s'il y a une souffrance pareille à la mienne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à celle qui me fait si mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à celle que l'Eternel m'a infligée le jour où il a déversé toute l'ardeur de sa colère.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: D'en haut il a lancé un feu dans mes os et il les piétine.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a tendu un piège sous mes pieds,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il m'a fait tomber en arrière.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il m'a livrée à la dévastation, je suis constamment souffrante.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa main a fait de mes transgressions une charge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles se sont entremêlées, hissées sur ma nuque. Il a brisé ma force.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Seigneur m'a livrée entre des mains auxquelles je suis incapable de résister.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Seigneur a terrassé tous les guerriers qui étaient avec moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a convoqué contre moi un rassemblement
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour briser mes jeunes hommes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Seigneur a écrasé au pressoir la jeune fille, la fille de Juda.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est pour cela que je pleure. Mes yeux fondent en larmes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il s'est éloigné de moi, celui qui pourrait me consoler,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui aurait pu me redonner des forces.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes fils sont désespérés car l'ennemi est puissant.»
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sion a tendu les mains
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et personne ne l'a consolée;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'Eternel a donné ses ordres contre Jacob aux adversaires qui l'entouraient
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Jérusalem est devenue un objet d'horreur au milieu d'eux.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «L'Eternel est juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je me suis révoltée contre ses ordres.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoutez donc, vous, tous les peuples, et voyez ma douleur!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes jeunes filles et mes jeunes hommes sont partis en déportation;
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'ai appelé mes amis et ils m'ont trompée;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mes prêtres et mes anciens ont expiré dans la ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors qu'ils cherchaient de la nourriture
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour retrouver des forces.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle pleure durant la nuit et ses joues sont couvertes de larmes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Parmi tous ceux qui l''aimaient, pas un ne la console:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous ses amis l'ont trahie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont devenus ses ennemis.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Regarde, Eternel, car je suis dans la détresse!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis profondément tourmentée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: profondément bouleversée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car j'ai été vraiment rebelle.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dehors, l'épée m'a privée d'enfants; dedans, c'est la mort.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On a entendu mes gémissements et personne ne m'a consolée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous mes ennemis ont appris mon malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils se sont réjouis de ce que tu en étais l'auteur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as fait venir le jour que tu avais annoncé. Qu'ils deviennent eux aussi pareils à moi!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que toute leur méchanceté vienne devant toi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Traite-les comme tu m'as traitée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de toutes mes transgressions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car mes soupirs sont nombreux et mon cœur est souffrant!»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Juda est en exil, accablé par la misère et un grand esclavage.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il habite au milieu des nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans y trouver de repos.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ses persécuteurs l'ont rattrapé au beau milieu des détresses.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les chemins de Sion sont dans le deuil, car on ne va plus aux fêtes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes ses portes sont désertes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses prêtres gémissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses jeunes filles sont pleines de chagrin et elle-même est remplie d'amertume.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses adversaires ont pris le dessus, ses ennemis sont tranquilles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c'est l'Eternel qui l'a plongée dans le chagrin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause du grand nombre de ses transgressions.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses enfants ont marché en déportés devant l'adversaire.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La fille de Sion a perdu toute sa splendeur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses chefs sont pareils à des cerfs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui n'ont rien trouvé à brouter
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui fuient, sans force, devant celui qui les pourchasse.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Durant ces jours de misère et d'errance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jérusalem s'est souvenue
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de tous les biens précieux dont elle jouissait par le passé.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Quand sa population est tombée entre les mains de l''adversaire, il n''y a eu personne pour l''aider:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses ennemis l'ont regardée et ont ri de sa chute.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jérusalem a gravement péché.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà pourquoi elle inspire le dégoût.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui l'honoraient la méprisent, car ils ont vu sa nudité.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle-même gémit et tourne le dos.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son impureté se trouve dans les pans de sa robe. Elle n'avait pas imaginé sa fin;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle est tombée d'une manière étonnante et personne ne la console.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Vois ma misère, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: face à l'arrogance de l'ennemi!»
