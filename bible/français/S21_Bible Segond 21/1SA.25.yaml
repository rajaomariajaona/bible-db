document_id: 1SA.25,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Méchanceté de Nabal
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Samuel mourut. Tout Israël se rassembla pour le pleurer et on l'enterra chez lui à Rama. Quant à David, il se leva et descendit au désert de Paran.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nabal répondit aux serviteurs de David: «Qui est David et qui est le fils d''Isaï? Il y a aujourd''hui beaucoup de serviteurs qui s''échappent de chez leur maître. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et je devrais prendre mon pain, mon eau, mon bétail que j'ai tué pour mes tondeurs, pour les donner à des gens qui sortent je ne sais d'où?»
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les hommes de David rebroussèrent chemin, ils repartirent et répétèrent, à leur arrivée, toutes ces paroles à David. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors David dit à ses hommes: «Que chacun de vous prenne son épée!» Et ils prirent chacun leur épée. David aussi prit la sienne, et environ 400 hommes montèrent à sa suite, tandis que 200 restaient près du matériel.'
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un des serviteurs de Nabal vint dire à Abigaïl, la femme de Nabal: «David a envoyé du désert des messagers pour saluer notre maître, et celui-ci les a traités avec dureté. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pourtant ces hommes se sont montrés très bons pour nous. Ils ne nous ont fait aucun mal et rien ne nous a été volé durant tout le temps où nous avons été avec eux lorsque nous étions dans les champs. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils nous ont nuit et jour servi de protection, durant tout le temps où nous avons été avec eux pour garder les troupeaux. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Maintenant, sache et vois ce que tu as à faire, car la perte de notre maître et de toute sa famille est décidée. Lui-même est si méchant que nous n'osons pas lui parler.»
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abigaïl prit aussitôt 200 pains, 2 outres de vin, 5 brebis toutes préparées, 5 mesures de grain rôti, 100 gâteaux aux raisins secs et 200 aux figues sèches. Elle chargea tout cela sur des ânes '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et dit à ses serviteurs: «Passez devant moi, je vais vous suivre.» Elle ne dit rien à Nabal, son mari. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait à Maon un homme très riche, qui possédait des biens à Carmel. Il avait 3000 brebis et 1000 chèvres, et il se trouvait à Carmel pour la tonte de ses brebis. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Montée sur un âne, elle descendit, cachée par la montagne. David et ses hommes descendaient en face d''elle, de sorte qu''elle les rencontra. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David avait dit: «C''est bien inutilement que j''ai gardé tout ce que cet homme a dans le désert et que rien de tout ce qu''il possède n''a été volé. Il m''a rendu le mal pour le bien. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que Dieu traite son serviteur David avec la plus grande sévérité, si je laisse en vie jusqu'au matin un seul homme parmi tous ceux qui appartiennent à Nabal!»
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Abigaïl aperçut David, elle descendit rapidement de l''âne, tomba sur son visage devant lui et se prosterna contre terre. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis, se jetant à ses pieds, elle dit: «C''est ma faute, mon seigneur! Permets à ta servante de te parler et écoute ses paroles. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que mon seigneur ne prête pas attention à ce méchant homme, à Nabal, car il porte bien son nom: il s''appelle Nabal et il y a chez lui de la folie. Quant à moi, ta servante, je n''ai pas vu les hommes que toi, mon seigneur, tu avais envoyés. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, mon seigneur, aussi vrai que l''Eternel est vivant et que ton âme est vivante, c''est l''Eternel qui t''a empêché de verser le sang et qui a retenu ta main. Que tes ennemis, que ceux qui veulent du mal à mon seigneur, soient pareils à Nabal! '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Accepte ce cadeau que moi, ta servante, je t''apporte, à toi mon seigneur, et qu''il soit distribué aux hommes qui marchent à la suite de mon seigneur. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pardonne la faute de ta servante! En effet, l''Eternel accordera à mon seigneur une maison stable, car mon seigneur soutient les guerres de l''Eternel et on ne trouvera jamais rien de mauvais chez toi. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si quelqu''un se dresse pour te poursuivre et en veut à ta vie, ton âme, mon seigneur, sera bien gardée avec les vivants auprès de l''Eternel, ton Dieu. En revanche, il enverra au loin comme avec une fronde l''âme de tes ennemis. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le nom de cet homme était Nabal et sa femme s'appelait Abigaïl. C'était une femme pleine de bon sens et très belle, tandis que son mari était dur et méchant dans sa manière d'agir. Il descendait de Caleb.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque l''Eternel aura fait à mon seigneur tout le bien qu''il t''a annoncé et qu''il t''aura établi chef sur Israël, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mon seigneur n'aura ni remords ni trouble dans son cœur pour avoir versé le sang inutilement et pour s'être vengé lui-même. Et lorsque l'Eternel aura fait du bien à mon seigneur, souviens-toi de ta servante.»
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David dit à Abigaïl: «Béni soit l''Eternel, le Dieu d''Israël, qui t''a envoyée aujourd''hui à ma rencontre! '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Béni soit ton bon sens et bénie sois-tu, toi qui m''as empêché aujourd''hui de verser le sang et qui as retenu ma main! '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais l''Eternel, le Dieu d''Israël, qui m''a empêché de te faire du mal est vivant, si tu ne t''étais pas dépêchée de venir à ma rencontre, il ne serait pas resté un seul homme à Nabal d''ici le matin.» '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David prit ce qu''Abigaïl lui avait apporté et lui dit: «Monte en paix chez toi. Tu vois, je t''ai écoutée et je t''ai bien accueillie.»'
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abigaïl arriva vers Nabal alors qu''il faisait un festin digne d''un roi dans sa maison. Il avait le cœur joyeux et il était complètement ivre. Elle ne lui dit pas un seul mot jusqu''au matin. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais le matin, l''ivresse de Nabal s''était dissipée et sa femme lui raconta ce qui s''était passé. Le cœur de Nabal reçut un coup mortel et il devint aussi inerte qu''une pierre. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Environ dix jours après, l'Eternel frappa Nabal et il mourut.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David apprit que Nabal était mort et il dit: «Béni soit l''Eternel! Il a défendu ma cause dans l''affront que m''a fait Nabal et il a empêché son serviteur de faire le mal. L''Eternel a fait retomber la méchanceté de Nabal sur sa tête.» David envoya proposer à Abigaïl de devenir sa femme. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors qu''il était au désert, David apprit que Nabal tondait ses brebis. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les serviteurs de David arrivèrent chez Abigaïl à Carmel. Ils lui dirent: «David nous a envoyés vers toi parce qu''il désire te prendre pour femme.» '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle se leva, se prosterna le visage contre terre et dit: «Voici, moi ta servante, je serai une esclave pour laver les pieds des serviteurs de mon seigneur.» '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abigaïl partit immédiatement, montée sur un âne et accompagnée de cinq jeunes filles. Elle suivit les messagers de David et devint ainsi sa femme.
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David avait aussi épousé Achinoam de Jizreel, et toutes les deux furent ses femmes. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Saül avait donné sa fille Mical, la femme de David, à Palthi de Gallim, fils de Laïsh.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il envoya dix jeunes gens vers lui en leur ordonnant: «Montez à Carmel et allez trouver Nabal. Vous le saluerez en mon nom '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et lui direz: ‘Longue vie à toi! Que la paix soit avec toi, avec ta famille et avec tout ce qui t''appartient! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, j''ai appris que tu as chez toi les tondeurs. Or, lorsque tes bergers étaient avec nous, nous ne leur avons fait aucun mal et rien ne leur a été volé durant tout le temps où ils étaient avec nous à Carmel. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Demande-le à tes serviteurs et ils te le confirmeront. Que ces jeunes gens trouvent donc grâce à tes yeux, puisque nous venons dans un jour de joie. Donne donc à tes serviteurs et à ton fils David ce que tu as sous la main.’»
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque les hommes de David furent arrivés, ils répétèrent toutes ces paroles à Nabal, au nom de David, puis ils se turent. '
