document_id: NUM.28,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Rappel des engagements envers l'Eternel
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 28.1–30.17
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'holocauste perpétuel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L''Eternel dit à Moïse: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: C'est l'holocauste du sabbat, prévu pour chaque sabbat en plus de l'holocauste perpétuel et de l'offrande liquide qui l'accompagne.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les sacrifices mensuels
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '»Au début de chaque mois, vous offrirez en holocauste à l''Eternel 2 jeunes taureaux, un bélier et 7 agneaux d''un an sans défaut. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Vous offrirez aussi, comme offrande végétale pour chaque taureau, 6 litres et demi de fleur de farine pétrie à l''huile; comme offrande végétale pour le bélier, 4 litres et demi de fleur de farine pétrie à l''huile; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'comme offrande végétale pour chaque agneau, 2 litres de fleur de farine pétrie à l''huile. C''est un holocauste, un sacrifice brûlé au feu dont l''odeur est agréable à l''Eternel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Les offrandes liquides qui les accompagnent seront de 2 litres de vin pour un taureau, d''un litre et demi pour un bélier et d''un litre pour un agneau. C''est l''holocauste mensuel du début du mois, prévu pour tous les mois de l''année. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: On offrira à l'Eternel un bouc en sacrifice d'expiation, en plus de l'holocauste perpétuel et de l'offrande liquide qui l'accompagne.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les sacrifices de la Pâque
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '»Le quatorzième jour du premier mois, ce sera la Pâque de l''Eternel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Le quinzième jour de ce mois sera un jour de fête. On mangera pendant 7 jours des pains sans levain. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Le premier jour, il y aura une sainte assemblée. Vous n''effectuerez aucun travail pénible. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Vous offrirez en holocauste à l''Eternel un sacrifice brûlé au feu: 2 jeunes taureaux, un bélier et 7 agneaux d''un an sans défaut. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '«Donne l''ordre suivant aux Israélites: ‘Vous veillerez à me présenter, au moment fixé, mon offrande, l''aliment de mes sacrifices brûlés au feu dont l''odeur m''est agréable.’'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Vous y joindrez l''offrande de fleur de farine pétrie à l''huile: 6 litres et demi pour un taureau, 4 litres et demi pour un bélier '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'et 2 litres pour chacun des 7 agneaux. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Vous offrirez un bouc en sacrifice d''expiation afin de faire l''expiation pour vous. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Vous offrirez ces sacrifices en plus de l''holocauste du matin, qui est un holocauste perpétuel. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Vous les offrirez chaque jour, pendant 7 jours. Ce sera l''aliment d''un sacrifice brûlé au feu dont l''odeur est agréable à l''Eternel. On les offrira en plus de l''holocauste perpétuel et de l''offrande liquide qui l''accompagne. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Le septième jour, vous aurez une sainte assemblée. Vous n'effectuerez aucun travail pénible.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les sacrifices de la fête des moissons
    marker-yv: yv-h
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '»Au moment des premières récoltes, lorsque vous présenterez une offrande de produits nouveaux à l''Eternel lors de votre fête des semaines, vous aurez une sainte assemblée. Vous n''effectuerez aucun travail pénible. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Vous offrirez en holocauste dont l''odeur est agréable à l''Eternel 2 jeunes taureaux, un bélier et 7 agneaux d''un an. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Vous y joindrez l''offrande de fleur de farine pétrie à l''huile: 6 litres et demi pour chaque taureau, 4 litres et demi pour le bélier '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'et 2 litres pour chacun des 7 agneaux. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '»Tu leur diras: ‘Voici le sacrifice brûlé au feu que vous offrirez à l''Eternel: chaque jour, 2 agneaux d''un an sans défaut, comme holocauste perpétuel. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Vous offrirez un bouc afin de faire l''expiation pour vous. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Vous offrirez ces sacrifices en plus de l'holocauste perpétuel et de l'offrande végétale qui l'accompagne. Vous aurez des agneaux sans défaut et vous y joindrez les offrandes liquides qui les accompagnent.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Tu offriras l''un des agneaux le matin, l''autre au coucher du soleil, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'ainsi que, pour l''offrande végétale, 2 litres de fleur de farine pétrie dans un litre d''huile d''olives concassées. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'C''est l''holocauste perpétuel qui a été offert au mont Sinaï; c''est un sacrifice brûlé au feu dont l''odeur est agréable à l''Eternel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'L''offrande liquide qui l''accompagne sera d''un litre pour chaque agneau. C''est dans le lieu saint que tu verseras l''offrande de vin à l''Eternel. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Tu offriras le deuxième agneau au coucher du soleil avec une offrande végétale et une offrande liquide identiques à celles du matin. C'est un sacrifice brûlé au feu dont l'odeur est agréable à l'Eternel.’
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les sacrifices du sabbat
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '»Le jour du sabbat, vous offrirez 2 agneaux d''un an sans défaut ainsi que, pour l''offrande végétale, 4 litres et demi de fleur de farine pétrie à l''huile avec l''offrande liquide. '
