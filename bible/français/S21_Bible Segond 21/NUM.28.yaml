document_id: NUM.28,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Rappel des engagements envers l'Eternel
  - type: heading
    content: 28.1–30.17
  - type: heading
    content: L'holocauste perpétuel
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '10':
  - type: text
    content: C'est l'holocauste du sabbat, prévu pour chaque sabbat en plus de l'holocauste perpétuel et de l'offrande liquide qui l'accompagne.
  - type: heading
    content: Les sacrifices mensuels
  '11':
  - type: text
    content: '»Au début de chaque mois, vous offrirez en holocauste à l''Eternel 2 jeunes taureaux, un bélier et 7 agneaux d''un an sans défaut. '
  '12':
  - type: text
    content: 'Vous offrirez aussi, comme offrande végétale pour chaque taureau, 6 litres et demi de fleur de farine pétrie à l''huile; comme offrande végétale pour le bélier, 4 litres et demi de fleur de farine pétrie à l''huile; '
  '13':
  - type: text
    content: 'comme offrande végétale pour chaque agneau, 2 litres de fleur de farine pétrie à l''huile. C''est un holocauste, un sacrifice brûlé au feu dont l''odeur est agréable à l''Eternel. '
  '14':
  - type: text
    content: 'Les offrandes liquides qui les accompagnent seront de 2 litres de vin pour un taureau, d''un litre et demi pour un bélier et d''un litre pour un agneau. C''est l''holocauste mensuel du début du mois, prévu pour tous les mois de l''année. '
  '15':
  - type: text
    content: On offrira à l'Eternel un bouc en sacrifice d'expiation, en plus de l'holocauste perpétuel et de l'offrande liquide qui l'accompagne.
  - type: heading
    content: Les sacrifices de la Pâque
  '16':
  - type: text
    content: '»Le quatorzième jour du premier mois, ce sera la Pâque de l''Eternel. '
  '17':
  - type: text
    content: 'Le quinzième jour de ce mois sera un jour de fête. On mangera pendant 7 jours des pains sans levain. '
  '18':
  - type: text
    content: 'Le premier jour, il y aura une sainte assemblée. Vous n''effectuerez aucun travail pénible. '
  '19':
  - type: text
    content: 'Vous offrirez en holocauste à l''Eternel un sacrifice brûlé au feu: 2 jeunes taureaux, un bélier et 7 agneaux d''un an sans défaut. '
  '2':
  - type: text
    content: '«Donne l''ordre suivant aux Israélites: ‘Vous veillerez à me présenter, au moment fixé, mon offrande, l''aliment de mes sacrifices brûlés au feu dont l''odeur m''est agréable.’'
  '20':
  - type: text
    content: 'Vous y joindrez l''offrande de fleur de farine pétrie à l''huile: 6 litres et demi pour un taureau, 4 litres et demi pour un bélier '
  '21':
  - type: text
    content: 'et 2 litres pour chacun des 7 agneaux. '
  '22':
  - type: text
    content: 'Vous offrirez un bouc en sacrifice d''expiation afin de faire l''expiation pour vous. '
  '23':
  - type: text
    content: 'Vous offrirez ces sacrifices en plus de l''holocauste du matin, qui est un holocauste perpétuel. '
  '24':
  - type: text
    content: 'Vous les offrirez chaque jour, pendant 7 jours. Ce sera l''aliment d''un sacrifice brûlé au feu dont l''odeur est agréable à l''Eternel. On les offrira en plus de l''holocauste perpétuel et de l''offrande liquide qui l''accompagne. '
  '25':
  - type: text
    content: Le septième jour, vous aurez une sainte assemblée. Vous n'effectuerez aucun travail pénible.
  - type: heading
    content: Les sacrifices de la fête des moissons
  '26':
  - type: text
    content: '»Au moment des premières récoltes, lorsque vous présenterez une offrande de produits nouveaux à l''Eternel lors de votre fête des semaines, vous aurez une sainte assemblée. Vous n''effectuerez aucun travail pénible. '
  '27':
  - type: text
    content: 'Vous offrirez en holocauste dont l''odeur est agréable à l''Eternel 2 jeunes taureaux, un bélier et 7 agneaux d''un an. '
  '28':
  - type: text
    content: 'Vous y joindrez l''offrande de fleur de farine pétrie à l''huile: 6 litres et demi pour chaque taureau, 4 litres et demi pour le bélier '
  '29':
  - type: text
    content: 'et 2 litres pour chacun des 7 agneaux. '
  '3':
  - type: text
    content: '»Tu leur diras: ‘Voici le sacrifice brûlé au feu que vous offrirez à l''Eternel: chaque jour, 2 agneaux d''un an sans défaut, comme holocauste perpétuel. '
  '30':
  - type: text
    content: 'Vous offrirez un bouc afin de faire l''expiation pour vous. '
  '31':
  - type: text
    content: Vous offrirez ces sacrifices en plus de l'holocauste perpétuel et de l'offrande végétale qui l'accompagne. Vous aurez des agneaux sans défaut et vous y joindrez les offrandes liquides qui les accompagnent.
  '4':
  - type: text
    content: 'Tu offriras l''un des agneaux le matin, l''autre au coucher du soleil, '
  '5':
  - type: text
    content: 'ainsi que, pour l''offrande végétale, 2 litres de fleur de farine pétrie dans un litre d''huile d''olives concassées. '
  '6':
  - type: text
    content: 'C''est l''holocauste perpétuel qui a été offert au mont Sinaï; c''est un sacrifice brûlé au feu dont l''odeur est agréable à l''Eternel. '
  '7':
  - type: text
    content: 'L''offrande liquide qui l''accompagne sera d''un litre pour chaque agneau. C''est dans le lieu saint que tu verseras l''offrande de vin à l''Eternel. '
  '8':
  - type: text
    content: Tu offriras le deuxième agneau au coucher du soleil avec une offrande végétale et une offrande liquide identiques à celles du matin. C'est un sacrifice brûlé au feu dont l'odeur est agréable à l'Eternel.’
  - type: heading
    content: Les sacrifices du sabbat
  '9':
  - type: text
    content: '»Le jour du sabbat, vous offrirez 2 agneaux d''un an sans défaut ainsi que, pour l''offrande végétale, 4 litres et demi de fleur de farine pétrie à l''huile avec l''offrande liquide. '
