document_id: PSA.126,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière pour la restauration d'Israël
  - type: text
    content: Chant des montées.
  - type: text
    content: Quand l'Eternel a ramené les déportés de Sion,
  - type: text
    content: nous étions pareils à ceux qui font un rêve.
  '2':
  - type: text
    content: Alors notre bouche était remplie de rires,
  - type: text
    content: et notre langue poussait des cris de joie.
  - type: text
    content: 'Alors on disait parmi les nations:'
  - type: text
    content: «L'Eternel a fait de grandes choses pour eux!»
  '3':
  - type: text
    content: Oui, l'Eternel a fait de grandes choses pour nous,
  - type: text
    content: et nous sommes dans la joie.
  '4':
  - type: text
    content: Eternel, ramène nos déportés
  - type: text
    content: comme tu ramènes les ruisseaux dans le Néguev!
  '5':
  - type: text
    content: Ceux qui sèment avec larmes
  - type: text
    content: moissonneront dans la joie,
  '6':
  - type: text
    content: celui qui marche en pleurant avec un sac de semence
  - type: text
    content: reviendra avec joie en portant ses gerbes.
