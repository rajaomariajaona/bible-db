document_id: PSA.126,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière pour la restauration d'Israël
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Chant des montées.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand l'Eternel a ramené les déportés de Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous étions pareils à ceux qui font un rêve.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors notre bouche était remplie de rires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et notre langue poussait des cris de joie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Alors on disait parmi les nations:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «L'Eternel a fait de grandes choses pour eux!»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, l'Eternel a fait de grandes choses pour nous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et nous sommes dans la joie.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, ramène nos déportés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme tu ramènes les ruisseaux dans le Néguev!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui sèment avec larmes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moissonneront dans la joie,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui marche en pleurant avec un sac de semence
  - type: usfm
    marker: q1
    children:
    - type: text
      text: reviendra avec joie en portant ses gerbes.
