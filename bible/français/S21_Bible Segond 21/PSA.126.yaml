document_id: PSA.126
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière pour la restauration d'Israël
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Chant des montées.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand l'Eternel a ramené les déportés de Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous étions pareils à ceux qui font un rêve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Alors notre bouche était remplie de rires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et notre langue poussait des cris de joie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Alors on disait parmi les nations:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «L'Eternel a fait de grandes choses pour eux!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Oui, l'Eternel a fait de grandes choses pour nous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nous sommes dans la joie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Eternel, ramène nos déportés
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme tu ramènes les ruisseaux dans le Néguev!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ceux qui sèment avec larmes
- type: usfm
  marker: q1
  children:
  - type: text
    text: moissonneront dans la joie,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: celui qui marche en pleurant avec un sac de semence
- type: usfm
  marker: q1
  children:
  - type: text
    text: reviendra avec joie en portant ses gerbes.
