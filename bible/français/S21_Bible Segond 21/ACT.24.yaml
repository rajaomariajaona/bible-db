document_id: ACT.24,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Paul devant le gouverneur Félix
  - type: text
    content: 'Cinq jours après, le grand-prêtre Ananias descendit à Césarée avec des anciens et un avocat du nom de Tertulle. Ils portèrent plainte contre Paul devant le gouverneur. '
  '10':
  - type: text
    content: 'Lorsque le gouverneur lui fit signe de parler, Paul répondit: «Je sais que tu es juge de cette nation depuis de nombreuses années, et c''est avec confiance que je prends la parole pour défendre ma cause. '
  '11':
  - type: text
    content: 'Comme tu peux le vérifier, il n''y a pas plus de 12 jours que je suis monté à Jérusalem pour adorer Dieu. '
  '12':
  - type: text
    content: 'Ni dans le temple, ni dans les synagogues, ni dans la ville on ne m''a trouvé en train de discuter avec quelqu''un ou de provoquer un soulèvement de la foule. '
  '13':
  - type: text
    content: 'Ils ne peuvent pas prouver ce dont ils m''accusent maintenant. '
  '14':
  - type: text
    content: 'Je t''avoue bien que je sers le Dieu de mes ancêtres selon la voie qu''ils appellent une secte. Je crois tout ce qui est écrit dans la loi et dans les prophètes, '
  '15':
  - type: text
    content: 'et j''ai en Dieu l''espérance, comme ils l''ont eux-mêmes, qu''il y aura une résurrection des justes et des injustes. '
  '16':
  - type: text
    content: 'C''est pourquoi je m''efforce d''avoir constamment une conscience sans reproche devant Dieu et devant les hommes. '
  '17':
  - type: text
    content: 'Après une absence de plusieurs années, je suis venu pour apporter des dons à ma nation et présenter des offrandes. '
  '18':
  - type: text
    content: 'C''est alors que quelques Juifs d''Asie m''ont trouvé dans le temple; j''avais accompli la cérémonie de purification et il n''y avait ni attroupement ni tumulte. '
  '19':
  - type: text
    content: 'C''était à eux de se présenter devant toi et de m''accuser, s''ils avaient quelque chose contre moi. '
  '2':
  - type: text
    content: 'Paul fut convoqué et Tertulle se mit à l''accuser en disant: «Grâce à toi, très excellent Félix, nous jouissons d''une paix profonde et cette nation a obtenu des réformes salutaires grâce à tes soins prévoyants; '
  '20':
  - type: text
    content: 'Ou bien, que ceux qui sont ici déclarent de quel crime ils m''ont trouvé coupable lorsque j''ai comparu devant le sanhédrin, '
  '21':
  - type: text
    content: 'à moins qu''il ne s''agisse uniquement de la parole que j''ai lancée au milieu d''eux: ‘C''est à cause de la résurrection des morts que je suis aujourd''hui mis en jugement devant vous.’»'
  '22':
  - type: text
    content: 'Félix, qui était parfaitement au courant de ce qui concernait cet enseignement, les renvoya en disant: «Quand le commandant Lysias sera venu, j''examinerai votre affaire.» '
  '23':
  - type: text
    content: Il donna l'ordre à l'officier de garder Paul tout en lui laissant une certaine liberté et de n'empêcher aucun de ses proches de lui rendre des services [ou de venir le voir].
  '24':
  - type: text
    content: 'Quelques jours plus tard, Félix vint avec sa femme Drusille, qui était juive, et il fit appeler Paul. Il l''écouta parler de la foi en Christ. '
  '25':
  - type: text
    content: 'Mais lorsque Paul discuta de la justice, de la maîtrise de soi et du jugement à venir, Félix fut effrayé et lui dit: «Retire-toi pour le moment. Quand j''en trouverai l''occasion, je te rappellerai.» '
  '26':
  - type: text
    content: Il espérait en même temps que Paul lui donnerait de l'argent [pour qu'il le relâche]; c'est pourquoi il le faisait venir assez souvent pour s'entretenir avec lui.
  '27':
  - type: text
    content: Deux ans passèrent ainsi et Félix eut pour successeur Porcius Festus. Dans le désir de plaire aux Juifs, Félix laissa Paul en prison.
  '3':
  - type: text
    content: 'partout et toujours, nous les accueillons avec une entière reconnaissance. '
  '4':
  - type: text
    content: 'Mais, pour ne pas te déranger davantage, je te prie, dans ta bienveillance, de nous écouter quelques instants. '
  '5':
  - type: text
    content: 'Nous avons découvert que cet homme est une peste; il provoque des révoltes parmi tous les Juifs du monde. C''est un chef de la secte des Nazaréens, '
  '6':
  - type: text
    content: 'et il a même tenté de profaner le temple. Nous l''avons arrêté [et nous avons voulu le juger d''après notre loi, '
  '7':
  - type: text
    content: 'mais le commandant Lysias est arrivé. Il l''a arraché de nos mains avec une grande violence '
  '8':
  - type: text
    content: 'et a donné l''ordre à ses accusateurs de venir devant toi.] Tu pourras toi-même, en l''interrogeant, reconnaître le bien-fondé de toutes les accusations que nous portons contre lui.» '
  '9':
  - type: text
    content: Les Juifs appuyèrent ce réquisitoire en déclarant que c'était bien exact.
