document_id: ACT.24
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul devant le gouverneur Félix
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Cinq jours après, le grand-prêtre Ananias descendit à Césarée avec des anciens et un avocat du nom de Tertulle. Ils portèrent plainte contre Paul devant le gouverneur. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Paul fut convoqué et Tertulle se mit à l''accuser en disant: «Grâce à toi, très excellent Félix, nous jouissons d''une paix profonde et cette nation a obtenu des réformes salutaires grâce à tes soins prévoyants; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'partout et toujours, nous les accueillons avec une entière reconnaissance. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mais, pour ne pas te déranger davantage, je te prie, dans ta bienveillance, de nous écouter quelques instants. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Nous avons découvert que cet homme est une peste; il provoque des révoltes parmi tous les Juifs du monde. C''est un chef de la secte des Nazaréens, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'et il a même tenté de profaner le temple. Nous l''avons arrêté [et nous avons voulu le juger d''après notre loi, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'mais le commandant Lysias est arrivé. Il l''a arraché de nos mains avec une grande violence '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'et a donné l''ordre à ses accusateurs de venir devant toi.] Tu pourras toi-même, en l''interrogeant, reconnaître le bien-fondé de toutes les accusations que nous portons contre lui.» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les Juifs appuyèrent ce réquisitoire en déclarant que c'était bien exact.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Lorsque le gouverneur lui fit signe de parler, Paul répondit: «Je sais que tu es juge de cette nation depuis de nombreuses années, et c''est avec confiance que je prends la parole pour défendre ma cause. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Comme tu peux le vérifier, il n''y a pas plus de 12 jours que je suis monté à Jérusalem pour adorer Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ni dans le temple, ni dans les synagogues, ni dans la ville on ne m''a trouvé en train de discuter avec quelqu''un ou de provoquer un soulèvement de la foule. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils ne peuvent pas prouver ce dont ils m''accusent maintenant. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Je t''avoue bien que je sers le Dieu de mes ancêtres selon la voie qu''ils appellent une secte. Je crois tout ce qui est écrit dans la loi et dans les prophètes, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'et j''ai en Dieu l''espérance, comme ils l''ont eux-mêmes, qu''il y aura une résurrection des justes et des injustes. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'C''est pourquoi je m''efforce d''avoir constamment une conscience sans reproche devant Dieu et devant les hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Après une absence de plusieurs années, je suis venu pour apporter des dons à ma nation et présenter des offrandes. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'C''est alors que quelques Juifs d''Asie m''ont trouvé dans le temple; j''avais accompli la cérémonie de purification et il n''y avait ni attroupement ni tumulte. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'C''était à eux de se présenter devant toi et de m''accuser, s''ils avaient quelque chose contre moi. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ou bien, que ceux qui sont ici déclarent de quel crime ils m''ont trouvé coupable lorsque j''ai comparu devant le sanhédrin, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'à moins qu''il ne s''agisse uniquement de la parole que j''ai lancée au milieu d''eux: ‘C''est à cause de la résurrection des morts que je suis aujourd''hui mis en jugement devant vous.’»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Félix, qui était parfaitement au courant de ce qui concernait cet enseignement, les renvoya en disant: «Quand le commandant Lysias sera venu, j''examinerai votre affaire.» '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Il donna l'ordre à l'officier de garder Paul tout en lui laissant une certaine liberté et de n'empêcher aucun de ses proches de lui rendre des services [ou de venir le voir].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Quelques jours plus tard, Félix vint avec sa femme Drusille, qui était juive, et il fit appeler Paul. Il l''écouta parler de la foi en Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Mais lorsque Paul discuta de la justice, de la maîtrise de soi et du jugement à venir, Félix fut effrayé et lui dit: «Retire-toi pour le moment. Quand j''en trouverai l''occasion, je te rappellerai.» '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Il espérait en même temps que Paul lui donnerait de l'argent [pour qu'il le relâche]; c'est pourquoi il le faisait venir assez souvent pour s'entretenir avec lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Deux ans passèrent ainsi et Félix eut pour successeur Porcius Festus. Dans le désir de plaire aux Juifs, Félix laissa Paul en prison.
