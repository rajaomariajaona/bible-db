document_id: MRK.7,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le cœur humain
  - type: text
    content: 'Les pharisiens et quelques spécialistes de la loi, venus de Jérusalem, se rassemblèrent auprès de Jésus. '
  '10':
  - type: text
    content: 'En effet, Moïse a dit: '
  - type: text
    content: Honore ton père et ta mère
  - type: note
    content: 'Honore… mère: citation du 5e des dix commandements (Exode 20.12; Deutéronome 5.16).'
  - type: text
    content: ' et: '
  - type: text
    content: Celui qui maudira son père ou sa mère sera puni de mort
  - type: note
    content: 'Celui qui… mort: citation d''Exode 21.17.'
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Mais d''après vous, si un homme dit à son père ou à sa mère: ‘Ce dont j''aurais pu t''assister est corban, c''est-à-dire une offrande à Dieu’, '
  '12':
  - type: text
    content: 'alors il peut ne plus rien faire pour son père ou pour sa mère. '
  '13':
  - type: text
    content: Vous annulez ainsi la parole de Dieu par la tradition que vous avez établie et vous faites beaucoup d'autres choses semblables.»
  '14':
  - type: text
    content: 'Ensuite, Jésus appela toute la foule et lui dit: «Ecoutez-moi tous et comprenez. '
  '15':
  - type: text
    content: 'Il n''y a rien d''extérieur à l''homme qui puisse le rendre impur en pénétrant en lui, mais c''est ce qui sort de l''homme qui le rend impur. '
  '16':
  - type: text
    content: '[Si quelqu''un a des oreilles pour entendre, qu''il entende.]»'
  '17':
  - type: text
    content: 'Lorsqu''il fut entré dans la maison, loin de la foule, ses disciples l''interrogèrent sur cette parabole. '
  '18':
  - type: text
    content: 'Il leur dit: «Vous aussi, vous êtes donc sans intelligence? Ne comprenez-vous pas que rien de ce qui, de l''extérieur, entre dans l''homme ne peut le rendre impur? '
  '19':
  - type: text
    content: 'En effet, cela n''entre pas dans son cœur, mais dans son ventre, puis est évacué dans les toilettes.» Il déclarait ainsi que tous les aliments sont purs. '
  '2':
  - type: text
    content: 'Ils virent quelques-uns de ses disciples prendre leur repas avec des mains impures, c''est-à-dire non lavées. '
  '20':
  - type: text
    content: 'Il dit encore: «C''est ce qui sort de l''homme qui le rend impur. '
  '21':
  - type: text
    content: 'En effet, c''est de l''intérieur, c''est du cœur des hommes que sortent les mauvaises pensées, les adultères, l''immoralité sexuelle, les meurtres, '
  '22':
  - type: text
    content: 'les vols, la soif de posséder, les méchancetés, la fraude, la débauche, le regard envieux, la calomnie, l''orgueil, la folie. '
  '23':
  - type: text
    content: Toutes ces choses mauvaises sortent du dedans et rendent l'homme impur.»
  - type: heading
    content: Jésus et la femme non juive
  '24':
  - type: text
    content: 'Jésus partit de là et s''en alla dans le territoire de Tyr et de Sidon. Il entra dans une maison, désirant que personne ne le sache, mais il ne put rester caché, '
  '25':
  - type: text
    content: 'car une femme dont la fillette avait un esprit impur entendit parler de lui et vint se jeter à ses pieds. '
  '26':
  - type: text
    content: 'Cette femme était une non-Juive d''origine syro-phénicienne. Elle le pria de chasser le démon hors de sa fille. Jésus lui dit: '
  '27':
  - type: text
    content: '«Laisse d''abord les enfants se rassasier, car il n''est pas bien de prendre le pain des enfants et de le jeter aux petits chiens.» '
  '28':
  - type: text
    content: '«Oui, Seigneur, lui répondit-elle, mais les petits chiens, sous la table, mangent les miettes des enfants.» '
  '29':
  - type: text
    content: 'Alors il lui dit: «A cause de cette parole, tu peux t''en aller: le démon est sorti de ta fille.» '
  '3':
  - type: text
    content: '– Or, les pharisiens et tous les Juifs ne mangent pas sans s''être lavé soigneusement les mains, conformément à la tradition des anciens. '
  '30':
  - type: text
    content: 'Et quand elle rentra chez elle, elle trouva l''enfant couchée sur le lit: le démon était sorti.'
  '31':
  - type: text
    content: 'Jésus quitta le territoire de Tyr et revint par Sidon vers le lac de Galilée en traversant la région de la Décapole. '
  '32':
  - type: text
    content: 'On lui amena un sourd qui avait de la difficulté à parler et on le supplia de poser la main sur lui. '
  '33':
  - type: text
    content: 'Il le prit à part loin de la foule, lui mit les doigts dans les oreilles et lui toucha la langue avec sa propre salive. '
  '34':
  - type: text
    content: 'Puis il leva les yeux au ciel, soupira et dit: «Ephphatha» – c''est-à-dire «Ouvre-toi». '
  '35':
  - type: text
    content: 'Aussitôt ses oreilles s''ouvrirent, sa langue se délia et il se mit à parler correctement. '
  '36':
  - type: text
    content: 'Jésus leur recommanda de n''en parler à personne, mais plus il le leur recommandait, plus ils le proclamaient. '
  '37':
  - type: text
    content: 'Remplis d''étonnement, ils disaient: «Il fait tout à merveille; il fait même entendre les sourds et parler les muets.»'
  '4':
  - type: text
    content: 'Et quand ils reviennent de la place publique, ils ne mangent pas avant de s''être purifiés. Ils tiennent encore à beaucoup d''autres traditions comme le lavage des coupes, des cruches et des vases de bronze. – '
  '5':
  - type: text
    content: 'Alors les pharisiens et les spécialistes de la loi lui demandèrent: «Pourquoi tes disciples ne suivent-ils pas la tradition des anciens mais prennent-ils au contraire leur repas avec des mains non lavées?»'
  '6':
  - type: text
    content: 'Jésus leur répondit: «Hypocrites, Esaïe a bien prophétisé sur vous, comme il est écrit: '
  - type: text
    content: Ce peuple m'honore des lèvres, mais son cœur est éloigné de moi.
  - type: text
    content: ' '
  '7':
  - type: text
    content: C'est faussement qu'ils m'honorent en donnant des enseignements qui sont des commandements humains.
  - type: note
    content: 'Ce peuple… humains: citation d''Esaïe 29.13.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Vous abandonnez le commandement de Dieu et vous gardez la tradition des hommes [car vous lavez les pots et les coupes et vous faites beaucoup d''autres choses semblables].» '
  '9':
  - type: text
    content: 'Il leur dit encore: «Vous rejetez très bien le commandement de Dieu pour garder votre tradition. '
