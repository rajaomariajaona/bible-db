document_id: MRK.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le cœur humain
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les pharisiens et quelques spécialistes de la loi, venus de Jérusalem, se rassemblèrent auprès de Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ils virent quelques-uns de ses disciples prendre leur repas avec des mains impures, c''est-à-dire non lavées. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '– Or, les pharisiens et tous les Juifs ne mangent pas sans s''être lavé soigneusement les mains, conformément à la tradition des anciens. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Et quand ils reviennent de la place publique, ils ne mangent pas avant de s''être purifiés. Ils tiennent encore à beaucoup d''autres traditions comme le lavage des coupes, des cruches et des vases de bronze. – '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors les pharisiens et les spécialistes de la loi lui demandèrent: «Pourquoi tes disciples ne suivent-ils pas la tradition des anciens mais prennent-ils au contraire leur repas avec des mains non lavées?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jésus leur répondit: «Hypocrites, Esaïe a bien prophétisé sur vous, comme il est écrit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Ce peuple m'honore des lèvres, mais son cœur est éloigné de moi.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: C'est faussement qu'ils m'honorent en donnant des enseignements qui sont des commandements humains.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ce peuple… humains: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 29.13
      metadata:
        usfm: ISA.29.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Vous abandonnez le commandement de Dieu et vous gardez la tradition des hommes [car vous lavez les pots et les coupes et vous faites beaucoup d''autres choses semblables].» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il leur dit encore: «Vous rejetez très bien le commandement de Dieu pour garder votre tradition. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'En effet, Moïse a dit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Honore ton père et ta mère
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Honore… mère: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation du 5e des dix commandements (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 20.12
      metadata:
        usfm: EXO.20.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 5.16
      metadata:
        usfm: DEU.5.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' et: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Celui qui maudira son père ou sa mère sera puni de mort
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Celui qui… mort: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 21.17
      metadata:
        usfm: EXO.21.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mais d''après vous, si un homme dit à son père ou à sa mère: ‘Ce dont j''aurais pu t''assister est corban, c''est-à-dire une offrande à Dieu’, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'alors il peut ne plus rien faire pour son père ou pour sa mère. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Vous annulez ainsi la parole de Dieu par la tradition que vous avez établie et vous faites beaucoup d'autres choses semblables.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ensuite, Jésus appela toute la foule et lui dit: «Ecoutez-moi tous et comprenez. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il n''y a rien d''extérieur à l''homme qui puisse le rendre impur en pénétrant en lui, mais c''est ce qui sort de l''homme qui le rend impur. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '[Si quelqu''un a des oreilles pour entendre, qu''il entende.]»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Lorsqu''il fut entré dans la maison, loin de la foule, ses disciples l''interrogèrent sur cette parabole. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il leur dit: «Vous aussi, vous êtes donc sans intelligence? Ne comprenez-vous pas que rien de ce qui, de l''extérieur, entre dans l''homme ne peut le rendre impur? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'En effet, cela n''entre pas dans son cœur, mais dans son ventre, puis est évacué dans les toilettes.» Il déclarait ainsi que tous les aliments sont purs. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il dit encore: «C''est ce qui sort de l''homme qui le rend impur. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'En effet, c''est de l''intérieur, c''est du cœur des hommes que sortent les mauvaises pensées, les adultères, l''immoralité sexuelle, les meurtres, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'les vols, la soif de posséder, les méchancetés, la fraude, la débauche, le regard envieux, la calomnie, l''orgueil, la folie. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Toutes ces choses mauvaises sortent du dedans et rendent l'homme impur.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus et la femme non juive
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Jésus partit de là et s''en alla dans le territoire de Tyr et de Sidon. Il entra dans une maison, désirant que personne ne le sache, mais il ne put rester caché, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'car une femme dont la fillette avait un esprit impur entendit parler de lui et vint se jeter à ses pieds. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Cette femme était une non-Juive d''origine syro-phénicienne. Elle le pria de chasser le démon hors de sa fille. Jésus lui dit: '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '«Laisse d''abord les enfants se rassasier, car il n''est pas bien de prendre le pain des enfants et de le jeter aux petits chiens.» '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '«Oui, Seigneur, lui répondit-elle, mais les petits chiens, sous la table, mangent les miettes des enfants.» '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Alors il lui dit: «A cause de cette parole, tu peux t''en aller: le démon est sorti de ta fille.» '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Et quand elle rentra chez elle, elle trouva l''enfant couchée sur le lit: le démon était sorti.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Jésus quitta le territoire de Tyr et revint par Sidon vers le lac de Galilée en traversant la région de la Décapole. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'On lui amena un sourd qui avait de la difficulté à parler et on le supplia de poser la main sur lui. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Il le prit à part loin de la foule, lui mit les doigts dans les oreilles et lui toucha la langue avec sa propre salive. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Puis il leva les yeux au ciel, soupira et dit: «Ephphatha» – c''est-à-dire «Ouvre-toi». '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Aussitôt ses oreilles s''ouvrirent, sa langue se délia et il se mit à parler correctement. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Jésus leur recommanda de n''en parler à personne, mais plus il le leur recommandait, plus ils le proclamaient. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Remplis d''étonnement, ils disaient: «Il fait tout à merveille; il fait même entendre les sourds et parler les muets.»'
