document_id: DEU.26,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les premières récoltes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Lorsque tu seras entré dans le pays que l''Eternel, ton Dieu, te donne en héritage, lorsque tu le posséderas et y seras installé, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Maintenant, voici que j'apporte les premiers produits du sol que tu m'as donné, Eternel!’
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Tu les déposeras devant l''Eternel, ton Dieu, et tu adoreras l''Eternel, ton Dieu. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis tu te réjouiras, avec le Lévite et l'étranger en séjour chez toi, pour tous les biens que l'Eternel, ton Dieu, t'a donnés, à toi et à ta famille.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les dîmes de la troisième année
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»La troisième année, l''année de la dîme, lorsque tu auras fini de prélever toute la dîme de tes produits, tu la donneras au Lévite, à l''étranger, à l''orphelin et à la veuve. Ils mangeront à satiété dans ta ville. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu diras devant l''Eternel, ton Dieu: ‘J''ai enlevé de ma maison ce qui est consacré et je l''ai donné au Lévite, à l''étranger, à l''orphelin et à la veuve, conformément à tous les ordres que tu m''as prescrits. Je n''ai transgressé ni oublié aucun de tes commandements. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je n''ai rien mangé de tout cela quand j''étais en deuil, je n''en ai rien fait disparaître pour un usage impur et je n''en ai rien donné à l''occasion d''un décès. J''ai obéi à l''Eternel, mon Dieu, j''ai agi conformément à tout ce que tu m''as ordonné. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Regarde depuis ta demeure sainte, depuis le ciel, et bénis ton peuple, Israël, et le territoire que tu nous as donné, comme tu l'avais juré à nos ancêtres, ce pays où coulent le lait et le miel.’
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Aujourd''hui, l''Eternel, ton Dieu, t''ordonne de mettre en pratique ces prescriptions et ces règles. Tu les respecteras et les mettras en pratique de tout ton cœur et de toute ton âme. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aujourd''hui, tu as fait promettre à l''Eternel qu''il sera ton Dieu pourvu que tu marches dans ses voies, que tu respectes ses prescriptions, ses commandements et ses règles, et que tu lui obéisses. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et aujourd''hui, l''Eternel t''a fait promettre que tu seras un peuple qui lui appartiendra, comme il te l''a dit, et que tu respecteras tous ses commandements, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: afin qu'il te donne la supériorité en gloire, en réputation et en honneur sur toutes les nations qu'il a créées et afin que tu sois un peuple saint pour l'Eternel, ton Dieu, comme il te l'a dit.»
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tu prendras les premiers de tous les produits que tu retireras du sol dans le pays que l''Eternel, ton Dieu, te donne. Tu les mettras dans une corbeille et tu iras à l''endroit que l''Eternel, ton Dieu, choisira pour y faire résider son nom. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu te présenteras au prêtre alors en fonction et tu lui diras: ‘Je déclare aujourd''hui à l''Eternel, ton Dieu, que je suis entré dans le pays que l''Eternel a juré à nos ancêtres de nous donner.’ '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le prêtre prendra la corbeille de ta main et la déposera devant l'autel de l'Eternel, ton Dieu.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Tu prendras encore la parole et tu diras devant l''Eternel, ton Dieu: ‘Mon ancêtre était un Araméen nomade. Il est descendu en Egypte avec peu de personnes, et il y a habité. Là, il est devenu une nation grande, puissante et nombreuse. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Egyptiens nous ont maltraités et opprimés, et ils nous ont soumis à un dur esclavage. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous avons crié à l''Eternel, le Dieu de nos ancêtres. L''Eternel a entendu notre voix et a vu l''oppression que nous subissions, notre peine et notre misère. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors l''Eternel nous a fait sortir d''Egypte avec puissance et force, avec des actes terrifiants, avec des signes et des miracles. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il nous a conduits ici et il nous a donné ce pays. C''est un pays où coulent le lait et le miel. '
