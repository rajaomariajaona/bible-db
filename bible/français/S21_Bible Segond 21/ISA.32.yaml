document_id: ISA.32,152
type_code: fra
verses:
  '1':
  - type: text
    content: Un roi régnera alors conformément à la justice
  - type: text
    content: et des chefs gouverneront conformément au droit.
  '10':
  - type: text
    content: Dans un an et quelques jours,
  - type: text
    content: vous tremblerez, vous qui êtes trop sûres de vous,
  - type: text
    content: car la vendange sera terminée
  - type: text
    content: et la récolte n'arrivera pas.
  '11':
  - type: text
    content: Soyez terrifiées, femmes insouciantes!
  - type: text
    content: Tremblez, femmes trop sûres de vous!
  - type: text
    content: Déshabillez-vous, dénudez-vous
  - type: text
    content: et mettez un sac autour de votre taille!
  '12':
  - type: text
    content: On se lamente en se frappant la poitrine
  - type: text
    content: au souvenir de la beauté des champs
  - type: text
    content: et de la productivité des vignes.
  '13':
  - type: text
    content: Sur la terre de mon peuple
  - type: text
    content: poussent des buissons épineux et des ronces,
  - type: text
    content: ils envahissent même toutes les maisons pleines de bonheur,
  - type: text
    content: la ville joyeuse.
  '14':
  - type: text
    content: Le palais est abandonné,
  - type: text
    content: le vacarme de la ville a disparu.
  - type: text
    content: La colline de l'Ophel et la tour serviront pour toujours de grottes,
  - type: text
    content: pour le bonheur des ânes sauvages qui y joueront et des troupeaux qui y brouteront,
  '15':
  - type: text
    content: jusqu'à ce que l'Esprit soit déversé d'en haut sur nous.
  - type: text
    content: Alors le désert se transformera en verger
  - type: text
    content: et le verger sera assimilé à une forêt.
  '16':
  - type: text
    content: Le droit aura sa résidence dans le désert
  - type: text
    content: et la justice habitera dans le verger.
  '17':
  - type: text
    content: L'œuvre de la justice, ce sera la paix,
  - type: text
    content: et le produit de son activité, ce sera la tranquillité et la sécurité pour toujours.
  '18':
  - type: text
    content: Mon peuple habitera dans un domaine caractérisé par la paix,
  - type: text
    content: dans des résidences dignes de confiance,
  - type: text
    content: dans des lieux de repos sûrs.
  '19':
  - type: text
    content: La forêt s'affaissera sous la grêle
  - type: text
    content: et la ville sera définitivement abaissée.
  '2':
  - type: text
    content: Chacun d'eux sera comme un abri contre le vent
  - type: text
    content: et un refuge contre la tempête,
  - type: text
    content: comme des cours d'eau dans le désert,
  - type: text
    content: comme l'ombre d'un grand rocher sur une terre aride.
  '20':
  - type: text
    content: Heureux êtes-vous, vous qui semez partout le long de l'eau
  - type: text
    content: et qui laissez le bœuf et l'âne libres de leurs mouvements!
  '3':
  - type: text
    content: Les yeux de ceux qui voient ne se détourneront plus
  - type: text
    content: et les oreilles de ceux qui entendent seront attentives.
  '4':
  - type: text
    content: Les gens pressés réfléchiront pour comprendre
  - type: text
    content: et la langue de ceux qui bégayent parlera vite et distinctement.
  '5':
  - type: text
    content: On ne donnera plus au fou le nom de noble,
  - type: text
    content: on ne dira plus à l'hypocrite qu'il est une personne de valeur.
  '6':
  - type: text
    content: En effet, le fou parle avec folie
  - type: text
    content: et son cœur s'applique au mal
  - type: text
    content: pour commettre des sacrilèges
  - type: text
    content: et dire des sottises contre l'Eternel.
  - type: text
    content: Il laisse ainsi celui qui a faim l'estomac vide
  - type: text
    content: et écarte la boisson de celui qui a soif.
  '7':
  - type: text
    content: Les armes de l'hypocrite sont perverses.
  - type: text
    content: Il forme des projets coupables
  - type: text
    content: pour perdre les plus humbles par des paroles mensongères,
  - type: text
    content: même quand le pauvre est dans son droit.
  '8':
  - type: text
    content: En revanche, celui qui est noble forme de nobles projets
  - type: text
    content: et persévère dans ses nobles intentions.
  '9':
  - type: text
    content: Femmes insouciantes,
  - type: text
    content: levez-vous, écoutez-moi!
  - type: text
    content: Filles trop sûres de vous,
  - type: text
    content: prêtez l'oreille à ce que je dis!
