document_id: ISA.32
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Un roi régnera alors conformément à la justice
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des chefs gouverneront conformément au droit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Chacun d'eux sera comme un abri contre le vent
- type: usfm
  marker: q1
  children:
  - type: text
    text: et un refuge contre la tempête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme des cours d'eau dans le désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme l'ombre d'un grand rocher sur une terre aride.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Les yeux de ceux qui voient ne se détourneront plus
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les oreilles de ceux qui entendent seront attentives.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les gens pressés réfléchiront pour comprendre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la langue de ceux qui bégayent parlera vite et distinctement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: On ne donnera plus au fou le nom de noble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on ne dira plus à l'hypocrite qu'il est une personne de valeur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: En effet, le fou parle avec folie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son cœur s'applique au mal
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour commettre des sacrilèges
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dire des sottises contre l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il laisse ainsi celui qui a faim l'estomac vide
- type: usfm
  marker: q1
  children:
  - type: text
    text: et écarte la boisson de celui qui a soif.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les armes de l'hypocrite sont perverses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il forme des projets coupables
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour perdre les plus humbles par des paroles mensongères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: même quand le pauvre est dans son droit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: En revanche, celui qui est noble forme de nobles projets
- type: usfm
  marker: q1
  children:
  - type: text
    text: et persévère dans ses nobles intentions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Femmes insouciantes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: levez-vous, écoutez-moi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Filles trop sûres de vous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: prêtez l'oreille à ce que je dis!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dans un an et quelques jours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous tremblerez, vous qui êtes trop sûres de vous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car la vendange sera terminée
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la récolte n'arrivera pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Soyez terrifiées, femmes insouciantes!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tremblez, femmes trop sûres de vous!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Déshabillez-vous, dénudez-vous
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mettez un sac autour de votre taille!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: On se lamente en se frappant la poitrine
- type: usfm
  marker: q1
  children:
  - type: text
    text: au souvenir de la beauté des champs
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de la productivité des vignes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Sur la terre de mon peuple
- type: usfm
  marker: q1
  children:
  - type: text
    text: poussent des buissons épineux et des ronces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils envahissent même toutes les maisons pleines de bonheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la ville joyeuse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Le palais est abandonné,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le vacarme de la ville a disparu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La colline de l'Ophel et la tour serviront pour toujours de grottes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour le bonheur des ânes sauvages qui y joueront et des troupeaux qui y brouteront,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: jusqu'à ce que l'Esprit soit déversé d'en haut sur nous.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors le désert se transformera en verger
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le verger sera assimilé à une forêt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Le droit aura sa résidence dans le désert
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la justice habitera dans le verger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: L'œuvre de la justice, ce sera la paix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le produit de son activité, ce sera la tranquillité et la sécurité pour toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mon peuple habitera dans un domaine caractérisé par la paix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans des résidences dignes de confiance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans des lieux de repos sûrs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: La forêt s'affaissera sous la grêle
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la ville sera définitivement abaissée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Heureux êtes-vous, vous qui semez partout le long de l'eau
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui laissez le bœuf et l'âne libres de leurs mouvements!
