document_id: ISA.32,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un roi régnera alors conformément à la justice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et des chefs gouverneront conformément au droit.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans un an et quelques jours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous tremblerez, vous qui êtes trop sûres de vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car la vendange sera terminée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la récolte n'arrivera pas.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soyez terrifiées, femmes insouciantes!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tremblez, femmes trop sûres de vous!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Déshabillez-vous, dénudez-vous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mettez un sac autour de votre taille!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On se lamente en se frappant la poitrine
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au souvenir de la beauté des champs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de la productivité des vignes.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur la terre de mon peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: poussent des buissons épineux et des ronces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils envahissent même toutes les maisons pleines de bonheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la ville joyeuse.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le palais est abandonné,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le vacarme de la ville a disparu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La colline de l'Ophel et la tour serviront pour toujours de grottes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour le bonheur des ânes sauvages qui y joueront et des troupeaux qui y brouteront,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu'à ce que l'Esprit soit déversé d'en haut sur nous.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors le désert se transformera en verger
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le verger sera assimilé à une forêt.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le droit aura sa résidence dans le désert
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la justice habitera dans le verger.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'œuvre de la justice, ce sera la paix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le produit de son activité, ce sera la tranquillité et la sécurité pour toujours.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon peuple habitera dans un domaine caractérisé par la paix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans des résidences dignes de confiance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans des lieux de repos sûrs.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La forêt s'affaissera sous la grêle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la ville sera définitivement abaissée.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chacun d'eux sera comme un abri contre le vent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et un refuge contre la tempête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme des cours d'eau dans le désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme l'ombre d'un grand rocher sur une terre aride.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux êtes-vous, vous qui semez partout le long de l'eau
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui laissez le bœuf et l'âne libres de leurs mouvements!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les yeux de ceux qui voient ne se détourneront plus
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les oreilles de ceux qui entendent seront attentives.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les gens pressés réfléchiront pour comprendre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la langue de ceux qui bégayent parlera vite et distinctement.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne donnera plus au fou le nom de noble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on ne dira plus à l'hypocrite qu'il est une personne de valeur.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, le fou parle avec folie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son cœur s'applique au mal
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour commettre des sacrilèges
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et dire des sottises contre l'Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il laisse ainsi celui qui a faim l'estomac vide
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et écarte la boisson de celui qui a soif.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les armes de l'hypocrite sont perverses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il forme des projets coupables
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour perdre les plus humbles par des paroles mensongères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: même quand le pauvre est dans son droit.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En revanche, celui qui est noble forme de nobles projets
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et persévère dans ses nobles intentions.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Femmes insouciantes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: levez-vous, écoutez-moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Filles trop sûres de vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: prêtez l'oreille à ce que je dis!
