document_id: 1CH.10,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Règne de David
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 10.1–29.30
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mort de Saül
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Les Philistins livrèrent bataille à Israël et les Israélites prirent la fuite devant eux. Ils tombèrent morts sur le mont Guilboa. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ils déposèrent les armes de Saül dans le temple de leur dieu et ils attachèrent son crâne dans le temple de Dagon. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Lorsque toute la population de Jabès en Galaad apprit tout ce que les Philistins avaient fait à Saül, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: tous les hommes vaillants se levèrent. Ils enlevèrent les corps de Saül et de ses fils et les amenèrent à Jabès. Ils enterrèrent leurs ossements sous le térébinthe à Jabès, puis ils jeûnèrent pendant sept jours.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Saül mourut à cause de l''infidélité dont il avait fait preuve envers l''Eternel, parce qu''il n''avait pas respecté la parole de l''Eternel, allant même jusqu''à interroger et consulter ceux qui invoquent les esprits. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Il ne consultait pas l'Eternel, aussi l'Eternel le fit mourir et transféra la royauté à David, fils d'Isaï.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Les Philistins rattrapèrent Saül et ses fils, et ils tuèrent Jonathan, Abinadab et Malki-Shua, les fils de Saül. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'L''effort du combat porta sur Saül; les archers le touchèrent et le blessèrent. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Saül dit alors à son porteur d''armes: «Tire ton épée et transperce-moi! Sinon, ce seront ces incirconcis qui viendront et ils me feront subir leurs mauvais traitements.» Son porteur d''armes ne voulut pas le tuer, car il était rempli de peur. Alors Saül prit son épée et se jeta dessus. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Voyant Saül mort, son porteur d''armes se jeta aussi sur son épée et il mourut. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'C''est ainsi que Saül et ses trois fils moururent, et toute sa famille mourut en même temps. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Lorsqu'ils virent qu'on s'enfuyait et que Saül et ses fils étaient morts, tous ceux d'Israël qui étaient dans la vallée abandonnèrent leurs villes pour prendre aussi la fuite. Les Philistins allèrent s'y installer.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Le lendemain, les Philistins vinrent pour dépouiller les morts et ils trouvèrent le cadavre de Saül et de ses fils sur le mont Guilboa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ils dépouillèrent Saül et emportèrent sa tête et ses armes. Puis ils les firent circuler dans tout le pays des Philistins pour annoncer la nouvelle à leurs idoles et au peuple. '
