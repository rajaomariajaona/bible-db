document_id: LUK.14,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'invitation au festin
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Un jour de sabbat, Jésus était allé dans la maison de l''un des chefs des pharisiens pour prendre un repas, et les pharisiens l''observaient. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Mais lorsque tu es invité, va te mettre à la dernière place, afin qu''au moment où celui qui t''a invité arrive, il te dise: ‘Mon ami, monte plus haut.’ Alors tu seras honoré devant [tous] ceux qui seront à table avec toi. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: En effet, toute personne qui s'élève sera abaissée, et celle qui s'abaisse sera élevée.»
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Il dit aussi à celui qui l''avait invité: «Lorsque tu organises un dîner ou un souper, n''invite pas tes amis, ni tes frères, ni tes parents, ni des voisins riches, de peur qu''ils ne t''invitent à leur tour pour te rendre la pareille. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Lorsque tu organises un festin, invite au contraire des pauvres, des estropiés, des boiteux, des aveugles, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: et tu seras heureux, car ils ne peuvent pas te rendre la pareille. En effet, cela te sera rendu à la résurrection des justes.»
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Après avoir entendu ces paroles, un de ceux qui étaient à table dit à Jésus: «Heureux celui qui prendra son repas dans le royaume de Dieu!» '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Jésus lui répondit: «Un homme organisa un grand festin et invita beaucoup de gens. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'A l''heure du festin, il envoya son serviteur dire aux invités: ‘Venez, car tout est déjà prêt.’ '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Mais tous sans exception se mirent à s''excuser. Le premier lui dit: ‘J''ai acheté un champ et je suis obligé d''aller le voir, excuse-moi, je t''en prie.’ '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Un autre dit: ‘J''ai acheté cinq paires de bœufs et je vais les essayer, excuse-moi, je t''en prie.’ '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Or un homme rempli d’œdème se trouvait devant lui. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Un autre dit: ‘Je viens de me marier, c''est pourquoi je ne peux pas venir.’ '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'A son retour, le serviteur rapporta ces paroles à son maître. Alors le maître de la maison, en colère, dit à son serviteur: ‘Va vite sur les places et dans les rues de la ville et amène ici les pauvres, les estropiés, les aveugles et les boiteux.’ '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Le serviteur dit: ‘Maître, ce que tu as ordonné a été fait et il reste encore de la place.’ '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Le maître dit alors au serviteur: ‘Va sur les chemins et le long des haies, et ceux que tu trouveras, oblige-les à entrer, afin que ma maison soit remplie. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: En effet, je vous le dis, aucun de ces hommes qui avaient été invités ne goûtera de mon festin.’»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Conditions pour être disciple
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'De grandes foules faisaient route avec Jésus. Il se retourna et leur dit: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '«Si quelqu''un vient à moi sans me préférer à son père, sa mère, sa femme, ses enfants, ses frères et ses sœurs, et même à sa propre vie, il ne peut pas être mon disciple. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Celui qui ne porte pas sa croix et ne me suit pas ne peut pas être mon disciple. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'En effet, si l''un de vous veut construire une tour, il s''assied d''abord pour calculer la dépense et voir s''il a de quoi la terminer. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Autrement, si après avoir posé les fondations il ne peut pas la terminer, tous ceux qui le verront se mettront à se moquer de lui '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Jésus prit la parole et dit aux professeurs de la loi et aux pharisiens: «Est-il permis [ou non] de faire une guérison le jour du sabbat?» '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'en disant: ‘Cet homme a commencé à construire, et il n''a pas pu finir.’ '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'De même, si un roi part en guerre contre un autre roi, il s''assied d''abord pour examiner s''il peut, avec 10''000 hommes, affronter celui qui vient l''attaquer avec 20''000. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Si ce n''est pas le cas, alors que l''autre roi est encore loin, il lui envoie une ambassade pour demander la paix. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Ainsi donc aucun de vous, à moins de renoncer à tout ce qu'il possède, ne peut être mon disciple.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: '»Le sel est une bonne chose, mais si le sel perd sa saveur, avec quoi la lui rendra-t-on? '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Il n'est bon ni pour la terre, ni pour le fumier; on le jette dehors. Que celui qui a des oreilles pour entendre entende.»
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ils gardèrent le silence. Alors Jésus toucha le malade, le guérit et le renvoya. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Puis il leur dit: «Lequel de vous, si son fils ou son bœuf tombe dans un puits, ne l''en retire pas aussitôt, même le jour du sabbat?» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Et ils furent incapables de répondre à cela.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Il adressa ensuite une parabole aux invités, en voyant qu''ils choisissaient les meilleures places. Il leur dit: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '«Lorsque tu es invité par quelqu''un à des noces, ne te mets pas à la meilleure place, de peur qu''il n''y ait parmi les invités une personne plus importante que toi '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'et que celui qui vous a invités l''un et l''autre ne vienne te dire: ‘Laisse-lui la place!’ Tu aurais alors la honte d''aller occuper la dernière place. '
