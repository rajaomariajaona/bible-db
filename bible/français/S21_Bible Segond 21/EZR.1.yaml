document_id: EZR.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Retour d'exil avec Zorobabel
  - type: heading
    content: 1.1–6.22
  - type: heading
    content: Edit de Cyrus
  - type: text
    content: 'La première année du règne de Cyrus sur la Perse, l''Eternel réveilla l''esprit de Cyrus, roi de Perse, afin que s''accomplisse la parole de l''Eternel prononcée par la bouche de Jérémie, et il fit faire de vive voix, et même par écrit, la proclamation que voici dans tout son royaume:'
  '10':
  - type: text
    content: '30 coupes en or, 410 coupes en argent de valeur secondaire et 1000 autres ustensiles. '
  '11':
  - type: text
    content: Le nombre total d'objets en or et en argent était de 5400. Tout cela, Sheshbatsar le ramena de Babylone à Jérusalem avec ceux qui revenaient d'exil.
  '2':
  - type: text
    content: '«Voici ce que dit Cyrus, roi de Perse: L''Eternel, le Dieu du ciel, m''a donné tous les royaumes de la terre et m''a désigné pour lui construire un temple à Jérusalem, en Juda. '
  '3':
  - type: text
    content: Qui parmi vous fait partie de son peuple? Que son Dieu soit avec lui et qu'il monte
  - type: note
    content: 'La première… qu''il monte: texte identique à 2 Chroniques 36.22-23.'
  - type: text
    content: ' à Jérusalem, en Juda, pour reconstruire la maison de l''Eternel, le Dieu d''Israël! C''est lui, le Dieu qui réside à Jérusalem. '
  '4':
  - type: text
    content: Partout où s'est installé le reste du peuple de l'Eternel, les habitants de l'endroit lui donneront de l'argent, de l'or, du matériel et du bétail, avec des offrandes volontaires pour la maison de Dieu à Jérusalem.»
  '5':
  - type: text
    content: 'Les chefs de famille de Juda et de Benjamin, les prêtres et les Lévites, tous ceux dont Dieu réveilla l''esprit, se levèrent pour aller reconstruire la maison de l''Eternel à Jérusalem. '
  '6':
  - type: text
    content: 'Tous leurs voisins leur donnèrent des objets en argent, de l''or, du matériel, du bétail et des choses de valeur, en plus de toutes les offrandes volontaires. '
  '7':
  - type: text
    content: 'Le roi Cyrus rendit les ustensiles de la maison de l''Eternel que Nebucadnetsar avait amenés de Jérusalem et placés dans le temple de son dieu. '
  '8':
  - type: text
    content: 'Cyrus, roi de Perse, les rendit par l''intermédiaire de Mithredath, le trésorier, qui en fit le compte pour Sheshbatsar, le prince de Juda. '
  '9':
  - type: text
    content: 'En voici la liste: 30 bassins en or, 1000 bassins en argent, 29 couteaux, '
