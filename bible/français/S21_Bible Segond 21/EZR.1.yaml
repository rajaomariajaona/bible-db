document_id: EZR.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Retour d'exil avec Zorobabel
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 1.1–6.22
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Edit de Cyrus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La première année du règne de Cyrus sur la Perse, l''Eternel réveilla l''esprit de Cyrus, roi de Perse, afin que s''accomplisse la parole de l''Eternel prononcée par la bouche de Jérémie, et il fit faire de vive voix, et même par écrit, la proclamation que voici dans tout son royaume:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Voici ce que dit Cyrus, roi de Perse: L''Eternel, le Dieu du ciel, m''a donné tous les royaumes de la terre et m''a désigné pour lui construire un temple à Jérusalem, en Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Qui parmi vous fait partie de son peuple? Que son Dieu soit avec lui et qu'il monte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1-3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La première… qu''il monte: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'texte identique à '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Chroniques 36.22-23
      metadata:
        usfm: 2CH.36.22+2CH.36.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' à Jérusalem, en Juda, pour reconstruire la maison de l''Eternel, le Dieu d''Israël! C''est lui, le Dieu qui réside à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Partout où s'est installé le reste du peuple de l'Eternel, les habitants de l'endroit lui donneront de l'argent, de l'or, du matériel et du bétail, avec des offrandes volontaires pour la maison de Dieu à Jérusalem.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les chefs de famille de Juda et de Benjamin, les prêtres et les Lévites, tous ceux dont Dieu réveilla l''esprit, se levèrent pour aller reconstruire la maison de l''Eternel à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tous leurs voisins leur donnèrent des objets en argent, de l''or, du matériel, du bétail et des choses de valeur, en plus de toutes les offrandes volontaires. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le roi Cyrus rendit les ustensiles de la maison de l''Eternel que Nebucadnetsar avait amenés de Jérusalem et placés dans le temple de son dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Cyrus, roi de Perse, les rendit par l''intermédiaire de Mithredath, le trésorier, qui en fit le compte pour Sheshbatsar, le prince de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'En voici la liste: 30 bassins en or, 1000 bassins en argent, 29 couteaux, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '30 coupes en or, 410 coupes en argent de valeur secondaire et 1000 autres ustensiles. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le nombre total d'objets en or et en argent était de 5400. Tout cela, Sheshbatsar le ramena de Babylone à Jérusalem avec ceux qui revenaient d'exil.
