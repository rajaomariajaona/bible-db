document_id: ZEC.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Huit visions
  - type: heading
    content: 1.1–6.15
  - type: heading
    content: Appel à revenir à Dieu
  - type: text
    content: 'Le huitième mois, la deuxième année du règne de Darius, la parole de l''Eternel fut adressée au prophète Zacharie, fils de Bérékia et petit-fils d''Iddo:'
  '10':
  - type: text
    content: 'L''homme qui se tenait parmi les myrtes a pris la parole et a dit: «Ce sont ceux que l''Eternel a envoyés pour parcourir la terre.» '
  '11':
  - type: text
    content: 'Ils se sont adressés à l''ange de l''Eternel, qui se tenait parmi les myrtes, et ont dit: «Nous avons parcouru la terre et nous avons vu que toute la terre est tranquille, en paix.»'
  '12':
  - type: text
    content: 'Alors l''ange de l''Eternel a pris la parole et a dit: «Eternel, maître de l''univers, jusqu''à quand refuseras-tu d''avoir compassion de Jérusalem et des villes de Juda, contre lesquelles tu es en colère depuis 70 ans?» '
  '13':
  - type: text
    content: L'Eternel a répondu par de bonnes paroles, par des paroles de consolation, à l'ange qui me parlait.
  '14':
  - type: text
    content: 'L''ange qui me parlait m''a dit: «Proclame: ‘Voici ce que dit l''Eternel, le maître de l''univers: J''éprouve une grande jalousie envers Jérusalem et Sion, '
  '15':
  - type: text
    content: 'et une grande irritation contre les nations insouciantes, car je n''étais que peu irrité, mais elles ont contribué au mal. '
  '16':
  - type: text
    content: 'C''est pourquoi, voici ce que dit l''Eternel: Je reviens à Jérusalem avec compassion. Ma maison y sera reconstruite, déclare l''Eternel, le maître de l''univers, et l''on étendra le ruban à mesurer sur Jérusalem.’'
  '17':
  - type: text
    content: '»Proclame encore: ‘Voici ce que dit l''Eternel, le maître de l''univers: Mes villes auront encore des biens en abondance; l''Eternel consolera encore Sion, il choisira encore Jérusalem.’»'
  '2':
  - type: text
    content: '«L''Eternel a été très irrité contre vos ancêtres. '
  '3':
  - type: text
    content: 'Annonce-leur donc: ‘Voici ce que dit l''Eternel, le maître de l''univers: Revenez à moi, déclare l''Eternel, le maître de l''univers, et je reviendrai à vous, dit l''Eternel, le maître de l''univers.’'
  '4':
  - type: text
    content: '»Ne soyez pas comme vos ancêtres, auxquels les premiers prophètes proclamaient: ‘Voici ce que dit l''Eternel, le maître de l''univers: Renoncez à vos mauvaises voies, à vos mauvaises actions!’ Mais ils n''ont pas écouté, ils n''ont pas fait attention à moi, déclare l''Eternel.'
  '5':
  - type: text
    content: '»Vos ancêtres, où sont-ils? Et les prophètes pouvaient-ils vivre éternellement? '
  '6':
  - type: text
    content: 'Cependant mes paroles et mes prescriptions, dont j''avais chargé mes serviteurs, les prophètes, n''ont-elles pas atteint vos ancêtres? Ils sont revenus à moi et ils ont reconnu: ‘L''Eternel, le maître de l''univers, nous a traités comme il avait décidé de le faire, conformément à notre conduite et à nos agissements.’»'
  - type: heading
    content: Vision de chevaux
  '7':
  - type: text
    content: Le vingt-quatrième jour du onzième mois, qui est le mois de Shebat, la deuxième année du règne de Darius, la parole de l'Eternel fut adressée au prophète Zacharie, fils de Bérékia et petit-fils d'Iddo.
  '8':
  - type: text
    content: 'J''ai eu une vision pendant la nuit: un homme monté sur un cheval roux se tenait parmi des myrtes dans un creux. Il y avait derrière lui des chevaux roux, bais et blancs. '
  '9':
  - type: text
    content: 'J''ai dit: «Qui sont ces chevaux, mon seigneur?» L''ange qui me parlait m''a dit: «Je vais te montrer qui sont ces chevaux.» '
