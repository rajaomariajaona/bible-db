document_id: ZEC.1,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Huit visions
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 1.1–6.15
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Appel à revenir à Dieu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le huitième mois, la deuxième année du règne de Darius, la parole de l''Eternel fut adressée au prophète Zacharie, fils de Bérékia et petit-fils d''Iddo:'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''homme qui se tenait parmi les myrtes a pris la parole et a dit: «Ce sont ceux que l''Eternel a envoyés pour parcourir la terre.» '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils se sont adressés à l''ange de l''Eternel, qui se tenait parmi les myrtes, et ont dit: «Nous avons parcouru la terre et nous avons vu que toute la terre est tranquille, en paix.»'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors l''ange de l''Eternel a pris la parole et a dit: «Eternel, maître de l''univers, jusqu''à quand refuseras-tu d''avoir compassion de Jérusalem et des villes de Juda, contre lesquelles tu es en colère depuis 70 ans?» '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L'Eternel a répondu par de bonnes paroles, par des paroles de consolation, à l'ange qui me parlait.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''ange qui me parlait m''a dit: «Proclame: ‘Voici ce que dit l''Eternel, le maître de l''univers: J''éprouve une grande jalousie envers Jérusalem et Sion, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et une grande irritation contre les nations insouciantes, car je n''étais que peu irrité, mais elles ont contribué au mal. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est pourquoi, voici ce que dit l''Eternel: Je reviens à Jérusalem avec compassion. Ma maison y sera reconstruite, déclare l''Eternel, le maître de l''univers, et l''on étendra le ruban à mesurer sur Jérusalem.’'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Proclame encore: ‘Voici ce que dit l''Eternel, le maître de l''univers: Mes villes auront encore des biens en abondance; l''Eternel consolera encore Sion, il choisira encore Jérusalem.’»'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«L''Eternel a été très irrité contre vos ancêtres. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Annonce-leur donc: ‘Voici ce que dit l''Eternel, le maître de l''univers: Revenez à moi, déclare l''Eternel, le maître de l''univers, et je reviendrai à vous, dit l''Eternel, le maître de l''univers.’'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Ne soyez pas comme vos ancêtres, auxquels les premiers prophètes proclamaient: ‘Voici ce que dit l''Eternel, le maître de l''univers: Renoncez à vos mauvaises voies, à vos mauvaises actions!’ Mais ils n''ont pas écouté, ils n''ont pas fait attention à moi, déclare l''Eternel.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Vos ancêtres, où sont-ils? Et les prophètes pouvaient-ils vivre éternellement? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cependant mes paroles et mes prescriptions, dont j''avais chargé mes serviteurs, les prophètes, n''ont-elles pas atteint vos ancêtres? Ils sont revenus à moi et ils ont reconnu: ‘L''Eternel, le maître de l''univers, nous a traités comme il avait décidé de le faire, conformément à notre conduite et à nos agissements.’»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vision de chevaux
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le vingt-quatrième jour du onzième mois, qui est le mois de Shebat, la deuxième année du règne de Darius, la parole de l'Eternel fut adressée au prophète Zacharie, fils de Bérékia et petit-fils d'Iddo.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai eu une vision pendant la nuit: un homme monté sur un cheval roux se tenait parmi des myrtes dans un creux. Il y avait derrière lui des chevaux roux, bais et blancs. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai dit: «Qui sont ces chevaux, mon seigneur?» L''ange qui me parlait m''a dit: «Je vais te montrer qui sont ces chevaux.» '
