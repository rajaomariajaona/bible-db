document_id: LEV.20,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Peines contre diverses fautes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L''Eternel dit à Moïse: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Si un homme commet un adultère avec une femme mariée, s''il commet un adultère avec la femme de son prochain, l''homme et la femme adultères seront punis de mort. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Si un homme couche avec la femme de son père et dévoile ainsi la nudité de son père, cet homme et cette femme seront punis de mort, leur sang retombera sur eux. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Si un homme couche avec sa belle-fille, ils seront tous deux punis de mort. Ils ont commis un acte abominable, leur sang retombera sur eux.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '»Si un homme couche avec un homme comme on couche avec une femme, ils commettent tous deux un acte abominable. Ils seront punis de mort, leur sang retombera sur eux. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Si un homme épouse la fille et la mère, c'est un crime. On les brûlera au feu, elles et lui, afin que ce crime n'existe pas au milieu de vous.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '»Si un homme couche avec une bête, il sera puni de mort et vous tuerez la bête. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Si une femme s'approche d'une bête pour se prostituer à elle, tu tueras la femme et la bête. Elles seront mises à mort, leur sang retombera sur elles.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: '»Si un homme épouse sa sœur, fille de son père ou de sa mère, s''il voit sa nudité et qu''elle voie la sienne, c''est une honte; ils seront exclus sous les yeux des membres de leur peuple. Il a dévoilé la nudité de sa sœur, il supportera les conséquences de sa faute. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Si un homme couche avec une femme qui a ses règles et dévoile sa nudité, il expose la perte de sang de la femme et elle-même l''expose. Ils seront tous deux exclus du milieu de leur peuple. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tu ne dévoileras pas la nudité de la sœur de ta mère ni celle de la sœur de ton père, car celui qui fait cela met à nu sa proche parente. Ils supporteront les conséquences de leur faute.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '«Tu diras aux Israélites: Si un Israélite ou un étranger qui séjourne en Israël livre l''un de ses enfants à Moloc, il sera puni de mort: le peuple du pays le lapidera. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: '»Si un homme couche avec sa tante, il dévoile la nudité de son oncle. Ils supporteront les conséquences de leur péché: ils mourront sans enfant. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Si un homme épouse la femme de son frère, c'est une souillure. Il a dévoilé la nudité de son frère, ils resteront sans enfant.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '»Vous respecterez toutes mes prescriptions et toutes mes règles, vous les mettrez en pratique, afin que le pays où je vous conduis pour vous y établir ne vous vomisse pas. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Vous ne suivrez pas les coutumes des nations que je vais chasser devant vous, car elles ont fait cela et je les ai en horreur. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Je vous ai dit: ‘C''est vous qui posséderez leur pays, c''est moi qui vous le donnerai en possession. C''est un pays où coulent le lait et le miel.’ Je suis l''Eternel, votre Dieu, qui vous ai séparés des autres peuples.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '»Vous respecterez la distinction entre les animaux purs et impurs, entre les oiseaux purs et impurs, afin de ne pas vous rendre vous-mêmes abominables par des animaux, des oiseaux et tous les reptiles de la terre que je vous ai appris à distinguer comme impurs. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Vous serez saints pour moi, car je suis saint, moi, l'Eternel. Je vous ai séparés des autres peuples afin que vous m'apparteniez.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: »Si un homme ou une femme a en lui l'esprit d'un mort ou un esprit de divination, il sera puni de mort. On le lapidera, son sang retombera sur lui.»
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Quant à moi, je me tournerai contre cet homme et je l''exclurai du milieu de son peuple, parce qu''il a livré un de ses enfants à Moloc, rendu mon sanctuaire impur et déshonoré mon saint nom. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Si le peuple du pays ferme les yeux sur le fait que cet homme livre un de ses enfants à Moloc, s''il ne le fait pas mourir, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: je me tournerai, moi, contre cet homme et contre sa famille et je l'exclurai du milieu de son peuple avec tous ceux qui, à sa suite, se prostituent à Moloc.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '»Si quelqu''un s''adresse à ceux qui invoquent les esprits et aux spirites pour se prostituer à eux, je me tournerai contre lui et je l''exclurai du milieu de son peuple. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Vous vous consacrerez et vous serez saints, car je suis l''Eternel, votre Dieu. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Vous respecterez mes prescriptions et vous les mettrez en pratique. Je suis l'Eternel qui vous considère comme saints.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: »*Si quelqu'un maudit son père ou sa mère, il sera puni de mort
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Si quelqu''un… mort: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: reprise d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Exode 21.17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (voir la note).'
      marker-yv: yv-n
    - type: text
      text: '; il a maudit son père ou sa mère, son sang retombera sur lui. '
