    - type: text
      text: Sept sceaux
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 4.1–8.5
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le trône de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après cela, je regardai et voici, une porte était ouverte dans le ciel. La première voix que j''avais entendue me parler avec la force d''une trompette dit alors: «Monte ici et je te ferai voir ce qui doit arriver par la suite.» '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les vingt-quatre anciens se prosternent devant celui qui est assis sur le trône, adorent celui qui vit aux siècles des siècles et déposent leur couronne devant le trône en disant: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Tu es digne, notre Seigneur et notre Dieu, [toi le Saint,] de recevoir la gloire, l'honneur et la puissance, car tu as créé toutes choses et c'est par ta volonté qu'elles ont été créées et qu'elles existent.»
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aussitôt je fus saisi par l''Esprit. Et voici, il y avait un trône dans le ciel, et sur ce trône quelqu''un était assis. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui était assis avait l''aspect d''une pierre de jaspe et de sardoine, et le trône était entouré d''un arc-en-ciel semblable à de l''émeraude. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Autour du trône se trouvaient vingt-quatre trônes, et sur ces trônes vingt-quatre anciens étaient assis. Ils étaient habillés de vêtements blancs et portaient des couronnes d'or sur la tête.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Du trône sortent des éclairs, des voix et des coups de tonnerre, et devant lui brûlent sept lampes ardentes qui sont les sept esprits de Dieu. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Devant le trône, il y a aussi comme une mer de verre qui a la transparence du cristal. Au milieu et autour du trône se tiennent quatre êtres vivants couverts d''yeux devant et derrière. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le premier être vivant ressemble à un lion, le deuxième à un taureau, le troisième a le visage d''un homme et le quatrième ressemble à un aigle en plein vol. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les quatre êtres vivants ont chacun six ailes et ils sont couverts d''yeux tout autour et à l''intérieur. Ils ne cessent de dire, jour et nuit: «'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Saint, saint, saint est le Seigneur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
