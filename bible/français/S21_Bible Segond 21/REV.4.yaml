          text: '4.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Saint… le Seigneur: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 6.3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' Dieu, le Tout-Puissant, celui qui était, qui est et qui vient!»'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Chaque fois que les êtres vivants donnent gloire, honneur et reconnaissance à celui qui est assis sur le trône, à celui qui vit aux siècles des siècles, '
