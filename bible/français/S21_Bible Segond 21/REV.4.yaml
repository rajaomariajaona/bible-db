document_id: REV.4,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Sept sceaux
  - type: heading
    content: 4.1–8.5
  - type: heading
    content: Le trône de Dieu
  - type: text
    content: 'Après cela, je regardai et voici, une porte était ouverte dans le ciel. La première voix que j''avais entendue me parler avec la force d''une trompette dit alors: «Monte ici et je te ferai voir ce qui doit arriver par la suite.» '
  '10':
  - type: text
    content: 'les vingt-quatre anciens se prosternent devant celui qui est assis sur le trône, adorent celui qui vit aux siècles des siècles et déposent leur couronne devant le trône en disant: '
  '11':
  - type: text
    content: «Tu es digne, notre Seigneur et notre Dieu, [toi le Saint,] de recevoir la gloire, l'honneur et la puissance, car tu as créé toutes choses et c'est par ta volonté qu'elles ont été créées et qu'elles existent.»
  '2':
  - type: text
    content: 'Aussitôt je fus saisi par l''Esprit. Et voici, il y avait un trône dans le ciel, et sur ce trône quelqu''un était assis. '
  '3':
  - type: text
    content: 'Celui qui était assis avait l''aspect d''une pierre de jaspe et de sardoine, et le trône était entouré d''un arc-en-ciel semblable à de l''émeraude. '
  '4':
  - type: text
    content: Autour du trône se trouvaient vingt-quatre trônes, et sur ces trônes vingt-quatre anciens étaient assis. Ils étaient habillés de vêtements blancs et portaient des couronnes d'or sur la tête.
  '5':
  - type: text
    content: 'Du trône sortent des éclairs, des voix et des coups de tonnerre, et devant lui brûlent sept lampes ardentes qui sont les sept esprits de Dieu. '
  '6':
  - type: text
    content: 'Devant le trône, il y a aussi comme une mer de verre qui a la transparence du cristal. Au milieu et autour du trône se tiennent quatre êtres vivants couverts d''yeux devant et derrière. '
  '7':
  - type: text
    content: 'Le premier être vivant ressemble à un lion, le deuxième à un taureau, le troisième a le visage d''un homme et le quatrième ressemble à un aigle en plein vol. '
  '8':
  - type: text
    content: 'Les quatre êtres vivants ont chacun six ailes et ils sont couverts d''yeux tout autour et à l''intérieur. Ils ne cessent de dire, jour et nuit: «'
  - type: text
    content: Saint, saint, saint est le Seigneur
  - type: note
    content: 'Saint… le Seigneur: citation d''Esaïe 6.3.'
  - type: text
    content: ' Dieu, le Tout-Puissant, celui qui était, qui est et qui vient!»'
  '9':
  - type: text
    content: 'Chaque fois que les êtres vivants donnent gloire, honneur et reconnaissance à celui qui est assis sur le trône, à celui qui vit aux siècles des siècles, '
