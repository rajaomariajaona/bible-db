document_id: 2CH.11,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règne de Roboam
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'A son arrivée à Jérusalem, Roboam rassembla la communauté de Juda et de Benjamin, soit 180''000 hommes d''élite aptes à la guerre, pour qu''ils combattent contre Israël afin de le ramener sous sa domination. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Tsorea, Ajalon et Hébron, qui se trouvaient en Juda et en Benjamin, et il en fit des villes fortifiées. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Il fortifia leurs remparts et y établit des commandants ainsi que des entrepôts pour les vivres, l''huile et le vin. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Il dota chacune de ces villes de boucliers et de lances, et il les fortifia grandement. Juda et Benjamin lui appartenaient.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Les prêtres et les Lévites qui habitaient tout Israël quittèrent leur domaine pour se rallier à lui. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Les Lévites abandonnèrent en effet leurs territoires et leurs propriétés et vinrent en Juda et à Jérusalem, parce que Jéroboam et ses fils les empêchèrent de remplir leur service comme prêtres de l''Eternel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Jéroboam établit des prêtres pour le service des hauts lieux, des boucs et des veaux qu''il avait fabriqués. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Les membres de toutes les tribus d''Israël qui avaient à cœur de rechercher l''Eternel, le Dieu d''Israël, suivirent les Lévites à Jérusalem pour offrir des sacrifices à l''Eternel, le Dieu de leurs ancêtres. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ils renforcèrent ainsi le royaume de Juda et consolidèrent la royauté de Roboam, fils de Salomon, pendant 3 ans. En effet, ils marchèrent pendant 3 ans sur la voie de David et de Salomon.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Roboam prit pour femme Mahalath. Elle était la fille de Jerimoth, lui-même fils de David, et d''Abichaïl, une fille d''Eliab, fils d''Isaï. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Elle lui donna des fils: Jeush, Shemaria et Zaham. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mais la parole de l''Eternel fut adressée à Shemaeja, l''homme de Dieu: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Après elle, il prit Maaca, petite-fille d''Absalom. Elle lui donna Abija, Attaï, Ziza et Shelomith. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Roboam aimait Maaca, la petite-fille d''Absalom, plus que toutes ses femmes et concubines. Il eut 18 femmes et 60 concubines, et il eut 28 fils et 60 filles. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Roboam donna le premier rang à Abija, qui était un fils de Maaca, et l''établit chef parmi ses frères, car il voulait le faire roi. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Il agit avec discernement en dispersant tous ses fils dans toutes les régions de Juda et de Benjamin, dans toutes les villes fortifiées. Il leur fournit des vivres en abondance et demanda pour eux un grand nombre de femmes.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: '«Parle à Roboam, le fils de Salomon et le roi de Juda, ainsi qu''à tout Israël en Juda et en Benjamin. Annonce-leur: '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '‘Voici ce que dit l''Eternel: Ne montez pas faire la guerre à vos frères! Que chacun de vous reparte chez lui, car c''est de moi que vient cette situation.’» Ils obéirent aux paroles de l''Eternel et firent demi-tour, renonçant à marcher contre Jéroboam.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Roboam siégea à Jérusalem et construisit des villes fortifiées en Juda. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Il reconstruisit Bethléhem, Etham, Tekoa, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Beth-Tsur, Soco, Adullam, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Gath, Marésha, Ziph, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Adoraïm, Lakis, Azéka, '
