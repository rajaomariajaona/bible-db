document_id: NUM.20,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mort de Miriam à Meriba
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Toute l'assemblée des Israélites arriva dans le désert de Tsin le premier mois et le peuple s'arrêta à Kadès. C'est là que Miriam mourut et fut enterrée.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Moïse et Aaron convoquèrent l''assemblée en face du rocher et Moïse leur dit: «Ecoutez donc, rebelles! Est-ce de ce rocher que nous ferons sortir de l''eau pour vous?» '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Puis Moïse leva la main et frappa deux fois le rocher avec son bâton. Il sortit de l'eau en abondance. L'assemblée but, ainsi que le bétail.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Alors l''Eternel dit à Moïse et à Aaron: «Puisque vous n''avez pas eu assez confiance en moi pour respecter ma sainteté devant les Israélites, vous ne ferez pas entrer cette assemblée dans le pays que je lui donne.»'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ce sont les eaux de Meriba parce que les Israélites contestèrent avec l'Eternel et sa sainteté fut reconnue parmi eux.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Opposition d'Edom
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'De Kadès, Moïse envoya des messagers au roi d''Edom pour lui annoncer: «Voici ce que dit ton frère Israël: Tu sais toutes les souffrances que nous avons éprouvées. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Nos ancêtres sont descendus en Egypte et nous y avons habité longtemps. Mais les Egyptiens nous ont maltraités, nos ancêtres et nous. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Nous avons crié à l''Eternel et il nous a entendus. Il a envoyé un ange et nous a fait sortir de l''Egypte. Nous nous trouvons à Kadès, ville située à l''extrémité de ton territoire. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Laisse-nous passer par ton pays. Nous ne traverserons ni les champs ni les vignes et nous ne boirons pas l'eau des puits. Nous suivrons la route royale, sans nous en écarter à droite ou à gauche, jusqu'à ce que nous ayons franchi ton territoire.»
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Edom lui dit: «Tu ne passeras pas chez moi, sinon je sortirai à ta rencontre avec l''épée.» '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Les Israélites lui dirent: «Nous monterons par la grande route et, si nous buvons de ton eau, mes troupeaux et moi, j''en paierai le prix. Je ne ferai que passer avec mes pieds, rien d''autre.» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il n''y avait pas d''eau pour l''assemblée. On se souleva donc contre Moïse et Aaron. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Edom répondit: «Tu ne passeras pas!» et il sortit à sa rencontre avec un peuple nombreux et puissamment armé. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ainsi Edom refusa d'accorder à Israël l'autorisation de passer par son territoire et Israël fit un détour.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Toute l'assemblée des Israélites partit de Kadès et arriva au mont Hor.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mort d'Aaron
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'L''Eternel dit à Moïse et à Aaron vers le mont Hor, sur la frontière du pays d''Edom: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '«Aaron va rejoindre les siens. En effet, il n''entrera pas dans le pays que je donne aux Israélites parce que vous vous êtes rebellés contre mon ordre, aux eaux de Meriba. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Prends Aaron et son fils Eléazar, et fais-les monter sur le mont Hor. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Retire à Aaron ses vêtements et mets-les à son fils Eléazar. C''est là qu''Aaron s''en ira et mourra.» '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Moïse fit ce que l''Eternel avait ordonné. Ils montèrent sur le mont Hor sous les yeux de toute l''assemblée. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Moïse retira à Aaron ses vêtements et les mit à son fils Eléazar. Aaron mourut là, au sommet de la montagne, puis Moïse et Eléazar descendirent de la montagne. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Toute l'assemblée vit qu'Aaron avait expiré, et toute la communauté d'Israël pleura Aaron pendant 30 jours.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Le peuple chercha querelle à Moïse. Ils dirent: «Si seulement nous avions expiré lorsque nos frères ont expiré devant l''Eternel! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Pourquoi avez-vous fait venir l''assemblée de l''Eternel dans ce désert? Est-ce pour que nous y mourions, nous et notre bétail? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Pourquoi nous avez-vous fait quitter l'Egypte, si c'est pour nous amener dans cet endroit de malheur? Ce n'est pas un endroit où l'on puisse semer et il n'y a ni figuier, ni vigne, ni grenadier ni eau à boire.»
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Moïse et Aaron s'éloignèrent de l'assemblée pour se rendre à l'entrée de la tente de la rencontre. Ils tombèrent le visage contre terre et la gloire de l'Eternel leur apparut.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'L''Eternel dit à Moïse: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '«Prends le bâton et convoque l''assemblée, toi ainsi que ton frère Aaron. Vous parlerez au rocher en leur présence et il donnera son eau. Tu feras sortir pour eux de l''eau du rocher et tu feras boire l''assemblée et leur bétail.» '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Moïse prit le bâton qui se trouvait devant l''Eternel, comme l''Eternel le lui avait ordonné. '
