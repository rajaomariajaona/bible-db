document_id: MRK.5
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ils arrivèrent sur l''autre rive du lac, dans le pays des Gadaréniens. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dès que Jésus fut hors de la barque, un homme vint à sa rencontre; il sortait des tombeaux et il était animé par un esprit impur. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Cet homme habitait dans les tombeaux, et personne ne pouvait plus l''attacher, même avec une chaîne. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'En effet, souvent on l''avait attaché avec des fers aux pieds et des chaînes, mais il avait cassé les chaînes et brisé les fers, et personne n''avait la force de le maîtriser. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il était sans cesse, nuit et jour, dans les tombeaux et sur les montagnes; il criait et se blessait lui-même avec des pierres. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il vit Jésus de loin, accourut, se prosterna devant lui '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et s''écria d''une voix forte: «Que me veux-tu, Jésus, Fils du Dieu très-haut? Je t''en supplie au nom de Dieu, ne me tourmente pas.» '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'En effet, Jésus lui disait: «Sors de cet homme, esprit impur!» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il lui demanda: «Quel est ton nom?» «Mon nom est légion, car nous sommes nombreux», répondit-il. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et il le suppliait avec insistance de ne pas les envoyer hors du pays. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il y avait là, vers la montagne, un grand troupeau de porcs en train de chercher à manger. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tous les démons le supplièrent: «Envoie-nous dans ces porcs afin que nous entrions en eux.» '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il le leur permit [aussitôt]. Les esprits impurs sortirent de l''homme, entrèrent dans les porcs, et le troupeau se précipita du haut de la falaise dans le lac; il y avait environ 2000 porcs, et ils se noyèrent dans le lac. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les gardiens du troupeau s''enfuirent et allèrent le raconter dans la ville et dans les campagnes. Les gens allèrent voir ce qui était arrivé. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils vinrent vers Jésus et virent le démoniaque, celui qui avait eu la légion de démons, assis, habillé et dans son bon sens; et ils furent saisis de frayeur. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ceux qui avaient été témoins de la scène leur racontèrent ce qui était arrivé au démoniaque et aux porcs. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Alors ils se mirent à supplier Jésus de quitter leur territoire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Comme il montait dans la barque, celui qui avait été démoniaque le suppliait, demandant à l''accompagner. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jésus ne le lui permit pas mais lui dit: «Va dans ta maison, vers les tiens, et raconte-leur tout ce que le Seigneur a fait pour toi, comment il a eu pitié de toi.» '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il s'en alla et se mit à proclamer dans la Décapole tout ce que Jésus avait fait pour lui. Et tous étaient dans l'étonnement.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guérison d'une femme et résurrection d'une fillette
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Jésus regagna en barque l''autre rive, où une grande foule se rassembla autour de lui. Il était au bord du lac. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Alors vint un des chefs de la synagogue, du nom de Jaïrus. Lorsqu''il aperçut Jésus, il se jeta à ses pieds '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'et le supplia avec insistance: «Ma petite fille est sur le point de mourir. Viens, pose les mains sur elle afin qu''elle soit sauvée, et elle vivra.» '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Jésus s'en alla avec lui. Une grande foule le suivait et le pressait de tous côtés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Or, il y avait une femme atteinte d''hémorragies depuis 12 ans. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Elle avait beaucoup souffert entre les mains de nombreux médecins. Elle avait dépensé tout ce qu''elle possédait, mais cela n''avait servi à rien; au contraire, son état avait plutôt empiré. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Elle entendit parler de Jésus, vint dans la foule par-derrière et toucha son vêtement, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'car elle se disait: «Même si je ne touche que ses vêtements, je serai guérie.» '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'A l''instant même, son hémorragie s''arrêta, et elle sentit dans son corps qu''elle était guérie de son mal. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jésus se rendit aussitôt compte qu''une force était sortie de lui; il se retourna au milieu de la foule et dit: «Qui a touché mes vêtements?» '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ses disciples lui dirent: «Tu vois la foule qui te presse et tu dis: ‘Qui m''a touché?’» '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Jésus regardait autour de lui pour voir celle qui avait fait cela. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'La femme, effrayée et tremblante, sachant ce qui lui était arrivé, vint se jeter à ses pieds et lui dit toute la vérité. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Alors il lui dit: «Ma fille, ta foi t''a sauvée. Pars dans la paix et sois guérie de ton mal.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Il parlait encore quand des gens arrivèrent de chez le chef de la synagogue et lui dirent: «Ta fille est morte. Pourquoi déranger encore le maître?» '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Dès qu''il entendit cette parole, Jésus dit au chef de la synagogue: «N''aie pas peur, crois seulement.» '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Et il ne laissa personne l''accompagner, sauf Pierre, Jacques et Jean, le frère de Jacques. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Ils arrivèrent à la maison du chef de la synagogue où Jésus vit du tumulte, des gens qui pleuraient et poussaient de grands cris. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Il entra et leur dit: «Pourquoi faites-vous ce tumulte et pourquoi pleurez-vous? L''enfant n''est pas morte, mais elle dort.» '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ils se moquaient de lui. Alors il les fit tous sortir, prit avec lui le père et la mère de l''enfant et ceux qui l''avaient accompagné, et il entra là où l''enfant était [couchée]. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Il la prit par la main et lui dit: «Talitha koumi», ce qui signifie: «Jeune fille, lève-toi, je te le dis». '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Aussitôt la jeune fille se leva et se mit à marcher, car elle avait 12 ans. Ils furent [aussitôt] remplis d''un grand étonnement. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Jésus leur adressa de fortes recommandations pour que personne ne le sache et demanda qu'on donne à manger à la jeune fille.
