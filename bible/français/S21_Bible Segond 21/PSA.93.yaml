document_id: PSA.93,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le règne de Dieu sur l'univers
  - type: text
    content: L'Eternel règne, il est revêtu de majesté.
  - type: text
    content: L'Eternel a la force en guise de vêtement, en guise de ceinture.
  - type: text
    content: Aussi, le monde est ferme, il n'est pas ébranlé.
  '2':
  - type: text
    content: Ton trône est établi depuis longtemps,
  - type: text
    content: tu existes de toute éternité.
  '3':
  - type: text
    content: Les fleuves font entendre, Eternel,
  - type: text
    content: les fleuves font entendre leur voix,
  - type: text
    content: les fleuves font entendre le grondement de leurs flots.
  '4':
  - type: text
    content: Plus encore que la voix des grandes eaux,
  - type: text
    content: des flots puissants de la mer,
  - type: text
    content: l'Eternel est puissant dans les lieux célestes.
  '5':
  - type: text
    content: Tes instructions sont entièrement vraies;
  - type: text
    content: la sainteté convient à ta maison,
  - type: text
    content: Eternel, jusqu'à la fin du monde.
