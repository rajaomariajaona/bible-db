document_id: PSA.93
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le règne de Dieu sur l'univers
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: L'Eternel règne, il est revêtu de majesté.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Eternel a la force en guise de vêtement, en guise de ceinture.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aussi, le monde est ferme, il n'est pas ébranlé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ton trône est établi depuis longtemps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu existes de toute éternité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Les fleuves font entendre, Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les fleuves font entendre leur voix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les fleuves font entendre le grondement de leurs flots.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Plus encore que la voix des grandes eaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des flots puissants de la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'Eternel est puissant dans les lieux célestes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tes instructions sont entièrement vraies;
- type: usfm
  marker: q1
  children:
  - type: text
    text: la sainteté convient à ta maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, jusqu'à la fin du monde.
