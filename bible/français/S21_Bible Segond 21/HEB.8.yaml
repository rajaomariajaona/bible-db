document_id: HEB.8,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Imperfection de l'ancienne alliance
  - type: text
    content: 'Le point capital de ce qui vient d''être dit, c''est que nous avons bien un tel grand-prêtre, qui s''est assis à la droite du trône de la majesté divine dans le ciel '
  '10':
  - type: text
    content: 'Mais voici l''alliance que je ferai avec la communauté d''Israël après ces jours-là, dit le Seigneur: je mettrai mes lois dans leur esprit, je les écrirai dans leur cœur, je serai leur Dieu et ils seront mon peuple.'
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Personne n''enseignera plus son concitoyen ni son frère en disant: ‘Tu dois connaître le Seigneur!’ car tous me connaîtront, depuis le plus petit jusqu''au plus grand d''entre eux.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: En effet, je pardonnerai leurs injustices et je ne me souviendrai plus de leurs péchés [ni de leurs fautes].
  - type: note
    content: 'Voici… leurs fautes: citation de Jérémie 31.31-34.'
  - type: text
    content: ' '
  '13':
  - type: text
    content: En parlant d'une alliance
  - type: text
    content: nouvelle
  - type: text
    content: ', le Seigneur a déclaré ancienne la première. Or ce qui est ancien, ce qui a vieilli, est près de disparaître.'
  '2':
  - type: text
    content: et accomplit son service dans le sanctuaire, dans le véritable tabernacle
  - type: note
    content: 'Tabernacle: allusion à la tente que Dieu avait ordonné de dresser en guise de temple pendant le séjour des Israélites dans le désert.'
  - type: text
    content: ', celui qui a été dressé par le Seigneur et non par un être humain.'
  '3':
  - type: text
    content: 'Tout grand-prêtre est établi pour présenter des offrandes et des sacrifices; il est donc nécessaire que Jésus lui aussi ait quelque chose à présenter. '
  '4':
  - type: text
    content: 'Certes, s''il était sur la terre, il ne serait même pas prêtre, car là se trouvent les prêtres qui présentent les offrandes conformément à la loi. '
  '5':
  - type: text
    content: 'Or, ils célèbrent un culte qui n''est que la copie et l''ombre des réalités célestes. Moïse en avait été averti alors qu''il allait construire le tabernacle: '
  - type: text
    content: Regarde
  - type: text
    content: ', lui dit en effet le Seigneur, '
  - type: text
    content: et fais tout d'après le modèle qui t'a été montré sur la montagne
  - type: note
    content: 'Regarde… montagne: citation d''Exode 25.40, épisode situé au mont Sinaï après la conclusion de l''alliance entre l''Eternel et Israël, lors des instructions pour la construction du tabernacle.'
  - type: text
    content: '. '
  '6':
  - type: text
    content: Mais en réalité, Jésus possède un service bien supérieur, et ce d'autant plus qu'il est le médiateur d'une meilleure alliance, fondée sur de meilleures promesses.
  '7':
  - type: text
    content: 'En effet, si la première alliance avait été irréprochable, il n''aurait pas été question de la remplacer par une seconde. '
  '8':
  - type: text
    content: 'De fait, c''est bien comme un reproche que le Seigneur dit à son peuple: '
  - type: text
    content: Voici que les jours viennent, dit le Seigneur, où je conclurai avec la communauté d'Israël et la communauté de Juda une alliance nouvelle.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Elle ne sera pas comme l'alliance que j'ai conclue avec leurs ancêtres le jour où je les ai pris par la main pour les faire sortir d'Egypte. Comme ils n'ont pas persévéré dans mon alliance, moi non plus je ne me suis pas soucié d'eux, dit le Seigneur.
  - type: text
    content: ' '
