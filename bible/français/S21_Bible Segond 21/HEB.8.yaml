document_id: HEB.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Imperfection de l'ancienne alliance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le point capital de ce qui vient d''être dit, c''est que nous avons bien un tel grand-prêtre, qui s''est assis à la droite du trône de la majesté divine dans le ciel '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: et accomplit son service dans le sanctuaire, dans le véritable tabernacle
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tabernacle: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: allusion à la tente que Dieu avait ordonné de dresser en guise de temple pendant le séjour des Israélites dans le désert.
    marker-yv: yv-n
  - type: text
    text: ', celui qui a été dressé par le Seigneur et non par un être humain.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tout grand-prêtre est établi pour présenter des offrandes et des sacrifices; il est donc nécessaire que Jésus lui aussi ait quelque chose à présenter. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Certes, s''il était sur la terre, il ne serait même pas prêtre, car là se trouvent les prêtres qui présentent les offrandes conformément à la loi. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Or, ils célèbrent un culte qui n''est que la copie et l''ombre des réalités célestes. Moïse en avait été averti alors qu''il allait construire le tabernacle: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Regarde
  - type: text
    text: ', lui dit en effet le Seigneur, '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: et fais tout d'après le modèle qui t'a été montré sur la montagne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Regarde… montagne: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 25.40
      metadata:
        usfm: EXO.25.40
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', épisode situé au mont Sinaï après la conclusion de l''alliance entre l''Eternel et Israël, lors des instructions pour la construction du tabernacle.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mais en réalité, Jésus possède un service bien supérieur, et ce d'autant plus qu'il est le médiateur d'une meilleure alliance, fondée sur de meilleures promesses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'En effet, si la première alliance avait été irréprochable, il n''aurait pas été question de la remplacer par une seconde. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'De fait, c''est bien comme un reproche que le Seigneur dit à son peuple: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Voici que les jours viennent, dit le Seigneur, où je conclurai avec la communauté d'Israël et la communauté de Juda une alliance nouvelle.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Elle ne sera pas comme l'alliance que j'ai conclue avec leurs ancêtres le jour où je les ai pris par la main pour les faire sortir d'Egypte. Comme ils n'ont pas persévéré dans mon alliance, moi non plus je ne me suis pas soucié d'eux, dit le Seigneur.
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'Mais voici l''alliance que je ferai avec la communauté d''Israël après ces jours-là, dit le Seigneur: je mettrai mes lois dans leur esprit, je les écrirai dans leur cœur, je serai leur Dieu et ils seront mon peuple.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'Personne n''enseignera plus son concitoyen ni son frère en disant: ‘Tu dois connaître le Seigneur!’ car tous me connaîtront, depuis le plus petit jusqu''au plus grand d''entre eux.'
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: En effet, je pardonnerai leurs injustices et je ne me souviendrai plus de leurs péchés [ni de leurs fautes].
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.8-12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Voici… leurs fautes: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jérémie 31.31-34
      metadata:
        usfm: JER.31.31+JER.31.32+JER.31.33+JER.31.34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: En parlant d'une alliance
  - type: usfm
    marker: qt
    children:
    - type: text
      text: nouvelle
  - type: text
    text: ', le Seigneur a déclaré ancienne la première. Or ce qui est ancien, ce qui a vieilli, est près de disparaître.'
