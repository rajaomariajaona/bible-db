document_id: ISA.31
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu, seul auteur du salut
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Malheur à ceux qui descendent en Egypte pour avoir du secours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui s'appuient sur des chevaux
- type: usfm
  marker: q1
  children:
  - type: text
    text: et placent leur confiance dans le grand nombre de chars et la force des cavaliers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais qui ne portent pas le regard sur le Saint d'Israël
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne recherchent pas l'Eternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Lui aussi, cependant, il est sage. Il fera venir le malheur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne retirera pas ses paroles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il se dressera
- type: usfm
  marker: q1
  children:
  - type: text
    text: contre la communauté des méchants et contre le secours apporté par ceux qui commettent l'injustice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: L'Egyptien est un être humain et non Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses chevaux ne sont que chair et non esprit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand l'Eternel déploiera sa puissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le protecteur sera ébranlé, le protégé tombera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous ensemble ils disparaîtront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Oui, voici ce que m''a dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Lorsque le lion ou le lionceau rugit, au-dessus de sa proie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: même si tous les bergers ont été rassemblés contre lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne se laisse ni effrayer par leur voix
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni intimider par leur vacarme.
- type: usfm
  marker: q1
  children:
  - type: text
    text: De même, l'Eternel, le maître de l'univers, descendra
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour combattre sur le mont Sion et sur sa colline.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tout comme des oiseaux déploient leurs ailes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'Eternel, le maître de l'univers, étendra sa protection sur Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il protégera et délivrera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il épargnera et sauvera.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Revenez à celui dont les Israélites se sont profondément détournés!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ce jour-là, chacun rejettera ses faux dieux en argent et en or,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux que vous vous êtes fabriqués de vos propres mains pécheresses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L'Assyrien tombera sous les coups d'une épée qui n'est pas celle d'un homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une épée qui n'est pas humaine l'engloutira.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il prendra la fuite devant l'épée
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses jeunes gens seront soumis à la corvée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Le plus solide s'évanouira, tant il aura peur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses chefs seront terrorisés devant l'étendard,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l'Eternel qui a son feu à Sion
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son four à Jérusalem.
