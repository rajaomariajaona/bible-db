document_id: ISA.31,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu, seul auteur du salut
  - type: text
    content: Malheur à ceux qui descendent en Egypte pour avoir du secours,
  - type: text
    content: qui s'appuient sur des chevaux
  - type: text
    content: et placent leur confiance dans le grand nombre de chars et la force des cavaliers,
  - type: text
    content: mais qui ne portent pas le regard sur le Saint d'Israël
  - type: text
    content: et ne recherchent pas l'Eternel!
  '2':
  - type: text
    content: Lui aussi, cependant, il est sage. Il fera venir le malheur
  - type: text
    content: et ne retirera pas ses paroles.
  - type: text
    content: Il se dressera
  - type: text
    content: contre la communauté des méchants et contre le secours apporté par ceux qui commettent l'injustice.
  '3':
  - type: text
    content: L'Egyptien est un être humain et non Dieu,
  - type: text
    content: ses chevaux ne sont que chair et non esprit.
  - type: text
    content: Quand l'Eternel déploiera sa puissance,
  - type: text
    content: le protecteur sera ébranlé, le protégé tombera,
  - type: text
    content: et tous ensemble ils disparaîtront.
  '4':
  - type: text
    content: 'Oui, voici ce que m''a dit l''Eternel:'
  - type: text
    content: «Lorsque le lion ou le lionceau rugit, au-dessus de sa proie,
  - type: text
    content: même si tous les bergers ont été rassemblés contre lui,
  - type: text
    content: il ne se laisse ni effrayer par leur voix
  - type: text
    content: ni intimider par leur vacarme.
  - type: text
    content: De même, l'Eternel, le maître de l'univers, descendra
  - type: text
    content: pour combattre sur le mont Sion et sur sa colline.
  '5':
  - type: text
    content: Tout comme des oiseaux déploient leurs ailes,
  - type: text
    content: l'Eternel, le maître de l'univers, étendra sa protection sur Jérusalem.
  - type: text
    content: Il protégera et délivrera,
  - type: text
    content: il épargnera et sauvera.»
  '6':
  - type: text
    content: Revenez à celui dont les Israélites se sont profondément détournés!
  '7':
  - type: text
    content: Ce jour-là, chacun rejettera ses faux dieux en argent et en or,
  - type: text
    content: ceux que vous vous êtes fabriqués de vos propres mains pécheresses.
  '8':
  - type: text
    content: L'Assyrien tombera sous les coups d'une épée qui n'est pas celle d'un homme,
  - type: text
    content: une épée qui n'est pas humaine l'engloutira.
  - type: text
    content: Il prendra la fuite devant l'épée
  - type: text
    content: et ses jeunes gens seront soumis à la corvée.
  '9':
  - type: text
    content: Le plus solide s'évanouira, tant il aura peur,
  - type: text
    content: et ses chefs seront terrorisés devant l'étendard,
  - type: text
    content: déclare l'Eternel qui a son feu à Sion
  - type: text
    content: et son four à Jérusalem.
