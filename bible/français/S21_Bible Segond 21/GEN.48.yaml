document_id: GEN.48,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob bénit les deux fils de Joseph
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Après cela, on vint dire à Joseph: «Ton père est malade.» Il prit avec lui ses deux fils Manassé et Ephraïm. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'La vue d''Israël avait baissé à cause de la vieillesse, il ne voyait plus bien. Joseph les fit approcher de lui et Israël les embrassa et les étreignit tendrement. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Israël dit à Joseph: «Je ne pensais pas revoir ton visage et voici que Dieu me fait même voir ta descendance!» '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Joseph les retira des genoux de son père et se prosterna jusqu''à terre devant lui. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Puis il les prit tous les deux par la main: il tint Ephraïm de la main droite, de telle sorte qu''il était à gauche d''Israël, et Manassé de la main gauche, de telle sorte qu''il était à droite d''Israël, et il les fit approcher de lui. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Israël tendit sa main droite et la posa sur la tête d''Ephraïm, qui était le plus jeune, et il posa sa main gauche sur la tête de Manassé. Ce fut intentionnellement qu''il posa ses mains ainsi, car Manassé était l''aîné. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Il bénit Joseph et dit: «Que le Dieu devant lequel ont marché mes pères Abraham et Isaac, le Dieu qui a pris soin de moi depuis que j''existe jusqu''à aujourd''hui, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'l''ange qui m''a délivré de tout mal, bénisse ces garçons! Que mon nom et celui de mes pères Abraham et Isaac subsistent à travers eux et qu''ils se multiplient abondamment à l''intérieur du pays!» '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Joseph vit avec déplaisir que son père posait sa main droite sur la tête d''Ephraïm. Il prit la main de son père pour la détourner de la tête d''Ephraïm et la diriger sur celle de Manassé. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Joseph dit à son père: «Ce n''est pas juste, mon père, car c''est celui-ci qui est l''aîné. Pose ta main droite sur sa tête!» '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Son père refusa et dit: «Je sais, mon fils, je sais. Lui aussi donnera naissance à un peuple, lui aussi sera grand, mais son frère cadet sera plus grand que lui et sa descendance remplira les nations.» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'On avertit Jacob, on lui dit: «Voici ton fils Joseph qui vient vers toi.» Israël rassembla ses forces et s''assit sur son lit.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Il les bénit ce jour-là. Il dit: «C''est par toi qu''Israël bénira en disant: ‘Que Dieu te traite comme Ephraïm et comme Manassé!’» Il plaça Ephraïm avant Manassé.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Israël dit à Joseph: «Je vais mourir, mais Dieu sera avec vous et il vous fera retourner dans le pays de vos ancêtres. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Je te donne une part de plus qu''à tes frères: Sichem, que j''ai prise aux Amoréens avec mon épée et mon arc.»'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Jacob dit à Joseph: «Le Dieu tout-puissant m''est apparu à Luz, dans le pays de Canaan, et il m''a béni. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il m''a dit: ‘Je te donnerai des enfants, je rendrai tes descendants nombreux et je ferai sortir de toi tout un groupe de peuples. Je donnerai ce pays à ta descendance après toi pour qu''elle le possède toujours.’ '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Désormais, les deux fils qui te sont nés en Egypte avant mon arrivée vers toi en Egypte seront les miens: Ephraïm et Manassé seront mes fils, tout comme Ruben et Siméon. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Quant aux enfants que tu as eus après eux, ils resteront les tiens. Ils seront associés à leurs frères dans leur héritage. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: A mon retour de Paddan, Rachel est morte en route près de moi dans le pays de Canaan, à une certaine distance d'Ephrata. C'est là que je l'ai enterrée, sur le chemin d'Ephrata, c'est-à-dire Bethléhem.»
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Puis Israël regarda les fils de Joseph et demanda: «Qui sont ceux-ci?» '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Joseph répondit à son père: «Ce sont mes fils. Dieu me les a donnés ici.» Israël dit: «Fais-les approcher de moi pour que je les bénisse.» '
