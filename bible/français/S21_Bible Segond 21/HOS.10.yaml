document_id: HOS.10
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Israël était une vigne fertile
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui produisait beaucoup de fruits.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Plus ses fruits étaient abondants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: plus il a multiplié les autels;
- type: usfm
  marker: q1
  children:
  - type: text
    text: plus son pays était prospère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: plus il a embelli les statues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Leur cœur est partagé: ils vont maintenant en supporter les conséquences.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Eternel démolira leurs autels, détruira leurs statues.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Bientôt ils diront:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Nous n'avons pas de roi
- type: usfm
  marker: q1
  children:
  - type: text
    text: car nous n'avons pas craint l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le roi, que pourrait-il faire pour nous?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ils parlent et ils parlent, ils font de faux serments,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils concluent des alliances.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aussi, le jugement poussera comme une plante vénéneuse
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans les sillons des champs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les habitants de Samarie seront consternés au sujet des veaux de Beth-Aven,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le peuple mènera le deuil sur l'idole
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses prêtres trembleront pour elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour sa gloire, qui va disparaître du milieu d'eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Elle sera transportée en Assyrie
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour servir de cadeau au roi Jareb.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La honte s'emparera d'Ephraïm
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Israël rougira de ses projets.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'C''en est fait de Samarie, de son roi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est comme de l'écume à la surface de l'eau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Les hauts lieux de Beth-Aven, où Israël a péché, seront détruits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la ronce et le chardon pousseront sur leurs autels.
- type: usfm
  marker: q1
  children:
  - type: text
    text: '*Ils diront aux montagnes: «Couvrez-nous!»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et aux collines: «Tombez sur nous!»'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ils diront… sur nous: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luc 23.30
      metadata:
        usfm: LUK.23.30
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Apocalypse 6.16
      metadata:
        usfm: REV.6.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Depuis l'époque de Guibea
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Guibea: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ville associée à un épisode particulièrement sombre de l'histoire d'Israël (voir Juges 19–21).
    marker-yv: yv-n
  - type: text
    text: ' tu as péché, Israël!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils en sont restés là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la guerre contre les méchants ne les atteindrait pas à Guibea?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Je les corrigerai à mon gré,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des peuples se ligueront contre eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand on les enchaînera pour leur double faute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ephraïm est une génisse dressée qui aime fouler le grain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais je mettrai une barre sur son beau cou;
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'attellerai Ephraïm, Juda labourera, Jacob
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jacob: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ancêtre du peuple d'Israël.
    marker-yv: yv-n
  - type: text
    text: ' hersera.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Semez pour la justice, moissonnez pour la bonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '*défrichez-vous un champ nouveau'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Défrichez… nouveau: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'repris en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jérémie 4.3
      metadata:
        usfm: JER.4.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est le moment de rechercher l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu'à ce qu'il vienne et déverse pour vous la justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Vous avez cultivé le mal, moissonné le péché,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mangé le fruit du mensonge.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, tu as eu confiance dans ta voie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans le nombre de tes vaillants hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Un tapage s'élèvera parmi ton peuple
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toutes tes forteresses seront détruites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme Beth-Arbel a été détruite par Shalman
- type: usfm
  marker: q1
  children:
  - type: text
    text: le jour du combat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand la mère a été écrasée avec les enfants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Voilà ce que vous attirera Béthel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de votre extrême méchanceté.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A l'aurore, c'en est fait du roi d'Israël.
