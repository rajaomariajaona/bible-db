document_id: HOS.10,152
type_code: fra
verses:
  '1':
  - type: text
    content: Israël était une vigne fertile
  - type: text
    content: qui produisait beaucoup de fruits.
  - type: text
    content: Plus ses fruits étaient abondants,
  - type: text
    content: plus il a multiplié les autels;
  - type: text
    content: plus son pays était prospère,
  - type: text
    content: plus il a embelli les statues.
  '10':
  - type: text
    content: Je les corrigerai à mon gré,
  - type: text
    content: et des peuples se ligueront contre eux,
  - type: text
    content: quand on les enchaînera pour leur double faute.
  '11':
  - type: text
    content: Ephraïm est une génisse dressée qui aime fouler le grain,
  - type: text
    content: mais je mettrai une barre sur son beau cou;
  - type: text
    content: j'attellerai Ephraïm, Juda labourera, Jacob
  - type: note
    content: 'Jacob: ancêtre du peuple d''Israël.'
  - type: text
    content: ' hersera.'
  '12':
  - type: text
    content: Semez pour la justice, moissonnez pour la bonté,
  - type: text
    content: '*défrichez-vous un champ nouveau'
  - type: note
    content: 'Défrichez… nouveau: repris en Jérémie 4.3.'
  - type: text
    content: '!'
  - type: text
    content: C'est le moment de rechercher l'Eternel,
  - type: text
    content: jusqu'à ce qu'il vienne et déverse pour vous la justice.
  '13':
  - type: text
    content: Vous avez cultivé le mal, moissonné le péché,
  - type: text
    content: mangé le fruit du mensonge.
  - type: text
    content: En effet, tu as eu confiance dans ta voie,
  - type: text
    content: dans le nombre de tes vaillants hommes.
  '14':
  - type: text
    content: Un tapage s'élèvera parmi ton peuple
  - type: text
    content: et toutes tes forteresses seront détruites,
  - type: text
    content: comme Beth-Arbel a été détruite par Shalman
  - type: text
    content: le jour du combat,
  - type: text
    content: quand la mère a été écrasée avec les enfants.
  '15':
  - type: text
    content: Voilà ce que vous attirera Béthel,
  - type: text
    content: à cause de votre extrême méchanceté.
  - type: text
    content: A l'aurore, c'en est fait du roi d'Israël.
  '2':
  - type: text
    content: 'Leur cœur est partagé: ils vont maintenant en supporter les conséquences.'
  - type: text
    content: L'Eternel démolira leurs autels, détruira leurs statues.
  '3':
  - type: text
    content: 'Bientôt ils diront:'
  - type: text
    content: «Nous n'avons pas de roi
  - type: text
    content: car nous n'avons pas craint l'Eternel,
  - type: text
    content: et le roi, que pourrait-il faire pour nous?»
  '4':
  - type: text
    content: Ils parlent et ils parlent, ils font de faux serments,
  - type: text
    content: ils concluent des alliances.
  - type: text
    content: Aussi, le jugement poussera comme une plante vénéneuse
  - type: text
    content: dans les sillons des champs.
  '5':
  - type: text
    content: Les habitants de Samarie seront consternés au sujet des veaux de Beth-Aven,
  - type: text
    content: le peuple mènera le deuil sur l'idole
  - type: text
    content: et ses prêtres trembleront pour elle,
  - type: text
    content: pour sa gloire, qui va disparaître du milieu d'eux.
  '6':
  - type: text
    content: Elle sera transportée en Assyrie
  - type: text
    content: pour servir de cadeau au roi Jareb.
  - type: text
    content: La honte s'emparera d'Ephraïm
  - type: text
    content: et Israël rougira de ses projets.
  '7':
  - type: text
    content: 'C''en est fait de Samarie, de son roi:'
  - type: text
    content: il est comme de l'écume à la surface de l'eau.
  '8':
  - type: text
    content: Les hauts lieux de Beth-Aven, où Israël a péché, seront détruits,
  - type: text
    content: la ronce et le chardon pousseront sur leurs autels.
  - type: text
    content: '*Ils diront aux montagnes: «Couvrez-nous!»'
  - type: text
    content: 'et aux collines: «Tombez sur nous!»'
  - type: note
    content: 'Ils diront… sur nous: cité en Luc 23.30; Apocalypse 6.16.'
  '9':
  - type: text
    content: Depuis l'époque de Guibea
  - type: note
    content: 'Guibea: ville associée à un épisode particulièrement sombre de l''histoire d''Israël (voir Juges 19–21).'
  - type: text
    content: ' tu as péché, Israël!'
  - type: text
    content: Ils en sont restés là,
  - type: text
    content: et la guerre contre les méchants ne les atteindrait pas à Guibea?
