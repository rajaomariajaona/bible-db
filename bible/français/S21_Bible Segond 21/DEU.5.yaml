document_id: DEU.5,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Moïse convoqua tous les Israélites et leur dit: «Ecoute, Israël, les prescriptions et les règles que je vous fais entendre aujourd''hui. Apprenez-les et mettez-les soigneusement en pratique.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et j'agis avec bonté jusqu'à 1000 générations envers ceux qui m'aiment et qui respectent mes commandements.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Tu n'utiliseras pas le nom de l'Eternel, ton Dieu, à la légère, car l'Eternel ne laissera pas impuni celui qui utilisera son nom à la légère.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Respecte le jour du repos en en faisant un jour saint comme l''Eternel, ton Dieu, te l''a ordonné. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant 6 jours, tu travailleras et tu feras tout ce que tu dois faire. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais le septième jour est le jour du repos de l''Eternel, ton Dieu. Tu ne feras aucun travail, ni toi, ni ton fils, ni ta fille, ni ton esclave, ni ta servante, ni ton bœuf, ni ton âne, ni aucune de tes bêtes, ni l''étranger qui habite chez toi, afin que ton esclave et ta servante se reposent comme toi. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu te souviendras que tu as été esclave en Egypte et que l'Eternel, ton Dieu, t'en a fait sortir avec puissance et force. Voilà pourquoi l'Eternel, ton Dieu, t'a ordonné de respecter le jour du repos.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »*Honore ton père et ta mère comme l'Eternel, ton Dieu, te l'a ordonné, afin de vivre longtemps et d'être heureux dans le pays que l'Eternel, ton Dieu, te donne.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Tu ne commettras pas de meurtre.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Tu ne commettras pas d'adultère.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Tu ne commettras pas de vol.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»L''Eternel, notre Dieu, a conclu une alliance avec nous à Horeb. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Tu ne porteras pas de faux témoignage contre ton prochain.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Tu ne convoiteras pas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.16-21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Honore… convoiteras pas: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir la note sur '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Exode 20.12-17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' la femme de ton prochain; tu ne désireras pas la maison de ton prochain, ni son champ, ni son esclave, ni sa servante, ni son bœuf, ni son âne, ni quoi que ce soit qui lui appartienne.’'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Telles sont les paroles que l'Eternel a prononcées à haute voix sur la montagne, du milieu du feu, des nuées et de l'obscurité, et qu'il a adressées à toute votre assemblée, sans rien ajouter. Il les a écrites sur deux tables de pierre qu'il m'a données.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Lorsque vous avez entendu la voix du milieu des ténèbres et tandis que la montagne était tout en feu, vos chefs de tribus et vos anciens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Anciens: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fonction présente dans la plupart des peuples de l'Orient ancien, dont Israël, qui consistait notamment à diriger et conseiller le peuple.
      marker-yv: yv-n
    - type: text
      text: ' se sont tous approchés de moi, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et vous avez dit: ‘Voici que l''Eternel, notre Dieu, nous a montré sa gloire et sa grandeur, et nous avons entendu sa voix du milieu du feu. Aujourd''hui, nous avons vu que Dieu a parlé à des hommes et qu''ils sont restés en vie. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant pourquoi mourrions-nous? En effet, ce grand feu nous dévorera. Si nous continuons à entendre la voix de l''Eternel, notre Dieu, nous mourrons. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quel est l''homme, en effet, qui ait déjà entendu, comme nous, le Dieu vivant parler du milieu du feu et qui soit resté en vie? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que ce soit toi qui t'approches et écoutes tout ce que dira l'Eternel, notre Dieu. Tu nous rapporteras toi-même tout ce que te dira l'Eternel, notre Dieu; nous l'écouterons et nous le ferons.’
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»L''Eternel a entendu les paroles que vous m''avez adressées et il m''a dit: ‘J''ai entendu les paroles que ce peuple t''a adressées. Tout ce qu''ils ont dit est bien. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si seulement ils avaient toujours ce même cœur pour me craindre et pour respecter tous mes commandements, afin d''être toujours heureux, eux et leurs enfants! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce n''est pas avec nos ancêtres que l''Eternel a conclu cette alliance, c''est avec nous, qui sommes ici aujourd''hui, tous vivants. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Va leur dire de retourner dans leurs tentes. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant à toi, reste ici avec moi et je te dirai tous les commandements, les prescriptions et les règles que tu devras leur enseigner afin qu''ils les mettent en pratique dans le pays dont je leur donne la possession. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous veillerez à vous conformer à ce que l''Eternel, votre Dieu, vous a ordonné de faire, vous ne vous en écarterez ni à droite ni à gauche. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous suivrez entièrement la voie que l'Eternel, votre Dieu, vous a prescrite, afin de vivre et d'être heureux, de vivre longtemps dans le pays dont vous aurez la possession.’
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel vous a parlé face à face sur la montagne, du milieu du feu. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je me suis alors tenu entre l''Eternel et vous pour vous annoncer la parole de l''Eternel. En effet, vous aviez peur du feu et vous n''êtes pas montés sur la montagne. Il a dit:'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »‘*Je suis l'Eternel, ton Dieu, qui t'ai fait sortir d'Egypte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je suis… d''Egypte: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'affirmation identique au '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 81.11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', de la maison d''esclavage.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Tu n'auras pas d'autres dieux devant moi.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Tu ne te feras pas de sculpture sacrée ni aucune représentation de ce qui est en haut dans le ciel, en bas sur la terre et dans l'eau plus bas que la terre.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Tu ne te prosterneras pas devant ces choses et tu ne les serviras pas, car moi, l''Eternel, ton Dieu, je suis un Dieu jaloux. Je punis la faute des pères sur les enfants jusqu''à la troisième et à la quatrième génération de ceux qui me détestent, '
