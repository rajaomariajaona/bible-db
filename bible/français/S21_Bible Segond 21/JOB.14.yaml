document_id: JOB.14,152
type_code: fra
verses:
  '1':
  - type: text
    content: »L'être humain né de la femme!
  - type: text
    content: Sa vie est courte mais pleine d'agitation.
  '10':
  - type: text
    content: Quant à l'homme, il meurt et il reste inerte.
  - type: text
    content: Quand l'être humain expire, où est-il?
  '11':
  - type: text
    content: »L'eau de la mer se retire,
  - type: text
    content: les fleuves arrêtent de couler et deviennent tout secs.
  '12':
  - type: text
    content: De la même manière, l'homme se couche pour ne plus se relever.
  - type: text
    content: Il ne se réveillera pas tant que le ciel subsistera,
  - type: text
    content: il ne sortira pas de son sommeil.
  '13':
  - type: text
    content: »Si seulement tu voulais me cacher dans le séjour des morts,
  - type: text
    content: m'y tenir à l'abri jusqu'à ce que ta colère soit passée!
  - type: text
    content: Tu me fixerais un délai, puis tu te souviendrais de moi.
  '14':
  - type: text
    content: Mais si l'homme meurt, revivra-t-il?
  - type: text
    content: Si tel était le cas, je garderais l'espoir, pendant toute ma vie de luttes,
  - type: text
    content: que ma situation vienne à changer.
  '15':
  - type: text
    content: Tu appellerais et moi, je te répondrais.
  - type: text
    content: Ton désir serait résolument tourné vers ta créature.
  '16':
  - type: text
    content: Alors que maintenant tu comptes mes pas,
  - type: text
    content: tu n'aurais plus l'œil sur mes péchés;
  '17':
  - type: text
    content: tu enfermerais ma transgression dans un sac
  - type: text
    content: et tu blanchirais ma faute.
  '18':
  - type: text
    content: »Mais la montagne qui s'écroule est réduite en poussière,
  - type: text
    content: le rocher bouge de son emplacement,
  '19':
  - type: text
    content: l'eau use les pierres
  - type: text
    content: et ses courants entraînent la poussière de la terre.
  - type: text
    content: De la même manière, tu fais disparaître l'espérance de l'homme.
  '2':
  - type: text
    content: Il pousse comme une fleur, puis il se flétrit;
  - type: text
    content: il s'enfuit comme une ombre, sans résister.
  '20':
  - type: text
    content: Tu l'assailles sans cesse et il s'en va;
  - type: text
    content: tu le défigures, puis tu le renvoies.
  '21':
  - type: text
    content: Ses fils peuvent connaître la gloire, il n'en sait rien;
  - type: text
    content: ils peuvent devenir insignifiants, il n'en perçoit rien.
  '22':
  - type: text
    content: C'est pour lui seul qu'il éprouve de la douleur dans son corps,
  - type: text
    content: c'est pour lui seul qu'il ressent de la tristesse dans son âme.»
  '3':
  - type: text
    content: Pourtant c'est sur lui que tu as l'œil ouvert,
  - type: text
    content: et tu me fais aller en justice avec toi!
  '4':
  - type: text
    content: Qui fera sortir le pur de l'impur?
  - type: text
    content: Personne.
  '5':
  - type: text
    content: »Si les jours de l'homme sont fixés, si tu as déterminé le nombre de ses mois,
  - type: text
    content: si tu en as marqué les limites qu'il ne peut franchir,
  '6':
  - type: text
    content: détourne les regards de lui et accorde-lui du répit pour qu'il ait au moins la joie du salarié à la fin de sa journée!
  '7':
  - type: text
    content: '»En effet, pour un arbre il y a de l''espérance:'
  - type: text
    content: quand on le coupe, il repousse
  - type: text
    content: et il produit encore des rejetons;
  '8':
  - type: text
    content: même si sa racine a vieilli dans la terre
  - type: text
    content: et que son tronc meurt dans la poussière,
  '9':
  - type: text
    content: il reverdit à l'approche de l'eau,
  - type: text
    content: il développe des branches comme une jeune plante.
