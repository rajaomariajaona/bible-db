document_id: JOB.14
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: »L'être humain né de la femme!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa vie est courte mais pleine d'agitation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il pousse comme une fleur, puis il se flétrit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il s'enfuit comme une ombre, sans résister.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Pourtant c'est sur lui que tu as l'œil ouvert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu me fais aller en justice avec toi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Qui fera sortir le pur de l'impur?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Personne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: »Si les jours de l'homme sont fixés, si tu as déterminé le nombre de ses mois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si tu en as marqué les limites qu'il ne peut franchir,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: détourne les regards de lui et accorde-lui du répit pour qu'il ait au moins la joie du salarié à la fin de sa journée!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '»En effet, pour un arbre il y a de l''espérance:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand on le coupe, il repousse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il produit encore des rejetons;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: même si sa racine a vieilli dans la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que son tronc meurt dans la poussière,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: il reverdit à l'approche de l'eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il développe des branches comme une jeune plante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Quant à l'homme, il meurt et il reste inerte.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand l'être humain expire, où est-il?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: »L'eau de la mer se retire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les fleuves arrêtent de couler et deviennent tout secs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: De la même manière, l'homme se couche pour ne plus se relever.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne se réveillera pas tant que le ciel subsistera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne sortira pas de son sommeil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: »Si seulement tu voulais me cacher dans le séjour des morts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: m'y tenir à l'abri jusqu'à ce que ta colère soit passée!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu me fixerais un délai, puis tu te souviendrais de moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mais si l'homme meurt, revivra-t-il?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si tel était le cas, je garderais l'espoir, pendant toute ma vie de luttes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que ma situation vienne à changer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tu appellerais et moi, je te répondrais.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ton désir serait résolument tourné vers ta créature.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Alors que maintenant tu comptes mes pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu n'aurais plus l'œil sur mes péchés;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: tu enfermerais ma transgression dans un sac
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu blanchirais ma faute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: »Mais la montagne qui s'écroule est réduite en poussière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le rocher bouge de son emplacement,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: l'eau use les pierres
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses courants entraînent la poussière de la terre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: De la même manière, tu fais disparaître l'espérance de l'homme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tu l'assailles sans cesse et il s'en va;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu le défigures, puis tu le renvoies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ses fils peuvent connaître la gloire, il n'en sait rien;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils peuvent devenir insignifiants, il n'en perçoit rien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: C'est pour lui seul qu'il éprouve de la douleur dans son corps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est pour lui seul qu'il ressent de la tristesse dans son âme.»
