document_id: GEN.21,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Naissance d'Isaac et départ d'Ismaël
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L''Eternel intervint en faveur de Sara comme il l''avait dit, il accomplit pour elle ce qu''il avait promis: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Alors elle dit à Abraham: *«Chasse cette esclave et son fils, car le fils de cette esclave n''héritera pas avec mon fils'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Chasse… fils: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Galates 4.30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', avec Isaac.» '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Cette parole déplut beaucoup à Abraham parce que c''était son fils. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Cependant, Dieu dit à Abraham: «Que cela ne te déplaise pas à cause de l''enfant et de ton esclave. Quoi que te dise Sara, écoute-la, car *c''est par Isaac qu''une descendance te sera assurée'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'C''est par… assurée: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Romains 9.7
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hébreux 11.18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Je ferai aussi une nation du fils de l'esclave, car il est ta descendance.»
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Abraham se leva de bon matin. Il prit du pain et une outre d''eau qu''il donna à Agar et plaça sur son épaule. Il lui remit aussi l''enfant et la renvoya. Elle s''en alla et se perdit dans le désert de Beer-Shéba. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Quand l''eau de l''outre fut épuisée, elle laissa l''enfant sous un des arbrisseaux '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'et alla s''asseoir vis-à-vis, à la distance d''une portée d''arc, car elle se disait: «Je ne veux pas voir mourir mon enfant!» Elle s''assit donc vis-à-vis de lui et se mit à pleurer tout haut. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dieu entendit les cris de l''enfant. L''ange de Dieu appela Agar depuis le ciel et lui dit: «Qu''as-tu, Agar? N''aie pas peur, car Dieu a entendu les cris de l''enfant là où il se trouve. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Lève-toi, relève l''enfant et tiens-le par la main, car je ferai de lui une grande nation.» '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dieu lui ouvrit les yeux et elle vit un puits. Elle alla remplir l''outre d''eau et donna à boire à l''enfant. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Sara tomba enceinte et donna un fils à Abraham dans sa vieillesse, au moment fixé dont Dieu lui avait parlé. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dieu fut avec l''enfant. Celui-ci grandit, habita dans le désert et devint tireur à l''arc. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Il s'installa dans le désert de Paran et sa mère prit pour lui une femme égyptienne.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Abraham à Beer-Shéba
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'A cette époque-là, Abimélec, accompagné de Picol, le chef de son armée, dit à Abraham: «Dieu est avec toi dans tout ce que tu fais. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Jure-moi maintenant ici, au nom de Dieu, que tu ne me tromperas pas, ni moi, ni mes enfants, ni mes petits-enfants, et que tu feras preuve envers moi et envers le pays où tu séjournes de la même bonté que moi envers toi.» '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Abraham dit: «Je le jurerai.» '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Il fit toutefois des reproches à Abimélec au sujet d''un puits dont les serviteurs d''Abimélec s''étaient emparés de force. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Abimélec répondit: «J''ignore qui a fait cela. Tu ne m''en avais pas informé et moi-même, je n''en entends parler qu''aujourd''hui.» '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Abraham prit des brebis et des bœufs qu''il donna à Abimélec, et ils conclurent tous les deux une alliance. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Abraham mit à part sept jeunes brebis. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Abimélec dit à Abraham: «Qu''est-ce que ces sept jeunes brebis que tu as mises à part?» '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Abraham appela Isaac le fils qui lui était né, que Sara lui avait donné. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Il répondit: «Tu accepteras ces sept brebis de ma part, afin que cela me serve de témoignage que j''ai creusé ce puits.» '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: C'est pourquoi on appelle cet endroit Beer-Shéba
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.31 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Beer-Shéba: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'littéralement puits des sept (cf. versets 28-30) ou puits du serment (cf. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 26.31-33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ': parce que c''est là qu''ils prêtèrent tous les deux serment. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ils conclurent donc une alliance à Beer-Shéba. Puis Abimélec se leva avec Picol, le chef de son armée, et ils retournèrent dans le pays des Philistins. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Abraham planta des tamaris à Beer-Shéba, et là il fit appel au nom de l''Eternel, le Dieu d''éternité. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Abraham séjourna longtemps dans le pays des Philistins.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il circoncit son fils Isaac lorsqu''il fut âgé de 8 jours, comme Dieu le lui avait ordonné. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Abraham était âgé de 100 ans à la naissance de son fils Isaac. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Sara dit: «Dieu m''a donné un sujet de rire et tous ceux qui l''apprendront riront de moi.» '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Elle ajouta: «Qui aurait osé dire à Abraham: ‘Sara allaitera des enfants’? Pourtant, je lui ai donné un fils dans sa vieillesse.»'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: L'enfant grandit et fut sevré. Abraham fit un grand festin le jour où Isaac fut sevré.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Sara vit rire le fils que l''Egyptienne Agar avait donné à Abraham. '
