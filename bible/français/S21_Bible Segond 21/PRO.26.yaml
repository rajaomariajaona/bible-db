document_id: PRO.26,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les relations avec le stupide
  - type: text
    content: La gloire ne convient pas plus à un homme stupide
  - type: text
    content: que la neige en été ou la pluie pendant la moisson.
  '10':
  - type: text
    content: Celui qui engage un homme stupide ou le premier venu
  - type: text
    content: ressemble à un archer qui blesse tout le monde.
  '11':
  - type: text
    content: Comme *un chien retourne à ce qu'il a vomi
  - type: note
    content: 'Un chien… vomi: cité en 2 Pierre 2.22.'
  - type: text
    content: ','
  - type: text
    content: l'homme stupide reproduit sa folie.
  '12':
  - type: text
    content: Si tu vois un homme qui se croit sage, il y a plus à attendre d'un homme stupide que de lui.
  '13':
  - type: text
    content: 'Le paresseux dit: «Il y a un lion sur le chemin,'
  - type: text
    content: il y a un lion dans les rues!»
  '14':
  - type: text
    content: La porte tourne sur ses gonds
  - type: text
    content: et le paresseux sur son lit.
  '15':
  - type: text
    content: Le paresseux plonge sa main dans le plat,
  - type: text
    content: et il trouve pénible de la ramener à sa bouche.
  '16':
  - type: text
    content: Le paresseux se croit plus sage
  - type: text
    content: que sept hommes qui répondent avec discernement.
  '17':
  - type: text
    content: Il attrape un chien par les oreilles,
  - type: text
    content: le passant qui se mêle à une dispute qui ne le concerne pas.
  '18':
  - type: text
    content: Pareil à un fou qui lance projectiles
  - type: text
    content: et flèches et sème la mort,
  '19':
  - type: text
    content: voilà ce qu'est un homme qui trompe son prochain
  - type: text
    content: 'et qui dit: «N''était-ce pas pour plaisanter?»'
  '2':
  - type: text
    content: De même que l'oiseau s'échappe, que l'hirondelle s'envole,
  - type: text
    content: de même maudire sans raison n'a pas d'effet.
  '20':
  - type: text
    content: Quand il n'y a plus de bois, le feu s'éteint.
  - type: text
    content: Quand il n'y a personne pour critiquer, le conflit s'apaise.
  '21':
  - type: text
    content: Il faut du charbon pour alimenter un brasier, du bois pour alimenter un feu,
  - type: text
    content: et un homme querelleur pour attiser une dispute.
  '22':
  - type: text
    content: 'Les paroles du critiqueur sont comme des friandises:'
  - type: text
    content: elles descendent au plus profond de l'être.
  '23':
  - type: text
    content: De l'argent non purifié plaqué sur un vase de terre,
  - type: text
    content: voilà ce que sont des paroles chaleureuses associées à un cœur mauvais.
  '24':
  - type: text
    content: Celui qui éprouve de la haine se déguise avec ses paroles,
  - type: text
    content: et il cache au fond de lui la tromperie.
  '25':
  - type: text
    content: Lorsqu'il prend une voix douce, ne le crois pas,
  - type: text
    content: car il y a sept horreurs dans son cœur.
  '26':
  - type: text
    content: Il a beau cacher sa haine par l'hypocrisie,
  - type: text
    content: sa méchanceté se révélera dans l'assemblée.
  '27':
  - type: text
    content: Celui qui creuse une fosse y tombera,
  - type: text
    content: et la pierre reviendra sur celui qui la roule.
  '28':
  - type: text
    content: La langue menteuse déteste ceux qu'elle écrase
  - type: text
    content: et la bouche flatteuse provoque la chute.
  '3':
  - type: text
    content: Le fouet est pour le cheval, le mors pour l'âne
  - type: text
    content: et le bâton pour le dos des hommes stupides.
  '4':
  - type: text
    content: Ne réponds pas à un homme stupide suivant sa folie,
  - type: text
    content: si tu ne veux pas lui ressembler toi-même!
  '5':
  - type: text
    content: Réponds à un homme stupide suivant sa folie,
  - type: text
    content: si tu ne veux pas qu'il se considère comme sage!
  '6':
  - type: text
    content: Il se coupe les pieds, il boit la violence,
  - type: text
    content: celui qui confie des messages à un homme stupide.
  '7':
  - type: text
    content: Aussi faible que les jambes d'un boiteux,
  - type: text
    content: voilà ce qu'est un proverbe dans la bouche d'hommes stupides.
  '8':
  - type: text
    content: Accorder des honneurs à un homme stupide,
  - type: text
    content: c'est comme ficeler une pierre à la fronde.
  '9':
  - type: text
    content: Une épine brandie par un homme ivre,
  - type: text
    content: voilà ce qu'est un proverbe dans la bouche d'hommes stupides.
