document_id: PRO.26,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les relations avec le stupide
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: La gloire ne convient pas plus à un homme stupide
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que la neige en été ou la pluie pendant la moisson.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Celui qui engage un homme stupide ou le premier venu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ressemble à un archer qui blesse tout le monde.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Comme *un chien retourne à ce qu'il a vomi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Un chien… vomi: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Pierre 2.22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'homme stupide reproduit sa folie.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Si tu vois un homme qui se croit sage, il y a plus à attendre d'un homme stupide que de lui.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Le paresseux dit: «Il y a un lion sur le chemin,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il y a un lion dans les rues!»
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: La porte tourne sur ses gonds
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le paresseux sur son lit.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Le paresseux plonge sa main dans le plat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il trouve pénible de la ramener à sa bouche.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Le paresseux se croit plus sage
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que sept hommes qui répondent avec discernement.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Il attrape un chien par les oreilles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le passant qui se mêle à une dispute qui ne le concerne pas.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Pareil à un fou qui lance projectiles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et flèches et sème la mort,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: voilà ce qu'est un homme qui trompe son prochain
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et qui dit: «N''était-ce pas pour plaisanter?»'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: De même que l'oiseau s'échappe, que l'hirondelle s'envole,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de même maudire sans raison n'a pas d'effet.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Quand il n'y a plus de bois, le feu s'éteint.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand il n'y a personne pour critiquer, le conflit s'apaise.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Il faut du charbon pour alimenter un brasier, du bois pour alimenter un feu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et un homme querelleur pour attiser une dispute.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Les paroles du critiqueur sont comme des friandises:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles descendent au plus profond de l'être.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: De l'argent non purifié plaqué sur un vase de terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voilà ce que sont des paroles chaleureuses associées à un cœur mauvais.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Celui qui éprouve de la haine se déguise avec ses paroles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il cache au fond de lui la tromperie.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Lorsqu'il prend une voix douce, ne le crois pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il y a sept horreurs dans son cœur.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Il a beau cacher sa haine par l'hypocrisie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa méchanceté se révélera dans l'assemblée.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Celui qui creuse une fosse y tombera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la pierre reviendra sur celui qui la roule.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: La langue menteuse déteste ceux qu'elle écrase
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la bouche flatteuse provoque la chute.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Le fouet est pour le cheval, le mors pour l'âne
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le bâton pour le dos des hommes stupides.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ne réponds pas à un homme stupide suivant sa folie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si tu ne veux pas lui ressembler toi-même!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Réponds à un homme stupide suivant sa folie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si tu ne veux pas qu'il se considère comme sage!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Il se coupe les pieds, il boit la violence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui confie des messages à un homme stupide.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Aussi faible que les jambes d'un boiteux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voilà ce qu'est un proverbe dans la bouche d'hommes stupides.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Accorder des honneurs à un homme stupide,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est comme ficeler une pierre à la fronde.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Une épine brandie par un homme ivre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voilà ce qu'est un proverbe dans la bouche d'hommes stupides.
