document_id: 1CO.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sur les viandes sacrifiées aux idoles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'En ce qui concerne les viandes sacrifiées aux idoles, nous savons que nous avons tous la connaissance. – La connaissance rend orgueilleux, mais l''amour édifie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Si quelqu''un croit savoir quelque chose, il ne connaît encore rien comme il faudrait connaître. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mais si quelqu''un aime Dieu, il est connu de lui. – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Donc, pour ce qui est de manger des viandes sacrifiées aux idoles, nous savons qu''une idole n''est rien dans le monde et qu''il n''y a qu''un seul Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'En effet, il est vrai qu''il y a des êtres appelés dieux, soit dans le ciel, soit sur la terre, et de fait il y a beaucoup de dieux et de seigneurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Néanmoins, pour nous il n'y a qu'un seul Dieu, le Père, de qui viennent toutes choses et pour qui nous vivons, et un seul Seigneur, Jésus-Christ, par qui tout existe et par qui nous vivons.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais tous n''ont pas cette connaissance. Quelques-uns, marqués par la manière dont ils perçoivent encore les idoles, mangent de ces viandes comme leur étant sacrifiées, et leur conscience, qui est faible, en est souillée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Or ce n''est pas un aliment qui nous rapproche de Dieu: si nous en mangeons, nous n''avons rien de plus; si nous n''en mangeons pas, nous n''avons rien de moins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Veillez, toutefois, à ce que votre liberté ne devienne pas un obstacle pour les faibles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'En effet, si quelqu''un te voit, toi qui as de la connaissance, assis à table dans un temple d''idoles, lui qui est faible, ne sera-t-il pas encouragé dans sa conscience à manger des viandes sacrifiées aux idoles? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ainsi, à cause de ta connaissance le faible ira à sa perte, ce frère pour lequel Christ est mort! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'En péchant ainsi contre les frères et sœurs et en blessant leur conscience, qui est faible, c''est contre Christ que vous péchez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: C'est pourquoi, si un aliment représente un piège pour mon frère, je ne mangerai jamais de viande afin de ne pas faire trébucher mon frère.
