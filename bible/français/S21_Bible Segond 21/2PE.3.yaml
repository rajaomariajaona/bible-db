document_id: 2PE.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le retour du Seigneur
  - type: text
    content: 'Bien-aimés, voici déjà la deuxième lettre que je vous écris. Dans l''une et dans l''autre je fais appel à vos souvenirs pour éveiller en vous une saine intelligence, '
  '10':
  - type: text
    content: Le jour du Seigneur viendra comme un voleur [dans la nuit]. Ce jour-là, le ciel disparaîtra avec fracas, les éléments embrasés se désagrégeront et la terre avec les œuvres qu'elle contient sera brûlée.
  '11':
  - type: text
    content: 'Puisque tout notre monde doit être dissous, combien votre conduite et votre piété doivent-elles être saintes! '
  '12':
  - type: text
    content: 'Attendez et hâtez la venue du jour de Dieu, jour où le ciel enflammé se désagrégera et où les éléments embrasés fondront. '
  '13':
  - type: text
    content: Mais nous attendons, conformément à sa promesse, un nouveau ciel et une nouvelle terre où la justice habitera.
  '14':
  - type: text
    content: 'C''est pourquoi, bien-aimés, dans cette attente, faites tous vos efforts pour qu''il vous trouve sans tache et irréprochables dans la paix. '
  '15':
  - type: text
    content: 'Considérez bien que la patience de notre Seigneur est votre salut. Notre bien-aimé frère Paul vous l''a aussi écrit, conformément à la sagesse qui lui a été donnée. '
  '16':
  - type: text
    content: C'est ce qu'il fait dans toutes les lettres où il parle de ces choses; il s'y trouve certes des points difficiles à comprendre, et les personnes ignorantes et mal affermies en tordent le sens, comme elles le font des autres Ecritures, pour leur propre ruine.
  '17':
  - type: text
    content: 'Bien-aimés, vous voilà avertis. Tenez-vous donc sur vos gardes de peur qu''entraînés par l''égarement des impies vous ne perdiez la ferme position qui est la vôtre. '
  '18':
  - type: text
    content: Mais grandissez dans la grâce et dans la connaissance de notre Seigneur et Sauveur Jésus-Christ. A lui soit la gloire, maintenant et pour l'éternité! Amen!
  '2':
  - type: text
    content: afin que vous vous rappeliez les paroles prononcées autrefois par les saints prophètes ainsi que le commandement du Seigneur et Sauveur enseigné par vos apôtres.
  '3':
  - type: text
    content: Sachez avant tout que *dans les derniers jours viendront des moqueurs [pleins de raillerie]. Ces hommes vivront en suivant leurs propres désirs
  - type: note
    content: 'Dans les… désirs: probable citation en Jude 18.'
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'et diront: «Où est la promesse de son retour? En effet, depuis que nos ancêtres sont morts, tout reste dans le même état qu''au début de la création.» '
  '5':
  - type: text
    content: 'De fait, ils veulent ignorer que des cieux ont existé autrefois par la parole de Dieu, ainsi qu''une terre tirée des eaux et au milieu d''elles. '
  '6':
  - type: text
    content: 'Ils oublient volontairement que le monde d''alors a disparu de la même manière, submergé par l''eau. '
  '7':
  - type: text
    content: Or, par la parole de Dieu, le ciel et la terre actuels sont gardés pour le feu, réservés pour le jour du jugement et de la perdition des hommes impies.
  '8':
  - type: text
    content: 'Mais s''il y a une chose, bien-aimés, que vous ne devez pas oublier, c''est qu''aux yeux du Seigneur un jour est comme 1000 ans et '
  - type: text
    content: 1000 ans sont comme un jour
  - type: note
    content: '1000… jour: idée tirée du Psaume 90.4.'
  - type: text
    content: '. '
  '9':
  - type: text
    content: Le Seigneur ne tarde pas dans l'accomplissement de la promesse, comme certains le pensent; au contraire, il fait preuve de patience envers nous, voulant qu'aucun ne périsse mais que tous parviennent à la repentance
  - type: note
    content: 'La repentance: désignant littéralement un changement de pensée, le mot renvoie à une transformation radicale de la personne, qui renonce à ses attitudes fautives pour adopter un nouveau comportement et une nouvelle perspective, conformes à la volonté de Dieu.'
  - type: text
    content: .
