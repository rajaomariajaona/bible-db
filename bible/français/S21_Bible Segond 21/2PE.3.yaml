document_id: 2PE.3,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le retour du Seigneur
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bien-aimés, voici déjà la deuxième lettre que je vous écris. Dans l''une et dans l''autre je fais appel à vos souvenirs pour éveiller en vous une saine intelligence, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le jour du Seigneur viendra comme un voleur [dans la nuit]. Ce jour-là, le ciel disparaîtra avec fracas, les éléments embrasés se désagrégeront et la terre avec les œuvres qu'elle contient sera brûlée.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puisque tout notre monde doit être dissous, combien votre conduite et votre piété doivent-elles être saintes! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Attendez et hâtez la venue du jour de Dieu, jour où le ciel enflammé se désagrégera et où les éléments embrasés fondront. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais nous attendons, conformément à sa promesse, un nouveau ciel et une nouvelle terre où la justice habitera.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est pourquoi, bien-aimés, dans cette attente, faites tous vos efforts pour qu''il vous trouve sans tache et irréprochables dans la paix. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Considérez bien que la patience de notre Seigneur est votre salut. Notre bien-aimé frère Paul vous l''a aussi écrit, conformément à la sagesse qui lui a été donnée. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C'est ce qu'il fait dans toutes les lettres où il parle de ces choses; il s'y trouve certes des points difficiles à comprendre, et les personnes ignorantes et mal affermies en tordent le sens, comme elles le font des autres Ecritures, pour leur propre ruine.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bien-aimés, vous voilà avertis. Tenez-vous donc sur vos gardes de peur qu''entraînés par l''égarement des impies vous ne perdiez la ferme position qui est la vôtre. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais grandissez dans la grâce et dans la connaissance de notre Seigneur et Sauveur Jésus-Christ. A lui soit la gloire, maintenant et pour l'éternité! Amen!
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: afin que vous vous rappeliez les paroles prononcées autrefois par les saints prophètes ainsi que le commandement du Seigneur et Sauveur enseigné par vos apôtres.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sachez avant tout que *dans les derniers jours viendront des moqueurs [pleins de raillerie]. Ces hommes vivront en suivant leurs propres désirs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dans les… désirs: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'probable citation en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jude 18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et diront: «Où est la promesse de son retour? En effet, depuis que nos ancêtres sont morts, tout reste dans le même état qu''au début de la création.» '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De fait, ils veulent ignorer que des cieux ont existé autrefois par la parole de Dieu, ainsi qu''une terre tirée des eaux et au milieu d''elles. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils oublient volontairement que le monde d''alors a disparu de la même manière, submergé par l''eau. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Or, par la parole de Dieu, le ciel et la terre actuels sont gardés pour le feu, réservés pour le jour du jugement et de la perdition des hommes impies.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais s''il y a une chose, bien-aimés, que vous ne devez pas oublier, c''est qu''aux yeux du Seigneur un jour est comme 1000 ans et '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 1000 ans sont comme un jour
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: '1000… jour: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'idée tirée du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 90.4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le Seigneur ne tarde pas dans l'accomplissement de la promesse, comme certains le pensent; au contraire, il fait preuve de patience envers nous, voulant qu'aucun ne périsse mais que tous parviennent à la repentance
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'La repentance: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: désignant littéralement un changement de pensée, le mot renvoie à une transformation radicale de la personne, qui renonce à ses attitudes fautives pour adopter un nouveau comportement et une nouvelle perspective, conformes à la volonté de Dieu.
      marker-yv: yv-n
    - type: text
      text: .
