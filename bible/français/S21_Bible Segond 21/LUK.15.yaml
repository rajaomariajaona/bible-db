document_id: LUK.15,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paraboles de la brebis et de la pièce perdues
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Tous les collecteurs d''impôts et les pécheurs s''approchaient de Jésus pour l''écouter. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: De même, je vous le dis, il y a de la joie parmi les anges de Dieu pour un seul pécheur qui se repent.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Parabole du fils perdu et de son frère
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Il dit encore: «Un homme avait deux fils. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Le plus jeune dit à son père: ‘Mon père, donne-moi la part de l''héritage qui doit me revenir.’ Le père leur partagea alors ses biens. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Peu de jours après, le plus jeune fils ramassa tout et partit pour un pays éloigné, où il gaspilla sa fortune en vivant dans la débauche. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Alors qu''il avait tout dépensé, une importante famine survint dans ce pays et il commença à se trouver dans le besoin. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Il alla se mettre au service d''un des habitants du pays, qui l''envoya dans ses champs garder les porcs. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Il aurait bien voulu se nourrir des caroubes que mangeaient les porcs, mais personne ne lui en donnait. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Il se mit à réfléchir et se dit: ‘Combien d''ouvriers chez mon père ont du pain en abondance et moi, ici, je meurs de faim! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Je vais retourner vers mon père et je lui dirai: Père, j''ai péché contre le ciel et contre toi, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'je ne suis plus digne d''être appelé ton fils, traite-moi comme l''un de tes ouvriers.’ '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mais les pharisiens et les spécialistes de la loi murmuraient, disant: «Cet homme accueille des pécheurs et mange avec eux.»'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Il se leva et alla vers son père. Alors qu''il était encore loin, son père le vit et fut rempli de compassion, il courut se jeter à son cou et l''embrassa. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Le fils lui dit: ‘Père, j''ai péché contre le ciel et contre toi, je ne suis plus digne d''être appelé ton fils.’ '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Mais le père dit à ses serviteurs: ‘Apportez [vite] le plus beau vêtement et mettez-le-lui; passez-lui un anneau au doigt et mettez-lui des sandales aux pieds. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Amenez le veau qu''on a engraissé et tuez-le! Mangeons et réjouissons-nous, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: car mon fils que voici était mort et il est revenu à la vie, il était perdu et il est retrouvé.’ Et ils commencèrent à faire la fête.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '»Or le fils aîné était dans les champs. Lorsqu''il revint et approcha de la maison, il entendit la musique et les danses. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Il appela un des serviteurs et lui demanda ce qui se passait. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Le serviteur lui dit: ‘Ton frère est de retour et ton père a tué le veau engraissé parce qu''il l''a retrouvé en bonne santé.’ '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Le fils aîné se mit en colère et il ne voulait pas entrer. Son père sortit le supplier d''entrer, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'mais il répondit à son père: ‘Voilà tant d''années que je suis à ton service sans jamais désobéir à tes ordres, et jamais tu ne m''as donné un chevreau pour que je fasse la fête avec mes amis. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Alors il leur dit cette parabole: '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Mais quand ton fils est arrivé, celui qui a mangé tes biens avec des prostituées, pour lui tu as tué le veau engraissé!’ '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: '‘Mon enfant, lui dit le père, tu es toujours avec moi et tout ce que j''ai est à toi, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: mais il fallait bien faire la fête et nous réjouir, parce que ton frère que voici était mort et il est revenu à la vie, il était perdu et il est retrouvé.’»
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: '«Si l''un de vous a 100 brebis et qu''il en perde une, ne laisse-t-il pas les 99 autres dans le désert pour aller à la recherche de celle qui est perdue jusqu''à ce qu''il la retrouve? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Lorsqu''il l''a retrouvée, il la met avec joie sur ses épaules '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'et, de retour à la maison, il appelle ses amis et ses voisins et leur dit: ‘Réjouissez-vous avec moi, car j''ai retrouvé ma brebis qui était perdue.’ '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: De même, je vous le dis, il y aura plus de joie dans le ciel pour un seul pécheur qui se repent que pour 99 justes qui n'ont pas besoin de changer d'attitude.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '»Ou bien, si une femme a 10 pièces d''argent et qu''elle en perde une, ne va-t-elle pas allumer une lampe, balayer la maison et chercher avec soin jusqu''à ce qu''elle la retrouve? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Lorsqu''elle l''a retrouvée, elle appelle ses amies et ses voisines et dit: ‘Réjouissez-vous avec moi, car j''ai retrouvé la pièce que j''avais perdue.’ '
