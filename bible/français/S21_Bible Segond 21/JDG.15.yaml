document_id: JDG.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Exploits de Samson contre les Philistins
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Quelque temps après, à l''époque de la moisson des blés, Samson alla voir sa femme en lui apportant un chevreau. Il dit: «Je veux entrer vers ma femme dans sa chambre.» Mais le père de sa femme ne lui permit pas d''entrer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«J''ai pensé, dit-il, que tu avais de la haine envers elle et je l''ai donnée à ton compagnon. Sa jeune sœur n''est-elle pas plus belle qu''elle? Epouse-la donc à sa place.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Samson leur dit: «Cette fois je ne serai pas coupable envers les Philistins, si je leur fais du mal.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Samson s''en alla. Il attrapa 300 renards et prit des flambeaux. Puis il attacha les renards par la queue, deux par deux, en mettant une torche au milieu des queues. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il alluma les flambeaux, lâcha les renards dans les blés des Philistins et mit ainsi le feu aux tas de gerbes, au blé sur pied et même aux plantations d'oliviers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les Philistins demandèrent: «Qui a fait cela?» On répondit: «C''est Samson, le gendre du Thimnien, parce que ce dernier lui a pris sa femme et l''a donnée à son compagnon.» Les Philistins montèrent et la brûlèrent, ainsi que son père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Samson leur dit: «Est-ce ainsi que vous agissez? Je ne m''arrêterai qu''après m''être vengé de vous.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il les battit à plate couture, puis il descendit et se retira dans la grotte du rocher d'Etam.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors les Philistins se mirent en marche, campèrent en Juda et se déployèrent jusqu''à Léchi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les hommes de Juda dirent: «Pourquoi êtes-vous montés contre nous?» Ils répondirent: «Nous sommes montés pour capturer Samson, afin de le traiter comme il nous a traités.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Sur quoi 3000 Judéens descendirent à la grotte du rocher d''Etam et dirent à Samson: «Ne sais-tu pas que les Philistins exercent leur domination sur nous? Que nous as-tu donc fait?» Il leur répondit: «Je les ai traités comme ils m''ont traité.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils lui dirent: «Nous sommes descendus pour te capturer afin de te livrer entre les mains des Philistins.» Samson leur dit: «Jurez-moi que vous ne me tuerez pas.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils lui répondirent: «Non. Nous voulons seulement t''attacher et te livrer entre leurs mains, mais nous ne te ferons pas mourir.» Ils l''attachèrent avec deux cordes neuves et le firent sortir de la grotte.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Lorsqu''il arriva à Léchi, les Philistins poussèrent des cris en le voyant. Alors l''Esprit de l''Eternel vint sur lui. Les cordes qu''il avait aux bras devinrent pareilles à du lin brûlé par le feu et ses liens tombèrent de ses mains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il trouva une mâchoire d'âne fraîche, tendit la main pour la prendre et tua 1000 hommes avec elle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Samson dit alors: «Avec une mâchoire d''âne, j''ai fait un tas, deux tas. Avec une mâchoire d''âne, j''ai tué 1000 hommes.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Quand il eut fini de parler, il jeta la mâchoire. Et l'on appela cet endroit Ramath-Léchi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Pressé par la soif, Samson fit appel à l''Eternel en disant: «C''est toi qui as permis cette grande délivrance par l''intermédiaire de ton serviteur. Et maintenant, devrais-je mourir de soif et tomber entre les mains des incirconcis?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dieu fendit la cavité du rocher qui se trouve à Léchi et il en sortit de l'eau. Samson but, il retrouva ses forces et reprit vie. C'est pour cela qu'on a appelé cette source En-Hakkoré. Elle existe aujourd'hui encore à Léchi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Samson fut juge en Israël à l'époque des Philistins, pendant 20 ans.
