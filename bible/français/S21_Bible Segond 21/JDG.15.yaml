document_id: JDG.15,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Exploits de Samson contre les Philistins
  - type: text
    content: 'Quelque temps après, à l''époque de la moisson des blés, Samson alla voir sa femme en lui apportant un chevreau. Il dit: «Je veux entrer vers ma femme dans sa chambre.» Mais le père de sa femme ne lui permit pas d''entrer. '
  '10':
  - type: text
    content: 'Les hommes de Juda dirent: «Pourquoi êtes-vous montés contre nous?» Ils répondirent: «Nous sommes montés pour capturer Samson, afin de le traiter comme il nous a traités.» '
  '11':
  - type: text
    content: 'Sur quoi 3000 Judéens descendirent à la grotte du rocher d''Etam et dirent à Samson: «Ne sais-tu pas que les Philistins exercent leur domination sur nous? Que nous as-tu donc fait?» Il leur répondit: «Je les ai traités comme ils m''ont traité.» '
  '12':
  - type: text
    content: 'Ils lui dirent: «Nous sommes descendus pour te capturer afin de te livrer entre les mains des Philistins.» Samson leur dit: «Jurez-moi que vous ne me tuerez pas.» '
  '13':
  - type: text
    content: 'Ils lui répondirent: «Non. Nous voulons seulement t''attacher et te livrer entre leurs mains, mais nous ne te ferons pas mourir.» Ils l''attachèrent avec deux cordes neuves et le firent sortir de la grotte.'
  '14':
  - type: text
    content: 'Lorsqu''il arriva à Léchi, les Philistins poussèrent des cris en le voyant. Alors l''Esprit de l''Eternel vint sur lui. Les cordes qu''il avait aux bras devinrent pareilles à du lin brûlé par le feu et ses liens tombèrent de ses mains. '
  '15':
  - type: text
    content: Il trouva une mâchoire d'âne fraîche, tendit la main pour la prendre et tua 1000 hommes avec elle.
  '16':
  - type: text
    content: 'Samson dit alors: «Avec une mâchoire d''âne, j''ai fait un tas, deux tas. Avec une mâchoire d''âne, j''ai tué 1000 hommes.»'
  '17':
  - type: text
    content: Quand il eut fini de parler, il jeta la mâchoire. Et l'on appela cet endroit Ramath-Léchi.
  '18':
  - type: text
    content: 'Pressé par la soif, Samson fit appel à l''Eternel en disant: «C''est toi qui as permis cette grande délivrance par l''intermédiaire de ton serviteur. Et maintenant, devrais-je mourir de soif et tomber entre les mains des incirconcis?» '
  '19':
  - type: text
    content: Dieu fendit la cavité du rocher qui se trouve à Léchi et il en sortit de l'eau. Samson but, il retrouva ses forces et reprit vie. C'est pour cela qu'on a appelé cette source En-Hakkoré. Elle existe aujourd'hui encore à Léchi.
  '2':
  - type: text
    content: '«J''ai pensé, dit-il, que tu avais de la haine envers elle et je l''ai donnée à ton compagnon. Sa jeune sœur n''est-elle pas plus belle qu''elle? Epouse-la donc à sa place.» '
  '20':
  - type: text
    content: Samson fut juge en Israël à l'époque des Philistins, pendant 20 ans.
  '3':
  - type: text
    content: 'Samson leur dit: «Cette fois je ne serai pas coupable envers les Philistins, si je leur fais du mal.»'
  '4':
  - type: text
    content: 'Samson s''en alla. Il attrapa 300 renards et prit des flambeaux. Puis il attacha les renards par la queue, deux par deux, en mettant une torche au milieu des queues. '
  '5':
  - type: text
    content: Il alluma les flambeaux, lâcha les renards dans les blés des Philistins et mit ainsi le feu aux tas de gerbes, au blé sur pied et même aux plantations d'oliviers.
  '6':
  - type: text
    content: 'Les Philistins demandèrent: «Qui a fait cela?» On répondit: «C''est Samson, le gendre du Thimnien, parce que ce dernier lui a pris sa femme et l''a donnée à son compagnon.» Les Philistins montèrent et la brûlèrent, ainsi que son père. '
  '7':
  - type: text
    content: 'Samson leur dit: «Est-ce ainsi que vous agissez? Je ne m''arrêterai qu''après m''être vengé de vous.» '
  '8':
  - type: text
    content: Il les battit à plate couture, puis il descendit et se retira dans la grotte du rocher d'Etam.
  '9':
  - type: text
    content: 'Alors les Philistins se mirent en marche, campèrent en Juda et se déployèrent jusqu''à Léchi. '
