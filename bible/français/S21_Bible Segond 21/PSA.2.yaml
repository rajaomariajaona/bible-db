document_id: PSA.2,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Consécration et règne du divin roi
  - type: text
    content: '*Pourquoi cette agitation parmi les nations'
  - type: text
    content: et ces préoccupations dépourvues de sens parmi les peuples?
  '10':
  - type: text
    content: Et maintenant, rois, conduisez-vous avec sagesse!
  - type: text
    content: Juges de la terre, laissez-vous instruire!
  '11':
  - type: text
    content: Servez l'Eternel avec crainte
  - type: text
    content: et réjouissez-vous tout en tremblant.
  '12':
  - type: text
    content: Rendez hommage au fils, de peur qu'il ne s'irrite
  - type: text
    content: et que vous n'alliez à votre perte,
  - type: text
    content: car sa colère s'enflamme rapidement.
  - type: text
    content: Heureux tous ceux qui se confient en lui!
  '2':
  - type: text
    content: Les rois de la terre se soulèvent
  - type: text
    content: et les chefs se liguent ensemble
  - type: text
    content: contre l'Eternel et contre celui qu'il a désigné par onction
  - type: note
    content: 'Pourquoi… onction: cité en Actes 4.25-26, avec application aux autorités romaines et juives dans leur attitude vis-à-vis de Jésus-Christ.'
  - type: text
    content: ':'
  '3':
  - type: text
    content: «Arrachons leurs liens,
  - type: text
    content: jetons leurs chaînes loin de nous!»
  '4':
  - type: text
    content: Celui qui siège dans le ciel rit,
  - type: text
    content: le Seigneur se moque d'eux.
  '5':
  - type: text
    content: Puis il leur parle dans sa colère,
  - type: text
    content: 'il les épouvante dans sa fureur:'
  '6':
  - type: text
    content: «C'est moi qui ai établi mon roi
  - type: text
    content: sur Sion, ma montagne sainte!»
  '7':
  - type: text
    content: Je veux proclamer le décret de l'Eternel.
  - type: text
    content: 'Il m''a dit: «*Tu es mon fils,'
  - type: text
    content: je t'ai engendré aujourd'hui!
  - type: note
    content: 'Tu es… aujourd''hui: paroles citées en Actes 13.33; Hébreux 1.5; 5.5 à propos de la relation entre Dieu le Père et Jésus-Christ et évoquant les formules d''intronisation du Proche-Orient ancien: le nouveau roi était considéré comme adopté par Dieu.'
  '8':
  - type: text
    content: Demande-le-moi, et *je te donnerai les nations
  - type: note
    content: 'Je te donnerai les nations: repris en Apocalypse 2.26 avec application au vainqueur dans les Eglises.'
  - type: text
    content: ' en héritage,'
  - type: text
    content: les extrémités de la terre en possession.
  '9':
  - type: text
    content: '*Tu les briseras avec un sceptre de fer,'
  - type: text
    content: tu les briseras comme le vase d'un potier.
  - type: note
    content: 'Tu les briseras… potier: cité en Apocalypse 2.27 avec application au vainqueur dans les Eglises; la première partie du verset seulement est citée en Apocalypse 12.5; 19.15 avec application à Jésus-Christ.'
  - type: text
    content: »
