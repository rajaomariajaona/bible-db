document_id: PSA.2,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Consécration et règne du divin roi
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*Pourquoi cette agitation parmi les nations'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ces préoccupations dépourvues de sens parmi les peuples?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et maintenant, rois, conduisez-vous avec sagesse!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Juges de la terre, laissez-vous instruire!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Servez l'Eternel avec crainte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et réjouissez-vous tout en tremblant.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rendez hommage au fils, de peur qu'il ne s'irrite
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que vous n'alliez à votre perte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car sa colère s'enflamme rapidement.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux tous ceux qui se confient en lui!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les rois de la terre se soulèvent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les chefs se liguent ensemble
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre l'Eternel et contre celui qu'il a désigné par onction
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1-2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Pourquoi… onction: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Actes 4.25-26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', avec application aux autorités romaines et juives dans leur attitude vis-à-vis de Jésus-Christ.'
      marker-yv: yv-n
    - type: text
      text: ':'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Arrachons leurs liens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jetons leurs chaînes loin de nous!»
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui siège dans le ciel rit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Seigneur se moque d'eux.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puis il leur parle dans sa colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'il les épouvante dans sa fureur:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «C'est moi qui ai établi mon roi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur Sion, ma montagne sainte!»
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je veux proclamer le décret de l'Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il m''a dit: «*Tu es mon fils,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je t'ai engendré aujourd'hui!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu es… aujourd''hui: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'paroles citées en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Actes 13.33
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hébreux 1.5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5.5'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' à propos de la relation entre Dieu le Père et Jésus-Christ et évoquant les formules d''intronisation du Proche-Orient ancien: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: le nouveau roi était considéré comme adopté par Dieu.
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Demande-le-moi, et *je te donnerai les nations
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je te donnerai les nations: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'repris en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Apocalypse 2.26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' avec application au vainqueur dans les Eglises.'
      marker-yv: yv-n
    - type: text
      text: ' en héritage,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les extrémités de la terre en possession.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*Tu les briseras avec un sceptre de fer,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu les briseras comme le vase d'un potier.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu les briseras… potier: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Apocalypse 2.27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' avec application au vainqueur dans les Eglises; la première partie du verset seulement est citée en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Apocalypse 12.5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '19.15'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' avec application à Jésus-Christ.'
      marker-yv: yv-n
    - type: text
      text: »
