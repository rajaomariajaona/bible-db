document_id: PSA.21
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Reconnaissance du roi
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Eternel, le roi se réjouit de ta force.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Combien ton secours le remplit de joie!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tu lui as donné ce que son cœur désirait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et tu n''as pas refusé ce que ses lèvres demandaient. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Oui, tu es venu à lui, chargé des bénédictions de ta grâce,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as mis sur sa tête une couronne d'or pur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il te demandait la vie, tu la lui as donnée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu prolonges ses jours pour toujours et à perpétuité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Sa gloire est grande à cause de ton secours;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu places sur lui éclat et splendeur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tu fais de lui pour toujours une source de bénédictions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu le combles de joie par ta présence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le roi se confie en l'Eternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: grâce à la bonté du Très-Haut, il n'est pas ébranlé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ta main atteindra tous tes ennemis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta main droite frappera ceux qui te détestent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tu feras d'eux une fournaise ardente,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le jour où tu te montreras;
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'Eternel les engloutira dans sa colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le feu les dévorera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tu feras disparaître leur lignée de la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur descendance du milieu des hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils ont projeté du mal contre toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ont formé des complots, mais ils ne pourront rien faire,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: car tu les mettras en fuite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec ton arc tu tireras sur eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Lève-toi, Eternel, dans toute ta force!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous voulons chanter, célébrer ta puissance.
