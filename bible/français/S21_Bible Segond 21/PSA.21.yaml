document_id: PSA.21,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Reconnaissance du roi
  - type: text
    content: Au chef de chœur. Psaume de David.
  '10':
  - type: text
    content: Tu feras d'eux une fournaise ardente,
  - type: text
    content: le jour où tu te montreras;
  - type: text
    content: l'Eternel les engloutira dans sa colère,
  - type: text
    content: et le feu les dévorera.
  '11':
  - type: text
    content: Tu feras disparaître leur lignée de la terre
  - type: text
    content: et leur descendance du milieu des hommes.
  '12':
  - type: text
    content: Ils ont projeté du mal contre toi,
  - type: text
    content: ils ont formé des complots, mais ils ne pourront rien faire,
  '13':
  - type: text
    content: car tu les mettras en fuite,
  - type: text
    content: avec ton arc tu tireras sur eux.
  '14':
  - type: text
    content: Lève-toi, Eternel, dans toute ta force!
  - type: text
    content: Nous voulons chanter, célébrer ta puissance.
  '2':
  - type: text
    content: Eternel, le roi se réjouit de ta force.
  - type: text
    content: Combien ton secours le remplit de joie!
  '3':
  - type: text
    content: Tu lui as donné ce que son cœur désirait,
  - type: text
    content: 'et tu n''as pas refusé ce que ses lèvres demandaient. '
  - type: text
    content: – Pause.
  '4':
  - type: text
    content: Oui, tu es venu à lui, chargé des bénédictions de ta grâce,
  - type: text
    content: tu as mis sur sa tête une couronne d'or pur.
  '5':
  - type: text
    content: Il te demandait la vie, tu la lui as donnée;
  - type: text
    content: tu prolonges ses jours pour toujours et à perpétuité.
  '6':
  - type: text
    content: Sa gloire est grande à cause de ton secours;
  - type: text
    content: tu places sur lui éclat et splendeur.
  '7':
  - type: text
    content: Tu fais de lui pour toujours une source de bénédictions,
  - type: text
    content: tu le combles de joie par ta présence.
  '8':
  - type: text
    content: Le roi se confie en l'Eternel;
  - type: text
    content: grâce à la bonté du Très-Haut, il n'est pas ébranlé.
  '9':
  - type: text
    content: Ta main atteindra tous tes ennemis,
  - type: text
    content: ta main droite frappera ceux qui te détestent.
