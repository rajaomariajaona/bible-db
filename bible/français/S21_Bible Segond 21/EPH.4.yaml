document_id: EPH.4,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'unité de l'Esprit
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Je vous encourage donc, moi, le prisonnier dans le Seigneur, à vous conduire d''une manière digne de l''appel que vous avez reçu. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Celui qui est descendu, c''est celui qui est monté au-dessus de tous les cieux afin de remplir tout l''univers. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'C''est lui qui a donné les uns comme apôtres, les autres comme prophètes, les autres comme évangélistes, les autres comme bergers et enseignants. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Il l''a fait pour former les saints aux tâches du service en vue de l''édification du corps de Christ, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'jusqu''à ce que nous parvenions tous à l''unité de la foi et de la connaissance du Fils de Dieu, à la maturité de l''adulte, à la mesure de la stature parfaite de Christ. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ainsi, nous ne serons plus de petits enfants, ballottés et emportés par tout vent de doctrine, par la ruse des hommes et leur habileté dans les manœuvres d''égarement. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Mais en disant la vérité dans l''amour, nous grandirons à tout point de vue vers celui qui est la tête, Christ. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: C'est de lui que le corps tout entier, bien coordonné et solidement uni grâce aux articulations dont il est muni, tire sa croissance en fonction de l'activité qui convient à chacune de ses parties et s'édifie lui-même dans l'amour.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La vie nouvelle en Christ
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Voici donc ce que je dis et ce que j''affirme dans le Seigneur: vous ne devez plus vous conduire comme les non-croyants, qui se laissent guider par la sottise de leurs pensées. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ils ont l''intelligence obscurcie, ils sont étrangers à la vie de Dieu à cause de l''ignorance qui est en eux, à cause de l''endurcissement de leur cœur. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ils ont perdu tout sens moral et se sont livrés à la débauche pour commettre avec avidité toutes sortes d''impuretés. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'En toute humilité et douceur, avec patience, supportez-vous les uns les autres dans l''amour. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Mais vous, ce n''est pas ainsi que vous avez appris à connaître Christ, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'si du moins c''est lui que vous avez écouté et si c''est en lui que vous avez été enseignés conformément à la vérité qui est en Jésus. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'On vous a enseigné à vous débarrasser du vieil homme qui correspond à votre ancienne manière de vivre et se détruit sous l''effet de ses désirs trompeurs, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'à vous laisser renouveler par l''Esprit dans votre intelligence '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: et à vous revêtir de l'homme nouveau, créé selon Dieu dans la justice et la sainteté que produit la vérité.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'C''est pourquoi, vous débarrassant du mensonge, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: dites chacun la vérité à votre prochain
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dites… prochain: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Zacharie 8.16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', car nous sommes membres les uns des autres. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Si vous vous mettez en colère, ne péchez pas
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Si vous… péchez pas: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 4.5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' Que le soleil ne se couche pas sur votre colère, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'et ne laissez aucune place au diable. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Que celui qui volait cesse de voler; qu''il se donne plutôt la peine de travailler honnêtement de ses [propres] mains pour avoir de quoi donner à celui qui est dans le besoin. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Qu''aucune parole malsaine ne sorte de votre bouche, mais seulement de bonnes paroles qui, en fonction des besoins, servent à l''édification et transmettent une grâce à ceux qui les entendent. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Efforcez-vous de conserver l''unité de l''Esprit par le lien de la paix. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: N'attristez pas le Saint-Esprit de Dieu, par lequel vous avez été marqués d'une empreinte pour le jour de la libération.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Que toute amertume, toute fureur, toute colère, tout éclat de voix, toute calomnie et toute forme de méchanceté disparaissent du milieu de vous. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Soyez bons et pleins de compassion les uns envers les autres; pardonnez-vous réciproquement comme Dieu nous a pardonné en Christ.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il y a un seul corps et un seul Esprit, de même que vous avez été appelés à une seule espérance par votre vocation. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il y a un seul Seigneur, une seule foi, un seul baptême, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: un seul Dieu et Père de tous. Il est au-dessus de tous, agit à travers tous et habite en [nous] tous.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Cependant, à chacun de nous la grâce a été donnée à la mesure du don de Christ. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'C''est pourquoi il est dit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Il est monté sur les hauteurs, il a emmené des prisonniers et il a fait des dons aux hommes.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il est monté… aux hommes: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 68.19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Or, que signifie: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Il est monté
    - type: text
      text: ', sinon qu''il est aussi [d''abord] descendu dans les régions les plus basses de la terre? '
