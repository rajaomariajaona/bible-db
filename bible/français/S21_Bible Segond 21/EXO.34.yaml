document_id: EXO.34,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Renouvellement de l'alliance
  - type: text
    content: 'L''Eternel dit à Moïse: «Taille deux tables de pierre pareilles aux premières, et j''y écrirai les paroles qui étaient gravées sur les premières tables que tu as brisées. '
  '10':
  - type: text
    content: 'L''Eternel répondit: «Voici, je conclus moi-même une alliance. Je vais accomplir devant tout ton peuple des merveilles qui ne se sont produites dans aucun pays ni chez aucune nation. Tout le peuple qui t''entoure verra l''œuvre de l''Eternel, et ce que j''accomplirai par toi inspirera de la crainte. '
  '11':
  - type: text
    content: 'Respecte bien les commandements que je te donne aujourd''hui. Je chasserai devant toi les Amoréens, les Cananéens, les Hittites, les Phéréziens, les Héviens et les Jébusiens. '
  '12':
  - type: text
    content: 'Prends bien garde de ne pas faire alliance avec les habitants du pays où tu dois entrer, de peur qu''ils ne soient un piège pour toi. '
  '13':
  - type: text
    content: 'Au contraire, vous démolirez leurs autels, vous briserez leurs statues et vous abattrez leurs poteaux sacrés. '
  '14':
  - type: text
    content: 'Tu ne te prosterneras pas devant un autre dieu, car l''Eternel porte le nom de jaloux, il est un Dieu jaloux. '
  '15':
  - type: text
    content: 'Prends bien garde de ne pas faire alliance avec les habitants du pays: ils risqueraient de t''inviter lorsqu''ils se prostituent à leurs dieux et leur offrent des sacrifices, et tu mangerais des victimes qu''ils ont sacrifiées; '
  '16':
  - type: text
    content: 'tu prendrais de leurs filles pour tes fils et celles-ci, en se prostituant à leurs dieux, entraîneraient tes fils à se prostituer à leurs dieux. '
  '17':
  - type: text
    content: Tu ne te feras pas de dieu en métal fondu.
  '18':
  - type: text
    content: »Tu observeras la fête des pains sans levain. Pendant 7 jours, au moment fixé du mois des épis, tu mangeras des pains sans levain, comme je t'en ai donné l'ordre. En effet, c'est au cours du mois des épis que tu es sorti d'Egypte.
  '19':
  - type: text
    content: '»Tout premier-né m''appartient, même tout mâle premier-né dans les troupeaux de gros et de petit bétail. '
  '2':
  - type: text
    content: 'Sois prêt de bonne heure. Tu graviras dès le matin le mont Sinaï et tu t''y tiendras devant moi, au sommet de la montagne. '
  '20':
  - type: text
    content: Tu rachèteras le premier-né de l'âne avec un agneau. Si tu ne le rachètes pas, tu lui briseras la nuque. Tu rachèteras tout premier-né de tes fils. On ne se présentera pas les mains vides devant moi.
  '21':
  - type: text
    content: »Pendant 6 jours tu travailleras, et tu te reposeras le septième jour; tu te reposeras, même à l'époque du labour et de la moisson.
  '22':
  - type: text
    content: »Tu célébreras la fête des semaines au moment des premières moissons de blé, et la fête de la récolte à la fin de l'année.
  '23':
  - type: text
    content: '»Trois fois par an, tous les hommes se présenteront devant le Seigneur, l''Eternel, le Dieu d''Israël. '
  '24':
  - type: text
    content: En effet, je chasserai les nations devant toi et j'agrandirai ton territoire, et personne ne cherchera à s'emparer de ton pays pendant que tu monteras te présenter devant l'Eternel, ton Dieu, trois fois par an.
  '25':
  - type: text
    content: »Tu n'offriras pas sur du pain levé le sang de la victime sacrifiée en mon honneur et l'on ne gardera pas le sacrifice de la Pâque pendant la nuit jusqu'au matin.
  '26':
  - type: text
    content: »Tu apporteras à la maison de l'Eternel, ton Dieu, les tout premiers produits de ton sol. Tu ne feras pas cuire un chevreau dans le lait de sa mère.»
  '27':
  - type: text
    content: 'L''Eternel dit à Moïse: «Ecris ces paroles, car c''est sur cette base que je conclus une alliance avec toi et avec Israël.»'
  '28':
  - type: text
    content: Moïse resta là avec l'Eternel 40 jours et 40 nuits. Il ne mangea pas de pain et ne but pas d'eau. Et l'Eternel écrivit sur les tables les paroles de l'alliance, les dix paroles.
  '29':
  - type: text
    content: 'Moïse descendit du mont Sinaï, les deux tables du témoignage à la main. Il ne savait pas que la peau de son visage rayonnait parce qu''il avait parlé avec l''Eternel. '
  '3':
  - type: text
    content: 'Que personne ne monte avec toi et qu''on ne voie personne sur toute la montagne. Que pas même le petit et le gros bétail ne broutent près de cette montagne.» '
  '30':
  - type: text
    content: 'Aaron et tous les Israélites regardèrent Moïse et virent que la peau de son visage rayonnait; ils eurent alors peur de s''approcher de lui. '
  '31':
  - type: text
    content: 'Moïse les appela. Aaron et tous les chefs de l''assemblée vinrent vers lui et il leur parla. '
  '32':
  - type: text
    content: 'Après cela, tous les Israélites s''approchèrent et il leur donna tous les ordres qu''il avait reçus de l''Eternel sur le mont Sinaï. '
  '33':
  - type: text
    content: Lorsque Moïse eut fini de leur parler, il mit un voile sur son visage.
  '34':
  - type: text
    content: 'Quand Moïse entrait dans la présence de l''Eternel pour parler avec lui, il retirait le voile jusqu''au moment où il ressortait; et quand il sortait, il transmettait aux Israélites les commandements qu''il avait reçus. '
  '35':
  - type: text
    content: Les Israélites regardaient le visage de Moïse et voyaient que la peau de son visage rayonnait; et Moïse remettait le voile sur son visage jusqu'au moment où il entrait pour parler avec l'Eternel.
  '4':
  - type: text
    content: Moïse tailla deux tables de pierre pareilles aux premières. Il se leva de bon matin et gravit le mont Sinaï, conformément à l'ordre que l'Eternel lui avait donné. Il prit avec lui les deux tables de pierre.
  '5':
  - type: text
    content: 'L''Eternel descendit dans une nuée, se tint là près de lui et proclama le nom de l''Eternel. '
  '6':
  - type: text
    content: 'L''Eternel passa devant lui et s''écria: «L''Eternel, l''Eternel est un *Dieu de grâce et de compassion, lent à la colère, riche en bonté et en vérité'
  - type: note
    content: 'Dieu… vérité: repris au Psaume 86.15.'
  - type: text
    content: '. '
  '7':
  - type: text
    content: Il garde son amour jusqu'à 1000 générations, il pardonne la faute, la révolte et le péché, mais il ne traite pas le coupable en innocent et il punit la faute des pères sur les enfants et les petits-enfants jusqu'à la troisième et à la quatrième génération!»
  '8':
  - type: text
    content: 'Aussitôt Moïse s''inclina jusqu''à terre et adora. '
  '9':
  - type: text
    content: 'Il dit: «Seigneur, si j''ai trouvé grâce à tes yeux, que le Seigneur marche au milieu de nous, même si c''est un peuple réfractaire. Pardonne nos fautes et nos péchés et prends-nous pour ta possession.»'
