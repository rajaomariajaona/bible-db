document_id: EXO.34
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Renouvellement de l'alliance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Moïse: «Taille deux tables de pierre pareilles aux premières, et j''y écrirai les paroles qui étaient gravées sur les premières tables que tu as brisées. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Sois prêt de bonne heure. Tu graviras dès le matin le mont Sinaï et tu t''y tiendras devant moi, au sommet de la montagne. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Que personne ne monte avec toi et qu''on ne voie personne sur toute la montagne. Que pas même le petit et le gros bétail ne broutent près de cette montagne.» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Moïse tailla deux tables de pierre pareilles aux premières. Il se leva de bon matin et gravit le mont Sinaï, conformément à l'ordre que l'Eternel lui avait donné. Il prit avec lui les deux tables de pierre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L''Eternel descendit dans une nuée, se tint là près de lui et proclama le nom de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L''Eternel passa devant lui et s''écria: «L''Eternel, l''Eternel est un *Dieu de grâce et de compassion, lent à la colère, riche en bonté et en vérité'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '34.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Dieu… vérité: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'repris au '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 86.15
      metadata:
        usfm: PSA.86.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il garde son amour jusqu'à 1000 générations, il pardonne la faute, la révolte et le péché, mais il ne traite pas le coupable en innocent et il punit la faute des pères sur les enfants et les petits-enfants jusqu'à la troisième et à la quatrième génération!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Aussitôt Moïse s''inclina jusqu''à terre et adora. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il dit: «Seigneur, si j''ai trouvé grâce à tes yeux, que le Seigneur marche au milieu de nous, même si c''est un peuple réfractaire. Pardonne nos fautes et nos péchés et prends-nous pour ta possession.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L''Eternel répondit: «Voici, je conclus moi-même une alliance. Je vais accomplir devant tout ton peuple des merveilles qui ne se sont produites dans aucun pays ni chez aucune nation. Tout le peuple qui t''entoure verra l''œuvre de l''Eternel, et ce que j''accomplirai par toi inspirera de la crainte. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Respecte bien les commandements que je te donne aujourd''hui. Je chasserai devant toi les Amoréens, les Cananéens, les Hittites, les Phéréziens, les Héviens et les Jébusiens. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Prends bien garde de ne pas faire alliance avec les habitants du pays où tu dois entrer, de peur qu''ils ne soient un piège pour toi. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Au contraire, vous démolirez leurs autels, vous briserez leurs statues et vous abattrez leurs poteaux sacrés. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tu ne te prosterneras pas devant un autre dieu, car l''Eternel porte le nom de jaloux, il est un Dieu jaloux. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Prends bien garde de ne pas faire alliance avec les habitants du pays: ils risqueraient de t''inviter lorsqu''ils se prostituent à leurs dieux et leur offrent des sacrifices, et tu mangerais des victimes qu''ils ont sacrifiées; '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'tu prendrais de leurs filles pour tes fils et celles-ci, en se prostituant à leurs dieux, entraîneraient tes fils à se prostituer à leurs dieux. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tu ne te feras pas de dieu en métal fondu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: »Tu observeras la fête des pains sans levain. Pendant 7 jours, au moment fixé du mois des épis, tu mangeras des pains sans levain, comme je t'en ai donné l'ordre. En effet, c'est au cours du mois des épis que tu es sorti d'Egypte.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '»Tout premier-né m''appartient, même tout mâle premier-né dans les troupeaux de gros et de petit bétail. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tu rachèteras le premier-né de l'âne avec un agneau. Si tu ne le rachètes pas, tu lui briseras la nuque. Tu rachèteras tout premier-né de tes fils. On ne se présentera pas les mains vides devant moi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: »Pendant 6 jours tu travailleras, et tu te reposeras le septième jour; tu te reposeras, même à l'époque du labour et de la moisson.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: »Tu célébreras la fête des semaines au moment des premières moissons de blé, et la fête de la récolte à la fin de l'année.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '»Trois fois par an, tous les hommes se présenteront devant le Seigneur, l''Eternel, le Dieu d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: En effet, je chasserai les nations devant toi et j'agrandirai ton territoire, et personne ne cherchera à s'emparer de ton pays pendant que tu monteras te présenter devant l'Eternel, ton Dieu, trois fois par an.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: »Tu n'offriras pas sur du pain levé le sang de la victime sacrifiée en mon honneur et l'on ne gardera pas le sacrifice de la Pâque pendant la nuit jusqu'au matin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: »Tu apporteras à la maison de l'Eternel, ton Dieu, les tout premiers produits de ton sol. Tu ne feras pas cuire un chevreau dans le lait de sa mère.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'L''Eternel dit à Moïse: «Ecris ces paroles, car c''est sur cette base que je conclus une alliance avec toi et avec Israël.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Moïse resta là avec l'Eternel 40 jours et 40 nuits. Il ne mangea pas de pain et ne but pas d'eau. Et l'Eternel écrivit sur les tables les paroles de l'alliance, les dix paroles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Moïse descendit du mont Sinaï, les deux tables du témoignage à la main. Il ne savait pas que la peau de son visage rayonnait parce qu''il avait parlé avec l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Aaron et tous les Israélites regardèrent Moïse et virent que la peau de son visage rayonnait; ils eurent alors peur de s''approcher de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Moïse les appela. Aaron et tous les chefs de l''assemblée vinrent vers lui et il leur parla. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Après cela, tous les Israélites s''approchèrent et il leur donna tous les ordres qu''il avait reçus de l''Eternel sur le mont Sinaï. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Lorsque Moïse eut fini de leur parler, il mit un voile sur son visage.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Quand Moïse entrait dans la présence de l''Eternel pour parler avec lui, il retirait le voile jusqu''au moment où il ressortait; et quand il sortait, il transmettait aux Israélites les commandements qu''il avait reçus. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Les Israélites regardaient le visage de Moïse et voyaient que la peau de son visage rayonnait; et Moïse remettait le voile sur son visage jusqu'au moment où il entrait pour parler avec l'Eternel.
