document_id: DEU.31,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Dernières paroles de Moïse
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 31.1–34.12
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Transmission des responsabilités à Josué
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse adressa encore ces paroles à tout Israël: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse leur donna cet ordre: «Tous les 7 ans, l''année de la remise des dettes, lors de la fête des tentes, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'quand tous les Israélites viendront se présenter devant l''Eternel, ton Dieu, à l''endroit qu''il choisira, tu liras cette loi devant eux, en leur présence. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu rassembleras le peuple, les hommes, les femmes, les enfants ainsi que l''étranger qui habitera dans tes villes, afin qu''ils écoutent et qu''ils apprennent à craindre l''Eternel, votre Dieu, à respecter et mettre en pratique toutes les paroles de cette loi. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Leurs enfants qui ne la connaîtront pas l'entendront et ils apprendront à craindre l'Eternel, votre Dieu, tout le temps que vous vivrez dans le pays dont vous prendrez possession une fois le Jourdain passé.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Annonce de l'infidélité d'Israël
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel dit à Moïse: «Voici qu''approche le moment où tu vas mourir. Appelle Josué et présentez-vous dans la tente de la rencontre. Je lui donnerai mes ordres.» Moïse et Josué allèrent se présenter dans la tente de la rencontre. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L'Eternel apparut dans la tente dans une colonne de nuée, et la colonne de nuée s'arrêta à l'entrée de la tente.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel dit à Moïse: «Voici que tu vas te coucher avec tes ancêtres. Ce peuple se mettra à se prostituer aux dieux étrangers du pays où il entre. Il m''abandonnera et violera mon alliance, celle que j''ai conclue avec lui. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce jour-là, ma colère s''enflammera contre lui. Je les abandonnerai et je me cacherai à eux. Il sera dévoré, il sera atteint par une foule de malheurs et de situations de détresse. Alors il dira: ‘N''est-ce pas parce que mon Dieu n''est pas au milieu de moi que ces malheurs m''ont atteint?’ '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et moi, je me cacherai ce jour-là, à cause de tout le mal qu'il aura fait en se tournant vers d'autres dieux.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Maintenant, mettez par écrit le cantique qui suit. Enseigne-le aux Israélites, mets-le dans leur bouche, et que ce cantique me serve de témoin contre les Israélites. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Aujourd''hui, leur dit-il, je suis âgé de 120 ans. Je ne pourrai plus partir en campagne et en revenir, et l''Eternel m''a dit: ‘Tu ne passeras pas ce Jourdain.’ '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, je vais conduire ce peuple vers le territoire que j''ai juré à ses ancêtres de lui donner, un pays où coulent le lait et le miel. Il mangera à satiété, s''engraissera, puis il se tournera vers d''autres dieux et les servira, il me méprisera et violera mon alliance. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand il sera alors atteint par une foule de malheurs et de situations de détresse, ce cantique déposera en tant que témoin contre ce peuple, car sa descendance ne l'oubliera pas. Je connais, en effet, ses dispositions. Elles se manifestent aujourd'hui déjà, avant même que je l'aie fait entrer dans le pays que j'ai juré de lui donner.»
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce jour-là, Moïse écrivit le cantique qui suit et il l'enseigna aux Israélites.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel donna ses ordres à Josué, fils de Nun. Il dit: «Fortifie-toi et prends courage, car c''est toi qui feras entrer les Israélites dans le pays que j''ai juré de leur donner. Je serai moi-même avec toi.»'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Moïse eut complètement fini d''écrire dans un livre les paroles de cette loi, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il ordonna aux Lévites qui portaient l''arche de l''alliance de l''Eternel: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Prenez ce livre de la loi et mettez-le à côté de l''arche de l''alliance de l''Eternel, votre Dieu. Il sera là comme témoin contre toi. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, je connais ta révolte et ton esprit réfractaire. Si vous vous révoltez contre l''Eternel pendant que je suis encore en vie au milieu de vous, combien plus le ferez-vous après ma mort! '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rassemblez devant moi tous les anciens de vos tribus et vos officiers. Je dirai ces paroles en leur présence et je prendrai le ciel et la terre à témoin contre eux. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Oui, je sais qu'après ma mort vous vous corromprez et que vous vous écarterez de la voie que je vous ai prescrite. Le malheur finira par vous atteindre, quand vous ferez ce qui est mal aux yeux de l'Eternel au point de l'irriter par votre manière d'agir.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Cantique de Moïse
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel, ton Dieu, marchera lui-même devant toi, il détruira ces nations devant toi et tu t''en rendras maître. Josué marchera aussi devant toi, comme l''Eternel l''a dit. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moïse fit entendre à toute l'assemblée d'Israël la totalité du cantique qui suit.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel traitera ces nations comme il a traité Sihon et Og, les rois des Amoréens, qu''il a détruits avec leur pays. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel vous les livrera et vous agirez envers eux conformément à tous les ordres que je vous ai donnés. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fortifiez-vous et prenez courage! N''ayez pas peur et ne soyez pas effrayés devant eux, car l''Eternel, ton Dieu, marchera lui-même avec toi. Il ne te délaissera pas, il ne t''abandonnera pas.» '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse appela Josué et lui dit devant tous les Israélites: «Fortifie-toi et prends courage, car tu entreras avec ce peuple dans le pays que l''Eternel a juré à leurs ancêtres de leur donner et c''est toi qui les en mettras en possession. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: L'Eternel marchera lui-même devant toi, il sera lui-même avec toi. *Il ne te délaissera pas, il ne t'abandonnera pas.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il ne te… pas: '
      - type: usfm
        marker: ft
        children:
