document_id: PSA.64
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Punition des méchants
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: O Dieu, écoute-moi quand je gémis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: protège ma vie contre l'ennemi que je redoute!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mets-moi à l'abri des complots des méchants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de la troupe bruyante des hommes injustes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ils aiguisent leur langue comme une épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils lancent leurs paroles amères comme des flèches
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: pour tirer en cachette sur celui qui est intègre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Soudain ils tirent sur lui, sans éprouver la moindre crainte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils se fortifient dans leur méchanceté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se concertent pour tendre des pièges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ils disent: «Qui les verra?»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils combinent des crimes:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Nous sommes prêts, le plan est au point!»
- type: usfm
  marker: q1
  children:
  - type: text
    text: La pensée intime, le cœur, de chacun est un abîme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dieu lance ses flèches contre eux:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: soudain les voilà frappés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Leur langue a causé leur chute;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous ceux qui les voient hochent la tête.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tous les hommes sont saisis de crainte;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils proclament ce que Dieu fait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils prêtent attention à son œuvre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le juste se réjouit en l'Eternel et se réfugie en lui;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous ceux dont le cœur est droit s'en félicitent.
