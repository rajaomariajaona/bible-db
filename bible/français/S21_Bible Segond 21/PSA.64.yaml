document_id: PSA.64,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Punition des méchants
  - type: text
    content: Au chef de chœur. Psaume de David.
  '10':
  - type: text
    content: Tous les hommes sont saisis de crainte;
  - type: text
    content: ils proclament ce que Dieu fait,
  - type: text
    content: ils prêtent attention à son œuvre.
  '11':
  - type: text
    content: Le juste se réjouit en l'Eternel et se réfugie en lui;
  - type: text
    content: tous ceux dont le cœur est droit s'en félicitent.
  '2':
  - type: text
    content: O Dieu, écoute-moi quand je gémis,
  - type: text
    content: protège ma vie contre l'ennemi que je redoute!
  '3':
  - type: text
    content: Mets-moi à l'abri des complots des méchants,
  - type: text
    content: de la troupe bruyante des hommes injustes!
  '4':
  - type: text
    content: Ils aiguisent leur langue comme une épée,
  - type: text
    content: ils lancent leurs paroles amères comme des flèches
  '5':
  - type: text
    content: pour tirer en cachette sur celui qui est intègre.
  - type: text
    content: Soudain ils tirent sur lui, sans éprouver la moindre crainte.
  '6':
  - type: text
    content: Ils se fortifient dans leur méchanceté,
  - type: text
    content: ils se concertent pour tendre des pièges,
  - type: text
    content: 'ils disent: «Qui les verra?»'
  '7':
  - type: text
    content: 'Ils combinent des crimes:'
  - type: text
    content: «Nous sommes prêts, le plan est au point!»
  - type: text
    content: La pensée intime, le cœur, de chacun est un abîme.
  '8':
  - type: text
    content: 'Dieu lance ses flèches contre eux:'
  - type: text
    content: soudain les voilà frappés.
  '9':
  - type: text
    content: Leur langue a causé leur chute;
  - type: text
    content: tous ceux qui les voient hochent la tête.
