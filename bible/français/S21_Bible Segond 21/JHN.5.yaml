document_id: JHN.5,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Oppositions à Jésus
  - type: heading
    content: 5.1–12.50
  - type: heading
    content: Guérison à la piscine de Béthesda
  - type: text
    content: 'Après cela, il y eut une fête juive et Jésus monta à Jérusalem. '
  '10':
  - type: text
    content: 'C''était un jour de sabbat. Les Juifs dirent donc à celui qui avait été guéri: «C''est le sabbat; il ne t''est pas permis de porter ton brancard.» '
  '11':
  - type: text
    content: 'Il leur répondit: «Celui qui m''a guéri m''a dit: ‘Prends ton brancard et marche.’» '
  '12':
  - type: text
    content: 'Ils lui demandèrent: «Qui est l''homme qui t''a dit: ‘Prends [ton brancard] et marche’?» '
  '13':
  - type: text
    content: 'Mais celui qui avait été guéri ne savait pas qui c''était, car Jésus avait disparu dans la foule qui était à cet endroit. '
  '14':
  - type: text
    content: 'Quelque temps plus tard, Jésus le retrouva dans le temple et lui dit: «Te voilà guéri. Ne pèche plus, de peur qu''il ne t''arrive quelque chose de pire.» '
  '15':
  - type: text
    content: 'Cet homme s''en alla annoncer aux Juifs que c''était Jésus qui l''avait guéri. '
  '16':
  - type: text
    content: C'est pourquoi les Juifs poursuivaient Jésus [et cherchaient à le faire mourir], parce qu'il avait fait cela le jour du sabbat.
  '17':
  - type: text
    content: 'Cependant, Jésus leur répondit: «Mon Père est à l''œuvre jusqu''à présent; moi aussi, je suis à l''œuvre.» '
  '18':
  - type: text
    content: 'Voilà pourquoi les Juifs cherchaient encore plus à le faire mourir: parce que non seulement il violait le sabbat, mais il appelait aussi Dieu son propre Père, se faisant lui-même égal à Dieu.'
  '19':
  - type: text
    content: 'Jésus reprit donc la parole et leur dit: «En vérité, en vérité, je vous le dis, le Fils ne peut rien faire de lui-même, sinon ce qu''il voit le Père accomplir. Tout ce que le Père fait, le Fils aussi le fait pareillement. '
  '2':
  - type: text
    content: 'Or à Jérusalem, près de la porte des brebis, il y a une piscine qui s''appelle en hébreu Béthesda et qui a cinq portiques. '
  '20':
  - type: text
    content: 'En effet, le Père aime le Fils et lui montre tout ce que lui-même fait, et il lui montrera des œuvres plus grandes que celles-ci, afin que vous soyez dans l''étonnement. '
  '21':
  - type: text
    content: 'En effet, tout comme le Père ressuscite les morts et donne la vie, le Fils aussi donne la vie à qui il veut. '
  '22':
  - type: text
    content: 'Le Père ne juge personne, mais il a remis tout jugement au Fils '
  '23':
  - type: text
    content: 'afin que tous honorent le Fils comme ils honorent le Père. Celui qui n''honore pas le Fils n''honore pas le Père qui l''a envoyé. '
  '24':
  - type: text
    content: 'En vérité, en vérité, je vous le dis, celui qui écoute ma parole et qui croit à celui qui m''a envoyé a la vie éternelle; il ne vient pas en jugement, mais il est passé de la mort à la vie. '
  '25':
  - type: text
    content: 'En vérité, en vérité, je vous le dis, l''heure vient, et elle est déjà là, où les morts entendront la voix du Fils de Dieu, et ceux qui l''auront entendue vivront. '
  '26':
  - type: text
    content: 'En effet, tout comme le Père a la vie en lui-même, ainsi il a donné au Fils d''avoir la vie en lui-même. '
  '27':
  - type: text
    content: 'Et il lui a donné [aussi] le pouvoir de juger, parce qu''il est le Fils de l''homme. '
  '28':
  - type: text
    content: 'Ne vous en étonnez pas, car l''heure vient où tous ceux qui sont dans les tombeaux entendront sa voix et '
  '29':
  - type: text
    content: 'en sortiront: ceux qui auront fait le bien ressusciteront pour la vie, mais ceux qui auront fait le mal ressusciteront pour le jugement. '
  '3':
  - type: text
    content: 'Sous ces portiques un grand nombre de malades étaient couchés: des aveugles, des boiteux, des paralysés; [ils attendaient le mouvement de l''eau,] '
  '30':
  - type: text
    content: 'Je ne peux rien faire de moi-même: je juge d''après ce que j''entends, et mon jugement est juste parce que je ne cherche pas à faire ma volonté, mais celle du Père qui m''a envoyé.'
  '31':
  - type: text
    content: '»Si je me rends témoignage à moi-même, mon témoignage n''est pas valable. '
  '32':
  - type: text
    content: 'C''est un autre qui témoigne en ma faveur, et je sais que le témoignage qu''il me rend est vrai. '
  '33':
  - type: text
    content: 'Vous avez envoyé une délégation vers Jean, et il a rendu témoignage à la vérité. '
  '34':
  - type: text
    content: 'Pour ma part, ce n''est pas d''un homme que je reçois le témoignage, mais je dis cela afin que vous soyez sauvés. '
  '35':
  - type: text
    content: 'Jean était la lampe qui brûle et qui brille, et vous avez voulu vous réjouir une heure à sa lumière. '
  '36':
  - type: text
    content: 'Pour ma part, j''ai un témoignage plus grand que celui de Jean: ce sont les œuvres que le Père m''a donné d''accomplir. Ces œuvres mêmes que je fais témoignent à mon sujet que c''est le Père qui m''a envoyé, '
  '37':
  - type: text
    content: 'et le Père qui m''a envoyé a rendu lui-même témoignage à mon sujet. Vous n''avez jamais entendu sa voix, vous n''avez pas vu son visage '
  '38':
  - type: text
    content: 'et sa parole n''habite pas en vous, puisque vous ne croyez pas en celui qu''il a envoyé. '
  '39':
  - type: text
    content: 'Vous étudiez les Ecritures parce que vous pensez avoir par elles la vie éternelle. Ce sont elles qui rendent témoignage à mon sujet, '
  '4':
  - type: text
    content: '[car un ange descendait de temps en temps dans la piscine et agitait l''eau; et le premier qui descendait dans l''eau après qu''elle avait été agitée était guéri, quelle que soit sa maladie.]'
  '40':
  - type: text
    content: et vous ne voulez pas venir à moi pour avoir la vie!
  '41':
  - type: text
    content: '»Je ne reçois pas ma gloire des hommes. '
  '42':
  - type: text
    content: 'Mais je vous connais: vous n''avez pas l''amour de Dieu en vous. '
  '43':
  - type: text
    content: 'Je suis venu au nom de mon Père et vous ne me recevez pas; si un autre vient en son propre nom, vous le recevrez. '
  '44':
  - type: text
    content: 'Comment pouvez-vous croire, vous qui recevez votre gloire les uns des autres et qui ne recherchez pas la gloire qui vient de Dieu seul? '
  '45':
  - type: text
    content: 'Ne pensez pas que c''est moi qui vous accuserai devant le Père; celui qui vous accuse, c''est Moïse, celui en qui vous avez mis votre espérance. '
  '46':
  - type: text
    content: 'En effet, si vous croyiez Moïse, vous me croiriez aussi, puisqu''il a écrit à mon sujet. '
  '47':
  - type: text
    content: Mais si vous ne croyez pas à ses écrits, comment croirez-vous à mes paroles?»
  '5':
  - type: text
    content: 'Là se trouvait un homme infirme depuis 38 ans. '
  '6':
  - type: text
    content: 'Jésus le vit couché et, sachant qu''il était malade depuis longtemps, il lui dit: «Veux-tu être guéri?» '
  '7':
  - type: text
    content: 'L''infirme lui répondit: «Seigneur, je n''ai personne pour me plonger dans la piscine quand l''eau est agitée, et pendant que j''y vais, un autre descend avant moi.» '
  '8':
  - type: text
    content: '«Lève-toi, lui dit Jésus, prends ton brancard et marche.» '
  '9':
  - type: text
    content: Aussitôt cet homme fut guéri; il prit son brancard et se mit à marcher.
