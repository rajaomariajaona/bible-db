document_id: PSA.90,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Quatrième livre
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 90–106
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La brièveté de la vie humaine
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Prière de Moïse, homme de Dieu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seigneur, tu as été pour nous un refuge
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de génération en génération.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: La durée de notre vie s'élève à 70 ans,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour les plus robustes à 80 ans,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais l'orgueil qu'ils en tirent n'est que peine et misère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car le temps passe vite et nous nous envolons.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Qui a conscience de la force de ta colère
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de ton courroux pour te craindre?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Enseigne-nous à bien compter nos jours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que notre cœur parvienne à la sagesse!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Reviens, Eternel! Jusqu'à quand?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aie pitié de tes serviteurs!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Rassasie-nous chaque matin de ta bonté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et nous serons toute notre vie dans la joie et l'allégresse.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Réjouis-nous autant de jours que tu nous as humiliés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: autant d'années que nous avons connu le malheur.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Que ton activité soit visible pour tes serviteurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ta splendeur pour leurs enfants!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Que la grâce de l'Eternel, notre Dieu, soit sur nous!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Affermis l'œuvre de nos mains!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, affermis l'œuvre de nos mains!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Avant que les montagnes soient nées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant que tu aies créé la terre et le monde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d'éternité en éternité tu es Dieu.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tu fais retourner les hommes à la poussière
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et tu leur dis: «Fils d''Adam, retournez à la terre!»'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: car *1000 ans sont à tes yeux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme la journée
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '90.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: '1000 ans… la journée: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Pierre 3.8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' d''hier: elle passe'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme le quart de la nuit.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tu les emportes, semblables à un rêve
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'qui, le matin, passe comme l''herbe:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: elle fleurit le matin et elle passe;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on la coupe le soir et elle sèche.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Nous sommes consumés par ta colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ta fureur nous épouvante.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Tu mets devant toi nos fautes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ta lumière éclaire nos secrets.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Tous nos jours disparaissent à cause de ta colère;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous voyons nos années s'éteindre comme un soupir.
