document_id: PSA.90,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Quatrième livre
  - type: heading
    content: 90–106
  - type: heading
    content: La brièveté de la vie humaine
  - type: text
    content: Prière de Moïse, homme de Dieu.
  - type: text
    content: Seigneur, tu as été pour nous un refuge
  - type: text
    content: de génération en génération.
  '10':
  - type: text
    content: La durée de notre vie s'élève à 70 ans,
  - type: text
    content: et pour les plus robustes à 80 ans,
  - type: text
    content: mais l'orgueil qu'ils en tirent n'est que peine et misère,
  - type: text
    content: car le temps passe vite et nous nous envolons.
  '11':
  - type: text
    content: Qui a conscience de la force de ta colère
  - type: text
    content: et de ton courroux pour te craindre?
  '12':
  - type: text
    content: Enseigne-nous à bien compter nos jours,
  - type: text
    content: afin que notre cœur parvienne à la sagesse!
  '13':
  - type: text
    content: Reviens, Eternel! Jusqu'à quand?
  - type: text
    content: Aie pitié de tes serviteurs!
  '14':
  - type: text
    content: Rassasie-nous chaque matin de ta bonté,
  - type: text
    content: et nous serons toute notre vie dans la joie et l'allégresse.
  '15':
  - type: text
    content: Réjouis-nous autant de jours que tu nous as humiliés,
  - type: text
    content: autant d'années que nous avons connu le malheur.
  '16':
  - type: text
    content: Que ton activité soit visible pour tes serviteurs,
  - type: text
    content: et ta splendeur pour leurs enfants!
  '17':
  - type: text
    content: Que la grâce de l'Eternel, notre Dieu, soit sur nous!
  - type: text
    content: Affermis l'œuvre de nos mains!
  - type: text
    content: Oui, affermis l'œuvre de nos mains!
  '2':
  - type: text
    content: Avant que les montagnes soient nées,
  - type: text
    content: avant que tu aies créé la terre et le monde,
  - type: text
    content: d'éternité en éternité tu es Dieu.
  '3':
  - type: text
    content: Tu fais retourner les hommes à la poussière
  - type: text
    content: 'et tu leur dis: «Fils d''Adam, retournez à la terre!»'
  '4':
  - type: text
    content: car *1000 ans sont à tes yeux
  - type: text
    content: comme la journée
  - type: note
    content: '1000 ans… la journée: cité en 2 Pierre 3.8.'
  - type: text
    content: ' d''hier: elle passe'
  - type: text
    content: comme le quart de la nuit.
  '5':
  - type: text
    content: Tu les emportes, semblables à un rêve
  - type: text
    content: 'qui, le matin, passe comme l''herbe:'
  '6':
  - type: text
    content: elle fleurit le matin et elle passe;
  - type: text
    content: on la coupe le soir et elle sèche.
  '7':
  - type: text
    content: Nous sommes consumés par ta colère,
  - type: text
    content: et ta fureur nous épouvante.
  '8':
  - type: text
    content: Tu mets devant toi nos fautes,
  - type: text
    content: et ta lumière éclaire nos secrets.
  '9':
  - type: text
    content: Tous nos jours disparaissent à cause de ta colère;
  - type: text
    content: nous voyons nos années s'éteindre comme un soupir.
