document_id: PSA.143,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière pour la délivrance
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Psaume de David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, écoute ma prière, prête l'oreille à mes supplications,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: réponds-moi dans ta fidélité, dans ta justice!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enseigne-moi à faire ta volonté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c'est toi qui es mon Dieu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ton bon Esprit me conduise sur le terrain de la droiture!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de ton nom, Eternel, rends-moi la vie!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans ta justice, délivre-moi de la détresse!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans ta bonté, réduis mes ennemis au silence
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et fais disparaître tous mes adversaires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je suis ton serviteur!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N'entre pas en jugement avec ton serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car aucun vivant n'est juste devant toi.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'ennemi me poursuit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il veut me terrasser;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il me fait habiter dans les ténèbres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme ceux qui sont morts depuis longtemps.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon esprit est abattu en moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon cœur est consterné au fond de moi.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me souviens des jours passés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je pense à toute ton activité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je réfléchis au travail de tes mains.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je tends les mains vers toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'je soupire après toi comme une terre assoiffée. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réponds-moi vite, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car mon esprit s'épuise.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne me cache pas ton visage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je deviendrais pareil à ceux qui descendent dans la tombe.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dès le matin, fais-moi entendre ta bonté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je me confie en toi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais-moi connaître le chemin où je dois marcher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je me tourne vers toi!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Délivre-moi de mes ennemis, Eternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est en toi que je cherche un refuge.
