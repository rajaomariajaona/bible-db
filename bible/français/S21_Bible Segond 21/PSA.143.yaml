document_id: PSA.143,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière pour la délivrance
  - type: text
    content: Psaume de David.
  - type: text
    content: Eternel, écoute ma prière, prête l'oreille à mes supplications,
  - type: text
    content: réponds-moi dans ta fidélité, dans ta justice!
  '10':
  - type: text
    content: Enseigne-moi à faire ta volonté,
  - type: text
    content: car c'est toi qui es mon Dieu.
  - type: text
    content: Que ton bon Esprit me conduise sur le terrain de la droiture!
  '11':
  - type: text
    content: A cause de ton nom, Eternel, rends-moi la vie!
  - type: text
    content: Dans ta justice, délivre-moi de la détresse!
  '12':
  - type: text
    content: Dans ta bonté, réduis mes ennemis au silence
  - type: text
    content: et fais disparaître tous mes adversaires,
  - type: text
    content: car je suis ton serviteur!
  '2':
  - type: text
    content: N'entre pas en jugement avec ton serviteur,
  - type: text
    content: car aucun vivant n'est juste devant toi.
  '3':
  - type: text
    content: L'ennemi me poursuit,
  - type: text
    content: il veut me terrasser;
  - type: text
    content: il me fait habiter dans les ténèbres
  - type: text
    content: comme ceux qui sont morts depuis longtemps.
  '4':
  - type: text
    content: Mon esprit est abattu en moi,
  - type: text
    content: mon cœur est consterné au fond de moi.
  '5':
  - type: text
    content: Je me souviens des jours passés,
  - type: text
    content: je pense à toute ton activité,
  - type: text
    content: je réfléchis au travail de tes mains.
  '6':
  - type: text
    content: Je tends les mains vers toi,
  - type: text
    content: 'je soupire après toi comme une terre assoiffée. '
  - type: text
    content: – Pause.
  '7':
  - type: text
    content: Réponds-moi vite, Eternel,
  - type: text
    content: car mon esprit s'épuise.
  - type: text
    content: Ne me cache pas ton visage,
  - type: text
    content: car je deviendrais pareil à ceux qui descendent dans la tombe.
  '8':
  - type: text
    content: Dès le matin, fais-moi entendre ta bonté,
  - type: text
    content: car je me confie en toi!
  - type: text
    content: Fais-moi connaître le chemin où je dois marcher,
  - type: text
    content: car je me tourne vers toi!
  '9':
  - type: text
    content: Délivre-moi de mes ennemis, Eternel!
  - type: text
    content: C'est en toi que je cherche un refuge.
