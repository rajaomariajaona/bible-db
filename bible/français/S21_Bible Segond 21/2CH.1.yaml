document_id: 2CH.1,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Règne de Salomon
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 1.1–9.31
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Accession de Salomon au trône
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Salomon, fils de David, s'affermit dans sa royauté. L'Eternel, son Dieu, était avec lui et il porta sa grandeur au plus haut point.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: accorde-moi donc de la sagesse et de la connaissance afin que je sache diriger ce peuple! En effet, qui pourrait juger ton peuple, ce peuple si grand?»
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu dit à Salomon: «Puisque c''est cela qui est dans ton cœur, puisque tu ne réclames ni les richesses, ni des biens, ni la gloire, ni la mort de tes ennemis ni même une longue vie, mais que tu demandes pour toi de la sagesse et de la connaissance afin de juger mon peuple, sur lequel je t''ai établi roi, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: la sagesse et la connaissance te sont accordées. Je te donnerai, en plus de cela, des richesses, des biens et une gloire tels qu'aucun roi n'en a jamais eu avant toi et n'en aura après toi.»
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Salomon revint à Jérusalem après avoir quitté le haut lieu qui se trouvait à Gabaon et la tente de la rencontre, et il régna sur Israël.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salomon réunit des chars et de la cavalerie. Il avait 1400 chars et 12''000 cavaliers, qu''il plaça dans les villes où il gardait ses chars et à Jérusalem, près de lui. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi rendit l''argent et l''or aussi communs à Jérusalem que les pierres, et les cèdres aussi communs que les sycomores qui poussent dans la plaine. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''était en Egypte que Salomon achetait ses chevaux. Une caravane de marchands du roi allait les chercher par groupes à un prix fixe: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: il fallait 600 pièces d'argent pour faire venir un char d'Egypte, et 150 pièces pour un cheval. Ils en ramenaient de même avec eux pour tous les rois des Hittites et pour les rois de Syrie.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Préparatifs pour la construction du temple
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Salomon ordonna que l'on construise un temple pour l'Eternel et un palais pour lui-même.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salomon donna ses ordres à tout Israël, aux chefs de milliers et de centaines, aux juges, aux princes de tout Israël, aux chefs de famille, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et il rejoignit avec toute l''assemblée le haut lieu qui se trouvait à Gabaon. Là se trouvait la tente de la rencontre de Dieu, fabriquée dans le désert par Moïse, le serviteur de l''Eternel. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant à l''arche de Dieu, elle avait été transportée par David de Kirjath-Jearim à l''emplacement qu''il lui avait préparé. Il avait en effet dressé une tente pour elle à Jérusalem. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Là se trouvait aussi, devant le tabernacle de l''Eternel, l''autel de bronze qu''avait fabriqué Betsaleel, fils d''Uri et petit-fils de Hur. Salomon et l''assemblée recherchèrent l''Eternel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et ce fut là, sur l'autel de bronze qui se trouvait devant la tente de la rencontre, que Salomon offrit 1000 holocaustes à l'Eternel.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant la nuit, Dieu apparut à Salomon et lui dit: «Demande-moi ce que tu veux que je te donne.» '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salomon répondit à Dieu: «Tu as traité avec une grande bonté mon père David et tu m''as établi roi à sa place. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, Eternel Dieu, tiens la promesse que tu as faite à mon père David, puisque tu m''as établi roi sur un peuple aussi nombreux que la poussière de la terre: '
