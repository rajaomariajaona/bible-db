document_id: 2CH.14,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Règne d'Asa
  - type: text
    content: 'Asa fit ce qui est bien et droit aux yeux de l''Eternel, son Dieu. '
  '10':
  - type: text
    content: 'Asa fit appel à l''Eternel, son Dieu, et dit: «Eternel, toi seul peux secourir celui qui a beaucoup de force comme celui qui n''en a pas. Viens à notre aide, Eternel, notre Dieu, car c''est sur toi que nous nous appuyons et c''est en ton nom que nous sommes venus contre cette foule. Eternel, tu es notre Dieu. Ne laisse pas un homme l''emporter sur toi!» '
  '11':
  - type: text
    content: 'L''Eternel frappa les Ethiopiens sous les yeux d''Asa et de Juda, et les Ethiopiens prirent la fuite. '
  '12':
  - type: text
    content: 'Asa et le peuple qui était avec lui les poursuivirent jusqu''à Guérar et les Ethiopiens tombèrent sans aucun moyen de sauver leur vie, car ils furent détruits par l''Eternel et par son armée. Asa et son peuple firent un très grand butin. '
  '13':
  - type: text
    content: 'Ils conquirent toutes les villes des environs de Guérar, car la terreur de l''Eternel s''était emparée d''elles, et ils les pillèrent toutes, car elles contenaient un butin considérable. '
  '14':
  - type: text
    content: Ils frappèrent aussi les campements destinés aux troupeaux et ils emmenèrent une grande quantité de brebis et de chameaux. Puis ils retournèrent à Jérusalem.
  '2':
  - type: text
    content: 'Il fit disparaître les autels des dieux étrangers et les hauts lieux, il brisa les statues et abattit les poteaux sacrés. '
  '3':
  - type: text
    content: 'Il ordonna à Juda de rechercher l''Eternel, le Dieu de ses ancêtres, et de mettre en pratique la loi et les commandements. '
  '4':
  - type: text
    content: Il fit disparaître de toutes les villes de Juda les hauts lieux et les piliers consacrés au soleil. Et le royaume fut tranquille sous son règne.
  '5':
  - type: text
    content: 'Il put construire des villes fortifiées en Juda, car le pays fut en paix et il n''y eut pas de guerre contre lui pendant ces années-là. En effet, l''Eternel lui avait donné du repos. '
  '6':
  - type: text
    content: 'Il dit à Juda: «Construisons ces villes et entourons-les de murailles, de tours, de portes et de verrous. Si le pays est encore à notre disposition, c''est parce que nous avons recherché l''Eternel, notre Dieu. Nous l''avons recherché et il nous a donné du repos de tous les côtés.» Ils se mirent donc à construire et ils eurent du succès.'
  '7':
  - type: text
    content: Asa disposait d'une armée composée de 300'000 hommes de Juda capables de manier le bouclier et la lance, et de 280'000 hommes de Benjamin capables de manier le bouclier et de tirer à l'arc. C'étaient tous de vaillants guerriers.
  '8':
  - type: text
    content: 'Zérach l''Ethiopien se mit en campagne pour les attaquer avec une armée d''un million d''hommes et 300 chars, et il atteignit Marésha. '
  '9':
  - type: text
    content: 'Asa marcha à sa rencontre et ils se rangèrent en ordre de bataille dans la vallée de Tsephata, près de Marésha. '
