document_id: 2CH.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne d'Asa
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Asa fit ce qui est bien et droit aux yeux de l''Eternel, son Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il fit disparaître les autels des dieux étrangers et les hauts lieux, il brisa les statues et abattit les poteaux sacrés. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il ordonna à Juda de rechercher l''Eternel, le Dieu de ses ancêtres, et de mettre en pratique la loi et les commandements. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il fit disparaître de toutes les villes de Juda les hauts lieux et les piliers consacrés au soleil. Et le royaume fut tranquille sous son règne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il put construire des villes fortifiées en Juda, car le pays fut en paix et il n''y eut pas de guerre contre lui pendant ces années-là. En effet, l''Eternel lui avait donné du repos. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il dit à Juda: «Construisons ces villes et entourons-les de murailles, de tours, de portes et de verrous. Si le pays est encore à notre disposition, c''est parce que nous avons recherché l''Eternel, notre Dieu. Nous l''avons recherché et il nous a donné du repos de tous les côtés.» Ils se mirent donc à construire et ils eurent du succès.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Asa disposait d'une armée composée de 300'000 hommes de Juda capables de manier le bouclier et la lance, et de 280'000 hommes de Benjamin capables de manier le bouclier et de tirer à l'arc. C'étaient tous de vaillants guerriers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Zérach l''Ethiopien se mit en campagne pour les attaquer avec une armée d''un million d''hommes et 300 chars, et il atteignit Marésha. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Asa marcha à sa rencontre et ils se rangèrent en ordre de bataille dans la vallée de Tsephata, près de Marésha. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Asa fit appel à l''Eternel, son Dieu, et dit: «Eternel, toi seul peux secourir celui qui a beaucoup de force comme celui qui n''en a pas. Viens à notre aide, Eternel, notre Dieu, car c''est sur toi que nous nous appuyons et c''est en ton nom que nous sommes venus contre cette foule. Eternel, tu es notre Dieu. Ne laisse pas un homme l''emporter sur toi!» '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L''Eternel frappa les Ethiopiens sous les yeux d''Asa et de Juda, et les Ethiopiens prirent la fuite. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Asa et le peuple qui était avec lui les poursuivirent jusqu''à Guérar et les Ethiopiens tombèrent sans aucun moyen de sauver leur vie, car ils furent détruits par l''Eternel et par son armée. Asa et son peuple firent un très grand butin. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils conquirent toutes les villes des environs de Guérar, car la terreur de l''Eternel s''était emparée d''elles, et ils les pillèrent toutes, car elles contenaient un butin considérable. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ils frappèrent aussi les campements destinés aux troupeaux et ils emmenèrent une grande quantité de brebis et de chameaux. Puis ils retournèrent à Jérusalem.
