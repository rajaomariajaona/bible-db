document_id: EST.7,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Plaidoyer d'Esther
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi et Haman se rendirent au banquet donné chez la reine Esther. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi, on pendit Haman à la potence qu'il avait préparée pour Mardochée, et la colère du roi s'apaisa.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce second jour de nouveau, le roi dit à Esther, pendant qu''on buvait le vin: «Quel est l''objet de ta demande? Il te sera accordé. Que désires-tu? Même si tu réclames la moitié du royaume, tu l''obtiendras.» '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La reine Esther répondit: «Si j''ai trouvé grâce à tes yeux, roi, et si tu le juges bon, accorde-moi la vie sauve, voilà ma demande, et sauve mon peuple, voilà mon désir! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, nous avons été vendus, mon peuple et moi, pour être exterminés, massacrés, supprimés. Si encore nous avions été vendus pour devenir des esclaves et des servantes, j'aurais gardé le silence, mais l'adversaire ne saurait compenser le préjudice ainsi causé au roi.»
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Prenant la parole, le roi Assuérus demanda à la reine Esther: «Qui est-il et où est-il, celui qui a projeté d''agir de cette manière?» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esther répondit: «L''homme qui est notre adversaire, notre ennemi, c''est Haman, le misérable que voici!» Haman trembla de terreur devant le roi et la reine.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans sa colère, le roi se leva et quitta le banquet pour aller dans le jardin du palais. Quant à Haman, il resta là pour demander la vie sauve à la reine Esther, car il voyait bien que sa perte était décidée dans l''esprit du roi. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A son retour du jardin du palais, en pénétrant dans la salle de banquet le roi le trouva affalé contre le siège occupé par Esther, et il dit: «Ira-t-il jusqu''à violer la reine en ma présence, dans le palais?» Dès que cette parole fut sortie de la bouche du roi, on recouvrit le visage d''Haman. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Harbona, l''un des eunuques, dit alors devant le roi: «Il y a une potence préparée par Haman à l''intention de Mardochée, celui qui avait parlé pour le bien du roi. Elle est dressée dans la maison d''Haman et fait 25 mètres de haut.» Le roi ordonna: «Pendez-y donc Haman!» '
