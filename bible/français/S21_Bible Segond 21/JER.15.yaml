document_id: JER.15,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Un jugement inéluctable
  - type: text
    content: 'L''Eternel m''a dit:'
  - type: text
    content: «Même si Moïse et Samuel se présentaient devant moi,
  - type: text
    content: je resterais indifférent au sort de ce peuple.
  - type: text
    content: Chasse-le loin de moi, qu'il s'en aille!
  '10':
  - type: text
    content: «Malheur à moi, ma mère, de ce que tu m'as donné naissance!
  - type: text
    content: Je suis un homme à qui l'on cherche dispute et querelle dans tout le pays!
  - type: text
    content: Je n'emprunte ni ne prête rien,
  - type: text
    content: et cependant tous me maudissent.»
  '11':
  - type: text
    content: 'L''Eternel a dit: «C''est certain, je te libérerai pour ton bonheur,'
  - type: text
    content: j'amènerai l'ennemi à ta rencontre,
  - type: text
    content: au moment du malheur et de la détresse.
  '12':
  - type: text
    content: Le fer peut-il être inefficace, le fer qui vient du nord et le bronze?
  '13':
  - type: text
    content: Je livrerai gratuitement au pillage tes biens et tes trésors
  - type: text
    content: à cause de tous les péchés que tu as commis sur tout ton territoire.
  '14':
  - type: text
    content: Je te rendrai esclave de tes ennemis dans un pays que tu ne connais pas,
  - type: text
    content: car le feu de ma colère s'est allumé,
  - type: text
    content: il brûle contre vous.»
  '15':
  - type: text
    content: «Toi, tu sais tout, Eternel! Souviens-toi de moi, interviens en ma faveur,
  - type: text
    content: venge-moi de mes persécuteurs!
  - type: text
    content: Que je ne sois pas victime de ta grande patience envers eux!
  - type: text
    content: Sache-le, c'est à cause de toi que je supporte le mépris.
  '16':
  - type: text
    content: Tes paroles se sont présentées à moi, et je les ai dévorées.
  - type: text
    content: Ta parole a provoqué mon allégresse, elle a fait la joie de mon cœur,
  - type: text
    content: car je suis appelé de ton nom,
  - type: text
    content: Eternel, Dieu de l'univers!
  '17':
  - type: text
    content: »Je ne suis pas resté en compagnie de ceux qui s'amusent pour y prendre mon plaisir.
  - type: text
    content: Devant ta main je me suis assis solitaire,
  - type: text
    content: car tu m'avais rempli d'indignation.
  '18':
  - type: text
    content: Pourquoi ma souffrance est-elle continuelle?
  - type: text
    content: Pourquoi ma plaie est-elle incurable, pourquoi refuse-t-elle de guérir?
  - type: text
    content: Finirais-tu par devenir pour moi comme une source trompeuse,
  - type: text
    content: comme une eau dont il faut se méfier?»
  '19':
  - type: text
    content: 'C''est pourquoi, voici ce qu''a dit l''Eternel:'
  - type: text
    content: «Si tu reviens à moi, je te ferai revenir
  - type: text
    content: et tu te tiendras devant moi.
  - type: text
    content: Si tu sépares ce qui est précieux de ce qui est sans valeur, tu seras comme ma bouche.
  - type: text
    content: C'est à eux de revenir vers toi,
  - type: text
    content: ce n'est pas à toi de revenir vers eux.
  '2':
  - type: text
    content: 'S''ils te disent: ‘Où irons-nous?’'
  - type: text
    content: 'tu leur répondras: ‘Voici ce que dit l''Eternel:'
  - type: text
    content: A la mort ceux qui sont destinés à la mort,
  - type: text
    content: à l'épée ceux qui sont destinés à l'épée,
  - type: text
    content: à la famine ceux qui sont destinés à la famine,
  - type: text
    content: à la déportation ceux qui sont destinés à la déportation!’
  '20':
  - type: text
    content: Je ferai de toi un mur de bronze inébranlable pour ce peuple.
  - type: text
    content: Ils te feront la guerre, mais ils ne l'emporteront pas sur toi,
  - type: text
    content: car je serai moi-même avec toi pour te sauver et te délivrer,
  - type: text
    content: déclare l'Eternel.
  '21':
  - type: text
    content: Je te délivrerai des hommes mauvais,
  - type: text
    content: je te libérerai des hommes violents.»
  '3':
  - type: text
    content: '»J''interviendrai contre eux de quatre manières, déclare l''Eternel:'
  - type: text
    content: l'épée pour les tuer, les chiens pour les déchiqueter,
  - type: text
    content: les oiseaux du ciel et les bêtes de la terre
  - type: text
    content: pour les dévorer et les faire disparaître.
  '4':
  - type: text
    content: Je ferai d'eux un exemple effrayant pour tous les royaumes de la terre
  - type: text
    content: à cause de Manassé, fils d'Ezéchias, roi de Juda,
  - type: text
    content: et de tout ce qu'il a fait dans Jérusalem.
  '5':
  - type: text
    content: »Qui aura pitié de toi, Jérusalem,
  - type: text
    content: qui te plaindra?
  - type: text
    content: Qui ira prendre de tes nouvelles?
  '6':
  - type: text
    content: Tu m'as abandonné, déclare l'Eternel, tu m'as tourné le dos.
  - type: text
    content: Je déploierai donc ma puissance contre toi et je te détruirai.
  - type: text
    content: Je suis fatigué de faire preuve de compassion.
  '7':
  - type: text
    content: »Je les étalerai avec une pelle aux portes du pays.
  - type: text
    content: Je les prive d'enfants; je fais disparaître mon peuple
  - type: text
    content: parce qu'il n'a pas renoncé à sa conduite.
  '8':
  - type: text
    content: Je rends ses veuves plus nombreuses que les grains de sable de la mer.
  - type: text
    content: J'amène sur eux, sur la mère du jeune homme,
  - type: text
    content: le dévastateur en plein midi.
  - type: text
    content: Je fais soudain tomber sur elle l'angoisse et la terreur.
  '9':
  - type: text
    content: Celle qui avait mis au monde sept fils dépérit,
  - type: text
    content: elle rend l'âme.
  - type: text
    content: Son soleil se couche alors que c'est encore le jour,
  - type: text
    content: elle est couverte de honte et humiliée.
  - type: text
    content: Quant à leurs survivants, je les livre à l'épée devant leurs ennemis,
  - type: text
    content: déclare l'Eternel.»
  - type: heading
    content: Souffrance et plainte de Jérémie
