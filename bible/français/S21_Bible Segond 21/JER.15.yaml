document_id: JER.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Un jugement inéluctable
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel m''a dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Même si Moïse et Samuel se présentaient devant moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je resterais indifférent au sort de ce peuple.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chasse-le loin de moi, qu'il s'en aille!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'S''ils te disent: ‘Où irons-nous?’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tu leur répondras: ‘Voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A la mort ceux qui sont destinés à la mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à l'épée ceux qui sont destinés à l'épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la famine ceux qui sont destinés à la famine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la déportation ceux qui sont destinés à la déportation!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '»J''interviendrai contre eux de quatre manières, déclare l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'épée pour les tuer, les chiens pour les déchiqueter,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les oiseaux du ciel et les bêtes de la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour les dévorer et les faire disparaître.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je ferai d'eux un exemple effrayant pour tous les royaumes de la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de Manassé, fils d'Ezéchias, roi de Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de tout ce qu'il a fait dans Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: »Qui aura pitié de toi, Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui te plaindra?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui ira prendre de tes nouvelles?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tu m'as abandonné, déclare l'Eternel, tu m'as tourné le dos.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je déploierai donc ma puissance contre toi et je te détruirai.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis fatigué de faire preuve de compassion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: »Je les étalerai avec une pelle aux portes du pays.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les prive d'enfants; je fais disparaître mon peuple
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu'il n'a pas renoncé à sa conduite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Je rends ses veuves plus nombreuses que les grains de sable de la mer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'amène sur eux, sur la mère du jeune homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le dévastateur en plein midi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je fais soudain tomber sur elle l'angoisse et la terreur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Celle qui avait mis au monde sept fils dépérit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle rend l'âme.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son soleil se couche alors que c'est encore le jour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle est couverte de honte et humiliée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quant à leurs survivants, je les livre à l'épée devant leurs ennemis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l'Eternel.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Souffrance et plainte de Jérémie
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: «Malheur à moi, ma mère, de ce que tu m'as donné naissance!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis un homme à qui l'on cherche dispute et querelle dans tout le pays!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je n'emprunte ni ne prête rien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et cependant tous me maudissent.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L''Eternel a dit: «C''est certain, je te libérerai pour ton bonheur,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'amènerai l'ennemi à ta rencontre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au moment du malheur et de la détresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le fer peut-il être inefficace, le fer qui vient du nord et le bronze?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je livrerai gratuitement au pillage tes biens et tes trésors
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de tous les péchés que tu as commis sur tout ton territoire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je te rendrai esclave de tes ennemis dans un pays que tu ne connais pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car le feu de ma colère s'est allumé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il brûle contre vous.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: «Toi, tu sais tout, Eternel! Souviens-toi de moi, interviens en ma faveur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: venge-moi de mes persécuteurs!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que je ne sois pas victime de ta grande patience envers eux!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sache-le, c'est à cause de toi que je supporte le mépris.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tes paroles se sont présentées à moi, et je les ai dévorées.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ta parole a provoqué mon allégresse, elle a fait la joie de mon cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je suis appelé de ton nom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, Dieu de l'univers!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: »Je ne suis pas resté en compagnie de ceux qui s'amusent pour y prendre mon plaisir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Devant ta main je me suis assis solitaire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu m'avais rempli d'indignation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Pourquoi ma souffrance est-elle continuelle?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi ma plaie est-elle incurable, pourquoi refuse-t-elle de guérir?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Finirais-tu par devenir pour moi comme une source trompeuse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme une eau dont il faut se méfier?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'C''est pourquoi, voici ce qu''a dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Si tu reviens à moi, je te ferai revenir
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu te tiendras devant moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si tu sépares ce qui est précieux de ce qui est sans valeur, tu seras comme ma bouche.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est à eux de revenir vers toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce n'est pas à toi de revenir vers eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Je ferai de toi un mur de bronze inébranlable pour ce peuple.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils te feront la guerre, mais ils ne l'emporteront pas sur toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je serai moi-même avec toi pour te sauver et te délivrer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Je te délivrerai des hommes mauvais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je te libérerai des hommes violents.»
