document_id: NUM.36
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Complément à la loi sur l'héritage
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les chefs de famille des clans issus de Galaad, fils de Makir et petit-fils de Manassé, qui faisaient partie des clans des descendants de Joseph, s''approchèrent et parlèrent devant Moïse et devant les princes, les chefs de famille des Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ils dirent: «L''Eternel t''a ordonné, seigneur, de donner par tirage au sort le pays en héritage aux Israélites. Seigneur, tu as aussi reçu de l''Eternel l''ordre de donner l''héritage de Tselophchad, notre frère, à ses filles. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Cependant, si elles se marient à un membre d''une autre tribu des Israélites, leur héritage sera retiré de l''héritage de nos ancêtres et ajouté à celui de la tribu à laquelle elles appartiendront. Ainsi l''héritage qui nous est attribué par tirage au sort sera diminué. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Et quand viendra le moment du jubilé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jubilé: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'année synonyme de proclamation de la liberté et de recouvrement des propriétés vendues, tous les 50 ans (voir '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lévitique 25.8-17
      metadata:
        usfm: LEV.25.8+LEV.25.9+LEV.25.10+LEV.25.11+LEV.25.12+LEV.25.13+LEV.25.14+LEV.25.15+LEV.25.16+LEV.25.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 27.16-24
      metadata:
        usfm: LEV.27.16+LEV.27.17+LEV.27.18+LEV.27.19+LEV.27.20+LEV.27.21+LEV.27.22+LEV.27.23+LEV.27.24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' pour les Israélites, leur héritage sera ajouté à celui de la tribu à laquelle elles appartiendront et il sera retiré de celui de la tribu de nos ancêtres.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Sur l''ordre de l''Eternel, Moïse transmit aux Israélites les instructions suivantes: «La tribu des descendants de Joseph a raison. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Voici ce que l''Eternel ordonne au sujet des filles de Tselophchad: elles pourront se marier à qui elles voudront, pourvu que ce soit dans un clan de la tribu de leur père. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Aucun héritage parmi les Israélites ne passera d''une tribu à une autre; au contraire, les Israélites s''attacheront chacun à l''héritage de la tribu de ses ancêtres. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et toute fille qui posséderait un héritage dans les tribus des Israélites se mariera à un membre d''un clan de la tribu de son père, afin que les Israélites possèdent chacun l''héritage de leurs ancêtres. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Aucun héritage ne passera d'une tribu à une autre; les tribus des Israélites s'attacheront chacune à son héritage.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les filles de Tselophchad se conformèrent à l''ordre que l''Eternel avait donné à Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Machla, Thirtsa, Hogla, Milca et Noa, filles de Tselophchad, épousèrent les fils de leurs oncles. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Elles se marièrent dans les clans des descendants de Manassé, fils de Joseph, et leur héritage resta dans la tribu à laquelle appartenait le clan de leur père.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tels sont les commandements et les règles que l'Eternel donna aux Israélites par l'intermédiaire de Moïse dans les plaines de Moab, près du Jourdain, vis-à-vis de Jéricho.
