document_id: NUM.36,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Complément à la loi sur l'héritage
  - type: text
    content: 'Les chefs de famille des clans issus de Galaad, fils de Makir et petit-fils de Manassé, qui faisaient partie des clans des descendants de Joseph, s''approchèrent et parlèrent devant Moïse et devant les princes, les chefs de famille des Israélites. '
  '10':
  - type: text
    content: 'Les filles de Tselophchad se conformèrent à l''ordre que l''Eternel avait donné à Moïse. '
  '11':
  - type: text
    content: 'Machla, Thirtsa, Hogla, Milca et Noa, filles de Tselophchad, épousèrent les fils de leurs oncles. '
  '12':
  - type: text
    content: Elles se marièrent dans les clans des descendants de Manassé, fils de Joseph, et leur héritage resta dans la tribu à laquelle appartenait le clan de leur père.
  '13':
  - type: text
    content: Tels sont les commandements et les règles que l'Eternel donna aux Israélites par l'intermédiaire de Moïse dans les plaines de Moab, près du Jourdain, vis-à-vis de Jéricho.
  '2':
  - type: text
    content: 'Ils dirent: «L''Eternel t''a ordonné, seigneur, de donner par tirage au sort le pays en héritage aux Israélites. Seigneur, tu as aussi reçu de l''Eternel l''ordre de donner l''héritage de Tselophchad, notre frère, à ses filles. '
  '3':
  - type: text
    content: 'Cependant, si elles se marient à un membre d''une autre tribu des Israélites, leur héritage sera retiré de l''héritage de nos ancêtres et ajouté à celui de la tribu à laquelle elles appartiendront. Ainsi l''héritage qui nous est attribué par tirage au sort sera diminué. '
  '4':
  - type: text
    content: Et quand viendra le moment du jubilé
  - type: note
    content: 'Jubilé: année synonyme de proclamation de la liberté et de recouvrement des propriétés vendues, tous les 50 ans (voir Lévitique 25.8-17; 27.16-24).'
  - type: text
    content: ' pour les Israélites, leur héritage sera ajouté à celui de la tribu à laquelle elles appartiendront et il sera retiré de celui de la tribu de nos ancêtres.»'
  '5':
  - type: text
    content: 'Sur l''ordre de l''Eternel, Moïse transmit aux Israélites les instructions suivantes: «La tribu des descendants de Joseph a raison. '
  '6':
  - type: text
    content: 'Voici ce que l''Eternel ordonne au sujet des filles de Tselophchad: elles pourront se marier à qui elles voudront, pourvu que ce soit dans un clan de la tribu de leur père. '
  '7':
  - type: text
    content: 'Aucun héritage parmi les Israélites ne passera d''une tribu à une autre; au contraire, les Israélites s''attacheront chacun à l''héritage de la tribu de ses ancêtres. '
  '8':
  - type: text
    content: 'Et toute fille qui posséderait un héritage dans les tribus des Israélites se mariera à un membre d''un clan de la tribu de son père, afin que les Israélites possèdent chacun l''héritage de leurs ancêtres. '
  '9':
  - type: text
    content: Aucun héritage ne passera d'une tribu à une autre; les tribus des Israélites s'attacheront chacune à son héritage.»
