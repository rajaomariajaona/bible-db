document_id: 2CH.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Construction du temple
  - type: text
    content: 'Salomon commença à construire la maison de l''Eternel à Jérusalem, sur le mont Morija, où il était apparu à David, son père. David y avait préparé un emplacement sur l''aire de battage d''Ornan, le Jébusien. '
  '10':
  - type: text
    content: 'Il fit dans la salle du lieu très saint deux chérubins sculptés et on les couvrit d''or. '
  '11':
  - type: text
    content: 'Les ailes des chérubins couvraient une longueur de 10 mètres. L''aile du premier, longue de 2 mètres et demi, touchait un mur du temple et l''autre aile, longue de 2 mètres et demi, touchait l''aile du second chérubin. '
  '12':
  - type: text
    content: 'L''aile du second chérubin, longue de 2 mètres et demi, touchait un mur du temple et l''autre aile, longue de 2 mètres et demi, rejoignait l''aile du premier chérubin. '
  '13':
  - type: text
    content: Les ailes de ces chérubins étaient ainsi déployées sur 10 mètres. Ils étaient debout sur leurs pieds, le visage tourné vers l'intérieur.
  '14':
  - type: text
    content: Il fabriqua le voile bleu, pourpre et cramoisi en fin lin et il y représenta des chérubins.
  '15':
  - type: text
    content: 'Il fit devant la maison deux colonnes de 17 mètres et demi de haut, avec un chapiteau de 2 mètres et demi sur leur sommet. '
  '16':
  - type: text
    content: 'Il fit des chaînettes pareilles à celles qui étaient dans le sanctuaire et les plaça sur le sommet des colonnes, et il fit 100 grenades qu''il attacha aux chaînettes. '
  '17':
  - type: text
    content: Il dressa les colonnes devant le temple, l'une à droite et l'autre à gauche; il appela celle de droite Jakin, et celle de gauche Boaz.
  '2':
  - type: text
    content: Il commença la construction le [deuxième jour du] deuxième mois de la quatrième année de son règne.
  '3':
  - type: text
    content: 'Voici sur quelles bases Salomon construisit la maison de Dieu. Calculée en anciennes unités de mesure, sa longueur était de 30 mètres, et sa largeur de 10. '
  '4':
  - type: text
    content: Le portique situé devant avait 10 mètres de long, correspondant à la largeur du temple, et 60 de haut. Salomon le couvrit intérieurement d'or pur.
  '5':
  - type: text
    content: 'Il revêtit de cyprès la grande salle, la couvrit d''or pur et y fit sculpter des palmes et des chaînettes. '
  '6':
  - type: text
    content: 'Il couvrit cette salle de pierres précieuses en guise d''ornement. L''or utilisé était de l''or de Parvaïm. '
  '7':
  - type: text
    content: Il couvrit d'or le bâtiment, les poutres, les seuils, les parois et les battants des portes, et il fit sculpter des chérubins sur les parois.
  '8':
  - type: text
    content: 'Il fit la salle du lieu très saint; elle avait 10 mètres de long correspondant à la largeur du temple, et 10 de large. Il utilisa 18 tonnes d''or pur pour la couvrir, '
  '9':
  - type: text
    content: et le poids des clous, en or, était de près de 600 grammes. Il couvrit aussi d'or les chambres à l'étage.
