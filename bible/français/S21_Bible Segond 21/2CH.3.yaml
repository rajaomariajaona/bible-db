document_id: 2CH.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Construction du temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Salomon commença à construire la maison de l''Eternel à Jérusalem, sur le mont Morija, où il était apparu à David, son père. David y avait préparé un emplacement sur l''aire de battage d''Ornan, le Jébusien. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il commença la construction le [deuxième jour du] deuxième mois de la quatrième année de son règne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Voici sur quelles bases Salomon construisit la maison de Dieu. Calculée en anciennes unités de mesure, sa longueur était de 30 mètres, et sa largeur de 10. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Le portique situé devant avait 10 mètres de long, correspondant à la largeur du temple, et 60 de haut. Salomon le couvrit intérieurement d'or pur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il revêtit de cyprès la grande salle, la couvrit d''or pur et y fit sculpter des palmes et des chaînettes. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il couvrit cette salle de pierres précieuses en guise d''ornement. L''or utilisé était de l''or de Parvaïm. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il couvrit d'or le bâtiment, les poutres, les seuils, les parois et les battants des portes, et il fit sculpter des chérubins sur les parois.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il fit la salle du lieu très saint; elle avait 10 mètres de long correspondant à la largeur du temple, et 10 de large. Il utilisa 18 tonnes d''or pur pour la couvrir, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: et le poids des clous, en or, était de près de 600 grammes. Il couvrit aussi d'or les chambres à l'étage.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il fit dans la salle du lieu très saint deux chérubins sculptés et on les couvrit d''or. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les ailes des chérubins couvraient une longueur de 10 mètres. L''aile du premier, longue de 2 mètres et demi, touchait un mur du temple et l''autre aile, longue de 2 mètres et demi, touchait l''aile du second chérubin. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L''aile du second chérubin, longue de 2 mètres et demi, touchait un mur du temple et l''autre aile, longue de 2 mètres et demi, rejoignait l''aile du premier chérubin. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Les ailes de ces chérubins étaient ainsi déployées sur 10 mètres. Ils étaient debout sur leurs pieds, le visage tourné vers l'intérieur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il fabriqua le voile bleu, pourpre et cramoisi en fin lin et il y représenta des chérubins.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il fit devant la maison deux colonnes de 17 mètres et demi de haut, avec un chapiteau de 2 mètres et demi sur leur sommet. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il fit des chaînettes pareilles à celles qui étaient dans le sanctuaire et les plaça sur le sommet des colonnes, et il fit 100 grenades qu''il attacha aux chaînettes. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il dressa les colonnes devant le temple, l'une à droite et l'autre à gauche; il appela celle de droite Jakin, et celle de gauche Boaz.
