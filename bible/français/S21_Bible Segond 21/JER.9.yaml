document_id: JER.9,152
type_code: fra
verses:
  '1':
  - type: text
    content: «Si seulement j'avais dans le désert un campement de nomades!
  - type: text
    content: Je pourrais abandonner mon peuple, je pourrais m'en éloigner.
  - type: text
    content: En effet, ce sont tous des adultères,
  - type: text
    content: une bande de traîtres.
  '10':
  - type: text
    content: «Je ferai de Jérusalem un tas de ruines, un repaire de chacals,
  - type: text
    content: et je ferai des villes de Juda un désert dépourvu de toute animation.»
  '11':
  - type: text
    content: «Qui est un homme sage?
  - type: text
    content: Qu'il cherche à comprendre ce qui arrive!
  - type: text
    content: Qu'il annonce ce que la bouche de l'Eternel lui aura dit!
  - type: text
    content: Pourquoi le pays est-il détruit,
  - type: text
    content: brûlé comme un désert où personne ne passe?»
  '12':
  - type: text
    content: 'L''Eternel dit: «C''est parce qu''ils ont abandonné ma loi,'
  - type: text
    content: celle que j'avais mise devant eux,
  - type: text
    content: parce qu'ils ne m'ont pas écouté
  - type: text
    content: et ne l'ont pas suivie.
  '13':
  - type: text
    content: Au contraire, ils ont suivi les penchants de leur cœur,
  - type: text
    content: ils ont suivi les Baals,
  - type: text
    content: comme leurs pères le leur ont appris.
  '14':
  - type: text
    content: 'C''est pourquoi, voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël:'
  - type: text
    content: Je vais faire avaler de l'absinthe à ce peuple
  - type: text
    content: et je lui ferai boire de l'eau empoisonnée.
  '15':
  - type: text
    content: Je les disperserai parmi des nations
  - type: text
    content: inconnues d'eux aussi bien que de leurs ancêtres.
  - type: text
    content: J'enverrai l'épée à leur poursuite,
  - type: text
    content: jusqu'à leur extermination.
  '16':
  - type: text
    content: '»Voici ce que dit l''Eternel, le maître de l''univers:'
  - type: text
    content: Comprenez ce qui se passe, appelez les pleureuses et qu'elles viennent!
  - type: text
    content: Envoyez chercher des femmes expérimentées et qu'elles viennent!»
  '17':
  - type: text
    content: «Qu'elles se dépêchent de se lamenter sur nous!
  - type: text
    content: Que nos yeux versent des larmes
  - type: text
    content: et que de nos paupières coule de l'eau!
  '18':
  - type: text
    content: 'En effet, le cri d''une lamentation se fait entendre de Sion:'
  - type: text
    content: ‘Ah! nous voici décimés,
  - type: text
    content: nous sommes couverts de honte
  - type: text
    content: parce que nous avons abandonné le pays,
  - type: text
    content: parce qu'ils ont démoli nos habitations!’
  '19':
  - type: text
    content: »Oui, femmes, écoutez la parole de l'Eternel!
  - type: text
    content: Que votre oreille fasse bon accueil à la parole qui sort de sa bouche!
  - type: text
    content: Enseignez à vos filles à se lamenter,
  - type: text
    content: 'enseignez-vous des complaintes les unes aux autres:'
  '2':
  - type: text
    content: Ils ont la langue tendue comme un arc et lancent le mensonge.
  - type: text
    content: Ce n'est pas grâce à la vérité qu'ils sont puissants dans le pays,
  - type: text
    content: car ils commettent mal sur mal,
  - type: text
    content: et moi, ils ne me connaissent pas, déclare l'Eternel.
  '20':
  - type: text
    content: ‘Oui, la mort est montée par nos fenêtres,
  - type: text
    content: elle a pénétré dans nos palais,
  - type: text
    content: elle fauche les enfants dans la rue,
  - type: text
    content: les jeunes gens sur les places.’»
  '21':
  - type: text
    content: '«Annonce: ‘Voici ce que déclare l''Eternel:'
  - type: text
    content: Les cadavres des hommes tomberont
  - type: text
    content: comme du fumier sur les champs,
  - type: text
    content: comme des épis qui tombent derrière le moissonneur
  - type: text
    content: et que personne ne ramasse.’
  '22':
  - type: text
    content: '»Voici ce que dit l''Eternel:'
  - type: text
    content: Que le sage ne se montre pas fier de sa sagesse,
  - type: text
    content: que le fort ne se montre pas fier de sa force,
  - type: text
    content: que le riche ne se montre pas fier de sa richesse,
  '23':
  - type: text
    content: 'mais *que celui qui veut éprouver de la fierté mette sa fierté dans ceci:'
  - type: text
    content: le fait d'avoir du discernement et de me connaître
  - type: note
    content: 'Que celui… connaître: cité avec une légère modification en 1 Corinthiens 1.31; 2 Corinthiens 10.17.'
  - type: text
    content: .
  - type: text
    content: En effet, c'est moi, l'Eternel,
  - type: text
    content: qui exerce la bonté, le droit et la justice sur la terre.
  - type: text
    content: Oui, c'est cela qui me fait plaisir, déclare l'Eternel.
  '24':
  - type: text
    content: »Voici que les jours viennent, dit l'Eternel,
  - type: text
    content: 'où j''interviendrai contre tous les faux circoncis:'
  '25':
  - type: text
    content: l'Egypte, Juda, Edom, les Ammonites, Moab,
  - type: text
    content: tous ceux qui se rasent les coins de la barbe
  - type: text
    content: et qui habitent dans le désert.
  - type: text
    content: En effet, toutes les nations sont incirconcises,
  - type: text
    content: et la communauté d'Israël tout entière a le cœur incirconcis.»
  '3':
  - type: text
    content: »Que chacun se méfie de son ami!
  - type: text
    content: Ne faites pas confiance à vos frères!
  - type: text
    content: En effet, aucun frère n'hésite à tromper
  - type: text
    content: et tout ami propage des calomnies.
  '4':
  - type: text
    content: Chacun trompe son ami,
  - type: text
    content: ils ne disent pas la vérité.
  - type: text
    content: Ils exercent leur langue à mentir,
  - type: text
    content: ils se fatiguent à faire le mal.
  '5':
  - type: text
    content: Ta maison se trouve là où la trahison a son quartier général.
  - type: text
    content: C'est par trahison qu'ils refusent de me connaître,
  - type: text
    content: déclare l'Eternel.
  '6':
  - type: text
    content: '»C''est pourquoi, voici ce que dit l''Eternel, le maître de l''univers:'
  - type: text
    content: Je vais les fondre, je vais les mettre à l'épreuve.
  - type: text
    content: En effet, comment agir vis-à-vis de la fille de mon peuple?
  '7':
  - type: text
    content: Leur langue est une flèche meurtrière,
  - type: text
    content: ils ne parlent que pour trahir.
  - type: text
    content: De la bouche ils disent que tout va bien à leur prochain,
  - type: text
    content: mais intérieurement ils lui tendent un piège.
  '8':
  - type: text
    content: N'interviendrai-je pas contre un tel comportement, déclare l'Eternel,
  - type: text
    content: ne me vengerai-je pas d'une pareille nation?»
  '9':
  - type: text
    content: «Sur les montagnes je fais entendre mes pleurs et mes gémissements,
  - type: text
    content: sur les plaines du désert je prononce une complainte,
  - type: text
    content: car elles sont brûlées, plus personne n'y passe
  - type: text
    content: . On n'y entend plus le bruit que font les troupeaux;
  - type: text
    content: tant les oiseaux que les bêtes sauvages ont pris la fuite,
  - type: text
    content: ils ont disparu.»
