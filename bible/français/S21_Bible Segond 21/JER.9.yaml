document_id: JER.9,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Si seulement j'avais dans le désert un campement de nomades!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je pourrais abandonner mon peuple, je pourrais m'en éloigner.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, ce sont tous des adultères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une bande de traîtres.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Je ferai de Jérusalem un tas de ruines, un repaire de chacals,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je ferai des villes de Juda un désert dépourvu de toute animation.»
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Qui est un homme sage?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'il cherche à comprendre ce qui arrive!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'il annonce ce que la bouche de l'Eternel lui aura dit!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi le pays est-il détruit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: brûlé comme un désert où personne ne passe?»
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L''Eternel dit: «C''est parce qu''ils ont abandonné ma loi,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celle que j'avais mise devant eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu'ils ne m'ont pas écouté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne l'ont pas suivie.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au contraire, ils ont suivi les penchants de leur cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont suivi les Baals,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme leurs pères le leur ont appris.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C''est pourquoi, voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais faire avaler de l'absinthe à ce peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je lui ferai boire de l'eau empoisonnée.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les disperserai parmi des nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: inconnues d'eux aussi bien que de leurs ancêtres.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'enverrai l'épée à leur poursuite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu'à leur extermination.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»Voici ce que dit l''Eternel, le maître de l''univers:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comprenez ce qui se passe, appelez les pleureuses et qu'elles viennent!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Envoyez chercher des femmes expérimentées et qu'elles viennent!»
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Qu'elles se dépêchent de se lamenter sur nous!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que nos yeux versent des larmes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que de nos paupières coule de l'eau!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'En effet, le cri d''une lamentation se fait entendre de Sion:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Ah! nous voici décimés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous sommes couverts de honte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce que nous avons abandonné le pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu'ils ont démoli nos habitations!’
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Oui, femmes, écoutez la parole de l'Eternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que votre oreille fasse bon accueil à la parole qui sort de sa bouche!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enseignez à vos filles à se lamenter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'enseignez-vous des complaintes les unes aux autres:'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont la langue tendue comme un arc et lancent le mensonge.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce n'est pas grâce à la vérité qu'ils sont puissants dans le pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils commettent mal sur mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et moi, ils ne me connaissent pas, déclare l'Eternel.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Oui, la mort est montée par nos fenêtres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle a pénétré dans nos palais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle fauche les enfants dans la rue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les jeunes gens sur les places.’»
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '«Annonce: ‘Voici ce que déclare l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les cadavres des hommes tomberont
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme du fumier sur les champs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme des épis qui tombent derrière le moissonneur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que personne ne ramasse.’
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»Voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le sage ne se montre pas fier de sa sagesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que le fort ne se montre pas fier de sa force,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que le riche ne se montre pas fier de sa richesse,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'mais *que celui qui veut éprouver de la fierté mette sa fierté dans ceci:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le fait d'avoir du discernement et de me connaître
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Que celui… connaître: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité avec une légère modification en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Corinthiens 1.31
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Corinthiens 10.17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, c'est moi, l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui exerce la bonté, le droit et la justice sur la terre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, c'est cela qui me fait plaisir, déclare l'Eternel.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Voici que les jours viennent, dit l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'où j''interviendrai contre tous les faux circoncis:'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'Egypte, Juda, Edom, les Ammonites, Moab,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous ceux qui se rasent les coins de la barbe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui habitent dans le désert.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, toutes les nations sont incirconcises,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la communauté d'Israël tout entière a le cœur incirconcis.»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Que chacun se méfie de son ami!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne faites pas confiance à vos frères!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, aucun frère n'hésite à tromper
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tout ami propage des calomnies.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chacun trompe son ami,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne disent pas la vérité.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils exercent leur langue à mentir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se fatiguent à faire le mal.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta maison se trouve là où la trahison a son quartier général.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est par trahison qu'ils refusent de me connaître,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l'Eternel.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»C''est pourquoi, voici ce que dit l''Eternel, le maître de l''univers:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais les fondre, je vais les mettre à l'épreuve.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, comment agir vis-à-vis de la fille de mon peuple?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur langue est une flèche meurtrière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne parlent que pour trahir.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De la bouche ils disent que tout va bien à leur prochain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais intérieurement ils lui tendent un piège.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N'interviendrai-je pas contre un tel comportement, déclare l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne me vengerai-je pas d'une pareille nation?»
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Sur les montagnes je fais entendre mes pleurs et mes gémissements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur les plaines du désert je prononce une complainte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car elles sont brûlées, plus personne n'y passe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: . On n'y entend plus le bruit que font les troupeaux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tant les oiseaux que les bêtes sauvages ont pris la fuite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont disparu.»
