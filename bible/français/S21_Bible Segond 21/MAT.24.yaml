document_id: MAT.24
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Discours sur le mont des Oliviers
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 24.1–25.46
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Destruction de Jérusalem et retour du Fils de l'homme
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus sortit du temple et, comme il s''en allait, ses disciples s''approchèrent pour lui en faire remarquer les constructions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mais il leur dit: «Vous voyez tout cela? Je vous le dis en vérité, il ne restera pas ici pierre sur pierre, tout sera détruit.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il s''assit sur le mont des Oliviers. Les disciples vinrent en privé lui poser cette question: «Dis-nous, quand cela arrivera-t-il et quel sera le signe de ton retour et de la fin du monde?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jésus leur répondit: «Faites bien attention que personne ne vous égare. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'En effet, beaucoup viendront sous mon nom et diront: ‘C''est moi qui suis le Messie’, et ils tromperont beaucoup de gens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Vous entendrez parler de guerres et de menaces de guerres: ne vous laissez pas effrayer, car il faut que toutes ces choses arrivent. Cependant, ce ne sera pas encore la fin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Une nation se dressera contre une nation et un royaume contre un royaume
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Une nation… royaume: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'renvoi à '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 19.2
      metadata:
        usfm: ISA.19.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', et il y aura en divers endroits des famines, [des pestes] et des tremblements de terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tout cela sera le commencement des douleurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors on vous livrera à la persécution et l''on vous fera mourir; vous serez détestés de toutes les nations à cause de mon nom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Beaucoup trébucheront alors, et ils se trahiront, se détesteront les uns les autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Beaucoup de prétendus prophètes surgiront et ils tromperont beaucoup de gens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'A cause de la progression du mal, l''amour du plus grand nombre se refroidira, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'mais celui qui persévérera jusqu''à la fin sera sauvé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Cette bonne nouvelle du royaume sera proclamée dans le monde entier pour servir de témoignage à toutes les nations. Alors viendra la fin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: »C'est pourquoi, lorsque vous verrez l'abominable dévastation
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''abominable dévastation: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'littéralement l''abomination de la dévastation, expression reprise de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Daniel 11.31
      metadata:
        usfm: DAN.11.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12.11'
      metadata:
        usfm: DAN.12.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' dont a parlé le prophète Daniel établie dans le lieu saint – que celui qui lit fasse attention! – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'alors, que ceux qui seront en Judée s''enfuient dans les montagnes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'que celui qui sera sur le toit ne descende pas pour prendre ce qui est dans sa maison, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'et que celui qui sera dans les champs ne retourne pas en arrière pour prendre son manteau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Malheur aux femmes qui seront enceintes et à celles qui allaiteront durant ces jours-là! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Priez pour que votre fuite n''arrive pas en hiver, ni un jour de sabbat, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'car '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: alors la détresse sera si grande qu'il n'y en a pas eu de pareille depuis le commencement du monde jusqu'à présent
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Alors… présent: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Daniel 12.1
      metadata:
        usfm: DAN.12.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et qu''il n''y en aura jamais plus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Et si ces jours n''étaient pas abrégés, personne ne serait sauvé; mais à cause de ceux qui ont été choisis, ces jours seront abrégés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Si quelqu''un vous dit alors: ‘Le Messie est ici’, ou: ‘Il est là’, ne le croyez pas, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'car de prétendus messies et de prétendus prophètes surgiront; ils feront de grands prodiges et des signes miraculeux au point de tromper, si c''était possible, même ceux qui ont été choisis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Voilà, je vous l''ai annoncé d''avance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Si donc on vous dit: ‘Le voici, il est dans le désert’, n''y allez pas, ou: ‘Le voilà, il est dans un lieu secret’, ne le croyez pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'En effet, tout comme l''éclair part de l''est et apparaît jusqu''à l''ouest, ainsi sera le retour du Fils de l''homme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Là où sera le cadavre, là se rassembleront les vautours
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Là où… vautours: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 39.30
      metadata:
        usfm: JOB.39.30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '»Aussitôt après ces jours de détresse, '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: le soleil s'obscurcira, la lune ne donnera plus sa lumière, les étoiles tomberont du ciel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le soleil… ciel: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation combinée d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 13.10
      metadata:
        usfm: ISA.13.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' et '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 34.4
      metadata:
        usfm: ISA.34.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et les puissances célestes seront ébranlées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Alors le signe du Fils de l''homme apparaîtra dans le ciel; tous les peuples de la terre se lamenteront et ils verront '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: le Fils de l'homme venir sur les nuées du ciel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le Fils… du ciel: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Daniel 7.13
      metadata:
        usfm: DAN.7.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' avec beaucoup de puissance et de gloire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Il enverra ses anges avec la trompette retentissante et ils rassembleront ceux qu''il a choisis des quatre coins du monde, d''une extrémité du ciel à l''autre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tirez instruction de la parabole du figuier: dès que ses branches deviennent tendres et que les feuilles poussent, vous savez que l''été est proche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'De même, quand vous verrez toutes ces choses, sachez que le Fils de l''homme est proche, qu''il est à la porte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Je vous le dis en vérité, cette génération ne passera pas avant que tout cela n''arrive. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Le ciel et la terre disparaîtront, mais mes paroles ne disparaîtront pas.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Appel à la vigilance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: '»Quant au jour et à l''heure, personne ne les connaît, pas même les anges du ciel, [ni même le Fils]: mon Père seul les connaît. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ce qui est arrivé à l''époque de Noé arrivera de même au retour du Fils de l''homme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'En effet, dans les jours précédant le déluge, les hommes mangeaient et buvaient, se mariaient et mariaient leurs enfants, jusqu''au jour où Noé est entré dans l''arche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ils ne se sont doutés de rien jusqu''à ce que le déluge vienne et les emporte tous. Il en ira de même au retour du Fils de l''homme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Alors, deux hommes seront dans un champ: l''un sera pris et l''autre laissé; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'deux femmes moudront à la meule: l''une sera prise et l''autre laissée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Restez donc vigilants, puisque vous ignorez à quel moment votre Seigneur viendra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Vous le savez bien, si le maître de la maison savait à quelle heure de la nuit le voleur doit venir, il resterait éveillé et ne laisserait pas percer les murs de sa maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: C'est pourquoi, vous aussi, tenez-vous prêts, car le Fils de l'homme viendra à l'heure où vous n'y penserez pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: '»Quel est donc le serviteur fidèle et prudent que son maître a établi responsable des gens de sa maison pour leur donner la nourriture en temps voulu? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Heureux le serviteur que son maître, à son arrivée, trouvera occupé à son travail! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Je vous le dis en vérité, il l''établira responsable de tous ses biens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Mais si c''est un mauvais serviteur, qui se dit en lui-même: ‘Mon maître tarde à venir’, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 's''il se met à battre ses compagnons, s''il mange et boit avec les ivrognes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'le maître de ce serviteur viendra le jour où il ne s''y attend pas et à l''heure qu''il ne connaît pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Il le punira sévèrement et lui fera partager le sort des hypocrites: c''est là qu''il y aura des pleurs et des grincements de dents.'
