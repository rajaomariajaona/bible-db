document_id: MAT.24,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Discours sur le mont des Oliviers
  - type: heading
    content: 24.1–25.46
  - type: heading
    content: Destruction de Jérusalem et retour du Fils de l'homme
  - type: text
    content: 'Jésus sortit du temple et, comme il s''en allait, ses disciples s''approchèrent pour lui en faire remarquer les constructions. '
  '10':
  - type: text
    content: 'Beaucoup trébucheront alors, et ils se trahiront, se détesteront les uns les autres. '
  '11':
  - type: text
    content: 'Beaucoup de prétendus prophètes surgiront et ils tromperont beaucoup de gens. '
  '12':
  - type: text
    content: 'A cause de la progression du mal, l''amour du plus grand nombre se refroidira, '
  '13':
  - type: text
    content: 'mais celui qui persévérera jusqu''à la fin sera sauvé. '
  '14':
  - type: text
    content: Cette bonne nouvelle du royaume sera proclamée dans le monde entier pour servir de témoignage à toutes les nations. Alors viendra la fin.
  '15':
  - type: text
    content: »C'est pourquoi, lorsque vous verrez l'abominable dévastation
  - type: note
    content: 'L''abominable dévastation: littéralement l''abomination de la dévastation, expression reprise de Daniel 11.31; 12.11.'
  - type: text
    content: ' dont a parlé le prophète Daniel établie dans le lieu saint – que celui qui lit fasse attention! – '
  '16':
  - type: text
    content: 'alors, que ceux qui seront en Judée s''enfuient dans les montagnes, '
  '17':
  - type: text
    content: 'que celui qui sera sur le toit ne descende pas pour prendre ce qui est dans sa maison, '
  '18':
  - type: text
    content: 'et que celui qui sera dans les champs ne retourne pas en arrière pour prendre son manteau. '
  '19':
  - type: text
    content: 'Malheur aux femmes qui seront enceintes et à celles qui allaiteront durant ces jours-là! '
  '2':
  - type: text
    content: 'Mais il leur dit: «Vous voyez tout cela? Je vous le dis en vérité, il ne restera pas ici pierre sur pierre, tout sera détruit.»'
  '20':
  - type: text
    content: 'Priez pour que votre fuite n''arrive pas en hiver, ni un jour de sabbat, '
  '21':
  - type: text
    content: 'car '
  - type: text
    content: alors la détresse sera si grande qu'il n'y en a pas eu de pareille depuis le commencement du monde jusqu'à présent
  - type: note
    content: 'Alors… présent: citation de Daniel 12.1.'
  - type: text
    content: ' et qu''il n''y en aura jamais plus. '
  '22':
  - type: text
    content: 'Et si ces jours n''étaient pas abrégés, personne ne serait sauvé; mais à cause de ceux qui ont été choisis, ces jours seront abrégés. '
  '23':
  - type: text
    content: 'Si quelqu''un vous dit alors: ‘Le Messie est ici’, ou: ‘Il est là’, ne le croyez pas, '
  '24':
  - type: text
    content: 'car de prétendus messies et de prétendus prophètes surgiront; ils feront de grands prodiges et des signes miraculeux au point de tromper, si c''était possible, même ceux qui ont été choisis. '
  '25':
  - type: text
    content: 'Voilà, je vous l''ai annoncé d''avance. '
  '26':
  - type: text
    content: 'Si donc on vous dit: ‘Le voici, il est dans le désert’, n''y allez pas, ou: ‘Le voilà, il est dans un lieu secret’, ne le croyez pas. '
  '27':
  - type: text
    content: 'En effet, tout comme l''éclair part de l''est et apparaît jusqu''à l''ouest, ainsi sera le retour du Fils de l''homme. '
  '28':
  - type: text
    content: Là où sera le cadavre, là se rassembleront les vautours
  - type: text
    content: .
  - type: note
    content: 'Là où… vautours: citation de Job 39.30.'
  '29':
  - type: text
    content: '»Aussitôt après ces jours de détresse, '
  - type: text
    content: le soleil s'obscurcira, la lune ne donnera plus sa lumière, les étoiles tomberont du ciel
  - type: note
    content: 'Le soleil… ciel: citation combinée d''Esaïe 13.10 et Esaïe 34.4.'
  - type: text
    content: ' et les puissances célestes seront ébranlées. '
  '3':
  - type: text
    content: 'Il s''assit sur le mont des Oliviers. Les disciples vinrent en privé lui poser cette question: «Dis-nous, quand cela arrivera-t-il et quel sera le signe de ton retour et de la fin du monde?»'
  '30':
  - type: text
    content: 'Alors le signe du Fils de l''homme apparaîtra dans le ciel; tous les peuples de la terre se lamenteront et ils verront '
  - type: text
    content: le Fils de l'homme venir sur les nuées du ciel
  - type: note
    content: 'Le Fils… du ciel: citation de Daniel 7.13.'
  - type: text
    content: ' avec beaucoup de puissance et de gloire. '
  '31':
  - type: text
    content: 'Il enverra ses anges avec la trompette retentissante et ils rassembleront ceux qu''il a choisis des quatre coins du monde, d''une extrémité du ciel à l''autre. '
  '32':
  - type: text
    content: 'Tirez instruction de la parabole du figuier: dès que ses branches deviennent tendres et que les feuilles poussent, vous savez que l''été est proche. '
  '33':
  - type: text
    content: 'De même, quand vous verrez toutes ces choses, sachez que le Fils de l''homme est proche, qu''il est à la porte. '
  '34':
  - type: text
    content: 'Je vous le dis en vérité, cette génération ne passera pas avant que tout cela n''arrive. '
  '35':
  - type: text
    content: Le ciel et la terre disparaîtront, mais mes paroles ne disparaîtront pas.
  - type: heading
    content: Appel à la vigilance
  '36':
  - type: text
    content: '»Quant au jour et à l''heure, personne ne les connaît, pas même les anges du ciel, [ni même le Fils]: mon Père seul les connaît. '
  '37':
  - type: text
    content: 'Ce qui est arrivé à l''époque de Noé arrivera de même au retour du Fils de l''homme. '
  '38':
  - type: text
    content: 'En effet, dans les jours précédant le déluge, les hommes mangeaient et buvaient, se mariaient et mariaient leurs enfants, jusqu''au jour où Noé est entré dans l''arche. '
  '39':
  - type: text
    content: 'Ils ne se sont doutés de rien jusqu''à ce que le déluge vienne et les emporte tous. Il en ira de même au retour du Fils de l''homme. '
  '4':
  - type: text
    content: 'Jésus leur répondit: «Faites bien attention que personne ne vous égare. '
  '40':
  - type: text
    content: 'Alors, deux hommes seront dans un champ: l''un sera pris et l''autre laissé; '
  '41':
  - type: text
    content: 'deux femmes moudront à la meule: l''une sera prise et l''autre laissée. '
  '42':
  - type: text
    content: 'Restez donc vigilants, puisque vous ignorez à quel moment votre Seigneur viendra. '
  '43':
  - type: text
    content: 'Vous le savez bien, si le maître de la maison savait à quelle heure de la nuit le voleur doit venir, il resterait éveillé et ne laisserait pas percer les murs de sa maison. '
  '44':
  - type: text
    content: C'est pourquoi, vous aussi, tenez-vous prêts, car le Fils de l'homme viendra à l'heure où vous n'y penserez pas.
  '45':
  - type: text
    content: '»Quel est donc le serviteur fidèle et prudent que son maître a établi responsable des gens de sa maison pour leur donner la nourriture en temps voulu? '
  '46':
  - type: text
    content: 'Heureux le serviteur que son maître, à son arrivée, trouvera occupé à son travail! '
  '47':
  - type: text
    content: 'Je vous le dis en vérité, il l''établira responsable de tous ses biens. '
  '48':
  - type: text
    content: 'Mais si c''est un mauvais serviteur, qui se dit en lui-même: ‘Mon maître tarde à venir’, '
  '49':
  - type: text
    content: 's''il se met à battre ses compagnons, s''il mange et boit avec les ivrognes, '
  '5':
  - type: text
    content: 'En effet, beaucoup viendront sous mon nom et diront: ‘C''est moi qui suis le Messie’, et ils tromperont beaucoup de gens. '
  '50':
  - type: text
    content: 'le maître de ce serviteur viendra le jour où il ne s''y attend pas et à l''heure qu''il ne connaît pas. '
  '51':
  - type: text
    content: 'Il le punira sévèrement et lui fera partager le sort des hypocrites: c''est là qu''il y aura des pleurs et des grincements de dents.'
  '6':
  - type: text
    content: 'Vous entendrez parler de guerres et de menaces de guerres: ne vous laissez pas effrayer, car il faut que toutes ces choses arrivent. Cependant, ce ne sera pas encore la fin. '
  '7':
  - type: text
    content: Une nation se dressera contre une nation et un royaume contre un royaume
  - type: note
    content: 'Une nation… royaume: renvoi à Esaïe 19.2.'
  - type: text
    content: ', et il y aura en divers endroits des famines, [des pestes] et des tremblements de terre. '
  '8':
  - type: text
    content: 'Tout cela sera le commencement des douleurs. '
  '9':
  - type: text
    content: 'Alors on vous livrera à la persécution et l''on vous fera mourir; vous serez détestés de toutes les nations à cause de mon nom. '
