document_id: 1CH.17,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Une maison pour Dieu et pour David
  - type: text
    content: 'Lorsqu''il fut installé dans son palais, David dit au prophète Nathan: «Vois, j''habite dans une maison en cèdre, tandis que l''arche de l''alliance de l''Eternel se trouve sous une tente.» '
  '10':
  - type: text
    content: 'comme à l''époque où j''avais établi des juges sur mon peuple, sur Israël. J''ai humilié tous tes ennemis. De plus, je t''annonce que l''Eternel va te construire lui-même une maison: '
  '11':
  - type: text
    content: 'quand ta vie prendra fin et que tu iras rejoindre tes ancêtres, je ferai surgir après toi ton descendant, issu de tes fils, et j''affermirai son règne. '
  '12':
  - type: text
    content: 'Ce sera lui qui me construira une maison et j''affermirai pour toujours son trône. '
  '13':
  - type: text
    content: '*Je serai pour lui un père et il sera pour moi un fils.'
  - type: note
    content: 'Je serai… fils: cité en 2 Corinthiens 6.18 à propos des chrétiens et en Hébreux 1.5 à propos de Christ.'
  - type: text
    content: ' Je ne lui retirerai pas ma grâce comme je l''ai fait avec ton prédécesseur. '
  '14':
  - type: text
    content: Je l'établirai pour toujours dans ma maison et dans mon royaume, et son trône sera affermi pour toujours.’»
  '15':
  - type: text
    content: 'Nathan rapporta toutes ces paroles et toute cette vision à David. '
  '16':
  - type: text
    content: 'Alors le roi David alla se présenter devant l''Eternel et dit: «Qui suis-je, Eternel Dieu, et qu''est-ce que ma famille, pour que tu m''aies fait parvenir là où je suis? '
  '17':
  - type: text
    content: 'Et c''est trop peu à tes yeux, ô Dieu! Tu parles de la famille de ton serviteur pour un avenir lointain et tu me traites comme si j''étais un homme important, Eternel Dieu! '
  '18':
  - type: text
    content: 'Que pourrait te dire de plus David sur la gloire accordée à ton serviteur? Tu connais ton serviteur. '
  '19':
  - type: text
    content: 'Eternel, c''est à cause de ton serviteur et conformément à tes désirs que tu as accompli toutes ces grandes choses et les lui as révélées. '
  '2':
  - type: text
    content: 'Nathan répondit à David: «Fais tout ce que tu as dans le cœur, car Dieu est avec toi.»'
  '20':
  - type: text
    content: 'Eternel, personne n''est semblable à toi et il n''y a pas d''autre Dieu que toi, d''après tout ce que nous avons entendu. '
  '21':
  - type: text
    content: 'Existe-t-il sur la terre une seule nation qui soit comme ton peuple, Israël? O Dieu, tu es venu le racheter pour faire de lui ton peuple, pour te faire un nom et pour accomplir des miracles et des prodiges, en chassant des nations devant ton peuple, que tu as racheté d''Egypte. '
  '22':
  - type: text
    content: 'Tu as établi ton peuple, Israël, pour qu''il soit ton peuple pour toujours, et toi, Eternel, tu es devenu son Dieu. '
  '23':
  - type: text
    content: 'Maintenant, Eternel, que la parole que tu as prononcée sur ton serviteur et sur sa famille subsiste jusque dans l''éternité, et agis comme tu l''as dit! '
  '24':
  - type: text
    content: 'Qu''elle subsiste, que l''on dise éternellement la grandeur de ton nom en affirmant: ‘L''Eternel, le maître de l''univers, le Dieu d''Israël, est un Dieu pour Israël’ et que la maison de David, ton serviteur, soit affermie devant toi! '
  '25':
  - type: text
    content: 'En effet, c''est toi-même, mon Dieu, qui as révélé à ton serviteur que tu lui construirais une maison. C''est pourquoi ton serviteur a osé prier devant toi. '
  '26':
  - type: text
    content: 'Maintenant, Eternel, c''est toi qui es Dieu, et tu as annoncé ce bienfait à ton serviteur. '
  '27':
  - type: text
    content: Veuille donc bénir la famille de ton serviteur afin qu'elle subsiste éternellement devant toi, car ce que tu bénis, Eternel, est béni pour l'éternité.»
  '3':
  - type: text
    content: 'La nuit suivante, la parole de Dieu fut adressée à Nathan: '
  '4':
  - type: text
    content: '«Va annoncer à mon serviteur David: ‘Voici ce que dit l''Eternel: Ce n''est pas à toi de me construire une maison pour que j''y habite. '
  '5':
  - type: text
    content: 'En effet, je n''ai pas habité dans une maison depuis le jour où j''ai fait sortir Israël d''Egypte jusqu''à aujourd''hui. Je suis passé d''une tente à l''autre, d''un lieu de résidence à l''autre. '
  '6':
  - type: text
    content: 'Partout où j''ai marché avec tout Israël, ai-je une seule fois dit à l''un des juges d''Israël que j''avais désigné pour diriger mon peuple: Pourquoi ne me construisez-vous pas une maison en cèdre?’ '
  '7':
  - type: text
    content: 'Annonce maintenant à mon serviteur David: ‘Voici ce que dit l''Eternel, le maître de l''univers: Je t''ai pris au pâturage, derrière les brebis, pour que tu sois chef sur mon peuple, Israël. '
  '8':
  - type: text
    content: 'J''ai été avec toi partout où tu as marché, j''ai éliminé tous tes ennemis devant toi et j''ai rendu ton nom pareil à celui des grands de la terre. '
  '9':
  - type: text
    content: 'J''ai donné un lieu de résidence à mon peuple, à Israël, et je l''ai planté pour qu''il y soit fixé et ne soit plus agité, pour que les méchants ne le détruisent plus comme par le passé, '
