document_id: 1CH.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Une maison pour Dieu et pour David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsqu''il fut installé dans son palais, David dit au prophète Nathan: «Vois, j''habite dans une maison en cèdre, tandis que l''arche de l''alliance de l''Eternel se trouve sous une tente.» '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nathan répondit à David: «Fais tout ce que tu as dans le cœur, car Dieu est avec toi.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'La nuit suivante, la parole de Dieu fut adressée à Nathan: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '«Va annoncer à mon serviteur David: ‘Voici ce que dit l''Eternel: Ce n''est pas à toi de me construire une maison pour que j''y habite. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'En effet, je n''ai pas habité dans une maison depuis le jour où j''ai fait sortir Israël d''Egypte jusqu''à aujourd''hui. Je suis passé d''une tente à l''autre, d''un lieu de résidence à l''autre. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Partout où j''ai marché avec tout Israël, ai-je une seule fois dit à l''un des juges d''Israël que j''avais désigné pour diriger mon peuple: Pourquoi ne me construisez-vous pas une maison en cèdre?’ '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Annonce maintenant à mon serviteur David: ‘Voici ce que dit l''Eternel, le maître de l''univers: Je t''ai pris au pâturage, derrière les brebis, pour que tu sois chef sur mon peuple, Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'J''ai été avec toi partout où tu as marché, j''ai éliminé tous tes ennemis devant toi et j''ai rendu ton nom pareil à celui des grands de la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'J''ai donné un lieu de résidence à mon peuple, à Israël, et je l''ai planté pour qu''il y soit fixé et ne soit plus agité, pour que les méchants ne le détruisent plus comme par le passé, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'comme à l''époque où j''avais établi des juges sur mon peuple, sur Israël. J''ai humilié tous tes ennemis. De plus, je t''annonce que l''Eternel va te construire lui-même une maison: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'quand ta vie prendra fin et que tu iras rejoindre tes ancêtres, je ferai surgir après toi ton descendant, issu de tes fils, et j''affermirai son règne. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ce sera lui qui me construira une maison et j''affermirai pour toujours son trône. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '*Je serai pour lui un père et il sera pour moi un fils.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je serai… fils: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Corinthiens 6.18
      metadata:
        usfm: 2CO.6.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' à propos des chrétiens et en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hébreux 1.5
      metadata:
        usfm: HEB.1.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' à propos de Christ.'
    marker-yv: yv-n
  - type: text
    text: ' Je ne lui retirerai pas ma grâce comme je l''ai fait avec ton prédécesseur. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je l'établirai pour toujours dans ma maison et dans mon royaume, et son trône sera affermi pour toujours.’»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nathan rapporta toutes ces paroles et toute cette vision à David. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors le roi David alla se présenter devant l''Eternel et dit: «Qui suis-je, Eternel Dieu, et qu''est-ce que ma famille, pour que tu m''aies fait parvenir là où je suis? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et c''est trop peu à tes yeux, ô Dieu! Tu parles de la famille de ton serviteur pour un avenir lointain et tu me traites comme si j''étais un homme important, Eternel Dieu! '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Que pourrait te dire de plus David sur la gloire accordée à ton serviteur? Tu connais ton serviteur. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Eternel, c''est à cause de ton serviteur et conformément à tes désirs que tu as accompli toutes ces grandes choses et les lui as révélées. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Eternel, personne n''est semblable à toi et il n''y a pas d''autre Dieu que toi, d''après tout ce que nous avons entendu. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Existe-t-il sur la terre une seule nation qui soit comme ton peuple, Israël? O Dieu, tu es venu le racheter pour faire de lui ton peuple, pour te faire un nom et pour accomplir des miracles et des prodiges, en chassant des nations devant ton peuple, que tu as racheté d''Egypte. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tu as établi ton peuple, Israël, pour qu''il soit ton peuple pour toujours, et toi, Eternel, tu es devenu son Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Maintenant, Eternel, que la parole que tu as prononcée sur ton serviteur et sur sa famille subsiste jusque dans l''éternité, et agis comme tu l''as dit! '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Qu''elle subsiste, que l''on dise éternellement la grandeur de ton nom en affirmant: ‘L''Eternel, le maître de l''univers, le Dieu d''Israël, est un Dieu pour Israël’ et que la maison de David, ton serviteur, soit affermie devant toi! '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'En effet, c''est toi-même, mon Dieu, qui as révélé à ton serviteur que tu lui construirais une maison. C''est pourquoi ton serviteur a osé prier devant toi. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Maintenant, Eternel, c''est toi qui es Dieu, et tu as annoncé ce bienfait à ton serviteur. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Veuille donc bénir la famille de ton serviteur afin qu'elle subsiste éternellement devant toi, car ce que tu bénis, Eternel, est béni pour l'éternité.»
