document_id: NUM.4,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fonctions des Lévites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel dit à Moïse et à Aaron: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils le mettront avec tous ses ustensiles dans une couverture de peaux de dauphins, puis ils le placeront sur le brancard. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils étendront un drap bleu sur l''autel d''or et l''envelopperont dans une couverture de peaux de dauphins, puis ils placeront les barres de l''autel. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils prendront tous les ustensiles employés pour le service dans le sanctuaire, les mettront dans un drap bleu et les envelopperont dans une couverture de peaux de dauphins, puis ils les placeront sur le brancard. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils retireront les cendres de l''autel et ils étendront sur l''autel un drap pourpre. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils mettront dessus tous les ustensiles destinés à son service: les brûle-parfums, les fourchettes, les pelles, les bassins, tous les ustensiles de l''autel, et ils étendront par-dessus une couverture de peaux de dauphins; puis ils placeront les barres de l''autel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Une fois qu'Aaron et ses fils auront fini de recouvrir le sanctuaire et tous ses ustensiles, les descendants de Kehath viendront pour les porter au moment du départ du camp. Cependant ils ne toucheront pas les choses saintes, sinon ils mourraient. Telle est la charge attribuée aux descendants de Kehath concernant la tente de la rencontre.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Eléazar, le fils du prêtre Aaron, sera chargé de la surveillance de l'huile du chandelier, du parfum odoriférant, de l'offrande perpétuelle et de l'huile d'onction; il sera chargé de la surveillance de tout le tabernacle et de tout ce qu'il contient, du sanctuaire et de ses ustensiles.»
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel dit à Moïse et à Aaron: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«N''exposez pas la branche des clans des Kehathites à être exclue du milieu des Lévites. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Faites ceci pour eux, afin qu''ils vivent et ne meurent pas quand ils s''approcheront du lieu très saint: Aaron et ses fils viendront et placeront chacun d''eux dans son service et dans sa charge. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Parmi les Lévites, compte les descendants de Kehath en fonction de leur clan, de leur famille. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils n'entreront pas pour voir, ne serait-ce qu'un instant, envelopper les choses saintes, sinon ils mourraient.»
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel dit à Moïse: '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Compte aussi les descendants de Guershon en fonction de leur famille, de leur clan. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu feras le dénombrement de tous les hommes âgés de 30 à 50 ans qui sont aptes à exercer une fonction dans la tente de la rencontre.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Voici les fonctions des clans des Guershonites, le service qu''ils devront effectuer et ce qu''ils devront porter. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils porteront les tapis du tabernacle ainsi que la tente de la rencontre, sa couverture et la couverture de peaux de dauphins qui se met par-dessus, le rideau qui est à l''entrée de la tente de la rencontre, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les toiles du parvis et le rideau de l''entrée de la porte du parvis qui entoure le tabernacle et l''autel, leurs cordages et tous les ustensiles qui en dépendent. Ils effectueront tout le service qui s''y rapporte. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans leurs fonctions, les descendants des Guershonites seront sous les ordres d''Aaron et de ses fils pour tout ce qu''ils porteront et pour tout le service qu''ils devront effectuer. Vous leur confierez la responsabilité de tout ce qu''ils ont à porter. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Telles sont les fonctions des clans issus des Guershonites concernant la tente de la rencontre; ils exerceront leur responsabilité sous la direction d'Ithamar, le fils du prêtre Aaron.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Tu feras le dénombrement des descendants de Merari en fonction de leur clan, de leur famille. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Compte les hommes âgés de 30 à 50 ans, tous ceux qui sont aptes à exercer une fonction dans la tente de la rencontre.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu feras le dénombrement de tous les hommes âgés de 30 à 50 ans qui sont aptes à exercer une fonction dans la tente de la rencontre.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Voici ce qu''ils ont la responsabilité de porter, suivant toutes leurs fonctions dans la tente de la rencontre: les planches du tabernacle, ses barres, ses colonnes, ses bases, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les colonnes du parvis qui forment l''enceinte, leurs bases, leurs pieux, leurs cordages, tous les ustensiles qui en dépendent et tout ce qui est destiné à leur service. Vous désignerez par leur nom les objets qu''ils ont la responsabilité de porter. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Telles sont les fonctions des clans issus de Merari, toutes leurs fonctions concernant la tente de la rencontre; ils les exerceront sous la direction d'Ithamar, le fils du prêtre Aaron.»
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse, Aaron et les princes de l''assemblée firent le dénombrement des Kehathites en fonction de leur clan, de leur famille. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils dénombrèrent tous les hommes âgés de 30 à 50 ans qui étaient aptes à exercer une fonction dans la tente de la rencontre. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On dénombra ainsi, en fonction de leur clan, 2750 hommes. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voilà l'effectif des clans des Kehathites, tous ceux qui exerçaient des fonctions dans la tente de la rencontre. Moïse et Aaron firent leur dénombrement conformément à l'ordre que l'Eternel avait donné par l'intermédiaire de Moïse.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On dénombra les descendants de Guershon en fonction de leur clan, de leur famille, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les hommes âgés de 30 à 50 ans, tous ceux qui étaient aptes à exercer une fonction dans la tente de la rencontre. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Voici les fonctions des descendants de Kehath dans la tente de la rencontre: ils seront chargés du lieu très saint.'
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On dénombra ainsi en fonction de leur clan, de leur famille, 2630 hommes. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voilà l'effectif des clans issus de Guershon, tous ceux qui exerçaient des fonctions dans la tente de la rencontre. Moïse et Aaron firent leur dénombrement conformément à l'ordre de l'Eternel.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On dénombra les descendants de Merari en fonction de leur clan, de leur famille, '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les hommes âgés de 30 à 50 ans, tous ceux qui étaient aptes à exercer une fonction dans la tente de la rencontre. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On dénombra ainsi en fonction de leur clan 3200 hommes. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voilà l'effectif des clans issus de Merari. Moïse et Aaron firent leur dénombrement conformément à l'ordre que l'Eternel avait donné par l'intermédiaire de Moïse.
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse, Aaron et les princes d''Israël dénombrèrent les Lévites en fonction de leur clan, de leur famille, '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tous les hommes âgés de 30 à 50 ans qui étaient aptes à exercer une fonction et à servir de porteurs dans la tente de la rencontre. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On dénombra au total 8580 hommes. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On fit leur dénombrement conformément à l'ordre que l'Eternel avait donné par l'intermédiaire de Moïse, en indiquant à chacun le service qu'il devait effectuer et ce qu'il devait porter. On fit leur dénombrement conformément à l'ordre que l'Eternel avait donné à Moïse.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Au moment du départ du camp, Aaron et ses fils viendront démonter le voile et en couvriront l''arche du témoignage. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils mettront dessus une couverture de peaux de dauphins
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dauphins: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ou blaireaux, ou phoques (sens incertain).
      marker-yv: yv-n
    - type: text
      text: ' et ils étendront par-dessus un drap entièrement fait d''étoffe bleue, puis ils placeront les barres du coffre. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils étendront un drap bleu sur la table des pains consacrés et ils mettront dessus les plats, les coupes, les tasses et les gobelets pour les offrandes de produits liquides. Quant au pain, il restera sur la table. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils étendront sur ces éléments un drap cramoisi, qu''ils envelopperont dans une couverture de peaux de dauphins, puis ils placeront les barres de la table. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils prendront un drap bleu et couvriront le chandelier, ses lampes, ses mouchettes, ses vases à cendre et tous les vases à huile destinés à son service. '
