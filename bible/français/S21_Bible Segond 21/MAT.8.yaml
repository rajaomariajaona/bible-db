document_id: MAT.8,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Ministère de Jésus en Galilée
  - type: heading
    content: 8.1–12.50
  - type: heading
    content: Guérison d'un lépreux
  - type: text
    content: 'Lorsque Jésus fut descendu de la montagne, une grande foule le suivit. '
  '10':
  - type: text
    content: 'Après l''avoir entendu, Jésus fut dans l''admiration, et il dit à ceux qui le suivaient: «Je vous le dis en vérité, même en Israël je n''ai pas trouvé une aussi grande foi. '
  '11':
  - type: text
    content: 'Or, je vous le déclare, beaucoup viendront de l''est et de l''ouest et seront à table avec Abraham, Isaac et Jacob dans le royaume des cieux. '
  '12':
  - type: text
    content: 'Mais ceux à qui le royaume était destiné seront jetés dans les ténèbres extérieures, où il y aura des pleurs et des grincements de dents.» '
  '13':
  - type: text
    content: 'Puis Jésus dit à l''officier: «Vas-y [et] sois traité conformément à ta foi.» Et au moment même le serviteur fut guéri.'
  '14':
  - type: text
    content: 'Jésus se rendit ensuite à la maison de Pierre. Il vit la belle-mère de celui-ci couchée, avec de la fièvre. '
  '15':
  - type: text
    content: Il lui toucha la main et la fièvre la quitta; puis elle se leva et le servit.
  '16':
  - type: text
    content: 'Le soir venu, on amena vers Jésus de nombreux démoniaques. Il chassa les esprits par sa parole et guérit tous les malades. '
  '17':
  - type: text
    content: 'Ainsi s''accomplit ce que le prophète Esaïe avait annoncé: '
  - type: text
    content: Il a pris nos faiblesses et il s'est chargé de nos maladies
  - type: text
    content: .
  - type: note
    content: 'Il a pris… maladies: citation d''Esaïe 53.4.'
  - type: heading
    content: Jésus, plus fort que la nature et les démons
  '18':
  - type: text
    content: 'Voyant une grande foule autour de lui, Jésus donna l''ordre de passer de l''autre côté du lac. '
  '19':
  - type: text
    content: 'Un spécialiste de la loi s''approcha et lui dit: «Maître, je te suivrai partout où tu iras.» '
  '2':
  - type: text
    content: 'Alors un lépreux s''approcha, se prosterna devant lui et dit: «Seigneur, si tu le veux, tu peux me rendre pur.» '
  '20':
  - type: text
    content: 'Jésus lui répondit: «Les renards ont des tanières et les oiseaux du ciel ont des nids, mais le Fils de l''homme'
  - type: note
    content: 'Fils de l''homme: expression par laquelle Jésus se désignait fréquemment lui-même, avec un probable renvoi à Daniel 7.13.'
  - type: text
    content: ' n''a pas un endroit où il puisse reposer sa tête.» '
  '21':
  - type: text
    content: 'Un autre, parmi les disciples, lui dit: «Seigneur, permets-moi d''aller d''abord enterrer mon père.» '
  '22':
  - type: text
    content: 'Mais Jésus lui répondit: «Suis-moi et laisse les morts enterrer leurs morts.»'
  '23':
  - type: text
    content: 'Il monta dans la barque et ses disciples le suivirent. '
  '24':
  - type: text
    content: 'Soudain, il s''éleva sur le lac une si grande tempête que la barque était recouverte par les vagues. Et lui, il dormait. '
  '25':
  - type: text
    content: 'Les disciples s''approchèrent et le réveillèrent en disant: «Seigneur, sauve-nous, nous allons mourir!» '
  '26':
  - type: text
    content: 'Il leur dit: «Pourquoi êtes-vous si craintifs, hommes de peu de foi?» Alors il se leva, menaça les vents du lac et il y eut un grand calme. '
  '27':
  - type: text
    content: 'Ces hommes furent très étonnés et dirent: «Quel genre d''homme est-ce? Même les vents et la mer lui obéissent!»'
  '28':
  - type: text
    content: 'Lorsqu''il fut arrivé sur l''autre rive, dans le pays des Gadaréniens, deux démoniaques qui sortaient des tombeaux vinrent à sa rencontre. Ils étaient si dangereux que personne n''osait passer par là. '
  '29':
  - type: text
    content: 'Et voilà qu''ils se mirent à crier: «Que nous veux-tu, [Jésus,] Fils de Dieu? Es-tu venu ici pour nous tourmenter avant le moment fixé?» '
  '3':
  - type: text
    content: 'Jésus tendit la main, le toucha et dit: «Je le veux, sois pur.» Aussitôt il fut purifié de sa lèpre. '
  '30':
  - type: text
    content: 'Il y avait loin d''eux un grand troupeau de porcs en train de chercher à manger. '
  '31':
  - type: text
    content: 'Les démons suppliaient Jésus: «Si tu nous chasses, permets-nous d''aller dans ce troupeau de porcs.» '
  '32':
  - type: text
    content: '«Allez-y!» leur dit-il. Ils sortirent des deux hommes et entrèrent dans les porcs. Alors tout le troupeau se précipita du haut de la falaise dans le lac, et ils moururent dans l''eau. '
  '33':
  - type: text
    content: 'Les gardiens du troupeau s''enfuirent et allèrent dans la ville rapporter tout ce qui s''était passé et ce qui était arrivé aux démoniaques. '
  '34':
  - type: text
    content: Alors tous les habitants de la ville sortirent à la rencontre de Jésus et, dès qu'ils le virent, ils le supplièrent de quitter leur territoire.
  '4':
  - type: text
    content: 'Puis Jésus lui dit: «Fais bien attention de n''en parler à personne, mais va te montrer au prêtre et présente l''offrande que Moïse a prescrite, afin que cela leur serve de témoignage.»'
  - type: heading
    content: Guérisons à Capernaüm
  '5':
  - type: text
    content: 'Alors que Jésus entrait dans Capernaüm, un officier romain l''aborda et le supplia '
  '6':
  - type: text
    content: 'en disant: «Seigneur, mon serviteur est couché à la maison, atteint de paralysie, et il souffre beaucoup.» '
  '7':
  - type: text
    content: 'Jésus lui dit: «J''irai et je le guérirai.» '
  '8':
  - type: text
    content: 'L''officier répondit: «Seigneur, je ne suis pas digne que tu entres sous mon toit, mais dis seulement un mot et mon serviteur sera guéri. '
  '9':
  - type: text
    content: 'En effet, moi aussi je suis un homme soumis à des supérieurs, j''ai des soldats sous mes ordres, et je dis à l''un: ‘Pars!’ et il part, à un autre: ‘Viens!’ et il vient, et à mon esclave: ‘Fais ceci!’ et il le fait.» '
