document_id: MAT.8
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Ministère de Jésus en Galilée
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 8.1–12.50
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guérison d'un lépreux
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque Jésus fut descendu de la montagne, une grande foule le suivit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alors un lépreux s''approcha, se prosterna devant lui et dit: «Seigneur, si tu le veux, tu peux me rendre pur.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jésus tendit la main, le toucha et dit: «Je le veux, sois pur.» Aussitôt il fut purifié de sa lèpre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Puis Jésus lui dit: «Fais bien attention de n''en parler à personne, mais va te montrer au prêtre et présente l''offrande que Moïse a prescrite, afin que cela leur serve de témoignage.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guérisons à Capernaüm
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors que Jésus entrait dans Capernaüm, un officier romain l''aborda et le supplia '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'en disant: «Seigneur, mon serviteur est couché à la maison, atteint de paralysie, et il souffre beaucoup.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jésus lui dit: «J''irai et je le guérirai.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L''officier répondit: «Seigneur, je ne suis pas digne que tu entres sous mon toit, mais dis seulement un mot et mon serviteur sera guéri. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'En effet, moi aussi je suis un homme soumis à des supérieurs, j''ai des soldats sous mes ordres, et je dis à l''un: ‘Pars!’ et il part, à un autre: ‘Viens!’ et il vient, et à mon esclave: ‘Fais ceci!’ et il le fait.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Après l''avoir entendu, Jésus fut dans l''admiration, et il dit à ceux qui le suivaient: «Je vous le dis en vérité, même en Israël je n''ai pas trouvé une aussi grande foi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Or, je vous le déclare, beaucoup viendront de l''est et de l''ouest et seront à table avec Abraham, Isaac et Jacob dans le royaume des cieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais ceux à qui le royaume était destiné seront jetés dans les ténèbres extérieures, où il y aura des pleurs et des grincements de dents.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Puis Jésus dit à l''officier: «Vas-y [et] sois traité conformément à ta foi.» Et au moment même le serviteur fut guéri.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jésus se rendit ensuite à la maison de Pierre. Il vit la belle-mère de celui-ci couchée, avec de la fièvre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il lui toucha la main et la fièvre la quitta; puis elle se leva et le servit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le soir venu, on amena vers Jésus de nombreux démoniaques. Il chassa les esprits par sa parole et guérit tous les malades. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ainsi s''accomplit ce que le prophète Esaïe avait annoncé: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Il a pris nos faiblesses et il s'est chargé de nos maladies
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il a pris… maladies: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 53.4
      metadata:
        usfm: ISA.53.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus, plus fort que la nature et les démons
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Voyant une grande foule autour de lui, Jésus donna l''ordre de passer de l''autre côté du lac. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Un spécialiste de la loi s''approcha et lui dit: «Maître, je te suivrai partout où tu iras.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jésus lui répondit: «Les renards ont des tanières et les oiseaux du ciel ont des nids, mais le Fils de l''homme'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Fils de l''homme: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'expression par laquelle Jésus se désignait fréquemment lui-même, avec un probable renvoi à '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Daniel 7.13
      metadata:
        usfm: DAN.7.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' n''a pas un endroit où il puisse reposer sa tête.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Un autre, parmi les disciples, lui dit: «Seigneur, permets-moi d''aller d''abord enterrer mon père.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais Jésus lui répondit: «Suis-moi et laisse les morts enterrer leurs morts.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Il monta dans la barque et ses disciples le suivirent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Soudain, il s''éleva sur le lac une si grande tempête que la barque était recouverte par les vagues. Et lui, il dormait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Les disciples s''approchèrent et le réveillèrent en disant: «Seigneur, sauve-nous, nous allons mourir!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il leur dit: «Pourquoi êtes-vous si craintifs, hommes de peu de foi?» Alors il se leva, menaça les vents du lac et il y eut un grand calme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ces hommes furent très étonnés et dirent: «Quel genre d''homme est-ce? Même les vents et la mer lui obéissent!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Lorsqu''il fut arrivé sur l''autre rive, dans le pays des Gadaréniens, deux démoniaques qui sortaient des tombeaux vinrent à sa rencontre. Ils étaient si dangereux que personne n''osait passer par là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Et voilà qu''ils se mirent à crier: «Que nous veux-tu, [Jésus,] Fils de Dieu? Es-tu venu ici pour nous tourmenter avant le moment fixé?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Il y avait loin d''eux un grand troupeau de porcs en train de chercher à manger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Les démons suppliaient Jésus: «Si tu nous chasses, permets-nous d''aller dans ce troupeau de porcs.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '«Allez-y!» leur dit-il. Ils sortirent des deux hommes et entrèrent dans les porcs. Alors tout le troupeau se précipita du haut de la falaise dans le lac, et ils moururent dans l''eau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Les gardiens du troupeau s''enfuirent et allèrent dans la ville rapporter tout ce qui s''était passé et ce qui était arrivé aux démoniaques. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Alors tous les habitants de la ville sortirent à la rencontre de Jésus et, dès qu'ils le virent, ils le supplièrent de quitter leur territoire.
