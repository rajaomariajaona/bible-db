document_id: HOS.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Osée et la femme adultère
  - type: text
    content: 'L''Eternel m''a dit: «Va encore aimer une femme aimée d''un amant et adultère! Aime-la comme l''Eternel aime les Israélites, alors qu''eux, ils se tournent vers d''autres dieux et aiment les gâteaux de raisins'
  - type: note
    content: 'Gâteaux de raisins: offerts aux idoles.'
  - type: text
    content: .»
  '2':
  - type: text
    content: 'Je l''ai achetée pour 15 pièces d''argent et 330 litres d''orge. '
  '3':
  - type: text
    content: 'Je lui ai dit: «Tu resteras longtemps à moi, sans te livrer à la prostitution ni appartenir à aucun homme, et j''agirai de même envers toi.»'
  '4':
  - type: text
    content: En effet, les Israélites resteront longtemps sans roi, sans chef, sans sacrifice, sans statue, sans éphod et sans théraphim
  - type: note
    content: 'Ephod… théraphim: objets associés aux cultes idolâtriques.'
  - type: text
    content: '. '
  '5':
  - type: text
    content: Après cela, les Israélites reviendront. Ils rechercheront l'Eternel, leur Dieu, et David, leur roi, et ils retourneront en tremblant vers l'Eternel et vers sa bienveillance, dans l'avenir.
