document_id: HOS.3,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Osée et la femme adultère
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L''Eternel m''a dit: «Va encore aimer une femme aimée d''un amant et adultère! Aime-la comme l''Eternel aime les Israélites, alors qu''eux, ils se tournent vers d''autres dieux et aiment les gâteaux de raisins'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Gâteaux de raisins: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: offerts aux idoles.
      marker-yv: yv-n
    - type: text
      text: .»
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Je l''ai achetée pour 15 pièces d''argent et 330 litres d''orge. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Je lui ai dit: «Tu resteras longtemps à moi, sans te livrer à la prostitution ni appartenir à aucun homme, et j''agirai de même envers toi.»'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: En effet, les Israélites resteront longtemps sans roi, sans chef, sans sacrifice, sans statue, sans éphod et sans théraphim
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ephod… théraphim: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: objets associés aux cultes idolâtriques.
      marker-yv: yv-n
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Après cela, les Israélites reviendront. Ils rechercheront l'Eternel, leur Dieu, et David, leur roi, et ils retourneront en tremblant vers l'Eternel et vers sa bienveillance, dans l'avenir.
