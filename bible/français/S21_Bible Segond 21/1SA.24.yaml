document_id: 1SA.24,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Saül épargné par David à En-Guédi
  - type: text
    content: 'De là David monta vers les falaises d''En-Guédi, où il habita. '
  '10':
  - type: text
    content: 'David dit à Saül: «Pourquoi écoutes-tu les propos de ceux qui prétendent que je cherche ton malheur? '
  '11':
  - type: text
    content: 'Tu vois maintenant de tes propres yeux que l''Eternel t''avait livré aujourd''hui entre mes mains dans la grotte. On me poussait à te tuer, mais je t''ai épargné et j''ai dit: ‘Je ne porterai pas la main contre mon seigneur, car il est celui que l''Eternel a désigné par onction.’ '
  '12':
  - type: text
    content: 'Regarde, mon père, regarde donc le pan de ton manteau dans ma main. J''ai coupé le pan de ton manteau, mais je ne t''ai pas tué. Sache et reconnais donc qu''il n''y a dans ma conduite ni méchanceté ni révolte et que je n''ai pas péché contre toi. Et pourtant tu me dresses des embuscades pour m''enlever la vie! '
  '13':
  - type: text
    content: 'L''Eternel sera juge entre toi et moi, et il me vengera de toi, mais je ne porterai pas la main contre toi. '
  '14':
  - type: text
    content: '‘Des méchants vient la méchanceté’, dit l''ancien proverbe. Aussi, je ne porterai pas la main contre toi. '
  '15':
  - type: text
    content: 'Contre qui le roi d''Israël s''est-il mis en marche? Qui poursuis-tu? Un chien mort, une puce! '
  '16':
  - type: text
    content: L'Eternel jugera et prononcera son verdict entre toi et moi. Il regardera et il défendra ma cause, il me rendra justice en me délivrant de toi.»
  '17':
  - type: text
    content: 'Lorsque David eut fini d''adresser ces paroles à Saül, celui-ci dit: «Est-ce bien ta voix, mon fils David?» Et Saül se mit à pleurer tout haut. '
  '18':
  - type: text
    content: 'Il dit à David: «Tu es plus juste que moi, car tu m''as fait du bien, alors que moi je t''ai fait du mal. '
  '19':
  - type: text
    content: 'Tu démontres aujourd''hui la bonté avec laquelle tu agis envers moi, puisque l''Eternel m''avait livré entre tes mains et que tu ne m''as pas tué. '
  '2':
  - type: text
    content: 'Lorsque Saül fut de retour après avoir poursuivi les Philistins, on vint lui dire: «David est dans le désert d''En-Guédi.» '
  '20':
  - type: text
    content: 'Si quelqu''un rencontre son ennemi, le laisse-t-il poursuivre tranquillement son chemin? Que l''Eternel te récompense pour ce que tu as fait pour moi aujourd''hui! '
  '21':
  - type: text
    content: 'Maintenant, je sais que tu régneras et que le royaume d''Israël tiendra solidement entre tes mains. '
  '22':
  - type: text
    content: 'Jure-moi donc par l''Eternel que tu ne détruiras pas ma descendance après ma mort et que tu ne supprimeras pas mon nom de ma famille.» '
  '23':
  - type: text
    content: David en fit le serment à Saül. Puis Saül retourna chez lui, et David et ses hommes gagnèrent leur retraite.
  '3':
  - type: text
    content: 'Saül prit 3000 hommes d''élite choisis sur tout Israël, et il alla à la recherche de David et de ses hommes jusque sur les rochers des bouquetins. '
  '4':
  - type: text
    content: 'Il arriva à des parcs à brebis, qui étaient près du chemin. Là se trouvait une grotte, où il entra pour satisfaire un besoin naturel. David et ses hommes se trouvaient au fond de la grotte. '
  '5':
  - type: text
    content: 'Les hommes de David lui dirent: «Voici le jour où l''Eternel te dit: ‘Je livre ton ennemi entre tes mains; traite-le comme tu le jugeras bon.’» David se leva et coupa doucement le pan du manteau de Saül. '
  '6':
  - type: text
    content: 'Après cela il sentit son cœur battre, parce qu''il avait coupé le pan du manteau de Saül. '
  '7':
  - type: text
    content: 'Il dit à ses hommes: «Que l''Eternel me garde de commettre une telle action contre mon seigneur, celui que l''Eternel a désigné par onction! Qu''il me garde de porter la main contre lui, car il est celui que l''Eternel a désigné par onction.» '
  '8':
  - type: text
    content: Par ces paroles David arrêta ses hommes et les empêcha de se jeter sur Saül. Puis Saül se leva pour sortir de la grotte et continua son chemin.
  '9':
  - type: text
    content: 'Peu après, David se leva et sortit de la grotte. Il se mit alors à crier vers Saül: «O roi, mon seigneur!» Saül regarda derrière lui et David s''inclina le visage contre terre et se prosterna. '
