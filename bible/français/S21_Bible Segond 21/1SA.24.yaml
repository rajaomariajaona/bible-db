document_id: 1SA.24
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Saül épargné par David à En-Guédi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'De là David monta vers les falaises d''En-Guédi, où il habita. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Lorsque Saül fut de retour après avoir poursuivi les Philistins, on vint lui dire: «David est dans le désert d''En-Guédi.» '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Saül prit 3000 hommes d''élite choisis sur tout Israël, et il alla à la recherche de David et de ses hommes jusque sur les rochers des bouquetins. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il arriva à des parcs à brebis, qui étaient près du chemin. Là se trouvait une grotte, où il entra pour satisfaire un besoin naturel. David et ses hommes se trouvaient au fond de la grotte. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les hommes de David lui dirent: «Voici le jour où l''Eternel te dit: ‘Je livre ton ennemi entre tes mains; traite-le comme tu le jugeras bon.’» David se leva et coupa doucement le pan du manteau de Saül. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Après cela il sentit son cœur battre, parce qu''il avait coupé le pan du manteau de Saül. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il dit à ses hommes: «Que l''Eternel me garde de commettre une telle action contre mon seigneur, celui que l''Eternel a désigné par onction! Qu''il me garde de porter la main contre lui, car il est celui que l''Eternel a désigné par onction.» '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Par ces paroles David arrêta ses hommes et les empêcha de se jeter sur Saül. Puis Saül se leva pour sortir de la grotte et continua son chemin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Peu après, David se leva et sortit de la grotte. Il se mit alors à crier vers Saül: «O roi, mon seigneur!» Saül regarda derrière lui et David s''inclina le visage contre terre et se prosterna. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'David dit à Saül: «Pourquoi écoutes-tu les propos de ceux qui prétendent que je cherche ton malheur? '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tu vois maintenant de tes propres yeux que l''Eternel t''avait livré aujourd''hui entre mes mains dans la grotte. On me poussait à te tuer, mais je t''ai épargné et j''ai dit: ‘Je ne porterai pas la main contre mon seigneur, car il est celui que l''Eternel a désigné par onction.’ '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Regarde, mon père, regarde donc le pan de ton manteau dans ma main. J''ai coupé le pan de ton manteau, mais je ne t''ai pas tué. Sache et reconnais donc qu''il n''y a dans ma conduite ni méchanceté ni révolte et que je n''ai pas péché contre toi. Et pourtant tu me dresses des embuscades pour m''enlever la vie! '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'L''Eternel sera juge entre toi et moi, et il me vengera de toi, mais je ne porterai pas la main contre toi. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '‘Des méchants vient la méchanceté’, dit l''ancien proverbe. Aussi, je ne porterai pas la main contre toi. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Contre qui le roi d''Israël s''est-il mis en marche? Qui poursuis-tu? Un chien mort, une puce! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: L'Eternel jugera et prononcera son verdict entre toi et moi. Il regardera et il défendra ma cause, il me rendra justice en me délivrant de toi.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Lorsque David eut fini d''adresser ces paroles à Saül, celui-ci dit: «Est-ce bien ta voix, mon fils David?» Et Saül se mit à pleurer tout haut. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il dit à David: «Tu es plus juste que moi, car tu m''as fait du bien, alors que moi je t''ai fait du mal. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tu démontres aujourd''hui la bonté avec laquelle tu agis envers moi, puisque l''Eternel m''avait livré entre tes mains et que tu ne m''as pas tué. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Si quelqu''un rencontre son ennemi, le laisse-t-il poursuivre tranquillement son chemin? Que l''Eternel te récompense pour ce que tu as fait pour moi aujourd''hui! '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Maintenant, je sais que tu régneras et que le royaume d''Israël tiendra solidement entre tes mains. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jure-moi donc par l''Eternel que tu ne détruiras pas ma descendance après ma mort et que tu ne supprimeras pas mon nom de ma famille.» '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: David en fit le serment à Saül. Puis Saül retourna chez lui, et David et ses hommes gagnèrent leur retraite.
