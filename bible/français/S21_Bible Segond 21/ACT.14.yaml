document_id: ACT.14,152
type_code: fra
verses:
  '1':
  - type: heading
    content: L'Evangile à Iconium, Lystre et Derbe
  - type: text
    content: 'A Iconium de même, Paul et Barnabas entrèrent dans la synagogue des Juifs, et ils parlèrent de telle manière qu''une grande foule de Juifs et de non-Juifs crurent. '
  '10':
  - type: text
    content: 'il lui dit d''une voix forte: «Lève-toi droit sur tes pieds!» Il se leva d''un bond et se mit à marcher.'
  '11':
  - type: text
    content: 'A la vue de ce que Paul avait fait, la foule se mit à dire tout haut en lycaonien: «Les dieux sont descendus vers nous sous une forme humaine.» '
  '12':
  - type: text
    content: Ils appelaient Barnabas Zeus, et Paul Hermès
  - type: note
    content: 'Zeus… Hermès: respectivement le dieu suprême et le messager des dieux, dans la mythologie grecque.'
  - type: text
    content: ', parce que c''était lui qui prenait la parole. '
  '13':
  - type: text
    content: 'Le prêtre de Zeus, dont le temple était à l''entrée de la ville, amena des taureaux avec des guirlandes vers les portes. Il voulait, de même que la foule, offrir un sacrifice. '
  '14':
  - type: text
    content: 'Quand ils apprirent cela, les apôtres Barnabas et Paul déchirèrent leurs vêtements et se précipitèrent vers la foule '
  '15':
  - type: text
    content: 'en s''écriant: «Pourquoi faites-vous cela? Nous aussi, nous sommes des êtres humains de la même nature que vous, et nous vous apportons une bonne nouvelle en vous appelant à renoncer à ces idoles sans consistance pour vous tourner vers le Dieu vivant '
  - type: text
    content: qui a fait le ciel, la terre, la mer et tout ce qui s'y trouve
  - type: note
    content: 'Qui a fait… trouve: présentation de Dieu tirée d''Exode 20.11 et du Psaume 146.6.'
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Dans les générations passées, il a laissé toutes les nations suivre leurs propres voies. '
  '17':
  - type: text
    content: 'Pourtant, il n''a pas cessé de rendre témoignage à ce qu''il est par le bien qu''il fait: il vous envoie du ciel les pluies et les saisons fertiles, il vous comble de nourriture et remplit votre cœur de joie.» '
  '18':
  - type: text
    content: C'est à peine s'ils purent, par ces paroles, empêcher la foule de leur offrir un sacrifice.
  '19':
  - type: text
    content: 'Alors arrivèrent d''Antioche et d''Iconium des Juifs qui gagnèrent la foule. Après avoir lapidé Paul, ils le traînèrent hors de la ville, pensant qu''il était mort. '
  '2':
  - type: text
    content: 'Mais les Juifs restés incrédules excitèrent l''esprit des non-Juifs et provoquèrent leur hostilité contre les frères. '
  '20':
  - type: text
    content: 'Cependant, quand les disciples l''entourèrent, il se leva et entra dans la ville. Le lendemain, il partit pour Derbe avec Barnabas. '
  '21':
  - type: text
    content: 'Après avoir évangélisé cette ville et fait un certain nombre de disciples, ils retournèrent à Lystre, à Iconium et à Antioche. '
  '22':
  - type: text
    content: 'Ils fortifiaient l''esprit des disciples, les encourageaient à persévérer dans la foi et disaient: «C''est à travers beaucoup de difficultés qu''il nous faut entrer dans le royaume de Dieu.» '
  '23':
  - type: text
    content: 'Ils désignèrent des anciens dans chaque Eglise et, après avoir prié et jeûné, ils les confièrent au Seigneur en qui ils avaient cru. '
  '24':
  - type: text
    content: 'Traversant ensuite la Pisidie, ils vinrent en Pamphylie. '
  '25':
  - type: text
    content: 'Ils annoncèrent la parole à Perge, puis ils descendirent à Attalie. '
  '26':
  - type: text
    content: De là ils embarquèrent pour Antioche, leur point de départ, où on les avait confiés à la grâce de Dieu pour la tâche qu'ils venaient d'accomplir.
  '27':
  - type: text
    content: 'Après leur arrivée, Paul et Barnabas réunirent l''Eglise et racontèrent tout ce que Dieu avait fait avec eux et comment il avait ouvert la porte de la foi aux non-Juifs. '
  '28':
  - type: text
    content: Ils restèrent assez longtemps avec les disciples.
  '3':
  - type: text
    content: 'Paul et Barnabas restèrent donc assez longtemps à Iconium; ils parlaient avec assurance, appuyés sur le Seigneur qui rendait témoignage à la parole de sa grâce en permettant qu''il se fasse par leur intermédiaire des signes miraculeux et des prodiges. '
  '4':
  - type: text
    content: 'La population de la ville se divisa: les uns étaient du côté des Juifs, les autres du côté des apôtres. '
  '5':
  - type: text
    content: 'Alors que les non-Juifs et les Juifs, avec leurs chefs, se préparaient à les maltraiter et à les lapider, '
  '6':
  - type: text
    content: 'Paul et Barnabas, avertis de la situation, se réfugièrent dans les villes de la Lycaonie, à Lystre, à Derbe et dans les environs. '
  '7':
  - type: text
    content: Là aussi, ils annoncèrent la bonne nouvelle.
  '8':
  - type: text
    content: 'A Lystre, un homme impotent des pieds se tenait assis; il était infirme de naissance et n''avait jamais marché. '
  '9':
  - type: text
    content: 'Il écoutait Paul parler. Celui-ci fixa les regards sur lui et, voyant qu''il avait la foi pour être sauvé, '
