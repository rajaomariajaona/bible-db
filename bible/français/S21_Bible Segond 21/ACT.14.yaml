document_id: ACT.14,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'Evangile à Iconium, Lystre et Derbe
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'A Iconium de même, Paul et Barnabas entrèrent dans la synagogue des Juifs, et ils parlèrent de telle manière qu''une grande foule de Juifs et de non-Juifs crurent. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'il lui dit d''une voix forte: «Lève-toi droit sur tes pieds!» Il se leva d''un bond et se mit à marcher.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'A la vue de ce que Paul avait fait, la foule se mit à dire tout haut en lycaonien: «Les dieux sont descendus vers nous sous une forme humaine.» '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ils appelaient Barnabas Zeus, et Paul Hermès
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Zeus… Hermès: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: respectivement le dieu suprême et le messager des dieux, dans la mythologie grecque.
      marker-yv: yv-n
    - type: text
      text: ', parce que c''était lui qui prenait la parole. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Le prêtre de Zeus, dont le temple était à l''entrée de la ville, amena des taureaux avec des guirlandes vers les portes. Il voulait, de même que la foule, offrir un sacrifice. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Quand ils apprirent cela, les apôtres Barnabas et Paul déchirèrent leurs vêtements et se précipitèrent vers la foule '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'en s''écriant: «Pourquoi faites-vous cela? Nous aussi, nous sommes des êtres humains de la même nature que vous, et nous vous apportons une bonne nouvelle en vous appelant à renoncer à ces idoles sans consistance pour vous tourner vers le Dieu vivant '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: qui a fait le ciel, la terre, la mer et tout ce qui s'y trouve
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qui a fait… trouve: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: présentation de Dieu tirée d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Exode 20.11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' et du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 146.6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Dans les générations passées, il a laissé toutes les nations suivre leurs propres voies. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Pourtant, il n''a pas cessé de rendre témoignage à ce qu''il est par le bien qu''il fait: il vous envoie du ciel les pluies et les saisons fertiles, il vous comble de nourriture et remplit votre cœur de joie.» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: C'est à peine s'ils purent, par ces paroles, empêcher la foule de leur offrir un sacrifice.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Alors arrivèrent d''Antioche et d''Iconium des Juifs qui gagnèrent la foule. Après avoir lapidé Paul, ils le traînèrent hors de la ville, pensant qu''il était mort. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mais les Juifs restés incrédules excitèrent l''esprit des non-Juifs et provoquèrent leur hostilité contre les frères. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Cependant, quand les disciples l''entourèrent, il se leva et entra dans la ville. Le lendemain, il partit pour Derbe avec Barnabas. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Après avoir évangélisé cette ville et fait un certain nombre de disciples, ils retournèrent à Lystre, à Iconium et à Antioche. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ils fortifiaient l''esprit des disciples, les encourageaient à persévérer dans la foi et disaient: «C''est à travers beaucoup de difficultés qu''il nous faut entrer dans le royaume de Dieu.» '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ils désignèrent des anciens dans chaque Eglise et, après avoir prié et jeûné, ils les confièrent au Seigneur en qui ils avaient cru. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Traversant ensuite la Pisidie, ils vinrent en Pamphylie. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ils annoncèrent la parole à Perge, puis ils descendirent à Attalie. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: De là ils embarquèrent pour Antioche, leur point de départ, où on les avait confiés à la grâce de Dieu pour la tâche qu'ils venaient d'accomplir.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Après leur arrivée, Paul et Barnabas réunirent l''Eglise et racontèrent tout ce que Dieu avait fait avec eux et comment il avait ouvert la porte de la foi aux non-Juifs. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ils restèrent assez longtemps avec les disciples.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Paul et Barnabas restèrent donc assez longtemps à Iconium; ils parlaient avec assurance, appuyés sur le Seigneur qui rendait témoignage à la parole de sa grâce en permettant qu''il se fasse par leur intermédiaire des signes miraculeux et des prodiges. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'La population de la ville se divisa: les uns étaient du côté des Juifs, les autres du côté des apôtres. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Alors que les non-Juifs et les Juifs, avec leurs chefs, se préparaient à les maltraiter et à les lapider, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Paul et Barnabas, avertis de la situation, se réfugièrent dans les villes de la Lycaonie, à Lystre, à Derbe et dans les environs. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Là aussi, ils annoncèrent la bonne nouvelle.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'A Lystre, un homme impotent des pieds se tenait assis; il était infirme de naissance et n''avait jamais marché. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Il écoutait Paul parler. Celui-ci fixa les regards sur lui et, voyant qu''il avait la foi pour être sauvé, '
