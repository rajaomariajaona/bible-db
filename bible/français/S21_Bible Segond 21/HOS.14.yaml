document_id: HOS.14
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Samarie sera punie parce qu'elle s'est révoltée contre son Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils tomberont par l'épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs petits enfants seront écrasés
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'on fendra le ventre de leurs femmes enceintes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Appel à revenir à Dieu et promesses
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Israël, reviens à l'Eternel, ton Dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, tu as trébuché par ta faute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Apportez avec vous des paroles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et revenez à l'Eternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dites-lui: «Pardonne toutes nos fautes'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et fais-nous bon accueil!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous t'offrirons, au lieu de taureaux, l'hommage de nos lèvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: L'Assyrien ne nous sauvera pas. Nous ne monterons pas sur des chevaux
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et nous ne dirons plus à l''œuvre de nos mains: ‘Notre Dieu!’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: car c'est auprès de toi que l'orphelin trouve compassion.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je réparerai leur infidélité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'aurai pour eux un amour sincère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ma colère s'est détournée d'eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Je serai comme la rosée pour Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il fleurira comme le lis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il poussera des racines comme les cèdres du Liban.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ses rameaux s'étendront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il aura la splendeur de l'olivier
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les parfums du Liban.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ils reviendront s'asseoir sous son ombre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils redonneront la vie au blé
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils fleuriront comme la vigne;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils auront la réputation du vin du Liban.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ephraïm, qu'ai-je encore à faire avec les idoles?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je lui répondrai, je veillerai sur lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je serai pour lui comme un cyprès verdoyant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est de moi que tu recevras ton fruit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Qui est sage? Qu'il comprenne ces choses!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que celui qui est intelligent les connaisse!
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, les voies de l'Eternel sont droites.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les justes y marcheront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais les rebelles y trébucheront.
