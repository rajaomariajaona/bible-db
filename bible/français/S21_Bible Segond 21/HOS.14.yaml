document_id: HOS.14,152
type_code: fra
verses:
  '1':
  - type: text
    content: Samarie sera punie parce qu'elle s'est révoltée contre son Dieu.
  - type: text
    content: Ils tomberont par l'épée,
  - type: text
    content: leurs petits enfants seront écrasés
  - type: text
    content: et l'on fendra le ventre de leurs femmes enceintes.
  - type: heading
    content: Appel à revenir à Dieu et promesses
  '10':
  - type: text
    content: Qui est sage? Qu'il comprenne ces choses!
  - type: text
    content: Que celui qui est intelligent les connaisse!
  - type: text
    content: En effet, les voies de l'Eternel sont droites.
  - type: text
    content: Les justes y marcheront,
  - type: text
    content: mais les rebelles y trébucheront.
  '2':
  - type: text
    content: Israël, reviens à l'Eternel, ton Dieu!
  - type: text
    content: En effet, tu as trébuché par ta faute.
  '3':
  - type: text
    content: Apportez avec vous des paroles
  - type: text
    content: et revenez à l'Eternel!
  - type: text
    content: 'Dites-lui: «Pardonne toutes nos fautes'
  - type: text
    content: et fais-nous bon accueil!
  - type: text
    content: Nous t'offrirons, au lieu de taureaux, l'hommage de nos lèvres.
  '4':
  - type: text
    content: L'Assyrien ne nous sauvera pas. Nous ne monterons pas sur des chevaux
  - type: text
    content: 'et nous ne dirons plus à l''œuvre de nos mains: ‘Notre Dieu!’'
  - type: text
    content: car c'est auprès de toi que l'orphelin trouve compassion.»
  '5':
  - type: text
    content: Je réparerai leur infidélité,
  - type: text
    content: j'aurai pour eux un amour sincère,
  - type: text
    content: car ma colère s'est détournée d'eux.
  '6':
  - type: text
    content: Je serai comme la rosée pour Israël,
  - type: text
    content: il fleurira comme le lis,
  - type: text
    content: et il poussera des racines comme les cèdres du Liban.
  '7':
  - type: text
    content: Ses rameaux s'étendront,
  - type: text
    content: il aura la splendeur de l'olivier
  - type: text
    content: et les parfums du Liban.
  '8':
  - type: text
    content: Ils reviendront s'asseoir sous son ombre,
  - type: text
    content: ils redonneront la vie au blé
  - type: text
    content: et ils fleuriront comme la vigne;
  - type: text
    content: ils auront la réputation du vin du Liban.
  '9':
  - type: text
    content: Ephraïm, qu'ai-je encore à faire avec les idoles?
  - type: text
    content: Je lui répondrai, je veillerai sur lui,
  - type: text
    content: je serai pour lui comme un cyprès verdoyant.
  - type: text
    content: C'est de moi que tu recevras ton fruit.
