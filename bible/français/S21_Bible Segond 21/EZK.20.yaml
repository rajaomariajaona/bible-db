document_id: EZK.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Infidélités d'Israël et bonté de Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La septième année, le dixième jour du cinquième mois, quelques-uns des anciens d''Israël sont venus pour consulter l''Eternel. Ils se sont assis devant moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alors la parole de l''Eternel m''a été adressée:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '«Fils de l''homme, parle aux anciens d''Israël! Tu leur annonceras: ‘Voici ce que dit le Seigneur, l''Eternel: Est-ce pour me consulter que vous êtes venus? Aussi vrai que je suis vivant, je ne me laisserai pas consulter par vous, déclare le Seigneur, l''Eternel.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Vas-tu les juger, fils de l'homme? Vas-tu les juger? Fais-leur connaître les pratiques abominables de leurs ancêtres!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '»Tu leur diras: Voici ce que dit le Seigneur, l''Eternel: Le jour où j''ai choisi Israël, je me suis engagé envers la descendance de la famille de Jacob et je me suis fait connaître à eux en Egypte. Je me suis engagé envers eux en disant: ‘Je suis l''Eternel, votre Dieu.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ce jour-là, je me suis engagé envers eux à les faire passer d''Egypte dans un pays que j''avais cherché pour eux, un pays où coulent le lait et le miel, le plus beau de tous les pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Je leur ai dit: ‘Que chacun rejette les monstruosités qui attirent ses regards et ne vous rendez pas impurs par les idoles d''Egypte! C''est moi, l''Eternel, qui suis votre Dieu.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '»Cependant, ils se sont révoltés contre moi et ils n''ont pas voulu m''écouter. Aucun n''a rejeté les monstruosités qui attiraient ses regards et ils n''ont pas abandonné les idoles d''Egypte. Alors j''ai parlé de déverser ma fureur sur eux, d''aller jusqu''au bout de ma colère contre eux au milieu de l''Egypte, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'mais j''ai agi à cause de mon nom, afin qu''il ne soit pas déshonoré aux yeux des nations parmi lesquelles ils se trouvaient. En effet, c''était sous leurs yeux que je m''étais fait connaître à eux pour les faire sortir d''Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Je les ai donc fait sortir d''Egypte et je les ai conduits dans le désert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je leur ai donné mes prescriptions et leur ai fait connaître mes règles, *celles que l'homme doit mettre en pratique afin de vivre par elles
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Celles… par elles: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'reprise de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lévitique 18.5
      metadata:
        usfm: LEV.18.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (idem vv. 13, 21).'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je leur ai aussi donné mes sabbats pour que ce soit entre moi et eux un signe auquel on reconnaisse que je suis l'Eternel qui les considère comme saints.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '»Cependant, la communauté d''Israël s''est révoltée contre moi dans le désert. Ils n''ont pas suivi mes prescriptions et ils ont rejeté mes règles, *celles que l''homme doit mettre en pratique afin de vivre par elles, et ils ont violé sans retenue mes sabbats. Alors j''ai parlé de déverser ma fureur sur eux dans le désert pour les exterminer, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'mais j''ai agi à cause de mon nom, afin qu''il ne soit pas déshonoré aux yeux des nations. En effet, c''était sous leurs yeux que je les avais fait sortir d''Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dans le désert, je me suis donc engagé envers eux à ne pas les conduire dans le pays que je leur avais destiné, pays où coulent le lait et le miel, le plus beau de tous les pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'En effet, mes règles, ils les rejetaient; mes prescriptions, ils ne les suivaient pas; mes sabbats, ils les violaient. C''est que leur cœur restait attaché à leurs idoles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Néanmoins, j''ai porté un regard de pitié sur eux et je ne les ai pas détruits, je ne les ai pas achevés dans le désert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors j''ai dit à leurs fils dans le désert: ‘Ne suivez pas les prescriptions de vos pères, ne respectez pas leurs règles et ne vous rendez pas impurs par leurs idoles! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'C''est moi, l''Eternel, qui suis votre Dieu. Suivez mes prescriptions, respectez mes règles et mettez-les en pratique! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Faites de mes sabbats des jours saints et qu'ils soient entre moi et vous un signe auquel on reconnaisse que je suis l'Eternel, votre Dieu!’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '»Cependant, les fils se sont révoltés contre moi. Ils n''ont pas suivi mes prescriptions, ils n''ont pas respecté et appliqué mes règles, *celles que l''homme doit mettre en pratique afin de vivre par elles, et ils ont violé mes sabbats. Alors j''ai parlé de déverser ma fureur sur eux, d''aller jusqu''au bout de ma colère contre eux dans le désert, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'mais je me suis retenu et j''ai agi à cause de mon nom, afin qu''il ne soit pas déshonoré aux yeux des nations. En effet, c''était sous leurs yeux que je les avais fait sortir d''Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Dans le désert, je me suis donc engagé envers eux à les éparpiller parmi les nations et à les disperser dans divers pays, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'puisqu''ils n''ont pas mis en pratique mes règles, qu''ils ont rejeté mes prescriptions, violé mes sabbats et tourné les regards vers les idoles de leurs pères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Je leur ai même donné des prescriptions qui n''étaient pas bonnes et des règles qui n''apportaient pas la vie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Je les ai rendus impurs par leurs offrandes, quand ils ont fait passer par le feu tous leurs premiers-nés, pour les plonger dans la consternation, afin qu'ils reconnaissent que je suis l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '»C''est pourquoi, parle à la communauté d''Israël, fils de l''homme! Tu leur annonceras: Voici ce que dit le Seigneur, l''Eternel: Vos ancêtres m''ont encore insulté en se montrant infidèles envers moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Je les ai conduits dans le pays que je m''étais engagé à leur donner, et ils ont porté les yeux sur toute colline élevée et sur tout arbre touffu; là ils ont fait leurs sacrifices, ils ont présenté leurs offrandes irritantes, ils ont brûlé leurs parfums à l''odeur agréable et versé leurs offrandes liquides. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Je leur ai dit: ‘Qu''est-ce donc que ces hauts lieux où vous vous rendez'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Qu''est-ce… rendez: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'jeu de mots en hébreu; le mot hauts lieux, en hébreu bamah, peut être décomposé en deux parties: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: le verbe «se rendre» (hébreu ba’) et le mot traduit par «qu'est-ce donc que» (hébreu mah).
    marker-yv: yv-n
  - type: text
    text: ?’ Et le nom de hauts lieux leur a été donné jusqu'à aujourd'hui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '»C''est pourquoi, annonce à la communauté d''Israël: Voici ce que dit le Seigneur, l''Eternel: N''êtes-vous pas en train de devenir impurs à la manière de vos ancêtres et de vous prostituer avec leurs abominables divinités? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: En présentant vos offrandes, en faisant passer vos enfants par le feu, vous vous rendez impurs, aujourd'hui encore, en l'honneur de toutes vos idoles. Et moi, je devrais me laisser consulter par vous, communauté d'Israël? Aussi vrai que je suis vivant, déclare le Seigneur, l'Eternel, je ne me laisserai pas consulter par vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '»Cela n''arrivera pas, ce que vous imaginez quand vous dites: ‘Nous voulons être comme les nations, comme les familles des autres pays, en servant ce qui est en bois et en pierre.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Aussi vrai que je suis vivant, déclare le Seigneur, l''Eternel, je régnerai sur vous avec puissance et force, dans un déversement de fureur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Je vous ferai sortir du milieu des peuples et je vous rassemblerai des pays où vous avez été éparpillés avec puissance et force, dans un déversement de fureur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Je vous amènerai dans le désert des peuples et là, je vous jugerai face à face. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Je vous jugerai comme j''ai jugé vos ancêtres dans le désert de l''Egypte, déclare le Seigneur, l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Je vous ferai passer sous mon bâton
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.37 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sous mon bâton: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: image du berger qui, le soir venu, fait passer ses brebis une à une sous son bâton pour les compter et les trier.
    marker-yv: yv-n
  - type: text
    text: ' et je vous ramènerai dans les liens de l''alliance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Je séparerai de vous ceux qui sont rebelles et se révoltent contre moi; je les ferai sortir du pays où ils séjournent en étrangers, mais ils ne pénétreront pas sur le territoire d'Israël. Vous reconnaîtrez alors que je suis l'Eternel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Promesses de rétablissement
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: '»Quant à vous, communauté d''Israël, voici ce que dit le Seigneur, l''Eternel: Que chacun aille donc servir ses idoles! Mais après cela, on verra bien si vous continuez de ne pas m''écouter et de déshonorer mon saint nom par vos offrandes et vos idoles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'En effet, c''est sur ma montagne sainte, sur la haute montagne d''Israël, déclare le Seigneur, l''Eternel, que toute la communauté d''Israël, tous ceux qui seront dans le pays, me serviront. Là je leur réserverai un accueil favorable, là je rechercherai vos offrandes, la meilleure partie de vos dons, avec tout ce que vous me consacrerez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: '*Je vous accueillerai'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.41 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je vous accueillerai: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'repris en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Corinthiens 6.17
      metadata:
        usfm: 2CO.6.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' en combinaison avec Esaïe 52.11.'
    marker-yv: yv-n
  - type: text
    text: ' comme un parfum dont l''odeur est agréable, quand je vous aurai fait sortir du milieu des peuples, quand je vous aurai rassemblés des pays où vous êtes éparpillés. A travers vous, ma sainteté sera alors manifestée aux yeux des nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Vous reconnaîtrez que je suis l''Eternel, quand je vous ramènerai dans le territoire d''Israël, dans le pays que je m''étais engagé à donner à vos ancêtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Là vous vous souviendrez de votre conduite et de tous vos agissements, par lesquels vous vous êtes rendus impurs. Vous vous prendrez vous-mêmes en dégoût à cause de tout le mal que vous avez commis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Vous reconnaîtrez que je suis l'Eternel quand j'agirai avec vous à cause de mon nom, et absolument pas en fonction de votre mauvaise conduite et de vos agissements dépravés, communauté d'Israël! déclare le Seigneur, l'Eternel.»
