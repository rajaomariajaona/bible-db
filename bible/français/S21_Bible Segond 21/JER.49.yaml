document_id: JER.49
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie sur Ammon
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Sur les Ammonites.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël n'a-t-il pas de fils?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N'a-t-il pas d'héritier?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi est-ce Malcom
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Malcom: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: principale divinité des Ammonites.
    marker-yv: yv-n
  - type: text
    text: ' qui possède Gad'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son peuple qui habite ses villes?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Voilà pourquoi les jours viennent, déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: où je ferai retentir le cri de guerre contre Rabba, la capitale des Ammonites.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle deviendra un tas de ruines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les villes qui en dépendent seront réduites en cendres.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors Israël reprendra son héritage à ceux qui l'en avaient dépossédé, dit l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Lamente-toi, Hesbon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car Aï est dévastée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Appelez à l'aide, filles de Rabba, habillez-vous de sacs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pleurez et allez de tous côtés le long des murailles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car Malcom part en exil
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec ses prêtres et ses chefs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Pourquoi es-tu fière de tes vallées?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ta vallée se vide, fille rebelle.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Elle plaçait sa confiance dans ses trésors et disait:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Qui parviendra à m'atteindre?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je vais faire venir la frayeur sur toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare le Seigneur, l'Eternel, le maître de l'univers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle viendra de tous les côtés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chacun de vous sera chassé et partira droit devant lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il n'y aura personne pour rassembler les fuyards.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Cependant, après cela, je ramènerai les déportés des Ammonites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l'Eternel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie sur Edom
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Sur Edom.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voici ce que dit l''Eternel, le maître de l''univers:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: N'y a-t-il plus de sagesse dans Théman?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les conseils des hommes intelligents ont-ils disparu?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leur sagesse s'est-elle évanouie?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fuyez, tournez le dos, allez vous réfugier dans les profondeurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: habitants de Dedan!
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, je fais venir le malheur sur Esaü,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est le moment de mon intervention contre lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '*Si des vendangeurs viennent chez toi,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: laisseront-ils de quoi grappiller?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Si des… grappiller: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'même texte en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Abdias 5
      metadata:
        usfm: OBA.1.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si des voleurs viennent de nuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne détruiront-ils pas tout ce qu'ils peuvent?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mais c'est moi-même qui dépouille Esaü,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'qui mets ses cachettes à découvert:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne pourra plus se mettre à l'abri.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa lignée, ses frères et ses voisins seront dévastés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il n'existera plus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Abandonne donc tes orphelins! Moi, je les garderai en vie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quant à tes veuves, qu'elles placent leur confiance en moi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'En effet, voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui n'étaient pas condamnés à boire la coupe la boiront malgré tout,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toi, tu resterais impuni!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Non, tu ne resteras pas impuni,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu la boiras, c'est certain!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Oui, j'en fais le serment par moi-même, déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Botsra deviendra un sujet de consternation et d'insulte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un endroit dévasté et maudit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quant aux villes voisines, elles deviendront des ruines, et ce pour toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '*J''ai appris une nouvelle de la part de l''Eternel'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et un messager a été envoyé parmi les nations:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Rassemblez-vous et marchez contre Edom!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Levez-vous pour lui faire la guerre!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Oui, je t'ai rendu petit parmi les nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu es un objet de mépris parmi les hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ton insolence, l'orgueil de ton cœur t'a égaré,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi qui es installé dans le creux des rochers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi qui occupes le sommet des collines.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puisque tu places ton nid aussi haut que celui de l'aigle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je t'en ferai tomber, déclare l'Eternel.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '49.14-16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Texte quasi similaire en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Abdias 1-4
      metadata:
        usfm: OBA.1.1+OBA.1.2+OBA.1.3+OBA.1.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Edom deviendra un sujet de consternation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ceux qui passeront près de lui
- type: usfm
  marker: q1
  children:
  - type: text
    text: seront consternés et siffleront à la vue de toutes ses blessures.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ce sera comme lors de la catastrophe
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui a frappé Sodome et Gomorrhe ainsi que les villes voisines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: plus personne n'y habitera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aucun homme n'y séjournera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Voici que, pareil à un lion, il monte des rives luxuriantes du Jourdain
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour s'attaquer à un domaine solide.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'agirai en un clin d’œil, je ferai déguerpir Edom de là
- type: usfm
  marker: q1
  children:
  - type: text
    text: et j'établirai à sa tête celui que j'ai choisi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, qui est semblable à moi? Qui me donnera des ordres?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quel est le berger qui me résistera?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: C'est pourquoi, écoutez la décision que l'Eternel a prise contre Edom
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et les projets qu''il a formés contre les habitants de Théman:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: on les traînera comme de faibles brebis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on dévastera leur domaine devant eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Au bruit de leur chute, la terre tremble.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est un cri qu'on entend jusqu'à la mer des Roseaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Voici que, pareil à l'aigle, il monte, il plane,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il déploie ses ailes sur Botsra
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, ce jour-là, le cœur des guerriers d'Edom est
- type: usfm
  marker: q1
  children:
  - type: text
    text: pareil à celui d'une femme prête à accoucher.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie sur Damas
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Sur Damas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hamath et Arpad sont dans la honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car elles ont appris une mauvaise nouvelle.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles en tremblent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce sont des vagues d'anxiété
- type: usfm
  marker: q1
  children:
  - type: text
    text: impossibles à calmer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Damas s'affaisse, elle se tourne pour prendre la fuite
- type: usfm
  marker: q1
  children:
  - type: text
    text: et elle est saisie de panique.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'angoisse et les douleurs s'emparent d'elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme pour une femme prête à accoucher.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Comment! Elle n'a pas été évacuée, la ville dont on chantait les louanges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la ville qui faisait ma joie!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: C'est pourquoi, ce jour-là, ses jeunes gens tomberont sur ses places
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous ses hommes de guerre seront réduits au silence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l'Eternel, le maître de l'univers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Je mettrai le feu aux murs de Damas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il dévorera le palais de Ben-Hadad.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie sur Kédar et Hatsor
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Sur Kédar et les royaumes de Hatsor auxquels Nebucadnetsar, roi de Babylone, infligea une défaite.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Levez-vous, montez à Kédar
- type: usfm
  marker: q1
  children:
  - type: text
    text: et semez la dévastation chez les nomades de l'est!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: On prendra leurs tentes et leurs troupeaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on s'emparera de leurs abris en toile, de tous leurs bagages et de leurs chameaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et on leur criera: «La terreur règne de tous côtés!»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Fuyez, décampez de toutes vos forces, cachez-vous dans les profondeurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: habitants de Hatsor, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, Nebucadnetsar, roi de Babylone, a pris une décision contre vous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a formé un projet contre vous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Levez-vous, montez contre une nation tranquille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui habite en sécurité, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle n'a ni portes ni verrous
- type: usfm
  marker: q1
  children:
  - type: text
    text: et elle habite à l'écart.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Leurs chameaux seront livrés au pillage
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leurs nombreux troupeaux formeront un butin.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les disperserai à tous les vents, ceux qui se rasent les coins de la barbe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je ferai venir leur ruine de tous les côtés, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Hatsor sera le repaire des chacals, un désert pour toujours.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Plus personne n'y habitera, aucun homme n'y séjournera.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie sur Elam
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Voici la parole de l'Eternel adressée au prophète Jérémie à propos d'Elam, au début du règne de Sédécias sur Juda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Voici ce que dit l''Eternel, le maître de l''univers:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je vais briser l'arc d'Elam,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa principale force.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Je ferai venir sur Elam quatre vents venant des quatre coins du ciel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je les disperserai à tous ces vents.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n'y aura pas une nation
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ne voie l'arrivée de réfugiés d'Elam.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Je ferai trembler les habitants d'Elam devant leurs ennemis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: devant ceux qui en veulent à leur vie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'amènerai sur eux le malheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: provoqué par mon ardente colère, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'enverrai l'épée à leur poursuite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu'à leur extermination.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Je placerai mon trône dans Elam,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et j'en ferai disparaître le roi et les chefs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Cependant, dans l'avenir, je ramènerai les déportés d'Elam,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l'Eternel.
