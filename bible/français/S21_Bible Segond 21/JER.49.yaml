document_id: JER.49,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie sur Ammon
  - type: text
    content: Sur les Ammonites.
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: Israël n'a-t-il pas de fils?
  - type: text
    content: N'a-t-il pas d'héritier?
  - type: text
    content: Pourquoi est-ce Malcom
  - type: note
    content: 'Malcom: principale divinité des Ammonites.'
  - type: text
    content: ' qui possède Gad'
  - type: text
    content: et son peuple qui habite ses villes?
  '10':
  - type: text
    content: Mais c'est moi-même qui dépouille Esaü,
  - type: text
    content: 'qui mets ses cachettes à découvert:'
  - type: text
    content: il ne pourra plus se mettre à l'abri.
  - type: text
    content: Sa lignée, ses frères et ses voisins seront dévastés,
  - type: text
    content: et il n'existera plus.
  '11':
  - type: text
    content: Abandonne donc tes orphelins! Moi, je les garderai en vie.
  - type: text
    content: Quant à tes veuves, qu'elles placent leur confiance en moi!
  '12':
  - type: text
    content: 'En effet, voici ce que dit l''Eternel:'
  - type: text
    content: Ceux qui n'étaient pas condamnés à boire la coupe la boiront malgré tout,
  - type: text
    content: et toi, tu resterais impuni!
  - type: text
    content: Non, tu ne resteras pas impuni,
  - type: text
    content: tu la boiras, c'est certain!
  '13':
  - type: text
    content: Oui, j'en fais le serment par moi-même, déclare l'Eternel,
  - type: text
    content: Botsra deviendra un sujet de consternation et d'insulte,
  - type: text
    content: un endroit dévasté et maudit.
  - type: text
    content: Quant aux villes voisines, elles deviendront des ruines, et ce pour toujours.
  '14':
  - type: text
    content: '*J''ai appris une nouvelle de la part de l''Eternel'
  - type: text
    content: 'et un messager a été envoyé parmi les nations:'
  - type: text
    content: «Rassemblez-vous et marchez contre Edom!
  - type: text
    content: Levez-vous pour lui faire la guerre!»
  '15':
  - type: text
    content: Oui, je t'ai rendu petit parmi les nations,
  - type: text
    content: tu es un objet de mépris parmi les hommes.
  '16':
  - type: text
    content: Ton insolence, l'orgueil de ton cœur t'a égaré,
  - type: text
    content: toi qui es installé dans le creux des rochers,
  - type: text
    content: toi qui occupes le sommet des collines.
  - type: text
    content: Puisque tu places ton nid aussi haut que celui de l'aigle,
  - type: text
    content: je t'en ferai tomber, déclare l'Eternel.
  - type: note
    content: Texte quasi similaire en Abdias 1-4.
  '17':
  - type: text
    content: Edom deviendra un sujet de consternation.
  - type: text
    content: Tous ceux qui passeront près de lui
  - type: text
    content: seront consternés et siffleront à la vue de toutes ses blessures.
  '18':
  - type: text
    content: Ce sera comme lors de la catastrophe
  - type: text
    content: qui a frappé Sodome et Gomorrhe ainsi que les villes voisines,
  - type: text
    content: 'dit l''Eternel:'
  - type: text
    content: plus personne n'y habitera,
  - type: text
    content: aucun homme n'y séjournera.
  '19':
  - type: text
    content: Voici que, pareil à un lion, il monte des rives luxuriantes du Jourdain
  - type: text
    content: pour s'attaquer à un domaine solide.
  - type: text
    content: J'agirai en un clin d’œil, je ferai déguerpir Edom de là
  - type: text
    content: et j'établirai à sa tête celui que j'ai choisi.
  - type: text
    content: En effet, qui est semblable à moi? Qui me donnera des ordres?
  - type: text
    content: Quel est le berger qui me résistera?
  '2':
  - type: text
    content: Voilà pourquoi les jours viennent, déclare l'Eternel,
  - type: text
    content: où je ferai retentir le cri de guerre contre Rabba, la capitale des Ammonites.
  - type: text
    content: Elle deviendra un tas de ruines,
  - type: text
    content: et les villes qui en dépendent seront réduites en cendres.
  - type: text
    content: Alors Israël reprendra son héritage à ceux qui l'en avaient dépossédé, dit l'Eternel.
  '20':
  - type: text
    content: C'est pourquoi, écoutez la décision que l'Eternel a prise contre Edom
  - type: text
    content: 'et les projets qu''il a formés contre les habitants de Théman:'
  - type: text
    content: on les traînera comme de faibles brebis,
  - type: text
    content: on dévastera leur domaine devant eux.
  '21':
  - type: text
    content: Au bruit de leur chute, la terre tremble.
  - type: text
    content: C'est un cri qu'on entend jusqu'à la mer des Roseaux.
  '22':
  - type: text
    content: Voici que, pareil à l'aigle, il monte, il plane,
  - type: text
    content: il déploie ses ailes sur Botsra
  - type: text
    content: et, ce jour-là, le cœur des guerriers d'Edom est
  - type: text
    content: pareil à celui d'une femme prête à accoucher.
  - type: heading
    content: Prophétie sur Damas
  '23':
  - type: text
    content: Sur Damas.
  - type: text
    content: Hamath et Arpad sont dans la honte,
  - type: text
    content: car elles ont appris une mauvaise nouvelle.
  - type: text
    content: Elles en tremblent,
  - type: text
    content: ce sont des vagues d'anxiété
  - type: text
    content: impossibles à calmer.
  '24':
  - type: text
    content: Damas s'affaisse, elle se tourne pour prendre la fuite
  - type: text
    content: et elle est saisie de panique.
  - type: text
    content: L'angoisse et les douleurs s'emparent d'elle,
  - type: text
    content: comme pour une femme prête à accoucher.
  '25':
  - type: text
    content: Comment! Elle n'a pas été évacuée, la ville dont on chantait les louanges,
  - type: text
    content: la ville qui faisait ma joie!
  '26':
  - type: text
    content: C'est pourquoi, ce jour-là, ses jeunes gens tomberont sur ses places
  - type: text
    content: et tous ses hommes de guerre seront réduits au silence,
  - type: text
    content: déclare l'Eternel, le maître de l'univers.
  '27':
  - type: text
    content: Je mettrai le feu aux murs de Damas,
  - type: text
    content: et il dévorera le palais de Ben-Hadad.
  - type: heading
    content: Prophétie sur Kédar et Hatsor
  '28':
  - type: text
    content: Sur Kédar et les royaumes de Hatsor auxquels Nebucadnetsar, roi de Babylone, infligea une défaite.
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: Levez-vous, montez à Kédar
  - type: text
    content: et semez la dévastation chez les nomades de l'est!
  '29':
  - type: text
    content: On prendra leurs tentes et leurs troupeaux,
  - type: text
    content: on s'emparera de leurs abris en toile, de tous leurs bagages et de leurs chameaux,
  - type: text
    content: 'et on leur criera: «La terreur règne de tous côtés!»'
  '3':
  - type: text
    content: Lamente-toi, Hesbon,
  - type: text
    content: car Aï est dévastée.
  - type: text
    content: Appelez à l'aide, filles de Rabba, habillez-vous de sacs,
  - type: text
    content: pleurez et allez de tous côtés le long des murailles,
  - type: text
    content: car Malcom part en exil
  - type: text
    content: avec ses prêtres et ses chefs.
  '30':
  - type: text
    content: Fuyez, décampez de toutes vos forces, cachez-vous dans les profondeurs,
  - type: text
    content: habitants de Hatsor, déclare l'Eternel.
  - type: text
    content: En effet, Nebucadnetsar, roi de Babylone, a pris une décision contre vous,
  - type: text
    content: il a formé un projet contre vous.
  '31':
  - type: text
    content: Levez-vous, montez contre une nation tranquille,
  - type: text
    content: qui habite en sécurité, déclare l'Eternel.
  - type: text
    content: Elle n'a ni portes ni verrous
  - type: text
    content: et elle habite à l'écart.
  '32':
  - type: text
    content: Leurs chameaux seront livrés au pillage
  - type: text
    content: et leurs nombreux troupeaux formeront un butin.
  - type: text
    content: Je les disperserai à tous les vents, ceux qui se rasent les coins de la barbe,
  - type: text
    content: et je ferai venir leur ruine de tous les côtés, déclare l'Eternel.
  '33':
  - type: text
    content: Hatsor sera le repaire des chacals, un désert pour toujours.
  - type: text
    content: Plus personne n'y habitera, aucun homme n'y séjournera.
  - type: heading
    content: Prophétie sur Elam
  '34':
  - type: text
    content: Voici la parole de l'Eternel adressée au prophète Jérémie à propos d'Elam, au début du règne de Sédécias sur Juda.
  '35':
  - type: text
    content: 'Voici ce que dit l''Eternel, le maître de l''univers:'
  - type: text
    content: Je vais briser l'arc d'Elam,
  - type: text
    content: sa principale force.
  '36':
  - type: text
    content: Je ferai venir sur Elam quatre vents venant des quatre coins du ciel
  - type: text
    content: et je les disperserai à tous ces vents.
  - type: text
    content: Il n'y aura pas une nation
  - type: text
    content: qui ne voie l'arrivée de réfugiés d'Elam.
  '37':
  - type: text
    content: Je ferai trembler les habitants d'Elam devant leurs ennemis,
  - type: text
    content: devant ceux qui en veulent à leur vie.
  - type: text
    content: J'amènerai sur eux le malheur,
  - type: text
    content: provoqué par mon ardente colère, déclare l'Eternel.
  - type: text
    content: J'enverrai l'épée à leur poursuite,
  - type: text
    content: jusqu'à leur extermination.
  '38':
  - type: text
    content: Je placerai mon trône dans Elam,
  - type: text
    content: et j'en ferai disparaître le roi et les chefs,
  - type: text
    content: déclare l'Eternel.
  '39':
  - type: text
    content: Cependant, dans l'avenir, je ramènerai les déportés d'Elam,
  - type: text
    content: déclare l'Eternel.
  '4':
  - type: text
    content: Pourquoi es-tu fière de tes vallées?
  - type: text
    content: Ta vallée se vide, fille rebelle.
  - type: text
    content: 'Elle plaçait sa confiance dans ses trésors et disait:'
  - type: text
    content: «Qui parviendra à m'atteindre?»
  '5':
  - type: text
    content: Je vais faire venir la frayeur sur toi,
  - type: text
    content: déclare le Seigneur, l'Eternel, le maître de l'univers.
  - type: text
    content: Elle viendra de tous les côtés.
  - type: text
    content: Chacun de vous sera chassé et partira droit devant lui,
  - type: text
    content: et il n'y aura personne pour rassembler les fuyards.
  '6':
  - type: text
    content: Cependant, après cela, je ramènerai les déportés des Ammonites,
  - type: text
    content: déclare l'Eternel.
  - type: heading
    content: Prophétie sur Edom
  '7':
  - type: text
    content: Sur Edom.
  - type: text
    content: 'Voici ce que dit l''Eternel, le maître de l''univers:'
  - type: text
    content: N'y a-t-il plus de sagesse dans Théman?
  - type: text
    content: Les conseils des hommes intelligents ont-ils disparu?
  - type: text
    content: Leur sagesse s'est-elle évanouie?
  '8':
  - type: text
    content: Fuyez, tournez le dos, allez vous réfugier dans les profondeurs,
  - type: text
    content: habitants de Dedan!
  - type: text
    content: En effet, je fais venir le malheur sur Esaü,
  - type: text
    content: c'est le moment de mon intervention contre lui.
  '9':
  - type: text
    content: '*Si des vendangeurs viennent chez toi,'
  - type: text
    content: laisseront-ils de quoi grappiller?
  - type: note
    content: 'Si des… grappiller: même texte en Abdias 5.'
  - type: text
    content: Si des voleurs viennent de nuit,
  - type: text
    content: ne détruiront-ils pas tout ce qu'ils peuvent?
