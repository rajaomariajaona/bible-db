document_id: JOB.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Intervention n° 2 de Job
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Job prit la parole et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Si seulement il était possible de peser mon exaspération,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si seulement on plaçait tous mes malheurs ensemble sur une balance!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils seraient plus lourds que le sable de la mer:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: voilà pourquoi mes paroles dépassent la mesure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Oui, les flèches du Tout-Puissant m'ont transpercé
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mon esprit en suce le venin;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les terreurs de Dieu se rangent en ordre de bataille contre moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: »L'âne sauvage se met-il à braire quand il est près de l'herbe?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le bœuf se met-il à mugir quand il est près de son fourrage?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mange-t-on ce qui est fade, sans sel?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Y a-t-il de la saveur dans le blanc d'un œuf?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ce que je voudrais ne pas toucher,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est justement ma nourriture, si dégoûtante soit-elle!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Si seulement mon vœu pouvait se réaliser!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si seulement Dieu pouvait m'accorder ce que j'attends!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: »Que Dieu consente donc à m'écraser,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'il libère sa main et m'achève!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il me restera au moins une consolation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'une joie, malgré la douleur dont il m''accable:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est que jamais je n'ai négligé les paroles du Saint.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: »Aurai-je encore la force d'espérer?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quelle sera ma fin, pour que je veuille persister à vivre?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ma force serait-elle aussi résistante que la pierre?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon corps serait-il en bronze?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: N'est-il pas vrai que je suis dépourvu de ressources,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que le succès a été chassé loin de moi?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: »Celui qui souffre a droit à la bienveillance de son ami,
- type: usfm
  marker: q1
  children:
  - type: text
    text: même s'il abandonne la crainte du Tout-Puissant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mes frères m'ont trompé comme le fait un torrent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme les cours d'eau qui disparaissent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: La fonte des glaces assombrit leur eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la neige s'y dissimule.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mais à la saison chaude, ils arrêtent de couler;
- type: usfm
  marker: q1
  children:
  - type: text
    text: sous l'effet de la chaleur, leur lit devient tout sec.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Les caravanes quittent leur chemin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: s'enfoncent dans le désert et disparaissent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Les caravanes de Théma les cherchent du regard,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les voyageurs de Séba sont pleins d'espoir,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: mais ils se retrouvent tout honteux d'avoir eu confiance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sont tout désappointés quand ils y arrivent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: »De fait, maintenant, vous n'êtes pas vraiment présents pour moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous voyez mon angoisse et vous en êtes tout effrayés!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Vous ai-je demandé de me donner quelque chose,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de tirer pour moi un cadeau de vos ressources,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: de me délivrer d'un adversaire
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou de me libérer d'hommes violents?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: »Enseignez-moi et je me tairai.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faites-moi comprendre quelle est mon erreur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Quelle force auraient des paroles à propos!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais que prouvent vos critiques?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Voulez-vous donc corriger ce que j'ai dit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous débarrasser des discours d'un désespéré?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Vous seriez même capables de tirer au sort pour un orphelin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de faire du commerce sur le dos de votre ami.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: »Et maintenant, je vous en prie, regardez-moi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous mentirais-je en face?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Revenez donc, je vous en prie, ne soyez pas injustes!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Revenez et reconnaissez-le, ma justice est intacte dans cette affaire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Y a-t-il de l'injustice sur ma langue
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ma bouche ne discerne-t-elle pas le mal?
