document_id: JOB.6,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Intervention n° 2 de Job
  - type: text
    content: 'Job prit la parole et dit:'
  '10':
  - type: text
    content: Il me restera au moins une consolation,
  - type: text
    content: 'une joie, malgré la douleur dont il m''accable:'
  - type: text
    content: c'est que jamais je n'ai négligé les paroles du Saint.
  '11':
  - type: text
    content: »Aurai-je encore la force d'espérer?
  - type: text
    content: Quelle sera ma fin, pour que je veuille persister à vivre?
  '12':
  - type: text
    content: Ma force serait-elle aussi résistante que la pierre?
  - type: text
    content: Mon corps serait-il en bronze?
  '13':
  - type: text
    content: N'est-il pas vrai que je suis dépourvu de ressources,
  - type: text
    content: que le succès a été chassé loin de moi?
  '14':
  - type: text
    content: »Celui qui souffre a droit à la bienveillance de son ami,
  - type: text
    content: même s'il abandonne la crainte du Tout-Puissant.
  '15':
  - type: text
    content: Mes frères m'ont trompé comme le fait un torrent,
  - type: text
    content: comme les cours d'eau qui disparaissent.
  '16':
  - type: text
    content: La fonte des glaces assombrit leur eau,
  - type: text
    content: la neige s'y dissimule.
  '17':
  - type: text
    content: Mais à la saison chaude, ils arrêtent de couler;
  - type: text
    content: sous l'effet de la chaleur, leur lit devient tout sec.
  '18':
  - type: text
    content: Les caravanes quittent leur chemin,
  - type: text
    content: s'enfoncent dans le désert et disparaissent.
  '19':
  - type: text
    content: Les caravanes de Théma les cherchent du regard,
  - type: text
    content: les voyageurs de Séba sont pleins d'espoir,
  '2':
  - type: text
    content: «Si seulement il était possible de peser mon exaspération,
  - type: text
    content: si seulement on plaçait tous mes malheurs ensemble sur une balance!
  '20':
  - type: text
    content: mais ils se retrouvent tout honteux d'avoir eu confiance,
  - type: text
    content: ils sont tout désappointés quand ils y arrivent.
  '21':
  - type: text
    content: »De fait, maintenant, vous n'êtes pas vraiment présents pour moi.
  - type: text
    content: Vous voyez mon angoisse et vous en êtes tout effrayés!
  '22':
  - type: text
    content: Vous ai-je demandé de me donner quelque chose,
  - type: text
    content: de tirer pour moi un cadeau de vos ressources,
  '23':
  - type: text
    content: de me délivrer d'un adversaire
  - type: text
    content: ou de me libérer d'hommes violents?
  '24':
  - type: text
    content: »Enseignez-moi et je me tairai.
  - type: text
    content: Faites-moi comprendre quelle est mon erreur!
  '25':
  - type: text
    content: Quelle force auraient des paroles à propos!
  - type: text
    content: Mais que prouvent vos critiques?
  '26':
  - type: text
    content: Voulez-vous donc corriger ce que j'ai dit,
  - type: text
    content: vous débarrasser des discours d'un désespéré?
  '27':
  - type: text
    content: Vous seriez même capables de tirer au sort pour un orphelin,
  - type: text
    content: de faire du commerce sur le dos de votre ami.
  '28':
  - type: text
    content: »Et maintenant, je vous en prie, regardez-moi!
  - type: text
    content: Vous mentirais-je en face?
  '29':
  - type: text
    content: Revenez donc, je vous en prie, ne soyez pas injustes!
  - type: text
    content: Revenez et reconnaissez-le, ma justice est intacte dans cette affaire.
  '3':
  - type: text
    content: 'Ils seraient plus lourds que le sable de la mer:'
  - type: text
    content: voilà pourquoi mes paroles dépassent la mesure.
  '30':
  - type: text
    content: Y a-t-il de l'injustice sur ma langue
  - type: text
    content: et ma bouche ne discerne-t-elle pas le mal?
  '4':
  - type: text
    content: Oui, les flèches du Tout-Puissant m'ont transpercé
  - type: text
    content: et mon esprit en suce le venin;
  - type: text
    content: les terreurs de Dieu se rangent en ordre de bataille contre moi.
  '5':
  - type: text
    content: »L'âne sauvage se met-il à braire quand il est près de l'herbe?
  - type: text
    content: Le bœuf se met-il à mugir quand il est près de son fourrage?
  '6':
  - type: text
    content: Mange-t-on ce qui est fade, sans sel?
  - type: text
    content: Y a-t-il de la saveur dans le blanc d'un œuf?
  '7':
  - type: text
    content: Ce que je voudrais ne pas toucher,
  - type: text
    content: c'est justement ma nourriture, si dégoûtante soit-elle!
  '8':
  - type: text
    content: Si seulement mon vœu pouvait se réaliser!
  - type: text
    content: Si seulement Dieu pouvait m'accorder ce que j'attends!
  '9':
  - type: text
    content: »Que Dieu consente donc à m'écraser,
  - type: text
    content: qu'il libère sa main et m'achève!
