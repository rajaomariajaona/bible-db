document_id: JOB.6,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Intervention n° 2 de Job
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Job prit la parole et dit:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il me restera au moins une consolation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'une joie, malgré la douleur dont il m''accable:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est que jamais je n'ai négligé les paroles du Saint.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Aurai-je encore la force d'espérer?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quelle sera ma fin, pour que je veuille persister à vivre?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma force serait-elle aussi résistante que la pierre?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon corps serait-il en bronze?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N'est-il pas vrai que je suis dépourvu de ressources,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que le succès a été chassé loin de moi?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Celui qui souffre a droit à la bienveillance de son ami,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: même s'il abandonne la crainte du Tout-Puissant.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes frères m'ont trompé comme le fait un torrent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme les cours d'eau qui disparaissent.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La fonte des glaces assombrit leur eau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la neige s'y dissimule.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais à la saison chaude, ils arrêtent de couler;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sous l'effet de la chaleur, leur lit devient tout sec.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les caravanes quittent leur chemin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: s'enfoncent dans le désert et disparaissent.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les caravanes de Théma les cherchent du regard,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les voyageurs de Séba sont pleins d'espoir,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Si seulement il était possible de peser mon exaspération,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si seulement on plaçait tous mes malheurs ensemble sur une balance!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ils se retrouvent tout honteux d'avoir eu confiance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont tout désappointés quand ils y arrivent.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »De fait, maintenant, vous n'êtes pas vraiment présents pour moi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous voyez mon angoisse et vous en êtes tout effrayés!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous ai-je demandé de me donner quelque chose,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de tirer pour moi un cadeau de vos ressources,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de me délivrer d'un adversaire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou de me libérer d'hommes violents?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Enseignez-moi et je me tairai.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faites-moi comprendre quelle est mon erreur!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quelle force auraient des paroles à propos!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais que prouvent vos critiques?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voulez-vous donc corriger ce que j'ai dit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous débarrasser des discours d'un désespéré?
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous seriez même capables de tirer au sort pour un orphelin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de faire du commerce sur le dos de votre ami.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Et maintenant, je vous en prie, regardez-moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous mentirais-je en face?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Revenez donc, je vous en prie, ne soyez pas injustes!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Revenez et reconnaissez-le, ma justice est intacte dans cette affaire.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils seraient plus lourds que le sable de la mer:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voilà pourquoi mes paroles dépassent la mesure.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Y a-t-il de l'injustice sur ma langue
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ma bouche ne discerne-t-elle pas le mal?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, les flèches du Tout-Puissant m'ont transpercé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mon esprit en suce le venin;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les terreurs de Dieu se rangent en ordre de bataille contre moi.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »L'âne sauvage se met-il à braire quand il est près de l'herbe?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le bœuf se met-il à mugir quand il est près de son fourrage?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mange-t-on ce qui est fade, sans sel?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Y a-t-il de la saveur dans le blanc d'un œuf?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce que je voudrais ne pas toucher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est justement ma nourriture, si dégoûtante soit-elle!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si seulement mon vœu pouvait se réaliser!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si seulement Dieu pouvait m'accorder ce que j'attends!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Que Dieu consente donc à m'écraser,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'il libère sa main et m'achève!
