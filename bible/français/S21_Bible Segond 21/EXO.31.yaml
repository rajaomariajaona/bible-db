document_id: EXO.31
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Des artisans qualifiés par l'Esprit
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Sache que j''ai choisi Betsaleel, fils d''Uri et petit-fils de Hur, de la tribu de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Je l''ai rempli de l''Esprit de Dieu, d''habileté, d''intelligence et de savoir-faire pour toutes sortes de travaux. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je l''ai rendu capable de faire des inventions, de travailler l''or, l''argent et le bronze, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'de graver les pierres à enchâsser, de travailler le bois et de réaliser toutes sortes de travaux. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je lui ai moi-même donné pour aide Oholiab, fils d''Ahisamac, de la tribu de Dan. J''ai mis de l''habileté dans l''esprit de tous les artisans pour qu''ils fassent tout ce que je t''ai ordonné: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'la tente de la rencontre, l''arche du témoignage, le propitiatoire qui la couvrira et tous les ustensiles de la tente, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'la table et ses ustensiles, le chandelier d''or pur et tous ses ustensiles, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'l''autel des parfums, l''autel des holocaustes et tous ses ustensiles, la cuve avec sa base, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'les vêtements de service, les vêtements sacrés pour le grand-prêtre Aaron, les vêtements de ses fils pour leurs fonctions en tant que prêtres, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: l'huile d'onction et le parfum odoriférant pour le sanctuaire. Ils se conformeront à tous les ordres que j'ai donnés.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rappel du sabbat
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '«Transmets ces instructions aux Israélites: Vous observerez bien mes sabbats, car ce sera entre moi et vous, au fil des générations, un signe auquel on reconnaîtra que je suis l''Eternel qui vous considère comme saints. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Vous respecterez le sabbat, car il est saint pour vous. Celui qui le violera sera puni de mort. Oui, toute personne qui accomplira un travail ce jour-là sera exclue de son peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Pendant 6 jours on travaillera, mais le septième jour est le sabbat, le jour du repos, consacré à l''Eternel. Toute personne qui accomplira un travail le jour du sabbat sera punie de mort. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les Israélites respecteront le sabbat en le célébrant, au fil des générations, comme une alliance éternelle. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ce sera entre moi et les Israélites un signe qui devra durer à perpétuité. En effet, en 6 jours l'Eternel a fait le ciel et la terre, et le septième jour il s'est arrêté et s'est reposé.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Lorsque l'Eternel eut fini de parler à Moïse sur le mont Sinaï, il lui donna les deux tables du témoignage, tables de pierre écrites du doigt de Dieu.
