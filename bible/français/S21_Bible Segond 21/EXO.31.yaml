document_id: EXO.31,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Des artisans qualifiés par l'Esprit
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '10':
  - type: text
    content: 'les vêtements de service, les vêtements sacrés pour le grand-prêtre Aaron, les vêtements de ses fils pour leurs fonctions en tant que prêtres, '
  '11':
  - type: text
    content: l'huile d'onction et le parfum odoriférant pour le sanctuaire. Ils se conformeront à tous les ordres que j'ai donnés.»
  - type: heading
    content: Rappel du sabbat
  '12':
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '13':
  - type: text
    content: '«Transmets ces instructions aux Israélites: Vous observerez bien mes sabbats, car ce sera entre moi et vous, au fil des générations, un signe auquel on reconnaîtra que je suis l''Eternel qui vous considère comme saints. '
  '14':
  - type: text
    content: 'Vous respecterez le sabbat, car il est saint pour vous. Celui qui le violera sera puni de mort. Oui, toute personne qui accomplira un travail ce jour-là sera exclue de son peuple. '
  '15':
  - type: text
    content: 'Pendant 6 jours on travaillera, mais le septième jour est le sabbat, le jour du repos, consacré à l''Eternel. Toute personne qui accomplira un travail le jour du sabbat sera punie de mort. '
  '16':
  - type: text
    content: 'Les Israélites respecteront le sabbat en le célébrant, au fil des générations, comme une alliance éternelle. '
  '17':
  - type: text
    content: Ce sera entre moi et les Israélites un signe qui devra durer à perpétuité. En effet, en 6 jours l'Eternel a fait le ciel et la terre, et le septième jour il s'est arrêté et s'est reposé.»
  '18':
  - type: text
    content: Lorsque l'Eternel eut fini de parler à Moïse sur le mont Sinaï, il lui donna les deux tables du témoignage, tables de pierre écrites du doigt de Dieu.
  '2':
  - type: text
    content: '«Sache que j''ai choisi Betsaleel, fils d''Uri et petit-fils de Hur, de la tribu de Juda. '
  '3':
  - type: text
    content: 'Je l''ai rempli de l''Esprit de Dieu, d''habileté, d''intelligence et de savoir-faire pour toutes sortes de travaux. '
  '4':
  - type: text
    content: 'Je l''ai rendu capable de faire des inventions, de travailler l''or, l''argent et le bronze, '
  '5':
  - type: text
    content: 'de graver les pierres à enchâsser, de travailler le bois et de réaliser toutes sortes de travaux. '
  '6':
  - type: text
    content: 'Je lui ai moi-même donné pour aide Oholiab, fils d''Ahisamac, de la tribu de Dan. J''ai mis de l''habileté dans l''esprit de tous les artisans pour qu''ils fassent tout ce que je t''ai ordonné: '
  '7':
  - type: text
    content: 'la tente de la rencontre, l''arche du témoignage, le propitiatoire qui la couvrira et tous les ustensiles de la tente, '
  '8':
  - type: text
    content: 'la table et ses ustensiles, le chandelier d''or pur et tous ses ustensiles, '
  '9':
  - type: text
    content: 'l''autel des parfums, l''autel des holocaustes et tous ses ustensiles, la cuve avec sa base, '
