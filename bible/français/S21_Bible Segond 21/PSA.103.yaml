document_id: PSA.103
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hymne de louange
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: De David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bénis l'Eternel, mon âme!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tout ce qui est en moi bénisse son saint nom!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Bénis l'Eternel, mon âme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et n'oublie aucun de ses bienfaits!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C'est lui qui pardonne toutes tes fautes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui guérit toutes tes maladies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: C'est lui qui délivre ta vie de la tombe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui te couronne de bonté et de compassion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: C'est lui qui rassasie de biens ta vieillesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui te fait rajeunir comme l'aigle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: L'Eternel fait justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il fait droit à tous les opprimés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il a fait connaître ses voies à Moïse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses hauts faits aux enfants d'Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L'Eternel fait grâce, il est rempli de compassion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est lent à la colère et riche en bonté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il ne conteste pas sans fin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne garde pas éternellement sa colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il ne nous traite pas conformément à nos péchés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne nous punit pas comme le mériteraient nos fautes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: mais autant le ciel est élevé au-dessus de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: autant sa bonté est grande pour ceux qui le craignent;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: autant l'orient est éloigné de l'occident,
- type: usfm
  marker: q1
  children:
  - type: text
    text: autant il éloigne de nous nos transgressions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Comme un père a compassion de ses enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'Eternel a compassion de ceux qui le craignent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: car il sait de quoi nous sommes faits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il se souvient que nous sommes poussière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: L'homme? Ses jours sont comme l'herbe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'il fleurit comme la fleur des champs:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: lorsqu'un vent souffle sur elle, elle disparaît,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la place qu'elle occupait ne la reconnaît plus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '*Mais la bonté de l''Eternel dure d''éternité en éternité pour ceux qui le craignent'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '103.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Mais la bonté… craignent: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité dans le cantique de Marie en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luc 1.50
      metadata:
        usfm: LUK.1.50
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa justice demeure pour les enfants de leurs enfants,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: pour ceux qui gardent son alliance
- type: usfm
  marker: q1
  children:
  - type: text
    text: et se souviennent de ses commandements pour les mettre en pratique.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: L'Eternel a établi son trône dans le ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son règne domine tout l'univers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Bénissez l'Eternel, vous ses anges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui êtes puissants et forts et qui exécutez ses ordres
- type: usfm
  marker: q1
  children:
  - type: text
    text: en obéissant à sa parole!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Bénissez l'Eternel, toutes ses armées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous qui êtes ses serviteurs et qui faites sa volonté!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Bénissez l'Eternel, vous, toutes ses œuvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans tous les lieux où il domine!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Bénis l'Eternel, mon âme!
