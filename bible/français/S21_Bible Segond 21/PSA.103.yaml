document_id: PSA.103,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Hymne de louange
  - type: text
    content: De David.
  - type: text
    content: Bénis l'Eternel, mon âme!
  - type: text
    content: Que tout ce qui est en moi bénisse son saint nom!
  '10':
  - type: text
    content: Il ne nous traite pas conformément à nos péchés,
  - type: text
    content: il ne nous punit pas comme le mériteraient nos fautes,
  '11':
  - type: text
    content: mais autant le ciel est élevé au-dessus de la terre,
  - type: text
    content: autant sa bonté est grande pour ceux qui le craignent;
  '12':
  - type: text
    content: autant l'orient est éloigné de l'occident,
  - type: text
    content: autant il éloigne de nous nos transgressions.
  '13':
  - type: text
    content: Comme un père a compassion de ses enfants,
  - type: text
    content: l'Eternel a compassion de ceux qui le craignent,
  '14':
  - type: text
    content: car il sait de quoi nous sommes faits,
  - type: text
    content: il se souvient que nous sommes poussière.
  '15':
  - type: text
    content: L'homme? Ses jours sont comme l'herbe,
  - type: text
    content: 'il fleurit comme la fleur des champs:'
  '16':
  - type: text
    content: lorsqu'un vent souffle sur elle, elle disparaît,
  - type: text
    content: et la place qu'elle occupait ne la reconnaît plus.
  '17':
  - type: text
    content: '*Mais la bonté de l''Eternel dure d''éternité en éternité pour ceux qui le craignent'
  - type: note
    content: 'Mais la bonté… craignent: cité dans le cantique de Marie en Luc 1.50.'
  - type: text
    content: ','
  - type: text
    content: et sa justice demeure pour les enfants de leurs enfants,
  '18':
  - type: text
    content: pour ceux qui gardent son alliance
  - type: text
    content: et se souviennent de ses commandements pour les mettre en pratique.
  '19':
  - type: text
    content: L'Eternel a établi son trône dans le ciel,
  - type: text
    content: et son règne domine tout l'univers.
  '2':
  - type: text
    content: Bénis l'Eternel, mon âme,
  - type: text
    content: et n'oublie aucun de ses bienfaits!
  '20':
  - type: text
    content: Bénissez l'Eternel, vous ses anges,
  - type: text
    content: qui êtes puissants et forts et qui exécutez ses ordres
  - type: text
    content: en obéissant à sa parole!
  '21':
  - type: text
    content: Bénissez l'Eternel, toutes ses armées,
  - type: text
    content: vous qui êtes ses serviteurs et qui faites sa volonté!
  '22':
  - type: text
    content: Bénissez l'Eternel, vous, toutes ses œuvres,
  - type: text
    content: dans tous les lieux où il domine!
  - type: text
    content: Bénis l'Eternel, mon âme!
  '3':
  - type: text
    content: C'est lui qui pardonne toutes tes fautes,
  - type: text
    content: qui guérit toutes tes maladies.
  '4':
  - type: text
    content: C'est lui qui délivre ta vie de la tombe,
  - type: text
    content: qui te couronne de bonté et de compassion.
  '5':
  - type: text
    content: C'est lui qui rassasie de biens ta vieillesse,
  - type: text
    content: qui te fait rajeunir comme l'aigle.
  '6':
  - type: text
    content: L'Eternel fait justice,
  - type: text
    content: il fait droit à tous les opprimés.
  '7':
  - type: text
    content: Il a fait connaître ses voies à Moïse,
  - type: text
    content: ses hauts faits aux enfants d'Israël.
  '8':
  - type: text
    content: L'Eternel fait grâce, il est rempli de compassion,
  - type: text
    content: il est lent à la colère et riche en bonté.
  '9':
  - type: text
    content: Il ne conteste pas sans fin,
  - type: text
    content: il ne garde pas éternellement sa colère.
