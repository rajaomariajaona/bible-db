document_id: MRK.14,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Mort et résurrection de Jésus
  - type: heading
    content: 14.1–16.20
  - type: heading
    content: Complot contre Jésus
  - type: text
    content: 'La fête de la Pâque et des pains sans levain devait avoir lieu deux jours après. Les chefs des prêtres et les spécialistes de la loi cherchaient les moyens d''arrêter Jésus par ruse et de le faire mourir. '
  '10':
  - type: text
    content: 'Judas l''Iscariot, l''un des douze, alla vers les chefs des prêtres afin de leur livrer Jésus. '
  '11':
  - type: text
    content: Ils se réjouirent en l'entendant et promirent de lui donner de l'argent. Quant à Judas, il se mit à chercher une occasion favorable pour le trahir.
  - type: heading
    content: Institution de la cène
  '12':
  - type: text
    content: 'Le premier jour des pains sans levain, où l''on sacrifiait l''agneau pascal, les disciples de Jésus lui dirent: «Où veux-tu que nous allions te préparer le repas de la Pâque'
  - type: note
    content: 'La Pâque: fête juive qui commémorait la sortie d''Egypte des Israélites, leur libération de l''esclavage et le fait que la vie de leurs fils aînés avait été épargnée.'
  - type: text
    content: '?» '
  '13':
  - type: text
    content: 'Il envoya deux de ses disciples et leur dit: «Allez à la ville. Vous rencontrerez un homme qui porte une cruche d''eau: suivez-le. '
  '14':
  - type: text
    content: 'Là où il entrera, dites au propriétaire de la maison: ‘Le maître dit: Où est la salle où je mangerai la Pâque avec mes disciples?’ '
  '15':
  - type: text
    content: 'Alors il vous montrera une grande chambre à l''étage, aménagée et toute prête: c''est là que vous nous préparerez la Pâque.» '
  '16':
  - type: text
    content: Ses disciples partirent, arrivèrent à la ville et trouvèrent tout comme il le leur avait dit, et ils préparèrent la Pâque.
  '17':
  - type: text
    content: 'Le soir venu, il s''y rendit avec les douze. '
  '18':
  - type: text
    content: 'Pendant qu''ils étaient à table et qu''ils mangeaient, Jésus dit: «Je vous le dis en vérité, l''un de vous, qui mange avec moi, me trahira.» '
  '19':
  - type: text
    content: 'Ils devinrent tout tristes et lui dirent l''un après l''autre: «Est-ce moi?» '
  '2':
  - type: text
    content: 'Ils se disaient en effet: «Que ce ne soit pas pendant la fête, afin qu''il n''y ait pas d''agitation parmi le peuple.»'
  - type: heading
    content: Une femme verse du parfum sur Jésus
  '20':
  - type: text
    content: 'Il leur répondit: «C''est l''un des douze, celui qui met la main dans le plat avec moi. '
  '21':
  - type: text
    content: Le Fils de l'homme s'en va conformément à ce qui est écrit à son sujet, mais malheur à l'homme par qui le Fils de l'homme est trahi! Mieux vaudrait pour cet homme qu'il ne soit pas né.»
  '22':
  - type: text
    content: 'Pendant qu''ils mangeaient, Jésus prit du pain et, après avoir prononcé la prière de bénédiction, il le rompit et le leur donna en disant: «Prenez, [mangez,] ceci est mon corps.» '
  '23':
  - type: text
    content: 'Il prit ensuite une coupe et, après avoir remercié Dieu, il la leur donna et ils en burent tous. '
  '24':
  - type: text
    content: 'Il leur dit: «Ceci est mon sang, le sang de la [nouvelle] alliance, qui est versé pour beaucoup. '
  '25':
  - type: text
    content: Je vous le dis en vérité, je ne boirai plus jamais du fruit de la vigne, jusqu'au jour où je le boirai nouveau dans le royaume de Dieu.»
  '26':
  - type: text
    content: 'Après avoir chanté les psaumes, ils se rendirent au mont des Oliviers. '
  '27':
  - type: text
    content: 'Jésus leur dit: «Vous trébucherez tous, [cette nuit, à cause de moi,] car il est écrit: '
  - type: text
    content: Je frapperai le berger, et les brebis seront dispersées
  - type: text
    content: .
  - type: note
    content: 'Je frapperai… dispersées: citation de Zacharie 13.7.'
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Mais, après ma résurrection, je vous précéderai en Galilée.» '
  '29':
  - type: text
    content: 'Pierre lui dit: «Même si tous trébuchent, ce ne sera pas mon cas.» '
  '3':
  - type: text
    content: Comme Jésus était à Béthanie, dans la maison de Simon le lépreux, une femme entra pendant qu'il se trouvait à table. Elle tenait un vase qui contenait un parfum de nard
  - type: note
    content: 'Nard: plante.'
  - type: text
    content: ' pur très cher. Elle brisa le vase et versa le parfum sur la tête de Jésus. '
  '30':
  - type: text
    content: 'Jésus lui dit: «Je te le dis en vérité, aujourd''hui, cette nuit même, avant que le coq chante [deux fois], toi, tu me renieras trois fois.» '
  '31':
  - type: text
    content: 'Mais Pierre reprit plus fortement: «Même s''il me faut mourir avec toi, je ne te renierai pas.» Et tous dirent la même chose.'
  - type: heading
    content: Arrestation de Jésus
  '32':
  - type: text
    content: 'Ils se rendirent ensuite dans un endroit appelé Gethsémané, et Jésus dit à ses disciples: «Asseyez-vous ici pendant que je prierai.» '
  '33':
  - type: text
    content: 'Il prit avec lui Pierre, Jacques et Jean, et il commença à être saisi de frayeur et d''angoisse. '
  '34':
  - type: text
    content: 'Il leur dit: «Mon âme est triste à en mourir; restez ici, éveillés.» '
  '35':
  - type: text
    content: 'Puis il avança de quelques pas, se jeta contre terre et pria que, si cela était possible, cette heure s''éloigne de lui. '
  '36':
  - type: text
    content: 'Il disait: «Abba, Père, tout t''est possible. Eloigne de moi cette coupe! Toutefois, non pas ce que je veux, mais ce que tu veux.» '
  '37':
  - type: text
    content: 'Il vint vers les disciples, qu''il trouva endormis, et il dit à Pierre: «Simon, tu dors! Tu n''as pas pu rester éveillé une seule heure! '
  '38':
  - type: text
    content: 'Restez vigilants et priez pour ne pas céder à la tentation. L''esprit est bien disposé, mais par nature l''homme est faible.» '
  '39':
  - type: text
    content: 'Il s''éloigna de nouveau et fit la même prière. '
  '4':
  - type: text
    content: 'Quelques-uns exprimèrent leur indignation entre eux: «A quoi bon gaspiller ce parfum? '
  '40':
  - type: text
    content: 'Il revint et les trouva encore endormis, car ils avaient les paupières lourdes. Ils ne surent que lui répondre. '
  '41':
  - type: text
    content: 'Il revint pour la troisième fois et leur dit: «Vous dormez maintenant et vous vous reposez! C''est assez! L''heure est venue; voici que le Fils de l''homme est livré entre les mains des pécheurs. '
  '42':
  - type: text
    content: Levez-vous, allons-y! Celui qui me trahit s'approche.»
  '43':
  - type: text
    content: 'Il parlait encore quand soudain arriva Judas, l''un des douze, avec une foule armée d''épées et de bâtons envoyée par les chefs des prêtres, par les spécialistes de la loi et par les anciens. '
  '44':
  - type: text
    content: 'Celui qui le trahissait leur avait donné ce signe: «L''homme auquel je donnerai un baiser, c''est lui. Arrêtez-le et emmenez-le sous bonne garde!» '
  '45':
  - type: text
    content: 'Dès qu''il fut arrivé, il s''approcha de Jésus en disant: «Maître!» et il l''embrassa. '
  '46':
  - type: text
    content: Alors ces gens mirent la main sur Jésus et l'arrêtèrent.
  '47':
  - type: text
    content: 'Un de ceux qui étaient là tira l''épée, frappa le serviteur du grand-prêtre et lui emporta l''oreille. '
  '48':
  - type: text
    content: 'Jésus prit la parole et leur dit: «Vous êtes venus vous emparer de moi avec des épées et des bâtons, comme pour un brigand. '
  '49':
  - type: text
    content: J'étais tous les jours parmi vous, enseignant dans le temple, et vous ne m'avez pas arrêté. Mais c'est afin que les Ecritures soient accomplies.»
  '5':
  - type: text
    content: 'On aurait pu le vendre plus de 300 pièces d''argent et les donner aux pauvres» et ils s''irritaient contre cette femme. '
  '50':
  - type: text
    content: 'Alors tous l''abandonnèrent et prirent la fuite. '
  '51':
  - type: text
    content: 'Un jeune homme le suivait, habillé d''un simple drap. On l''attrapa, '
  '52':
  - type: text
    content: mais il lâcha le drap et se sauva tout nu.
  - type: heading
    content: Jésus devant le conseil juif
  '53':
  - type: text
    content: 'Ils emmenèrent Jésus chez le grand-prêtre, où se rassemblèrent tous les chefs des prêtres, les anciens et les spécialistes de la loi. '
  '54':
  - type: text
    content: Pierre le suivit de loin jusqu'à l'intérieur de la cour du grand-prêtre; il s'assit avec les serviteurs et il se chauffait près du feu.
  '55':
  - type: text
    content: Les chefs des prêtres et tout le sanhédrin
  - type: note
    content: 'Sanhédrin: conseil juif présidé par le grand-prêtre, qui faisait office de gouvernement et de tribunal pour les affaires qui n''étaient pas du ressort des Romains.'
  - type: text
    content: ' cherchaient un témoignage contre Jésus pour le faire mourir, et ils n''en trouvaient pas. '
  '56':
  - type: text
    content: 'Beaucoup rendaient en effet de faux témoignages contre lui, mais les témoignages n''étaient pas concordants. '
  '57':
  - type: text
    content: 'Quelques-uns se levèrent et portèrent un faux témoignage contre lui en disant: '
  '58':
  - type: text
    content: '«Nous l''avons entendu dire: ‘Je détruirai ce temple fait par la main de l''homme, et en trois jours j''en construirai un autre qui ne sera pas fait de main d''homme.’» '
  '59':
  - type: text
    content: 'Même sur ce point-là, leurs témoignages ne concordaient pas. '
  '6':
  - type: text
    content: 'Mais Jésus dit: «Laissez-la. Pourquoi lui faites-vous de la peine? Elle a fait une bonne action envers moi. '
  '60':
  - type: text
    content: 'Alors le grand-prêtre se leva au milieu de l''assemblée et interrogea Jésus en disant: «Ne réponds-tu rien? Pourquoi ces gens témoignent-ils contre toi?» '
  '61':
  - type: text
    content: 'Mais Jésus gardait le silence et ne répondit rien. Le grand-prêtre l''interrogea de nouveau et lui dit: «Es-tu le Messie, le Fils du Dieu béni?» '
  '62':
  - type: text
    content: 'Jésus répondit: «Je le suis. Et vous verrez '
  - type: text
    content: le Fils de l'homme assis à la droite du Tout-Puissant
  - type: text
    content: ' et '
  - type: text
    content: venant sur les nuées du ciel
  - type: text
    content: .
  - type: note
    content: 'Le Fils… ciel: citation combinant le Psaume 110.1 et Daniel 7.13; Jésus s''identifie ainsi au Messie qui, dans la vision de Daniel, reçoit le gouvernement de l''univers.'
  - type: text
    content: '» '
  '63':
  - type: text
    content: 'Alors le grand-prêtre déchira ses vêtements et dit: «Qu''avons-nous encore besoin de témoins? '
  '64':
  - type: text
    content: 'Vous avez entendu le blasphème. Qu''en pensez-vous?» Tous le condamnèrent, déclarant qu''il méritait la mort. '
  '65':
  - type: text
    content: 'Quelques-uns se mirent à cracher sur lui, à lui mettre un voile sur le visage et à le frapper à coups de poing en lui disant: «Devine!» Même les serviteurs le frappaient en lui donnant des gifles.'
  '66':
  - type: text
    content: 'Pendant que Pierre était en bas dans la cour, une des servantes du grand-prêtre arriva. '
  '67':
  - type: text
    content: 'Elle vit Pierre qui se chauffait, le regarda et lui dit: «Toi aussi, tu étais avec Jésus de Nazareth.» '
  '68':
  - type: text
    content: 'Il le nia en disant: «Je ne sais ni ne comprends ce que tu veux dire.» Puis il sortit pour aller dans le vestibule. [Alors un coq chanta.] '
  '69':
  - type: text
    content: 'La servante le vit et se mit à dire de nouveau à ceux qui étaient présents: «Il fait partie de ces gens-là.» Il le nia de nouveau. '
  '7':
  - type: text
    content: 'En effet, vous avez toujours les pauvres avec vous et vous pouvez leur faire du bien quand vous le voulez, mais vous ne m''aurez pas toujours. '
  '70':
  - type: text
    content: 'Peu après, ceux qui étaient présents dirent encore à Pierre: «Certainement, tu fais partie de ces gens-là, car tu es galiléen, [tu as le même langage].» '
  '71':
  - type: text
    content: 'Alors il se mit à jurer en lançant des malédictions: «Je ne connais pas cet homme dont vous parlez.» '
  '72':
  - type: text
    content: '[Aussitôt,] pour la seconde fois, un coq chanta. Pierre se souvint alors de ce que Jésus lui avait dit: «Avant que le coq chante deux fois, tu me renieras trois fois.» Et en y réfléchissant, il pleurait.'
  '8':
  - type: text
    content: 'Elle a fait ce qu''elle a pu, elle a d''avance parfumé mon corps pour l''ensevelissement. '
  '9':
  - type: text
    content: Je vous le dis en vérité, partout où cette bonne nouvelle sera proclamée, dans le monde entier, on racontera aussi en souvenir de cette femme ce qu'elle a fait.»
