document_id: MRK.14,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Mort et résurrection de Jésus
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 14.1–16.20
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Complot contre Jésus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La fête de la Pâque et des pains sans levain devait avoir lieu deux jours après. Les chefs des prêtres et les spécialistes de la loi cherchaient les moyens d''arrêter Jésus par ruse et de le faire mourir. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Judas l''Iscariot, l''un des douze, alla vers les chefs des prêtres afin de leur livrer Jésus. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils se réjouirent en l'entendant et promirent de lui donner de l'argent. Quant à Judas, il se mit à chercher une occasion favorable pour le trahir.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Institution de la cène
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le premier jour des pains sans levain, où l''on sacrifiait l''agneau pascal, les disciples de Jésus lui dirent: «Où veux-tu que nous allions te préparer le repas de la Pâque'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'La Pâque: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fête juive qui commémorait la sortie d'Egypte des Israélites, leur libération de l'esclavage et le fait que la vie de leurs fils aînés avait été épargnée.
      marker-yv: yv-n
    - type: text
      text: '?» '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il envoya deux de ses disciples et leur dit: «Allez à la ville. Vous rencontrerez un homme qui porte une cruche d''eau: suivez-le. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Là où il entrera, dites au propriétaire de la maison: ‘Le maître dit: Où est la salle où je mangerai la Pâque avec mes disciples?’ '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors il vous montrera une grande chambre à l''étage, aménagée et toute prête: c''est là que vous nous préparerez la Pâque.» '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ses disciples partirent, arrivèrent à la ville et trouvèrent tout comme il le leur avait dit, et ils préparèrent la Pâque.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le soir venu, il s''y rendit avec les douze. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant qu''ils étaient à table et qu''ils mangeaient, Jésus dit: «Je vous le dis en vérité, l''un de vous, qui mange avec moi, me trahira.» '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils devinrent tout tristes et lui dirent l''un après l''autre: «Est-ce moi?» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils se disaient en effet: «Que ce ne soit pas pendant la fête, afin qu''il n''y ait pas d''agitation parmi le peuple.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Une femme verse du parfum sur Jésus
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur répondit: «C''est l''un des douze, celui qui met la main dans le plat avec moi. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le Fils de l'homme s'en va conformément à ce qui est écrit à son sujet, mais malheur à l'homme par qui le Fils de l'homme est trahi! Mieux vaudrait pour cet homme qu'il ne soit pas né.»
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant qu''ils mangeaient, Jésus prit du pain et, après avoir prononcé la prière de bénédiction, il le rompit et le leur donna en disant: «Prenez, [mangez,] ceci est mon corps.» '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il prit ensuite une coupe et, après avoir remercié Dieu, il la leur donna et ils en burent tous. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur dit: «Ceci est mon sang, le sang de la [nouvelle] alliance, qui est versé pour beaucoup. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je vous le dis en vérité, je ne boirai plus jamais du fruit de la vigne, jusqu'au jour où je le boirai nouveau dans le royaume de Dieu.»
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après avoir chanté les psaumes, ils se rendirent au mont des Oliviers. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur dit: «Vous trébucherez tous, [cette nuit, à cause de moi,] car il est écrit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Je frapperai le berger, et les brebis seront dispersées
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je frapperai… dispersées: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Zacharie 13.7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais, après ma résurrection, je vous précéderai en Galilée.» '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre lui dit: «Même si tous trébuchent, ce ne sera pas mon cas.» '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Comme Jésus était à Béthanie, dans la maison de Simon le lépreux, une femme entra pendant qu'il se trouvait à table. Elle tenait un vase qui contenait un parfum de nard
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Nard: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: plante.
      marker-yv: yv-n
    - type: text
      text: ' pur très cher. Elle brisa le vase et versa le parfum sur la tête de Jésus. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui dit: «Je te le dis en vérité, aujourd''hui, cette nuit même, avant que le coq chante [deux fois], toi, tu me renieras trois fois.» '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Pierre reprit plus fortement: «Même s''il me faut mourir avec toi, je ne te renierai pas.» Et tous dirent la même chose.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Arrestation de Jésus
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils se rendirent ensuite dans un endroit appelé Gethsémané, et Jésus dit à ses disciples: «Asseyez-vous ici pendant que je prierai.» '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il prit avec lui Pierre, Jacques et Jean, et il commença à être saisi de frayeur et d''angoisse. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur dit: «Mon âme est triste à en mourir; restez ici, éveillés.» '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il avança de quelques pas, se jeta contre terre et pria que, si cela était possible, cette heure s''éloigne de lui. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il disait: «Abba, Père, tout t''est possible. Eloigne de moi cette coupe! Toutefois, non pas ce que je veux, mais ce que tu veux.» '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il vint vers les disciples, qu''il trouva endormis, et il dit à Pierre: «Simon, tu dors! Tu n''as pas pu rester éveillé une seule heure! '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Restez vigilants et priez pour ne pas céder à la tentation. L''esprit est bien disposé, mais par nature l''homme est faible.» '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il s''éloigna de nouveau et fit la même prière. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelques-uns exprimèrent leur indignation entre eux: «A quoi bon gaspiller ce parfum? '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il revint et les trouva encore endormis, car ils avaient les paupières lourdes. Ils ne surent que lui répondre. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il revint pour la troisième fois et leur dit: «Vous dormez maintenant et vous vous reposez! C''est assez! L''heure est venue; voici que le Fils de l''homme est livré entre les mains des pécheurs. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Levez-vous, allons-y! Celui qui me trahit s'approche.»
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il parlait encore quand soudain arriva Judas, l''un des douze, avec une foule armée d''épées et de bâtons envoyée par les chefs des prêtres, par les spécialistes de la loi et par les anciens. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui le trahissait leur avait donné ce signe: «L''homme auquel je donnerai un baiser, c''est lui. Arrêtez-le et emmenez-le sous bonne garde!» '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dès qu''il fut arrivé, il s''approcha de Jésus en disant: «Maître!» et il l''embrassa. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors ces gens mirent la main sur Jésus et l'arrêtèrent.
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un de ceux qui étaient là tira l''épée, frappa le serviteur du grand-prêtre et lui emporta l''oreille. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus prit la parole et leur dit: «Vous êtes venus vous emparer de moi avec des épées et des bâtons, comme pour un brigand. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J'étais tous les jours parmi vous, enseignant dans le temple, et vous ne m'avez pas arrêté. Mais c'est afin que les Ecritures soient accomplies.»
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On aurait pu le vendre plus de 300 pièces d''argent et les donner aux pauvres» et ils s''irritaient contre cette femme. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors tous l''abandonnèrent et prirent la fuite. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un jeune homme le suivait, habillé d''un simple drap. On l''attrapa, '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mais il lâcha le drap et se sauva tout nu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus devant le conseil juif
    marker-yv: yv-h
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils emmenèrent Jésus chez le grand-prêtre, où se rassemblèrent tous les chefs des prêtres, les anciens et les spécialistes de la loi. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pierre le suivit de loin jusqu'à l'intérieur de la cour du grand-prêtre; il s'assit avec les serviteurs et il se chauffait près du feu.
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les chefs des prêtres et tout le sanhédrin
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.55 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sanhédrin: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: conseil juif présidé par le grand-prêtre, qui faisait office de gouvernement et de tribunal pour les affaires qui n'étaient pas du ressort des Romains.
      marker-yv: yv-n
    - type: text
      text: ' cherchaient un témoignage contre Jésus pour le faire mourir, et ils n''en trouvaient pas. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Beaucoup rendaient en effet de faux témoignages contre lui, mais les témoignages n''étaient pas concordants. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelques-uns se levèrent et portèrent un faux témoignage contre lui en disant: '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Nous l''avons entendu dire: ‘Je détruirai ce temple fait par la main de l''homme, et en trois jours j''en construirai un autre qui ne sera pas fait de main d''homme.’» '
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Même sur ce point-là, leurs témoignages ne concordaient pas. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Jésus dit: «Laissez-la. Pourquoi lui faites-vous de la peine? Elle a fait une bonne action envers moi. '
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le grand-prêtre se leva au milieu de l''assemblée et interrogea Jésus en disant: «Ne réponds-tu rien? Pourquoi ces gens témoignent-ils contre toi?» '
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Jésus gardait le silence et ne répondit rien. Le grand-prêtre l''interrogea de nouveau et lui dit: «Es-tu le Messie, le Fils du Dieu béni?» '
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus répondit: «Je le suis. Et vous verrez '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: le Fils de l'homme assis à la droite du Tout-Puissant
    - type: text
      text: ' et '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: venant sur les nuées du ciel
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.62 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le Fils… ciel: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation combinant le '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 110.1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Daniel 7.13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; Jésus s'identifie ainsi au Messie qui, dans la vision de Daniel, reçoit le gouvernement de l'univers.
      marker-yv: yv-n
    - type: text
      text: '» '
  '63':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le grand-prêtre déchira ses vêtements et dit: «Qu''avons-nous encore besoin de témoins? '
  '64':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous avez entendu le blasphème. Qu''en pensez-vous?» Tous le condamnèrent, déclarant qu''il méritait la mort. '
  '65':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelques-uns se mirent à cracher sur lui, à lui mettre un voile sur le visage et à le frapper à coups de poing en lui disant: «Devine!» Même les serviteurs le frappaient en lui donnant des gifles.'
  '66':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant que Pierre était en bas dans la cour, une des servantes du grand-prêtre arriva. '
  '67':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle vit Pierre qui se chauffait, le regarda et lui dit: «Toi aussi, tu étais avec Jésus de Nazareth.» '
  '68':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il le nia en disant: «Je ne sais ni ne comprends ce que tu veux dire.» Puis il sortit pour aller dans le vestibule. [Alors un coq chanta.] '
  '69':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La servante le vit et se mit à dire de nouveau à ceux qui étaient présents: «Il fait partie de ces gens-là.» Il le nia de nouveau. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, vous avez toujours les pauvres avec vous et vous pouvez leur faire du bien quand vous le voulez, mais vous ne m''aurez pas toujours. '
  '70':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peu après, ceux qui étaient présents dirent encore à Pierre: «Certainement, tu fais partie de ces gens-là, car tu es galiléen, [tu as le même langage].» '
  '71':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors il se mit à jurer en lançant des malédictions: «Je ne connais pas cet homme dont vous parlez.» '
  '72':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '[Aussitôt,] pour la seconde fois, un coq chanta. Pierre se souvint alors de ce que Jésus lui avait dit: «Avant que le coq chante deux fois, tu me renieras trois fois.» Et en y réfléchissant, il pleurait.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle a fait ce qu''elle a pu, elle a d''avance parfumé mon corps pour l''ensevelissement. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je vous le dis en vérité, partout où cette bonne nouvelle sera proclamée, dans le monde entier, on racontera aussi en souvenir de cette femme ce qu'elle a fait.»
