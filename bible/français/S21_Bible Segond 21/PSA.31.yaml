document_id: PSA.31,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière confiante dans l'épreuve
  - type: text
    content: Au chef de chœur. Psaume de David.
  '10':
  - type: text
    content: Aie pitié de moi, Eternel, car je suis dans la détresse;
  - type: text
    content: j'ai les yeux, l'âme et le corps rongés par le chagrin.
  '11':
  - type: text
    content: Ma vie s'épuise dans la douleur,
  - type: text
    content: et mes années dans les soupirs;
  - type: text
    content: ma force faiblit à cause de ma faute,
  - type: text
    content: et mes os dépérissent.
  '12':
  - type: text
    content: Tous mes adversaires ont fait de moi un objet de honte,
  - type: text
    content: de grande honte pour mes voisins, et je fais peur à mes amis;
  - type: text
    content: ceux qui me voient dans la rue s'enfuient loin de moi.
  '13':
  - type: text
    content: Je suis oublié, effacé des mémoires, comme un mort,
  - type: text
    content: je suis comme un objet qui a disparu.
  '14':
  - type: text
    content: J'apprends les mauvais propos de plusieurs,
  - type: text
    content: je suis assailli de terreur
  - type: text
    content: quand ils se concertent contre moi
  - type: text
    content: et complotent de m'enlever la vie.
  '15':
  - type: text
    content: Mais moi, je me confie en toi, Eternel!
  - type: text
    content: 'Je dis: «Tu es mon Dieu!»'
  '16':
  - type: text
    content: 'Mes destinées sont dans ta main:'
  - type: text
    content: délivre-moi de mes ennemis et de mes persécuteurs!
  '17':
  - type: text
    content: Fais briller ton visage sur ton serviteur,
  - type: text
    content: sauve-moi par ta grâce!
  '18':
  - type: text
    content: Eternel, que je ne sois pas déçu quand je fais appel à toi!
  - type: text
    content: Que les méchants le soient, eux,
  - type: text
    content: qu'ils soient réduits au silence dans le séjour des morts!
  '19':
  - type: text
    content: Qu'elles deviennent muettes, les lèvres menteuses
  - type: text
    content: qui parlent avec insolence contre le juste,
  - type: text
    content: avec arrogance et dédain!
  '2':
  - type: text
    content: 'Eternel, je cherche refuge en toi:'
  - type: text
    content: que jamais je ne sois déçu!
  - type: text
    content: Délivre-moi dans ta justice,
  '20':
  - type: text
    content: Oh! combien ta bonté est grande!
  - type: text
    content: Tu la tiens en réserve pour ceux qui te craignent,
  - type: text
    content: tu la témoignes à ceux qui cherchent refuge en toi
  - type: text
    content: face aux hommes.
  '21':
  - type: text
    content: Tu les caches dans l'abri de ta présence contre ceux qui les persécutent,
  - type: text
    content: tu les protèges dans ta tente contre les langues hostiles.
  '22':
  - type: text
    content: Béni soit l'Eternel,
  - type: text
    content: car il a démontré sa grâce envers moi,
  - type: text
    content: comme si j'avais été dans une ville fortifiée.
  '23':
  - type: text
    content: 'Je disais dans mon trouble:'
  - type: text
    content: «Je suis chassé loin de ton regard»,
  - type: text
    content: mais tu as entendu mes supplications quand j'ai crié vers toi.
  '24':
  - type: text
    content: Aimez l'Eternel, vous, tous ses fidèles!
  - type: text
    content: L'Eternel garde les croyants,
  - type: text
    content: mais il punit sévèrement les orgueilleux.
  '25':
  - type: text
    content: Fortifiez-vous et que votre cœur s'affermisse,
  - type: text
    content: vous tous qui espérez en l'Eternel!
  '3':
  - type: text
    content: tends ton oreille vers moi, viens vite à mon secours!
  - type: text
    content: Sois pour moi un rocher protecteur, une forteresse
  - type: text
    content: où je trouve le salut!
  '4':
  - type: text
    content: Oui, tu es mon rocher, ma forteresse;
  - type: text
    content: à cause de ton nom tu me conduiras, tu me dirigeras.
  '5':
  - type: text
    content: Tu me feras sortir du piège qu'ils m'ont tendu,
  - type: text
    content: car tu es mon protecteur.
  '6':
  - type: text
    content: '*Je remets mon esprit entre tes mains'
  - type: note
    content: 'Je remets… mains: cité par Jésus sur la croix (Luc 23.46) et repris d''une certaine manière par Etienne (Actes 7.59).'
  - type: text
    content: ':'
  - type: text
    content: tu me délivres, Eternel, Dieu de vérité!
  '7':
  - type: text
    content: Je déteste ceux qui s'attachent à des idoles sans consistance;
  - type: text
    content: moi, c'est en l'Eternel que je me confie.
  '8':
  - type: text
    content: Je serai par ta grâce dans l'allégresse et dans la joie,
  - type: text
    content: car tu vois ma misère, tu connais les angoisses de mon âme.
  '9':
  - type: text
    content: Tu ne m'as pas livré aux mains de l'ennemi,
  - type: text
    content: tu as mis mes pieds au large.
