document_id: PSA.31
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière confiante dans l'épreuve
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Eternel, je cherche refuge en toi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: que jamais je ne sois déçu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Délivre-moi dans ta justice,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: tends ton oreille vers moi, viens vite à mon secours!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sois pour moi un rocher protecteur, une forteresse
- type: usfm
  marker: q1
  children:
  - type: text
    text: où je trouve le salut!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Oui, tu es mon rocher, ma forteresse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de ton nom tu me conduiras, tu me dirigeras.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu me feras sortir du piège qu'ils m'ont tendu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu es mon protecteur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '*Je remets mon esprit entre tes mains'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je remets… mains: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cité par Jésus sur la croix (Luc 23.46) et repris d'une certaine manière par Etienne (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Actes 7.59
      metadata:
        usfm: ACT.7.59
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu me délivres, Eternel, Dieu de vérité!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je déteste ceux qui s'attachent à des idoles sans consistance;
- type: usfm
  marker: q1
  children:
  - type: text
    text: moi, c'est en l'Eternel que je me confie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Je serai par ta grâce dans l'allégresse et dans la joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu vois ma misère, tu connais les angoisses de mon âme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tu ne m'as pas livré aux mains de l'ennemi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as mis mes pieds au large.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Aie pitié de moi, Eternel, car je suis dans la détresse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ai les yeux, l'âme et le corps rongés par le chagrin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ma vie s'épuise dans la douleur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mes années dans les soupirs;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ma force faiblit à cause de ma faute,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mes os dépérissent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tous mes adversaires ont fait de moi un objet de honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de grande honte pour mes voisins, et je fais peur à mes amis;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui me voient dans la rue s'enfuient loin de moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je suis oublié, effacé des mémoires, comme un mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je suis comme un objet qui a disparu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: J'apprends les mauvais propos de plusieurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je suis assailli de terreur
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand ils se concertent contre moi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et complotent de m'enlever la vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mais moi, je me confie en toi, Eternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je dis: «Tu es mon Dieu!»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mes destinées sont dans ta main:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: délivre-moi de mes ennemis et de mes persécuteurs!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Fais briller ton visage sur ton serviteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sauve-moi par ta grâce!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Eternel, que je ne sois pas déçu quand je fais appel à toi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que les méchants le soient, eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'ils soient réduits au silence dans le séjour des morts!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Qu'elles deviennent muettes, les lèvres menteuses
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui parlent avec insolence contre le juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec arrogance et dédain!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Oh! combien ta bonté est grande!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu la tiens en réserve pour ceux qui te craignent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu la témoignes à ceux qui cherchent refuge en toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: face aux hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tu les caches dans l'abri de ta présence contre ceux qui les persécutent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu les protèges dans ta tente contre les langues hostiles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Béni soit l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il a démontré sa grâce envers moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme si j'avais été dans une ville fortifiée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Je disais dans mon trouble:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Je suis chassé loin de ton regard»,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais tu as entendu mes supplications quand j'ai crié vers toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Aimez l'Eternel, vous, tous ses fidèles!
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Eternel garde les croyants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il punit sévèrement les orgueilleux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Fortifiez-vous et que votre cœur s'affermisse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous tous qui espérez en l'Eternel!
