document_id: 2SA.17
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Achitophel dit à Absalom: «Laisse-moi choisir 12''000 hommes et je partirai à la poursuite de David cette nuit même. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je le surprendrai pendant qu''il est fatigué et sans force, je l''effraierai et tout le peuple qui l''accompagne prendra la fuite. Je frapperai seulement le roi, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'et je ramènerai tout le peuple à toi. La mort de l''homme à qui tu en veux assurera le retour de tous et tout le peuple sera en paix.» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Cette parole plut à Absalom et à tous les anciens d'Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Cependant Absalom dit: «Appelez encore Hushaï, l''Arkien! Ecoutons aussi ce qu''il nous dira.» '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hushaï vint vers Absalom et celui-ci lui dit: «Voici comment a parlé Achitophel. Devons-nous faire ce qu''il a dit ou non? Dis ta proposition!» '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Hushaï répondit à Absalom: «Cette fois-ci, le conseil qu''a donné Achitophel n''est pas bon.» '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et il ajouta: «Tu connais ton père et ses hommes: ce sont de vaillants guerriers et ils sont furieux comme le serait, dans la campagne, une ourse à qui l''on aurait enlevé ses petits. Ton père est un homme de guerre et il ne passera pas la nuit avec la troupe. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Maintenant, il doit être caché dans une grotte ou un autre endroit. Si des hommes tombent dès le début sous leurs coups, on ne tardera pas à l''apprendre et l''on dira: ‘Le peuple qui suit Absalom a subi une défaite!’ '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors même les plus vaillants, auraient-ils un cœur de lion, perdront courage. En effet, tout Israël sait que ton père est un héros et qu''il a des braves avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Voici donc ce que je conseille: que tout Israël se rassemble auprès de toi, depuis Dan jusqu''à Beer-Shéba. C''est une foule pareille au sable qui est au bord de la mer. Tu marcheras en personne au combat. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Nous le rattraperons où qu''il se trouve et nous tomberons sur lui comme la rosée tombe sur le sol. Il n''y aura pas un seul survivant, ni lui ni aucun des hommes qui sont avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'S''il se retire dans une ville, tout Israël portera des cordes vers cette ville et nous la traînerons jusqu''au torrent jusqu''à ce qu''on n''en trouve plus une pierre.» '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Absalom et tous les Israélites dirent: «Le conseil de Hushaï l''Arkien vaut mieux que celui d''Achitophel.» Or l''Eternel avait décidé d''anéantir le bon conseil d''Achitophel afin de faire venir le malheur sur Absalom.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hushaï dit aux prêtres Tsadok et Abiathar: «Achitophel a donné tel et tel conseil à Absalom et aux anciens d''Israël, et moi, j''ai conseillé telle et telle chose. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Maintenant, envoyez tout de suite un message à David. Faites-lui dire: ‘Ne passe pas la nuit dans les plaines du désert mais va plus loin. Sinon, le roi et tout le peuple qui est avec lui risquent d''être exterminés.’»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jonathan et Achimaats se tenaient à En-Roguel. Une servante vint leur dire d''aller informer le roi David, car ils ne devaient pas se montrer en entrant dans la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Un jeune homme les aperçut néanmoins et le rapporta à Absalom, mais ils se dépêchèrent tous deux de partir et ils arrivèrent à Bachurim chez un homme qui avait un puits dans sa cour. Ils y descendirent, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'et la femme prit une couverture qu''elle étendit sur l''ouverture du puits. Puis elle versa du grain dessus pour qu''on ne se doute de rien. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les serviteurs d''Absalom arrivèrent vers cette femme dans la maison et dirent: «Où sont Achimaats et Jonathan?» La femme leur répondit: «Ils ont traversé le fleuve.» Ils cherchèrent, mais ne les trouvant pas ils retournèrent à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Après leur départ, Achimaats et Jonathan remontèrent du puits et allèrent informer le roi David. Ils lui dirent: «Levez-vous et dépêchez-vous de traverser le fleuve, car Achitophel a donné tel conseil contre vous.» '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: David et tout le peuple qui l'accompagnait se levèrent et passèrent le Jourdain. A l'aube, pas un seul ne manquait, ils avaient tous passé le Jourdain.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Voyant que son conseil n'était pas suivi, Achitophel sella son âne et partit pour retourner chez lui, dans sa ville. Il donna ses ordres à sa famille, puis il se pendit. C'est ainsi qu'il mourut et on l'enterra dans le tombeau de son père.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Quant à David, il arriva à Mahanaïm, tandis qu''Absalom passait le Jourdain avec tous les Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Absalom mit Amasa à la tête de l''armée en remplacement de Joab. Amasa était le fils d''un homme appelé Jithra. Ce Jithra était un Israélite qui avait eu des relations avec Abigal, fille de Nachash et sœur de Tseruja, la mère de Joab. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Israël et Absalom installèrent leur camp dans le pays de Galaad.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Lorsque David fut arrivé à Mahanaïm, Shobi, fils de Nachash, originaire de Rabba, la capitale des Ammonites, ainsi que Makir, fils d''Ammiel, originaire de Lodebar, et Barzillaï le Galaadite, originaire de Roguelim, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'apportèrent des lits, des bassins, des pots en terre, du blé, de l''orge, de la farine, du grain rôti, des fèves, des lentilles, des pois rôtis, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'du miel, du lait caillé, des brebis et des fromages de vache. Ils apportèrent ces vivres à David et au peuple qui était avec lui, afin qu''ils mangent. Ils se disaient en effet: «Ce peuple a dû souffrir de la faim, de la fatigue et de la soif dans le désert.»'
