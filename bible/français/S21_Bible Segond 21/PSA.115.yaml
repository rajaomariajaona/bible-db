document_id: PSA.115,152
type_code: fra
verses:
  '1':
  - type: heading
    content: A Dieu seul la gloire
  - type: text
    content: Non pas à nous, Eternel, non pas à nous,
  - type: text
    content: mais à ton nom donne gloire, à cause de ta bonté,
  - type: text
    content: à cause de ta vérité!
  '10':
  - type: text
    content: Famille d'Aaron, confie-toi en l'Eternel!
  - type: text
    content: Leur secours et leur bouclier, c'est lui.
  '11':
  - type: text
    content: Vous qui craignez l'Eternel, confiez-vous en l'Eternel!
  - type: text
    content: Leur secours et leur bouclier, c'est lui.
  '12':
  - type: text
    content: 'L''Eternel se souvient de nous: il bénira.'
  - type: text
    content: Il bénira la communauté d'Israël,
  - type: text
    content: il bénira la famille d'Aaron,
  '13':
  - type: text
    content: il bénira ceux qui craignent l'Eternel,
  - type: text
    content: petits et grands.
  '14':
  - type: text
    content: L'Eternel vous fera prospérer,
  - type: text
    content: vous et vos enfants.
  '15':
  - type: text
    content: Soyez bénis par l'Eternel, qui a fait le ciel et la terre!
  '16':
  - type: text
    content: Le ciel appartient à l'Eternel,
  - type: text
    content: mais il a donné la terre aux hommes.
  '17':
  - type: text
    content: Ce ne sont pas les morts qui célèbrent l'Eternel,
  - type: text
    content: ce ne sont pas ceux qui descendent dans le monde du silence,
  '18':
  - type: text
    content: mais nous, nous bénirons l'Eternel,
  - type: text
    content: dès maintenant et pour toujours.
  - type: text
    content: Louez l'Eternel!
  '2':
  - type: text
    content: 'Pourquoi les nations diraient-elles:'
  - type: text
    content: «Où donc est leur Dieu?»
  '3':
  - type: text
    content: Notre Dieu est au ciel,
  - type: text
    content: il fait tout ce qu'il veut.
  '4':
  - type: text
    content: Leurs idoles, ce n'est que de l'argent et de l'or;
  - type: text
    content: elles sont faites par la main des hommes.
  '5':
  - type: text
    content: Elles ont une bouche mais ne parlent pas,
  - type: text
    content: elles ont des yeux mais ne voient pas,
  '6':
  - type: text
    content: elles ont des oreilles mais n'entendent pas,
  - type: text
    content: elles ont un nez mais ne sentent pas,
  '7':
  - type: text
    content: elles ont des mains mais ne touchent pas,
  - type: text
    content: des pieds mais ne marchent pas;
  - type: text
    content: leur gosier ne produit aucun son.
  '8':
  - type: text
    content: Ils leur ressemblent, ceux qui les fabriquent,
  - type: text
    content: tous ceux qui se confient en elles.
  - type: note
    content: 'Leurs idoles… en elles: texte presque identique au Psaume 135.15-18.'
  '9':
  - type: text
    content: Israël, confie-toi en l'Eternel!
  - type: text
    content: Leur secours et leur bouclier, c'est lui.
