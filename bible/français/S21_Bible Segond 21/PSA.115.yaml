document_id: PSA.115
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Dieu seul la gloire
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Non pas à nous, Eternel, non pas à nous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais à ton nom donne gloire, à cause de ta bonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de ta vérité!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Pourquoi les nations diraient-elles:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Où donc est leur Dieu?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Notre Dieu est au ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il fait tout ce qu'il veut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Leurs idoles, ce n'est que de l'argent et de l'or;
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles sont faites par la main des hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Elles ont une bouche mais ne parlent pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles ont des yeux mais ne voient pas,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: elles ont des oreilles mais n'entendent pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles ont un nez mais ne sentent pas,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: elles ont des mains mais ne touchent pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des pieds mais ne marchent pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: leur gosier ne produit aucun son.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ils leur ressemblent, ceux qui les fabriquent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous ceux qui se confient en elles.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '115.4-8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Leurs idoles… en elles: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'texte presque identique au '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 135.15-18
      metadata:
        usfm: PSA.135.15+PSA.135.16+PSA.135.17+PSA.135.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Israël, confie-toi en l'Eternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leur secours et leur bouclier, c'est lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Famille d'Aaron, confie-toi en l'Eternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leur secours et leur bouclier, c'est lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Vous qui craignez l'Eternel, confiez-vous en l'Eternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leur secours et leur bouclier, c'est lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L''Eternel se souvient de nous: il bénira.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il bénira la communauté d'Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il bénira la famille d'Aaron,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: il bénira ceux qui craignent l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: petits et grands.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: L'Eternel vous fera prospérer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous et vos enfants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Soyez bénis par l'Eternel, qui a fait le ciel et la terre!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Le ciel appartient à l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il a donné la terre aux hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ce ne sont pas les morts qui célèbrent l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce ne sont pas ceux qui descendent dans le monde du silence,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: mais nous, nous bénirons l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dès maintenant et pour toujours.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez l'Eternel!
