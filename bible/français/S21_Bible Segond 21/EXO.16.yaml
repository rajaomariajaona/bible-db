document_id: EXO.16,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les cailles et la manne
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Toute l''assemblée des Israélites partit d''Elim, et ils arrivèrent au désert de Sin, qui est entre Elim et le Sinaï, le quinzième jour du deuxième mois après leur sortie d''Egypte. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Tandis qu''Aaron parlait à toute l''assemblée des Israélites, ils se tournèrent du côté du désert, et voici que la gloire de l''Eternel parut dans la nuée. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'L''Eternel s''adressa à Moïse: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '«J''ai entendu les murmures des Israélites. Dis-leur: ‘Au coucher du soleil vous mangerez de la viande, et le matin vous vous rassasierez de pain. Ainsi vous reconnaîtrez que je suis l''Eternel, votre Dieu.’»'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Le soir survinrent des cailles qui couvrirent le camp, et le matin il y eut une couche de rosée autour du camp. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Une fois cette rosée dissipée, il y avait à la surface du désert quelque chose de petit comme des grains, quelque chose de fin comme la gelée blanche sur la terre. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Les Israélites regardèrent et se dirent l''un à l''autre: «Qu''est-ce que c''est?» En effet, ils ne savaient pas ce que c''était. Moïse leur dit: «C''est le pain que L''Eternel vous donne pour nourriture. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Voici ce que l''Eternel a ordonné: Que chacun de vous en ramasse ce qu''il faut pour sa nourriture, une mesure de 2 litres par personne, suivant le nombre que vous êtes. Chacun en prendra pour ceux qui sont dans sa tente.»'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'C''est ce que firent les Israélites, et ils en ramassèrent les uns plus, les autres moins. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: On mesurait ensuite la quantité précise; *celui qui avait ramassé plus n'avait rien de trop, et celui qui avait ramassé moins n'en manquait pas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Celui qui avait… manquait pas: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Corinthiens 8.15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' pour appuyer le principe de la solidarité.'
      marker-yv: yv-n
    - type: text
      text: '. Chacun ramassait ce qu''il fallait pour sa nourriture. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Moïse leur dit: «Que personne n''en laisse jusqu''au matin.» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Toute l''assemblée des Israélites murmura contre Moïse et Aaron dans le désert. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Ils n''écoutèrent pas Moïse et certains en laissèrent jusqu''au matin; mais il s''y mit des vers et cela devint infect. Moïse fut irrité contre ces gens. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Tous les matins, chacun ramassait ce qu'il fallait pour sa nourriture, et quand venait la chaleur du soleil, cela fondait.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Le sixième jour, ils ramassèrent une double quantité de nourriture, 4 litres pour chacun. Tous les chefs de l''assemblée vinrent le rapporter à Moïse. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Celui-ci leur dit: «C''est ce que l''Eternel a ordonné. Demain est le jour du repos, le sabbat consacré à l''Eternel. Faites cuire ce que vous avez à faire cuire, faites bouillir ce que vous avez à faire bouillir et mettez en réserve jusqu''au matin tout ce qui restera.» '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ils le laissèrent jusqu''au matin, comme Moïse l''avait ordonné, et cela ne devint pas infect, il ne s''y mit pas de vers. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Moïse dit: «Mangez-le aujourd''hui, car c''est le jour du sabbat en l''honneur de l''Eternel. Aujourd''hui vous n''en trouverez pas dans la campagne. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Pendant 6 jours vous en ramasserez, mais le septième jour, celui du sabbat, il n'y en aura pas.»
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Le septième jour, quelques membres du peuple sortirent pour en ramasser, mais ils n''en trouvèrent pas. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Alors l''Eternel dit à Moïse: «Jusqu''à quand refuserez-vous de respecter mes commandements et mes lois? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Considérez que c''est l''Eternel qui vous a donné le sabbat. Voilà pourquoi, le sixième jour, il vous donne de la nourriture pour deux jours. Que chacun reste sous sa tente, que personne ne sorte de chez lui le septième jour.» '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Les Israélites leur dirent: «Pourquoi ne sommes-nous pas morts de la main de l''Eternel en Egypte, quand nous étions assis près des marmites de viande, quand nous mangions du pain à satiété? Au contraire, vous nous avez conduits dans ce désert pour faire mourir de faim toute cette assemblée.»'
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Et le peuple se reposa le septième jour.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: La communauté d'Israël donna à cette nourriture le nom de manne. Elle ressemblait à de la graine de coriandre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.31 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Coriandre: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: plante poussant en Israël et en Egypte, dont les graines petites et épicées sont gris pâle.
      marker-yv: yv-n
    - type: text
      text: ', était blanche et avait le goût d''un gâteau au miel.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Moïse dit: «Voici ce que l''Eternel a ordonné: Qu''une mesure remplie de manne soit conservée pour vos descendants. Ainsi, ils verront le pain que je vous ai fait manger dans le désert après vous avoir fait sortir d''Egypte.» '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Moïse dit à Aaron: «Prends un vase, mets-y 2 litres de manne et dépose-le devant l''Eternel afin qu''il soit conservé pour vos descendants.» '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Suivant l'ordre donné par l'Eternel à Moïse, Aaron le déposa devant le témoignage afin qu'il soit conservé.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Les Israélites mangèrent de la manne pendant 40 ans, jusqu'à leur arrivée dans un pays habité. Ils mangèrent de la manne jusqu'à leur arrivée aux frontières du pays de Canaan.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: La mesure de 2 litres correspond à un dixième de la mesure étalon.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'L''Eternel dit à Moïse: «Je vais faire pleuvoir du pain pour vous depuis le ciel. Le peuple sortira et en ramassera chaque jour la quantité nécessaire. Ainsi, je le mettrai à l''épreuve et je verrai s''il suivra, ou non, ma loi. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Le sixième jour, ils prépareront ce qu'ils auront apporté, c'est-à-dire le double de la portion ramassée chaque jour.»
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Moïse et Aaron dirent à tous les Israélites: «Ce soir, vous reconnaîtrez que c''est l''Eternel qui vous a fait sortir d''Egypte. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Le matin, vous verrez la gloire de l''Eternel, parce qu''il a entendu vos murmures contre lui. Que sommes-nous, en effet, pour que vous murmuriez contre nous?» '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Moïse dit: «L''Eternel vous donnera ce soir de la viande à manger, et le matin du pain à satiété, parce qu''il a entendu les murmures que vous avez proférés contre lui. Que sommes-nous en effet? Ce n''est pas contre nous que vous murmurez, c''est contre l''Eternel.»'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Moïse dit à Aaron: «Dis à toute l''assemblée des Israélites: ‘Approchez-vous devant l''Eternel, car il a entendu vos murmures.’» '
