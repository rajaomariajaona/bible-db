document_id: ISA.45
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici ce que dit l'Eternel à celui qu'il a désigné par onction, à Cyrus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qu'il tient par la main droite
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour écraser des nations devant lui
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour désarmer des rois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour ouvrir des portes devant lui
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'afin que les entrées des villes ne lui soient plus fermées:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je marcherai moi-même devant toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'aplanirai les pentes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je mettrai en pièces les portes en bronze
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je briserai les verrous en fer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Je te donnerai des trésors dissimulés par les ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des richesses cachées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin que tu reconnaisses
- type: usfm
  marker: q1
  children:
  - type: text
    text: que je suis l'Eternel, celui qui t'appelle par ton nom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Dieu d'Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: C'est à cause de mon serviteur Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause d'Israël, celui que j'ai choisi, que je t'ai appelé par ton nom.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t'ai donné un titre alors que tu ne me connaissais pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: C'est moi qui suis l'Eternel et il n'y en a pas d'autre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: à part moi, il n'y a pas de Dieu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t'ai équipé pour le combat alors que tu ne me connaissais pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: C'est afin que l'on sache, à l'est comme à l'ouest,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'en dehors de moi il n'y a que néant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est moi qui suis l'Eternel et il n'y en a pas d'autre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je forme la lumière et je crée les ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je donne la paix et je crée le malheur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est moi, l'Eternel, qui suis l'auteur de tout cela.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Que le ciel déverse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que les nuages fassent couler la justice!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que la terre s'ouvre afin que le salut y porte du fruit
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu'avec lui la justice y fleurisse!
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est moi, l'Eternel, qui ai créé cela.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Malheur à l'homme qui intente un procès à celui qui l'a façonné,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lui qui n'est qu'un vase parmi d'autres vases de terre!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'L''argile dit-elle au potier: «Que fais-tu?»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ou: «Ton travail est mal fait»?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Malheur à l''homme qui dit à son père: «Pourquoi m''as-tu donné la vie?»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et à sa mère: «Pourquoi m''as-tu mis au monde?»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Voici ce que dit l''Eternel, le Saint d''Israël, celui qui le façonne:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Va-t-on m'interroger sur l'avenir
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou me donner des ordres sur mes enfants et sur mon activité?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: C'est moi qui ai fait la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et créé l'homme qui la peuple.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est moi, ce sont mes mains qui ont déployé le ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c'est moi qui donne des ordres à tous les corps célestes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: C'est moi qui ai appelé Cyrus en toute justice
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui ferai toutes ses voies bien droites.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il reconstruira ma ville et laissera partir mes exilés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans paiement ni cadeau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit l'Eternel, le maître de l'univers.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Bénédictions universelles
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les biens de l'Egypte ainsi que les profits de l'Ethiopie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des Sabéens, ces hommes de grande taille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: passeront chez toi et t'appartiendront.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ces peuples marcheront à ta suite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils circuleront enchaînés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils se prosterneront devant toi et t''adresseront une prière:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «C'est *chez toi seulement que se trouve Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Chez… Dieu: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'mention de la même réaction en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Corinthiens 14.25
      metadata:
        usfm: 1CO.14.25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il n'y en a pas d'autre. Les autres dieux ne sont que néant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tu es vraiment un Dieu qui te caches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi le Dieu d'Israël, le Sauveur!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ils sont tous couverts de honte et même humiliés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils s'en vont tous dans l'humiliation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les fabricants d'idoles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Quant à Israël, c'est de l'Eternel qu'il reçoit le salut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un salut éternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Plus jamais vous ne serez couverts de honte ni humiliés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: En effet, voici ce que dit l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le créateur du ciel, le seul Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui a façonné la terre, l'a faite et l'affermit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui l'a créée pour qu'elle ne soit pas déserte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'qui l''a formée pour qu''elle soit habitée:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est moi qui suis l'Eternel et il n'y en a pas d'autre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Je n'ai pas parlé en cachette,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans un recoin ténébreux de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'je n''ai pas dit à la descendance de Jacob:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Cherchez-moi dans le vide!»
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, moi, l'Eternel, je dis ce qui est juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je révèle ce qui est droit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Rassemblez-vous et venez, approchez-vous ensemble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rescapés des nations!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils n'ont aucun discernement, ceux qui portent leur sculpture sacrée en bois
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui adressent des prières à un dieu incapable de sauver.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Faites vos révélations, présentez vos arguments!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils peuvent même tenir conseil tous ensemble!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui a annoncé cela par le passé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui l'a révélé depuis longtemps?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N'est-ce pas moi, l'Eternel?
- type: usfm
  marker: q1
  children:
  - type: text
    text: '*Il n''y a pas d''autre Dieu, en dehors de moi.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il n''y a… moi: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Marc 12.32
      metadata:
        usfm: MRK.12.32
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis le seul Dieu juste et qui sauve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tournez-vous vers moi et soyez sauvés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous tous qui êtes aux extrémités de la terre!
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, c'est moi qui suis Dieu et il n'y en a pas d'autre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Je le jure par moi-même,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et de ma bouche sort ce qui est juste, une parole qui ne sera pas révoquée:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '*«Chacun pliera le genou devant moi'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toute langue prêtera serment par moi.»
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Chacun… moi: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 14.11
      metadata:
        usfm: ROM.14.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' d''après la Septante.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'On dira à propos de moi: «C''est en l''Eternel seul que se trouvent la justice et la force.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui étaient furieux contre lui viendront jusqu'à lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils seront tous couverts de honte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: C'est par l'Eternel que seront déclarés justes
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les descendants d'Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c'est de lui qu'ils tireront leur fierté.»
