document_id: ISA.45,152
type_code: fra
verses:
  '1':
  - type: text
    content: Voici ce que dit l'Eternel à celui qu'il a désigné par onction, à Cyrus,
  - type: text
    content: celui qu'il tient par la main droite
  - type: text
    content: pour écraser des nations devant lui
  - type: text
    content: et pour désarmer des rois,
  - type: text
    content: pour ouvrir des portes devant lui
  - type: text
    content: 'afin que les entrées des villes ne lui soient plus fermées:'
  '10':
  - type: text
    content: 'Malheur à l''homme qui dit à son père: «Pourquoi m''as-tu donné la vie?»'
  - type: text
    content: 'et à sa mère: «Pourquoi m''as-tu mis au monde?»'
  '11':
  - type: text
    content: 'Voici ce que dit l''Eternel, le Saint d''Israël, celui qui le façonne:'
  - type: text
    content: Va-t-on m'interroger sur l'avenir
  - type: text
    content: ou me donner des ordres sur mes enfants et sur mon activité?
  '12':
  - type: text
    content: C'est moi qui ai fait la terre
  - type: text
    content: et créé l'homme qui la peuple.
  - type: text
    content: C'est moi, ce sont mes mains qui ont déployé le ciel,
  - type: text
    content: et c'est moi qui donne des ordres à tous les corps célestes.
  '13':
  - type: text
    content: C'est moi qui ai appelé Cyrus en toute justice
  - type: text
    content: et qui ferai toutes ses voies bien droites.
  - type: text
    content: Il reconstruira ma ville et laissera partir mes exilés,
  - type: text
    content: sans paiement ni cadeau,
  - type: text
    content: dit l'Eternel, le maître de l'univers.
  - type: heading
    content: Bénédictions universelles
  '14':
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: Les biens de l'Egypte ainsi que les profits de l'Ethiopie
  - type: text
    content: et des Sabéens, ces hommes de grande taille,
  - type: text
    content: passeront chez toi et t'appartiendront.
  - type: text
    content: Ces peuples marcheront à ta suite,
  - type: text
    content: ils circuleront enchaînés.
  - type: text
    content: 'Ils se prosterneront devant toi et t''adresseront une prière:'
  - type: text
    content: «C'est *chez toi seulement que se trouve Dieu
  - type: note
    content: 'Chez… Dieu: mention de la même réaction en 1 Corinthiens 14.25.'
  - type: text
    content: ','
  - type: text
    content: et il n'y en a pas d'autre. Les autres dieux ne sont que néant.
  '15':
  - type: text
    content: Tu es vraiment un Dieu qui te caches,
  - type: text
    content: toi le Dieu d'Israël, le Sauveur!»
  '16':
  - type: text
    content: Ils sont tous couverts de honte et même humiliés,
  - type: text
    content: ils s'en vont tous dans l'humiliation,
  - type: text
    content: les fabricants d'idoles.
  '17':
  - type: text
    content: Quant à Israël, c'est de l'Eternel qu'il reçoit le salut,
  - type: text
    content: un salut éternel.
  - type: text
    content: Plus jamais vous ne serez couverts de honte ni humiliés.
  '18':
  - type: text
    content: En effet, voici ce que dit l'Eternel,
  - type: text
    content: le créateur du ciel, le seul Dieu,
  - type: text
    content: qui a façonné la terre, l'a faite et l'affermit,
  - type: text
    content: qui l'a créée pour qu'elle ne soit pas déserte,
  - type: text
    content: 'qui l''a formée pour qu''elle soit habitée:'
  - type: text
    content: C'est moi qui suis l'Eternel et il n'y en a pas d'autre.
  '19':
  - type: text
    content: Je n'ai pas parlé en cachette,
  - type: text
    content: dans un recoin ténébreux de la terre,
  - type: text
    content: 'je n''ai pas dit à la descendance de Jacob:'
  - type: text
    content: «Cherchez-moi dans le vide!»
  - type: text
    content: En effet, moi, l'Eternel, je dis ce qui est juste,
  - type: text
    content: je révèle ce qui est droit.
  '2':
  - type: text
    content: Je marcherai moi-même devant toi.
  - type: text
    content: J'aplanirai les pentes,
  - type: text
    content: je mettrai en pièces les portes en bronze
  - type: text
    content: et je briserai les verrous en fer.
  '20':
  - type: text
    content: Rassemblez-vous et venez, approchez-vous ensemble,
  - type: text
    content: rescapés des nations!
  - type: text
    content: Ils n'ont aucun discernement, ceux qui portent leur sculpture sacrée en bois
  - type: text
    content: et qui adressent des prières à un dieu incapable de sauver.
  '21':
  - type: text
    content: Faites vos révélations, présentez vos arguments!
  - type: text
    content: Ils peuvent même tenir conseil tous ensemble!
  - type: text
    content: Qui a annoncé cela par le passé,
  - type: text
    content: qui l'a révélé depuis longtemps?
  - type: text
    content: N'est-ce pas moi, l'Eternel?
  - type: text
    content: '*Il n''y a pas d''autre Dieu, en dehors de moi.'
  - type: note
    content: 'Il n''y a… moi: cité en Marc 12.32.'
  - type: text
    content: Je suis le seul Dieu juste et qui sauve.
  '22':
  - type: text
    content: Tournez-vous vers moi et soyez sauvés,
  - type: text
    content: vous tous qui êtes aux extrémités de la terre!
  - type: text
    content: En effet, c'est moi qui suis Dieu et il n'y en a pas d'autre.
  '23':
  - type: text
    content: Je le jure par moi-même,
  - type: text
    content: 'et de ma bouche sort ce qui est juste, une parole qui ne sera pas révoquée:'
  - type: text
    content: '*«Chacun pliera le genou devant moi'
  - type: text
    content: et toute langue prêtera serment par moi.»
  - type: note
    content: 'Chacun… moi: cité en Romains 14.11 d''après la Septante.'
  '24':
  - type: text
    content: 'On dira à propos de moi: «C''est en l''Eternel seul que se trouvent la justice et la force.'
  - type: text
    content: Ceux qui étaient furieux contre lui viendront jusqu'à lui,
  - type: text
    content: et ils seront tous couverts de honte.
  '25':
  - type: text
    content: C'est par l'Eternel que seront déclarés justes
  - type: text
    content: tous les descendants d'Israël,
  - type: text
    content: et c'est de lui qu'ils tireront leur fierté.»
  '3':
  - type: text
    content: Je te donnerai des trésors dissimulés par les ténèbres,
  - type: text
    content: des richesses cachées,
  - type: text
    content: afin que tu reconnaisses
  - type: text
    content: que je suis l'Eternel, celui qui t'appelle par ton nom,
  - type: text
    content: le Dieu d'Israël.
  '4':
  - type: text
    content: C'est à cause de mon serviteur Jacob,
  - type: text
    content: à cause d'Israël, celui que j'ai choisi, que je t'ai appelé par ton nom.
  - type: text
    content: Je t'ai donné un titre alors que tu ne me connaissais pas.
  '5':
  - type: text
    content: C'est moi qui suis l'Eternel et il n'y en a pas d'autre;
  - type: text
    content: à part moi, il n'y a pas de Dieu.
  - type: text
    content: Je t'ai équipé pour le combat alors que tu ne me connaissais pas.
  '6':
  - type: text
    content: C'est afin que l'on sache, à l'est comme à l'ouest,
  - type: text
    content: qu'en dehors de moi il n'y a que néant.
  - type: text
    content: C'est moi qui suis l'Eternel et il n'y en a pas d'autre.
  '7':
  - type: text
    content: Je forme la lumière et je crée les ténèbres,
  - type: text
    content: je donne la paix et je crée le malheur.
  - type: text
    content: C'est moi, l'Eternel, qui suis l'auteur de tout cela.
  '8':
  - type: text
    content: Que le ciel déverse
  - type: text
    content: et que les nuages fassent couler la justice!
  - type: text
    content: Que la terre s'ouvre afin que le salut y porte du fruit
  - type: text
    content: et qu'avec lui la justice y fleurisse!
  - type: text
    content: C'est moi, l'Eternel, qui ai créé cela.
  '9':
  - type: text
    content: Malheur à l'homme qui intente un procès à celui qui l'a façonné,
  - type: text
    content: lui qui n'est qu'un vase parmi d'autres vases de terre!
  - type: text
    content: 'L''argile dit-elle au potier: «Que fais-tu?»'
  - type: text
    content: 'ou: «Ton travail est mal fait»?'
