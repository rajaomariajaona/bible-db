document_id: SNG.4,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le jeune homme
  - type: text
    content: Que tu es belle, mon amie, que tu es belle!
  - type: text
    content: Tes yeux sont des colombes
  - type: text
    content: derrière ton voile.
  - type: text
    content: Tes cheveux sont pareils à un troupeau de chèvres
  - type: text
    content: bondissant sur les montagnes de Galaad.
  '10':
  - type: text
    content: Comme ton amour est beau, ma sœur, ma chérie!
  - type: text
    content: Ton amour est bien meilleur que le vin,
  - type: text
    content: le parfum de tes huiles que tous les aromates!
  '11':
  - type: text
    content: Tes lèvres distillent le miel, ma chérie.
  - type: text
    content: Il y a sous ta langue du miel et du lait,
  - type: text
    content: et l'odeur de tes habits est pareille à celle du Liban.
  '12':
  - type: text
    content: Tu es un jardin privé, ma sœur, ma chérie,
  - type: text
    content: une fontaine fermée, une source réservée.
  '13':
  - type: text
    content: Tes pousses sont un jardin de grenadiers
  - type: text
    content: aux fruits les meilleurs.
  - type: text
    content: On y trouve réunis du henné et du nard,
  '14':
  - type: text
    content: nard et safran, roseau aromatique et cinnamome,
  - type: text
    content: toutes sortes d'arbres à encens,
  - type: text
    content: myrrhe et aloès,
  - type: text
    content: tous les principaux aromates.
  '15':
  - type: text
    content: Tu es la source des jardins,
  - type: text
    content: un puits d'eau vive
  - type: text
    content: qui coule du Liban!
  - type: heading
    content: La jeune femme
  '16':
  - type: text
    content: Lève-toi, vent du nord! Viens, vent du sud!
  - type: text
    content: Soufflez sur mon jardin et que ses aromates se diffusent!
  - type: text
    content: Que mon bien-aimé entre dans son jardin
  - type: text
    content: afin qu'il mange de ses fruits les meilleurs!
  '2':
  - type: text
    content: Tes dents sont comme un troupeau de brebis tondues
  - type: text
    content: 'qui remontent du lavoir:'
  - type: text
    content: chacune a sa jumelle,
  - type: text
    content: aucune d'elles n'est seule.
  '3':
  - type: text
    content: Tes lèvres sont comme un liseré cramoisi
  - type: text
    content: et ta bouche est charmante.
  - type: text
    content: Derrière ton voile,
  - type: text
    content: ta joue est comme une moitié de grenade.
  '4':
  - type: text
    content: Ton cou est pareil à la tour de David,
  - type: text
    content: 'construite pour être un arsenal:'
  - type: text
    content: mille boucliers y sont suspendus,
  - type: text
    content: tous les boucliers des héros.
  '5':
  - type: text
    content: Tes deux seins sont comme deux faons,
  - type: text
    content: comme les jumeaux d'une gazelle
  - type: text
    content: qui broutent au milieu des lis.
  '6':
  - type: text
    content: Avant que la brise du jour ne souffle
  - type: text
    content: et que les ombres ne fuient,
  - type: text
    content: j'irai à la montagne de la myrrhe
  - type: text
    content: et à la colline de l'encens.
  '7':
  - type: text
    content: Tu es toute belle, mon amie,
  - type: text
    content: il n'y a aucun défaut en toi.
  '8':
  - type: text
    content: Viens avec moi du Liban, ma chérie,
  - type: text
    content: viens avec moi du Liban!
  - type: text
    content: Regarde du sommet de l'Amana,
  - type: text
    content: du sommet du Senir et de l'Hermon,
  - type: text
    content: des tanières des lions,
  - type: text
    content: des montagnes des léopards!
  '9':
  - type: text
    content: Tu as volé mon cœur, ma sœur, ma chérie!
  - type: text
    content: Tu as volé mon cœur grâce à un seul de tes regards,
  - type: text
    content: grâce à un seul des colliers de ton cou.
