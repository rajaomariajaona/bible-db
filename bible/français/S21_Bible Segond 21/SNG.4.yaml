document_id: SNG.4
type_code: fra
segments:
- type: usfm
  marker: sp
  children:
  - type: text
    text: Le jeune homme
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Que tu es belle, mon amie, que tu es belle!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes yeux sont des colombes
- type: usfm
  marker: q1
  children:
  - type: text
    text: derrière ton voile.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes cheveux sont pareils à un troupeau de chèvres
- type: usfm
  marker: q1
  children:
  - type: text
    text: bondissant sur les montagnes de Galaad.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tes dents sont comme un troupeau de brebis tondues
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'qui remontent du lavoir:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: chacune a sa jumelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aucune d'elles n'est seule.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tes lèvres sont comme un liseré cramoisi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ta bouche est charmante.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Derrière ton voile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta joue est comme une moitié de grenade.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ton cou est pareil à la tour de David,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'construite pour être un arsenal:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mille boucliers y sont suspendus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les boucliers des héros.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tes deux seins sont comme deux faons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme les jumeaux d'une gazelle
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui broutent au milieu des lis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Avant que la brise du jour ne souffle
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que les ombres ne fuient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'irai à la montagne de la myrrhe
- type: usfm
  marker: q1
  children:
  - type: text
    text: et à la colline de l'encens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tu es toute belle, mon amie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n'y a aucun défaut en toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Viens avec moi du Liban, ma chérie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: viens avec moi du Liban!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Regarde du sommet de l'Amana,
- type: usfm
  marker: q1
  children:
  - type: text
    text: du sommet du Senir et de l'Hermon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des tanières des lions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des montagnes des léopards!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tu as volé mon cœur, ma sœur, ma chérie!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as volé mon cœur grâce à un seul de tes regards,
- type: usfm
  marker: q1
  children:
  - type: text
    text: grâce à un seul des colliers de ton cou.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Comme ton amour est beau, ma sœur, ma chérie!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ton amour est bien meilleur que le vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le parfum de tes huiles que tous les aromates!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tes lèvres distillent le miel, ma chérie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il y a sous ta langue du miel et du lait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'odeur de tes habits est pareille à celle du Liban.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tu es un jardin privé, ma sœur, ma chérie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une fontaine fermée, une source réservée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tes pousses sont un jardin de grenadiers
- type: usfm
  marker: q1
  children:
  - type: text
    text: aux fruits les meilleurs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On y trouve réunis du henné et du nard,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: nard et safran, roseau aromatique et cinnamome,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toutes sortes d'arbres à encens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: myrrhe et aloès,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les principaux aromates.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tu es la source des jardins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un puits d'eau vive
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui coule du Liban!
- type: usfm
  marker: sp
  children:
  - type: text
    text: La jeune femme
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Lève-toi, vent du nord! Viens, vent du sud!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Soufflez sur mon jardin et que ses aromates se diffusent!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que mon bien-aimé entre dans son jardin
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin qu'il mange de ses fruits les meilleurs!
