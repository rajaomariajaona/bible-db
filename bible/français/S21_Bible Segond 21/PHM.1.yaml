document_id: PHM.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salutation et louange
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'De la part de Paul, prisonnier de Jésus-Christ, et de la part du frère Timothée à Philémon, notre bien-aimé collaborateur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'à notre bien-aimée Apphia, à Archippe, notre compagnon de combat, et à l''Eglise qui se réunit dans ta maison: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: que la grâce et la paix vous soient données de la part de Dieu notre Père et du Seigneur Jésus-Christ!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je dis constamment à mon Dieu toute ma reconnaissance en faisant mention de toi dans mes prières, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: car j'entends parler de ta foi dans le Seigneur Jésus et de ton amour pour tous les saints
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Saints: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: manière de désigner les chrétiens en tant que personnes consacrées à Dieu et appelées à avoir le comportement qui découle de leur appartenance à ce Dieu.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je lui demande que ta participation à la foi soit efficace et fasse reconnaître tout le bien que nous accomplissons pour la cause de [Jésus-]Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Nous éprouvons en effet beaucoup de reconnaissance et de réconfort au sujet de ton amour, car grâce à toi, frère, le cœur des saints a été tranquillisé.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Demande de Paul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'C''est pourquoi, bien que j''aie en Christ toute liberté de te prescrire ce qui convient, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'c''est au nom de l''amour que je préfère t''adresser une requête, moi Paul, qui suis un vieillard et de plus, maintenant, un prisonnier de Jésus-Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Je t'adresse cette requête à propos de mon enfant, celui qui est devenu mon fils en prison, Onésime
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Onésime: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: esclave de Philémon qui s'était enfui de chez son maître et avait dû terminer son parcours de fugitif à Rome, où il s'était converti au contact de Paul.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Autrefois il t''a été inutile, mais maintenant il nous est bien utile, à toi comme à moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je te le renvoie, [et toi, accueille-le,] lui qui est une partie de moi-même. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'J''aurais désiré le garder près de moi pour qu''il me serve à ta place pendant que je suis en prison pour l''Evangile, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: mais je n'ai rien voulu faire sans ton avis, afin que ton bienfait ne paraisse pas forcé, mais qu'il soit volontaire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Peut-être a-t-il été séparé de toi pour un temps afin que tu le retrouves pour toujours, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: non plus comme un esclave, mais bien mieux encore, comme un frère bien-aimé. Il l'est particulièrement pour moi, il le sera d'autant plus pour toi dans vos rapports humains et dans le Seigneur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Si donc tu me considères comme ton ami, accueille-le comme si c''était moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et s''il t''a fait du tort ou te doit quelque chose, mets-le sur mon compte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Moi Paul, je l''écris de ma propre main, je te rembourserai, sans vouloir te rappeler que toi aussi, tu as une dette envers moi: c''est toi-même'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Toi-même: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: allusion au fait que Paul avait conduit Philémon au salut.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Oui, frère, rends-moi ce service dans le Seigneur: tranquillise mon cœur en Christ.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'C''est en comptant sur ton obéissance que je t''ai écrit, sachant que tu feras même plus que je ne demande. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: En même temps, prépare-moi un logement, car j'espère vous être rendu grâce à vos prières.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salutations
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Epaphras, mon compagnon de détention en Jésus-Christ, te salue, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ainsi que Marc, Aristarque, Démas et Luc, mes collaborateurs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Que la grâce de notre Seigneur Jésus-Christ soit avec votre esprit!
