document_id: PHM.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation et louange
  - type: text
    content: 'De la part de Paul, prisonnier de Jésus-Christ, et de la part du frère Timothée à Philémon, notre bien-aimé collaborateur, '
  '10':
  - type: text
    content: Je t'adresse cette requête à propos de mon enfant, celui qui est devenu mon fils en prison, Onésime
  - type: note
    content: 'Onésime: esclave de Philémon qui s''était enfui de chez son maître et avait dû terminer son parcours de fugitif à Rome, où il s''était converti au contact de Paul.'
  - type: text
    content: '. '
  '11':
  - type: text
    content: 'Autrefois il t''a été inutile, mais maintenant il nous est bien utile, à toi comme à moi. '
  '12':
  - type: text
    content: 'Je te le renvoie, [et toi, accueille-le,] lui qui est une partie de moi-même. '
  '13':
  - type: text
    content: 'J''aurais désiré le garder près de moi pour qu''il me serve à ta place pendant que je suis en prison pour l''Evangile, '
  '14':
  - type: text
    content: mais je n'ai rien voulu faire sans ton avis, afin que ton bienfait ne paraisse pas forcé, mais qu'il soit volontaire.
  '15':
  - type: text
    content: 'Peut-être a-t-il été séparé de toi pour un temps afin que tu le retrouves pour toujours, '
  '16':
  - type: text
    content: non plus comme un esclave, mais bien mieux encore, comme un frère bien-aimé. Il l'est particulièrement pour moi, il le sera d'autant plus pour toi dans vos rapports humains et dans le Seigneur.
  '17':
  - type: text
    content: 'Si donc tu me considères comme ton ami, accueille-le comme si c''était moi. '
  '18':
  - type: text
    content: 'Et s''il t''a fait du tort ou te doit quelque chose, mets-le sur mon compte. '
  '19':
  - type: text
    content: 'Moi Paul, je l''écris de ma propre main, je te rembourserai, sans vouloir te rappeler que toi aussi, tu as une dette envers moi: c''est toi-même'
  - type: note
    content: 'Toi-même: allusion au fait que Paul avait conduit Philémon au salut.'
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'à notre bien-aimée Apphia, à Archippe, notre compagnon de combat, et à l''Eglise qui se réunit dans ta maison: '
  '20':
  - type: text
    content: 'Oui, frère, rends-moi ce service dans le Seigneur: tranquillise mon cœur en Christ.'
  '21':
  - type: text
    content: 'C''est en comptant sur ton obéissance que je t''ai écrit, sachant que tu feras même plus que je ne demande. '
  '22':
  - type: text
    content: En même temps, prépare-moi un logement, car j'espère vous être rendu grâce à vos prières.
  - type: heading
    content: Salutations
  '23':
  - type: text
    content: 'Epaphras, mon compagnon de détention en Jésus-Christ, te salue, '
  '24':
  - type: text
    content: ainsi que Marc, Aristarque, Démas et Luc, mes collaborateurs.
  '25':
  - type: text
    content: Que la grâce de notre Seigneur Jésus-Christ soit avec votre esprit!
  '3':
  - type: text
    content: que la grâce et la paix vous soient données de la part de Dieu notre Père et du Seigneur Jésus-Christ!
  '4':
  - type: text
    content: 'Je dis constamment à mon Dieu toute ma reconnaissance en faisant mention de toi dans mes prières, '
  '5':
  - type: text
    content: car j'entends parler de ta foi dans le Seigneur Jésus et de ton amour pour tous les saints
  - type: note
    content: 'Saints: manière de désigner les chrétiens en tant que personnes consacrées à Dieu et appelées à avoir le comportement qui découle de leur appartenance à ce Dieu.'
  - type: text
    content: '. '
  '6':
  - type: text
    content: 'Je lui demande que ta participation à la foi soit efficace et fasse reconnaître tout le bien que nous accomplissons pour la cause de [Jésus-]Christ. '
  '7':
  - type: text
    content: Nous éprouvons en effet beaucoup de reconnaissance et de réconfort au sujet de ton amour, car grâce à toi, frère, le cœur des saints a été tranquillisé.
  - type: heading
    content: Demande de Paul
  '8':
  - type: text
    content: 'C''est pourquoi, bien que j''aie en Christ toute liberté de te prescrire ce qui convient, '
  '9':
  - type: text
    content: 'c''est au nom de l''amour que je préfère t''adresser une requête, moi Paul, qui suis un vieillard et de plus, maintenant, un prisonnier de Jésus-Christ. '
