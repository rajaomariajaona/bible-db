document_id: ROM.11,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Une mise à l'écart ni totale ni définitive
  - type: text
    content: 'Je demande donc: «Dieu aurait-il rejeté son peuple?» Certainement pas! En effet, je suis moi-même israélite, de la descendance d''Abraham, de la tribu de Benjamin. '
  '10':
  - type: text
    content: Que leurs yeux soient obscurcis pour ne pas voir, fais-leur courber constamment le dos!
  - type: note
    content: 'Que leur table… le dos: citation du Psaume 69.23-24.'
  '11':
  - type: text
    content: 'Je demande donc: «Serait-ce pour tomber que les Israélites ont trébuché?» Certainement pas! Mais grâce à leur faux pas, les non-Juifs ont eu accès au salut afin de provoquer leur jalousie. '
  '12':
  - type: text
    content: 'Or, si leur faux pas a fait la richesse du monde et leur déchéance la richesse des non-Juifs, cela sera d''autant plus le cas avec leur complet rétablissement. '
  '13':
  - type: text
    content: 'Je vous le dis, à vous qui êtes d''origine non juive: en tant qu''apôtre des non-Juifs, je me montre fier de mon ministère '
  '14':
  - type: text
    content: 'afin, si possible, de provoquer la jalousie de mon peuple et d''en sauver quelques-uns. '
  '15':
  - type: text
    content: En effet, si leur mise à l'écart a entraîné la réconciliation du monde, que produira leur réintégration, sinon le passage de la mort à la vie?
  '16':
  - type: text
    content: 'Or si la première part de pain est sainte, tout le pain l''est aussi; et si la racine est sainte, les branches le sont aussi. '
  '17':
  - type: text
    content: 'Mais si quelques-unes des branches ont été coupées et si toi, qui étais un olivier sauvage, tu as été greffé parmi les branches restantes et tu es devenu participant de la racine et de la sève de l''olivier, '
  '18':
  - type: text
    content: ne te vante pas aux dépens de ces branches. Si tu te vantes, sache que ce n'est pas toi qui portes la racine, mais que c'est la racine qui te porte.
  '19':
  - type: text
    content: 'Tu diras alors: «Des branches ont été coupées afin que moi je sois greffé.» '
  '2':
  - type: text
    content: 'Dieu n''a pas rejeté son peuple, qu''il a connu d''avance. Ne savez-vous pas ce que l''Ecriture rapporte au sujet d''Elie, quand le prophète adresse à Dieu cette plainte contre Israël: '
  '20':
  - type: text
    content: 'C''est vrai. Elles ont été retranchées à cause de leur incrédulité et toi, c''est par la foi que tu subsistes. Ne fais pas preuve d''orgueil, mais aie de la crainte, '
  '21':
  - type: text
    content: 'car si Dieu n''a pas épargné les branches naturelles, il ne t''épargnera pas non plus. '
  '22':
  - type: text
    content: 'Considère donc la bonté et la sévérité de Dieu: sévérité envers ceux qui sont tombés et bonté envers toi, si tu demeures dans sa bonté; autrement, toi aussi tu seras retranché. '
  '23':
  - type: text
    content: 'Quant aux Israélites, s''ils ne persistent pas dans l''incrédulité, ils seront greffés, car Dieu est puissant pour les greffer de nouveau. '
  '24':
  - type: text
    content: Si toi, tu as été coupé de l'olivier sauvage auquel tu appartenais par nature et greffé contrairement à ta nature sur l'olivier cultivé, à plus forte raison eux seront-ils greffés conformément à leur nature sur leur propre olivier.
  '25':
  - type: text
    content: 'En effet, je ne veux pas, frères et sœurs, que vous ignoriez ce mystère, afin que vous ne vous preniez pas pour des sages: une partie d''Israël est tombée dans l''endurcissement jusqu''à ce que l''ensemble des non-Juifs soit entré. '
  '26':
  - type: text
    content: 'Et ainsi tout Israël sera sauvé, comme le dit l''Ecriture: '
  - type: text
    content: Le libérateur viendra de Sion et il écartera de Jacob les impiétés.
  - type: text
    content: ' '
  '27':
  - type: text
    content: Et telle sera mon alliance avec eux, lorsque j'enlèverai leurs péchés
  - type: text
    content: .
  - type: note
    content: 'Le libérateur… péchés: citation d''Esaïe 59.20-21 complétée par Esaïe 27.9.'
  '28':
  - type: text
    content: 'En ce qui concerne l''Evangile, ils sont ennemis à cause de vous; mais en ce qui concerne l''élection, ils sont aimés à cause de leurs ancêtres. '
  '29':
  - type: text
    content: 'En effet, les dons et l''appel de Dieu sont irrévocables. '
  '3':
  - type: text
    content: Seigneur, ils ont tué tes prophètes, ils ont démoli tes autels; moi seul, je suis resté, et ils cherchent à m'enlever la vie
  - type: text
    content: '? '
  '30':
  - type: text
    content: 'De même que vous avez autrefois désobéi à Dieu et que vous avez maintenant obtenu grâce à cause de leur désobéissance, '
  '31':
  - type: text
    content: 'de même ils ont maintenant désobéi afin d''obtenir eux aussi grâce à cause de la grâce qui vous a été faite, '
  '32':
  - type: text
    content: car Dieu a enfermé tous les hommes dans la désobéissance pour faire grâce à tous.
  '33':
  - type: text
    content: 'Quelle profondeur ont la richesse, la sagesse et la connaissance de Dieu! Que ses jugements sont insondables, et ses voies impénétrables! En effet, '
  '34':
  - type: text
    content: qui a connu la pensée du Seigneur, ou qui a été son conseiller?
  - type: note
    content: 'Qui a connu… conseiller: citation d''Esaïe 40.13.'
  - type: text
    content: ' '
  '35':
  - type: text
    content: Qui lui a donné le premier, pour être payé en retour?
  - type: note
    content: 'Qui lui a donné… retour: citation de Job 41.3.'
  '36':
  - type: text
    content: C'est de lui, par lui et pour lui que sont toutes choses. A lui la gloire dans tous les siècles! Amen!
  '4':
  - type: text
    content: 'Mais quelle réponse Dieu lui donne-t-il? '
  - type: text
    content: Je me suis réservé 7000 hommes qui n'ont pas plié les genoux devant Baal
  - type: text
    content: .
  - type: note
    content: 'Seigneur… Baal: citation de 1 Rois 19.10, 18.'
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'De même, dans le temps présent aussi, il y a un reste conformément à l''élection de la grâce. '
  '6':
  - type: text
    content: Or, si c'est par grâce, ce n'est plus par les œuvres, autrement la grâce n'est plus une grâce. [Et si c'est par les œuvres, ce n'est plus une grâce, autrement l'œuvre n'est plus une œuvre.]
  '7':
  - type: text
    content: 'Qu''en est-il donc? Ce qu''Israël recherche, il ne l''a pas obtenu, mais ceux qui ont été choisis l''ont obtenu et les autres ont été endurcis. '
  '8':
  - type: text
    content: 'Comme il est écrit, '
  - type: text
    content: Dieu leur a donné un esprit de torpeur, des yeux pour ne pas voir et des oreilles pour ne pas entendre, jusqu'à aujourd'hui
  - type: note
    content: 'Dieu… aujourd''hui: citation combinant Esaïe 29.10 et Deutéronome 29.3.'
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'David aussi dit: '
  - type: text
    content: Que leur table soit pour eux un piège, un filet, un obstacle et un moyen de punition!
  - type: text
    content: ' '
