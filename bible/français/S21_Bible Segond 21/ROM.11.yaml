document_id: ROM.11,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Une mise à l'écart ni totale ni définitive
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Je demande donc: «Dieu aurait-il rejeté son peuple?» Certainement pas! En effet, je suis moi-même israélite, de la descendance d''Abraham, de la tribu de Benjamin. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Que leurs yeux soient obscurcis pour ne pas voir, fais-leur courber constamment le dos!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.9-10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Que leur table… le dos: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 69.23-24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Je demande donc: «Serait-ce pour tomber que les Israélites ont trébuché?» Certainement pas! Mais grâce à leur faux pas, les non-Juifs ont eu accès au salut afin de provoquer leur jalousie. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Or, si leur faux pas a fait la richesse du monde et leur déchéance la richesse des non-Juifs, cela sera d''autant plus le cas avec leur complet rétablissement. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Je vous le dis, à vous qui êtes d''origine non juive: en tant qu''apôtre des non-Juifs, je me montre fier de mon ministère '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'afin, si possible, de provoquer la jalousie de mon peuple et d''en sauver quelques-uns. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: En effet, si leur mise à l'écart a entraîné la réconciliation du monde, que produira leur réintégration, sinon le passage de la mort à la vie?
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Or si la première part de pain est sainte, tout le pain l''est aussi; et si la racine est sainte, les branches le sont aussi. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Mais si quelques-unes des branches ont été coupées et si toi, qui étais un olivier sauvage, tu as été greffé parmi les branches restantes et tu es devenu participant de la racine et de la sève de l''olivier, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ne te vante pas aux dépens de ces branches. Si tu te vantes, sache que ce n'est pas toi qui portes la racine, mais que c'est la racine qui te porte.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tu diras alors: «Des branches ont été coupées afin que moi je sois greffé.» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dieu n''a pas rejeté son peuple, qu''il a connu d''avance. Ne savez-vous pas ce que l''Ecriture rapporte au sujet d''Elie, quand le prophète adresse à Dieu cette plainte contre Israël: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'C''est vrai. Elles ont été retranchées à cause de leur incrédulité et toi, c''est par la foi que tu subsistes. Ne fais pas preuve d''orgueil, mais aie de la crainte, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'car si Dieu n''a pas épargné les branches naturelles, il ne t''épargnera pas non plus. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Considère donc la bonté et la sévérité de Dieu: sévérité envers ceux qui sont tombés et bonté envers toi, si tu demeures dans sa bonté; autrement, toi aussi tu seras retranché. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Quant aux Israélites, s''ils ne persistent pas dans l''incrédulité, ils seront greffés, car Dieu est puissant pour les greffer de nouveau. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Si toi, tu as été coupé de l'olivier sauvage auquel tu appartenais par nature et greffé contrairement à ta nature sur l'olivier cultivé, à plus forte raison eux seront-ils greffés conformément à leur nature sur leur propre olivier.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'En effet, je ne veux pas, frères et sœurs, que vous ignoriez ce mystère, afin que vous ne vous preniez pas pour des sages: une partie d''Israël est tombée dans l''endurcissement jusqu''à ce que l''ensemble des non-Juifs soit entré. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Et ainsi tout Israël sera sauvé, comme le dit l''Ecriture: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Le libérateur viendra de Sion et il écartera de Jacob les impiétés.
    - type: text
      text: ' '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Et telle sera mon alliance avec eux, lorsque j'enlèverai leurs péchés
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.26-27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le libérateur… péchés: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 59.20-21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' complétée par Esaïe 27.9.'
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'En ce qui concerne l''Evangile, ils sont ennemis à cause de vous; mais en ce qui concerne l''élection, ils sont aimés à cause de leurs ancêtres. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'En effet, les dons et l''appel de Dieu sont irrévocables. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Seigneur, ils ont tué tes prophètes, ils ont démoli tes autels; moi seul, je suis resté, et ils cherchent à m'enlever la vie
    - type: text
      text: '? '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'De même que vous avez autrefois désobéi à Dieu et que vous avez maintenant obtenu grâce à cause de leur désobéissance, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'de même ils ont maintenant désobéi afin d''obtenir eux aussi grâce à cause de la grâce qui vous a été faite, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: car Dieu a enfermé tous les hommes dans la désobéissance pour faire grâce à tous.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Quelle profondeur ont la richesse, la sagesse et la connaissance de Dieu! Que ses jugements sont insondables, et ses voies impénétrables! En effet, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: qui a connu la pensée du Seigneur, ou qui a été son conseiller?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.34 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qui a connu… conseiller: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 40.13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Qui lui a donné le premier, pour être payé en retour?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.35 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qui lui a donné… retour: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Job 41.3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: C'est de lui, par lui et pour lui que sont toutes choses. A lui la gloire dans tous les siècles! Amen!
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Mais quelle réponse Dieu lui donne-t-il? '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Je me suis réservé 7000 hommes qui n'ont pas plié les genoux devant Baal
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.3-4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Seigneur… Baal: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Rois 19.10
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '18'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'De même, dans le temps présent aussi, il y a un reste conformément à l''élection de la grâce. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Or, si c'est par grâce, ce n'est plus par les œuvres, autrement la grâce n'est plus une grâce. [Et si c'est par les œuvres, ce n'est plus une grâce, autrement l'œuvre n'est plus une œuvre.]
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Qu''en est-il donc? Ce qu''Israël recherche, il ne l''a pas obtenu, mais ceux qui ont été choisis l''ont obtenu et les autres ont été endurcis. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Comme il est écrit, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Dieu leur a donné un esprit de torpeur, des yeux pour ne pas voir et des oreilles pour ne pas entendre, jusqu'à aujourd'hui
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dieu… aujourd''hui: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation combinant '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 29.10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deutéronome 29.3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'David aussi dit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Que leur table soit pour eux un piège, un filet, un obstacle et un moyen de punition!
    - type: text
      text: ' '
