document_id: EXO.15,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Cantique de Moïse et d'Israël
  - type: text
    content: 'Alors Moïse et les Israélites chantèrent ce cantique en l''honneur de l''Eternel:'
  - type: text
    content: '«Je chanterai en l''honneur de l''Eternel, car il a fait éclater sa gloire; il a précipité le cheval et son cavalier dans la mer. '
  '10':
  - type: text
    content: 'Tu as soufflé de ton haleine: la mer les a couverts; ils se sont enfoncés comme du plomb dans l''eau profonde.'
  '11':
  - type: text
    content: '»Qui est semblable à toi parmi les dieux, Eternel? Qui est, comme toi, magnifique de sainteté, redoutable, digne d''être loué, capable de faire des miracles? '
  '12':
  - type: text
    content: 'Tu as tendu ta main droite: la terre les a engloutis. '
  '13':
  - type: text
    content: Dans ta bonté tu as conduit, tu as racheté ce peuple; par ta puissance tu le diriges vers ta sainte demeure.
  '14':
  - type: text
    content: '»Les peuples l''apprennent et ils tremblent: la douleur s''empare des Philistins, '
  '15':
  - type: text
    content: 'les chefs d''Edom sont épouvantés, un tremblement s''empare des guerriers de Moab, tous les habitants de Canaan perdent courage. '
  '16':
  - type: text
    content: 'La terreur et la frayeur les surprendront. Devant la grandeur de ta puissance, ils deviendront muets comme une pierre, jusqu''à ce que ton peuple soit passé, Eternel, jusqu''à ce qu''il soit passé, le peuple que tu as acquis. '
  '17':
  - type: text
    content: Tu les conduiras et les établiras sur la montagne de ton héritage, à l'endroit que tu as préparé pour ta demeure, Eternel, au sanctuaire, Seigneur, que tes mains ont fondé.
  '18':
  - type: text
    content: '»L''Eternel régnera éternellement et à toujours. '
  '19':
  - type: text
    content: Oui, les chevaux du pharaon, ses chars et ses cavaliers ont pénétré dans la mer, et l'Eternel en a ramené l'eau sur eux, alors que les Israélites ont marché à pied sec au milieu de la mer.»
  '2':
  - type: text
    content: '*L''Eternel est ma force et le sujet de mes louanges, c''est lui qui m''a sauvé.'
  - type: note
    content: 'L''Eternel… sauvé: même texte au Psaume 118.14 et en Esaïe 12.2.'
  - type: text
    content: ' Il est mon Dieu: je le célébrerai. Il est le Dieu de mon père: je proclamerai sa grandeur. '
  '20':
  - type: text
    content: 'Miriam la prophétesse, la sœur d''Aaron, prit à la main un tambourin et toutes les femmes sortirent à sa suite avec des tambourins et en dansant. '
  '21':
  - type: text
    content: 'Miriam répondait aux Israélites: «Chantez en l''honneur de l''Eternel, car il a fait éclater sa gloire; il a précipité le cheval et son cavalier dans la mer.»'
  - type: heading
    content: Premières étapes dans le désert
  - type: heading
    content: 15.22–18.27
  - type: heading
    content: L'eau de Mara
  '22':
  - type: text
    content: 'Moïse fit partir Israël de la mer des Roseaux et ils prirent la direction du désert de Shur. Après 3 journées de marche dans le désert, ils ne trouvèrent pas d''eau. '
  '23':
  - type: text
    content: 'Ils arrivèrent à Mara, mais ils ne purent pas boire l''eau de Mara parce qu''elle était amère. C''est pourquoi cet endroit fut appelé Mara. '
  '24':
  - type: text
    content: 'Le peuple murmura contre Moïse en disant: «Que boirons-nous?» '
  '25':
  - type: text
    content: 'Moïse cria à l''Eternel et l''Eternel lui indiqua un morceau de bois qu''il jeta dans l''eau, et l''eau devint douce. Ce fut là que l''Eternel donna au peuple des prescriptions et des règles, et ce fut là qu''il le mit à l''épreuve. '
  '26':
  - type: text
    content: 'Il dit: «Si tu écoutes attentivement l''Eternel, ton Dieu, si tu fais ce qui est droit à ses yeux, si tu prêtes l''oreille à ses commandements et si tu obéis à toutes ses prescriptions, je ne te frapperai d''aucune des maladies dont j''ai frappé les Egyptiens, car je suis l''Eternel, celui qui te guérit.»'
  '27':
  - type: text
    content: Ils arrivèrent à Elim, où il y avait 12 sources d'eau et 70 palmiers. Ils campèrent là, près de l'eau.
  '3':
  - type: text
    content: 'L''Eternel est un vaillant guerrier, son nom est l''Eternel. '
  '4':
  - type: text
    content: 'Il a jeté dans la mer les chars du pharaon et son armée, ses combattants d''élite ont été engloutis dans la mer des Roseaux. '
  '5':
  - type: text
    content: Les vagues les ont couverts, ils sont descendus au fond de l'eau, pareils à une pierre.
  '6':
  - type: text
    content: '»Ta main droite, Eternel, est magnifique de force. Ta main droite, Eternel, a écrasé l''ennemi. '
  '7':
  - type: text
    content: 'Par la grandeur de ta majesté tu renverses tes adversaires. Tu déchaînes ta colère: elle les dévore comme de la paille. '
  '8':
  - type: text
    content: 'Tu as soufflé et l''eau s''est rassemblée, les courants se sont dressés comme une muraille, les vagues se sont durcies au milieu de la mer. '
  '9':
  - type: text
    content: 'L''ennemi disait: ‘Je les poursuivrai, je les rattraperai, je partagerai le butin. Ma vengeance sera assouvie; je tirerai mon épée, ma main les détruira.’ '
