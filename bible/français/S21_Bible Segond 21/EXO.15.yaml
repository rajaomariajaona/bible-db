document_id: EXO.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Cantique de Moïse et d'Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors Moïse et les Israélites chantèrent ce cantique en l''honneur de l''Eternel:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Je chanterai en l''honneur de l''Eternel, car il a fait éclater sa gloire; il a précipité le cheval et son cavalier dans la mer. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '*L''Eternel est ma force et le sujet de mes louanges, c''est lui qui m''a sauvé.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''Eternel… sauvé: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'même texte au '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 118.14
      metadata:
        usfm: PSA.118.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' et en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 12.2
      metadata:
        usfm: ISA.12.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' Il est mon Dieu: je le célébrerai. Il est le Dieu de mon père: je proclamerai sa grandeur. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'L''Eternel est un vaillant guerrier, son nom est l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il a jeté dans la mer les chars du pharaon et son armée, ses combattants d''élite ont été engloutis dans la mer des Roseaux. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les vagues les ont couverts, ils sont descendus au fond de l'eau, pareils à une pierre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '»Ta main droite, Eternel, est magnifique de force. Ta main droite, Eternel, a écrasé l''ennemi. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Par la grandeur de ta majesté tu renverses tes adversaires. Tu déchaînes ta colère: elle les dévore comme de la paille. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tu as soufflé et l''eau s''est rassemblée, les courants se sont dressés comme une muraille, les vagues se sont durcies au milieu de la mer. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'L''ennemi disait: ‘Je les poursuivrai, je les rattraperai, je partagerai le butin. Ma vengeance sera assouvie; je tirerai mon épée, ma main les détruira.’ '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tu as soufflé de ton haleine: la mer les a couverts; ils se sont enfoncés comme du plomb dans l''eau profonde.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '»Qui est semblable à toi parmi les dieux, Eternel? Qui est, comme toi, magnifique de sainteté, redoutable, digne d''être loué, capable de faire des miracles? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tu as tendu ta main droite: la terre les a engloutis. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dans ta bonté tu as conduit, tu as racheté ce peuple; par ta puissance tu le diriges vers ta sainte demeure.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '»Les peuples l''apprennent et ils tremblent: la douleur s''empare des Philistins, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'les chefs d''Edom sont épouvantés, un tremblement s''empare des guerriers de Moab, tous les habitants de Canaan perdent courage. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'La terreur et la frayeur les surprendront. Devant la grandeur de ta puissance, ils deviendront muets comme une pierre, jusqu''à ce que ton peuple soit passé, Eternel, jusqu''à ce qu''il soit passé, le peuple que tu as acquis. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tu les conduiras et les établiras sur la montagne de ton héritage, à l'endroit que tu as préparé pour ta demeure, Eternel, au sanctuaire, Seigneur, que tes mains ont fondé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '»L''Eternel régnera éternellement et à toujours. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Oui, les chevaux du pharaon, ses chars et ses cavaliers ont pénétré dans la mer, et l'Eternel en a ramené l'eau sur eux, alors que les Israélites ont marché à pied sec au milieu de la mer.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Miriam la prophétesse, la sœur d''Aaron, prit à la main un tambourin et toutes les femmes sortirent à sa suite avec des tambourins et en dansant. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Miriam répondait aux Israélites: «Chantez en l''honneur de l''Eternel, car il a fait éclater sa gloire; il a précipité le cheval et son cavalier dans la mer.»'
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Premières étapes dans le désert
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 15.22–18.27
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'eau de Mara
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Moïse fit partir Israël de la mer des Roseaux et ils prirent la direction du désert de Shur. Après 3 journées de marche dans le désert, ils ne trouvèrent pas d''eau. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ils arrivèrent à Mara, mais ils ne purent pas boire l''eau de Mara parce qu''elle était amère. C''est pourquoi cet endroit fut appelé Mara. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Le peuple murmura contre Moïse en disant: «Que boirons-nous?» '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Moïse cria à l''Eternel et l''Eternel lui indiqua un morceau de bois qu''il jeta dans l''eau, et l''eau devint douce. Ce fut là que l''Eternel donna au peuple des prescriptions et des règles, et ce fut là qu''il le mit à l''épreuve. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il dit: «Si tu écoutes attentivement l''Eternel, ton Dieu, si tu fais ce qui est droit à ses yeux, si tu prêtes l''oreille à ses commandements et si tu obéis à toutes ses prescriptions, je ne te frapperai d''aucune des maladies dont j''ai frappé les Egyptiens, car je suis l''Eternel, celui qui te guérit.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ils arrivèrent à Elim, où il y avait 12 sources d'eau et 70 palmiers. Ils campèrent là, près de l'eau.
