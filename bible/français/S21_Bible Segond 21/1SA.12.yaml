document_id: 1SA.12,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Avertissements de Samuel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Samuel dit à tout Israël: «Je vous ai écoutés dans tout ce que vous m''avez dit et j''ai établi un roi sur vous. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ils ont encore crié à l''Eternel en disant: ‘Nous avons péché, car nous avons abandonné l''Eternel et nous avons servi les Baals et les Astartés. Délivre-nous maintenant de nos ennemis, et nous te servirons.’ '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'L''Eternel a envoyé Jerubbaal, Bedan, Jephthé et Samuel, et il vous a délivrés des ennemis qui vous environnaient, et vous avez habité en sécurité. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Puis, vous avez vu que Nachash, le roi des Ammonites, venait vous attaquer et vous m''avez dit: ‘Cela suffit. Il faut qu''un roi règne sur nous.’ Et pourtant l''Eternel, votre Dieu, était votre roi. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Voici donc le roi que vous avez choisi, que vous avez réclamé. L''Eternel a bien voulu établir un roi sur vous, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'à condition que vous craigniez l''Eternel, que vous le serviez, que vous lui obéissiez, que vous ne vous révoltiez pas contre sa parole, mais que vous vous attachiez à l''Eternel, votre Dieu, vous et le roi qui règne sur vous. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Mais si vous n''obéissez pas à la voix de l''Eternel et si vous vous révoltez contre sa parole, la main de l''Eternel se portera contre vous, comme elle s''est portée contre vos ancêtres. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Attendez encore ici et regardez l''acte extraordinaire que l''Eternel va réaliser sous vos yeux. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ne sommes-nous pas à l'époque de la moisson des blés? Je vais faire appel à l'Eternel et il enverra le tonnerre et la pluie. Sachez et comprenez alors combien vous avez eu tort aux yeux de l'Eternel de réclamer un roi.»
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Samuel fit appel à l''Eternel et, le jour même, l''Eternel envoya du tonnerre et de la pluie. Tout le peuple éprouva une grande crainte vis-à-vis de l''Eternel et de Samuel, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'et tout le peuple dit à Samuel: «Prie l''Eternel, ton Dieu, pour nous tes serviteurs, afin que nous ne mourions pas. En effet, nous avons ajouté à tous nos péchés le tort de réclamer un roi.» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Désormais, c''est le roi qui marchera à votre tête. Quant à moi, je suis vieux, j''ai les cheveux blancs, et mes fils sont avec vous. J''ai marché à votre tête depuis ma jeunesse jusqu''à aujourd''hui. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Samuel dit au peuple: «N''ayez pas peur! Vous avez certes fait tout ce mal, mais ne vous détournez pas de l''Eternel et servez-le de tout votre cœur. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ne vous détournez pas de lui, car cela reviendrait à suivre des choses sans valeur, qui ne peuvent apporter ni profit ni délivrance parce qu''elles sont elles-mêmes sans consistance. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'L''Eternel n''abandonnera pas son peuple, et ce à cause de son grand nom, car il a décidé de faire de vous son peuple. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Je ne veux certes pas pécher contre l''Eternel en cessant de prier pour vous! Au contraire, je vous enseignerai le chemin bon et droit. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Seulement, craignez l''Eternel et servez-le fidèlement, de tout votre cœur. Voyez en effet quels actes extraordinaires il a accomplis parmi vous! '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Si en revanche vous faites le mal, vous disparaîtrez, vous et votre roi.»
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Me voici! Rendez témoignage contre moi, en présence de l'Eternel et de celui qu'il a désigné par onction. De qui ai-je pris le bœuf ou l'âne? Qui ai-je opprimé ou traité durement? De qui ai-je reçu un cadeau pour fermer les yeux sur lui? Je vous le rendrai.»
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ils répondirent: «Tu ne nous as pas opprimés, tu ne nous as pas traités durement et tu n''as rien reçu de personne.»'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il leur dit encore: «L''Eternel et celui qu''il a désigné par onction sont témoins contre vous aujourd''hui que vous n''avez rien trouvé entre mes mains.» Et ils répondirent: «Ils en sont témoins.»'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Alors Samuel dit au peuple: «C''est l''Eternel qui a établi Moïse et Aaron et qui a fait sortir vos ancêtres d''Egypte. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Maintenant, tenez-vous là et je vous jugerai devant l''Eternel sur tous les bienfaits qu''il vous a accordés, à vous et à vos ancêtres. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Après la venue de Jacob en Egypte, vos ancêtres ont crié à l''Eternel et il a envoyé Moïse et Aaron. Ceux-ci ont fait sortir vos ancêtres d''Egypte et les ont fait habiter dans ce pays. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Mais ils ont oublié l''Eternel, leur Dieu, et il les a vendus à Sisera, le chef de l''armée de Hatsor, aux Philistins et au roi de Moab, qui leur ont fait la guerre. '
