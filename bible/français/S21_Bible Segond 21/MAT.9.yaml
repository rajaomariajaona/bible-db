document_id: MAT.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guérison d'un paralysé
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus monta dans une barque, traversa le lac et se rendit dans sa ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Des personnes lui amenèrent un paralysé couché sur une civière. Voyant leur foi, Jésus dit au paralysé: «Prends courage, mon enfant, tes péchés te sont pardonnés.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors, quelques spécialistes de la loi se dirent en eux-mêmes: «Cet homme blasphème.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mais Jésus connaissait leurs pensées; il dit: «Pourquoi avez-vous de mauvaises pensées en vous-mêmes? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'En effet, qu''est-ce qui est le plus facile à dire: ‘Tes péchés te sont pardonnés’, ou: ‘Lève-toi et marche’? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Afin que vous sachiez que le Fils de l''homme a sur la terre le pouvoir de pardonner les péchés, lève-toi – dit-il alors au paralysé –, prends ta civière et retourne chez toi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L''homme se leva et rentra chez lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Quand la foule vit cela, elle fut émerveillée et célébra la gloire de Dieu, qui a donné un tel pouvoir aux hommes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Réactions face à Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Jésus partit de là. En passant, il vit un homme assis au bureau des taxes et qui s''appelait Matthieu. Il lui dit: «Suis-moi.» Cet homme se leva et le suivit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Comme Jésus était à table dans la maison, beaucoup de collecteurs d'impôts et de pécheurs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Pécheurs: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire jugés comme tels par ceux qui se croyaient justes.
    marker-yv: yv-n
  - type: text
    text: ' vinrent se mettre à table avec lui et avec ses disciples. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les pharisiens virent cela et dirent à ses disciples: «Pourquoi votre maître mange-t-il avec les collecteurs d''impôts et les pécheurs?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais Jésus, qui avait entendu, leur dit: «Ce ne sont pas les bien portants qui ont besoin de médecin, mais les malades. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Allez apprendre ce que signifie: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Je désire la bonté, et non les sacrifices
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je désire… sacrifices: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Osée 6.6
      metadata:
        usfm: HOS.6.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' En effet, je ne suis pas venu appeler des justes, mais des pécheurs, [à changer d''attitude].»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors les disciples de Jean vinrent vers Jésus et dirent: «Pourquoi nous et les pharisiens jeûnons-nous [souvent], tandis que tes disciples ne jeûnent pas?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jésus leur répondit: «Les invités à la noce peuvent-ils être tristes tant que le marié est avec eux? Les jours viendront où le marié leur sera enlevé, et alors ils jeûneront. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Personne ne coud un morceau de tissu neuf sur un vieil habit, car la pièce ajoutée arrache une partie de l''habit et la déchirure devient pire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: On ne met pas non plus du vin nouveau dans de vieilles outres, sinon les outres éclatent, le vin coule et les outres sont perdues; mais on met le vin nouveau dans des outres neuves, et le vin et les outres se conservent.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guérison d'une femme et résurrection d'une fillette
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tandis qu''il leur adressait ces paroles, un chef arriva, se prosterna devant lui et dit: «Ma fille est morte il y a un instant; mais viens, pose ta main sur elle et elle vivra.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Jésus se leva et le suivit avec ses disciples.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'C''est alors qu''une femme qui souffrait d''hémorragies depuis 12 ans s''approcha par-derrière et toucha le bord de son vêtement, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'car elle se disait: «Si je peux seulement toucher son vêtement, je serai guérie.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jésus se retourna et dit en la voyant: «Prends courage, ma fille, ta foi t''a sauvée.» Et cette femme fut guérie dès ce moment.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Lorsque Jésus fut arrivé à la maison du chef, il vit les joueurs de flûte et la foule bruyante. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il leur dit: «Retirez-vous, car la jeune fille n''est pas morte, mais elle dort», et ils se moquaient de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Quand la foule eut été renvoyée, il entra, prit la main de la jeune fille, et la jeune fille se leva. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Cette nouvelle se propagea dans toute la région.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guérison de deux aveugles et d'un démoniaque
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Quand Jésus partit de là, il fut suivi par deux aveugles qui criaient: «Aie pitié de nous, Fils de David'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Fils de David: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'titre donné au Messie attendu par les Juifs, sur la base notamment de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Samuel 7.12-16
      metadata:
        usfm: 2SA.7.12+2SA.7.13+2SA.7.14+2SA.7.15+2SA.7.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 9.5-6
      metadata:
        usfm: ISA.9.5+ISA.9.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Lorsqu''il fut arrivé à la maison, les aveugles s''approchèrent de lui et Jésus leur dit: «Croyez-vous que je puisse faire cela?» «Oui, Seigneur», lui répondirent-ils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Alors il toucha leurs yeux en disant: «Soyez traités conformément à votre foi», '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'et leurs yeux s''ouvrirent. Jésus leur recommanda avec sévérité: «Faites bien attention que personne ne le sache!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: mais, à peine sortis, ils parlèrent de lui dans toute la région.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Comme ils s''en allaient, on amena à Jésus un démoniaque muet. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Il chassa le démon et le muet se mit à parler. La foule disait, émerveillée: «On n''a jamais rien vu de pareil en Israël», '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'mais les pharisiens disaient: «C''est par le prince des démons qu''il chasse les démons.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mission des douze apôtres
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jésus parcourait toutes les villes et les villages; il enseignait dans les synagogues, proclamait la bonne nouvelle du royaume et guérissait toute maladie et toute infirmité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'A la vue des foules, il fut rempli de compassion pour elles, car elles étaient blessées et abattues, '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: comme des brebis qui n'ont pas de berger
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.36 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Comme… berger: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'comparaison reprise de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Nombres 27.17
      metadata:
        usfm: NUM.27.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Alors il dit à ses disciples: «La moisson est grande, mais il y a peu d''ouvriers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Priez donc le maître de la moisson d'envoyer des ouvriers dans sa moisson.»
