document_id: PRO.31,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Proverbes de Lemuel
  - type: heading
    content: 31.1-31
  - type: heading
    content: Conseils d'une mère
  - type: text
    content: Paroles du roi Lemuel. Message
  - type: note
    content: 'Message: voir la note 30.1.'
  - type: text
    content: ' par lequel sa mère l''a instruit.'
  '10':
  - type: text
    content: Qui trouvera une femme de valeur?
  - type: text
    content: Elle vaut bien plus que des perles.
  '11':
  - type: text
    content: Le cœur de son mari a confiance en elle,
  - type: text
    content: et c'est tout bénéfice pour lui.
  '12':
  - type: text
    content: Elle lui fait du bien, et non du mal,
  - type: text
    content: tous les jours de sa vie.
  '13':
  - type: text
    content: Elle se procure de la laine et du lin
  - type: text
    content: et travaille d'une main joyeuse.
  '14':
  - type: text
    content: Pareille à un navire marchand,
  - type: text
    content: elle rapporte ses provisions de loin.
  '15':
  - type: text
    content: Elle se lève alors qu'il fait encore nuit,
  - type: text
    content: et elle donne la nourriture à sa famille et ses ordres à ses servantes.
  '16':
  - type: text
    content: Elle pense à un champ, et elle l'achète.
  - type: text
    content: Avec le fruit de son travail elle plante une vigne.
  '17':
  - type: text
    content: Avec la force en guise de ceinture,
  - type: text
    content: elle affermit ses bras.
  '18':
  - type: text
    content: Elle constate que ce qu'elle gagne est bon.
  - type: text
    content: 'Sa lampe ne s''éteint pas pendant la nuit:'
  '19':
  - type: text
    content: elle file elle-même la laine,
  - type: text
    content: elle tisse elle-même les habits.
  '2':
  - type: text
    content: Que te dirai-je, mon fils? Que te dirai-je, fils de mon ventre?
  - type: text
    content: Que te dirai-je, fils de mes vœux?
  '20':
  - type: text
    content: Elle ouvre ses bras au malheureux,
  - type: text
    content: elle tend la main au pauvre.
  '21':
  - type: text
    content: Elle ne redoute pas la neige pour sa famille,
  - type: text
    content: car chacun y est habillé de cramoisi.
  '22':
  - type: text
    content: Elle se fait des couvertures,
  - type: text
    content: elle a des habits en fin lin et en pourpre.
  '23':
  - type: text
    content: Son mari est reconnu aux portes de la ville,
  - type: text
    content: lorsqu'il siège avec les anciens du pays.
  '24':
  - type: text
    content: Elle fait des chemises et les vend,
  - type: text
    content: et elle livre des ceintures au marchand.
  '25':
  - type: text
    content: La force et l'honneur, voilà ce qui l'habille.
  - type: text
    content: Elle rit en pensant à l'avenir.
  '26':
  - type: text
    content: Elle ouvre la bouche avec sagesse
  - type: text
    content: et un enseignement plein de bonté est sur sa langue.
  '27':
  - type: text
    content: Elle veille à la bonne marche de sa maison,
  - type: text
    content: elle ne mange pas le pain de la paresse.
  '28':
  - type: text
    content: Ses fils se lèvent et la disent heureuse,
  - type: text
    content: 'son mari aussi, et il chante ses louanges:'
  '29':
  - type: text
    content: «Bien des femmes font preuve de valeur,
  - type: text
    content: mais toi, tu leur es à toutes supérieure.»
  '3':
  - type: text
    content: Ne livre pas ta force aux femmes,
  - type: text
    content: ni tes voies à celles qui causent la perte des rois!
  '30':
  - type: text
    content: La grâce est trompeuse et la beauté est illusoire;
  - type: text
    content: c'est de la femme qui craint l'Eternel qu'on chantera les louanges.
  '31':
  - type: text
    content: Donnez-lui du fruit de son travail
  - type: text
    content: et qu'aux portes de la ville ses œuvres fassent son éloge!
  '4':
  - type: text
    content: Ce n'est pas aux rois, Lemuel,
  - type: text
    content: ce n'est pas aux rois de boire du vin,
  - type: text
    content: ni aux princes de rechercher des boissons fortes.
  '5':
  - type: text
    content: En effet, en buvant ils pourraient oublier les lois
  - type: text
    content: et porter atteinte à la cause des plus malheureux.
  '6':
  - type: text
    content: Donnez des liqueurs fortes à celui qui va mourir,
  - type: text
    content: 'du vin à celui qui est rempli d''amertume:'
  '7':
  - type: text
    content: qu'il boive et oublie ainsi sa pauvreté,
  - type: text
    content: qu'il ne se souvienne plus de sa peine.
  '8':
  - type: text
    content: Ouvre ta bouche pour celui qui ne peut pas s'exprimer,
  - type: text
    content: pour la cause de tous les délaissés!
  '9':
  - type: text
    content: Ouvre ta bouche, juge avec justice
  - type: text
    content: et défends le malheureux et le pauvre!
  - type: heading
    content: Une femme de valeur
