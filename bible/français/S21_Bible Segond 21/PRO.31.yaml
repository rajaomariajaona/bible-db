document_id: PRO.31
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Proverbes de Lemuel
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 31.1-31
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Conseils d'une mère
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Paroles du roi Lemuel. Message
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Message: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir la note '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '30.1'
      metadata:
        usfm: PRO.30.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' par lequel sa mère l''a instruit.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Que te dirai-je, mon fils? Que te dirai-je, fils de mon ventre?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que te dirai-je, fils de mes vœux?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ne livre pas ta force aux femmes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni tes voies à celles qui causent la perte des rois!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ce n'est pas aux rois, Lemuel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce n'est pas aux rois de boire du vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni aux princes de rechercher des boissons fortes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: En effet, en buvant ils pourraient oublier les lois
- type: usfm
  marker: q1
  children:
  - type: text
    text: et porter atteinte à la cause des plus malheureux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Donnez des liqueurs fortes à celui qui va mourir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'du vin à celui qui est rempli d''amertume:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: qu'il boive et oublie ainsi sa pauvreté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'il ne se souvienne plus de sa peine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ouvre ta bouche pour celui qui ne peut pas s'exprimer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour la cause de tous les délaissés!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ouvre ta bouche, juge avec justice
- type: usfm
  marker: q1
  children:
  - type: text
    text: et défends le malheureux et le pauvre!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Une femme de valeur
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Qui trouvera une femme de valeur?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle vaut bien plus que des perles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le cœur de son mari a confiance en elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c'est tout bénéfice pour lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Elle lui fait du bien, et non du mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les jours de sa vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Elle se procure de la laine et du lin
- type: usfm
  marker: q1
  children:
  - type: text
    text: et travaille d'une main joyeuse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Pareille à un navire marchand,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle rapporte ses provisions de loin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Elle se lève alors qu'il fait encore nuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et elle donne la nourriture à sa famille et ses ordres à ses servantes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Elle pense à un champ, et elle l'achète.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Avec le fruit de son travail elle plante une vigne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Avec la force en guise de ceinture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle affermit ses bras.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Elle constate que ce qu'elle gagne est bon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Sa lampe ne s''éteint pas pendant la nuit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: elle file elle-même la laine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle tisse elle-même les habits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Elle ouvre ses bras au malheureux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle tend la main au pauvre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Elle ne redoute pas la neige pour sa famille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car chacun y est habillé de cramoisi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Elle se fait des couvertures,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle a des habits en fin lin et en pourpre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Son mari est reconnu aux portes de la ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lorsqu'il siège avec les anciens du pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Elle fait des chemises et les vend,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et elle livre des ceintures au marchand.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: La force et l'honneur, voilà ce qui l'habille.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle rit en pensant à l'avenir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Elle ouvre la bouche avec sagesse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et un enseignement plein de bonté est sur sa langue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Elle veille à la bonne marche de sa maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle ne mange pas le pain de la paresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ses fils se lèvent et la disent heureuse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'son mari aussi, et il chante ses louanges:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: «Bien des femmes font preuve de valeur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais toi, tu leur es à toutes supérieure.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: La grâce est trompeuse et la beauté est illusoire;
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est de la femme qui craint l'Eternel qu'on chantera les louanges.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Donnez-lui du fruit de son travail
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu'aux portes de la ville ses œuvres fassent son éloge!
