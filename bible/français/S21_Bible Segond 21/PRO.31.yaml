    children:
    - type: text
      text: Conseils d'une mère
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Paroles du roi Lemuel. Message
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Message: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir la note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '30.1'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' par lequel sa mère l''a instruit.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui trouvera une femme de valeur?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle vaut bien plus que des perles.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le cœur de son mari a confiance en elle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c'est tout bénéfice pour lui.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle lui fait du bien, et non du mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les jours de sa vie.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle se procure de la laine et du lin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et travaille d'une main joyeuse.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pareille à un navire marchand,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle rapporte ses provisions de loin.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle se lève alors qu'il fait encore nuit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et elle donne la nourriture à sa famille et ses ordres à ses servantes.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle pense à un champ, et elle l'achète.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec le fruit de son travail elle plante une vigne.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec la force en guise de ceinture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle affermit ses bras.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle constate que ce qu'elle gagne est bon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Sa lampe ne s''éteint pas pendant la nuit:'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle file elle-même la laine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle tisse elle-même les habits.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que te dirai-je, mon fils? Que te dirai-je, fils de mon ventre?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que te dirai-je, fils de mes vœux?
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle ouvre ses bras au malheureux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle tend la main au pauvre.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle ne redoute pas la neige pour sa famille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car chacun y est habillé de cramoisi.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle se fait des couvertures,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle a des habits en fin lin et en pourpre.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son mari est reconnu aux portes de la ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsqu'il siège avec les anciens du pays.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle fait des chemises et les vend,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et elle livre des ceintures au marchand.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La force et l'honneur, voilà ce qui l'habille.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle rit en pensant à l'avenir.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle ouvre la bouche avec sagesse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et un enseignement plein de bonté est sur sa langue.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle veille à la bonne marche de sa maison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle ne mange pas le pain de la paresse.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses fils se lèvent et la disent heureuse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'son mari aussi, et il chante ses louanges:'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Bien des femmes font preuve de valeur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais toi, tu leur es à toutes supérieure.»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne livre pas ta force aux femmes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni tes voies à celles qui causent la perte des rois!
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La grâce est trompeuse et la beauté est illusoire;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est de la femme qui craint l'Eternel qu'on chantera les louanges.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Donnez-lui du fruit de son travail
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'aux portes de la ville ses œuvres fassent son éloge!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce n'est pas aux rois, Lemuel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce n'est pas aux rois de boire du vin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni aux princes de rechercher des boissons fortes.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, en buvant ils pourraient oublier les lois
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et porter atteinte à la cause des plus malheureux.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Donnez des liqueurs fortes à celui qui va mourir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'du vin à celui qui est rempli d''amertume:'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'il boive et oublie ainsi sa pauvreté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'il ne se souvienne plus de sa peine.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ouvre ta bouche pour celui qui ne peut pas s'exprimer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour la cause de tous les délaissés!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ouvre ta bouche, juge avec justice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et défends le malheureux et le pauvre!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Une femme de valeur
    marker-yv: yv-h
