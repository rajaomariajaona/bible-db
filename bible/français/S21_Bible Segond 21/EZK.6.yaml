document_id: EZK.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elimination de l'idolâtrie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La parole de l''Eternel m''a été adressée:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Fils de l'homme, tourne ton visage vers les montagnes d'Israël
- type: usfm
  marker: q1
  children:
  - type: text
    text: et prophétise contre elles!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu diras: ‘Montagnes d''Israël,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: écoutez la parole du Seigneur, de l'Eternel!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voici ce que dit le Seigneur, l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'aux montagnes et aux collines, aux cours d''eau et aux vallées:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je vais faire venir l'épée contre vous
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je ferai disparaître vos hauts lieux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Hauts lieux: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lieux de culte en plein air qui pouvaient être consacrés à diverses divinités, souvent situés sur des hauteurs.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Vos autels seront dévastés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vos piliers consacrés au soleil seront brisés
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je ferai tomber vos victimes devant vos idoles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: »Je mettrai les cadavres des Israélites devant leurs idoles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je disperserai vos ossements tout autour de vos autels.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Partout où vous habitez, vos villes seront en ruine
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vos hauts lieux démolis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin que vos autels soient en ruine et abandonnés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que vos idoles soient brisées et disparaissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que vos piliers consacrés au soleil soient abattus
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que soit effacé tout ce que vous avez fabriqué.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les victimes tomberont au milieu de vous
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous reconnaîtrez que je suis l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: »Cependant, je vous laisserai des rescapés de l'épée parmi les nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand vous serez dispersés dans divers pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Parmi les nations où ils auront été déportés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vos rescapés se souviendront de moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que j'aurai brisé leur cœur de prostituée toujours prêt à se détourner de moi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leurs yeux de prostituée toujours prêts à suivre leurs idoles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils se prendront eux-mêmes en dégoût
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause du mal qu'ils ont fait
- type: usfm
  marker: q1
  children:
  - type: text
    text: en s'adonnant à toutes leurs pratiques abominables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ils reconnaîtront alors que je suis l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que je ne parlais pas en l'air
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand je les ai menacés de leur faire tout ce mal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '»Voici ce que dit le Seigneur, l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Frappe de la main, tape du pied et crie de douleur
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de toutes les pratiques mauvaises et abominables de la communauté d'Israël!
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est qu'ils vont tomber par l'épée, par la famine et par la peste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Celui qui sera loin mourra de la peste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui sera près tombera par l'épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui restera et sera assiégé sera victime de la famine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'irai ainsi jusqu'au bout de ma fureur contre eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Vous reconnaîtrez que je suis l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand leurs victimes seront étendues au milieu de leurs idoles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: autour de leurs autels,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur toute colline élevée, sur tous les sommets des montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sous tout arbre vert, sous tout chêne touffu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: là où ils offraient des parfums dont l'odeur était agréable
- type: usfm
  marker: q1
  children:
  - type: text
    text: à toutes leurs idoles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je déploierai ma puissance contre eux
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je rendrai le pays dépeuplé et vide
- type: usfm
  marker: q1
  children:
  - type: text
    text: depuis le désert jusqu'à Dibla,
- type: usfm
  marker: q1
  children:
  - type: text
    text: partout où ils habitent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils reconnaîtront alors que je suis l'Eternel.»
