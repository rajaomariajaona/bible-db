document_id: EZK.6,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Elimination de l'idolâtrie
  - type: text
    content: 'La parole de l''Eternel m''a été adressée:'
  '10':
  - type: text
    content: Ils reconnaîtront alors que je suis l'Eternel
  - type: text
    content: et que je ne parlais pas en l'air
  - type: text
    content: quand je les ai menacés de leur faire tout ce mal.
  '11':
  - type: text
    content: '»Voici ce que dit le Seigneur, l''Eternel:'
  - type: text
    content: Frappe de la main, tape du pied et crie de douleur
  - type: text
    content: à cause de toutes les pratiques mauvaises et abominables de la communauté d'Israël!
  - type: text
    content: C'est qu'ils vont tomber par l'épée, par la famine et par la peste.
  '12':
  - type: text
    content: Celui qui sera loin mourra de la peste,
  - type: text
    content: celui qui sera près tombera par l'épée,
  - type: text
    content: celui qui restera et sera assiégé sera victime de la famine.
  - type: text
    content: J'irai ainsi jusqu'au bout de ma fureur contre eux.
  '13':
  - type: text
    content: Vous reconnaîtrez que je suis l'Eternel,
  - type: text
    content: quand leurs victimes seront étendues au milieu de leurs idoles,
  - type: text
    content: autour de leurs autels,
  - type: text
    content: sur toute colline élevée, sur tous les sommets des montagnes,
  - type: text
    content: sous tout arbre vert, sous tout chêne touffu,
  - type: text
    content: là où ils offraient des parfums dont l'odeur était agréable
  - type: text
    content: à toutes leurs idoles.
  '14':
  - type: text
    content: Je déploierai ma puissance contre eux
  - type: text
    content: et je rendrai le pays dépeuplé et vide
  - type: text
    content: depuis le désert jusqu'à Dibla,
  - type: text
    content: partout où ils habitent.
  - type: text
    content: Ils reconnaîtront alors que je suis l'Eternel.»
  '2':
  - type: text
    content: «Fils de l'homme, tourne ton visage vers les montagnes d'Israël
  - type: text
    content: et prophétise contre elles!
  '3':
  - type: text
    content: 'Tu diras: ‘Montagnes d''Israël,'
  - type: text
    content: écoutez la parole du Seigneur, de l'Eternel!’
  - type: text
    content: Voici ce que dit le Seigneur, l'Eternel,
  - type: text
    content: 'aux montagnes et aux collines, aux cours d''eau et aux vallées:'
  - type: text
    content: Je vais faire venir l'épée contre vous
  - type: text
    content: et je ferai disparaître vos hauts lieux
  - type: note
    content: 'Hauts lieux: lieux de culte en plein air qui pouvaient être consacrés à diverses divinités, souvent situés sur des hauteurs.'
  - type: text
    content: .
  '4':
  - type: text
    content: Vos autels seront dévastés,
  - type: text
    content: vos piliers consacrés au soleil seront brisés
  - type: text
    content: et je ferai tomber vos victimes devant vos idoles.
  '5':
  - type: text
    content: »Je mettrai les cadavres des Israélites devant leurs idoles
  - type: text
    content: et je disperserai vos ossements tout autour de vos autels.
  '6':
  - type: text
    content: Partout où vous habitez, vos villes seront en ruine
  - type: text
    content: et vos hauts lieux démolis,
  - type: text
    content: afin que vos autels soient en ruine et abandonnés,
  - type: text
    content: que vos idoles soient brisées et disparaissent,
  - type: text
    content: que vos piliers consacrés au soleil soient abattus
  - type: text
    content: et que soit effacé tout ce que vous avez fabriqué.
  '7':
  - type: text
    content: Les victimes tomberont au milieu de vous
  - type: text
    content: et vous reconnaîtrez que je suis l'Eternel.
  '8':
  - type: text
    content: »Cependant, je vous laisserai des rescapés de l'épée parmi les nations,
  - type: text
    content: quand vous serez dispersés dans divers pays.
  '9':
  - type: text
    content: Parmi les nations où ils auront été déportés,
  - type: text
    content: vos rescapés se souviendront de moi,
  - type: text
    content: parce que j'aurai brisé leur cœur de prostituée toujours prêt à se détourner de moi
  - type: text
    content: et leurs yeux de prostituée toujours prêts à suivre leurs idoles.
  - type: text
    content: Ils se prendront eux-mêmes en dégoût
  - type: text
    content: à cause du mal qu'ils ont fait
  - type: text
    content: en s'adonnant à toutes leurs pratiques abominables.
