document_id: 2SA.7,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Une maison pour Dieu et pour David
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu''il fut installé dans son palais et que l''Eternel lui eut donné du repos en le délivrant de tous les ennemis qui l''entouraient, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai donné un lieu de résidence à mon peuple, à Israël, je l''ai planté pour qu''il y soit fixé et ne soit plus agité, pour que les méchants ne l''oppriment plus comme par le passé, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'comme à l''époque où j''avais établi des juges sur mon peuple, sur Israël. Je t''ai accordé du repos en te délivrant de tous tes ennemis. De plus, l''Eternel t''annonce qu''il va te faire lui-même une maison: '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'quand ta vie prendra fin et que tu seras couché avec tes ancêtres, je ferai surgir après toi ton descendant, celui qui sera issu de toi, et j''affermirai son règne. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce sera lui qui construira une maison en l''honneur de mon nom, et j''affermirai pour toujours le trône de son royaume. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '*Je serai pour lui un père et il sera pour moi un fils.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je serai… fils: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Corinthiens 6.18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' à propos des chrétiens et en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hébreux 1.5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' à propos de Christ. Ce passage est quasi unanimement interprété comme annonçant la venue du Messie. Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luc 1.32-33
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' S''il fait le mal, je le punirai avec le bâton des hommes, avec les coups des humains, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais je ne lui retirerai pas ma grâce comme je l''ai fait avec Saül, que j''ai écarté de ton chemin. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ta maison et ton règne seront assurés pour toujours après toi, ton trône sera affermi pour toujours.’»
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nathan rapporta toutes ces paroles et toute cette vision à David. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le roi David alla se présenter devant l''Eternel et dit: «Qui suis-je, Seigneur Eternel, et qu''est-ce que ma famille, pour que tu m''aies fait parvenir là où je suis? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et c''est encore trop peu à tes yeux, Seigneur Eternel! Tu parles aussi de la famille de ton serviteur pour un avenir lointain et tu consens à en instruire un homme, Seigneur Eternel! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le roi dit au prophète Nathan: «Vois donc! J''habite dans une maison en cèdre, tandis que l''arche de Dieu est installée au milieu d''une tente.» '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que pourrait te dire de plus David? Tu connais ton serviteur, Seigneur Eternel! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est à cause de tes promesses et conformément à tes désirs que tu as accompli toutes ces grandes choses et les as révélées à ton serviteur. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que tu es donc grand, Seigneur Eternel! En effet, personne n''est semblable à toi et il n''y a pas d''autre Dieu que toi, d''après tout ce que nous avons entendu. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Existe-t-il sur la terre une seule nation qui soit comme ton peuple, comme Israël? O Dieu, tu es venu le racheter pour faire de lui ton peuple, pour te faire un nom et pour accomplir en sa faveur, en faveur de ton pays, des miracles et des prodiges, en chassant devant ton peuple, que tu as racheté d''Egypte, des nations et leurs dieux. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu as affermi ton peuple, Israël, pour qu''il soit ton peuple pour toujours et toi, Eternel, tu es devenu son Dieu. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, Eternel Dieu, fais subsister jusque dans l''éternité la parole que tu as prononcée sur ton serviteur et sur sa famille et agis comme tu l''as dit. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que l''on dise éternellement la grandeur de ton nom en affirmant: ‘L''Eternel, le maître de l''univers, est le Dieu d''Israël’ et que la maison de ton serviteur David soit affermie devant toi! '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, c''est toi-même, Eternel, maître de l''univers, Dieu d''Israël, qui t''es révélé à ton serviteur en disant: ‘Je te construirai une maison!’ Voilà pourquoi ton serviteur a trouvé le courage de t''adresser cette prière. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, Seigneur Eternel, c''est toi qui es Dieu! Tes paroles sont vraies et tu as annoncé ce bienfait à ton serviteur. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Veuille donc bénir la famille de ton serviteur afin qu'elle subsiste éternellement devant toi! En effet, c'est toi, Seigneur Eternel, qui as parlé, et c'est grâce à ta bénédiction que la maison de ton serviteur sera bénie pour l'éternité.»
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nathan répondit au roi: «Vas-y, fais tout ce que tu as dans le cœur, car l''Eternel est avec toi.»'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La nuit suivante, la parole de l''Eternel fut adressée à Nathan: '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Va annoncer à mon serviteur David: ‘Voici ce que dit l''Eternel: Est-ce à toi de me construire une maison pour que j''y habite? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, je n''ai pas habité dans une maison depuis le jour où j''ai fait sortir les Israélites d''Egypte jusqu''à aujourd''hui. J''ai voyagé sous une tente, dans un tabernacle. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Partout où j''ai marché avec tous les Israélites, ai-je une seule fois dit à l''une des tribus d''Israël que j''avais désignée pour diriger mon peuple, Israël: Pourquoi ne me construisez-vous pas une maison en cèdre?’ '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Annonce maintenant à mon serviteur David: ‘Voici ce que dit l''Eternel, le maître de l''univers: Je t''ai pris au pâturage, derrière les brebis, pour que tu sois chef sur mon peuple, sur Israël. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je t''ai accompagné partout où tu as marché, j''ai éliminé tous tes ennemis devant toi et j''ai rendu ton nom aussi grand que celui des grands de la terre. '
