document_id: 2SA.7,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Une maison pour Dieu et pour David
  - type: text
    content: 'Lorsqu''il fut installé dans son palais et que l''Eternel lui eut donné du repos en le délivrant de tous les ennemis qui l''entouraient, '
  '10':
  - type: text
    content: 'J''ai donné un lieu de résidence à mon peuple, à Israël, je l''ai planté pour qu''il y soit fixé et ne soit plus agité, pour que les méchants ne l''oppriment plus comme par le passé, '
  '11':
  - type: text
    content: 'comme à l''époque où j''avais établi des juges sur mon peuple, sur Israël. Je t''ai accordé du repos en te délivrant de tous tes ennemis. De plus, l''Eternel t''annonce qu''il va te faire lui-même une maison: '
  '12':
  - type: text
    content: 'quand ta vie prendra fin et que tu seras couché avec tes ancêtres, je ferai surgir après toi ton descendant, celui qui sera issu de toi, et j''affermirai son règne. '
  '13':
  - type: text
    content: 'Ce sera lui qui construira une maison en l''honneur de mon nom, et j''affermirai pour toujours le trône de son royaume. '
  '14':
  - type: text
    content: '*Je serai pour lui un père et il sera pour moi un fils.'
  - type: note
    content: 'Je serai… fils: cité en 2 Corinthiens 6.18 à propos des chrétiens et en Hébreux 1.5 à propos de Christ. Ce passage est quasi unanimement interprété comme annonçant la venue du Messie. Voir Luc 1.32-33.'
  - type: text
    content: ' S''il fait le mal, je le punirai avec le bâton des hommes, avec les coups des humains, '
  '15':
  - type: text
    content: 'mais je ne lui retirerai pas ma grâce comme je l''ai fait avec Saül, que j''ai écarté de ton chemin. '
  '16':
  - type: text
    content: Ta maison et ton règne seront assurés pour toujours après toi, ton trône sera affermi pour toujours.’»
  '17':
  - type: text
    content: 'Nathan rapporta toutes ces paroles et toute cette vision à David. '
  '18':
  - type: text
    content: 'Alors le roi David alla se présenter devant l''Eternel et dit: «Qui suis-je, Seigneur Eternel, et qu''est-ce que ma famille, pour que tu m''aies fait parvenir là où je suis? '
  '19':
  - type: text
    content: 'Et c''est encore trop peu à tes yeux, Seigneur Eternel! Tu parles aussi de la famille de ton serviteur pour un avenir lointain et tu consens à en instruire un homme, Seigneur Eternel! '
  '2':
  - type: text
    content: 'le roi dit au prophète Nathan: «Vois donc! J''habite dans une maison en cèdre, tandis que l''arche de Dieu est installée au milieu d''une tente.» '
  '20':
  - type: text
    content: 'Que pourrait te dire de plus David? Tu connais ton serviteur, Seigneur Eternel! '
  '21':
  - type: text
    content: 'C''est à cause de tes promesses et conformément à tes désirs que tu as accompli toutes ces grandes choses et les as révélées à ton serviteur. '
  '22':
  - type: text
    content: 'Que tu es donc grand, Seigneur Eternel! En effet, personne n''est semblable à toi et il n''y a pas d''autre Dieu que toi, d''après tout ce que nous avons entendu. '
  '23':
  - type: text
    content: 'Existe-t-il sur la terre une seule nation qui soit comme ton peuple, comme Israël? O Dieu, tu es venu le racheter pour faire de lui ton peuple, pour te faire un nom et pour accomplir en sa faveur, en faveur de ton pays, des miracles et des prodiges, en chassant devant ton peuple, que tu as racheté d''Egypte, des nations et leurs dieux. '
  '24':
  - type: text
    content: 'Tu as affermi ton peuple, Israël, pour qu''il soit ton peuple pour toujours et toi, Eternel, tu es devenu son Dieu. '
  '25':
  - type: text
    content: 'Maintenant, Eternel Dieu, fais subsister jusque dans l''éternité la parole que tu as prononcée sur ton serviteur et sur sa famille et agis comme tu l''as dit. '
  '26':
  - type: text
    content: 'Que l''on dise éternellement la grandeur de ton nom en affirmant: ‘L''Eternel, le maître de l''univers, est le Dieu d''Israël’ et que la maison de ton serviteur David soit affermie devant toi! '
  '27':
  - type: text
    content: 'En effet, c''est toi-même, Eternel, maître de l''univers, Dieu d''Israël, qui t''es révélé à ton serviteur en disant: ‘Je te construirai une maison!’ Voilà pourquoi ton serviteur a trouvé le courage de t''adresser cette prière. '
  '28':
  - type: text
    content: 'Maintenant, Seigneur Eternel, c''est toi qui es Dieu! Tes paroles sont vraies et tu as annoncé ce bienfait à ton serviteur. '
  '29':
  - type: text
    content: Veuille donc bénir la famille de ton serviteur afin qu'elle subsiste éternellement devant toi! En effet, c'est toi, Seigneur Eternel, qui as parlé, et c'est grâce à ta bénédiction que la maison de ton serviteur sera bénie pour l'éternité.»
  '3':
  - type: text
    content: 'Nathan répondit au roi: «Vas-y, fais tout ce que tu as dans le cœur, car l''Eternel est avec toi.»'
  '4':
  - type: text
    content: 'La nuit suivante, la parole de l''Eternel fut adressée à Nathan: '
  '5':
  - type: text
    content: '«Va annoncer à mon serviteur David: ‘Voici ce que dit l''Eternel: Est-ce à toi de me construire une maison pour que j''y habite? '
  '6':
  - type: text
    content: 'En effet, je n''ai pas habité dans une maison depuis le jour où j''ai fait sortir les Israélites d''Egypte jusqu''à aujourd''hui. J''ai voyagé sous une tente, dans un tabernacle. '
  '7':
  - type: text
    content: 'Partout où j''ai marché avec tous les Israélites, ai-je une seule fois dit à l''une des tribus d''Israël que j''avais désignée pour diriger mon peuple, Israël: Pourquoi ne me construisez-vous pas une maison en cèdre?’ '
  '8':
  - type: text
    content: 'Annonce maintenant à mon serviteur David: ‘Voici ce que dit l''Eternel, le maître de l''univers: Je t''ai pris au pâturage, derrière les brebis, pour que tu sois chef sur mon peuple, sur Israël. '
  '9':
  - type: text
    content: 'Je t''ai accompagné partout où tu as marché, j''ai éliminé tous tes ennemis devant toi et j''ai rendu ton nom aussi grand que celui des grands de la terre. '
