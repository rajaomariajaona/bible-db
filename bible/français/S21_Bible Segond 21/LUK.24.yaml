document_id: LUK.24,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Résurrection de Jésus
  - type: text
    content: 'Le dimanche, elles se rendirent au tombeau de grand matin [avec quelques autres] en apportant les aromates qu''elles avaient préparés. '
  '10':
  - type: text
    content: 'Celles qui racontèrent cela aux apôtres étaient Marie de Magdala, Jeanne, Marie la mère de Jacques et les autres femmes qui étaient avec elles, '
  '11':
  - type: text
    content: 'mais ils prirent leurs discours pour des absurdités, ils ne crurent pas ces femmes. '
  '12':
  - type: text
    content: Cependant, Pierre se leva et courut au tombeau. Il se baissa et ne vit que les bandelettes [qui étaient par terre]; puis il s'en alla chez lui, tout étonné de ce qui était arrivé.
  - type: heading
    content: Apparitions de Jésus ressuscité
  '13':
  - type: text
    content: 'Ce même jour, deux disciples se rendaient à un village appelé Emmaüs, éloigné de Jérusalem d''une douzaine de kilomètres. '
  '14':
  - type: text
    content: 'Ils discutaient ensemble de tout ce qui s''était passé. '
  '15':
  - type: text
    content: 'Pendant qu''ils parlaient et discutaient, Jésus lui-même s''approcha et fit route avec eux, '
  '16':
  - type: text
    content: 'mais leurs yeux étaient empêchés de le reconnaître. '
  '17':
  - type: text
    content: 'Il leur dit: «De quoi parlez-vous en marchant, pour avoir l''air si tristes?» '
  '18':
  - type: text
    content: 'L''un d''eux, un dénommé Cléopas, lui répondit: «Es-tu le seul en séjour à Jérusalem qui ne sache pas ce qui y est arrivé ces jours-ci?» '
  '19':
  - type: text
    content: '«Quoi?» leur dit-il. Ils lui répondirent: «Ce qui est arrivé à Jésus de Nazareth, qui était un prophète puissant en actes et en paroles devant Dieu et devant tout le peuple, '
  '2':
  - type: text
    content: 'Elles découvrirent que la pierre avait été roulée de devant le tombeau. '
  '20':
  - type: text
    content: 'et comment les chefs des prêtres et nos magistrats l''ont fait arrêter pour qu''il soit condamné à mort et l''ont crucifié. '
  '21':
  - type: text
    content: 'Nous espérions que ce serait lui qui délivrerait Israël, mais avec tout cela, voici déjà le troisième jour que ces événements se sont produits. '
  '22':
  - type: text
    content: 'Il est vrai que quelques femmes de notre groupe nous ont beaucoup étonnés. Elles se sont rendues de grand matin au tombeau '
  '23':
  - type: text
    content: 'et n''ont pas trouvé son corps; elles sont venues dire que des anges leur sont apparus et ont annoncé qu''il est vivant. '
  '24':
  - type: text
    content: 'Quelques-uns des nôtres sont allés au tombeau et ils ont trouvé les choses comme les femmes l''avaient dit, mais lui, ils ne l''ont pas vu.» '
  '25':
  - type: text
    content: 'Alors Jésus leur dit: «Hommes sans intelligence, dont le cœur est lent à croire tout ce qu''ont dit les prophètes! '
  '26':
  - type: text
    content: 'Ne fallait-il pas que le Messie souffre ces choses et qu''il entre dans sa gloire?» '
  '27':
  - type: text
    content: Puis, en commençant par les écrits de Moïse et continuant par ceux de tous les prophètes, il leur expliqua dans toutes les Ecritures ce qui le concernait.
  '28':
  - type: text
    content: 'Lorsqu''ils furent près du village où ils allaient, il parut vouloir aller plus loin, '
  '29':
  - type: text
    content: 'mais ils le retinrent avec insistance en disant: «Reste avec nous car le soir approche, le jour est [déjà] sur son déclin.» Alors il entra pour rester avec eux. '
  '3':
  - type: text
    content: 'Elles entrèrent, mais elles ne trouvèrent pas le corps du Seigneur Jésus. '
  '30':
  - type: text
    content: 'Pendant qu''il était à table avec eux, il prit le pain et, après avoir prononcé la prière de bénédiction, il le rompit et le leur donna. '
  '31':
  - type: text
    content: 'Alors leurs yeux s''ouvrirent et ils le reconnurent, mais il disparut de devant eux. '
  '32':
  - type: text
    content: 'Ils se dirent l''un à l''autre: «Notre cœur ne brûlait-il pas en nous lorsqu''il nous parlait en chemin et nous expliquait les Ecritures?» '
  '33':
  - type: text
    content: 'Ils se levèrent à ce moment même et retournèrent à Jérusalem, où ils trouvèrent les onze et les autres qui étaient rassemblés '
  '34':
  - type: text
    content: 'et qui leur dirent: «Le Seigneur est réellement ressuscité et il est apparu à Simon.» '
  '35':
  - type: text
    content: Alors les deux disciples racontèrent ce qui leur était arrivé en chemin et comment ils l'avaient reconnu au moment où il rompait le pain.
  '36':
  - type: text
    content: 'Ils parlaient encore quand [Jésus] lui-même se présenta au milieu d''eux et leur dit: «Que la paix soit avec vous!» '
  '37':
  - type: text
    content: 'Saisis de frayeur et d''épouvante, ils croyaient voir un esprit, '
  '38':
  - type: text
    content: 'mais il leur dit: «Pourquoi êtes-vous troublés et pourquoi de pareilles pensées surgissent-elles dans votre cœur? '
  '39':
  - type: text
    content: 'Regardez mes mains et mes pieds: c''est bien moi. Touchez-moi et regardez: un esprit n''a ni chair ni os comme, vous le voyez bien, j''en ai.»'
  '4':
  - type: text
    content: 'Comme elles ne savaient que penser de cela, voici que deux hommes leur apparurent, habillés de vêtements resplendissants. '
  '40':
  - type: text
    content: 'En disant cela, il leur montra ses mains et ses pieds. '
  '41':
  - type: text
    content: 'Cependant, dans leur joie, ils ne croyaient pas encore et ils étaient dans l''étonnement. Alors il leur dit: «Avez-vous ici quelque chose à manger?» '
  '42':
  - type: text
    content: 'Ils lui présentèrent un morceau de poisson grillé [et un rayon de miel]. '
  '43':
  - type: text
    content: Il en prit et mangea devant eux.
  '44':
  - type: text
    content: 'Puis il leur dit: «C''est ce que je vous disais lorsque j''étais encore avec vous: il fallait que s''accomplisse tout ce qui est écrit à mon sujet dans la loi de Moïse, dans les prophètes et dans les psaumes.» '
  '45':
  - type: text
    content: 'Alors il leur ouvrit l''intelligence afin qu''ils comprennent les Ecritures '
  '46':
  - type: text
    content: 'et il leur dit: «Ainsi, il était écrit [– et il fallait que cela arrive –] que le Messie souffrirait et qu''il ressusciterait le troisième jour, '
  '47':
  - type: text
    content: et que la repentance
  - type: note
    content: 'La repentance: voir la note 3.3.'
  - type: text
    content: ' et le pardon des péchés seraient prêchés en son nom à toutes les nations, à commencer par Jérusalem. '
  '48':
  - type: text
    content: 'Vous êtes témoins de ces choses. '
  '49':
  - type: text
    content: Et voici que j'enverrai sur vous ce que mon Père a promis; quant à vous, restez dans la ville [de Jérusalem] jusqu'à ce que vous soyez revêtus de la puissance d'en haut.»
  - type: heading
    content: Ascension de Jésus
  '5':
  - type: text
    content: 'Saisies de frayeur, elles tenaient le visage baissé vers le sol. Les hommes leur dirent: «Pourquoi cherchez-vous parmi les morts celui qui est vivant? '
  '50':
  - type: text
    content: 'Il les conduisit jusque vers Béthanie, puis il leva les mains et les bénit. '
  '51':
  - type: text
    content: 'Pendant qu''il les bénissait, il les quitta et fut enlevé au ciel. '
  '52':
  - type: text
    content: 'Quant à eux, après l''avoir adoré, ils retournèrent à Jérusalem remplis d''une grande joie. '
  '53':
  - type: text
    content: Ils étaient constamment dans le temple, [louant et] bénissant Dieu.
  '6':
  - type: text
    content: 'Il n''est pas ici, mais il est ressuscité. Souvenez-vous de ce qu''il vous a dit, lorsqu''il était encore en Galilée: '
  '7':
  - type: text
    content: '‘Il faut que le Fils de l''homme soit livré entre les mains des pécheurs, qu''il soit crucifié et qu''il ressuscite le troisième jour.’» '
  '8':
  - type: text
    content: Elles se souvinrent alors des paroles de Jésus.
  '9':
  - type: text
    content: 'A leur retour du tombeau, elles annoncèrent tout cela aux onze et à tous les autres. '
