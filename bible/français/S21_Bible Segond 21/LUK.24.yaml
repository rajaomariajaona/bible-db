document_id: LUK.24
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Résurrection de Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le dimanche, elles se rendirent au tombeau de grand matin [avec quelques autres] en apportant les aromates qu''elles avaient préparés. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Elles découvrirent que la pierre avait été roulée de devant le tombeau. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Elles entrèrent, mais elles ne trouvèrent pas le corps du Seigneur Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Comme elles ne savaient que penser de cela, voici que deux hommes leur apparurent, habillés de vêtements resplendissants. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Saisies de frayeur, elles tenaient le visage baissé vers le sol. Les hommes leur dirent: «Pourquoi cherchez-vous parmi les morts celui qui est vivant? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il n''est pas ici, mais il est ressuscité. Souvenez-vous de ce qu''il vous a dit, lorsqu''il était encore en Galilée: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '‘Il faut que le Fils de l''homme soit livré entre les mains des pécheurs, qu''il soit crucifié et qu''il ressuscite le troisième jour.’» '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Elles se souvinrent alors des paroles de Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'A leur retour du tombeau, elles annoncèrent tout cela aux onze et à tous les autres. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Celles qui racontèrent cela aux apôtres étaient Marie de Magdala, Jeanne, Marie la mère de Jacques et les autres femmes qui étaient avec elles, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'mais ils prirent leurs discours pour des absurdités, ils ne crurent pas ces femmes. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Cependant, Pierre se leva et courut au tombeau. Il se baissa et ne vit que les bandelettes [qui étaient par terre]; puis il s'en alla chez lui, tout étonné de ce qui était arrivé.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Apparitions de Jésus ressuscité
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ce même jour, deux disciples se rendaient à un village appelé Emmaüs, éloigné de Jérusalem d''une douzaine de kilomètres. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils discutaient ensemble de tout ce qui s''était passé. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Pendant qu''ils parlaient et discutaient, Jésus lui-même s''approcha et fit route avec eux, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'mais leurs yeux étaient empêchés de le reconnaître. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il leur dit: «De quoi parlez-vous en marchant, pour avoir l''air si tristes?» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'L''un d''eux, un dénommé Cléopas, lui répondit: «Es-tu le seul en séjour à Jérusalem qui ne sache pas ce qui y est arrivé ces jours-ci?» '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '«Quoi?» leur dit-il. Ils lui répondirent: «Ce qui est arrivé à Jésus de Nazareth, qui était un prophète puissant en actes et en paroles devant Dieu et devant tout le peuple, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'et comment les chefs des prêtres et nos magistrats l''ont fait arrêter pour qu''il soit condamné à mort et l''ont crucifié. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Nous espérions que ce serait lui qui délivrerait Israël, mais avec tout cela, voici déjà le troisième jour que ces événements se sont produits. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il est vrai que quelques femmes de notre groupe nous ont beaucoup étonnés. Elles se sont rendues de grand matin au tombeau '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'et n''ont pas trouvé son corps; elles sont venues dire que des anges leur sont apparus et ont annoncé qu''il est vivant. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Quelques-uns des nôtres sont allés au tombeau et ils ont trouvé les choses comme les femmes l''avaient dit, mais lui, ils ne l''ont pas vu.» '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Alors Jésus leur dit: «Hommes sans intelligence, dont le cœur est lent à croire tout ce qu''ont dit les prophètes! '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ne fallait-il pas que le Messie souffre ces choses et qu''il entre dans sa gloire?» '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Puis, en commençant par les écrits de Moïse et continuant par ceux de tous les prophètes, il leur expliqua dans toutes les Ecritures ce qui le concernait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Lorsqu''ils furent près du village où ils allaient, il parut vouloir aller plus loin, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'mais ils le retinrent avec insistance en disant: «Reste avec nous car le soir approche, le jour est [déjà] sur son déclin.» Alors il entra pour rester avec eux. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Pendant qu''il était à table avec eux, il prit le pain et, après avoir prononcé la prière de bénédiction, il le rompit et le leur donna. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Alors leurs yeux s''ouvrirent et ils le reconnurent, mais il disparut de devant eux. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ils se dirent l''un à l''autre: «Notre cœur ne brûlait-il pas en nous lorsqu''il nous parlait en chemin et nous expliquait les Ecritures?» '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ils se levèrent à ce moment même et retournèrent à Jérusalem, où ils trouvèrent les onze et les autres qui étaient rassemblés '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'et qui leur dirent: «Le Seigneur est réellement ressuscité et il est apparu à Simon.» '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Alors les deux disciples racontèrent ce qui leur était arrivé en chemin et comment ils l'avaient reconnu au moment où il rompait le pain.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ils parlaient encore quand [Jésus] lui-même se présenta au milieu d''eux et leur dit: «Que la paix soit avec vous!» '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Saisis de frayeur et d''épouvante, ils croyaient voir un esprit, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'mais il leur dit: «Pourquoi êtes-vous troublés et pourquoi de pareilles pensées surgissent-elles dans votre cœur? '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Regardez mes mains et mes pieds: c''est bien moi. Touchez-moi et regardez: un esprit n''a ni chair ni os comme, vous le voyez bien, j''en ai.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'En disant cela, il leur montra ses mains et ses pieds. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Cependant, dans leur joie, ils ne croyaient pas encore et ils étaient dans l''étonnement. Alors il leur dit: «Avez-vous ici quelque chose à manger?» '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Ils lui présentèrent un morceau de poisson grillé [et un rayon de miel]. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Il en prit et mangea devant eux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Puis il leur dit: «C''est ce que je vous disais lorsque j''étais encore avec vous: il fallait que s''accomplisse tout ce qui est écrit à mon sujet dans la loi de Moïse, dans les prophètes et dans les psaumes.» '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Alors il leur ouvrit l''intelligence afin qu''ils comprennent les Ecritures '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'et il leur dit: «Ainsi, il était écrit [– et il fallait que cela arrive –] que le Messie souffrirait et qu''il ressusciterait le troisième jour, '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: et que la repentance
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.47 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La repentance: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir la note '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '3.3'
      metadata:
        usfm: LUK.3.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et le pardon des péchés seraient prêchés en son nom à toutes les nations, à commencer par Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Vous êtes témoins de ces choses. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Et voici que j'enverrai sur vous ce que mon Père a promis; quant à vous, restez dans la ville [de Jérusalem] jusqu'à ce que vous soyez revêtus de la puissance d'en haut.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ascension de Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Il les conduisit jusque vers Béthanie, puis il leva les mains et les bénit. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Pendant qu''il les bénissait, il les quitta et fut enlevé au ciel. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Quant à eux, après l''avoir adoré, ils retournèrent à Jérusalem remplis d''une grande joie. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Ils étaient constamment dans le temple, [louant et] bénissant Dieu.
