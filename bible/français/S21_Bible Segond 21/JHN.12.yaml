document_id: JHN.12,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Marie verse du parfum sur les pieds de Jésus
  - type: text
    content: 'Six jours avant la Pâque, Jésus arriva à Béthanie où était Lazare qu''il avait ressuscité. '
  '10':
  - type: text
    content: 'Les chefs des prêtres décidèrent de faire mourir aussi Lazare '
  '11':
  - type: text
    content: parce que beaucoup de Juifs les quittaient et croyaient en Jésus à cause de lui.
  - type: heading
    content: Entrée triomphale de Jésus à Jérusalem
  '12':
  - type: text
    content: 'Le lendemain, une foule nombreuse de personnes venues à la fête apprirent que Jésus se rendait à Jérusalem. '
  '13':
  - type: text
    content: 'Elles prirent des branches de palmiers et allèrent à sa rencontre en criant: «'
  - type: text
    content: Hosanna! Béni soit celui qui vient au nom du Seigneur
  - type: note
    content: 'Hosanna… Seigneur: citation duPsaume 118.25, 26. Hosanna est la transcription d''une expression signifiant sauve donc et devenue une exclamation de joie ou un cri de bienvenue.'
  - type: text
    content: ', le roi d''Israël!» '
  '14':
  - type: text
    content: 'Jésus trouva un ânon et s''assit dessus, conformément à ce qui est écrit: '
  '15':
  - type: text
    content: N'aie pas peur, fille de Sion! Voici ton roi qui vient, assis sur le petit d'une ânesse
  - type: text
    content: .
  - type: note
    content: 'N''aie pas… ânesse: citation de Zacharie 9.9.'
  '16':
  - type: text
    content: Sur le moment, ses disciples ne comprirent pas ce qui se passait, mais, lorsque Jésus fut dans sa gloire, ils se souvinrent que ces choses étaient écrites à son sujet et qu'on les avait faites pour lui.
  '17':
  - type: text
    content: 'Tous ceux qui étaient avec Jésus quand il avait appelé Lazare à sortir du tombeau et l''avait ressuscité lui rendaient témoignage. '
  '18':
  - type: text
    content: 'C''est aussi la raison pour laquelle la foule vint à sa rencontre: parce qu''elle avait appris qu''il avait fait ce signe miraculeux. '
  '19':
  - type: text
    content: 'Les pharisiens se dirent donc les uns aux autres: «Vous voyez que vous ne gagnez rien; voici que tout le monde se met à le suivre.»'
  '2':
  - type: text
    content: 'Là, on lui offrit un repas; Marthe servait et Lazare était parmi ceux qui se trouvaient à table avec lui. '
  '20':
  - type: text
    content: 'Il y avait des non-Juifs parmi ceux qui étaient montés pour adorer pendant la fête. '
  '21':
  - type: text
    content: 'Ils s''adressèrent à Philippe, qui était de Bethsaïda en Galilée, et lui demandèrent: «Seigneur, nous voudrions voir Jésus.» '
  '22':
  - type: text
    content: Philippe alla le dire à André, puis André et Philippe le dirent à Jésus.
  '23':
  - type: text
    content: 'Jésus leur répondit: «L''heure où le Fils de l''homme va être élevé dans sa gloire est venue. '
  '24':
  - type: text
    content: 'En vérité, en vérité, je vous le dis, si le grain de blé tombé en terre ne meurt pas, il reste seul; mais s''il meurt, il porte beaucoup de fruit. '
  '25':
  - type: text
    content: 'Celui qui aime sa vie la perdra et celui qui déteste sa vie dans ce monde la conservera pour la vie éternelle. '
  '26':
  - type: text
    content: 'Si quelqu''un me sert, qu''il me suive, et là où je suis, là aussi sera mon serviteur. Si quelqu''un me sert, le Père l''honorera. '
  '27':
  - type: text
    content: 'Maintenant '
  - type: text
    content: mon âme est troublée
  - type: text
    content: '. Et que dirai-je? Père, '
  - type: text
    content: délivre-moi
  - type: note
    content: 'Mon âme est troublée… délivre-moi: citation du Psaume 6.4, 5.'
  - type: text
    content: ' de cette heure? Mais c''est pour cela que je suis venu jusqu''à cette heure. '
  '28':
  - type: text
    content: 'Père, révèle la gloire de ton nom!» Une voix vint alors du ciel: «J''ai révélé sa gloire et je la révélerai encore.»'
  '29':
  - type: text
    content: 'La foule qui était là, et qui avait entendu, disait que c''était le tonnerre. D''autres disaient: «Un ange lui a parlé.» '
  '3':
  - type: text
    content: 'Marie prit un demi-litre d''un parfum de nard pur très cher, en versa sur les pieds de Jésus et lui essuya les pieds avec ses cheveux; la maison fut remplie de l''odeur du parfum. '
  '30':
  - type: text
    content: 'Jésus reprit la parole: «Ce n''est pas à cause de moi que cette voix s''est fait entendre, c''est à cause de vous. '
  '31':
  - type: text
    content: 'C''est maintenant qu''a lieu le jugement de ce monde; c''est maintenant que le prince de ce monde va être jeté dehors. '
  '32':
  - type: text
    content: 'Et moi, quand j''aurai été élevé de la terre, j''attirerai tous les hommes à moi.» '
  '33':
  - type: text
    content: '- Par ces paroles, il indiquait de quelle mort il allait mourir. - '
  '34':
  - type: text
    content: 'La foule lui répondit: «Nous avons appris par la loi que le Messie vivra éternellement. Comment donc peux-tu dire: ‘Il faut que le Fils de l''homme soit élevé’? Qui est ce Fils de l''homme?» '
  '35':
  - type: text
    content: 'Jésus leur dit: «La lumière est encore pour un peu de temps parmi vous. Marchez pendant que vous avez la lumière afin que les ténèbres ne vous surprennent pas, car celui qui marche dans les ténèbres ne sait pas où il va. '
  '36':
  - type: text
    content: Pendant que vous avez la lumière, croyez en elle afin de devenir des enfants de lumière.» Après avoir dit cela, Jésus s'en alla et se cacha loin d'eux.
  '37':
  - type: text
    content: 'Malgré tous les signes miraculeux qu''il avait faits devant eux, ils ne croyaient pas en lui. '
  '38':
  - type: text
    content: 'Ainsi s''accomplit la parole annoncée par le prophète Esaïe: '
  - type: text
    content: Seigneur, qui a cru à notre prédication? Et à qui le bras du Seigneur a-t-il été révélé?
  - type: note
    content: 'Seigneur… révélé: citation d''Esaïe 53.1.'
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'Esaïe a dit encore pourquoi ils ne pouvaient pas croire: '
  '4':
  - type: text
    content: 'Un de ses disciples, Judas l''Iscariot, [fils de Simon,] celui qui allait le trahir, dit: '
  '40':
  - type: text
    content: Il a aveuglé leurs yeux et il a endurci leur cœur pour qu'ils ne voient pas de leurs yeux, qu'ils ne comprennent pas dans leur cœur, qu'ils ne se convertissent pas et que je ne les guérisse pas.
  - type: note
    content: 'Il a aveuglé… guérisse pas: citation d''Esaïe 6.9, 10.'
  - type: text
    content: ' '
  '41':
  - type: text
    content: Esaïe dit cela lorsqu'il vit sa gloire et qu'il parla de lui.
  '42':
  - type: text
    content: 'Cependant, même parmi les chefs, beaucoup crurent en lui; mais, à cause des pharisiens, ils ne le déclaraient pas, de crainte d''être exclus de la synagogue. '
  '43':
  - type: text
    content: En effet, ils aimèrent la gloire des hommes plus que la gloire de Dieu.
  '44':
  - type: text
    content: 'Quant à Jésus, il s''écria: «Celui qui croit en moi ne croit pas seulement en moi, mais en celui qui m''a envoyé, '
  '45':
  - type: text
    content: 'et celui qui me voit voit celui qui m''a envoyé. '
  '46':
  - type: text
    content: 'Moi, la lumière, je suis venu dans le monde afin que quiconque croit en moi ne reste pas dans les ténèbres. '
  '47':
  - type: text
    content: 'Si quelqu''un entend mes paroles mais n''y croit pas, ce n''est pas moi qui le juge, car je suis venu non pour juger le monde, mais pour le sauver. '
  '48':
  - type: text
    content: 'Celui qui me rejette et qui n''accepte pas mes paroles a son juge: la parole que j''ai annoncée, c''est elle qui le jugera, le dernier jour. '
  '49':
  - type: text
    content: 'En effet, je n''ai pas parlé de ma propre initiative, mais le Père, qui m''a envoyé, m''a prescrit lui-même ce que je dois dire et annoncer, '
  '5':
  - type: text
    content: '«Pourquoi n''a-t-on pas vendu ce parfum 300 pièces d''argent pour les donner aux pauvres?» '
  '50':
  - type: text
    content: et je sais que son commandement est la vie éternelle. C'est pourquoi ce que j'annonce, je l'annonce comme le Père me l'a dit.»
  '6':
  - type: text
    content: 'Il disait cela non parce qu''il se souciait des pauvres, mais parce que c''était un voleur et, comme il tenait la bourse, il prenait ce qu''on y mettait. '
  '7':
  - type: text
    content: 'Jésus dit alors: «Laisse-la! Elle a gardé ce parfum pour le jour de mon ensevelissement. '
  '8':
  - type: text
    content: En effet, vous avez toujours les pauvres avec vous, tandis que moi, vous ne m'aurez pas toujours.»
  '9':
  - type: text
    content: 'Une foule de Juifs apprirent que Jésus était à Béthanie; ils y vinrent, non seulement à cause de lui, mais aussi pour voir Lazare qu''il avait ressuscité. '
