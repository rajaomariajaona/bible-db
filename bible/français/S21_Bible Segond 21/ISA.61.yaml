document_id: ISA.61,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le salut proclamé
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*L''Esprit du Seigneur, de l''Eternel, est sur moi'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce que l'Eternel m'a consacré par onction pour annoncer de bonnes nouvelles aux pauvres;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il m'a envoyé pour guérir ceux qui ont le cœur brisé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour proclamer aux déportés la liberté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et aux prisonniers la délivrance,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me réjouirai en l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout mon être tressaillira d'allégresse à cause de mon Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il m'a habillé avec les vêtements du salut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il m'a couvert du manteau de la justice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis pareil au jeune marié qui, tel un prêtre, se coiffe d'un turban splendide,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à la jeune mariée qui se pare de ses bijoux.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, tout comme la terre fait sortir son germe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout comme un jardin fait pousser ses semences,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Seigneur, l'Eternel, fera pousser la justice et la louange
  - type: usfm
    marker: q1
    children:
    - type: text
      text: devant toutes les nations.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour proclamer une année de grâce de l'Eternel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '61.1-2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'L''Esprit… de l''Eternel: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'lu par Jésus à la synagogue en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luc 4.18-19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' et partiellement cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matthieu 11.5
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luc 7.22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' pour attester qu''il était bien le Messie.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et un jour de vengeance de notre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour consoler tous ceux qui sont dans le deuil,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour mettre, pour donner aux habitants de Sion en deuil
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une belle parure au lieu de la cendre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une huile de joie au lieu du deuil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un costume de louange au lieu d'un esprit abattu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On les appellera alors «térébinthes de la justice»,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «plantation de l'Eternel destinée à manifester sa splendeur».
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils reconstruiront sur d'anciennes ruines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils relèveront les décombres du passé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils rénoveront des villes dévastées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des décombres vieux de plusieurs générations.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des inconnus se présenteront et s'occuperont de vos troupeaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des étrangers seront vos cultivateurs et vos vignerons.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quant à vous, on vous appellera «prêtres de l'Eternel»,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'on vous dira: «serviteurs de notre Dieu».'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous mangerez les ressources des nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous tirerez profit de leur gloire.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au lieu de la honte, vous aurez une double part.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au lieu de connaître l'humiliation, ils crieront de joie en voyant leur héritage.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est ainsi qu'ils posséderont le double dans leur pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leur joie sera éternelle.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, moi, l'Eternel, j'aime le droit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je déteste voir le vol associé aux holocaustes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je leur donnerai fidèlement leur récompense
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je conclurai une alliance éternelle avec eux.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur descendance sera connue parmi les nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leur progéniture parmi les peuples.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui les verront reconnaîtront
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'ils sont une lignée bénie de l'Eternel.
