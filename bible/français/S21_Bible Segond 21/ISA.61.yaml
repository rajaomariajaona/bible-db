document_id: ISA.61,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le salut proclamé
  - type: text
    content: '*L''Esprit du Seigneur, de l''Eternel, est sur moi'
  - type: text
    content: parce que l'Eternel m'a consacré par onction pour annoncer de bonnes nouvelles aux pauvres;
  - type: text
    content: il m'a envoyé pour guérir ceux qui ont le cœur brisé,
  - type: text
    content: pour proclamer aux déportés la liberté
  - type: text
    content: et aux prisonniers la délivrance,
  '10':
  - type: text
    content: Je me réjouirai en l'Eternel,
  - type: text
    content: tout mon être tressaillira d'allégresse à cause de mon Dieu,
  - type: text
    content: car il m'a habillé avec les vêtements du salut,
  - type: text
    content: il m'a couvert du manteau de la justice.
  - type: text
    content: Je suis pareil au jeune marié qui, tel un prêtre, se coiffe d'un turban splendide,
  - type: text
    content: à la jeune mariée qui se pare de ses bijoux.
  '11':
  - type: text
    content: En effet, tout comme la terre fait sortir son germe,
  - type: text
    content: tout comme un jardin fait pousser ses semences,
  - type: text
    content: le Seigneur, l'Eternel, fera pousser la justice et la louange
  - type: text
    content: devant toutes les nations.
  '2':
  - type: text
    content: pour proclamer une année de grâce de l'Eternel
  - type: note
    content: 'L''Esprit… de l''Eternel: lu par Jésus à la synagogue en Luc 4.18-19 et partiellement cité en Matthieu 11.5; Luc 7.22 pour attester qu''il était bien le Messie.'
  - type: text
    content: et un jour de vengeance de notre Dieu,
  - type: text
    content: pour consoler tous ceux qui sont dans le deuil,
  '3':
  - type: text
    content: pour mettre, pour donner aux habitants de Sion en deuil
  - type: text
    content: une belle parure au lieu de la cendre,
  - type: text
    content: une huile de joie au lieu du deuil,
  - type: text
    content: un costume de louange au lieu d'un esprit abattu.
  - type: text
    content: On les appellera alors «térébinthes de la justice»,
  - type: text
    content: «plantation de l'Eternel destinée à manifester sa splendeur».
  '4':
  - type: text
    content: Ils reconstruiront sur d'anciennes ruines,
  - type: text
    content: ils relèveront les décombres du passé,
  - type: text
    content: ils rénoveront des villes dévastées,
  - type: text
    content: des décombres vieux de plusieurs générations.
  '5':
  - type: text
    content: Des inconnus se présenteront et s'occuperont de vos troupeaux,
  - type: text
    content: des étrangers seront vos cultivateurs et vos vignerons.
  '6':
  - type: text
    content: Quant à vous, on vous appellera «prêtres de l'Eternel»,
  - type: text
    content: 'on vous dira: «serviteurs de notre Dieu».'
  - type: text
    content: Vous mangerez les ressources des nations
  - type: text
    content: et vous tirerez profit de leur gloire.
  '7':
  - type: text
    content: Au lieu de la honte, vous aurez une double part.
  - type: text
    content: Au lieu de connaître l'humiliation, ils crieront de joie en voyant leur héritage.
  - type: text
    content: C'est ainsi qu'ils posséderont le double dans leur pays,
  - type: text
    content: et leur joie sera éternelle.
  '8':
  - type: text
    content: En effet, moi, l'Eternel, j'aime le droit,
  - type: text
    content: je déteste voir le vol associé aux holocaustes.
  - type: text
    content: Je leur donnerai fidèlement leur récompense
  - type: text
    content: et je conclurai une alliance éternelle avec eux.
  '9':
  - type: text
    content: Leur descendance sera connue parmi les nations
  - type: text
    content: et leur progéniture parmi les peuples.
  - type: text
    content: Tous ceux qui les verront reconnaîtront
  - type: text
    content: qu'ils sont une lignée bénie de l'Eternel.
