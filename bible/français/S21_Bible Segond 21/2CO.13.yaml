document_id: 2CO.13,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Je vais venir chez vous pour la troisième fois. '
  - type: text
    content: Toute affaire se réglera sur la déclaration de deux ou de trois témoins.
  - type: note
    content: 'Toute affaire… témoins: reprise du principe de Deutéronome 19.15.'
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Voilà pourquoi j''écris cela étant absent: afin que, une fois présent, je n''aie pas à faire preuve de sévérité, conformément à l''autorité que le Seigneur m''a donnée pour construire et non pour démolir.'
  '11':
  - type: text
    content: 'Pour le reste, frères et sœurs, soyez dans la joie, travaillez à vous perfectionner, encouragez-vous, vivez en plein accord, dans la paix, et le Dieu d''amour et de paix sera avec vous. '
  '12':
  - type: text
    content: Saluez-vous les uns les autres par un saint baiser. Tous les saints vous saluent.
  '13':
  - type: text
    content: Que la grâce du Seigneur Jésus-Christ, l'amour de Dieu et la communion du Saint-Esprit soient avec vous tous!
  '2':
  - type: text
    content: 'Je l''ai déjà dit et je le répète, comme je l''ai fait lors de ma deuxième visite, et aujourd''hui que je suis absent [je l''écris encore] à ceux qui ont péché précédemment et à tous les autres: si je reviens chez vous, je ne ménagerai personne, '
  '3':
  - type: text
    content: 'puisque vous cherchez une preuve que Christ parle en moi. En effet, lui n''est pas faible envers vous, mais il est puissant parmi vous. '
  '4':
  - type: text
    content: Oui, Christ a été crucifié à cause de sa faiblesse
  - type: note
    content: 'Acause de sa faiblesse: dans son humanité, on peut dire que Christ a été sujet à la faiblesse.'
  - type: text
    content: ', mais il vit par la puissance de Dieu. Nous aussi, nous sommes faibles en lui, mais nous vivrons avec lui par la puissance de Dieu pour agir envers vous.'
  '5':
  - type: text
    content: 'Examinez-vous vous-mêmes pour savoir si vous êtes dans la foi; mettez-vous vous-mêmes à l''épreuve. Ne reconnaissez-vous pas que Jésus-Christ est en vous? A moins peut-être que vous ne soyez disqualifiés. '
  '6':
  - type: text
    content: 'Mais j''espère bien que vous reconnaîtrez que nous, nous ne sommes pas disqualifiés. '
  '7':
  - type: text
    content: 'Cependant, je prie Dieu que vous ne fassiez rien de mal, non pour que nous paraissions nous-mêmes avoir réussi, mais afin que vous, vous pratiquiez le bien même si nous, nous semblons disqualifiés. '
  '8':
  - type: text
    content: 'En effet, nous n''avons pas de puissance contre la vérité, nous n''en avons que pour la vérité. '
  '9':
  - type: text
    content: 'Nous nous réjouissons chaque fois que nous sommes faibles alors que vous êtes forts. Ce que nous demandons dans nos prières, c''est votre perfectionnement. '
