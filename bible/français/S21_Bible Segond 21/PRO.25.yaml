document_id: PRO.25,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Proverbes de Salomon
  - type: heading
    content: 25.1–29.27
  - type: heading
    content: Les relations
  - type: text
    content: Voici encore des proverbes de Salomon rassemblés par l'entourage d'Ezéchias
  - type: note
    content: 'Ezéchias: son règne est situé un peu plus de 2 siècles après celui de Salomon (voir la note 1.1).'
  - type: text
    content: ', le roi de Juda.'
  '10':
  - type: text
    content: En l'apprenant il te couvrirait de honte
  - type: text
    content: et ta mauvaise réputation ne s'effacerait pas.
  '11':
  - type: text
    content: Des pommes en or décorées d'argent,
  - type: text
    content: voilà ce que sont des paroles dites à propos.
  '12':
  - type: text
    content: Un anneau en or, un collier en or fin,
  - type: text
    content: voilà ce qu'est le reproche d'un sage pour l'oreille qui sait écouter.
  '13':
  - type: text
    content: L'effet rafraîchissant de la neige un jour de moisson,
  - type: text
    content: 'voilà l''effet d''un messager fidèle pour celui qui l''envoie:'
  - type: text
    content: il réconforte son maître.
  '14':
  - type: text
    content: Des nuages et du vent sans pluie,
  - type: text
    content: voilà ce qu'est l'homme qui se vante à tort de sa générosité.
  '15':
  - type: text
    content: Par la patience on peut persuader un dirigeant
  - type: text
    content: et une langue douce peut briser toute résistance.
  '16':
  - type: text
    content: Si tu trouves du miel, n'en mange pas trop!
  - type: text
    content: Tu risquerais d'être saturé et de le vomir.
  '17':
  - type: text
    content: Mets rarement le pied chez ton prochain!
  - type: text
    content: Il risquerait d'être saturé et de te détester.
  '18':
  - type: text
    content: Une massue, une épée ou une flèche aiguë,
  - type: text
    content: voilà ce qu'est un homme qui porte un faux témoignage contre son prochain.
  '19':
  - type: text
    content: Une dent prête à se casser et un pied branlant,
  - type: text
    content: voilà ce qu'est, le jour de la détresse, la confiance placée dans un traître.
  '2':
  - type: text
    content: La gloire de Dieu, c'est de cacher les choses;
  - type: text
    content: la gloire des rois, c'est d'examiner les choses.
  '20':
  - type: text
    content: Enlever un habit un jour de froid,
  - type: text
    content: verser du vinaigre sur du salpêtre,
  - type: text
    content: c'est entonner des chansons pour un cœur attristé.
  '21':
  - type: text
    content: '*Si ton ennemi a faim, donne-lui à manger,'
  - type: text
    content: s'il a soif, donne-lui à boire,
  '22':
  - type: text
    content: car ce sont des charbons ardents que tu amasses sur sa tête
  - type: note
    content: 'Si… tête: cité en Romains 12.20.'
  - type: text
    content: et l'Eternel te récompensera.
  '23':
  - type: text
    content: Le vent du nord amène la pluie,
  - type: text
    content: et la langue cachottière un visage irrité.
  '24':
  - type: text
    content: Mieux vaut habiter à l'angle d'un toit
  - type: text
    content: que faire maison commune avec une femme querelleuse.
  '25':
  - type: text
    content: De l'eau fraîche pour une personne fatiguée,
  - type: text
    content: voilà ce qu'est une bonne nouvelle venant d'une terre lointaine.
  '26':
  - type: text
    content: Une fontaine trouble, une source polluée,
  - type: text
    content: voilà ce qu'est un juste qui tremble devant le méchant.
  '27':
  - type: text
    content: Il n'est pas bon de manger trop de miel,
  - type: text
    content: mais rechercher la gloire des autres est un honneur.
  '28':
  - type: text
    content: Une ville démantelée, sans murailles,
  - type: text
    content: voilà ce qu'est l'homme qui n'est pas maître de lui-même.
  '3':
  - type: text
    content: Le ciel dans sa hauteur, la terre dans sa profondeur
  - type: text
    content: et le cœur des rois sont impénétrables.
  '4':
  - type: text
    content: Retire les impuretés de l'argent
  - type: text
    content: et le fondeur en sortira un vase.
  '5':
  - type: text
    content: Retire tout méchant de l'entourage du roi
  - type: text
    content: et son trône s'affermira par la justice.
  '6':
  - type: text
    content: Ne fais pas l'important devant le roi,
  - type: text
    content: ne prends pas la place des grands!
  '7':
  - type: text
    content: 'En effet, il vaut mieux qu''on te dise: «Monte ici!»'
  - type: text
    content: et qu'on n'ait pas à t'abaisser devant le prince, après que tes yeux l'ont vu.
  '8':
  - type: text
    content: Ne sois pas pressé de t'engager dans un procès,
  - type: text
    content: de peur qu'à la fin tu ne saches que faire
  - type: text
    content: lorsque ton prochain te confondra.
  '9':
  - type: text
    content: Défends ta cause contre ton prochain,
  - type: text
    content: mais ne révèle pas le secret d'un autre!
