document_id: PRO.25
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Proverbes de Salomon
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 25.1–29.27
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les relations
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici encore des proverbes de Salomon rassemblés par l'entourage d'Ezéchias
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ezéchias: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'son règne est situé un peu plus de 2 siècles après celui de Salomon (voir la note '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '1.1'
      metadata:
        usfm: PRO.1.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', le roi de Juda.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: La gloire de Dieu, c'est de cacher les choses;
- type: usfm
  marker: q1
  children:
  - type: text
    text: la gloire des rois, c'est d'examiner les choses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Le ciel dans sa hauteur, la terre dans sa profondeur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le cœur des rois sont impénétrables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Retire les impuretés de l'argent
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le fondeur en sortira un vase.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Retire tout méchant de l'entourage du roi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son trône s'affermira par la justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ne fais pas l'important devant le roi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne prends pas la place des grands!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'En effet, il vaut mieux qu''on te dise: «Monte ici!»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu'on n'ait pas à t'abaisser devant le prince, après que tes yeux l'ont vu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ne sois pas pressé de t'engager dans un procès,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de peur qu'à la fin tu ne saches que faire
- type: usfm
  marker: q1
  children:
  - type: text
    text: lorsque ton prochain te confondra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Défends ta cause contre ton prochain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ne révèle pas le secret d'un autre!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: En l'apprenant il te couvrirait de honte
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ta mauvaise réputation ne s'effacerait pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Des pommes en or décorées d'argent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: voilà ce que sont des paroles dites à propos.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Un anneau en or, un collier en or fin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: voilà ce qu'est le reproche d'un sage pour l'oreille qui sait écouter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: L'effet rafraîchissant de la neige un jour de moisson,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'voilà l''effet d''un messager fidèle pour celui qui l''envoie:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il réconforte son maître.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Des nuages et du vent sans pluie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: voilà ce qu'est l'homme qui se vante à tort de sa générosité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Par la patience on peut persuader un dirigeant
- type: usfm
  marker: q1
  children:
  - type: text
    text: et une langue douce peut briser toute résistance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Si tu trouves du miel, n'en mange pas trop!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu risquerais d'être saturé et de le vomir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mets rarement le pied chez ton prochain!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il risquerait d'être saturé et de te détester.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Une massue, une épée ou une flèche aiguë,
- type: usfm
  marker: q1
  children:
  - type: text
    text: voilà ce qu'est un homme qui porte un faux témoignage contre son prochain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Une dent prête à se casser et un pied branlant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: voilà ce qu'est, le jour de la détresse, la confiance placée dans un traître.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Enlever un habit un jour de froid,
- type: usfm
  marker: q1
  children:
  - type: text
    text: verser du vinaigre sur du salpêtre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est entonner des chansons pour un cœur attristé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '*Si ton ennemi a faim, donne-lui à manger,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: s'il a soif, donne-lui à boire,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: car ce sont des charbons ardents que tu amasses sur sa tête
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.21-22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Si… tête: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 12.20
      metadata:
        usfm: ROM.12.20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'Eternel te récompensera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Le vent du nord amène la pluie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la langue cachottière un visage irrité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mieux vaut habiter à l'angle d'un toit
- type: usfm
  marker: q1
  children:
  - type: text
    text: que faire maison commune avec une femme querelleuse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: De l'eau fraîche pour une personne fatiguée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: voilà ce qu'est une bonne nouvelle venant d'une terre lointaine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Une fontaine trouble, une source polluée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: voilà ce qu'est un juste qui tremble devant le méchant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Il n'est pas bon de manger trop de miel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais rechercher la gloire des autres est un honneur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Une ville démantelée, sans murailles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: voilà ce qu'est l'homme qui n'est pas maître de lui-même.
