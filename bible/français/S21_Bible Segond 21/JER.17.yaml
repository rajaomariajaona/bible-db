document_id: JER.17,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le péché gravé dans le cœur
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Le péché de Juda est inscrit avec un burin en fer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec une pointe de diamant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est gravé sur la table de leur cœur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sur les cornes de vos autels.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, l'Eternel, j'explore le cœur, j'examine les reins
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour traiter chacun conformément à sa conduite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au fruit de ses agissements.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui acquiert des richesses injustement
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'est pareil à une perdrix qui couve des œufs qu''elle n''a pas pondus:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au milieu de sa vie, celles-ci l'abandonnent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, en fin de compte, il n'aura été qu'un fou.»
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '«Il existe un trône de gloire, éminent depuis le début:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est là que se trouve notre sanctuaire.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, tu es l'espérance d'Israël!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui t'abandonnent rougiront de honte.»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ceux qui se détournent de moi seront inscrits sur la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils ont abandonné la source d'eau vive qu'est l'Eternel.»
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Guéris-moi, Eternel, et je serai guéri!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sauve-moi et je serai sauvé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tu es le sujet de ma louange.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici qu''ils me disent:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Où est la parole de l'Eternel?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'elle s'accomplisse donc!’
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et moi, pour t'obéir, je n'ai pas refusé d'être un berger.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je n'ai pas non plus désiré le jour de la souffrance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Toi, tu connais ce qui est sorti de mes lèvres:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est devant toi.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne sois pas pour moi un sujet de terreur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi, mon refuge le jour du malheur!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que mes persécuteurs soient humiliés, mais que moi, je ne le sois pas!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'ils tremblent, mais que moi, je ne tremble pas!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais venir sur eux le jour du malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: brise-les par la répétition d'une catastrophe!»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le respect du sabbat
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici ce que m''a dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Va te tenir à la porte des enfants du peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celle par laquelle les rois de Juda entrent et sortent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et à toutes les portes de Jérusalem.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est comme de leurs propres enfants qu'ils se souviennent de leurs autels
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de leurs poteaux sacrés, près des arbres verts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur les collines élevées.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu leur diras: ‘Ecoutez la parole de l''Eternel,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rois de Juda, tous les Judéens et vous tous, habitants de Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui entrez par ces portes!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Veillez sur vous-mêmes!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne portez pas de fardeau le jour du sabbat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: n'en introduisez pas par les portes de Jérusalem!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne sortez de chez vous aucun fardeau, le jour du sabbat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et n'accomplissez aucun travail,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais faites de ce jour un jour saint,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme je l'ai ordonné à vos ancêtres.’
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Ils n'ont pas écouté, ils n'ont pas tendu l'oreille.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se sont montrés réfractaires
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au lieu de m'écouter et de tenir compte de la correction.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Si vous m'écoutez vraiment, déclare l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si vous n'introduisez pas de fardeau
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par les portes de cette ville le jour du sabbat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si vous faites de ce jour un jour saint
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et n'accomplissez aucun travail ce jour-là,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors les rois et les princes qui siègent sur le trône de David
  - type: usfm
    marker: q1
    children:
    - type: text
      text: continueront à entrer par les portes de cette ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: montés sur des chars et des chevaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi que leurs princes, les Judéens et les habitants de Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et cette ville restera pour toujours habitée.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les habitants des villes de Juda et des environs de Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux du pays de Benjamin, de la plaine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de la montagne et du sud
  - type: usfm
    marker: q1
    children:
    - type: text
      text: entreront pour offrir des holocaustes et d'autres sacrifices,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des offrandes végétales et de l'encens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour offrir des sacrifices de reconnaissance dans la maison de l'Eternel.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »En revanche, si vous ne m'écoutez pas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne faites pas du jour du sabbat un jour saint
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en ne portant aucun fardeau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en n'en introduisant aucun par les portes de Jérusalem le jour du sabbat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors je mettrai le feu aux portes de la ville.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il dévorera les palais de Jérusalem et ne s'éteindra pas.»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je livre au pillage ma montagne et sa campagne, tes biens, tous tes trésors
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tes hauts lieux à cause du péché commis sur tout ton territoire.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par ta faute, tu devras renoncer à l'héritage que je t'avais donné.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te rendrai esclave de tes ennemis dans un pays que tu ne connais pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car vous avez allumé le feu de ma colère, et il brûlera toujours.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»Voici ce que dit l''Eternel: Maudit soit l''homme qui fait confiance à ce qui est humain,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui prend des créatures pour appui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui détourne son cœur de l'Eternel!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il est pareil à un genévrier dans la plaine:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne voit rien venir de bon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il habite les endroits brûlés du désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une terre salée et sans habitants.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Béni soit l'homme qui fait confiance à l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui place son espérance en lui!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ressemble à un arbre planté près de l'eau
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et qui étend ses racines vers le cours d''eau:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne s'aperçoit pas de la venue de la chaleur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son feuillage reste vert.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lors d'une année de sécheresse, il ne redoute rien
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il ne cesse pas de porter du fruit.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Le cœur est tortueux plus que tout, et il est incurable.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui peut le connaître?
