document_id: JER.22,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Oracles contre les derniers rois de Juda
  - type: text
    content: 'Voici ce qu''a dit l''Eternel: «Descends au palais du roi de Juda, et là tu prononceras cette parole: '
  '10':
  - type: text
    content: »Ne pleurez pas celui qui est mort,
  - type: text
    content: ne le plaignez pas!
  - type: text
    content: Pleurez, oui, pleurez celui qui s'en va,
  - type: text
    content: car il ne reviendra plus,
  - type: text
    content: il ne reverra plus le pays de sa naissance.
  '11':
  - type: text
    content: Oui, voici ce que dit l'Eternel à l'intention de Shallum, fils de Josias, roi de Juda,
  - type: text
    content: qui était devenu roi à la place de son père Josias
  - type: text
    content: 'et qui est parti d''ici:'
  - type: text
    content: ‘Il n'y reviendra plus,
  '12':
  - type: text
    content: car il mourra à l'endroit où on l'aura exilé.
  - type: text
    content: Il ne verra plus ce pays.’
  '13':
  - type: text
    content: »Malheur à celui qui construit sa maison sans respecter la justice
  - type: text
    content: et ses chambres sans respecter le droit,
  - type: text
    content: qui fait travailler son prochain sans le payer,
  - type: text
    content: sans lui donner son salaire!
  '14':
  - type: text
    content: 'Malheur à celui qui dit: ‘Je me construirai une grande maison,'
  - type: text
    content: avec des chambres spacieuses’,
  - type: text
    content: qui s'y fait percer des fenêtres,
  - type: text
    content: la recouvre de cèdre et la peint en rouge!
  '15':
  - type: text
    content: »Régnerais-tu donc parce que tu fais compétition avec du cèdre?
  - type: text
    content: Ton père ne mangeait-il pas, ne buvait-il pas?
  - type: text
    content: Cependant, il pratiquait le droit et la justice,
  - type: text
    content: et tout allait bien pour lui.
  '16':
  - type: text
    content: Il faisait droit au faible et au pauvre,
  - type: text
    content: et tout allait bien.
  - type: text
    content: N'est-ce pas cela, me connaître? déclare l'Eternel.
  '17':
  - type: text
    content: Toi en revanche, tu n'as des yeux et un cœur
  - type: text
    content: que pour te livrer à des profits malhonnêtes,
  - type: text
    content: pour verser le sang innocent
  - type: text
    content: et pour exercer l'oppression et la violence.
  '18':
  - type: text
    content: '»C''est pourquoi, voici ce que dit l''Eternel à l''intention de Jojakim, fils de Josias, roi de Juda:'
  - type: text
    content: 'On ne le pleurera pas en disant:'
  - type: text
    content: ‘Quel malheur, mon frère! Quel malheur, ma sœur!’
  - type: text
    content: 'On ne le pleurera pas en disant:'
  - type: text
    content: ‘Quel malheur, seigneur! Quel malheur, sa majesté!’
  '19':
  - type: text
    content: On l'enterrera comme on le fait pour un âne,
  - type: text
    content: il sera traîné et jeté à l'extérieur des portes de Jérusalem.
  '2':
  - type: text
    content: '‘Ecoute la parole de l''Eternel, roi de Juda, toi qui occupes le trône de David, ainsi que tes serviteurs et ton peuple qui entre par ces portes! '
  '20':
  - type: text
    content: »Monte sur les sommets du Liban et crie!
  - type: text
    content: Fais retentir ta voix dans le Basan!
  - type: text
    content: Crie depuis l'Abarim!
  - type: text
    content: En effet, tous ceux qui t'aimaient sont brisés.
  '21':
  - type: text
    content: Je t'ai parlé à l'époque où tout allait bien.
  - type: text
    content: 'Tu disais: ‘Je n''écouterai pas.’'
  - type: text
    content: 'Voilà ce que tu as fait depuis ta jeunesse:'
  - type: text
    content: tu n'as pas écouté ma voix.
  '22':
  - type: text
    content: »Le vent enverra paître tous tes bergers,
  - type: text
    content: et ceux qui t'aiment iront en exil.
  - type: text
    content: C'est alors que tu rougiras, que tu connaîtras la honte
  - type: text
    content: à cause de toute ta méchanceté.
  '23':
  - type: text
    content: Toi qui habites sur le Liban,
  - type: text
    content: qui as ton nid dans les cèdres,
  - type: text
    content: combien tu gémiras quand les souffrances t'atteindront,
  - type: text
    content: des douleurs pareilles à celles d'une femme prête à accoucher!
  '24':
  - type: text
    content: »Moi, je suis vivant, déclare l'Eternel.
  - type: text
    content: Même si Jéconia, fils de Jojakim, roi de Juda, était
  - type: text
    content: un anneau à ma main droite, je l'arracherais de là.
  '25':
  - type: text
    content: Je te livrerai entre les mains de ceux qui en veulent à ta vie,
  - type: text
    content: de ceux devant qui tu trembles,
  - type: text
    content: entre les mains de Nebucadnetsar, roi de Babylone,
  - type: text
    content: entre les mains des Babyloniens.
  '26':
  - type: text
    content: Je te jetterai, toi et ta mère, celle qui t'a mis au monde,
  - type: text
    content: dans un autre pays où vous n'êtes pas nés,
  - type: text
    content: et là vous mourrez.
  '27':
  - type: text
    content: Quant au pays où ils désireront tant retourner,
  - type: text
    content: ils n'y retourneront pas.
  '28':
  - type: text
    content: »Ce Jéconia est-il donc un récipient méprisé, mis en pièces?
  - type: text
    content: Est-il un objet qui n'apporte aucune satisfaction?
  - type: text
    content: Pourquoi ont-ils été expulsés, lui et sa descendance,
  - type: text
    content: projetés dans un pays qu'ils ne connaissent pas?
  '29':
  - type: text
    content: Terre, terre, terre, écoute la parole de l'Eternel!
  '3':
  - type: text
    content: 'Voici ce que dit l''Eternel: Pratiquez le droit et la justice, délivrez celui qui est maltraité de son exploiteur, n''opprimez pas l''étranger, l''orphelin et la veuve, ne recourez pas à la violence et ne versez pas de sang innocent dans cet endroit! '
  '30':
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: Ecrivez au sujet de cet homme qu'il sera privé d'enfants,
  - type: text
    content: qu'il ne réussira pas sa vie.
  - type: text
    content: En effet, aucun de ses descendants ne réussira
  - type: text
    content: à occuper le trône de David
  - type: text
    content: et à régner encore sur Juda.
  '4':
  - type: text
    content: 'En effet, si vous mettez fidèlement cette parole en pratique, les rois assis sur le trône de David continueront d''entrer par les portes de ce palais, montés sur des chars et sur des chevaux, eux, leurs serviteurs et leur peuple. '
  '5':
  - type: text
    content: En revanche, si vous n'écoutez pas ces paroles, je le jure par moi-même, déclare l'Eternel, ce palais deviendra une ruine.’
  '6':
  - type: text
    content: '»En effet, voici ce que dit l''Eternel au sujet du palais du roi de Juda:'
  - type: text
    content: Tu es pour moi pareil à Galaad, aux sommets du Liban,
  - type: text
    content: mais je ferai de toi un désert,
  - type: text
    content: une ville inhabitée.
  '7':
  - type: text
    content: Je prépare contre toi des destructeurs,
  - type: text
    content: chacun avec ses armes.
  - type: text
    content: Ils abattront tes plus beaux cèdres
  - type: text
    content: et les jetteront au feu.
  '8':
  - type: text
    content: »Des nations nombreuses passeront près de cette ville,
  - type: text
    content: 'et elles se demanderont l''une à l''autre:'
  - type: text
    content: ‘Pourquoi l'Eternel a-t-il agi de cette manière envers cette grande ville?’
  '9':
  - type: text
    content: 'On répondra: ‘Parce qu''ils ont abandonné'
  - type: text
    content: l'alliance de l'Eternel, leur Dieu,
  - type: text
    content: et qu'ils se sont prosternés devant d'autres dieux et les ont servis.’»
