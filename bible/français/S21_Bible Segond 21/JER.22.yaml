document_id: JER.22,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Oracles contre les derniers rois de Juda
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Voici ce qu''a dit l''Eternel: «Descends au palais du roi de Juda, et là tu prononceras cette parole: '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: »Ne pleurez pas celui qui est mort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne le plaignez pas!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pleurez, oui, pleurez celui qui s'en va,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il ne reviendra plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne reverra plus le pays de sa naissance.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Oui, voici ce que dit l'Eternel à l'intention de Shallum, fils de Josias, roi de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui était devenu roi à la place de son père Josias
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et qui est parti d''ici:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Il n'y reviendra plus,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: car il mourra à l'endroit où on l'aura exilé.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne verra plus ce pays.’
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: »Malheur à celui qui construit sa maison sans respecter la justice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses chambres sans respecter le droit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui fait travailler son prochain sans le payer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans lui donner son salaire!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Malheur à celui qui dit: ‘Je me construirai une grande maison,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec des chambres spacieuses’,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui s'y fait percer des fenêtres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la recouvre de cèdre et la peint en rouge!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: »Régnerais-tu donc parce que tu fais compétition avec du cèdre?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton père ne mangeait-il pas, ne buvait-il pas?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cependant, il pratiquait le droit et la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tout allait bien pour lui.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Il faisait droit au faible et au pauvre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tout allait bien.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N'est-ce pas cela, me connaître? déclare l'Eternel.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Toi en revanche, tu n'as des yeux et un cœur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que pour te livrer à des profits malhonnêtes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour verser le sang innocent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour exercer l'oppression et la violence.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '»C''est pourquoi, voici ce que dit l''Eternel à l''intention de Jojakim, fils de Josias, roi de Juda:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'On ne le pleurera pas en disant:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Quel malheur, mon frère! Quel malheur, ma sœur!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'On ne le pleurera pas en disant:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Quel malheur, seigneur! Quel malheur, sa majesté!’
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: On l'enterrera comme on le fait pour un âne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il sera traîné et jeté à l'extérieur des portes de Jérusalem.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '‘Ecoute la parole de l''Eternel, roi de Juda, toi qui occupes le trône de David, ainsi que tes serviteurs et ton peuple qui entre par ces portes! '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: »Monte sur les sommets du Liban et crie!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais retentir ta voix dans le Basan!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Crie depuis l'Abarim!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, tous ceux qui t'aimaient sont brisés.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Je t'ai parlé à l'époque où tout allait bien.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu disais: ‘Je n''écouterai pas.’'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voilà ce que tu as fait depuis ta jeunesse:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu n'as pas écouté ma voix.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: »Le vent enverra paître tous tes bergers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ceux qui t'aiment iront en exil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est alors que tu rougiras, que tu connaîtras la honte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de toute ta méchanceté.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Toi qui habites sur le Liban,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui as ton nid dans les cèdres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: combien tu gémiras quand les souffrances t'atteindront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des douleurs pareilles à celles d'une femme prête à accoucher!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: »Moi, je suis vivant, déclare l'Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même si Jéconia, fils de Jojakim, roi de Juda, était
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un anneau à ma main droite, je l'arracherais de là.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Je te livrerai entre les mains de ceux qui en veulent à ta vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de ceux devant qui tu trembles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: entre les mains de Nebucadnetsar, roi de Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: entre les mains des Babyloniens.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Je te jetterai, toi et ta mère, celle qui t'a mis au monde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans un autre pays où vous n'êtes pas nés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et là vous mourrez.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Quant au pays où ils désireront tant retourner,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils n'y retourneront pas.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: »Ce Jéconia est-il donc un récipient méprisé, mis en pièces?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-il un objet qui n'apporte aucune satisfaction?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi ont-ils été expulsés, lui et sa descendance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: projetés dans un pays qu'ils ne connaissent pas?
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Terre, terre, terre, écoute la parole de l'Eternel!
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Voici ce que dit l''Eternel: Pratiquez le droit et la justice, délivrez celui qui est maltraité de son exploiteur, n''opprimez pas l''étranger, l''orphelin et la veuve, ne recourez pas à la violence et ne versez pas de sang innocent dans cet endroit! '
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecrivez au sujet de cet homme qu'il sera privé d'enfants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'il ne réussira pas sa vie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, aucun de ses descendants ne réussira
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à occuper le trône de David
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et à régner encore sur Juda.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'En effet, si vous mettez fidèlement cette parole en pratique, les rois assis sur le trône de David continueront d''entrer par les portes de ce palais, montés sur des chars et sur des chevaux, eux, leurs serviteurs et leur peuple. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: En revanche, si vous n'écoutez pas ces paroles, je le jure par moi-même, déclare l'Eternel, ce palais deviendra une ruine.’
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '»En effet, voici ce que dit l''Eternel au sujet du palais du roi de Juda:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es pour moi pareil à Galaad, aux sommets du Liban,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais je ferai de toi un désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une ville inhabitée.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Je prépare contre toi des destructeurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: chacun avec ses armes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils abattront tes plus beaux cèdres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les jetteront au feu.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: »Des nations nombreuses passeront près de cette ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et elles se demanderont l''une à l''autre:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Pourquoi l'Eternel a-t-il agi de cette manière envers cette grande ville?’
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'On répondra: ‘Parce qu''ils ont abandonné'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'alliance de l'Eternel, leur Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'ils se sont prosternés devant d'autres dieux et les ont servis.’»
