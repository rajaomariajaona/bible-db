document_id: MAT.22,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Parabole du festin des noces
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jésus prit la parole et leur parla de nouveau en paraboles. Il dit: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ces serviteurs s''en allèrent sur les routes, ils rassemblèrent tous ceux qu''ils trouvèrent, mauvais et bons, et la salle des noces fut remplie d''invités. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Le roi entra pour les voir, et il aperçut là un homme qui n''avait pas mis d''habit de noces. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Il lui dit: ‘Mon ami, comment as-tu pu entrer ici sans avoir d''habit de noces?’ Cet homme resta la bouche fermée. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Alors le roi dit aux serviteurs: ‘Attachez-lui les pieds et les mains, [emmenez-le et] jetez-le dans les ténèbres extérieures, où il y aura des pleurs et des grincements de dents.’ '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: En effet, beaucoup sont invités, mais peu sont choisis.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tentatives de piéger Jésus
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Alors les pharisiens allèrent tenir conseil sur les moyens de prendre Jésus au piège de ses propres paroles. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ils envoyèrent vers lui leurs disciples avec les hérodiens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Hérodiens: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: partisans de la dynastie des Hérode et donc de l'occupant romain.
      marker-yv: yv-n
    - type: text
      text: '. Ils lui dirent: «Maître, nous savons que tes paroles sont vraies et que tu enseignes le chemin de Dieu en toute vérité, sans te laisser influencer par personne, car tu ne regardes pas à l''apparence des personnes. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Dis-nous donc ce que tu en penses: est-il permis, ou non, de payer l''impôt à l''empereur?» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Mais Jésus, connaissant leur méchanceté, répondit: «Pourquoi me tendez-vous un piège, hypocrites? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Montrez-moi la monnaie avec laquelle on paie l''impôt.» Ils lui présentèrent une pièce de monnaie. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '«Le royaume des cieux ressemble à un roi qui fit des noces pour son fils. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Il leur demanda: «De qui porte-t-elle l''effigie et l''inscription?» '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '«De l''empereur», lui répondirent-ils. Alors il leur dit: «Rendez donc à l''empereur ce qui est à l''empereur et à Dieu ce qui est à Dieu.» '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Etonnés de ce qu'ils entendaient, ils le quittèrent et s'en allèrent.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Le même jour, les sadducéens, qui disent qu''il n''y a pas de résurrection, vinrent trouver Jésus et lui posèrent cette question: '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '«Maître, Moïse a dit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Si quelqu'un meurt sans enfants, son frère épousera la veuve et donnera une descendance à son frère
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Si quelqu''un… à son frère: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deutéronome 25.5-6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Or, il y avait parmi nous sept frères. Le premier s''est marié et est mort et, comme il n''avait pas d''enfants, il a laissé sa femme à son frère. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Il en est allé de même pour le deuxième, puis le troisième, et ce jusqu''au septième. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Après eux tous, la femme est morte [aussi]. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'A la résurrection, duquel des sept sera-t-elle donc la femme? En effet, tous l''ont épousée.» '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Jésus leur répondit: «Vous êtes dans l''erreur parce que vous ne connaissez ni les Ecritures, ni la puissance de Dieu. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Il envoya ses serviteurs appeler ceux qui étaient invités aux noces, mais ils ne voulurent pas venir. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'En effet, à la résurrection, les hommes et les femmes ne se marieront pas, mais ils seront comme les anges de Dieu dans le ciel. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'En ce qui concerne la résurrection des morts, n''avez-vous pas lu ce que Dieu vous a dit: '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Je suis le Dieu d'Abraham, le Dieu d'Isaac et le Dieu de Jacob
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.32 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je suis… Jacob: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Exode 3.6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '? Dieu n''est pas le Dieu des morts, mais des vivants.» '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: La foule qui écoutait fut frappée par l'enseignement de Jésus.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Les pharisiens apprirent qu''il avait réduit au silence les sadducéens. Ils se rassemblèrent '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'et l''un d''eux, professeur de la loi, lui posa cette question pour le mettre à l''épreuve: '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: '«Maître, quel est le plus grand commandement de la loi?» '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Jésus lui répondit: «'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu aimeras le Seigneur, ton Dieu, de tout ton cœur, de toute ton âme et de toute ta pensée
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.37 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu aimeras… pensée: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deutéronome 6.5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'C''est le premier commandement et le plus grand. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Et voici le deuxième, qui lui est semblable: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu aimeras ton prochain comme toi-même
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.39 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu aimeras… toi-même: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lévitique 19.18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il envoya encore d''autres serviteurs, avec cet ordre: ‘Dites aux invités: J''ai préparé mon festin; mes bœufs et mes bêtes grasses sont tués, tout est prêt, venez aux noces.’ '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: De ces deux commandements dépendent toute la loi et les prophètes.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Reproches de Jésus aux chefs religieux
    marker-yv: yv-h
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Comme les pharisiens se trouvaient rassemblés, Jésus les interrogea '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'en ces termes: «Que pensez-vous du Messie? De qui est-il le fils?» Ils lui répondirent: «De David.» '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Et Jésus leur dit: «Comment donc David, animé par l''Esprit, peut-il l''appeler Seigneur lorsqu''il dit: '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'Le Seigneur a dit à mon Seigneur: ‘Assieds-toi à ma droite jusqu''à ce que j''aie fait de tes ennemis ton marchepied’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.44 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le Seigneur… marchepied: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 110.1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '? '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Si donc David l''appelle Seigneur, comment peut-il être son fils?» '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Aucun ne put lui répondre un mot. Et, depuis ce jour, personne n'osa plus lui poser de questions.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Mais eux, négligeant l''invitation, s''en allèrent l''un à son champ, un autre à ses affaires. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Les autres s''emparèrent des serviteurs, les maltraitèrent et les tuèrent. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '[A cette nouvelle,] le roi se mit en colère; il envoya ses troupes, fit mourir ces meurtriers et brûla leur ville. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Alors il dit à ses serviteurs: ‘Les noces sont prêtes, mais les invités n''en étaient pas dignes. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Allez donc dans les carrefours et invitez aux noces tous ceux que vous trouverez.’ '
