document_id: MAT.22,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Parabole du festin des noces
  - type: text
    content: 'Jésus prit la parole et leur parla de nouveau en paraboles. Il dit: '
  '10':
  - type: text
    content: 'Ces serviteurs s''en allèrent sur les routes, ils rassemblèrent tous ceux qu''ils trouvèrent, mauvais et bons, et la salle des noces fut remplie d''invités. '
  '11':
  - type: text
    content: 'Le roi entra pour les voir, et il aperçut là un homme qui n''avait pas mis d''habit de noces. '
  '12':
  - type: text
    content: 'Il lui dit: ‘Mon ami, comment as-tu pu entrer ici sans avoir d''habit de noces?’ Cet homme resta la bouche fermée. '
  '13':
  - type: text
    content: 'Alors le roi dit aux serviteurs: ‘Attachez-lui les pieds et les mains, [emmenez-le et] jetez-le dans les ténèbres extérieures, où il y aura des pleurs et des grincements de dents.’ '
  '14':
  - type: text
    content: En effet, beaucoup sont invités, mais peu sont choisis.»
  - type: heading
    content: Tentatives de piéger Jésus
  '15':
  - type: text
    content: 'Alors les pharisiens allèrent tenir conseil sur les moyens de prendre Jésus au piège de ses propres paroles. '
  '16':
  - type: text
    content: Ils envoyèrent vers lui leurs disciples avec les hérodiens
  - type: note
    content: 'Hérodiens: partisans de la dynastie des Hérode et donc de l''occupant romain.'
  - type: text
    content: '. Ils lui dirent: «Maître, nous savons que tes paroles sont vraies et que tu enseignes le chemin de Dieu en toute vérité, sans te laisser influencer par personne, car tu ne regardes pas à l''apparence des personnes. '
  '17':
  - type: text
    content: 'Dis-nous donc ce que tu en penses: est-il permis, ou non, de payer l''impôt à l''empereur?» '
  '18':
  - type: text
    content: 'Mais Jésus, connaissant leur méchanceté, répondit: «Pourquoi me tendez-vous un piège, hypocrites? '
  '19':
  - type: text
    content: 'Montrez-moi la monnaie avec laquelle on paie l''impôt.» Ils lui présentèrent une pièce de monnaie. '
  '2':
  - type: text
    content: '«Le royaume des cieux ressemble à un roi qui fit des noces pour son fils. '
  '20':
  - type: text
    content: 'Il leur demanda: «De qui porte-t-elle l''effigie et l''inscription?» '
  '21':
  - type: text
    content: '«De l''empereur», lui répondirent-ils. Alors il leur dit: «Rendez donc à l''empereur ce qui est à l''empereur et à Dieu ce qui est à Dieu.» '
  '22':
  - type: text
    content: Etonnés de ce qu'ils entendaient, ils le quittèrent et s'en allèrent.
  '23':
  - type: text
    content: 'Le même jour, les sadducéens, qui disent qu''il n''y a pas de résurrection, vinrent trouver Jésus et lui posèrent cette question: '
  '24':
  - type: text
    content: '«Maître, Moïse a dit: '
  - type: text
    content: Si quelqu'un meurt sans enfants, son frère épousera la veuve et donnera une descendance à son frère
  - type: text
    content: .
  - type: note
    content: 'Si quelqu''un… à son frère: citation de Deutéronome 25.5-6.'
  - type: text
    content: ' '
  '25':
  - type: text
    content: 'Or, il y avait parmi nous sept frères. Le premier s''est marié et est mort et, comme il n''avait pas d''enfants, il a laissé sa femme à son frère. '
  '26':
  - type: text
    content: 'Il en est allé de même pour le deuxième, puis le troisième, et ce jusqu''au septième. '
  '27':
  - type: text
    content: 'Après eux tous, la femme est morte [aussi]. '
  '28':
  - type: text
    content: 'A la résurrection, duquel des sept sera-t-elle donc la femme? En effet, tous l''ont épousée.» '
  '29':
  - type: text
    content: 'Jésus leur répondit: «Vous êtes dans l''erreur parce que vous ne connaissez ni les Ecritures, ni la puissance de Dieu. '
  '3':
  - type: text
    content: 'Il envoya ses serviteurs appeler ceux qui étaient invités aux noces, mais ils ne voulurent pas venir. '
  '30':
  - type: text
    content: 'En effet, à la résurrection, les hommes et les femmes ne se marieront pas, mais ils seront comme les anges de Dieu dans le ciel. '
  '31':
  - type: text
    content: 'En ce qui concerne la résurrection des morts, n''avez-vous pas lu ce que Dieu vous a dit: '
  '32':
  - type: text
    content: Je suis le Dieu d'Abraham, le Dieu d'Isaac et le Dieu de Jacob
  - type: note
    content: 'Je suis… Jacob: citation d''Exode 3.6.'
  - type: text
    content: '? Dieu n''est pas le Dieu des morts, mais des vivants.» '
  '33':
  - type: text
    content: La foule qui écoutait fut frappée par l'enseignement de Jésus.
  '34':
  - type: text
    content: 'Les pharisiens apprirent qu''il avait réduit au silence les sadducéens. Ils se rassemblèrent '
  '35':
  - type: text
    content: 'et l''un d''eux, professeur de la loi, lui posa cette question pour le mettre à l''épreuve: '
  '36':
  - type: text
    content: '«Maître, quel est le plus grand commandement de la loi?» '
  '37':
  - type: text
    content: 'Jésus lui répondit: «'
  - type: text
    content: Tu aimeras le Seigneur, ton Dieu, de tout ton cœur, de toute ton âme et de toute ta pensée
  - type: text
    content: .
  - type: note
    content: 'Tu aimeras… pensée: citation de Deutéronome 6.5.'
  - type: text
    content: ' '
  '38':
  - type: text
    content: 'C''est le premier commandement et le plus grand. '
  '39':
  - type: text
    content: 'Et voici le deuxième, qui lui est semblable: '
  - type: text
    content: Tu aimeras ton prochain comme toi-même
  - type: text
    content: .
  - type: note
    content: 'Tu aimeras… toi-même: citation de Lévitique 19.18.'
  - type: text
    content: ' '
  '4':
  - type: text
    content: 'Il envoya encore d''autres serviteurs, avec cet ordre: ‘Dites aux invités: J''ai préparé mon festin; mes bœufs et mes bêtes grasses sont tués, tout est prêt, venez aux noces.’ '
  '40':
  - type: text
    content: De ces deux commandements dépendent toute la loi et les prophètes.»
  - type: heading
    content: Reproches de Jésus aux chefs religieux
  '41':
  - type: text
    content: 'Comme les pharisiens se trouvaient rassemblés, Jésus les interrogea '
  '42':
  - type: text
    content: 'en ces termes: «Que pensez-vous du Messie? De qui est-il le fils?» Ils lui répondirent: «De David.» '
  '43':
  - type: text
    content: 'Et Jésus leur dit: «Comment donc David, animé par l''Esprit, peut-il l''appeler Seigneur lorsqu''il dit: '
  '44':
  - type: text
    content: 'Le Seigneur a dit à mon Seigneur: ‘Assieds-toi à ma droite jusqu''à ce que j''aie fait de tes ennemis ton marchepied’'
  - type: note
    content: 'Le Seigneur… marchepied: citation du Psaume 110.1.'
  - type: text
    content: '? '
  '45':
  - type: text
    content: 'Si donc David l''appelle Seigneur, comment peut-il être son fils?» '
  '46':
  - type: text
    content: Aucun ne put lui répondre un mot. Et, depuis ce jour, personne n'osa plus lui poser de questions.
  '5':
  - type: text
    content: 'Mais eux, négligeant l''invitation, s''en allèrent l''un à son champ, un autre à ses affaires. '
  '6':
  - type: text
    content: 'Les autres s''emparèrent des serviteurs, les maltraitèrent et les tuèrent. '
  '7':
  - type: text
    content: '[A cette nouvelle,] le roi se mit en colère; il envoya ses troupes, fit mourir ces meurtriers et brûla leur ville. '
  '8':
  - type: text
    content: 'Alors il dit à ses serviteurs: ‘Les noces sont prêtes, mais les invités n''en étaient pas dignes. '
  '9':
  - type: text
    content: 'Allez donc dans les carrefours et invitez aux noces tous ceux que vous trouverez.’ '
