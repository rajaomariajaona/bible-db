document_id: JOS.8,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prise d'Aï
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L''Eternel dit à Josué: «N''aie pas peur, ne te laisse pas effrayer! Prends avec toi tous les hommes de guerre et lève-toi, monte attaquer Aï. Regarde, je livre entre tes mains le roi d''Aï et son peuple, sa ville et son pays. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Josué se leva de bon matin, passa le peuple en revue et marcha contre Aï. Il était à la tête du peuple avec les anciens d''Israël. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Tous les hommes de guerre qui l''accompagnaient montèrent et s''approchèrent d''Aï. Une fois arrivés en face de la ville, ils installèrent leur camp au nord d''Aï, dont ils étaient séparés par la vallée. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Josué prit environ 5000 hommes et les plaça en embuscade entre Béthel et Aï, à l''ouest de la ville. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Lorsque tout le camp eut pris position au nord de la ville, et l'embuscade à l'ouest de la ville, Josué s'avança cette nuit-là au milieu de la vallée.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Lorsque le roi d''Aï vit cela, les habitants d''Aï s''empressèrent de se lever et sortirent à la rencontre d''Israël pour le combattre. Le roi se dirigea avec tout son peuple vers un endroit fixé, du côté de la plaine, sans savoir qu''il y avait derrière la ville une embuscade contre lui. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Josué et tout Israël firent semblant d''être battus devant eux et s''enfuirent par le chemin du désert. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Alors tout le peuple qui était dans la ville se rassembla pour se mettre à leur poursuite. Ils poursuivirent Josué et furent ainsi attirés loin de la ville. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tous les hommes d'Aï et de Béthel, sans exception, sortirent contre Israël. Ils laissèrent la ville ouverte et poursuivirent Israël.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'L''Eternel dit à Josué: «Tends vers Aï le javelot que tu tiens, car je vais la livrer en ton pouvoir.» Josué tendit le javelot qu''il tenait vers la ville. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Dès qu''il eut tendu la main, les hommes en embuscade sortirent rapidement de l''endroit où ils étaient. Ils pénétrèrent dans la ville, s''en emparèrent et s''empressèrent d''y mettre le feu. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Tu traiteras Aï et son roi comme tu as traité Jéricho et son roi. Toutefois, vous garderez pour vous le butin et le bétail. Place une embuscade derrière la ville.»
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'En regardant derrière eux, les habitants d''Aï virent la fumée de la ville monter vers le ciel, et ils ne purent se sauver d''aucun côté. Le peuple qui fuyait vers le désert se retourna contre ses poursuivants. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'En effet, Josué et tout Israël, voyant que la ville avait été prise par les hommes de l''embuscade et que la fumée de la ville montait, se retournèrent et battirent les habitants d''Aï. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Les autres sortirent de la ville à leur rencontre et les habitants d''Aï furent cernés de tous côtés par Israël. Israël les battit sans leur laisser un survivant ni un fuyard. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ils prirent le roi d'Aï vivant et l'amenèrent à Josué.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Lorsque Israël eut fini de tuer tous les habitants d''Aï dans la campagne, dans le désert où ceux-ci l''avaient poursuivi, en les passant jusqu''au dernier au fil de l''épée, tout Israël revint vers Aï et la frappa du tranchant de l''épée. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Il y eut au total 12''000 personnes tuées ce jour-là, hommes et femmes confondus, tous habitants d''Aï. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Josué ne retira pas la main qu''il tenait tendue avec le javelot tant que tous les habitants ne furent pas exterminés. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Toutefois, Israël garda pour lui le bétail et le butin de cette ville, conformément à l''ordre que l''Eternel avait donné à Josué. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Josué brûla Aï et en fit pour toujours un tas de ruines qui subsiste encore aujourd''hui. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Il fit pendre le roi d'Aï à une potence et l'y laissa jusqu'au soir. Au coucher du soleil, Josué ordonna qu'on descende son cadavre du bois. On le jeta à l'entrée de la ville et l'on éleva sur lui un grand tas de pierres qui subsiste encore aujourd'hui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lecture des bénédictions et des malédictions
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Josué se leva avec tous les hommes de guerre pour monter attaquer Aï. Il choisit 30''000 vaillants hommes, qu''il fit partir de nuit '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Alors Josué construisit un autel en l''honneur de l''Eternel, le Dieu d''Israël, sur le mont Ebal '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'comme Moïse, le serviteur de l''Eternel, l''avait ordonné aux Israélites. Il le construisit en respectant ce qui est écrit dans le livre de la loi de Moïse: c''était un autel en pierres brutes, qu''on ne travailla pas avec le fer. Ils y offrirent des holocaustes à l''Eternel et ils présentèrent des sacrifices de communion. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Là, Josué écrivit sur les pierres une copie de la loi que Moïse avait écrite devant les Israélites.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Tout Israël, avec ses anciens, ses officiers et ses juges, se tenait des deux côtés de l''arche, devant les prêtres, les Lévites, qui portaient l''arche de l''alliance de l''Eternel. Les étrangers comme les Israélites de naissance étaient là, une moitié du côté du mont Garizim, l''autre moitié du côté du mont Ebal, conformément à l''ordre qu''avait précédemment donné Moïse, le serviteur de l''Eternel, pour bénir le peuple d''Israël. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Josué lut ensuite toutes les paroles de la loi, les bénédictions et les malédictions, suivant ce qui est écrit dans le livre de la loi. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Il lut la totalité de ce que Moïse avait prescrit devant toute l'assemblée d'Israël, avec les femmes et les enfants ainsi que les étrangers qui vivaient au milieu d'eux.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'et auxquels il donna cet ordre: «Ecoutez, vous vous mettrez en embuscade derrière la ville. Ne vous éloignez pas beaucoup de la ville et soyez tous prêts. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'De mon côté, avec tout le peuple qui m''accompagnera, nous nous approcherons de la ville. Quand ils sortiront à notre rencontre comme la première fois, nous prendrons la fuite devant eux. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ils nous poursuivront jusqu''à ce que nous les ayons attirés loin de la ville, car ils se diront: ‘Ils fuient devant nous comme la première fois!’ et nous prendrons la fuite devant eux. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Vous quitterez alors votre cachette et vous vous emparerez de la ville, et l''Eternel, votre Dieu, la livrera entre vos mains. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Quand vous aurez pris la ville, vous y mettrez le feu. Vous agirez comme l''Eternel l''a dit: c''est l''ordre que je vous donne.» '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Josué les fit partir et ils allèrent se placer en embuscade entre Béthel et Aï, à l'ouest d'Aï. Quant à Josué, il passa cette nuit-là au milieu du peuple.
