document_id: SNG.5,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le jeune homme
  - type: text
    content: J'entre dans mon jardin, ma sœur, ma chérie.
  - type: text
    content: Je cueille ma myrrhe et mes aromates,
  - type: text
    content: je mange mon rayon de miel avec mon miel,
  - type: text
    content: je bois mon vin avec mon lait.
  - type: heading
    content: Les filles de Jérusalem
  - type: text
    content: Mangez, amis, buvez, enivrez-vous d'amour!
  - type: heading
    content: La jeune femme
  '10':
  - type: text
    content: Mon bien-aimé est blanc et vermeil,
  - type: text
    content: on le remarque au milieu de dizaines de milliers.
  '11':
  - type: text
    content: Sa tête est d'or pur.
  - type: text
    content: Ses boucles sont flottantes,
  - type: text
    content: noires comme le corbeau.
  '12':
  - type: text
    content: 'Ses yeux sont pareils à des colombes au bord des ruisseaux:'
  - type: text
    content: ils baignent dans le lait,
  - type: text
    content: ils reposent au sein de l'abondance.
  '13':
  - type: text
    content: Ses joues sont comme un parterre d'aromates,
  - type: text
    content: ce sont des amas d'épices.
  - type: text
    content: Ses lèvres sont des lis d'où coule la myrrhe.
  '14':
  - type: text
    content: Ses mains sont des anneaux d'or
  - type: text
    content: garnis de chrysolithes.
  - type: text
    content: Son ventre est d'ivoire poli,
  - type: text
    content: couvert de saphirs.
  '15':
  - type: text
    content: Ses jambes sont des colonnes de marbre blanc
  - type: text
    content: posées sur des bases en or pur.
  - type: text
    content: Son aspect est aussi majestueux que le Liban,
  - type: text
    content: aussi distingué que ses cèdres.
  '16':
  - type: text
    content: Son palais n'est que douceur
  - type: text
    content: et toute sa personne est désirable.
  - type: text
    content: Tel est mon bien-aimé, tel est mon ami,
  - type: text
    content: filles de Jérusalem!
  '2':
  - type: text
    content: J'étais endormie, mais mon cœur veillait.
  - type: text
    content: 'C''est la voix de mon bien-aimé! Il frappe:'
  - type: text
    content: «Ouvre-moi, ma sœur, mon amie,
  - type: text
    content: ma colombe, ma parfaite,
  - type: text
    content: car ma tête est couverte de rosée,
  - type: text
    content: mes boucles sont pleines des gouttelettes de la nuit.»
  '3':
  - type: text
    content: J'ai enlevé mon habit. Comment pourrais-je le remettre?
  - type: text
    content: J'ai lavé mes pieds. Comment pourrais-je les salir?
  '4':
  - type: text
    content: Mon bien-aimé a passé la main par la fenêtre
  - type: text
    content: et j'ai été bouleversée à cause de lui.
  '5':
  - type: text
    content: J'ai commencé à ouvrir à mon bien-aimé,
  - type: text
    content: et de mes mains a perlé la myrrhe,
  - type: text
    content: de mes doigts la myrrhe a coulé
  - type: text
    content: sur la poignée du verrou.
  '6':
  - type: text
    content: J'ai ouvert à mon bien-aimé,
  - type: text
    content: mais mon bien-aimé s'était retiré, il avait disparu.
  - type: text
    content: Je perdais tous mes moyens pendant qu'il parlait!
  - type: text
    content: Je l'ai cherché, mais je ne l'ai pas trouvé.
  - type: text
    content: Je l'ai appelé, mais il ne m'a pas répondu.
  '7':
  - type: text
    content: Ce sont les gardes qui font la ronde dans la ville qui m'ont trouvée.
  - type: text
    content: Ils m'ont frappée, ils m'ont blessée,
  - type: text
    content: ils m'ont enlevé mon châle, les gardes des murailles.
  '8':
  - type: text
    content: Je vous en supplie, filles de Jérusalem,
  - type: text
    content: si vous trouvez mon bien-aimé,
  - type: text
    content: que lui direz-vous?
  - type: text
    content: Que je suis malade d'amour.
  - type: heading
    content: Les filles de Jérusalem
  '9':
  - type: text
    content: Qu'a-t-il de plus qu'un autre, ton bien-aimé,
  - type: text
    content: toi la plus belle des femmes?
  - type: text
    content: Qu'a-t-il de plus qu'un autre, ton bien-aimé,
  - type: text
    content: pour que tu nous supplies de cette manière?
  - type: heading
    content: La jeune femme
