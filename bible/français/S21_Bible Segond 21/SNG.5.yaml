document_id: SNG.5
type_code: fra
segments:
- type: usfm
  marker: sp
  children:
  - type: text
    text: Le jeune homme
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: J'entre dans mon jardin, ma sœur, ma chérie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je cueille ma myrrhe et mes aromates,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je mange mon rayon de miel avec mon miel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je bois mon vin avec mon lait.
- type: usfm
  marker: sp
  children:
  - type: text
    text: Les filles de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mangez, amis, buvez, enivrez-vous d'amour!
- type: usfm
  marker: sp
  children:
  - type: text
    text: La jeune femme
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: J'étais endormie, mais mon cœur veillait.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'C''est la voix de mon bien-aimé! Il frappe:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ouvre-moi, ma sœur, mon amie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ma colombe, ma parfaite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ma tête est couverte de rosée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mes boucles sont pleines des gouttelettes de la nuit.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: J'ai enlevé mon habit. Comment pourrais-je le remettre?
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'ai lavé mes pieds. Comment pourrais-je les salir?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mon bien-aimé a passé la main par la fenêtre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et j'ai été bouleversée à cause de lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: J'ai commencé à ouvrir à mon bien-aimé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de mes mains a perlé la myrrhe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de mes doigts la myrrhe a coulé
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur la poignée du verrou.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: J'ai ouvert à mon bien-aimé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais mon bien-aimé s'était retiré, il avait disparu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je perdais tous mes moyens pendant qu'il parlait!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je l'ai cherché, mais je ne l'ai pas trouvé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je l'ai appelé, mais il ne m'a pas répondu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ce sont les gardes qui font la ronde dans la ville qui m'ont trouvée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils m'ont frappée, ils m'ont blessée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils m'ont enlevé mon châle, les gardes des murailles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Je vous en supplie, filles de Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si vous trouvez mon bien-aimé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que lui direz-vous?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que je suis malade d'amour.
- type: usfm
  marker: sp
  children:
  - type: text
    text: Les filles de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Qu'a-t-il de plus qu'un autre, ton bien-aimé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi la plus belle des femmes?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu'a-t-il de plus qu'un autre, ton bien-aimé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que tu nous supplies de cette manière?
- type: usfm
  marker: sp
  children:
  - type: text
    text: La jeune femme
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mon bien-aimé est blanc et vermeil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on le remarque au milieu de dizaines de milliers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Sa tête est d'or pur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses boucles sont flottantes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: noires comme le corbeau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ses yeux sont pareils à des colombes au bord des ruisseaux:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils baignent dans le lait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils reposent au sein de l'abondance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ses joues sont comme un parterre d'aromates,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce sont des amas d'épices.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses lèvres sont des lis d'où coule la myrrhe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ses mains sont des anneaux d'or
- type: usfm
  marker: q1
  children:
  - type: text
    text: garnis de chrysolithes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son ventre est d'ivoire poli,
- type: usfm
  marker: q1
  children:
  - type: text
    text: couvert de saphirs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ses jambes sont des colonnes de marbre blanc
- type: usfm
  marker: q1
  children:
  - type: text
    text: posées sur des bases en or pur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son aspect est aussi majestueux que le Liban,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aussi distingué que ses cèdres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Son palais n'est que douceur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toute sa personne est désirable.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tel est mon bien-aimé, tel est mon ami,
- type: usfm
  marker: q1
  children:
  - type: text
    text: filles de Jérusalem!
