document_id: GAL.5,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Une liberté à conserver
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: C'est pour la liberté que Christ nous a affranchis. Tenez donc ferme dans cette liberté et ne vous placez pas de nouveau sous la contrainte d'un esclavage.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai confiance dans le Seigneur qu''en ce qui vous concerne vous ne penserez pas autrement. Mais celui qui vous trouble, quel qu''il soit, en subira la condamnation. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant à moi, frères et sœurs, pourquoi suis-je encore persécuté, si je prêche encore la circoncision? Le scandale de la croix est alors supprimé! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puissent-ils même se castrer, ceux qui jettent le trouble parmi vous!
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Frères et sœurs, c''est à la liberté que vous avez été appelés. Seulement, ne faites pas de cette liberté un prétexte pour suivre les désirs de votre nature propre. Au contraire, soyez par amour serviteurs les uns des autres. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, toute la loi est accomplie dans cette seule parole: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu aimeras ton prochain comme toi-même.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu aimeras… toi-même: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lévitique 19.18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si vous vous mordez et vous dévorez les uns les autres, attention: vous finirez par vous détruire les uns les autres.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici donc ce que je dis: marchez par l''Esprit et vous n''accomplirez pas les désirs de votre nature propre. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, la nature humaine a des désirs contraires à ceux de l''Esprit, et l''Esprit a des désirs contraires à ceux de la nature humaine. Ils sont opposés entre eux, de sorte que vous ne pouvez pas faire ce que vous voudriez. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cependant, si vous êtes conduits par l'Esprit, vous n'êtes pas sous la loi.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les œuvres de la nature humaine sont évidentes: ce sont [l''adultère,] l''immoralité sexuelle, l''impureté, la débauche, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moi Paul, je vous le dis: si vous vous faites circoncire, Christ ne vous servira à rien. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'l''idolâtrie, la magie, les haines, les querelles, les jalousies, les colères, les rivalités, les divisions, les sectes, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'l''envie, [les meurtres,] l''ivrognerie, les excès de table et les choses semblables. Je vous préviens, comme je l''ai déjà fait: ceux qui ont un tel comportement n''hériteront pas du royaume de Dieu.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais le fruit de l''Esprit, c''est l''amour, la joie, la paix, la patience, la bonté, la bienveillance, la foi, la douceur, la maîtrise de soi. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Contre de telles attitudes, il n'y a pas de loi.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceux qui appartiennent à [Jésus-]Christ ont crucifié leur nature propre avec ses passions et ses désirs. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si nous vivons par l''Esprit, laissons-nous aussi conduire par l''Esprit. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ne soyons pas vaniteux en nous provoquant les uns les autres, en nous portant envie les uns aux autres.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et j''affirme encore une fois à tout homme qui se fait circoncire qu''il est tenu de mettre en pratique la loi tout entière. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous êtes séparés de Christ, vous tous qui cherchez à être considérés comme justes dans le cadre de la loi, vous êtes déchus de la grâce. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous, c''est de la foi et par l''Esprit que nous attendons la justice espérée. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, en Jésus-Christ, ce qui a de l'importance, ce n'est ni la circoncision ni l'incirconcision, mais seulement la foi qui agit à travers l'amour.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous couriez bien. Qui vous a arrêtés pour vous empêcher d''obéir à la vérité? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cette influence ne vient pas de celui qui vous appelle. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un peu de levain fait lever toute la pâte. '
