document_id: 1SA.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'arche de l'alliance chez les Philistins
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les Philistins prirent l''arche de Dieu et la transportèrent d''Eben-Ezer à Asdod. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Après s'être emparés de l'arche de Dieu, les Philistins la firent entrer dans le temple de Dagon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Dagon: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: père de Baal d'après la mythologie, dieu de l'agriculture et de la mer, considéré comme l'inventeur de la charrue.
    marker-yv: yv-n
  - type: text
    text: ' et la placèrent à côté de Dagon. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le lendemain, les Asdodiens se levèrent de bon matin et trouvèrent Dagon étendu le visage contre terre devant l''arche de l''Eternel. Ils prirent Dagon et le remirent à sa place. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le surlendemain, ils se levèrent de bon matin et trouvèrent de nouveau Dagon étendu le visage contre terre devant l''arche de l''Eternel. La tête de Dagon et ses deux mains étaient abattues sur le seuil, et il ne lui restait que le tronc. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: C'est pourquoi, jusqu'à aujourd'hui, les prêtres de Dagon et tous ceux qui viennent dans le temple de Dagon à Asdod ne marchent pas sur le seuil.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'La main de l''Eternel pesa plus lourdement encore sur les Asdodiens et il fit des ravages parmi eux. Il les frappa de tumeurs à Asdod et dans le territoire qui en dépend. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Quand ils virent cela, les habitants d''Asdod dirent: «L''arche du Dieu d''Israël ne restera pas chez nous, car il fait peser lourdement sa main sur nous et sur Dagon, notre dieu.» '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils firent venir tous les princes des Philistins, les rassemblèrent chez eux et demandèrent: «Que pouvons-nous faire de l''arche du Dieu d''Israël?» Les princes répondirent: «Qu''on la transporte à Gath.» Et l''on transporta là-bas l''arche du Dieu d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais une fois qu''on l''y eut transportée, la main de l''Eternel fut contre la ville et il y eut une très grande terreur. Il frappa les habitants de la ville, depuis le petit jusqu''au grand, et ils eurent une éruption de tumeurs. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors ils envoyèrent l''arche de Dieu à Ekron. Lorsque l''arche de Dieu entra dans Ekron, les Ekroniens poussèrent des cris en disant: «On a transporté l''arche du Dieu d''Israël chez nous pour nous faire mourir, nous et notre peuple!» '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils firent venir tous les princes des Philistins, les rassemblèrent et dirent: «Renvoyez l''arche du Dieu d''Israël! Qu''elle retourne chez elle et qu''elle ne nous fasse pas mourir, nous et notre peuple.» En effet, dans toute la ville régnait une terreur mortelle; la main de Dieu y pesait très lourdement. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ceux qui ne mouraient pas étaient frappés de tumeurs et les cris de la ville montaient jusqu'au ciel.
