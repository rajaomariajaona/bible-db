document_id: JER.44
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Péché et jugement des Juifs d'Egypte
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici la parole adressée à Jérémie à l'intention de tous les Juifs qui s'étaient installés en Egypte, à Migdol, à Tachpanès, à Memphis et dans la région de Pathros.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël: Vous avez vous-mêmes vu tout le malheur que j''ai fait venir sur Jérusalem et sur toutes les villes de Juda. Elles ne sont plus aujourd''hui que des ruines inhabitées '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'à cause du mal qu''ils ont commis au point de m''irriter: ils sont allés brûler de l''encens et servir d''autres dieux, inconnus d''eux, de vous et de vos ancêtres. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je vous ai envoyé tous mes serviteurs, les prophètes. Je les ai envoyés inlassablement dire: ‘Ne commettez plus ces horreurs que je déteste!’ '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais ils n''ont pas écouté, ils n''ont pas tendu l''oreille, ils n''ont pas renoncé à leur attitude perverse. Ils n''ont pas cessé de faire brûler de l''encens en l''honneur d''autres dieux. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ma fureur et ma colère se sont alors déversées, incendiant les villes de Juda et les rues de Jérusalem, et celles-ci ne sont plus que ruines et terres dévastées, comme on peut le constater aujourd'hui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '»Maintenant voici ce que dit l''Eternel, le Dieu de l''univers, le Dieu d''Israël: Pourquoi vous faites-vous un si grand mal? Pourquoi faire disparaître du milieu de Juda hommes, femmes, enfants et nouveau-nés, de telle sorte qu''il ne subsiste plus rien de vous? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Pourquoi m''irritez-vous par vos agissements en faisant brûler de l''encens en l''honneur d''autres dieux, en Egypte où vous êtes venus vous réfugier? Vous vous exposez ainsi à être exterminés et à devenir un sujet de malédiction et d''insulte parmi toutes les nations de la terre! '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Avez-vous oublié le mal commis dans le pays de Juda et dans les rues de Jérusalem par vos ancêtres, par les rois de Juda et leurs femmes, par vous-mêmes et vos femmes?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '»Jusqu''à aujourd''hui, aucune trace de brisement chez eux. Ils n''ont pas fait preuve de crainte, ils n''ont pas suivi ma loi et mes prescriptions. Pourtant, je vous les avais communiquées, à vous et à vos ancêtres. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'C''est pourquoi, voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël: J''ai décidé de faire votre malheur et d''exterminer tout Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'J''enlèverai le reste de Juda, ceux qui ont pris la décision d''aller en Egypte pour s''y réfugier. Ils disparaîtront tous de l''Egypte. Ils tomberont par l''épée ou par la famine. Ils disparaîtront du plus petit au plus grand par l''épée ou par la famine. Ils mourront et deviendront un sujet d''imprécation, de consternation, de malédiction et d''insulte. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'J''interviendrai contre ceux qui se sont installés en Egypte de la même manière que je l''ai fait contre Jérusalem: par l''épée, la famine et la peste. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il n'y aura ni rescapé ni survivant, parmi le reste de Juda venu se réfugier en Egypte, pour retourner dans le pays de Juda. Ils ont beau aspirer à retourner s'installer là-bas, ils n'y retourneront pas, mis à part quelques rescapés.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tous les hommes qui savaient que leur femme faisait brûler de l''encens en l''honneur d''autres dieux, toutes les femmes qui se tenaient là en une grande assemblée et tout le peuple installé en Egypte, à Pathros, répondirent à Jérémie: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '«Tu as beau nous parler au nom de l''Eternel, nous ne t''écoutons pas. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Nous voulons faire tout ce que nous avons dit et continuer de faire brûler de l''encens et de verser des offrandes liquides en l''honneur de la reine du ciel, tout comme nous l''avons déjà fait, nous et nos ancêtres, nos rois et nos chefs, dans les villes de Juda et dans les rues de Jérusalem. Nous étions alors rassasiés de pain et heureux, nous ne connaissions pas le malheur. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'C''est depuis que nous avons cessé de faire brûler de l''encens et de verser des offrandes liquides en l''honneur de la reine du ciel que nous manquons de tout, que nous sommes exterminés par l''épée et par la famine. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: D'ailleurs, lorsque nous faisons brûler de l'encens et versons des offrandes liquides en l'honneur de la reine du ciel, est-ce à l'insu de nos maris que nous lui préparons des gâteaux à son effigie et lui versons des offrandes liquides?»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jérémie dit alors à tout le peuple, aux hommes et aux femmes, à tous ceux qui lui avaient donné cette réponse: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '«L''encens que vous avez fait brûler dans les villes de Juda et dans les rues de Jérusalem, vous et vos ancêtres, vos rois et vos chefs ainsi que l''ensemble de la population, l''Eternel s''en est souvenu, il ne l''a pas oublié. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il ne pouvait plus supporter la méchanceté de vos agissements, les horreurs que vous avez commises, et votre pays est devenu une ruine, un désert, un endroit maudit, inhabité, comme on peut le constater aujourd''hui. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: C'est parce que vous avez fait brûler de l'encens et péché contre l'Eternel, parce que vous ne l'avez pas écouté et n'avez pas suivi sa loi, ses prescriptions et ses instructions. Oui, c'est justement pour cela que ce malheur vous a frappés, comme on peut le constater aujourd'hui.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Jérémie dit encore à tout le peuple et à toutes les femmes: «Ecoutez la parole de l''Eternel, vous tous, Judéens d''Egypte! '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël: Vous et vos femmes avez formellement déclaré, tout en le confirmant par vos actes: ‘Nous voulons accomplir les vœux que nous avons faits en brûlant de l''encens et versant des offrandes liquides en l''honneur de la reine du ciel.’ Eh bien, vous respecterez vos vœux et les accomplirez jusqu''au bout! '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ecoutez donc la parole de l''Eternel, vous tous, Judéens installés en Egypte! Je jure par mon grand nom, dit l''Eternel, que plus aucun homme de Juda ne fera appel à mon nom, que dans toute l''Egypte plus personne ne dira: ‘Le Seigneur est vivant, c''est l''Eternel!’ '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Je vais veiller sur eux pour leur malheur et non pour leur bien. Tous les hommes de Juda qui se trouvent en Egypte seront éliminés par l''épée et par la famine, jusqu''à leur extermination complète. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Les quelques-uns qui auront échappé à l''épée reviendront depuis l''Egypte dans le pays de Juda, et tout le reste de Juda venu se réfugier en Egypte saura alors quelle est la parole qui se sera accomplie: la mienne ou la leur. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Et je vais vous donner un signe que j''interviendrai moi-même contre vous dans cet endroit, déclare l''Eternel, afin que vous sachiez que mes paroles s''accompliront vraiment contre vous, pour votre malheur. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Voici ce que dit l''Eternel: Je vais livrer le pharaon Hophra, roi d''Egypte, entre les mains de ses ennemis, entre les mains de ceux qui en veulent à sa vie, tout comme j''ai livré Sédécias, roi de Juda, entre les mains de Nebucadnetsar, roi de Babylone, son ennemi, qui en voulait à sa vie.»'
