document_id: LAM.4,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Horreur du siège de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Comment! L'or perd de son éclat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'or pur se ternit!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les pierres saintes se dispersent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à tous les coins de rue!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Malgré leur tendresse, de leurs propres mains des femmes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ont fait cuire leurs enfants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour qu'ils leur servent de nourriture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause du désastre qui frappe la fille de mon peuple.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: L'Eternel est allé jusqu'au bout de sa fureur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a déversé toute l'ardeur de sa colère
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il a allumé dans Sion un feu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui a dévoré ses fondations.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ni les rois de la terre ni aucun des habitants du monde n'auraient pu croire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que l'adversaire, l'ennemi, franchirait
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les portes de Jérusalem.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Tout cela est arrivé à cause des péchés de ses prophètes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des fautes commises par ses prêtres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu'ils ont versé le sang d'hommes justes dans la ville.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ils erraient, aveugles, dans les rues,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: souillés de sang.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne pouvait pas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toucher leurs habits.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: «Eloignez-vous, impurs! leur criait-on.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eloignez-vous, éloignez-vous, ne nous touchez pas!»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont en fuite, ils errent çà et là.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'On dit parmi les nations:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ils ne séjourneront pas plus longtemps chez nous!»
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: L'Eternel les a éparpillés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne veut plus les voir.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les prêtres n'ont pas été respectés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on n'a pas fait grâce aux anciens.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Nos yeux s'épuisaient encore
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à guetter un secours qui ne venait pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: notre regard s'était tourné
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vers une nation incapable de nous délivrer.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ils nous ont pourchassés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour nous empêcher d'aller sur nos places.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le terme de notre existence s'est approché, notre vie a pris fin.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, le terme de notre existence est arrivé!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ceux qui nous poursuivaient étaient plus rapides
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que les aigles du ciel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils nous ont talonnés sur les montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils nous ont tendu des embuscades dans le désert.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Les fils de Sion étaient précieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leur valeur était égale à celle de l'or fin.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment! Les voilà considérés comme des vases de terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: faits par les mains du potier!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Celui dont dépendait notre vie, celui que l'Eternel avait désigné par onction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a été pris dans leurs pièges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'lui à propos duquel nous disions:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Nous vivrons sous son ombre parmi les nations.»
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Réjouis-toi, exprime ta joie, fille d'Edom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: habitante du pays d'Uts!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Vers toi aussi, la coupe passera:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu t'enivreras et tu montreras ta nudité.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Fille de Sion, ta punition arrive à son terme:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne t'enverra plus en exil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fille d'Edom, il interviendra contre ta faute,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il dévoilera tes péchés.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Même les chacals présentent leurs mamelles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour allaiter leurs petits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la fille de mon peuple est devenue aussi cruelle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que les autruches du désert.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: La langue du nouveau-né s'attache à son palais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: desséchée par la soif.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les enfants demandent du pain
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et personne ne leur en donne.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ceux qui se nourrissaient des plats les plus raffinés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sont mourants dans les rues,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui étaient habitués au luxe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: embrassent les fumiers.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: La faute de la fille de mon peuple est plus grande
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que le péché de Sodome
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sodome: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ville détruite par Dieu à cause de sa méchanceté à l'époque d'Abraham (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Genèse 19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle, elle a été détruite en un instant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans que personne n'ait eu besoin de lever la main contre elle.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ses hommes consacrés étaient plus éclatants que la neige,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: plus blancs que le lait;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils avaient le teint plus rose que le corail,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leur figure était comme le saphir.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Leur aspect est devenu plus sombre que le noir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on ne les reconnaît pas dans les rues.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils n'ont plus que la peau sur les os,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sèche comme du bois.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Les victimes de l'épée sont plus heureuses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'que celles de la famine:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles, elles se liquéfient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: affaiblies par l'absence du produit des champs.
