document_id: LAM.4,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Horreur du siège de Jérusalem
  - type: text
    content: Comment! L'or perd de son éclat,
  - type: text
    content: l'or pur se ternit!
  - type: text
    content: Les pierres saintes se dispersent
  - type: text
    content: à tous les coins de rue!
  '10':
  - type: text
    content: Malgré leur tendresse, de leurs propres mains des femmes
  - type: text
    content: ont fait cuire leurs enfants
  - type: text
    content: pour qu'ils leur servent de nourriture,
  - type: text
    content: à cause du désastre qui frappe la fille de mon peuple.
  '11':
  - type: text
    content: L'Eternel est allé jusqu'au bout de sa fureur,
  - type: text
    content: il a déversé toute l'ardeur de sa colère
  - type: text
    content: et il a allumé dans Sion un feu
  - type: text
    content: qui a dévoré ses fondations.
  '12':
  - type: text
    content: Ni les rois de la terre ni aucun des habitants du monde n'auraient pu croire
  - type: text
    content: que l'adversaire, l'ennemi, franchirait
  - type: text
    content: les portes de Jérusalem.
  '13':
  - type: text
    content: Tout cela est arrivé à cause des péchés de ses prophètes,
  - type: text
    content: des fautes commises par ses prêtres,
  - type: text
    content: parce qu'ils ont versé le sang d'hommes justes dans la ville.
  '14':
  - type: text
    content: Ils erraient, aveugles, dans les rues,
  - type: text
    content: souillés de sang.
  - type: text
    content: On ne pouvait pas
  - type: text
    content: toucher leurs habits.
  '15':
  - type: text
    content: «Eloignez-vous, impurs! leur criait-on.
  - type: text
    content: Eloignez-vous, éloignez-vous, ne nous touchez pas!»
  - type: text
    content: Ils sont en fuite, ils errent çà et là.
  - type: text
    content: 'On dit parmi les nations:'
  - type: text
    content: «Ils ne séjourneront pas plus longtemps chez nous!»
  '16':
  - type: text
    content: L'Eternel les a éparpillés,
  - type: text
    content: il ne veut plus les voir.
  - type: text
    content: Les prêtres n'ont pas été respectés,
  - type: text
    content: on n'a pas fait grâce aux anciens.
  '17':
  - type: text
    content: Nos yeux s'épuisaient encore
  - type: text
    content: à guetter un secours qui ne venait pas,
  - type: text
    content: notre regard s'était tourné
  - type: text
    content: vers une nation incapable de nous délivrer.
  '18':
  - type: text
    content: Ils nous ont pourchassés
  - type: text
    content: pour nous empêcher d'aller sur nos places.
  - type: text
    content: Le terme de notre existence s'est approché, notre vie a pris fin.
  - type: text
    content: Oui, le terme de notre existence est arrivé!
  '19':
  - type: text
    content: Ceux qui nous poursuivaient étaient plus rapides
  - type: text
    content: que les aigles du ciel.
  - type: text
    content: Ils nous ont talonnés sur les montagnes,
  - type: text
    content: ils nous ont tendu des embuscades dans le désert.
  '2':
  - type: text
    content: Les fils de Sion étaient précieux,
  - type: text
    content: leur valeur était égale à celle de l'or fin.
  - type: text
    content: Comment! Les voilà considérés comme des vases de terre,
  - type: text
    content: faits par les mains du potier!
  '20':
  - type: text
    content: Celui dont dépendait notre vie, celui que l'Eternel avait désigné par onction,
  - type: text
    content: a été pris dans leurs pièges,
  - type: text
    content: 'lui à propos duquel nous disions:'
  - type: text
    content: «Nous vivrons sous son ombre parmi les nations.»
  '21':
  - type: text
    content: Réjouis-toi, exprime ta joie, fille d'Edom,
  - type: text
    content: habitante du pays d'Uts!
  - type: text
    content: 'Vers toi aussi, la coupe passera:'
  - type: text
    content: tu t'enivreras et tu montreras ta nudité.
  '22':
  - type: text
    content: 'Fille de Sion, ta punition arrive à son terme:'
  - type: text
    content: il ne t'enverra plus en exil.
  - type: text
    content: Fille d'Edom, il interviendra contre ta faute,
  - type: text
    content: il dévoilera tes péchés.
  '3':
  - type: text
    content: Même les chacals présentent leurs mamelles
  - type: text
    content: pour allaiter leurs petits,
  - type: text
    content: mais la fille de mon peuple est devenue aussi cruelle
  - type: text
    content: que les autruches du désert.
  '4':
  - type: text
    content: La langue du nouveau-né s'attache à son palais,
  - type: text
    content: desséchée par la soif.
  - type: text
    content: Les enfants demandent du pain
  - type: text
    content: et personne ne leur en donne.
  '5':
  - type: text
    content: Ceux qui se nourrissaient des plats les plus raffinés
  - type: text
    content: sont mourants dans les rues,
  - type: text
    content: ceux qui étaient habitués au luxe
  - type: text
    content: embrassent les fumiers.
  '6':
  - type: text
    content: La faute de la fille de mon peuple est plus grande
  - type: text
    content: que le péché de Sodome
  - type: note
    content: 'Sodome: ville détruite par Dieu à cause de sa méchanceté à l''époque d''Abraham (Genèse 19).'
  - type: text
    content: .
  - type: text
    content: Elle, elle a été détruite en un instant,
  - type: text
    content: sans que personne n'ait eu besoin de lever la main contre elle.
  '7':
  - type: text
    content: Ses hommes consacrés étaient plus éclatants que la neige,
  - type: text
    content: plus blancs que le lait;
  - type: text
    content: ils avaient le teint plus rose que le corail,
  - type: text
    content: leur figure était comme le saphir.
  '8':
  - type: text
    content: Leur aspect est devenu plus sombre que le noir,
  - type: text
    content: on ne les reconnaît pas dans les rues.
  - type: text
    content: Ils n'ont plus que la peau sur les os,
  - type: text
    content: sèche comme du bois.
  '9':
  - type: text
    content: Les victimes de l'épée sont plus heureuses
  - type: text
    content: 'que celles de la famine:'
  - type: text
    content: elles, elles se liquéfient,
  - type: text
    content: affaiblies par l'absence du produit des champs.
