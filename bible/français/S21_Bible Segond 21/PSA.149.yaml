document_id: PSA.149
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Louange à Dieu pour ses jugements
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Louez l'Eternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chantez en l'honneur de l'Eternel un cantique nouveau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: chantez sa louange dans l'assemblée des fidèles!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Qu'Israël se réjouisse en son créateur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que les habitants de Sion soient dans l'allégresse à cause de leur roi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Qu'ils louent son nom avec des danses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'ils le célèbrent avec le tambourin et la harpe!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: En effet, l'Eternel prend plaisir en son peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il accorde aux humbles le salut pour parure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Que les fidèles exultent dans la gloire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'ils poussent des cris de joie sur leur lit!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Que les louanges de Dieu soient dans leur bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'épée à deux tranchants dans leur main!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ainsi ils tireront vengeance des nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils puniront les peuples;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ils attacheront leurs rois avec des chaînes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leurs grands avec des entraves en fer;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ils accompliront contre eux le jugement qui est écrit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quel honneur pour tous ses fidèles!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez l'Eternel!
