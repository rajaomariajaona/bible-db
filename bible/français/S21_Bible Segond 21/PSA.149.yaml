document_id: PSA.149,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Louange à Dieu pour ses jugements
  - type: text
    content: Louez l'Eternel!
  - type: text
    content: Chantez en l'honneur de l'Eternel un cantique nouveau,
  - type: text
    content: chantez sa louange dans l'assemblée des fidèles!
  '2':
  - type: text
    content: Qu'Israël se réjouisse en son créateur,
  - type: text
    content: que les habitants de Sion soient dans l'allégresse à cause de leur roi!
  '3':
  - type: text
    content: Qu'ils louent son nom avec des danses,
  - type: text
    content: qu'ils le célèbrent avec le tambourin et la harpe!
  '4':
  - type: text
    content: En effet, l'Eternel prend plaisir en son peuple,
  - type: text
    content: il accorde aux humbles le salut pour parure.
  '5':
  - type: text
    content: Que les fidèles exultent dans la gloire,
  - type: text
    content: qu'ils poussent des cris de joie sur leur lit!
  '6':
  - type: text
    content: Que les louanges de Dieu soient dans leur bouche,
  - type: text
    content: et l'épée à deux tranchants dans leur main!
  '7':
  - type: text
    content: Ainsi ils tireront vengeance des nations,
  - type: text
    content: ils puniront les peuples;
  '8':
  - type: text
    content: ils attacheront leurs rois avec des chaînes,
  - type: text
    content: et leurs grands avec des entraves en fer;
  '9':
  - type: text
    content: ils accompliront contre eux le jugement qui est écrit.
  - type: text
    content: Quel honneur pour tous ses fidèles!
  - type: text
    content: Louez l'Eternel!
