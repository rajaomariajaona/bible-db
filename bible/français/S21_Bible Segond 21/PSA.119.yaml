document_id: PSA.119,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La Parole de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux ceux dont la conduite est intègre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui marchent suivant la loi de l'Eternel!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je te cherche de tout mon cœur:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne me laisse pas m'égarer loin de tes commandements!
  '100':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'ai plus d'intelligence que les vieillards,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je respecte tes décrets.
  '101':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'écarte mes pas de tout mauvais chemin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin de me conformer à ta parole.
  '102':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne me détourne pas de tes sentences,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c'est toi qui me les as enseignées.
  '103':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tes paroles sont douces pour mon palais!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles sont plus douces que le miel à ma bouche.
  '104':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Grâce à tes décrets je deviens intelligent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est pourquoi je déteste toute voie de mensonge.
  '105':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta parole est une lampe à mes pieds
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et une lumière sur mon sentier.
  '106':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je jure, et je tiendrai ma promesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de respecter tes justes sentences.
  '107':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis profondément humilié.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, rends-moi la vie conformément à ta parole!
  '108':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Accueille favorablement les sentiments que j'exprime, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et enseigne-moi tes lois!
  '109':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma vie est constamment en danger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais je n'oublie pas ta loi.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je serre ta parole dans mon cœur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin de ne pas pécher contre toi.
  '110':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des méchants me tendent des pièges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais je ne m'égare pas loin de tes décrets.
  '111':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes instructions sont pour toujours mon héritage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car elles font la joie de mon cœur.
  '112':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je pousse mon cœur à mettre tes prescriptions en pratique,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ce toujours, jusqu'à la fin.
  '113':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je déteste les hommes indécis
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais j'aime ta loi.
  '114':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon refuge et mon bouclier, c'est toi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'espère en ta promesse.
  '115':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eloignez-vous de moi, méchants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que j'observe les commandements de mon Dieu!
  '116':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soutiens-moi conformément à ta promesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que je vive, et ne me déçois pas dans mon espérance!
  '117':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois mon appui! Ainsi je serai sauvé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je ne perdrai pas de vue tes prescriptions.
  '118':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu méprises tous ceux qui s'écartent de tes prescriptions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car leur tromperie est sans effet.
  '119':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu enlèves comme des impuretés tous les méchants de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est pourquoi j'aime tes instructions.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Béni sois-tu, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: enseigne-moi tes prescriptions!
  '120':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma chair frissonne de l'épouvante que tu m'inspires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je crains tes sentences.
  '121':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'applique le droit et la justice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne m'abandonne pas à mes oppresseurs!
  '122':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Garantis le bien de ton serviteur!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne me laisse pas opprimer par des hommes arrogants!
  '123':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes yeux se fatiguent à attendre ton salut
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la promesse de ta justice.
  '124':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Agis envers ton serviteur conformément à ta bonté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et enseigne-moi tes prescriptions!
  '125':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je suis ton serviteur: donne-moi l''intelligence'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que je comprenne tes instructions!
  '126':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est temps d'agir pour toi, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car on viole ta loi.
  '127':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà pourquoi j'aime tes commandements
  - type: usfm
    marker: q1
    children:
    - type: text
      text: plus que l'or, plus que l'or fin,
  '128':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voilà pourquoi je trouve justes tous tes décrets
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je déteste toute voie de mensonge.
  '129':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes instructions sont admirables,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est pourquoi je les garde.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De mes lèvres j'énumère
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toutes les sentences que tu as prononcées.
  '130':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La révélation de tes paroles éclaire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle donne de l'intelligence à ceux qui manquent d'expérience.
  '131':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'ouvre la bouche et je soupire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car j'ai soif de tes commandements.
  '132':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tourne-toi vers moi et fais-moi grâce
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme tu le fais pour ceux qui aiment ton nom!
  '133':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Affermis mes pas dans ta parole
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne laisse aucun mal dominer sur moi!
  '134':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Libère-moi de l'oppression des hommes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que je garde tes décrets!
  '135':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais briller ton visage sur ton serviteur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et enseigne-moi tes prescriptions!
  '136':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes yeux versent des torrents de larmes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu'on ne respecte pas ta loi.
  '137':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es juste, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tes sentences sont équitables.
  '138':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu fondes tes instructions sur la justice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sur une grande fidélité.
  '139':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis rongé par mon zèle
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand je vois mes adversaires oublier tes paroles.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'ai autant de joie à suivre tes instructions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que si je possédais tous les trésors.
  '140':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta parole est entièrement pure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ton serviteur l'aime.
  '141':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis petit et méprisé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais je n'oublie pas tes décrets.
  '142':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta justice est une justice éternelle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ta loi est la vérité.
  '143':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La détresse et l'angoisse se sont emparées de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais tes commandements font mon plaisir.
  '144':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes instructions sont éternellement justes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: donne-moi l'intelligence pour que je vive!
  '145':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je fais appel à toi de tout mon cœur. Réponds-moi, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que je garde tes prescriptions!
  '146':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je fais appel à toi. Sauve-moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que je respecte tes instructions!
  '147':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je devance l'aurore pour implorer ton aide,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'espère en tes promesses.
  '148':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avant la fin de la nuit, j'ouvre les yeux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour méditer ta parole.
  '149':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoute-moi conformément à ta bonté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rends-moi la vie conformément à ta sentence!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je médite tes décrets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'ai tes sentiers sous les yeux.
  '150':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils s'approchent, ceux qui poursuivent le crime,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils s'éloignent de la loi.
  '151':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais toi, tu es près de moi, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous tes commandements sont la vérité.
  '152':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je sais depuis longtemps
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que tu as établi tes instructions pour toujours.
  '153':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Regarde ma misère et délivre-moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je n'oublie pas ta loi.
  '154':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Défends ma cause et rachète-moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rends-moi la vie par ta promesse!
  '155':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le salut est loin des méchants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils ne recherchent pas tes prescriptions.
  '156':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes compassions sont grandes, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rends-moi la vie conformément à tes sentences!
  '157':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes persécuteurs et mes adversaires sont nombreux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais je ne m'écarte pas de tes instructions.
  '158':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vois avec dégoût des traîtres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui ne se conforment pas à ta parole.
  '159':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Considère combien j'aime tes décrets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, rends-moi la vie conformément à ta bonté!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je fais mes délices de tes prescriptions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je n'oublie pas ta parole.
  '160':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le fondement de ta parole, c'est la vérité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et toutes tes justes sentences sont éternelles.
  '161':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des princes me persécutent sans raison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais mon cœur ne tremble qu'à tes paroles.
  '162':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me réjouis de tes promesses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme celui qui trouve un grand butin.
  '163':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je déteste, j'ai en horreur le mensonge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais j'aime ta loi.
  '164':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sept fois par jour je te célèbre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de tes justes sentences.
  '165':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y a beaucoup de paix pour ceux qui aiment ta loi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et rien ne les fait trébucher.
  '166':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'attends ton salut, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je mets en pratique tes commandements.
  '167':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je respecte tes instructions et je les aime beaucoup.
  '168':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je respecte tes décrets et tes instructions.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, toutes mes voies sont devant toi.
  '169':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ma prière parvienne jusqu'à toi, Eternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Donne-moi de l'intelligence conformément à ta parole!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais du bien à ton serviteur, pour que je vive
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que je me conforme à ta parole!
  '170':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ma supplication arrive jusqu'à toi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Délivre-moi conformément à ta promesse!
  '171':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que mes lèvres proclament ta louange,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tu m'enseignes tes prescriptions!
  '172':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ma langue célèbre ta parole,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tous tes commandements sont justes!
  '173':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ta main vienne à mon aide,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car j'ai choisi tes décrets!
  '174':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je soupire après ton salut, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ta loi fait mon plaisir.
  '175':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que je puisse vivre et te louer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que tes sentences viennent à mon aide!
  '176':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je suis errant comme une brebis perdue: viens à la recherche de ton serviteur,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je n'oublie pas tes commandements.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ouvre mes yeux, pour que je contemple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les merveilles de ta loi!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je suis un étranger sur la terre:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne me cache pas tes commandements!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux ceux qui gardent ses instructions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui le cherchent de tout leur cœur,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon âme est rongée par le désir
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui la porte constamment vers tes lois.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu menaces les hommes arrogants, ces maudits
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui s'égarent loin de tes commandements.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Décharge-moi du déshonneur et du mépris,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car j'observe tes instructions.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des princes ont beau siéger pour parler contre moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ton serviteur médite tes prescriptions.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes instructions font mon plaisir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce sont mes conseillères.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis affalé dans la poussière.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rends-moi la vie conformément à ta parole!
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'expose mes voies, et tu me réponds;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: enseigne-moi tes prescriptions!
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais-moi comprendre la voie de tes décrets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je méditerai sur tes merveilles!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mon âme est accablée de tristesse:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: relève-moi conformément à ta parole!
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eloigne-moi de la voie du mensonge
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et accorde-moi la grâce de suivre ta loi!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui ne commettent aucune injustice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui marchent dans ses voies!
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je choisis la voie de la fidélité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je place tes lois sous mes yeux.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je m'attache à tes instructions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, ne me couvre pas de honte!
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je cours sur la voie de tes commandements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tu épanouis mon cœur.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enseigne-moi, Eternel, la voie de tes prescriptions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que je la suive jusqu'à la fin!
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Donne-moi l'intelligence, pour que je garde ta loi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que je la respecte de tout mon cœur!
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Conduis-moi dans le sentier de tes commandements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je l'aime.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pousse mon cœur vers tes instructions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et non vers le profit!
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Détourne mes yeux de ce qui est sans valeur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fais-moi vivre dans ta voie!
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Accomplis envers ton serviteur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce que tu as promis à ceux qui te craignent!
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eloigne de moi l'insulte que je redoute,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tes sentences sont pleines de bonté.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as promulgué tes décrets
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour qu'on les respecte avec soin.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je désire vraiment appliquer tes décrets:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fais-moi vivre dans ta justice!
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, que ta bonté vienne sur moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec ton salut, conformément à ta promesse!
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors je pourrai répondre à celui qui m'insulte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je me confie en ta parole.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N'arrache pas la parole de vérité de ma bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car j'espère en tes jugements.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je respecterai constamment ta loi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour toujours et à perpétuité.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je marcherai en toute liberté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je recherche tes décrets.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je parlerai de tes instructions devant des rois
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je ne rougirai pas de honte.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je fais mes délices de tes commandements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je les aime.
  '48':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je tends les mains vers tes commandements que j'aime,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je veux méditer tes prescriptions.
  '49':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Souviens-toi de ta promesse à ton serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puisque tu m'as donné l'espérance!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que mes actions soient bien réglées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que je respecte tes prescriptions!
  '50':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est ma consolation dans ma misère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ta promesse me rend la vie.
  '51':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des hommes arrogants m'accablent de moqueries,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais je ne m'écarte pas de ta loi.
  '52':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me souviens de tes sentences passées, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c'est ce qui me console.
  '53':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une colère ardente s'empare de moi à cause des méchants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui abandonnent ta loi.
  '54':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes prescriptions sont le sujet de mes chants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans la maison où je suis étranger.
  '55':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La nuit je me rappelle ton nom, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je respecte ta loi.
  '56':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La part qui me revient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est de garder tes décrets.
  '57':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon lot, Eternel, je le dis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est d'obéir à tes paroles.
  '58':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je t''implore de tout mon cœur:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fais-moi grâce, conformément à ta promesse!
  '59':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je réfléchis à mes voies
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je conduis mes pas vers tes instructions.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors je ne rougirai pas de honte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: devant tous tes commandements.
  '60':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je fais preuve d'empressement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je n'attends pas pour obéir à tes commandements.
  '61':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les pièges des méchants m'entourent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais je n'oublie pas ta loi.
  '62':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au milieu de la nuit je me lève pour te louer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de tes justes sentences.
  '63':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis l'ami de tous ceux qui te craignent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui se conforment à tes décrets.
  '64':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, la terre est pleine de ta bonté.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enseigne-moi tes prescriptions!
  '65':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as fait du bien à ton serviteur, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: conformément à ta parole.
  '66':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Enseigne-moi le bon sens et la connaissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je crois à tes commandements.
  '67':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avant d'être humilié, je m'égarais;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: maintenant je me conforme à ta parole.
  '68':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es bon et bienfaisant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: enseigne-moi tes prescriptions!
  '69':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des hommes arrogants imaginent contre moi des mensonges;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moi, de tout mon cœur je garde tes décrets.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te louerai avec un cœur droit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en étudiant tes justes sentences.
  '70':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur cœur est aussi insensible que la graisse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais moi, je fais mes délices de ta loi.
  '71':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est bon pour moi d'être humilié
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin d'apprendre tes prescriptions.
  '72':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mieux vaut pour moi la loi de ta bouche
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que 1000 objets en or et en argent.
  '73':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes mains m'ont créé, elles m'ont fortifié;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: donne-moi l'intelligence pour que j'apprenne tes commandements!
  '74':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui te craignent me voient et se réjouissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car j'espère en tes promesses.
  '75':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je sais, Eternel, que tes sentences sont justes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est par fidélité que tu m'as humilié.
  '76':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ta bonté soit ma consolation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme tu l'as promis à ton serviteur.
  '77':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tes compassions viennent sur moi pour que je vive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ta loi fait mon plaisir.
  '78':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'ils soient couverts de honte, les hommes arrogants qui me maltraitent sans raison!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, je médite sur tes décrets.
  '79':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'ils reviennent vers moi, ceux qui te craignent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui connaissent tes instructions!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je veux respecter tes prescriptions:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne m'abandonne pas totalement!
  '80':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que mon cœur soit intègre pour suivre tes prescriptions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que je ne sois pas couvert de honte!
  '81':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon âme languit après ton salut;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'espère en ta promesse.
  '82':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes yeux se fatiguent à attendre ce que tu as promis;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'je demande: «Quand me consoleras-tu?»'
  '83':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis racorni comme une outre dans la fumée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais je n'oublie pas tes prescriptions.
  '84':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quelle est la durée de la vie de ton serviteur?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand jugeras-tu ceux qui me persécutent?
  '85':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des hommes arrogants creusent des fosses devant moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne se conforment pas à ta loi.
  '86':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous tes commandements ne sont que fidélité.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'On me persécute sans raison: secours-moi!'
  '87':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont failli me terrasser, mais moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je n'abandonne pas tes décrets.
  '88':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rends-moi la vie conformément à ta bonté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que je respecte les instructions de ta bouche!
  '89':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta parole, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: est pour toujours établie dans le ciel.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment le jeune homme rendra-t-il pur son sentier?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En se conformant à ta parole.
  '90':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta fidélité dure de génération en génération;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu as fondé la terre, et elle subsiste.
  '91':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est d'après tes lois que tout subsiste aujourd'hui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tout l'univers est à ton service.
  '92':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si ta loi n'avait pas fait mon plaisir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je serais mort dans ma misère.
  '93':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je n'oublierai jamais tes décrets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c'est par eux que tu me fais vivre.
  '94':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je t''appartiens: sauve-moi,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je recherche tes décrets.
  '95':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des méchants espèrent me faire mourir,
  - type: usfm
    marker: q1
