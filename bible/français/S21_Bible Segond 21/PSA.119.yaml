document_id: PSA.119,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La Parole de Dieu
  - type: text
    content: Heureux ceux dont la conduite est intègre,
  - type: text
    content: ceux qui marchent suivant la loi de l'Eternel!
  '10':
  - type: text
    content: 'Je te cherche de tout mon cœur:'
  - type: text
    content: ne me laisse pas m'égarer loin de tes commandements!
  '100':
  - type: text
    content: J'ai plus d'intelligence que les vieillards,
  - type: text
    content: car je respecte tes décrets.
  '101':
  - type: text
    content: J'écarte mes pas de tout mauvais chemin
  - type: text
    content: afin de me conformer à ta parole.
  '102':
  - type: text
    content: Je ne me détourne pas de tes sentences,
  - type: text
    content: car c'est toi qui me les as enseignées.
  '103':
  - type: text
    content: Que tes paroles sont douces pour mon palais!
  - type: text
    content: Elles sont plus douces que le miel à ma bouche.
  '104':
  - type: text
    content: Grâce à tes décrets je deviens intelligent,
  - type: text
    content: c'est pourquoi je déteste toute voie de mensonge.
  '105':
  - type: text
    content: Ta parole est une lampe à mes pieds
  - type: text
    content: et une lumière sur mon sentier.
  '106':
  - type: text
    content: Je jure, et je tiendrai ma promesse,
  - type: text
    content: de respecter tes justes sentences.
  '107':
  - type: text
    content: Je suis profondément humilié.
  - type: text
    content: Eternel, rends-moi la vie conformément à ta parole!
  '108':
  - type: text
    content: Accueille favorablement les sentiments que j'exprime, Eternel,
  - type: text
    content: et enseigne-moi tes lois!
  '109':
  - type: text
    content: Ma vie est constamment en danger,
  - type: text
    content: mais je n'oublie pas ta loi.
  '11':
  - type: text
    content: Je serre ta parole dans mon cœur
  - type: text
    content: afin de ne pas pécher contre toi.
  '110':
  - type: text
    content: Des méchants me tendent des pièges,
  - type: text
    content: mais je ne m'égare pas loin de tes décrets.
  '111':
  - type: text
    content: Tes instructions sont pour toujours mon héritage,
  - type: text
    content: car elles font la joie de mon cœur.
  '112':
  - type: text
    content: Je pousse mon cœur à mettre tes prescriptions en pratique,
  - type: text
    content: et ce toujours, jusqu'à la fin.
  '113':
  - type: text
    content: Je déteste les hommes indécis
  - type: text
    content: mais j'aime ta loi.
  '114':
  - type: text
    content: Mon refuge et mon bouclier, c'est toi.
  - type: text
    content: J'espère en ta promesse.
  '115':
  - type: text
    content: Eloignez-vous de moi, méchants,
  - type: text
    content: afin que j'observe les commandements de mon Dieu!
  '116':
  - type: text
    content: Soutiens-moi conformément à ta promesse,
  - type: text
    content: afin que je vive, et ne me déçois pas dans mon espérance!
  '117':
  - type: text
    content: Sois mon appui! Ainsi je serai sauvé
  - type: text
    content: et je ne perdrai pas de vue tes prescriptions.
  '118':
  - type: text
    content: Tu méprises tous ceux qui s'écartent de tes prescriptions,
  - type: text
    content: car leur tromperie est sans effet.
  '119':
  - type: text
    content: Tu enlèves comme des impuretés tous les méchants de la terre,
  - type: text
    content: c'est pourquoi j'aime tes instructions.
  '12':
  - type: text
    content: Béni sois-tu, Eternel,
  - type: text
    content: enseigne-moi tes prescriptions!
  '120':
  - type: text
    content: Ma chair frissonne de l'épouvante que tu m'inspires,
  - type: text
    content: et je crains tes sentences.
  '121':
  - type: text
    content: J'applique le droit et la justice.
  - type: text
    content: Ne m'abandonne pas à mes oppresseurs!
  '122':
  - type: text
    content: Garantis le bien de ton serviteur!
  - type: text
    content: Ne me laisse pas opprimer par des hommes arrogants!
  '123':
  - type: text
    content: Mes yeux se fatiguent à attendre ton salut
  - type: text
    content: et la promesse de ta justice.
  '124':
  - type: text
    content: Agis envers ton serviteur conformément à ta bonté
  - type: text
    content: et enseigne-moi tes prescriptions!
  '125':
  - type: text
    content: 'Je suis ton serviteur: donne-moi l''intelligence'
  - type: text
    content: pour que je comprenne tes instructions!
  '126':
  - type: text
    content: Il est temps d'agir pour toi, Eternel,
  - type: text
    content: car on viole ta loi.
  '127':
  - type: text
    content: Voilà pourquoi j'aime tes commandements
  - type: text
    content: plus que l'or, plus que l'or fin,
  '128':
  - type: text
    content: voilà pourquoi je trouve justes tous tes décrets
  - type: text
    content: et je déteste toute voie de mensonge.
  '129':
  - type: text
    content: Tes instructions sont admirables,
  - type: text
    content: c'est pourquoi je les garde.
  '13':
  - type: text
    content: De mes lèvres j'énumère
  - type: text
    content: toutes les sentences que tu as prononcées.
  '130':
  - type: text
    content: La révélation de tes paroles éclaire,
  - type: text
    content: elle donne de l'intelligence à ceux qui manquent d'expérience.
  '131':
  - type: text
    content: J'ouvre la bouche et je soupire,
  - type: text
    content: car j'ai soif de tes commandements.
  '132':
  - type: text
    content: Tourne-toi vers moi et fais-moi grâce
  - type: text
    content: comme tu le fais pour ceux qui aiment ton nom!
  '133':
  - type: text
    content: Affermis mes pas dans ta parole
  - type: text
    content: et ne laisse aucun mal dominer sur moi!
  '134':
  - type: text
    content: Libère-moi de l'oppression des hommes
  - type: text
    content: afin que je garde tes décrets!
  '135':
  - type: text
    content: Fais briller ton visage sur ton serviteur
  - type: text
    content: et enseigne-moi tes prescriptions!
  '136':
  - type: text
    content: Mes yeux versent des torrents de larmes
  - type: text
    content: parce qu'on ne respecte pas ta loi.
  '137':
  - type: text
    content: Tu es juste, Eternel,
  - type: text
    content: et tes sentences sont équitables.
  '138':
  - type: text
    content: Tu fondes tes instructions sur la justice
  - type: text
    content: et sur une grande fidélité.
  '139':
  - type: text
    content: Je suis rongé par mon zèle
  - type: text
    content: quand je vois mes adversaires oublier tes paroles.
  '14':
  - type: text
    content: J'ai autant de joie à suivre tes instructions
  - type: text
    content: que si je possédais tous les trésors.
  '140':
  - type: text
    content: Ta parole est entièrement pure,
  - type: text
    content: et ton serviteur l'aime.
  '141':
  - type: text
    content: Je suis petit et méprisé,
  - type: text
    content: mais je n'oublie pas tes décrets.
  '142':
  - type: text
    content: Ta justice est une justice éternelle,
  - type: text
    content: et ta loi est la vérité.
  '143':
  - type: text
    content: La détresse et l'angoisse se sont emparées de moi,
  - type: text
    content: mais tes commandements font mon plaisir.
  '144':
  - type: text
    content: Tes instructions sont éternellement justes,
  - type: text
    content: donne-moi l'intelligence pour que je vive!
  '145':
  - type: text
    content: Je fais appel à toi de tout mon cœur. Réponds-moi, Eternel,
  - type: text
    content: afin que je garde tes prescriptions!
  '146':
  - type: text
    content: Je fais appel à toi. Sauve-moi,
  - type: text
    content: afin que je respecte tes instructions!
  '147':
  - type: text
    content: Je devance l'aurore pour implorer ton aide,
  - type: text
    content: j'espère en tes promesses.
  '148':
  - type: text
    content: Avant la fin de la nuit, j'ouvre les yeux
  - type: text
    content: pour méditer ta parole.
  '149':
  - type: text
    content: Ecoute-moi conformément à ta bonté,
  - type: text
    content: rends-moi la vie conformément à ta sentence!
  '15':
  - type: text
    content: Je médite tes décrets,
  - type: text
    content: j'ai tes sentiers sous les yeux.
  '150':
  - type: text
    content: Ils s'approchent, ceux qui poursuivent le crime,
  - type: text
    content: ils s'éloignent de la loi.
  '151':
  - type: text
    content: Mais toi, tu es près de moi, Eternel,
  - type: text
    content: et tous tes commandements sont la vérité.
  '152':
  - type: text
    content: Je sais depuis longtemps
  - type: text
    content: que tu as établi tes instructions pour toujours.
  '153':
  - type: text
    content: Regarde ma misère et délivre-moi,
  - type: text
    content: car je n'oublie pas ta loi.
  '154':
  - type: text
    content: Défends ma cause et rachète-moi,
  - type: text
    content: rends-moi la vie par ta promesse!
  '155':
  - type: text
    content: Le salut est loin des méchants,
  - type: text
    content: car ils ne recherchent pas tes prescriptions.
  '156':
  - type: text
    content: Tes compassions sont grandes, Eternel,
  - type: text
    content: rends-moi la vie conformément à tes sentences!
  '157':
  - type: text
    content: Mes persécuteurs et mes adversaires sont nombreux,
  - type: text
    content: mais je ne m'écarte pas de tes instructions.
  '158':
  - type: text
    content: Je vois avec dégoût des traîtres
  - type: text
    content: qui ne se conforment pas à ta parole.
  '159':
  - type: text
    content: Considère combien j'aime tes décrets,
  - type: text
    content: Eternel, rends-moi la vie conformément à ta bonté!
  '16':
  - type: text
    content: Je fais mes délices de tes prescriptions,
  - type: text
    content: je n'oublie pas ta parole.
  '160':
  - type: text
    content: Le fondement de ta parole, c'est la vérité,
  - type: text
    content: et toutes tes justes sentences sont éternelles.
  '161':
  - type: text
    content: Des princes me persécutent sans raison,
  - type: text
    content: mais mon cœur ne tremble qu'à tes paroles.
  '162':
  - type: text
    content: Je me réjouis de tes promesses
  - type: text
    content: comme celui qui trouve un grand butin.
  '163':
  - type: text
    content: Je déteste, j'ai en horreur le mensonge,
  - type: text
    content: mais j'aime ta loi.
  '164':
  - type: text
    content: Sept fois par jour je te célèbre
  - type: text
    content: à cause de tes justes sentences.
  '165':
  - type: text
    content: Il y a beaucoup de paix pour ceux qui aiment ta loi,
  - type: text
    content: et rien ne les fait trébucher.
  '166':
  - type: text
    content: J'attends ton salut, Eternel,
  - type: text
    content: et je mets en pratique tes commandements.
  '167':
  - type: text
    content: Je respecte tes instructions et je les aime beaucoup.
  '168':
  - type: text
    content: Je respecte tes décrets et tes instructions.
  - type: text
    content: Oui, toutes mes voies sont devant toi.
  '169':
  - type: text
    content: Que ma prière parvienne jusqu'à toi, Eternel!
  - type: text
    content: Donne-moi de l'intelligence conformément à ta parole!
  '17':
  - type: text
    content: Fais du bien à ton serviteur, pour que je vive
  - type: text
    content: et que je me conforme à ta parole!
  '170':
  - type: text
    content: Que ma supplication arrive jusqu'à toi!
  - type: text
    content: Délivre-moi conformément à ta promesse!
  '171':
  - type: text
    content: Que mes lèvres proclament ta louange,
  - type: text
    content: car tu m'enseignes tes prescriptions!
  '172':
  - type: text
    content: Que ma langue célèbre ta parole,
  - type: text
    content: car tous tes commandements sont justes!
  '173':
  - type: text
    content: Que ta main vienne à mon aide,
  - type: text
    content: car j'ai choisi tes décrets!
  '174':
  - type: text
    content: Je soupire après ton salut, Eternel,
  - type: text
    content: et ta loi fait mon plaisir.
  '175':
  - type: text
    content: Que je puisse vivre et te louer,
  - type: text
    content: et que tes sentences viennent à mon aide!
  '176':
  - type: text
    content: 'Je suis errant comme une brebis perdue: viens à la recherche de ton serviteur,'
  - type: text
    content: car je n'oublie pas tes commandements.
  '18':
  - type: text
    content: Ouvre mes yeux, pour que je contemple
  - type: text
    content: les merveilles de ta loi!
  '19':
  - type: text
    content: 'Je suis un étranger sur la terre:'
  - type: text
    content: ne me cache pas tes commandements!
  '2':
  - type: text
    content: Heureux ceux qui gardent ses instructions,
  - type: text
    content: qui le cherchent de tout leur cœur,
  '20':
  - type: text
    content: Mon âme est rongée par le désir
  - type: text
    content: qui la porte constamment vers tes lois.
  '21':
  - type: text
    content: Tu menaces les hommes arrogants, ces maudits
  - type: text
    content: qui s'égarent loin de tes commandements.
  '22':
  - type: text
    content: Décharge-moi du déshonneur et du mépris,
  - type: text
    content: car j'observe tes instructions.
  '23':
  - type: text
    content: Des princes ont beau siéger pour parler contre moi,
  - type: text
    content: ton serviteur médite tes prescriptions.
  '24':
  - type: text
    content: Tes instructions font mon plaisir,
  - type: text
    content: ce sont mes conseillères.
  '25':
  - type: text
    content: Je suis affalé dans la poussière.
  - type: text
    content: Rends-moi la vie conformément à ta parole!
  '26':
  - type: text
    content: J'expose mes voies, et tu me réponds;
  - type: text
    content: enseigne-moi tes prescriptions!
  '27':
  - type: text
    content: Fais-moi comprendre la voie de tes décrets,
  - type: text
    content: et je méditerai sur tes merveilles!
  '28':
  - type: text
    content: 'Mon âme est accablée de tristesse:'
  - type: text
    content: relève-moi conformément à ta parole!
  '29':
  - type: text
    content: Eloigne-moi de la voie du mensonge
  - type: text
    content: et accorde-moi la grâce de suivre ta loi!
  '3':
  - type: text
    content: qui ne commettent aucune injustice
  - type: text
    content: et qui marchent dans ses voies!
  '30':
  - type: text
    content: Je choisis la voie de la fidélité,
  - type: text
    content: je place tes lois sous mes yeux.
  '31':
  - type: text
    content: Je m'attache à tes instructions,
  - type: text
    content: Eternel, ne me couvre pas de honte!
  '32':
  - type: text
    content: Je cours sur la voie de tes commandements,
  - type: text
    content: car tu épanouis mon cœur.
  '33':
  - type: text
    content: Enseigne-moi, Eternel, la voie de tes prescriptions,
  - type: text
    content: pour que je la suive jusqu'à la fin!
  '34':
  - type: text
    content: Donne-moi l'intelligence, pour que je garde ta loi
  - type: text
    content: et que je la respecte de tout mon cœur!
  '35':
  - type: text
    content: Conduis-moi dans le sentier de tes commandements,
  - type: text
    content: car je l'aime.
  '36':
  - type: text
    content: Pousse mon cœur vers tes instructions,
  - type: text
    content: et non vers le profit!
  '37':
  - type: text
    content: Détourne mes yeux de ce qui est sans valeur,
  - type: text
    content: fais-moi vivre dans ta voie!
  '38':
  - type: text
    content: Accomplis envers ton serviteur
  - type: text
    content: ce que tu as promis à ceux qui te craignent!
  '39':
  - type: text
    content: Eloigne de moi l'insulte que je redoute,
  - type: text
    content: car tes sentences sont pleines de bonté.
  '4':
  - type: text
    content: Tu as promulgué tes décrets
  - type: text
    content: pour qu'on les respecte avec soin.
  '40':
  - type: text
    content: 'Je désire vraiment appliquer tes décrets:'
  - type: text
    content: fais-moi vivre dans ta justice!
  '41':
  - type: text
    content: Eternel, que ta bonté vienne sur moi,
  - type: text
    content: avec ton salut, conformément à ta promesse!
  '42':
  - type: text
    content: Alors je pourrai répondre à celui qui m'insulte,
  - type: text
    content: car je me confie en ta parole.
  '43':
  - type: text
    content: N'arrache pas la parole de vérité de ma bouche,
  - type: text
    content: car j'espère en tes jugements.
  '44':
  - type: text
    content: Je respecterai constamment ta loi,
  - type: text
    content: pour toujours et à perpétuité.
  '45':
  - type: text
    content: Je marcherai en toute liberté,
  - type: text
    content: car je recherche tes décrets.
  '46':
  - type: text
    content: Je parlerai de tes instructions devant des rois
  - type: text
    content: et je ne rougirai pas de honte.
  '47':
  - type: text
    content: Je fais mes délices de tes commandements,
  - type: text
    content: je les aime.
  '48':
  - type: text
    content: Je tends les mains vers tes commandements que j'aime,
  - type: text
    content: et je veux méditer tes prescriptions.
  '49':
  - type: text
    content: Souviens-toi de ta promesse à ton serviteur,
  - type: text
    content: puisque tu m'as donné l'espérance!
  '5':
  - type: text
    content: Que mes actions soient bien réglées,
  - type: text
    content: afin que je respecte tes prescriptions!
  '50':
  - type: text
    content: C'est ma consolation dans ma misère,
  - type: text
    content: car ta promesse me rend la vie.
  '51':
  - type: text
    content: Des hommes arrogants m'accablent de moqueries,
  - type: text
    content: mais je ne m'écarte pas de ta loi.
  '52':
  - type: text
    content: Je me souviens de tes sentences passées, Eternel,
  - type: text
    content: et c'est ce qui me console.
  '53':
  - type: text
    content: Une colère ardente s'empare de moi à cause des méchants
  - type: text
    content: qui abandonnent ta loi.
  '54':
  - type: text
    content: Tes prescriptions sont le sujet de mes chants
  - type: text
    content: dans la maison où je suis étranger.
  '55':
  - type: text
    content: La nuit je me rappelle ton nom, Eternel,
  - type: text
    content: et je respecte ta loi.
  '56':
  - type: text
    content: La part qui me revient,
  - type: text
    content: c'est de garder tes décrets.
  '57':
  - type: text
    content: Mon lot, Eternel, je le dis,
  - type: text
    content: c'est d'obéir à tes paroles.
  '58':
  - type: text
    content: 'Je t''implore de tout mon cœur:'
  - type: text
    content: fais-moi grâce, conformément à ta promesse!
  '59':
  - type: text
    content: Je réfléchis à mes voies
  - type: text
    content: et je conduis mes pas vers tes instructions.
  '6':
  - type: text
    content: Alors je ne rougirai pas de honte
  - type: text
    content: devant tous tes commandements.
  '60':
  - type: text
    content: Je fais preuve d'empressement,
  - type: text
    content: je n'attends pas pour obéir à tes commandements.
  '61':
  - type: text
    content: Les pièges des méchants m'entourent,
  - type: text
    content: mais je n'oublie pas ta loi.
  '62':
  - type: text
    content: Au milieu de la nuit je me lève pour te louer
  - type: text
    content: à cause de tes justes sentences.
  '63':
  - type: text
    content: Je suis l'ami de tous ceux qui te craignent
  - type: text
    content: et qui se conforment à tes décrets.
  '64':
  - type: text
    content: Eternel, la terre est pleine de ta bonté.
  - type: text
    content: Enseigne-moi tes prescriptions!
  '65':
  - type: text
    content: Tu as fait du bien à ton serviteur, Eternel,
  - type: text
    content: conformément à ta parole.
  '66':
  - type: text
    content: Enseigne-moi le bon sens et la connaissance,
  - type: text
    content: car je crois à tes commandements.
  '67':
  - type: text
    content: Avant d'être humilié, je m'égarais;
  - type: text
    content: maintenant je me conforme à ta parole.
  '68':
  - type: text
    content: Tu es bon et bienfaisant,
  - type: text
    content: enseigne-moi tes prescriptions!
  '69':
  - type: text
    content: Des hommes arrogants imaginent contre moi des mensonges;
  - type: text
    content: moi, de tout mon cœur je garde tes décrets.
  '7':
  - type: text
    content: Je te louerai avec un cœur droit
  - type: text
    content: en étudiant tes justes sentences.
  '70':
  - type: text
    content: Leur cœur est aussi insensible que la graisse,
  - type: text
    content: mais moi, je fais mes délices de ta loi.
  '71':
  - type: text
    content: Il est bon pour moi d'être humilié
  - type: text
    content: afin d'apprendre tes prescriptions.
  '72':
  - type: text
    content: Mieux vaut pour moi la loi de ta bouche
  - type: text
    content: que 1000 objets en or et en argent.
  '73':
  - type: text
    content: Tes mains m'ont créé, elles m'ont fortifié;
  - type: text
    content: donne-moi l'intelligence pour que j'apprenne tes commandements!
  '74':
  - type: text
    content: Ceux qui te craignent me voient et se réjouissent,
  - type: text
    content: car j'espère en tes promesses.
  '75':
  - type: text
    content: Je sais, Eternel, que tes sentences sont justes;
  - type: text
    content: c'est par fidélité que tu m'as humilié.
  '76':
  - type: text
    content: Que ta bonté soit ma consolation,
  - type: text
    content: comme tu l'as promis à ton serviteur.
  '77':
  - type: text
    content: Que tes compassions viennent sur moi pour que je vive,
  - type: text
    content: car ta loi fait mon plaisir.
  '78':
  - type: text
    content: Qu'ils soient couverts de honte, les hommes arrogants qui me maltraitent sans raison!
  - type: text
    content: Moi, je médite sur tes décrets.
  '79':
  - type: text
    content: Qu'ils reviennent vers moi, ceux qui te craignent
  - type: text
    content: et qui connaissent tes instructions!
  '8':
  - type: text
    content: 'Je veux respecter tes prescriptions:'
  - type: text
    content: ne m'abandonne pas totalement!
  '80':
  - type: text
    content: Que mon cœur soit intègre pour suivre tes prescriptions,
  - type: text
    content: afin que je ne sois pas couvert de honte!
  '81':
  - type: text
    content: Mon âme languit après ton salut;
  - type: text
    content: j'espère en ta promesse.
  '82':
  - type: text
    content: Mes yeux se fatiguent à attendre ce que tu as promis;
  - type: text
    content: 'je demande: «Quand me consoleras-tu?»'
  '83':
  - type: text
    content: Je suis racorni comme une outre dans la fumée,
  - type: text
    content: mais je n'oublie pas tes prescriptions.
  '84':
  - type: text
    content: Quelle est la durée de la vie de ton serviteur?
  - type: text
    content: Quand jugeras-tu ceux qui me persécutent?
  '85':
  - type: text
    content: Des hommes arrogants creusent des fosses devant moi,
  - type: text
    content: ils ne se conforment pas à ta loi.
  '86':
  - type: text
    content: Tous tes commandements ne sont que fidélité.
  - type: text
    content: 'On me persécute sans raison: secours-moi!'
  '87':
  - type: text
    content: Ils ont failli me terrasser, mais moi,
  - type: text
    content: je n'abandonne pas tes décrets.
  '88':
  - type: text
    content: Rends-moi la vie conformément à ta bonté,
  - type: text
    content: afin que je respecte les instructions de ta bouche!
  '89':
  - type: text
    content: Ta parole, Eternel,
  - type: text
    content: est pour toujours établie dans le ciel.
  '9':
  - type: text
    content: Comment le jeune homme rendra-t-il pur son sentier?
  - type: text
    content: En se conformant à ta parole.
  '90':
  - type: text
    content: Ta fidélité dure de génération en génération;
  - type: text
    content: tu as fondé la terre, et elle subsiste.
  '91':
  - type: text
    content: C'est d'après tes lois que tout subsiste aujourd'hui,
  - type: text
    content: car tout l'univers est à ton service.
  '92':
  - type: text
    content: Si ta loi n'avait pas fait mon plaisir,
  - type: text
    content: je serais mort dans ma misère.
  '93':
  - type: text
    content: Je n'oublierai jamais tes décrets,
  - type: text
    content: car c'est par eux que tu me fais vivre.
  '94':
  - type: text
    content: 'Je t''appartiens: sauve-moi,'
  - type: text
    content: car je recherche tes décrets.
  '95':
  - type: text
    content: Des méchants espèrent me faire mourir,
  - type: text
    content: mais je suis attentif à tes instructions.
  '96':
  - type: text
    content: Je vois un terme à tout ce qui est parfait,
  - type: text
    content: mais tes commandements sont sans limite.
  '97':
  - type: text
    content: Combien j'aime ta loi!
  - type: text
    content: Je la médite toute la journée.
  '98':
  - type: text
    content: Tes commandements me rendent plus sage que mes ennemis,
  - type: text
    content: car je les ai toujours avec moi.
  '99':
  - type: text
    content: Je suis plus perspicace que tous mes maîtres,
  - type: text
    content: car je médite tes instructions.
