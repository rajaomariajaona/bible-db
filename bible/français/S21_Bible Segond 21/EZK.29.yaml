document_id: EZK.29,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sur l'Egypte et le pharaon
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La dixième année, le douzième jour du dixième mois, la parole de l''Eternel m''a été adressée: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'je m''en prends à toi, à toi et à ton Nil. Je ferai de l''Egypte un endroit ruiné, dévasté et sec, de Migdol à Syène et jusqu''à la frontière de l''Ethiopie. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le pied des hommes n''y passera plus, ni celui des animaux, et il restera 40 ans sans être habité. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je ferai de l'Egypte un sujet de consternation au milieu des pays dévastés, et ses villes seront un sujet de consternation au milieu des villes en ruine, et cela pendant 40 ans. J'éparpillerai les Egyptiens parmi les nations, je les disperserai dans divers pays.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Voici ce que dit le Seigneur, l''Eternel: Au bout de 40 ans, je rassemblerai les Egyptiens des peuples chez lesquels ils auront été éparpillés. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ramènerai les déportés des Egyptiens, je les ramènerai dans le pays de Pathros, dans leur pays d''origine, et là ils formeront un royaume modeste. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce sera le plus modeste des royaumes et il ne s''élèvera plus au-dessus des nations. Je les affaiblirai afin qu''ils ne dominent pas sur les nations. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La communauté d'Israël ne sera plus tentée de faire confiance à ce royaume, mais il lui rappellera la faute qu'elle a commise en se tournant vers lui. Ils reconnaîtront alors que je suis le Seigneur, l'Eternel.»
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La vingt-septième année, le premier jour du premier mois, la parole de l''Eternel m''a été adressée: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Fils de l''homme, Nebucadnetsar, le roi de Babylone, a contraint son armée à un effort pénible contre Tyr: toutes les têtes sont chauves, toutes les épaules sont écorchées. Cependant, il n''a retiré de Tyr aucun salaire – ni lui, ni son armée – pour l''effort déployé contre elle.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»C''est pourquoi, voici ce que dit le Seigneur, l''Eternel: Je vais donner l''Egypte à Nebucadnetsar, roi de Babylone. Il en emportera les richesses, il y prendra un butin et il la pillera. Cela servira de salaire pour son armée. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Fils de l''homme, tourne ton visage vers le pharaon, le roi d''Egypte, et prophétise contre lui et contre toute l''Egypte! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En compensation de l''effort fourni contre Tyr, je lui donne l''Egypte. En effet, ils ont travaillé pour moi, déclare le Seigneur, l''Eternel. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce jour-là, je donnerai de la force à la communauté d'Israël et je t'ouvrirai la bouche au milieu d'eux. Ils reconnaîtront alors que je suis l'Eternel.»
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parle! Tu annonceras: Voici ce que dit le Seigneur, l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t'en veux, pharaon, roi d'Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: crocodile monstrueux couché au milieu du Nil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'qui dis: ‘Mon Nil est à moi, c''est moi qui l''ai fait!’'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Je mettrai un crochet à tes mâchoires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'attacherai les poissons de ton Nil à tes écailles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je te retirerai du milieu de ton Nil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec tous les poissons de ton Nil attachés à tes écailles.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te jetterai dans le désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi et tous les poissons de ton Nil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu tomberas à la surface des champs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans être relevé ni ramassé.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te donnerai en guise de nourriture
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux bêtes de la terre et aux oiseaux du ciel.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les habitants de l'Egypte reconnaîtront alors que je suis l'Eternel.
  - type: usfm
    marker: p
    children:
    - type: text
      text: »C'est parce qu'ils ont été un soutien aussi néfaste que celui d'un roseau pour la communauté d'Israël.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsque les Israélites t'ont pris dans la main, tu t'es cassé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu leur as déchiré toute l'épaule.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsqu'ils se sont appuyés sur toi, tu t'es brisé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu leur as paralysé les hanches.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»C''est pourquoi, voici ce que dit le Seigneur, l''Eternel: Je vais faire venir l''épée contre toi et j''éliminerai de chez toi hommes et bêtes. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Egypte deviendra un endroit dévasté et ruiné. Ils reconnaîtront alors que je suis l''Eternel. Puisque le pharaon a dit: ‘Le Nil est à moi, c''est moi qui l''ai fait’, '
