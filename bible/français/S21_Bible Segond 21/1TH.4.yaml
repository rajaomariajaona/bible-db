document_id: 1TH.4,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Appel à la sainteté
  - type: text
    content: 'Maintenant donc, frères et sœurs, vous avez appris de nous comment vous devez vous conduire et plaire à Dieu, [et c''est ce que vous faites]; de même nous vous le demandons et nous vous y encourageons dans le Seigneur Jésus: progressez encore. '
  '10':
  - type: text
    content: 'et c''est aussi ce que vous faites envers tous les frères et sœurs dans la Macédoine entière. Mais nous vous encourageons, frères et sœurs, à progresser encore, '
  '11':
  - type: text
    content: 'à vous efforcer de vivre en paix, à vous occuper de vos propres affaires et à travailler de vos mains, comme nous vous l''avons recommandé. '
  '12':
  - type: text
    content: Ainsi votre conduite sera honorable aux yeux des gens de l'extérieur et vous ne serez dépendants de personne.
  - type: heading
    content: Résurrection des croyants et retour du Seigneur
  '13':
  - type: text
    content: 'Nous ne voulons pas, frères et sœurs, que vous soyez dans l''ignorance au sujet de ceux qui sont morts, afin que vous ne soyez pas dans la tristesse comme les autres, qui n''ont pas d''espérance. '
  '14':
  - type: text
    content: 'En effet, si nous croyons que Jésus est mort et qu''il est ressuscité, nous croyons aussi que Dieu ramènera par Jésus et avec lui ceux qui sont morts. '
  '15':
  - type: text
    content: 'Voici ce que nous vous déclarons d''après la parole du Seigneur: nous les vivants, restés pour le retour du Seigneur, nous ne devancerons pas ceux qui sont morts. '
  '16':
  - type: text
    content: 'En effet, le Seigneur lui-même, à un signal donné, à la voix d''un archange et au son de la trompette de Dieu, descendra du ciel et ceux qui sont morts en Christ ressusciteront d''abord. '
  '17':
  - type: text
    content: 'Ensuite, nous qui serons encore en vie, nous serons tous ensemble enlevés avec eux sur des nuées à la rencontre du Seigneur dans les airs, et ainsi nous serons toujours avec le Seigneur. '
  '18':
  - type: text
    content: Encouragez-vous donc les uns les autres par ces paroles.
  '2':
  - type: text
    content: 'Vous savez, en effet, quelles instructions nous vous avons données de la part du Seigneur Jésus. '
  '3':
  - type: text
    content: 'Ce que Dieu veut, c''est votre progression dans la sainteté: c''est que vous vous absteniez de l''immoralité sexuelle, '
  '4':
  - type: text
    content: 'c''est que chacun de vous sache garder son corps dans la consécration et la dignité, '
  '5':
  - type: text
    content: 'sans le livrer à la passion du désir comme les membres des autres peuples qui ne connaissent pas Dieu; '
  '6':
  - type: text
    content: 'c''est que personne dans ce domaine ne fasse de tort à son frère ou ne porte atteinte à ses droits, parce que le Seigneur fait justice de tous ces actes, comme nous vous l''avons déjà dit et attesté. '
  '7':
  - type: text
    content: 'En effet, Dieu ne nous a pas appelés à l''impureté, mais à la consécration. '
  '8':
  - type: text
    content: Celui donc qui rejette ces instructions ne rejette pas un homme, mais Dieu, qui vous a aussi donné son Saint-Esprit.
  '9':
  - type: text
    content: 'Vous n''avez pas besoin qu''on vous écrive au sujet de l''amour fraternel, car vous avez vous-mêmes appris de Dieu à vous aimer les uns les autres, '
