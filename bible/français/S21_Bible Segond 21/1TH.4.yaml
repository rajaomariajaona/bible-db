document_id: 1TH.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Appel à la sainteté
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Maintenant donc, frères et sœurs, vous avez appris de nous comment vous devez vous conduire et plaire à Dieu, [et c''est ce que vous faites]; de même nous vous le demandons et nous vous y encourageons dans le Seigneur Jésus: progressez encore. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Vous savez, en effet, quelles instructions nous vous avons données de la part du Seigneur Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ce que Dieu veut, c''est votre progression dans la sainteté: c''est que vous vous absteniez de l''immoralité sexuelle, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'c''est que chacun de vous sache garder son corps dans la consécration et la dignité, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'sans le livrer à la passion du désir comme les membres des autres peuples qui ne connaissent pas Dieu; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'c''est que personne dans ce domaine ne fasse de tort à son frère ou ne porte atteinte à ses droits, parce que le Seigneur fait justice de tous ces actes, comme nous vous l''avons déjà dit et attesté. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'En effet, Dieu ne nous a pas appelés à l''impureté, mais à la consécration. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Celui donc qui rejette ces instructions ne rejette pas un homme, mais Dieu, qui vous a aussi donné son Saint-Esprit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Vous n''avez pas besoin qu''on vous écrive au sujet de l''amour fraternel, car vous avez vous-mêmes appris de Dieu à vous aimer les uns les autres, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'et c''est aussi ce que vous faites envers tous les frères et sœurs dans la Macédoine entière. Mais nous vous encourageons, frères et sœurs, à progresser encore, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'à vous efforcer de vivre en paix, à vous occuper de vos propres affaires et à travailler de vos mains, comme nous vous l''avons recommandé. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ainsi votre conduite sera honorable aux yeux des gens de l'extérieur et vous ne serez dépendants de personne.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Résurrection des croyants et retour du Seigneur
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nous ne voulons pas, frères et sœurs, que vous soyez dans l''ignorance au sujet de ceux qui sont morts, afin que vous ne soyez pas dans la tristesse comme les autres, qui n''ont pas d''espérance. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'En effet, si nous croyons que Jésus est mort et qu''il est ressuscité, nous croyons aussi que Dieu ramènera par Jésus et avec lui ceux qui sont morts. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Voici ce que nous vous déclarons d''après la parole du Seigneur: nous les vivants, restés pour le retour du Seigneur, nous ne devancerons pas ceux qui sont morts. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'En effet, le Seigneur lui-même, à un signal donné, à la voix d''un archange et au son de la trompette de Dieu, descendra du ciel et ceux qui sont morts en Christ ressusciteront d''abord. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ensuite, nous qui serons encore en vie, nous serons tous ensemble enlevés avec eux sur des nuées à la rencontre du Seigneur dans les airs, et ainsi nous serons toujours avec le Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Encouragez-vous donc les uns les autres par ces paroles.
