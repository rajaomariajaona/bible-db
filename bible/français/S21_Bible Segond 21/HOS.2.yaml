document_id: HOS.2
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Cependant, les Israélites seront pareils, de par leur nombre, au sable de la mer:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: on ne peut pas le mesurer ni le compter.
- type: usfm
  marker: q1
  children:
  - type: text
    text: '*Au lieu de leur dire: ‘Vous n''êtes pas mon peuple’,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'on leur dira: ‘Fils du Dieu vivant!’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Au lieu… vivant: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 9.26
      metadata:
        usfm: ROM.9.26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' et partiellement en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pierre 2.10
      metadata:
        usfm: 1PE.2.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Les Judéens et les Israélites se rassembleront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se donneront un chef unique et sortiront du pays.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, elle sera grande, la journée de Jizreel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '»Dites à vos frères: ‘Ammi'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ammi: littéralement mon peuple.'
    marker-yv: yv-n
  - type: text
    text: '!’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et à vos sœurs: ‘Ruchama'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ruchama: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: littéralement celle dont on a compassion.
    marker-yv: yv-n
  - type: text
    text: '!’'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Plaidez, plaidez contre votre mère, car elle n'est pas ma femme
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je ne suis pas son mari.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu'elle retire de son visage ses prostitutions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et d'entre ses seins ses adultères!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Sinon, je la déshabillerai pour qu'elle soit toute nue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je la rendrai pareille au jour de sa naissance;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je la transformerai en désert, je la changerai en une terre aride
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je la ferai mourir de soif.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: »Je n'aurai pas compassion de ses enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ce sont des enfants de prostitution.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Leur mère s'est prostituée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celle qui les a conçus s'est déshonorée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'En effet, elle a dit: ‘Je veux suivre mes amants,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui me donnent mon pain et mon eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ma laine et mon lin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon huile et ma boisson.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Voilà pourquoi je vais fermer son chemin avec des ronces
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et y construire un mur afin qu''elle ne trouve plus ses sentiers:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: elle aura beau poursuivre ses amants, elle ne les rejoindra pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle aura beau les chercher, elle ne les trouvera pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Elle dira alors: ‘Je vais retourner vers mon premier mari,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: car j'étais plus heureuse à ce moment-là que maintenant.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: »Elle n'a pas reconnu
- type: usfm
  marker: q1
  children:
  - type: text
    text: que c'était moi qui lui donnais
- type: usfm
  marker: q1
  children:
  - type: text
    text: le blé, le vin nouveau et l'huile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'on a consacré au service de Baal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Baal: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nom de la principale divinité des Phéniciens et des Cananéens ainsi que des Moabites, devenu le titre de plusieurs divinités du paganisme antique.
    marker-yv: yv-n
  - type: text
    text: ' l''argent et l''or que je lui accordais en abondance.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: C'est pourquoi je reviendrai
- type: usfm
  marker: q1
  children:
  - type: text
    text: prendre mon blé à son époque
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mon vin nouveau dans sa saison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je retirerai ma laine et mon lin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eux qui devaient couvrir sa nudité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Maintenant je découvrirai sa honte aux yeux de ses amants
- type: usfm
  marker: q1
  children:
  - type: text
    text: et personne ne la délivrera de mon pouvoir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je ferai cesser toute sa joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses fêtes, ses célébrations du début du mois, ses sabbats
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toutes ses fêtes solennelles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je dévasterai ses vignes et ses figuiers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'eux dont elle disait:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Voilà le salaire que m'ont donné mes amants!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'en ferai une forêt
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les bêtes sauvages les dévoreront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: »J'interviendrai contre elle à cause des jours
- type: usfm
  marker: q1
  children:
  - type: text
    text: où elle faisait brûler de l'encens en l'honneur des Baals,
- type: usfm
  marker: q1
  children:
  - type: text
    text: où elle se parait de ses anneaux et de ses colliers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: où elle suivait ses amants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que moi, elle m'oubliait, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: »C'est pourquoi, je veux la séduire
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la conduire au désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je parlerai à son cœur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Là, je lui donnerai ses vignes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je ferai de la vallée d'Acor
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La vallée d''Acor: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Josué 7.24-26
      metadata:
        usfm: JOS.7.24+JOS.7.25+JOS.7.26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' une porte d''espérance;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: là, elle chantera comme à l'époque de sa jeunesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme le jour où elle est sortie d'Egypte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: »Ce jour-là, déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tu m''appelleras: ‘Mon mari’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et tu ne m''appelleras plus: ‘Mon maître'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Maître: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: même mot hébreu que Baal.
    marker-yv: yv-n
  - type: text
    text: '!’'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: »J'enlèverai de sa bouche les noms des Baals,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si bien qu'on ne se souviendra même plus de leur nom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ce jour-là, je conclurai pour eux une alliance
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec les bêtes sauvages, les oiseaux du ciel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les reptiles de la terre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je briserai dans le pays l'arc, l'épée et la guerre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je les ferai reposer en sécurité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: »Je te fiancerai à moi pour toujours.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te fiancerai à moi par la justice, la droiture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la bonté et la compassion,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: je te fiancerai à moi par la fidélité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu connaîtras l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: »Ce jour-là, je répondrai, déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je répondrai au ciel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il répondra à la terre;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: la terre répondra au blé, au vin nouveau et à l'huile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils répondront à Jizreel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '*Je planterai Lo-Ruchama pour moi dans le pays'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et j'aurai compassion d'elle.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je dirai à Lo-Ammi: ‘Tu es mon peuple!’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je planterai… peuple: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 9.25
      metadata:
        usfm: ROM.9.25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' et partiellement en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pierre 2.10
      metadata:
        usfm: 1PE.2.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et il répondra: ‘Mon Dieu!’»'
