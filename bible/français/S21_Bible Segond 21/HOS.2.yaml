document_id: HOS.2,152
type_code: fra
verses:
  '1':
  - type: text
    content: '»Cependant, les Israélites seront pareils, de par leur nombre, au sable de la mer:'
  - type: text
    content: on ne peut pas le mesurer ni le compter.
  - type: text
    content: '*Au lieu de leur dire: ‘Vous n''êtes pas mon peuple’,'
  - type: text
    content: 'on leur dira: ‘Fils du Dieu vivant!’'
  - type: note
    content: 'Au lieu… vivant: cité en Romains 9.26 et partiellement en 1 Pierre 2.10.'
  '10':
  - type: text
    content: »Elle n'a pas reconnu
  - type: text
    content: que c'était moi qui lui donnais
  - type: text
    content: le blé, le vin nouveau et l'huile,
  - type: text
    content: et l'on a consacré au service de Baal
  - type: note
    content: 'Baal: nom de la principale divinité des Phéniciens et des Cananéens ainsi que des Moabites, devenu le titre de plusieurs divinités du paganisme antique.'
  - type: text
    content: ' l''argent et l''or que je lui accordais en abondance.'
  '11':
  - type: text
    content: C'est pourquoi je reviendrai
  - type: text
    content: prendre mon blé à son époque
  - type: text
    content: et mon vin nouveau dans sa saison,
  - type: text
    content: et je retirerai ma laine et mon lin,
  - type: text
    content: eux qui devaient couvrir sa nudité.
  '12':
  - type: text
    content: Maintenant je découvrirai sa honte aux yeux de ses amants
  - type: text
    content: et personne ne la délivrera de mon pouvoir.
  '13':
  - type: text
    content: Je ferai cesser toute sa joie,
  - type: text
    content: ses fêtes, ses célébrations du début du mois, ses sabbats
  - type: text
    content: et toutes ses fêtes solennelles.
  '14':
  - type: text
    content: Je dévasterai ses vignes et ses figuiers,
  - type: text
    content: 'eux dont elle disait:'
  - type: text
    content: ‘Voilà le salaire que m'ont donné mes amants!’
  - type: text
    content: J'en ferai une forêt
  - type: text
    content: et les bêtes sauvages les dévoreront.
  '15':
  - type: text
    content: »J'interviendrai contre elle à cause des jours
  - type: text
    content: où elle faisait brûler de l'encens en l'honneur des Baals,
  - type: text
    content: où elle se parait de ses anneaux et de ses colliers,
  - type: text
    content: où elle suivait ses amants,
  - type: text
    content: tandis que moi, elle m'oubliait, déclare l'Eternel.
  '16':
  - type: text
    content: »C'est pourquoi, je veux la séduire
  - type: text
    content: et la conduire au désert,
  - type: text
    content: et je parlerai à son cœur.
  '17':
  - type: text
    content: Là, je lui donnerai ses vignes
  - type: text
    content: et je ferai de la vallée d'Acor
  - type: note
    content: 'La vallée d''Acor: voir Josué 7.24-26.'
  - type: text
    content: ' une porte d''espérance;'
  - type: text
    content: là, elle chantera comme à l'époque de sa jeunesse,
  - type: text
    content: comme le jour où elle est sortie d'Egypte.
  '18':
  - type: text
    content: »Ce jour-là, déclare l'Eternel,
  - type: text
    content: 'tu m''appelleras: ‘Mon mari’'
  - type: text
    content: 'et tu ne m''appelleras plus: ‘Mon maître'
  - type: note
    content: 'Maître: même mot hébreu que Baal.'
  - type: text
    content: '!’'
  '19':
  - type: text
    content: »J'enlèverai de sa bouche les noms des Baals,
  - type: text
    content: si bien qu'on ne se souviendra même plus de leur nom.
  '2':
  - type: text
    content: Les Judéens et les Israélites se rassembleront,
  - type: text
    content: ils se donneront un chef unique et sortiront du pays.
  - type: text
    content: En effet, elle sera grande, la journée de Jizreel.
  '20':
  - type: text
    content: Ce jour-là, je conclurai pour eux une alliance
  - type: text
    content: avec les bêtes sauvages, les oiseaux du ciel
  - type: text
    content: et les reptiles de la terre;
  - type: text
    content: je briserai dans le pays l'arc, l'épée et la guerre,
  - type: text
    content: et je les ferai reposer en sécurité.
  '21':
  - type: text
    content: »Je te fiancerai à moi pour toujours.
  - type: text
    content: Je te fiancerai à moi par la justice, la droiture,
  - type: text
    content: la bonté et la compassion,
  '22':
  - type: text
    content: je te fiancerai à moi par la fidélité,
  - type: text
    content: et tu connaîtras l'Eternel.
  '23':
  - type: text
    content: »Ce jour-là, je répondrai, déclare l'Eternel,
  - type: text
    content: je répondrai au ciel
  - type: text
    content: et il répondra à la terre;
  '24':
  - type: text
    content: la terre répondra au blé, au vin nouveau et à l'huile,
  - type: text
    content: et ils répondront à Jizreel.
  '25':
  - type: text
    content: '*Je planterai Lo-Ruchama pour moi dans le pays'
  - type: text
    content: et j'aurai compassion d'elle.
  - type: text
    content: 'Je dirai à Lo-Ammi: ‘Tu es mon peuple!’'
  - type: note
    content: 'Je planterai… peuple: cité en Romains 9.25 et partiellement en 1 Pierre 2.10.'
  - type: text
    content: 'et il répondra: ‘Mon Dieu!’»'
  '3':
  - type: text
    content: '»Dites à vos frères: ‘Ammi'
  - type: note
    content: 'Ammi: littéralement mon peuple.'
  - type: text
    content: '!’'
  - type: text
    content: 'et à vos sœurs: ‘Ruchama'
  - type: note
    content: 'Ruchama: littéralement celle dont on a compassion.'
  - type: text
    content: '!’'
  '4':
  - type: text
    content: Plaidez, plaidez contre votre mère, car elle n'est pas ma femme
  - type: text
    content: et je ne suis pas son mari.
  - type: text
    content: Qu'elle retire de son visage ses prostitutions,
  - type: text
    content: et d'entre ses seins ses adultères!
  '5':
  - type: text
    content: Sinon, je la déshabillerai pour qu'elle soit toute nue,
  - type: text
    content: je la rendrai pareille au jour de sa naissance;
  - type: text
    content: je la transformerai en désert, je la changerai en une terre aride
  - type: text
    content: et je la ferai mourir de soif.
  '6':
  - type: text
    content: »Je n'aurai pas compassion de ses enfants,
  - type: text
    content: car ce sont des enfants de prostitution.
  '7':
  - type: text
    content: Leur mère s'est prostituée,
  - type: text
    content: celle qui les a conçus s'est déshonorée.
  - type: text
    content: 'En effet, elle a dit: ‘Je veux suivre mes amants,'
  - type: text
    content: ceux qui me donnent mon pain et mon eau,
  - type: text
    content: ma laine et mon lin,
  - type: text
    content: mon huile et ma boisson.’
  '8':
  - type: text
    content: Voilà pourquoi je vais fermer son chemin avec des ronces
  - type: text
    content: 'et y construire un mur afin qu''elle ne trouve plus ses sentiers:'
  '9':
  - type: text
    content: elle aura beau poursuivre ses amants, elle ne les rejoindra pas;
  - type: text
    content: elle aura beau les chercher, elle ne les trouvera pas.
  - type: text
    content: 'Elle dira alors: ‘Je vais retourner vers mon premier mari,'
  - type: text
    content: car j'étais plus heureuse à ce moment-là que maintenant.’
