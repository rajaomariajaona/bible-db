document_id: PSA.58
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Condamnation des juges injustes
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur, sur la mélodie de «Ne détruis pas». Hymne de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Est-ce donc en vous taisant que vous rendez la justice?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est-ce ainsi que vous jugez les hommes avec droiture?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Vous commettez volontairement des crimes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans tout le pays, vous propagez la violence de vos mains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les méchants sont pervertis dès le ventre de leur mère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les menteurs s'égarent dès leur naissance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils ont un venin pareil à celui du serpent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sont sourds comme la vipère qui ferme son oreille
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: pour ne pas entendre la voix des charmeurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: du plus habile des magiciens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: O Dieu, brise-leur les dents!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, arrache les mâchoires de ces lions!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Qu'ils disparaissent comme l'eau qui coule,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'ils ne lancent que des flèches émoussées!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Qu'ils soient pareils à la limace qui fond en avançant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'ils ne voient pas le soleil, comme l'enfant mort-né!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Avant que vos marmites ne puissent sentir le feu de broussailles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'elles soient vertes ou sèches, le tourbillon les emportera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le juste sera dans la joie, car il verra la vengeance;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il lavera ses pieds dans le sang des méchants,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'et les hommes diront: «Oui, il y a une récompense pour le juste.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, il y a un Dieu qui exerce la justice sur la terre.»
