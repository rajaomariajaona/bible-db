document_id: PSA.58,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Condamnation des juges injustes
  - type: text
    content: Au chef de chœur, sur la mélodie de «Ne détruis pas». Hymne de David.
  '10':
  - type: text
    content: Avant que vos marmites ne puissent sentir le feu de broussailles,
  - type: text
    content: qu'elles soient vertes ou sèches, le tourbillon les emportera.
  '11':
  - type: text
    content: Le juste sera dans la joie, car il verra la vengeance;
  - type: text
    content: il lavera ses pieds dans le sang des méchants,
  '12':
  - type: text
    content: 'et les hommes diront: «Oui, il y a une récompense pour le juste.'
  - type: text
    content: Oui, il y a un Dieu qui exerce la justice sur la terre.»
  '2':
  - type: text
    content: Est-ce donc en vous taisant que vous rendez la justice?
  - type: text
    content: Est-ce ainsi que vous jugez les hommes avec droiture?
  '3':
  - type: text
    content: Vous commettez volontairement des crimes;
  - type: text
    content: dans tout le pays, vous propagez la violence de vos mains.
  '4':
  - type: text
    content: Les méchants sont pervertis dès le ventre de leur mère,
  - type: text
    content: les menteurs s'égarent dès leur naissance.
  '5':
  - type: text
    content: Ils ont un venin pareil à celui du serpent,
  - type: text
    content: ils sont sourds comme la vipère qui ferme son oreille
  '6':
  - type: text
    content: pour ne pas entendre la voix des charmeurs,
  - type: text
    content: du plus habile des magiciens.
  '7':
  - type: text
    content: O Dieu, brise-leur les dents!
  - type: text
    content: Eternel, arrache les mâchoires de ces lions!
  '8':
  - type: text
    content: Qu'ils disparaissent comme l'eau qui coule,
  - type: text
    content: qu'ils ne lancent que des flèches émoussées!
  '9':
  - type: text
    content: Qu'ils soient pareils à la limace qui fond en avançant,
  - type: text
    content: qu'ils ne voient pas le soleil, comme l'enfant mort-né!
