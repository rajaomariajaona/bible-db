document_id: JER.18,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Illustration du potier et du vase
  - type: text
    content: 'Voici la parole adressée à Jérémie par l''Eternel:'
  '10':
  - type: text
    content: mais si cette nation fait ce qui est mal à mes yeux
  - type: text
    content: et ne m'écoute pas,
  - type: text
    content: je renoncerai au bien que j'avais l'intention de lui faire.
  '11':
  - type: text
    content: '»Maintenant, annonce donc aux hommes de Juda et aux habitants de Jérusalem:'
  - type: text
    content: '‘Voici ce que dit l''Eternel:'
  - type: text
    content: Je prépare contre vous un malheur,
  - type: text
    content: je forme un projet contre vous.
  - type: text
    content: Que chacun renonce donc à sa mauvaise conduite!
  - type: text
    content: Corrigez votre conduite et vos agissements!’
  '12':
  - type: text
    content: 'Mais ils disent: ‘Rien à faire!'
  - type: text
    content: Nous suivrons nos pensées,
  - type: text
    content: chacun de nous agira conformément aux penchants de son cœur mauvais.’
  '13':
  - type: text
    content: '»C''est pourquoi, voici ce que dit l''Eternel:'
  - type: text
    content: Interrogez donc les nations!
  - type: text
    content: Qui a déjà entendu de pareilles choses?
  - type: text
    content: La jeune fille d'Israël a commis des horreurs.
  '14':
  - type: text
    content: La neige du Liban abandonne-t-elle le rocher de la campagne?
  - type: text
    content: Ou voit-on l'eau fraîche et courante qui vient de loin arrêter de couler?
  '15':
  - type: text
    content: Pourtant, mon peuple m'a oublié. C'est inutilement qu'il fait brûler de l'encens.
  - type: text
    content: On l'a fait trébucher dans ses voies,
  - type: text
    content: on l'a éloigné des pistes qu'il avait toujours suivies
  - type: text
    content: pour lui faire suivre les sentiers d'une voie non préparée,
  '16':
  - type: text
    content: pour transformer son pays en une terre dévastée
  - type: text
    content: devant laquelle on ne cessera jamais de siffler d'étonnement.
  - type: text
    content: Tous les passants seront consternés et secoueront la tête.
  '17':
  - type: text
    content: Pareil au vent d'est, je les disperserai devant l'ennemi.
  - type: text
    content: Je leur tournerai le dos, le jour de leur ruine.»
  '18':
  - type: text
    content: 'Cependant, ils ont dit: «Venez, préparons un plan contre Jérémie!'
  - type: text
    content: L'enseignement ne manquera pas, puisque nous avons des prêtres,
  - type: text
    content: ni les conseils, puisque nous avons des sages, ni les paroles, puisque nous avons des prophètes.
  - type: text
    content: Venez, tuons-le à coups de paroles
  - type: text
    content: et ne prêtons aucune attention à tout ce qu'il dit!»
  '19':
  - type: text
    content: «Prête attention à moi, Eternel,
  - type: text
    content: et entends ce que disent mes adversaires!
  '2':
  - type: text
    content: «Lève-toi et descends à la maison du potier.
  - type: text
    content: Là, je te ferai entendre mes paroles.»
  '20':
  - type: text
    content: Le mal sera-t-il rendu pour le bien?
  - type: text
    content: En effet, ils m'ont tendu un piège.
  - type: text
    content: Souviens-toi que je me suis tenu devant toi
  - type: text
    content: pour intercéder en leur faveur,
  - type: text
    content: pour détourner ta colère d'eux.
  '21':
  - type: text
    content: C'est pourquoi, livre leurs enfants à la famine,
  - type: text
    content: abandonne-les à la puissance de l'épée!
  - type: text
    content: Que leurs femmes soient privées d'enfants et deviennent veuves,
  - type: text
    content: que leurs maris soient enlevés par la mort,
  - type: text
    content: que leurs jeunes gens soient frappés par l'épée au cours du combat!
  '22':
  - type: text
    content: Qu'on entende des cris sortir de leurs maisons,
  - type: text
    content: quand tu feras soudainement fondre sur eux une bande armée!
  - type: text
    content: En effet, ils ont tendu un piège pour me prendre,
  - type: text
    content: ils ont caché des filets sous mes pieds.
  '23':
  - type: text
    content: Et toi, Eternel, tu connais tous leurs complots pour me faire mourir.
  - type: text
    content: Ne pardonne pas leur faute,
  - type: text
    content: n'efface pas leur péché de devant toi!
  - type: text
    content: Qu'ils soient jetés à terre devant toi!
  - type: text
    content: Agis contre eux lorsque viendra le moment de déverser ta colère!»
  '3':
  - type: text
    content: Je suis descendu à la maison du potier
  - type: text
    content: et j'ai vu qu'il façonnait un objet sur un tour,
  '4':
  - type: text
    content: mais le vase d'argile qu'il façonnait ne donnait rien
  - type: text
    content: dans sa main.
  - type: text
    content: Alors, il a recommencé un autre vase
  - type: text
    content: en le faisant comme il lui plaisait.
  '5':
  - type: text
    content: 'Et voici la parole de l''Eternel qui m''a été adressée:'
  '6':
  - type: text
    content: «Ne puis-je pas agir envers vous comme ce potier, communauté d'Israël?
  - type: text
    content: déclare l'Eternel.
  - type: text
    content: Vous êtes dans ma main
  - type: text
    content: 'comme de l''argile dans la main du potier, communauté d''Israël:'
  '7':
  - type: text
    content: parfois je parle, à propos d'une nation ou d'un royaume,
  - type: text
    content: d'arracher, de démolir et de détruire,
  '8':
  - type: text
    content: mais si la nation dont j'ai parlé renonce à son mauvais comportement,
  - type: text
    content: je renoncerai au mal que j'avais prévu de lui faire;
  '9':
  - type: text
    content: et parfois je parle, à propos d'une nation ou d'un royaume,
  - type: text
    content: de construire et de planter,
