document_id: JER.18,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Illustration du potier et du vase
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici la parole adressée à Jérémie par l''Eternel:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais si cette nation fait ce qui est mal à mes yeux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne m'écoute pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je renoncerai au bien que j'avais l'intention de lui faire.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»Maintenant, annonce donc aux hommes de Juda et aux habitants de Jérusalem:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '‘Voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je prépare contre vous un malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je forme un projet contre vous.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que chacun renonce donc à sa mauvaise conduite!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Corrigez votre conduite et vos agissements!’
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais ils disent: ‘Rien à faire!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous suivrons nos pensées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: chacun de nous agira conformément aux penchants de son cœur mauvais.’
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»C''est pourquoi, voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Interrogez donc les nations!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui a déjà entendu de pareilles choses?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La jeune fille d'Israël a commis des horreurs.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La neige du Liban abandonne-t-elle le rocher de la campagne?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ou voit-on l'eau fraîche et courante qui vient de loin arrêter de couler?
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourtant, mon peuple m'a oublié. C'est inutilement qu'il fait brûler de l'encens.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On l'a fait trébucher dans ses voies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on l'a éloigné des pistes qu'il avait toujours suivies
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour lui faire suivre les sentiers d'une voie non préparée,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour transformer son pays en une terre dévastée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: devant laquelle on ne cessera jamais de siffler d'étonnement.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les passants seront consternés et secoueront la tête.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pareil au vent d'est, je les disperserai devant l'ennemi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je leur tournerai le dos, le jour de leur ruine.»
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Cependant, ils ont dit: «Venez, préparons un plan contre Jérémie!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'enseignement ne manquera pas, puisque nous avons des prêtres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni les conseils, puisque nous avons des sages, ni les paroles, puisque nous avons des prophètes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Venez, tuons-le à coups de paroles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne prêtons aucune attention à tout ce qu'il dit!»
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Prête attention à moi, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et entends ce que disent mes adversaires!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Lève-toi et descends à la maison du potier.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Là, je te ferai entendre mes paroles.»
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le mal sera-t-il rendu pour le bien?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, ils m'ont tendu un piège.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Souviens-toi que je me suis tenu devant toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour intercéder en leur faveur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour détourner ta colère d'eux.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est pourquoi, livre leurs enfants à la famine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: abandonne-les à la puissance de l'épée!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que leurs femmes soient privées d'enfants et deviennent veuves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que leurs maris soient enlevés par la mort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que leurs jeunes gens soient frappés par l'épée au cours du combat!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'on entende des cris sortir de leurs maisons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand tu feras soudainement fondre sur eux une bande armée!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, ils ont tendu un piège pour me prendre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont caché des filets sous mes pieds.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toi, Eternel, tu connais tous leurs complots pour me faire mourir.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne pardonne pas leur faute,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: n'efface pas leur péché de devant toi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'ils soient jetés à terre devant toi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Agis contre eux lorsque viendra le moment de déverser ta colère!»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis descendu à la maison du potier
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j'ai vu qu'il façonnait un objet sur un tour,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le vase d'argile qu'il façonnait ne donnait rien
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans sa main.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors, il a recommencé un autre vase
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en le faisant comme il lui plaisait.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et voici la parole de l''Eternel qui m''a été adressée:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ne puis-je pas agir envers vous comme ce potier, communauté d'Israël?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l'Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous êtes dans ma main
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'comme de l''argile dans la main du potier, communauté d''Israël:'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parfois je parle, à propos d'une nation ou d'un royaume,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d'arracher, de démolir et de détruire,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais si la nation dont j'ai parlé renonce à son mauvais comportement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je renoncerai au mal que j'avais prévu de lui faire;
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et parfois je parle, à propos d'une nation ou d'un royaume,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de construire et de planter,
