document_id: HOS.8,152
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Punition: destruction et exil'
  - type: text
    content: Embouche la trompette!
  - type: text
    content: L'ennemi fond comme un aigle sur la maison de l'Eternel
  - type: text
    content: parce qu'ils ont violé mon alliance
  - type: text
    content: et se sont révoltés contre ma loi.
  '10':
  - type: text
    content: Même s'ils font des cadeaux parmi les nations,
  - type: text
    content: je vais maintenant les rassembler,
  - type: text
    content: et bientôt ils souffriront sous le fardeau du roi des princes.
  '11':
  - type: text
    content: Ephraïm a multiplié les autels pour pécher,
  - type: text
    content: et ces autels l'ont fait tomber dans le péché.
  '12':
  - type: text
    content: Si j'écris pour lui tous les articles de ma loi,
  - type: text
    content: ils sont regardés comme quelque chose d'étranger.
  '13':
  - type: text
    content: Ils sacrifient des victimes qu'ils m'offrent
  - type: text
    content: 'et ils en mangent la viande:'
  - type: text
    content: l'Eternel n'y prend pas plaisir.
  - type: text
    content: Maintenant l'Eternel se souvient de leur faute,
  - type: text
    content: 'et il punira leurs péchés:'
  - type: text
    content: ils retourneront en Egypte.
  '14':
  - type: text
    content: Israël a oublié celui qui l'a fait,
  - type: text
    content: il a construit des palais;
  - type: text
    content: Juda a multiplié les villes fortifiées.
  - type: text
    content: Mais j'enverrai le feu dans leurs villes
  - type: text
    content: et il dévorera leurs palais.
  '2':
  - type: text
    content: 'Ils crieront vers moi:'
  - type: text
    content: «Mon Dieu, nous te connaissons, nous, Israël!»
  '3':
  - type: text
    content: 'Israël a rejeté le bien:'
  - type: text
    content: l'ennemi le poursuivra.
  '4':
  - type: text
    content: Ils ont établi des rois sans mon ordre,
  - type: text
    content: et des chefs sans se référer à moi;
  - type: text
    content: ils ont fait des idoles avec leur argent et leur or,
  - type: text
    content: c'est pourquoi ils seront anéantis.
  '5':
  - type: text
    content: L'Eternel a rejeté ton veau
  - type: note
    content: 'Ton veau: le roi du royaume du nord avait fait fabriquer des veaux en or comme objets de culte.'
  - type: text
    content: ', Samarie!'
  - type: text
    content: Ma colère s'est enflammée contre eux.
  - type: text
    content: Jusqu'à quand refuseront-ils de se purifier?
  '6':
  - type: text
    content: Ce veau vient d'Israël, un ouvrier l'a fabriqué,
  - type: text
    content: et il n'est pas Dieu;
  - type: text
    content: c'est pourquoi le veau de Samarie sera mis en pièces.
  '7':
  - type: text
    content: Puisqu'ils ont semé du vent, ils moissonneront la tempête.
  - type: text
    content: Ils n'auront pas un épi de blé.
  - type: text
    content: Ce qui poussera ne donnera pas de farine,
  - type: text
    content: et s'il y en avait, des étrangers la dévoreraient.
  '8':
  - type: text
    content: Israël est englouti!
  - type: text
    content: Ils sont maintenant parmi les nations
  - type: text
    content: comme un vase indésirable.
  '9':
  - type: text
    content: En effet, ils sont allés en Assyrie
  - type: text
    content: comme un âne sauvage qui se tient à l'écart;
  - type: text
    content: Ephraïm a fait des cadeaux pour avoir des amis.
