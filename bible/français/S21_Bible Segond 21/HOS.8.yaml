document_id: HOS.8,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Punition: destruction et exil'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Embouche la trompette!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'ennemi fond comme un aigle sur la maison de l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu'ils ont violé mon alliance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et se sont révoltés contre ma loi.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Même s'ils font des cadeaux parmi les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je vais maintenant les rassembler,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et bientôt ils souffriront sous le fardeau du roi des princes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ephraïm a multiplié les autels pour pécher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ces autels l'ont fait tomber dans le péché.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Si j'écris pour lui tous les articles de ma loi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont regardés comme quelque chose d'étranger.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ils sacrifient des victimes qu'ils m'offrent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et ils en mangent la viande:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'Eternel n'y prend pas plaisir.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maintenant l'Eternel se souvient de leur faute,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et il punira leurs péchés:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils retourneront en Egypte.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Israël a oublié celui qui l'a fait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a construit des palais;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Juda a multiplié les villes fortifiées.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais j'enverrai le feu dans leurs villes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il dévorera leurs palais.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Ils crieront vers moi:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Mon Dieu, nous te connaissons, nous, Israël!»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Israël a rejeté le bien:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'ennemi le poursuivra.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ils ont établi des rois sans mon ordre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et des chefs sans se référer à moi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont fait des idoles avec leur argent et leur or,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est pourquoi ils seront anéantis.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: L'Eternel a rejeté ton veau
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ton veau: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: le roi du royaume du nord avait fait fabriquer des veaux en or comme objets de culte.
      marker-yv: yv-n
    - type: text
      text: ', Samarie!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma colère s'est enflammée contre eux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu'à quand refuseront-ils de se purifier?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ce veau vient d'Israël, un ouvrier l'a fabriqué,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il n'est pas Dieu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est pourquoi le veau de Samarie sera mis en pièces.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Puisqu'ils ont semé du vent, ils moissonneront la tempête.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils n'auront pas un épi de blé.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce qui poussera ne donnera pas de farine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et s'il y en avait, des étrangers la dévoreraient.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Israël est englouti!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont maintenant parmi les nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme un vase indésirable.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: En effet, ils sont allés en Assyrie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme un âne sauvage qui se tient à l'écart;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraïm a fait des cadeaux pour avoir des amis.
