document_id: DEU.7,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Ordre de détruire les Cananéens et leurs idoles
  - type: text
    content: '»Lorsque l''Eternel, ton Dieu, t''aura fait entrer dans le pays dont tu vas prendre possession et qu''il aura chassé devant toi beaucoup de nations – les Hittites, les Guirgasiens, les Amoréens, les Cananéens, les Phéréziens, les Héviens et les Jébusiens, sept nations plus nombreuses et plus puissantes que toi – '
  '10':
  - type: text
    content: 'En revanche, il rend directement leur dû à ceux qui le détestent et il les fait périr. Il ne tarde pas à agir envers celui qui le déteste, il lui rend directement son dû. '
  '11':
  - type: text
    content: Ainsi, respecte les commandements, les prescriptions et les règles que je te donne aujourd'hui, mets-les en pratique.
  '12':
  - type: text
    content: '»Si vous écoutez ces règles, si vous les respectez et les mettez en pratique, l''Eternel, ton Dieu, gardera envers toi l''alliance et la bonté qu''il a promises avec serment à tes ancêtres. '
  '13':
  - type: text
    content: 'Il t''aimera, il te bénira et te multipliera. Il bénira tes enfants, le produit de ton sol, ton blé, ton vin nouveau et ton huile, les portées de ton gros et de ton petit bétail, dans le pays qu''il a juré à tes ancêtres de te donner. '
  '14':
  - type: text
    content: 'Tu seras béni plus que tous les peuples. Il n''y aura chez toi ni homme ni femme stérile, ni bête stérile parmi les troupeaux. '
  '15':
  - type: text
    content: L'Eternel éloignera de toi toute maladie. Il ne t'enverra aucune des mauvaises maladies d'Egypte que tu connais, mais il en frappera tous tes ennemis.
  '16':
  - type: text
    content: '»Tu supprimeras tous les peuples que l''Eternel, ton Dieu, va te livrer, ton regard sera sans pitié envers eux. Tu ne serviras pas leurs dieux, car ce serait un piège pour toi. '
  '17':
  - type: text
    content: 'Peut-être diras-tu dans ton cœur: ‘Ces nations sont plus nombreuses que moi. Comment pourrais-je les chasser?’ '
  '18':
  - type: text
    content: 'N''aie pas peur d''elles. Souviens-toi de ce que l''Eternel, ton Dieu, a fait au pharaon et à toute l''Egypte. '
  '19':
  - type: text
    content: 'Souviens-toi des grandes épreuves que tes yeux ont vues, des miracles et des prodiges, de sa force et sa puissance lorsqu''il t''a fait sortir d''Egypte. C''est ainsi que l''Eternel, ton Dieu, agira envers tous les peuples que tu redoutes. '
  '2':
  - type: text
    content: 'lorsque l''Eternel, ton Dieu, te les aura livrées et que tu les auras battues, tu les voueras à la destruction. Tu ne concluras pas d''alliance avec elles et tu ne leur feras pas grâce. '
  '20':
  - type: text
    content: 'L''Eternel, ton Dieu, enverra même les frelons contre eux, jusqu''à la disparition des survivants et de ceux qui te seraient cachés. '
  '21':
  - type: text
    content: 'Ne sois pas effrayé à cause d''eux, car l''Eternel, ton Dieu, est au milieu de toi. Il est un Dieu grand et redoutable. '
  '22':
  - type: text
    content: 'L''Eternel, ton Dieu, chassera peu à peu ces nations loin de toi. Tu ne pourras pas les exterminer rapidement, sinon les bêtes des champs deviendraient trop nombreuses, à ton détriment. '
  '23':
  - type: text
    content: 'L''Eternel, ton Dieu, te livrera ces nations et il les mettra complètement en déroute jusqu''à leur destruction. '
  '24':
  - type: text
    content: 'Il livrera leurs rois entre tes mains et tu feras disparaître leur nom de dessous le ciel. Aucun d''eux ne pourra te résister, jusqu''à ce que tu les aies détruits. '
  '25':
  - type: text
    content: 'Vous livrerez aux flammes les sculptures sacrées de leurs dieux. Tu ne convoiteras pas et tu ne prendras pas pour toi l''argent et l''or qui sont sur elles, de peur que ces choses ne deviennent un piège pour toi. En effet, elles sont en horreur à l''Eternel, ton Dieu. '
  '26':
  - type: text
    content: Tu n'introduiras pas d'objet abominable dans ta maison afin de ne pas être, comme cet objet, sous la menace d'une destruction; tu l'auras en horreur, ce sera pour toi une abomination, car c'est un objet voué à la destruction.
  '3':
  - type: text
    content: 'Tu ne contracteras pas de mariage avec ces peuples, tu ne donneras pas tes filles en mariage à leurs fils et tu ne prendras pas leurs filles comme femmes pour tes fils. '
  '4':
  - type: text
    content: 'En effet, ils détourneraient tes fils de moi et ils serviraient d''autres dieux. Alors la colère de l''Eternel s''enflammerait contre vous et il te détruirait bien vite. '
  '5':
  - type: text
    content: 'Voici, au contraire, comment vous agirez envers eux: vous démolirez leurs autels, vous briserez leurs statues, vous abattrez leurs poteaux sacrés et vous livrerez aux flammes leurs sculptures sacrées.'
  '6':
  - type: text
    content: '»Tu es un peuple saint pour l''Eternel, ton Dieu. L''Eternel, ton Dieu, t''a choisi pour que tu sois un peuple qui lui appartienne parmi tous les peuples qui sont à la surface de la terre. '
  '7':
  - type: text
    content: 'Ce n''est pas parce que vous dépassez tous les peuples en nombre que l''Eternel s''est attaché à vous et vous a choisis. En effet, vous êtes le plus petit de tous les peuples. '
  '8':
  - type: text
    content: 'Mais c''est parce que l''Eternel vous aime, parce qu''il a voulu tenir le serment qu''il avait fait à vos ancêtres, qu''il vous a fait sortir par sa main puissante et vous a délivrés de la maison d''esclavage, de la main du pharaon, roi d''Egypte. '
  '9':
  - type: text
    content: 'Sache donc que c''est l''Eternel, ton Dieu, qui est Dieu. Ce Dieu fidèle garde son alliance et sa bonté jusqu''à la millième génération envers ceux qui l''aiment et qui respectent ses commandements. '
