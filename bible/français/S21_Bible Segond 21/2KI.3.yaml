document_id: 2KI.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Règne de Joram sur Israël
  - type: text
    content: Joram, le fils d'Achab, devint roi d'Israël à Samarie la dix-huitième année du règne de Josaphat sur Juda. Il régna 12 ans.
  '10':
  - type: text
    content: 'Alors le roi d''Israël dit: «Quel malheur! L''Eternel a appelé les trois rois que nous sommes pour les livrer entre les mains des Moabites.» '
  '11':
  - type: text
    content: 'Mais Josaphat demanda: «N''y a-t-il ici aucun prophète de l''Eternel, pour que nous puissions le consulter?» L''un des serviteurs du roi d''Israël répondit: «Il y a ici Elisée, le fils de Shaphath, qui était l''assistant d''Elie.» '
  '12':
  - type: text
    content: 'Josaphat dit: «La parole de l''Eternel est avec lui.» Le roi d''Israël, Josaphat et le roi d''Edom descendirent alors vers Elisée.'
  '13':
  - type: text
    content: 'Elisée dit au roi d''Israël: «Que me veux-tu? Va trouver les prophètes de ton père et ceux de ta mère.» Le roi d''Israël lui dit: «Non, car c''est l''Eternel qui a appelé les trois rois que nous sommes pour les livrer entre les mains des Moabites.» '
  '14':
  - type: text
    content: 'Elisée dit: «L''Eternel, le maître de l''univers, dont je suis le serviteur est vivant! Sans l''estime que j''ai pour Josaphat, le roi de Juda, je ne ferais aucune attention à toi et je ne te regarderais même pas. '
  '15':
  - type: text
    content: 'Maintenant, amenez-moi un harpiste.» Tandis que le harpiste jouait, la main de l''Eternel reposa sur Elisée '
  '16':
  - type: text
    content: 'et il annonça: «Voici ce que dit l''Eternel: Creusez des fosses, des fosses dans cette vallée! '
  '17':
  - type: text
    content: 'En effet, voici ce que dit l''Eternel: Vous n''apercevrez pas de vent et vous ne verrez pas de pluie, mais cette vallée se remplira d''eau et vous boirez, vous, vos troupeaux et votre bétail. '
  '18':
  - type: text
    content: 'Mais cela ne suffit pas aux yeux de l''Eternel: il livrera les Moabites entre vos mains. '
  '19':
  - type: text
    content: Vous détruirez toutes leurs villes fortifiées et toutes leurs villes importantes, vous abattrez tous leurs bons arbres, vous boucherez toutes leurs sources d'eau et vous gâterez tous leurs bons champs en y jetant des pierres.»
  '2':
  - type: text
    content: Il fit ce qui est mal aux yeux de l'Eternel, mais pas autant que son père et sa mère. Il démolit le monument de Baal
  - type: note
    content: 'Baal: voir la note sur Juges 2.11.'
  - type: text
    content: ' que son père avait érigé, '
  '20':
  - type: text
    content: Or le matin, au moment de la présentation de l'offrande, l'eau arriva par le chemin d'Edom et le pays fut rempli d'eau.
  '21':
  - type: text
    content: 'Cependant, tous les Moabites avaient appris que les rois montaient pour les combattre. On convoqua donc tous ceux qui étaient aptes au service militaire, même ceux qui avaient dépassé l''âge, et ils se postèrent à la frontière. '
  '22':
  - type: text
    content: 'Ils se levèrent de bon matin et, quand le soleil brilla sur l''eau, les Moabites virent en face d''eux l''eau rouge comme du sang. '
  '23':
  - type: text
    content: 'Ils dirent: «C''est du sang! Les rois se sont certainement combattus à coups d''épée et ils se sont entretués. Maintenant, Moabites, au pillage!» '
  '24':
  - type: text
    content: 'Lorsqu''ils arrivèrent vers le camp d''Israël, les Israélites se levèrent et frappèrent les Moabites, qui prirent la fuite devant eux. Les Israélites pénétrèrent dans le pays de Moab et battirent ce peuple. '
  '25':
  - type: text
    content: Ils démolirent les villes, ils jetèrent chacun des pierres dans tous les bons champs jusqu'à les en remplir, ils bouchèrent toutes les sources d'eau et ils abattirent tous les bons arbres. Il ne resta plus que Kir-Haréseth
  - type: note
    content: 'Kir-Haréseth: capitale du royaume de Moab.'
  - type: text
    content: ' et ses pierres, mais les soldats armés de frondes l''encerclèrent et la battirent. '
  '26':
  - type: text
    content: 'Voyant qu''il avait le dessous dans le combat, le roi de Moab prit avec lui 700 hommes armés d''épées pour se frayer un passage jusqu''au roi d''Edom, mais ils n''y parvinrent pas. '
  '27':
  - type: text
    content: Il prit alors son fils aîné, celui qui devait devenir roi à sa place, et l'offrit en holocauste sur la muraille. Les Israélites éprouvèrent alors un tel sentiment d'indignation qu'ils s'éloignèrent du roi de Moab et retournèrent dans leur pays.
  '3':
  - type: text
    content: mais il s'attacha aux péchés de Jéroboam
  - type: note
    content: 'Jéroboam: voir 1 Rois 12.26-33.'
  - type: text
    content: ', fils de Nebath, qui avait fait pécher Israël et il ne s''en détourna pas.'
  '4':
  - type: text
    content: 'Mésha, le roi de Moab, possédait des troupeaux. Il payait au roi d''Israël un tribut de 100''000 agneaux et de 100''000 béliers avec leur laine. '
  '5':
  - type: text
    content: 'A la mort d''Achab, le roi de Moab se révolta contre le roi d''Israël. '
  '6':
  - type: text
    content: 'Le roi Joram sortit alors de Samarie et passa en revue toute l''armée d''Israël. '
  '7':
  - type: text
    content: 'Puis il se mit en marche et fit dire à Josaphat, le roi de Juda: «Le roi de Moab s''est révolté contre moi. Veux-tu venir avec moi pour combattre Moab?» Josaphat répondit: «Je vais monter avec toi: toi et moi, ton peuple et le mien, tes chevaux et les miens, il n''y aura aucune différence.» '
  '8':
  - type: text
    content: 'Il ajouta: «Par quel chemin allons-nous monter?» Joram dit: «Par le désert d''Edom.»'
  '9':
  - type: text
    content: 'Les rois d''Israël, de Juda et d''Edom partirent. Après sept jours de marche, ils manquèrent d''eau pour l''armée et pour les bêtes de somme qui la suivaient. '
