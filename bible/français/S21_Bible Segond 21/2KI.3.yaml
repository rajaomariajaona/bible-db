document_id: 2KI.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne de Joram sur Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Joram, le fils d'Achab, devint roi d'Israël à Samarie la dix-huitième année du règne de Josaphat sur Juda. Il régna 12 ans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il fit ce qui est mal aux yeux de l'Eternel, mais pas autant que son père et sa mère. Il démolit le monument de Baal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Baal: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir la note sur '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Juges 2.11
      metadata:
        usfm: JDG.2.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' que son père avait érigé, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: mais il s'attacha aux péchés de Jéroboam
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jéroboam: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Rois 12.26-33
      metadata:
        usfm: 1KI.12.26+1KI.12.27+1KI.12.28+1KI.12.29+1KI.12.30+1KI.12.31+1KI.12.32+1KI.12.33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', fils de Nebath, qui avait fait pécher Israël et il ne s''en détourna pas.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mésha, le roi de Moab, possédait des troupeaux. Il payait au roi d''Israël un tribut de 100''000 agneaux et de 100''000 béliers avec leur laine. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'A la mort d''Achab, le roi de Moab se révolta contre le roi d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le roi Joram sortit alors de Samarie et passa en revue toute l''armée d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Puis il se mit en marche et fit dire à Josaphat, le roi de Juda: «Le roi de Moab s''est révolté contre moi. Veux-tu venir avec moi pour combattre Moab?» Josaphat répondit: «Je vais monter avec toi: toi et moi, ton peuple et le mien, tes chevaux et les miens, il n''y aura aucune différence.» '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il ajouta: «Par quel chemin allons-nous monter?» Joram dit: «Par le désert d''Edom.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Les rois d''Israël, de Juda et d''Edom partirent. Après sept jours de marche, ils manquèrent d''eau pour l''armée et pour les bêtes de somme qui la suivaient. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors le roi d''Israël dit: «Quel malheur! L''Eternel a appelé les trois rois que nous sommes pour les livrer entre les mains des Moabites.» '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mais Josaphat demanda: «N''y a-t-il ici aucun prophète de l''Eternel, pour que nous puissions le consulter?» L''un des serviteurs du roi d''Israël répondit: «Il y a ici Elisée, le fils de Shaphath, qui était l''assistant d''Elie.» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Josaphat dit: «La parole de l''Eternel est avec lui.» Le roi d''Israël, Josaphat et le roi d''Edom descendirent alors vers Elisée.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Elisée dit au roi d''Israël: «Que me veux-tu? Va trouver les prophètes de ton père et ceux de ta mère.» Le roi d''Israël lui dit: «Non, car c''est l''Eternel qui a appelé les trois rois que nous sommes pour les livrer entre les mains des Moabites.» '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Elisée dit: «L''Eternel, le maître de l''univers, dont je suis le serviteur est vivant! Sans l''estime que j''ai pour Josaphat, le roi de Juda, je ne ferais aucune attention à toi et je ne te regarderais même pas. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Maintenant, amenez-moi un harpiste.» Tandis que le harpiste jouait, la main de l''Eternel reposa sur Elisée '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'et il annonça: «Voici ce que dit l''Eternel: Creusez des fosses, des fosses dans cette vallée! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'En effet, voici ce que dit l''Eternel: Vous n''apercevrez pas de vent et vous ne verrez pas de pluie, mais cette vallée se remplira d''eau et vous boirez, vous, vos troupeaux et votre bétail. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mais cela ne suffit pas aux yeux de l''Eternel: il livrera les Moabites entre vos mains. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Vous détruirez toutes leurs villes fortifiées et toutes leurs villes importantes, vous abattrez tous leurs bons arbres, vous boucherez toutes leurs sources d'eau et vous gâterez tous leurs bons champs en y jetant des pierres.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Or le matin, au moment de la présentation de l'offrande, l'eau arriva par le chemin d'Edom et le pays fut rempli d'eau.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Cependant, tous les Moabites avaient appris que les rois montaient pour les combattre. On convoqua donc tous ceux qui étaient aptes au service militaire, même ceux qui avaient dépassé l''âge, et ils se postèrent à la frontière. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ils se levèrent de bon matin et, quand le soleil brilla sur l''eau, les Moabites virent en face d''eux l''eau rouge comme du sang. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ils dirent: «C''est du sang! Les rois se sont certainement combattus à coups d''épée et ils se sont entretués. Maintenant, Moabites, au pillage!» '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Lorsqu''ils arrivèrent vers le camp d''Israël, les Israélites se levèrent et frappèrent les Moabites, qui prirent la fuite devant eux. Les Israélites pénétrèrent dans le pays de Moab et battirent ce peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ils démolirent les villes, ils jetèrent chacun des pierres dans tous les bons champs jusqu'à les en remplir, ils bouchèrent toutes les sources d'eau et ils abattirent tous les bons arbres. Il ne resta plus que Kir-Haréseth
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Kir-Haréseth: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: capitale du royaume de Moab.
    marker-yv: yv-n
  - type: text
    text: ' et ses pierres, mais les soldats armés de frondes l''encerclèrent et la battirent. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Voyant qu''il avait le dessous dans le combat, le roi de Moab prit avec lui 700 hommes armés d''épées pour se frayer un passage jusqu''au roi d''Edom, mais ils n''y parvinrent pas. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Il prit alors son fils aîné, celui qui devait devenir roi à sa place, et l'offrit en holocauste sur la muraille. Les Israélites éprouvèrent alors un tel sentiment d'indignation qu'ils s'éloignèrent du roi de Moab et retournèrent dans leur pays.
