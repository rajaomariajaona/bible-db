document_id: ISA.53,152
type_code: fra
verses:
  '1':
  - type: text
    content: '*Qui a cru à notre prédication?'
  - type: text
    content: A qui le bras de l'Eternel a-t-il été révélé?
  - type: note
    content: 'Qui… révélé: cité en Jean 12.38 et partiellement en Romains 10.16.'
  '10':
  - type: text
    content: L'Eternel a voulu le briser par la souffrance.
  - type: text
    content: Si tu fais de sa vie un sacrifice de culpabilité,
  - type: text
    content: il verra une descendance et vivra longtemps,
  - type: text
    content: et la volonté de l'Eternel sera accomplie par son intermédiaire.
  '11':
  - type: text
    content: Après tant de trouble, il verra la lumière et sera satisfait.
  - type: text
    content: Par sa connaissance, mon serviteur juste procurera la justice à beaucoup d'hommes;
  - type: text
    content: c'est lui qui portera leurs fautes.
  '12':
  - type: text
    content: Voilà pourquoi je lui donnerai sa part au milieu de beaucoup
  - type: text
    content: 'et il partagera le butin avec les puissants:'
  - type: text
    content: parce qu'il s'est dépouillé lui-même jusqu'à la mort
  - type: text
    content: et qu'il *a été compté parmi les criminels
  - type: note
    content: 'Aété compté parmi les criminels: cité en Marc 15.28; Luc 22.37 en rapport avec l''arrestation de Jésus.'
  - type: text
    content: ','
  - type: text
    content: parce qu'il a porté le péché de beaucoup d'hommes
  - type: text
    content: et qu'il est intervenu en faveur des coupables.
  '2':
  - type: text
    content: Il a grandi devant lui comme une jeune plante,
  - type: text
    content: comme un rejeton qui sort d'une terre toute sèche.
  - type: text
    content: Il n'avait ni beauté ni splendeur propre à attirer nos regards,
  - type: text
    content: et son aspect n'avait rien pour nous plaire.
  '3':
  - type: text
    content: Méprisé et délaissé par les hommes,
  - type: text
    content: homme de douleur, habitué à la souffrance,
  - type: text
    content: 'il était pareil à celui face auquel on détourne la tête:'
  - type: text
    content: nous l'avons méprisé, nous n'avons fait aucun cas de lui.
  '4':
  - type: text
    content: Pourtant, *ce sont nos souffrances qu'il a portées,
  - type: text
    content: c'est de nos douleurs qu'il s'est chargé
  - type: note
    content: 'Ce sont… chargé: cité en Matthieu 8.17 en rapport avec le ministère de guérison de Jésus.'
  - type: text
    content: .
  - type: text
    content: Et nous, nous l'avons considéré comme puni,
  - type: text
    content: frappé par Dieu et humilié.
  '5':
  - type: text
    content: Mais lui, il était blessé à cause de nos transgressions,
  - type: text
    content: 'brisé à cause de nos fautes:'
  - type: text
    content: la punition qui nous donne la paix est tombée sur lui,
  - type: text
    content: et *c'est par ses blessures que nous sommes guéris.
  '6':
  - type: text
    content: Nous étions tous comme des brebis égarées
  - type: note
    content: 'C''est par… égarées: cité en 1 Pierre 2.24, 25.'
  - type: text
    content: ':'
  - type: text
    content: chacun suivait sa propre voie,
  - type: text
    content: et l'Eternel a fait retomber sur lui nos fautes à tous.
  '7':
  - type: text
    content: Il a été maltraité, il s'est humilié
  - type: text
    content: et n'a pas ouvert la bouche.
  - type: text
    content: '*Pareil à un agneau qu''on mène à l''abattoir,'
  - type: text
    content: à une brebis muette devant ceux qui la tondent,
  - type: text
    content: il n'a pas ouvert la bouche.
  '8':
  - type: text
    content: Il a été enlevé sous la contrainte et sous le jugement,
  - type: text
    content: et dans sa génération qui s'est inquiété de son sort?
  - type: text
    content: Qui s'est soucié de ce qu'il était exclu de la terre
  - type: note
    content: 'Pareil… terre: lu par l''eunuque éthiopien en Actes 8.32-33 d''après la Septante.'
  - type: text
    content: ' des vivants,'
  - type: text
    content: frappé à cause de la révolte de mon peuple?
  '9':
  - type: text
    content: On a mis son tombeau parmi les méchants,
  - type: text
    content: sa tombe avec le riche,
  - type: text
    content: alors qu'il *n'avait pas commis de violence
  - type: text
    content: et qu'il n'y avait pas eu de tromperie dans sa bouche
  - type: note
    content: 'N''avait… bouche: cité en 1 Pierre 2.22.'
  - type: text
    content: .
