document_id: ISA.53
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '*Qui a cru à notre prédication?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A qui le bras de l'Eternel a-t-il été révélé?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '53.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Qui… révélé: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jean 12.38
      metadata:
        usfm: JHN.12.38
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' et partiellement en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 10.16
      metadata:
        usfm: ROM.10.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il a grandi devant lui comme une jeune plante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un rejeton qui sort d'une terre toute sèche.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n'avait ni beauté ni splendeur propre à attirer nos regards,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son aspect n'avait rien pour nous plaire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Méprisé et délaissé par les hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: homme de douleur, habitué à la souffrance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'il était pareil à celui face auquel on détourne la tête:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous l'avons méprisé, nous n'avons fait aucun cas de lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Pourtant, *ce sont nos souffrances qu'il a portées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est de nos douleurs qu'il s'est chargé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '53.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ce sont… chargé: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 8.17
      metadata:
        usfm: MAT.8.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' en rapport avec le ministère de guérison de Jésus.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et nous, nous l'avons considéré comme puni,
- type: usfm
  marker: q1
  children:
  - type: text
    text: frappé par Dieu et humilié.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mais lui, il était blessé à cause de nos transgressions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'brisé à cause de nos fautes:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: la punition qui nous donne la paix est tombée sur lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et *c'est par ses blessures que nous sommes guéris.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Nous étions tous comme des brebis égarées
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '53.5-6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'C''est par… égarées: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pierre 2.24
      metadata:
        usfm: 1PE.2.24
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '25'
      metadata:
        usfm: 1PE.2.25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: chacun suivait sa propre voie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'Eternel a fait retomber sur lui nos fautes à tous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il a été maltraité, il s'est humilié
- type: usfm
  marker: q1
  children:
  - type: text
    text: et n'a pas ouvert la bouche.
- type: usfm
  marker: q1
  children:
  - type: text
    text: '*Pareil à un agneau qu''on mène à l''abattoir,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: à une brebis muette devant ceux qui la tondent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n'a pas ouvert la bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il a été enlevé sous la contrainte et sous le jugement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dans sa génération qui s'est inquiété de son sort?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui s'est soucié de ce qu'il était exclu de la terre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '53.7-8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Pareil… terre: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'lu par l''eunuque éthiopien en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Actes 8.32-33
      metadata:
        usfm: ACT.8.32+ACT.8.33
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' d''après la Septante.'
    marker-yv: yv-n
  - type: text
    text: ' des vivants,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: frappé à cause de la révolte de mon peuple?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: On a mis son tombeau parmi les méchants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa tombe avec le riche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors qu'il *n'avait pas commis de violence
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu'il n'y avait pas eu de tromperie dans sa bouche
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '53.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'N''avait… bouche: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pierre 2.22
      metadata:
        usfm: 1PE.2.22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: L'Eternel a voulu le briser par la souffrance.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si tu fais de sa vie un sacrifice de culpabilité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il verra une descendance et vivra longtemps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la volonté de l'Eternel sera accomplie par son intermédiaire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Après tant de trouble, il verra la lumière et sera satisfait.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par sa connaissance, mon serviteur juste procurera la justice à beaucoup d'hommes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est lui qui portera leurs fautes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Voilà pourquoi je lui donnerai sa part au milieu de beaucoup
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et il partagera le butin avec les puissants:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu'il s'est dépouillé lui-même jusqu'à la mort
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu'il *a été compté parmi les criminels
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '53.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Aété compté parmi les criminels: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Marc 15.28
      metadata:
        usfm: MRK.15.28
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luc 22.37
      metadata:
        usfm: LUK.22.37
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' en rapport avec l''arrestation de Jésus.'
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu'il a porté le péché de beaucoup d'hommes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu'il est intervenu en faveur des coupables.
