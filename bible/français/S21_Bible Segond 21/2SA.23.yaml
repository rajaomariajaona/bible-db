document_id: 2SA.23,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dernières paroles de David
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voici les dernières paroles de David.
  - type: usfm
    marker: d
    children:
    - type: text
      text: «Déclaration de David, fils d'Isaï, déclaration de l'homme haut placé, de celui que le Dieu de Jacob a désigné par onction, du doux musicien d'Israël.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il se leva et frappa les Philistins jusqu'à ce que sa main soit fatiguée et reste collée à son épée. L'Eternel accomplit une grande délivrance ce jour-là. Le peuple ne revint après Eléazar que pour procéder au pillage.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après lui venait Shamma, fils d''Agué, originaire d''Harar. Les Philistins s''étaient rassemblés à Léchi. Il y avait là une parcelle de terre remplie de lentilles et le peuple avait pris la fuite devant les Philistins. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Shamma se posta au milieu du champ et le protégea. Il battit les Philistins et l'Eternel accomplit une grande délivrance.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Trois des trente chefs descendirent vers David à l''époque de la moisson. Il se trouvait dans la grotte d''Adullam et une troupe de Philistins campait dans la vallée des Rephaïm. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David était alors dans la forteresse et il y avait une garnison de Philistins à Bethléhem. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pris d''un soudain désir, David demanda: «Qui me fera boire de l''eau de la citerne qui se trouve à la porte de Bethléhem?» '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors ces trois vaillants hommes pénétrèrent de force dans le camp des Philistins et puisèrent de l''eau dans la citerne qui se trouve à la porte de Bethléhem. Puis ils l''apportèrent et la présentèrent à David, mais il refusa de la boire et il la versa comme une offrande à l''Eternel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit: «Certainement, Eternel, je ne vais pas faire cela! Pourrais-je boire le sang de ces hommes qui sont partis au péril de leur vie?» Et il refusa de la boire. Voilà ce que firent ces trois vaillants hommes. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abishaï, le frère de Joab et le fils de Tseruja, était le chef des trois. Il brandit sa lance sur 300 hommes et les tua. Il eut une grande réputation parmi les trois. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il était le plus considéré des trois et il fut leur chef, mais il n'égala pas les trois premiers.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»L''Esprit de l''Eternel parle par moi et c''est sa parole qui est sur ma langue. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Benaja, le fils de Jehojada, qui était un homme vaillant de Kabtseel, fut célèbre par ses exploits. C''est lui qui frappa les deux héros de Moab. Il descendit au milieu d''une citerne et il y frappa un lion, un jour de neige. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il frappa un Egyptien de belle allure qui tenait une lance à la main. Il descendit contre l''Egyptien avec un bâton, arracha la lance de sa main et s''en servit pour le tuer. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voilà ce que fit Benaja, fils de Jehojada. Il eut une grande réputation parmi les trois vaillants hommes. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il était le plus considéré des trente, mais il n'égala pas les trois premiers. David l'admit dans sa garde personnelle.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parmi les trente figuraient aussi Asaël, le frère de Joab; Elchanan, fils de Dodo, originaire de Bethléhem; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shamma et Elika, tous deux originaires de Harod; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hélets, originaire de Péleth; Ira, fils d''Ikkesh, originaire de Tekoa; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abiézer, originaire d''Anathoth; Mebunnaï, originaire de Husha; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsalmon, originaire d''Achoach; Maharaï, originaire de Nethopha; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Héleb, fils de Baana, lui aussi originaire de Nethopha; Ittaï, fils de Ribaï, originaire de Guibea, la ville des Benjaminites; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le Dieu d''Israël a parlé, le rocher d''Israël m''a dit: ‘Celui qui règne parmi les hommes avec justice, celui qui règne dans la crainte de Dieu, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Benaja, originaire de Pirathon; Hiddaï, originaire de Nachalé-Gaash; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abi-Albon, originaire d''Araba; Azmaveth, originaire de Barchum; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eliachba, originaire de Shaalbon; Bené-Jashen; Jonathan; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shamma, originaire d''Harar; Achiam, fils de Sharar, originaire d''Arar; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eliphéleth, fils d''Achasbaï, qui descendait d''un Maacathien; Eliam, le fils d''Achitophel, originaire de Guilo; '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hetsraï, originaire de Carmel; Paaraï, originaire d''Arab; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jigueal, fils de Nathan, originaire de Tsoba; Bani, originaire de Gad; '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsélek l''Ammonite; Naharaï, originaire de Beéroth, qui était le porteur d''armes de Joab, le fils de Tseruja; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ira et Gareb, originaires de Jéther; '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Urie le Hittite. En tout, ils étaient 37.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'est pareil à la lumière du matin quand le soleil brille et que la matinée est sans nuages: après la pluie, ses rayons font sortir de terre la verdure.’'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Il en va de même pour ma famille devant Dieu, puisqu'il a conclu une alliance éternelle avec moi, en tous points bien réglée et bien gardée. Il fera pousser tout mon salut et tous mes désirs.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Les méchants, eux, sont tous comme des ronces dont on se débarrasse et que l''on ne prend pas avec la main. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Celui qui les touche s'arme d'un outil en fer ou du bois d'une lance, et on les brûle au feu sur place.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les vaillants hommes de David
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voici le nom des vaillants hommes qui étaient au service de David. Josheb-Basshébeth le Tachkemonite était le chef des officiers. Il était aussi appelé Adino l'Esnite et il fit 800 victimes en une seule fois.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après lui figurait Eléazar, fils de Dodo et petit-fils d''un Achochite. Il était l''un des trois guerriers qui, avec David, défièrent les Philistins rassemblés pour combattre, tandis que les Israélites se retiraient sur les hauteurs. '
