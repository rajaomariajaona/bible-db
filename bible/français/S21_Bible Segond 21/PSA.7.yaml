document_id: PSA.7,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière du juste persécuté
  - type: text
    content: Complainte de David chantée à l'Eternel au sujet de Cush, le Benjaminite.
  '10':
  - type: text
    content: Mets un terme aux méfaits des méchants
  - type: text
    content: et affermis le juste,
  - type: text
    content: toi qui examines les cœurs et les reins, Dieu juste!
  '11':
  - type: text
    content: 'Mon bouclier est auprès de Dieu:'
  - type: text
    content: il sauve ceux dont le cœur est droit.
  '12':
  - type: text
    content: Dieu est un juste juge,
  - type: text
    content: un Dieu qui fait chaque jour sentir sa colère.
  '13':
  - type: text
    content: Si le méchant ne revient pas à lui,
  - type: text
    content: il aiguise son épée, il bande son arc, et il vise;
  '14':
  - type: text
    content: il dirige sur lui des traits meurtriers,
  - type: text
    content: il rend ses flèches brûlantes.
  '15':
  - type: text
    content: Le méchant prépare le mal,
  - type: text
    content: il conçoit la misère et il accouche de la fausseté.
  '16':
  - type: text
    content: Il ouvre une fosse, il la creuse,
  - type: text
    content: mais il tombe dans le trou qu'il a fait.
  '17':
  - type: text
    content: Sa misère retombe sur sa tête,
  - type: text
    content: et sa violence descend sur son front.
  '18':
  - type: text
    content: Je louerai l'Eternel à cause de sa justice,
  - type: text
    content: je chanterai le nom de l'Eternel, le Très-Haut.
  '2':
  - type: text
    content: 'Eternel, mon Dieu, je cherche refuge en toi:'
  - type: text
    content: sauve-moi de tous mes persécuteurs et délivre-moi,
  '3':
  - type: text
    content: sinon ils vont me déchirer comme un lion,
  - type: text
    content: ils vont me dévorer, sans personne pour me délivrer.
  '4':
  - type: text
    content: Eternel, mon Dieu, si j'ai fait cela,
  - type: text
    content: si mes mains ont commis l'injustice,
  '5':
  - type: text
    content: si j'ai rendu le mal à celui qui était en paix avec moi,
  - type: text
    content: si j'ai dépouillé celui qui s'opposait à moi sans raison,
  '6':
  - type: text
    content: que l'ennemi me poursuive et m'atteigne,
  - type: text
    content: 'qu''il me terrasse et traîne ma gloire dans la poussière! '
  - type: text
    content: – Pause.
  '7':
  - type: text
    content: Lève-toi, Eternel, dans ta colère,
  - type: text
    content: dresse-toi contre la fureur de mes adversaires,
  - type: text
    content: réveille-toi pour me secourir, toi qui établis le droit!
  '8':
  - type: text
    content: Que l'assemblée des peuples vienne t'entourer,
  - type: text
    content: reviens dominer sur elle dans les hauteurs!
  '9':
  - type: text
    content: 'L''Eternel exerce son jugement sur les peuples:'
  - type: text
    content: juge-moi, Eternel,
  - type: text
    content: conformément à ma justice et à mon intégrité!
