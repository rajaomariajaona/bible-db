document_id: PSA.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière du juste persécuté
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Complainte de David chantée à l'Eternel au sujet de Cush, le Benjaminite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Eternel, mon Dieu, je cherche refuge en toi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: sauve-moi de tous mes persécuteurs et délivre-moi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: sinon ils vont me déchirer comme un lion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils vont me dévorer, sans personne pour me délivrer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Eternel, mon Dieu, si j'ai fait cela,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si mes mains ont commis l'injustice,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: si j'ai rendu le mal à celui qui était en paix avec moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si j'ai dépouillé celui qui s'opposait à moi sans raison,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: que l'ennemi me poursuive et m'atteigne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'qu''il me terrasse et traîne ma gloire dans la poussière! '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Lève-toi, Eternel, dans ta colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dresse-toi contre la fureur de mes adversaires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: réveille-toi pour me secourir, toi qui établis le droit!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Que l'assemblée des peuples vienne t'entourer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: reviens dominer sur elle dans les hauteurs!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'L''Eternel exerce son jugement sur les peuples:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: juge-moi, Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: conformément à ma justice et à mon intégrité!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mets un terme aux méfaits des méchants
- type: usfm
  marker: q1
  children:
  - type: text
    text: et affermis le juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi qui examines les cœurs et les reins, Dieu juste!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mon bouclier est auprès de Dieu:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il sauve ceux dont le cœur est droit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dieu est un juste juge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un Dieu qui fait chaque jour sentir sa colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Si le méchant ne revient pas à lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il aiguise son épée, il bande son arc, et il vise;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: il dirige sur lui des traits meurtriers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il rend ses flèches brûlantes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Le méchant prépare le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il conçoit la misère et il accouche de la fausseté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il ouvre une fosse, il la creuse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il tombe dans le trou qu'il a fait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Sa misère retombe sur sa tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa violence descend sur son front.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Je louerai l'Eternel à cause de sa justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je chanterai le nom de l'Eternel, le Très-Haut.
