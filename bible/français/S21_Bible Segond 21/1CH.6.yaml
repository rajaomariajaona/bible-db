document_id: 1CH.6,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Fils de Lévi: Guershon, Kehath et Merari. '
  '10':
  - type: text
    content: 'Fils d''Elkana: Amasaï, Achimoth '
  '11':
  - type: text
    content: 'et Elkana. Descendants d''Elkana: Tsophaï – lui-même père de Nachath, '
  '12':
  - type: text
    content: 'père d''Eliab, père de Jerocham, père d''Elkana – '
  '13':
  - type: text
    content: 'et les fils de Samuel, l''aîné et le second, Abija. '
  '14':
  - type: text
    content: 'Fils de Merari: Machli, lui-même père de Libni, père de Shimeï, père d''Uzza, '
  '15':
  - type: text
    content: père de Shimea, père de Hagguija, père d'Asaja.
  '16':
  - type: text
    content: 'Voici ceux que David établit pour diriger le chant dans la maison de l''Eternel, depuis que l''arche eut un emplacement fixe. '
  '17':
  - type: text
    content: 'Ils remplirent les fonctions de musiciens devant le tabernacle, devant la tente de la rencontre, jusqu''à ce que Salomon ait construit la maison de l''Eternel à Jérusalem. Ils accomplissaient leur service conformément à leur règle. '
  '18':
  - type: text
    content: 'Voici ceux qui officiaient avec leurs fils. Parmi les descendants des Kehathites figurait Héman, le musicien, fils de Joël et petit-fils de Samuel, '
  '19':
  - type: text
    content: 'descendant d''Elkana, Jerocham, Eliel, Thoach, '
  '2':
  - type: text
    content: 'Voici les noms des fils de Guershon: Libni et Shimeï. '
  '20':
  - type: text
    content: 'Tsuph, Elkana, Machath, Amasaï, '
  '21':
  - type: text
    content: 'Elkana, Joël, Azaria, Sophonie, '
  '22':
  - type: text
    content: 'Thachath, Assir, Ebjasaph, Koré, '
  '23':
  - type: text
    content: 'Jitsehar, Kehath et Lévi, lui-même fils d''Israël. '
  '24':
  - type: text
    content: 'Asaph, qui lui était apparenté et qui se tenait à sa droite, était fils de Bérékia et petit-fils de Shimea, '
  '25':
  - type: text
    content: 'descendant de Micaël, Baaséja, Malkija, '
  '26':
  - type: text
    content: 'Ethni, Zérach, Adaja, '
  '27':
  - type: text
    content: 'Ethan, Zimma, Shimeï, '
  '28':
  - type: text
    content: 'Jachath et Guershon, lui-même fils de Lévi. '
  '29':
  - type: text
    content: 'Les descendants de Merari, qui leur étaient apparentés, se tenaient à gauche; il y avait Ethan, fils de Kishi et petit-fils d''Abdi, descendant de Malluc, '
  '3':
  - type: text
    content: 'Fils de Kehath: Amram, Jitsehar, Hébron et Uziel. '
  '30':
  - type: text
    content: 'Hashabia, Amatsia, Hilkija, '
  '31':
  - type: text
    content: 'Amtsi, Bani, Shémer, '
  '32':
  - type: text
    content: Machli, Mushi et Merari, lui-même fils de Lévi.
  '33':
  - type: text
    content: 'Leurs frères lévites étaient chargés de tout le service du tabernacle, de la maison de Dieu. '
  '34':
  - type: text
    content: C'étaient Aaron et ses descendants qui offraient les sacrifices sur l'autel des holocaustes ainsi que l'encens sur l'autel des parfums. Ils remplissaient toutes les tâches liées au lieu très saint et faisaient l'expiation pour Israël, conformément à tout ce qu'avait ordonné Moïse, le serviteur de Dieu.
  '35':
  - type: text
    content: 'Voici les descendants d''Aaron: ses fils Eléazar et Phinées, lui-même père d''Abishua, '
  '36':
  - type: text
    content: 'père de Bukki, père d''Uzzi, père de Zerachja, '
  '37':
  - type: text
    content: 'père de Merajoth, père d''Amaria, père d''Achithub, '
  '38':
  - type: text
    content: père de Tsadok, père d'Achimaats.
  - type: heading
    content: Villes des prêtres et des Lévites
  '39':
  - type: text
    content: 'Voici leurs lieux d''habitation, en fonction des domaines qu''ils formaient avec leurs limites. Aux descendants d''Aaron du clan des Kehathites, qui furent les premiers bénéficiaires du tirage au sort, '
  '4':
  - type: text
    content: 'Fils de Merari: Machli et Mushi. Tels sont les clans de Lévi en fonction de leurs ancêtres. '
  '40':
  - type: text
    content: 'on donna Hébron, dans le pays de Juda, et le territoire qui l''entoure. '
  '41':
  - type: text
    content: 'La campagne et les villages rattachés à la ville avaient été attribués à Caleb, fils de Jephunné, '
  '42':
  - type: text
    content: 'mais on donna aux descendants d''Aaron la ville de refuge d''Hébron, Libna et ses environs, Jatthir, Eshthemoa et ses environs, '
  '43':
  - type: text
    content: 'Hilen et ses environs, Debir et ses environs, '
  '44':
  - type: text
    content: 'Ashan et ses environs ainsi que Beth-Shémesh et ses environs. '
  '45':
  - type: text
    content: 'Dans la tribu de Benjamin, on leur donna Guéba et ses environs, Allémeth et ses environs, Anathoth et ses environs. Total de leurs villes: 13, d''après leurs clans. '
  '46':
  - type: text
    content: 'Les autres descendants de Kehath reçurent par tirage au sort 10 villes situées chez les clans des tribus d''Ephraïm et de Dan ainsi que de la demi-tribu de Manassé. '
  '47':
  - type: text
    content: 'Les descendants de Guershon, en fonction de leurs clans, eurent 13 villes prises aux tribus d''Issacar, d''Aser, de Nephthali et de Manassé en Basan. '
  '48':
  - type: text
    content: Les descendants de Merari, en fonction de leurs clans, reçurent par tirage au sort 12 villes prises aux tribus de Ruben, de Gad et de Zabulon.
  '49':
  - type: text
    content: 'Les Israélites donnèrent ces villes et leurs environs aux Lévites. '
  '5':
  - type: text
    content: 'De Guershon descend Libni, lui-même père de Jachath, père de Zimma, '
  '50':
  - type: text
    content: 'Ils attribuèrent par tirage au sort, dans les tribus des Judéens, des Siméonites et des Benjaminites, les villes qui ont été citées. '
  '51':
  - type: text
    content: 'Quant aux autres clans des descendants de Kehath, les villes de leur territoire furent prises dans la tribu d''Ephraïm. '
  '52':
  - type: text
    content: 'On leur donna la ville de refuge de Sichem et ses environs, dans la région montagneuse d''Ephraïm, Guézer et ses environs, '
  '53':
  - type: text
    content: 'Jokmeam et ses environs, Beth-Horon et ses environs, '
  '54':
  - type: text
    content: 'Ajalon et ses environs, ainsi que Gath-Rimmon et ses environs. '
  '55':
  - type: text
    content: Dans la demi-tribu de Manassé, on donna Aner et ses environs ainsi que Bileam et ses environs au clan des autres descendants de Kehath.
  '56':
  - type: text
    content: 'On donna aux descendants de Guershon: dans le clan de la demi-tribu de Manassé, Golan en Basan et ses environs ainsi qu''Ashtaroth et ses environs; '
  '57':
  - type: text
    content: 'dans la tribu d''Issacar, Kédesh et ses environs, Dobrath et ses environs, '
  '58':
  - type: text
    content: 'Ramoth et ses environs, ainsi qu''Anem et ses environs; '
  '59':
  - type: text
    content: 'dans la tribu d''Aser, Mashal et ses environs, Abdon et ses environs, '
  '6':
  - type: text
    content: 'père de Joach, père d''Iddo, père de Zérach, père de Jeathraï. '
  '60':
  - type: text
    content: 'Hukok et ses environs, ainsi que Rehob et ses environs; '
  '61':
  - type: text
    content: et dans la tribu de Nephthali, Kédesh en Galilée et ses environs, Hammon et ses environs ainsi que Kirjathaïm et ses environs.
  '62':
  - type: text
    content: 'On donna au reste des Lévites, aux descendants de Merari, dans la tribu de Zabulon, Rimmono et ses environs ainsi que Thabor et ses environs. '
  '63':
  - type: text
    content: 'De l''autre côté du Jourdain, vis-à-vis de Jéricho, à l''est du Jourdain on leur donna: dans la tribu de Ruben, Betser, ville située dans le désert, et ses environs, Jahtsa et ses environs, '
  '64':
  - type: text
    content: 'Kedémoth et ses environs ainsi que Méphaath et ses environs; '
  '65':
  - type: text
    content: 'et dans la tribu de Gad, Ramoth en Galaad et ses environs, Mahanaïm et ses environs, '
  '66':
  - type: text
    content: Hesbon et ses environs, et Jaezar et ses environs.
  '7':
  - type: text
    content: 'Descendants de Kehath: Amminadab, père de Koré, père d''Assir, '
  '8':
  - type: text
    content: 'père d''Elkana, père d''Ebjasaph, père d''Assir, '
  '9':
  - type: text
    content: 'père de Thachath, père d''Uriel, père d''Ozias, père de Saül. '
