document_id: 1CH.6
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Fils de Lévi: Guershon, Kehath et Merari. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici les noms des fils de Guershon: Libni et Shimeï. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Fils de Kehath: Amram, Jitsehar, Hébron et Uziel. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Fils de Merari: Machli et Mushi. Tels sont les clans de Lévi en fonction de leurs ancêtres. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'De Guershon descend Libni, lui-même père de Jachath, père de Zimma, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'père de Joach, père d''Iddo, père de Zérach, père de Jeathraï. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Descendants de Kehath: Amminadab, père de Koré, père d''Assir, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'père d''Elkana, père d''Ebjasaph, père d''Assir, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'père de Thachath, père d''Uriel, père d''Ozias, père de Saül. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Fils d''Elkana: Amasaï, Achimoth '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'et Elkana. Descendants d''Elkana: Tsophaï – lui-même père de Nachath, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'père d''Eliab, père de Jerocham, père d''Elkana – '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'et les fils de Samuel, l''aîné et le second, Abija. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fils de Merari: Machli, lui-même père de Libni, père de Shimeï, père d''Uzza, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: père de Shimea, père de Hagguija, père d'Asaja.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Voici ceux que David établit pour diriger le chant dans la maison de l''Eternel, depuis que l''arche eut un emplacement fixe. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ils remplirent les fonctions de musiciens devant le tabernacle, devant la tente de la rencontre, jusqu''à ce que Salomon ait construit la maison de l''Eternel à Jérusalem. Ils accomplissaient leur service conformément à leur règle. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Voici ceux qui officiaient avec leurs fils. Parmi les descendants des Kehathites figurait Héman, le musicien, fils de Joël et petit-fils de Samuel, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'descendant d''Elkana, Jerocham, Eliel, Thoach, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tsuph, Elkana, Machath, Amasaï, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Elkana, Joël, Azaria, Sophonie, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Thachath, Assir, Ebjasaph, Koré, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jitsehar, Kehath et Lévi, lui-même fils d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Asaph, qui lui était apparenté et qui se tenait à sa droite, était fils de Bérékia et petit-fils de Shimea, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'descendant de Micaël, Baaséja, Malkija, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ethni, Zérach, Adaja, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ethan, Zimma, Shimeï, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Jachath et Guershon, lui-même fils de Lévi. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Les descendants de Merari, qui leur étaient apparentés, se tenaient à gauche; il y avait Ethan, fils de Kishi et petit-fils d''Abdi, descendant de Malluc, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Hashabia, Amatsia, Hilkija, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Amtsi, Bani, Shémer, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Machli, Mushi et Merari, lui-même fils de Lévi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Leurs frères lévites étaient chargés de tout le service du tabernacle, de la maison de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: C'étaient Aaron et ses descendants qui offraient les sacrifices sur l'autel des holocaustes ainsi que l'encens sur l'autel des parfums. Ils remplissaient toutes les tâches liées au lieu très saint et faisaient l'expiation pour Israël, conformément à tout ce qu'avait ordonné Moïse, le serviteur de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Voici les descendants d''Aaron: ses fils Eléazar et Phinées, lui-même père d''Abishua, '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'père de Bukki, père d''Uzzi, père de Zerachja, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'père de Merajoth, père d''Amaria, père d''Achithub, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: père de Tsadok, père d'Achimaats.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Villes des prêtres et des Lévites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Voici leurs lieux d''habitation, en fonction des domaines qu''ils formaient avec leurs limites. Aux descendants d''Aaron du clan des Kehathites, qui furent les premiers bénéficiaires du tirage au sort, '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'on donna Hébron, dans le pays de Juda, et le territoire qui l''entoure. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'La campagne et les villages rattachés à la ville avaient été attribués à Caleb, fils de Jephunné, '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'mais on donna aux descendants d''Aaron la ville de refuge d''Hébron, Libna et ses environs, Jatthir, Eshthemoa et ses environs, '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Hilen et ses environs, Debir et ses environs, '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Ashan et ses environs ainsi que Beth-Shémesh et ses environs. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Dans la tribu de Benjamin, on leur donna Guéba et ses environs, Allémeth et ses environs, Anathoth et ses environs. Total de leurs villes: 13, d''après leurs clans. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Les autres descendants de Kehath reçurent par tirage au sort 10 villes situées chez les clans des tribus d''Ephraïm et de Dan ainsi que de la demi-tribu de Manassé. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Les descendants de Guershon, en fonction de leurs clans, eurent 13 villes prises aux tribus d''Issacar, d''Aser, de Nephthali et de Manassé en Basan. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Les descendants de Merari, en fonction de leurs clans, reçurent par tirage au sort 12 villes prises aux tribus de Ruben, de Gad et de Zabulon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Les Israélites donnèrent ces villes et leurs environs aux Lévites. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Ils attribuèrent par tirage au sort, dans les tribus des Judéens, des Siméonites et des Benjaminites, les villes qui ont été citées. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Quant aux autres clans des descendants de Kehath, les villes de leur territoire furent prises dans la tribu d''Ephraïm. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'On leur donna la ville de refuge de Sichem et ses environs, dans la région montagneuse d''Ephraïm, Guézer et ses environs, '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Jokmeam et ses environs, Beth-Horon et ses environs, '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Ajalon et ses environs, ainsi que Gath-Rimmon et ses environs. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: Dans la demi-tribu de Manassé, on donna Aner et ses environs ainsi que Bileam et ses environs au clan des autres descendants de Kehath.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'On donna aux descendants de Guershon: dans le clan de la demi-tribu de Manassé, Golan en Basan et ses environs ainsi qu''Ashtaroth et ses environs; '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'dans la tribu d''Issacar, Kédesh et ses environs, Dobrath et ses environs, '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Ramoth et ses environs, ainsi qu''Anem et ses environs; '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'dans la tribu d''Aser, Mashal et ses environs, Abdon et ses environs, '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Hukok et ses environs, ainsi que Rehob et ses environs; '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: et dans la tribu de Nephthali, Kédesh en Galilée et ses environs, Hammon et ses environs ainsi que Kirjathaïm et ses environs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'On donna au reste des Lévites, aux descendants de Merari, dans la tribu de Zabulon, Rimmono et ses environs ainsi que Thabor et ses environs. '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'De l''autre côté du Jourdain, vis-à-vis de Jéricho, à l''est du Jourdain on leur donna: dans la tribu de Ruben, Betser, ville située dans le désert, et ses environs, Jahtsa et ses environs, '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Kedémoth et ses environs ainsi que Méphaath et ses environs; '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'et dans la tribu de Gad, Ramoth en Galaad et ses environs, Mahanaïm et ses environs, '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: Hesbon et ses environs, et Jaezar et ses environs.
