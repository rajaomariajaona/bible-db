document_id: REV.13,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les bêtes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puis je vis monter de la mer une bête qui avait sept têtes et dix cornes, et sur ses cornes dix diadèmes, et sur ses têtes des noms blasphématoires.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si quelqu'un fait des prisonniers, il sera emmené prisonnier. Si quelqu'un tue par l'épée, il doit être tué par l'épée. C'est ici que sont nécessaires la persévérance et la foi des saints.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ensuite je vis monter de la terre une autre bête; elle avait deux cornes semblables à celles d''un agneau, mais elle parlait comme un dragon. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle exerçait toute l''autorité de la première bête en sa présence, et elle obligeait la terre et ses habitants à adorer la première bête, celle dont la blessure mortelle avait été guérie. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle accomplissait de grands signes miraculeux, jusqu''à faire descendre le feu du ciel sur la terre, à la vue des hommes. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle égarait les habitants de la terre par les signes qu''il lui était donné d''accomplir en présence de la bête; elle leur disait de faire une image de la bête qui avait été blessée par l''épée et qui avait survécu. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle reçut le pouvoir d''animer l''image de la bête, afin que cette image puisse parler et faire tuer tous ceux qui ne l''adoreraient pas. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle fit en sorte qu''on impose à tous les hommes, petits et grands, riches et pauvres, libres et esclaves, une marque sur leur main droite ou sur leur front. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi, personne ne pouvait acheter ni vendre sans avoir la marque, c'est-à-dire le nom de la bête ou le nombre de son nom.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il faut ici de la sagesse. Que celui qui a de l'intelligence déchiffre le nombre de la bête, car c'est un nombre d'homme. Son nombre est 666.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La bête que je vis ressemblait à un léopard; ses pattes étaient comme celles d''un ours et sa gueule comme une gueule de lion. Le dragon lui donna sa puissance, son trône et une grande autorité. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''une de ses têtes était comme blessée à mort, mais sa blessure mortelle fut guérie. Remplie d''admiration, la terre entière suivit alors la bête. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On adora le dragon parce qu''il avait donné l''autorité à la bête; on adora aussi la bête en disant: «Qui est semblable à la bête et qui peut combattre contre elle?»'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il lui fut donné une bouche qui proférait des paroles arrogantes et des blasphèmes, et elle reçut le pouvoir de faire la guerre pendant 42 mois. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle ouvrit la bouche pour proférer des blasphèmes contre Dieu, pour insulter son nom et son tabernacle, ceux qui habitent dans le ciel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il lui fut permis de faire la guerre aux saints et de les vaincre. Elle reçut l''autorité sur toute tribu, tout peuple, toute langue et toute nation, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et tous les habitants de la terre l'adoreront, tous ceux dont le nom n'a pas été inscrit dans le livre de vie de l'Agneau offert en sacrifice, et ce dès la création du monde.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si quelqu''un a des oreilles, qu''il écoute. '
