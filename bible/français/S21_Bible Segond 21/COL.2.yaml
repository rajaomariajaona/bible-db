document_id: COL.2,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Je veux, en effet, que vous sachiez à quel point il est grand, le combat que je soutiens pour vous, pour ceux qui sont à Laodicée et pour tous ceux qui n''ont jamais vu mon visage. '
  '10':
  - type: text
    content: 'Vous avez tout pleinement en lui, qui est le chef de toute domination et de toute autorité. '
  '11':
  - type: text
    content: 'C''est en lui aussi que vous avez été circoncis d''une circoncision qui n''est pas faite par la main de l''homme, mais de la circoncision de Christ, qui consiste à vous dépouiller du corps de votre nature pécheresse. '
  '12':
  - type: text
    content: Vous avez en effet été ensevelis avec lui par le baptême et vous êtes aussi ressuscités en lui et avec lui, par la foi en la puissance du Dieu qui l'a ressuscité.
  '13':
  - type: text
    content: 'Vous qui étiez morts en raison de vos fautes et de l''incirconcision de votre corps, il vous a rendus à la vie avec lui. Il nous a pardonné toutes nos fautes, '
  '14':
  - type: text
    content: il a effacé l'acte
  - type: note
    content: 'L''acte: c''est-à-dire la loi divine.'
  - type: text
    content: ' rédigé contre nous qui nous condamnait par ses prescriptions, et il l''a annulé en le clouant à la croix. '
  '15':
  - type: text
    content: Il a ainsi dépouillé les dominations et les autorités et les a données publiquement en spectacle en triomphant d'elles par la croix.
  '16':
  - type: text
    content: 'Que personne donc ne vous juge au sujet du manger ou du boire, ou à propos d''une fête, d''un nouveau mois ou du sabbat: '
  '17':
  - type: text
    content: 'tout cela n''était que l''ombre des choses à venir, mais la réalité est en Christ. '
  '18':
  - type: text
    content: 'Que personne, par son goût d''une fausse humilité et du culte des anges, ne vous prive de la victoire. Plongé dans ses visions, un tel homme est sans raison enflé d''orgueil sous l''effet de ses pensées tout humaines, '
  '19':
  - type: text
    content: et il ne s'attache pas à celui qui est la tête
  - type: note
    content: 'Celui qui est la tête: c''est-à-dire Christ.'
  - type: text
    content: . C'est pourtant d'elle que tout le corps, bien nourri et solidement assemblé par ses articulations et ses liens, tire la croissance que Dieu donne.
  '2':
  - type: text
    content: 'Je combats ainsi afin que, unis dans l''amour, ils soient encouragés dans leur cœur et qu''ils soient enrichis d''une pleine intelligence pour connaître le mystère de Dieu, aussi bien du Père que de Christ. '
  '20':
  - type: text
    content: 'Si vous êtes morts avec Christ aux principes élémentaires qui régissent le monde, pourquoi, comme si vous viviez dans le monde, vous soumettez-vous à toutes ces règles: '
  '21':
  - type: text
    content: '«Ne prends pas! Ne goûte pas! Ne touche pas!»? '
  '22':
  - type: text
    content: 'Elles ne concernent que des choses destinées à disparaître dès qu''on en fait usage. Il s''agit bien là de commandements et d''enseignements humains! '
  '23':
  - type: text
    content: Ils ont, en vérité, une apparence de sagesse, car ils indiquent un culte volontaire, de l'humilité et le mépris du corps, mais ils sont sans aucune valeur et ne servent qu'à la satisfaction personnelle.
  '3':
  - type: text
    content: C'est en lui que sont cachés tous les trésors de la sagesse et de la connaissance.
  '4':
  - type: text
    content: 'Je dis cela afin que personne ne vous trompe par des discours séduisants. '
  '5':
  - type: text
    content: En effet, même si je suis absent de corps, je suis avec vous en esprit, et je vois avec joie le bon ordre qui règne parmi vous et la fermeté de votre foi en Christ.
  '6':
  - type: text
    content: Ainsi donc, tout comme vous avez accueilli le Seigneur Jésus-Christ, marchez en lui
  - type: note
    content: 'Marchez en lui: ou vivez dans l''union avec lui, c''est-à-dire en menant une vie modelée par lui.'
  - type: text
    content: '; '
  '7':
  - type: text
    content: soyez enracinés et fondés en lui, affermis dans la foi telle qu'elle vous a été enseignée, et soyez-en riches en exprimant votre reconnaissance à Dieu.
  - type: heading
    content: L'œuvre de Christ et la liberté qui en découle
  '8':
  - type: text
    content: 'Faites attention: que personne ne vous prenne au piège par la philosophie, par des tromperies sans fondement qui s''appuient sur la tradition des hommes, sur les principes élémentaires qui régissent le monde'
  - type: note
    content: 'Les principes… le monde: c''est-à-dire les éléments et rites des religions humaines ou les puissances spirituelles, selon les interprétations.'
  - type: text
    content: ', et non sur Christ. '
  '9':
  - type: text
    content: 'En effet, c''est en lui qu''habite corporellement toute la plénitude de la divinité. '
