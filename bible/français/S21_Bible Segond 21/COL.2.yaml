document_id: COL.2
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Je veux, en effet, que vous sachiez à quel point il est grand, le combat que je soutiens pour vous, pour ceux qui sont à Laodicée et pour tous ceux qui n''ont jamais vu mon visage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je combats ainsi afin que, unis dans l''amour, ils soient encouragés dans leur cœur et qu''ils soient enrichis d''une pleine intelligence pour connaître le mystère de Dieu, aussi bien du Père que de Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C'est en lui que sont cachés tous les trésors de la sagesse et de la connaissance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je dis cela afin que personne ne vous trompe par des discours séduisants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: En effet, même si je suis absent de corps, je suis avec vous en esprit, et je vois avec joie le bon ordre qui règne parmi vous et la fermeté de votre foi en Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ainsi donc, tout comme vous avez accueilli le Seigneur Jésus-Christ, marchez en lui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Marchez en lui: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ou vivez dans l'union avec lui, c'est-à-dire en menant une vie modelée par lui.
    marker-yv: yv-n
  - type: text
    text: '; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: soyez enracinés et fondés en lui, affermis dans la foi telle qu'elle vous a été enseignée, et soyez-en riches en exprimant votre reconnaissance à Dieu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'œuvre de Christ et la liberté qui en découle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Faites attention: que personne ne vous prenne au piège par la philosophie, par des tromperies sans fondement qui s''appuient sur la tradition des hommes, sur les principes élémentaires qui régissent le monde'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Les principes… le monde: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire les éléments et rites des religions humaines ou les puissances spirituelles, selon les interprétations.
    marker-yv: yv-n
  - type: text
    text: ', et non sur Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'En effet, c''est en lui qu''habite corporellement toute la plénitude de la divinité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Vous avez tout pleinement en lui, qui est le chef de toute domination et de toute autorité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'C''est en lui aussi que vous avez été circoncis d''une circoncision qui n''est pas faite par la main de l''homme, mais de la circoncision de Christ, qui consiste à vous dépouiller du corps de votre nature pécheresse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Vous avez en effet été ensevelis avec lui par le baptême et vous êtes aussi ressuscités en lui et avec lui, par la foi en la puissance du Dieu qui l'a ressuscité.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Vous qui étiez morts en raison de vos fautes et de l''incirconcision de votre corps, il vous a rendus à la vie avec lui. Il nous a pardonné toutes nos fautes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: il a effacé l'acte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''acte: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire la loi divine.
    marker-yv: yv-n
  - type: text
    text: ' rédigé contre nous qui nous condamnait par ses prescriptions, et il l''a annulé en le clouant à la croix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il a ainsi dépouillé les dominations et les autorités et les a données publiquement en spectacle en triomphant d'elles par la croix.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Que personne donc ne vous juge au sujet du manger ou du boire, ou à propos d''une fête, d''un nouveau mois ou du sabbat: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'tout cela n''était que l''ombre des choses à venir, mais la réalité est en Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Que personne, par son goût d''une fausse humilité et du culte des anges, ne vous prive de la victoire. Plongé dans ses visions, un tel homme est sans raison enflé d''orgueil sous l''effet de ses pensées tout humaines, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: et il ne s'attache pas à celui qui est la tête
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Celui qui est la tête: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire Christ.
    marker-yv: yv-n
  - type: text
    text: . C'est pourtant d'elle que tout le corps, bien nourri et solidement assemblé par ses articulations et ses liens, tire la croissance que Dieu donne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Si vous êtes morts avec Christ aux principes élémentaires qui régissent le monde, pourquoi, comme si vous viviez dans le monde, vous soumettez-vous à toutes ces règles: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '«Ne prends pas! Ne goûte pas! Ne touche pas!»? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Elles ne concernent que des choses destinées à disparaître dès qu''on en fait usage. Il s''agit bien là de commandements et d''enseignements humains! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ils ont, en vérité, une apparence de sagesse, car ils indiquent un culte volontaire, de l'humilité et le mépris du corps, mais ils sont sans aucune valeur et ne servent qu'à la satisfaction personnelle.
