document_id: PRO.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La sagesse et la folie
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: La sagesse a construit sa maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle a taillé ses sept colonnes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Elle a abattu son bétail, mélangé son vin
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dressé sa table.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Elle a envoyé ses servantes, elle crie
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sur le sommet des hauteurs de la ville:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: «Qui manque d'expérience? Qu'il entre ici!»
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Elle dit à ceux qui sont dépourvus de bon sens:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: «Venez manger de mon pain
- type: usfm
  marker: q1
  children:
  - type: text
    text: et boire du vin que j'ai mélangé!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Abandonnez la naïveté et vous vivrez,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avancez sur la voie de l'intelligence!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: »Celui qui instruit le moqueur récolte le mépris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celui qui reprend le méchant s'attire ses insultes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ne reprends pas le moqueur si tu ne veux pas qu'il te déteste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais reprends le sage et il t'aimera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Donne au sage et il deviendra encore plus sage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: enseigne le juste et il augmentera son savoir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: »Le commencement de la sagesse, c'est la crainte de l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La connaissance du Dieu saint, voilà en quoi consiste l'intelligence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Oui, c'est grâce à moi que tes jours se multiplieront
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que les années de ta vie augmenteront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Si tu es sage, tu l'es pour toi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: si tu es moqueur, tu en supporteras les conséquences tout seul.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: La folie est une femme bruyante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: naïve, qui ne sait rien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Elle s'assied à l'entrée de sa maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur un siège, dans les hauteurs de la ville,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: pour interpeller les passants
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'qui vont droit leur chemin:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: «Qui manque d'expérience? Qu'il entre ici!»
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Elle dit à celui qui est dépourvu de bon sens:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: «L'eau volée est douce
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le pain mangé en cachette est agréable.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Et il ne sait pas que là se trouvent les défunts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que ceux qu'elle a invités sont dans les vallées du séjour des morts.
