document_id: PRO.9,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La sagesse et la folie
  - type: text
    content: La sagesse a construit sa maison,
  - type: text
    content: elle a taillé ses sept colonnes.
  '10':
  - type: text
    content: »Le commencement de la sagesse, c'est la crainte de l'Eternel.
  - type: text
    content: La connaissance du Dieu saint, voilà en quoi consiste l'intelligence.
  '11':
  - type: text
    content: Oui, c'est grâce à moi que tes jours se multiplieront
  - type: text
    content: et que les années de ta vie augmenteront.
  '12':
  - type: text
    content: Si tu es sage, tu l'es pour toi;
  - type: text
    content: si tu es moqueur, tu en supporteras les conséquences tout seul.»
  '13':
  - type: text
    content: La folie est une femme bruyante,
  - type: text
    content: naïve, qui ne sait rien.
  '14':
  - type: text
    content: Elle s'assied à l'entrée de sa maison,
  - type: text
    content: sur un siège, dans les hauteurs de la ville,
  '15':
  - type: text
    content: pour interpeller les passants
  - type: text
    content: 'qui vont droit leur chemin:'
  '16':
  - type: text
    content: «Qui manque d'expérience? Qu'il entre ici!»
  - type: text
    content: 'Elle dit à celui qui est dépourvu de bon sens:'
  '17':
  - type: text
    content: «L'eau volée est douce
  - type: text
    content: et le pain mangé en cachette est agréable.»
  '18':
  - type: text
    content: Et il ne sait pas que là se trouvent les défunts,
  - type: text
    content: que ceux qu'elle a invités sont dans les vallées du séjour des morts.
  '2':
  - type: text
    content: Elle a abattu son bétail, mélangé son vin
  - type: text
    content: et dressé sa table.
  '3':
  - type: text
    content: Elle a envoyé ses servantes, elle crie
  - type: text
    content: 'sur le sommet des hauteurs de la ville:'
  '4':
  - type: text
    content: «Qui manque d'expérience? Qu'il entre ici!»
  - type: text
    content: 'Elle dit à ceux qui sont dépourvus de bon sens:'
  '5':
  - type: text
    content: «Venez manger de mon pain
  - type: text
    content: et boire du vin que j'ai mélangé!
  '6':
  - type: text
    content: Abandonnez la naïveté et vous vivrez,
  - type: text
    content: avancez sur la voie de l'intelligence!
  '7':
  - type: text
    content: »Celui qui instruit le moqueur récolte le mépris,
  - type: text
    content: et celui qui reprend le méchant s'attire ses insultes.
  '8':
  - type: text
    content: Ne reprends pas le moqueur si tu ne veux pas qu'il te déteste,
  - type: text
    content: mais reprends le sage et il t'aimera.
  '9':
  - type: text
    content: Donne au sage et il deviendra encore plus sage,
  - type: text
    content: enseigne le juste et il augmentera son savoir.
