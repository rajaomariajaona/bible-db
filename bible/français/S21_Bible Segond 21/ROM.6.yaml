document_id: ROM.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le péché et la grâce
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Que dirons-nous donc? Allons-nous persister dans le péché afin que la grâce se multiplie? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Certainement pas! Nous qui sommes morts pour le péché, comment pourrions-nous encore vivre dans le péché?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ignorez-vous que nous tous qui avons été baptisés en Jésus-Christ, c''est en sa mort que nous avons été baptisés? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Par le baptême en sa mort nous avons donc été ensevelis avec lui afin que, comme Christ est ressuscité par la gloire du Père, de même nous aussi nous menions une vie nouvelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'En effet, si nous avons été unis à lui par une mort semblable à la sienne, nous le serons aussi par une résurrection semblable à la sienne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nous savons que notre vieil homme a été crucifié avec lui afin que le corps du péché soit réduit à l''impuissance et qu''ainsi nous ne soyons plus esclaves du péché. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'En effet, celui qui est mort est libéré du péché. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Or, si nous sommes morts avec Christ, nous croyons que nous vivrons aussi avec lui, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'car nous savons que Christ ressuscité ne meurt plus; la mort n''a plus de pouvoir sur lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Christ est mort, et c''est pour le péché qu''il est mort une fois pour toutes; maintenant qu''il est vivant, c''est pour Dieu qu''il vit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: De la même manière, vous aussi, considérez-vous comme morts pour le péché et comme vivants pour Dieu en Jésus-Christ [notre Seigneur].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Que le péché ne règne donc plus dans votre corps mortel pour vous soumettre à lui par ses désirs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ne mettez plus vos membres au service du péché comme des instruments de l''injustice, mais au contraire livrez-vous vous-mêmes à Dieu comme des morts revenus à la vie et mettez vos membres à son service comme des instruments de la justice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: En effet, le péché n'aura pas de pouvoir sur vous, puisque vous n'êtes plus sous la loi mais sous la grâce.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Quoi donc! Allons-nous pécher parce que nous ne sommes pas sous la loi mais sous la grâce? Certainement pas! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ne savez-vous pas que si vous vous livrez à quelqu''un comme esclaves pour lui obéir, vous êtes les esclaves du maître à qui vous obéissez, soit du péché qui conduit à la mort, soit de l''obéissance qui conduit à la justice? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais que Dieu soit remercié: alors que vous étiez esclaves du péché, vous avez obéi de tout cœur au modèle d''enseignement auquel vous avez été confiés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et une fois libérés du péché, vous êtes devenus esclaves de la justice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '– Je parle à la manière des hommes, à cause de votre faiblesse naturelle. – De même que vous avez mis vos membres comme esclaves au service de l''impureté et de l''injustice pour arriver à plus d''injustice, de même maintenant, mettez vos membres comme esclaves au service de la justice pour progresser dans la sainteté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'En effet, lorsque vous étiez esclaves du péché, vous étiez libres par rapport à la justice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Quels fruits portiez-vous alors? Des fruits dont vous avez honte aujourd''hui, car leur fin, c''est la mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais maintenant que vous avez été libérés du péché et que vous êtes devenus esclaves de Dieu, vous avez pour fruit la progression dans la sainteté et pour fin la vie éternelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: En effet, le salaire du péché, c'est la mort, mais le don gratuit de Dieu, c'est la vie éternelle en Jésus-Christ notre Seigneur.
