document_id: PSA.60,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière après la défaite
  - type: text
    content: 'Au chef de chœur, sur la mélodie «Le lis du témoignage». Hymne de David pour enseigner, '
  '10':
  - type: text
    content: Moab est le bassin
  - type: text
    content: où je me lave, je jette ma sandale sur Edom. Pays des Philistins, pousse des cris contre moi!»
  '11':
  - type: text
    content: Qui me mènera dans la ville fortifiée?
  - type: text
    content: Qui me conduira jusqu'en Edom?
  '12':
  - type: text
    content: N'est-ce pas toi, ô Dieu, qui nous avais repoussés
  - type: text
    content: et qui ne sortais plus, ô Dieu, avec nos armées?
  '13':
  - type: text
    content: Viens nous aider contre notre adversaire!
  - type: text
    content: Le secours de l'homme n'est qu'illusion.
  '14':
  - type: text
    content: 'Avec Dieu, nous ferons des exploits:'
  - type: text
    content: c'est lui qui écrasera nos adversaires.
  '2':
  - type: text
    content: lorsqu'il fit la guerre aux Syriens de Mésopotamie et de Tsoba et que Joab, à son retour, battit 12'000 Edomites dans la vallée du sel.
  '3':
  - type: text
    content: O Dieu, tu nous as repoussés, dispersés,
  - type: text
    content: 'tu t''es irrité: relève-nous!'
  '4':
  - type: text
    content: 'Tu as ébranlé la terre, tu l''as fendue:'
  - type: text
    content: répare ses brèches, car elle est vacillante!
  '5':
  - type: text
    content: Tu as fait voir de dures épreuves à ton peuple,
  - type: text
    content: tu nous as fait boire un vin qui nous a étourdis.
  '6':
  - type: text
    content: Tu as donné à ceux qui te craignent le signal
  - type: text
    content: 'de la fuite devant les archers. '
  - type: text
    content: – Pause.
  '7':
  - type: text
    content: Afin que tes bien-aimés soient délivrés,
  - type: text
    content: sauve-nous par ta main droite et exauce-nous!
  '8':
  - type: text
    content: 'Dieu a dit dans sa sainteté: «Je triompherai,'
  - type: text
    content: je partagerai Sichem, je mesurerai la vallée de Succoth.
  '9':
  - type: text
    content: Galaad est à moi, Manassé est à moi,
  - type: text
    content: Ephraïm est le casque de ma tête,
  - type: text
    content: et Juda mon sceptre.
