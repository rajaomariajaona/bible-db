document_id: PSA.60,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière après la défaite
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'Au chef de chœur, sur la mélodie «Le lis du témoignage». Hymne de David pour enseigner, '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moab est le bassin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où je me lave, je jette ma sandale sur Edom. Pays des Philistins, pousse des cris contre moi!»
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui me mènera dans la ville fortifiée?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui me conduira jusqu'en Edom?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N'est-ce pas toi, ô Dieu, qui nous avais repoussés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui ne sortais plus, ô Dieu, avec nos armées?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Viens nous aider contre notre adversaire!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le secours de l'homme n'est qu'illusion.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Avec Dieu, nous ferons des exploits:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est lui qui écrasera nos adversaires.
  '2':
  - type: usfm
    marker: d
    children:
    - type: text
      text: lorsqu'il fit la guerre aux Syriens de Mésopotamie et de Tsoba et que Joab, à son retour, battit 12'000 Edomites dans la vallée du sel.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Dieu, tu nous as repoussés, dispersés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tu t''es irrité: relève-nous!'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu as ébranlé la terre, tu l''as fendue:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: répare ses brèches, car elle est vacillante!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as fait voir de dures épreuves à ton peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu nous as fait boire un vin qui nous a étourdis.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as donné à ceux qui te craignent le signal
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'de la fuite devant les archers. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Afin que tes bien-aimés soient délivrés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sauve-nous par ta main droite et exauce-nous!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dieu a dit dans sa sainteté: «Je triompherai,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je partagerai Sichem, je mesurerai la vallée de Succoth.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Galaad est à moi, Manassé est à moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraïm est le casque de ma tête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Juda mon sceptre.
