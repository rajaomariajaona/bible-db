document_id: PSA.60
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière après la défaite
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Au chef de chœur, sur la mélodie «Le lis du témoignage». Hymne de David pour enseigner, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: lorsqu'il fit la guerre aux Syriens de Mésopotamie et de Tsoba et que Joab, à son retour, battit 12'000 Edomites dans la vallée du sel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: O Dieu, tu nous as repoussés, dispersés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tu t''es irrité: relève-nous!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tu as ébranlé la terre, tu l''as fendue:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: répare ses brèches, car elle est vacillante!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu as fait voir de dures épreuves à ton peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu nous as fait boire un vin qui nous a étourdis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tu as donné à ceux qui te craignent le signal
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'de la fuite devant les archers. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Afin que tes bien-aimés soient délivrés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sauve-nous par ta main droite et exauce-nous!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dieu a dit dans sa sainteté: «Je triompherai,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je partagerai Sichem, je mesurerai la vallée de Succoth.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Galaad est à moi, Manassé est à moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ephraïm est le casque de ma tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Juda mon sceptre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Moab est le bassin
- type: usfm
  marker: q1
  children:
  - type: text
    text: où je me lave, je jette ma sandale sur Edom. Pays des Philistins, pousse des cris contre moi!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Qui me mènera dans la ville fortifiée?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui me conduira jusqu'en Edom?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: N'est-ce pas toi, ô Dieu, qui nous avais repoussés
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui ne sortais plus, ô Dieu, avec nos armées?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Viens nous aider contre notre adversaire!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le secours de l'homme n'est qu'illusion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Avec Dieu, nous ferons des exploits:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est lui qui écrasera nos adversaires.
