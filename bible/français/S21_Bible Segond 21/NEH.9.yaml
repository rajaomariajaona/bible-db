document_id: NEH.9,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jeûne et confession des péchés
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le vingt-quatrième jour du même mois, les Israélites se sont rassemblés pour un jeûne, habillés de sacs et couverts de poussière. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu as accompli des signes et des prodiges contre le pharaon, contre tous ses serviteurs et contre toute la population de son pays, parce que tu savais avec quelle arrogance ils les traitaient, et tu t''es ainsi fait la réputation qui est la tienne aujourd''hui. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu as fendu la mer devant eux et ils l'ont traversée à pied sec, tandis que tu précipitais leurs poursuivants au fond de l'eau, pareils à une pierre engloutie par des flots impétueux.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Tu les as guidés le jour par une colonne de nuée, et la nuit par une colonne de feu qui éclairait pour eux le chemin qu''ils devaient suivre. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu es descendu sur le mont Sinaï, tu leur as parlé du haut du ciel et tu leur as donné des règles justes, des lois conformes à la vérité, des prescriptions et des commandements excellents. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu leur as fait connaître ton saint sabbat et tu leur as prescrit par l''intermédiaire de ton serviteur Moïse des commandements, des prescriptions et une loi. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '*Tu leur as donné du pain venu du ciel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu leur… ciel: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'repris en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jean 6.31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; allusion à la manne (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Exode 16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' pour apaiser leur faim et tu as fait sortir de l''eau du rocher pour étancher leur soif. Tu leur as ordonné d''entrer en possession du pays que tu avais juré de leur donner.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Cependant, eux qui étaient nos ancêtres, ils ont fait preuve d''arrogance et se sont montrés réfractaires. Ils n''ont pas écouté tes commandements '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et ont même refusé d''obéir. Ils ne se sont pas souvenus de tes merveilles, celles que tu avais accomplies en leur faveur, et se sont montrés réfractaires. Dans leur révolte, ils se sont donné un chef pour retourner à leur esclavage. Mais toi, tu es un Dieu prêt à pardonner, tu fais grâce, tu es rempli de compassion, lent à la colère et riche en bonté, et tu ne les as pas abandonnés. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Non, tu ne les as pas abandonnés, même quand ils se sont fait un veau en métal fondu et ont dit: ‘Voici tes dieux qui t''ont fait sortir d''Egypte’, commettant ainsi l''acte le plus insultant contre toi. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais toi, dans ton immense compassion, tu ne les as pas abandonnés dans le désert: la colonne de nuée n''a pas cessé de les guider sur le bon chemin pendant le jour, ni la colonne de feu d''éclairer pour eux pendant la nuit le chemin qu''ils devaient suivre.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Israélites de naissance se sont séparés de toutes les personnes d''origine étrangère et se sont présentés pour confesser leurs propres péchés ainsi que les fautes de leurs ancêtres. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Tu leur as donné ton bon Esprit pour les rendre sages, tu ne les as pas privés de ta manne et tu as continué à leur fournir de l''eau pour étancher leur soif. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant 40 ans, tu as pourvu à leurs besoins dans le désert, sans qu''ils manquent de rien; leurs vêtements ne se sont pas usés et leurs pieds n''ont pas enflé. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu leur as donné des royaumes et des peuples que tu leur as attribués comme régions frontalières; ils ont ainsi pris possession du pays de Sihon, le roi de Hesbon, ainsi que de celui d''Og, le roi du Basan. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu as rendu leurs fils aussi nombreux que les étoiles du ciel et tu les as fait entrer dans le pays dont tu avais promis à leurs ancêtres qu''ils prendraient possession. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Leurs fils y sont entrés et en ont pris possession. Tu as humilié ses habitants, les Cananéens, devant eux et tu les as livrés entre leurs mains avec leurs rois et les peuples du pays, pour qu''ils les traitent selon leur bon plaisir. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils se sont emparés de villes fortifiées et de terres fertiles, ils ont pris possession de maisons remplies de toutes sortes de biens, de citernes déjà creusées, de vignes, d'oliviers et d'arbres fruitiers déjà nombreux. Ils ont mangé à satiété, au point même de grossir, et ils ont vécu dans les délices grâce à ta grande bonté.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Pourtant, ils se sont soulevés et révoltés contre toi: ils ont délibérément ignoré ta loi, ils ont tué tes prophètes, ceux qui les avertissaient pour les faire revenir à toi, et ont commis les actes les plus insultants contre toi. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors tu les as livrés entre les mains de leurs adversaires, qui les ont opprimés. Cependant, une fois dans la détresse, ils criaient vers toi, et toi, tu les écoutais du haut du ciel: conformément à ta grande compassion, tu leur accordais des libérateurs qui les sauvaient de leurs adversaires. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais, une fois le repos retrouvé, ils recommençaient à faire ce qui est mal devant toi. Alors tu les abandonnais à l''oppression de leurs ennemis, qui exerçaient leur domination sur eux. De nouveau, ils faisaient appel à toi, et toi, tu les écoutais du haut du ciel: conformément à ta compassion, tu les as délivrés de nombreuses fois. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu les as avertis pour les faire revenir à ta loi, mais eux, ils ont fait preuve d''arrogance: ils n''ont pas écouté tes commandements, ils ont péché contre tes règles, alors qu''elles *font vivre l''homme qui les met en pratique'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.29 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Font… pratique: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lévitique 18.5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', ils se sont montrés rebelles et réfractaires, ils n''ont pas obéi. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils se sont levés, chacun à sa place, et on a lu dans le livre de la loi de l'Eternel, leur Dieu, pendant un quart de la journée. Pendant un autre quart, ils ont confessé leurs péchés et se sont prosternés devant l'Eternel, leur Dieu.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu as fait preuve de patience envers eux de nombreuses années durant, tu les as avertis par ton Esprit, par l''intermédiaire de tes prophètes, et ils n''ont pas prêté l''oreille. Alors tu les as livrés entre les mains de populations étrangères. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dans ta grande compassion, cependant, tu ne les as pas exterminés et tu ne les as pas abandonnés, car tu es un Dieu de grâce et de compassion.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Maintenant, notre Dieu, toi qui es le Dieu grand, puissant et redoutable, qui gardes ton alliance et ta bonté, ne considère pas comme insignifiante toute la souffrance que nous avons rencontrée, que ce soient nos rois, nos chefs, nos prêtres, nos prophètes ou nos ancêtres, ton peuple tout entier, depuis l''époque de domination des rois assyriens jusqu''à aujourd''hui! '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour ta part, tu as montré ta justice dans tout ce qui nous est arrivé, car tu as fait preuve de fidélité, alors que nous, nous avons été coupables. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nos rois, nos chefs, nos prêtres et nos ancêtres n''ont pas mis ta loi en pratique et n''ont pas été attentifs à tes commandements ni aux avertissements que tu leur adressais. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu''ils étaient dans leur royaume, jouissant des nombreux bienfaits que tu leur accordais, dans le pays vaste et fertile que tu leur avais donné, ils ne t''ont pas servi et ne se sont pas détournés de leur mauvaise manière d''agir. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et aujourd''hui, nous voici esclaves! Le pays que tu avais donné à nos ancêtres pour qu''ils jouissent de ses produits et de ses biens, nous y sommes esclaves! '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce qu'il produit en abondance est pour les rois que tu as placés au-dessus de nous à cause de nos péchés, et ils dominent selon leur bon plaisir sur notre corps et sur notre bétail! Nous sommes dans une grande détresse.»
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué, Bani, Kadmiel, Shebania, Bunni, Shérébia, Bani et Kenani sont montés sur l''estrade des Lévites et ont crié à pleine voix vers l''Eternel, leur Dieu. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis les Lévites Josué, Kadmiel, Bani, Hashabnia, Shérébia, Hodija, Shebania et Pethachja ont dit:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Levez-vous, bénissez l'Eternel, votre Dieu! Il existe d'éternité en éternité. Que l'on bénisse ton nom glorieux! Il dépasse ce que toute bénédiction et toute louange peuvent en exprimer.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »C'est toi, Eternel, c'est toi seul qui as fait le ciel, les cieux des cieux et toute leur armée, la terre et tout ce qu'elle porte, les mers et tout ce qu'elles contiennent. C'est toi qui donnes la vie à tout cela, et les corps célestes se prosternent devant toi.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»C''est toi, Eternel Dieu, qui as choisi Abram, qui l''as fait sortir d''Ur en Chaldée et qui l''as appelé Abraham. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu as trouvé son cœur fidèle devant toi et tu as fait alliance avec lui: tu as promis de donner à sa descendance le pays des Cananéens, des Hittites, des Amoréens, des Phéréziens, des Jébusiens et des Guirgasiens. Et tu as agi de façon à respecter ton engagement, car tu es juste.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Tu as vu la souffrance de nos ancêtres en Egypte, et tu as entendu leurs cris au bord de la mer des Roseaux. '
