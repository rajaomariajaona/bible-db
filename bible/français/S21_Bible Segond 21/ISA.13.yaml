document_id: ISA.13
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Prophéties sur les nations étrangères
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 13.1–23.18
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie sur Babylone
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Message sur Babylone dont Esaïe, fils d'Amots, a eu la vision.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sur une montagne pelée dressez un étendard,
- type: usfm
  marker: q1
  children:
  - type: text
    text: criez vers eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: faites signe de la main
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu'ils entrent par les portes des nobles!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: J'ai donné des ordres à mes saints,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ai même appelé mes hommes forts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui se réjouissent de ma grandeur, pour qu'ils soient les agents de ma colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: On entend un bruit sur les montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un bruit pareil à celui d'un peuple nombreux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on entend le tapage de royaumes, de nations rassemblées.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est que l'Eternel, le maître de l'univers, passe en revue l'armée destinée à combattre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils viennent d'un pays lointain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: d'une extrémité du ciel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Eternel et les agents de sa fureur
- type: usfm
  marker: q1
  children:
  - type: text
    text: vont dévaster tout le pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Lamentez-vous, *car le jour de l'Eternel est proche!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il vient comme une dévastation décidée par le Tout-Puissant.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Car… Tout-Puissant: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'même texte en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joël 1.15
      metadata:
        usfm: JOL.1.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: C'est pourquoi tous baissent les bras,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les hommes se découragent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ils sont terrifiés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Douleurs et souffrances s'emparent d'eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se tordent de douleur comme une femme prête à accoucher.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils se regardent les uns les autres, stupéfaits:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: leur visage est en feu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Le jour de l'Eternel arrive.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est un jour cruel, un jour de colère et d'ardente fureur
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui transformera la terre en désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: faisant disparaître les pécheurs de sa surface.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: En effet, les étoiles du ciel et leurs constellations
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne diffuseront plus leur lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '*le soleil s''obscurcira dès son lever'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la lune ne fera plus briller sa lumière
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le soleil… lumière: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 24.29
      metadata:
        usfm: MAT.24.29
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Marc 13.24
      metadata:
        usfm: MRK.13.24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: J'interviendrai contre le monde à cause du mal commis
- type: usfm
  marker: q1
  children:
  - type: text
    text: et contre les méchants à cause de leurs fautes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je mettrai un terme à l'orgueil des hommes insolents
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je rabaisserai l'arrogance des hommes violents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je rendrai les êtres humains plus rares que l'or fin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les hommes plus rares que l'or d'Ophir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: C'est pourquoi j'agiterai le ciel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la terre tremblera sur elle-même
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de la fureur de l'Eternel, le maître de l'univers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le jour de son ardente colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Alors, comme une gazelle effarouchée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un troupeau sans berger,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '*chacun se tournera vers son peuple,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: chacun se réfugiera dans son pays
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Chacun… pays: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'même formulation en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jérémie 50.16
      metadata:
        usfm: JER.50.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tous ceux que l'on trouvera seront transpercés
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous ceux que l'on attrapera tomberont sous les coups de l'épée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Leurs enfants seront écrasés sous leurs yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs maisons seront pillées et leurs femmes seront violées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Voici que je réveille contre eux les Mèdes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne s'intéressent pas à l'argent
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne désirent pas l'or.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: De leurs arcs ils abattront les jeunes garçons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils n'auront aucune compassion pour les nouveau-nés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leur regard sera sans pitié pour les enfants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Alors Babylone, l'ornement des royaumes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la fière parure des Babyloniens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: connaîtra la catastrophe dont Dieu a frappé Sodome et Gomorrhe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Elle ne sera plus jamais habitée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle ne sera plus jamais peuplée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Arabe n'y dressera pas sa tente
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les bergers n'y feront pas dormir leurs troupeaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ce sont les bêtes du désert qui y auront leur tanière.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les hiboux envahiront ses maisons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les autruches s'y installeront
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les boucs viendront y faire leurs bonds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Les hyènes hurleront dans ses palais
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les chiens sauvages dans ses résidences de luxe.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le moment fixé pour elle est bientôt là
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son existence ne sera pas prolongée.
