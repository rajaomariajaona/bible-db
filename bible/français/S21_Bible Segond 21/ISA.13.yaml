document_id: ISA.13,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophéties sur les nations étrangères
  - type: heading
    content: 13.1–23.18
  - type: heading
    content: Prophétie sur Babylone
  - type: text
    content: Message sur Babylone dont Esaïe, fils d'Amots, a eu la vision.
  '10':
  - type: text
    content: En effet, les étoiles du ciel et leurs constellations
  - type: text
    content: ne diffuseront plus leur lumière,
  - type: text
    content: '*le soleil s''obscurcira dès son lever'
  - type: text
    content: et la lune ne fera plus briller sa lumière
  - type: note
    content: 'Le soleil… lumière: cité en Matthieu 24.29; Marc 13.24.'
  - type: text
    content: .
  '11':
  - type: text
    content: J'interviendrai contre le monde à cause du mal commis
  - type: text
    content: et contre les méchants à cause de leurs fautes.
  - type: text
    content: Je mettrai un terme à l'orgueil des hommes insolents
  - type: text
    content: et je rabaisserai l'arrogance des hommes violents.
  '12':
  - type: text
    content: Je rendrai les êtres humains plus rares que l'or fin,
  - type: text
    content: les hommes plus rares que l'or d'Ophir.
  '13':
  - type: text
    content: C'est pourquoi j'agiterai le ciel
  - type: text
    content: et la terre tremblera sur elle-même
  - type: text
    content: à cause de la fureur de l'Eternel, le maître de l'univers,
  - type: text
    content: le jour de son ardente colère.
  '14':
  - type: text
    content: Alors, comme une gazelle effarouchée,
  - type: text
    content: comme un troupeau sans berger,
  - type: text
    content: '*chacun se tournera vers son peuple,'
  - type: text
    content: chacun se réfugiera dans son pays
  - type: note
    content: 'Chacun… pays: même formulation en Jérémie 50.16.'
  - type: text
    content: .
  '15':
  - type: text
    content: Tous ceux que l'on trouvera seront transpercés
  - type: text
    content: et tous ceux que l'on attrapera tomberont sous les coups de l'épée.
  '16':
  - type: text
    content: Leurs enfants seront écrasés sous leurs yeux,
  - type: text
    content: leurs maisons seront pillées et leurs femmes seront violées.
  '17':
  - type: text
    content: Voici que je réveille contre eux les Mèdes.
  - type: text
    content: Ils ne s'intéressent pas à l'argent
  - type: text
    content: et ne désirent pas l'or.
  '18':
  - type: text
    content: De leurs arcs ils abattront les jeunes garçons,
  - type: text
    content: ils n'auront aucune compassion pour les nouveau-nés,
  - type: text
    content: leur regard sera sans pitié pour les enfants.
  '19':
  - type: text
    content: Alors Babylone, l'ornement des royaumes,
  - type: text
    content: la fière parure des Babyloniens,
  - type: text
    content: connaîtra la catastrophe dont Dieu a frappé Sodome et Gomorrhe.
  '2':
  - type: text
    content: Sur une montagne pelée dressez un étendard,
  - type: text
    content: criez vers eux,
  - type: text
    content: faites signe de la main
  - type: text
    content: et qu'ils entrent par les portes des nobles!
  '20':
  - type: text
    content: Elle ne sera plus jamais habitée,
  - type: text
    content: elle ne sera plus jamais peuplée.
  - type: text
    content: L'Arabe n'y dressera pas sa tente
  - type: text
    content: et les bergers n'y feront pas dormir leurs troupeaux.
  '21':
  - type: text
    content: Ce sont les bêtes du désert qui y auront leur tanière.
  - type: text
    content: Les hiboux envahiront ses maisons,
  - type: text
    content: les autruches s'y installeront
  - type: text
    content: et les boucs viendront y faire leurs bonds.
  '22':
  - type: text
    content: Les hyènes hurleront dans ses palais
  - type: text
    content: et les chiens sauvages dans ses résidences de luxe.
  - type: text
    content: Le moment fixé pour elle est bientôt là
  - type: text
    content: et son existence ne sera pas prolongée.
  '3':
  - type: text
    content: J'ai donné des ordres à mes saints,
  - type: text
    content: j'ai même appelé mes hommes forts,
  - type: text
    content: ceux qui se réjouissent de ma grandeur, pour qu'ils soient les agents de ma colère.
  '4':
  - type: text
    content: On entend un bruit sur les montagnes,
  - type: text
    content: un bruit pareil à celui d'un peuple nombreux,
  - type: text
    content: on entend le tapage de royaumes, de nations rassemblées.
  - type: text
    content: C'est que l'Eternel, le maître de l'univers, passe en revue l'armée destinée à combattre.
  '5':
  - type: text
    content: Ils viennent d'un pays lointain,
  - type: text
    content: d'une extrémité du ciel.
  - type: text
    content: L'Eternel et les agents de sa fureur
  - type: text
    content: vont dévaster tout le pays.
  '6':
  - type: text
    content: Lamentez-vous, *car le jour de l'Eternel est proche!
  - type: text
    content: Il vient comme une dévastation décidée par le Tout-Puissant.
  - type: note
    content: 'Car… Tout-Puissant: même texte en Joël 1.15.'
  '7':
  - type: text
    content: C'est pourquoi tous baissent les bras,
  - type: text
    content: tous les hommes se découragent.
  '8':
  - type: text
    content: Ils sont terrifiés.
  - type: text
    content: Douleurs et souffrances s'emparent d'eux,
  - type: text
    content: ils se tordent de douleur comme une femme prête à accoucher.
  - type: text
    content: 'Ils se regardent les uns les autres, stupéfaits:'
  - type: text
    content: leur visage est en feu.
  '9':
  - type: text
    content: Le jour de l'Eternel arrive.
  - type: text
    content: C'est un jour cruel, un jour de colère et d'ardente fureur
  - type: text
    content: qui transformera la terre en désert,
  - type: text
    content: faisant disparaître les pécheurs de sa surface.
