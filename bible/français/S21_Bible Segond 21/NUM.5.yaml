document_id: NUM.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lois sur la pureté, le vol, la jalousie conjugale
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Ordonne aux Israélites de renvoyer du camp tout lépreux et toute personne qui a un écoulement ou est souillée par un mort. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hommes ou femmes, vous les renverrez à l''extérieur du camp, vous les renverrez afin qu''ils ne souillent pas le camp au milieu duquel je demeure.» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'C''est ce que firent les Israélites: ils renvoyèrent ces personnes à l''extérieur du camp; les Israélites agirent comme l''Eternel l''avait ordonné à Moïse.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '«Transmets ces instructions aux Israélites: Lorsqu''un homme ou une femme péchera contre son prochain en commettant une infidélité envers l''Eternel et qu''il se rendra ainsi coupable, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'il confessera son péché et il restituera l''objet mal acquis dans son intégralité en y ajoutant un cinquième. Il le remettra à celui envers qui il s''est rendu coupable. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'S''il n''y a personne qui ait droit à la restitution de l''objet mal acquis, cet objet revient à l''Eternel, au prêtre, en plus du bélier expiatoire avec lequel on fera l''expiation pour le coupable. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Toute part prélevée sur les offrandes consacrées par les Israélites appartiendra au prêtre à qui elles seront présentées. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ce qu'on aura consacré lui appartiendra, ce qu'on lui aura remis lui appartiendra.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '«Transmets ces instructions aux Israélites: Supposons qu''une femme se détourne de son mari et lui devienne infidèle, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'qu''un autre couche avec elle à l''insu de son mari et qu''elle se rende impure en secret, sans qu''il y ait de témoin contre elle et sans qu''elle soit prise sur le fait; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'supposons que le mari soit saisi d''un esprit de jalousie et soupçonne sa femme, qu''elle se soit effectivement rendue impure ou non. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le mari amènera sa femme au prêtre et apportera en offrande pour elle 2 litres de farine d''orge. Il n''y versera pas d''huile et n''y mettra pas d''encens, car c''est une offrande de jalousie, une offrande de souvenir qui rappelle une faute. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le prêtre fera approcher la femme et la fera se tenir debout devant l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il prendra de l''eau consacrée dans un récipient en terre, il prendra aussi de la poussière sur le sol du tabernacle et la mettra dans l''eau. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Le prêtre fera tenir la femme debout devant l'Eternel. Il défera la chevelure de la femme et posera sur ses mains l'offrande de souvenir, l'offrande de jalousie, tandis que lui-même tiendra dans sa main l'eau amère qui apporte la malédiction.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '»Le prêtre fera jurer la femme et lui dira: ‘Si aucun homme n''a couché avec toi et si tu ne t''es pas tournée vers un autre que ton mari pour te rendre impure, sois reconnue innocente par cette eau amère porteuse de malédiction. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais si tu t''es tournée vers un autre que ton mari et t''es rendue impure, si un autre homme que ton mari a couché avec toi…’ '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le prêtre fera jurer la femme avec un serment de malédiction et ajoutera: ‘Que l''Eternel te fasse servir d''exemple dans les malédictions et les serments au milieu de ton peuple en faisant dessécher ta cuisse et enfler ton ventre, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'et que cette eau porteuse de malédiction pénètre dans tes entrailles pour te faire enfler le ventre et dessécher la cuisse!’ Et la femme dira: ‘Amen! Amen!’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '»Le prêtre écrira ces malédictions dans un livre, puis les effacera avec l''eau amère. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il fera boire à la femme l''eau amère porteuse de malédiction et cette eau entrera en elle pour produire l''amertume. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Le prêtre prendra l''offrande de jalousie des mains de la femme, fera le geste de présentation devant l''Eternel et l''offrira sur l''autel. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il prendra une poignée de cette offrande comme souvenir et la brûlera sur l''autel. C''est après cela qu''il fera boire l''eau à la femme. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Quand il aura fait boire l''eau, si la femme s''est rendue impure et a été infidèle à son mari, l''eau porteuse de malédiction entrera en elle pour produire l''amertume; son ventre enflera, sa cuisse se desséchera et cette femme servira d''exemple dans les malédictions au milieu de son peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Mais si la femme ne s'est pas rendue impure, si elle est pure, elle sera reconnue innocente et aura des enfants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '»Telle est la loi sur la jalousie, pour le cas où une femme se tourne vers un autre que son mari et se rend impure, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'et pour le cas où un mari saisi d''un esprit de jalousie soupçonne sa femme. Le prêtre la fera se tenir debout devant l''Eternel et lui appliquera cette loi dans son intégralité. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Le mari sera considéré comme innocent, mais la femme supportera les conséquences de sa faute.»
