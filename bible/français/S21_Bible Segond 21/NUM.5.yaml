document_id: NUM.5,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Lois sur la pureté, le vol, la jalousie conjugale
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '10':
  - type: text
    content: Ce qu'on aura consacré lui appartiendra, ce qu'on lui aura remis lui appartiendra.»
  '11':
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '12':
  - type: text
    content: '«Transmets ces instructions aux Israélites: Supposons qu''une femme se détourne de son mari et lui devienne infidèle, '
  '13':
  - type: text
    content: 'qu''un autre couche avec elle à l''insu de son mari et qu''elle se rende impure en secret, sans qu''il y ait de témoin contre elle et sans qu''elle soit prise sur le fait; '
  '14':
  - type: text
    content: 'supposons que le mari soit saisi d''un esprit de jalousie et soupçonne sa femme, qu''elle se soit effectivement rendue impure ou non. '
  '15':
  - type: text
    content: 'Le mari amènera sa femme au prêtre et apportera en offrande pour elle 2 litres de farine d''orge. Il n''y versera pas d''huile et n''y mettra pas d''encens, car c''est une offrande de jalousie, une offrande de souvenir qui rappelle une faute. '
  '16':
  - type: text
    content: 'Le prêtre fera approcher la femme et la fera se tenir debout devant l''Eternel. '
  '17':
  - type: text
    content: 'Il prendra de l''eau consacrée dans un récipient en terre, il prendra aussi de la poussière sur le sol du tabernacle et la mettra dans l''eau. '
  '18':
  - type: text
    content: Le prêtre fera tenir la femme debout devant l'Eternel. Il défera la chevelure de la femme et posera sur ses mains l'offrande de souvenir, l'offrande de jalousie, tandis que lui-même tiendra dans sa main l'eau amère qui apporte la malédiction.
  '19':
  - type: text
    content: '»Le prêtre fera jurer la femme et lui dira: ‘Si aucun homme n''a couché avec toi et si tu ne t''es pas tournée vers un autre que ton mari pour te rendre impure, sois reconnue innocente par cette eau amère porteuse de malédiction. '
  '2':
  - type: text
    content: '«Ordonne aux Israélites de renvoyer du camp tout lépreux et toute personne qui a un écoulement ou est souillée par un mort. '
  '20':
  - type: text
    content: 'Mais si tu t''es tournée vers un autre que ton mari et t''es rendue impure, si un autre homme que ton mari a couché avec toi…’ '
  '21':
  - type: text
    content: 'Le prêtre fera jurer la femme avec un serment de malédiction et ajoutera: ‘Que l''Eternel te fasse servir d''exemple dans les malédictions et les serments au milieu de ton peuple en faisant dessécher ta cuisse et enfler ton ventre, '
  '22':
  - type: text
    content: 'et que cette eau porteuse de malédiction pénètre dans tes entrailles pour te faire enfler le ventre et dessécher la cuisse!’ Et la femme dira: ‘Amen! Amen!’'
  '23':
  - type: text
    content: '»Le prêtre écrira ces malédictions dans un livre, puis les effacera avec l''eau amère. '
  '24':
  - type: text
    content: 'Il fera boire à la femme l''eau amère porteuse de malédiction et cette eau entrera en elle pour produire l''amertume. '
  '25':
  - type: text
    content: 'Le prêtre prendra l''offrande de jalousie des mains de la femme, fera le geste de présentation devant l''Eternel et l''offrira sur l''autel. '
  '26':
  - type: text
    content: 'Il prendra une poignée de cette offrande comme souvenir et la brûlera sur l''autel. C''est après cela qu''il fera boire l''eau à la femme. '
  '27':
  - type: text
    content: 'Quand il aura fait boire l''eau, si la femme s''est rendue impure et a été infidèle à son mari, l''eau porteuse de malédiction entrera en elle pour produire l''amertume; son ventre enflera, sa cuisse se desséchera et cette femme servira d''exemple dans les malédictions au milieu de son peuple. '
  '28':
  - type: text
    content: Mais si la femme ne s'est pas rendue impure, si elle est pure, elle sera reconnue innocente et aura des enfants.
  '29':
  - type: text
    content: '»Telle est la loi sur la jalousie, pour le cas où une femme se tourne vers un autre que son mari et se rend impure, '
  '3':
  - type: text
    content: 'Hommes ou femmes, vous les renverrez à l''extérieur du camp, vous les renverrez afin qu''ils ne souillent pas le camp au milieu duquel je demeure.» '
  '30':
  - type: text
    content: 'et pour le cas où un mari saisi d''un esprit de jalousie soupçonne sa femme. Le prêtre la fera se tenir debout devant l''Eternel et lui appliquera cette loi dans son intégralité. '
  '31':
  - type: text
    content: Le mari sera considéré comme innocent, mais la femme supportera les conséquences de sa faute.»
  '4':
  - type: text
    content: 'C''est ce que firent les Israélites: ils renvoyèrent ces personnes à l''extérieur du camp; les Israélites agirent comme l''Eternel l''avait ordonné à Moïse.'
  '5':
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '6':
  - type: text
    content: '«Transmets ces instructions aux Israélites: Lorsqu''un homme ou une femme péchera contre son prochain en commettant une infidélité envers l''Eternel et qu''il se rendra ainsi coupable, '
  '7':
  - type: text
    content: 'il confessera son péché et il restituera l''objet mal acquis dans son intégralité en y ajoutant un cinquième. Il le remettra à celui envers qui il s''est rendu coupable. '
  '8':
  - type: text
    content: 'S''il n''y a personne qui ait droit à la restitution de l''objet mal acquis, cet objet revient à l''Eternel, au prêtre, en plus du bélier expiatoire avec lequel on fera l''expiation pour le coupable. '
  '9':
  - type: text
    content: 'Toute part prélevée sur les offrandes consacrées par les Israélites appartiendra au prêtre à qui elles seront présentées. '
