document_id: 1KI.16
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La parole de l''Eternel fut adressée à Jéhu, le fils de Hanani, contre Baesha: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Je t''ai tiré de la poussière et je t''ai établi chef de mon peuple, d''Israël. Cependant, parce que tu as marché sur la voie de Jéroboam et que tu as fait pécher mon peuple, Israël, en m''irritant par leurs péchés, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'je vais balayer Baesha et sa famille. Je vais rendre ta famille pareille à celle de Jéroboam, le fils de Nebath: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: le membre de la famille de Baesha qui mourra dans la ville sera mangé par les chiens, et celui des siens qui mourra dans les champs sera mangé par les oiseaux.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Le reste des actes de Baesha, ce qu'il a accompli et ses exploits, cela est décrit dans les annales des rois d'Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Baesha se coucha avec ses ancêtres et il fut enterré à Thirtsa. Son fils Ela devint roi à sa place.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: La parole de l'Eternel avait été adressée par l'intermédiaire du prophète Jéhu, fils de Hanani, à Baesha et à sa famille, à cause de tout le mal qu'il avait fait aux yeux de l'Eternel, en l'irritant par sa manière d'agir et en imitant la famille de Jéroboam, mais aussi parce qu'il avait frappé la famille de Jéroboam.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne d'Ela sur Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: La vingt-sixième année du règne d'Asa sur Juda, Ela, le fils de Baesha, devint roi d'Israël à Thirtsa. Il régna 2 ans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Son serviteur Zimri, qui commandait la moitié de ses chars, conspira contre lui. Ela se trouvait à Thirtsa. Il buvait jusqu''à en devenir ivre dans la maison d''Artsa, le chef du palais royal, à Thirtsa. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Zimri entra et le frappa à mort, la vingt-septième année du règne d''Asa sur Juda, et il devint roi à sa place. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dès qu''il fut roi et se fut assis sur son trône, il frappa toute la famille de Baesha, il ne laissa survivre aucun homme qui lui appartienne, ni parent ni ami. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Zimri extermina toute la famille de Baesha, conformément à la parole que l''Eternel avait adressée à Baesha par l''intermédiaire du prophète Jéhu. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Cela arriva à cause de tous les péchés que Baesha et son fils Ela avaient commis et qu'ils avaient fait commettre à Israël, irritant l'Eternel, le Dieu d'Israël, par leurs idoles sans consistance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Le reste des actes d'Ela, tout ce qu'il a accompli, cela est décrit dans les annales des rois d'Israël.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne de Zimri sur Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'La vingt-septième année du règne d''Asa sur Juda, Zimri régna 7 jours à Thirtsa. Le peuple faisait campagne contre Guibbethon, une ville qui appartenait aux Philistins, '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'et il entendit dire: «Zimri a conspiré, il a même tué le roi!» Ce jour-là, dans le camp, tous les Israélites proclamèrent Omri, le chef de l''armée, roi d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Omri partit avec tout Israël de Guibbethon, et ils assiégèrent Thirtsa. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Voyant que la ville était prise, Zimri se retira dans une partie fortifiée du palais et brûla le palais royal sur lui. C''est ainsi qu''il mourut, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: à cause des péchés qu'il avait commis en faisant ce qui est mal aux yeux de l'Eternel, en marchant sur la voie de Jéroboam et en se livrant aux péchés que Jéroboam avait commis pour faire pécher Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Le reste des actes de Zimri, la conspiration qu'il a formée, cela est décrit dans les annales des rois d'Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le peuple d''Israël se divisa alors en deux partis: une moitié du peuple voulait proclamer roi Thibni, le fils de Guinath, et l''autre moitié était pour Omri. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Les partisans d'Omri l'emportèrent sur ceux de Thibni, le fils de Guinath. Thibni mourut et ce fut Omri qui devint roi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne d'Omri sur Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'La trente et unième année du règne d''Asa sur Juda, Omri devint roi sur Israël. Il régna 12 ans. Après avoir régné 6 ans à Thirtsa, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: il acheta pour 70 kilos d'argent la montagne de Samarie à un certain Shémer. Il fit des travaux de construction sur la montagne et il appela la ville qu'il construisit Samarie, d'après le nom de Shémer, celui qui avait été le seigneur de cette montagne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Omri fit ce qui est mal aux yeux de l''Eternel, et il agit plus mal encore que tous ses prédécesseurs. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Il marcha entièrement sur la voie de Jéroboam, fils de Nebath; il se livra aux péchés que celui-ci avait fait commettre à Israël, irritant l'Eternel, le Dieu d'Israël, par leurs idoles sans consistance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Le reste des actes d'Omri, ce qu'il a accompli et ses exploits, cela est décrit dans les annales des rois d'Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Omri se coucha avec ses ancêtres et il fut enterré à Samarie. Son fils Achab devint roi à sa place.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne d'Achab et Jézabel sur Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Achab, le fils d'Omri, devint roi d'Israël la trente-huitième année du règne d'Asa sur Juda. Il régna 22 ans sur Israël à Samarie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Achab, le fils d''Omri, fit ce qui est mal aux yeux de l''Eternel, plus que tous ses prédécesseurs. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Comme si cela ne lui suffisait pas de se livrer aux péchés de Jéroboam, fils de Nebath, il prit pour femme Jézabel, la fille d'Ethbaal, le roi des Sidoniens, et il alla servir Baal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Baal: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir la note sur '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Juges 2.11
      metadata:
        usfm: JDG.2.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et se prosterner devant lui. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il érigea un autel à Baal dans le temple de Baal qu''il construisit à Samarie, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: et il fabriqua un poteau sacré. Achab fit plus encore que tous les rois d'Israël qui l'avaient précédé pour irriter l'Eternel, le Dieu d'Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: A son époque, un certain Hiel de Béthel reconstruisit Jéricho. Il en jeta les fondations au prix d'Abiram, son aîné, et il en posa les portes au prix de Segub, son plus jeune fils, conformément à la parole que l'Eternel avait dite par l'intermédiaire de Josué, le fils de Nun.
