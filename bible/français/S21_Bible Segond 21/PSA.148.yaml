document_id: PSA.148,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Louange universelle de la création
  - type: text
    content: Louez l'Eternel!
  - type: text
    content: Louez l'Eternel du haut du ciel!
  - type: text
    content: Louez-le dans les hauteurs!
  '10':
  - type: text
    content: animaux sauvages et tout le bétail,
  - type: text
    content: reptiles et oiseaux ailés,
  '11':
  - type: text
    content: rois du monde et tous les peuples,
  - type: text
    content: princes et tous les juges de la terre,
  '12':
  - type: text
    content: jeunes gens et jeunes filles,
  - type: text
    content: vieillards et enfants!
  '13':
  - type: text
    content: Qu'ils louent le nom de l'Eternel,
  - type: text
    content: car son nom seul est élevé,
  - type: text
    content: sa majesté domine la terre et le ciel.
  '14':
  - type: text
    content: 'Il a relevé la force de son peuple:'
  - type: text
    content: c'est un sujet de louange pour tous ses fidèles,
  - type: text
    content: pour les Israélites, pour le peuple qui est près de lui.
  - type: text
    content: Louez l'Eternel!
  '2':
  - type: text
    content: Louez-le, vous tous ses anges!
  - type: text
    content: Louez-le, vous toutes ses armées!
  '3':
  - type: text
    content: Louez-le, soleil et lune!
  - type: text
    content: Louez-le, vous toutes, étoiles lumineuses!
  '4':
  - type: text
    content: Louez-le, cieux des cieux,
  - type: text
    content: et vous, les eaux qui êtes au-dessus du ciel!
  '5':
  - type: text
    content: Qu'ils louent le nom de l'Eternel,
  - type: text
    content: car il a donné ses ordres et ils ont été créés!
  '6':
  - type: text
    content: Il les a établis pour toujours et à perpétuité;
  - type: text
    content: il a donné des lois et il ne les violera pas.
  '7':
  - type: text
    content: Louez l'Eternel depuis la terre,
  - type: text
    content: vous, monstres marins, et vous tous, océans,
  '8':
  - type: text
    content: foudre et grêle, neige et brouillards,
  - type: text
    content: vents de tempête qui exécutez ses ordres,
  '9':
  - type: text
    content: montagnes et toutes les collines,
  - type: text
    content: arbres fruitiers et tous les cèdres,
