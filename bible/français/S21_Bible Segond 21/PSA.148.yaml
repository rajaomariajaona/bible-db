document_id: PSA.148,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Louange universelle de la création
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l'Eternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l'Eternel du haut du ciel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez-le dans les hauteurs!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: animaux sauvages et tout le bétail,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: reptiles et oiseaux ailés,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rois du monde et tous les peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: princes et tous les juges de la terre,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jeunes gens et jeunes filles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vieillards et enfants!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'ils louent le nom de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car son nom seul est élevé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa majesté domine la terre et le ciel.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il a relevé la force de son peuple:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est un sujet de louange pour tous ses fidèles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour les Israélites, pour le peuple qui est près de lui.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l'Eternel!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez-le, vous tous ses anges!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez-le, vous toutes ses armées!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez-le, soleil et lune!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez-le, vous toutes, étoiles lumineuses!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez-le, cieux des cieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous, les eaux qui êtes au-dessus du ciel!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'ils louent le nom de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il a donné ses ordres et ils ont été créés!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il les a établis pour toujours et à perpétuité;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a donné des lois et il ne les violera pas.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l'Eternel depuis la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous, monstres marins, et vous tous, océans,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: foudre et grêle, neige et brouillards,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vents de tempête qui exécutez ses ordres,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: montagnes et toutes les collines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: arbres fruitiers et tous les cèdres,
