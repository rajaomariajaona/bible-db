document_id: PSA.97,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les jugements de Dieu
  - type: text
    content: 'L''Eternel règne: que la terre soit dans l''allégresse,'
  - type: text
    content: que les îles nombreuses se réjouissent!
  '10':
  - type: text
    content: '*Vous qui aimez l''Eternel, ayez le mal en horreur!'
  - type: note
    content: 'Vous qui… horreur: cité en 2 Timothée 2.19.'
  - type: text
    content: Il garde ses fidèles,
  - type: text
    content: il les délivre des méchants.
  '11':
  - type: text
    content: La lumière est semée pour le juste,
  - type: text
    content: et la joie pour ceux dont le cœur est droit.
  '12':
  - type: text
    content: Justes, réjouissez-vous en l'Eternel
  - type: text
    content: et célébrez sa sainteté par vos louanges!
  '2':
  - type: text
    content: Les nuages et l'obscurité l'environnent,
  - type: text
    content: la justice et le droit forment la base de son trône.
  '3':
  - type: text
    content: Le feu marche devant lui
  - type: text
    content: et embrase de tous côtés ses adversaires;
  '4':
  - type: text
    content: ses éclairs illuminent le monde.
  - type: text
    content: La terre le voit et tremble.
  '5':
  - type: text
    content: Les montagnes fondent comme de la cire devant l'Eternel,
  - type: text
    content: devant le Seigneur de toute la terre.
  '6':
  - type: text
    content: Le ciel proclame sa justice,
  - type: text
    content: et tous les peuples voient sa gloire.
  '7':
  - type: text
    content: Ils sont couverts de honte, tous ceux qui servent les sculptures sacrées,
  - type: text
    content: qui se vantent de leurs faux dieux.
  - type: text
    content: '*Que tous les dieux se prosternent devant lui!'
  - type: note
    content: 'Que tous… lui: cité en Hébreux 1.6 (d''après la Septante), avec mention des anges de Dieu et non des dieux.'
  '8':
  - type: text
    content: Sion l'entend et se réjouit,
  - type: text
    content: les villes de Juda sont dans l'allégresse
  - type: text
    content: à cause de tes jugements, Eternel,
  '9':
  - type: text
    content: car toi, Eternel, tu es le Très-Haut qui domines toute la terre,
  - type: text
    content: tu es bien au-dessus de tous les dieux.
