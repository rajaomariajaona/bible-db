document_id: PSA.97,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les jugements de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L''Eternel règne: que la terre soit dans l''allégresse,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que les îles nombreuses se réjouissent!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '*Vous qui aimez l''Eternel, ayez le mal en horreur!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '97.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Vous qui… horreur: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Timothée 2.19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il garde ses fidèles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il les délivre des méchants.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: La lumière est semée pour le juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la joie pour ceux dont le cœur est droit.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Justes, réjouissez-vous en l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et célébrez sa sainteté par vos louanges!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Les nuages et l'obscurité l'environnent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la justice et le droit forment la base de son trône.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Le feu marche devant lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et embrase de tous côtés ses adversaires;
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ses éclairs illuminent le monde.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terre le voit et tremble.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Les montagnes fondent comme de la cire devant l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: devant le Seigneur de toute la terre.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Le ciel proclame sa justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous les peuples voient sa gloire.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ils sont couverts de honte, tous ceux qui servent les sculptures sacrées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui se vantent de leurs faux dieux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*Que tous les dieux se prosternent devant lui!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '97.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Que tous… lui: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hébreux 1.6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (d''après la Septante), avec mention des anges de Dieu et non des dieux.'
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Sion l'entend et se réjouit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les villes de Juda sont dans l'allégresse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de tes jugements, Eternel,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: car toi, Eternel, tu es le Très-Haut qui domines toute la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu es bien au-dessus de tous les dieux.
