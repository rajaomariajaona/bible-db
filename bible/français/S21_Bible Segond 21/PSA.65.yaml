document_id: PSA.65
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Louange à Dieu pour ses bienfaits
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Psaume de David, chant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: A toi, ô Dieu qui résides à Sion, va notre attente confiante, notre louange.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour toi, nous accomplirons nos vœux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Toi qui écoutes la prière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les hommes viendront à toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Mes fautes m'accablent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais tu pardonnes nos transgressions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Heureux celui que tu choisis et que tu fais approcher de toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour qu'il habite dans tes parvis!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous nous rassasierons des biens de ta maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de la sainteté de ton temple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Dans ta justice, tu nous réponds par des prodiges, Dieu de notre salut.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En toi se confient les extrémités de la terre et les mers lointaines.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il affermit les montagnes par sa force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a la puissance pour ceinture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il apaise le tapage des mers, le tapage de leurs vagues
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le grondement des peuples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ceux qui habitent aux extrémités du monde s'effraient des signes que tu accomplis;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu remplis d'allégresse le levant et le couchant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tu prends soin de la terre et tu lui donnes l'abondance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu la combles de richesses.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le ruisseau de Dieu est plein d'eau;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu prépares le blé, quand tu la fertilises ainsi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tu arroses ses sillons, tu aplanis ses mottes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu la détrempes par des pluies, tu bénis ses pousses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tu couronnes l'année de tes biens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ton passage apporte l'abondance;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: les plaines du désert sont arrosées
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les collines sont entourées d'allégresse;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: les pâturages se couvrent de brebis
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les vallées se revêtent de blé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les cris de joie et les chants retentissent.
