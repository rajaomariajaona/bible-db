document_id: PSA.65,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Louange à Dieu pour ses bienfaits
  - type: text
    content: Au chef de chœur. Psaume de David, chant.
  '10':
  - type: text
    content: Tu prends soin de la terre et tu lui donnes l'abondance,
  - type: text
    content: tu la combles de richesses.
  - type: text
    content: Le ruisseau de Dieu est plein d'eau;
  - type: text
    content: tu prépares le blé, quand tu la fertilises ainsi.
  '11':
  - type: text
    content: Tu arroses ses sillons, tu aplanis ses mottes,
  - type: text
    content: tu la détrempes par des pluies, tu bénis ses pousses.
  '12':
  - type: text
    content: Tu couronnes l'année de tes biens,
  - type: text
    content: et ton passage apporte l'abondance;
  '13':
  - type: text
    content: les plaines du désert sont arrosées
  - type: text
    content: et les collines sont entourées d'allégresse;
  '14':
  - type: text
    content: les pâturages se couvrent de brebis
  - type: text
    content: et les vallées se revêtent de blé.
  - type: text
    content: Les cris de joie et les chants retentissent.
  '2':
  - type: text
    content: A toi, ô Dieu qui résides à Sion, va notre attente confiante, notre louange.
  - type: text
    content: Pour toi, nous accomplirons nos vœux.
  '3':
  - type: text
    content: Toi qui écoutes la prière,
  - type: text
    content: tous les hommes viendront à toi.
  '4':
  - type: text
    content: Mes fautes m'accablent,
  - type: text
    content: mais tu pardonnes nos transgressions.
  '5':
  - type: text
    content: Heureux celui que tu choisis et que tu fais approcher de toi
  - type: text
    content: pour qu'il habite dans tes parvis!
  - type: text
    content: Nous nous rassasierons des biens de ta maison,
  - type: text
    content: de la sainteté de ton temple.
  '6':
  - type: text
    content: Dans ta justice, tu nous réponds par des prodiges, Dieu de notre salut.
  - type: text
    content: En toi se confient les extrémités de la terre et les mers lointaines.
  '7':
  - type: text
    content: Il affermit les montagnes par sa force,
  - type: text
    content: il a la puissance pour ceinture.
  '8':
  - type: text
    content: Il apaise le tapage des mers, le tapage de leurs vagues
  - type: text
    content: et le grondement des peuples.
  '9':
  - type: text
    content: Ceux qui habitent aux extrémités du monde s'effraient des signes que tu accomplis;
  - type: text
    content: tu remplis d'allégresse le levant et le couchant.
