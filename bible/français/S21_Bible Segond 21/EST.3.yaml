document_id: EST.3
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Menace contre les Juifs
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 3.1–9.19
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Edit d'Haman contre les Juifs
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après ces événements, le roi Assuérus accorda plus d''importance et de pouvoir à Haman, fils d''Hammedatha, l''Agaguite. Il lui donna une position supérieure à celle de tous les princes de son entourage. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tous les serviteurs du roi qui se tenaient à la porte du roi pliaient le genou et se prosternaient devant Haman, car cela correspondait aux ordres du roi à son sujet. Mardochée, cependant, ne pliait pas le genou et ne se prosternait pas. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Les serviteurs du roi qui se tenaient à la porte du roi lui dirent: «Pourquoi enfreins-tu l''ordre du roi?» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Comme ils le lui répétaient chaque jour et qu''il ne les écoutait pas, ils informèrent Haman de son attitude pour voir s''il persisterait dans sa décision. En effet, il leur avait dit qu''il était juif. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Haman s''aperçut qu''effectivement Mardochée ne pliait pas le genou et ne se prosternait pas devant lui, et il fut rempli de colère. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Cependant, il ne jugea pas suffisant de porter la main contre Mardochée seul. En effet, on lui avait révélé à quel peuple celui-ci appartenait et il chercha à exterminer tous les Juifs installés dans tout le royaume d'Assuérus, à savoir le peuple de Mardochée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: La douzième année du règne d'Assuérus, le premier mois, c'est-à-dire le mois de Nisan, on jeta le «pour» – c'est-à-dire le sort – devant Haman pour chaque jour et chaque mois successivement, et le sort désigna le douzième mois, c'est-à-dire celui d'Adar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Haman dit alors au roi Assuérus: «Il y a dans l''ensemble des provinces de ton royaume un peuple unique, bien que dispersé, qui reste bien à part parmi les peuples. Il a des lois différentes de celles de tous les autres peuples et n''applique pas celles du roi. Le roi n''a aucun intérêt à le laisser tranquille. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Si donc tu le juges bon, qu'on donne par écrit l'ordre de les faire disparaître. Ce sont 300 tonnes d'argent que je remettrai aux fonctionnaires pour le trésor du roi.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Le roi retira l'anneau
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''anneau: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cet anneau portait le sceau, le cachet, dont l'empreinte permettait d'authentifier une décision comme étant la sienne.
    marker-yv: yv-n
  - type: text
    text: ' de sa main et le donna à Haman, fils d''Hammedatha, l''Agaguite qui était l''adversaire des Juifs, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'et il lui dit: «L''argent et ce peuple sont à ta disposition. Fais-en ce que tu voudras.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'On convoqua les secrétaires du roi le treizième jour du premier mois et l''on écrivit un message en tout point conforme aux ordres d''Haman et adressé aux satrapes du roi, aux gouverneurs de chaque province et aux chefs de chaque peuple, à chaque province dans son écriture et à chaque peuple dans sa langue. Le message fut écrit au nom du roi Assuérus et l''on y apposa l''empreinte du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Les lettres furent envoyées par l''intermédiaire de coursiers dans toutes les provinces du roi. Elles disaient qu''il fallait en un seul jour – le treizième du douzième mois, c''est-à-dire le mois d''Adar – exterminer, massacrer et supprimer tous les Juifs, jeunes et vieux, petits enfants et femmes, et procéder au pillage de leurs biens. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Une copie du document devait être donnée avec force de loi à chaque province et être communiquée à tous les peuples afin qu''ils soient prêts pour ce jour-là. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Les coursiers partirent sans tarder, sur ordre du roi. L'édit fut aussi proclamé à Suse, la capitale, et, tandis que le roi et Haman s'installaient pour boire, la ville de Suse était plongée dans la consternation.
