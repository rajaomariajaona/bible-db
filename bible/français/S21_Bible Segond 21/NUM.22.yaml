document_id: NUM.22,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Appel de Balak à Balaam
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Les Israélites partirent et campèrent dans les plaines de Moab, de l'autre côté du Jourdain, vis-à-vis de Jéricho.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Balaam répondit à Dieu: «Balak, fils de Tsippor, le roi de Moab, les a envoyés me dire: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '‘Un peuple est sorti d''Egypte. Il couvre la surface du pays. Viens donc le maudire. Peut-être ainsi pourrai-je le combattre et le chasser.’» '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Dieu dit à Balaam: «Tu ne les accompagneras pas, tu ne maudiras pas ce peuple, car il est béni.» '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Balaam se leva le lendemain matin et dit aux chefs de Balak: «Partez dans votre pays, car l''Eternel refuse de me laisser vous accompagner.» '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Les chefs moabites se levèrent, retournèrent auprès de Balak et dirent: «Balaam a refusé de venir avec nous.»'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Balak envoya de nouveau des chefs. Ils étaient plus nombreux et plus considérés que les précédents. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Arrivés chez Balaam, ils lui annoncèrent: «Voici ce que dit Balak, fils de Tsippor: ‘Ne te laisse donc pas empêcher de venir vers moi, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'car je te rendrai beaucoup d''honneurs et je ferai tout ce que tu me diras. Viens donc maudire ce peuple pour moi.’» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Balaam répondit aux serviteurs de Balak: «Même si Balak me donnait sa maison pleine d''argent et d''or, je ne pourrais absolument rien faire qui enfreigne l''ordre de l''Eternel, mon Dieu. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Mais maintenant, restez donc ici cette nuit et je saurai ce que l''Eternel me dira encore.» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Balak, fils de Tsippor, vit tout ce qu''Israël avait fait aux Amoréens, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Dieu vint trouver Balaam pendant la nuit et lui dit: «Puisque ces hommes sont venus pour t''appeler, lève-toi, accompagne-les. Mais tu feras ce que je te dirai.» '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Balaam se leva le lendemain matin, sella son ânesse et partit avec les chefs moabites.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'La colère de Dieu s''enflamma parce qu''il était parti. Alors l''ange de l''Eternel se plaça sur le chemin pour lui résister. Balaam était monté sur son ânesse et ses deux serviteurs étaient avec lui. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'L''ânesse vit l''ange de l''Eternel qui se tenait sur le chemin, son épée dégainée à la main. Elle s''écarta du chemin et partit dans les champs. Balaam frappa l''ânesse pour la ramener dans le chemin. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'L''ange de l''Eternel se posta sur un sentier entre les vignes, bordé d''un mur de chaque côté. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'L''ânesse vit l''ange de l''Eternel. Elle se serra contre le mur et pressa ainsi le pied de Balaam contre le mur. Balaam la frappa de nouveau. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'L''ange de l''Eternel passa plus loin et se posta à un endroit où il n''y avait aucun espace pour s''écarter à droite ou à gauche. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: L'ânesse vit l'ange de l'Eternel et elle s'affaissa sous Balaam. La colère de Balaam s'enflamma et il frappa l'ânesse avec un bâton.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'L''Eternel fit parler l''ânesse et elle dit à Balaam: «Que t''ai-je fait pour que tu m''aies frappée déjà trois fois?» '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Balaam répondit à l''ânesse: «C''est parce que tu t''es moquée de moi. Si j''avais une épée dans la main, je te tuerais sur-le-champ.» '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'et Moab fut très effrayé en face d''un peuple aussi nombreux, il fut saisi de terreur en face des Israélites. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'L''ânesse dit à Balaam: «Ne suis-je pas ton ânesse, que tu as montée depuis toujours jusqu''à aujourd''hui? Ai-je l''habitude d''agir ainsi envers toi?» «Non», répondit-il.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'L''Eternel ouvrit les yeux de Balaam et Balaam vit l''ange de l''Eternel qui se tenait sur le chemin, son épée dégainée à la main. Il s''inclina alors et se prosterna, le visage contre terre. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'L''ange de l''Eternel lui dit: «Pourquoi as-tu frappé ton ânesse déjà trois fois? Je suis sorti pour te résister, car tu empruntes une voie dangereuse à mes yeux. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'L''ânesse m''a vu et s''est écartée déjà trois fois devant moi. Si elle ne s''était pas écartée de moi, je t''aurais même tué en lui laissant la vie.» '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Balaam dit à l''ange de l''Eternel: «J''ai péché, car je ne savais pas que tu t''étais placé devant moi sur le chemin. Mais maintenant, si tu me désapprouves, je retournerai chez moi.» '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'L''ange de l''Eternel dit à Balaam: «Accompagne ces hommes, mais tu te contenteras de répéter les paroles que je te dirai.» Et Balaam accompagna les chefs de Balak.'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Balak apprit que Balaam arrivait et il sortit à sa rencontre jusqu''à la ville de Moab qui se trouve sur la limite de l''Arnon, à l''extrême frontière. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Balak dit à Balaam: «N''ai-je pas envoyé des messagers chez toi pour t''appeler? Pourquoi n''es-tu pas venu vers moi? Ne puis-je donc pas te traiter avec honneur?» '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Balaam dit à Balak: «Voici, je suis venu vers toi. Maintenant, me sera-t-il permis de parler librement? Je dirai les paroles que Dieu mettra dans ma bouche.»'
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Balaam accompagna Balak et ils arrivèrent à Kirjath-Hutsoth. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Moab dit aux anciens de Madian: «Cette foule va dévorer tout ce qui nous entoure, comme le bœuf broute l''herbe des champs.» Balak, fils de Tsippor, était alors roi de Moab. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Balak sacrifia des bœufs et des brebis, et il en fit remettre à Balaam et aux chefs qui l'accompagnaient.
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Le lendemain matin, Balak prit Balaam et le fit monter à Bamoth-Baal, d'où Balaam put voir une partie du peuple d'Israël.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il envoya des messagers trouver Balaam, fils de Beor, à Pethor sur l''Euphrate, dans le pays de ses compatriotes, afin de l''appeler et de lui dire: «Un peuple est sorti d''Egypte. Il couvre la surface du pays et il s''est installé vis-à-vis de moi. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Viens donc maudire ce peuple pour moi, car il est plus puissant que moi. Peut-être ainsi pourrai-je le battre et le chasser du pays car, je le sais, celui que tu bénis est béni et celui que tu maudis est maudit.»
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Les anciens de Moab et ceux de Madian partirent avec des cadeaux pour le devin. Ils arrivèrent chez Balaam et lui rapportèrent les paroles de Balak. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Balaam leur dit: «Passez la nuit ici et je vous donnerai réponse d''après ce que l''Eternel me dira.» Les chefs de Moab restèrent donc chez Balaam.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dieu vint trouver Balaam et dit: «Qui sont ces hommes que tu as chez toi?» '
