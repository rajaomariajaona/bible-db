document_id: DEU.10,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les nouvelles tables de la loi
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '»A cette époque-là, l''Eternel m''a dit: ‘Taille deux tables de pierre pareilles aux premières et monte vers moi sur la montagne. Tu feras aussi un coffre en bois. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '»Je suis resté sur la montagne, comme précédemment, 40 jours et 40 nuits. L''Eternel m''a exaucé encore cette fois: il n''a pas voulu te détruire. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'L''Eternel m''a dit: ‘Lève-toi, va marcher à la tête du peuple. Qu''ils aillent prendre possession du pays que j''ai juré à leurs ancêtres de leur donner.’'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Appel à obéir à Dieu
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: '»Maintenant, Israël, que demande de toi l''Eternel, ton Dieu? N''est-ce pas que tu craignes l''Eternel, ton Dieu, afin de marcher dans toutes ses voies, que tu aimes et serves l''Eternel, ton Dieu, de tout ton cœur et de toute ton âme, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'que tu respectes les commandements de l''Eternel et ses prescriptions que je te donne aujourd''hui, afin d''être heureux? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Voici, c''est à l''Eternel, ton Dieu, qu''appartiennent le ciel et les cieux des cieux, la terre et tout ce qu''elle contient, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'et c''est à tes ancêtres seulement que l''Eternel s''est attaché pour les aimer. Après eux, c''est leur descendance, c''est vous qu''il a choisis parmi tous les peuples, comme vous le voyez aujourd''hui. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Circoncisez donc votre cœur et ne vous montrez plus réfractaires. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'En effet, l''Eternel, votre Dieu, est le Dieu des dieux, le Seigneur des seigneurs, le Dieu grand, fort et redoutable. Il ne fait pas de favoritisme et n''accepte pas de pot-de-vin, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'il fait droit à l''orphelin et à la veuve, il aime l''étranger et lui donne de la nourriture et des vêtements. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Vous aimerez l''étranger, car vous avez été étrangers en Egypte. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'J''écrirai sur ces tables les paroles qui étaient sur les premières tables que tu as brisées et tu les mettras dans le coffre.’ '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'C''est l''Eternel, ton Dieu, que tu craindras, c''est lui que tu serviras, c''est à lui que tu t''attacheras et c''est par son nom que tu prêteras serment. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Il est ta gloire, il est ton Dieu. C''est lui qui a fait au milieu de toi les actes grands et redoutables que tes yeux ont vus. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Tes ancêtres étaient au nombre de 70 lorsqu'ils sont descendus en Egypte, et maintenant l'Eternel, ton Dieu, a fait de toi une multitude aussi nombreuse que les étoiles du ciel.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'J''ai fait un coffre en bois d''acacia, j''ai taillé deux tables de pierre pareilles aux premières et je suis monté sur la montagne, les deux tables dans la main. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'L''Eternel a écrit sur les tables ce qui avait été écrit sur les premières, les dix paroles qu''il vous avait dites sur la montagne, du milieu du feu, le jour de l''assemblée, et il me les a données. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Je suis reparti et je suis descendu de la montagne. J'ai mis les tables dans le coffre que j'avais fait et elles sont restées là, comme l'Eternel me l'avait ordonné.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '»Les Israélites sont partis de Beéroth-Bené-Jaakan pour Moséra. C''est là qu''est mort Aaron et qu''il a été enterré. Eléazar, son fils, lui a succédé en tant que grand-prêtre. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ils sont partis de là pour Gudgoda, et de Gudgoda pour Jothbatha, région où il y a des cours d''eau. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'C''est à cette époque-là que l''Eternel a mis à part la tribu de Lévi et lui a ordonné de porter l''arche de l''alliance de l''Eternel, de se tenir devant l''Eternel pour le servir et de bénir le peuple en son nom. C''est ce qu''elle a fait jusqu''à aujourd''hui. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Voilà pourquoi Lévi n'a ni part ni héritage avec ses frères; l'Eternel est son héritage, comme l'Eternel, ton Dieu, le lui a dit.
