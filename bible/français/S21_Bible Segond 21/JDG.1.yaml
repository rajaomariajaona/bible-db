document_id: JDG.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les limites de la conquête
  - type: heading
    content: 1.1–3.6
  - type: heading
    content: Victoires de la tribu de Juda
  - type: text
    content: 'Après la mort de Josué, les Israélites consultèrent l''Eternel en disant: «Qui de nous montera le premier contre les Cananéens pour les attaquer?» '
  '10':
  - type: text
    content: 'Ils marchèrent contre les Cananéens qui habitaient à Hébron, appelée autrefois Kirjath-Arba, et battirent Shéshaï, Ahiman et Talmaï. '
  '11':
  - type: text
    content: De là ils marchèrent contre les habitants de Debir, qui s'appelait autrefois Kirjath-Sépher.
  '12':
  - type: text
    content: 'Caleb dit: «Je donnerai ma fille Acsa pour femme à celui qui battra Kirjath-Sépher et qui la prendra.» '
  '13':
  - type: text
    content: 'Othniel, fils de Kenaz, le frère cadet de Caleb, s''en empara. Caleb lui donna alors sa fille Acsa pour femme. '
  '14':
  - type: text
    content: 'Dès son arrivée chez Othniel, elle le persuada de demander un champ à son père. Elle descendit de son âne et Caleb lui dit: «Qu''as-tu?» '
  '15':
  - type: text
    content: 'Elle lui répondit: «Fais-moi un cadeau. En effet, tu m''as donné une terre située au sud. Donne-moi aussi des sources d''eau.» Et Caleb lui donna les sources supérieures et les sources inférieures. '
  '16':
  - type: text
    content: 'Les fils du Kénien, du beau-père de Moïse, montèrent avec les Judéens de la ville des palmiers jusque dans le désert de Juda, au sud d''Arad, et ils vinrent habiter parmi le peuple. '
  '17':
  - type: text
    content: 'Juda se mit en marche avec son frère Siméon et ils battirent les Cananéens qui habitaient à Tsephath. Ils vouèrent la ville à la destruction et on l''appela Horma. '
  '18':
  - type: text
    content: 'Juda s''empara encore de Gaza, d''Askalon et d''Ekron, chacune avec son territoire. '
  '19':
  - type: text
    content: 'L''Eternel fut avec Juda, qui se rendit maître de la montagne; mais il ne put chasser les habitants de la plaine, parce qu''ils avaient des chars en fer. '
  '2':
  - type: text
    content: 'L''Eternel répondit: «C''est Juda qui montera. Voici, j''ai livré le pays entre ses mains.» '
  '20':
  - type: text
    content: On donna Hébron à Caleb, comme l'avait dit Moïse, et il en chassa les trois descendants d'Anak.
  - type: heading
    content: Echecs des diverses tribus
  '21':
  - type: text
    content: Les Benjaminites ne chassèrent pas les Jébusiens qui habitaient à Jérusalem, et ceux-ci ont habité jusqu'à aujourd'hui dans Jérusalem avec les Benjaminites.
  '22':
  - type: text
    content: 'La famille de Joseph monta aussi contre Béthel, et l''Eternel fut avec eux. '
  '23':
  - type: text
    content: 'La famille de Joseph fit explorer Béthel, qui s''appelait autrefois Luz. '
  '24':
  - type: text
    content: 'Les guetteurs virent un homme sortir de la ville et lui dirent: «Montre-nous par où nous pourrons entrer dans la ville et nous te ferons grâce.» '
  '25':
  - type: text
    content: 'Il leur montra par où ils pourraient entrer dans la ville. Ils frappèrent alors la ville du tranchant de l''épée, mais ils laissèrent partir cet homme et toute sa famille. '
  '26':
  - type: text
    content: Cet homme se rendit dans le pays des Hittites. Il y construisit une ville et l'appela Luz, nom qu'elle a porté jusqu'à aujourd'hui.
  '27':
  - type: text
    content: 'Manassé ne chassa pas les habitants de Beth-Shean, Thaanac, Dor, Jibleam, Meguiddo et des villes qui en dépendaient. Les Cananéens voulurent rester dans ce pays. '
  '28':
  - type: text
    content: Lorsque Israël fut assez fort, il soumit les Cananéens à des corvées, mais il ne les chassa pas.
  '29':
  - type: text
    content: Ephraïm ne chassa pas les Cananéens qui habitaient à Guézer, et ceux-ci habitèrent au milieu d'Ephraïm à Guézer.
  '3':
  - type: text
    content: 'Juda dit alors à son frère Siméon: «Monte avec moi dans le pays qui m''est attribué par tirage au sort, et nous combattrons les Cananéens. J''irai aussi avec toi dans celui qui t''est attribué.» Et Siméon l''accompagna.'
  '30':
  - type: text
    content: Zabulon ne chassa pas les habitants de Kitron ni ceux de Nahalol. Les Cananéens habitèrent au milieu de Zabulon, mais ils furent soumis à des corvées.
  '31':
  - type: text
    content: 'Aser ne chassa pas les habitants d''Acco ni ceux de Sidon, d''Achlal, d''Aczib, de Helba, d''Aphik et de Rehob. '
  '32':
  - type: text
    content: Les Asérites habitèrent au milieu des Cananéens qui étaient installés dans le pays, car ils ne les chassèrent pas.
  '33':
  - type: text
    content: Nephthali ne chassa pas les habitants de Beth-Shémesh ni ceux de Beth-Anath. Il habita au milieu des Cananéens qui étaient installés dans le pays, mais les habitants de Beth-Shémesh et de Beth-Anath furent soumis à des corvées.
  '34':
  - type: text
    content: 'Les Amoréens repoussèrent les Danites dans la montagne, ils ne les laissèrent pas descendre dans la plaine. '
  '35':
  - type: text
    content: 'Les Amoréens voulurent rester à Har-Hérès, à Ajalon et à Shaalbim, mais la famille de Joseph domina sur eux et ils furent soumis à des corvées. '
  '36':
  - type: text
    content: Le territoire des Amoréens partait de la montée d'Akrabbim, de Séla, et couvrait le territoire situé au-dessus.
  '4':
  - type: text
    content: 'Les hommes de Juda montèrent, et l''Eternel livra les Cananéens et les Phéréziens entre leurs mains. Ils battirent 10''000 hommes à Bézek. '
  '5':
  - type: text
    content: 'Ils y trouvèrent le roi Adoni-Bézek et l''attaquèrent, et ils battirent les Cananéens et les Phéréziens. '
  '6':
  - type: text
    content: 'Adoni-Bézek prit la fuite, mais ils le poursuivirent et le capturèrent, puis ils lui coupèrent les pouces des mains et des pieds. '
  '7':
  - type: text
    content: 'Adoni-Bézek dit: «Il y avait 70 rois, aux pouces des mains et des pieds coupés, qui ramassaient les miettes sous ma table. Dieu me rend ce que j''ai fait.» On l''emmena à Jérusalem et il y mourut.'
  '8':
  - type: text
    content: 'Les Judéens attaquèrent Jérusalem et s''en emparèrent: ils la frappèrent du tranchant de l''épée et mirent le feu à la ville. '
  '9':
  - type: text
    content: 'Ils descendirent ensuite pour combattre les Cananéens qui habitaient la montagne, la région du sud et la plaine. '
