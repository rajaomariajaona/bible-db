document_id: JDG.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Les limites de la conquête
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 1.1–3.6
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Victoires de la tribu de Juda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après la mort de Josué, les Israélites consultèrent l''Eternel en disant: «Qui de nous montera le premier contre les Cananéens pour les attaquer?» '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'L''Eternel répondit: «C''est Juda qui montera. Voici, j''ai livré le pays entre ses mains.» '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Juda dit alors à son frère Siméon: «Monte avec moi dans le pays qui m''est attribué par tirage au sort, et nous combattrons les Cananéens. J''irai aussi avec toi dans celui qui t''est attribué.» Et Siméon l''accompagna.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Les hommes de Juda montèrent, et l''Eternel livra les Cananéens et les Phéréziens entre leurs mains. Ils battirent 10''000 hommes à Bézek. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils y trouvèrent le roi Adoni-Bézek et l''attaquèrent, et ils battirent les Cananéens et les Phéréziens. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Adoni-Bézek prit la fuite, mais ils le poursuivirent et le capturèrent, puis ils lui coupèrent les pouces des mains et des pieds. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Adoni-Bézek dit: «Il y avait 70 rois, aux pouces des mains et des pieds coupés, qui ramassaient les miettes sous ma table. Dieu me rend ce que j''ai fait.» On l''emmena à Jérusalem et il y mourut.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les Judéens attaquèrent Jérusalem et s''en emparèrent: ils la frappèrent du tranchant de l''épée et mirent le feu à la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ils descendirent ensuite pour combattre les Cananéens qui habitaient la montagne, la région du sud et la plaine. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils marchèrent contre les Cananéens qui habitaient à Hébron, appelée autrefois Kirjath-Arba, et battirent Shéshaï, Ahiman et Talmaï. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: De là ils marchèrent contre les habitants de Debir, qui s'appelait autrefois Kirjath-Sépher.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Caleb dit: «Je donnerai ma fille Acsa pour femme à celui qui battra Kirjath-Sépher et qui la prendra.» '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Othniel, fils de Kenaz, le frère cadet de Caleb, s''en empara. Caleb lui donna alors sa fille Acsa pour femme. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Dès son arrivée chez Othniel, elle le persuada de demander un champ à son père. Elle descendit de son âne et Caleb lui dit: «Qu''as-tu?» '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Elle lui répondit: «Fais-moi un cadeau. En effet, tu m''as donné une terre située au sud. Donne-moi aussi des sources d''eau.» Et Caleb lui donna les sources supérieures et les sources inférieures. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les fils du Kénien, du beau-père de Moïse, montèrent avec les Judéens de la ville des palmiers jusque dans le désert de Juda, au sud d''Arad, et ils vinrent habiter parmi le peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Juda se mit en marche avec son frère Siméon et ils battirent les Cananéens qui habitaient à Tsephath. Ils vouèrent la ville à la destruction et on l''appela Horma. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Juda s''empara encore de Gaza, d''Askalon et d''Ekron, chacune avec son territoire. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L''Eternel fut avec Juda, qui se rendit maître de la montagne; mais il ne put chasser les habitants de la plaine, parce qu''ils avaient des chars en fer. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: On donna Hébron à Caleb, comme l'avait dit Moïse, et il en chassa les trois descendants d'Anak.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Echecs des diverses tribus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Les Benjaminites ne chassèrent pas les Jébusiens qui habitaient à Jérusalem, et ceux-ci ont habité jusqu'à aujourd'hui dans Jérusalem avec les Benjaminites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'La famille de Joseph monta aussi contre Béthel, et l''Eternel fut avec eux. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'La famille de Joseph fit explorer Béthel, qui s''appelait autrefois Luz. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les guetteurs virent un homme sortir de la ville et lui dirent: «Montre-nous par où nous pourrons entrer dans la ville et nous te ferons grâce.» '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il leur montra par où ils pourraient entrer dans la ville. Ils frappèrent alors la ville du tranchant de l''épée, mais ils laissèrent partir cet homme et toute sa famille. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Cet homme se rendit dans le pays des Hittites. Il y construisit une ville et l'appela Luz, nom qu'elle a porté jusqu'à aujourd'hui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Manassé ne chassa pas les habitants de Beth-Shean, Thaanac, Dor, Jibleam, Meguiddo et des villes qui en dépendaient. Les Cananéens voulurent rester dans ce pays. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Lorsque Israël fut assez fort, il soumit les Cananéens à des corvées, mais il ne les chassa pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ephraïm ne chassa pas les Cananéens qui habitaient à Guézer, et ceux-ci habitèrent au milieu d'Ephraïm à Guézer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Zabulon ne chassa pas les habitants de Kitron ni ceux de Nahalol. Les Cananéens habitèrent au milieu de Zabulon, mais ils furent soumis à des corvées.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Aser ne chassa pas les habitants d''Acco ni ceux de Sidon, d''Achlal, d''Aczib, de Helba, d''Aphik et de Rehob. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Les Asérites habitèrent au milieu des Cananéens qui étaient installés dans le pays, car ils ne les chassèrent pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Nephthali ne chassa pas les habitants de Beth-Shémesh ni ceux de Beth-Anath. Il habita au milieu des Cananéens qui étaient installés dans le pays, mais les habitants de Beth-Shémesh et de Beth-Anath furent soumis à des corvées.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Les Amoréens repoussèrent les Danites dans la montagne, ils ne les laissèrent pas descendre dans la plaine. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Les Amoréens voulurent rester à Har-Hérès, à Ajalon et à Shaalbim, mais la famille de Joseph domina sur eux et ils furent soumis à des corvées. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Le territoire des Amoréens partait de la montée d'Akrabbim, de Séla, et couvrait le territoire situé au-dessus.
