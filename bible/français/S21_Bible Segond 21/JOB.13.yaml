document_id: JOB.13,152
type_code: fra
verses:
  '1':
  - type: text
    content: »Tout cela, mon œil l'a vu,
  - type: text
    content: mon oreille l'a entendu et y a prêté attention.
  '10':
  - type: text
    content: A coup sûr, il vous le reprochera,
  - type: text
    content: si vous faites, même secrètement, preuve de partialité en sa faveur.
  '11':
  - type: text
    content: Sa majesté ne devrait-elle pas vous épouvanter?
  - type: text
    content: La terreur qu'il inspire ne devrait-elle pas s'abattre sur vous?
  '12':
  - type: text
    content: Ce que vous rappelez, ce sont des proverbes aussi légers que la cendre;
  - type: text
    content: vos protections ne sont pas plus solides que l'argile.
  '13':
  - type: text
    content: »Taisez-vous, laissez-moi, c'est moi qui veux parler,
  - type: text
    content: quoi qu'il m'arrive.
  '14':
  - type: text
    content: Pourquoi défendrais-je ma personne avec acharnement?
  - type: text
    content: Au contraire, je vais risquer ma vie.
  '15':
  - type: text
    content: Même s'il me tuait, je continuerais à espérer en lui.
  - type: text
    content: Oui, je défendrai ma conduite devant lui.
  '16':
  - type: text
    content: Cela même peut servir à mon salut,
  - type: text
    content: car aucun impie n'ose se montrer en sa présence.
  '17':
  - type: text
    content: »Ecoutez attentivement mon propos,
  - type: text
    content: prêtez l'oreille à mon explication!
  '18':
  - type: text
    content: Me voici prêt à défendre ma cause.
  - type: text
    content: Je sais que j'ai raison.
  '19':
  - type: text
    content: Qui plaidera contre moi?
  - type: text
    content: Alors je me tairais en effet et j'expirerais.
  '2':
  - type: text
    content: Ce que vous savez, je le sais moi aussi,
  - type: text
    content: je ne vous suis en rien inférieur.
  '20':
  - type: text
    content: »Seulement, accorde-moi deux faveurs
  - type: text
    content: 'et je ne me cacherai pas loin de toi:'
  '21':
  - type: text
    content: éloigne ta main de moi
  - type: text
    content: et que tes terreurs ne me tourmentent plus!
  '22':
  - type: text
    content: Puis appelle et moi je répondrai,
  - type: text
    content: ou alors je parlerai et tu me feras entendre une réponse.
  '23':
  - type: text
    content: Quel est le nombre de mes fautes et de mes péchés?
  - type: text
    content: Fais-moi connaître mes transgressions et mes péchés.
  '24':
  - type: text
    content: Pourquoi caches-tu ton visage
  - type: text
    content: et me prends-tu pour ton ennemi?
  '25':
  - type: text
    content: Veux-tu faire trembler une feuille agitée?
  - type: text
    content: Veux-tu poursuivre une paille toute desséchée?
  '26':
  - type: text
    content: »En effet, tu écris contre moi des paroles amères,
  - type: text
    content: tu me fais payer les fautes de ma jeunesse.
  '27':
  - type: text
    content: Tu mets mes pieds dans des entraves,
  - type: text
    content: tu surveilles tous mes mouvements,
  - type: text
    content: tu suis de près les traces de mes pas.
  '28':
  - type: text
    content: Pourtant, l'homme tombe en pourriture,
  - type: text
    content: comme un habit rongé par des mites.
  '3':
  - type: text
    content: Seulement moi, c'est au Tout-Puissant que je parlerai,
  - type: text
    content: je veux plaider ma cause devant Dieu.
  '4':
  - type: text
    content: Quant à vous, vous étalez des mensonges,
  - type: text
    content: vous êtes tous des médecins sans valeur.
  '5':
  - type: text
    content: Si seulement vous aviez gardé le silence!
  - type: text
    content: Vous seriez passés pour des hommes sages.
  '6':
  - type: text
    content: »Ecoutez donc mon argumentation,
  - type: text
    content: soyez attentifs à ma plaidoirie!
  '7':
  - type: text
    content: Lancerez-vous des affirmations injustes pour défendre Dieu,
  - type: text
    content: pour le soutenir alléguerez-vous des faussetés?
  '8':
  - type: text
    content: Allez-vous faire preuve de partialité en sa faveur,
  - type: text
    content: si vous plaidez pour lui?
  '9':
  - type: text
    content: S'il vous examine, vous approuvera-t-il,
  - type: text
    content: ou le tromperez-vous comme on trompe un homme?
