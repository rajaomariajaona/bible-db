document_id: JOB.13,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: »Tout cela, mon œil l'a vu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon oreille l'a entendu et y a prêté attention.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: A coup sûr, il vous le reprochera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si vous faites, même secrètement, preuve de partialité en sa faveur.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Sa majesté ne devrait-elle pas vous épouvanter?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terreur qu'il inspire ne devrait-elle pas s'abattre sur vous?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ce que vous rappelez, ce sont des proverbes aussi légers que la cendre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vos protections ne sont pas plus solides que l'argile.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: »Taisez-vous, laissez-moi, c'est moi qui veux parler,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quoi qu'il m'arrive.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Pourquoi défendrais-je ma personne avec acharnement?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au contraire, je vais risquer ma vie.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Même s'il me tuait, je continuerais à espérer en lui.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, je défendrai ma conduite devant lui.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Cela même peut servir à mon salut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car aucun impie n'ose se montrer en sa présence.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: »Ecoutez attentivement mon propos,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: prêtez l'oreille à mon explication!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Me voici prêt à défendre ma cause.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je sais que j'ai raison.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Qui plaidera contre moi?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors je me tairais en effet et j'expirerais.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ce que vous savez, je le sais moi aussi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne vous suis en rien inférieur.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: »Seulement, accorde-moi deux faveurs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et je ne me cacherai pas loin de toi:'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: éloigne ta main de moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que tes terreurs ne me tourmentent plus!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Puis appelle et moi je répondrai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou alors je parlerai et tu me feras entendre une réponse.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Quel est le nombre de mes fautes et de mes péchés?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais-moi connaître mes transgressions et mes péchés.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Pourquoi caches-tu ton visage
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et me prends-tu pour ton ennemi?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Veux-tu faire trembler une feuille agitée?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Veux-tu poursuivre une paille toute desséchée?
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: »En effet, tu écris contre moi des paroles amères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu me fais payer les fautes de ma jeunesse.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Tu mets mes pieds dans des entraves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu surveilles tous mes mouvements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu suis de près les traces de mes pas.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Pourtant, l'homme tombe en pourriture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme un habit rongé par des mites.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Seulement moi, c'est au Tout-Puissant que je parlerai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je veux plaider ma cause devant Dieu.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Quant à vous, vous étalez des mensonges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous êtes tous des médecins sans valeur.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Si seulement vous aviez gardé le silence!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous seriez passés pour des hommes sages.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: »Ecoutez donc mon argumentation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: soyez attentifs à ma plaidoirie!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Lancerez-vous des affirmations injustes pour défendre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour le soutenir alléguerez-vous des faussetés?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Allez-vous faire preuve de partialité en sa faveur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si vous plaidez pour lui?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: S'il vous examine, vous approuvera-t-il,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou le tromperez-vous comme on trompe un homme?
