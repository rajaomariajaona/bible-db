document_id: DEU.24
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Loi sur le divorce
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: »Lorsqu'un homme a pris et épousé une femme qui viendrait à ne pas trouver grâce à ses yeux parce qu'il a découvert en elle quelque chose de honteux, il *écrit pour elle une lettre de divorce et, après la lui avoir remise, la renvoie de chez lui
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ecrit… lui: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'évoqué en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 5.31
      metadata:
        usfm: MAT.5.31
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '19.7'
      metadata:
        usfm: MAT.19.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Marc 10.4
      metadata:
        usfm: MRK.10.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Elle sort alors de chez lui, s''en va et peut devenir la femme d''un autre homme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Supposons que ce dernier homme la prenne en haine, écrive pour elle une lettre de divorce et, après la lui avoir remise, la renvoie de chez lui, ou bien que le dernier homme qui l''a prise pour femme vienne à mourir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Alors le premier mari qui l'avait renvoyée ne pourra pas la reprendre pour femme après qu'elle a ainsi été rendue impure, car ce serait une pratique abominable devant l'Eternel, et tu ne chargeras pas d'un péché le pays que l'Eternel, ton Dieu, te donne en héritage.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ordonnances diverses
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: »Lorsqu'un homme sera jeune marié, il n'ira pas à l'armée et on ne lui imposera aucune charge. Il sera exempté pour raison de famille pendant un an et il réjouira la femme qu'il a épousée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: »On ne prendra pas en gage les deux pierres de meule de quelqu'un, ni celle de dessus, car ce serait prendre en gage sa vie même.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: »Si l'on trouve un homme qui a kidnappé l'un de ses frères, l'un des Israélites, et a fait de lui son esclave ou l'a vendu, ce ravisseur sera puni de mort. Tu extirperas ainsi le mal du milieu de toi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '»Fais attention à la plaie de lèpre, afin de bien respecter et de faire tout ce que vous enseigneront les prêtres, les Lévites. Vous veillerez à agir d''après les ordres que je leur ai donnés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Souviens-toi de ce que l'Eternel, ton Dieu, a fait à Miriam sur le chemin de votre sortie d'Egypte.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '»Si tu fais à ton prochain un prêt, quel qu''il soit, tu n''entreras pas dans sa maison pour t''emparer de son gage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tu resteras dehors et celui à qui tu fais le prêt t''apportera le gage dehors. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Si cet homme est pauvre, tu ne te coucheras pas en retenant son gage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tu le lui rendras au coucher du soleil, afin qu'il puisse se coucher dans son vêtement et qu'il te bénisse. Cela te sera compté comme justice devant l'Eternel, ton Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '»Tu n''exploiteras pas le salarié qui vit dans la misère et la pauvreté, qu''il soit l''un de tes frères ou l''un des étrangers en séjour dans ton pays, dans ta ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tu lui donneras le salaire de sa journée avant le coucher du soleil, car il est pauvre et il lui tarde de le recevoir. Sinon, il crierait à l'Eternel contre toi et tu te chargerais d'un péché.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: »*On ne fera pas mourir les pères à la place des enfants, ni les enfants à la place des pères. On fera mourir chacun pour son péché.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'On ne fera… péché: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Rois 14.6
      metadata:
        usfm: 2KI.14.6
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Chroniques 25.4
      metadata:
        usfm: 2CH.25.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '»Tu ne porteras pas atteinte au droit de l''étranger et de l''orphelin et tu ne prendras pas en gage le vêtement d''une veuve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tu te souviendras que tu as été esclave en Egypte et que l'Eternel, ton Dieu, t'a racheté. Voilà pourquoi je te donne ces commandements à mettre en pratique.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Solidarité avec les plus démunis
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '»Quand tu moissonneras ton champ et que tu y auras oublié une gerbe, tu ne retourneras pas la prendre. Elle sera pour l''étranger, pour l''orphelin et pour la veuve, afin que l''Eternel, ton Dieu, te bénisse dans tout le travail de tes mains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Quand tu secoueras tes oliviers, tu ne retourneras pas cueillir les fruits restés aux branches. Ils seront pour l''étranger, pour l''orphelin et pour la veuve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Quand tu vendangeras ta vigne, tu ne retourneras pas cueillir les grappes qui y seront restées. Elles seront pour l''étranger, pour l''orphelin et pour la veuve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tu te souviendras que tu as été esclave en Egypte. Voilà pourquoi je te donne ces commandements à mettre en pratique.
