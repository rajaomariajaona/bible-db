document_id: DEU.24,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Loi sur le divorce
  - type: text
    content: »Lorsqu'un homme a pris et épousé une femme qui viendrait à ne pas trouver grâce à ses yeux parce qu'il a découvert en elle quelque chose de honteux, il *écrit pour elle une lettre de divorce et, après la lui avoir remise, la renvoie de chez lui
  - type: note
    content: 'Ecrit… lui: évoqué en Matthieu 5.31; 19.7; Marc 10.4.'
  - type: text
    content: '. '
  '10':
  - type: text
    content: '»Si tu fais à ton prochain un prêt, quel qu''il soit, tu n''entreras pas dans sa maison pour t''emparer de son gage. '
  '11':
  - type: text
    content: 'Tu resteras dehors et celui à qui tu fais le prêt t''apportera le gage dehors. '
  '12':
  - type: text
    content: 'Si cet homme est pauvre, tu ne te coucheras pas en retenant son gage. '
  '13':
  - type: text
    content: Tu le lui rendras au coucher du soleil, afin qu'il puisse se coucher dans son vêtement et qu'il te bénisse. Cela te sera compté comme justice devant l'Eternel, ton Dieu.
  '14':
  - type: text
    content: '»Tu n''exploiteras pas le salarié qui vit dans la misère et la pauvreté, qu''il soit l''un de tes frères ou l''un des étrangers en séjour dans ton pays, dans ta ville. '
  '15':
  - type: text
    content: Tu lui donneras le salaire de sa journée avant le coucher du soleil, car il est pauvre et il lui tarde de le recevoir. Sinon, il crierait à l'Eternel contre toi et tu te chargerais d'un péché.
  '16':
  - type: text
    content: »*On ne fera pas mourir les pères à la place des enfants, ni les enfants à la place des pères. On fera mourir chacun pour son péché.
  - type: note
    content: 'On ne fera… péché: cité en 2 Rois 14.6; 2 Chroniques 25.4.'
  '17':
  - type: text
    content: '»Tu ne porteras pas atteinte au droit de l''étranger et de l''orphelin et tu ne prendras pas en gage le vêtement d''une veuve. '
  '18':
  - type: text
    content: Tu te souviendras que tu as été esclave en Egypte et que l'Eternel, ton Dieu, t'a racheté. Voilà pourquoi je te donne ces commandements à mettre en pratique.
  - type: heading
    content: Solidarité avec les plus démunis
  '19':
  - type: text
    content: '»Quand tu moissonneras ton champ et que tu y auras oublié une gerbe, tu ne retourneras pas la prendre. Elle sera pour l''étranger, pour l''orphelin et pour la veuve, afin que l''Eternel, ton Dieu, te bénisse dans tout le travail de tes mains. '
  '2':
  - type: text
    content: 'Elle sort alors de chez lui, s''en va et peut devenir la femme d''un autre homme. '
  '20':
  - type: text
    content: 'Quand tu secoueras tes oliviers, tu ne retourneras pas cueillir les fruits restés aux branches. Ils seront pour l''étranger, pour l''orphelin et pour la veuve. '
  '21':
  - type: text
    content: 'Quand tu vendangeras ta vigne, tu ne retourneras pas cueillir les grappes qui y seront restées. Elles seront pour l''étranger, pour l''orphelin et pour la veuve. '
  '22':
  - type: text
    content: Tu te souviendras que tu as été esclave en Egypte. Voilà pourquoi je te donne ces commandements à mettre en pratique.
  '3':
  - type: text
    content: 'Supposons que ce dernier homme la prenne en haine, écrive pour elle une lettre de divorce et, après la lui avoir remise, la renvoie de chez lui, ou bien que le dernier homme qui l''a prise pour femme vienne à mourir. '
  '4':
  - type: text
    content: Alors le premier mari qui l'avait renvoyée ne pourra pas la reprendre pour femme après qu'elle a ainsi été rendue impure, car ce serait une pratique abominable devant l'Eternel, et tu ne chargeras pas d'un péché le pays que l'Eternel, ton Dieu, te donne en héritage.
  - type: heading
    content: Ordonnances diverses
  '5':
  - type: text
    content: »Lorsqu'un homme sera jeune marié, il n'ira pas à l'armée et on ne lui imposera aucune charge. Il sera exempté pour raison de famille pendant un an et il réjouira la femme qu'il a épousée.
  '6':
  - type: text
    content: »On ne prendra pas en gage les deux pierres de meule de quelqu'un, ni celle de dessus, car ce serait prendre en gage sa vie même.
  '7':
  - type: text
    content: »Si l'on trouve un homme qui a kidnappé l'un de ses frères, l'un des Israélites, et a fait de lui son esclave ou l'a vendu, ce ravisseur sera puni de mort. Tu extirperas ainsi le mal du milieu de toi.
  '8':
  - type: text
    content: '»Fais attention à la plaie de lèpre, afin de bien respecter et de faire tout ce que vous enseigneront les prêtres, les Lévites. Vous veillerez à agir d''après les ordres que je leur ai donnés. '
  '9':
  - type: text
    content: Souviens-toi de ce que l'Eternel, ton Dieu, a fait à Miriam sur le chemin de votre sortie d'Egypte.
