document_id: 1CO.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les dons spirituels et leur diversité
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'En ce qui concerne les réalités spirituelles, je ne veux pas, frères et sœurs, que vous soyez dans l''ignorance. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Vous savez comment, lorsque vous étiez étrangers au peuple de Dieu, vous vous laissiez irrésistiblement entraîner vers les idoles muettes. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'C''est pourquoi je vous le déclare, personne, s''il parle par l''Esprit de Dieu, ne dit: «Jésus est maudit!» Et personne ne peut dire: «Jésus est le Seigneur!» si ce n''est par le Saint-Esprit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il y a diversité de dons, mais le même Esprit; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'diversité de services, mais le même Seigneur; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: diversité d'actes, mais le même Dieu qui accomplit tout en tous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Or, à chacun la manifestation de l''Esprit est donnée pour le bien de tous. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'En effet, à l''un est donnée par l''Esprit une parole de sagesse; à un autre une parole de connaissance, selon le même Esprit; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'à un autre la foi, par le même Esprit; à un autre des dons de guérisons, par le même Esprit; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'à un autre la possibilité de faire des miracles; à un autre la prophétie; à un autre le discernement des esprits; à un autre diverses langues; à un autre l''interprétation des langues. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mais toutes ces choses, c'est un seul et même Esprit qui les accomplit, en les distribuant à chacun en particulier comme il le veut.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le corps forme un tout mais a pourtant plusieurs organes, et tous les organes du corps, malgré leur grand nombre, ne forment qu''un seul corps. Il en va de même pour Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: En effet, que nous soyons juifs ou grecs, esclaves ou libres, nous avons tous été baptisés dans un seul Esprit pour former un seul corps et nous avons tous bu à un seul Esprit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ainsi, le corps n''est pas formé d''un seul organe, mais de plusieurs. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Si le pied disait: «Puisque je ne suis pas une main, je n''appartiens pas au corps», ne ferait-il pas partie du corps pour autant? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et si l''oreille disait: «Puisque je ne suis pas un œil, je n''appartiens pas au corps», ne ferait-elle pas partie du corps pour autant? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Si tout le corps était un œil, où serait l''ouïe? S''il était tout entier l''ouïe, où serait l''odorat? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'En fait, Dieu a placé chacun des organes dans le corps comme il l''a voulu. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'S''ils étaient tous un seul organe, où serait le corps? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il y a donc plusieurs organes, mais un seul corps. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'L''œil ne peut pas dire à la main: «Je n''ai pas besoin de toi», ni la tête dire aux pieds: «Je n''ai pas besoin de vous.» '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Bien plus, les parties du corps qui paraissent être les plus faibles sont nécessaires, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'et celles que nous estimons être les moins honorables du corps, nous les entourons d''un plus grand honneur. Ainsi nos organes les moins décents sont traités avec plus d''égards, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'tandis que ceux qui sont décents n''en ont pas besoin. Dieu a disposé le corps de manière à donner plus d''honneur à ce qui en manquait, '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'afin qu''il n''y ait pas de division dans le corps mais que tous les membres prennent également soin les uns des autres. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Si un membre souffre, tous les membres souffrent avec lui; si un membre est honoré, tous les membres se réjouissent avec lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Vous êtes le corps de Christ et vous êtes ses membres, chacun pour sa part. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dieu a établi dans l''Eglise premièrement des apôtres, deuxièmement des prophètes, troisièmement des enseignants, ensuite viennent les miracles, puis les dons de guérisons, les aptitudes à secourir, à diriger, à parler diverses langues. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tous sont-ils apôtres? Tous sont-ils prophètes? Tous sont-ils enseignants? Tous font-ils des miracles? '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tous ont-ils des dons de guérisons? Tous parlent-ils en langues? Tous interprètent-ils?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Aspirez aux dons les meilleurs. Je vais encore vous montrer la voie par excellence.
