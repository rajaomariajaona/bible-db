document_id: 1CO.12,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les dons spirituels et leur diversité
  - type: text
    content: 'En ce qui concerne les réalités spirituelles, je ne veux pas, frères et sœurs, que vous soyez dans l''ignorance. '
  '10':
  - type: text
    content: 'à un autre la possibilité de faire des miracles; à un autre la prophétie; à un autre le discernement des esprits; à un autre diverses langues; à un autre l''interprétation des langues. '
  '11':
  - type: text
    content: Mais toutes ces choses, c'est un seul et même Esprit qui les accomplit, en les distribuant à chacun en particulier comme il le veut.
  '12':
  - type: text
    content: 'Le corps forme un tout mais a pourtant plusieurs organes, et tous les organes du corps, malgré leur grand nombre, ne forment qu''un seul corps. Il en va de même pour Christ. '
  '13':
  - type: text
    content: En effet, que nous soyons juifs ou grecs, esclaves ou libres, nous avons tous été baptisés dans un seul Esprit pour former un seul corps et nous avons tous bu à un seul Esprit.
  '14':
  - type: text
    content: 'Ainsi, le corps n''est pas formé d''un seul organe, mais de plusieurs. '
  '15':
  - type: text
    content: 'Si le pied disait: «Puisque je ne suis pas une main, je n''appartiens pas au corps», ne ferait-il pas partie du corps pour autant? '
  '16':
  - type: text
    content: 'Et si l''oreille disait: «Puisque je ne suis pas un œil, je n''appartiens pas au corps», ne ferait-elle pas partie du corps pour autant? '
  '17':
  - type: text
    content: 'Si tout le corps était un œil, où serait l''ouïe? S''il était tout entier l''ouïe, où serait l''odorat? '
  '18':
  - type: text
    content: 'En fait, Dieu a placé chacun des organes dans le corps comme il l''a voulu. '
  '19':
  - type: text
    content: 'S''ils étaient tous un seul organe, où serait le corps? '
  '2':
  - type: text
    content: 'Vous savez comment, lorsque vous étiez étrangers au peuple de Dieu, vous vous laissiez irrésistiblement entraîner vers les idoles muettes. '
  '20':
  - type: text
    content: 'Il y a donc plusieurs organes, mais un seul corps. '
  '21':
  - type: text
    content: 'L''œil ne peut pas dire à la main: «Je n''ai pas besoin de toi», ni la tête dire aux pieds: «Je n''ai pas besoin de vous.» '
  '22':
  - type: text
    content: 'Bien plus, les parties du corps qui paraissent être les plus faibles sont nécessaires, '
  '23':
  - type: text
    content: 'et celles que nous estimons être les moins honorables du corps, nous les entourons d''un plus grand honneur. Ainsi nos organes les moins décents sont traités avec plus d''égards, '
  '24':
  - type: text
    content: 'tandis que ceux qui sont décents n''en ont pas besoin. Dieu a disposé le corps de manière à donner plus d''honneur à ce qui en manquait, '
  '25':
  - type: text
    content: 'afin qu''il n''y ait pas de division dans le corps mais que tous les membres prennent également soin les uns des autres. '
  '26':
  - type: text
    content: Si un membre souffre, tous les membres souffrent avec lui; si un membre est honoré, tous les membres se réjouissent avec lui.
  '27':
  - type: text
    content: 'Vous êtes le corps de Christ et vous êtes ses membres, chacun pour sa part. '
  '28':
  - type: text
    content: 'Dieu a établi dans l''Eglise premièrement des apôtres, deuxièmement des prophètes, troisièmement des enseignants, ensuite viennent les miracles, puis les dons de guérisons, les aptitudes à secourir, à diriger, à parler diverses langues. '
  '29':
  - type: text
    content: 'Tous sont-ils apôtres? Tous sont-ils prophètes? Tous sont-ils enseignants? Tous font-ils des miracles? '
  '3':
  - type: text
    content: 'C''est pourquoi je vous le déclare, personne, s''il parle par l''Esprit de Dieu, ne dit: «Jésus est maudit!» Et personne ne peut dire: «Jésus est le Seigneur!» si ce n''est par le Saint-Esprit.'
  '30':
  - type: text
    content: Tous ont-ils des dons de guérisons? Tous parlent-ils en langues? Tous interprètent-ils?
  '31':
  - type: text
    content: Aspirez aux dons les meilleurs. Je vais encore vous montrer la voie par excellence.
  '4':
  - type: text
    content: 'Il y a diversité de dons, mais le même Esprit; '
  '5':
  - type: text
    content: 'diversité de services, mais le même Seigneur; '
  '6':
  - type: text
    content: diversité d'actes, mais le même Dieu qui accomplit tout en tous.
  '7':
  - type: text
    content: 'Or, à chacun la manifestation de l''Esprit est donnée pour le bien de tous. '
  '8':
  - type: text
    content: 'En effet, à l''un est donnée par l''Esprit une parole de sagesse; à un autre une parole de connaissance, selon le même Esprit; '
  '9':
  - type: text
    content: 'à un autre la foi, par le même Esprit; à un autre des dons de guérisons, par le même Esprit; '
