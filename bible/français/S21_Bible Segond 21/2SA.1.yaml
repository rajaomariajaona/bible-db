document_id: 2SA.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Règne de David sur Juda
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 1.1–4.12
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Annonce de la mort de Saül
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après la mort de Saül, David, qui avait battu les Amalécites, était revenu à Tsiklag et il y passa deux jours. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le troisième jour, un homme arriva du camp de Saül, les habits déchirés et la tête couverte de terre. Lorsqu''il fut en présence de David, il se jeta par terre et se prosterna. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'David lui demanda: «D''où viens-tu?» L''homme lui répondit: «Je me suis échappé du camp d''Israël.» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'David lui dit: «Que s''est-il passé? Dis-le-moi donc!» Il répondit: «Le peuple s''est enfui du champ de bataille; beaucoup d''hommes sont tombés et sont morts. Même Saül et son fils Jonathan sont morts.» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'David dit au jeune homme qui lui apportait ces nouvelles: «Comment sais-tu que Saül et son fils Jonathan sont morts?» '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le jeune homme qui lui apportait ces nouvelles répondit alors: «Je me trouvais sur le mont Guilboa. Or Saül s''appuyait sur sa lance, et les chars et les cavaliers le serraient de près. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il s''est retourné, m''a aperçu et m''a appelé. J''ai dit: ‘Me voici!’ '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il m''a demandé: ‘Qui es-tu?’ Je lui ai répondu: ‘Je suis amalécite.’ '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il a dit: ‘Approche-toi donc et donne-moi la mort, car je me sens mal, même si je suis encore plein de vie.’ '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Je me suis approché de lui et lui ai donné la mort, sachant bien qu'il ne survivrait pas à sa défaite. J'ai retiré la couronne qui était sur sa tête et le bracelet qu'il avait au bras et je te les apporte ici, mon seigneur.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'David attrapa ses habits et les déchira, et tous les hommes qui étaient auprès de lui firent de même. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils furent dans le deuil, ils pleurèrent et jeûnèrent jusqu'au soir à cause de Saül, de son fils Jonathan, du peuple de l'Eternel et de la communauté d'Israël, parce qu'ils étaient tombés par l'épée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'David dit au jeune homme qui lui avait apporté ces nouvelles: «D''où viens-tu?» Il répondit: «Je suis le fils d''un étranger, d''un Amalécite.» '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'David lui dit: «Comment se fait-il que tu n''aies pas eu peur de porter la main contre celui que l''Eternel a désigné par onction et de lui donner la mort?» '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Puis David appela l''un de ses hommes et lui dit: «Approche-toi et tue-le!» Cet homme frappa l''Amalécite et celui-ci mourut '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'tandis que David lui disait: «Que ton sang retombe sur ta tête! En effet, ta bouche a témoigné contre toi, puisque tu as affirmé avoir toi-même donné la mort à celui que l''Eternel avait désigné par onction!»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Oraison funèbre sur Saül et Jonathan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Voici la complainte que David composa sur Saül et sur son fils Jonathan. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il ordonna de l'enseigner aux Judéens. C'est la complainte de l'arc, qui figure dans le livre du Juste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: «L'élite d'Israël a été blessée sur tes collines!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comment des héros ont-ils pu tomber?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: »Ne l'annoncez pas dans Gath,
- type: usfm
  marker: q1
  children:
  - type: text
    text: n'en proclamez pas la nouvelle dans les rues d'Askalon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sinon les filles des Philistins se réjouiraient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les filles des incirconcis triompheraient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Monts Guilboa,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'il n'y ait sur vous ni rosée ni pluie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni champs permettant de faire des offrandes!
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, c'est là qu'a été jeté le bouclier des héros,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le bouclier de Saül.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Plus jamais on ne le graissera avec de l'huile.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Devant le sang des blessés, devant la graisse des plus vaillants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'arc de Jonathan n'a jamais reculé
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'épée de Saül ne retournait pas à vide.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Saül et Jonathan, aimés et chéris pendant leur vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: n'ont pas été séparés dans la mort.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils étaient plus légers que les aigles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils étaient plus forts que les lions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Filles d'Israël, pleurez sur Saül!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il vous habillait d'un cramoisi magnifique,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il mettait des ornements d'or sur vos habits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Comment des héros ont-ils pu tomber au milieu du combat?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comment Jonathan a-t-il pu être blessé sur tes collines?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: »Je suis dans la douleur à cause de toi, Jonathan, mon frère!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu faisais tout mon plaisir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ton amour pour moi était merveilleux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: supérieur à l'amour des femmes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Comment des héros ont-ils pu tomber?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comment leurs armes ont-elles pu être détruites?»
