document_id: 2SA.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Règne de David sur Juda
  - type: heading
    content: 1.1–4.12
  - type: heading
    content: Annonce de la mort de Saül
  - type: text
    content: 'Après la mort de Saül, David, qui avait battu les Amalécites, était revenu à Tsiklag et il y passa deux jours. '
  '10':
  - type: text
    content: Je me suis approché de lui et lui ai donné la mort, sachant bien qu'il ne survivrait pas à sa défaite. J'ai retiré la couronne qui était sur sa tête et le bracelet qu'il avait au bras et je te les apporte ici, mon seigneur.»
  '11':
  - type: text
    content: 'David attrapa ses habits et les déchira, et tous les hommes qui étaient auprès de lui firent de même. '
  '12':
  - type: text
    content: Ils furent dans le deuil, ils pleurèrent et jeûnèrent jusqu'au soir à cause de Saül, de son fils Jonathan, du peuple de l'Eternel et de la communauté d'Israël, parce qu'ils étaient tombés par l'épée.
  '13':
  - type: text
    content: 'David dit au jeune homme qui lui avait apporté ces nouvelles: «D''où viens-tu?» Il répondit: «Je suis le fils d''un étranger, d''un Amalécite.» '
  '14':
  - type: text
    content: 'David lui dit: «Comment se fait-il que tu n''aies pas eu peur de porter la main contre celui que l''Eternel a désigné par onction et de lui donner la mort?» '
  '15':
  - type: text
    content: 'Puis David appela l''un de ses hommes et lui dit: «Approche-toi et tue-le!» Cet homme frappa l''Amalécite et celui-ci mourut '
  '16':
  - type: text
    content: 'tandis que David lui disait: «Que ton sang retombe sur ta tête! En effet, ta bouche a témoigné contre toi, puisque tu as affirmé avoir toi-même donné la mort à celui que l''Eternel avait désigné par onction!»'
  - type: heading
    content: Oraison funèbre sur Saül et Jonathan
  '17':
  - type: text
    content: 'Voici la complainte que David composa sur Saül et sur son fils Jonathan. '
  '18':
  - type: text
    content: Il ordonna de l'enseigner aux Judéens. C'est la complainte de l'arc, qui figure dans le livre du Juste.
  '19':
  - type: text
    content: «L'élite d'Israël a été blessée sur tes collines!
  - type: text
    content: Comment des héros ont-ils pu tomber?
  '2':
  - type: text
    content: 'Le troisième jour, un homme arriva du camp de Saül, les habits déchirés et la tête couverte de terre. Lorsqu''il fut en présence de David, il se jeta par terre et se prosterna. '
  '20':
  - type: text
    content: »Ne l'annoncez pas dans Gath,
  - type: text
    content: n'en proclamez pas la nouvelle dans les rues d'Askalon,
  - type: text
    content: sinon les filles des Philistins se réjouiraient,
  - type: text
    content: les filles des incirconcis triompheraient.
  '21':
  - type: text
    content: Monts Guilboa,
  - type: text
    content: qu'il n'y ait sur vous ni rosée ni pluie,
  - type: text
    content: ni champs permettant de faire des offrandes!
  - type: text
    content: En effet, c'est là qu'a été jeté le bouclier des héros,
  - type: text
    content: le bouclier de Saül.
  - type: text
    content: Plus jamais on ne le graissera avec de l'huile.
  '22':
  - type: text
    content: Devant le sang des blessés, devant la graisse des plus vaillants,
  - type: text
    content: l'arc de Jonathan n'a jamais reculé
  - type: text
    content: et l'épée de Saül ne retournait pas à vide.
  '23':
  - type: text
    content: Saül et Jonathan, aimés et chéris pendant leur vie,
  - type: text
    content: n'ont pas été séparés dans la mort.
  - type: text
    content: Ils étaient plus légers que les aigles,
  - type: text
    content: ils étaient plus forts que les lions.
  '24':
  - type: text
    content: Filles d'Israël, pleurez sur Saül!
  - type: text
    content: Il vous habillait d'un cramoisi magnifique,
  - type: text
    content: il mettait des ornements d'or sur vos habits.
  '25':
  - type: text
    content: Comment des héros ont-ils pu tomber au milieu du combat?
  - type: text
    content: Comment Jonathan a-t-il pu être blessé sur tes collines?
  '26':
  - type: text
    content: »Je suis dans la douleur à cause de toi, Jonathan, mon frère!
  - type: text
    content: Tu faisais tout mon plaisir.
  - type: text
    content: Ton amour pour moi était merveilleux,
  - type: text
    content: supérieur à l'amour des femmes.
  '27':
  - type: text
    content: Comment des héros ont-ils pu tomber?
  - type: text
    content: Comment leurs armes ont-elles pu être détruites?»
  '3':
  - type: text
    content: 'David lui demanda: «D''où viens-tu?» L''homme lui répondit: «Je me suis échappé du camp d''Israël.» '
  '4':
  - type: text
    content: 'David lui dit: «Que s''est-il passé? Dis-le-moi donc!» Il répondit: «Le peuple s''est enfui du champ de bataille; beaucoup d''hommes sont tombés et sont morts. Même Saül et son fils Jonathan sont morts.» '
  '5':
  - type: text
    content: 'David dit au jeune homme qui lui apportait ces nouvelles: «Comment sais-tu que Saül et son fils Jonathan sont morts?» '
  '6':
  - type: text
    content: 'Le jeune homme qui lui apportait ces nouvelles répondit alors: «Je me trouvais sur le mont Guilboa. Or Saül s''appuyait sur sa lance, et les chars et les cavaliers le serraient de près. '
  '7':
  - type: text
    content: 'Il s''est retourné, m''a aperçu et m''a appelé. J''ai dit: ‘Me voici!’ '
  '8':
  - type: text
    content: 'Il m''a demandé: ‘Qui es-tu?’ Je lui ai répondu: ‘Je suis amalécite.’ '
  '9':
  - type: text
    content: 'Il a dit: ‘Approche-toi donc et donne-moi la mort, car je me sens mal, même si je suis encore plein de vie.’ '
