document_id: 1CH.2,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les fils de Jacob et la descendance de Juda
  - type: text
    content: 'Voici les fils d''Israël. Ruben, Siméon, Lévi, Juda, Issacar, Zabulon, '
  '10':
  - type: text
    content: 'Ram eut pour fils Amminadab, Amminadab eut Nachshon, qui fut le prince des Judéens. '
  '11':
  - type: text
    content: 'Nachshon eut pour fils Salma. Salma eut Boaz. '
  '12':
  - type: text
    content: 'Boaz eut pour fils Obed. Obed eut Isaï. '
  '13':
  - type: text
    content: 'Isaï eut pour fils Eliab, son aîné, Abinadab le deuxième, Shimea le troisième, '
  '14':
  - type: text
    content: 'Nathanaël le quatrième, Raddaï le cinquième, '
  '15':
  - type: text
    content: 'Otsem le sixième et David le septième. '
  '16':
  - type: text
    content: 'Leurs sœurs étaient Tseruja et Abigaïl. Fils de Tseruja: Abishaï, Joab et Asaël, ce qui fait 3. '
  '17':
  - type: text
    content: Abigaïl mit au monde Amasa; le père d'Amasa était Jéther l'Ismaélite.
  '18':
  - type: text
    content: 'Caleb, fils de Hetsron, eut des enfants de sa femme Azuba et de Jerioth. Voici les fils qu''il eut d''Azuba: Jésher, Shobab et Ardon. '
  '19':
  - type: text
    content: 'Lorsque Azuba mourut, Caleb épousa Ephrath, qui lui donna Hur. '
  '2':
  - type: text
    content: Dan, Joseph, Benjamin, Nephthali, Gad et Aser.
  '20':
  - type: text
    content: 'Hur eut pour fils Uri, et Uri eut Betsaleel. '
  '21':
  - type: text
    content: 'Ensuite, Hetsron s''unit à la fille de Makir, le père de Galaad. Il avait 60 ans lorsqu''il l''épousa. Elle lui donna Segub. '
  '22':
  - type: text
    content: 'Segub eut pour descendant Jaïr, qui posséda 23 villes dans le pays de Galaad. '
  '23':
  - type: text
    content: 'Les Gueshuriens et les Syriens leur prirent les bourgs de Jaïr avec Kenath et les villes qui en dépendaient, ce qui faisait 60 villes. Tous ceux-là étaient les fils de Makir, père de Galaad. '
  '24':
  - type: text
    content: Après la mort de Hetsron à Caleb-Ephrata, sa femme Abija lui donna Ashchur, qui fut le père de Tekoa.
  '25':
  - type: text
    content: 'Les fils de Jerachmeel, le fils aîné de Hetsron, furent Ram, l''aîné, Buna, Oren, Otsem et Achija. '
  '26':
  - type: text
    content: 'Jerachmeel eut une autre femme, du nom d''Athara, qui fut la mère d''Onam. '
  '27':
  - type: text
    content: 'Les fils de Ram, le fils aîné de Jerachmeel, furent Maats, Jamin et Eker. '
  '28':
  - type: text
    content: 'Les fils d''Onam furent Shammaï et Jada. Fils de Shammaï: Nadab et Abishur. '
  '29':
  - type: text
    content: 'La femme d''Abishur s''appelait Abichaïl et elle lui donna Achban et Molid. '
  '3':
  - type: text
    content: 'Fils de Juda: Er, Onan, Shéla. Il eut ces trois enfants de la fille de Shua, la Cananéenne. Er, le fils aîné de Juda, était méchant aux yeux de l''Eternel et celui-ci le fit mourir. '
  '30':
  - type: text
    content: 'Fils de Nadab: Séled et Appaïm. Séled mourut sans fils. '
  '31':
  - type: text
    content: 'Fils d''Appaïm: Jisheï. Fils de Jisheï: Shéshan. Fils de Shéshan: Achlaï. '
  '32':
  - type: text
    content: 'Fils de Jada, le frère de Shammaï: Jéther et Jonathan. Jéther mourut sans fils. '
  '33':
  - type: text
    content: 'Fils de Jonathan: Péleth et Zara. Ce sont là les descendants de Jerachmeel. '
  '34':
  - type: text
    content: 'Shéshan n''eut pas de fils, mais il eut des filles. Il avait un esclave égyptien du nom de Jarcha, '
  '35':
  - type: text
    content: 'et il donna sa fille pour femme à son esclave Jarcha, qui eut d''elle Attaï. '
  '36':
  - type: text
    content: 'Attaï eut pour fils Nathan; Nathan eut Zabad; '
  '37':
  - type: text
    content: 'Zabad eut pour fils Ephlal; Ephlal eut Obed; '
  '38':
  - type: text
    content: 'Obed eut pour fils Jéhu; Jéhu eut Azaria; '
  '39':
  - type: text
    content: 'Azaria eut pour fils Halets; Halets eut Elasa; '
  '4':
  - type: text
    content: 'Tamar, la belle-fille de Juda, lui donna Pérets et Zérach. Total des fils de Juda: 5.'
  '40':
  - type: text
    content: 'Elasa eut pour fils Sismaï; Sismaï eut Shallum; '
  '41':
  - type: text
    content: Shallum eut pour fils Jekamja; Jekamja eut Elishama.
  '42':
  - type: text
    content: 'Descendants de Caleb, le frère de Jerachmeel: Mésha, son aîné, qui fut le père de Ziph, et les fils de Marésha, le père d''Hébron. '
  '43':
  - type: text
    content: 'Fils d''Hébron: Koré, Thappuach, Rékem et Shéma. '
  '44':
  - type: text
    content: 'Shéma eut pour fils Racham, père de Jorkeam. Rékem eut Shammaï. '
  '45':
  - type: text
    content: 'Fils de Shammaï: Maon, qui fut le père de Beth-Tsur. '
  '46':
  - type: text
    content: 'Epha, la concubine de Caleb, mit au monde Haran, Motsa et Gazez. Haran eut Gazez. '
  '47':
  - type: text
    content: 'Fils de Jahdaï: Réguem, Jotham, Guéshan, Péleth, Epha et Shaaph. '
  '48':
  - type: text
    content: 'Maaca, la concubine de Caleb, mit au monde Shéber et Tirchana. '
  '49':
  - type: text
    content: Elle donna encore naissance à Shaaph, le père de Madmanna, et à Sheva, le père de Macbéna et de Guibea. La fille de Caleb était Acsa.
  '5':
  - type: text
    content: 'Fils de Pérets: Hetsron et Hamul. '
  '50':
  - type: text
    content: 'Voici encore des descendants de Caleb: Shobal, fils de Hur, fils aîné d''Ephrata et père de Kirjath-Jearim; '
  '51':
  - type: text
    content: 'Salma, père de Bethléhem; Hareph, père de Beth-Gader. '
  '52':
  - type: text
    content: 'Les fils de Shobal, père de Kirjath-Jearim, furent Haroé et Hatsi-Hammenuhoth. '
  '53':
  - type: text
    content: 'Les clans de Kirjath-Jearim furent les Jéthriens, les Puthiens, les Shumathiens et les Mishraïens; de ces clans sont issus les Tsoreathiens et les Eshthaoliens. '
  '54':
  - type: text
    content: 'Fils de Salma: Bethléhem et les Nethophathiens, Athroth-Beth-Joab, Hatsi-Hammanachthi, les Tsoreïens, '
  '55':
  - type: text
    content: ainsi que les clans des scribes installés à Jaebets, les Thireathiens, les Shimeathiens et les Sucathiens. Ce sont les Kéniens, issus de Hamath, l'ancêtre de la famille de Récab.
  '6':
  - type: text
    content: 'Fils de Zérach: Zimri, Ethan, Héman, Calcol et Dara. En tout: 5. '
  '7':
  - type: text
    content: 'Fils de Carmi: Acar, qui sema le trouble en Israël lorsqu''il commit un acte d''infidélité au sujet des biens voués à la destruction. '
  '8':
  - type: text
    content: 'Fils d''Ethan: Azaria.'
  '9':
  - type: text
    content: 'Fils qu''eut Hetsron: Jerachmeel, Ram et Kelubaï.'
