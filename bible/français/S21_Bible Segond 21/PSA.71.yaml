document_id: PSA.71,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière confiante d'un vieil homme persécuté
  - type: text
    content: 'Eternel, je cherche refuge en toi:'
  - type: text
    content: que jamais je ne sois déçu!
  '10':
  - type: text
    content: En effet, mes ennemis parlent de moi,
  - type: text
    content: et ceux qui guettent ma vie tiennent conseil ensemble.
  '11':
  - type: text
    content: 'Ils disent: «Dieu l''abandonne.'
  - type: text
    content: Poursuivez-le, attrapez-le! Il n'y a personne pour le délivrer.»
  '12':
  - type: text
    content: O Dieu, ne t'éloigne pas de moi!
  - type: text
    content: Mon Dieu, viens vite à mon secours!
  '13':
  - type: text
    content: Qu'ils soient honteux et disparaissent, ceux qui m'accusent,
  - type: text
    content: qu'ils soient couverts de honte et de déshonneur, ceux qui cherchent mon malheur!
  '14':
  - type: text
    content: Quant à moi, j'espérerai toujours,
  - type: text
    content: je te louerai de plus en plus.
  '15':
  - type: text
    content: Ma bouche proclamera ta justice, ton salut, chaque jour,
  - type: text
    content: car j'ignore le nombre de tes bienfaits.
  '16':
  - type: text
    content: Je raconterai tes hauts faits, Seigneur Eternel,
  - type: text
    content: je rappellerai ta justice, la tienne seule.
  '17':
  - type: text
    content: O Dieu, tu m'as instruit dès ma jeunesse,
  - type: text
    content: et jusqu'à présent j'annonce tes merveilles.
  '18':
  - type: text
    content: Ne m'abandonne pas, ô Dieu, malgré ma vieillesse et mes cheveux blancs,
  - type: text
    content: afin que j'annonce ta force à la génération présente,
  - type: text
    content: ta puissance à tous ceux qui viendront!
  '19':
  - type: text
    content: Ta justice, ô Dieu, atteint les sommets.
  - type: text
    content: 'Tu as accompli de grandes choses: ô Dieu, qui est semblable à toi?'
  '2':
  - type: text
    content: Dans ta justice, secours-moi et délivre-moi,
  - type: text
    content: tends ton oreille vers moi et sauve-moi!
  '20':
  - type: text
    content: Tu nous as fait éprouver bien des détresses et des malheurs,
  - type: text
    content: mais tu nous redonneras la vie,
  - type: text
    content: tu nous feras remonter des abîmes de la terre.
  '21':
  - type: text
    content: Tu augmenteras mon honneur,
  - type: text
    content: tu me consoleras encore,
  '22':
  - type: text
    content: et je te louerai au son du luth, je chanterai ta fidélité, mon Dieu,
  - type: text
    content: je te célébrerai avec la harpe, Saint d'Israël.
  '23':
  - type: text
    content: Pour te célébrer, j'aurai la joie sur les lèvres
  - type: text
    content: et dans mon âme que tu as libérée.
  '24':
  - type: text
    content: Ma langue proclamera chaque jour ta justice,
  - type: text
    content: car ceux qui cherchent mon malheur sont honteux et rougissent.
  '3':
  - type: text
    content: Sois pour moi un rocher où je trouve un refuge,
  - type: text
    content: où je puisse toujours me retirer!
  - type: text
    content: Tu as décidé de me sauver,
  - type: text
    content: car tu es mon rocher et ma forteresse.
  '4':
  - type: text
    content: Mon Dieu, délivre-moi du méchant,
  - type: text
    content: de l'homme injuste et violent,
  '5':
  - type: text
    content: car tu es mon espérance, Seigneur, Eternel,
  - type: text
    content: l'objet de ma confiance depuis ma jeunesse.
  '6':
  - type: text
    content: 'Depuis ma naissance je m''appuie sur toi:'
  - type: text
    content: c'est toi qui m'as fait sortir du ventre de ma mère.
  - type: text
    content: Tu es sans cesse l'objet de mes louanges.
  '7':
  - type: text
    content: Je suis pour beaucoup un cas étrange,
  - type: text
    content: mais toi, tu es mon puissant refuge.
  '8':
  - type: text
    content: Que ma bouche soit remplie de tes louanges,
  - type: text
    content: que chaque jour elle dise ta beauté!
  '9':
  - type: text
    content: Ne me rejette pas au moment de la vieillesse!
  - type: text
    content: Quand mes forces s'en vont, ne m'abandonne pas!
