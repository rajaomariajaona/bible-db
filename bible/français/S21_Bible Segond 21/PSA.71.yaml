document_id: PSA.71,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière confiante d'un vieil homme persécuté
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Eternel, je cherche refuge en toi:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que jamais je ne sois déçu!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: En effet, mes ennemis parlent de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ceux qui guettent ma vie tiennent conseil ensemble.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ils disent: «Dieu l''abandonne.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Poursuivez-le, attrapez-le! Il n'y a personne pour le délivrer.»
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: O Dieu, ne t'éloigne pas de moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon Dieu, viens vite à mon secours!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Qu'ils soient honteux et disparaissent, ceux qui m'accusent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'ils soient couverts de honte et de déshonneur, ceux qui cherchent mon malheur!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Quant à moi, j'espérerai toujours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te louerai de plus en plus.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ma bouche proclamera ta justice, ton salut, chaque jour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car j'ignore le nombre de tes bienfaits.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Je raconterai tes hauts faits, Seigneur Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je rappellerai ta justice, la tienne seule.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: O Dieu, tu m'as instruit dès ma jeunesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et jusqu'à présent j'annonce tes merveilles.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ne m'abandonne pas, ô Dieu, malgré ma vieillesse et mes cheveux blancs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que j'annonce ta force à la génération présente,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ta puissance à tous ceux qui viendront!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ta justice, ô Dieu, atteint les sommets.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu as accompli de grandes choses: ô Dieu, qui est semblable à toi?'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Dans ta justice, secours-moi et délivre-moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tends ton oreille vers moi et sauve-moi!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tu nous as fait éprouver bien des détresses et des malheurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais tu nous redonneras la vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu nous feras remonter des abîmes de la terre.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Tu augmenteras mon honneur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu me consoleras encore,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: et je te louerai au son du luth, je chanterai ta fidélité, mon Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te célébrerai avec la harpe, Saint d'Israël.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Pour te célébrer, j'aurai la joie sur les lèvres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et dans mon âme que tu as libérée.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ma langue proclamera chaque jour ta justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ceux qui cherchent mon malheur sont honteux et rougissent.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Sois pour moi un rocher où je trouve un refuge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où je puisse toujours me retirer!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as décidé de me sauver,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tu es mon rocher et ma forteresse.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mon Dieu, délivre-moi du méchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de l'homme injuste et violent,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: car tu es mon espérance, Seigneur, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'objet de ma confiance depuis ma jeunesse.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Depuis ma naissance je m''appuie sur toi:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est toi qui m'as fait sortir du ventre de ma mère.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es sans cesse l'objet de mes louanges.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Je suis pour beaucoup un cas étrange,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais toi, tu es mon puissant refuge.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Que ma bouche soit remplie de tes louanges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que chaque jour elle dise ta beauté!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ne me rejette pas au moment de la vieillesse!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand mes forces s'en vont, ne m'abandonne pas!
