document_id: GEN.35
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jacob à Béthel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dieu dit à Jacob: «Lève-toi, monte à Béthel et installe-toi là-bas. Tu y construiras un autel en l''honneur du Dieu qui t''est apparu lorsque tu fuyais ton frère Esaü.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jacob dit à sa famille et à tous ceux qui étaient avec lui: «Enlevez les dieux étrangers qui sont au milieu de vous, purifiez-vous et changez de vêtements. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Nous nous lèverons et nous monterons à Béthel. Là, je construirai un autel en l'honneur du Dieu qui m'a répondu lorsque j'étais dans la détresse et qui a été avec moi pendant le voyage que j'ai fait.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils donnèrent à Jacob tous les dieux étrangers qui étaient en leur possession et les anneaux qui étaient à leurs oreilles. Jacob les enfouit sous le térébinthe qui se trouve près de Sichem. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ensuite ils partirent. La terreur de Dieu se propagea dans les villes qui les entouraient et l''on ne poursuivit pas les fils de Jacob. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jacob arriva ainsi à Luz dans le pays de Canaan, c''est-à-dire Béthel, avec tous ceux qui l''accompagnaient. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il y construisit un autel et il appela cet endroit El-Béthel, car c'est là que Dieu s'était révélé à lui lorsqu'il fuyait son frère.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Débora, la nourrice de Rebecca, mourut. Elle fut enterrée au-dessous de Béthel, sous le chêne que l'on a appelé chêne des pleurs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dieu apparut encore à Jacob après son retour de Paddan-Aram, et il le bénit. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dieu lui dit: «Ton nom est Jacob. Tu ne seras plus appelé Jacob, mais ton nom sera Israël.» Il lui donna ainsi le nom d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dieu lui dit: «Je suis le Dieu tout-puissant. Prolifère et multiplie-toi! Une nation et tout un groupe de nations seront issus de toi et des rois naîtront de toi. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je te donnerai le pays que j''ai donné à Abraham et à Isaac, et je donnerai ce pays à ta descendance après toi.» '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Puis Dieu s''éleva au-dessus de lui à l''endroit où il lui avait parlé. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jacob dressa un monument à l''endroit où Dieu lui avait parlé, un monument de pierres sur lequel il fit une offrande de vin et versa de l''huile. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Jacob appela Béthel l'endroit où Dieu lui avait parlé.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Naissance de Benjamin et mort de Rachel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ils partirent de Béthel. Il y avait encore une certaine distance jusqu''à Ephrata lorsque Rachel accoucha. Elle eut un accouchement pénible. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Pendant les douleurs de l''accouchement, la sage-femme lui dit: «N''aie pas peur, car tu as encore un fils!» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Alors qu'elle allait rendre l'âme, car elle était mourante, elle lui donna le nom de Ben-Oni, mais son père l'appela Benjamin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ben-Oni… Benjamin: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: littéralement fils de ma douleur… fils de la droite.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Rachel mourut et fut enterrée sur le chemin d''Ephrata, c''est-à-dire Bethléhem. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Jacob construisit un monument sur son tombeau. C'est le monument du tombeau de Rachel, qui existe encore aujourd'hui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Israël partit et dressa sa tente après Migdal-Eder. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Pendant qu'Israël résidait dans cette région, Ruben alla coucher avec Bilha, la concubine de son père, et Israël l'apprit. Les fils de Jacob étaient au nombre de 12.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Fils de Léa: Ruben, le fils aîné de Jacob, Siméon, Lévi, Juda, Issacar et Zabulon. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Fils de Rachel: Joseph et Benjamin. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Fils de Bilha, la servante de Rachel: Dan et Nephthali. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Fils de Zilpa, la servante de Léa: Gad et Aser. Voilà quels sont les fils de Jacob, ceux qu''il eut à Paddan-Aram.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Jacob arriva vers son père Isaac à Mamré près de Kirjath-Arba, c'est-à-dire Hébron, où Abraham et Isaac avaient séjourné en étrangers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Isaac vécut 180 ans. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Il expira et mourut. Il alla rejoindre les siens alors qu'il était âgé et rassasié de jours, et ce furent ses fils Esaü et Jacob qui l'enterrèrent.
