document_id: GEN.35,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Jacob à Béthel
  - type: text
    content: 'Dieu dit à Jacob: «Lève-toi, monte à Béthel et installe-toi là-bas. Tu y construiras un autel en l''honneur du Dieu qui t''est apparu lorsque tu fuyais ton frère Esaü.»'
  '10':
  - type: text
    content: 'Dieu lui dit: «Ton nom est Jacob. Tu ne seras plus appelé Jacob, mais ton nom sera Israël.» Il lui donna ainsi le nom d''Israël. '
  '11':
  - type: text
    content: 'Dieu lui dit: «Je suis le Dieu tout-puissant. Prolifère et multiplie-toi! Une nation et tout un groupe de nations seront issus de toi et des rois naîtront de toi. '
  '12':
  - type: text
    content: 'Je te donnerai le pays que j''ai donné à Abraham et à Isaac, et je donnerai ce pays à ta descendance après toi.» '
  '13':
  - type: text
    content: 'Puis Dieu s''éleva au-dessus de lui à l''endroit où il lui avait parlé. '
  '14':
  - type: text
    content: 'Jacob dressa un monument à l''endroit où Dieu lui avait parlé, un monument de pierres sur lequel il fit une offrande de vin et versa de l''huile. '
  '15':
  - type: text
    content: Jacob appela Béthel l'endroit où Dieu lui avait parlé.
  - type: heading
    content: Naissance de Benjamin et mort de Rachel
  '16':
  - type: text
    content: 'Ils partirent de Béthel. Il y avait encore une certaine distance jusqu''à Ephrata lorsque Rachel accoucha. Elle eut un accouchement pénible. '
  '17':
  - type: text
    content: 'Pendant les douleurs de l''accouchement, la sage-femme lui dit: «N''aie pas peur, car tu as encore un fils!» '
  '18':
  - type: text
    content: Alors qu'elle allait rendre l'âme, car elle était mourante, elle lui donna le nom de Ben-Oni, mais son père l'appela Benjamin
  - type: note
    content: 'Ben-Oni… Benjamin: littéralement fils de ma douleur… fils de la droite.'
  - type: text
    content: '. '
  '19':
  - type: text
    content: 'Rachel mourut et fut enterrée sur le chemin d''Ephrata, c''est-à-dire Bethléhem. '
  '2':
  - type: text
    content: 'Jacob dit à sa famille et à tous ceux qui étaient avec lui: «Enlevez les dieux étrangers qui sont au milieu de vous, purifiez-vous et changez de vêtements. '
  '20':
  - type: text
    content: Jacob construisit un monument sur son tombeau. C'est le monument du tombeau de Rachel, qui existe encore aujourd'hui.
  '21':
  - type: text
    content: 'Israël partit et dressa sa tente après Migdal-Eder. '
  '22':
  - type: text
    content: Pendant qu'Israël résidait dans cette région, Ruben alla coucher avec Bilha, la concubine de son père, et Israël l'apprit. Les fils de Jacob étaient au nombre de 12.
  '23':
  - type: text
    content: 'Fils de Léa: Ruben, le fils aîné de Jacob, Siméon, Lévi, Juda, Issacar et Zabulon. '
  '24':
  - type: text
    content: 'Fils de Rachel: Joseph et Benjamin. '
  '25':
  - type: text
    content: 'Fils de Bilha, la servante de Rachel: Dan et Nephthali. '
  '26':
  - type: text
    content: 'Fils de Zilpa, la servante de Léa: Gad et Aser. Voilà quels sont les fils de Jacob, ceux qu''il eut à Paddan-Aram.'
  '27':
  - type: text
    content: Jacob arriva vers son père Isaac à Mamré près de Kirjath-Arba, c'est-à-dire Hébron, où Abraham et Isaac avaient séjourné en étrangers.
  '28':
  - type: text
    content: 'Isaac vécut 180 ans. '
  '29':
  - type: text
    content: Il expira et mourut. Il alla rejoindre les siens alors qu'il était âgé et rassasié de jours, et ce furent ses fils Esaü et Jacob qui l'enterrèrent.
  '3':
  - type: text
    content: Nous nous lèverons et nous monterons à Béthel. Là, je construirai un autel en l'honneur du Dieu qui m'a répondu lorsque j'étais dans la détresse et qui a été avec moi pendant le voyage que j'ai fait.»
  '4':
  - type: text
    content: 'Ils donnèrent à Jacob tous les dieux étrangers qui étaient en leur possession et les anneaux qui étaient à leurs oreilles. Jacob les enfouit sous le térébinthe qui se trouve près de Sichem. '
  '5':
  - type: text
    content: 'Ensuite ils partirent. La terreur de Dieu se propagea dans les villes qui les entouraient et l''on ne poursuivit pas les fils de Jacob. '
  '6':
  - type: text
    content: 'Jacob arriva ainsi à Luz dans le pays de Canaan, c''est-à-dire Béthel, avec tous ceux qui l''accompagnaient. '
  '7':
  - type: text
    content: Il y construisit un autel et il appela cet endroit El-Béthel, car c'est là que Dieu s'était révélé à lui lorsqu'il fuyait son frère.
  '8':
  - type: text
    content: Débora, la nourrice de Rebecca, mourut. Elle fut enterrée au-dessous de Béthel, sous le chêne que l'on a appelé chêne des pleurs.
  '9':
  - type: text
    content: 'Dieu apparut encore à Jacob après son retour de Paddan-Aram, et il le bénit. '
