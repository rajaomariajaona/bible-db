document_id: REV.11,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les deux témoins
  - type: text
    content: 'On me donna un roseau semblable à une baguette en me disant: «Lève-toi et mesure le temple de Dieu, l''autel et ceux qui y adorent. '
  '10':
  - type: text
    content: Les habitants de la terre se réjouiront à leur sujet, ils feront la fête et ils échangeront des cadeaux, parce que ces deux prophètes leur auront causé bien des tourments.
  '11':
  - type: text
    content: 'Après les trois jours et demi, un esprit de vie venu de Dieu entra en eux et ils se tinrent debout sur leurs pieds; une grande crainte s''empara alors de ceux qui les voyaient. '
  '12':
  - type: text
    content: 'J''entendis une voix forte qui, du ciel, leur disait: «Montez ici!» Et ils montèrent au ciel dans la nuée sous les yeux de leurs ennemis. '
  '13':
  - type: text
    content: 'A ce moment-là, il y eut un grand tremblement de terre et le dixième de la ville s''écroula: 7000 hommes furent tués dans ce tremblement de terre; les autres furent effrayés et rendirent gloire au Dieu du ciel.'
  '14':
  - type: text
    content: Le deuxième malheur est passé. Voici, le troisième malheur vient bientôt.
  - type: heading
    content: La septième trompette
  '15':
  - type: text
    content: 'Le septième ange sonna de la trompette et des voix fortes retentirent dans le ciel. Elles disaient: «Le royaume du monde est remis à notre Seigneur et à son Messie'
  - type: note
    content: 'Son Messie: ou son Christ, ou celui qu''il a oint, c''est-à-dire le libérateur annoncé par l''Ancien Testament, qui devait exercer une autorité universelle (voir Esaïe 61.1; Psaume 2.2; Daniel 7.13-14; 9.25-26, etc.).'
  - type: text
    content: ', et il régnera aux siècles des siècles.»'
  '16':
  - type: text
    content: 'Les vingt-quatre anciens qui étaient assis devant Dieu sur leur trône se prosternèrent, le visage contre terre, et ils adorèrent Dieu '
  '17':
  - type: text
    content: 'en disant: «Nous te remercions, Seigneur Dieu tout-puissant, toi qui es et qui étais, parce que tu as exercé ta grande puissance et établi ton règne. '
  '18':
  - type: text
    content: Les nations se sont irritées, mais ta colère aussi est venue; voici le moment de juger les morts, de récompenser tes serviteurs les prophètes, les saints et ceux qui craignent ton nom, petits et grands, et de détruire ceux qui détruisent la terre.»
  '19':
  - type: text
    content: Alors le temple de Dieu qui est dans le ciel fut ouvert et l'arche de son alliance apparut dans son temple. Il y eut des éclairs, des voix, des coups de tonnerre, [un tremblement de terre] et une forte grêle.
  '2':
  - type: text
    content: 'Quant au parvis extérieur du temple, laisse-le de côté et ne le mesure pas, car il a été donné aux nations et elles piétineront la ville sainte pendant 42 mois. '
  '3':
  - type: text
    content: Je donnerai à mes deux témoins le pouvoir de prophétiser, habillés de sacs
  - type: note
    content: 'Sacs: tenue exprimant le deuil ou la tristesse.'
  - type: text
    content: ', pendant 1260 jours.» '
  '4':
  - type: text
    content: 'Ce sont les deux oliviers et les deux chandeliers qui se tiennent devant le Seigneur de la terre. '
  '5':
  - type: text
    content: 'Si quelqu''un veut leur faire du mal, du feu sort de leur bouche et dévore leurs ennemis. Oui, si quelqu''un veut leur faire du mal, c''est ainsi qu''il doit être tué. '
  '6':
  - type: text
    content: Ils ont le pouvoir de fermer le ciel afin qu'il ne tombe pas de pluie durant le temps de leur prophétie. Ils ont aussi le pouvoir de changer l'eau en sang et de frapper la terre de toutes sortes de fléaux chaque fois qu'ils le voudront.
  '7':
  - type: text
    content: 'Quand ils auront fini de rendre leur témoignage, la bête qui monte de l''abîme leur fera la guerre, les vaincra et les tuera. '
  '8':
  - type: text
    content: 'Leurs cadavres seront laissés sur la place de la grande ville appelée symboliquement Sodome et Egypte, là même où leur Seigneur a été crucifié. '
  '9':
  - type: text
    content: 'Des hommes de divers peuples, tribus, langues et nations verront leurs cadavres pendant trois jours et demi, et ils ne permettront pas qu''on les mette au tombeau. '
