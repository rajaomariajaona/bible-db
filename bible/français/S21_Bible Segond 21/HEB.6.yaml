document_id: HEB.6
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: C'est pourquoi, laissant les bases de l'enseignement relatif au Messie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Messie: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ou oint de Dieu, en grec Christos. Les Juifs attendaient, d'après les promesses de l'Ancien Testament, la venue d'une personne désignée par Dieu, qui leur apporterait la délivrance.
    marker-yv: yv-n
  - type: text
    text: ', tendons vers la maturité sans avoir à reposer le fondement du renoncement aux œuvres mortes, de la foi en Dieu, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: de l'enseignement concernant les baptêmes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Baptêmes: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: possible allusion aux différents baptêmes juifs, au baptême de Jean et au baptême chrétien.
    marker-yv: yv-n
  - type: text
    text: ' et l''imposition des mains, de la résurrection des morts et du jugement éternel. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C'est ce que nous ferons, si Dieu le permet.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'En effet, ceux qui ont été une fois éclairés, qui ont goûté au don céleste, qui ont eu part au Saint-Esprit, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'qui ont goûté à la bonne parole de Dieu et aux puissances du monde à venir, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'et qui pourtant sont tombés, il est impossible de les amener une nouvelle fois à changer d''attitude, puisqu''ils crucifient de nouveau pour eux-mêmes le Fils de Dieu et le déshonorent publiquement. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Lorsqu''une terre arrosée de pluies fréquentes produit des plantes utiles à ceux pour qui elle est cultivée, elle reçoit de Dieu sa part de bénédiction. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mais si elle produit des ronces et des chardons, elle est jugée sans valeur, bien près d'être maudite, et on finit par y mettre le feu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Même si nous parlons ainsi, bien-aimés, nous sommes convaincus qu''en ce qui vous concerne vous avez la meilleure part, celle qui est favorable au salut. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: En effet, Dieu n'est pas injuste pour oublier votre œuvre et [le travail de] votre amour. Vous avez démontré votre amour pour son nom par les services que vous avez rendus et que vous rendez encore aux saints
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Saints: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: manière de désigner les chrétiens en tant que personnes consacrées à Dieu et appelées à avoir le comportement qui découle de leur appartenance à ce Dieu.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'et nous désirons que chacun de vous fasse preuve du même zèle pour conserver jusqu''à la fin une pleine espérance. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ainsi vous ne vous relâcherez pas, mais vous imiterez ceux qui, par la foi et la patience, reçoivent l'héritage promis.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Lorsque Dieu a fait la promesse à Abraham, comme il ne pouvait pas prêter serment par plus grand que lui, '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: il a juré par lui-même
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'en disant: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Certainement, je te comblerai de bénédictions et je multiplierai ta descendance
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.13-14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il a juré… descendance: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Genèse 22.16
      metadata:
        usfm: GEN.22.16
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '17'
      metadata:
        usfm: GEN.22.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: C'est ainsi qu'après une attente patiente Abraham a obtenu ce qui lui avait été promis.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Or, les hommes jurent par plus grand qu''eux et le serment est une garantie qui met fin à toute contestation. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'C''est pourquoi Dieu, voulant montrer plus clairement encore aux héritiers de la promesse le caractère irrévocable de sa décision, est intervenu par un serment. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ainsi, par deux actes irrévocables dans lesquels il est impossible que Dieu mente, nous sommes puissamment encouragés, nous dont le seul refuge a été de saisir l''espérance qui nous était proposée. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Cette espérance, nous la possédons comme une ancre solide et sûre de l'âme; elle pénètre derrière le voile
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Voile: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: allusion au rideau qui séparait le lieu saint du lieu très saint, où seul le grand-prêtre pouvait entrer une fois par an.
    marker-yv: yv-n
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'là où Jésus, établi '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: grand-prêtre pour toujours à la manière de Melchisédek
  - type: text
    text: ', est entré pour nous en précurseur.'
