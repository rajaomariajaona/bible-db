document_id: PRO.17,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mieux vaut un morceau de pain sec avec la tranquillité
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'une maison pleine de viande avec des disputes.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une menace a plus d'effet sur un homme intelligent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que 100 coups sur un homme stupide.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le méchant ne cherche que révolte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un messager sans pitié sera envoyé contre lui.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il vaut mieux rencontrer une ourse privée de ses petits
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'un homme stupide dans sa folie.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si quelqu'un rend le mal pour le bien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le mal ne quittera pas sa maison.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S'engager dans un conflit, c'est ouvrir une vanne;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant que la dispute n'éclate, retire-toi!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui acquitte le coupable et celui qui condamne le juste
  - type: usfm
    marker: q1
    children:
    - type: text
      text: font tous deux horreur à l'Eternel.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A quoi sert un salaire entre les mains de l'homme stupide?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne peut acheter la sagesse et le bon sens!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'ami aime en toute circonstance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et dans le malheur il se montre un frère.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'homme dépourvu de bon sens prend des engagements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il se porte garant pour son prochain.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui aime les querelles aime la révolte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui rehausse sa porte cherche la ruine.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un serviteur avisé domine sur le fils qui fait honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il aura une part d'héritage au milieu des frères.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un cœur faux ne trouve pas le bonheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et celui dont la langue est perverse tombe dans le malheur.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui donne naissance à un homme stupide aura du chagrin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le père d'un fou ne pourra pas se réjouir.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un cœur joyeux est un bon remède,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais un esprit abattu dessèche les os.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le méchant accepte des pots-de-vin offerts sous le manteau
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour tordre les voies du droit.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La sagesse est en face de l'homme intelligent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais les yeux de l'homme stupide s'en vont à l'extrémité de la terre.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un fils stupide est une source de chagrin pour son père,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et d'amertume pour celle qui l'a mis au monde.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n'est pas bon de condamner le juste à une amende,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni de frapper les hommes généreux à cause de leur droiture.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui met un frein à ses paroles possède la connaissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'homme à l'esprit calme fait preuve d'intelligence.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même le fou, quand il se tait, passe pour sage;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui ferme ses lèvres est un homme intelligent.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le creuset est pour l'argent, et le fourneau pour l'or,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais celui qui met les cœurs à l'épreuve, c'est l'Eternel.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le méchant est attentif à la lèvre injuste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le menteur prête l'oreille à la langue criminelle.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Se moquer du pauvre, c'est insulter son créateur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui se réjouit d'un malheur ne restera pas impuni.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les petits-enfants sont la couronne des vieillards,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les pères sont la gloire de leurs enfants.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si les paroles distinguées ne conviennent pas à un fou,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les paroles mensongères conviennent d'autant moins à un noble.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le pot-de-vin est un outil précieux aux yeux de celui qui s''en sert:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où qu'il se tourne, il a du succès.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui couvre une offense recherche l'amour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui la rappelle dans ses discours divise les amis.
