document_id: TIT.3
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Rappelle-leur de se soumettre aux magistrats et aux autorités, de leur obéir, d''être prêts pour toute œuvre bonne, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: de ne calomnier personne, d'être pacifiques, conciliants, pleins de douceur envers tous les hommes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nous aussi, en effet, nous étions autrefois stupides, rebelles, égarés, esclaves de toutes sortes de passions et de plaisirs. Nous vivions dans la méchanceté et dans l''envie, nous étions odieux et nous nous détestions les uns les autres. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mais lorsque la bonté de Dieu notre Sauveur et son amour pour les hommes ont été révélés, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'il nous a sauvés. Et il ne l''a pas fait à cause des actes de justice que nous aurions pu accomplir, mais conformément à sa compassion, à travers le bain de la nouvelle naissance et le renouvellement du Saint-Esprit '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'qu''il a déversé avec abondance sur nous par Jésus-Christ notre Sauveur. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ainsi, déclarés justes par sa grâce, nous sommes devenus ses héritiers conformément à l'espérance de la vie éternelle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Cette parole est certaine, et je veux que tu te montres affirmatif là-dessus, afin que ceux qui ont cru en Dieu s''appliquent à pratiquer de belles œuvres. Voilà ce qui est bon et utile aux hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais les folles spéculations, les généalogies, les disputes, les conflits relatifs à la loi, évite-les, car ils sont nuisibles et sans valeur. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Si quelqu''un provoque des divisions, éloigne-le de toi après un premier puis un second avertissement. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Sache qu'un tel homme est perverti et qu'il pèche, se condamnant ainsi lui-même.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dernières instructions et salutations
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lorsque je t''enverrai Artémas ou Tychique, empresse-toi de venir me rejoindre à Nicopolis, car c''est là que j''ai décidé de passer l''hiver. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Aide avec empressement Zénas, l''expert de la loi, et Apollos dans leur voyage, en faisant en sorte qu''il ne leur manque rien. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il faut que les nôtres aussi apprennent à pratiquer de belles œuvres pour subvenir aux besoins les plus importants, afin de ne pas rester sans fruits.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tous ceux qui sont avec moi te saluent. De ton côté, salue ceux qui nous aiment dans la foi. Que la grâce soit avec vous tous!
