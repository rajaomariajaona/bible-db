document_id: ISA.48,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Anciennes et nouvelles prédictions
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoutez cela, famille de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous qui portez le nom d'Israël
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui êtes issus de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous qui prêtez serment au nom de l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui évoquez le souvenir du Dieu d'Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais sans sincérité ni droiture!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t'ai affiné au creuset, mais pas pour retirer de l'argent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je t'ai mis à l'épreuve dans la fournaise de l'adversité.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est à cause de moi, à cause de moi seul, que je veux agir.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, comment pourrais-je me laisser déshonorer?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne donnerai pas ma gloire à un autre.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Appel à écouter Dieu
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoute-moi, Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et toi, Israël, toi que j'ai appelé!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je suis toujours le même: c''est moi qui suis le premier,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: moi aussi qui suis le dernier.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est ma propre main qui a fondé la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ma main droite qui a déployé le ciel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il suffit que je les appelle et ils se présentent tous ensemble.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous tous, rassemblez-vous et écoutez!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui parmi eux a révélé cela?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui que l'Eternel aime accomplira sa volonté contre Babylone
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son bras pèsera lourdement sur les Babyloniens.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est moi, moi qui ai parlé et qui l'ai appelé.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je l'ai fait venir et son entreprise réussira.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Approchez-vous de moi et écoutez cela!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Depuis le début, je n'ai pas parlé en secret;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au moment où cela se produira, je serai là.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et maintenant le Seigneur, l'Eternel, m'a envoyé avec son Esprit.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici ce que dit l''Eternel, celui qui te rachète, le Saint d''Israël:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Moi, l'Eternel, ton Dieu, je t'instruis pour ton bien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te conduis sur le chemin à suivre.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si seulement tu étais attentif à mes commandements!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta paix serait pareille à un fleuve
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ta justice se propagerait comme les vagues de la mer.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta descendance serait pareille au sable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tes rejetons seraient aussi nombreux que les grains de sable.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton nom ne serait jamais effacé, jamais éliminé devant moi.»
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, ils tirent leur nom de la ville sainte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et s'appuient sur le Dieu d'Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui dont le nom est l'Eternel, le maître de l'univers.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sortez de Babylone, fuyez du milieu des Babyloniens!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: D'une voix triomphante révélez-le, annoncez-le,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: faites-le savoir jusqu'au bout de la terre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dites: «L''Eternel a racheté son serviteur Jacob!»'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils n''auront pas soif dans les déserts où il les conduira:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il fera jaillir pour eux l'eau du rocher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il fendra le rocher et l'eau coulera.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n'y a pas de paix pour les méchants, dit l'Eternel.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Depuis longtemps j'ai révélé les premiers événements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont sortis de ma bouche et je les ai annoncés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Soudain j'ai agi et ils se sont produits.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sachant que tu es endurci,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que ton cou est une barre de fer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que tu as un front en bronze,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je t'ai révélé depuis longtemps ces événements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te les ai annoncés avant qu'ils ne se produisent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'afin que tu ne dises pas:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «C'est mon idole qui les a faits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est ma sculpture sacrée ou ma statue en métal fondu qui les a ordonnés.»
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as bien entendu tout cela, constate-le!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N'allez-vous pas l'avouer?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Désormais je t'annonce des choses nouvelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cachées, qui te sont inconnues.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles sont créées maintenant, et pas depuis longtemps;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu'à aujourd'hui tu n'en avais pas entendu parler.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi tu ne pourras pas dire: «Je le savais déjà.»'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Non, tu n'en as rien entendu, tu n'en as rien su
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et cela n'a jamais frappé ton oreille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je savais que tu te comporterais en traître
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'on t'appellerait «rebelle de naissance».
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de mon nom, je suspends ma colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de la louange qui m'est due je me retiens vis-à-vis de toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour ne pas t'exterminer.
