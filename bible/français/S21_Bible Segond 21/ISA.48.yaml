document_id: ISA.48,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Anciennes et nouvelles prédictions
  - type: text
    content: Ecoutez cela, famille de Jacob,
  - type: text
    content: vous qui portez le nom d'Israël
  - type: text
    content: et qui êtes issus de Juda,
  - type: text
    content: vous qui prêtez serment au nom de l'Eternel
  - type: text
    content: et qui évoquez le souvenir du Dieu d'Israël,
  - type: text
    content: mais sans sincérité ni droiture!
  '10':
  - type: text
    content: Je t'ai affiné au creuset, mais pas pour retirer de l'argent,
  - type: text
    content: je t'ai mis à l'épreuve dans la fournaise de l'adversité.
  '11':
  - type: text
    content: C'est à cause de moi, à cause de moi seul, que je veux agir.
  - type: text
    content: En effet, comment pourrais-je me laisser déshonorer?
  - type: text
    content: Je ne donnerai pas ma gloire à un autre.
  - type: heading
    content: Appel à écouter Dieu
  '12':
  - type: text
    content: Ecoute-moi, Jacob,
  - type: text
    content: et toi, Israël, toi que j'ai appelé!
  - type: text
    content: 'Je suis toujours le même: c''est moi qui suis le premier,'
  - type: text
    content: moi aussi qui suis le dernier.
  '13':
  - type: text
    content: C'est ma propre main qui a fondé la terre,
  - type: text
    content: ma main droite qui a déployé le ciel.
  - type: text
    content: Il suffit que je les appelle et ils se présentent tous ensemble.
  '14':
  - type: text
    content: Vous tous, rassemblez-vous et écoutez!
  - type: text
    content: Qui parmi eux a révélé cela?
  - type: text
    content: Celui que l'Eternel aime accomplira sa volonté contre Babylone
  - type: text
    content: et son bras pèsera lourdement sur les Babyloniens.
  '15':
  - type: text
    content: C'est moi, moi qui ai parlé et qui l'ai appelé.
  - type: text
    content: Je l'ai fait venir et son entreprise réussira.
  '16':
  - type: text
    content: Approchez-vous de moi et écoutez cela!
  - type: text
    content: Depuis le début, je n'ai pas parlé en secret;
  - type: text
    content: au moment où cela se produira, je serai là.
  - type: text
    content: Et maintenant le Seigneur, l'Eternel, m'a envoyé avec son Esprit.
  '17':
  - type: text
    content: 'Voici ce que dit l''Eternel, celui qui te rachète, le Saint d''Israël:'
  - type: text
    content: «Moi, l'Eternel, ton Dieu, je t'instruis pour ton bien,
  - type: text
    content: je te conduis sur le chemin à suivre.
  '18':
  - type: text
    content: Si seulement tu étais attentif à mes commandements!
  - type: text
    content: Ta paix serait pareille à un fleuve
  - type: text
    content: et ta justice se propagerait comme les vagues de la mer.
  '19':
  - type: text
    content: Ta descendance serait pareille au sable,
  - type: text
    content: tes rejetons seraient aussi nombreux que les grains de sable.
  - type: text
    content: Ton nom ne serait jamais effacé, jamais éliminé devant moi.»
  '2':
  - type: text
    content: En effet, ils tirent leur nom de la ville sainte
  - type: text
    content: et s'appuient sur le Dieu d'Israël,
  - type: text
    content: celui dont le nom est l'Eternel, le maître de l'univers.
  '20':
  - type: text
    content: Sortez de Babylone, fuyez du milieu des Babyloniens!
  - type: text
    content: D'une voix triomphante révélez-le, annoncez-le,
  - type: text
    content: faites-le savoir jusqu'au bout de la terre!
  - type: text
    content: 'Dites: «L''Eternel a racheté son serviteur Jacob!»'
  '21':
  - type: text
    content: 'Ils n''auront pas soif dans les déserts où il les conduira:'
  - type: text
    content: il fera jaillir pour eux l'eau du rocher,
  - type: text
    content: il fendra le rocher et l'eau coulera.
  '22':
  - type: text
    content: Il n'y a pas de paix pour les méchants, dit l'Eternel.
  '3':
  - type: text
    content: Depuis longtemps j'ai révélé les premiers événements,
  - type: text
    content: ils sont sortis de ma bouche et je les ai annoncés.
  - type: text
    content: Soudain j'ai agi et ils se sont produits.
  '4':
  - type: text
    content: Sachant que tu es endurci,
  - type: text
    content: que ton cou est une barre de fer
  - type: text
    content: et que tu as un front en bronze,
  '5':
  - type: text
    content: je t'ai révélé depuis longtemps ces événements,
  - type: text
    content: je te les ai annoncés avant qu'ils ne se produisent,
  - type: text
    content: 'afin que tu ne dises pas:'
  - type: text
    content: «C'est mon idole qui les a faits,
  - type: text
    content: c'est ma sculpture sacrée ou ma statue en métal fondu qui les a ordonnés.»
  '6':
  - type: text
    content: Tu as bien entendu tout cela, constate-le!
  - type: text
    content: N'allez-vous pas l'avouer?
  - type: text
    content: Désormais je t'annonce des choses nouvelles,
  - type: text
    content: cachées, qui te sont inconnues.
  '7':
  - type: text
    content: Elles sont créées maintenant, et pas depuis longtemps;
  - type: text
    content: jusqu'à aujourd'hui tu n'en avais pas entendu parler.
  - type: text
    content: 'Ainsi tu ne pourras pas dire: «Je le savais déjà.»'
  '8':
  - type: text
    content: Non, tu n'en as rien entendu, tu n'en as rien su
  - type: text
    content: et cela n'a jamais frappé ton oreille,
  - type: text
    content: car je savais que tu te comporterais en traître
  - type: text
    content: et qu'on t'appellerait «rebelle de naissance».
  '9':
  - type: text
    content: A cause de mon nom, je suspends ma colère,
  - type: text
    content: à cause de la louange qui m'est due je me retiens vis-à-vis de toi,
  - type: text
    content: pour ne pas t'exterminer.
