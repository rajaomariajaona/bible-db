document_id: 1KI.19,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Fuite d'Elie
  - type: text
    content: 'Achab rapporta à Jézabel tout ce qu''avait fait Elie et la manière dont il avait tué par l''épée tous les prophètes. '
  '10':
  - type: text
    content: 'Il répondit: «J''ai déployé tout mon zèle pour l''Eternel, le Dieu de l''univers. En effet, les Israélites ont abandonné ton alliance, *ils ont démoli tes autels et ont tué tes prophètes par l''épée. Je suis resté, moi seul, et ils cherchent à m''enlever la vie'
  - type: note
    content: 'Ils ont démoli… la vie: cité en Romains 11.3.'
  - type: text
    content: '.» '
  '11':
  - type: text
    content: 'L''Eternel dit: «Sors et tiens-toi sur la montagne devant l''Eternel, et l''Eternel va passer!» Devant l''Eternel, il y eut un vent fort et violent qui déchirait les montagnes et brisait les rochers; l''Eternel n''était pas dans le vent. Après le vent, il y eut un tremblement de terre; l''Eternel n''était pas dans le tremblement de terre. '
  '12':
  - type: text
    content: 'Après le tremblement de terre, il y eut un feu; l''Eternel n''était pas dans le feu. Après le feu, il y eut un murmure doux et léger. '
  '13':
  - type: text
    content: 'Quand il l''entendit, Elie s''enveloppa le visage de son manteau, sortit et se tint à l''entrée de la grotte. Et voici qu''une voix lui fit entendre ces paroles: «Que fais-tu ici, Elie?» '
  '14':
  - type: text
    content: 'Il répondit: «J''ai déployé tout mon zèle pour l''Eternel, le Dieu de l''univers. En effet, les Israélites ont abandonné ton alliance, ils ont démoli tes autels et ont tué tes prophètes par l''épée. Je suis resté, moi seul, et ils cherchent à m''enlever la vie.» '
  '15':
  - type: text
    content: 'L''Eternel lui dit: «Vas-y, poursuis ton chemin dans le désert jusqu''à Damas. Une fois arrivé là-bas, tu consacreras par onction Hazaël comme roi de Syrie. '
  '16':
  - type: text
    content: 'Tu consacreras aussi par onction Jéhu, le petit-fils de Nimshi, comme roi d''Israël et tu consacreras par onction Elisée, le fils de Shaphath, d''Abel-Mehola, comme prophète à ta place. '
  '17':
  - type: text
    content: 'Celui qui échappera à l''épée de Hazaël, Jéhu le fera mourir, et celui qui échappera à l''épée de Jéhu, Elisée le fera mourir. '
  '18':
  - type: text
    content: Mais *je vais laisser en Israël 7000 hommes. Ce sont tous ceux qui n'ont pas plié les genoux devant Baal
  - type: note
    content: 'Je vais… Baal: cité en Romains 11.4. Voir la note sur Juges 2.11.'
  - type: text
    content: ' et dont la bouche ne l''a pas embrassé.»'
  - type: heading
    content: Appel d'Elisée
  '19':
  - type: text
    content: 'Elie partit de là et il trouva Elisée, le fils de Shaphath, en train de labourer. Il y avait devant lui douze paires de bœufs et lui-même se tenait près de la douzième. Elie s''approcha de lui et jeta son manteau sur lui. '
  '2':
  - type: text
    content: 'Jézabel envoya alors un messager à Elie pour lui dire: «Que les dieux me traitent avec la plus grande sévérité, si demain, à la même heure, je ne te fais pas ce que tu leur as fait!»'
  '20':
  - type: text
    content: 'Elisée abandonna ses bœufs et courut après Elie. Il lui dit: «Laisse-moi embrasser mon père et ma mère et je te suivrai.» Elie lui répondit: «Vas-y et reviens. Pense en effet à ce que je t''ai fait.» '
  '21':
  - type: text
    content: Après s'être éloigné d'Elie, Elisée prit une paire de bœufs, qu'il offrit en sacrifice. Avec le bois de leur attelage, il fit cuire leur viande et la donna à manger au peuple. Puis il se leva, suivit Elie et fut à son service.
  '3':
  - type: text
    content: 'Voyant cela, Elie se leva et partit pour sauver sa vie. Il arriva à Beer-Shéba, une ville qui appartient à Juda, et il y laissa son serviteur. '
  '4':
  - type: text
    content: 'Quant à lui, il marcha toute une journée dans le désert, puis il s''assit sous un genêt et demanda la mort en disant: «C''est assez! Maintenant, Eternel, prends-moi la vie, car je ne suis pas meilleur que mes ancêtres.» '
  '5':
  - type: text
    content: 'Il se coucha et s''endormit sous un genêt. Et voici qu''un ange le toucha et lui dit: «Lève-toi et mange.» '
  '6':
  - type: text
    content: 'Elie regarda et il vit à son chevet un gâteau cuit sur des pierres chauffées ainsi qu''une cruche d''eau. Il mangea et but, puis se recoucha. '
  '7':
  - type: text
    content: 'L''ange de l''Eternel vint une deuxième fois, le toucha et dit: «Lève-toi et mange, car le chemin est trop long pour toi.» '
  '8':
  - type: text
    content: Il se leva, mangea et but. Puis, avec la force que lui donna cette nourriture, il marcha 40 jours et 40 nuits jusqu'à la montagne de Dieu, jusqu'à Horeb.
  '9':
  - type: text
    content: 'Là, il entra dans la grotte et y passa la nuit. Or, la parole de l''Eternel lui fut adressée: «Que fais-tu ici, Elie?» '
