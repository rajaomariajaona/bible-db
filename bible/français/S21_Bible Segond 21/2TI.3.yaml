document_id: 2TI.3,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Conseils pour les temps difficiles
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sache que dans les derniers jours il y aura des temps difficiles, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De ton côté, tu as suivi de près mon enseignement, ma conduite, mes projets, ma foi, ma patience, mon amour, ma persévérance, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ainsi que les persécutions et les souffrances que j''ai connues à Antioche, à Iconium, à Lystre. Quelles persécutions n''ai-je pas supportées! Et le Seigneur m''a délivré de toutes. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Du reste, tous ceux qui veulent vivre avec piété en Jésus-Christ seront persécutés, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: tandis que les hommes méchants et imposteurs avanceront toujours plus dans le mal en égarant les autres et en s'égarant eux-mêmes.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant à toi, tiens ferme dans ce que tu as appris et reconnu comme certain, sachant de qui tu l''as appris. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Depuis ton enfance, tu connais les saintes Ecritures qui peuvent te rendre sage en vue du salut par la foi en Jésus-Christ. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toute l''Ecriture est inspirée de Dieu et utile pour enseigner, pour convaincre, pour corriger, pour instruire dans la justice, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: afin que l'homme de Dieu soit formé et équipé pour toute œuvre bonne.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car les hommes seront égoïstes, amis de l''argent, vantards, orgueilleux, blasphémateurs, rebelles à leurs parents, ingrats, impies, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'insensibles, implacables, calomniateurs, violents, cruels, ennemis du bien, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'traîtres, emportés, aveuglés par l''orgueil, amis du plaisir plutôt que de Dieu. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils auront l'apparence de la piété mais renieront ce qui en fait la force. Eloigne-toi de ces gens-là.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Certains d''entre eux s''introduisent dans les maisons et prennent dans leurs filets des femmes crédules, chargées de péchés, entraînées par toutes sortes de désirs, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'qui sont toujours en train d''apprendre mais ne peuvent jamais arriver à la connaissance de la vérité. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De même que Jannès et Jambrès se sont opposés à Moïse, de même ces hommes s''opposent à la vérité. Ils ont l''intelligence pervertie et sont disqualifiés en ce qui concerne la foi. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais ils n'iront pas plus loin, car leur folie sera évidente pour tous, comme l'a été celle de ces deux hommes.
