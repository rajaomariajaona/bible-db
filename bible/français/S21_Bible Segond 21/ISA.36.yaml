document_id: ISA.36
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Le règne d'Ezéchias
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 36.1–39.8
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Invasion de Juda par Sanchérib
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La quatorzième année du règne d''Ezéchias, Sanchérib, le roi d''Assyrie, monta contre toutes les villes fortifiées de Juda et s''empara d''elles. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le roi d''Assyrie se trouvait alors à Lakis. Il envoya à Jérusalem, vers le roi Ezéchias, Rabshaké avec une puissante armée. Celui-ci s''arrêta à l''aqueduc du réservoir supérieur, sur le chemin du champ du teinturier. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors le chef du palais royal, Eliakim, fils de Hilkija, se rendit vers lui avec Shebna, le secrétaire, et l''archiviste Joach, fils d''Asaph. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Rabshaké leur annonça: «Transmettez à Ezéchias: ‘Voici ce que dit le grand roi, le roi d''Assyrie: Sur quoi repose donc ta confiance? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tu as dit qu''il fallait pour la guerre de la prudence et de la force, mais ce ne sont que des paroles en l''air. En qui donc as-tu placé ta confiance pour oser te révolter contre moi? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tu l''as placée dans l''Egypte, tu as pris pour soutien ce roseau cassé qui pénètre et transperce la main de celui qui s''appuie dessus! Voilà ce qu''est le pharaon, le roi d''Egypte, pour tous ceux qui se confient en lui.’ '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Peut-être me diras-tu: ‘C''est en l''Eternel, notre Dieu, que nous plaçons notre confiance.’ Mais n''est-ce pas lui dont Ezéchias a fait disparaître les hauts lieux et les autels en disant à Juda et à Jérusalem: ‘Vous vous prosternerez devant cet autel à Jérusalem’? q '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Maintenant, passe un accord avec mon seigneur, le roi d''Assyrie, et je te donnerai 2000 chevaux, si tu peux fournir des cavaliers pour les monter. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Comment pourrais-tu repousser un seul chef, même parmi les serviteurs les moins importants, de mon seigneur? Comment peux-tu mettre ta confiance dans l''Egypte pour les chars et pour les cavaliers? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'D''ailleurs, est-ce sans l''accord de l''Eternel que je suis monté contre cet endroit pour le détruire? L''Eternel m''a dit: ‘Monte contre ce pays et détruis-le!’»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Eliakim, Shebna et Joach dirent à Rabshaké: «Parle à tes serviteurs en araméen, car nous comprenons cette langue, et ne nous parle pas en hébreu. En effet, le peuple qui se trouve sur la muraille entend tout.» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Rabshaké leur répondit: «Est-ce à ton seigneur et à toi que mon seigneur m''a envoyé dire ces paroles? N''est-ce pas à ces hommes assis sur la muraille pour manger leurs excréments et boire leur urine avec vous?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors Rabshaké prit position et cria à pleine voix en hébreu: «Ecoutez la parole du grand roi, du roi d''Assyrie! '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Voici ce que dit le roi: ‘Qu''Ezéchias ne vous trompe pas! En effet, il ne pourra pas vous délivrer.’ '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Qu''Ezéchias ne vous amène pas à vous confier en l''Eternel en disant: ‘L''Eternel nous délivrera et cette ville ne sera pas livrée entre les mains du roi d''Assyrie.’ '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'N''écoutez pas Ezéchias, car voici ce que dit le roi d''Assyrie: ‘Faites la paix avec moi, sortez de la ville vers moi, et chacun de vous mangera des fruits de sa vigne et de son figuier, chacun boira de l''eau de sa citerne. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ensuite, je viendrai vous emmener dans un pays pareil au vôtre, dans un pays de blé et de vin, un pays de pain et de vignes.’ '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Qu''Ezéchias ne vous pousse donc pas dans une mauvaise direction en affirmant: ‘L''Eternel nous délivrera.’ Les dieux des autres nations ont-ils délivré chacun son pays de la domination du roi d''Assyrie? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Où sont les dieux de Hamath et d''Arpad? Où sont les dieux de Sepharvaïm? Ont-ils délivré Samarie de ma domination? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Parmi tous les dieux de ces pays, quels sont ceux qui ont délivré leur pays de ma domination, pour que l'Eternel puisse en délivrer Jérusalem?»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ils gardèrent le silence, ils ne lui répondirent pas un mot, car le roi avait donné cet ordre: «Vous ne lui répondrez pas.» '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Le chef du palais royal, Eliakim, fils de Hilkija, Shebna, le secrétaire, et l'archiviste Joach, fils d'Asaph, vinrent trouver Ezéchias, les habits déchirés, et lui rapportèrent les paroles de Rabshaké.
