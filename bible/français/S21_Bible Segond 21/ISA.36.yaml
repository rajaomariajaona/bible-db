document_id: ISA.36,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le règne d'Ezéchias
  - type: heading
    content: 36.1–39.8
  - type: heading
    content: Invasion de Juda par Sanchérib
  - type: text
    content: 'La quatorzième année du règne d''Ezéchias, Sanchérib, le roi d''Assyrie, monta contre toutes les villes fortifiées de Juda et s''empara d''elles. '
  '10':
  - type: text
    content: 'D''ailleurs, est-ce sans l''accord de l''Eternel que je suis monté contre cet endroit pour le détruire? L''Eternel m''a dit: ‘Monte contre ce pays et détruis-le!’»'
  '11':
  - type: text
    content: 'Eliakim, Shebna et Joach dirent à Rabshaké: «Parle à tes serviteurs en araméen, car nous comprenons cette langue, et ne nous parle pas en hébreu. En effet, le peuple qui se trouve sur la muraille entend tout.» '
  '12':
  - type: text
    content: 'Rabshaké leur répondit: «Est-ce à ton seigneur et à toi que mon seigneur m''a envoyé dire ces paroles? N''est-ce pas à ces hommes assis sur la muraille pour manger leurs excréments et boire leur urine avec vous?»'
  '13':
  - type: text
    content: 'Alors Rabshaké prit position et cria à pleine voix en hébreu: «Ecoutez la parole du grand roi, du roi d''Assyrie! '
  '14':
  - type: text
    content: 'Voici ce que dit le roi: ‘Qu''Ezéchias ne vous trompe pas! En effet, il ne pourra pas vous délivrer.’ '
  '15':
  - type: text
    content: 'Qu''Ezéchias ne vous amène pas à vous confier en l''Eternel en disant: ‘L''Eternel nous délivrera et cette ville ne sera pas livrée entre les mains du roi d''Assyrie.’ '
  '16':
  - type: text
    content: 'N''écoutez pas Ezéchias, car voici ce que dit le roi d''Assyrie: ‘Faites la paix avec moi, sortez de la ville vers moi, et chacun de vous mangera des fruits de sa vigne et de son figuier, chacun boira de l''eau de sa citerne. '
  '17':
  - type: text
    content: 'Ensuite, je viendrai vous emmener dans un pays pareil au vôtre, dans un pays de blé et de vin, un pays de pain et de vignes.’ '
  '18':
  - type: text
    content: 'Qu''Ezéchias ne vous pousse donc pas dans une mauvaise direction en affirmant: ‘L''Eternel nous délivrera.’ Les dieux des autres nations ont-ils délivré chacun son pays de la domination du roi d''Assyrie? '
  '19':
  - type: text
    content: 'Où sont les dieux de Hamath et d''Arpad? Où sont les dieux de Sepharvaïm? Ont-ils délivré Samarie de ma domination? '
  '2':
  - type: text
    content: 'Le roi d''Assyrie se trouvait alors à Lakis. Il envoya à Jérusalem, vers le roi Ezéchias, Rabshaké avec une puissante armée. Celui-ci s''arrêta à l''aqueduc du réservoir supérieur, sur le chemin du champ du teinturier. '
  '20':
  - type: text
    content: Parmi tous les dieux de ces pays, quels sont ceux qui ont délivré leur pays de ma domination, pour que l'Eternel puisse en délivrer Jérusalem?»
  '21':
  - type: text
    content: 'Ils gardèrent le silence, ils ne lui répondirent pas un mot, car le roi avait donné cet ordre: «Vous ne lui répondrez pas.» '
  '22':
  - type: text
    content: Le chef du palais royal, Eliakim, fils de Hilkija, Shebna, le secrétaire, et l'archiviste Joach, fils d'Asaph, vinrent trouver Ezéchias, les habits déchirés, et lui rapportèrent les paroles de Rabshaké.
  '3':
  - type: text
    content: 'Alors le chef du palais royal, Eliakim, fils de Hilkija, se rendit vers lui avec Shebna, le secrétaire, et l''archiviste Joach, fils d''Asaph. '
  '4':
  - type: text
    content: 'Rabshaké leur annonça: «Transmettez à Ezéchias: ‘Voici ce que dit le grand roi, le roi d''Assyrie: Sur quoi repose donc ta confiance? '
  '5':
  - type: text
    content: 'Tu as dit qu''il fallait pour la guerre de la prudence et de la force, mais ce ne sont que des paroles en l''air. En qui donc as-tu placé ta confiance pour oser te révolter contre moi? '
  '6':
  - type: text
    content: 'Tu l''as placée dans l''Egypte, tu as pris pour soutien ce roseau cassé qui pénètre et transperce la main de celui qui s''appuie dessus! Voilà ce qu''est le pharaon, le roi d''Egypte, pour tous ceux qui se confient en lui.’ '
  '7':
  - type: text
    content: 'Peut-être me diras-tu: ‘C''est en l''Eternel, notre Dieu, que nous plaçons notre confiance.’ Mais n''est-ce pas lui dont Ezéchias a fait disparaître les hauts lieux et les autels en disant à Juda et à Jérusalem: ‘Vous vous prosternerez devant cet autel à Jérusalem’? q '
  '8':
  - type: text
    content: 'Maintenant, passe un accord avec mon seigneur, le roi d''Assyrie, et je te donnerai 2000 chevaux, si tu peux fournir des cavaliers pour les monter. '
  '9':
  - type: text
    content: 'Comment pourrais-tu repousser un seul chef, même parmi les serviteurs les moins importants, de mon seigneur? Comment peux-tu mettre ta confiance dans l''Egypte pour les chars et pour les cavaliers? '
