document_id: EXO.17,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'eau jaillie du rocher à Horeb
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Toute l''assemblée des Israélites partit du désert de Sin pour parcourir les étapes que l''Eternel leur avait ordonnées, et ils campèrent à Rephidim. Là, le peuple ne trouva pas d''eau à boire. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Josué se conforma à ce que lui avait dit Moïse pour combattre les Amalécites. Quant à Moïse, Aaron et Hur, ils montèrent au sommet de la colline. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Lorsque Moïse levait la main, Israël était le plus fort; et lorsqu''il baissait la main, Amalek était le plus fort. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Comme les mains de Moïse devenaient lourdes de fatigue, ils prirent une pierre qu''ils placèrent sous lui et il s''assit dessus. Aaron et Hur soutenaient ses mains, l''un d''un côté, l''autre de l''autre. Ainsi, elles restèrent fermes jusqu''au coucher du soleil, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: et Josué fut victorieux d'Amalek et de son peuple au tranchant de l'épée.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'L''Eternel dit à Moïse: «Ecris cela dans le livre pour qu''on s''en souvienne et déclare à Josué que j''effacerai le souvenir d''Amalek de dessous le ciel.»'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Moïse construisit un autel et l''appela: «L''Eternel mon étendard.» '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Il dit: «Parce que les Amalécites se sont attaqués au trône de l''Eternel, il y aura guerre de l''Eternel contre eux de génération en génération.»'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Alors le peuple chercha querelle à Moïse. Ils dirent: «Donnez-nous de l''eau à boire.» Moïse leur répondit: «Pourquoi me cherchez-vous querelle? Pourquoi provoquez-vous l''Eternel?» '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Le peuple était là, pressé par la soif, et murmurait contre Moïse. Il disait: «Pourquoi nous as-tu fait quitter l''Egypte, si c''est pour nous faire mourir de soif, moi, mes enfants et mes troupeaux?» '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Moïse cria à l''Eternel en disant: «Que puis-je faire pour ce peuple? Encore un peu et ils vont me lancer des pierres!»'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'L''Eternel dit à Moïse: «Passe devant le peuple et prends avec toi des anciens d''Israël. Prends aussi dans ta main ton bâton, celui avec lequel tu as frappé le fleuve, et marche! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Je me tiendrai devant toi sur le rocher d''Horeb. Tu frapperas le rocher, il en sortira de l''eau et le peuple boira.» Moïse agit ainsi sous les yeux des anciens d''Israël. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Il appela cet endroit Massa et Meriba, parce que les Israélites lui avaient cherché querelle et avaient provoqué l''Eternel en disant: «L''Eternel est-il au milieu de nous, oui ou non?»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Victoire sur les Amalécites
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Les Amalécites vinrent combattre Israël à Rephidim. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Alors Moïse dit à Josué: «Choisis-nous des hommes, sors et combats les Amalécites. Demain je me tiendrai au sommet de la colline, le bâton de Dieu dans la main.» '
