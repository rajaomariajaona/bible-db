document_id: GEN.38
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Juda et Tamar
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A cette époque-là, Juda s''éloigna de ses frères et se retira chez un homme d''Adullam appelé Hira. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Là, il vit la fille d''un Cananéen du nom de Shua; il la prit pour femme et eut des relations avec elle. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Elle tomba enceinte et mit au monde un fils qu''elle appela Er. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Elle tomba enceinte et donna naissance à un fils qu''elle appela Onan. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Elle mit de nouveau au monde un fils qu'elle appela Shéla. Juda était à Czib quand elle lui donna naissance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Juda prit pour Er, son fils aîné, une femme du nom de Tamar. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Er, le fils aîné de Juda, était méchant aux yeux de l''Eternel et celui-ci le fit mourir. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Alors Juda dit à Onan: «Unis-toi à la femme de ton frère, remplis tes devoirs de beau-frère envers elle et donne une descendance à ton frère.» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Sachant que cette descendance ne serait pas pour lui, Onan perdait sa semence par terre lorsqu''il devait avoir des relations avec sa belle-sœur, afin de ne pas donner de descendance à son frère. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ce qu''il faisait déplut à l''Eternel, qui le fit aussi mourir. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors Juda dit à sa belle-fille Tamar: «Reste veuve chez ton père jusqu''à ce que mon fils Shéla soit grand.» Il disait cela parce qu''il avait peur que Shéla ne meure comme ses frères. Tamar s''en alla donc habiter chez son père.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Bien des jours passèrent et la fille de Shua qui était la femme de Juda mourut. Une fois consolé, Juda monta à Thimna vers ceux qui tondaient ses brebis. Il y monta avec son ami Hira l''Adullamite. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'On annonça à Tamar: «Ton beau-père monte à Thimna pour tondre ses brebis.» '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Alors elle retira ses habits de veuve, se couvrit d'un voile dont elle s'enveloppa et elle s'assit à l'entrée d'Enaïm, sur le chemin de Thimna. Elle voyait bien, en effet, que Shéla était devenu grand et qu'elle ne lui était pas donnée en mariage.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Juda la vit et la prit pour une prostituée, parce qu''elle avait couvert son visage. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il l''aborda sur le chemin et dit: «Laisse-moi avoir des relations avec toi.» Il ignorait en effet que c''était sa belle-fille. Elle dit: «Que me donneras-tu pour cela?» '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il répondit: «Je t''enverrai un chevreau de mon troupeau.» Elle dit: «Donne-moi un gage jusqu''à ce que tu l''envoies.» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il répondit: «Quel gage te donnerai-je?» Elle dit: «Ton sceau, ton cordon et le bâton que tu tiens.» Il les lui donna. Puis il s''unit à elle et elle tomba enceinte de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Elle se leva et s'en alla. Elle retira son voile et remit ses habits de veuve.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Juda envoya le chevreau par l''intermédiaire de son ami l''Adullamite pour reprendre le gage à la femme, mais celui-ci ne la trouva pas. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il interrogea les habitants de l''endroit en disant: «Où est la prostituée qui se tenait à Enaïm, sur le chemin?» Ils répondirent: «Il n''y a jamais eu ici de prostituée sacrée.» '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il retourna vers Juda et dit: «Je ne l''ai pas trouvée, et même les habitants de l''endroit ont dit: ‘Il n''y a jamais eu ici de prostituée sacrée.’» '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Juda dit: «Qu''elle garde ce qu''elle a, sinon nous nous exposerions au mépris. J''ai envoyé ce chevreau et tu ne l''as pas trouvée.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Environ trois mois plus tard, on vint annoncer à Juda: «Ta belle-fille Tamar s''est prostituée et la voilà même enceinte à la suite de sa prostitution.» Juda dit: «Faites-la sortir et qu''elle soit brûlée.» '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Comme on l''amenait dehors, elle fit dire à son beau-père: «C''est de l''homme à qui ces objets appartiennent que je suis enceinte.» Elle ajouta: «Reconnais donc à qui appartiennent ce sceau, ce cordon et ce bâton.» '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Juda les reconnut et dit: «Elle est moins coupable que moi, puisque je ne l''ai pas donnée à mon fils Shéla.» Cependant, il n''eut plus de relations sexuelles avec elle.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Quand ce fut pour elle le moment d''accoucher, voici qu''il y avait des jumeaux dans son ventre. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Pendant l''accouchement il y en eut un qui présenta la main. La sage-femme la prit et y attacha un fil cramoisi en disant: «Celui-ci sort le premier.» '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Cependant, il retira la main et c''est son frère qui sortit. Alors la sage-femme dit: «Quelle brèche tu t''es ouverte!» et on l''appela Pérets. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ensuite sortit son frère, celui qui avait à la main le fil cramoisi, et on l'appela Zérach.
