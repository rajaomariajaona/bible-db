document_id: GEN.38,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Juda et Tamar
  - type: text
    content: 'A cette époque-là, Juda s''éloigna de ses frères et se retira chez un homme d''Adullam appelé Hira. '
  '10':
  - type: text
    content: 'Ce qu''il faisait déplut à l''Eternel, qui le fit aussi mourir. '
  '11':
  - type: text
    content: 'Alors Juda dit à sa belle-fille Tamar: «Reste veuve chez ton père jusqu''à ce que mon fils Shéla soit grand.» Il disait cela parce qu''il avait peur que Shéla ne meure comme ses frères. Tamar s''en alla donc habiter chez son père.'
  '12':
  - type: text
    content: 'Bien des jours passèrent et la fille de Shua qui était la femme de Juda mourut. Une fois consolé, Juda monta à Thimna vers ceux qui tondaient ses brebis. Il y monta avec son ami Hira l''Adullamite. '
  '13':
  - type: text
    content: 'On annonça à Tamar: «Ton beau-père monte à Thimna pour tondre ses brebis.» '
  '14':
  - type: text
    content: Alors elle retira ses habits de veuve, se couvrit d'un voile dont elle s'enveloppa et elle s'assit à l'entrée d'Enaïm, sur le chemin de Thimna. Elle voyait bien, en effet, que Shéla était devenu grand et qu'elle ne lui était pas donnée en mariage.
  '15':
  - type: text
    content: 'Juda la vit et la prit pour une prostituée, parce qu''elle avait couvert son visage. '
  '16':
  - type: text
    content: 'Il l''aborda sur le chemin et dit: «Laisse-moi avoir des relations avec toi.» Il ignorait en effet que c''était sa belle-fille. Elle dit: «Que me donneras-tu pour cela?» '
  '17':
  - type: text
    content: 'Il répondit: «Je t''enverrai un chevreau de mon troupeau.» Elle dit: «Donne-moi un gage jusqu''à ce que tu l''envoies.» '
  '18':
  - type: text
    content: 'Il répondit: «Quel gage te donnerai-je?» Elle dit: «Ton sceau, ton cordon et le bâton que tu tiens.» Il les lui donna. Puis il s''unit à elle et elle tomba enceinte de lui. '
  '19':
  - type: text
    content: Elle se leva et s'en alla. Elle retira son voile et remit ses habits de veuve.
  '2':
  - type: text
    content: 'Là, il vit la fille d''un Cananéen du nom de Shua; il la prit pour femme et eut des relations avec elle. '
  '20':
  - type: text
    content: 'Juda envoya le chevreau par l''intermédiaire de son ami l''Adullamite pour reprendre le gage à la femme, mais celui-ci ne la trouva pas. '
  '21':
  - type: text
    content: 'Il interrogea les habitants de l''endroit en disant: «Où est la prostituée qui se tenait à Enaïm, sur le chemin?» Ils répondirent: «Il n''y a jamais eu ici de prostituée sacrée.» '
  '22':
  - type: text
    content: 'Il retourna vers Juda et dit: «Je ne l''ai pas trouvée, et même les habitants de l''endroit ont dit: ‘Il n''y a jamais eu ici de prostituée sacrée.’» '
  '23':
  - type: text
    content: 'Juda dit: «Qu''elle garde ce qu''elle a, sinon nous nous exposerions au mépris. J''ai envoyé ce chevreau et tu ne l''as pas trouvée.»'
  '24':
  - type: text
    content: 'Environ trois mois plus tard, on vint annoncer à Juda: «Ta belle-fille Tamar s''est prostituée et la voilà même enceinte à la suite de sa prostitution.» Juda dit: «Faites-la sortir et qu''elle soit brûlée.» '
  '25':
  - type: text
    content: 'Comme on l''amenait dehors, elle fit dire à son beau-père: «C''est de l''homme à qui ces objets appartiennent que je suis enceinte.» Elle ajouta: «Reconnais donc à qui appartiennent ce sceau, ce cordon et ce bâton.» '
  '26':
  - type: text
    content: 'Juda les reconnut et dit: «Elle est moins coupable que moi, puisque je ne l''ai pas donnée à mon fils Shéla.» Cependant, il n''eut plus de relations sexuelles avec elle.'
  '27':
  - type: text
    content: 'Quand ce fut pour elle le moment d''accoucher, voici qu''il y avait des jumeaux dans son ventre. '
  '28':
  - type: text
    content: 'Pendant l''accouchement il y en eut un qui présenta la main. La sage-femme la prit et y attacha un fil cramoisi en disant: «Celui-ci sort le premier.» '
  '29':
  - type: text
    content: 'Cependant, il retira la main et c''est son frère qui sortit. Alors la sage-femme dit: «Quelle brèche tu t''es ouverte!» et on l''appela Pérets. '
  '3':
  - type: text
    content: 'Elle tomba enceinte et mit au monde un fils qu''elle appela Er. '
  '30':
  - type: text
    content: Ensuite sortit son frère, celui qui avait à la main le fil cramoisi, et on l'appela Zérach.
  '4':
  - type: text
    content: 'Elle tomba enceinte et donna naissance à un fils qu''elle appela Onan. '
  '5':
  - type: text
    content: Elle mit de nouveau au monde un fils qu'elle appela Shéla. Juda était à Czib quand elle lui donna naissance.
  '6':
  - type: text
    content: 'Juda prit pour Er, son fils aîné, une femme du nom de Tamar. '
  '7':
  - type: text
    content: 'Er, le fils aîné de Juda, était méchant aux yeux de l''Eternel et celui-ci le fit mourir. '
  '8':
  - type: text
    content: 'Alors Juda dit à Onan: «Unis-toi à la femme de ton frère, remplis tes devoirs de beau-frère envers elle et donne une descendance à ton frère.» '
  '9':
  - type: text
    content: 'Sachant que cette descendance ne serait pas pour lui, Onan perdait sa semence par terre lorsqu''il devait avoir des relations avec sa belle-sœur, afin de ne pas donner de descendance à son frère. '
