document_id: PSA.34,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le salut de l'Eternel pour le juste
  - type: text
    content: De David, lorsqu'il se fit passer pour un fou en présence d'Abimélec et qu'il s'en alla chassé par lui.
  '10':
  - type: text
    content: Craignez l'Eternel, vous ses saints,
  - type: text
    content: car rien ne manque à ceux qui le craignent.
  '11':
  - type: text
    content: Les lionceaux connaissent la disette et la faim,
  - type: text
    content: mais ceux qui cherchent l'Eternel ne sont privés d'aucun bien.
  '12':
  - type: text
    content: 'Venez, mes fils, écoutez-moi:'
  - type: text
    content: je vous enseignerai la crainte de l'Eternel.
  '13':
  - type: text
    content: '*Qui donc aime la vie'
  - type: text
    content: et désire voir des jours heureux?
  '14':
  - type: text
    content: Alors préserve ta langue du mal
  - type: text
    content: et tes lèvres des paroles trompeuses,
  '15':
  - type: text
    content: détourne-toi du mal et fais le bien,
  - type: text
    content: recherche la paix et poursuis-la.
  '16':
  - type: text
    content: Les yeux de l'Eternel sont sur les justes
  - type: text
    content: et ses oreilles sont attentives à leur cri,
  '17':
  - type: text
    content: mais il se tourne contre ceux qui font le mal
  - type: note
    content: 'Qui donc… font le mal: cité en 1 Pierre 3.10-12.'
  - type: text
    content: pour effacer leur souvenir de la terre.
  '18':
  - type: text
    content: Quand les justes crient, l'Eternel entend,
  - type: text
    content: et il les délivre de toutes leurs détresses.
  '19':
  - type: text
    content: L'Eternel est près de ceux qui ont le cœur brisé,
  - type: text
    content: et il sauve ceux dont l'esprit est abattu.
  '2':
  - type: text
    content: 'Je veux bénir l''Eternel en tout temps:'
  - type: text
    content: sa louange sera toujours dans ma bouche.
  '20':
  - type: text
    content: Beaucoup de malheurs atteignent le juste,
  - type: text
    content: 'mais l''Eternel l''en délivre toujours:'
  '21':
  - type: text
    content: il garde tous ses os,
  - type: text
    content: '*aucun d''eux n''est brisé'
  - type: note
    content: 'Aucun… brisé: cité comme accompli par Jésus en Jean 19.36, qui peut aussi faire allusion aux règles relatives à l''agneau de la Pâque (Exode 12.46; Nombres 9.12).'
  - type: text
    content: .
  '22':
  - type: text
    content: Mais le malheur fait mourir le méchant,
  - type: text
    content: les ennemis du juste sont condamnés.
  '23':
  - type: text
    content: L'Eternel rachète l'âme de ses serviteurs,
  - type: text
    content: et tous ceux qui cherchent refuge en lui échappent à la condamnation.
  '3':
  - type: text
    content: Que mon âme fasse toute sa fierté de l'Eternel!
  - type: text
    content: Que les humbles écoutent et se réjouissent!
  '4':
  - type: text
    content: Dites avec moi la grandeur de l'Eternel,
  - type: text
    content: célébrons tous son nom!
  '5':
  - type: text
    content: J'ai cherché l'Eternel, et il m'a répondu,
  - type: text
    content: il m'a délivré de toutes mes frayeurs.
  '6':
  - type: text
    content: Quand on tourne les regards vers lui, on est rayonnant de joie,
  - type: text
    content: et le visage ne rougit pas de honte.
  '7':
  - type: text
    content: Quand un malheureux crie, l'Eternel entend,
  - type: text
    content: et il le sauve de toutes ses détresses.
  '8':
  - type: text
    content: L'ange de l'Eternel campe autour de ceux qui le craignent,
  - type: text
    content: et il les arrache au danger.
  '9':
  - type: text
    content: '*Goûtez et voyez combien l''Eternel est bon!'
  - type: note
    content: 'Goûtez… bon: cité en 1 Pierre 2.3.'
  - type: text
    content: Heureux l'homme qui cherche refuge en lui!
