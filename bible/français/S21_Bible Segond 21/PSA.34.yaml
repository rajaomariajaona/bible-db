document_id: PSA.34,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le salut de l'Eternel pour le juste
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: De David, lorsqu'il se fit passer pour un fou en présence d'Abimélec et qu'il s'en alla chassé par lui.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Craignez l'Eternel, vous ses saints,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car rien ne manque à ceux qui le craignent.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Les lionceaux connaissent la disette et la faim,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ceux qui cherchent l'Eternel ne sont privés d'aucun bien.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Venez, mes fils, écoutez-moi:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je vous enseignerai la crainte de l'Eternel.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '*Qui donc aime la vie'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et désire voir des jours heureux?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Alors préserve ta langue du mal
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tes lèvres des paroles trompeuses,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: détourne-toi du mal et fais le bien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: recherche la paix et poursuis-la.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Les yeux de l'Eternel sont sur les justes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses oreilles sont attentives à leur cri,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: mais il se tourne contre ceux qui font le mal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.13-17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qui donc… font le mal: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pierre 3.10-12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour effacer leur souvenir de la terre.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Quand les justes crient, l'Eternel entend,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il les délivre de toutes leurs détresses.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: L'Eternel est près de ceux qui ont le cœur brisé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il sauve ceux dont l'esprit est abattu.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Je veux bénir l''Eternel en tout temps:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa louange sera toujours dans ma bouche.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Beaucoup de malheurs atteignent le juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'mais l''Eternel l''en délivre toujours:'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: il garde tous ses os,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*aucun d''eux n''est brisé'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Aucun… brisé: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: cité comme accompli par Jésus en Jean 19.36, qui peut aussi faire allusion aux règles relatives à l'agneau de la Pâque (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Exode 12.46
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nombres 9.12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: .
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Mais le malheur fait mourir le méchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les ennemis du juste sont condamnés.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: L'Eternel rachète l'âme de ses serviteurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous ceux qui cherchent refuge en lui échappent à la condamnation.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Que mon âme fasse toute sa fierté de l'Eternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que les humbles écoutent et se réjouissent!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Dites avec moi la grandeur de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: célébrons tous son nom!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: J'ai cherché l'Eternel, et il m'a répondu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il m'a délivré de toutes mes frayeurs.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Quand on tourne les regards vers lui, on est rayonnant de joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le visage ne rougit pas de honte.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Quand un malheureux crie, l'Eternel entend,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il le sauve de toutes ses détresses.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: L'ange de l'Eternel campe autour de ceux qui le craignent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il les arrache au danger.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '*Goûtez et voyez combien l''Eternel est bon!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Goûtez… bon: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pierre 2.3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux l'homme qui cherche refuge en lui!
