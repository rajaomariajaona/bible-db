document_id: JHN.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus ressuscite Lazare
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Il y avait un homme malade; c''était Lazare de Béthanie, le village de Marie et de sa sœur Marthe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '- Marie était celle qui versa du parfum sur les pieds du Seigneur et qui les essuya avec ses cheveux; c''était son frère Lazare qui était malade. - '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Les sœurs envoyèrent dire à Jésus: «Seigneur, celui que tu aimes est malade.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'A cette nouvelle, Jésus dit: «Cette maladie n''aboutira pas à la mort, mais elle servira à la gloire de Dieu, afin qu''à travers elle la gloire du Fils de Dieu soit révélée.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Or, Jésus aimait Marthe, sa sœur et Lazare. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Quand il eut appris que Lazare était malade, il resta encore deux jours à l''endroit où il était. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Puis il dit aux disciples: «Retournons en Judée.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les disciples lui dirent: «Maître, tout récemment les Juifs cherchaient à te lapider et tu retournes là-bas?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Jésus répondit: «N''y a-t-il pas douze heures de jour? Si quelqu''un marche pendant le jour, il ne trébuche pas, parce qu''il voit la lumière de ce monde; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'mais si quelqu''un marche pendant la nuit, il trébuche, parce que la lumière n''est pas en lui.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Après ces paroles, il leur dit: «Notre ami Lazare s''est endormi, mais je vais aller le réveiller.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les disciples lui dirent: «Seigneur, s''il s''est endormi, il sera guéri.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'En fait, Jésus avait parlé de la mort de Lazare, mais ils crurent qu''il parlait de l''assoupissement du sommeil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jésus leur dit alors ouvertement: «Lazare est mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et à cause de vous, afin que vous croyiez, je me réjouis de ce que je n''étais pas là. Mais allons vers lui.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Là-dessus Thomas, appelé Didyme, dit aux autres disciples: «Allons-y, nous aussi, afin de mourir avec lui.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'A son arrivée, Jésus trouva que Lazare était depuis quatre jours déjà dans le tombeau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Béthanie était près de Jérusalem, à moins de trois kilomètres, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: et beaucoup de Juifs étaient venus chez Marthe et Marie pour les consoler de la mort de leur frère.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Lorsque Marthe apprit que Jésus arrivait, elle alla à sa rencontre, tandis que Marie restait assise à la maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Marthe dit à Jésus: «Seigneur, si tu avais été ici, mon frère ne serait pas mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '[Cependant,] même maintenant, je sais que tout ce que tu demanderas à Dieu, Dieu te l''accordera.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jésus lui dit: «Ton frère ressuscitera.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '«Je sais, lui répondit Marthe, qu''il ressuscitera lors de la résurrection, le dernier jour.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jésus lui dit: «C''est moi qui suis la résurrection et la vie. Celui qui croit en moi vivra, même s''il meurt; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'et toute personne qui vit et croit en moi ne mourra jamais. Crois-tu cela?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Elle lui dit: «Oui, Seigneur, je crois que tu es le Messie, le Fils de Dieu, qui devait venir dans le monde.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Après avoir dit cela, elle alla appeler secrètement sa sœur Marie en lui disant: «Le maître est ici et te demande.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'A ces mots, Marie se leva sans attendre et alla vers lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jésus n''était pas encore entré dans le village, mais il était à l''endroit où Marthe l''avait rencontré. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Les Juifs qui étaient avec Marie dans la maison et qui la consolaient la virent se lever soudain et sortir; ils la suivirent en disant: «Elle va au tombeau pour y pleurer.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Marie arriva à l''endroit où était Jésus. Quand elle le vit, elle tomba à ses pieds et lui dit: «Seigneur, si tu avais été ici, mon frère ne serait pas mort.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'En la voyant pleurer, elle et les Juifs venus avec elle, Jésus fut profondément indigné et bouleversé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Il dit: «Où l''avez-vous mis?» «Seigneur, lui répondit-on, viens et tu verras.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jésus pleura. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Les Juifs dirent alors: «Voyez comme il l''aimait!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Et quelques-uns d''entre eux dirent: «Lui qui a ouvert les yeux de l''aveugle, ne pouvait-il pas aussi faire en sorte que cet homme ne meure pas?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Jésus, de nouveau profondément indigné, se rendit au tombeau. C''était une grotte; une pierre fermait l''entrée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Jésus dit: «Enlevez la pierre.» Marthe, la sœur du mort, lui dit: «Seigneur, il sent déjà, car il y a quatre jours qu''il est là.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Jésus lui dit: «Ne t''ai-je pas dit que si tu crois, tu verras la gloire de Dieu?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ils enlevèrent donc la pierre [de l''endroit où le mort avait été déposé]. Jésus leva alors les yeux et dit: «Père, je te remercie de ce que tu m''as écouté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Pour ma part, je savais que tu m''écoutes toujours, mais j''ai parlé à cause de la foule qui m''entoure, afin qu''ils croient que c''est toi qui m''as envoyé.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Après avoir dit cela, il cria d''une voix forte: «Lazare, sors!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Et le mort sortit, les pieds et les mains attachés par des bandelettes et le visage enveloppé d''un linge. Jésus leur dit: «Détachez-le et laissez-le s''en aller.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Beaucoup de Juifs qui étaient venus auprès de Marie et qui virent ce que Jésus avait fait crurent en lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Mais quelques-uns d'entre eux allèrent trouver les pharisiens et leur racontèrent ce que Jésus avait fait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Alors les chefs des prêtres et les pharisiens rassemblèrent le sanhédrin
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.47 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sanhédrin: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: conseil juif présidé par le grand-prêtre, qui faisait office de gouvernement et de tribunal pour les affaires qui n'étaient pas du ressort des Romains.
    marker-yv: yv-n
  - type: text
    text: ' et dirent: «Qu''allons-nous faire? En effet, cet homme fait beaucoup de signes miraculeux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Si nous le laissons faire, tous croiront en lui et les Romains viendront détruire et notre ville et notre nation.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'L''un d''eux, Caïphe, qui était grand-prêtre cette année-là, leur dit: «Vous n''y comprenez rien; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'vous ne réfléchissez pas qu''il est dans notre intérêt qu''un seul homme meure pour le peuple et que la nation tout entière ne disparaisse pas.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Or il ne dit pas cela de lui-même, mais comme il était grand-prêtre cette année-là, il prophétisa que Jésus devait mourir pour la nation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Et ce n'était pas pour la nation seulement, c'était aussi afin de réunir en un seul corps les enfants de Dieu dispersés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Dès ce jour, ils tinrent conseil pour le faire mourir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: C'est pourquoi Jésus ne se montra plus ouvertement parmi les Juifs, mais il se retira dans la région voisine du désert, dans une ville appelée Ephraïm, où il resta avec ses disciples.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'La Pâque des Juifs était proche et beaucoup de gens montèrent de la campagne à Jérusalem avant la Pâque pour se purifier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Ils cherchaient Jésus et se disaient les uns aux autres dans le temple: «Qu''en pensez-vous? Ne viendra-t-il pas à la fête?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: Or les chefs des prêtres et les pharisiens avaient donné l'ordre que, si quelqu'un savait où était Jésus, il le dénonce, afin qu'on l'arrête.
