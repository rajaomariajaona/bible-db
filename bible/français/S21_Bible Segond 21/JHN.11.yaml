document_id: JHN.11,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus ressuscite Lazare
  - type: text
    content: 'Il y avait un homme malade; c''était Lazare de Béthanie, le village de Marie et de sa sœur Marthe. '
  '10':
  - type: text
    content: 'mais si quelqu''un marche pendant la nuit, il trébuche, parce que la lumière n''est pas en lui.» '
  '11':
  - type: text
    content: 'Après ces paroles, il leur dit: «Notre ami Lazare s''est endormi, mais je vais aller le réveiller.» '
  '12':
  - type: text
    content: 'Les disciples lui dirent: «Seigneur, s''il s''est endormi, il sera guéri.» '
  '13':
  - type: text
    content: 'En fait, Jésus avait parlé de la mort de Lazare, mais ils crurent qu''il parlait de l''assoupissement du sommeil. '
  '14':
  - type: text
    content: 'Jésus leur dit alors ouvertement: «Lazare est mort. '
  '15':
  - type: text
    content: 'Et à cause de vous, afin que vous croyiez, je me réjouis de ce que je n''étais pas là. Mais allons vers lui.» '
  '16':
  - type: text
    content: 'Là-dessus Thomas, appelé Didyme, dit aux autres disciples: «Allons-y, nous aussi, afin de mourir avec lui.»'
  '17':
  - type: text
    content: 'A son arrivée, Jésus trouva que Lazare était depuis quatre jours déjà dans le tombeau. '
  '18':
  - type: text
    content: 'Béthanie était près de Jérusalem, à moins de trois kilomètres, '
  '19':
  - type: text
    content: et beaucoup de Juifs étaient venus chez Marthe et Marie pour les consoler de la mort de leur frère.
  '2':
  - type: text
    content: '- Marie était celle qui versa du parfum sur les pieds du Seigneur et qui les essuya avec ses cheveux; c''était son frère Lazare qui était malade. - '
  '20':
  - type: text
    content: 'Lorsque Marthe apprit que Jésus arrivait, elle alla à sa rencontre, tandis que Marie restait assise à la maison. '
  '21':
  - type: text
    content: 'Marthe dit à Jésus: «Seigneur, si tu avais été ici, mon frère ne serait pas mort. '
  '22':
  - type: text
    content: '[Cependant,] même maintenant, je sais que tout ce que tu demanderas à Dieu, Dieu te l''accordera.» '
  '23':
  - type: text
    content: 'Jésus lui dit: «Ton frère ressuscitera.» '
  '24':
  - type: text
    content: '«Je sais, lui répondit Marthe, qu''il ressuscitera lors de la résurrection, le dernier jour.» '
  '25':
  - type: text
    content: 'Jésus lui dit: «C''est moi qui suis la résurrection et la vie. Celui qui croit en moi vivra, même s''il meurt; '
  '26':
  - type: text
    content: 'et toute personne qui vit et croit en moi ne mourra jamais. Crois-tu cela?» '
  '27':
  - type: text
    content: 'Elle lui dit: «Oui, Seigneur, je crois que tu es le Messie, le Fils de Dieu, qui devait venir dans le monde.»'
  '28':
  - type: text
    content: 'Après avoir dit cela, elle alla appeler secrètement sa sœur Marie en lui disant: «Le maître est ici et te demande.» '
  '29':
  - type: text
    content: 'A ces mots, Marie se leva sans attendre et alla vers lui. '
  '3':
  - type: text
    content: 'Les sœurs envoyèrent dire à Jésus: «Seigneur, celui que tu aimes est malade.» '
  '30':
  - type: text
    content: 'Jésus n''était pas encore entré dans le village, mais il était à l''endroit où Marthe l''avait rencontré. '
  '31':
  - type: text
    content: 'Les Juifs qui étaient avec Marie dans la maison et qui la consolaient la virent se lever soudain et sortir; ils la suivirent en disant: «Elle va au tombeau pour y pleurer.»'
  '32':
  - type: text
    content: 'Marie arriva à l''endroit où était Jésus. Quand elle le vit, elle tomba à ses pieds et lui dit: «Seigneur, si tu avais été ici, mon frère ne serait pas mort.» '
  '33':
  - type: text
    content: 'En la voyant pleurer, elle et les Juifs venus avec elle, Jésus fut profondément indigné et bouleversé. '
  '34':
  - type: text
    content: 'Il dit: «Où l''avez-vous mis?» «Seigneur, lui répondit-on, viens et tu verras.»'
  '35':
  - type: text
    content: 'Jésus pleura. '
  '36':
  - type: text
    content: 'Les Juifs dirent alors: «Voyez comme il l''aimait!» '
  '37':
  - type: text
    content: 'Et quelques-uns d''entre eux dirent: «Lui qui a ouvert les yeux de l''aveugle, ne pouvait-il pas aussi faire en sorte que cet homme ne meure pas?»'
  '38':
  - type: text
    content: 'Jésus, de nouveau profondément indigné, se rendit au tombeau. C''était une grotte; une pierre fermait l''entrée. '
  '39':
  - type: text
    content: 'Jésus dit: «Enlevez la pierre.» Marthe, la sœur du mort, lui dit: «Seigneur, il sent déjà, car il y a quatre jours qu''il est là.» '
  '4':
  - type: text
    content: 'A cette nouvelle, Jésus dit: «Cette maladie n''aboutira pas à la mort, mais elle servira à la gloire de Dieu, afin qu''à travers elle la gloire du Fils de Dieu soit révélée.»'
  '40':
  - type: text
    content: 'Jésus lui dit: «Ne t''ai-je pas dit que si tu crois, tu verras la gloire de Dieu?» '
  '41':
  - type: text
    content: 'Ils enlevèrent donc la pierre [de l''endroit où le mort avait été déposé]. Jésus leva alors les yeux et dit: «Père, je te remercie de ce que tu m''as écouté. '
  '42':
  - type: text
    content: 'Pour ma part, je savais que tu m''écoutes toujours, mais j''ai parlé à cause de la foule qui m''entoure, afin qu''ils croient que c''est toi qui m''as envoyé.» '
  '43':
  - type: text
    content: 'Après avoir dit cela, il cria d''une voix forte: «Lazare, sors!» '
  '44':
  - type: text
    content: 'Et le mort sortit, les pieds et les mains attachés par des bandelettes et le visage enveloppé d''un linge. Jésus leur dit: «Détachez-le et laissez-le s''en aller.»'
  '45':
  - type: text
    content: 'Beaucoup de Juifs qui étaient venus auprès de Marie et qui virent ce que Jésus avait fait crurent en lui. '
  '46':
  - type: text
    content: Mais quelques-uns d'entre eux allèrent trouver les pharisiens et leur racontèrent ce que Jésus avait fait.
  '47':
  - type: text
    content: Alors les chefs des prêtres et les pharisiens rassemblèrent le sanhédrin
  - type: note
    content: 'Sanhédrin: conseil juif présidé par le grand-prêtre, qui faisait office de gouvernement et de tribunal pour les affaires qui n''étaient pas du ressort des Romains.'
  - type: text
    content: ' et dirent: «Qu''allons-nous faire? En effet, cet homme fait beaucoup de signes miraculeux. '
  '48':
  - type: text
    content: 'Si nous le laissons faire, tous croiront en lui et les Romains viendront détruire et notre ville et notre nation.» '
  '49':
  - type: text
    content: 'L''un d''eux, Caïphe, qui était grand-prêtre cette année-là, leur dit: «Vous n''y comprenez rien; '
  '5':
  - type: text
    content: 'Or, Jésus aimait Marthe, sa sœur et Lazare. '
  '50':
  - type: text
    content: 'vous ne réfléchissez pas qu''il est dans notre intérêt qu''un seul homme meure pour le peuple et que la nation tout entière ne disparaisse pas.» '
  '51':
  - type: text
    content: 'Or il ne dit pas cela de lui-même, mais comme il était grand-prêtre cette année-là, il prophétisa que Jésus devait mourir pour la nation. '
  '52':
  - type: text
    content: Et ce n'était pas pour la nation seulement, c'était aussi afin de réunir en un seul corps les enfants de Dieu dispersés.
  '53':
  - type: text
    content: 'Dès ce jour, ils tinrent conseil pour le faire mourir. '
  '54':
  - type: text
    content: C'est pourquoi Jésus ne se montra plus ouvertement parmi les Juifs, mais il se retira dans la région voisine du désert, dans une ville appelée Ephraïm, où il resta avec ses disciples.
  '55':
  - type: text
    content: 'La Pâque des Juifs était proche et beaucoup de gens montèrent de la campagne à Jérusalem avant la Pâque pour se purifier. '
  '56':
  - type: text
    content: 'Ils cherchaient Jésus et se disaient les uns aux autres dans le temple: «Qu''en pensez-vous? Ne viendra-t-il pas à la fête?» '
  '57':
  - type: text
    content: Or les chefs des prêtres et les pharisiens avaient donné l'ordre que, si quelqu'un savait où était Jésus, il le dénonce, afin qu'on l'arrête.
  '6':
  - type: text
    content: 'Quand il eut appris que Lazare était malade, il resta encore deux jours à l''endroit où il était. '
  '7':
  - type: text
    content: 'Puis il dit aux disciples: «Retournons en Judée.» '
  '8':
  - type: text
    content: 'Les disciples lui dirent: «Maître, tout récemment les Juifs cherchaient à te lapider et tu retournes là-bas?» '
  '9':
  - type: text
    content: 'Jésus répondit: «N''y a-t-il pas douze heures de jour? Si quelqu''un marche pendant le jour, il ne trébuche pas, parce qu''il voit la lumière de ce monde; '
