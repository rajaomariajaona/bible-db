document_id: 2SA.12,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'L''Eternel envoya Nathan vers David. Il vint donc le trouver et lui dit: «Il y avait dans une ville deux hommes, l''un riche et l''autre pauvre. '
  '10':
  - type: text
    content: 'Désormais, puisque tu m''as méprisé et que tu as pris la femme d''Urie le Hittite pour faire d''elle ta femme, l''épée ne s''éloignera plus de ton foyer. '
  '11':
  - type: text
    content: 'Voici ce que dit l''Eternel: Je vais faire sortir de ta propre famille le malheur contre toi et je vais prendre sous tes yeux tes propres femmes pour les donner à un autre, qui couchera au grand jour avec elles. '
  '12':
  - type: text
    content: En effet, tu as agi en secret, mais moi, c'est en présence de tout Israël et en plein jour que je ferai cela.»
  '13':
  - type: text
    content: 'David dit à Nathan: «J''ai péché contre l''Eternel!» Nathan lui répondit: «L''Eternel pardonne ton péché, tu ne mourras pas. '
  '14':
  - type: text
    content: Cependant, parce que tu as fait blasphémer les ennemis de l'Eternel en commettant cet acte, le fils qui t'est né mourra.»
  '15':
  - type: text
    content: 'Nathan retourna chez lui. L''Eternel frappa l''enfant que la femme d''Urie avait donné à David, et il fut gravement malade. '
  '16':
  - type: text
    content: 'David pria Dieu pour l''enfant et jeûna. Lorsqu''il rentra, il passa la nuit couché par terre. '
  '17':
  - type: text
    content: 'Les responsables du palais insistèrent auprès de lui pour qu''il se relève, mais il refusa et il ne mangea rien avec eux. '
  '18':
  - type: text
    content: 'Le septième jour, l''enfant mourut. Les serviteurs de David avaient peur de lui annoncer que l''enfant était mort, car ils se disaient: «Lorsque l''enfant était encore vivant, nous lui avons parlé et il ne nous a pas écoutés. Comment oserons-nous lui dire que l''enfant est mort? Il réagira mal.» '
  '19':
  - type: text
    content: 'David s''aperçut que ses serviteurs parlaient tout bas entre eux et comprit que l''enfant était mort. Il leur demanda: «L''enfant est-il mort?» Ils répondirent: «Il est mort.» '
  '2':
  - type: text
    content: 'Le riche avait des brebis et des bœufs en très grand nombre. '
  '20':
  - type: text
    content: 'Alors David se releva. Il se lava, se parfuma et changea d''habits. Puis il se rendit dans la maison de l''Eternel et s''y prosterna. De retour chez lui, il demanda qu''on lui serve à manger et il mangea. '
  '21':
  - type: text
    content: 'Ses serviteurs lui dirent: «Que signifie ta façon d''agir? Tant que l''enfant était vivant, tu jeûnais et tu pleurais. Maintenant qu''il est mort, tu te relèves et tu manges!» '
  '22':
  - type: text
    content: 'Il répondit: «Lorsque l''enfant était encore vivant, je jeûnais et je pleurais, car je me disais: ‘Qui sait? Peut-être l''Eternel me fera-t-il grâce et peut-être l''enfant restera-t-il en vie.’ '
  '23':
  - type: text
    content: Maintenant qu'il est mort, pourquoi jeûner? Puis-je le faire revenir? C'est moi qui irai le retrouver, mais lui ne reviendra pas vers moi.»
  '24':
  - type: text
    content: 'David consola sa femme Bath-Shéba, et il alla vers elle et coucha avec elle. Elle mit au monde un fils qu''elle appela Salomon et que l''Eternel aima. '
  '25':
  - type: text
    content: Il le confia au prophète Nathan et celui-ci l'appela Jedidja
  - type: note
    content: 'Jedidja: littéralement bien-aimé de l''Eternel.'
  - type: text
    content: ' à cause de l''Eternel.'
  - type: heading
    content: Prise de Rabba par David et Joab
  '26':
  - type: text
    content: 'Joab combattait toujours à Rabba, la capitale des Ammonites, et il s''empara du quartier royal. '
  '27':
  - type: text
    content: 'Il envoya alors des messagers à David pour lui dire: «J''ai attaqué Rabba et je me suis déjà emparé du quartier des eaux. '
  '28':
  - type: text
    content: 'Rassemble maintenant le reste du peuple, campe près de la ville et prends-la. Si je m''en empare moi-même, la gloire risque de m''en revenir.» '
  '29':
  - type: text
    content: 'David rassembla tout le peuple et marcha vers Rabba. Il l''attaqua et s''en empara. '
  '3':
  - type: text
    content: 'Le pauvre n''avait rien du tout, sauf une petite brebis, qu''il avait achetée. Il la nourrissait et elle grandissait chez lui avec ses enfants. Elle mangeait de son pain, buvait dans sa coupe et dormait contre lui. Il la considérait comme sa fille. '
  '30':
  - type: text
    content: 'Il retira la couronne de la tête de son roi; elle était faite d''une trentaine de kilos d''or et était garnie de pierres précieuses. On la mit sur la tête de David, qui emporta de la ville un très grand butin. '
  '31':
  - type: text
    content: Il déporta ses habitants et les affecta au maniement des scies, des pics de fer et des haches de fer, ou encore les fit travailler au moule à briques. Il traita de la même manière toutes les villes des Ammonites. Puis David retourna à Jérusalem avec tout le peuple.
  '4':
  - type: text
    content: 'Un voyageur est arrivé chez l''homme riche, mais le riche n''a pas voulu toucher à ses brebis ou à ses bœufs pour préparer un repas au voyageur venu chez lui: il a pris la brebis du pauvre et l''a préparée pour l''homme qui était venu chez lui.»'
  '5':
  - type: text
    content: 'La colère de David s''enflamma violemment contre cet homme et il dit à Nathan: «L''Eternel est vivant! L''homme qui a fait cela mérite la mort. '
  '6':
  - type: text
    content: En outre il remplacera la brebis par 4 autres, puisqu'il a commis cet acte et s'est montré sans pitié.»
  '7':
  - type: text
    content: 'Nathan déclara alors à David: «C''est toi qui es cet homme-là! Voici ce que dit l''Eternel, le Dieu d''Israël: Je t''ai désigné par onction comme roi sur Israël et je t''ai délivré de Saül. '
  '8':
  - type: text
    content: 'Je t''ai donné la famille de ton maître, j''ai mis ses femmes contre ta poitrine et je t''ai donné la communauté d''Israël et de Juda. Si cela avait été trop peu, j''y aurais encore ajouté. '
  '9':
  - type: text
    content: 'Pourquoi donc as-tu méprisé la parole de l''Eternel en faisant ce qui est mal à mes yeux? Tu as tué par l''épée Urie le Hittite, tu as pris sa femme pour faire d''elle ta femme et lui, tu l''as tué sous les coups d''épée des Ammonites. '
