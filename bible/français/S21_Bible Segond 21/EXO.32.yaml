document_id: EXO.32,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Renouvellement de l'alliance
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 32.1–35.3
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fabrication du veau d'or
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Le peuple voyait que Moïse tardait à descendre de la montagne. Alors il se rassembla autour d''Aaron et lui dit: «Allons! *Fais-nous des dieux qui marchent devant nous, car ce Moïse, l''homme qui nous a fait sortir d''Egypte, nous ignorons ce qu''il est devenu.'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Fais-nous… devenu: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Actes 7.40
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' par Etienne.'
      marker-yv: yv-n
    - type: text
      text: '» '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Maintenant, laisse-moi faire! Ma colère va s'enflammer contre eux et je vais les faire disparaître, tandis que je ferai de toi une grande nation.»
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Moïse implora l''Eternel, son Dieu, et dit: «Pourquoi, Eternel, ta colère s''enflammerait-elle contre ton peuple, celui que tu as fait sortir d''Egypte avec une grande puissance et avec force? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Pourquoi les Egyptiens diraient-ils: ‘C''est pour leur malheur qu''il les a fait sortir de notre pays, c''est pour les tuer dans les montagnes et les exterminer de la surface de la terre’? Renonce à ton ardente colère et reviens sur ta décision de faire du mal à ton peuple! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Souviens-toi d'Abraham, d'Isaac et d'Israël
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Israël: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: autre nom du patriarche Jacob, ancêtre du peuple d'Israël comme son père Isaac et son grand-père Abraham.
      marker-yv: yv-n
    - type: text
      text: ', tes serviteurs! Tu leur as dit en jurant par toi-même: *‘Je rendrai votre descendance aussi nombreuse que les étoiles du ciel, je donnerai à vos descendants tout le pays dont j''ai parlé et ils le posséderont pour toujours.’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je rendrai… toujours: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'renvoi à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Genèse 22.17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '26.4'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '17.8'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '» '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: L'Eternel renonça alors au mal qu'il avait déclaré vouloir faire à son peuple.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Moïse repartit et descendit de la montagne, les deux tables du témoignage dans la main. Les tables étaient écrites des deux côtés, elles étaient écrites de chaque côté. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Elles étaient l''œuvre de Dieu et l''écriture était celle de Dieu, gravée sur les tables. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Josué entendit le bruit que faisait le peuple en poussant des cris et il dit à Moïse: «Il y a un cri de guerre dans le camp.» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Moïse répondit: «Ce n''est ni un cri de vainqueurs, ni un cri de vaincus. Ce que j''entends, ce sont des gens qui chantent.» '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'En s''approchant du camp, il vit le veau et les danses. La colère de Moïse s''enflamma. Il jeta les tables qu''il tenait et les brisa au pied de la montagne. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Aaron leur dit: «Retirez les anneaux d''or qui pendent aux oreilles de vos femmes, de vos fils et de vos filles et apportez-les-moi.» '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Il prit le veau qu'ils avaient fait et le brûla au feu; il le réduisit en poudre, versa cette poudre à la surface de l'eau et la fit boire aux Israélites.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Moïse dit à Aaron: «Que t''a fait ce peuple pour que tu le rendes coupable d''un si grand péché?» '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Aaron répondit: «Que la colère de mon seigneur ne s''enflamme pas! Tu sais toi-même que ce peuple est porté au mal. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ils m''ont dit: ‘Fais-nous des dieux qui marchent devant nous, car ce Moïse, l''homme qui nous a fait sortir d''Egypte, nous ignorons ce qu''il est devenu.’ '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Je leur ai dit: ‘Que ceux qui ont de l''or s''en dépouillent!’ Et ils me l''ont donné. Je l''ai jeté au feu et il en est sorti ce veau.»'
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Moïse vit que le peuple était en plein désordre et qu''Aaron l''avait laissé dans ce désordre, exposé au déshonneur parmi ses ennemis. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Moïse se plaça à l''entrée du camp et dit: «Qui est pour l''Eternel? Qu''il vienne vers moi!» Tous les Lévites se rassemblèrent à ses côtés. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Il leur annonça: «Voici ce que dit l''Eternel, le Dieu d''Israël: Que chacun de vous mette son épée au côté. Traversez et parcourez le camp d''une entrée à l''autre et que chacun tue son frère, son prochain, son voisin.» '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Les Lévites firent ce qu''ordonnait Moïse et 3000 hommes environ parmi le peuple moururent ce jour-là. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Moïse dit: «Vous avez aujourd''hui été établis dans vos fonctions au service de l''Eternel, et ce au prix même de votre fils et de votre frère, si bien qu''il vous accorde aujourd''hui une bénédiction.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Intercession de Moïse
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Chacun retira les anneaux d''or qui pendaient à ses oreilles et ils les apportèrent à Aaron. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Le lendemain, Moïse dit au peuple: «Vous avez commis un grand péché. Je vais maintenant monter vers l''Eternel. Peut-être obtiendrai-je le pardon de votre péché.» '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Moïse retourna vers l''Eternel et dit: «Ah! Ce peuple a commis un grand péché. Ils se sont fait des dieux en or. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Pardonne maintenant leur péché! Sinon, efface-moi de ton livre que tu as écrit.» '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'L''Eternel dit à Moïse: «C''est celui qui a péché contre moi que j''effacerai de mon livre. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Va donc, conduis le peuple à l'endroit que je t'ai indiqué. Mon ange marchera devant toi, mais le jour où j'interviendrai, je les punirai de leur péché.»
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: L'Eternel frappa le peuple parce qu'il avait fait le veau, celui qu'avait fabriqué Aaron.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il les reçut de leurs mains, jeta l''or dans un moule et fit un veau en métal fondu. Ils dirent alors: *«Israël, voici tes dieux qui t''ont fait sortir d''Egypte.»'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Israël… d''Egypte: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mêmes mots dans la bouche de Jéroboam lors du schisme du royaume d'Israël (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Rois 12.28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Lorsque Aaron vit cela, il construisit un autel devant lui et s''écria: «Demain, il y aura une fête en l''honneur de l''Eternel!» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Le lendemain, ils se levèrent de bon matin et offrirent des holocaustes et des sacrifices de communion. *Le peuple s'assit pour manger et pour boire; puis ils se levèrent pour s'amuser.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le peuple… s''amuser: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité par l''apôtre Paul en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Corinthiens 10.7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dans un avertissement contre l''idolâtrie.'
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'L''Eternel dit à Moïse: «Vas-y, descends. En effet, ton peuple, celui que tu as fait sortir d''Egypte, s''est corrompu. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ils se sont bien vite écartés de la voie que je leur avais prescrite: ils se sont fait un veau en métal fondu, se sont prosternés devant lui, lui ont offert des sacrifices et ont dit: ‘Israël, voici tes dieux qui t''ont fait sortir d''Egypte.’» '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'L''Eternel dit à Moïse: «Je vois que ce peuple est un peuple réfractaire. '
