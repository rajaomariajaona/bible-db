document_id: EXO.32,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Renouvellement de l'alliance
  - type: heading
    content: 32.1–35.3
  - type: heading
    content: Fabrication du veau d'or
  - type: text
    content: 'Le peuple voyait que Moïse tardait à descendre de la montagne. Alors il se rassembla autour d''Aaron et lui dit: «Allons! *Fais-nous des dieux qui marchent devant nous, car ce Moïse, l''homme qui nous a fait sortir d''Egypte, nous ignorons ce qu''il est devenu.'
  - type: note
    content: 'Fais-nous… devenu: cité en Actes 7.40 par Etienne.'
  - type: text
    content: '» '
  '10':
  - type: text
    content: Maintenant, laisse-moi faire! Ma colère va s'enflammer contre eux et je vais les faire disparaître, tandis que je ferai de toi une grande nation.»
  '11':
  - type: text
    content: 'Moïse implora l''Eternel, son Dieu, et dit: «Pourquoi, Eternel, ta colère s''enflammerait-elle contre ton peuple, celui que tu as fait sortir d''Egypte avec une grande puissance et avec force? '
  '12':
  - type: text
    content: 'Pourquoi les Egyptiens diraient-ils: ‘C''est pour leur malheur qu''il les a fait sortir de notre pays, c''est pour les tuer dans les montagnes et les exterminer de la surface de la terre’? Renonce à ton ardente colère et reviens sur ta décision de faire du mal à ton peuple! '
  '13':
  - type: text
    content: Souviens-toi d'Abraham, d'Isaac et d'Israël
  - type: note
    content: 'Israël: autre nom du patriarche Jacob, ancêtre du peuple d''Israël comme son père Isaac et son grand-père Abraham.'
  - type: text
    content: ', tes serviteurs! Tu leur as dit en jurant par toi-même: *‘Je rendrai votre descendance aussi nombreuse que les étoiles du ciel, je donnerai à vos descendants tout le pays dont j''ai parlé et ils le posséderont pour toujours.’'
  - type: note
    content: 'Je rendrai… toujours: renvoi à Genèse 22.17; 26.4; 17.8.'
  - type: text
    content: '» '
  '14':
  - type: text
    content: L'Eternel renonça alors au mal qu'il avait déclaré vouloir faire à son peuple.
  '15':
  - type: text
    content: 'Moïse repartit et descendit de la montagne, les deux tables du témoignage dans la main. Les tables étaient écrites des deux côtés, elles étaient écrites de chaque côté. '
  '16':
  - type: text
    content: 'Elles étaient l''œuvre de Dieu et l''écriture était celle de Dieu, gravée sur les tables. '
  '17':
  - type: text
    content: 'Josué entendit le bruit que faisait le peuple en poussant des cris et il dit à Moïse: «Il y a un cri de guerre dans le camp.» '
  '18':
  - type: text
    content: 'Moïse répondit: «Ce n''est ni un cri de vainqueurs, ni un cri de vaincus. Ce que j''entends, ce sont des gens qui chantent.» '
  '19':
  - type: text
    content: 'En s''approchant du camp, il vit le veau et les danses. La colère de Moïse s''enflamma. Il jeta les tables qu''il tenait et les brisa au pied de la montagne. '
  '2':
  - type: text
    content: 'Aaron leur dit: «Retirez les anneaux d''or qui pendent aux oreilles de vos femmes, de vos fils et de vos filles et apportez-les-moi.» '
  '20':
  - type: text
    content: Il prit le veau qu'ils avaient fait et le brûla au feu; il le réduisit en poudre, versa cette poudre à la surface de l'eau et la fit boire aux Israélites.
  '21':
  - type: text
    content: 'Moïse dit à Aaron: «Que t''a fait ce peuple pour que tu le rendes coupable d''un si grand péché?» '
  '22':
  - type: text
    content: 'Aaron répondit: «Que la colère de mon seigneur ne s''enflamme pas! Tu sais toi-même que ce peuple est porté au mal. '
  '23':
  - type: text
    content: 'Ils m''ont dit: ‘Fais-nous des dieux qui marchent devant nous, car ce Moïse, l''homme qui nous a fait sortir d''Egypte, nous ignorons ce qu''il est devenu.’ '
  '24':
  - type: text
    content: 'Je leur ai dit: ‘Que ceux qui ont de l''or s''en dépouillent!’ Et ils me l''ont donné. Je l''ai jeté au feu et il en est sorti ce veau.»'
  '25':
  - type: text
    content: 'Moïse vit que le peuple était en plein désordre et qu''Aaron l''avait laissé dans ce désordre, exposé au déshonneur parmi ses ennemis. '
  '26':
  - type: text
    content: 'Moïse se plaça à l''entrée du camp et dit: «Qui est pour l''Eternel? Qu''il vienne vers moi!» Tous les Lévites se rassemblèrent à ses côtés. '
  '27':
  - type: text
    content: 'Il leur annonça: «Voici ce que dit l''Eternel, le Dieu d''Israël: Que chacun de vous mette son épée au côté. Traversez et parcourez le camp d''une entrée à l''autre et que chacun tue son frère, son prochain, son voisin.» '
  '28':
  - type: text
    content: 'Les Lévites firent ce qu''ordonnait Moïse et 3000 hommes environ parmi le peuple moururent ce jour-là. '
  '29':
  - type: text
    content: 'Moïse dit: «Vous avez aujourd''hui été établis dans vos fonctions au service de l''Eternel, et ce au prix même de votre fils et de votre frère, si bien qu''il vous accorde aujourd''hui une bénédiction.»'
  - type: heading
    content: Intercession de Moïse
  '3':
  - type: text
    content: 'Chacun retira les anneaux d''or qui pendaient à ses oreilles et ils les apportèrent à Aaron. '
  '30':
  - type: text
    content: 'Le lendemain, Moïse dit au peuple: «Vous avez commis un grand péché. Je vais maintenant monter vers l''Eternel. Peut-être obtiendrai-je le pardon de votre péché.» '
  '31':
  - type: text
    content: 'Moïse retourna vers l''Eternel et dit: «Ah! Ce peuple a commis un grand péché. Ils se sont fait des dieux en or. '
  '32':
  - type: text
    content: 'Pardonne maintenant leur péché! Sinon, efface-moi de ton livre que tu as écrit.» '
  '33':
  - type: text
    content: 'L''Eternel dit à Moïse: «C''est celui qui a péché contre moi que j''effacerai de mon livre. '
  '34':
  - type: text
    content: Va donc, conduis le peuple à l'endroit que je t'ai indiqué. Mon ange marchera devant toi, mais le jour où j'interviendrai, je les punirai de leur péché.»
  '35':
  - type: text
    content: L'Eternel frappa le peuple parce qu'il avait fait le veau, celui qu'avait fabriqué Aaron.
  '4':
  - type: text
    content: 'Il les reçut de leurs mains, jeta l''or dans un moule et fit un veau en métal fondu. Ils dirent alors: *«Israël, voici tes dieux qui t''ont fait sortir d''Egypte.»'
  - type: note
    content: 'Israël… d''Egypte: mêmes mots dans la bouche de Jéroboam lors du schisme du royaume d''Israël (1 Rois 12.28).'
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Lorsque Aaron vit cela, il construisit un autel devant lui et s''écria: «Demain, il y aura une fête en l''honneur de l''Eternel!» '
  '6':
  - type: text
    content: Le lendemain, ils se levèrent de bon matin et offrirent des holocaustes et des sacrifices de communion. *Le peuple s'assit pour manger et pour boire; puis ils se levèrent pour s'amuser.
  - type: note
    content: 'Le peuple… s''amuser: cité par l''apôtre Paul en 1 Corinthiens 10.7 dans un avertissement contre l''idolâtrie.'
  '7':
  - type: text
    content: 'L''Eternel dit à Moïse: «Vas-y, descends. En effet, ton peuple, celui que tu as fait sortir d''Egypte, s''est corrompu. '
  '8':
  - type: text
    content: 'Ils se sont bien vite écartés de la voie que je leur avais prescrite: ils se sont fait un veau en métal fondu, se sont prosternés devant lui, lui ont offert des sacrifices et ont dit: ‘Israël, voici tes dieux qui t''ont fait sortir d''Egypte.’» '
  '9':
  - type: text
    content: 'L''Eternel dit à Moïse: «Je vois que ce peuple est un peuple réfractaire. '
