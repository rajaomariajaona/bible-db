document_id: ISA.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Appel et mission d'Esaïe
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''année de la mort du roi Ozias, j''ai vu le Seigneur assis sur un trône très élevé; le bord inférieur de son vêtement remplissait le temple. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Des séraphins se tenaient au-dessus de lui. Ils avaient chacun six ailes: deux dont ils se couvraient le visage, deux dont ils se couvraient les pieds et deux dont ils se servaient pour voler. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils se criaient l''un à l''autre: «*Saint, saint, saint est l''Eternel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Saint… l''Eternel: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Apocalypse 4.8
      metadata:
        usfm: REV.4.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', le maître de l''univers! Sa gloire remplit toute la terre!» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les montants des portes se sont mis à trembler à cause de la voix qui retentissait et le temple a été rempli de fumée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors j''ai dit: «Malheur à moi! Je suis perdu, car je suis un homme aux lèvres impures, j''habite au milieu d''un peuple aux lèvres impures et mes yeux ont vu le roi, l''Eternel, le maître de l''univers!» '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Cependant, l''un des séraphins a volé vers moi, tenant une braise qu''il avait prise sur l''autel à l''aide de pincettes. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il a touché ma bouche avec elle et a dit: «Puisque ceci a touché tes lèvres, ta faute est enlevée et ton péché est expié.»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'J''ai entendu le Seigneur dire:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Qui vais-je envoyer et qui va marcher pour nous?»
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'J''ai répondu: «Me voici, envoie-moi!»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il a alors ordonné: *«Va dire à ce peuple:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Vous aurez beau écouter, vous ne comprendrez pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous aurez beau regarder, vous ne saurez pas.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Rends insensible le cœur de ce peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: endurcis ses oreilles et ferme-lui les yeux
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour qu'il ne voie pas de ses yeux, n'entende pas de ses oreilles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne comprenne pas de son cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne se convertisse pas et ne soit pas guéri.»
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.9-10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Versets cités en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 13.14-15
      metadata:
        usfm: MAT.13.14+MAT.13.15
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Marc 4.12
      metadata:
        usfm: MRK.4.12
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luc 8.10
      metadata:
        usfm: LUK.8.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jean 12.40
      metadata:
        usfm: JHN.12.40
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' à propos du ministère de Jésus, en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Actes 28.26-27
      metadata:
        usfm: ACT.28.26+ACT.28.27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' à propos du ministère de Paul.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'J''ai dit: «Jusqu''à quand, Seigneur?»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et il a répondu: «Jusqu''à ce que la dévastation ait privé les villes d''habitants'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les maisons d'êtres humains
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que le territoire soit dévasté, désertique,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: jusqu'à ce que l'Eternel ait éloigné les êtres humains
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu'une grande partie du pays soit abandonnée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: S'il y reste encore un dixième des habitants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à leur tour ils passeront par les flammes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cependant, tout comme le térébinthe et le chêne
- type: usfm
  marker: q1
  children:
  - type: text
    text: conservent leur souche quand ils sont abattus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la souche de ce peuple donnera une sainte descendance.»
