document_id: ISA.6,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Appel et mission d'Esaïe
  - type: text
    content: 'L''année de la mort du roi Ozias, j''ai vu le Seigneur assis sur un trône très élevé; le bord inférieur de son vêtement remplissait le temple. '
  '10':
  - type: text
    content: Rends insensible le cœur de ce peuple,
  - type: text
    content: endurcis ses oreilles et ferme-lui les yeux
  - type: text
    content: pour qu'il ne voie pas de ses yeux, n'entende pas de ses oreilles,
  - type: text
    content: ne comprenne pas de son cœur,
  - type: text
    content: ne se convertisse pas et ne soit pas guéri.»
  - type: note
    content: Versets cités en Matthieu 13.14-15; Marc 4.12; Luc 8.10; Jean 12.40 à propos du ministère de Jésus, en Actes 28.26-27 à propos du ministère de Paul.
  '11':
  - type: text
    content: 'J''ai dit: «Jusqu''à quand, Seigneur?»'
  - type: text
    content: 'Et il a répondu: «Jusqu''à ce que la dévastation ait privé les villes d''habitants'
  - type: text
    content: et les maisons d'êtres humains
  - type: text
    content: et que le territoire soit dévasté, désertique,
  '12':
  - type: text
    content: jusqu'à ce que l'Eternel ait éloigné les êtres humains
  - type: text
    content: et qu'une grande partie du pays soit abandonnée.
  '13':
  - type: text
    content: S'il y reste encore un dixième des habitants,
  - type: text
    content: à leur tour ils passeront par les flammes.
  - type: text
    content: Cependant, tout comme le térébinthe et le chêne
  - type: text
    content: conservent leur souche quand ils sont abattus,
  - type: text
    content: la souche de ce peuple donnera une sainte descendance.»
  '2':
  - type: text
    content: 'Des séraphins se tenaient au-dessus de lui. Ils avaient chacun six ailes: deux dont ils se couvraient le visage, deux dont ils se couvraient les pieds et deux dont ils se servaient pour voler. '
  '3':
  - type: text
    content: 'Ils se criaient l''un à l''autre: «*Saint, saint, saint est l''Eternel'
  - type: note
    content: 'Saint… l''Eternel: cité en Apocalypse 4.8.'
  - type: text
    content: ', le maître de l''univers! Sa gloire remplit toute la terre!» '
  '4':
  - type: text
    content: Les montants des portes se sont mis à trembler à cause de la voix qui retentissait et le temple a été rempli de fumée.
  '5':
  - type: text
    content: 'Alors j''ai dit: «Malheur à moi! Je suis perdu, car je suis un homme aux lèvres impures, j''habite au milieu d''un peuple aux lèvres impures et mes yeux ont vu le roi, l''Eternel, le maître de l''univers!» '
  '6':
  - type: text
    content: 'Cependant, l''un des séraphins a volé vers moi, tenant une braise qu''il avait prise sur l''autel à l''aide de pincettes. '
  '7':
  - type: text
    content: 'Il a touché ma bouche avec elle et a dit: «Puisque ceci a touché tes lèvres, ta faute est enlevée et ton péché est expié.»'
  '8':
  - type: text
    content: 'J''ai entendu le Seigneur dire:'
  - type: text
    content: «Qui vais-je envoyer et qui va marcher pour nous?»
  - type: text
    content: 'J''ai répondu: «Me voici, envoie-moi!»'
  '9':
  - type: text
    content: 'Il a alors ordonné: *«Va dire à ce peuple:'
  - type: text
    content: ‘Vous aurez beau écouter, vous ne comprendrez pas,
  - type: text
    content: vous aurez beau regarder, vous ne saurez pas.’
