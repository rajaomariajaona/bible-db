document_id: GEN.25,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Mort d'Abraham
  - type: text
    content: 'Abraham prit encore une femme du nom de Ketura. '
  '10':
  - type: text
    content: C'était le champ qu'Abraham avait acheté aux Hittites et c'est là que furent enterrés Abraham et sa femme Sara.
  '11':
  - type: text
    content: Après la mort d'Abraham, Dieu bénit son fils Isaac. Celui-ci s'installa près du puits de Lachaï-Roï.
  - type: heading
    content: Descendance d'Ismaël
  '12':
  - type: text
    content: Voici la lignée d'Ismaël, fils d'Abraham, celui que l'Egyptienne Agar, la servante de Sara, avait donné à Abraham.
  '13':
  - type: text
    content: 'Voici le nom des fils d''Ismaël, leur nom en fonction de leur lignée: Nebajoth, son fils aîné, Kédar, Adbeel, Mibsam, '
  '14':
  - type: text
    content: 'Mishma, Duma, Massa, '
  '15':
  - type: text
    content: 'Hadad, Théma, Jethur, Naphish et Kedma. '
  '16':
  - type: text
    content: Voilà quels furent les fils d'Ismaël avec leur nom d'après leurs villages et leurs campements. Ils furent les douze chefs de leurs peuples.
  '17':
  - type: text
    content: 'La durée de la vie d''Ismaël fut de 137 ans, puis il expira. Il mourut et alla rejoindre les siens. '
  '18':
  - type: text
    content: Ses descendants habitèrent le territoire situé entre Havila et Shur, qui est en face de l'Egypte, en direction de l'Assyrie. Il s'établit en face de tous ses frères.
  - type: heading
    content: Histoire d'Isaac
  - type: heading
    content: 25.19–26.35
  - type: heading
    content: Naissance d'Esaü et Jacob
  '19':
  - type: text
    content: 'Voici la lignée d''Isaac, fils d''Abraham. Abraham eut pour fils Isaac. '
  '2':
  - type: text
    content: 'Elle lui donna Zimran, Jokshan, Medan, Madian, Jishbak et Shuach. '
  '20':
  - type: text
    content: 'Isaac était âgé de 40 ans quand il prit pour femme Rebecca, qui était la fille de Bethuel, l''Araméen de Paddan-Aram, et la sœur de Laban l''Araméen. '
  '21':
  - type: text
    content: 'Isaac supplia l''Eternel pour sa femme, car elle était stérile, et l''Eternel l''exauça: sa femme Rebecca tomba enceinte. '
  '22':
  - type: text
    content: 'Les enfants se heurtaient à l''intérieur d''elle et elle dit: «Si telle est la situation, pourquoi suis-je enceinte?» Elle alla consulter l''Eternel, '
  '23':
  - type: text
    content: 'et l''Eternel lui dit: «Il y a deux nations dans ton ventre, et deux peuples issus de toi se sépareront. Un de ces peuples sera plus fort que l''autre, et *le plus grand sera asservi au plus petit'
  - type: note
    content: 'Le plus grand… petit: cité en Romains 9.12.'
  - type: text
    content: '.» '
  '24':
  - type: text
    content: 'Le moment où elle devait accoucher arriva, et voici qu''il y avait des jumeaux dans son ventre. '
  '25':
  - type: text
    content: 'Le premier sortit roux et tout couvert de poils, comme un manteau. On l''appela Esaü. '
  '26':
  - type: text
    content: Ensuite sortit son frère, dont la main tenait le talon d'Esaü. On l'appela Jacob. Isaac était âgé de 60 ans à leur naissance.
  '27':
  - type: text
    content: 'Ces enfants grandirent. Esaü devint un habile chasseur, un homme de la campagne, alors que Jacob était un homme tranquille qui restait sous les tentes. '
  '28':
  - type: text
    content: Isaac aimait Esaü parce qu'il lui amenait du gibier, et Rebecca aimait Jacob.
  '29':
  - type: text
    content: 'Tandis que Jacob faisait cuire un potage, Esaü revint des champs, accablé de fatigue. '
  '3':
  - type: text
    content: 'Jokshan eut pour fils Séba et Dedan. Les descendants de Dedan furent les Ashurim, les Letushim et les Leummim. '
  '30':
  - type: text
    content: 'Esaü dit à Jacob: «Laisse-moi manger de ce roux, de ce plat roux, car je suis fatigué.» C''est pour cela qu''on a donné à Esaü le nom d''Edom'
  - type: note
    content: 'Edom: fait assonance avec le mot hébreu traduit roux.'
  - type: text
    content: .
  '31':
  - type: text
    content: 'Jacob répondit: «Vends-moi aujourd''hui ton droit d''aînesse'
  - type: note
    content: 'Droit d''aînesse: le fils aîné héritait du rang, de la situation et des prérogatives de son père; il devenait chef de la famille ou de la tribu; il héritait aussi une double portion des biens paternels.'
  - type: text
    content: '.» '
  '32':
  - type: text
    content: 'Esaü répondit: «Je vais mourir. A quoi me sert ce droit d''aînesse?» '
  '33':
  - type: text
    content: 'Jacob dit: «Jure-le-moi d''abord.» Il le lui jura, il vendit son droit d''aînesse à Jacob. '
  '34':
  - type: text
    content: Alors Jacob donna du pain et du potage de lentilles à Esaü. Il mangea et but, puis se leva et s'en alla. C'est ainsi qu'Esaü méprisa le droit d'aînesse.
  '4':
  - type: text
    content: Les fils de Madian furent Epha, Epher, Hénoc, Abida et Eldaa. Tous ceux-là sont des descendants de Ketura.
  '5':
  - type: text
    content: 'Abraham donna tout ce qu''il possédait à Isaac. '
  '6':
  - type: text
    content: Quant aux fils de ses concubines, il leur fit des cadeaux et il les envoya de son vivant loin de son fils Isaac, vers l'est, dans un pays d'Orient.
  '7':
  - type: text
    content: 'La durée de la vie d''Abraham fut de 175 ans, '
  '8':
  - type: text
    content: 'puis il expira. Abraham mourut après une heureuse vieillesse, âgé et rassasié de jours, et il alla rejoindre les siens. '
  '9':
  - type: text
    content: 'Ses fils Isaac et Ismaël l''enterrèrent dans la grotte de Macpéla, dans le champ du Hittite Ephron, fils de Tsochar, vis-à-vis de Mamré. '
