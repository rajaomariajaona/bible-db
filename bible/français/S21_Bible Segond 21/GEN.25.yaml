document_id: GEN.25
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mort d'Abraham
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Abraham prit encore une femme du nom de Ketura. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Elle lui donna Zimran, Jokshan, Medan, Madian, Jishbak et Shuach. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jokshan eut pour fils Séba et Dedan. Les descendants de Dedan furent les Ashurim, les Letushim et les Leummim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les fils de Madian furent Epha, Epher, Hénoc, Abida et Eldaa. Tous ceux-là sont des descendants de Ketura.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Abraham donna tout ce qu''il possédait à Isaac. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Quant aux fils de ses concubines, il leur fit des cadeaux et il les envoya de son vivant loin de son fils Isaac, vers l'est, dans un pays d'Orient.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'La durée de la vie d''Abraham fut de 175 ans, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'puis il expira. Abraham mourut après une heureuse vieillesse, âgé et rassasié de jours, et il alla rejoindre les siens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ses fils Isaac et Ismaël l''enterrèrent dans la grotte de Macpéla, dans le champ du Hittite Ephron, fils de Tsochar, vis-à-vis de Mamré. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: C'était le champ qu'Abraham avait acheté aux Hittites et c'est là que furent enterrés Abraham et sa femme Sara.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Après la mort d'Abraham, Dieu bénit son fils Isaac. Celui-ci s'installa près du puits de Lachaï-Roï.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendance d'Ismaël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Voici la lignée d'Ismaël, fils d'Abraham, celui que l'Egyptienne Agar, la servante de Sara, avait donné à Abraham.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Voici le nom des fils d''Ismaël, leur nom en fonction de leur lignée: Nebajoth, son fils aîné, Kédar, Adbeel, Mibsam, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mishma, Duma, Massa, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hadad, Théma, Jethur, Naphish et Kedma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Voilà quels furent les fils d'Ismaël avec leur nom d'après leurs villages et leurs campements. Ils furent les douze chefs de leurs peuples.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'La durée de la vie d''Ismaël fut de 137 ans, puis il expira. Il mourut et alla rejoindre les siens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ses descendants habitèrent le territoire situé entre Havila et Shur, qui est en face de l'Egypte, en direction de l'Assyrie. Il s'établit en face de tous ses frères.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Histoire d'Isaac
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 25.19–26.35
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Naissance d'Esaü et Jacob
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Voici la lignée d''Isaac, fils d''Abraham. Abraham eut pour fils Isaac. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Isaac était âgé de 40 ans quand il prit pour femme Rebecca, qui était la fille de Bethuel, l''Araméen de Paddan-Aram, et la sœur de Laban l''Araméen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Isaac supplia l''Eternel pour sa femme, car elle était stérile, et l''Eternel l''exauça: sa femme Rebecca tomba enceinte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les enfants se heurtaient à l''intérieur d''elle et elle dit: «Si telle est la situation, pourquoi suis-je enceinte?» Elle alla consulter l''Eternel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'et l''Eternel lui dit: «Il y a deux nations dans ton ventre, et deux peuples issus de toi se sépareront. Un de ces peuples sera plus fort que l''autre, et *le plus grand sera asservi au plus petit'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le plus grand… petit: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 9.12
      metadata:
        usfm: ROM.9.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Le moment où elle devait accoucher arriva, et voici qu''il y avait des jumeaux dans son ventre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Le premier sortit roux et tout couvert de poils, comme un manteau. On l''appela Esaü. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ensuite sortit son frère, dont la main tenait le talon d'Esaü. On l'appela Jacob. Isaac était âgé de 60 ans à leur naissance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ces enfants grandirent. Esaü devint un habile chasseur, un homme de la campagne, alors que Jacob était un homme tranquille qui restait sous les tentes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Isaac aimait Esaü parce qu'il lui amenait du gibier, et Rebecca aimait Jacob.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tandis que Jacob faisait cuire un potage, Esaü revint des champs, accablé de fatigue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Esaü dit à Jacob: «Laisse-moi manger de ce roux, de ce plat roux, car je suis fatigué.» C''est pour cela qu''on a donné à Esaü le nom d''Edom'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Edom: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: fait assonance avec le mot hébreu traduit roux.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Jacob répondit: «Vends-moi aujourd''hui ton droit d''aînesse'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Droit d''aînesse: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: le fils aîné héritait du rang, de la situation et des prérogatives de son père; il devenait chef de la famille ou de la tribu; il héritait aussi une double portion des biens paternels.
    marker-yv: yv-n
  - type: text
    text: '.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Esaü répondit: «Je vais mourir. A quoi me sert ce droit d''aînesse?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Jacob dit: «Jure-le-moi d''abord.» Il le lui jura, il vendit son droit d''aînesse à Jacob. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Alors Jacob donna du pain et du potage de lentilles à Esaü. Il mangea et but, puis se leva et s'en alla. C'est ainsi qu'Esaü méprisa le droit d'aînesse.
