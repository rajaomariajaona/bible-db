document_id: 1CH.29
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Offrandes volontaires pour le temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le roi David dit à toute l''assemblée: «Mon fils Salomon, le seul que Dieu ait choisi, est jeune et faible, et la tâche est considérable, car ce palais n''est pas pour un homme, mais pour l''Eternel Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'J''ai mis toutes mes forces à préparer pour la maison de mon Dieu de l''or pour ce qui doit être en or, de l''argent pour ce qui doit être en argent, du bronze pour ce qui doit être en bronze, du fer pour ce qui doit être en fer et du bois pour ce qui doit être en bois, ainsi que des pierres d''onyx et des pierres à enchâsser, des pierres brillantes et de diverses couleurs, toutes sortes de pierres précieuses et du marbre blanc en quantité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'De plus, dans mon attachement pour la maison de mon Dieu, je donne à la maison de mon Dieu l''or et l''argent que je possède en propre, en plus de tout ce que j''ai préparé pour la maison du sanctuaire: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '90 tonnes d''or, d''or d''Ophir, et 210 tonnes d''argent épuré, pour couvrir les parois des bâtiments, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: l'or pour ce qui doit être en or et l'argent pour ce qui doit être en argent, et pour tous les travaux accomplis par l'intermédiaire des ouvriers. Qui veut encore présenter aujourd'hui, de façon volontaire, des offrandes à l'Eternel?»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les chefs de famille, les chefs des tribus d''Israël, de milliers et de centaines, ainsi que les intendants du roi firent des offrandes volontaires. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils donnèrent pour le service de la maison de Dieu 150 tonnes d''or, 10''000 pièces, 300 tonnes d''argent, 540 tonnes de bronze et 3000 tonnes de fer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ceux qui possédaient des pierres les remirent à Jehiel le Guershonite pour le trésor de la maison de l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Le peuple se réjouit de ces offrandes volontaires, car c'était avec un cœur sans réserve qu'ils les faisaient à l'Eternel; le roi David lui aussi en éprouva une grande joie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'David bénit l''Eternel en présence de toute l''assemblée. Il dit: «Béni sois-tu d''éternité en éternité, Eternel, Dieu de notre ancêtre Israël! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'A toi, Eternel, sont la grandeur, la puissance et la splendeur, l''éternité et la gloire, car tout ce qui est dans le ciel et sur la terre t''appartient. A toi, Eternel, sont le règne et l''autorité suprême! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'C''est de toi que viennent la richesse et l''honneur, c''est toi qui domines sur tout, c''est dans ta main que sont la force et la puissance, et c''est ta main qui a le pouvoir de tout agrandir et de tout fortifier. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Maintenant, notre Dieu, nous te louons et nous célébrons ton nom glorieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Qui suis-je, en effet, et qui est mon peuple, pour que nous puissions te faire ces offrandes volontaires? Oui, tout vient de toi et nous recevons de ta main ce que nous t''offrons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nous sommes devant toi des étrangers et des immigrés, comme tous nos ancêtres. Nos jours sur la terre disparaissent comme l''ombre, sans espoir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Eternel, notre Dieu, c''est de ta main que viennent toutes ces richesses que nous avons préparées pour construire une maison en ton honneur, en l''honneur de ton saint nom, c''est à toi que tout appartient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Je sais, mon Dieu, que tu es capable de mettre le cœur à l''épreuve et que tu aimes la droiture. Aussi, je t''ai fait toutes ces offrandes volontaires avec un cœur droit et je vois maintenant avec joie ton peuple ici présent agir de la même manière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Eternel, Dieu de nos ancêtres Abraham, Isaac et Israël, garde à toujours ces intentions dans le cœur de ton peuple et affermis son cœur pour qu''il reste tourné vers toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Donne à mon fils Salomon un cœur attaché sans réserve au respect de tes commandements, de tes instructions et de tes prescriptions, afin qu'il les mette tous en pratique et qu'il construise le palais pour lequel j'ai fait des préparatifs.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Accession de Salomon au trône
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'David dit à toute l''assemblée: «Bénissez l''Eternel, votre Dieu!» Et toute l''assemblée bénit l''Eternel, le Dieu de leurs ancêtres. Ils s''inclinèrent et se prosternèrent devant l''Eternel et devant le roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le lendemain, ils offrirent en sacrifice et en holocauste à l''Eternel 1000 taureaux, 1000 béliers et 1000 agneaux, avec les offrandes liquides qui les accompagnaient, et un grand nombre d''autres sacrifices pour tout Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ils mangèrent et burent avec une grande joie, ce jour-là, devant l''Eternel. Ils proclamèrent pour la seconde fois Salomon, fils de David, roi; ils le consacrèrent par onction devant l''Eternel comme chef, et Tsadok comme prêtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Salomon s''assit sur le trône de l''Eternel comme roi à la place de son père David. Il eut du succès et tout Israël lui obéit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tous les chefs et les guerriers, et même la totalité des fils du roi David, se soumirent au roi Salomon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: L'Eternel porta au plus haut point la grandeur de Salomon aux yeux de tout Israël, et il rendit son règne plus éclatant que celui de tous les rois d'Israël avant lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ainsi, David, fils d''Isaï, régna sur tout Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Son règne sur Israël dura 40 ans: il régna 7 ans à Hébron et 33 ans à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Il mourut après une heureuse vieillesse, rassasié de jours, de richesse et de gloire. Son fils Salomon devint roi à sa place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Les actes du roi David, des premiers aux derniers, sont décrits dans les annales de Samuel, le voyant, dans celles du prophète Nathan et dans celles du prophète Gad, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: avec tout son règne et tous ses exploits, ainsi que les événements auxquels il a été confronté, de même qu'Israël et tous les royaumes des autres pays.
