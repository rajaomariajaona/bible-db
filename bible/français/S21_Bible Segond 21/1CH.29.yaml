document_id: 1CH.29,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Offrandes volontaires pour le temple
  - type: text
    content: 'Le roi David dit à toute l''assemblée: «Mon fils Salomon, le seul que Dieu ait choisi, est jeune et faible, et la tâche est considérable, car ce palais n''est pas pour un homme, mais pour l''Eternel Dieu. '
  '10':
  - type: text
    content: 'David bénit l''Eternel en présence de toute l''assemblée. Il dit: «Béni sois-tu d''éternité en éternité, Eternel, Dieu de notre ancêtre Israël! '
  '11':
  - type: text
    content: 'A toi, Eternel, sont la grandeur, la puissance et la splendeur, l''éternité et la gloire, car tout ce qui est dans le ciel et sur la terre t''appartient. A toi, Eternel, sont le règne et l''autorité suprême! '
  '12':
  - type: text
    content: 'C''est de toi que viennent la richesse et l''honneur, c''est toi qui domines sur tout, c''est dans ta main que sont la force et la puissance, et c''est ta main qui a le pouvoir de tout agrandir et de tout fortifier. '
  '13':
  - type: text
    content: 'Maintenant, notre Dieu, nous te louons et nous célébrons ton nom glorieux. '
  '14':
  - type: text
    content: 'Qui suis-je, en effet, et qui est mon peuple, pour que nous puissions te faire ces offrandes volontaires? Oui, tout vient de toi et nous recevons de ta main ce que nous t''offrons. '
  '15':
  - type: text
    content: 'Nous sommes devant toi des étrangers et des immigrés, comme tous nos ancêtres. Nos jours sur la terre disparaissent comme l''ombre, sans espoir. '
  '16':
  - type: text
    content: 'Eternel, notre Dieu, c''est de ta main que viennent toutes ces richesses que nous avons préparées pour construire une maison en ton honneur, en l''honneur de ton saint nom, c''est à toi que tout appartient. '
  '17':
  - type: text
    content: 'Je sais, mon Dieu, que tu es capable de mettre le cœur à l''épreuve et que tu aimes la droiture. Aussi, je t''ai fait toutes ces offrandes volontaires avec un cœur droit et je vois maintenant avec joie ton peuple ici présent agir de la même manière. '
  '18':
  - type: text
    content: 'Eternel, Dieu de nos ancêtres Abraham, Isaac et Israël, garde à toujours ces intentions dans le cœur de ton peuple et affermis son cœur pour qu''il reste tourné vers toi. '
  '19':
  - type: text
    content: Donne à mon fils Salomon un cœur attaché sans réserve au respect de tes commandements, de tes instructions et de tes prescriptions, afin qu'il les mette tous en pratique et qu'il construise le palais pour lequel j'ai fait des préparatifs.»
  - type: heading
    content: Accession de Salomon au trône
  '2':
  - type: text
    content: 'J''ai mis toutes mes forces à préparer pour la maison de mon Dieu de l''or pour ce qui doit être en or, de l''argent pour ce qui doit être en argent, du bronze pour ce qui doit être en bronze, du fer pour ce qui doit être en fer et du bois pour ce qui doit être en bois, ainsi que des pierres d''onyx et des pierres à enchâsser, des pierres brillantes et de diverses couleurs, toutes sortes de pierres précieuses et du marbre blanc en quantité. '
  '20':
  - type: text
    content: 'David dit à toute l''assemblée: «Bénissez l''Eternel, votre Dieu!» Et toute l''assemblée bénit l''Eternel, le Dieu de leurs ancêtres. Ils s''inclinèrent et se prosternèrent devant l''Eternel et devant le roi. '
  '21':
  - type: text
    content: 'Le lendemain, ils offrirent en sacrifice et en holocauste à l''Eternel 1000 taureaux, 1000 béliers et 1000 agneaux, avec les offrandes liquides qui les accompagnaient, et un grand nombre d''autres sacrifices pour tout Israël. '
  '22':
  - type: text
    content: 'Ils mangèrent et burent avec une grande joie, ce jour-là, devant l''Eternel. Ils proclamèrent pour la seconde fois Salomon, fils de David, roi; ils le consacrèrent par onction devant l''Eternel comme chef, et Tsadok comme prêtre. '
  '23':
  - type: text
    content: 'Salomon s''assit sur le trône de l''Eternel comme roi à la place de son père David. Il eut du succès et tout Israël lui obéit. '
  '24':
  - type: text
    content: 'Tous les chefs et les guerriers, et même la totalité des fils du roi David, se soumirent au roi Salomon. '
  '25':
  - type: text
    content: L'Eternel porta au plus haut point la grandeur de Salomon aux yeux de tout Israël, et il rendit son règne plus éclatant que celui de tous les rois d'Israël avant lui.
  '26':
  - type: text
    content: 'Ainsi, David, fils d''Isaï, régna sur tout Israël. '
  '27':
  - type: text
    content: 'Son règne sur Israël dura 40 ans: il régna 7 ans à Hébron et 33 ans à Jérusalem. '
  '28':
  - type: text
    content: 'Il mourut après une heureuse vieillesse, rassasié de jours, de richesse et de gloire. Son fils Salomon devint roi à sa place. '
  '29':
  - type: text
    content: 'Les actes du roi David, des premiers aux derniers, sont décrits dans les annales de Samuel, le voyant, dans celles du prophète Nathan et dans celles du prophète Gad, '
  '3':
  - type: text
    content: 'De plus, dans mon attachement pour la maison de mon Dieu, je donne à la maison de mon Dieu l''or et l''argent que je possède en propre, en plus de tout ce que j''ai préparé pour la maison du sanctuaire: '
  '30':
  - type: text
    content: avec tout son règne et tous ses exploits, ainsi que les événements auxquels il a été confronté, de même qu'Israël et tous les royaumes des autres pays.
  '4':
  - type: text
    content: '90 tonnes d''or, d''or d''Ophir, et 210 tonnes d''argent épuré, pour couvrir les parois des bâtiments, '
  '5':
  - type: text
    content: l'or pour ce qui doit être en or et l'argent pour ce qui doit être en argent, et pour tous les travaux accomplis par l'intermédiaire des ouvriers. Qui veut encore présenter aujourd'hui, de façon volontaire, des offrandes à l'Eternel?»
  '6':
  - type: text
    content: 'Les chefs de famille, les chefs des tribus d''Israël, de milliers et de centaines, ainsi que les intendants du roi firent des offrandes volontaires. '
  '7':
  - type: text
    content: 'Ils donnèrent pour le service de la maison de Dieu 150 tonnes d''or, 10''000 pièces, 300 tonnes d''argent, 540 tonnes de bronze et 3000 tonnes de fer. '
  '8':
  - type: text
    content: 'Ceux qui possédaient des pierres les remirent à Jehiel le Guershonite pour le trésor de la maison de l''Eternel. '
  '9':
  - type: text
    content: Le peuple se réjouit de ces offrandes volontaires, car c'était avec un cœur sans réserve qu'ils les faisaient à l'Eternel; le roi David lui aussi en éprouva une grande joie.
