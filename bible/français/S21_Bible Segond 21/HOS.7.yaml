document_id: HOS.7,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Reproches contre les alliances politiques
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Lorsque je voulais guérir Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la faute d'Ephraïm et la méchanceté de Samarie se sont révélées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils ont agi frauduleusement;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un voleur est arrivé, une bande sévit dehors.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'L''orgueil d''Israël témoigne contre lui:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne reviennent pas à l'Eternel, leur Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils ne le recherchent pas, malgré tout cela.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ephraïm est comme une colombe stupide, sans intelligence:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils implorent l'Egypte, ils vont en Assyrie.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: S'ils partent, j'étendrai sur eux mon filet,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je les ferai tomber comme les oiseaux du ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je les corrigerai, comme ils en ont été avertis dans leur assemblée.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Malheur à eux parce qu'ils me fuient!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ruine sur eux parce qu'ils me sont infidèles!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je voudrais les sauver,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ils disent des paroles mensongères contre moi.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ils ne crient pas vers moi dans leur cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ils se lamentent sur leur lit;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se rassemblent pour avoir du blé et du vin nouveau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils s'éloignent de moi.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Je les ai corrigés, j'ai fortifié leurs bras,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils méditent le mal contre moi.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ce n'est pas au Très-Haut qu'ils retournent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont pareils à un arc trompeur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs chefs tomberont par l'épée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de l'insolence de leur propos.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est ce qui fera d'eux un objet de moquerie en Egypte.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ils ne se disent pas dans leur cœur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que je me souviens de toute leur méchanceté.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maintenant leurs agissements les entourent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont devant moi.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ils réjouissent le roi par leur méchanceté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les chefs par leurs mensonges.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ils sont tous adultères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'semblables à un four chauffé par le boulanger:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il cesse d'attiser le feu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: depuis qu'il a pétri la pâte jusqu'à ce qu'elle soit levée.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Le jour de notre roi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les chefs se rendent malades par les excès du vin;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le roi tend la main aux moqueurs.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Quand ils se mettent à comploter, leur cœur est pareil à un four:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toute la nuit leur boulanger a dormi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le matin le four brûle comme un feu violent.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ils sont tous échauffés comme un four
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils dévorent leurs juges;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous leurs rois tombent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aucun d'eux ne fait appel à moi.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ephraïm se mêle avec les peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraïm est un gâteau qui n'a pas été retourné.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Des étrangers dévorent sa force,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il ne s'en doute pas;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la vieillesse s'empare de lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il ne s'en doute pas.
