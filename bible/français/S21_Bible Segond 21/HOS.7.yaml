document_id: HOS.7,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Reproches contre les alliances politiques
  - type: text
    content: Lorsque je voulais guérir Israël,
  - type: text
    content: la faute d'Ephraïm et la méchanceté de Samarie se sont révélées,
  - type: text
    content: car ils ont agi frauduleusement;
  - type: text
    content: un voleur est arrivé, une bande sévit dehors.
  '10':
  - type: text
    content: 'L''orgueil d''Israël témoigne contre lui:'
  - type: text
    content: ils ne reviennent pas à l'Eternel, leur Dieu,
  - type: text
    content: et ils ne le recherchent pas, malgré tout cela.
  '11':
  - type: text
    content: 'Ephraïm est comme une colombe stupide, sans intelligence:'
  - type: text
    content: ils implorent l'Egypte, ils vont en Assyrie.
  '12':
  - type: text
    content: S'ils partent, j'étendrai sur eux mon filet,
  - type: text
    content: je les ferai tomber comme les oiseaux du ciel,
  - type: text
    content: je les corrigerai, comme ils en ont été avertis dans leur assemblée.
  '13':
  - type: text
    content: Malheur à eux parce qu'ils me fuient!
  - type: text
    content: Ruine sur eux parce qu'ils me sont infidèles!
  - type: text
    content: Je voudrais les sauver,
  - type: text
    content: mais ils disent des paroles mensongères contre moi.
  '14':
  - type: text
    content: Ils ne crient pas vers moi dans leur cœur,
  - type: text
    content: mais ils se lamentent sur leur lit;
  - type: text
    content: ils se rassemblent pour avoir du blé et du vin nouveau,
  - type: text
    content: et ils s'éloignent de moi.
  '15':
  - type: text
    content: Je les ai corrigés, j'ai fortifié leurs bras,
  - type: text
    content: et ils méditent le mal contre moi.
  '16':
  - type: text
    content: Ce n'est pas au Très-Haut qu'ils retournent;
  - type: text
    content: ils sont pareils à un arc trompeur.
  - type: text
    content: Leurs chefs tomberont par l'épée
  - type: text
    content: à cause de l'insolence de leur propos.
  - type: text
    content: C'est ce qui fera d'eux un objet de moquerie en Egypte.
  '2':
  - type: text
    content: Ils ne se disent pas dans leur cœur
  - type: text
    content: que je me souviens de toute leur méchanceté.
  - type: text
    content: Maintenant leurs agissements les entourent,
  - type: text
    content: ils sont devant moi.
  '3':
  - type: text
    content: Ils réjouissent le roi par leur méchanceté,
  - type: text
    content: et les chefs par leurs mensonges.
  '4':
  - type: text
    content: Ils sont tous adultères,
  - type: text
    content: 'semblables à un four chauffé par le boulanger:'
  - type: text
    content: il cesse d'attiser le feu
  - type: text
    content: depuis qu'il a pétri la pâte jusqu'à ce qu'elle soit levée.
  '5':
  - type: text
    content: Le jour de notre roi,
  - type: text
    content: les chefs se rendent malades par les excès du vin;
  - type: text
    content: le roi tend la main aux moqueurs.
  '6':
  - type: text
    content: 'Quand ils se mettent à comploter, leur cœur est pareil à un four:'
  - type: text
    content: toute la nuit leur boulanger a dormi,
  - type: text
    content: et le matin le four brûle comme un feu violent.
  '7':
  - type: text
    content: Ils sont tous échauffés comme un four
  - type: text
    content: et ils dévorent leurs juges;
  - type: text
    content: tous leurs rois tombent.
  - type: text
    content: Aucun d'eux ne fait appel à moi.
  '8':
  - type: text
    content: Ephraïm se mêle avec les peuples,
  - type: text
    content: Ephraïm est un gâteau qui n'a pas été retourné.
  '9':
  - type: text
    content: Des étrangers dévorent sa force,
  - type: text
    content: et il ne s'en doute pas;
  - type: text
    content: la vieillesse s'empare de lui,
  - type: text
    content: et il ne s'en doute pas.
