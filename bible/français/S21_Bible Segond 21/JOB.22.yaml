document_id: JOB.22,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Intervention n° 3 d'Eliphaz
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eliphaz de Théman prit la parole et dit:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà pourquoi tu es entouré de pièges
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la terreur s'est tout à coup emparée de toi.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Ne vois-tu donc pas ces ténèbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce débordement d'eau qui te recouvre?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu n'est-il pas aussi élevé que le ciel?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Regarde les plus éloignées des étoiles: comme elles sont hautes!'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et tu dis: ‘Qu''est-ce que Dieu sait?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Peut-il juger à travers l'obscurité?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les nuages l'enveloppent et il ne voit rien
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand il parcourt la voûte céleste.’
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Voudrais-tu prendre l'ancienne route,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celle qu'ont suivie les hommes adonnés au mal?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont été emportés plus tôt que la normale,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un fleuve a balayé leurs fondations.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils disaient à Dieu: ‘Eloigne-toi de nous!’'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, que pourrait faire pour eux le Tout-Puissant?
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourtant, lui, il avait rempli de biens leurs maisons.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Combien les projets des méchants sont loin de moi!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les justes le verront et se réjouiront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et l''innocent se moquera d''eux:'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Un homme peut-il être utile à Dieu?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Non, le sage n'est utile qu'à lui-même.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Voilà nos adversaires qui disparaissent!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà leurs richesses dévorées par le feu!’
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Réconcilie-toi avec Dieu, sois en paix avec lui!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est ainsi que tu connaîtras le bonheur.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Accepte donc l'enseignement qui vient de sa bouche
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mets ses paroles dans ton cœur.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu seras restauré si tu reviens au Tout-Puissant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si tu éloignes l'injustice de ta tente.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Jette l'or dans la poussière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'or d'Ophir parmi les cailloux des torrents,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le Tout-Puissant sera ton or,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ta réserve d'argent.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors tu feras du Tout-Puissant tes délices,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu lèveras ton visage vers Dieu.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu le prieras et il t'exaucera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu accompliras tes vœux.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu prendras une décision et tu la verras se concrétiser.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La lumière brillera sur tes chemins.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Quand viendra l''abaissement, tu diras: ‘Debout!’'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu sauvera celui qui est humble.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cela fait-il particulièrement plaisir au Tout-Puissant que tu sois juste?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu es intègre dans ta conduite, qu'y gagne-t-il?
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il délivrera même le coupable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui devra sa délivrance à la pureté de tes mains.»
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-ce à cause de ta piété qu'il te corrige,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'il entre en jugement avec toi?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N'as-tu pas fait beaucoup de mal?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes fautes ne sont-elles pas sans limite?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »En effet, sans raison tu réclamais des gages à tes frères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu privais de leurs habits ceux qui étaient presque nus.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu ne donnais pas d'eau à l'homme épuisé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu refusais du pain à l'homme affamé.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terre appartenait au plus fort
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c'était le favoritisme qui permettait de s'y installer.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu renvoyais les veuves les mains vides,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les bras des orphelins étaient brisés.
