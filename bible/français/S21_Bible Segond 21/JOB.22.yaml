document_id: JOB.22
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Intervention n° 3 d'Eliphaz
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Eliphaz de Théman prit la parole et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Un homme peut-il être utile à Dieu?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Non, le sage n'est utile qu'à lui-même.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Cela fait-il particulièrement plaisir au Tout-Puissant que tu sois juste?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si tu es intègre dans ta conduite, qu'y gagne-t-il?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Est-ce à cause de ta piété qu'il te corrige,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'il entre en jugement avec toi?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: N'as-tu pas fait beaucoup de mal?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes fautes ne sont-elles pas sans limite?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: »En effet, sans raison tu réclamais des gages à tes frères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu privais de leurs habits ceux qui étaient presque nus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tu ne donnais pas d'eau à l'homme épuisé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu refusais du pain à l'homme affamé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: La terre appartenait au plus fort
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c'était le favoritisme qui permettait de s'y installer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tu renvoyais les veuves les mains vides,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les bras des orphelins étaient brisés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Voilà pourquoi tu es entouré de pièges
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la terreur s'est tout à coup emparée de toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: »Ne vois-tu donc pas ces ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce débordement d'eau qui te recouvre?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dieu n'est-il pas aussi élevé que le ciel?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Regarde les plus éloignées des étoiles: comme elles sont hautes!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et tu dis: ‘Qu''est-ce que Dieu sait?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Peut-il juger à travers l'obscurité?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les nuages l'enveloppent et il ne voit rien
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand il parcourt la voûte céleste.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: »Voudrais-tu prendre l'ancienne route,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celle qu'ont suivie les hommes adonnés au mal?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ils ont été emportés plus tôt que la normale,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un fleuve a balayé leurs fondations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ils disaient à Dieu: ‘Eloigne-toi de nous!’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, que pourrait faire pour eux le Tout-Puissant?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Pourtant, lui, il avait rempli de biens leurs maisons.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Combien les projets des méchants sont loin de moi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Les justes le verront et se réjouiront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et l''innocent se moquera d''eux:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ‘Voilà nos adversaires qui disparaissent!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voilà leurs richesses dévorées par le feu!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: »Réconcilie-toi avec Dieu, sois en paix avec lui!
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est ainsi que tu connaîtras le bonheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Accepte donc l'enseignement qui vient de sa bouche
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mets ses paroles dans ton cœur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tu seras restauré si tu reviens au Tout-Puissant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si tu éloignes l'injustice de ta tente.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: »Jette l'or dans la poussière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'or d'Ophir parmi les cailloux des torrents,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: et le Tout-Puissant sera ton or,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta réserve d'argent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Alors tu feras du Tout-Puissant tes délices,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu lèveras ton visage vers Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Tu le prieras et il t'exaucera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu accompliras tes vœux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Tu prendras une décision et tu la verras se concrétiser.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La lumière brillera sur tes chemins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Quand viendra l''abaissement, tu diras: ‘Debout!’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu sauvera celui qui est humble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Il délivrera même le coupable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui devra sa délivrance à la pureté de tes mains.»
