document_id: JOB.22,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Intervention n° 3 d'Eliphaz
  - type: text
    content: 'Eliphaz de Théman prit la parole et dit:'
  '10':
  - type: text
    content: Voilà pourquoi tu es entouré de pièges
  - type: text
    content: et la terreur s'est tout à coup emparée de toi.
  '11':
  - type: text
    content: »Ne vois-tu donc pas ces ténèbres,
  - type: text
    content: ce débordement d'eau qui te recouvre?
  '12':
  - type: text
    content: Dieu n'est-il pas aussi élevé que le ciel?
  - type: text
    content: 'Regarde les plus éloignées des étoiles: comme elles sont hautes!'
  '13':
  - type: text
    content: 'Et tu dis: ‘Qu''est-ce que Dieu sait?'
  - type: text
    content: Peut-il juger à travers l'obscurité?
  '14':
  - type: text
    content: Les nuages l'enveloppent et il ne voit rien
  - type: text
    content: quand il parcourt la voûte céleste.’
  '15':
  - type: text
    content: »Voudrais-tu prendre l'ancienne route,
  - type: text
    content: celle qu'ont suivie les hommes adonnés au mal?
  '16':
  - type: text
    content: Ils ont été emportés plus tôt que la normale,
  - type: text
    content: un fleuve a balayé leurs fondations.
  '17':
  - type: text
    content: 'Ils disaient à Dieu: ‘Eloigne-toi de nous!’'
  - type: text
    content: En effet, que pourrait faire pour eux le Tout-Puissant?
  '18':
  - type: text
    content: Pourtant, lui, il avait rempli de biens leurs maisons.
  - type: text
    content: Combien les projets des méchants sont loin de moi!
  '19':
  - type: text
    content: Les justes le verront et se réjouiront,
  - type: text
    content: 'et l''innocent se moquera d''eux:'
  '2':
  - type: text
    content: «Un homme peut-il être utile à Dieu?
  - type: text
    content: Non, le sage n'est utile qu'à lui-même.
  '20':
  - type: text
    content: ‘Voilà nos adversaires qui disparaissent!
  - type: text
    content: Voilà leurs richesses dévorées par le feu!’
  '21':
  - type: text
    content: »Réconcilie-toi avec Dieu, sois en paix avec lui!
  - type: text
    content: C'est ainsi que tu connaîtras le bonheur.
  '22':
  - type: text
    content: Accepte donc l'enseignement qui vient de sa bouche
  - type: text
    content: et mets ses paroles dans ton cœur.
  '23':
  - type: text
    content: Tu seras restauré si tu reviens au Tout-Puissant,
  - type: text
    content: si tu éloignes l'injustice de ta tente.
  '24':
  - type: text
    content: »Jette l'or dans la poussière,
  - type: text
    content: l'or d'Ophir parmi les cailloux des torrents,
  '25':
  - type: text
    content: et le Tout-Puissant sera ton or,
  - type: text
    content: ta réserve d'argent.
  '26':
  - type: text
    content: Alors tu feras du Tout-Puissant tes délices,
  - type: text
    content: tu lèveras ton visage vers Dieu.
  '27':
  - type: text
    content: Tu le prieras et il t'exaucera,
  - type: text
    content: et tu accompliras tes vœux.
  '28':
  - type: text
    content: Tu prendras une décision et tu la verras se concrétiser.
  - type: text
    content: La lumière brillera sur tes chemins.
  '29':
  - type: text
    content: 'Quand viendra l''abaissement, tu diras: ‘Debout!’'
  - type: text
    content: Dieu sauvera celui qui est humble.
  '3':
  - type: text
    content: Cela fait-il particulièrement plaisir au Tout-Puissant que tu sois juste?
  - type: text
    content: Si tu es intègre dans ta conduite, qu'y gagne-t-il?
  '30':
  - type: text
    content: Il délivrera même le coupable,
  - type: text
    content: qui devra sa délivrance à la pureté de tes mains.»
  '4':
  - type: text
    content: Est-ce à cause de ta piété qu'il te corrige,
  - type: text
    content: qu'il entre en jugement avec toi?
  '5':
  - type: text
    content: N'as-tu pas fait beaucoup de mal?
  - type: text
    content: Tes fautes ne sont-elles pas sans limite?
  '6':
  - type: text
    content: »En effet, sans raison tu réclamais des gages à tes frères,
  - type: text
    content: tu privais de leurs habits ceux qui étaient presque nus.
  '7':
  - type: text
    content: Tu ne donnais pas d'eau à l'homme épuisé,
  - type: text
    content: tu refusais du pain à l'homme affamé.
  '8':
  - type: text
    content: La terre appartenait au plus fort
  - type: text
    content: et c'était le favoritisme qui permettait de s'y installer.
  '9':
  - type: text
    content: Tu renvoyais les veuves les mains vides,
  - type: text
    content: les bras des orphelins étaient brisés.
