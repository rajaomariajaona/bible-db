document_id: RUT.4,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Boaz monta à la porte de la ville et s''y arrêta. Or, celui qui avait droit de rachat et dont Boaz avait parlé vint à passer. Boaz lui dit: «Approche-toi, assieds-toi ici, toi un tel.» Il s''approcha et s''assit. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et que j''ai également acquis pour femme Ruth la Moabite, femme de Machlon, pour maintenir le nom du défunt sur son héritage afin qu''il ne disparaisse pas parmi ses frères ni à la porte de sa ville. Vous en êtes témoins aujourd''hui!» '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout le peuple qui était à la porte et les anciens dirent: «Nous en sommes témoins! Que l''Eternel rende la femme qui entre dans ta famille semblable à Rachel et à Léa'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Rachel… Léa: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: les deux épouses de Jacob dont les 12 fils ont donné naissance aux tribus d'Israël.
      marker-yv: yv-n
    - type: text
      text: ', qui ont toutes les deux donné naissance à la communauté d''Israël! Montre ta force dans Ephrata et fais-toi un nom dans Bethléhem! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Puisse la descendance que l'Eternel te donnera par cette jeune femme faire ressembler ta famille à celle de Pérets, que Tamar a donné à Juda!»
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Boaz épousa Ruth; elle devint sa femme et il s''unit à elle. L''Eternel permit à Ruth de devenir enceinte et elle mit au monde un fils. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les femmes dirent à Naomi: «Béni soit l''Eternel qui ne t''a pas laissée manquer aujourd''hui d''une personne ayant le droit de rachat! Que son nom soit célébré en Israël! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cet enfant sera ton réconfort et le soutien de ta vieillesse, car ta belle-fille qui t''aime l''a mis au monde, elle qui vaut mieux pour toi que sept fils.» '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Naomi prit l''enfant, le serra sur sa poitrine et l''éleva. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les voisines lui donnèrent un nom en disant: «Un fils est né à Naomi», et elles l''appelèrent Obed. Ce fut le père d''Isaï, père de David'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'David: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: grand roi d'Israël.
      marker-yv: yv-n
    - type: text
      text: .
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici la lignée de Pérets. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pérets eut pour fils Hetsron, Hetsron eut Ram, Ram eut Amminadab, '
  '2':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Boaz prit alors dix hommes parmi les anciens de la ville et dit: «Asseyez-vous ici.» Ils s''assirent. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Amminadab eut pour fils Nachshon, Nachshon eut Salmon, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salmon eut pour fils Boaz, Boaz eut Obed, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Obed eut pour fils Isaï et Isaï eut David.
  '3':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Puis il dit à celui qui avait le droit de rachat: «Naomi est revenue du pays de Moab, et elle vend la parcelle de terre qui appartenait à notre frère Elimélec. '
  '4':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'J''ai cru devoir t''en informer et te dire: ‘Fais-en l''acquisition devant les habitants de la ville et les anciens de mon peuple.’ Si tu veux la racheter, rachète-la, mais si tu ne veux pas, déclare-le-moi afin que je le sache. En effet, il n''y a personne avant toi qui ait le droit de rachat et je l''ai après toi.» Il répondit: «Je la rachèterai.» '
  '5':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Boaz dit: «Le jour où tu achèteras le champ à Naomi, tu l''acquerras aussi de Ruth la Moabite, la femme du défunt, et tu devras maintenir le nom du défunt sur son héritage'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: D'après la loi, une veuve restée sans enfants épousait le frère de son mari défunt, afin que le premier enfant mâle né de cette union porte le nom du défunt et perpétue sa famille.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '6':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Celui qui avait le droit de rachat répondit: «Je ne peux pas exercer ce droit de rachat pour mon compte, sinon je détruirai mon héritage. Prends pour toi mon droit de rachat, car je ne peux pas l''exercer.»'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Autrefois en Israël, pour valider toute affaire relative à un rachat ou à un échange, on retirait sa sandale et on la donnait à l''autre: c''était ce geste qui servait d''attestation en Israël. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui avait le droit de rachat dit donc à Boaz: «Fais-en l''acquisition pour ton compte» et retira sa sandale.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Boaz dit aux anciens et à tout le peuple: «Vous êtes témoins aujourd''hui que j''ai acquis de la main de Naomi tout ce qui appartenait à Elimélec, à Kiljon et à Machlon, '
