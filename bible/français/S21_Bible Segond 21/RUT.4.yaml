document_id: RUT.4,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Boaz monta à la porte de la ville et s''y arrêta. Or, celui qui avait droit de rachat et dont Boaz avait parlé vint à passer. Boaz lui dit: «Approche-toi, assieds-toi ici, toi un tel.» Il s''approcha et s''assit. '
  '10':
  - type: text
    content: 'et que j''ai également acquis pour femme Ruth la Moabite, femme de Machlon, pour maintenir le nom du défunt sur son héritage afin qu''il ne disparaisse pas parmi ses frères ni à la porte de sa ville. Vous en êtes témoins aujourd''hui!» '
  '11':
  - type: text
    content: 'Tout le peuple qui était à la porte et les anciens dirent: «Nous en sommes témoins! Que l''Eternel rende la femme qui entre dans ta famille semblable à Rachel et à Léa'
  - type: note
    content: 'Rachel… Léa: les deux épouses de Jacob dont les 12 fils ont donné naissance aux tribus d''Israël.'
  - type: text
    content: ', qui ont toutes les deux donné naissance à la communauté d''Israël! Montre ta force dans Ephrata et fais-toi un nom dans Bethléhem! '
  '12':
  - type: text
    content: Puisse la descendance que l'Eternel te donnera par cette jeune femme faire ressembler ta famille à celle de Pérets, que Tamar a donné à Juda!»
  '13':
  - type: text
    content: 'Boaz épousa Ruth; elle devint sa femme et il s''unit à elle. L''Eternel permit à Ruth de devenir enceinte et elle mit au monde un fils. '
  '14':
  - type: text
    content: 'Les femmes dirent à Naomi: «Béni soit l''Eternel qui ne t''a pas laissée manquer aujourd''hui d''une personne ayant le droit de rachat! Que son nom soit célébré en Israël! '
  '15':
  - type: text
    content: 'Cet enfant sera ton réconfort et le soutien de ta vieillesse, car ta belle-fille qui t''aime l''a mis au monde, elle qui vaut mieux pour toi que sept fils.» '
  '16':
  - type: text
    content: 'Naomi prit l''enfant, le serra sur sa poitrine et l''éleva. '
  '17':
  - type: text
    content: 'Les voisines lui donnèrent un nom en disant: «Un fils est né à Naomi», et elles l''appelèrent Obed. Ce fut le père d''Isaï, père de David'
  - type: note
    content: 'David: grand roi d''Israël.'
  - type: text
    content: .
  '18':
  - type: text
    content: 'Voici la lignée de Pérets. '
  '19':
  - type: text
    content: 'Pérets eut pour fils Hetsron, Hetsron eut Ram, Ram eut Amminadab, '
  '2':
  - type: text
    content: 'Boaz prit alors dix hommes parmi les anciens de la ville et dit: «Asseyez-vous ici.» Ils s''assirent. '
  '20':
  - type: text
    content: 'Amminadab eut pour fils Nachshon, Nachshon eut Salmon, '
  '21':
  - type: text
    content: 'Salmon eut pour fils Boaz, Boaz eut Obed, '
  '22':
  - type: text
    content: Obed eut pour fils Isaï et Isaï eut David.
  '3':
  - type: text
    content: 'Puis il dit à celui qui avait le droit de rachat: «Naomi est revenue du pays de Moab, et elle vend la parcelle de terre qui appartenait à notre frère Elimélec. '
  '4':
  - type: text
    content: 'J''ai cru devoir t''en informer et te dire: ‘Fais-en l''acquisition devant les habitants de la ville et les anciens de mon peuple.’ Si tu veux la racheter, rachète-la, mais si tu ne veux pas, déclare-le-moi afin que je le sache. En effet, il n''y a personne avant toi qui ait le droit de rachat et je l''ai après toi.» Il répondit: «Je la rachèterai.» '
  '5':
  - type: text
    content: 'Boaz dit: «Le jour où tu achèteras le champ à Naomi, tu l''acquerras aussi de Ruth la Moabite, la femme du défunt, et tu devras maintenir le nom du défunt sur son héritage'
  - type: note
    content: D'après la loi, une veuve restée sans enfants épousait le frère de son mari défunt, afin que le premier enfant mâle né de cette union porte le nom du défunt et perpétue sa famille.
  - type: text
    content: '.» '
  '6':
  - type: text
    content: 'Celui qui avait le droit de rachat répondit: «Je ne peux pas exercer ce droit de rachat pour mon compte, sinon je détruirai mon héritage. Prends pour toi mon droit de rachat, car je ne peux pas l''exercer.»'
  '7':
  - type: text
    content: 'Autrefois en Israël, pour valider toute affaire relative à un rachat ou à un échange, on retirait sa sandale et on la donnait à l''autre: c''était ce geste qui servait d''attestation en Israël. '
  '8':
  - type: text
    content: 'Celui qui avait le droit de rachat dit donc à Boaz: «Fais-en l''acquisition pour ton compte» et retira sa sandale.'
  '9':
  - type: text
    content: 'Alors Boaz dit aux anciens et à tout le peuple: «Vous êtes témoins aujourd''hui que j''ai acquis de la main de Naomi tout ce qui appartenait à Elimélec, à Kiljon et à Machlon, '
