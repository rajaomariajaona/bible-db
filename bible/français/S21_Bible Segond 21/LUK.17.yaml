document_id: LUK.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le pardon et la foi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus dit à ses disciples: «Il est inévitable qu''il y ait des pièges, mais malheur à celui qui en est responsable! '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il vaudrait mieux pour lui qu''on attache à son cou une meule de moulin et qu''on le jette à la mer, plutôt qu''il ne fasse trébucher un seul de ces petits. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Faites bien attention à vous-mêmes. Si ton frère a péché [contre toi], reprends-le et, s''il reconnaît ses torts, pardonne-lui. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'S''il a péché contre toi 7 fois dans une journée et que 7 fois [dans la journée] il revienne [vers toi] et dise: ‘J''ai eu tort’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'J''ai eu tort: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ou je me repens ou je vais changer d'attitude (même verbe grec qu'au verset 3).
    marker-yv: yv-n
  - type: text
    text: ', tu lui pardonneras.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les apôtres dirent au Seigneur: «Augmente notre foi.» '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le Seigneur dit: «Si vous aviez de la foi comme une graine de moutarde, vous diriez à ce mûrier: ‘Déracine-toi et va te planter dans la mer’, et il vous obéirait.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '»Si l''un de vous a un esclave qui laboure ou garde les troupeaux, lui dira-t-il, à son retour des champs: ‘Viens tout de suite te mettre à table’? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ne lui dira-t-il pas au contraire: ‘Prépare-moi à souper, ajuste ta tenue pour me servir jusqu''à ce que j''aie mangé et bu; après cela, toi, tu mangeras et tu boiras’? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'A-t-il de la reconnaissance envers cet esclave parce qu''il a fait ce qui lui était ordonné? [Je ne pense pas.] '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Vous de même, quand vous avez fait tout ce qui vous a été ordonné, dites: ‘Nous sommes des serviteurs inutiles, nous avons fait ce que nous devions faire.’»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guérison de dix lépreux
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors qu''il se rendait à Jérusalem, Jésus passa entre la Samarie et la Galilée. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Comme il entrait dans un village, dix lépreux vinrent à sa rencontre. Ils se tinrent à distance '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'et se mirent à lui dire: «Jésus, maître, aie pitié de nous!» '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Lorsqu''il les vit, Jésus leur dit: «Allez vous montrer aux prêtres.» Pendant qu''ils y allaient, ils furent guéris. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L''un d''eux, se voyant guéri, revint sur ses pas en rendant gloire à Dieu à haute voix. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il tomba le visage contre terre aux pieds de Jésus et le remercia. C''était un Samaritain. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jésus prit la parole et dit: «Les dix n''ont-ils pas été guéris? Et les neuf autres, où sont-ils? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ne s''est-il trouvé que cet étranger pour revenir et rendre gloire à Dieu?» '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Puis il lui dit: «Lève-toi, vas-y, ta foi t''a sauvé.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La venue du royaume de Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Les pharisiens demandèrent à Jésus quand viendrait le royaume de Dieu. Il leur répondit: «Le royaume de Dieu ne vient pas en se faisant remarquer. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'On ne dira pas: ‘Il est ici’, ou: ‘Il est là.’ En effet, le royaume de Dieu est au milieu de vous.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Puis il dit aux disciples: «Un temps viendra où vous désirerez voir même un seul des jours du Fils de l''homme, et vous ne le verrez pas. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'On vous dira: ‘Il est ici’, ‘Il est là.’ N''y allez pas, n''y courez pas. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'En effet, tout comme l''éclair resplendit et brille d''une extrémité du ciel à l''autre, ainsi sera le Fils de l''homme dans son jour. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Mais il faut auparavant qu'il souffre beaucoup et qu'il soit rejeté par cette génération.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '»Ce qui est arrivé à l''époque de Noé arrivera de même aux jours du Fils de l''homme. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Les hommes mangeaient, buvaient, se mariaient et mariaient leurs enfants, jusqu''au jour où Noé est entré dans l''arche, puis le déluge est venu et les a tous fait mourir. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ce sera comme à l''époque de Lot: les hommes mangeaient, buvaient, achetaient, vendaient, plantaient, construisaient, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'mais le jour où Lot est sorti de Sodome, une pluie de feu et de soufre est tombée du ciel et les a tous fait mourir. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Il en ira de même le jour où le Fils de l'homme apparaîtra.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '»Ce jour-là, que celui qui sera sur le toit et qui aura ses affaires dans la maison ne descende pas pour les prendre et que celui qui sera dans les champs ne retourne pas non plus en arrière. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Souvenez-vous de la femme de Lot
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.32 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La femme de Lot: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: transformée en statue de sel pour avoir regardé en arrière lors du départ de Sodome (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Genèse 19.26
      metadata:
        usfm: GEN.19.26
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Celui qui cherchera à sauver sa vie la perdra, et celui qui la perdra la conservera. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Je vous le dis, cette nuit-là, deux personnes seront dans un même lit: l''une sera prise et l''autre laissée; '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'deux femmes moudront ensemble: l''une sera prise et l''autre laissée; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: '[deux hommes seront dans un champ: l''un sera pris et l''autre laissé.]»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Les disciples lui dirent: «Où cela se passera-t-il, Seigneur?» Il répondit: «'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Là où sera le corps, là se rassembleront [aussi] les vautours
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.37 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Là où… vautours: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Job 39.30
      metadata:
        usfm: JOB.39.30
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: »
