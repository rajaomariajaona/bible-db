document_id: LUK.17,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le pardon et la foi
  - type: text
    content: 'Jésus dit à ses disciples: «Il est inévitable qu''il y ait des pièges, mais malheur à celui qui en est responsable! '
  '10':
  - type: text
    content: 'Vous de même, quand vous avez fait tout ce qui vous a été ordonné, dites: ‘Nous sommes des serviteurs inutiles, nous avons fait ce que nous devions faire.’»'
  - type: heading
    content: Guérison de dix lépreux
  '11':
  - type: text
    content: 'Alors qu''il se rendait à Jérusalem, Jésus passa entre la Samarie et la Galilée. '
  '12':
  - type: text
    content: 'Comme il entrait dans un village, dix lépreux vinrent à sa rencontre. Ils se tinrent à distance '
  '13':
  - type: text
    content: 'et se mirent à lui dire: «Jésus, maître, aie pitié de nous!» '
  '14':
  - type: text
    content: 'Lorsqu''il les vit, Jésus leur dit: «Allez vous montrer aux prêtres.» Pendant qu''ils y allaient, ils furent guéris. '
  '15':
  - type: text
    content: 'L''un d''eux, se voyant guéri, revint sur ses pas en rendant gloire à Dieu à haute voix. '
  '16':
  - type: text
    content: 'Il tomba le visage contre terre aux pieds de Jésus et le remercia. C''était un Samaritain. '
  '17':
  - type: text
    content: 'Jésus prit la parole et dit: «Les dix n''ont-ils pas été guéris? Et les neuf autres, où sont-ils? '
  '18':
  - type: text
    content: 'Ne s''est-il trouvé que cet étranger pour revenir et rendre gloire à Dieu?» '
  '19':
  - type: text
    content: 'Puis il lui dit: «Lève-toi, vas-y, ta foi t''a sauvé.»'
  - type: heading
    content: La venue du royaume de Dieu
  '2':
  - type: text
    content: 'Il vaudrait mieux pour lui qu''on attache à son cou une meule de moulin et qu''on le jette à la mer, plutôt qu''il ne fasse trébucher un seul de ces petits. '
  '20':
  - type: text
    content: 'Les pharisiens demandèrent à Jésus quand viendrait le royaume de Dieu. Il leur répondit: «Le royaume de Dieu ne vient pas en se faisant remarquer. '
  '21':
  - type: text
    content: 'On ne dira pas: ‘Il est ici’, ou: ‘Il est là.’ En effet, le royaume de Dieu est au milieu de vous.»'
  '22':
  - type: text
    content: 'Puis il dit aux disciples: «Un temps viendra où vous désirerez voir même un seul des jours du Fils de l''homme, et vous ne le verrez pas. '
  '23':
  - type: text
    content: 'On vous dira: ‘Il est ici’, ‘Il est là.’ N''y allez pas, n''y courez pas. '
  '24':
  - type: text
    content: 'En effet, tout comme l''éclair resplendit et brille d''une extrémité du ciel à l''autre, ainsi sera le Fils de l''homme dans son jour. '
  '25':
  - type: text
    content: Mais il faut auparavant qu'il souffre beaucoup et qu'il soit rejeté par cette génération.
  '26':
  - type: text
    content: '»Ce qui est arrivé à l''époque de Noé arrivera de même aux jours du Fils de l''homme. '
  '27':
  - type: text
    content: 'Les hommes mangeaient, buvaient, se mariaient et mariaient leurs enfants, jusqu''au jour où Noé est entré dans l''arche, puis le déluge est venu et les a tous fait mourir. '
  '28':
  - type: text
    content: 'Ce sera comme à l''époque de Lot: les hommes mangeaient, buvaient, achetaient, vendaient, plantaient, construisaient, '
  '29':
  - type: text
    content: 'mais le jour où Lot est sorti de Sodome, une pluie de feu et de soufre est tombée du ciel et les a tous fait mourir. '
  '3':
  - type: text
    content: 'Faites bien attention à vous-mêmes. Si ton frère a péché [contre toi], reprends-le et, s''il reconnaît ses torts, pardonne-lui. '
  '30':
  - type: text
    content: Il en ira de même le jour où le Fils de l'homme apparaîtra.
  '31':
  - type: text
    content: '»Ce jour-là, que celui qui sera sur le toit et qui aura ses affaires dans la maison ne descende pas pour les prendre et que celui qui sera dans les champs ne retourne pas non plus en arrière. '
  '32':
  - type: text
    content: Souvenez-vous de la femme de Lot
  - type: note
    content: 'La femme de Lot: transformée en statue de sel pour avoir regardé en arrière lors du départ de Sodome (Genèse 19.26).'
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'Celui qui cherchera à sauver sa vie la perdra, et celui qui la perdra la conservera. '
  '34':
  - type: text
    content: 'Je vous le dis, cette nuit-là, deux personnes seront dans un même lit: l''une sera prise et l''autre laissée; '
  '35':
  - type: text
    content: 'deux femmes moudront ensemble: l''une sera prise et l''autre laissée; '
  '36':
  - type: text
    content: '[deux hommes seront dans un champ: l''un sera pris et l''autre laissé.]»'
  '37':
  - type: text
    content: 'Les disciples lui dirent: «Où cela se passera-t-il, Seigneur?» Il répondit: «'
  - type: text
    content: Là où sera le corps, là se rassembleront [aussi] les vautours
  - type: text
    content: .
  - type: note
    content: 'Là où… vautours: citation de Job 39.30.'
  - type: text
    content: »
  '4':
  - type: text
    content: 'S''il a péché contre toi 7 fois dans une journée et que 7 fois [dans la journée] il revienne [vers toi] et dise: ‘J''ai eu tort’'
  - type: note
    content: 'J''ai eu tort: ou je me repens ou je vais changer d''attitude (même verbe grec qu''au verset 3).'
  - type: text
    content: ', tu lui pardonneras.»'
  '5':
  - type: text
    content: 'Les apôtres dirent au Seigneur: «Augmente notre foi.» '
  '6':
  - type: text
    content: 'Le Seigneur dit: «Si vous aviez de la foi comme une graine de moutarde, vous diriez à ce mûrier: ‘Déracine-toi et va te planter dans la mer’, et il vous obéirait.'
  '7':
  - type: text
    content: '»Si l''un de vous a un esclave qui laboure ou garde les troupeaux, lui dira-t-il, à son retour des champs: ‘Viens tout de suite te mettre à table’? '
  '8':
  - type: text
    content: 'Ne lui dira-t-il pas au contraire: ‘Prépare-moi à souper, ajuste ta tenue pour me servir jusqu''à ce que j''aie mangé et bu; après cela, toi, tu mangeras et tu boiras’? '
  '9':
  - type: text
    content: 'A-t-il de la reconnaissance envers cet esclave parce qu''il a fait ce qui lui était ordonné? [Je ne pense pas.] '
