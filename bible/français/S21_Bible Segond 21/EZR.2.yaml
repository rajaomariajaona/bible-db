- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Nombre total des serviteurs du temple et des descendants des serviteurs de Salomon: 392.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Voici ceux qui revinrent de Thel-Mélach, de Thel-Harsha, de Kerub-Addan et d''Immer et qui ne purent pas prouver qu''ils étaient bien d''Israël par leur famille et leur origine: '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'les descendants de Delaja, de Tobija et de Nekoda, 652; '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'parmi les descendants des prêtres: les descendants de Habaja, d''Hakkots et de Barzillaï, qui avait épousé une des filles de Barzillaï le Galaadite et avait porté son nom. '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Ils avaient cherché leurs actes généalogiques mais ne les avaient pas trouvés, de sorte qu''ils furent déclarés impurs pour l''exercice de la fonction de prêtre. '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: Le gouverneur de Juda leur interdit de manger des offrandes très saintes, et ce jusqu'à ce qu'un prêtre ait pu consulter l'urim et le thummim.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'L''assemblée d''Israël tout entière se composait de 42''360 personnes, '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'sans compter leurs serviteurs et leurs servantes, au nombre de 7337. Parmi eux se trouvaient 200 musiciens, hommes et femmes. '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Ils avaient 736 chevaux, 245 mulets, '
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 435 chameaux et 6720 ânes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '68'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'Plusieurs des chefs de famille, lors de leur arrivée à l''emplacement de la maison de l''Eternel à Jérusalem, firent des offrandes volontaires pour la maison de Dieu, afin qu''on la reconstruise sur ses fondations. '
  - type: usfm
    marker: v
    metadata:
      v: '69'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: Ils firent don pour ces travaux, en fonction de leurs moyens, de 61'000 pièces en or, 3 tonnes d'argent et 100 tuniques destinées aux prêtres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '70'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '70'
  - type: text
    text: Les prêtres et les Lévites, quelques membres du peuple, les musiciens, les portiers et les serviteurs du temple s'installèrent dans leurs villes respectives, de même que tout Israël.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1-70 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Reprise de cette liste en '
