  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Liste des Israélites revenus d'exil
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '*Voici les habitants de la province de Juda revenus de déportation, ceux que Nebucadnetsar, le roi de Babylone, avait exilés à Babylone et qui retournèrent à Jérusalem et en Juda, chacun dans sa ville. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de Bani, 642; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de Bébaï, 623; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'd''Azgad, 1222; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'd''Adonikam, 666; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de Bigvaï, 2056; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'd''Adin, 454; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les descendants d''Ather de la famille d''Ezéchias, 98; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les descendants de Betsaï, 323; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de Jora, 112; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de Hashum, 223; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils revinrent avec Zorobabel, Josué, Néhémie, Seraja, Reélaja, Mardochée, Bilshan, Mispar, Bigvaï, Rehum et Baana. Voici la liste des hommes du peuple d''Israël: '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de Guibbar, 95; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les hommes originaires de Bethléhem, 123; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les habitants de Nethopha, 56; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les habitants d''Anathoth, 128; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les hommes originaires d''Azmaveth, 42; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les hommes originaires de Kirjath-Arim, de Kephira et de Beéroth, 743; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les hommes originaires de Rama et de Guéba, 621; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les habitants de Micmas, 122; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les habitants de Béthel et d''Aï, 223; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les hommes originaires de Nebo, 52; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les descendants de Pareosh, 2172; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les hommes originaires de Magbish, 156; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les descendants de l''autre Elam, 1254; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de Harim, 320; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les hommes originaires de Lod, de Hadid et d''Ono, 725; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les hommes originaires de Jéricho, 345; '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: les hommes originaires de Senaa, 3630.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce qui concerne les prêtres: les descendants de Jedaeja de la famille de Josué, 973; '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les descendants d''Immer, 1052; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de Pashhur, 1247; '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: de Harim, 1017.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de Shephathia, 372; '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce qui concerne les Lévites: les descendants de Josué et de Kadmiel issus d''Hodavia, 74. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parmi les musiciens: les descendants d''Asaph, 128. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parmi les descendants des portiers: les descendants de Shallum, d''Ather, de Thalmon, d''Akkub, de Hathitha et de Shobaï, en tout 139.'
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce qui concerne les serviteurs du temple: les descendants de Tsicha, de Hasupha, de Thabbaoth, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de Kéros, de Siaha, de Padon, '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de Lebana, de Hagaba, d''Akkub, '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de Hagab, de Shamlaï, de Hanan, '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de Guiddel, de Gachar, de Reaja, '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de Retsin, de Nekoda, de Gazzam, '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'd''Uzza, de Paséach, de Bésaï, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'd''Arach, 775; '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'd''Asna, de Mehunim, de Nephusim, '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de Bakbuk, de Hakupha, de Harhur, '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de Batsluth, de Mehida, de Harsha, '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de Barkos, de Sisera, de Thamach, '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: de Netsiach et de Hathipha.
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce qui concerne les descendants des serviteurs de Salomon: les descendants de Sothaï, de Sophéreth, de Peruda, '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de Jaala, de Darkon, de Guiddel, '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: de Shephathia, de Hatthil, de Pokéreth-Hatsebaïm et d'Ami.
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nombre total des serviteurs du temple et des descendants des serviteurs de Salomon: 392.'
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ceux qui revinrent de Thel-Mélach, de Thel-Harsha, de Kerub-Addan et d''Immer et qui ne purent pas prouver qu''ils étaient bien d''Israël par leur famille et leur origine: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les descendants de Pachath-Moab issus de Josué et de Joab, 2812; '
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les descendants de Delaja, de Tobija et de Nekoda, 652; '
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'parmi les descendants des prêtres: les descendants de Habaja, d''Hakkots et de Barzillaï, qui avait épousé une des filles de Barzillaï le Galaadite et avait porté son nom. '
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils avaient cherché leurs actes généalogiques mais ne les avaient pas trouvés, de sorte qu''ils furent déclarés impurs pour l''exercice de la fonction de prêtre. '
  '63':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le gouverneur de Juda leur interdit de manger des offrandes très saintes, et ce jusqu'à ce qu'un prêtre ait pu consulter l'urim et le thummim.
  '64':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''assemblée d''Israël tout entière se composait de 42''360 personnes, '
  '65':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sans compter leurs serviteurs et leurs servantes, au nombre de 7337. Parmi eux se trouvaient 200 musiciens, hommes et femmes. '
  '66':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils avaient 736 chevaux, 245 mulets, '
  '67':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 435 chameaux et 6720 ânes.
  '68':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Plusieurs des chefs de famille, lors de leur arrivée à l''emplacement de la maison de l''Eternel à Jérusalem, firent des offrandes volontaires pour la maison de Dieu, afin qu''on la reconstruise sur ses fondations. '
  '69':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils firent don pour ces travaux, en fonction de leurs moyens, de 61'000 pièces en or, 3 tonnes d'argent et 100 tuniques destinées aux prêtres.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les descendants d''Elam, 1254; '
  '70':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les prêtres et les Lévites, quelques membres du peuple, les musiciens, les portiers et les serviteurs du temple s'installèrent dans leurs villes respectives, de même que tout Israël.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1-70 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Reprise de cette liste en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Néhémie 7.6-72
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de Zatthu, 945; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de Zaccaï, 760; '
