      text: '41'
  - type: text
    text: 'Parmi les musiciens: les descendants d''Asaph, 128. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Parmi les descendants des portiers: les descendants de Shallum, d''Ather, de Thalmon, d''Akkub, de Hathitha et de Shobaï, en tout 139.'
- type: usfm
