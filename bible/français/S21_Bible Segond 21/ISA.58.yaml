document_id: ISA.58,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le vrai jeûne
  - type: text
    content: Crie à pleine voix sans te retenir, fais retentir
  - type: text
    content: ta voix comme une trompette
  - type: text
    content: et révèle à mon peuple sa révolte,
  - type: text
    content: à la famille de Jacob ses péchés!
  '10':
  - type: text
    content: si tu partages tes propres ressources avec celui qui a faim,
  - type: text
    content: si tu réponds aux besoins de l'opprimé,
  - type: text
    content: ta lumière surgira au milieu des ténèbres
  - type: text
    content: et ton obscurité sera pareille à la clarté de midi.
  '11':
  - type: text
    content: L'Eternel sera constamment ton guide,
  - type: text
    content: il répondra à tes besoins dans les endroits arides
  - type: text
    content: et il redonnera des forces à tes membres.
  - type: text
    content: Tu seras pareil à un jardin bien arrosé,
  - type: text
    content: à une source dont l'eau n'arrête jamais de couler.
  '12':
  - type: text
    content: Grâce à toi, on reconstruira sur d'anciennes ruines,
  - type: text
    content: tu relèveras des fondations vieilles de plusieurs générations.
  - type: text
    content: On t'appellera réparateur de brèches,
  - type: text
    content: restaurateur de sentiers fréquentés.
  '13':
  - type: text
    content: Si tu retiens ton pied, pendant le sabbat,
  - type: text
    content: pour ne pas faire ce qui te plaît durant mon saint jour,
  - type: text
    content: si tu considères le sabbat comme un plaisir,
  - type: text
    content: le jour saint de l'Eternel comme digne d'être honoré,
  - type: text
    content: et si tu l'honores en ne suivant pas tes voies habituelles,
  - type: text
    content: en ne cherchant pas à accomplir tes propres désirs et en ne parlant pas dans le vide,
  '14':
  - type: text
    content: alors tu trouveras ton plaisir dans l'Eternel.
  - type: text
    content: Alors je te ferai monter sur les hauteurs du pays
  - type: text
    content: et te ferai jouir de l'héritage de ton ancêtre Jacob.
  - type: text
    content: Oui, c'est l'Eternel qui l'affirme.
  '2':
  - type: text
    content: 'C''est moi que, jour après jour, ils consultent:'
  - type: text
    content: ils veulent connaître mes voies.
  - type: text
    content: Comme une nation qui aurait pratiqué la justice
  - type: text
    content: et n'aurait pas abandonné le droit institué par son Dieu,
  - type: text
    content: ils me réclament des jugements conformes à la justice,
  - type: text
    content: ils désirent se rapprocher de Dieu.
  '3':
  - type: text
    content: «A quoi nous sert-il de jeûner, si tu ne le vois pas,
  - type: text
    content: de nous humilier, si tu n'y fais pas attention?»
  - type: text
    content: C'est que, le jour où vous jeûnez, vous accomplissez vos propres désirs
  - type: text
    content: et traitez durement tous vos ouvriers.
  '4':
  - type: text
    content: Votre jeûne débouche sur des procès et des disputes,
  - type: text
    content: sur de méchants coups de poing.
  - type: text
    content: Vous ne jeûnez pas, comme vous le faites aujourd'hui,
  - type: text
    content: de manière à faire entendre votre voix là-haut.
  '5':
  - type: text
    content: Est-ce un jeûne de ce genre que je préconise,
  - type: text
    content: un jour où l'homme s'humilie?
  - type: text
    content: S'agit-il de courber la tête comme un roseau?
  - type: text
    content: Faut-il se coucher sur le sac et la cendre?
  - type: text
    content: Est-ce cela que tu appelles un jeûne,
  - type: text
    content: un jour agréable à l'Eternel?
  '6':
  - type: text
    content: 'Voici le genre de jeûne que je préconise:'
  - type: text
    content: détacher les chaînes dues à la méchanceté,
  - type: text
    content: dénouer les liens de l'esclavage,
  - type: text
    content: renvoyer libres ceux qu'on maltraite.
  - type: text
    content: Mettez fin aux contraintes de toute sorte!
  '7':
  - type: text
    content: Partage ton pain avec celui qui a faim
  - type: text
    content: et fais entrer chez toi les pauvres sans foyer!
  - type: text
    content: Quand tu vois un homme nu, couvre-le!
  - type: text
    content: Ne cherche pas à éviter celui qui est fait de la même chair que toi!
  '8':
  - type: text
    content: Alors ta lumière jaillira comme l'aurore
  - type: text
    content: et ta restauration progressera rapidement,
  - type: text
    content: ta justice marchera devant toi
  - type: text
    content: et la gloire de l'Eternel sera ton arrière-garde.
  '9':
  - type: text
    content: Alors tu appelleras et l'Eternel répondra,
  - type: text
    content: 'tu crieras et il dira: «Me voici!»'
  - type: text
    content: Oui, si tu éloignes du milieu de toi la contrainte,
  - type: text
    content: les gestes menaçants et les paroles mauvaises,
