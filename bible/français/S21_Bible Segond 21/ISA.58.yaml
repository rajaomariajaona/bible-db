document_id: ISA.58
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le vrai jeûne
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Crie à pleine voix sans te retenir, fais retentir
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta voix comme une trompette
- type: usfm
  marker: q1
  children:
  - type: text
    text: et révèle à mon peuple sa révolte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la famille de Jacob ses péchés!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'C''est moi que, jour après jour, ils consultent:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils veulent connaître mes voies.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme une nation qui aurait pratiqué la justice
- type: usfm
  marker: q1
  children:
  - type: text
    text: et n'aurait pas abandonné le droit institué par son Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils me réclament des jugements conformes à la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils désirent se rapprocher de Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: «A quoi nous sert-il de jeûner, si tu ne le vois pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de nous humilier, si tu n'y fais pas attention?»
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est que, le jour où vous jeûnez, vous accomplissez vos propres désirs
- type: usfm
  marker: q1
  children:
  - type: text
    text: et traitez durement tous vos ouvriers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Votre jeûne débouche sur des procès et des disputes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur de méchants coups de poing.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous ne jeûnez pas, comme vous le faites aujourd'hui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de manière à faire entendre votre voix là-haut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Est-ce un jeûne de ce genre que je préconise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un jour où l'homme s'humilie?
- type: usfm
  marker: q1
  children:
  - type: text
    text: S'agit-il de courber la tête comme un roseau?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faut-il se coucher sur le sac et la cendre?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est-ce cela que tu appelles un jeûne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un jour agréable à l'Eternel?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Voici le genre de jeûne que je préconise:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: détacher les chaînes dues à la méchanceté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dénouer les liens de l'esclavage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: renvoyer libres ceux qu'on maltraite.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mettez fin aux contraintes de toute sorte!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Partage ton pain avec celui qui a faim
- type: usfm
  marker: q1
  children:
  - type: text
    text: et fais entrer chez toi les pauvres sans foyer!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand tu vois un homme nu, couvre-le!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne cherche pas à éviter celui qui est fait de la même chair que toi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Alors ta lumière jaillira comme l'aurore
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ta restauration progressera rapidement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta justice marchera devant toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la gloire de l'Eternel sera ton arrière-garde.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Alors tu appelleras et l'Eternel répondra,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tu crieras et il dira: «Me voici!»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, si tu éloignes du milieu de toi la contrainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les gestes menaçants et les paroles mauvaises,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: si tu partages tes propres ressources avec celui qui a faim,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si tu réponds aux besoins de l'opprimé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta lumière surgira au milieu des ténèbres
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ton obscurité sera pareille à la clarté de midi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L'Eternel sera constamment ton guide,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il répondra à tes besoins dans les endroits arides
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il redonnera des forces à tes membres.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu seras pareil à un jardin bien arrosé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à une source dont l'eau n'arrête jamais de couler.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Grâce à toi, on reconstruira sur d'anciennes ruines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu relèveras des fondations vieilles de plusieurs générations.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On t'appellera réparateur de brèches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: restaurateur de sentiers fréquentés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Si tu retiens ton pied, pendant le sabbat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour ne pas faire ce qui te plaît durant mon saint jour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si tu considères le sabbat comme un plaisir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le jour saint de l'Eternel comme digne d'être honoré,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et si tu l'honores en ne suivant pas tes voies habituelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: en ne cherchant pas à accomplir tes propres désirs et en ne parlant pas dans le vide,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: alors tu trouveras ton plaisir dans l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors je te ferai monter sur les hauteurs du pays
- type: usfm
  marker: q1
  children:
  - type: text
    text: et te ferai jouir de l'héritage de ton ancêtre Jacob.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, c'est l'Eternel qui l'affirme.
