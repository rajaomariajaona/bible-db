      text: 'et 2 litres pour chacun des 7 agneaux. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous offrirez un bouc en sacrifice d''expiation, afin de faire l''expiation pour vous. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous offrirez ces sacrifices, en plus de l'holocauste mensuel et de l'offrande végétale qui l'accompagne ainsi que de l'holocauste perpétuel et de l'offrande végétale et des offrandes liquides qui l'accompagnent, d'après les règles établies. Ce sont des sacrifices passés par le feu dont l'odeur est agréable à l'Eternel.
  - type: usfm
