    children:
    - type: text
      text: Les sacrifices de la fête des trompettes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Le premier jour du septième mois, vous aurez une sainte assemblée. Vous n''effectuerez aucun travail pénible. Ce jour sera proclamé parmi vous au son des trompettes. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '4 litres et demi pour le bélier et 2 litres pour chacun des 7 agneaux. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous offrirez un bouc en sacrifice d'expiation, en plus du sacrifice des expiations, de l'holocauste perpétuel et de l'offrande végétale qui l'accompagne, ainsi que des offrandes liquides qui les accompagnent.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les sacrifices de la fête des tentes
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Le quinzième jour du septième mois, vous aurez une sainte assemblée. Vous n''effectuerez aucun travail pénible. Vous célébrerez une fête en l''honneur de l''Eternel pendant 7 jours. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous offrirez en holocauste un sacrifice brûlé au feu dont l''odeur est agréable à l''Eternel: 13 jeunes taureaux, 2 béliers et 14 agneaux d''un an sans défaut. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous y joindrez l''offrande de fleur de farine pétrie à l''huile: 6 litres et demi pour chacun des 13 taureaux, 4 litres et demi pour chacun des 2 béliers '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et 2 litres pour chacun des 14 agneaux. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous offrirez un bouc en sacrifice d'expiation, en plus de l'holocauste perpétuel et de l'offrande végétale et l'offrande liquide qui l'accompagnent.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Le deuxième jour, vous offrirez 12 jeunes taureaux, 2 béliers et 14 agneaux d''un an sans défaut, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avec l''offrande végétale et les offrandes liquides prescrites pour les taureaux, les béliers et les agneaux en fonction de leur nombre, d''après les règles établies. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous offrirez un bouc en sacrifice d'expiation, en plus de l'holocauste perpétuel et de l'offrande végétale qui l'accompagne ainsi que des offrandes liquides qui les accompagnent.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous offrirez en holocauste dont l''odeur est agréable à l''Eternel un jeune taureau, un bélier et 7 agneaux d''un an sans défaut. '
