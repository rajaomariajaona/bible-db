  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Tels sont les sacrifices que vous offrirez à l'Eternel lors de vos fêtes, en plus de vos holocaustes, vos offrandes végétales et vos offrandes liquides, ainsi que des sacrifices de communion que vous présenterez pour accomplir un vœu ou en guise d'offrandes volontaires.»
  '4':
