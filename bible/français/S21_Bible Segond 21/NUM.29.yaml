  '35':
  - type: text
    content: '»Le huitième jour, vous aurez une assemblée solennelle. Vous n''effectuerez aucun travail pénible. '
  '36':
  - type: text
    content: 'Vous offrirez en holocauste un sacrifice brûlé au feu dont l''odeur est agréable à l''Eternel: un taureau, un bélier et 7 agneaux d''un an sans défaut, '
  '37':
  - type: text
    content: 'avec l''offrande végétale et les offrandes liquides prescrites pour le taureau, le bélier et les agneaux en fonction de leur nombre, d''après les règles établies. '
  '38':
  - type: text
    content: Vous offrirez un bouc en sacrifice d'expiation, en plus de l'holocauste perpétuel et de l'offrande végétale et l'offrande liquide qui l'accompagnent.
  '39':
  - type: text
    content: »Tels sont les sacrifices que vous offrirez à l'Eternel lors de vos fêtes, en plus de vos holocaustes, vos offrandes végétales et vos offrandes liquides, ainsi que des sacrifices de communion que vous présenterez pour accomplir un vœu ou en guise d'offrandes volontaires.»
  '4':
  - type: text
    content: 'et 2 litres pour chacun des 7 agneaux. '
  '5':
  - type: text
    content: 'Vous offrirez un bouc en sacrifice d''expiation, afin de faire l''expiation pour vous. '
  '6':
  - type: text
    content: Vous offrirez ces sacrifices, en plus de l'holocauste mensuel et de l'offrande végétale qui l'accompagne ainsi que de l'holocauste perpétuel et de l'offrande végétale et des offrandes liquides qui l'accompagnent, d'après les règles établies. Ce sont des sacrifices passés par le feu dont l'odeur est agréable à l'Eternel.
  - type: heading
