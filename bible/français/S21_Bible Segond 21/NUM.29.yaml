  '1':
  - type: heading
    content: Les sacrifices de la fête des trompettes
  - type: text
    content: '»Le premier jour du septième mois, vous aurez une sainte assemblée. Vous n''effectuerez aucun travail pénible. Ce jour sera proclamé parmi vous au son des trompettes. '
  '10':
  - type: text
    content: '4 litres et demi pour le bélier et 2 litres pour chacun des 7 agneaux. '
  '11':
  - type: text
    content: Vous offrirez un bouc en sacrifice d'expiation, en plus du sacrifice des expiations, de l'holocauste perpétuel et de l'offrande végétale qui l'accompagne, ainsi que des offrandes liquides qui les accompagnent.
  - type: heading
    content: Les sacrifices de la fête des tentes
  '12':
  - type: text
    content: '»Le quinzième jour du septième mois, vous aurez une sainte assemblée. Vous n''effectuerez aucun travail pénible. Vous célébrerez une fête en l''honneur de l''Eternel pendant 7 jours. '
  '13':
  - type: text
    content: 'Vous offrirez en holocauste un sacrifice brûlé au feu dont l''odeur est agréable à l''Eternel: 13 jeunes taureaux, 2 béliers et 14 agneaux d''un an sans défaut. '
  '14':
  - type: text
    content: 'Vous y joindrez l''offrande de fleur de farine pétrie à l''huile: 6 litres et demi pour chacun des 13 taureaux, 4 litres et demi pour chacun des 2 béliers '
  '15':
  - type: text
    content: 'et 2 litres pour chacun des 14 agneaux. '
  '16':
  - type: text
    content: Vous offrirez un bouc en sacrifice d'expiation, en plus de l'holocauste perpétuel et de l'offrande végétale et l'offrande liquide qui l'accompagnent.
  '17':
  - type: text
    content: '»Le deuxième jour, vous offrirez 12 jeunes taureaux, 2 béliers et 14 agneaux d''un an sans défaut, '
  '18':
  - type: text
    content: 'avec l''offrande végétale et les offrandes liquides prescrites pour les taureaux, les béliers et les agneaux en fonction de leur nombre, d''après les règles établies. '
  '19':
  - type: text
    content: Vous offrirez un bouc en sacrifice d'expiation, en plus de l'holocauste perpétuel et de l'offrande végétale qui l'accompagne ainsi que des offrandes liquides qui les accompagnent.
  '2':
  - type: text
    content: 'Vous offrirez en holocauste dont l''odeur est agréable à l''Eternel un jeune taureau, un bélier et 7 agneaux d''un an sans défaut. '
  '20':
  - type: text
    content: '»Le troisième jour, vous offrirez 11 taureaux, 2 béliers et 14 agneaux d''un an sans défaut, '
  '21':
