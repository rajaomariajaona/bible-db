document_id: 1CO.6,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Scandale des procès entre chrétiens
  - type: text
    content: Lorsque l'un d'entre vous a un litige avec un autre, comment ose-t-il demander justice devant les injustes, et non devant les saints
  - type: note
    content: 'Les injustes… les saints: respectivement les non-croyants, qui n''ont pas reçu la justice de Dieu, et les croyants.'
  - type: text
    content: '? '
  '10':
  - type: text
    content: 'ni les voleurs, ni les hommes toujours désireux de posséder plus, ni les ivrognes, ni les calomniateurs, ni les exploiteurs n''hériteront du royaume de Dieu. '
  '11':
  - type: text
    content: Et c'est là ce que vous étiez, certains d'entre vous. Mais vous avez été lavés, mais vous avez été déclarés saints, mais vous avez été déclarés justes au nom du Seigneur Jésus[-Christ] et par l'Esprit de notre Dieu.
  - type: heading
    content: Liberté chrétienne et appartenance à Christ
  '12':
  - type: text
    content: 'Tout m''est permis, mais tout n''est pas utile; tout m''est permis, mais je ne me laisserai pas dominer par quoi que ce soit. '
  '13':
  - type: text
    content: 'Les aliments sont pour le ventre et le ventre pour les aliments, et Dieu détruira l''un comme les autres. Mais le corps n''est pas pour l''immoralité sexuelle: il est pour le Seigneur, et le Seigneur est pour le corps. '
  '14':
  - type: text
    content: Or Dieu, qui a ressuscité le Seigneur, nous ressuscitera aussi par sa puissance.
  '15':
  - type: text
    content: 'Ne savez-vous pas que vos corps sont les membres de Christ? Prendrai-je les membres de Christ pour en faire les membres d''une prostituée? Certainement pas! '
  '16':
  - type: text
    content: 'Ne savez-vous pas que celui qui s''unit à la prostituée est un seul corps avec elle? En effet, il est dit: '
  - type: text
    content: Les deux ne feront qu'un
  - type: text
    content: .
  - type: note
    content: 'Les deux… qu''un: citation de Genèse 2.24.'
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'Mais celui qui s''unit au Seigneur est un seul esprit avec lui. '
  '18':
  - type: text
    content: 'Fuyez l''immoralité sexuelle. Tout autre péché qu''un homme commet est extérieur à son corps, mais celui qui se livre à l''immoralité sexuelle pèche contre son propre corps. '
  '19':
  - type: text
    content: 'Ne le savez-vous pas? Votre corps est le temple du Saint-Esprit qui est en vous et que vous avez reçu de Dieu. Vous ne vous appartenez pas à vous-mêmes, '
  '2':
  - type: text
    content: 'Ne savez-vous pas que les saints jugeront le monde? Et si c''est par vous que le monde doit être jugé, êtes-vous incapables de rendre des jugements de faible importance? '
  '20':
  - type: text
    content: car vous avez été rachetés à un grand prix. Rendez donc gloire à Dieu dans votre corps [et dans votre esprit qui appartiennent à Dieu].
  '3':
  - type: text
    content: 'Ne savez-vous pas que nous jugerons les anges? Combien plus les affaires de la vie courante! '
  '4':
  - type: text
    content: 'Or si vous avez des litiges concernant les affaires de la vie courante, vous prenez pour juges des gens dont l''Eglise ne fait aucun cas! '
  '5':
  - type: text
    content: 'Je le dis à votre honte. Ainsi, il n''y a parmi vous pas un seul homme sage qui puisse juger entre ses frères et sœurs! '
  '6':
  - type: text
    content: 'Au contraire, un frère est en procès contre un frère, et cela devant des incroyants! '
  '7':
  - type: text
    content: 'C''est déjà pour vous un échec complet que d''avoir des procès les uns avec les autres. Pourquoi ne supportez-vous pas plutôt une injustice? Pourquoi ne vous laissez-vous pas plutôt dépouiller? '
  '8':
  - type: text
    content: Mais c'est vous au contraire qui commettez l'injustice et qui dépouillez les autres, et c'est envers des frères et sœurs que vous agissez ainsi!
  '9':
  - type: text
    content: 'Ne savez-vous pas que les injustes n''hériteront pas du royaume de Dieu? Ne vous y trompez pas: ni ceux qui vivent dans l''immoralité sexuelle, ni les idolâtres, ni les adultères, ni les travestis, ni les homosexuels, '
