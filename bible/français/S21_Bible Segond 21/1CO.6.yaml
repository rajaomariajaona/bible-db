document_id: 1CO.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Scandale des procès entre chrétiens
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lorsque l'un d'entre vous a un litige avec un autre, comment ose-t-il demander justice devant les injustes, et non devant les saints
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Les injustes… les saints: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: respectivement les non-croyants, qui n'ont pas reçu la justice de Dieu, et les croyants.
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ne savez-vous pas que les saints jugeront le monde? Et si c''est par vous que le monde doit être jugé, êtes-vous incapables de rendre des jugements de faible importance? '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ne savez-vous pas que nous jugerons les anges? Combien plus les affaires de la vie courante! '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Or si vous avez des litiges concernant les affaires de la vie courante, vous prenez pour juges des gens dont l''Eglise ne fait aucun cas! '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je le dis à votre honte. Ainsi, il n''y a parmi vous pas un seul homme sage qui puisse juger entre ses frères et sœurs! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Au contraire, un frère est en procès contre un frère, et cela devant des incroyants! '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'C''est déjà pour vous un échec complet que d''avoir des procès les uns avec les autres. Pourquoi ne supportez-vous pas plutôt une injustice? Pourquoi ne vous laissez-vous pas plutôt dépouiller? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mais c'est vous au contraire qui commettez l'injustice et qui dépouillez les autres, et c'est envers des frères et sœurs que vous agissez ainsi!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ne savez-vous pas que les injustes n''hériteront pas du royaume de Dieu? Ne vous y trompez pas: ni ceux qui vivent dans l''immoralité sexuelle, ni les idolâtres, ni les adultères, ni les travestis, ni les homosexuels, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ni les voleurs, ni les hommes toujours désireux de posséder plus, ni les ivrognes, ni les calomniateurs, ni les exploiteurs n''hériteront du royaume de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Et c'est là ce que vous étiez, certains d'entre vous. Mais vous avez été lavés, mais vous avez été déclarés saints, mais vous avez été déclarés justes au nom du Seigneur Jésus[-Christ] et par l'Esprit de notre Dieu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Liberté chrétienne et appartenance à Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tout m''est permis, mais tout n''est pas utile; tout m''est permis, mais je ne me laisserai pas dominer par quoi que ce soit. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Les aliments sont pour le ventre et le ventre pour les aliments, et Dieu détruira l''un comme les autres. Mais le corps n''est pas pour l''immoralité sexuelle: il est pour le Seigneur, et le Seigneur est pour le corps. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Or Dieu, qui a ressuscité le Seigneur, nous ressuscitera aussi par sa puissance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ne savez-vous pas que vos corps sont les membres de Christ? Prendrai-je les membres de Christ pour en faire les membres d''une prostituée? Certainement pas! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ne savez-vous pas que celui qui s''unit à la prostituée est un seul corps avec elle? En effet, il est dit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Les deux ne feront qu'un
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Les deux… qu''un: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Genèse 2.24
      metadata:
        usfm: GEN.2.24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais celui qui s''unit au Seigneur est un seul esprit avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Fuyez l''immoralité sexuelle. Tout autre péché qu''un homme commet est extérieur à son corps, mais celui qui se livre à l''immoralité sexuelle pèche contre son propre corps. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ne le savez-vous pas? Votre corps est le temple du Saint-Esprit qui est en vous et que vous avez reçu de Dieu. Vous ne vous appartenez pas à vous-mêmes, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: car vous avez été rachetés à un grand prix. Rendez donc gloire à Dieu dans votre corps [et dans votre esprit qui appartiennent à Dieu].
