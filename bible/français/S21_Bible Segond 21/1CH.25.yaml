document_id: 1CH.25,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Liste et fonctions des musiciens
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: David et les chefs de l'armée mirent à part pour le service les descendants d'Asaph, d'Héman et de Jeduthun qui prophétisaient en s'accompagnant de la harpe, du luth et des cymbales. Voici la liste de ceux qui effectuaient ce service.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le troisième, sur Zaccur, ses fils et ses frères, 12 en tout; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le quatrième, sur Jitseri, ses fils et ses frères, 12 en tout; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le cinquième, sur Nethania, ses fils et ses frères, 12 en tout; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le sixième, sur Bukkija, ses fils et ses frères, 12 en tout; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le septième, sur Jesareéla, ses fils et ses frères, 12 en tout; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le huitième, sur Esaïe, ses fils et ses frères, 12 en tout; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le neuvième, sur Matthania, ses fils et ses frères, 12 en tout; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le dixième, sur Shimeï, ses fils et ses frères, 12 en tout; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le onzième, sur Azareel, ses fils et ses frères, 12 en tout; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le douzième, sur Hashabia, ses fils et ses frères, 12 en tout; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour les descendants d''Asaph: ses fils Zaccur, Joseph, Nethania et Ashareéla; ils étaient placés sous la direction d''Asaph qui prophétisait lui-même sous la direction du roi. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le treizième, sur Shubaël, ses fils et ses frères, 12 en tout; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le quatorzième, sur Matthithia, ses fils et ses frères, 12 en tout; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le quinzième, sur Jerémoth, ses fils et ses frères, 12 en tout; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le seizième, sur Hanania, ses fils et ses frères, 12 en tout; '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le dix-septième, sur Joshbekasha, ses fils et ses frères, 12 en tout; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le dix-huitième, sur Hanani, ses fils et ses frères, 12 en tout; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le dix-neuvième, sur Mallothi, ses fils et ses frères, 12 en tout; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le vingtième, sur Elijatha, ses fils et ses frères, 12 en tout; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le vingt et unième, sur Hothir, ses fils et ses frères, 12 en tout; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le vingt-deuxième, sur Guiddalthi, ses fils et ses frères, 12 en tout; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour Jeduthun: ses six fils Guedalia, Tseri, Esaïe, [Shimeï,] Hashabia et Matthithia; ils étaient placés sous la direction de leur père Jeduthun qui prophétisait avec la harpe pour louer et célébrer l''Eternel. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le vingt-troisième, sur Machazioth, ses fils et ses frères, 12 en tout; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: le vingt-quatrième, sur Romamthi-Ezer, ses fils et ses frères, 12 en tout.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pour Héman: ses fils Bukkija, Matthania, Uziel, Shebuel, Jerimoth, Hanania, Hanani, Eliatha, Guiddalthi, Romamthi-Ezer, Joshbekasha, Mallothi, Hothir, Machazioth. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils étaient tous fils d'Héman, qui était le voyant du roi chargé de révéler les paroles de Dieu et d'élever sa puissance; Dieu lui avait donné 14 fils et 3 filles.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous ceux-là étaient sous la direction de leur père pour le chant de la maison de l''Eternel, et ils s''accompagnaient de cymbales, de luths et de harpes pour le service de la maison de Dieu. Asaph, Jeduthun et Héman étaient sous la direction du roi. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils étaient 288 en tout, avec leurs frères formés au chant en l''honneur de l''Eternel, tous ceux qui étaient maîtres en la matière. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Petits et grands, maîtres et disciples, ils tirèrent au sort leur ordre de service.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le premier sort tomba, pour Asaph, sur Joseph; le deuxième, sur Guedalia, ainsi que ses frères et ses fils, ce qui faisait 12 en tout; '
