document_id: 1CH.25
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Liste et fonctions des musiciens
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: David et les chefs de l'armée mirent à part pour le service les descendants d'Asaph, d'Héman et de Jeduthun qui prophétisaient en s'accompagnant de la harpe, du luth et des cymbales. Voici la liste de ceux qui effectuaient ce service.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Pour les descendants d''Asaph: ses fils Zaccur, Joseph, Nethania et Ashareéla; ils étaient placés sous la direction d''Asaph qui prophétisait lui-même sous la direction du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Pour Jeduthun: ses six fils Guedalia, Tseri, Esaïe, [Shimeï,] Hashabia et Matthithia; ils étaient placés sous la direction de leur père Jeduthun qui prophétisait avec la harpe pour louer et célébrer l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pour Héman: ses fils Bukkija, Matthania, Uziel, Shebuel, Jerimoth, Hanania, Hanani, Eliatha, Guiddalthi, Romamthi-Ezer, Joshbekasha, Mallothi, Hothir, Machazioth. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils étaient tous fils d'Héman, qui était le voyant du roi chargé de révéler les paroles de Dieu et d'élever sa puissance; Dieu lui avait donné 14 fils et 3 filles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tous ceux-là étaient sous la direction de leur père pour le chant de la maison de l''Eternel, et ils s''accompagnaient de cymbales, de luths et de harpes pour le service de la maison de Dieu. Asaph, Jeduthun et Héman étaient sous la direction du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils étaient 288 en tout, avec leurs frères formés au chant en l''honneur de l''Eternel, tous ceux qui étaient maîtres en la matière. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Petits et grands, maîtres et disciples, ils tirèrent au sort leur ordre de service.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le premier sort tomba, pour Asaph, sur Joseph; le deuxième, sur Guedalia, ainsi que ses frères et ses fils, ce qui faisait 12 en tout; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'le troisième, sur Zaccur, ses fils et ses frères, 12 en tout; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'le quatrième, sur Jitseri, ses fils et ses frères, 12 en tout; '
