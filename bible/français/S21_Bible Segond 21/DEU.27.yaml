document_id: DEU.27
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Bénédictions et malédictions
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 27.1–30.20
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: La loi au mont Ebal
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moïse et les anciens d''Israël donnèrent cet ordre au peuple: «Respectez tous les commandements que je vous prescris aujourd''hui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '»Une fois passé le Jourdain pour entrer dans le pays que l''Eternel, ton Dieu, te donne, tu dresseras de grandes pierres que tu enduiras de chaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu y écriras toutes les paroles de cette loi lorsque tu auras passé le Jourdain pour entrer dans le pays que l''Eternel, ton Dieu, te donne, un pays où coulent le lait et le miel, comme te l''a dit l''Eternel, le Dieu de tes ancêtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Lorsque vous aurez passé le Jourdain, vous dresserez les pierres à propos desquelles je vous donne aujourd''hui des ordres sur le mont Ebal et tu les enduiras de chaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Là, tu construiras un autel à l''Eternel, ton Dieu. Ce sera un autel en pierres, que tu ne travailleras pas avec le fer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'C''est avec des pierres brutes que tu construiras l''autel de l''Eternel, ton Dieu. Tu y offriras des holocaustes à l''Eternel, ton Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tu offriras aussi des sacrifices de communion et tu mangeras et te réjouiras là, devant l''Eternel, ton Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tu écriras sur ces pierres toutes les paroles de cette loi, en les gravant bien nettement.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Moïse et les prêtres, les Lévites, dirent à l''ensemble d''Israël: «Israël, sois attentif et écoute! Aujourd''hui, tu es devenu le peuple de l''Eternel, ton Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tu obéiras à l'Eternel, ton Dieu, et tu mettras en pratique ses commandements et ses prescriptions, que je te donne aujourd'hui.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Bénédictions et malédictions
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le même jour, Moïse donna cet ordre au peuple: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '«Lorsque vous aurez passé le Jourdain, Siméon, Lévi, Juda, Issacar, Joseph et Benjamin se tiendront sur le mont Garizim pour bénir le peuple, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'tandis que Ruben, Gad, Aser, Zabulon, Dan et Nephthali se tiendront sur le mont Ebal pour prononcer la malédiction. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les Lévites prendront la parole, ils diront d''une voix haute à tout Israël:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '»‘Maudit soit l''homme qui fait une sculpture sacrée ou une idole en métal fondu, horreur aux yeux de l''Eternel, œuvre des mains d''un artisan, et qui la place dans un endroit secret!’ Et tout le peuple répondra: ‘Amen!’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '»‘Maudit soit celui qui méprise son père et sa mère!’ Et tout le peuple dira: ‘Amen!’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '»‘Maudit soit celui qui déplace les bornes de son prochain!’ Et tout le peuple dira: ‘Amen!’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '»‘Maudit soit celui qui fait égarer un aveugle dans le chemin!’ Et tout le peuple dira: ‘Amen!’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '»‘Maudit soit celui qui porte atteinte au droit de l''étranger, de l''orphelin et de la veuve!’ Et tout le peuple dira: ‘Amen!’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '»‘Maudit soit celui qui couche avec la femme de son père, car il soulève la couverture de son père!’ Et tout le peuple dira: ‘Amen!’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '»‘Maudit soit celui qui couche avec une bête, quelle qu''elle soit!’ Et tout le peuple dira: ‘Amen!’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '»‘Maudit soit celui qui couche avec sa sœur, la fille de son père ou de sa mère!’ Et tout le peuple dira: ‘Amen!’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '»‘Maudit soit celui qui couche avec sa belle-mère!’ Et tout le peuple dira: ‘Amen!’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '»‘Maudit soit celui qui frappe son prochain en secret!’ Et tout le peuple dira: ‘Amen!’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '»‘Maudit soit celui qui accepte un pot-de-vin pour verser le sang d''un innocent!’ Et tout le peuple dira: ‘Amen!’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: »*‘Maudit soit celui qui ne ratifie pas les paroles de cette loi pour les mettre en pratique!’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '27.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Maudit soit… pratique: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité par l''apôtre Paul en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Galates 3.10
      metadata:
        usfm: GAL.3.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' Et tout le peuple dira: ‘Amen!’'
