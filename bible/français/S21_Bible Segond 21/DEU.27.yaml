document_id: DEU.27,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Bénédictions et malédictions
  - type: heading
    content: 27.1–30.20
  - type: heading
    content: La loi au mont Ebal
  - type: text
    content: 'Moïse et les anciens d''Israël donnèrent cet ordre au peuple: «Respectez tous les commandements que je vous prescris aujourd''hui.'
  '10':
  - type: text
    content: Tu obéiras à l'Eternel, ton Dieu, et tu mettras en pratique ses commandements et ses prescriptions, que je te donne aujourd'hui.»
  - type: heading
    content: Bénédictions et malédictions
  '11':
  - type: text
    content: 'Le même jour, Moïse donna cet ordre au peuple: '
  '12':
  - type: text
    content: '«Lorsque vous aurez passé le Jourdain, Siméon, Lévi, Juda, Issacar, Joseph et Benjamin se tiendront sur le mont Garizim pour bénir le peuple, '
  '13':
  - type: text
    content: 'tandis que Ruben, Gad, Aser, Zabulon, Dan et Nephthali se tiendront sur le mont Ebal pour prononcer la malédiction. '
  '14':
  - type: text
    content: 'Les Lévites prendront la parole, ils diront d''une voix haute à tout Israël:'
  '15':
  - type: text
    content: '»‘Maudit soit l''homme qui fait une sculpture sacrée ou une idole en métal fondu, horreur aux yeux de l''Eternel, œuvre des mains d''un artisan, et qui la place dans un endroit secret!’ Et tout le peuple répondra: ‘Amen!’'
  '16':
  - type: text
    content: '»‘Maudit soit celui qui méprise son père et sa mère!’ Et tout le peuple dira: ‘Amen!’'
  '17':
  - type: text
    content: '»‘Maudit soit celui qui déplace les bornes de son prochain!’ Et tout le peuple dira: ‘Amen!’'
  '18':
  - type: text
    content: '»‘Maudit soit celui qui fait égarer un aveugle dans le chemin!’ Et tout le peuple dira: ‘Amen!’'
  '19':
  - type: text
    content: '»‘Maudit soit celui qui porte atteinte au droit de l''étranger, de l''orphelin et de la veuve!’ Et tout le peuple dira: ‘Amen!’'
  '2':
  - type: text
    content: '»Une fois passé le Jourdain pour entrer dans le pays que l''Eternel, ton Dieu, te donne, tu dresseras de grandes pierres que tu enduiras de chaux. '
  '20':
  - type: text
    content: '»‘Maudit soit celui qui couche avec la femme de son père, car il soulève la couverture de son père!’ Et tout le peuple dira: ‘Amen!’'
  '21':
  - type: text
    content: '»‘Maudit soit celui qui couche avec une bête, quelle qu''elle soit!’ Et tout le peuple dira: ‘Amen!’'
  '22':
  - type: text
    content: '»‘Maudit soit celui qui couche avec sa sœur, la fille de son père ou de sa mère!’ Et tout le peuple dira: ‘Amen!’'
  '23':
  - type: text
    content: '»‘Maudit soit celui qui couche avec sa belle-mère!’ Et tout le peuple dira: ‘Amen!’'
  '24':
  - type: text
    content: '»‘Maudit soit celui qui frappe son prochain en secret!’ Et tout le peuple dira: ‘Amen!’'
  '25':
  - type: text
    content: '»‘Maudit soit celui qui accepte un pot-de-vin pour verser le sang d''un innocent!’ Et tout le peuple dira: ‘Amen!’'
  '26':
  - type: text
    content: »*‘Maudit soit celui qui ne ratifie pas les paroles de cette loi pour les mettre en pratique!’
  - type: note
    content: 'Maudit soit… pratique: cité par l''apôtre Paul en Galates 3.10.'
  - type: text
    content: ' Et tout le peuple dira: ‘Amen!’'
  '3':
  - type: text
    content: 'Tu y écriras toutes les paroles de cette loi lorsque tu auras passé le Jourdain pour entrer dans le pays que l''Eternel, ton Dieu, te donne, un pays où coulent le lait et le miel, comme te l''a dit l''Eternel, le Dieu de tes ancêtres. '
  '4':
  - type: text
    content: 'Lorsque vous aurez passé le Jourdain, vous dresserez les pierres à propos desquelles je vous donne aujourd''hui des ordres sur le mont Ebal et tu les enduiras de chaux. '
  '5':
  - type: text
    content: 'Là, tu construiras un autel à l''Eternel, ton Dieu. Ce sera un autel en pierres, que tu ne travailleras pas avec le fer. '
  '6':
  - type: text
    content: 'C''est avec des pierres brutes que tu construiras l''autel de l''Eternel, ton Dieu. Tu y offriras des holocaustes à l''Eternel, ton Dieu. '
  '7':
  - type: text
    content: 'Tu offriras aussi des sacrifices de communion et tu mangeras et te réjouiras là, devant l''Eternel, ton Dieu. '
  '8':
  - type: text
    content: Tu écriras sur ces pierres toutes les paroles de cette loi, en les gravant bien nettement.»
  '9':
  - type: text
    content: 'Moïse et les prêtres, les Lévites, dirent à l''ensemble d''Israël: «Israël, sois attentif et écoute! Aujourd''hui, tu es devenu le peuple de l''Eternel, ton Dieu. '
