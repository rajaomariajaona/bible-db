document_id: PSA.132
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rappel des promesses de Dieu à David
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Chant des montées.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, souviens-toi de David,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de tout ce qu'il a souffert!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il a fait un serment à l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'il a fait ce vœu au puissant de Jacob:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: «Je n'entrerai pas dans ma maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne monterai pas sur mon lit,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: je ne donnerai pas de sommeil à mes yeux
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni de repos à mes paupières
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: avant d'avoir trouvé un endroit pour l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une demeure pour le puissant de Jacob.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Oui, nous avons appris que l'arche était à Ephrata,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous l'avons trouvée dans les champs de Jaar.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Allons à la demeure du Seigneur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: prosternons-nous à ses pieds!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '*Lève-toi, Eternel, viens à ton lieu de repos,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi et l'arche où réside ta force!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Que tes prêtres aient la justice pour habit
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que tes fidèles poussent des cris de joie!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: A cause de ton serviteur David,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne repousse pas celui que tu as désigné par onction!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '132.8-10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Texte quasi identique en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Chroniques 6.41-42
      metadata:
        usfm: 2CH.6.41+2CH.6.42
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L'Eternel a fait ce serment véridique à David,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et il ne reviendra pas sur ce qu''il a promis:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Je mettrai sur ton trône un de tes enfants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Si tes fils respectent mon alliance
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les instructions que je leur donne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs fils aussi seront assis
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour toujours sur ton trône.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Oui, l'Eternel a choisi Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'il l''a désirée pour lieu d''habitation:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: «C'est mon lieu de repos pour toujours.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'y habiterai, car je l'ai désiré.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je bénirai sa nourriture
- type: usfm
  marker: q1
  children:
  - type: text
    text: ', je rassasierai de pain ses pauvres,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: je revêtirai ses prêtres de salut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses fidèles pousseront des cris de joie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Là je ferai grandir la puissance de David,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je préparerai un successeur pour celui que j'ai désigné par onction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Je donnerai la honte pour vêtement à ses ennemis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que sur son front brillera sa couronne.»
