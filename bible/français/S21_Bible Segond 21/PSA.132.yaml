document_id: PSA.132,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Rappel des promesses de Dieu à David
  - type: text
    content: Chant des montées.
  - type: text
    content: Eternel, souviens-toi de David,
  - type: text
    content: de tout ce qu'il a souffert!
  '10':
  - type: text
    content: A cause de ton serviteur David,
  - type: text
    content: ne repousse pas celui que tu as désigné par onction!
  - type: note
    content: Texte quasi identique en 2 Chroniques 6.41-42.
  '11':
  - type: text
    content: L'Eternel a fait ce serment véridique à David,
  - type: text
    content: 'et il ne reviendra pas sur ce qu''il a promis:'
  - type: text
    content: «Je mettrai sur ton trône un de tes enfants.
  '12':
  - type: text
    content: Si tes fils respectent mon alliance
  - type: text
    content: et les instructions que je leur donne,
  - type: text
    content: leurs fils aussi seront assis
  - type: text
    content: pour toujours sur ton trône.»
  '13':
  - type: text
    content: Oui, l'Eternel a choisi Sion,
  - type: text
    content: 'il l''a désirée pour lieu d''habitation:'
  '14':
  - type: text
    content: «C'est mon lieu de repos pour toujours.
  - type: text
    content: J'y habiterai, car je l'ai désiré.
  '15':
  - type: text
    content: Je bénirai sa nourriture
  - type: text
    content: ', je rassasierai de pain ses pauvres,'
  '16':
  - type: text
    content: je revêtirai ses prêtres de salut,
  - type: text
    content: et ses fidèles pousseront des cris de joie.
  '17':
  - type: text
    content: Là je ferai grandir la puissance de David,
  - type: text
    content: je préparerai un successeur pour celui que j'ai désigné par onction.
  '18':
  - type: text
    content: Je donnerai la honte pour vêtement à ses ennemis,
  - type: text
    content: tandis que sur son front brillera sa couronne.»
  '2':
  - type: text
    content: Il a fait un serment à l'Eternel,
  - type: text
    content: 'il a fait ce vœu au puissant de Jacob:'
  '3':
  - type: text
    content: «Je n'entrerai pas dans ma maison,
  - type: text
    content: je ne monterai pas sur mon lit,
  '4':
  - type: text
    content: je ne donnerai pas de sommeil à mes yeux
  - type: text
    content: ni de repos à mes paupières
  '5':
  - type: text
    content: avant d'avoir trouvé un endroit pour l'Eternel,
  - type: text
    content: une demeure pour le puissant de Jacob.»
  '6':
  - type: text
    content: Oui, nous avons appris que l'arche était à Ephrata,
  - type: text
    content: nous l'avons trouvée dans les champs de Jaar.
  '7':
  - type: text
    content: Allons à la demeure du Seigneur,
  - type: text
    content: prosternons-nous à ses pieds!
  '8':
  - type: text
    content: '*Lève-toi, Eternel, viens à ton lieu de repos,'
  - type: text
    content: toi et l'arche où réside ta force!
  '9':
  - type: text
    content: Que tes prêtres aient la justice pour habit
  - type: text
    content: et que tes fidèles poussent des cris de joie!
