document_id: PSA.45
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les noces du roi
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur, sur la mélodie «Les lis». Des descendants de Koré. Cantique, chant d'amour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: De belles paroles bouillonnent dans mon cœur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je dis: «Mon œuvre est pour le roi.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que ma langue soit comme la plume d'un habile écrivain!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tu es le plus beau des hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la grâce coule de tes lèvres;
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est pourquoi Dieu t'a béni pour toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Vaillant guerrier, mets ton épée au côté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: signe de ta grandeur et de ta majesté,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: oui, de ta majesté! Sois vainqueur, monte sur ton char,
- type: usfm
  marker: q1
  children:
  - type: text
    text: défends la vérité, la douceur et la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que ta main droite se signale par de merveilleux exploits!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tes flèches sont aiguës,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des peuples tomberont sous toi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles frapperont au cœur les ennemis du roi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '*Ton trône, ô Dieu, est éternel.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le sceptre de ton règne est un sceptre de justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tu aimes la justice et tu détestes la méchanceté;
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est pourquoi, ô Dieu, ton Dieu t'a désigné par onction comme roi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de préférence à tes compagnons, avec une huile de joie.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45.7-8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ton trône… huile de joie: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hébreux 1.8-9
      metadata:
        usfm: HEB.1.8+HEB.1.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' comme se rapportant à Christ.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: La myrrhe, l'aloès et la cannelle parfument tous tes vêtements;
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans les palais d'ivoire les instruments à cordes te réjouissent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Des filles de roi figurent parmi tes bien-aimées;
- type: usfm
  marker: q1
  children:
  - type: text
    text: la reine est à ta droite, parée d'un or venu d'Ophir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ecoute, ma fille, regarde et tends l'oreille,
- type: usfm
  marker: q1
  children:
  - type: text
    text: oublie ton peuple et la maison de ton père.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le roi porte ses désirs sur ta beauté.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puisqu'il est ton seigneur, prosterne-toi devant lui!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Avec des offrandes, les habitants de Tyr
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les plus riches du peuple rechercheront ta faveur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: La fille du roi est toute resplendissante à l'intérieur du palais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle porte un vêtement tissé d'or.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Elle est présentée au roi, revêtue de ses habits brodés;
- type: usfm
  marker: q1
  children:
  - type: text
    text: à sa suite, des jeunes filles, ses compagnes, sont amenées auprès de toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: On les introduit au milieu des réjouissances et de l'allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles entrent dans le palais du roi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tes enfants prendront la place de tes pères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu les établiras princes dans tout le pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Je rappellerai ton nom de génération en génération;
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est pourquoi les peuples te loueront pour toujours et à perpétuité.
