document_id: PSA.45,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les noces du roi
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Au chef de chœur, sur la mélodie «Les lis». Des descendants de Koré. Cantique, chant d'amour.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des filles de roi figurent parmi tes bien-aimées;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la reine est à ta droite, parée d'un or venu d'Ophir.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoute, ma fille, regarde et tends l'oreille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oublie ton peuple et la maison de ton père.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le roi porte ses désirs sur ta beauté.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puisqu'il est ton seigneur, prosterne-toi devant lui!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec des offrandes, les habitants de Tyr
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les plus riches du peuple rechercheront ta faveur.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La fille du roi est toute resplendissante à l'intérieur du palais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle porte un vêtement tissé d'or.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle est présentée au roi, revêtue de ses habits brodés;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à sa suite, des jeunes filles, ses compagnes, sont amenées auprès de toi.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On les introduit au milieu des réjouissances et de l'allégresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles entrent dans le palais du roi.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes enfants prendront la place de tes pères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu les établiras princes dans tout le pays.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je rappellerai ton nom de génération en génération;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est pourquoi les peuples te loueront pour toujours et à perpétuité.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De belles paroles bouillonnent dans mon cœur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je dis: «Mon œuvre est pour le roi.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ma langue soit comme la plume d'un habile écrivain!»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es le plus beau des hommes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la grâce coule de tes lèvres;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est pourquoi Dieu t'a béni pour toujours.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vaillant guerrier, mets ton épée au côté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: signe de ta grandeur et de ta majesté,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, de ta majesté! Sois vainqueur, monte sur ton char,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: défends la vérité, la douceur et la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que ta main droite se signale par de merveilleux exploits!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes flèches sont aiguës,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des peuples tomberont sous toi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles frapperont au cœur les ennemis du roi.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*Ton trône, ô Dieu, est éternel.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le sceptre de ton règne est un sceptre de justice.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu aimes la justice et tu détestes la méchanceté;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est pourquoi, ô Dieu, ton Dieu t'a désigné par onction comme roi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de préférence à tes compagnons, avec une huile de joie.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.7-8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ton trône… huile de joie: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hébreux 1.8-9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' comme se rapportant à Christ.'
      marker-yv: yv-n
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La myrrhe, l'aloès et la cannelle parfument tous tes vêtements;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans les palais d'ivoire les instruments à cordes te réjouissent.
