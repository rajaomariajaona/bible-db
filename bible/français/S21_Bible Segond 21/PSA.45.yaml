document_id: PSA.45,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les noces du roi
  - type: text
    content: Au chef de chœur, sur la mélodie «Les lis». Des descendants de Koré. Cantique, chant d'amour.
  '10':
  - type: text
    content: Des filles de roi figurent parmi tes bien-aimées;
  - type: text
    content: la reine est à ta droite, parée d'un or venu d'Ophir.
  '11':
  - type: text
    content: Ecoute, ma fille, regarde et tends l'oreille,
  - type: text
    content: oublie ton peuple et la maison de ton père.
  '12':
  - type: text
    content: Le roi porte ses désirs sur ta beauté.
  - type: text
    content: Puisqu'il est ton seigneur, prosterne-toi devant lui!
  '13':
  - type: text
    content: Avec des offrandes, les habitants de Tyr
  - type: text
    content: et les plus riches du peuple rechercheront ta faveur.
  '14':
  - type: text
    content: La fille du roi est toute resplendissante à l'intérieur du palais,
  - type: text
    content: elle porte un vêtement tissé d'or.
  '15':
  - type: text
    content: Elle est présentée au roi, revêtue de ses habits brodés;
  - type: text
    content: à sa suite, des jeunes filles, ses compagnes, sont amenées auprès de toi.
  '16':
  - type: text
    content: On les introduit au milieu des réjouissances et de l'allégresse,
  - type: text
    content: elles entrent dans le palais du roi.
  '17':
  - type: text
    content: Tes enfants prendront la place de tes pères,
  - type: text
    content: tu les établiras princes dans tout le pays.
  '18':
  - type: text
    content: Je rappellerai ton nom de génération en génération;
  - type: text
    content: c'est pourquoi les peuples te loueront pour toujours et à perpétuité.
  '2':
  - type: text
    content: De belles paroles bouillonnent dans mon cœur.
  - type: text
    content: 'Je dis: «Mon œuvre est pour le roi.'
  - type: text
    content: Que ma langue soit comme la plume d'un habile écrivain!»
  '3':
  - type: text
    content: Tu es le plus beau des hommes,
  - type: text
    content: la grâce coule de tes lèvres;
  - type: text
    content: c'est pourquoi Dieu t'a béni pour toujours.
  '4':
  - type: text
    content: Vaillant guerrier, mets ton épée au côté,
  - type: text
    content: signe de ta grandeur et de ta majesté,
  '5':
  - type: text
    content: oui, de ta majesté! Sois vainqueur, monte sur ton char,
  - type: text
    content: défends la vérité, la douceur et la justice,
  - type: text
    content: et que ta main droite se signale par de merveilleux exploits!
  '6':
  - type: text
    content: Tes flèches sont aiguës,
  - type: text
    content: des peuples tomberont sous toi;
  - type: text
    content: elles frapperont au cœur les ennemis du roi.
  '7':
  - type: text
    content: '*Ton trône, ô Dieu, est éternel.'
  - type: text
    content: Le sceptre de ton règne est un sceptre de justice.
  '8':
  - type: text
    content: Tu aimes la justice et tu détestes la méchanceté;
  - type: text
    content: c'est pourquoi, ô Dieu, ton Dieu t'a désigné par onction comme roi,
  - type: text
    content: de préférence à tes compagnons, avec une huile de joie.
  - type: note
    content: 'Ton trône… huile de joie: cité en Hébreux 1.8-9 comme se rapportant à Christ.'
  '9':
  - type: text
    content: La myrrhe, l'aloès et la cannelle parfument tous tes vêtements;
  - type: text
    content: dans les palais d'ivoire les instruments à cordes te réjouissent.
