document_id: GEN.45
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Joseph reconnu par ses frères
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Joseph ne parvenait plus à se retenir devant tous ceux qui l''entouraient. Il s''écria: «Faites sortir tout le monde!» si bien qu''il ne resta plus personne avec lui quand il se fit reconnaître par ses frères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il se mit à sangloter. Les Egyptiens l''entendirent et la nouvelle parvint à l''entourage du pharaon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Joseph dit à ses frères: «Je suis Joseph! Mon père est-il encore en vie?» Mais ses frères furent incapables de lui répondre, tant ils étaient troublés de se retrouver devant lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Joseph dit à ses frères: «Approchez-vous de moi» et ils s''approchèrent. Il dit: «Je suis Joseph, votre frère, celui que vous avez vendu à destination de l''Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Maintenant, ne vous tourmentez pas et ne soyez pas fâchés contre vous-mêmes de m''avoir vendu pour que je sois conduit ici, car c''est pour vous sauver la vie que Dieu m''a envoyé ici avant vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Voilà 2 ans que la famine dure dans le pays, et pendant 5 ans encore il n''y aura ni labourage ni moisson. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Dieu m''a envoyé ici avant vous pour vous permettre de subsister dans le pays et pour vous faire vivre en vous accordant une grande délivrance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ce n'est donc pas vous qui m'avez envoyé ici, c'est Dieu. Il m'a établi père
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '45.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Père: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: titre honorifique que l'on donnait aux ministres, aux princes et aux grands seigneurs.
    marker-yv: yv-n
  - type: text
    text: ' du pharaon, seigneur de toute sa maison et gouverneur de toute l''Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dépêchez-vous de remonter vers mon père pour lui annoncer: ‘Voici ce qu''a dit ton fils Joseph: Dieu m''a établi seigneur de toute l''Egypte. Descends vers moi sans tarder! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tu habiteras dans la région de Gosen et tu seras près de moi avec tes enfants et petits-enfants, tes brebis et tes bœufs, ainsi que tout ce qui est à toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Là je te nourrirai, car il y aura encore cinq années de famine. Ainsi tu ne seras pas réduit à la misère, ni toi, ni ta famille ni tout ce qui t''appartient.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Vous voyez de vos yeux, et mon frère Benjamin le voit de ses yeux, que c''est moi-même qui vous parle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Racontez à mon père toute la gloire dont je jouis en Egypte et tout ce que vous avez vu, et dépêchez-vous de faire descendre mon père ici.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Puis il se jeta au cou de son frère Benjamin et pleura. Benjamin pleura aussi à son cou. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Joseph embrassa tous ses frères en pleurant. Après quoi, ses frères discutèrent avec lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le bruit circula au palais du pharaon que les frères de Joseph étaient arrivés, et cette nouvelle plut au pharaon et à ses serviteurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le pharaon dit à Joseph: «Dis à tes frères: ‘Faites ceci: chargez vos bêtes et partez pour le pays de Canaan; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'prenez votre père et vos familles et venez vers moi. Je vous donnerai ce qu''il y a de meilleur en Egypte et vous mangerez les meilleurs produits du pays.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tu as ordre de leur dire: ‘Faites ceci: prenez en Egypte des chariots pour vos enfants et pour vos femmes, amenez votre père et venez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ne regrettez pas ce que vous laisserez, car ce qu'il y a de meilleur dans toute l'Egypte sera pour vous.’»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'C''est ce que firent les fils d''Israël. Joseph leur donna des chariots, conformément à l''ordre du pharaon; il leur donna aussi des provisions pour la route. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il leur donna à tous des vêtements de rechange, mais à Benjamin il donna 300 pièces d''argent et 5 vêtements de rechange. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Il envoya à son père 10 ânes chargés de ce qu''il y avait de meilleur en Egypte ainsi que 10 ânesses chargées de blé, de pain et de nourriture pour le voyage de son père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Puis il laissa partir ses frères. Lorsque ceux-ci partirent, il leur dit: «Ne vous disputez pas en chemin!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ils remontèrent de l''Egypte et arrivèrent dans le pays de Canaan vers leur père Jacob. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ils lui annoncèrent: «Joseph vit encore, et c''est même lui qui gouverne toute l''Egypte.» Cependant, Jacob resta sans réaction parce qu''il ne les croyait pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ils lui rapportèrent alors toutes les paroles que Joseph leur avait dites, et lorsqu''il vit les chariots que Joseph avait envoyés pour le transporter, leur père Jacob se ranima. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Israël dit: «Cela suffit! Mon fils Joseph est encore en vie! Je veux aller le voir avant de mourir.»'
