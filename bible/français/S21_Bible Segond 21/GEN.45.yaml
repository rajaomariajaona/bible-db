document_id: GEN.45,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Joseph reconnu par ses frères
  - type: text
    content: 'Joseph ne parvenait plus à se retenir devant tous ceux qui l''entouraient. Il s''écria: «Faites sortir tout le monde!» si bien qu''il ne resta plus personne avec lui quand il se fit reconnaître par ses frères. '
  '10':
  - type: text
    content: 'Tu habiteras dans la région de Gosen et tu seras près de moi avec tes enfants et petits-enfants, tes brebis et tes bœufs, ainsi que tout ce qui est à toi. '
  '11':
  - type: text
    content: 'Là je te nourrirai, car il y aura encore cinq années de famine. Ainsi tu ne seras pas réduit à la misère, ni toi, ni ta famille ni tout ce qui t''appartient.’ '
  '12':
  - type: text
    content: 'Vous voyez de vos yeux, et mon frère Benjamin le voit de ses yeux, que c''est moi-même qui vous parle. '
  '13':
  - type: text
    content: Racontez à mon père toute la gloire dont je jouis en Egypte et tout ce que vous avez vu, et dépêchez-vous de faire descendre mon père ici.»
  '14':
  - type: text
    content: 'Puis il se jeta au cou de son frère Benjamin et pleura. Benjamin pleura aussi à son cou. '
  '15':
  - type: text
    content: Joseph embrassa tous ses frères en pleurant. Après quoi, ses frères discutèrent avec lui.
  '16':
  - type: text
    content: 'Le bruit circula au palais du pharaon que les frères de Joseph étaient arrivés, et cette nouvelle plut au pharaon et à ses serviteurs. '
  '17':
  - type: text
    content: 'Le pharaon dit à Joseph: «Dis à tes frères: ‘Faites ceci: chargez vos bêtes et partez pour le pays de Canaan; '
  '18':
  - type: text
    content: 'prenez votre père et vos familles et venez vers moi. Je vous donnerai ce qu''il y a de meilleur en Egypte et vous mangerez les meilleurs produits du pays.’ '
  '19':
  - type: text
    content: 'Tu as ordre de leur dire: ‘Faites ceci: prenez en Egypte des chariots pour vos enfants et pour vos femmes, amenez votre père et venez. '
  '2':
  - type: text
    content: 'Il se mit à sangloter. Les Egyptiens l''entendirent et la nouvelle parvint à l''entourage du pharaon. '
  '20':
  - type: text
    content: Ne regrettez pas ce que vous laisserez, car ce qu'il y a de meilleur dans toute l'Egypte sera pour vous.’»
  '21':
  - type: text
    content: 'C''est ce que firent les fils d''Israël. Joseph leur donna des chariots, conformément à l''ordre du pharaon; il leur donna aussi des provisions pour la route. '
  '22':
  - type: text
    content: 'Il leur donna à tous des vêtements de rechange, mais à Benjamin il donna 300 pièces d''argent et 5 vêtements de rechange. '
  '23':
  - type: text
    content: 'Il envoya à son père 10 ânes chargés de ce qu''il y avait de meilleur en Egypte ainsi que 10 ânesses chargées de blé, de pain et de nourriture pour le voyage de son père. '
  '24':
  - type: text
    content: 'Puis il laissa partir ses frères. Lorsque ceux-ci partirent, il leur dit: «Ne vous disputez pas en chemin!»'
  '25':
  - type: text
    content: 'Ils remontèrent de l''Egypte et arrivèrent dans le pays de Canaan vers leur père Jacob. '
  '26':
  - type: text
    content: 'Ils lui annoncèrent: «Joseph vit encore, et c''est même lui qui gouverne toute l''Egypte.» Cependant, Jacob resta sans réaction parce qu''il ne les croyait pas. '
  '27':
  - type: text
    content: 'Ils lui rapportèrent alors toutes les paroles que Joseph leur avait dites, et lorsqu''il vit les chariots que Joseph avait envoyés pour le transporter, leur père Jacob se ranima. '
  '28':
  - type: text
    content: 'Israël dit: «Cela suffit! Mon fils Joseph est encore en vie! Je veux aller le voir avant de mourir.»'
  '3':
  - type: text
    content: 'Joseph dit à ses frères: «Je suis Joseph! Mon père est-il encore en vie?» Mais ses frères furent incapables de lui répondre, tant ils étaient troublés de se retrouver devant lui.'
  '4':
  - type: text
    content: 'Joseph dit à ses frères: «Approchez-vous de moi» et ils s''approchèrent. Il dit: «Je suis Joseph, votre frère, celui que vous avez vendu à destination de l''Egypte. '
  '5':
  - type: text
    content: 'Maintenant, ne vous tourmentez pas et ne soyez pas fâchés contre vous-mêmes de m''avoir vendu pour que je sois conduit ici, car c''est pour vous sauver la vie que Dieu m''a envoyé ici avant vous. '
  '6':
  - type: text
    content: 'Voilà 2 ans que la famine dure dans le pays, et pendant 5 ans encore il n''y aura ni labourage ni moisson. '
  '7':
  - type: text
    content: 'Dieu m''a envoyé ici avant vous pour vous permettre de subsister dans le pays et pour vous faire vivre en vous accordant une grande délivrance. '
  '8':
  - type: text
    content: Ce n'est donc pas vous qui m'avez envoyé ici, c'est Dieu. Il m'a établi père
  - type: note
    content: 'Père: titre honorifique que l''on donnait aux ministres, aux princes et aux grands seigneurs.'
  - type: text
    content: ' du pharaon, seigneur de toute sa maison et gouverneur de toute l''Egypte. '
  '9':
  - type: text
    content: 'Dépêchez-vous de remonter vers mon père pour lui annoncer: ‘Voici ce qu''a dit ton fils Joseph: Dieu m''a établi seigneur de toute l''Egypte. Descends vers moi sans tarder! '
