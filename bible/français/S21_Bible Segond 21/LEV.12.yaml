document_id: LEV.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La purification de la femme après l'accouchement
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Transmets ces instructions aux Israélites: Lorsqu''une femme deviendra enceinte et qu''elle mettra au monde un fils, elle sera impure pendant 7 jours. Elle sera impure comme au moment de ses règles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Le huitième jour, l'enfant sera circoncis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Circoncis: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: l'opération consistant à enlever le prépuce avait été ordonnée par Dieu à Abraham comme signe de son alliance avec lui et avec ses descendants (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Genèse 17.10-14
      metadata:
        usfm: GEN.17.10+GEN.17.11+GEN.17.12+GEN.17.13+GEN.17.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Elle restera encore 33 jours à se purifier de son sang. Jusqu''à ce que prenne fin la période de sa purification, elle ne touchera aucun objet saint et n''ira pas au sanctuaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Si elle donne naissance à une fille, elle sera impure pendant deux semaines, comme au moment de ses règles. Elle restera 66 jours à se purifier de son sang.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '»Lorsque prendra fin la période de sa purification, qu''il s''agisse d''un fils ou d''une fille, elle apportera au prêtre, à l''entrée de la tente de la rencontre, un agneau d''un an pour l''holocauste et un jeune pigeon ou une tourterelle pour le sacrifice d''expiation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le prêtre les sacrifiera devant l''Eternel et fera l''expiation pour elle. Elle sera alors purifiée de sa perte de sang. Telle est la loi pour la femme qui met au monde un fils ou une fille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Si elle n'a pas de quoi se procurer un agneau, elle prendra *deux tourterelles ou deux jeunes pigeons
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Deux tourterelles ou deux jeunes pigeons: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luc 2.24
      metadata:
        usfm: LUK.2.24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' comme offrande de Joseph et Marie pour Jésus encore bébé.'
    marker-yv: yv-n
  - type: text
    text: ', l''un pour l''holocauste, l''autre pour le sacrifice d''expiation. Le prêtre fera l''expiation pour elle et elle sera pure.»'
