document_id: LEV.12,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La purification de la femme après l'accouchement
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '2':
  - type: text
    content: '«Transmets ces instructions aux Israélites: Lorsqu''une femme deviendra enceinte et qu''elle mettra au monde un fils, elle sera impure pendant 7 jours. Elle sera impure comme au moment de ses règles. '
  '3':
  - type: text
    content: Le huitième jour, l'enfant sera circoncis
  - type: note
    content: 'Circoncis: l''opération consistant à enlever le prépuce avait été ordonnée par Dieu à Abraham comme signe de son alliance avec lui et avec ses descendants (Genèse 17.10-14).'
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Elle restera encore 33 jours à se purifier de son sang. Jusqu''à ce que prenne fin la période de sa purification, elle ne touchera aucun objet saint et n''ira pas au sanctuaire. '
  '5':
  - type: text
    content: Si elle donne naissance à une fille, elle sera impure pendant deux semaines, comme au moment de ses règles. Elle restera 66 jours à se purifier de son sang.
  '6':
  - type: text
    content: '»Lorsque prendra fin la période de sa purification, qu''il s''agisse d''un fils ou d''une fille, elle apportera au prêtre, à l''entrée de la tente de la rencontre, un agneau d''un an pour l''holocauste et un jeune pigeon ou une tourterelle pour le sacrifice d''expiation. '
  '7':
  - type: text
    content: 'Le prêtre les sacrifiera devant l''Eternel et fera l''expiation pour elle. Elle sera alors purifiée de sa perte de sang. Telle est la loi pour la femme qui met au monde un fils ou une fille. '
  '8':
  - type: text
    content: Si elle n'a pas de quoi se procurer un agneau, elle prendra *deux tourterelles ou deux jeunes pigeons
  - type: note
    content: 'Deux tourterelles ou deux jeunes pigeons: cité en Luc 2.24 comme offrande de Joseph et Marie pour Jésus encore bébé.'
  - type: text
    content: ', l''un pour l''holocauste, l''autre pour le sacrifice d''expiation. Le prêtre fera l''expiation pour elle et elle sera pure.»'
