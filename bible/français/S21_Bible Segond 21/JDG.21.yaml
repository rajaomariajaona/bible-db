document_id: JDG.21,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'A Mitspa, les hommes d''Israël avaient juré: «Aucun de nous ne donnera sa fille pour femme à un Benjaminite.» '
  '10':
  - type: text
    content: 'Alors l''assemblée envoya 12''000 soldats contre eux en leur donnant cet ordre: «Allez frapper du tranchant de l''épée les habitants de Jabès en Galaad, y compris les femmes et les enfants. '
  '11':
  - type: text
    content: 'Voici ce que vous ferez: vous exterminerez tout homme ainsi que toute femme qui a connu le lit d''un homme.» '
  '12':
  - type: text
    content: 'Ils trouvèrent parmi les habitants de Jabès en Galaad 400 jeunes filles vierges, qui n''avaient pas eu de relations sexuelles avec un homme, et ils les amenèrent dans le camp à Silo, qui se trouve dans le pays de Canaan. '
  '13':
  - type: text
    content: 'Toute l''assemblée envoya des messagers parler aux Benjaminites restés au rocher de Rimmon et leur annoncer la paix. '
  '14':
  - type: text
    content: A ce moment-là, les Benjaminites revinrent et on leur donna les femmes de Jabès en Galaad à qui l'on avait laissé la vie. Mais il n'y en avait pas assez pour tous.
  '15':
  - type: text
    content: 'Le peuple éprouvait des regrets en pensant à Benjamin, car l''Eternel avait créé un vide parmi les tribus d''Israël. '
  '16':
  - type: text
    content: 'Les anciens de l''assemblée dirent: «Que faire pour procurer des femmes à ceux qui restent, puisque les femmes de Benjamin ont été exterminées?» '
  '17':
  - type: text
    content: 'Ils ajoutèrent: «Il faut que les rescapés de Benjamin conservent leur héritage, il ne faut pas qu''une tribu soit effacée d''Israël. '
  '18':
  - type: text
    content: 'Mais nous ne pouvons pas leur donner nos filles en mariage, car nous, les Israélites, nous avons juré: ‘Maudit soit celui qui donnera une femme à un Benjaminite!’» '
  '19':
  - type: text
    content: 'Ils se rappelèrent alors qu''il y avait chaque année une fête de l''Eternel à Silo, qui se trouvait au nord de Béthel, à l''est de la route qui montait de Béthel à Sichem, et au sud de Lebona. '
  '2':
  - type: text
    content: 'Le peuple vint à Béthel, et il y resta devant Dieu jusqu''au soir. Ils se mirent à pleurer abondamment, '
  '20':
  - type: text
    content: 'Alors ils donnèrent cet ordre aux Benjaminites: «Allez vous placer en embuscade dans les vignes. '
  '21':
  - type: text
    content: 'Vous ferez le guet et, lorsque les filles de Silo sortiront pour danser, vous sortirez des vignes, vous enlèverez chacun une des filles de Silo pour faire d''elle votre femme, et vous repartirez dans le pays de Benjamin. '
  '22':
  - type: text
    content: 'Si leur père ou leurs frères viennent se plaindre auprès de nous, nous leur dirons: ‘Accordez-les-nous, car nous n''avons pas pris une femme pour chacun dans la guerre. Ce n''est pas vous qui les leur avez données. Dans ce cas-là, vous seriez coupables.’»'
  '23':
  - type: text
    content: 'C''est ce que firent les Benjaminites. Ils prirent le nombre de femmes nécessaire parmi les danseuses qu''ils enlevèrent, puis ils partirent et retournèrent dans leur héritage. Ils reconstruisirent leurs villes et y habitèrent. '
  '24':
  - type: text
    content: 'A ce moment-là, les Israélites repartirent de là, chacun dans sa tribu et dans son clan. Ils retournèrent chacun dans son héritage. '
  '25':
  - type: text
    content: A cette époque-là, il n'y avait pas de roi en Israël. Chacun faisait ce qui lui semblait bon.
  '3':
  - type: text
    content: 'et ils dirent: «Eternel, Dieu d''Israël, pourquoi cela s''est-il produit en Israël? Pourquoi manque-t-il aujourd''hui une tribu d''Israël?»'
  '4':
  - type: text
    content: 'Le lendemain, le peuple se leva de bon matin. Ils construisirent là un autel et ils offrirent des holocaustes et des sacrifices de communion. '
  '5':
  - type: text
    content: 'Les Israélites dirent: «Dans toutes les tribus d''Israël, qui n''est pas monté à l''assemblée devant l''Eternel?» En effet, on avait fait un serment solennel contre tout homme qui ne monterait pas vers l''Eternel à Mitspa; on avait dit: «Il sera puni de mort.» '
  '6':
  - type: text
    content: 'En outre, les Israélites éprouvaient des regrets en pensant à Benjamin, leur frère, et ils se disaient: «Aujourd''hui une tribu a été supprimée d''Israël. '
  '7':
  - type: text
    content: 'Que faire pour procurer des femmes aux survivants, puisque nous avons juré par l''Eternel de ne pas leur donner nos filles en mariage?» '
  '8':
  - type: text
    content: 'Ils dirent donc: «Y a-t-il quelqu''un, dans les tribus d''Israël, qui ne soit pas monté vers l''Eternel à Mitspa?» Il se trouva que personne de Jabès en Galaad n''était venu au camp, à l''assemblée. '
  '9':
  - type: text
    content: 'On procéda au dénombrement du peuple, et il n''y avait là aucun des habitants de Jabès en Galaad. '
