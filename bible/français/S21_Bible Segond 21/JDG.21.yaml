document_id: JDG.21
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A Mitspa, les hommes d''Israël avaient juré: «Aucun de nous ne donnera sa fille pour femme à un Benjaminite.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le peuple vint à Béthel, et il y resta devant Dieu jusqu''au soir. Ils se mirent à pleurer abondamment, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'et ils dirent: «Eternel, Dieu d''Israël, pourquoi cela s''est-il produit en Israël? Pourquoi manque-t-il aujourd''hui une tribu d''Israël?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le lendemain, le peuple se leva de bon matin. Ils construisirent là un autel et ils offrirent des holocaustes et des sacrifices de communion. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les Israélites dirent: «Dans toutes les tribus d''Israël, qui n''est pas monté à l''assemblée devant l''Eternel?» En effet, on avait fait un serment solennel contre tout homme qui ne monterait pas vers l''Eternel à Mitspa; on avait dit: «Il sera puni de mort.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'En outre, les Israélites éprouvaient des regrets en pensant à Benjamin, leur frère, et ils se disaient: «Aujourd''hui une tribu a été supprimée d''Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Que faire pour procurer des femmes aux survivants, puisque nous avons juré par l''Eternel de ne pas leur donner nos filles en mariage?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils dirent donc: «Y a-t-il quelqu''un, dans les tribus d''Israël, qui ne soit pas monté vers l''Eternel à Mitspa?» Il se trouva que personne de Jabès en Galaad n''était venu au camp, à l''assemblée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'On procéda au dénombrement du peuple, et il n''y avait là aucun des habitants de Jabès en Galaad. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors l''assemblée envoya 12''000 soldats contre eux en leur donnant cet ordre: «Allez frapper du tranchant de l''épée les habitants de Jabès en Galaad, y compris les femmes et les enfants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Voici ce que vous ferez: vous exterminerez tout homme ainsi que toute femme qui a connu le lit d''un homme.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils trouvèrent parmi les habitants de Jabès en Galaad 400 jeunes filles vierges, qui n''avaient pas eu de relations sexuelles avec un homme, et ils les amenèrent dans le camp à Silo, qui se trouve dans le pays de Canaan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Toute l''assemblée envoya des messagers parler aux Benjaminites restés au rocher de Rimmon et leur annoncer la paix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: A ce moment-là, les Benjaminites revinrent et on leur donna les femmes de Jabès en Galaad à qui l'on avait laissé la vie. Mais il n'y en avait pas assez pour tous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le peuple éprouvait des regrets en pensant à Benjamin, car l''Eternel avait créé un vide parmi les tribus d''Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les anciens de l''assemblée dirent: «Que faire pour procurer des femmes à ceux qui restent, puisque les femmes de Benjamin ont été exterminées?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ils ajoutèrent: «Il faut que les rescapés de Benjamin conservent leur héritage, il ne faut pas qu''une tribu soit effacée d''Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mais nous ne pouvons pas leur donner nos filles en mariage, car nous, les Israélites, nous avons juré: ‘Maudit soit celui qui donnera une femme à un Benjaminite!’» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ils se rappelèrent alors qu''il y avait chaque année une fête de l''Eternel à Silo, qui se trouvait au nord de Béthel, à l''est de la route qui montait de Béthel à Sichem, et au sud de Lebona. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Alors ils donnèrent cet ordre aux Benjaminites: «Allez vous placer en embuscade dans les vignes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Vous ferez le guet et, lorsque les filles de Silo sortiront pour danser, vous sortirez des vignes, vous enlèverez chacun une des filles de Silo pour faire d''elle votre femme, et vous repartirez dans le pays de Benjamin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Si leur père ou leurs frères viennent se plaindre auprès de nous, nous leur dirons: ‘Accordez-les-nous, car nous n''avons pas pris une femme pour chacun dans la guerre. Ce n''est pas vous qui les leur avez données. Dans ce cas-là, vous seriez coupables.’»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'C''est ce que firent les Benjaminites. Ils prirent le nombre de femmes nécessaire parmi les danseuses qu''ils enlevèrent, puis ils partirent et retournèrent dans leur héritage. Ils reconstruisirent leurs villes et y habitèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'A ce moment-là, les Israélites repartirent de là, chacun dans sa tribu et dans son clan. Ils retournèrent chacun dans son héritage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: A cette époque-là, il n'y avait pas de roi en Israël. Chacun faisait ce qui lui semblait bon.
