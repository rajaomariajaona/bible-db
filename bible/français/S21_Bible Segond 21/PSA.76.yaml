document_id: PSA.76,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Victoire de la puissance de Dieu
  - type: text
    content: Au chef de chœur, avec instruments à cordes. Psaume, chant d'Asaph.
  '10':
  - type: text
    content: lorsque Dieu s'est levé pour faire justice,
  - type: text
    content: 'pour sauver tous les humbles de la terre. '
  - type: text
    content: – Pause.
  '11':
  - type: text
    content: La fureur de l'homme te célèbre,
  - type: text
    content: tu t'attaches ceux qui échappent à ta colère.
  '12':
  - type: text
    content: Faites des vœux à l'Eternel, votre Dieu, et accomplissez-les!
  - type: text
    content: Que tous ceux qui l'entourent apportent des dons au Dieu terrible!
  '13':
  - type: text
    content: Il abat l'orgueil des princes,
  - type: text
    content: il est redoutable pour les rois de la terre.
  '2':
  - type: text
    content: Dieu s'est fait connaître en Juda,
  - type: text
    content: son nom est grand en Israël.
  '3':
  - type: text
    content: Sa tente est à Salem,
  - type: text
    content: et sa demeure à Sion.
  '4':
  - type: text
    content: C'est là qu'il a brisé les flèches,
  - type: text
    content: 'le bouclier, l''épée et les armes de guerre. '
  - type: text
    content: – Pause.
  '5':
  - type: text
    content: Tu es plus majestueux, plus puissant
  - type: text
    content: que les montagnes riches en proies.
  '6':
  - type: text
    content: Ils ont été dépouillés, ces héros pleins de courage,
  - type: text
    content: ils se sont endormis de leur dernier sommeil;
  - type: text
    content: ils n'ont pas su se défendre, tous ces vaillants hommes.
  '7':
  - type: text
    content: A ta menace, Dieu de Jacob,
  - type: text
    content: cavaliers et chevaux se sont figés.
  '8':
  - type: text
    content: Toi, tu es redoutable.
  - type: text
    content: Qui peut te résister quand ta colère éclate?
  '9':
  - type: text
    content: Du haut du ciel tu as proclamé ta sentence;
  - type: text
    content: la terre, effrayée, s'est tenue tranquille
