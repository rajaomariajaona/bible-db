document_id: PSA.76,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Victoire de la puissance de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Au chef de chœur, avec instruments à cordes. Psaume, chant d'Asaph.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsque Dieu s'est levé pour faire justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'pour sauver tous les humbles de la terre. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La fureur de l'homme te célèbre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu t'attaches ceux qui échappent à ta colère.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faites des vœux à l'Eternel, votre Dieu, et accomplissez-les!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tous ceux qui l'entourent apportent des dons au Dieu terrible!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il abat l'orgueil des princes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est redoutable pour les rois de la terre.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu s'est fait connaître en Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: son nom est grand en Israël.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa tente est à Salem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sa demeure à Sion.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est là qu'il a brisé les flèches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'le bouclier, l''épée et les armes de guerre. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es plus majestueux, plus puissant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que les montagnes riches en proies.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont été dépouillés, ces héros pleins de courage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se sont endormis de leur dernier sommeil;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils n'ont pas su se défendre, tous ces vaillants hommes.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A ta menace, Dieu de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cavaliers et chevaux se sont figés.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toi, tu es redoutable.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui peut te résister quand ta colère éclate?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du haut du ciel tu as proclamé ta sentence;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la terre, effrayée, s'est tenue tranquille
