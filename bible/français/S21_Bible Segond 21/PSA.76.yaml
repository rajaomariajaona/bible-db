document_id: PSA.76
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Victoire de la puissance de Dieu
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur, avec instruments à cordes. Psaume, chant d'Asaph.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Dieu s'est fait connaître en Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: son nom est grand en Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Sa tente est à Salem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa demeure à Sion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: C'est là qu'il a brisé les flèches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'le bouclier, l''épée et les armes de guerre. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu es plus majestueux, plus puissant
- type: usfm
  marker: q1
  children:
  - type: text
    text: que les montagnes riches en proies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils ont été dépouillés, ces héros pleins de courage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se sont endormis de leur dernier sommeil;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils n'ont pas su se défendre, tous ces vaillants hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: A ta menace, Dieu de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: cavaliers et chevaux se sont figés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Toi, tu es redoutable.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui peut te résister quand ta colère éclate?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Du haut du ciel tu as proclamé ta sentence;
- type: usfm
  marker: q1
  children:
  - type: text
    text: la terre, effrayée, s'est tenue tranquille
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: lorsque Dieu s'est levé pour faire justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'pour sauver tous les humbles de la terre. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: La fureur de l'homme te célèbre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu t'attaches ceux qui échappent à ta colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Faites des vœux à l'Eternel, votre Dieu, et accomplissez-les!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tous ceux qui l'entourent apportent des dons au Dieu terrible!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Il abat l'orgueil des princes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est redoutable pour les rois de la terre.
