document_id: PSA.85,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière pour le rétablissement d'Israël
  - type: text
    content: Au chef de chœur. Psaume des descendants de Koré.
  '10':
  - type: text
    content: Oui, son salut est près de ceux qui le craignent,
  - type: text
    content: et ainsi la gloire habitera notre pays.
  '11':
  - type: text
    content: La bonté et la fidélité se rencontrent,
  - type: text
    content: la justice et la paix s'embrassent;
  '12':
  - type: text
    content: la fidélité pousse de la terre,
  - type: text
    content: et la justice se penche du haut du ciel.
  '13':
  - type: text
    content: L'Eternel lui-même accordera le bonheur,
  - type: text
    content: et notre terre donnera ses produits.
  '14':
  - type: text
    content: La justice marchera devant lui
  - type: text
    content: et tracera le chemin devant ses pas.
  '2':
  - type: text
    content: Tu as été favorable à ton pays, Eternel,
  - type: text
    content: tu as rétabli Jacob.
  '3':
  - type: text
    content: Tu as pardonné la faute de ton peuple,
  - type: text
    content: 'tu as couvert tous ses péchés. '
  - type: text
    content: – Pause.
  '4':
  - type: text
    content: Tu as retiré toute ta fureur,
  - type: text
    content: tu as renoncé à ton ardente colère.
  '5':
  - type: text
    content: Rétablis-nous, Dieu de notre salut,
  - type: text
    content: mets fin à ton indignation contre nous!
  '6':
  - type: text
    content: Es-tu irrité contre nous pour toujours?
  - type: text
    content: Ta colère durera-t-elle de génération en génération?
  '7':
  - type: text
    content: Ne veux-tu pas nous rendre la vie,
  - type: text
    content: afin que ton peuple se réjouisse en toi?
  '8':
  - type: text
    content: Eternel, fais-nous voir ta bonté
  - type: text
    content: et accorde-nous ton salut!
  '9':
  - type: text
    content: J'écouterai ce que dit Dieu, l'Eternel,
  - type: text
    content: car il parle de paix à son peuple et à ses fidèles,
  - type: text
    content: pourvu qu'ils ne retombent pas dans la folie.
