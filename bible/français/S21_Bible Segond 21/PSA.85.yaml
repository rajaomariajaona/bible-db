document_id: PSA.85
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière pour le rétablissement d'Israël
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Psaume des descendants de Koré.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tu as été favorable à ton pays, Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as rétabli Jacob.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tu as pardonné la faute de ton peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tu as couvert tous ses péchés. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tu as retiré toute ta fureur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as renoncé à ton ardente colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Rétablis-nous, Dieu de notre salut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mets fin à ton indignation contre nous!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Es-tu irrité contre nous pour toujours?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ta colère durera-t-elle de génération en génération?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ne veux-tu pas nous rendre la vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin que ton peuple se réjouisse en toi?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Eternel, fais-nous voir ta bonté
- type: usfm
  marker: q1
  children:
  - type: text
    text: et accorde-nous ton salut!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: J'écouterai ce que dit Dieu, l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il parle de paix à son peuple et à ses fidèles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pourvu qu'ils ne retombent pas dans la folie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Oui, son salut est près de ceux qui le craignent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ainsi la gloire habitera notre pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: La bonté et la fidélité se rencontrent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la justice et la paix s'embrassent;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: la fidélité pousse de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la justice se penche du haut du ciel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: L'Eternel lui-même accordera le bonheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et notre terre donnera ses produits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: La justice marchera devant lui
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tracera le chemin devant ses pas.
