document_id: 1JN.5,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La foi en Christ et ses effets
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quiconque croit que Jésus est le Messie est né de Dieu, et si quelqu''un aime un père, il aime aussi son enfant. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui croit au Fils de Dieu possède ce témoignage en lui-même; celui qui ne croit pas Dieu fait de lui un menteur, puisqu''il ne croit pas au témoignage que Dieu a rendu au sujet de son Fils. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, voici ce témoignage: Dieu nous a donné la vie éternelle, et cette vie est dans son Fils. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Celui qui a le Fils a la vie, celui qui n'a pas le Fils de Dieu n'a pas la vie.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je vous ai écrit cela, à vous qui croyez au nom du Fils de Dieu, afin que vous sachiez que vous avez la vie éternelle [et que vous continuiez à croire au nom du Fils de Dieu].
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous avons auprès de lui cette assurance: si nous demandons quelque chose conformément à sa volonté, il nous écoute. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et si nous savons qu'il nous écoute, quelle que soit notre demande, nous savons que nous possédons ce que nous lui avons demandé.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si quelqu'un voit son frère commettre un péché qui ne mène pas à la mort, qu'il prie, et Dieu donnera la vie à ce frère; je parle ici de ceux qui commettent un péché ne conduisant pas à la mort. Il y a un péché qui mène à la mort
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qui mène à la mort: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: possible allusion à l'attitude de persistance dans le péché et le rejet de la vérité relative à Jésus-Christ qui caractérisait les hommes dont l'auteur combattait les enseignements erronés.
      marker-yv: yv-n
    - type: text
      text: ', et ce n''est pas pour ce péché-là que je dis de prier. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Toute injustice est un péché, mais tous les péchés ne conduisent pas jusqu'à la mort.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nous savons que, si quelqu'un est né de Dieu, il ne pèche pas. Au contraire, celui qui est né de Dieu se garde lui-même et le mauvais
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le mauvais: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire le diable.
      marker-yv: yv-n
    - type: text
      text: ' ne le touche pas. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous savons que nous sommes de Dieu et que le monde entier est sous la puissance du mal, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous reconnaissons que nous aimons les enfants de Dieu au fait que nous aimons Dieu et respectons ses commandements. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais nous savons aussi que le Fils de Dieu est venu et nous a donné l''intelligence pour connaître le vrai Dieu; et nous sommes unis au vrai Dieu si nous sommes unis à son Fils Jésus-Christ. C''est lui qui est le vrai Dieu et la vie éternelle. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Petits enfants, gardez-vous des idoles!
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, l''amour envers Dieu consiste à respecter ses commandements. Or, ses commandements ne représentent pas un fardeau, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'puisque tout ce qui est né de Dieu remporte la victoire contre le monde, et la victoire qui a triomphé du monde, c''est votre foi. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Qui est victorieux du monde? N'est-ce pas celui qui croit que Jésus est le Fils de Dieu?
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C'est lui, Jésus-Christ, qui est venu à travers l'eau et le sang; non avec l'eau seulement, mais avec l'eau et le sang
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'L''eau et le sang: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: probables allusions au baptême et à la crucifixion de Christ. Certains enseignaient que Jésus était un simple homme et que le Christ, le Fils de Dieu, s'était uni à lui lors de son baptême pour le quitter avant sa mort. Jean insiste sur l'unité de Jésus-Christ le Fils de Dieu, à la fois homme et Dieu du début à la fin de sa carrière terrestre et de son œuvre de salut.
      marker-yv: yv-n
    - type: text
      text: '. Et c''est l''Esprit qui en rend témoignage, parce que l''Esprit est la vérité. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, ils sont trois à rendre témoignage: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: l'Esprit, l'eau et le sang, et les trois sont d'accord.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si nous recevons le témoignage des hommes, reconnaissons que le témoignage de Dieu est plus grand car c''est le témoignage de Dieu, celui qu''il a rendu à propos de son Fils. '
