document_id: HEB.9,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le sanctuaire de la nouvelle alliance
  - type: text
    content: 'La première alliance avait donc des règles relatives au culte et un sanctuaire terrestre. '
  '10':
  - type: text
    content: Avec les aliments, les boissons, les diverses ablutions et les règles relatives au corps, c'étaient des prescriptions imposées seulement jusqu'à une époque de réforme.
  '11':
  - type: text
    content: 'Quant à Christ, il est venu comme grand-prêtre des biens à venir. Il a traversé le tabernacle plus grand et plus parfait qui n''est pas construit par la main de l''homme – c''est-à-dire qui n''appartient pas à cette création – '
  '12':
  - type: text
    content: 'et il est entré une fois pour toutes dans le lieu très saint, non pas avec le sang de boucs et de jeunes taureaux, mais avec son propre sang. Il nous a ainsi obtenu un rachat éternel. '
  '13':
  - type: text
    content: 'En effet, le sang des boucs et des taureaux ainsi que la cendre d''une vache, dont on asperge ceux qui sont souillés, les rendent saints en leur procurant une pureté rituelle. '
  '14':
  - type: text
    content: Si tel est le cas, le sang de Christ, qui s'est offert lui-même à Dieu par l'Esprit éternel comme une victime sans défaut, purifiera d'autant plus votre conscience des œuvres mortes afin que vous serviez le Dieu vivant!
  '15':
  - type: text
    content: 'Voici pourquoi il est le médiateur d''une alliance nouvelle: sa mort est intervenue pour le rachat des transgressions commises sous la première alliance afin que ceux qui ont été appelés reçoivent l''héritage éternel promis. '
  '16':
  - type: text
    content: 'En effet, là où il y a un testament, il est nécessaire que la mort du testateur soit constatée. '
  '17':
  - type: text
    content: 'Un testament n''entre en vigueur qu''en cas de décès, puisqu''il n''a aucun effet tant que le testateur vit. '
  '18':
  - type: text
    content: 'C''est pourquoi, même la première alliance a été inaugurée avec du sang. '
  '19':
  - type: text
    content: 'Après avoir prononcé devant le peuple entier tous les commandements conformément à la loi, Moïse a pris le sang des jeunes taureaux et des boucs ainsi que de l''eau, de la laine écarlate et de l''hysope, et il a aspergé le livre lui-même et tout le peuple en disant: '
  '2':
  - type: text
    content: 'En effet, un tabernacle avait été édifié. La première partie de cette tente, appelée le lieu saint, abritait le chandelier, la table et les pains consacrés. '
  '20':
  - type: text
    content: Voici le sang de l'alliance que Dieu a prescrite pour vous
  - type: text
    content: .
  - type: note
    content: 'Voici… vous: citation d''Exode 24.8.'
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'Il a aussi aspergé avec le sang le tabernacle et tous les ustensiles du culte. '
  '22':
  - type: text
    content: Or, d'après la loi, presque tout est purifié avec du sang et, s'il n'y a pas de sang versé, il n'y a pas de pardon.
  '23':
  - type: text
    content: 'S''il était nécessaire de purifier de cette manière ce qui n''était que l''image des réalités célestes, il fallait que les réalités célestes elles-mêmes soient purifiées par des sacrifices meilleurs encore que ceux-là. '
  '24':
  - type: text
    content: 'En effet, Christ n''est pas entré dans un sanctuaire fait par la main de l''homme, dans une simple copie du véritable, mais il est entré dans le ciel même afin de se présenter maintenant pour nous devant Dieu. '
  '25':
  - type: text
    content: 'Et ce n''est pas pour s''offrir lui-même plusieurs fois qu''il y est entré, comme le grand-prêtre qui entre chaque année dans le sanctuaire pour offrir un autre sang que le sien; '
  '26':
  - type: text
    content: si tel avait été le cas, il aurait dû souffrir plusieurs fois depuis la création du monde. Mais maintenant, à la fin des temps, il s'est révélé une seule fois pour abolir le péché par son sacrifice.
  '27':
  - type: text
    content: 'Il est réservé aux êtres humains de mourir une seule fois, après quoi vient le jugement. '
  '28':
  - type: text
    content: De même, Christ s'est offert une seule fois pour porter les péchés de beaucoup d'hommes, puis il apparaîtra une seconde fois, sans rapport avec le péché
  - type: note
    content: 'Sans… péché: c''est-à-dire pas pour abolir le péché, contrairement à l''objectif de sa première venue.'
  - type: text
    content: ', à ceux qui l''attendent pour leur salut.'
  '3':
  - type: text
    content: 'Derrière le second voile se trouvait la partie du tabernacle appelée le lieu très saint; '
  '4':
  - type: text
    content: elle abritait l'encensoir en or pour les parfums ainsi que l'arche de l'alliance, entièrement recouverte d'or. Ce coffre contenait un vase d'or rempli de manne
  - type: note
    content: 'Manne: nourriture miraculeuse des Israélites dans le désert, dont Dieu avait ordonné de conserver une certaine quantité.'
  - type: text
    content: ', le bâton d''Aaron qui avait fleuri et les tables de l''alliance'
  - type: note
    content: 'Tables de l''alliance: tablettes de pierre portant les dix commandements, données par Dieu à Moïse lors de la conclusion de la première alliance au mont Sinaï.'
  - type: text
    content: '. '
  '5':
  - type: text
    content: Au-dessus de l'arche se trouvaient les glorieux chérubins qui couvraient le propitiatoire
  - type: note
    content: 'Propitiatoire: couvercle du coffre de l''arche de l''alliance; deux chérubins, créatures ailées, avaient été façonnés et placés sur ce couvercle.'
  - type: text
    content: ' de leur ombre. Ce n''est pas le moment de parler en détail là-dessus. '
  '6':
  - type: text
    content: 'L''ensemble étant ainsi disposé, les prêtres qui font le service entrent en tout temps dans la première partie du tabernacle. '
  '7':
  - type: text
    content: Mais dans la seconde, seul le grand-prêtre entre, et ce une fois par an, non sans y apporter du sang qu'il offre pour lui-même et pour les péchés du peuple.
  '8':
  - type: text
    content: 'Le Saint-Esprit montrait par là que le chemin du lieu très saint n''était pas révélé tant que le premier tabernacle était dressé. '
  '9':
  - type: text
    content: 'C''est une illustration pour le temps présent; elle signifie que les dons et les sacrifices présentés ne peuvent pas rendre parfait, sur le plan de la conscience, celui qui prend part à ce culte. '
