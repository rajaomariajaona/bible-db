document_id: HEB.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le sanctuaire de la nouvelle alliance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La première alliance avait donc des règles relatives au culte et un sanctuaire terrestre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'En effet, un tabernacle avait été édifié. La première partie de cette tente, appelée le lieu saint, abritait le chandelier, la table et les pains consacrés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Derrière le second voile se trouvait la partie du tabernacle appelée le lieu très saint; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: elle abritait l'encensoir en or pour les parfums ainsi que l'arche de l'alliance, entièrement recouverte d'or. Ce coffre contenait un vase d'or rempli de manne
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Manne: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nourriture miraculeuse des Israélites dans le désert, dont Dieu avait ordonné de conserver une certaine quantité.
    marker-yv: yv-n
  - type: text
    text: ', le bâton d''Aaron qui avait fleuri et les tables de l''alliance'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Tables de l''alliance: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tablettes de pierre portant les dix commandements, données par Dieu à Moïse lors de la conclusion de la première alliance au mont Sinaï.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Au-dessus de l'arche se trouvaient les glorieux chérubins qui couvraient le propitiatoire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Propitiatoire: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: couvercle du coffre de l'arche de l'alliance; deux chérubins, créatures ailées, avaient été façonnés et placés sur ce couvercle.
    marker-yv: yv-n
  - type: text
    text: ' de leur ombre. Ce n''est pas le moment de parler en détail là-dessus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L''ensemble étant ainsi disposé, les prêtres qui font le service entrent en tout temps dans la première partie du tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mais dans la seconde, seul le grand-prêtre entre, et ce une fois par an, non sans y apporter du sang qu'il offre pour lui-même et pour les péchés du peuple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le Saint-Esprit montrait par là que le chemin du lieu très saint n''était pas révélé tant que le premier tabernacle était dressé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'C''est une illustration pour le temps présent; elle signifie que les dons et les sacrifices présentés ne peuvent pas rendre parfait, sur le plan de la conscience, celui qui prend part à ce culte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Avec les aliments, les boissons, les diverses ablutions et les règles relatives au corps, c'étaient des prescriptions imposées seulement jusqu'à une époque de réforme.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Quant à Christ, il est venu comme grand-prêtre des biens à venir. Il a traversé le tabernacle plus grand et plus parfait qui n''est pas construit par la main de l''homme – c''est-à-dire qui n''appartient pas à cette création – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'et il est entré une fois pour toutes dans le lieu très saint, non pas avec le sang de boucs et de jeunes taureaux, mais avec son propre sang. Il nous a ainsi obtenu un rachat éternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'En effet, le sang des boucs et des taureaux ainsi que la cendre d''une vache, dont on asperge ceux qui sont souillés, les rendent saints en leur procurant une pureté rituelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Si tel est le cas, le sang de Christ, qui s'est offert lui-même à Dieu par l'Esprit éternel comme une victime sans défaut, purifiera d'autant plus votre conscience des œuvres mortes afin que vous serviez le Dieu vivant!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Voici pourquoi il est le médiateur d''une alliance nouvelle: sa mort est intervenue pour le rachat des transgressions commises sous la première alliance afin que ceux qui ont été appelés reçoivent l''héritage éternel promis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'En effet, là où il y a un testament, il est nécessaire que la mort du testateur soit constatée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Un testament n''entre en vigueur qu''en cas de décès, puisqu''il n''a aucun effet tant que le testateur vit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'C''est pourquoi, même la première alliance a été inaugurée avec du sang. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Après avoir prononcé devant le peuple entier tous les commandements conformément à la loi, Moïse a pris le sang des jeunes taureaux et des boucs ainsi que de l''eau, de la laine écarlate et de l''hysope, et il a aspergé le livre lui-même et tout le peuple en disant: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Voici le sang de l'alliance que Dieu a prescrite pour vous
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Voici… vous: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 24.8
      metadata:
        usfm: EXO.24.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il a aussi aspergé avec le sang le tabernacle et tous les ustensiles du culte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Or, d'après la loi, presque tout est purifié avec du sang et, s'il n'y a pas de sang versé, il n'y a pas de pardon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'S''il était nécessaire de purifier de cette manière ce qui n''était que l''image des réalités célestes, il fallait que les réalités célestes elles-mêmes soient purifiées par des sacrifices meilleurs encore que ceux-là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'En effet, Christ n''est pas entré dans un sanctuaire fait par la main de l''homme, dans une simple copie du véritable, mais il est entré dans le ciel même afin de se présenter maintenant pour nous devant Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Et ce n''est pas pour s''offrir lui-même plusieurs fois qu''il y est entré, comme le grand-prêtre qui entre chaque année dans le sanctuaire pour offrir un autre sang que le sien; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: si tel avait été le cas, il aurait dû souffrir plusieurs fois depuis la création du monde. Mais maintenant, à la fin des temps, il s'est révélé une seule fois pour abolir le péché par son sacrifice.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il est réservé aux êtres humains de mourir une seule fois, après quoi vient le jugement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: De même, Christ s'est offert une seule fois pour porter les péchés de beaucoup d'hommes, puis il apparaîtra une seconde fois, sans rapport avec le péché
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sans… péché: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire pas pour abolir le péché, contrairement à l'objectif de sa première venue.
    marker-yv: yv-n
  - type: text
    text: ', à ceux qui l''attendent pour leur salut.'
