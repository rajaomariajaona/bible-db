document_id: 2CH.35,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Célébration de la Pâque
  - type: text
    content: 'Josias célébra la Pâque en l''honneur de l''Eternel à Jérusalem et l''on égorgea l''agneau pascal le quatorzième jour du premier mois. '
  '10':
  - type: text
    content: 'Le service s''organisa, et les prêtres et les Lévites occupèrent leur place selon leurs divisions, d''après l''ordre du roi. '
  '11':
  - type: text
    content: 'Ils égorgèrent les victimes de la Pâque. Les prêtres faisaient l''aspersion du sang qu''ils recevaient des Lévites et les Lévites enlevaient la peau des victimes. '
  '12':
  - type: text
    content: 'Ils mettaient les éléments destinés aux holocaustes à part pour les donner aux différentes familles des membres du peuple, afin qu''ils les offrent à l''Eternel conformément à ce qui est écrit dans le livre de Moïse; ce fut le cas pour les bœufs. '
  '13':
  - type: text
    content: 'Ils firent cuire l''agneau pascal au feu, conformément aux règles. Quant aux choses saintes, on les fit cuire dans des marmites, des chaudrons et des poêles. Puis ils s''empressèrent de les distribuer à tout le peuple. '
  '14':
  - type: text
    content: 'Ensuite ils préparèrent ce qui était pour eux et pour les prêtres. En effet, les prêtres, les descendants d''Aaron, furent occupés jusqu''à la nuit à offrir les holocaustes et les graisses. C''est pourquoi les Lévites préparèrent ce qui était pour eux et pour les prêtres, les descendants d''Aaron. '
  '15':
  - type: text
    content: Les musiciens, les descendants d'Asaph, étaient à leur place, conformément aux ordres de David, d'Asaph, d'Héman et de Jeduthun, le voyant du roi, et les portiers se tenaient à chaque porte; ils n'eurent pas à s'écarter de leur service, car leurs frères, les Lévites, préparèrent ce qui leur était destiné.
  '16':
  - type: text
    content: 'Ainsi, tout le service de l''Eternel pour célébrer la Pâque et pour offrir des holocaustes sur l''autel de l''Eternel fut organisé ce jour-là, conformément à l''ordre du roi Josias. '
  '17':
  - type: text
    content: 'Les Israélites qui se trouvaient là célébrèrent la Pâque à ce moment-là et la fête des pains sans levain pendant 7 jours. '
  '18':
  - type: text
    content: 'Aucune Pâque pareille à celle-là n''avait été célébrée en Israël depuis l''époque du prophète Samuel, et aucun des rois d''Israël n''avait célébré une Pâque pareille à celle que célébrèrent Josias, les prêtres, les Lévites, tout Juda, les Israélites qui se trouvaient là et les habitants de Jérusalem. '
  '19':
  - type: text
    content: Ce fut la dix-huitième année du règne de Josias que cette Pâque fut célébrée.
  - type: heading
    content: Mort de Josias
  '2':
  - type: text
    content: 'Il établit les prêtres dans leurs fonctions et les encouragea au service de la maison de l''Eternel. '
  '20':
  - type: text
    content: 'Après tout cela, après que Josias eut réparé la maison de l''Eternel, Néco, le roi d''Egypte, monta pour combattre à Karkemish, vers l''Euphrate. Josias marcha à sa rencontre, '
  '21':
  - type: text
    content: 'et Néco lui envoya des messagers pour dire: «Que me veux-tu, roi de Juda? Ce n''est pas contre toi que je viens aujourd''hui, c''est contre une dynastie avec laquelle je suis en guerre. Dieu m''a dit de me dépêcher. Ne t''oppose pas à Dieu, puisqu''il est avec moi, de peur qu''il ne te détruise.» '
  '22':
  - type: text
    content: 'Mais Josias ne s''écarta pas de son chemin et il se déguisa pour l''attaquer, sans écouter les paroles de Néco, qui venaient pourtant de Dieu. Il s''avança pour combattre dans la vallée de Meguiddo. '
  '23':
  - type: text
    content: 'Les archers tirèrent sur le roi Josias et le roi dit à ses serviteurs: «Emmenez-moi, car je suis gravement blessé.» '
  '24':
  - type: text
    content: 'Ses serviteurs le retirèrent du char pour le faire monter sur son deuxième char et l''amenèrent à Jérusalem. Il mourut et fut enterré dans le tombeau de ses ancêtres. Tout Juda et Jérusalem pleurèrent Josias. '
  '25':
  - type: text
    content: Jérémie fit une complainte sur lui; tous les chanteurs et toutes les chanteuses ont parlé de lui dans leurs complaintes jusqu'à aujourd'hui, et ils en ont fait une prescription pour Israël. Ces chants sont écrits dans les Complaintes.
  '26':
  - type: text
    content: 'Le reste des actes de Josias et sa piété conforme à ce qui est prescrit dans la loi de l''Eternel, '
  '27':
  - type: text
    content: ses actes, des premiers aux derniers, cela est décrit dans les annales des rois d'Israël et de Juda.
  '3':
  - type: text
    content: 'Il dit aux Lévites qui enseignaient tout Israël et qui étaient consacrés à l''Eternel: «Placez l''arche sainte dans le temple qu''a construit Salomon, fils de David, le roi d''Israël; vous n''avez plus à la porter sur l''épaule. Servez désormais l''Eternel, votre Dieu, et son peuple, Israël. '
  '4':
  - type: text
    content: 'Tenez-vous prêts par famille selon vos divisions, suivant les prescriptions de David, le roi d''Israël, et de son fils Salomon. '
  '5':
  - type: text
    content: 'Occupez votre place dans le sanctuaire en fonction des différentes familles définies pour vos frères, les membres du peuple, et de la répartition des familles des Lévites. '
  '6':
  - type: text
    content: Sacrifiez l'agneau pascal, consacrez-vous et préparez-le pour vos frères en vous conformant à la parole de l'Eternel transmise par Moïse.»
  '7':
  - type: text
    content: 'Josias préleva pour les membres du peuple, pour tous ceux qui se trouvaient là, des agneaux et des chevreaux au nombre de 30''000, le tout pour la Pâque, ainsi que 3000 bœufs; cela fut pris sur les biens du roi. '
  '8':
  - type: text
    content: 'Ses chefs prélevèrent aussi des offrandes volontaires pour le peuple, les prêtres et les Lévites. Hilkija, Zacharie et Jehiel, qui étaient responsables de la maison de Dieu, donnèrent 2600 agneaux et 300 bœufs aux prêtres pour la Pâque. '
  '9':
  - type: text
    content: Conania, Shemaeja et Nathanaël, ses frères, Hashabia, Jeïel et Jozabad, chefs des Lévites, donnèrent 5000 agneaux et 500 bœufs aux Lévites pour la Pâque.
