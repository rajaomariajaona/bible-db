document_id: ROM.14,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Accueillez celui qui est faible dans la foi sans discuter ses opinions. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Mais toi, pourquoi juges-tu ton frère? Ou toi, pourquoi méprises-tu ton frère? Nous comparaîtrons tous, en effet, devant le tribunal de Christ, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'car il est écrit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Je suis vivant, dit le Seigneur, chacun pliera le genou devant moi et toute langue rendra gloire à Dieu
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je suis… à Dieu: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 45.23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ainsi donc, chacun de nous rendra compte à Dieu pour lui-même. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ne nous jugeons donc plus les uns les autres, mais veillez plutôt à ne pas placer d'obstacle ou de piège devant votre frère.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Je sais et je suis convaincu dans le Seigneur Jésus que rien n''est impur en soi, mais si quelqu''un considère telle chose comme impure, alors elle est impure pour lui. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Si ton frère est attristé à cause de ce que tu manges, tu ne marches plus selon l''amour. Ne cause pas, par ta nourriture, la perte de celui pour lequel Christ est mort. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Que ce qui est bon pour vous ne devienne pas un sujet de calomnie. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'En effet, le royaume de Dieu, ce n''est pas le manger et le boire, mais la justice, la paix et la joie, par le Saint-Esprit. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Celui qui sert Christ de cette manière est agréable à Dieu et approuvé des hommes.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ainsi donc, recherchons ce qui contribue à entretenir la paix et à nous faire grandir mutuellement dans la foi. '
  '2':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: L'un a la conviction de pouvoir manger de tout; l'autre, qui est faible dans la foi, ne mange que des légumes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Manger de tout… des légumes: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: allusion probable aux personnes qui respectaient, ou non, les règles de la loi de Moïse relatives à la nourriture, ou à celles qui répugnaient, ou non, à consommer des viandes sacrifiées aux idoles.
      marker-yv: yv-n
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Pour de la nourriture, ne détruis pas l''œuvre de Dieu. Certes, tout est pur, mais il est mal de manger quelque chose si cela représente un obstacle pour quelqu''un. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Il est bien de ne pas manger de viande, de ne pas boire de vin et de t''abstenir de ce qui peut être pour ton frère un obstacle, [un piège ou une source de faiblesse]. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Cette foi que tu as, garde-la pour toi devant Dieu. Heureux celui qui ne se condamne pas lui-même par ce qu''il approuve! '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Mais celui qui a des doutes au sujet de ce qu'il mange est condamné, parce qu'il n'agit pas par une conviction de foi. Tout ce qui ne provient pas d'une conviction de foi est péché.
  '3':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Que celui qui mange de tout ne méprise pas celui qui ne le fait pas, et que celui qui ne mange pas de tout ne juge pas celui qui le fait, car Dieu l''a accueilli. '
  '4':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Qui es-tu pour juger le serviteur d'un autre? Qu'il tienne bon ou qu'il tombe, cela regarde son seigneur. Mais il tiendra bon, car Dieu a le pouvoir de l'affermir.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: L'un fait une différence entre les jours, un autre les estime tous égaux. Que chacun ait dans son esprit une pleine conviction.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Celui qui fait une distinction entre les jours le fait pour le Seigneur [et celui qui ne fait pas de distinction le fait aussi pour le Seigneur]. Celui qui mange de tout, c''est pour le Seigneur qu''il le fait, puisqu''il exprime sa reconnaissance à Dieu. Celui qui ne mange pas de tout le fait aussi pour le Seigneur, et il est reconnaissant envers Dieu. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'En effet, aucun de nous ne vit pour lui-même et aucun ne meurt pour lui-même: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'si nous vivons, c''est pour le Seigneur que nous vivons, et si nous mourons, c''est pour le Seigneur que nous mourons. Ainsi, soit que nous vivions, soit que nous mourions, nous appartenons au Seigneur. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'En effet, Christ est mort et [il est ressuscité,] il est revenu à la vie pour être le Seigneur des morts et des vivants. '
