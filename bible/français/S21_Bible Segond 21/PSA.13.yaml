document_id: PSA.13,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Appel à l'intervention de Dieu
  - type: text
    content: Au chef de chœur. Psaume de David.
  '2':
  - type: text
    content: Jusqu'à quand, Eternel, m'oublieras-tu sans cesse?
  - type: text
    content: Jusqu'à quand me cacheras-tu ton visage?
  '3':
  - type: text
    content: Jusqu'à quand aurai-je des soucis dans mon âme,
  - type: text
    content: et chaque jour des chagrins dans mon cœur?
  - type: text
    content: Jusqu'à quand mon ennemi s'attaquera-t-il à moi?
  '4':
  - type: text
    content: Regarde, réponds-moi, Eternel, mon Dieu!
  - type: text
    content: Donne la lumière à mes yeux,
  - type: text
    content: afin que je ne m'endorme pas du sommeil de la mort!
  '5':
  - type: text
    content: 'En effet, mon ennemi pourrait dire: «Je l''ai vaincu»,'
  - type: text
    content: et mes adversaires se réjouir en me voyant ébranlé.
  '6':
  - type: text
    content: Moi, j'ai confiance en ta bonté,
  - type: text
    content: j'ai de la joie dans le cœur à cause de ton salut.
  - type: text
    content: Je veux chanter en l'honneur de l'Eternel, car il m'a fait du bien.
