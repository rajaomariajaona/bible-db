document_id: PSA.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Appel à l'intervention de Dieu
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Jusqu'à quand, Eternel, m'oublieras-tu sans cesse?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusqu'à quand me cacheras-tu ton visage?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Jusqu'à quand aurai-je des soucis dans mon âme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et chaque jour des chagrins dans mon cœur?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusqu'à quand mon ennemi s'attaquera-t-il à moi?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Regarde, réponds-moi, Eternel, mon Dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Donne la lumière à mes yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin que je ne m'endorme pas du sommeil de la mort!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'En effet, mon ennemi pourrait dire: «Je l''ai vaincu»,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mes adversaires se réjouir en me voyant ébranlé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Moi, j'ai confiance en ta bonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ai de la joie dans le cœur à cause de ton salut.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je veux chanter en l'honneur de l'Eternel, car il m'a fait du bien.
