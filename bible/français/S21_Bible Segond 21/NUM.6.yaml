document_id: NUM.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Loi sur le naziréat
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Transmets ces instructions aux Israélites: Lorsque quelqu''un, homme ou femme, se consacrera tout particulièrement à l''Eternel en faisant vœu de naziréat, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'il s''abstiendra de vin et de boisson alcoolisée. Il ne boira ni vinaigre fait avec du vin, ni vinaigre fait avec une boisson alcoolisée. Il ne boira d''aucune liqueur tirée des raisins et il ne mangera pas de raisins, ni frais ni secs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pendant toute la période de sa consécration, il ne mangera rien de ce qui provient de la vigne, depuis les pépins jusqu''à la peau du raisin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Pendant toute la durée de son vœu de naziréat, le rasoir ne passera pas sur sa tête. Il sera saint jusqu''à ce que prenne fin la période pour laquelle il s''est consacré à l''Eternel. Il laissera pousser librement ses cheveux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Pendant toute sa période de mise à part pour l''Eternel, il ne s''approchera pas d''une personne morte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il ne se rendra pas impur à la mort de son père, de sa mère, de son frère ou de sa sœur, car il porte sur sa tête la consécration de son Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Pendant toute sa période de mise à part, il sera consacré à l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Si quelqu''un meurt subitement près de lui et que sa tête consacrée devienne ainsi impure, il se rasera la tête le jour de sa purification, il se la rasera le septième jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le huitième jour, il apportera au prêtre 2 tourterelles ou 2 jeunes pigeons, à l''entrée de la tente de la rencontre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le prêtre sacrifiera l''un en sacrifice d''expiation et l''autre comme holocauste, et il fera pour lui l''expiation du péché commis à cause de ce mort. Le naziréen reconsacrera ainsi sa tête ce jour-là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il consacrera de nouveau à l'Eternel la période de son naziréat et il offrira un agneau d'un an en sacrifice de culpabilité. Les jours précédents ne seront pas comptés parce que son naziréat a été rendu impur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '»Voici la loi relative au naziréen. Le jour où prendra fin sa période de consécration, on le fera venir à l''entrée de la tente de la rencontre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il présentera son offrande à l''Eternel: un agneau d''un an et sans défaut pour l''holocauste, une brebis d''un an et sans défaut pour le sacrifice d''expiation et un bélier sans défaut pour le sacrifice de communion; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'une corbeille de pains sans levain, de gâteaux de fleur de farine pétris à l''huile et de galettes sans levain arrosées d''huile, avec l''offrande végétale et les offrandes liquides qui les accompagnent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le prêtre présentera ces éléments devant l''Eternel et il offrira sa victime expiatoire et son holocauste. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il offrira le bélier en sacrifice de communion à l''Eternel, en plus de la corbeille de pains sans levain, avec l''offrande végétale et l''offrande liquide qui l''accompagnent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le naziréen rasera sa tête consacrée à l''entrée de la tente de la rencontre. Il prendra les cheveux de sa tête consacrée et les mettra sur le feu qui brûle sous le sacrifice de communion. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le prêtre prendra la cuisse cuite du bélier, un gâteau sans levain de la corbeille et une galette sans levain. Il les posera sur les mains du naziréen une fois que celui-ci aura rasé sa tête consacrée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le prêtre fera pour eux le geste de présentation devant l''Eternel: c''est une chose sainte qui appartient au prêtre, avec la poitrine qu''on a présentée et la cuisse prélevée. Ensuite, le naziréen pourra boire du vin.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: »Telle est la loi pour celui qui fait vœu de naziréat. Telle est son offrande à l'Eternel pour son naziréat, en plus de ce que lui permettront ses ressources. Il accomplira ce qui est ordonné pour le vœu qu'il a fait conformément à la loi de son naziréat.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paroles de bénédiction
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '«Transmets ces instructions à Aaron et à ses fils: Voici comment vous bénirez les Israélites. Vous leur direz: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '‘Que l''Eternel te bénisse et te garde! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Que l''Eternel fasse briller son visage sur toi et t''accorde sa grâce! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Que l''Eternel se tourne vers toi et te donne la paix!’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: C'est ainsi qu'ils mettront mon nom sur les Israélites et je les bénirai.»
