document_id: ISA.29,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Malédiction sur Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Malheur à Ariel, oui, à Ariel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la ville où David a installé son camp!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ajoutez une année à celle-ci,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: laissez les fêtes accomplir leur cycle,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: En effet, l'Eternel a déversé sur vous *un esprit de torpeur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Un esprit de torpeur: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'expression reprise en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Romains 11.8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prophètes, il a fermé vos yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voyants, il a couvert votre tête.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Toute cette vision est devenue pour vous pareille aux mots d'un livre cacheté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'que l''on donne à un homme qui sait lire en lui disant:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Lis donc ceci!»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il répond: «Je ne peux pas,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il est cacheté.»
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Elle est devenue pareille à un livre que l'on donne
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'à un homme qui ne sait pas lire en lui disant:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Lis donc ceci!»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il répond: «Je ne sais pas lire.»'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Le Seigneur dit: «*Ce peuple s''approche de moi,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il m'honore de la bouche et des lèvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais son cœur est éloigné de moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la crainte qu'il a de moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: n'est qu'un commandement humain, une leçon apprise.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ce peuple… apprise: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité par Jésus en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matthieu 15.8-9
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Marc 7.6-7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' pour dénoncer la superficialité de certains de ses contemporains.'
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: C'est pourquoi, je continuerai à étonner ce peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par des merveilles et des miracles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de sorte que *la sagesse de ses sages disparaîtra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'intelligence de ses hommes intelligents devra se cacher
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'La sagesse… cacher: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité par Paul en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Corinthiens 1.19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' pour souligner la folie de la sagesse humaine devant la sagesse de Dieu.'
      marker-yv: yv-n
    - type: text
      text: .»
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Malheur à ceux qui cherchent à s'éloigner le plus possible de l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin de lui cacher leurs intentions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui agissent dans les ténèbres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et qui disent: «Qui peut nous voir? Qui peut savoir ce que nous faisons?»'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Quelle perversité que la vôtre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Va-t-on assimiler le potier à l'argile
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'pour que l''objet puisse dire de celui qui l''a fait:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Il ne m'a pas fabriqué»,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'pour que le vase puisse dire de celui qui le façonne:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Il n'a pas d'intelligence»?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Promesses pour Israël
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Encore très peu de temps
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la forêt du Liban se transformera en verger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que le verger sera assimilé à une forêt.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ce jour-là, les sourds entendront la lecture du livre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, délivrés de l'obscurité et des ténèbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les yeux des aveugles verront.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Les humbles trouveront de plus en plus leur joie en l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les plus pauvres de l'humanité seront remplis d'allégresse grâce au Saint d'Israël.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: puis je harcèlerai Ariel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On n'y entendra plus que plaintes et gémissements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la ville sera pour moi comme une fournaise.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: En effet, l'homme violent ne sera plus là, le moqueur aura disparu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils seront éliminés, tous ceux qui n'attendaient qu'une occasion pour faire le mal,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ceux qui condamnaient un homme pour un mot,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tendaient des pièges à celui qui défendait sa cause à la porte de la ville
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et écartaient le juste par des accusations sans fondement.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: C'est pourquoi, voici ce que dit l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'lui qui a racheté Abraham, à la famille de Jacob:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Désormais Jacob ne rougira plus de honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: désormais son visage ne pâlira plus.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: En effet, lorsque ses enfants verront ce que j'accomplirai au milieu d'eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils reconnaîtront la sainteté de mon nom.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils reconnaîtront la sainteté du Saint de Jacob
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et redouteront le Dieu d'Israël.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Ceux dont l'esprit s'égarait sauront ce qu'est l'intelligence
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les protestataires se laisseront instruire.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: De tous côtés j'installerai mon camp contre toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je t'entourerai de postes armés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je dresserai des retranchements contre toi.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Tu seras abaissée au point que tu parleras par terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que tes propos seront étouffés par la poussière;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ta voix sortira de terre comme celle d'un spectre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c'est de la poussière que tu murmureras tes discours.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mais tes ennemis seront réduits en fine poussière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cette foule d'hommes violents sera emportée comme de la paille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et cela arrivera tout à coup, en un instant.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tu verras l'intervention de l'Eternel, le maître de l'univers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: accompagnée de coups de tonnerre, d'un tremblement de terre et d'un grand bruit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de l'ouragan et de la tempête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de la flamme d'un feu dévorant.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Toute la foule des nations venues combattre Ariel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous ceux qui l'attaqueront, elle et sa forteresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui la harcèleront disparaîtront comme un rêve,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme une vision nocturne.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Toute la foule des nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: venues combattre le mont Sion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sera pareille à celui qui a faim: il rêve qu''il mange'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant de se réveiller, l'estomac vide.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Elle sera pareille à celui qui a soif: il rêve qu''il boit'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant de se réveiller, épuisé, la gorge sèche.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Restez bouche bée, stupéfaits!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Collez-vous les yeux et devenez aveugles!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont ivres, mais ce n'est pas à cause du vin;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils titubent, mais ce n'est pas sous l'effet des liqueurs fortes.
