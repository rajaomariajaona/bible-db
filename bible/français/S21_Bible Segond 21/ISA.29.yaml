document_id: ISA.29,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Malédiction sur Jérusalem
  - type: text
    content: Malheur à Ariel, oui, à Ariel,
  - type: text
    content: la ville où David a installé son camp!
  - type: text
    content: Ajoutez une année à celle-ci,
  - type: text
    content: laissez les fêtes accomplir leur cycle,
  '10':
  - type: text
    content: En effet, l'Eternel a déversé sur vous *un esprit de torpeur
  - type: note
    content: 'Un esprit de torpeur: expression reprise en Romains 11.8.'
  - type: text
    content: .
  - type: text
    content: Prophètes, il a fermé vos yeux,
  - type: text
    content: voyants, il a couvert votre tête.
  '11':
  - type: text
    content: Toute cette vision est devenue pour vous pareille aux mots d'un livre cacheté
  - type: text
    content: 'que l''on donne à un homme qui sait lire en lui disant:'
  - type: text
    content: «Lis donc ceci!»
  - type: text
    content: 'Il répond: «Je ne peux pas,'
  - type: text
    content: car il est cacheté.»
  '12':
  - type: text
    content: Elle est devenue pareille à un livre que l'on donne
  - type: text
    content: 'à un homme qui ne sait pas lire en lui disant:'
  - type: text
    content: «Lis donc ceci!»
  - type: text
    content: 'Il répond: «Je ne sais pas lire.»'
  '13':
  - type: text
    content: 'Le Seigneur dit: «*Ce peuple s''approche de moi,'
  - type: text
    content: il m'honore de la bouche et des lèvres,
  - type: text
    content: mais son cœur est éloigné de moi
  - type: text
    content: et la crainte qu'il a de moi
  - type: text
    content: n'est qu'un commandement humain, une leçon apprise.
  - type: note
    content: 'Ce peuple… apprise: cité par Jésus en Matthieu 15.8-9; Marc 7.6-7 pour dénoncer la superficialité de certains de ses contemporains.'
  '14':
  - type: text
    content: C'est pourquoi, je continuerai à étonner ce peuple
  - type: text
    content: par des merveilles et des miracles,
  - type: text
    content: de sorte que *la sagesse de ses sages disparaîtra
  - type: text
    content: et l'intelligence de ses hommes intelligents devra se cacher
  - type: note
    content: 'La sagesse… cacher: cité par Paul en 1 Corinthiens 1.19 pour souligner la folie de la sagesse humaine devant la sagesse de Dieu.'
  - type: text
    content: .»
  '15':
  - type: text
    content: Malheur à ceux qui cherchent à s'éloigner le plus possible de l'Eternel
  - type: text
    content: afin de lui cacher leurs intentions,
  - type: text
    content: qui agissent dans les ténèbres
  - type: text
    content: 'et qui disent: «Qui peut nous voir? Qui peut savoir ce que nous faisons?»'
  '16':
  - type: text
    content: Quelle perversité que la vôtre!
  - type: text
    content: Va-t-on assimiler le potier à l'argile
  - type: text
    content: 'pour que l''objet puisse dire de celui qui l''a fait:'
  - type: text
    content: «Il ne m'a pas fabriqué»,
  - type: text
    content: 'pour que le vase puisse dire de celui qui le façonne:'
  - type: text
    content: «Il n'a pas d'intelligence»?
  - type: heading
    content: Promesses pour Israël
  '17':
  - type: text
    content: Encore très peu de temps
  - type: text
    content: et la forêt du Liban se transformera en verger,
  - type: text
    content: tandis que le verger sera assimilé à une forêt.
  '18':
  - type: text
    content: Ce jour-là, les sourds entendront la lecture du livre
  - type: text
    content: et, délivrés de l'obscurité et des ténèbres,
  - type: text
    content: les yeux des aveugles verront.
  '19':
  - type: text
    content: Les humbles trouveront de plus en plus leur joie en l'Eternel
  - type: text
    content: et les plus pauvres de l'humanité seront remplis d'allégresse grâce au Saint d'Israël.
  '2':
  - type: text
    content: puis je harcèlerai Ariel.
  - type: text
    content: On n'y entendra plus que plaintes et gémissements,
  - type: text
    content: et la ville sera pour moi comme une fournaise.
  '20':
  - type: text
    content: En effet, l'homme violent ne sera plus là, le moqueur aura disparu.
  - type: text
    content: Ils seront éliminés, tous ceux qui n'attendaient qu'une occasion pour faire le mal,
  '21':
  - type: text
    content: ceux qui condamnaient un homme pour un mot,
  - type: text
    content: tendaient des pièges à celui qui défendait sa cause à la porte de la ville
  - type: text
    content: et écartaient le juste par des accusations sans fondement.
  '22':
  - type: text
    content: C'est pourquoi, voici ce que dit l'Eternel,
  - type: text
    content: 'lui qui a racheté Abraham, à la famille de Jacob:'
  - type: text
    content: Désormais Jacob ne rougira plus de honte,
  - type: text
    content: désormais son visage ne pâlira plus.
  '23':
  - type: text
    content: En effet, lorsque ses enfants verront ce que j'accomplirai au milieu d'eux,
  - type: text
    content: ils reconnaîtront la sainteté de mon nom.
  - type: text
    content: Ils reconnaîtront la sainteté du Saint de Jacob
  - type: text
    content: et redouteront le Dieu d'Israël.
  '24':
  - type: text
    content: Ceux dont l'esprit s'égarait sauront ce qu'est l'intelligence
  - type: text
    content: et les protestataires se laisseront instruire.
  '3':
  - type: text
    content: De tous côtés j'installerai mon camp contre toi,
  - type: text
    content: je t'entourerai de postes armés,
  - type: text
    content: je dresserai des retranchements contre toi.
  '4':
  - type: text
    content: Tu seras abaissée au point que tu parleras par terre
  - type: text
    content: et que tes propos seront étouffés par la poussière;
  - type: text
    content: ta voix sortira de terre comme celle d'un spectre,
  - type: text
    content: et c'est de la poussière que tu murmureras tes discours.
  '5':
  - type: text
    content: Mais tes ennemis seront réduits en fine poussière,
  - type: text
    content: cette foule d'hommes violents sera emportée comme de la paille,
  - type: text
    content: et cela arrivera tout à coup, en un instant.
  '6':
  - type: text
    content: Tu verras l'intervention de l'Eternel, le maître de l'univers,
  - type: text
    content: accompagnée de coups de tonnerre, d'un tremblement de terre et d'un grand bruit,
  - type: text
    content: de l'ouragan et de la tempête,
  - type: text
    content: de la flamme d'un feu dévorant.
  '7':
  - type: text
    content: Toute la foule des nations venues combattre Ariel,
  - type: text
    content: tous ceux qui l'attaqueront, elle et sa forteresse,
  - type: text
    content: et qui la harcèleront disparaîtront comme un rêve,
  - type: text
    content: comme une vision nocturne.
  '8':
  - type: text
    content: Toute la foule des nations
  - type: text
    content: venues combattre le mont Sion
  - type: text
    content: 'sera pareille à celui qui a faim: il rêve qu''il mange'
  - type: text
    content: avant de se réveiller, l'estomac vide.
  - type: text
    content: 'Elle sera pareille à celui qui a soif: il rêve qu''il boit'
  - type: text
    content: avant de se réveiller, épuisé, la gorge sèche.
  '9':
  - type: text
    content: Restez bouche bée, stupéfaits!
  - type: text
    content: Collez-vous les yeux et devenez aveugles!
  - type: text
    content: Ils sont ivres, mais ce n'est pas à cause du vin;
  - type: text
    content: ils titubent, mais ce n'est pas sous l'effet des liqueurs fortes.
