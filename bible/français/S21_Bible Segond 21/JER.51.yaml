document_id: JER.51,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais faire se lever contre Babylone
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et contre les habitants de la Babylonie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un vent destructeur.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: L'Eternel nous a fait justice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Venez et racontons dans Sion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'œuvre de l'Eternel, notre Dieu!»
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Affûtez les flèches et remplissez les carquois!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel a réveillé l'esprit des rois de Médie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce que son plan est de détruire Babylone.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, c'est une vengeance de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la vengeance de son temple.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Dressez un étendard vers les murs de Babylone!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Renforcez la garde, postez des sentinelles, placez des embuscades,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l'Eternel a pris une décision,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il accomplit les paroles qu'il a prononcées à l'intention des habitants de Babylone.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Toi qui habites près des grandes eaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui possèdes de grands trésors,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ta fin est arrivée, tes profits malhonnêtes ont atteint leur limite!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'L''Eternel, le maître de l''univers, en a fait le serment par lui-même:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Oui, je te remplirai d'hommes pareils à un nuage de sauterelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils pousseront des cris de guerre contre toi.»
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: C'est lui qui a fait la terre par sa puissance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a fondé le monde par sa sagesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a déployé le ciel par son intelligence.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: A sa voix, l'eau gronde dans le ciel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fait monter les nuages des extrémités de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il déclenche les éclairs et la pluie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il tire le vent de ses trésors.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tout homme est dépassé, même les plus savants.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout orfèvre est honteux de sa sculpture sacrée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'car son idole n''est que mensonge:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le souffle de la vie n'habite pas dans les idoles.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Elles sont sans consistance, ridicules.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand le moment sera venu d'intervenir contre elles, elles disparaîtront.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Celui qui est le bien de Jacob n'est pas comme elles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c'est lui qui a tout façonné.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël est la tribu qui lui appartient.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel, le maître de l'univers, voilà quel est son nom.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: J'envoie contre Babylone des étrangers qui la disperseront
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui videront son pays.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils fondront de tous côtés sur elle, le jour du malheur.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tu m'as servi de marteau, d'arme de guerre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'ai mis en pièces par toi des nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par toi j'ai détruit des royaumes,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: par toi j'ai mis en pièces le cheval et son cavalier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par toi j'ai mis en pièces le char et celui qui le conduisait,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: par toi j'ai mis en pièces l'homme et la femme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par toi j'ai mis en pièces le vieillard et l'enfant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par toi j'ai mis en pièces le jeune homme et la jeune fille,
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: par toi j'ai mis en pièces le berger et son troupeau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par toi j'ai mis en pièces le cultivateur et sa paire de bœufs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par toi j'ai mis en pièces les gouverneurs et les magistrats.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Sous vos yeux, je rendrai à Babylone et à tous les habitants de la Babylonie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout le mal qu'ils ont fait à Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l'Eternel.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Oui, je m'en prends à toi, montagne de destruction, déclare l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi qui détruis toute la terre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je déploierai ma puissance contre toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te précipiterai du haut des rochers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je ferai de toi une montagne carbonisée.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: On ne pourra tirer de toi ni pierres angulaires ni pierres de fondation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tu seras un désert pour toujours, déclare l'Eternel.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Dressez un étendard dans le pays!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sonnez de la trompette parmi les nations!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mettez à part des nations aptes à s'attaquer à elle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mobilisez contre elle les royaumes d'Ararat, de Minni et d'Ashkenaz!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Postez des officiers contre elle!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Faites avancer les chevaux comme un nuage de sauterelles!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Mettez à part contre elle les nations, les rois de Médie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses gouverneurs et tous ses magistrats,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tout le territoire placé sous leur domination!
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: La terre tremble, elle est bouleversée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'car les projets de l''Eternel contre Babylone s''accomplissent:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il va faire de la région de Babylone un désert inhabité.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Qu'on tende l'arc contre celui qui tend son arc
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et contre celui qui fait le fier dans sa cuirasse!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N'épargnez pas ses jeunes hommes!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vouez à la destruction toute son armée!
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Les guerriers de Babylone cessent de combattre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils restent dans les forteresses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur courage s'est éteint, ils sont devenus comme des femmelettes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On a mis le feu aux habitations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on a brisé les verrous.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Les coursiers se relaient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les messagers se croisent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour annoncer au roi de Babylone
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que sa ville est prise de tous les côtés,
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: que les passages sont occupés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les marais embrasés par le feu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les hommes de guerre terrifiés.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'En effet, voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La fille de Babylone est comme une surface de terrain qu'il est temps de piétiner.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Encore un peu de temps et le moment de la moisson sera venu pour elle.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: «Nebucadnetsar, roi de Babylone, m'a dévorée, m'a dépouillée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il m'a laissée pareille à un vase vide.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tel un dragon, il m'a engloutie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a rempli son ventre de ce que j'avais de précieux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il m'a chassée.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Que la violence dont j'ai été victime retombe sur Babylone!»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dit l'habitante de Sion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Que mon sang retombe sur les habitants de la Babylonie!»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dit Jérusalem.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'C''est pourquoi, voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais défendre ta cause,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te vengerai!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je mettrai à sec la mer de Babylone
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je ferai disparaître sa source.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Babylone deviendra un tas de ruines, un repaire de chacals,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un sujet de consternation et de moquerie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n'y aura plus d'habitants.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Ils rugiront ensemble comme des jeunes lions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils pousseront des cris comme des lionceaux.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Quand ils seront enfiévrés, j'organiserai leur orgie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les rendrai ivres pour qu'ils soient gais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'ils s'endorment d'un sommeil perpétuel et ne se réveillent plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l'Eternel.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Les blessés mourront dans le pays des Babyloniens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et dans les rues de Babylone ceux qui seront transpercés de coups.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Je les conduirai à l'abattoir comme des agneaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme des béliers et des boucs.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Comment! Shéshac est prise!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celle dont toute la terre chantait les louanges est conquise!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment! Babylone n'est plus qu'un sujet de consternation parmi les nations!
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: La mer a envahi Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle a été submergée par la masse de ses flots.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Ses villes sont dévastées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la terre est devenue aride et déserte.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est un pays que plus personne n'habite
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et où ne passe plus aucun homme.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: J'interviendrai contre Bel à Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'arracherai de sa bouche ce qu'il a dévoré
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les nations n'afflueront plus vers lui.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même la muraille de Babylone est tombée!
  '45':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: '*Sortez du milieu d''elle, mon peuple,'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51.45 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sortez… peuple: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Apocalypse 18.4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que chacun se sauve
  - type: usfm
    marker: q1
    children:
    - type: text
      text: loin de la colère ardente de l'Eternel!
  '46':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Que votre cœur ne se trouble pas!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N'ayez pas peur des rumeurs qui se propageront sur la terre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cette année surviendra une rumeur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'année suivante une autre rumeur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n'y a que violence sur la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à un dominateur succède un autre dominateur.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: Voilà pourquoi les jours viennent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où j'interviendrai contre les sculptures sacrées de Babylone.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout son pays sera couvert de honte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous ses blessés mourront au beau milieu d'elle.
  '48':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: Le ciel et la terre, avec tout ce qu'ils contiennent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pousseront des cris de joie à propos de Babylone
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsque les dévastateurs fondront sur elle depuis le nord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l'Eternel.
  '49':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Babylone aussi tombera, morts d'Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout comme elle a fait tomber des morts partout sur la terre.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: En effet, Israël et Juda ne sont pas abandonnés de leur Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de l'Eternel, le maître de l'univers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le pays des Babyloniens est rempli de crimes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre le Saint d'Israël.
  '50':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: Vous qui avez échappé à l'épée, partez sans tarder!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De la terre lointaine, souvenez-vous de l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et n'oubliez pas Jérusalem!
  '51':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: «Nous étions honteux en entendant les insultes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'humiliation couvrait notre visage
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand des étrangers ont pénétré
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans le sanctuaire de la maison de l'Eternel.»
  '52':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: Voilà pourquoi les jours viennent, déclare l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où j'interviendrai contre ses sculptures sacrées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et partout dans son pays des blessés feront entendre leurs gémissements.
  '53':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: Même si Babylone monte jusqu'au ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: même si elle rend ses forteresses inaccessibles du fait de leur hauteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des dévastateurs viendront contre elle de ma part, déclare l'Eternel.
  '54':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: Des cris proviennent de Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le désastre est grand dans le pays des Babyloniens.
  '55':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: En effet, l'Eternel dévaste Babylone
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et fait cesser son vacarme assourdissant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les vagues d'ennemis grondent comme de grandes eaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on entend leur tapage.
  '56':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: Oui, le dévastateur a fondu sur elle, sur Babylone.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses guerriers sont capturés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leurs arcs brisés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l'Eternel est un Dieu qui verse à chacun son salaire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui traite chacun comme il le mérite.
  '57':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: Je rendrai ivres ses princes et ses sages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses gouverneurs, ses magistrats et ses guerriers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils s'endormiront d'un sommeil perpétuel et ne se réveilleront plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare le roi, celui dont le nom est l'Eternel, le maître de l'univers.
  '58':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: 'Voici ce que dit l''Eternel, le maître de l''univers:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les murailles de Babylone seront totalement démantelées malgré leur épaisseur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses portes seront réduites en cendres malgré leur taille.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi *des peuples auront travaillé pour du vide,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des nations se seront épuisées pour du feu
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '51.58 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Des peuples… feu: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'même affirmation en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Habakuk 2.13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '59':
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: Voici l'ordre donné par le prophète Jérémie à Seraja, fils de Nérija et petit-fils de Machséja, l'aide de camp du roi, lorsqu'il se rendit à Babylone avec Sédécias, roi de Juda, la quatrième année du règne de Sédécias.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Fuyez de Babylone, que chacun se sauve!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne vous laissez pas réduire au silence par sa faute!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, c'est une période de vengeance pour l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il va la traiter comme elle le mérite.
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: 'Jérémie enregistra par écrit dans un livre tous les malheurs qui devaient frapper Babylone, toutes ces paroles écrites à l''intention de Babylone, '
  '61':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: 'puis il dit à Seraja: «Une fois arrivé à Babylone, tu veilleras à faire la lecture de toutes ces paroles '
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: 'et tu diras: ‘Eternel, c''est toi qui as déclaré que cet endroit serait rayé de la carte et qu''il ne serait plus habité ni par les hommes ni par les bêtes, mais qu''il deviendrait un désert pour toujours.’ '
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: 'Quand tu auras terminé la lecture de ce livre, tu y attacheras une pierre et tu le jetteras au milieu de l''Euphrate, '
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: 'puis tu diras: ‘Babylone disparaîtra de la même manière. Elle ne se relèvera pas des malheurs que je ferai venir sur elle. Ils tomberont épuisés.’»'
  - type: usfm
    marker: d
    children:
    - type: text
      text: Fin des paroles de Jérémie.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Babylone était une coupe d'or dans la main de l'Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle enivrait toute la terre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les nations ont bu de son vin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est pourquoi elles se sont conduites comme des folles.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Soudain Babylone est tombée, et elle est en pièces.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Lamentez-vous sur elle, prenez du baume pour sa plaie:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: peut-être guérira-t-elle.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: «Nous avons soigné Babylone, mais elle n'a pas guéri.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Abandonnons-la et que chacun reparte dans son pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car son jugement atteint le ciel et les nuages.
