document_id: JER.51,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: Je vais faire se lever contre Babylone
  - type: text
    content: et contre les habitants de la Babylonie
  - type: text
    content: un vent destructeur.
  '10':
  - type: text
    content: L'Eternel nous a fait justice.
  - type: text
    content: Venez et racontons dans Sion
  - type: text
    content: l'œuvre de l'Eternel, notre Dieu!»
  '11':
  - type: text
    content: Affûtez les flèches et remplissez les carquois!
  - type: text
    content: L'Eternel a réveillé l'esprit des rois de Médie
  - type: text
    content: parce que son plan est de détruire Babylone.
  - type: text
    content: Oui, c'est une vengeance de l'Eternel,
  - type: text
    content: la vengeance de son temple.
  '12':
  - type: text
    content: Dressez un étendard vers les murs de Babylone!
  - type: text
    content: Renforcez la garde, postez des sentinelles, placez des embuscades,
  - type: text
    content: car l'Eternel a pris une décision,
  - type: text
    content: et il accomplit les paroles qu'il a prononcées à l'intention des habitants de Babylone.
  '13':
  - type: text
    content: Toi qui habites près des grandes eaux,
  - type: text
    content: qui possèdes de grands trésors,
  - type: text
    content: ta fin est arrivée, tes profits malhonnêtes ont atteint leur limite!
  '14':
  - type: text
    content: 'L''Eternel, le maître de l''univers, en a fait le serment par lui-même:'
  - type: text
    content: «Oui, je te remplirai d'hommes pareils à un nuage de sauterelles,
  - type: text
    content: et ils pousseront des cris de guerre contre toi.»
  '15':
  - type: text
    content: C'est lui qui a fait la terre par sa puissance.
  - type: text
    content: Il a fondé le monde par sa sagesse,
  - type: text
    content: il a déployé le ciel par son intelligence.
  '16':
  - type: text
    content: A sa voix, l'eau gronde dans le ciel.
  - type: text
    content: Il fait monter les nuages des extrémités de la terre,
  - type: text
    content: il déclenche les éclairs et la pluie,
  - type: text
    content: il tire le vent de ses trésors.
  '17':
  - type: text
    content: Tout homme est dépassé, même les plus savants.
  - type: text
    content: Tout orfèvre est honteux de sa sculpture sacrée,
  - type: text
    content: 'car son idole n''est que mensonge:'
  - type: text
    content: le souffle de la vie n'habite pas dans les idoles.
  '18':
  - type: text
    content: Elles sont sans consistance, ridicules.
  - type: text
    content: Quand le moment sera venu d'intervenir contre elles, elles disparaîtront.
  '19':
  - type: text
    content: Celui qui est le bien de Jacob n'est pas comme elles,
  - type: text
    content: car c'est lui qui a tout façonné.
  - type: text
    content: Israël est la tribu qui lui appartient.
  - type: text
    content: L'Eternel, le maître de l'univers, voilà quel est son nom.
  '2':
  - type: text
    content: J'envoie contre Babylone des étrangers qui la disperseront
  - type: text
    content: et qui videront son pays.
  - type: text
    content: Ils fondront de tous côtés sur elle, le jour du malheur.
  '20':
  - type: text
    content: Tu m'as servi de marteau, d'arme de guerre.
  - type: text
    content: J'ai mis en pièces par toi des nations.
  - type: text
    content: Par toi j'ai détruit des royaumes,
  '21':
  - type: text
    content: par toi j'ai mis en pièces le cheval et son cavalier,
  - type: text
    content: par toi j'ai mis en pièces le char et celui qui le conduisait,
  '22':
  - type: text
    content: par toi j'ai mis en pièces l'homme et la femme,
  - type: text
    content: par toi j'ai mis en pièces le vieillard et l'enfant,
  - type: text
    content: par toi j'ai mis en pièces le jeune homme et la jeune fille,
  '23':
  - type: text
    content: par toi j'ai mis en pièces le berger et son troupeau,
  - type: text
    content: par toi j'ai mis en pièces le cultivateur et sa paire de bœufs,
  - type: text
    content: par toi j'ai mis en pièces les gouverneurs et les magistrats.
  '24':
  - type: text
    content: Sous vos yeux, je rendrai à Babylone et à tous les habitants de la Babylonie
  - type: text
    content: tout le mal qu'ils ont fait à Sion,
  - type: text
    content: déclare l'Eternel.
  '25':
  - type: text
    content: Oui, je m'en prends à toi, montagne de destruction, déclare l'Eternel,
  - type: text
    content: toi qui détruis toute la terre!
  - type: text
    content: Je déploierai ma puissance contre toi,
  - type: text
    content: je te précipiterai du haut des rochers
  - type: text
    content: et je ferai de toi une montagne carbonisée.
  '26':
  - type: text
    content: On ne pourra tirer de toi ni pierres angulaires ni pierres de fondation,
  - type: text
    content: car tu seras un désert pour toujours, déclare l'Eternel.
  '27':
  - type: text
    content: Dressez un étendard dans le pays!
  - type: text
    content: Sonnez de la trompette parmi les nations!
  - type: text
    content: Mettez à part des nations aptes à s'attaquer à elle,
  - type: text
    content: mobilisez contre elle les royaumes d'Ararat, de Minni et d'Ashkenaz!
  - type: text
    content: Postez des officiers contre elle!
  - type: text
    content: Faites avancer les chevaux comme un nuage de sauterelles!
  '28':
  - type: text
    content: Mettez à part contre elle les nations, les rois de Médie,
  - type: text
    content: ses gouverneurs et tous ses magistrats,
  - type: text
    content: et tout le territoire placé sous leur domination!
  '29':
  - type: text
    content: La terre tremble, elle est bouleversée,
  - type: text
    content: 'car les projets de l''Eternel contre Babylone s''accomplissent:'
  - type: text
    content: il va faire de la région de Babylone un désert inhabité.
  '3':
  - type: text
    content: Qu'on tende l'arc contre celui qui tend son arc
  - type: text
    content: et contre celui qui fait le fier dans sa cuirasse!
  - type: text
    content: N'épargnez pas ses jeunes hommes!
  - type: text
    content: Vouez à la destruction toute son armée!
  '30':
  - type: text
    content: Les guerriers de Babylone cessent de combattre,
  - type: text
    content: ils restent dans les forteresses.
  - type: text
    content: Leur courage s'est éteint, ils sont devenus comme des femmelettes.
  - type: text
    content: On a mis le feu aux habitations,
  - type: text
    content: on a brisé les verrous.
  '31':
  - type: text
    content: Les coursiers se relaient,
  - type: text
    content: les messagers se croisent
  - type: text
    content: pour annoncer au roi de Babylone
  - type: text
    content: que sa ville est prise de tous les côtés,
  '32':
  - type: text
    content: que les passages sont occupés,
  - type: text
    content: les marais embrasés par le feu
  - type: text
    content: et les hommes de guerre terrifiés.
  '33':
  - type: text
    content: 'En effet, voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël:'
  - type: text
    content: La fille de Babylone est comme une surface de terrain qu'il est temps de piétiner.
  - type: text
    content: Encore un peu de temps et le moment de la moisson sera venu pour elle.
  '34':
  - type: text
    content: «Nebucadnetsar, roi de Babylone, m'a dévorée, m'a dépouillée.
  - type: text
    content: Il m'a laissée pareille à un vase vide.
  - type: text
    content: Tel un dragon, il m'a engloutie,
  - type: text
    content: il a rempli son ventre de ce que j'avais de précieux.
  - type: text
    content: Il m'a chassée.
  '35':
  - type: text
    content: Que la violence dont j'ai été victime retombe sur Babylone!»
  - type: text
    content: dit l'habitante de Sion.
  - type: text
    content: «Que mon sang retombe sur les habitants de la Babylonie!»
  - type: text
    content: dit Jérusalem.
  '36':
  - type: text
    content: 'C''est pourquoi, voici ce que dit l''Eternel:'
  - type: text
    content: Je vais défendre ta cause,
  - type: text
    content: je te vengerai!
  - type: text
    content: Je mettrai à sec la mer de Babylone
  - type: text
    content: et je ferai disparaître sa source.
  '37':
  - type: text
    content: Babylone deviendra un tas de ruines, un repaire de chacals,
  - type: text
    content: un sujet de consternation et de moquerie.
  - type: text
    content: Il n'y aura plus d'habitants.
  '38':
  - type: text
    content: Ils rugiront ensemble comme des jeunes lions,
  - type: text
    content: ils pousseront des cris comme des lionceaux.
  '39':
  - type: text
    content: Quand ils seront enfiévrés, j'organiserai leur orgie.
  - type: text
    content: Je les rendrai ivres pour qu'ils soient gais,
  - type: text
    content: qu'ils s'endorment d'un sommeil perpétuel et ne se réveillent plus,
  - type: text
    content: déclare l'Eternel.
  '4':
  - type: text
    content: Les blessés mourront dans le pays des Babyloniens,
  - type: text
    content: et dans les rues de Babylone ceux qui seront transpercés de coups.
  '40':
  - type: text
    content: Je les conduirai à l'abattoir comme des agneaux,
  - type: text
    content: comme des béliers et des boucs.
  '41':
  - type: text
    content: Comment! Shéshac est prise!
  - type: text
    content: Celle dont toute la terre chantait les louanges est conquise!
  - type: text
    content: Comment! Babylone n'est plus qu'un sujet de consternation parmi les nations!
  '42':
  - type: text
    content: La mer a envahi Babylone,
  - type: text
    content: elle a été submergée par la masse de ses flots.
  '43':
  - type: text
    content: Ses villes sont dévastées,
  - type: text
    content: la terre est devenue aride et déserte.
  - type: text
    content: C'est un pays que plus personne n'habite
  - type: text
    content: et où ne passe plus aucun homme.
  '44':
  - type: text
    content: J'interviendrai contre Bel à Babylone,
  - type: text
    content: j'arracherai de sa bouche ce qu'il a dévoré
  - type: text
    content: et les nations n'afflueront plus vers lui.
  - type: text
    content: Même la muraille de Babylone est tombée!
  '45':
  - type: text
    content: '*Sortez du milieu d''elle, mon peuple,'
  - type: note
    content: 'Sortez… peuple: cité en Apocalypse 18.4.'
  - type: text
    content: et que chacun se sauve
  - type: text
    content: loin de la colère ardente de l'Eternel!
  '46':
  - type: text
    content: Que votre cœur ne se trouble pas!
  - type: text
    content: N'ayez pas peur des rumeurs qui se propageront sur la terre!
  - type: text
    content: Cette année surviendra une rumeur,
  - type: text
    content: l'année suivante une autre rumeur.
  - type: text
    content: Il n'y a que violence sur la terre,
  - type: text
    content: à un dominateur succède un autre dominateur.
  '47':
  - type: text
    content: Voilà pourquoi les jours viennent
  - type: text
    content: où j'interviendrai contre les sculptures sacrées de Babylone.
  - type: text
    content: Tout son pays sera couvert de honte
  - type: text
    content: et tous ses blessés mourront au beau milieu d'elle.
  '48':
  - type: text
    content: Le ciel et la terre, avec tout ce qu'ils contiennent,
  - type: text
    content: pousseront des cris de joie à propos de Babylone
  - type: text
    content: lorsque les dévastateurs fondront sur elle depuis le nord,
  - type: text
    content: déclare l'Eternel.
  '49':
  - type: text
    content: Babylone aussi tombera, morts d'Israël,
  - type: text
    content: tout comme elle a fait tomber des morts partout sur la terre.
  '5':
  - type: text
    content: En effet, Israël et Juda ne sont pas abandonnés de leur Dieu,
  - type: text
    content: de l'Eternel, le maître de l'univers,
  - type: text
    content: et le pays des Babyloniens est rempli de crimes
  - type: text
    content: contre le Saint d'Israël.
  '50':
  - type: text
    content: Vous qui avez échappé à l'épée, partez sans tarder!
  - type: text
    content: De la terre lointaine, souvenez-vous de l'Eternel
  - type: text
    content: et n'oubliez pas Jérusalem!
  '51':
  - type: text
    content: «Nous étions honteux en entendant les insultes,
  - type: text
    content: l'humiliation couvrait notre visage
  - type: text
    content: quand des étrangers ont pénétré
  - type: text
    content: dans le sanctuaire de la maison de l'Eternel.»
  '52':
  - type: text
    content: Voilà pourquoi les jours viennent, déclare l'Eternel,
  - type: text
    content: où j'interviendrai contre ses sculptures sacrées,
  - type: text
    content: et partout dans son pays des blessés feront entendre leurs gémissements.
  '53':
  - type: text
    content: Même si Babylone monte jusqu'au ciel,
  - type: text
    content: même si elle rend ses forteresses inaccessibles du fait de leur hauteur,
  - type: text
    content: des dévastateurs viendront contre elle de ma part, déclare l'Eternel.
  '54':
  - type: text
    content: Des cris proviennent de Babylone,
  - type: text
    content: le désastre est grand dans le pays des Babyloniens.
  '55':
  - type: text
    content: En effet, l'Eternel dévaste Babylone
  - type: text
    content: et fait cesser son vacarme assourdissant.
  - type: text
    content: Les vagues d'ennemis grondent comme de grandes eaux,
  - type: text
    content: on entend leur tapage.
  '56':
  - type: text
    content: Oui, le dévastateur a fondu sur elle, sur Babylone.
  - type: text
    content: Ses guerriers sont capturés,
  - type: text
    content: leurs arcs brisés,
  - type: text
    content: car l'Eternel est un Dieu qui verse à chacun son salaire,
  - type: text
    content: qui traite chacun comme il le mérite.
  '57':
  - type: text
    content: Je rendrai ivres ses princes et ses sages,
  - type: text
    content: ses gouverneurs, ses magistrats et ses guerriers.
  - type: text
    content: Ils s'endormiront d'un sommeil perpétuel et ne se réveilleront plus,
  - type: text
    content: déclare le roi, celui dont le nom est l'Eternel, le maître de l'univers.
  '58':
  - type: text
    content: 'Voici ce que dit l''Eternel, le maître de l''univers:'
  - type: text
    content: Les murailles de Babylone seront totalement démantelées malgré leur épaisseur
  - type: text
    content: et ses portes seront réduites en cendres malgré leur taille.
  - type: text
    content: Ainsi *des peuples auront travaillé pour du vide,
  - type: text
    content: des nations se seront épuisées pour du feu
  - type: note
    content: 'Des peuples… feu: même affirmation en Habakuk 2.13.'
  - type: text
    content: .
  '59':
  - type: text
    content: Voici l'ordre donné par le prophète Jérémie à Seraja, fils de Nérija et petit-fils de Machséja, l'aide de camp du roi, lorsqu'il se rendit à Babylone avec Sédécias, roi de Juda, la quatrième année du règne de Sédécias.
  '6':
  - type: text
    content: Fuyez de Babylone, que chacun se sauve!
  - type: text
    content: Ne vous laissez pas réduire au silence par sa faute!
  - type: text
    content: En effet, c'est une période de vengeance pour l'Eternel,
  - type: text
    content: il va la traiter comme elle le mérite.
  '60':
  - type: text
    content: 'Jérémie enregistra par écrit dans un livre tous les malheurs qui devaient frapper Babylone, toutes ces paroles écrites à l''intention de Babylone, '
  '61':
  - type: text
    content: 'puis il dit à Seraja: «Une fois arrivé à Babylone, tu veilleras à faire la lecture de toutes ces paroles '
  '62':
  - type: text
    content: 'et tu diras: ‘Eternel, c''est toi qui as déclaré que cet endroit serait rayé de la carte et qu''il ne serait plus habité ni par les hommes ni par les bêtes, mais qu''il deviendrait un désert pour toujours.’ '
  '63':
  - type: text
    content: 'Quand tu auras terminé la lecture de ce livre, tu y attacheras une pierre et tu le jetteras au milieu de l''Euphrate, '
  '64':
  - type: text
    content: 'puis tu diras: ‘Babylone disparaîtra de la même manière. Elle ne se relèvera pas des malheurs que je ferai venir sur elle. Ils tomberont épuisés.’»'
  - type: text
    content: Fin des paroles de Jérémie.
  '7':
  - type: text
    content: Babylone était une coupe d'or dans la main de l'Eternel.
  - type: text
    content: Elle enivrait toute la terre.
  - type: text
    content: Les nations ont bu de son vin,
  - type: text
    content: c'est pourquoi elles se sont conduites comme des folles.
  '8':
  - type: text
    content: Soudain Babylone est tombée, et elle est en pièces.
  - type: text
    content: 'Lamentez-vous sur elle, prenez du baume pour sa plaie:'
  - type: text
    content: peut-être guérira-t-elle.
  '9':
  - type: text
    content: «Nous avons soigné Babylone, mais elle n'a pas guéri.
  - type: text
    content: Abandonnons-la et que chacun reparte dans son pays,
  - type: text
    content: car son jugement atteint le ciel et les nuages.
