document_id: PSA.53,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Portrait de l'impie
  - type: text
    content: Au chef de chœur, sur la flûte. Cantique de David.
  '2':
  - type: text
    content: 'Le fou dit dans son cœur: «Il n''y a pas de Dieu!»'
  - type: text
    content: '*Ils se sont corrompus, ils ont commis des injustices abominables;'
  - type: text
    content: il n'y en a aucun qui fasse le bien.
  '3':
  - type: text
    content: Du haut du ciel, Dieu observe les hommes
  - type: text
    content: pour voir s'il y en a un qui est intelligent,
  - type: text
    content: qui cherche Dieu.
  '4':
  - type: text
    content: Tous se sont détournés, ensemble ils se sont pervertis;
  - type: text
    content: il n'y en a aucun qui fasse le bien,
  - type: text
    content: pas même un seul.
  - type: note
    content: 'Ils se sont corrompus… un seul: similaire au Psaume 14.1-3, cité en Romains 3.10-12.'
  '5':
  - type: text
    content: Ceux qui commettent l'injustice n'ont-ils aucune connaissance?
  - type: text
    content: Ils dévorent mon peuple, ils le prennent pour nourriture,
  - type: text
    content: ils ne font pas appel à Dieu.
  '6':
  - type: text
    content: Alors ils trembleront d'épouvante
  - type: text
    content: sans qu'il y ait de raison d'avoir peur.
  - type: text
    content: Dieu dispersera les os de ceux qui t'assiègent;
  - type: text
    content: tu les couvriras de honte, car Dieu les a rejetés.
  '7':
  - type: text
    content: Oh! qui accordera depuis Sion la délivrance à Israël?
  - type: text
    content: Quand Dieu rétablira son peuple,
  - type: text
    content: Jacob sera dans l'allégresse, Israël se réjouira.
