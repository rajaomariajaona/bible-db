document_id: EST.10,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Rôle de Mardochée
  - type: text
    content: 'Le roi Assuérus soumit à la corvée aussi bien la partie continentale du pays que les îles. '
  '2':
  - type: text
    content: 'Tout ce qu''il a accompli par sa puissance et sa force, ainsi que les détails sur le rôle important qu''il a accordé à Mardochée, cela est décrit dans les annales des rois des Mèdes et des Perses. '
  '3':
  - type: text
    content: En effet, le Juif Mardochée était l'adjoint du roi Assuérus. Il jouait un rôle important pour les Juifs et était très apprécié de ses nombreux frères. Il recherchait le bonheur de son peuple et contribua par ses paroles au bien-être de toute sa lignée.
