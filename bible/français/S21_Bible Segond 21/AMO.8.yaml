document_id: AMO.8,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Vision d'une corbeille de fruits
  - type: text
    content: 'Le Seigneur, l''Eternel, m''a envoyé cette vision: c''était une corbeille de fruits. '
  '10':
  - type: text
    content: Je changerai vos fêtes en deuil
  - type: text
    content: et tous vos chants en lamentations,
  - type: text
    content: je couvrirai de sacs toutes les tailles
  - type: text
    content: et je raserai toutes les têtes.
  - type: text
    content: Je mettrai le pays dans le deuil comme pour un fils unique,
  - type: text
    content: et sa fin sera comme un jour d'amertume.
  '11':
  - type: text
    content: »Les jours viennent, déclare le Seigneur, l'Eternel,
  - type: text
    content: où j'enverrai la famine dans le pays,
  - type: text
    content: non pas la faim du pain et la soif de l'eau,
  - type: text
    content: mais la faim et la soif d'entendre les paroles de l'Eternel.
  '12':
  - type: text
    content: Ils erreront alors d'une mer à l'autre,
  - type: text
    content: du nord à l'est,
  - type: text
    content: ils iront çà et là pour chercher la parole de l'Eternel,
  - type: text
    content: et ils ne la trouveront pas.
  '13':
  - type: text
    content: »Ce jour-là, les belles jeunes filles et les jeunes gens mourront de soif.
  '14':
  - type: text
    content: Ceux qui jurent par le péché de Samarie
  - type: text
    content: 'et qui disent: ‘Vive ton dieu, Dan!'
  - type: text
    content: Vive le culte de Beer-Shéba!’
  - type: text
    content: tomberont et ne se relèveront plus.»
  '2':
  - type: text
    content: 'Il a dit: «Que vois-tu, Amos?» J''ai répondu: «Une corbeille de fruits.» Et l''Eternel m''a dit:'
  - type: text
    content: «La fin est venue pour mon peuple, Israël.
  - type: text
    content: Je ne lui pardonnerai plus.
  '3':
  - type: text
    content: Ce jour-là, les chants du palais seront des gémissements,
  - type: text
    content: déclare le Seigneur, l'Eternel;
  - type: text
    content: on jettera partout en silence une multitude de cadavres.
  '4':
  - type: text
    content: »Ecoutez ceci, vous qui dévorez le pauvre
  - type: text
    content: et qui ruinez les malheureux du pays!
  '5':
  - type: text
    content: 'Vous dites: ‘Quand le début du mois sera-t-il passé,'
  - type: text
    content: afin que nous puissions vendre du blé?
  - type: text
    content: Quand finira le sabbat, afin que nous puissions ouvrir les greniers?
  - type: text
    content: Nous diminuerons la mesure, nous augmenterons le prix,
  - type: text
    content: nous falsifierons les balances pour tromper.
  '6':
  - type: text
    content: Puis nous achèterons les faibles pour de l'argent
  - type: text
    content: et le pauvre pour une paire de sandales,
  - type: text
    content: et nous vendrons le déchet du blé.’
  '7':
  - type: text
    content: '»L''Eternel l''a juré par la gloire de Jacob:'
  - type: text
    content: ‘Je n'oublierai jamais aucun de leurs actes.’
  '8':
  - type: text
    content: Le pays, à cause de cela, ne sera-t-il pas ébranlé,
  - type: text
    content: et tous ses habitants ne seront-ils pas dans le deuil?
  - type: text
    content: Le pays montera tout entier comme le Nil,
  - type: text
    content: il se soulèvera et s'affaissera comme le fleuve d'Egypte.
  '9':
  - type: text
    content: »Ce jour-là, déclare le Seigneur, l'Eternel,
  - type: text
    content: je ferai coucher le soleil à midi
  - type: text
    content: et j'obscurcirai la terre en plein jour.
