document_id: AMO.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vision d'une corbeille de fruits
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le Seigneur, l''Eternel, m''a envoyé cette vision: c''était une corbeille de fruits. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il a dit: «Que vois-tu, Amos?» J''ai répondu: «Une corbeille de fruits.» Et l''Eternel m''a dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «La fin est venue pour mon peuple, Israël.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne lui pardonnerai plus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ce jour-là, les chants du palais seront des gémissements,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare le Seigneur, l'Eternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: on jettera partout en silence une multitude de cadavres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: »Ecoutez ceci, vous qui dévorez le pauvre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui ruinez les malheureux du pays!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Vous dites: ‘Quand le début du mois sera-t-il passé,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin que nous puissions vendre du blé?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand finira le sabbat, afin que nous puissions ouvrir les greniers?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous diminuerons la mesure, nous augmenterons le prix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous falsifierons les balances pour tromper.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Puis nous achèterons les faibles pour de l'argent
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le pauvre pour une paire de sandales,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nous vendrons le déchet du blé.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '»L''Eternel l''a juré par la gloire de Jacob:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Je n'oublierai jamais aucun de leurs actes.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le pays, à cause de cela, ne sera-t-il pas ébranlé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous ses habitants ne seront-ils pas dans le deuil?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le pays montera tout entier comme le Nil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il se soulèvera et s'affaissera comme le fleuve d'Egypte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: »Ce jour-là, déclare le Seigneur, l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ferai coucher le soleil à midi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et j'obscurcirai la terre en plein jour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Je changerai vos fêtes en deuil
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous vos chants en lamentations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je couvrirai de sacs toutes les tailles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je raserai toutes les têtes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je mettrai le pays dans le deuil comme pour un fils unique,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa fin sera comme un jour d'amertume.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: »Les jours viennent, déclare le Seigneur, l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: où j'enverrai la famine dans le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: non pas la faim du pain et la soif de l'eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais la faim et la soif d'entendre les paroles de l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils erreront alors d'une mer à l'autre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: du nord à l'est,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils iront çà et là pour chercher la parole de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ne la trouveront pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: »Ce jour-là, les belles jeunes filles et les jeunes gens mourront de soif.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ceux qui jurent par le péché de Samarie
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et qui disent: ‘Vive ton dieu, Dan!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vive le culte de Beer-Shéba!’
- type: usfm
  marker: q1
  children:
  - type: text
    text: tomberont et ne se relèveront plus.»
