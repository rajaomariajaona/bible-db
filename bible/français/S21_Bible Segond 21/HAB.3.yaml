document_id: HAB.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Cantique d'Habakuk
  - type: text
    content: Prière du prophète Habakuk. Sur le mode des complaintes.
  '10':
  - type: text
    content: A ton aspect, les montagnes tremblent,
  - type: text
    content: des trombes d'eau s'abattent,
  - type: text
    content: l'abîme fait entendre sa voix, il lève ses mains en haut.
  '11':
  - type: text
    content: Le soleil et la lune s'arrêtent dans leur résidence,
  - type: text
    content: à la lumière de tes flèches qui partent,
  - type: text
    content: à la clarté de ta lance qui brille.
  '12':
  - type: text
    content: Tu parcours la terre dans ta fureur,
  - type: text
    content: tu écrases les nations dans ta colère.
  '13':
  - type: text
    content: Tu sors pour délivrer ton peuple,
  - type: text
    content: pour délivrer celui que tu as consacré par onction.
  - type: text
    content: Tu brises le faîte de la maison du méchant,
  - type: text
    content: 'tu la détruis de fond en comble. '
  - type: text
    content: – Pause.
  '14':
  - type: text
    content: Tu transperces de leurs propres flèches la tête de ses chefs
  - type: text
    content: qui se précipitaient comme une tempête pour nous disperser.
  - type: text
    content: Ils poussaient des cris de joie,
  - type: text
    content: comme s'ils dévoraient déjà le malheureux dans leur repaire.
  '15':
  - type: text
    content: Avec tes chevaux tu parcours la mer,
  - type: text
    content: le bouillonnement de grandes eaux.
  '16':
  - type: text
    content: J'ai entendu et je suis tout bouleversé.
  - type: text
    content: A cette voix, mes lèvres tremblent,
  - type: text
    content: la pourriture vient dans mes os
  - type: text
    content: et mes jambes tremblent.
  - type: text
    content: Sans bouger j'attends le jour de la détresse,
  - type: text
    content: le jour où notre assaillant marchera contre le peuple.
  '17':
  - type: text
    content: En effet, le figuier ne fleurira pas,
  - type: text
    content: la vigne ne produira rien,
  - type: text
    content: le fruit de l'olivier manquera,
  - type: text
    content: les champs ne donneront pas de nourriture;
  - type: text
    content: les brebis disparaîtront du pâturage,
  - type: text
    content: et il n'y aura plus de bœufs dans les étables.
  '18':
  - type: text
    content: Mais moi, je veux me réjouir en l'Eternel,
  - type: text
    content: je veux être dans l'allégresse à cause du Dieu de mon salut.
  '19':
  - type: text
    content: 'L''Eternel, le Seigneur, est ma force:'
  - type: text
    content: il rend mes pieds semblables à ceux des biches
  - type: text
    content: et il me fait marcher sur mes hauteurs.
  - type: text
    content: Au chef de chœur. Avec instruments à cordes.
  '2':
  - type: text
    content: Eternel, j'ai entendu ce que tu as annoncé, je suis saisi de crainte.
  - type: text
    content: Accomplis ton œuvre dans le cours des années, Eternel,
  - type: text
    content: dans le cours des années fais-la connaître,
  - type: text
    content: mais dans ta colère souviens-toi de ta compassion!
  '3':
  - type: text
    content: Dieu vient de Théman,
  - type: text
    content: 'le Saint vient des monts de Paran. '
  - type: text
    content: – Pause.
  - type: text
    content: Sa majesté couvre le ciel
  - type: text
    content: et sa gloire remplit la terre.
  '4':
  - type: text
    content: 'C''est comme l''éclat de la lumière:'
  - type: text
    content: des rayons partent de sa main;
  - type: text
    content: là réside sa force.
  '5':
  - type: text
    content: Devant lui avance la peste,
  - type: text
    content: et la fièvre marche sur ses traces.
  '6':
  - type: text
    content: Il s'arrête, et de l'œil il mesure la terre,
  - type: text
    content: il regarde, et il fait trembler les nations;
  - type: text
    content: les montagnes éternelles se brisent,
  - type: text
    content: les collines anciennes s'abaissent.
  - type: text
    content: A lui les sentiers d'autrefois!
  '7':
  - type: text
    content: Je vois les tentes de l'Ethiopie réduites à rien,
  - type: text
    content: et les tentes du pays de Madian sont dans l'épouvante.
  '8':
  - type: text
    content: L'Eternel est-il irrité contre les fleuves?
  - type: text
    content: Est-ce contre les fleuves que s'enflamme ta colère,
  - type: text
    content: est-ce contre la mer que se déverse ta fureur,
  - type: text
    content: pour que tu sois monté sur tes chevaux,
  - type: text
    content: sur ton char de victoire?
  '9':
  - type: text
    content: Tu prépares ton arc,
  - type: text
    content: 'tes serments sont les flèches de ta parole. '
  - type: text
    content: – Pause.
  - type: text
    content: Tu fends la terre par des torrents.
