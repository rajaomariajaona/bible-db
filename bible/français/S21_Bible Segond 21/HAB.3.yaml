document_id: HAB.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Cantique d'Habakuk
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Prière du prophète Habakuk. Sur le mode des complaintes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Eternel, j'ai entendu ce que tu as annoncé, je suis saisi de crainte.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Accomplis ton œuvre dans le cours des années, Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans le cours des années fais-la connaître,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais dans ta colère souviens-toi de ta compassion!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Dieu vient de Théman,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'le Saint vient des monts de Paran. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa majesté couvre le ciel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa gloire remplit la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'C''est comme l''éclat de la lumière:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: des rayons partent de sa main;
- type: usfm
  marker: q1
  children:
  - type: text
    text: là réside sa force.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Devant lui avance la peste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la fièvre marche sur ses traces.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il s'arrête, et de l'œil il mesure la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il regarde, et il fait trembler les nations;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les montagnes éternelles se brisent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les collines anciennes s'abaissent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A lui les sentiers d'autrefois!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je vois les tentes de l'Ethiopie réduites à rien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les tentes du pays de Madian sont dans l'épouvante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L'Eternel est-il irrité contre les fleuves?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est-ce contre les fleuves que s'enflamme ta colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: est-ce contre la mer que se déverse ta fureur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que tu sois monté sur tes chevaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur ton char de victoire?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tu prépares ton arc,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tes serments sont les flèches de ta parole. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu fends la terre par des torrents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: A ton aspect, les montagnes tremblent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des trombes d'eau s'abattent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'abîme fait entendre sa voix, il lève ses mains en haut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le soleil et la lune s'arrêtent dans leur résidence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la lumière de tes flèches qui partent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la clarté de ta lance qui brille.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tu parcours la terre dans ta fureur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu écrases les nations dans ta colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tu sors pour délivrer ton peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour délivrer celui que tu as consacré par onction.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu brises le faîte de la maison du méchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tu la détruis de fond en comble. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tu transperces de leurs propres flèches la tête de ses chefs
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui se précipitaient comme une tempête pour nous disperser.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils poussaient des cris de joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme s'ils dévoraient déjà le malheureux dans leur repaire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Avec tes chevaux tu parcours la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le bouillonnement de grandes eaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: J'ai entendu et je suis tout bouleversé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cette voix, mes lèvres tremblent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la pourriture vient dans mes os
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mes jambes tremblent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sans bouger j'attends le jour de la détresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le jour où notre assaillant marchera contre le peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: En effet, le figuier ne fleurira pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la vigne ne produira rien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le fruit de l'olivier manquera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les champs ne donneront pas de nourriture;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les brebis disparaîtront du pâturage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il n'y aura plus de bœufs dans les étables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Mais moi, je veux me réjouir en l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je veux être dans l'allégresse à cause du Dieu de mon salut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L''Eternel, le Seigneur, est ma force:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il rend mes pieds semblables à ceux des biches
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il me fait marcher sur mes hauteurs.
- type: usfm
  marker: d
  children:
  - type: text
    text: Au chef de chœur. Avec instruments à cordes.
