document_id: EPH.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Rôle de Paul
  - type: text
    content: 'Moi Paul, je suis le prisonnier de Jésus-Christ pour vous, les non-Juifs, '
  '10':
  - type: text
    content: 'Ainsi, les dominations et les autorités dans les lieux célestes connaissent maintenant par le moyen de l''Eglise la sagesse infiniment variée de Dieu, '
  '11':
  - type: text
    content: 'conformément au plan éternel qu''il a accompli en Jésus-Christ notre Seigneur. '
  '12':
  - type: text
    content: C'est en Christ, par la foi en lui, que nous avons la liberté de nous approcher de Dieu avec confiance.
  '13':
  - type: text
    content: 'Aussi, je vous demande de ne pas perdre courage à cause des souffrances que j''endure pour vous: elles sont votre gloire.'
  - type: heading
    content: Prière de Paul pour les Ephésiens
  '14':
  - type: text
    content: 'Voilà pourquoi je plie les genoux devant le Père [de notre Seigneur Jésus-Christ], '
  '15':
  - type: text
    content: 'de qui toute famille dans le ciel et sur la terre tient son nom. '
  '16':
  - type: text
    content: 'Je prie qu''il vous donne, conformément à la richesse de sa gloire, d''être puissamment fortifiés par son Esprit dans votre être intérieur, '
  '17':
  - type: text
    content: 'de sorte que le Christ habite dans votre cœur par la foi. Je prie que vous soyez enracinés et fondés dans l''amour '
  '18':
  - type: text
    content: 'pour être capables de comprendre avec tous les saints quelle est la largeur, la longueur, la profondeur et la hauteur de l''amour de Christ, '
  '19':
  - type: text
    content: et de connaître cet amour qui surpasse toute connaissance, afin que vous soyez remplis de toute la plénitude de Dieu.
  '2':
  - type: text
    content: 'si du moins vous avez appris comment je fais part de la grâce de Dieu qui m''a été confiée pour vous. '
  '20':
  - type: text
    content: 'A celui qui peut faire, par la puissance qui agit en nous, infiniment plus que tout ce que nous demandons ou pensons, '
  '21':
  - type: text
    content: à lui soit la gloire dans l'Eglise [et] en Jésus-Christ, pour toutes les générations, aux siècles des siècles! Amen!
  '3':
  - type: text
    content: 'C''est par révélation qu''il m''a fait connaître ce mystère tel que je l''ai déjà décrit en quelques mots. '
  '4':
  - type: text
    content: 'En les lisant, vous pouvez vous rendre compte de la compréhension que j''ai du mystère de Christ. '
  '5':
  - type: text
    content: 'Il n''a pas été porté à la connaissance des hommes des générations passées comme il a maintenant été révélé par l''Esprit à ses saints apôtres et prophètes. '
  '6':
  - type: text
    content: 'Ce mystère, c''est que les non-Juifs sont cohéritiers des Juifs, qu''ils forment un corps avec eux et participent à la même promesse [de Dieu] en [Jésus-]Christ par l''Evangile. '
  '7':
  - type: text
    content: J'en suis devenu le serviteur conformément au don de la grâce de Dieu, qui m'a été accordé en raison de l'efficacité de sa puissance.
  '8':
  - type: text
    content: 'Moi qui suis le plus petit de tous les saints, j''ai reçu la grâce d''annoncer parmi les non-Juifs les richesses infinies de Christ '
  '9':
  - type: text
    content: 'et de mettre en lumière [pour tous les hommes] comment se réalise le mystère caché de toute éternité en Dieu, qui a tout créé [par Jésus-Christ]. '
