document_id: EPH.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rôle de Paul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moi Paul, je suis le prisonnier de Jésus-Christ pour vous, les non-Juifs, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'si du moins vous avez appris comment je fais part de la grâce de Dieu qui m''a été confiée pour vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'C''est par révélation qu''il m''a fait connaître ce mystère tel que je l''ai déjà décrit en quelques mots. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'En les lisant, vous pouvez vous rendre compte de la compréhension que j''ai du mystère de Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il n''a pas été porté à la connaissance des hommes des générations passées comme il a maintenant été révélé par l''Esprit à ses saints apôtres et prophètes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ce mystère, c''est que les non-Juifs sont cohéritiers des Juifs, qu''ils forment un corps avec eux et participent à la même promesse [de Dieu] en [Jésus-]Christ par l''Evangile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: J'en suis devenu le serviteur conformément au don de la grâce de Dieu, qui m'a été accordé en raison de l'efficacité de sa puissance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Moi qui suis le plus petit de tous les saints, j''ai reçu la grâce d''annoncer parmi les non-Juifs les richesses infinies de Christ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'et de mettre en lumière [pour tous les hommes] comment se réalise le mystère caché de toute éternité en Dieu, qui a tout créé [par Jésus-Christ]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ainsi, les dominations et les autorités dans les lieux célestes connaissent maintenant par le moyen de l''Eglise la sagesse infiniment variée de Dieu, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'conformément au plan éternel qu''il a accompli en Jésus-Christ notre Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: C'est en Christ, par la foi en lui, que nous avons la liberté de nous approcher de Dieu avec confiance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Aussi, je vous demande de ne pas perdre courage à cause des souffrances que j''endure pour vous: elles sont votre gloire.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière de Paul pour les Ephésiens
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Voilà pourquoi je plie les genoux devant le Père [de notre Seigneur Jésus-Christ], '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'de qui toute famille dans le ciel et sur la terre tient son nom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Je prie qu''il vous donne, conformément à la richesse de sa gloire, d''être puissamment fortifiés par son Esprit dans votre être intérieur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'de sorte que le Christ habite dans votre cœur par la foi. Je prie que vous soyez enracinés et fondés dans l''amour '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'pour être capables de comprendre avec tous les saints quelle est la largeur, la longueur, la profondeur et la hauteur de l''amour de Christ, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: et de connaître cet amour qui surpasse toute connaissance, afin que vous soyez remplis de toute la plénitude de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'A celui qui peut faire, par la puissance qui agit en nous, infiniment plus que tout ce que nous demandons ou pensons, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: à lui soit la gloire dans l'Eglise [et] en Jésus-Christ, pour toutes les générations, aux siècles des siècles! Amen!
