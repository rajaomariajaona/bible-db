document_id: LEV.15,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'état d'impureté de l'homme et de la femme
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L''Eternel dit à Moïse et à Aaron: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Si quelqu''un touche un objet qui a été sous lui, il sera impur jusqu''au soir et, si quelqu''un porte un tel objet, il lavera ses vêtements, se lavera dans l''eau et sera impur jusqu''au soir. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'S''il touche quelqu''un sans s''être lavé les mains dans l''eau, cette personne lavera ses vêtements, se lavera dans l''eau et sera impure jusqu''au soir. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tout vase de terre qu''il touchera sera brisé et tout vase de bois sera lavé dans l''eau. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Lorsqu''il sera purifié de son écoulement, il comptera encore 7 jours pour sa purification, puis il lavera ses vêtements, lavera son corps avec de l''eau vive et il sera pur. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Le huitième jour, il prendra deux tourterelles ou deux jeunes pigeons, ira devant l''Eternel à l''entrée de la tente de la rencontre et les donnera au prêtre. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Le prêtre les offrira, l'un en sacrifice d'expiation et l'autre en holocauste. Il fera l'expiation pour lui devant l'Eternel à cause de son écoulement.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '»L''homme qui aura une éjaculation lavera tout son corps dans l''eau et sera impur jusqu''au soir. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'On lavera dans l''eau tout vêtement et tout cuir touchés par le sperme, et ils seront impurs jusqu''au soir. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Si une femme a couché avec un tel homme, ils se laveront tous les deux et seront impurs jusqu'au soir.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '»La femme qui aura un écoulement de sang restera 7 jours dans la souillure de ses règles. Si quelqu''un la touche, il sera impur jusqu''au soir. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '«Transmettez ces instructions aux Israélites: Tout homme qui a une blennorragie'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Une blennorragie: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ou un écoulement provenant de sa chair, allusion à une maladie sexuellement transmissible.
      marker-yv: yv-n
    - type: text
      text: ' est par là même impur. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Tout lit sur lequel elle couchera pendant ses règles sera impur et tout objet sur lequel elle s''assiéra sera impur. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Si quelqu''un touche son lit, il lavera ses vêtements, se lavera dans l''eau et sera impur jusqu''au soir. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Si quelqu''un touche un objet sur lequel elle s''est assise, il lavera ses vêtements, se lavera dans l''eau et sera impur jusqu''au soir. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'S''il y a quelque chose sur le lit ou l''objet sur lequel elle s''est assise, celui qui y touchera sera impur jusqu''au soir. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Si un homme couche avec elle, si la souillure des règles de cette femme vient sur lui, il sera impur pendant 7 jours et tout lit sur lequel il couchera sera impur. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'La femme qui aura un écoulement de sang pendant plusieurs jours en dehors de ses règles, ou dont les règles dureront plus que d''habitude, sera impure pendant toute la période de son écoulement, comme pendant ses règles. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Tout lit sur lequel elle couchera pendant la durée de cet écoulement sera comme le lit de ses règles et tout objet sur lequel elle s''assiéra sera impur comme lors de ses règles. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Si quelqu''un les touche, il sera impur. Il lavera ses vêtements, se lavera dans l''eau et sera impur jusqu''au soir. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Lorsqu''elle sera purifiée de son écoulement, elle comptera encore 7 jours après lesquels elle sera pure. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Le huitième jour, elle prendra deux tourterelles ou deux jeunes pigeons et elle les apportera au prêtre à l''entrée de la tente de la rencontre. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Il est impur à cause de sa blennorragie. Que son corps laisse couler l''écoulement ou le retienne, il est impur. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Le prêtre offrira l'un en sacrifice d'expiation et l'autre en holocauste, et il fera l'expiation pour elle devant l'Eternel à cause de l'écoulement qui la rendait impure.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: »Vous éloignerez les Israélites de ce qui les met en état d'impureté, ainsi ils ne mourront pas pour avoir rendu impure mon habitation au milieu d'eux.»
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Telle est la loi pour l''homme qui a une blennorragie ou qui est impur en raison d''une éjaculation, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: pour la femme qui a ses règles, pour l'homme ou la femme qui a un écoulement et pour l'homme qui couche avec une femme impure.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Tout lit sur lequel il couchera sera impur et tout objet sur lequel il s''assiéra sera impur. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Si quelqu''un touche son lit, il lavera ses vêtements, se lavera dans l''eau et sera impur jusqu''au soir. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Si quelqu''un s''assied sur l''objet sur lequel lui-même s''est assis, il lavera ses vêtements, se lavera dans l''eau et sera impur jusqu''au soir. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Si quelqu''un touche son corps, il lavera ses vêtements, se lavera dans l''eau et sera impur jusqu''au soir. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'S''il crache sur un homme pur, cet homme lavera ses vêtements, se lavera dans l''eau et sera impur jusqu''au soir. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Toute selle sur laquelle il voyagera sera impure. '
