document_id: GEN.13,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Séparation d'avec Lot
  - type: text
    content: 'Abram remonta d''Egypte vers le Néguev avec sa femme et tout ce qui lui appartenait. Lot était avec lui. '
  '10':
  - type: text
    content: 'Lot leva les yeux et vit que toute la plaine du Jourdain était entièrement arrosée. Avant que l''Eternel n''ait détruit Sodome et Gomorrhe, c''était, jusqu''à Tsoar, comme un jardin de l''Eternel, comme l''Egypte. '
  '11':
  - type: text
    content: 'Lot choisit pour lui toute la plaine du Jourdain et se mit en route vers l''est. C''est ainsi qu''ils se séparèrent l''un de l''autre. '
  '12':
  - type: text
    content: 'Abram s''installa dans le pays de Canaan, tandis que Lot s''installait dans les villes de la plaine et dressait ses tentes jusqu''à Sodome. '
  '13':
  - type: text
    content: Les habitants de Sodome étaient mauvais et péchaient beaucoup contre l'Eternel.
  - type: heading
    content: Nouvelles promesses à Abram
  '14':
  - type: text
    content: 'L''Eternel dit à Abram, après que Lot se fut séparé de lui: «Lève les yeux et, de l''endroit où tu es, regarde vers le nord et le sud, vers l''est et l''ouest. '
  '15':
  - type: text
    content: 'En effet, tout le pays que tu vois, je te le donnerai à toi, ainsi qu''à ta descendance pour toujours. '
  '16':
  - type: text
    content: 'Je rendrai ta descendance pareille à la poussière de la terre, de sorte que, si quelqu''un peut compter la poussière de la terre, ta descendance aussi sera comptée. '
  '17':
  - type: text
    content: 'Lève-toi et parcours le pays dans sa longueur et dans sa largeur, car je te le donnerai.» '
  '18':
  - type: text
    content: Abram déplaça ses tentes et vint habiter parmi les chênes de Mamré qui sont près d'Hébron. Là, il construisit un autel en l'honneur de l'Eternel.
  '2':
  - type: text
    content: 'Abram était très riche en troupeaux, en argent et en or. '
  '3':
  - type: text
    content: 'Il se rendit par étapes du Néguev jusqu''à Béthel, jusqu''à l''endroit où était sa tente au début, entre Béthel et Aï, '
  '4':
  - type: text
    content: là où se trouvait l'autel qu'il avait fait la première fois. Là, Abram fit appel au nom de l'Eternel.
  '5':
  - type: text
    content: 'Lot, qui voyageait avec Abram, avait aussi des brebis, des bœufs et des tentes. '
  '6':
  - type: text
    content: 'La région ne suffisait pas pour qu''ils habitent ensemble. En effet, leurs biens étaient si nombreux qu''ils ne pouvaient plus rester ensemble. '
  '7':
  - type: text
    content: 'Il y eut une dispute entre les bergers des troupeaux d''Abram et les bergers des troupeaux de Lot. Les Cananéens et les Phéréziens habitaient alors dans le pays. '
  '8':
  - type: text
    content: 'Abram dit à Lot: «Qu''il n''y ait donc pas de dispute entre toi et moi, ni entre tes bergers et les miens, car nous sommes frères. '
  '9':
  - type: text
    content: 'Tout le pays n''est-il pas devant toi? Sépare-toi de moi. Si tu vas à gauche, j''irai à droite, et si tu vas à droite, j''irai à gauche.» '
