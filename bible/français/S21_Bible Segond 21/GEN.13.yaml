document_id: GEN.13,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Séparation d'avec Lot
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abram remonta d''Egypte vers le Néguev avec sa femme et tout ce qui lui appartenait. Lot était avec lui. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lot leva les yeux et vit que toute la plaine du Jourdain était entièrement arrosée. Avant que l''Eternel n''ait détruit Sodome et Gomorrhe, c''était, jusqu''à Tsoar, comme un jardin de l''Eternel, comme l''Egypte. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lot choisit pour lui toute la plaine du Jourdain et se mit en route vers l''est. C''est ainsi qu''ils se séparèrent l''un de l''autre. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abram s''installa dans le pays de Canaan, tandis que Lot s''installait dans les villes de la plaine et dressait ses tentes jusqu''à Sodome. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les habitants de Sodome étaient mauvais et péchaient beaucoup contre l'Eternel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Nouvelles promesses à Abram
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel dit à Abram, après que Lot se fut séparé de lui: «Lève les yeux et, de l''endroit où tu es, regarde vers le nord et le sud, vers l''est et l''ouest. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, tout le pays que tu vois, je te le donnerai à toi, ainsi qu''à ta descendance pour toujours. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je rendrai ta descendance pareille à la poussière de la terre, de sorte que, si quelqu''un peut compter la poussière de la terre, ta descendance aussi sera comptée. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lève-toi et parcours le pays dans sa longueur et dans sa largeur, car je te le donnerai.» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Abram déplaça ses tentes et vint habiter parmi les chênes de Mamré qui sont près d'Hébron. Là, il construisit un autel en l'honneur de l'Eternel.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abram était très riche en troupeaux, en argent et en or. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il se rendit par étapes du Néguev jusqu''à Béthel, jusqu''à l''endroit où était sa tente au début, entre Béthel et Aï, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: là où se trouvait l'autel qu'il avait fait la première fois. Là, Abram fit appel au nom de l'Eternel.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lot, qui voyageait avec Abram, avait aussi des brebis, des bœufs et des tentes. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La région ne suffisait pas pour qu''ils habitent ensemble. En effet, leurs biens étaient si nombreux qu''ils ne pouvaient plus rester ensemble. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y eut une dispute entre les bergers des troupeaux d''Abram et les bergers des troupeaux de Lot. Les Cananéens et les Phéréziens habitaient alors dans le pays. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abram dit à Lot: «Qu''il n''y ait donc pas de dispute entre toi et moi, ni entre tes bergers et les miens, car nous sommes frères. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout le pays n''est-il pas devant toi? Sépare-toi de moi. Si tu vas à gauche, j''irai à droite, et si tu vas à droite, j''irai à gauche.» '
