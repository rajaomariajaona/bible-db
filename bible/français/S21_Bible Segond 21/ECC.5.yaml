document_id: ECC.5
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ne t''empresse pas d''ouvrir la bouche! Que ton cœur ne se précipite pas pour exprimer une parole devant Dieu! En effet, Dieu est au ciel, et toi sur la terre. Que tes paroles soient donc peu nombreuses! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Oui, les rêves surgissent dans un flot d'occupations, et la voix de l'homme stupide dans un flot de paroles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Lorsque tu as fait un vœu à Dieu, ne tarde pas à l''accomplir, car il n''aime pas les hommes stupides. Accomplis le vœu que tu as fait! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mieux vaut pour toi ne pas faire de vœu plutôt que d''en faire un et de ne pas l''accomplir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ne permets pas à ta bouche de te faire pécher et ne dis pas devant le messager de Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le messager de Dieu: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire le prêtre, représentant de Dieu.
    marker-yv: yv-n
  - type: text
    text: ' que c''est un péché involontaire. Pourquoi Dieu devrait-il s''irriter à cause de tes paroles et détruire le travail de tes mains? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Oui, s'il y a des absurdités dans un flot de rêves, il y en a aussi dans un flot de paroles. C'est pourquoi, crains Dieu!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Incertitude des richesses
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Si tu vois dans une province le pauvre opprimé, le droit et la justice violés, ne t''en étonne pas, car un homme de rang élevé est placé sous la surveillance d''un autre de rang plus élevé, et au-dessus d''eux il y en a de rang plus élevé encore. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ce qui représente un avantage pour le pays à tout point de vue, c'est un roi qui favorise la culture de la terre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Celui qui aime l''argent n''en sera jamais rassasié et celui qui aime les richesses n''en profitera pas. Cela aussi, c''est de la fumée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Quand les biens sont nombreux, ceux qui les mangent le sont aussi, et quel avantage en tire leur possesseur? Il ne peut que les voir de ses propres yeux! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le sommeil du travailleur est doux, qu'il ait peu ou beaucoup à manger, tandis que la satiété dont jouit le riche ne le laisse pas dormir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il y a un mal douloureux que j''ai vu sous le soleil: des richesses conservées, pour son malheur, par celui qui les possède. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Si ces richesses disparaissent à cause d''une mauvaise affaire, il ne reste rien entre les mains de son fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il est sorti nu du ventre de sa mère et il repart aussi nu qu''il était venu, sans rien pouvoir emporter de son travail avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Cela aussi, c''est un mal douloureux: il s''en va comme il était venu, et quel avantage a-t-il d''avoir travaillé pour du vent? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: De plus, toute sa vie il mange dans l'obscurité et il n'est pas épargné par le chagrin, la maladie et l'irritation.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Voici ce que j''ai vu: il est bon et beau pour l''homme de manger et de boire et de prendre du plaisir dans le travail qu''il accomplit sous le soleil, pendant la durée de vie que Dieu lui accorde, car c''est sa part. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et même, si un homme a reçu de Dieu des richesses et des biens, s''il lui a donné le pouvoir d''en manger, d''en prendre sa part et de se réjouir au milieu de son travail, c''est un cadeau de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: En effet, il ne se souviendra pas beaucoup de la durée de sa vie, parce que Dieu l'occupe en déversant la joie dans son cœur.
