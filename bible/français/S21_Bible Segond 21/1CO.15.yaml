document_id: 1CO.15,152
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Rappel de l''Evangile: la résurrection'
  - type: text
    content: 'Je vous rappelle, frères et sœurs, l''Evangile que je vous ai annoncé, que vous avez reçu et dans lequel vous tenez ferme. '
  '10':
  - type: text
    content: 'Mais par la grâce de Dieu je suis ce que je suis, et sa grâce envers moi n''a pas été sans résultat. Au contraire, j''ai travaillé plus qu''eux tous, non pas moi toutefois, mais la grâce de Dieu [qui est] avec moi. '
  '11':
  - type: text
    content: Ainsi donc, que ce soit moi ou que ce soient eux, voilà le message que nous prêchons, et voilà aussi ce que vous avez cru.
  '12':
  - type: text
    content: 'Or, si l''on prêche que Christ est ressuscité, comment quelques-uns parmi vous peuvent-ils dire qu''il n''y a pas de résurrection des morts? '
  '13':
  - type: text
    content: 'S''il n''y a pas de résurrection des morts, Christ non plus n''est pas ressuscité. '
  '14':
  - type: text
    content: 'Et si Christ n''est pas ressuscité, alors notre prédication est vide, et votre foi aussi. '
  '15':
  - type: text
    content: 'Il se trouve même que nous sommes de faux témoins vis-à-vis de Dieu, puisque nous avons témoigné contre Dieu qu''il a ressuscité Christ. Or il ne l''a pas fait si les morts ne ressuscitent pas. '
  '16':
  - type: text
    content: 'En effet, si les morts ne ressuscitent pas, Christ non plus n''est pas ressuscité. '
  '17':
  - type: text
    content: 'Or, si Christ n''est pas ressuscité, votre foi est inutile, vous êtes encore dans vos péchés, '
  '18':
  - type: text
    content: 'et par conséquent ceux qui sont morts en Christ sont aussi perdus. '
  '19':
  - type: text
    content: Si c'est pour cette vie seulement que nous espérons en Christ, nous sommes les plus à plaindre de tous les hommes.
  '2':
  - type: text
    content: C'est aussi par lui que vous êtes sauvés si vous le retenez dans les termes où je vous l'ai annoncé; autrement, votre foi aurait été inutile.
  '20':
  - type: text
    content: 'Mais en réalité, Christ est ressuscité, précédant ainsi ceux qui sont morts. '
  '21':
  - type: text
    content: En effet, puisque la mort est venue à travers un homme, c'est aussi à travers un homme
  - type: note
    content: 'Un homme… un homme: respectivement Adam et Jésus-Christ.'
  - type: text
    content: ' qu''est venue la résurrection des morts. '
  '22':
  - type: text
    content: 'Et comme tous meurent en Adam, de même aussi tous revivront en Christ, '
  '23':
  - type: text
    content: 'mais chacun à son propre rang: Christ en premier, puis ceux qui appartiennent à Christ lors de son retour. '
  '24':
  - type: text
    content: 'Ensuite viendra la fin, quand il remettra le royaume à celui qui est Dieu et Père, après avoir anéanti toute domination, toute autorité et toute puissance. '
  '25':
  - type: text
    content: 'En effet, il faut qu''il règne jusqu''à ce '
  - type: text
    content: qu'il ait mis tous ses ennemis sous ses pieds
  - type: note
    content: 'Qu''il ait mis… pieds: citation du Psaume 110.1.'
  - type: text
    content: '. '
  '26':
  - type: text
    content: 'Le dernier ennemi qui sera anéanti, c''est la mort. '
  '27':
  - type: text
    content: Dieu
  - type: text
    content: ', en effet, '
  - type: text
    content: a tout mis sous ses pieds.
  - type: note
    content: 'Dieu… pieds: citation du Psaume 8.7.'
  - type: text
    content: 'Mais lorsque Dieu dit que tout lui a été soumis, il est évident que c''est à l''exception de celui qui lui a soumis toute chose. '
  '28':
  - type: text
    content: Lorsque tout lui aura été soumis, alors le Fils lui-même se soumettra à celui qui lui a soumis toute chose, afin que Dieu soit tout en tous.
  '29':
  - type: text
    content: 'S''il en était autrement, que feraient ceux qui se font baptiser pour les morts? Si les morts ne ressuscitent en aucun cas, pourquoi se font-ils baptiser pour eux? '
  '3':
  - type: text
    content: 'Je vous ai transmis avant tout le message que j''avais moi aussi reçu: Christ est mort pour nos péchés, conformément aux Ecritures; '
  '30':
  - type: text
    content: 'Et nous, pourquoi affrontons-nous à toute heure le danger? '
  '31':
  - type: text
    content: 'Chaque jour je risque la mort, aussi vrai, frères et sœurs, que vous faites ma fierté en Jésus-Christ notre Seigneur. '
  '32':
  - type: text
    content: 'Si c''est dans une perspective purement humaine que j''ai combattu contre les bêtes à Ephèse, quel avantage m''en revient-il? Si les morts ne ressuscitent pas, alors '
  - type: text
    content: mangeons et buvons, puisque demain nous mourrons
  - type: note
    content: 'Mangeons… mourrons: citation d''Esaïe 22.13.'
  - type: text
    content: .
  '33':
  - type: text
    content: 'Ne vous y trompez pas, «les mauvaises compagnies corrompent les bonnes mœurs». '
  '34':
  - type: text
    content: Revenez à votre bon sens, comme il convient, et ne péchez pas; car certains d'entre vous ne connaissent pas Dieu, je le dis à votre honte.
  '35':
  - type: text
    content: 'Mais quelqu''un dira: «Comment les morts ressuscitent-ils et avec quel corps reviennent-ils?» '
  '36':
  - type: text
    content: 'Homme dépourvu de bon sens! Ce que tu sèmes ne peut reprendre vie que s''il meurt. '
  '37':
  - type: text
    content: 'Et ce que tu sèmes, ce n''est pas la plante qui poussera; c''est une simple graine, un grain de blé peut-être, ou d''une autre semence. '
  '38':
  - type: text
    content: Puis Dieu lui donne un corps, comme il le veut, et à chaque semence il donne un corps qui lui est propre.
  '39':
  - type: text
    content: 'Les êtres vivants n''ont pas tous la même nature, mais autre est la nature des hommes, autre celle des quadrupèdes, autre celle des oiseaux, autre celle des poissons. '
  '4':
  - type: text
    content: 'il a été enseveli et il est ressuscité le troisième jour, conformément aux Ecritures. '
  '40':
  - type: text
    content: 'Il y a aussi des corps célestes et des corps terrestres, mais l''éclat des corps célestes est différent de celui des corps terrestres. '
  '41':
  - type: text
    content: Autre est l'éclat du soleil, autre l'éclat de la lune, et autre l'éclat des étoiles; chaque étoile diffère même en éclat d'une autre étoile.
  '42':
  - type: text
    content: 'C''est aussi le cas pour la résurrection des morts. Le corps est semé corruptible, il ressuscite incorruptible. '
  '43':
  - type: text
    content: 'Il est semé méprisable, il ressuscite glorieux. Il est semé faible, il ressuscite plein de force. '
  '44':
  - type: text
    content: Il est semé corps naturel, il ressuscite corps spirituel. [S']il y a un corps naturel, il y a aussi un corps spirituel
  - type: note
    content: 'Naturel… spirituel: littéralement caractérisé par l''âme… caractérisé par l''Esprit. Nous recevons un corps à la naissance; les chrétiens recevront un corps, toujours physique, semblable à celui de Christ lors de la résurrection des corps.'
  - type: text
    content: '. '
  '45':
  - type: text
    content: 'C''est pourquoi il est écrit: '
  - type: text
    content: Le premier homme, Adam, devint un être vivant.
  - type: note
    content: 'Le premier… vivant: citation de Genèse 2.7.'
  - type: text
    content: 'Le dernier Adam est un esprit qui communique la vie. '
  '46':
  - type: text
    content: 'Mais ce n''est pas le spirituel qui vient en premier, c''est le naturel; ce qui est spirituel vient ensuite. '
  '47':
  - type: text
    content: 'Le premier homme, tiré de la terre, est fait de poussière, le second homme, [le Seigneur,] est du ciel. '
  '48':
  - type: text
    content: 'Tel est l''homme terrestre, tels sont aussi les hommes terrestres; et tel est l''homme céleste, tels seront aussi les hommes célestes. '
  '49':
  - type: text
    content: Et de même que nous avons porté l'image de l'homme fait de poussière, nous porterons aussi l'image de celui qui est venu du ciel.
  '5':
  - type: text
    content: 'Ensuite il est apparu à Céphas, puis aux douze. '
  '50':
  - type: text
    content: 'Ce que je veux dire, frères et sœurs, c''est que notre nature actuelle ne peut pas hériter du royaume de Dieu, et que ce qui est corruptible n''hérite pas non plus de l''incorruptibilité. '
  '51':
  - type: text
    content: 'Voici, je vous dis un mystère: nous ne mourrons pas tous, mais tous nous serons transformés, '
  '52':
  - type: text
    content: 'en un instant, en un clin d''œil, au son de la dernière trompette. La trompette sonnera, alors les morts ressusciteront incorruptibles et nous, nous serons transformés. '
  '53':
  - type: text
    content: Il faut en effet que ce corps corruptible revête l'incorruptibilité et que ce corps mortel revête l'immortalité.
  '54':
  - type: text
    content: 'Lorsque ce corps corruptible aura revêtu l''incorruptibilité et que ce corps mortel aura revêtu l''immortalité, alors s''accomplira cette parole de l''Ecriture: '
  - type: text
    content: La mort a été engloutie dans la victoire.
  - type: note
    content: 'La mort… victoire: renvoi à Esaïe 25.8.'
  - type: text
    content: ' '
  '55':
  - type: text
    content: Mort, où est ton aiguillon? Enfer, où est ta victoire?
  - type: note
    content: 'Mort… victoire: citation d''Osée 13.14. L''aiguillon était le bâton qui servait à piquer les bêtes pour les diriger et a désigné, par la suite, un instrument de torture.'
  - type: text
    content: ' '
  '56':
  - type: text
    content: 'L''aiguillon de la mort, c''est le péché; et ce qui donne sa puissance au péché, c''est la loi. '
  '57':
  - type: text
    content: Mais que Dieu soit remercié, lui qui nous donne la victoire par notre Seigneur Jésus-Christ!
  '58':
  - type: text
    content: Ainsi, mes frères et sœurs bien-aimés, soyez fermes, inébranlables. Travaillez de mieux en mieux à l'œuvre du Seigneur, sachant que votre travail n'est pas sans résultat dans le Seigneur.
  '6':
  - type: text
    content: 'Après cela, il est apparu à plus de 500 frères et sœurs à la fois, dont la plupart sont encore vivants et dont quelques-uns sont morts. '
  '7':
  - type: text
    content: 'Ensuite, il est apparu à Jacques, puis à tous les apôtres. '
  '8':
  - type: text
    content: 'Après eux tous, il m''est apparu à moi aussi, comme à un enfant né hors terme. '
  '9':
  - type: text
    content: 'En effet, je suis le plus petit des apôtres et je ne mérite même pas d''être appelé apôtre, parce que j''ai persécuté l''Eglise de Dieu. '
