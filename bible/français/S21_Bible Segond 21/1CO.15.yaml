document_id: 1CO.15,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Rappel de l''Evangile: la résurrection'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Je vous rappelle, frères et sœurs, l''Evangile que je vous ai annoncé, que vous avez reçu et dans lequel vous tenez ferme. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Mais par la grâce de Dieu je suis ce que je suis, et sa grâce envers moi n''a pas été sans résultat. Au contraire, j''ai travaillé plus qu''eux tous, non pas moi toutefois, mais la grâce de Dieu [qui est] avec moi. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ainsi donc, que ce soit moi ou que ce soient eux, voilà le message que nous prêchons, et voilà aussi ce que vous avez cru.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Or, si l''on prêche que Christ est ressuscité, comment quelques-uns parmi vous peuvent-ils dire qu''il n''y a pas de résurrection des morts? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'S''il n''y a pas de résurrection des morts, Christ non plus n''est pas ressuscité. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Et si Christ n''est pas ressuscité, alors notre prédication est vide, et votre foi aussi. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Il se trouve même que nous sommes de faux témoins vis-à-vis de Dieu, puisque nous avons témoigné contre Dieu qu''il a ressuscité Christ. Or il ne l''a pas fait si les morts ne ressuscitent pas. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'En effet, si les morts ne ressuscitent pas, Christ non plus n''est pas ressuscité. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Or, si Christ n''est pas ressuscité, votre foi est inutile, vous êtes encore dans vos péchés, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'et par conséquent ceux qui sont morts en Christ sont aussi perdus. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Si c'est pour cette vie seulement que nous espérons en Christ, nous sommes les plus à plaindre de tous les hommes.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: C'est aussi par lui que vous êtes sauvés si vous le retenez dans les termes où je vous l'ai annoncé; autrement, votre foi aurait été inutile.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Mais en réalité, Christ est ressuscité, précédant ainsi ceux qui sont morts. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: En effet, puisque la mort est venue à travers un homme, c'est aussi à travers un homme
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Un homme… un homme: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: respectivement Adam et Jésus-Christ.
      marker-yv: yv-n
    - type: text
      text: ' qu''est venue la résurrection des morts. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Et comme tous meurent en Adam, de même aussi tous revivront en Christ, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'mais chacun à son propre rang: Christ en premier, puis ceux qui appartiennent à Christ lors de son retour. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ensuite viendra la fin, quand il remettra le royaume à celui qui est Dieu et Père, après avoir anéanti toute domination, toute autorité et toute puissance. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'En effet, il faut qu''il règne jusqu''à ce '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: qu'il ait mis tous ses ennemis sous ses pieds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qu''il ait mis… pieds: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 110.1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Le dernier ennemi qui sera anéanti, c''est la mort. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Dieu
    - type: text
      text: ', en effet, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: a tout mis sous ses pieds.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dieu… pieds: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 8.7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais lorsque Dieu dit que tout lui a été soumis, il est évident que c''est à l''exception de celui qui lui a soumis toute chose. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Lorsque tout lui aura été soumis, alors le Fils lui-même se soumettra à celui qui lui a soumis toute chose, afin que Dieu soit tout en tous.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'S''il en était autrement, que feraient ceux qui se font baptiser pour les morts? Si les morts ne ressuscitent en aucun cas, pourquoi se font-ils baptiser pour eux? '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Je vous ai transmis avant tout le message que j''avais moi aussi reçu: Christ est mort pour nos péchés, conformément aux Ecritures; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Et nous, pourquoi affrontons-nous à toute heure le danger? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Chaque jour je risque la mort, aussi vrai, frères et sœurs, que vous faites ma fierté en Jésus-Christ notre Seigneur. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Si c''est dans une perspective purement humaine que j''ai combattu contre les bêtes à Ephèse, quel avantage m''en revient-il? Si les morts ne ressuscitent pas, alors '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: mangeons et buvons, puisque demain nous mourrons
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.32 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Mangeons… mourrons: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 22.13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Ne vous y trompez pas, «les mauvaises compagnies corrompent les bonnes mœurs». '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Revenez à votre bon sens, comme il convient, et ne péchez pas; car certains d'entre vous ne connaissent pas Dieu, je le dis à votre honte.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Mais quelqu''un dira: «Comment les morts ressuscitent-ils et avec quel corps reviennent-ils?» '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Homme dépourvu de bon sens! Ce que tu sèmes ne peut reprendre vie que s''il meurt. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Et ce que tu sèmes, ce n''est pas la plante qui poussera; c''est une simple graine, un grain de blé peut-être, ou d''une autre semence. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Puis Dieu lui donne un corps, comme il le veut, et à chaque semence il donne un corps qui lui est propre.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Les êtres vivants n''ont pas tous la même nature, mais autre est la nature des hommes, autre celle des quadrupèdes, autre celle des oiseaux, autre celle des poissons. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'il a été enseveli et il est ressuscité le troisième jour, conformément aux Ecritures. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Il y a aussi des corps célestes et des corps terrestres, mais l''éclat des corps célestes est différent de celui des corps terrestres. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Autre est l'éclat du soleil, autre l'éclat de la lune, et autre l'éclat des étoiles; chaque étoile diffère même en éclat d'une autre étoile.
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'C''est aussi le cas pour la résurrection des morts. Le corps est semé corruptible, il ressuscite incorruptible. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Il est semé méprisable, il ressuscite glorieux. Il est semé faible, il ressuscite plein de force. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Il est semé corps naturel, il ressuscite corps spirituel. [S']il y a un corps naturel, il y a aussi un corps spirituel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.44 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Naturel… spirituel: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: littéralement caractérisé par l'âme… caractérisé par l'Esprit. Nous recevons un corps à la naissance; les chrétiens recevront un corps, toujours physique, semblable à celui de Christ lors de la résurrection des corps.
      marker-yv: yv-n
    - type: text
      text: '. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'C''est pourquoi il est écrit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Le premier homme, Adam, devint un être vivant.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.45 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le premier… vivant: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Genèse 2.7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le dernier Adam est un esprit qui communique la vie. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Mais ce n''est pas le spirituel qui vient en premier, c''est le naturel; ce qui est spirituel vient ensuite. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Le premier homme, tiré de la terre, est fait de poussière, le second homme, [le Seigneur,] est du ciel. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Tel est l''homme terrestre, tels sont aussi les hommes terrestres; et tel est l''homme céleste, tels seront aussi les hommes célestes. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Et de même que nous avons porté l'image de l'homme fait de poussière, nous porterons aussi l'image de celui qui est venu du ciel.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ensuite il est apparu à Céphas, puis aux douze. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Ce que je veux dire, frères et sœurs, c''est que notre nature actuelle ne peut pas hériter du royaume de Dieu, et que ce qui est corruptible n''hérite pas non plus de l''incorruptibilité. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Voici, je vous dis un mystère: nous ne mourrons pas tous, mais tous nous serons transformés, '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'en un instant, en un clin d''œil, au son de la dernière trompette. La trompette sonnera, alors les morts ressusciteront incorruptibles et nous, nous serons transformés. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: Il faut en effet que ce corps corruptible revête l'incorruptibilité et que ce corps mortel revête l'immortalité.
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'Lorsque ce corps corruptible aura revêtu l''incorruptibilité et que ce corps mortel aura revêtu l''immortalité, alors s''accomplira cette parole de l''Ecriture: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: La mort a été engloutie dans la victoire.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.54 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'La mort… victoire: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'renvoi à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 25.8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Mort, où est ton aiguillon? Enfer, où est ta victoire?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.55 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Mort… victoire: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Osée 13.14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . L'aiguillon était le bâton qui servait à piquer les bêtes pour les diriger et a désigné, par la suite, un instrument de torture.
      marker-yv: yv-n
    - type: text
      text: ' '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: 'L''aiguillon de la mort, c''est le péché; et ce qui donne sa puissance au péché, c''est la loi. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: Mais que Dieu soit remercié, lui qui nous donne la victoire par notre Seigneur Jésus-Christ!
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: Ainsi, mes frères et sœurs bien-aimés, soyez fermes, inébranlables. Travaillez de mieux en mieux à l'œuvre du Seigneur, sachant que votre travail n'est pas sans résultat dans le Seigneur.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Après cela, il est apparu à plus de 500 frères et sœurs à la fois, dont la plupart sont encore vivants et dont quelques-uns sont morts. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ensuite, il est apparu à Jacques, puis à tous les apôtres. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Après eux tous, il m''est apparu à moi aussi, comme à un enfant né hors terme. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'En effet, je suis le plus petit des apôtres et je ne mérite même pas d''être appelé apôtre, parce que j''ai persécuté l''Eglise de Dieu. '
