document_id: EZK.42
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salles pour les offrandes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Puis l''homme m''a fait sortir vers le parvis extérieur, du côté nord. Il m''a conduit aux salles qui étaient vis-à-vis de la cour et vis-à-vis du bâtiment, au nord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'La façade du bâtiment qui se trouvait du côté de l''entrée nord avait une longueur de 50 mètres, et sa largeur était de 25 mètres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Elle était parallèle aux 10 mètres du parvis intérieur et au dallage du parvis extérieur. Le bâtiment contenait des galeries superposées sur trois étages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Devant les salles, il y avait une allée large de 5 mètres vers la cour intérieure et un passage de 50 centimètres. Leurs entrées donnaient au nord. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les salles supérieures étaient plus étroites que les inférieures et que celles du milieu du bâtiment, parce que les galeries leur enlevaient de la place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ces salles étaient disposées sur trois étages, mais il n''y avait pas de colonnes pareilles aux colonnes des parvis. C''est pourquoi, à partir du sol, les chambres du haut étaient en retrait par rapport à celles du bas et du milieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'La cloison tournée vers l''extérieur qui jouxtait les salles du côté du parvis extérieur, devant les salles, avait 25 mètres de long. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'En effet, la longueur des salles du côté du parvis extérieur faisait 25 mètres, tandis que la façade du côté du temple faisait 50 mètres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Au bas de ces salles se trouvait une entrée située à l'est, par laquelle on entrait en venant du parvis extérieur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il y avait encore des salles sur la largeur du mur du parvis, du côté est, vis-à-vis de la cour et vis-à-vis de l''enceinte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Devant elles, il y avait une allée, comme devant les salles qui étaient du côté nord. La longueur et la largeur étaient les mêmes; leurs issues, leur disposition et leurs entrées étaient semblables. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il en allait de même pour les entrées des salles du côté sud. Il y avait une entrée devant le passage qui se trouvait droit devant le mur à l''est, par où l''on entrait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il m''a dit: «Les salles du nord et les salles du sud qui sont devant la cour, ce sont les salles saintes où les prêtres qui s''approchent de l''Eternel mangeront les choses très saintes. Ils y déposeront les offrandes très saintes, les offrandes végétales, les sacrifices d''expiation et les sacrifices de culpabilité, car c''est un endroit saint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Quand les prêtres seront entrés, ils ne sortiront pas du lieu saint pour se rendre dans le parvis extérieur, mais ils déposeront là les habits avec lesquels ils effectuent le service, car ces habits sont saints. Ils en mettront d'autres pour s'approcher du peuple.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mesures complémentaires
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Après avoir fini de mesurer l''intérieur du temple, l''homme m''a conduit dehors par l''entrée qui était du côté est, puis il a mesuré tout le pourtour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il a mesuré le côté est avec la canne à mesurer: il y avait un kilomètre et demi au total. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il a mesuré le côté nord avec la canne à mesurer: il y avait un kilomètre et demi au total. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il a mesuré le côté sud avec la canne à mesurer: il y avait un kilomètre et demi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il s''est tourné du côté ouest et a mesuré avec la canne à mesurer: il y avait un kilomètre et demi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il a donc mesuré les quatre côtés du mur formant l''enceinte du temple: sa longueur était d''un kilomètre et demi et sa largeur d''un kilomètre et demi. Ce mur marquait la séparation entre le saint et le profane.'
