document_id: EXO.7
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le bâton changé en serpent
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Moïse: «Regarde, je te fais Dieu pour le pharaon, et ton frère Aaron sera ton prophète'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Prophète: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire porte-parole.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Toi, tu diras tout ce que je t''ordonnerai et ton frère Aaron parlera au pharaon pour qu''il laisse les Israélites partir de son pays. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'De mon côté, j''endurcirai le cœur du pharaon et je multiplierai mes signes et mes miracles en Egypte. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le pharaon ne vous écoutera pas. Je porterai la main contre l''Egypte et c''est par de grands actes de jugement que je ferai sortir d''Egypte mes armées, mon peuple, les Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les Egyptiens reconnaîtront que je suis l'Eternel lorsque je déploierai ma puissance contre l'Egypte et ferai sortir les Israélites du milieu d'eux.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Moïse et Aaron se conformèrent à ce que l''Eternel leur avait ordonné, c''est ce qu''ils firent. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Moïse était âgé de 80 ans et Aaron de 83 ans lorsqu'ils parlèrent au pharaon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L''Eternel dit à Moïse et à Aaron: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '«Si le pharaon vous dit: ‘Faites un miracle!’ tu ordonneras à Aaron: ‘Prends ton bâton et jette-le devant le pharaon.’ Le bâton se changera alors en serpent.» '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Moïse et Aaron allèrent trouver le pharaon et se conformèrent à ce que l''Eternel avait ordonné: Aaron jeta son bâton devant le pharaon et devant ses serviteurs, et il se changea en serpent. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Cependant, le pharaon appela des sages et des sorciers, et les magiciens d''Egypte, eux aussi, en firent autant par leurs sortilèges. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils jetèrent tous leurs bâtons et ceux-ci se changèrent en serpents. Mais le bâton d''Aaron engloutit les leurs. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Le cœur du pharaon s'endurcit et il n'écouta pas Moïse et Aaron. Cela se passa comme l'Eternel l'avait dit.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Fléau n° 1: l''eau changée en sang'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'L''Eternel dit à Moïse: «Le pharaon a le cœur insensible, il refuse de laisser partir le peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Va trouver le pharaon dès le matin; il sortira pour aller près de l''eau et tu te présenteras devant lui au bord du fleuve. Tu prendras à la main le bâton qui a été changé en serpent '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'et tu diras au pharaon: ‘L''Eternel, le Dieu des Hébreux, m''a envoyé vers toi pour te dire: Laisse partir mon peuple afin qu''il me serve dans le désert, et jusqu''à présent tu n''as pas écouté. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Voici ce que dit l''Eternel: Cette fois, tu reconnaîtras que je suis l''Eternel. Je vais frapper l''eau du Nil avec le bâton qui est dans ma main et elle sera changée en sang. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Les poissons qui sont dans le fleuve mourront, le fleuve deviendra infect et les Egyptiens renonceront à en boire l'eau.’»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L''Eternel dit à Moïse: «Ordonne à Aaron: ‘Prends ton bâton et tends ta main sur l''eau des Egyptiens, sur leurs rivières, leurs ruisseaux, leurs étangs et tous leurs réservoirs d''eau.’ Elle deviendra du sang. Ainsi il y aura du sang dans toute l''Egypte, même dans les récipients en bois et en pierre.» '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Moïse et Aaron se conformèrent à ce que l''Eternel avait ordonné. Aaron leva le bâton et frappa l''eau du Nil sous les yeux du pharaon et de ses serviteurs, et toute l''eau du fleuve fut changée en sang. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les poissons qui étaient dans le fleuve moururent, le fleuve devint infect, les Egyptiens ne purent plus en boire l''eau et il y eut du sang dans toute l''Egypte. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Cependant, les magiciens d''Egypte en firent autant par leurs sortilèges. Le cœur du pharaon s''endurcit et il n''écouta pas Moïse et Aaron. Cela se passa comme l''Eternel l''avait dit. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Le pharaon se détourna d''eux et rentra chez lui; il ne prit même pas ces événements à cœur. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Tous les Egyptiens creusèrent aux environs du fleuve pour trouver de l'eau à boire, car ils ne pouvaient pas boire de l'eau du Nil.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Fléau n° 2: les grenouilles'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Sept jours passèrent après que l''Eternel eut frappé le Nil. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'L''Eternel dit à Moïse: «Va trouver le pharaon et tu lui annonceras: ‘Voici ce que dit l''Eternel: Laisse partir mon peuple afin qu''il me serve. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Si tu refuses de le laisser partir, je frapperai tout ton territoire par des grenouilles. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Le fleuve pullulera de grenouilles; elles en sortiront et pénétreront dans ta maison, dans ta chambre à coucher et dans ton lit, chez tes serviteurs et ton peuple, dans tes fours et tes pétrins. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Les grenouilles grimperont sur toi, sur ton peuple et sur tous tes serviteurs.’»
