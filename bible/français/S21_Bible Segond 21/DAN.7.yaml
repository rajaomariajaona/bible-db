document_id: DAN.7,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Visions de Daniel
  - type: heading
    content: 7.1–12.13
  - type: heading
    content: Vision des quatre bêtes
  - type: text
    content: La première année du règne de Belshatsar sur Babylone, Daniel fit un rêve. Des visions se présentèrent à son esprit pendant qu'il était sur son lit. Ensuite il mit ce rêve par écrit et en raconta les points principaux.
  '10':
  - type: text
    content: 'Un fleuve de feu coulait et sortait de devant lui. Des dizaines de milliers le servaient et des centaines de millions se tenaient debout devant lui. Les juges se sont assis et des livres ont été ouverts. '
  '11':
  - type: text
    content: 'J''ai alors regardé, à cause des paroles arrogantes que prononçait la corne. Pendant que je regardais, la bête a été tuée. Son corps a été détruit et livré au feu pour être brûlé. '
  '12':
  - type: text
    content: Les autres bêtes ont été dépouillées de leur pouvoir, mais une prolongation de vie leur a été accordée pour un certain temps.
  '13':
  - type: text
    content: »Pendant que je regardais dans mes visions nocturnes, *quelqu'un qui ressemblait à un fils de l'homme est venu avec les nuées du ciel
  - type: note
    content: 'Quelqu''un… ciel: appliqué à Jésus-Christ en Matthieu 24.30; 26.64; Marc 13.26; 14.62; Luc 21.27; 22.69; voir aussi Apocalypse 1.7; 14.14.'
  - type: text
    content: '. Il s''est avancé vers l''Ancien des jours et on l''a fait approcher de lui. '
  '14':
  - type: text
    content: On lui a donné la domination, la gloire et le règne, et tous les peuples, les nations et les hommes de toute langue l'ont servi. Sa domination est une domination éternelle qui ne cessera pas et son royaume ne sera jamais détruit.
  '15':
  - type: text
    content: '»Moi, Daniel, j''ai eu l''esprit troublé au plus profond de moi et mes visions m''ont terrifié. '
  '16':
  - type: text
    content: 'Je me suis approché de l''un de ceux qui se tenaient debout et lui ai demandé de me révéler la vérité à propos de tout cela. Il m''a répondu en me faisant connaître l''explication: '
  '17':
  - type: text
    content: '‘Ces quatre bêtes énormes, ce sont quatre rois qui surgiront de la terre. '
  '18':
  - type: text
    content: Cependant, les saints du Très-Haut recevront le royaume et ils le posséderont éternellement, d'éternité en éternité.’
  '19':
  - type: text
    content: '»Ensuite j''ai désiré savoir la vérité sur la quatrième bête, celle qui était différente de toutes les autres, extrêmement terrible, qui avait des dents en fer et des ongles en bronze, qui mangeait, brisait et piétinait ce qu''il restait. '
  '2':
  - type: text
    content: 'Daniel commença son récit: «Je regardais pendant ma vision nocturne, et voici que les quatre vents du ciel ont fait irruption sur la grande mer. '
  '20':
  - type: text
    content: 'J''ai aussi désiré savoir la vérité au sujet des dix cornes qu''elle avait sur la tête ainsi qu''au sujet de l''autre, celle qui était sortie et devant laquelle trois étaient tombées, la corne qui avait des yeux et une bouche parlant avec arrogance et qui paraissait plus grande que les autres. '
  '21':
  - type: text
    content: 'J''ai vu cette corne faire la guerre aux saints et l''emporter sur eux, '
  '22':
  - type: text
    content: jusqu'au moment où l'Ancien des jours est venu faire justice aux saints du Très-Haut. Le moment où les saints ont pris possession du royaume est alors arrivé.
  '23':
  - type: text
    content: '»Voici ce qu''il m''a dit: ‘La quatrième bête, c''est un quatrième royaume qui existera sur la terre, différent de tous les royaumes. Il dévorera toute la terre, la piétinera et la brisera. '
  '24':
  - type: text
    content: 'Les dix cornes, ce sont dix rois qui surgiront de ce royaume. Un autre surgira après eux. Il sera différent des premiers et abaissera trois rois. '
  '25':
  - type: text
    content: 'Par ses paroles il s''opposera au Très-Haut. Il opprimera les saints du Très-Haut et projettera de changer les temps et la loi. Les saints seront livrés à son pouvoir pendant un temps, deux temps et la moitié d''un temps. '
  '26':
  - type: text
    content: 'Puis le jugement viendra et on lui retirera sa domination: elle sera définitivement détruite et anéantie. '
  '27':
  - type: text
    content: Le royaume, la domination et la grandeur de tous les royaumes présents sous le ciel seront donnés au peuple des saints du Très-Haut. Son règne est un règne éternel et tous les dominateurs le serviront et lui obéiront.’
  '28':
  - type: text
    content: »Ici prend fin le message. Moi, Daniel, j'ai été si terrifié par mes pensées que j'en ai changé de couleur. J'ai gardé cette parole dans mon cœur.»
  '3':
  - type: text
    content: 'Quatre bêtes énormes sont sorties de la mer, différentes les unes des autres. '
  '4':
  - type: text
    content: 'La première ressemblait à un lion et avait des ailes d''aigle. Pendant que je regardais, ses ailes ont été arrachées. Elle a été soulevée de terre et mise debout sur ses pattes, comme un homme, et un cœur d''homme lui a été donné. '
  '5':
  - type: text
    content: 'Puis est apparue une deuxième bête, qui ressemblait à un ours. Elle se dressait sur un côté; elle avait trois côtes dans la gueule, entre les dents. On lui disait: ‘Lève-toi, mange beaucoup de viande!’ '
  '6':
  - type: text
    content: 'Après cela, j''ai vu une autre bête, qui ressemblait à un léopard. Elle avait quatre ailes sur le dos, comme celles d''un oiseau. Cette bête avait quatre têtes et la domination lui a été donnée. '
  '7':
  - type: text
    content: 'Après cela, j''ai vu dans mes visions nocturnes une quatrième bête, redoutable, terrible et extraordinairement puissante. Elle avait de grandes dents en fer. Elle mangeait, brisait et piétinait ce qui restait. Elle était différente de toutes les bêtes précédentes et avait dix cornes. '
  '8':
  - type: text
    content: Je regardais les cornes et j'ai vu une autre petite corne sortir du milieu d'elles. Trois des premières cornes ont été arrachées devant elle. Sur cette corne, il y avait des yeux pareils à ceux d'un homme et une bouche qui parlait avec arrogance.
  '9':
  - type: text
    content: '»Pendant que je regardais, on a placé des trônes et l''Ancien des jours s''est assis. Son vêtement était aussi blanc que la neige et les cheveux de sa tête pareils à de la laine pure. Son trône était de flammes et ses roues étaient un feu dévorant. '
