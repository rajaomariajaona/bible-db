  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vision des quatre bêtes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: La première année du règne de Belshatsar sur Babylone, Daniel fit un rêve. Des visions se présentèrent à son esprit pendant qu'il était sur son lit. Ensuite il mit ce rêve par écrit et en raconta les points principaux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Daniel commença son récit: «Je regardais pendant ma vision nocturne, et voici que les quatre vents du ciel ont fait irruption sur la grande mer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Quatre bêtes énormes sont sorties de la mer, différentes les unes des autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'La première ressemblait à un lion et avait des ailes d''aigle. Pendant que je regardais, ses ailes ont été arrachées. Elle a été soulevée de terre et mise debout sur ses pattes, comme un homme, et un cœur d''homme lui a été donné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Puis est apparue une deuxième bête, qui ressemblait à un ours. Elle se dressait sur un côté; elle avait trois côtes dans la gueule, entre les dents. On lui disait: ‘Lève-toi, mange beaucoup de viande!’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Après cela, j''ai vu une autre bête, qui ressemblait à un léopard. Elle avait quatre ailes sur le dos, comme celles d''un oiseau. Cette bête avait quatre têtes et la domination lui a été donnée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Après cela, j''ai vu dans mes visions nocturnes une quatrième bête, redoutable, terrible et extraordinairement puissante. Elle avait de grandes dents en fer. Elle mangeait, brisait et piétinait ce qui restait. Elle était différente de toutes les bêtes précédentes et avait dix cornes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Je regardais les cornes et j'ai vu une autre petite corne sortir du milieu d'elles. Trois des premières cornes ont été arrachées devant elle. Sur cette corne, il y avait des yeux pareils à ceux d'un homme et une bouche qui parlait avec arrogance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '»Pendant que je regardais, on a placé des trônes et l''Ancien des jours s''est assis. Son vêtement était aussi blanc que la neige et les cheveux de sa tête pareils à de la laine pure. Son trône était de flammes et ses roues étaient un feu dévorant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Un fleuve de feu coulait et sortait de devant lui. Des dizaines de milliers le servaient et des centaines de millions se tenaient debout devant lui. Les juges se sont assis et des livres ont été ouverts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'J''ai alors regardé, à cause des paroles arrogantes que prononçait la corne. Pendant que je regardais, la bête a été tuée. Son corps a été détruit et livré au feu pour être brûlé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Les autres bêtes ont été dépouillées de leur pouvoir, mais une prolongation de vie leur a été accordée pour un certain temps.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: »Pendant que je regardais dans mes visions nocturnes, *quelqu'un qui ressemblait à un fils de l'homme est venu avec les nuées du ciel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Quelqu''un… ciel: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'appliqué à Jésus-Christ en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 24.30
      metadata:
        usfm: MAT.24.30
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '26.64'
      metadata:
        usfm: MAT.26.64
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Marc 13.26
      metadata:
        usfm: MRK.13.26
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14.62'
      metadata:
        usfm: MRK.14.62
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luc 21.27
      metadata:
        usfm: LUK.21.27
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '22.69'
      metadata:
        usfm: LUK.22.69
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '; voir aussi '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Apocalypse 1.7
      metadata:
        usfm: REV.1.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14.14'
      metadata:
        usfm: REV.14.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. Il s''est avancé vers l''Ancien des jours et on l''a fait approcher de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: On lui a donné la domination, la gloire et le règne, et tous les peuples, les nations et les hommes de toute langue l'ont servi. Sa domination est une domination éternelle qui ne cessera pas et son royaume ne sera jamais détruit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '»Moi, Daniel, j''ai eu l''esprit troublé au plus profond de moi et mes visions m''ont terrifié. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Je me suis approché de l''un de ceux qui se tenaient debout et lui ai demandé de me révéler la vérité à propos de tout cela. Il m''a répondu en me faisant connaître l''explication: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '‘Ces quatre bêtes énormes, ce sont quatre rois qui surgiront de la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Cependant, les saints du Très-Haut recevront le royaume et ils le posséderont éternellement, d'éternité en éternité.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '»Ensuite j''ai désiré savoir la vérité sur la quatrième bête, celle qui était différente de toutes les autres, extrêmement terrible, qui avait des dents en fer et des ongles en bronze, qui mangeait, brisait et piétinait ce qu''il restait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'J''ai aussi désiré savoir la vérité au sujet des dix cornes qu''elle avait sur la tête ainsi qu''au sujet de l''autre, celle qui était sortie et devant laquelle trois étaient tombées, la corne qui avait des yeux et une bouche parlant avec arrogance et qui paraissait plus grande que les autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'J''ai vu cette corne faire la guerre aux saints et l''emporter sur eux, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: jusqu'au moment où l'Ancien des jours est venu faire justice aux saints du Très-Haut. Le moment où les saints ont pris possession du royaume est alors arrivé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '»Voici ce qu''il m''a dit: ‘La quatrième bête, c''est un quatrième royaume qui existera sur la terre, différent de tous les royaumes. Il dévorera toute la terre, la piétinera et la brisera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les dix cornes, ce sont dix rois qui surgiront de ce royaume. Un autre surgira après eux. Il sera différent des premiers et abaissera trois rois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Par ses paroles il s''opposera au Très-Haut. Il opprimera les saints du Très-Haut et projettera de changer les temps et la loi. Les saints seront livrés à son pouvoir pendant un temps, deux temps et la moitié d''un temps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Puis le jugement viendra et on lui retirera sa domination: elle sera définitivement détruite et anéantie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Le royaume, la domination et la grandeur de tous les royaumes présents sous le ciel seront donnés au peuple des saints du Très-Haut. Son règne est un règne éternel et tous les dominateurs le serviront et lui obéiront.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: »Ici prend fin le message. Moi, Daniel, j'ai été si terrifié par mes pensées que j'en ai changé de couleur. J'ai gardé cette parole dans mon cœur.»
