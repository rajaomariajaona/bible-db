document_id: PSA.102
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière dans la détresse
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Prière d'un malheureux, lorsqu'il est abattu et qu'il expose sa plainte à l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Eternel, écoute ma prière
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que mon cri parvienne jusqu'à toi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ne me cache pas ton visage lorsque je suis dans la détresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tends ton oreille vers moi quand je crie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: réponds-moi vite,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: car mes jours s'évanouissent comme une fumée
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mes os sont enflammés comme un brasier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Mon cœur est frappé et se dessèche comme l'herbe;
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'en oublie même de manger mon pain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: A force de gémir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je n'ai plus que la peau sur les os.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je ressemble au pélican du désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je suis comme le chat-huant des ruines.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Je suis privé de sommeil et je ressemble
- type: usfm
  marker: q1
  children:
  - type: text
    text: à l'oiseau resté tout seul sur un toit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Chaque jour, mes ennemis m'insultent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se moquent de moi, ils emploient mon nom dans leurs serments.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Je mange de la cendre au lieu de pain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je mêle des larmes à ma boisson
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: à cause de ta colère et de ta fureur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, tu t'es emparé de moi et m'as rejeté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mes jours déclinent comme l'ombre du soir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je me dessèche comme l'herbe,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: mais toi, Eternel, tu règnes éternellement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'on se souvient de toi de génération en génération.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tu te lèveras, tu auras compassion de Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il est temps de lui faire grâce.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, le moment fixé est arrivé,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: car tes serviteurs en aiment les pierres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sont attachés à sa poussière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Alors les nations craindront le nom de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les rois de la terre craindront ta gloire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Quand l'Eternel reconstruira Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il se montrera dans sa gloire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il est attentif à la prière de celui qu'on a dépouillé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne méprise pas sa prière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Que cela soit écrit pour la génération future,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que le peuple ainsi créé célèbre l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: car il regarde du haut de sa demeure sainte.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du haut du ciel, l'Eternel observe la terre
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: pour écouter les gémissements des prisonniers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour délivrer ceux qui sont destinés à la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Alors on proclamera dans Sion le nom de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses louanges dans Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: quand tous les peuples et tous les royaumes
- type: usfm
  marker: q1
  children:
  - type: text
    text: se rassembleront pour servir l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Il a brisé ma force en chemin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a abrégé mes jours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Je dis: «Mon Dieu, ne m''enlève pas au milieu de ma vie,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi dont l'existence traverse les générations!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '*Autrefois tu as fondé la terre,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le ciel est l'œuvre de tes mains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Eux, ils disparaîtront, tandis que toi, tu restes là.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils vieilliront tous comme un vêtement;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu les remplaceras comme un habit, et ils céderont la place,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: mais toi, tu es toujours le même
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ton existence n'aura pas de fin.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '102.26-28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Autrefois… fin: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hébreux 1.10-12
      metadata:
        usfm: HEB.1.10+HEB.1.11+HEB.1.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' comme s''adressant à Jésus-Christ.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Les fils de tes serviteurs pourront s'établir
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur descendance s'affermira devant toi.
