document_id: PSA.102,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière dans la détresse
  - type: text
    content: Prière d'un malheureux, lorsqu'il est abattu et qu'il expose sa plainte à l'Eternel.
  '10':
  - type: text
    content: Je mange de la cendre au lieu de pain,
  - type: text
    content: et je mêle des larmes à ma boisson
  '11':
  - type: text
    content: à cause de ta colère et de ta fureur.
  - type: text
    content: Oui, tu t'es emparé de moi et m'as rejeté.
  '12':
  - type: text
    content: Mes jours déclinent comme l'ombre du soir,
  - type: text
    content: et je me dessèche comme l'herbe,
  '13':
  - type: text
    content: mais toi, Eternel, tu règnes éternellement,
  - type: text
    content: et l'on se souvient de toi de génération en génération.
  '14':
  - type: text
    content: Tu te lèveras, tu auras compassion de Sion,
  - type: text
    content: car il est temps de lui faire grâce.
  - type: text
    content: Oui, le moment fixé est arrivé,
  '15':
  - type: text
    content: car tes serviteurs en aiment les pierres,
  - type: text
    content: ils sont attachés à sa poussière.
  '16':
  - type: text
    content: Alors les nations craindront le nom de l'Eternel,
  - type: text
    content: tous les rois de la terre craindront ta gloire.
  '17':
  - type: text
    content: Quand l'Eternel reconstruira Sion,
  - type: text
    content: il se montrera dans sa gloire.
  '18':
  - type: text
    content: Il est attentif à la prière de celui qu'on a dépouillé,
  - type: text
    content: il ne méprise pas sa prière.
  '19':
  - type: text
    content: Que cela soit écrit pour la génération future,
  - type: text
    content: et que le peuple ainsi créé célèbre l'Eternel,
  '2':
  - type: text
    content: Eternel, écoute ma prière
  - type: text
    content: et que mon cri parvienne jusqu'à toi!
  '20':
  - type: text
    content: car il regarde du haut de sa demeure sainte.
  - type: text
    content: Du haut du ciel, l'Eternel observe la terre
  '21':
  - type: text
    content: pour écouter les gémissements des prisonniers,
  - type: text
    content: pour délivrer ceux qui sont destinés à la mort.
  '22':
  - type: text
    content: Alors on proclamera dans Sion le nom de l'Eternel,
  - type: text
    content: et ses louanges dans Jérusalem,
  '23':
  - type: text
    content: quand tous les peuples et tous les royaumes
  - type: text
    content: se rassembleront pour servir l'Eternel.
  '24':
  - type: text
    content: Il a brisé ma force en chemin,
  - type: text
    content: il a abrégé mes jours.
  '25':
  - type: text
    content: 'Je dis: «Mon Dieu, ne m''enlève pas au milieu de ma vie,'
  - type: text
    content: toi dont l'existence traverse les générations!»
  '26':
  - type: text
    content: '*Autrefois tu as fondé la terre,'
  - type: text
    content: et le ciel est l'œuvre de tes mains.
  '27':
  - type: text
    content: Eux, ils disparaîtront, tandis que toi, tu restes là.
  - type: text
    content: Ils vieilliront tous comme un vêtement;
  - type: text
    content: tu les remplaceras comme un habit, et ils céderont la place,
  '28':
  - type: text
    content: mais toi, tu es toujours le même
  - type: text
    content: et ton existence n'aura pas de fin.
  - type: note
    content: 'Autrefois… fin: cité en Hébreux 1.10-12 comme s''adressant à Jésus-Christ.'
  '29':
  - type: text
    content: Les fils de tes serviteurs pourront s'établir
  - type: text
    content: et leur descendance s'affermira devant toi.
  '3':
  - type: text
    content: Ne me cache pas ton visage lorsque je suis dans la détresse,
  - type: text
    content: tends ton oreille vers moi quand je crie,
  - type: text
    content: réponds-moi vite,
  '4':
  - type: text
    content: car mes jours s'évanouissent comme une fumée
  - type: text
    content: et mes os sont enflammés comme un brasier.
  '5':
  - type: text
    content: Mon cœur est frappé et se dessèche comme l'herbe;
  - type: text
    content: j'en oublie même de manger mon pain.
  '6':
  - type: text
    content: A force de gémir,
  - type: text
    content: je n'ai plus que la peau sur les os.
  '7':
  - type: text
    content: Je ressemble au pélican du désert,
  - type: text
    content: je suis comme le chat-huant des ruines.
  '8':
  - type: text
    content: Je suis privé de sommeil et je ressemble
  - type: text
    content: à l'oiseau resté tout seul sur un toit.
  '9':
  - type: text
    content: Chaque jour, mes ennemis m'insultent;
  - type: text
    content: ils se moquent de moi, ils emploient mon nom dans leurs serments.
