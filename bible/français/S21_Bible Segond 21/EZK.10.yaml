document_id: EZK.10,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La gloire de Dieu quitte le temple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'J''ai regardé et j''ai vu, sur la voûte céleste qui était au-dessus de la tête des chérubins, comme une pierre de saphir dont l''aspect ressemblait à un trône; c''était ce qui se voyait au-dessus d''eux. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Toutes les quatre avaient le même aspect; chacune paraissait être au milieu d''une autre roue. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dans leurs déplacements, elles pouvaient suivre les quatre directions prises par les chérubins, et elles se déplaçaient sans dévier; elles allaient du côté où se tournait la tête, sans dévier dans leur déplacement. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Tout le corps des chérubins – y compris leur dos, leurs mains et leurs ailes – était couvert d''yeux tout autour, ainsi que, pour eux quatre, les roues. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'J''ai entendu qu''on appelait ces roues tourbillon. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Chacun avait quatre visages. La première face était une face de chérubin, la deuxième une face d''homme, la troisième une face de lion et la quatrième une face d''aigle. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Puis les chérubins se sont élevés. C''étaient les êtres vivants que j''avais vus près du fleuve Kebar. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Les roues suivaient les chérubins dans leurs déplacements et, quand les chérubins déployaient leurs ailes pour s''élever au-dessus de la terre, les roues ne se détournaient pas d''eux: même là elles les suivaient. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Quand ils s'arrêtaient, elles s'arrêtaient, et quand ils s'élevaient, elles s'élevaient avec eux, car l'esprit des êtres vivants était en elles.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'La gloire de l''Eternel s''est retirée du seuil du temple et s''est placée au-dessus des chérubins. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Les chérubins ont déployé leurs ailes et se sont élevés de terre sous mes yeux quand ils sont sortis, accompagnés des roues. Ils se sont arrêtés devant l''entrée de la maison de l''Eternel, côté est, et la gloire du Dieu d''Israël était au-dessus d''eux, tout en haut. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'L''Eternel a dit à l''homme habillé de lin: «Va à l''intérieur du tourbillon, sous les chérubins! Remplis tes mains de charbons ardents que tu prendras entre les chérubins et disperse-les sur la ville!» Il y est allé sous mes yeux.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'C''étaient les êtres vivants que j''avais vus sous le Dieu d''Israël, près du fleuve Kebar, et j''ai reconnu que c''étaient des chérubins. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Chacun avait quatre faces et quatre ailes, et il y avait quelque chose qui ressemblait à des mains humaines sous leurs ailes. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Leurs visages ressemblaient à ceux que j''avais vus près du fleuve Kebar: c''était le même aspect, c''étaient eux. Chacun allait droit devant lui.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Les chérubins se tenaient sur la droite du temple quand l''homme y est entré, et la nuée remplissait le parvis intérieur. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'La gloire de l''Eternel s''est élevée au-dessus du chérubin et s''est dirigée vers le seuil du temple. Alors le temple a été rempli de nuée et le parvis a été illuminé par la gloire de l''Eternel. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: On a entendu le bruit des ailes des chérubins jusqu'au parvis extérieur. Il était pareil à la voix du Dieu tout-puissant lorsqu'il parle.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Lorsque l''homme habillé de lin a reçu cet ordre: «Prends du feu à l''intérieur du tourbillon, entre les chérubins», il est allé se placer près d''une roue. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Alors un chérubin a tendu la main entre les autres chérubins pour atteindre le feu situé entre les chérubins. Il en a retiré des braises et les a mises dans les mains de l''homme habillé de lin. Celui-ci les a prises, puis il est sorti. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: On voyait aux chérubins, sous leurs ailes, une forme de main humaine.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'J''ai regardé et j''ai vu quatre roues près des chérubins, une près de chaque chérubin. Les roues avaient, dans leur aspect, un éclat pareil à celui d''une pierre de chrysolithe. '
