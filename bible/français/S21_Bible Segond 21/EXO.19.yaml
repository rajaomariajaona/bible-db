document_id: EXO.19
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Conclusion de l'alliance
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 19.1–24.18
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Alliance au mont Sinaï
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le jour même du troisième mois après leur sortie d''Egypte, les Israélites arrivèrent au désert du Sinaï. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Partis de Rephidim, ils arrivèrent au désert du Sinaï et campèrent dans le désert. Israël campa là, vis-à-vis de la montagne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Moïse monta vers Dieu et l''Eternel l''appela du haut de la montagne en annonçant: «Voici ce que tu diras à la famille de Jacob, ce que tu communiqueras aux Israélites: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '‘Vous avez vu ce que j''ai fait à l''Egypte et la façon dont je vous ai portés sur des ailes d''aigle et amenés vers moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Maintenant, si vous écoutez ma voix et si vous gardez mon alliance, vous m''appartiendrez personnellement parmi tous les peuples, car toute la terre m''appartient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Vous serez pour moi *un royaume de prêtres et une nation sainte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Un royaume… sainte: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pierre 2.9
      metadata:
        usfm: 1PE.2.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .’ Voilà les paroles que tu diras aux Israélites.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Moïse vint appeler les anciens du peuple et leur exposa toutes ces paroles, comme l''Eternel le lui avait ordonné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le peuple tout entier répondit: «Nous ferons tout ce que l''Eternel a dit.» Moïse rapporta les paroles du peuple à l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et l''Eternel dit à Moïse: «Voici, je vais moi-même venir vers toi dans une épaisse nuée afin que le peuple entende quand je te parlerai et qu''il ait toujours confiance en toi.» Moïse rapporta les paroles du peuple à l''Eternel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L''Eternel dit à Moïse: «Va vers le peuple. Consacre-les aujourd''hui et demain, et qu''ils lavent leurs vêtements. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Qu''ils soient prêts pour le troisième jour, car le troisième jour, sous les yeux de tout le peuple, l''Eternel descendra sur le mont Sinaï. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tu fixeras au peuple des limites tout autour de la montagne et tu diras: ‘Gardez-vous bien de monter sur la montagne ou d''en toucher le bord. Tout homme qui *touchera la montagne sera puni de mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'On ne mettra pas la main sur lui, mais on le lapidera ou on le transpercera de flèches: qu''il s''agisse d''un animal'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.12-13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Touchera… animal: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'instruction mentionnée de façon condensée en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hébreux 12.20
      metadata:
        usfm: HEB.12.20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' ou d''un homme, il ne vivra pas.’ Quand la trompette sonnera, ils s''avanceront vers la montagne.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Moïse descendit de la montagne vers le peuple. Il consacra le peuple et ils lavèrent leurs vêtements. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et il dit au peuple: «Soyez prêts dans trois jours. Ne vous approchez d''aucune femme.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le matin du troisième jour, il y eut des coups de tonnerre, des éclairs et une épaisse nuée sur la montagne. Le son de la trompette retentit fortement et tout le peuple qui était dans le camp fut épouvanté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Moïse fit sortir le peuple du camp pour aller à la rencontre de Dieu, et ils se placèrent au bas de la montagne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Le mont Sinaï était tout en fumée parce que l'Eternel y était descendu au milieu du feu. Cette fumée s'élevait comme la fumée d'une fournaise et toute la montagne tremblait avec violence.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le son de la trompette retentissait de plus en plus fortement. Moïse parlait, et Dieu lui répondait à haute voix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ainsi l'Eternel descendit sur le mont Sinaï, au sommet de la montagne. L'Eternel appela Moïse à y venir et Moïse monta.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'L''Eternel dit à Moïse: «Descends avertir le peuple de ne pas se précipiter vers l''Eternel pour regarder, car un grand nombre parmi eux mourraient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Que les prêtres qui s''approchent de l''Eternel se consacrent aussi, de peur que l''Eternel ne les frappe de mort.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Moïse dit à l''Eternel: «Le peuple ne pourra pas monter sur le mont Sinaï, puisque tu nous as toi-même donné cet avertissement: ‘Fixe des limites autour de la montagne et déclare-la sacrée.’» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'L''Eternel lui dit: «Vas-y, descends. Tu monteras ensuite en compagnie d''Aaron. Quant aux prêtres et au peuple, qu''ils ne se précipitent pas pour monter vers l''Eternel, de peur qu''il ne les frappe de mort.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Moïse descendit vers le peuple et lui parla.
