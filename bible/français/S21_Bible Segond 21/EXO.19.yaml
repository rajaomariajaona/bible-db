document_id: EXO.19,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Conclusion de l'alliance
  - type: heading
    content: 19.1–24.18
  - type: heading
    content: Alliance au mont Sinaï
  - type: text
    content: 'Le jour même du troisième mois après leur sortie d''Egypte, les Israélites arrivèrent au désert du Sinaï. '
  '10':
  - type: text
    content: 'L''Eternel dit à Moïse: «Va vers le peuple. Consacre-les aujourd''hui et demain, et qu''ils lavent leurs vêtements. '
  '11':
  - type: text
    content: 'Qu''ils soient prêts pour le troisième jour, car le troisième jour, sous les yeux de tout le peuple, l''Eternel descendra sur le mont Sinaï. '
  '12':
  - type: text
    content: 'Tu fixeras au peuple des limites tout autour de la montagne et tu diras: ‘Gardez-vous bien de monter sur la montagne ou d''en toucher le bord. Tout homme qui *touchera la montagne sera puni de mort. '
  '13':
  - type: text
    content: 'On ne mettra pas la main sur lui, mais on le lapidera ou on le transpercera de flèches: qu''il s''agisse d''un animal'
  - type: note
    content: 'Touchera… animal: instruction mentionnée de façon condensée en Hébreux 12.20.'
  - type: text
    content: ' ou d''un homme, il ne vivra pas.’ Quand la trompette sonnera, ils s''avanceront vers la montagne.» '
  '14':
  - type: text
    content: 'Moïse descendit de la montagne vers le peuple. Il consacra le peuple et ils lavèrent leurs vêtements. '
  '15':
  - type: text
    content: 'Et il dit au peuple: «Soyez prêts dans trois jours. Ne vous approchez d''aucune femme.»'
  '16':
  - type: text
    content: 'Le matin du troisième jour, il y eut des coups de tonnerre, des éclairs et une épaisse nuée sur la montagne. Le son de la trompette retentit fortement et tout le peuple qui était dans le camp fut épouvanté. '
  '17':
  - type: text
    content: 'Moïse fit sortir le peuple du camp pour aller à la rencontre de Dieu, et ils se placèrent au bas de la montagne. '
  '18':
  - type: text
    content: Le mont Sinaï était tout en fumée parce que l'Eternel y était descendu au milieu du feu. Cette fumée s'élevait comme la fumée d'une fournaise et toute la montagne tremblait avec violence.
  '19':
  - type: text
    content: 'Le son de la trompette retentissait de plus en plus fortement. Moïse parlait, et Dieu lui répondait à haute voix. '
  '2':
  - type: text
    content: 'Partis de Rephidim, ils arrivèrent au désert du Sinaï et campèrent dans le désert. Israël campa là, vis-à-vis de la montagne. '
  '20':
  - type: text
    content: Ainsi l'Eternel descendit sur le mont Sinaï, au sommet de la montagne. L'Eternel appela Moïse à y venir et Moïse monta.
  '21':
  - type: text
    content: 'L''Eternel dit à Moïse: «Descends avertir le peuple de ne pas se précipiter vers l''Eternel pour regarder, car un grand nombre parmi eux mourraient. '
  '22':
  - type: text
    content: 'Que les prêtres qui s''approchent de l''Eternel se consacrent aussi, de peur que l''Eternel ne les frappe de mort.» '
  '23':
  - type: text
    content: 'Moïse dit à l''Eternel: «Le peuple ne pourra pas monter sur le mont Sinaï, puisque tu nous as toi-même donné cet avertissement: ‘Fixe des limites autour de la montagne et déclare-la sacrée.’» '
  '24':
  - type: text
    content: 'L''Eternel lui dit: «Vas-y, descends. Tu monteras ensuite en compagnie d''Aaron. Quant aux prêtres et au peuple, qu''ils ne se précipitent pas pour monter vers l''Eternel, de peur qu''il ne les frappe de mort.» '
  '25':
  - type: text
    content: Moïse descendit vers le peuple et lui parla.
  '3':
  - type: text
    content: 'Moïse monta vers Dieu et l''Eternel l''appela du haut de la montagne en annonçant: «Voici ce que tu diras à la famille de Jacob, ce que tu communiqueras aux Israélites: '
  '4':
  - type: text
    content: '‘Vous avez vu ce que j''ai fait à l''Egypte et la façon dont je vous ai portés sur des ailes d''aigle et amenés vers moi. '
  '5':
  - type: text
    content: 'Maintenant, si vous écoutez ma voix et si vous gardez mon alliance, vous m''appartiendrez personnellement parmi tous les peuples, car toute la terre m''appartient. '
  '6':
  - type: text
    content: Vous serez pour moi *un royaume de prêtres et une nation sainte
  - type: note
    content: 'Un royaume… sainte: cité en 1 Pierre 2.9.'
  - type: text
    content: .’ Voilà les paroles que tu diras aux Israélites.»
  '7':
  - type: text
    content: 'Moïse vint appeler les anciens du peuple et leur exposa toutes ces paroles, comme l''Eternel le lui avait ordonné. '
  '8':
  - type: text
    content: 'Le peuple tout entier répondit: «Nous ferons tout ce que l''Eternel a dit.» Moïse rapporta les paroles du peuple à l''Eternel. '
  '9':
  - type: text
    content: 'Et l''Eternel dit à Moïse: «Voici, je vais moi-même venir vers toi dans une épaisse nuée afin que le peuple entende quand je te parlerai et qu''il ait toujours confiance en toi.» Moïse rapporta les paroles du peuple à l''Eternel.'
