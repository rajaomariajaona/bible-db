document_id: PSA.35,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière de David contre ses ennemis
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: De David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, accuse ceux qui m'accusent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: combats ceux qui me combattent!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tout mon être dira: «Eternel, qui peut, comme toi,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: délivrer le malheureux d'un plus fort que lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le malheureux et le pauvre de celui qui les dépouille?»
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'De faux témoins se lèvent:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils m'interrogent sur des faits que j'ignore;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils me rendent le mal pour le bien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je suis abandonné de tous.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Moi, quand ils étaient malades, je mettais une tenue de deuil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'humiliais mon âme par le jeûne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je priais, la tête penchée sur la poitrine.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme pour un ami, pour un frère, je marchais lentement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme pour le deuil d'une mère, j'étais accablé de tristesse.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et maintenant que je trébuche, ils se rassemblent pour se réjouir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se rassemblent à mon insu pour me calomnier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils me déchirent sans arrêt.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec les impies et les moqueurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils grincent des dents contre moi.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seigneur, combien de temps le supporteras-tu?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Protège-moi contre leurs actes de violence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: protège ma vie contre les lionceaux!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te louerai dans la grande assemblée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te célébrerai au milieu d'un peuple nombreux.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils sont à tort mes ennemis: qu''ils ne se réjouissent pas à mon sujet!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*Ils me détestent sans raison'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ils me détestent sans raison: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'repris au '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 69.5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' et cité comme accompli par Jésus en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jean 15.25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ': qu''ils ne m''insultent pas du regard!'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Empare-toi du petit et du grand boucliers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et lève-toi pour me secourir!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, leur langage n'est pas celui de la paix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils inventent des mensonges contre les gens tranquilles du pays.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ouvrent leur bouche contre moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ils disent: «Ah! ah! Nous l''avons vu de nos yeux!»'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eternel, tu as tout vu: ne reste pas silencieux!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seigneur, ne t'éloigne pas de moi!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réveille-toi, lève-toi pour me faire justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon Dieu et mon Seigneur, défends ma cause!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Juge-moi conformément à ta justice, Eternel, mon Dieu!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'ils ne se réjouissent pas à mon sujet,
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'qu''ils ne disent pas dans leur cœur:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ah! voilà ce que nous voulions!»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qu''ils ne disent pas: «Nous l''avons anéanti.»'
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tous ensemble ils soient honteux et rougissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui se réjouissent de mon malheur!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'ils soient couverts de honte et de confusion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui s'attaquent à moi!
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'ils aient de l'allégresse et de la joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui prennent plaisir à me voir justifié!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils pourront dire sans cesse: «Que l''Eternel est grand,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lui qui veut la paix de son serviteur!»
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors ma langue célébrera ta justice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ta louange tous les jours.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Brandis la lance et le javelot contre mes persécuteurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dis à mon âme: «Je suis ton salut!»'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'ils soient honteux et déçus, ceux qui en veulent à ma vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'ils reculent et rougissent, ceux qui méditent ma perte!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'ils soient comme la paille emportée par le vent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que l'ange de l'Eternel les chasse!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que leur route soit sombre et glissante,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que l'ange de l'Eternel les poursuive!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, c'est sans raison qu'ils m'ont tendu un piège,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est sans raison qu'ils ont creusé un trou pour m'enlever la vie.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que la ruine les atteigne à l'improviste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'ils soient pris dans le piège qu'ils ont tendu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'ils y tombent pour leur ruine!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors j'exulterai de joie en l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je me réjouirai à cause de son salut.
