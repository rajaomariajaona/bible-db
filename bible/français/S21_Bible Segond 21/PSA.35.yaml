document_id: PSA.35
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière de David contre ses ennemis
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: De David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, accuse ceux qui m'accusent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: combats ceux qui me combattent!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Empare-toi du petit et du grand boucliers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et lève-toi pour me secourir!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Brandis la lance et le javelot contre mes persécuteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dis à mon âme: «Je suis ton salut!»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Qu'ils soient honteux et déçus, ceux qui en veulent à ma vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'ils reculent et rougissent, ceux qui méditent ma perte!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Qu'ils soient comme la paille emportée par le vent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que l'ange de l'Eternel les chasse!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Que leur route soit sombre et glissante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que l'ange de l'Eternel les poursuive!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: En effet, c'est sans raison qu'ils m'ont tendu un piège,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est sans raison qu'ils ont creusé un trou pour m'enlever la vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Que la ruine les atteigne à l'improviste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'ils soient pris dans le piège qu'ils ont tendu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'ils y tombent pour leur ruine!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Alors j'exulterai de joie en l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je me réjouirai à cause de son salut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tout mon être dira: «Eternel, qui peut, comme toi,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: délivrer le malheureux d'un plus fort que lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le malheureux et le pauvre de celui qui les dépouille?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'De faux témoins se lèvent:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils m'interrogent sur des faits que j'ignore;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ils me rendent le mal pour le bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je suis abandonné de tous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Moi, quand ils étaient malades, je mettais une tenue de deuil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'humiliais mon âme par le jeûne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je priais, la tête penchée sur la poitrine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Comme pour un ami, pour un frère, je marchais lentement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme pour le deuil d'une mère, j'étais accablé de tristesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Et maintenant que je trébuche, ils se rassemblent pour se réjouir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se rassemblent à mon insu pour me calomnier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils me déchirent sans arrêt.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Avec les impies et les moqueurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils grincent des dents contre moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Seigneur, combien de temps le supporteras-tu?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Protège-moi contre leurs actes de violence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: protège ma vie contre les lionceaux!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Je te louerai dans la grande assemblée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je te célébrerai au milieu d'un peuple nombreux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ils sont à tort mes ennemis: qu''ils ne se réjouissent pas à mon sujet!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '*Ils me détestent sans raison'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '35.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ils me détestent sans raison: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'repris au '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 69.5
      metadata:
        usfm: PSA.69.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' et cité comme accompli par Jésus en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jean 15.25
      metadata:
        usfm: JHN.15.25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ': qu''ils ne m''insultent pas du regard!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Oui, leur langage n'est pas celui de la paix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils inventent des mensonges contre les gens tranquilles du pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ils ouvrent leur bouche contre moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ils disent: «Ah! ah! Nous l''avons vu de nos yeux!»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Eternel, tu as tout vu: ne reste pas silencieux!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Seigneur, ne t'éloigne pas de moi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Réveille-toi, lève-toi pour me faire justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon Dieu et mon Seigneur, défends ma cause!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Juge-moi conformément à ta justice, Eternel, mon Dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu'ils ne se réjouissent pas à mon sujet,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'qu''ils ne disent pas dans leur cœur:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ah! voilà ce que nous voulions!»
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Qu''ils ne disent pas: «Nous l''avons anéanti.»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Que tous ensemble ils soient honteux et rougissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui se réjouissent de mon malheur!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu'ils soient couverts de honte et de confusion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui s'attaquent à moi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Qu'ils aient de l'allégresse et de la joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui prennent plaisir à me voir justifié!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils pourront dire sans cesse: «Que l''Eternel est grand,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: lui qui veut la paix de son serviteur!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Alors ma langue célébrera ta justice
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ta louange tous les jours.
