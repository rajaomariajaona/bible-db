document_id: PSA.35,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière de David contre ses ennemis
  - type: text
    content: De David.
  - type: text
    content: Eternel, accuse ceux qui m'accusent,
  - type: text
    content: combats ceux qui me combattent!
  '10':
  - type: text
    content: 'Tout mon être dira: «Eternel, qui peut, comme toi,'
  - type: text
    content: délivrer le malheureux d'un plus fort que lui,
  - type: text
    content: le malheureux et le pauvre de celui qui les dépouille?»
  '11':
  - type: text
    content: 'De faux témoins se lèvent:'
  - type: text
    content: ils m'interrogent sur des faits que j'ignore;
  '12':
  - type: text
    content: ils me rendent le mal pour le bien,
  - type: text
    content: je suis abandonné de tous.
  '13':
  - type: text
    content: Moi, quand ils étaient malades, je mettais une tenue de deuil,
  - type: text
    content: j'humiliais mon âme par le jeûne,
  - type: text
    content: je priais, la tête penchée sur la poitrine.
  '14':
  - type: text
    content: Comme pour un ami, pour un frère, je marchais lentement,
  - type: text
    content: comme pour le deuil d'une mère, j'étais accablé de tristesse.
  '15':
  - type: text
    content: Et maintenant que je trébuche, ils se rassemblent pour se réjouir,
  - type: text
    content: ils se rassemblent à mon insu pour me calomnier,
  - type: text
    content: ils me déchirent sans arrêt.
  '16':
  - type: text
    content: Avec les impies et les moqueurs,
  - type: text
    content: ils grincent des dents contre moi.
  '17':
  - type: text
    content: Seigneur, combien de temps le supporteras-tu?
  - type: text
    content: Protège-moi contre leurs actes de violence,
  - type: text
    content: protège ma vie contre les lionceaux!
  '18':
  - type: text
    content: Je te louerai dans la grande assemblée,
  - type: text
    content: je te célébrerai au milieu d'un peuple nombreux.
  '19':
  - type: text
    content: 'Ils sont à tort mes ennemis: qu''ils ne se réjouissent pas à mon sujet!'
  - type: text
    content: '*Ils me détestent sans raison'
  - type: note
    content: 'Ils me détestent sans raison: repris au Psaume 69.5 et cité comme accompli par Jésus en Jean 15.25.'
  - type: text
    content: ': qu''ils ne m''insultent pas du regard!'
  '2':
  - type: text
    content: Empare-toi du petit et du grand boucliers,
  - type: text
    content: et lève-toi pour me secourir!
  '20':
  - type: text
    content: Oui, leur langage n'est pas celui de la paix,
  - type: text
    content: ils inventent des mensonges contre les gens tranquilles du pays.
  '21':
  - type: text
    content: Ils ouvrent leur bouche contre moi,
  - type: text
    content: 'ils disent: «Ah! ah! Nous l''avons vu de nos yeux!»'
  '22':
  - type: text
    content: 'Eternel, tu as tout vu: ne reste pas silencieux!'
  - type: text
    content: Seigneur, ne t'éloigne pas de moi!
  '23':
  - type: text
    content: Réveille-toi, lève-toi pour me faire justice,
  - type: text
    content: mon Dieu et mon Seigneur, défends ma cause!
  '24':
  - type: text
    content: Juge-moi conformément à ta justice, Eternel, mon Dieu!
  - type: text
    content: Qu'ils ne se réjouissent pas à mon sujet,
  '25':
  - type: text
    content: 'qu''ils ne disent pas dans leur cœur:'
  - type: text
    content: «Ah! voilà ce que nous voulions!»
  - type: text
    content: 'Qu''ils ne disent pas: «Nous l''avons anéanti.»'
  '26':
  - type: text
    content: Que tous ensemble ils soient honteux et rougissent,
  - type: text
    content: ceux qui se réjouissent de mon malheur!
  - type: text
    content: Qu'ils soient couverts de honte et de confusion,
  - type: text
    content: ceux qui s'attaquent à moi!
  '27':
  - type: text
    content: Qu'ils aient de l'allégresse et de la joie,
  - type: text
    content: ceux qui prennent plaisir à me voir justifié!
  - type: text
    content: 'Ils pourront dire sans cesse: «Que l''Eternel est grand,'
  - type: text
    content: lui qui veut la paix de son serviteur!»
  '28':
  - type: text
    content: Alors ma langue célébrera ta justice
  - type: text
    content: et ta louange tous les jours.
  '3':
  - type: text
    content: Brandis la lance et le javelot contre mes persécuteurs,
  - type: text
    content: 'dis à mon âme: «Je suis ton salut!»'
  '4':
  - type: text
    content: Qu'ils soient honteux et déçus, ceux qui en veulent à ma vie,
  - type: text
    content: qu'ils reculent et rougissent, ceux qui méditent ma perte!
  '5':
  - type: text
    content: Qu'ils soient comme la paille emportée par le vent,
  - type: text
    content: et que l'ange de l'Eternel les chasse!
  '6':
  - type: text
    content: Que leur route soit sombre et glissante,
  - type: text
    content: et que l'ange de l'Eternel les poursuive!
  '7':
  - type: text
    content: En effet, c'est sans raison qu'ils m'ont tendu un piège,
  - type: text
    content: c'est sans raison qu'ils ont creusé un trou pour m'enlever la vie.
  '8':
  - type: text
    content: Que la ruine les atteigne à l'improviste,
  - type: text
    content: qu'ils soient pris dans le piège qu'ils ont tendu,
  - type: text
    content: qu'ils y tombent pour leur ruine!
  '9':
  - type: text
    content: Alors j'exulterai de joie en l'Eternel,
  - type: text
    content: je me réjouirai à cause de son salut.
