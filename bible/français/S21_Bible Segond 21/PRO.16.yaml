document_id: PRO.16,152
type_code: fra
verses:
  '1':
  - type: text
    content: Les projets que forme le cœur dépendent de l'homme,
  - type: text
    content: mais la réponse que donne la bouche vient de l'Eternel.
  '10':
  - type: text
    content: 'Des oracles sont sur les lèvres du roi:'
  - type: text
    content: que sa bouche ne soit pas infidèle quand il juge!
  '11':
  - type: text
    content: Le poids et la balance justes appartiennent à l'Eternel,
  - type: text
    content: tous les poids du sac
  - type: note
    content: 'Les poids du sac: le marchand transportait toujours un sac avec les poids, nécessaires pour le commerce.'
  - type: text
    content: ' sont son œuvre.'
  '12':
  - type: text
    content: Les rois ont horreur des actes de méchanceté,
  - type: text
    content: car c'est par la justice que le trône s'affermit.
  '13':
  - type: text
    content: Les rois sont favorables aux lèvres justes
  - type: text
    content: et ils aiment celui qui parle avec droiture.
  '14':
  - type: text
    content: La fureur du roi est messagère de mort,
  - type: text
    content: mais un homme sage l'apaise.
  '15':
  - type: text
    content: Quand le visage du roi s'éclaire, c'est un gage de vie;
  - type: text
    content: sa faveur est pareille aux dernières pluies.
  '16':
  - type: text
    content: Acquérir la sagesse vaut bien mieux que l'or,
  - type: text
    content: acquérir l'intelligence est préférable à l'argent.
  '17':
  - type: text
    content: La route des hommes droits évite le mal.
  - type: text
    content: Celui qui veille sur sa conduite se préserve lui-même.
  '18':
  - type: text
    content: L'arrogance précède la ruine
  - type: text
    content: et l'orgueil précède la chute.
  '19':
  - type: text
    content: Mieux vaut être humble avec les gens modestes que de partager un butin avec les orgueilleux.
  '2':
  - type: text
    content: Toutes les voies d'un homme sont pures à ses yeux,
  - type: text
    content: mais celui qui évalue les dispositions d'esprit, c'est l'Eternel.
  '20':
  - type: text
    content: Celui qui se montre attentif à ce qui est dit trouve le bonheur,
  - type: text
    content: et celui qui se confie en l'Eternel est heureux.
  '21':
  - type: text
    content: L'homme au cœur sage est appelé intelligent,
  - type: text
    content: et la douceur des lèvres augmente la force de persuasion.
  '22':
  - type: text
    content: Le bon sens est une source de vie pour celui qui le possède,
  - type: text
    content: mais la punition des fous, c'est leur folie.
  '23':
  - type: text
    content: Le cœur du sage rend sa bouche prudente
  - type: text
    content: et augmente la force de persuasion sur ses lèvres.
  '24':
  - type: text
    content: 'Les paroles agréables sont un rayon de miel:'
  - type: text
    content: elles sont douces pour l'âme et porteuses de guérison pour le corps.
  '25':
  - type: text
    content: La voie qui paraît droite à un homme
  - type: text
    content: peut finalement conduire à la mort.
  '26':
  - type: text
    content: Celui qui travaille
  - type: note
    content: 'Celui qui travaille: ou l''appétit du travailleur; l''idée est que c''est la faim qui fait travailler.'
  - type: text
    content: ' travaille pour lui,'
  - type: text
    content: car sa bouche l'y incite.
  '27':
  - type: text
    content: Le vaurien prépare le malheur,
  - type: text
    content: et il y a sur ses lèvres comme un feu dévorant.
  '28':
  - type: text
    content: L'homme pervers provoque des conflits
  - type: text
    content: et le critiqueur divise les amis.
  '29':
  - type: text
    content: L'homme violent entraîne son prochain
  - type: text
    content: et le fait marcher sur une voie qui n'est pas bonne.
  '3':
  - type: text
    content: Recommande ton activité à l'Eternel et tes projets seront affermis.
  '30':
  - type: text
    content: Celui qui ferme les yeux pour méditer des pensées perverses,
  - type: text
    content: qui se mord les lèvres, a déjà accompli le mal.
  '31':
  - type: text
    content: 'Les cheveux blancs sont une couronne d''honneur:'
  - type: text
    content: c'est sur le chemin de la justice qu'on la trouve.
  '32':
  - type: text
    content: La lenteur à la colère vaut mieux que l'héroïsme;
  - type: text
    content: mieux vaut être maître de soi que s'emparer de villes.
  '33':
  - type: text
    content: On jette les sorts dans le pan de l'habit,
  - type: text
    content: mais c'est de l'Eternel que vient toute décision.
  '4':
  - type: text
    content: L'Eternel a tout fait pour un but,
  - type: text
    content: même le méchant pour le jour du malheur.
  '5':
  - type: text
    content: Tous ceux dont le cœur est orgueilleux font horreur à l'Eternel.
  - type: text
    content: C'est certain, ils ne resteront pas impunis.
  '6':
  - type: text
    content: Par la bonté et la vérité on expie la faute,
  - type: text
    content: et par la crainte de l'Eternel on se détourne du mal.
  '7':
  - type: text
    content: Quand l'Eternel approuve les voies d'un homme,
  - type: text
    content: il dispose même ses ennemis à faire la paix avec lui.
  '8':
  - type: text
    content: Mieux vaut peu, honnêtement gagné,
  - type: text
    content: que de grands revenus acquis injustement.
  '9':
  - type: text
    content: Le cœur de l'homme peut méditer sa voie,
  - type: text
    content: mais c'est l'Eternel qui dirige ses pas.
