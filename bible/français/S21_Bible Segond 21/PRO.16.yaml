document_id: PRO.16
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Les projets que forme le cœur dépendent de l'homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais la réponse que donne la bouche vient de l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Toutes les voies d'un homme sont pures à ses yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui évalue les dispositions d'esprit, c'est l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Recommande ton activité à l'Eternel et tes projets seront affermis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: L'Eternel a tout fait pour un but,
- type: usfm
  marker: q1
  children:
  - type: text
    text: même le méchant pour le jour du malheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tous ceux dont le cœur est orgueilleux font horreur à l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est certain, ils ne resteront pas impunis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Par la bonté et la vérité on expie la faute,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et par la crainte de l'Eternel on se détourne du mal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Quand l'Eternel approuve les voies d'un homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il dispose même ses ennemis à faire la paix avec lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mieux vaut peu, honnêtement gagné,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que de grands revenus acquis injustement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Le cœur de l'homme peut méditer sa voie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais c'est l'Eternel qui dirige ses pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Des oracles sont sur les lèvres du roi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: que sa bouche ne soit pas infidèle quand il juge!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le poids et la balance justes appartiennent à l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les poids du sac
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Les poids du sac: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: le marchand transportait toujours un sac avec les poids, nécessaires pour le commerce.
    marker-yv: yv-n
  - type: text
    text: ' sont son œuvre.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Les rois ont horreur des actes de méchanceté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car c'est par la justice que le trône s'affermit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Les rois sont favorables aux lèvres justes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils aiment celui qui parle avec droiture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: La fureur du roi est messagère de mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais un homme sage l'apaise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Quand le visage du roi s'éclaire, c'est un gage de vie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: sa faveur est pareille aux dernières pluies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Acquérir la sagesse vaut bien mieux que l'or,
- type: usfm
  marker: q1
  children:
  - type: text
    text: acquérir l'intelligence est préférable à l'argent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: La route des hommes droits évite le mal.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui veille sur sa conduite se préserve lui-même.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: L'arrogance précède la ruine
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'orgueil précède la chute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Mieux vaut être humble avec les gens modestes que de partager un butin avec les orgueilleux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Celui qui se montre attentif à ce qui est dit trouve le bonheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celui qui se confie en l'Eternel est heureux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: L'homme au cœur sage est appelé intelligent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la douceur des lèvres augmente la force de persuasion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Le bon sens est une source de vie pour celui qui le possède,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais la punition des fous, c'est leur folie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Le cœur du sage rend sa bouche prudente
- type: usfm
  marker: q1
  children:
  - type: text
    text: et augmente la force de persuasion sur ses lèvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les paroles agréables sont un rayon de miel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles sont douces pour l'âme et porteuses de guérison pour le corps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: La voie qui paraît droite à un homme
- type: usfm
  marker: q1
  children:
  - type: text
    text: peut finalement conduire à la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Celui qui travaille
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Celui qui travaille: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ou l'appétit du travailleur; l'idée est que c'est la faim qui fait travailler.
    marker-yv: yv-n
  - type: text
    text: ' travaille pour lui,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: car sa bouche l'y incite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Le vaurien prépare le malheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il y a sur ses lèvres comme un feu dévorant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: L'homme pervers provoque des conflits
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le critiqueur divise les amis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: L'homme violent entraîne son prochain
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le fait marcher sur une voie qui n'est pas bonne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Celui qui ferme les yeux pour méditer des pensées perverses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui se mord les lèvres, a déjà accompli le mal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Les cheveux blancs sont une couronne d''honneur:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est sur le chemin de la justice qu'on la trouve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: La lenteur à la colère vaut mieux que l'héroïsme;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mieux vaut être maître de soi que s'emparer de villes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: On jette les sorts dans le pan de l'habit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais c'est de l'Eternel que vient toute décision.
