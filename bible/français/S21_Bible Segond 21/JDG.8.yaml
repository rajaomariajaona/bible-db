document_id: JDG.8,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Les hommes d''Ephraïm dirent à Gédéon: «Que signifie cette manière d''agir envers nous? Pourquoi ne pas nous avoir appelés, quand tu es allé combattre Madian?» Ils s''en prirent violemment à lui. '
  '10':
  - type: text
    content: 'Zébach et Tsalmunna se trouvaient à Karkor avec leur armée d''environ 15''000 hommes, les seuls survivants de toute l''armée des nomades de l''est; 120''000 hommes aptes au combat avaient été tués. '
  '11':
  - type: text
    content: 'Gédéon monta par le chemin qu''empruntent les nomades, à l''est de Nobach et de Jogbeha, et il battit l''armée qui se croyait en sécurité. '
  '12':
  - type: text
    content: Zébach et Tsalmunna prirent la fuite et Gédéon les poursuivit. Il s'empara des deux rois de Madian, Zébach et Tsalmunna, et il mit en déroute toute l'armée.
  '13':
  - type: text
    content: 'Gédéon, fils de Joas, revint de la bataille par la montée de Hérès. '
  '14':
  - type: text
    content: 'Il captura un jeune homme, habitant de Succoth, qu''il interrogea et qui lui mit par écrit le nom des chefs et des anciens de Succoth. Cela représentait 77 hommes. '
  '15':
  - type: text
    content: 'Puis il alla trouver les habitants de Succoth et leur dit: «Voici Zébach et Tsalmunna, au sujet desquels vous m''avez insulté en disant: ‘Zébach et Tsalmunna sont-ils déjà en ton pouvoir, pour que nous donnions du pain à tes hommes fatigués?’» '
  '16':
  - type: text
    content: 'Il s''empara des anciens de la ville et punit les habitants de Succoth avec des épines du désert et avec des chardons. '
  '17':
  - type: text
    content: Il démolit aussi la tour de Penuel et tua les habitants de la ville.
  '18':
  - type: text
    content: 'Gédéon demanda à Zébach et à Tsalmunna: «Comment étaient les hommes que vous avez tués au mont Thabor?» Ils répondirent: «Ils te ressemblaient. Chacun avait l''air d''un fils de roi.» '
  '19':
  - type: text
    content: 'Il dit: «C''étaient mes frères, les fils de ma mère. L''Eternel est vivant! Si vous les aviez laissés vivre, je ne vous tuerais pas.» '
  '2':
  - type: text
    content: 'Gédéon leur répondit: «Qu''ai-je fait en comparaison de vous? Le peu qu''a pu grappiller Ephraïm ne vaut-il pas mieux que tout ce qu''a pu récolter la famille d''Abiézer? '
  '20':
  - type: text
    content: 'Et il ordonna à Jéther, son fils aîné: «Lève-toi, tue-les!» Mais le jeune garçon ne dégaina pas son épée, parce qu''il avait peur. En effet, c''était encore un enfant. '
  '21':
  - type: text
    content: 'Zébach et Tsalmunna dirent: «Lève-toi toi-même et tue-nous, car c''est à un homme fort de le faire.» Gédéon se leva alors et tua Zébach et Tsalmunna. Il prit ensuite les ornements en forme de croissant qui étaient au cou de leurs chameaux.'
  '22':
  - type: text
    content: 'Les Israélites dirent à Gédéon: «Domine sur nous, toi, puis ton fils et tes descendants, car tu nous as délivrés de l''oppression de Madian.» '
  '23':
  - type: text
    content: 'Gédéon leur dit: «Je ne dominerai pas sur vous, et mes descendants non plus. C''est l''Eternel qui dominera sur vous.»'
  '24':
  - type: text
    content: 'Gédéon ajouta: «J''ai une demande à vous faire: donnez-moi chacun les anneaux de votre butin.» – Les ennemis avaient des anneaux d''or, car c''étaient des Ismaélites. – '
  '25':
  - type: text
    content: 'Ils répondirent: «Nous te les donnerons volontiers», et ils étendirent par terre un manteau, sur lequel chacun jeta les anneaux pris dans son butin. '
  '26':
  - type: text
    content: 'Le poids des anneaux d''or que demanda Gédéon fut de près de 20 kilos, et ce sans compter les ornements en forme de croissant, les boucles d''oreilles et les vêtements de pourpre que portaient les rois de Madian, ni les colliers qui étaient au cou de leurs chameaux. '
  '27':
  - type: text
    content: Gédéon en fit un éphod
  - type: note
    content: 'Ephod: élément de la tenue des prêtres et du grand-prêtre devenu l''objet d''un culte idolâtrique.'
  - type: text
    content: ' qu''il plaça dans sa ville, à Ophra. Il y devint l''objet des prostitutions'
  - type: note
    content: 'Prostitutions: c''est-à-dire un culte idolâtrique.'
  - type: text
    content: ' de tout Israël et il fut un piège pour Gédéon et pour sa famille.'
  '28':
  - type: text
    content: Les Madianites furent humiliés devant les Israélites et ne relevèrent plus la tête. Le pays fut en paix pendant 40 ans, c'est-à-dire durant la vie de Gédéon.
  '29':
  - type: text
    content: 'Jerubbaal, fils de Joas, retourna habiter dans sa maison. '
  '3':
  - type: text
    content: C'est entre vos mains que Dieu a livré Oreb et Zeeb, les chefs de Madian. Qu'ai-je donc pu faire en comparaison de vous?» Lorsqu'il eut dit cela, leur colère contre lui s'apaisa.
  '30':
  - type: text
    content: 'Gédéon eut 70 fils, tous issus de lui, car il eut plusieurs femmes. '
  '31':
  - type: text
    content: 'Sa concubine, qui résidait à Sichem, lui donna aussi un fils, qu''on appela Abimélec. '
  '32':
  - type: text
    content: Gédéon, fils de Joas, mourut après une heureuse vieillesse. Il fut enterré dans le tombeau de son père Joas, à Ophra, village de la famille d'Abiézer.
  - type: heading
    content: Violences d'Abimélec
  '33':
  - type: text
    content: 'Après la mort de Gédéon, les Israélites recommencèrent à se prostituer aux Baals, et ils prirent pour dieu Baal-Berith. '
  '34':
  - type: text
    content: 'Les Israélites ne se souvinrent pas de l''Eternel, leur Dieu, qui les avait délivrés de tous les ennemis qui les entouraient. '
  '35':
  - type: text
    content: Ils ne manifestèrent pas non plus d'attachement à la famille de Jerubbaal, c'est-à-dire Gédéon, après tout le bien qu'il avait fait à Israël.
  '4':
  - type: text
    content: 'Gédéon arriva au Jourdain et le passa, ainsi que les 300 hommes qui étaient avec lui. Bien que fatigués, ils étaient toujours à la poursuite des Madianites. '
  '5':
  - type: text
    content: 'Gédéon dit aux habitants de Succoth: «Donnez, je vous en prie, quelques pains aux hommes qui m''accompagnent, car ils sont fatigués et je suis à la poursuite de Zébach et de Tsalmunna, les rois de Madian.» '
  '6':
  - type: text
    content: 'Les chefs de Succoth répondirent: «Zébach et Tsalmunna sont-ils déjà en ton pouvoir, pour que nous donnions du pain à ton armée?» '
  '7':
  - type: text
    content: 'Gédéon répliqua: «Eh bien! lorsque l''Eternel aura livré entre mes mains Zébach et Tsalmunna, je déchirerai votre chair avec des épines du désert et avec des chardons.» '
  '8':
  - type: text
    content: 'De là il monta à Penuel et il fit la même demande aux habitants de Penuel. Ils lui répondirent comme ceux de Succoth, '
  '9':
  - type: text
    content: 'et il leur dit aussi: «Quand je reviendrai en paix, je démolirai cette tour.»'
