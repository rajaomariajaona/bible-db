document_id: JDG.8
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les hommes d''Ephraïm dirent à Gédéon: «Que signifie cette manière d''agir envers nous? Pourquoi ne pas nous avoir appelés, quand tu es allé combattre Madian?» Ils s''en prirent violemment à lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Gédéon leur répondit: «Qu''ai-je fait en comparaison de vous? Le peu qu''a pu grappiller Ephraïm ne vaut-il pas mieux que tout ce qu''a pu récolter la famille d''Abiézer? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C'est entre vos mains que Dieu a livré Oreb et Zeeb, les chefs de Madian. Qu'ai-je donc pu faire en comparaison de vous?» Lorsqu'il eut dit cela, leur colère contre lui s'apaisa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Gédéon arriva au Jourdain et le passa, ainsi que les 300 hommes qui étaient avec lui. Bien que fatigués, ils étaient toujours à la poursuite des Madianites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Gédéon dit aux habitants de Succoth: «Donnez, je vous en prie, quelques pains aux hommes qui m''accompagnent, car ils sont fatigués et je suis à la poursuite de Zébach et de Tsalmunna, les rois de Madian.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les chefs de Succoth répondirent: «Zébach et Tsalmunna sont-ils déjà en ton pouvoir, pour que nous donnions du pain à ton armée?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Gédéon répliqua: «Eh bien! lorsque l''Eternel aura livré entre mes mains Zébach et Tsalmunna, je déchirerai votre chair avec des épines du désert et avec des chardons.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'De là il monta à Penuel et il fit la même demande aux habitants de Penuel. Ils lui répondirent comme ceux de Succoth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'et il leur dit aussi: «Quand je reviendrai en paix, je démolirai cette tour.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Zébach et Tsalmunna se trouvaient à Karkor avec leur armée d''environ 15''000 hommes, les seuls survivants de toute l''armée des nomades de l''est; 120''000 hommes aptes au combat avaient été tués. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Gédéon monta par le chemin qu''empruntent les nomades, à l''est de Nobach et de Jogbeha, et il battit l''armée qui se croyait en sécurité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Zébach et Tsalmunna prirent la fuite et Gédéon les poursuivit. Il s'empara des deux rois de Madian, Zébach et Tsalmunna, et il mit en déroute toute l'armée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Gédéon, fils de Joas, revint de la bataille par la montée de Hérès. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il captura un jeune homme, habitant de Succoth, qu''il interrogea et qui lui mit par écrit le nom des chefs et des anciens de Succoth. Cela représentait 77 hommes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Puis il alla trouver les habitants de Succoth et leur dit: «Voici Zébach et Tsalmunna, au sujet desquels vous m''avez insulté en disant: ‘Zébach et Tsalmunna sont-ils déjà en ton pouvoir, pour que nous donnions du pain à tes hommes fatigués?’» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il s''empara des anciens de la ville et punit les habitants de Succoth avec des épines du désert et avec des chardons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il démolit aussi la tour de Penuel et tua les habitants de la ville.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Gédéon demanda à Zébach et à Tsalmunna: «Comment étaient les hommes que vous avez tués au mont Thabor?» Ils répondirent: «Ils te ressemblaient. Chacun avait l''air d''un fils de roi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il dit: «C''étaient mes frères, les fils de ma mère. L''Eternel est vivant! Si vous les aviez laissés vivre, je ne vous tuerais pas.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Et il ordonna à Jéther, son fils aîné: «Lève-toi, tue-les!» Mais le jeune garçon ne dégaina pas son épée, parce qu''il avait peur. En effet, c''était encore un enfant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Zébach et Tsalmunna dirent: «Lève-toi toi-même et tue-nous, car c''est à un homme fort de le faire.» Gédéon se leva alors et tua Zébach et Tsalmunna. Il prit ensuite les ornements en forme de croissant qui étaient au cou de leurs chameaux.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les Israélites dirent à Gédéon: «Domine sur nous, toi, puis ton fils et tes descendants, car tu nous as délivrés de l''oppression de Madian.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Gédéon leur dit: «Je ne dominerai pas sur vous, et mes descendants non plus. C''est l''Eternel qui dominera sur vous.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Gédéon ajouta: «J''ai une demande à vous faire: donnez-moi chacun les anneaux de votre butin.» – Les ennemis avaient des anneaux d''or, car c''étaient des Ismaélites. – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ils répondirent: «Nous te les donnerons volontiers», et ils étendirent par terre un manteau, sur lequel chacun jeta les anneaux pris dans son butin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Le poids des anneaux d''or que demanda Gédéon fut de près de 20 kilos, et ce sans compter les ornements en forme de croissant, les boucles d''oreilles et les vêtements de pourpre que portaient les rois de Madian, ni les colliers qui étaient au cou de leurs chameaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Gédéon en fit un éphod
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ephod: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: élément de la tenue des prêtres et du grand-prêtre devenu l'objet d'un culte idolâtrique.
    marker-yv: yv-n
  - type: text
    text: ' qu''il plaça dans sa ville, à Ophra. Il y devint l''objet des prostitutions'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Prostitutions: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire un culte idolâtrique.
    marker-yv: yv-n
  - type: text
    text: ' de tout Israël et il fut un piège pour Gédéon et pour sa famille.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Les Madianites furent humiliés devant les Israélites et ne relevèrent plus la tête. Le pays fut en paix pendant 40 ans, c'est-à-dire durant la vie de Gédéon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jerubbaal, fils de Joas, retourna habiter dans sa maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Gédéon eut 70 fils, tous issus de lui, car il eut plusieurs femmes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Sa concubine, qui résidait à Sichem, lui donna aussi un fils, qu''on appela Abimélec. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Gédéon, fils de Joas, mourut après une heureuse vieillesse. Il fut enterré dans le tombeau de son père Joas, à Ophra, village de la famille d'Abiézer.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Violences d'Abimélec
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Après la mort de Gédéon, les Israélites recommencèrent à se prostituer aux Baals, et ils prirent pour dieu Baal-Berith. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Les Israélites ne se souvinrent pas de l''Eternel, leur Dieu, qui les avait délivrés de tous les ennemis qui les entouraient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Ils ne manifestèrent pas non plus d'attachement à la famille de Jerubbaal, c'est-à-dire Gédéon, après tout le bien qu'il avait fait à Israël.
