document_id: PSA.3,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Confiance malgré la persécution
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Psaume de David, lorsqu'il fuyait devant son fils Absalom.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Eternel, que mes ennemis sont nombreux!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Beaucoup se dressent contre moi,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'beaucoup disent à mon sujet:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '«Pas de salut pour lui auprès de Dieu!» '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mais toi, Eternel, tu es mon bouclier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu es ma gloire, et tu relèves ma tête.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: A pleine voix je crie à l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et il me répond de sa montagne sainte. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Je me couche, et je m'endors;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je me réveille, car l'Eternel est mon soutien.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Je n'ai pas peur de ces milliers de personnes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui m'assiègent de tous côtés.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Lève-toi, Eternel, sauve-moi, mon Dieu!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu gifles tous mes ennemis, tu brises les dents des méchants.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Le salut appartient à l'Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Que ta bénédiction soit sur ton peuple! '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
