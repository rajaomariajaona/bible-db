document_id: PSA.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Confiance malgré la persécution
  - type: text
    content: Psaume de David, lorsqu'il fuyait devant son fils Absalom.
  '2':
  - type: text
    content: Eternel, que mes ennemis sont nombreux!
  - type: text
    content: Beaucoup se dressent contre moi,
  '3':
  - type: text
    content: 'beaucoup disent à mon sujet:'
  - type: text
    content: '«Pas de salut pour lui auprès de Dieu!» '
  - type: text
    content: – Pause.
  '4':
  - type: text
    content: Mais toi, Eternel, tu es mon bouclier,
  - type: text
    content: tu es ma gloire, et tu relèves ma tête.
  '5':
  - type: text
    content: A pleine voix je crie à l'Eternel,
  - type: text
    content: 'et il me répond de sa montagne sainte. '
  - type: text
    content: – Pause.
  '6':
  - type: text
    content: Je me couche, et je m'endors;
  - type: text
    content: je me réveille, car l'Eternel est mon soutien.
  '7':
  - type: text
    content: Je n'ai pas peur de ces milliers de personnes
  - type: text
    content: qui m'assiègent de tous côtés.
  '8':
  - type: text
    content: Lève-toi, Eternel, sauve-moi, mon Dieu!
  - type: text
    content: Tu gifles tous mes ennemis, tu brises les dents des méchants.
  '9':
  - type: text
    content: Le salut appartient à l'Eternel.
  - type: text
    content: 'Que ta bénédiction soit sur ton peuple! '
  - type: text
    content: – Pause.
