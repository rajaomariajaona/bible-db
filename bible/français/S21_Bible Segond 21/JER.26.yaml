document_id: JER.26,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jérémie menacé de mort
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Au début du règne de Jojakim, fils de Josias, sur Juda, cette parole fut adressée à Jérémie par l''Eternel: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Lorsque les chefs de Juda apprirent ce qui se passait, ils montèrent du palais royal jusqu''à la maison de l''Eternel et s''assirent à l''entrée de la porte neuve. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Alors les prêtres et les prophètes dirent aux chefs et à tout le peuple: «Cet homme mérite d''être condamné à mort, car il a prophétisé contre cette ville, comme vous l''avez entendu de vos propres oreilles.»'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Jérémie dit à tous les chefs et à tout le peuple: «C''est l''Eternel qui m''a envoyé pour prophétiser contre ce temple et contre cette ville toutes les paroles que vous avez entendues. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Maintenant, corrigez votre conduite et votre manière d''agir, écoutez l''Eternel, votre Dieu, et il n''accomplira pas le mal qu''il avait l''intention de vous faire. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Quant à moi, je suis entre vos mains: traitez-moi comme vous l''estimez bon et juste! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Seulement, sachez bien que, si vous me faites mourir, vous vous rendrez coupables d'avoir versé le sang innocent, vous, cette ville et ses habitants. En effet, c'est vraiment l'Eternel qui m'a envoyé vers vous pour vous faire entendre toutes ces paroles.»
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Les chefs et tout le peuple dirent aux prêtres et aux prophètes: «Cet homme ne mérite pas d''être condamné à mort, car c''est au nom de l''Eternel, notre Dieu, qu''il nous a parlé.» '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'De plus, des anciens du pays se levèrent et dirent à toute l''assemblée: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: '«Michée de Morésheth prophétisait à l''époque du règne d''Ezéchias sur Juda, et il disait à tout le peuple de Juda: ‘Voici ce que dit l''Eternel, le maître de l''univers:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*Sion sera labourée comme un champ,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jérusalem deviendra un tas de pierres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le mont du temple une hauteur couverte de buissons.’
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sion… buissons: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Michée 3.12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ezéchias, roi de Juda, et tout Juda l'ont-ils fait mourir? Ezéchias n'a-t-il pas craint l'Eternel? N'a-t-il pas plutôt cherché à apaiser l'Eternel? Alors l'Eternel n'a pas accompli le mal qu'il avait l'intention de leur faire. Et nous, nous nous rendrions coupables d'un si grand crime?»
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '«Voici ce que dit l''Eternel: Tiens-toi dans le parvis de la maison de l''Eternel et dis à ceux qui viennent de toutes les villes de Juda pour se prosterner dans la maison de l''Eternel toutes les paroles que je t''ordonne de leur dire. N''en oublie aucune. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Il y avait un autre homme qui prophétisait au nom de l''Eternel: Urie, fils de Shemaeja, de Kirjath-Jearim. Il transmit contre cette ville et contre ce pays exactement les mêmes prophéties que Jérémie. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Le roi Jojakim, tous ses vaillants hommes et tous ses chefs entendirent ses paroles, et le roi chercha à le faire mourir. Urie en fut informé. Il eut peur, prit la fuite et se rendit en Egypte. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Le roi Jojakim envoya des hommes en Egypte: Elnathan, fils d''Acbor, et quelques autres avec lui. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ils firent sortir Urie d'Egypte et l'amenèrent au roi Jojakim. Celui-ci le fit mourir par l'épée et jeta son cadavre dans la fosse commune.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Cependant, Achikam, fils de Shaphan, intervint en faveur de Jérémie et empêcha qu'il ne soit livré au peuple pour être mis à mort.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Peut-être écouteront-ils et renonceront-ils chacun à leur mauvaise conduite. Alors je n''accomplirai pas le mal que j''avais prévu de leur faire à cause de la méchanceté de leurs agissements. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Tu leur diras: ‘Voici ce que dit l''Eternel: Si vous ne m''écoutez pas, si vous refusez de suivre ma loi, celle que j''ai mise devant vous, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'si vous refusez d''écouter les paroles de mes serviteurs les prophètes, ceux que je vous envoie, que je vous envoie inlassablement mais que vous n''écoutez pas, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: alors je traiterai ce temple comme Silo et je ferai de cette ville un objet de malédiction pour toutes les nations de la terre.’»
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Les prêtres, les prophètes et tout le peuple entendirent Jérémie prononcer ces paroles dans la maison de l''Eternel. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Il finissait de dire à tout le peuple tout ce que l''Eternel lui avait ordonné de dire lorsque les prêtres, les prophètes et tout le peuple s''emparèrent de lui en disant: «Tu vas mourir! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Pourquoi prophétises-tu au nom de l''Eternel en disant: ‘Ce temple sera comme Silo et cette ville sera dévastée, inhabitée’?» Tout le peuple s''attroupa autour de Jérémie dans la maison de l''Eternel. '
