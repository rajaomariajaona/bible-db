document_id: LUK.10,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Mission des 70 disciples
  - type: text
    content: 'Après cela, le Seigneur désigna encore 70 autres disciples et les envoya devant lui deux par deux dans toutes les villes et dans tous les endroits où lui-même devait aller. '
  '10':
  - type: text
    content: 'Mais dans toute ville où vous entrerez et où l''on ne vous accueillera pas, allez dans les rues et dites: '
  '11':
  - type: text
    content: '‘Nous secouons contre vous même la poussière de votre ville qui s''est attachée à nos pieds. Sachez cependant que le royaume de Dieu s''est approché [de vous].’ '
  '12':
  - type: text
    content: Je vous dis que, ce jour-là, Sodome
  - type: note
    content: 'Sodome: ville connue pour son immoralité et détruite par Dieu à l''époque d''Abraham.'
  - type: text
    content: ' sera traitée moins sévèrement que cette ville-là.'
  '13':
  - type: text
    content: »Malheur à toi, Chorazin, malheur à toi, Bethsaïda, car si les miracles accomplis au milieu de vous l'avaient été dans Tyr et dans Sidon, il y a longtemps que leurs habitants se seraient repentis
  - type: note
    content: 'Se seraient repentis: ou auraient changé d''attitude.'
  - type: text
    content: ', habillés d''un sac et assis dans la cendre'
  - type: note
    content: 'Habillés… cendre: tenue et attitude exprimant le deuil ou la tristesse.'
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'C''est pourquoi, lors du jugement Tyr et Sidon seront traitées moins sévèrement que vous. '
  '15':
  - type: text
    content: Et toi, Capernaüm
  - type: note
    content: 'Capernaüm: la ville au nord du lac de Galilée dont Jésus avait fait sa base pour son ministère en Galilée.'
  - type: text
    content: ', qui as été élevée jusqu''au ciel, tu seras abaissée jusqu''au séjour des morts. '
  '16':
  - type: text
    content: Celui qui vous écoute m'écoute, celui qui vous rejette me rejette, et celui qui me rejette rejette celui qui m'a envoyé.»
  '17':
  - type: text
    content: 'Les 70 revinrent tout joyeux et dirent: «Seigneur, même les démons nous sont soumis en ton nom.» '
  '18':
  - type: text
    content: 'Jésus leur dit: «Je regardais Satan tomber du ciel comme un éclair. '
  '19':
  - type: text
    content: 'Voici, je vous ai donné le pouvoir de marcher sur les serpents et les scorpions et sur toute la puissance de l''ennemi, et rien ne pourra vous nuire. '
  '2':
  - type: text
    content: 'Il leur dit: «La moisson est grande, mais il y a peu d''ouvriers. Priez donc le maître de la moisson d''envoyer des ouvriers dans sa moisson. '
  '20':
  - type: text
    content: Cependant, ne vous réjouissez pas de ce que les esprits vous sont soumis, mais réjouissez-vous de ce que vos noms sont inscrits dans le ciel.»
  '21':
  - type: text
    content: 'A ce moment même, Jésus fut rempli de joie par le Saint-Esprit et il dit: «Je te suis reconnaissant, Père, Seigneur du ciel et de la terre, de ce que tu as caché ces choses aux sages et aux intelligents et les as révélées aux enfants. Oui, Père, je te suis reconnaissant car c''est ce que tu as voulu. '
  '22':
  - type: text
    content: 'Mon Père m''a tout donné et personne ne sait qui est le Fils, si ce n''est le Père, ni qui est le Père, si ce n''est le Fils et celui à qui le Fils veut le révéler.» '
  '23':
  - type: text
    content: 'Puis il se tourna vers les disciples et leur dit en privé: «Heureux les yeux qui voient ce que vous voyez! '
  '24':
  - type: text
    content: En effet, je vous le dis, beaucoup de prophètes et de rois ont désiré voir ce que vous voyez et ne l'ont pas vu, entendre ce que vous entendez et ne l'ont pas entendu.»
  - type: heading
    content: Parabole du bon Samaritain
  '25':
  - type: text
    content: 'Un professeur de la loi se leva et dit à Jésus pour le mettre à l''épreuve: «Maître, que dois-je faire pour hériter de la vie éternelle?» '
  '26':
  - type: text
    content: 'Jésus lui dit: «Qu''est-il écrit dans la loi? Qu''y lis-tu?» '
  '27':
  - type: text
    content: 'Il répondit: «'
  - type: text
    content: Tu aimeras le Seigneur, ton Dieu, de tout ton cœur, de toute ton âme, de toute ta force
  - type: text
    content: ' et de toute ta pensée, et '
  - type: text
    content: ton prochain comme toi-même
  - type: note
    content: 'Tu aimeras… force: citation de Deutéronome 6.5. Ton prochain comme toi-même: citation de Lévitique 19.18.'
  - type: text
    content: '.» '
  '28':
  - type: text
    content: '«Tu as bien répondu, lui dit Jésus. Fais cela et tu vivras.» '
  '29':
  - type: text
    content: 'Mais lui, voulant se justifier, dit à Jésus: «Et qui est mon prochain?» '
  '3':
  - type: text
    content: 'Allez-y! Je vous envoie comme des agneaux au milieu des loups. '
  '30':
  - type: text
    content: 'Jésus reprit la parole et dit: «Un homme descendait de Jérusalem à Jéricho. Il tomba entre les mains de brigands qui le dépouillèrent, le rouèrent de coups et s''en allèrent en le laissant à moitié mort. '
  '31':
  - type: text
    content: 'Un prêtre qui, par hasard, descendait par le même chemin vit cet homme et passa à distance. '
  '32':
  - type: text
    content: 'De même aussi un Lévite arriva à cet endroit; il le vit et passa à distance. '
  '33':
  - type: text
    content: 'Mais un Samaritain qui voyageait arriva près de lui et fut rempli de compassion lorsqu''il le vit. '
  '34':
  - type: text
    content: 'Il s''approcha et banda ses plaies en y versant de l''huile et du vin; puis il le mit sur sa propre monture, le conduisit dans une auberge et prit soin de lui. '
  '35':
  - type: text
    content: 'Le lendemain, [à son départ,] il sortit deux pièces d''argent, les donna à l''aubergiste et dit: ‘Prends soin de lui, et ce que tu dépenseras en plus, je te le rendrai à mon retour.’ '
  '36':
  - type: text
    content: 'Lequel de ces trois te semble avoir été le prochain de celui qui était tombé au milieu des brigands?» '
  '37':
  - type: text
    content: '«C''est celui qui a agi avec bonté envers lui», répondit le professeur de la loi. Jésus lui dit [donc]: «Va agir de la même manière, toi aussi.»'
  - type: heading
    content: Marthe et Marie
  '38':
  - type: text
    content: 'Comme Jésus était en chemin avec ses disciples, il entra dans un village, et une femme du nom de Marthe l''accueillit dans sa maison. '
  '39':
  - type: text
    content: 'Elle avait une sœur appelée Marie, qui s''assit aux pieds de Jésus et écoutait ce qu''il disait. '
  '4':
  - type: text
    content: 'Ne prenez ni bourse, ni sac, ni sandales et ne saluez personne en chemin. '
  '40':
  - type: text
    content: 'Marthe était affairée aux nombreuses tâches du service. Elle survint et dit: «Seigneur, cela ne te fait-il rien que ma sœur me laisse seule pour servir? Dis-lui donc de venir m''aider.» '
  '41':
  - type: text
    content: 'Jésus lui répondit: «Marthe, Marthe, tu t''inquiètes et tu t''agites pour beaucoup de choses, '
  '42':
  - type: text
    content: mais une seule est nécessaire. Marie a choisi la bonne part, elle ne lui sera pas enlevée.»
  '5':
  - type: text
    content: 'Dans toute maison où vous entrerez, dites d''abord: ‘Que la paix soit sur cette maison!’ '
  '6':
  - type: text
    content: 'Et s''il se trouve là un homme de paix, votre paix reposera sur lui; sinon, elle reviendra sur vous. '
  '7':
  - type: text
    content: Restez dans cette maison, mangez et buvez ce qu'on vous donnera, car *l'ouvrier mérite son salaire
  - type: note
    content: 'L''ouvrier mérite son salaire: cité par l''apôtre Paul en 1 Timothée 5.18.'
  - type: text
    content: '. N''allez pas de maison en maison. '
  '8':
  - type: text
    content: 'Dans toute ville où vous entrerez et où l''on vous accueillera, mangez ce que l''on vous offrira, '
  '9':
  - type: text
    content: 'guérissez les malades qui s''y trouveront et dites-leur: ‘Le royaume de Dieu s''est approché de vous.’ '
