document_id: PSA.56,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Confiance dans la détresse
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au chef de chœur, sur la mélodie de «Colombe des térébinthes lointains». Hymne de David, lorsque les Philistins s'emparèrent de lui à Gath.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mes ennemis reculent, le jour où je crie à toi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je sais que Dieu est pour moi.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Je loue Dieu pour sa parole,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je loue l'Eternel pour sa parole.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Je me confie en Dieu, je n''ai peur de rien:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que peuvent me faire des hommes?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: O Dieu, je dois accomplir les vœux que je t'ai faits;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je t'offrirai ma reconnaissance,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: car tu as délivré mon âme de la mort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu as préservé mes pieds de la chute,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que je marche devant toi, ô Dieu, à la lumière des vivants.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Fais-moi grâce, ô Dieu, car des hommes me harcèlent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout le jour, ils me font la guerre, ils me tourmentent.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Tout le jour, mes adversaires me harcèlent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont nombreux, ils me font la guerre avec arrogance.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Quand je suis dans la crainte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je me confie en toi.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Je loue Dieu pour sa parole.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je me confie en Dieu, je n''ai peur de rien:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que peuvent me faire des créatures?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Sans cesse ils déforment mes propos,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils n'ont que de mauvaises pensées envers moi.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ils complotent, ils épient, ils sont sur mes talons
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu'ils en veulent à ma vie.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Est-ce par un crime qu'ils pourraient être délivrés?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans ta colère, ô Dieu, abats ces gens!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Tu comptes les pas de ma vie errante.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Recueille mes larmes dans ton outre:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne sont-elles pas inscrites dans ton livre?
