document_id: PSA.56,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Confiance dans la détresse
  - type: text
    content: Au chef de chœur, sur la mélodie de «Colombe des térébinthes lointains». Hymne de David, lorsque les Philistins s'emparèrent de lui à Gath.
  '10':
  - type: text
    content: Mes ennemis reculent, le jour où je crie à toi;
  - type: text
    content: je sais que Dieu est pour moi.
  '11':
  - type: text
    content: Je loue Dieu pour sa parole,
  - type: text
    content: je loue l'Eternel pour sa parole.
  '12':
  - type: text
    content: 'Je me confie en Dieu, je n''ai peur de rien:'
  - type: text
    content: que peuvent me faire des hommes?
  '13':
  - type: text
    content: O Dieu, je dois accomplir les vœux que je t'ai faits;
  - type: text
    content: je t'offrirai ma reconnaissance,
  '14':
  - type: text
    content: car tu as délivré mon âme de la mort,
  - type: text
    content: tu as préservé mes pieds de la chute,
  - type: text
    content: afin que je marche devant toi, ô Dieu, à la lumière des vivants.
  '2':
  - type: text
    content: Fais-moi grâce, ô Dieu, car des hommes me harcèlent;
  - type: text
    content: tout le jour, ils me font la guerre, ils me tourmentent.
  '3':
  - type: text
    content: Tout le jour, mes adversaires me harcèlent;
  - type: text
    content: ils sont nombreux, ils me font la guerre avec arrogance.
  '4':
  - type: text
    content: Quand je suis dans la crainte,
  - type: text
    content: je me confie en toi.
  '5':
  - type: text
    content: Je loue Dieu pour sa parole.
  - type: text
    content: 'Je me confie en Dieu, je n''ai peur de rien:'
  - type: text
    content: que peuvent me faire des créatures?
  '6':
  - type: text
    content: Sans cesse ils déforment mes propos,
  - type: text
    content: ils n'ont que de mauvaises pensées envers moi.
  '7':
  - type: text
    content: Ils complotent, ils épient, ils sont sur mes talons
  - type: text
    content: parce qu'ils en veulent à ma vie.
  '8':
  - type: text
    content: Est-ce par un crime qu'ils pourraient être délivrés?
  - type: text
    content: Dans ta colère, ô Dieu, abats ces gens!
  '9':
  - type: text
    content: Tu comptes les pas de ma vie errante.
  - type: text
    content: 'Recueille mes larmes dans ton outre:'
  - type: text
    content: ne sont-elles pas inscrites dans ton livre?
