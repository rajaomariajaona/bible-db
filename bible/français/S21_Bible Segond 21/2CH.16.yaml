document_id: 2CH.16,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Alliance d'Asa avec la Syrie
  - type: text
    content: 'La trente-sixième année du règne d''Asa, Baesha, le roi d''Israël, monta contre Juda, et il fortifia Rama pour empêcher les hommes d''Asa, roi de Juda, d''effectuer quelque manœuvre que ce soit. '
  '10':
  - type: text
    content: Asa fut irrité contre le voyant et il le fit mettre en prison parce qu'il était en colère contre lui à cause de cette parole. A la même époque, il maltraita aussi quelques membres du peuple.
  '11':
  - type: text
    content: 'Les actes d''Asa, des premiers aux derniers, sont décrits dans les annales des rois de Juda et d''Israël. '
  '12':
  - type: text
    content: La trente-neuvième année de son règne, il eut une très grave maladie des pieds. Toutefois, même pendant sa maladie, il ne consulta pas l'Eternel, mais les médecins.
  '13':
  - type: text
    content: 'Asa se coucha avec ses ancêtres. Il mourut la quarante et unième année de son règne. '
  '14':
  - type: text
    content: On l'enterra dans le tombeau qu'il s'était fait creuser dans la ville de David. On le coucha sur un lit qu'on avait garni d'aromates et de parfums préparés selon l'art du parfumeur et l'on en brûla en son honneur une quantité très considérable.
  '2':
  - type: text
    content: 'Asa sortit alors de l''argent et de l''or des trésors de la maison de l''Eternel et du palais royal, et il envoya des messagers vers Ben-Hadad, le roi de Syrie, qui habitait à Damas. Il lui fit dire: '
  '3':
  - type: text
    content: '«Qu''il y ait une alliance entre toi et moi, comme il en a existé une entre ton père et le mien! Vois, je t''envoie de l''argent et de l''or. Va rompre ton alliance avec Baesha, le roi d''Israël, afin qu''il s''éloigne de moi.» '
  '4':
  - type: text
    content: 'Ben-Hadad écouta le roi Asa: il envoya les chefs de son armée contre les villes d''Israël et ils conquirent Ijjon, Dan, Abel-Maïm et tous les entrepôts des villes de Nephthali. '
  '5':
  - type: text
    content: 'Lorsque Baesha l''apprit, il cessa de fortifier Rama, il interrompit ses travaux. '
  '6':
  - type: text
    content: Le roi Asa réquisitionna tout Juda pour emporter les pierres et le bois que Baesha employait à la construction de Rama. Il s'en servit pour fortifier Guéba et Mitspa.
  '7':
  - type: text
    content: 'A cette époque-là, le voyant Hanani alla trouver Asa, roi de Juda, et lui dit: «Parce que tu t''es appuyé sur le roi de Syrie et que tu ne t''es pas appuyé sur l''Eternel, ton Dieu, l''armée du roi de Syrie t''a échappé. '
  '8':
  - type: text
    content: 'Les Ethiopiens et les Libyens ne formaient-ils pas une grande armée, avec des chars et un grand nombre de cavaliers? Et cependant, parce que tu t''étais appuyé sur lui, l''Eternel les a livrés entre tes mains. '
  '9':
  - type: text
    content: En effet, l'Eternel parcourt toute la terre du regard pour soutenir ceux dont le cœur lui est attaché sans réserve. Tu t'es comporté de façon stupide dans cette affaire, car désormais tu auras des guerres.»
