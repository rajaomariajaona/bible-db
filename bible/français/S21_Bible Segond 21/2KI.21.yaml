document_id: 2KI.21
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne de Manassé sur Juda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Manassé avait 12 ans lorsqu'il devint roi et il régna 55 ans à Jérusalem. Sa mère s'appelait Hephtsiba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il fit ce qui est mal aux yeux de l''Eternel en imitant les pratiques abominables des nations que l''Eternel avait dépossédées devant les Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il reconstruisit les hauts lieux que son père Ezéchias avait détruits, il érigea des autels en l''honneur de Baal et il fit un poteau sacré, comme l''avait fait le roi d''Israël Achab. Il se prosterna devant tous les corps célestes et les servit. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il construisit des autels dans la maison de l''Eternel, alors que l''Eternel avait dit: «C''est à Jérusalem que j''établirai mon nom.» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il construisit des autels en l''honneur de tous les corps célestes dans les deux parvis de la maison de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il fit passer son fils par le feu, il pratiqua la divination et l''occultisme, et il mit en place des gens capables d''invoquer les esprits et des spirites. Il fit de plus en plus ce qui est mal aux yeux de l''Eternel, provoquant ainsi sa colère. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il mit la statue d''Astarté qu''il avait fabriquée dans le temple, alors que l''Eternel avait dit à David et à son fils Salomon: «C''est dans cette maison et c''est à Jérusalem, que j''ai choisie parmi toutes les tribus d''Israël, que je veux éternellement établir mon nom. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Je ne ferai plus errer les pas des Israélites loin du territoire que j'ai donné à leurs ancêtres, à condition seulement qu'ils veillent à mettre en pratique tous les commandements que je leur ai donnés et toute la loi que leur a prescrite mon serviteur Moïse.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais les Israélites n''écoutèrent pas et Manassé les égara à un tel point qu''ils firent le mal plus encore que les nations que l''Eternel avait détruites devant eux. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors l''Eternel annonça par l''intermédiaire de ses serviteurs les prophètes: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '«Parce que Manassé, le roi de Juda, a commis ces actes abominables, parce qu''il a fait pire que tout ce que les Amoréens avaient fait avant lui et parce qu''il a aussi fait pécher Juda par ses idoles, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'voici ce que dit l''Eternel, le Dieu d''Israël: ‘Je vais faire venir sur Jérusalem et sur Juda des malheurs tels que tous ceux qui en entendront parler en resteront abasourdis. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'J''étendrai sur Jérusalem le ruban à mesurer utilisé pour Samarie et le fil à plomb employé pour la famille d''Achab, je nettoierai Jérusalem comme un plat qu''on nettoie et qu''on renverse sens dessus dessous après l''avoir nettoyé. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'J''abandonnerai le reste de mon héritage et je les livrerai entre les mains de leurs ennemis. Ils deviendront le butin et la proie de tous leurs ennemis '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: parce qu'ils ont fait ce qui est mal à mes yeux et qu'ils m'ont irrité depuis le jour où leurs ancêtres sont sortis d'Egypte jusqu'à aujourd'hui.’»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Manassé versa aussi beaucoup de sang innocent, au point d'en remplir Jérusalem d'un bout à l'autre, en plus des péchés qu'il commit et qu'il fit commettre à Juda en faisant ce qui est mal aux yeux de l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Le reste des actes de Manassé, tout ce qu'il a accompli et les péchés auxquels il s'est livré, cela est décrit dans les annales des rois de Juda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Manassé se coucha avec ses ancêtres et il fut enterré dans le jardin de son palais, dans le jardin d'Uzza. Son fils Amon devint roi à sa place.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne d'Amon sur Juda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Amon avait 22 ans lorsqu'il devint roi et il régna 2 ans à Jérusalem. Sa mère s'appelait Meshullémeth et c'était la fille de Haruts, de Jotba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il fit ce qui est mal aux yeux de l''Eternel, comme l''avait fait son père Manassé. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il marcha entièrement sur la voie de son père, il servit les idoles que son père avait servies et se prosterna devant elles. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il abandonna l''Eternel, le Dieu de ses ancêtres, et il ne marcha pas dans la voie de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ses propres serviteurs conspirèrent contre lui et ils firent mourir le roi dans son palais. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mais la population du pays fit mourir tous ceux qui avaient conspiré contre le roi Amon et proclama son fils Josias roi à sa place.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Le reste des actes d'Amon, ce qu'il a accompli, cela est décrit dans les annales des rois de Juda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: On l'enterra dans son tombeau dans le jardin d'Uzza. Son fils Josias devint roi à sa place.
