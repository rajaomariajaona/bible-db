document_id: 2CH.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne d'Abija
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La dix-huitième année du règne de Jéroboam, Abija devint roi sur Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il régna 3 ans à Jérusalem. Sa mère s'appelait Micaja et c'était la fille d'Uriel, de Guibea. Il y eut guerre entre Abija et Jéroboam.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Abija engagea le combat avec une armée de vaillants guerriers, 400'000 hommes d'élite. Jéroboam se rangea en ordre de bataille contre lui avec 800'000 hommes d'élite, vaillants guerriers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Du haut du mont Tsemaraïm, qui fait partie de la région montagneuse d''Ephraïm, Abija se leva et dit: «Ecoutez-moi, Jéroboam et tout Israël! '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ne savez-vous pas que l''Eternel, le Dieu d''Israël, a donné pour toujours la royauté sur Israël à David, à lui et à ses descendants, par une alliance inviolable? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais Jéroboam, fils de Nebath, qui était un serviteur de Salomon, le fils de David, a surgi et s''est révolté contre son seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Des vauriens, des hommes pervers, se sont joints à lui et l''ont emporté sur Roboam, le fils de Salomon. Roboam était jeune et faible, et il a manqué de force devant eux. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Et maintenant, vous voulez triompher du royaume de l''Eternel, alors qu''il est entre les mains des descendants de David! Vous êtes une foule nombreuse et vous avez avec vous les veaux d''or que Jéroboam vous a fabriqués pour qu''ils soient vos dieux. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'N''avez-vous pas chassé les prêtres de l''Eternel, les descendants d''Aaron et les Lévites, et ne vous êtes-vous pas institué des prêtres, comme les peuples des autres pays? Tout homme qui venait avec un jeune taureau et 7 béliers afin d''être établi dans ses fonctions a pu devenir prêtre de ce qui n''est pas Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Quant à nous, c''est l''Eternel qui est notre Dieu et nous ne l''avons pas abandonné. Les prêtres qui servent l''Eternel sont des descendants d''Aaron et les Lévites remplissent leurs fonctions. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nous offrons chaque matin et chaque soir des holocaustes à l''Eternel, nous brûlons le parfum odoriférant, nous disposons les pains consacrés sur la table pure et nous allumons chaque soir le chandelier en or et ses lampes. En effet, nous respectons l''ordre établi par l''Eternel, notre Dieu, tandis que vous, vous l''avez abandonné. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Dieu et ses prêtres sont avec nous, à notre tête, et nous avons les trompettes retentissantes pour les faire résonner contre vous. Israélites, ne combattez pas l'Eternel, le Dieu de vos ancêtres, car vous n'auriez aucun succès!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jéroboam les prit par-derrière en les encerclant au moyen d''une embuscade, de sorte que ses troupes se trouvaient en face de Juda, tandis que l''embuscade les prenait par-derrière. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les Judéens se retournèrent et virent qu''ils avaient à combattre devant et derrière. Ils crièrent à l''Eternel et les prêtres sonnèrent de la trompette. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les hommes de Juda poussèrent un cri de guerre et, à leur cri de guerre, l''Eternel frappa Jéroboam et tout Israël sous les yeux d''Abija et de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les Israélites prirent la fuite devant les Judéens et Dieu les livra entre leurs mains. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Abija et son peuple leur infligèrent une grande défaite et 500''000 hommes d''élite tombèrent morts parmi les Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Les Israélites furent humiliés à cette occasion et les Judéens remportèrent la victoire parce qu'ils s'étaient appuyés sur l'Eternel, le Dieu de leurs ancêtres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Abija poursuivit Jéroboam et lui prit des villes: Béthel et les villes qui en dépendaient, Jeshana et les villes qui en dépendaient, ainsi qu''Ephron et les villes qui en dépendaient. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jéroboam fut sans force à l''époque d''Abija; puis l''Eternel le frappa et il mourut. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Quant à Abija, il devint puissant. Il eut 14 femmes et fut le père de 22 fils et 16 filles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Le reste des actes d'Abija, ce qu'il a fait et ce qu'il a dit, est décrit dans le commentaire du prophète Iddo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Abija se coucha avec ses ancêtres et on l'enterra dans la ville de David. Son fils Asa devint roi à sa place. A son époque, le pays fut en paix pendant 10 ans.
