document_id: 2CH.13,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Règne d'Abija
  - type: text
    content: 'La dix-huitième année du règne de Jéroboam, Abija devint roi sur Juda. '
  '10':
  - type: text
    content: 'Quant à nous, c''est l''Eternel qui est notre Dieu et nous ne l''avons pas abandonné. Les prêtres qui servent l''Eternel sont des descendants d''Aaron et les Lévites remplissent leurs fonctions. '
  '11':
  - type: text
    content: 'Nous offrons chaque matin et chaque soir des holocaustes à l''Eternel, nous brûlons le parfum odoriférant, nous disposons les pains consacrés sur la table pure et nous allumons chaque soir le chandelier en or et ses lampes. En effet, nous respectons l''ordre établi par l''Eternel, notre Dieu, tandis que vous, vous l''avez abandonné. '
  '12':
  - type: text
    content: Dieu et ses prêtres sont avec nous, à notre tête, et nous avons les trompettes retentissantes pour les faire résonner contre vous. Israélites, ne combattez pas l'Eternel, le Dieu de vos ancêtres, car vous n'auriez aucun succès!»
  '13':
  - type: text
    content: 'Jéroboam les prit par-derrière en les encerclant au moyen d''une embuscade, de sorte que ses troupes se trouvaient en face de Juda, tandis que l''embuscade les prenait par-derrière. '
  '14':
  - type: text
    content: 'Les Judéens se retournèrent et virent qu''ils avaient à combattre devant et derrière. Ils crièrent à l''Eternel et les prêtres sonnèrent de la trompette. '
  '15':
  - type: text
    content: 'Les hommes de Juda poussèrent un cri de guerre et, à leur cri de guerre, l''Eternel frappa Jéroboam et tout Israël sous les yeux d''Abija et de Juda. '
  '16':
  - type: text
    content: 'Les Israélites prirent la fuite devant les Judéens et Dieu les livra entre leurs mains. '
  '17':
  - type: text
    content: 'Abija et son peuple leur infligèrent une grande défaite et 500''000 hommes d''élite tombèrent morts parmi les Israélites. '
  '18':
  - type: text
    content: Les Israélites furent humiliés à cette occasion et les Judéens remportèrent la victoire parce qu'ils s'étaient appuyés sur l'Eternel, le Dieu de leurs ancêtres.
  '19':
  - type: text
    content: 'Abija poursuivit Jéroboam et lui prit des villes: Béthel et les villes qui en dépendaient, Jeshana et les villes qui en dépendaient, ainsi qu''Ephron et les villes qui en dépendaient. '
  '2':
  - type: text
    content: Il régna 3 ans à Jérusalem. Sa mère s'appelait Micaja et c'était la fille d'Uriel, de Guibea. Il y eut guerre entre Abija et Jéroboam.
  '20':
  - type: text
    content: 'Jéroboam fut sans force à l''époque d''Abija; puis l''Eternel le frappa et il mourut. '
  '21':
  - type: text
    content: Quant à Abija, il devint puissant. Il eut 14 femmes et fut le père de 22 fils et 16 filles.
  '22':
  - type: text
    content: Le reste des actes d'Abija, ce qu'il a fait et ce qu'il a dit, est décrit dans le commentaire du prophète Iddo.
  '23':
  - type: text
    content: Abija se coucha avec ses ancêtres et on l'enterra dans la ville de David. Son fils Asa devint roi à sa place. A son époque, le pays fut en paix pendant 10 ans.
  '3':
  - type: text
    content: Abija engagea le combat avec une armée de vaillants guerriers, 400'000 hommes d'élite. Jéroboam se rangea en ordre de bataille contre lui avec 800'000 hommes d'élite, vaillants guerriers.
  '4':
  - type: text
    content: 'Du haut du mont Tsemaraïm, qui fait partie de la région montagneuse d''Ephraïm, Abija se leva et dit: «Ecoutez-moi, Jéroboam et tout Israël! '
  '5':
  - type: text
    content: 'Ne savez-vous pas que l''Eternel, le Dieu d''Israël, a donné pour toujours la royauté sur Israël à David, à lui et à ses descendants, par une alliance inviolable? '
  '6':
  - type: text
    content: 'Mais Jéroboam, fils de Nebath, qui était un serviteur de Salomon, le fils de David, a surgi et s''est révolté contre son seigneur. '
  '7':
  - type: text
    content: 'Des vauriens, des hommes pervers, se sont joints à lui et l''ont emporté sur Roboam, le fils de Salomon. Roboam était jeune et faible, et il a manqué de force devant eux. '
  '8':
  - type: text
    content: 'Et maintenant, vous voulez triompher du royaume de l''Eternel, alors qu''il est entre les mains des descendants de David! Vous êtes une foule nombreuse et vous avez avec vous les veaux d''or que Jéroboam vous a fabriqués pour qu''ils soient vos dieux. '
  '9':
  - type: text
    content: 'N''avez-vous pas chassé les prêtres de l''Eternel, les descendants d''Aaron et les Lévites, et ne vous êtes-vous pas institué des prêtres, comme les peuples des autres pays? Tout homme qui venait avec un jeune taureau et 7 béliers afin d''être établi dans ses fonctions a pu devenir prêtre de ce qui n''est pas Dieu. '
