document_id: DAN.6
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Darius le Mède s'empara du royaume à l'âge de 62 ans.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Daniel dans la fosse aux lions
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Darius trouva bon d''établir sur le royaume 120 administrateurs qui devaient être répartis dans tout le royaume. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il mit à leur tête trois responsables, parmi lesquels figurait Daniel, afin que les administrateurs leur rendent des comptes et que le roi ne subisse aucun dommage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Daniel se montrait supérieur aux autres responsables et aux administrateurs parce qu''il y avait en lui un esprit extraordinaire. Le roi pensait à lui confier la responsabilité de tout le royaume. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les responsables et les administrateurs cherchèrent alors une occasion d'accuser Daniel en rapport avec les affaires du royaume. Cependant, ils ne purent trouver aucune occasion de le faire, aucune faute de sa part, parce qu'il était fidèle et qu'on ne trouvait chez lui ni négligence ni faute.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ces hommes dirent: «Nous ne trouverons aucun motif d''accusation contre ce Daniel, à moins d''en trouver un dans la loi de son Dieu.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Puis ces responsables et ces administrateurs se précipitèrent vers le roi et lui dirent: «Roi Darius, puisses-tu vivre toujours! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tous les responsables du royaume, les intendants, les administrateurs, les conseillers et les gouverneurs sont d''avis que le roi proclame un édit comportant une interdiction sévère: toute personne qui, dans l''espace de 30 jours, adressera des prières à un autre, dieu ou homme, que toi, roi, sera jetée dans la fosse aux lions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Maintenant, roi, confirme l''interdiction et écris le décret afin qu''il ne puisse pas être modifié, comme la loi des Mèdes et des Perses qui est irrévocable.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Là-dessus le roi Darius écrivit le décret d'interdiction.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Lorsque Daniel fut au courant de la rédaction de ce décret, il se retira dans sa maison, où les fenêtres de la chambre à l''étage étaient ouvertes dans la direction de Jérusalem. Trois fois par jour il se mettait à genoux, priait et exprimait sa reconnaissance à son Dieu, tout comme il le faisait avant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors ces hommes se précipitèrent et trouvèrent Daniel en train de prier et de supplier son Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Puis ils se présentèrent devant le roi et lui parlèrent de l''interdiction royale: «N''as-tu pas écrit une interdiction d''après laquelle toute personne qui, dans l''espace de 30 jours, adresserait des prières à un autre, dieu ou homme, que toi, roi, serait jetée dans la fosse aux lions?» Le roi répondit: «Cet ordre est aussi sûr que la loi des Mèdes et des Perses, qui est irrévocable.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils prirent de nouveau la parole et dirent au roi: «Daniel, l''un des exilés de Juda, n''a tenu aucun compte de toi, roi, ni de l''interdiction que tu as écrite, et il fait sa prière trois fois par jour.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le roi fut très attristé quand il entendit cela. Il prit à cœur de délivrer Daniel et jusqu''au coucher du soleil il s''efforça de le sauver. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais ces hommes insistèrent auprès du roi et lui dirent: «Sache, roi, que d''après la loi des Mèdes et des Perses, aucune interdiction ni aucun décret confirmé par le roi ne peut être modifié.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors le roi donna l''ordre de faire venir Daniel et de le jeter dans la fosse aux lions. Le roi dit à Daniel: «Que ton Dieu, que tu sers avec persévérance, veuille te délivrer!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: On apporta une pierre et on la plaça sur l'ouverture de la fosse. Le roi y apposa l'empreinte de son anneau et de l'anneau de ses hauts fonctionnaires afin que rien ne puisse être modifié pour Daniel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le roi se rendit ensuite dans son palais. Il passa la nuit sans manger, sans faire venir de danseuse devant lui et sans parvenir à trouver le sommeil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le roi se leva tôt le matin, avec l''aurore, et se précipita à la fosse aux lions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'En s''approchant de la fosse, il appela Daniel d''une voix triste et lui demanda: «Daniel, serviteur du Dieu vivant, ton Dieu que tu sers avec persévérance a-t-il pu te délivrer des lions?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Daniel répondit au roi: «Roi, puisses-tu vivre toujours! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mon Dieu a envoyé son ange et fermé la gueule des lions. Ils ne m''ont fait aucun mal, parce que j''ai été trouvé innocent devant lui. Devant toi non plus, roi, je n''avais rien fait de mal.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Le roi fut alors tout heureux et ordonna de faire sortir Daniel de la fosse. Daniel fut retiré de la fosse. On ne trouva aucune blessure sur lui, parce qu''il avait eu confiance en son Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Le roi ordonna que les accusateurs de Daniel soient amenés et jetés dans la fosse aux lions avec leurs enfants et leurs femmes. Avant qu'ils ne soient parvenus au fond de la fosse, les lions les attrapèrent et brisèrent tous leurs os.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Après cela, le roi Darius écrivit à tous les peuples, à toutes les nations, aux hommes de toute langue qui habitaient tout l''Empire: «Que la paix vous soit donnée en abondance! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'J''ordonne que, dans toute l''étendue de mon royaume, on ait de la crainte et un profond respect pour le Dieu de Daniel. En effet, il est le Dieu vivant et il subsiste éternellement. Son royaume ne sera jamais détruit et sa domination durera jusqu''à la fin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: C'est lui qui délivre et qui sauve, qui accomplit des signes et des miracles dans le ciel et sur la terre. C'est lui qui a délivré Daniel de la griffe des lions.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Daniel prospéra sous le règne de Darius, c'est-à-dire de Cyrus le Perse.
