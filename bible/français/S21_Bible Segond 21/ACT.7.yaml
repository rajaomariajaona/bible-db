document_id: ACT.7
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le grand-prêtre dit: «Est-ce exact?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Etienne répondit: «Mes frères et pères, écoutez! Le Dieu de gloire est apparu à notre ancêtre Abraham lorsqu''il était en Mésopotamie, avant qu''il ne s''installe à Charan, et lui a dit: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Quitte ton pays et ta famille et va dans le pays que je te montrerai
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Quitte… montrerai: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Genèse 12.1
      metadata:
        usfm: GEN.12.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il a alors quitté le pays des Chaldéens et est allé habiter à Charan. De là, après la mort de son père, Dieu l''a fait passer dans le pays que vous habitez maintenant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il ne lui a donné aucun héritage dans ce pays, pas même de quoi poser le pied, mais il a promis de lui en donner la possession, ainsi qu''à sa descendance après lui, alors même qu''il n''avait pas d''enfant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Voici ce que Dieu a dit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Ses descendants séjourneront dans un pays étranger; on les réduira en esclavage et on les maltraitera pendant 400 ans.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Cependant, la nation dont ils seront esclaves, c'est moi-même qui la jugerai,
  - type: text
    text: ' dit Dieu. '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Après cela, ils sortiront et ils me serviront dans ce lieu-ci
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.6-7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ses descendants… ce lieu-ci: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Genèse 15.13-14
      metadata:
        usfm: GEN.15.13+GEN.15.14
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '16'
      metadata:
        usfm: GEN.15.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Puis Dieu a donné à Abraham l'alliance de la circoncision; ainsi, Abraham a eu pour fils Isaac et l'a circoncis le huitième jour, Isaac a fait de même pour Jacob, et Jacob pour les douze patriarches.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '»Les patriarches, jaloux de Joseph, l''ont vendu pour qu''il soit emmené en Egypte, mais Dieu était avec lui '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'et l''a délivré de toutes ses détresses. Il lui a donné la sagesse et la grâce devant le pharaon, le roi d''Egypte, qui l''a établi gouverneur de l''Egypte et de toute sa maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il est alors survenu une famine dans toute l''Egypte et en Canaan. La détresse était grande et nos ancêtres ne trouvaient pas de quoi manger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jacob a appris qu''il y avait du blé en Egypte et il y a envoyé nos ancêtres une première fois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'La deuxième fois, Joseph s''est fait reconnaître par ses frères et le pharaon a ainsi appris quelle était son origine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Puis Joseph a envoyé chercher son père Jacob et toute sa famille, composée de 75 personnes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jacob est descendu en Egypte, où il est mort, ainsi que nos ancêtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Leurs corps ont été transportés à Sichem et déposés dans le tombeau qu'Abraham avait acheté à prix d'argent aux fils d'Hamor à Sichem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '»Le temps où devait s''accomplir la promesse que Dieu avait faite à Abraham approchait, et le peuple a grandi et augmenté en nombre en Egypte '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: jusqu'à la venue d'un autre roi, qui n'avait pas connu Joseph
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jusqu''à… Joseph: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 1.8
      metadata:
        usfm: EXO.1.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ce roi s'en est pris avec perfidie à notre peuple et a maltraité nos ancêtres au point de leur faire abandonner leurs enfants pour qu'ils ne survivent pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '»A cette époque est né Moïse, qui était beau aux yeux de Dieu. Il a été nourri trois mois chez son père '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'et, quand il a été abandonné, la fille du pharaon l''a adopté et l''a élevé comme son fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Moïse a été formé avec toute la sagesse des Egyptiens; il était puissant en paroles et en actes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '»Il était âgé de 40 ans lorsqu''il a eu à cœur de rendre visite à ses frères, les Israélites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il en a vu un qu''on maltraitait, a pris sa défense et, pour venger l''homme malmené, a frappé l''Egyptien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ses frères comprendraient que Dieu leur accordait la délivrance par son intermédiaire, pensait-il, mais ils ne l''ont pas compris. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Le jour suivant, il est venu au milieu d''eux alors que certains se battaient et il a essayé de ramener la paix en leur disant: ‘Vous êtes frères! Pourquoi vous faites-vous du mal l''un à l''autre?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Mais celui qui maltraitait son prochain l''a repoussé en disant: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Qui t'a établi chef et juge sur nous?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Veux-tu me tuer comme tu as tué l'Egyptien hier?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.27-28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Qui t''a établi… hier: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 2.1
      metadata:
        usfm: EXO.2.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: A cette parole, Moïse a pris la fuite et est allé habiter dans le pays de Madian, où il a eu deux fils.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: »C'est 40 ans plus tard qu’
  - type: usfm
    marker: qt
    children:
    - type: text
      text: un ange [du Seigneur] lui est apparu dans le désert du mont Sinaï, dans la flamme d'un buisson en feu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Un ange… en feu: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 3.2
      metadata:
        usfm: EXO.3.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Voyant cela, Moïse a été étonné de cette apparition; comme il s''approchait pour regarder, la voix du Seigneur s''est fait entendre: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Je suis le Dieu de tes ancêtres, le Dieu d'Abraham, d'Isaac et de Jacob
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.32 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je suis… Jacob: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 3.6
      metadata:
        usfm: EXO.3.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' Moïse, tout tremblant, n''osait pas regarder. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Le Seigneur lui a dit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Retire tes sandales, car l'endroit où tu te tiens est une terre sainte.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: J'ai vu la souffrance de mon peuple qui est en Egypte, j'ai entendu ses gémissements et je suis descendu pour le délivrer. Maintenant, vas-y, je t'enverrai en Egypte
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.33-34 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Retire… Egypte: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 3.7-8
      metadata:
        usfm: EXO.3.7+EXO.3.8
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10'
      metadata:
        usfm: EXO.3.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: '»Ce Moïse qu''ils avaient renié en disant: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Qui t'a établi chef et juge?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.35 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Qui t''a établi chef et juge: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 2.14
      metadata:
        usfm: EXO.2.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' c''est lui que Dieu a envoyé comme chef et libérateur avec l''aide de l''ange qui lui était apparu dans le buisson. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'C''est lui qui les a fait sortir d''Egypte en accomplissant des prodiges et des signes miraculeux en Egypte, à la mer Rouge et au désert pendant 40 ans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'C''est ce Moïse qui a dit aux Israélites: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: '[Le Seigneur notre] Dieu fera surgir pour vous, parmi vos frères, un prophète comme moi'
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.37 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le Seigneur… moi: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 18.15
      metadata:
        usfm: DEU.18.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: C'est lui qui, lors de l'assemblée au désert, était avec l'ange qui lui parlait sur le mont Sinaï et avec nos ancêtres; il a reçu des oracles de vie pour nous les transmettre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: '»Nos ancêtres n''ont pas voulu lui obéir, mais ils l''ont repoussé et, dans leur cœur, ils se sont tournés vers l''Egypte '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'en disant à Aaron: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Fais-nous des dieux qui marchent devant nous! En effet, ce Moïse qui nous a fait sortir d'Egypte, nous ignorons ce qu'il est devenu
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.40 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Fais-nous… devenu: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 32.1
      metadata:
        usfm: EXO.32.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'A ce moment-là, ils ont fait un veau, ils ont offert un sacrifice à l''idole et se sont réjouis de ce que leurs mains avaient fabriqué. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Alors Dieu s''est détourné d''eux et les a laissés adorer les corps célestes, comme cela est écrit dans le livre des prophètes: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: M'avez-vous offert des victimes et des sacrifices pendant 40 ans au désert, communauté d'Israël?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Vous avez porté la tente de Moloc et l'étoile de votre dieu Remphan, ces images que vous avez faites pour les adorer! Aussi, je vous déporterai au-delà de Babylone
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.42-43 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'M''avez-vous… au-delà de Babylone: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Amos 5.25-27
      metadata:
        usfm: AMO.5.25+AMO.5.26+AMO.5.27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: '»Dans le désert, nos ancêtres avaient la tente du témoignage; celui qui parlait à Moïse lui avait ordonné de la faire d''après le modèle qu''il avait vu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Nos ancêtres l''ont reçue et l''ont introduite, sous la conduite de Josué, dans le pays conquis sur les nations que Dieu a chassées devant eux; et elle y est restée jusqu''à l''époque de David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'David a trouvé grâce devant Dieu et a demandé la permission de trouver une habitation pour le Dieu de Jacob, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'mais c''est Salomon qui lui a construit un temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Cependant le Très-Haut n''habite pas dans des temples faits par la main de l''homme, comme le dit le prophète: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Le ciel est mon trône, et la terre mon marchepied. Quelle maison pourrez-vous me construire, dit le Seigneur, ou quel endroit pourra être mon lieu de repos?
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: N'est-ce pas ma main qui a fait tout cela?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.49-50 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le ciel… tout cela: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 66.1-2
      metadata:
        usfm: ISA.66.1+ISA.66.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: '»Hommes réfractaires, incirconcis de cœur et d''oreilles! Vous vous opposez toujours au Saint-Esprit; vous êtes bien comme vos ancêtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Lequel des prophètes vos ancêtres n''ont-ils pas persécuté? Ils ont tué ceux qui annonçaient d''avance la venue du Juste, et c''est lui que vous avez fait maintenant arrêter et dont vous êtes devenus les meurtriers, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: vous qui avez reçu la loi par l'intermédiaire des anges et qui ne l'avez pas gardée!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'En entendant ces paroles, ils avaient le cœur plein de rage et ils grinçaient des dents contre lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Mais Etienne, rempli du Saint-Esprit, fixa les regards vers le ciel et vit la gloire de Dieu et Jésus debout à la droite de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Il dit: «Je vois le ciel ouvert et le Fils de l''homme debout à la droite de Dieu.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Ils poussèrent alors de grands cris en se bouchant les oreilles, se précipitèrent tous ensemble sur lui, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'le traînèrent à l''extérieur de la ville et se mirent à le lapider. Les témoins avaient déposé leurs vêtements aux pieds d''un jeune homme appelé Saul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Ils jetaient des pierres à Etienne qui priait et disait: «Seigneur Jésus, accueille mon esprit!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Puis il se mit à genoux et s''écria d''une voix forte: «Seigneur, ne les charge pas de ce péché!» Après avoir dit cela, il s''endormit.'
