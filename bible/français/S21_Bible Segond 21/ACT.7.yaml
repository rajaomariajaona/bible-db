document_id: ACT.7,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Le grand-prêtre dit: «Est-ce exact?»'
  '10':
  - type: text
    content: 'et l''a délivré de toutes ses détresses. Il lui a donné la sagesse et la grâce devant le pharaon, le roi d''Egypte, qui l''a établi gouverneur de l''Egypte et de toute sa maison. '
  '11':
  - type: text
    content: 'Il est alors survenu une famine dans toute l''Egypte et en Canaan. La détresse était grande et nos ancêtres ne trouvaient pas de quoi manger. '
  '12':
  - type: text
    content: 'Jacob a appris qu''il y avait du blé en Egypte et il y a envoyé nos ancêtres une première fois. '
  '13':
  - type: text
    content: 'La deuxième fois, Joseph s''est fait reconnaître par ses frères et le pharaon a ainsi appris quelle était son origine. '
  '14':
  - type: text
    content: 'Puis Joseph a envoyé chercher son père Jacob et toute sa famille, composée de 75 personnes. '
  '15':
  - type: text
    content: 'Jacob est descendu en Egypte, où il est mort, ainsi que nos ancêtres. '
  '16':
  - type: text
    content: Leurs corps ont été transportés à Sichem et déposés dans le tombeau qu'Abraham avait acheté à prix d'argent aux fils d'Hamor à Sichem.
  '17':
  - type: text
    content: '»Le temps où devait s''accomplir la promesse que Dieu avait faite à Abraham approchait, et le peuple a grandi et augmenté en nombre en Egypte '
  '18':
  - type: text
    content: jusqu'à la venue d'un autre roi, qui n'avait pas connu Joseph
  - type: note
    content: 'Jusqu''à… Joseph: citation d''Exode 1.8.'
  - type: text
    content: '. '
  '19':
  - type: text
    content: Ce roi s'en est pris avec perfidie à notre peuple et a maltraité nos ancêtres au point de leur faire abandonner leurs enfants pour qu'ils ne survivent pas.
  '2':
  - type: text
    content: 'Etienne répondit: «Mes frères et pères, écoutez! Le Dieu de gloire est apparu à notre ancêtre Abraham lorsqu''il était en Mésopotamie, avant qu''il ne s''installe à Charan, et lui a dit: '
  '20':
  - type: text
    content: '»A cette époque est né Moïse, qui était beau aux yeux de Dieu. Il a été nourri trois mois chez son père '
  '21':
  - type: text
    content: 'et, quand il a été abandonné, la fille du pharaon l''a adopté et l''a élevé comme son fils. '
  '22':
  - type: text
    content: Moïse a été formé avec toute la sagesse des Egyptiens; il était puissant en paroles et en actes.
  '23':
  - type: text
    content: '»Il était âgé de 40 ans lorsqu''il a eu à cœur de rendre visite à ses frères, les Israélites. '
  '24':
  - type: text
    content: 'Il en a vu un qu''on maltraitait, a pris sa défense et, pour venger l''homme malmené, a frappé l''Egyptien. '
  '25':
  - type: text
    content: 'Ses frères comprendraient que Dieu leur accordait la délivrance par son intermédiaire, pensait-il, mais ils ne l''ont pas compris. '
  '26':
  - type: text
    content: 'Le jour suivant, il est venu au milieu d''eux alors que certains se battaient et il a essayé de ramener la paix en leur disant: ‘Vous êtes frères! Pourquoi vous faites-vous du mal l''un à l''autre?’ '
  '27':
  - type: text
    content: 'Mais celui qui maltraitait son prochain l''a repoussé en disant: '
  - type: text
    content: Qui t'a établi chef et juge sur nous?
  - type: text
    content: ' '
  '28':
  - type: text
    content: Veux-tu me tuer comme tu as tué l'Egyptien hier?
  - type: note
    content: 'Qui t''a établi… hier: citation d''Exode 2.14.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: A cette parole, Moïse a pris la fuite et est allé habiter dans le pays de Madian, où il a eu deux fils.
  '3':
  - type: text
    content: Quitte ton pays et ta famille et va dans le pays que je te montrerai
  - type: text
    content: .
  - type: note
    content: 'Quitte… montrerai: citation de Genèse 12.1.'
  - type: text
    content: ' '
  '30':
  - type: text
    content: »C'est 40 ans plus tard qu’
  - type: text
    content: un ange [du Seigneur] lui est apparu dans le désert du mont Sinaï, dans la flamme d'un buisson en feu
  - type: note
    content: 'Un ange… en feu: citation d''Exode 3.2.'
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'Voyant cela, Moïse a été étonné de cette apparition; comme il s''approchait pour regarder, la voix du Seigneur s''est fait entendre: '
  '32':
  - type: text
    content: Je suis le Dieu de tes ancêtres, le Dieu d'Abraham, d'Isaac et de Jacob
  - type: text
    content: .
  - type: note
    content: 'Je suis… Jacob: citation d''Exode 3.6.'
  - type: text
    content: ' Moïse, tout tremblant, n''osait pas regarder. '
  '33':
  - type: text
    content: 'Le Seigneur lui a dit: '
  - type: text
    content: Retire tes sandales, car l'endroit où tu te tiens est une terre sainte.
  - type: text
    content: ' '
  '34':
  - type: text
    content: J'ai vu la souffrance de mon peuple qui est en Egypte, j'ai entendu ses gémissements et je suis descendu pour le délivrer. Maintenant, vas-y, je t'enverrai en Egypte
  - type: text
    content: .
  - type: note
    content: 'Retire… Egypte: citation d''Exode 3.7-8, 10.'
  '35':
  - type: text
    content: '»Ce Moïse qu''ils avaient renié en disant: '
  - type: text
    content: Qui t'a établi chef et juge?
  - type: note
    content: 'Qui t''a établi chef et juge: citation d''Exode 2.14.'
  - type: text
    content: ' c''est lui que Dieu a envoyé comme chef et libérateur avec l''aide de l''ange qui lui était apparu dans le buisson. '
  '36':
  - type: text
    content: 'C''est lui qui les a fait sortir d''Egypte en accomplissant des prodiges et des signes miraculeux en Egypte, à la mer Rouge et au désert pendant 40 ans. '
  '37':
  - type: text
    content: 'C''est ce Moïse qui a dit aux Israélites: '
  - type: text
    content: '[Le Seigneur notre] Dieu fera surgir pour vous, parmi vos frères, un prophète comme moi'
  - type: text
    content: .
  - type: note
    content: 'Le Seigneur… moi: citation de Deutéronome 18.15.'
  - type: text
    content: ' '
  '38':
  - type: text
    content: C'est lui qui, lors de l'assemblée au désert, était avec l'ange qui lui parlait sur le mont Sinaï et avec nos ancêtres; il a reçu des oracles de vie pour nous les transmettre.
  '39':
  - type: text
    content: '»Nos ancêtres n''ont pas voulu lui obéir, mais ils l''ont repoussé et, dans leur cœur, ils se sont tournés vers l''Egypte '
  '4':
  - type: text
    content: 'Il a alors quitté le pays des Chaldéens et est allé habiter à Charan. De là, après la mort de son père, Dieu l''a fait passer dans le pays que vous habitez maintenant. '
  '40':
  - type: text
    content: 'en disant à Aaron: '
  - type: text
    content: Fais-nous des dieux qui marchent devant nous! En effet, ce Moïse qui nous a fait sortir d'Egypte, nous ignorons ce qu'il est devenu
  - type: text
    content: .
  - type: note
    content: 'Fais-nous… devenu: citation d''Exode 32.1.'
  - type: text
    content: ' '
  '41':
  - type: text
    content: 'A ce moment-là, ils ont fait un veau, ils ont offert un sacrifice à l''idole et se sont réjouis de ce que leurs mains avaient fabriqué. '
  '42':
  - type: text
    content: 'Alors Dieu s''est détourné d''eux et les a laissés adorer les corps célestes, comme cela est écrit dans le livre des prophètes: '
  - type: text
    content: M'avez-vous offert des victimes et des sacrifices pendant 40 ans au désert, communauté d'Israël?
  - type: text
    content: ' '
  '43':
  - type: text
    content: Vous avez porté la tente de Moloc et l'étoile de votre dieu Remphan, ces images que vous avez faites pour les adorer! Aussi, je vous déporterai au-delà de Babylone
  - type: text
    content: .
  - type: note
    content: 'M''avez-vous… au-delà de Babylone: citation d''Amos 5.25-27.'
  '44':
  - type: text
    content: '»Dans le désert, nos ancêtres avaient la tente du témoignage; celui qui parlait à Moïse lui avait ordonné de la faire d''après le modèle qu''il avait vu. '
  '45':
  - type: text
    content: 'Nos ancêtres l''ont reçue et l''ont introduite, sous la conduite de Josué, dans le pays conquis sur les nations que Dieu a chassées devant eux; et elle y est restée jusqu''à l''époque de David. '
  '46':
  - type: text
    content: 'David a trouvé grâce devant Dieu et a demandé la permission de trouver une habitation pour le Dieu de Jacob, '
  '47':
  - type: text
    content: 'mais c''est Salomon qui lui a construit un temple. '
  '48':
  - type: text
    content: 'Cependant le Très-Haut n''habite pas dans des temples faits par la main de l''homme, comme le dit le prophète: '
  '49':
  - type: text
    content: Le ciel est mon trône, et la terre mon marchepied. Quelle maison pourrez-vous me construire, dit le Seigneur, ou quel endroit pourra être mon lieu de repos?
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Il ne lui a donné aucun héritage dans ce pays, pas même de quoi poser le pied, mais il a promis de lui en donner la possession, ainsi qu''à sa descendance après lui, alors même qu''il n''avait pas d''enfant. '
  '50':
  - type: text
    content: N'est-ce pas ma main qui a fait tout cela?
  - type: note
    content: 'Le ciel… tout cela: citation d''Esaïe 66.1-2.'
  '51':
  - type: text
    content: '»Hommes réfractaires, incirconcis de cœur et d''oreilles! Vous vous opposez toujours au Saint-Esprit; vous êtes bien comme vos ancêtres. '
  '52':
  - type: text
    content: 'Lequel des prophètes vos ancêtres n''ont-ils pas persécuté? Ils ont tué ceux qui annonçaient d''avance la venue du Juste, et c''est lui que vous avez fait maintenant arrêter et dont vous êtes devenus les meurtriers, '
  '53':
  - type: text
    content: vous qui avez reçu la loi par l'intermédiaire des anges et qui ne l'avez pas gardée!»
  '54':
  - type: text
    content: 'En entendant ces paroles, ils avaient le cœur plein de rage et ils grinçaient des dents contre lui. '
  '55':
  - type: text
    content: 'Mais Etienne, rempli du Saint-Esprit, fixa les regards vers le ciel et vit la gloire de Dieu et Jésus debout à la droite de Dieu. '
  '56':
  - type: text
    content: 'Il dit: «Je vois le ciel ouvert et le Fils de l''homme debout à la droite de Dieu.» '
  '57':
  - type: text
    content: 'Ils poussèrent alors de grands cris en se bouchant les oreilles, se précipitèrent tous ensemble sur lui, '
  '58':
  - type: text
    content: 'le traînèrent à l''extérieur de la ville et se mirent à le lapider. Les témoins avaient déposé leurs vêtements aux pieds d''un jeune homme appelé Saul. '
  '59':
  - type: text
    content: 'Ils jetaient des pierres à Etienne qui priait et disait: «Seigneur Jésus, accueille mon esprit!» '
  '6':
  - type: text
    content: 'Voici ce que Dieu a dit: '
  - type: text
    content: Ses descendants séjourneront dans un pays étranger; on les réduira en esclavage et on les maltraitera pendant 400 ans.
  - type: text
    content: ' '
  '60':
  - type: text
    content: 'Puis il se mit à genoux et s''écria d''une voix forte: «Seigneur, ne les charge pas de ce péché!» Après avoir dit cela, il s''endormit.'
  '7':
  - type: text
    content: Cependant, la nation dont ils seront esclaves, c'est moi-même qui la jugerai,
  - type: text
    content: ' dit Dieu. '
  - type: text
    content: Après cela, ils sortiront et ils me serviront dans ce lieu-ci
  - type: text
    content: .
  - type: note
    content: 'Ses descendants… ce lieu-ci: citation de Genèse 15.13-14, 16.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: Puis Dieu a donné à Abraham l'alliance de la circoncision; ainsi, Abraham a eu pour fils Isaac et l'a circoncis le huitième jour, Isaac a fait de même pour Jacob, et Jacob pour les douze patriarches.
  '9':
  - type: text
    content: '»Les patriarches, jaloux de Joseph, l''ont vendu pour qu''il soit emmené en Egypte, mais Dieu était avec lui '
