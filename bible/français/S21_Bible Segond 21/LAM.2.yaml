document_id: LAM.2,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le jugement de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment! A cause de sa colère, le Seigneur maintient de sombres nuages sur la fille de Sion!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a précipité du ciel sur la terre la fierté d'Israël!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne s'est pas souvenu de son marchepied
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Son marchepied: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: allusion à l'arche de l'alliance et au temple, symboles de la présence de Dieu situés à Jérusalem.
      marker-yv: yv-n
    - type: text
      text: ', le jour de sa colère!'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les anciens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Les anciens: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: personnes jouant un rôle de responsables et de conseillers du peuple.
      marker-yv: yv-n
    - type: text
      text: ' de la fille de Sion sont assis par terre, ils restent silencieux;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont couvert leur tête de poussière, ils se sont habillés de sacs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Couvert… sacs: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: signes d'humiliation et de deuil.
      marker-yv: yv-n
    - type: text
      text: .
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les jeunes filles de Jérusalem baissent la tête vers la terre.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes yeux s'épuisent dans les larmes, je suis profondément tourmenté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ma bile se déverse par terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause du désastre qui frappe la fille de mon peuple.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des enfants et des nourrissons tombaient en défaillance sur les places de la ville.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils disaient à leur mère:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Où y a-t-il du blé et du vin?»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis qu'ils tombaient en défaillance comme des blessés dans les rues de la ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'ils rendaient l'âme sur la poitrine de leur mère.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que dois-je te dire? A quoi te comparer, fille de Jérusalem?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quel exemple te donner pour te consoler,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vierge, fille de Sion?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, ton désastre est aussi grand que la mer. Qui pourra te guérir?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes prophètes ont eu pour toi des visions sans valeur ni saveur;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils n'ont pas dévoilé ta faute
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin de changer ton sort.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils t'ont communiqué des messages mensongers et trompeurs.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les passants applaudissent en te voyant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils sifflent, ils secouent leur tête au sujet de la fille de Jérusalem:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Est-ce bien la ville que l'on présentait comme une beauté parfaite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la joie de toute la terre?»
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous tes ennemis ouvrent la bouche contre toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sifflent, ils grincent des dents.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils disent: «Nous l''avons engloutie!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est bien le jour que nous attendions. Nous l'avons atteint, nous le voyons!»
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel a mis en œuvre ce qu'il avait décidé.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a accompli sa parole, celle qu'il avait depuis longtemps ordonnée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a démoli sans pitié,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a fait de toi la joie de l'ennemi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a relevé la force de tes adversaires.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le cœur des vaincus crie vers le Seigneur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Muraille de la fille de Sion, laisse couler tes larmes jour et nuit, comme un torrent!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne te donne aucun répit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que ton œil n'ait pas de repos!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lève-toi, crie ta détresse dans la nuit, au début de tes insomnies!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Déverse ton cœur comme de l'eau devant le Seigneur!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lève tes mains vers lui pour la vie de tes enfants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui meurent de faim à tous les coins de rue!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Seigneur a englouti sans pitié tous les domaines de Jacob.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans sa fureur, il a démoli les forteresses de la fille de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il les a précipitées par terre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a profané le royaume et ses chefs.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Vois, Eternel! Regarde qui tu as traité de cette manière!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fallait-il que des femmes dévorent ceux qu'elles ont mis au monde,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les petits enfants dont elles ont pris soin avec tendresse?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fallait-il que prêtres et prophètes soient massacrés dans le sanctuaire du Seigneur?
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les enfants et les vieillards sont couchés par terre dans les rues,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mes jeunes filles et mes jeunes hommes sont tombés sous les coups d'épée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu les as tués, le jour de ta colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu les as massacrés sans pitié.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu convoques comme pour un jour de fête ceux qui me terrorisent de tous côtés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le jour de la colère de l'Eternel, il n'y a eu ni rescapé ni survivant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux dont j'avais pris soin avec tendresse et que j'avais élevés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon ennemi les a exterminés.»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans son ardente colère, il a abattu toute la force d'Israël.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a retiré sa main droite en présence de l'ennemi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a allumé en Jacob comme un feu dont les flammes dévorent tout ce qui l'entoure.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a tendu son arc comme un ennemi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa main droite s'est dressée comme celle d'un assaillant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a fait disparaître tout ce qui plaisait aux regards,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a déversé sa fureur comme un feu sur la tente de la fille de Sion.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le Seigneur a été comme un ennemi:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a englouti Israël, il a englouti tous ses palais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a détruit ses forteresses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a rempli la fille de Juda de plaintes et de gémissements.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est passé en force, comme on force la clôture d'un jardin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a détruit son lieu de rencontre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel a fait oublier dans Sion les fêtes et les sabbats
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, dans sa violente colère, il a rejeté le roi et le prêtre.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Seigneur a repoussé son autel, détesté son sanctuaire.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a livré entre les mains de l'ennemi les murs des palais de Sion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des cris ont retenti dans la maison de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme un jour de fête.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel avait projeté de détruire les murs de la fille de Sion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a étendu le ruban à mesurer, il n'a pas retiré sa main pour l'empêcher de tout engloutir.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il a plongé dans le deuil remparts et murailles:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ensemble ils dépérissent.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses portes se sont enfoncées dans la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a démoli et brisé ses verrous.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son roi et ses chefs sont dispersés parmi les nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n'y a plus de loi. Même ses prophètes ne reçoivent plus aucune vision de l'Eternel.
