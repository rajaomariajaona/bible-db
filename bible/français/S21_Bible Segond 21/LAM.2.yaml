document_id: LAM.2,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le jugement de Jérusalem
  - type: text
    content: Comment! A cause de sa colère, le Seigneur maintient de sombres nuages sur la fille de Sion!
  - type: text
    content: Il a précipité du ciel sur la terre la fierté d'Israël!
  - type: text
    content: Il ne s'est pas souvenu de son marchepied
  - type: note
    content: 'Son marchepied: allusion à l''arche de l''alliance et au temple, symboles de la présence de Dieu situés à Jérusalem.'
  - type: text
    content: ', le jour de sa colère!'
  '10':
  - type: text
    content: Les anciens
  - type: note
    content: 'Les anciens: personnes jouant un rôle de responsables et de conseillers du peuple.'
  - type: text
    content: ' de la fille de Sion sont assis par terre, ils restent silencieux;'
  - type: text
    content: ils ont couvert leur tête de poussière, ils se sont habillés de sacs
  - type: note
    content: 'Couvert… sacs: signes d''humiliation et de deuil.'
  - type: text
    content: .
  - type: text
    content: Les jeunes filles de Jérusalem baissent la tête vers la terre.
  '11':
  - type: text
    content: Mes yeux s'épuisent dans les larmes, je suis profondément tourmenté,
  - type: text
    content: ma bile se déverse par terre
  - type: text
    content: à cause du désastre qui frappe la fille de mon peuple.
  - type: text
    content: Des enfants et des nourrissons tombaient en défaillance sur les places de la ville.
  '12':
  - type: text
    content: 'Ils disaient à leur mère:'
  - type: text
    content: «Où y a-t-il du blé et du vin?»
  - type: text
    content: tandis qu'ils tombaient en défaillance comme des blessés dans les rues de la ville,
  - type: text
    content: qu'ils rendaient l'âme sur la poitrine de leur mère.
  '13':
  - type: text
    content: Que dois-je te dire? A quoi te comparer, fille de Jérusalem?
  - type: text
    content: Quel exemple te donner pour te consoler,
  - type: text
    content: vierge, fille de Sion?
  - type: text
    content: En effet, ton désastre est aussi grand que la mer. Qui pourra te guérir?
  '14':
  - type: text
    content: Tes prophètes ont eu pour toi des visions sans valeur ni saveur;
  - type: text
    content: ils n'ont pas dévoilé ta faute
  - type: text
    content: afin de changer ton sort.
  - type: text
    content: Ils t'ont communiqué des messages mensongers et trompeurs.
  '15':
  - type: text
    content: Tous les passants applaudissent en te voyant.
  - type: text
    content: 'Ils sifflent, ils secouent leur tête au sujet de la fille de Jérusalem:'
  - type: text
    content: «Est-ce bien la ville que l'on présentait comme une beauté parfaite,
  - type: text
    content: la joie de toute la terre?»
  '16':
  - type: text
    content: Tous tes ennemis ouvrent la bouche contre toi,
  - type: text
    content: ils sifflent, ils grincent des dents.
  - type: text
    content: 'Ils disent: «Nous l''avons engloutie!'
  - type: text
    content: C'est bien le jour que nous attendions. Nous l'avons atteint, nous le voyons!»
  '17':
  - type: text
    content: L'Eternel a mis en œuvre ce qu'il avait décidé.
  - type: text
    content: Il a accompli sa parole, celle qu'il avait depuis longtemps ordonnée.
  - type: text
    content: Il a démoli sans pitié,
  - type: text
    content: il a fait de toi la joie de l'ennemi,
  - type: text
    content: il a relevé la force de tes adversaires.
  '18':
  - type: text
    content: Le cœur des vaincus crie vers le Seigneur.
  - type: text
    content: Muraille de la fille de Sion, laisse couler tes larmes jour et nuit, comme un torrent!
  - type: text
    content: Ne te donne aucun répit
  - type: text
    content: et que ton œil n'ait pas de repos!
  '19':
  - type: text
    content: Lève-toi, crie ta détresse dans la nuit, au début de tes insomnies!
  - type: text
    content: Déverse ton cœur comme de l'eau devant le Seigneur!
  - type: text
    content: Lève tes mains vers lui pour la vie de tes enfants
  - type: text
    content: qui meurent de faim à tous les coins de rue!
  '2':
  - type: text
    content: Le Seigneur a englouti sans pitié tous les domaines de Jacob.
  - type: text
    content: Dans sa fureur, il a démoli les forteresses de la fille de Juda,
  - type: text
    content: il les a précipitées par terre.
  - type: text
    content: Il a profané le royaume et ses chefs.
  '20':
  - type: text
    content: «Vois, Eternel! Regarde qui tu as traité de cette manière!
  - type: text
    content: Fallait-il que des femmes dévorent ceux qu'elles ont mis au monde,
  - type: text
    content: les petits enfants dont elles ont pris soin avec tendresse?
  - type: text
    content: Fallait-il que prêtres et prophètes soient massacrés dans le sanctuaire du Seigneur?
  '21':
  - type: text
    content: Les enfants et les vieillards sont couchés par terre dans les rues,
  - type: text
    content: mes jeunes filles et mes jeunes hommes sont tombés sous les coups d'épée.
  - type: text
    content: Tu les as tués, le jour de ta colère,
  - type: text
    content: tu les as massacrés sans pitié.
  '22':
  - type: text
    content: Tu convoques comme pour un jour de fête ceux qui me terrorisent de tous côtés.
  - type: text
    content: Le jour de la colère de l'Eternel, il n'y a eu ni rescapé ni survivant.
  - type: text
    content: Ceux dont j'avais pris soin avec tendresse et que j'avais élevés,
  - type: text
    content: mon ennemi les a exterminés.»
  '3':
  - type: text
    content: Dans son ardente colère, il a abattu toute la force d'Israël.
  - type: text
    content: Il a retiré sa main droite en présence de l'ennemi.
  - type: text
    content: Il a allumé en Jacob comme un feu dont les flammes dévorent tout ce qui l'entoure.
  '4':
  - type: text
    content: Il a tendu son arc comme un ennemi,
  - type: text
    content: sa main droite s'est dressée comme celle d'un assaillant.
  - type: text
    content: Il a fait disparaître tout ce qui plaisait aux regards,
  - type: text
    content: il a déversé sa fureur comme un feu sur la tente de la fille de Sion.
  '5':
  - type: text
    content: 'Le Seigneur a été comme un ennemi:'
  - type: text
    content: il a englouti Israël, il a englouti tous ses palais,
  - type: text
    content: il a détruit ses forteresses.
  - type: text
    content: Il a rempli la fille de Juda de plaintes et de gémissements.
  '6':
  - type: text
    content: Il est passé en force, comme on force la clôture d'un jardin,
  - type: text
    content: il a détruit son lieu de rencontre.
  - type: text
    content: L'Eternel a fait oublier dans Sion les fêtes et les sabbats
  - type: text
    content: et, dans sa violente colère, il a rejeté le roi et le prêtre.
  '7':
  - type: text
    content: Le Seigneur a repoussé son autel, détesté son sanctuaire.
  - type: text
    content: Il a livré entre les mains de l'ennemi les murs des palais de Sion.
  - type: text
    content: Des cris ont retenti dans la maison de l'Eternel,
  - type: text
    content: comme un jour de fête.
  '8':
  - type: text
    content: L'Eternel avait projeté de détruire les murs de la fille de Sion.
  - type: text
    content: Il a étendu le ruban à mesurer, il n'a pas retiré sa main pour l'empêcher de tout engloutir.
  - type: text
    content: 'Il a plongé dans le deuil remparts et murailles:'
  - type: text
    content: ensemble ils dépérissent.
  '9':
  - type: text
    content: Ses portes se sont enfoncées dans la terre,
  - type: text
    content: il a démoli et brisé ses verrous.
  - type: text
    content: Son roi et ses chefs sont dispersés parmi les nations.
  - type: text
    content: Il n'y a plus de loi. Même ses prophètes ne reçoivent plus aucune vision de l'Eternel.
