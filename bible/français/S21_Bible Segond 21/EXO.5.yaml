document_id: EXO.5,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Opposition du pharaon
  - type: text
    content: 'Moïse et Aaron allèrent ensuite annoncer au pharaon: «Voici ce que dit l''Eternel, le Dieu d''Israël: Laisse partir mon peuple pour qu''il célèbre une fête en mon honneur dans le désert.» '
  '10':
  - type: text
    content: 'Les inspecteurs et les commissaires du peuple vinrent annoncer au peuple: «Voici ce que dit le pharaon: ‘Je ne vous donne plus de paille. '
  '11':
  - type: text
    content: 'Allez vous-mêmes vous procurer de la paille où vous en trouverez, car l''on ne supprime rien de votre travail.’» '
  '12':
  - type: text
    content: 'Le peuple se dispersa dans toute l''Egypte pour ramasser du chaume en guise de paille. '
  '13':
  - type: text
    content: 'Les inspecteurs insistaient: «Terminez votre tâche, chaque jour la tâche journalière, comme quand il y avait de la paille.» '
  '14':
  - type: text
    content: On battit même les commissaires des Israélites, établis sur eux par les inspecteurs du pharaon. «Pourquoi, disait-on, n'avez-vous pas fini hier et aujourd'hui, comme avant, la quantité de briques qui vous avait été fixée?»
  '15':
  - type: text
    content: 'Les commissaires des Israélites allèrent se plaindre au pharaon en disant: «Pourquoi traites-tu ainsi tes serviteurs? '
  '16':
  - type: text
    content: 'On ne donne pas de paille à tes serviteurs et l''on nous dit: ‘Faites des briques!’ Et voici que tes serviteurs sont battus comme si ton peuple était coupable.» '
  '17':
  - type: text
    content: 'Le pharaon répondit: «Vous êtes des paresseux, rien que des paresseux. Voilà pourquoi vous dites: ‘Allons offrir des sacrifices à l''Eternel!’ '
  '18':
  - type: text
    content: Maintenant, allez travailler. On ne vous donnera pas de paille et vous livrerez la même quantité de briques.»
  '19':
  - type: text
    content: 'Les commissaires des Israélites virent qu''on les rendait malheureux en disant: «Vous ne supprimerez rien de vos briques, mais accomplissez chaque jour la tâche journalière.» '
  '2':
  - type: text
    content: 'Le pharaon répondit: «Qui est l''Eternel, pour que j''obéisse à ses ordres en laissant partir Israël? Je ne connais pas l''Eternel et je ne laisserai pas partir Israël.» '
  '20':
  - type: text
    content: 'En sortant de chez le pharaon, ils rencontrèrent Moïse et Aaron qui les attendaient. '
  '21':
  - type: text
    content: 'Ils leur dirent: «Que l''Eternel vous regarde et qu''il soit juge! A cause de vous, le pharaon et ses serviteurs n''éprouvent que dégoût pour nous, vous avez mis une épée dans leurs mains pour nous massacrer.»'
  '22':
  - type: text
    content: 'Moïse retourna vers l''Eternel et dit: «Seigneur, pourquoi as-tu fait du mal à ce peuple? Est-ce pour cela que tu m''as envoyé? '
  '23':
  - type: text
    content: Depuis que je suis allé trouver le pharaon pour parler en ton nom, il fait du mal à ce peuple et tu n'as pas du tout délivré ton peuple.»
  '3':
  - type: text
    content: 'Ils dirent: «Le Dieu des Hébreux s''est présenté à nous. Permets-nous de faire trois journées de marche dans le désert pour offrir des sacrifices à l''Eternel, notre Dieu, afin qu''il ne nous frappe pas de la peste ou de l''épée.» '
  '4':
  - type: text
    content: 'Le roi d''Egypte leur dit: «Moïse et Aaron, pourquoi détournez-vous le peuple de son travail? Retournez à vos corvées!» '
  '5':
  - type: text
    content: 'Le pharaon ajouta: «Ce peuple est maintenant nombreux dans le pays, et vous lui feriez interrompre ses corvées!»'
  '6':
  - type: text
    content: 'Le jour même, le pharaon donna aux inspecteurs et aux commissaires du peuple l''ordre suivant: '
  '7':
  - type: text
    content: '«Vous ne donnerez plus comme avant de la paille au peuple pour faire des briques. Ils iront eux-mêmes ramasser de la paille. '
  '8':
  - type: text
    content: 'Vous leur imposerez néanmoins la quantité de briques qu''ils faisaient auparavant, vous n''en supprimerez rien. En effet, ce sont des paresseux. Voilà pourquoi ils crient: ‘Allons offrir des sacrifices à notre Dieu!’ '
  '9':
  - type: text
    content: Que l'on charge ces gens de travail, qu'ils y soient occupés, et ils ne prêteront plus attention à des paroles mensongères!»
