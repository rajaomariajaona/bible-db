document_id: EXO.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Opposition du pharaon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moïse et Aaron allèrent ensuite annoncer au pharaon: «Voici ce que dit l''Eternel, le Dieu d''Israël: Laisse partir mon peuple pour qu''il célèbre une fête en mon honneur dans le désert.» '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le pharaon répondit: «Qui est l''Eternel, pour que j''obéisse à ses ordres en laissant partir Israël? Je ne connais pas l''Eternel et je ne laisserai pas partir Israël.» '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils dirent: «Le Dieu des Hébreux s''est présenté à nous. Permets-nous de faire trois journées de marche dans le désert pour offrir des sacrifices à l''Eternel, notre Dieu, afin qu''il ne nous frappe pas de la peste ou de l''épée.» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le roi d''Egypte leur dit: «Moïse et Aaron, pourquoi détournez-vous le peuple de son travail? Retournez à vos corvées!» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le pharaon ajouta: «Ce peuple est maintenant nombreux dans le pays, et vous lui feriez interrompre ses corvées!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le jour même, le pharaon donna aux inspecteurs et aux commissaires du peuple l''ordre suivant: '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '«Vous ne donnerez plus comme avant de la paille au peuple pour faire des briques. Ils iront eux-mêmes ramasser de la paille. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Vous leur imposerez néanmoins la quantité de briques qu''ils faisaient auparavant, vous n''en supprimerez rien. En effet, ce sont des paresseux. Voilà pourquoi ils crient: ‘Allons offrir des sacrifices à notre Dieu!’ '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Que l'on charge ces gens de travail, qu'ils y soient occupés, et ils ne prêteront plus attention à des paroles mensongères!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les inspecteurs et les commissaires du peuple vinrent annoncer au peuple: «Voici ce que dit le pharaon: ‘Je ne vous donne plus de paille. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Allez vous-mêmes vous procurer de la paille où vous en trouverez, car l''on ne supprime rien de votre travail.’» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le peuple se dispersa dans toute l''Egypte pour ramasser du chaume en guise de paille. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Les inspecteurs insistaient: «Terminez votre tâche, chaque jour la tâche journalière, comme quand il y avait de la paille.» '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: On battit même les commissaires des Israélites, établis sur eux par les inspecteurs du pharaon. «Pourquoi, disait-on, n'avez-vous pas fini hier et aujourd'hui, comme avant, la quantité de briques qui vous avait été fixée?»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les commissaires des Israélites allèrent se plaindre au pharaon en disant: «Pourquoi traites-tu ainsi tes serviteurs? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'On ne donne pas de paille à tes serviteurs et l''on nous dit: ‘Faites des briques!’ Et voici que tes serviteurs sont battus comme si ton peuple était coupable.» '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le pharaon répondit: «Vous êtes des paresseux, rien que des paresseux. Voilà pourquoi vous dites: ‘Allons offrir des sacrifices à l''Eternel!’ '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Maintenant, allez travailler. On ne vous donnera pas de paille et vous livrerez la même quantité de briques.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les commissaires des Israélites virent qu''on les rendait malheureux en disant: «Vous ne supprimerez rien de vos briques, mais accomplissez chaque jour la tâche journalière.» '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'En sortant de chez le pharaon, ils rencontrèrent Moïse et Aaron qui les attendaient. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ils leur dirent: «Que l''Eternel vous regarde et qu''il soit juge! A cause de vous, le pharaon et ses serviteurs n''éprouvent que dégoût pour nous, vous avez mis une épée dans leurs mains pour nous massacrer.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Moïse retourna vers l''Eternel et dit: «Seigneur, pourquoi as-tu fait du mal à ce peuple? Est-ce pour cela que tu m''as envoyé? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Depuis que je suis allé trouver le pharaon pour parler en ton nom, il fait du mal à ce peuple et tu n'as pas du tout délivré ton peuple.»
