document_id: JOS.22
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Retour de Ruben, Gad et Manassé chez eux
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors Josué appela les Rubénites, les Gadites et la demi-tribu de Manassé. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il leur dit: «Vous avez respecté tout ce que vous a prescrit Moïse, le serviteur de l''Eternel, et vous m''avez obéi dans tout ce que je vous ai ordonné. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Vous n''avez pas abandonné vos frères, et ce sur une très longue période jusqu''à aujourd''hui, et vous avez gardé les ordres, les commandements de l''Eternel, votre Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Maintenant que l''Eternel, votre Dieu, a accordé du repos à vos frères, conformément à ce qu''il leur avait dit, retournez chez vous, rentrez dans vos tentes, dans le pays qui vous appartient et que Moïse, le serviteur de l''Eternel, vous a donné de l''autre côté du Jourdain. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Veillez seulement à respecter et mettre en pratique le commandement et la loi que vous a prescrits Moïse, le serviteur de l''Eternel. Aimez l''Eternel, votre Dieu, marchez dans toutes ses voies, gardez ses commandements, attachez-vous à lui et servez-le de tout votre cœur et de toute votre âme.» '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Puis Josué les bénit et les renvoya chez eux, et ils rentrèrent dans leurs tentes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Moïse avait donné un héritage en Basan à une moitié de la tribu de Manassé, et Josué donna à l''autre moitié un héritage auprès de ses frères de ce côté-ci du Jourdain, à l''ouest. Lorsque Josué les renvoya vers leurs tentes, il les bénit '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'et leur dit: «Vous retournerez à vos tentes avec de grandes richesses, avec des troupeaux très nombreux et une quantité considérable d''argent, d''or, de bronze, de fer et de vêtements. Partagez avec vos frères le butin de vos ennemis.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Après avoir quitté les Israélites à Silo, dans le pays de Canaan, les Rubénites, les Gadites et la demi-tribu de Manassé repartirent pour aller dans le pays de Galaad. C'était leur propriété et ils s'y étaient installés conformément à l'ordre que l'Eternel avait donné par l'intermédiaire de Moïse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Arrivés dans les districts du Jourdain qui appartiennent encore au pays de Canaan, les Rubénites, les Gadites et la demi-tribu de Manassé y construisirent un autel au bord du Jourdain. C''était un autel dont la grandeur frappait les regards. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les Israélites apprirent que l''on disait: «Les Rubénites, les Gadites et la demi-tribu de Manassé ont construit un autel qui fait face au pays de Canaan, dans les districts du Jourdain, du côté des Israélites.» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: A cette nouvelle, toute l'assemblée des Israélites se réunit à Silo pour monter les attaquer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Les Israélites envoyèrent une délégation aux Rubénites, aux Gadites et à la demi-tribu de Manassé, dans le pays de Galaad. Il s''agissait de Phinées, le fils du prêtre Eléazar, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'et de dix princes qui l''accompagnaient, un par famille pour chacune des tribus d''Israël. Tous étaient des chefs de famille parmi les milliers d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils allèrent trouver les Rubénites, les Gadites et la demi-tribu de Manassé dans le pays de Galaad et s''adressèrent à eux: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '«Voici ce que dit toute l''assemblée de l''Eternel: ‘Que signifie cet acte d''infidélité que vous avez commis envers le Dieu d''Israël? Vous vous détournez maintenant de l''Eternel; en vous construisant un autel, vous vous révoltez aujourd''hui contre lui.’ '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Considérons-nous comme sans importance le crime de Peor? Nous n''en sommes pas encore purifiés, malgré le fléau qu''il a attiré sur l''assemblée de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et vous vous détournez aujourd''hui de l''Eternel! Si vous vous révoltez aujourd''hui contre lui, demain il s''irritera contre toute l''assemblée d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Si vous considérez comme impur le pays qui est votre propriété, passez dans le pays qui est la propriété de l''Eternel et où il a sa résidence, et installez-vous au milieu de nous, mais ne vous révoltez pas contre l''Eternel et ne vous séparez pas de nous en vous construisant un autel en plus de celui de l''Eternel, notre Dieu! '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Lorsque Acan, fils de Zérach, a commis un acte d'infidélité au sujet des biens voués à la destruction, la colère de l'Eternel ne s'est-elle pas enflammée contre toute l'assemblée d'Israël? Acan n'a pas été le seul à mourir à cause de son crime.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les Rubénites, les Gadites et la demi-tribu de Manassé firent cette réponse aux chefs des milliers d''Israël: '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '«Le Dieu des dieux, c''est l''Eternel, oui, c''est le Dieu des dieux, l''Eternel, qui le sait et Israël le saura bien aussi! Si c''est par révolte et par infidélité envers l''Eternel que nous avons agi, ne viens pas à notre aide aujourd''hui! '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Si nous nous sommes construit un autel pour nous détourner de l''Eternel, si c''est pour y présenter des holocaustes et des offrandes et si c''est pour y faire des sacrifices de communion, que l''Eternel lui-même nous en demande compte! '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Non, c''est plutôt par inquiétude que nous avons fait cela. Nous avons pensé que vos descendants diraient un jour aux nôtres: ‘Qu''avez-vous à faire avec l''Eternel, le Dieu d''Israël? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'L''Eternel a établi le Jourdain comme une frontière entre nous et vous, descendants de Ruben et de Gad. Vous n''avez aucun droit de servir l''Eternel!’ A cause de vos descendants, les nôtres cesseraient alors de craindre l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Voilà pourquoi nous nous sommes dit: ‘Construisons-nous donc un autel, non pour y offrir des holocaustes et pour des sacrifices, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'mais comme un témoin.’ Il témoignera entre nous et vous, entre nos descendants et les vôtres, que nous voulons servir l''Eternel devant lui par nos holocaustes et par nos sacrifices d''expiation et de communion. Ainsi vos descendants ne pourront pas dire un jour aux nôtres: ‘Vous n''avez aucun droit de servir l''Eternel!’ '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nous nous sommes dit: ‘Si dans l''avenir ils nous tiennent ce langage, à nous ou à nos descendants, nous répondrons: Voyez la réplique de l''autel de l''Eternel qu''ont faite nos ancêtres, non pour des holocaustes et pour des sacrifices, mais comme témoin entre nous et vous.’ '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Nous ne voulons certes pas nous révolter contre l'Eternel et nous détourner aujourd'hui de lui en construisant un autel destiné à des holocaustes, des offrandes et des sacrifices en plus de celui de l'Eternel, notre Dieu, qui est devant sa demeure!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Lorsque le prêtre Phinées et les princes de l''assemblée, les chefs des milliers d''Israël qui l''accompagnaient, eurent entendu les paroles que prononcèrent les Rubénites, les Gadites et les Manassites, ils furent satisfaits. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Phinées, fils du prêtre Eléazar, leur dit alors: «Nous savons maintenant que l''Eternel est au milieu de nous, puisque vous n''avez pas commis cet acte d''infidélité contre lui. Vous avez ainsi délivré les Israélites d''une intervention de l''Eternel.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Phinées, fils du prêtre Eléazar, et les princes quittèrent les Rubénites et les Gadites. Ils revinrent du pays de Galaad dans le pays de Canaan, vers les Israélites, et leur firent un rapport. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Les Israélites furent satisfaits. Ils bénirent Dieu et ne parlèrent plus de monter les attaquer et de dévaster la région qu'habitaient les Rubénites et les Gadites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Les Rubénites et les Gadites appelèrent l'autel Ed
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.34 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ed: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: littéralement témoin.
    marker-yv: yv-n
  - type: text
    text: ', «car, dirent-ils, il est témoin entre nous que c''est l''Eternel qui est Dieu.»'
