document_id: PSA.40,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Louange à Dieu pour son intervention
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au chef de chœur. Psaume de David.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: J'annonce la justice dans la grande assemblée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne ferme pas mes lèvres, Eternel, tu le sais.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Je ne dissimule pas ta justice dans mon cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je proclame ta vérité et ton salut;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne cache pas ta bonté et ta fidélité
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans la grande assemblée.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Toi, Eternel, tu ne me refuseras pas tes compassions;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ta bonté et ta fidélité me garderont toujours.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Oui, des maux sans nombre m''environnent:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je subis les conséquences de mes fautes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je n'en supporte pas la vue;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles sont plus nombreuses que les cheveux de ma tête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mon courage m'abandonne.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Veuille me délivrer, Eternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, viens vite à mon secours!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Que tous ensemble ils soient honteux et rougissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui cherchent à m'enlever la vie!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'ils reculent et rougissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui désirent ma perte!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Qu'ils soient pétrifiés de honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ceux qui me disent: «Ha! ha!»'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Que tous ceux qui te cherchent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: soient dans l'allégresse et se réjouissent en toi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ceux qui aiment ton salut
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'disent sans cesse: «Que l''Eternel est grand!»'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Moi, je suis pauvre et malheureux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le Seigneur pense à moi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es mon aide et mon libérateur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon Dieu, ne tarde pas!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: J'avais mis mon espérance en l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il s'est penché vers moi, il a écouté mes cris.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Il m'a retiré de la fosse de destruction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du fond de la boue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il a établi mes pieds sur le rocher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a affermi mes pas.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Il a mis dans ma bouche un cantique nouveau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une louange à notre Dieu. Beaucoup
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'ont vu; ils ont eu de la crainte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et se sont confiés en l'Eternel.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Heureux l'homme qui place sa confiance en l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui ne se tourne pas vers les orgueilleux et les menteurs!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Eternel, mon Dieu, tu as multiplié
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tes merveilles et tes plans en notre faveur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Personne n'est comparable à toi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je voudrais les raconter et les proclamer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais leur nombre est trop grand pour en faire le compte.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '*Tu ne désires ni sacrifice ni offrande,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais tu m'as ouvert les oreilles;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu ne demandes ni holocauste ni sacrifice pour le péché,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'alors j''ai dit: «Me voici, je viens'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – dans le rouleau du livre il est écrit à mon sujet –
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: pour faire ta volonté, mon Dieu.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.7-9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu ne désires… mon Dieu: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hébreux 10.5-9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' à propos de l''entrée de Christ dans le monde.'
      marker-yv: yv-n
    - type: text
      text: ' C''est ce que je désire,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ta loi est gravée au fond de mon cœur.»
