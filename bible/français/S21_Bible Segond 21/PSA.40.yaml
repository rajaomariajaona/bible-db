document_id: PSA.40,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Louange à Dieu pour son intervention
  - type: text
    content: Au chef de chœur. Psaume de David.
  '10':
  - type: text
    content: J'annonce la justice dans la grande assemblée,
  - type: text
    content: je ne ferme pas mes lèvres, Eternel, tu le sais.
  '11':
  - type: text
    content: Je ne dissimule pas ta justice dans mon cœur,
  - type: text
    content: je proclame ta vérité et ton salut;
  - type: text
    content: je ne cache pas ta bonté et ta fidélité
  - type: text
    content: dans la grande assemblée.
  '12':
  - type: text
    content: Toi, Eternel, tu ne me refuseras pas tes compassions;
  - type: text
    content: ta bonté et ta fidélité me garderont toujours.
  '13':
  - type: text
    content: 'Oui, des maux sans nombre m''environnent:'
  - type: text
    content: je subis les conséquences de mes fautes,
  - type: text
    content: et je n'en supporte pas la vue;
  - type: text
    content: elles sont plus nombreuses que les cheveux de ma tête,
  - type: text
    content: et mon courage m'abandonne.
  '14':
  - type: text
    content: Veuille me délivrer, Eternel!
  - type: text
    content: Eternel, viens vite à mon secours!
  '15':
  - type: text
    content: Que tous ensemble ils soient honteux et rougissent,
  - type: text
    content: ceux qui cherchent à m'enlever la vie!
  - type: text
    content: Qu'ils reculent et rougissent,
  - type: text
    content: ceux qui désirent ma perte!
  '16':
  - type: text
    content: Qu'ils soient pétrifiés de honte,
  - type: text
    content: 'ceux qui me disent: «Ha! ha!»'
  '17':
  - type: text
    content: Que tous ceux qui te cherchent
  - type: text
    content: soient dans l'allégresse et se réjouissent en toi!
  - type: text
    content: Que ceux qui aiment ton salut
  - type: text
    content: 'disent sans cesse: «Que l''Eternel est grand!»'
  '18':
  - type: text
    content: Moi, je suis pauvre et malheureux,
  - type: text
    content: mais le Seigneur pense à moi.
  - type: text
    content: Tu es mon aide et mon libérateur,
  - type: text
    content: mon Dieu, ne tarde pas!
  '2':
  - type: text
    content: J'avais mis mon espérance en l'Eternel,
  - type: text
    content: et il s'est penché vers moi, il a écouté mes cris.
  '3':
  - type: text
    content: Il m'a retiré de la fosse de destruction,
  - type: text
    content: du fond de la boue,
  - type: text
    content: et il a établi mes pieds sur le rocher,
  - type: text
    content: il a affermi mes pas.
  '4':
  - type: text
    content: Il a mis dans ma bouche un cantique nouveau,
  - type: text
    content: une louange à notre Dieu. Beaucoup
  - type: text
    content: l'ont vu; ils ont eu de la crainte
  - type: text
    content: et se sont confiés en l'Eternel.
  '5':
  - type: text
    content: Heureux l'homme qui place sa confiance en l'Eternel
  - type: text
    content: et qui ne se tourne pas vers les orgueilleux et les menteurs!
  '6':
  - type: text
    content: Eternel, mon Dieu, tu as multiplié
  - type: text
    content: tes merveilles et tes plans en notre faveur.
  - type: text
    content: Personne n'est comparable à toi.
  - type: text
    content: Je voudrais les raconter et les proclamer,
  - type: text
    content: mais leur nombre est trop grand pour en faire le compte.
  '7':
  - type: text
    content: '*Tu ne désires ni sacrifice ni offrande,'
  - type: text
    content: mais tu m'as ouvert les oreilles;
  - type: text
    content: tu ne demandes ni holocauste ni sacrifice pour le péché,
  '8':
  - type: text
    content: 'alors j''ai dit: «Me voici, je viens'
  - type: text
    content: – dans le rouleau du livre il est écrit à mon sujet –
  '9':
  - type: text
    content: pour faire ta volonté, mon Dieu.
  - type: note
    content: 'Tu ne désires… mon Dieu: cité en Hébreux 10.5-9 à propos de l''entrée de Christ dans le monde.'
  - type: text
    content: ' C''est ce que je désire,'
  - type: text
    content: et ta loi est gravée au fond de mon cœur.»
