document_id: GEN.44
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mise à l'épreuve des frères de Joseph
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Joseph ordonna à son intendant: «Remplis de nourriture les sacs de ces hommes. Mets-en autant qu''ils pourront en porter et mets l''argent de chacun à l''entrée de son sac. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tu mettras aussi ma coupe, la coupe en argent, à l'entrée du sac du plus jeune, avec l'argent de son blé.» L'intendant se conforma aux ordres de Joseph.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le matin, dès qu''il fit jour, on renvoya ces hommes avec leurs ânes. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils étaient sortis de la ville et n''en étaient pas très loin lorsque Joseph dit à son intendant: «Pars à la poursuite de ces hommes. Quand tu les auras rattrapés, dis-leur: ‘Pourquoi avez-vous rendu le mal pour le bien? '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'N''avez-vous pas la coupe dans laquelle boit mon seigneur et dont il se sert pour deviner l''avenir? Ce que vous avez fait est mal.’» '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L''intendant les rattrapa et leur répéta ces paroles. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils lui répondirent: «Pourquoi notre seigneur parle-t-il de cette façon? Tes serviteurs n''oseraient pas commettre un tel acte! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Nous t''avons rapporté depuis le pays de Canaan l''argent que nous avions trouvé à l''entrée de nos sacs. Comment aurions-nous pu voler de l''argent ou de l''or dans la maison de ton seigneur? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Que celui de tes serviteurs sur qui on trouvera la coupe meure et que nous soyons nous-mêmes esclaves de notre seigneur!» '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il dit: «Qu''on fasse donc comme vous avez dit! Celui sur qui on trouvera la coupe sera mon esclave et vous, vous serez innocents.» '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Aussitôt, chacun descendit son sac à terre et l''ouvrit. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: L'intendant les fouilla, en commençant par le plus âgé et en finissant par le plus jeune. La coupe fut trouvée dans le sac de Benjamin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils déchirèrent leurs vêtements. Chacun rechargea son âne et ils retournèrent à la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Juda et ses frères arrivèrent à la maison de Joseph, où il était encore, et ils se prosternèrent jusqu''à terre devant lui. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Joseph leur dit: «Qu''avez-vous fait? Ne savez-vous pas qu''un homme comme moi a le pouvoir de deviner l''avenir?» '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Juda répondit: «Que pouvons-nous te dire, seigneur? Comment parler? Comment nous défendre? Dieu a découvert la faute de tes serviteurs. Nous voici tes esclaves, seigneur, nous et celui sur qui on a trouvé la coupe.» '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Joseph dit: «Que Dieu me garde de faire cela! C''est l''homme sur qui on a trouvé la coupe qui sera mon esclave. Quant à vous, remontez en toute tranquillité vers votre père.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors Juda s''approcha de Joseph et dit: «Pardon, mon seigneur! Veuille autoriser ton serviteur à te dire un mot, mon seigneur, et que ta colère ne s''enflamme pas contre ton serviteur, car tu es pareil au pharaon. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mon seigneur, tu nous as demandé, à nous tes serviteurs: ‘Avez-vous un père ou un frère?’ '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nous avons répondu: ‘Nous avons un vieux père et un jeune frère, qu''il a eu dans sa vieillesse. Cet enfant avait un frère qui est mort et qui était de la même mère. Il ne reste que lui et son père l''aime.’ '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tu as dit à tes serviteurs: ‘Faites-le descendre vers moi et que je le voie de mes propres yeux.’ '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nous t''avons répondu, seigneur: ‘Le garçon ne peut pas quitter son père. S''il le quitte, son père mourra.’ '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tu as dit à tes serviteurs: ‘Si votre jeune frère ne descend pas avec vous, vous ne serez plus admis en ma présence.’ '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Lorsque nous sommes remontés auprès de ton serviteur mon père, nous lui avons rapporté tes paroles, mon seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Notre père a dit: ‘Retournez nous acheter un peu de nourriture.’ '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nous avons répondu: ‘Nous ne pouvons pas descendre. En revanche, si notre jeune frère est avec nous, nous descendrons, car nous ne pouvons pas être admis en présence de cet homme à moins que notre jeune frère ne soit avec nous.’ '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ton serviteur notre père nous a dit: ‘Vous savez que ma femme m''a donné deux fils. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'L''un est parti de chez moi. Je pense qu''il a dû être mis en pièces, car je ne l''ai jamais revu. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Si vous me prenez encore celui-ci et qu''il lui arrive un malheur, vous ferez descendre avec douleur mes cheveux blancs dans le séjour des morts.’ '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Si maintenant je retourne vers ton serviteur mon père sans le garçon auquel il est attaché, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'il mourra en voyant qu''il n''est pas là. Quant à tes serviteurs, ils feraient descendre avec douleur les cheveux blancs de ton serviteur notre père dans le séjour des morts. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'En effet, moi ton serviteur, je me suis porté garant pour le garçon devant mon père en disant: ‘Si je ne te le ramène pas, je serai pour toujours coupable envers mon père.’ '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Permets-moi donc de rester à la place du garçon comme esclave de mon seigneur et que le garçon reparte avec ses frères! '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Comment pourrai-je remonter vers mon père si le garçon n'est pas avec moi? Non, je ne veux pas voir le malheur frapper mon père!»
