document_id: NAM.2,152
type_code: fra
verses:
  '1':
  - type: text
    content: Voici sur les montagnes
  - type: text
    content: les pieds du messager qui annonce la paix.
  - type: text
    content: Célèbre tes fêtes, Juda, accomplis tes vœux,
  - type: text
    content: 'car le méchant ne passera plus au milieu de toi:'
  - type: text
    content: il est entièrement exterminé!
  '10':
  - type: text
    content: Pillez l'argent! Pillez l'or!
  - type: text
    content: Il y a des trésors sans fin,
  - type: text
    content: des richesses en objets précieux de toute sorte.
  '11':
  - type: text
    content: On pille, on dévaste, on détruit!
  - type: text
    content: Le courage fond,
  - type: text
    content: les genoux flageolent,
  - type: text
    content: tous les reins souffrent,
  - type: text
    content: tous les visages pâlissent.
  '12':
  - type: text
    content: Qu'est devenu ce repaire de lions,
  - type: text
    content: ce pâturage des lionceaux
  - type: text
    content: où se retiraient le lion, la lionne, le petit du lion,
  - type: text
    content: sans que personne ne les inquiète?
  '13':
  - type: text
    content: Le lion déchirait pour ses petits,
  - type: text
    content: étranglait pour ses lionnes;
  - type: text
    content: il remplissait de proies ses tanières,
  - type: text
    content: de dépouilles ses repaires.
  '14':
  - type: text
    content: Je m'en prends à toi, déclare l'Eternel, le maître de l'univers.
  - type: text
    content: Je réduirai tes chars en cendres,
  - type: text
    content: l'épée dévorera tes lionceaux,
  - type: text
    content: j'arracherai ta proie du pays
  - type: text
    content: et l'on n'entendra plus la voix de tes messagers.
  '2':
  - type: text
    content: 'Le destructeur marche contre toi:'
  - type: text
    content: garde la forteresse, veille sur la route, fortifie-toi,
  - type: text
    content: rassemble toute ta force!
  '3':
  - type: text
    content: Oui, l'Eternel rétablit la gloire de Jacob
  - type: text
    content: et la gloire d'Israël,
  - type: text
    content: parce que les pillards les ont pillés
  - type: text
    content: et ont détruit les sarments de leurs vignes.
  '4':
  - type: text
    content: Les boucliers de ses héros sont rouges,
  - type: text
    content: les guerriers sont habillés de pourpre.
  - type: text
    content: Dans l'étincellement du métal apparaissent les chars
  - type: text
    content: le jour qu'il a fixé pour la bataille,
  - type: text
    content: et les lances sont agitées.
  '5':
  - type: text
    content: Les chars s'élancent dans la campagne,
  - type: text
    content: foncent sur les places;
  - type: text
    content: à les voir, on dirait des flambeaux,
  - type: text
    content: ils courent comme des éclairs.
  '6':
  - type: text
    content: Le roi de Ninive se souvient de ses vaillants hommes,
  - type: text
    content: mais ils trébuchent dans leur marche;
  - type: text
    content: on se précipite vers les remparts,
  - type: text
    content: on se prépare à la défense.
  '7':
  - type: text
    content: Les portes qui donnent sur les fleuves sont ouvertes,
  - type: text
    content: et le palais s'écroule!
  '8':
  - type: text
    content: 'C''est décidé: elle est mise à nu, elle est emmenée;'
  - type: text
    content: ses servantes gémissent comme des colombes
  - type: text
    content: et se frappent la poitrine.
  '9':
  - type: text
    content: Ninive était auparavant comme un réservoir plein d'eau,
  - type: text
    content: et les voilà qui fuient!
  - type: text
    content: Arrêtez! Arrêtez!
  - type: text
    content: Mais aucun ne se retourne.
