document_id: NAM.2,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici sur les montagnes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les pieds du messager qui annonce la paix.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Célèbre tes fêtes, Juda, accomplis tes vœux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'car le méchant ne passera plus au milieu de toi:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est entièrement exterminé!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pillez l'argent! Pillez l'or!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y a des trésors sans fin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des richesses en objets précieux de toute sorte.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On pille, on dévaste, on détruit!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le courage fond,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les genoux flageolent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les reins souffrent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les visages pâlissent.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'est devenu ce repaire de lions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce pâturage des lionceaux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où se retiraient le lion, la lionne, le petit du lion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans que personne ne les inquiète?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le lion déchirait pour ses petits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: étranglait pour ses lionnes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il remplissait de proies ses tanières,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de dépouilles ses repaires.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je m'en prends à toi, déclare l'Eternel, le maître de l'univers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je réduirai tes chars en cendres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'épée dévorera tes lionceaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'arracherai ta proie du pays
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'on n'entendra plus la voix de tes messagers.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le destructeur marche contre toi:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: garde la forteresse, veille sur la route, fortifie-toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rassemble toute ta force!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, l'Eternel rétablit la gloire de Jacob
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la gloire d'Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce que les pillards les ont pillés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ont détruit les sarments de leurs vignes.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les boucliers de ses héros sont rouges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les guerriers sont habillés de pourpre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans l'étincellement du métal apparaissent les chars
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le jour qu'il a fixé pour la bataille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les lances sont agitées.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les chars s'élancent dans la campagne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: foncent sur les places;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à les voir, on dirait des flambeaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils courent comme des éclairs.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le roi de Ninive se souvient de ses vaillants hommes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ils trébuchent dans leur marche;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on se précipite vers les remparts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on se prépare à la défense.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les portes qui donnent sur les fleuves sont ouvertes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le palais s'écroule!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C''est décidé: elle est mise à nu, elle est emmenée;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses servantes gémissent comme des colombes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et se frappent la poitrine.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ninive était auparavant comme un réservoir plein d'eau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les voilà qui fuient!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arrêtez! Arrêtez!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais aucun ne se retourne.
