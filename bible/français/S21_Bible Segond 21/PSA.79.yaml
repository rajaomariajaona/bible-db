document_id: PSA.79,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Supplication en faveur de Jérusalem
  - type: text
    content: Psaume d'Asaph.
  - type: text
    content: O Dieu, les nations ont envahi ton héritage;
  - type: text
    content: elles ont rendu impur ton saint temple,
  - type: text
    content: elles ont fait de Jérusalem un tas de ruines.
  '10':
  - type: text
    content: 'Pourquoi les nations diraient-elles:'
  - type: text
    content: «Où est leur Dieu?»
  - type: text
    content: Qu'on sache parmi les nations, et puissions-nous le voir,
  - type: text
    content: que tu venges le sang de tes serviteurs, le sang versé!
  '11':
  - type: text
    content: Que les gémissements des prisonniers parviennent jusqu'à toi!
  - type: text
    content: Par ton bras puissant, sauve ceux qui sont destinés à la mort!
  '12':
  - type: text
    content: Rends sept fois à nos voisins
  - type: text
    content: les insultes qu'ils t'ont faites, Seigneur!
  '13':
  - type: text
    content: Et nous, ton peuple, le troupeau dont tu es le berger,
  - type: text
    content: nous te célébrerons éternellement;
  - type: text
    content: de génération en génération nous proclamerons tes louanges.
  '2':
  - type: text
    content: Elles ont donné le cadavre de tes serviteurs
  - type: text
    content: en pâture aux oiseaux du ciel,
  - type: text
    content: le corps de tes fidèles aux bêtes de la terre.
  '3':
  - type: text
    content: Elles ont versé leur sang comme de l'eau
  - type: text
    content: tout autour de Jérusalem,
  - type: text
    content: et personne n'était là pour les enterrer.
  '4':
  - type: text
    content: Nous sommes devenus un objet de mépris pour nos voisins,
  - type: text
    content: de moquerie et de raillerie pour ceux qui nous entourent.
  '5':
  - type: text
    content: Jusqu'à quand, Eternel, t'irriteras-tu sans cesse
  - type: text
    content: et ta colère s'embrasera-t-elle comme le feu?
  '6':
  - type: text
    content: Déverse ta fureur sur les nations qui ne te connaissent pas
  - type: text
    content: et sur les royaumes qui ne font pas appel à ton nom!
  '7':
  - type: text
    content: En effet, on a dévoré Jacob
  - type: text
    content: et dévasté son domaine.
  '8':
  - type: text
    content: Ne te souviens plus de nos fautes passées!
  - type: text
    content: Que tes compassions viennent sur nous sans tarder,
  - type: text
    content: car nous sommes bien malheureux!
  '9':
  - type: text
    content: Secours-nous, Dieu de notre salut, pour la gloire de ton nom!
  - type: text
    content: Délivre-nous et pardonne nos péchés, à cause de ton nom!
