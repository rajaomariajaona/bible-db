document_id: PSA.79
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Supplication en faveur de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Psaume d'Asaph.
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Dieu, les nations ont envahi ton héritage;
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles ont rendu impur ton saint temple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles ont fait de Jérusalem un tas de ruines.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Elles ont donné le cadavre de tes serviteurs
- type: usfm
  marker: q1
  children:
  - type: text
    text: en pâture aux oiseaux du ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le corps de tes fidèles aux bêtes de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Elles ont versé leur sang comme de l'eau
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout autour de Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et personne n'était là pour les enterrer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nous sommes devenus un objet de mépris pour nos voisins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de moquerie et de raillerie pour ceux qui nous entourent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Jusqu'à quand, Eternel, t'irriteras-tu sans cesse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ta colère s'embrasera-t-elle comme le feu?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Déverse ta fureur sur les nations qui ne te connaissent pas
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sur les royaumes qui ne font pas appel à ton nom!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: En effet, on a dévoré Jacob
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dévasté son domaine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ne te souviens plus de nos fautes passées!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que tes compassions viennent sur nous sans tarder,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car nous sommes bien malheureux!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Secours-nous, Dieu de notre salut, pour la gloire de ton nom!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Délivre-nous et pardonne nos péchés, à cause de ton nom!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Pourquoi les nations diraient-elles:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Où est leur Dieu?»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu'on sache parmi les nations, et puissions-nous le voir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que tu venges le sang de tes serviteurs, le sang versé!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Que les gémissements des prisonniers parviennent jusqu'à toi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par ton bras puissant, sauve ceux qui sont destinés à la mort!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Rends sept fois à nos voisins
- type: usfm
  marker: q1
  children:
  - type: text
    text: les insultes qu'ils t'ont faites, Seigneur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Et nous, ton peuple, le troupeau dont tu es le berger,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous te célébrerons éternellement;
- type: usfm
  marker: q1
  children:
  - type: text
    text: de génération en génération nous proclamerons tes louanges.
