document_id: 1KI.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Derniers instants et mort de David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'David approchait du moment de sa mort et il donna les instructions suivantes à son fils Salomon: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Je m''en vais par le chemin commun à toute la terre. Fortifie-toi et sois un homme! '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Respecte les ordres de l''Eternel, ton Dieu, marche dans ses voies et garde ses prescriptions, ses commandements, ses règles et ses instructions, en te conformant à ce qui est écrit dans la loi de Moïse. Ainsi tu réussiras dans tout ce que tu feras et partout où tu te tourneras, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'et l''Eternel accomplira cette parole qu''il a prononcée à propos de moi: ‘*Si tes descendants veillent sur leur conduite pour marcher avec fidélité devant moi, de tout leur cœur et de toute leur âme, tu ne manqueras jamais d''un successeur sur le trône d''Israël.’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Si… d''Israël: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'promesse reprise en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '8.25'
      metadata:
        usfm: 1KI.8.25
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9.5'
      metadata:
        usfm: 1KI.9.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Chroniques 6.16
      metadata:
        usfm: 2CH.6.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jérémie 33.17
      metadata:
        usfm: JER.33.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '»Tu sais ce que m''a fait Joab, le fils de Tseruja, ce qu''il a fait à deux chefs de l''armée d''Israël, à Abner, le fils de Ner, et à Amasa, le fils de Jéther: il les a tués. Il a versé pendant la paix le sang de la guerre, et il l''a mis sur la ceinture qu''il portait à la taille et sur les chaussures qu''il portait aux pieds. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tu agiras conformément à ta sagesse et tu ne laisseras pas ses cheveux blancs descendre en paix au séjour des morts.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: »Quant aux fils de Barzillaï, le Galaadite, tu les traiteras avec bonté et ils feront partie de ceux qui mangent à ta table. En effet, ils ont agi de la même manière envers moi en venant à ma rencontre lorsque je fuyais devant ton frère Absalom.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '»Voici, il y a près de toi Shimeï, le fils de Guéra, le Benjaminite, de Bachurim. Il a prononcé de violentes malédictions contre moi le jour où je me suis rendu à Mahanaïm. Mais il est descendu à ma rencontre vers le Jourdain et je lui ai juré par l''Eternel que je ne le ferais pas mourir par l''épée. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mais désormais, ne le laisse pas impuni, car tu es un homme sage et tu sais comment tu dois le traiter pour faire descendre dans le sang ses cheveux blancs au séjour des morts.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'David se coucha avec ses ancêtres et il fut enterré dans la ville de David. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le règne de David sur Israël dura 40 ans. Il régna 7 ans à Hébron, et 33 ans à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Salomon s'assit sur le trône de son père David, et sa royauté fut solidement établie.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Premières décisions du roi Salomon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Adonija, le fils de Haggith, alla trouver Bath-Shéba, la mère de Salomon. Elle lui demanda: «Es-tu venu avec des intentions de paix?» Il répondit: «Oui.» '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Puis il ajouta: «J''ai un mot à te dire.» Elle lui dit: «Parle!» '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Et il dit: «Tu sais que la royauté aurait dû m''appartenir et que tout Israël portait les regards sur moi pour me faire régner. Mais la royauté s''est détournée de moi et elle est revenue à mon frère, parce que l''Eternel la lui a donnée. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Maintenant, j''ai une demande à te faire. Ne me repousse pas!» Elle lui répondit: «Parle!» '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Et il dit: «Je t''en prie, dis au roi Salomon de me donner pour femme Abishag, la Sunamite, car il ne te repoussera pas.» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Bath-Shéba dit: «Bien! Je parlerai au roi en ta faveur.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Bath-Shéba alla donc trouver le roi Salomon pour lui parler en faveur d''Adonija. Le roi se leva pour aller à sa rencontre et se prosterna devant elle, puis il s''assit sur son trône. Le roi fit placer un trône pour sa mère et elle s''assit à sa droite. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Elle dit alors: «J''ai une petite demande à te faire. Ne me repousse pas!» Le roi lui dit: «Fais ta demande, ma mère, car je ne te repousserai pas.» '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Elle dit: «Qu''Abishag, la Sunamite, soit donnée pour femme à ton frère Adonija!» '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le roi Salomon répondit à sa mère: «Pourquoi demandes-tu Abishag, la Sunamite, pour Adonija? Demande donc la royauté pour lui, puisqu''il est mon frère aîné! Demande-la pour lui, pour le prêtre Abiathar et pour Joab, le fils de Tseruja!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Alors le roi Salomon prêta ce serment par l''Eternel: «Que Dieu me traite avec la plus grande sévérité, si ce n''est pas au prix de sa vie qu''Adonija a prononcé cette parole! '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Maintenant, l''Eternel est vivant, lui qui m''a solidement établi et m''a fait asseoir sur le trône de mon père David et qui m''a donné une maison, conformément à sa promesse! Aujourd''hui Adonija mourra.» '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Puis le roi Salomon fit frapper Adonija par l'intermédiaire de Benaja, le fils de Jehojada, et il mourut.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Le roi dit ensuite au prêtre Abiathar: «Va-t''en à Anathoth dans tes terres. En effet, tu mérites la mort, mais je ne te ferai pas mourir aujourd''hui, parce que tu as porté l''arche du Seigneur, de l''Eternel, devant mon père David et parce que tu as pris part à toutes ses souffrances.» '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Salomon démit Abiathar de ses fonctions de prêtre de l'Eternel, et ainsi s'accomplit la parole que l'Eternel avait prononcée contre la famille d'Eli à Silo.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'La nouvelle en parvint à Joab, et il se réfugia dans la tente de l''Eternel et s''accrocha aux cornes de l''autel. En effet, il avait suivi le parti d''Adonija, alors qu''il n''avait pas suivi celui d''Absalom. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'On annonça au roi Salomon que Joab s''était réfugié dans la tente de l''Eternel et qu''il se trouvait à côté de l''autel. Salomon envoya Benaja, le fils de Jehojada, en lui disant: «Va le frapper!» '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Benaja arriva à la tente de l''Eternel et dit à Joab: «Sors! C''est le roi qui l''ordonne.» Mais il répondit: «Non! Je veux mourir ici.» Benaja rapporta cette parole au roi en disant: «Voilà ce qu''a dit Joab, voilà ce qu''il m''a répondu.» '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Le roi dit à Benaja: «Fais comme il l''a dit, frappe-le et enterre-le. Tu écarteras ainsi de moi et de ma famille le sang que Joab a versé sans raison. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'L''Eternel fera retomber son sang sur sa tête, parce qu''il a frappé deux hommes plus justes et meilleurs que lui et les a tués par l''épée, sans que mon père David le sache. Je veux parler d''Abner, le fils de Ner, qui était le chef de l''armée d''Israël et d''Amasa, le fils de Jéther, qui était le chef de l''armée de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Leur sang retombera pour toujours sur la tête de Joab et de sa descendance. En revanche, l''Eternel accordera pour toujours la paix à David, à sa descendance, à sa famille et à son trône.» '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Benaja, le fils de Jehojada, monta à la tente de l''Eternel et frappa Joab à mort. Il fut enterré chez lui, dans le désert. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Le roi mit Benaja, le fils de Jehojada, à la tête de l'armée à la place de Joab et il établit le prêtre Tsadok à la place d'Abiathar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Le roi fit appeler Shimeï et lui dit: «Construis-toi une maison à Jérusalem. Tu y habiteras et tu n''en sortiras pas pour aller ici ou là. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Sache bien que tu mourras le jour où tu sortiras de la ville et passeras le torrent du Cédron. Tu seras toi-même responsable de ta mort.» '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Shimeï répondit au roi: «C''est bien! Moi, ton serviteur, je ferai ce que dit mon seigneur le roi.» Et Shimeï habita longtemps à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Au bout de 3 ans, deux de ses esclaves s''enfuirent chez Akish, fils de Maaca et roi de Gath. On annonça à Shimeï: «Tes esclaves sont à Gath.» '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Shimeï se leva, sella son âne et se rendit à Gath chez Akish pour aller chercher ses esclaves. Shimeï partit donc et il ramena ses esclaves de Gath. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'On informa Salomon que Shimeï était allé de Jérusalem à Gath et qu''il était de retour. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Le roi fit appeler Shimeï et lui dit: «Je t''avais fait prêter serment par l''Eternel et je t''avais fait cette déclaration formelle: ‘Sache bien que tu mourras le jour où tu sortiras de la ville pour aller ici ou là.’ Tu m''avais répondu: ‘C''est bien! J''ai compris’, n''est-ce pas? '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Pourquoi donc n''as-tu pas respecté le serment prêté au nom de l''Eternel et l''ordre que je t''avais donné?» '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Puis le roi dit à Shimeï: «Tu sais bien, dans ton cœur, tout le mal que tu as fait à mon père David. L''Eternel fait retomber ta méchanceté sur ta tête. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Quant au roi Salomon, il sera béni et le trône de David sera affermi pour toujours devant l''Eternel.» '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Le roi donna ses instructions à Benaja, le fils de Jehojada. Il sortit et frappa Shimeï à mort.
- type: usfm
  marker: p
  children:
  - type: text
    text: La royauté fut ainsi affermie entre les mains de Salomon.
