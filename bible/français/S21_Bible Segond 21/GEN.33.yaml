document_id: GEN.33,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Réconciliation entre Jacob et Esaü
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob leva les yeux et regarda. Il constata qu''Esaü arrivait avec 400 hommes. Il répartit les enfants entre Léa, Rachel et les deux servantes. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob répondit: «Non, je t''en prie, si j''ai trouvé grâce à tes yeux, accepte ce cadeau de ma part! En effet, je t''ai regardé comme on regarde Dieu et tu m''as accueilli favorablement. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Accepte donc mon cadeau qui t''a été offert, puisque Dieu m''a comblé de grâces: je ne manque de rien.» Jacob insista auprès d''Esaü et celui-ci accepta.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esaü dit: «Partons, mettons-nous en route. Je marcherai devant toi.» '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob lui répondit: «Mon seigneur sait que les enfants sont fragiles et que j''ai des brebis et des vaches qui allaitent. Si l''on forçait leur marche un seul jour, tout le troupeau mourrait. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que mon seigneur prenne les devants sur son serviteur! De mon côté, je suivrai lentement, au pas du troupeau qui me précédera et au pas des enfants, jusqu''à ce que j''arrive chez mon seigneur à Séir.» '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esaü dit: «Je veux au moins laisser une partie de mes hommes avec toi.» Jacob répondit: «Pourquoi cela? Je veux seulement trouver grâce aux yeux de mon seigneur!» '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le même jour, Esaü reprit le chemin de Séir. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quant à Jacob, il partit pour Succoth. Il se construisit une maison et fit des cabanes pour ses troupeaux. Voilà pourquoi l'on a appelé cet endroit Succoth.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La famille de Jacob à Sichem
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A son retour de Paddan-Aram, Jacob arriva sans encombre à la ville de Sichem, dans le pays de Canaan, et il installa son camp devant la ville. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il acheta la portion du champ où il avait dressé sa tente aux fils de Hamor, le père de Sichem, pour 100 pièces d''argent, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il plaça en tête les servantes avec leurs enfants, puis Léa avec ses enfants, enfin Rachel avec Joseph. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et là, il construisit un autel qu'il appela El-Elohé-Israël.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lui-même passa devant eux et il se prosterna à terre sept fois, jusqu''à ce qu''il soit près de son frère. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Esaü courut à sa rencontre, l'étreignit, se jeta à son cou et l'embrassa. Et ils pleurèrent.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esaü leva les yeux, vit les femmes et les enfants et demanda: «Qui sont ceux-là pour toi?» Jacob répondit: «Ce sont les enfants que Dieu a accordés à ton serviteur.» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les servantes s''approchèrent, elles et leurs enfants, et se prosternèrent. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Léa et ses enfants s''approchèrent aussi et se prosternèrent. Ensuite Joseph et Rachel s''approchèrent et se prosternèrent. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esaü demanda: «A quoi destines-tu tout le camp que j''ai rencontré?» Jacob répondit: «A trouver grâce aux yeux de mon seigneur.» '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esaü dit: «Je suis dans l''abondance, mon frère. Garde ce qui t''appartient.» '
