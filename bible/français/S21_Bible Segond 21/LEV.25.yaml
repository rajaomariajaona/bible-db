document_id: LEV.25
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'année sabbatique
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Moïse sur le mont Sinaï: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Transmets ces instructions aux Israélites: Quand vous serez entrés dans le pays que je vous donne, la terre se reposera, il y aura un sabbat en l''honneur de l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Pendant 6 ans tu ensemenceras ton champ, pendant 6 ans tu tailleras ta vigne et tu en récolteras le produit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mais la septième année sera un sabbat, un temps de repos pour la terre, un sabbat en l''honneur de l''Eternel: tu n''ensemenceras pas ton champ et tu ne tailleras pas ta vigne, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'tu ne moissonneras pas ce qui proviendra des grains tombés de ta moisson et tu ne vendangeras pas les raisins de ta vigne non taillée. Ce sera une année de repos pour la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ce que la terre produira pendant son sabbat vous servira de nourriture, à toi, à ton esclave et à ta servante, à ton salarié étranger et à l''immigré qui habitent avec toi, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: à ton bétail et aux animaux qui sont dans ton pays; tout ce qu'elle produit servira de nourriture.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'année du jubilé
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '»Tu compteras 7 années sabbatiques, 7 fois 7 ans, c''est-à-dire 49 ans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le dixième jour du septième mois, tu feras retentir les sons éclatants de la trompette: le jour des expiations, vous sonnerez de la trompette dans tout votre pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Vous ferez de cette cinquantième année une année sainte, vous proclamerez la liberté dans le pays pour tous ses habitants. Ce sera pour vous le jubilé: chacun de vous retournera dans sa propriété et dans son clan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'La cinquantième année sera pour vous le jubilé: vous ne sèmerez pas, vous ne moissonnerez pas ce que les champs produiront d''eux-mêmes et vous ne vendangerez pas la vigne non taillée, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'car c''est le jubilé; vous le considérerez comme saint. Vous mangerez le produit de vos champs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Dans cette année de jubilé, chacun de vous retournera dans sa propriété. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Si vous vendez ou achetez un terrain à votre prochain, qu''aucun de vous ne lèse son frère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tu l''achèteras à ton prochain en comptant les années depuis le jubilé, et il te le vendra en comptant les années de récolte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Plus il y aura d''années de récolte, plus haut tu fixeras le prix, et moins il y aura d''années, plus bas tu le fixeras, car c''est le nombre des récoltes qu''il te vend. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Aucun de vous ne lèsera son prochain et tu craindras ton Dieu, car je suis l'Eternel, votre Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '»Mettez mes prescriptions en pratique, respectez et mettez en pratique mes règles, vous habiterez ainsi en sécurité dans le pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le pays donnera ses fruits, vous mangerez à satiété et vous y habiterez en sécurité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Peut-être vous dites-vous: ‘Que mangerons-nous la septième année, puisque nous ne sèmerons pas et ne ferons pas nos récoltes?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Je vous accorderai ma bénédiction la sixième année et elle donnera des produits pour 3 ans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: La huitième année, vous sèmerez et vous mangerez de l'ancienne récolte; jusqu'à la neuvième année, jusqu'à la nouvelle récolte, vous mangerez de l'ancienne.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le rachat des propriétés et des esclaves
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '»Les terres ne se vendront pas de façon définitive, car c''est à moi que le pays appartient et vous êtes chez moi comme des étrangers et des immigrés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Dans tout le pays dont vous aurez la possession, vous établirez un droit de rachat pour les terres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '»Si ton frère devient pauvre et vend une portion de sa propriété, celui qui a le droit de rachat, son plus proche parent, viendra et rachètera ce qu''a vendu son frère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Si quelqu''un n''a personne qui ait le droit de rachat et qu''il se procure lui-même de quoi faire son rachat, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'il comptera les années depuis la vente, remboursera la différence à l''acheteur et retournera dans sa propriété. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: S'il ne trouve pas de quoi lui faire ce remboursement, ce qu'il a vendu restera entre les mains de l'acheteur jusqu'à l'année du jubilé; lors du jubilé, il retournera dans sa propriété et l'acheteur en sortira.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '»Si quelqu''un vend une maison d''habitation dans une ville pourvue de murs d''enceinte, il aura le droit de rachat durant une année entière à partir de la vente, son droit de rachat durera un an. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Mais si cette maison située dans une ville pourvue de murs d''enceinte n''est pas rachetée avant la fin de l''année, elle restera définitivement à l''acheteur et à ses descendants; il n''en sortira pas lors du jubilé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Les maisons des villages dépourvus de murs d''enceinte seront considérées comme des fonds de terre: elles pourront être rachetées et l''acheteur en sortira lors du jubilé.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '»Quant aux villes des Lévites et aux maisons qu''ils y posséderont, les Lévites auront un droit perpétuel de rachat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Si quelqu''un achète une maison à des Lévites, il sortira de la maison vendue et de la ville où il la possédait lors du jubilé, car les maisons des villes des Lévites sont leur propriété au milieu des Israélites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Les champs situés autour des villes des Lévites ne pourront pas être vendus, car ils en ont la possession pour toujours.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: '»Si ton frère devient pauvre et qu''il manque de ressources près de toi, tu le soutiendras, même s''il s''agit d''un étranger ou d''un immigré, afin qu''il vive avec toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Tu ne tireras de lui ni intérêt ni profit, tu craindras ton Dieu et ton frère vivra avec toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Tu ne lui prêteras pas ton argent à intérêt et tu ne lui prêteras pas ta nourriture pour en tirer un profit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Je suis l'Eternel, ton Dieu, qui vous ai fait sortir d'Egypte pour vous donner le pays de Canaan, pour être votre Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: '»Si ton frère devient pauvre près de toi et se vend à toi, tu ne lui imposeras pas le travail d''un esclave. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Il sera chez toi comme un salarié, comme un immigré; il sera à ton service jusqu''à l''année du jubilé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Il sortira alors de chez toi avec ses enfants et il retournera dans son clan, dans la propriété de ses ancêtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'En effet, ils sont mes serviteurs, ceux que j''ai fait sortir d''Egypte; on ne les vendra pas comme on vend des esclaves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Tu ne domineras pas sur lui avec dureté et tu craindras ton Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'C''est parmi les nations qui vous entourent que tu prendras le serviteur et la servante qui t''appartiendront, c''est d''elles que vous achèterez le serviteur et la servante. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Vous pourrez aussi en acheter parmi les enfants des immigrés en séjour chez toi, ainsi que parmi les familles auxquelles ils donneront naissance dans votre pays, et ils seront votre propriété. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Vous les laisserez en héritage à vos enfants après vous comme une propriété, vous les garderez comme esclaves pour toujours. Mais en ce qui concerne vos frères, les Israélites, aucun de vous ne dominera avec dureté sur son frère.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: '»Si un étranger ou un immigré devient riche et que ton frère devienne pauvre près de lui et se vende à l''étranger immigré chez toi ou à quelqu''un de la famille de l''étranger, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'il y aura pour lui le droit de rachat, après qu''il se sera vendu: un de ses frères pourra le racheter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Son oncle, le fils de son oncle ou l''un de ses proches parents pourra le racheter. Ou bien, s''il en a les moyens, il se rachètera lui-même. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Il comptera avec celui qui l''a acheté le nombre d''années depuis celle où il s''est vendu jusqu''à l''année du jubilé. Le prix à payer dépendra du nombre d''années, évaluées comme celles d''un salarié: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 's''il reste beaucoup d''années, il paiera pour son rachat une part proportionnelle du prix auquel il a été acheté; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 's''il reste peu d''années jusqu''à celle du jubilé, il en fera le compte et il paiera pour son rachat une part proportionnelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Il sera comme un homme salarié à l''année chez son maître et tu ne permettras pas à celui-ci de le traiter avec dureté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'S''il n''est racheté d''aucune de ces manières, il sortira l''année du jubilé, lui et ses enfants avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: En effet, c'est de moi que les Israélites sont esclaves. Ils sont mes esclaves, que j'ai fait sortir d'Egypte. Je suis l'Eternel, votre Dieu.
