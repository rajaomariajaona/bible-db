document_id: ROM.9
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Israël et les non-Juifs dans le plan de Dieu
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 9.1–11.36
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israël et la promesse de Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Je dis la vérité en Christ, je ne mens pas, ma conscience m''en rend témoignage par le Saint-Esprit: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'j''éprouve une grande tristesse et j''ai dans le cœur un chagrin continuel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Oui, je voudrais être moi-même maudit et séparé de Christ pour mes frères, mes propres compatriotes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'les Israélites; c''est à eux qu''appartiennent l''adoption, la gloire, les alliances, la loi, le culte, les promesses '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: et les patriarches; c'est d'eux que le Christ est issu dans son humanité, lui qui est au-dessus de tout, Dieu béni éternellement. Amen!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ce n'est pas que la parole de Dieu soit sans effet. Non, car ceux qui sont issus d'Israël
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Israël: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nom donné par Dieu à Jacob, le fils d'Isaac et le petit-fils d'Abraham.
    marker-yv: yv-n
  - type: text
    text: ' ne sont pas tous Israël, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'et bien qu''étant de la descendance d''Abraham, ils ne sont pas tous ses enfants. Au contraire, il est dit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: C'est par Isaac qu'une descendance te sera assurée
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'C''est par… assurée: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Genèse 21.12
      metadata:
        usfm: GEN.21.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Cela signifie que ce ne sont pas les descendants simplement biologiques qui sont enfants de Dieu, mais que ce sont les enfants de la promesse qui sont considérés comme sa descendance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'La parole que voici était en effet une promesse: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Je reviendrai à la même époque et Sara aura un fils
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je reviendrai… fils: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Genèse 18.14
      metadata:
        usfm: GEN.18.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'De plus, tel a aussi été le cas pour Rebecca qui a eu des enfants d''un seul homme, notre ancêtre Isaac: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'les enfants n''étaient pas encore nés et n''avaient donc fait ni bien ni mal – afin que le plan de Dieu subsiste, conformément à son choix et sans dépendre des œuvres mais de celui qui appelle – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'quand il a été dit à Rebecca: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: L'aîné sera asservi au plus jeune
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''aîné… jeune: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Genèse 25.23
      metadata:
        usfm: GEN.25.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' De même, il est écrit: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: J'ai aimé Jacob et j'ai détesté Esaü
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'J''ai aimé… Esaü: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation de Ml 1.2-3. Hébraïsme que l'on pourrait rendre par «j'ai préféré Jacob à Esaü».
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Que dirons-nous donc? Dieu serait-il injuste? Certainement pas! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'En effet, il dit à Moïse: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Je ferai grâce à qui je veux faire grâce, et j'aurai compassion de qui je veux avoir compassion
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je ferai grâce… avoir compassion: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'Exode 33.19.
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ainsi donc, cela ne dépend ni de la volonté ni des efforts de l''homme, mais de Dieu qui fait grâce. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'L''Ecriture dit en effet au pharaon: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'Voilà pourquoi je t''ai suscité: c''est pour montrer en toi ma puissance et afin que mon nom soit proclamé sur toute la terre'
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Voilà… terre: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 9.16
      metadata:
        usfm: EXO.9.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', en rapport avec les fléaux qui ont frappé l''Egypte pour permettre le départ des Israélites sous la conduite de Moïse.'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ainsi, Dieu fait grâce à qui il veut et il endurcit qui il veut.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tu me diras: «Pourquoi fait-il [donc] encore des reproches? Qui peut en effet résister à sa volonté?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais toi, homme, qui es-tu pour entrer en contestation avec Dieu? L''objet dira-t-il à celui qui l''a façonné: «Pourquoi m''as-tu fait ainsi?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le potier n''est-il pas le maître de l''argile pour faire avec la même pâte un ustensile d''un usage noble et un ustensile d''un usage méprisable? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Que dire si Dieu, voulant montrer sa colère et faire connaître sa puissance, a supporté avec une grande patience des vases de colère tout prêts pour la perdition? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Et que dire s''il a voulu faire connaître la richesse de sa gloire envers des vases de compassion qu''il a d''avance préparés pour la gloire? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ainsi il nous a appelés non seulement d''entre les Juifs, mais encore d''entre les non-Juifs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'C''est aussi ce qu''il dit dans le livre d''Osée: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: J'appellerai ‘mon peuple’ celui qui n'était pas mon peuple, et ‘bien-aimée’ celle qui n'était pas la bien-aimée.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'Et là où on leur disait: ‘Vous n''êtes pas mon peuple’, ils seront appelés fils du Dieu vivant'
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.25-26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'J''appellerai… vivant: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: reprise des termes d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Osée 2.25
      metadata:
        usfm: HOS.2.25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', 1.'
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Esaïe, de son côté, s''écrie au sujet d''Israël: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Même si les Israélites, de par leur nombre, étaient pareils au sable de la mer, un reste seulement sera sauvé
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: En effet, le Seigneur accomplira pleinement et rapidement sa parole [avec justice, en effet le Seigneur accomplira rapidement sa parole] sur la terre.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.27-28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Même si… la terre: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 10.22-23
      metadata:
        usfm: ISA.10.22+ISA.10.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Et comme Esaïe l''avait prédit, '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: si le Seigneur de l'univers ne nous avait pas laissé une descendance, nous serions devenus comme Sodome, nous aurions été semblables à Gomorrhe.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Si le Seigneur… Gomorrhe: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 1.9
      metadata:
        usfm: ISA.1.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Sodome et Gomorrhe étaient des villes connues pour leur immoralité et punies par Dieu à l'époque d'Abraham.
    marker-yv: yv-n
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'erreur d'Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Que dirons-nous donc? Des non-Juifs qui ne recherchaient pas la justice ont obtenu la justice, celle qui vient de la foi, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'tandis qu''Israël, qui cherchait une loi de justice, n''est pas parvenu à cette loi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Pourquoi? Parce qu''Israël l''a cherchée non par la foi, mais par les œuvres [de la loi]. Ils se sont heurtés à la pierre qui fait obstacle, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'comme il est écrit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Je mets dans Sion une pierre qui fait obstacle, un rocher propre à faire trébucher, mais celui qui croit en lui ne sera pas couvert de honte
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.33 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je mets… honte: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation combinant '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 8.14
      metadata:
        usfm: ISA.8.14
    - type: text
      text: ' et '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '28.16'
      metadata:
        usfm: ISA.28.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
