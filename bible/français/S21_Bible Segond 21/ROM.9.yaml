document_id: ROM.9,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Israël et les non-Juifs dans le plan de Dieu
  - type: heading
    content: 9.1–11.36
  - type: heading
    content: Israël et la promesse de Dieu
  - type: text
    content: 'Je dis la vérité en Christ, je ne mens pas, ma conscience m''en rend témoignage par le Saint-Esprit: '
  '10':
  - type: text
    content: 'De plus, tel a aussi été le cas pour Rebecca qui a eu des enfants d''un seul homme, notre ancêtre Isaac: '
  '11':
  - type: text
    content: 'les enfants n''étaient pas encore nés et n''avaient donc fait ni bien ni mal – afin que le plan de Dieu subsiste, conformément à son choix et sans dépendre des œuvres mais de celui qui appelle – '
  '12':
  - type: text
    content: 'quand il a été dit à Rebecca: '
  - type: text
    content: L'aîné sera asservi au plus jeune
  - type: text
    content: .
  - type: note
    content: 'L''aîné… jeune: citation de Genèse 25.23.'
  - type: text
    content: ' De même, il est écrit: '
  '13':
  - type: text
    content: J'ai aimé Jacob et j'ai détesté Esaü
  - type: text
    content: .
  - type: note
    content: 'J''ai aimé… Esaü: citation de Ml 1.2-3. Hébraïsme que l''on pourrait rendre par «j''ai préféré Jacob à Esaü».'
  '14':
  - type: text
    content: 'Que dirons-nous donc? Dieu serait-il injuste? Certainement pas! '
  '15':
  - type: text
    content: 'En effet, il dit à Moïse: '
  - type: text
    content: Je ferai grâce à qui je veux faire grâce, et j'aurai compassion de qui je veux avoir compassion
  - type: text
    content: .
  - type: note
    content: 'Je ferai grâce… avoir compassion: citation d''Exode 33.19.'
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Ainsi donc, cela ne dépend ni de la volonté ni des efforts de l''homme, mais de Dieu qui fait grâce. '
  '17':
  - type: text
    content: 'L''Ecriture dit en effet au pharaon: '
  - type: text
    content: 'Voilà pourquoi je t''ai suscité: c''est pour montrer en toi ma puissance et afin que mon nom soit proclamé sur toute la terre'
  - type: text
    content: .
  - type: note
    content: 'Voilà… terre: citation d''Exode 9.16, en rapport avec les fléaux qui ont frappé l''Egypte pour permettre le départ des Israélites sous la conduite de Moïse.'
  - type: text
    content: ' '
  '18':
  - type: text
    content: Ainsi, Dieu fait grâce à qui il veut et il endurcit qui il veut.
  '19':
  - type: text
    content: 'Tu me diras: «Pourquoi fait-il [donc] encore des reproches? Qui peut en effet résister à sa volonté?» '
  '2':
  - type: text
    content: 'j''éprouve une grande tristesse et j''ai dans le cœur un chagrin continuel. '
  '20':
  - type: text
    content: 'Mais toi, homme, qui es-tu pour entrer en contestation avec Dieu? L''objet dira-t-il à celui qui l''a façonné: «Pourquoi m''as-tu fait ainsi?» '
  '21':
  - type: text
    content: 'Le potier n''est-il pas le maître de l''argile pour faire avec la même pâte un ustensile d''un usage noble et un ustensile d''un usage méprisable? '
  '22':
  - type: text
    content: 'Que dire si Dieu, voulant montrer sa colère et faire connaître sa puissance, a supporté avec une grande patience des vases de colère tout prêts pour la perdition? '
  '23':
  - type: text
    content: 'Et que dire s''il a voulu faire connaître la richesse de sa gloire envers des vases de compassion qu''il a d''avance préparés pour la gloire? '
  '24':
  - type: text
    content: 'Ainsi il nous a appelés non seulement d''entre les Juifs, mais encore d''entre les non-Juifs. '
  '25':
  - type: text
    content: 'C''est aussi ce qu''il dit dans le livre d''Osée: '
  - type: text
    content: J'appellerai ‘mon peuple’ celui qui n'était pas mon peuple, et ‘bien-aimée’ celle qui n'était pas la bien-aimée.
  - type: text
    content: ' '
  '26':
  - type: text
    content: 'Et là où on leur disait: ‘Vous n''êtes pas mon peuple’, ils seront appelés fils du Dieu vivant'
  - type: text
    content: .
  - type: note
    content: 'J''appellerai… vivant: reprise des termes d''Osée 2.25, 1.'
  '27':
  - type: text
    content: 'Esaïe, de son côté, s''écrie au sujet d''Israël: '
  - type: text
    content: Même si les Israélites, de par leur nombre, étaient pareils au sable de la mer, un reste seulement sera sauvé
  - type: text
    content: '. '
  '28':
  - type: text
    content: En effet, le Seigneur accomplira pleinement et rapidement sa parole [avec justice, en effet le Seigneur accomplira rapidement sa parole] sur la terre.
  - type: note
    content: 'Même si… la terre: citation d''Esaïe 10.22-23.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Et comme Esaïe l''avait prédit, '
  - type: text
    content: si le Seigneur de l'univers ne nous avait pas laissé une descendance, nous serions devenus comme Sodome, nous aurions été semblables à Gomorrhe.
  - type: note
    content: 'Si le Seigneur… Gomorrhe: citation d''Esaïe 1.9. Sodome et Gomorrhe étaient des villes connues pour leur immoralité et punies par Dieu à l''époque d''Abraham.'
  - type: heading
    content: L'erreur d'Israël
  '3':
  - type: text
    content: 'Oui, je voudrais être moi-même maudit et séparé de Christ pour mes frères, mes propres compatriotes, '
  '30':
  - type: text
    content: 'Que dirons-nous donc? Des non-Juifs qui ne recherchaient pas la justice ont obtenu la justice, celle qui vient de la foi, '
  '31':
  - type: text
    content: 'tandis qu''Israël, qui cherchait une loi de justice, n''est pas parvenu à cette loi. '
  '32':
  - type: text
    content: 'Pourquoi? Parce qu''Israël l''a cherchée non par la foi, mais par les œuvres [de la loi]. Ils se sont heurtés à la pierre qui fait obstacle, '
  '33':
  - type: text
    content: 'comme il est écrit: '
  - type: text
    content: Je mets dans Sion une pierre qui fait obstacle, un rocher propre à faire trébucher, mais celui qui croit en lui ne sera pas couvert de honte
  - type: text
    content: .
  - type: note
    content: 'Je mets… honte: citation combinant Esaïe 8.14 et 28.16.'
  '4':
  - type: text
    content: 'les Israélites; c''est à eux qu''appartiennent l''adoption, la gloire, les alliances, la loi, le culte, les promesses '
  '5':
  - type: text
    content: et les patriarches; c'est d'eux que le Christ est issu dans son humanité, lui qui est au-dessus de tout, Dieu béni éternellement. Amen!
  '6':
  - type: text
    content: Ce n'est pas que la parole de Dieu soit sans effet. Non, car ceux qui sont issus d'Israël
  - type: note
    content: 'Israël: nom donné par Dieu à Jacob, le fils d''Isaac et le petit-fils d''Abraham.'
  - type: text
    content: ' ne sont pas tous Israël, '
  '7':
  - type: text
    content: 'et bien qu''étant de la descendance d''Abraham, ils ne sont pas tous ses enfants. Au contraire, il est dit: '
  - type: text
    content: C'est par Isaac qu'une descendance te sera assurée
  - type: text
    content: .
  - type: note
    content: 'C''est par… assurée: citation de Genèse 21.12.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Cela signifie que ce ne sont pas les descendants simplement biologiques qui sont enfants de Dieu, mais que ce sont les enfants de la promesse qui sont considérés comme sa descendance. '
  '9':
  - type: text
    content: 'La parole que voici était en effet une promesse: '
  - type: text
    content: Je reviendrai à la même époque et Sara aura un fils
  - type: text
    content: .
  - type: note
    content: 'Je reviendrai… fils: citation de Genèse 18.14.'
  - type: text
    content: ' '
