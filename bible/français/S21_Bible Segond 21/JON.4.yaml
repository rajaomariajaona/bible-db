document_id: JON.4,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Irritation de Jonas et reproches de Dieu
  - type: text
    content: 'Jonas le prit très mal et fut irrité. '
  '10':
  - type: text
    content: 'L''Eternel dit: «Tu as pitié de la plante qui ne t''a coûté aucune peine et que tu n''as pas fait pousser, qui est née une nuit et qui a disparu l''autre nuit, '
  '11':
  - type: text
    content: et moi, je n'aurais pas pitié de Ninive, la grande ville, dans laquelle se trouvent plus de 120'000 êtres humains incapables de distinguer leur droite de leur gauche et un grand nombre d'animaux!»
  '2':
  - type: text
    content: 'Il pria l''Eternel en disant: «Ah! Eternel, n''est-ce pas ce que je disais quand j''étais encore dans mon pays? C''est ce que je voulais éviter en fuyant à Tarsis. En effet, je savais que *tu es un Dieu de grâce et de compassion, lent à la colère et riche en bonté, et qui regrettes le mal que tu envoies'
  - type: note
    content: 'Tu es un Dieu… envoies: même présentation en Joël 2.13.'
  - type: text
    content: '. '
  '3':
  - type: text
    content: 'Maintenant, Eternel, prends-moi donc la vie, car mourir vaut mieux pour moi que vivre.» '
  '4':
  - type: text
    content: 'L''Eternel répondit: «Fais-tu bien de t''irriter?»'
  '5':
  - type: text
    content: 'Jonas sortit de la ville et s''assit à l''est de la ville. Là il se fit une cabane et s''y tint à l''ombre en attendant de voir ce qui arriverait dans la ville. '
  '6':
  - type: text
    content: 'L''Eternel Dieu fit pousser une plante qui s''éleva au-dessus de Jonas pour donner de l''ombre à sa tête et le délivrer de son mal. Jonas éprouva une grande joie à cause de cette plante, '
  '7':
  - type: text
    content: mais le lendemain à l'aurore, Dieu fit venir un ver qui la rongea, et la plante sécha.
  '8':
  - type: text
    content: 'Au lever du soleil, Dieu fit souffler un vent chaud d''est, et le soleil frappa la tête de Jonas au point qu''il tomba en défaillance. Il demanda la mort en disant: «Il vaut mieux pour moi mourir que vivre.» '
  '9':
  - type: text
    content: 'Dieu dit à Jonas: «Fais-tu bien de t''irriter à cause de la plante?» Il répondit: «Je fais bien de m''irriter jusqu''à la mort.» '
