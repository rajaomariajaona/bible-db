document_id: JON.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Irritation de Jonas et reproches de Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jonas le prit très mal et fut irrité. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il pria l''Eternel en disant: «Ah! Eternel, n''est-ce pas ce que je disais quand j''étais encore dans mon pays? C''est ce que je voulais éviter en fuyant à Tarsis. En effet, je savais que *tu es un Dieu de grâce et de compassion, lent à la colère et riche en bonté, et qui regrettes le mal que tu envoies'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu es un Dieu… envoies: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'même présentation en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Joël 2.13
      metadata:
        usfm: JOL.2.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Maintenant, Eternel, prends-moi donc la vie, car mourir vaut mieux pour moi que vivre.» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L''Eternel répondit: «Fais-tu bien de t''irriter?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jonas sortit de la ville et s''assit à l''est de la ville. Là il se fit une cabane et s''y tint à l''ombre en attendant de voir ce qui arriverait dans la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L''Eternel Dieu fit pousser une plante qui s''éleva au-dessus de Jonas pour donner de l''ombre à sa tête et le délivrer de son mal. Jonas éprouva une grande joie à cause de cette plante, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: mais le lendemain à l'aurore, Dieu fit venir un ver qui la rongea, et la plante sécha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Au lever du soleil, Dieu fit souffler un vent chaud d''est, et le soleil frappa la tête de Jonas au point qu''il tomba en défaillance. Il demanda la mort en disant: «Il vaut mieux pour moi mourir que vivre.» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Dieu dit à Jonas: «Fais-tu bien de t''irriter à cause de la plante?» Il répondit: «Je fais bien de m''irriter jusqu''à la mort.» '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L''Eternel dit: «Tu as pitié de la plante qui ne t''a coûté aucune peine et que tu n''as pas fait pousser, qui est née une nuit et qui a disparu l''autre nuit, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: et moi, je n'aurais pas pitié de Ninive, la grande ville, dans laquelle se trouvent plus de 120'000 êtres humains incapables de distinguer leur droite de leur gauche et un grand nombre d'animaux!»
