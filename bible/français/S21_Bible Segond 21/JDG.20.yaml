document_id: JDG.20,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Tous les Israélites se mirent en marche, depuis Dan jusqu''à Beer-Shéba et jusqu''au pays de Galaad, et l''assemblée se réunit comme un seul homme devant l''Eternel, à Mitspa. '
  '10':
  - type: text
    content: 'Nous prendrons dans toutes les tribus d''Israël 10 hommes sur 100, 100 sur 1000 et 1000 sur 10''000. Ils iront chercher des vivres pour le peuple afin qu''à leur retour on puisse traiter Guibea en Benjamin comme le mérite l''acte odieux qu''elle a commis en Israël.» '
  '11':
  - type: text
    content: Ainsi, tous les hommes d'Israël se rassemblèrent contre cette ville, unis comme un seul homme.
  '12':
  - type: text
    content: 'Les tribus d''Israël envoyèrent des hommes vers toutes les familles de Benjamin pour dire: «Qu''est-ce donc que ce crime qui s''est commis parmi vous? '
  '13':
  - type: text
    content: Livrez-nous maintenant les hommes mauvais qui se trouvent à Guibea, afin que nous les fassions mourir et que nous éliminions le mal du milieu d'Israël.» Mais les Benjaminites ne voulurent pas écouter leurs frères, les Israélites.
  '14':
  - type: text
    content: 'Les Benjaminites sortirent de leurs villes et se rassemblèrent à Guibea pour combattre les Israélites. '
  '15':
  - type: text
    content: 'On dénombra ce jour-là les Benjaminites sortis des villes: il y avait 26''000 hommes aptes au combat, sans compter les habitants de Guibea, qui formaient 700 hommes d''élite. '
  '16':
  - type: text
    content: Parmi toute cette troupe, il y avait 700 hommes d'élite qui étaient gauchers. Tous ceux-là pouvaient, en lançant une pierre avec la fronde, viser un cheveu sans le manquer.
  '17':
  - type: text
    content: 'On dénombra aussi les hommes d''Israël, à l''exclusion de ceux de Benjamin, et l''on en trouva 400''000 aptes au combat, tous hommes de guerre. '
  '18':
  - type: text
    content: 'Les Israélites se levèrent, montèrent à Béthel et consultèrent Dieu en disant: «Qui de nous montera le premier pour combattre les Benjaminites?» L''Eternel répondit: «C''est Juda qui montera le premier.»'
  '19':
  - type: text
    content: 'Dès le matin, les Israélites se mirent en marche et ils installèrent leur camp près de Guibea. '
  '2':
  - type: text
    content: 'Les chefs de tout le peuple et toutes les tribus d''Israël se présentèrent dans l''assemblée du peuple de Dieu. Il y avait là 400''000 fantassins aptes au combat. '
  '20':
  - type: text
    content: 'Les hommes d''Israël s''avancèrent pour combattre ceux de Benjamin et ils se rangèrent en ordre de bataille contre eux devant Guibea. '
  '21':
  - type: text
    content: Les Benjaminites sortirent de Guibea et ils tuèrent ce jour-là 22'000 Israélites.
  '22':
  - type: text
    content: 'La troupe des Israélites reprit courage, et ils se rangèrent de nouveau en ordre de bataille à l''endroit où ils s''étaient placés le premier jour. '
  '23':
  - type: text
    content: 'Les Israélites montèrent et pleurèrent devant l''Eternel jusqu''au soir. Ils consultèrent l''Eternel en disant: «Dois-je m''avancer encore pour combattre les descendants de mon frère Benjamin?» L''Eternel répondit: «Montez contre lui.» '
  '24':
  - type: text
    content: 'Les Israélites s''avancèrent contre les Benjaminites, le deuxième jour. '
  '25':
  - type: text
    content: Ce jour-là, les Benjaminites sortirent de Guibea à leur rencontre et ils tuèrent encore 18'000 Israélites, tous armés d'épées.
  '26':
  - type: text
    content: 'Tous les Israélites et tout le peuple montèrent jusqu''à Béthel. Ils pleurèrent et restèrent là devant l''Eternel. Ils jeûnèrent ce jour-là jusqu''au soir et ils offrirent des holocaustes et des sacrifices de communion devant l''Eternel. '
  '27':
  - type: text
    content: 'Les Israélites consultèrent l''Eternel – c''était là que se trouvait alors l''arche de l''alliance de Dieu, '
  '28':
  - type: text
    content: et c'était Phinées
  - type: note
    content: 'Phinées: sa mention situe l''épisode au début de la période des juges.'
  - type: text
    content: ', fils d''Eléazar et petit-fils d''Aaron, qui se tenait à cette époque en présence de Dieu – et ils dirent: «Dois-je marcher encore pour combattre les descendants de mon frère Benjamin ou dois-je m''en abstenir?» L''Eternel répondit: «Montez, car demain je les livrerai entre vos mains.»'
  '29':
  - type: text
    content: 'Alors Israël plaça une embuscade autour de Guibea. '
  '3':
  - type: text
    content: 'Les Benjaminites apprirent que les Israélites étaient montés à Mitspa. Les Israélites dirent: «Parlez! Comment ce crime a-t-il été commis?» '
  '30':
  - type: text
    content: 'Les Israélites montèrent contre les Benjaminites, le troisième jour, et ils se rangèrent en ordre de bataille devant Guibea, comme les autres fois. '
  '31':
  - type: text
    content: 'Les Benjaminites sortirent à la rencontre du peuple et se laissèrent attirer loin de la ville. Ils commencèrent à frapper à mort parmi le peuple comme les autres fois, sur les routes dont l''une monte à Béthel et l''autre à Guibea par la campagne, et ils tuèrent une trentaine d''hommes d''Israël. '
  '32':
  - type: text
    content: 'Les Benjaminites se disaient: «Les voilà battus devant nous comme avant!» Mais les Israélites disaient: «Prenons la fuite, attirons-les loin de la ville dans les chemins.» '
  '33':
  - type: text
    content: 'Tous les hommes d''Israël quittèrent leur position et se regroupèrent à Baal-Thamar. L''embuscade d''Israël s''élança alors de l''endroit où elle se trouvait, c''est-à-dire Maaré-Guibea; '
  '34':
  - type: text
    content: '10''000 hommes choisis sur l''ensemble d''Israël arrivèrent devant Guibea. Le combat fut acharné et les Benjaminites ne se doutaient pas du désastre qu''ils allaient subir. '
  '35':
  - type: text
    content: L'Eternel battit Benjamin devant Israël, et les Israélites tuèrent ce jour-là 25'100 hommes de Benjamin, tous armés d'épées.
  '36':
  - type: text
    content: 'Les Benjaminites considéraient les hommes d''Israël comme battus, car ces derniers cédaient du terrain devant eux, comptant sur l''embuscade qu''ils avaient placée contre Guibea. '
  '37':
  - type: text
    content: 'Les hommes placés en embuscade fondirent rapidement sur Guibea; ils se déployèrent et frappèrent toute la ville du tranchant de l''épée. '
  '38':
  - type: text
    content: 'Suivant un signal convenu avec les autres Israélites, les hommes de l''embuscade devaient faire monter une épaisse fumée de la ville. '
  '39':
  - type: text
    content: 'Les Israélites firent à ce moment-là volte-face dans la bataille. Les Benjaminites leur avaient tué déjà une trentaine d''hommes et se disaient: «Certainement, les voilà battus devant nous comme lors du premier combat!» '
  '4':
  - type: text
    content: 'Alors le Lévite, le mari de la femme qui avait été tuée, prit la parole et dit: «J''étais arrivé, avec ma concubine, à Guibea en Benjamin, pour y passer la nuit. '
  '40':
  - type: text
    content: 'Cependant, une épaisse colonne de fumée commençait à s''élever de la ville. Les Benjaminites regardèrent derrière eux et virent que de la ville entière les flammes montaient vers le ciel. '
  '41':
  - type: text
    content: 'Les Israélites avaient fait volte-face et les hommes de Benjamin furent effrayés en voyant le désastre qui allait les atteindre. '
  '42':
  - type: text
    content: 'Ils tournèrent le dos devant les Israélites et s''enfuirent en prenant le chemin du désert. Mais leurs assaillants les talonnèrent et éliminèrent pendant le trajet ceux qui étaient sortis des villes. '
  '43':
  - type: text
    content: 'Ils encerclèrent Benjamin, le poursuivirent et l''écrasèrent dès qu''il voulait se reposer, jusqu''à un endroit situé en face de Guibea, du côté est. '
  '44':
  - type: text
    content: 'Il y eut 18''000 hommes de Benjamin, tous vaillants, qui moururent. '
  '45':
  - type: text
    content: 'Parmi ceux qui tournèrent le dos pour s''enfuir vers le désert au rocher de Rimmon, les Israélites firent 5000 victimes sur les routes. Ils les poursuivirent jusqu''à Guideom et en tuèrent 2000. '
  '46':
  - type: text
    content: Le nombre total des Benjaminites qui moururent ce jour-là fut de 25'000 hommes armés d'épées, tous vaillants.
  '47':
  - type: text
    content: 'Les 600 hommes qui avaient tourné le dos et qui s''étaient enfuis vers le désert au rocher de Rimmon restèrent là pendant 4 mois. '
  '48':
  - type: text
    content: Les Israélites revinrent vers les Benjaminites et les frappèrent du tranchant de l'épée, depuis les habitants des villes jusqu'au bétail et jusqu'à tout ce qu'ils rencontrèrent. Ils mirent aussi le feu à toutes les villes existantes.
  '5':
  - type: text
    content: 'Les habitants de Guibea se sont soulevés contre moi et ont entouré pendant la nuit la maison où je me trouvais. Ils avaient l''intention de me tuer et ils ont violé ma concubine, si bien qu''elle en est morte. '
  '6':
  - type: text
    content: 'J''ai pris ma concubine et je l''ai coupée en morceaux que j''ai envoyés dans tout le territoire de l''héritage d''Israël, car ils ont commis un crime et un acte odieux en Israël. '
  '7':
  - type: text
    content: Vous voici tous, Israélites. Tenez conseil et prenez ici une décision!»
  '8':
  - type: text
    content: 'Tout le peuple se leva comme un seul homme en disant: «Aucun de nous ne rejoindra sa tente, personne ne retournera chez lui. '
  '9':
  - type: text
    content: 'Voici maintenant ce que nous ferons à Guibea: nous marcherons contre elle après avoir effectué un tirage au sort. '
