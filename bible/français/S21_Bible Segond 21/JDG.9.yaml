document_id: JDG.9,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Abimélec, le fils de Jerubbaal, se rendit à Sichem vers les frères de sa mère, et voici comment il leur parla, ainsi qu''à tout le clan de son grand-père maternel: '
  '10':
  - type: text
    content: 'Les arbres dirent alors au figuier: ‘Viens, toi, régner sur nous.’ '
  '11':
  - type: text
    content: 'Mais le figuier leur répondit: ‘Comment pourrais-je renoncer à ma douceur et à mon excellent fruit pour aller m''agiter au-dessus des arbres?’ '
  '12':
  - type: text
    content: 'Les arbres dirent à la vigne: ‘Viens, toi, régner sur nous.’ '
  '13':
  - type: text
    content: 'Mais la vigne leur répondit: ‘Comment pourrais-je renoncer à mon vin, qui réjouit Dieu et les hommes, pour aller m''agiter au-dessus des arbres?’ '
  '14':
  - type: text
    content: 'Alors tous les arbres dirent au buisson de ronces: ‘Viens, toi, régner sur nous.’ '
  '15':
  - type: text
    content: 'Et le buisson de ronces répondit aux arbres: ‘Si vous voulez vraiment me sacrer roi et me mettre à votre tête, venez vous réfugier sous mon ombrage. Sinon, un feu sortira du buisson de ronces et dévorera les cèdres du Liban.’'
  '16':
  - type: text
    content: '»Maintenant, est-ce avec fidélité et intégrité que vous avez agi en proclamant Abimélec roi? Avez-vous agi avec bienveillance pour Jerubbaal et sa famille? L''avez-vous traité conformément aux services qu''il a rendus? '
  '17':
  - type: text
    content: 'En effet, mon père a combattu pour vous, il a risqué sa vie et vous a délivrés de l''oppression de Madian. '
  '18':
  - type: text
    content: 'Et vous, vous vous êtes attaqués à sa famille, vous avez tué ses 70 fils sur une même pierre et vous avez proclamé roi sur les habitants de Sichem Abimélec, le fils de sa servante, parce qu''il est votre frère. '
  '19':
  - type: text
    content: 'Si c''est avec fidélité et intégrité que vous avez aujourd''hui agi envers Jerubbaal et sa famille, eh bien, qu''Abimélec fasse votre joie et que vous fassiez aussi la sienne! '
  '2':
  - type: text
    content: '«Je vous en prie, dites à tous les habitants de Sichem: ‘Vaut-il mieux pour vous que 70 hommes, tous fils de Jerubbaal, dominent sur vous, ou bien un seul homme?’ Et souvenez-vous que je suis fait des mêmes os et de la même chair que vous.» '
  '20':
  - type: text
    content: Sinon, qu'un feu sorte d'Abimélec et dévore les habitants de Sichem et de Millo, et qu'un feu sorte des habitants de Sichem et de Millo et dévore Abimélec!»
  '21':
  - type: text
    content: Jotham se retira et prit la fuite. Il s'en alla à Beer, où il s'installa, loin de son frère Abimélec.
  '22':
  - type: text
    content: 'Abimélec avait dominé 3 ans sur Israël. '
  '23':
  - type: text
    content: 'Alors Dieu envoya un mauvais esprit entre Abimélec et les habitants de Sichem, et ceux-ci furent infidèles à Abimélec. '
  '24':
  - type: text
    content: 'Cela arriva afin que l''acte de violence commis sur les 70 fils de Jerubbaal reçoive sa punition et que leur sang retombe sur leur frère Abimélec, qui les avait tués, ainsi que sur les habitants de Sichem, qui l''avaient aidé à tuer ses frères. '
  '25':
  - type: text
    content: Les habitants de Sichem placèrent en embuscade contre lui, sur les sommets des montagnes, des hommes qui dépouillaient tous ceux qui passaient près d'eux sur le chemin. Et cela fut rapporté à Abimélec.
  '26':
  - type: text
    content: 'Gaal, fils d''Ebed, vint à passer par Sichem avec ses frères, et les habitants de Sichem placèrent leur confiance en lui. '
  '27':
  - type: text
    content: 'Ils sortirent dans la campagne, vendangèrent leurs vignes, foulèrent le raisin et se livrèrent à des réjouissances. Ils entrèrent dans le temple de leur dieu, y mangèrent et burent, et ils maudirent Abimélec. '
  '28':
  - type: text
    content: 'Gaal, fils d''Ebed, disait: «Qui est Abimélec et qu''est Sichem, pour que nous soyons soumis à Abimélec? N''est-il pas le fils de Jerubbaal et Zebul n''est-il pas son lieutenant? Servez plutôt les hommes de Hamor, le père de Sichem. Pourquoi, nous, devrions-nous servir Abimélec? '
  '29':
  - type: text
    content: 'Si seulement j''étais à la tête de ce peuple! Je renverserais Abimélec.» Et il disait à l''intention d''Abimélec: «Renforce ton armée, mets-toi en marche!»'
  '3':
  - type: text
    content: 'Les frères de sa mère répétèrent pour lui toutes ces paroles à tous les habitants de Sichem et leur cœur pencha en faveur d''Abimélec, car ils se disaient: «C''est notre frère.» '
  '30':
  - type: text
    content: 'Zebul, le gouverneur de la ville, apprit ce que disait Gaal, fils d''Ebed, et sa colère s''enflamma. '
  '31':
  - type: text
    content: 'Il envoya secrètement des messagers à Abimélec pour lui dire: «Gaal, fils d''Ebed, et ses frères sont venus à Sichem, et ils soulèvent la ville contre toi. '
  '32':
  - type: text
    content: 'Maintenant, pars de nuit, toi et le peuple qui est avec toi, et mets-toi en embuscade dans la campagne. '
  '33':
  - type: text
    content: Le matin, au lever du soleil, tu fondras sur la ville. Et lorsque Gaal et le peuple qui est avec lui sortiront contre toi, tu lui infligeras ce que te permettront tes forces.»
  '34':
  - type: text
    content: 'Abimélec et tout le peuple qui était avec lui partirent de nuit, et ils se mirent en embuscade près de Sichem, répartis en 4 groupes. '
  '35':
  - type: text
    content: 'Gaal, fils d''Ebed, sortit et se tint à l''entrée de la ville. Abimélec et tout le peuple qui était avec lui surgirent alors de l''embuscade. '
  '36':
  - type: text
    content: 'Gaal aperçut cette troupe et dit à Zebul: «Voici un peuple qui descend du sommet des montagnes.» Zebul lui répondit: «C''est l''ombre des montagnes que tu prends pour des hommes.» '
  '37':
  - type: text
    content: 'Reprenant la parole, Gaal dit: «C''est bien un peuple qui descend des hauteurs du pays, et une troupe arrive par le chemin du chêne des devins.» '
  '38':
  - type: text
    content: 'Zebul lui répondit: «Où sont donc tes beaux discours, toi qui disais: ‘Qui est Abimélec, pour que nous lui soyons soumis?’ N''est-ce pas là le peuple que tu méprisais? Mets-toi en marche maintenant, livre-lui bataille!» '
  '39':
  - type: text
    content: 'Gaal s''avança à la tête des habitants de Sichem et livra bataille à Abimélec. '
  '4':
  - type: text
    content: 'Ils lui donnèrent 70 pièces d''argent, prises dans le temple de Baal-Berith. Abimélec s''en servit pour acheter des vauriens et des aventuriers qui le suivirent. '
  '40':
  - type: text
    content: 'Poursuivi par Abimélec, il prit la fuite devant lui et beaucoup d''hommes tombèrent morts jusqu''à l''entrée de la ville. '
  '41':
  - type: text
    content: Abimélec s'arrêta à Aruma et Zebul chassa Gaal et ses frères, qui ne purent rester à Sichem.
  '42':
  - type: text
    content: 'Le lendemain, le peuple sortit dans la campagne. Abimélec, qui en fut informé, '
  '43':
  - type: text
    content: 'prit sa troupe, la partagea en 3 groupes et se mit en embuscade dans la campagne. Ayant vu que le peuple sortait de la ville, il se dressa contre eux et les battit. '
  '44':
  - type: text
    content: 'Abimélec et les groupes qui étaient avec lui se portèrent en avant et se placèrent à l''entrée de la ville. Deux de ces groupes se jetèrent sur tous ceux qui se trouvaient dans la campagne et les battirent. '
  '45':
  - type: text
    content: Abimélec attaqua la ville pendant toute la journée. Il s'en empara et tua ses habitants. Puis il rasa la ville et y versa du sel.
  '46':
  - type: text
    content: 'A cette nouvelle, tous les occupants de la citadelle de Sichem se rendirent dans la partie fortifiée du temple du dieu Berith. '
  '47':
  - type: text
    content: 'On avertit Abimélec que tous les occupants de la citadelle de Sichem s''y étaient rassemblés. '
  '48':
  - type: text
    content: 'Alors Abimélec monta sur le mont Tsalmon, ainsi que tout le peuple qui était avec lui. Il prit en main une hache, coupa une branche d''arbre, l''enleva et la mit sur son épaule. Ensuite il dit au peuple qui était avec lui: «Vous avez vu ce que j''ai fait, dépêchez-vous de faire comme moi.» '
  '49':
  - type: text
    content: Ils coupèrent chacun une branche et suivirent Abimélec. Puis ils placèrent les branches contre la forteresse et l'incendièrent avec ceux qui s'y trouvaient. C'est ainsi que tous les occupants de la citadelle de Sichem moururent. Ils étaient un millier, hommes et femmes.
  '5':
  - type: text
    content: 'Il vint chez son père à Ophra et tua ses frères, les 70 fils de Jerubbaal, sur une même pierre. Jotham, le plus jeune fils de Jerubbaal, fut le seul rescapé, car il s''était caché. '
  '50':
  - type: text
    content: 'Abimélec marcha contre Thébets. Il l''assiégea et s''en empara. '
  '51':
  - type: text
    content: 'Il y avait au milieu de la ville une tour fortifiée, où se réfugièrent tous les habitants de la ville, hommes et femmes. Ils s''y enfermèrent et montèrent sur le toit de la tour. '
  '52':
  - type: text
    content: 'Abimélec parvint jusqu''à la tour. Il l''attaqua et s''approcha de la porte pour y mettre le feu. '
  '53':
  - type: text
    content: 'Alors une femme lança sur sa tête un morceau de meule de moulin et lui brisa ainsi le crâne. '
  '54':
  - type: text
    content: 'Aussitôt il appela le jeune homme qui portait ses armes et lui dit: «Dégaine ton épée et donne-moi la mort, sinon on dira de moi: ‘C''est une femme qui l''a tué.’» Le jeune homme le transperça et il mourut. '
  '55':
  - type: text
    content: Quand les Israélites virent qu'Abimélec était mort, ils repartirent chacun chez soi.
  '56':
  - type: text
    content: 'Ainsi, Dieu fit retomber sur Abimélec le mal qu''il avait fait à son père en tuant ses 70 frères, '
  '57':
  - type: text
    content: et il fit retomber sur la tête des habitants de Sichem tout le mal qu'ils avaient fait. C'est ainsi que s'accomplit sur eux la malédiction de Jotham, fils de Jerubbaal.
  '6':
  - type: text
    content: Tous les habitants de Sichem et de Millo se rassemblèrent. Ils vinrent proclamer Abimélec roi, près du chêne planté dans Sichem.
  '7':
  - type: text
    content: 'Jotham fut informé de la situation. Il alla se placer sur le sommet du mont Garizim, et voici ce qu''il leur cria à haute voix: «Ecoutez-moi, habitants de Sichem, et que Dieu vous écoute! '
  '8':
  - type: text
    content: 'Les arbres partirent pour sacrer un roi et le mettre à leur tête. Ils dirent à l''olivier: ‘Règne sur nous.’ '
  '9':
  - type: text
    content: 'Mais l''olivier leur répondit: ‘Comment pourrais-je renoncer à mon huile, qui me vaut l''estime de Dieu et des hommes, pour aller m''agiter au-dessus des arbres?’ '
