document_id: ZEC.11,152
type_code: fra
verses:
  '1':
  - type: text
    content: Liban, ouvre tes portes,
  - type: text
    content: et que le feu dévore tes cèdres!
  '10':
  - type: text
    content: 'J''ai pris ma houlette Grâce et je l''ai brisée pour rompre mon alliance, celle que j''avais conclue avec tous les peuples. '
  '11':
  - type: text
    content: Elle a été rompue ce jour-là, et les plus misérables des brebis qui m'observaient ont reconnu que c'était une parole de l'Eternel.
  '12':
  - type: text
    content: 'Je leur ai dit: «Si vous le trouvez bon, donnez-moi mon salaire, sinon, ne le donnez pas.» Alors ils ont pesé pour mon salaire 30 pièces d''argent. '
  '13':
  - type: text
    content: 'L''Eternel m''a dit: «Jette-le au potier, *ce prix magnifique auquel ils m''ont estimé!» J''ai donc pris les 30 pièces d''argent et je les ai jetées dans la maison de l''Eternel pour le potier'
  - type: note
    content: 'Ce prix… potier: cité en Matthieu 27.9-10.'
  - type: text
    content: '. '
  '14':
  - type: text
    content: Puis j'ai brisé ma seconde houlette, Union, pour rompre la fraternité entre Juda et Israël.
  '15':
  - type: text
    content: 'L''Eternel m''a dit: «Prends encore l''équipement d''un berger fou! '
  '16':
  - type: text
    content: 'En effet, je fais surgir dans le pays un berger qui ne s''occupera pas des brebis disparues. Il n''ira pas à la recherche des plus jeunes, il ne soignera pas les blessées, il ne nourrira pas les bien portantes, mais il mangera la viande des plus grasses et arrachera leurs sabots. '
  '17':
  - type: text
    content: Malheur au berger indigne qui abandonne ses brebis! Que l'épée déchire son bras et crève son œil droit! Que son bras se dessèche et que son œil droit soit perdu!»
  '2':
  - type: text
    content: Gémis, cyprès, car le cèdre est tombé,
  - type: text
    content: les puissants sont détruits.
  - type: text
    content: Gémissez, chênes du Basan,
  - type: text
    content: car la forêt impénétrable est abattue.
  '3':
  - type: text
    content: Les bergers poussent des hurlements,
  - type: text
    content: parce que ce qui faisait leur gloire est détruit;
  - type: text
    content: les lionceaux rugissent,
  - type: text
    content: parce que l'orgueil du Jourdain est abattu.
  '4':
  - type: text
    content: 'Voici ce que dit l''Eternel, mon Dieu: «Prends soin des brebis destinées à l''abattoir. '
  '5':
  - type: text
    content: 'Ceux qui les achètent les égorgent impunément, et celui qui les vend dit: ‘Béni soit l''Eternel, car je m''enrichis!’ Leurs propres bergers n''ont pas pitié d''elles. '
  '6':
  - type: text
    content: Non, je n'aurai plus pitié des habitants du pays, déclare l'Eternel. En effet, je livre les hommes aux mains les uns des autres et aux mains de leur roi; ils dévasteront le pays, et je ne délivrerai personne de leurs mains.»
  '7':
  - type: text
    content: 'Alors je me suis mis à prendre soin des brebis destinées à l''abattoir, certainement les plus misérables du troupeau. J''ai pris deux houlettes. J''ai appelé l''une Grâce et l''autre Union, et j''ai pris soin des brebis. '
  '8':
  - type: text
    content: 'J''ai fait disparaître les trois bergers en un mois, mais j''ai perdu patience avec elles, et elles-mêmes en ont eu assez de moi. '
  '9':
  - type: text
    content: 'Alors j''ai déclaré: «Je ne prendrai plus soin de vous. Que celle qui va mourir meure, que celle qui va disparaître disparaisse et que celles qui restent se dévorent les unes les autres!» '
