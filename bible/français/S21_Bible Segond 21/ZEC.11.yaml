document_id: ZEC.11
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Liban, ouvre tes portes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que le feu dévore tes cèdres!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Gémis, cyprès, car le cèdre est tombé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les puissants sont détruits.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Gémissez, chênes du Basan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car la forêt impénétrable est abattue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Les bergers poussent des hurlements,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que ce qui faisait leur gloire est détruit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les lionceaux rugissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que l'orgueil du Jourdain est abattu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voici ce que dit l''Eternel, mon Dieu: «Prends soin des brebis destinées à l''abattoir. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ceux qui les achètent les égorgent impunément, et celui qui les vend dit: ‘Béni soit l''Eternel, car je m''enrichis!’ Leurs propres bergers n''ont pas pitié d''elles. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Non, je n'aurai plus pitié des habitants du pays, déclare l'Eternel. En effet, je livre les hommes aux mains les uns des autres et aux mains de leur roi; ils dévasteront le pays, et je ne délivrerai personne de leurs mains.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors je me suis mis à prendre soin des brebis destinées à l''abattoir, certainement les plus misérables du troupeau. J''ai pris deux houlettes. J''ai appelé l''une Grâce et l''autre Union, et j''ai pris soin des brebis. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'J''ai fait disparaître les trois bergers en un mois, mais j''ai perdu patience avec elles, et elles-mêmes en ont eu assez de moi. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alors j''ai déclaré: «Je ne prendrai plus soin de vous. Que celle qui va mourir meure, que celle qui va disparaître disparaisse et que celles qui restent se dévorent les unes les autres!» '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'J''ai pris ma houlette Grâce et je l''ai brisée pour rompre mon alliance, celle que j''avais conclue avec tous les peuples. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Elle a été rompue ce jour-là, et les plus misérables des brebis qui m'observaient ont reconnu que c'était une parole de l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je leur ai dit: «Si vous le trouvez bon, donnez-moi mon salaire, sinon, ne le donnez pas.» Alors ils ont pesé pour mon salaire 30 pièces d''argent. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'L''Eternel m''a dit: «Jette-le au potier, *ce prix magnifique auquel ils m''ont estimé!» J''ai donc pris les 30 pièces d''argent et je les ai jetées dans la maison de l''Eternel pour le potier'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ce prix… potier: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 27.9-10
      metadata:
        usfm: MAT.27.9+MAT.27.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Puis j'ai brisé ma seconde houlette, Union, pour rompre la fraternité entre Juda et Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L''Eternel m''a dit: «Prends encore l''équipement d''un berger fou! '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'En effet, je fais surgir dans le pays un berger qui ne s''occupera pas des brebis disparues. Il n''ira pas à la recherche des plus jeunes, il ne soignera pas les blessées, il ne nourrira pas les bien portantes, mais il mangera la viande des plus grasses et arrachera leurs sabots. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Malheur au berger indigne qui abandonne ses brebis! Que l'épée déchire son bras et crève son œil droit! Que son bras se dessèche et que son œil droit soit perdu!»
