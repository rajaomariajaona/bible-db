document_id: MAT.17,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La transfiguration
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Six jours après, Jésus prit avec lui Pierre, Jacques et son frère Jean, et il les conduisit à l''écart sur une haute montagne. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les disciples lui posèrent cette question: «Pourquoi donc les spécialistes de la loi disent-ils qu''Elie doit venir d''abord?» '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur répondit: «Il est vrai qu''Elie doit venir [d''abord] et rétablir toutes choses, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais je vous le dis: Elie est déjà venu, ils ne l''ont pas reconnu et ils l''ont traité comme ils ont voulu. De même le Fils de l''homme souffrira de leur part.» '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les disciples comprirent alors qu'il leur parlait de Jean-Baptiste.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Guérison d'un épileptique
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu''ils furent arrivés près de la foule, un homme vint se jeter à genoux devant Jésus et dit: '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Seigneur, aie pitié de mon fils qui est épileptique et qui souffre cruellement; il tombe souvent dans le feu ou dans l''eau. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je l''ai amené à tes disciples et ils n''ont pas pu le guérir.» '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Génération incrédule et perverse, répondit Jésus, jusqu''à quand serai-je avec vous? Jusqu''à quand devrai-je vous supporter? Amenez-le-moi ici.» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jésus menaça le démon, qui sortit de l'enfant, et celui-ci fut guéri à partir de ce moment-là.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors les disciples s''approchèrent de Jésus et lui dirent en privé: «Pourquoi n''avons-nous pas pu chasser ce démon?» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fut transfiguré devant eux; son visage resplendit comme le soleil et ses vêtements devinrent blancs comme la lumière. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«C''est parce que vous manquez de foi, leur dit Jésus. Je vous le dis en vérité, si vous aviez de la foi comme un grain de moutarde, vous diriez à cette montagne: ‘Déplace-toi d''ici jusque-là’, et elle se déplacerait; rien ne vous serait impossible. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '[Cependant, cette sorte de démon ne sort que par la prière et par le jeûne.]»'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant qu''ils parcouraient la Galilée, Jésus leur dit: «Le Fils de l''homme doit être livré entre les mains des hommes; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ils le feront mourir et le troisième jour il ressuscitera.» Ils furent profondément attristés.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu''ils arrivèrent à Capernaüm, ceux qui percevaient l''impôt annuel s''approchèrent de Pierre et lui dirent: «Votre maître ne paie-t-il pas l''impôt annuel?» '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Si», dit-il. Quand il fut entré dans la maison, Jésus prit les devants et dit: «Qu''en penses-tu, Simon? Les rois de la terre, de qui perçoivent-ils des taxes ou des impôts? De leurs fils ou des étrangers?» '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il lui dit: «Des étrangers.» Jésus lui répondit: «Les fils en sont donc exemptés. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cependant, pour ne pas les choquer, va au lac, jette l'hameçon et tire le premier poisson qui viendra; ouvre-lui la bouche et tu trouveras de l'argent
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'De l''argent: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: littéralement un statère, le montant exact de l'impôt annuel du temple pour deux personnes.
      marker-yv: yv-n
    - type: text
      text: . Prends-le et donne-le-leur pour moi et pour toi.»
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et voici que Moïse et Elie leur apparurent; ils s''entretenaient avec lui. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre prit la parole et dit à Jésus: «Seigneur, il est bon que nous soyons ici. Si tu le veux, faisons ici trois abris: un pour toi, un pour Moïse et un pour Elie.» '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme il parlait encore, une nuée lumineuse les couvrit. De la nuée une voix fit entendre ces paroles: «Celui-ci est mon Fils bien-aimé, qui a toute mon approbation: écoutez-le!» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu''ils entendirent cette voix, les disciples tombèrent le visage contre terre et furent saisis d''une grande frayeur. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Jésus s''approcha d''eux, les toucha et dit: «Levez-vous, n''ayez pas peur!» '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils levèrent les yeux et ne virent plus que Jésus seul.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme ils descendaient de la montagne, Jésus leur donna cet ordre: «Ne parlez à personne de ce que vous avez vu jusqu''à ce que le Fils de l''homme soit ressuscité.»'
