document_id: JOS.13,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Partage du pays promis
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 13.1–24.33
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Territoire encore à conquérir
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Josué était vieux, il était d''un âge avancé. L''Eternel lui dit alors: «Tu es devenu vieux, tu es d''un âge avancé et le pays qu''il te reste à conquérir est très grand. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'ainsi que par toutes les villes de Sihon, roi des Amoréens, qui régnait à Hesbon, jusqu''à la frontière avec les Ammonites. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Il couvrait aussi Galaad, le territoire des Gueshuriens et des Maacathiens, tout le mont Hermon et tout le Basan, jusqu''à Salca; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'tout le royaume d''Og en Basan, qui régnait à Ashtaroth et à Edréï et qui était un des derniers Rephaïm. Moïse battit ces rois et les chassa, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: mais les Israélites ne chassèrent pas les Gueshuriens et les Maacathiens, et ils ont habité au milieu d'Israël jusqu'à aujourd'hui.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: La tribu de Lévi fut la seule à laquelle Moïse ne donna pas d'héritage. Les sacrifices passés par le feu devant l'Eternel, le Dieu d'Israël, tel fut son héritage, comme il le lui avait dit.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Moïse avait donné une part aux clans de la tribu de Ruben. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Leur territoire couvrait, à partir d''Aroër sur les bords du torrent de l''Arnon, à partir de la ville qui se trouve au milieu de la vallée, toute la plaine près de Médeba, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Hesbon et toutes ses villes dans la plaine, c''est-à-dire Dibon, Bamoth-Baal, Beth-Baal-Meon, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Jahats, Kedémoth, Méphaath, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Kirjathaïm, Sibma, ainsi que Tséreth-Hashachar sur la montagne qui domine la vallée, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Voici le pays qui reste: tous les districts des Philistins et tout le territoire des Gueshuriens, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Beth-Peor, les coteaux du Pisga, Beth-Jeshimoth, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'toutes les villes de la plaine et tout le royaume de Sihon, le roi des Amoréens, qui régnait à Hesbon. Moïse l''avait battu, lui et les princes de Madian qui dépendaient de lui et habitaient dans le pays: Evi, Rékem, Tsur, Hur et Réba. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Parmi ceux que les Israélites tuèrent alors par l''épée figurait le devin Balaam, fils de Beor. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Le Jourdain servait de limite au territoire des Rubénites. Voilà quel fut l'héritage des clans des Rubénites, avec les villes et leurs villages.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Moïse avait donné une part à la tribu de Gad, aux clans des Gadites. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ils eurent pour territoire Jaezer, toutes les villes de Galaad et la moitié du pays des Ammonites jusqu''à Aroër vis-à-vis de Rabba. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Leur territoire s''étendait depuis Hesbon jusqu''à Ramath-Mitspé et Bethonim, depuis Mahanaïm jusqu''à la frontière de Debir, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'et, dans la vallée, il comprenait Beth-Haram, Beth-Nimra, Succoth et Tsaphon, c''est-à-dire ce qui restait du royaume de Sihon, le roi de Hesbon. Il avait le Jourdain pour frontière jusqu''à l''extrémité du lac de Génésareth; il se trouvait de l''autre côté du Jourdain, à l''est. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Voilà quel fut l'héritage des clans des Gadites, avec les villes et leurs villages.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Moïse avait donné une part à la demi-tribu de Manassé, aux clans des Manassites. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'depuis le Shichor qui coule à la frontière de l''Egypte jusqu''à la frontière d''Ekron au nord. Cette région doit être considérée comme cananéenne et est occupée par les cinq princes des Philistins, celui de Gaza, celui d''Asdod, celui d''Askalon, celui de Gath et celui d''Ekron, ainsi que par les Avviens '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Leur territoire comprenait, à partir de Mahanaïm, tout le Basan, tout le royaume d''Og, roi du Basan, et tous les bourgs de Jaïr en Basan, au nombre de 60. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: La moitié de Galaad ainsi qu'Ashtaroth et Edréï, les villes du royaume d'Og en Basan, furent attribuées aux descendants de Makir, le fils de Manassé. Elles furent attribuées à la moitié des clans des descendants de Makir.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Telles sont les parts que fit Moïse, lorsqu'il se trouvait dans les plaines de Moab à l'est du Jourdain, vis-à-vis de Jéricho.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Moïse ne donna pas d'héritage à la tribu de Lévi. L'Eternel, le Dieu d'Israël, était lui-même leur héritage, comme il le leur avait dit.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'au sud. Il reste aussi tout le pays des Cananéens avec Meara, qui appartient aux Sidoniens, jusqu''à Aphek, jusqu''à la frontière avec les Amoréens; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'le pays de Guebal et tout le Liban en direction du soleil levant, depuis Baal-Gad au pied du mont Hermon jusqu''à l''entrée de Hamath; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'tous les habitants de la montagne, depuis le Liban jusqu''à Misrephoth-Maïm, tous les Sidoniens. Je les chasserai devant les Israélites. Donne seulement ce pays en héritage à Israël en procédant à un tirage au sort, comme je te l''ai prescrit. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Divise maintenant ce pays par portions entre les neuf tribus et la demi-tribu de Manassé.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Partage du pays à l'est du Jourdain
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Les Rubénites et les Gadites, avec l''autre moitié de la tribu de Manassé, avaient reçu leur héritage, que Moïse leur avait donné de l''autre côté du Jourdain. Il se trouvait à l''est, conformément à ce que leur avait accordé Moïse, le serviteur de l''Eternel. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Leur territoire s''étendait d''Aroër sur les bords du torrent de l''Arnon, depuis la ville qui se trouve au milieu de la vallée, en passant par toute la plaine de Médeba jusqu''à Dibon '
