document_id: PSA.117,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Louange universelle à Dieu
  - type: text
    content: '*Louez l''Eternel, vous, toutes les nations,'
  - type: text
    content: célébrez-le, vous, tous les peuples
  - type: note
    content: 'Louez… peuples: cité en Romains 15.11.'
  - type: text
    content: ','
  '2':
  - type: text
    content: car sa bonté est grande envers nous
  - type: text
    content: et sa vérité dure éternellement!
  - type: text
    content: Louez l'Eternel!
