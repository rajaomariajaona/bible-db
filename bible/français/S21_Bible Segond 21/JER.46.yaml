document_id: JER.46,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Prophéties sur les nations
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 46.1–51.64
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prophétie sur l'Egypte
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Voici la parole de l'Eternel adressée au prophète Jérémie à propos des nations.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ce jour appartient au Seigneur, à l'Eternel, le maître de l'univers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est un jour de vengeance où il se venge de ses ennemis.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'épée dévore, elle se rassasie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle s'enivre de leur sang.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, c'est un repas sacrificiel pour le Seigneur, pour l'Eternel, le maître de l'univers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui se déroule dans le pays du nord, sur les rives de l'Euphrate.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Monte en Galaad, prends-y du baume,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vierge, fille de l'Egypte!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C''est bien inutilement que tu multiplies les remèdes:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n'y a pas de guérison pour toi.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Les nations ont appris ton déshonneur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tes cris ont rempli la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car les guerriers ont trébuché l'un sur l'autre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont tombés tous ensemble.
  '13':
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Voici la parole adressée par l'Eternel au prophète Jérémie au sujet de Nebucadnetsar, roi de Babylone, qui arrivait pour s'attaquer à l'Egypte.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Annoncez-le en Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: proclamez-le à Migdol,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: proclamez-le à Memphis et à Tachpanès!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dites: «Prends position et prépare-toi,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l'épée dévore tout autour de toi!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Pourquoi tes idoles du dieu Apis sont-elles emportées?»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce dieu ne tient pas debout parce que l'Eternel le renverse.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Le nombre de ceux qui trébuchent augmente.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'en est au point qu'ils tombent les uns sur les autres.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils disent: «Retournons au plus vite vers notre peuple,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans notre pays natal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: loin de l'épée destructrice!»
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Là-bas, ils disent à propos du pharaon, du roi d''Egypte:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Il fait beaucoup de tapage, mais il a laissé passer la bonne occasion.»
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Je suis vivant, déclare le roi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui dont le nom est l'Eternel, le maître de l'univers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi vrai que le Thabor figure parmi les montagnes et que le Carmel s'étend jusqu'à la mer, il arrive.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Prépare tes bagages pour partir en exil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: habitante de l'Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car la ville de Memphis deviendra un sujet de consternation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle sera incendiée et inhabitée.
  '2':
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Sur l'Egypte. Sur l'armée du pharaon Néco, roi d'Egypte, qui se trouvait près du fleuve de l'Euphrate, à Karkemish, et à laquelle Nebucadnetsar, roi de Babylone, infligea une défaite la quatrième année du règne de Jojakim, fils de Josias, sur Juda.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: L'Egypte est une très belle génisse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le taon arrive du nord, il arrive.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Même ses mercenaires, qui étaient pareils à des veaux engraissés au milieu d'elle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tournent le dos. Ils prennent la fuite en masse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne résistent pas, car le jour de leur malheur fond sur eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le moment d'intervenir contre eux est venu.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: L'Egypte ne fait pas plus de bruit qu'un serpent qui se déplace,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils viennent en force,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils arrivent contre elle avec des haches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pareils à des bûcherons.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ils abattent sa forêt
  - type: usfm
    marker: q1
    children:
    - type: text
      text: bien qu'elle soit impénétrable, déclare l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils sont plus nombreux que les sauterelles.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne peut pas les compter.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: La fille de l'Egypte est couverte de honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle est livrée entre les mains du peuple du nord.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'L''Eternel, le maître de l''univers, le Dieu d''Israël, a dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais intervenir contre le dieu Amon de No,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre le pharaon, l'Egypte, ses dieux et ses rois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre le pharaon et ceux qui ont placé leur confiance en lui.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Je les livrerai entre les mains de ceux qui en veulent à leur vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: entre les mains de Nebucadnetsar, roi de Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de ses serviteurs. Cependant, après cela, l'Egypte retrouvera sa situation passée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l'Eternel.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Quant à toi, mon serviteur Jacob, n'aie pas peur!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne te laisse pas effrayer, Israël!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, je vais te délivrer de la terre lointaine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je vais délivrer ta descendance du pays où elle est déportée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jacob reviendra pour connaître la tranquillité et la sécurité.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plus personne ne l'inquiétera.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Toi, mon serviteur Jacob, n'aie pas peur, déclare l'Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, je suis moi-même avec toi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'exterminerai toutes les nations où je t'ai dispersé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais toi, je ne t'exterminerai pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te corrigerai avec justice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne peux vraiment pas te laisser impuni.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Préparez le petit et le grand boucliers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et avancez-vous pour le combat!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Attelez les chevaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que les cavaliers montent à l'assaut!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prenez position avec vos casques,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: affûtez les lances,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: enfilez la cuirasse!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Que vois-je? Ils ont peur, ils reculent!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs vaillants hommes sont mis en pièces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils fuient sans se retourner.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terreur règne de tous côtés, déclare l'Eternel.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Que le soldat rapide ne parvienne pas à s'enfuir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que l'homme vaillant ne parvienne pas à s'échapper!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au nord, sur les rives de l'Euphrate,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont trébuché, ils sont tombés.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Qui est celui qui déborde comme le Nil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme les fleuves à l'eau agitée?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: C'est l'Egypte. Elle déborde comme le Nil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme les fleuves à l'eau agitée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Elle dit: «Je déborderai, je submergerai la terre,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ferai disparaître les villes et leurs habitants.»
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Que les chevaux montent à l'assaut! Que les chars se précipitent!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que les vaillants hommes s'avancent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux d'Ethiopie et de Puth qui manient le petit bouclier
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ceux de Lud qui manient et tendent l'arc!
