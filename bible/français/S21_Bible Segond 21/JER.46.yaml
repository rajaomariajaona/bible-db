document_id: JER.46,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophéties sur les nations
  - type: heading
    content: 46.1–51.64
  - type: heading
    content: Prophétie sur l'Egypte
  - type: text
    content: Voici la parole de l'Eternel adressée au prophète Jérémie à propos des nations.
  '10':
  - type: text
    content: Ce jour appartient au Seigneur, à l'Eternel, le maître de l'univers.
  - type: text
    content: C'est un jour de vengeance où il se venge de ses ennemis.
  - type: text
    content: L'épée dévore, elle se rassasie,
  - type: text
    content: elle s'enivre de leur sang.
  - type: text
    content: Oui, c'est un repas sacrificiel pour le Seigneur, pour l'Eternel, le maître de l'univers,
  - type: text
    content: qui se déroule dans le pays du nord, sur les rives de l'Euphrate.
  '11':
  - type: text
    content: Monte en Galaad, prends-y du baume,
  - type: text
    content: vierge, fille de l'Egypte!
  - type: text
    content: 'C''est bien inutilement que tu multiplies les remèdes:'
  - type: text
    content: il n'y a pas de guérison pour toi.
  '12':
  - type: text
    content: Les nations ont appris ton déshonneur
  - type: text
    content: et tes cris ont rempli la terre,
  - type: text
    content: car les guerriers ont trébuché l'un sur l'autre,
  - type: text
    content: ils sont tombés tous ensemble.
  '13':
  - type: text
    content: Voici la parole adressée par l'Eternel au prophète Jérémie au sujet de Nebucadnetsar, roi de Babylone, qui arrivait pour s'attaquer à l'Egypte.
  '14':
  - type: text
    content: Annoncez-le en Egypte,
  - type: text
    content: proclamez-le à Migdol,
  - type: text
    content: proclamez-le à Memphis et à Tachpanès!
  - type: text
    content: 'Dites: «Prends position et prépare-toi,'
  - type: text
    content: car l'épée dévore tout autour de toi!
  '15':
  - type: text
    content: Pourquoi tes idoles du dieu Apis sont-elles emportées?»
  - type: text
    content: Ce dieu ne tient pas debout parce que l'Eternel le renverse.
  '16':
  - type: text
    content: Le nombre de ceux qui trébuchent augmente.
  - type: text
    content: C'en est au point qu'ils tombent les uns sur les autres.
  - type: text
    content: 'Ils disent: «Retournons au plus vite vers notre peuple,'
  - type: text
    content: dans notre pays natal,
  - type: text
    content: loin de l'épée destructrice!»
  '17':
  - type: text
    content: 'Là-bas, ils disent à propos du pharaon, du roi d''Egypte:'
  - type: text
    content: «Il fait beaucoup de tapage, mais il a laissé passer la bonne occasion.»
  '18':
  - type: text
    content: Je suis vivant, déclare le roi,
  - type: text
    content: celui dont le nom est l'Eternel, le maître de l'univers.
  - type: text
    content: Aussi vrai que le Thabor figure parmi les montagnes et que le Carmel s'étend jusqu'à la mer, il arrive.
  '19':
  - type: text
    content: Prépare tes bagages pour partir en exil,
  - type: text
    content: habitante de l'Egypte,
  - type: text
    content: car la ville de Memphis deviendra un sujet de consternation,
  - type: text
    content: elle sera incendiée et inhabitée.
  '2':
  - type: text
    content: Sur l'Egypte. Sur l'armée du pharaon Néco, roi d'Egypte, qui se trouvait près du fleuve de l'Euphrate, à Karkemish, et à laquelle Nebucadnetsar, roi de Babylone, infligea une défaite la quatrième année du règne de Jojakim, fils de Josias, sur Juda.
  '20':
  - type: text
    content: L'Egypte est une très belle génisse,
  - type: text
    content: mais le taon arrive du nord, il arrive.
  '21':
  - type: text
    content: Même ses mercenaires, qui étaient pareils à des veaux engraissés au milieu d'elle,
  - type: text
    content: tournent le dos. Ils prennent la fuite en masse.
  - type: text
    content: Ils ne résistent pas, car le jour de leur malheur fond sur eux,
  - type: text
    content: le moment d'intervenir contre eux est venu.
  '22':
  - type: text
    content: L'Egypte ne fait pas plus de bruit qu'un serpent qui se déplace,
  - type: text
    content: car ils viennent en force,
  - type: text
    content: ils arrivent contre elle avec des haches,
  - type: text
    content: pareils à des bûcherons.
  '23':
  - type: text
    content: Ils abattent sa forêt
  - type: text
    content: bien qu'elle soit impénétrable, déclare l'Eternel,
  - type: text
    content: car ils sont plus nombreux que les sauterelles.
  - type: text
    content: On ne peut pas les compter.
  '24':
  - type: text
    content: La fille de l'Egypte est couverte de honte,
  - type: text
    content: elle est livrée entre les mains du peuple du nord.
  '25':
  - type: text
    content: 'L''Eternel, le maître de l''univers, le Dieu d''Israël, a dit:'
  - type: text
    content: Je vais intervenir contre le dieu Amon de No,
  - type: text
    content: contre le pharaon, l'Egypte, ses dieux et ses rois,
  - type: text
    content: contre le pharaon et ceux qui ont placé leur confiance en lui.
  '26':
  - type: text
    content: Je les livrerai entre les mains de ceux qui en veulent à leur vie,
  - type: text
    content: entre les mains de Nebucadnetsar, roi de Babylone,
  - type: text
    content: et de ses serviteurs. Cependant, après cela, l'Egypte retrouvera sa situation passée,
  - type: text
    content: déclare l'Eternel.
  '27':
  - type: text
    content: Quant à toi, mon serviteur Jacob, n'aie pas peur!
  - type: text
    content: Ne te laisse pas effrayer, Israël!
  - type: text
    content: En effet, je vais te délivrer de la terre lointaine,
  - type: text
    content: je vais délivrer ta descendance du pays où elle est déportée.
  - type: text
    content: Jacob reviendra pour connaître la tranquillité et la sécurité.
  - type: text
    content: Plus personne ne l'inquiétera.
  '28':
  - type: text
    content: Toi, mon serviteur Jacob, n'aie pas peur, déclare l'Eternel.
  - type: text
    content: En effet, je suis moi-même avec toi.
  - type: text
    content: J'exterminerai toutes les nations où je t'ai dispersé,
  - type: text
    content: mais toi, je ne t'exterminerai pas.
  - type: text
    content: Je te corrigerai avec justice.
  - type: text
    content: Je ne peux vraiment pas te laisser impuni.
  '3':
  - type: text
    content: Préparez le petit et le grand boucliers
  - type: text
    content: et avancez-vous pour le combat!
  '4':
  - type: text
    content: Attelez les chevaux,
  - type: text
    content: que les cavaliers montent à l'assaut!
  - type: text
    content: Prenez position avec vos casques,
  - type: text
    content: affûtez les lances,
  - type: text
    content: enfilez la cuirasse!
  '5':
  - type: text
    content: Que vois-je? Ils ont peur, ils reculent!
  - type: text
    content: Leurs vaillants hommes sont mis en pièces,
  - type: text
    content: ils fuient sans se retourner.
  - type: text
    content: La terreur règne de tous côtés, déclare l'Eternel.
  '6':
  - type: text
    content: Que le soldat rapide ne parvienne pas à s'enfuir,
  - type: text
    content: que l'homme vaillant ne parvienne pas à s'échapper!
  - type: text
    content: Au nord, sur les rives de l'Euphrate,
  - type: text
    content: ils ont trébuché, ils sont tombés.
  '7':
  - type: text
    content: Qui est celui qui déborde comme le Nil,
  - type: text
    content: comme les fleuves à l'eau agitée?
  '8':
  - type: text
    content: C'est l'Egypte. Elle déborde comme le Nil,
  - type: text
    content: comme les fleuves à l'eau agitée.
  - type: text
    content: 'Elle dit: «Je déborderai, je submergerai la terre,'
  - type: text
    content: je ferai disparaître les villes et leurs habitants.»
  '9':
  - type: text
    content: Que les chevaux montent à l'assaut! Que les chars se précipitent!
  - type: text
    content: Que les vaillants hommes s'avancent,
  - type: text
    content: ceux d'Ethiopie et de Puth qui manient le petit bouclier
  - type: text
    content: et ceux de Lud qui manient et tendent l'arc!
