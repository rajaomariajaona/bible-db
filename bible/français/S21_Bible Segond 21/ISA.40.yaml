document_id: ISA.40
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: La consolation d'Israël
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 40.1–66.24
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Venue prochaine du Seigneur
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: «Consolez, consolez mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit votre Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Parlez au cœur de Jérusalem, criez-lui
- type: usfm
  marker: q1
  children:
  - type: text
    text: que sa période de combat est terminée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que sa faute est expiée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'elle a reçu de l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: le salaire de tous ses péchés.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '*Une voix crie dans le désert:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Préparez le chemin de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: faites une route bien droite pour notre Dieu dans les endroits arides!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Toute vallée sera comblée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toute montagne et toute colline abaissées.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce qui est tortueux sera redressé
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les endroits rocailleux aplanis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Alors la gloire de l'Eternel sera révélée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et au même instant tout homme la verra.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.3-5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Une voix… verra: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luc 3.4-6
      metadata:
        usfm: LUK.3.4+LUK.3.5+LUK.3.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' et partiellement en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 3.3
      metadata:
        usfm: MAT.3.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Marc 1.3
      metadata:
        usfm: MRK.1.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jean 1.23
      metadata:
        usfm: JHN.1.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' à propos de Jean-Baptiste.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, c'est l'Eternel qui l'affirme.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Une voix a dit: «Proclame un message!»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Et j''ai répondu: «Que dois-je proclamer?»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «*Toute créature est comme l'herbe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toute sa beauté comme la fleur des champs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: L'herbe sèche et la fleur tombe
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand le vent de l'Eternel souffle dessus.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Vraiment, le peuple est pareil à l''herbe:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: l'herbe sèche et la fleur tombe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais la parole de notre Dieu subsiste éternellement.»
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.6-8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Toute… éternellement: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Pierre 1.24-25
      metadata:
        usfm: 1PE.1.24+1PE.1.25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' avec application à l''Evangile.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Monte sur une haute montagne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sion, pour annoncer la bonne nouvelle!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elève avec force ta voix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jérusalem, pour proclamer la bonne nouvelle!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elève ta voix, n'aie pas peur!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dis aux villes de Juda: «Voici votre Dieu!»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Le Seigneur, l'Eternel vient avec puissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son bras lui assure la souveraineté.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a son salaire avec lui
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa récompense est devant lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Pareil à un berger, il s'occupera de son troupeau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il prendra les agneaux dans ses bras
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les portera contre sa poitrine;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il conduira les brebis qui allaitent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Qui a mesuré les océans dans le creux de sa main?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui a fixé les dimensions du ciel dans une mesure
- type: usfm
  marker: q1
  children:
  - type: text
    text: et fait tenir toute la poussière de la terre dans un tiers de mesure?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui a pesé les montagnes à la balance
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les collines à la bascule?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '*Qui a compris l''Esprit de l''Eternel'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et quel homme a été son conseiller pour l'instruire?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '40.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Qui… l''instruire: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 11.34
      metadata:
        usfm: ROM.11.34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' et '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Corinthiens 2.16
      metadata:
        usfm: 1CO.2.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Avec qui a-t-il délibéré pour se laisser éclairer par lui?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui lui a appris le sentier du droit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lui a enseigné son savoir-faire
- type: usfm
  marker: q1
  children:
  - type: text
    text: et lui a fait connaître le chemin de l'intelligence?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Les nations sont pareilles à une goutte d'eau qui tombe d'un seau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles sont comme de la poussière sur une balance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les îles comme une fine poussière qui s'envole.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Les forêts du Liban ne suffiraient pas à alimenter le feu de l'autel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses animaux seraient en nombre insuffisant pour l'holocauste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Toutes les nations sont réduites à rien devant lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles comptent moins à ses yeux que le néant et le vide.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: A qui voulez-vous comparer Dieu?
- type: usfm
  marker: q1
  children:
  - type: text
    text: A quelle représentation pourriez-vous le comparer?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: C'est un artisan qui fond la statue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puis un orfèvre la couvre d'or
- type: usfm
  marker: q1
  children:
  - type: text
    text: et y soude des chaînettes d'argent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Celui qui est trop pauvre pour une telle offrande
- type: usfm
  marker: q1
  children:
  - type: text
    text: choisit un bois qui ne pourrisse pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il sollicite les services d'un artisan assez habile
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour fabriquer une sculpture sacrée qui ne soit pas branlante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ne le savez-vous pas? Ne l'avez-vous pas appris?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne vous l'a-t-on pas révélé dès le début?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N'avez-vous jamais réfléchi aux fondations de la terre?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: C'est l'Eternel qui siège au-dessus du cercle de la terre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses habitants sont, pour lui, pareils à des sauterelles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il déroule le ciel comme une étoffe légère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il le déploie comme une tente pour en faire son lieu d'habitation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: C'est lui qui réduit les dirigeants à rien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui rend les juges de la terre pareils à du vide.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ils ne sont même pas plantés, même pas semés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leur tronc n'a pas encore développé de racine en terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'il souffle sur eux; ils se dessèchent alors,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le tourbillon les emporte comme un brin de paille.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: A qui me comparerez-vous pour que je lui ressemble?
- type: usfm
  marker: q1
  children:
  - type: text
    text: demande le Saint.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Levez les yeux vers le ciel et regardez!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui a créé cela?
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est celui qui fait sortir les corps célestes en bon ordre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il les appelle tous par leur nom.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son pouvoir est si grand, sa force si puissante
- type: usfm
  marker: q1
  children:
  - type: text
    text: que pas un seul ne manque.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Pourquoi dis-tu, Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et pourquoi affirmes-tu, Israël:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ma situation échappe à l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon droit passe inaperçu de mon Dieu»?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ne le sais-tu pas? Ne l'as-tu pas appris?
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est le Dieu d'éternité, l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui a créé les extrémités de la terre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne se fatigue pas, il ne s'épuise pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son intelligence est impénétrable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Il donne de la force à celui qui est fatigué
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il multiplie les ressources de celui qui est à bout.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Les adolescents se fatiguent et s'épuisent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les jeunes gens se mettent à trébucher,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: mais ceux qui comptent sur l'Eternel renouvellent leur force.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils prennent leur envol comme les aigles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils courent sans s'épuiser,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils marchent sans se fatiguer.
