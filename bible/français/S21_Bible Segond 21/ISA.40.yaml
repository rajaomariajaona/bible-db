document_id: ISA.40,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La consolation d'Israël
  - type: heading
    content: 40.1–66.24
  - type: heading
    content: Venue prochaine du Seigneur
  - type: text
    content: «Consolez, consolez mon peuple,
  - type: text
    content: dit votre Dieu.
  '10':
  - type: text
    content: Le Seigneur, l'Eternel vient avec puissance,
  - type: text
    content: et son bras lui assure la souveraineté.
  - type: text
    content: Il a son salaire avec lui
  - type: text
    content: et sa récompense est devant lui.
  '11':
  - type: text
    content: Pareil à un berger, il s'occupera de son troupeau,
  - type: text
    content: il prendra les agneaux dans ses bras
  - type: text
    content: et les portera contre sa poitrine;
  - type: text
    content: il conduira les brebis qui allaitent.
  '12':
  - type: text
    content: Qui a mesuré les océans dans le creux de sa main?
  - type: text
    content: Qui a fixé les dimensions du ciel dans une mesure
  - type: text
    content: et fait tenir toute la poussière de la terre dans un tiers de mesure?
  - type: text
    content: Qui a pesé les montagnes à la balance
  - type: text
    content: et les collines à la bascule?
  '13':
  - type: text
    content: '*Qui a compris l''Esprit de l''Eternel'
  - type: text
    content: et quel homme a été son conseiller pour l'instruire?
  - type: note
    content: 'Qui… l''instruire: cité en Romains 11.34 et 1 Corinthiens 2.16.'
  '14':
  - type: text
    content: Avec qui a-t-il délibéré pour se laisser éclairer par lui?
  - type: text
    content: Qui lui a appris le sentier du droit,
  - type: text
    content: lui a enseigné son savoir-faire
  - type: text
    content: et lui a fait connaître le chemin de l'intelligence?
  '15':
  - type: text
    content: Les nations sont pareilles à une goutte d'eau qui tombe d'un seau,
  - type: text
    content: elles sont comme de la poussière sur une balance,
  - type: text
    content: et les îles comme une fine poussière qui s'envole.
  '16':
  - type: text
    content: Les forêts du Liban ne suffiraient pas à alimenter le feu de l'autel
  - type: text
    content: et ses animaux seraient en nombre insuffisant pour l'holocauste.
  '17':
  - type: text
    content: Toutes les nations sont réduites à rien devant lui,
  - type: text
    content: elles comptent moins à ses yeux que le néant et le vide.
  '18':
  - type: text
    content: A qui voulez-vous comparer Dieu?
  - type: text
    content: A quelle représentation pourriez-vous le comparer?
  '19':
  - type: text
    content: C'est un artisan qui fond la statue,
  - type: text
    content: puis un orfèvre la couvre d'or
  - type: text
    content: et y soude des chaînettes d'argent.
  '2':
  - type: text
    content: Parlez au cœur de Jérusalem, criez-lui
  - type: text
    content: que sa période de combat est terminée,
  - type: text
    content: que sa faute est expiée,
  - type: text
    content: qu'elle a reçu de l'Eternel
  - type: text
    content: le salaire de tous ses péchés.»
  '20':
  - type: text
    content: Celui qui est trop pauvre pour une telle offrande
  - type: text
    content: choisit un bois qui ne pourrisse pas;
  - type: text
    content: il sollicite les services d'un artisan assez habile
  - type: text
    content: pour fabriquer une sculpture sacrée qui ne soit pas branlante.
  '21':
  - type: text
    content: Ne le savez-vous pas? Ne l'avez-vous pas appris?
  - type: text
    content: Ne vous l'a-t-on pas révélé dès le début?
  - type: text
    content: N'avez-vous jamais réfléchi aux fondations de la terre?
  '22':
  - type: text
    content: C'est l'Eternel qui siège au-dessus du cercle de la terre;
  - type: text
    content: ses habitants sont, pour lui, pareils à des sauterelles.
  - type: text
    content: Il déroule le ciel comme une étoffe légère,
  - type: text
    content: il le déploie comme une tente pour en faire son lieu d'habitation.
  '23':
  - type: text
    content: C'est lui qui réduit les dirigeants à rien,
  - type: text
    content: qui rend les juges de la terre pareils à du vide.
  '24':
  - type: text
    content: Ils ne sont même pas plantés, même pas semés,
  - type: text
    content: leur tronc n'a pas encore développé de racine en terre
  - type: text
    content: qu'il souffle sur eux; ils se dessèchent alors,
  - type: text
    content: le tourbillon les emporte comme un brin de paille.
  '25':
  - type: text
    content: A qui me comparerez-vous pour que je lui ressemble?
  - type: text
    content: demande le Saint.
  '26':
  - type: text
    content: Levez les yeux vers le ciel et regardez!
  - type: text
    content: Qui a créé cela?
  - type: text
    content: C'est celui qui fait sortir les corps célestes en bon ordre.
  - type: text
    content: Il les appelle tous par leur nom.
  - type: text
    content: Son pouvoir est si grand, sa force si puissante
  - type: text
    content: que pas un seul ne manque.
  '27':
  - type: text
    content: Pourquoi dis-tu, Jacob,
  - type: text
    content: 'et pourquoi affirmes-tu, Israël:'
  - type: text
    content: «Ma situation échappe à l'Eternel,
  - type: text
    content: mon droit passe inaperçu de mon Dieu»?
  '28':
  - type: text
    content: Ne le sais-tu pas? Ne l'as-tu pas appris?
  - type: text
    content: C'est le Dieu d'éternité, l'Eternel,
  - type: text
    content: qui a créé les extrémités de la terre.
  - type: text
    content: Il ne se fatigue pas, il ne s'épuise pas.
  - type: text
    content: Son intelligence est impénétrable.
  '29':
  - type: text
    content: Il donne de la force à celui qui est fatigué
  - type: text
    content: et il multiplie les ressources de celui qui est à bout.
  '3':
  - type: text
    content: '*Une voix crie dans le désert:'
  - type: text
    content: «Préparez le chemin de l'Eternel,
  - type: text
    content: faites une route bien droite pour notre Dieu dans les endroits arides!
  '30':
  - type: text
    content: Les adolescents se fatiguent et s'épuisent,
  - type: text
    content: les jeunes gens se mettent à trébucher,
  '31':
  - type: text
    content: mais ceux qui comptent sur l'Eternel renouvellent leur force.
  - type: text
    content: Ils prennent leur envol comme les aigles.
  - type: text
    content: Ils courent sans s'épuiser,
  - type: text
    content: ils marchent sans se fatiguer.
  '4':
  - type: text
    content: Toute vallée sera comblée,
  - type: text
    content: toute montagne et toute colline abaissées.
  - type: text
    content: Ce qui est tortueux sera redressé
  - type: text
    content: et les endroits rocailleux aplanis.
  '5':
  - type: text
    content: Alors la gloire de l'Eternel sera révélée,
  - type: text
    content: et au même instant tout homme la verra.
  - type: note
    content: 'Une voix… verra: cité en Luc 3.4-6 et partiellement en Matthieu 3.3; Marc 1.3; Jean 1.23 à propos de Jean-Baptiste.'
  - type: text
    content: Oui, c'est l'Eternel qui l'affirme.»
  '6':
  - type: text
    content: 'Une voix a dit: «Proclame un message!»'
  - type: text
    content: 'Et j''ai répondu: «Que dois-je proclamer?»'
  - type: text
    content: «*Toute créature est comme l'herbe,
  - type: text
    content: et toute sa beauté comme la fleur des champs.
  '7':
  - type: text
    content: L'herbe sèche et la fleur tombe
  - type: text
    content: quand le vent de l'Eternel souffle dessus.
  - type: text
    content: 'Vraiment, le peuple est pareil à l''herbe:'
  '8':
  - type: text
    content: l'herbe sèche et la fleur tombe,
  - type: text
    content: mais la parole de notre Dieu subsiste éternellement.»
  - type: note
    content: 'Toute… éternellement: cité en 1 Pierre 1.24-25 avec application à l''Evangile.'
  '9':
  - type: text
    content: Monte sur une haute montagne,
  - type: text
    content: Sion, pour annoncer la bonne nouvelle!
  - type: text
    content: Elève avec force ta voix,
  - type: text
    content: Jérusalem, pour proclamer la bonne nouvelle!
  - type: text
    content: Elève ta voix, n'aie pas peur!
  - type: text
    content: 'Dis aux villes de Juda: «Voici votre Dieu!»'
