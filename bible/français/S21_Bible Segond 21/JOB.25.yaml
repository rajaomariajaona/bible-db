document_id: JOB.25,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Intervention n° 3 de Bildad
  - type: text
    content: 'Bildad de Shuach prit la parole et dit:'
  '2':
  - type: text
    content: «Dieu exerce la domination et la terreur,
  - type: text
    content: il fait régner la paix dans les lieux célestes.
  '3':
  - type: text
    content: Ses troupes sont innombrables.
  - type: text
    content: Sur qui sa lumière ne se lève-t-elle pas?
  '4':
  - type: text
    content: »Comment un homme pourrait-il être juste devant Dieu?
  - type: text
    content: Comment celui qui est né d'une femme pourrait-il être pur?
  '5':
  - type: text
    content: Même la lune n'est pas brillante
  - type: text
    content: et les étoiles ne sont pas pures à ses yeux.
  '6':
  - type: text
    content: Ce sera d'autant moins le cas de l'homme, ce ver,
  - type: text
    content: de l'être humain, cette larve!»
