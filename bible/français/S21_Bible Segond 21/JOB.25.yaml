document_id: JOB.25
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Intervention n° 3 de Bildad
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Bildad de Shuach prit la parole et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Dieu exerce la domination et la terreur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il fait régner la paix dans les lieux célestes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ses troupes sont innombrables.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur qui sa lumière ne se lève-t-elle pas?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: »Comment un homme pourrait-il être juste devant Dieu?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comment celui qui est né d'une femme pourrait-il être pur?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Même la lune n'est pas brillante
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les étoiles ne sont pas pures à ses yeux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ce sera d'autant moins le cas de l'homme, ce ver,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de l'être humain, cette larve!»
