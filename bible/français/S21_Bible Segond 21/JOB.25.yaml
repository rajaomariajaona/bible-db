document_id: JOB.25,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Intervention n° 3 de Bildad
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bildad de Shuach prit la parole et dit:'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Dieu exerce la domination et la terreur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il fait régner la paix dans les lieux célestes.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses troupes sont innombrables.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur qui sa lumière ne se lève-t-elle pas?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Comment un homme pourrait-il être juste devant Dieu?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment celui qui est né d'une femme pourrait-il être pur?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même la lune n'est pas brillante
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les étoiles ne sont pas pures à ses yeux.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sera d'autant moins le cas de l'homme, ce ver,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de l'être humain, cette larve!»
