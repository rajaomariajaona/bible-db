document_id: ZEC.14,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le jour de l'Eternel
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici qu'arrive un jour pour l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'on partagera au milieu de toi le butin qu'on t'a pris.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout le pays se transformera en plaine, de Guéba à Rimmon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au sud de Jérusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jérusalem sera élevée et restera à sa place,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de la porte de Benjamin jusqu'à l'emplacement de la première porte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu'à la porte des angles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de la tour de Hananeel jusqu'aux pressoirs du roi.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On y habitera, et il n'y aura plus de menace de destruction.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jérusalem sera en sécurité.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici le fléau dont l'Eternel frappera tous les peuples
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'qui auront combattu contre Jérusalem:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il fera pourrir leur chair pendant qu'ils seront debout,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leurs yeux pourriront dans l'orbite
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leur langue pourrira dans leur bouche.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce jour-là, l'Eternel provoquera une grande panique parmi eux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chacun empoignera l'autre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils lèveront la main les uns contre les autres.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Juda combattra aussi à Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'on amassera les richesses de toutes les nations environnantes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'or, l'argent et des habits en très grande quantité.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un même fléau frappera les chevaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les mulets, les chameaux, les ânes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et toutes les bêtes qui seront dans ces camps:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce fléau sera semblable à l'autre.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous les survivants de toutes les nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: venues attaquer Jérusalem
  - type: usfm
    marker: q1
    children:
    - type: text
      text: y monteront chaque année
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour adorer le roi, l'Eternel, le maître de l'univers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour célébrer la fête des tentes.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si une famille de la terre ne monte pas à Jérusalem
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour adorer le roi, l'Eternel, le maître de l'univers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la pluie ne tombera pas sur elle.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si la famille d'Egypte ne monte pas, si elle ne vient pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la pluie ne tombera pas sur elle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle sera frappée du fléau dont l'Eternel frappera les nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui ne monteront pas pour célébrer la fête des tentes.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sera la punition de l'Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la punition de toutes les nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui ne monteront pas pour célébrer la fête des tentes.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je rassemblerai toutes les nations pour qu''elles attaquent Jérusalem:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la ville sera prise, les maisons seront pillées, et les femmes violées;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la moitié de la ville partira en exil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le reste du peuple ne sera pas éliminé de la ville.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ce jour-là, il sera écrit sur les clochettes des chevaux:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Consacré à l'Eternel!»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les marmites dans la maison de l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: seront consacrées comme les coupes devant l'autel.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toute marmite à Jérusalem et dans Juda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sera consacrée à l'Eternel, le maître de l'univers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui offriront des sacrifices viendront
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et s'en serviront pour cuire les viandes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il n'y aura plus de marchands dans la maison de l'Eternel, le maître de l'univers, ce jour-là.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel sortira et combattra contre ces nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme il combat le jour de la bataille.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses pieds se poseront, ce jour-là, sur le mont des Oliviers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui est vis-à-vis de Jérusalem, du côté est.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le mont des Oliviers se fendra par le milieu, d'est en ouest,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et une très grande vallée se formera.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une moitié de la montagne reculera vers le nord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et une moitié vers le sud.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous fuirez alors la vallée de mes montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car la vallée des montagnes s'étendra jusqu'à Atzel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous fuirez comme vous avez fui devant le tremblement de terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lors du règne d'Ozias sur Juda.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel, mon Dieu, viendra avec tous les saints.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce jour-là, il n'y aura pas de lumière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de froid ni de glace.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sera un jour unique, connu de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui ne sera ni jour ni nuit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais vers le soir il y aura de la lumière.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce jour-là, de l'eau vive sortira de Jérusalem
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et coulera, une moitié vers la mer Morte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'autre moitié vers la Méditerranée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sera le cas été et hiver.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel sera le roi de toute la terre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce jour-là, l'Eternel sera le seul Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son nom sera le seul nom.
