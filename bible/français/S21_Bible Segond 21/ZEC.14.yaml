document_id: ZEC.14,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le jour de l'Eternel
  - type: text
    content: Voici qu'arrive un jour pour l'Eternel,
  - type: text
    content: et l'on partagera au milieu de toi le butin qu'on t'a pris.
  '10':
  - type: text
    content: Tout le pays se transformera en plaine, de Guéba à Rimmon,
  - type: text
    content: au sud de Jérusalem.
  - type: text
    content: Jérusalem sera élevée et restera à sa place,
  - type: text
    content: de la porte de Benjamin jusqu'à l'emplacement de la première porte,
  - type: text
    content: jusqu'à la porte des angles,
  - type: text
    content: et de la tour de Hananeel jusqu'aux pressoirs du roi.
  '11':
  - type: text
    content: On y habitera, et il n'y aura plus de menace de destruction.
  - type: text
    content: Jérusalem sera en sécurité.
  '12':
  - type: text
    content: Voici le fléau dont l'Eternel frappera tous les peuples
  - type: text
    content: 'qui auront combattu contre Jérusalem:'
  - type: text
    content: il fera pourrir leur chair pendant qu'ils seront debout,
  - type: text
    content: leurs yeux pourriront dans l'orbite
  - type: text
    content: et leur langue pourrira dans leur bouche.
  '13':
  - type: text
    content: Ce jour-là, l'Eternel provoquera une grande panique parmi eux.
  - type: text
    content: Chacun empoignera l'autre,
  - type: text
    content: et ils lèveront la main les uns contre les autres.
  '14':
  - type: text
    content: Juda combattra aussi à Jérusalem,
  - type: text
    content: et l'on amassera les richesses de toutes les nations environnantes,
  - type: text
    content: l'or, l'argent et des habits en très grande quantité.
  '15':
  - type: text
    content: Un même fléau frappera les chevaux,
  - type: text
    content: les mulets, les chameaux, les ânes
  - type: text
    content: 'et toutes les bêtes qui seront dans ces camps:'
  - type: text
    content: ce fléau sera semblable à l'autre.
  '16':
  - type: text
    content: Tous les survivants de toutes les nations
  - type: text
    content: venues attaquer Jérusalem
  - type: text
    content: y monteront chaque année
  - type: text
    content: pour adorer le roi, l'Eternel, le maître de l'univers,
  - type: text
    content: et pour célébrer la fête des tentes.
  '17':
  - type: text
    content: Si une famille de la terre ne monte pas à Jérusalem
  - type: text
    content: pour adorer le roi, l'Eternel, le maître de l'univers,
  - type: text
    content: la pluie ne tombera pas sur elle.
  '18':
  - type: text
    content: Si la famille d'Egypte ne monte pas, si elle ne vient pas,
  - type: text
    content: la pluie ne tombera pas sur elle,
  - type: text
    content: elle sera frappée du fléau dont l'Eternel frappera les nations
  - type: text
    content: qui ne monteront pas pour célébrer la fête des tentes.
  '19':
  - type: text
    content: Ce sera la punition de l'Egypte,
  - type: text
    content: la punition de toutes les nations
  - type: text
    content: qui ne monteront pas pour célébrer la fête des tentes.
  '2':
  - type: text
    content: 'Je rassemblerai toutes les nations pour qu''elles attaquent Jérusalem:'
  - type: text
    content: la ville sera prise, les maisons seront pillées, et les femmes violées;
  - type: text
    content: la moitié de la ville partira en exil,
  - type: text
    content: mais le reste du peuple ne sera pas éliminé de la ville.
  '20':
  - type: text
    content: 'Ce jour-là, il sera écrit sur les clochettes des chevaux:'
  - type: text
    content: «Consacré à l'Eternel!»
  - type: text
    content: Les marmites dans la maison de l'Eternel
  - type: text
    content: seront consacrées comme les coupes devant l'autel.
  '21':
  - type: text
    content: Toute marmite à Jérusalem et dans Juda
  - type: text
    content: sera consacrée à l'Eternel, le maître de l'univers.
  - type: text
    content: Tous ceux qui offriront des sacrifices viendront
  - type: text
    content: et s'en serviront pour cuire les viandes,
  - type: text
    content: et il n'y aura plus de marchands dans la maison de l'Eternel, le maître de l'univers, ce jour-là.
  '3':
  - type: text
    content: L'Eternel sortira et combattra contre ces nations,
  - type: text
    content: comme il combat le jour de la bataille.
  '4':
  - type: text
    content: Ses pieds se poseront, ce jour-là, sur le mont des Oliviers
  - type: text
    content: qui est vis-à-vis de Jérusalem, du côté est.
  - type: text
    content: Le mont des Oliviers se fendra par le milieu, d'est en ouest,
  - type: text
    content: et une très grande vallée se formera.
  - type: text
    content: Une moitié de la montagne reculera vers le nord,
  - type: text
    content: et une moitié vers le sud.
  '5':
  - type: text
    content: Vous fuirez alors la vallée de mes montagnes,
  - type: text
    content: car la vallée des montagnes s'étendra jusqu'à Atzel;
  - type: text
    content: vous fuirez comme vous avez fui devant le tremblement de terre,
  - type: text
    content: lors du règne d'Ozias sur Juda.
  - type: text
    content: L'Eternel, mon Dieu, viendra avec tous les saints.
  '6':
  - type: text
    content: Ce jour-là, il n'y aura pas de lumière,
  - type: text
    content: de froid ni de glace.
  '7':
  - type: text
    content: Ce sera un jour unique, connu de l'Eternel,
  - type: text
    content: et qui ne sera ni jour ni nuit,
  - type: text
    content: mais vers le soir il y aura de la lumière.
  '8':
  - type: text
    content: Ce jour-là, de l'eau vive sortira de Jérusalem
  - type: text
    content: et coulera, une moitié vers la mer Morte,
  - type: text
    content: l'autre moitié vers la Méditerranée.
  - type: text
    content: Ce sera le cas été et hiver.
  '9':
  - type: text
    content: L'Eternel sera le roi de toute la terre.
  - type: text
    content: Ce jour-là, l'Eternel sera le seul Eternel,
  - type: text
    content: et son nom sera le seul nom.
