document_id: PSA.124,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu protège et délivre les siens
  - type: text
    content: Chant des montées, de David.
  - type: text
    content: Si l'Eternel n'avait pas été pour nous
  - type: text
    content: – qu'Israël le dise –
  '2':
  - type: text
    content: si l'Eternel n'avait pas été pour nous
  - type: text
    content: lorsque des hommes sont venus nous attaquer,
  '3':
  - type: text
    content: ils nous auraient engloutis vivants
  - type: text
    content: quand leur colère s'est enflammée contre nous.
  '4':
  - type: text
    content: Oui, l'eau nous aurait emportés,
  - type: text
    content: les torrents nous auraient submergés.
  '5':
  - type: text
    content: Oui, ils nous auraient submergés,
  - type: text
    content: les flots impétueux.
  '6':
  - type: text
    content: Béni soit l'Eternel
  - type: text
    content: qui ne nous a pas livrés en pâture à leurs dents!
  '7':
  - type: text
    content: 'Nous nous sommes échappés comme l''oiseau du piège des oiseleurs:'
  - type: text
    content: le filet s'est rompu, et nous nous sommes échappés.
  '8':
  - type: text
    content: Notre secours est dans le nom de l'Eternel,
  - type: text
    content: qui a fait le ciel et la terre.
