document_id: PSA.124,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu protège et délivre les siens
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Chant des montées, de David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si l'Eternel n'avait pas été pour nous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – qu'Israël le dise –
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si l'Eternel n'avait pas été pour nous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsque des hommes sont venus nous attaquer,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils nous auraient engloutis vivants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand leur colère s'est enflammée contre nous.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, l'eau nous aurait emportés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les torrents nous auraient submergés.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, ils nous auraient submergés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les flots impétueux.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Béni soit l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui ne nous a pas livrés en pâture à leurs dents!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Nous nous sommes échappés comme l''oiseau du piège des oiseleurs:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le filet s'est rompu, et nous nous sommes échappés.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Notre secours est dans le nom de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui a fait le ciel et la terre.
