document_id: PSA.124
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu protège et délivre les siens
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Chant des montées, de David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si l'Eternel n'avait pas été pour nous
- type: usfm
  marker: q1
  children:
  - type: text
    text: – qu'Israël le dise –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: si l'Eternel n'avait pas été pour nous
- type: usfm
  marker: q1
  children:
  - type: text
    text: lorsque des hommes sont venus nous attaquer,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ils nous auraient engloutis vivants
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand leur colère s'est enflammée contre nous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Oui, l'eau nous aurait emportés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les torrents nous auraient submergés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Oui, ils nous auraient submergés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les flots impétueux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Béni soit l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ne nous a pas livrés en pâture à leurs dents!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nous nous sommes échappés comme l''oiseau du piège des oiseleurs:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: le filet s'est rompu, et nous nous sommes échappés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Notre secours est dans le nom de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui a fait le ciel et la terre.
