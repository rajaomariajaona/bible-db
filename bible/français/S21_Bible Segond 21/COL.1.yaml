document_id: COL.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation et louange
  - type: text
    content: 'De la part de Paul, apôtre de Jésus-Christ par la volonté de Dieu, et du frère Timothée '
  '10':
  - type: text
    content: 'pour marcher d''une manière digne du Seigneur et lui plaire entièrement. Vous aurez pour fruits toutes sortes d''œuvres bonnes et vous progresserez dans la connaissance de Dieu, '
  '11':
  - type: text
    content: 'vous serez fortifiés à tout point de vue par sa puissance glorieuse pour être toujours et avec joie persévérants et patients, '
  '12':
  - type: text
    content: 'et vous exprimerez votre reconnaissance au Père qui nous a rendus capables de prendre part à l''héritage des saints dans la lumière. '
  '13':
  - type: text
    content: 'Il nous a délivrés de la puissance des ténèbres et nous a transportés dans le royaume de son Fils bien-aimé, '
  '14':
  - type: text
    content: en qui nous sommes rachetés, pardonnés de nos péchés.
  - type: heading
    content: La prééminence et l'œuvre de Christ
  '15':
  - type: text
    content: 'Le Fils est l''image du Dieu invisible, le premier-né de toute la création. '
  '16':
  - type: text
    content: 'En effet, c''est en lui que tout a été créé dans le ciel et sur la terre, le visible et l''invisible, trônes, souverainetés, dominations, autorités. Tout a été créé par lui et pour lui. '
  '17':
  - type: text
    content: 'Il existe avant toutes choses et tout subsiste en lui. '
  '18':
  - type: text
    content: 'Il est la tête du corps qu''est l''Eglise; il est le commencement, le premier-né d''entre les morts, afin d''être en tout le premier. '
  '19':
  - type: text
    content: 'En effet, Dieu a voulu que toute sa plénitude habite en lui. '
  '2':
  - type: text
    content: aux saints
  - type: note
    content: 'Saints: manière de désigner les chrétiens en tant que personnes consacrées à Dieu et appelées à avoir le comportement qui découle de leur appartenance à ce Dieu.'
  - type: text
    content: ' qui sont à Colosses, nos fidèles frères et sœurs en Christ: que la grâce et la paix vous soient données de la part de Dieu notre Père et du Seigneur Jésus-Christ!'
  '20':
  - type: text
    content: Il a voulu par Christ tout réconcilier avec lui-même, aussi bien ce qui est sur la terre que ce qui est dans le ciel, en faisant la paix à travers lui, par son sang versé sur la croix.
  '21':
  - type: text
    content: Et vous qui étiez autrefois étrangers
  - type: note
    content: 'Etrangers: les non-Juifs étaient exclus des privilèges de la relation avec Dieu auxquels les Juifs avaient accès.'
  - type: text
    content: ' et ennemis de Dieu par vos pensées et par vos œuvres mauvaises, il vous a maintenant réconciliés '
  '22':
  - type: text
    content: 'par la mort [de son Fils] dans son corps de chair pour vous faire paraître devant lui saints, sans défaut et sans reproche. '
  '23':
  - type: text
    content: Mais il faut que vous restiez fondés et inébranlables dans la foi, sans vous détourner de l'espérance de l'Evangile que vous avez entendu, qui a été proclamé à toute créature sous le ciel et dont moi, Paul, je suis devenu le serviteur.
  - type: heading
    content: Le combat de Paul pour l'Eglise
  '24':
  - type: text
    content: Je me réjouis maintenant dans mes souffrances pour vous et je supplée dans ma vie à ce qui manque aux peines infligées à Christ
  - type: note
    content: 'Ce qui manque… Christ: le mot grec utilisé ici désigne l''hostilité qu''a subie Christ et que ses disciples subissent à leur tour lorsqu''ils prêchent l''Evangile. Christ est solidaire des persécutions infligées aux siens: elles l''atteignent autant qu''eux (voir Actes 9.4-5).'
  - type: text
    content: ' pour son corps, c''est-à-dire l''Eglise. '
  '25':
  - type: text
    content: 'C''est d''elle que je suis devenu le serviteur, conformément à la charge que Dieu m''a confiée pour vous: annoncer pleinement la parole de Dieu, '
  '26':
  - type: text
    content: 'le mystère caché de tout temps et à toutes les générations, mais révélé maintenant à ses saints. '
  '27':
  - type: text
    content: En effet, Dieu a voulu leur faire connaître la glorieuse richesse de ce mystère parmi les non-Juifs, c'est-à-dire Christ en vous, l'espérance de la gloire.
  '28':
  - type: text
    content: 'C''est lui que nous annonçons, en avertissant et en instruisant toute personne en toute sagesse, afin de présenter à Dieu toute personne devenue adulte en [Jésus-]Christ. '
  '29':
  - type: text
    content: C'est à cela que je travaille en combattant avec sa force qui agit puissamment en moi.
  '3':
  - type: text
    content: 'Nous disons constamment toute notre reconnaissance à Dieu, le Père de notre Seigneur Jésus-Christ, lorsque nous prions pour vous. '
  '4':
  - type: text
    content: 'En effet, nous avons été informés de votre foi en Jésus-Christ et de l''amour que vous avez pour tous les saints '
  '5':
  - type: text
    content: 'à cause de l''espérance qui vous est réservée au ciel. Cette espérance, vous en avez déjà entendu parler par la parole de la vérité, l''Evangile. '
  '6':
  - type: text
    content: 'Il est parvenu jusqu''à vous tout comme dans le monde entier, où il porte des fruits et progresse. C''est d''ailleurs aussi le cas parmi vous depuis le jour où vous avez entendu et connu la grâce de Dieu dans la vérité, '
  '7':
  - type: text
    content: 'suivant l''enseignement que vous avez reçu d''Epaphras, notre bien-aimé compagnon de service. Il est pour vous un fidèle serviteur de Christ, '
  '8':
  - type: text
    content: et il nous a appris de quel amour l'Esprit vous anime.
  '9':
  - type: text
    content: 'Voilà pourquoi nous aussi, depuis le jour où nous en avons été informés, nous ne cessons de prier Dieu pour vous. Nous demandons que vous soyez remplis de la connaissance de sa volonté, en toutes sagesse et intelligence spirituelles, '
