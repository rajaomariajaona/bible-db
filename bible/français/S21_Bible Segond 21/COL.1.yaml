document_id: COL.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salutation et louange
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'De la part de Paul, apôtre de Jésus-Christ par la volonté de Dieu, et du frère Timothée '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: aux saints
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Saints: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: manière de désigner les chrétiens en tant que personnes consacrées à Dieu et appelées à avoir le comportement qui découle de leur appartenance à ce Dieu.
    marker-yv: yv-n
  - type: text
    text: ' qui sont à Colosses, nos fidèles frères et sœurs en Christ: que la grâce et la paix vous soient données de la part de Dieu notre Père et du Seigneur Jésus-Christ!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nous disons constamment toute notre reconnaissance à Dieu, le Père de notre Seigneur Jésus-Christ, lorsque nous prions pour vous. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'En effet, nous avons été informés de votre foi en Jésus-Christ et de l''amour que vous avez pour tous les saints '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'à cause de l''espérance qui vous est réservée au ciel. Cette espérance, vous en avez déjà entendu parler par la parole de la vérité, l''Evangile. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il est parvenu jusqu''à vous tout comme dans le monde entier, où il porte des fruits et progresse. C''est d''ailleurs aussi le cas parmi vous depuis le jour où vous avez entendu et connu la grâce de Dieu dans la vérité, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'suivant l''enseignement que vous avez reçu d''Epaphras, notre bien-aimé compagnon de service. Il est pour vous un fidèle serviteur de Christ, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: et il nous a appris de quel amour l'Esprit vous anime.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Voilà pourquoi nous aussi, depuis le jour où nous en avons été informés, nous ne cessons de prier Dieu pour vous. Nous demandons que vous soyez remplis de la connaissance de sa volonté, en toutes sagesse et intelligence spirituelles, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'pour marcher d''une manière digne du Seigneur et lui plaire entièrement. Vous aurez pour fruits toutes sortes d''œuvres bonnes et vous progresserez dans la connaissance de Dieu, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'vous serez fortifiés à tout point de vue par sa puissance glorieuse pour être toujours et avec joie persévérants et patients, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'et vous exprimerez votre reconnaissance au Père qui nous a rendus capables de prendre part à l''héritage des saints dans la lumière. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il nous a délivrés de la puissance des ténèbres et nous a transportés dans le royaume de son Fils bien-aimé, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: en qui nous sommes rachetés, pardonnés de nos péchés.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La prééminence et l'œuvre de Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le Fils est l''image du Dieu invisible, le premier-né de toute la création. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'En effet, c''est en lui que tout a été créé dans le ciel et sur la terre, le visible et l''invisible, trônes, souverainetés, dominations, autorités. Tout a été créé par lui et pour lui. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il existe avant toutes choses et tout subsiste en lui. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il est la tête du corps qu''est l''Eglise; il est le commencement, le premier-né d''entre les morts, afin d''être en tout le premier. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'En effet, Dieu a voulu que toute sa plénitude habite en lui. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il a voulu par Christ tout réconcilier avec lui-même, aussi bien ce qui est sur la terre que ce qui est dans le ciel, en faisant la paix à travers lui, par son sang versé sur la croix.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Et vous qui étiez autrefois étrangers
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Etrangers: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: les non-Juifs étaient exclus des privilèges de la relation avec Dieu auxquels les Juifs avaient accès.
    marker-yv: yv-n
  - type: text
    text: ' et ennemis de Dieu par vos pensées et par vos œuvres mauvaises, il vous a maintenant réconciliés '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'par la mort [de son Fils] dans son corps de chair pour vous faire paraître devant lui saints, sans défaut et sans reproche. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mais il faut que vous restiez fondés et inébranlables dans la foi, sans vous détourner de l'espérance de l'Evangile que vous avez entendu, qui a été proclamé à toute créature sous le ciel et dont moi, Paul, je suis devenu le serviteur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le combat de Paul pour l'Eglise
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Je me réjouis maintenant dans mes souffrances pour vous et je supplée dans ma vie à ce qui manque aux peines infligées à Christ
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ce qui manque… Christ: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'le mot grec utilisé ici désigne l''hostilité qu''a subie Christ et que ses disciples subissent à leur tour lorsqu''ils prêchent l''Evangile. Christ est solidaire des persécutions infligées aux siens: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'elles l''atteignent autant qu''eux (voir '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Actes 9.4-5
      metadata:
        usfm: ACT.9.4+ACT.9.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' pour son corps, c''est-à-dire l''Eglise. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'C''est d''elle que je suis devenu le serviteur, conformément à la charge que Dieu m''a confiée pour vous: annoncer pleinement la parole de Dieu, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'le mystère caché de tout temps et à toutes les générations, mais révélé maintenant à ses saints. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: En effet, Dieu a voulu leur faire connaître la glorieuse richesse de ce mystère parmi les non-Juifs, c'est-à-dire Christ en vous, l'espérance de la gloire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'C''est lui que nous annonçons, en avertissant et en instruisant toute personne en toute sagesse, afin de présenter à Dieu toute personne devenue adulte en [Jésus-]Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: C'est à cela que je travaille en combattant avec sa force qui agit puissamment en moi.
