document_id: ACT.10,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'Evangile annoncé aux non-Juifs
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Il y avait à Césarée un homme appelé Corneille qui était officier dans la troupe romaine appelée «cohorte italienne». '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Il eut faim et voulut manger. Pendant qu''on préparait le repas, il tomba en extase. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Il vit le ciel ouvert et un objet ressemblant à une grande nappe attachée aux quatre coins qui descendait et s''abaissait vers la terre. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: A l'intérieur se trouvaient tous les quadrupèdes et reptiles de la terre ainsi que les oiseaux du ciel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Quadrupèdes… reptiles… oiseaux du ciel: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: la loi mosaïque définissait clairement quels étaient les animaux purs, que les Juifs pouvaient consommer, et quels étaient les animaux impurs, qu'il leur était défendu de manger.
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Une voix lui dit: «Lève-toi, Pierre, tue et mange!» '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Mais Pierre dit: «Certainement pas, Seigneur, car je n''ai jamais rien mangé de souillé ni d''impur.» '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'A nouveau, pour la deuxième fois, la voix lui parla: «Ce que Dieu a déclaré pur, toi, ne le considère pas comme impur!» '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Cela se produisit trois fois et, aussitôt après, l'objet disparut dans le ciel.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Pierre restait perplexe sur le sens de la vision qu''il avait eue. Pendant ce temps, les hommes envoyés par Corneille avaient demandé où était la maison de Simon. Ils se présentèrent à la porte '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'et appelèrent pour savoir si c''était bien là que logeait Simon, surnommé Pierre. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Pierre réfléchissait encore à la vision quand l''Esprit lui dit: «Il y a trois hommes qui te cherchent. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Il était pieux et craignait Dieu avec toute sa maison; il donnait beaucoup d'argent au peuple et ne cessait de prier Dieu.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Lève-toi, descends et pars avec eux sans hésiter, car c''est moi qui les ai envoyés.» '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Pierre descendit et dit à ces hommes: «Me voici, je suis celui que vous cherchez. Quelle est la raison qui vous amène ici?» '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ils répondirent: «L''officier romain Corneille est un homme juste et craint Dieu. Toute la nation des Juifs lui rend un bon témoignage. Or, il a été divinement averti par un saint ange de te faire venir dans sa maison et d''écouter tes paroles.» '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Alors Pierre les fit entrer et les logea. Le lendemain, il [se leva et] partit avec eux. Quelques-uns des frères de Jaffa l'accompagnèrent.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ils arrivèrent à Césarée le jour suivant. Corneille les attendait. Il avait invité sa parenté et ses amis intimes. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Lorsque Pierre entra, Corneille, qui était venu à sa rencontre, se jeta à ses pieds et se prosterna. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Mais Pierre le releva en disant: «Lève-toi! Moi aussi, je suis un être humain.» '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Tout en conversant avec lui, il entra et trouva beaucoup de personnes réunies. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: '«Vous savez, leur dit-il, qu''il est interdit à un Juif de se lier à un étranger ou d''entrer chez lui, mais Dieu m''a montré qu''il ne faut déclarer aucun être humain souillé ou impur. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: C'est pourquoi je n'ai pas eu d'objection à venir quand vous m'avez appelé. Je vous demande donc pour quelle raison vous m'avez fait venir.»
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Vers trois heures de l''après-midi, il vit clairement dans une vision un ange de Dieu entrer chez lui et lui dire: «Corneille!» '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Corneille répondit: «Il y a trois jours, [je jeûnais] jusqu''à cette heure-ci [et] je priais dans ma maison à trois heures de l''après-midi; un homme aux vêtements resplendissants s''est alors présenté devant moi et a dit: '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: '‘Corneille, ta prière a été exaucée et Dieu s''est souvenu des dons que tu as faits. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Envoie donc quelqu''un à Jaffa et fais venir Simon, surnommé Pierre. Il est logé dans la maison de Simon le tanneur, près de la mer. [Lorsqu''il sera venu, il te parlera.]’ '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: J'ai alors tout de suite envoyé quelqu'un vers toi et tu as bien fait de venir. Maintenant donc nous sommes tous devant Dieu pour écouter tout ce que le Seigneur t'a ordonné de nous dire.»
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Alors Pierre prit la parole et dit: «En vérité, je reconnais que Dieu ne fait pas de favoritisme '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'et que dans toute nation celui qui le craint et qui pratique la justice lui est agréable. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Il a envoyé sa parole aux Israélites en leur annonçant la paix par Jésus-Christ, qui est le Seigneur de tous. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Vous savez ce qui est arrivé dans toute la Judée, après avoir commencé en Galilée suite au baptême que Jean a prêché. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Vous savez comment Dieu a déversé une onction de Saint-Esprit et de puissance sur Jésus de Nazareth, qui allait de lieu en lieu en faisant le bien et en guérissant tous ceux qui étaient sous la domination du diable, parce que Dieu était avec lui. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Nous sommes témoins de tout ce qu''il a fait dans le pays des Juifs et à Jérusalem. Lui qu''ils ont tué en le clouant sur la croix, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il fixa les regards sur lui et, rempli de crainte, répondit: «Qu''y a-t-il, Seigneur?» L''ange lui dit: «Tes prières et les dons que tu as faits sont montés devant Dieu et il s''en est souvenu. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Dieu l''a ressuscité le troisième jour et a permis qu''il apparaisse, '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'non à tout le peuple, mais aux témoins choisis d''avance par Dieu, à nous qui avons mangé et bu avec lui après sa résurrection. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Jésus nous a ordonné de prêcher au peuple et d''attester que c''est lui que Dieu a désigné juge des vivants et des morts. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Tous les prophètes rendent de lui le témoignage que toute personne qui croit en lui reçoit par son nom le pardon des péchés.»
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Pierre parlait encore quand le Saint-Esprit descendit sur tous ceux qui écoutaient la parole. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Tous les croyants circoncis
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.45 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Les croyants circoncis: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire les Juifs devenus disciples de Christ.
      marker-yv: yv-n
    - type: text
      text: ' qui étaient venus avec Pierre furent stupéfaits de ce que le don du Saint-Esprit était déversé même sur les non-Juifs. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'En effet, ils les entendaient parler en langues et célébrer la grandeur de Dieu. Alors Pierre dit: '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: '«Peut-on refuser l''eau du baptême à ceux qui ont reçu le Saint-Esprit tout comme nous?» '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: et il ordonna de les baptiser au nom du Seigneur. Ils lui demandèrent alors de rester quelques jours avec eux.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Maintenant, envoie des hommes à Jaffa et fais venir Simon, surnommé Pierre; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: il est logé chez un certain Simon, un tanneur dont la maison se trouve près de la mer.»
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Dès que l''ange qui lui avait parlé fut parti, Corneille appela deux de ses serviteurs et un soldat pieux parmi ceux qui étaient attachés à son service; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: il leur raconta tout ce qui s'était passé et les envoya à Jaffa.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Le lendemain, alors que ces hommes étaient en route et qu''ils approchaient de la ville, Pierre monta sur le toit vers midi pour prier. '
