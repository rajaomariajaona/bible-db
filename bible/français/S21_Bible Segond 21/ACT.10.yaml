document_id: ACT.10,152
type_code: fra
verses:
  '1':
  - type: heading
    content: L'Evangile annoncé aux non-Juifs
  - type: text
    content: 'Il y avait à Césarée un homme appelé Corneille qui était officier dans la troupe romaine appelée «cohorte italienne». '
  '10':
  - type: text
    content: 'Il eut faim et voulut manger. Pendant qu''on préparait le repas, il tomba en extase. '
  '11':
  - type: text
    content: 'Il vit le ciel ouvert et un objet ressemblant à une grande nappe attachée aux quatre coins qui descendait et s''abaissait vers la terre. '
  '12':
  - type: text
    content: A l'intérieur se trouvaient tous les quadrupèdes et reptiles de la terre ainsi que les oiseaux du ciel
  - type: note
    content: 'Quadrupèdes… reptiles… oiseaux du ciel: la loi mosaïque définissait clairement quels étaient les animaux purs, que les Juifs pouvaient consommer, et quels étaient les animaux impurs, qu''il leur était défendu de manger.'
  - type: text
    content: '. '
  '13':
  - type: text
    content: 'Une voix lui dit: «Lève-toi, Pierre, tue et mange!» '
  '14':
  - type: text
    content: 'Mais Pierre dit: «Certainement pas, Seigneur, car je n''ai jamais rien mangé de souillé ni d''impur.» '
  '15':
  - type: text
    content: 'A nouveau, pour la deuxième fois, la voix lui parla: «Ce que Dieu a déclaré pur, toi, ne le considère pas comme impur!» '
  '16':
  - type: text
    content: Cela se produisit trois fois et, aussitôt après, l'objet disparut dans le ciel.
  '17':
  - type: text
    content: 'Pierre restait perplexe sur le sens de la vision qu''il avait eue. Pendant ce temps, les hommes envoyés par Corneille avaient demandé où était la maison de Simon. Ils se présentèrent à la porte '
  '18':
  - type: text
    content: 'et appelèrent pour savoir si c''était bien là que logeait Simon, surnommé Pierre. '
  '19':
  - type: text
    content: 'Pierre réfléchissait encore à la vision quand l''Esprit lui dit: «Il y a trois hommes qui te cherchent. '
  '2':
  - type: text
    content: Il était pieux et craignait Dieu avec toute sa maison; il donnait beaucoup d'argent au peuple et ne cessait de prier Dieu.
  '20':
  - type: text
    content: 'Lève-toi, descends et pars avec eux sans hésiter, car c''est moi qui les ai envoyés.» '
  '21':
  - type: text
    content: 'Pierre descendit et dit à ces hommes: «Me voici, je suis celui que vous cherchez. Quelle est la raison qui vous amène ici?» '
  '22':
  - type: text
    content: 'Ils répondirent: «L''officier romain Corneille est un homme juste et craint Dieu. Toute la nation des Juifs lui rend un bon témoignage. Or, il a été divinement averti par un saint ange de te faire venir dans sa maison et d''écouter tes paroles.» '
  '23':
  - type: text
    content: Alors Pierre les fit entrer et les logea. Le lendemain, il [se leva et] partit avec eux. Quelques-uns des frères de Jaffa l'accompagnèrent.
  '24':
  - type: text
    content: 'Ils arrivèrent à Césarée le jour suivant. Corneille les attendait. Il avait invité sa parenté et ses amis intimes. '
  '25':
  - type: text
    content: 'Lorsque Pierre entra, Corneille, qui était venu à sa rencontre, se jeta à ses pieds et se prosterna. '
  '26':
  - type: text
    content: 'Mais Pierre le releva en disant: «Lève-toi! Moi aussi, je suis un être humain.» '
  '27':
  - type: text
    content: 'Tout en conversant avec lui, il entra et trouva beaucoup de personnes réunies. '
  '28':
  - type: text
    content: '«Vous savez, leur dit-il, qu''il est interdit à un Juif de se lier à un étranger ou d''entrer chez lui, mais Dieu m''a montré qu''il ne faut déclarer aucun être humain souillé ou impur. '
  '29':
  - type: text
    content: C'est pourquoi je n'ai pas eu d'objection à venir quand vous m'avez appelé. Je vous demande donc pour quelle raison vous m'avez fait venir.»
  '3':
  - type: text
    content: 'Vers trois heures de l''après-midi, il vit clairement dans une vision un ange de Dieu entrer chez lui et lui dire: «Corneille!» '
  '30':
  - type: text
    content: 'Corneille répondit: «Il y a trois jours, [je jeûnais] jusqu''à cette heure-ci [et] je priais dans ma maison à trois heures de l''après-midi; un homme aux vêtements resplendissants s''est alors présenté devant moi et a dit: '
  '31':
  - type: text
    content: '‘Corneille, ta prière a été exaucée et Dieu s''est souvenu des dons que tu as faits. '
  '32':
  - type: text
    content: 'Envoie donc quelqu''un à Jaffa et fais venir Simon, surnommé Pierre. Il est logé dans la maison de Simon le tanneur, près de la mer. [Lorsqu''il sera venu, il te parlera.]’ '
  '33':
  - type: text
    content: J'ai alors tout de suite envoyé quelqu'un vers toi et tu as bien fait de venir. Maintenant donc nous sommes tous devant Dieu pour écouter tout ce que le Seigneur t'a ordonné de nous dire.»
  '34':
  - type: text
    content: 'Alors Pierre prit la parole et dit: «En vérité, je reconnais que Dieu ne fait pas de favoritisme '
  '35':
  - type: text
    content: 'et que dans toute nation celui qui le craint et qui pratique la justice lui est agréable. '
  '36':
  - type: text
    content: 'Il a envoyé sa parole aux Israélites en leur annonçant la paix par Jésus-Christ, qui est le Seigneur de tous. '
  '37':
  - type: text
    content: 'Vous savez ce qui est arrivé dans toute la Judée, après avoir commencé en Galilée suite au baptême que Jean a prêché. '
  '38':
  - type: text
    content: 'Vous savez comment Dieu a déversé une onction de Saint-Esprit et de puissance sur Jésus de Nazareth, qui allait de lieu en lieu en faisant le bien et en guérissant tous ceux qui étaient sous la domination du diable, parce que Dieu était avec lui. '
  '39':
  - type: text
    content: 'Nous sommes témoins de tout ce qu''il a fait dans le pays des Juifs et à Jérusalem. Lui qu''ils ont tué en le clouant sur la croix, '
  '4':
  - type: text
    content: 'Il fixa les regards sur lui et, rempli de crainte, répondit: «Qu''y a-t-il, Seigneur?» L''ange lui dit: «Tes prières et les dons que tu as faits sont montés devant Dieu et il s''en est souvenu. '
  '40':
  - type: text
    content: 'Dieu l''a ressuscité le troisième jour et a permis qu''il apparaisse, '
  '41':
  - type: text
    content: 'non à tout le peuple, mais aux témoins choisis d''avance par Dieu, à nous qui avons mangé et bu avec lui après sa résurrection. '
  '42':
  - type: text
    content: 'Jésus nous a ordonné de prêcher au peuple et d''attester que c''est lui que Dieu a désigné juge des vivants et des morts. '
  '43':
  - type: text
    content: Tous les prophètes rendent de lui le témoignage que toute personne qui croit en lui reçoit par son nom le pardon des péchés.»
  '44':
  - type: text
    content: 'Pierre parlait encore quand le Saint-Esprit descendit sur tous ceux qui écoutaient la parole. '
  '45':
  - type: text
    content: Tous les croyants circoncis
  - type: note
    content: 'Les croyants circoncis: c''est-à-dire les Juifs devenus disciples de Christ.'
  - type: text
    content: ' qui étaient venus avec Pierre furent stupéfaits de ce que le don du Saint-Esprit était déversé même sur les non-Juifs. '
  '46':
  - type: text
    content: 'En effet, ils les entendaient parler en langues et célébrer la grandeur de Dieu. Alors Pierre dit: '
  '47':
  - type: text
    content: '«Peut-on refuser l''eau du baptême à ceux qui ont reçu le Saint-Esprit tout comme nous?» '
  '48':
  - type: text
    content: et il ordonna de les baptiser au nom du Seigneur. Ils lui demandèrent alors de rester quelques jours avec eux.
  '5':
  - type: text
    content: 'Maintenant, envoie des hommes à Jaffa et fais venir Simon, surnommé Pierre; '
  '6':
  - type: text
    content: il est logé chez un certain Simon, un tanneur dont la maison se trouve près de la mer.»
  '7':
  - type: text
    content: 'Dès que l''ange qui lui avait parlé fut parti, Corneille appela deux de ses serviteurs et un soldat pieux parmi ceux qui étaient attachés à son service; '
  '8':
  - type: text
    content: il leur raconta tout ce qui s'était passé et les envoya à Jaffa.
  '9':
  - type: text
    content: 'Le lendemain, alors que ces hommes étaient en route et qu''ils approchaient de la ville, Pierre monta sur le toit vers midi pour prier. '
