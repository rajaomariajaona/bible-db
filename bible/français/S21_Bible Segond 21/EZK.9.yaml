document_id: EZK.9,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jugement des idolâtres
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis je l''ai entendu crier d''une voix forte: «Approchez-vous, vous qui devez intervenir contre la ville! Que chacun ait son arme de destruction à la main!»'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Moi aussi, j'aurai un regard dépourvu de pitié, je n'aurai aucune compassion. Je ferai retomber leur conduite sur leur tête.»
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis l''homme en habit de lin, celui qui portait du matériel de scribe à la ceinture, a fait son rapport en disant: «J''ai fait tout ce que tu m''as ordonné.»'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Six hommes sont arrivés par l''entrée supérieure, du côté nord. Chacun avait son arme meurtrière à la main. Il y avait au milieu d''eux un homme habillé de lin, qui portait du matériel de scribe à la ceinture. Ils sont venus se placer près de l''autel de bronze. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors la gloire du Dieu d''Israël s''est élevée au-dessus du chérubin sur lequel elle était et s''est dirigée vers le seuil du temple. Puis l''Eternel a appelé l''homme habillé de lin, celui qui portait du matériel de scribe à la ceinture, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et lui a dit: «Passe au milieu de la ville, au milieu de Jérusalem, et fais une marque sur le front des hommes qui gémissent et se lamentent à cause de toutes les horreurs qui s''y commettent!» '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ensuite, je l''ai entendu dire aux autres: «Passez après lui dans la ville et frappez! Que votre regard soit sans pitié, n''ayez aucune compassion! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tuez les vieillards, les jeunes hommes et les jeunes filles, les enfants et les femmes jusqu''à l''extermination, mais n''approchez pas de tous ceux qui ont la marque sur eux! Commencez par mon sanctuaire!» Ils ont donc commencé par les anciens qui étaient devant le temple. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leur a dit: «Rendez le temple impur et remplissez de victimes les deux parvis attenants! Sortez!» Alors ils sont sortis et se sont mis à frapper dans la ville.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant qu''ils frappaient, j''étais resté là. Je suis tombé le visage contre terre et je me suis écrié: «Ah! Seigneur Eternel, vas-tu détruire tout ce qui reste d''Israël en déversant ta fureur sur Jérusalem?» '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il m''a répondu: «La faute de la communauté d''Israël et de Juda est immensément grande. Le pays est rempli de meurtres, la ville est pleine de perversion, car ils disent: ‘L''Eternel a abandonné le pays, l''Eternel ne voit rien.’ '
