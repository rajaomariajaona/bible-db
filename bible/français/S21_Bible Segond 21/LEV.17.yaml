document_id: LEV.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La consommation de viande et de sang
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Transmets ces instructions à Aaron et à ses fils, ainsi qu''à tous les Israélites: ‘Voici ce que l''Eternel a ordonné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Si un Israélite égorge, à l''intérieur ou à l''extérieur du camp, un bœuf, un agneau ou une chèvre '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'sans l''amener à l''entrée de la tente de la rencontre pour en faire une offrande à l''Eternel devant le tabernacle de l''Eternel, cet homme sera coupable du sang versé; il a versé le sang, il sera exclu du milieu de son peuple.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'C''est afin que les Israélites, au lieu de sacrifier leurs victimes dans les champs, les amènent au prêtre devant l''Eternel, à l''entrée de la tente de la rencontre, et qu''ils les offrent à l''Eternel en sacrifices de communion. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le prêtre en versera le sang sur l''autel de l''Eternel, à l''entrée de la tente de la rencontre, et il brûlera la graisse dont l''odeur sera agréable à l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ils n'offriront plus leurs sacrifices aux boucs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sacrifices aux boucs: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: le culte idolâtrique rendu à des êtres tenant à la fois du bouc et de l'homme (satyres) existait en Egypte.
    marker-yv: yv-n
  - type: text
    text: ', avec lesquels ils se prostituent. Ce sera une prescription perpétuelle pour eux au fil des générations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tu leur diras donc: ‘Si un Israélite ou un étranger en séjour parmi eux offre un holocauste ou une victime '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: sans l'amener à l'entrée de la tente de la rencontre pour l'offrir en sacrifice à l'Eternel, il sera exclu de son peuple.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '»Si un Israélite ou un étranger en séjour parmi eux mange du sang, je me tournerai contre celui qui mange le sang et je l''exclurai du milieu de son peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'En effet, la vie d''un être est dans le sang. Je vous l''ai donné sur l''autel afin qu''il serve d''expiation pour vos âmes, car c''est par la vie que le sang fait l''expiation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'C''est pourquoi j''ai dit aux Israélites: ‘Aucun de vous ne mangera du sang, même l''étranger en séjour parmi vous ne mangera pas de sang.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Si un Israélite ou un étranger en séjour parmi eux prend à la chasse un animal ou un oiseau qui se mange, il en versera le sang et le couvrira de poussière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'En effet, la vie de tout être, c''est son sang, qui est en lui. C''est pourquoi j''ai dit aux Israélites: ‘Vous ne mangerez le sang d''aucune créature, car la vie de tout être, c''est son sang. Celui qui en mangera sera exclu.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '»Toute personne, qu''elle soit israélite ou étrangère, qui aura mangé d''une bête trouvée morte ou déchiquetée lavera ses vêtements, se lavera dans l''eau et sera impure jusqu''au soir; puis elle sera pure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Si elle ne lave pas ses vêtements et son corps, elle supportera les conséquences de sa faute.»
