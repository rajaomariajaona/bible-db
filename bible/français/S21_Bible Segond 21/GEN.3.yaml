document_id: GEN.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La tentation et la chute
  - type: text
    content: 'Le serpent était le plus rusé de tous les animaux sauvages que l''Eternel Dieu avait faits. Il dit à la femme: «Dieu a-t-il vraiment dit: ‘Vous ne mangerez aucun des fruits des arbres du jardin’?» '
  '10':
  - type: text
    content: 'Il répondit: «J''ai entendu ta voix dans le jardin et j''ai eu peur, parce que j''étais nu. Alors je me suis caché.» '
  '11':
  - type: text
    content: 'L''Eternel Dieu dit: «Qui t''a révélé que tu étais nu? Est-ce que tu as mangé du fruit de l''arbre dont je t''avais interdit de manger?» '
  '12':
  - type: text
    content: 'L''homme répondit: «C''est la femme que tu as mise à mes côtés qui m''a donné de ce fruit, et j''en ai mangé.» '
  '13':
  - type: text
    content: 'L''Eternel Dieu dit à la femme: «Pourquoi as-tu fait cela?» La femme répondit: «Le serpent m''a trompée et j''en ai mangé.»'
  '14':
  - type: text
    content: 'L''Eternel Dieu dit au serpent: «Puisque tu as fait cela, tu seras maudit parmi tout le bétail et tous les animaux sauvages. Tu marcheras sur ton ventre et tu mangeras de la poussière tous les jours de ta vie. '
  '15':
  - type: text
    content: 'Je mettrai l''hostilité entre toi et la femme, entre ta descendance et sa descendance: celle-ci t''écrasera la tête et tu lui blesseras le talon.» '
  '16':
  - type: text
    content: 'Il dit à la femme: «J''augmenterai la souffrance de tes grossesses. C''est dans la douleur que tu mettras des enfants au monde. Tes désirs se porteront vers ton mari, mais lui, il dominera sur toi.» '
  '17':
  - type: text
    content: 'Il dit à l''homme: «Puisque tu as écouté ta femme et mangé du fruit au sujet duquel je t''avais donné cet ordre: ‘Tu n''en mangeras pas’, le sol est maudit à cause de toi. C''est avec peine que tu en tireras ta nourriture tous les jours de ta vie. '
  '18':
  - type: text
    content: 'Il te produira des ronces et des chardons, et tu mangeras de l''herbe des champs. '
  '19':
  - type: text
    content: C'est à la sueur de ton visage que tu mangeras du pain, et ce jusqu'à ce que tu retournes à la terre, puisque c'est d'elle que tu as été tiré. Oui, tu es poussière et tu retourneras à la poussière.»
  '2':
  - type: text
    content: 'La femme répondit au serpent: «Nous mangeons du fruit des arbres du jardin. '
  '20':
  - type: text
    content: 'Adam appela sa femme Eve, car elle devait être la mère de tous les vivants. '
  '21':
  - type: text
    content: L'Eternel Dieu fit des habits en peau pour Adam et pour sa femme, et il les leur mit.
  '22':
  - type: text
    content: 'L''Eternel Dieu dit: «Voilà que l''homme est devenu comme l''un de nous pour la connaissance du bien et du mal. Maintenant, empêchons-le de tendre la main, de prendre aussi du fruit de l''arbre de vie, d''en manger et de vivre éternellement!» '
  '23':
  - type: text
    content: 'Ainsi, l''Eternel Dieu le chassa du jardin d''Eden pour qu''il cultive la terre d''où il avait été tiré. '
  '24':
  - type: text
    content: Après avoir chassé Adam, il posta à l'est du jardin d'Eden les chérubins qui agitent une épée flamboyante pour garder le chemin de l'arbre de vie.
  '3':
  - type: text
    content: 'Cependant, en ce qui concerne le fruit de l''arbre qui est au milieu du jardin, Dieu a dit: ‘Vous n''en mangerez pas et vous n''y toucherez pas, sinon vous mourrez.’» '
  '4':
  - type: text
    content: 'Le serpent dit alors à la femme: «Vous ne mourrez absolument pas, '
  '5':
  - type: text
    content: 'mais Dieu sait que, le jour où vous en mangerez, vos yeux s''ouvriront et vous serez comme Dieu: vous connaîtrez le bien et le mal.»'
  '6':
  - type: text
    content: La femme vit que l'arbre était porteur de fruits bons à manger, agréable à regarder et précieux pour ouvrir l'intelligence. Elle prit de son fruit et en mangea. Elle en donna aussi à son mari qui était avec elle et il en mangea.
  '7':
  - type: text
    content: 'Leurs yeux à tous les deux s''ouvrirent, et ils prirent conscience qu''ils étaient nus. Ils attachèrent des feuilles de figuier ensemble et s''en firent des ceintures. '
  '8':
  - type: text
    content: Quand ils entendirent la voix de l'Eternel Dieu en train de parcourir le jardin vers le soir, l'homme et sa femme se cachèrent loin de l'Eternel Dieu au milieu des arbres du jardin.
  '9':
  - type: text
    content: 'Cependant, l''Eternel Dieu appela l''homme et lui dit: «Où es-tu?» '
