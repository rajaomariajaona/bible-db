document_id: GEN.3,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La tentation et la chute
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Le serpent était le plus rusé de tous les animaux sauvages que l''Eternel Dieu avait faits. Il dit à la femme: «Dieu a-t-il vraiment dit: ‘Vous ne mangerez aucun des fruits des arbres du jardin’?» '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Il répondit: «J''ai entendu ta voix dans le jardin et j''ai eu peur, parce que j''étais nu. Alors je me suis caché.» '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'L''Eternel Dieu dit: «Qui t''a révélé que tu étais nu? Est-ce que tu as mangé du fruit de l''arbre dont je t''avais interdit de manger?» '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'L''homme répondit: «C''est la femme que tu as mise à mes côtés qui m''a donné de ce fruit, et j''en ai mangé.» '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'L''Eternel Dieu dit à la femme: «Pourquoi as-tu fait cela?» La femme répondit: «Le serpent m''a trompée et j''en ai mangé.»'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'L''Eternel Dieu dit au serpent: «Puisque tu as fait cela, tu seras maudit parmi tout le bétail et tous les animaux sauvages. Tu marcheras sur ton ventre et tu mangeras de la poussière tous les jours de ta vie. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Je mettrai l''hostilité entre toi et la femme, entre ta descendance et sa descendance: celle-ci t''écrasera la tête et tu lui blesseras le talon.» '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Il dit à la femme: «J''augmenterai la souffrance de tes grossesses. C''est dans la douleur que tu mettras des enfants au monde. Tes désirs se porteront vers ton mari, mais lui, il dominera sur toi.» '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Il dit à l''homme: «Puisque tu as écouté ta femme et mangé du fruit au sujet duquel je t''avais donné cet ordre: ‘Tu n''en mangeras pas’, le sol est maudit à cause de toi. C''est avec peine que tu en tireras ta nourriture tous les jours de ta vie. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Il te produira des ronces et des chardons, et tu mangeras de l''herbe des champs. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: C'est à la sueur de ton visage que tu mangeras du pain, et ce jusqu'à ce que tu retournes à la terre, puisque c'est d'elle que tu as été tiré. Oui, tu es poussière et tu retourneras à la poussière.»
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'La femme répondit au serpent: «Nous mangeons du fruit des arbres du jardin. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Adam appela sa femme Eve, car elle devait être la mère de tous les vivants. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: L'Eternel Dieu fit des habits en peau pour Adam et pour sa femme, et il les leur mit.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'L''Eternel Dieu dit: «Voilà que l''homme est devenu comme l''un de nous pour la connaissance du bien et du mal. Maintenant, empêchons-le de tendre la main, de prendre aussi du fruit de l''arbre de vie, d''en manger et de vivre éternellement!» '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ainsi, l''Eternel Dieu le chassa du jardin d''Eden pour qu''il cultive la terre d''où il avait été tiré. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Après avoir chassé Adam, il posta à l'est du jardin d'Eden les chérubins qui agitent une épée flamboyante pour garder le chemin de l'arbre de vie.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Cependant, en ce qui concerne le fruit de l''arbre qui est au milieu du jardin, Dieu a dit: ‘Vous n''en mangerez pas et vous n''y toucherez pas, sinon vous mourrez.’» '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Le serpent dit alors à la femme: «Vous ne mourrez absolument pas, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'mais Dieu sait que, le jour où vous en mangerez, vos yeux s''ouvriront et vous serez comme Dieu: vous connaîtrez le bien et le mal.»'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: La femme vit que l'arbre était porteur de fruits bons à manger, agréable à regarder et précieux pour ouvrir l'intelligence. Elle prit de son fruit et en mangea. Elle en donna aussi à son mari qui était avec elle et il en mangea.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Leurs yeux à tous les deux s''ouvrirent, et ils prirent conscience qu''ils étaient nus. Ils attachèrent des feuilles de figuier ensemble et s''en firent des ceintures. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Quand ils entendirent la voix de l'Eternel Dieu en train de parcourir le jardin vers le soir, l'homme et sa femme se cachèrent loin de l'Eternel Dieu au milieu des arbres du jardin.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Cependant, l''Eternel Dieu appela l''homme et lui dit: «Où es-tu?» '
