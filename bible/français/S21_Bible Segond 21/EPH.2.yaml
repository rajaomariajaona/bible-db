document_id: EPH.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Un salut accordé par grâce
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Quant à vous, vous étiez morts à cause de vos fautes et de vos péchés, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: que vous pratiquiez autrefois conformément à la façon de vivre de ce monde, conformément au prince de la puissance de l'air
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Prince… de l''air: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire Satan, qui contrôle l'ambiance spirituelle de ce monde.
    marker-yv: yv-n
  - type: text
    text: ', de l''esprit qui est actuellement à l''œuvre parmi les hommes rebelles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Nous tous aussi, nous étions de leur nombre: notre conduite était dictée par les désirs de notre nature propre, puisque nous accomplissions les volontés de la nature humaine et de nos pensées, et nous étions, par notre condition même, destinés à la colère, tout comme les autres.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Mais Dieu est riche en compassion. A cause du grand amour dont il nous a aimés, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'nous qui étions morts en raison de nos fautes, il nous a rendus à la vie avec Christ – c''est par grâce que vous êtes sauvés –, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'il nous a ressuscités et fait asseoir avec lui dans les lieux célestes, en Jésus-Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il a fait cela afin de montrer dans les temps à venir l'infinie richesse de sa grâce par la bonté qu'il a manifestée envers nous en Jésus-Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'En effet, c''est par la grâce que vous êtes sauvés, par le moyen de la foi. Et cela ne vient pas de vous, c''est le don de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ce n''est pas par les œuvres, afin que personne ne puisse se vanter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: En réalité, c'est lui qui nous a faits; nous avons été créés en Jésus-Christ pour des œuvres bonnes que Dieu a préparées d'avance afin que nous les pratiquions.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Juifs et non-Juifs unis en Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'C''est pourquoi, souvenez-vous qu''autrefois vous étiez identifiés comme non juifs dans votre corps, appelés incirconcis par ceux qui se disent circoncis et qui le sont dans leur corps, par la main de l''homme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Souvenez-vous qu''à ce moment-là vous étiez sans Messie, exclus du droit de cité en Israël, étrangers aux alliances de la promesse, sans espérance et sans Dieu dans le monde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mais maintenant, en Jésus-Christ, vous qui autrefois étiez loin, vous êtes devenus proches par le sang de Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: En effet, il est notre paix, lui qui des deux groupes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Des deux groupes: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire des non-Juifs et des Juifs.
    marker-yv: yv-n
  - type: text
    text: ' n''en a fait qu''un et qui a renversé le mur qui les séparait, la haine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Par sa mort, il a rendu sans effet la loi avec ses commandements et leurs règles, afin de créer en lui-même un seul homme nouveau à partir des deux, établissant ainsi la paix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il a voulu les réconcilier l''un et l''autre avec Dieu en les réunissant dans un seul corps au moyen de la croix, en détruisant par elle la haine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il est venu annoncer '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: la paix à vous qui étiez loin et à ceux qui étaient près
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La paix… près: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 57.19
      metadata:
        usfm: ISA.57.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' pour désigner respectivement les non-Juifs et les Juifs.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: A travers lui, en effet, nous avons les uns et les autres accès auprès du Père par le même Esprit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ainsi donc, vous n''êtes plus des étrangers ni des résidents temporaires; vous êtes au contraire concitoyens des saints, membres de la famille de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Vous avez été édifiés sur le fondement des apôtres et prophètes, Jésus-Christ lui-même étant la pierre angulaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'C''est en lui que tout l''édifice, bien coordonné, s''élève pour être un temple saint dans le Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: C'est en lui que vous aussi, vous êtes édifiés avec eux pour former une habitation de Dieu en Esprit.
