document_id: EZK.13,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Condamnation des prétendus prophètes
  - type: text
    content: 'La parole de l''Eternel m''a été adressée: '
  '10':
  - type: text
    content: »Tout cela arrivera parce qu'ils égarent mon peuple
  - type: text
    content: en affirmant que tout va bien, alors que rien ne va.
  - type: text
    content: Mon peuple construit un muret
  - type: text
    content: et eux, ils le couvrent de plâtre.
  '11':
  - type: text
    content: Annonce à ceux qui le couvrent de plâtre qu'il s'écroulera!
  - type: text
    content: Une pluie torrentielle surviendra.
  - type: text
    content: Vous, grêlons, vous tomberez
  - type: text
    content: et la tempête éclatera.
  '12':
  - type: text
    content: Une fois le mur écroulé,
  - type: text
    content: 'ne vous dira-t-on pas:'
  - type: text
    content: ‘Où est le plâtre dont vous l'avez couvert?’
  '13':
  - type: text
    content: '»C''est pourquoi, voici ce que dit le Seigneur, l''Eternel:'
  - type: text
    content: Dans ma fureur, je ferai éclater la tempête;
  - type: text
    content: dans ma colère, une pluie torrentielle surviendra.
  - type: text
    content: Les grêlons tomberont avec fureur,
  - type: text
    content: avec la destruction pour objectif.
  '14':
  - type: text
    content: J'abattrai le mur que vous avez couvert de plâtre,
  - type: text
    content: je le jetterai par terre et ses fondations seront mises à nu.
  - type: text
    content: Jérusalem s'écroulera et vous disparaîtrez dans ses ruines.
  - type: text
    content: Vous reconnaîtrez alors que je suis l'Eternel.
  '15':
  - type: text
    content: »J'irai ainsi jusqu'au bout de ma fureur contre ce mur
  - type: text
    content: et contre ceux qui l'ont couvert de plâtre.
  - type: text
    content: 'Alors je vous dirai: ‘Plus de mur!'
  - type: text
    content: Plus personne pour le replâtrer!
  '16':
  - type: text
    content: Plus de prophètes d'Israël qui prophétisent à l'intention de Jérusalem,
  - type: text
    content: qui ont des visions affirmant que tout va bien
  - type: text
    content: alors que rien ne va, déclare le Seigneur, l'Eternel.’
  '17':
  - type: text
    content: »Quant à toi, fils de l'homme, tourne ton visage vers les filles de ton peuple
  - type: text
    content: qui prophétisent d'après leurs penchants
  - type: text
    content: et prophétise contre elles!
  '18':
  - type: text
    content: 'Tu diras: ‘Voici ce que dit le Seigneur, l''Eternel:'
  - type: text
    content: Malheur à celles qui cousent des coussinets pour tous les poignets
  - type: text
    content: et qui confectionnent des voiles de toute taille pour la tête,
  - type: text
    content: afin de prendre des personnes au piège!
  - type: text
    content: Pensez-vous pouvoir prendre au piège les membres de mon peuple
  - type: text
    content: et préserver votre propre vie?
  '19':
  - type: text
    content: Vous me déshonorez auprès de mon peuple
  - type: text
    content: pour des poignées d'orge et des morceaux de pain
  - type: text
    content: en faisant mourir ceux qui ne doivent pas mourir
  - type: text
    content: et en faisant vivre ceux qui ne doivent pas vivre.
  - type: text
    content: En effet, vous mentez à mon peuple et il croit à vos mensonges.
  '2':
  - type: text
    content: '«Fils de l''homme, prophétise à l''intention des prophètes d''Israël! Tu diras à ceux qui prophétisent d''après leurs penchants: ‘Ecoutez la parole de l''Eternel!’'
  '20':
  - type: text
    content: '»C''est pourquoi voici ce que dit le Seigneur, l''Eternel:'
  - type: text
    content: Je m'en prends à vos coussinets, qui vous permettent de prendre des personnes au piège
  - type: text
    content: comme des oiseaux.
  - type: text
    content: Je les arracherai de vos bras
  - type: text
    content: et je laisserai partir les personnes
  - type: text
    content: dont vous cherchez à prendre l'âme au piège comme des oiseaux.
  '21':
  - type: text
    content: J'arracherai aussi vos voiles
  - type: text
    content: 'et je délivrerai mon peuple de votre pouvoir:'
  - type: text
    content: ils ne seront plus une proie entre vos mains.
  - type: text
    content: Vous reconnaîtrez alors que je suis l'Eternel.
  '22':
  - type: text
    content: »Vous découragez le juste par des mensonges,
  - type: text
    content: alors que moi-même je ne l'ai pas attristé,
  - type: text
    content: et vous encouragez le méchant,
  - type: text
    content: l'empêchant ainsi de renoncer à sa mauvaise conduite et de conserver la vie.
  '23':
  - type: text
    content: C'est pourquoi, vous n'aurez plus de fausses visions
  - type: text
    content: et vous ne transmettrez plus de prédictions.
  - type: text
    content: Je délivrerai mon peuple de votre pouvoir.
  - type: text
    content: Vous reconnaîtrez alors que je suis l'Eternel.’»
  '3':
  - type: text
    content: '»Voici ce que dit le Seigneur, l''Eternel:'
  - type: text
    content: Malheur aux prophètes fous
  - type: text
    content: qui suivent leur propre inspiration et ne discernent rien!
  '4':
  - type: text
    content: Tes prophètes, Israël,
  - type: text
    content: sont pareils à des renards au milieu des ruines.
  '5':
  - type: text
    content: Vous n'êtes pas montés devant les brèches,
  - type: text
    content: vous n'avez pas construit de mur pour la communauté d'Israël
  - type: text
    content: afin de tenir ferme dans le combat,
  - type: text
    content: le jour de l'Eternel.
  '6':
  - type: text
    content: »Leurs visions ne sont que fausseté et leurs prédictions que mensonge.
  - type: text
    content: 'Ils affirment: ‘C''est ce que déclare l''Eternel’,'
  - type: text
    content: alors que l'Eternel ne les a pas envoyés,
  - type: text
    content: et ils font espérer que leur parole s'accomplira.
  '7':
  - type: text
    content: Les visions que vous avez ne sont-elles pas fausses
  - type: text
    content: et les oracles que vous prononcez ne sont-ils pas mensongers?
  - type: text
    content: 'Vous affirmez: ‘C''est ce que déclare l''Eternel’,'
  - type: text
    content: alors que moi, je n'ai pas parlé!
  '8':
  - type: text
    content: '»C''est pourquoi, voici ce que dit le Seigneur, l''Eternel:'
  - type: text
    content: Parce que vous affirmez des faussetés
  - type: text
    content: et que vos visions sont mensongères,
  - type: text
    content: je vous en veux,
  - type: text
    content: dit le Seigneur, l'Eternel.
  '9':
  - type: text
    content: Ma main s'attaquera aux prophètes
  - type: text
    content: qui ont de fausses visions et prédisent des mensonges.
  - type: text
    content: Ils n'appartiendront pas au conseil de mon peuple,
  - type: text
    content: ils ne seront pas inscrits dans le registre de la communauté d'Israël
  - type: text
    content: et ils ne reviendront pas dans le pays d'Israël.
  - type: text
    content: Vous reconnaîtrez alors que je suis le Seigneur, l'Eternel.
