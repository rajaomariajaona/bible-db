document_id: EZK.13,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Condamnation des prétendus prophètes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l''Eternel m''a été adressée: '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Tout cela arrivera parce qu'ils égarent mon peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en affirmant que tout va bien, alors que rien ne va.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon peuple construit un muret
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et eux, ils le couvrent de plâtre.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Annonce à ceux qui le couvrent de plâtre qu'il s'écroulera!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une pluie torrentielle surviendra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous, grêlons, vous tomberez
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la tempête éclatera.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une fois le mur écroulé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ne vous dira-t-on pas:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Où est le plâtre dont vous l'avez couvert?’
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»C''est pourquoi, voici ce que dit le Seigneur, l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans ma fureur, je ferai éclater la tempête;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans ma colère, une pluie torrentielle surviendra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les grêlons tomberont avec fureur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec la destruction pour objectif.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'abattrai le mur que vous avez couvert de plâtre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je le jetterai par terre et ses fondations seront mises à nu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jérusalem s'écroulera et vous disparaîtrez dans ses ruines.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous reconnaîtrez alors que je suis l'Eternel.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »J'irai ainsi jusqu'au bout de ma fureur contre ce mur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et contre ceux qui l'ont couvert de plâtre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Alors je vous dirai: ‘Plus de mur!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plus personne pour le replâtrer!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plus de prophètes d'Israël qui prophétisent à l'intention de Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui ont des visions affirmant que tout va bien
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors que rien ne va, déclare le Seigneur, l'Eternel.’
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Quant à toi, fils de l'homme, tourne ton visage vers les filles de ton peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui prophétisent d'après leurs penchants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et prophétise contre elles!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu diras: ‘Voici ce que dit le Seigneur, l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malheur à celles qui cousent des coussinets pour tous les poignets
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui confectionnent des voiles de toute taille pour la tête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin de prendre des personnes au piège!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pensez-vous pouvoir prendre au piège les membres de mon peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et préserver votre propre vie?
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous me déshonorez auprès de mon peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour des poignées d'orge et des morceaux de pain
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en faisant mourir ceux qui ne doivent pas mourir
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et en faisant vivre ceux qui ne doivent pas vivre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, vous mentez à mon peuple et il croit à vos mensonges.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Fils de l''homme, prophétise à l''intention des prophètes d''Israël! Tu diras à ceux qui prophétisent d''après leurs penchants: ‘Ecoutez la parole de l''Eternel!’'
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»C''est pourquoi voici ce que dit le Seigneur, l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je m'en prends à vos coussinets, qui vous permettent de prendre des personnes au piège
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme des oiseaux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les arracherai de vos bras
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je laisserai partir les personnes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dont vous cherchez à prendre l'âme au piège comme des oiseaux.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'arracherai aussi vos voiles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et je délivrerai mon peuple de votre pouvoir:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne seront plus une proie entre vos mains.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous reconnaîtrez alors que je suis l'Eternel.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Vous découragez le juste par des mensonges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors que moi-même je ne l'ai pas attristé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous encouragez le méchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'empêchant ainsi de renoncer à sa mauvaise conduite et de conserver la vie.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est pourquoi, vous n'aurez plus de fausses visions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous ne transmettrez plus de prédictions.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je délivrerai mon peuple de votre pouvoir.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous reconnaîtrez alors que je suis l'Eternel.’»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»Voici ce que dit le Seigneur, l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malheur aux prophètes fous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui suivent leur propre inspiration et ne discernent rien!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes prophètes, Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sont pareils à des renards au milieu des ruines.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous n'êtes pas montés devant les brèches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous n'avez pas construit de mur pour la communauté d'Israël
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin de tenir ferme dans le combat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le jour de l'Eternel.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Leurs visions ne sont que fausseté et leurs prédictions que mensonge.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils affirment: ‘C''est ce que déclare l''Eternel’,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors que l'Eternel ne les a pas envoyés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils font espérer que leur parole s'accomplira.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les visions que vous avez ne sont-elles pas fausses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les oracles que vous prononcez ne sont-ils pas mensongers?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Vous affirmez: ‘C''est ce que déclare l''Eternel’,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors que moi, je n'ai pas parlé!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»C''est pourquoi, voici ce que dit le Seigneur, l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce que vous affirmez des faussetés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que vos visions sont mensongères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je vous en veux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dit le Seigneur, l'Eternel.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma main s'attaquera aux prophètes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui ont de fausses visions et prédisent des mensonges.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils n'appartiendront pas au conseil de mon peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne seront pas inscrits dans le registre de la communauté d'Israël
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils ne reviendront pas dans le pays d'Israël.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous reconnaîtrez alors que je suis le Seigneur, l'Eternel.
