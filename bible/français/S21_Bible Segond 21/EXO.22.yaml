document_id: EXO.22
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Si un voleur est surpris en train de commettre un vol avec effraction, qu''il soit frappé et qu''il meure, on ne sera pas coupable de meurtre envers lui; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'toutefois si le soleil est levé, on sera coupable de meurtre envers lui. Un voleur devra faire une restitution: s''il n''a rien, il sera vendu pour rembourser son vol; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: si ce qu'il a volé, bœuf, âne ou agneau, est encore vivant entre ses mains, il fera une restitution au double.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: »Si un homme fait brouter son bétail dans un champ ou une vigne et qu'il le laisse aller brouter dans le champ d'un autre, il donnera en dédommagement le meilleur produit de son champ et de sa vigne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: »Si un feu éclate et rencontre des ronces, et que du blé en gerbes ou sur pied, ou bien le champ, soit brûlé, celui qui a causé l'incendie sera tenu de donner un dédommagement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '»Si un homme confie à un autre la garde d''argent ou d''objets et qu''on les vole dans la maison de cette personne, le voleur fera une restitution au double, dans le cas où on le trouverait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Si on ne trouve pas le voleur, le maître de la maison se présentera devant Dieu pour déclarer qu'il n'a pas porté la main sur le bien de son prochain.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: »Dans toute affaire litigieuse concernant un bœuf, un âne, un agneau, un vêtement ou un objet perdu dont quelqu'un revendiquera la propriété, la cause des deux parties ira jusqu'à Dieu. Celui que Dieu condamnera fera à son prochain une restitution au double.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '»Si un homme confie à un autre la garde d''un âne, un bœuf, un agneau ou un autre animal et que l''animal meure, se casse un membre ou soit enlevé sans que personne ne l''ait vu, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'on fera intervenir entre les deux parties le serment au nom de l''Eternel. Celui qui a eu la garde de l''animal déclarera qu''il n''a pas porté la main sur le bien de son prochain. Le maître de l''animal devra accepter ce serment et l''autre ne sera pas tenu de le dédommager. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'En revanche, si l''animal a été volé chez lui, il sera tenu de dédommager son maître. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Si l'animal a été déchiqueté, il apportera ses restes en guise de témoignage et il ne sera pas tenu à un dédommagement pour l'animal déchiqueté.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '»Si un homme emprunte un animal à un autre et que l''animal se casse un membre ou meure en l''absence de son maître, il devra donner un dédommagement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Si le maître est présent, il n'y aura pas de dédommagement. Si l'animal a été loué, le prix de la location suffira.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prescriptions diverses
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '»Si un homme séduit une jeune fille vierge qui n''est pas fiancée et couche avec elle, il paiera sa dot et la prendra pour femme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Si le père refuse de la lui accorder en mariage, il paiera en argent la valeur de la dot des jeunes filles vierges.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: »Tu ne laisseras pas vivre la magicienne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: »Celui qui couche avec une bête sera puni de mort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: »Celui qui offre des sacrifices à d'autres dieux qu'à l'Eternel seul sera voué à l'extermination.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: »Tu ne maltraiteras pas l'étranger et tu ne l'opprimeras pas, car vous avez été étrangers en Egypte.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '»Tu ne feras pas de mal à la veuve ni à l''orphelin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Si tu leur fais du mal et qu''ils viennent à moi, j''entendrai leurs cris. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ma colère s'enflammera et je vous détruirai par l'épée; ce sont vos femmes qui deviendront veuves, et vos enfants orphelins.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: »Si tu prêtes de l'argent à quelqu'un de mon peuple, au pauvre qui est avec toi, tu ne te comporteras pas envers lui comme un créancier, tu n'exigeras de lui aucun intérêt.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '»Si tu prends en gage le vêtement de ton prochain, tu le lui rendras avant le coucher du soleil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: En effet, c'est sa seule couverture, c'est le vêtement dont il s'enveloppe le corps. Dans quoi coucherait-il? S'il crie à moi, je l'entendrai, car je suis plein de grâce.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: »Tu ne maudiras pas Dieu et *tu ne parleras pas mal des chefs de ton peuple
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu ne parleras… peuple: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cité par Paul en Actes 23.5 en rapport avec le grand-prêtre.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '»Tu ne tarderas pas à m''offrir la part qui me revient de ta moisson et de ta vendange. Tu me donneras le premier-né de tes fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Tu me donneras aussi le premier-né de ta vache et de ta brebis; il restera 7 jours avec sa mère et le huitième jour, tu me le donneras.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '»Vous serez des hommes saints pour moi. Vous ne mangerez aucune viande trouvée déchiquetée dans les champs: vous la jetterez aux chiens.'
