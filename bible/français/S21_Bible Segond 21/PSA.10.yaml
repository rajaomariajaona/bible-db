document_id: PSA.10,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le méchant et son sort
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Pourquoi, Eternel, te tiens-tu éloigné?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi te caches-tu dans les moments de détresse?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Il s'accroupit, il se tapit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les malheureux tombent dans ses griffes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Il dit dans son cœur: «Dieu oublie, il se cache,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne regarde jamais!»
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Lève-toi, Eternel, ô Dieu, interviens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: n'oublie pas les malheureux!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Pourquoi le méchant méprise-t-il Dieu?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi dit-il en son cœur que tu ne punis pas?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Tu vois cependant leur peine et leur souffrance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu regardes, pour prendre en main leur cause.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est à toi que le malheureux s'abandonne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est toi qui viens en aide à l'orphelin.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Brise la force du méchant, punis sa méchanceté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'il disparaisse à tes yeux!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: L'Eternel est roi pour toujours et à perpétuité;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les autres nations disparaissent de son pays.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tu entends les désirs de ceux qui souffrent, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu leur redonnes courage, tu prêtes l'oreille
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: pour rendre justice à l'orphelin et à l'opprimé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que l'homme tiré de la terre cesse d'inspirer de la crainte.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Le méchant, dans son orgueil, poursuit les malheureux:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont pris dans les pièges qu'il a conçus.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Le méchant se vante de ses mauvais désirs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le profiteur maudit et méprise l'Eternel.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Le méchant dit, dans son arrogance: «Il ne punit pas!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n'y a pas de Dieu!» Voilà toutes ses pensées.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ses entreprises réussissent en tout temps;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tes jugements passent au-dessus de sa tête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il disperse tous ses adversaires.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Il dit dans son cœur: «Je ne suis pas ébranlé,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je suis pour toujours à l'abri du malheur!»
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '*Sa bouche est pleine de malédictions, de tromperies'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sa bouche… tromperies: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Romains 3.14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dans une description de l''homme en général.'
      marker-yv: yv-n
    - type: text
      text: ' et de fraudes;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il y a sous sa langue la méchanceté et le malheur.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Il se tient en embuscade près des villages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il assassine l'innocent dans des endroits retirés;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses yeux épient le malheureux.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Il est aux aguets dans sa cachette comme le lion dans sa tanière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est aux aguets pour attraper le malheureux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il l'attrape en l'attirant dans son piège.
