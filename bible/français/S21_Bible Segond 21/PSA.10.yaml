document_id: PSA.10,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le méchant et son sort
  - type: text
    content: Pourquoi, Eternel, te tiens-tu éloigné?
  - type: text
    content: Pourquoi te caches-tu dans les moments de détresse?
  '10':
  - type: text
    content: Il s'accroupit, il se tapit,
  - type: text
    content: et les malheureux tombent dans ses griffes.
  '11':
  - type: text
    content: 'Il dit dans son cœur: «Dieu oublie, il se cache,'
  - type: text
    content: il ne regarde jamais!»
  '12':
  - type: text
    content: Lève-toi, Eternel, ô Dieu, interviens,
  - type: text
    content: n'oublie pas les malheureux!
  '13':
  - type: text
    content: Pourquoi le méchant méprise-t-il Dieu?
  - type: text
    content: Pourquoi dit-il en son cœur que tu ne punis pas?
  '14':
  - type: text
    content: Tu vois cependant leur peine et leur souffrance,
  - type: text
    content: tu regardes, pour prendre en main leur cause.
  - type: text
    content: C'est à toi que le malheureux s'abandonne,
  - type: text
    content: c'est toi qui viens en aide à l'orphelin.
  '15':
  - type: text
    content: Brise la force du méchant, punis sa méchanceté,
  - type: text
    content: et qu'il disparaisse à tes yeux!
  '16':
  - type: text
    content: L'Eternel est roi pour toujours et à perpétuité;
  - type: text
    content: les autres nations disparaissent de son pays.
  '17':
  - type: text
    content: Tu entends les désirs de ceux qui souffrent, Eternel,
  - type: text
    content: tu leur redonnes courage, tu prêtes l'oreille
  '18':
  - type: text
    content: pour rendre justice à l'orphelin et à l'opprimé,
  - type: text
    content: afin que l'homme tiré de la terre cesse d'inspirer de la crainte.
  '2':
  - type: text
    content: 'Le méchant, dans son orgueil, poursuit les malheureux:'
  - type: text
    content: ils sont pris dans les pièges qu'il a conçus.
  '3':
  - type: text
    content: Le méchant se vante de ses mauvais désirs,
  - type: text
    content: le profiteur maudit et méprise l'Eternel.
  '4':
  - type: text
    content: 'Le méchant dit, dans son arrogance: «Il ne punit pas!'
  - type: text
    content: Il n'y a pas de Dieu!» Voilà toutes ses pensées.
  '5':
  - type: text
    content: Ses entreprises réussissent en tout temps;
  - type: text
    content: tes jugements passent au-dessus de sa tête,
  - type: text
    content: il disperse tous ses adversaires.
  '6':
  - type: text
    content: 'Il dit dans son cœur: «Je ne suis pas ébranlé,'
  - type: text
    content: je suis pour toujours à l'abri du malheur!»
  '7':
  - type: text
    content: '*Sa bouche est pleine de malédictions, de tromperies'
  - type: note
    content: 'Sa bouche… tromperies: cité en Romains 3.14 dans une description de l''homme en général.'
  - type: text
    content: ' et de fraudes;'
  - type: text
    content: il y a sous sa langue la méchanceté et le malheur.
  '8':
  - type: text
    content: Il se tient en embuscade près des villages,
  - type: text
    content: il assassine l'innocent dans des endroits retirés;
  - type: text
    content: ses yeux épient le malheureux.
  '9':
  - type: text
    content: Il est aux aguets dans sa cachette comme le lion dans sa tanière,
  - type: text
    content: il est aux aguets pour attraper le malheureux;
  - type: text
    content: il l'attrape en l'attirant dans son piège.
