document_id: 1PE.1,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Adresse et salutation
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'De la part de Pierre, apôtre de Jésus-Christ, à ceux qui sont étrangers et dispersés dans le Pont, la Galatie, la Cappadoce, l''Asie et la Bithynie. A vous qui avez été choisis '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Les prophètes qui ont parlé de la grâce qui vous était réservée ont fait de ce salut l''objet de leurs recherches et de leurs investigations. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ils cherchaient à découvrir l''époque et les circonstances indiquées par l''Esprit de Christ qui était en eux lorsqu''il attestait d''avance les souffrances du Messie et la gloire dont elles seraient suivies. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Il leur a été révélé que ce n'était pas pour eux-mêmes, mais pour vous, qu'ils étaient au service de ce message. Les hommes qui vous ont prêché l'Evangile par le Saint-Esprit envoyé du ciel vous ont maintenant annoncé ce message, dans lequel les anges eux-mêmes désirent plonger leurs regards!
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Invitation à une conduite sainte
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: C'est pourquoi, tenez votre intelligence en éveil, soyez sobres et mettez toute votre espérance dans la grâce qui vous sera apportée lorsque Jésus-Christ apparaîtra.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'En enfants obéissants, ne vous conformez pas aux désirs que vous aviez autrefois, quand vous étiez dans l''ignorance. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Au contraire, puisque celui qui vous a appelés est saint, vous aussi soyez saints dans toute votre conduite. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'En effet, il est écrit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Vous serez saints car moi, je suis saint.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Vous serez… saint: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lévitique 11.44
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Et si c''est comme à un Père que vous faites appel à celui qui '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: juge chacun conformément à sa manière d'agir
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Juge… manière d''agir: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'présentation tirée du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 62.13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' sans faire de favoritisme, conduisez-vous avec une crainte respectueuse pendant le temps de votre séjour sur la terre. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Vous le savez en effet, ce n''est pas par des choses corruptibles comme l''argent ou l''or que vous avez été rachetés de la manière de vivre dépourvue de sens que vous avaient transmise vos ancêtres, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'mais par le sang précieux de Christ, qui s''est sacrifié comme un agneau sans défaut et sans tache. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'conformément à la prescience de Dieu le Père et conduits à la sainteté par l''Esprit afin de devenir obéissants et d''être purifiés par le sang de Jésus-Christ: que la grâce et la paix vous soient multipliées!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'espérance du salut
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Prédestiné avant la création du monde, il a été révélé dans les derniers temps à cause de vous. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Par lui, vous croyez en Dieu qui l'a ressuscité et lui a donné la gloire, de sorte que votre foi et votre espérance reposent sur Dieu.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Vous avez purifié votre âme en obéissant [par l''Esprit] à la vérité pour avoir un amour fraternel sincère; aimez-vous donc ardemment les uns les autres d''un cœur pur. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'En effet, vous êtes nés de nouveau, non pas d''une semence corruptible, mais d''une semence incorruptible, grâce à la parole vivante et permanente de Dieu, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'car '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: toute créature est comme l'herbe, et toute sa gloire comme la fleur des champs. L'herbe sèche et la fleur tombe,
    - type: text
      text: ' '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: mais la parole du Seigneur subsiste éternellement
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.24-25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Toute créature… éternellement: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 40.6-8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . Cette parole est justement celle qui vous a été annoncée par l'Evangile.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Béni soit Dieu, le Père de notre Seigneur Jésus-Christ! Conformément à sa grande bonté, il nous a fait naître de nouveau à travers la résurrection de Jésus-Christ pour une espérance vivante, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'pour un héritage qui ne peut ni se détruire, ni se souiller, ni perdre son éclat. Il vous est réservé dans le ciel, à vous '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: qui êtes gardés par la puissance de Dieu, au moyen de la foi, pour le salut prêt à être révélé dans les derniers temps.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'C''est ce qui fait votre joie, même si maintenant, puisqu''il le faut, vous êtes pour un peu de temps attristés par diverses épreuves. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ainsi, la valeur éprouvée de votre foi – beaucoup plus précieuse que l''or, qui est périssable et que l''on soumet pourtant à l''épreuve du feu – aura pour résultat la louange, la gloire et l''honneur lorsque Jésus-Christ apparaîtra. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Vous l''aimez sans l''avoir vu, vous croyez en lui sans le voir encore et vous vous réjouissez d''une joie indescriptible et glorieuse '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: parce que vous obtenez le salut de votre âme pour prix de votre foi.
