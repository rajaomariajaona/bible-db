document_id: 1CH.22,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Préparatifs pour la construction du temple
  - type: text
    content: 'David dit: «C''est ici que sera la maison de l''Eternel Dieu, c''est ici que sera l''autel des holocaustes pour Israël.» '
  '10':
  - type: text
    content: Ce sera lui qui construira une maison pour mon nom. Il sera pour moi un fils et je serai pour lui un père, et j'affermirai pour toujours le trône de son royaume en Israël.’
  '11':
  - type: text
    content: '»Maintenant, mon fils, que l''Eternel soit avec toi, afin que tu connaisses le succès et construises la maison de l''Eternel, ton Dieu, conformément à ce qu''il a déclaré à ton sujet! '
  '12':
  - type: text
    content: 'Que l''Eternel veuille seulement t''accorder de la sagesse et de l''intelligence, en te plaçant à la tête d''Israël, afin que tu respectes la loi de l''Eternel, ton Dieu! '
  '13':
  - type: text
    content: 'C''est alors que tu connaîtras le succès, si tu veilles à mettre en pratique les prescriptions et les règles que l''Eternel a données à Moïse pour Israël. Fortifie-toi et prends courage, n''aie pas peur, ne te laisse pas effrayer! '
  '14':
  - type: text
    content: 'Par mes efforts, j''ai préparé pour la maison de l''Eternel 3000 tonnes d''or, 30''000 tonnes d''argent et une quantité de bronze et de fer qu''il n''est pas possible de peser, tant il y en a. J''ai aussi préparé du bois et des pierres, et tu pourras encore en ajouter. '
  '15':
  - type: text
    content: 'Tu disposes d''un grand nombre d''ouvriers, de tailleurs de pierres, de charpentiers et d''hommes habiles pour toutes sortes de travaux. '
  '16':
  - type: text
    content: L'or, l'argent, le bronze et le fer sont en quantité incalculable. Lève-toi et agis, et que l'Eternel soit avec toi!»
  '17':
  - type: text
    content: 'David ordonna à tous les chefs d''Israël d''aider son fils Salomon: '
  '18':
  - type: text
    content: '«L''Eternel, votre Dieu, n''est-il pas avec vous et ne vous a-t-il pas donné du repos de tous côtés? En effet, il a livré entre mes mains les habitants du pays, et le pays est soumis devant l''Eternel et devant son peuple. '
  '19':
  - type: text
    content: Appliquez maintenant votre cœur et votre âme à chercher l'Eternel, votre Dieu. Levez-vous et construisez le sanctuaire de l'Eternel Dieu, afin d'amener l'arche de l'alliance de l'Eternel et les ustensiles consacrés à Dieu dans la maison qui sera construite pour le nom de l'Eternel.»
  '2':
  - type: text
    content: 'Il fit rassembler les étrangers qui se trouvaient dans le pays d''Israël et il chargea des tailleurs de pierres de préparer des pierres de taille pour la construction de la maison de Dieu. '
  '3':
  - type: text
    content: 'Il prépara aussi beaucoup de fer pour les clous des battants des portes et pour les crochets, du bronze en quantité telle qu''il n''était pas possible de le peser '
  '4':
  - type: text
    content: 'et une quantité incalculable de cèdre. En effet, les Sidoniens et les Tyriens avaient amené beaucoup de cèdre à David. '
  '5':
  - type: text
    content: 'David se disait: «Mon fils Salomon est jeune et faible, et la maison qu''il s''agit de construire pour l''Eternel doit élever bien haut son nom et sa gloire dans tous les pays. C''est pourquoi je veux faire des préparatifs pour lui.» Ainsi, David fit beaucoup de préparatifs avant sa mort.'
  '6':
  - type: text
    content: 'David appela son fils Salomon et lui ordonna de construire une maison pour l''Eternel, le Dieu d''Israël. '
  '7':
  - type: text
    content: 'Il dit à Salomon: «Mon fils, j''avais l''intention de construire une maison pour l''Eternel, mon Dieu, '
  '8':
  - type: text
    content: 'mais la parole de l''Eternel m''a été adressée: ‘Tu as versé beaucoup de sang et tu as mené de grandes guerres. Tu ne pourras pas construire une maison en mon honneur, car tu as versé beaucoup de sang devant moi sur la terre. '
  '9':
  - type: text
    content: 'Tu auras un fils qui sera un homme de repos et à qui je donnerai du repos en le délivrant de tous les ennemis qui l''environneront: Salomon'
  - type: note
    content: 'Salomon: proche de l''hébreu shalom, littéralement paix.'
  - type: text
    content: ', voilà son nom, et je ferai venir la paix et la tranquillité sur Israël pendant sa vie. '
