document_id: 2KI.25,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Alors, la neuvième année du règne de Sédécias, le dixième jour du dixième mois, Nebucadnetsar, le roi de Babylone, vint avec toute son armée attaquer Jérusalem; il installa son camp devant elle et construisit des retranchements tout autour d''elle. '
  '10':
  - type: text
    content: Toute l'armée babylonienne qui accompagnait le chef des gardes démolit les murailles formant l'enceinte de Jérusalem.
  '11':
  - type: text
    content: 'Nebuzaradan, le chef des gardes, emmena en exil les membres du peuple qui étaient restés dans la ville, ceux qui s''étaient déjà rendus au roi de Babylone et tout le reste de la population. '
  '12':
  - type: text
    content: 'Toutefois, le chef des gardes laissa comme vignerons et comme agriculteurs une partie des pauvres du pays. '
  '13':
  - type: text
    content: 'Les Babyloniens brisèrent les colonnes en bronze qui étaient dans la maison de l''Eternel, ainsi que les bases et la cuve en bronze qui s''y trouvaient, et ils en emportèrent le bronze à Babylone. '
  '14':
  - type: text
    content: 'Ils prirent les cendriers, les pelles, les couteaux, les tasses et tous les ustensiles en bronze qu''on utilisait pour le culte. '
  '15':
  - type: text
    content: 'Le chef des gardes prit encore les brûle-parfums et les coupes, aussi bien ce qui était en or que ce qui était en argent. '
  '16':
  - type: text
    content: 'Quant aux deux colonnes, à la cuve et aux bases que Salomon avait faites pour la maison de l''Eternel, il était impossible de peser le bronze de tous ces éléments. '
  '17':
  - type: text
    content: La hauteur d'une colonne était de 9 mètres et il y avait au-dessus un chapiteau en bronze haut d'un mètre et demi; autour du chapiteau il y avait un treillis et des grenades, le tout en bronze; il en allait de même pour la seconde colonne, aussi avec le treillis.
  '18':
  - type: text
    content: 'Le chef des gardes captura le grand-prêtre Seraja, le prêtre adjoint Sophonie et les trois gardiens de l''entrée. '
  '19':
  - type: text
    content: 'Dans la ville, il captura un eunuque qui commandait aux hommes de guerre, 5 hommes qui faisaient partie des conseillers du roi et qu''on trouva dans la ville, le secrétaire du chef de l''armée chargé d''enrôler la population du pays, ainsi que 60 hommes pris parmi la population du pays qu''on trouva dans la ville. '
  '2':
  - type: text
    content: Le siège de la ville dura jusqu'à la onzième année du règne de Sédécias.
  '20':
  - type: text
    content: 'Nebuzaradan, le chef des gardes, les captura et les conduisit vers le roi de Babylone à Ribla, '
  '21':
  - type: text
    content: et le roi de Babylone les frappa à mort à Ribla, dans le pays de Hamath.
  - type: heading
    content: Révolte contre le gouverneur de Juda
  - type: text
    content: 'C''est ainsi que Juda partit en exil loin de sa terre. '
  '22':
  - type: text
    content: Nebucadnetsar, le roi de Babylone, plaça le reste du peuple, ceux qu'il laissa dans le pays de Juda, sous l'autorité de Guedalia, le fils d'Achikam et le petit-fils de Shaphan.
  '23':
  - type: text
    content: 'Lorsque tous les chefs des troupes et leurs hommes apprirent que le roi de Babylone avait établi Guedalia comme gouverneur, ils se rendirent vers Guedalia à Mitspa. C''étaient Ismaël, le fils de Nethania, Jochanan, le fils de Karéach, Seraja, le fils de Thanhumeth, de Nethopha, et Jaazania, le fils du Maacathien, ainsi que leurs hommes. '
  '24':
  - type: text
    content: 'Guedalia leur fit un serment, à eux et à leurs hommes, et il leur dit: «N''ayez pas peur des serviteurs des Babyloniens. Installez-vous dans le pays, servez le roi de Babylone et tout se passera bien pour vous.» '
  '25':
  - type: text
    content: 'Mais le septième mois, Ismaël, le fils de Nethania et le petit-fils d''Elishama, qui était de sang royal, vint en compagnie de 10 hommes et ils frappèrent mortellement Guedalia ainsi que les Juifs et les Babyloniens qui étaient avec lui à Mitspa. '
  '26':
  - type: text
    content: Alors tout le peuple, du plus petit jusqu'au plus grand, et les chefs des troupes se levèrent et s'en allèrent en Egypte, parce qu'ils avaient peur des Babyloniens.
  - type: heading
    content: Libération de Jojakin
  '27':
  - type: text
    content: 'La trente-septième année de l''exil de Jojakin, roi de Juda, le vingt-septième jour du douzième mois, Evil-Merodac, le roi de Babylone, releva la tête du roi de Juda Jojakin et le fit sortir de prison. C''était la première année de son règne. '
  '28':
  - type: text
    content: 'Il lui parla avec bonté et lui donna une place supérieure à celle des autres rois retenus avec lui à Babylone. '
  '29':
  - type: text
    content: 'Il lui fit changer ses habits de prisonnier et Jojakin mangea à sa table tout le reste de sa vie. '
  '3':
  - type: text
    content: 'Le neuvième jour du quatrième mois, la famine était si forte dans la ville qu''il n''y avait plus de pain pour la population du pays. '
  '30':
  - type: text
    content: Le roi pourvut constamment à son entretien journalier, durant tout le reste de sa vie.
  '4':
  - type: text
    content: 'Alors on fit une brèche dans les remparts de la ville et tous les hommes de guerre s''enfuirent de nuit en passant par la porte située entre les deux murailles près du jardin du roi, alors même que les Babyloniens encerclaient la ville. Les fuyards prirent le chemin de la plaine. '
  '5':
  - type: text
    content: 'Cependant, l''armée babylonienne poursuivit le roi et le rattrapa dans les plaines de Jéricho. Toute son armée se dispersa loin de lui. '
  '6':
  - type: text
    content: 'Ils s''emparèrent du roi et le firent monter vers le roi de Babylone à Ribla. On prononça un jugement contre lui. '
  '7':
  - type: text
    content: Les fils de Sédécias furent égorgés en sa présence, puis on lui creva les yeux, on l'attacha avec des chaînes en bronze et on le conduisit à Babylone.
  - type: heading
    content: Destruction de Jérusalem et du temple
  '8':
  - type: text
    content: 'Le septième jour du cinquième mois – c''était la dix-neuvième année du règne de Nebucadnetsar sur Babylone – Nebuzaradan, le chef des gardes et le serviteur du roi de Babylone, pénétra dans Jérusalem. '
  '9':
  - type: text
    content: 'Il brûla la maison de l''Eternel, le palais royal et toutes les maisons de Jérusalem; il livra aux flammes toutes les maisons d''une certaine importance. '
