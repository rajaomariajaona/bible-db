document_id: ROM.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Devoirs envers les autorités
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Que chacun se soumette aux autorités qui nous gouvernent, car toute autorité vient de Dieu, et celles qui existent ont été établies par Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'C''est pourquoi celui qui s''oppose à l''autorité résiste à l''ordre que Dieu a établi, et ceux qui résistent attireront une condamnation sur eux-mêmes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'En effet, on n''a pas à craindre les magistrats quand on fait le bien, mais quand on fait le mal. Veux-tu ne pas avoir à craindre l''autorité? Fais le bien et tu auras son approbation, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: car le magistrat est serviteur de Dieu pour ton bien. Mais si tu fais le mal, sois dans la crainte. En effet, ce n'est pas pour rien qu'il porte l'épée
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Porte l''épée: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire dispose du pouvoir de punir.
    marker-yv: yv-n
  - type: text
    text: ', puisqu''il est serviteur de Dieu pour manifester sa colère en punissant celui qui fait le mal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il est donc nécessaire de se soumettre aux autorités, non seulement à cause de cette colère, mais encore par motif de conscience.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'C''est aussi pour cela que vous payez des impôts, car les magistrats sont des serviteurs de Dieu qui s''appliquent entièrement à cette fonction. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Rendez à chacun ce qui lui est dû: l''impôt à qui vous devez l''impôt, la taxe à qui vous devez la taxe, le respect à qui vous devez le respect, l''honneur à qui vous devez l''honneur.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Devoirs envers les autres
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ne devez rien à personne, si ce n''est de vous aimer les uns les autres, car celui qui aime les autres a accompli la loi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'En effet, les commandements: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu ne commettras pas d'adultère, tu ne commettras pas de meurtre, tu ne commettras pas de vol, [tu ne porteras pas de faux témoignage,] tu ne convoiteras pas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu ne commettras… convoiteras pas: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation de cinq des dix commandements (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 20.13-17
      metadata:
        usfm: EXO.20.13+EXO.20.14+EXO.20.15+EXO.20.16+EXO.20.17
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 5.17-21
      metadata:
        usfm: DEU.5.17+DEU.5.18+DEU.5.19+DEU.5.20+DEU.5.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', ainsi que tous les autres, se résument dans cette parole: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu aimeras ton prochain comme toi-même
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Tu aimeras… toi-même: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lévitique 19.18
      metadata:
        usfm: LEV.19.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: L'amour ne fait pas de mal au prochain; l'amour est donc l'accomplissement de la loi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Cela est d''autant plus important que vous savez quel temps nous vivons: c''est l''heure de vous réveiller enfin du sommeil, car maintenant le salut est plus près de nous qu''au moment où nous avons cru. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'La nuit est bien avancée, le jour approche. Débarrassons-nous donc des œuvres des ténèbres et revêtons les armes de la lumière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Conduisons-nous honnêtement, comme en plein jour, sans orgies ni ivrognerie, sans immoralité ni débauche, sans dispute ni jalousie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mais revêtez-vous du Seigneur Jésus-Christ et ne vous préoccupez pas de votre nature propre pour satisfaire ses convoitises.
