document_id: ROM.13,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Devoirs envers les autorités
  - type: text
    content: 'Que chacun se soumette aux autorités qui nous gouvernent, car toute autorité vient de Dieu, et celles qui existent ont été établies par Dieu. '
  '10':
  - type: text
    content: L'amour ne fait pas de mal au prochain; l'amour est donc l'accomplissement de la loi.
  '11':
  - type: text
    content: 'Cela est d''autant plus important que vous savez quel temps nous vivons: c''est l''heure de vous réveiller enfin du sommeil, car maintenant le salut est plus près de nous qu''au moment où nous avons cru. '
  '12':
  - type: text
    content: 'La nuit est bien avancée, le jour approche. Débarrassons-nous donc des œuvres des ténèbres et revêtons les armes de la lumière. '
  '13':
  - type: text
    content: 'Conduisons-nous honnêtement, comme en plein jour, sans orgies ni ivrognerie, sans immoralité ni débauche, sans dispute ni jalousie. '
  '14':
  - type: text
    content: Mais revêtez-vous du Seigneur Jésus-Christ et ne vous préoccupez pas de votre nature propre pour satisfaire ses convoitises.
  '2':
  - type: text
    content: 'C''est pourquoi celui qui s''oppose à l''autorité résiste à l''ordre que Dieu a établi, et ceux qui résistent attireront une condamnation sur eux-mêmes. '
  '3':
  - type: text
    content: 'En effet, on n''a pas à craindre les magistrats quand on fait le bien, mais quand on fait le mal. Veux-tu ne pas avoir à craindre l''autorité? Fais le bien et tu auras son approbation, '
  '4':
  - type: text
    content: car le magistrat est serviteur de Dieu pour ton bien. Mais si tu fais le mal, sois dans la crainte. En effet, ce n'est pas pour rien qu'il porte l'épée
  - type: note
    content: 'Porte l''épée: c''est-à-dire dispose du pouvoir de punir.'
  - type: text
    content: ', puisqu''il est serviteur de Dieu pour manifester sa colère en punissant celui qui fait le mal. '
  '5':
  - type: text
    content: Il est donc nécessaire de se soumettre aux autorités, non seulement à cause de cette colère, mais encore par motif de conscience.
  '6':
  - type: text
    content: 'C''est aussi pour cela que vous payez des impôts, car les magistrats sont des serviteurs de Dieu qui s''appliquent entièrement à cette fonction. '
  '7':
  - type: text
    content: 'Rendez à chacun ce qui lui est dû: l''impôt à qui vous devez l''impôt, la taxe à qui vous devez la taxe, le respect à qui vous devez le respect, l''honneur à qui vous devez l''honneur.'
  - type: heading
    content: Devoirs envers les autres
  '8':
  - type: text
    content: 'Ne devez rien à personne, si ce n''est de vous aimer les uns les autres, car celui qui aime les autres a accompli la loi. '
  '9':
  - type: text
    content: 'En effet, les commandements: '
  - type: text
    content: Tu ne commettras pas d'adultère, tu ne commettras pas de meurtre, tu ne commettras pas de vol, [tu ne porteras pas de faux témoignage,] tu ne convoiteras pas
  - type: note
    content: 'Tu ne commettras… convoiteras pas: citation de cinq des dix commandements (Exode 20.13-17; Deutéronome 5.17-21).'
  - type: text
    content: ', ainsi que tous les autres, se résument dans cette parole: '
  - type: text
    content: Tu aimeras ton prochain comme toi-même
  - type: text
    content: .
  - type: note
    content: 'Tu aimeras… toi-même: citation de Lévitique 19.18.'
  - type: text
    content: ' '
