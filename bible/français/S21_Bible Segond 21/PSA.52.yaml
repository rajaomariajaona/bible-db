document_id: PSA.52,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Punition du trompeur
  - type: text
    content: 'Au chef de chœur. Cantique de David, '
  '10':
  - type: text
    content: Mais moi, je suis pareil à un olivier verdoyant dans la maison de Dieu,
  - type: text
    content: je me confie dans la bonté de Dieu pour toujours et à perpétuité.
  '11':
  - type: text
    content: Je te louerai toujours pour ce que tu as fait.
  - type: text
    content: Je veux espérer en ton nom, car tu es bon
  - type: text
    content: envers tes fidèles.
  '2':
  - type: text
    content: 'lorsque Doëg, l''Edomite, vint dire à Saül: «David s''est rendu dans la maison d''Achimélec.»'
  '3':
  - type: text
    content: Pourquoi te vantes-tu de ce qui est mal, toi l'homme fort?
  - type: text
    content: La bonté de Dieu subsiste toujours.
  '4':
  - type: text
    content: Ta langue n'invente que le crime,
  - type: text
    content: elle est coupante comme un rasoir, fourbe que tu es!
  '5':
  - type: text
    content: Tu préfères le mal au bien,
  - type: text
    content: 'le mensonge à la vérité. '
  - type: text
    content: – Pause.
  '6':
  - type: text
    content: Tu aimes toutes les paroles qui détruisent,
  - type: text
    content: langue trompeuse!
  '7':
  - type: text
    content: C'est pourquoi Dieu t'abattra pour toujours,
  - type: text
    content: il s'emparera de toi et t'arrachera de ta tente,
  - type: text
    content: 'il te déracinera de la terre des vivants. '
  - type: text
    content: – Pause.
  '8':
  - type: text
    content: Les justes le verront, ils éprouveront de la crainte,
  - type: text
    content: 'et ils se moqueront de lui:'
  '9':
  - type: text
    content: «Voilà l'homme qui ne prenait pas Dieu pour protecteur,
  - type: text
    content: mais qui se confiait dans ses grandes richesses
  - type: text
    content: et cherchait refuge dans sa méchanceté.»
