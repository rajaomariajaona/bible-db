document_id: PSA.52,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Punition du trompeur
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Au chef de chœur. Cantique de David, '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mais moi, je suis pareil à un olivier verdoyant dans la maison de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je me confie dans la bonté de Dieu pour toujours et à perpétuité.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Je te louerai toujours pour ce que tu as fait.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je veux espérer en ton nom, car tu es bon
  - type: usfm
    marker: q1
    children:
    - type: text
      text: envers tes fidèles.
  '2':
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'lorsque Doëg, l''Edomite, vint dire à Saül: «David s''est rendu dans la maison d''Achimélec.»'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Pourquoi te vantes-tu de ce qui est mal, toi l'homme fort?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La bonté de Dieu subsiste toujours.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ta langue n'invente que le crime,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle est coupante comme un rasoir, fourbe que tu es!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tu préfères le mal au bien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'le mensonge à la vérité. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Tu aimes toutes les paroles qui détruisent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: langue trompeuse!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: C'est pourquoi Dieu t'abattra pour toujours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il s'emparera de toi et t'arrachera de ta tente,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'il te déracinera de la terre des vivants. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Les justes le verront, ils éprouveront de la crainte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et ils se moqueront de lui:'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: «Voilà l'homme qui ne prenait pas Dieu pour protecteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais qui se confiait dans ses grandes richesses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et cherchait refuge dans sa méchanceté.»
