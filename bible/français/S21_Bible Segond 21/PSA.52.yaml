document_id: PSA.52
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Punition du trompeur
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Au chef de chœur. Cantique de David, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'lorsque Doëg, l''Edomite, vint dire à Saül: «David s''est rendu dans la maison d''Achimélec.»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Pourquoi te vantes-tu de ce qui est mal, toi l'homme fort?
- type: usfm
  marker: q1
  children:
  - type: text
    text: La bonté de Dieu subsiste toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ta langue n'invente que le crime,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle est coupante comme un rasoir, fourbe que tu es!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu préfères le mal au bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'le mensonge à la vérité. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tu aimes toutes les paroles qui détruisent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: langue trompeuse!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: C'est pourquoi Dieu t'abattra pour toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il s'emparera de toi et t'arrachera de ta tente,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'il te déracinera de la terre des vivants. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Les justes le verront, ils éprouveront de la crainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et ils se moqueront de lui:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: «Voilà l'homme qui ne prenait pas Dieu pour protecteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais qui se confiait dans ses grandes richesses
- type: usfm
  marker: q1
  children:
  - type: text
    text: et cherchait refuge dans sa méchanceté.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mais moi, je suis pareil à un olivier verdoyant dans la maison de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je me confie dans la bonté de Dieu pour toujours et à perpétuité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je te louerai toujours pour ce que tu as fait.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je veux espérer en ton nom, car tu es bon
- type: usfm
  marker: q1
  children:
  - type: text
    text: envers tes fidèles.
