document_id: JHN.20,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Résurrection de Jésus
  - type: text
    content: 'Le dimanche, Marie de Magdala se rendit au tombeau de bon matin, alors qu''il faisait encore sombre, et elle vit que la pierre avait été enlevée [de l''entrée] du tombeau. '
  '10':
  - type: text
    content: Ensuite les disciples repartirent chez eux.
  '11':
  - type: text
    content: 'Cependant, Marie se tenait dehors près du tombeau et pleurait. Tout en pleurant, elle se pencha pour regarder dans le tombeau, '
  '12':
  - type: text
    content: 'et elle vit deux anges habillés de blanc assis à la place où avait été couché le corps de Jésus, l''un à la tête et l''autre aux pieds. '
  '13':
  - type: text
    content: 'Ils lui dirent: «Femme, pourquoi pleures-tu?» Elle leur répondit: «Parce qu''ils ont enlevé mon Seigneur et je ne sais pas où ils l''ont mis.» '
  '14':
  - type: text
    content: 'En disant cela, elle se retourna et vit Jésus debout, mais elle ne savait pas que c''était lui. '
  '15':
  - type: text
    content: 'Jésus lui dit: «Femme, pourquoi pleures-tu? Qui cherches-tu?» Pensant que c''était le jardinier, elle lui dit: «Seigneur, si c''est toi qui l''as emporté, dis-moi où tu l''as mis et j''irai le prendre.» '
  '16':
  - type: text
    content: 'Jésus lui dit: «Marie!» Elle se retourna et lui dit en hébreu: «Rabbouni!», c''est-à-dire maître. '
  '17':
  - type: text
    content: 'Jésus lui dit: «Ne me retiens pas, car je ne suis pas encore monté vers mon Père, mais va trouver mes frères et dis-leur que je monte vers mon Père et votre Père, vers mon Dieu et votre Dieu.» '
  '18':
  - type: text
    content: Marie de Magdala alla annoncer aux disciples qu'elle avait vu le Seigneur et qu'il lui avait dit cela.
  - type: heading
    content: Apparitions de Jésus ressuscité aux disciples
  '19':
  - type: text
    content: 'Le soir de ce même dimanche, les portes de la maison où les disciples se trouvaient [rassemblés] étaient fermées car ils avaient peur des chefs juifs; Jésus vint alors se présenter au milieu d''eux et leur dit: «Que la paix soit avec vous!» '
  '2':
  - type: text
    content: 'Elle courut trouver Simon Pierre et l''autre disciple que Jésus aimait et leur dit: «Ils ont enlevé le Seigneur du tombeau et nous ne savons pas où ils l''ont mis.»'
  '20':
  - type: text
    content: 'Après avoir dit cela, il leur montra ses mains et son côté. Les disciples furent remplis de joie en voyant le Seigneur. '
  '21':
  - type: text
    content: 'Jésus leur dit de nouveau: «Que la paix soit avec vous! Tout comme le Père m''a envoyé, moi aussi je vous envoie.» '
  '22':
  - type: text
    content: 'Après ces paroles, il souffla sur eux et leur dit: «Recevez le Saint-Esprit! '
  '23':
  - type: text
    content: Ceux à qui vous pardonnerez les péchés, ils leur seront pardonnés; ceux à qui vous les retiendrez, ils leur seront retenus.»
  '24':
  - type: text
    content: 'Thomas appelé Didyme, l''un des douze, n''était pas avec eux lorsque Jésus vint. '
  '25':
  - type: text
    content: 'Les autres disciples lui dirent donc: «Nous avons vu le Seigneur.» Mais il leur dit: «Si je ne vois pas dans ses mains la marque des clous, si je n''y mets pas mon doigt et si je ne mets pas ma main dans son côté, je ne croirai pas.»'
  '26':
  - type: text
    content: 'Huit jours après, les disciples de Jésus étaient de nouveau dans la maison et Thomas se trouvait avec eux. Jésus vint alors que les portes étaient fermées, se tint au milieu d''eux et dit: «Que la paix soit avec vous!» '
  '27':
  - type: text
    content: 'Puis il dit à Thomas: «Avance ton doigt ici et regarde mes mains. Avance aussi ta main et mets-la dans mon côté. Ne sois pas incrédule, mais crois!» '
  '28':
  - type: text
    content: 'Thomas lui répondit: «Mon Seigneur et mon Dieu!» Jésus lui dit: '
  '29':
  - type: text
    content: «Parce que tu m'as vu, tu as cru. Heureux ceux qui n'ont pas vu et qui ont cru!»
  - type: heading
    content: Objectif de l'auteur
  '3':
  - type: text
    content: 'Pierre et l''autre disciple sortirent donc et allèrent au tombeau. '
  '30':
  - type: text
    content: 'Jésus a accompli encore, en présence de ses disciples, beaucoup d''autres signes qui ne sont pas décrits dans ce livre. '
  '31':
  - type: text
    content: Mais ceux-ci ont été décrits afin que vous croyiez que Jésus est le Messie, le Fils de Dieu, et qu'en croyant vous ayez la vie en son nom.
  '4':
  - type: text
    content: 'Ils couraient tous les deux ensemble, mais l''autre disciple courut plus vite que Pierre et arriva le premier au tombeau. '
  '5':
  - type: text
    content: 'Il se pencha et vit les bandelettes posées par terre, cependant il n''entra pas. '
  '6':
  - type: text
    content: 'Simon Pierre, qui le suivait, arriva et entra dans le tombeau. Il vit les bandelettes posées par terre; '
  '7':
  - type: text
    content: 'le linge qu''on avait mis sur la tête de Jésus n''était pas avec les bandes, mais enroulé dans un endroit à part. '
  '8':
  - type: text
    content: 'Alors l''autre disciple, qui était arrivé le premier au tombeau, entra aussi, il vit et il crut. '
  '9':
  - type: text
    content: 'En effet, ils n''avaient pas encore compris que, d''après l''Ecriture, Jésus devait ressusciter. '
