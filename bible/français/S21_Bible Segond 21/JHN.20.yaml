document_id: JHN.20,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Résurrection de Jésus
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Le dimanche, Marie de Magdala se rendit au tombeau de bon matin, alors qu''il faisait encore sombre, et elle vit que la pierre avait été enlevée [de l''entrée] du tombeau. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ensuite les disciples repartirent chez eux.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Cependant, Marie se tenait dehors près du tombeau et pleurait. Tout en pleurant, elle se pencha pour regarder dans le tombeau, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'et elle vit deux anges habillés de blanc assis à la place où avait été couché le corps de Jésus, l''un à la tête et l''autre aux pieds. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ils lui dirent: «Femme, pourquoi pleures-tu?» Elle leur répondit: «Parce qu''ils ont enlevé mon Seigneur et je ne sais pas où ils l''ont mis.» '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'En disant cela, elle se retourna et vit Jésus debout, mais elle ne savait pas que c''était lui. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Jésus lui dit: «Femme, pourquoi pleures-tu? Qui cherches-tu?» Pensant que c''était le jardinier, elle lui dit: «Seigneur, si c''est toi qui l''as emporté, dis-moi où tu l''as mis et j''irai le prendre.» '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Jésus lui dit: «Marie!» Elle se retourna et lui dit en hébreu: «Rabbouni!», c''est-à-dire maître. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Jésus lui dit: «Ne me retiens pas, car je ne suis pas encore monté vers mon Père, mais va trouver mes frères et dis-leur que je monte vers mon Père et votre Père, vers mon Dieu et votre Dieu.» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Marie de Magdala alla annoncer aux disciples qu'elle avait vu le Seigneur et qu'il lui avait dit cela.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Apparitions de Jésus ressuscité aux disciples
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Le soir de ce même dimanche, les portes de la maison où les disciples se trouvaient [rassemblés] étaient fermées car ils avaient peur des chefs juifs; Jésus vint alors se présenter au milieu d''eux et leur dit: «Que la paix soit avec vous!» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Elle courut trouver Simon Pierre et l''autre disciple que Jésus aimait et leur dit: «Ils ont enlevé le Seigneur du tombeau et nous ne savons pas où ils l''ont mis.»'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Après avoir dit cela, il leur montra ses mains et son côté. Les disciples furent remplis de joie en voyant le Seigneur. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Jésus leur dit de nouveau: «Que la paix soit avec vous! Tout comme le Père m''a envoyé, moi aussi je vous envoie.» '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Après ces paroles, il souffla sur eux et leur dit: «Recevez le Saint-Esprit! '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ceux à qui vous pardonnerez les péchés, ils leur seront pardonnés; ceux à qui vous les retiendrez, ils leur seront retenus.»
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Thomas appelé Didyme, l''un des douze, n''était pas avec eux lorsque Jésus vint. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Les autres disciples lui dirent donc: «Nous avons vu le Seigneur.» Mais il leur dit: «Si je ne vois pas dans ses mains la marque des clous, si je n''y mets pas mon doigt et si je ne mets pas ma main dans son côté, je ne croirai pas.»'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Huit jours après, les disciples de Jésus étaient de nouveau dans la maison et Thomas se trouvait avec eux. Jésus vint alors que les portes étaient fermées, se tint au milieu d''eux et dit: «Que la paix soit avec vous!» '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Puis il dit à Thomas: «Avance ton doigt ici et regarde mes mains. Avance aussi ta main et mets-la dans mon côté. Ne sois pas incrédule, mais crois!» '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Thomas lui répondit: «Mon Seigneur et mon Dieu!» Jésus lui dit: '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: «Parce que tu m'as vu, tu as cru. Heureux ceux qui n'ont pas vu et qui ont cru!»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Objectif de l'auteur
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Pierre et l''autre disciple sortirent donc et allèrent au tombeau. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Jésus a accompli encore, en présence de ses disciples, beaucoup d''autres signes qui ne sont pas décrits dans ce livre. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Mais ceux-ci ont été décrits afin que vous croyiez que Jésus est le Messie, le Fils de Dieu, et qu'en croyant vous ayez la vie en son nom.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ils couraient tous les deux ensemble, mais l''autre disciple courut plus vite que Pierre et arriva le premier au tombeau. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il se pencha et vit les bandelettes posées par terre, cependant il n''entra pas. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Simon Pierre, qui le suivait, arriva et entra dans le tombeau. Il vit les bandelettes posées par terre; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'le linge qu''on avait mis sur la tête de Jésus n''était pas avec les bandes, mais enroulé dans un endroit à part. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Alors l''autre disciple, qui était arrivé le premier au tombeau, entra aussi, il vit et il crut. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'En effet, ils n''avaient pas encore compris que, d''après l''Ecriture, Jésus devait ressusciter. '
