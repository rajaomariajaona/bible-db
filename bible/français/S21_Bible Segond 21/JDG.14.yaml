document_id: JDG.14,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mariage de Samson
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Samson descendit à Thimna, et il y vit une jeune fille philistine. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Le père de Samson descendit chez la femme et là, Samson fit un festin, car c''était la coutume chez les jeunes hommes. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dès qu''on le vit, on invita 30 compagnons qui restèrent avec lui. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Samson leur dit: «Je vais vous proposer une énigme. Si vous réussissez à m''en donner l''explication au cours des 7 jours du festin, si vous la découvrez, je vous donnerai 30 chemises et 30 vêtements de rechange. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Mais si vous ne pouvez pas m''en donner l''explication, ce sera vous qui me donnerez 30 chemises et 30 vêtements de rechange.» Ils lui dirent: «Propose ton énigme et nous l''écouterons.» '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Et il leur dit: «De celui qui mange est sorti ce qui se mange, et du fort est sorti le doux.»'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant 3 jours, ils ne purent expliquer l''énigme. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Le quatrième jour, ils dirent à la femme de Samson: «Flatte ton mari pour qu''il nous donne l''explication de l''énigme. Sinon, nous te brûlerons, toi et ta famille. C''est pour nous dépouiller que vous nous avez invités, n''est-ce pas?» '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'La femme de Samson se mit à pleurer auprès de lui et à dire: «Tu n''as pour moi que de la haine, tu ne m''aimes pas: tu as proposé une énigme aux membres de mon peuple et tu ne me l''as pas expliquée!» Il lui répondait: «Je ne l''ai expliquée ni à mon père ni à ma mère. Est-ce à toi que je l''expliquerais?»'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Elle pleura auprès de lui jusqu''à la fin des 7 jours que dura leur festin. Le septième jour, il la lui expliqua, car elle le harcelait. Elle donna alors l''explication de l''énigme aux membres de son peuple. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Les habitants de la ville dirent à Samson le septième jour, avant le coucher du soleil: «Quoi de plus doux que le miel et quoi de plus fort que le lion?» Il leur répondit: «Si vous n''aviez pas labouré avec ma génisse, vous n''auriez pas découvert mon énigme.»'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'L''Esprit de l''Eternel vint sur lui et il descendit à Askalon. Il y tua 30 hommes, prit leurs affaires et donna les vêtements de rechange à ceux qui avaient donné l''explication de l''énigme. Rempli de colère, il remonta chez son père. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'A son retour chez lui, il annonça à son père et à sa mère: «J''ai vu une jeune fille philistine à Thimna. Prenez-la maintenant pour ma femme.» '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Sa femme fut donnée en mariage à l'un de ses compagnons, avec lequel il était lié d'amitié.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Son père et sa mère lui dirent: «N''y a-t-il donc pas de femme dans notre tribu et dans notre peuple tout entier, pour que tu ailles prendre une femme chez les Philistins, ces incirconcis?» Samson répéta à son père: «Prends-la pour moi, car elle me plaît.» '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Son père et sa mère ne savaient pas que cela venait de l'Eternel. Samson cherchait en effet une occasion de dispute avec les Philistins. A cette époque-là, les Philistins dominaient sur Israël.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Samson descendit avec son père et sa mère à Thimna. Lorsqu''ils arrivèrent aux vignes de Thimna, un jeune lion rugissant vint à sa rencontre. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'L''Esprit de l''Eternel vint sur Samson et, sans rien à la main, il déchira le lion comme s''il s''agissait d''un chevreau. Il ne dit pas à son père et à sa mère ce qu''il avait fait. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Une fois descendu, il parla à la femme et elle lui plut.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Quelque temps après, il se rendit de nouveau à Thimna pour l''épouser et il fit un détour pour voir le cadavre du lion. Il constata qu''il y avait un essaim d''abeilles et du miel dans le corps du lion. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Il prit le miel dans ses mains et en mangea pendant la route. Arrivé près de son père et de sa mère, il leur en donna et ils en mangèrent, mais il ne leur dit pas qu'il avait pris ce miel dans le corps du lion.
