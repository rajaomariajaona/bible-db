document_id: ECC.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Examen de la réalité
  - type: heading
    content: 1.1–6.12
  - type: heading
    content: Le cycle de la vie
  - type: text
    content: Paroles de l'Ecclésiaste
  - type: note
    content: 'L''Ecclésiaste: hébreu qohélet, mot qui semble désigner une personne s''exprimant dans l''assemblée.'
  - type: text
    content: ', fils de David, roi à Jérusalem.'
  '10':
  - type: text
    content: 'Si l''on dit à propos de quelque chose: «Regarde ceci, c''est nouveau», en réalité cela existait déjà dans les siècles précédents. '
  '11':
  - type: text
    content: On ne se souvient pas de ce qui est ancien, et ce qui arrivera par la suite ne laissera pas de souvenir chez ceux qui vivront plus tard.
  - type: heading
    content: La sagesse humaine
  '12':
  - type: text
    content: 'Moi, l''Ecclésiaste, j''ai été roi d''Israël à Jérusalem. '
  '13':
  - type: text
    content: 'J''ai appliqué mon cœur à rechercher et à explorer par la sagesse tout ce qui se fait sous le ciel: c''est une occupation pénible que Dieu réserve aux humains. '
  '14':
  - type: text
    content: 'J''ai vu tout ce qui se fait sous le soleil et j''ai constaté que tout n''est que fumée et revient à poursuivre le vent. '
  '15':
  - type: text
    content: 'Ce qui est courbé ne peut pas se redresser et ce qui manque ne peut pas être compté. '
  '16':
  - type: text
    content: 'Je me suis dit: «J''ai augmenté et développé la sagesse plus que tous ceux qui ont dominé avant moi sur Jérusalem, et mon cœur a vu beaucoup de sagesse et de connaissance.» '
  '17':
  - type: text
    content: 'J''ai appliqué mon cœur à connaître la sagesse, mais aussi la folie et la stupidité. J''ai découvert que cela aussi, cela revient à poursuivre le vent. '
  '18':
  - type: text
    content: En effet, avec beaucoup de sagesse on a beaucoup de chagrin, et celui qui augmente sa connaissance augmente sa souffrance.
  '2':
  - type: text
    content: Comble de l'inconsistance
  - type: note
    content: 'Comble de l''inconsistance: ou vanité des vanités ou suprême absurdité ou comble du passager, littéralement vapeur des vapeurs, expression qui renvoie à un manque de substance, à quelque chose qui est sans valeur et éphémère.'
  - type: text
    content: ', dit l''Ecclésiaste, comble de l''inconsistance, tout n''est que fumée!'
  '3':
  - type: text
    content: 'Quel avantage l''homme retire-t-il de toute la peine qu''il se donne sous le soleil? '
  '4':
  - type: text
    content: 'Une génération s''en va, une autre arrive et la terre est toujours là. '
  '5':
  - type: text
    content: 'Le soleil se lève, le soleil se couche, il soupire après l''endroit d''où il se lève de nouveau. '
  '6':
  - type: text
    content: 'Le vent se dirige vers le sud, tourne vers le nord, puis il tourne encore et reprend les mêmes circuits. '
  '7':
  - type: text
    content: 'Tous les fleuves vont à la mer, mais la mer n''est pas remplie et ils continuent d''aller vers leur destination. '
  '8':
  - type: text
    content: Tout est en mouvement, plus qu'on ne peut le dire. L'œil ne sera jamais rassasié de voir et l'oreille ne sera jamais remplie au point de ne plus pouvoir écouter.
  '9':
  - type: text
    content: 'Ce qui a existé, c''est ce qui existera, et ce qui s''est fait, c''est ce qui se fera. Il n''y a rien de nouveau sous le soleil. '
