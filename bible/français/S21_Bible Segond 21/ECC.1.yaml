document_id: ECC.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Examen de la réalité
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 1.1–6.12
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le cycle de la vie
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Paroles de l'Ecclésiaste
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''Ecclésiaste: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: hébreu qohélet, mot qui semble désigner une personne s'exprimant dans l'assemblée.
    marker-yv: yv-n
  - type: text
    text: ', fils de David, roi à Jérusalem.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Comble de l'inconsistance
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Comble de l''inconsistance: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ou vanité des vanités ou suprême absurdité ou comble du passager, littéralement vapeur des vapeurs, expression qui renvoie à un manque de substance, à quelque chose qui est sans valeur et éphémère.
    marker-yv: yv-n
  - type: text
    text: ', dit l''Ecclésiaste, comble de l''inconsistance, tout n''est que fumée!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Quel avantage l''homme retire-t-il de toute la peine qu''il se donne sous le soleil? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Une génération s''en va, une autre arrive et la terre est toujours là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le soleil se lève, le soleil se couche, il soupire après l''endroit d''où il se lève de nouveau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le vent se dirige vers le sud, tourne vers le nord, puis il tourne encore et reprend les mêmes circuits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tous les fleuves vont à la mer, mais la mer n''est pas remplie et ils continuent d''aller vers leur destination. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tout est en mouvement, plus qu'on ne peut le dire. L'œil ne sera jamais rassasié de voir et l'oreille ne sera jamais remplie au point de ne plus pouvoir écouter.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ce qui a existé, c''est ce qui existera, et ce qui s''est fait, c''est ce qui se fera. Il n''y a rien de nouveau sous le soleil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Si l''on dit à propos de quelque chose: «Regarde ceci, c''est nouveau», en réalité cela existait déjà dans les siècles précédents. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: On ne se souvient pas de ce qui est ancien, et ce qui arrivera par la suite ne laissera pas de souvenir chez ceux qui vivront plus tard.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La sagesse humaine
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Moi, l''Ecclésiaste, j''ai été roi d''Israël à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'J''ai appliqué mon cœur à rechercher et à explorer par la sagesse tout ce qui se fait sous le ciel: c''est une occupation pénible que Dieu réserve aux humains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'J''ai vu tout ce qui se fait sous le soleil et j''ai constaté que tout n''est que fumée et revient à poursuivre le vent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ce qui est courbé ne peut pas se redresser et ce qui manque ne peut pas être compté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Je me suis dit: «J''ai augmenté et développé la sagesse plus que tous ceux qui ont dominé avant moi sur Jérusalem, et mon cœur a vu beaucoup de sagesse et de connaissance.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'J''ai appliqué mon cœur à connaître la sagesse, mais aussi la folie et la stupidité. J''ai découvert que cela aussi, cela revient à poursuivre le vent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: En effet, avec beaucoup de sagesse on a beaucoup de chagrin, et celui qui augmente sa connaissance augmente sa souffrance.
