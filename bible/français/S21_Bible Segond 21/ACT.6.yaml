document_id: ACT.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Désignation de sept assistants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: A cette époque-là, alors que le nombre des disciples augmentait, les Hellénistes
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Hellénistes: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Juifs ayant vécu en dehors du territoire d'Israël et parlant le grec.
    marker-yv: yv-n
  - type: text
    text: ' murmurèrent contre les Hébreux'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hébreux: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Juifs nés et élevés sur le territoire d'Israël, dont la langue était l'araméen, proche de l'hébreu.
    marker-yv: yv-n
  - type: text
    text: ' parce que leurs veuves étaient négligées lors des distributions quotidiennes. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Les douze convoquèrent l''ensemble des disciples et dirent: «Il ne convient pas que nous délaissions la parole de Dieu pour servir aux tables. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'C''est pourquoi, frères et sœurs, choisissez parmi vous sept hommes de qui l''on rende un bon témoignage, remplis d''Esprit [saint] et de sagesse, et nous les chargerons de ce travail. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Quant à nous, nous continuerons à nous consacrer à la prière et au ministère de la parole.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Cette proposition plut à toute l''assemblée. Ils choisirent Etienne, un homme plein de foi et d''Esprit saint, Philippe, Prochore, Nicanor, Timon, Parménas et Nicolas, un non-Juif d''Antioche converti. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils les présentèrent aux apôtres et ils posèrent les mains sur eux en priant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: La parole de Dieu se propageait de plus en plus, le nombre des disciples augmentait beaucoup à Jérusalem et une grande foule de prêtres obéissaient à la foi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Arrestation et exécution d'Etienne
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Etienne, plein de foi et de puissance, accomplissait des prodiges et de grands signes miraculeux parmi le peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Quelques membres de la synagogue appelée «synagogue des affranchis», des Cyrénéens, des Alexandrins et des Juifs de Cilicie et d''Asie se mirent à discuter avec lui; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'mais ils ne pouvaient pas résister à la sagesse et à l''Esprit qui inspiraient ses paroles. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors ils soudoyèrent des hommes qui dirent: «Nous l''avons entendu proférer des paroles blasphématoires envers Moïse et envers Dieu.» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils ameutèrent le peuple, les anciens et les spécialistes de la loi, puis ils se jetèrent sur lui, l''arrêtèrent et l''emmenèrent au sanhédrin. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils présentèrent de faux témoins qui dirent: «Cet homme ne cesse de proférer des paroles [blasphématoires] contre le lieu saint et contre la loi; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: nous l'avons entendu dire que Jésus, ce Nazaréen, détruira ce lieu et changera les coutumes que Moïse nous a transmises.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tous ceux qui siégeaient au sanhédrin avaient les regards fixés sur Etienne; ils virent que son visage était comme celui d'un ange.
