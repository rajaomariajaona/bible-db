document_id: ACT.6,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Désignation de sept assistants
  - type: text
    content: A cette époque-là, alors que le nombre des disciples augmentait, les Hellénistes
  - type: note
    content: 'Hellénistes: Juifs ayant vécu en dehors du territoire d''Israël et parlant le grec.'
  - type: text
    content: ' murmurèrent contre les Hébreux'
  - type: note
    content: 'Hébreux: Juifs nés et élevés sur le territoire d''Israël, dont la langue était l''araméen, proche de l''hébreu.'
  - type: text
    content: ' parce que leurs veuves étaient négligées lors des distributions quotidiennes. '
  '10':
  - type: text
    content: 'mais ils ne pouvaient pas résister à la sagesse et à l''Esprit qui inspiraient ses paroles. '
  '11':
  - type: text
    content: 'Alors ils soudoyèrent des hommes qui dirent: «Nous l''avons entendu proférer des paroles blasphématoires envers Moïse et envers Dieu.» '
  '12':
  - type: text
    content: 'Ils ameutèrent le peuple, les anciens et les spécialistes de la loi, puis ils se jetèrent sur lui, l''arrêtèrent et l''emmenèrent au sanhédrin. '
  '13':
  - type: text
    content: 'Ils présentèrent de faux témoins qui dirent: «Cet homme ne cesse de proférer des paroles [blasphématoires] contre le lieu saint et contre la loi; '
  '14':
  - type: text
    content: nous l'avons entendu dire que Jésus, ce Nazaréen, détruira ce lieu et changera les coutumes que Moïse nous a transmises.»
  '15':
  - type: text
    content: Tous ceux qui siégeaient au sanhédrin avaient les regards fixés sur Etienne; ils virent que son visage était comme celui d'un ange.
  '2':
  - type: text
    content: 'Les douze convoquèrent l''ensemble des disciples et dirent: «Il ne convient pas que nous délaissions la parole de Dieu pour servir aux tables. '
  '3':
  - type: text
    content: 'C''est pourquoi, frères et sœurs, choisissez parmi vous sept hommes de qui l''on rende un bon témoignage, remplis d''Esprit [saint] et de sagesse, et nous les chargerons de ce travail. '
  '4':
  - type: text
    content: Quant à nous, nous continuerons à nous consacrer à la prière et au ministère de la parole.»
  '5':
  - type: text
    content: 'Cette proposition plut à toute l''assemblée. Ils choisirent Etienne, un homme plein de foi et d''Esprit saint, Philippe, Prochore, Nicanor, Timon, Parménas et Nicolas, un non-Juif d''Antioche converti. '
  '6':
  - type: text
    content: Ils les présentèrent aux apôtres et ils posèrent les mains sur eux en priant.
  '7':
  - type: text
    content: La parole de Dieu se propageait de plus en plus, le nombre des disciples augmentait beaucoup à Jérusalem et une grande foule de prêtres obéissaient à la foi.
  - type: heading
    content: Arrestation et exécution d'Etienne
  '8':
  - type: text
    content: 'Etienne, plein de foi et de puissance, accomplissait des prodiges et de grands signes miraculeux parmi le peuple. '
  '9':
  - type: text
    content: 'Quelques membres de la synagogue appelée «synagogue des affranchis», des Cyrénéens, des Alexandrins et des Juifs de Cilicie et d''Asie se mirent à discuter avec lui; '
