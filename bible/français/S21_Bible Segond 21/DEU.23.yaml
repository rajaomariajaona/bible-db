document_id: DEU.23,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: »Personne ne prendra la femme de son père et ne soulèvera la couverture de son père.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Cas d'exclusion de l'assemblée
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Lorsque tu partiras en campagne contre tes ennemis, garde-toi de toute chose mauvaise. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S''il y a chez toi un homme qui ne soit pas pur suite à une souillure nocturne, il sortira du camp et n''y rentrera pas. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Sur le soir il se lavera dans l'eau, et après le coucher du soleil il pourra rentrer au camp.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Tu auras un endroit prévu à l''extérieur du camp et c''est là dehors que tu iras pour tes besoins. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans ton équipement tu auras un outil dont tu te serviras pour faire un creux et recouvrir tes excréments quand tu voudras aller dehors. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, l'Eternel, ton Dieu, marche au milieu de ton camp pour te protéger et te livrer tes ennemis. Ton camp devra donc être saint, afin que l'Eternel ne voie rien d'impur chez toi et qu'il ne se détourne pas de toi.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Tu ne livreras pas à son maître un esclave qui se sera réfugié chez toi après l''avoir quitté. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il habitera avec toi, au milieu de toi, à l''endroit qu''il choisira dans l''une de tes villes, où bon lui semblera: tu ne l''exploiteras pas.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Il n'y aura aucune prostituée parmi les filles d'Israël, ni aucun prostitué parmi les fils d'Israël.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Tu n'apporteras pas dans la maison de l'Eternel, ton Dieu, pour l'accomplissement d'un vœu, le salaire d'une prostituée ou le prix d'un chien. En effet, l'un et l'autre sont en horreur à l'Eternel, ton Dieu.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»L''homme dont les testicules ont été écrasés ou l''urètre coupé n''entrera pas dans l''assemblée de l''Eternel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Tu n''exigeras de ton frère aucun intérêt, ni pour de l''argent, ni pour des vivres, ni pour rien de ce qui se prête à intérêt. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu pourras exiger un intérêt de l'étranger, mais pas de ton frère, afin que l'Eternel, ton Dieu, te bénisse dans tout ce que tu entreprendras dans le pays dont tu vas entrer en possession.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les vœux
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Si tu fais un vœu à l''Eternel, ton Dieu, tu ne tarderas pas à l''accomplir, car l''Eternel, ton Dieu, t''en demanderait compte et tu te chargerais d''un péché. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si tu t''abstiens de faire un vœu, tu ne commettras pas de péché. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais tu respecteras et tu accompliras ce qui sortira de tes lèvres, en te conformant aux vœux que tu feras volontairement à l'Eternel, ton Dieu, et que ta bouche aura prononcés.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Si tu entres dans la vigne de ton prochain, tu pourras à volonté manger des raisins et t''en rassasier, mais tu n''en mettras pas dans ton panier. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si tu entres dans les champs de blé de ton prochain, tu pourras cueillir des épis avec la main, mais tu n'agiteras pas la faucille sur les blés de ton prochain.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui est issu d''une union interdite n''entrera pas dans l''assemblée de l''Eternel. Même sa dixième génération n''y entrera pas. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Ammonite et le Moabite n''entreront pas dans l''assemblée de l''Eternel, même à la dixième génération et ce pour toujours, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'parce qu''ils ne sont pas venus à votre rencontre avec du pain et de l''eau, sur le chemin de votre sortie d''Egypte, et parce qu''ils ont soudoyé à tes dépens Balaam, fils de Beor, de Pethor en Mésopotamie, pour qu''il te maudisse. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais l''Eternel, ton Dieu, n''a pas voulu écouter Balaam et il a changé pour toi la malédiction en bénédiction, parce qu''il t''aime. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu ne rechercheras ni leur prospérité ni leur bien-être tant que tu vivras, et ce pour toujours. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu n'auras pas l'Edomite en horreur, car il est ton frère
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ton frère: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: les Edomites étaient des descendants d'Esaü, le frère jumeau de Jacob, l'ancêtre d'Israël.
      marker-yv: yv-n
    - type: text
      text: ', ni l''Egyptien, car tu as été étranger dans son pays. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Leurs descendants à la troisième génération pourront entrer dans l'assemblée de l'Eternel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règles liées à la pureté
    marker-yv: yv-h
