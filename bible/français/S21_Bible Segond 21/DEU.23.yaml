document_id: DEU.23,152
type_code: fra
verses:
  '1':
  - type: text
    content: »Personne ne prendra la femme de son père et ne soulèvera la couverture de son père.
  - type: heading
    content: Cas d'exclusion de l'assemblée
  '10':
  - type: text
    content: '»Lorsque tu partiras en campagne contre tes ennemis, garde-toi de toute chose mauvaise. '
  '11':
  - type: text
    content: 'S''il y a chez toi un homme qui ne soit pas pur suite à une souillure nocturne, il sortira du camp et n''y rentrera pas. '
  '12':
  - type: text
    content: Sur le soir il se lavera dans l'eau, et après le coucher du soleil il pourra rentrer au camp.
  '13':
  - type: text
    content: '»Tu auras un endroit prévu à l''extérieur du camp et c''est là dehors que tu iras pour tes besoins. '
  '14':
  - type: text
    content: 'Dans ton équipement tu auras un outil dont tu te serviras pour faire un creux et recouvrir tes excréments quand tu voudras aller dehors. '
  '15':
  - type: text
    content: En effet, l'Eternel, ton Dieu, marche au milieu de ton camp pour te protéger et te livrer tes ennemis. Ton camp devra donc être saint, afin que l'Eternel ne voie rien d'impur chez toi et qu'il ne se détourne pas de toi.
  '16':
  - type: text
    content: '»Tu ne livreras pas à son maître un esclave qui se sera réfugié chez toi après l''avoir quitté. '
  '17':
  - type: text
    content: 'Il habitera avec toi, au milieu de toi, à l''endroit qu''il choisira dans l''une de tes villes, où bon lui semblera: tu ne l''exploiteras pas.'
  '18':
  - type: text
    content: »Il n'y aura aucune prostituée parmi les filles d'Israël, ni aucun prostitué parmi les fils d'Israël.
  '19':
  - type: text
    content: »Tu n'apporteras pas dans la maison de l'Eternel, ton Dieu, pour l'accomplissement d'un vœu, le salaire d'une prostituée ou le prix d'un chien. En effet, l'un et l'autre sont en horreur à l'Eternel, ton Dieu.
  '2':
  - type: text
    content: '»L''homme dont les testicules ont été écrasés ou l''urètre coupé n''entrera pas dans l''assemblée de l''Eternel. '
  '20':
  - type: text
    content: '»Tu n''exigeras de ton frère aucun intérêt, ni pour de l''argent, ni pour des vivres, ni pour rien de ce qui se prête à intérêt. '
  '21':
  - type: text
    content: Tu pourras exiger un intérêt de l'étranger, mais pas de ton frère, afin que l'Eternel, ton Dieu, te bénisse dans tout ce que tu entreprendras dans le pays dont tu vas entrer en possession.
  - type: heading
    content: Les vœux
  '22':
  - type: text
    content: '»Si tu fais un vœu à l''Eternel, ton Dieu, tu ne tarderas pas à l''accomplir, car l''Eternel, ton Dieu, t''en demanderait compte et tu te chargerais d''un péché. '
  '23':
  - type: text
    content: 'Si tu t''abstiens de faire un vœu, tu ne commettras pas de péché. '
  '24':
  - type: text
    content: Mais tu respecteras et tu accompliras ce qui sortira de tes lèvres, en te conformant aux vœux que tu feras volontairement à l'Eternel, ton Dieu, et que ta bouche aura prononcés.
  '25':
  - type: text
    content: '»Si tu entres dans la vigne de ton prochain, tu pourras à volonté manger des raisins et t''en rassasier, mais tu n''en mettras pas dans ton panier. '
  '26':
  - type: text
    content: Si tu entres dans les champs de blé de ton prochain, tu pourras cueillir des épis avec la main, mais tu n'agiteras pas la faucille sur les blés de ton prochain.
  '3':
  - type: text
    content: 'Celui qui est issu d''une union interdite n''entrera pas dans l''assemblée de l''Eternel. Même sa dixième génération n''y entrera pas. '
  '4':
  - type: text
    content: 'L''Ammonite et le Moabite n''entreront pas dans l''assemblée de l''Eternel, même à la dixième génération et ce pour toujours, '
  '5':
  - type: text
    content: 'parce qu''ils ne sont pas venus à votre rencontre avec du pain et de l''eau, sur le chemin de votre sortie d''Egypte, et parce qu''ils ont soudoyé à tes dépens Balaam, fils de Beor, de Pethor en Mésopotamie, pour qu''il te maudisse. '
  '6':
  - type: text
    content: 'Mais l''Eternel, ton Dieu, n''a pas voulu écouter Balaam et il a changé pour toi la malédiction en bénédiction, parce qu''il t''aime. '
  '7':
  - type: text
    content: 'Tu ne rechercheras ni leur prospérité ni leur bien-être tant que tu vivras, et ce pour toujours. '
  '8':
  - type: text
    content: Tu n'auras pas l'Edomite en horreur, car il est ton frère
  - type: note
    content: 'Ton frère: les Edomites étaient des descendants d''Esaü, le frère jumeau de Jacob, l''ancêtre d''Israël.'
  - type: text
    content: ', ni l''Egyptien, car tu as été étranger dans son pays. '
  '9':
  - type: text
    content: Leurs descendants à la troisième génération pourront entrer dans l'assemblée de l'Eternel.
  - type: heading
    content: Règles liées à la pureté
