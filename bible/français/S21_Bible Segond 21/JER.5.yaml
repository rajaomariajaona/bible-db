document_id: JER.5,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Raisons du jugement
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Parcourez les rues de Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: regardez, je vous en prie, et informez-vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cherchez sur ses places s'il s'y trouve un homme, s'il y a quelqu'un
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui pratique la justice, qui cherche à être fidèle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je pardonnerai à Jérusalem.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Montez sur ses murailles et abattez-les,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ne la détruisez pas entièrement! Enlevez ses sarments,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils n'appartiennent pas à l'Eternel!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, la communauté d'Israël et celle de Juda m'ont vraiment trahi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l'Eternel.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils ont renié l''Eternel, ils ont dit: ‘Il n''existe pas,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le malheur ne nous atteindra pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous ne verrons ni l'épée ni la famine.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les prophètes ne sont que du vent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la parole de Dieu n'est pas en eux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ce qu'ils ont annoncé leur arrive!’
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»C''est pourquoi, voici ce que dit l''Eternel, le Dieu de l''univers:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Parce que vous avez dit cela,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je vais placer mes paroles dans ta bouche pour qu'elles soient du feu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ce peuple ne sera que du bois; ils seront dévorés par les flammes.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais faire venir contre vous une nation lointaine, communauté d'Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l'Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est une nation stable, une nation ancienne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une nation dont tu ne connais pas la langue
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et dont tu ne comprendras pas les paroles.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son carquois est pareil à une tombe ouverte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce sont tous des hommes vaillants.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle dévorera ta moisson et ton pain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle dévorera tes fils et tes filles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle dévorera ton petit et ton gros bétail,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle dévorera ta vigne et ton figuier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle abattra par l'épée tes villes fortifiées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celles-là mêmes dans lesquelles tu places ta confiance.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Mais même durant ces jours-là, déclare l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne vous détruirai pas entièrement,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et lorsque vous demanderez:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Pourquoi l'Eternel, notre Dieu, nous a-t-il fait tout cela?’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tu leur répondras: ‘Puisque vous m''avez abandonné'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et avez servi des dieux étrangers dans votre pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous servirez des étrangers dans un pays qui n'est pas le vôtre.’
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'S''ils disent: ‘L''Eternel est vivant’,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est de façon hypocrite qu'ils prêtent serment.»
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Annoncez ceci à la famille de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'proclamez-le en Juda:'
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Ecoutez ceci, peuple stupide et sans cœur!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*Ils ont des yeux, mais ils ne voient pas;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont des oreilles, mais ils n'entendent pas.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ils ont… n''entendent pas: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jésus renvoie à ce verset en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Marc 8.18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' en l''appliquant à ses disciples.'
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne me respecterez-vous pas, déclare l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne tremblerez-vous pas devant moi?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est moi qui ai donné à la mer le sable pour limite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: barrière immuable qu'elle ne doit pas franchir.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses vagues s'agitent, mais elles sont impuissantes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles grondent mais ne la franchissent pas.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Ce peuple a un cœur rebelle et désobéissant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se détournent et s'en vont.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils ne se disent pas: ‘Respectons l''Eternel, notre Dieu,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui donne la pluie au moment voulu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les premières et les dernières pluies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui nous maintient l'ordre des semaines en vue de la moisson.’
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Ce sont vos fautes qui ont déréglé cet ordre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce sont vos péchés qui vous privent de ces biens.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'En effet, il y a parmi mon peuple des méchants:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont aux aguets, comme celui qui se baisse après avoir dressé des pièges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils tendent des filets et capturent des hommes.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout comme une cage est remplie d'oiseaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leurs maisons sont remplies de fraude.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est pourquoi ils sont devenus puissants et riches.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils s'engraissent, ils sont gros.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils dépassent toute mesure dans le mal.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils n'exercent pas le droit, le droit de l'orphelin, et ils prospèrent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne font pas justice aux plus pauvres.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »N'interviendrai-je pas contre un tel comportement, déclare l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne me vengerai-je pas d'une pareille nation?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Eternel, tes yeux ne cherchent-ils pas la fidélité?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu les as frappés et ils n'ont rien senti.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as voulu en finir avec eux et ils n'ont pas voulu tenir compte de la correction.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont devenus plus durs que la pierre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont refusé de changer d'attitude.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des choses ahurissantes et horribles se font dans le pays.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les prophètes ne prophétisent que des faussetés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les prêtres gouvernent pour leurs propres intérêts
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mon peuple prend plaisir à cela.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ferez-vous face à ce qui vient?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et moi, je me disais:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘C'est sûrement parce que ce sont de petites gens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'ils ont ce comportement fou,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu'ils ne connaissent pas la voie de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les exigences de leur Dieu.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'irai donc vers les grands et je leur parlerai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car eux, ils connaissent la voie de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les exigences de leur Dieu.’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais tous ensemble, ils se sont révoltés contre cette autorité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont arraché leurs liens.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà pourquoi le lion de la forêt les tue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le loup du désert les décime.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La panthère est aux aguets devant leurs villes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous ceux qui en sortiront seront déchiquetés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, leurs transgressions sont nombreuses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leurs infidélités se sont multipliées.»
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Pourquoi te pardonnerais-je?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes enfants m'ont abandonné,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils font des serments au nom de dieux qui n'en sont pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'ai pourvu à leurs besoins et eux, ils se livrent à l'adultère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se rassemblent dans la maison de la prostituée.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ce sont des chevaux repus et sensuels:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: chacun hennit après la femme de son prochain.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N'interviendrai-je pas contre un tel comportement, déclare l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne me vengerai-je pas d'une pareille nation?
