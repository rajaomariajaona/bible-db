document_id: JER.5,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Raisons du jugement
  - type: text
    content: «Parcourez les rues de Jérusalem,
  - type: text
    content: regardez, je vous en prie, et informez-vous,
  - type: text
    content: cherchez sur ses places s'il s'y trouve un homme, s'il y a quelqu'un
  - type: text
    content: qui pratique la justice, qui cherche à être fidèle,
  - type: text
    content: et je pardonnerai à Jérusalem.
  '10':
  - type: text
    content: »Montez sur ses murailles et abattez-les,
  - type: text
    content: mais ne la détruisez pas entièrement! Enlevez ses sarments,
  - type: text
    content: car ils n'appartiennent pas à l'Eternel!
  '11':
  - type: text
    content: Oui, la communauté d'Israël et celle de Juda m'ont vraiment trahi,
  - type: text
    content: déclare l'Eternel.
  '12':
  - type: text
    content: 'Ils ont renié l''Eternel, ils ont dit: ‘Il n''existe pas,'
  - type: text
    content: et le malheur ne nous atteindra pas.
  - type: text
    content: Nous ne verrons ni l'épée ni la famine.
  '13':
  - type: text
    content: Les prophètes ne sont que du vent,
  - type: text
    content: la parole de Dieu n'est pas en eux.
  - type: text
    content: Que ce qu'ils ont annoncé leur arrive!’
  '14':
  - type: text
    content: '»C''est pourquoi, voici ce que dit l''Eternel, le Dieu de l''univers:'
  - type: text
    content: Parce que vous avez dit cela,
  - type: text
    content: je vais placer mes paroles dans ta bouche pour qu'elles soient du feu,
  - type: text
    content: et ce peuple ne sera que du bois; ils seront dévorés par les flammes.
  '15':
  - type: text
    content: Je vais faire venir contre vous une nation lointaine, communauté d'Israël,
  - type: text
    content: déclare l'Eternel.
  - type: text
    content: C'est une nation stable, une nation ancienne,
  - type: text
    content: une nation dont tu ne connais pas la langue
  - type: text
    content: et dont tu ne comprendras pas les paroles.
  '16':
  - type: text
    content: Son carquois est pareil à une tombe ouverte;
  - type: text
    content: ce sont tous des hommes vaillants.
  '17':
  - type: text
    content: Elle dévorera ta moisson et ton pain,
  - type: text
    content: elle dévorera tes fils et tes filles,
  - type: text
    content: elle dévorera ton petit et ton gros bétail,
  - type: text
    content: elle dévorera ta vigne et ton figuier,
  - type: text
    content: elle abattra par l'épée tes villes fortifiées,
  - type: text
    content: celles-là mêmes dans lesquelles tu places ta confiance.
  '18':
  - type: text
    content: »Mais même durant ces jours-là, déclare l'Eternel,
  - type: text
    content: je ne vous détruirai pas entièrement,
  '19':
  - type: text
    content: 'et lorsque vous demanderez:'
  - type: text
    content: ‘Pourquoi l'Eternel, notre Dieu, nous a-t-il fait tout cela?’
  - type: text
    content: 'tu leur répondras: ‘Puisque vous m''avez abandonné'
  - type: text
    content: et avez servi des dieux étrangers dans votre pays,
  - type: text
    content: vous servirez des étrangers dans un pays qui n'est pas le vôtre.’
  '2':
  - type: text
    content: 'S''ils disent: ‘L''Eternel est vivant’,'
  - type: text
    content: c'est de façon hypocrite qu'ils prêtent serment.»
  '20':
  - type: text
    content: »Annoncez ceci à la famille de Jacob,
  - type: text
    content: 'proclamez-le en Juda:'
  '21':
  - type: text
    content: ‘Ecoutez ceci, peuple stupide et sans cœur!’
  - type: text
    content: '*Ils ont des yeux, mais ils ne voient pas;'
  - type: text
    content: ils ont des oreilles, mais ils n'entendent pas.
  - type: note
    content: 'Ils ont… n''entendent pas: Jésus renvoie à ce verset en Marc 8.18 en l''appliquant à ses disciples.'
  '22':
  - type: text
    content: Ne me respecterez-vous pas, déclare l'Eternel,
  - type: text
    content: ne tremblerez-vous pas devant moi?
  - type: text
    content: C'est moi qui ai donné à la mer le sable pour limite,
  - type: text
    content: barrière immuable qu'elle ne doit pas franchir.
  - type: text
    content: Ses vagues s'agitent, mais elles sont impuissantes.
  - type: text
    content: Elles grondent mais ne la franchissent pas.
  '23':
  - type: text
    content: »Ce peuple a un cœur rebelle et désobéissant.
  - type: text
    content: Ils se détournent et s'en vont.
  '24':
  - type: text
    content: 'Ils ne se disent pas: ‘Respectons l''Eternel, notre Dieu,'
  - type: text
    content: qui donne la pluie au moment voulu,
  - type: text
    content: les premières et les dernières pluies,
  - type: text
    content: et qui nous maintient l'ordre des semaines en vue de la moisson.’
  '25':
  - type: text
    content: »Ce sont vos fautes qui ont déréglé cet ordre,
  - type: text
    content: ce sont vos péchés qui vous privent de ces biens.
  '26':
  - type: text
    content: 'En effet, il y a parmi mon peuple des méchants:'
  - type: text
    content: ils sont aux aguets, comme celui qui se baisse après avoir dressé des pièges,
  - type: text
    content: ils tendent des filets et capturent des hommes.
  '27':
  - type: text
    content: Tout comme une cage est remplie d'oiseaux,
  - type: text
    content: leurs maisons sont remplies de fraude.
  - type: text
    content: C'est pourquoi ils sont devenus puissants et riches.
  '28':
  - type: text
    content: Ils s'engraissent, ils sont gros.
  - type: text
    content: Ils dépassent toute mesure dans le mal.
  - type: text
    content: Ils n'exercent pas le droit, le droit de l'orphelin, et ils prospèrent;
  - type: text
    content: ils ne font pas justice aux plus pauvres.
  '29':
  - type: text
    content: »N'interviendrai-je pas contre un tel comportement, déclare l'Eternel,
  - type: text
    content: ne me vengerai-je pas d'une pareille nation?
  '3':
  - type: text
    content: «Eternel, tes yeux ne cherchent-ils pas la fidélité?
  - type: text
    content: Tu les as frappés et ils n'ont rien senti.
  - type: text
    content: Tu as voulu en finir avec eux et ils n'ont pas voulu tenir compte de la correction.
  - type: text
    content: Ils sont devenus plus durs que la pierre,
  - type: text
    content: ils ont refusé de changer d'attitude.
  '30':
  - type: text
    content: Des choses ahurissantes et horribles se font dans le pays.
  '31':
  - type: text
    content: Les prophètes ne prophétisent que des faussetés,
  - type: text
    content: les prêtres gouvernent pour leurs propres intérêts
  - type: text
    content: et mon peuple prend plaisir à cela.
  - type: text
    content: Que ferez-vous face à ce qui vient?
  '4':
  - type: text
    content: 'Et moi, je me disais:'
  - type: text
    content: ‘C'est sûrement parce que ce sont de petites gens
  - type: text
    content: qu'ils ont ce comportement fou,
  - type: text
    content: parce qu'ils ne connaissent pas la voie de l'Eternel,
  - type: text
    content: les exigences de leur Dieu.
  '5':
  - type: text
    content: J'irai donc vers les grands et je leur parlerai,
  - type: text
    content: car eux, ils connaissent la voie de l'Eternel,
  - type: text
    content: les exigences de leur Dieu.’
  - type: text
    content: Mais tous ensemble, ils se sont révoltés contre cette autorité,
  - type: text
    content: ils ont arraché leurs liens.
  '6':
  - type: text
    content: Voilà pourquoi le lion de la forêt les tue,
  - type: text
    content: le loup du désert les décime.
  - type: text
    content: La panthère est aux aguets devant leurs villes,
  - type: text
    content: tous ceux qui en sortiront seront déchiquetés.
  - type: text
    content: En effet, leurs transgressions sont nombreuses,
  - type: text
    content: leurs infidélités se sont multipliées.»
  '7':
  - type: text
    content: «Pourquoi te pardonnerais-je?
  - type: text
    content: Tes enfants m'ont abandonné,
  - type: text
    content: ils font des serments au nom de dieux qui n'en sont pas.
  - type: text
    content: J'ai pourvu à leurs besoins et eux, ils se livrent à l'adultère,
  - type: text
    content: ils se rassemblent dans la maison de la prostituée.
  '8':
  - type: text
    content: 'Ce sont des chevaux repus et sensuels:'
  - type: text
    content: chacun hennit après la femme de son prochain.
  '9':
  - type: text
    content: N'interviendrai-je pas contre un tel comportement, déclare l'Eternel,
  - type: text
    content: ne me vengerai-je pas d'une pareille nation?
