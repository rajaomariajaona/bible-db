document_id: 2CH.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne de Josaphat
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Son fils Josaphat devint roi à sa place. Il se fortifia contre Israël: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: il mit des troupes dans toutes les villes fortifiées de Juda, et des garnisons dans le pays de Juda et dans les villes d'Ephraïm dont son père Asa s'était emparé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'L''Eternel fut avec Josaphat parce qu''il marcha sur la voie que suivait son ancêtre [David] au début et qu''il ne consulta pas les Baals. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'C''est en effet au Dieu de son ancêtre qu''il eut recours, et il suivit ses commandements sans imiter ce que faisait Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L''Eternel affermit la royauté entre les mains de Josaphat. Tout Juda lui payait un tribut, et il eut des richesses et de la gloire en abondance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Son cœur s'engagea toujours plus dans les voies de l'Eternel et il fit encore disparaître de Juda les hauts lieux et les poteaux sacrés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'La troisième année de son règne, il chargea ses chefs Ben-Haïl, Abdias, Zacharie, Nathanaël et Michée d''aller enseigner dans les villes de Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il envoya avec eux les Lévites Shemaeja, Nethania, Zebadia, Asaël, Shemiramoth, Jonathan, Adonija, Tobija et Tob-Adonija, ainsi que les prêtres Elishama et Joram. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ils enseignèrent dans Juda avec le livre de la loi de l'Eternel. Ils parcoururent toutes les villes de Juda et enseignèrent parmi le peuple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'La terreur de l''Eternel s''empara de tous les royaumes des pays voisins de Juda, et ils ne firent pas la guerre à Josaphat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Des Philistins apportèrent à Josaphat des cadeaux et un tribut en argent. Même les Arabes lui amenèrent du bétail: 7700 béliers et 7700 boucs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Josaphat devint de plus en plus puissant. Il construisit des forteresses et des villes destinées à servir d''entrepôts en Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Il fit accomplir beaucoup de travaux dans les villes de Juda, et il avait de vaillants hommes comme soldats à Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Voici leur répartition en fonction de leur famille. Pour Juda, les chefs de milliers étaient le chef Adna avec 300''000 vaillants hommes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'et à ses côtés le chef Jochanan avec 280''000 hommes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ainsi qu'Amasia, fils de Zicri, qui s'était volontairement consacré à l'Eternel, avec 200'000 vaillants hommes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'De Benjamin étaient issus Eliada, un vaillant homme, avec 200''000 hommes capables de manier l''arc et le bouclier, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: et à ses côtés Zozabad avec 180'000 hommes équipés pour la guerre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tels sont ceux qui étaient au service du roi, en plus de ceux qu'il avait postés dans toutes les villes fortifiées de Juda.
