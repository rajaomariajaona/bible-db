document_id: JOB.27,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Conclusion de Job
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Job poursuivit son développement. Il dit:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Fera-t-il du Tout-Puissant ses délices?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fera-t-il en toute circonstance appel à Dieu?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: »Je vais vous enseigner la manière dont Dieu agit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne vais pas vous cacher les projets du Tout-Puissant.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Vous en avez tous eu un aperçu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi donc ces discours sans consistance?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Voici la part que Dieu réserve au méchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'l''héritage que l''homme violent reçoit du Tout-Puissant:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: s'il a de nombreux fils, ce sera pour l'épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses rejetons manqueront de pain;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: les survivants seront ensevelis par la mort
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans que leurs veuves ne les pleurent.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Il aura beau amasser l'argent comme la poussière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: accumuler des vêtements comme de la boue,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: il les accumulera mais c'est le juste qui les enfilera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est l'innocent qui jouira de son argent.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Il s'est construit une maison, mais elle est aussi fragile que celle de la teigne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pareille à la cabane que se fait un gardien.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Il se couchera riche, mais ce n''est pas ainsi qu''il sera enseveli:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ouvre les yeux et tout a disparu.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: «Le Dieu qui me refuse justice est vivant!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Tout-Puissant qui me remplit d'amertume est vivant!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Les terreurs le surprennent comme de l'eau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une tempête l'emporte en pleine nuit;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: le vent d'est le soulève et il s'en va,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est violemment arraché de l'endroit qu'il occupait.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: On lance sans pitié des flèches contre lui.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il cherche à fuir la main qui veut l'abattre.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: On applaudit à sa chute
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, de l'endroit même qu'il occupait, on siffle contre lui.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Aussi longtemps que je respirerai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que le souffle de Dieu passera dans mes narines,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: mes lèvres ne diront aucune injustice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ma langue ne prononcera rien de faux.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Je ne risque pas de vous donner raison.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu'à mon dernier soupir je défendrai mon intégrité.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Je suis agrippé à ma justice et je ne la lâcherai pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon cœur ne me fait de reproche sur aucun jour de ma vie.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: »Que ce soit mon ennemi qui soit traité en méchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et celui qui se dresse contre moi en homme injuste!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Quelle espérance reste-t-il à l'impie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand Dieu coupe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand il arrache le fil de sa vie?
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Dieu écoute-t-il ses cris quand l'angoisse vient l'assaillir?
