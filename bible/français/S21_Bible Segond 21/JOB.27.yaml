document_id: JOB.27,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Conclusion de Job
  - type: text
    content: 'Job poursuivit son développement. Il dit:'
  '10':
  - type: text
    content: Fera-t-il du Tout-Puissant ses délices?
  - type: text
    content: Fera-t-il en toute circonstance appel à Dieu?
  '11':
  - type: text
    content: »Je vais vous enseigner la manière dont Dieu agit,
  - type: text
    content: je ne vais pas vous cacher les projets du Tout-Puissant.
  '12':
  - type: text
    content: Vous en avez tous eu un aperçu.
  - type: text
    content: Pourquoi donc ces discours sans consistance?
  '13':
  - type: text
    content: Voici la part que Dieu réserve au méchant,
  - type: text
    content: 'l''héritage que l''homme violent reçoit du Tout-Puissant:'
  '14':
  - type: text
    content: s'il a de nombreux fils, ce sera pour l'épée,
  - type: text
    content: et ses rejetons manqueront de pain;
  '15':
  - type: text
    content: les survivants seront ensevelis par la mort
  - type: text
    content: sans que leurs veuves ne les pleurent.
  '16':
  - type: text
    content: Il aura beau amasser l'argent comme la poussière,
  - type: text
    content: accumuler des vêtements comme de la boue,
  '17':
  - type: text
    content: il les accumulera mais c'est le juste qui les enfilera,
  - type: text
    content: c'est l'innocent qui jouira de son argent.
  '18':
  - type: text
    content: Il s'est construit une maison, mais elle est aussi fragile que celle de la teigne,
  - type: text
    content: pareille à la cabane que se fait un gardien.
  '19':
  - type: text
    content: 'Il se couchera riche, mais ce n''est pas ainsi qu''il sera enseveli:'
  - type: text
    content: il ouvre les yeux et tout a disparu.
  '2':
  - type: text
    content: «Le Dieu qui me refuse justice est vivant!
  - type: text
    content: Le Tout-Puissant qui me remplit d'amertume est vivant!
  '20':
  - type: text
    content: Les terreurs le surprennent comme de l'eau,
  - type: text
    content: une tempête l'emporte en pleine nuit;
  '21':
  - type: text
    content: le vent d'est le soulève et il s'en va,
  - type: text
    content: il est violemment arraché de l'endroit qu'il occupait.
  '22':
  - type: text
    content: On lance sans pitié des flèches contre lui.
  - type: text
    content: Il cherche à fuir la main qui veut l'abattre.
  '23':
  - type: text
    content: On applaudit à sa chute
  - type: text
    content: et, de l'endroit même qu'il occupait, on siffle contre lui.
  '3':
  - type: text
    content: Aussi longtemps que je respirerai,
  - type: text
    content: que le souffle de Dieu passera dans mes narines,
  '4':
  - type: text
    content: mes lèvres ne diront aucune injustice,
  - type: text
    content: ma langue ne prononcera rien de faux.
  '5':
  - type: text
    content: Je ne risque pas de vous donner raison.
  - type: text
    content: Jusqu'à mon dernier soupir je défendrai mon intégrité.
  '6':
  - type: text
    content: Je suis agrippé à ma justice et je ne la lâcherai pas.
  - type: text
    content: Mon cœur ne me fait de reproche sur aucun jour de ma vie.
  '7':
  - type: text
    content: »Que ce soit mon ennemi qui soit traité en méchant,
  - type: text
    content: et celui qui se dresse contre moi en homme injuste!
  '8':
  - type: text
    content: Quelle espérance reste-t-il à l'impie
  - type: text
    content: quand Dieu coupe,
  - type: text
    content: quand il arrache le fil de sa vie?
  '9':
  - type: text
    content: Dieu écoute-t-il ses cris quand l'angoisse vient l'assaillir?
