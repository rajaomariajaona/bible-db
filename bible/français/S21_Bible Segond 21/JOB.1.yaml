document_id: JOB.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Mise à l'épreuve de Job
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 1.1–2.13
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Présentation de Job
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Il y avait dans le pays d''Uts un homme qui s''appelait Job. Cet homme était intègre et droit. Il craignait Dieu et se détournait du mal. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il avait 7 fils et 3 filles. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il possédait 7000 brebis, 3000 chameaux, 500 paires de bœufs et 500 ânesses. Il avait aussi un très grand nombre de serviteurs. Cet homme était le plus important de tous les nomades de l'est.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Les fils de Job se rendaient visite les uns aux autres et organisaient, chacun à tour de rôle, un festin. Ils invitaient leurs trois sœurs à manger et boire avec eux. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Quand les jours de festin étaient passés, Job faisait venir ses fils pour les purifier: il se levait de bon matin et offrait un holocauste pour chacun d''eux. En effet, il se disait: «Peut-être mes fils ont-ils péché, peut-être ont-ils offensé Dieu dans leur cœur.» Voilà ce que faisait toujours Job.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Première série d'épreuves
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Un jour, les fils de Dieu
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Les fils de Dieu: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: la version grecque des Septante traduit «les anges de Dieu».
    marker-yv: yv-n
  - type: text
    text: ' vinrent se présenter devant l''Eternel, et Satan vint aussi au milieu d''eux. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L''Eternel dit à Satan: «D''où viens-tu?» Satan répondit à l''Eternel: «De parcourir la terre et de m''y promener.» '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L''Eternel dit à Satan: «As-tu remarqué mon serviteur Job? Il n''y a personne comme lui sur la terre. C''est un homme intègre et droit. Il craint Dieu et se détourne du mal.» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Satan répondit à l''Eternel: «Est-ce de façon désintéressée que Job craint Dieu? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ne l''as-tu pas entouré de ta protection, lui, sa famille et tout ce qui lui appartient? Tu as béni le travail de ses mains et ses troupeaux couvrent le pays. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mais porte donc la main contre lui, touche à tout ce qui lui appartient, et je suis sûr qu''il te maudira en face.» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L''Eternel dit à Satan: «Voici tout ce qui lui appartient: je te le livre. Seulement, ne porte pas la main sur lui.» Satan se retira alors de la présence de l''Eternel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors qu''un jour les fils et les filles de Job mangeaient et buvaient du vin chez leur frère aîné, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'un messager arriva vers Job et lui dit: «Les bœufs labouraient et les ânesses broutaient à côté d''eux. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Des Sabéens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sabéens: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: population traditionnellement située au sud-ouest de l'Arabie.
    marker-yv: yv-n
  - type: text
    text: ' se sont jetés sur eux et les ont enlevés. Ils ont tué les serviteurs à coups d''épée et je suis le seul à avoir pu m''échapper pour t''en apporter la nouvelle.» '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il parlait encore lorsqu''un autre messager arriva et dit: «La foudre est tombée du ciel, a embrasé les brebis et les serviteurs et les a dévorés. Je suis le seul à avoir pu m''échapper pour t''en apporter la nouvelle.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il parlait encore lorsqu''un autre messager arriva et dit: «Des Chaldéens'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Chaldéens: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: population de Mésopotamie, apparemment d'abord présente dans le nord (Turquie actuelle), puis dans le sud (Irak actuel).
    marker-yv: yv-n
  - type: text
    text: ' répartis en trois bandes se sont précipités sur les chameaux et les ont enlevés. Ils ont tué les serviteurs à coups d''épée et je suis le seul à avoir pu m''échapper pour t''en apporter la nouvelle.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il parlait encore lorsqu''un autre messager arriva et dit: «Pendant que tes fils et tes filles mangeaient et buvaient du vin chez leur frère aîné, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: un grand vent est venu depuis l'autre côté du désert et a frappé contre les quatre coins de la maison. Elle s'est écroulée sur les jeunes gens et ils sont morts. Je suis le seul à avoir pu m'échapper pour t'en apporter la nouvelle.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Job se leva alors, déchira son manteau et se rasa la tête. Puis il se jeta par terre, se prosterna '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'et dit: «C''est nu que je suis sorti du ventre de ma mère, et c''est nu que je repartirai. L''Eternel a donné et l''Eternel a repris. Que le nom de l''Eternel soit béni!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dans tout cela, Job ne pécha pas, il n'attribua rien d'inapproprié à Dieu.
