document_id: EXO.11,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le pharaon averti de la mort des premiers-nés
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L''Eternel dit à Moïse: «Je vais faire venir encore un fléau sur le pharaon et sur l''Egypte. Après cela, il vous laissera partir d''ici. Lorsqu''il vous laissera enfin partir, il vous chassera même d''ici. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Moïse et Aaron firent tous ces miracles devant le pharaon, et l'Eternel endurcit le cœur du pharaon et celui-ci ne laissa pas les Israélites partir de son pays.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dis au peuple de demander chacun à son voisin – et chacune à sa voisine – des objets en argent et en or.» '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: L'Eternel gagna la faveur des Egyptiens au peuple. Du reste, Moïse lui-même était un homme très important en Egypte aux yeux des serviteurs du pharaon et du peuple.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Moïse annonça: «Voici ce que dit l''Eternel: Vers le milieu de la nuit, je parcourrai l''Egypte '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'et tous les premiers-nés mourront en Egypte, depuis le fils aîné du pharaon qui siège sur son trône jusqu''au fils aîné de la servante qui travaille à la meule et jusqu''à tous les premiers-nés des animaux. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Il y aura dans toute l''Egypte de si grands cris qu''il n''y en a pas eu et qu''il n''y en aura plus de pareils. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'En revanche, chez les Israélites, pas même un chien ne grognera, ni contre un homme ni contre un animal. Vous saurez ainsi quelle différence l''Eternel fait entre l''Egypte et Israël. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Alors tous tes serviteurs ici présents descendront vers moi et se prosterneront devant moi en disant: ‘Sors, toi et tout le peuple qui marche à ta suite!’ Après cela, je sortirai.» Moïse sortit de chez le pharaon dans une ardente colère.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'L''Eternel avait dit à Moïse: «Le pharaon ne vous écoutera pas afin que mes miracles soient nombreux en Egypte.» '
