document_id: PSA.61,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière du roi qui cherche un refuge
  - type: text
    content: Au chef de chœur, sur instruments à cordes. De David.
  '2':
  - type: text
    content: O Dieu, écoute mes cris,
  - type: text
    content: sois attentif à ma prière!
  '3':
  - type: text
    content: 'Des extrémités de la terre, dans ma faiblesse, je crie à toi:'
  - type: text
    content: conduis-moi sur le rocher trop élevé pour moi!
  '4':
  - type: text
    content: Oui, tu es pour moi un refuge,
  - type: text
    content: une tour fortifiée, en face de l'ennemi.
  '5':
  - type: text
    content: Je voudrais habiter éternellement dans ta tente,
  - type: text
    content: 'me réfugier sous l''abri de tes ailes. '
  - type: text
    content: – Pause.
  '6':
  - type: text
    content: Oui, c'est toi, ô Dieu, qui écoutes mes vœux;
  - type: text
    content: tu me donnes l'héritage réservé à ceux qui craignent ton nom.
  '7':
  - type: text
    content: Ajoute des jours à la vie du roi,
  - type: text
    content: que ses années se prolongent de génération en génération,
  '8':
  - type: text
    content: qu'il siège éternellement devant Dieu!
  - type: text
    content: Fais que ta bonté et ta fidélité veillent sur lui!
  '9':
  - type: text
    content: Alors je chanterai sans cesse ton nom
  - type: text
    content: en accomplissant chaque jour mes vœux.
