document_id: PSA.61
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière du roi qui cherche un refuge
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur, sur instruments à cordes. De David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: O Dieu, écoute mes cris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sois attentif à ma prière!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Des extrémités de la terre, dans ma faiblesse, je crie à toi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: conduis-moi sur le rocher trop élevé pour moi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Oui, tu es pour moi un refuge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une tour fortifiée, en face de l'ennemi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je voudrais habiter éternellement dans ta tente,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'me réfugier sous l''abri de tes ailes. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Oui, c'est toi, ô Dieu, qui écoutes mes vœux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu me donnes l'héritage réservé à ceux qui craignent ton nom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ajoute des jours à la vie du roi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que ses années se prolongent de génération en génération,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: qu'il siège éternellement devant Dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais que ta bonté et ta fidélité veillent sur lui!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Alors je chanterai sans cesse ton nom
- type: usfm
  marker: q1
  children:
  - type: text
    text: en accomplissant chaque jour mes vœux.
