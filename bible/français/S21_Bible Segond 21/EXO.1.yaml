document_id: EXO.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Sortie d'Egypte des Israélites
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 1.1–15.21
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Esclavage d'Israël en Egypte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici les noms des fils d''Israël venus en Egypte avec Jacob, chacun accompagné de sa famille: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ruben, Siméon, Lévi, Juda, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Issacar, Zabulon, Benjamin, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dan, Nephthali, Gad et Aser. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les personnes issues de Jacob étaient au nombre de 70 en tout. Joseph était alors en Egypte.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Puis Joseph mourut, ainsi que tous ses frères et toute cette génération-là. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Les Israélites eurent des enfants et pullulèrent; ils devinrent très nombreux et puissants, au point de remplir le pays.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '*Un nouveau roi parvint au pouvoir en Egypte, un roi qui n''avait pas connu Joseph'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Un nouveau… Joseph: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Actes 7.18
      metadata:
        usfm: ACT.7.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' par Etienne.'
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il dit à son peuple: «Voilà que les Israélites forment un peuple plus nombreux et plus puissant que nous. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Allons! Montrons-nous habiles vis-à-vis de lui: empêchons-le de devenir trop nombreux, car en cas de guerre il se joindrait à nos ennemis pour nous combattre et sortir ensuite du pays.» '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: On établit donc sur lui des chefs de corvées afin de l'accabler de travaux pénibles. C'est ainsi qu'on construisit les villes de Pithom et de Ramsès destinées à servir d'entrepôts au pharaon
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Pharaon: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: titre du roi d'Egypte.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais plus on accablait les Israélites, plus ils devenaient nombreux et envahissants, au point que l''on éprouva de la haine pour eux. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors les Egyptiens soumirent les Israélites à un dur esclavage. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ils leur rendirent la vie amère par de lourds travaux avec de l'argile et des briques ainsi que par tous les travaux des champs. Ils leur imposaient toutes ces charges avec cruauté.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le roi d''Egypte parla aussi aux sages-femmes des Hébreux. L''une s''appelait Shiphra et l''autre Pua. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il leur dit: «Quand vous aiderez les femmes des Hébreux à avoir leur enfant et que vous regarderez sur le siège d''accouchement, si c''est un garçon, faites-le mourir; si c''est une fille, laissez-la vivre.» '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais les sages-femmes avaient la crainte de Dieu et elles ne firent pas ce que leur avait dit le roi d''Egypte: elles laissèrent vivre les enfants. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le roi d''Egypte convoqua les sages-femmes et leur dit: «Pourquoi avez-vous agi ainsi et avez-vous laissé vivre les enfants?» '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les sages-femmes répondirent au pharaon: «C''est que les femmes des Hébreux ne sont pas comme les Egyptiennes. Elles sont vigoureuses et accouchent avant l''arrivée de la sage-femme.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Dieu fit du bien aux sages-femmes et le peuple devint nombreux et très puissant. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Parce que les sages-femmes avaient eu la crainte de Dieu, Dieu fit prospérer leur famille. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Alors le pharaon ordonna à tout son peuple: «Vous jetterez dans le fleuve tout garçon qui naîtra et vous laisserez vivre toutes les filles.»'
