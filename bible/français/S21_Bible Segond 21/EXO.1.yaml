document_id: EXO.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Sortie d'Egypte des Israélites
  - type: heading
    content: 1.1–15.21
  - type: heading
    content: Esclavage d'Israël en Egypte
  - type: text
    content: 'Voici les noms des fils d''Israël venus en Egypte avec Jacob, chacun accompagné de sa famille: '
  '10':
  - type: text
    content: 'Allons! Montrons-nous habiles vis-à-vis de lui: empêchons-le de devenir trop nombreux, car en cas de guerre il se joindrait à nos ennemis pour nous combattre et sortir ensuite du pays.» '
  '11':
  - type: text
    content: On établit donc sur lui des chefs de corvées afin de l'accabler de travaux pénibles. C'est ainsi qu'on construisit les villes de Pithom et de Ramsès destinées à servir d'entrepôts au pharaon
  - type: note
    content: 'Pharaon: titre du roi d''Egypte.'
  - type: text
    content: '. '
  '12':
  - type: text
    content: 'Mais plus on accablait les Israélites, plus ils devenaient nombreux et envahissants, au point que l''on éprouva de la haine pour eux. '
  '13':
  - type: text
    content: 'Alors les Egyptiens soumirent les Israélites à un dur esclavage. '
  '14':
  - type: text
    content: Ils leur rendirent la vie amère par de lourds travaux avec de l'argile et des briques ainsi que par tous les travaux des champs. Ils leur imposaient toutes ces charges avec cruauté.
  '15':
  - type: text
    content: 'Le roi d''Egypte parla aussi aux sages-femmes des Hébreux. L''une s''appelait Shiphra et l''autre Pua. '
  '16':
  - type: text
    content: 'Il leur dit: «Quand vous aiderez les femmes des Hébreux à avoir leur enfant et que vous regarderez sur le siège d''accouchement, si c''est un garçon, faites-le mourir; si c''est une fille, laissez-la vivre.» '
  '17':
  - type: text
    content: 'Mais les sages-femmes avaient la crainte de Dieu et elles ne firent pas ce que leur avait dit le roi d''Egypte: elles laissèrent vivre les enfants. '
  '18':
  - type: text
    content: 'Le roi d''Egypte convoqua les sages-femmes et leur dit: «Pourquoi avez-vous agi ainsi et avez-vous laissé vivre les enfants?» '
  '19':
  - type: text
    content: 'Les sages-femmes répondirent au pharaon: «C''est que les femmes des Hébreux ne sont pas comme les Egyptiennes. Elles sont vigoureuses et accouchent avant l''arrivée de la sage-femme.»'
  '2':
  - type: text
    content: 'Ruben, Siméon, Lévi, Juda, '
  '20':
  - type: text
    content: 'Dieu fit du bien aux sages-femmes et le peuple devint nombreux et très puissant. '
  '21':
  - type: text
    content: 'Parce que les sages-femmes avaient eu la crainte de Dieu, Dieu fit prospérer leur famille. '
  '22':
  - type: text
    content: 'Alors le pharaon ordonna à tout son peuple: «Vous jetterez dans le fleuve tout garçon qui naîtra et vous laisserez vivre toutes les filles.»'
  '3':
  - type: text
    content: 'Issacar, Zabulon, Benjamin, '
  '4':
  - type: text
    content: 'Dan, Nephthali, Gad et Aser. '
  '5':
  - type: text
    content: Les personnes issues de Jacob étaient au nombre de 70 en tout. Joseph était alors en Egypte.
  '6':
  - type: text
    content: 'Puis Joseph mourut, ainsi que tous ses frères et toute cette génération-là. '
  '7':
  - type: text
    content: Les Israélites eurent des enfants et pullulèrent; ils devinrent très nombreux et puissants, au point de remplir le pays.
  '8':
  - type: text
    content: '*Un nouveau roi parvint au pouvoir en Egypte, un roi qui n''avait pas connu Joseph'
  - type: note
    content: 'Un nouveau… Joseph: cité en Actes 7.18 par Etienne.'
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Il dit à son peuple: «Voilà que les Israélites forment un peuple plus nombreux et plus puissant que nous. '
