document_id: ECC.7
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Conseils de sagesse
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 7.1–12.14
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les épreuves et la sagesse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Une bonne réputation vaut mieux qu''un bon parfum, et le jour de la mort que le jour de la naissance. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mieux vaut se rendre dans une maison de deuil que dans une maison de festin, car telle est la fin de tout homme, et celui qui est en vie peut ainsi se mettre à réfléchir. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Mieux vaut le chagrin que le rire, car malgré un visage triste le cœur peut être content. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le cœur des sages est dans la maison de deuil, et celui des hommes stupides dans la maison de joie. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mieux vaut entendre la menace du sage que d''écouter le chant des hommes stupides. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'En effet, le rire des hommes stupides ressemble au crépitement des épines sous la marmite. Cela aussi, c''est de la fumée. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: L'oppression peut rendre fou le sage et les cadeaux provoquer la perte du cœur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mieux vaut l''aboutissement d''une affaire que son début. Mieux vaut un esprit patient qu''un esprit arrogant. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ne t''irrite pas trop vite intérieurement, car l''irritation est le propre des hommes stupides. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ne dis pas: «Comment se fait-il que les jours passés aient été meilleurs que ceux-ci?» car ce n''est pas la sagesse qui te pousse à demander cela.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'La sagesse a autant de valeur qu''un héritage, et même plus, pour ceux qui voient le soleil, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'car à l''ombre de la sagesse on est abrité comme à l''ombre de l''argent. L''avantage de la connaissance, c''est que la sagesse fait vivre ceux qui la possèdent. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Regarde ce que Dieu a fait: qui pourra redresser ce qu''il a courbé? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Le jour du bonheur sois heureux, et le jour du malheur réfléchis! Dieu a fait l'un comme l'autre, afin que l'homme ne puisse absolument pas découvrir ce qui se passera après lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'J''ai tout vu pendant ma vie sans consistance: un juste mourir du fait de sa justice et un méchant prolonger son existence par sa méchanceté. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ne sois pas juste à l''excès et ne te montre pas trop sage: pourquoi te détruirais-tu? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ne sois pas méchant à l''excès et ne sois pas fou: pourquoi mourrais-tu avant ton heure? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il est bon de retenir le premier conseil sans négliger l''autre, car celui qui craint Dieu échappera à tout cela. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'La sagesse rendra le sage plus fort que 10 chefs présents dans une ville. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Non, il n''y a sur la terre aucun homme juste qui fasse le bien et qui ne pèche jamais. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ne fais donc pas attention à toutes les paroles prononcées, ainsi tu n''entendras pas ton serviteur te maudire! '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: En effet, tu le sais dans ton cœur, bien des fois tu as toi-même maudit les autres.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La sagesse et les hommes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tout cela, je l''ai fait passer à l''épreuve de la sagesse. J''ai dit: «Je serai sage», mais la sagesse est restée loin de moi. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ce qui est éloigné, ce qui est très profond, qui peut l''atteindre? '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'J''ai appliqué mon cœur à connaître, à explorer et à rechercher la sagesse et la raison des choses, à connaître la stupidité de la méchanceté et la folie de la sottise, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'et j''ai trouvé plus amère que la mort la femme dont le cœur est un piège et un filet, et dont les mains sont des chaînes. Celui qui est agréable à Dieu lui échappera, mais le pécheur sera capturé par elle. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Voici ce que j''ai trouvé, dit l''Ecclésiaste, en examinant les choses une à une pour en comprendre la raison, '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'et voici ce que je cherche encore sans l''avoir trouvé: j''ai trouvé un homme digne de ce nom sur 1000, mais je n''ai pas trouvé de femme parmi eux. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Examine seulement ce que j''ai trouvé: Dieu a fait les êtres humains droits, mais eux, ils ont cherché beaucoup de détours.'
