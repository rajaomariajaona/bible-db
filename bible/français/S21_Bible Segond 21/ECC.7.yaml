document_id: ECC.7,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Conseils de sagesse
  - type: heading
    content: 7.1–12.14
  - type: heading
    content: Les épreuves et la sagesse
  - type: text
    content: 'Une bonne réputation vaut mieux qu''un bon parfum, et le jour de la mort que le jour de la naissance. '
  '10':
  - type: text
    content: 'Ne dis pas: «Comment se fait-il que les jours passés aient été meilleurs que ceux-ci?» car ce n''est pas la sagesse qui te pousse à demander cela.'
  '11':
  - type: text
    content: 'La sagesse a autant de valeur qu''un héritage, et même plus, pour ceux qui voient le soleil, '
  '12':
  - type: text
    content: 'car à l''ombre de la sagesse on est abrité comme à l''ombre de l''argent. L''avantage de la connaissance, c''est que la sagesse fait vivre ceux qui la possèdent. '
  '13':
  - type: text
    content: 'Regarde ce que Dieu a fait: qui pourra redresser ce qu''il a courbé? '
  '14':
  - type: text
    content: Le jour du bonheur sois heureux, et le jour du malheur réfléchis! Dieu a fait l'un comme l'autre, afin que l'homme ne puisse absolument pas découvrir ce qui se passera après lui.
  '15':
  - type: text
    content: 'J''ai tout vu pendant ma vie sans consistance: un juste mourir du fait de sa justice et un méchant prolonger son existence par sa méchanceté. '
  '16':
  - type: text
    content: 'Ne sois pas juste à l''excès et ne te montre pas trop sage: pourquoi te détruirais-tu? '
  '17':
  - type: text
    content: 'Ne sois pas méchant à l''excès et ne sois pas fou: pourquoi mourrais-tu avant ton heure? '
  '18':
  - type: text
    content: 'Il est bon de retenir le premier conseil sans négliger l''autre, car celui qui craint Dieu échappera à tout cela. '
  '19':
  - type: text
    content: 'La sagesse rendra le sage plus fort que 10 chefs présents dans une ville. '
  '2':
  - type: text
    content: 'Mieux vaut se rendre dans une maison de deuil que dans une maison de festin, car telle est la fin de tout homme, et celui qui est en vie peut ainsi se mettre à réfléchir. '
  '20':
  - type: text
    content: 'Non, il n''y a sur la terre aucun homme juste qui fasse le bien et qui ne pèche jamais. '
  '21':
  - type: text
    content: 'Ne fais donc pas attention à toutes les paroles prononcées, ainsi tu n''entendras pas ton serviteur te maudire! '
  '22':
  - type: text
    content: En effet, tu le sais dans ton cœur, bien des fois tu as toi-même maudit les autres.
  - type: heading
    content: La sagesse et les hommes
  '23':
  - type: text
    content: 'Tout cela, je l''ai fait passer à l''épreuve de la sagesse. J''ai dit: «Je serai sage», mais la sagesse est restée loin de moi. '
  '24':
  - type: text
    content: 'Ce qui est éloigné, ce qui est très profond, qui peut l''atteindre? '
  '25':
  - type: text
    content: 'J''ai appliqué mon cœur à connaître, à explorer et à rechercher la sagesse et la raison des choses, à connaître la stupidité de la méchanceté et la folie de la sottise, '
  '26':
  - type: text
    content: 'et j''ai trouvé plus amère que la mort la femme dont le cœur est un piège et un filet, et dont les mains sont des chaînes. Celui qui est agréable à Dieu lui échappera, mais le pécheur sera capturé par elle. '
  '27':
  - type: text
    content: 'Voici ce que j''ai trouvé, dit l''Ecclésiaste, en examinant les choses une à une pour en comprendre la raison, '
  '28':
  - type: text
    content: 'et voici ce que je cherche encore sans l''avoir trouvé: j''ai trouvé un homme digne de ce nom sur 1000, mais je n''ai pas trouvé de femme parmi eux. '
  '29':
  - type: text
    content: 'Examine seulement ce que j''ai trouvé: Dieu a fait les êtres humains droits, mais eux, ils ont cherché beaucoup de détours.'
  '3':
  - type: text
    content: 'Mieux vaut le chagrin que le rire, car malgré un visage triste le cœur peut être content. '
  '4':
  - type: text
    content: 'Le cœur des sages est dans la maison de deuil, et celui des hommes stupides dans la maison de joie. '
  '5':
  - type: text
    content: 'Mieux vaut entendre la menace du sage que d''écouter le chant des hommes stupides. '
  '6':
  - type: text
    content: 'En effet, le rire des hommes stupides ressemble au crépitement des épines sous la marmite. Cela aussi, c''est de la fumée. '
  '7':
  - type: text
    content: L'oppression peut rendre fou le sage et les cadeaux provoquer la perte du cœur.
  '8':
  - type: text
    content: 'Mieux vaut l''aboutissement d''une affaire que son début. Mieux vaut un esprit patient qu''un esprit arrogant. '
  '9':
  - type: text
    content: 'Ne t''irrite pas trop vite intérieurement, car l''irritation est le propre des hommes stupides. '
