document_id: JHN.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le cep et les sarments
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»C''est moi qui suis le vrai cep, et mon Père est le vigneron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tout sarment qui est en moi et qui ne porte pas de fruit, il l''enlève; et tout sarment qui porte du fruit, il le taille afin qu''il porte encore plus de fruit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Déjà vous êtes purs à cause de la parole que je vous ai annoncée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Demeurez en moi et je demeurerai en vous. Le sarment ne peut pas porter de fruit par lui-même, sans rester attaché au cep; il en va de même pour vous si vous ne demeurez pas en moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je suis le cep, vous êtes les sarments. Celui qui demeure en moi et en qui je demeure porte beaucoup de fruit, car sans moi vous ne pouvez rien faire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Si quelqu''un ne demeure pas en moi, il est jeté dehors comme le sarment et il sèche; puis on ramasse les sarments, on les jette au feu et ils brûlent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Si vous demeurez en moi et que mes paroles demeurent en vous, vous demanderez ce que vous voudrez et cela vous sera accordé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ce qui manifeste la gloire de mon Père, c'est que vous portiez beaucoup de fruit. Vous serez alors vraiment mes disciples.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '»Tout comme le Père m''a aimé, moi aussi, je vous ai aimés. Demeurez dans mon amour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Si vous gardez mes commandements, vous demeurerez dans mon amour, de même que j''ai gardé les commandements de mon Père et que je demeure dans son amour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je vous ai dit cela afin que ma joie demeure en vous et que votre joie soit complète.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '»Voici mon commandement: aimez-vous les uns les autres comme je vous ai aimés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il n''y a pas de plus grand amour que de donner votre vie pour vos amis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Vous êtes mes amis si vous faites ce que je vous commande. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Je ne vous appelle plus serviteurs parce que le serviteur ne sait pas ce que fait son seigneur, mais je vous ai appelés amis parce que je vous ai fait connaître tout ce que j''ai appris de mon Père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ce n''est pas vous qui m''avez choisi, mais c''est moi qui vous ai choisis, et je vous ai établis afin que vous alliez, que vous portiez du fruit et que votre fruit demeure. Alors, ce que vous demanderez au Père en mon nom, il vous le donnera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ce que je vous commande, c'est de vous aimer les uns les autres.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L’œuvre du Saint-Esprit et la mort de Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '»Si le monde vous déteste, sachez qu''il m''a détesté avant vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Si vous étiez du monde, le monde vous aimerait car vous seriez à lui. Vous n''êtes pas du monde, mais je vous ai choisis du milieu du monde; c''est pour cela que le monde vous déteste. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Souvenez-vous de la parole que je vous ai dite: ‘Le serviteur n''est pas plus grand que son seigneur.’ S''ils m''ont persécuté, ils vous persécuteront aussi; s''ils ont gardé ma parole, ils garderont aussi la vôtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Mais ils vous feront tout cela à cause de moi, parce qu''ils ne connaissent pas celui qui m''a envoyé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Si je n''étais pas venu et ne leur avais pas parlé, ils ne seraient pas coupables, mais maintenant ils n''ont aucune excuse pour leur péché. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Celui qui me déteste déteste aussi mon Père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Si je n''avais pas fait parmi eux des œuvres qu''aucun autre n''a faites, ils ne seraient pas coupables, mais maintenant ils les ont vues et ils nous ont détestés, moi et mon Père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'C''est ainsi que s''accomplit la parole écrite dans leur loi: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Ils m'ont détesté sans raison
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ils m''ont détesté sans raison: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 35.19
      metadata:
        usfm: PSA.35.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (= 69.5). Le terme de loi pouvait désigner l''ensemble de l''Ancien Testament.'
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '»Quand sera venu le défenseur que je vous enverrai de la part du Père, l''Esprit de la vérité qui vient du Père, il rendra témoignage de moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Et vous aussi, vous me rendrez témoignage, parce que vous êtes avec moi depuis le début.
