document_id: JHN.15,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le cep et les sarments
  - type: text
    content: '»C''est moi qui suis le vrai cep, et mon Père est le vigneron. '
  '10':
  - type: text
    content: 'Si vous gardez mes commandements, vous demeurerez dans mon amour, de même que j''ai gardé les commandements de mon Père et que je demeure dans son amour. '
  '11':
  - type: text
    content: Je vous ai dit cela afin que ma joie demeure en vous et que votre joie soit complète.
  '12':
  - type: text
    content: '»Voici mon commandement: aimez-vous les uns les autres comme je vous ai aimés. '
  '13':
  - type: text
    content: 'Il n''y a pas de plus grand amour que de donner votre vie pour vos amis. '
  '14':
  - type: text
    content: 'Vous êtes mes amis si vous faites ce que je vous commande. '
  '15':
  - type: text
    content: 'Je ne vous appelle plus serviteurs parce que le serviteur ne sait pas ce que fait son seigneur, mais je vous ai appelés amis parce que je vous ai fait connaître tout ce que j''ai appris de mon Père. '
  '16':
  - type: text
    content: 'Ce n''est pas vous qui m''avez choisi, mais c''est moi qui vous ai choisis, et je vous ai établis afin que vous alliez, que vous portiez du fruit et que votre fruit demeure. Alors, ce que vous demanderez au Père en mon nom, il vous le donnera. '
  '17':
  - type: text
    content: Ce que je vous commande, c'est de vous aimer les uns les autres.
  - type: heading
    content: L’œuvre du Saint-Esprit et la mort de Jésus
  '18':
  - type: text
    content: '»Si le monde vous déteste, sachez qu''il m''a détesté avant vous. '
  '19':
  - type: text
    content: 'Si vous étiez du monde, le monde vous aimerait car vous seriez à lui. Vous n''êtes pas du monde, mais je vous ai choisis du milieu du monde; c''est pour cela que le monde vous déteste. '
  '2':
  - type: text
    content: 'Tout sarment qui est en moi et qui ne porte pas de fruit, il l''enlève; et tout sarment qui porte du fruit, il le taille afin qu''il porte encore plus de fruit. '
  '20':
  - type: text
    content: 'Souvenez-vous de la parole que je vous ai dite: ‘Le serviteur n''est pas plus grand que son seigneur.’ S''ils m''ont persécuté, ils vous persécuteront aussi; s''ils ont gardé ma parole, ils garderont aussi la vôtre. '
  '21':
  - type: text
    content: 'Mais ils vous feront tout cela à cause de moi, parce qu''ils ne connaissent pas celui qui m''a envoyé. '
  '22':
  - type: text
    content: 'Si je n''étais pas venu et ne leur avais pas parlé, ils ne seraient pas coupables, mais maintenant ils n''ont aucune excuse pour leur péché. '
  '23':
  - type: text
    content: 'Celui qui me déteste déteste aussi mon Père. '
  '24':
  - type: text
    content: 'Si je n''avais pas fait parmi eux des œuvres qu''aucun autre n''a faites, ils ne seraient pas coupables, mais maintenant ils les ont vues et ils nous ont détestés, moi et mon Père. '
  '25':
  - type: text
    content: 'C''est ainsi que s''accomplit la parole écrite dans leur loi: '
  - type: text
    content: Ils m'ont détesté sans raison
  - type: text
    content: .
  - type: note
    content: 'Ils m''ont détesté sans raison: citation du Psaume 35.19 (= 69.5). Le terme de loi pouvait désigner l''ensemble de l''Ancien Testament.'
  '26':
  - type: text
    content: '»Quand sera venu le défenseur que je vous enverrai de la part du Père, l''Esprit de la vérité qui vient du Père, il rendra témoignage de moi. '
  '27':
  - type: text
    content: Et vous aussi, vous me rendrez témoignage, parce que vous êtes avec moi depuis le début.
  '3':
  - type: text
    content: 'Déjà vous êtes purs à cause de la parole que je vous ai annoncée. '
  '4':
  - type: text
    content: 'Demeurez en moi et je demeurerai en vous. Le sarment ne peut pas porter de fruit par lui-même, sans rester attaché au cep; il en va de même pour vous si vous ne demeurez pas en moi. '
  '5':
  - type: text
    content: 'Je suis le cep, vous êtes les sarments. Celui qui demeure en moi et en qui je demeure porte beaucoup de fruit, car sans moi vous ne pouvez rien faire. '
  '6':
  - type: text
    content: 'Si quelqu''un ne demeure pas en moi, il est jeté dehors comme le sarment et il sèche; puis on ramasse les sarments, on les jette au feu et ils brûlent. '
  '7':
  - type: text
    content: 'Si vous demeurez en moi et que mes paroles demeurent en vous, vous demanderez ce que vous voudrez et cela vous sera accordé. '
  '8':
  - type: text
    content: Ce qui manifeste la gloire de mon Père, c'est que vous portiez beaucoup de fruit. Vous serez alors vraiment mes disciples.
  '9':
  - type: text
    content: '»Tout comme le Père m''a aimé, moi aussi, je vous ai aimés. Demeurez dans mon amour. '
