document_id: ISA.4
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ce jour-là, sept femmes s''empareront d''un seul homme en disant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Nous mangerons notre propre pain
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nous mettrons nos propres habits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais fais-nous seulement porter ton nom!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Enlève notre déshonneur!»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Purification et gloire d'Israël
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: A ce moment-là, le germe de l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: sera splendide et glorieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le fruit du pays sera source de fierté et d'honneur
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour les rescapés d'Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ceux qui subsisteront à Sion, ceux qui auront survécu à Jérusalem
- type: usfm
  marker: q1
  children:
  - type: text
    text: seront appelés saints,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous ceux qui seront inscrits pour la vie à Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Cela arrivera lorsque le Seigneur aura lavé les souillures des filles de Sion
- type: usfm
  marker: q1
  children:
  - type: text
    text: et purifié Jérusalem du sang qui se trouve au milieu d'elle
- type: usfm
  marker: q1
  children:
  - type: text
    text: par le souffle du jugement et par le souffle de la destruction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: L'Eternel fera alors apparaître, sur toute l'étendue du mont Sion
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sur ses lieux de réunion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une nuée fumante pendant le jour
- type: usfm
  marker: q1
  children:
  - type: text
    text: et un feu de flammes éclatantes pendant la nuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tout ce qui est glorieux sera abrité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il y aura un abri pour donner de l'ombre contre la chaleur du jour
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour servir de refuge et de protection contre l'orage et la pluie.
