document_id: ISA.4,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Ce jour-là, sept femmes s''empareront d''un seul homme en disant:'
  - type: text
    content: «Nous mangerons notre propre pain
  - type: text
    content: et nous mettrons nos propres habits,
  - type: text
    content: mais fais-nous seulement porter ton nom!
  - type: text
    content: Enlève notre déshonneur!»
  - type: heading
    content: Purification et gloire d'Israël
  '2':
  - type: text
    content: A ce moment-là, le germe de l'Eternel
  - type: text
    content: sera splendide et glorieux,
  - type: text
    content: et le fruit du pays sera source de fierté et d'honneur
  - type: text
    content: pour les rescapés d'Israël.
  '3':
  - type: text
    content: Ceux qui subsisteront à Sion, ceux qui auront survécu à Jérusalem
  - type: text
    content: seront appelés saints,
  - type: text
    content: tous ceux qui seront inscrits pour la vie à Jérusalem.
  '4':
  - type: text
    content: Cela arrivera lorsque le Seigneur aura lavé les souillures des filles de Sion
  - type: text
    content: et purifié Jérusalem du sang qui se trouve au milieu d'elle
  - type: text
    content: par le souffle du jugement et par le souffle de la destruction.
  '5':
  - type: text
    content: L'Eternel fera alors apparaître, sur toute l'étendue du mont Sion
  - type: text
    content: et sur ses lieux de réunion,
  - type: text
    content: une nuée fumante pendant le jour
  - type: text
    content: et un feu de flammes éclatantes pendant la nuit,
  - type: text
    content: car tout ce qui est glorieux sera abrité.
  '6':
  - type: text
    content: Il y aura un abri pour donner de l'ombre contre la chaleur du jour
  - type: text
    content: et pour servir de refuge et de protection contre l'orage et la pluie.
