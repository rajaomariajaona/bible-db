document_id: GEN.50,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Joseph se jeta sur le visage de son père, pleura sur lui et l''embrassa. '
  '10':
  - type: text
    content: 'Arrivés à l''aire de battage d''Athad qui se trouve de l''autre côté du Jourdain, ils firent entendre de grandes et très profondes lamentations. Joseph fit un deuil de sept jours en l''honneur de son père. '
  '11':
  - type: text
    content: 'Les habitants du pays, les Cananéens, furent témoins de ce deuil dans l''aire de battage d''Athad et ils dirent: «Quel deuil important pour les Egyptiens!» Voilà pourquoi on a appelé Abel-Mitsraïm cette aire de battage qui se trouve de l''autre côté du Jourdain. '
  '12':
  - type: text
    content: 'C''est ainsi que les fils de Jacob se conformèrent aux ordres de leur père. '
  '13':
  - type: text
    content: 'Ils le transportèrent dans le pays de Canaan et l''enterrèrent dans la grotte du champ de Macpéla, achetée comme propriété funéraire par Abraham à Ephron le Hittite et qui se trouve vis-à-vis de Mamré. '
  '14':
  - type: text
    content: Après avoir enterré son père, Joseph retourna en Egypte avec ses frères et tous ceux qui étaient montés avec lui pour enterrer son père.
  '15':
  - type: text
    content: 'Quand les frères de Joseph virent que leur père était mort, ils se dirent: «Si Joseph nous prenait en haine et nous rendait tout le mal que nous lui avons fait!» '
  '16':
  - type: text
    content: 'Et ils firent dire à Joseph: «Ton père a donné l''ordre suivant, avant de mourir: '
  '17':
  - type: text
    content: '‘Voici ce que vous direz à Joseph: Oh! Pardonne le crime de tes frères et leur péché, car ils t''ont fait du mal!’ Pardonne maintenant le crime des serviteurs du Dieu de ton père!» Joseph pleura à l''écoute de leur message. '
  '18':
  - type: text
    content: 'Ses frères vinrent eux-mêmes se jeter à ses pieds et dire: «Nous sommes tes serviteurs.» '
  '19':
  - type: text
    content: 'Joseph leur dit: «N''ayez pas peur! Suis-je en effet à la place de Dieu? '
  '2':
  - type: text
    content: 'Il ordonna aux médecins qui étaient à son service d''embaumer son père, et les médecins embaumèrent Israël. '
  '20':
  - type: text
    content: 'Vous aviez projeté de me faire du mal, Dieu l''a changé en bien pour accomplir ce qui arrive aujourd''hui, pour sauver la vie à un peuple nombreux. '
  '21':
  - type: text
    content: 'Désormais, n''ayez donc plus peur: je pourvoirai à vos besoins et à ceux de vos enfants.» C''est ainsi qu''il les réconforta en parlant à leur cœur.'
  - type: heading
    content: Mort de Joseph
  '22':
  - type: text
    content: 'Joseph habita en Egypte, ainsi que la famille de son père. Il vécut 110 ans. '
  '23':
  - type: text
    content: Joseph vit les fils d'Ephraïm jusqu'à la troisième génération et il tint même les fils de Makir, le fils de Manassé, sur ses genoux
  - type: note
    content: 'Sur ses genoux: possible allusion à l''adoption de ces enfants par Joseph.'
  - type: text
    content: ' à leur naissance. '
  '24':
  - type: text
    content: 'Joseph dit à ses frères: «Je vais mourir, mais Dieu interviendra pour vous et vous fera remonter de ce pays-ci jusque dans le pays qu''il a juré de donner à Abraham, à Isaac et à Jacob.» '
  '25':
  - type: text
    content: 'Joseph fit jurer les fils d''Israël en disant: «Quand Dieu interviendra pour vous, vous ferez remonter mes ossements loin d''ici.» '
  '26':
  - type: text
    content: Joseph mourut à l'âge de 110 ans. On l'embauma et on le mit dans un cercueil en Egypte.
  '3':
  - type: text
    content: Ce furent 40 jours qui passèrent ainsi et furent employés à l'embaumer. Les Egyptiens le pleurèrent 70 jours.
  '4':
  - type: text
    content: 'Quand les jours de deuil furent passés, Joseph s''adressa aux membres de l''entourage du pharaon en disant: «Si j''ai trouvé grâce à vos yeux, rapportez au pharaon ce que je vous dis. '
  '5':
  - type: text
    content: 'Mon père m''a fait prêter serment en disant: ‘Je vais mourir. Tu m''enterreras dans le tombeau que je me suis préparé dans le pays de Canaan.’ Je voudrais donc monter là-bas pour enterrer mon père et revenir.» '
  '6':
  - type: text
    content: 'Le pharaon répondit: «Montes-y et enterre ton père conformément au serment qu''il t''a fait faire.»'
  '7':
  - type: text
    content: 'Joseph monta enterrer son père. Il fut accompagné de tous les serviteurs du pharaon, des responsables du palais, de tous les responsables de l''Egypte, '
  '8':
  - type: text
    content: 'de tout son propre entourage, de ses frères et de la famille de son père. On ne laissa dans la région de Gosen que les enfants ainsi que le petit et le gros bétail. '
  '9':
  - type: text
    content: 'Il y avait encore avec Joseph des chars et des cavaliers, de sorte que le cortège était très nombreux. '
