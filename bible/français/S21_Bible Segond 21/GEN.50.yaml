document_id: GEN.50
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Joseph se jeta sur le visage de son père, pleura sur lui et l''embrassa. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il ordonna aux médecins qui étaient à son service d''embaumer son père, et les médecins embaumèrent Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ce furent 40 jours qui passèrent ainsi et furent employés à l'embaumer. Les Egyptiens le pleurèrent 70 jours.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Quand les jours de deuil furent passés, Joseph s''adressa aux membres de l''entourage du pharaon en disant: «Si j''ai trouvé grâce à vos yeux, rapportez au pharaon ce que je vous dis. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mon père m''a fait prêter serment en disant: ‘Je vais mourir. Tu m''enterreras dans le tombeau que je me suis préparé dans le pays de Canaan.’ Je voudrais donc monter là-bas pour enterrer mon père et revenir.» '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le pharaon répondit: «Montes-y et enterre ton père conformément au serment qu''il t''a fait faire.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Joseph monta enterrer son père. Il fut accompagné de tous les serviteurs du pharaon, des responsables du palais, de tous les responsables de l''Egypte, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'de tout son propre entourage, de ses frères et de la famille de son père. On ne laissa dans la région de Gosen que les enfants ainsi que le petit et le gros bétail. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il y avait encore avec Joseph des chars et des cavaliers, de sorte que le cortège était très nombreux. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Arrivés à l''aire de battage d''Athad qui se trouve de l''autre côté du Jourdain, ils firent entendre de grandes et très profondes lamentations. Joseph fit un deuil de sept jours en l''honneur de son père. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les habitants du pays, les Cananéens, furent témoins de ce deuil dans l''aire de battage d''Athad et ils dirent: «Quel deuil important pour les Egyptiens!» Voilà pourquoi on a appelé Abel-Mitsraïm cette aire de battage qui se trouve de l''autre côté du Jourdain. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'C''est ainsi que les fils de Jacob se conformèrent aux ordres de leur père. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ils le transportèrent dans le pays de Canaan et l''enterrèrent dans la grotte du champ de Macpéla, achetée comme propriété funéraire par Abraham à Ephron le Hittite et qui se trouve vis-à-vis de Mamré. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Après avoir enterré son père, Joseph retourna en Egypte avec ses frères et tous ceux qui étaient montés avec lui pour enterrer son père.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Quand les frères de Joseph virent que leur père était mort, ils se dirent: «Si Joseph nous prenait en haine et nous rendait tout le mal que nous lui avons fait!» '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et ils firent dire à Joseph: «Ton père a donné l''ordre suivant, avant de mourir: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '‘Voici ce que vous direz à Joseph: Oh! Pardonne le crime de tes frères et leur péché, car ils t''ont fait du mal!’ Pardonne maintenant le crime des serviteurs du Dieu de ton père!» Joseph pleura à l''écoute de leur message. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ses frères vinrent eux-mêmes se jeter à ses pieds et dire: «Nous sommes tes serviteurs.» '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Joseph leur dit: «N''ayez pas peur! Suis-je en effet à la place de Dieu? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Vous aviez projeté de me faire du mal, Dieu l''a changé en bien pour accomplir ce qui arrive aujourd''hui, pour sauver la vie à un peuple nombreux. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Désormais, n''ayez donc plus peur: je pourvoirai à vos besoins et à ceux de vos enfants.» C''est ainsi qu''il les réconforta en parlant à leur cœur.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mort de Joseph
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Joseph habita en Egypte, ainsi que la famille de son père. Il vécut 110 ans. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Joseph vit les fils d'Ephraïm jusqu'à la troisième génération et il tint même les fils de Makir, le fils de Manassé, sur ses genoux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '50.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sur ses genoux: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: possible allusion à l'adoption de ces enfants par Joseph.
    marker-yv: yv-n
  - type: text
    text: ' à leur naissance. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Joseph dit à ses frères: «Je vais mourir, mais Dieu interviendra pour vous et vous fera remonter de ce pays-ci jusque dans le pays qu''il a juré de donner à Abraham, à Isaac et à Jacob.» '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Joseph fit jurer les fils d''Israël en disant: «Quand Dieu interviendra pour vous, vous ferez remonter mes ossements loin d''ici.» '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Joseph mourut à l'âge de 110 ans. On l'embauma et on le mit dans un cercueil en Egypte.
