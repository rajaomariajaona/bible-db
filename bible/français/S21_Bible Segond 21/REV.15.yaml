document_id: REV.15,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les sept fléaux
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis je vis dans le ciel un autre signe, grand et extraordinaire: sept anges qui tenaient sept fléaux, les derniers, car la colère de Dieu s''accomplit par eux.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vis aussi comme une mer de verre mêlée de feu. Ceux qui avaient vaincu la bête, son image et le nombre de son nom étaient debout sur cette mer, tenant des harpes de Dieu. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils chantaient le cantique de Moïse, le serviteur de Dieu, et le cantique de l''Agneau en disant: «Tes œuvres sont grandes et extraordinaires, Seigneur Dieu tout-puissant! Tes voies sont justes et véritables, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: roi des nations!
    - type: text
      text: ' '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Qui pourrait ne pas [te] craindre
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.3-4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Roi des… craindre: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'renvoi à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jérémie 10.7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', Seigneur, et rendre gloire à ton nom? Oui, toi seul, tu es saint, et toutes les nations viendront t''adorer, parce que tes actes de justice ont été révélés.»'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après cela, je regardai et le temple, le tabernacle du témoignage, fut ouvert dans le ciel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les sept anges qui tenaient les sept fléaux sortirent du temple; ils étaient revêtus d''un lin pur, éclatant, et portaient des écharpes en or autour de la poitrine. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''un des quatre êtres vivants donna aux sept anges sept coupes d''or pleines de la colère du Dieu qui vit aux siècles des siècles. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le temple fut rempli de fumée à cause de la gloire de Dieu et de sa puissance, et personne ne pouvait entrer dans le temple tant que les sept fléaux des [sept] anges n'étaient pas accomplis.
