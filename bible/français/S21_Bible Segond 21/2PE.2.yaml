document_id: 2PE.2,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Cependant, il y a eu parmi le peuple de prétendus prophètes; de même, il y aura parmi vous de prétendus enseignants. Ils introduiront sournoisement des doctrines qui conduisent à la perdition, allant jusqu''à renier le maître qui les a rachetés, et ils attireront ainsi sur eux une ruine soudaine. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'C''est le cas notamment de ceux qui, dans un désir d''impureté, courent après les plaisirs de la chair et méprisent toute autorité. Présomptueux et arrogants, ils ne craignent pas d''insulter les êtres glorieux, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'alors que les anges, pourtant supérieurs en force et en puissance, ne portent pas de jugement insultant contre eux devant le Seigneur. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Mais eux, pareils à des animaux dépourvus de raison qui sont destinés à être capturés et abattus, ils calomnient ce qu''ils ignorent; ils mourront aussi comme des bêtes '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'et recevront alors le salaire de leur injustice, eux qui trouvent leur plaisir à se livrer à la débauche en plein jour. Hommes pervers et souillés, ils se délectent de leurs tromperies quand ils prennent part à vos festins. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Les yeux pleins d''adultère et jamais rassasiés de péchés, ils prennent au piège les personnes mal affermies; ils ont le cœur entraîné par l''exercice à la soif de posséder, et ce sont des enfants de malédiction. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ils ont quitté le droit chemin et se sont égarés en suivant la voie de Balaam, le fils de Béor, qui a aimé recevoir un salaire pour son injustice. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Il a cependant été repris pour sa violation des règles: une ânesse muette a fait entendre une voix humaine et s''est opposée à la folie du prophète.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ces gens-là sont des sources sans eau, des nuages poussés par la tempête; l''obscurité des ténèbres leur est réservée [pour l''éternité]. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Avec de grands discours pleins de vide, ils prennent au piège des plaisirs de la chair, de leurs débauches, ceux qui ont en réalité échappé aux hommes vivant dans l''égarement. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ils leur promettent la liberté alors qu''ils sont eux-mêmes esclaves de la corruption, puisque chacun est esclave de ce qui l''a dominé. '
  '2':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Beaucoup les suivront dans leur immoralité, et la voie de la vérité sera calomniée à cause d''eux. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'En effet si, après avoir échappé aux souillures du monde par la connaissance de notre Seigneur et Sauveur Jésus-Christ, ils se laissent reprendre et dominer par elles, leur dernière condition est pire que la première. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Il aurait mieux valu pour eux ne pas connaître la voie de la justice plutôt que de la connaître et de se détourner ensuite du saint commandement qui leur avait été donné. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Il leur est arrivé ce que disent avec raison les proverbes: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Le chien est retourné à ce qu'il avait vomi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le chien… vomi: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Proverbes 26.11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' et: «La truie à peine lavée s''est vautrée dans le bourbier.»'
  '3':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Dans leur soif de posséder, ils vous exploiteront avec des paroles trompeuses, mais leur condamnation menace depuis longtemps et leur ruine ne tardera pas.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'En effet, Dieu n''a pas épargné les anges qui ont péché, mais il les a précipités et enchaînés dans l''abîme, là où règnent les ténèbres, pour qu''ils y soient gardés en vue du jugement. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il n''a pas épargné non plus l''ancien monde, bien qu''il ait sauvé huit personnes dont Noé, ce prédicateur de la justice, lorsqu''il a fait venir le déluge sur un monde impie. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Par ailleurs, il a condamné [à la destruction] et réduit en cendres les villes de Sodome et de Gomorrhe pour les donner en exemple à ceux qui par la suite vivraient dans l''impiété, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'et il a délivré Lot le juste, qui était profondément attristé de la conduite immorale de ces hommes débauchés. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: – Ce juste, qui habitait au milieu d'eux, tourmentait en effet jour après jour son âme juste à cause de ce qu'il voyait et entendait de leurs agissements criminels. –
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ainsi donc, le Seigneur sait délivrer de l''épreuve les hommes pieux et garder les injustes pour le jour du jugement où ils seront punis. '
