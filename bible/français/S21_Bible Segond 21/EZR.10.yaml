document_id: EZR.10,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Renvoi des femmes étrangères
  - type: text
    content: Pendant qu'Esdras faisait cette prière et cette confession, en pleurs, prosterné devant la maison de Dieu, une assemblée très nombreuse d'Israélites, hommes, femmes et enfants, s'était formée à ses côtés. En effet, le peuple pleurait abondamment.
  '10':
  - type: text
    content: 'Le prêtre Esdras se leva et leur dit: «Vous avez commis un acte d''infidélité, vous avez installé chez vous des femmes étrangères, augmentant ainsi la culpabilité d''Israël. '
  '11':
  - type: text
    content: Confessez maintenant votre faute à l'Eternel, le Dieu de vos ancêtres, et faites ce qui lui plaît! Séparez-vous des populations du pays et des femmes étrangères!»
  '12':
  - type: text
    content: 'Toute l''assemblée répondit à voix haute: «Nous nous considérons comme tenus de faire ce que tu as dit, '
  '13':
  - type: text
    content: 'mais le peuple est nombreux, le temps est à la pluie et nous n''avons pas la force de rester dehors. D''ailleurs, ce n''est pas quelque chose qui peut se faire en un jour ou deux seulement, car il y en a beaucoup parmi nous qui se sont rendus coupables de cet acte de révolte. '
  '14':
  - type: text
    content: Que nos chefs restent donc à la place de toute l'assemblée; tous ceux qui, dans chacune de nos villes, ont installé chez eux des femmes étrangères viendront à des moments fixés, accompagnés des anciens et des juges de leur ville, jusqu'à ce que l'ardente colère provoquée chez notre Dieu par cette affaire se soit détournée de nous.»
  '15':
  - type: text
    content: 'Jonathan, fils d''Asaël, et Jachzia, fils de Thikva, furent les seuls à s''opposer à cette proposition, avec l''appui de Meshullam et du Lévite Shabthaï. '
  '16':
  - type: text
    content: 'Quant aux Juifs issus de l''exil, ils s''y conformèrent. On choisit le prêtre Esdras et des chefs de famille en les désignant tous nommément, et ils siégèrent le premier jour du dixième mois pour s''occuper de l''affaire. '
  '17':
  - type: text
    content: 'Le premier jour du premier mois, ils avaient fini de traiter le cas de tous les hommes qui avaient installé chez eux des femmes étrangères. '
  '18':
  - type: text
    content: 'Dans les familles des prêtres, on en trouva plusieurs qui avaient installé chez eux des femmes étrangères. Parmi les descendants de Josué, fils de Jotsadak, et ses frères, il y avait Maaséja, Eliézer, Jarib et Guedalia. '
  '19':
  - type: text
    content: 'Ils s''engagèrent à renvoyer leurs femmes et à offrir un bélier en sacrifice de culpabilité. '
  '2':
  - type: text
    content: 'Alors Shecania, fils de Jehiel, qui était un descendant d''Elam, prit la parole. Il dit à Esdras: «Nous avons commis un acte d''infidélité envers notre Dieu, nous avons installé chez nous des femmes étrangères, issues des peuples qui habitent le pays. Pourtant, en dépit de cela, il y a un espoir pour Israël. '
  '20':
  - type: text
    content: 'Parmi les descendants d''Immer, il y avait Hanani et Zebadia; '
  '21':
  - type: text
    content: 'parmi les descendants de Harim, Maaséja, Elie, Shemaeja, Jehiel et Ozias; '
  '22':
  - type: text
    content: 'parmi les descendants de Pashhur, Eljoénaï, Maaséja, Ismaël, Nathanaël, Jozabad et Eleasa. '
  '23':
  - type: text
    content: 'Parmi les Lévites, il y avait Jozabad, Shimeï, Kélaja – c''est-à-dire Kelitha – Pethachja, Juda et Eliézer; '
  '24':
  - type: text
    content: 'parmi les musiciens: Eliashib; parmi les portiers: Shallum, Thélem et Uri. '
  '25':
  - type: text
    content: 'Dans le peuple d''Israël, il y avait, parmi les descendants de Pareosh, Ramia, Jizzija, Malkija, Mijamin, Eléazar, Malkija et Benaja; '
  '26':
  - type: text
    content: 'parmi les descendants d''Elam, Matthania, Zacharie, Jehiel, Abdi, Jerémoth et Elie; '
  '27':
  - type: text
    content: 'parmi les descendants de Zatthu, Eljoénaï, Eliashib, Matthania, Jerémoth, Zabad et Aziza; '
  '28':
  - type: text
    content: 'parmi les descendants de Bébaï, Jochanan, Hanania, Zabbaï et Athlaï; '
  '29':
  - type: text
    content: 'parmi les descendants de Bani, Meshullam, Malluc, Adaja, Jashub, Sheal et Ramoth; '
  '3':
  - type: text
    content: 'Concluons maintenant une alliance avec notre Dieu en renvoyant toutes ces femmes et leurs enfants, suivant l''avis formulé par toi, seigneur, et par ceux qui tremblent devant les commandements de notre Dieu, et que l''on se conforme à la loi! '
  '30':
  - type: text
    content: 'parmi les descendants de Pachath-Moab, Adna, Kelal, Benaja, Maaséja, Matthania, Betsaleel, Binnuï et Manassé; '
  '31':
  - type: text
    content: 'parmi les descendants de Harim, Eliézer, Jishija, Malkija, Shemaeja, Siméon, '
  '32':
  - type: text
    content: 'Benjamin, Malluc et Shemaria; '
  '33':
  - type: text
    content: 'parmi les descendants de Hashum, Matthnaï, Matthattha, Zabad, Eliphéleth, Jerémaï, Manassé et Shimeï; '
  '34':
  - type: text
    content: 'parmi les descendants de Bani, Maadaï, Amram, Uel, '
  '35':
  - type: text
    content: 'Benaja, Bédia, Keluhu, '
  '36':
  - type: text
    content: 'Vania, Merémoth, Eliashib, '
  '37':
  - type: text
    content: 'Matthania, Matthnaï, Jaasaï, '
  '38':
  - type: text
    content: 'Bani, Binnuï, Shimeï, '
  '39':
  - type: text
    content: 'Shélémia, Nathan, Adaja, '
  '4':
  - type: text
    content: Lève-toi, car cette affaire est de ton ressort. Quant à nous, nous sommes avec toi. Fortifie-toi et agis!»
  '40':
  - type: text
    content: 'Macnadbaï, Shashaï, Sharaï, '
  '41':
  - type: text
    content: 'Azareel, Shélémia, Shemaria, '
  '42':
  - type: text
    content: 'Shallum, Amaria et Joseph; '
  '43':
  - type: text
    content: parmi les descendants de Nebo, Jeïel, Matthithia, Zabad, Zebina, Jaddaï, Joël et Benaja.
  '44':
  - type: text
    content: Tous ces hommes avaient pris des femmes étrangères, et certains avaient eu des enfants d'elles.
  '5':
  - type: text
    content: 'Esdras se leva. Il fit jurer aux chefs des prêtres et des Lévites et à tout Israël qu''ils feraient ce qui venait d''être dit, et ils s''y engagèrent par serment. '
  '6':
  - type: text
    content: Puis Esdras quitta le devant de la maison de Dieu et se rendit dans la chambre de Jochanan, fils d'Eliashib. Il resta là sans manger ni boire, parce qu'il était en deuil à cause de l'infidélité des exilés.
  '7':
  - type: text
    content: 'On fit passer dans Juda et à Jérusalem un message à l''intention de tous les Juifs issus de l''exil: ils devaient se réunir à Jérusalem; '
  '8':
  - type: text
    content: tout homme qui ne s'y serait pas rendu dans un délai de trois jours se verrait, conformément à l'avis des chefs et des anciens, confisquer tous ses biens et serait lui-même exclu de l'assemblée des exilés.
  '9':
  - type: text
    content: 'Tous les hommes de Juda et de Benjamin se rassemblèrent donc à Jérusalem dans les trois jours. C''était le vingtième jour du neuvième mois. Tout le peuple s''installa sur la place de la maison de Dieu, tremblant à la fois à cause de la situation et en raison de la pluie. '
