document_id: PHP.4,152
type_code: fra
verses:
  '1':
  - type: text
    content: C'est pourquoi, mes très chers frères et sœurs que je désire tant revoir, vous qui êtes ma joie et ma couronne, tenez ferme dans le Seigneur, mes bien-aimés!
  - type: heading
    content: Recommandations diverses
  '10':
  - type: text
    content: J'ai éprouvé une grande joie dans le Seigneur de ce que vous avez enfin pu renouveler l'expression de votre intérêt
  - type: note
    content: 'L''expression de votre intérêt: allusion probable au don que les Philippiens avaient fait parvenir à Paul.'
  - type: text
    content: ' pour moi. Vous y pensiez bien, mais l''occasion vous manquait. '
  '11':
  - type: text
    content: 'Ce n''est pas à cause de mes besoins que je dis cela, car j''ai appris à être satisfait de ma situation. '
  '12':
  - type: text
    content: 'Je sais vivre dans la pauvreté et je sais vivre dans l''abondance. Partout et en toutes circonstances j''ai appris à être rassasié et à avoir faim, à être dans l''abondance et à être dans le besoin. '
  '13':
  - type: text
    content: 'Je peux tout par celui qui me fortifie, [Christ]. '
  '14':
  - type: text
    content: Cependant vous avez bien fait de prendre part à ma détresse.
  '15':
  - type: text
    content: 'Vous le savez vous-mêmes, Philippiens, au début de la prédication de l''Evangile, lorsque j''ai quitté la Macédoine, aucune Eglise n''a pris part avec moi à un tel échange de contributions. Vous avez été les seuls à le faire: '
  '16':
  - type: text
    content: 'à Thessalonique déjà, et à plus d''une reprise, vous m''avez envoyé de quoi pourvoir à mes besoins. '
  '17':
  - type: text
    content: 'Ce n''est pas que je recherche les dons, mais je désire qu''un fruit abondant soit porté sur votre compte. '
  '18':
  - type: text
    content: 'J''ai tout reçu et je suis dans l''abondance. J''ai été comblé en recevant d''Epaphrodite ce que vous m''avez envoyé comme un parfum de bonne odeur, un sacrifice que Dieu accepte et qui lui est agréable. '
  '19':
  - type: text
    content: 'Et mon Dieu pourvoira à tous vos besoins conformément à sa richesse, avec gloire, en Jésus-Christ. '
  '2':
  - type: text
    content: 'J''encourage Evodie et Syntyche à vivre en plein accord dans le Seigneur. '
  '20':
  - type: text
    content: A notre Dieu et Père soit la gloire aux siècles des siècles! Amen!
  '21':
  - type: text
    content: 'Saluez chacun des saints en Jésus-Christ. Les frères qui sont avec moi vous saluent. '
  '22':
  - type: text
    content: Tous les saints vous saluent, en particulier ceux de l'entourage de l'empereur.
  '23':
  - type: text
    content: Que la grâce du Seigneur Jésus-Christ soit avec vous tous!
  '3':
  - type: text
    content: Toi aussi, mon fidèle collègue, je te demande de les aider, elles qui ont combattu pour l'Evangile avec moi ainsi qu'avec Clément et mes autres collaborateurs dont le nom figure dans le livre de vie.
  '4':
  - type: text
    content: 'Réjouissez-vous toujours dans le Seigneur! Je le répète: réjouissez-vous!'
  '5':
  - type: text
    content: Que votre douceur soit connue de tous les hommes. Le Seigneur est proche.
  '6':
  - type: text
    content: 'Ne vous inquiétez de rien, mais en toute chose faites connaître vos besoins à Dieu par des prières et des supplications, dans une attitude de reconnaissance. '
  '7':
  - type: text
    content: Et la paix de Dieu, qui dépasse tout ce que l'on peut comprendre, gardera votre cœur et vos pensées en Jésus-Christ.
  '8':
  - type: text
    content: 'Enfin, frères et sœurs, portez vos pensées sur tout ce qui est vrai, tout ce qui est honorable, tout ce qui est juste, tout ce qui est pur, tout ce qui est digne d''être aimé, tout ce qui mérite l''approbation, ce qui est synonyme de qualité morale et ce qui est digne de louange. '
  '9':
  - type: text
    content: Ce que vous avez appris, reçu et entendu de moi et ce que vous avez vu en moi, mettez-le en pratique. Et le Dieu de la paix sera avec vous.
  - type: heading
    content: Reconnaissance et salutations
