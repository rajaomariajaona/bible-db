document_id: PHP.4
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: C'est pourquoi, mes très chers frères et sœurs que je désire tant revoir, vous qui êtes ma joie et ma couronne, tenez ferme dans le Seigneur, mes bien-aimés!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Recommandations diverses
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'J''encourage Evodie et Syntyche à vivre en plein accord dans le Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Toi aussi, mon fidèle collègue, je te demande de les aider, elles qui ont combattu pour l'Evangile avec moi ainsi qu'avec Clément et mes autres collaborateurs dont le nom figure dans le livre de vie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Réjouissez-vous toujours dans le Seigneur! Je le répète: réjouissez-vous!'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Que votre douceur soit connue de tous les hommes. Le Seigneur est proche.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ne vous inquiétez de rien, mais en toute chose faites connaître vos besoins à Dieu par des prières et des supplications, dans une attitude de reconnaissance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Et la paix de Dieu, qui dépasse tout ce que l'on peut comprendre, gardera votre cœur et vos pensées en Jésus-Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Enfin, frères et sœurs, portez vos pensées sur tout ce qui est vrai, tout ce qui est honorable, tout ce qui est juste, tout ce qui est pur, tout ce qui est digne d''être aimé, tout ce qui mérite l''approbation, ce qui est synonyme de qualité morale et ce qui est digne de louange. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ce que vous avez appris, reçu et entendu de moi et ce que vous avez vu en moi, mettez-le en pratique. Et le Dieu de la paix sera avec vous.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Reconnaissance et salutations
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: J'ai éprouvé une grande joie dans le Seigneur de ce que vous avez enfin pu renouveler l'expression de votre intérêt
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''expression de votre intérêt: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: allusion probable au don que les Philippiens avaient fait parvenir à Paul.
    marker-yv: yv-n
  - type: text
    text: ' pour moi. Vous y pensiez bien, mais l''occasion vous manquait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ce n''est pas à cause de mes besoins que je dis cela, car j''ai appris à être satisfait de ma situation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je sais vivre dans la pauvreté et je sais vivre dans l''abondance. Partout et en toutes circonstances j''ai appris à être rassasié et à avoir faim, à être dans l''abondance et à être dans le besoin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Je peux tout par celui qui me fortifie, [Christ]. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Cependant vous avez bien fait de prendre part à ma détresse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Vous le savez vous-mêmes, Philippiens, au début de la prédication de l''Evangile, lorsque j''ai quitté la Macédoine, aucune Eglise n''a pris part avec moi à un tel échange de contributions. Vous avez été les seuls à le faire: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'à Thessalonique déjà, et à plus d''une reprise, vous m''avez envoyé de quoi pourvoir à mes besoins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ce n''est pas que je recherche les dons, mais je désire qu''un fruit abondant soit porté sur votre compte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'J''ai tout reçu et je suis dans l''abondance. J''ai été comblé en recevant d''Epaphrodite ce que vous m''avez envoyé comme un parfum de bonne odeur, un sacrifice que Dieu accepte et qui lui est agréable. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Et mon Dieu pourvoira à tous vos besoins conformément à sa richesse, avec gloire, en Jésus-Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: A notre Dieu et Père soit la gloire aux siècles des siècles! Amen!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Saluez chacun des saints en Jésus-Christ. Les frères qui sont avec moi vous saluent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tous les saints vous saluent, en particulier ceux de l'entourage de l'empereur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Que la grâce du Seigneur Jésus-Christ soit avec vous tous!
