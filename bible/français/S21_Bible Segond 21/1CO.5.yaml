document_id: 1CO.5,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Désordres sexuels et moraux dans l'Eglise
  - type: text
    content: 'On entend généralement dire qu''il y a de l''immoralité sexuelle parmi vous, et une immoralité telle qu''on ne la mentionne même pas chez les non-croyants; c''est au point que l''un de vous a pris la femme de son père. '
  '10':
  - type: text
    content: 'Je ne parlais pas d''une manière absolue des gens de ce monde qui vivent dans l''immoralité ou sont toujours désireux de posséder plus, voleurs, idolâtres; autrement, il vous faudrait sortir du monde. '
  '11':
  - type: text
    content: 'En fait, ce que je vous ai écrit, c''est de ne pas entretenir de relations avec quelqu''un qui, tout en se disant votre frère, vit dans l''immoralité sexuelle, est toujours désireux de posséder plus, idolâtre, calomniateur, ivrogne ou voleur, de ne pas même manger avec un tel homme. '
  '12':
  - type: text
    content: 'Est-ce à moi, en effet, de juger les gens de l''extérieur? N''est-ce pas ceux de l''intérieur que vous devez juger? '
  '13':
  - type: text
    content: 'Les gens de l''extérieur, Dieu les jugera. '
  - type: text
    content: Chassez le méchant du milieu de vous.
  - type: note
    content: 'Chassez… de vous: citation de Deutéronome 13.6.'
  '2':
  - type: text
    content: 'Et vous êtes enflés d''orgueil! Vous auriez dû plutôt prendre le deuil, de sorte que l''auteur de cet acte soit exclu du milieu de vous! '
  '3':
  - type: text
    content: 'Quant à moi, absent de corps mais présent en esprit, j''ai déjà jugé l''auteur d''un tel acte comme si j''étais présent. '
  '4':
  - type: text
    content: 'Quand vous vous rassemblerez au nom de [notre] Seigneur Jésus[-Christ] – je serai avec vous en esprit –, avec la puissance de notre Seigneur Jésus-Christ '
  '5':
  - type: text
    content: livrez un tel homme à Satan pour la destruction de la nature pécheresse afin que l'esprit soit sauvé le jour du Seigneur Jésus.
  '6':
  - type: text
    content: 'Vous n''avez vraiment pas de quoi être fiers! Ne savez-vous pas qu''un peu de levain fait lever toute la pâte? '
  '7':
  - type: text
    content: 'Purifiez-vous [donc] du vieux levain afin d''être une pâte nouvelle, puisque vous êtes sans levain. En effet, Christ, notre agneau pascal, a été sacrifié [pour nous]. '
  '8':
  - type: text
    content: Célébrons donc la fête
  - type: note
    content: 'La fête: renvoi à la Pâque, fête juive qui célébrait le départ d''Egypte des Israélites et leur libération de l''oppression qu''ils y subissaient; on mangeait du pain sans levain, et un agneau – dont le sang avait écarté la menace de mort – était sacrifié.'
  - type: text
    content: ', non avec du vieux levain, le levain du mal et de la méchanceté, mais avec les pains sans levain de la pureté et de la vérité.'
  '9':
  - type: text
    content: 'Je vous ai écrit dans ma lettre de ne pas entretenir de relations avec ceux qui vivent dans l''immoralité sexuelle. '
