document_id: 1CO.5,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Désordres sexuels et moraux dans l'Eglise
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On entend généralement dire qu''il y a de l''immoralité sexuelle parmi vous, et une immoralité telle qu''on ne la mentionne même pas chez les non-croyants; c''est au point que l''un de vous a pris la femme de son père. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je ne parlais pas d''une manière absolue des gens de ce monde qui vivent dans l''immoralité ou sont toujours désireux de posséder plus, voleurs, idolâtres; autrement, il vous faudrait sortir du monde. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En fait, ce que je vous ai écrit, c''est de ne pas entretenir de relations avec quelqu''un qui, tout en se disant votre frère, vit dans l''immoralité sexuelle, est toujours désireux de posséder plus, idolâtre, calomniateur, ivrogne ou voleur, de ne pas même manger avec un tel homme. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Est-ce à moi, en effet, de juger les gens de l''extérieur? N''est-ce pas ceux de l''intérieur que vous devez juger? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les gens de l''extérieur, Dieu les jugera. '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Chassez le méchant du milieu de vous.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Chassez… de vous: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deutéronome 13.6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et vous êtes enflés d''orgueil! Vous auriez dû plutôt prendre le deuil, de sorte que l''auteur de cet acte soit exclu du milieu de vous! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant à moi, absent de corps mais présent en esprit, j''ai déjà jugé l''auteur d''un tel acte comme si j''étais présent. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand vous vous rassemblerez au nom de [notre] Seigneur Jésus[-Christ] – je serai avec vous en esprit –, avec la puissance de notre Seigneur Jésus-Christ '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: livrez un tel homme à Satan pour la destruction de la nature pécheresse afin que l'esprit soit sauvé le jour du Seigneur Jésus.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous n''avez vraiment pas de quoi être fiers! Ne savez-vous pas qu''un peu de levain fait lever toute la pâte? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Purifiez-vous [donc] du vieux levain afin d''être une pâte nouvelle, puisque vous êtes sans levain. En effet, Christ, notre agneau pascal, a été sacrifié [pour nous]. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Célébrons donc la fête
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'La fête: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: renvoi à la Pâque, fête juive qui célébrait le départ d'Egypte des Israélites et leur libération de l'oppression qu'ils y subissaient; on mangeait du pain sans levain, et un agneau – dont le sang avait écarté la menace de mort – était sacrifié.
      marker-yv: yv-n
    - type: text
      text: ', non avec du vieux levain, le levain du mal et de la méchanceté, mais avec les pains sans levain de la pureté et de la vérité.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vous ai écrit dans ma lettre de ne pas entretenir de relations avec ceux qui vivent dans l''immoralité sexuelle. '
