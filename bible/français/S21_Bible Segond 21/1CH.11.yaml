document_id: 1CH.11,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Sacre de David sur Israël
  - type: text
    content: 'Tout Israël se rassembla vers David à Hébron en disant: «Nous sommes faits des mêmes os et de la même chair que toi. '
  '10':
  - type: text
    content: 'Voici les chefs des vaillants hommes qui étaient au service de David et qui, avec tout Israël, le soutinrent dans son accession à la royauté pour qu''il règne conformément à la parole de l''Eternel au sujet d''Israël. '
  '11':
  - type: text
    content: Voici la liste des vaillants hommes qui étaient au service de David.
  - type: text
    content: Jashobeam, fils de Hacmoni, était le chef des officiers. Il brandit sa lance sur 300 hommes qu'il tua en une seule fois.
  '12':
  - type: text
    content: 'Après lui figurait Eléazar, fils de Dodo, l''Achochite. Il était l''un des trois guerriers. '
  '13':
  - type: text
    content: 'C''est lui qui était avec David à Pas-Dammim lorsque les Philistins s''y étaient rassemblés pour le combat. Il y avait là une parcelle de terre couverte d''orge et le peuple avait pris la fuite devant les Philistins. '
  '14':
  - type: text
    content: Ces trois guerriers se postèrent au milieu du champ et le protégèrent. Ils battirent les Philistins et l'Eternel accorda une grande délivrance.
  '15':
  - type: text
    content: 'Trois des trente chefs descendirent vers David sur le rocher, dans la grotte d''Adullam, lorsque le camp des Philistins était dressé dans la vallée des Rephaïm. '
  '16':
  - type: text
    content: 'David était alors dans la forteresse et il y avait une garnison de Philistins à Bethléhem. '
  '17':
  - type: text
    content: 'Pris d''un soudain désir, David demanda: «Qui me fera boire de l''eau de la citerne qui se trouve à la porte de Bethléhem?» '
  '18':
  - type: text
    content: 'Alors ces trois hommes pénétrèrent de force dans le camp des Philistins et puisèrent de l''eau dans la citerne qui se trouve à la porte de Bethléhem. Puis ils l''apportèrent et la présentèrent à David, mais il refusa de la boire et il la versa comme une offrande à l''Eternel. '
  '19':
  - type: text
    content: 'Il dit: «Que mon Dieu me garde de faire cela! Pourrais-je boire le sang de ces hommes qui sont partis au péril de leur vie? Oui, c''est au péril de leur vie qu''ils l''ont apportée.» Et il refusa de la boire. Voilà ce que firent ces trois vaillants hommes.'
  '2':
  - type: text
    content: 'Auparavant déjà, même lorsque Saül était roi, c''était toi qui faisais partir Israël en campagne et qui l''en faisais revenir. L''Eternel, ton Dieu, t''a dit: ‘*C''est toi qui prendras soin de mon peuple, Israël, et qui deviendras son chef.’'
  - type: note
    content: 'C''est toi… chef: reprise de 2 Samuel 5.2.'
  - type: text
    content: '» '
  '20':
  - type: text
    content: 'Abishaï, le frère de Joab, était le chef des trois. Il brandit sa lance sur 300 hommes et les tua. Il eut une grande réputation parmi les trois. '
  '21':
  - type: text
    content: Il était le plus considéré des trois de la deuxième série et il fut leur chef, mais il n'égala pas les trois premiers.
  '22':
  - type: text
    content: 'Benaja, le fils de Jehojada, qui était un homme vaillant de Kabtseel, fut célèbre par ses exploits. C''est lui qui frappa les deux héros de Moab. Il descendit au milieu d''une citerne et il y frappa un lion, un jour de neige. '
  '23':
  - type: text
    content: 'Il frappa un Egyptien de 2 mètres et demi qui tenait à la main une lance de la grosseur d''un cylindre de métier à tisser. Il descendit contre l''Egyptien avec un bâton, arracha la lance de sa main et s''en servit pour le tuer. '
  '24':
  - type: text
    content: 'Voilà ce que fit Benaja, fils de Jehojada. Il eut une grande réputation parmi les trois vaillants hommes. '
  '25':
  - type: text
    content: Il était le plus considéré des trente, mais il n'égala pas les trois premiers. David l'admit dans sa garde personnelle.
  '26':
  - type: text
    content: 'Voici les autres hommes vaillants: Asaël, frère de Joab; Elchanan, fils de Dodo, originaire de Bethléhem; '
  '27':
  - type: text
    content: 'Shammoth, originaire d''Haror; Hélets, originaire de Palon; '
  '28':
  - type: text
    content: 'Ira, fils d''Ikkesh, originaire de Tekoa; Abiézer, originaire d''Anathoth; '
  '29':
  - type: text
    content: 'Sibbecaï le Hushatite; Ilaï, originaire d''Achoach; '
  '3':
  - type: text
    content: Ainsi, tous les anciens d'Israël vinrent trouver le roi à Hébron et là, David fit alliance avec eux devant l'Eternel. Ils consacrèrent par onction David comme roi sur Israël, conformément à la parole de l'Eternel transmise par Samuel.
  '30':
  - type: text
    content: 'Maharaï, originaire de Nethopha; Héled, fils de Baana, originaire de Nethopha; '
  '31':
  - type: text
    content: 'Ithaï, fils de Ribaï, originaire de Guibea, la ville des Benjaminites; Benaja, originaire de Pirathon; '
  '32':
  - type: text
    content: 'Huraï, originaire de Nachalé-Gaash; Abiel, originaire d''Araba; '
  '33':
  - type: text
    content: 'Azmaveth, originaire de Bacharum; Eliachba, originaire de Shaalbon; '
  '34':
  - type: text
    content: 'Bené-Hashem, originaire de Guizon; Jonathan, fils de Shagué, originaire d''Harar; '
  '35':
  - type: text
    content: 'Achiam, fils de Sacar, lui aussi originaire d''Harar; Eliphal, fils d''Ur; '
  '36':
  - type: text
    content: 'Hépher, originaire de Mekéra; Achija, originaire de Palon; '
  '37':
  - type: text
    content: 'Hetsro, originaire de Carmel; Naaraï, fils d''Ezbaï; '
  '38':
  - type: text
    content: 'Joël, frère de Nathan; Mibchar, fils d''Hagri; '
  '39':
  - type: text
    content: 'Tsélek l''Ammonite; Nachraï, originaire de Béroth, qui était le porteur d''armes de Joab, le fils de Tseruja; '
  '4':
  - type: text
    content: 'David marcha avec tout Israël sur Jérusalem, c''est-à-dire Jébus. Là se trouvaient les Jébusiens, qui habitaient le pays. '
  '40':
  - type: text
    content: 'Ira et Gareb, tous deux originaires de Jéther; '
  '41':
  - type: text
    content: 'Urie le Hittite; Zabad, fils d''Achlaï; '
  '42':
  - type: text
    content: 'Adina, fils de Shiza, le Rubénite, qui était un chef des Rubénites et commandait 30 hommes; '
  '43':
  - type: text
    content: 'Hanan, fils de Maaca; Josaphat, originaire de Mithni; '
  '44':
  - type: text
    content: 'Ozias, originaire d''Ashtharoth; Shama et Jehiel, fils de Hotham, originaires d''Aroër; '
  '45':
  - type: text
    content: 'Jediaël, fils de Shimri et son frère Jocha le Thitsite; '
  '46':
  - type: text
    content: 'Eliel, originaire de Machavim; Jeribaï et Joshavia, les fils d''Elnaam; Jithma le Moabite; '
  '47':
  - type: text
    content: Eliel, Obed et Jaasiel-Metsobaja.
  '5':
  - type: text
    content: 'Les habitants de Jébus dirent à David: «Tu n''entreras pas ici.» David s''empara néanmoins de la forteresse de Sion, c''est-à-dire la ville de David. '
  '6':
  - type: text
    content: 'David avait dit: «Le premier qui battra les Jébusiens deviendra un chef et un prince.» Joab, fils de Tseruja, fut le premier à monter à l''attaque et il devint un chef. '
  '7':
  - type: text
    content: 'David s''installa dans la forteresse; c''est pourquoi on l''a appelée ville de David. '
  '8':
  - type: text
    content: 'Il fit des constructions tout autour de la ville, à partir de la terrasse de Millo et tout autour, tandis que Joab réparait le reste de la ville. '
  '9':
  - type: text
    content: David devenait de plus en plus puissant et l'Eternel, le maître de l'univers, était avec lui.
  - type: heading
    content: Les vaillants hommes de David
