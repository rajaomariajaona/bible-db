document_id: 1CH.11,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sacre de David sur Israël
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout Israël se rassembla vers David à Hébron en disant: «Nous sommes faits des mêmes os et de la même chair que toi. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les chefs des vaillants hommes qui étaient au service de David et qui, avec tout Israël, le soutinrent dans son accession à la royauté pour qu''il règne conformément à la parole de l''Eternel au sujet d''Israël. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voici la liste des vaillants hommes qui étaient au service de David.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jashobeam, fils de Hacmoni, était le chef des officiers. Il brandit sa lance sur 300 hommes qu'il tua en une seule fois.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après lui figurait Eléazar, fils de Dodo, l''Achochite. Il était l''un des trois guerriers. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est lui qui était avec David à Pas-Dammim lorsque les Philistins s''y étaient rassemblés pour le combat. Il y avait là une parcelle de terre couverte d''orge et le peuple avait pris la fuite devant les Philistins. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ces trois guerriers se postèrent au milieu du champ et le protégèrent. Ils battirent les Philistins et l'Eternel accorda une grande délivrance.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Trois des trente chefs descendirent vers David sur le rocher, dans la grotte d''Adullam, lorsque le camp des Philistins était dressé dans la vallée des Rephaïm. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David était alors dans la forteresse et il y avait une garnison de Philistins à Bethléhem. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pris d''un soudain désir, David demanda: «Qui me fera boire de l''eau de la citerne qui se trouve à la porte de Bethléhem?» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors ces trois hommes pénétrèrent de force dans le camp des Philistins et puisèrent de l''eau dans la citerne qui se trouve à la porte de Bethléhem. Puis ils l''apportèrent et la présentèrent à David, mais il refusa de la boire et il la versa comme une offrande à l''Eternel. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit: «Que mon Dieu me garde de faire cela! Pourrais-je boire le sang de ces hommes qui sont partis au péril de leur vie? Oui, c''est au péril de leur vie qu''ils l''ont apportée.» Et il refusa de la boire. Voilà ce que firent ces trois vaillants hommes.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Auparavant déjà, même lorsque Saül était roi, c''était toi qui faisais partir Israël en campagne et qui l''en faisais revenir. L''Eternel, ton Dieu, t''a dit: ‘*C''est toi qui prendras soin de mon peuple, Israël, et qui deviendras son chef.’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'C''est toi… chef: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'reprise de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Samuel 5.2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '» '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abishaï, le frère de Joab, était le chef des trois. Il brandit sa lance sur 300 hommes et les tua. Il eut une grande réputation parmi les trois. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il était le plus considéré des trois de la deuxième série et il fut leur chef, mais il n'égala pas les trois premiers.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Benaja, le fils de Jehojada, qui était un homme vaillant de Kabtseel, fut célèbre par ses exploits. C''est lui qui frappa les deux héros de Moab. Il descendit au milieu d''une citerne et il y frappa un lion, un jour de neige. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il frappa un Egyptien de 2 mètres et demi qui tenait à la main une lance de la grosseur d''un cylindre de métier à tisser. Il descendit contre l''Egyptien avec un bâton, arracha la lance de sa main et s''en servit pour le tuer. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voilà ce que fit Benaja, fils de Jehojada. Il eut une grande réputation parmi les trois vaillants hommes. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il était le plus considéré des trente, mais il n'égala pas les trois premiers. David l'admit dans sa garde personnelle.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les autres hommes vaillants: Asaël, frère de Joab; Elchanan, fils de Dodo, originaire de Bethléhem; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Shammoth, originaire d''Haror; Hélets, originaire de Palon; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ira, fils d''Ikkesh, originaire de Tekoa; Abiézer, originaire d''Anathoth; '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sibbecaï le Hushatite; Ilaï, originaire d''Achoach; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi, tous les anciens d'Israël vinrent trouver le roi à Hébron et là, David fit alliance avec eux devant l'Eternel. Ils consacrèrent par onction David comme roi sur Israël, conformément à la parole de l'Eternel transmise par Samuel.
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maharaï, originaire de Nethopha; Héled, fils de Baana, originaire de Nethopha; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ithaï, fils de Ribaï, originaire de Guibea, la ville des Benjaminites; Benaja, originaire de Pirathon; '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Huraï, originaire de Nachalé-Gaash; Abiel, originaire d''Araba; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Azmaveth, originaire de Bacharum; Eliachba, originaire de Shaalbon; '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bené-Hashem, originaire de Guizon; Jonathan, fils de Shagué, originaire d''Harar; '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Achiam, fils de Sacar, lui aussi originaire d''Harar; Eliphal, fils d''Ur; '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hépher, originaire de Mekéra; Achija, originaire de Palon; '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hetsro, originaire de Carmel; Naaraï, fils d''Ezbaï; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joël, frère de Nathan; Mibchar, fils d''Hagri; '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsélek l''Ammonite; Nachraï, originaire de Béroth, qui était le porteur d''armes de Joab, le fils de Tseruja; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David marcha avec tout Israël sur Jérusalem, c''est-à-dire Jébus. Là se trouvaient les Jébusiens, qui habitaient le pays. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ira et Gareb, tous deux originaires de Jéther; '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Urie le Hittite; Zabad, fils d''Achlaï; '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Adina, fils de Shiza, le Rubénite, qui était un chef des Rubénites et commandait 30 hommes; '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hanan, fils de Maaca; Josaphat, originaire de Mithni; '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ozias, originaire d''Ashtharoth; Shama et Jehiel, fils de Hotham, originaires d''Aroër; '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jediaël, fils de Shimri et son frère Jocha le Thitsite; '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eliel, originaire de Machavim; Jeribaï et Joshavia, les fils d''Elnaam; Jithma le Moabite; '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Eliel, Obed et Jaasiel-Metsobaja.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les habitants de Jébus dirent à David: «Tu n''entreras pas ici.» David s''empara néanmoins de la forteresse de Sion, c''est-à-dire la ville de David. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David avait dit: «Le premier qui battra les Jébusiens deviendra un chef et un prince.» Joab, fils de Tseruja, fut le premier à monter à l''attaque et il devint un chef. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David s''installa dans la forteresse; c''est pourquoi on l''a appelée ville de David. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit des constructions tout autour de la ville, à partir de la terrasse de Millo et tout autour, tandis que Joab réparait le reste de la ville. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David devenait de plus en plus puissant et l'Eternel, le maître de l'univers, était avec lui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les vaillants hommes de David
    marker-yv: yv-h
