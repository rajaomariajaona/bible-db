document_id: 1JN.2,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Mes petits enfants, je vous écris cela afin que vous ne péchiez pas. Mais si quelqu''un a péché, nous avons un défenseur auprès du Père, Jésus-Christ le juste. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Celui qui aime son frère reste dans la lumière, et il n''y a en lui rien qui puisse le faire trébucher. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: En revanche, celui qui déteste son frère est dans les ténèbres; il marche dans les ténèbres, sans savoir où il va, parce que les ténèbres ont aveuglé ses yeux.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Je vous écris, petits enfants, parce que vos péchés vous sont pardonnés à cause de son nom. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Je vous écris, pères, parce que vous connaissez celui qui est dès le commencement. Je vous écris, jeunes gens, parce que vous avez vaincu le mauvais
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.13-14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le mauvais: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire le diable.
      marker-yv: yv-n
    - type: text
      text: '. Je vous écris, petits enfants, parce que vous connaissez le Père. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Je vous ai écrit, pères, parce que vous connaissez celui qui est dès le commencement. Je vous ai écrit, jeunes gens, parce que vous êtes forts, que la parole de Dieu demeure en vous et que vous avez vaincu le mauvais.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'N''aimez pas le monde ni ce qui est dans le monde. Si quelqu''un aime le monde, l''amour du Père n''est pas en lui. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'En effet, tout ce qui est dans le monde – la convoitise qui est dans l''homme, la convoitise des yeux et l''orgueil dû aux richesses – vient non du Père, mais du monde. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Or le monde passe, sa convoitise aussi, mais celui qui fait la volonté de Dieu demeure éternellement.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le retour du Seigneur et les antichrists
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Petits enfants, c'est la dernière heure. Vous avez appris que l'Antichrist
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'L''Antichrist: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: terme signifiant contre ou à la place de Christ.
      marker-yv: yv-n
    - type: text
      text: ' vient. Or, déjà maintenant, il y a plusieurs antichrists; par là nous reconnaissons que c''est la dernière heure. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ils sont sortis du milieu de nous, mais ils n'étaient pas des nôtres, car s'ils avaient été des nôtres, ils seraient restés avec nous. Mais cela est arrivé afin qu'il soit bien clair que tous ne sont pas des nôtres.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Il est lui-même la victime expiatoire
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Victime expiatoire: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: victime offerte en sacrifice pour satisfaire les exigences de la justice divine, déjà dans la loi de Moïse.
      marker-yv: yv-n
    - type: text
      text: ' pour nos péchés, et non seulement pour les nôtres, mais aussi pour ceux du monde entier.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Quant à vous, vous avez l'onction
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'L''onction: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire le Saint-Esprit ou la Parole de Dieu.
      marker-yv: yv-n
    - type: text
      text: ' donnée par celui qui est saint et vous avez toute connaissance. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Si je vous ai écrit, ce n''est pas parce que vous ignorez la vérité, mais parce que vous la connaissez et qu''aucun mensonge ne provient de la vérité. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Qui est menteur? N'est-ce pas celui qui nie que Jésus est le Messie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le Messie: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire l'oint (en grec Christ) de Dieu qui, d'après l'Ancien Testament, devait apporter la délivrance et exercer une autorité universelle.
      marker-yv: yv-n
    - type: text
      text: '? Tel est l''Antichrist, celui qui nie le Père et le Fils. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Si quelqu'un nie le Fils, il n'a pas non plus le Père; [celui qui se déclare publiquement pour le Fils a aussi le Père.]
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Pour votre part, retenez [donc] ce que vous avez entendu dès le commencement. Si ce que vous avez entendu depuis le début demeure en vous, vous demeurerez vous aussi dans le Fils et dans le Père. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Et voici ce qu''il nous a lui-même promis: c''est la vie éternelle.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Je vous ai écrit cela par rapport à ceux qui vous égarent. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Quant à vous, l'onction que vous avez reçue de Christ demeure en vous et vous n'avez pas besoin qu'on vous enseigne. Au contraire, puisque la même onction vous enseigne sur toute chose, qu'elle est véridique et dépourvue de mensonge, vous demeurerez en lui comme elle vous l'a appris.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Et maintenant, petits enfants, demeurez en lui. Ainsi, nous aurons de l''assurance lorsqu''il apparaîtra, nous n''aurons pas la honte d''être loin de lui lors de son retour. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Si vous savez qu'il est juste, reconnaissez que toute personne qui pratique la justice est [aussi] née de lui.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Si nous gardons les commandements de Christ, nous savons par là que nous l''avons connu. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Celui qui prétend l''avoir connu alors qu''il ne garde pas ses commandements est un menteur, et la vérité n''est pas en lui. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Mais l''amour de Dieu est vraiment parfait en celui qui garde sa parole: c''est à cela que nous reconnaissons que nous sommes en lui. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Celui qui affirme demeurer en Christ doit aussi vivre comme il a lui-même vécu.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Frères et sœurs, ce n''est pas un commandement nouveau que je vous écris, mais un commandement ancien, celui que vous avez reçu depuis le début. Ce commandement ancien, c''est la parole que vous avez entendue [dès le commencement]. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Toutefois, c'est aussi un commandement nouveau que je vous écris; sa nouveauté se vérifie en lui et en vous, car les ténèbres se dissipent et la vraie lumière brille déjà.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Celui qui prétend être dans la lumière tout en détestant son frère est encore dans les ténèbres. '
