document_id: 1SA.20,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Confirmation des dispositions de Saül envers David
  - type: text
    content: 'David s''enfuit de Najoth, près de Rama. Il alla trouver Jonathan et dit: «Qu''ai-je fait? Quelle est ma faute, quel est mon péché aux yeux de ton père, pour qu''il en veuille à ma vie?» '
  '10':
  - type: text
    content: 'David demanda à Jonathan: «Qui m''informera dans le cas où ton père te répondrait avec dureté?» '
  '11':
  - type: text
    content: 'Jonathan lui dit: «Viens, sortons dans les champs.» Et ils sortirent tous deux dans les champs.'
  '12':
  - type: text
    content: 'Jonathan dit à David: «J''en prends à témoin l''Eternel, le Dieu d''Israël, je chercherai à connaître les intentions de mon père demain ou après-demain. Dans le cas où il serait bien disposé vis-à-vis de toi, si je n''envoie pas quelqu''un vers toi pour t''en informer, '
  '13':
  - type: text
    content: 'que l''Eternel me traite avec la plus grande sévérité! Dans le cas où mon père trouverait bon de te faire du mal, je t''informerai aussi et je te laisserai partir, afin que tu t''en ailles en paix. Que l''Eternel soit avec toi comme il l''a été avec mon père! '
  '14':
  - type: text
    content: 'Si je reste en vie, veuille agir envers moi avec la bonté de l''Eternel, et si je meurs, '
  '15':
  - type: text
    content: 'ne retire jamais ta bonté envers ma famille, pas même lorsque l''Eternel supprimera chacun de tes ennemis de la surface de la terre. '
  '16':
  - type: text
    content: En effet, Jonathan a fait alliance avec la famille de David. Que l'Eternel se venge des ennemis de David!»
  '17':
  - type: text
    content: Jonathan fit encore prêter serment à David au nom de son amour pour lui, car il l'aimait comme lui-même.
  '18':
  - type: text
    content: 'Jonathan lui dit: «Demain, c''est le début du mois. On remarquera ton absence, car ta place sera vide. '
  '19':
  - type: text
    content: 'Tu descendras le troisième jour jusqu''à l''endroit où tu t''étais caché le jour où l''affaire a commencé, et tu resteras près de la pierre d''Ezel. '
  '2':
  - type: text
    content: 'Jonathan lui répondit: «Certainement pas, tu ne mourras pas. Mon père ne fait absolument rien sans m''en informer. Pourquoi donc me cacherait-il cela? Non, ce n''est pas le cas.» '
  '20':
  - type: text
    content: 'Je tirerai trois flèches du côté de la pierre, comme si je visais une cible. '
  '21':
  - type: text
    content: 'J''enverrai un jeune serviteur en lui disant: ‘Va retrouver les flèches.’ Si je lui dis: ‘Les flèches sont moins loin que toi, prends-les’, alors viens, car il y a paix pour toi et tu n''as rien à craindre, l''Eternel est vivant! '
  '22':
  - type: text
    content: 'Mais si je dis au jeune homme: ‘Les flèches sont plus loin que toi’, alors va-t''en, car l''Eternel te fait partir. '
  '23':
  - type: text
    content: L'Eternel est pour toujours témoin de la parole que nous nous sommes donnée l'un à l'autre.»
  '24':
  - type: text
    content: 'David se cacha dans les champs. C''était le début du mois et le roi prit place à table pour manger. '
  '25':
  - type: text
    content: 'Le roi s''assit à sa place habituelle contre la paroi, Jonathan en face et Abner à côté de Saül, mais la place de David resta vide. '
  '26':
  - type: text
    content: 'Saül ne dit rien ce jour-là, car il pensait: «C''est un accident, il n''est pas pur, certainement il n''est pas pur.»'
  '27':
  - type: text
    content: 'Le lendemain, deuxième jour du mois, la place de David était encore vide. Saül dit alors à son fils Jonathan: «Pourquoi le fils d''Isaï n''est-il pas venu au repas, ni hier ni aujourd''hui?» '
  '28':
  - type: text
    content: 'Jonathan répondit à Saül: «David m''a demandé la permission d''aller à Bethléhem. '
  '29':
  - type: text
    content: 'Il a dit: ‘Laisse-moi partir car nous avons dans la ville un sacrifice de famille, et mon frère m''a ordonné d''y assister. Si donc j''ai trouvé grâce à tes yeux, permets-moi de m''échapper pour aller voir mes frères.’ C''est pour cela qu''il n''est pas venu à la table du roi.» '
  '3':
  - type: text
    content: 'David répéta avec serment: «Ton père sait bien que j''ai trouvé grâce à tes yeux et il se sera dit: ‘Que Jonathan ne le sache pas, cela lui ferait de la peine.’ Mais l''Eternel est vivant et ton âme est vivante, il n''y a qu''un pas entre moi et la mort.»'
  '30':
  - type: text
    content: 'Alors la colère de Saül s''enflamma contre Jonathan et il lui dit: «Fils d''une femme perverse et rebelle, je sais bien que tu as pris parti pour le fils d''Isaï, à ta honte et à celle de ta mère. '
  '31':
  - type: text
    content: 'Aussi longtemps que le fils d''Isaï sera en vie sur la terre, il n''y aura pas de sécurité, ni pour toi ni pour ta royauté. Maintenant, envoie-le chercher et qu''on me l''amène, car il mérite la mort.» '
  '32':
  - type: text
    content: 'Jonathan répondit à son père Saül: «Pourquoi le faire mourir? Qu''a-t-il fait?» '
  '33':
  - type: text
    content: 'Saül dirigea alors sa lance contre lui pour le frapper. Jonathan comprit que son père était décidé à faire mourir David. '
  '34':
  - type: text
    content: Il se leva de table dans une ardente colère et ne participa pas au repas le deuxième jour du mois. Il était en effet dans la tristesse à cause de David, parce que son père l'avait insulté.
  '35':
  - type: text
    content: 'Le lendemain matin, Jonathan se rendit dans les champs à l''endroit convenu avec David, accompagné d''un jeune serviteur. '
  '36':
  - type: text
    content: 'Il lui dit: «Cours retrouver les flèches que je vais tirer.» Le serviteur courut et Jonathan tira une flèche qui le dépassa. '
  '37':
  - type: text
    content: 'Lorsque le garçon arriva à l''endroit où se trouvait la flèche qu''il avait tirée, Jonathan cria derrière lui: «La flèche n''est-elle pas plus loin que toi?» '
  '38':
  - type: text
    content: 'Il lui cria encore: «Vite, dépêche-toi, ne t''arrête pas!» Le serviteur de Jonathan ramassa les flèches et revint vers son maître. '
  '39':
  - type: text
    content: 'Le garçon ne savait rien, Jonathan et David étaient les seuls à connaître la situation. '
  '4':
  - type: text
    content: 'Jonathan dit à David: «Je ferai pour toi ce que tu voudras.» '
  '40':
  - type: text
    content: 'Jonathan remit ses armes à son serviteur en lui disant: «Va les porter en ville.» '
  '41':
  - type: text
    content: 'Après le départ du garçon, David se leva du côté du sud, puis il se jeta le visage contre terre et se prosterna trois fois. Les deux amis s''embrassèrent et pleurèrent ensemble, en particulier David. '
  '42':
  - type: text
    content: 'Jonathan dit à David: «Va en paix, maintenant que nous avons l''un et l''autre prêté serment au nom de l''Eternel en disant: ‘Que l''Eternel soit pour toujours témoin entre toi et moi, entre ta descendance et ma descendance!’»'
  '5':
  - type: text
    content: 'David lui répondit: «Demain, c''est le début du mois et je devrais normalement manger à la table du roi. Laisse-moi partir. Je me cacherai dans les champs jusqu''au soir du troisième jour. '
  '6':
  - type: text
    content: 'Si ton père remarque mon absence, tu diras: ‘David m''a supplié de le laisser aller à Bethléhem, sa ville d''origine, parce qu''il y a un sacrifice annuel pour toute sa famille.’ '
  '7':
  - type: text
    content: 'S''il dit: ‘C''est bien’, ton serviteur alors n''a rien à craindre. Mais si la colère s''empare de lui, sache qu''il a décidé de me faire du mal. '
  '8':
  - type: text
    content: 'Montre donc ton attachement à ton serviteur, puisque tu as fait une alliance devant l''Eternel avec moi. Et si je suis coupable de quelque chose, enlève-moi toi-même la vie. En effet, pourquoi me conduirais-tu jusqu''à ton père?» '
  '9':
  - type: text
    content: 'Jonathan lui dit: «Sois bien certain que je t''informerai, si j''apprends que mon père a décidé de te faire du mal!» '
