document_id: GEN.6,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Construction de l'arche de Noé
  - type: text
    content: 'Lorsque les hommes eurent commencé à se multiplier à la surface de la terre et que des filles leur furent nées, '
  '10':
  - type: text
    content: 'Noé eut trois fils: Sem, Cham et Japhet.'
  '11':
  - type: text
    content: 'La terre était corrompue devant Dieu, elle était pleine de violence. '
  '12':
  - type: text
    content: 'Dieu regarda la terre et constata qu''elle était corrompue, car tout le monde avait corrompu sa conduite sur la terre. '
  '13':
  - type: text
    content: 'Alors Dieu dit à Noé: «La fin de tous les hommes est décidée devant moi, car ils ont rempli la terre de violence. Je vais les détruire avec la terre. '
  '14':
  - type: text
    content: 'Fais-toi un bateau avec des arbres résineux. Tu disposeras cette arche en compartiments et tu l''enduiras de poix dedans et dehors. '
  '15':
  - type: text
    content: 'Voici comment tu la feras: l''arche aura 150 mètres de long, 25 de large et 15 de haut. '
  '16':
  - type: text
    content: 'Tu feras une ouverture à l''arche et tu la feras d''une cinquantaine de centimètres depuis le haut. Tu placeras une porte sur le côté de l''arche. Tu construiras un étage inférieur, un deuxième et un troisième étages. '
  '17':
  - type: text
    content: 'Pour ma part, je vais faire venir le déluge d''eau sur la terre pour détruire toute créature qui a souffle de vie sous le ciel. Tout ce qui est sur la terre mourra. '
  '18':
  - type: text
    content: 'Cependant, j''établis mon alliance avec toi: tu entreras dans l''arche avec tes fils, ta femme et les femmes de tes fils. '
  '19':
  - type: text
    content: 'De tout ce qui vit, de toute créature, tu feras entrer dans l''arche deux membres de chaque espèce pour leur conserver la vie avec toi. Il y aura un mâle et une femelle. '
  '2':
  - type: text
    content: 'les fils de Dieu virent que les filles des hommes étaient belles et ils en prirent pour femmes parmi toutes celles qu''ils choisirent. '
  '20':
  - type: text
    content: 'Des oiseaux selon leur espèce, du bétail selon son espèce et de tous les reptiles de la terre selon leur espèce, deux membres de chaque espèce viendront vers toi pour que tu leur conserves la vie. '
  '21':
  - type: text
    content: Quant à toi, prends de tous les aliments que l'on mange et fais-t'en une provision afin qu'ils vous servent de nourriture, à toi et à eux.»
  '22':
  - type: text
    content: 'C''est ce que fit Noé: il se conforma à tous les ordres que Dieu lui avait donnés.'
  '3':
  - type: text
    content: 'Alors l''Eternel dit: «Mon Esprit ne contestera pas toujours avec l''homme, car l''homme n''est que chair. Il vivra 120 ans.»'
  '4':
  - type: text
    content: Il y avait des géants sur la terre à cette époque-là. Ce fut aussi le cas après que les fils de Dieu se furent unis aux filles des hommes et qu'elles leur eurent donné des enfants. C'étaient les célèbres héros de l'Antiquité.
  '5':
  - type: text
    content: 'L''Eternel vit que les hommes commettaient beaucoup de mal sur la terre et que toutes les pensées de leur cœur se portaient constamment et uniquement vers le mal. '
  '6':
  - type: text
    content: 'L''Eternel regretta d''avoir fait l''homme sur la terre et eut le cœur peiné. '
  '7':
  - type: text
    content: 'L''Eternel dit: «J''exterminerai de la surface de la terre l''homme que j''ai créé, depuis l''homme jusqu''au bétail, aux reptiles et aux oiseaux, car je regrette de les avoir faits.»'
  '8':
  - type: text
    content: 'Cependant, Noé trouva grâce aux yeux de l''Eternel. '
  '9':
  - type: text
    content: 'Voici l''histoire de Noé. C''était un homme juste et intègre dans sa génération, un homme qui marchait avec Dieu. '
