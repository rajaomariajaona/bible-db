document_id: GEN.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Construction de l'arche de Noé
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque les hommes eurent commencé à se multiplier à la surface de la terre et que des filles leur furent nées, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'les fils de Dieu virent que les filles des hommes étaient belles et ils en prirent pour femmes parmi toutes celles qu''ils choisirent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors l''Eternel dit: «Mon Esprit ne contestera pas toujours avec l''homme, car l''homme n''est que chair. Il vivra 120 ans.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il y avait des géants sur la terre à cette époque-là. Ce fut aussi le cas après que les fils de Dieu se furent unis aux filles des hommes et qu'elles leur eurent donné des enfants. C'étaient les célèbres héros de l'Antiquité.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L''Eternel vit que les hommes commettaient beaucoup de mal sur la terre et que toutes les pensées de leur cœur se portaient constamment et uniquement vers le mal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L''Eternel regretta d''avoir fait l''homme sur la terre et eut le cœur peiné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L''Eternel dit: «J''exterminerai de la surface de la terre l''homme que j''ai créé, depuis l''homme jusqu''au bétail, aux reptiles et aux oiseaux, car je regrette de les avoir faits.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Cependant, Noé trouva grâce aux yeux de l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Voici l''histoire de Noé. C''était un homme juste et intègre dans sa génération, un homme qui marchait avec Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Noé eut trois fils: Sem, Cham et Japhet.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'La terre était corrompue devant Dieu, elle était pleine de violence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dieu regarda la terre et constata qu''elle était corrompue, car tout le monde avait corrompu sa conduite sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors Dieu dit à Noé: «La fin de tous les hommes est décidée devant moi, car ils ont rempli la terre de violence. Je vais les détruire avec la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Fais-toi un bateau avec des arbres résineux. Tu disposeras cette arche en compartiments et tu l''enduiras de poix dedans et dehors. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Voici comment tu la feras: l''arche aura 150 mètres de long, 25 de large et 15 de haut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tu feras une ouverture à l''arche et tu la feras d''une cinquantaine de centimètres depuis le haut. Tu placeras une porte sur le côté de l''arche. Tu construiras un étage inférieur, un deuxième et un troisième étages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Pour ma part, je vais faire venir le déluge d''eau sur la terre pour détruire toute créature qui a souffle de vie sous le ciel. Tout ce qui est sur la terre mourra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Cependant, j''établis mon alliance avec toi: tu entreras dans l''arche avec tes fils, ta femme et les femmes de tes fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'De tout ce qui vit, de toute créature, tu feras entrer dans l''arche deux membres de chaque espèce pour leur conserver la vie avec toi. Il y aura un mâle et une femelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Des oiseaux selon leur espèce, du bétail selon son espèce et de tous les reptiles de la terre selon leur espèce, deux membres de chaque espèce viendront vers toi pour que tu leur conserves la vie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Quant à toi, prends de tous les aliments que l'on mange et fais-t'en une provision afin qu'ils vous servent de nourriture, à toi et à eux.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'C''est ce que fit Noé: il se conforma à tous les ordres que Dieu lui avait donnés.'
