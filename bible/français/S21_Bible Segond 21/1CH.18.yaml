document_id: 1CH.18,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prospérité de David
  - type: text
    content: Après cela, David battit les Philistins et les humilia, et il leur prit Gath et les villes qui en dépendent.
  '10':
  - type: text
    content: 'et il envoya son fils Hadoram vers le roi David pour le saluer et pour le féliciter d''avoir attaqué Hadarézer et de l''avoir battu. En effet, Thohu était en guerre contre Hadarézer. Il envoya aussi toutes sortes d''objets en or, en argent et en bronze. '
  '11':
  - type: text
    content: 'Le roi David les consacra à l''Eternel, comme il l''avait déjà fait pour l''argent et l''or pris à toutes les nations: Edom, Moab, les Ammonites, les Philistins et Amalek.'
  '12':
  - type: text
    content: 'Abishaï, fils de Tseruja, battit 18''000 Edomites dans la vallée du sel. '
  '13':
  - type: text
    content: Il établit des garnisons dans Edom, et Edom tout entier fut asservi à David. L'Eternel protégeait David partout où il allait.
  '14':
  - type: text
    content: 'David régna sur tout Israël, et il faisait droit et justice à tout son peuple. '
  '15':
  - type: text
    content: 'Joab, fils de Tseruja, commandait l''armée; Josaphat, fils d''Achilud, était archiviste; '
  '16':
  - type: text
    content: 'Tsadok, fils d''Achithub, et Achimélec, fils d''Abiathar, étaient prêtres; Shavsha était secrétaire; '
  '17':
  - type: text
    content: Benaja, fils de Jehojada, était le chef des Kéréthiens et des Péléthiens; et les fils de David étaient les principaux ministres du roi.
  '2':
  - type: text
    content: Il battit les Moabites, qui lui furent asservis et lui payèrent un tribut.
  '3':
  - type: text
    content: 'David battit Hadarézer, roi de Tsoba, vers Hamath, lorsqu''il alla établir sa domination sur l''Euphrate. '
  '4':
  - type: text
    content: David lui prit 1000 chars, 7000 cavaliers et 20'000 fantassins; il mutila les jarrets de tous les chevaux de trait pour ne conserver que 100 attelages.
  '5':
  - type: text
    content: 'Les Syriens de Damas vinrent au secours d''Hadarézer, le roi de Tsoba, et David battit 22''000 d''entre eux. '
  '6':
  - type: text
    content: 'David posta des garnisons chez les Syriens de Damas. Les Syriens furent asservis à David et lui payèrent un tribut. L''Eternel protégeait David partout où il allait. '
  '7':
  - type: text
    content: 'David prit les boucliers en or que portaient les serviteurs d''Hadarézer et les amena à Jérusalem. '
  '8':
  - type: text
    content: David prit encore une grande quantité de bronze à Thibchath et à Cun, villes qui appartenaient à Hadarézer. Salomon l'utilisa pour fabriquer la cuve en bronze ainsi que les colonnes et les ustensiles en bronze.
  '9':
  - type: text
    content: 'Thohu, le roi de Hamath, apprit que David avait battu toute l''armée d''Hadarézer, roi de Tsoba, '
