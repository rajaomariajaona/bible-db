document_id: EZK.16,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jérusalem comparée à une prostituée
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l''Eternel m''a été adressée: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je t''ai habillée avec des vêtements brodés et chaussée avec du cuir fin; je t''ai mis un bandeau de fin lin et je t''ai drapée de soie. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je t''ai parée de bijoux: j''ai mis des bracelets à tes poignets, un collier à ton cou, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'un anneau à ton nez, des boucles à tes oreilles et une couronne magnifique sur ta tête. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, tu étais parée d''or et d''argent et tu étais habillée de fin lin, de soie et d''étoffes brodées. Tu te nourrissais de fleur de farine, de miel et d''huile. Tu étais devenue extrêmement belle et tu as prospéré au point de devenir un royaume. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On a commencé à parler de toi parmi les nations, à cause de ta beauté. En effet, elle était parfaite grâce à la splendeur dont je t'avais ornée, déclare le Seigneur, l'Eternel.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Cependant, tu as placé ta confiance dans ta beauté et tu t''es appuyée sur ta réputation pour te prostituer. Tu as entraîné tous les passants à se prostituer avec toi, tu as été à eux. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu as pris de tes habits, tu t''es fait des hauts lieux riches en couleurs et tu t''y es prostituée: rien de pareil n''était arrivé et n''arrivera jamais. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu as pris les bijoux qui composaient ta parure, tu as pris de mon or et de mon argent, ceux que je t''avais donnés, et tu en as fait des statues d''hommes avec lesquelles tu t''es prostituée. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu as retiré tes vêtements brodés pour les en recouvrir, et c''est mon huile et mon encens que tu leur as offerts. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le pain que je t''avais donné, la fleur de farine, l''huile et le miel dont je te nourrissais, tu les as déposés devant elles pour leur offrir un parfum agréable. Voilà ce qui est arrivé, déclare le Seigneur, l''Eternel. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Fils de l''homme, fais connaître à Jérusalem ses pratiques abominables! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu as pris tes fils et tes filles, ceux que tu m''avais donnés, et tu les leur as sacrifiés pour qu''elles les dévorent. Tes prostitutions n''étaient-elles pas suffisantes? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu as égorgé mes fils et tu les leur as donnés en les faisant passer par le feu en leur honneur. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Au milieu de toutes tes pratiques abominables et de tes prostitutions, tu ne t'es pas souvenue de l'époque de ton enfance, du moment où tu étais nue, entièrement nue, et te débattais dans ton sang.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»En plus de tout ce mal que tu as commis – malheur, malheur à toi, déclare le Seigneur, l''Eternel – '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tu t''es construit des centres de prostitution, tu t''es fait des estrades sur toutes les places. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A l''entrée de chaque chemin, tu as construit tes estrades, tu as déshonoré ta beauté, tu as écarté les jambes pour tous les passants, tu as multiplié tes prostitutions. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu t''es prostituée aux Egyptiens, tes voisins au corps athlétique, et tu as multiplié tes prostitutions, ce qui m''a irrité. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors j''ai déployé ma puissance contre toi: j''ai diminué ce qui devait te revenir, je t''ai livrée à tes ennemies, les filles des Philistins, qui rougissaient de ta conduite scandaleuse. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu t''es prostituée aux Assyriens parce que tu n''étais pas rassasiée; tu t''es prostituée à eux, mais tu n''étais toujours pas rassasiée. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu as multiplié tes prostitutions avec le pays de Canaan et jusqu''en Babylonie, mais même ainsi tu n''as toujours pas été rassasiée. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu diras: Voici ce que dit le Seigneur, l''Eternel, à Jérusalem: Par ton origine et ta naissance, tu es du pays de Canaan. Ton père était un Amoréen, et ta mère une Hittite. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelle faiblesse de cœur tu as révélée, déclare le Seigneur, l''Eternel, en commettant tous ces actes qui sont l''œuvre d''une experte en prostitution! '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque tu construisais tes centres de prostitution à l''entrée de chaque chemin, lorsque tu faisais tes estrades sur toutes les places, tu ne t''es pas conduite comme la prostituée qui, elle, réclame un salaire: '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tu as été la femme adultère qui reçoit des étrangers au lieu de son mari. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A toutes les prostituées on paie un salaire, mais toi, tu as offert des présents à tous tes amants; tu leur as donné des cadeaux afin qu''ils viennent de partout vers toi pour coucher avec toi. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu as eu un comportement contraire à celui des autres prostituées; on ne te recherchait pas pour coucher avec toi et, en versant un salaire au lieu d'en recevoir un, tu as été le contraire des autres.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»C''est pourquoi, prostituée, écoute la parole de l''Eternel! '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que dit le Seigneur, l''Eternel: Parce que tes trésors ont été gaspillés et que tu t''es montrée entièrement nue au cours de tes prostitutions avec tes amants et avec toutes tes abominables idoles, et parce que tu leur as donné le sang de tes enfants, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'je vais rassembler tous tes amants, ceux avec lesquels tu te plaisais, tous ceux que tu as aimés et tous ceux que tu as détestés. Je les rassemblerai de partout contre toi, je te montrerai à eux entièrement nue et ils te verront toute nue. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je te jugerai comme on juge les femmes adultères et celles qui versent le sang, et je ferai de toi une victime ensanglantée par la fureur et la jalousie. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je te livrerai entre leurs mains. Ils démoliront tes centres de prostitution et abattront tes estrades. Ils te dépouilleront de tes habits, prendront les bijoux qui composaient ta parure et te laisseront nue, entièrement nue. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A ta naissance, le jour où tu es née, ton cordon ombilical n''a pas été coupé, tu n''as pas été lavée dans l''eau pour être purifiée, ni frottée avec du sel, ni enveloppée dans des langes. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils exciteront la foule contre toi, ils te lapideront et te transperceront à coups d''épée. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils incendieront tes maisons et mettront des jugements en œuvre contre toi, en présence d''un grand nombre de femmes. Ainsi, je ferai cesser ta prostitution et tu ne verseras plus de salaire. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''assouvirai ma fureur contre toi, puis le feu de ma jalousie se détournera de toi: je m''apaiserai, je ne serai plus irrité. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Parce que tu ne t'es pas souvenue de l'époque de ton enfance, parce que tu m'as provoqué par tout cela, eh bien, de mon côté, je vais faire retomber ta conduite sur ta tête, déclare le Seigneur, l'Eternel, et tu ne créeras plus de scandale avec toutes tes pratiques abominables.
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Tous ceux qui disent des proverbes t''appliqueront ce proverbe: ‘Telle mère, telle fille!’ '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu es bien la fille de ta mère, elle qui n''a eu que dégoût pour son mari et ses enfants; tu es bien la sœur de tes sœurs, elles qui ont pris en dégoût leur mari et leurs enfants. Votre mère était une Hittite, et votre père un Amoréen. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ta grande sœur, qui habite à ta gauche, c''est Samarie avec ses filles; et ta petite sœur, qui habite à ta droite, c''est Sodome avec ses filles. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu ne t''es pas contentée d''imiter leur conduite et de commettre les mêmes actes abominables: c''était trop peu! Tu t''es montrée plus pervertie qu''elles dans toute ta conduite. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aussi vrai que je suis vivant, déclare le Seigneur, l''Eternel, ta sœur Sodome et ses filles n''ont pas fait ce que vous avez fait, toi et tes filles. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici quelle a été la faute de ta sœur Sodome: elle avait de l''orgueil, elle vivait dans l''abondance et dans une tranquille insouciance, elle et ses filles, et elle n''a pas soutenu la main du malheureux et du pauvre. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Personne n'a porté sur toi un regard de pitié pour te faire une seule de ces choses, par compassion pour toi. Au contraire, tu as été jetée dans les champs, le jour de ta naissance, parce que tu provoquais le dégoût.
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elles sont devenues arrogantes et elles ont commis des actes abominables devant moi. Je les ai fait disparaître, quand j''ai vu cela. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samarie n''a pas commis la moitié de tes péchés: tes pratiques abominables ont été plus nombreuses que les siennes. Avec toutes les pratiques abominables auxquelles tu t''es adonnée, tu as même fait paraître tes sœurs justes. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Supporte ton humiliation, toi qui es intervenue en faveur de tes sœurs par tes péchés, qui t''es montrée plus abominable qu''elles et qui les fais paraître plus justes que toi! Sois dans la honte et supporte ton humiliation, puisque tu as fait paraître tes sœurs justes! '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je changerai leur sort – celui de Sodome et de ses filles, ainsi que celui de Samarie et de ses filles – et je changerai ton sort au milieu d''elles, '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de telle façon que tu aies à supporter ton humiliation et rougisses de tout ce que tu as fait, ce qui les consolera. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tes sœurs, Sodome et ses filles, retrouveront leur situation d''avant; Samarie et ses filles retrouveront leur situation d''avant; toi et tes filles aussi, vous retrouverez votre situation d''avant. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu ne mentionnais même pas ta sœur Sodome, à l''époque où tu étais orgueilleuse, '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'avant que ta méchanceté ne soit dévoilée. Comme elle, c''est le moment de recevoir les insultes des filles de la Syrie et des environs, des filles des Philistins, de celles qui tout autour te méprisent. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu dois supporter les conséquences de tes actes scandaleux et de tes pratiques abominables, déclare l'Eternel.
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»En effet, voici ce que dit le Seigneur, l''Eternel: J''agirai envers toi comme tu as agi, toi qui as ignoré ton engagement en violant l''alliance. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Je suis passé près de toi, et je t''ai aperçue en train de te débattre dans ton sang. Alors je t''ai dit: ‘Vis dans ton sang!’ Je t''ai dit: ‘Vis dans ton sang!’ '
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant à moi, je me souviendrai de mon alliance, conclue avec toi à l''époque de ton enfance, et j''établirai pour toi une alliance éternelle. '
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu te souviendras de ta conduite et tu en éprouveras un sentiment d''humiliation quand tu recevras tes sœurs, les grandes comme les petites. Je te les donnerai pour filles, mais pas sur la base de ton alliance. '
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''établirai moi-même mon alliance avec toi, et tu reconnaîtras que je suis l''Eternel. '
  '63':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi, quand je t'aurai pardonné tout ce que tu as fait, tu te souviendras du passé, tu en auras honte et tu n'ouvriras plus la bouche à cause de ton humiliation, déclare le Seigneur, l'Eternel.»
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je t''ai multipliée à l''infini, comme l''herbe des champs. Tu t''es développée, tu as grandi, et tu es devenue très jolie; tes seins se sont formés et tes cheveux ont poussé, mais tu restais nue, entièrement nue. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je suis passé près de toi et je t''ai regardée: tu étais en âge d''aimer. J''ai étendu sur toi le pan de mon habit, j''ai couvert ta nudité et je me suis engagé envers toi. Je suis entré dans une relation d''alliance avec toi, déclare le Seigneur, l''Eternel, et tu as été à moi.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Je t''ai lavée dans l''eau, j''ai fait disparaître le sang qui était sur toi et je t''ai parfumée avec de l''huile. '
