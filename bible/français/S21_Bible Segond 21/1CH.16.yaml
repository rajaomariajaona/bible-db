document_id: 1CH.16,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Organisation du service du tabernacle
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Une fois qu''on eut amené l''arche de Dieu, on la plaça au milieu de la tente que David avait dressée pour elle et l''on offrit des holocaustes et des sacrifices de communion devant Dieu. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Placez votre fierté dans son saint nom!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le cœur de ceux qui cherchent l'Eternel se réjouisse!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ayez recours à l'Eternel et à sa force,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: recherchez constamment sa présence!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: »Souvenez-vous des merveilles qu'il a accomplies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de ses miracles et de ses jugements,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: descendants d'Israël, son serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: enfants de Jacob, qu'il a choisis!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: »L'Eternel est notre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses jugements s'exercent sur toute la terre.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Rappelez-vous toujours son alliance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: son mot d'ordre pour 1000 générations,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: le pacte qu'il a traité avec Abraham,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le serment qu'il a fait à Isaac.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Il l'a érigé en prescription pour Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en alliance éternelle pour Israël,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'quand il a dit: ‘Je te donnerai le pays de Canaan,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est l'héritage qui vous est attribué.’
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: »Ils étaient alors peu nombreux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: très peu nombreux, et étrangers dans le pays,
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Quand il eut fini d''offrir les holocaustes et les sacrifices de communion, David bénit le peuple au nom de l''Eternel. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ils erraient d'une nation à l'autre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et d'un royaume vers un autre peuple,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: mais il n'a laissé personne les opprimer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et il a puni des rois à cause d''eux:'
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ‘Ne touchez pas à ceux que j'ai désignés par onction
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne faites pas de mal à mes prophètes!’
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: »Chantez en l'honneur de l'Eternel, habitants de toute la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: annoncez de jour en jour son salut!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Racontez sa gloire parmi les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses merveilles parmi tous les peuples!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: »Oui, l'Eternel est grand et digne de recevoir toute louange,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est redoutable, plus que tous les dieux;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: en effet, tous les dieux des peuples ne sont que des faux dieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors que l'Eternel a fait le ciel.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: La splendeur et la magnificence sont devant lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la force et la joie remplissent sa résidence.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: »Familles des peuples, rendez à l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rendez à l'Eternel gloire et honneur!
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Rendez à l'Eternel la gloire due à son nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: apportez-lui des offrandes et venez en sa présence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: prosternez-vous devant l'Eternel avec des ornements sacrés!
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Puis il distribua à tous les Israélites, hommes et femmes confondus, à chacun un pain, une portion de viande et un gâteau aux raisins.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Tremblez devant lui, habitants de toute la terre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le monde est ferme, il n'est pas ébranlé.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: »Que le ciel se réjouisse, que la terre soit dans l'allégresse!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Que l''on dise parmi les nations: ‘L''Eternel règne.’'
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Que la mer retentisse avec tout ce qu'elle contient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que la campagne et tout ce qui s'y trouve soient en fête,
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: que les arbres des forêts poussent des cris de joie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: devant l'Eternel, car il vient pour juger la terre.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: »Célébrez l'Eternel, car il est bon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, sa bonté dure éternellement!
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Dites: ‘Sauve-nous, toi le Dieu qui es notre Sauveur,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rassemble-nous et retire-nous du milieu des nations!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi nous célébrerons ton saint nom
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et nous mettrons notre gloire à te louer.’
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: »Béni soit l'Eternel, le Dieu d'Israël, d'éternité en éternité!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et tout le peuple dit: ‘Amen! Louez l''Eternel!’»'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.8-36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Texte quasi identique aux '
      - type: text
        text: 'Psaumes 105.1-15; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '96'
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 106.47-48
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'David laissa Asaph et ses frères là, devant l''arche de l''alliance de l''Eternel, afin qu''ils effectuent le service régulier devant l''arche, suivant les exigences de chaque jour. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Il désigna Obed-Edom, fils de Jeduthun, et Hosa ainsi que leurs 68 frères comme portiers.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Il chargea le prêtre Tsadok et ses frères prêtres de servir devant le tabernacle de l''Eternel, sur le haut lieu qui se trouvait à Gabaon. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il confia à des Lévites la responsabilité de faire le service devant l''arche de l''Eternel, de rappeler le souvenir de l''Eternel, le Dieu d''Israël, de le louer et le célébrer. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Ils devaient constamment, matin et soir, offrir à l''Eternel des holocaustes sur l''autel des holocaustes, en respectant tout ce qui est écrit dans la loi de l''Eternel, prescrite par lui à Israël. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Avec eux se trouvaient Héman, Jeduthun et les autres, ceux qui avaient été choisis, nommément désignés, pour louer l''Eternel, car sa bonté dure éternellement. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Héman et Jeduthun avaient la charge des trompettes et des cymbales à faire retentir, ainsi que des instruments pour les chants en l'honneur de Dieu. Quant aux fils de Jeduthun, ils étaient portiers.
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Tout le peuple repartit, chacun chez soi, et David retourna chez lui pour bénir sa famille.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'C''étaient Asaph, le chef, Zacharie, son second, Jeïel, Shemiramoth, Jehiel, Matthithia, Eliab, Benaja, Obed-Edom et Jeïel. Ils avaient des instruments de musique, des luths et des harpes, et Asaph faisait retentir les cymbales. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Les prêtres Benaja et Jachaziel sonnaient continuellement de la trompette devant l''arche de l''alliance de Dieu. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: C'est ce jour-là que David chargea pour la première fois Asaph et ses frères de célébrer les louanges de l'Eternel.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: «Louez l'Eternel, faites appel à son nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: faites connaître ses hauts faits parmi les peuples!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Chantez en son honneur, jouez de vos instruments en son honneur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: célébrez toutes ses merveilles!
