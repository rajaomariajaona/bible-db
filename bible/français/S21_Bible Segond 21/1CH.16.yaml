document_id: 1CH.16,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Organisation du service du tabernacle
  - type: text
    content: 'Une fois qu''on eut amené l''arche de Dieu, on la plaça au milieu de la tente que David avait dressée pour elle et l''on offrit des holocaustes et des sacrifices de communion devant Dieu. '
  '10':
  - type: text
    content: Placez votre fierté dans son saint nom!
  - type: text
    content: Que le cœur de ceux qui cherchent l'Eternel se réjouisse!
  '11':
  - type: text
    content: Ayez recours à l'Eternel et à sa force,
  - type: text
    content: recherchez constamment sa présence!
  '12':
  - type: text
    content: »Souvenez-vous des merveilles qu'il a accomplies,
  - type: text
    content: de ses miracles et de ses jugements,
  '13':
  - type: text
    content: descendants d'Israël, son serviteur,
  - type: text
    content: enfants de Jacob, qu'il a choisis!
  '14':
  - type: text
    content: »L'Eternel est notre Dieu,
  - type: text
    content: ses jugements s'exercent sur toute la terre.
  '15':
  - type: text
    content: Rappelez-vous toujours son alliance,
  - type: text
    content: son mot d'ordre pour 1000 générations,
  '16':
  - type: text
    content: le pacte qu'il a traité avec Abraham,
  - type: text
    content: le serment qu'il a fait à Isaac.
  '17':
  - type: text
    content: Il l'a érigé en prescription pour Jacob,
  - type: text
    content: en alliance éternelle pour Israël,
  '18':
  - type: text
    content: 'quand il a dit: ‘Je te donnerai le pays de Canaan,'
  - type: text
    content: c'est l'héritage qui vous est attribué.’
  '19':
  - type: text
    content: »Ils étaient alors peu nombreux,
  - type: text
    content: très peu nombreux, et étrangers dans le pays,
  '2':
  - type: text
    content: 'Quand il eut fini d''offrir les holocaustes et les sacrifices de communion, David bénit le peuple au nom de l''Eternel. '
  '20':
  - type: text
    content: ils erraient d'une nation à l'autre
  - type: text
    content: et d'un royaume vers un autre peuple,
  '21':
  - type: text
    content: mais il n'a laissé personne les opprimer,
  - type: text
    content: 'et il a puni des rois à cause d''eux:'
  '22':
  - type: text
    content: ‘Ne touchez pas à ceux que j'ai désignés par onction
  - type: text
    content: et ne faites pas de mal à mes prophètes!’
  '23':
  - type: text
    content: »Chantez en l'honneur de l'Eternel, habitants de toute la terre,
  - type: text
    content: annoncez de jour en jour son salut!
  '24':
  - type: text
    content: Racontez sa gloire parmi les nations,
  - type: text
    content: ses merveilles parmi tous les peuples!
  '25':
  - type: text
    content: »Oui, l'Eternel est grand et digne de recevoir toute louange,
  - type: text
    content: il est redoutable, plus que tous les dieux;
  '26':
  - type: text
    content: en effet, tous les dieux des peuples ne sont que des faux dieux,
  - type: text
    content: alors que l'Eternel a fait le ciel.
  '27':
  - type: text
    content: La splendeur et la magnificence sont devant lui,
  - type: text
    content: la force et la joie remplissent sa résidence.
  '28':
  - type: text
    content: »Familles des peuples, rendez à l'Eternel,
  - type: text
    content: rendez à l'Eternel gloire et honneur!
  '29':
  - type: text
    content: Rendez à l'Eternel la gloire due à son nom,
  - type: text
    content: apportez-lui des offrandes et venez en sa présence,
  - type: text
    content: prosternez-vous devant l'Eternel avec des ornements sacrés!
  '3':
  - type: text
    content: Puis il distribua à tous les Israélites, hommes et femmes confondus, à chacun un pain, une portion de viande et un gâteau aux raisins.
  '30':
  - type: text
    content: Tremblez devant lui, habitants de toute la terre!
  - type: text
    content: Le monde est ferme, il n'est pas ébranlé.
  '31':
  - type: text
    content: »Que le ciel se réjouisse, que la terre soit dans l'allégresse!
  - type: text
    content: 'Que l''on dise parmi les nations: ‘L''Eternel règne.’'
  '32':
  - type: text
    content: Que la mer retentisse avec tout ce qu'elle contient,
  - type: text
    content: que la campagne et tout ce qui s'y trouve soient en fête,
  '33':
  - type: text
    content: que les arbres des forêts poussent des cris de joie
  - type: text
    content: devant l'Eternel, car il vient pour juger la terre.
  '34':
  - type: text
    content: »Célébrez l'Eternel, car il est bon,
  - type: text
    content: oui, sa bonté dure éternellement!
  '35':
  - type: text
    content: 'Dites: ‘Sauve-nous, toi le Dieu qui es notre Sauveur,'
  - type: text
    content: rassemble-nous et retire-nous du milieu des nations!
  - type: text
    content: Ainsi nous célébrerons ton saint nom
  - type: text
    content: et nous mettrons notre gloire à te louer.’
  '36':
  - type: text
    content: »Béni soit l'Eternel, le Dieu d'Israël, d'éternité en éternité!
  - type: text
    content: 'Et tout le peuple dit: ‘Amen! Louez l''Eternel!’»'
  - type: note
    content: Texte quasi identique aux Psaumes 105.1-15; 96; 106.47-48.
  '37':
  - type: text
    content: 'David laissa Asaph et ses frères là, devant l''arche de l''alliance de l''Eternel, afin qu''ils effectuent le service régulier devant l''arche, suivant les exigences de chaque jour. '
  '38':
  - type: text
    content: Il désigna Obed-Edom, fils de Jeduthun, et Hosa ainsi que leurs 68 frères comme portiers.
  '39':
  - type: text
    content: 'Il chargea le prêtre Tsadok et ses frères prêtres de servir devant le tabernacle de l''Eternel, sur le haut lieu qui se trouvait à Gabaon. '
  '4':
  - type: text
    content: 'Il confia à des Lévites la responsabilité de faire le service devant l''arche de l''Eternel, de rappeler le souvenir de l''Eternel, le Dieu d''Israël, de le louer et le célébrer. '
  '40':
  - type: text
    content: 'Ils devaient constamment, matin et soir, offrir à l''Eternel des holocaustes sur l''autel des holocaustes, en respectant tout ce qui est écrit dans la loi de l''Eternel, prescrite par lui à Israël. '
  '41':
  - type: text
    content: 'Avec eux se trouvaient Héman, Jeduthun et les autres, ceux qui avaient été choisis, nommément désignés, pour louer l''Eternel, car sa bonté dure éternellement. '
  '42':
  - type: text
    content: Héman et Jeduthun avaient la charge des trompettes et des cymbales à faire retentir, ainsi que des instruments pour les chants en l'honneur de Dieu. Quant aux fils de Jeduthun, ils étaient portiers.
  '43':
  - type: text
    content: Tout le peuple repartit, chacun chez soi, et David retourna chez lui pour bénir sa famille.
  '5':
  - type: text
    content: 'C''étaient Asaph, le chef, Zacharie, son second, Jeïel, Shemiramoth, Jehiel, Matthithia, Eliab, Benaja, Obed-Edom et Jeïel. Ils avaient des instruments de musique, des luths et des harpes, et Asaph faisait retentir les cymbales. '
  '6':
  - type: text
    content: 'Les prêtres Benaja et Jachaziel sonnaient continuellement de la trompette devant l''arche de l''alliance de Dieu. '
  '7':
  - type: text
    content: C'est ce jour-là que David chargea pour la première fois Asaph et ses frères de célébrer les louanges de l'Eternel.
  '8':
  - type: text
    content: «Louez l'Eternel, faites appel à son nom,
  - type: text
    content: faites connaître ses hauts faits parmi les peuples!
  '9':
  - type: text
    content: Chantez en son honneur, jouez de vos instruments en son honneur,
  - type: text
    content: célébrez toutes ses merveilles!
