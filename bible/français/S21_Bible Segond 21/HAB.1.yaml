document_id: HAB.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Interrogations d'Habakuk
  - type: text
    content: Message dont le prophète Habakuk a eu la vision.
  '10':
  - type: text
    content: Il se moque des rois,
  - type: text
    content: et les princes sont l'objet de ses railleries.
  - type: text
    content: 'Il rit de toutes les forteresses:'
  - type: text
    content: il amoncelle de la terre et il les prend.
  '11':
  - type: text
    content: Alors il change d'avis
  - type: text
    content: et poursuit sa marche, et il se rend coupable.
  - type: text
    content: Sa force à lui, voilà son dieu!
  - type: heading
    content: Réponse d'Habakuk
  '12':
  - type: text
    content: N'es-tu pas depuis toujours,
  - type: text
    content: Eternel, mon Dieu, mon Saint?
  - type: text
    content: Nous ne mourrons pas!
  - type: text
    content: Eternel, tu as établi ce peuple pour exercer tes jugements.
  - type: text
    content: Mon rocher, tu l'as appelé pour infliger tes punitions.
  '13':
  - type: text
    content: Tes yeux sont trop purs pour voir le mal,
  - type: text
    content: et tu ne peux pas regarder la misère.
  - type: text
    content: Pourquoi regarderais-tu les traîtres? Pourquoi garderais-tu le silence
  - type: text
    content: quand le méchant dévore celui qui est plus juste que lui?
  '14':
  - type: text
    content: Traiterais-tu l'homme comme les poissons de la mer,
  - type: text
    content: comme le reptile qui n'a pas de maître?
  '15':
  - type: text
    content: Le Babylonien les fait tous monter avec l'hameçon,
  - type: text
    content: il les attire dans son filet,
  - type: text
    content: il les rassemble dans sa nasse.
  - type: text
    content: Alors il est dans la joie et dans l'allégresse.
  '16':
  - type: text
    content: C'est pourquoi il offre un sacrifice à son filet,
  - type: text
    content: il fait brûler de l'encens en l'honneur de sa nasse,
  - type: text
    content: car grâce à eux sa portion est grasse
  - type: text
    content: et sa nourriture succulente.
  '17':
  - type: text
    content: Va-t-il toujours vider son filet
  - type: text
    content: et égorger sans pitié les nations?
  '2':
  - type: text
    content: Jusqu'à quand, Eternel, vais-je crier à toi?
  - type: text
    content: Tu n'écoutes pas.
  - type: text
    content: J'ai crié vers toi pour dénoncer la violence,
  - type: text
    content: mais tu ne secours pas!
  '3':
  - type: text
    content: Pourquoi me fais-tu voir le mal
  - type: text
    content: et contemples-tu l'injustice?
  - type: text
    content: Pourquoi l'oppression et la violence sont-elles devant moi?
  - type: text
    content: Il y a des procès et des conflits partout.
  '4':
  - type: text
    content: Aussi, la loi est sans vie,
  - type: text
    content: le droit est sans force,
  - type: text
    content: car le méchant triomphe du juste
  - type: text
    content: et l'on rend des jugements corrompus.
  - type: heading
    content: 'Réponse de Dieu: le jugement de Juda'
  '5':
  - type: text
    content: '*Jetez les yeux parmi les nations, regardez'
  - type: text
    content: et soyez saisis d'étonnement, d'épouvante,
  - type: text
    content: car je vais faire à votre époque une œuvre
  - type: text
    content: que vous ne croiriez pas, si on la racontait.
  - type: note
    content: 'Jetez… racontait: cité par Paul en Actes 13.41.'
  '6':
  - type: text
    content: Je vais faire surgir les Babyloniens.
  - type: text
    content: C'est un peuple impitoyable et impétueux
  - type: text
    content: qui traverse de vastes étendues de pays
  - type: text
    content: pour s'emparer de demeures qui ne sont pas à lui.
  '7':
  - type: text
    content: Il est terrible et redoutable,
  - type: text
    content: il est la source de son droit et de sa grandeur.
  '8':
  - type: text
    content: Ses chevaux sont plus rapides que les léopards,
  - type: text
    content: plus agiles que les loups du soir.
  - type: text
    content: Ses cavaliers se déploient,
  - type: text
    content: ses cavaliers arrivent de loin,
  - type: text
    content: ils volent comme l'aigle qui fond sur sa proie.
  '9':
  - type: text
    content: Tout ce peuple vient pour se livrer au pillage,
  - type: text
    content: le visage tendu vers l'avant,
  - type: text
    content: et il rassemble des prisonniers comme du sable.
