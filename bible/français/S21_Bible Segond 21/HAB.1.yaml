document_id: HAB.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Interrogations d'Habakuk
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Message dont le prophète Habakuk a eu la vision.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Jusqu'à quand, Eternel, vais-je crier à toi?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu n'écoutes pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'ai crié vers toi pour dénoncer la violence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais tu ne secours pas!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Pourquoi me fais-tu voir le mal
- type: usfm
  marker: q1
  children:
  - type: text
    text: et contemples-tu l'injustice?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi l'oppression et la violence sont-elles devant moi?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il y a des procès et des conflits partout.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Aussi, la loi est sans vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le droit est sans force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car le méchant triomphe du juste
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'on rend des jugements corrompus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Réponse de Dieu: le jugement de Juda'
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '*Jetez les yeux parmi les nations, regardez'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et soyez saisis d'étonnement, d'épouvante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je vais faire à votre époque une œuvre
- type: usfm
  marker: q1
  children:
  - type: text
    text: que vous ne croiriez pas, si on la racontait.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jetez… racontait: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité par Paul en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Actes 13.41
      metadata:
        usfm: ACT.13.41
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Je vais faire surgir les Babyloniens.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est un peuple impitoyable et impétueux
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui traverse de vastes étendues de pays
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour s'emparer de demeures qui ne sont pas à lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il est terrible et redoutable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est la source de son droit et de sa grandeur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ses chevaux sont plus rapides que les léopards,
- type: usfm
  marker: q1
  children:
  - type: text
    text: plus agiles que les loups du soir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses cavaliers se déploient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses cavaliers arrivent de loin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils volent comme l'aigle qui fond sur sa proie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tout ce peuple vient pour se livrer au pillage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le visage tendu vers l'avant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il rassemble des prisonniers comme du sable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il se moque des rois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les princes sont l'objet de ses railleries.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il rit de toutes les forteresses:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il amoncelle de la terre et il les prend.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Alors il change d'avis
- type: usfm
  marker: q1
  children:
  - type: text
    text: et poursuit sa marche, et il se rend coupable.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa force à lui, voilà son dieu!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Réponse d'Habakuk
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: N'es-tu pas depuis toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, mon Dieu, mon Saint?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous ne mourrons pas!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, tu as établi ce peuple pour exercer tes jugements.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon rocher, tu l'as appelé pour infliger tes punitions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Tes yeux sont trop purs pour voir le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu ne peux pas regarder la misère.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi regarderais-tu les traîtres? Pourquoi garderais-tu le silence
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand le méchant dévore celui qui est plus juste que lui?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Traiterais-tu l'homme comme les poissons de la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme le reptile qui n'a pas de maître?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Le Babylonien les fait tous monter avec l'hameçon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il les attire dans son filet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il les rassemble dans sa nasse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors il est dans la joie et dans l'allégresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: C'est pourquoi il offre un sacrifice à son filet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il fait brûler de l'encens en l'honneur de sa nasse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car grâce à eux sa portion est grasse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa nourriture succulente.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Va-t-il toujours vider son filet
- type: usfm
  marker: q1
  children:
  - type: text
    text: et égorger sans pitié les nations?
