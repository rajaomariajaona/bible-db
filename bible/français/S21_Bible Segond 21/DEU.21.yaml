document_id: DEU.21,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Meurtres dont les auteurs sont inconnus
  - type: text
    content: '»Si, dans le pays dont l''Eternel, ton Dieu, te donne la possession, l''on trouve étendu au milieu d''un champ un homme mort, sans que l''on sache qui l''a tué, '
  '10':
  - type: text
    content: '»Lorsque tu iras à la guerre contre tes ennemis, si l''Eternel les livre entre tes mains et que tu fasses des prisonniers parmi eux, '
  '11':
  - type: text
    content: 'peut-être verras-tu parmi les prisonnières une belle femme et auras-tu le désir de l''épouser. '
  '12':
  - type: text
    content: 'Alors tu la conduiras à l''intérieur de ta maison. Elle se rasera la tête, se coupera les ongles '
  '13':
  - type: text
    content: 'et quittera les vêtements qu''elle portait quand elle a été faite prisonnière. Elle habitera chez toi et elle pleurera son père et sa mère pendant un mois. Après cela, tu t''uniras à elle, tu deviendras son mari et elle sera ta femme. '
  '14':
  - type: text
    content: Si elle cesse de te plaire, tu la laisseras aller où elle voudra. Tu ne pourras pas la vendre pour de l'argent ni la traiter comme une esclave, parce que tu l'auras humiliée.
  '15':
  - type: text
    content: '»Supposons qu''un homme, qui a deux femmes, aime l''une mais pas l''autre et qu''il ait des fils dont l''aîné soit de la femme qu''il n''aime pas. '
  '16':
  - type: text
    content: 'Quand il partagera son bien entre ses fils, il ne pourra pas reconnaître comme premier-né le fils de celle qu''il aime à la place du fils de celle qu''il n''aime pas et qui est vraiment l''aîné. '
  '17':
  - type: text
    content: Il reconnaîtra au contraire comme premier-né le fils de celle qu'il n'aime pas et il lui donnera une double portion de son bien, car ce fils est le premier de ses enfants. Le droit d'aînesse lui appartient.
  '18':
  - type: text
    content: '»Supposons qu''un homme ait un fils désobéissant et rebelle, qui n''écoute ni son père ni sa mère et ne leur obéisse pas, même après qu''ils l''ont puni. '
  '19':
  - type: text
    content: 'Le père et la mère le prendront et le conduiront vers les anciens de sa ville, à la porte de l''endroit qu''il habite. '
  '2':
  - type: text
    content: 'tes anciens et tes juges iront mesurer les distances à partir du cadavre jusqu''aux villes des environs. '
  '20':
  - type: text
    content: 'Ils diront aux anciens de sa ville: ‘Voici notre fils qui est désobéissant et rebelle, qui ne nous écoute pas et qui se livre à des excès et à l''ivrognerie.’ '
  '21':
  - type: text
    content: Tous les hommes de sa ville le lapideront, il sera puni de mort. Tu extirperas ainsi le mal du milieu de toi, afin que tous les Israélites en entendent parler et éprouvent de la crainte.
  - type: heading
    content: Instructions diverses
  '22':
  - type: text
    content: '»Si tu exécutes un homme qui a commis un crime digne de mort et que tu le pendes à une potence, '
  '23':
  - type: text
    content: son cadavre ne passera pas la nuit sur le bois. Tu l'enterreras le jour même, car *celui qui est pendu est maudit
  - type: note
    content: 'Celui… maudit: cité en Galates 3.13 en rapport avec Jésus.'
  - type: text
    content: ' de Dieu, et tu ne rendras pas impur le pays que l''Eternel, ton Dieu, te donne en héritage.'
  '3':
  - type: text
    content: Quand on aura déterminé quelle est la ville la plus proche du cadavre, les anciens de cette ville prendront une génisse qui n'ait jamais servi au travail ni été attelée avec un joug
  - type: note
    content: 'Joug: barre en bois posée sur la nuque des bêtes pour les atteler ensemble.'
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Ils la feront descendre vers un torrent qui n''arrête jamais de couler et où il n''y ait ni culture ni semence, et là, ils lui briseront la nuque, dans le torrent. '
  '5':
  - type: text
    content: 'Alors les prêtres, les descendants de Lévi, s''approcheront. En effet, l''Eternel, ton Dieu, les a choisis pour qu''ils le servent et bénissent au nom de l''Eternel, et ce sont eux qui doivent juger toute contestation et toute blessure. '
  '6':
  - type: text
    content: 'Tous les anciens de la ville la plus proche du cadavre laveront leurs mains sur la génisse à laquelle on a brisé la nuque dans le torrent. '
  '7':
  - type: text
    content: 'Prenant la parole, ils diront: ‘Nos mains n''ont pas versé ce sang et nos yeux ne l''ont pas vu verser. '
  '8':
  - type: text
    content: 'Pardonne, Eternel, à ton peuple, Israël, que tu as racheté. Ne charge pas ton peuple, Israël, de ce sang innocent.’ Alors ce sang ne sera pas porté à son compte. '
  '9':
  - type: text
    content: Ainsi, tu feras disparaître du milieu de toi le sang innocent en faisant ce qui est droit aux yeux de l'Eternel.
  - type: heading
    content: Règles pour la tenue de la famille
