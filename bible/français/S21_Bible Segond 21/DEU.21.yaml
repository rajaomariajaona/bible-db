document_id: DEU.21
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Meurtres dont les auteurs sont inconnus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Si, dans le pays dont l''Eternel, ton Dieu, te donne la possession, l''on trouve étendu au milieu d''un champ un homme mort, sans que l''on sache qui l''a tué, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'tes anciens et tes juges iront mesurer les distances à partir du cadavre jusqu''aux villes des environs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Quand on aura déterminé quelle est la ville la plus proche du cadavre, les anciens de cette ville prendront une génisse qui n'ait jamais servi au travail ni été attelée avec un joug
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Joug: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: barre en bois posée sur la nuque des bêtes pour les atteler ensemble.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils la feront descendre vers un torrent qui n''arrête jamais de couler et où il n''y ait ni culture ni semence, et là, ils lui briseront la nuque, dans le torrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors les prêtres, les descendants de Lévi, s''approcheront. En effet, l''Eternel, ton Dieu, les a choisis pour qu''ils le servent et bénissent au nom de l''Eternel, et ce sont eux qui doivent juger toute contestation et toute blessure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tous les anciens de la ville la plus proche du cadavre laveront leurs mains sur la génisse à laquelle on a brisé la nuque dans le torrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Prenant la parole, ils diront: ‘Nos mains n''ont pas versé ce sang et nos yeux ne l''ont pas vu verser. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Pardonne, Eternel, à ton peuple, Israël, que tu as racheté. Ne charge pas ton peuple, Israël, de ce sang innocent.’ Alors ce sang ne sera pas porté à son compte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ainsi, tu feras disparaître du milieu de toi le sang innocent en faisant ce qui est droit aux yeux de l'Eternel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règles pour la tenue de la famille
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '»Lorsque tu iras à la guerre contre tes ennemis, si l''Eternel les livre entre tes mains et que tu fasses des prisonniers parmi eux, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'peut-être verras-tu parmi les prisonnières une belle femme et auras-tu le désir de l''épouser. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Alors tu la conduiras à l''intérieur de ta maison. Elle se rasera la tête, se coupera les ongles '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'et quittera les vêtements qu''elle portait quand elle a été faite prisonnière. Elle habitera chez toi et elle pleurera son père et sa mère pendant un mois. Après cela, tu t''uniras à elle, tu deviendras son mari et elle sera ta femme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Si elle cesse de te plaire, tu la laisseras aller où elle voudra. Tu ne pourras pas la vendre pour de l'argent ni la traiter comme une esclave, parce que tu l'auras humiliée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '»Supposons qu''un homme, qui a deux femmes, aime l''une mais pas l''autre et qu''il ait des fils dont l''aîné soit de la femme qu''il n''aime pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Quand il partagera son bien entre ses fils, il ne pourra pas reconnaître comme premier-né le fils de celle qu''il aime à la place du fils de celle qu''il n''aime pas et qui est vraiment l''aîné. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il reconnaîtra au contraire comme premier-né le fils de celle qu'il n'aime pas et il lui donnera une double portion de son bien, car ce fils est le premier de ses enfants. Le droit d'aînesse lui appartient.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '»Supposons qu''un homme ait un fils désobéissant et rebelle, qui n''écoute ni son père ni sa mère et ne leur obéisse pas, même après qu''ils l''ont puni. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le père et la mère le prendront et le conduiront vers les anciens de sa ville, à la porte de l''endroit qu''il habite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ils diront aux anciens de sa ville: ‘Voici notre fils qui est désobéissant et rebelle, qui ne nous écoute pas et qui se livre à des excès et à l''ivrognerie.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tous les hommes de sa ville le lapideront, il sera puni de mort. Tu extirperas ainsi le mal du milieu de toi, afin que tous les Israélites en entendent parler et éprouvent de la crainte.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Instructions diverses
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '»Si tu exécutes un homme qui a commis un crime digne de mort et que tu le pendes à une potence, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: son cadavre ne passera pas la nuit sur le bois. Tu l'enterreras le jour même, car *celui qui est pendu est maudit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Celui… maudit: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Galates 3.13
      metadata:
        usfm: GAL.3.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' en rapport avec Jésus.'
    marker-yv: yv-n
  - type: text
    text: ' de Dieu, et tu ne rendras pas impur le pays que l''Eternel, ton Dieu, te donne en héritage.'
