document_id: PSA.87,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sion, la ville de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Psaume, chant des descendants de Koré.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La ville qu'il a fondée sur les montagnes saintes,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: la ville de Sion, l'Eternel l'aime
  - type: usfm
    marker: q1
    children:
    - type: text
      text: plus que toutes les demeures de Jacob.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: On a dit sur toi des choses glorieuses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ville de Dieu! '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Je mentionne l'Egypte et Babylone parmi ceux qui me connaissent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici le pays des Philistins, Tyr, ainsi que l''Ethiopie:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est là qu'ils sont nés.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Mais de Sion il est dit: «Tous y sont nés,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c'est le Très-Haut qui l'a fondée.»
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'L''Eternel compte en inscrivant les peuples:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '«C''est là qu''ils sont nés.» '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ceux qui chantent et ceux qui dansent s''écrient:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Toutes mes sources sont en toi.»
