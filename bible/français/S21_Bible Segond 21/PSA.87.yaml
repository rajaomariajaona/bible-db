document_id: PSA.87,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Sion, la ville de Dieu
  - type: text
    content: Psaume, chant des descendants de Koré.
  - type: text
    content: La ville qu'il a fondée sur les montagnes saintes,
  '2':
  - type: text
    content: la ville de Sion, l'Eternel l'aime
  - type: text
    content: plus que toutes les demeures de Jacob.
  '3':
  - type: text
    content: On a dit sur toi des choses glorieuses,
  - type: text
    content: 'ville de Dieu! '
  - type: text
    content: – Pause.
  '4':
  - type: text
    content: Je mentionne l'Egypte et Babylone parmi ceux qui me connaissent.
  - type: text
    content: 'Voici le pays des Philistins, Tyr, ainsi que l''Ethiopie:'
  - type: text
    content: c'est là qu'ils sont nés.
  '5':
  - type: text
    content: 'Mais de Sion il est dit: «Tous y sont nés,'
  - type: text
    content: et c'est le Très-Haut qui l'a fondée.»
  '6':
  - type: text
    content: 'L''Eternel compte en inscrivant les peuples:'
  - type: text
    content: '«C''est là qu''ils sont nés.» '
  - type: text
    content: – Pause.
  '7':
  - type: text
    content: 'Ceux qui chantent et ceux qui dansent s''écrient:'
  - type: text
    content: «Toutes mes sources sont en toi.»
