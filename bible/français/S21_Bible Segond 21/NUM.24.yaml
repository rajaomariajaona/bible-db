document_id: NUM.24,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Balaam vit qu''il plaisait à l''Eternel de bénir Israël et il n''alla pas, comme les autres fois, à la rencontre de pratiques magiques. En revanche, il se tourna du côté du désert. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La colère de Balak s''enflamma contre Balaam. Il frappa des mains et dit à Balaam: «C''est pour maudire mes ennemis que je t''ai appelé et voici que tu les as bénis déjà trois fois. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fuis maintenant, va-t''en chez toi! J''avais dit que je te rendrais des honneurs, mais l''Eternel t''empêche de les recevoir.» '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Balaam répondit à Balak: «Eh! N''ai-je pas dit aux messagers que tu m''as envoyés: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘Même si Balak me donnait sa maison pleine d''argent et d''or, je ne pourrais faire de moi-même ni bien ni mal qui enfreigne l''ordre de l''Eternel. Je répéterai ce que dira l''Eternel’? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Maintenant, je retourne vers mon peuple. Viens, je vais t'annoncer ce que ce peuple fera au tien dans l'avenir.»
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Balaam prononça son oracle: «Déclaration de Balaam, fils de Beor, déclaration de l''homme qui a l''œil ouvert, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: déclaration de celui qui entend les paroles de Dieu, de celui qui possède la connaissance du Très-Haut, de celui qui discerne la vision du Tout-Puissant, de celui qui se prosterne et dont les yeux s'ouvrent.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Je le vois, mais non pour maintenant, je le contemple, mais non de près: un astre sort de Jacob, un sceptre s''élève d''Israël. Il transperce les flancs de Moab et renverse tous les descendants de Seth. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il se rend maître d''Edom, il se rend maître de Séir, ses ennemis. Israël manifeste sa force. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Celui qui sort de Jacob règne en souverain, il fait mourir ceux qui s'échappent des villes.»
  '2':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'En levant les yeux, Balaam vit Israël qui campait par tribus. Alors l''Esprit de Dieu fut sur lui. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Balaam vit Amalek et il prononça son oracle: «Amalek est la première des nations, mais un jour il sera détruit.»'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Balaam vit les Kéniens et il prononça son oracle: «Ton habitation est solide et ton nid est posé sur le rocher, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mais le Kénien sera chassé quand l'Assyrien t'emmènera prisonnier.»
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Balaam prononça son oracle: «Quel malheur! Qui survivra lorsque Dieu aura établi l''Assyrien? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais des bateaux viendront de Kittim: ils humilieront l''Assyrien, ils humilieront l''Hébreu et lui aussi sera détruit.»'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Balaam se leva, partit et retourna chez lui. Balak s'en alla aussi de son côté.
  '3':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Balaam prononça son oracle: «Déclaration de Balaam, fils de Beor, déclaration de l''homme qui a l''œil ouvert, '
  '4':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: déclaration de celui qui entend les paroles de Dieu, de celui qui discerne la vision du Tout-Puissant, de celui qui se prosterne et dont les yeux s'ouvrent.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Qu''elles sont belles, tes tentes, Jacob, tes habitations, Israël! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elles s'étendent comme des vallées, comme des jardins près d'un fleuve, comme des aloès que l'Eternel a plantés, comme des cèdres le long de l'eau.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»L''eau déborde de ses seaux et sa semence est abondamment arrosée. Son roi s''élève au-dessus d''Agag et son royaume devient puissant. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dieu l'a fait sortir d'Egypte, il possède la force du buffle. Il dévore les nations qui l'attaquent, il brise leurs os et les abat de ses flèches.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»*Il plie les genoux, il se couche comme un lion, comme une lionne: qui le fera se lever?'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il plie… se lever: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Genèse 49.9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' *Béni soit celui qui te bénira et maudit soit celui qui te maudira!'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Béni… maudira: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: texte similaire en Genèse 27.29.
      marker-yv: yv-n
    - type: text
      text: »
