document_id: 1SA.10,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Onction de Saül comme roi d'Israël
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Samuel prit une fiole d''huile qu''il versa sur la tête de Saül. Il l''embrassa et dit: «L''Eternel t''a désigné par onction pour que tu sois le chef de son héritage'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Son héritage: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire Israël.
      marker-yv: yv-n
    - type: text
      text: '. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Lorsqu''ils arrivèrent à Guibea, une troupe de prophètes vint à sa rencontre. L''Esprit de Dieu vint sur lui et il prophétisa au milieu d''eux. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Tous ceux qui l''avaient connu auparavant virent qu''il prophétisait avec les prophètes, et les membres du peuple se disaient l''un à l''autre: «Qu''est-il arrivé au fils de Kis? Saül est-il aussi parmi les prophètes?» '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Quelqu''un de Guibea ajouta: «Et qui est leur père?» De là vient le proverbe: «Saül est-il aussi parmi les prophètes?»'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Lorsqu''il eut fini de prophétiser, Saül se rendit au haut lieu. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Son oncle lui demanda, ainsi qu''à son serviteur: «Où êtes-vous allés?» Saül répondit: «A la recherche des ânesses, mais nous ne les avons pas aperçues et nous sommes allés trouver Samuel.» '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'L''oncle de Saül reprit: «Raconte-moi donc ce que vous a dit Samuel.» '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Saül répondit à son oncle: «Il nous a assuré que les ânesses étaient retrouvées.» Il ne lui dit rien de la royauté dont avait parlé Samuel.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Samuel convoqua le peuple devant l''Eternel à Mitspa. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Il annonça aux Israélites: «Voici ce que dit l''Eternel, le Dieu d''Israël: C''est moi qui ai fait sortir Israël d''Egypte, qui vous ai délivrés de la domination des Egyptiens et de tous les royaumes qui vous opprimaient. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Et aujourd''hui, vous rejetez votre Dieu, celui qui vous a délivrés de tous vos maux et de toutes vos souffrances, et vous lui dites: ‘Etablis un roi sur nous!’ Présentez-vous maintenant devant l''Eternel par tribus et par milliers.»'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Aujourd''hui, après m''avoir quitté, tu trouveras deux hommes près du tombeau de Rachel, sur la frontière de Benjamin, à Tseltsach. Ils te diront: ‘Les ânesses à la recherche desquelles tu es allé sont retrouvées. Maintenant ton père ne pense plus aux ânesses, mais il s''inquiète pour vous, il dit: Que dois-je faire au sujet de mon fils?’ '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Samuel fit approcher toutes les tribus d''Israël, et la tribu de Benjamin fut désignée. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Il fit approcher la tribu de Benjamin clan par clan, et le clan de Matri fut désigné. Puis Saül, fils de Kis, fut désigné. On le chercha, mais on ne le trouva pas. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'On consulta de nouveau l''Eternel en demandant: «Y a-t-il encore un homme qui soit venu ici?» L''Eternel dit: «Il est caché vers les bagages.» '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'On courut le tirer de là et il se présenta au milieu du peuple. Il les dépassait tous d''une tête. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Samuel dit à tout le peuple: «Voyez-vous celui que l''Eternel a choisi? Il n''y a personne dans tout le peuple qui soit pareil à lui.» Et tout le peuple cria: «Vive le roi!» '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Samuel fit alors connaître au peuple le droit relatif à la royauté, et il l'écrivit dans un livre qu'il déposa devant l'Eternel. Puis il renvoya tout le peuple, chacun chez soi.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Saül aussi alla chez lui à Guibea, accompagné des hommes de valeur dont Dieu avait touché le cœur. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Il y eut toutefois des vauriens qui dirent: «Quoi! C''est celui-ci qui nous sauvera!» Ils le méprisèrent et ne lui apportèrent aucun cadeau, mais Saül n''y prêta pas attention.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'De là tu iras plus loin et tu arriveras au chêne de Thabor, où tu rencontreras trois hommes en train de monter vers Dieu à Béthel. Ils portent l''un 3 chevreaux, l''autre 3 gâteaux de pain et l''autre une outre de vin. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ils te demanderont comment tu vas et te donneront deux pains. Tu les accepteras de leur part. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Après cela, tu arriveras à Guibea-Elohim, où se trouve une garnison de Philistins. En entrant dans la ville, tu rencontreras une troupe de prophètes qui descendent du haut lieu, précédés du luth, du tambourin, de la flûte et de la harpe, et qui prophétisent. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'L''Esprit de l''Eternel viendra sur toi; tu prophétiseras avec eux et tu deviendras un autre homme. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Lorsque ces signes se seront réalisés pour toi, fais ce que tu trouveras à faire, car Dieu est avec toi. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Puis tu descendras avant moi à Guilgal. Je descendrai vers toi pour offrir des holocaustes et des sacrifices de communion. Tu attendras 7 jours, jusqu'à ce que j'arrive vers toi et que je te dise ce que tu dois faire.»
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Dès que Saül eut tourné le dos pour se séparer de Samuel, Dieu lui donna un autre cœur et tous ces signes se réalisèrent le même jour. '
