document_id: JDG.17,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: La déchéance morale d'Israël
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 17.1–21.25
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Instauration d'un culte idolâtrique
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait un homme de la région montagneuse d''Ephraïm, appelé Mica, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mica lui proposa: «Reste avec moi. Tu me serviras de père et de prêtre, et je te donnerai 10 pièces d''argent par an, les vêtements dont tu auras besoin ainsi que de la nourriture.» Le Lévite entra chez Mica. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il se décida ainsi à rester chez cet homme, qui le considéra comme un de ses fils. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mica établit le Lévite dans ses fonctions, et ce jeune homme lui servit de prêtre et resta chez lui. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mica dit alors: «Maintenant, je sais que l''Eternel me fera du bien, puisque j''ai ce Lévite pour prêtre.»'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'qui dit à sa mère: «Les 1100 pièces d''argent qu''on t''a prises et pour lesquelles tu as proféré des malédictions même à mes oreilles, eh bien, cet argent est entre mes mains, c''est moi qui l''avais pris.» Sa mère dit: «Que mon fils soit béni de l''Eternel!» '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il rendit à sa mère les 1100 pièces d''argent et sa mère dit: «Je consacre de ma main cet argent à l''Eternel, afin d''en faire pour mon fils une sculpture sacrée et une idole en métal fondu. C''est ainsi que je te le rendrai.» '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il rendit donc l''argent à sa mère. Elle prit 200 pièces d''argent et les donna au fondeur, qui en fit une sculpture sacrée et une idole en métal fondu. On les plaça dans la maison de Mica. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce Mica eut ainsi un lieu de culte. Il fit un éphod
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ephod: voir la note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '8.27'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' et des théraphim'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Théraphim: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: figurines représentant les dieux protecteurs de la maison familiale, associées au culte familial des ancêtres dans les civilisations antiques.
      marker-yv: yv-n
    - type: text
      text: ', et il établit pour lui l''un de ses fils dans la fonction de prêtre.'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: A cette époque-là, il n'y avait pas de roi en Israël. Chacun faisait ce qui lui semblait bon.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait aussi un jeune homme de Bethléhem de Juda, ville du clan de Juda. Il était lévite et il habitait là en étranger. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cet homme partit de la ville de Bethléhem en Juda pour chercher un lieu de résidence qui lui convienne. En cours de route, il arriva à la maison de Mica dans la région montagneuse d''Ephraïm. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mica lui demanda: «D''où viens-tu?» Il lui répondit: «Je suis lévite, de Bethléhem en Juda, et je voyage pour chercher un lieu de résidence qui me convienne.» '
