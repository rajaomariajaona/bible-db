document_id: JDG.17,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La déchéance morale d'Israël
  - type: heading
    content: 17.1–21.25
  - type: heading
    content: Instauration d'un culte idolâtrique
  - type: text
    content: 'Il y avait un homme de la région montagneuse d''Ephraïm, appelé Mica, '
  '10':
  - type: text
    content: 'Mica lui proposa: «Reste avec moi. Tu me serviras de père et de prêtre, et je te donnerai 10 pièces d''argent par an, les vêtements dont tu auras besoin ainsi que de la nourriture.» Le Lévite entra chez Mica. '
  '11':
  - type: text
    content: 'Il se décida ainsi à rester chez cet homme, qui le considéra comme un de ses fils. '
  '12':
  - type: text
    content: 'Mica établit le Lévite dans ses fonctions, et ce jeune homme lui servit de prêtre et resta chez lui. '
  '13':
  - type: text
    content: 'Mica dit alors: «Maintenant, je sais que l''Eternel me fera du bien, puisque j''ai ce Lévite pour prêtre.»'
  '2':
  - type: text
    content: 'qui dit à sa mère: «Les 1100 pièces d''argent qu''on t''a prises et pour lesquelles tu as proféré des malédictions même à mes oreilles, eh bien, cet argent est entre mes mains, c''est moi qui l''avais pris.» Sa mère dit: «Que mon fils soit béni de l''Eternel!» '
  '3':
  - type: text
    content: 'Il rendit à sa mère les 1100 pièces d''argent et sa mère dit: «Je consacre de ma main cet argent à l''Eternel, afin d''en faire pour mon fils une sculpture sacrée et une idole en métal fondu. C''est ainsi que je te le rendrai.» '
  '4':
  - type: text
    content: 'Il rendit donc l''argent à sa mère. Elle prit 200 pièces d''argent et les donna au fondeur, qui en fit une sculpture sacrée et une idole en métal fondu. On les plaça dans la maison de Mica. '
  '5':
  - type: text
    content: Ce Mica eut ainsi un lieu de culte. Il fit un éphod
  - type: note
    content: 'Ephod: voir la note 8.27.'
  - type: text
    content: ' et des théraphim'
  - type: note
    content: 'Théraphim: figurines représentant les dieux protecteurs de la maison familiale, associées au culte familial des ancêtres dans les civilisations antiques.'
  - type: text
    content: ', et il établit pour lui l''un de ses fils dans la fonction de prêtre.'
  '6':
  - type: text
    content: A cette époque-là, il n'y avait pas de roi en Israël. Chacun faisait ce qui lui semblait bon.
  '7':
  - type: text
    content: 'Il y avait aussi un jeune homme de Bethléhem de Juda, ville du clan de Juda. Il était lévite et il habitait là en étranger. '
  '8':
  - type: text
    content: 'Cet homme partit de la ville de Bethléhem en Juda pour chercher un lieu de résidence qui lui convienne. En cours de route, il arriva à la maison de Mica dans la région montagneuse d''Ephraïm. '
  '9':
  - type: text
    content: 'Mica lui demanda: «D''où viens-tu?» Il lui répondit: «Je suis lévite, de Bethléhem en Juda, et je voyage pour chercher un lieu de résidence qui me convienne.» '
