document_id: PRO.23
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Si tu es à table avec un grand,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fais attention à ce qui est devant toi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Place un couteau devant ta gorge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si tu as trop d'appétit!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ne convoite pas ses bons plats:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est une nourriture trompeuse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ne te fatigue pas à acquérir la richesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: n'y applique pas ton intelligence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Veux-tu la poursuivre du regard? La voilà disparue!
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, la richesse se fait des ailes et, comme l'aigle, elle prend son envol vers le ciel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ne mange pas le pain de l'homme au regard malveillant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne convoite pas ses bons plats,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'car il calcule au fond de lui:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Mange et bois», te dira-t-il,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais son cœur n'est pas avec toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tu vomiras le morceau que tu as mangé
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu auras tenu en pure perte des propos agréables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ne parle pas aux oreilles de l'homme stupide,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il méprise le bon sens de tes discours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ne déplace pas la limite ancienne
- type: usfm
  marker: q1
  children:
  - type: text
    text: et n'empiète pas sur le champ des orphelins,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: car *celui qui les rachète est puissant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est lui qui défendra leur cause
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Celui… cause: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'probable citation en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jérémie 50.34
      metadata:
        usfm: JER.50.34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' contre toi.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ouvre ton cœur à l'instruction
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tes oreilles aux paroles de la connaissance!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ne refuse pas de corriger l'enfant!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si tu le frappes avec un bâton, il ne mourra pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Certes, tu le frappes avec un bâton,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais tu arraches son âme au séjour des morts.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Appels d'un père à son fils
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mon fils, si ton cœur est sage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon cœur à moi sera dans la joie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tout mon être sera dans l'allégresse
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand tes lèvres parleront avec droiture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Que ton cœur n'envie pas les pécheurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais qu'il ait toujours la crainte de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: car il y a un avenir
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ton espérance ne pourra pas être brisée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ecoute, mon fils, et montre-toi sage!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dirige ton cœur sur la voie droite!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ne figure pas parmi les buveurs de vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parmi ceux qui font des excès de viande,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: car l'ivrogne et celui qui se livre à des excès s'appauvrissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la somnolence fait porter des haillons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ecoute ton père, lui qui t'a donné naissance!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne méprise pas ta mère quand elle est devenue vieille!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Acquiers la vérité et ne la vends pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la sagesse, l'instruction et l'intelligence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Le père du juste est dans l'allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui donne naissance à un sage en aura de la joie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Que ton père et ta mère se réjouissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que celle qui t'a mis au monde soit dans l'allégresse!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Mon fils, donne-moi ton cœur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que tes yeux prennent plaisir à mes voies!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: En effet, la prostituée est une fosse profonde,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'inconnue un puits étroit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Elle se tient en embuscade comme un brigand
- type: usfm
  marker: q1
  children:
  - type: text
    text: et elle augmente le nombre d'infidèles parmi les hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Pour qui les «ah»? Pour qui les «hélas»?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour qui les disputes? Pour qui les plaintes?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pour qui les blessures sans raison? Pour qui les yeux rouges?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Pour ceux qui s'attardent auprès du vin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour ceux qui vont déguster du vin mélangé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ne regarde pas le vin parce qu'il est d'un beau rouge
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et qu''il fait des perles dans la coupe: il s''avale d''un trait'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: et il finit par mordre comme un serpent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: par piquer comme une vipère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Tes yeux auraient alors d'étranges visions
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ton cœur exprimerait le dérèglement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Tu serais pareil à un homme couché en pleine mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'à un homme couché au sommet d''un mât:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: «On m'a frappé et je n'ai pas mal!
- type: usfm
  marker: q1
  children:
  - type: text
    text: On m'a battu et je ne sens rien!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand me réveillerai-je? J'en veux encore!»
