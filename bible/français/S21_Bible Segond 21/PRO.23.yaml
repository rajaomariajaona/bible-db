document_id: PRO.23,152
type_code: fra
verses:
  '1':
  - type: text
    content: Si tu es à table avec un grand,
  - type: text
    content: fais attention à ce qui est devant toi!
  '10':
  - type: text
    content: Ne déplace pas la limite ancienne
  - type: text
    content: et n'empiète pas sur le champ des orphelins,
  '11':
  - type: text
    content: car *celui qui les rachète est puissant.
  - type: text
    content: C'est lui qui défendra leur cause
  - type: note
    content: 'Celui… cause: probable citation en Jérémie 50.34.'
  - type: text
    content: ' contre toi.'
  '12':
  - type: text
    content: Ouvre ton cœur à l'instruction
  - type: text
    content: et tes oreilles aux paroles de la connaissance!
  '13':
  - type: text
    content: Ne refuse pas de corriger l'enfant!
  - type: text
    content: Si tu le frappes avec un bâton, il ne mourra pas.
  '14':
  - type: text
    content: Certes, tu le frappes avec un bâton,
  - type: text
    content: mais tu arraches son âme au séjour des morts.
  - type: heading
    content: Appels d'un père à son fils
  '15':
  - type: text
    content: Mon fils, si ton cœur est sage,
  - type: text
    content: mon cœur à moi sera dans la joie.
  '16':
  - type: text
    content: Tout mon être sera dans l'allégresse
  - type: text
    content: quand tes lèvres parleront avec droiture.
  '17':
  - type: text
    content: Que ton cœur n'envie pas les pécheurs,
  - type: text
    content: mais qu'il ait toujours la crainte de l'Eternel,
  '18':
  - type: text
    content: car il y a un avenir
  - type: text
    content: et ton espérance ne pourra pas être brisée.
  '19':
  - type: text
    content: Ecoute, mon fils, et montre-toi sage!
  - type: text
    content: Dirige ton cœur sur la voie droite!
  '2':
  - type: text
    content: Place un couteau devant ta gorge,
  - type: text
    content: si tu as trop d'appétit!
  '20':
  - type: text
    content: Ne figure pas parmi les buveurs de vin,
  - type: text
    content: parmi ceux qui font des excès de viande,
  '21':
  - type: text
    content: car l'ivrogne et celui qui se livre à des excès s'appauvrissent,
  - type: text
    content: et la somnolence fait porter des haillons.
  '22':
  - type: text
    content: Ecoute ton père, lui qui t'a donné naissance!
  - type: text
    content: Ne méprise pas ta mère quand elle est devenue vieille!
  '23':
  - type: text
    content: Acquiers la vérité et ne la vends pas,
  - type: text
    content: la sagesse, l'instruction et l'intelligence.
  '24':
  - type: text
    content: Le père du juste est dans l'allégresse,
  - type: text
    content: celui qui donne naissance à un sage en aura de la joie.
  '25':
  - type: text
    content: Que ton père et ta mère se réjouissent,
  - type: text
    content: que celle qui t'a mis au monde soit dans l'allégresse!
  '26':
  - type: text
    content: Mon fils, donne-moi ton cœur
  - type: text
    content: et que tes yeux prennent plaisir à mes voies!
  '27':
  - type: text
    content: En effet, la prostituée est une fosse profonde,
  - type: text
    content: et l'inconnue un puits étroit.
  '28':
  - type: text
    content: Elle se tient en embuscade comme un brigand
  - type: text
    content: et elle augmente le nombre d'infidèles parmi les hommes.
  '29':
  - type: text
    content: Pour qui les «ah»? Pour qui les «hélas»?
  - type: text
    content: Pour qui les disputes? Pour qui les plaintes?
  - type: text
    content: Pour qui les blessures sans raison? Pour qui les yeux rouges?
  '3':
  - type: text
    content: 'Ne convoite pas ses bons plats:'
  - type: text
    content: c'est une nourriture trompeuse.
  '30':
  - type: text
    content: Pour ceux qui s'attardent auprès du vin,
  - type: text
    content: pour ceux qui vont déguster du vin mélangé.
  '31':
  - type: text
    content: Ne regarde pas le vin parce qu'il est d'un beau rouge
  - type: text
    content: 'et qu''il fait des perles dans la coupe: il s''avale d''un trait'
  '32':
  - type: text
    content: et il finit par mordre comme un serpent,
  - type: text
    content: par piquer comme une vipère.
  '33':
  - type: text
    content: Tes yeux auraient alors d'étranges visions
  - type: text
    content: et ton cœur exprimerait le dérèglement.
  '34':
  - type: text
    content: Tu serais pareil à un homme couché en pleine mer,
  - type: text
    content: 'à un homme couché au sommet d''un mât:'
  '35':
  - type: text
    content: «On m'a frappé et je n'ai pas mal!
  - type: text
    content: On m'a battu et je ne sens rien!
  - type: text
    content: Quand me réveillerai-je? J'en veux encore!»
  '4':
  - type: text
    content: Ne te fatigue pas à acquérir la richesse,
  - type: text
    content: n'y applique pas ton intelligence.
  '5':
  - type: text
    content: Veux-tu la poursuivre du regard? La voilà disparue!
  - type: text
    content: En effet, la richesse se fait des ailes et, comme l'aigle, elle prend son envol vers le ciel.
  '6':
  - type: text
    content: Ne mange pas le pain de l'homme au regard malveillant,
  - type: text
    content: ne convoite pas ses bons plats,
  '7':
  - type: text
    content: 'car il calcule au fond de lui:'
  - type: text
    content: «Mange et bois», te dira-t-il,
  - type: text
    content: mais son cœur n'est pas avec toi.
  '8':
  - type: text
    content: Tu vomiras le morceau que tu as mangé
  - type: text
    content: et tu auras tenu en pure perte des propos agréables.
  '9':
  - type: text
    content: Ne parle pas aux oreilles de l'homme stupide,
  - type: text
    content: car il méprise le bon sens de tes discours.
