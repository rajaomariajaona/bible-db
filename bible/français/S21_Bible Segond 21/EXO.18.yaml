document_id: EXO.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Visite de Jéthro, le beau-père de Moïse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jéthro, prêtre de Madian et beau-père de Moïse, apprit tout ce que Dieu avait fait en faveur de Moïse et d''Israël, son peuple, il apprit que l''Eternel avait fait sortir Israël d''Egypte. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jéthro, beau-père de Moïse, prit Séphora, la femme de Moïse. C''était après son renvoi. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il prit aussi les deux fils de Séphora; l''un s''appelait Guershom, car Moïse avait dit: «Je suis en exil dans un pays étranger», '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'l''autre s''appelait Eliézer, car il avait dit: «Le Dieu de mon père m''a secouru et il m''a délivré de l''épée du pharaon.» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jéthro, le beau-père de Moïse, vint avec les fils et la femme de Moïse au désert où il campait, à la montagne de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il fit dire à Moïse: «Moi, ton beau-père Jéthro, je viens te trouver avec ta femme, et ses deux fils l''accompagnent.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Moïse sortit à la rencontre de son beau-père. Il se prosterna et l''embrassa. Ils s''informèrent réciproquement de leur santé, puis ils entrèrent dans la tente de Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Moïse raconta à son beau-père tout ce que l''Eternel avait fait au pharaon et à l''Egypte à cause d''Israël, toutes les difficultés qu''ils avaient rencontrées en chemin et la façon dont l''Eternel les avait délivrés. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Jéthro se réjouit de tout le bien que l''Eternel avait fait à Israël en le délivrant de la main des Egyptiens. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il dit: «Béni soit l''Eternel, qui vous a délivrés de la main des Egyptiens et de celle du pharaon, qui a délivré le peuple de la main des Egyptiens! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Je reconnais maintenant que l''Eternel est plus grand que tous les dieux, puisque l''arrogance des Egyptiens est retombée sur eux.» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Jéthro, le beau-père de Moïse, offrit à Dieu un holocauste et des sacrifices. Aaron et tous les anciens d'Israël vinrent participer à ce repas avec le beau-père de Moïse, en présence de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le lendemain, Moïse siégea pour juger le peuple et le peuple se présenta devant lui depuis le matin jusqu''au soir. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Le beau-père de Moïse vit tout ce qu''il faisait pour le peuple et dit: «Que fais-tu là pour ce peuple? Pourquoi sièges-tu tout seul et pourquoi tout le peuple se présente-t-il devant toi, depuis le matin jusqu''au soir?» '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Moïse répondit à son beau-père: «C''est que le peuple vient vers moi pour consulter Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Quand ils ont une affaire, ils viennent vers moi. Je juge entre les parties et je fais connaître les prescriptions de Dieu et ses lois.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le beau-père de Moïse lui dit: «Ce que tu fais n''est pas bien. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tu vas t''épuiser toi-même et tu vas épuiser ce peuple qui est avec toi. En effet, la tâche est trop lourde pour toi, tu ne pourras pas la mener à bien tout seul. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Maintenant écoute-moi. Je vais te donner un conseil et que Dieu soit avec toi! Sois le représentant du peuple auprès de Dieu et porte les affaires devant Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Enseigne-leur les prescriptions et les lois, fais-leur connaître le chemin qu''ils doivent suivre et ce qu''ils doivent faire. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Choisis parmi tout le peuple des hommes capables, qui craignent Dieu, des hommes intègres, ennemis du gain malhonnête. Etablis-les sur eux comme chefs de milliers, de centaines, de cinquantaines et de dizaines. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ce sont eux qui jugeront le peuple de manière permanente. Ils porteront devant toi toutes les affaires importantes et jugeront eux-mêmes les petites causes. Allège ta charge et qu''ils la portent avec toi. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Si tu fais cela et que Dieu te l'ordonne, tu pourras tenir bon et tout ce peuple parviendra en paix à sa destination.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Moïse écouta son beau-père et fit tout ce qu''il avait dit. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Moïse choisit parmi tout Israël des hommes capables et les établit chefs du peuple, chefs de milliers, de centaines, de cinquantaines et de dizaines. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ils jugeaient le peuple de manière permanente. Ils portaient devant Moïse les affaires difficiles et jugeaient eux-mêmes toutes les petites causes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Moïse laissa partir son beau-père et Jéthro retourna dans son pays.
