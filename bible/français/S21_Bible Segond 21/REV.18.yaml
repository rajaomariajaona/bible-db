document_id: REV.18,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Après cela, je vis un autre ange descendre du ciel. Il avait un grand pouvoir et la terre fut illuminée de sa gloire. '
  '10':
  - type: text
    content: 'Ils se tiendront à distance, par crainte de son tourment, et ils diront: «Malheur! Malheur! La grande ville, Babylone, la ville puissante! En une seule heure ton jugement est venu!»'
  '11':
  - type: text
    content: 'Les marchands de la terre pleurent aussi et sont dans le deuil à cause d''elle, parce que plus personne n''achète leur cargaison, '
  '12':
  - type: text
    content: 'cargaison d''or, d''argent, de pierres précieuses, de perles, de fin lin, de pourpre, de soie, d''écarlate, de toutes sortes de bois de senteur, de toutes sortes d''objets en ivoire, en bois très précieux, en bronze, en fer et en marbre, '
  '13':
  - type: text
    content: 'de cannelle, [d''aromates,] de parfums, de myrrhe, d''encens, de vin, d''huile, de fine farine, de blé, de bœufs, de brebis, de chevaux, de chars, de corps et d''âmes humaines. '
  '14':
  - type: text
    content: '«Les fruits que tu désirais profondément sont partis loin de toi; toutes ces richesses et ces splendeurs sont perdues pour toi et tu ne les retrouveras plus.» '
  '15':
  - type: text
    content: 'Les marchands de ces produits, qui se sont enrichis en commerçant avec elle, se tiendront à distance, par crainte de son tourment. Ils pleureront et seront dans le deuil; '
  '16':
  - type: text
    content: 'ils diront: «Malheur! Malheur! La grande ville qui était habillée de fin lin, de pourpre et d''écarlate, et parée d''or, de pierres précieuses et de perles! En une seule heure tant de richesses ont été détruites!»'
  '17':
  - type: text
    content: 'Tous les capitaines, tous ceux qui naviguent, les marins et tous ceux qui vivent de la mer se tenaient à distance '
  '18':
  - type: text
    content: 'et ils s''écriaient, en voyant la fumée de l''incendie: «Quelle ville pouvait se comparer à la grande ville?» '
  '19':
  - type: text
    content: 'Ils se jetaient de la poussière sur la tête et ils criaient, dans les pleurs et le deuil: «Malheur! Malheur! La grande ville dont la prospérité a enrichi tous ceux qui possèdent des bateaux sur la mer, en une seule heure elle a été dévastée!»'
  '2':
  - type: text
    content: 'Il cria d''une voix forte: «Elle est tombée, [elle est tombée,] Babylone la grande! Elle est devenue une habitation de démons, un repaire pour tout esprit impur, un repaire pour tout oiseau impur et détestable. '
  '20':
  - type: text
    content: Ciel, réjouis-toi à cause d'elle! Et vous, les saints, les apôtres et les prophètes, réjouissez-vous aussi, car Dieu vous a fait justice en la jugeant.
  '21':
  - type: text
    content: 'Alors, un ange puissant prit une pierre qui ressemblait à une grande meule et il la jeta dans la mer en disant: «C''est avec la même violence que Babylone, la grande ville, sera jetée à bas, et on ne la retrouvera plus. '
  '22':
  - type: text
    content: 'On n''entendra plus chez toi les sons des joueurs de harpe, des musiciens, des joueurs de flûte et de trompette. On ne trouvera chez toi plus aucun artisan d''un quelconque métier et l''on n''y entendra plus le bruit de la meule. '
  '23':
  - type: text
    content: 'La lumière de la lampe ne brillera plus chez toi et l''on n''y entendra plus la voix des jeunes mariés. Cela arrivera parce que tes marchands étaient les grands de la terre et que toutes les nations ont été égarées par ta sorcellerie, '
  '24':
  - type: text
    content: parce que l'on a trouvé chez toi le sang des prophètes, des saints et de tous ceux qui ont été mis à mort sur la terre.»
  '3':
  - type: text
    content: En effet, toutes les nations ont bu du vin de la fureur de sa prostitution, les rois de la terre se sont livrés avec elle à l'immoralité et les marchands de la terre se sont enrichis grâce à la démesure de son luxe.»
  '4':
  - type: text
    content: 'Puis j''entendis une autre voix venant du ciel qui disait: «'
  - type: text
    content: Sortez du milieu d'elle, mon peuple
  - type: note
    content: 'Sortez… peuple: citation de Jérémie 51.45.'
  - type: text
    content: ', afin de ne pas vous associer à ses péchés et de ne pas être victimes de ses fléaux. '
  '5':
  - type: text
    content: 'En effet, ses péchés se sont accumulés jusqu''au ciel et Dieu s''est souvenu de ses crimes. '
  '6':
  - type: text
    content: 'Payez-la comme elle a payé et donnez-lui le double salaire de ses actes. Dans la coupe où elle a versé, versez-lui le double. '
  '7':
  - type: text
    content: 'Donnez-lui autant de tourment et de deuil qu''elle a fait la fière et s''est plongée dans le luxe. Parce qu''elle dit dans son cœur: ‘Je siège en reine, je ne suis pas veuve et jamais je ne verrai le deuil’, '
  '8':
  - type: text
    content: 'à cause de cela, en un seul jour, les fléaux qui lui sont réservés s''abattront sur elle: la mort, le deuil, la famine, et elle sera réduite en cendres. En effet, il est puissant, le Seigneur Dieu qui l''a jugée.»'
  '9':
  - type: text
    content: 'Tous les rois de la terre qui se sont livrés avec elle à la prostitution et au luxe pleureront et se lamenteront à cause d''elle, quand ils verront la fumée de la ville incendiée. '
