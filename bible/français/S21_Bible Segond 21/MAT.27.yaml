document_id: MAT.27,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus devant le gouverneur romain
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Le matin venu, tous les chefs des prêtres et les anciens du peuple tinrent conseil contre Jésus pour le faire mourir. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: et ils les ont données pour le champ du potier, comme le Seigneur me l'avait ordonné
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.9-10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ils ont pris… ordonné: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Zacharie 11.12-13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Le renvoi à Jérémie peut s'expliquer par le fait que c'était un des prophètes les plus connus, qui figurait en tête des écrits prophétiques dans le Talmud babylonien.
      marker-yv: yv-n
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Jésus comparut devant le gouverneur. Celui-ci l''interrogea: «Es-tu le roi des Juifs?» Jésus lui répondit: «Tu le dis.» '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Mais il ne répondit rien aux accusations des chefs des prêtres et des anciens. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Alors Pilate lui dit: «N''entends-tu pas tous ces témoignages qu''ils portent contre toi?» '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Mais Jésus ne répondit sur aucun point, ce qui étonna beaucoup le gouverneur.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'A chaque fête, le gouverneur avait pour habitude de relâcher un prisonnier, celui que la foule voulait. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ils avaient alors un prisonnier célèbre, un dénommé Barabbas. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Comme ils étaient rassemblés, Pilate leur dit: «Lequel voulez-vous que je vous relâche: Barabbas ou Jésus qu''on appelle le Christ?» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'En effet, il savait que c''était par jalousie qu''ils avaient fait arrêter Jésus. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Pendant qu''il siégeait au tribunal, sa femme lui fit dire: «N''aie rien à faire avec ce juste, car aujourd''hui j''ai beaucoup souffert dans un rêve à cause de lui.» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Après l'avoir attaché, ils l'emmenèrent et le livrèrent à [Ponce] Pilate, le gouverneur.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Les chefs des prêtres et les anciens persuadèrent la foule de demander Barabbas et de faire mourir Jésus. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Le gouverneur prit la parole et leur dit: «Lequel des deux voulez-vous que je vous relâche?» Ils répondirent: «Barabbas.» '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Pilate répliqua: «Que ferai-je donc de Jésus qu''on appelle le Christ?» Tous répondirent: «Qu''il soit crucifié!» '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '«Mais quel mal a-t-il fait?» dit le gouverneur. Ils crièrent encore plus fort: «Qu''il soit crucifié!» '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Voyant qu''il ne gagnait rien mais que le tumulte augmentait, Pilate prit de l''eau, se lava les mains en présence de la foule et dit: «Je suis innocent du sang de ce juste. C''est vous que cela regarde.» '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Et tout le peuple répondit: «Que son sang retombe sur nous et sur nos enfants!»'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Alors Pilate leur relâcha Barabbas; et, après avoir fait fouetter Jésus, il le livra à la crucifixion.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Les soldats du gouverneur conduisirent Jésus dans le prétoire et rassemblèrent toute la troupe autour de lui. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ils lui enlevèrent ses vêtements et lui mirent un manteau écarlate. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ils tressèrent une couronne d''épines qu''ils posèrent sur sa tête, et ils lui mirent un roseau dans la main droite; puis, s''agenouillant devant lui, ils se moquaient de lui en disant: «Salut, roi des Juifs!» '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Alors Judas, celui qui l''avait trahi, voyant qu''il était condamné, fut pris de remords et rapporta les 30 pièces d''argent aux chefs des prêtres et aux anciens '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ils crachaient sur lui, prenaient le roseau et le frappaient sur la tête. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Après s'être ainsi moqués de lui, ils lui enlevèrent le manteau, lui remirent ses vêtements et l'emmenèrent pour le crucifier.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Crucifixion et mort de Jésus
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Lorsqu''ils sortirent, ils rencontrèrent un homme de Cyrène appelé Simon et le forcèrent à porter la croix de Jésus. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Arrivés à un endroit appelé Golgotha – ce qui signifie «lieu du crâne» –, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: ils lui donnèrent à boire du vinaigre mêlé de fiel; mais quand il l'eut goûté, il ne voulut pas boire.
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Ils le crucifièrent, puis ils se partagèrent ses vêtements en tirant au sort [afin que s''accomplisse ce que le prophète avait annoncé: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Ils se sont partagé mes vêtements et ils ont tiré au sort mon habit
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.35 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ils se sont…mon habit: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 22.19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '].'
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Puis ils s''assirent et le gardèrent. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Pour indiquer le motif de sa condamnation, on écrivit au-dessus de sa tête: «Celui-ci est Jésus, le roi des Juifs.» '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Avec lui furent crucifiés deux brigands, l'un à sa droite et l'autre à sa gauche.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Les passants l''insultaient et secouaient la tête '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'en disant: «J''ai péché en faisant arrêter un innocent.» Ils répondirent: «En quoi cela nous concerne-t-il? C''est toi que cela regarde.» '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'en disant: «Toi qui détruis le temple et qui le reconstruis en trois jours, sauve-toi toi-même! Si tu es le Fils de Dieu, descends de la croix!» '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Les chefs des prêtres, avec les spécialistes de la loi et les anciens, se moquaient aussi de lui et disaient: '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: '«Il en a sauvé d''autres et il ne peut pas se sauver lui-même! S''il est roi d''Israël, qu''il descende maintenant de la croix et nous croirons en lui. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Il s'est confié en Dieu; que Dieu le délivre maintenant, s'il l'aime!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.43 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il s''est confié… l''aime: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 22.9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' En effet, il a dit: ‘Je suis le Fils de Dieu.’» '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Les brigands crucifiés avec lui l'insultaient eux aussi de la même manière.
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'De midi jusqu''à trois heures de l''après-midi, il y eut des ténèbres sur tout le pays. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Vers trois heures de l''après-midi, Jésus s''écria d''une voix forte: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: «Eli, Eli, lama sabachthani?»
    - type: text
      text: ' – c''est-à-dire: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Mon Dieu, mon Dieu, pourquoi m'as-tu abandonné?
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.46 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Mon Dieu… abandonné: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Psaume 22.2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Quelques-uns de ceux qui étaient là, après l''avoir entendu, disaient: «Il appelle Elie.» '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Aussitôt l''un d''eux courut prendre une éponge qu''il imbiba de vinaigre; il la fixa à un roseau et lui donna à boire. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Mais les autres disaient: «Laisse donc, voyons si Elie viendra le sauver.»'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Judas jeta les pièces d''argent dans le temple, se retira et alla se pendre. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Jésus poussa de nouveau un grand cri et rendit l''esprit. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: Et voici que le voile du temple
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.51 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le voile du temple: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: celui qui séparait le lieu saint du lieu très saint, accessible seulement au grand-prêtre, et ce une fois par an.
      marker-yv: yv-n
    - type: text
      text: ' se déchira en deux depuis le haut jusqu''en bas, la terre trembla, les rochers se fendirent, '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: les tombeaux s'ouvrirent et les corps de plusieurs saints
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.52 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Saints: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire croyants.
      marker-yv: yv-n
    - type: text
      text: ' qui étaient morts ressuscitèrent. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: Etant sortis des tombes, ils entrèrent dans la ville sainte après la résurrection de Jésus et apparurent à un grand nombre de personnes.
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'A la vue du tremblement de terre et de ce qui venait d''arriver, l''officier romain et ceux qui étaient avec lui pour garder Jésus furent saisis d''une grande frayeur et dirent: «Cet homme était vraiment le Fils de Dieu.»'
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'Il y avait là bien des femmes qui regardaient de loin; elles avaient accompagné Jésus depuis la Galilée pour le servir. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: Parmi elles figuraient Marie de Magdala, Marie la mère de Jacques et de Joseph, et la mère des fils de Zébédée.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mise au tombeau du corps de Jésus
    marker-yv: yv-h
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'Le soir venu arriva un homme riche d''Arimathée, du nom de Joseph, qui lui aussi était un disciple de Jésus. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: 'Il alla trouver Pilate et demanda le corps de Jésus. Alors Pilate ordonna de le lui remettre. '
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: 'Joseph prit le corps, l''enveloppa dans un drap de lin pur '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Les chefs des prêtres les ramassèrent en disant: «Il n''est pas permis de les mettre dans le trésor sacré puisque c''est le prix du sang.» '
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: 'et le déposa dans un tombeau neuf qu''il s''était fait creuser dans la roche. Puis il roula une grande pierre à l''entrée du tombeau et s''en alla. '
  '61':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: Marie de Magdala et l'autre Marie étaient là, assises vis-à-vis du tombeau.
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: 'Le lendemain, qui était le jour après la préparation du sabbat, les chefs des prêtres et les pharisiens allèrent ensemble chez Pilate '
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: 'et dirent: «Seigneur, nous nous souvenons que cet imposteur a dit, quand il vivait encore: ‘Après trois jours je ressusciterai.’ '
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: 'Ordonne donc que le tombeau soit gardé jusqu''au troisième jour, afin que ses disciples ne viennent pas voler le corps et dire au peuple: ‘Il est ressuscité.’ Cette dernière imposture serait pire que la première.» '
  '65':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: 'Pilate leur dit: «Vous avez une garde. Allez-y, gardez-le comme vous le souhaitez!» '
  '66':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: Ils s'en allèrent et firent surveiller le tombeau par la garde après avoir scellé la pierre.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Après en avoir délibéré, ils achetèrent avec cet argent le champ du potier, pour y ensevelir les étrangers. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'C''est pourquoi ce champ a été appelé «champ du sang» jusqu''à aujourd''hui. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Alors s''accomplit ce que le prophète Jérémie avait annoncé: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Ils ont pris les 30 pièces d'argent, la valeur à laquelle il a été estimé par les Israélites,
    - type: text
      text: ' '
