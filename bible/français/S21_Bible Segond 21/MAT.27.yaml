document_id: MAT.27,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus devant le gouverneur romain
  - type: text
    content: 'Le matin venu, tous les chefs des prêtres et les anciens du peuple tinrent conseil contre Jésus pour le faire mourir. '
  '10':
  - type: text
    content: et ils les ont données pour le champ du potier, comme le Seigneur me l'avait ordonné
  - type: text
    content: .
  - type: note
    content: 'Ils ont pris… ordonné: citation de Zacharie 11.12-13. Le renvoi à Jérémie peut s''expliquer par le fait que c''était un des prophètes les plus connus, qui figurait en tête des écrits prophétiques dans le Talmud babylonien.'
  '11':
  - type: text
    content: 'Jésus comparut devant le gouverneur. Celui-ci l''interrogea: «Es-tu le roi des Juifs?» Jésus lui répondit: «Tu le dis.» '
  '12':
  - type: text
    content: 'Mais il ne répondit rien aux accusations des chefs des prêtres et des anciens. '
  '13':
  - type: text
    content: 'Alors Pilate lui dit: «N''entends-tu pas tous ces témoignages qu''ils portent contre toi?» '
  '14':
  - type: text
    content: Mais Jésus ne répondit sur aucun point, ce qui étonna beaucoup le gouverneur.
  '15':
  - type: text
    content: 'A chaque fête, le gouverneur avait pour habitude de relâcher un prisonnier, celui que la foule voulait. '
  '16':
  - type: text
    content: 'Ils avaient alors un prisonnier célèbre, un dénommé Barabbas. '
  '17':
  - type: text
    content: 'Comme ils étaient rassemblés, Pilate leur dit: «Lequel voulez-vous que je vous relâche: Barabbas ou Jésus qu''on appelle le Christ?» '
  '18':
  - type: text
    content: 'En effet, il savait que c''était par jalousie qu''ils avaient fait arrêter Jésus. '
  '19':
  - type: text
    content: 'Pendant qu''il siégeait au tribunal, sa femme lui fit dire: «N''aie rien à faire avec ce juste, car aujourd''hui j''ai beaucoup souffert dans un rêve à cause de lui.» '
  '2':
  - type: text
    content: Après l'avoir attaché, ils l'emmenèrent et le livrèrent à [Ponce] Pilate, le gouverneur.
  '20':
  - type: text
    content: 'Les chefs des prêtres et les anciens persuadèrent la foule de demander Barabbas et de faire mourir Jésus. '
  '21':
  - type: text
    content: 'Le gouverneur prit la parole et leur dit: «Lequel des deux voulez-vous que je vous relâche?» Ils répondirent: «Barabbas.» '
  '22':
  - type: text
    content: 'Pilate répliqua: «Que ferai-je donc de Jésus qu''on appelle le Christ?» Tous répondirent: «Qu''il soit crucifié!» '
  '23':
  - type: text
    content: '«Mais quel mal a-t-il fait?» dit le gouverneur. Ils crièrent encore plus fort: «Qu''il soit crucifié!» '
  '24':
  - type: text
    content: 'Voyant qu''il ne gagnait rien mais que le tumulte augmentait, Pilate prit de l''eau, se lava les mains en présence de la foule et dit: «Je suis innocent du sang de ce juste. C''est vous que cela regarde.» '
  '25':
  - type: text
    content: 'Et tout le peuple répondit: «Que son sang retombe sur nous et sur nos enfants!»'
  '26':
  - type: text
    content: Alors Pilate leur relâcha Barabbas; et, après avoir fait fouetter Jésus, il le livra à la crucifixion.
  '27':
  - type: text
    content: 'Les soldats du gouverneur conduisirent Jésus dans le prétoire et rassemblèrent toute la troupe autour de lui. '
  '28':
  - type: text
    content: 'Ils lui enlevèrent ses vêtements et lui mirent un manteau écarlate. '
  '29':
  - type: text
    content: 'Ils tressèrent une couronne d''épines qu''ils posèrent sur sa tête, et ils lui mirent un roseau dans la main droite; puis, s''agenouillant devant lui, ils se moquaient de lui en disant: «Salut, roi des Juifs!» '
  '3':
  - type: text
    content: 'Alors Judas, celui qui l''avait trahi, voyant qu''il était condamné, fut pris de remords et rapporta les 30 pièces d''argent aux chefs des prêtres et aux anciens '
  '30':
  - type: text
    content: 'Ils crachaient sur lui, prenaient le roseau et le frappaient sur la tête. '
  '31':
  - type: text
    content: Après s'être ainsi moqués de lui, ils lui enlevèrent le manteau, lui remirent ses vêtements et l'emmenèrent pour le crucifier.
  - type: heading
    content: Crucifixion et mort de Jésus
  '32':
  - type: text
    content: 'Lorsqu''ils sortirent, ils rencontrèrent un homme de Cyrène appelé Simon et le forcèrent à porter la croix de Jésus. '
  '33':
  - type: text
    content: 'Arrivés à un endroit appelé Golgotha – ce qui signifie «lieu du crâne» –, '
  '34':
  - type: text
    content: ils lui donnèrent à boire du vinaigre mêlé de fiel; mais quand il l'eut goûté, il ne voulut pas boire.
  '35':
  - type: text
    content: 'Ils le crucifièrent, puis ils se partagèrent ses vêtements en tirant au sort [afin que s''accomplisse ce que le prophète avait annoncé: '
  - type: text
    content: Ils se sont partagé mes vêtements et ils ont tiré au sort mon habit
  - type: note
    content: 'Ils se sont…mon habit: citation du Psaume 22.19.'
  - type: text
    content: '].'
  '36':
  - type: text
    content: 'Puis ils s''assirent et le gardèrent. '
  '37':
  - type: text
    content: 'Pour indiquer le motif de sa condamnation, on écrivit au-dessus de sa tête: «Celui-ci est Jésus, le roi des Juifs.» '
  '38':
  - type: text
    content: Avec lui furent crucifiés deux brigands, l'un à sa droite et l'autre à sa gauche.
  '39':
  - type: text
    content: 'Les passants l''insultaient et secouaient la tête '
  '4':
  - type: text
    content: 'en disant: «J''ai péché en faisant arrêter un innocent.» Ils répondirent: «En quoi cela nous concerne-t-il? C''est toi que cela regarde.» '
  '40':
  - type: text
    content: 'en disant: «Toi qui détruis le temple et qui le reconstruis en trois jours, sauve-toi toi-même! Si tu es le Fils de Dieu, descends de la croix!» '
  '41':
  - type: text
    content: 'Les chefs des prêtres, avec les spécialistes de la loi et les anciens, se moquaient aussi de lui et disaient: '
  '42':
  - type: text
    content: '«Il en a sauvé d''autres et il ne peut pas se sauver lui-même! S''il est roi d''Israël, qu''il descende maintenant de la croix et nous croirons en lui. '
  '43':
  - type: text
    content: Il s'est confié en Dieu; que Dieu le délivre maintenant, s'il l'aime!
  - type: note
    content: 'Il s''est confié… l''aime: citation du Psaume 22.9.'
  - type: text
    content: ' En effet, il a dit: ‘Je suis le Fils de Dieu.’» '
  '44':
  - type: text
    content: Les brigands crucifiés avec lui l'insultaient eux aussi de la même manière.
  '45':
  - type: text
    content: 'De midi jusqu''à trois heures de l''après-midi, il y eut des ténèbres sur tout le pays. '
  '46':
  - type: text
    content: 'Vers trois heures de l''après-midi, Jésus s''écria d''une voix forte: '
  - type: text
    content: «Eli, Eli, lama sabachthani?»
  - type: text
    content: ' – c''est-à-dire: '
  - type: text
    content: Mon Dieu, mon Dieu, pourquoi m'as-tu abandonné?
  - type: note
    content: 'Mon Dieu… abandonné: citation du Psaume 22.2.'
  - type: text
    content: ' '
  '47':
  - type: text
    content: 'Quelques-uns de ceux qui étaient là, après l''avoir entendu, disaient: «Il appelle Elie.» '
  '48':
  - type: text
    content: 'Aussitôt l''un d''eux courut prendre une éponge qu''il imbiba de vinaigre; il la fixa à un roseau et lui donna à boire. '
  '49':
  - type: text
    content: 'Mais les autres disaient: «Laisse donc, voyons si Elie viendra le sauver.»'
  '5':
  - type: text
    content: 'Judas jeta les pièces d''argent dans le temple, se retira et alla se pendre. '
  '50':
  - type: text
    content: 'Jésus poussa de nouveau un grand cri et rendit l''esprit. '
  '51':
  - type: text
    content: Et voici que le voile du temple
  - type: note
    content: 'Le voile du temple: celui qui séparait le lieu saint du lieu très saint, accessible seulement au grand-prêtre, et ce une fois par an.'
  - type: text
    content: ' se déchira en deux depuis le haut jusqu''en bas, la terre trembla, les rochers se fendirent, '
  '52':
  - type: text
    content: les tombeaux s'ouvrirent et les corps de plusieurs saints
  - type: note
    content: 'Saints: c''est-à-dire croyants.'
  - type: text
    content: ' qui étaient morts ressuscitèrent. '
  '53':
  - type: text
    content: Etant sortis des tombes, ils entrèrent dans la ville sainte après la résurrection de Jésus et apparurent à un grand nombre de personnes.
  '54':
  - type: text
    content: 'A la vue du tremblement de terre et de ce qui venait d''arriver, l''officier romain et ceux qui étaient avec lui pour garder Jésus furent saisis d''une grande frayeur et dirent: «Cet homme était vraiment le Fils de Dieu.»'
  '55':
  - type: text
    content: 'Il y avait là bien des femmes qui regardaient de loin; elles avaient accompagné Jésus depuis la Galilée pour le servir. '
  '56':
  - type: text
    content: Parmi elles figuraient Marie de Magdala, Marie la mère de Jacques et de Joseph, et la mère des fils de Zébédée.
  - type: heading
    content: Mise au tombeau du corps de Jésus
  '57':
  - type: text
    content: 'Le soir venu arriva un homme riche d''Arimathée, du nom de Joseph, qui lui aussi était un disciple de Jésus. '
  '58':
  - type: text
    content: 'Il alla trouver Pilate et demanda le corps de Jésus. Alors Pilate ordonna de le lui remettre. '
  '59':
  - type: text
    content: 'Joseph prit le corps, l''enveloppa dans un drap de lin pur '
  '6':
  - type: text
    content: 'Les chefs des prêtres les ramassèrent en disant: «Il n''est pas permis de les mettre dans le trésor sacré puisque c''est le prix du sang.» '
  '60':
  - type: text
    content: 'et le déposa dans un tombeau neuf qu''il s''était fait creuser dans la roche. Puis il roula une grande pierre à l''entrée du tombeau et s''en alla. '
  '61':
  - type: text
    content: Marie de Magdala et l'autre Marie étaient là, assises vis-à-vis du tombeau.
  '62':
  - type: text
    content: 'Le lendemain, qui était le jour après la préparation du sabbat, les chefs des prêtres et les pharisiens allèrent ensemble chez Pilate '
  '63':
  - type: text
    content: 'et dirent: «Seigneur, nous nous souvenons que cet imposteur a dit, quand il vivait encore: ‘Après trois jours je ressusciterai.’ '
  '64':
  - type: text
    content: 'Ordonne donc que le tombeau soit gardé jusqu''au troisième jour, afin que ses disciples ne viennent pas voler le corps et dire au peuple: ‘Il est ressuscité.’ Cette dernière imposture serait pire que la première.» '
  '65':
  - type: text
    content: 'Pilate leur dit: «Vous avez une garde. Allez-y, gardez-le comme vous le souhaitez!» '
  '66':
  - type: text
    content: Ils s'en allèrent et firent surveiller le tombeau par la garde après avoir scellé la pierre.
  '7':
  - type: text
    content: 'Après en avoir délibéré, ils achetèrent avec cet argent le champ du potier, pour y ensevelir les étrangers. '
  '8':
  - type: text
    content: 'C''est pourquoi ce champ a été appelé «champ du sang» jusqu''à aujourd''hui. '
  '9':
  - type: text
    content: 'Alors s''accomplit ce que le prophète Jérémie avait annoncé: '
  - type: text
    content: Ils ont pris les 30 pièces d'argent, la valeur à laquelle il a été estimé par les Israélites,
  - type: text
    content: ' '
