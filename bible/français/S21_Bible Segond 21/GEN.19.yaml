document_id: GEN.19
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Destruction de Sodome et de Gomorrhe
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les deux anges arrivèrent à Sodome vers le soir. Lot était assis à la porte de la ville. Quand Lot les vit, il se leva pour aller à leur rencontre et se prosterna le visage contre terre. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Puis il dit: «Mes seigneurs, entrez donc chez votre serviteur pour y passer la nuit. Vous vous laverez les pieds, vous vous lèverez de bon matin puis vous poursuivrez votre route.» «Non, répondirent-ils, nous passerons la nuit sur la place.» '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mais Lot insista tellement auprès d'eux qu'ils le suivirent et vinrent chez lui. Il leur prépara un festin, fit cuire des pains sans levain, et ils mangèrent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils n''étaient pas encore couchés que les habitants de la ville, les habitants de Sodome, entourèrent la maison, depuis les enfants jusqu''aux plus âgés. Toute la population était accourue. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ils appelèrent Lot et lui dirent: «Où sont les hommes qui sont entrés chez toi cette nuit? Fais-les sortir vers nous pour que nous couchions avec eux.» '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Lot sortit vers eux à l''entrée de la maison et ferma la porte derrière lui. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il dit: «Mes frères, je vous en prie, ne faites pas le mal! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'J''ai ici deux filles qui sont vierges. Je vous les amènerai dehors et vous leur ferez ce qu''il vous plaira. Seulement, ne faites rien à ces hommes puisqu''ils sont venus s''abriter sous mon toit.» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ils dirent: «Pousse-toi!» Ils ajoutèrent: «Celui-ci est venu séjourner chez nous en étranger et il veut faire le juge! Eh bien, nous te ferons pire qu''à eux.» Ils poussèrent violemment Lot et s''avancèrent pour briser la porte. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Cependant, les hommes tendirent la main, firent rentrer Lot vers eux dans la maison et fermèrent la porte. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Puis ils frappèrent d'aveuglement ceux qui étaient à l'entrée de la maison, depuis le plus petit jusqu'au plus grand, de sorte qu'ils se fatiguèrent de chercher la porte.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les hommes dirent à Lot: «Qui as-tu encore ici? Gendres, fils, filles et tout ce qui t''appartient dans la ville, fais-les sortir de là. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nous allons détruire cet endroit parce que le cri contre ses habitants est grand devant l''Eternel. L''Eternel nous a envoyés pour le détruire.» '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Lot sortit et parla à ses gendres, ceux qui avaient épousé ses filles: «Levez-vous, dit-il, sortez de là, car l''Eternel va détruire la ville.» Mais ses gendres crurent qu''il plaisantait.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Dès l''aube, les anges insistèrent auprès de Lot en disant: «Lève-toi, prends ta femme et tes deux filles qui se trouvent ici, sinon tu disparaîtras dans la punition qui s''abattra sur la ville.» '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Comme il s'attardait, les hommes les prirent par la main, lui, sa femme et ses deux filles, car l'Eternel voulait l'épargner. Ils le firent sortir et le conduisirent à l'extérieur de la ville.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Après les avoir fait sortir, l''un d''eux dit: «Echappe-toi pour sauver ta vie. Ne regarde pas derrière toi et ne t''arrête nulle part dans la plaine. Réfugie-toi dans la montagne, sinon tu disparaîtras.» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Lot leur dit: «Oh, non, Seigneur! '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Moi, ton serviteur, j''ai trouvé grâce à tes yeux et tu as montré la grandeur de ta bonté envers moi en me laissant la vie sauve. Cependant, je ne peux pas me réfugier sur la montagne avant que le désastre m''atteigne, si bien que je mourrai. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Regarde cette ville: elle est assez proche pour que je m''y réfugie et elle est petite. Si seulement je pouvais m''y sauver! N''est-elle pas petite? Ainsi je resterai en vie!» '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il lui dit: «Je t''accorde encore cette faveur et je ne détruirai pas la ville dont tu parles. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dépêche-toi de t'y réfugier, car je ne peux rien faire jusqu'à ce que tu y sois arrivé.» C'est pour cela que l'on a donné à cette ville le nom de Tsoar
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tsoar: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: proche de la racine du verbe hébreu signifiant être petit.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Le soleil se levait sur la terre lorsque Lot entra dans Tsoar. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Alors l''Eternel fit pleuvoir du soufre et du feu sur Sodome et sur Gomorrhe. Cela venait du ciel, de la part de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il détruisit ces villes, toute la plaine, tous les habitants des villes et les plantes du sol. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: La femme de Lot regarda en arrière et se transforma en statue de sel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Abraham se leva de bon matin pour aller à l''endroit où il s''était tenu devant l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Il porta ses regards du côté de Sodome et de Gomorrhe et sur tout le territoire de la plaine, et il vit monter de la terre une fumée pareille à celle d'un fourneau.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Lorsque Dieu détruisit les villes de la plaine, il se souvint d'Abraham, c'est pourquoi il fit échapper Lot au désastre par lequel il bouleversa les villes où celui-ci s'était installé.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendance de Lot
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Lot quitta Tsoar pour la hauteur et s''installa dans la montagne avec ses deux filles, car il avait peur de rester à Tsoar. Il habita dans une grotte avec ses deux filles. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'L''aînée dit à la plus jeune: «Notre père est vieux et il n''y a pas d''homme dans la région pour s''unir à nous comme cela se fait partout. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Viens, faisons boire du vin à notre père et couchons avec lui afin de lui donner une descendance.» '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Elles firent donc boire du vin à leur père cette nuit-là, et l''aînée alla coucher avec son père. Il ne remarqua ni quand elle se coucha, ni quand elle se leva. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Le lendemain, l''aînée dit à la plus jeune: «J''ai couché la nuit dernière avec mon père. Faisons-lui boire du vin cette nuit encore et va coucher avec lui afin que nous lui donnions une descendance.» '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Elles firent boire du vin à leur père cette nuit-là encore, et la cadette alla coucher avec lui. Il ne remarqua ni quand elle se coucha, ni quand elle se leva. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Les deux filles de Lot tombèrent enceintes de leur père. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'L''aînée mit au monde un fils qu''elle appela Moab. C''est l''ancêtre des Moabites, jusqu''à aujourd''hui. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: La plus jeune mit aussi un fils au monde et elle l'appela Ben-Ammi. C'est l'ancêtre des Ammonites, jusqu'à aujourd'hui.
