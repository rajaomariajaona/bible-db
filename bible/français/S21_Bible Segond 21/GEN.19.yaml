document_id: GEN.19,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Destruction de Sodome et de Gomorrhe
  - type: text
    content: 'Les deux anges arrivèrent à Sodome vers le soir. Lot était assis à la porte de la ville. Quand Lot les vit, il se leva pour aller à leur rencontre et se prosterna le visage contre terre. '
  '10':
  - type: text
    content: 'Cependant, les hommes tendirent la main, firent rentrer Lot vers eux dans la maison et fermèrent la porte. '
  '11':
  - type: text
    content: Puis ils frappèrent d'aveuglement ceux qui étaient à l'entrée de la maison, depuis le plus petit jusqu'au plus grand, de sorte qu'ils se fatiguèrent de chercher la porte.
  '12':
  - type: text
    content: 'Les hommes dirent à Lot: «Qui as-tu encore ici? Gendres, fils, filles et tout ce qui t''appartient dans la ville, fais-les sortir de là. '
  '13':
  - type: text
    content: 'Nous allons détruire cet endroit parce que le cri contre ses habitants est grand devant l''Eternel. L''Eternel nous a envoyés pour le détruire.» '
  '14':
  - type: text
    content: 'Lot sortit et parla à ses gendres, ceux qui avaient épousé ses filles: «Levez-vous, dit-il, sortez de là, car l''Eternel va détruire la ville.» Mais ses gendres crurent qu''il plaisantait.'
  '15':
  - type: text
    content: 'Dès l''aube, les anges insistèrent auprès de Lot en disant: «Lève-toi, prends ta femme et tes deux filles qui se trouvent ici, sinon tu disparaîtras dans la punition qui s''abattra sur la ville.» '
  '16':
  - type: text
    content: Comme il s'attardait, les hommes les prirent par la main, lui, sa femme et ses deux filles, car l'Eternel voulait l'épargner. Ils le firent sortir et le conduisirent à l'extérieur de la ville.
  '17':
  - type: text
    content: 'Après les avoir fait sortir, l''un d''eux dit: «Echappe-toi pour sauver ta vie. Ne regarde pas derrière toi et ne t''arrête nulle part dans la plaine. Réfugie-toi dans la montagne, sinon tu disparaîtras.» '
  '18':
  - type: text
    content: 'Lot leur dit: «Oh, non, Seigneur! '
  '19':
  - type: text
    content: 'Moi, ton serviteur, j''ai trouvé grâce à tes yeux et tu as montré la grandeur de ta bonté envers moi en me laissant la vie sauve. Cependant, je ne peux pas me réfugier sur la montagne avant que le désastre m''atteigne, si bien que je mourrai. '
  '2':
  - type: text
    content: 'Puis il dit: «Mes seigneurs, entrez donc chez votre serviteur pour y passer la nuit. Vous vous laverez les pieds, vous vous lèverez de bon matin puis vous poursuivrez votre route.» «Non, répondirent-ils, nous passerons la nuit sur la place.» '
  '20':
  - type: text
    content: 'Regarde cette ville: elle est assez proche pour que je m''y réfugie et elle est petite. Si seulement je pouvais m''y sauver! N''est-elle pas petite? Ainsi je resterai en vie!» '
  '21':
  - type: text
    content: 'Il lui dit: «Je t''accorde encore cette faveur et je ne détruirai pas la ville dont tu parles. '
  '22':
  - type: text
    content: Dépêche-toi de t'y réfugier, car je ne peux rien faire jusqu'à ce que tu y sois arrivé.» C'est pour cela que l'on a donné à cette ville le nom de Tsoar
  - type: note
    content: 'Tsoar: proche de la racine du verbe hébreu signifiant être petit.'
  - type: text
    content: .
  '23':
  - type: text
    content: 'Le soleil se levait sur la terre lorsque Lot entra dans Tsoar. '
  '24':
  - type: text
    content: 'Alors l''Eternel fit pleuvoir du soufre et du feu sur Sodome et sur Gomorrhe. Cela venait du ciel, de la part de l''Eternel. '
  '25':
  - type: text
    content: 'Il détruisit ces villes, toute la plaine, tous les habitants des villes et les plantes du sol. '
  '26':
  - type: text
    content: La femme de Lot regarda en arrière et se transforma en statue de sel.
  '27':
  - type: text
    content: 'Abraham se leva de bon matin pour aller à l''endroit où il s''était tenu devant l''Eternel. '
  '28':
  - type: text
    content: Il porta ses regards du côté de Sodome et de Gomorrhe et sur tout le territoire de la plaine, et il vit monter de la terre une fumée pareille à celle d'un fourneau.
  '29':
  - type: text
    content: Lorsque Dieu détruisit les villes de la plaine, il se souvint d'Abraham, c'est pourquoi il fit échapper Lot au désastre par lequel il bouleversa les villes où celui-ci s'était installé.
  - type: heading
    content: Descendance de Lot
  '3':
  - type: text
    content: Mais Lot insista tellement auprès d'eux qu'ils le suivirent et vinrent chez lui. Il leur prépara un festin, fit cuire des pains sans levain, et ils mangèrent.
  '30':
  - type: text
    content: 'Lot quitta Tsoar pour la hauteur et s''installa dans la montagne avec ses deux filles, car il avait peur de rester à Tsoar. Il habita dans une grotte avec ses deux filles. '
  '31':
  - type: text
    content: 'L''aînée dit à la plus jeune: «Notre père est vieux et il n''y a pas d''homme dans la région pour s''unir à nous comme cela se fait partout. '
  '32':
  - type: text
    content: 'Viens, faisons boire du vin à notre père et couchons avec lui afin de lui donner une descendance.» '
  '33':
  - type: text
    content: 'Elles firent donc boire du vin à leur père cette nuit-là, et l''aînée alla coucher avec son père. Il ne remarqua ni quand elle se coucha, ni quand elle se leva. '
  '34':
  - type: text
    content: 'Le lendemain, l''aînée dit à la plus jeune: «J''ai couché la nuit dernière avec mon père. Faisons-lui boire du vin cette nuit encore et va coucher avec lui afin que nous lui donnions une descendance.» '
  '35':
  - type: text
    content: 'Elles firent boire du vin à leur père cette nuit-là encore, et la cadette alla coucher avec lui. Il ne remarqua ni quand elle se coucha, ni quand elle se leva. '
  '36':
  - type: text
    content: 'Les deux filles de Lot tombèrent enceintes de leur père. '
  '37':
  - type: text
    content: 'L''aînée mit au monde un fils qu''elle appela Moab. C''est l''ancêtre des Moabites, jusqu''à aujourd''hui. '
  '38':
  - type: text
    content: La plus jeune mit aussi un fils au monde et elle l'appela Ben-Ammi. C'est l'ancêtre des Ammonites, jusqu'à aujourd'hui.
  '4':
  - type: text
    content: 'Ils n''étaient pas encore couchés que les habitants de la ville, les habitants de Sodome, entourèrent la maison, depuis les enfants jusqu''aux plus âgés. Toute la population était accourue. '
  '5':
  - type: text
    content: 'Ils appelèrent Lot et lui dirent: «Où sont les hommes qui sont entrés chez toi cette nuit? Fais-les sortir vers nous pour que nous couchions avec eux.» '
  '6':
  - type: text
    content: 'Lot sortit vers eux à l''entrée de la maison et ferma la porte derrière lui. '
  '7':
  - type: text
    content: 'Il dit: «Mes frères, je vous en prie, ne faites pas le mal! '
  '8':
  - type: text
    content: 'J''ai ici deux filles qui sont vierges. Je vous les amènerai dehors et vous leur ferez ce qu''il vous plaira. Seulement, ne faites rien à ces hommes puisqu''ils sont venus s''abriter sous mon toit.» '
  '9':
  - type: text
    content: 'Ils dirent: «Pousse-toi!» Ils ajoutèrent: «Celui-ci est venu séjourner chez nous en étranger et il veut faire le juge! Eh bien, nous te ferons pire qu''à eux.» Ils poussèrent violemment Lot et s''avancèrent pour briser la porte. '
