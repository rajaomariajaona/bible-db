document_id: LUK.20,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Un de ces jours-là, Jésus enseignait le peuple dans le temple et annonçait la bonne nouvelle. Les [chefs des] prêtres et les spécialistes de la loi, avec les anciens, survinrent alors '
  '10':
  - type: text
    content: 'Le moment venu, il envoya un serviteur vers les vignerons pour qu''ils lui donnent sa part de récolte de la vigne. Mais les vignerons le battirent et le renvoyèrent les mains vides. '
  '11':
  - type: text
    content: 'Il envoya encore un autre serviteur; ils le battirent lui aussi, l''insultèrent et le renvoyèrent les mains vides. '
  '12':
  - type: text
    content: 'Il en envoya encore un troisième, mais ils le blessèrent aussi et le chassèrent. '
  '13':
  - type: text
    content: 'Le maître de la vigne se dit alors: ‘Que faire? J''enverrai mon fils bien-aimé, peut-être [en le voyant] auront-ils du respect pour lui.’ '
  '14':
  - type: text
    content: 'Mais quand les vignerons le virent, ils raisonnèrent entre eux et dirent: ‘Voilà l''héritier. Tuons-le, afin que l''héritage soit à nous.’ '
  '15':
  - type: text
    content: 'Ils le jetèrent hors de la vigne et le tuèrent. Maintenant, que leur fera donc le maître de la vigne? '
  '16':
  - type: text
    content: Il viendra, fera mourir ces vignerons et donnera la vigne à d'autres.»
  - type: text
    content: 'En entendant cela, ils dirent: «Certainement pas!» '
  '17':
  - type: text
    content: 'Mais Jésus jeta les regards sur eux et dit: «Que signifie donc ce qui est écrit: '
  - type: text
    content: La pierre qu'ont rejetée ceux qui construisaient est devenue la pierre angulaire
  - type: note
    content: 'La pierre qu''ont… angulaire: citation du Psaume 118.22.'
  - type: text
    content: '? '
  '18':
  - type: text
    content: 'Toute personne qui tombera sur cette pierre s''y brisera, et celui sur qui elle tombera sera écrasé.» '
  '19':
  - type: text
    content: Les chefs des prêtres et les spécialistes de la loi cherchèrent à l'arrêter au moment même, mais ils redoutaient les réactions [du peuple]. Ils avaient compris que c'était pour eux que Jésus avait dit cette parabole.
  - type: heading
    content: Tentatives de piéger Jésus
  '2':
  - type: text
    content: 'et lui dirent: «Dis-nous par quelle autorité tu fais ces choses, ou qui t''a donné cette autorité.» '
  '20':
  - type: text
    content: 'Ils se mirent à observer Jésus et ils envoyèrent des hommes qui faisaient semblant d''être des justes pour le prendre au piège de ses propres paroles, afin de le livrer au pouvoir et à l''autorité du gouverneur. '
  '21':
  - type: text
    content: 'Ils lui posèrent cette question: «Maître, nous savons que tu parles et enseignes avec droiture et que tu ne tiens pas compte de l''apparence, mais que tu enseignes le chemin de Dieu en toute vérité. '
  '22':
  - type: text
    content: 'Nous est-il permis, ou non, de payer l''impôt à l''empereur?» '
  '23':
  - type: text
    content: 'Jésus discerna leur ruse et leur répondit: «[Pourquoi me tendez-vous un piège?] '
  '24':
  - type: text
    content: 'Montrez-moi une pièce de monnaie. De qui porte-t-elle l''effigie et l''inscription?» «De l''empereur», répondirent-ils. '
  '25':
  - type: text
    content: 'Alors il leur dit: «Rendez donc à l''empereur ce qui est à l''empereur et à Dieu ce qui est à Dieu.» '
  '26':
  - type: text
    content: Ils ne purent pas le prendre en défaut dans ce qu'il disait devant le peuple; étonnés de sa réponse, ils gardèrent le silence.
  '27':
  - type: text
    content: Quelques-uns des sadducéens
  - type: note
    content: 'Sadducéens: membres d''un courant du judaïsme souvent associé aux prêtres et à l''aristocratie.'
  - type: text
    content: ', qui disent qu''il n''y a pas de résurrection, s''approchèrent et posèrent à Jésus cette question: '
  '28':
  - type: text
    content: '«Maître, voici ce que Moïse nous a prescrit: '
  - type: text
    content: Si un homme marié meurt sans avoir d'enfants, son frère épousera la veuve et donnera une descendance à son frère
  - type: text
    content: .
  - type: note
    content: 'Si… frère: citation de Deutéronome 25.5-6.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: 'Or, il y avait sept frères. Le premier s''est marié et est mort sans enfants. '
  '3':
  - type: text
    content: 'Il leur répondit: «Je vous poserai moi aussi une question. Dites-moi, '
  '30':
  - type: text
    content: 'Le deuxième [a épousé la veuve et est mort sans enfants], '
  '31':
  - type: text
    content: 'puis le troisième l''a épousée; il en est allé de même pour les sept: ils sont morts sans laisser d''enfants. '
  '32':
  - type: text
    content: 'Enfin, la femme est morte aussi. '
  '33':
  - type: text
    content: 'A la résurrection, duquel d''entre eux sera-t-elle donc la femme? En effet, les sept l''ont eue pour épouse.» '
  '34':
  - type: text
    content: 'Jésus leur répondit: «Les hommes et les femmes de ce monde se marient, '
  '35':
  - type: text
    content: 'mais celles et ceux qui seront jugés dignes de prendre part au monde à venir et à la résurrection ne se marieront pas. '
  '36':
  - type: text
    content: 'Ils ne pourront pas non plus mourir, car ils seront semblables aux anges, et ils seront enfants de Dieu en tant qu''enfants de la résurrection. '
  '37':
  - type: text
    content: 'Que les morts ressuscitent, c''est ce que Moïse a indiqué, dans l''épisode du buisson, quand il appelle le Seigneur '
  - type: text
    content: le Dieu d'Abraham, le Dieu d'Isaac et le Dieu de Jacob
  - type: note
    content: 'Le Dieu… de Jacob: citation d''Exode 3.6. Jésus répond aux sadducéens par un passage tiré des cinq livres de Moïse, car les sadducéens ne reconnaissaient qu''eux comme Ecriture.'
  - type: text
    content: '. '
  '38':
  - type: text
    content: 'Or Dieu n''est pas le Dieu des morts, mais des vivants, car tous sont vivants pour lui.» '
  '39':
  - type: text
    content: 'Quelques spécialistes de la loi prirent la parole et dirent: «Maître, tu as bien parlé», '
  '4':
  - type: text
    content: 'le baptême de Jean venait-il du ciel ou des hommes?» '
  '40':
  - type: text
    content: et ils n'osaient plus lui poser aucune question.
  - type: heading
    content: Reproches de Jésus aux chefs religieux
  '41':
  - type: text
    content: 'Alors Jésus leur dit: «Comment peut-on dire que le Messie est le fils de David'
  - type: note
    content: 'Fils de David: voir la note 18.38.'
  - type: text
    content: '? '
  '42':
  - type: text
    content: 'David lui-même dit [en effet] dans le livre des Psaumes: '
  - type: text
    content: 'Le Seigneur a dit à mon Seigneur: ‘Assieds-toi à ma droite'
  - type: text
    content: ' '
  '43':
  - type: text
    content: jusqu'à ce que j'aie fait de tes ennemis ton marchepied.’
  - type: note
    content: 'Le Seigneur… marchepied: citation du Psaume 110.1.'
  - type: text
    content: ' '
  '44':
  - type: text
    content: David l'appelle donc Seigneur. Comment peut-il être son fils?»
  '45':
  - type: text
    content: 'Tandis que tout le peuple l''écoutait, il dit à ses disciples: '
  '46':
  - type: text
    content: '«Méfiez-vous des spécialistes de la loi qui aiment se promener en longues robes et être salués sur les places publiques; ils recherchent les sièges d''honneur dans les synagogues et les meilleures places dans les festins; '
  '47':
  - type: text
    content: ils dépouillent les veuves de leurs biens tout en faisant pour l'apparence de longues prières. Ils seront jugés plus sévèrement.»
  '5':
  - type: text
    content: 'Mais ils raisonnèrent ainsi entre eux: «Si nous répondons: ‘Du ciel’, il dira: ‘Pourquoi n''avez-vous pas cru en lui?’ '
  '6':
  - type: text
    content: 'Et si nous répondons: ‘Des hommes’, tout le peuple nous lapidera, car il est persuadé que Jean était un prophète.» '
  '7':
  - type: text
    content: 'Alors ils répondirent qu''ils ne savaient pas d''où il venait. '
  '8':
  - type: text
    content: 'Jésus leur dit: «Moi non plus, je ne vous dirai pas par quelle autorité je fais ces choses.»'
  - type: heading
    content: Parabole des vignerons
  '9':
  - type: text
    content: 'Il se mit ensuite à dire cette parabole au peuple: «Un homme planta une vigne, la loua à des vignerons et quitta pour longtemps le pays. '
