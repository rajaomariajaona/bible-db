document_id: LUK.20
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Un de ces jours-là, Jésus enseignait le peuple dans le temple et annonçait la bonne nouvelle. Les [chefs des] prêtres et les spécialistes de la loi, avec les anciens, survinrent alors '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'et lui dirent: «Dis-nous par quelle autorité tu fais ces choses, ou qui t''a donné cette autorité.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il leur répondit: «Je vous poserai moi aussi une question. Dites-moi, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'le baptême de Jean venait-il du ciel ou des hommes?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais ils raisonnèrent ainsi entre eux: «Si nous répondons: ‘Du ciel’, il dira: ‘Pourquoi n''avez-vous pas cru en lui?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et si nous répondons: ‘Des hommes’, tout le peuple nous lapidera, car il est persuadé que Jean était un prophète.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors ils répondirent qu''ils ne savaient pas d''où il venait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jésus leur dit: «Moi non plus, je ne vous dirai pas par quelle autorité je fais ces choses.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parabole des vignerons
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il se mit ensuite à dire cette parabole au peuple: «Un homme planta une vigne, la loua à des vignerons et quitta pour longtemps le pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le moment venu, il envoya un serviteur vers les vignerons pour qu''ils lui donnent sa part de récolte de la vigne. Mais les vignerons le battirent et le renvoyèrent les mains vides. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il envoya encore un autre serviteur; ils le battirent lui aussi, l''insultèrent et le renvoyèrent les mains vides. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il en envoya encore un troisième, mais ils le blessèrent aussi et le chassèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le maître de la vigne se dit alors: ‘Que faire? J''enverrai mon fils bien-aimé, peut-être [en le voyant] auront-ils du respect pour lui.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais quand les vignerons le virent, ils raisonnèrent entre eux et dirent: ‘Voilà l''héritier. Tuons-le, afin que l''héritage soit à nous.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils le jetèrent hors de la vigne et le tuèrent. Maintenant, que leur fera donc le maître de la vigne? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il viendra, fera mourir ces vignerons et donnera la vigne à d'autres.»
- type: usfm
  marker: p
  children:
  - type: text
    text: 'En entendant cela, ils dirent: «Certainement pas!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Mais Jésus jeta les regards sur eux et dit: «Que signifie donc ce qui est écrit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: La pierre qu'ont rejetée ceux qui construisaient est devenue la pierre angulaire
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La pierre qu''ont… angulaire: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 118.22
      metadata:
        usfm: PSA.118.22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Toute personne qui tombera sur cette pierre s''y brisera, et celui sur qui elle tombera sera écrasé.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Les chefs des prêtres et les spécialistes de la loi cherchèrent à l'arrêter au moment même, mais ils redoutaient les réactions [du peuple]. Ils avaient compris que c'était pour eux que Jésus avait dit cette parabole.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tentatives de piéger Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ils se mirent à observer Jésus et ils envoyèrent des hommes qui faisaient semblant d''être des justes pour le prendre au piège de ses propres paroles, afin de le livrer au pouvoir et à l''autorité du gouverneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ils lui posèrent cette question: «Maître, nous savons que tu parles et enseignes avec droiture et que tu ne tiens pas compte de l''apparence, mais que tu enseignes le chemin de Dieu en toute vérité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Nous est-il permis, ou non, de payer l''impôt à l''empereur?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jésus discerna leur ruse et leur répondit: «[Pourquoi me tendez-vous un piège?] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Montrez-moi une pièce de monnaie. De qui porte-t-elle l''effigie et l''inscription?» «De l''empereur», répondirent-ils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Alors il leur dit: «Rendez donc à l''empereur ce qui est à l''empereur et à Dieu ce qui est à Dieu.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ils ne purent pas le prendre en défaut dans ce qu'il disait devant le peuple; étonnés de sa réponse, ils gardèrent le silence.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Quelques-uns des sadducéens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sadducéens: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: membres d'un courant du judaïsme souvent associé aux prêtres et à l'aristocratie.
    marker-yv: yv-n
  - type: text
    text: ', qui disent qu''il n''y a pas de résurrection, s''approchèrent et posèrent à Jésus cette question: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '«Maître, voici ce que Moïse nous a prescrit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Si un homme marié meurt sans avoir d'enfants, son frère épousera la veuve et donnera une descendance à son frère
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Si… frère: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 25.5-6
      metadata:
        usfm: DEU.25.5+DEU.25.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Or, il y avait sept frères. Le premier s''est marié et est mort sans enfants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Le deuxième [a épousé la veuve et est mort sans enfants], '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'puis le troisième l''a épousée; il en est allé de même pour les sept: ils sont morts sans laisser d''enfants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Enfin, la femme est morte aussi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'A la résurrection, duquel d''entre eux sera-t-elle donc la femme? En effet, les sept l''ont eue pour épouse.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jésus leur répondit: «Les hommes et les femmes de ce monde se marient, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'mais celles et ceux qui seront jugés dignes de prendre part au monde à venir et à la résurrection ne se marieront pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ils ne pourront pas non plus mourir, car ils seront semblables aux anges, et ils seront enfants de Dieu en tant qu''enfants de la résurrection. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Que les morts ressuscitent, c''est ce que Moïse a indiqué, dans l''épisode du buisson, quand il appelle le Seigneur '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: le Dieu d'Abraham, le Dieu d'Isaac et le Dieu de Jacob
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.37 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le Dieu… de Jacob: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 3.6
      metadata:
        usfm: EXO.3.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Jésus répond aux sadducéens par un passage tiré des cinq livres de Moïse, car les sadducéens ne reconnaissaient qu'eux comme Ecriture.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Or Dieu n''est pas le Dieu des morts, mais des vivants, car tous sont vivants pour lui.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Quelques spécialistes de la loi prirent la parole et dirent: «Maître, tu as bien parlé», '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: et ils n'osaient plus lui poser aucune question.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Reproches de Jésus aux chefs religieux
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Alors Jésus leur dit: «Comment peut-on dire que le Messie est le fils de David'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.41 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Fils de David: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir la note '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '18.38'
      metadata:
        usfm: LUK.18.38
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'David lui-même dit [en effet] dans le livre des Psaumes: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'Le Seigneur a dit à mon Seigneur: ‘Assieds-toi à ma droite'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: jusqu'à ce que j'aie fait de tes ennemis ton marchepied.’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.42-43 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le Seigneur… marchepied: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 110.1
      metadata:
        usfm: PSA.110.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: David l'appelle donc Seigneur. Comment peut-il être son fils?»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Tandis que tout le peuple l''écoutait, il dit à ses disciples: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: '«Méfiez-vous des spécialistes de la loi qui aiment se promener en longues robes et être salués sur les places publiques; ils recherchent les sièges d''honneur dans les synagogues et les meilleures places dans les festins; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: ils dépouillent les veuves de leurs biens tout en faisant pour l'apparence de longues prières. Ils seront jugés plus sévèrement.»
