document_id: 2CH.6,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Inauguration du temple
  - type: text
    content: 'Alors Salomon dit: «L''Eternel a déclaré vouloir habiter dans l''obscurité. '
  '10':
  - type: text
    content: 'L''Eternel a accompli la parole qu''il avait prononcée: je me suis élevé à la place de mon père David et me suis assis sur le trône d''Israël, comme l''avait annoncé l''Eternel, et j''ai construit cette maison en l''honneur de l''Eternel, le Dieu d''Israël. '
  '11':
  - type: text
    content: J'y ai placé le coffre qui contient l'alliance de l'Eternel, l'alliance qu'il a conclue avec les Israélites.»
  '12':
  - type: text
    content: 'Salomon se plaça devant l''autel de l''Eternel, en face de toute l''assemblée d''Israël, et il tendit ses mains. '
  '13':
  - type: text
    content: 'En effet, il avait fait faire une estrade en bronze et l''avait fait installer au milieu du parvis. Elle faisait 2 mètres et demi de long et de large, et un mètre et demi de haut. Il s''y plaça, se mit à genoux en face de toute l''assemblée d''Israël, tendit ses mains vers le ciel et dit:'
  '14':
  - type: text
    content: '«Eternel, Dieu d''Israël! Il n''y a aucun dieu qui soit ton pareil, ni dans le ciel ni sur la terre: tu gardes ton alliance et ta bonté envers tes serviteurs, envers ceux qui marchent devant toi de tout leur cœur! '
  '15':
  - type: text
    content: 'Ainsi, tu as tenu parole envers ton serviteur David, mon père. Ce que tu avais déclaré de ta bouche, tu l''accomplis aujourd''hui par ta puissance. '
  '16':
  - type: text
    content: 'Maintenant, Eternel, Dieu d''Israël, respecte la promesse que tu as faite à mon père David lorsque tu as dit: ‘*Tu ne manqueras jamais devant moi d''un successeur pour siéger sur le trône d''Israël, pourvu que tes descendants veillent sur leur conduite en suivant ma loi'
  - type: note
    content: 'Tu ne… loi: voir 1 Rois 2.4.'
  - type: text
    content: ', tout comme tu as marché devant moi.’ '
  '17':
  - type: text
    content: Maintenant, qu'elle s'accomplisse, Eternel, Dieu d'Israël, la promesse que tu as faite à ton serviteur David!
  '18':
  - type: text
    content: '»Mais quoi! Dieu pourrait-il vraiment habiter avec l''être humain sur la terre? Puisque ni le ciel ni les cieux des cieux ne peuvent te contenir, cette maison que j''ai construite le pourrait d''autant moins! '
  '19':
  - type: text
    content: 'Toutefois, Eternel, mon Dieu, sois attentif à la prière de ton serviteur, à sa supplication. Ecoute le cri et la prière que je t''adresse, moi ton serviteur. '
  '2':
  - type: text
    content: Et moi, j'ai construit une maison qui sera ta résidence, un endroit où tu habiteras éternellement.»
  '20':
  - type: text
    content: 'Que tes yeux soient jour et nuit ouverts sur cette maison, sur cet endroit, puisque tu as dit vouloir y faire résider ton nom! Ecoute la prière que ton serviteur fait à cet endroit. '
  '21':
  - type: text
    content: Veuille écouter les supplications de ton serviteur et de ton peuple, Israël, lorsqu'ils prieront à cet endroit! Ecoute-les de l'endroit où tu résides, du haut du ciel, écoute-les et pardonne-leur!
  '22':
  - type: text
    content: '»Peut-être quelqu''un péchera-t-il contre son prochain et lui imposera-t-on de prêter serment avec une malédiction. S''il vient jurer devant ton autel, dans cette maison, '
  '23':
  - type: text
    content: 'écoute-le du haut du ciel! Agis et juge tes serviteurs: rends la pareille au coupable en faisant retomber sa conduite sur sa tête, mais rends justice à l''innocent en le traitant conformément à son innocence!'
  '24':
  - type: text
    content: '»Peut-être Israël, ton peuple, connaîtra-t-il la défaite devant l''ennemi pour avoir péché contre toi. S''ils reviennent à toi et célèbrent ton nom, s''ils t''adressent des prières et des supplications dans cette maison, '
  '25':
  - type: text
    content: écoute-les du haut du ciel, pardonne le péché de ton peuple, d'Israël, et ramène-les sur le territoire que tu leur as donné, à eux et à leurs ancêtres!
  '26':
  - type: text
    content: '»Admettons que le ciel soit fermé et qu''il n''y ait plus de pluie à cause de leurs péchés contre toi. S''ils prient alors dans cet endroit et célèbrent ton nom, et s''ils se détournent de leurs péchés parce que tu les auras humiliés, '
  '27':
  - type: text
    content: écoute-les du haut du ciel, pardonne le péché de tes serviteurs et de ton peuple, d'Israël. Oui, enseigne-leur alors la bonne voie, celle dans laquelle ils doivent marcher, et fais venir la pluie sur la terre que tu as donnée en héritage à ton peuple!
  '28':
  - type: text
    content: »Admettons que la famine, la peste, la rouille, la nielle
  - type: note
    content: 'Rouille… nielle: maladies des céréales.'
  - type: text
    content: ' ou les sauterelles d''une espèce ou d''une autre soient dans le pays, que l''ennemi assiège ton peuple dans son pays, dans ses villes, qu''il y ait des fléaux ou des maladies quelconques. '
  '29':
  - type: text
    content: 'Si qui que ce soit, si tout ton peuple, Israël, fait alors entendre des prières et des supplications parce qu''il reconnaît sa blessure et sa douleur, et s''il tend les mains vers cette maison, '
  '3':
  - type: text
    content: 'Puis le roi se retourna et bénit toute l''assemblée d''Israël qui se tenait debout. '
  '30':
  - type: text
    content: 'écoute-le du haut du ciel, de l''endroit où tu résides, et pardonne-lui. Donne à chacun ce que mérite sa conduite, puisque tu connais le cœur de chacun. Oui, toi seul connais le cœur des hommes. '
  '31':
  - type: text
    content: Agis de cette manière et ils te craindront pour marcher dans tes voies tout le temps qu'ils vivront sur le territoire que tu as donné à nos ancêtres!
  '32':
  - type: text
    content: '»Même l''étranger, celui qui n''est pas issu de ton peuple, d''Israël, viendra d''un pays lointain à cause de ta grande réputation, de ta main forte et de ton bras puissant. Quand l''étranger viendra prier dans cette maison, '
  '33':
  - type: text
    content: écoute-le du haut du ciel, de l'endroit où tu résides, et accorde-lui tout ce qu'il te demandera! Ainsi, tous les peuples de la terre connaîtront ton nom et te craindront comme le fait Israël, ton peuple, et ils sauront que ton nom est associé à cette maison que j'ai construite.
  '34':
  - type: text
    content: '»Admettons que ton peuple sorte pour combattre son ennemi en suivant tes directives. S''ils t''adressent alors des prières, les regards tournés vers cette ville, celle que tu as choisie, et vers la maison que j''ai construite en l''honneur de ton nom, '
  '35':
  - type: text
    content: écoute du haut du ciel leurs prières et leurs supplications et fais-leur droit!
  '36':
  - type: text
    content: '»Admettons qu''ils pèchent contre toi – puisqu''il n''y a aucun homme qui ne commette pas de péché – et que tu sois irrité contre eux au point de les livrer à l''ennemi qui les déportera dans un autre pays, lointain ou proche. '
  '37':
  - type: text
    content: 'S''ils se mettent alors à réfléchir dans le pays où ils seront exilés, s''ils reviennent à toi et t''adressent des supplications dans le pays de leur déportation, en disant: ‘Nous avons péché, nous avons commis l''injustice, nous avons fait le mal’, '
  '38':
  - type: text
    content: 'oui, s''ils reviennent à toi de tout leur cœur et de toute leur âme dans le pays de leur déportation, celui où on les aura exilés, s''ils t''adressent des prières, les regards tournés vers leur pays, celui que tu as donné à leurs ancêtres, vers la ville que tu as choisie et vers la maison que j''ai construite en l''honneur de ton nom, '
  '39':
  - type: text
    content: écoute du haut du ciel, de l'endroit où tu résides, leurs prières et leurs supplications et fais-leur droit. Pardonne à ton peuple ses péchés contre toi!
  '4':
  - type: text
    content: 'Il dit: «Béni soit l''Eternel, le Dieu d''Israël, qui de sa bouche a parlé à mon père David et qui accomplit par sa puissance ce qu''il avait déclaré. Il avait dit: '
  '40':
  - type: text
    content: '»Désormais, mon Dieu, que tes yeux soient ouverts et tes oreilles attentives à la prière faite à cet endroit! '
  '41':
  - type: text
    content: 'Et maintenant, *Eternel Dieu, lève-toi, viens à ton lieu de repos, toi et l''arche où réside ta force! Que tes prêtres, Eternel Dieu, aient le salut pour habit et que tes fidèles se réjouissent de leur bonheur! '
  '42':
  - type: text
    content: Eternel Dieu, ne repousse pas celui que tu as désigné par onction, souviens-toi des grâces promises à ton serviteur David!
  - type: note
    content: 'Eternel… David: texte quasi identique au Psaume 132.8-10.'
  - type: text
    content: »
  '5':
  - type: text
    content: '‘Depuis le jour où j''ai fait sortir mon peuple d''Egypte, je n''ai pas choisi de ville parmi toutes les tribus d''Israël pour qu''on y construise une maison où réside mon nom et je n''ai pas choisi d''homme pour qu''il soit le chef de mon peuple, d''Israël, '
  '6':
  - type: text
    content: 'mais j''ai choisi Jérusalem pour que mon nom y réside et j''ai choisi David pour qu''il règne sur mon peuple, Israël.’ '
  '7':
  - type: text
    content: 'David, mon père, avait l''intention de construire une maison en l''honneur de l''Eternel, le Dieu d''Israël, '
  '8':
  - type: text
    content: 'et l''Eternel a dit à mon père David: ‘Tu as eu l''intention de construire une maison en l''honneur de mon nom, et tu as bien fait. '
  '9':
  - type: text
    content: 'Seulement, ce ne sera pas toi qui le feras, ce sera ton fils, celui qui est issu de toi, qui construira cette maison en l''honneur de mon nom.’ '
