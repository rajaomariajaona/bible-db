document_id: EXO.35,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Rappel du sabbat
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Moïse convoqua toute l''assemblée des Israélites et leur dit: «Voici les commandements que l''Eternel ordonne de mettre en pratique. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Que tous ceux parmi vous qui ont de l''habileté viennent et réalisent tout ce que l''Eternel a ordonné: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'le tabernacle, sa tente et sa couverture, ses agrafes, ses planches, ses barres, ses colonnes et ses bases; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'l''arche et ses barres, le propitiatoire, le voile pour cacher l''arche; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'la table, ses barres et tous ses ustensiles, les pains consacrés; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'le chandelier avec ses ustensiles et ses lampes, l''huile pour le chandelier; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'l''autel des parfums et ses barres, l''huile d''onction et le parfum odoriférant, le rideau de la porte pour l''entrée du tabernacle; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'l''autel des holocaustes, sa grille en bronze, ses barres et tous ses ustensiles; la cuve avec sa base; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'les toiles du parvis, ses colonnes, ses bases et le rideau de la porte de cette cour; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'les pieux du tabernacle, ceux du parvis et leurs cordages; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: les vêtements pour le service dans le sanctuaire, les vêtements sacrés pour le grand-prêtre Aaron et les vêtements de ses fils pour leurs fonctions en tant que prêtres.»
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Pendant 6 jours on travaillera, mais le septième jour sera saint pour vous. C''est le sabbat, le jour du repos, consacré à l''Eternel. Celui qui accomplira un travail ce jour-là sera puni de mort. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Toute l''assemblée des Israélites sortit de la présence de Moïse. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Tous ceux qui étaient bien disposés et animés de bonne volonté vinrent apporter une offrande à l''Eternel pour les travaux de la tente de la rencontre, pour tout son service et pour les vêtements sacrés. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Des hommes et des femmes vinrent: tous ceux dont le cœur était bien disposé apportèrent des boucles, des anneaux, des bagues, des bracelets, toutes sortes d''objets en or; chacun présenta l''offrande d''or qu''il avait consacrée à l''Eternel. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Tous ceux qui avaient des étoffes teintes en bleu, en pourpre, en cramoisi, du fin lin et du poil de chèvre, des peaux de béliers teintes en rouge et des peaux de dauphins les apportèrent. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Tous ceux qui prélevèrent de l''argent et du bronze apportèrent cette offrande à l''Eternel. Tous ceux qui avaient du bois d''acacia pour les objets destinés au service l''apportèrent. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Toutes les femmes qui avaient de l''habileté se mirent elles-mêmes au filage et elles apportèrent le résultat de leur travail: des fils teints en bleu, en pourpre, en cramoisi et du fin lin. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Toutes les femmes dont le cœur était bien disposé et qui avaient de l''habileté filèrent du poil de chèvre. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Les chefs du peuple apportèrent des pierres d''onyx et d''autres pierres pour la garniture de l''éphod et du pectoral, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'des aromates et de l''huile pour le chandelier, pour l''huile d''onction et pour le parfum odoriférant. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Tous les Israélites, hommes et femmes, dont le cœur était disposé à contribuer à l'œuvre que l'Eternel avait ordonnée par l'intermédiaire de Moïse apportèrent des offrandes volontaires à l'Eternel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Organisation du travail
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Dans aucun de vos foyers vous n'allumerez de feu le jour du sabbat.»
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Construction du tabernacle
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 35.4–40.38
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Offrandes pour la construction du tabernacle
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Moïse dit aux Israélites: «Sachez que l''Eternel a choisi Betsaleel, fils d''Uri et petit-fils de Hur, de la tribu de Juda. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Il l''a rempli de l''Esprit de Dieu, d''habileté, d''intelligence et de savoir-faire pour toutes sortes de travaux. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Il l''a rendu capable de faire des inventions, de travailler l''or, l''argent et le bronze, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'de graver les pierres à enchâsser, de travailler le bois et de réaliser toutes sortes d''œuvres d''art. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Il lui a accordé aussi le don d''enseigner, de même qu''à Oholiab, fils d''Ahisamac, de la tribu de Dan. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Il les a remplis d'habileté pour réaliser tous les travaux de gravure et d'art, pour broder et tisser les étoffes teintes en bleu, en pourpre, en cramoisi et le fin lin, pour faire toutes sortes de travaux et d'inventions.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Moïse dit à toute l''assemblée des Israélites: «Voici ce que l''Eternel a ordonné. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Prélevez sur ce qui vous appartient une offrande pour l''Eternel. Toute personne dont le cœur est bien disposé apportera en offrande à l''Eternel de l''or, de l''argent et du bronze; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'des étoffes teintes en bleu, en pourpre, en cramoisi, du fin lin et du poil de chèvre; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'des peaux de béliers teintes en rouge et des peaux de dauphins; du bois d''acacia; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'de l''huile pour le chandelier, des aromates pour l''huile d''onction et pour le parfum odoriférant; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'des pierres d''onyx et d''autres pierres pour la garniture de l''éphod et du pectoral. '
