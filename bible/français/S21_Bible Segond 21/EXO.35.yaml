document_id: EXO.35,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Rappel du sabbat
  - type: text
    content: 'Moïse convoqua toute l''assemblée des Israélites et leur dit: «Voici les commandements que l''Eternel ordonne de mettre en pratique. '
  '10':
  - type: text
    content: 'Que tous ceux parmi vous qui ont de l''habileté viennent et réalisent tout ce que l''Eternel a ordonné: '
  '11':
  - type: text
    content: 'le tabernacle, sa tente et sa couverture, ses agrafes, ses planches, ses barres, ses colonnes et ses bases; '
  '12':
  - type: text
    content: 'l''arche et ses barres, le propitiatoire, le voile pour cacher l''arche; '
  '13':
  - type: text
    content: 'la table, ses barres et tous ses ustensiles, les pains consacrés; '
  '14':
  - type: text
    content: 'le chandelier avec ses ustensiles et ses lampes, l''huile pour le chandelier; '
  '15':
  - type: text
    content: 'l''autel des parfums et ses barres, l''huile d''onction et le parfum odoriférant, le rideau de la porte pour l''entrée du tabernacle; '
  '16':
  - type: text
    content: 'l''autel des holocaustes, sa grille en bronze, ses barres et tous ses ustensiles; la cuve avec sa base; '
  '17':
  - type: text
    content: 'les toiles du parvis, ses colonnes, ses bases et le rideau de la porte de cette cour; '
  '18':
  - type: text
    content: 'les pieux du tabernacle, ceux du parvis et leurs cordages; '
  '19':
  - type: text
    content: les vêtements pour le service dans le sanctuaire, les vêtements sacrés pour le grand-prêtre Aaron et les vêtements de ses fils pour leurs fonctions en tant que prêtres.»
  '2':
  - type: text
    content: 'Pendant 6 jours on travaillera, mais le septième jour sera saint pour vous. C''est le sabbat, le jour du repos, consacré à l''Eternel. Celui qui accomplira un travail ce jour-là sera puni de mort. '
  '20':
  - type: text
    content: 'Toute l''assemblée des Israélites sortit de la présence de Moïse. '
  '21':
  - type: text
    content: 'Tous ceux qui étaient bien disposés et animés de bonne volonté vinrent apporter une offrande à l''Eternel pour les travaux de la tente de la rencontre, pour tout son service et pour les vêtements sacrés. '
  '22':
  - type: text
    content: 'Des hommes et des femmes vinrent: tous ceux dont le cœur était bien disposé apportèrent des boucles, des anneaux, des bagues, des bracelets, toutes sortes d''objets en or; chacun présenta l''offrande d''or qu''il avait consacrée à l''Eternel. '
  '23':
  - type: text
    content: 'Tous ceux qui avaient des étoffes teintes en bleu, en pourpre, en cramoisi, du fin lin et du poil de chèvre, des peaux de béliers teintes en rouge et des peaux de dauphins les apportèrent. '
  '24':
  - type: text
    content: 'Tous ceux qui prélevèrent de l''argent et du bronze apportèrent cette offrande à l''Eternel. Tous ceux qui avaient du bois d''acacia pour les objets destinés au service l''apportèrent. '
  '25':
  - type: text
    content: 'Toutes les femmes qui avaient de l''habileté se mirent elles-mêmes au filage et elles apportèrent le résultat de leur travail: des fils teints en bleu, en pourpre, en cramoisi et du fin lin. '
  '26':
  - type: text
    content: 'Toutes les femmes dont le cœur était bien disposé et qui avaient de l''habileté filèrent du poil de chèvre. '
  '27':
  - type: text
    content: 'Les chefs du peuple apportèrent des pierres d''onyx et d''autres pierres pour la garniture de l''éphod et du pectoral, '
  '28':
  - type: text
    content: 'des aromates et de l''huile pour le chandelier, pour l''huile d''onction et pour le parfum odoriférant. '
  '29':
  - type: text
    content: Tous les Israélites, hommes et femmes, dont le cœur était disposé à contribuer à l'œuvre que l'Eternel avait ordonnée par l'intermédiaire de Moïse apportèrent des offrandes volontaires à l'Eternel.
  - type: heading
    content: Organisation du travail
  '3':
  - type: text
    content: Dans aucun de vos foyers vous n'allumerez de feu le jour du sabbat.»
  - type: heading
    content: Construction du tabernacle
  - type: heading
    content: 35.4–40.38
  - type: heading
    content: Offrandes pour la construction du tabernacle
  '30':
  - type: text
    content: 'Moïse dit aux Israélites: «Sachez que l''Eternel a choisi Betsaleel, fils d''Uri et petit-fils de Hur, de la tribu de Juda. '
  '31':
  - type: text
    content: 'Il l''a rempli de l''Esprit de Dieu, d''habileté, d''intelligence et de savoir-faire pour toutes sortes de travaux. '
  '32':
  - type: text
    content: 'Il l''a rendu capable de faire des inventions, de travailler l''or, l''argent et le bronze, '
  '33':
  - type: text
    content: 'de graver les pierres à enchâsser, de travailler le bois et de réaliser toutes sortes d''œuvres d''art. '
  '34':
  - type: text
    content: 'Il lui a accordé aussi le don d''enseigner, de même qu''à Oholiab, fils d''Ahisamac, de la tribu de Dan. '
  '35':
  - type: text
    content: Il les a remplis d'habileté pour réaliser tous les travaux de gravure et d'art, pour broder et tisser les étoffes teintes en bleu, en pourpre, en cramoisi et le fin lin, pour faire toutes sortes de travaux et d'inventions.
  '4':
  - type: text
    content: 'Moïse dit à toute l''assemblée des Israélites: «Voici ce que l''Eternel a ordonné. '
  '5':
  - type: text
    content: 'Prélevez sur ce qui vous appartient une offrande pour l''Eternel. Toute personne dont le cœur est bien disposé apportera en offrande à l''Eternel de l''or, de l''argent et du bronze; '
  '6':
  - type: text
    content: 'des étoffes teintes en bleu, en pourpre, en cramoisi, du fin lin et du poil de chèvre; '
  '7':
  - type: text
    content: 'des peaux de béliers teintes en rouge et des peaux de dauphins; du bois d''acacia; '
  '8':
  - type: text
    content: 'de l''huile pour le chandelier, des aromates pour l''huile d''onction et pour le parfum odoriférant; '
  '9':
  - type: text
    content: 'des pierres d''onyx et d''autres pierres pour la garniture de l''éphod et du pectoral. '
