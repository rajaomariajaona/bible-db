document_id: MAT.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ministère de Jean-Baptiste
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A cette époque-là parut Jean-Baptiste, qui prêchait dans le désert de Judée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il disait: «Changez d''attitude, car le royaume des cieux est proche.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jean est celui que le prophète Esaïe avait annoncé lorsqu''il a dit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'C''est la voix de celui qui crie dans le désert: ‘Préparez le chemin du Seigneur, rendez ses sentiers droits'
  - type: text
    text: .
  - type: usfm
    marker: qt
    children:
    - type: text
      text: ’
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'C''est la voix… droits: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 40.3
      metadata:
        usfm: ISA.40.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jean portait un vêtement en poil de chameau et une ceinture de cuir autour de la taille. Il se nourrissait de sauterelles et de miel sauvage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les habitants de Jérusalem, de toute la Judée et de toute la région du Jourdain se rendaient vers lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Reconnaissant publiquement leurs péchés, ils se faisaient baptiser par lui dans les eaux du Jourdain.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Cependant, quand il vit beaucoup de pharisiens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Pharisiens: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: membres d'un courant du judaïsme caractérisé par un fort intérêt pour les questions de pureté rituelle et par le souci de respecter le plus strictement possible la loi de Moïse ainsi que les traditions.
    marker-yv: yv-n
  - type: text
    text: ' et de sadducéens'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sadducéens: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: membres d'un courant du judaïsme souvent associé aux prêtres et à l'aristocratie.
    marker-yv: yv-n
  - type: text
    text: ' venir se faire baptiser par lui, il leur dit: «Races de vipères, qui vous a appris à fuir la colère à venir? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Produisez donc du fruit qui confirme votre changement d''attitude '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'et ne vous avisez pas de dire en vous-mêmes: ‘Nous avons Abraham pour ancêtre!’ En effet, je vous déclare que de ces pierres Dieu peut faire naître des descendants à Abraham. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Déjà la hache est mise à la racine des arbres; tout arbre qui ne produit pas de bons fruits sera donc coupé et jeté au feu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Moi, je vous baptise d'eau en vue de la repentance
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Repentance: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: même mot grec que changement d'attitude (verset 8); désignant littéralement un changement de pensée, il renvoie à une transformation radicale de la personne, qui renonce à ses attitudes fautives pour adopter un nouveau comportement et une nouvelle perspective, conformes à la volonté de Dieu.
    marker-yv: yv-n
  - type: text
    text: ', mais celui qui vient après moi est plus puissant que moi et je ne suis pas digne de porter ses sandales. Lui, il vous baptisera du Saint-Esprit et de feu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il a sa pelle à la main; il nettoiera son aire de battage et il amassera son blé dans le grenier, mais il brûlera la paille dans un feu qui ne s'éteint pas.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors Jésus vint de la Galilée jusqu''au Jourdain vers Jean, pour être baptisé par lui, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'mais Jean s''y opposait en disant: «C''est moi qui ai besoin d''être baptisé par toi, et c''est toi qui viens vers moi?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jésus lui répondit: «Laisse faire maintenant, car il est convenable que nous accomplissions ainsi tout ce qui est juste», et Jean ne lui résista plus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Dès qu''il fut baptisé, Jésus sortit de l''eau. Alors le ciel s''ouvrit [pour lui] et il vit l''Esprit de Dieu descendre comme une colombe et venir sur lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Au même instant, une voix fit entendre du ciel ces paroles: «Celui-ci est mon Fils bien-aimé, qui a toute mon approbation.»'
