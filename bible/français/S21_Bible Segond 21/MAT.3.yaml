document_id: MAT.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Ministère de Jean-Baptiste
  - type: text
    content: 'A cette époque-là parut Jean-Baptiste, qui prêchait dans le désert de Judée. '
  '10':
  - type: text
    content: 'Déjà la hache est mise à la racine des arbres; tout arbre qui ne produit pas de bons fruits sera donc coupé et jeté au feu. '
  '11':
  - type: text
    content: Moi, je vous baptise d'eau en vue de la repentance
  - type: note
    content: 'Repentance: même mot grec que changement d''attitude (verset 8); désignant littéralement un changement de pensée, il renvoie à une transformation radicale de la personne, qui renonce à ses attitudes fautives pour adopter un nouveau comportement et une nouvelle perspective, conformes à la volonté de Dieu.'
  - type: text
    content: ', mais celui qui vient après moi est plus puissant que moi et je ne suis pas digne de porter ses sandales. Lui, il vous baptisera du Saint-Esprit et de feu. '
  '12':
  - type: text
    content: Il a sa pelle à la main; il nettoiera son aire de battage et il amassera son blé dans le grenier, mais il brûlera la paille dans un feu qui ne s'éteint pas.»
  '13':
  - type: text
    content: 'Alors Jésus vint de la Galilée jusqu''au Jourdain vers Jean, pour être baptisé par lui, '
  '14':
  - type: text
    content: 'mais Jean s''y opposait en disant: «C''est moi qui ai besoin d''être baptisé par toi, et c''est toi qui viens vers moi?» '
  '15':
  - type: text
    content: 'Jésus lui répondit: «Laisse faire maintenant, car il est convenable que nous accomplissions ainsi tout ce qui est juste», et Jean ne lui résista plus. '
  '16':
  - type: text
    content: 'Dès qu''il fut baptisé, Jésus sortit de l''eau. Alors le ciel s''ouvrit [pour lui] et il vit l''Esprit de Dieu descendre comme une colombe et venir sur lui. '
  '17':
  - type: text
    content: 'Au même instant, une voix fit entendre du ciel ces paroles: «Celui-ci est mon Fils bien-aimé, qui a toute mon approbation.»'
  '2':
  - type: text
    content: 'Il disait: «Changez d''attitude, car le royaume des cieux est proche.» '
  '3':
  - type: text
    content: 'Jean est celui que le prophète Esaïe avait annoncé lorsqu''il a dit: '
  - type: text
    content: 'C''est la voix de celui qui crie dans le désert: ‘Préparez le chemin du Seigneur, rendez ses sentiers droits'
  - type: text
    content: .
  - type: text
    content: ’
  - type: note
    content: 'C''est la voix… droits: citation d''Esaïe 40.3.'
  '4':
  - type: text
    content: 'Jean portait un vêtement en poil de chameau et une ceinture de cuir autour de la taille. Il se nourrissait de sauterelles et de miel sauvage. '
  '5':
  - type: text
    content: 'Les habitants de Jérusalem, de toute la Judée et de toute la région du Jourdain se rendaient vers lui. '
  '6':
  - type: text
    content: Reconnaissant publiquement leurs péchés, ils se faisaient baptiser par lui dans les eaux du Jourdain.
  '7':
  - type: text
    content: Cependant, quand il vit beaucoup de pharisiens
  - type: note
    content: 'Pharisiens: membres d''un courant du judaïsme caractérisé par un fort intérêt pour les questions de pureté rituelle et par le souci de respecter le plus strictement possible la loi de Moïse ainsi que les traditions.'
  - type: text
    content: ' et de sadducéens'
  - type: note
    content: 'Sadducéens: membres d''un courant du judaïsme souvent associé aux prêtres et à l''aristocratie.'
  - type: text
    content: ' venir se faire baptiser par lui, il leur dit: «Races de vipères, qui vous a appris à fuir la colère à venir? '
  '8':
  - type: text
    content: 'Produisez donc du fruit qui confirme votre changement d''attitude '
  '9':
  - type: text
    content: 'et ne vous avisez pas de dire en vous-mêmes: ‘Nous avons Abraham pour ancêtre!’ En effet, je vous déclare que de ces pierres Dieu peut faire naître des descendants à Abraham. '
