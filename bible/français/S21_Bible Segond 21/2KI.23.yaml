document_id: 2KI.23,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Le roi Josias fit rassembler vers lui tous les anciens de Juda et de Jérusalem. '
  '10':
  - type: text
    content: 'Le roi rendit Topheth, dans la vallée des fils de Hinnom, impur afin que personne ne fasse plus passer son fils ou sa fille par le feu en l''honneur de Moloc. '
  '11':
  - type: text
    content: 'Il fit disparaître de l''entrée de la maison de l''Eternel les chevaux que les rois de Juda avaient consacrés au soleil, près de la chambre de l''eunuque Nethan-Mélec qui se trouvait dans les annexes, et il brûla au feu les chars du soleil. '
  '12':
  - type: text
    content: 'Le roi démolit les autels qui étaient sur la terrasse de la chambre à l''étage d''Achaz, autels que les rois de Juda avaient fabriqués, ainsi que ceux qu''avait faits Manassé dans les deux parvis de la maison de l''Eternel. Après les avoir brisés et enlevés de là, il jeta leur poussière dans le torrent du Cédron. '
  '13':
  - type: text
    content: Le roi rendit impurs les hauts lieux qui se trouvaient en face de Jérusalem, à droite du mont de la Destruction
  - type: note
    content: 'Mont de la Destruction: c''est-à-dire le mont des Oliviers.'
  - type: text
    content: ', et que Salomon, le roi d''Israël, avait construits en l''honneur d''Astarté, l''abominable déesse des Sidoniens, de Kemosh, l''abominable dieu de Moab, et de Milcom, l''abominable dieu des Ammonites. '
  '14':
  - type: text
    content: 'Il brisa les statues, abattit les poteaux sacrés et remplit d''ossements humains la place qu''ils occupaient. '
  '15':
  - type: text
    content: Il démolit aussi l'autel qui se trouvait à Béthel ainsi que le haut lieu qu'avait fait Jéroboam, fils de Nebath, qui avait fait pécher Israël; il brûla le haut lieu, il le réduisit en cendres, et il brûla le poteau sacré.
  '16':
  - type: text
    content: 'Josias se tourna et vit les tombes qui étaient là dans la montagne; il envoya prendre les ossements des tombes, les brûla sur l''autel et le rendit ainsi impur, conformément à la parole de l''Eternel proclamée par l''homme de Dieu qui avait annoncé ces choses. '
  '17':
  - type: text
    content: 'Puis il demanda: «Quel est ce monument que je vois?» Les habitants de la ville lui répondirent: «C''est le tombeau de l''homme de Dieu qui est venu de Juda et qui a crié contre l''autel de Béthel les choses que tu viens d''accomplir.» '
  '18':
  - type: text
    content: 'Il déclara alors: «Laissez-le, que personne ne remue ses ossements!» On conserva ainsi ses ossements avec ceux du prophète venu de Samarie.'
  '19':
  - type: text
    content: 'Josias fit encore disparaître tous les centres de hauts lieux qui se trouvaient dans les villes de Samarie et que les rois d''Israël avaient établis pour irriter l''Eternel; il fit pour eux tout ce qu''il avait fait à Béthel. '
  '2':
  - type: text
    content: 'Puis il monta à la maison de l''Eternel avec tous les hommes de Juda et tous les habitants de Jérusalem, les prêtres, les prophètes et tout le peuple, du plus petit jusqu''au plus grand. Il lut devant eux toutes les paroles du livre de l''alliance qu''on avait trouvé dans la maison de l''Eternel. '
  '20':
  - type: text
    content: Il sacrifia sur les autels tous les prêtres des hauts lieux qui étaient là et il y brûla des ossements humains. Puis il retourna à Jérusalem.
  '21':
  - type: text
    content: 'Ensuite, le roi donna cet ordre à tout le peuple: «Célébrez la Pâque en l''honneur de l''Eternel, votre Dieu, conformément à ce qui est écrit dans ce livre de l''alliance.» '
  '22':
  - type: text
    content: 'Aucune Pâque pareille à celle-ci n''avait été célébrée depuis l''époque où les juges dirigeaient Israël ni pendant toute l''époque des rois d''Israël et de Juda. '
  '23':
  - type: text
    content: Ce fut la dix-huitième année du règne de Josias qu'on célébra cette Pâque en l'honneur de l'Eternel à Jérusalem.
  '24':
  - type: text
    content: 'De plus, Josias fit disparaître ceux qui invoquaient les esprits et les spirites, ainsi que les théraphim, les idoles et toutes les horreurs qu''on voyait dans le pays de Juda et à Jérusalem. Il fit cela afin de mettre en pratique les paroles de la loi, écrites dans le livre que le prêtre Hilkija avait trouvé dans la maison de l''Eternel. '
  '25':
  - type: text
    content: 'Avant Josias, il n''y eut aucun roi qui, comme lui, revienne à l''Eternel de tout son cœur, de toute son âme et de toute sa force, en se conformant à toute la loi de Moïse; et après lui, il n''en a pas paru de semblable. '
  '26':
  - type: text
    content: 'Toutefois, l''Eternel ne renonça pas à l''ardeur de sa colère. Elle était grandement enflammée contre Juda à cause de tout ce que Manassé avait fait pour l''irriter. '
  '27':
  - type: text
    content: 'Ainsi, l''Eternel dit: «Juda aussi, je vais l''éloigner de moi tout comme j''ai écarté Israël, et je rejetterai cette ville de Jérusalem que j''avais choisie, ainsi que la maison dont j''avais dit: ‘C''est là que résidera mon nom.’»'
  '28':
  - type: text
    content: Le reste des actes de Josias, tout ce qu'il a accompli, cela est décrit dans les annales des rois de Juda.
  '29':
  - type: text
    content: 'A son époque, le pharaon Néco, le roi d''Egypte, monta rejoindre le roi d''Assyrie vers l''Euphrate. Le roi Josias marcha à sa rencontre et le pharaon le tua à Meguiddo dès qu''il le vit. '
  '3':
  - type: text
    content: 'Le roi se tenait sur l''estrade et il conclut une alliance devant l''Eternel: il s''engagea à suivre l''Eternel et à respecter ses commandements, ses instructions et ses prescriptions de tout son cœur et de toute son âme, en mettant en pratique les paroles de cette alliance écrites dans ce livre. Et tout le peuple s''engagea dans cette alliance.'
  '30':
  - type: text
    content: Ses serviteurs l'emportèrent mort sur un char; ils l'amenèrent de Meguiddo à Jérusalem et l'enterrèrent dans son tombeau. Le peuple du pays prit Joachaz, le fils de Josias, pour le consacrer par onction et le faire roi à la place de son père.
  - type: heading
    content: Règne de Joachaz sur Juda
  '31':
  - type: text
    content: Joachaz avait 23 ans lorsqu'il devint roi et il régna 3 mois à Jérusalem. Sa mère s'appelait Hamuthal et c'était la fille de Jérémie, de Libna.
  '32':
  - type: text
    content: 'Il fit ce qui est mal aux yeux de l''Eternel, entièrement comme l''avaient fait ses ancêtres. '
  '33':
  - type: text
    content: 'Le pharaon Néco l''emprisonna à Ribla, dans le pays de Hamath, pour qu''il ne règne plus à Jérusalem et il imposa au pays un tribut de 3000 kilos d''argent et 30 kilos d''or. '
  '34':
  - type: text
    content: 'Le pharaon Néco établit Eliakim, le fils de Josias, roi à la place de son père Josias et il changea son nom en Jojakim. Quant à Joachaz, il le captura et il alla en Egypte où il mourut. '
  '35':
  - type: text
    content: Jojakim donna l'argent et l'or nécessaires au pharaon, mais il taxa le pays pour fournir cet argent, réclamé par le pharaon. Il détermina la part de chacun et exigea du peuple du pays l'argent et l'or qu'il devait livrer au pharaon Néco.
  - type: heading
    content: Règne de Jojakim sur Juda
  '36':
  - type: text
    content: Jojakim avait 25 ans lorsqu'il devint roi et il régna 11 ans à Jérusalem. Sa mère s'appelait Zebudda et c'était la fille de Pedaja, de Ruma.
  '37':
  - type: text
    content: Il fit ce qui est mal aux yeux de l'Eternel, entièrement comme l'avaient fait ses ancêtres.
  '4':
  - type: text
    content: 'Le roi ordonna au grand-prêtre Hilkija, aux prêtres adjoints et aux gardiens de l''entrée de sortir du temple de l''Eternel tous les ustensiles qui avaient été fabriqués pour Baal, pour Astarté et pour tous les corps célestes. Il les brûla à l''extérieur de Jérusalem, dans les champs de la vallée du Cédron, et en fit porter la poussière à Béthel. '
  '5':
  - type: text
    content: 'Il fit disparaître les prêtres d''autres dieux que les rois de Juda avaient établis pour brûler des parfums sur les hauts lieux dans les villes de Juda et aux environs de Jérusalem, ainsi que ceux qui offraient des parfums à Baal, au soleil, à la lune, aux constellations et à tous les corps célestes. '
  '6':
  - type: text
    content: 'Il sortit le poteau sacré de la maison de l''Eternel. Il le transporta à l''extérieur de Jérusalem, vers le torrent du Cédron, et là il le brûla, il le réduisit en cendres qu''il jeta sur les tombes des gens du peuple. '
  '7':
  - type: text
    content: 'Il démolit les logements des prostitués qui se trouvaient dans la maison de l''Eternel et où les femmes tissaient des toiles pour Astarté. '
  '8':
  - type: text
    content: 'Il fit venir tous les prêtres des villes de Juda et il rendit impurs les hauts lieux où les prêtres brûlaient des parfums, depuis Guéba jusqu''à Beer-Shéba; il démolit les hauts lieux des portes, celui qui était à l''entrée de la porte de Josué, le chef de la ville, et celui qui était à gauche de la porte de la ville. '
  '9':
  - type: text
    content: 'Toutefois, les prêtres des hauts lieux ne pouvaient pas monter à l''autel de l''Eternel à Jérusalem, mais ils mangeaient des pains sans levain au milieu de leurs frères. '
