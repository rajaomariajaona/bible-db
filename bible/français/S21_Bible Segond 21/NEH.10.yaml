document_id: NEH.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Engagement envers la loi et le culte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: A cause de tout cela, nous avons conclu un pacte que nous avons mis par écrit, et nos chefs, nos Lévites et nos prêtres y ont apposé leur empreinte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Y ont apposé leur empreinte: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: forme de signature.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici la liste des signataires: Néhémie, fils de Hacalia, le gouverneur; Sédécias, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Seraja, Azaria, Jérémie, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pashhur, Amaria, Malkija, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Hattush, Shebania, Malluc, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Harim, Merémoth, Abdias, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Daniel, Guinnethon, Baruc, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Meshullam, Abija, Mijamin, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Maazia, Bilgaï et Shemaeja, parmi les prêtres; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'parmi les Lévites, Josué, fils d''Azania, Binnuï, qui faisait partie des descendants de Hénadad, et Kadmiel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'ainsi que leurs frères Shebania, Hodija, Kelitha, Pelaja, Hanan, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Michée, Rehob, Hashabia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Zaccur, Shérébia, Shebania, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Hodija, Bani et Beninu; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'parmi les chefs du peuple, Pareosh, Pachath-Moab, Elam, Zatthu, Bani, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Bunni, Azgad, Bébaï, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Adonija, Bigvaï, Adin, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ather, Ezéchias, Azzur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Hodija, Hashum, Betsaï, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hariph, Anathoth, Nébaï, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Magpiash, Meshullam, Hézir, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Meshézabeel, Tsadok, Jaddua, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Pelathia, Hanan, Anaja, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hosée, Hanania, Hashub, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Hallochesh, Pilcha, Shobek, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Rehum, Hashabna, Maaséja, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Achija, Hanan, Anan, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Malluc, Harim et Baana.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Le reste du peuple, les prêtres, les Lévites, les portiers, les musiciens, les serviteurs du temple et tous ceux qui s''étaient séparés des populations installées dans la région pour suivre la loi de Dieu, y compris leurs femmes, leurs fils et leurs filles, tous ceux qui étaient aptes à comprendre, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'ont apporté leur soutien à leurs frères les plus influents. Ils se sont engagés, sous peine de malédiction et avec serment, à marcher suivant la loi de Dieu donnée par l''intermédiaire de son serviteur Moïse, à respecter et à mettre en pratique tous les commandements, les règles et les prescriptions de l''Eternel, notre Seigneur:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '«Nous nous engageons à ne pas donner nos filles en mariage aux peuples qui habitent le pays et à ne pas prendre leurs filles comme femmes pour nos fils, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: à ne leur acheter, le jour du sabbat et les jours de fête, aucune des marchandises ou des céréales qu'ils amèneraient le jour du sabbat pour les vendre, à respecter le répit de la septième année et à renoncer au paiement de toute dette.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '»Nous nous imposons aussi des commandements par lesquels nous nous obligeons à donner 4 grammes d''argent par an pour le service de la maison de notre Dieu, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'pour les pains consacrés, pour l''offrande perpétuelle, pour l''holocauste perpétuel des sabbats, des débuts de mois et des fêtes, pour les éléments consacrés, pour les sacrifices d''expiation en faveur d''Israël et pour toute l''activité de la maison de notre Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Nous avons tiré au sort entre prêtres, Lévites et membres du peuple pour déterminer quelle famille devait apporter, et à quel moment fixe de chaque année, l'offrande de bois destinée à la maison de notre Dieu. Ce bois est celui qui doit brûler sur l'autel de l'Eternel, notre Dieu, conformément à ce qui est écrit dans la loi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: '»Nous nous engageons à amener chaque année à la maison de l''Eternel les premiers produits de notre sol et les premiers fruits de tous les arbres, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ainsi que les premiers-nés de nos fils et de nos animaux, conformément à ce qui est écrit dans la loi, à amener à la maison de notre Dieu, aux prêtres qui y font le service, les premiers-nés de notre petit et de notre gros bétail.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: '»Nous apporterons aux prêtres, en les déposant dans les salles de la maison de notre Dieu, notre première fournée, nos offrandes, des fruits de tous les arbres, du vin nouveau et de l''huile et nous donnerons la dîme des produits de notre sol aux Lévites; ces derniers devront la prendre eux-mêmes dans toutes les villes situées sur les terres que nous cultivons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Le prêtre en service issu d''Aaron devra accompagner les Lévites quand ils prélèveront la dîme, et ceux-ci devront apporter la dîme de cette dîme à la maison de notre Dieu, dans les salles de la maison du trésor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: En effet, c'est dans ces salles que les Israélites et les Lévites doivent apporter les prélèvements de blé, de vin nouveau et d'huile; c'est là que se trouvent les ustensiles du sanctuaire et que se tiennent les prêtres qui font le service, les portiers et les musiciens. Nous n'abandonnerons pas la maison de notre Dieu.»
