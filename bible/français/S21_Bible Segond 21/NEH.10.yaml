document_id: NEH.10,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Engagement envers la loi et le culte
  - type: text
    content: A cause de tout cela, nous avons conclu un pacte que nous avons mis par écrit, et nos chefs, nos Lévites et nos prêtres y ont apposé leur empreinte
  - type: note
    content: 'Y ont apposé leur empreinte: forme de signature.'
  - type: text
    content: .
  '10':
  - type: text
    content: 'parmi les Lévites, Josué, fils d''Azania, Binnuï, qui faisait partie des descendants de Hénadad, et Kadmiel, '
  '11':
  - type: text
    content: 'ainsi que leurs frères Shebania, Hodija, Kelitha, Pelaja, Hanan, '
  '12':
  - type: text
    content: 'Michée, Rehob, Hashabia, '
  '13':
  - type: text
    content: 'Zaccur, Shérébia, Shebania, '
  '14':
  - type: text
    content: 'Hodija, Bani et Beninu; '
  '15':
  - type: text
    content: 'parmi les chefs du peuple, Pareosh, Pachath-Moab, Elam, Zatthu, Bani, '
  '16':
  - type: text
    content: 'Bunni, Azgad, Bébaï, '
  '17':
  - type: text
    content: 'Adonija, Bigvaï, Adin, '
  '18':
  - type: text
    content: 'Ather, Ezéchias, Azzur, '
  '19':
  - type: text
    content: 'Hodija, Hashum, Betsaï, '
  '2':
  - type: text
    content: 'Voici la liste des signataires: Néhémie, fils de Hacalia, le gouverneur; Sédécias, '
  '20':
  - type: text
    content: 'Hariph, Anathoth, Nébaï, '
  '21':
  - type: text
    content: 'Magpiash, Meshullam, Hézir, '
  '22':
  - type: text
    content: 'Meshézabeel, Tsadok, Jaddua, '
  '23':
  - type: text
    content: 'Pelathia, Hanan, Anaja, '
  '24':
  - type: text
    content: 'Hosée, Hanania, Hashub, '
  '25':
  - type: text
    content: 'Hallochesh, Pilcha, Shobek, '
  '26':
  - type: text
    content: 'Rehum, Hashabna, Maaséja, '
  '27':
  - type: text
    content: 'Achija, Hanan, Anan, '
  '28':
  - type: text
    content: Malluc, Harim et Baana.
  '29':
  - type: text
    content: 'Le reste du peuple, les prêtres, les Lévites, les portiers, les musiciens, les serviteurs du temple et tous ceux qui s''étaient séparés des populations installées dans la région pour suivre la loi de Dieu, y compris leurs femmes, leurs fils et leurs filles, tous ceux qui étaient aptes à comprendre, '
  '3':
  - type: text
    content: 'Seraja, Azaria, Jérémie, '
  '30':
  - type: text
    content: 'ont apporté leur soutien à leurs frères les plus influents. Ils se sont engagés, sous peine de malédiction et avec serment, à marcher suivant la loi de Dieu donnée par l''intermédiaire de son serviteur Moïse, à respecter et à mettre en pratique tous les commandements, les règles et les prescriptions de l''Eternel, notre Seigneur:'
  '31':
  - type: text
    content: '«Nous nous engageons à ne pas donner nos filles en mariage aux peuples qui habitent le pays et à ne pas prendre leurs filles comme femmes pour nos fils, '
  '32':
  - type: text
    content: à ne leur acheter, le jour du sabbat et les jours de fête, aucune des marchandises ou des céréales qu'ils amèneraient le jour du sabbat pour les vendre, à respecter le répit de la septième année et à renoncer au paiement de toute dette.
  '33':
  - type: text
    content: '»Nous nous imposons aussi des commandements par lesquels nous nous obligeons à donner 4 grammes d''argent par an pour le service de la maison de notre Dieu, '
  '34':
  - type: text
    content: 'pour les pains consacrés, pour l''offrande perpétuelle, pour l''holocauste perpétuel des sabbats, des débuts de mois et des fêtes, pour les éléments consacrés, pour les sacrifices d''expiation en faveur d''Israël et pour toute l''activité de la maison de notre Dieu. '
  '35':
  - type: text
    content: Nous avons tiré au sort entre prêtres, Lévites et membres du peuple pour déterminer quelle famille devait apporter, et à quel moment fixe de chaque année, l'offrande de bois destinée à la maison de notre Dieu. Ce bois est celui qui doit brûler sur l'autel de l'Eternel, notre Dieu, conformément à ce qui est écrit dans la loi.
  '36':
  - type: text
    content: '»Nous nous engageons à amener chaque année à la maison de l''Eternel les premiers produits de notre sol et les premiers fruits de tous les arbres, '
  '37':
  - type: text
    content: ainsi que les premiers-nés de nos fils et de nos animaux, conformément à ce qui est écrit dans la loi, à amener à la maison de notre Dieu, aux prêtres qui y font le service, les premiers-nés de notre petit et de notre gros bétail.
  '38':
  - type: text
    content: '»Nous apporterons aux prêtres, en les déposant dans les salles de la maison de notre Dieu, notre première fournée, nos offrandes, des fruits de tous les arbres, du vin nouveau et de l''huile et nous donnerons la dîme des produits de notre sol aux Lévites; ces derniers devront la prendre eux-mêmes dans toutes les villes situées sur les terres que nous cultivons. '
  '39':
  - type: text
    content: 'Le prêtre en service issu d''Aaron devra accompagner les Lévites quand ils prélèveront la dîme, et ceux-ci devront apporter la dîme de cette dîme à la maison de notre Dieu, dans les salles de la maison du trésor. '
  '4':
  - type: text
    content: 'Pashhur, Amaria, Malkija, '
  '40':
  - type: text
    content: En effet, c'est dans ces salles que les Israélites et les Lévites doivent apporter les prélèvements de blé, de vin nouveau et d'huile; c'est là que se trouvent les ustensiles du sanctuaire et que se tiennent les prêtres qui font le service, les portiers et les musiciens. Nous n'abandonnerons pas la maison de notre Dieu.»
  '5':
  - type: text
    content: 'Hattush, Shebania, Malluc, '
  '6':
  - type: text
    content: 'Harim, Merémoth, Abdias, '
  '7':
  - type: text
    content: 'Daniel, Guinnethon, Baruc, '
  '8':
  - type: text
    content: 'Meshullam, Abija, Mijamin, '
  '9':
  - type: text
    content: 'Maazia, Bilgaï et Shemaeja, parmi les prêtres; '
