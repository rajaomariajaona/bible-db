document_id: JHN.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Jésus et Nicodème: la nouvelle naissance'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Or, il y avait parmi les pharisiens un homme du nom de Nicodème, un chef des Juifs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il vint de nuit trouver Jésus et lui dit: «Maître, nous savons que tu es un enseignant envoyé par Dieu, car personne ne peut faire ces signes miraculeux que tu fais si Dieu n''est pas avec lui.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jésus lui répondit: «En vérité, en vérité, je te le dis, à moins de naître de nouveau'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'De nouveau: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ou d'en haut (idem verset 7); alors que Nicodème comprend manifestement l'expression dans le premier sens (cf. verset 4), la réponse de Jésus semble jouer sur sa double signification.
    marker-yv: yv-n
  - type: text
    text: ', personne ne peut voir le royaume de Dieu.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nicodème lui dit: «Comment un homme peut-il naître quand il est vieux? Peut-il une seconde fois entrer dans le ventre de sa mère et naître?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jésus répondit: «En vérité, en vérité, je te le dis, à moins de naître d''eau et d''Esprit, on ne peut entrer dans le royaume de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ce qui est né de parents humains est humain et ce qui est né de l''Esprit est Esprit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ne t''étonne pas que je t''aie dit: ‘Il faut que vous naissiez de nouveau.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le vent souffle où il veut et tu en entends le bruit, mais tu ne sais pas d''où il vient, ni où il va. C''est aussi le cas de toute personne qui est née de l''Esprit.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nicodème reprit la parole et lui dit: «Comment cela peut-il se faire?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jésus lui répondit: «Tu es l''enseignant d''Israël et tu ne sais pas cela! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'En vérité, en vérité, je te le dis, nous disons ce que nous savons et nous rendons témoignage de ce que nous avons vu, et vous ne recevez pas notre témoignage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Si vous ne croyez pas quand je vous parle des réalités terrestres, comment croirez-vous si je vous parle des réalités célestes? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Personne n'est monté au ciel, sinon celui qui est descendu du ciel, le Fils de l'homme [qui est dans le ciel].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: »Et tout comme Moïse a élevé le serpent dans le désert
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Moïse… désert: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'allusion à l''épisode de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Nombres 21.4-9
      metadata:
        usfm: NUM.21.4+NUM.21.5+NUM.21.6+NUM.21.7+NUM.21.8+NUM.21.9
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' où les Israélites devaient regarder un serpent en bronze dressé sur une perche pour être guéris de la morsure de serpents.'
    marker-yv: yv-n
  - type: text
    text: ', il faut aussi que le Fils de l''homme soit élevé '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'afin que quiconque croit en lui [ne périsse pas mais qu''il] ait la vie éternelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'En effet, Dieu a tant aimé le monde qu''il a donné son Fils unique afin que quiconque croit en lui ne périsse pas mais ait la vie éternelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dieu, en effet, n''a pas envoyé son Fils dans le monde pour juger le monde, mais pour que le monde soit sauvé par lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Celui qui croit en lui n''est pas jugé, mais celui qui ne croit pas est déjà jugé parce qu''il n''a pas cru au nom du Fils unique de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Et voici quel est ce jugement: la lumière est venue dans le monde et les hommes ont préféré les ténèbres à la lumière parce que leur manière d''agir était mauvaise. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'En effet, toute personne qui fait le mal déteste la lumière, et elle ne vient pas à la lumière pour éviter que ses actes soient dévoilés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mais celui qui agit conformément à la vérité vient à la lumière afin qu'il soit évident que ce qu'il a fait, il l'a fait en Dieu.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nouveau témoignage de Jean-Baptiste
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Après cela, Jésus, accompagné de ses disciples, se rendit en Judée; il y séjourna avec eux et il baptisait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jean aussi baptisait à Enon, près de Salim, parce qu''il y avait là beaucoup d''eau, et l''on s''y rendait pour être baptisé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: En effet, Jean n'avait pas encore été mis en prison.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Or, une discussion surgit entre les disciples de Jean et un Juif au sujet de la purification. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ils vinrent trouver Jean et lui dirent: «Maître, celui qui était avec toi de l''autre côté du Jourdain et à qui tu as rendu témoignage, le voilà qui baptise, et tous vont vers lui.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Jean répondit: «Un homme ne peut recevoir que ce qui lui a été donné du ciel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Vous-mêmes m''êtes témoins que j''ai dit: ‘Moi, je ne suis pas le Messie, mais j''ai été envoyé devant lui.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Celui qui a la mariée, c''est le marié, mais l''ami du marié, qui se tient là et qui l''entend, éprouve une grande joie à cause de la voix du marié. Ainsi donc, cette joie qui est la mienne est parfaite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Il faut qu''il grandisse et que moi, je diminue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Celui qui vient d''en haut est au-dessus de tous; celui qui est de la terre est de la terre et il parle des réalités terrestres. Celui qui vient du ciel est au-dessus de tous, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'il rend témoignage de ce qu''il a vu et entendu, et personne n''accepte son témoignage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Celui qui a accepté son témoignage a certifié que Dieu est vrai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'En effet, celui que Dieu a envoyé dit les paroles de Dieu, parce que Dieu lui donne l''Esprit sans mesure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Le Père aime le Fils et a tout remis entre ses mains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Celui qui croit au Fils a la vie éternelle; celui qui ne croit pas au Fils ne verra pas la vie, mais la colère de Dieu reste au contraire sur lui.»
