document_id: PSA.100
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Appel à louer l'Eternel
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Psaume de reconnaissance.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Poussez des cris de joie en l'honneur de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: habitants de toute la terre!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Servez l'Eternel avec joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: venez avec allégresse en sa présence!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Sachez que l'Eternel est Dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'C''est lui qui nous a faits, et nous lui appartenons:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous sommes son peuple, le troupeau dont il est le berger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Entrez dans ses portes avec reconnaissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans ses parvis avec des chants de louange!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Célébrez-le, bénissez son nom,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'car l''Eternel est bon: sa bonté dure éternellement,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa fidélité de génération en génération.
