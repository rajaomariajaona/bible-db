document_id: PSA.100,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Appel à louer l'Eternel
  - type: text
    content: Psaume de reconnaissance.
  - type: text
    content: Poussez des cris de joie en l'honneur de l'Eternel,
  - type: text
    content: habitants de toute la terre!
  '2':
  - type: text
    content: Servez l'Eternel avec joie,
  - type: text
    content: venez avec allégresse en sa présence!
  '3':
  - type: text
    content: Sachez que l'Eternel est Dieu!
  - type: text
    content: 'C''est lui qui nous a faits, et nous lui appartenons:'
  - type: text
    content: nous sommes son peuple, le troupeau dont il est le berger.
  '4':
  - type: text
    content: Entrez dans ses portes avec reconnaissance,
  - type: text
    content: dans ses parvis avec des chants de louange!
  - type: text
    content: Célébrez-le, bénissez son nom,
  '5':
  - type: text
    content: 'car l''Eternel est bon: sa bonté dure éternellement,'
  - type: text
    content: et sa fidélité de génération en génération.
