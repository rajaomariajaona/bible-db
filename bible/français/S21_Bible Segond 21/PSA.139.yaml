document_id: PSA.139,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Science infinie de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Au chef de chœur. Psaume de David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, tu m'examines et tu me connais,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: là aussi ta main me conduira,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ta main droite m'empoignera.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Si je me dis: «Au moins les ténèbres me couvriront»,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la nuit devient lumière autour de moi!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Même les ténèbres ne sont pas obscures pour toi:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la nuit brille comme le jour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les ténèbres comme la lumière.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est toi qui as formé mes reins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui m'as tissé dans le ventre de ma mère.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te loue de ce que je suis une créature si merveilleuse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes œuvres sont admirables,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je le reconnais bien.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon corps n'était pas caché devant toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsque j'ai été fait dans le secret,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tissé dans les profondeurs de la terre.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je n'étais encore qu'une masse informe, mais tes yeux me voyaient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sur ton livre étaient inscrits
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les jours qui m'étaient destinés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant qu'un seul d'entre eux n'existe.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tes pensées, ô Dieu, me semblent impénétrables!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que leur nombre est grand!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment les compter? Elles sont plus nombreuses que les grains de sable.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je me réveille, et je suis encore avec toi.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Dieu, si seulement tu faisais mourir le méchant!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Hommes sanguinaires, éloignez-vous de moi!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu sais quand je m'assieds et quand je me lève,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu discernes de loin ma pensée.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils parlent de toi pour appuyer leurs projets criminels,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils utilisent ton nom pour mentir, eux, tes ennemis!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, comment pourrais-je ne pas détester ceux qui te détestent, n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: e pas éprouver du dégoût pour ceux qui te combattent?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les déteste de façon absolue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont pour moi des ennemis.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Examine-moi, ô Dieu, et connais mon cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mets-moi à l'épreuve et connais mes pensées!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Regarde si je suis sur une mauvaise voie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et conduis-moi sur la voie de l'éternité!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu sais quand je marche et quand je me couche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et toutes mes voies te sont familières.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La parole n'est pas encore sur ma langue
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que déjà, Eternel, tu la connais entièrement.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu m'entoures par-derrière et par-devant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu mets ta main sur moi.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une telle connaissance est trop extraordinaire pour moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle est trop élevée pour que je puisse l'atteindre.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où pourrais-je aller loin de ton Esprit, où pourrais-je fuir loin de ta présence?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si je monte au ciel, tu es là;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si je me couche au séjour des morts, te voilà.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si je prends les ailes de l'aurore
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour habiter à l'extrémité de la mer,
