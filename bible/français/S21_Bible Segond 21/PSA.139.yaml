document_id: PSA.139,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Science infinie de Dieu
  - type: text
    content: Au chef de chœur. Psaume de David.
  - type: text
    content: Eternel, tu m'examines et tu me connais,
  '10':
  - type: text
    content: là aussi ta main me conduira,
  - type: text
    content: ta main droite m'empoignera.
  '11':
  - type: text
    content: 'Si je me dis: «Au moins les ténèbres me couvriront»,'
  - type: text
    content: la nuit devient lumière autour de moi!
  '12':
  - type: text
    content: 'Même les ténèbres ne sont pas obscures pour toi:'
  - type: text
    content: la nuit brille comme le jour,
  - type: text
    content: et les ténèbres comme la lumière.
  '13':
  - type: text
    content: C'est toi qui as formé mes reins,
  - type: text
    content: qui m'as tissé dans le ventre de ma mère.
  '14':
  - type: text
    content: Je te loue de ce que je suis une créature si merveilleuse.
  - type: text
    content: Tes œuvres sont admirables,
  - type: text
    content: et je le reconnais bien.
  '15':
  - type: text
    content: Mon corps n'était pas caché devant toi
  - type: text
    content: lorsque j'ai été fait dans le secret,
  - type: text
    content: tissé dans les profondeurs de la terre.
  '16':
  - type: text
    content: Je n'étais encore qu'une masse informe, mais tes yeux me voyaient,
  - type: text
    content: et sur ton livre étaient inscrits
  - type: text
    content: tous les jours qui m'étaient destinés
  - type: text
    content: avant qu'un seul d'entre eux n'existe.
  '17':
  - type: text
    content: Que tes pensées, ô Dieu, me semblent impénétrables!
  - type: text
    content: Que leur nombre est grand!
  '18':
  - type: text
    content: Comment les compter? Elles sont plus nombreuses que les grains de sable.
  - type: text
    content: Je me réveille, et je suis encore avec toi.
  '19':
  - type: text
    content: O Dieu, si seulement tu faisais mourir le méchant!
  - type: text
    content: Hommes sanguinaires, éloignez-vous de moi!
  '2':
  - type: text
    content: tu sais quand je m'assieds et quand je me lève,
  - type: text
    content: tu discernes de loin ma pensée.
  '20':
  - type: text
    content: Ils parlent de toi pour appuyer leurs projets criminels,
  - type: text
    content: ils utilisent ton nom pour mentir, eux, tes ennemis!
  '21':
  - type: text
    content: Eternel, comment pourrais-je ne pas détester ceux qui te détestent, n
  - type: text
    content: e pas éprouver du dégoût pour ceux qui te combattent?
  '22':
  - type: text
    content: Je les déteste de façon absolue,
  - type: text
    content: ils sont pour moi des ennemis.
  '23':
  - type: text
    content: Examine-moi, ô Dieu, et connais mon cœur,
  - type: text
    content: mets-moi à l'épreuve et connais mes pensées!
  '24':
  - type: text
    content: Regarde si je suis sur une mauvaise voie
  - type: text
    content: et conduis-moi sur la voie de l'éternité!
  '3':
  - type: text
    content: Tu sais quand je marche et quand je me couche,
  - type: text
    content: et toutes mes voies te sont familières.
  '4':
  - type: text
    content: La parole n'est pas encore sur ma langue
  - type: text
    content: que déjà, Eternel, tu la connais entièrement.
  '5':
  - type: text
    content: Tu m'entoures par-derrière et par-devant,
  - type: text
    content: et tu mets ta main sur moi.
  '6':
  - type: text
    content: Une telle connaissance est trop extraordinaire pour moi,
  - type: text
    content: elle est trop élevée pour que je puisse l'atteindre.
  '7':
  - type: text
    content: Où pourrais-je aller loin de ton Esprit, où pourrais-je fuir loin de ta présence?
  '8':
  - type: text
    content: Si je monte au ciel, tu es là;
  - type: text
    content: si je me couche au séjour des morts, te voilà.
  '9':
  - type: text
    content: Si je prends les ailes de l'aurore
  - type: text
    content: pour habiter à l'extrémité de la mer,
