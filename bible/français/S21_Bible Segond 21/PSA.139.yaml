document_id: PSA.139
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Science infinie de Dieu
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, tu m'examines et tu me connais,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: tu sais quand je m'assieds et quand je me lève,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu discernes de loin ma pensée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tu sais quand je marche et quand je me couche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toutes mes voies te sont familières.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: La parole n'est pas encore sur ma langue
- type: usfm
  marker: q1
  children:
  - type: text
    text: que déjà, Eternel, tu la connais entièrement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu m'entoures par-derrière et par-devant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu mets ta main sur moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Une telle connaissance est trop extraordinaire pour moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle est trop élevée pour que je puisse l'atteindre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Où pourrais-je aller loin de ton Esprit, où pourrais-je fuir loin de ta présence?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Si je monte au ciel, tu es là;
- type: usfm
  marker: q1
  children:
  - type: text
    text: si je me couche au séjour des morts, te voilà.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Si je prends les ailes de l'aurore
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour habiter à l'extrémité de la mer,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: là aussi ta main me conduira,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta main droite m'empoignera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Si je me dis: «Au moins les ténèbres me couvriront»,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: la nuit devient lumière autour de moi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Même les ténèbres ne sont pas obscures pour toi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: la nuit brille comme le jour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les ténèbres comme la lumière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: C'est toi qui as formé mes reins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui m'as tissé dans le ventre de ma mère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je te loue de ce que je suis une créature si merveilleuse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes œuvres sont admirables,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je le reconnais bien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mon corps n'était pas caché devant toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: lorsque j'ai été fait dans le secret,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tissé dans les profondeurs de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Je n'étais encore qu'une masse informe, mais tes yeux me voyaient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sur ton livre étaient inscrits
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les jours qui m'étaient destinés
- type: usfm
  marker: q1
  children:
  - type: text
    text: avant qu'un seul d'entre eux n'existe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Que tes pensées, ô Dieu, me semblent impénétrables!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que leur nombre est grand!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Comment les compter? Elles sont plus nombreuses que les grains de sable.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je me réveille, et je suis encore avec toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: O Dieu, si seulement tu faisais mourir le méchant!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Hommes sanguinaires, éloignez-vous de moi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ils parlent de toi pour appuyer leurs projets criminels,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils utilisent ton nom pour mentir, eux, tes ennemis!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Eternel, comment pourrais-je ne pas détester ceux qui te détestent, n
- type: usfm
  marker: q1
  children:
  - type: text
    text: e pas éprouver du dégoût pour ceux qui te combattent?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Je les déteste de façon absolue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sont pour moi des ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Examine-moi, ô Dieu, et connais mon cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mets-moi à l'épreuve et connais mes pensées!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Regarde si je suis sur une mauvaise voie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et conduis-moi sur la voie de l'éternité!
