document_id: HOS.4,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Péché et jugement d'Israël
  - type: heading
    content: 4.1–10.15
  - type: heading
    content: Reproches contre l'idolâtrie
  - type: text
    content: Ecoutez la parole de l'Eternel, Israélites,
  - type: text
    content: 'car l''Eternel a un procès avec les habitants du pays:'
  - type: text
    content: il n'y a pas de vérité, pas de bonté,
  - type: text
    content: pas de connaissance de Dieu dans le pays.
  '10':
  - type: text
    content: Ils mangeront sans se rassasier,
  - type: text
    content: ils se prostitueront sans se multiplier,
  - type: text
    content: parce qu'ils ont cessé de respecter l'Eternel.
  '11':
  - type: text
    content: La prostitution, le vieux vin et le vin nouveau font perdre la raison.
  '12':
  - type: text
    content: Mon peuple consulte son bois,
  - type: text
    content: et c'est son bâton qui lui parle!
  - type: text
    content: En effet, l'esprit de prostitution égare,
  - type: text
    content: et ils se prostituent loin de leur Dieu.
  '13':
  - type: text
    content: Ils offrent des sacrifices sur le sommet des montagnes,
  - type: text
    content: ils font brûler de l'encens sur les collines,
  - type: text
    content: sous les chênes, les peupliers, les térébinthes
  - type: text
    content: dont l'ombrage est agréable.
  - type: text
    content: C'est pourquoi vos filles se prostituent
  - type: text
    content: et vos belles-filles sont adultères.
  '14':
  - type: text
    content: Je ne punirai pas vos filles parce qu'elles se prostituent,
  - type: text
    content: ni vos belles-filles parce qu'elles sont adultères.
  - type: text
    content: En effet, eux-mêmes vont à l'écart avec des prostituées
  - type: text
    content: et sacrifient avec des femmes débauchées.
  - type: text
    content: Le peuple sans intelligence court à sa perte.
  '15':
  - type: text
    content: Si tu te livres à la prostitution, Israël,
  - type: text
    content: que Juda ne se rende pas coupable!
  - type: text
    content: N'allez pas à Guilgal, ne montez pas à Beth-Aven
  - type: note
    content: 'Beth-Aven: littéralement maison de tromperie ou maison du mal ou maison de néant, désigne ici de façon ironique Béthel (littéralement maison de Dieu).'
  - type: text
    content: 'et ne jurez pas: «L''Eternel est vivant!»'
  '16':
  - type: text
    content: Israël se révolte comme une génisse indomptable,
  - type: text
    content: et maintenant l'Eternel le ferait brouter
  - type: text
    content: comme un agneau dans de vastes plaines?
  '17':
  - type: text
    content: Ephraïm
  - type: note
    content: 'Ephraïm: c''est-à-dire le royaume du nord d''Israël.'
  - type: text
    content: ' est attaché aux idoles? Laisse-le!'
  '18':
  - type: text
    content: Ils ont à peine cessé de boire
  - type: text
    content: qu'ils se livrent à la prostitution.
  - type: text
    content: Leurs chefs sont avides de ce qui fait leur honte.
  '19':
  - type: text
    content: Le vent les enveloppera de ses ailes,
  - type: text
    content: et ils auront honte de leurs sacrifices.
  '2':
  - type: text
    content: Il n'y a que parjures et mensonges,
  - type: text
    content: assassinats, vols et adultères.
  - type: text
    content: On recourt à la violence, on commet meurtre sur meurtre.
  '3':
  - type: text
    content: C'est pourquoi le pays sera dans le deuil;
  - type: text
    content: tous ceux qui l'habitent seront abattus,
  - type: text
    content: de même que les bêtes sauvages et les oiseaux du ciel;
  - type: text
    content: même les poissons de la mer disparaîtront.
  '4':
  - type: text
    content: Mais que personne ne conteste, que personne ne se livre aux reproches!
  - type: text
    content: En effet, ton peuple est pareil à ceux qui se querellent avec les prêtres.
  '5':
  - type: text
    content: Tu trébucheras de jour,
  - type: text
    content: le prophète avec toi trébuchera de nuit
  - type: text
    content: et je détruirai ta mère.
  '6':
  - type: text
    content: Mon peuple est détruit parce qu'il lui manque la connaissance.
  - type: text
    content: Puisque tu as rejeté la connaissance,
  - type: text
    content: 'je te rejetterai: tu ne pourras plus exercer la fonction de prêtre pour moi.'
  - type: text
    content: De même que tu as oublié la loi de ton Dieu,
  - type: text
    content: j'oublierai aussi tes enfants.
  '7':
  - type: text
    content: Plus ils se sont multipliés, plus ils ont péché contre moi.
  - type: text
    content: Je changerai leur gloire en honte.
  '8':
  - type: text
    content: Ils se nourrissent des péchés de mon peuple,
  - type: text
    content: ils sont avides de ses fautes.
  '9':
  - type: text
    content: 'Le sort du prêtre sera identique à celui du peuple:'
  - type: text
    content: j'interviendrai contre lui à cause de sa conduite,
  - type: text
    content: je lui paierai le salaire de ses agissements.
