document_id: HOS.4,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Péché et jugement d'Israël
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 4.1–10.15
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Reproches contre l'idolâtrie
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ecoutez la parole de l'Eternel, Israélites,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'car l''Eternel a un procès avec les habitants du pays:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n'y a pas de vérité, pas de bonté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pas de connaissance de Dieu dans le pays.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ils mangeront sans se rassasier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se prostitueront sans se multiplier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu'ils ont cessé de respecter l'Eternel.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: La prostitution, le vieux vin et le vin nouveau font perdre la raison.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Mon peuple consulte son bois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c'est son bâton qui lui parle!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, l'esprit de prostitution égare,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils se prostituent loin de leur Dieu.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ils offrent des sacrifices sur le sommet des montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils font brûler de l'encens sur les collines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sous les chênes, les peupliers, les térébinthes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dont l'ombrage est agréable.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est pourquoi vos filles se prostituent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vos belles-filles sont adultères.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Je ne punirai pas vos filles parce qu'elles se prostituent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni vos belles-filles parce qu'elles sont adultères.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, eux-mêmes vont à l'écart avec des prostituées
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sacrifient avec des femmes débauchées.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le peuple sans intelligence court à sa perte.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Si tu te livres à la prostitution, Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que Juda ne se rende pas coupable!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N'allez pas à Guilgal, ne montez pas à Beth-Aven
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Beth-Aven: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: littéralement maison de tromperie ou maison du mal ou maison de néant, désigne ici de façon ironique Béthel (littéralement maison de Dieu).
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et ne jurez pas: «L''Eternel est vivant!»'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Israël se révolte comme une génisse indomptable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et maintenant l'Eternel le ferait brouter
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme un agneau dans de vastes plaines?
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ephraïm
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ephraïm: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire le royaume du nord d'Israël.
      marker-yv: yv-n
    - type: text
      text: ' est attaché aux idoles? Laisse-le!'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ils ont à peine cessé de boire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'ils se livrent à la prostitution.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs chefs sont avides de ce qui fait leur honte.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Le vent les enveloppera de ses ailes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils auront honte de leurs sacrifices.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Il n'y a que parjures et mensonges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: assassinats, vols et adultères.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On recourt à la violence, on commet meurtre sur meurtre.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: C'est pourquoi le pays sera dans le deuil;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous ceux qui l'habitent seront abattus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de même que les bêtes sauvages et les oiseaux du ciel;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: même les poissons de la mer disparaîtront.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mais que personne ne conteste, que personne ne se livre aux reproches!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, ton peuple est pareil à ceux qui se querellent avec les prêtres.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Tu trébucheras de jour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le prophète avec toi trébuchera de nuit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je détruirai ta mère.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Mon peuple est détruit parce qu'il lui manque la connaissance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puisque tu as rejeté la connaissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'je te rejetterai: tu ne pourras plus exercer la fonction de prêtre pour moi.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De même que tu as oublié la loi de ton Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'oublierai aussi tes enfants.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Plus ils se sont multipliés, plus ils ont péché contre moi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je changerai leur gloire en honte.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ils se nourrissent des péchés de mon peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont avides de ses fautes.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Le sort du prêtre sera identique à celui du peuple:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'interviendrai contre lui à cause de sa conduite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je lui paierai le salaire de ses agissements.
