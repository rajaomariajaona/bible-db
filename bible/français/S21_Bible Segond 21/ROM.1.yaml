document_id: ROM.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Une justice obtenue par la foi
  - type: heading
    content: 1.1–8.39
  - type: heading
    content: Salutation et louange
  - type: text
    content: 'De la part de Paul, serviteur de Jésus-Christ, appelé à être apôtre, mis à part pour annoncer l''Evangile de Dieu. '
  '10':
  - type: text
    content: 'Constamment je lui demande d''avoir enfin, dans le cadre de sa volonté, le bonheur d''aller chez vous. '
  '11':
  - type: text
    content: 'Je désire en effet vous voir pour vous communiquer un don spirituel afin que vous soyez affermis, '
  '12':
  - type: text
    content: ou plutôt afin que nous soyons encouragés ensemble chez vous par la foi qui nous est commune, à vous et à moi.
  '13':
  - type: text
    content: 'Je ne veux pas que vous ignoriez, frères et sœurs, que j''ai souvent formé le projet d''aller vous voir afin de récolter du fruit parmi vous tout comme parmi les autres nations, mais j''en ai été empêché jusqu''ici. '
  '14':
  - type: text
    content: 'Je me dois à tous, civilisés ou non, sages ou ignorants. '
  '15':
  - type: text
    content: Ainsi j'ai un vif désir de vous annoncer aussi l'Evangile, à vous qui êtes à Rome.
  '16':
  - type: text
    content: 'En effet, je n''ai pas honte de l''Evangile [de Christ]: c''est la puissance de Dieu pour le salut de tout homme qui croit, du Juif d''abord, mais aussi du non-Juif. '
  '17':
  - type: text
    content: 'En effet, c''est l''Evangile qui révèle la justice de Dieu par la foi et pour la foi, comme cela est écrit: '
  - type: text
    content: Le juste vivra par la foi
  - type: text
    content: .
  - type: note
    content: 'Le juste vivra par la foi: citation d''Habakuk 2.4.'
  - type: heading
    content: Culpabilité des non-Juifs
  '18':
  - type: text
    content: 'La colère de Dieu se révèle du ciel contre toute impiété et toute injustice des hommes qui par leur injustice tiennent la vérité prisonnière, '
  '19':
  - type: text
    content: 'car ce qu''on peut connaître de Dieu est évident pour eux, puisque Dieu le leur a fait connaître. '
  '2':
  - type: text
    content: '– Cet Evangile, Dieu l''avait promis auparavant par ses prophètes dans les saintes Ecritures. '
  '20':
  - type: text
    content: 'En effet, les perfections invisibles de Dieu, sa puissance éternelle et sa divinité, se voient depuis la création du monde, elles se comprennent par ce qu''il a fait. Ils sont donc inexcusables, '
  '21':
  - type: text
    content: 'puisque tout en connaissant Dieu, ils ne lui ont pas donné la gloire qu''il méritait en tant que Dieu et ne lui ont pas montré de reconnaissance; au contraire, ils se sont égarés dans leurs raisonnements et leur cœur sans intelligence a été plongé dans les ténèbres. '
  '22':
  - type: text
    content: 'Ils se vantent d''être sages, mais ils sont devenus fous, '
  '23':
  - type: text
    content: et ils ont remplacé la gloire du Dieu incorruptible par des images qui représentent l'homme corruptible, des oiseaux, des quadrupèdes et des reptiles.
  '24':
  - type: text
    content: 'C''est pourquoi Dieu les a livrés à l''impureté par les désirs de leur cœur, de sorte qu''ils déshonorent eux-mêmes leur propre corps, '
  '25':
  - type: text
    content: eux qui ont remplacé la vérité de Dieu par le mensonge et qui ont adoré et servi la créature au lieu du Créateur, qui est béni éternellement. Amen!
  '26':
  - type: text
    content: 'C''est pour cette raison que Dieu les a livrés à des passions déshonorantes: leurs femmes ont remplacé les rapports sexuels naturels par des relations contre nature; '
  '27':
  - type: text
    content: de même, les hommes ont abandonné les rapports naturels avec la femme et se sont enflammés dans leurs désirs les uns pour les autres; ils ont commis homme avec homme des actes scandaleux et ont reçu en eux-mêmes le salaire que méritait leur égarement.
  '28':
  - type: text
    content: 'Comme ils n''ont pas jugé bon de connaître Dieu, Dieu les a livrés à leur intelligence déréglée, de sorte qu''ils commettent des actes indignes. '
  '29':
  - type: text
    content: 'Ils sont remplis de toute sorte d''injustice, [d''immoralité sexuelle,] de méchanceté, de soif de posséder et de mal. Leur être est plein d''envie, de meurtres, de querelles, de ruses, de fraudes et de perversité. Rapporteurs, '
  '3':
  - type: text
    content: 'Il concerne son Fils qui, en tant qu''homme, est né de la descendance de David '
  '30':
  - type: text
    content: 'ils sont aussi médisants, ennemis de Dieu, arrogants, orgueilleux, vantards, ingénieux pour faire le mal, rebelles à leurs parents. '
  '31':
  - type: text
    content: 'Dépourvus d''intelligence, de loyauté, d''affection, ils sont [irréconciliables,] sans pitié. '
  '32':
  - type: text
    content: Et bien qu'ils connaissent le verdict de Dieu déclarant dignes de mort les auteurs de tels actes, non seulement ils les commettent, mais encore ils approuvent ceux qui agissent de même.
  '4':
  - type: text
    content: 'et qui, du point de vue de l''Esprit saint, a été déclaré Fils de Dieu avec puissance par sa résurrection: Jésus-Christ notre Seigneur. '
  '5':
  - type: text
    content: 'C''est par lui que nous avons reçu la grâce d''exercer le ministère d''apôtre pour conduire en son nom des hommes de toutes les nations à l''obéissance de la foi; '
  '6':
  - type: text
    content: 'et vous en faites partie vous aussi, qui avez été appelés par Jésus-Christ. – '
  '7':
  - type: text
    content: 'A tous ceux qui sont à Rome bien-aimés de Dieu, appelés à être saints: que la grâce et la paix vous soient données de la part de Dieu notre Père et du Seigneur Jésus-Christ!'
  '8':
  - type: text
    content: 'Tout d''abord, je dis à mon Dieu par Jésus-Christ toute ma reconnaissance au sujet de vous tous parce que dans le monde entier on parle de votre foi. '
  '9':
  - type: text
    content: 'Dieu, que je sers de tout mon cœur en annonçant l''Evangile de son Fils, m''est témoin que je fais sans cesse mention de vous dans mes prières. '
