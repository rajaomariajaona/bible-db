document_id: 2SA.15,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Révolte d'Absalom
  - type: text
    content: 'Après cela, Absalom se procura un char et des chevaux, ainsi que 50 hommes qui couraient devant lui. '
  '10':
  - type: text
    content: 'Absalom envoya des espions dans toutes les tribus d''Israël pour dire: «Quand vous entendrez le son de la trompette, vous direz: ‘Absalom est devenu roi à Hébron’», '
  '11':
  - type: text
    content: 'et 200 hommes de Jérusalem qui avaient été invités accompagnèrent Absalom. Ils le firent en toute innocence, sans rien savoir. '
  '12':
  - type: text
    content: Pendant qu'il offrait les sacrifices, Absalom fit venir de la ville de Guilo Achitophel le Guilonite, le conseiller de David. La conspiration devint puissante et le peuple était de plus en plus nombreux à se rallier à Absalom.
  '13':
  - type: text
    content: 'Quelqu''un vint informer David en disant: «Le cœur des Israélites s''est attaché à Absalom.» '
  '14':
  - type: text
    content: 'David dit alors à tous ses serviteurs, qui se trouvaient avec lui à Jérusalem: «Levez-vous, prenons la fuite, car il n''y aura aucun moyen pour nous d''échapper à Absalom. Dépêchez-vous de partir! Autrement, il ne va pas tarder à nous rattraper, et il nous précipitera dans le malheur et frappera la ville du tranchant de l''épée.» '
  '15':
  - type: text
    content: 'Les serviteurs du roi lui dirent: «Nous ferons tout ce que mon seigneur le roi voudra, nous sommes tes serviteurs.» '
  '16':
  - type: text
    content: 'Le roi sortit, suivi de toute sa famille, et il ne laissa que dix concubines pour garder le palais. '
  '17':
  - type: text
    content: 'Le roi sortit donc, suivi de tout le peuple, et ils s''arrêtèrent à la dernière maison. '
  '18':
  - type: text
    content: Tous ses serviteurs, tous les Kéréthiens et tous les Péléthiens avançaient à ses côtés, tandis que tous les Gathiens, 600 hommes qui l'avaient suivi depuis Gath, passaient devant lui.
  '19':
  - type: text
    content: 'Le roi dit à Ittaï de Gath: «Pourquoi viendrais-tu aussi avec nous? Retourne chez toi et reste avec le nouveau roi, car tu es un étranger. Tu as même été déporté de ton pays. '
  '2':
  - type: text
    content: 'Il se levait de bon matin et se tenait au bord du chemin qui conduit à la porte de la ville. Chaque fois qu''un homme avait une contestation et se rendait vers le roi pour le procès, Absalom l''appelait et demandait: «De quelle ville viens-tu?» Lorsqu''il avait répondu: «Je suis de telle tribu d''Israël», '
  '20':
  - type: text
    content: 'Tu es arrivé hier et aujourd''hui je te ferais errer avec nous çà et là, alors que je ne sais pas moi-même où je vais! Retourne chez toi et emmène tes frères avec toi. Que l''Eternel fasse preuve de bonté et de fidélité envers toi!» '
  '21':
  - type: text
    content: 'Ittaï répondit au roi: «L''Eternel est vivant et mon seigneur le roi est vivant! Là où se trouvera mon seigneur le roi, que ce soit pour mourir ou pour vivre, là aussi sera ton serviteur.» '
  '22':
  - type: text
    content: 'David dit alors à Ittaï: «Vas-y, avance!» Et Ittaï de Gath avança avec tous ses hommes et tous les enfants qui étaient avec lui.'
  '23':
  - type: text
    content: 'Toute la région était en larmes et l''on poussait de grands cris au passage de tout le peuple. Le roi passa le torrent du Cédron, ainsi que tout le peuple, en face du chemin qui conduit au désert. '
  '24':
  - type: text
    content: Tsadok était aussi là, et avec lui tous les Lévites qui portaient l'arche de l'alliance de Dieu. Ils déposèrent l'arche de Dieu et Abiathar montait pendant que tout le peuple finissait de sortir de la ville.
  '25':
  - type: text
    content: 'Le roi dit à Tsadok: «Ramène l''arche de Dieu dans la ville! Si je trouve grâce aux yeux de l''Eternel, il me fera revenir ici et me fera revoir l''arche et son sanctuaire. '
  '26':
  - type: text
    content: 'Mais s''il dit: ‘Je ne prends pas plaisir en toi’, je suis prêt. Qu''il me fasse ce qui lui semblera bon.» '
  '27':
  - type: text
    content: 'Le roi insista encore auprès du prêtre Tsadok: «Vas-tu comprendre? Retourne en paix dans la ville avec ton fils Achimaats et avec Jonathan, fils d''Abiathar. Retournez avec vos deux fils. '
  '28':
  - type: text
    content: 'Voyez, j''attendrai dans les plaines du désert jusqu''à ce que je reçoive des nouvelles de votre part.» '
  '29':
  - type: text
    content: Ainsi, Tsadok et Abiathar rapportèrent l'arche de Dieu à Jérusalem et ils y restèrent.
  '3':
  - type: text
    content: 'Absalom lui disait: «Regarde! Ta cause est bonne et juste, mais personne ne t''écoutera chez le roi.» '
  '30':
  - type: text
    content: David gravit le mont des Oliviers. Il montait en pleurant et la tête couverte, et il marchait nu-pieds. Tous ceux qui l'accompagnaient se couvrirent aussi la tête et ils montaient en pleurant.
  '31':
  - type: text
    content: 'On vint dire à David: «Achitophel est avec Absalom, il fait partie des conspirateurs.» David dit: «Eternel, réduis à néant les conseils d''Achitophel!»'
  '32':
  - type: text
    content: 'Lorsque David fut arrivé au sommet, il adora l''Eternel. Et voici que Hushaï l''Arkien vint à sa rencontre, la tunique déchirée et la tête couverte de terre. '
  '33':
  - type: text
    content: 'David lui dit: «Si tu viens avec moi, tu seras une charge pour moi. '
  '34':
  - type: text
    content: 'Au contraire, tu réduiras à néant pour mon bénéfice les conseils d''Achitophel, si tu retournes en ville et que tu dises à Absalom: ‘Roi, je serai ton serviteur. J''étais auparavant le serviteur de ton père, mais je suis maintenant ton serviteur.’ '
  '35':
  - type: text
    content: 'Les prêtres Tsadok et Abiathar ne seront-ils pas là avec toi? Tout ce que tu apprendras au palais, tu le diras aux prêtres Tsadok et Abiathar. '
  '36':
  - type: text
    content: 'Comme ils ont avec eux leurs deux fils, Achimaats, le fils de Tsadok, et Jonathan, le fils d''Abiathar, c''est par eux que vous me ferez savoir tout ce que vous aurez appris.» '
  '37':
  - type: text
    content: Hushaï, l'ami de David, retourna donc dans la ville de Jérusalem alors qu'Absalom y entrait.
  '4':
  - type: text
    content: 'Absalom ajoutait: «Qui m''établira juge dans le pays? Tout homme qui aurait une contestation et un procès viendrait me trouver et je lui rendrais justice.» '
  '5':
  - type: text
    content: 'Quand quelqu''un s''approchait pour se prosterner devant lui, il lui tendait la main, le retenait et l''embrassait. '
  '6':
  - type: text
    content: Absalom agissait de cette manière envers tous les Israélites qui se rendaient vers le roi pour demander justice, et il gagnait le cœur des hommes d'Israël.
  '7':
  - type: text
    content: Au bout de 4 ans
  - type: note
    content: '4 ans: d''après les versions anciennes; le texte hébreu dit «40 ans».'
  - type: text
    content: ', Absalom dit au roi: «Permets-moi d''aller à Hébron pour accomplir le vœu que j''ai fait à l''Eternel. '
  '8':
  - type: text
    content: 'En effet, moi ton serviteur, j''ai fait un vœu pendant que j''habitais à Gueshur en Syrie. J''ai dit: ‘Si l''Eternel me fait revenir à Jérusalem, je le servirai.’» '
  '9':
  - type: text
    content: 'Le roi lui dit: «Vas-y en paix.» Alors Absalom se leva et partit pour Hébron.'
