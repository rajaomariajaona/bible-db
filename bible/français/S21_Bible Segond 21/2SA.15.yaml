document_id: 2SA.15,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Révolte d'Absalom
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après cela, Absalom se procura un char et des chevaux, ainsi que 50 hommes qui couraient devant lui. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Absalom envoya des espions dans toutes les tribus d''Israël pour dire: «Quand vous entendrez le son de la trompette, vous direz: ‘Absalom est devenu roi à Hébron’», '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et 200 hommes de Jérusalem qui avaient été invités accompagnèrent Absalom. Ils le firent en toute innocence, sans rien savoir. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pendant qu'il offrait les sacrifices, Absalom fit venir de la ville de Guilo Achitophel le Guilonite, le conseiller de David. La conspiration devint puissante et le peuple était de plus en plus nombreux à se rallier à Absalom.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelqu''un vint informer David en disant: «Le cœur des Israélites s''est attaché à Absalom.» '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David dit alors à tous ses serviteurs, qui se trouvaient avec lui à Jérusalem: «Levez-vous, prenons la fuite, car il n''y aura aucun moyen pour nous d''échapper à Absalom. Dépêchez-vous de partir! Autrement, il ne va pas tarder à nous rattraper, et il nous précipitera dans le malheur et frappera la ville du tranchant de l''épée.» '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les serviteurs du roi lui dirent: «Nous ferons tout ce que mon seigneur le roi voudra, nous sommes tes serviteurs.» '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi sortit, suivi de toute sa famille, et il ne laissa que dix concubines pour garder le palais. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi sortit donc, suivi de tout le peuple, et ils s''arrêtèrent à la dernière maison. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tous ses serviteurs, tous les Kéréthiens et tous les Péléthiens avançaient à ses côtés, tandis que tous les Gathiens, 600 hommes qui l'avaient suivi depuis Gath, passaient devant lui.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi dit à Ittaï de Gath: «Pourquoi viendrais-tu aussi avec nous? Retourne chez toi et reste avec le nouveau roi, car tu es un étranger. Tu as même été déporté de ton pays. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il se levait de bon matin et se tenait au bord du chemin qui conduit à la porte de la ville. Chaque fois qu''un homme avait une contestation et se rendait vers le roi pour le procès, Absalom l''appelait et demandait: «De quelle ville viens-tu?» Lorsqu''il avait répondu: «Je suis de telle tribu d''Israël», '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu es arrivé hier et aujourd''hui je te ferais errer avec nous çà et là, alors que je ne sais pas moi-même où je vais! Retourne chez toi et emmène tes frères avec toi. Que l''Eternel fasse preuve de bonté et de fidélité envers toi!» '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ittaï répondit au roi: «L''Eternel est vivant et mon seigneur le roi est vivant! Là où se trouvera mon seigneur le roi, que ce soit pour mourir ou pour vivre, là aussi sera ton serviteur.» '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David dit alors à Ittaï: «Vas-y, avance!» Et Ittaï de Gath avança avec tous ses hommes et tous les enfants qui étaient avec lui.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toute la région était en larmes et l''on poussait de grands cris au passage de tout le peuple. Le roi passa le torrent du Cédron, ainsi que tout le peuple, en face du chemin qui conduit au désert. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tsadok était aussi là, et avec lui tous les Lévites qui portaient l'arche de l'alliance de Dieu. Ils déposèrent l'arche de Dieu et Abiathar montait pendant que tout le peuple finissait de sortir de la ville.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi dit à Tsadok: «Ramène l''arche de Dieu dans la ville! Si je trouve grâce aux yeux de l''Eternel, il me fera revenir ici et me fera revoir l''arche et son sanctuaire. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais s''il dit: ‘Je ne prends pas plaisir en toi’, je suis prêt. Qu''il me fasse ce qui lui semblera bon.» '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi insista encore auprès du prêtre Tsadok: «Vas-tu comprendre? Retourne en paix dans la ville avec ton fils Achimaats et avec Jonathan, fils d''Abiathar. Retournez avec vos deux fils. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voyez, j''attendrai dans les plaines du désert jusqu''à ce que je reçoive des nouvelles de votre part.» '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi, Tsadok et Abiathar rapportèrent l'arche de Dieu à Jérusalem et ils y restèrent.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Absalom lui disait: «Regarde! Ta cause est bonne et juste, mais personne ne t''écoutera chez le roi.» '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: David gravit le mont des Oliviers. Il montait en pleurant et la tête couverte, et il marchait nu-pieds. Tous ceux qui l'accompagnaient se couvrirent aussi la tête et ils montaient en pleurant.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On vint dire à David: «Achitophel est avec Absalom, il fait partie des conspirateurs.» David dit: «Eternel, réduis à néant les conseils d''Achitophel!»'
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque David fut arrivé au sommet, il adora l''Eternel. Et voici que Hushaï l''Arkien vint à sa rencontre, la tunique déchirée et la tête couverte de terre. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David lui dit: «Si tu viens avec moi, tu seras une charge pour moi. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au contraire, tu réduiras à néant pour mon bénéfice les conseils d''Achitophel, si tu retournes en ville et que tu dises à Absalom: ‘Roi, je serai ton serviteur. J''étais auparavant le serviteur de ton père, mais je suis maintenant ton serviteur.’ '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les prêtres Tsadok et Abiathar ne seront-ils pas là avec toi? Tout ce que tu apprendras au palais, tu le diras aux prêtres Tsadok et Abiathar. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme ils ont avec eux leurs deux fils, Achimaats, le fils de Tsadok, et Jonathan, le fils d''Abiathar, c''est par eux que vous me ferez savoir tout ce que vous aurez appris.» '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Hushaï, l'ami de David, retourna donc dans la ville de Jérusalem alors qu'Absalom y entrait.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Absalom ajoutait: «Qui m''établira juge dans le pays? Tout homme qui aurait une contestation et un procès viendrait me trouver et je lui rendrais justice.» '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand quelqu''un s''approchait pour se prosterner devant lui, il lui tendait la main, le retenait et l''embrassait. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Absalom agissait de cette manière envers tous les Israélites qui se rendaient vers le roi pour demander justice, et il gagnait le cœur des hommes d'Israël.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Au bout de 4 ans
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: '4 ans: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: d'après les versions anciennes; le texte hébreu dit «40 ans».
      marker-yv: yv-n
    - type: text
      text: ', Absalom dit au roi: «Permets-moi d''aller à Hébron pour accomplir le vœu que j''ai fait à l''Eternel. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, moi ton serviteur, j''ai fait un vœu pendant que j''habitais à Gueshur en Syrie. J''ai dit: ‘Si l''Eternel me fait revenir à Jérusalem, je le servirai.’» '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi lui dit: «Vas-y en paix.» Alors Absalom se leva et partit pour Hébron.'
