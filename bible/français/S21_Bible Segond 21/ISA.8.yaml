document_id: ISA.8,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Ruine des royaumes de Syrie et d'Israël
  - type: text
    content: 'L''Eternel m''a dit: «Prends un grand cylindre et écris dessus, avec un burin ordinaire: ‘A Maher-Shalal-Chash-Baz.’ '
  '10':
  - type: text
    content: Vous aurez beau prendre des décisions, elles seront sans effet.
  - type: text
    content: Vous aurez beau prononcer une parole, elle ne s'accomplira pas,
  - type: text
    content: car Dieu est avec nous.
  '11':
  - type: text
    content: Oui, voici ce que m'a dit l'Eternel, avec toute la force de son autorité,
  - type: text
    content: 'pour m''avertir de ne pas suivre la voie qui était celle de ce peuple:'
  '12':
  - type: text
    content: «N'appelez pas conspiration tout
  - type: text
    content: ce que ce peuple appelle conspiration!
  - type: text
    content: '*N''ayez d''eux aucune crainte et ne soyez pas troublés!'
  '13':
  - type: text
    content: C'est l'Eternel, le maître de l'univers, que vous devez respecter comme saint
  - type: note
    content: 'N''ayez… saint: cité en 1 Pierre 3.14-15.'
  - type: text
    content: ','
  - type: text
    content: c'est lui que vous devez craindre et redouter.
  '14':
  - type: text
    content: Il sera alors un sanctuaire,
  - type: text
    content: mais aussi *une pierre qui fait obstacle,
  - type: text
    content: un rocher propre à faire trébucher
  - type: note
    content: 'Une pierre… trébucher: expressions reprises en Romains 9.33; 1 Pierre 2.8.'
  - type: text
    content: ' pour les deux communautés d''Israël,'
  - type: text
    content: un filet et un piège
  - type: text
    content: pour les habitants de Jérusalem.
  '15':
  - type: text
    content: Beaucoup parmi eux trébucheront;
  - type: text
    content: ils tomberont et se briseront,
  - type: text
    content: ils seront pris au piège et capturés.
  '16':
  - type: text
    content: Garde ce témoignage à l'abri,
  - type: text
    content: marque la loi d'un sceau parmi mes disciples!»
  '17':
  - type: text
    content: Je compte sur l'Eternel,
  - type: text
    content: même s'il se cache à la famille de Jacob.
  - type: text
    content: '*Je me confie en lui.'
  '18':
  - type: text
    content: Me voici, moi et les enfants que l'Eternel m'a donnés
  - type: note
    content: 'Je me confie… donnés: cité en Hébreux 2.13 en rapport avec Christ et ses disciples.'
  - type: text
    content: ':'
  - type: text
    content: nous servons de signes et de présages en Israël
  - type: text
    content: de la part de l'Eternel, le maître de l'univers,
  - type: text
    content: qui réside sur le mont Sion.
  '19':
  - type: text
    content: 'Si l''on vous dit:'
  - type: text
    content: «Consultez ceux qui invoquent les esprits et les spirites,
  - type: text
    content: ceux qui chuchotent et murmurent!
  - type: text
    content: Un peuple ne consultera-t-il pas ses dieux?
  - type: text
    content: Ne consultera-t-il pas les morts en faveur des vivants?»
  '2':
  - type: text
    content: Je veux prendre pour témoins deux hommes dignes de confiance, le prêtre Urie et Zacharie, fils de Bérékia.»
  '20':
  - type: text
    content: 'répondez: «Il faut revenir à la loi et au témoignage!»'
  - type: text
    content: Si l'on ne parle pas de cette manière,
  - type: text
    content: il n'y aura pas d'aurore pour ce peuple.
  '21':
  - type: text
    content: Il parcourra le pays, accablé et affamé,
  - type: text
    content: et, quand il aura faim, il s'irritera,
  - type: text
    content: maudira son roi et son Dieu
  - type: text
    content: et tournera les yeux en haut;
  '22':
  - type: text
    content: puis il regardera vers la terre
  - type: text
    content: et il n'y verra que détresse, obscurité et sombres angoisses;
  - type: text
    content: il sera repoussé dans d'épaisses ténèbres.
  - type: heading
    content: L’ère messianique
  '23':
  - type: text
    content: Toutefois, les ténèbres ne régneront pas toujours
  - type: text
    content: 'sur la terre où il y a maintenant des angoisses:'
  - type: text
    content: si les temps passés ont couvert de mépris
  - type: text
    content: '*le territoire de Zabulon et de Nephthali,'
  - type: text
    content: les temps à venir couvriront de gloire
  - type: text
    content: la région voisine de la mer, la région située de l'autre côté du Jourdain,
  - type: text
    content: la Galilée à la population étrangère.
  '3':
  - type: text
    content: 'Je me suis uni à la prophétesse; elle est tombée enceinte et a mis au monde un fils. L''Eternel m''a dit: «Appelle-le Maher-Shalal-Chash-Baz. '
  '4':
  - type: text
    content: 'En effet, avant que l''enfant sache dire: ‘Papa! Maman!’ on apportera devant le roi d''Assyrie les richesses de Damas et le butin pris à Samarie.»'
  '5':
  - type: text
    content: 'L''Eternel m''a encore parlé, il a ajouté:'
  '6':
  - type: text
    content: «Puisque ce peuple a méprisé l'eau de Siloé qui coule doucement
  - type: text
    content: et a éprouvé de la joie en pensant à Retsin et au fils de Remalia,
  '7':
  - type: text
    content: le Seigneur va faire monter contre eux
  - type: text
    content: les puissantes et grandes eaux de l'Euphrate,
  - type: text
    content: à savoir le roi d'Assyrie et toute sa puissance.
  - type: text
    content: Il grossira dans tous ses canaux
  - type: text
    content: et débordera sur toutes ses rives;
  '8':
  - type: text
    content: il pénétrera dans Juda, le submergera et l'inondera,
  - type: text
    content: et ce jusqu'à la hauteur du cou.
  - type: text
    content: Le déploiement de ses ailes
  - type: text
    content: remplira tout ton territoire, Emmanuel!»
  '9':
  - type: text
    content: Poussez des cris, peuples! Mais vous serez brisés.
  - type: text
    content: Prêtez l'oreille, pays lointains!
  - type: text
    content: Préparez-vous au combat! Mais vous serez brisés.
  - type: text
    content: Oui, préparez-vous au combat! Mais vous serez brisés.
