document_id: ISA.8,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ruine des royaumes de Syrie et d'Israël
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L''Eternel m''a dit: «Prends un grand cylindre et écris dessus, avec un burin ordinaire: ‘A Maher-Shalal-Chash-Baz.’ '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Vous aurez beau prendre des décisions, elles seront sans effet.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous aurez beau prononcer une parole, elle ne s'accomplira pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car Dieu est avec nous.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Oui, voici ce que m'a dit l'Eternel, avec toute la force de son autorité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'pour m''avertir de ne pas suivre la voie qui était celle de ce peuple:'
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: «N'appelez pas conspiration tout
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce que ce peuple appelle conspiration!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*N''ayez d''eux aucune crainte et ne soyez pas troublés!'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: C'est l'Eternel, le maître de l'univers, que vous devez respecter comme saint
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.12-13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'N''ayez… saint: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pierre 3.14-15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est lui que vous devez craindre et redouter.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Il sera alors un sanctuaire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais aussi *une pierre qui fait obstacle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un rocher propre à faire trébucher
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Une pierre… trébucher: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'expressions reprises en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Romains 9.33
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pierre 2.8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' pour les deux communautés d''Israël,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un filet et un piège
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour les habitants de Jérusalem.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Beaucoup parmi eux trébucheront;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils tomberont et se briseront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils seront pris au piège et capturés.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Garde ce témoignage à l'abri,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: marque la loi d'un sceau parmi mes disciples!»
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Je compte sur l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: même s'il se cache à la famille de Jacob.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*Je me confie en lui.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Me voici, moi et les enfants que l'Eternel m'a donnés
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.17-18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je me confie… donnés: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hébreux 2.13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' en rapport avec Christ et ses disciples.'
      marker-yv: yv-n
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous servons de signes et de présages en Israël
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de la part de l'Eternel, le maître de l'univers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui réside sur le mont Sion.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Si l''on vous dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Consultez ceux qui invoquent les esprits et les spirites,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui chuchotent et murmurent!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un peuple ne consultera-t-il pas ses dieux?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne consultera-t-il pas les morts en faveur des vivants?»
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Je veux prendre pour témoins deux hommes dignes de confiance, le prêtre Urie et Zacharie, fils de Bérékia.»
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'répondez: «Il faut revenir à la loi et au témoignage!»'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si l'on ne parle pas de cette manière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n'y aura pas d'aurore pour ce peuple.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Il parcourra le pays, accablé et affamé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, quand il aura faim, il s'irritera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: maudira son roi et son Dieu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tournera les yeux en haut;
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: puis il regardera vers la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il n'y verra que détresse, obscurité et sombres angoisses;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il sera repoussé dans d'épaisses ténèbres.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L’ère messianique
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Toutefois, les ténèbres ne régneront pas toujours
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'sur la terre où il y a maintenant des angoisses:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si les temps passés ont couvert de mépris
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*le territoire de Zabulon et de Nephthali,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les temps à venir couvriront de gloire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la région voisine de la mer, la région située de l'autre côté du Jourdain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la Galilée à la population étrangère.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Je me suis uni à la prophétesse; elle est tombée enceinte et a mis au monde un fils. L''Eternel m''a dit: «Appelle-le Maher-Shalal-Chash-Baz. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'En effet, avant que l''enfant sache dire: ‘Papa! Maman!’ on apportera devant le roi d''Assyrie les richesses de Damas et le butin pris à Samarie.»'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'L''Eternel m''a encore parlé, il a ajouté:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: «Puisque ce peuple a méprisé l'eau de Siloé qui coule doucement
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et a éprouvé de la joie en pensant à Retsin et au fils de Remalia,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: le Seigneur va faire monter contre eux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les puissantes et grandes eaux de l'Euphrate,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à savoir le roi d'Assyrie et toute sa puissance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il grossira dans tous ses canaux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et débordera sur toutes ses rives;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: il pénétrera dans Juda, le submergera et l'inondera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ce jusqu'à la hauteur du cou.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le déploiement de ses ailes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: remplira tout ton territoire, Emmanuel!»
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Poussez des cris, peuples! Mais vous serez brisés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prêtez l'oreille, pays lointains!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Préparez-vous au combat! Mais vous serez brisés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, préparez-vous au combat! Mais vous serez brisés.
