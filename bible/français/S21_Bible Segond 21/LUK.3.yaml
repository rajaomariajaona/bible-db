document_id: LUK.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Ministère de Jean-Baptiste
  - type: text
    content: La quinzième année du règne de l'empereur Tibère, Ponce Pilate était gouverneur de la Judée, Hérode tétrarque
  - type: note
    content: 'Tétrarque: titre donné par les Romains aux princes de moins grande importance que les rois. C''étaient les Romains qui, en tant que puissance occupante, nommaient et destituaient les rois et autres roitelets des territoires placés sous leur autorité.'
  - type: text
    content: ' de la Galilée, son frère Philippe tétrarque du territoire de l''Iturée et de la Trachonite, Lysanias tétrarque de l''Abilène, '
  '10':
  - type: text
    content: 'La foule l''interrogeait: «Que devons-nous donc faire?» '
  '11':
  - type: text
    content: 'Il leur répondit: «Que celui qui a deux chemises partage avec celui qui n''en a pas, et que celui qui a de quoi manger fasse de même.» '
  '12':
  - type: text
    content: 'Des collecteurs d''impôts vinrent aussi pour se faire baptiser; ils lui dirent: «Maître, que devons-nous faire?» '
  '13':
  - type: text
    content: 'Il leur répondit: «N''exigez rien de plus que ce qui vous a été ordonné.» '
  '14':
  - type: text
    content: 'Des soldats aussi lui demandèrent: «Et nous, que devons-nous faire?» Il leur répondit: «Ne commettez ni extorsion ni tort envers personne et contentez-vous de votre solde.»'
  '15':
  - type: text
    content: 'Le peuple était dans l''attente et tous se demandaient en eux-mêmes si Jean n''était pas le Messie. '
  '16':
  - type: text
    content: 'Alors il leur dit: «Moi, je vous baptise d''eau; mais il vient, celui qui est plus puissant que moi, et je ne suis pas digne de détacher la courroie de ses sandales. Lui, il vous baptisera du Saint-Esprit et de feu. '
  '17':
  - type: text
    content: Il a sa pelle à la main; il nettoiera son aire de battage et il amassera le blé dans son grenier, mais il brûlera la paille dans un feu qui ne s'éteint pas.»
  '18':
  - type: text
    content: 'C''est ainsi, avec encore beaucoup d''autres encouragements, que Jean annonçait la bonne nouvelle au peuple. '
  '19':
  - type: text
    content: 'Cependant, Hérode le tétrarque, à qui Jean faisait des reproches au sujet d''Hérodiade, la femme de son frère [Philippe], et de toutes les mauvaises actions qu''il avait commises, '
  '2':
  - type: text
    content: 'et Anne et Caïphe étaient grands-prêtres. C''est alors que la parole de Dieu fut adressée à Jean, fils de Zacharie, dans le désert, '
  '20':
  - type: text
    content: ajouta encore à toutes les autres celle d'enfermer Jean en prison.
  '21':
  - type: text
    content: 'Comme tout le peuple était baptisé, Jésus aussi fut baptisé. Pendant qu''il priait, le ciel s''ouvrit '
  '22':
  - type: text
    content: 'et le Saint-Esprit descendit sur lui sous une forme corporelle, comme une colombe. Et une voix fit entendre du ciel ces paroles: «Tu es mon Fils bien-aimé, tu as toute mon approbation.»'
  - type: heading
    content: Généalogie de Jésus
  '23':
  - type: text
    content: 'Jésus avait environ 30 ans lorsqu''il commença son ministère. Il était, comme on le croyait, fils de Joseph, fils d''Héli, '
  '24':
  - type: text
    content: 'fils de Matthat, fils de Lévi, fils de Melchi, fils de Jannaï, fils de Joseph, '
  '25':
  - type: text
    content: 'fils de Mattathias, fils d''Amos, fils de Nahum, fils d''Esli, fils de Naggaï, '
  '26':
  - type: text
    content: 'fils de Maath, fils de Mattathias, fils de Sémeï, fils de Josech, fils de Joda, '
  '27':
  - type: text
    content: 'fils de Joanan, fils de Rhésa, fils de Zorobabel, fils de Shealthiel, fils de Néri, '
  '28':
  - type: text
    content: 'fils de Melchi, fils d''Addi, fils de Kosam, fils d''Elmadam, fils d''Er, '
  '29':
  - type: text
    content: 'fils de Joses, fils d''Eliézer, fils de Jorim, fils de Matthat, fils de Lévi, '
  '3':
  - type: text
    content: et Jean parcourut toute la région du Jourdain; il prêchait le baptême de repentance
  - type: note
    content: 'Repentance: même mot grec que changement d''attitude (verset 8); désignant littéralement un changement de pensée, le mot renvoie à une transformation radicale de la personne, qui renonce à ses attitudes fautives pour adopter un nouveau comportement et une nouvelle perspective, conformes à la volonté de Dieu.'
  - type: text
    content: ' pour le pardon des péchés, '
  '30':
  - type: text
    content: 'fils de Siméon, fils de Juda, fils de Joseph, fils de Jonam, fils d''Eliakim, '
  '31':
  - type: text
    content: 'fils de Méléa, fils de Menna, fils de Mattatha, fils de Nathan, fils de David, '
  '32':
  - type: text
    content: 'fils d''Isaï, fils d''Obed, fils de Booz, fils de Salmon, fils de Nachshon, '
  '33':
  - type: text
    content: 'fils d''Aminadab, fils d''Admin, fils d''Arni, fils d''Hetsrom, fils de Pérets, fils de Juda, '
  '34':
  - type: text
    content: 'fils de Jacob, fils d''Isaac, fils d''Abraham, fils de Thara, fils de Nachor, '
  '35':
  - type: text
    content: 'fils de Seruch, fils de Ragau, fils de Phalek, fils d''Eber, fils de Sala, '
  '36':
  - type: text
    content: 'fils de Kaïnam, fils d''Arpacshad, fils de Sem, fils de Noé, fils de Lamech, '
  '37':
  - type: text
    content: 'fils de Mathusala, fils d''Hénoc, fils de Jared, fils de Maléléel, fils de Kaïnan, '
  '38':
  - type: text
    content: fils d'Enos, fils de Seth, fils d'Adam, fils de Dieu.
  '4':
  - type: text
    content: 'conformément à ce qui est écrit dans le livre des paroles du prophète Esaïe: '
  - type: text
    content: 'C''est la voix de celui qui crie dans le désert: ‘Préparez le chemin du Seigneur, rendez ses sentiers droits.’'
  - type: text
    content: ' '
  '5':
  - type: text
    content: Toute vallée sera comblée, toute montagne et toute colline seront abaissées; ce qui est tortueux sera redressé et les chemins rocailleux seront aplanis.
  - type: text
    content: ' '
  '6':
  - type: text
    content: Et tout homme verra le salut de Dieu.
  - type: note
    content: 'C''est la voix… de Dieu: citation d''Esaïe 40.3-5.'
  '7':
  - type: text
    content: 'Il disait donc aux foules qui venaient se faire baptiser par lui: «Races de vipères, qui vous a appris à fuir la colère à venir? '
  '8':
  - type: text
    content: 'Produisez donc des fruits qui confirment votre changement d''attitude et ne vous mettez pas à dire en vous-mêmes: ‘Nous avons Abraham pour ancêtre!’ En effet, je vous déclare que de ces pierres Dieu peut faire naître des descendants à Abraham. '
  '9':
  - type: text
    content: 'Déjà la hache est mise à la racine des arbres: tout arbre qui ne produit pas de bons fruits sera donc coupé et jeté au feu.»'
