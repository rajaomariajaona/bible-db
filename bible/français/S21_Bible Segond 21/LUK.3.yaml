document_id: LUK.3,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ministère de Jean-Baptiste
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: La quinzième année du règne de l'empereur Tibère, Ponce Pilate était gouverneur de la Judée, Hérode tétrarque
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tétrarque: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: titre donné par les Romains aux princes de moins grande importance que les rois. C'étaient les Romains qui, en tant que puissance occupante, nommaient et destituaient les rois et autres roitelets des territoires placés sous leur autorité.
      marker-yv: yv-n
    - type: text
      text: ' de la Galilée, son frère Philippe tétrarque du territoire de l''Iturée et de la Trachonite, Lysanias tétrarque de l''Abilène, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'La foule l''interrogeait: «Que devons-nous donc faire?» '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Il leur répondit: «Que celui qui a deux chemises partage avec celui qui n''en a pas, et que celui qui a de quoi manger fasse de même.» '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Des collecteurs d''impôts vinrent aussi pour se faire baptiser; ils lui dirent: «Maître, que devons-nous faire?» '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Il leur répondit: «N''exigez rien de plus que ce qui vous a été ordonné.» '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Des soldats aussi lui demandèrent: «Et nous, que devons-nous faire?» Il leur répondit: «Ne commettez ni extorsion ni tort envers personne et contentez-vous de votre solde.»'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Le peuple était dans l''attente et tous se demandaient en eux-mêmes si Jean n''était pas le Messie. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Alors il leur dit: «Moi, je vous baptise d''eau; mais il vient, celui qui est plus puissant que moi, et je ne suis pas digne de détacher la courroie de ses sandales. Lui, il vous baptisera du Saint-Esprit et de feu. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Il a sa pelle à la main; il nettoiera son aire de battage et il amassera le blé dans son grenier, mais il brûlera la paille dans un feu qui ne s'éteint pas.»
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'C''est ainsi, avec encore beaucoup d''autres encouragements, que Jean annonçait la bonne nouvelle au peuple. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Cependant, Hérode le tétrarque, à qui Jean faisait des reproches au sujet d''Hérodiade, la femme de son frère [Philippe], et de toutes les mauvaises actions qu''il avait commises, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'et Anne et Caïphe étaient grands-prêtres. C''est alors que la parole de Dieu fut adressée à Jean, fils de Zacharie, dans le désert, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ajouta encore à toutes les autres celle d'enfermer Jean en prison.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Comme tout le peuple était baptisé, Jésus aussi fut baptisé. Pendant qu''il priait, le ciel s''ouvrit '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'et le Saint-Esprit descendit sur lui sous une forme corporelle, comme une colombe. Et une voix fit entendre du ciel ces paroles: «Tu es mon Fils bien-aimé, tu as toute mon approbation.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Généalogie de Jésus
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Jésus avait environ 30 ans lorsqu''il commença son ministère. Il était, comme on le croyait, fils de Joseph, fils d''Héli, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'fils de Matthat, fils de Lévi, fils de Melchi, fils de Jannaï, fils de Joseph, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'fils de Mattathias, fils d''Amos, fils de Nahum, fils d''Esli, fils de Naggaï, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'fils de Maath, fils de Mattathias, fils de Sémeï, fils de Josech, fils de Joda, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'fils de Joanan, fils de Rhésa, fils de Zorobabel, fils de Shealthiel, fils de Néri, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'fils de Melchi, fils d''Addi, fils de Kosam, fils d''Elmadam, fils d''Er, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'fils de Joses, fils d''Eliézer, fils de Jorim, fils de Matthat, fils de Lévi, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: et Jean parcourut toute la région du Jourdain; il prêchait le baptême de repentance
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Repentance: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: même mot grec que changement d'attitude (verset 8); désignant littéralement un changement de pensée, le mot renvoie à une transformation radicale de la personne, qui renonce à ses attitudes fautives pour adopter un nouveau comportement et une nouvelle perspective, conformes à la volonté de Dieu.
      marker-yv: yv-n
    - type: text
      text: ' pour le pardon des péchés, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'fils de Siméon, fils de Juda, fils de Joseph, fils de Jonam, fils d''Eliakim, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'fils de Méléa, fils de Menna, fils de Mattatha, fils de Nathan, fils de David, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'fils d''Isaï, fils d''Obed, fils de Booz, fils de Salmon, fils de Nachshon, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'fils d''Aminadab, fils d''Admin, fils d''Arni, fils d''Hetsrom, fils de Pérets, fils de Juda, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'fils de Jacob, fils d''Isaac, fils d''Abraham, fils de Thara, fils de Nachor, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'fils de Seruch, fils de Ragau, fils de Phalek, fils d''Eber, fils de Sala, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'fils de Kaïnam, fils d''Arpacshad, fils de Sem, fils de Noé, fils de Lamech, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'fils de Mathusala, fils d''Hénoc, fils de Jared, fils de Maléléel, fils de Kaïnan, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: fils d'Enos, fils de Seth, fils d'Adam, fils de Dieu.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'conformément à ce qui est écrit dans le livre des paroles du prophète Esaïe: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'C''est la voix de celui qui crie dans le désert: ‘Préparez le chemin du Seigneur, rendez ses sentiers droits.’'
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Toute vallée sera comblée, toute montagne et toute colline seront abaissées; ce qui est tortueux sera redressé et les chemins rocailleux seront aplanis.
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Et tout homme verra le salut de Dieu.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.4-6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'C''est la voix… de Dieu: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 40.3-5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Il disait donc aux foules qui venaient se faire baptiser par lui: «Races de vipères, qui vous a appris à fuir la colère à venir? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Produisez donc des fruits qui confirment votre changement d''attitude et ne vous mettez pas à dire en vous-mêmes: ‘Nous avons Abraham pour ancêtre!’ En effet, je vous déclare que de ces pierres Dieu peut faire naître des descendants à Abraham. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Déjà la hache est mise à la racine des arbres: tout arbre qui ne produit pas de bons fruits sera donc coupé et jeté au feu.»'
