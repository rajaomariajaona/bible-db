document_id: PSA.25,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Recherche du pardon de Dieu
  - type: text
    content: De David.
  - type: text
    content: Eternel, je me tourne vers toi,
  '10':
  - type: text
    content: Tous les sentiers de l'Eternel sont bonté et fidélité
  - type: text
    content: pour ceux qui gardent son alliance et ses commandements.
  '11':
  - type: text
    content: C'est à cause de ton nom, Eternel,
  - type: text
    content: que tu pardonneras ma faute, car elle est grande.
  '12':
  - type: text
    content: Quel est l'homme qui craint l'Eternel?
  - type: text
    content: L'Eternel lui montre la voie qu'il doit choisir.
  '13':
  - type: text
    content: Son âme reposera dans le bonheur,
  - type: text
    content: et sa descendance héritera le pays.
  '14':
  - type: text
    content: L'Eternel confie ses secrets à ceux qui le craignent,
  - type: text
    content: il leur fait connaître son alliance.
  '15':
  - type: text
    content: Je tourne constamment les yeux vers l'Eternel,
  - type: text
    content: car il dégagera mes pieds du piège.
  '16':
  - type: text
    content: Regarde-moi, aie pitié de moi,
  - type: text
    content: car je suis abandonné et malheureux!
  '17':
  - type: text
    content: 'Les angoisses de mon cœur augmentent:'
  - type: text
    content: délivre-moi de ma détresse!
  '18':
  - type: text
    content: Vois ma misère et ma peine,
  - type: text
    content: et pardonne tous mes péchés!
  '19':
  - type: text
    content: Vois combien mes ennemis sont nombreux
  - type: text
    content: et de quelle haine violente ils me poursuivent!
  '2':
  - type: text
    content: mon Dieu, en toi je me confie.
  - type: text
    content: Que je ne sois pas couvert de honte!
  - type: text
    content: Que mes ennemis ne se réjouissent pas à mon sujet!
  '20':
  - type: text
    content: Garde mon âme et sauve-moi!
  - type: text
    content: Que je ne sois pas couvert de honte,
  - type: text
    content: car je cherche refuge auprès de toi.
  '21':
  - type: text
    content: Que l'intégrité et la droiture me protègent,
  - type: text
    content: car je mets mon espérance en toi.
  '22':
  - type: text
    content: O Dieu, délivre Israël
  - type: text
    content: de toutes ses détresses!
  '3':
  - type: text
    content: Aucun de ceux qui espèrent en toi ne sera couvert de honte,
  - type: text
    content: mais la honte est pour ceux qui sont infidèles sans raison.
  '4':
  - type: text
    content: Eternel, fais-moi connaître tes voies,
  - type: text
    content: enseigne-moi tes sentiers!
  '5':
  - type: text
    content: Conduis-moi dans ta vérité et instruis-moi,
  - type: text
    content: 'car tu es le Dieu de mon salut:'
  - type: text
    content: je m'attends à toi chaque jour.
  '6':
  - type: text
    content: Eternel, souviens-toi de ta compassion et de ta bonté,
  - type: text
    content: car elles sont éternelles!
  '7':
  - type: text
    content: Ne te souviens pas des fautes de ma jeunesse, de mes péchés!
  - type: text
    content: Souviens-toi de moi en fonction de ton amour,
  - type: text
    content: à cause de ta bonté, Eternel!
  '8':
  - type: text
    content: L'Eternel est bon et droit,
  - type: text
    content: c'est pourquoi il montre aux pécheurs la voie à suivre.
  '9':
  - type: text
    content: Il conduit les humbles dans la justice,
  - type: text
    content: il leur enseigne sa voie.
