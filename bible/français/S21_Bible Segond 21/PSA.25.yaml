document_id: PSA.25
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Recherche du pardon de Dieu
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: De David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, je me tourne vers toi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: mon Dieu, en toi je me confie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que je ne sois pas couvert de honte!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que mes ennemis ne se réjouissent pas à mon sujet!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Aucun de ceux qui espèrent en toi ne sera couvert de honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais la honte est pour ceux qui sont infidèles sans raison.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Eternel, fais-moi connaître tes voies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: enseigne-moi tes sentiers!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Conduis-moi dans ta vérité et instruis-moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'car tu es le Dieu de mon salut:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je m'attends à toi chaque jour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Eternel, souviens-toi de ta compassion et de ta bonté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car elles sont éternelles!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ne te souviens pas des fautes de ma jeunesse, de mes péchés!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Souviens-toi de moi en fonction de ton amour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de ta bonté, Eternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: L'Eternel est bon et droit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est pourquoi il montre aux pécheurs la voie à suivre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il conduit les humbles dans la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il leur enseigne sa voie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tous les sentiers de l'Eternel sont bonté et fidélité
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour ceux qui gardent son alliance et ses commandements.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: C'est à cause de ton nom, Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que tu pardonneras ma faute, car elle est grande.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Quel est l'homme qui craint l'Eternel?
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Eternel lui montre la voie qu'il doit choisir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Son âme reposera dans le bonheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa descendance héritera le pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: L'Eternel confie ses secrets à ceux qui le craignent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il leur fait connaître son alliance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je tourne constamment les yeux vers l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il dégagera mes pieds du piège.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Regarde-moi, aie pitié de moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je suis abandonné et malheureux!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les angoisses de mon cœur augmentent:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: délivre-moi de ma détresse!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Vois ma misère et ma peine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pardonne tous mes péchés!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Vois combien mes ennemis sont nombreux
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de quelle haine violente ils me poursuivent!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Garde mon âme et sauve-moi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que je ne sois pas couvert de honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je cherche refuge auprès de toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Que l'intégrité et la droiture me protègent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je mets mon espérance en toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: O Dieu, délivre Israël
- type: usfm
  marker: q1
  children:
  - type: text
    text: de toutes ses détresses!
