document_id: JER.30,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Annonce de restauration
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole fut adressée à Jérémie de la part de l''Eternel: '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quant à toi, mon serviteur Jacob, n'aie pas peur, déclare l'Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne te laisse pas effrayer, Israël!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, je vais te délivrer de la terre lointaine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je vais délivrer ta descendance du pays où elle est déportée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jacob reviendra pour connaître la tranquillité et la sécurité.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plus personne ne l'inquiétera.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, je suis moi-même avec toi pour te délivrer, déclare l'Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'exterminerai toutes les nations où je t'ai dispersé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais toi, je ne t'exterminerai pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te corrigerai avec justice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne peux vraiment pas te laisser impuni.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton désastre est irréparable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ta blessure est douloureuse.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Personne ne défend ta cause pour prendre soin de ton ulcère.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour toi, il n'y a ni remède ni guérison.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui t'aimaient t'ont oubliée, Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: personne ne se soucie de toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je t'ai frappée comme le fait un ennemi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t'ai infligé une punition sévère
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de l'importance de ta faute,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du grand nombre de tes péchés.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi te plaindre de ton désastre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du fait que ta peine est incurable?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est à cause de l'importance de ta faute,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du grand nombre de tes péchés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que je t'ai infligé ce traitement.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cependant, tous ceux qui te dévorent seront dévorés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous tes ennemis, oui tous, iront en déportation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui te dépouillent seront dépouillés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je livrerai au pillage tous ceux qui te pillent.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En revanche, je provoquerai ton rétablissement, je guérirai tes blessures,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils t'ont appelée «l'expatriée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la Sion dont plus personne ne se soucie».
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais ramener de déportation les familles de Jacob.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'J''ai pitié de ses habitations:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la ville sera reconstruite sur ses ruines
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le palais retrouvera sa place.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des manifestations de reconnaissance et des cris de réjouissance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: se feront entendre de leur part.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les rendrai nombreux, ils ne diminueront plus.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les rendrai importants, ils ne seront plus méprisés.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Voici ce que dit l''Eternel, le Dieu d''Israël: Ecris dans un livre toutes les paroles que je t''ai dites. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses fils redeviendront comme ils l'étaient par le passé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: son assemblée subsistera devant moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j'interviendrai contre tous ses oppresseurs.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son prince sera l'un des siens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: son souverain proviendra du peuple lui-même.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je le ferai approcher, et il s'avancera vers moi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, qui pourrait se porter garant de lui-même pour s'avancer vers moi?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l'Eternel.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous serez mon peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et moi je serai votre Dieu.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La tempête de l'Eternel, sa colère éclate.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est une tempête tourbillonnante
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui fond sur la tête des méchants.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La colère ardente de l'Eternel ne se calmera pas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tant qu'il n'aura pas agi et mis à exécution les projets de son cœur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans l'avenir, vous en comprendrez le sens.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, voici que les jours viennent, déclare l'Eternel, où je ramènerai les déportés de mon peuple, d'Israël et de Juda. Voilà ce que dit l'Eternel. Je les ferai revenir dans le pays que j'ai donné à leurs ancêtres, et ils en prendront possession.»
  '4':
  - type: usfm
    marker: d
    children:
    - type: text
      text: Voici les paroles prononcées par l'Eternel à l'intention d'Israël et de Juda.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Nous entendons des cris de frayeur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est la panique, et non la paix.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Informez-vous donc et regardez si un homme peut mettre au monde un enfant!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi vois-je tous les guerriers les mains sur les hanches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme une femme prête à accoucher?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi tous les visages sont-ils devenus livides?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quel malheur! Voilà le grand jour!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n'y en a jamais eu de pareil.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est une période d'angoisse pour Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il en sera délivré.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsque ce jour-là arrivera, déclare l'Eternel, le maître de l'univers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je briserai l'autorité exercée sur toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'arracherai tes liens.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne seront plus les esclaves d'étrangers
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ils serviront l'Eternel, leur Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et David, leur roi, celui que je leur donnerai.
