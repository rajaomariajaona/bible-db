document_id: JER.30,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Annonce de restauration
  - type: text
    content: 'La parole fut adressée à Jérémie de la part de l''Eternel: '
  '10':
  - type: text
    content: Quant à toi, mon serviteur Jacob, n'aie pas peur, déclare l'Eternel.
  - type: text
    content: Ne te laisse pas effrayer, Israël!
  - type: text
    content: En effet, je vais te délivrer de la terre lointaine,
  - type: text
    content: je vais délivrer ta descendance du pays où elle est déportée.
  - type: text
    content: Jacob reviendra pour connaître la tranquillité et la sécurité.
  - type: text
    content: Plus personne ne l'inquiétera.
  '11':
  - type: text
    content: En effet, je suis moi-même avec toi pour te délivrer, déclare l'Eternel.
  - type: text
    content: J'exterminerai toutes les nations où je t'ai dispersé,
  - type: text
    content: mais toi, je ne t'exterminerai pas.
  - type: text
    content: Je te corrigerai avec justice.
  - type: text
    content: Je ne peux vraiment pas te laisser impuni.
  '12':
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: Ton désastre est irréparable,
  - type: text
    content: ta blessure est douloureuse.
  '13':
  - type: text
    content: Personne ne défend ta cause pour prendre soin de ton ulcère.
  - type: text
    content: Pour toi, il n'y a ni remède ni guérison.
  '14':
  - type: text
    content: Tous ceux qui t'aimaient t'ont oubliée, Jérusalem,
  - type: text
    content: personne ne se soucie de toi,
  - type: text
    content: car je t'ai frappée comme le fait un ennemi.
  - type: text
    content: Je t'ai infligé une punition sévère
  - type: text
    content: à cause de l'importance de ta faute,
  - type: text
    content: du grand nombre de tes péchés.
  '15':
  - type: text
    content: Pourquoi te plaindre de ton désastre,
  - type: text
    content: du fait que ta peine est incurable?
  - type: text
    content: C'est à cause de l'importance de ta faute,
  - type: text
    content: du grand nombre de tes péchés,
  - type: text
    content: que je t'ai infligé ce traitement.
  '16':
  - type: text
    content: Cependant, tous ceux qui te dévorent seront dévorés,
  - type: text
    content: et tous tes ennemis, oui tous, iront en déportation.
  - type: text
    content: Ceux qui te dépouillent seront dépouillés
  - type: text
    content: et je livrerai au pillage tous ceux qui te pillent.
  '17':
  - type: text
    content: En revanche, je provoquerai ton rétablissement, je guérirai tes blessures,
  - type: text
    content: déclare l'Eternel,
  - type: text
    content: car ils t'ont appelée «l'expatriée,
  - type: text
    content: la Sion dont plus personne ne se soucie».
  '18':
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: Je vais ramener de déportation les familles de Jacob.
  - type: text
    content: 'J''ai pitié de ses habitations:'
  - type: text
    content: la ville sera reconstruite sur ses ruines
  - type: text
    content: et le palais retrouvera sa place.
  '19':
  - type: text
    content: Des manifestations de reconnaissance et des cris de réjouissance
  - type: text
    content: se feront entendre de leur part.
  - type: text
    content: Je les rendrai nombreux, ils ne diminueront plus.
  - type: text
    content: Je les rendrai importants, ils ne seront plus méprisés.
  '2':
  - type: text
    content: '«Voici ce que dit l''Eternel, le Dieu d''Israël: Ecris dans un livre toutes les paroles que je t''ai dites. '
  '20':
  - type: text
    content: Ses fils redeviendront comme ils l'étaient par le passé,
  - type: text
    content: son assemblée subsistera devant moi
  - type: text
    content: et j'interviendrai contre tous ses oppresseurs.
  '21':
  - type: text
    content: Son prince sera l'un des siens,
  - type: text
    content: son souverain proviendra du peuple lui-même.
  - type: text
    content: Je le ferai approcher, et il s'avancera vers moi.
  - type: text
    content: En effet, qui pourrait se porter garant de lui-même pour s'avancer vers moi?
  - type: text
    content: déclare l'Eternel.
  '22':
  - type: text
    content: Vous serez mon peuple,
  - type: text
    content: et moi je serai votre Dieu.
  '23':
  - type: text
    content: La tempête de l'Eternel, sa colère éclate.
  - type: text
    content: C'est une tempête tourbillonnante
  - type: text
    content: qui fond sur la tête des méchants.
  '24':
  - type: text
    content: La colère ardente de l'Eternel ne se calmera pas
  - type: text
    content: tant qu'il n'aura pas agi et mis à exécution les projets de son cœur.
  - type: text
    content: Dans l'avenir, vous en comprendrez le sens.
  '3':
  - type: text
    content: En effet, voici que les jours viennent, déclare l'Eternel, où je ramènerai les déportés de mon peuple, d'Israël et de Juda. Voilà ce que dit l'Eternel. Je les ferai revenir dans le pays que j'ai donné à leurs ancêtres, et ils en prendront possession.»
  '4':
  - type: text
    content: Voici les paroles prononcées par l'Eternel à l'intention d'Israël et de Juda.
  '5':
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: Nous entendons des cris de frayeur.
  - type: text
    content: C'est la panique, et non la paix.
  '6':
  - type: text
    content: Informez-vous donc et regardez si un homme peut mettre au monde un enfant!
  - type: text
    content: Pourquoi vois-je tous les guerriers les mains sur les hanches,
  - type: text
    content: comme une femme prête à accoucher?
  - type: text
    content: Pourquoi tous les visages sont-ils devenus livides?
  '7':
  - type: text
    content: Quel malheur! Voilà le grand jour!
  - type: text
    content: Il n'y en a jamais eu de pareil.
  - type: text
    content: C'est une période d'angoisse pour Jacob,
  - type: text
    content: mais il en sera délivré.
  '8':
  - type: text
    content: Lorsque ce jour-là arrivera, déclare l'Eternel, le maître de l'univers,
  - type: text
    content: je briserai l'autorité exercée sur toi,
  - type: text
    content: j'arracherai tes liens.
  - type: text
    content: Ils ne seront plus les esclaves d'étrangers
  '9':
  - type: text
    content: mais ils serviront l'Eternel, leur Dieu,
  - type: text
    content: et David, leur roi, celui que je leur donnerai.
