document_id: MIC.2,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Péché et jugement d'Israël
  - type: text
    content: Malheur à ceux qui projettent l'injustice
  - type: text
    content: et qui forgent le mal dans leur lit!
  - type: text
    content: Au point du jour ils le réalisent,
  - type: text
    content: quand ils ont le pouvoir en main.
  '10':
  - type: text
    content: Levez-vous, marchez, car ce n'est pas ici un lieu de repos;
  - type: text
    content: à cause de vos souillures, il y aura des douleurs, des douleurs violentes.
  '11':
  - type: text
    content: 'Si un homme court après le vent et débite des mensonges:'
  - type: text
    content: «Je vais te prophétiser sur le vin, sur les boissons fortes»,
  - type: text
    content: il sera pour ce peuple un prophète.
  - type: heading
    content: Promesse de rassemblement
  '12':
  - type: text
    content: Je te rassemblerai tout entier, Jacob,
  - type: text
    content: je rassemblerai les restes d'Israël,
  - type: text
    content: je les réunirai comme les brebis d'une bergerie,
  - type: text
    content: comme le troupeau dans son pâturage.
  - type: text
    content: Il y aura une foule bruyante.
  '13':
  - type: text
    content: Celui qui fait la brèche montera devant eux;
  - type: text
    content: ils feront la brèche, franchiront la porte et sortiront par là.
  - type: text
    content: Leur roi marchera devant eux,
  - type: text
    content: l'Eternel sera à leur tête.
  '2':
  - type: text
    content: Ils convoitent des champs, et ils s'en emparent,
  - type: text
    content: des maisons, et ils les prennent;
  - type: text
    content: ils traitent avec violence le maître et sa maison,
  - type: text
    content: l'homme et son héritage.
  '3':
  - type: text
    content: 'C''est pourquoi, voici ce que dit l''Eternel:'
  - type: text
    content: Je prépare contre ce peuple un malheur
  - type: text
    content: dont vous ne dégagerez pas votre cou,
  - type: text
    content: et vous ne marcherez pas la tête haute,
  - type: text
    content: '*car ces temps seront mauvais'
  - type: note
    content: 'Car… mauvais: même texte qu''en Amos 5.13, cité en Ephésiens 5.16.'
  - type: text
    content: .
  '4':
  - type: text
    content: Ce jour-là, on fera de vous le sujet d'un proverbe,
  - type: text
    content: on chantera une complainte,
  - type: text
    content: 'on dira: «Nous sommes entièrement dévastés,'
  - type: text
    content: il donne à d'autres la part de mon peuple.
  - type: text
    content: Comment! Il me l'enlève, il distribue nos champs à l'ennemi.»
  '5':
  - type: text
    content: C'est pourquoi tu n'auras personne
  - type: text
    content: pour te mesurer une part du pays
  - type: text
    content: dans l'assemblée de l'Eternel.
  '6':
  - type: text
    content: «Ne discourez pas, discourent-ils.
  - type: text
    content: On ne discourra pas de telles choses!»
  - type: text
    content: La honte n'en finit pas.
  '7':
  - type: text
    content: Qu'est-il dit, famille de Jacob?
  - type: text
    content: L'Eternel serait-il impatient?
  - type: text
    content: Est-ce sa manière d'agir?
  - type: text
    content: Mes paroles ne sont-elles pas favorables
  - type: text
    content: à celui qui marche avec droiture?
  '8':
  - type: text
    content: 'Depuis longtemps mon peuple se dresse comme un ennemi:'
  - type: text
    content: vous enlevez leur tenue
  - type: text
    content: à ceux qui passent en toute confiance
  - type: text
    content: en revenant de la guerre.
  '9':
  - type: text
    content: Vous chassez des maisons qu'elles aiment les femmes de mon peuple,
  - type: text
    content: vous enlevez pour toujours ma gloire à leurs enfants.
