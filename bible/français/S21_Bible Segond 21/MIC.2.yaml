document_id: MIC.2,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Péché et jugement d'Israël
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Malheur à ceux qui projettent l'injustice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui forgent le mal dans leur lit!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au point du jour ils le réalisent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand ils ont le pouvoir en main.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Levez-vous, marchez, car ce n'est pas ici un lieu de repos;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de vos souillures, il y aura des douleurs, des douleurs violentes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Si un homme court après le vent et débite des mensonges:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Je vais te prophétiser sur le vin, sur les boissons fortes»,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il sera pour ce peuple un prophète.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Promesse de rassemblement
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Je te rassemblerai tout entier, Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je rassemblerai les restes d'Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je les réunirai comme les brebis d'une bergerie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme le troupeau dans son pâturage.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y aura une foule bruyante.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Celui qui fait la brèche montera devant eux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils feront la brèche, franchiront la porte et sortiront par là.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur roi marchera devant eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'Eternel sera à leur tête.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ils convoitent des champs, et ils s'en emparent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des maisons, et ils les prennent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils traitent avec violence le maître et sa maison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'homme et son héritage.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'C''est pourquoi, voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je prépare contre ce peuple un malheur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dont vous ne dégagerez pas votre cou,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous ne marcherez pas la tête haute,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*car ces temps seront mauvais'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Car… mauvais: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'même texte qu''en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Amos 5.13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ephésiens 5.16
      - type: text
        text: .
      marker-yv: yv-n
    - type: text
      text: .
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ce jour-là, on fera de vous le sujet d'un proverbe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on chantera une complainte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'on dira: «Nous sommes entièrement dévastés,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il donne à d'autres la part de mon peuple.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comment! Il me l'enlève, il distribue nos champs à l'ennemi.»
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: C'est pourquoi tu n'auras personne
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour te mesurer une part du pays
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans l'assemblée de l'Eternel.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: «Ne discourez pas, discourent-ils.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne discourra pas de telles choses!»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La honte n'en finit pas.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Qu'est-il dit, famille de Jacob?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel serait-il impatient?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-ce sa manière d'agir?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes paroles ne sont-elles pas favorables
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à celui qui marche avec droiture?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Depuis longtemps mon peuple se dresse comme un ennemi:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous enlevez leur tenue
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à ceux qui passent en toute confiance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en revenant de la guerre.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Vous chassez des maisons qu'elles aiment les femmes de mon peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous enlevez pour toujours ma gloire à leurs enfants.
