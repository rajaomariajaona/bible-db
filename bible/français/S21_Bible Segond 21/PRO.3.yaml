document_id: PRO.3,152
type_code: fra
verses:
  '1':
  - type: text
    content: Mon fils, n'oublie pas mon enseignement
  - type: text
    content: et que ton cœur garde mes commandements,
  '10':
  - type: text
    content: Alors tes greniers seront abondamment remplis
  - type: text
    content: et tes cuves déborderont de vin nouveau.
  '11':
  - type: text
    content: '*Mon fils, ne méprise pas la correction de l''Eternel'
  - type: text
    content: et ne sois pas dégoûté lorsqu'il te reprend,
  '12':
  - type: text
    content: car l'Eternel reprend celui qu'il aime,
  - type: text
    content: comme un père l'enfant qui a sa faveur.
  - type: note
    content: 'Mon fils… faveur: cité en Hébreux 12.5-6.'
  '13':
  - type: text
    content: Heureux l'homme qui a trouvé la sagesse
  - type: text
    content: et l'homme qui possède l'intelligence!
  '14':
  - type: text
    content: En effet, le bénéfice qu'elle procure est préférable à celui de l'argent
  - type: text
    content: et le profit qu'on en tire vaut mieux que l'or.
  '15':
  - type: text
    content: Elle est plus précieuse que les perles,
  - type: text
    content: elle a plus de valeur que tout ce que tu pourrais désirer.
  '16':
  - type: text
    content: Une longue vie est dans sa main droite,
  - type: text
    content: dans sa gauche se trouvent la richesse et la gloire.
  '17':
  - type: text
    content: Ses voies sont des voies agréables
  - type: text
    content: et tous ses sentiers sont des sentiers de paix.
  '18':
  - type: text
    content: Elle est un arbre de vie pour ceux qui s'attachent à elle,
  - type: text
    content: et ceux qui la possèdent sont heureux.
  '19':
  - type: text
    content: C'est par la sagesse que l'Eternel a fondé la terre,
  - type: text
    content: c'est par l'intelligence qu'il a affermi le ciel;
  '2':
  - type: text
    content: car ils prolongeront la durée de tes jours,
  - type: text
    content: les années de ta vie, et ils augmenteront ta paix.
  '20':
  - type: text
    content: c'est par sa connaissance que les abîmes se sont ouverts
  - type: text
    content: et que les nuages distillent la rosée.
  '21':
  - type: text
    content: Mon fils, que ces conseils ne s'éloignent pas de tes yeux!
  - type: text
    content: Garde le discernement et la réflexion!
  '22':
  - type: text
    content: Ils seront la vie de ton âme
  - type: text
    content: et l'ornement de ton cou.
  '23':
  - type: text
    content: Alors tu marcheras en sécurité sur ton chemin
  - type: text
    content: et ton pied ne heurtera pas d'obstacle.
  '24':
  - type: text
    content: Si tu te couches, tu n'auras rien à redouter
  - type: text
    content: et, quand tu seras couché, ton sommeil sera doux.
  '25':
  - type: text
    content: N'aie pas peur d'une cause de terreur soudaine
  - type: text
    content: ni d'une attaque de la part des méchants,
  '26':
  - type: text
    content: car l'Eternel sera ton assurance
  - type: text
    content: et il préservera ton pied de tout piège.
  '27':
  - type: text
    content: Ne refuse pas un bienfait à ceux qui y ont droit
  - type: text
    content: quand tu as le pouvoir de l'accorder.
  '28':
  - type: text
    content: 'Ne dis pas à ton prochain: «Va-t''en puis reviens,'
  - type: text
    content: c'est demain que je donnerai» quand tu as de quoi donner.
  '29':
  - type: text
    content: Ne médite pas le mal contre ton prochain
  - type: text
    content: alors qu'il habite en toute confiance près de toi,
  '3':
  - type: text
    content: 'Que la bonté et la vérité ne t''abandonnent pas:'
  - type: text
    content: attache-les à ton cou, écris-les sur la table de ton cœur.
  '30':
  - type: text
    content: ne te dispute pas sans raison avec quelqu'un
  - type: text
    content: lorsqu'il ne t'a fait aucun mal.
  '31':
  - type: text
    content: Ne sois pas jaloux de l'homme violent
  - type: text
    content: et ne choisis aucune de ses voies,
  '32':
  - type: text
    content: car l'Eternel a horreur de l'homme perverti,
  - type: text
    content: mais il est un ami pour les hommes droits.
  '33':
  - type: text
    content: La malédiction de l'Eternel frappe la maison du méchant,
  - type: text
    content: mais il bénit le domaine des justes.
  '34':
  - type: text
    content: '*Il se moque des moqueurs,'
  - type: text
    content: mais il fait grâce aux humbles.
  - type: note
    content: 'Il se moque… humbles: cité en Jacques 4.6; 1 Pierre 5.5.'
  '35':
  - type: text
    content: Les sages hériteront de la gloire,
  - type: text
    content: mais les hommes stupides récolteront le déshonneur.
  '4':
  - type: text
    content: Tu trouveras ainsi grâce et bon sens
  - type: text
    content: aux yeux de Dieu et des hommes.
  '5':
  - type: text
    content: Confie-toi en l'Eternel de tout ton cœur
  - type: text
    content: et ne t'appuie pas sur ton intelligence!
  '6':
  - type: text
    content: Reconnais-le dans toutes tes voies
  - type: text
    content: et il rendra tes sentiers droits.
  '7':
  - type: text
    content: '*Ne te prends pas pour un sage'
  - type: note
    content: 'Ne te… sage: cité en Romains 12.16.'
  - type: text
    content: ','
  - type: text
    content: 'crains l''Eternel et détourne-toi du mal:'
  '8':
  - type: text
    content: cela apportera la guérison à ton corps
  - type: text
    content: et un rafraîchissement à tes os.
  '9':
  - type: text
    content: Honore l'Eternel avec tes biens
  - type: text
    content: et avec les premiers de tous tes produits!
