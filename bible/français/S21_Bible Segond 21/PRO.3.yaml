document_id: PRO.3,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon fils, n'oublie pas mon enseignement
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que ton cœur garde mes commandements,
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors tes greniers seront abondamment remplis
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tes cuves déborderont de vin nouveau.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*Mon fils, ne méprise pas la correction de l''Eternel'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne sois pas dégoûté lorsqu'il te reprend,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l'Eternel reprend celui qu'il aime,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme un père l'enfant qui a sa faveur.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11-12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Mon fils… faveur: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hébreux 12.5-6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux l'homme qui a trouvé la sagesse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'homme qui possède l'intelligence!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, le bénéfice qu'elle procure est préférable à celui de l'argent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le profit qu'on en tire vaut mieux que l'or.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle est plus précieuse que les perles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle a plus de valeur que tout ce que tu pourrais désirer.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une longue vie est dans sa main droite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans sa gauche se trouvent la richesse et la gloire.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses voies sont des voies agréables
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tous ses sentiers sont des sentiers de paix.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle est un arbre de vie pour ceux qui s'attachent à elle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ceux qui la possèdent sont heureux.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est par la sagesse que l'Eternel a fondé la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est par l'intelligence qu'il a affermi le ciel;
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils prolongeront la durée de tes jours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les années de ta vie, et ils augmenteront ta paix.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est par sa connaissance que les abîmes se sont ouverts
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que les nuages distillent la rosée.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon fils, que ces conseils ne s'éloignent pas de tes yeux!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Garde le discernement et la réflexion!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils seront la vie de ton âme
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'ornement de ton cou.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors tu marcheras en sécurité sur ton chemin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ton pied ne heurtera pas d'obstacle.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu te couches, tu n'auras rien à redouter
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, quand tu seras couché, ton sommeil sera doux.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N'aie pas peur d'une cause de terreur soudaine
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni d'une attaque de la part des méchants,
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l'Eternel sera ton assurance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il préservera ton pied de tout piège.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne refuse pas un bienfait à ceux qui y ont droit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand tu as le pouvoir de l'accorder.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ne dis pas à ton prochain: «Va-t''en puis reviens,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est demain que je donnerai» quand tu as de quoi donner.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne médite pas le mal contre ton prochain
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors qu'il habite en toute confiance près de toi,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Que la bonté et la vérité ne t''abandonnent pas:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: attache-les à ton cou, écris-les sur la table de ton cœur.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne te dispute pas sans raison avec quelqu'un
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsqu'il ne t'a fait aucun mal.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne sois pas jaloux de l'homme violent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne choisis aucune de ses voies,
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l'Eternel a horreur de l'homme perverti,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il est un ami pour les hommes droits.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La malédiction de l'Eternel frappe la maison du méchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il bénit le domaine des justes.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*Il se moque des moqueurs,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il fait grâce aux humbles.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.34 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il se moque… humbles: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jacques 4.6
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pierre 5.5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les sages hériteront de la gloire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais les hommes stupides récolteront le déshonneur.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu trouveras ainsi grâce et bon sens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux yeux de Dieu et des hommes.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Confie-toi en l'Eternel de tout ton cœur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne t'appuie pas sur ton intelligence!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reconnais-le dans toutes tes voies
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il rendra tes sentiers droits.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*Ne te prends pas pour un sage'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ne te… sage: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Romains 12.16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'crains l''Eternel et détourne-toi du mal:'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cela apportera la guérison à ton corps
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et un rafraîchissement à tes os.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Honore l'Eternel avec tes biens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et avec les premiers de tous tes produits!
