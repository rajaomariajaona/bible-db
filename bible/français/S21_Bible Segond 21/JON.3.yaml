document_id: JON.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prédication de Jonas à Ninive
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La parole de l''Eternel fut adressée à Jonas une deuxième fois: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Lève-toi, va à Ninive, la grande ville, et fais-y la proclamation que je t'ordonne.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jonas se leva et alla à Ninive, conformément à la parole de l''Eternel. Or Ninive était une immense ville: il fallait trois jours de marche pour en faire le tour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jonas fit d''abord dans la ville une journée de marche; il proclamait: «Dans 40 jours, Ninive sera détruite!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les habitants de Ninive crurent à Dieu. Ils proclamèrent un jeûne et s''habillèrent de sacs, depuis les plus grands jusqu''aux plus petits. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le roi de Ninive apprit la nouvelle. Il se leva de son trône, retira son manteau, se couvrit d''un sac et s''assit sur la cendre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et il fit faire dans Ninive cette proclamation: «Par ordre du roi et de ses grands, que les hommes et les bêtes, les bœufs et les brebis ne goûtent de rien, ne mangent pas et ne boivent pas d''eau! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Que les hommes et les bêtes soient couverts de sacs
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Couverts de sacs: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: signe de deuil et d'humiliation.
    marker-yv: yv-n
  - type: text
    text: ', qu''ils crient à Dieu avec force, et qu''ils renoncent tous à leur mauvaise conduite et aux actes de violence dont leurs mains sont coupables! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Qui sait si Dieu ne se ravisera pas et ne reviendra pas sur sa décision, s'il ne renoncera pas à son ardente colère, de sorte que nous ne mourions pas?»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Dieu vit ce qu'ils faisaient, il vit qu'ils renonçaient à leur mauvaise conduite. Alors Dieu regretta le mal dont il les avait menacés et ne le fit pas.
