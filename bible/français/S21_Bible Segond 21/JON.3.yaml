document_id: JON.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prédication de Jonas à Ninive
  - type: text
    content: 'La parole de l''Eternel fut adressée à Jonas une deuxième fois: '
  '10':
  - type: text
    content: Dieu vit ce qu'ils faisaient, il vit qu'ils renonçaient à leur mauvaise conduite. Alors Dieu regretta le mal dont il les avait menacés et ne le fit pas.
  '2':
  - type: text
    content: «Lève-toi, va à Ninive, la grande ville, et fais-y la proclamation que je t'ordonne.»
  '3':
  - type: text
    content: 'Jonas se leva et alla à Ninive, conformément à la parole de l''Eternel. Or Ninive était une immense ville: il fallait trois jours de marche pour en faire le tour. '
  '4':
  - type: text
    content: 'Jonas fit d''abord dans la ville une journée de marche; il proclamait: «Dans 40 jours, Ninive sera détruite!»'
  '5':
  - type: text
    content: 'Les habitants de Ninive crurent à Dieu. Ils proclamèrent un jeûne et s''habillèrent de sacs, depuis les plus grands jusqu''aux plus petits. '
  '6':
  - type: text
    content: 'Le roi de Ninive apprit la nouvelle. Il se leva de son trône, retira son manteau, se couvrit d''un sac et s''assit sur la cendre. '
  '7':
  - type: text
    content: 'Et il fit faire dans Ninive cette proclamation: «Par ordre du roi et de ses grands, que les hommes et les bêtes, les bœufs et les brebis ne goûtent de rien, ne mangent pas et ne boivent pas d''eau! '
  '8':
  - type: text
    content: Que les hommes et les bêtes soient couverts de sacs
  - type: note
    content: 'Couverts de sacs: signe de deuil et d''humiliation.'
  - type: text
    content: ', qu''ils crient à Dieu avec force, et qu''ils renoncent tous à leur mauvaise conduite et aux actes de violence dont leurs mains sont coupables! '
  '9':
  - type: text
    content: Qui sait si Dieu ne se ravisera pas et ne reviendra pas sur sa décision, s'il ne renoncera pas à son ardente colère, de sorte que nous ne mourions pas?»
