document_id: LUK.9,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Mission des douze apôtres
  - type: text
    content: 'Jésus rassembla les douze [apôtres] et leur donna puissance et autorité pour chasser tous les démons et guérir les maladies. '
  '10':
  - type: text
    content: 'A leur retour, les apôtres racontèrent à Jésus tout ce qu''ils avaient fait. Il les prit avec lui et se retira à l''écart, du côté d''une ville appelée Bethsaïda. '
  '11':
  - type: text
    content: Mais les gens l'apprirent et le suivirent. Jésus les accueillit; il leur parlait du royaume de Dieu et il guérissait ceux qui en avaient besoin.
  '12':
  - type: text
    content: 'Comme le jour commençait à baisser, les douze s''approchèrent et lui dirent: «Renvoie la foule, afin qu''elle aille dans les villages et dans les campagnes des environs pour se loger et pour trouver de quoi manger, car nous sommes ici dans un endroit désert.» '
  '13':
  - type: text
    content: 'Mais Jésus leur dit: «Donnez-leur vous-mêmes à manger!» Ils répondirent: «Nous n''avons pas plus de cinq pains et deux poissons, à moins d''aller nous-mêmes acheter des vivres pour tout ce peuple.» '
  '14':
  - type: text
    content: 'En effet, il y avait environ 5000 hommes. Jésus dit à ses disciples: «Faites-les asseoir par groupes de 50.» '
  '15':
  - type: text
    content: 'C''est ce qu''ils firent, et tout le monde s''assit. '
  '16':
  - type: text
    content: 'Jésus prit les cinq pains et les deux poissons, leva les yeux vers le ciel et les bénit. Puis il les rompit et les donna aux disciples afin qu''ils les distribuent à la foule. '
  '17':
  - type: text
    content: Tous mangèrent et furent rassasiés, et l'on emporta douze paniers pleins des morceaux qui restaient.
  - type: heading
    content: Pierre reconnaît Jésus comme le Messie
  '18':
  - type: text
    content: 'Un jour, Jésus priait à l''écart et ses disciples étaient avec lui. Il leur posa cette question: «Qui suis-je, d''après les foules?» '
  '19':
  - type: text
    content: 'Ils répondirent: «D''après les uns, Jean-Baptiste; d''après certains, Elie; d''après d''autres, un des prophètes d''autrefois qui est ressuscité.» '
  '2':
  - type: text
    content: 'Il les envoya proclamer le royaume de Dieu et guérir les malades. '
  '20':
  - type: text
    content: '«Et d''après vous, qui suis-je?» leur demanda-t-il. Pierre répondit: «Le Messie de Dieu.» '
  '21':
  - type: text
    content: 'Jésus leur recommanda sévèrement de ne le dire à personne. '
  '22':
  - type: text
    content: Il ajouta qu'il fallait que le Fils de l'homme souffre beaucoup, qu'il soit rejeté par les anciens, par les chefs des prêtres et par les spécialistes de la loi, qu'il soit mis à mort et qu'il ressuscite le troisième jour.
  '23':
  - type: text
    content: 'Puis il dit à tous: «Si quelqu''un veut être mon disciple, qu''il renonce à lui-même, qu''il se charge [chaque jour] de sa croix et qu''il me suive, '
  '24':
  - type: text
    content: 'car celui qui voudra sauver sa vie la perdra, mais celui qui la perdra à cause de moi la sauvera. '
  '25':
  - type: text
    content: 'Que sert-il à un homme de gagner le monde entier, s''il se perd ou se détruit lui-même? '
  '26':
  - type: text
    content: 'En effet, celui qui aura honte de moi et de mes paroles, le Fils de l''homme aura honte de lui, quand il viendra dans sa gloire et dans celle du Père et des saints anges. '
  '27':
  - type: text
    content: Je vous le dis en vérité, quelques-uns de ceux qui sont ici ne mourront pas avant d'avoir vu le royaume de Dieu.»
  - type: heading
    content: La transfiguration
  '28':
  - type: text
    content: 'Environ huit jours après avoir dit ces paroles, Jésus prit avec lui Pierre, Jean et Jacques, et il monta sur la montagne pour prier. '
  '29':
  - type: text
    content: 'Pendant qu''il priait, l''aspect de son visage changea et son vêtement devint d''une blancheur éclatante. '
  '3':
  - type: text
    content: '«Ne prenez rien pour le voyage, leur dit-il, ni bâtons, ni sac, ni pain, ni argent, et n''ayez pas deux chemises [chacun]. '
  '30':
  - type: text
    content: 'Et voici que deux hommes s''entretenaient avec lui: c''étaient Moïse et Elie; '
  '31':
  - type: text
    content: 'apparaissant dans la gloire, ils parlaient de son prochain départ qui allait s''accomplir à Jérusalem. '
  '32':
  - type: text
    content: 'Pierre et ses compagnons étaient accablés de sommeil mais, restés éveillés, ils virent la gloire de Jésus et les deux hommes qui étaient avec lui. '
  '33':
  - type: text
    content: 'Au moment où ces hommes se séparaient de Jésus, Pierre lui dit: «Maître, il est bon que nous soyons ici. Faisons trois abris: un pour toi, un pour Moïse et un pour Elie.» Il ne savait pas ce qu''il disait. '
  '34':
  - type: text
    content: 'Il parlait encore quand une nuée vint les couvrir; les disciples furent saisis de frayeur en les voyant disparaître dans la nuée. '
  '35':
  - type: text
    content: 'Et de la nuée sortit une voix qui dit: «Celui-ci est mon Fils bien-aimé: écoutez-le!» '
  '36':
  - type: text
    content: Quand la voix se fit entendre, Jésus se retrouva seul. Les disciples gardèrent le silence et, à cette époque-là, ils ne racontèrent rien à personne de ce qu'ils avaient vu.
  - type: heading
    content: Guérison d'un démoniaque
  '37':
  - type: text
    content: 'Le lendemain, lorsqu''ils furent descendus de la montagne, une grande foule vint à la rencontre de Jésus. '
  '38':
  - type: text
    content: 'Alors, du milieu de la foule, un homme s''écria: «Maître, je t''en prie, jette les regards sur mon fils, car c''est mon fils unique. '
  '39':
  - type: text
    content: 'Un esprit s''empare de lui et tout à coup il pousse des cris; l''esprit le secoue violemment, le fait écumer et le quitte à grand-peine, après l''avoir tout brisé. '
  '4':
  - type: text
    content: 'Quelle que soit la maison où vous entrez, restez-y, et c''est de là que vous partirez. '
  '40':
  - type: text
    content: 'J''ai prié tes disciples de le chasser et ils n''ont pas pu.» '
  '41':
  - type: text
    content: '«Génération incrédule et perverse, répondit Jésus, jusqu''à quand serai-je avec vous et devrai-je vous supporter? Amène ton fils ici.» '
  '42':
  - type: text
    content: 'Tandis que l''enfant s''approchait, le démon le jeta par terre et le secoua violemment, mais Jésus menaça l''esprit impur, guérit l''enfant et le rendit à son père. '
  '43':
  - type: text
    content: 'Tous furent frappés par la grandeur de Dieu. Alors que chacun s''émerveillait de tout ce que faisait Jésus, il dit à ses disciples: '
  '44':
  - type: text
    content: '«Quant à vous, écoutez bien ceci: le Fils de l''homme doit être livré entre les mains des hommes.» '
  '45':
  - type: text
    content: Cependant, ils ne comprenaient pas cette parole; elle était voilée pour eux afin qu'ils n'en saisissent pas le sens, et ils avaient peur de l'interroger à ce sujet.
  - type: heading
    content: Petits et grands dans le royaume de Dieu
  '46':
  - type: text
    content: 'Ils eurent une discussion entre eux pour savoir lequel parmi eux était le plus grand. '
  '47':
  - type: text
    content: 'Jésus connaissait la pensée de leur cœur; il prit un petit enfant, le plaça près de lui '
  '48':
  - type: text
    content: 'et leur dit: «Celui qui accueille en mon nom ce petit enfant, c''est moi-même qu''il accueille, et celui qui m''accueille accueille celui qui m''a envoyé. En effet, celui qui est le plus petit parmi vous tous, c''est celui-là qui est grand.»'
  '49':
  - type: text
    content: 'Jean prit la parole et dit: «Maître, nous avons vu quelqu''un chasser des démons en ton nom et nous l''en avons empêché, parce qu''il ne nous suit pas.» '
  '5':
  - type: text
    content: Si l'on ne vous accueille pas, sortez de cette ville et secouez la poussière de vos pieds
  - type: note
    content: 'Secouez… pieds: les Juifs avaient l''habitude de secouer la poussière de leurs pieds en quittant une ville non juive; ils exprimaient ainsi leur séparation d''avec ceux qui n''adoraient pas Dieu.'
  - type: text
    content: ' en témoignage contre eux.» '
  '50':
  - type: text
    content: «Ne l'en empêchez pas, lui répondit Jésus, car celui qui n'est pas contre nous est pour nous.»
  - type: heading
    content: De la Galilée à Jérusalem
  - type: heading
    content: 9.51–21.38
  - type: heading
    content: Jésus en Samarie
  '51':
  - type: text
    content: 'Lorsque approchèrent les jours où il devait être enlevé du monde, Jésus prit la décision de se rendre à Jérusalem. '
  '52':
  - type: text
    content: 'Il envoya devant lui des messagers qui se mirent en route et entrèrent dans un village samaritain pour lui préparer un logement. '
  '53':
  - type: text
    content: 'Mais on refusa de l''accueillir parce qu''il se dirigeait vers Jérusalem. '
  '54':
  - type: text
    content: 'Voyant cela, ses disciples Jacques et Jean dirent: «Seigneur, veux-tu que nous ordonnions au feu de descendre du ciel et de les consumer [comme l''a fait Elie]?» '
  '55':
  - type: text
    content: 'Jésus se tourna vers eux et leur adressa des reproches [en disant: «Vous ne savez pas de quel esprit vous êtes animés. '
  '56':
  - type: text
    content: En effet, le Fils de l'homme n'est pas venu pour perdre les âmes des hommes, mais pour les sauver.»] Et ils allèrent dans un autre village.
  '57':
  - type: text
    content: 'Pendant qu''ils étaient en chemin, un homme lui dit: «[Seigneur,] je te suivrai partout où tu iras.» '
  '58':
  - type: text
    content: 'Jésus lui répondit: «Les renards ont des tanières et les oiseaux du ciel ont des nids, mais le Fils de l''homme n''a pas un endroit où il puisse reposer sa tête.» '
  '59':
  - type: text
    content: 'Il dit à un autre: «Suis-moi.» Il répondit: «Seigneur, permets-moi d''aller d''abord enterrer mon père.» '
  '6':
  - type: text
    content: Ils partirent et allèrent de village en village; ils annonçaient la bonne nouvelle et faisaient partout des guérisons.
  '60':
  - type: text
    content: 'Mais Jésus lui dit: «Laisse les morts enterrer leurs morts et toi, va annoncer le royaume de Dieu.» '
  '61':
  - type: text
    content: 'Un autre dit: «Je te suivrai, Seigneur, mais permets-moi d''aller d''abord faire mes adieux à ceux de ma maison.» '
  '62':
  - type: text
    content: 'Jésus lui répondit: «Celui qui met la main à la charrue et regarde en arrière n''est pas fait pour le royaume de Dieu.»'
  '7':
  - type: text
    content: 'Hérode le tétrarque entendit parler de tout ce qui se passait; il ne savait que penser, car les uns disaient que Jean était ressuscité, '
  '8':
  - type: text
    content: 'd''autres qu''Elie était apparu et d''autres qu''un des prophètes d''autrefois était ressuscité. '
  '9':
  - type: text
    content: 'Mais Hérode disait: «J''ai fait décapiter Jean. Qui donc est cet homme à propos duquel j''entends dire de telles choses?» et il cherchait à le voir.'
  - type: heading
    content: Multiplication des pains pour 5000 hommes
