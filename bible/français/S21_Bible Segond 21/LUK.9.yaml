document_id: LUK.9,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mission des douze apôtres
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus rassembla les douze [apôtres] et leur donna puissance et autorité pour chasser tous les démons et guérir les maladies. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A leur retour, les apôtres racontèrent à Jésus tout ce qu''ils avaient fait. Il les prit avec lui et se retira à l''écart, du côté d''une ville appelée Bethsaïda. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais les gens l'apprirent et le suivirent. Jésus les accueillit; il leur parlait du royaume de Dieu et il guérissait ceux qui en avaient besoin.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme le jour commençait à baisser, les douze s''approchèrent et lui dirent: «Renvoie la foule, afin qu''elle aille dans les villages et dans les campagnes des environs pour se loger et pour trouver de quoi manger, car nous sommes ici dans un endroit désert.» '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Jésus leur dit: «Donnez-leur vous-mêmes à manger!» Ils répondirent: «Nous n''avons pas plus de cinq pains et deux poissons, à moins d''aller nous-mêmes acheter des vivres pour tout ce peuple.» '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, il y avait environ 5000 hommes. Jésus dit à ses disciples: «Faites-les asseoir par groupes de 50.» '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est ce qu''ils firent, et tout le monde s''assit. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus prit les cinq pains et les deux poissons, leva les yeux vers le ciel et les bénit. Puis il les rompit et les donna aux disciples afin qu''ils les distribuent à la foule. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tous mangèrent et furent rassasiés, et l'on emporta douze paniers pleins des morceaux qui restaient.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Pierre reconnaît Jésus comme le Messie
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un jour, Jésus priait à l''écart et ses disciples étaient avec lui. Il leur posa cette question: «Qui suis-je, d''après les foules?» '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils répondirent: «D''après les uns, Jean-Baptiste; d''après certains, Elie; d''après d''autres, un des prophètes d''autrefois qui est ressuscité.» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il les envoya proclamer le royaume de Dieu et guérir les malades. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Et d''après vous, qui suis-je?» leur demanda-t-il. Pierre répondit: «Le Messie de Dieu.» '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur recommanda sévèrement de ne le dire à personne. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il ajouta qu'il fallait que le Fils de l'homme souffre beaucoup, qu'il soit rejeté par les anciens, par les chefs des prêtres et par les spécialistes de la loi, qu'il soit mis à mort et qu'il ressuscite le troisième jour.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il dit à tous: «Si quelqu''un veut être mon disciple, qu''il renonce à lui-même, qu''il se charge [chaque jour] de sa croix et qu''il me suive, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car celui qui voudra sauver sa vie la perdra, mais celui qui la perdra à cause de moi la sauvera. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que sert-il à un homme de gagner le monde entier, s''il se perd ou se détruit lui-même? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, celui qui aura honte de moi et de mes paroles, le Fils de l''homme aura honte de lui, quand il viendra dans sa gloire et dans celle du Père et des saints anges. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je vous le dis en vérité, quelques-uns de ceux qui sont ici ne mourront pas avant d'avoir vu le royaume de Dieu.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La transfiguration
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Environ huit jours après avoir dit ces paroles, Jésus prit avec lui Pierre, Jean et Jacques, et il monta sur la montagne pour prier. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant qu''il priait, l''aspect de son visage changea et son vêtement devint d''une blancheur éclatante. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Ne prenez rien pour le voyage, leur dit-il, ni bâtons, ni sac, ni pain, ni argent, et n''ayez pas deux chemises [chacun]. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et voici que deux hommes s''entretenaient avec lui: c''étaient Moïse et Elie; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'apparaissant dans la gloire, ils parlaient de son prochain départ qui allait s''accomplir à Jérusalem. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre et ses compagnons étaient accablés de sommeil mais, restés éveillés, ils virent la gloire de Jésus et les deux hommes qui étaient avec lui. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au moment où ces hommes se séparaient de Jésus, Pierre lui dit: «Maître, il est bon que nous soyons ici. Faisons trois abris: un pour toi, un pour Moïse et un pour Elie.» Il ne savait pas ce qu''il disait. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il parlait encore quand une nuée vint les couvrir; les disciples furent saisis de frayeur en les voyant disparaître dans la nuée. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et de la nuée sortit une voix qui dit: «Celui-ci est mon Fils bien-aimé: écoutez-le!» '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand la voix se fit entendre, Jésus se retrouva seul. Les disciples gardèrent le silence et, à cette époque-là, ils ne racontèrent rien à personne de ce qu'ils avaient vu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Guérison d'un démoniaque
    marker-yv: yv-h
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le lendemain, lorsqu''ils furent descendus de la montagne, une grande foule vint à la rencontre de Jésus. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors, du milieu de la foule, un homme s''écria: «Maître, je t''en prie, jette les regards sur mon fils, car c''est mon fils unique. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un esprit s''empare de lui et tout à coup il pousse des cris; l''esprit le secoue violemment, le fait écumer et le quitte à grand-peine, après l''avoir tout brisé. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelle que soit la maison où vous entrez, restez-y, et c''est de là que vous partirez. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai prié tes disciples de le chasser et ils n''ont pas pu.» '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Génération incrédule et perverse, répondit Jésus, jusqu''à quand serai-je avec vous et devrai-je vous supporter? Amène ton fils ici.» '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tandis que l''enfant s''approchait, le démon le jeta par terre et le secoua violemment, mais Jésus menaça l''esprit impur, guérit l''enfant et le rendit à son père. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous furent frappés par la grandeur de Dieu. Alors que chacun s''émerveillait de tout ce que faisait Jésus, il dit à ses disciples: '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Quant à vous, écoutez bien ceci: le Fils de l''homme doit être livré entre les mains des hommes.» '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cependant, ils ne comprenaient pas cette parole; elle était voilée pour eux afin qu'ils n'en saisissent pas le sens, et ils avaient peur de l'interroger à ce sujet.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Petits et grands dans le royaume de Dieu
    marker-yv: yv-h
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils eurent une discussion entre eux pour savoir lequel parmi eux était le plus grand. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus connaissait la pensée de leur cœur; il prit un petit enfant, le plaça près de lui '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et leur dit: «Celui qui accueille en mon nom ce petit enfant, c''est moi-même qu''il accueille, et celui qui m''accueille accueille celui qui m''a envoyé. En effet, celui qui est le plus petit parmi vous tous, c''est celui-là qui est grand.»'
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jean prit la parole et dit: «Maître, nous avons vu quelqu''un chasser des démons en ton nom et nous l''en avons empêché, parce qu''il ne nous suit pas.» '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si l'on ne vous accueille pas, sortez de cette ville et secouez la poussière de vos pieds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Secouez… pieds: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: les Juifs avaient l'habitude de secouer la poussière de leurs pieds en quittant une ville non juive; ils exprimaient ainsi leur séparation d'avec ceux qui n'adoraient pas Dieu.
      marker-yv: yv-n
    - type: text
      text: ' en témoignage contre eux.» '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Ne l'en empêchez pas, lui répondit Jésus, car celui qui n'est pas contre nous est pour nous.»
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: De la Galilée à Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 9.51–21.38
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus en Samarie
    marker-yv: yv-h
  '51':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque approchèrent les jours où il devait être enlevé du monde, Jésus prit la décision de se rendre à Jérusalem. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il envoya devant lui des messagers qui se mirent en route et entrèrent dans un village samaritain pour lui préparer un logement. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais on refusa de l''accueillir parce qu''il se dirigeait vers Jérusalem. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voyant cela, ses disciples Jacques et Jean dirent: «Seigneur, veux-tu que nous ordonnions au feu de descendre du ciel et de les consumer [comme l''a fait Elie]?» '
  '55':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus se tourna vers eux et leur adressa des reproches [en disant: «Vous ne savez pas de quel esprit vous êtes animés. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, le Fils de l'homme n'est pas venu pour perdre les âmes des hommes, mais pour les sauver.»] Et ils allèrent dans un autre village.
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant qu''ils étaient en chemin, un homme lui dit: «[Seigneur,] je te suivrai partout où tu iras.» '
  '58':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui répondit: «Les renards ont des tanières et les oiseaux du ciel ont des nids, mais le Fils de l''homme n''a pas un endroit où il puisse reposer sa tête.» '
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit à un autre: «Suis-moi.» Il répondit: «Seigneur, permets-moi d''aller d''abord enterrer mon père.» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils partirent et allèrent de village en village; ils annonçaient la bonne nouvelle et faisaient partout des guérisons.
  '60':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Jésus lui dit: «Laisse les morts enterrer leurs morts et toi, va annoncer le royaume de Dieu.» '
  '61':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un autre dit: «Je te suivrai, Seigneur, mais permets-moi d''aller d''abord faire mes adieux à ceux de ma maison.» '
  '62':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui répondit: «Celui qui met la main à la charrue et regarde en arrière n''est pas fait pour le royaume de Dieu.»'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hérode le tétrarque entendit parler de tout ce qui se passait; il ne savait que penser, car les uns disaient que Jean était ressuscité, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'd''autres qu''Elie était apparu et d''autres qu''un des prophètes d''autrefois était ressuscité. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Hérode disait: «J''ai fait décapiter Jean. Qui donc est cet homme à propos duquel j''entends dire de telles choses?» et il cherchait à le voir.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Multiplication des pains pour 5000 hommes
    marker-yv: yv-h
