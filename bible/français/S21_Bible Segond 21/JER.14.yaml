document_id: JER.14,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La sécheresse
  - type: text
    content: Voici la parole de l'Eternel adressée à Jérémie concernant la sécheresse.
  '10':
  - type: text
    content: '«Voici ce que l''Eternel dit à propos de ce peuple:'
  - type: text
    content: Ils ont aimé errer par-ci par-là,
  - type: text
    content: ils n'ont pas su retenir leurs pieds.
  - type: text
    content: L'Eternel ne s'est pas plu en leur compagnie,
  - type: text
    content: il se souvient maintenant de leurs fautes
  - type: text
    content: et il interviendra à cause de leurs péchés.»
  - type: heading
    content: Les prétendus prophètes
  '11':
  - type: text
    content: 'L''Eternel m''a dit:'
  - type: text
    content: «N'intercède pas en faveur de ce peuple!
  '12':
  - type: text
    content: S'ils jeûnent, je n'écouterai pas leurs supplications;
  - type: text
    content: s'ils offrent des holocaustes et des offrandes, je ne les accepterai pas.
  - type: text
    content: En effet, je veux les exterminer par l'épée, par la famine et par la peste.»
  '13':
  - type: text
    content: 'J''ai répondu: «Ah! Seigneur Eternel!'
  - type: text
    content: 'Ce sont les prophètes qui leur disent:'
  - type: text
    content: ‘Vous ne verrez pas d'épée,
  - type: text
    content: vous n'aurez pas de famine,
  - type: text
    content: mais je vous donnerai une paix complète dans cet endroit.’»
  '14':
  - type: text
    content: 'Et l''Eternel m''a dit:'
  - type: text
    content: «Les prophètes annoncent des faussetés comme si cela venait de moi.
  - type: text
    content: Je ne les ai pas envoyés, je ne leur ai pas donné d'ordre,
  - type: text
    content: je ne leur ai pas parlé.
  - type: text
    content: C'est par des visions mensongères, des divinations stupides,
  - type: text
    content: des supercheries de leur invention, qu'ils font les prophètes auprès de vous.
  '15':
  - type: text
    content: C'est pourquoi, voici ce que je dis, moi l'Eternel,
  - type: text
    content: au sujet des prophètes qui prophétisent en mon nom
  - type: text
    content: sans que je les aie envoyés
  - type: text
    content: 'et qui prétendent qu''il n''y aura pas d''épée ni de famine dans ce pays:'
  - type: text
    content: Ces prophètes seront éliminés par l'épée et par la famine,
  '16':
  - type: text
    content: et ceux auxquels ils prophétisent
  - type: text
    content: seront jetés dans les rues de Jérusalem
  - type: text
    content: devant la famine et l'épée.
  - type: text
    content: Il n'y aura personne pour les ensevelir,
  - type: text
    content: ni eux, ni leurs femmes, ni leurs fils, ni leurs filles.
  - type: text
    content: Je déverserai sur eux leur propre méchanceté.
  '17':
  - type: text
    content: '»Dis-leur cette parole:'
  - type: text
    content: ‘Les larmes coulent de mes yeux nuit et jour, sans arrêt,
  - type: text
    content: parce que la jeune fille de mon peuple a été frappée d'un grand désastre,
  - type: text
    content: d'une blessure très douloureuse.
  '18':
  - type: text
    content: Si je sors dans la campagne, je vois des hommes tués par l'épée.
  - type: text
    content: Si j'entre dans la ville, je vois des hommes torturés par la faim.
  - type: text
    content: Même le prophète et le prêtre parcourent le pays
  - type: text
    content: sans comprendre.’»
  - type: heading
    content: Perplexité de Jérémie
  '19':
  - type: text
    content: «As-tu vraiment rejeté Juda
  - type: text
    content: et détestes-tu Sion à ce point?
  - type: text
    content: Pourquoi nous frappes-tu
  - type: text
    content: sans qu'il y ait pour nous de guérison?
  - type: text
    content: Nous espérions la paix et il n'arrive rien d'heureux,
  - type: text
    content: un temps de guérison et voici la terreur!
  '2':
  - type: text
    content: Juda est endeuillé.
  - type: text
    content: Ses villes dépérissent, elles sont tristes et abattues.
  - type: text
    content: Un cri monte de Jérusalem.
  '20':
  - type: text
    content: Eternel, nous reconnaissons notre méchanceté, la faute de nos pères.
  - type: text
    content: Oui, nous avons péché contre toi.
  '21':
  - type: text
    content: Mais à cause de ta réputation, ne repousse pas,
  - type: text
    content: ne déshonore pas le trône de ta gloire!
  - type: text
    content: N'oublie pas, ne brise pas ton alliance avec nous!
  '22':
  - type: text
    content: Parmi les idoles sans consistance des nations, y en a-t-il qui fassent pleuvoir?
  - type: text
    content: Ou est-ce le ciel qui donne les averses?
  - type: text
    content: N'est-ce pas toi, l'Eternel, notre Dieu?
  - type: text
    content: Nous espérons en toi,
  - type: text
    content: car c'est toi qui as fait tout cela.»
  '3':
  - type: text
    content: Les notables envoient le petit peuple chercher de l'eau.
  - type: text
    content: Ils vont aux citernes, mais ils ne trouvent pas d'eau,
  - type: text
    content: leurs cruches reviennent vides.
  - type: text
    content: Ils sont honteux, remplis d'embarras, ils se couvrent la tête.
  '4':
  - type: text
    content: 'C''est à cause du sol: il s''est craquelé'
  - type: text
    content: parce qu'il n'est pas tombé de pluie dans le pays.
  - type: text
    content: Les cultivateurs sont honteux, ils se couvrent la tête.
  '5':
  - type: text
    content: Même la biche dans la campagne
  - type: text
    content: met bas puis abandonne sa portée,
  - type: text
    content: parce qu'il n'y a pas de verdure.
  '6':
  - type: text
    content: Les ânes sauvages se tiennent sur les hauteurs
  - type: text
    content: et flairent le vent comme des chacals.
  - type: text
    content: Leurs yeux sont épuisés parce qu'il n'y a pas d'herbe.
  '7':
  - type: text
    content: «Si nos fautes témoignent contre nous,
  - type: text
    content: agis à cause de ta réputation, Eternel!
  - type: text
    content: Oui, nos infidélités sont nombreuses,
  - type: text
    content: nous avons péché contre toi.
  '8':
  - type: text
    content: Toi qui es l'espérance d'Israël,
  - type: text
    content: son sauveur quand il est dans la détresse,
  - type: text
    content: pourquoi serais-tu pareil à un étranger dans le pays,
  - type: text
    content: à un voyageur qui ferait un détour pour passer la nuit?
  '9':
  - type: text
    content: Pourquoi serais-tu pareil à un homme désorienté,
  - type: text
    content: à un héros incapable de secourir?
  - type: text
    content: Tu es pourtant au milieu de nous, Eternel,
  - type: text
    content: 'nous sommes appelés de ton nom:'
  - type: text
    content: ne nous délaisse pas!»
