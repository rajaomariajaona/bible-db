document_id: JER.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La sécheresse
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici la parole de l'Eternel adressée à Jérémie concernant la sécheresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Juda est endeuillé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses villes dépérissent, elles sont tristes et abattues.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un cri monte de Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Les notables envoient le petit peuple chercher de l'eau.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils vont aux citernes, mais ils ne trouvent pas d'eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs cruches reviennent vides.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont honteux, remplis d'embarras, ils se couvrent la tête.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'C''est à cause du sol: il s''est craquelé'
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu'il n'est pas tombé de pluie dans le pays.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les cultivateurs sont honteux, ils se couvrent la tête.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Même la biche dans la campagne
- type: usfm
  marker: q1
  children:
  - type: text
    text: met bas puis abandonne sa portée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu'il n'y a pas de verdure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Les ânes sauvages se tiennent sur les hauteurs
- type: usfm
  marker: q1
  children:
  - type: text
    text: et flairent le vent comme des chacals.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs yeux sont épuisés parce qu'il n'y a pas d'herbe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: «Si nos fautes témoignent contre nous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: agis à cause de ta réputation, Eternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, nos infidélités sont nombreuses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous avons péché contre toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Toi qui es l'espérance d'Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: son sauveur quand il est dans la détresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pourquoi serais-tu pareil à un étranger dans le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à un voyageur qui ferait un détour pour passer la nuit?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Pourquoi serais-tu pareil à un homme désorienté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à un héros incapable de secourir?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es pourtant au milieu de nous, Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'nous sommes appelés de ton nom:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne nous délaisse pas!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '«Voici ce que l''Eternel dit à propos de ce peuple:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont aimé errer par-ci par-là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils n'ont pas su retenir leurs pieds.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Eternel ne s'est pas plu en leur compagnie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il se souvient maintenant de leurs fautes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il interviendra à cause de leurs péchés.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les prétendus prophètes
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L''Eternel m''a dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «N'intercède pas en faveur de ce peuple!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: S'ils jeûnent, je n'écouterai pas leurs supplications;
- type: usfm
  marker: q1
  children:
  - type: text
    text: s'ils offrent des holocaustes et des offrandes, je ne les accepterai pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, je veux les exterminer par l'épée, par la famine et par la peste.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'J''ai répondu: «Ah! Seigneur Eternel!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ce sont les prophètes qui leur disent:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Vous ne verrez pas d'épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous n'aurez pas de famine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais je vous donnerai une paix complète dans cet endroit.’»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et l''Eternel m''a dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Les prophètes annoncent des faussetés comme si cela venait de moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne les ai pas envoyés, je ne leur ai pas donné d'ordre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne leur ai pas parlé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est par des visions mensongères, des divinations stupides,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des supercheries de leur invention, qu'ils font les prophètes auprès de vous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: C'est pourquoi, voici ce que je dis, moi l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au sujet des prophètes qui prophétisent en mon nom
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans que je les aie envoyés
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et qui prétendent qu''il n''y aura pas d''épée ni de famine dans ce pays:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ces prophètes seront éliminés par l'épée et par la famine,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: et ceux auxquels ils prophétisent
- type: usfm
  marker: q1
  children:
  - type: text
    text: seront jetés dans les rues de Jérusalem
- type: usfm
  marker: q1
  children:
  - type: text
    text: devant la famine et l'épée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n'y aura personne pour les ensevelir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni eux, ni leurs femmes, ni leurs fils, ni leurs filles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je déverserai sur eux leur propre méchanceté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '»Dis-leur cette parole:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Les larmes coulent de mes yeux nuit et jour, sans arrêt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que la jeune fille de mon peuple a été frappée d'un grand désastre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: d'une blessure très douloureuse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Si je sors dans la campagne, je vois des hommes tués par l'épée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si j'entre dans la ville, je vois des hommes torturés par la faim.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Même le prophète et le prêtre parcourent le pays
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans comprendre.’»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Perplexité de Jérémie
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: «As-tu vraiment rejeté Juda
- type: usfm
  marker: q1
  children:
  - type: text
    text: et détestes-tu Sion à ce point?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi nous frappes-tu
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans qu'il y ait pour nous de guérison?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous espérions la paix et il n'arrive rien d'heureux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un temps de guérison et voici la terreur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Eternel, nous reconnaissons notre méchanceté, la faute de nos pères.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, nous avons péché contre toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mais à cause de ta réputation, ne repousse pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne déshonore pas le trône de ta gloire!
- type: usfm
  marker: q1
  children:
  - type: text
    text: N'oublie pas, ne brise pas ton alliance avec nous!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Parmi les idoles sans consistance des nations, y en a-t-il qui fassent pleuvoir?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou est-ce le ciel qui donne les averses?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N'est-ce pas toi, l'Eternel, notre Dieu?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous espérons en toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car c'est toi qui as fait tout cela.»
