document_id: DEU.29
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Moïse convoqua tous les Israélites et leur dit: «Vous avez vu tout ce que l''Eternel a fait sous vos yeux en Egypte au pharaon, à tous ses serviteurs et à tout son pays, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'les grandes épreuves que vous avez vues de vos yeux, ces miracles et ces grands prodiges. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mais, *jusqu'à aujourd'hui, l'Eternel ne vous a pas donné un cœur pour comprendre, des yeux pour voir, des oreilles pour entendre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jusqu''à… entendre: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 11.8
      metadata:
        usfm: ROM.11.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je vous ai conduits pendant 40 ans dans le désert. Vos vêtements ne se sont pas usés sur vous et vos sandales ne se sont pas usées à vos pieds. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Vous n''avez pas mangé de pain et vous n''avez bu ni vin ni liqueur forte, afin que vous reconnaissiez que je suis l''Eternel, votre Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Vous êtes arrivés ici. Sihon, le roi de Hesbon, et Og, le roi du Basan, sont sortis à notre rencontre pour nous combattre, et nous les avons battus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Nous avons pris leur pays et nous l''avons donné en propriété aux Rubénites, aux Gadites et à la moitié de la tribu des Manassites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Vous respecterez donc les paroles de cette alliance, vous les mettrez en pratique, afin de réussir dans tout ce que vous ferez.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '»Vous allez tous vous présenter aujourd''hui devant l''Eternel, votre Dieu: vos chefs de tribus, vos anciens, vos officiers, tous les hommes d''Israël, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'vos enfants, vos femmes, ainsi que l''étranger qui est au milieu de ton camp, depuis celui qui coupe ton bois jusqu''à celui qui puise ton eau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tu te présentes pour entrer dans l''alliance de l''Eternel, ton Dieu, dans cette alliance contractée avec serment. L''Eternel, ton Dieu, la conclut aujourd''hui avec toi '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'afin de faire aujourd''hui de toi son peuple et d''être lui-même ton Dieu, comme il te l''a dit et comme il l''a juré à tes ancêtres Abraham, Isaac et Jacob. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ce n''est pas avec vous seuls que je conclus cette alliance, cette alliance contractée avec serment, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: mais c'est avec ceux qui sont ici parmi nous, présents aujourd'hui devant l'Eternel, notre Dieu, et avec ceux qui ne sont pas ici parmi nous aujourd'hui.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Conséquences de la désobéissance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '»Oui, vous savez de quelle manière nous avons habité en Egypte et comment nous sommes passés au milieu des nations que vous avez traversées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Vous avez vu leurs monstruosités et leurs idoles, le bois et la pierre, l''argent et l''or, qui sont chez elles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Qu''il n''y ait parmi vous ni homme ni femme, ni clan ni tribu, dont le cœur se détourne aujourd''hui de l''Eternel, notre Dieu, pour aller servir les dieux de ces nations-là. Qu''il n''y ait pas parmi vous de racine qui produise du poison et de l''absinthe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Que personne, après avoir entendu les paroles de cette alliance contractée avec serment, ne se félicite dans son cœur en disant: ‘Je jouirai de la paix, même si je persévère dans les penchants de mon cœur pour ajouter l''ivresse à la soif.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L''Eternel ne voudra pas lui pardonner. Au contraire, la colère et la jalousie de l''Eternel s''enflammeront alors contre cet homme, toutes les malédictions écrites dans ce livre reposeront sur lui, et l''Eternel effacera son nom de dessous le ciel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'L''Eternel le séparera, pour son malheur, de toutes les tribus d''Israël, conformément à toutes les malédictions de l''alliance écrite dans ce livre de la loi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'La génération à venir, vos enfants qui naîtront après vous, et l''étranger qui viendra d''un pays lointain verront les fléaux et les maladies dont l''Eternel aura frappé ce pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ils verront tout le pays brûlé par le soufre et le sel, sans aucune semence, ni produit, ni herbe qui pousse, comme lors de la catastrophe qui a frappé Sodome, Gomorrhe, Adma et Tseboïm, ces villes que l''Eternel a détruites dans sa colère et sa fureur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'et ils diront avec toutes les nations: ‘Pourquoi l''Eternel a-t-il traité ce pays ainsi? Pourquoi cette ardente, cette grande colère?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'On répondra: ‘C''est parce qu''ils ont abandonné l''alliance contractée avec eux par l''Eternel, le Dieu de leurs ancêtres, lorsqu''il les a fait sortir d''Egypte; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'c''est parce qu''ils sont allés servir d''autres dieux et se prosterner devant eux, des dieux qu''ils ne connaissaient pas et que l''Eternel ne leur avait pas attribués. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alors la colère de l''Eternel s''est enflammée contre ce pays et il a fait venir sur lui toutes les malédictions écrites dans ce livre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: L'Eternel les a arrachés de leur pays avec colère, avec fureur, avec une grande indignation et il les a jetés dans un autre pays, comme on le voit aujourd'hui.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: »Les choses cachées sont pour l'Eternel, notre Dieu; les choses révélées sont pour nous et nos enfants, à toujours, afin que nous mettions en pratique toutes les paroles de cette loi.
