document_id: ISA.26,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Cantique à la gloire de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Ce jour-là, on chantera ce cantique dans le pays de Juda:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Nous avons une ville bien fortifiée. Par ses murailles et son rempart, il nous accorde le salut.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Si l''on fait grâce au méchant, il n''apprend pas la justice:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il s'adonne au mal dans le pays de l'intégrité
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne tient pas compte de la majesté de l'Eternel.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Eternel, ta main est si haute
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'ils ne l'aperçoivent même pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils verront ton amour passionné pour le peuple et ils en seront couverts de honte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*le feu dévorera tes adversaires'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le feu… adversaires: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hébreux 10.27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Eternel, tu nous assures la paix
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puisque tout ce que nous faisons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est toi qui l'accomplis pour nous.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Eternel, notre Dieu, d'autres seigneurs que toi ont dominé sur nous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais c'est grâce à toi seul que nous pouvons évoquer ton nom.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ceux qui sont morts ne reviendront pas à la vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les défunts ne se relèveront pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tu es intervenu contre eux, tu les as exterminés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu as fait totalement disparaître leur souvenir.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tu as fait grandir la nation, Eternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as fait grandir la nation, tu as fait resplendir ta gloire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu as reculé toutes les frontières du pays.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Eternel, ils t'ont cherché quand ils étaient dans la détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont déversé un flot de prières chuchotées quand tu les as corrigés.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Pareils à une femme enceinte sur le point d'accoucher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'qui se tord et crie à cause de ses douleurs:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voilà ce que nous avons été loin de ta présence, Eternel!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Nous avons commencé une grossesse, nous avons éprouvé des douleurs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et, quand nous accouchons, ce n''est que du vent:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous n'avons pas contribué au salut de la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les habitants du monde ne sont pas venus à la vie.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Que tes morts reviennent à la vie!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que mes cadavres se relèvent!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réveillez-vous et exprimez votre joie, vous qui êtes couchés dans la poussière!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, ta rosée est une rosée vivifiante
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la terre redonnera le jour aux défunts.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ouvrez les portes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et laissez entrer la nation juste, celle qui reste fidèle!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Va, mon peuple, entre dans tes appartements
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ferme tes portes derrière toi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cache-toi pour un petit moment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu'à ce que la colère soit passée.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '*En effet, voici que l''Eternel sort de sa résidence'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'En effet… résidence: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'même texte en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Michée 1.3
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour punir la faute des habitants de la terre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terre dévoilera ses crimes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle ne couvrira plus ses victimes.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: A celui qui est ferme dans ses intentions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu assures une paix profonde
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu'il se confie en toi.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Placez votre confiance en l'Eternel pour toujours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l'Eternel, oui, l'Eternel est le rocher perpétuel.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Il a abattu ceux qui habitaient les hauteurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a précipité, il a précipité
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu'à terre la ville inaccessible,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il lui a fait mordre la poussière.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Elle est piétinée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par les pauvres, par les plus faibles.»
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Le sentier du juste, c'est la droiture.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu prépares une trace bien droite pour le juste.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Oui, nous plaçons notre attente en toi, Eternel, sur le sentier de tes jugements;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: faire appel à ton nom et parler de toi, voilà ce que nous désirons.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mon âme désire ta présence pendant la nuit;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au plus profond de moi, mon esprit te recherche.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, lorsque tes jugements s'exercent sur la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les habitants du monde apprennent la justice.
