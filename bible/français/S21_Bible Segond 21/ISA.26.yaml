document_id: ISA.26,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Cantique à la gloire de Dieu
  - type: text
    content: 'Ce jour-là, on chantera ce cantique dans le pays de Juda:'
  - type: text
    content: «Nous avons une ville bien fortifiée. Par ses murailles et son rempart, il nous accorde le salut.
  '10':
  - type: text
    content: 'Si l''on fait grâce au méchant, il n''apprend pas la justice:'
  - type: text
    content: il s'adonne au mal dans le pays de l'intégrité
  - type: text
    content: et ne tient pas compte de la majesté de l'Eternel.
  '11':
  - type: text
    content: Eternel, ta main est si haute
  - type: text
    content: qu'ils ne l'aperçoivent même pas.
  - type: text
    content: Ils verront ton amour passionné pour le peuple et ils en seront couverts de honte;
  - type: text
    content: '*le feu dévorera tes adversaires'
  - type: note
    content: 'Le feu… adversaires: cité en Hébreux 10.27.'
  - type: text
    content: .
  '12':
  - type: text
    content: Eternel, tu nous assures la paix
  - type: text
    content: puisque tout ce que nous faisons,
  - type: text
    content: c'est toi qui l'accomplis pour nous.
  '13':
  - type: text
    content: Eternel, notre Dieu, d'autres seigneurs que toi ont dominé sur nous,
  - type: text
    content: mais c'est grâce à toi seul que nous pouvons évoquer ton nom.
  '14':
  - type: text
    content: Ceux qui sont morts ne reviendront pas à la vie,
  - type: text
    content: les défunts ne se relèveront pas,
  - type: text
    content: car tu es intervenu contre eux, tu les as exterminés
  - type: text
    content: et tu as fait totalement disparaître leur souvenir.
  '15':
  - type: text
    content: Tu as fait grandir la nation, Eternel!
  - type: text
    content: Tu as fait grandir la nation, tu as fait resplendir ta gloire,
  - type: text
    content: tu as reculé toutes les frontières du pays.
  '16':
  - type: text
    content: Eternel, ils t'ont cherché quand ils étaient dans la détresse,
  - type: text
    content: ils ont déversé un flot de prières chuchotées quand tu les as corrigés.
  '17':
  - type: text
    content: Pareils à une femme enceinte sur le point d'accoucher,
  - type: text
    content: 'qui se tord et crie à cause de ses douleurs:'
  - type: text
    content: voilà ce que nous avons été loin de ta présence, Eternel!
  '18':
  - type: text
    content: Nous avons commencé une grossesse, nous avons éprouvé des douleurs
  - type: text
    content: 'et, quand nous accouchons, ce n''est que du vent:'
  - type: text
    content: nous n'avons pas contribué au salut de la terre
  - type: text
    content: et les habitants du monde ne sont pas venus à la vie.
  '19':
  - type: text
    content: Que tes morts reviennent à la vie!
  - type: text
    content: Que mes cadavres se relèvent!
  - type: text
    content: Réveillez-vous et exprimez votre joie, vous qui êtes couchés dans la poussière!
  - type: text
    content: Oui, ta rosée est une rosée vivifiante
  - type: text
    content: et la terre redonnera le jour aux défunts.
  '2':
  - type: text
    content: Ouvrez les portes
  - type: text
    content: et laissez entrer la nation juste, celle qui reste fidèle!
  '20':
  - type: text
    content: Va, mon peuple, entre dans tes appartements
  - type: text
    content: et ferme tes portes derrière toi!
  - type: text
    content: Cache-toi pour un petit moment,
  - type: text
    content: jusqu'à ce que la colère soit passée.
  '21':
  - type: text
    content: '*En effet, voici que l''Eternel sort de sa résidence'
  - type: note
    content: 'En effet… résidence: même texte en Michée 1.3.'
  - type: text
    content: pour punir la faute des habitants de la terre.
  - type: text
    content: La terre dévoilera ses crimes,
  - type: text
    content: elle ne couvrira plus ses victimes.
  '3':
  - type: text
    content: A celui qui est ferme dans ses intentions
  - type: text
    content: tu assures une paix profonde
  - type: text
    content: parce qu'il se confie en toi.
  '4':
  - type: text
    content: Placez votre confiance en l'Eternel pour toujours,
  - type: text
    content: car l'Eternel, oui, l'Eternel est le rocher perpétuel.
  '5':
  - type: text
    content: Il a abattu ceux qui habitaient les hauteurs,
  - type: text
    content: il a précipité, il a précipité
  - type: text
    content: jusqu'à terre la ville inaccessible,
  - type: text
    content: il lui a fait mordre la poussière.
  '6':
  - type: text
    content: Elle est piétinée
  - type: text
    content: par les pauvres, par les plus faibles.»
  '7':
  - type: text
    content: Le sentier du juste, c'est la droiture.
  - type: text
    content: Tu prépares une trace bien droite pour le juste.
  '8':
  - type: text
    content: Oui, nous plaçons notre attente en toi, Eternel, sur le sentier de tes jugements;
  - type: text
    content: faire appel à ton nom et parler de toi, voilà ce que nous désirons.
  '9':
  - type: text
    content: Mon âme désire ta présence pendant la nuit;
  - type: text
    content: au plus profond de moi, mon esprit te recherche.
  - type: text
    content: En effet, lorsque tes jugements s'exercent sur la terre,
  - type: text
    content: les habitants du monde apprennent la justice.
