document_id: ISA.43,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu, le seul Sauveur
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Maintenant, voici ce que dit l'Eternel, celui qui t'a créé, Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'celui qui t''a façonné, Israël:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N'aie pas peur, car je t'ai racheté.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je t''ai appelé par ton nom: tu m''appartiens!'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: C'est vous qui êtes mes témoins, déclare l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi que mon serviteur, celui que j'ai choisi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que vous sachiez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'croyiez et reconnaissiez qui je suis:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant moi jamais aucun dieu n'a été formé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et après moi jamais aucun autre n'existera.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: C'est moi, moi seul qui suis l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il n'y a aucun sauveur en dehors de moi.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: C'est moi qui ai fait des révélations, qui ai sauvé, qui ai annoncé les événements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce n'est pas un de vos dieux étrangers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous êtes donc mes témoins, déclare l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que c'est moi qui suis Dieu.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Je le suis depuis le début,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et personne ne peut délivrer qui que ce soit de mon pouvoir.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand j'agis, qui pourrait s'y opposer?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Voici ce que dit l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'celui qui vous rachète, le Saint d''Israël:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de vous, j'envoie l'ennemi contre Babylone
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je fais couler tous les fuyards,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: même les Babyloniens, sur leurs bateaux dont ils sont fiers.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Je suis l'Eternel, votre Saint,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le créateur d'Israël, votre roi.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Voici ce que dit l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui ouvre un chemin dans la mer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et un passage dans l'eau puissante,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: qui fait partir en campagne des chars et des chevaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'une armée et de puissants guerriers:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se couchent tous ensemble pour ne plus se relever,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont anéantis, éteints comme une mèche.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ne pensez plus aux premiers événements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne cherchez plus à comprendre ce qui est ancien!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Je vais faire une chose nouvelle, qui est déjà en germe.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne la remarquerez-vous pas?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais tracer un chemin en plein désert
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mettre des fleuves dans les endroits arides.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Si tu traverses de l'eau, je serai moi-même avec toi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si tu traverses les fleuves, ils ne te submergeront pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu marches dans le feu, tu ne te brûleras pas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la flamme ne te fera pas de mal.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Les animaux sauvages, les chacals et les autruches
  - type: usfm
    marker: q1
    children:
    - type: text
      text: me rendront gloire parce
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que j'aurai donné de l'eau dans le désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des fleuves dans les endroits arides,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour faire boire mon *peuple, celui que j'ai choisi.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Le peuple que je me suis formé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: proclamera mes louanges.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '43.20-21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Peuple… louanges: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité avec application à des chrétiens en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Pierre 2.9
      - type: text
        text: .
      marker-yv: yv-n
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ce n'est pas à moi que tu as fait appel, Jacob!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, tu t'es fatigué de moi, Israël!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Tu ne m'as pas offert tes agneaux en holocauste
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu ne m'as pas honoré par tes sacrifices.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne t'ai pas importuné pour que tu me fasses des offrandes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne t'ai pas fatigué pour recevoir de l'encens.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Tu n'as pas acheté des plantes aromatiques pour moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu ne m'as pas rassasié de la graisse de tes sacrifices.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu m'as seulement importuné par tes péchés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu m'as fatigué par tes fautes.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Pourtant c'est moi, moi qui efface tes transgressions à cause de moi-même,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je ne me souviendrai plus de tes péchés.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Réveille mes souvenirs, plaidons ensemble,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parle toi-même pour te défendre!
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ton premier ancêtre, déjà, a péché
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tes interprètes se sont rebellés contre moi.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Voilà pourquoi j'ai déshonoré les responsables du sanctuaire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'ai voué Jacob à la destruction
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Israël aux insultes.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: En effet, je suis l'Eternel, ton Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Saint d'Israël, ton sauveur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'ai donné l'Egypte en rançon pour toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'Ethiopie et Saba à ta place.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Parce que tu as de la valeur à mes yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce que tu as de l'importance et que je t'aime,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je donne des hommes à ta place,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des peuples en échange de ta vie.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: N'aie pas peur, car je suis moi-même avec toi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ramènerai ta descendance de l'est
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je te rassemblerai de l'ouest.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Je dirai au nord: «Donne!»'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et au sud: «Ne retiens personne!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ramène mes fils des pays lointains
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mes filles de l'extrémité de la terre,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: tous ceux qui portent mon nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que j'ai créés pour ma gloire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que j'ai façonnés, que j'ai faits.»
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Fais sortir le peuple aveugle qui pourtant a des yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les sourds qui pourtant ont des oreilles.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Que toutes les nations se rassemblent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que les peuples se réunissent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lequel d'entre eux a révélé ces choses?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lesquels nous ont annoncé les premiers événements?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'ils présentent leurs témoins et se défendent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'qu''on puisse écouter et dire: «C''est vrai!»'
