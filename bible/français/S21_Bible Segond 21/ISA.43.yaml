document_id: ISA.43,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu, le seul Sauveur
  - type: text
    content: Maintenant, voici ce que dit l'Eternel, celui qui t'a créé, Jacob,
  - type: text
    content: 'celui qui t''a façonné, Israël:'
  - type: text
    content: N'aie pas peur, car je t'ai racheté.
  - type: text
    content: 'Je t''ai appelé par ton nom: tu m''appartiens!'
  '10':
  - type: text
    content: C'est vous qui êtes mes témoins, déclare l'Eternel,
  - type: text
    content: ainsi que mon serviteur, celui que j'ai choisi
  - type: text
    content: afin que vous sachiez,
  - type: text
    content: 'croyiez et reconnaissiez qui je suis:'
  - type: text
    content: avant moi jamais aucun dieu n'a été formé
  - type: text
    content: et après moi jamais aucun autre n'existera.
  '11':
  - type: text
    content: C'est moi, moi seul qui suis l'Eternel,
  - type: text
    content: et il n'y a aucun sauveur en dehors de moi.
  '12':
  - type: text
    content: C'est moi qui ai fait des révélations, qui ai sauvé, qui ai annoncé les événements,
  - type: text
    content: ce n'est pas un de vos dieux étrangers.
  - type: text
    content: Vous êtes donc mes témoins, déclare l'Eternel,
  - type: text
    content: que c'est moi qui suis Dieu.
  '13':
  - type: text
    content: Je le suis depuis le début,
  - type: text
    content: et personne ne peut délivrer qui que ce soit de mon pouvoir.
  - type: text
    content: Quand j'agis, qui pourrait s'y opposer?
  '14':
  - type: text
    content: Voici ce que dit l'Eternel,
  - type: text
    content: 'celui qui vous rachète, le Saint d''Israël:'
  - type: text
    content: à cause de vous, j'envoie l'ennemi contre Babylone
  - type: text
    content: et je fais couler tous les fuyards,
  - type: text
    content: même les Babyloniens, sur leurs bateaux dont ils sont fiers.
  '15':
  - type: text
    content: Je suis l'Eternel, votre Saint,
  - type: text
    content: le créateur d'Israël, votre roi.
  '16':
  - type: text
    content: Voici ce que dit l'Eternel,
  - type: text
    content: celui qui ouvre un chemin dans la mer
  - type: text
    content: et un passage dans l'eau puissante,
  '17':
  - type: text
    content: qui fait partir en campagne des chars et des chevaux,
  - type: text
    content: 'une armée et de puissants guerriers:'
  - type: text
    content: ils se couchent tous ensemble pour ne plus se relever,
  - type: text
    content: ils sont anéantis, éteints comme une mèche.
  '18':
  - type: text
    content: Ne pensez plus aux premiers événements,
  - type: text
    content: ne cherchez plus à comprendre ce qui est ancien!
  '19':
  - type: text
    content: Je vais faire une chose nouvelle, qui est déjà en germe.
  - type: text
    content: Ne la remarquerez-vous pas?
  - type: text
    content: Je vais tracer un chemin en plein désert
  - type: text
    content: et mettre des fleuves dans les endroits arides.
  '2':
  - type: text
    content: Si tu traverses de l'eau, je serai moi-même avec toi;
  - type: text
    content: si tu traverses les fleuves, ils ne te submergeront pas.
  - type: text
    content: Si tu marches dans le feu, tu ne te brûleras pas
  - type: text
    content: et la flamme ne te fera pas de mal.
  '20':
  - type: text
    content: Les animaux sauvages, les chacals et les autruches
  - type: text
    content: me rendront gloire parce
  - type: text
    content: que j'aurai donné de l'eau dans le désert,
  - type: text
    content: des fleuves dans les endroits arides,
  - type: text
    content: pour faire boire mon *peuple, celui que j'ai choisi.
  '21':
  - type: text
    content: Le peuple que je me suis formé
  - type: text
    content: proclamera mes louanges.
  - type: note
    content: 'Peuple… louanges: cité avec application à des chrétiens en 1 Pierre 2.9.'
  '22':
  - type: text
    content: Ce n'est pas à moi que tu as fait appel, Jacob!
  - type: text
    content: Oui, tu t'es fatigué de moi, Israël!
  '23':
  - type: text
    content: Tu ne m'as pas offert tes agneaux en holocauste
  - type: text
    content: et tu ne m'as pas honoré par tes sacrifices.
  - type: text
    content: Je ne t'ai pas importuné pour que tu me fasses des offrandes,
  - type: text
    content: je ne t'ai pas fatigué pour recevoir de l'encens.
  '24':
  - type: text
    content: Tu n'as pas acheté des plantes aromatiques pour moi
  - type: text
    content: et tu ne m'as pas rassasié de la graisse de tes sacrifices.
  - type: text
    content: Tu m'as seulement importuné par tes péchés,
  - type: text
    content: tu m'as fatigué par tes fautes.
  '25':
  - type: text
    content: Pourtant c'est moi, moi qui efface tes transgressions à cause de moi-même,
  - type: text
    content: et je ne me souviendrai plus de tes péchés.
  '26':
  - type: text
    content: Réveille mes souvenirs, plaidons ensemble,
  - type: text
    content: parle toi-même pour te défendre!
  '27':
  - type: text
    content: Ton premier ancêtre, déjà, a péché
  - type: text
    content: et tes interprètes se sont rebellés contre moi.
  '28':
  - type: text
    content: Voilà pourquoi j'ai déshonoré les responsables du sanctuaire,
  - type: text
    content: j'ai voué Jacob à la destruction
  - type: text
    content: et Israël aux insultes.
  '3':
  - type: text
    content: En effet, je suis l'Eternel, ton Dieu,
  - type: text
    content: le Saint d'Israël, ton sauveur.
  - type: text
    content: J'ai donné l'Egypte en rançon pour toi,
  - type: text
    content: l'Ethiopie et Saba à ta place.
  '4':
  - type: text
    content: Parce que tu as de la valeur à mes yeux,
  - type: text
    content: parce que tu as de l'importance et que je t'aime,
  - type: text
    content: je donne des hommes à ta place,
  - type: text
    content: des peuples en échange de ta vie.
  '5':
  - type: text
    content: N'aie pas peur, car je suis moi-même avec toi.
  - type: text
    content: Je ramènerai ta descendance de l'est
  - type: text
    content: et je te rassemblerai de l'ouest.
  '6':
  - type: text
    content: 'Je dirai au nord: «Donne!»'
  - type: text
    content: 'et au sud: «Ne retiens personne!'
  - type: text
    content: Ramène mes fils des pays lointains
  - type: text
    content: et mes filles de l'extrémité de la terre,
  '7':
  - type: text
    content: tous ceux qui portent mon nom,
  - type: text
    content: que j'ai créés pour ma gloire,
  - type: text
    content: que j'ai façonnés, que j'ai faits.»
  '8':
  - type: text
    content: Fais sortir le peuple aveugle qui pourtant a des yeux,
  - type: text
    content: et les sourds qui pourtant ont des oreilles.
  '9':
  - type: text
    content: Que toutes les nations se rassemblent,
  - type: text
    content: que les peuples se réunissent.
  - type: text
    content: Lequel d'entre eux a révélé ces choses?
  - type: text
    content: Lesquels nous ont annoncé les premiers événements?
  - type: text
    content: Qu'ils présentent leurs témoins et se défendent,
  - type: text
    content: 'qu''on puisse écouter et dire: «C''est vrai!»'
