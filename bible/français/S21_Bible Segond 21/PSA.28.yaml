document_id: PSA.28,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Certitude de l'exaucement
  - type: text
    content: De David.
  - type: text
    content: Eternel, c'est à toi que je crie.
  - type: text
    content: Mon rocher, ne reste pas sourd à ma voix!
  - type: text
    content: Si tu t'éloignes sans me répondre,
  - type: text
    content: je deviendrai pareil à ceux qui descendent dans la tombe.
  '2':
  - type: text
    content: Ecoute mes supplications quand je crie à toi,
  - type: text
    content: quand je lève mes mains vers ton sanctuaire.
  '3':
  - type: text
    content: Ne m'entraîne pas dans la ruine des méchants et des hommes injustes!
  - type: text
    content: 'Ils parlent de paix à leur prochain, et ils ont la méchanceté dans le cœur:'
  '4':
  - type: text
    content: traite-les conformément à leurs actes et à la méchanceté de leurs agissements,
  - type: text
    content: donne-leur ce que vaut l'œuvre de leurs mains,
  - type: text
    content: paie-leur le salaire qu'ils méritent,
  '5':
  - type: text
    content: car ils ne font pas attention aux actes de l'Eternel,
  - type: text
    content: à l'œuvre de ses mains.
  - type: text
    content: Qu'il les abatte et ne les relève pas!
  '6':
  - type: text
    content: Béni soit l'Eternel,
  - type: text
    content: car il a entendu mes supplications!
  '7':
  - type: text
    content: L'Eternel est ma force et mon bouclier.
  - type: text
    content: C'est en lui que mon cœur se confie, et je suis secouru.
  - type: text
    content: Mon cœur est dans la joie,
  - type: text
    content: et je le loue par mes chants.
  '8':
  - type: text
    content: L'Eternel est la force de son peuple,
  - type: text
    content: il est une forteresse pour sauver celui qu'il a désigné par onction.
  '9':
  - type: text
    content: Sauve ton peuple et bénis ton héritage!
  - type: text
    content: Sois leur berger et leur soutien pour toujours!
