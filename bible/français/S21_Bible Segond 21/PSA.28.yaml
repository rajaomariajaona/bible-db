document_id: PSA.28,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Certitude de l'exaucement
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: De David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, c'est à toi que je crie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon rocher, ne reste pas sourd à ma voix!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu t'éloignes sans me répondre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je deviendrai pareil à ceux qui descendent dans la tombe.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoute mes supplications quand je crie à toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand je lève mes mains vers ton sanctuaire.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne m'entraîne pas dans la ruine des méchants et des hommes injustes!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils parlent de paix à leur prochain, et ils ont la méchanceté dans le cœur:'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: traite-les conformément à leurs actes et à la méchanceté de leurs agissements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: donne-leur ce que vaut l'œuvre de leurs mains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: paie-leur le salaire qu'ils méritent,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils ne font pas attention aux actes de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à l'œuvre de ses mains.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'il les abatte et ne les relève pas!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Béni soit l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il a entendu mes supplications!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel est ma force et mon bouclier.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est en lui que mon cœur se confie, et je suis secouru.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon cœur est dans la joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je le loue par mes chants.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel est la force de son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est une forteresse pour sauver celui qu'il a désigné par onction.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sauve ton peuple et bénis ton héritage!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois leur berger et leur soutien pour toujours!
