document_id: ISA.24
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Les bouleversements à venir
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 24.1–35.10
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jugement universel
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici que l'Eternel saccage la terre et y sème la dévastation;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il bouleverse sa surface et disperse ses habitants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Un même sort frappe le prêtre et le membre du peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le maître et l'esclave,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la maîtresse et la servante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le vendeur et l'acheteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le prêteur et l'emprunteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le créancier et le débiteur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: La terre est entièrement saccagée, livrée au pillage.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, l'Eternel l'a décrété.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: La terre est en deuil, elle est épuisée. Le monde, épuisé, dépérit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les grands des peuples de la terre dépérissent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: La terre avait été souillée par ses habitants
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu'ils enfreignaient les lois, modifiaient les prescriptions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: violaient l'alliance éternelle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Voilà pourquoi la malédiction dévaste la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses habitants doivent supporter les conséquences de leurs crimes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voilà pourquoi les habitants de la terre sont punis
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il ne reste qu'un petit nombre d'hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le vin nouveau est en deuil, la vigne dépérit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ceux qui avaient le cœur joyeux gémissent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: La joie des tambourins a cessé, le tapage des amusements a pris fin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la musique jubilatoire de la harpe a cessé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: On ne boit plus de vin en chantant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les liqueurs fortes paraissent amères aux buveurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: La ville du chaos n'est plus que décombres.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toutes les maisons sont fermées, on n'y entre plus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: On crie dans les rues parce que le vin manque.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Toute réjouissance a disparu, l'allégresse est bannie du pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il ne reste dans la ville que des ruines
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les portes sont abattues, démolies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Sur la terre, au milieu des peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est comme lorsqu'on secoue l'olivier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme lorsqu'on grappille des raisins après la vendange.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les survivants se mettent à pousser des cris de joie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: de l'ouest, ils célèbrent la majesté de l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Donnez donc gloire à l'Eternel dans les endroits où brille la lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au nom de l'Eternel, du Dieu d'Israël, dans les îles de la mer!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Du bout de la terre nous entendons chanter: «Gloire au juste!»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'mais moi, je dis: «Je suis perdu! Je suis perdu! Malheur à moi!»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les traîtres trahissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les traîtres s'acharnent à trahir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '*La terreur, le trou et le piège'
- type: usfm
  marker: q1
  children:
  - type: text
    text: te menacent, habitant de la terre!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Celui qui prendra la fuite devant les cris de terreur tombera dans le trou
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celui qui remontera du trou sera pris dans le piège,
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.17-18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La terreur… dans le piège: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jérémie 48.43-44
      metadata:
        usfm: JER.48.43+JER.48.44
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' à propos de Moab.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: car les écluses d'en haut sont ouvertes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les fondations de la terre sont ébranlées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: La terre est déchirée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la terre se brise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la terre tremble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: La terre tremble comme un homme ivre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle branle comme une cabane.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa révolte pèse sur elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle s'écroule et ne se relève plus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ce jour-là, l'Eternel interviendra dans le ciel contre les puissances célestes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sur la terre contre les rois de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ils seront rassemblés dans une prison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: enfermés dans des cachots
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, après un grand nombre de jours, ils devront rendre des comptes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: La lune sera couverte de honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le soleil de confusion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car l'Eternel, le maître de l'univers, régnera
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur le mont Sion et à Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: resplendissant de gloire devant ses anciens.
