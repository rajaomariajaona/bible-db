document_id: ISA.24,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les bouleversements à venir
  - type: heading
    content: 24.1–35.10
  - type: heading
    content: Jugement universel
  - type: text
    content: Voici que l'Eternel saccage la terre et y sème la dévastation;
  - type: text
    content: il bouleverse sa surface et disperse ses habitants.
  '10':
  - type: text
    content: La ville du chaos n'est plus que décombres.
  - type: text
    content: Toutes les maisons sont fermées, on n'y entre plus.
  '11':
  - type: text
    content: On crie dans les rues parce que le vin manque.
  - type: text
    content: Toute réjouissance a disparu, l'allégresse est bannie du pays.
  '12':
  - type: text
    content: Il ne reste dans la ville que des ruines
  - type: text
    content: et les portes sont abattues, démolies.
  '13':
  - type: text
    content: Sur la terre, au milieu des peuples,
  - type: text
    content: c'est comme lorsqu'on secoue l'olivier,
  - type: text
    content: comme lorsqu'on grappille des raisins après la vendange.
  '14':
  - type: text
    content: Les survivants se mettent à pousser des cris de joie;
  - type: text
    content: de l'ouest, ils célèbrent la majesté de l'Eternel.
  '15':
  - type: text
    content: Donnez donc gloire à l'Eternel dans les endroits où brille la lumière,
  - type: text
    content: au nom de l'Eternel, du Dieu d'Israël, dans les îles de la mer!
  '16':
  - type: text
    content: 'Du bout de la terre nous entendons chanter: «Gloire au juste!»'
  - type: text
    content: 'mais moi, je dis: «Je suis perdu! Je suis perdu! Malheur à moi!»'
  - type: text
    content: Les traîtres trahissent,
  - type: text
    content: les traîtres s'acharnent à trahir.
  '17':
  - type: text
    content: '*La terreur, le trou et le piège'
  - type: text
    content: te menacent, habitant de la terre!
  '18':
  - type: text
    content: Celui qui prendra la fuite devant les cris de terreur tombera dans le trou
  - type: text
    content: et celui qui remontera du trou sera pris dans le piège,
  - type: note
    content: 'La terreur… dans le piège: cité en Jérémie 48.43-44 à propos de Moab.'
  - type: text
    content: car les écluses d'en haut sont ouvertes
  - type: text
    content: et les fondations de la terre sont ébranlées.
  '19':
  - type: text
    content: La terre est déchirée,
  - type: text
    content: la terre se brise,
  - type: text
    content: la terre tremble.
  '2':
  - type: text
    content: Un même sort frappe le prêtre et le membre du peuple,
  - type: text
    content: le maître et l'esclave,
  - type: text
    content: la maîtresse et la servante,
  - type: text
    content: le vendeur et l'acheteur,
  - type: text
    content: le prêteur et l'emprunteur,
  - type: text
    content: le créancier et le débiteur.
  '20':
  - type: text
    content: La terre tremble comme un homme ivre,
  - type: text
    content: elle branle comme une cabane.
  - type: text
    content: Sa révolte pèse sur elle,
  - type: text
    content: elle s'écroule et ne se relève plus.
  '21':
  - type: text
    content: Ce jour-là, l'Eternel interviendra dans le ciel contre les puissances célestes
  - type: text
    content: et sur la terre contre les rois de la terre.
  '22':
  - type: text
    content: Ils seront rassemblés dans une prison,
  - type: text
    content: enfermés dans des cachots
  - type: text
    content: et, après un grand nombre de jours, ils devront rendre des comptes.
  '23':
  - type: text
    content: La lune sera couverte de honte,
  - type: text
    content: et le soleil de confusion,
  - type: text
    content: car l'Eternel, le maître de l'univers, régnera
  - type: text
    content: sur le mont Sion et à Jérusalem,
  - type: text
    content: resplendissant de gloire devant ses anciens.
  '3':
  - type: text
    content: La terre est entièrement saccagée, livrée au pillage.
  - type: text
    content: Oui, l'Eternel l'a décrété.
  '4':
  - type: text
    content: La terre est en deuil, elle est épuisée. Le monde, épuisé, dépérit.
  - type: text
    content: Les grands des peuples de la terre dépérissent.
  '5':
  - type: text
    content: La terre avait été souillée par ses habitants
  - type: text
    content: parce qu'ils enfreignaient les lois, modifiaient les prescriptions,
  - type: text
    content: violaient l'alliance éternelle.
  '6':
  - type: text
    content: Voilà pourquoi la malédiction dévaste la terre
  - type: text
    content: et ses habitants doivent supporter les conséquences de leurs crimes.
  - type: text
    content: Voilà pourquoi les habitants de la terre sont punis
  - type: text
    content: et il ne reste qu'un petit nombre d'hommes.
  '7':
  - type: text
    content: Le vin nouveau est en deuil, la vigne dépérit.
  - type: text
    content: Tous ceux qui avaient le cœur joyeux gémissent.
  '8':
  - type: text
    content: La joie des tambourins a cessé, le tapage des amusements a pris fin,
  - type: text
    content: la musique jubilatoire de la harpe a cessé.
  '9':
  - type: text
    content: On ne boit plus de vin en chantant,
  - type: text
    content: les liqueurs fortes paraissent amères aux buveurs.
