document_id: ISA.62,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le salut de Jérusalem
  - type: text
    content: A cause de Sion je ne me tairai pas,
  - type: text
    content: à cause de Jérusalem je ne prendrai pas de repos
  - type: text
    content: jusqu'à ce que sa justice apparaisse comme l'aurore,
  - type: text
    content: et son salut comme un flambeau qui s'allume.
  '10':
  - type: text
    content: Franchissez, franchissez les portes!
  - type: text
    content: Dégagez le chemin du peuple!
  - type: text
    content: Préparez, préparez la route, enlevez les pierres!
  - type: text
    content: Dressez un étendard vers les peuples!
  '11':
  - type: text
    content: 'Voici ce que l''Eternel annonce aux extrémités de la terre:'
  - type: text
    content: «*Dites à la fille de Sion
  - type: note
    content: 'Dites… Sion: introduction reprise en Matthieu 21.5.'
  - type: text
    content: ': ‘Ton salut arrive.'
  - type: text
    content: Il a son salaire avec lui et sa récompense est devant lui.’»
  '12':
  - type: text
    content: On les appellera «peuple saint», «rachetés de l'Eternel»,
  - type: text
    content: et toi, on t'appellera «recherchée», «ville non abandonnée».
  '2':
  - type: text
    content: Alors les nations verront ta justice,
  - type: text
    content: et tous les rois ta gloire,
  - type: text
    content: et l'on t'appellera d'un nom nouveau,
  - type: text
    content: défini par l'Eternel lui-même.
  '3':
  - type: text
    content: Tu seras une couronne splendide dans la main de l'Eternel,
  - type: text
    content: un turban royal dans la main de ton Dieu.
  '4':
  - type: text
    content: On ne t'appellera plus «abandonnée»,
  - type: text
    content: on ne dira plus à ta terre «dévastation»,
  - type: text
    content: mais on t'appellera «mon plaisir est en elle»
  - type: text
    content: et l'on appellera ta terre «mariée»,
  - type: text
    content: car l'Eternel prend plaisir en toi
  - type: text
    content: et ta terre aura un mari.
  '5':
  - type: text
    content: Tout comme un jeune homme épouse une jeune fille vierge,
  - type: text
    content: tes descendants deviendront pour toi pareils à des époux,
  - type: text
    content: et tout comme la fiancée fait la joie de son fiancé,
  - type: text
    content: tu feras la joie de ton Dieu.
  '6':
  - type: text
    content: Sur tes murs, Jérusalem, j'ai placé des gardes
  - type: text
    content: qui ne resteront jamais silencieux, de jour comme de nuit.
  - type: text
    content: Vous qui êtes chargés de la rappeler à l'Eternel
  - type: note
    content: 'Etes chargés de la rappeler à l''Eternel: ou êtes chargés de lui rappeler l''Eternel.'
  - type: text
    content: ','
  - type: text
    content: ne vous accordez aucun répit!
  '7':
  - type: text
    content: Ne lui laissez aucun répit
  - type: text
    content: jusqu'à ce qu'il rétablisse Jérusalem
  - type: text
    content: et fasse d'elle un sujet de louange sur la terre!
  '8':
  - type: text
    content: 'L''Eternel l''a juré par sa main droite et par son bras puissant:'
  - type: text
    content: «Je ne donnerai plus ton blé comme nourriture à tes ennemis
  - type: text
    content: et les étrangers ne boiront plus ton vin nouveau,
  - type: text
    content: fruit de ton travail,
  '9':
  - type: text
    content: mais ceux qui auront récolté le blé le mangeront
  - type: text
    content: et loueront l'Eternel,
  - type: text
    content: et ceux qui auront vendangé boiront du vin nouveau
  - type: text
    content: dans les parvis de mon sanctuaire.»
