document_id: ISA.62
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le salut de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: A cause de Sion je ne me tairai pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de Jérusalem je ne prendrai pas de repos
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu'à ce que sa justice apparaisse comme l'aurore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son salut comme un flambeau qui s'allume.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Alors les nations verront ta justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous les rois ta gloire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'on t'appellera d'un nom nouveau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: défini par l'Eternel lui-même.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tu seras une couronne splendide dans la main de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un turban royal dans la main de ton Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: On ne t'appellera plus «abandonnée»,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on ne dira plus à ta terre «dévastation»,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais on t'appellera «mon plaisir est en elle»
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'on appellera ta terre «mariée»,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car l'Eternel prend plaisir en toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ta terre aura un mari.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tout comme un jeune homme épouse une jeune fille vierge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tes descendants deviendront pour toi pareils à des époux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tout comme la fiancée fait la joie de son fiancé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu feras la joie de ton Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Sur tes murs, Jérusalem, j'ai placé des gardes
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ne resteront jamais silencieux, de jour comme de nuit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous qui êtes chargés de la rappeler à l'Eternel
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '62.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Etes chargés de la rappeler à l''Eternel: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ou êtes chargés de lui rappeler l'Eternel.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne vous accordez aucun répit!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ne lui laissez aucun répit
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu'à ce qu'il rétablisse Jérusalem
- type: usfm
  marker: q1
  children:
  - type: text
    text: et fasse d'elle un sujet de louange sur la terre!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L''Eternel l''a juré par sa main droite et par son bras puissant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Je ne donnerai plus ton blé comme nourriture à tes ennemis
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les étrangers ne boiront plus ton vin nouveau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fruit de ton travail,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: mais ceux qui auront récolté le blé le mangeront
- type: usfm
  marker: q1
  children:
  - type: text
    text: et loueront l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ceux qui auront vendangé boiront du vin nouveau
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans les parvis de mon sanctuaire.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Franchissez, franchissez les portes!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dégagez le chemin du peuple!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Préparez, préparez la route, enlevez les pierres!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dressez un étendard vers les peuples!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Voici ce que l''Eternel annonce aux extrémités de la terre:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «*Dites à la fille de Sion
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '62.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Dites… Sion: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'introduction reprise en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 21.5
      metadata:
        usfm: MAT.21.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ': ‘Ton salut arrive.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a son salaire avec lui et sa récompense est devant lui.’»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: On les appellera «peuple saint», «rachetés de l'Eternel»,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toi, on t'appellera «recherchée», «ville non abandonnée».
