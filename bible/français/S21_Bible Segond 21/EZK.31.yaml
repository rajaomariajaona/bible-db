document_id: EZK.31
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'Egypte frappée comme l'Assyrie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La onzième année, le premier jour du troisième mois, la parole de l''Eternel m''a été adressée: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Fils de l''homme, dis au pharaon, au roi d''Egypte, et à sa foule bruyante:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: »A qui ressembles-tu, toi qui es si important?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: L'Assyrie était un cèdre du Liban.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses branches étaient belles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: son feuillage touffu, sa taille élevée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa cime dépassait bien, au milieu des épais buissons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: L'eau l'avait fait grandir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'abîme l'avait fait pousser en hauteur
- type: usfm
  marker: q1
  children:
  - type: text
    text: en entourant de ses fleuves l'endroit où il était planté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puis en envoyant ses ruisseaux à tous les arbres de la campagne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Voilà pourquoi sa taille était plus haute que celle de tous les arbres de la campagne.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ses branches s'étaient multipliées, ses rameaux s'étaient allongés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: grâce à l'eau abondante dont il bénéficiait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: »Tous les oiseaux du ciel faisaient leur nid dans son branchage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toutes les bêtes des champs faisaient leurs petits sous ses rameaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de nombreuses nations habitaient à son ombre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il était beau par sa grandeur, par l'étendue de ses branches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que ses racines plongeaient dans une eau abondante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Les cèdres du jardin de Dieu ne le surpassaient pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les cyprès n'égalaient pas son branchage
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les platanes n'avaient pas ses rameaux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aucun arbre du jardin de Dieu n'égalait sa beauté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je l'avais embelli en multipliant ses branches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous les arbres d'Eden, du jardin de Dieu, l'enviaient.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '»C''est pourquoi, voici ce que dit le Seigneur, l''Eternel: Parce qu''il avait une taille élevée, parce qu''il lançait sa cime au milieu d''épais buissons et que son cœur était fier de sa hauteur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'je l''ai livré entre les mains du chef des nations, qui l''a traité conformément à sa méchanceté: je l''ai chassé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Des étrangers, les plus violents parmi les nations, l'ont abattu avant de l'abandonner. Ses branches sont tombées sur les montagnes et dans toutes les vallées, ses rameaux se sont brisés dans tous les cours d'eau du pays. Tous les peuples de la terre se sont retirés loin de son ombre et l'ont abandonné.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '»Tous les oiseaux du ciel se sont installés sur ses débris et toutes les bêtes des champs sont venues vivre parmi ses rameaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ainsi, aucun arbre planté près de l'eau ne s'enorgueillira plus de sa taille et ne lancera plus sa cime au milieu d'épais buissons, aucun des puissants arrosés par l'eau ne se reposera plus sur sa hauteur. En effet, ils sont tous livrés à la mort, aux profondeurs de la terre, parmi les humains, avec ceux qui descendent dans la tombe.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '»Voici ce que dit le Seigneur, l''Eternel: Le jour où il est descendu dans le séjour des morts, j''ai proclamé un deuil, j''ai recouvert l''abîme à cause de lui et j''ai retenu ses fleuves. Les grandes eaux ont été arrêtées. J''ai attristé le Liban à cause de lui et tous les arbres de la campagne sont devenus secs à cause de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Par le bruit de sa chute j''ai fait trembler les nations, quand je l''ai précipité dans le séjour des morts avec ceux qui descendent dans la tombe. Tous les arbres d''Eden ont été consolés dans les profondeurs de la terre, les plus beaux et les meilleurs du Liban, tous ceux qui étaient arrosés par l''eau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Eux aussi sont descendus avec lui dans le séjour des morts, vers les victimes de l'épée, eux qui constituaient son soutien et habitaient à son ombre parmi les nations.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: »A qui te compares-tu en gloire et en grandeur parmi les arbres d'Eden? Tu seras précipité avec les arbres d'Eden dans les profondeurs de la terre, tu seras enseveli parmi les incirconcis, avec les victimes de l'épée. Voilà ce qui attend le pharaon et toute sa foule bruyante, déclare le Seigneur, l'Eternel.»
