document_id: EZK.31,152
type_code: fra
verses:
  '1':
  - type: heading
    content: L'Egypte frappée comme l'Assyrie
  - type: text
    content: 'La onzième année, le premier jour du troisième mois, la parole de l''Eternel m''a été adressée: '
  '10':
  - type: text
    content: '»C''est pourquoi, voici ce que dit le Seigneur, l''Eternel: Parce qu''il avait une taille élevée, parce qu''il lançait sa cime au milieu d''épais buissons et que son cœur était fier de sa hauteur, '
  '11':
  - type: text
    content: 'je l''ai livré entre les mains du chef des nations, qui l''a traité conformément à sa méchanceté: je l''ai chassé. '
  '12':
  - type: text
    content: Des étrangers, les plus violents parmi les nations, l'ont abattu avant de l'abandonner. Ses branches sont tombées sur les montagnes et dans toutes les vallées, ses rameaux se sont brisés dans tous les cours d'eau du pays. Tous les peuples de la terre se sont retirés loin de son ombre et l'ont abandonné.
  '13':
  - type: text
    content: '»Tous les oiseaux du ciel se sont installés sur ses débris et toutes les bêtes des champs sont venues vivre parmi ses rameaux. '
  '14':
  - type: text
    content: Ainsi, aucun arbre planté près de l'eau ne s'enorgueillira plus de sa taille et ne lancera plus sa cime au milieu d'épais buissons, aucun des puissants arrosés par l'eau ne se reposera plus sur sa hauteur. En effet, ils sont tous livrés à la mort, aux profondeurs de la terre, parmi les humains, avec ceux qui descendent dans la tombe.
  '15':
  - type: text
    content: '»Voici ce que dit le Seigneur, l''Eternel: Le jour où il est descendu dans le séjour des morts, j''ai proclamé un deuil, j''ai recouvert l''abîme à cause de lui et j''ai retenu ses fleuves. Les grandes eaux ont été arrêtées. J''ai attristé le Liban à cause de lui et tous les arbres de la campagne sont devenus secs à cause de lui. '
  '16':
  - type: text
    content: 'Par le bruit de sa chute j''ai fait trembler les nations, quand je l''ai précipité dans le séjour des morts avec ceux qui descendent dans la tombe. Tous les arbres d''Eden ont été consolés dans les profondeurs de la terre, les plus beaux et les meilleurs du Liban, tous ceux qui étaient arrosés par l''eau. '
  '17':
  - type: text
    content: Eux aussi sont descendus avec lui dans le séjour des morts, vers les victimes de l'épée, eux qui constituaient son soutien et habitaient à son ombre parmi les nations.
  '18':
  - type: text
    content: »A qui te compares-tu en gloire et en grandeur parmi les arbres d'Eden? Tu seras précipité avec les arbres d'Eden dans les profondeurs de la terre, tu seras enseveli parmi les incirconcis, avec les victimes de l'épée. Voilà ce qui attend le pharaon et toute sa foule bruyante, déclare le Seigneur, l'Eternel.»
  '2':
  - type: text
    content: '«Fils de l''homme, dis au pharaon, au roi d''Egypte, et à sa foule bruyante:'
  - type: text
    content: »A qui ressembles-tu, toi qui es si important?
  '3':
  - type: text
    content: L'Assyrie était un cèdre du Liban.
  - type: text
    content: Ses branches étaient belles,
  - type: text
    content: son feuillage touffu, sa taille élevée,
  - type: text
    content: et sa cime dépassait bien, au milieu des épais buissons.
  '4':
  - type: text
    content: L'eau l'avait fait grandir,
  - type: text
    content: l'abîme l'avait fait pousser en hauteur
  - type: text
    content: en entourant de ses fleuves l'endroit où il était planté,
  - type: text
    content: puis en envoyant ses ruisseaux à tous les arbres de la campagne.
  '5':
  - type: text
    content: Voilà pourquoi sa taille était plus haute que celle de tous les arbres de la campagne.
  - type: text
    content: Ses branches s'étaient multipliées, ses rameaux s'étaient allongés,
  - type: text
    content: grâce à l'eau abondante dont il bénéficiait.
  '6':
  - type: text
    content: »Tous les oiseaux du ciel faisaient leur nid dans son branchage,
  - type: text
    content: toutes les bêtes des champs faisaient leurs petits sous ses rameaux,
  - type: text
    content: et de nombreuses nations habitaient à son ombre.
  '7':
  - type: text
    content: Il était beau par sa grandeur, par l'étendue de ses branches,
  - type: text
    content: parce que ses racines plongeaient dans une eau abondante.
  '8':
  - type: text
    content: Les cèdres du jardin de Dieu ne le surpassaient pas,
  - type: text
    content: les cyprès n'égalaient pas son branchage
  - type: text
    content: et les platanes n'avaient pas ses rameaux.
  - type: text
    content: Aucun arbre du jardin de Dieu n'égalait sa beauté.
  '9':
  - type: text
    content: Je l'avais embelli en multipliant ses branches,
  - type: text
    content: et tous les arbres d'Eden, du jardin de Dieu, l'enviaient.
