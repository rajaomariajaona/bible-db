document_id: ZEP.3,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Causes du jugement de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Malheur à la ville rebelle et souillée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à la ville pleine d'oppresseurs!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Venus de plus loin que les fleuves d'Ethiopie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mes adorateurs, ceux que j'ai dispersés, m'apporteront des offrandes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Ce jour-là, tu n'auras plus à rougir de toutes les actions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par lesquelles tu as péché contre moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car alors j'enlèverai du milieu de toi ceux qui exultent dans leur orgueil
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu cesseras de faire l'arrogante sur ma montagne sainte.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Je laisserai au milieu de toi un peuple humble et faible
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui trouvera son refuge dans le nom de l'Eternel.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Le reste d'Israël ne commettra pas d'injustice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne dira pas de mensonge
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il n'aura pas dans la bouche une langue trompeuse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ils pourront manger et se coucher sans que personne ne les trouble.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Pousse des cris de joie, fille de Sion!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pousse des cris d'allégresse, Israël!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réjouis-toi et exulte de tout ton cœur, fille de Jérusalem!
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: L'Eternel a détourné de toi les jugements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a éloigné ton ennemi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le roi d''Israël, l''Eternel, est au milieu de toi:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu n'as plus à redouter le malheur.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ce jour-là, on dira à Jérusalem: «N''aie pas peur,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sion, ne baisse pas les bras!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: L'Eternel, ton Dieu, est au milieu de toi un héros qui sauve.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fera de toi sa plus grande joie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il gardera le silence dans son amour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puis il se réjouira à grands cris à ton sujet.»
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Je rassemblerai ceux qui sont dans la tristesse, loin des fêtes solennelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui sont loin de toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sous le poids du déshonneur.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: A ce moment-là, j'agirai contre tous tes oppresseurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je délivrerai les boiteux et je rassemblerai ceux qui ont été chassés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ferai d'eux un sujet de louange et de gloire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans tous les pays où ils sont méprisés.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Elle n'écoute aucune voix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle n'accepte pas la correction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle ne se confie pas en l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle ne s'approche pas de son Dieu.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: A ce moment-là je vous ramènerai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à ce moment-là je vous rassemblerai.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, je ferai de vous un sujet de gloire et de louange
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parmi tous les peuples de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand je ramènerai vos déportés sous vos yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dit l'Eternel.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ses chefs au milieu d'elle sont des lions rugissants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses juges sont des loups du soir qui ne gardent rien pour le matin.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ses prophètes sont des indisciplinés, des trompeurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses prêtres profanent les choses saintes, ils violent la loi.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Au milieu d'elle, l'Eternel est juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne commet aucune injustice.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chaque matin il rend ses jugements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans jamais y manquer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais celui qui est injuste ne connaît pas la honte.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: J'ai supprimé des nations, leurs tours sont détruites,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'j''ai dévasté leurs rues: plus aucun passant.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Leurs villes sont désertes: plus aucun homme, plus aucun habitant.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Je disais: «Si au moins tu voulais me craindre,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: accepter la correction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ton habitation ne serait pas détruite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toutes les interventions dont je t'ai menacée n'arriveraient pas»,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ils se sont empressés de pervertir toutes leurs actions.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Attendez-moi donc, déclare l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le jour où je me lèverai pour le butin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car j'ai décidé de rassembler les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de rassembler les royaumes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour déverser sur eux ma fureur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toute l'ardeur de ma colère.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, toute la terre sera dévorée par le feu de ma jalousie.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Bénédictions en perspective
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Alors je donnerai aux peuples des lèvres pures
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin qu'ils fassent tous appel au nom de l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour le servir d'un commun accord.
