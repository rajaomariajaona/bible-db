document_id: ZEP.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Causes du jugement de Jérusalem
  - type: text
    content: Malheur à la ville rebelle et souillée,
  - type: text
    content: à la ville pleine d'oppresseurs!
  '10':
  - type: text
    content: Venus de plus loin que les fleuves d'Ethiopie,
  - type: text
    content: mes adorateurs, ceux que j'ai dispersés, m'apporteront des offrandes.
  '11':
  - type: text
    content: Ce jour-là, tu n'auras plus à rougir de toutes les actions
  - type: text
    content: par lesquelles tu as péché contre moi,
  - type: text
    content: car alors j'enlèverai du milieu de toi ceux qui exultent dans leur orgueil
  - type: text
    content: et tu cesseras de faire l'arrogante sur ma montagne sainte.
  '12':
  - type: text
    content: Je laisserai au milieu de toi un peuple humble et faible
  - type: text
    content: qui trouvera son refuge dans le nom de l'Eternel.
  '13':
  - type: text
    content: Le reste d'Israël ne commettra pas d'injustice,
  - type: text
    content: il ne dira pas de mensonge
  - type: text
    content: et il n'aura pas dans la bouche une langue trompeuse,
  - type: text
    content: mais ils pourront manger et se coucher sans que personne ne les trouble.
  '14':
  - type: text
    content: Pousse des cris de joie, fille de Sion!
  - type: text
    content: Pousse des cris d'allégresse, Israël!
  - type: text
    content: Réjouis-toi et exulte de tout ton cœur, fille de Jérusalem!
  '15':
  - type: text
    content: L'Eternel a détourné de toi les jugements,
  - type: text
    content: il a éloigné ton ennemi.
  - type: text
    content: 'Le roi d''Israël, l''Eternel, est au milieu de toi:'
  - type: text
    content: tu n'as plus à redouter le malheur.
  '16':
  - type: text
    content: 'Ce jour-là, on dira à Jérusalem: «N''aie pas peur,'
  - type: text
    content: Sion, ne baisse pas les bras!
  '17':
  - type: text
    content: L'Eternel, ton Dieu, est au milieu de toi un héros qui sauve.
  - type: text
    content: Il fera de toi sa plus grande joie.
  - type: text
    content: Il gardera le silence dans son amour,
  - type: text
    content: puis il se réjouira à grands cris à ton sujet.»
  '18':
  - type: text
    content: Je rassemblerai ceux qui sont dans la tristesse, loin des fêtes solennelles,
  - type: text
    content: ceux qui sont loin de toi,
  - type: text
    content: sous le poids du déshonneur.
  '19':
  - type: text
    content: A ce moment-là, j'agirai contre tous tes oppresseurs,
  - type: text
    content: je délivrerai les boiteux et je rassemblerai ceux qui ont été chassés,
  - type: text
    content: je ferai d'eux un sujet de louange et de gloire
  - type: text
    content: dans tous les pays où ils sont méprisés.
  '2':
  - type: text
    content: Elle n'écoute aucune voix,
  - type: text
    content: elle n'accepte pas la correction,
  - type: text
    content: elle ne se confie pas en l'Eternel,
  - type: text
    content: elle ne s'approche pas de son Dieu.
  '20':
  - type: text
    content: A ce moment-là je vous ramènerai,
  - type: text
    content: à ce moment-là je vous rassemblerai.
  - type: text
    content: Oui, je ferai de vous un sujet de gloire et de louange
  - type: text
    content: parmi tous les peuples de la terre,
  - type: text
    content: quand je ramènerai vos déportés sous vos yeux,
  - type: text
    content: dit l'Eternel.
  '3':
  - type: text
    content: Ses chefs au milieu d'elle sont des lions rugissants,
  - type: text
    content: ses juges sont des loups du soir qui ne gardent rien pour le matin.
  '4':
  - type: text
    content: Ses prophètes sont des indisciplinés, des trompeurs,
  - type: text
    content: ses prêtres profanent les choses saintes, ils violent la loi.
  '5':
  - type: text
    content: Au milieu d'elle, l'Eternel est juste,
  - type: text
    content: il ne commet aucune injustice.
  - type: text
    content: Chaque matin il rend ses jugements,
  - type: text
    content: sans jamais y manquer;
  - type: text
    content: mais celui qui est injuste ne connaît pas la honte.
  '6':
  - type: text
    content: J'ai supprimé des nations, leurs tours sont détruites,
  - type: text
    content: 'j''ai dévasté leurs rues: plus aucun passant.'
  - type: text
    content: 'Leurs villes sont désertes: plus aucun homme, plus aucun habitant.'
  '7':
  - type: text
    content: 'Je disais: «Si au moins tu voulais me craindre,'
  - type: text
    content: accepter la correction,
  - type: text
    content: ton habitation ne serait pas détruite,
  - type: text
    content: toutes les interventions dont je t'ai menacée n'arriveraient pas»,
  - type: text
    content: mais ils se sont empressés de pervertir toutes leurs actions.
  '8':
  - type: text
    content: Attendez-moi donc, déclare l'Eternel,
  - type: text
    content: le jour où je me lèverai pour le butin,
  - type: text
    content: car j'ai décidé de rassembler les nations,
  - type: text
    content: de rassembler les royaumes,
  - type: text
    content: pour déverser sur eux ma fureur,
  - type: text
    content: toute l'ardeur de ma colère.
  - type: text
    content: Oui, toute la terre sera dévorée par le feu de ma jalousie.
  - type: heading
    content: Bénédictions en perspective
  '9':
  - type: text
    content: Alors je donnerai aux peuples des lèvres pures
  - type: text
    content: afin qu'ils fassent tous appel au nom de l'Eternel
  - type: text
    content: pour le servir d'un commun accord.
