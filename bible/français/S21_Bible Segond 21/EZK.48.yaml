document_id: EZK.48,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Partage du pays
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '»Voici la liste des tribus. Sur le territoire qui part de l''extrémité nord, longe le chemin de Hethlon en direction de Hamath et Hatsar-Enon, et laisse la frontière de Damas au nord vers Hamath, d''est en ouest, il y aura une tribu: celle de Dan. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'C''est aux prêtres qu''appartiendra cette partie sainte de 12 kilomètres et demi au nord, 5 de large à l''ouest, 5 de large à l''est et 12 et demi de long au sud, et le sanctuaire de l''Eternel sera au centre. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Elle appartiendra aux prêtres consacrés, aux descendants de Tsadok qui ont persévéré à mon service, qui ne se sont pas égarés comme l''ont fait les Lévites lorsque les Israélites s''égaraient. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Elle sera pour eux une partie très sainte, prise sur la partie du pays prélevée à titre de contribution, à côté du territoire des Lévites.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '»Parallèlement au territoire des prêtres, les Lévites posséderont un territoire de 12 kilomètres et demi de long et 5 de large; la longueur totale sera de 12 kilomètres et demi et la largeur de 5. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ils ne pourront rien vendre de ce territoire. On n'échangera pas et ne cédera pas cette meilleure partie du pays, car elle est consacrée à l'Eternel.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: '»La zone de 2500 mètres de large sur 12 kilomètres et demi de long qui restera sera une zone profane réservée pour la ville, pour ses habitations et ses environs immédiats, et la ville sera au centre. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Voici ses dimensions: du côté nord elle fera 2250 mètres, du côté sud 2250 mètres, du côté est 2250 mètres et du côté ouest 2250 mètres. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Les environs immédiats de la ville feront 125 mètres au nord, 125 mètres au sud, 125 mètres à l''est et 125 mètres à l''ouest. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ce qui restera de la longueur, parallèlement à la partie sainte, sera une zone de 5 kilomètres à l''est et de 5 kilomètres à l''ouest. Les produits de ces zones serviront de nourriture à ceux qui travailleront pour la ville. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Leur sol sera cultivé par les membres de toutes les tribus d'Israël qui travailleront pour la ville.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Le long du territoire de Dan, d''est en ouest, il y aura une tribu: celle d''Aser. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: »Au total, la partie prélevée à titre de contribution fera 12 kilomètres et demi de long sur 12 kilomètres et demi de large. Vous prélèverez un carré de cette partie sainte pour qu'il soit propriété de la ville.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '»Ce qui restera sera pour le prince, des deux côtés de la partie sainte et de la propriété de la ville, le long des 12 kilomètres et demi de la partie sainte jusqu''aux frontières est et ouest du pays, parallèlement aux autres parts. Voilà ce qui appartiendra au prince; la partie sainte et le sanctuaire du temple seront au milieu. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: La propriété des Lévites et la propriété de la ville seront au milieu de ce qui appartiendra au prince. La part qui appartiendra au prince se situera entre la frontière de Juda et la frontière de Benjamin.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '»Ensuite, il y aura les autres tribus. D''est en ouest, il y aura une tribu: celle de Benjamin. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Le long du territoire de Benjamin, d''est en ouest, il y aura une tribu: celle de Siméon. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Le long du territoire de Siméon, d''est en ouest, il y aura une tribu: celle d''Issacar. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Le long du territoire d''Issacar, d''est en ouest, il y aura une tribu: celle de Zabulon. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Le long du territoire de Zabulon, d''est en ouest, il y aura une tribu: celle de Gad. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Le long du territoire de Gad, du côté du Néguev, au sud, la frontière s'étendra de Thamar jusqu'aux eaux de Meriba à Kadès, et le long du torrent jusqu'à la mer Méditerranée.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: »Tel est le pays que vous attribuerez en héritage aux tribus d'Israël et telles sont leurs portions, déclare le Seigneur, l'Eternel.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Le long du territoire d''Aser, d''est en ouest, il y aura une tribu: celle de Nephthali. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: '»Voici les issues de la ville. Son côté nord mesurera 2250 mètres. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Les portes de la ville porteront les noms des tribus d''Israël. Il y aura 3 portes au nord: la porte de Ruben, la porte de Juda et la porte de Lévi. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'A l''est, il y aura 2250 mètres et 3 portes: la porte de Joseph, la porte de Benjamin et la porte de Dan. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Au sud, il y aura 2250 mètres et 3 portes: la porte de Siméon, la porte d''Issacar et la porte de Zabulon. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'A l''ouest, il y aura 2250 mètres et leurs 3 portes: la porte de Gad, la porte d''Aser et la porte de Nephthali. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Le pourtour de la ville fera 9 kilomètres et, dès ce jour, le nom de la ville sera ‘l'Eternel est ici’.»
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Le long du territoire de Nephthali, d''est en ouest, il y aura une tribu: celle de Manassé. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Le long du territoire de Manassé, d''est en ouest, il y aura une tribu: celle d''Ephraïm. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Le long du territoire d''Ephraïm, d''est en ouest, il y aura une tribu: celle de Ruben. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Le long du territoire de Ruben, d''est en ouest, il y aura une tribu: celle de Juda.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '»Le long du territoire de Juda, d''est en ouest, se trouvera la partie que vous prélèverez à titre de contribution, large de 12 kilomètres et demi, aussi longue qu''une des parts qui va d''est en ouest, et qui aura le sanctuaire au centre. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'La partie que vous prélèverez pour l''Eternel aura 12 kilomètres et demi de long et 5 de large. '
