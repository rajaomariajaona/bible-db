document_id: NEH.11,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Répartition des nouveaux habitants
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les chefs du peuple se sont installés à Jérusalem et le reste du peuple a désigné par tirage au sort un Israélite sur 10 afin qu''il vienne habiter Jérusalem, la ville sainte, tandis que les autres restaient dans leurs villes. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parmi les prêtres, il y avait Jedaeja, fils de Jojarib, Jakin, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Seraja, fils de Hilkija et descendant de Meshullam, Tsadok, Merajoth et Achithub, qui était responsable de la maison de Dieu, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et leurs frères chargés des travaux du temple; ils étaient 822. Il y avait aussi Adaja, fils de Jerocham et descendant de Pelalia, Amtsi, Zacharie, Pashhur et Malkija, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ainsi que ses frères chefs de famille au nombre de 242, et Amashsaï, fils d''Azareel et descendant d''Achzaï, Meshillémoth et Immer, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: avec ses frères, qui étaient de vaillants hommes, au nombre de 128. Zabdiel, fils de Guedolim, était leur commandant.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parmi les Lévites, il y avait Shemaeja, fils de Hashub et descendant d''Azrikam, Hashabia et Bunni, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ainsi que Shabbethaï et Jozabad, qui étaient chargés des travaux extérieurs pour la maison de Dieu et faisaient partie des chefs des Lévites; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Matthania, fils de Michée et descendant de Zabdi et Asaph, qui était responsable d''ouvrir le moment de louange lors de la prière; Bakbukia, son adjoint, qui était un de ses frères, et Abda, fils de Shammua et descendant de Galal et Jeduthun. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nombre total des Lévites présents dans la ville sainte: 284.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pour les portiers, il y avait Akkub, Thalmon et leurs frères gardiens des portes; ils étaient 172.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le peuple a, de plus, béni tous ceux qui se portaient volontaires pour s'installer à Jérusalem.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le reste d'Israël, des prêtres et des Lévites habitait dans toutes les villes de Juda, chacun dans sa propriété.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les serviteurs du temple étaient installés sur la colline de l''Ophel et ils avaient pour chefs Tsicha et Guishpa. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le commandant des Lévites à Jérusalem était Uzzi, fils de Bani et descendant de Hashabia, Matthania et Michée, qui faisait partie des descendants d''Asaph, les musiciens en charge des activités de la maison de Dieu. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, il y avait un ordre du roi concernant les musiciens, et un accord fixait leur part journalière. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Pethachja, fils de Meshézabeel, qui était issu de Zérach, le fils de Juda, était délégué auprès du roi pour toutes les affaires relatives au peuple.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En ce qui concerne les villages et leurs territoires, des Judéens s''étaient installés à Kirjath-Arba et dans les bourgades qui en dépendaient, à Dibon et dans les bourgades qui en dépendaient, à Jekabtseel et dans les villages voisins, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'à Jéshua, à Molada, à Beth-Paleth, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'à Hatsar-Shual, à Beer-Shéba et dans les bourgades qui en dépendaient, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'à Tsiklag, à Mecona et dans les bourgades qui en dépendaient, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'à En-Rimmon, à Tsorea, à Jarmuth, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les chefs de la province qui se sont installés à Jérusalem, alors que dans les villes de Juda chacun habitait sa propriété, sa ville, qu''il s''agisse d''Israélites, de prêtres, de Lévites, de serviteurs du temple ou de descendants des serviteurs de Salomon, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'à Zanoach, Adullam et les villages voisins, à Lakis et dans son territoire, à Azéka et dans les bourgades qui en dépendaient. Leur zone d''habitation s''étendait de Beer-Shéba à la vallée de Hinnom. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant aux Benjaminites, leur zone d''habitation partait de Guéba et comprenait Micmash, Ajja, Béthel et les bourgades qui en dépendaient, '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Anathoth, Nob, Hanania, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hatsor, Rama, Guitthaïm, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hadid, Tseboïm, Neballath, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lod, Ono et la vallée des artisans. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Certains Lévites étaient installés dans les parties de Juda rattachées à Benjamin.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et qu'à Jérusalem s'établissaient aussi des Judéens et des Benjaminites.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Parmi les Judéens, il y avait Athaja, fils d''Ozias et descendant de Zacharie, Amaria, Shephathia et Mahalaleel, qui était issu de Pérets, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et Maaséja, fils de Baruc et descendant de Col-Hozé, Hazaja, Adaja, Jojarib, Zacharie et Shiloni. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nombre total des descendants de Pérets qui se sont installés à Jérusalem: 468 hommes vaillants.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les Benjaminites qui s''y sont installés: Sallu, fils de Meshullam et descendant de Joëd, Pedaja, Kolaja, Maaséja, Ithiel et Esaïe, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ainsi que, après lui, Gabbaï et Sallaï. Ils étaient 928. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joël, fils de Zicri, était leur commandant et Juda, fils de Senua, était le chef adjoint de la ville.
