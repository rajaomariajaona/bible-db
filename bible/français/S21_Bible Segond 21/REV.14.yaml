document_id: REV.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'Agneau et les rachetés
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Je regardai et je vis l''Agneau debout sur le mont Sion, et avec lui 144''000 personnes qui avaient son nom et le nom de son Père écrits sur leur front. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'J''entendis du ciel une voix qui ressemblait au bruit de grosses eaux, au grondement d''un fort coup de tonnerre. Le son que j''entendis était aussi comme celui de joueurs de harpe jouant de leur instrument. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils chantaient un cantique nouveau devant le trône, devant les quatre êtres vivants et les anciens. Personne ne pouvait apprendre ce cantique, excepté les 144''000 qui avaient été rachetés de la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ce sont ceux qui ne se sont pas souillés avec des femmes. En effet, ils sont vierges. Ils suivent l''Agneau partout où il va. Ils ont été rachetés d''entre les hommes comme la première part réservée à Dieu et à l''Agneau. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il ne s'est pas trouvé de mensonge dans leur bouche, [car] ils sont irréprochables.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les trois anges proclamant le jugement
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je vis ensuite un [autre] ange voler haut dans le ciel. Il avait un Evangile éternel pour l''annoncer aux habitants de la terre, à toute nation, à toute tribu, à toute langue et à tout peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il disait d''une voix forte: «Craignez Dieu et rendez-lui gloire, car l''heure de son jugement est venue. Adorez celui qui a fait le ciel, la terre, la mer et les sources d''eau.» '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Un autre, un deuxième ange, le suivit en disant: «Elle est tombée, [elle est tombée,] Babylone la grande, elle qui a fait boire à toutes les nations le vin de la fureur de sa prostitution!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Et un autre, un troisième ange, les suivit en disant d''une voix forte: «Si quelqu''un adore la bête et son image et s''il reçoit la marque sur son front ou sur sa main, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'il boira, lui aussi, du vin de la fureur de Dieu, versé sans mélange dans la coupe de sa colère, et il sera tourmenté dans le feu et le soufre, devant les saints anges et devant l''Agneau. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'La fumée de leur tourment monte aux siècles des siècles et ils n''ont de repos ni jour ni nuit, ceux qui adorent la bête et son image, et tous ceux qui reçoivent la marque de son nom.» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: C'est ici qu'est nécessaire la persévérance des saints qui gardent les commandements de Dieu et la foi en Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Puis j''entendis du ciel une voix qui disait: «Ecris: ‘Heureux les morts qui meurent dans le Seigneur, et ce dès maintenant! Oui, dit l''Esprit, ainsi ils se reposent de leurs travaux, mais leurs œuvres les suivent.’»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La moisson et la vendange
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Je regardai et je vis une nuée blanche, et sur la nuée était assis quelqu''un qui ressemblait à un fils d''homme. Il avait sur la tête une couronne d''or, et à la main une faucille tranchante. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Un autre ange sortit alors du temple et cria d''une voix forte à celui qui était assis sur la nuée: «Lance ta faucille et moissonne, car l''heure de moissonner est venue, la récolte de la terre est mûre.» '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Celui qui était assis sur la nuée jeta sa faucille sur la terre et la terre fut moissonnée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Un autre ange sortit du temple qui est dans le ciel, tenant lui aussi une faucille tranchante. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Puis un autre ange, qui avait autorité sur le feu, sortit de l''autel et s''adressa d''une voix forte à celui qui avait la faucille tranchante en disant: «Lance ta faucille tranchante et vendange les grappes de la vigne de la terre, car ses raisins sont mûrs.» '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L''ange jeta sa faucille sur la terre. Il vendangea la vigne de la terre et versa cette vendange dans la grande cuve de la colère de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Le raisin fut écrasé dans la cuve à l'extérieur de la ville. Du sang en sortit et monta jusqu'aux mors des chevaux, sur une étendue de 300 kilomètres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: '300 kilomètres: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: littéralement 1600 stades.
    marker-yv: yv-n
  - type: text
    text: .
