document_id: REV.14,152
type_code: fra
verses:
  '1':
  - type: heading
    content: L'Agneau et les rachetés
  - type: text
    content: 'Je regardai et je vis l''Agneau debout sur le mont Sion, et avec lui 144''000 personnes qui avaient son nom et le nom de son Père écrits sur leur front. '
  '10':
  - type: text
    content: 'il boira, lui aussi, du vin de la fureur de Dieu, versé sans mélange dans la coupe de sa colère, et il sera tourmenté dans le feu et le soufre, devant les saints anges et devant l''Agneau. '
  '11':
  - type: text
    content: 'La fumée de leur tourment monte aux siècles des siècles et ils n''ont de repos ni jour ni nuit, ceux qui adorent la bête et son image, et tous ceux qui reçoivent la marque de son nom.» '
  '12':
  - type: text
    content: C'est ici qu'est nécessaire la persévérance des saints qui gardent les commandements de Dieu et la foi en Jésus.
  '13':
  - type: text
    content: 'Puis j''entendis du ciel une voix qui disait: «Ecris: ‘Heureux les morts qui meurent dans le Seigneur, et ce dès maintenant! Oui, dit l''Esprit, ainsi ils se reposent de leurs travaux, mais leurs œuvres les suivent.’»'
  - type: heading
    content: La moisson et la vendange
  '14':
  - type: text
    content: 'Je regardai et je vis une nuée blanche, et sur la nuée était assis quelqu''un qui ressemblait à un fils d''homme. Il avait sur la tête une couronne d''or, et à la main une faucille tranchante. '
  '15':
  - type: text
    content: 'Un autre ange sortit alors du temple et cria d''une voix forte à celui qui était assis sur la nuée: «Lance ta faucille et moissonne, car l''heure de moissonner est venue, la récolte de la terre est mûre.» '
  '16':
  - type: text
    content: Celui qui était assis sur la nuée jeta sa faucille sur la terre et la terre fut moissonnée.
  '17':
  - type: text
    content: 'Un autre ange sortit du temple qui est dans le ciel, tenant lui aussi une faucille tranchante. '
  '18':
  - type: text
    content: 'Puis un autre ange, qui avait autorité sur le feu, sortit de l''autel et s''adressa d''une voix forte à celui qui avait la faucille tranchante en disant: «Lance ta faucille tranchante et vendange les grappes de la vigne de la terre, car ses raisins sont mûrs.» '
  '19':
  - type: text
    content: 'L''ange jeta sa faucille sur la terre. Il vendangea la vigne de la terre et versa cette vendange dans la grande cuve de la colère de Dieu. '
  '2':
  - type: text
    content: 'J''entendis du ciel une voix qui ressemblait au bruit de grosses eaux, au grondement d''un fort coup de tonnerre. Le son que j''entendis était aussi comme celui de joueurs de harpe jouant de leur instrument. '
  '20':
  - type: text
    content: Le raisin fut écrasé dans la cuve à l'extérieur de la ville. Du sang en sortit et monta jusqu'aux mors des chevaux, sur une étendue de 300 kilomètres
  - type: note
    content: '300 kilomètres: littéralement 1600 stades.'
  - type: text
    content: .
  '3':
  - type: text
    content: 'Ils chantaient un cantique nouveau devant le trône, devant les quatre êtres vivants et les anciens. Personne ne pouvait apprendre ce cantique, excepté les 144''000 qui avaient été rachetés de la terre. '
  '4':
  - type: text
    content: 'Ce sont ceux qui ne se sont pas souillés avec des femmes. En effet, ils sont vierges. Ils suivent l''Agneau partout où il va. Ils ont été rachetés d''entre les hommes comme la première part réservée à Dieu et à l''Agneau. '
  '5':
  - type: text
    content: Il ne s'est pas trouvé de mensonge dans leur bouche, [car] ils sont irréprochables.
  - type: heading
    content: Les trois anges proclamant le jugement
  '6':
  - type: text
    content: 'Je vis ensuite un [autre] ange voler haut dans le ciel. Il avait un Evangile éternel pour l''annoncer aux habitants de la terre, à toute nation, à toute tribu, à toute langue et à tout peuple. '
  '7':
  - type: text
    content: 'Il disait d''une voix forte: «Craignez Dieu et rendez-lui gloire, car l''heure de son jugement est venue. Adorez celui qui a fait le ciel, la terre, la mer et les sources d''eau.» '
  '8':
  - type: text
    content: 'Un autre, un deuxième ange, le suivit en disant: «Elle est tombée, [elle est tombée,] Babylone la grande, elle qui a fait boire à toutes les nations le vin de la fureur de sa prostitution!»'
  '9':
  - type: text
    content: 'Et un autre, un troisième ange, les suivit en disant d''une voix forte: «Si quelqu''un adore la bête et son image et s''il reçoit la marque sur son front ou sur sa main, '
