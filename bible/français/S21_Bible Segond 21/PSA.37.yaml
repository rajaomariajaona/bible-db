document_id: PSA.37,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Contraste entre le juste et l'impie
  - type: text
    content: De David.
  - type: text
    content: Ne t'irrite pas contre les méchants,
  - type: text
    content: n'envie pas ceux qui font le mal,
  '10':
  - type: text
    content: Encore un peu de temps, et le méchant n'existe plus;
  - type: text
    content: tu regardes l'endroit où il était, et il a disparu.
  '11':
  - type: text
    content: Les humbles possèdent le pays,
  - type: text
    content: et ils jouissent d'une paix abondante.
  '12':
  - type: text
    content: Le méchant complote contre le juste,
  - type: text
    content: et il grince des dents contre lui,
  '13':
  - type: text
    content: mais le Seigneur se moque du méchant,
  - type: text
    content: car il voit que son jour arrive.
  '14':
  - type: text
    content: Les méchants tirent l'épée,
  - type: text
    content: ils bandent leur arc
  - type: text
    content: pour faire tomber le malheureux et le pauvre,
  - type: text
    content: pour égorger ceux dont la voie est droite.
  '15':
  - type: text
    content: Mais leur épée transperce leur propre cœur,
  - type: text
    content: et leur arc se brise.
  '16':
  - type: text
    content: Mieux vaut le peu du juste
  - type: text
    content: que l'abondance de nombreux méchants,
  '17':
  - type: text
    content: car la force des méchants sera brisée,
  - type: text
    content: tandis que l'Eternel soutient les justes.
  '18':
  - type: text
    content: L'Eternel connaît les jours des hommes intègres,
  - type: text
    content: et leur héritage dure éternellement.
  '19':
  - type: text
    content: Ils ne sont pas couverts de honte quand vient le malheur
  - type: text
    content: et ils sont rassasiés quand la famine est là,
  '2':
  - type: text
    content: car ils sont fauchés aussi vite que l'herbe,
  - type: text
    content: et ils se flétrissent comme le gazon vert.
  '20':
  - type: text
    content: tandis que les méchants disparaissent,
  - type: text
    content: 'les ennemis de l''Eternel connaissent le même sort que les plus beaux pâturages:'
  - type: text
    content: ils s'évanouissent, ils s'évanouissent comme une fumée.
  '21':
  - type: text
    content: Le méchant emprunte, et il ne rend pas;
  - type: text
    content: le juste est compatissant, et il donne,
  '22':
  - type: text
    content: car ceux que l'Eternel bénit possèdent le pays,
  - type: text
    content: et ceux qu'il maudit sont exterminés.
  '23':
  - type: text
    content: L'Eternel affermit les pas de l'homme,
  - type: text
    content: et il prend plaisir à sa voie;
  '24':
  - type: text
    content: s'il tombe, il n'est pas rejeté,
  - type: text
    content: car l'Eternel lui prend la main.
  '25':
  - type: text
    content: J'ai été jeune, j'ai vieilli,
  - type: text
    content: et je n'ai pas vu le juste être abandonné
  - type: text
    content: ni ses descendants mendier leur pain.
  '26':
  - type: text
    content: Il est toujours compatissant, il prête,
  - type: text
    content: et sa descendance est bénie.
  '27':
  - type: text
    content: Détourne-toi du mal, fais le bien,
  - type: text
    content: et tu auras pour toujours une demeure,
  '28':
  - type: text
    content: car l'Eternel aime ce qui est droit,
  - type: text
    content: 'et il n''abandonne pas ses fidèles:'
  - type: text
    content: ils sont toujours sous sa garde,
  - type: text
    content: tandis que la descendance des méchants est exterminée.
  '29':
  - type: text
    content: Les justes posséderont le pays,
  - type: text
    content: et ils y demeureront définitivement.
  '3':
  - type: text
    content: Confie-toi en l'Eternel et fais le bien,
  - type: text
    content: aie le pays pour demeure, et que la fidélité soit ta nourriture!
  '30':
  - type: text
    content: La bouche du juste annonce la sagesse,
  - type: text
    content: et sa langue proclame la justice.
  '31':
  - type: text
    content: La loi de son Dieu est dans son cœur,
  - type: text
    content: ses pas ne faiblissent pas.
  '32':
  - type: text
    content: Le méchant épie le juste
  - type: text
    content: et cherche à le faire mourir,
  '33':
  - type: text
    content: mais l'Eternel ne le livre pas entre ses mains,
  - type: text
    content: et il ne le laisse pas condamner quand il est jugé.
  '34':
  - type: text
    content: Espère en l'Eternel, suis sa voie,
  - type: text
    content: et il t'élèvera pour que tu possèdes le pays,
  - type: text
    content: tandis que tu verras les méchants exterminés.
  '35':
  - type: text
    content: 'J''ai vu l''homme violent dans toute sa puissance:'
  - type: text
    content: il s'étendait comme un arbre verdoyant,
  '36':
  - type: text
    content: mais il est passé et il n'existe plus;
  - type: text
    content: je le cherche, et je ne le trouve plus.
  '37':
  - type: text
    content: Observe celui qui est intègre et regarde celui qui est droit,
  - type: text
    content: car il y a un avenir pour l'homme de paix,
  '38':
  - type: text
    content: tandis que les rebelles sont tous détruits,
  - type: text
    content: l'avenir des méchants est réduit à néant.
  '39':
  - type: text
    content: 'Le salut des justes vient de l''Eternel:'
  - type: text
    content: il est leur forteresse dans les moments de détresse.
  '4':
  - type: text
    content: Fais de l'Eternel tes délices,
  - type: text
    content: et il te donnera ce que ton cœur désire.
  '40':
  - type: text
    content: L'Eternel les secourt et les délivre,
  - type: text
    content: il les délivre des méchants et les sauve,
  - type: text
    content: parce qu'ils cherchent refuge en lui.
  '5':
  - type: text
    content: Recommande ton sort à l'Eternel,
  - type: text
    content: 'mets ta confiance en lui, et il agira:'
  '6':
  - type: text
    content: il fera paraître ta justice comme la lumière,
  - type: text
    content: et ton droit comme le soleil en plein midi.
  '7':
  - type: text
    content: Garde le silence devant l'Eternel et espère en lui,
  - type: text
    content: ne t'irrite pas contre celui qui réussit dans ses entreprises,
  - type: text
    content: contre l'homme qui réalise ses méchants projets!
  '8':
  - type: text
    content: Laisse la colère, abandonne la fureur,
  - type: text
    content: 'ne t''irrite pas: ce serait mal faire,'
  '9':
  - type: text
    content: car les méchants seront exterminés,
  - type: text
    content: mais ceux qui espèrent en l'Eternel possèdent le pays.
