document_id: PSA.37
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contraste entre le juste et l'impie
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: De David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne t'irrite pas contre les méchants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: n'envie pas ceux qui font le mal,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: car ils sont fauchés aussi vite que l'herbe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils se flétrissent comme le gazon vert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Confie-toi en l'Eternel et fais le bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aie le pays pour demeure, et que la fidélité soit ta nourriture!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Fais de l'Eternel tes délices,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il te donnera ce que ton cœur désire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Recommande ton sort à l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'mets ta confiance en lui, et il agira:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: il fera paraître ta justice comme la lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ton droit comme le soleil en plein midi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Garde le silence devant l'Eternel et espère en lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne t'irrite pas contre celui qui réussit dans ses entreprises,
- type: usfm
  marker: q1
  children:
  - type: text
    text: contre l'homme qui réalise ses méchants projets!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Laisse la colère, abandonne la fureur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ne t''irrite pas: ce serait mal faire,'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: car les méchants seront exterminés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ceux qui espèrent en l'Eternel possèdent le pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Encore un peu de temps, et le méchant n'existe plus;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu regardes l'endroit où il était, et il a disparu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Les humbles possèdent le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils jouissent d'une paix abondante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le méchant complote contre le juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il grince des dents contre lui,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: mais le Seigneur se moque du méchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il voit que son jour arrive.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les méchants tirent l'épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils bandent leur arc
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour faire tomber le malheureux et le pauvre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour égorger ceux dont la voie est droite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mais leur épée transperce leur propre cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur arc se brise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mieux vaut le peu du juste
- type: usfm
  marker: q1
  children:
  - type: text
    text: que l'abondance de nombreux méchants,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: car la force des méchants sera brisée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que l'Eternel soutient les justes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: L'Eternel connaît les jours des hommes intègres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur héritage dure éternellement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ils ne sont pas couverts de honte quand vient le malheur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils sont rassasiés quand la famine est là,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: tandis que les méchants disparaissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'les ennemis de l''Eternel connaissent le même sort que les plus beaux pâturages:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils s'évanouissent, ils s'évanouissent comme une fumée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Le méchant emprunte, et il ne rend pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: le juste est compatissant, et il donne,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: car ceux que l'Eternel bénit possèdent le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ceux qu'il maudit sont exterminés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: L'Eternel affermit les pas de l'homme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il prend plaisir à sa voie;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: s'il tombe, il n'est pas rejeté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car l'Eternel lui prend la main.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: J'ai été jeune, j'ai vieilli,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je n'ai pas vu le juste être abandonné
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni ses descendants mendier leur pain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Il est toujours compatissant, il prête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa descendance est bénie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Détourne-toi du mal, fais le bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu auras pour toujours une demeure,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: car l'Eternel aime ce qui est droit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et il n''abandonne pas ses fidèles:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sont toujours sous sa garde,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que la descendance des méchants est exterminée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Les justes posséderont le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils y demeureront définitivement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: La bouche du juste annonce la sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa langue proclame la justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: La loi de son Dieu est dans son cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses pas ne faiblissent pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Le méchant épie le juste
- type: usfm
  marker: q1
  children:
  - type: text
    text: et cherche à le faire mourir,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: mais l'Eternel ne le livre pas entre ses mains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il ne le laisse pas condamner quand il est jugé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Espère en l'Eternel, suis sa voie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il t'élèvera pour que tu possèdes le pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que tu verras les méchants exterminés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'J''ai vu l''homme violent dans toute sa puissance:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il s'étendait comme un arbre verdoyant,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: mais il est passé et il n'existe plus;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je le cherche, et je ne le trouve plus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Observe celui qui est intègre et regarde celui qui est droit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il y a un avenir pour l'homme de paix,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: tandis que les rebelles sont tous détruits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'avenir des méchants est réduit à néant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Le salut des justes vient de l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est leur forteresse dans les moments de détresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: L'Eternel les secourt et les délivre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il les délivre des méchants et les sauve,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu'ils cherchent refuge en lui.
