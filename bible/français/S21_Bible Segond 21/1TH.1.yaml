document_id: 1TH.1,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salutation et louange
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De la part de Paul, Silvain et Timothée à l''Eglise des Thessaloniciens qui est en Dieu le Père et dans le Seigneur Jésus-Christ: que la grâce et la paix vous soient données [de la part de Dieu notre Père et du Seigneur Jésus-Christ]!'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et pour attendre du ciel son Fils qu'il a ressuscité, Jésus, celui qui nous délivre de la colère à venir.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous disons constamment à Dieu toute notre reconnaissance pour vous tous en faisant mention de vous dans nos prières. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous nous rappelons sans cesse l''œuvre de votre foi, le travail de votre amour et la fermeté de votre espérance en notre Seigneur Jésus-Christ, devant Dieu notre Père. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous savons, frères et sœurs aimés de Dieu, qu''il vous a choisis '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'parce que notre Evangile ne vous a pas été prêché en paroles seulement, mais avec puissance, avec l''Esprit saint et avec une pleine conviction. Vous savez en effet comment nous nous sommes comportés parmi vous à cause de vous. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous-mêmes, vous êtes devenus nos imitateurs et ceux du Seigneur en accueillant la parole au milieu de grandes difficultés, avec la joie du Saint-Esprit. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi, vous êtes devenus un modèle pour tous les croyants de la Macédoine et de l''Achaïe. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, non seulement la parole du Seigneur a retenti depuis chez vous en Macédoine et en Achaïe, mais c''est aussi partout que votre foi en Dieu s''est fait connaître, de sorte que nous n''avons pas besoin d''en parler. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De fait, on raconte à notre sujet quel accueil nous avons eu auprès de vous et comment vous vous êtes tournés vers Dieu en abandonnant les idoles pour servir le Dieu vivant et vrai '
