document_id: GEN.23,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Mort et ensevelissement de Sara
  - type: text
    content: 'Sara vécut 127 ans: c''est la durée de sa vie. '
  '10':
  - type: text
    content: 'Or, Ephron était assis parmi les Hittites, et Ephron le Hittite répondit à Abraham, devant les Hittites et tous ceux qui entraient par la porte de sa ville: '
  '11':
  - type: text
    content: '«Non, mon seigneur, écoute-moi! Je te donne le champ, ainsi que la grotte qui s''y trouve. Je te les donne en présence de mes compatriotes. Enterre ton mort!» '
  '12':
  - type: text
    content: 'Abraham se prosterna devant la population du pays '
  '13':
  - type: text
    content: 'et dit à Ephron, devant la population du pays: «Ecoute-moi, je t''en prie! Je donne le prix du champ. Accepte-le et j''y enterrerai mon mort.» '
  '14':
  - type: text
    content: 'Ephron répondit à Abraham: '
  '15':
  - type: text
    content: '«Mon seigneur, écoute-moi! Une terre de 400 pièces d''argent, qu''est-ce que cela entre nous? Enterre ton mort!» '
  '16':
  - type: text
    content: 'Abraham comprit Ephron et lui pesa la quantité d''argent qu''il avait indiquée devant les Hittites: 400 pièces d''argent d''après le cours en vigueur chez les marchands.'
  '17':
  - type: text
    content: 'Le champ d''Ephron à Macpéla, vis-à-vis de Mamré, le champ et la grotte qui s''y trouve, avec tous les arbres qui sont dans le champ, dans la limite de son pourtour, '
  '18':
  - type: text
    content: 'devinrent ainsi la propriété d''Abraham en présence des descendants de Heth et de tous ceux qui entraient par la porte de sa ville. '
  '19':
  - type: text
    content: 'Après cela, Abraham enterra sa femme Sara dans la grotte du champ de Macpéla vis-à-vis de Mamré, c''est-à-dire Hébron, dans le pays de Canaan. '
  '2':
  - type: text
    content: 'Elle mourut à Kirjath-Arba, c''est-à-dire Hébron, dans le pays de Canaan. Abraham vint mener deuil sur Sara et la pleurer. '
  '20':
  - type: text
    content: Le champ et la grotte qui s'y trouve furent ainsi accordés comme propriété funéraire à Abraham par les Hittites.
  '3':
  - type: text
    content: 'Puis il s''éloigna de son corps et dit aux Hittites: '
  '4':
  - type: text
    content: '«Je suis un étranger et un résident temporaire parmi vous. Donnez-moi une propriété funéraire chez vous pour que j''enterre mon mort et l''éloigne de moi.» '
  '5':
  - type: text
    content: 'Les Hittites répondirent à Abraham: '
  '6':
  - type: text
    content: «Ecoute-nous, seigneur! Tu es un prince de Dieu au milieu de nous. Enterre ton mort dans celui de nos lieux de sépulture que tu choisiras, aucun de nous ne te refusera son tombeau pour que tu enterres ton mort.»
  '7':
  - type: text
    content: 'Abraham se leva et se prosterna devant la population du pays, devant les Hittites. '
  '8':
  - type: text
    content: 'Puis il leur dit: «Si vous permettez que j''enterre mon mort et que je l''éloigne de moi, écoutez-moi: intercédez pour moi auprès d''Ephron, fils de Tsochar, '
  '9':
  - type: text
    content: 'pour qu''il me cède la grotte de Macpéla qui lui appartient et qui se trouve à l''extrémité de son champ. Qu''il me la cède contre sa valeur en argent afin qu''elle me serve de propriété funéraire au milieu de vous.» '
