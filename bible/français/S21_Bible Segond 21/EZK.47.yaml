document_id: EZK.47,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le torrent jaillissant du sanctuaire
  - type: text
    content: 'Ensuite, l''homme m''a fait revenir vers la porte du temple. J''ai vu que de l''eau sortait sous le seuil du temple, à l''est, car la façade du temple était orientée à l''est. L''eau descendait sous le côté droit du temple, au sud de l''autel. '
  '10':
  - type: text
    content: 'Des pêcheurs se tiendront sur ses rives. Depuis En-Guédi jusqu''à En-Eglaïm, on étendra les filets. Il y aura des poissons de diverses espèces, comme les poissons de la Méditerranée, et il y en aura en grande quantité. '
  '11':
  - type: text
    content: 'Ses marais et ses étangs ne seront pas assainis, ils seront exploités pour le sel. '
  '12':
  - type: text
    content: Le long du torrent, sur chaque côté de ses rives, pousseront toutes sortes d'arbres fruitiers. Leur feuillage ne se flétrira pas et ils ne cesseront jamais de porter du fruit. Ils donneront du fruit tous les mois, parce que l'eau qui les arrose sort du sanctuaire. Leurs fruits serviront de nourriture, et leurs feuilles de remède.
  - type: heading
    content: Limites du pays
  '13':
  - type: text
    content: '»Voici ce que dit le Seigneur, l''Eternel: Voici les limites du pays dont vous vous partagerez la propriété entre les douze tribus d''Israël. Joseph aura deux parts. '
  '14':
  - type: text
    content: Vous obtiendrez la possession de ce pays, personne n'en sera privé, car je me suis engagé à le donner à vos ancêtres. Ce pays fait donc partie de votre héritage.
  '15':
  - type: text
    content: '»Voici les limites du pays. La frontière nord partira de la mer Méditerranée et suivra le chemin de Hethlon pour passer à Tsedad, '
  '16':
  - type: text
    content: 'Hamath, Bérotha, Sibraïm – entre la frontière de Damas et la frontière de Hamath – et Hatzer-Hatthicon, vers la frontière de Havran. '
  '17':
  - type: text
    content: 'Ainsi la limite comprendra, en partant de la mer: Hatsar-Enon, la frontière de Damas, Tsaphon au nord et la frontière de Hamath. Ce sera le côté nord. '
  '18':
  - type: text
    content: 'Vous ferez passer la frontière est entre Havran, Damas, Galaad et le pays d''Israël. Le Jourdain servira de frontière jusqu''à la mer Morte. Ce sera le côté est. '
  '19':
  - type: text
    content: 'Du côté du Néguev, au sud, la frontière s''étendra de Thamar jusqu''aux eaux de Meriba à Kadès, et le long du torrent jusqu''à la mer Méditerranée. Ce sera le côté sud, au Néguev. '
  '2':
  - type: text
    content: Puis il m'a fait sortir par la porte nord et m'a fait faire le tour par dehors jusqu'à la porte extérieure qui est orientée à l'est. J'ai vu que l'eau coulait du côté droit.
  '20':
  - type: text
    content: La frontière ouest sera constituée par la mer Méditerranée, depuis la limite jusqu'en face de l'entrée de Hamath. Ce sera le côté ouest.
  '21':
  - type: text
    content: '»Vous partagerez ce pays entre vous, d''après les tribus d''Israël. '
  '22':
  - type: text
    content: 'Vous le diviserez en parts d''héritage pour vous et pour les étrangers en séjour parmi vous, ceux qui ont eu des enfants parmi vous. Vous les traiterez comme des Israélites de naissance; c''est avec vous qu''ils diviseront les parts d''héritage, au milieu des tribus d''Israël. '
  '23':
  - type: text
    content: Vous donnerez à l'étranger son héritage dans la tribu où il séjourne, déclare le Seigneur, l'Eternel.
  '3':
  - type: text
    content: 'Lorsque l''homme s''est avancé vers l''est, il tenait un ruban à mesurer. Il a mesuré 500 mètres, puis il m''a fait traverser l''eau: j''en avais jusqu''aux chevilles. '
  '4':
  - type: text
    content: 'Il a mesuré encore 500 mètres et m''a fait traverser l''eau: j''en avais jusqu''aux genoux. Il a mesuré encore 500 mètres et m''a fait traverser: j''en avais jusqu''à la taille. '
  '5':
  - type: text
    content: 'Il a mesuré encore 500 mètres: c''était devenu un torrent que j''étais incapable de traverser, car l''eau était si profonde qu''il fallait y nager. C''était un torrent qu''on ne pouvait pas traverser.'
  '6':
  - type: text
    content: 'Alors il m''a dit: «As-tu bien regardé, fils de l''homme?» Puis il m''a entraîné et ramené au bord du torrent. '
  '7':
  - type: text
    content: 'Quand il m''a ramené, j''ai vu qu''il y avait sur la rive du torrent une grande quantité d''arbres de chaque côté. '
  '8':
  - type: text
    content: 'Alors il m''a dit: «Cette eau sort vers le district est. Elle descendra dans la plaine et se jettera dans la mer Morte. Lorsqu''elle se sera déversée dans la mer, l''eau de la mer sera assainie. '
  '9':
  - type: text
    content: 'Tout être vivant qui grouille vivra partout où le torrent parviendra. Il y aura une grande quantité de poissons, car là où cette eau parviendra, tout sera assaini. Là où parviendra le torrent, il y aura profusion de vie. '
