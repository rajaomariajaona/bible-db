document_id: PSA.92,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Louange et prospérité du juste
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Psaume, chant pour le jour du sabbat.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car voici tes ennemis, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'voici tes ennemis: ils vont à leur perte,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous ceux qui commettent l'injustice sont dispersés.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais tu me donnes la force du buffle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je suis arrosé avec une huile fraîche.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon œil voit ceux qui m'espionnent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mon oreille entend les méchants qui s'attaquent à moi.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les justes poussent comme le palmier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils grandissent comme le cèdre du Liban.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Plantés dans la maison de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils prospèrent dans les parvis de notre Dieu;
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils portent encore des fruits dans la vieillesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont pleins de sève et verdoyants,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour annoncer que l'Eternel est droit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est mon rocher, et il n'y a aucune injustice en lui.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est bon de te louer, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de célébrer ton nom, Très-Haut,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d'annoncer le matin ta bonté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pendant les nuits ta fidélité,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur l'instrument à dix cordes, sur le luth
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et au son de la harpe.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu me réjouis par ce que tu accomplis, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je chante avec allégresse les œuvres de tes mains.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tes œuvres sont grandes, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que tes pensées sont profondes!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'idiot n'y connaît rien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'homme stupide n'y comprend rien.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si les méchants poussent comme l'herbe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si tous ceux qui commettent l'injustice sont florissants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est pour être détruits à perpétuité.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais toi, tu es le Très-Haut pour toujours, Eternel,
