document_id: PSA.92,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Louange et prospérité du juste
  - type: text
    content: Psaume, chant pour le jour du sabbat.
  '10':
  - type: text
    content: car voici tes ennemis, Eternel,
  - type: text
    content: 'voici tes ennemis: ils vont à leur perte,'
  - type: text
    content: tous ceux qui commettent l'injustice sont dispersés.
  '11':
  - type: text
    content: Mais tu me donnes la force du buffle,
  - type: text
    content: je suis arrosé avec une huile fraîche.
  '12':
  - type: text
    content: Mon œil voit ceux qui m'espionnent,
  - type: text
    content: et mon oreille entend les méchants qui s'attaquent à moi.
  '13':
  - type: text
    content: Les justes poussent comme le palmier,
  - type: text
    content: ils grandissent comme le cèdre du Liban.
  '14':
  - type: text
    content: Plantés dans la maison de l'Eternel,
  - type: text
    content: ils prospèrent dans les parvis de notre Dieu;
  '15':
  - type: text
    content: ils portent encore des fruits dans la vieillesse,
  - type: text
    content: ils sont pleins de sève et verdoyants,
  '16':
  - type: text
    content: pour annoncer que l'Eternel est droit.
  - type: text
    content: Il est mon rocher, et il n'y a aucune injustice en lui.
  '2':
  - type: text
    content: Il est bon de te louer, Eternel,
  - type: text
    content: et de célébrer ton nom, Très-Haut,
  '3':
  - type: text
    content: d'annoncer le matin ta bonté
  - type: text
    content: et pendant les nuits ta fidélité,
  '4':
  - type: text
    content: sur l'instrument à dix cordes, sur le luth
  - type: text
    content: et au son de la harpe.
  '5':
  - type: text
    content: Tu me réjouis par ce que tu accomplis, Eternel,
  - type: text
    content: et je chante avec allégresse les œuvres de tes mains.
  '6':
  - type: text
    content: Que tes œuvres sont grandes, Eternel,
  - type: text
    content: que tes pensées sont profondes!
  '7':
  - type: text
    content: L'idiot n'y connaît rien,
  - type: text
    content: l'homme stupide n'y comprend rien.
  '8':
  - type: text
    content: Si les méchants poussent comme l'herbe,
  - type: text
    content: si tous ceux qui commettent l'injustice sont florissants,
  - type: text
    content: c'est pour être détruits à perpétuité.
  '9':
  - type: text
    content: Mais toi, tu es le Très-Haut pour toujours, Eternel,
