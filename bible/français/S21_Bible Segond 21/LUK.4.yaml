document_id: LUK.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tentation de Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus, rempli du Saint-Esprit, revint du Jourdain. Il fut conduit par l''Esprit dans le désert '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'où il fut tenté par le diable pendant 40 jours. Il ne mangea rien durant ces jours-là et, quand cette période fut passée, il eut faim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le diable lui dit: «Si tu es le Fils de Dieu, ordonne à cette pierre de devenir du pain.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jésus lui répondit: «Il est écrit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: L'homme ne vivra pas de pain seulement [mais de toute parole de Dieu]
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''homme… de Dieu: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 8.3
      metadata:
        usfm: DEU.8.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le diable l''emmena plus haut, [sur une haute montagne,] et lui montra en un instant tous les royaumes de la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Puis il lui dit: «Je te donnerai toute cette puissance et la gloire de ces royaumes, car elle m''a été donnée et je la donne à qui je veux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Si donc tu te prosternes devant moi, elle sera toute à toi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jésus lui répondit: «[Retire-toi, Satan! En effet,] il est écrit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: C'est le Seigneur, ton Dieu, que tu adoreras et c'est lui seul que tu serviras
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'C''est le… serviras: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 6.13
      metadata:
        usfm: DEU.6.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le diable le conduisit encore à Jérusalem, le plaça au sommet du temple et lui dit: «Si tu es le Fils de Dieu, jette-toi d''ici en bas, car il est écrit: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Il donnera, à ton sujet, ordre à ses anges de te garder
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'et: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Ils te porteront sur les mains, de peur que ton pied ne heurte une pierre
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10-11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il donnera… pierre: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 91.11-12
      metadata:
        usfm: PSA.91.11+PSA.91.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jésus lui répondit: «Il est dit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu ne provoqueras pas le Seigneur, ton Dieu
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu ne… Dieu: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 6.16
      metadata:
        usfm: DEU.6.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Après l'avoir tenté de toutes ces manières, le diable s'éloigna de lui jusqu'à un moment favorable.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Ministère de Jésus en Galilée
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 4.14–9.50
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus à Nazareth
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jésus, revêtu de la puissance de l''Esprit, retourna en Galilée, et sa réputation gagna toute la région. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il enseignait dans les synagogues et tous lui rendaient gloire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jésus se rendit à Nazareth où il avait été élevé et, conformément à son habitude, il entra dans la synagogue le jour du sabbat. Il se leva pour faire la lecture, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: et on lui remit le livre du prophète Esaïe. Il le déroula
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il le déroula: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: les anciens manuscrits étaient des rouleaux de papyrus ou de parchemin.
    marker-yv: yv-n
  - type: text
    text: ' et trouva l''endroit où il était écrit: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: L'Esprit du Seigneur est sur moi, parce qu'il m'a consacré par onction pour annoncer la bonne nouvelle aux pauvres; il m'a envoyé [pour guérir ceux qui ont le cœur brisé,]
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: pour proclamer aux prisonniers la délivrance et aux aveugles le recouvrement de la vue, pour renvoyer libres les opprimés, pour proclamer une année de grâce du Seigneur.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.18-19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''Esprit… du Seigneur: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 61.1-2
      metadata:
        usfm: ISA.61.1+ISA.61.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ensuite, il roula le livre, le remit au serviteur et s''assit. Tous ceux qui se trouvaient dans la synagogue avaient les regards fixés sur lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Alors il commença à leur dire: «Aujourd''hui cette parole de l''Ecriture, que vous venez d''entendre, est accomplie.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tous lui rendaient témoignage; ils étaient étonnés des paroles de grâce qui sortaient de sa bouche et ils disaient: «N''est-ce pas le fils de Joseph?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Jésus leur dit: «Vous allez sans doute me citer ce proverbe: ‘Médecin, guéris-toi toi-même’, et vous me direz: ‘Fais ici, dans ta patrie, tout ce que, à ce que nous avons appris, tu as fait à Capernaüm.’» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il leur dit encore: «Je vous le dis en vérité, aucun prophète n''est bien accueilli dans sa patrie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Je vous le déclare en toute vérité: il y avait de nombreuses veuves en Israël à l''époque d''Elie, lorsque le ciel a été fermé 3 ans et 6 mois et qu''il y a eu une grande famine dans tout le pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Cependant, Elie n''a été envoyé vers aucune d''elles, mais seulement vers une veuve de Sarepta, dans le pays de Sidon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Il y avait aussi de nombreux lépreux en Israël à l'époque du prophète Elisée, et cependant aucun d'eux n'a été purifié, mais seulement Naaman le Syrien.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ils furent tous remplis de colère dans la synagogue, lorsqu''ils entendirent ces paroles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ils se levèrent, le chassèrent de la ville et le menèrent jusqu''à un escarpement de la montagne sur laquelle leur ville était construite, afin de le précipiter dans le vide. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Mais Jésus passa au milieu d'eux et s'en alla.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Miracles à Capernaüm
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Il descendit à Capernaüm, ville de la Galilée, et il les enseignait le jour du sabbat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'On était frappé par son enseignement, car il parlait avec autorité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Dans la synagogue se trouvait un homme qui avait un esprit démoniaque impur. Il s''écria d''une voix forte: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: '«Ah! Que nous veux-tu, Jésus de Nazareth? Es-tu venu pour nous perdre? Je sais qui tu es: le Saint de Dieu.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Jésus le menaça en disant: «Tais-toi et sors de cet homme.» Le démon jeta l''homme au milieu de l''assemblée et sortit de lui sans lui faire aucun mal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Tous furent saisis de frayeur, et ils se disaient les uns aux autres: «Quelle est cette parole? Il commande avec autorité et puissance aux esprits impurs, et ils sortent!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Et sa réputation gagna toute la région.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'En sortant de la synagogue, il se rendit à la maison de Simon. La belle-mère de Simon avait une forte fièvre et on lui demanda d''intervenir en sa faveur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Il se pencha sur elle, menaça la fièvre, et la fièvre la quitta. Elle se leva immédiatement et se mit à les servir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Au coucher du soleil, tous ceux qui avaient des malades atteints de diverses maladies les lui amenèrent. Il guérit chacun d''eux en posant les mains sur lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Des démons aussi sortirent de beaucoup de personnes en criant et en disant: «Tu es [le Messie,] le Fils de Dieu.» Mais il les reprenait sévèrement et ne leur permettait pas de parler, parce qu''ils savaient qu''il était le Messie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Quand il fit jour, il sortit et se retira dans un endroit désert. Une foule de gens se mirent à sa recherche et arrivèrent jusqu''à lui; ils voulaient le retenir afin qu''il ne les quitte pas, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'mais il leur dit: «Il faut aussi que j''annonce aux autres villes la bonne nouvelle du royaume de Dieu, car c''est pour cela que j''ai été envoyé.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: Et il prêchait dans les synagogues de la Galilée.
