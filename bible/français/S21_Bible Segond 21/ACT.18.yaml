document_id: ACT.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'Evangile à Corinthe
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après cela, Paul partit d''Athènes et se rendit à Corinthe. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il y trouva un Juif du nom d''Aquilas, originaire du Pont, qui venait d''arriver d''Italie avec sa femme Priscille parce que Claude avait ordonné à tous les Juifs de quitter Rome. Il se lia avec eux; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'comme il avait le même métier, il resta chez eux et ils travaillèrent ensemble: ils étaient fabricants de tentes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Chaque sabbat, Paul discourait dans la synagogue et persuadait des Juifs et des Grecs. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Quand Silas et Timothée arrivèrent de la Macédoine, pressé par l''Esprit, il attestait aux Juifs que Jésus est le Messie. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais comme ils s''opposaient à lui et l''insultaient, Paul secoua ses vêtements et leur dit: «Que votre sang retombe sur votre tête! J''en suis pur. Dès maintenant, j''irai vers les non-Juifs.» '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il sortit de là et se rendit chez un dénommé [Titius] Justus, un homme qui craignait Dieu et dont la maison était contiguë à la synagogue. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Cependant Crispus, le chef de la synagogue, crut au Seigneur, ainsi que toute sa famille. Beaucoup de Corinthiens écoutèrent Paul; ils crurent aussi et furent baptisés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le Seigneur dit à Paul dans une vision pendant la nuit: «N''aie pas peur, mais parle et ne te tais pas, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'car je suis moi-même avec toi et personne ne s''attaquera à toi pour te faire du mal. En effet, j''ai un peuple nombreux dans cette ville.» '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il s'établit là un an et six mois, enseignant la parole de Dieu parmi les Corinthiens.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Pendant que Gallion était gouverneur de l''Achaïe, les Juifs se soulevèrent d''un commun accord contre Paul et le conduisirent devant le tribunal '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'en disant: «Cet homme incite les gens à servir Dieu d''une manière contraire à la loi.» '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Paul allait ouvrir la bouche lorsque Gallion dit aux Juifs: «S''il s''agissait d''une injustice ou d''une mauvaise action, je vous écouterais comme il convient, Juifs. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mais s''il s''agit de discussions sur une parole, sur des noms et sur votre loi, cela vous regarde: je ne veux pas être juge de ces affaires.» '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et il les renvoya du tribunal. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Alors tous [les Grecs] s'emparèrent de Sosthène, le chef de la synagogue, et le frappèrent devant le tribunal sans que Gallion ne s'en soucie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Paul resta encore assez longtemps à Corinthe. Ensuite il prit congé des frères et sœurs et embarqua pour la Syrie avec Priscille et Aquilas. Il s'était fait raser la tête à Cenchrées, car il avait fait un vœu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ils arrivèrent à Ephèse où Paul laissa ses compagnons. Lui-même entra dans la synagogue et s''entretint avec les Juifs, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'qui lui demandèrent de prolonger son séjour [chez eux]. Mais il refusa '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'et prit congé d''eux en disant: «[Il faut absolument que je célèbre la fête prochaine à Jérusalem.] Je reviendrai vers vous, si Dieu le veut.» Et il partit d''Ephèse en bateau. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Il débarqua à Césarée et monta à Jérusalem pour saluer l'Eglise, puis il descendit à Antioche.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Troisième voyage missionnaire
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 18.23–21.25
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'Evangile à Ephèse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Après avoir passé quelque temps à Antioche, Paul se mit en route et parcourut successivement la Galatie et la Phrygie en fortifiant tous les disciples.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Un Juif originaire d''Alexandrie du nom d''Apollos était arrivé à Ephèse. C''était un homme éloquent et versé dans les Ecritures. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Il était instruit quant à la voie du Seigneur et, plein de ferveur, il annonçait et enseignait avec exactitude ce qui concerne Jésus, bien que ne connaissant que le baptême de Jean
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le baptême de Jean: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: précurseur de Jésus, Jean-Baptiste avait baptisé en signe de repentance et annoncé la venue du Christ, Agneau de Dieu qui devait enlever le péché du monde.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il se mit à parler avec assurance dans la synagogue. Après l''avoir écouté, Aquilas et Priscille le prirent avec eux et lui exposèrent plus exactement la voie de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Comme il voulait aller en Achaïe, les frères l''y encouragèrent et écrivirent aux disciples de lui faire bon accueil. Dès son arrivée, il se rendit, par la grâce de Dieu, très utile aux croyants. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: En effet, il réfutait avec force les Juifs en public et il démontrait par les Ecritures que Jésus est le Messie.
