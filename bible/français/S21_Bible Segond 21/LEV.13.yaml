document_id: LEV.13,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La lèpre
  - type: text
    content: 'L''Eternel dit à Moïse et à Aaron: '
  '10':
  - type: text
    content: 'Le prêtre l''examinera. S''il y a sur la peau une grosseur blanche, si cette grosseur a fait blanchir le poil et qu''elle porte une trace de chair vive, '
  '11':
  - type: text
    content: 'c''est une lèpre durable dans la peau de cet homme. Le prêtre le déclarera impur. Il ne l''enfermera pas, car il est impur. '
  '12':
  - type: text
    content: 'Si la lèpre fait une éruption sur la peau et couvre toute la peau de celui qui a la plaie, depuis la tête jusqu''aux pieds, partout où le prêtre pourra porter ses regards, il l''examinera. '
  '13':
  - type: text
    content: 'Quand il aura vu que la lèpre couvre tout le corps, il déclarera pur celui qui a la plaie. Comme il est devenu entièrement blanc, il est pur. '
  '14':
  - type: text
    content: 'Mais le jour où l''on apercevra sur lui de la chair vive, il sera impur. '
  '15':
  - type: text
    content: 'Lorsque le prêtre aura vu la chair vive, il le déclarera impur. La chair vive est impure, c''est la lèpre. '
  '16':
  - type: text
    content: 'Si la chair vive change et devient blanche, il ira vers le prêtre. '
  '17':
  - type: text
    content: 'Le prêtre l''examinera et, si la plaie est devenue blanche, il déclarera pur celui qui a la plaie: il est pur.'
  '18':
  - type: text
    content: '»Lorsqu''un homme aura eu sur la peau un ulcère qui a été guéri '
  '19':
  - type: text
    content: 'et qu''apparaîtra, à la place où était l''ulcère, une grosseur blanche ou une tache d''un blanc rougeâtre, il se montrera au prêtre. '
  '2':
  - type: text
    content: '«Lorsqu''un homme aura sur la peau une grosseur, une dartre ou une tache blanche qui ressemblera à une plaie de lèpre sur sa peau, on l''amènera au prêtre Aaron ou à l''un de ses descendants qui seront prêtres. '
  '20':
  - type: text
    content: 'Le prêtre l''examinera. Si la tache paraît former un creux dans la peau et que le poil soit devenu blanc, le prêtre le déclarera impur. C''est une plaie de lèpre, qui a fait éruption dans l''ulcère. '
  '21':
  - type: text
    content: 'Si le prêtre voit qu''il n''y a pas de poil blanc dans la tache, qu''elle ne forme pas un creux dans la peau et qu''elle est devenue pâle, il enfermera cet homme pendant 7 jours. '
  '22':
  - type: text
    content: 'Si la tache s''est étendue sur la peau, le prêtre le déclarera impur. C''est une plaie de lèpre. '
  '23':
  - type: text
    content: Mais si la tache est restée à la même place et ne s'est pas étendue, c'est une cicatrice de l'ulcère. Le prêtre le déclarera pur.
  '24':
  - type: text
    content: '»Lorsqu''un homme aura eu sur la peau une brûlure par le feu et qu''apparaîtra sur la trace de la brûlure une tache blanche ou d''un blanc rougeâtre, le prêtre l''examinera. '
  '25':
  - type: text
    content: 'Si le poil est devenu blanc dans la tache et qu''elle paraisse former un creux dans la peau, c''est la lèpre qui a fait éruption dans la brûlure. Le prêtre déclarera cet homme impur. C''est une plaie de lèpre. '
  '26':
  - type: text
    content: 'Si le prêtre voit qu''il n''y a pas de poil blanc dans la tache, qu''elle ne forme pas de creux dans la peau et qu''elle est devenue pâle, il enfermera cet homme pendant 7 jours. '
  '27':
  - type: text
    content: 'Le prêtre l''examinera le septième jour. Si la tache s''est étendue sur la peau, il le déclarera impur. C''est une plaie de lèpre. '
  '28':
  - type: text
    content: Mais si la tache est restée à la même place, ne s'est pas étendue sur la peau et est devenue pâle, c'est la boursouflure de la brûlure. Le prêtre le déclarera pur, car c'est la cicatrice de la brûlure.
  '29':
  - type: text
    content: '»Lorsqu''un homme ou une femme aura une plaie à la tête ou au menton, '
  '3':
  - type: text
    content: 'Le prêtre examinera la plaie qui est sur la peau. Si le poil de la plaie est devenu blanc et que la plaie paraisse former un creux dans la peau, c''est une plaie de lèpre. Le prêtre qui aura fait l''examen déclarera cet homme impur. '
  '30':
  - type: text
    content: 'le prêtre examinera la plaie. Si elle paraît former un creux dans la peau et qu''il y ait du poil jaunâtre et mince, le prêtre déclarera cette personne impure. C''est la teigne, la lèpre de la tête ou du menton. '
  '31':
  - type: text
    content: 'Si le prêtre voit que la plaie de la teigne ne paraît pas former un creux dans la peau et qu''il n''y a pas de poil noir, il enfermera pendant 7 jours celui qui a la plaie de la teigne. '
  '32':
  - type: text
    content: 'Le prêtre examinera la plaie le septième jour. Si la teigne ne s''est pas étendue, s''il n''y a pas de poil jaunâtre et si elle ne paraît pas former un creux dans la peau, '
  '33':
  - type: text
    content: 'celui qui a la teigne se rasera, mais il ne rasera pas la place où est la teigne. Le prêtre l''enfermera une deuxième fois pendant 7 jours. '
  '34':
  - type: text
    content: 'Le prêtre examinera la teigne le septième jour. Si la teigne ne s''est pas étendue sur la peau et si elle ne paraît pas former un creux dans la peau, le prêtre le déclarera pur. L''homme lavera ses vêtements et il sera pur. '
  '35':
  - type: text
    content: 'Mais si la teigne s''est étendue sur la peau après qu''il a été déclaré pur, le prêtre l''examinera. '
  '36':
  - type: text
    content: 'Et si la teigne s''est étendue sur la peau, le prêtre n''aura pas à rechercher s''il y a du poil jaunâtre: l''homme est impur. '
  '37':
  - type: text
    content: Si la teigne lui paraît ne pas avoir fait de progrès et que du poil noir ait poussé, la teigne est guérie. L'homme est pur et le prêtre le déclarera pur.
  '38':
  - type: text
    content: '»Lorsqu''un homme ou une femme aura sur la peau des taches, des taches blanches, '
  '39':
  - type: text
    content: le prêtre l'examinera. S'il y a sur la peau des taches d'un blanc pâle, ce ne sont que des taches qui ont fait éruption sur la peau. La personne est pure.
  '4':
  - type: text
    content: 'S''il y a sur la peau une tache blanche qui ne paraisse pas former un creux dans la peau et que le poil ne soit pas devenu blanc, le prêtre enfermera pendant 7 jours celui qui a la plaie. '
  '40':
  - type: text
    content: '»Lorsqu''un homme perd ses cheveux, c''est un chauve. Il est pur. '
  '41':
  - type: text
    content: 'S''il perd ses cheveux du côté du visage, c''est un chauve par-devant. Il est pur. '
  '42':
  - type: text
    content: 'Mais s''il y a dans la partie chauve de devant ou de derrière une plaie d''un blanc rougeâtre, c''est la lèpre qui a fait éruption dans cette partie chauve. '
  '43':
  - type: text
    content: 'Le prêtre l''examinera. Si, dans la partie chauve de derrière ou de devant, la plaie forme une grosseur d''un blanc rougeâtre, semblable à la lèpre sur la peau du corps, '
  '44':
  - type: text
    content: c'est un homme lépreux, il est impur. Le prêtre le déclarera impur. Sa plaie est à la tête.
  '45':
  - type: text
    content: '»Le lépreux atteint de la plaie portera des vêtements déchirés et aura la tête nue; il se couvrira la barbe et criera: ‘Impur! Impur!’ '
  '46':
  - type: text
    content: Aussi longtemps qu'il aura la plaie, il sera impur. Il est impur. Il habitera seul et sa tente sera à l'extérieur du camp.
  - type: heading
    content: La lèpre des vêtements
  '47':
  - type: text
    content: '»Lorsqu''il y aura sur un vêtement une plaie de lèpre – qu''il s''agisse d''un vêtement de laine ou de lin, '
  '48':
  - type: text
    content: 'd''une chaîne ou d''une trame de lin ou de laine, d''une peau ou d''un objet en cuir – '
  '49':
  - type: text
    content: 'et que la plaie sera verdâtre ou rougeâtre sur le vêtement ou sur la peau, dans la chaîne ou la trame, ou sur n''importe quel objet en cuir, c''est une plaie de lèpre et on la montrera au prêtre. '
  '5':
  - type: text
    content: 'Le prêtre l''examinera le septième jour. Si la plaie lui paraît ne pas avoir fait de progrès et ne pas s''être étendue sur la peau, il l''enfermera une deuxième fois pendant 7 jours. '
  '50':
  - type: text
    content: 'Le prêtre examinera la plaie et enfermera pendant 7 jours ce qui en est attaqué. '
  '51':
  - type: text
    content: 'Il examinera la plaie le septième jour. Si la plaie s''est étendue sur le vêtement, dans la chaîne ou la trame, sur la peau ou l''objet en cuir, c''est une plaie de lèpre durable. L''objet est impur. '
  '52':
  - type: text
    content: 'Le prêtre brûlera le vêtement, la chaîne ou la trame de laine ou de lin, l''objet en cuir sur lequel se trouve la plaie, car c''est une lèpre durable. On brûlera l''objet au feu. '
  '53':
  - type: text
    content: 'Mais si le prêtre voit que la plaie ne s''est pas étendue sur le vêtement, la chaîne, la trame ou l''objet en cuir, '
  '54':
  - type: text
    content: 'il ordonnera de laver ce qui est attaqué de la plaie et il l''enfermera une deuxième fois pendant 7 jours. '
  '55':
  - type: text
    content: 'Le prêtre examinera la plaie après qu''elle aura été lavée. Si la plaie n''a pas changé d''aspect et ne s''est pas étendue, l''objet est impur. On le brûlera au feu; c''est une partie de l''endroit ou de l''envers qui a été rongée. '
  '56':
  - type: text
    content: 'Si le prêtre voit que la plaie est devenue pâle une fois lavée, il l''arrachera du vêtement ou de la peau, de la chaîne ou de la trame. '
  '57':
  - type: text
    content: 'Si elle paraît encore sur le vêtement, la chaîne, la trame ou l''objet en cuir, c''est une éruption de lèpre: on brûlera au feu ce qui est attaqué de la plaie. '
  '58':
  - type: text
    content: Le vêtement, la chaîne, la trame ou l'objet en cuir qui a été lavé et d'où la plaie a disparu sera lavé une deuxième fois et il sera pur.»
  '59':
  - type: text
    content: Telle est la loi sur la plaie de la lèpre, lorsqu'elle attaque les vêtements de laine ou de lin, la chaîne ou la trame, ou n'importe quel objet en cuir. C'est d'après cette loi qu'on les déclarera purs ou impurs.
  '6':
  - type: text
    content: 'Le prêtre l''examinera une deuxième fois le septième jour. Si la plaie est devenue pâle et ne s''est pas étendue sur la peau, il déclarera cet homme pur: c''est une dartre. L''homme lavera ses vêtements et il sera pur. '
  '7':
  - type: text
    content: 'Mais si la dartre s''est étendue sur la peau après qu''il s''est montré au prêtre pour être déclaré pur, il se fera examiner une deuxième fois par le prêtre. '
  '8':
  - type: text
    content: Le prêtre l'examinera. Si la dartre s'est étendue sur la peau, il le déclarera impur. C'est la lèpre.
  '9':
  - type: text
    content: '»Lorsqu''il y aura sur un homme une plaie de lèpre, on l''amènera au prêtre. '
