document_id: LEV.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La lèpre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Moïse et à Aaron: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Lorsqu''un homme aura sur la peau une grosseur, une dartre ou une tache blanche qui ressemblera à une plaie de lèpre sur sa peau, on l''amènera au prêtre Aaron ou à l''un de ses descendants qui seront prêtres. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le prêtre examinera la plaie qui est sur la peau. Si le poil de la plaie est devenu blanc et que la plaie paraisse former un creux dans la peau, c''est une plaie de lèpre. Le prêtre qui aura fait l''examen déclarera cet homme impur. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'S''il y a sur la peau une tache blanche qui ne paraisse pas former un creux dans la peau et que le poil ne soit pas devenu blanc, le prêtre enfermera pendant 7 jours celui qui a la plaie. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le prêtre l''examinera le septième jour. Si la plaie lui paraît ne pas avoir fait de progrès et ne pas s''être étendue sur la peau, il l''enfermera une deuxième fois pendant 7 jours. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le prêtre l''examinera une deuxième fois le septième jour. Si la plaie est devenue pâle et ne s''est pas étendue sur la peau, il déclarera cet homme pur: c''est une dartre. L''homme lavera ses vêtements et il sera pur. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Mais si la dartre s''est étendue sur la peau après qu''il s''est montré au prêtre pour être déclaré pur, il se fera examiner une deuxième fois par le prêtre. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le prêtre l'examinera. Si la dartre s'est étendue sur la peau, il le déclarera impur. C'est la lèpre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '»Lorsqu''il y aura sur un homme une plaie de lèpre, on l''amènera au prêtre. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le prêtre l''examinera. S''il y a sur la peau une grosseur blanche, si cette grosseur a fait blanchir le poil et qu''elle porte une trace de chair vive, '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'c''est une lèpre durable dans la peau de cet homme. Le prêtre le déclarera impur. Il ne l''enfermera pas, car il est impur. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Si la lèpre fait une éruption sur la peau et couvre toute la peau de celui qui a la plaie, depuis la tête jusqu''aux pieds, partout où le prêtre pourra porter ses regards, il l''examinera. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quand il aura vu que la lèpre couvre tout le corps, il déclarera pur celui qui a la plaie. Comme il est devenu entièrement blanc, il est pur. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais le jour où l''on apercevra sur lui de la chair vive, il sera impur. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Lorsque le prêtre aura vu la chair vive, il le déclarera impur. La chair vive est impure, c''est la lèpre. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Si la chair vive change et devient blanche, il ira vers le prêtre. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le prêtre l''examinera et, si la plaie est devenue blanche, il déclarera pur celui qui a la plaie: il est pur.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '»Lorsqu''un homme aura eu sur la peau un ulcère qui a été guéri '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'et qu''apparaîtra, à la place où était l''ulcère, une grosseur blanche ou une tache d''un blanc rougeâtre, il se montrera au prêtre. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le prêtre l''examinera. Si la tache paraît former un creux dans la peau et que le poil soit devenu blanc, le prêtre le déclarera impur. C''est une plaie de lèpre, qui a fait éruption dans l''ulcère. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Si le prêtre voit qu''il n''y a pas de poil blanc dans la tache, qu''elle ne forme pas un creux dans la peau et qu''elle est devenue pâle, il enfermera cet homme pendant 7 jours. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Si la tache s''est étendue sur la peau, le prêtre le déclarera impur. C''est une plaie de lèpre. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Mais si la tache est restée à la même place et ne s'est pas étendue, c'est une cicatrice de l'ulcère. Le prêtre le déclarera pur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '»Lorsqu''un homme aura eu sur la peau une brûlure par le feu et qu''apparaîtra sur la trace de la brûlure une tache blanche ou d''un blanc rougeâtre, le prêtre l''examinera. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Si le poil est devenu blanc dans la tache et qu''elle paraisse former un creux dans la peau, c''est la lèpre qui a fait éruption dans la brûlure. Le prêtre déclarera cet homme impur. C''est une plaie de lèpre. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Si le prêtre voit qu''il n''y a pas de poil blanc dans la tache, qu''elle ne forme pas de creux dans la peau et qu''elle est devenue pâle, il enfermera cet homme pendant 7 jours. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Le prêtre l''examinera le septième jour. Si la tache s''est étendue sur la peau, il le déclarera impur. C''est une plaie de lèpre. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Mais si la tache est restée à la même place, ne s'est pas étendue sur la peau et est devenue pâle, c'est la boursouflure de la brûlure. Le prêtre le déclarera pur, car c'est la cicatrice de la brûlure.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '»Lorsqu''un homme ou une femme aura une plaie à la tête ou au menton, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'le prêtre examinera la plaie. Si elle paraît former un creux dans la peau et qu''il y ait du poil jaunâtre et mince, le prêtre déclarera cette personne impure. C''est la teigne, la lèpre de la tête ou du menton. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Si le prêtre voit que la plaie de la teigne ne paraît pas former un creux dans la peau et qu''il n''y a pas de poil noir, il enfermera pendant 7 jours celui qui a la plaie de la teigne. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Le prêtre examinera la plaie le septième jour. Si la teigne ne s''est pas étendue, s''il n''y a pas de poil jaunâtre et si elle ne paraît pas former un creux dans la peau, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'celui qui a la teigne se rasera, mais il ne rasera pas la place où est la teigne. Le prêtre l''enfermera une deuxième fois pendant 7 jours. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Le prêtre examinera la teigne le septième jour. Si la teigne ne s''est pas étendue sur la peau et si elle ne paraît pas former un creux dans la peau, le prêtre le déclarera pur. L''homme lavera ses vêtements et il sera pur. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Mais si la teigne s''est étendue sur la peau après qu''il a été déclaré pur, le prêtre l''examinera. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Et si la teigne s''est étendue sur la peau, le prêtre n''aura pas à rechercher s''il y a du poil jaunâtre: l''homme est impur. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Si la teigne lui paraît ne pas avoir fait de progrès et que du poil noir ait poussé, la teigne est guérie. L'homme est pur et le prêtre le déclarera pur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: '»Lorsqu''un homme ou une femme aura sur la peau des taches, des taches blanches, '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: le prêtre l'examinera. S'il y a sur la peau des taches d'un blanc pâle, ce ne sont que des taches qui ont fait éruption sur la peau. La personne est pure.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: '»Lorsqu''un homme perd ses cheveux, c''est un chauve. Il est pur. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'S''il perd ses cheveux du côté du visage, c''est un chauve par-devant. Il est pur. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Mais s''il y a dans la partie chauve de devant ou de derrière une plaie d''un blanc rougeâtre, c''est la lèpre qui a fait éruption dans cette partie chauve. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Le prêtre l''examinera. Si, dans la partie chauve de derrière ou de devant, la plaie forme une grosseur d''un blanc rougeâtre, semblable à la lèpre sur la peau du corps, '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: c'est un homme lépreux, il est impur. Le prêtre le déclarera impur. Sa plaie est à la tête.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: '»Le lépreux atteint de la plaie portera des vêtements déchirés et aura la tête nue; il se couvrira la barbe et criera: ‘Impur! Impur!’ '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Aussi longtemps qu'il aura la plaie, il sera impur. Il est impur. Il habitera seul et sa tente sera à l'extérieur du camp.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La lèpre des vêtements
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: '»Lorsqu''il y aura sur un vêtement une plaie de lèpre – qu''il s''agisse d''un vêtement de laine ou de lin, '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'd''une chaîne ou d''une trame de lin ou de laine, d''une peau ou d''un objet en cuir – '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'et que la plaie sera verdâtre ou rougeâtre sur le vêtement ou sur la peau, dans la chaîne ou la trame, ou sur n''importe quel objet en cuir, c''est une plaie de lèpre et on la montrera au prêtre. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Le prêtre examinera la plaie et enfermera pendant 7 jours ce qui en est attaqué. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Il examinera la plaie le septième jour. Si la plaie s''est étendue sur le vêtement, dans la chaîne ou la trame, sur la peau ou l''objet en cuir, c''est une plaie de lèpre durable. L''objet est impur. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Le prêtre brûlera le vêtement, la chaîne ou la trame de laine ou de lin, l''objet en cuir sur lequel se trouve la plaie, car c''est une lèpre durable. On brûlera l''objet au feu. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Mais si le prêtre voit que la plaie ne s''est pas étendue sur le vêtement, la chaîne, la trame ou l''objet en cuir, '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'il ordonnera de laver ce qui est attaqué de la plaie et il l''enfermera une deuxième fois pendant 7 jours. '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Le prêtre examinera la plaie après qu''elle aura été lavée. Si la plaie n''a pas changé d''aspect et ne s''est pas étendue, l''objet est impur. On le brûlera au feu; c''est une partie de l''endroit ou de l''envers qui a été rongée. '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Si le prêtre voit que la plaie est devenue pâle une fois lavée, il l''arrachera du vêtement ou de la peau, de la chaîne ou de la trame. '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Si elle paraît encore sur le vêtement, la chaîne, la trame ou l''objet en cuir, c''est une éruption de lèpre: on brûlera au feu ce qui est attaqué de la plaie. '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: Le vêtement, la chaîne, la trame ou l'objet en cuir qui a été lavé et d'où la plaie a disparu sera lavé une deuxième fois et il sera pur.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: Telle est la loi sur la plaie de la lèpre, lorsqu'elle attaque les vêtements de laine ou de lin, la chaîne ou la trame, ou n'importe quel objet en cuir. C'est d'après cette loi qu'on les déclarera purs ou impurs.
