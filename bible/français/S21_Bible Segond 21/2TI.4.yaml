document_id: 2TI.4,152
type_code: fra
verses:
  '1':
  - type: text
    content: '[C''est pourquoi] je t''en supplie, devant Dieu et devant [le Seigneur] Jésus-Christ qui doit juger les vivants et les morts au moment de sa venue et de son règne: '
  '10':
  - type: text
    content: 'car Démas m''a abandonné par amour pour le monde présent et il est parti pour Thessalonique, tandis que Crescens est allé en Galatie et Tite en Dalmatie. '
  '11':
  - type: text
    content: 'Luc seul est avec moi. Prends Marc et amène-le avec toi, car il m''est utile pour le ministère. '
  '12':
  - type: text
    content: 'Par ailleurs, j''ai envoyé Tychique à Ephèse. '
  '13':
  - type: text
    content: Quand tu viendras, rapporte-moi le manteau que j'ai laissé à Troas chez Carpus et les livres, surtout les parchemins.
  '14':
  - type: text
    content: 'Alexandre, le forgeron, m''a fait beaucoup de mal. '
  - type: text
    content: Le Seigneur le traitera conformément à ses actes
  - type: text
    content: .
  - type: note
    content: 'Le Seigneur… actes: citation du Psaume 62.13; principe présent aussi au Psaume 28.4 et en Proverbes 24.12.'
  - type: text
    content: ' '
  '15':
  - type: text
    content: Méfie-toi aussi de lui, car il s'est fortement opposé à nos paroles.
  '16':
  - type: text
    content: 'La première fois que j''ai présenté ma défense, personne ne m''a soutenu, tous m''ont au contraire abandonné. Qu''il ne leur en soit pas tenu compte! '
  '17':
  - type: text
    content: 'C''est le Seigneur qui m''a soutenu et fortifié afin que, par mon intermédiaire, le message soit pleinement proclamé et entendu de toutes les nations; c''est ainsi que j''ai été délivré de la gueule du lion. '
  '18':
  - type: text
    content: Le Seigneur me délivrera de toute œuvre mauvaise et me sauvera pour me faire entrer dans son royaume céleste. A lui soit la gloire aux siècles des siècles! Amen!
  '19':
  - type: text
    content: 'Salue Prisca et Aquilas ainsi que la famille d''Onésiphore. '
  '2':
  - type: text
    content: 'prêche la parole, insiste en toute occasion, qu''elle soit favorable ou non, réfute, reprends et encourage. Fais tout cela avec une pleine patience et un entier souci d''instruire. '
  '20':
  - type: text
    content: 'Eraste est resté à Corinthe et j''ai laissé Trophime malade à Milet. '
  '21':
  - type: text
    content: Tâche de venir avant l'hiver. Eubulus, Pudens, Linus, Claudia et tous les frères et sœurs te saluent.
  '22':
  - type: text
    content: Que le Seigneur [Jésus-Christ] soit avec ton esprit! Que la grâce soit avec vous!
  '3':
  - type: text
    content: 'En effet, un temps viendra où les hommes ne supporteront pas la saine doctrine. Au contraire, ayant la démangeaison d''entendre des choses agréables, ils se donneront une foule d''enseignants conformes à leurs propres désirs. '
  '4':
  - type: text
    content: 'Ils détourneront l''oreille de la vérité et se tourneront vers les fables. '
  '5':
  - type: text
    content: Mais toi, sois sobre en tout, supporte les souffrances, accomplis la tâche d'un évangéliste, remplis bien ton ministère.
  '6':
  - type: text
    content: 'Pour ma part, en effet, je suis déjà comme sacrifié et le moment de mon départ approche. '
  '7':
  - type: text
    content: 'J''ai combattu le bon combat, j''ai terminé la course, j''ai gardé la foi. '
  '8':
  - type: text
    content: Désormais, la couronne de justice m'est réservée. Le Seigneur, le juste juge, me la remettra ce jour-là
  - type: note
    content: 'Ce jour-là: c''est-à-dire le jour du jugement et des récompenses.'
  - type: text
    content: ', et non seulement à moi, mais aussi à tous ceux qui auront attendu avec amour sa venue.'
  - type: heading
    content: Dernières informations et salutations
  '9':
  - type: text
    content: 'Tâche de me rejoindre au plus vite, '
