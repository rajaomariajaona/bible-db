document_id: 2TI.4,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '[C''est pourquoi] je t''en supplie, devant Dieu et devant [le Seigneur] Jésus-Christ qui doit juger les vivants et les morts au moment de sa venue et de son règne: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'car Démas m''a abandonné par amour pour le monde présent et il est parti pour Thessalonique, tandis que Crescens est allé en Galatie et Tite en Dalmatie. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Luc seul est avec moi. Prends Marc et amène-le avec toi, car il m''est utile pour le ministère. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Par ailleurs, j''ai envoyé Tychique à Ephèse. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Quand tu viendras, rapporte-moi le manteau que j'ai laissé à Troas chez Carpus et les livres, surtout les parchemins.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Alexandre, le forgeron, m''a fait beaucoup de mal. '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Le Seigneur le traitera conformément à ses actes
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le Seigneur… actes: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 62.13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; principe présent aussi au '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 28.4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' et en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Proverbes 24.12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Méfie-toi aussi de lui, car il s'est fortement opposé à nos paroles.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'La première fois que j''ai présenté ma défense, personne ne m''a soutenu, tous m''ont au contraire abandonné. Qu''il ne leur en soit pas tenu compte! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'C''est le Seigneur qui m''a soutenu et fortifié afin que, par mon intermédiaire, le message soit pleinement proclamé et entendu de toutes les nations; c''est ainsi que j''ai été délivré de la gueule du lion. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Le Seigneur me délivrera de toute œuvre mauvaise et me sauvera pour me faire entrer dans son royaume céleste. A lui soit la gloire aux siècles des siècles! Amen!
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Salue Prisca et Aquilas ainsi que la famille d''Onésiphore. '
  '2':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'prêche la parole, insiste en toute occasion, qu''elle soit favorable ou non, réfute, reprends et encourage. Fais tout cela avec une pleine patience et un entier souci d''instruire. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Eraste est resté à Corinthe et j''ai laissé Trophime malade à Milet. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Tâche de venir avant l'hiver. Eubulus, Pudens, Linus, Claudia et tous les frères et sœurs te saluent.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Que le Seigneur [Jésus-Christ] soit avec ton esprit! Que la grâce soit avec vous!
  '3':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'En effet, un temps viendra où les hommes ne supporteront pas la saine doctrine. Au contraire, ayant la démangeaison d''entendre des choses agréables, ils se donneront une foule d''enseignants conformes à leurs propres désirs. '
  '4':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ils détourneront l''oreille de la vérité et se tourneront vers les fables. '
  '5':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mais toi, sois sobre en tout, supporte les souffrances, accomplis la tâche d'un évangéliste, remplis bien ton ministère.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Pour ma part, en effet, je suis déjà comme sacrifié et le moment de mon départ approche. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'J''ai combattu le bon combat, j''ai terminé la course, j''ai gardé la foi. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Désormais, la couronne de justice m'est réservée. Le Seigneur, le juste juge, me la remettra ce jour-là
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ce jour-là: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire le jour du jugement et des récompenses.
      marker-yv: yv-n
    - type: text
      text: ', et non seulement à moi, mais aussi à tous ceux qui auront attendu avec amour sa venue.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dernières informations et salutations
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Tâche de me rejoindre au plus vite, '
