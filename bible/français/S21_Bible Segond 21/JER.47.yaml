document_id: JER.47,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie sur les Philistins
  - type: text
    content: Voici la parole de l'Eternel adressée au prophète Jérémie à propos des Philistins avant que le pharaon ne se soit attaqué à Gaza.
  '2':
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: De l'eau monte du nord,
  - type: text
    content: elle se transforme en torrent qui déborde.
  - type: text
    content: Elle va inonder le pays et ce qu'il contient,
  - type: text
    content: les villes et leurs habitants.
  - type: text
    content: Les hommes pousseront des cris,
  - type: text
    content: tous les habitants du pays hurleront
  '3':
  - type: text
    content: à cause du fracas que feront les sabots de ses puissants chevaux,
  - type: text
    content: à cause du tremblement de terre provoqué par ses chars et du vacarme de leurs roues.
  - type: text
    content: Les pères ne feront plus attention à leurs enfants,
  - type: text
    content: tant ils manqueront de force.
  '4':
  - type: text
    content: En effet, le jour arrive où tous les Philistins vont connaître la dévastation.
  - type: text
    content: Ils seront éliminés de Tyr et de Sidon,
  - type: text
    content: tous les survivants qui auraient pu les secourir,
  - type: text
    content: car l'Eternel va semer la dévastation
  - type: text
    content: parmi les Philistins, parmi ce qui reste de l'île de Caphtor.
  '5':
  - type: text
    content: Gaza est tondue,
  - type: text
    content: Askalon est réduite au silence.
  - type: text
    content: Vous, les rescapés de leur plaine,
  - type: text
    content: jusqu'à quand vous ferez-vous des incisions?
  '6':
  - type: text
    content: Epée de l'Eternel, quand te reposeras-tu enfin?
  - type: text
    content: Rentre dans ton fourreau et reste tranquille!
  '7':
  - type: text
    content: Comment te reposerais-tu?
  - type: text
    content: L'Eternel lui a donné ses ordres,
  - type: text
    content: là-bas, il lui a désigné Askalon et le rivage de la mer.
