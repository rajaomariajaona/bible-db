document_id: JER.47
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie sur les Philistins
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici la parole de l'Eternel adressée au prophète Jérémie à propos des Philistins avant que le pharaon ne se soit attaqué à Gaza.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: De l'eau monte du nord,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle se transforme en torrent qui déborde.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle va inonder le pays et ce qu'il contient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les villes et leurs habitants.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les hommes pousseront des cris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les habitants du pays hurleront
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: à cause du fracas que feront les sabots de ses puissants chevaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause du tremblement de terre provoqué par ses chars et du vacarme de leurs roues.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les pères ne feront plus attention à leurs enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tant ils manqueront de force.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: En effet, le jour arrive où tous les Philistins vont connaître la dévastation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils seront éliminés de Tyr et de Sidon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les survivants qui auraient pu les secourir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car l'Eternel va semer la dévastation
- type: usfm
  marker: q1
  children:
  - type: text
    text: parmi les Philistins, parmi ce qui reste de l'île de Caphtor.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Gaza est tondue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Askalon est réduite au silence.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous, les rescapés de leur plaine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu'à quand vous ferez-vous des incisions?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Epée de l'Eternel, quand te reposeras-tu enfin?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rentre dans ton fourreau et reste tranquille!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Comment te reposerais-tu?
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Eternel lui a donné ses ordres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: là-bas, il lui a désigné Askalon et le rivage de la mer.
