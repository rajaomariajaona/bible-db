document_id: JAS.5
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A vous maintenant, les riches! Pleurez et gémissez à cause des malheurs qui viendront sur vous! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Vos richesses sont pourries et vos vêtements sont rongés par les mites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Votre or et votre argent sont rouillés, et leur rouille s''élèvera en témoignage contre vous et dévorera votre chair comme un feu. Vous avez amassé des trésors dans les derniers jours! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le salaire des ouvriers qui ont moissonné vos champs et dont vous les avez frustrés crie, et les cris des moissonneurs sont parvenus jusqu''aux oreilles du Seigneur de l''univers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Vous avez vécu sur la terre dans les plaisirs et dans le luxe, vous avez rassasié votre cœur [comme] le jour de la boucherie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Vous avez condamné, tué le juste sans qu'il vous résiste.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Appel à la patience et à la foi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Soyez donc patients, frères et sœurs, jusqu''au retour du Seigneur. Voyez le cultivateur: il attend le précieux fruit de la terre en faisant preuve de patience envers lui jusqu''à ce qu''il ait reçu les premières et les dernières pluies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Vous aussi, soyez patients, affermissez votre cœur, car le retour du Seigneur est proche.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ne vous plaignez pas les uns des autres, frères et sœurs, afin de ne pas être jugés. Voici que le juge se tient à la porte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mes frères et sœurs, prenez pour modèles de patience dans la souffrance les prophètes qui ont parlé au nom du Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nous disons heureux ceux qui persévèrent. Vous avez entendu parler de la persévérance de Job et vous avez vu la fin que le Seigneur lui a accordée, car le Seigneur est plein de tendresse et de compassion.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Avant tout, mes frères et sœurs, ne jurez pas, que ce soit par le ciel, par la terre ou par une autre forme de serment. Mais que votre oui soit oui, et que votre non soit non, afin que vous ne tombiez pas sous le jugement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quelqu''un parmi vous est-il dans la souffrance? Qu''il prie. Quelqu''un est-il dans la joie? Qu''il chante des cantiques. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Quelqu''un parmi vous est-il malade? Qu''il appelle les anciens de l''Eglise et que les anciens prient pour lui en lui appliquant de l''huile au nom du Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: La prière de la foi sauvera le malade et le Seigneur le relèvera. S'il a commis des péchés, le pardon lui sera accordé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Avouez-vous [donc] vos fautes les uns aux autres et priez les uns pour les autres afin d''être guéris. La prière du juste agit avec une grande force. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Elie était un homme de la même nature que nous. Il a prié avec insistance pour qu''il ne pleuve pas et il n''est pas tombé de pluie sur la terre pendant 3 ans et 6 mois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Puis il a de nouveau prié, et le ciel a donné de la pluie et la terre a produit son fruit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Mes frères et sœurs, si quelqu''un parmi vous s''est égaré loin de la vérité et qu''un autre l''y ramène, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: sachez que celui qui ramènera un pécheur de la voie où il s'était égaré sauvera une âme de la mort et couvrira une foule de péchés.
