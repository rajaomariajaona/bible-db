document_id: 1SA.26
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Saül encore épargné par David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les Ziphiens allèrent trouver Saül à Guibea et dirent: «David n''est-il pas caché sur la colline de Hakila, en face du désert?» '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Saül se leva et descendit au désert de Ziph, avec 3000 hommes choisis dans l''élite d''Israël, pour chercher David dans le désert de Ziph. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il installa son camp sur la colline de Hakila, en face du désert, près du chemin. David était dans le désert. Quand il s''aperçut que Saül marchait à sa poursuite dans le désert, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'il envoya des espions et sut ainsi avec certitude que Saül était arrivé. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Alors David se leva, vint à l'endroit où Saül campait et vit la place où il couchait en compagnie d'Abner, fils de Ner et chef de son armée. Saül couchait au milieu du camp et le peuple campait autour de lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'David prit la parole et s''adressa à Achimélec, le Hittite, et à Abishaï, fils de Tseruja et frère de Joab. Il leur dit: «Qui veut descendre avec moi dans le camp vers Saül?» Abishaï répondit: «Moi, je descendrai avec toi.» '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'David et Abishaï se rendirent de nuit vers la troupe. Saül était couché et dormait au milieu du camp, et sa lance était fichée en terre près de sa tête. Abner et le reste de la troupe étaient couchés autour de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Abishaï dit à David: «Dieu livre aujourd''hui ton ennemi entre tes mains. Laisse-moi donc le frapper avec ma lance. Je le clouerai à terre d''un seul coup, je n''aurai pas à m''y reprendre à deux fois.» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais David dit à Abishaï: «Ne le supprime pas! En effet, qui pourrait impunément porter la main contre celui que l''Eternel a désigné par onction?» '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'David ajouta: «L''Eternel est vivant! C''est à l''Eternel seul de le frapper, soit que son jour soit venu et qu''il meure, soit qu''il descende sur un champ de bataille et qu''il y soit supprimé. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Certes, par l''Eternel, je ne me risquerai pas à porter la main contre celui que l''Eternel a désigné par onction! Prends seulement la lance qui est près de sa tête, ainsi que la cruche d''eau, et allons-nous-en.» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: David prit donc la lance et la cruche d'eau qui étaient près de la tête de Saül, et ils s'en allèrent. Personne ne les vit ni ne s'aperçut de rien, et personne ne se réveilla. Ils dormaient tous d'un profond sommeil, parce que l'Eternel les y avait plongés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'David passa de l''autre côté et s''arrêta au loin sur le sommet de la montagne, à une grande distance du camp. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Puis il cria à la troupe et à Abner, fils de Ner: «Vas-tu répondre, Abner?» Abner répondit: «Qui es-tu, toi qui pousses des cris vers le roi?» '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'David dit à Abner: «N''es-tu pas un homme? Et qui est ton pareil en Israël? Pourquoi donc n''as-tu pas gardé le roi, ton maître? En effet, quelqu''un du peuple est venu pour tuer le roi, ton maître. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ce que tu as fait là n'est pas bien. L'Eternel est vivant! Vous méritez la mort pour n'avoir pas veillé sur votre maître, sur celui que l'Eternel a désigné par onction. Regarde maintenant où sont la lance du roi et la cruche d'eau qui étaient près de sa tête!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Saül reconnut la voix de David et dit: «Est-ce bien ta voix, mon fils David?» David répondit: «C''est ma voix, roi, mon seigneur!» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Puis il ajouta: «Pourquoi mon seigneur poursuit-il son serviteur? Qu''ai-je fait et de quoi suis-je coupable? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Que le roi, mon seigneur, veuille maintenant écouter les paroles de son serviteur! Si c''est l''Eternel qui te pousse à agir contre moi, qu''il veuille bien accepter le parfum d''une offrande. Mais si ce sont des hommes, qu''ils soient maudits devant l''Eternel, puisqu''ils me chassent aujourd''hui pour m''exclure de l''héritage de l''Eternel en me disant: ‘Va servir des dieux étrangers!’ '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Oh! Que mon sang ne tombe pas en terre loin de l'Eternel! Le roi d'Israël s'est mis en marche pour chercher une puce, comme on chasserait une perdrix dans les montagnes.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Saül dit: «J''ai péché. Reviens, mon fils David! Je ne te ferai plus de mal, puisqu''aujourd''hui ma vie a été précieuse à tes yeux. Je me suis comporté de façon stupide et j''ai commis une grande faute.» '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'David répondit: «Voici la lance du roi. Que l''un de tes hommes vienne la prendre. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'L''Eternel traitera chacun en fonction de sa justice et sa fidélité. En effet, il t''avait livré aujourd''hui entre mes mains et je n''ai pas voulu porter la main sur celui que l''Eternel a désigné par onction. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tout comme aujourd''hui ta vie a eu beaucoup de valeur à mes yeux, ma vie aura beaucoup de valeur aux yeux de l''Eternel et il me délivrera de toute détresse.» '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Saül dit à David: «Sois béni, mon fils David! Tu réussiras dans tes entreprises.» David poursuivit son chemin et Saül retourna chez lui.'
