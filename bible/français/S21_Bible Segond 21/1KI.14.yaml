document_id: 1KI.14
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A cette époque-là, Abija, le fils de Jéroboam, tomba malade. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jéroboam dit alors à sa femme: «Lève-toi donc et déguise-toi pour qu''on ne sache pas que tu es ma femme, puis va à Silo. C''est là que se trouve Achija, le prophète qui m''a dit que je serais roi de ce peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Prends avec toi dix pains, des gâteaux et un pot de miel et entre chez lui. Il t''annoncera ce qui arrivera à notre enfant.» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: C'est ce que fit la femme de Jéroboam. Elle se leva, alla à Silo et entra dans la maison d'Achija. Celui-ci ne pouvait plus voir, car il avait le regard fixe par suite de la vieillesse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L''Eternel avait dit à Achija: «La femme de Jéroboam va venir te consulter au sujet de son fils, parce qu''il est malade. Tu lui parleras de telle et telle manière. Quand elle arrivera, elle se fera passer pour une autre.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Lorsque Achija entendit le bruit de ses pas, au moment où elle franchissait la porte, il dit: «Entre, femme de Jéroboam! Pourquoi veux-tu te faire passer pour une autre? Je suis chargé de t''annoncer des choses dures. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Va dire à Jéroboam: ‘Voici ce que dit l''Eternel, le Dieu d''Israël: Je t''ai tiré du milieu du peuple, je t''ai établi chef de mon peuple, d''Israël, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'j''ai arraché ce royaume à la famille de David et je te l''ai donné. Pourtant, tu n''as pas imité mon serviteur David, qui respectait mes commandements et qui me suivait de tout son cœur, ne faisant que ce qui est droit à mes yeux. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tu as agi plus mal que tous tes prédécesseurs: tu es allé te fabriquer des dieux étrangers, des idoles en métal fondu, pour m''irriter et tu m''as rejeté! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Voilà pourquoi je vais faire venir le malheur sur la famille de Jéroboam. Je vais exterminer tout homme qui t''appartient, qu''il soit esclave ou libre en Israël, et je vais balayer ta famille comme on le fait pour des ordures, jusqu''à ce qu''elle ait disparu. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le membre de la famille de Jéroboam qui mourra dans la ville sera mangé par les chiens, et celui qui mourra dans les champs sera mangé par les oiseaux. Oui, l''Eternel a parlé.’ '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Quant à toi, lève-toi, retourne chez toi. Dès que tu mettras les pieds dans la ville, l''enfant mourra. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tout Israël le pleurera et on l''enterrera. Oui, il est le seul de la famille de Jéroboam qui sera déposé dans un tombeau, parce qu''il est le seul de cette famille en qui l''on trouve quelque chose de bon devant l''Eternel, le Dieu d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'L''Eternel va faire surgir sur Israël un roi qui exterminera la famille de Jéroboam. Ce jour est là. Et n''est-ce pas déjà ce qui arrive? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L''Eternel va frapper Israël et il connaîtra le même sort que le roseau ballotté par l''eau: il va arracher Israël de ce bon territoire qu''il avait donné à leurs ancêtres et les disperser de l''autre côté de l''Euphrate, parce qu''ils se sont fabriqué des idoles, irritant ainsi l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il va abandonner Israël à cause des péchés que Jéroboam a commis et qu'il a fait commettre à Israël.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'La femme de Jéroboam se leva et repartit pour Thirtsa. Au moment où elle atteignit le seuil du palais, l''enfant mourut. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: On l'enterra et tout Israël le pleura, conformément à la parole que l'Eternel avait dite par l'intermédiaire de son serviteur, le prophète Achija.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Le reste des actes de Jéroboam, la manière dont il a fait la guerre et a régné, cela est décrit dans les annales des rois d'Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Jéroboam régna 22 ans, puis il se coucha avec ses ancêtres. Son fils Nadab devint roi à sa place.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne de Roboam sur Juda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Roboam, le fils de Salomon, régna sur Juda. Il avait 41 ans lorsqu'il devint roi et il régna 17 ans à Jérusalem, la ville que l'Eternel avait choisie de préférence à toutes les tribus d'Israël pour y établir son nom. Sa mère s'appelait Naama et c'était une Ammonite.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les Judéens firent ce qui est mal aux yeux de l''Eternel et, par les péchés qu''ils commirent, ils excitèrent sa jalousie plus que l''avaient fait leurs ancêtres. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ils se construisirent, eux aussi, des hauts lieux avec des statues et des poteaux sacrés sur toute colline élevée et sous tout arbre vert. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Il y eut même des prostitués
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Prostitués: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: le terme désigne spécifiquement des prostitués (de sexe masculin) sacrés, associés aux rites de fertilité des cultes idolâtriques cananéens.
    marker-yv: yv-n
  - type: text
    text: ' dans le pays. Ils imitèrent toutes les pratiques abominables des nations que l''Eternel avait dépossédées devant les Israélites.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'La cinquième année du règne de Roboam, Shishak, le roi d''Egypte, monta contre Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il prit les trésors de la maison de l''Eternel et ceux du palais royal, il prit tout. Il prit tous les boucliers en or que Salomon avait faits. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Le roi Roboam fabriqua à leur place des boucliers en bronze et il en confia la responsabilité aux chefs des gardes qui surveillaient l''entrée du palais. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Chaque fois que le roi se rendait à la maison de l'Eternel, les gardes les portaient. Puis ils les rapportaient dans la salle des gardes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Le reste des actes de Roboam, tout ce qu'il a accompli, cela est décrit dans les annales des rois de Juda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Il y eut toujours guerre entre Roboam et Jéroboam.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Roboam se coucha avec ses ancêtres et il fut enterré à leurs côtés dans la ville de David. Sa mère s'appelait Naama et c'était une Ammonite. Son fils Abijam devint roi à sa place.
