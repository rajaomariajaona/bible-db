document_id: 1KI.14,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'A cette époque-là, Abija, le fils de Jéroboam, tomba malade. '
  '10':
  - type: text
    content: 'Voilà pourquoi je vais faire venir le malheur sur la famille de Jéroboam. Je vais exterminer tout homme qui t''appartient, qu''il soit esclave ou libre en Israël, et je vais balayer ta famille comme on le fait pour des ordures, jusqu''à ce qu''elle ait disparu. '
  '11':
  - type: text
    content: 'Le membre de la famille de Jéroboam qui mourra dans la ville sera mangé par les chiens, et celui qui mourra dans les champs sera mangé par les oiseaux. Oui, l''Eternel a parlé.’ '
  '12':
  - type: text
    content: 'Quant à toi, lève-toi, retourne chez toi. Dès que tu mettras les pieds dans la ville, l''enfant mourra. '
  '13':
  - type: text
    content: 'Tout Israël le pleurera et on l''enterrera. Oui, il est le seul de la famille de Jéroboam qui sera déposé dans un tombeau, parce qu''il est le seul de cette famille en qui l''on trouve quelque chose de bon devant l''Eternel, le Dieu d''Israël. '
  '14':
  - type: text
    content: 'L''Eternel va faire surgir sur Israël un roi qui exterminera la famille de Jéroboam. Ce jour est là. Et n''est-ce pas déjà ce qui arrive? '
  '15':
  - type: text
    content: 'L''Eternel va frapper Israël et il connaîtra le même sort que le roseau ballotté par l''eau: il va arracher Israël de ce bon territoire qu''il avait donné à leurs ancêtres et les disperser de l''autre côté de l''Euphrate, parce qu''ils se sont fabriqué des idoles, irritant ainsi l''Eternel. '
  '16':
  - type: text
    content: Il va abandonner Israël à cause des péchés que Jéroboam a commis et qu'il a fait commettre à Israël.»
  '17':
  - type: text
    content: 'La femme de Jéroboam se leva et repartit pour Thirtsa. Au moment où elle atteignit le seuil du palais, l''enfant mourut. '
  '18':
  - type: text
    content: On l'enterra et tout Israël le pleura, conformément à la parole que l'Eternel avait dite par l'intermédiaire de son serviteur, le prophète Achija.
  '19':
  - type: text
    content: Le reste des actes de Jéroboam, la manière dont il a fait la guerre et a régné, cela est décrit dans les annales des rois d'Israël.
  '2':
  - type: text
    content: 'Jéroboam dit alors à sa femme: «Lève-toi donc et déguise-toi pour qu''on ne sache pas que tu es ma femme, puis va à Silo. C''est là que se trouve Achija, le prophète qui m''a dit que je serais roi de ce peuple. '
  '20':
  - type: text
    content: Jéroboam régna 22 ans, puis il se coucha avec ses ancêtres. Son fils Nadab devint roi à sa place.
  - type: heading
    content: Règne de Roboam sur Juda
  '21':
  - type: text
    content: Roboam, le fils de Salomon, régna sur Juda. Il avait 41 ans lorsqu'il devint roi et il régna 17 ans à Jérusalem, la ville que l'Eternel avait choisie de préférence à toutes les tribus d'Israël pour y établir son nom. Sa mère s'appelait Naama et c'était une Ammonite.
  '22':
  - type: text
    content: 'Les Judéens firent ce qui est mal aux yeux de l''Eternel et, par les péchés qu''ils commirent, ils excitèrent sa jalousie plus que l''avaient fait leurs ancêtres. '
  '23':
  - type: text
    content: 'Ils se construisirent, eux aussi, des hauts lieux avec des statues et des poteaux sacrés sur toute colline élevée et sous tout arbre vert. '
  '24':
  - type: text
    content: Il y eut même des prostitués
  - type: note
    content: 'Prostitués: le terme désigne spécifiquement des prostitués (de sexe masculin) sacrés, associés aux rites de fertilité des cultes idolâtriques cananéens.'
  - type: text
    content: ' dans le pays. Ils imitèrent toutes les pratiques abominables des nations que l''Eternel avait dépossédées devant les Israélites.'
  '25':
  - type: text
    content: 'La cinquième année du règne de Roboam, Shishak, le roi d''Egypte, monta contre Jérusalem. '
  '26':
  - type: text
    content: 'Il prit les trésors de la maison de l''Eternel et ceux du palais royal, il prit tout. Il prit tous les boucliers en or que Salomon avait faits. '
  '27':
  - type: text
    content: 'Le roi Roboam fabriqua à leur place des boucliers en bronze et il en confia la responsabilité aux chefs des gardes qui surveillaient l''entrée du palais. '
  '28':
  - type: text
    content: Chaque fois que le roi se rendait à la maison de l'Eternel, les gardes les portaient. Puis ils les rapportaient dans la salle des gardes.
  '29':
  - type: text
    content: Le reste des actes de Roboam, tout ce qu'il a accompli, cela est décrit dans les annales des rois de Juda.
  '3':
  - type: text
    content: 'Prends avec toi dix pains, des gâteaux et un pot de miel et entre chez lui. Il t''annoncera ce qui arrivera à notre enfant.» '
  '30':
  - type: text
    content: Il y eut toujours guerre entre Roboam et Jéroboam.
  '31':
  - type: text
    content: Roboam se coucha avec ses ancêtres et il fut enterré à leurs côtés dans la ville de David. Sa mère s'appelait Naama et c'était une Ammonite. Son fils Abijam devint roi à sa place.
  '4':
  - type: text
    content: C'est ce que fit la femme de Jéroboam. Elle se leva, alla à Silo et entra dans la maison d'Achija. Celui-ci ne pouvait plus voir, car il avait le regard fixe par suite de la vieillesse.
  '5':
  - type: text
    content: 'L''Eternel avait dit à Achija: «La femme de Jéroboam va venir te consulter au sujet de son fils, parce qu''il est malade. Tu lui parleras de telle et telle manière. Quand elle arrivera, elle se fera passer pour une autre.»'
  '6':
  - type: text
    content: 'Lorsque Achija entendit le bruit de ses pas, au moment où elle franchissait la porte, il dit: «Entre, femme de Jéroboam! Pourquoi veux-tu te faire passer pour une autre? Je suis chargé de t''annoncer des choses dures. '
  '7':
  - type: text
    content: 'Va dire à Jéroboam: ‘Voici ce que dit l''Eternel, le Dieu d''Israël: Je t''ai tiré du milieu du peuple, je t''ai établi chef de mon peuple, d''Israël, '
  '8':
  - type: text
    content: 'j''ai arraché ce royaume à la famille de David et je te l''ai donné. Pourtant, tu n''as pas imité mon serviteur David, qui respectait mes commandements et qui me suivait de tout son cœur, ne faisant que ce qui est droit à mes yeux. '
  '9':
  - type: text
    content: 'Tu as agi plus mal que tous tes prédécesseurs: tu es allé te fabriquer des dieux étrangers, des idoles en métal fondu, pour m''irriter et tu m''as rejeté! '
