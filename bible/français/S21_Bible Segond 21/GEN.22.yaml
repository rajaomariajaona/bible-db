document_id: GEN.22
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mise à l'épreuve d'Abraham
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Après cela, Dieu mit Abraham à l''épreuve. Il lui dit: «Abraham!» Celui-ci répondit: «Me voici!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Dieu dit: «Prends ton fils unique, celui que tu aimes, Isaac. Va-t''en au pays de Morija et là offre-le en holocauste sur l''une des montagnes que je t''indiquerai.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Abraham se leva de bon matin, sella son âne et prit avec lui deux serviteurs et son fils Isaac. Il fendit du bois pour l''holocauste et partit pour aller à l''endroit que Dieu lui avait indiqué. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le troisième jour, Abraham leva les yeux et vit l''endroit de loin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il dit à ses serviteurs: «Restez ici avec l''âne. Le jeune homme et moi, nous irons jusque là-bas pour adorer, puis nous reviendrons vers vous.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Abraham prit le bois pour l''holocauste, le chargea sur son fils Isaac et porta lui-même le feu et le couteau. Ils marchèrent tous les deux ensemble. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors Isaac s''adressa à son père Abraham en disant: «Mon père!» Il répondit: «Me voici, mon fils!» Isaac reprit: «Voici le feu et le bois, mais où se trouve l''agneau pour l''holocauste?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Abraham répondit: «Mon fils, Dieu pourvoira lui-même à l''agneau pour l''holocauste.» Et ils continuèrent à marcher tous les deux ensemble.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Lorsqu''ils furent arrivés à l''endroit que Dieu lui avait indiqué, Abraham y construisit un autel et rangea le bois. Il attacha son fils Isaac et le mit sur l''autel par-dessus le bois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Puis Abraham tendit la main et prit le couteau pour égorger son fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors l''ange de l''Eternel l''appela depuis le ciel et dit: «Abraham! Abraham!» Il répondit: «Me voici!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L''ange dit: «Ne porte pas la main sur l''enfant et ne lui fais rien, car je sais maintenant que tu crains Dieu et que tu ne m''as pas refusé ton fils unique.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Abraham leva les yeux et vit [derrière lui] un bélier retenu par les cornes dans un buisson. Il alla prendre le bélier et l''offrit en holocauste à la place de son fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Abraham donna à cet endroit le nom de Yahvé-Jiré
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Yahvé-Jiré: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: littéralement l'Eternel pourvoit (ou voit).
    marker-yv: yv-n
  - type: text
    text: '. C''est pourquoi l''on dit aujourd''hui: «A la montagne de l''Eternel il sera pourvu.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'L''ange de l''Eternel appela une deuxième fois Abraham depuis le ciel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il dit: «*Je le jure par moi-même – déclaration de l''Eternel –, parce que tu as fait cela et que tu n''as pas refusé ton fils unique, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: je te bénirai et je multiplierai ta descendance
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.16-17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je le jure… descendance: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité partiellement en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hébreux 6.13-14
      metadata:
        usfm: HEB.6.13+HEB.6.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ': elle sera *aussi nombreuse que les étoiles du ciel, pareille au sable qui est au bord de la mer'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Aussi… mer: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hébreux 11.12
      metadata:
        usfm: HEB.11.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. De plus, ta descendance possédera les villes de ses ennemis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '*Toutes les nations de la terre seront bénies en ta descendance'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Toutes… descendance: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Actes 3.25
      metadata:
        usfm: ACT.3.25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', parce que tu m''as obéi.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Abraham retourna vers ses serviteurs. Ils se levèrent et repartirent ensemble à Beer-Shéba. En effet, Abraham habitait à Beer-Shéba.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Après cela, on annonça à Abraham: «Milca a aussi donné des fils à ton frère Nachor: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Uts, son aîné, Buz, son frère, Kemuel, le père d''Aram, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Késed, Hazo, Pildash, Jidlaph et Bethuel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Bethuel a eu pour fille Rebecca. Voilà les huit fils que Milca a donnés à Nachor, le frère d''Abraham. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Sa concubine, appelée Réuma, a aussi mis au monde Thébach, Gaham, Tahash et Maaca.»
