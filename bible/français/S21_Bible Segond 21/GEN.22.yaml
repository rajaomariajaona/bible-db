document_id: GEN.22,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Mise à l'épreuve d'Abraham
  - type: text
    content: 'Après cela, Dieu mit Abraham à l''épreuve. Il lui dit: «Abraham!» Celui-ci répondit: «Me voici!» '
  '10':
  - type: text
    content: 'Puis Abraham tendit la main et prit le couteau pour égorger son fils. '
  '11':
  - type: text
    content: 'Alors l''ange de l''Eternel l''appela depuis le ciel et dit: «Abraham! Abraham!» Il répondit: «Me voici!» '
  '12':
  - type: text
    content: 'L''ange dit: «Ne porte pas la main sur l''enfant et ne lui fais rien, car je sais maintenant que tu crains Dieu et que tu ne m''as pas refusé ton fils unique.» '
  '13':
  - type: text
    content: 'Abraham leva les yeux et vit [derrière lui] un bélier retenu par les cornes dans un buisson. Il alla prendre le bélier et l''offrit en holocauste à la place de son fils. '
  '14':
  - type: text
    content: Abraham donna à cet endroit le nom de Yahvé-Jiré
  - type: note
    content: 'Yahvé-Jiré: littéralement l''Eternel pourvoit (ou voit).'
  - type: text
    content: '. C''est pourquoi l''on dit aujourd''hui: «A la montagne de l''Eternel il sera pourvu.»'
  '15':
  - type: text
    content: 'L''ange de l''Eternel appela une deuxième fois Abraham depuis le ciel. '
  '16':
  - type: text
    content: 'Il dit: «*Je le jure par moi-même – déclaration de l''Eternel –, parce que tu as fait cela et que tu n''as pas refusé ton fils unique, '
  '17':
  - type: text
    content: je te bénirai et je multiplierai ta descendance
  - type: note
    content: 'Je le jure… descendance: cité partiellement en Hébreux 6.13-14.'
  - type: text
    content: ': elle sera *aussi nombreuse que les étoiles du ciel, pareille au sable qui est au bord de la mer'
  - type: note
    content: 'Aussi… mer: cité en Hébreux 11.12.'
  - type: text
    content: '. De plus, ta descendance possédera les villes de ses ennemis. '
  '18':
  - type: text
    content: '*Toutes les nations de la terre seront bénies en ta descendance'
  - type: note
    content: 'Toutes… descendance: cité en Actes 3.25.'
  - type: text
    content: ', parce que tu m''as obéi.»'
  '19':
  - type: text
    content: Abraham retourna vers ses serviteurs. Ils se levèrent et repartirent ensemble à Beer-Shéba. En effet, Abraham habitait à Beer-Shéba.
  '2':
  - type: text
    content: 'Dieu dit: «Prends ton fils unique, celui que tu aimes, Isaac. Va-t''en au pays de Morija et là offre-le en holocauste sur l''une des montagnes que je t''indiquerai.»'
  '20':
  - type: text
    content: 'Après cela, on annonça à Abraham: «Milca a aussi donné des fils à ton frère Nachor: '
  '21':
  - type: text
    content: 'Uts, son aîné, Buz, son frère, Kemuel, le père d''Aram, '
  '22':
  - type: text
    content: 'Késed, Hazo, Pildash, Jidlaph et Bethuel. '
  '23':
  - type: text
    content: 'Bethuel a eu pour fille Rebecca. Voilà les huit fils que Milca a donnés à Nachor, le frère d''Abraham. '
  '24':
  - type: text
    content: Sa concubine, appelée Réuma, a aussi mis au monde Thébach, Gaham, Tahash et Maaca.»
  '3':
  - type: text
    content: 'Abraham se leva de bon matin, sella son âne et prit avec lui deux serviteurs et son fils Isaac. Il fendit du bois pour l''holocauste et partit pour aller à l''endroit que Dieu lui avait indiqué. '
  '4':
  - type: text
    content: 'Le troisième jour, Abraham leva les yeux et vit l''endroit de loin. '
  '5':
  - type: text
    content: 'Il dit à ses serviteurs: «Restez ici avec l''âne. Le jeune homme et moi, nous irons jusque là-bas pour adorer, puis nous reviendrons vers vous.» '
  '6':
  - type: text
    content: 'Abraham prit le bois pour l''holocauste, le chargea sur son fils Isaac et porta lui-même le feu et le couteau. Ils marchèrent tous les deux ensemble. '
  '7':
  - type: text
    content: 'Alors Isaac s''adressa à son père Abraham en disant: «Mon père!» Il répondit: «Me voici, mon fils!» Isaac reprit: «Voici le feu et le bois, mais où se trouve l''agneau pour l''holocauste?» '
  '8':
  - type: text
    content: 'Abraham répondit: «Mon fils, Dieu pourvoira lui-même à l''agneau pour l''holocauste.» Et ils continuèrent à marcher tous les deux ensemble.'
  '9':
  - type: text
    content: 'Lorsqu''ils furent arrivés à l''endroit que Dieu lui avait indiqué, Abraham y construisit un autel et rangea le bois. Il attacha son fils Isaac et le mit sur l''autel par-dessus le bois. '
