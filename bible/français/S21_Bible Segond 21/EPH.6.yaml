document_id: EPH.6,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Enfants, obéissez à vos parents, [dans le Seigneur,] car cela est juste. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Enfin, mes frères et sœurs, fortifiez-vous dans le Seigneur et dans sa force toute-puissante. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Revêtez-vous de toutes les armes de Dieu afin de pouvoir tenir ferme contre les manœuvres du diable. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, ce n'est pas contre l'homme que nous avons à lutter, mais contre les puissances, contre les autorités, contre les souverains de ce monde de ténèbres, contre les esprits du mal dans les lieux célestes.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est pourquoi, prenez toutes les armes de Dieu afin de pouvoir résister dans le jour mauvais et tenir ferme après avoir tout surmonté. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tenez donc ferme: ayez autour de votre taille la vérité en guise de ceinture; enfilez la cuirasse de la justice; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mettez comme chaussures à vos pieds le zèle pour annoncer l''Evangile de paix; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: prenez en toute circonstance le bouclier de la foi, avec lequel vous pourrez éteindre toutes les flèches enflammées du mal
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Du mal: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ou du mauvais, c'est-à-dire du diable.
      marker-yv: yv-n
    - type: text
      text: '; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: faites aussi bon accueil au casque du salut et à l'épée de l'Esprit, c'est-à-dire la parole de Dieu.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Faites en tout temps par l''Esprit toutes sortes de prières et de supplications. Veillez à cela avec une entière persévérance et en priant pour tous les saints. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Priez pour moi afin que, lorsque j''ouvre la bouche, la parole me soit donnée pour faire connaître avec assurance le mystère de l''Evangile. '
  '2':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Honore ton père et ta mère
    - type: text
      text: ' – c''est le premier commandement accompagné d''une promesse – '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C'est pour lui que je suis ambassadeur dans les chaînes. Priez que j'en parle avec assurance comme je dois le faire.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salutations
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Afin que vous connaissiez vous aussi quelle est ma situation et ce que je fais, Tychique, le frère bien-aimé qui est un fidèle serviteur dans le Seigneur, vous informera de tout. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je l'envoie exprès vers vous pour que vous ayez de nos nouvelles et pour qu'il réconforte votre cœur.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que la paix et l''amour avec la foi soient donnés aux frères et sœurs de la part de Dieu le Père et du Seigneur Jésus-Christ! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que la grâce soit avec tous ceux qui aiment notre Seigneur Jésus-Christ d'un amour que rien ne peut corrompre!
  '3':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: afin que tu sois heureux et que tu vives longtemps sur la terre.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.2-3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Honore… terre: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation du 5e des dix commandements (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Exode 20.12
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deutéronome 5.16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quant à vous, pères, n'irritez pas vos enfants mais élevez-les en leur donnant une éducation et des avertissements qui viennent du Seigneur.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esclaves, obéissez à vos maîtres terrestres avec crainte et profond respect, avec sincérité de cœur, comme à Christ. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne le faites pas seulement sous leurs yeux, comme le feraient des êtres désireux de plaire aux hommes, mais obéissez comme des serviteurs de Christ qui font de tout leur cœur la volonté de Dieu. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Servez-les avec bonne volonté, comme si vous serviez le Seigneur et non des hommes, '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: sachant que chacun, esclave ou homme libre, recevra du Seigneur le bien qu'il aura lui-même fait.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quant à vous, maîtres, agissez de même envers eux et abstenez-vous de menaces, sachant que leur maître et le vôtre est dans le ciel et que devant lui il n'y a pas de favoritisme.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'armure du chrétien
    marker-yv: yv-h
