document_id: EPH.6,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Enfants, obéissez à vos parents, [dans le Seigneur,] car cela est juste. '
  '10':
  - type: text
    content: 'Enfin, mes frères et sœurs, fortifiez-vous dans le Seigneur et dans sa force toute-puissante. '
  '11':
  - type: text
    content: 'Revêtez-vous de toutes les armes de Dieu afin de pouvoir tenir ferme contre les manœuvres du diable. '
  '12':
  - type: text
    content: En effet, ce n'est pas contre l'homme que nous avons à lutter, mais contre les puissances, contre les autorités, contre les souverains de ce monde de ténèbres, contre les esprits du mal dans les lieux célestes.
  '13':
  - type: text
    content: 'C''est pourquoi, prenez toutes les armes de Dieu afin de pouvoir résister dans le jour mauvais et tenir ferme après avoir tout surmonté. '
  '14':
  - type: text
    content: 'Tenez donc ferme: ayez autour de votre taille la vérité en guise de ceinture; enfilez la cuirasse de la justice; '
  '15':
  - type: text
    content: 'mettez comme chaussures à vos pieds le zèle pour annoncer l''Evangile de paix; '
  '16':
  - type: text
    content: prenez en toute circonstance le bouclier de la foi, avec lequel vous pourrez éteindre toutes les flèches enflammées du mal
  - type: note
    content: 'Du mal: ou du mauvais, c''est-à-dire du diable.'
  - type: text
    content: '; '
  '17':
  - type: text
    content: faites aussi bon accueil au casque du salut et à l'épée de l'Esprit, c'est-à-dire la parole de Dieu.
  '18':
  - type: text
    content: 'Faites en tout temps par l''Esprit toutes sortes de prières et de supplications. Veillez à cela avec une entière persévérance et en priant pour tous les saints. '
  '19':
  - type: text
    content: 'Priez pour moi afin que, lorsque j''ouvre la bouche, la parole me soit donnée pour faire connaître avec assurance le mystère de l''Evangile. '
  '2':
  - type: text
    content: Honore ton père et ta mère
  - type: text
    content: ' – c''est le premier commandement accompagné d''une promesse – '
  '20':
  - type: text
    content: C'est pour lui que je suis ambassadeur dans les chaînes. Priez que j'en parle avec assurance comme je dois le faire.
  - type: heading
    content: Salutations
  '21':
  - type: text
    content: 'Afin que vous connaissiez vous aussi quelle est ma situation et ce que je fais, Tychique, le frère bien-aimé qui est un fidèle serviteur dans le Seigneur, vous informera de tout. '
  '22':
  - type: text
    content: Je l'envoie exprès vers vous pour que vous ayez de nos nouvelles et pour qu'il réconforte votre cœur.
  '23':
  - type: text
    content: 'Que la paix et l''amour avec la foi soient donnés aux frères et sœurs de la part de Dieu le Père et du Seigneur Jésus-Christ! '
  '24':
  - type: text
    content: Que la grâce soit avec tous ceux qui aiment notre Seigneur Jésus-Christ d'un amour que rien ne peut corrompre!
  '3':
  - type: text
    content: afin que tu sois heureux et que tu vives longtemps sur la terre.
  - type: note
    content: 'Honore… terre: citation du 5e des dix commandements (Exode 20.12; Deutéronome 5.16).'
  '4':
  - type: text
    content: Quant à vous, pères, n'irritez pas vos enfants mais élevez-les en leur donnant une éducation et des avertissements qui viennent du Seigneur.
  '5':
  - type: text
    content: 'Esclaves, obéissez à vos maîtres terrestres avec crainte et profond respect, avec sincérité de cœur, comme à Christ. '
  '6':
  - type: text
    content: 'Ne le faites pas seulement sous leurs yeux, comme le feraient des êtres désireux de plaire aux hommes, mais obéissez comme des serviteurs de Christ qui font de tout leur cœur la volonté de Dieu. '
  '7':
  - type: text
    content: 'Servez-les avec bonne volonté, comme si vous serviez le Seigneur et non des hommes, '
  '8':
  - type: text
    content: sachant que chacun, esclave ou homme libre, recevra du Seigneur le bien qu'il aura lui-même fait.
  '9':
  - type: text
    content: Quant à vous, maîtres, agissez de même envers eux et abstenez-vous de menaces, sachant que leur maître et le vôtre est dans le ciel et que devant lui il n'y a pas de favoritisme.
  - type: heading
    content: L'armure du chrétien
