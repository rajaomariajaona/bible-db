document_id: PSA.82,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Condamnation des oppresseurs et de leur injustice
  - type: text
    content: Psaume d'Asaph.
  - type: text
    content: Dieu se tient dans l'assemblée de Dieu,
  - type: text
    content: 'il juge au milieu des dieux:'
  '2':
  - type: text
    content: «Jusqu'à quand jugerez-vous de façon injuste
  - type: text
    content: 'et favoriserez-vous les méchants? '
  - type: text
    content: – Pause.
  '3':
  - type: text
    content: »Rendez justice au faible et à l'orphelin,
  - type: text
    content: faites droit au malheureux et à l'indigent,
  '4':
  - type: text
    content: sauvez le faible et le pauvre,
  - type: text
    content: délivrez-les des méchants!
  '5':
  - type: text
    content: Ils ne savent rien, ils ne comprennent rien,
  - type: text
    content: ils marchent dans les ténèbres;
  - type: text
    content: toutes les fondations de la terre sont ébranlées.
  '6':
  - type: text
    content: '*J''avais dit: ‘Vous êtes des dieux'
  - type: note
    content: 'J''avais… dieux: cité par Jésus en Jean 10.34.'
  - type: text
    content: ','
  - type: text
    content: vous êtes tous des fils du Très-Haut.’
  '7':
  - type: text
    content: Cependant vous mourrez comme des hommes,
  - type: text
    content: vous tomberez comme un prince quelconque.»
  '8':
  - type: text
    content: Lève-toi, ô Dieu, juge la terre,
  - type: text
    content: car toutes les nations t'appartiennent!
