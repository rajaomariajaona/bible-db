document_id: PSA.82
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Condamnation des oppresseurs et de leur injustice
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Psaume d'Asaph.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu se tient dans l'assemblée de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'il juge au milieu des dieux:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Jusqu'à quand jugerez-vous de façon injuste
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et favoriserez-vous les méchants? '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: »Rendez justice au faible et à l'orphelin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: faites droit au malheureux et à l'indigent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: sauvez le faible et le pauvre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: délivrez-les des méchants!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils ne savent rien, ils ne comprennent rien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils marchent dans les ténèbres;
- type: usfm
  marker: q1
  children:
  - type: text
    text: toutes les fondations de la terre sont ébranlées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '*J''avais dit: ‘Vous êtes des dieux'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '82.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'J''avais… dieux: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité par Jésus en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jean 10.34
      metadata:
        usfm: JHN.10.34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous êtes tous des fils du Très-Haut.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Cependant vous mourrez comme des hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous tomberez comme un prince quelconque.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Lève-toi, ô Dieu, juge la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car toutes les nations t'appartiennent!
