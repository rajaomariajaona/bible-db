document_id: JOB.8,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Intervention n° 1 de Bildad
  - type: text
    content: 'Bildad de Shuach prit la parole et dit:'
  '10':
  - type: text
    content: Eux, ne t'instruiront-ils pas? Certainement, ils te le diront,
  - type: text
    content: 'ils tireront de leur expérience ces propos:'
  '11':
  - type: text
    content: ‘Le papyrus pousse-t-il sans marais?
  - type: text
    content: Le roseau grandit-il sans eau?
  '12':
  - type: text
    content: Encore vert et sans qu'on ne l'ait coupé,
  - type: text
    content: il sèche plus vite que toutes les herbes.’
  '13':
  - type: text
    content: »Voilà ce qui arrive à tous ceux qui oublient Dieu,
  - type: text
    content: et l'espérance de l'impie s'évanouira.
  '14':
  - type: text
    content: Ses certitudes sont fragiles,
  - type: text
    content: sa sécurité n'est qu'une toile d'araignée.
  '15':
  - type: text
    content: Il s'appuie sur sa maison, mais elle n'est pas solide;
  - type: text
    content: il s'y cramponne, mais elle ne résiste pas.
  '16':
  - type: text
    content: Rempli de sève en plein soleil,
  - type: text
    content: il développe ses rameaux sur son jardin,
  '17':
  - type: text
    content: ses racines s'entrelacent dans un tas de cailloux,
  - type: text
    content: il scrute le creux des pierres.
  '18':
  - type: text
    content: Si on l'arrache de l'endroit qu'il occupait,
  - type: text
    content: 'celui-ci le renie: ‘Je ne t''ai jamais vu!’'
  '19':
  - type: text
    content: »Voilà tout le bonheur que lui procure sa conduite!
  - type: text
    content: Puis, sur le même sol, d'autres surgissent après lui.
  '2':
  - type: text
    content: «Jusqu'à quand veux-tu lancer de telles affirmations?
  - type: text
    content: Les paroles qui sortent de ta bouche sont pareilles à un vent impétueux.
  '20':
  - type: text
    content: Non, Dieu ne rejette pas l'homme intègre
  - type: text
    content: et il n'affermit pas les mains de ceux qui font le mal.
  '21':
  - type: text
    content: Bientôt il remplira ta bouche de rires, et tes lèvres de cris de joie.
  '22':
  - type: text
    content: Ceux qui te détestent seront couverts de honte,
  - type: text
    content: la tente des méchants disparaîtra.»
  '3':
  - type: text
    content: Dieu fausserait-il le droit?
  - type: text
    content: Le Tout-Puissant fausserait-il la justice?
  '4':
  - type: text
    content: Si tes fils ont péché contre lui,
  - type: text
    content: il les a livrés aux conséquences de leur révolte.
  '5':
  - type: text
    content: Mais toi, si tu recherches vraiment Dieu,
  - type: text
    content: si tu implores la grâce du Tout-Puissant,
  '6':
  - type: text
    content: si tu es sans reproche et droit,
  - type: text
    content: c'est certain, il ne tardera pas à intervenir en ta faveur
  - type: text
    content: et il restaurera le domaine qui abrite ta justice.
  '7':
  - type: text
    content: Ta condition première semblera peu importante,
  - type: text
    content: tant celle qui viendra par la suite sera belle.
  '8':
  - type: text
    content: »Interroge donc les membres de la génération précédente,
  - type: text
    content: sois attentif à l'expérience de leurs ancêtres.
  '9':
  - type: text
    content: En effet, nous sommes d'hier et nous ne savons rien,
  - type: text
    content: nos jours sur la terre ne sont qu'une ombre.
