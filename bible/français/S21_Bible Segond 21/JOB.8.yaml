document_id: JOB.8,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Intervention n° 1 de Bildad
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Bildad de Shuach prit la parole et dit:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eux, ne t'instruiront-ils pas? Certainement, ils te le diront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ils tireront de leur expérience ces propos:'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Le papyrus pousse-t-il sans marais?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le roseau grandit-il sans eau?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Encore vert et sans qu'on ne l'ait coupé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il sèche plus vite que toutes les herbes.’
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Voilà ce qui arrive à tous ceux qui oublient Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'espérance de l'impie s'évanouira.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses certitudes sont fragiles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa sécurité n'est qu'une toile d'araignée.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s'appuie sur sa maison, mais elle n'est pas solide;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il s'y cramponne, mais elle ne résiste pas.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rempli de sève en plein soleil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il développe ses rameaux sur son jardin,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses racines s'entrelacent dans un tas de cailloux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il scrute le creux des pierres.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si on l'arrache de l'endroit qu'il occupait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'celui-ci le renie: ‘Je ne t''ai jamais vu!’'
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Voilà tout le bonheur que lui procure sa conduite!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puis, sur le même sol, d'autres surgissent après lui.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Jusqu'à quand veux-tu lancer de telles affirmations?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les paroles qui sortent de ta bouche sont pareilles à un vent impétueux.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Non, Dieu ne rejette pas l'homme intègre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il n'affermit pas les mains de ceux qui font le mal.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bientôt il remplira ta bouche de rires, et tes lèvres de cris de joie.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui te détestent seront couverts de honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la tente des méchants disparaîtra.»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu fausserait-il le droit?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Tout-Puissant fausserait-il la justice?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tes fils ont péché contre lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il les a livrés aux conséquences de leur révolte.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais toi, si tu recherches vraiment Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si tu implores la grâce du Tout-Puissant,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si tu es sans reproche et droit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est certain, il ne tardera pas à intervenir en ta faveur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il restaurera le domaine qui abrite ta justice.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta condition première semblera peu importante,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tant celle qui viendra par la suite sera belle.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Interroge donc les membres de la génération précédente,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sois attentif à l'expérience de leurs ancêtres.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, nous sommes d'hier et nous ne savons rien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nos jours sur la terre ne sont qu'une ombre.
