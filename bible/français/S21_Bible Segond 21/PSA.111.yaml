document_id: PSA.111,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Perfection de l'action de Dieu
  - type: text
    content: Louez l'Eternel!
  - type: text
    content: Je louerai l'Eternel de tout mon cœur,
  - type: text
    content: dans la réunion des hommes droits et dans l'assemblée.
  '10':
  - type: text
    content: La crainte de l'Eternel est le commencement de la sagesse.
  - type: text
    content: Tous ceux qui respectent ses décrets ont une raison saine.
  - type: text
    content: Sa gloire subsiste à perpétuité.
  '2':
  - type: text
    content: Les œuvres de l'Eternel sont grandes,
  - type: text
    content: recherchées par tous ceux qui les aiment.
  '3':
  - type: text
    content: Son activité n'est que splendeur et magnificence,
  - type: text
    content: et sa justice subsiste à perpétuité.
  '4':
  - type: text
    content: Il a laissé le souvenir de ses merveilles.
  - type: text
    content: L'Eternel fait grâce, il est rempli de compassion.
  '5':
  - type: text
    content: Il a donné de la nourriture à ceux qui le craignent,
  - type: text
    content: il se souvient toujours de son alliance.
  '6':
  - type: text
    content: Il a montré à son peuple la puissance de ses œuvres
  - type: text
    content: en lui donnant l'héritage d'autres nations.
  '7':
  - type: text
    content: Les œuvres de ses mains, c'est la vérité et la justice;
  - type: text
    content: tous ses décrets sont dignes de confiance,
  '8':
  - type: text
    content: bien établis pour toute l'éternité,
  - type: text
    content: faits avec vérité et droiture.
  '9':
  - type: text
    content: Il a envoyé la libération à son peuple,
  - type: text
    content: il a prescrit son alliance pour toujours;
  - type: text
    content: son nom est saint et redoutable.
