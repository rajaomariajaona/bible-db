document_id: PSA.111,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Perfection de l'action de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l'Eternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je louerai l'Eternel de tout mon cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans la réunion des hommes droits et dans l'assemblée.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La crainte de l'Eternel est le commencement de la sagesse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ceux qui respectent ses décrets ont une raison saine.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa gloire subsiste à perpétuité.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les œuvres de l'Eternel sont grandes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: recherchées par tous ceux qui les aiment.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son activité n'est que splendeur et magnificence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sa justice subsiste à perpétuité.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a laissé le souvenir de ses merveilles.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel fait grâce, il est rempli de compassion.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a donné de la nourriture à ceux qui le craignent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il se souvient toujours de son alliance.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a montré à son peuple la puissance de ses œuvres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en lui donnant l'héritage d'autres nations.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les œuvres de ses mains, c'est la vérité et la justice;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous ses décrets sont dignes de confiance,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: bien établis pour toute l'éternité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: faits avec vérité et droiture.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a envoyé la libération à son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a prescrit son alliance pour toujours;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: son nom est saint et redoutable.
