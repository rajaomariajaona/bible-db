document_id: JOB.37,152
type_code: fra
verses:
  '1':
  - type: text
    content: »Tout cela fait battre mon cœur,
  - type: text
    content: il bondit dans ma poitrine.
  '10':
  - type: text
    content: Par son souffle Dieu produit la glace
  - type: text
    content: et la surface de l'eau se fige.
  '11':
  - type: text
    content: Il charge les nuages d'humidité,
  - type: text
    content: puis il les disperse, traversés d'éclairs;
  '12':
  - type: text
    content: leurs évolutions varient suivant ses directives
  - type: text
    content: pour l'exécution de tous ses ordres
  - type: text
    content: à la surface de la terre habitée.
  '13':
  - type: text
    content: C'est comme un instrument de discipline pour la terre
  - type: text
    content: ou comme une marque de bonté qu'il les fait apparaître.
  '14':
  - type: text
    content: »Job, prête l'oreille à ces paroles!
  - type: text
    content: Reste tranquille et considère les merveilles de Dieu!
  '15':
  - type: text
    content: Sais-tu comment Dieu les contrôle?
  - type: text
    content: Sais-tu comment il fait briller l'éclair?
  '16':
  - type: text
    content: Sais-tu comment les nuages se tiennent en équilibre?
  - type: text
    content: Ce sont les actes merveilleux de celui qui connaît tout parfaitement.
  '17':
  - type: text
    content: Pourquoi tes habits sont-ils chauds
  - type: text
    content: quand la terre se repose par le vent du sud?
  '18':
  - type: text
    content: Peux-tu comme lui déployer le ciel,
  - type: text
    content: aussi solide qu'un miroir en métal fondu?
  '19':
  - type: text
    content: Fais-nous connaître ce que nous pourrions lui dire!
  - type: text
    content: Nous manquerons d'arguments à cause des ténèbres de notre ignorance.
  '2':
  - type: text
    content: Ecoutez attentivement les vibrations de sa voix,
  - type: text
    content: le grondement qui sort de sa bouche!
  '20':
  - type: text
    content: »Quand je parle, doit-on l'en avertir?
  - type: text
    content: Mais un homme demande-t-il à être englouti?
  '21':
  - type: text
    content: Soudain, on ne voit plus la lumière car elle est obscurcie par les nuages,
  - type: text
    content: mais un vent souffle et les balaie.
  '22':
  - type: text
    content: 'Du nord survient une lumière dorée:'
  - type: text
    content: Dieu s'entoure d'une splendeur redoutable.
  '23':
  - type: text
    content: Nous ne pouvons atteindre le Tout-Puissant.
  - type: text
    content: Sa grandeur se manifeste dans sa force,
  - type: text
    content: mais le droit et la parfaite justice, il ne les maltraite pas.
  '24':
  - type: text
    content: Voilà pourquoi les hommes doivent le craindre;
  - type: text
    content: il reste indifférent à tous ceux qui se croient sages.»
  '3':
  - type: text
    content: Il le fait rouler dans toute l'étendue du ciel
  - type: text
    content: et son éclair brille jusqu'aux extrémités de la terre.
  '4':
  - type: text
    content: 'Puis éclate un rugissement: il tonne de sa voix majestueuse;'
  - type: text
    content: il ne retient plus l'éclair, dès que sa voix retentit.
  '5':
  - type: text
    content: »Dieu tonne avec sa voix d'une manière merveilleuse.
  - type: text
    content: Il fait de grandes choses que nous sommes incapables de connaître.
  '6':
  - type: text
    content: 'Il dit à la neige: ‘Tombe sur la terre!’'
  - type: text
    content: Il le dit aussi à la pluie, même aux plus fortes pluies.
  '7':
  - type: text
    content: Il interrompt ainsi l'activité de tous les hommes
  - type: text
    content: afin que tous se reconnaissent comme son œuvre.
  '8':
  - type: text
    content: »L'animal sauvage se retire dans une grotte
  - type: text
    content: et se couche dans sa tanière.
  '9':
  - type: text
    content: Le tourbillon vient du sud
  - type: text
    content: et le froid vient des vents du nord.
