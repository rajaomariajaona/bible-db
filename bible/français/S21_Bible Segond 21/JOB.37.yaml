document_id: JOB.37
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: »Tout cela fait battre mon cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il bondit dans ma poitrine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ecoutez attentivement les vibrations de sa voix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le grondement qui sort de sa bouche!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il le fait rouler dans toute l'étendue du ciel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son éclair brille jusqu'aux extrémités de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Puis éclate un rugissement: il tonne de sa voix majestueuse;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne retient plus l'éclair, dès que sa voix retentit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: »Dieu tonne avec sa voix d'une manière merveilleuse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il fait de grandes choses que nous sommes incapables de connaître.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il dit à la neige: ‘Tombe sur la terre!’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il le dit aussi à la pluie, même aux plus fortes pluies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il interrompt ainsi l'activité de tous les hommes
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin que tous se reconnaissent comme son œuvre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: »L'animal sauvage se retire dans une grotte
- type: usfm
  marker: q1
  children:
  - type: text
    text: et se couche dans sa tanière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Le tourbillon vient du sud
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le froid vient des vents du nord.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Par son souffle Dieu produit la glace
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la surface de l'eau se fige.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il charge les nuages d'humidité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puis il les disperse, traversés d'éclairs;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: leurs évolutions varient suivant ses directives
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour l'exécution de tous ses ordres
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la surface de la terre habitée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: C'est comme un instrument de discipline pour la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou comme une marque de bonté qu'il les fait apparaître.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: »Job, prête l'oreille à ces paroles!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Reste tranquille et considère les merveilles de Dieu!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Sais-tu comment Dieu les contrôle?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sais-tu comment il fait briller l'éclair?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Sais-tu comment les nuages se tiennent en équilibre?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce sont les actes merveilleux de celui qui connaît tout parfaitement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Pourquoi tes habits sont-ils chauds
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand la terre se repose par le vent du sud?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Peux-tu comme lui déployer le ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aussi solide qu'un miroir en métal fondu?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fais-nous connaître ce que nous pourrions lui dire!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous manquerons d'arguments à cause des ténèbres de notre ignorance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: »Quand je parle, doit-on l'en avertir?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais un homme demande-t-il à être englouti?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Soudain, on ne voit plus la lumière car elle est obscurcie par les nuages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais un vent souffle et les balaie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Du nord survient une lumière dorée:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu s'entoure d'une splendeur redoutable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Nous ne pouvons atteindre le Tout-Puissant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa grandeur se manifeste dans sa force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais le droit et la parfaite justice, il ne les maltraite pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Voilà pourquoi les hommes doivent le craindre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il reste indifférent à tous ceux qui se croient sages.»
