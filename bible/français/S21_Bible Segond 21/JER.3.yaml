document_id: JER.3,152
type_code: fra
verses:
  '1':
  - type: text
    content: »Si un homme renvoie sa femme
  - type: text
    content: et qu'elle le quitte pour devenir la femme d'un autre,
  - type: text
    content: cet homme retournerait-il encore vers elle?
  - type: text
    content: Le pays lui-même ne serait-il pas souillé?
  - type: text
    content: Et toi, tu t'es prostituée à de nombreux amants
  - type: text
    content: et tu reviendrais à moi! déclare l'Eternel.
  '10':
  - type: text
    content: Malgré tout cela, ce n'est pas de tout son cœur que sa sœur Juda la traîtresse est revenue vers moi, mais avec hypocrisie, déclare l'Eternel.»
  '11':
  - type: text
    content: 'L''Eternel m''a dit: «L''infidèle Israël paraît innocente'
  - type: text
    content: en comparaison de Juda la traîtresse.
  '12':
  - type: text
    content: 'Va crier ces paroles vers le nord, va dire:'
  - type: text
    content: ‘Reviens, infidèle Israël! déclare l'Eternel.
  - type: text
    content: Je ne jetterai pas un regard sévère sur vous,
  - type: text
    content: car moi, je suis fidèle, déclare l'Eternel.
  - type: text
    content: Je ne garde pas ma colère pour toujours.
  '13':
  - type: text
    content: Reconnais seulement ta faute!
  - type: text
    content: Oui, tu t'es révoltée contre l'Eternel, ton Dieu.
  - type: text
    content: Tu t'es démenée de tous côtés vers les dieux étrangers,
  - type: text
    content: sous tout arbre vert,
  - type: text
    content: et tu n'as pas écouté ma voix, déclare l'Eternel.’
  '14':
  - type: text
    content: »Revenez, enfants rebelles, déclare l'Eternel,
  - type: text
    content: car c'est moi qui suis votre maître.
  - type: text
    content: Je vous prendrai, un d'une ville, deux d'une famille,
  - type: text
    content: et je vous ramènerai à Sion
  - type: note
    content: 'Sion: c''est-à-dire Jérusalem.'
  - type: text
    content: .
  '15':
  - type: text
    content: Je vous donnerai des bergers selon mon cœur,
  - type: text
    content: et ils prendront soin de vous
  - type: text
    content: avec la connaissance et le discernement nécessaires.
  '16':
  - type: text
    content: »Lorsque vous serez devenus nombreux et aurez eu des enfants dans le pays,
  - type: text
    content: alors, déclare l'Eternel,
  - type: text
    content: on ne parlera plus de l'arche de l'alliance de l'Eternel.
  - type: text
    content: Elle ne viendra plus à la pensée,
  - type: text
    content: on ne se souviendra plus d'elle, on ne s'apercevra plus de son absence
  - type: text
    content: et l'on n'en fera pas une autre.
  '17':
  - type: text
    content: A ce moment-là, on appellera Jérusalem ‘trône de l'Eternel’.
  - type: text
    content: Toutes les nations s'assembleront à Jérusalem au nom de l'Eternel,
  - type: text
    content: et elles ne suivront plus les penchants de leur cœur mauvais.
  '18':
  - type: text
    content: Alors, la communauté de Juda marchera avec celle d'Israël.
  - type: text
    content: Elles viendront ensemble du pays du nord
  - type: text
    content: jusqu'au pays que j'ai donné en héritage à vos ancêtres.
  '19':
  - type: text
    content: '»Je me disais: ‘Comme je voudrais te mettre au même rang que des fils'
  - type: text
    content: et te donner un pays de délices,
  - type: text
    content: l'héritage le plus beau parmi toutes les nations!’
  - type: text
    content: 'Je me disais que tu m''appellerais: ‘Mon père!’'
  - type: text
    content: et que tu ne te détournerais pas de moi.
  '2':
  - type: text
    content: »Lève les yeux vers les hauteurs et regarde!
  - type: text
    content: Où ne t'es-tu pas prostituée!
  - type: text
    content: Tu te tenais sur les chemins, à leur disposition,
  - type: text
    content: comme l'Arabe dans le désert.
  - type: text
    content: Tu as souillé le pays par tes prostitutions et par ta méchanceté.
  '20':
  - type: text
    content: Pourtant, tout comme une femme trahit son compagnon,
  - type: text
    content: vous m'avez trahi, communauté d'Israël,
  - type: text
    content: déclare l'Eternel.»
  '21':
  - type: text
    content: 'Une voix se fait entendre sur les hauteurs:'
  - type: text
    content: ce sont les pleurs, les supplications des Israélites.
  - type: text
    content: C'est parce qu'ils ont perverti leur voie,
  - type: text
    content: parce qu'ils ont oublié l'Eternel, leur Dieu.
  '22':
  - type: text
    content: «Revenez, enfants rebelles!
  - type: text
    content: Je guérirai votre tendance à l'infidélité.»
  - type: text
    content: «Nous voici, nous venons vers toi,
  - type: text
    content: car c'est toi qui es l'Eternel, notre Dieu.
  '23':
  - type: text
    content: Oui, ce qui se passe sur les collines, le vacarme qu'on entend sur les montagnes, tout cela n'est que mensonge.
  - type: text
    content: Oui, c'est en l'Eternel, notre Dieu, qu'est le salut d'Israël.
  '24':
  - type: text
    content: 'Depuis notre jeunesse, ce qui fait notre honte a dévoré le fruit du travail de nos ancêtres:'
  - type: text
    content: leurs brebis et leurs bœufs, leurs fils et leurs filles.
  '25':
  - type: text
    content: Que notre honte soit notre lit,
  - type: text
    content: et notre déshonneur notre couverture,
  - type: text
    content: car nous avons péché contre l'Eternel, notre Dieu,
  - type: text
    content: nous et nos ancêtres, depuis notre jeunesse et jusqu'à aujourd'hui,
  - type: text
    content: et nous n'avons pas écouté l'Eternel, notre Dieu.»
  '3':
  - type: text
    content: Aussi les averses ont-elles été retenues
  - type: text
    content: et les dernières pluies ont-elles manqué.
  - type: text
    content: Cependant, tu as adopté l'attitude obstinée d'une femme prostituée,
  - type: text
    content: tu n'as pas voulu avoir honte.
  '4':
  - type: text
    content: 'Maintenant, tu cries vers moi: ‘Mon père!'
  - type: text
    content: C'est toi qui es l'ami de ma jeunesse!
  '5':
  - type: text
    content: Gardera-t-il pour toujours sa colère?
  - type: text
    content: La conservera-t-il indéfiniment?’
  - type: text
    content: Voilà comment tu t'es exprimée tout en continuant à faire le mal.
  - type: text
    content: Tu en as été capable!»
  - type: heading
    content: Appel à revenir à Dieu
  '6':
  - type: text
    content: 'A l''époque du roi Josias, l''Eternel m''a dit: «As-tu vu ce qu''a fait l''infidèle Israël? Elle est allée sur toute montagne élevée et sous tout arbre vert, et là elle s''est prostituée. '
  '7':
  - type: text
    content: 'Je me disais: ‘Après avoir fait tout cela, elle reviendra à moi’, mais elle n''est pas revenue, et sa sœur, Juda la traîtresse, en a été témoin. '
  '8':
  - type: text
    content: Alors même que j'ai renvoyé
  - type: note
    content: 'Renvoyé: allusion à la disparition du royaume de l''Israël du nord suite à l''invasion assyrienne (chute de sa capitale Samarie en 722 av. J.-C.).'
  - type: text
    content: ' l''infidèle Israël à cause de tous ses adultères, que je lui ai donné sa lettre de divorce, j''ai constaté que sa sœur, Juda la traîtresse, n''en a éprouvé aucune peur et qu''elle est allée se prostituer de la même manière. '
  '9':
  - type: text
    content: 'Le résultat, c''est qu''Israël a souillé le pays par la légèreté de sa prostitution, elle a commis l''adultère avec la pierre et le bois. '
