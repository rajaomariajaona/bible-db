document_id: JER.3,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Si un homme renvoie sa femme
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'elle le quitte pour devenir la femme d'un autre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cet homme retournerait-il encore vers elle?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le pays lui-même ne serait-il pas souillé?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toi, tu t'es prostituée à de nombreux amants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu reviendrais à moi! déclare l'Eternel.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Malgré tout cela, ce n'est pas de tout son cœur que sa sœur Juda la traîtresse est revenue vers moi, mais avec hypocrisie, déclare l'Eternel.»
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L''Eternel m''a dit: «L''infidèle Israël paraît innocente'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en comparaison de Juda la traîtresse.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Va crier ces paroles vers le nord, va dire:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Reviens, infidèle Israël! déclare l'Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne jetterai pas un regard sévère sur vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car moi, je suis fidèle, déclare l'Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ne garde pas ma colère pour toujours.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reconnais seulement ta faute!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, tu t'es révoltée contre l'Eternel, ton Dieu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu t'es démenée de tous côtés vers les dieux étrangers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sous tout arbre vert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu n'as pas écouté ma voix, déclare l'Eternel.’
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Revenez, enfants rebelles, déclare l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c'est moi qui suis votre maître.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vous prendrai, un d'une ville, deux d'une famille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je vous ramènerai à Sion
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sion: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire Jérusalem.
      marker-yv: yv-n
    - type: text
      text: .
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vous donnerai des bergers selon mon cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils prendront soin de vous
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec la connaissance et le discernement nécessaires.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Lorsque vous serez devenus nombreux et aurez eu des enfants dans le pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors, déclare l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on ne parlera plus de l'arche de l'alliance de l'Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle ne viendra plus à la pensée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on ne se souviendra plus d'elle, on ne s'apercevra plus de son absence
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'on n'en fera pas une autre.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A ce moment-là, on appellera Jérusalem ‘trône de l'Eternel’.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutes les nations s'assembleront à Jérusalem au nom de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et elles ne suivront plus les penchants de leur cœur mauvais.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors, la communauté de Juda marchera avec celle d'Israël.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles viendront ensemble du pays du nord
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu'au pays que j'ai donné en héritage à vos ancêtres.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»Je me disais: ‘Comme je voudrais te mettre au même rang que des fils'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et te donner un pays de délices,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'héritage le plus beau parmi toutes les nations!’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je me disais que tu m''appellerais: ‘Mon père!’'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que tu ne te détournerais pas de moi.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Lève les yeux vers les hauteurs et regarde!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où ne t'es-tu pas prostituée!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu te tenais sur les chemins, à leur disposition,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme l'Arabe dans le désert.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as souillé le pays par tes prostitutions et par ta méchanceté.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourtant, tout comme une femme trahit son compagnon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous m'avez trahi, communauté d'Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l'Eternel.»
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Une voix se fait entendre sur les hauteurs:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce sont les pleurs, les supplications des Israélites.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est parce qu'ils ont perverti leur voie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu'ils ont oublié l'Eternel, leur Dieu.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Revenez, enfants rebelles!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je guérirai votre tendance à l'infidélité.»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Nous voici, nous venons vers toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c'est toi qui es l'Eternel, notre Dieu.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, ce qui se passe sur les collines, le vacarme qu'on entend sur les montagnes, tout cela n'est que mensonge.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, c'est en l'Eternel, notre Dieu, qu'est le salut d'Israël.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Depuis notre jeunesse, ce qui fait notre honte a dévoré le fruit du travail de nos ancêtres:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leurs brebis et leurs bœufs, leurs fils et leurs filles.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que notre honte soit notre lit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et notre déshonneur notre couverture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car nous avons péché contre l'Eternel, notre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous et nos ancêtres, depuis notre jeunesse et jusqu'à aujourd'hui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et nous n'avons pas écouté l'Eternel, notre Dieu.»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aussi les averses ont-elles été retenues
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les dernières pluies ont-elles manqué.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cependant, tu as adopté l'attitude obstinée d'une femme prostituée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu n'as pas voulu avoir honte.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Maintenant, tu cries vers moi: ‘Mon père!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est toi qui es l'ami de ma jeunesse!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gardera-t-il pour toujours sa colère?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La conservera-t-il indéfiniment?’
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà comment tu t'es exprimée tout en continuant à faire le mal.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu en as été capable!»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Appel à revenir à Dieu
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A l''époque du roi Josias, l''Eternel m''a dit: «As-tu vu ce qu''a fait l''infidèle Israël? Elle est allée sur toute montagne élevée et sous tout arbre vert, et là elle s''est prostituée. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je me disais: ‘Après avoir fait tout cela, elle reviendra à moi’, mais elle n''est pas revenue, et sa sœur, Juda la traîtresse, en a été témoin. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors même que j'ai renvoyé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Renvoyé: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: allusion à la disparition du royaume de l'Israël du nord suite à l'invasion assyrienne (chute de sa capitale Samarie en 722 av. J.-C.).
      marker-yv: yv-n
    - type: text
      text: ' l''infidèle Israël à cause de tous ses adultères, que je lui ai donné sa lettre de divorce, j''ai constaté que sa sœur, Juda la traîtresse, n''en a éprouvé aucune peur et qu''elle est allée se prostituer de la même manière. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le résultat, c''est qu''Israël a souillé le pays par la légèreté de sa prostitution, elle a commis l''adultère avec la pierre et le bois. '
