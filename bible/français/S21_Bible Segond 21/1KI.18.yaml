document_id: 1KI.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Confrontation entre Elie et les prophètes de Baal
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Bien des jours passèrent et, au bout de 3 ans, la parole de l''Eternel fut adressée à Elie: «Va te présenter devant Achab et je ferai tomber de la pluie sur le pays.» '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Elie partit pour se présenter devant Achab. La famine était grande à Samarie. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Quant à Achab, il fit appeler Abdias, le chef de son palais. Or, Abdias craignait beaucoup l''Eternel; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'lorsque Jézabel avait exterminé les prophètes de l''Eternel, il avait pris 100 prophètes et les avait cachés par groupes de 50 dans des grottes, où il les avait nourris de pain et d''eau. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Achab dit à Abdias: «Va vers toutes les sources d''eau et vers tous les torrents du pays. Peut-être trouveras-tu de l''herbe. Ainsi, nous pourrons garder les chevaux et les mulets en vie, et nous n''aurons pas besoin d''abattre du bétail.» '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils se partagèrent le pays à parcourir; Achab partit seul par un chemin, et Abdias par un autre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Abdias était en route quand Elie le rencontra. L''ayant reconnu, Abdias tomba le visage contre terre et dit: «Est-ce toi, mon seigneur Elie?» '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il lui répondit: «C''est bien moi. Va dire à ton seigneur: ‘Voici Elie!’» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Abdias dit: «Quel péché ai-je commis, pour que tu me livres, moi ton serviteur, entre les mains d''Achab? Il me fera mourir! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L''Eternel est vivant! Il n''y a aucune nation ni aucun royaume où mon seigneur n''ait envoyé quelqu''un à ta recherche. Quand on disait que tu n''y étais pas, il faisait jurer le royaume et la nation que l''on ne t''avait pas trouvé. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et maintenant, toi tu dis: ‘Va dire à ton seigneur: Voici Elie!’ '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lorsque je t''aurai quitté, l''Esprit de l''Eternel te transportera je ne sais où. Je serai allé informer Achab, mais comme il ne te trouvera pas, il me tuera. Cependant, moi ton serviteur, je crains l''Eternel depuis ma jeunesse. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'N''a-t-on pas dit à mon seigneur ce que j''ai fait quand Jézabel a tué les prophètes de l''Eternel? J''ai caché 100 prophètes de l''Eternel par groupes de 50 dans des grottes et je les ai nourris de pain et d''eau. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et maintenant, toi tu dis: ‘Va dire à ton seigneur: Voici Elie!’ Il me tuera.» '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Elie répondit: «L''Eternel, le maître de l''univers, dont je suis le serviteur est vivant! Aujourd''hui je vais me présenter devant Achab.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Abdias alla à la rencontre d''Achab et l''informa de la situation. Achab partit alors à la rencontre d''Elie. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'A peine l''eut-il aperçu qu''il lui dit: «Est-ce toi qui jettes le trouble en Israël?» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Elie répondit: «Je ne trouble pas Israël. Au contraire, c''est toi et ta famille qui le faites, puisque vous avez abandonné les commandements de l''Eternel et que tu as suivi les Baals. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Fais maintenant rassembler tout Israël vers moi, au mont Carmel, avec les 450 prophètes de Baal et les 400 prophètes d'Astarté qui mangent à la table de Jézabel.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Achab envoya des messagers vers tous les Israélites et rassembla les prophètes au mont Carmel. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Alors Elie s''approcha de tout le peuple et dit: «Jusqu''à quand aurez-vous un comportement boiteux? Si c''est l''Eternel qui est Dieu, suivez-le! Si c''est Baal, suivez-le!» Le peuple ne lui répondit rien. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Elie dit au peuple: «Je suis resté le seul prophète de l''Eternel, et il y a 450 prophètes de Baal. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Que l''on nous donne deux taureaux. Qu''ils choisissent pour eux l''un des taureaux, le coupent en morceaux et le placent sur le bois, sans y mettre le feu. De mon côté, je préparerai l''autre taureau et je le placerai sur le bois, sans y mettre le feu. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Puis faites appel au nom de votre dieu. Quant à moi, je ferai appel au nom de l''Eternel. Le dieu qui répondra par le feu, c''est celui-là qui sera Dieu.» Tout le peuple répondit: «C''est bien!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Elie dit aux prophètes de Baal: «Choisissez pour vous l''un des taureaux et préparez-le les premiers, puisque vous êtes les plus nombreux. Ensuite, faites appel au nom de votre dieu, mais n''allumez pas le feu.» '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ils prirent le taureau qu''on leur donna et le préparèrent. Puis ils firent appel au nom de Baal depuis le matin jusqu''à midi en disant: «Baal, réponds-nous!» Mais il n''y eut ni voix ni réponse, même s''ils sautaient devant l''autel qu''ils avaient érigé. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'A midi, Elie se moqua d''eux et dit: «Criez à haute voix! Puisqu''il est dieu, il doit être en train de penser à quelque chose, ou bien il est occupé, ou encore en voyage. Peut-être même qu''il dort et qu''il va se réveiller.» '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ils crièrent à haute voix et, conformément à leur coutume, ils se firent des incisions avec des épées et avec des lances jusqu''à ce que le sang coule sur eux. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Lorsque midi fut passé, ils prophétisèrent jusqu'au moment de la présentation de l'offrande. Mais il n'y eut ni voix, ni réponse, ni signe d'attention.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Elie dit alors à tout le peuple: «Approchez-vous de moi!» Tout le peuple s''approcha de lui. Elie répara l''autel de l''Eternel, qui avait été démoli. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Il prit 12 pierres, d''après le nombre des tribus issues des fils de Jacob, l''homme auquel l''Eternel avait dit: «Tu t''appelleras Israël.»'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu t''appelleras Israël: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Genèse 32.29
      metadata:
        usfm: GEN.32.29
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Avec ces pierres, il reconstruisit un autel au nom de l''Eternel. Il fit autour de l''autel un fossé pouvant contenir une quinzaine de litres. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Il arrangea le bois, coupa le taureau en morceaux et le plaça sur le bois. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Puis il dit: «Remplissez d''eau quatre cruches et versez-les sur l''holocauste et sur le bois.» Il dit: «Faites-le une deuxième fois.» Et ils le firent une deuxième fois. Il dit: «Faites-le une troisième fois.» Et ils le firent une troisième fois. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: L'eau coula tout autour de l'autel et l'on remplit aussi d'eau le fossé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Au moment de la présentation de l''offrande, le prophète Elie s''avança et dit: «Eternel, Dieu d''Abraham, d''Isaac et d''Israël! Que l''on sache aujourd''hui que c''est toi qui es Dieu en Israël et que moi, je suis ton serviteur et j''ai fait tout cela sur ton ordre! '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Réponds-moi, Eternel, réponds-moi, afin que ce peuple reconnaisse que c'est toi, Eternel, qui es Dieu, et que c'est toi qui ramènes leur cœur vers toi!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Le feu de l''Eternel tomba alors. Il brûla l''holocauste, le bois, les pierres et la terre, et il avala l''eau qui était dans le fossé. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Quand ils virent cela, tous les membres du peuple tombèrent le visage contre terre et dirent: «C''est l''Eternel qui est Dieu! C''est l''Eternel qui est Dieu!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: «Emparez-vous des prophètes de Baal, leur dit Elie. Qu'aucun d'eux ne puisse s'échapper!» Et ils s'emparèrent d'eux. Elie les fit descendre au bord du torrent du Kison, où il les égorgea.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Puis Elie dit à Achab: «Monte manger et boire, car il y a un grondement annonciateur de pluie.» '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Achab monta manger et boire. Quant à Elie, il monta au sommet du Carmel et, se penchant jusqu''à terre, il mit son visage entre ses genoux. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Puis il dit à son serviteur: «Monte regarder du côté de la mer.» Le serviteur monta, regarda et dit: «Il n''y a rien.» Elie dit sept fois: «Retournes-y.» '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'La septième fois, le serviteur dit: «Voici un petit nuage qui s''élève au-dessus de la mer et qui est de la taille d''une paume de main.» Elie dit: «Monte dire à Achab: ‘Attelle ton char et descends, afin que la pluie ne puisse pas te retenir.’» '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'En quelques instants, le ciel devint noir de nuages, le vent souffla et il y eut une forte pluie. Achab monta sur son char et partit pour Jizreel. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: La main de l'Eternel reposa sur Elie qui noua sa ceinture et courut devant Achab jusqu'à l'entrée de Jizreel.
