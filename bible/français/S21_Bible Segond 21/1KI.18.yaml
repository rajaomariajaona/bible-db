document_id: 1KI.18,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Confrontation entre Elie et les prophètes de Baal
  - type: text
    content: 'Bien des jours passèrent et, au bout de 3 ans, la parole de l''Eternel fut adressée à Elie: «Va te présenter devant Achab et je ferai tomber de la pluie sur le pays.» '
  '10':
  - type: text
    content: 'L''Eternel est vivant! Il n''y a aucune nation ni aucun royaume où mon seigneur n''ait envoyé quelqu''un à ta recherche. Quand on disait que tu n''y étais pas, il faisait jurer le royaume et la nation que l''on ne t''avait pas trouvé. '
  '11':
  - type: text
    content: 'Et maintenant, toi tu dis: ‘Va dire à ton seigneur: Voici Elie!’ '
  '12':
  - type: text
    content: 'Lorsque je t''aurai quitté, l''Esprit de l''Eternel te transportera je ne sais où. Je serai allé informer Achab, mais comme il ne te trouvera pas, il me tuera. Cependant, moi ton serviteur, je crains l''Eternel depuis ma jeunesse. '
  '13':
  - type: text
    content: 'N''a-t-on pas dit à mon seigneur ce que j''ai fait quand Jézabel a tué les prophètes de l''Eternel? J''ai caché 100 prophètes de l''Eternel par groupes de 50 dans des grottes et je les ai nourris de pain et d''eau. '
  '14':
  - type: text
    content: 'Et maintenant, toi tu dis: ‘Va dire à ton seigneur: Voici Elie!’ Il me tuera.» '
  '15':
  - type: text
    content: 'Elie répondit: «L''Eternel, le maître de l''univers, dont je suis le serviteur est vivant! Aujourd''hui je vais me présenter devant Achab.»'
  '16':
  - type: text
    content: 'Abdias alla à la rencontre d''Achab et l''informa de la situation. Achab partit alors à la rencontre d''Elie. '
  '17':
  - type: text
    content: 'A peine l''eut-il aperçu qu''il lui dit: «Est-ce toi qui jettes le trouble en Israël?» '
  '18':
  - type: text
    content: 'Elie répondit: «Je ne trouble pas Israël. Au contraire, c''est toi et ta famille qui le faites, puisque vous avez abandonné les commandements de l''Eternel et que tu as suivi les Baals. '
  '19':
  - type: text
    content: Fais maintenant rassembler tout Israël vers moi, au mont Carmel, avec les 450 prophètes de Baal et les 400 prophètes d'Astarté qui mangent à la table de Jézabel.»
  '2':
  - type: text
    content: 'Elie partit pour se présenter devant Achab. La famine était grande à Samarie. '
  '20':
  - type: text
    content: 'Achab envoya des messagers vers tous les Israélites et rassembla les prophètes au mont Carmel. '
  '21':
  - type: text
    content: 'Alors Elie s''approcha de tout le peuple et dit: «Jusqu''à quand aurez-vous un comportement boiteux? Si c''est l''Eternel qui est Dieu, suivez-le! Si c''est Baal, suivez-le!» Le peuple ne lui répondit rien. '
  '22':
  - type: text
    content: 'Elie dit au peuple: «Je suis resté le seul prophète de l''Eternel, et il y a 450 prophètes de Baal. '
  '23':
  - type: text
    content: 'Que l''on nous donne deux taureaux. Qu''ils choisissent pour eux l''un des taureaux, le coupent en morceaux et le placent sur le bois, sans y mettre le feu. De mon côté, je préparerai l''autre taureau et je le placerai sur le bois, sans y mettre le feu. '
  '24':
  - type: text
    content: 'Puis faites appel au nom de votre dieu. Quant à moi, je ferai appel au nom de l''Eternel. Le dieu qui répondra par le feu, c''est celui-là qui sera Dieu.» Tout le peuple répondit: «C''est bien!»'
  '25':
  - type: text
    content: 'Elie dit aux prophètes de Baal: «Choisissez pour vous l''un des taureaux et préparez-le les premiers, puisque vous êtes les plus nombreux. Ensuite, faites appel au nom de votre dieu, mais n''allumez pas le feu.» '
  '26':
  - type: text
    content: 'Ils prirent le taureau qu''on leur donna et le préparèrent. Puis ils firent appel au nom de Baal depuis le matin jusqu''à midi en disant: «Baal, réponds-nous!» Mais il n''y eut ni voix ni réponse, même s''ils sautaient devant l''autel qu''ils avaient érigé. '
  '27':
  - type: text
    content: 'A midi, Elie se moqua d''eux et dit: «Criez à haute voix! Puisqu''il est dieu, il doit être en train de penser à quelque chose, ou bien il est occupé, ou encore en voyage. Peut-être même qu''il dort et qu''il va se réveiller.» '
  '28':
  - type: text
    content: 'Ils crièrent à haute voix et, conformément à leur coutume, ils se firent des incisions avec des épées et avec des lances jusqu''à ce que le sang coule sur eux. '
  '29':
  - type: text
    content: Lorsque midi fut passé, ils prophétisèrent jusqu'au moment de la présentation de l'offrande. Mais il n'y eut ni voix, ni réponse, ni signe d'attention.
  '3':
  - type: text
    content: 'Quant à Achab, il fit appeler Abdias, le chef de son palais. Or, Abdias craignait beaucoup l''Eternel; '
  '30':
  - type: text
    content: 'Elie dit alors à tout le peuple: «Approchez-vous de moi!» Tout le peuple s''approcha de lui. Elie répara l''autel de l''Eternel, qui avait été démoli. '
  '31':
  - type: text
    content: 'Il prit 12 pierres, d''après le nombre des tribus issues des fils de Jacob, l''homme auquel l''Eternel avait dit: «Tu t''appelleras Israël.»'
  - type: note
    content: 'Tu t''appelleras Israël: voir Genèse 32.29.'
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'Avec ces pierres, il reconstruisit un autel au nom de l''Eternel. Il fit autour de l''autel un fossé pouvant contenir une quinzaine de litres. '
  '33':
  - type: text
    content: 'Il arrangea le bois, coupa le taureau en morceaux et le plaça sur le bois. '
  '34':
  - type: text
    content: 'Puis il dit: «Remplissez d''eau quatre cruches et versez-les sur l''holocauste et sur le bois.» Il dit: «Faites-le une deuxième fois.» Et ils le firent une deuxième fois. Il dit: «Faites-le une troisième fois.» Et ils le firent une troisième fois. '
  '35':
  - type: text
    content: L'eau coula tout autour de l'autel et l'on remplit aussi d'eau le fossé.
  '36':
  - type: text
    content: 'Au moment de la présentation de l''offrande, le prophète Elie s''avança et dit: «Eternel, Dieu d''Abraham, d''Isaac et d''Israël! Que l''on sache aujourd''hui que c''est toi qui es Dieu en Israël et que moi, je suis ton serviteur et j''ai fait tout cela sur ton ordre! '
  '37':
  - type: text
    content: Réponds-moi, Eternel, réponds-moi, afin que ce peuple reconnaisse que c'est toi, Eternel, qui es Dieu, et que c'est toi qui ramènes leur cœur vers toi!»
  '38':
  - type: text
    content: 'Le feu de l''Eternel tomba alors. Il brûla l''holocauste, le bois, les pierres et la terre, et il avala l''eau qui était dans le fossé. '
  '39':
  - type: text
    content: 'Quand ils virent cela, tous les membres du peuple tombèrent le visage contre terre et dirent: «C''est l''Eternel qui est Dieu! C''est l''Eternel qui est Dieu!»'
  '4':
  - type: text
    content: 'lorsque Jézabel avait exterminé les prophètes de l''Eternel, il avait pris 100 prophètes et les avait cachés par groupes de 50 dans des grottes, où il les avait nourris de pain et d''eau. '
  '40':
  - type: text
    content: «Emparez-vous des prophètes de Baal, leur dit Elie. Qu'aucun d'eux ne puisse s'échapper!» Et ils s'emparèrent d'eux. Elie les fit descendre au bord du torrent du Kison, où il les égorgea.
  '41':
  - type: text
    content: 'Puis Elie dit à Achab: «Monte manger et boire, car il y a un grondement annonciateur de pluie.» '
  '42':
  - type: text
    content: 'Achab monta manger et boire. Quant à Elie, il monta au sommet du Carmel et, se penchant jusqu''à terre, il mit son visage entre ses genoux. '
  '43':
  - type: text
    content: 'Puis il dit à son serviteur: «Monte regarder du côté de la mer.» Le serviteur monta, regarda et dit: «Il n''y a rien.» Elie dit sept fois: «Retournes-y.» '
  '44':
  - type: text
    content: 'La septième fois, le serviteur dit: «Voici un petit nuage qui s''élève au-dessus de la mer et qui est de la taille d''une paume de main.» Elie dit: «Monte dire à Achab: ‘Attelle ton char et descends, afin que la pluie ne puisse pas te retenir.’» '
  '45':
  - type: text
    content: 'En quelques instants, le ciel devint noir de nuages, le vent souffla et il y eut une forte pluie. Achab monta sur son char et partit pour Jizreel. '
  '46':
  - type: text
    content: La main de l'Eternel reposa sur Elie qui noua sa ceinture et courut devant Achab jusqu'à l'entrée de Jizreel.
  '5':
  - type: text
    content: 'Achab dit à Abdias: «Va vers toutes les sources d''eau et vers tous les torrents du pays. Peut-être trouveras-tu de l''herbe. Ainsi, nous pourrons garder les chevaux et les mulets en vie, et nous n''aurons pas besoin d''abattre du bétail.» '
  '6':
  - type: text
    content: Ils se partagèrent le pays à parcourir; Achab partit seul par un chemin, et Abdias par un autre.
  '7':
  - type: text
    content: 'Abdias était en route quand Elie le rencontra. L''ayant reconnu, Abdias tomba le visage contre terre et dit: «Est-ce toi, mon seigneur Elie?» '
  '8':
  - type: text
    content: 'Il lui répondit: «C''est bien moi. Va dire à ton seigneur: ‘Voici Elie!’» '
  '9':
  - type: text
    content: 'Abdias dit: «Quel péché ai-je commis, pour que tu me livres, moi ton serviteur, entre les mains d''Achab? Il me fera mourir! '
