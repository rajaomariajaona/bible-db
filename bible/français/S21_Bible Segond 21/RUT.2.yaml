document_id: RUT.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rencontre de Ruth et Boaz
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Naomi avait un parent de son mari. C'était un homme puissant et riche du clan d'Elimélec qui s'appelait Boaz.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ruth la Moabite dit à Naomi: «Laisse-moi aller ramasser des épis abandonnés dans un champ, derrière celui aux yeux duquel je trouverai grâce.» Elle lui répondit: «Vas-y, ma fille.» '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ruth alla ramasser des épis dans un champ, derrière les moissonneurs. Il se trouva que la parcelle de terre appartenait à Boaz, du clan d''Elimélec. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Or, Boaz vint de Bethléhem. Il dit aux moissonneurs: «Que l''Eternel soit avec vous!» Ils lui répondirent: «Que l''Eternel te bénisse!» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Boaz dit à son serviteur chargé de surveiller les moissonneurs: «A qui est cette jeune femme?» '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le serviteur chargé de surveiller les moissonneurs répondit: «C''est une jeune femme moabite qui est revenue avec Naomi du pays de Moab. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Elle a dit: ‘Permettez-moi donc de glaner, de ramasser des épis entre les gerbes derrière les moissonneurs’ et, depuis son arrivée ce matin jusqu''à présent, elle est restée debout et ne s''est reposée qu''un moment dans la maison.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Boaz dit à Ruth: «Ecoute, ma fille, ne va pas ramasser des épis dans un autre champ; ne t''éloigne pas d''ici, reste avec mes servantes. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Regarde où l''on moissonne dans le champ et va après elles. J''ai défendu à mes serviteurs de te toucher. Quand tu auras soif, tu iras aux vases et tu boiras de ce que les serviteurs auront puisé.» '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors elle tomba le visage contre terre, se prosterna et lui dit: «Comment ai-je trouvé grâce à tes yeux pour que tu t''intéresses à moi, une étrangère?» '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Boaz lui répondit: «On m''a rapporté tout ce que tu as fait pour ta belle-mère depuis la mort de ton mari et comment tu as quitté ton père et ta mère et le pays de ta naissance pour aller vers un peuple que tu ne connaissais pas auparavant. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Que l''Eternel te rende ce que tu as fait et que ta récompense soit entière de la part de l''Eternel, le Dieu d''Israël, sous les ailes duquel tu es venue te réfugier!» '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Elle dit: «Oh! Que je trouve grâce à tes yeux, mon seigneur, car tu m''as consolée et tu as parlé au cœur de ta servante. Pourtant je ne suis pas, moi, comme l''une de tes servantes.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Au moment du repas, Boaz dit à Ruth: «Approche-toi, mange du pain, trempe ton morceau dans la vinaigrette.» Elle s''assit à côté des moissonneurs. On lui donna du grain rôti; elle mangea à satiété et garda le reste. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Puis elle se leva pour ramasser des épis. Boaz donna cet ordre à ses serviteurs: «Qu''elle ramasse aussi des épis entre les gerbes et ne lui faites aucun mal. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Vous retirerez même pour elle des gerbes quelques épis que vous la laisserez ramasser sans lui faire de reproches.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Elle ramassa des épis dans le champ jusqu''au soir, puis elle battit ce qu''elle avait récolté. Il y eut environ 22 litres d''orge. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Elle l''emporta et rentra dans la ville, et sa belle-mère vit ce qu''elle avait ramassé. Elle sortit aussi les restes de son repas et les lui donna. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Sa belle-mère lui dit: «Où as-tu ramassé des épis aujourd''hui? Où as-tu travaillé? Béni soit celui qui s''est intéressé à toi!» Ruth raconta à sa belle-mère chez qui elle avait travaillé: «L''homme chez qui j''ai travaillé aujourd''hui s''appelle Boaz», dit-elle. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Naomi dit à sa belle-fille: «Qu''il soit béni de l''Eternel, qui garde sa bonté pour les vivants comme pour les morts! Cet homme nous est proche – lui dit encore Naomi – il est un de ceux qui ont droit de rachat'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Droit de rachat: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: d'après la loi, lorsqu'un Israélite avait vendu sa propriété, un de ses proches parents avait le droit de la racheter et faisait ainsi office de défenseur du pauvre.
    marker-yv: yv-n
  - type: text
    text: ' sur nous.» '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ruth la Moabite ajouta: «Il m''a dit aussi: ‘Reste avec mes serviteurs jusqu''à ce qu''ils aient terminé toute ma moisson.’» '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Naomi dit à sa belle-fille Ruth: «Il est bon que tu sortes avec ses servantes, ma fille, et qu''on ne te rencontre pas dans un autre champ.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Ruth resta donc avec les servantes de Boaz pour ramasser des épis jusqu'à la fin de la moisson de l'orge et de la moisson du blé. Elle habitait avec sa belle-mère.
