document_id: JOS.19,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Territoires accordés aux six dernières tribus
  - type: text
    content: La deuxième part fut attribuée par tirage au sort à Siméon, aux clans de la tribu de Siméon. Leur héritage était situé au milieu de celui des Judéens.
  '10':
  - type: text
    content: 'La troisième part fut attribuée par tirage au sort aux clans des Zabulonites. La frontière de leur héritage s''étendait jusqu''à Sarid. '
  '11':
  - type: text
    content: 'Elle montait à l''ouest vers Mareala et touchait Dabbésheth, puis le torrent qui coule devant Jokneam. '
  '12':
  - type: text
    content: 'De Sarid elle tournait à l''est, vers le soleil levant, jusqu''à la frontière de Kisloth-Thabor, continuait à Dabrath et montait à Japhia. '
  '13':
  - type: text
    content: 'De là elle passait à l''est par Guittha-Hépher, par Ittha-Katsin, continuait à Rimmon et se prolongeait jusqu''à Néa. '
  '14':
  - type: text
    content: 'Elle tournait ensuite du côté du nord vers Hannathon et débouchait sur la vallée de Jiphthach-El. '
  '15':
  - type: text
    content: Leur territoire comprenait en outre Katthath, Nahalal, Shimron, Jideala, Bethléhem. Il y avait 12 villes avec leurs villages.
  '16':
  - type: text
    content: Tel fut l'héritage des clans des Zabulonites. C'étaient ces villes-là et leurs villages.
  '17':
  - type: text
    content: La quatrième part fut attribuée par tirage au sort à Issacar, aux clans des Issacarites.
  '18':
  - type: text
    content: 'Leur frontière passait par Jizreel, Kesulloth, Sunem, '
  '19':
  - type: text
    content: 'Hapharaïm, Shion, Anacharath, '
  '2':
  - type: text
    content: 'Ils eurent dans leur héritage Beer-Shéba, Shéba, Molada, '
  '20':
  - type: text
    content: 'Rabbith, Kishjon, Abets, '
  '21':
  - type: text
    content: 'Rémeth, En-Gannim, En-Hadda et Beth-Patsets. '
  '22':
  - type: text
    content: Elle touchait Thabor, Shachatsima, Beth-Shémesh et débouchait sur le Jourdain. Leur territoire comprenait 16 villes avec leurs villages.
  '23':
  - type: text
    content: Tel fut l'héritage des clans de la tribu d'Issacar. C'étaient ces villes-là avec leurs villages.
  '24':
  - type: text
    content: La cinquième part fut attribuée par tirage au sort aux clans de la tribu d'Aser.
  '25':
  - type: text
    content: 'Leur frontière passait par Helkath, Hali, Béthen, Acshaph, '
  '26':
  - type: text
    content: 'Allammélec, Amead et Misheal; elle touchait, vers l''ouest, le Carmel et le Shichor-Libnath. '
  '27':
  - type: text
    content: 'Puis elle tournait du côté de l''est à Beth-Dagon, atteignait Zabulon et la vallée de Jiphthach-El au nord de Beth-Emek et de Neïel et se prolongeait vers Cabul, à gauche, '
  '28':
  - type: text
    content: 'ainsi que vers Ebron, Rehob, Hammon et Kana jusqu''à Sidon la grande. '
  '29':
  - type: text
    content: 'Elle tournait ensuite vers Rama jusqu''à la ville fortifiée de Tyr et vers Hosa, pour déboucher sur la mer en passant par la région d''Aczib. '
  '3':
  - type: text
    content: 'Hatsar-Shual, Bala, Atsem, '
  '30':
  - type: text
    content: Leur territoire comprenait de plus Umma, Aphek et Rehob. Il y avait 22 villes avec leurs villages.
  '31':
  - type: text
    content: Tel fut l'héritage des clans de la tribu d'Aser. C'étaient ces villes-là et leurs villages.
  '32':
  - type: text
    content: La sixième part fut attribuée par tirage au sort aux clans des Nephthalites.
  '33':
  - type: text
    content: 'Leur frontière s''étendait depuis Héleph, depuis le chêne de Tsaanannim, passait par Adami-Nékeb et Jabneel jusqu''à Lakkum et débouchait sur le Jourdain. '
  '34':
  - type: text
    content: 'Elle tournait vers l''ouest à Aznoth-Thabor et de là continuait à Hukkok. Elle touchait Zabulon du côté du sud, Aser du côté de l''ouest et Juda. Le Jourdain était du côté de l''est. '
  '35':
  - type: text
    content: 'Les villes fortifiées étaient Tsiddim, Tser, Hammath, Rakkath, Génésareth, '
  '36':
  - type: text
    content: 'Adama, Rama, Hatsor, '
  '37':
  - type: text
    content: 'Kédesh, Edreï, En-Hatsor, '
  '38':
  - type: text
    content: Jireon, Migdal-El, Horem, Beth-Anath et Beth-Shémesh. Il y avait 19 villes avec leurs villages.
  '39':
  - type: text
    content: Tel fut l'héritage des clans de la tribu de Nephthali. C'étaient ces villes-là et leurs villages.
  '4':
  - type: text
    content: 'Eltholad, Bethul, Horma, '
  '40':
  - type: text
    content: La septième part fut attribuée par tirage au sort aux clans de la tribu de Dan.
  '41':
  - type: text
    content: 'Le territoire dont ils héritèrent comprenait Tsorea, Eshthaol, Ir-Shémesh, '
  '42':
  - type: text
    content: 'Shaalabbin, Ajalon, Jithla, '
  '43':
  - type: text
    content: 'Elon, Thimnatha, Ekron, '
  '44':
  - type: text
    content: 'Eltheké, Guibbethon, Baalath, '
  '45':
  - type: text
    content: 'Jehud, Bené-Berak, Gath-Rimmon, '
  '46':
  - type: text
    content: 'Mé-Jarkon et Rakkon, avec le territoire qui fait face à Jaffa. '
  '47':
  - type: text
    content: Toutefois, le territoire des Danites dépassa ces limites. Les Danites montèrent et combattirent contre Léshem. Ils s'en emparèrent et la frappèrent du tranchant de l'épée. Ils en prirent possession, s'y installèrent et l'appelèrent Dan, du nom de leur ancêtre Dan.
  '48':
  - type: text
    content: Tel fut l'héritage des clans de la tribu de Dan. C'étaient ces villes-là et leurs villages.
  - type: heading
    content: Territoire accordé à Josué
  '49':
  - type: text
    content: 'Lorsqu''ils eurent fini de procéder au partage du pays d''après ses frontières, les Israélites donnèrent à Josué, fils de Nun, une possession au milieu d''eux. '
  '5':
  - type: text
    content: 'Tsiklag, Beth-Marcaboth, Hatsar-Susa, '
  '50':
  - type: text
    content: 'Conformément à l''ordre de l''Eternel, ils lui donnèrent la ville qu''il avait demandée: Thimnath-Sérach, dans la région montagneuse d''Ephraïm. Josué reconstruisit la ville et y habita.'
  '51':
  - type: text
    content: Tels sont les héritages que le prêtre Eléazar, Josué, fils de Nun, et les chefs de famille des tribus israélites distribuèrent par tirage au sort devant l'Eternel à Silo, à l'entrée de la tente de la rencontre. Ils mirent ainsi un terme au partage du pays.
  '6':
  - type: text
    content: 'Beth-Lebaoth et Sharuchen, soit 13 villes avec leurs villages; '
  '7':
  - type: text
    content: 'Aïn, Rimmon, Ether et Ashan, soit 4 villes avec leurs villages. '
  '8':
  - type: text
    content: 'Ils eurent aussi tous les villages situés aux environs de ces villes jusqu''à Baalath-Beer, c''est-à-dire Ramath du sud. Tel fut l''héritage des clans de la tribu de Siméon. '
  '9':
  - type: text
    content: L'héritage des Siméonites fut pris sur la portion des Judéens. En effet, la portion des Judéens était trop grande pour eux et c'est au milieu de leur héritage que les Siméonites reçurent le leur.
