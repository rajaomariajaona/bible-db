document_id: DEU.17,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: »Tu n'offriras en sacrifice à l'Eternel, ton Dieu, ni bœuf, ni agneau qui ait un défaut ou une tare quelconque, car ce serait un acte abominable pour l'Eternel, ton Dieu.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Tu te conformeras à ce qu''ils te diront à l''endroit que l''Eternel choisira et tu prendras bien soin d''agir d''après tout ce qu''ils t''enseigneront. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Tu te conformeras à la loi qu''ils t''enseigneront et au verdict qu''ils auront prononcé. Tu ne t''écarteras ni à droite ni à gauche de ce qu''ils te diront. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Si, par orgueil, un homme n''écoute pas le prêtre placé là pour servir l''Eternel, ton Dieu, ou le juge, il sera puni de mort. Tu extirperas ainsi le mal du milieu d''Israël, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: afin que tout le peuple en entende parler et éprouve de la crainte, et qu'il ne se livre plus à l'orgueil.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règles relatives à la royauté
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: '»Lorsque tu seras entré dans le pays que l''Eternel, ton Dieu, te donne, lorsque tu le posséderas, que tu y auras établi ta demeure et que tu diras: ‘Je veux établir à ma tête un roi, comme toutes les nations qui m''entourent’, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'tu établiras à ta tête le roi que l''Eternel, ton Dieu, choisira. Tu prendras un roi du milieu de tes frères, tu ne pourras pas te donner un roi étranger qui ne soit pas ton frère. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Seulement, qu''il n''ait pas un grand nombre de chevaux et qu''il ne ramène pas le peuple en Egypte pour se procurer beaucoup de chevaux, car l''Eternel vous a dit: ‘Vous ne retournerez plus par ce chemin-là.’ '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Qu''il n''ait pas un grand nombre de femmes, afin que son cœur ne se détourne pas de l''Eternel, et qu''il n''accumule pas l''argent et l''or. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Quand il montera sur son trône royal, il écrira pour lui, dans un livre, une copie de cette loi qu''il prendra auprès des prêtres, les Lévites. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Il devra l''avoir avec lui et y lire tous les jours de sa vie, afin d''apprendre à craindre l''Eternel, son Dieu, à respecter et à mettre en pratique toutes les paroles de cette loi et toutes ces prescriptions, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '»Il se trouvera peut-être au milieu de toi, dans l''une des villes que l''Eternel, ton Dieu, te donne, un homme ou une femme qui fasse ce qui est mal aux yeux de l''Eternel, ton Dieu, et viole son alliance, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: afin que son cœur ne s'élève pas au-dessus de ses frères et qu'il ne s'écarte ni à droite ni à gauche de ces commandements, afin qu'il vive longtemps dans son royaume, au milieu d'Israël, lui et ses enfants.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'qui aille servir d''autres dieux et se prosterner devant eux: le soleil, la lune ou tous les corps célestes. Ce n''est pas ce que j''ai ordonné. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Dès que tu en auras connaissance, dès que tu l''auras appris, tu feras avec soin des recherches: est-ce vrai, le fait est-il établi, cet acte abominable a-t-il été commis en Israël? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Alors tu feras venir aux portes de ta ville l''homme ou la femme coupable de cette mauvaise action et tu le lapideras, tu le puniras de mort. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '*C''est sur la déposition de 2 ou de 3 témoins que l''on fera mourir quelqu''un'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'C''est… quelqu''un: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'principe cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hébreux 10.28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', déjà évoqué en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nombres 35.30
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '; la déposition d''un seul témoin ne suffira pas. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: La main des témoins se lèvera la première contre lui pour le faire mourir, puis celle de tout le peuple. Tu extirperas ainsi le mal du milieu de toi.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les juges
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '»Si une cause relative à un meurtre, à un différend ou une blessure te paraît trop difficile à juger et fournit matière à contestation aux portes de ta ville, tu te lèveras et tu monteras à l''endroit que l''Eternel, ton Dieu, choisira. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Tu iras vers les prêtres, les Lévites, et vers celui qui remplira alors les fonctions de juge. Tu les consulteras et ils te feront connaître leur verdict. '
