document_id: JOB.12,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Intervention n° 4 de Job
  - type: text
    content: 'Job prit la parole et dit:'
  '10':
  - type: text
    content: Il tient dans sa main l'âme de tout ce qui vit,
  - type: text
    content: l'esprit qui anime tout être humain.
  '11':
  - type: text
    content: L'oreille ne jauge-t-elle pas les propos
  - type: text
    content: et le palais ne goûte-t-il pas la nourriture?
  '12':
  - type: text
    content: De même, c'est aux personnes âgées qu'est attribuée la sagesse,
  - type: text
    content: une longue vie est synonyme de discernement.
  '13':
  - type: text
    content: »C'est auprès de Dieu que se trouvent la sagesse et la puissance,
  - type: text
    content: c'est à lui qu'appartiennent le conseil et l'intelligence.
  '14':
  - type: text
    content: Ce qu'il abat ne sera pas reconstruit,
  - type: text
    content: l'homme qu'il enferme ne sera pas relâché.
  '15':
  - type: text
    content: Qu'il retienne l'eau et tout se dessèche,
  - type: text
    content: qu'il l'envoie et c'est la dévastation pour la terre.
  '16':
  - type: text
    content: »C'est auprès de Dieu que se trouvent la force et le succès.
  - type: text
    content: Il maîtrise celui qui s'égare ou fait égarer les autres.
  '17':
  - type: text
    content: C'est lui qui fait marcher les conseillers du pays dans l'humiliation,
  - type: text
    content: qui affole les juges.
  '18':
  - type: text
    content: Il diminue l'autorité des rois,
  - type: text
    content: il met une corde autour de leur taille.
  '19':
  - type: text
    content: C'est lui qui fait marcher les prêtres dans l'humiliation,
  - type: text
    content: qui renverse les autorités les plus stables.
  '2':
  - type: text
    content: «On dirait, en vérité, que vous représentez tout le genre humain
  - type: text
    content: et que la sagesse mourra avec vous.
  '20':
  - type: text
    content: C'est lui qui enlève la parole aux orateurs habiles,
  - type: text
    content: qui prive les personnes âgées de bon sens.
  '21':
  - type: text
    content: C'est lui qui déverse le mépris sur les grands,
  - type: text
    content: qui prive de leurs aptitudes les hommes forts.
  '22':
  - type: text
    content: C'est lui qui révèle les profondeurs des ténèbres,
  - type: text
    content: qui expose l'ombre de la mort à la lumière.
  '23':
  - type: text
    content: C'est lui qui donne de la prospérité aux nations et qui les fait disparaître,
  - type: text
    content: qui élargit leur territoire et se montre leur guide.
  '24':
  - type: text
    content: C'est lui qui prive d'intelligence les chefs du pays,
  - type: text
    content: qui les fait errer dans des déserts dépourvus de chemin.
  '25':
  - type: text
    content: Ils tâtonnent alors dans les ténèbres, privés de lumière,
  - type: text
    content: il les fait errer comme des hommes ivres.
  '3':
  - type: text
    content: J'ai tout autant d'intelligence que vous,
  - type: text
    content: je ne vous suis en rien inférieur.
  - type: text
    content: Du reste, qui ignore ce que vous dites?
  '4':
  - type: text
    content: »Je suis un homme dont les amis se moquent,
  - type: text
    content: moi qui faisais appel à Dieu et à qui il répondait.
  - type: text
    content: Le juste, l'homme intègre, un objet de moquerie!
  '5':
  - type: text
    content: ‘Il faut mépriser le malheur!’ telle est la devise des hommes heureux.
  - type: text
    content: Le mépris, voilà ce qu'ils réservent à ceux dont le pied trébuche.
  '6':
  - type: text
    content: »La tranquillité règne sous les tentes des pillards, la sécurité chez ceux qui provoquent Dieu, chez celui qui se fait un dieu de sa force.
  '7':
  - type: text
    content: »Mais interroge donc les bêtes et elles t'enseigneront,
  - type: text
    content: les oiseaux et ils te l'apprendront,
  '8':
  - type: text
    content: ou parle à la terre et elle t'enseignera,
  - type: text
    content: 'et les poissons de la mer te le raconteront:'
  '9':
  - type: text
    content: qui ne reconnaît pas, chez eux, la preuve
  - type: text
    content: que c'est la main de l'Eternel qui a fait tout cela?
