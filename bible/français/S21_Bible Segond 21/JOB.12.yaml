document_id: JOB.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Intervention n° 4 de Job
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Job prit la parole et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «On dirait, en vérité, que vous représentez tout le genre humain
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que la sagesse mourra avec vous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: J'ai tout autant d'intelligence que vous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne vous suis en rien inférieur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Du reste, qui ignore ce que vous dites?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: »Je suis un homme dont les amis se moquent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: moi qui faisais appel à Dieu et à qui il répondait.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le juste, l'homme intègre, un objet de moquerie!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ‘Il faut mépriser le malheur!’ telle est la devise des hommes heureux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le mépris, voilà ce qu'ils réservent à ceux dont le pied trébuche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: »La tranquillité règne sous les tentes des pillards, la sécurité chez ceux qui provoquent Dieu, chez celui qui se fait un dieu de sa force.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: »Mais interroge donc les bêtes et elles t'enseigneront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les oiseaux et ils te l'apprendront,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ou parle à la terre et elle t'enseignera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et les poissons de la mer te le raconteront:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: qui ne reconnaît pas, chez eux, la preuve
- type: usfm
  marker: q1
  children:
  - type: text
    text: que c'est la main de l'Eternel qui a fait tout cela?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il tient dans sa main l'âme de tout ce qui vit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'esprit qui anime tout être humain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L'oreille ne jauge-t-elle pas les propos
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le palais ne goûte-t-il pas la nourriture?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: De même, c'est aux personnes âgées qu'est attribuée la sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une longue vie est synonyme de discernement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: »C'est auprès de Dieu que se trouvent la sagesse et la puissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est à lui qu'appartiennent le conseil et l'intelligence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ce qu'il abat ne sera pas reconstruit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'homme qu'il enferme ne sera pas relâché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Qu'il retienne l'eau et tout se dessèche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'il l'envoie et c'est la dévastation pour la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: »C'est auprès de Dieu que se trouvent la force et le succès.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il maîtrise celui qui s'égare ou fait égarer les autres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: C'est lui qui fait marcher les conseillers du pays dans l'humiliation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui affole les juges.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il diminue l'autorité des rois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il met une corde autour de leur taille.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: C'est lui qui fait marcher les prêtres dans l'humiliation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui renverse les autorités les plus stables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: C'est lui qui enlève la parole aux orateurs habiles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui prive les personnes âgées de bon sens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: C'est lui qui déverse le mépris sur les grands,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui prive de leurs aptitudes les hommes forts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: C'est lui qui révèle les profondeurs des ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui expose l'ombre de la mort à la lumière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: C'est lui qui donne de la prospérité aux nations et qui les fait disparaître,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui élargit leur territoire et se montre leur guide.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: C'est lui qui prive d'intelligence les chefs du pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui les fait errer dans des déserts dépourvus de chemin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ils tâtonnent alors dans les ténèbres, privés de lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il les fait errer comme des hommes ivres.
