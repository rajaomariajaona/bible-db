document_id: JOS.9,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ruse des Gabaonites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'A la nouvelle de ces événements, tous les rois qui se trouvaient à l''ouest du Jourdain, dans la montagne et dans la vallée et sur toute la côte de la mer Méditerranée jusque près du Liban, les Hittites, les Amoréens, les Cananéens, les Phéréziens, les Héviens et les Jébusiens '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'et de la manière dont il a traité les deux rois des Amoréens de l''autre côté du Jourdain: Sihon, roi de Hesbon, et Og, roi du Basan, qui vivait à Ashtaroth. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Nos anciens et tous les habitants de notre pays nous ont dit: ‘Prenez avec vous des provisions pour le voyage, allez à leur rencontre et dites-leur: Nous sommes vos serviteurs. Faites maintenant alliance avec nous.’ '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Voici notre pain: il était encore chaud quand nous en avons fait provision dans nos maisons, le jour où nous sommes partis pour venir vers vous, et maintenant il est tout sec et en miettes. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ces outres à vin, que nous avons remplies toutes neuves, les voilà déchirées. Nos vêtements et nos sandales se sont usés à cause de la très grande longueur du trajet.» '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Les hommes d''Israël acceptèrent les provisions des Gabaonites et ne consultèrent pas l''Eternel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Josué fit la paix avec eux et conclut une alliance par laquelle il devait leur laisser la vie, et les chefs de l'assemblée leur en firent le serment.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Trois jours après la conclusion de cette alliance, ils apprirent que ces hommes étaient leurs voisins et habitaient sur leur territoire. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'En effet, les Israélites partirent de leur camp et parvinrent vers leurs villes le troisième jour; il s''agissait de Gabaon, Kephira, Beéroth et Kirjath-Jearim. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ils ne tuèrent pas les Gabaonites parce que les chefs de l''assemblée leur avaient juré par l''Eternel, le Dieu d''Israël, de leur laisser la vie, mais toute l''assemblée murmura contre les chefs. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tous les chefs dirent à toute l''assemblée: «Nous leur avons prêté serment au nom de l''Eternel, le Dieu d''Israël, et maintenant nous ne pouvons pas les toucher. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: s'unirent d'un commun accord pour combattre ensemble contre Josué et contre Israël.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Voici comment nous les traiterons: nous leur laisserons la vie, afin de ne pas attirer sur nous la colère de l''Eternel à cause du serment que nous leur avons fait.» '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: «Ils vivront», leur dirent les chefs, mais ils furent employés à couper le bois et à puiser l'eau pour toute l'assemblée, comme les chefs le leur avaient dit.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Josué fit appeler les Gabaonites et leur dit: «Pourquoi nous avez-vous trompés en disant: ‘Nous sommes très éloignés de vous’ alors que vous habitez sur notre territoire? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Maintenant vous êtes maudits et vous ne cesserez pas d''être dans l''esclavage, de couper du bois et de puiser de l''eau pour la maison de mon Dieu.» '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Ils répondirent à Josué: «On avait rapporté à tes serviteurs les ordres de l''Eternel, ton Dieu, à Moïse, son serviteur. Il y était question de vous livrer tout le pays et de détruire devant vous tous ses habitants, et votre présence nous a inspiré une grande peur pour notre vie. Voilà pourquoi nous avons agi de cette façon. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Et maintenant, nous voici entre tes mains. Traite-nous comme tu trouveras bon et juste de le faire.» '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Josué agit envers eux comme il avait été décidé: il les délivra des Israélites, qui ne les firent pas mourir, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: mais il les destina dès ce jour à couper du bois et à puiser de l'eau pour l'assemblée et pour l'autel de l'Eternel à l'endroit que l'Eternel choisirait. C'est ce qu'ils font encore aujourd'hui.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Les habitants de Gabaon, de leur côté, lorsqu''ils apprirent de quelle manière Josué avait traité Jéricho et Aï, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'eurent recours à la ruse. Ils se mirent en route avec des provisions de voyage. Ils prirent de vieux sacs pour leurs ânes, ainsi que de vieilles outres à vin déchirées et recousues. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ils portaient à leurs pieds de vieilles sandales raccommodées, et sur eux de vieux vêtements. Et tout le pain qu''ils avaient pour nourriture était sec et en miettes. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ils allèrent trouver Josué au camp de Guilgal et lui dirent, ainsi qu''à tous ceux d''Israël: «Nous venons d''un pays éloigné. Faites maintenant alliance avec nous.» '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Les hommes d''Israël répondirent à ces Héviens: «Peut-être habitez-vous sur notre territoire. Comment ferions-nous alors alliance avec vous?» '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ils dirent à Josué: «Nous sommes tes serviteurs.» Josué leur demanda: «Qui êtes-vous et d''où venez-vous?» '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ils lui répondirent: «Tes serviteurs viennent d''un pays très éloigné, à cause de la renommée de l''Eternel, ton Dieu. En effet, nous avons entendu parler de lui, de tout ce qu''il a fait en Egypte '
