document_id: ZEC.7
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Les jeûnes
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 7.1–8.23
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Causes de la colère de Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La quatrième année du règne de Darius, la parole de l''Eternel fut adressée à Zacharie le quatrième jour du neuvième mois, qui est le mois de Kisleu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'La ville de Béthel avait envoyé Sharetser et Réguem-Mélec avec ses hommes pour implorer l''Eternel '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'en disant aux prêtres de la maison de l''Eternel, le maître de l''univers, et aux prophètes: «Dois-je pleurer le cinquième mois en me privant, comme je l''ai fait tant d''années?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'La parole de l''Eternel, le maître de l''univers, m''a été adressée: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '«Dis à tout le peuple du pays et aux prêtres: ‘Quand vous avez jeûné et pleuré le cinquième et le septième mois, et cela depuis 70 ans, est-ce pour moi que vous avez jeûné? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et quand vous mangez et buvez, n''est-ce pas pour vous que vous mangez et buvez?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ne connaissez-vous pas les paroles qu'a proclamées l'Eternel par les premiers prophètes, lorsque Jérusalem et les villes qui l'entourent étaient habitées et tranquilles et que le sud et la plaine étaient habités?»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'La parole de l''Eternel fut adressée à Zacharie: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '«Voici ce que disait l''Eternel, le maître de l''univers: ‘Rendez la justice conformément à la vérité et agissez l''un envers l''autre avec bonté et compassion. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: N'opprimez pas la veuve et l'orphelin, l'étranger et le pauvre, et ne méditez pas l'un contre l'autre le mal dans votre cœur.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '»Mais ils ont refusé d''être attentifs, ils se sont révoltés et ils ont endurci leurs oreilles pour ne pas entendre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils ont rendu leur cœur dur comme le diamant pour ne pas écouter la loi et les paroles que l''Eternel, le maître de l''univers, leur adressait par son Esprit, par les premiers prophètes. Alors l''Eternel, le maître de l''univers, s''est enflammé d''une grande colère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quand il appelait, ils n''ont pas écouté, c''est pourquoi – dit l''Eternel, le maître de l''univers – je n''écouterai pas quand ils appelleront. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je les ai dispersés parmi toutes sortes de nations qu'ils ne connaissaient pas; le pays a été dévasté derrière eux, personne n'y passait, personne n'y revenait. D'un pays de délices ils ont fait un désert.»
