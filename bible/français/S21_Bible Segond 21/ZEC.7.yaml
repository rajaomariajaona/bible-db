document_id: ZEC.7,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les jeûnes
  - type: heading
    content: 7.1–8.23
  - type: heading
    content: Causes de la colère de Dieu
  - type: text
    content: 'La quatrième année du règne de Darius, la parole de l''Eternel fut adressée à Zacharie le quatrième jour du neuvième mois, qui est le mois de Kisleu. '
  '10':
  - type: text
    content: N'opprimez pas la veuve et l'orphelin, l'étranger et le pauvre, et ne méditez pas l'un contre l'autre le mal dans votre cœur.’
  '11':
  - type: text
    content: '»Mais ils ont refusé d''être attentifs, ils se sont révoltés et ils ont endurci leurs oreilles pour ne pas entendre. '
  '12':
  - type: text
    content: 'Ils ont rendu leur cœur dur comme le diamant pour ne pas écouter la loi et les paroles que l''Eternel, le maître de l''univers, leur adressait par son Esprit, par les premiers prophètes. Alors l''Eternel, le maître de l''univers, s''est enflammé d''une grande colère. '
  '13':
  - type: text
    content: 'Quand il appelait, ils n''ont pas écouté, c''est pourquoi – dit l''Eternel, le maître de l''univers – je n''écouterai pas quand ils appelleront. '
  '14':
  - type: text
    content: Je les ai dispersés parmi toutes sortes de nations qu'ils ne connaissaient pas; le pays a été dévasté derrière eux, personne n'y passait, personne n'y revenait. D'un pays de délices ils ont fait un désert.»
  '2':
  - type: text
    content: 'La ville de Béthel avait envoyé Sharetser et Réguem-Mélec avec ses hommes pour implorer l''Eternel '
  '3':
  - type: text
    content: 'en disant aux prêtres de la maison de l''Eternel, le maître de l''univers, et aux prophètes: «Dois-je pleurer le cinquième mois en me privant, comme je l''ai fait tant d''années?»'
  '4':
  - type: text
    content: 'La parole de l''Eternel, le maître de l''univers, m''a été adressée: '
  '5':
  - type: text
    content: '«Dis à tout le peuple du pays et aux prêtres: ‘Quand vous avez jeûné et pleuré le cinquième et le septième mois, et cela depuis 70 ans, est-ce pour moi que vous avez jeûné? '
  '6':
  - type: text
    content: 'Et quand vous mangez et buvez, n''est-ce pas pour vous que vous mangez et buvez?’ '
  '7':
  - type: text
    content: Ne connaissez-vous pas les paroles qu'a proclamées l'Eternel par les premiers prophètes, lorsque Jérusalem et les villes qui l'entourent étaient habitées et tranquilles et que le sud et la plaine étaient habités?»
  '8':
  - type: text
    content: 'La parole de l''Eternel fut adressée à Zacharie: '
  '9':
  - type: text
    content: '«Voici ce que disait l''Eternel, le maître de l''univers: ‘Rendez la justice conformément à la vérité et agissez l''un envers l''autre avec bonté et compassion. '
