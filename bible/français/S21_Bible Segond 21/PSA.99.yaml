document_id: PSA.99,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu, le Roi juste et saint
  - type: text
    content: 'L''Eternel règne: les peuples tremblent;'
  - type: text
    content: 'il siège entre les chérubins: la terre tremble.'
  '2':
  - type: text
    content: L'Eternel est grand dans Sion,
  - type: text
    content: il domine tous les peuples.
  '3':
  - type: text
    content: 'Qu''on célèbre ton nom grand et redoutable:'
  - type: text
    content: il est saint!
  '4':
  - type: text
    content: Qu'on célèbre la force du roi qui aime le droit!
  - type: text
    content: Tu établis l'équité,
  - type: text
    content: tu exerces le droit et la justice en Jacob.
  '5':
  - type: text
    content: Proclamez la grandeur de l'Eternel, notre Dieu,
  - type: text
    content: 'et prosternez-vous à ses pieds:'
  - type: text
    content: il est saint!
  '6':
  - type: text
    content: Moïse et Aaron parmi ses prêtres,
  - type: text
    content: et Samuel parmi ceux qui faisaient appel à son nom,
  - type: text
    content: s'adressaient à l'Eternel, et il les exauçait.
  '7':
  - type: text
    content: Il leur parlait dans la colonne de nuée;
  - type: text
    content: ils ont respecté ses commandements
  - type: text
    content: et la loi qu'il leur avait donnée.
  '8':
  - type: text
    content: Eternel, notre Dieu, tu les as exaucés,
  - type: text
    content: tu as été pour eux un Dieu de pardon,
  - type: text
    content: mais tu les as punis de leurs fautes.
  '9':
  - type: text
    content: Proclamez la grandeur de l'Eternel, notre Dieu,
  - type: text
    content: et prosternez-vous sur sa montagne sainte,
  - type: text
    content: car il est saint, l'Eternel, notre Dieu!
