document_id: PSA.99
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu, le Roi juste et saint
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel règne: les peuples tremblent;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'il siège entre les chérubins: la terre tremble.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: L'Eternel est grand dans Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il domine tous les peuples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Qu''on célèbre ton nom grand et redoutable:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est saint!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Qu'on célèbre la force du roi qui aime le droit!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu établis l'équité,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu exerces le droit et la justice en Jacob.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Proclamez la grandeur de l'Eternel, notre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et prosternez-vous à ses pieds:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est saint!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Moïse et Aaron parmi ses prêtres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Samuel parmi ceux qui faisaient appel à son nom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: s'adressaient à l'Eternel, et il les exauçait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il leur parlait dans la colonne de nuée;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ont respecté ses commandements
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la loi qu'il leur avait donnée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Eternel, notre Dieu, tu les as exaucés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as été pour eux un Dieu de pardon,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais tu les as punis de leurs fautes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Proclamez la grandeur de l'Eternel, notre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et prosternez-vous sur sa montagne sainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il est saint, l'Eternel, notre Dieu!
