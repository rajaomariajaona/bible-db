document_id: PSA.36
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le méchant et sa punition
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Du serviteur de l'Eternel, de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'La parole de révolte du méchant pénètre au fond de mon cœur:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '*la crainte de Dieu n''est pas devant ses yeux'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La crainte… yeux: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 3.18
      metadata:
        usfm: ROM.3.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' dans la description de l''humanité coupable.'
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: car il se voit d'un œil trop flatteur
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour reconnaître son crime et le détester.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les paroles de sa bouche sont fausses et trompeuses;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il renonce à être sage, à faire le bien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il médite l'injustice sur son lit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il s'engage sur une voie qui n'est pas bonne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne repousse pas le mal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Eternel, ta bonté s'élève jusqu'au ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta fidélité atteint les nuages.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ta justice est aussi haute que les montagnes de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tes jugements sont profonds comme le grand océan.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, tu secours les hommes et les bêtes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Combien ta bonté est précieuse, ô Dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: A l'ombre de tes ailes les hommes cherchent un refuge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ils se rassasient de l'abondance de ta maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu les fais boire au torrent de tes délices,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: car c'est auprès de toi qu'est la source de la vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c'est par ta lumière que nous voyons la lumière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Etends ta bonté sur ceux qui te connaissent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ta justice sur ceux dont le cœur est droit!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Que le pied de l'orgueilleux ne m'atteigne pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que la main des méchants ne me fasse pas fuir!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ils tombent déjà, ceux qui commettent l'injustice;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sont renversés, et ils ne peuvent pas se relever.
