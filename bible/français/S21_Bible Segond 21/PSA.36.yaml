document_id: PSA.36,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le méchant et sa punition
  - type: text
    content: Au chef de chœur. Du serviteur de l'Eternel, de David.
  '10':
  - type: text
    content: car c'est auprès de toi qu'est la source de la vie,
  - type: text
    content: et c'est par ta lumière que nous voyons la lumière.
  '11':
  - type: text
    content: Etends ta bonté sur ceux qui te connaissent,
  - type: text
    content: et ta justice sur ceux dont le cœur est droit!
  '12':
  - type: text
    content: Que le pied de l'orgueilleux ne m'atteigne pas,
  - type: text
    content: et que la main des méchants ne me fasse pas fuir!
  '13':
  - type: text
    content: Ils tombent déjà, ceux qui commettent l'injustice;
  - type: text
    content: ils sont renversés, et ils ne peuvent pas se relever.
  '2':
  - type: text
    content: 'La parole de révolte du méchant pénètre au fond de mon cœur:'
  - type: text
    content: '*la crainte de Dieu n''est pas devant ses yeux'
  - type: note
    content: 'La crainte… yeux: cité en Romains 3.18 dans la description de l''humanité coupable.'
  - type: text
    content: ','
  '3':
  - type: text
    content: car il se voit d'un œil trop flatteur
  - type: text
    content: pour reconnaître son crime et le détester.
  '4':
  - type: text
    content: Les paroles de sa bouche sont fausses et trompeuses;
  - type: text
    content: il renonce à être sage, à faire le bien.
  '5':
  - type: text
    content: Il médite l'injustice sur son lit,
  - type: text
    content: il s'engage sur une voie qui n'est pas bonne,
  - type: text
    content: il ne repousse pas le mal.
  '6':
  - type: text
    content: Eternel, ta bonté s'élève jusqu'au ciel,
  - type: text
    content: ta fidélité atteint les nuages.
  '7':
  - type: text
    content: Ta justice est aussi haute que les montagnes de Dieu,
  - type: text
    content: tes jugements sont profonds comme le grand océan.
  - type: text
    content: Eternel, tu secours les hommes et les bêtes.
  '8':
  - type: text
    content: Combien ta bonté est précieuse, ô Dieu!
  - type: text
    content: A l'ombre de tes ailes les hommes cherchent un refuge.
  '9':
  - type: text
    content: Ils se rassasient de l'abondance de ta maison,
  - type: text
    content: et tu les fais boire au torrent de tes délices,
