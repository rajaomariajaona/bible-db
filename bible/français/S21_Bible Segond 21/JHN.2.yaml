document_id: JHN.2,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Premier miracle de Jésus en Galilée
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, le troisième jour, il y eut des noces à Cana en Galilée. La mère de Jésus était là. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et lui dit: «Tout homme sert d''abord le bon vin, puis le moins bon après qu''on s''est enivré; mais toi, tu as gardé le bon vin jusqu''à présent!»'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tel fut, à Cana en Galilée, le premier des signes miraculeux que fit Jésus. Il manifesta sa gloire et ses disciples crurent en lui. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Après cela, il descendit à Capernaüm avec sa mère, ses frères et ses disciples, et ils n'y restèrent que peu de jours.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus dans le temple, à Jérusalem
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La Pâque juive était proche et Jésus monta à Jérusalem. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il trouva les vendeurs de bœufs, de brebis et de pigeons ainsi que les changeurs de monnaie installés dans le temple. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors il fit un fouet avec des cordes et les chassa tous du temple, ainsi que les brebis et les bœufs. Il dispersa la monnaie des changeurs et renversa leurs tables. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il dit aux vendeurs de pigeons: «Enlevez cela d''ici, ne faites pas de la maison de mon Père une maison de commerce.» '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ses disciples se souvinrent qu''il est écrit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Le zèle de ta maison me dévore
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le zèle… dévore: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 69.10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Juifs prirent la parole et lui dirent: «Quel signe nous montres-tu, pour agir de cette manière?» '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur répondit: «Détruisez ce temple et en 3 jours je le relèverai.» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus fut aussi invité aux noces avec ses disciples. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Juifs dirent: «Il a fallu 46 ans pour construire ce temple et toi, en 3 jours tu le relèverais!» '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cependant, lui parlait du temple de son corps. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C'est pourquoi, lorsqu'il fut ressuscité, ses disciples se souvinrent qu'il avait dit cela et ils crurent à l'Ecriture et à la parole que Jésus avait dite.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant que Jésus était à Jérusalem, lors de la fête de la Pâque, beaucoup crurent en lui en voyant les signes miraculeux qu''il faisait. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Jésus n''avait pas confiance en eux, parce qu''il les connaissait tous. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il n'avait pas besoin qu'on le renseigne sur les hommes, car il savait lui-même ce qui est dans l'homme.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme le vin venait à manquer, la mère de Jésus lui dit: «Ils n''ont plus de vin.» '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui répondit: «Que me veux-tu, femme? Mon heure n''est pas encore venue.» '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sa mère dit aux serviteurs: «Faites tout ce qu''il vous dira.» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or il y avait là six jarres de pierre, destinées aux purifications des Juifs et contenant chacune une centaine de litres. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur dit: «Remplissez d''eau ces jarres.» Et ils les remplirent jusqu''au bord. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Puisez maintenant, leur dit-il, et apportez-en à l''organisateur du repas.» Et ils lui en apportèrent. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''organisateur du repas goûta l''eau changée en vin. Ne sachant pas d''où venait ce vin, tandis que les serviteurs qui avaient puisé l''eau le savaient bien, il appela le marié '
