document_id: JHN.2,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Premier miracle de Jésus en Galilée
  - type: text
    content: 'Or, le troisième jour, il y eut des noces à Cana en Galilée. La mère de Jésus était là. '
  '10':
  - type: text
    content: 'et lui dit: «Tout homme sert d''abord le bon vin, puis le moins bon après qu''on s''est enivré; mais toi, tu as gardé le bon vin jusqu''à présent!»'
  '11':
  - type: text
    content: 'Tel fut, à Cana en Galilée, le premier des signes miraculeux que fit Jésus. Il manifesta sa gloire et ses disciples crurent en lui. '
  '12':
  - type: text
    content: Après cela, il descendit à Capernaüm avec sa mère, ses frères et ses disciples, et ils n'y restèrent que peu de jours.
  - type: heading
    content: Jésus dans le temple, à Jérusalem
  '13':
  - type: text
    content: 'La Pâque juive était proche et Jésus monta à Jérusalem. '
  '14':
  - type: text
    content: 'Il trouva les vendeurs de bœufs, de brebis et de pigeons ainsi que les changeurs de monnaie installés dans le temple. '
  '15':
  - type: text
    content: 'Alors il fit un fouet avec des cordes et les chassa tous du temple, ainsi que les brebis et les bœufs. Il dispersa la monnaie des changeurs et renversa leurs tables. '
  '16':
  - type: text
    content: 'Et il dit aux vendeurs de pigeons: «Enlevez cela d''ici, ne faites pas de la maison de mon Père une maison de commerce.» '
  '17':
  - type: text
    content: 'Ses disciples se souvinrent qu''il est écrit: '
  - type: text
    content: Le zèle de ta maison me dévore
  - type: text
    content: .
  - type: note
    content: 'Le zèle… dévore: citation du Psaume 69.10.'
  '18':
  - type: text
    content: 'Les Juifs prirent la parole et lui dirent: «Quel signe nous montres-tu, pour agir de cette manière?» '
  '19':
  - type: text
    content: 'Jésus leur répondit: «Détruisez ce temple et en 3 jours je le relèverai.» '
  '2':
  - type: text
    content: 'Jésus fut aussi invité aux noces avec ses disciples. '
  '20':
  - type: text
    content: 'Les Juifs dirent: «Il a fallu 46 ans pour construire ce temple et toi, en 3 jours tu le relèverais!» '
  '21':
  - type: text
    content: 'Cependant, lui parlait du temple de son corps. '
  '22':
  - type: text
    content: C'est pourquoi, lorsqu'il fut ressuscité, ses disciples se souvinrent qu'il avait dit cela et ils crurent à l'Ecriture et à la parole que Jésus avait dite.
  '23':
  - type: text
    content: 'Pendant que Jésus était à Jérusalem, lors de la fête de la Pâque, beaucoup crurent en lui en voyant les signes miraculeux qu''il faisait. '
  '24':
  - type: text
    content: 'Mais Jésus n''avait pas confiance en eux, parce qu''il les connaissait tous. '
  '25':
  - type: text
    content: Il n'avait pas besoin qu'on le renseigne sur les hommes, car il savait lui-même ce qui est dans l'homme.
  '3':
  - type: text
    content: 'Comme le vin venait à manquer, la mère de Jésus lui dit: «Ils n''ont plus de vin.» '
  '4':
  - type: text
    content: 'Jésus lui répondit: «Que me veux-tu, femme? Mon heure n''est pas encore venue.» '
  '5':
  - type: text
    content: 'Sa mère dit aux serviteurs: «Faites tout ce qu''il vous dira.» '
  '6':
  - type: text
    content: 'Or il y avait là six jarres de pierre, destinées aux purifications des Juifs et contenant chacune une centaine de litres. '
  '7':
  - type: text
    content: 'Jésus leur dit: «Remplissez d''eau ces jarres.» Et ils les remplirent jusqu''au bord. '
  '8':
  - type: text
    content: '«Puisez maintenant, leur dit-il, et apportez-en à l''organisateur du repas.» Et ils lui en apportèrent. '
  '9':
  - type: text
    content: 'L''organisateur du repas goûta l''eau changée en vin. Ne sachant pas d''où venait ce vin, tandis que les serviteurs qui avaient puisé l''eau le savaient bien, il appela le marié '
