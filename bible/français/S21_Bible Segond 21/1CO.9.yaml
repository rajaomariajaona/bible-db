document_id: 1CO.9,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Exemple de Paul
  - type: text
    content: 'Ne suis-je pas libre? Ne suis-je pas apôtre? N''ai-je pas vu Jésus[-Christ] notre Seigneur? N''êtes-vous pas mon œuvre dans le Seigneur? '
  '10':
  - type: text
    content: 'ou bien est-ce principalement à cause de nous qu''il parle? Oui, c''est à cause de nous que cela a été écrit, car celui qui laboure doit labourer avec espérance, et celui qui bat le blé doit le faire avec l''espoir de recevoir sa part. '
  '11':
  - type: text
    content: 'Si nous avons semé pour vous les biens spirituels, est-ce trop si nous récoltons une part de vos biens matériels? '
  '12':
  - type: text
    content: Si d'autres exercent ce droit sur vous, n'est-ce pas plutôt à nous d'en jouir? Mais nous n'avons pas recouru à ce droit; au contraire, nous supportons tout afin de ne pas créer d'obstacle à l'Evangile de Christ.
  '13':
  - type: text
    content: 'Ne savez-vous pas que ceux qui assurent le service du culte sont nourris par le temple, que ceux qui servent à l''autel reçoivent une part de ce qui est offert sur l''autel? '
  '14':
  - type: text
    content: De même aussi, le Seigneur a prescrit à ceux qui annoncent l'Evangile de vivre de l'Evangile.
  '15':
  - type: text
    content: 'Quant à moi, je n''ai eu recours à aucun de ces droits, et je n''écris pas cela pour qu''ils me soient accordés, car j''aimerais mieux mourir plutôt que de me laisser enlever ce sujet de fierté. '
  '16':
  - type: text
    content: 'Si j''annonce l''Evangile, il n''y a pour moi aucun sujet de fierté, car c''est une nécessité qui m''est imposée, et malheur à moi si je n''annonce pas l''Evangile! '
  '17':
  - type: text
    content: 'Si je le fais de bon cœur, j''en ai la récompense; mais si je le fais malgré moi, c''est une charge qui m''est confiée. '
  '18':
  - type: text
    content: Quelle est donc ma récompense? C'est d'offrir gratuitement l'Evangile [de Christ] que j'annonce, sans faire usage de mon droit de prédicateur de l'Evangile.
  '19':
  - type: text
    content: 'En effet, bien que libre vis-à-vis de tous, je me suis fait l''esclave de tous afin de gagner le plus grand nombre. '
  '2':
  - type: text
    content: Si pour d'autres je ne suis pas apôtre, je le suis au moins pour vous, car vous êtes l'empreinte
  - type: note
    content: 'L''empreinte: l''empreinte d''un sceau (bague ou objet cylindrique), apposée sur un document, servait à le protéger, à l''authentifier ou à signaler son propriétaire.'
  - type: text
    content: ' qui authentifie mon service en tant qu''apôtre dans le Seigneur. '
  '20':
  - type: text
    content: 'Avec les Juifs, j''ai été comme un Juif afin de gagner les Juifs; avec ceux qui sont sous la loi de Moïse, comme si j''étais sous la loi [– bien que n''étant pas moi-même sous la loi –] afin de gagner ceux qui sont sous la loi; '
  '21':
  - type: text
    content: 'avec ceux qui sont sans la loi, comme si j''étais sans la loi – bien que je ne sois pas sans la loi de Dieu, puisque je me conforme à la loi de Christ – afin de gagner ceux qui sont sans la loi. '
  '22':
  - type: text
    content: 'J''ai été [comme] faible avec les faibles afin de gagner les faibles. Je me suis fait tout à tous afin d''en sauver de toute manière quelques-uns, '
  '23':
  - type: text
    content: et je fais cela à cause de l'Evangile afin d'avoir part à ses bénédictions.
  '24':
  - type: text
    content: 'Ne savez-vous pas que les concurrents dans le stade courent tous, mais qu''un seul remporte le prix? Courez de manière à le remporter. '
  '25':
  - type: text
    content: 'Tous les athlètes s''imposent toutes sortes de privations, et ils le font pour obtenir une couronne qui va se détruire; mais nous, c''est pour une couronne indestructible. '
  '26':
  - type: text
    content: 'Moi donc, je cours, mais pas comme à l''aventure; je boxe, mais non pour battre l''air. '
  '27':
  - type: text
    content: Au contraire, je traite durement mon corps et je le discipline, de peur d'être moi-même disqualifié après avoir prêché aux autres.
  '3':
  - type: text
    content: C'est là ma défense contre ceux qui m'accusent.
  '4':
  - type: text
    content: 'N''avons-nous pas le droit de manger et de boire? '
  '5':
  - type: text
    content: N'avons-nous pas le droit d'emmener avec nous une sœur qui soit notre femme, comme le font les autres apôtres, les frères du Seigneur et Céphas
  - type: note
    content: 'Céphas: nom de Pierre en araméen.'
  - type: text
    content: '? '
  '6':
  - type: text
    content: 'Ou bien sommes-nous les seuls, Barnabas et moi, à ne pas avoir le droit de ne pas travailler? '
  '7':
  - type: text
    content: Qui donc sert dans une armée à ses propres frais? Qui plante une vigne et n'en mange pas le fruit? Qui prend soin d'un troupeau et ne se nourrit pas du lait du troupeau?
  '8':
  - type: text
    content: 'Est-ce purement d''un point de vue humain que je dis cela? La loi ne le dit-elle pas aussi? '
  '9':
  - type: text
    content: 'En effet, il est écrit dans la loi de Moïse: '
  - type: text
    content: Tu ne mettras pas de muselière au bœuf quand il foule le grain.
  - type: note
    content: 'Tu ne mettras… grain: citation de Deutéronome 25.4.'
  - type: text
    content: 'Dieu s''inquiète-t-il des bœufs '
