document_id: 1CO.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Exemple de Paul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ne suis-je pas libre? Ne suis-je pas apôtre? N''ai-je pas vu Jésus[-Christ] notre Seigneur? N''êtes-vous pas mon œuvre dans le Seigneur? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Si pour d'autres je ne suis pas apôtre, je le suis au moins pour vous, car vous êtes l'empreinte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''empreinte: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: l'empreinte d'un sceau (bague ou objet cylindrique), apposée sur un document, servait à le protéger, à l'authentifier ou à signaler son propriétaire.
    marker-yv: yv-n
  - type: text
    text: ' qui authentifie mon service en tant qu''apôtre dans le Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C'est là ma défense contre ceux qui m'accusent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'N''avons-nous pas le droit de manger et de boire? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: N'avons-nous pas le droit d'emmener avec nous une sœur qui soit notre femme, comme le font les autres apôtres, les frères du Seigneur et Céphas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Céphas: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nom de Pierre en araméen.
    marker-yv: yv-n
  - type: text
    text: '? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ou bien sommes-nous les seuls, Barnabas et moi, à ne pas avoir le droit de ne pas travailler? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Qui donc sert dans une armée à ses propres frais? Qui plante une vigne et n'en mange pas le fruit? Qui prend soin d'un troupeau et ne se nourrit pas du lait du troupeau?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Est-ce purement d''un point de vue humain que je dis cela? La loi ne le dit-elle pas aussi? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'En effet, il est écrit dans la loi de Moïse: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu ne mettras pas de muselière au bœuf quand il foule le grain.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu ne mettras… grain: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 25.4
      metadata:
        usfm: DEU.25.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Dieu s''inquiète-t-il des bœufs '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ou bien est-ce principalement à cause de nous qu''il parle? Oui, c''est à cause de nous que cela a été écrit, car celui qui laboure doit labourer avec espérance, et celui qui bat le blé doit le faire avec l''espoir de recevoir sa part. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Si nous avons semé pour vous les biens spirituels, est-ce trop si nous récoltons une part de vos biens matériels? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Si d'autres exercent ce droit sur vous, n'est-ce pas plutôt à nous d'en jouir? Mais nous n'avons pas recouru à ce droit; au contraire, nous supportons tout afin de ne pas créer d'obstacle à l'Evangile de Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ne savez-vous pas que ceux qui assurent le service du culte sont nourris par le temple, que ceux qui servent à l''autel reçoivent une part de ce qui est offert sur l''autel? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: De même aussi, le Seigneur a prescrit à ceux qui annoncent l'Evangile de vivre de l'Evangile.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Quant à moi, je n''ai eu recours à aucun de ces droits, et je n''écris pas cela pour qu''ils me soient accordés, car j''aimerais mieux mourir plutôt que de me laisser enlever ce sujet de fierté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Si j''annonce l''Evangile, il n''y a pour moi aucun sujet de fierté, car c''est une nécessité qui m''est imposée, et malheur à moi si je n''annonce pas l''Evangile! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Si je le fais de bon cœur, j''en ai la récompense; mais si je le fais malgré moi, c''est une charge qui m''est confiée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Quelle est donc ma récompense? C'est d'offrir gratuitement l'Evangile [de Christ] que j'annonce, sans faire usage de mon droit de prédicateur de l'Evangile.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'En effet, bien que libre vis-à-vis de tous, je me suis fait l''esclave de tous afin de gagner le plus grand nombre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Avec les Juifs, j''ai été comme un Juif afin de gagner les Juifs; avec ceux qui sont sous la loi de Moïse, comme si j''étais sous la loi [– bien que n''étant pas moi-même sous la loi –] afin de gagner ceux qui sont sous la loi; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'avec ceux qui sont sans la loi, comme si j''étais sans la loi – bien que je ne sois pas sans la loi de Dieu, puisque je me conforme à la loi de Christ – afin de gagner ceux qui sont sans la loi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'J''ai été [comme] faible avec les faibles afin de gagner les faibles. Je me suis fait tout à tous afin d''en sauver de toute manière quelques-uns, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: et je fais cela à cause de l'Evangile afin d'avoir part à ses bénédictions.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Ne savez-vous pas que les concurrents dans le stade courent tous, mais qu''un seul remporte le prix? Courez de manière à le remporter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tous les athlètes s''imposent toutes sortes de privations, et ils le font pour obtenir une couronne qui va se détruire; mais nous, c''est pour une couronne indestructible. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Moi donc, je cours, mais pas comme à l''aventure; je boxe, mais non pour battre l''air. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Au contraire, je traite durement mon corps et je le discipline, de peur d'être moi-même disqualifié après avoir prêché aux autres.
