document_id: PSA.73,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Troisième livre
  - type: heading
    content: 73–89
  - type: heading
    content: Perplexité face au bonheur des impies
  - type: text
    content: Psaume d'Asaph.
  - type: text
    content: Oui, Dieu est bon pour Israël,
  - type: text
    content: pour ceux qui ont le cœur pur.
  '10':
  - type: text
    content: Voilà pourquoi son peuple se tourne de leur côté,
  - type: text
    content: il boit leurs paroles avidement comme de l'eau,
  '11':
  - type: text
    content: 'et il dit: «Comment Dieu pourrait-il savoir?'
  - type: text
    content: Y a-t-il de la connaissance chez le Très-Haut?
  '12':
  - type: text
    content: 'Voici comment sont les méchants:'
  - type: text
    content: toujours tranquilles, ils augmentent leurs richesses.
  '13':
  - type: text
    content: C'est donc pour rien que j'ai purifié mon cœur
  - type: text
    content: et que j'ai lavé mes mains en signe d'innocence!
  '14':
  - type: text
    content: Chaque jour je suis frappé, tous les matins je suis repris.»
  '15':
  - type: text
    content: 'Si je disais: «Je veux parler comme eux»,'
  - type: text
    content: alors je trahirais tes enfants.
  '16':
  - type: text
    content: Quand j'ai réfléchi pour comprendre cela,
  - type: text
    content: la difficulté a été grande à mes yeux,
  '17':
  - type: text
    content: jusqu'au moment où je suis entré dans les sanctuaires de Dieu
  - type: text
    content: 'et où j''ai prêté attention au sort final des méchants:'
  '18':
  - type: text
    content: oui, tu les places sur un terrain glissant,
  - type: text
    content: tu les fais tomber dans la ruine.
  '19':
  - type: text
    content: Et voilà, en un instant ils sont détruits,
  - type: text
    content: ils ont disparu, anéantis par l'épouvante!
  '2':
  - type: text
    content: Toutefois, mon pied allait trébucher,
  - type: text
    content: mes pas étaient sur le point de glisser,
  '20':
  - type: text
    content: Comme un rêve qui se dissipe au réveil,
  - type: text
    content: Seigneur, à ton réveil, tu repousses leur image.
  '21':
  - type: text
    content: Lorsque mon cœur était aigri
  - type: text
    content: et mes reins transpercés,
  '22':
  - type: text
    content: j'étais idiot et je ne comprenais rien,
  - type: text
    content: j'étais devant toi comme une bête.
  '23':
  - type: text
    content: 'Cependant je suis toujours avec toi:'
  - type: text
    content: tu m'as empoigné la main droite,
  '24':
  - type: text
    content: tu me conduiras par ton conseil,
  - type: text
    content: puis tu me prendras dans la gloire.
  '25':
  - type: text
    content: Qui d'autre ai-je au ciel?
  - type: text
    content: Et sur la terre je ne prends plaisir qu'en toi.
  '26':
  - type: text
    content: Mon corps et mon cœur peuvent s'épuiser,
  - type: text
    content: Dieu sera toujours le rocher de mon cœur et ma bonne part.
  '27':
  - type: text
    content: Oui, ceux qui s'éloignent de toi vont à leur perte,
  - type: text
    content: tu réduis au silence tous ceux qui te sont infidèles.
  '28':
  - type: text
    content: Pour moi, mon bonheur, c'est de m'approcher de Dieu.
  - type: text
    content: Je place mon refuge en toi, Seigneur, Eternel,
  - type: text
    content: afin de raconter tout ce que tu fais.
  '3':
  - type: text
    content: car j'étais jaloux des vantards
  - type: text
    content: 'en voyant le bien-être des méchants:'
  '4':
  - type: text
    content: rien ne les tourmente jusqu'à leur mort,
  - type: text
    content: et leur corps prend de l'embonpoint;
  '5':
  - type: text
    content: ils n'ont aucune part aux souffrances humaines,
  - type: text
    content: ils ne sont pas frappés comme le reste des hommes.
  '6':
  - type: text
    content: C'est pourquoi ils se parent de l'orgueil comme d'un collier,
  - type: text
    content: la violence les enveloppe comme un manteau.
  '7':
  - type: text
    content: Leurs yeux ressortent dans un visage plein de graisse,
  - type: text
    content: les mauvaises pensées de leur cœur débordent.
  '8':
  - type: text
    content: Ils ricanent et parlent méchamment d'opprimer,
  - type: text
    content: ils profèrent des discours hautains,
  '9':
  - type: text
    content: leur bouche s'attaque au ciel
  - type: text
    content: et leur langue balaie la terre.
