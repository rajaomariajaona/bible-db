document_id: PSA.73,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Troisième livre
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 73–89
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Perplexité face au bonheur des impies
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Psaume d'Asaph.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, Dieu est bon pour Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour ceux qui ont le cœur pur.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà pourquoi son peuple se tourne de leur côté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il boit leurs paroles avidement comme de l'eau,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et il dit: «Comment Dieu pourrait-il savoir?'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Y a-t-il de la connaissance chez le Très-Haut?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici comment sont les méchants:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toujours tranquilles, ils augmentent leurs richesses.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est donc pour rien que j'ai purifié mon cœur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que j'ai lavé mes mains en signe d'innocence!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chaque jour je suis frappé, tous les matins je suis repris.»
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Si je disais: «Je veux parler comme eux»,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors je trahirais tes enfants.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand j'ai réfléchi pour comprendre cela,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la difficulté a été grande à mes yeux,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu'au moment où je suis entré dans les sanctuaires de Dieu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et où j''ai prêté attention au sort final des méchants:'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, tu les places sur un terrain glissant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu les fais tomber dans la ruine.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et voilà, en un instant ils sont détruits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont disparu, anéantis par l'épouvante!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Toutefois, mon pied allait trébucher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mes pas étaient sur le point de glisser,
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme un rêve qui se dissipe au réveil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Seigneur, à ton réveil, tu repousses leur image.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsque mon cœur était aigri
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mes reins transpercés,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'étais idiot et je ne comprenais rien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'étais devant toi comme une bête.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Cependant je suis toujours avec toi:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu m'as empoigné la main droite,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu me conduiras par ton conseil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: puis tu me prendras dans la gloire.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui d'autre ai-je au ciel?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et sur la terre je ne prends plaisir qu'en toi.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon corps et mon cœur peuvent s'épuiser,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu sera toujours le rocher de mon cœur et ma bonne part.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, ceux qui s'éloignent de toi vont à leur perte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu réduis au silence tous ceux qui te sont infidèles.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour moi, mon bonheur, c'est de m'approcher de Dieu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je place mon refuge en toi, Seigneur, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin de raconter tout ce que tu fais.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car j'étais jaloux des vantards
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'en voyant le bien-être des méchants:'
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rien ne les tourmente jusqu'à leur mort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leur corps prend de l'embonpoint;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils n'ont aucune part aux souffrances humaines,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne sont pas frappés comme le reste des hommes.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est pourquoi ils se parent de l'orgueil comme d'un collier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la violence les enveloppe comme un manteau.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs yeux ressortent dans un visage plein de graisse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les mauvaises pensées de leur cœur débordent.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ricanent et parlent méchamment d'opprimer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils profèrent des discours hautains,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leur bouche s'attaque au ciel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leur langue balaie la terre.
