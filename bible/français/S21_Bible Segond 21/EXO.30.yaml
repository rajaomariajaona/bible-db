document_id: EXO.30
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'autel des parfums
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Tu feras un autel pour brûler des parfums. Tu le feras en bois d''acacia. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Sa longueur et sa largeur seront de 50 centimètres, il sera carré. Sa hauteur sera d''un mètre. Tu feras des cornes qui sortiront de l''autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu le couvriras d''or pur – le dessus, les côtés tout autour et les cornes – et tu feras une bordure d''or tout autour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tu feras sous la bordure 2 anneaux en or à placer sur ses deux côtés; tu les mettras sur les 2 côtés pour y passer les barres destinées à son transport. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tu feras ces barres en bois d''acacia et tu les couvriras d''or. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tu placeras l''autel en face du voile qui cache l''arche du témoignage, en face du propitiatoire qui couvre le témoignage et où je te rencontrerai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Aaron y fera brûler du parfum odoriférant. Il en fera brûler chaque matin, lorsqu''il arrangera les lampes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'et il en fera brûler aussi au coucher du soleil, lorsqu''il mettra les lampes en place. C''est ainsi que vous brûlerez constamment du parfum devant l''Eternel au fil des générations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Vous n''offrirez sur l''autel ni parfum étranger, ni holocauste, ni offrande végétale, et vous n''y verserez aucune offrande liquide. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Une fois par an, Aaron fera des expiations sur les cornes de l'autel. On y fera des expiations une fois par an avec le sang de la victime expiatoire au fil des générations. Ce sera une chose très sainte devant l'Eternel.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le rachat des personnes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '«Lorsque tu compteras les Israélites pour les dénombrer, chacun d''eux paiera à l''Eternel le rachat de sa propre personne, afin qu''ils ne soient frappés d''aucun fléau lors de ce dénombrement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Voici ce que donneront tous ceux qui seront compris dans le dénombrement: une demi-pièce d''après la valeur étalon du sanctuaire, qui est de 10 grammes; une demi-pièce sera prélevée pour l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tout homme compris dans le dénombrement, c''est-à-dire tout homme âgé de 20 ans et plus, paiera le don prélevé pour l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le riche ne paiera pas plus et le pauvre pas moins d''une demi-pièce comme don prélevé pour l''Eternel afin de racheter leur personne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tu recevras des Israélites l'argent du rachat et tu l'attribueras au travail de la tente de la rencontre. Ce sera pour les Israélites un souvenir devant l'Eternel pour le rachat de leur personne.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: La cuve en bronze
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '«Tu feras une cuve en bronze, avec sa base en bronze, pour les ablutions. Tu la placeras entre la tente de la rencontre et l''autel, et tu y mettras de l''eau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Aaron et ses descendants l''utiliseront pour se laver les mains et les pieds. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Lorsqu''ils entreront dans la tente de la rencontre, ils se laveront avec cette eau afin de ne pas mourir. Il en ira de même lorsqu''ils s''approcheront de l''autel pour faire le service et pour offrir des sacrifices à l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ils se laveront les mains et les pieds afin de ne pas mourir. Ce sera une prescription perpétuelle pour Aaron et pour ses descendants au fil des générations.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'huile sainte et le parfum
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '«Prends des meilleurs aromates: 5 kilos de myrrhe, de celle qui coule d''elle-même; la moitié, soit 2 kilos et demi, de cinnamome aromatique; 2 kilos et demi de roseau aromatique; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '5 kilos de casse, tout cela d''après la valeur étalon du sanctuaire, ainsi que 4 litres d''huile d''olive. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tu feras avec cela une huile pour l'onction sainte, un mélange de parfums préparé selon l'art du parfumeur. Ce sera l'huile pour l'onction sainte.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '»Avec cette huile, tu consacreras par onction la tente de la rencontre et l''arche du témoignage, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'la table et tous ses ustensiles, le chandelier et ses ustensiles, l''autel des parfums, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'l''autel des holocaustes et tous ses ustensiles ainsi que la cuve avec sa base. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tu consacreras ces objets et ils seront très saints. Tout ce qui les touchera sera saint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Tu verseras de l''huile sur Aaron et ses fils, et tu les consacreras ainsi pour qu''ils soient à mon service en tant que prêtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Tu diras aux Israélites: ‘Ce sera pour moi l''huile de l''onction sainte au fil des générations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'On n''en versera pas sur le corps de n''importe qui et vous n''en ferez aucune qui ait les mêmes proportions. Elle est sainte et vous la considérerez comme sainte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Toute personne qui fera un mélange semblable ou mettra de cette huile sur une personne étrangère à la fonction de prêtre sera exclue de son peuple.’»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'L''Eternel dit à Moïse: «Prends des aromates: du stacté, de l''ongle odorant, du galbanum et de l''encens pur, en quantités égales. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Tu feras avec cela un parfum mélangé selon l''art du parfumeur. Il sera salé, pur et saint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Tu le réduiras en poudre et tu le mettras devant le témoignage, dans la tente de la rencontre où je te rencontrerai. Ce sera pour vous une chose très sainte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Vous ne ferez pour vous aucun parfum qui ait les mêmes proportions. Vous le considérerez comme saint, consacré à l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Toute personne qui fera un parfum semblable pour le sentir sera exclue de son peuple.»
