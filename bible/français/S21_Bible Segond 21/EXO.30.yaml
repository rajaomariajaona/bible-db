document_id: EXO.30,152
type_code: fra
verses:
  '1':
  - type: heading
    content: L'autel des parfums
  - type: text
    content: '»Tu feras un autel pour brûler des parfums. Tu le feras en bois d''acacia. '
  '10':
  - type: text
    content: Une fois par an, Aaron fera des expiations sur les cornes de l'autel. On y fera des expiations une fois par an avec le sang de la victime expiatoire au fil des générations. Ce sera une chose très sainte devant l'Eternel.»
  - type: heading
    content: Le rachat des personnes
  '11':
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '12':
  - type: text
    content: '«Lorsque tu compteras les Israélites pour les dénombrer, chacun d''eux paiera à l''Eternel le rachat de sa propre personne, afin qu''ils ne soient frappés d''aucun fléau lors de ce dénombrement. '
  '13':
  - type: text
    content: 'Voici ce que donneront tous ceux qui seront compris dans le dénombrement: une demi-pièce d''après la valeur étalon du sanctuaire, qui est de 10 grammes; une demi-pièce sera prélevée pour l''Eternel. '
  '14':
  - type: text
    content: 'Tout homme compris dans le dénombrement, c''est-à-dire tout homme âgé de 20 ans et plus, paiera le don prélevé pour l''Eternel. '
  '15':
  - type: text
    content: 'Le riche ne paiera pas plus et le pauvre pas moins d''une demi-pièce comme don prélevé pour l''Eternel afin de racheter leur personne. '
  '16':
  - type: text
    content: Tu recevras des Israélites l'argent du rachat et tu l'attribueras au travail de la tente de la rencontre. Ce sera pour les Israélites un souvenir devant l'Eternel pour le rachat de leur personne.»
  - type: heading
    content: La cuve en bronze
  '17':
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '18':
  - type: text
    content: '«Tu feras une cuve en bronze, avec sa base en bronze, pour les ablutions. Tu la placeras entre la tente de la rencontre et l''autel, et tu y mettras de l''eau. '
  '19':
  - type: text
    content: 'Aaron et ses descendants l''utiliseront pour se laver les mains et les pieds. '
  '2':
  - type: text
    content: 'Sa longueur et sa largeur seront de 50 centimètres, il sera carré. Sa hauteur sera d''un mètre. Tu feras des cornes qui sortiront de l''autel. '
  '20':
  - type: text
    content: 'Lorsqu''ils entreront dans la tente de la rencontre, ils se laveront avec cette eau afin de ne pas mourir. Il en ira de même lorsqu''ils s''approcheront de l''autel pour faire le service et pour offrir des sacrifices à l''Eternel. '
  '21':
  - type: text
    content: Ils se laveront les mains et les pieds afin de ne pas mourir. Ce sera une prescription perpétuelle pour Aaron et pour ses descendants au fil des générations.»
  - type: heading
    content: L'huile sainte et le parfum
  '22':
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '23':
  - type: text
    content: '«Prends des meilleurs aromates: 5 kilos de myrrhe, de celle qui coule d''elle-même; la moitié, soit 2 kilos et demi, de cinnamome aromatique; 2 kilos et demi de roseau aromatique; '
  '24':
  - type: text
    content: '5 kilos de casse, tout cela d''après la valeur étalon du sanctuaire, ainsi que 4 litres d''huile d''olive. '
  '25':
  - type: text
    content: Tu feras avec cela une huile pour l'onction sainte, un mélange de parfums préparé selon l'art du parfumeur. Ce sera l'huile pour l'onction sainte.
  '26':
  - type: text
    content: '»Avec cette huile, tu consacreras par onction la tente de la rencontre et l''arche du témoignage, '
  '27':
  - type: text
    content: 'la table et tous ses ustensiles, le chandelier et ses ustensiles, l''autel des parfums, '
  '28':
  - type: text
    content: 'l''autel des holocaustes et tous ses ustensiles ainsi que la cuve avec sa base. '
  '29':
  - type: text
    content: 'Tu consacreras ces objets et ils seront très saints. Tout ce qui les touchera sera saint. '
  '3':
  - type: text
    content: 'Tu le couvriras d''or pur – le dessus, les côtés tout autour et les cornes – et tu feras une bordure d''or tout autour. '
  '30':
  - type: text
    content: 'Tu verseras de l''huile sur Aaron et ses fils, et tu les consacreras ainsi pour qu''ils soient à mon service en tant que prêtres. '
  '31':
  - type: text
    content: 'Tu diras aux Israélites: ‘Ce sera pour moi l''huile de l''onction sainte au fil des générations. '
  '32':
  - type: text
    content: 'On n''en versera pas sur le corps de n''importe qui et vous n''en ferez aucune qui ait les mêmes proportions. Elle est sainte et vous la considérerez comme sainte. '
  '33':
  - type: text
    content: Toute personne qui fera un mélange semblable ou mettra de cette huile sur une personne étrangère à la fonction de prêtre sera exclue de son peuple.’»
  '34':
  - type: text
    content: 'L''Eternel dit à Moïse: «Prends des aromates: du stacté, de l''ongle odorant, du galbanum et de l''encens pur, en quantités égales. '
  '35':
  - type: text
    content: 'Tu feras avec cela un parfum mélangé selon l''art du parfumeur. Il sera salé, pur et saint. '
  '36':
  - type: text
    content: 'Tu le réduiras en poudre et tu le mettras devant le témoignage, dans la tente de la rencontre où je te rencontrerai. Ce sera pour vous une chose très sainte. '
  '37':
  - type: text
    content: 'Vous ne ferez pour vous aucun parfum qui ait les mêmes proportions. Vous le considérerez comme saint, consacré à l''Eternel. '
  '38':
  - type: text
    content: Toute personne qui fera un parfum semblable pour le sentir sera exclue de son peuple.»
  '4':
  - type: text
    content: 'Tu feras sous la bordure 2 anneaux en or à placer sur ses deux côtés; tu les mettras sur les 2 côtés pour y passer les barres destinées à son transport. '
  '5':
  - type: text
    content: 'Tu feras ces barres en bois d''acacia et tu les couvriras d''or. '
  '6':
  - type: text
    content: 'Tu placeras l''autel en face du voile qui cache l''arche du témoignage, en face du propitiatoire qui couvre le témoignage et où je te rencontrerai. '
  '7':
  - type: text
    content: 'Aaron y fera brûler du parfum odoriférant. Il en fera brûler chaque matin, lorsqu''il arrangera les lampes, '
  '8':
  - type: text
    content: 'et il en fera brûler aussi au coucher du soleil, lorsqu''il mettra les lampes en place. C''est ainsi que vous brûlerez constamment du parfum devant l''Eternel au fil des générations. '
  '9':
  - type: text
    content: 'Vous n''offrirez sur l''autel ni parfum étranger, ni holocauste, ni offrande végétale, et vous n''y verserez aucune offrande liquide. '
