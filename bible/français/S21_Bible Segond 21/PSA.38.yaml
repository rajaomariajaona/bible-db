document_id: PSA.38,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Demande de grâce
  - type: text
    content: Psaume de David, comme mémorial.
  '10':
  - type: text
    content: Seigneur, tu connais tous mes désirs,
  - type: text
    content: et mes soupirs ne te sont pas cachés.
  '11':
  - type: text
    content: Mon cœur est agité, ma force m'abandonne,
  - type: text
    content: même la lumière de mes yeux disparaît.
  '12':
  - type: text
    content: Mes amis, mes compagnons, reculent devant ma plaie,
  - type: text
    content: mes proches se tiennent à l'écart!
  '13':
  - type: text
    content: Ceux qui en veulent à ma vie tendent leurs pièges,
  - type: text
    content: ceux qui cherchent mon malheur disent des méchancetés
  - type: text
    content: et méditent toute la journée des tromperies.
  '14':
  - type: text
    content: Mais moi, pareil à un sourd, je n'entends pas;
  - type: text
    content: 'je suis comme un muet: je n''ouvre pas la bouche.'
  '15':
  - type: text
    content: Je suis pareil à un homme qui n'entend pas
  - type: text
    content: et qui n'oppose aucune réplique.
  '16':
  - type: text
    content: Eternel, c'est en toi que j'espère;
  - type: text
    content: tu répondras, Seigneur, mon Dieu,
  '17':
  - type: text
    content: 'car j''ai dit: «Ne permets pas qu''ils se réjouissent à mon sujet,'
  - type: text
    content: qu'ils s'attaquent à moi quand mon pied trébuche!»
  '18':
  - type: text
    content: Je suis près de tomber,
  - type: text
    content: et ma douleur est toujours présente.
  '19':
  - type: text
    content: Oui, je reconnais ma faute,
  - type: text
    content: je suis dans la crainte à cause de mon péché.
  '2':
  - type: text
    content: Eternel, ne me punis pas dans ta colère
  - type: text
    content: et ne me corrige pas dans ta fureur,
  '20':
  - type: text
    content: Cependant mes ennemis sont pleins de vie, pleins de force;
  - type: text
    content: ceux qui me détestent sans raison sont nombreux.
  '21':
  - type: text
    content: Ils me rendent le mal pour le bien,
  - type: text
    content: ils sont mes adversaires parce que je recherche le bien.
  '22':
  - type: text
    content: Ne m'abandonne pas, Eternel,
  - type: text
    content: mon Dieu, ne t'éloigne pas de moi!
  '23':
  - type: text
    content: Viens vite à mon secours,
  - type: text
    content: Seigneur, mon salut!
  '3':
  - type: text
    content: car tes flèches m'ont atteint,
  - type: text
    content: et ta main a pesé lourdement sur moi.
  '4':
  - type: text
    content: Il n'y a plus rien d'intact dans mon corps à cause de ta colère,
  - type: text
    content: il n'y a plus rien de sain dans mes os à cause de mon péché,
  '5':
  - type: text
    content: car mes fautes s'élèvent au-dessus de ma tête;
  - type: text
    content: pareilles à un lourd fardeau, elles sont trop pesantes pour moi.
  '6':
  - type: text
    content: Mes plaies sont infectes et purulentes
  - type: text
    content: à cause de ma folie.
  '7':
  - type: text
    content: Je suis courbé, complètement abattu;
  - type: text
    content: tout le jour je marche dans la tristesse,
  '8':
  - type: text
    content: car un mal brûle mes reins,
  - type: text
    content: et il n'y a plus rien d'intact dans mon corps.
  '9':
  - type: text
    content: Je suis sans force, entièrement brisé;
  - type: text
    content: le trouble de mon cœur m'arrache des gémissements.
