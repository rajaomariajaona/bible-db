document_id: PSA.38
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Demande de grâce
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Psaume de David, comme mémorial.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Eternel, ne me punis pas dans ta colère
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne me corrige pas dans ta fureur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: car tes flèches m'ont atteint,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ta main a pesé lourdement sur moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il n'y a plus rien d'intact dans mon corps à cause de ta colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n'y a plus rien de sain dans mes os à cause de mon péché,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: car mes fautes s'élèvent au-dessus de ma tête;
- type: usfm
  marker: q1
  children:
  - type: text
    text: pareilles à un lourd fardeau, elles sont trop pesantes pour moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mes plaies sont infectes et purulentes
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de ma folie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je suis courbé, complètement abattu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout le jour je marche dans la tristesse,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: car un mal brûle mes reins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il n'y a plus rien d'intact dans mon corps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je suis sans force, entièrement brisé;
- type: usfm
  marker: q1
  children:
  - type: text
    text: le trouble de mon cœur m'arrache des gémissements.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Seigneur, tu connais tous mes désirs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mes soupirs ne te sont pas cachés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mon cœur est agité, ma force m'abandonne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: même la lumière de mes yeux disparaît.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mes amis, mes compagnons, reculent devant ma plaie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mes proches se tiennent à l'écart!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ceux qui en veulent à ma vie tendent leurs pièges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui cherchent mon malheur disent des méchancetés
- type: usfm
  marker: q1
  children:
  - type: text
    text: et méditent toute la journée des tromperies.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mais moi, pareil à un sourd, je n'entends pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'je suis comme un muet: je n''ouvre pas la bouche.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je suis pareil à un homme qui n'entend pas
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui n'oppose aucune réplique.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Eternel, c'est en toi que j'espère;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu répondras, Seigneur, mon Dieu,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'car j''ai dit: «Ne permets pas qu''ils se réjouissent à mon sujet,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'ils s'attaquent à moi quand mon pied trébuche!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Je suis près de tomber,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ma douleur est toujours présente.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Oui, je reconnais ma faute,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je suis dans la crainte à cause de mon péché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Cependant mes ennemis sont pleins de vie, pleins de force;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux qui me détestent sans raison sont nombreux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ils me rendent le mal pour le bien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sont mes adversaires parce que je recherche le bien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ne m'abandonne pas, Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon Dieu, ne t'éloigne pas de moi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Viens vite à mon secours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Seigneur, mon salut!
