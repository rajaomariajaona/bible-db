document_id: MAT.19,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Ministère de Jésus en Judée
  - type: heading
    content: 19.1–23.39
  - type: heading
    content: Divorce et célibat
  - type: text
    content: 'Lorsque Jésus eut fini de prononcer ces paroles, il quitta la Galilée et alla dans le territoire de la Judée, de l''autre côté du Jourdain. '
  '10':
  - type: text
    content: 'Ses disciples lui dirent: «Si telle est la condition de l''homme vis-à-vis de la femme, il vaut mieux ne pas se marier.» '
  '11':
  - type: text
    content: 'Il leur répondit: «Tous ne comprennent pas cette parole, mais seulement ceux à qui cela est donné. '
  '12':
  - type: text
    content: En effet, il y a des eunuques qui le sont dès le ventre de leur mère, d'autres le sont devenus par les hommes, et il y en a qui se sont faits eux-mêmes eunuques
  - type: note
    content: 'Qui… eunuques: c''est-à-dire qui ont renoncé au mariage.'
  - type: text
    content: ' à cause du royaume des cieux. Que celui qui peut comprendre comprenne.»'
  - type: heading
    content: Les premiers et les derniers
  '13':
  - type: text
    content: 'Alors des gens lui amenèrent des petits enfants afin qu''il pose les mains sur eux et prie pour eux. Mais les disciples leur firent des reproches. '
  '14':
  - type: text
    content: 'Jésus dit: «Laissez les petits enfants, ne les empêchez pas de venir à moi, car le royaume des cieux est pour ceux qui leur ressemblent.» '
  '15':
  - type: text
    content: Il posa les mains sur eux et partit de là.
  '16':
  - type: text
    content: 'Un homme s''approcha et dit à Jésus: «[Bon] Maître, que dois-je faire de bon pour avoir la vie éternelle?» '
  '17':
  - type: text
    content: 'Il lui répondit: «Pourquoi m''appelles-tu bon? Personne n''est bon, si ce n''est Dieu seul. Si tu veux entrer dans la vie, respecte les commandements.» «Lesquels?» lui dit-il. '
  '18':
  - type: text
    content: 'Et Jésus répondit: «'
  - type: text
    content: Tu ne commettras pas de meurtre; tu ne commettras pas d'adultère; tu ne commettras pas de vol; tu ne porteras pas de faux témoignage;
  - type: text
    content: ' '
  '19':
  - type: text
    content: honore ton père et ta mère
  - type: note
    content: 'Tu ne commettras pas de meurtre… ta mère: citation de cinq des dix commandements (Exode 20.12-16; Deutéronome 5.16-20).'
  - type: text
    content: ' et '
  - type: text
    content: tu aimeras ton prochain comme toi-même
  - type: note
    content: 'Tu aimeras… toi-même: citation de Lévitique 19.18.'
  - type: text
    content: '.» '
  '2':
  - type: text
    content: De grandes foules le suivirent, et là il guérit les malades.
  '20':
  - type: text
    content: 'Le jeune homme lui dit: «J''ai respecté tous ces commandements [dès ma jeunesse]. Que me manque-t-il encore?» '
  '21':
  - type: text
    content: 'Jésus lui dit: «Si tu veux être parfait, va vendre ce que tu possèdes, donne-le aux pauvres et tu auras un trésor dans le ciel. Puis viens et suis-moi.» '
  '22':
  - type: text
    content: 'Lorsqu''il entendit cette parole, le jeune homme s''en alla tout triste, car il avait de grands biens. '
  '23':
  - type: text
    content: 'Jésus dit à ses disciples: «Je vous le dis en vérité, il est difficile à un riche d''entrer dans le royaume des cieux. '
  '24':
  - type: text
    content: 'Je vous le dis encore, il est plus facile à un chameau de passer par un trou d''aiguille qu''à un riche d''entrer dans le royaume de Dieu.» '
  '25':
  - type: text
    content: 'Quand les disciples entendirent cela, ils furent très étonnés et dirent: «Qui peut donc être sauvé?» '
  '26':
  - type: text
    content: 'Jésus les regarda et leur dit: «Aux hommes cela est impossible, mais à Dieu tout est possible.»'
  '27':
  - type: text
    content: 'Pierre prit alors la parole et dit: «Voici, nous avons tout quitté et nous t''avons suivi. Que se passera-t-il pour nous?» '
  '28':
  - type: text
    content: 'Jésus leur répondit: «Je vous le dis en vérité, quand le Fils de l''homme, au renouvellement de toutes choses, sera assis sur son trône de gloire, vous qui m''avez suivi, vous serez de même assis sur douze trônes et vous jugerez les douze tribus d''Israël. '
  '29':
  - type: text
    content: 'Et toute personne qui aura quitté à cause de moi ses maisons ou ses frères, ses sœurs, son père, sa mère, sa femme, ses enfants ou ses terres, recevra le centuple et héritera de la vie éternelle. '
  '3':
  - type: text
    content: 'Les pharisiens l''abordèrent et, pour lui tendre un piège, ils lui dirent: «Est-il permis à un homme de divorcer de sa femme pour n''importe quel motif?» '
  '30':
  - type: text
    content: Bien des premiers seront les derniers et bien des derniers seront les premiers.
  '4':
  - type: text
    content: 'Il répondit: «N''avez-vous pas lu que le Créateur, au commencement, '
  - type: text
    content: a fait l'homme et la femme
  - type: note
    content: 'Afait l''homme et la femme: citation de Genèse 1.27.'
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'et qu''il a dit: '
  - type: text
    content: C'est pourquoi l'homme quittera son père et sa mère et s'attachera à sa femme, et les deux ne feront qu'un
  - type: note
    content: 'C''est pourquoi… qu''un: citation de Genèse 2.24.'
  - type: text
    content: '? '
  '6':
  - type: text
    content: 'Ainsi, ils ne sont plus deux mais ne font qu''un. Que l''homme ne sépare donc pas ce que Dieu a uni.» '
  '7':
  - type: text
    content: '«Pourquoi donc, lui dirent-ils, Moïse a-t-il prescrit '
  - type: text
    content: de donner une lettre de divorce à la femme lorsqu'on la renvoie
  - type: note
    content: 'De donner… renvoie: allusion à Deutéronome 24.1.'
  - type: text
    content: '?» '
  '8':
  - type: text
    content: 'Il leur répondit: «C''est à cause de la dureté de votre cœur que Moïse vous a permis de divorcer de vos femmes; au commencement, ce n''était pas le cas. '
  '9':
  - type: text
    content: Mais je vous le dis, celui qui renvoie sa femme, sauf pour cause d'infidélité, et qui en épouse une autre commet un adultère, [et celui qui épouse une femme divorcée commet un adultère].»
