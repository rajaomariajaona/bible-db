document_id: MAT.19,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Ministère de Jésus en Judée
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 19.1–23.39
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Divorce et célibat
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Lorsque Jésus eut fini de prononcer ces paroles, il quitta la Galilée et alla dans le territoire de la Judée, de l''autre côté du Jourdain. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ses disciples lui dirent: «Si telle est la condition de l''homme vis-à-vis de la femme, il vaut mieux ne pas se marier.» '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Il leur répondit: «Tous ne comprennent pas cette parole, mais seulement ceux à qui cela est donné. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: En effet, il y a des eunuques qui le sont dès le ventre de leur mère, d'autres le sont devenus par les hommes, et il y en a qui se sont faits eux-mêmes eunuques
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qui… eunuques: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire qui ont renoncé au mariage.
      marker-yv: yv-n
    - type: text
      text: ' à cause du royaume des cieux. Que celui qui peut comprendre comprenne.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les premiers et les derniers
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Alors des gens lui amenèrent des petits enfants afin qu''il pose les mains sur eux et prie pour eux. Mais les disciples leur firent des reproches. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Jésus dit: «Laissez les petits enfants, ne les empêchez pas de venir à moi, car le royaume des cieux est pour ceux qui leur ressemblent.» '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Il posa les mains sur eux et partit de là.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Un homme s''approcha et dit à Jésus: «[Bon] Maître, que dois-je faire de bon pour avoir la vie éternelle?» '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Il lui répondit: «Pourquoi m''appelles-tu bon? Personne n''est bon, si ce n''est Dieu seul. Si tu veux entrer dans la vie, respecte les commandements.» «Lesquels?» lui dit-il. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Et Jésus répondit: «'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu ne commettras pas de meurtre; tu ne commettras pas d'adultère; tu ne commettras pas de vol; tu ne porteras pas de faux témoignage;
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: honore ton père et ta mère
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.18-19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu ne commettras pas de meurtre… ta mère: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation de cinq des dix commandements (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Exode 20.12-16
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deutéronome 5.16-20
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' et '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: tu aimeras ton prochain comme toi-même
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu aimeras… toi-même: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lévitique 19.18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '.» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: De grandes foules le suivirent, et là il guérit les malades.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Le jeune homme lui dit: «J''ai respecté tous ces commandements [dès ma jeunesse]. Que me manque-t-il encore?» '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Jésus lui dit: «Si tu veux être parfait, va vendre ce que tu possèdes, donne-le aux pauvres et tu auras un trésor dans le ciel. Puis viens et suis-moi.» '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Lorsqu''il entendit cette parole, le jeune homme s''en alla tout triste, car il avait de grands biens. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Jésus dit à ses disciples: «Je vous le dis en vérité, il est difficile à un riche d''entrer dans le royaume des cieux. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Je vous le dis encore, il est plus facile à un chameau de passer par un trou d''aiguille qu''à un riche d''entrer dans le royaume de Dieu.» '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Quand les disciples entendirent cela, ils furent très étonnés et dirent: «Qui peut donc être sauvé?» '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Jésus les regarda et leur dit: «Aux hommes cela est impossible, mais à Dieu tout est possible.»'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Pierre prit alors la parole et dit: «Voici, nous avons tout quitté et nous t''avons suivi. Que se passera-t-il pour nous?» '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Jésus leur répondit: «Je vous le dis en vérité, quand le Fils de l''homme, au renouvellement de toutes choses, sera assis sur son trône de gloire, vous qui m''avez suivi, vous serez de même assis sur douze trônes et vous jugerez les douze tribus d''Israël. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Et toute personne qui aura quitté à cause de moi ses maisons ou ses frères, ses sœurs, son père, sa mère, sa femme, ses enfants ou ses terres, recevra le centuple et héritera de la vie éternelle. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Les pharisiens l''abordèrent et, pour lui tendre un piège, ils lui dirent: «Est-il permis à un homme de divorcer de sa femme pour n''importe quel motif?» '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Bien des premiers seront les derniers et bien des derniers seront les premiers.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il répondit: «N''avez-vous pas lu que le Créateur, au commencement, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: a fait l'homme et la femme
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Afait l''homme et la femme: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Genèse 1.27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'et qu''il a dit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: C'est pourquoi l'homme quittera son père et sa mère et s'attachera à sa femme, et les deux ne feront qu'un
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'C''est pourquoi… qu''un: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Genèse 2.24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ainsi, ils ne sont plus deux mais ne font qu''un. Que l''homme ne sépare donc pas ce que Dieu a uni.» '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '«Pourquoi donc, lui dirent-ils, Moïse a-t-il prescrit '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: de donner une lettre de divorce à la femme lorsqu'on la renvoie
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'De donner… renvoie: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'allusion à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deutéronome 24.1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '?» '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Il leur répondit: «C''est à cause de la dureté de votre cœur que Moïse vous a permis de divorcer de vos femmes; au commencement, ce n''était pas le cas. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Mais je vous le dis, celui qui renvoie sa femme, sauf pour cause d'infidélité, et qui en épouse une autre commet un adultère, [et celui qui épouse une femme divorcée commet un adultère].»
