document_id: 1PE.3
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Vous de même, femmes, soumettez-vous à votre mari. Ainsi, ceux qui refusent de croire à la parole pourront être gagnés sans parole par la conduite de leur femme, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'en observant votre manière de vivre pure et respectueuse: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'que votre parure ne soit pas une parure extérieure – cheveux tressés, ornements d''or ou vêtements élégants – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'mais plutôt celle intérieure et cachée du cœur, la pureté incorruptible d''un esprit doux et paisible, qui est d''une grande valeur devant Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'C''est ainsi que les femmes saintes qui espéraient en Dieu se paraient autrefois. Elles se soumettaient à leur mari '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: comme Sara, qui a obéi à Abraham en l'appelant son seigneur. Vous êtes devenues ses filles en faisant ce qui est bien, sans vous laisser troubler par aucune crainte.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Maris, vivez de même en montrant de la compréhension à votre femme, en tenant compte de sa nature plus délicate; montrez-lui de l'estime, car elle doit hériter avec vous de la grâce de la vie. Agissez ainsi afin que rien ne fasse obstacle à vos prières.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Enfin, ayez tous les mêmes pensées et les mêmes sentiments, soyez pleins d''amour fraternel, de compassion, de bienveillance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ne rendez pas le mal pour le mal, ni l''insulte pour l''insulte; bénissez au contraire. Vous le savez, c''est à cela que vous avez été appelés afin d''hériter de la bénédiction. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Si quelqu'un, en effet, veut aimer la vie et voir des jours heureux, qu'il préserve sa langue du mal et ses lèvres des paroles trompeuses,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: qu'il se détourne du mal et fasse le bien, qu'il recherche la paix et la poursuive,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: car les yeux du Seigneur sont sur les justes et ses oreilles sont attentives à leur prière, mais il se tourne contre ceux qui font le mal
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10-12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Si quelqu''un… le mal: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 34.13-17
      metadata:
        usfm: PSA.34.13+PSA.34.14+PSA.34.15+PSA.34.16+PSA.34.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Qui vous fera du mal, si vous avez pour modèle ce qui est bien? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'D''ailleurs, même si vous deviez souffrir pour la justice, vous seriez heureux. '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: N'ayez d'eux aucune crainte et ne soyez pas troublés,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: mais respectez
  - type: text
    text: ' dans votre cœur '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: la sainteté de Dieu le Seigneur
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14-15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'N''ayez… le Seigneur: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 8.12-13
      metadata:
        usfm: ISA.8.12+ISA.8.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' Soyez toujours prêts à défendre l''espérance qui est en vous, devant tous ceux qui vous en demandent raison, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '[mais] faites-le avec douceur et respect, en gardant une bonne conscience, afin que là même où ils vous calomnient [comme si vous faisiez le mal], ceux qui critiquent votre bonne conduite en Christ soient couverts de honte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: En effet, il vaut mieux souffrir, si telle est la volonté de Dieu, en faisant le bien qu'en faisant le mal.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Christ, un exemple dans la souffrance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Christ aussi a souffert, et ce une fois pour toutes, pour les péchés. Lui le juste, il a souffert pour des injustes afin de vous conduire à Dieu. Il a souffert une mort humaine, mais il a été rendu à la vie par l''Esprit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'C''est alors aussi qu''il est allé faire une proclamation aux esprits en prison, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ceux-là mêmes qui avaient été rebelles autrefois, lorsque la patience de Dieu se prolongeait à l''époque de Noé, pendant la construction de l''arche. Un petit nombre de personnes, à savoir huit, sont entrées dans ce bateau et ont été sauvées à travers l''eau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'C''était une figure: nous aussi maintenant, nous sommes sauvés par un baptême qui ne consiste pas dans la purification d''une impureté physique, mais dans l''engagement d''une bonne conscience envers Dieu. Il nous sauve à travers la résurrection de Jésus-Christ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: qui est monté au ciel, a reçu la soumission des anges, des autorités et des puissances et se trouve à la droite de Dieu.
