document_id: 1PE.3,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Vous de même, femmes, soumettez-vous à votre mari. Ainsi, ceux qui refusent de croire à la parole pourront être gagnés sans parole par la conduite de leur femme, '
  '10':
  - type: text
    content: Si quelqu'un, en effet, veut aimer la vie et voir des jours heureux, qu'il préserve sa langue du mal et ses lèvres des paroles trompeuses,
  - type: text
    content: ' '
  '11':
  - type: text
    content: qu'il se détourne du mal et fasse le bien, qu'il recherche la paix et la poursuive,
  - type: text
    content: ' '
  '12':
  - type: text
    content: car les yeux du Seigneur sont sur les justes et ses oreilles sont attentives à leur prière, mais il se tourne contre ceux qui font le mal
  - type: text
    content: .
  - type: note
    content: 'Si quelqu''un… le mal: citation du Psaume 34.13-17.'
  '13':
  - type: text
    content: 'Qui vous fera du mal, si vous avez pour modèle ce qui est bien? '
  '14':
  - type: text
    content: 'D''ailleurs, même si vous deviez souffrir pour la justice, vous seriez heureux. '
  - type: text
    content: N'ayez d'eux aucune crainte et ne soyez pas troublés,
  - type: text
    content: ' '
  '15':
  - type: text
    content: mais respectez
  - type: text
    content: ' dans votre cœur '
  - type: text
    content: la sainteté de Dieu le Seigneur
  - type: text
    content: .
  - type: note
    content: 'N''ayez… le Seigneur: citation d''Esaïe 8.12-13.'
  - type: text
    content: ' Soyez toujours prêts à défendre l''espérance qui est en vous, devant tous ceux qui vous en demandent raison, '
  '16':
  - type: text
    content: '[mais] faites-le avec douceur et respect, en gardant une bonne conscience, afin que là même où ils vous calomnient [comme si vous faisiez le mal], ceux qui critiquent votre bonne conduite en Christ soient couverts de honte. '
  '17':
  - type: text
    content: En effet, il vaut mieux souffrir, si telle est la volonté de Dieu, en faisant le bien qu'en faisant le mal.
  - type: heading
    content: Christ, un exemple dans la souffrance
  '18':
  - type: text
    content: 'Christ aussi a souffert, et ce une fois pour toutes, pour les péchés. Lui le juste, il a souffert pour des injustes afin de vous conduire à Dieu. Il a souffert une mort humaine, mais il a été rendu à la vie par l''Esprit. '
  '19':
  - type: text
    content: 'C''est alors aussi qu''il est allé faire une proclamation aux esprits en prison, '
  '2':
  - type: text
    content: 'en observant votre manière de vivre pure et respectueuse: '
  '20':
  - type: text
    content: 'ceux-là mêmes qui avaient été rebelles autrefois, lorsque la patience de Dieu se prolongeait à l''époque de Noé, pendant la construction de l''arche. Un petit nombre de personnes, à savoir huit, sont entrées dans ce bateau et ont été sauvées à travers l''eau. '
  '21':
  - type: text
    content: 'C''était une figure: nous aussi maintenant, nous sommes sauvés par un baptême qui ne consiste pas dans la purification d''une impureté physique, mais dans l''engagement d''une bonne conscience envers Dieu. Il nous sauve à travers la résurrection de Jésus-Christ '
  '22':
  - type: text
    content: qui est monté au ciel, a reçu la soumission des anges, des autorités et des puissances et se trouve à la droite de Dieu.
  '3':
  - type: text
    content: 'que votre parure ne soit pas une parure extérieure – cheveux tressés, ornements d''or ou vêtements élégants – '
  '4':
  - type: text
    content: 'mais plutôt celle intérieure et cachée du cœur, la pureté incorruptible d''un esprit doux et paisible, qui est d''une grande valeur devant Dieu. '
  '5':
  - type: text
    content: 'C''est ainsi que les femmes saintes qui espéraient en Dieu se paraient autrefois. Elles se soumettaient à leur mari '
  '6':
  - type: text
    content: comme Sara, qui a obéi à Abraham en l'appelant son seigneur. Vous êtes devenues ses filles en faisant ce qui est bien, sans vous laisser troubler par aucune crainte.
  '7':
  - type: text
    content: Maris, vivez de même en montrant de la compréhension à votre femme, en tenant compte de sa nature plus délicate; montrez-lui de l'estime, car elle doit hériter avec vous de la grâce de la vie. Agissez ainsi afin que rien ne fasse obstacle à vos prières.
  '8':
  - type: text
    content: 'Enfin, ayez tous les mêmes pensées et les mêmes sentiments, soyez pleins d''amour fraternel, de compassion, de bienveillance. '
  '9':
  - type: text
    content: 'Ne rendez pas le mal pour le mal, ni l''insulte pour l''insulte; bénissez au contraire. Vous le savez, c''est à cela que vous avez été appelés afin d''hériter de la bénédiction. '
