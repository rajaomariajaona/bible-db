document_id: PSA.146,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Louange à Dieu pour son secours
  - type: text
    content: Louez l'Eternel!
  - type: text
    content: Loue l'Eternel, mon âme!
  '10':
  - type: text
    content: L'Eternel règne éternellement.
  - type: text
    content: Il est ton Dieu, Sion, de génération en génération!
  - type: text
    content: Louez l'Eternel!
  '2':
  - type: text
    content: Je louerai l'Eternel tant que je vivrai,
  - type: text
    content: je célébrerai mon Dieu tant que j'existerai.
  '3':
  - type: text
    content: Ne placez pas votre confiance dans les grands,
  - type: text
    content: dans les hommes qui sont incapables de sauver.
  '4':
  - type: text
    content: Leur souffle s'en va, ils retournent à la terre
  - type: text
    content: et leurs projets meurent avec eux.
  '5':
  - type: text
    content: Heureux celui qui a pour secours le Dieu de Jacob,
  - type: text
    content: qui met son espoir en l'Eternel, son Dieu!
  '6':
  - type: text
    content: '*Il a fait le ciel et la terre,'
  - type: text
    content: la mer et tout ce qui s'y trouve
  - type: note
    content: 'Il a fait… trouve: cité en Actes 4.24; 14.15 (cf. Exode 20.11).'
  - type: text
    content: ;
  - type: text
    content: il protège éternellement la vérité.
  '7':
  - type: text
    content: Il fait droit aux opprimés,
  - type: text
    content: il donne du pain aux affamés.
  - type: text
    content: L'Eternel délivre les prisonniers,
  '8':
  - type: text
    content: l'Eternel ouvre les yeux des aveugles,
  - type: text
    content: l'Eternel redresse ceux qui sont courbés,
  - type: text
    content: l'Eternel aime les justes.
  '9':
  - type: text
    content: L'Eternel protège les étrangers,
  - type: text
    content: il soutient l'orphelin et la veuve,
  - type: text
    content: mais il fait dévier la voie des méchants.
