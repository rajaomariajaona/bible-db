document_id: PSA.146
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Louange à Dieu pour son secours
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Louez l'Eternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Loue l'Eternel, mon âme!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je louerai l'Eternel tant que je vivrai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je célébrerai mon Dieu tant que j'existerai.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ne placez pas votre confiance dans les grands,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans les hommes qui sont incapables de sauver.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Leur souffle s'en va, ils retournent à la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leurs projets meurent avec eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Heureux celui qui a pour secours le Dieu de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui met son espoir en l'Eternel, son Dieu!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '*Il a fait le ciel et la terre,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: la mer et tout ce qui s'y trouve
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '146.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il a fait… trouve: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Actes 4.24
      metadata:
        usfm: ACT.4.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14.15'
      metadata:
        usfm: ACT.14.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (cf. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 20.11
      metadata:
        usfm: EXO.20.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il protège éternellement la vérité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il fait droit aux opprimés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il donne du pain aux affamés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Eternel délivre les prisonniers,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: l'Eternel ouvre les yeux des aveugles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'Eternel redresse ceux qui sont courbés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'Eternel aime les justes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L'Eternel protège les étrangers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il soutient l'orphelin et la veuve,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il fait dévier la voie des méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: L'Eternel règne éternellement.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est ton Dieu, Sion, de génération en génération!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez l'Eternel!
