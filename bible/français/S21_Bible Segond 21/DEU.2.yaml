document_id: DEU.2,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Marches et conflits dans le désert
  - type: text
    content: »Nous nous sommes tournés et sommes partis pour le désert en empruntant le chemin de la mer des Roseaux, comme l'Eternel me l'avait ordonné. Nous avons tourné longtemps autour de la région montagneuse de Séir.
  '10':
  - type: text
    content: '– Les Emim y habitaient auparavant. C''était un peuple grand, nombreux et de haute taille, comme les Anakim. '
  '11':
  - type: text
    content: 'Ils passaient aussi pour être des Rephaïm, de même que les Anakim; mais les Moabites les appelaient Emim. '
  '12':
  - type: text
    content: 'Séir était habité autrefois par les Horiens. Les descendants d''Esaü les avaient chassés et détruits devant eux, et ils s''étaient installés à leur place, comme l''a fait Israël dans le pays qu''il possède parce que l''Eternel le lui a donné. – '
  '13':
  - type: text
    content: Maintenant levez-vous et passez le torrent de Zéred.’ Nous avons passé le torrent de Zéred.
  '14':
  - type: text
    content: '»Notre parcours de Kadès-Barnéa jusqu''au passage du torrent de Zéred a duré 38 ans, jusqu''à ce que toute la génération des hommes de guerre ait disparu du camp, comme l''Eternel le leur avait juré. '
  '15':
  - type: text
    content: L'Eternel a lui-même porté la main contre eux pour les éliminer du camp jusqu'à leur complète disparition.
  '16':
  - type: text
    content: '»Une fois que la mort a fait disparaître tous les hommes de guerre du milieu du peuple, '
  '17':
  - type: text
    content: 'l''Eternel m''a dit: '
  '18':
  - type: text
    content: '‘Tu vas aujourd''hui traverser le territoire de Moab en passant à Ar '
  '19':
  - type: text
    content: 'et tu t''approcheras des Ammonites. Ne les attaque pas et ne t''engage pas dans un combat contre eux, car je ne te donnerai rien à posséder dans le pays des Ammonites: c''est aux descendants de Lot que je l''ai donné en propriété. '
  '2':
  - type: text
    content: '»L''Eternel m''a dit: '
  '20':
  - type: text
    content: '– Ce pays passait aussi pour être un pays de Rephaïm. Des Rephaïm y habitaient auparavant et les Ammonites les appelaient Zamzummim: '
  '21':
  - type: text
    content: 'c''était un peuple grand, nombreux et de haute taille, comme les Anakim. L''Eternel les avait détruits devant les Ammonites, qui les avaient chassés et s''étaient installés à leur place. '
  '22':
  - type: text
    content: 'C''est de la même manière que l''Eternel avait agi pour les descendants d''Esaü qui habitent en Séir, quand il avait détruit les Horiens devant eux; ils les avaient chassés et s''étaient installés à leur place jusqu''à aujourd''hui. '
  '23':
  - type: text
    content: 'Les Avviens, qui habitaient dans des villages jusqu''à Gaza, avaient été détruits par les Caphtorim, venus de Caphtor, qui s''étaient installés à leur place. – '
  '24':
  - type: text
    content: 'Levez-vous, partez et passez le torrent de l''Arnon. Regarde, je livre entre tes mains l''Amoréen Sihon, roi de Hesbon, et son pays. Commence la conquête, fais-lui la guerre! '
  '25':
  - type: text
    content: Je vais répandre dès aujourd'hui la frayeur et la peur vis-à-vis de toi sur tous les peuples qui sont sous le ciel. A la seule mention de ton nom, ils trembleront et seront saisis d'angoisse à cause de toi.’
  - type: heading
    content: Conquête du royaume de Sihon
  '26':
  - type: text
    content: '»Du désert de Kedémoth, j''ai envoyé des messagers porteurs de paroles de paix à Sihon, le roi de Hesbon. Je lui ai fait dire: '
  '27':
  - type: text
    content: '‘Laisse-moi passer par ton pays. Je suivrai la grande route sans m''en écarter ni à droite ni à gauche. '
  '28':
  - type: text
    content: 'Tu me vendras à prix d''argent la nourriture que je mangerai et tu me donneras à prix d''argent l''eau que je boirai. Je ne ferai que passer. '
  '29':
  - type: text
    content: 'C''est ce que m''ont permis de faire les descendants d''Esaü qui habitent en Séir et les Moabites qui demeurent à Ar. Permets-le aussi, jusqu''à ce que j''aie passé le Jourdain pour entrer dans le pays que l''Eternel, notre Dieu, nous donne.’ '
  '3':
  - type: text
    content: '‘Vous avez assez longtemps tourné autour de cette région montagneuse. Tournez-vous vers le nord. '
  '30':
  - type: text
    content: 'Mais Sihon, roi de Hesbon, n''a pas voulu nous laisser passer chez lui. En effet, l''Eternel, ton Dieu, a rendu son esprit inflexible et a endurci son cœur afin de le livrer entre tes mains, comme tu le vois aujourd''hui. '
  '31':
  - type: text
    content: 'L''Eternel m''a dit: ‘Regarde, je te livre dès maintenant Sihon et son pays.’'
  '32':
  - type: text
    content: '»Sihon est sorti à notre rencontre avec tout son peuple pour nous combattre à Jahats. '
  '33':
  - type: text
    content: 'L''Eternel, notre Dieu, nous l''a livré et nous l''avons battu, lui, ses fils et tout son peuple. '
  '34':
  - type: text
    content: 'Nous avons alors pris toutes ses villes et nous les avons vouées à la destruction, hommes, femmes et petits enfants, sans laisser un seul survivant. '
  '35':
  - type: text
    content: 'Seulement, nous avons pillé pour nous le bétail et le butin des villes que nous avions prises. '
  '36':
  - type: text
    content: 'Depuis Aroër sur les bords du torrent de l''Arnon et la ville qui se trouve dans la vallée jusqu''à Galaad, il n''y a pas eu de ville trop forte pour nous: l''Eternel, notre Dieu, nous a tout livré. '
  '37':
  - type: text
    content: Mais tu ne t'es pas approché du pays des Ammonites, de tous les bords du torrent du Jabbok, des villes de la montagne, de tous les endroits que l'Eternel, notre Dieu, t'avait défendu d'attaquer.
  '4':
  - type: text
    content: 'Donne cet ordre au peuple: Vous allez traverser le territoire de vos frères'
  - type: note
    content: 'Vos frères: ancêtre des Edomites, Esaü était le frère jumeau de Jacob, l''ancêtre d''Israël.'
  - type: text
    content: ', les descendants d''Esaü qui habitent en Séir. Ils auront peur de vous, mais tenez-vous bien sur vos gardes. '
  '5':
  - type: text
    content: 'Ne les attaquez pas, car je ne vous donnerai dans leur pays pas même de quoi poser la plante du pied. En effet, c''est à Esaü que j''ai donné la région montagneuse de Séir en propriété. '
  '6':
  - type: text
    content: 'Vous leur achèterez à prix d''argent la nourriture que vous mangerez et même l''eau que vous boirez.’ '
  '7':
  - type: text
    content: 'En effet, l''Eternel, ton Dieu, t''a béni dans tout le travail de tes mains, il était attentif à ton parcours dans ce grand désert. Voilà 40 ans que l''Eternel, ton Dieu, est avec toi: tu n''as manqué de rien.'
  '8':
  - type: text
    content: »Nous sommes passés à distance de nos frères, les descendants d'Esaü, qui habitent en Séir et à distance du chemin de la plaine, d'Elath et d'Etsjon-Guéber, puis nous nous sommes tournés vers le nord et nous avons pris la direction du désert de Moab.
  '9':
  - type: text
    content: '»L''Eternel m''a dit: ‘N''attaque pas Moab et ne t''engage pas dans un combat contre lui, car je ne te donnerai rien à posséder dans son pays: c''est aux descendants de Lot que j''ai donné Ar en propriété. '
