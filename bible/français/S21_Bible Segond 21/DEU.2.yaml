document_id: DEU.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Marches et conflits dans le désert
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: »Nous nous sommes tournés et sommes partis pour le désert en empruntant le chemin de la mer des Roseaux, comme l'Eternel me l'avait ordonné. Nous avons tourné longtemps autour de la région montagneuse de Séir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '»L''Eternel m''a dit: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '‘Vous avez assez longtemps tourné autour de cette région montagneuse. Tournez-vous vers le nord. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Donne cet ordre au peuple: Vous allez traverser le territoire de vos frères'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Vos frères: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ancêtre des Edomites, Esaü était le frère jumeau de Jacob, l'ancêtre d'Israël.
    marker-yv: yv-n
  - type: text
    text: ', les descendants d''Esaü qui habitent en Séir. Ils auront peur de vous, mais tenez-vous bien sur vos gardes. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ne les attaquez pas, car je ne vous donnerai dans leur pays pas même de quoi poser la plante du pied. En effet, c''est à Esaü que j''ai donné la région montagneuse de Séir en propriété. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Vous leur achèterez à prix d''argent la nourriture que vous mangerez et même l''eau que vous boirez.’ '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'En effet, l''Eternel, ton Dieu, t''a béni dans tout le travail de tes mains, il était attentif à ton parcours dans ce grand désert. Voilà 40 ans que l''Eternel, ton Dieu, est avec toi: tu n''as manqué de rien.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: »Nous sommes passés à distance de nos frères, les descendants d'Esaü, qui habitent en Séir et à distance du chemin de la plaine, d'Elath et d'Etsjon-Guéber, puis nous nous sommes tournés vers le nord et nous avons pris la direction du désert de Moab.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '»L''Eternel m''a dit: ‘N''attaque pas Moab et ne t''engage pas dans un combat contre lui, car je ne te donnerai rien à posséder dans son pays: c''est aux descendants de Lot que j''ai donné Ar en propriété. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '– Les Emim y habitaient auparavant. C''était un peuple grand, nombreux et de haute taille, comme les Anakim. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils passaient aussi pour être des Rephaïm, de même que les Anakim; mais les Moabites les appelaient Emim. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Séir était habité autrefois par les Horiens. Les descendants d''Esaü les avaient chassés et détruits devant eux, et ils s''étaient installés à leur place, comme l''a fait Israël dans le pays qu''il possède parce que l''Eternel le lui a donné. – '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Maintenant levez-vous et passez le torrent de Zéred.’ Nous avons passé le torrent de Zéred.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '»Notre parcours de Kadès-Barnéa jusqu''au passage du torrent de Zéred a duré 38 ans, jusqu''à ce que toute la génération des hommes de guerre ait disparu du camp, comme l''Eternel le leur avait juré. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: L'Eternel a lui-même porté la main contre eux pour les éliminer du camp jusqu'à leur complète disparition.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '»Une fois que la mort a fait disparaître tous les hommes de guerre du milieu du peuple, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'l''Eternel m''a dit: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '‘Tu vas aujourd''hui traverser le territoire de Moab en passant à Ar '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'et tu t''approcheras des Ammonites. Ne les attaque pas et ne t''engage pas dans un combat contre eux, car je ne te donnerai rien à posséder dans le pays des Ammonites: c''est aux descendants de Lot que je l''ai donné en propriété. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '– Ce pays passait aussi pour être un pays de Rephaïm. Des Rephaïm y habitaient auparavant et les Ammonites les appelaient Zamzummim: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'c''était un peuple grand, nombreux et de haute taille, comme les Anakim. L''Eternel les avait détruits devant les Ammonites, qui les avaient chassés et s''étaient installés à leur place. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'C''est de la même manière que l''Eternel avait agi pour les descendants d''Esaü qui habitent en Séir, quand il avait détruit les Horiens devant eux; ils les avaient chassés et s''étaient installés à leur place jusqu''à aujourd''hui. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Les Avviens, qui habitaient dans des villages jusqu''à Gaza, avaient été détruits par les Caphtorim, venus de Caphtor, qui s''étaient installés à leur place. – '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Levez-vous, partez et passez le torrent de l''Arnon. Regarde, je livre entre tes mains l''Amoréen Sihon, roi de Hesbon, et son pays. Commence la conquête, fais-lui la guerre! '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Je vais répandre dès aujourd'hui la frayeur et la peur vis-à-vis de toi sur tous les peuples qui sont sous le ciel. A la seule mention de ton nom, ils trembleront et seront saisis d'angoisse à cause de toi.’
- type: usfm
  marker: s1
  children:
  - type: text
    text: Conquête du royaume de Sihon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '»Du désert de Kedémoth, j''ai envoyé des messagers porteurs de paroles de paix à Sihon, le roi de Hesbon. Je lui ai fait dire: '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '‘Laisse-moi passer par ton pays. Je suivrai la grande route sans m''en écarter ni à droite ni à gauche. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Tu me vendras à prix d''argent la nourriture que je mangerai et tu me donneras à prix d''argent l''eau que je boirai. Je ne ferai que passer. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'C''est ce que m''ont permis de faire les descendants d''Esaü qui habitent en Séir et les Moabites qui demeurent à Ar. Permets-le aussi, jusqu''à ce que j''aie passé le Jourdain pour entrer dans le pays que l''Eternel, notre Dieu, nous donne.’ '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Mais Sihon, roi de Hesbon, n''a pas voulu nous laisser passer chez lui. En effet, l''Eternel, ton Dieu, a rendu son esprit inflexible et a endurci son cœur afin de le livrer entre tes mains, comme tu le vois aujourd''hui. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'L''Eternel m''a dit: ‘Regarde, je te livre dès maintenant Sihon et son pays.’'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '»Sihon est sorti à notre rencontre avec tout son peuple pour nous combattre à Jahats. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'L''Eternel, notre Dieu, nous l''a livré et nous l''avons battu, lui, ses fils et tout son peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Nous avons alors pris toutes ses villes et nous les avons vouées à la destruction, hommes, femmes et petits enfants, sans laisser un seul survivant. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Seulement, nous avons pillé pour nous le bétail et le butin des villes que nous avions prises. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Depuis Aroër sur les bords du torrent de l''Arnon et la ville qui se trouve dans la vallée jusqu''à Galaad, il n''y a pas eu de ville trop forte pour nous: l''Eternel, notre Dieu, nous a tout livré. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Mais tu ne t'es pas approché du pays des Ammonites, de tous les bords du torrent du Jabbok, des villes de la montagne, de tous les endroits que l'Eternel, notre Dieu, t'avait défendu d'attaquer.
