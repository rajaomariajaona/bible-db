document_id: 2JN.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salutation et louange
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'De la part de l''ancien à la dame qui a été choisie et à ses enfants que j''aime dans la vérité. Et ce n''est pas moi seulement qui les aime, mais aussi tous ceux qui ont connu la vérité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Nous vous aimons à cause de la vérité qui demeure en nous et qui sera avec nous pour l''éternité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Oui, la grâce, la compassion et la paix seront avec nous dans la vérité et l'amour. Elles viennent de Dieu le Père et [du Seigneur] Jésus-Christ, le Fils du Père.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: J'ai éprouvé une très grande joie à rencontrer quelques-uns de tes enfants qui marchent dans la vérité, conformément au commandement que nous avons reçu du Père.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Appel à un amour doublé de vigilance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et maintenant, voici ce que je te demande, chère dame: c''est que nous nous aimions les uns les autres. Ce n''est pas un commandement nouveau que je t''écris, mais celui que nous avons reçu dès le commencement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Or l'amour consiste à vivre conformément à ses commandements. Tel est le commandement dans lequel vous devez marcher, comme vous l'avez appris depuis le début.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: En effet, de nombreux imposteurs sont venus dans le monde; ils ne reconnaissent pas que Jésus est le Messie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le Messie: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire l'oint (ou Christ) de Dieu qui, d'après l'Ancien Testament, devait apporter la délivrance et exercer une autorité universelle.
    marker-yv: yv-n
  - type: text
    text: ' venu en homme. Voilà ce qui caractérise l''imposteur et l''Antichrist. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Faites attention à vous-mêmes. Ainsi nous ne perdrons pas le fruit de notre travail mais recevrons une pleine récompense. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Quiconque s''écarte de ce chemin et ne demeure pas dans l''enseignement de Christ n''a pas Dieu; celui qui demeure dans l''enseignement [de Christ] a le Père et le Fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Si quelqu''un vient chez vous et n''apporte pas cet enseignement, ne le prenez pas chez vous et ne le saluez pas, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: car celui qui le salue
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10, 11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ne le saluez pas… le salue: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: probablement au sens d'une bienvenue officielle.
    marker-yv: yv-n
  - type: text
    text: ' s''associe à ses mauvaises œuvres.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: J'ai beaucoup de choses à vous écrire, mais je n'ai pas voulu le faire avec le papier et l'encre. J'espère venir chez vous et vous parler de vive voix afin que notre joie soit complète.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Les enfants de ta sœur, choisie elle aussi, te saluent.
