document_id: 2JN.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation et louange
  - type: text
    content: 'De la part de l''ancien à la dame qui a été choisie et à ses enfants que j''aime dans la vérité. Et ce n''est pas moi seulement qui les aime, mais aussi tous ceux qui ont connu la vérité. '
  '10':
  - type: text
    content: 'Si quelqu''un vient chez vous et n''apporte pas cet enseignement, ne le prenez pas chez vous et ne le saluez pas, '
  '11':
  - type: text
    content: car celui qui le salue
  - type: note
    content: 'Ne le saluez pas… le salue: probablement au sens d''une bienvenue officielle.'
  - type: text
    content: ' s''associe à ses mauvaises œuvres.'
  '12':
  - type: text
    content: J'ai beaucoup de choses à vous écrire, mais je n'ai pas voulu le faire avec le papier et l'encre. J'espère venir chez vous et vous parler de vive voix afin que notre joie soit complète.
  '13':
  - type: text
    content: Les enfants de ta sœur, choisie elle aussi, te saluent.
  '2':
  - type: text
    content: 'Nous vous aimons à cause de la vérité qui demeure en nous et qui sera avec nous pour l''éternité. '
  '3':
  - type: text
    content: Oui, la grâce, la compassion et la paix seront avec nous dans la vérité et l'amour. Elles viennent de Dieu le Père et [du Seigneur] Jésus-Christ, le Fils du Père.
  '4':
  - type: text
    content: J'ai éprouvé une très grande joie à rencontrer quelques-uns de tes enfants qui marchent dans la vérité, conformément au commandement que nous avons reçu du Père.
  - type: heading
    content: Appel à un amour doublé de vigilance
  '5':
  - type: text
    content: 'Et maintenant, voici ce que je te demande, chère dame: c''est que nous nous aimions les uns les autres. Ce n''est pas un commandement nouveau que je t''écris, mais celui que nous avons reçu dès le commencement. '
  '6':
  - type: text
    content: Or l'amour consiste à vivre conformément à ses commandements. Tel est le commandement dans lequel vous devez marcher, comme vous l'avez appris depuis le début.
  '7':
  - type: text
    content: En effet, de nombreux imposteurs sont venus dans le monde; ils ne reconnaissent pas que Jésus est le Messie
  - type: note
    content: 'Le Messie: c''est-à-dire l''oint (ou Christ) de Dieu qui, d''après l''Ancien Testament, devait apporter la délivrance et exercer une autorité universelle.'
  - type: text
    content: ' venu en homme. Voilà ce qui caractérise l''imposteur et l''Antichrist. '
  '8':
  - type: text
    content: 'Faites attention à vous-mêmes. Ainsi nous ne perdrons pas le fruit de notre travail mais recevrons une pleine récompense. '
  '9':
  - type: text
    content: 'Quiconque s''écarte de ce chemin et ne demeure pas dans l''enseignement de Christ n''a pas Dieu; celui qui demeure dans l''enseignement [de Christ] a le Père et le Fils. '
