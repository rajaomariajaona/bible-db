document_id: JAS.4,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'D''où viennent les conflits et d''où viennent les luttes parmi vous? N''est-ce pas de vos passions qui combattent dans vos membres? '
  '10':
  - type: text
    content: Humiliez-vous devant le Seigneur et il vous élèvera.
  '11':
  - type: text
    content: 'Ne dites pas du mal les uns des autres, frères et sœurs. Celui qui parle contre un frère ou qui juge son frère parle contre la loi et juge la loi. Or, si tu juges la loi, tu ne la mets pas en pratique, mais tu t''en fais le juge. '
  '12':
  - type: text
    content: 'Un seul est législateur [et juge]: c''est celui qui peut sauver et perdre. Mais toi, qui es-tu pour juger ton prochain?'
  - type: heading
    content: Avertissement aux riches
  '13':
  - type: text
    content: 'A vous maintenant qui dites: «Aujourd''hui ou demain nous irons dans telle ville, nous y passerons une année, nous y ferons des affaires et nous gagnerons de l''argent», '
  '14':
  - type: text
    content: 'vous qui ne savez pas ce qui arrivera demain! En effet, qu''est-ce que votre vie? C''est une vapeur qui paraît pour un instant et qui disparaît ensuite. '
  '15':
  - type: text
    content: 'Vous devriez dire, au contraire: «Si Dieu le veut, nous vivrons et nous ferons ceci ou cela.» '
  '16':
  - type: text
    content: 'Mais en réalité, vous vous montrez fiers de vos fanfaronnades. Toute fierté de ce genre est mauvaise. '
  '17':
  - type: text
    content: Si donc quelqu'un sait faire ce qui est bien et ne le fait pas, il commet un péché.
  '2':
  - type: text
    content: 'Vous désirez et vous ne possédez pas; vous êtes meurtriers et jaloux, et vous ne pouvez rien obtenir; vous avez des luttes et des conflits. Vous ne possédez pas parce que vous ne demandez pas. '
  '3':
  - type: text
    content: Quand vous demandez, vous ne recevez pas parce que vous demandez mal, dans le but de satisfaire vos passions.
  '4':
  - type: text
    content: 'Adultères que vous êtes! Ne savez-vous pas que l''amour pour le monde est synonyme de haine contre Dieu? Celui donc qui veut être l''ami du monde se fait l''ennemi de Dieu. '
  '5':
  - type: text
    content: 'Croyez-vous que l''Ecriture parle sans raison? C''est avec jalousie que Dieu aime l''Esprit qui habite en nous. '
  '6':
  - type: text
    content: 'Cependant, la grâce qu''il accorde est plus grande encore, c''est pourquoi l''Ecriture dit: '
  - type: text
    content: Dieu s'oppose aux orgueilleux, mais il fait grâce aux humbles.
  - type: note
    content: 'Dieu s''oppose… humbles: citation de Proverbes 3.34.'
  '7':
  - type: text
    content: 'Soumettez-vous donc à Dieu, mais résistez au diable et il fuira loin de vous. '
  '8':
  - type: text
    content: 'Approchez-vous de Dieu et il s''approchera de vous. Nettoyez vos mains, pécheurs; purifiez votre cœur, hommes partagés. '
  '9':
  - type: text
    content: 'Ayez conscience de votre misère, soyez dans le deuil et dans les larmes, que votre rire se change en deuil et votre joie en tristesse. '
