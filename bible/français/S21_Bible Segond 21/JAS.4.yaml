document_id: JAS.4
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'D''où viennent les conflits et d''où viennent les luttes parmi vous? N''est-ce pas de vos passions qui combattent dans vos membres? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Vous désirez et vous ne possédez pas; vous êtes meurtriers et jaloux, et vous ne pouvez rien obtenir; vous avez des luttes et des conflits. Vous ne possédez pas parce que vous ne demandez pas. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Quand vous demandez, vous ne recevez pas parce que vous demandez mal, dans le but de satisfaire vos passions.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Adultères que vous êtes! Ne savez-vous pas que l''amour pour le monde est synonyme de haine contre Dieu? Celui donc qui veut être l''ami du monde se fait l''ennemi de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Croyez-vous que l''Ecriture parle sans raison? C''est avec jalousie que Dieu aime l''Esprit qui habite en nous. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Cependant, la grâce qu''il accorde est plus grande encore, c''est pourquoi l''Ecriture dit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Dieu s'oppose aux orgueilleux, mais il fait grâce aux humbles.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Dieu s''oppose… humbles: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Proverbes 3.34
      metadata:
        usfm: PRO.3.34
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Soumettez-vous donc à Dieu, mais résistez au diable et il fuira loin de vous. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Approchez-vous de Dieu et il s''approchera de vous. Nettoyez vos mains, pécheurs; purifiez votre cœur, hommes partagés. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ayez conscience de votre misère, soyez dans le deuil et dans les larmes, que votre rire se change en deuil et votre joie en tristesse. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Humiliez-vous devant le Seigneur et il vous élèvera.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ne dites pas du mal les uns des autres, frères et sœurs. Celui qui parle contre un frère ou qui juge son frère parle contre la loi et juge la loi. Or, si tu juges la loi, tu ne la mets pas en pratique, mais tu t''en fais le juge. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Un seul est législateur [et juge]: c''est celui qui peut sauver et perdre. Mais toi, qui es-tu pour juger ton prochain?'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Avertissement aux riches
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'A vous maintenant qui dites: «Aujourd''hui ou demain nous irons dans telle ville, nous y passerons une année, nous y ferons des affaires et nous gagnerons de l''argent», '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'vous qui ne savez pas ce qui arrivera demain! En effet, qu''est-ce que votre vie? C''est une vapeur qui paraît pour un instant et qui disparaît ensuite. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Vous devriez dire, au contraire: «Si Dieu le veut, nous vivrons et nous ferons ceci ou cela.» '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais en réalité, vous vous montrez fiers de vos fanfaronnades. Toute fierté de ce genre est mauvaise. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Si donc quelqu'un sait faire ce qui est bien et ne le fait pas, il commet un péché.
