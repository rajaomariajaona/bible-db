document_id: 1CO.16,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Sur la collecte organisée
  - type: text
    content: 'En ce qui concerne la collecte en faveur des saints, faites, vous aussi, comme je l''ai prescrit aux Eglises de la Galatie: '
  '10':
  - type: text
    content: 'Si Timothée arrive, veillez à ce qu''il soit sans crainte parmi vous, car il travaille tout comme moi à l''œuvre du Seigneur. '
  '11':
  - type: text
    content: Que personne donc ne le méprise. Aidez-le à poursuivre en paix son voyage de retour vers moi, car je l'attends avec les frères.
  '12':
  - type: text
    content: Quant au frère Apollos, je l'ai beaucoup encouragé à venir aussi chez vous avec les frères, mais ce n'était décidément pas sa volonté de le faire maintenant; il viendra quand il en aura l'occasion.
  '13':
  - type: text
    content: 'Restez vigilants, tenez ferme dans la foi, soyez courageux, fortifiez-vous. '
  '14':
  - type: text
    content: Que tout ce que vous faites soit fait avec amour.
  '15':
  - type: text
    content: Voici encore une recommandation, frères et sœurs. Vous savez que la famille de Stéphanas est le premier fruit de l'Achaïe
  - type: note
    content: 'L''Achaïe: la province dont Corinthe était la capitale.'
  - type: text
    content: ' et qu''elle s''est consacrée au service des saints. '
  '16':
  - type: text
    content: Soumettez-vous à de telles personnes ainsi qu'à tous ceux qui travaillent et peinent avec elles.
  '17':
  - type: text
    content: 'Je me réjouis de la présence de Stéphanas, de Fortunatus et d''Achaïcus; ils ont suppléé à votre absence, '
  '18':
  - type: text
    content: car ils ont tranquillisé mon esprit et le vôtre. Sachez donc apprécier de telles personnes.
  '19':
  - type: text
    content: 'Les Eglises d''Asie vous saluent. Aquilas et Priscille, ainsi que l''Eglise qui se réunit dans leur maison, vous saluent chaleureusement dans le Seigneur. '
  '2':
  - type: text
    content: 'que chacun de vous, le dimanche, mette de côté chez lui ce qu''il pourra, en fonction de ses moyens, afin qu''on n''attende pas mon arrivée pour récolter les dons. '
  '20':
  - type: text
    content: 'Tous les frères et sœurs vous saluent. Saluez-vous les uns les autres par un saint baiser. '
  '21':
  - type: text
    content: Moi Paul, je vous salue de ma propre main.
  '22':
  - type: text
    content: Si quelqu'un n'aime pas le Seigneur [Jésus-Christ], qu'il soit maudit! Maranatha
  - type: note
    content: 'Maranatha: expression araméenne qui signifie le Seigneur vient ou viens Seigneur!'
  - type: text
    content: '. '
  '23':
  - type: text
    content: 'Que la grâce du Seigneur Jésus[-Christ] soit avec vous! '
  '24':
  - type: text
    content: Mon amour est avec vous tous en Jésus-Christ.
  '3':
  - type: text
    content: 'Quand je serai chez vous, j''enverrai avec des lettres ceux que vous aurez choisis pour porter vos dons à Jérusalem. '
  '4':
  - type: text
    content: S'il est approprié que j'y aille moi aussi, ils feront le voyage avec moi.
  - type: heading
    content: Projets de Paul et salutations
  '5':
  - type: text
    content: 'Je viendrai chez vous après avoir traversé la Macédoine, car je vais passer par là. '
  '6':
  - type: text
    content: 'Il est possible que je séjourne quelque temps chez vous ou même que j''y passe l''hiver. Ainsi vous pourrez m''aider à poursuivre mon voyage là où je dois me rendre. '
  '7':
  - type: text
    content: 'Je ne veux pas, cette fois-ci, vous voir seulement en passant, mais j''espère rester quelque temps avec vous, si le Seigneur le permet. '
  '8':
  - type: text
    content: 'Cependant je resterai à Ephèse jusqu''à la Pentecôte, '
  '9':
  - type: text
    content: car une porte m'y est largement ouverte pour un travail efficace, et les adversaires sont nombreux.
