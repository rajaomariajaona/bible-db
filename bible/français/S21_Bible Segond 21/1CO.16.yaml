document_id: 1CO.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sur la collecte organisée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'En ce qui concerne la collecte en faveur des saints, faites, vous aussi, comme je l''ai prescrit aux Eglises de la Galatie: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'que chacun de vous, le dimanche, mette de côté chez lui ce qu''il pourra, en fonction de ses moyens, afin qu''on n''attende pas mon arrivée pour récolter les dons. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Quand je serai chez vous, j''enverrai avec des lettres ceux que vous aurez choisis pour porter vos dons à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: S'il est approprié que j'y aille moi aussi, ils feront le voyage avec moi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Projets de Paul et salutations
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Je viendrai chez vous après avoir traversé la Macédoine, car je vais passer par là. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il est possible que je séjourne quelque temps chez vous ou même que j''y passe l''hiver. Ainsi vous pourrez m''aider à poursuivre mon voyage là où je dois me rendre. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Je ne veux pas, cette fois-ci, vous voir seulement en passant, mais j''espère rester quelque temps avec vous, si le Seigneur le permet. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Cependant je resterai à Ephèse jusqu''à la Pentecôte, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: car une porte m'y est largement ouverte pour un travail efficace, et les adversaires sont nombreux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Si Timothée arrive, veillez à ce qu''il soit sans crainte parmi vous, car il travaille tout comme moi à l''œuvre du Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Que personne donc ne le méprise. Aidez-le à poursuivre en paix son voyage de retour vers moi, car je l'attends avec les frères.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Quant au frère Apollos, je l'ai beaucoup encouragé à venir aussi chez vous avec les frères, mais ce n'était décidément pas sa volonté de le faire maintenant; il viendra quand il en aura l'occasion.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Restez vigilants, tenez ferme dans la foi, soyez courageux, fortifiez-vous. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Que tout ce que vous faites soit fait avec amour.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Voici encore une recommandation, frères et sœurs. Vous savez que la famille de Stéphanas est le premier fruit de l'Achaïe
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''Achaïe: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: la province dont Corinthe était la capitale.
    marker-yv: yv-n
  - type: text
    text: ' et qu''elle s''est consacrée au service des saints. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Soumettez-vous à de telles personnes ainsi qu'à tous ceux qui travaillent et peinent avec elles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Je me réjouis de la présence de Stéphanas, de Fortunatus et d''Achaïcus; ils ont suppléé à votre absence, '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: car ils ont tranquillisé mon esprit et le vôtre. Sachez donc apprécier de telles personnes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les Eglises d''Asie vous saluent. Aquilas et Priscille, ainsi que l''Eglise qui se réunit dans leur maison, vous saluent chaleureusement dans le Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tous les frères et sœurs vous saluent. Saluez-vous les uns les autres par un saint baiser. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Moi Paul, je vous salue de ma propre main.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Si quelqu'un n'aime pas le Seigneur [Jésus-Christ], qu'il soit maudit! Maranatha
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Maranatha: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: expression araméenne qui signifie le Seigneur vient ou viens Seigneur!
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Que la grâce du Seigneur Jésus[-Christ] soit avec vous! '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Mon amour est avec vous tous en Jésus-Christ.
