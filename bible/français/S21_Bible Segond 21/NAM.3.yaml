document_id: NAM.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Causes de la destruction de Ninive
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Malheur à la ville sanguinaire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pleine de mensonge, remplie de violence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ne cesse de se livrer au pillage!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: On entend le bruit du fouet,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le fracas des roues,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le galop des chevaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le roulement des chars.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Les cavaliers chargent, l'épée étincelle, la lance brille.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Une multitude de blessés, une foule de cadavres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'des morts innombrables:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: on trébuche sur les morts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: C'est à cause des nombreuses prostitutions de la prostituée
- type: usfm
  marker: q1
  children:
  - type: text
    text: pleine de grâce, maîtresse magicienne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui vendait des nations par ses prostitutions
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des peuples par sa magie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Oui, je m'en prends à toi, déclare l'Eternel, le maître de l'univers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je relèverai les pans de ta robe jusque sur ton visage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je montrerai ta nudité aux nations
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ton déshonneur aux royaumes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Je jetterai sur toi des ordures, je te couvrirai de honte
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je te donnerai en spectacle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Tous ceux qui te verront fuiront loin de toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'On dira: «Ninive est détruite.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui la plaindra?»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où te chercherai-je des consolateurs?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Es-tu meilleure que No-Amon
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui était assise au milieu des fleuves,
- type: usfm
  marker: q1
  children:
  - type: text
    text: entourée par l'eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec la mer pour remparts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la mer pour murailles?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L'Ethiopie et les Egyptiens innombrables faisaient sa force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puth et les Libyens étaient ses auxiliaires.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Et cependant elle est partie pour l'exil, elle est partie en déportation;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses enfants ont été écrasés au coin de toutes les rues,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on a tiré au sort ses nobles
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous ses grands ont été chargés de chaînes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Toi aussi, tu seras enivrée, tu te cacheras,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi aussi, tu chercheras un refuge contre l'ennemi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Toutes tes forteresses
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sont des figuiers avec des figues mûres:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand on les secoue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles tombent dans la bouche de celui qui veut les manger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Voici ton peuple: ce sont des femmes qui sont au milieu de toi.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les portes de ton pays s'ouvrent à tes ennemis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le feu a brûlé tes verrous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Puise de l'eau pour le siège,
- type: usfm
  marker: q1
  children:
  - type: text
    text: répare tes forteresses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: va dans la boue, piétine l'argile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rétablis le four à briques!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Là, le feu te dévorera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'épée t'exterminera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: te dévorera comme des grillons.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Entasse-toi comme les grillons!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Entasse-toi comme les sauterelles!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Tes marchands, plus nombreux
- type: usfm
  marker: q1
  children:
  - type: text
    text: que les étoiles du ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sont pareils au grillon qui ouvre les ailes et s'envole.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Tes inspecteurs sont comme les sauterelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tes officiers sont comme une multitude de criquets
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'qui se posent sur les haies par temps froid:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: le soleil brille, ils s'envolent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'on ne reconnaît plus l'endroit où ils étaient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tes bergers sommeillent, roi d'Assyrie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tes vaillants hommes se reposent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tes troupes sont dispersées sur les montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et personne ne les rassemble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il n'y a pas de remède à ta blessure,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta plaie est mortelle.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous ceux qui entendront parler de toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: applaudiront à ton propos.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, quel est celui que ta méchanceté n'a pas atteint?
