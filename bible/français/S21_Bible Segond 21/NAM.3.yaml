document_id: NAM.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Causes de la destruction de Ninive
  - type: text
    content: Malheur à la ville sanguinaire,
  - type: text
    content: pleine de mensonge, remplie de violence,
  - type: text
    content: qui ne cesse de se livrer au pillage!
  '10':
  - type: text
    content: Et cependant elle est partie pour l'exil, elle est partie en déportation;
  - type: text
    content: ses enfants ont été écrasés au coin de toutes les rues,
  - type: text
    content: on a tiré au sort ses nobles
  - type: text
    content: et tous ses grands ont été chargés de chaînes.
  '11':
  - type: text
    content: Toi aussi, tu seras enivrée, tu te cacheras,
  - type: text
    content: toi aussi, tu chercheras un refuge contre l'ennemi.
  '12':
  - type: text
    content: Toutes tes forteresses
  - type: text
    content: 'sont des figuiers avec des figues mûres:'
  - type: text
    content: quand on les secoue,
  - type: text
    content: elles tombent dans la bouche de celui qui veut les manger.
  '13':
  - type: text
    content: 'Voici ton peuple: ce sont des femmes qui sont au milieu de toi.'
  - type: text
    content: Les portes de ton pays s'ouvrent à tes ennemis,
  - type: text
    content: le feu a brûlé tes verrous.
  '14':
  - type: text
    content: Puise de l'eau pour le siège,
  - type: text
    content: répare tes forteresses,
  - type: text
    content: va dans la boue, piétine l'argile,
  - type: text
    content: rétablis le four à briques!
  '15':
  - type: text
    content: Là, le feu te dévorera,
  - type: text
    content: l'épée t'exterminera,
  - type: text
    content: te dévorera comme des grillons.
  - type: text
    content: Entasse-toi comme les grillons!
  - type: text
    content: Entasse-toi comme les sauterelles!
  '16':
  - type: text
    content: Tes marchands, plus nombreux
  - type: text
    content: que les étoiles du ciel,
  - type: text
    content: sont pareils au grillon qui ouvre les ailes et s'envole.
  '17':
  - type: text
    content: Tes inspecteurs sont comme les sauterelles,
  - type: text
    content: tes officiers sont comme une multitude de criquets
  - type: text
    content: 'qui se posent sur les haies par temps froid:'
  - type: text
    content: le soleil brille, ils s'envolent,
  - type: text
    content: et l'on ne reconnaît plus l'endroit où ils étaient.
  '18':
  - type: text
    content: Tes bergers sommeillent, roi d'Assyrie,
  - type: text
    content: tes vaillants hommes se reposent,
  - type: text
    content: tes troupes sont dispersées sur les montagnes,
  - type: text
    content: et personne ne les rassemble.
  '19':
  - type: text
    content: Il n'y a pas de remède à ta blessure,
  - type: text
    content: ta plaie est mortelle.
  - type: text
    content: Tous ceux qui entendront parler de toi
  - type: text
    content: applaudiront à ton propos.
  - type: text
    content: En effet, quel est celui que ta méchanceté n'a pas atteint?
  '2':
  - type: text
    content: On entend le bruit du fouet,
  - type: text
    content: le fracas des roues,
  - type: text
    content: le galop des chevaux,
  - type: text
    content: le roulement des chars.
  '3':
  - type: text
    content: Les cavaliers chargent, l'épée étincelle, la lance brille.
  - type: text
    content: Une multitude de blessés, une foule de cadavres,
  - type: text
    content: 'des morts innombrables:'
  - type: text
    content: on trébuche sur les morts.
  '4':
  - type: text
    content: C'est à cause des nombreuses prostitutions de la prostituée
  - type: text
    content: pleine de grâce, maîtresse magicienne,
  - type: text
    content: qui vendait des nations par ses prostitutions
  - type: text
    content: et des peuples par sa magie.
  '5':
  - type: text
    content: Oui, je m'en prends à toi, déclare l'Eternel, le maître de l'univers.
  - type: text
    content: Je relèverai les pans de ta robe jusque sur ton visage,
  - type: text
    content: je montrerai ta nudité aux nations
  - type: text
    content: et ton déshonneur aux royaumes.
  '6':
  - type: text
    content: Je jetterai sur toi des ordures, je te couvrirai de honte
  - type: text
    content: et je te donnerai en spectacle.
  '7':
  - type: text
    content: Tous ceux qui te verront fuiront loin de toi.
  - type: text
    content: 'On dira: «Ninive est détruite.'
  - type: text
    content: Qui la plaindra?»
  - type: text
    content: Où te chercherai-je des consolateurs?
  '8':
  - type: text
    content: Es-tu meilleure que No-Amon
  - type: text
    content: qui était assise au milieu des fleuves,
  - type: text
    content: entourée par l'eau,
  - type: text
    content: avec la mer pour remparts,
  - type: text
    content: la mer pour murailles?
  '9':
  - type: text
    content: L'Ethiopie et les Egyptiens innombrables faisaient sa force,
  - type: text
    content: Puth et les Libyens étaient ses auxiliaires.
