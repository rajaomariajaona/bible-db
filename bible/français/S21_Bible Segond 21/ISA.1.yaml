document_id: ISA.1,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Prophéties sur Israël
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 1.1–12.6
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Péchés de Juda et punition
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Vision d'Esaïe, fils d'Amots, sur Juda et Jérusalem, durant les règnes d'Ozias, de Jotham, d'Achaz et d'Ezéchias sur Juda.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ecoutez la parole de l'Eternel, chefs de Sodome!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prête l'oreille à la loi de notre Dieu, peuple de Gomorrhe!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Que m'importe la quantité de vos sacrifices? dit l'Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis rassasié des holocaustes de béliers et de la graisse des veaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne prends aucun plaisir au sang des taureaux, des brebis et des boucs.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Quand vous venez vous présenter devant moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui vous demande de piétiner ainsi mes parvis?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Cessez d'apporter des offrandes illusoires!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'ai horreur de l'encens, des débuts de mois, des sabbats et des convocations aux réunions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne supporte pas de voir l'injustice associée aux célébrations.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Je déteste vos débuts de mois et vos fêtes:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est un fardeau qui me pèse, je suis fatigué de les supporter.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Quand vous tendez les mains vers moi, je détourne mes yeux de vous.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Même quand vous multipliez les prières, je n''écoute pas:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vos mains sont pleines de sang.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Lavez-vous, purifiez-vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mettez un terme à la méchanceté de vos agissements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cessez de faire le mal!
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Apprenez à faire le bien, recherchez la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: protégez l'opprimé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: faites droit à l'orphelin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: défendez la veuve!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Venez et discutons! dit l'Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même si vos péchés sont couleur cramoisi, ils deviendront blancs comme la neige;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: même s'ils sont rouges comme la pourpre, ils deviendront clairs comme la laine.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Si vous voulez bien écouter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous mangerez les meilleurs produits du pays,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ciel, écoute! Terre, prête l'oreille!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'En effet, l''Eternel parle:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «J'ai nourri et élevé des enfants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ils se sont révoltés contre moi.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: mais si vous refusez et vous montrez rebelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous serez dévorés par l'épée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, c'est l'Eternel qui l'affirme.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Comment! La ville fidèle est devenue une prostituée!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle était remplie d'équité, la justice y habitait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et maintenant il y a des assassins!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ton argent s'est changé en impuretés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ton vin a été coupé d'eau.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Tes chefs sont des rebelles et sont complices des voleurs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils aiment tous les pots-de-vin et courent après les récompenses.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ne font pas droit à l'orphelin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la cause de la veuve ne les touche pas.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'C''est pourquoi, voici ce que déclare le Seigneur, l''Eternel, le maître de l''univers, le Dieu fort d''Israël:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je prendrai ma revanche sur mes adversaires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je me vengerai de mes ennemis.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Je porterai de nouveau la main contre toi:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te débarrasserai de tes impuretés comme avec de la potasse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j'éliminerai toutes tes parcelles de plomb.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Je rétablirai tes juges tels qu'ils étaient par le passé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tes conseillers tels qu'ils étaient au début.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Après cela, on t'appellera «ville de la justice», «cité fidèle».
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Sion sera rachetée par la droiture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ceux qui s'y convertiront par la justice,
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: mais la ruine atteindra en une seule fois les rebelles et les pécheurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ceux qui abandonnent l'Eternel disparaîtront.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Oui, on aura honte des térébinthes auxquels vous prenez plaisir
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous rougirez des jardins que vous avez choisis,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Le bœuf connaît son propriétaire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'âne la mangeoire de son maître,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: cependant Israël ne connaît rien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon peuple n'a pas d'intelligence.»
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: car vous serez pareils à un térébinthe au feuillage fané,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à un jardin dépourvu d'eau.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: L'homme fort deviendra pareil au chanvre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et son activité pareille à une étincelle:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils brûleront tous les deux ensemble
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il n'y aura personne pour éteindre ce feu.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Malheur à la nation pécheresse, au peuple chargé de fautes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à la lignée des méchants, aux enfants corrompus!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont abandonné l'Eternel, ils ont méprisé le Saint d'Israël.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont fait volte-face.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: A quoi bon vous frapper encore?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous multipliez vos révoltes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La tête entière est malade et tout le cœur est souffrant.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'De la plante des pieds jusqu''à la tête, rien n''est en bon état:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce ne sont que blessures, contusions et plaies vives
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui n'ont été ni pansées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni bandées, ni désinfectées.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Votre pays est dévasté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vos villes sont réduites en cendres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'des étrangers mangent les produits de votre sol sous vos yeux:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est une dévastation pareille à la catastrophe opérée par des étrangers.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Et la fille de Sion a survécu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle est restée comme une cabane dans une vigne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme une hutte dans un champ de concombres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme une ville épargnée.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '*Si l''Eternel, le maître de l''univers,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne nous avait pas conservé un faible reste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous serions pareils à Sodome,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous ressemblerions à Gomorrhe.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Si l''Eternel… Gomorrhe: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Romains 9.29
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' à propos du rapport entre Juifs et non-Juifs.'
      marker-yv: yv-n
