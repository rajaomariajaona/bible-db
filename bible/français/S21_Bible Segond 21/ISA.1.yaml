document_id: ISA.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophéties sur Israël
  - type: heading
    content: 1.1–12.6
  - type: heading
    content: Péchés de Juda et punition
  - type: text
    content: Vision d'Esaïe, fils d'Amots, sur Juda et Jérusalem, durant les règnes d'Ozias, de Jotham, d'Achaz et d'Ezéchias sur Juda.
  '10':
  - type: text
    content: Ecoutez la parole de l'Eternel, chefs de Sodome!
  - type: text
    content: Prête l'oreille à la loi de notre Dieu, peuple de Gomorrhe!
  '11':
  - type: text
    content: Que m'importe la quantité de vos sacrifices? dit l'Eternel.
  - type: text
    content: Je suis rassasié des holocaustes de béliers et de la graisse des veaux,
  - type: text
    content: je ne prends aucun plaisir au sang des taureaux, des brebis et des boucs.
  '12':
  - type: text
    content: Quand vous venez vous présenter devant moi,
  - type: text
    content: qui vous demande de piétiner ainsi mes parvis?
  '13':
  - type: text
    content: Cessez d'apporter des offrandes illusoires!
  - type: text
    content: J'ai horreur de l'encens, des débuts de mois, des sabbats et des convocations aux réunions,
  - type: text
    content: je ne supporte pas de voir l'injustice associée aux célébrations.
  '14':
  - type: text
    content: 'Je déteste vos débuts de mois et vos fêtes:'
  - type: text
    content: c'est un fardeau qui me pèse, je suis fatigué de les supporter.
  '15':
  - type: text
    content: Quand vous tendez les mains vers moi, je détourne mes yeux de vous.
  - type: text
    content: 'Même quand vous multipliez les prières, je n''écoute pas:'
  - type: text
    content: vos mains sont pleines de sang.
  '16':
  - type: text
    content: Lavez-vous, purifiez-vous,
  - type: text
    content: mettez un terme à la méchanceté de vos agissements,
  - type: text
    content: cessez de faire le mal!
  '17':
  - type: text
    content: Apprenez à faire le bien, recherchez la justice,
  - type: text
    content: protégez l'opprimé,
  - type: text
    content: faites droit à l'orphelin,
  - type: text
    content: défendez la veuve!
  '18':
  - type: text
    content: Venez et discutons! dit l'Eternel.
  - type: text
    content: Même si vos péchés sont couleur cramoisi, ils deviendront blancs comme la neige;
  - type: text
    content: même s'ils sont rouges comme la pourpre, ils deviendront clairs comme la laine.
  '19':
  - type: text
    content: Si vous voulez bien écouter,
  - type: text
    content: vous mangerez les meilleurs produits du pays,
  '2':
  - type: text
    content: Ciel, écoute! Terre, prête l'oreille!
  - type: text
    content: 'En effet, l''Eternel parle:'
  - type: text
    content: «J'ai nourri et élevé des enfants,
  - type: text
    content: mais ils se sont révoltés contre moi.
  '20':
  - type: text
    content: mais si vous refusez et vous montrez rebelles,
  - type: text
    content: vous serez dévorés par l'épée.
  - type: text
    content: Oui, c'est l'Eternel qui l'affirme.
  '21':
  - type: text
    content: Comment! La ville fidèle est devenue une prostituée!
  - type: text
    content: Elle était remplie d'équité, la justice y habitait,
  - type: text
    content: et maintenant il y a des assassins!
  '22':
  - type: text
    content: Ton argent s'est changé en impuretés,
  - type: text
    content: ton vin a été coupé d'eau.
  '23':
  - type: text
    content: Tes chefs sont des rebelles et sont complices des voleurs.
  - type: text
    content: Ils aiment tous les pots-de-vin et courent après les récompenses.
  - type: text
    content: Ils ne font pas droit à l'orphelin
  - type: text
    content: et la cause de la veuve ne les touche pas.
  '24':
  - type: text
    content: 'C''est pourquoi, voici ce que déclare le Seigneur, l''Eternel, le maître de l''univers, le Dieu fort d''Israël:'
  - type: text
    content: Je prendrai ma revanche sur mes adversaires,
  - type: text
    content: je me vengerai de mes ennemis.
  '25':
  - type: text
    content: 'Je porterai de nouveau la main contre toi:'
  - type: text
    content: je te débarrasserai de tes impuretés comme avec de la potasse
  - type: text
    content: et j'éliminerai toutes tes parcelles de plomb.
  '26':
  - type: text
    content: Je rétablirai tes juges tels qu'ils étaient par le passé,
  - type: text
    content: et tes conseillers tels qu'ils étaient au début.
  - type: text
    content: Après cela, on t'appellera «ville de la justice», «cité fidèle».
  '27':
  - type: text
    content: Sion sera rachetée par la droiture,
  - type: text
    content: et ceux qui s'y convertiront par la justice,
  '28':
  - type: text
    content: mais la ruine atteindra en une seule fois les rebelles et les pécheurs,
  - type: text
    content: et ceux qui abandonnent l'Eternel disparaîtront.
  '29':
  - type: text
    content: Oui, on aura honte des térébinthes auxquels vous prenez plaisir
  - type: text
    content: et vous rougirez des jardins que vous avez choisis,
  '3':
  - type: text
    content: Le bœuf connaît son propriétaire
  - type: text
    content: et l'âne la mangeoire de son maître,
  - type: text
    content: cependant Israël ne connaît rien,
  - type: text
    content: mon peuple n'a pas d'intelligence.»
  '30':
  - type: text
    content: car vous serez pareils à un térébinthe au feuillage fané,
  - type: text
    content: à un jardin dépourvu d'eau.
  '31':
  - type: text
    content: L'homme fort deviendra pareil au chanvre
  - type: text
    content: 'et son activité pareille à une étincelle:'
  - type: text
    content: ils brûleront tous les deux ensemble
  - type: text
    content: et il n'y aura personne pour éteindre ce feu.
  '4':
  - type: text
    content: Malheur à la nation pécheresse, au peuple chargé de fautes,
  - type: text
    content: à la lignée des méchants, aux enfants corrompus!
  - type: text
    content: Ils ont abandonné l'Eternel, ils ont méprisé le Saint d'Israël.
  - type: text
    content: Ils ont fait volte-face.
  '5':
  - type: text
    content: A quoi bon vous frapper encore?
  - type: text
    content: Vous multipliez vos révoltes.
  - type: text
    content: La tête entière est malade et tout le cœur est souffrant.
  '6':
  - type: text
    content: 'De la plante des pieds jusqu''à la tête, rien n''est en bon état:'
  - type: text
    content: ce ne sont que blessures, contusions et plaies vives
  - type: text
    content: qui n'ont été ni pansées,
  - type: text
    content: ni bandées, ni désinfectées.
  '7':
  - type: text
    content: Votre pays est dévasté,
  - type: text
    content: vos villes sont réduites en cendres,
  - type: text
    content: 'des étrangers mangent les produits de votre sol sous vos yeux:'
  - type: text
    content: c'est une dévastation pareille à la catastrophe opérée par des étrangers.
  '8':
  - type: text
    content: Et la fille de Sion a survécu.
  - type: text
    content: Elle est restée comme une cabane dans une vigne,
  - type: text
    content: comme une hutte dans un champ de concombres,
  - type: text
    content: comme une ville épargnée.
  '9':
  - type: text
    content: '*Si l''Eternel, le maître de l''univers,'
  - type: text
    content: ne nous avait pas conservé un faible reste,
  - type: text
    content: nous serions pareils à Sodome,
  - type: text
    content: nous ressemblerions à Gomorrhe.
  - type: note
    content: 'Si l''Eternel… Gomorrhe: cité en Romains 9.29 à propos du rapport entre Juifs et non-Juifs.'
