document_id: PSA.131,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paix en Dieu
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Chant des montées, de David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, je n'ai pas un cœur orgueilleux ni des regards hautains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je ne m'engage pas dans des projets trop grands et trop élevés pour moi.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au contraire, je suis calme et tranquille
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme un enfant sevré qui se trouve avec sa mère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je suis comme un enfant sevré.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël, mets ton espoir en l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dès maintenant et pour toujours!
