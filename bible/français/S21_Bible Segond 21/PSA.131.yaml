document_id: PSA.131,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Paix en Dieu
  - type: text
    content: Chant des montées, de David.
  - type: text
    content: Eternel, je n'ai pas un cœur orgueilleux ni des regards hautains,
  - type: text
    content: et je ne m'engage pas dans des projets trop grands et trop élevés pour moi.
  '2':
  - type: text
    content: Au contraire, je suis calme et tranquille
  - type: text
    content: comme un enfant sevré qui se trouve avec sa mère,
  - type: text
    content: je suis comme un enfant sevré.
  '3':
  - type: text
    content: Israël, mets ton espoir en l'Eternel
  - type: text
    content: dès maintenant et pour toujours!
