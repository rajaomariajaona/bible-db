document_id: MAT.20,152
type_code: fra
verses:
  '1':
  - type: text
    content: '»En effet, le royaume des cieux ressemble à un propriétaire qui sortit dès le matin afin d''embaucher des ouvriers pour sa vigne. '
  '10':
  - type: text
    content: 'Quand les premiers vinrent à leur tour, ils pensèrent recevoir davantage, mais ils reçurent aussi chacun une pièce d''argent. '
  '11':
  - type: text
    content: 'En la recevant, ils murmurèrent contre le propriétaire '
  '12':
  - type: text
    content: 'en disant: ‘Ces derniers arrivés n''ont travaillé qu''une heure et tu les as traités comme nous, qui avons supporté la fatigue du jour et de la chaleur!’ '
  '13':
  - type: text
    content: 'Il répondit à l''un d''eux: ‘Mon ami, je ne te fais pas de tort. N''as-tu pas été d''accord avec moi pour un salaire d''une pièce d''argent? '
  '14':
  - type: text
    content: 'Prends ce qui te revient et va-t''en. Je veux donner à ce dernier arrivé autant qu''à toi. '
  '15':
  - type: text
    content: 'Ne m''est-il pas permis de faire ce que je veux de mes biens? Ou vois-tu d''un mauvais œil que je sois bon?’ '
  '16':
  - type: text
    content: Ainsi les derniers seront les premiers et les premiers seront les derniers. [Beaucoup sont invités mais peu sont choisis.]»
  - type: heading
    content: Demande de la mère de Jacques et de Jean
  '17':
  - type: text
    content: 'Pendant qu''il montait à Jérusalem, Jésus prit à part les douze disciples et leur dit en chemin: '
  '18':
  - type: text
    content: '«Nous montons à Jérusalem et le Fils de l''homme sera livré aux chefs des prêtres et aux spécialistes de la loi. Ils le condamneront à mort '
  '19':
  - type: text
    content: et le livreront aux non-Juifs pour qu'ils se moquent de lui, le fouettent et le crucifient; le troisième jour il ressuscitera.»
  '2':
  - type: text
    content: 'Il se mit d''accord avec eux pour un salaire d''une pièce d''argent par jour et les envoya dans sa vigne. '
  '20':
  - type: text
    content: 'Alors la mère des fils de Zébédée s''approcha de Jésus avec ses fils et se prosterna pour lui faire une demande. '
  '21':
  - type: text
    content: 'Il lui dit: «Que veux-tu?» «Ordonne, lui dit-elle, que dans ton royaume mes deux fils que voici soient assis l''un à ta droite et l''autre à ta gauche.» '
  '22':
  - type: text
    content: 'Jésus répondit: «Vous ne savez pas ce que vous demandez. Pouvez-vous boire la coupe que je vais boire [ou être baptisés du baptême dont je vais être baptisé]?» «Nous le pouvons», dirent-ils. '
  '23':
  - type: text
    content: 'Il leur répondit: «Vous boirez en effet ma coupe [et vous serez baptisés du baptême dont je vais être baptisé]. Mais quant à être assis à ma droite et à ma gauche, cela ne dépend pas de moi et ne sera donné qu''à ceux pour qui mon Père l''a préparé.» '
  '24':
  - type: text
    content: 'Après avoir entendu cela, les dix autres furent indignés contre les deux frères. '
  '25':
  - type: text
    content: 'Jésus les appela et leur dit: «Vous savez que les chefs des nations dominent sur elles et que les grands les tiennent sous leur pouvoir. '
  '26':
  - type: text
    content: 'Ce ne sera pas le cas au milieu de vous, mais si quelqu''un veut être grand parmi vous, il sera votre serviteur; '
  '27':
  - type: text
    content: 'et si quelqu''un veut être le premier parmi vous, qu''il soit votre esclave. '
  '28':
  - type: text
    content: C'est ainsi que le Fils de l'homme est venu, non pour être servi, mais pour servir et donner sa vie en rançon pour beaucoup.»
  - type: heading
    content: Guérison de deux aveugles
  '29':
  - type: text
    content: 'Lorsqu''ils sortirent de Jéricho, une grande foule suivit Jésus. '
  '3':
  - type: text
    content: 'Il sortit vers neuf heures du matin et en vit d''autres qui étaient sur la place, sans travail. '
  '30':
  - type: text
    content: 'Deux aveugles, assis au bord du chemin, entendirent que Jésus passait et crièrent: «Aie pitié de nous, Seigneur, Fils de David'
  - type: note
    content: 'Fils de David: voir la note 9.27.'
  - type: text
    content: '!» '
  '31':
  - type: text
    content: 'La foule les reprenait pour les faire taire, mais ils crièrent plus fort: «Aie pitié de nous, Seigneur, Fils de David!» '
  '32':
  - type: text
    content: 'Jésus s''arrêta, les appela et dit: «Que voulez-vous que je fasse pour vous?» '
  '33':
  - type: text
    content: 'Ils lui dirent: «Seigneur, que nos yeux s''ouvrent.» '
  '34':
  - type: text
    content: Rempli de compassion, Jésus toucha leurs yeux; aussitôt ils retrouvèrent la vue et ils le suivirent.
  '4':
  - type: text
    content: 'Il leur dit: ‘Allez aussi à ma vigne et je vous donnerai ce qui sera juste.’ '
  '5':
  - type: text
    content: 'Et ils y allèrent. Il sortit de nouveau vers midi et vers trois heures de l''après-midi et il fit de même. '
  '6':
  - type: text
    content: 'Il sortit enfin vers cinq heures de l''après-midi et en trouva d''autres qui étaient là, [sans travail]. Il leur dit: ‘Pourquoi vous tenez-vous ici toute la journée sans travailler?’ '
  '7':
  - type: text
    content: 'Ils lui répondirent: ‘C''est que personne ne nous a embauchés.’ ‘Allez aussi à ma vigne, leur dit-il, [et vous recevrez ce qui sera juste].’ '
  '8':
  - type: text
    content: 'Le soir venu, le maître de la vigne dit à son intendant: ‘Appelle les ouvriers et paie-leur le salaire, en allant des derniers aux premiers.’ '
  '9':
  - type: text
    content: 'Ceux de cinq heures de l''après-midi vinrent et reçurent chacun une pièce d''argent. '
