document_id: MAT.20
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»En effet, le royaume des cieux ressemble à un propriétaire qui sortit dès le matin afin d''embaucher des ouvriers pour sa vigne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il se mit d''accord avec eux pour un salaire d''une pièce d''argent par jour et les envoya dans sa vigne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il sortit vers neuf heures du matin et en vit d''autres qui étaient sur la place, sans travail. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il leur dit: ‘Allez aussi à ma vigne et je vous donnerai ce qui sera juste.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Et ils y allèrent. Il sortit de nouveau vers midi et vers trois heures de l''après-midi et il fit de même. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il sortit enfin vers cinq heures de l''après-midi et en trouva d''autres qui étaient là, [sans travail]. Il leur dit: ‘Pourquoi vous tenez-vous ici toute la journée sans travailler?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils lui répondirent: ‘C''est que personne ne nous a embauchés.’ ‘Allez aussi à ma vigne, leur dit-il, [et vous recevrez ce qui sera juste].’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le soir venu, le maître de la vigne dit à son intendant: ‘Appelle les ouvriers et paie-leur le salaire, en allant des derniers aux premiers.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ceux de cinq heures de l''après-midi vinrent et reçurent chacun une pièce d''argent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Quand les premiers vinrent à leur tour, ils pensèrent recevoir davantage, mais ils reçurent aussi chacun une pièce d''argent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'En la recevant, ils murmurèrent contre le propriétaire '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'en disant: ‘Ces derniers arrivés n''ont travaillé qu''une heure et tu les as traités comme nous, qui avons supporté la fatigue du jour et de la chaleur!’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il répondit à l''un d''eux: ‘Mon ami, je ne te fais pas de tort. N''as-tu pas été d''accord avec moi pour un salaire d''une pièce d''argent? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Prends ce qui te revient et va-t''en. Je veux donner à ce dernier arrivé autant qu''à toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ne m''est-il pas permis de faire ce que je veux de mes biens? Ou vois-tu d''un mauvais œil que je sois bon?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ainsi les derniers seront les premiers et les premiers seront les derniers. [Beaucoup sont invités mais peu sont choisis.]»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Demande de la mère de Jacques et de Jean
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Pendant qu''il montait à Jérusalem, Jésus prit à part les douze disciples et leur dit en chemin: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '«Nous montons à Jérusalem et le Fils de l''homme sera livré aux chefs des prêtres et aux spécialistes de la loi. Ils le condamneront à mort '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: et le livreront aux non-Juifs pour qu'ils se moquent de lui, le fouettent et le crucifient; le troisième jour il ressuscitera.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Alors la mère des fils de Zébédée s''approcha de Jésus avec ses fils et se prosterna pour lui faire une demande. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il lui dit: «Que veux-tu?» «Ordonne, lui dit-elle, que dans ton royaume mes deux fils que voici soient assis l''un à ta droite et l''autre à ta gauche.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Jésus répondit: «Vous ne savez pas ce que vous demandez. Pouvez-vous boire la coupe que je vais boire [ou être baptisés du baptême dont je vais être baptisé]?» «Nous le pouvons», dirent-ils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Il leur répondit: «Vous boirez en effet ma coupe [et vous serez baptisés du baptême dont je vais être baptisé]. Mais quant à être assis à ma droite et à ma gauche, cela ne dépend pas de moi et ne sera donné qu''à ceux pour qui mon Père l''a préparé.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Après avoir entendu cela, les dix autres furent indignés contre les deux frères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jésus les appela et leur dit: «Vous savez que les chefs des nations dominent sur elles et que les grands les tiennent sous leur pouvoir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ce ne sera pas le cas au milieu de vous, mais si quelqu''un veut être grand parmi vous, il sera votre serviteur; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'et si quelqu''un veut être le premier parmi vous, qu''il soit votre esclave. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: C'est ainsi que le Fils de l'homme est venu, non pour être servi, mais pour servir et donner sa vie en rançon pour beaucoup.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guérison de deux aveugles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Lorsqu''ils sortirent de Jéricho, une grande foule suivit Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Deux aveugles, assis au bord du chemin, entendirent que Jésus passait et crièrent: «Aie pitié de nous, Seigneur, Fils de David'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Fils de David: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir la note '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '9.27'
      metadata:
        usfm: MAT.9.27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'La foule les reprenait pour les faire taire, mais ils crièrent plus fort: «Aie pitié de nous, Seigneur, Fils de David!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Jésus s''arrêta, les appela et dit: «Que voulez-vous que je fasse pour vous?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ils lui dirent: «Seigneur, que nos yeux s''ouvrent.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Rempli de compassion, Jésus toucha leurs yeux; aussitôt ils retrouvèrent la vue et ils le suivirent.
