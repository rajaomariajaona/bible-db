document_id: PSA.49
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Futilité des richesses
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur. Psaume des descendants de Koré.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ecoutez ceci, vous, tous les peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: prêtez l'oreille, vous, tous les habitants du monde,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: petits et grands,
- type: usfm
  marker: q1
  children:
  - type: text
    text: riches et pauvres!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ma bouche va faire entendre des paroles sages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mon cœur a des pensées pleines de bon sens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: J'écoute les proverbes
- type: usfm
  marker: q1
  children:
  - type: text
    text: ', j''explique mon énigme au son de la harpe.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Pourquoi aurais-je peur quand vient le malheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lorsque je suis entouré par la méchanceté de mes adversaires?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ils ont confiance en leurs biens
- type: usfm
  marker: q1
  children:
  - type: text
    text: et se vantent de leur grande richesse,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: mais ils ne peuvent se racheter l'un l'autre
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni donner à Dieu le prix de leur rançon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Le rachat de leur âme est cher
- type: usfm
  marker: q1
  children:
  - type: text
    text: et n'aura jamais lieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ils ne vivront pas toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils n'éviteront pas la tombe,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'car ils le verront bien: les sages meurent,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'homme stupide et l'idiot disparaissent aussi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils laissent leurs biens à d'autres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils s'imaginent que leurs maisons seront éternelles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que leurs résidences dureront toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: eux qui avaient donné leur propre nom à leurs terres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais l''homme qui est honoré ne dure pas:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ressemble aux bêtes qu'on extermine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Telle est leur voie, telle est leur folie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et ceux qui les suivent se plaisent à leurs discours. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Comme un troupeau, ils sont poussés dans le séjour des morts;
- type: usfm
  marker: q1
  children:
  - type: text
    text: la mort est leur berger.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le matin, les hommes droits les foulent aux pieds,
- type: usfm
  marker: q1
  children:
  - type: text
    text: leur beauté s'évanouit, le séjour des morts est leur demeure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mais Dieu rachètera mon âme du séjour des morts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'oui, il me prendra. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ne sois pas dans la crainte parce qu'un homme s'enrichit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que les trésors de sa maison augmentent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'car il n''emporte rien en mourant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses trésors ne le suivront pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il aura beau s'estimer heureux pendant sa vie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on aura beau le louer pour le bonheur qu'il se donne,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: il rejoindra pourtant la génération de ses ancêtres
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ne reverront jamais la lumière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: L'homme qui est honoré mais qui n'a pas d'intelligence
- type: usfm
  marker: q1
  children:
  - type: text
    text: ressemble aux bêtes qu'on extermine.
