document_id: PSA.49,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Futilité des richesses
  - type: text
    content: Au chef de chœur. Psaume des descendants de Koré.
  '10':
  - type: text
    content: Ils ne vivront pas toujours,
  - type: text
    content: ils n'éviteront pas la tombe,
  '11':
  - type: text
    content: 'car ils le verront bien: les sages meurent,'
  - type: text
    content: l'homme stupide et l'idiot disparaissent aussi,
  - type: text
    content: et ils laissent leurs biens à d'autres.
  '12':
  - type: text
    content: Ils s'imaginent que leurs maisons seront éternelles,
  - type: text
    content: que leurs résidences dureront toujours,
  - type: text
    content: eux qui avaient donné leur propre nom à leurs terres.
  '13':
  - type: text
    content: 'Mais l''homme qui est honoré ne dure pas:'
  - type: text
    content: il ressemble aux bêtes qu'on extermine.
  '14':
  - type: text
    content: Telle est leur voie, telle est leur folie,
  - type: text
    content: 'et ceux qui les suivent se plaisent à leurs discours. '
  - type: text
    content: – Pause.
  '15':
  - type: text
    content: Comme un troupeau, ils sont poussés dans le séjour des morts;
  - type: text
    content: la mort est leur berger.
  - type: text
    content: Le matin, les hommes droits les foulent aux pieds,
  - type: text
    content: leur beauté s'évanouit, le séjour des morts est leur demeure.
  '16':
  - type: text
    content: Mais Dieu rachètera mon âme du séjour des morts,
  - type: text
    content: 'oui, il me prendra. '
  - type: text
    content: – Pause.
  '17':
  - type: text
    content: Ne sois pas dans la crainte parce qu'un homme s'enrichit,
  - type: text
    content: parce que les trésors de sa maison augmentent,
  '18':
  - type: text
    content: 'car il n''emporte rien en mourant:'
  - type: text
    content: ses trésors ne le suivront pas.
  '19':
  - type: text
    content: Il aura beau s'estimer heureux pendant sa vie,
  - type: text
    content: on aura beau le louer pour le bonheur qu'il se donne,
  '2':
  - type: text
    content: Ecoutez ceci, vous, tous les peuples,
  - type: text
    content: prêtez l'oreille, vous, tous les habitants du monde,
  '20':
  - type: text
    content: il rejoindra pourtant la génération de ses ancêtres
  - type: text
    content: qui ne reverront jamais la lumière.
  '21':
  - type: text
    content: L'homme qui est honoré mais qui n'a pas d'intelligence
  - type: text
    content: ressemble aux bêtes qu'on extermine.
  '3':
  - type: text
    content: petits et grands,
  - type: text
    content: riches et pauvres!
  '4':
  - type: text
    content: Ma bouche va faire entendre des paroles sages,
  - type: text
    content: et mon cœur a des pensées pleines de bon sens.
  '5':
  - type: text
    content: J'écoute les proverbes
  - type: text
    content: ', j''explique mon énigme au son de la harpe.'
  '6':
  - type: text
    content: Pourquoi aurais-je peur quand vient le malheur,
  - type: text
    content: lorsque je suis entouré par la méchanceté de mes adversaires?
  '7':
  - type: text
    content: Ils ont confiance en leurs biens
  - type: text
    content: et se vantent de leur grande richesse,
  '8':
  - type: text
    content: mais ils ne peuvent se racheter l'un l'autre
  - type: text
    content: ni donner à Dieu le prix de leur rançon.
  '9':
  - type: text
    content: Le rachat de leur âme est cher
  - type: text
    content: et n'aura jamais lieu.
