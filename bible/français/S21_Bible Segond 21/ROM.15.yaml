document_id: ROM.15,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Nous qui sommes forts, nous avons le devoir de supporter les faiblesses de ceux qui ne le sont pas et de ne pas rechercher ce qui nous plaît. '
  '10':
  - type: text
    content: 'Il est dit encore: '
  - type: text
    content: Nations, réjouissez-vous avec son peuple!
  - type: note
    content: 'Nations… peuple: citation de Deutéronome 32.43.'
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'et encore: '
  - type: text
    content: Louez le Seigneur, vous toutes les nations, célébrez-le, vous tous les peuples!
  - type: note
    content: 'Louez… peuples: citation du Psaume 117.1.'
  - type: text
    content: ' '
  '12':
  - type: text
    content: 'Esaïe dit aussi: '
  - type: text
    content: Il paraîtra, le rejeton d'Isaï, il se lèvera pour régner sur les nations; les nations espéreront en lui.
  - type: note
    content: 'Il paraîtra… en lui: citation d''Esaïe 11.1, 10. Isaï était le père de David, le deuxième roi d''Israël, auquel Dieu a fait la promesse d''un descendant, le Messie. Il figure dans la généalogie de Jésus-Christ (Matthieu 1.6).'
  '13':
  - type: text
    content: Que le Dieu de l'espérance vous remplisse de toute joie et de toute paix dans la foi, pour que vous débordiez d'espérance, par la puissance du Saint-Esprit!
  - type: heading
    content: Ministère et projets de Paul
  '14':
  - type: text
    content: 'En ce qui vous concerne, mes frères et sœurs, je suis personnellement convaincu que vous êtes pleins de bonnes dispositions, remplis de toute connaissance et capables de vous avertir les uns les autres. '
  '15':
  - type: text
    content: 'Cependant, [frères et sœurs,] c''est avec une certaine audace que je vous ai écrit par endroits, comme pour réveiller vos souvenirs, et cela à cause de la grâce que Dieu m''a faite '
  '16':
  - type: text
    content: d'être serviteur de Jésus-Christ pour les non-Juifs. Je m'acquitte ainsi du service sacré de la prédication de l'Evangile de Dieu afin que les non-Juifs soient une offrande agréable, devenue sainte par l'action de l'Esprit saint.
  '17':
  - type: text
    content: 'Je peux donc me montrer fier en Jésus-Christ de l''œuvre de Dieu. '
  '18':
  - type: text
    content: 'En effet, je n''oserais rien mentionner si Christ ne l''avait pas accompli par moi pour amener les non-Juifs à l''obéissance par la parole et par les actes, '
  '19':
  - type: text
    content: 'par la puissance des signes et des prodiges et par la puissance de l''Esprit de Dieu. Ainsi, depuis Jérusalem et en rayonnant jusqu''en Illyrie, j''ai abondamment propagé l''Evangile de Christ. '
  '2':
  - type: text
    content: 'Que chacun de nous cherche à plaire à son prochain pour son bien, en vue de le faire grandir dans la foi. '
  '20':
  - type: text
    content: 'Je me suis fait un point d''honneur d''annoncer l''Evangile là où Christ n''avait pas été annoncé, afin de ne pas construire sur les fondations posées par un autre, mais comme il est écrit: '
  '21':
  - type: text
    content: Ceux à qui il n'avait pas été annoncé verront, et ceux qui n'en avaient pas entendu parler comprendront.
  - type: note
    content: 'Ceux à qui… comprendront: citation d''Esaïe 52.15.'
  '22':
  - type: text
    content: 'C''est aussi ce qui m''a souvent empêché d''aller chez vous. '
  '23':
  - type: text
    content: 'Mais maintenant, comme je n''ai plus rien qui me retienne dans ces régions et que, depuis bien des années, j''ai le vif désir de vous rendre visite, '
  '24':
  - type: text
    content: '[je le ferai] quand je me rendrai en Espagne. J''espère en effet vous voir en passant et recevoir votre aide pour me rendre là-bas une fois que j''aurai satisfait, du moins en partie, mon désir d''être avec vous.'
  '25':
  - type: text
    content: 'Maintenant je vais à Jérusalem pour servir les saints. '
  '26':
  - type: text
    content: 'En effet, les Eglises de la Macédoine et l''Achaïe ont bien voulu organiser une collecte en faveur de ceux qui sont pauvres parmi les saints de Jérusalem. '
  '27':
  - type: text
    content: 'Elles l''ont bien voulu et elles le leur devaient, car si les non-Juifs ont eu part aux avantages spirituels des Juifs, ils doivent aussi les assister dans leurs besoins matériels. '
  '28':
  - type: text
    content: 'Dès que j''aurai réglé cette affaire et que je leur aurai remis ces dons, je partirai pour l''Espagne et je passerai chez vous. '
  '29':
  - type: text
    content: Je sais qu'en venant vous rendre visite, c'est avec une pleine bénédiction de [l'Evangile de] Christ que je le ferai.
  '3':
  - type: text
    content: 'En effet, Christ n''a pas recherché ce qui lui plaisait, mais, comme il est écrit, '
  - type: text
    content: les injures de ceux qui t'insultent sont tombées sur moi
  - type: note
    content: 'Les injures… sur moi: citation du Psaume 69.10.'
  - type: text
    content: .
  '30':
  - type: text
    content: 'Je vous en supplie, frères et sœurs, par notre Seigneur Jésus-Christ et par l''amour de l''Esprit, combattez avec moi en adressant à Dieu des prières en ma faveur. '
  '31':
  - type: text
    content: 'Priez afin que je sois protégé des incrédules de la Judée et que l''aide que j''apporte à Jérusalem soit bien accueillie par les saints. '
  '32':
  - type: text
    content: 'Ainsi je pourrai venir chez vous dans la joie, si c''est la volonté de Dieu, et trouver un peu de repos au milieu de vous. '
  '33':
  - type: text
    content: Que le Dieu de la paix soit avec vous tous! Amen!
  '4':
  - type: text
    content: Or tout ce qui a été écrit d'avance l'a été pour notre instruction afin que, par la persévérance et par le réconfort que donnent les Ecritures, nous possédions l'espérance.
  '5':
  - type: text
    content: 'Que le Dieu de la persévérance et du réconfort vous donne de vivre en plein accord les uns avec les autres comme le veut Jésus-Christ, '
  '6':
  - type: text
    content: afin que tous ensemble, d'une seule voix, vous rendiez gloire au Dieu et Père de notre Seigneur Jésus-Christ.
  '7':
  - type: text
    content: 'Accueillez-vous donc les uns les autres comme Christ vous a accueillis, pour la gloire de Dieu. '
  '8':
  - type: text
    content: 'J''affirme [en effet] que [Jésus-]Christ est devenu le serviteur des circoncis pour prouver que Dieu est vrai en confirmant les promesses faites à leurs ancêtres. '
  '9':
  - type: text
    content: 'Quant aux non-Juifs, ils célèbrent Dieu à cause de sa bonté, comme le dit l''Ecriture: '
  - type: text
    content: C'est pourquoi je te louerai parmi les nations et je chanterai à la gloire de ton nom.
  - type: note
    content: 'C''est pourquoi… nom: citation de 2 Samuel 22.50 (= Psaume 18.50).'
  - type: text
    content: ' '
