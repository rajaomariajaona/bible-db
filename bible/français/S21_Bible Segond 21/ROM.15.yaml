document_id: ROM.15
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nous qui sommes forts, nous avons le devoir de supporter les faiblesses de ceux qui ne le sont pas et de ne pas rechercher ce qui nous plaît. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Que chacun de nous cherche à plaire à son prochain pour son bien, en vue de le faire grandir dans la foi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'En effet, Christ n''a pas recherché ce qui lui plaisait, mais, comme il est écrit, '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: les injures de ceux qui t'insultent sont tombées sur moi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Les injures… sur moi: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 69.10
      metadata:
        usfm: PSA.69.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Or tout ce qui a été écrit d'avance l'a été pour notre instruction afin que, par la persévérance et par le réconfort que donnent les Ecritures, nous possédions l'espérance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Que le Dieu de la persévérance et du réconfort vous donne de vivre en plein accord les uns avec les autres comme le veut Jésus-Christ, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: afin que tous ensemble, d'une seule voix, vous rendiez gloire au Dieu et Père de notre Seigneur Jésus-Christ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Accueillez-vous donc les uns les autres comme Christ vous a accueillis, pour la gloire de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'J''affirme [en effet] que [Jésus-]Christ est devenu le serviteur des circoncis pour prouver que Dieu est vrai en confirmant les promesses faites à leurs ancêtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Quant aux non-Juifs, ils célèbrent Dieu à cause de sa bonté, comme le dit l''Ecriture: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: C'est pourquoi je te louerai parmi les nations et je chanterai à la gloire de ton nom.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'C''est pourquoi… nom: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Samuel 22.50
      metadata:
        usfm: 2SA.22.50
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (= '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 18.50
      metadata:
        usfm: PSA.18.50
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il est dit encore: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Nations, réjouissez-vous avec son peuple!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Nations… peuple: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 32.43
      metadata:
        usfm: DEU.32.43
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'et encore: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Louez le Seigneur, vous toutes les nations, célébrez-le, vous tous les peuples!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Louez… peuples: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 117.1
      metadata:
        usfm: PSA.117.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Esaïe dit aussi: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Il paraîtra, le rejeton d'Isaï, il se lèvera pour régner sur les nations; les nations espéreront en lui.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il paraîtra… en lui: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 11.1
      metadata:
        usfm: ISA.11.1
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10'
      metadata:
        usfm: ISA.11.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Isaï était le père de David, le deuxième roi d'Israël, auquel Dieu a fait la promesse d'un descendant, le Messie. Il figure dans la généalogie de Jésus-Christ (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 1.6
      metadata:
        usfm: MAT.1.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Que le Dieu de l'espérance vous remplisse de toute joie et de toute paix dans la foi, pour que vous débordiez d'espérance, par la puissance du Saint-Esprit!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ministère et projets de Paul
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'En ce qui vous concerne, mes frères et sœurs, je suis personnellement convaincu que vous êtes pleins de bonnes dispositions, remplis de toute connaissance et capables de vous avertir les uns les autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Cependant, [frères et sœurs,] c''est avec une certaine audace que je vous ai écrit par endroits, comme pour réveiller vos souvenirs, et cela à cause de la grâce que Dieu m''a faite '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: d'être serviteur de Jésus-Christ pour les non-Juifs. Je m'acquitte ainsi du service sacré de la prédication de l'Evangile de Dieu afin que les non-Juifs soient une offrande agréable, devenue sainte par l'action de l'Esprit saint.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Je peux donc me montrer fier en Jésus-Christ de l''œuvre de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'En effet, je n''oserais rien mentionner si Christ ne l''avait pas accompli par moi pour amener les non-Juifs à l''obéissance par la parole et par les actes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'par la puissance des signes et des prodiges et par la puissance de l''Esprit de Dieu. Ainsi, depuis Jérusalem et en rayonnant jusqu''en Illyrie, j''ai abondamment propagé l''Evangile de Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Je me suis fait un point d''honneur d''annoncer l''Evangile là où Christ n''avait pas été annoncé, afin de ne pas construire sur les fondations posées par un autre, mais comme il est écrit: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Ceux à qui il n'avait pas été annoncé verront, et ceux qui n'en avaient pas entendu parler comprendront.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ceux à qui… comprendront: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 52.15
      metadata:
        usfm: ISA.52.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'C''est aussi ce qui m''a souvent empêché d''aller chez vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mais maintenant, comme je n''ai plus rien qui me retienne dans ces régions et que, depuis bien des années, j''ai le vif désir de vous rendre visite, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '[je le ferai] quand je me rendrai en Espagne. J''espère en effet vous voir en passant et recevoir votre aide pour me rendre là-bas une fois que j''aurai satisfait, du moins en partie, mon désir d''être avec vous.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Maintenant je vais à Jérusalem pour servir les saints. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'En effet, les Eglises de la Macédoine et l''Achaïe ont bien voulu organiser une collecte en faveur de ceux qui sont pauvres parmi les saints de Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Elles l''ont bien voulu et elles le leur devaient, car si les non-Juifs ont eu part aux avantages spirituels des Juifs, ils doivent aussi les assister dans leurs besoins matériels. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Dès que j''aurai réglé cette affaire et que je leur aurai remis ces dons, je partirai pour l''Espagne et je passerai chez vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Je sais qu'en venant vous rendre visite, c'est avec une pleine bénédiction de [l'Evangile de] Christ que je le ferai.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Je vous en supplie, frères et sœurs, par notre Seigneur Jésus-Christ et par l''amour de l''Esprit, combattez avec moi en adressant à Dieu des prières en ma faveur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Priez afin que je sois protégé des incrédules de la Judée et que l''aide que j''apporte à Jérusalem soit bien accueillie par les saints. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Ainsi je pourrai venir chez vous dans la joie, si c''est la volonté de Dieu, et trouver un peu de repos au milieu de vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Que le Dieu de la paix soit avec vous tous! Amen!
