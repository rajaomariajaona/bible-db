document_id: 1CH.8,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Descendants de Benjamin établis à Jérusalem
  - type: text
    content: 'Benjamin eut pour fils Béla, son aîné, Ashbel le deuxième, Achrach le troisième, '
  '10':
  - type: text
    content: 'Jeuts, Shocja et Mirma. Ce sont là ses fils, qui étaient chefs de famille. '
  '11':
  - type: text
    content: 'De Hushim il eut Abithub et Elpaal. '
  '12':
  - type: text
    content: 'Fils d''Elpaal: Eber, Misheam et Shémer, qui construisit Ono, Lod et les villes qui en dépendent.'
  '13':
  - type: text
    content: 'Beria et Shéma, qui étaient chefs de famille parmi les habitants d''Ajalon, mirent en fuite les habitants de Gath. '
  '14':
  - type: text
    content: 'Achjo, Shashak, Jerémoth, '
  '15':
  - type: text
    content: 'Zebadja, Arad, Eder, '
  '16':
  - type: text
    content: 'Micaël, Jishpha et Jocha étaient les fils de Beria. '
  '17':
  - type: text
    content: 'Zebadja, Meshullam, Hizki, Héber, '
  '18':
  - type: text
    content: 'Jishmeraï, Jizlia et Jobab étaient les fils d''Elpaal. '
  '19':
  - type: text
    content: 'Jakim, Zicri, Zabdi, '
  '2':
  - type: text
    content: 'Nocha le quatrième et Rapha le cinquième. '
  '20':
  - type: text
    content: 'Eliénaï, Tsilthaï, Eliel, '
  '21':
  - type: text
    content: 'Adaja, Beraja et Shimrath étaient les fils de Shimeï. '
  '22':
  - type: text
    content: 'Jishpan, Eber, Eliel, '
  '23':
  - type: text
    content: 'Abdon, Zicri, Hanan, '
  '24':
  - type: text
    content: 'Hanania, Elam, Anthothija, '
  '25':
  - type: text
    content: 'Jiphdeja et Penuel étaient les fils de Shashak. '
  '26':
  - type: text
    content: 'Shamsheraï, Shecharia, Athalia, '
  '27':
  - type: text
    content: 'Jaaréshia, Elija et Zicri étaient les fils de Jerocham. '
  '28':
  - type: text
    content: Tous ceux-là étaient des chefs de famille dans leur lignée, c'étaient des chefs. Ils habitaient à Jérusalem.
  '29':
  - type: text
    content: 'A Gabaon habitaient le père de Gabaon, dont la femme s''appelait Maaca, '
  '3':
  - type: text
    content: 'Les fils de Béla furent Addar, Guéra, Abihud, '
  '30':
  - type: text
    content: 'Abdon, son fils aîné, Tsur, Kis, Baal, Nadab, '
  '31':
  - type: text
    content: 'Guedor, Achjo et Zéker. '
  '32':
  - type: text
    content: 'Mikloth eut pour fils Shimea. Contrairement à leurs frères, ils habitaient à Jérusalem avec leurs frères. '
  '33':
  - type: text
    content: 'Ner eut pour fils Kis; Kis eut Saül; Saül eut Jonathan, Malki-Shua, Abinadab et Eshbaal. '
  '34':
  - type: text
    content: 'Fils de Jonathan: Merib-Baal. Merib-Baal eut pour fils Michée. '
  '35':
  - type: text
    content: 'Fils de Michée: Pithon, Mélec, Thaeréa et Achaz. '
  '36':
  - type: text
    content: 'Achaz eut pour fils Jehoadda; Jehoadda eut Alémeth, Azmaveth et Zimri; Zimri eut Motsa; '
  '37':
  - type: text
    content: 'Motsa eut pour fils Binea, lui-même père de Rapha, père d''Eleasa, père d''Atsel. '
  '38':
  - type: text
    content: 'Atsel eut six fils, dont voici les noms: Azrikam, Bocru, Ismaël, Shearia, Abdias et Hanan. Tous ceux-là étaient les fils d''Atsel. '
  '39':
  - type: text
    content: 'Fils de son frère Eshek: Ulam, son aîné, Jéush le deuxième et Eliphéleth le troisième. '
  '4':
  - type: text
    content: 'Abishua, Naaman, Achoach, '
  '40':
  - type: text
    content: 'Les fils d''Ulam étaient de vaillants hommes, capables de tirer à l''arc, et ils eurent beaucoup de fils et de petits-fils: 150 en tout. Tous ceux-là étaient des descendants de Benjamin.'
  '5':
  - type: text
    content: Guéra, Shephuphan et Huram.
  '6':
  - type: text
    content: 'Voici les fils d''Echud qui étaient chefs de famille parmi les habitants de Guéba et que l''on fit émigrer à Manachath: '
  '7':
  - type: text
    content: Naaman, Achija et Guéra. Guéra, celui qui les fit émigrer, eut pour fils Uzza et Achichud.
  '8':
  - type: text
    content: 'Shacharaïm eut des enfants dans le pays de Moab, après avoir renvoyé Hushim et Baara, ses femmes. '
  '9':
  - type: text
    content: 'De sa femme Hodesh, il eut Jobab, Tsibja, Mésha, Malcam, '
