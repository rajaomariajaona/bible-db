document_id: JER.37,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Annonce du retour et de la victoire des Babyloniens
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Sédécias, fils de Josias, devint roi à la place de Jéconia, le fils de Jojakim, car il avait été désigné par Nebucadnetsar, roi de Babylone, pour régner sur le pays de Juda. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Même si vous parveniez à battre toute l'armée babylonienne en guerre contre vous, au point qu'il ne reste chez elle que des hommes blessés, chacun d'eux se relèverait dans sa tente et irait mettre le feu à cette ville.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jérémie en prison
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Pendant que l''armée babylonienne s''était éloignée de Jérusalem à cause de l''armée du pharaon, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Jérémie voulut sortir de Jérusalem et se rendre dans le pays de Benjamin pour recevoir la part qui lui revenait parmi le peuple. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Lorsqu''il arriva à la porte de Benjamin, le commandant de la garde, un dénommé Jireija, fils de Shélémia et petit-fils de Hanania, se trouvait là. Il empoigna le prophète Jérémie en disant: «Tu veux te rallier aux Babyloniens!» '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Jérémie répondit: «C''est faux! Je ne suis pas en train de me rallier aux Babyloniens», mais Jireija refusa de l''écouter. Il arrêta Jérémie et le conduisit devant les chefs. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ceux-ci se montrèrent irrités contre Jérémie et le frappèrent avant de le placer en détention dans la maison du secrétaire Jonathan, qu''ils avaient transformée en maison d''arrêt. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Ainsi, Jérémie rejoignit les oubliettes et les cachots, et il y resta longtemps.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Le roi Sédécias envoya quelqu''un chercher Jérémie pour l''interroger en secret dans son palais. Il dit: «Y a-t-il une parole de la part de l''Eternel?» Jérémie répondit par l''affirmative avant d''ajouter: «Tu seras livré entre les mains du roi de Babylone.» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Jérémie dit encore au roi Sédécias: «Quel péché ai-je commis contre toi, contre tes serviteurs et contre ce peuple, pour que vous m''ayez mis en maison d''arrêt? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Où sont donc vos prophètes, ceux qui vous prédisaient que le roi de Babylone ne viendrait pas vous attaquer, ni vous ni ce pays? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ni lui, ni ses serviteurs, ni la population du pays ne tinrent compte des paroles que l'Eternel avait dites par l'intermédiaire du prophète Jérémie.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Maintenant écoute-moi, je t''en prie, mon seigneur le roi, et fais bon accueil à ma supplication! Ne me renvoie pas dans la maison du secrétaire Jonathan, sinon j''y mourrai!» '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Le roi Sédécias ordonna qu'on place Jérémie sous surveillance dans la cour de la prison et qu'on lui donne chaque jour une miche de pain provenant de la rue des boulangers, et ce jusqu'à ce qu'il n'y ait plus de pain dans la ville. Jérémie eut donc pour habitation la cour de la prison.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Le roi Sédécias envoya Jucal, fils de Shélémia, et le prêtre Sophonie, fils de Maaséja, vers le prophète Jérémie pour lui dire: «Intercède donc en notre faveur auprès de l''Eternel, notre Dieu!» '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Or Jérémie circulait librement parmi le peuple, on ne l''avait pas encore mis en maison d''arrêt. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: L'armée du pharaon était sortie d'Egypte et, à cette nouvelle, les Babyloniens qui faisaient le siège de Jérusalem en repartirent.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Alors la parole de l''Eternel fut adressée au prophète Jérémie: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '«Voici ce que dit l''Eternel, le Dieu d''Israël: Vous annoncerez au roi de Juda qui vous a envoyés vers moi pour me consulter: ‘L''armée du pharaon, qui était en marche pour vous porter secours, est en train de retourner dans son pays, en Egypte. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Les Babyloniens vont revenir attaquer cette ville. Ils s'en empareront et y mettront le feu.’
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '»Voici ce que dit l''Eternel: Ne vous bercez pas d''illusions en affirmant: ‘C''est sûr, les Babyloniens partent loin de nous’, car ils ne partiront pas. '
