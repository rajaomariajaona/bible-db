document_id: 1JN.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Caractéristiques des enfants de Dieu
  - type: text
    content: 'Voyez quel amour le Père nous a témoigné pour que nous soyons appelés enfants de Dieu! [Et nous le sommes!] Si le monde ne vous connaît pas, c''est qu''il ne l''a pas connu, lui. '
  '10':
  - type: text
    content: 'C''est à cela que l''on reconnaît les enfants de Dieu et les enfants du diable: celui qui ne pratique pas la justice n''est pas de Dieu, tout comme celui qui n''aime pas son frère. '
  '11':
  - type: text
    content: 'En effet, le message qui vous a été annoncé et que vous avez entendu dès le commencement, c''est que nous devons nous aimer les uns les autres. '
  '12':
  - type: text
    content: N'imitons pas Caïn
  - type: note
    content: 'Caïn: fils aîné d''Adam et Eve, qui a tué son frère Abel.'
  - type: text
    content: ': il était du mal'
  - type: note
    content: 'Du mal: ou du mauvais, c''est-à-dire du diable.'
  - type: text
    content: ' et il a tué son frère. Et pourquoi l''a-t-il tué? Parce que sa manière d''agir était mauvaise tandis que celle de son frère était juste. '
  '13':
  - type: text
    content: 'Ne vous étonnez pas, mes frères et sœurs, si le monde vous déteste. '
  '14':
  - type: text
    content: 'Quant à nous, nous savons que nous sommes passés de la mort à la vie parce que nous aimons les frères et sœurs. Celui qui n''aime pas [son frère] reste dans la mort. '
  '15':
  - type: text
    content: Tout homme qui déteste son frère est un meurtrier, et vous savez qu'aucun meurtrier n'a la vie éternelle en lui.
  '16':
  - type: text
    content: 'Voici comment nous avons connu l''amour: Christ a donné sa vie pour nous; nous aussi, nous devons donner notre vie pour les frères et sœurs. '
  '17':
  - type: text
    content: Si quelqu'un qui possède les biens de ce monde voit son frère dans le besoin et lui ferme son cœur, comment l'amour de Dieu peut-il demeurer en lui?
  '18':
  - type: text
    content: 'Petits enfants, n''aimons pas en paroles et avec la langue, mais en actes et avec vérité. '
  '19':
  - type: text
    content: 'Par là nous saurons que nous sommes de la vérité et nous rassurerons notre cœur devant lui. '
  '2':
  - type: text
    content: 'Bien-aimés, nous sommes maintenant enfants de Dieu, et ce que nous serons un jour n''a pas encore été révélé. [Mais] nous savons que, lorsque Christ apparaîtra, nous serons semblables à lui parce que nous le verrons tel qu''il est. '
  '20':
  - type: text
    content: En effet, même si notre cœur nous condamne, Dieu est plus grand que notre cœur et il connaît tout.
  '21':
  - type: text
    content: 'Bien-aimés, si notre cœur ne nous condamne pas, nous avons de l''assurance devant Dieu. '
  '22':
  - type: text
    content: 'Quoi que nous demandions, nous le recevons de lui, parce que nous gardons ses commandements et faisons ce qui lui est agréable. '
  '23':
  - type: text
    content: 'Et voici quel est son commandement: c''est que nous croyions au nom de son Fils Jésus-Christ et que nous nous aimions les uns les autres, comme il [nous] l''a ordonné. '
  '24':
  - type: text
    content: Celui qui garde ses commandements demeure en Dieu et Dieu demeure en lui; et nous reconnaissons qu'il demeure en nous à l'Esprit qu'il nous a donné.
  '3':
  - type: text
    content: Toute personne qui possède cette espérance en lui se purifie comme lui-même est pur.
  '4':
  - type: text
    content: 'Tous ceux qui pratiquent le péché violent la loi, puisque le péché, c''est la violation de la loi. '
  '5':
  - type: text
    content: 'Or, vous le savez, Jésus est apparu pour enlever nos péchés et il n''y a pas de péché en lui. '
  '6':
  - type: text
    content: Ceux qui demeurent en lui ne pèchent pas; si quelqu'un pèche, il ne l'a pas vu et ne l'a pas connu.
  '7':
  - type: text
    content: 'Petits enfants, que personne ne vous égare. Celui qui pratique la justice est juste comme Christ lui-même est juste. '
  '8':
  - type: text
    content: Celui qui pratique le péché est du diable, car le diable pèche dès le commencement. Or, c'est pour détruire les œuvres du diable que le Fils de Dieu est apparu.
  '9':
  - type: text
    content: 'Quiconque est né de Dieu ne pratique pas le péché, parce que la semence de Dieu demeure en lui et il ne peut pas pécher, parce qu''il est né de Dieu. '
