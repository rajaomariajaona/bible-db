document_id: 1JN.3,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Caractéristiques des enfants de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Voyez quel amour le Père nous a témoigné pour que nous soyons appelés enfants de Dieu! [Et nous le sommes!] Si le monde ne vous connaît pas, c''est qu''il ne l''a pas connu, lui. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'C''est à cela que l''on reconnaît les enfants de Dieu et les enfants du diable: celui qui ne pratique pas la justice n''est pas de Dieu, tout comme celui qui n''aime pas son frère. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'En effet, le message qui vous a été annoncé et que vous avez entendu dès le commencement, c''est que nous devons nous aimer les uns les autres. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: N'imitons pas Caïn
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Caïn: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fils aîné d'Adam et Eve, qui a tué son frère Abel.
      marker-yv: yv-n
    - type: text
      text: ': il était du mal'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Du mal: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ou du mauvais, c'est-à-dire du diable.
      marker-yv: yv-n
    - type: text
      text: ' et il a tué son frère. Et pourquoi l''a-t-il tué? Parce que sa manière d''agir était mauvaise tandis que celle de son frère était juste. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ne vous étonnez pas, mes frères et sœurs, si le monde vous déteste. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Quant à nous, nous savons que nous sommes passés de la mort à la vie parce que nous aimons les frères et sœurs. Celui qui n''aime pas [son frère] reste dans la mort. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tout homme qui déteste son frère est un meurtrier, et vous savez qu'aucun meurtrier n'a la vie éternelle en lui.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Voici comment nous avons connu l''amour: Christ a donné sa vie pour nous; nous aussi, nous devons donner notre vie pour les frères et sœurs. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Si quelqu'un qui possède les biens de ce monde voit son frère dans le besoin et lui ferme son cœur, comment l'amour de Dieu peut-il demeurer en lui?
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Petits enfants, n''aimons pas en paroles et avec la langue, mais en actes et avec vérité. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Par là nous saurons que nous sommes de la vérité et nous rassurerons notre cœur devant lui. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Bien-aimés, nous sommes maintenant enfants de Dieu, et ce que nous serons un jour n''a pas encore été révélé. [Mais] nous savons que, lorsque Christ apparaîtra, nous serons semblables à lui parce que nous le verrons tel qu''il est. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: En effet, même si notre cœur nous condamne, Dieu est plus grand que notre cœur et il connaît tout.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Bien-aimés, si notre cœur ne nous condamne pas, nous avons de l''assurance devant Dieu. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Quoi que nous demandions, nous le recevons de lui, parce que nous gardons ses commandements et faisons ce qui lui est agréable. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Et voici quel est son commandement: c''est que nous croyions au nom de son Fils Jésus-Christ et que nous nous aimions les uns les autres, comme il [nous] l''a ordonné. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Celui qui garde ses commandements demeure en Dieu et Dieu demeure en lui; et nous reconnaissons qu'il demeure en nous à l'Esprit qu'il nous a donné.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Toute personne qui possède cette espérance en lui se purifie comme lui-même est pur.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Tous ceux qui pratiquent le péché violent la loi, puisque le péché, c''est la violation de la loi. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Or, vous le savez, Jésus est apparu pour enlever nos péchés et il n''y a pas de péché en lui. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Ceux qui demeurent en lui ne pèchent pas; si quelqu'un pèche, il ne l'a pas vu et ne l'a pas connu.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Petits enfants, que personne ne vous égare. Celui qui pratique la justice est juste comme Christ lui-même est juste. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Celui qui pratique le péché est du diable, car le diable pèche dès le commencement. Or, c'est pour détruire les œuvres du diable que le Fils de Dieu est apparu.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Quiconque est né de Dieu ne pratique pas le péché, parce que la semence de Dieu demeure en lui et il ne peut pas pécher, parce qu''il est né de Dieu. '
