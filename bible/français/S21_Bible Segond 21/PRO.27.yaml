document_id: PRO.27,152
type_code: fra
verses:
  '1':
  - type: text
    content: Ne te vante pas du lendemain,
  - type: text
    content: car tu ne sais pas ce qu'un jour peut amener.
  '10':
  - type: text
    content: N'abandonne pas ton ami, ni celui de ton père,
  - type: text
    content: et n'entre pas dans la maison de ton frère, le jour où tu es dans la détresse!
  - type: text
    content: Mieux vaut un voisin proche qu'un frère éloigné.
  '11':
  - type: text
    content: Mon fils, sois sage et réjouis mon cœur,
  - type: text
    content: et je pourrai répondre à celui qui m'insulte.
  '12':
  - type: text
    content: L'homme prudent voit le mal et se met à l'abri,
  - type: text
    content: mais ceux qui manquent d'expérience vont de l'avant et en subissent les conséquences.
  '13':
  - type: text
    content: Quelqu'un s'est porté garant pour un étranger? Prends son habit!
  - type: text
    content: Il s'est engagé en faveur d'une inconnue? Exige de lui des gages!
  '14':
  - type: text
    content: Si quelqu'un bénit son prochain à haute voix et de grand matin,
  - type: text
    content: c'est tenu pour une malédiction.
  '15':
  - type: text
    content: Une gouttière qui coule sans cesse un jour de pluie
  - type: text
    content: 'et une femme querelleuse se ressemblent:'
  '16':
  - type: text
    content: celui qui les retient retient du vent
  - type: text
    content: et sa main cherche à attraper de l'huile.
  '17':
  - type: text
    content: Tout comme le fer aiguise le fer,
  - type: text
    content: l'homme s'aiguise au contact de son prochain.
  '18':
  - type: text
    content: Celui qui soigne un figuier en mangera le fruit,
  - type: text
    content: et celui qui veille sur son maître sera honoré.
  '19':
  - type: text
    content: Tout comme l'eau reflète un visage,
  - type: text
    content: le cœur de l'homme reflète l'homme.
  '2':
  - type: text
    content: Que ce soit un autre qui fasse ton éloge, et non ta bouche,
  - type: text
    content: un étranger, et non tes lèvres.
  '20':
  - type: text
    content: Le séjour des morts et le gouffre de perdition ne sont jamais rassasiés;
  - type: text
    content: les yeux de l'homme non plus ne sont jamais rassasiés.
  '21':
  - type: text
    content: On juge la qualité de l'argent à l'aide du creuset et celle de l'or à l'aide du fourneau,
  - type: text
    content: mais celle d'un homme d'après le bien que les autres disent de lui.
  '22':
  - type: text
    content: Même si tu broyais le fou dans un mortier,
  - type: text
    content: au milieu des grains avec le pilon,
  - type: text
    content: sa folie ne se séparerait pas de lui.
  - type: heading
    content: Appel à l'intégrité
  '23':
  - type: text
    content: Connais bien chacune de tes brebis,
  - type: text
    content: donne tes soins à tes troupeaux,
  '24':
  - type: text
    content: car la richesse ne dure pas toujours.
  - type: text
    content: Une couronne se transmet-elle indéfiniment?
  '25':
  - type: text
    content: Le foin est récolté, la verdure reparaît
  - type: text
    content: et les herbes des montagnes sont rassemblées.
  '26':
  - type: text
    content: Les agneaux servent à t'habiller,
  - type: text
    content: les boucs à payer un champ,
  '27':
  - type: text
    content: et le lait des chèvres suffit à ta nourriture, à celle de ta maison
  - type: text
    content: et à l'entretien de tes servantes.
  '3':
  - type: text
    content: La pierre est pesante, le sable est lourd,
  - type: text
    content: mais l'irritation du fou pèse plus que l'un et l'autre.
  '4':
  - type: text
    content: La fureur est cruelle et la colère sans retenue,
  - type: text
    content: mais qui tiendra devant la jalousie?
  '5':
  - type: text
    content: Mieux vaut un reproche ouvert
  - type: text
    content: qu'une amitié cachée.
  '6':
  - type: text
    content: Les blessures d'un ami prouvent sa fidélité,
  - type: text
    content: tandis que les baisers d'un ennemi sont trompeurs.
  '7':
  - type: text
    content: Celui qui est rassasié piétine le rayon de miel,
  - type: text
    content: tandis que celui qui a faim trouve doux tout ce qui est amer.
  '8':
  - type: text
    content: L'homme qui erre loin de chez lui
  - type: text
    content: est pareil à l'oiseau qui erre loin de son nid.
  '9':
  - type: text
    content: L'huile et les parfums réjouissent le cœur,
  - type: text
    content: et la douceur d'un ami vaut mieux que nos propres conseils.
