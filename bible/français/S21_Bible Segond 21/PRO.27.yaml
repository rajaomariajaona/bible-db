document_id: PRO.27,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ne te vante pas du lendemain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tu ne sais pas ce qu'un jour peut amener.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: N'abandonne pas ton ami, ni celui de ton père,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et n'entre pas dans la maison de ton frère, le jour où tu es dans la détresse!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mieux vaut un voisin proche qu'un frère éloigné.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Mon fils, sois sage et réjouis mon cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je pourrai répondre à celui qui m'insulte.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: L'homme prudent voit le mal et se met à l'abri,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ceux qui manquent d'expérience vont de l'avant et en subissent les conséquences.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Quelqu'un s'est porté garant pour un étranger? Prends son habit!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il s'est engagé en faveur d'une inconnue? Exige de lui des gages!
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Si quelqu'un bénit son prochain à haute voix et de grand matin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est tenu pour une malédiction.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Une gouttière qui coule sans cesse un jour de pluie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et une femme querelleuse se ressemblent:'
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: celui qui les retient retient du vent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sa main cherche à attraper de l'huile.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tout comme le fer aiguise le fer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'homme s'aiguise au contact de son prochain.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Celui qui soigne un figuier en mangera le fruit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et celui qui veille sur son maître sera honoré.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tout comme l'eau reflète un visage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le cœur de l'homme reflète l'homme.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Que ce soit un autre qui fasse ton éloge, et non ta bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un étranger, et non tes lèvres.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Le séjour des morts et le gouffre de perdition ne sont jamais rassasiés;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les yeux de l'homme non plus ne sont jamais rassasiés.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: On juge la qualité de l'argent à l'aide du creuset et celle de l'or à l'aide du fourneau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais celle d'un homme d'après le bien que les autres disent de lui.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Même si tu broyais le fou dans un mortier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au milieu des grains avec le pilon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa folie ne se séparerait pas de lui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Appel à l'intégrité
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Connais bien chacune de tes brebis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: donne tes soins à tes troupeaux,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: car la richesse ne dure pas toujours.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une couronne se transmet-elle indéfiniment?
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Le foin est récolté, la verdure reparaît
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les herbes des montagnes sont rassemblées.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Les agneaux servent à t'habiller,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les boucs à payer un champ,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: et le lait des chèvres suffit à ta nourriture, à celle de ta maison
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et à l'entretien de tes servantes.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: La pierre est pesante, le sable est lourd,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais l'irritation du fou pèse plus que l'un et l'autre.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: La fureur est cruelle et la colère sans retenue,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais qui tiendra devant la jalousie?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Mieux vaut un reproche ouvert
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'une amitié cachée.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Les blessures d'un ami prouvent sa fidélité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que les baisers d'un ennemi sont trompeurs.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Celui qui est rassasié piétine le rayon de miel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que celui qui a faim trouve doux tout ce qui est amer.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: L'homme qui erre loin de chez lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: est pareil à l'oiseau qui erre loin de son nid.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: L'huile et les parfums réjouissent le cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la douceur d'un ami vaut mieux que nos propres conseils.
