document_id: JER.8,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Inconscience vis-à-vis du péché
  - type: text
    content: '»A ce moment-là, déclare l''Eternel, on sortira de leurs tombeaux les ossements des rois de Juda, les ossements de ses chefs, ceux des prêtres, ceux des prophètes et ceux des habitants de Jérusalem. '
  '10':
  - type: text
    content: »C'est pourquoi je donnerai leur femme à d'autres
  - type: text
    content: et leurs champs à ceux qui les en déposséderont.
  - type: text
    content: Oui, du plus petit au plus grand,
  - type: text
    content: tous sont assoiffés de profit;
  - type: text
    content: depuis le prophète jusqu'au prêtre, tous pratiquent le mensonge.
  '11':
  - type: text
    content: 'Ils remédient superficiellement au désastre de la fille de mon peuple:'
  - type: text
    content: ‘Tout va bien! Tout va bien!’ disent-ils,
  - type: text
    content: mais rien ne va.
  '12':
  - type: text
    content: »Ils devraient être couverts de honte parce qu'ils ont commis des horreurs,
  - type: text
    content: mais ils ne rougissent même pas, ils ne connaissent même pas la honte.
  - type: text
    content: C'est pourquoi ils tomberont avec ceux qui tombent.
  - type: text
    content: Quand le moment sera venu d'intervenir contre eux, ils trébucheront,
  - type: text
    content: dit l'Eternel.
  '13':
  - type: text
    content: Je veux en finir avec eux, déclare l'Eternel.
  - type: text
    content: Il n'y a plus de raisin à la vigne,
  - type: text
    content: plus de figue au figuier et les feuilles se flétrissent.
  - type: text
    content: Ils sont passés à côté de ce que je leur avais donné.»
  '14':
  - type: text
    content: «Pourquoi restons-nous assis?
  - type: text
    content: Rassemblez-vous et rendons-nous dans les villes fortifiées,
  - type: text
    content: et là nous mourrons! En effet, l'Eternel, notre Dieu, nous fait mourir,
  - type: text
    content: il nous fait boire de l'eau empoisonnée,
  - type: text
    content: parce que nous avons péché contre lui.
  '15':
  - type: text
    content: Nous espérions la paix et rien de bon n'arrive,
  - type: text
    content: une période de guérison et voici la terreur!»
  '16':
  - type: text
    content: «Le souffle de ses chevaux se fait entendre du côté de Dan,
  - type: text
    content: toute la terre tremble au bruit que fait le hennissement de leurs étalons.
  - type: text
    content: Ils viennent dévorer le pays et ses biens,
  - type: text
    content: la ville et ses habitants.
  '17':
  - type: text
    content: Oui, je vais vous envoyer des serpents, des vipères
  - type: text
    content: que personne ne peut charmer,
  - type: text
    content: et ils vous mordront, déclare l'Eternel.»
  - type: heading
    content: Lamentation sur Jérusalem
  '18':
  - type: text
    content: «Je voudrais soulager ma douleur,
  - type: text
    content: la souffrance de mon cœur me pèse.
  '19':
  - type: text
    content: Voici que les cris de la fille de mon peuple r
  - type: text
    content: 'etentissent sur une terre lointaine:'
  - type: text
    content: ‘L'Eternel n'est-il plus à Sion?
  - type: text
    content: N'a-t-elle plus son roi au milieu d'elle?’»
  - type: text
    content: «Pourquoi m'ont-ils irrité par leurs sculptures sacrées,
  - type: text
    content: par des idoles sans consistance qui viennent d'ailleurs?»
  '2':
  - type: text
    content: 'On les exposera au soleil, à la lune et à tous les corps célestes, puisqu''ils les ont aimés, servis, suivis, recherchés et se sont prosternés devant eux. On ne les rassemblera pas, on ne les ensevelira pas, et ils seront comme du fumier sur la terre. '
  '20':
  - type: text
    content: «La moisson est passée, l'été est fini,
  - type: text
    content: et nous, nous ne sommes pas sauvés!
  '21':
  - type: text
    content: Je suis brisé à cause du désastre qui touche la fille de mon peuple,
  - type: text
    content: je suis dans le deuil, l'affolement s'est emparé de moi.
  '22':
  - type: text
    content: N'y a-t-il pas de baume en Galaad?
  - type: text
    content: N'y a-t-il pas de médecin là-bas?
  - type: text
    content: Pourquoi donc la guérison de la fille de mon peuple n'intervient-elle pas?
  '23':
  - type: text
    content: Si seulement ma tête était remplie d'eau
  - type: text
    content: et mes yeux une source de larmes!
  - type: text
    content: Je pourrais pleurer jour et nuit
  - type: text
    content: les morts de la fille de mon peuple.»
  '3':
  - type: text
    content: La mort sera préférée à la vie par tous les rescapés de ce peuple méchant, et ce partout où je les aurai chassés, déclare l'Eternel, le maître de l'univers.
  '4':
  - type: text
    content: '»Annonce-leur: ‘Voici ce que dit l''Eternel:'
  - type: text
    content: Est-ce qu'on tombe sans se relever?
  - type: text
    content: Ou bien est-ce qu'on se perd sans revenir en arrière?’
  '5':
  - type: text
    content: Pourquoi donc cette population de Jérusalem s'abandonne-t-elle
  - type: text
    content: à de perpétuels égarements?
  - type: text
    content: Ils renforcent leur trahison,
  - type: text
    content: ils refusent de revenir à moi.
  '6':
  - type: text
    content: 'Je suis attentif et j''écoute:'
  - type: text
    content: ils ne parlent pas comme ils le devraient.
  - type: text
    content: Aucun ne regrette sa méchanceté
  - type: text
    content: 'et ne se dit: ‘Qu''ai-je fait?’'
  - type: text
    content: Tous retournent à leur course,
  - type: text
    content: pareils à un cheval qui s'élance au combat.
  '7':
  - type: text
    content: »Même la cigogne, dans le ciel, reconnaît l'époque de sa migration;
  - type: text
    content: la tourterelle, l'hirondelle et la grue
  - type: text
    content: respectent le moment de leur retour,
  - type: text
    content: mais mon peuple ne reconnaît pas le droit établi par l'Eternel.
  '8':
  - type: text
    content: 'Comment pouvez-vous prétendre:'
  - type: text
    content: ‘Nous sommes sages, puisque la loi de l'Eternel est avec nous’?
  - type: text
    content: C'est vraiment en vue du mensonge que la plume mensongère des scribes s'est mise à l'œuvre.
  '9':
  - type: text
    content: Les sages sont couverts de honte,
  - type: text
    content: ils sont terrorisés, pris au piège.
  - type: text
    content: Maintenant qu'ils ont méprisé la parole de l'Eternel,
  - type: text
    content: où est leur sagesse?
