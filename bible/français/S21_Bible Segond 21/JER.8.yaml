document_id: JER.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Inconscience vis-à-vis du péché
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»A ce moment-là, déclare l''Eternel, on sortira de leurs tombeaux les ossements des rois de Juda, les ossements de ses chefs, ceux des prêtres, ceux des prophètes et ceux des habitants de Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'On les exposera au soleil, à la lune et à tous les corps célestes, puisqu''ils les ont aimés, servis, suivis, recherchés et se sont prosternés devant eux. On ne les rassemblera pas, on ne les ensevelira pas, et ils seront comme du fumier sur la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: La mort sera préférée à la vie par tous les rescapés de ce peuple méchant, et ce partout où je les aurai chassés, déclare l'Eternel, le maître de l'univers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '»Annonce-leur: ‘Voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est-ce qu'on tombe sans se relever?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou bien est-ce qu'on se perd sans revenir en arrière?’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Pourquoi donc cette population de Jérusalem s'abandonne-t-elle
- type: usfm
  marker: q1
  children:
  - type: text
    text: à de perpétuels égarements?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils renforcent leur trahison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils refusent de revenir à moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je suis attentif et j''écoute:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ne parlent pas comme ils le devraient.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aucun ne regrette sa méchanceté
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et ne se dit: ‘Qu''ai-je fait?’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous retournent à leur course,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pareils à un cheval qui s'élance au combat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: »Même la cigogne, dans le ciel, reconnaît l'époque de sa migration;
- type: usfm
  marker: q1
  children:
  - type: text
    text: la tourterelle, l'hirondelle et la grue
- type: usfm
  marker: q1
  children:
  - type: text
    text: respectent le moment de leur retour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais mon peuple ne reconnaît pas le droit établi par l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Comment pouvez-vous prétendre:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Nous sommes sages, puisque la loi de l'Eternel est avec nous’?
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est vraiment en vue du mensonge que la plume mensongère des scribes s'est mise à l'œuvre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les sages sont couverts de honte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sont terrorisés, pris au piège.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maintenant qu'ils ont méprisé la parole de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: où est leur sagesse?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: »C'est pourquoi je donnerai leur femme à d'autres
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leurs champs à ceux qui les en déposséderont.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, du plus petit au plus grand,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous sont assoiffés de profit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: depuis le prophète jusqu'au prêtre, tous pratiquent le mensonge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils remédient superficiellement au désastre de la fille de mon peuple:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Tout va bien! Tout va bien!’ disent-ils,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais rien ne va.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: »Ils devraient être couverts de honte parce qu'ils ont commis des horreurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ils ne rougissent même pas, ils ne connaissent même pas la honte.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est pourquoi ils tomberont avec ceux qui tombent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand le moment sera venu d'intervenir contre eux, ils trébucheront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je veux en finir avec eux, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n'y a plus de raisin à la vigne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: plus de figue au figuier et les feuilles se flétrissent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sont passés à côté de ce que je leur avais donné.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: «Pourquoi restons-nous assis?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rassemblez-vous et rendons-nous dans les villes fortifiées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et là nous mourrons! En effet, l'Eternel, notre Dieu, nous fait mourir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il nous fait boire de l'eau empoisonnée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que nous avons péché contre lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Nous espérions la paix et rien de bon n'arrive,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une période de guérison et voici la terreur!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: «Le souffle de ses chevaux se fait entendre du côté de Dan,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toute la terre tremble au bruit que fait le hennissement de leurs étalons.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils viennent dévorer le pays et ses biens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la ville et ses habitants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Oui, je vais vous envoyer des serpents, des vipères
- type: usfm
  marker: q1
  children:
  - type: text
    text: que personne ne peut charmer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils vous mordront, déclare l'Eternel.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lamentation sur Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: «Je voudrais soulager ma douleur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la souffrance de mon cœur me pèse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Voici que les cris de la fille de mon peuple r
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'etentissent sur une terre lointaine:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘L'Eternel n'est-il plus à Sion?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N'a-t-elle plus son roi au milieu d'elle?’»
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Pourquoi m'ont-ils irrité par leurs sculptures sacrées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: par des idoles sans consistance qui viennent d'ailleurs?»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: «La moisson est passée, l'été est fini,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nous, nous ne sommes pas sauvés!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Je suis brisé à cause du désastre qui touche la fille de mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je suis dans le deuil, l'affolement s'est emparé de moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: N'y a-t-il pas de baume en Galaad?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N'y a-t-il pas de médecin là-bas?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi donc la guérison de la fille de mon peuple n'intervient-elle pas?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Si seulement ma tête était remplie d'eau
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mes yeux une source de larmes!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je pourrais pleurer jour et nuit
- type: usfm
  marker: q1
  children:
  - type: text
    text: les morts de la fille de mon peuple.»
