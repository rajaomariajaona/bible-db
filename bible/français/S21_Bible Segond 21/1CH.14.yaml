document_id: 1CH.14,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prospérité et victoires de David
  - type: text
    content: 'Hiram, le roi de Tyr, envoya des messagers à David, ainsi que du bois de cèdre, avec des tailleurs de pierres et des charpentiers, pour lui construire une maison. '
  '10':
  - type: text
    content: 'David consulta Dieu en disant: «Dois-je monter contre les Philistins et les livreras-tu entre mes mains?» Et l''Eternel lui dit: «Monte et je les livrerai entre tes mains.» '
  '11':
  - type: text
    content: 'Les Philistins montèrent à Baal-Peratsim où David les battit. Puis il dit: «Dieu a dispersé mes ennemis par mon intermédiaire comme de l''eau qui coule.» C''est pourquoi l''on a appelé cet endroit Baal-Peratsim. '
  '12':
  - type: text
    content: Ils y abandonnèrent leurs dieux et David donna l'ordre de les brûler au feu.
  '13':
  - type: text
    content: 'Les Philistins firent de nouveau des incursions dans la vallée. '
  '14':
  - type: text
    content: 'David consulta de nouveau Dieu et Dieu lui dit: «Tu ne monteras pas derrière eux. Fais un détour par rapport à eux et tu arriveras sur eux vis-à-vis des mûriers. '
  '15':
  - type: text
    content: 'Quand tu entendras un bruit de pas dans les cimes des mûriers, alors tu sortiras pour combattre, car c''est Dieu qui marche devant toi pour battre l''armée des Philistins.» '
  '16':
  - type: text
    content: David fit ce que Dieu lui avait ordonné et ils portèrent des coups à l'armée des Philistins depuis Gabaon jusqu'à Guézer.
  '17':
  - type: text
    content: La réputation de David se propagea dans tous les pays et l'Eternel fit de lui un objet de terreur pour toutes les nations.
  '2':
  - type: text
    content: David reconnut alors que l'Eternel l'affermissait comme roi sur Israël et que sa royauté jouissait d'un grand rayonnement à cause de son peuple, Israël.
  '3':
  - type: text
    content: 'David prit encore des femmes à Jérusalem et il eut encore des fils et des filles. '
  '4':
  - type: text
    content: 'Voici le nom des enfants qu''il eut à Jérusalem: Shammua, Shobab, Nathan, Salomon, '
  '5':
  - type: text
    content: 'Jibhar, Elishua, Elphéleth, '
  '6':
  - type: text
    content: 'Noga, Népheg, Japhia, '
  '7':
  - type: text
    content: Elishama, Beéliada et Eliphéleth.
  '8':
  - type: text
    content: 'Les Philistins apprirent que David avait été consacré par onction comme roi sur tout Israël, et ils montèrent tous à sa recherche. David en fut informé et sortit à leur rencontre. '
  '9':
  - type: text
    content: 'Les Philistins arrivèrent et firent des incursions dans la vallée des Rephaïm. '
