document_id: 1CH.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prospérité et victoires de David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Hiram, le roi de Tyr, envoya des messagers à David, ainsi que du bois de cèdre, avec des tailleurs de pierres et des charpentiers, pour lui construire une maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: David reconnut alors que l'Eternel l'affermissait comme roi sur Israël et que sa royauté jouissait d'un grand rayonnement à cause de son peuple, Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'David prit encore des femmes à Jérusalem et il eut encore des fils et des filles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voici le nom des enfants qu''il eut à Jérusalem: Shammua, Shobab, Nathan, Salomon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jibhar, Elishua, Elphéleth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Noga, Népheg, Japhia, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Elishama, Beéliada et Eliphéleth.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les Philistins apprirent que David avait été consacré par onction comme roi sur tout Israël, et ils montèrent tous à sa recherche. David en fut informé et sortit à leur rencontre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Les Philistins arrivèrent et firent des incursions dans la vallée des Rephaïm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'David consulta Dieu en disant: «Dois-je monter contre les Philistins et les livreras-tu entre mes mains?» Et l''Eternel lui dit: «Monte et je les livrerai entre tes mains.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les Philistins montèrent à Baal-Peratsim où David les battit. Puis il dit: «Dieu a dispersé mes ennemis par mon intermédiaire comme de l''eau qui coule.» C''est pourquoi l''on a appelé cet endroit Baal-Peratsim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils y abandonnèrent leurs dieux et David donna l'ordre de les brûler au feu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Les Philistins firent de nouveau des incursions dans la vallée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'David consulta de nouveau Dieu et Dieu lui dit: «Tu ne monteras pas derrière eux. Fais un détour par rapport à eux et tu arriveras sur eux vis-à-vis des mûriers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Quand tu entendras un bruit de pas dans les cimes des mûriers, alors tu sortiras pour combattre, car c''est Dieu qui marche devant toi pour battre l''armée des Philistins.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: David fit ce que Dieu lui avait ordonné et ils portèrent des coups à l'armée des Philistins depuis Gabaon jusqu'à Guézer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: La réputation de David se propagea dans tous les pays et l'Eternel fit de lui un objet de terreur pour toutes les nations.
