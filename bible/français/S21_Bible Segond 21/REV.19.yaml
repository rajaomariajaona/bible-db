document_id: REV.19,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Les noces de l'Agneau
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 19.1–22.21
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Louanges et festin de noces
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après cela, j''entendis dans le ciel comme la voix forte d''une foule immense qui disait: «Alléluia'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Alléluia: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: transcription d'une expression hébraïque signifiant louez l'Eternel.
      marker-yv: yv-n
    - type: text
      text: '! Le salut, la gloire et la puissance sont à notre Dieu. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je tombai à ses pieds pour l''adorer, mais il me dit: «Garde-toi bien de le faire! Je suis ton compagnon de service et celui de tes frères et sœurs qui gardent le témoignage de Jésus. Adore Dieu, car le témoignage de Jésus est l''esprit de la prophétie.»'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Victoire sur la bête et le prétendu prophète
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ensuite, je vis le ciel ouvert, et voici qu''un cheval blanc apparut. Celui qui le montait s''appelle «Fidèle et Véritable», il juge et combat avec justice. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ses yeux étaient comme une flamme de feu et il y avait de nombreuses couronnes sur sa tête. Il portait un nom écrit, que personne d''autre que lui ne connaît. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il était habillé d''un vêtement trempé de sang. Son nom est «la Parole de Dieu». '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les armées célestes le suivaient, montées sur des chevaux blancs et habillées d''un fin lin, blanc et pur. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De sa bouche sortait une épée aiguë [à deux tranchants] pour frapper les nations. '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Il les dirigera avec un sceptre de fer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il les dirigera… fer: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'reprise de la citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 2.9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2.26-27
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12.5'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' et il écrasera lui-même le raisin dans la cuve à vin de l''ardente colère du Dieu tout-puissant. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il portait sur son vêtement et sur sa cuisse un nom écrit: «Roi des rois et Seigneur des seigneurs».'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vis un [autre] ange debout dans le soleil. Il cria d''une voix forte à tous les oiseaux qui volaient haut dans le ciel: «Venez, rassemblez-vous pour le grand festin de Dieu '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: afin de manger la chair des rois, la chair des chefs militaires, la chair des guerriers, la chair des chevaux et de ceux qui les montent, la chair de tous les hommes, libres et esclaves, petits et grands.»
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors je vis la bête, les rois de la terre et leurs armées rassemblés pour faire la guerre à celui qui montait le cheval et à son armée. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Oui, ses jugements sont vrais et justes, car il a jugé la grande prostituée qui corrompait la terre par son immoralité et il a vengé ses serviteurs en lui redemandant leur sang, qu''elle avait versé.» '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La bête fut capturée, ainsi que le prétendu prophète qui avait accompli devant elle des signes miraculeux pour égarer ceux qui avaient reçu la marque de la bête et adoré son image. Tous les deux furent jetés vivants dans l''étang ardent de feu et de soufre. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les autres furent tués par l'épée qui sortait de la bouche de celui qui montait le cheval, et tous les oiseaux se rassasièrent de leur chair.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils dirent une seconde fois: «Alléluia! Et la fumée de cette ville s''élève aux siècles des siècles.» '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les vingt-quatre anciens et les quatre êtres vivants se prosternèrent alors et adorèrent le Dieu qui est assis sur le trône en disant: «Amen! Alléluia!»'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une voix sortit du trône et dit: «Louez notre Dieu, vous tous ses serviteurs, vous qui le craignez, petits et grands!» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et j''entendis comme la voix d''une foule immense. Elle ressemblait au bruit de grosses eaux, au grondement de forts coups de tonnerre, et elle disait: «Alléluia! Car le Seigneur, notre Dieu tout-puissant, a établi son règne. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Réjouissons-nous, soyons dans la joie et rendons-lui gloire, car voici venu le moment des noces de l''Agneau, et son épouse s''est préparée. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il lui a été donné de s'habiller d'un fin lin, éclatant, pur.» En effet, le fin lin, ce sont les œuvres justes des saints.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''ange me dit alors: «Ecris: ‘Heureux ceux qui sont invités au festin des noces de l''Agneau!’» Puis il ajouta: «Ces paroles sont les véritables paroles de Dieu.» '
