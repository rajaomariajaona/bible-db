document_id: GEN.24
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mariage d'Isaac et Rebecca
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Abraham était vieux, d''un âge avancé. L''Eternel l''avait béni dans tous les domaines. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Abraham dit à son plus ancien serviteur, qui était l''intendant de tous ses biens: «Mets ta main sous ma cuisse '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'et je vais te faire jurer au nom de l''Eternel, le Dieu du ciel et le Dieu de la terre, de ne pas prendre pour mon fils une femme parmi les filles des Cananéens au milieu desquels j''habite, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'mais d''aller prendre une femme pour mon fils Isaac dans mon pays et dans ma patrie.» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le serviteur lui répondit: «Peut-être la femme ne voudra-t-elle pas me suivre dans ce pays-ci. Devrai-je conduire ton fils dans le pays d''où tu es sorti?» '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Abraham lui dit: «Garde-toi bien d''y conduire mon fils! '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L''Eternel, le Dieu du ciel, qui m''a fait quitter ma famille et ma patrie, qui m''a parlé et qui m''a juré: ‘Je donnerai ce pays à ta descendance’, enverra lui-même son ange devant toi. C''est là que tu prendras une femme pour mon fils. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Si la femme ne veut pas te suivre, tu seras dégagé du serment que je te fais faire. Seulement, tu n''y conduiras pas mon fils.» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Le serviteur mit sa main sous la cuisse de son seigneur Abraham et lui jura de se conformer à ces paroles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le serviteur prit dix chameaux parmi ceux de son seigneur et il partit avec tous les biens de son seigneur à sa disposition. Il se leva et se rendit en Mésopotamie, dans la ville de Nachor. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il fit reposer les chameaux sur leurs genoux près d''un puits à l''extérieur de la ville. C''était le soir, le moment où les femmes qui vont puiser de l''eau sortent. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il dit: «Eternel, Dieu de mon seigneur Abraham, donne-moi du succès aujourd''hui et fais preuve de bonté envers mon seigneur Abraham! '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Voici que je me tiens près de la source d''eau, et les filles des habitants de la ville vont sortir pour puiser de l''eau. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Que la jeune fille à laquelle je dirai: ‘Penche ta cruche pour que je boive’ et qui répondra: ‘Bois et je donnerai aussi à boire à tes chameaux’ soit celle que tu as destinée à ton serviteur Isaac! Par là je reconnaîtrai que tu fais preuve de bonté envers mon seigneur.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il n''avait pas encore fini de parler que Rebecca sortit, sa cruche sur l''épaule. Elle était la fille de Bethuel, fils de Milca, femme de Nachor, le frère d''Abraham. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'C''était une jeune fille très belle. Elle était vierge, aucun homme n''avait eu de relations avec elle. Elle descendit à la source, remplit sa cruche et remonta. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Le serviteur courut à sa rencontre et dit: «Laisse-moi boire un peu d''eau de ta cruche.» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Elle répondit: «Bois, mon seigneur» et s''empressa de descendre sa cruche sur sa main et de lui donner à boire. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Quand elle eut fini de lui donner à boire, elle dit: «Je puiserai aussi pour tes chameaux, jusqu''à ce qu''ils aient assez bu.» '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Elle s'empressa de vider sa cruche dans l'abreuvoir et courut encore au puits pour puiser. Elle puisa pour tous les chameaux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'L''homme la regardait sans rien dire, pour voir si l''Eternel faisait réussir son voyage ou non. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Quand les chameaux eurent fini de boire, l''homme prit un anneau en or qui pesait 6 grammes, ainsi que deux bracelets en or qui pesaient 120 grammes pour ses poignets, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'puis il dit: «De qui es-tu la fille? Dis-le-moi, je t''en prie. Y a-t-il chez ton père de la place pour passer la nuit?» '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Elle répondit: «Je suis la fille de Bethuel, le fils de Milca et de Nachor.» '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Elle lui dit encore: «Il y a de la paille et du fourrage en abondance chez nous, et aussi de la place pour passer la nuit.» '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alors l''homme s''inclina et adora l''Eternel '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'en disant: «Béni soit l''Eternel, le Dieu de mon seigneur Abraham, qui n''a pas renoncé à sa bonté et à sa fidélité envers mon seigneur! Moi-même, l''Eternel m''a conduit chez la famille de mon seigneur.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'La jeune fille courut raconter cela chez sa mère. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Rebecca avait un frère du nom de Laban. Laban courut dehors vers l''homme, près de la source. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Il avait vu l''anneau et les bracelets aux poignets de sa sœur, et il avait entendu sa sœur Rebecca dire: «Voici comment m''a parlé cet homme.» Il vint donc vers cet homme, toujours près des chameaux, vers la source. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Il lui dit: «Viens, toi qui es béni de l''Eternel! Pourquoi resterais-tu dehors? J''ai préparé la maison et une place pour les chameaux.» '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'L''homme arriva à la maison. Laban fit décharger les chameaux. Il donna de la paille et du fourrage aux chameaux, ainsi que de l''eau pour laver les pieds de l''homme et de ses compagnons. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Puis il lui servit à manger, mais l''homme dit: «Je ne mangerai pas avant d''avoir dit ce que j''ai à dire.» «Parle!» dit Laban.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Alors il dit: «Je suis un serviteur d''Abraham. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'L''Eternel a comblé mon seigneur de bénédictions, si bien qu''il est devenu puissant. Il lui a donné des brebis et des bœufs, de l''argent et de l''or, des serviteurs et des servantes, des chameaux et des ânes. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Sara, la femme de mon seigneur, a donné dans sa vieillesse un fils à mon seigneur et il lui a fait don de tout ce qu''il possède. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Mon seigneur m''a fait prêter serment en disant: ‘Tu ne prendras pas pour mon fils une femme parmi les filles des Cananéens, dont j''habite le pays, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'mais tu iras prendre une femme pour mon fils dans la famille de mon père et dans mon clan.’ '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'J''ai dit à mon seigneur: ‘Peut-être la femme ne voudra-t-elle pas me suivre.’ '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Il m''a répondu: ‘L''Eternel devant qui j''ai marché enverra son ange avec toi et fera réussir ton voyage. Tu prendras pour mon fils une femme du clan et de la famille de mon père. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Tu seras dégagé du serment que tu me fais quand tu seras allé trouver mon clan. Si on ne te l''accorde pas, tu seras dégagé du serment que tu me fais.’ '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Je suis arrivé aujourd''hui à la source et j''ai dit: ‘Eternel, Dieu de mon seigneur Abraham, si tu veux bien faire réussir le voyage que j''accomplis, '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'voici que je me tiens près de la source d''eau. Que la jeune fille qui sortira pour puiser de l''eau, à qui je dirai: Laisse-moi boire un peu d''eau de ta cruche et qui me répondra: '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Bois et je puiserai aussi pour tes chameaux, que cette jeune fille soit la femme que l''Eternel a destinée au fils de mon seigneur!’ '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Avant que j''aie fini de parler en moi-même, Rebecca est sortie, sa cruche sur l''épaule. Elle est descendue à la source et a puisé de l''eau. Je lui ai dit: ‘Donne-moi à boire.’ '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Elle s''est empressée de descendre sa cruche de son épaule et a dit: ‘Bois et je donnerai aussi à boire à tes chameaux.’ J''ai bu et elle a aussi donné à boire à mes chameaux. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Je l''ai interrogée en disant: ‘De qui es-tu la fille?’ Elle a répondu: ‘Je suis la fille de Bethuel, le fils de Nachor et de Milca.’ J''ai mis l''anneau à son nez et les bracelets à ses poignets. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Puis je me suis incliné et j''ai adoré l''Eternel, j''ai béni l''Eternel, le Dieu de mon seigneur Abraham, qui m''a conduit fidèlement afin que je prenne la fille du frère de mon seigneur pour son fils. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Maintenant, si vous voulez faire preuve de bonté et de fidélité envers mon seigneur, déclarez-le-moi. Sinon, dites-le-moi et je m'en irai d'un côté ou de l'autre.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Laban et Bethuel répondirent: «C''est de l''Eternel que cela vient. Nous ne pouvons te parler ni en mal ni en bien. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Voici Rebecca devant toi: emmène-la en repartant. Qu''elle soit la femme du fils de ton seigneur, comme l''Eternel l''a dit.» '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Lorsque le serviteur d''Abraham eut entendu leurs paroles, il se prosterna jusqu''à terre devant l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Le serviteur sortit des objets d''argent, des objets d''or et des vêtements qu''il donna à Rebecca. Il fit aussi de généreux cadeaux à son frère et à sa mère. '
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Puis ils mangèrent et burent, lui et ses compagnons, et ils passèrent la nuit là. Le matin, quand ils furent levés, le serviteur dit: «Laissez-moi repartir chez mon seigneur.» '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Le frère et la mère de Rebecca dirent: «Que la jeune fille reste avec nous quelque temps encore, une dizaine de jours! Ensuite, tu pourras partir.» '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'Il leur répondit: «Ne me retardez pas, puisque l''Eternel a fait réussir mon voyage. Laissez-moi repartir et que j''aille chez mon seigneur.» '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: 'Alors ils répondirent: «Appelons la jeune fille et demandons-lui son avis.» '
  - type: usfm
    marker: v
    metadata:
      v: '58'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: 'Ils appelèrent donc Rebecca et lui dirent: «Veux-tu partir avec cet homme?» Elle répondit: «Oui.» '
  - type: usfm
    marker: v
    metadata:
      v: '59'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'Alors ils laissèrent leur sœur Rebecca et sa nourrice partir avec le serviteur d''Abraham et ses hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '60'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Ils bénirent Rebecca et lui dirent: «Toi qui es notre sœur, deviens l''ancêtre de millions de personnes et que ta descendance possède les villes de ses ennemis!» '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: Rebecca se leva avec ses servantes. Elles montèrent sur les chameaux et suivirent l'homme. C'est ainsi que le serviteur emmena Rebecca et repartit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Quant à Isaac, il était revenu du puits de Lachaï-Roï et habitait dans la région du Néguev. '
  - type: usfm
    marker: v
    metadata:
      v: '63'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'Un soir qu''il était sorti pour méditer dans les champs, il leva les yeux et regarda: voici que des chameaux arrivaient. '
  - type: usfm
    marker: v
    metadata:
      v: '64'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'Rebecca leva aussi les yeux, vit Isaac et descendit de son chameau. '
  - type: usfm
    marker: v
    metadata:
      v: '65'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Elle demanda au serviteur: «Qui est l''homme qui vient dans les champs à notre rencontre?» Le serviteur répondit: «C''est mon seigneur.» Alors elle prit son voile et se couvrit. '
  - type: usfm
    marker: v
    metadata:
      v: '66'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Le serviteur raconta à Isaac tout ce qu''il avait fait. '
  - type: usfm
    marker: v
    metadata:
      v: '67'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: Isaac conduisit Rebecca dans la tente de Sara, sa mère. Il épousa Rebecca. Elle devint sa femme et il l'aima. Ainsi, Isaac fut consolé après la perte de sa mère.
