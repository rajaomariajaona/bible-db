document_id: GEN.24,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Mariage d'Isaac et Rebecca
  - type: text
    content: 'Abraham était vieux, d''un âge avancé. L''Eternel l''avait béni dans tous les domaines. '
  '10':
  - type: text
    content: 'Le serviteur prit dix chameaux parmi ceux de son seigneur et il partit avec tous les biens de son seigneur à sa disposition. Il se leva et se rendit en Mésopotamie, dans la ville de Nachor. '
  '11':
  - type: text
    content: 'Il fit reposer les chameaux sur leurs genoux près d''un puits à l''extérieur de la ville. C''était le soir, le moment où les femmes qui vont puiser de l''eau sortent. '
  '12':
  - type: text
    content: 'Il dit: «Eternel, Dieu de mon seigneur Abraham, donne-moi du succès aujourd''hui et fais preuve de bonté envers mon seigneur Abraham! '
  '13':
  - type: text
    content: 'Voici que je me tiens près de la source d''eau, et les filles des habitants de la ville vont sortir pour puiser de l''eau. '
  '14':
  - type: text
    content: 'Que la jeune fille à laquelle je dirai: ‘Penche ta cruche pour que je boive’ et qui répondra: ‘Bois et je donnerai aussi à boire à tes chameaux’ soit celle que tu as destinée à ton serviteur Isaac! Par là je reconnaîtrai que tu fais preuve de bonté envers mon seigneur.»'
  '15':
  - type: text
    content: 'Il n''avait pas encore fini de parler que Rebecca sortit, sa cruche sur l''épaule. Elle était la fille de Bethuel, fils de Milca, femme de Nachor, le frère d''Abraham. '
  '16':
  - type: text
    content: 'C''était une jeune fille très belle. Elle était vierge, aucun homme n''avait eu de relations avec elle. Elle descendit à la source, remplit sa cruche et remonta. '
  '17':
  - type: text
    content: 'Le serviteur courut à sa rencontre et dit: «Laisse-moi boire un peu d''eau de ta cruche.» '
  '18':
  - type: text
    content: 'Elle répondit: «Bois, mon seigneur» et s''empressa de descendre sa cruche sur sa main et de lui donner à boire. '
  '19':
  - type: text
    content: 'Quand elle eut fini de lui donner à boire, elle dit: «Je puiserai aussi pour tes chameaux, jusqu''à ce qu''ils aient assez bu.» '
  '2':
  - type: text
    content: 'Abraham dit à son plus ancien serviteur, qui était l''intendant de tous ses biens: «Mets ta main sous ma cuisse '
  '20':
  - type: text
    content: Elle s'empressa de vider sa cruche dans l'abreuvoir et courut encore au puits pour puiser. Elle puisa pour tous les chameaux.
  '21':
  - type: text
    content: 'L''homme la regardait sans rien dire, pour voir si l''Eternel faisait réussir son voyage ou non. '
  '22':
  - type: text
    content: 'Quand les chameaux eurent fini de boire, l''homme prit un anneau en or qui pesait 6 grammes, ainsi que deux bracelets en or qui pesaient 120 grammes pour ses poignets, '
  '23':
  - type: text
    content: 'puis il dit: «De qui es-tu la fille? Dis-le-moi, je t''en prie. Y a-t-il chez ton père de la place pour passer la nuit?» '
  '24':
  - type: text
    content: 'Elle répondit: «Je suis la fille de Bethuel, le fils de Milca et de Nachor.» '
  '25':
  - type: text
    content: 'Elle lui dit encore: «Il y a de la paille et du fourrage en abondance chez nous, et aussi de la place pour passer la nuit.» '
  '26':
  - type: text
    content: 'Alors l''homme s''inclina et adora l''Eternel '
  '27':
  - type: text
    content: 'en disant: «Béni soit l''Eternel, le Dieu de mon seigneur Abraham, qui n''a pas renoncé à sa bonté et à sa fidélité envers mon seigneur! Moi-même, l''Eternel m''a conduit chez la famille de mon seigneur.»'
  '28':
  - type: text
    content: 'La jeune fille courut raconter cela chez sa mère. '
  '29':
  - type: text
    content: 'Rebecca avait un frère du nom de Laban. Laban courut dehors vers l''homme, près de la source. '
  '3':
  - type: text
    content: 'et je vais te faire jurer au nom de l''Eternel, le Dieu du ciel et le Dieu de la terre, de ne pas prendre pour mon fils une femme parmi les filles des Cananéens au milieu desquels j''habite, '
  '30':
  - type: text
    content: 'Il avait vu l''anneau et les bracelets aux poignets de sa sœur, et il avait entendu sa sœur Rebecca dire: «Voici comment m''a parlé cet homme.» Il vint donc vers cet homme, toujours près des chameaux, vers la source. '
  '31':
  - type: text
    content: 'Il lui dit: «Viens, toi qui es béni de l''Eternel! Pourquoi resterais-tu dehors? J''ai préparé la maison et une place pour les chameaux.» '
  '32':
  - type: text
    content: 'L''homme arriva à la maison. Laban fit décharger les chameaux. Il donna de la paille et du fourrage aux chameaux, ainsi que de l''eau pour laver les pieds de l''homme et de ses compagnons. '
  '33':
  - type: text
    content: 'Puis il lui servit à manger, mais l''homme dit: «Je ne mangerai pas avant d''avoir dit ce que j''ai à dire.» «Parle!» dit Laban.'
  '34':
  - type: text
    content: 'Alors il dit: «Je suis un serviteur d''Abraham. '
  '35':
  - type: text
    content: 'L''Eternel a comblé mon seigneur de bénédictions, si bien qu''il est devenu puissant. Il lui a donné des brebis et des bœufs, de l''argent et de l''or, des serviteurs et des servantes, des chameaux et des ânes. '
  '36':
  - type: text
    content: 'Sara, la femme de mon seigneur, a donné dans sa vieillesse un fils à mon seigneur et il lui a fait don de tout ce qu''il possède. '
  '37':
  - type: text
    content: 'Mon seigneur m''a fait prêter serment en disant: ‘Tu ne prendras pas pour mon fils une femme parmi les filles des Cananéens, dont j''habite le pays, '
  '38':
  - type: text
    content: 'mais tu iras prendre une femme pour mon fils dans la famille de mon père et dans mon clan.’ '
  '39':
  - type: text
    content: 'J''ai dit à mon seigneur: ‘Peut-être la femme ne voudra-t-elle pas me suivre.’ '
  '4':
  - type: text
    content: 'mais d''aller prendre une femme pour mon fils Isaac dans mon pays et dans ma patrie.» '
  '40':
  - type: text
    content: 'Il m''a répondu: ‘L''Eternel devant qui j''ai marché enverra son ange avec toi et fera réussir ton voyage. Tu prendras pour mon fils une femme du clan et de la famille de mon père. '
  '41':
  - type: text
    content: 'Tu seras dégagé du serment que tu me fais quand tu seras allé trouver mon clan. Si on ne te l''accorde pas, tu seras dégagé du serment que tu me fais.’ '
  '42':
  - type: text
    content: 'Je suis arrivé aujourd''hui à la source et j''ai dit: ‘Eternel, Dieu de mon seigneur Abraham, si tu veux bien faire réussir le voyage que j''accomplis, '
  '43':
  - type: text
    content: 'voici que je me tiens près de la source d''eau. Que la jeune fille qui sortira pour puiser de l''eau, à qui je dirai: Laisse-moi boire un peu d''eau de ta cruche et qui me répondra: '
  '44':
  - type: text
    content: 'Bois et je puiserai aussi pour tes chameaux, que cette jeune fille soit la femme que l''Eternel a destinée au fils de mon seigneur!’ '
  '45':
  - type: text
    content: 'Avant que j''aie fini de parler en moi-même, Rebecca est sortie, sa cruche sur l''épaule. Elle est descendue à la source et a puisé de l''eau. Je lui ai dit: ‘Donne-moi à boire.’ '
  '46':
  - type: text
    content: 'Elle s''est empressée de descendre sa cruche de son épaule et a dit: ‘Bois et je donnerai aussi à boire à tes chameaux.’ J''ai bu et elle a aussi donné à boire à mes chameaux. '
  '47':
  - type: text
    content: 'Je l''ai interrogée en disant: ‘De qui es-tu la fille?’ Elle a répondu: ‘Je suis la fille de Bethuel, le fils de Nachor et de Milca.’ J''ai mis l''anneau à son nez et les bracelets à ses poignets. '
  '48':
  - type: text
    content: 'Puis je me suis incliné et j''ai adoré l''Eternel, j''ai béni l''Eternel, le Dieu de mon seigneur Abraham, qui m''a conduit fidèlement afin que je prenne la fille du frère de mon seigneur pour son fils. '
  '49':
  - type: text
    content: Maintenant, si vous voulez faire preuve de bonté et de fidélité envers mon seigneur, déclarez-le-moi. Sinon, dites-le-moi et je m'en irai d'un côté ou de l'autre.»
  '5':
  - type: text
    content: 'Le serviteur lui répondit: «Peut-être la femme ne voudra-t-elle pas me suivre dans ce pays-ci. Devrai-je conduire ton fils dans le pays d''où tu es sorti?» '
  '50':
  - type: text
    content: 'Laban et Bethuel répondirent: «C''est de l''Eternel que cela vient. Nous ne pouvons te parler ni en mal ni en bien. '
  '51':
  - type: text
    content: 'Voici Rebecca devant toi: emmène-la en repartant. Qu''elle soit la femme du fils de ton seigneur, comme l''Eternel l''a dit.» '
  '52':
  - type: text
    content: 'Lorsque le serviteur d''Abraham eut entendu leurs paroles, il se prosterna jusqu''à terre devant l''Eternel. '
  '53':
  - type: text
    content: 'Le serviteur sortit des objets d''argent, des objets d''or et des vêtements qu''il donna à Rebecca. Il fit aussi de généreux cadeaux à son frère et à sa mère. '
  '54':
  - type: text
    content: 'Puis ils mangèrent et burent, lui et ses compagnons, et ils passèrent la nuit là. Le matin, quand ils furent levés, le serviteur dit: «Laissez-moi repartir chez mon seigneur.» '
  '55':
  - type: text
    content: 'Le frère et la mère de Rebecca dirent: «Que la jeune fille reste avec nous quelque temps encore, une dizaine de jours! Ensuite, tu pourras partir.» '
  '56':
  - type: text
    content: 'Il leur répondit: «Ne me retardez pas, puisque l''Eternel a fait réussir mon voyage. Laissez-moi repartir et que j''aille chez mon seigneur.» '
  '57':
  - type: text
    content: 'Alors ils répondirent: «Appelons la jeune fille et demandons-lui son avis.» '
  '58':
  - type: text
    content: 'Ils appelèrent donc Rebecca et lui dirent: «Veux-tu partir avec cet homme?» Elle répondit: «Oui.» '
  '59':
  - type: text
    content: 'Alors ils laissèrent leur sœur Rebecca et sa nourrice partir avec le serviteur d''Abraham et ses hommes. '
  '6':
  - type: text
    content: 'Abraham lui dit: «Garde-toi bien d''y conduire mon fils! '
  '60':
  - type: text
    content: 'Ils bénirent Rebecca et lui dirent: «Toi qui es notre sœur, deviens l''ancêtre de millions de personnes et que ta descendance possède les villes de ses ennemis!» '
  '61':
  - type: text
    content: Rebecca se leva avec ses servantes. Elles montèrent sur les chameaux et suivirent l'homme. C'est ainsi que le serviteur emmena Rebecca et repartit.
  '62':
  - type: text
    content: 'Quant à Isaac, il était revenu du puits de Lachaï-Roï et habitait dans la région du Néguev. '
  '63':
  - type: text
    content: 'Un soir qu''il était sorti pour méditer dans les champs, il leva les yeux et regarda: voici que des chameaux arrivaient. '
  '64':
  - type: text
    content: 'Rebecca leva aussi les yeux, vit Isaac et descendit de son chameau. '
  '65':
  - type: text
    content: 'Elle demanda au serviteur: «Qui est l''homme qui vient dans les champs à notre rencontre?» Le serviteur répondit: «C''est mon seigneur.» Alors elle prit son voile et se couvrit. '
  '66':
  - type: text
    content: 'Le serviteur raconta à Isaac tout ce qu''il avait fait. '
  '67':
  - type: text
    content: Isaac conduisit Rebecca dans la tente de Sara, sa mère. Il épousa Rebecca. Elle devint sa femme et il l'aima. Ainsi, Isaac fut consolé après la perte de sa mère.
  '7':
  - type: text
    content: 'L''Eternel, le Dieu du ciel, qui m''a fait quitter ma famille et ma patrie, qui m''a parlé et qui m''a juré: ‘Je donnerai ce pays à ta descendance’, enverra lui-même son ange devant toi. C''est là que tu prendras une femme pour mon fils. '
  '8':
  - type: text
    content: 'Si la femme ne veut pas te suivre, tu seras dégagé du serment que je te fais faire. Seulement, tu n''y conduiras pas mon fils.» '
  '9':
  - type: text
    content: Le serviteur mit sa main sous la cuisse de son seigneur Abraham et lui jura de se conformer à ces paroles.
