document_id: ZEC.12,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Délivrance et purification de Jérusalem
  - type: text
    content: Message, parole de l'Eternel sur Israël, déclaration de l'Eternel qui a déployé le ciel et fondé la terre, et qui a formé l'esprit de l'homme en lui.
  '10':
  - type: text
    content: Alors je déverserai sur la famille de David et sur les habitants de Jérusalem un esprit de grâce et de supplication, et *ils tourneront les regards vers moi, celui qu'ils ont transpercé
  - type: note
    content: 'Ils tourneront… transpercé: cité en Jean 19.37 à propos de Jésus.'
  - type: text
    content: . Ils pleureront sur lui comme on pleure sur un fils unique, ils pleureront amèrement sur lui comme on pleure sur un premier-né.
  '11':
  - type: text
    content: 'Ce jour-là, le deuil sera grand à Jérusalem, comme le deuil d''Hadad-Rimmon dans la vallée de Meguiddo. '
  '12':
  - type: text
    content: 'Le pays sera dans le deuil, chaque clan à part: le clan de la famille de David à part et les femmes à part, le clan de la famille de Nathan à part et les femmes à part, '
  '13':
  - type: text
    content: 'le clan de la famille de Lévi à part et les femmes à part, le clan de Shimeï à part et les femmes à part, '
  '14':
  - type: text
    content: et tous les autres clans chacun à part et leurs femmes à part.
  '2':
  - type: text
    content: 'Je ferai de Jérusalem une coupe enivrante pour tous les peuples environnants. Il en ira de même pour Juda lors du siège de Jérusalem. '
  '3':
  - type: text
    content: Ce jour-là, je ferai de Jérusalem une pierre lourde pour tous les peuples; tous ceux qui la soulèveront s'y écorcheront, et toutes les nations de la terre se rassembleront contre elle.
  '4':
  - type: text
    content: Ce jour-là, déclare l'Eternel, je frapperai tous les chevaux d'épouvante, et leurs cavaliers de folie. J'aurai les yeux ouverts sur la communauté de Juda, mais je frapperai d'aveuglement tous les chevaux des peuples.
  '5':
  - type: text
    content: 'Les chefs de Juda diront dans leur cœur: «Les habitants de Jérusalem sont notre force par l''Eternel, le maître de l''univers, leur Dieu.» '
  '6':
  - type: text
    content: Ce jour-là, je rendrai les chefs de Juda pareils à un foyer allumé parmi des arbres, à une torche enflammée parmi des épis. Ils dévoreront à droite et à gauche tous les peuples environnants, et Jérusalem restera à sa place, à Jérusalem.
  '7':
  - type: text
    content: 'L''Eternel sauvera d''abord les tentes de Juda afin que la fierté de la famille de David, la fierté des habitants de Jérusalem ne s''élève pas au-dessus de Juda. '
  '8':
  - type: text
    content: Ce jour-là, l'Eternel protégera les habitants de Jérusalem et le plus faible parmi eux sera, ce jour-là, pareil à David, la famille de David sera pareille à Dieu, pareille à l'ange de l'Eternel devant eux.
  '9':
  - type: text
    content: Ce jour-là, je travaillerai à détruire toutes les nations qui viendront attaquer Jérusalem.
