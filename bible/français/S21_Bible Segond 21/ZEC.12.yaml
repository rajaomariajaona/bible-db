document_id: ZEC.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Délivrance et purification de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Message, parole de l'Eternel sur Israël, déclaration de l'Eternel qui a déployé le ciel et fondé la terre, et qui a formé l'esprit de l'homme en lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je ferai de Jérusalem une coupe enivrante pour tous les peuples environnants. Il en ira de même pour Juda lors du siège de Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ce jour-là, je ferai de Jérusalem une pierre lourde pour tous les peuples; tous ceux qui la soulèveront s'y écorcheront, et toutes les nations de la terre se rassembleront contre elle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ce jour-là, déclare l'Eternel, je frapperai tous les chevaux d'épouvante, et leurs cavaliers de folie. J'aurai les yeux ouverts sur la communauté de Juda, mais je frapperai d'aveuglement tous les chevaux des peuples.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les chefs de Juda diront dans leur cœur: «Les habitants de Jérusalem sont notre force par l''Eternel, le maître de l''univers, leur Dieu.» '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ce jour-là, je rendrai les chefs de Juda pareils à un foyer allumé parmi des arbres, à une torche enflammée parmi des épis. Ils dévoreront à droite et à gauche tous les peuples environnants, et Jérusalem restera à sa place, à Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L''Eternel sauvera d''abord les tentes de Juda afin que la fierté de la famille de David, la fierté des habitants de Jérusalem ne s''élève pas au-dessus de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ce jour-là, l'Eternel protégera les habitants de Jérusalem et le plus faible parmi eux sera, ce jour-là, pareil à David, la famille de David sera pareille à Dieu, pareille à l'ange de l'Eternel devant eux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ce jour-là, je travaillerai à détruire toutes les nations qui viendront attaquer Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Alors je déverserai sur la famille de David et sur les habitants de Jérusalem un esprit de grâce et de supplication, et *ils tourneront les regards vers moi, celui qu'ils ont transpercé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ils tourneront… transpercé: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jean 19.37
      metadata:
        usfm: JHN.19.37
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' à propos de Jésus.'
    marker-yv: yv-n
  - type: text
    text: . Ils pleureront sur lui comme on pleure sur un fils unique, ils pleureront amèrement sur lui comme on pleure sur un premier-né.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ce jour-là, le deuil sera grand à Jérusalem, comme le deuil d''Hadad-Rimmon dans la vallée de Meguiddo. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le pays sera dans le deuil, chaque clan à part: le clan de la famille de David à part et les femmes à part, le clan de la famille de Nathan à part et les femmes à part, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'le clan de la famille de Lévi à part et les femmes à part, le clan de Shimeï à part et les femmes à part, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: et tous les autres clans chacun à part et leurs femmes à part.
