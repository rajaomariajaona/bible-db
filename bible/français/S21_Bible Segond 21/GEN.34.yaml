document_id: GEN.34
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dina, la fille que Léa avait donnée à Jacob, sortit pour voir les filles du pays. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Sichem, fils de Hamor, le prince du pays, la vit. Il l''enleva et coucha avec elle, il la viola. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il s''attacha à Dina, la fille de Jacob; il aima cette jeune fille et parla à son cœur. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Sichem dit alors à son père Hamor: «Donne-moi cette jeune fille pour femme.» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Jacob apprit qu'il avait déshonoré sa fille Dina. Comme ses fils étaient aux champs avec son troupeau, il garda le silence jusqu'à leur retour.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Hamor, le père de Sichem, alla trouver Jacob pour lui parler. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les fils de Jacob revenaient des champs lorsqu''ils apprirent la nouvelle. Ces hommes furent irrités et se mirent dans une grande colère parce que Sichem avait commis un acte odieux contre Israël: il avait couché avec la fille de Jacob, ce qui n''aurait pas dû se faire. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Hamor leur tint ce discours: «Mon fils Sichem est tombé amoureux de votre fille. Donnez-la-lui pour femme, je vous en prie. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Alliez-vous par mariage avec nous! Vous nous donnerez vos filles et vous prendrez les nôtres pour vous. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Vous habiterez avec nous et le pays sera à votre disposition. Restez pour y faire du commerce et y acquérir des propriétés.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Sichem dit au père et aux frères de Dina: «Si seulement je trouve grâce à vos yeux, je donnerai ce que vous me direz. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Réclamez-moi une forte dot et beaucoup de cadeaux, et je donnerai ce que vous me direz, mais accordez-moi la jeune fille pour femme.» '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Les fils de Jacob répondirent en parlant avec ruse à Sichem et à son père Hamor, parce que Sichem avait déshonoré leur sœur Dina. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils leur dirent: «Donner notre sœur à un homme incirconcis, c''est quelque chose que nous ne pouvons pas faire: ce serait une honte pour nous. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nous ne donnerons notre accord qu''à la condition que vous deveniez pareils à nous et que tout homme parmi vous soit circoncis. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Alors nous vous donnerons nos filles et nous prendrons les vôtres pour nous, nous habiterons avec vous et nous formerons un seul peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: En revanche, si vous ne voulez pas nous écouter et vous faire circoncire, nous prendrons notre fille et partirons.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Hamor et son fils Sichem approuvèrent ces paroles. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Le jeune homme ne tarda pas à faire ce qui avait été dit, car il aimait la fille de Jacob. Il était estimé de tous chez son père.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hamor et son fils Sichem se rendirent à la porte de leur ville et dirent à leurs concitoyens: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '«Ces hommes ont des intentions paisibles envers nous. Qu''ils restent dans le pays et qu''ils y fassent du commerce! Le pays est assez vaste pour eux. Nous prendrons leurs filles pour femmes et nous leur donnerons nos filles. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Cependant, ces hommes ne seront d''accord d''habiter avec nous pour former un seul peuple qu''à la condition que tout homme parmi nous soit circoncis, tout comme ils sont eux-mêmes circoncis. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Leurs troupeaux, leurs biens et tout leur bétail ne nous appartiendront-ils pas? Acceptons seulement leur condition pour qu'ils restent avec nous!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tous ceux qui étaient venus à la porte de la ville écoutèrent Hamor et son fils Sichem. Tous les hommes se firent circoncire, tous ceux qui étaient venus à la porte de la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Trois jours plus tard, alors qu''ils étaient souffrants, Siméon et Lévi, deux fils de Jacob frères de Dina, prirent chacun leur épée, surprirent la ville qui se croyait en sécurité et tuèrent tous les hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ils passèrent aussi au fil de l''épée Hamor et son fils Sichem. Ils enlevèrent Dina de la maison de Sichem et sortirent. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Les fils de Jacob se jetèrent sur les morts et pillèrent la ville parce qu''on avait déshonoré leur sœur. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ils prirent leurs troupeaux, leurs bœufs et leurs ânes, ce qui était dans la ville et ce qui était dans les champs. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Ils emmenèrent en guise de butin toutes leurs richesses, leurs enfants et leurs femmes, ainsi que tout ce qui se trouvait dans les maisons.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Jacob dit alors à Siméon et à Lévi: «Vous me troublez en provoquant le dégoût des habitants du pays, des Cananéens et des Phéréziens, envers moi. Je n''ai qu''un petit nombre d''hommes. Ils se rassembleront contre moi, me frapperont et je serai détruit avec ma famille.» '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ils répondirent: «Peut-on traiter notre sœur comme une prostituée?»'
