document_id: JDG.3
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici les nations que l''Eternel laissa tranquilles pour mettre à travers elles les Israélites à l''épreuve, tous ceux qui n''avaient pas connu les guerres de conquête de Canaan. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '– Il voulait seulement que les générations des Israélites, ceux qui ne l''avaient pas connue auparavant, connaissent et apprennent la guerre. – '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ces nations étaient les suivantes: les cinq princes des Philistins, tous les Cananéens, les Sidoniens et les Héviens qui habitaient la région montagneuse du Liban, depuis le mont Baal-Hermon jusqu''à l''entrée de Hamath. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Elles servirent à mettre les Israélites à l''épreuve, afin que l''Eternel sache s''ils obéiraient aux commandements qu''il avait prescrits à leurs ancêtres par l''intermédiaire de Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les Israélites habitèrent au milieu des Cananéens, des Hittites, des Amoréens, des Phéréziens, des Héviens et des Jébusiens. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils prirent leurs filles pour femmes, ils donnèrent leurs propres filles à leurs fils, et ils servirent leurs dieux.
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Les juges et leurs exploits
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 3.7–16.31
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Victoire d'Othniel sur le roi de Mésopotamie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les Israélites firent ce qui déplaît à l''Eternel: ils oublièrent l''Eternel et servirent les Baals et les idoles. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: La colère de l'Eternel s'enflamma alors contre Israël et il les vendit à Cushan-Risheathaïm, le roi de Mésopotamie, de sorte qu'ils lui furent soumis pendant 8 ans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Les Israélites crièrent à l''Eternel et l''Eternel fit surgir pour eux un libérateur qui les délivra. C''était Othniel, fils de Kenaz, le frère cadet de Caleb. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L''Esprit de l''Eternel reposa sur lui. Il devint juge en Israël et partit en guerre. L''Eternel livra entre ses mains Cushan-Risheathaïm, le roi de Mésopotamie, et il exerça une puissante domination sur Cushan-Risheathaïm. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le pays fut en paix pendant 40 ans. Puis Othniel, fils de Kenaz, mourut.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Victoire d'Ehud sur les Moabites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les Israélites firent encore ce qui déplaît à l''Eternel et l''Eternel donna de la force à Eglon, le roi de Moab, contre Israël. Cela arriva parce qu''ils avaient fait ce qui déplaît à l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Eglon rallia les Ammonites et les Amalécites et se mit en marche. Il battit Israël et ils s''emparèrent de la ville des palmiers. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les Israélites furent pendant 18 ans soumis à Eglon, le roi de Moab.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les Israélites crièrent à l''Eternel, et l''Eternel fit surgir pour eux un libérateur. C''était Ehud, fils de Guéra, un Benjaminite qui était gaucher. Les Israélites envoyèrent par son intermédiaire un cadeau à Eglon, le roi de Moab. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ehud se fabriqua une épée à deux tranchants, longue de 50 centimètres, et il la mit à sa ceinture sous ses vêtements, le long de sa cuisse droite. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il offrit le cadeau à Eglon, roi de Moab. Or Eglon était un homme très gros. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Lorsqu''il eut fini d''offrir le cadeau, Ehud renvoya les gens qui l''avaient apporté. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il revint lui-même sur ses pas, depuis les statues qui se trouvent près de Guilgal, et il dit: «Roi, j''ai un message secret à te dire.» Le roi réclama du calme, et tous ceux qui étaient à ses côtés sortirent. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ehud s''approcha de lui alors qu''il était assis seul dans sa chambre d''été et dit: «J''ai un message de Dieu pour toi.» Eglon se leva de son siège. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Alors Ehud avança la main gauche, tira l''épée de son côté droit et la lui enfonça dans le ventre. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: La poignée elle-même pénétra après la lame et la graisse se referma autour de la lame. En effet, il ne retira pas l'épée du ventre d'Eglon. Puis il sortit par-derrière.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ehud sortit donc par le portique, ferma sur lui les portes de la chambre à l''étage et tira le verrou. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Quand il fut sorti, les serviteurs du roi vinrent regarder: les portes de la chambre étaient verrouillées. Ils se dirent: «Le roi fait sans doute ses besoins dans la chambre d''été.» '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ils attendirent longtemps. Comme le roi n''ouvrait toujours pas les portes de la chambre, ils prirent la clé et l''ouvrirent: leur maître était mort, étendu par terre. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Pendant qu''ils prenaient ainsi du retard, Ehud s''était enfui, avait dépassé les statues et se sauvait à Séïra. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dès son arrivée, il sonna de la trompette dans la région montagneuse d''Ephraïm. Les Israélites descendirent avec lui de la montagne et il se mit à leur tête. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Il leur dit: «Suivez-moi, car l''Eternel a livré les Moabites, vos ennemis, entre vos mains.» Ils descendirent à sa suite, s''emparèrent des gués du Jourdain qui se trouvent en face de Moab et n''y laissèrent passer personne. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ils battirent à cette occasion environ 10''000 Moabites, tous robustes, tous vaillants. Il n''y eut aucun rescapé. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ce jour-là, Moab subit la domination d'Israël. Et le pays fut en paix pendant 80 ans.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Victoire de Shamgar sur les Philistins
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Après Ehud, il y eut Shamgar, fils d'Anath. Il battit 600 Philistins avec un aiguillon à bœufs. Lui aussi fut un libérateur d'Israël.
