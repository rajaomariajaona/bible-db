document_id: JDG.3,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Voici les nations que l''Eternel laissa tranquilles pour mettre à travers elles les Israélites à l''épreuve, tous ceux qui n''avaient pas connu les guerres de conquête de Canaan. '
  '10':
  - type: text
    content: 'L''Esprit de l''Eternel reposa sur lui. Il devint juge en Israël et partit en guerre. L''Eternel livra entre ses mains Cushan-Risheathaïm, le roi de Mésopotamie, et il exerça une puissante domination sur Cushan-Risheathaïm. '
  '11':
  - type: text
    content: Le pays fut en paix pendant 40 ans. Puis Othniel, fils de Kenaz, mourut.
  - type: heading
    content: Victoire d'Ehud sur les Moabites
  '12':
  - type: text
    content: 'Les Israélites firent encore ce qui déplaît à l''Eternel et l''Eternel donna de la force à Eglon, le roi de Moab, contre Israël. Cela arriva parce qu''ils avaient fait ce qui déplaît à l''Eternel. '
  '13':
  - type: text
    content: 'Eglon rallia les Ammonites et les Amalécites et se mit en marche. Il battit Israël et ils s''emparèrent de la ville des palmiers. '
  '14':
  - type: text
    content: Les Israélites furent pendant 18 ans soumis à Eglon, le roi de Moab.
  '15':
  - type: text
    content: 'Les Israélites crièrent à l''Eternel, et l''Eternel fit surgir pour eux un libérateur. C''était Ehud, fils de Guéra, un Benjaminite qui était gaucher. Les Israélites envoyèrent par son intermédiaire un cadeau à Eglon, le roi de Moab. '
  '16':
  - type: text
    content: 'Ehud se fabriqua une épée à deux tranchants, longue de 50 centimètres, et il la mit à sa ceinture sous ses vêtements, le long de sa cuisse droite. '
  '17':
  - type: text
    content: 'Il offrit le cadeau à Eglon, roi de Moab. Or Eglon était un homme très gros. '
  '18':
  - type: text
    content: 'Lorsqu''il eut fini d''offrir le cadeau, Ehud renvoya les gens qui l''avaient apporté. '
  '19':
  - type: text
    content: 'Il revint lui-même sur ses pas, depuis les statues qui se trouvent près de Guilgal, et il dit: «Roi, j''ai un message secret à te dire.» Le roi réclama du calme, et tous ceux qui étaient à ses côtés sortirent. '
  '2':
  - type: text
    content: '– Il voulait seulement que les générations des Israélites, ceux qui ne l''avaient pas connue auparavant, connaissent et apprennent la guerre. – '
  '20':
  - type: text
    content: 'Ehud s''approcha de lui alors qu''il était assis seul dans sa chambre d''été et dit: «J''ai un message de Dieu pour toi.» Eglon se leva de son siège. '
  '21':
  - type: text
    content: 'Alors Ehud avança la main gauche, tira l''épée de son côté droit et la lui enfonça dans le ventre. '
  '22':
  - type: text
    content: La poignée elle-même pénétra après la lame et la graisse se referma autour de la lame. En effet, il ne retira pas l'épée du ventre d'Eglon. Puis il sortit par-derrière.
  '23':
  - type: text
    content: 'Ehud sortit donc par le portique, ferma sur lui les portes de la chambre à l''étage et tira le verrou. '
  '24':
  - type: text
    content: 'Quand il fut sorti, les serviteurs du roi vinrent regarder: les portes de la chambre étaient verrouillées. Ils se dirent: «Le roi fait sans doute ses besoins dans la chambre d''été.» '
  '25':
  - type: text
    content: 'Ils attendirent longtemps. Comme le roi n''ouvrait toujours pas les portes de la chambre, ils prirent la clé et l''ouvrirent: leur maître était mort, étendu par terre. '
  '26':
  - type: text
    content: 'Pendant qu''ils prenaient ainsi du retard, Ehud s''était enfui, avait dépassé les statues et se sauvait à Séïra. '
  '27':
  - type: text
    content: 'Dès son arrivée, il sonna de la trompette dans la région montagneuse d''Ephraïm. Les Israélites descendirent avec lui de la montagne et il se mit à leur tête. '
  '28':
  - type: text
    content: 'Il leur dit: «Suivez-moi, car l''Eternel a livré les Moabites, vos ennemis, entre vos mains.» Ils descendirent à sa suite, s''emparèrent des gués du Jourdain qui se trouvent en face de Moab et n''y laissèrent passer personne. '
  '29':
  - type: text
    content: 'Ils battirent à cette occasion environ 10''000 Moabites, tous robustes, tous vaillants. Il n''y eut aucun rescapé. '
  '3':
  - type: text
    content: 'Ces nations étaient les suivantes: les cinq princes des Philistins, tous les Cananéens, les Sidoniens et les Héviens qui habitaient la région montagneuse du Liban, depuis le mont Baal-Hermon jusqu''à l''entrée de Hamath. '
  '30':
  - type: text
    content: Ce jour-là, Moab subit la domination d'Israël. Et le pays fut en paix pendant 80 ans.
  - type: heading
    content: Victoire de Shamgar sur les Philistins
  '31':
  - type: text
    content: Après Ehud, il y eut Shamgar, fils d'Anath. Il battit 600 Philistins avec un aiguillon à bœufs. Lui aussi fut un libérateur d'Israël.
  '4':
  - type: text
    content: 'Elles servirent à mettre les Israélites à l''épreuve, afin que l''Eternel sache s''ils obéiraient aux commandements qu''il avait prescrits à leurs ancêtres par l''intermédiaire de Moïse. '
  '5':
  - type: text
    content: 'Les Israélites habitèrent au milieu des Cananéens, des Hittites, des Amoréens, des Phéréziens, des Héviens et des Jébusiens. '
  '6':
  - type: text
    content: Ils prirent leurs filles pour femmes, ils donnèrent leurs propres filles à leurs fils, et ils servirent leurs dieux.
  - type: heading
    content: Les juges et leurs exploits
  - type: heading
    content: 3.7–16.31
  - type: heading
    content: Victoire d'Othniel sur le roi de Mésopotamie
  '7':
  - type: text
    content: 'Les Israélites firent ce qui déplaît à l''Eternel: ils oublièrent l''Eternel et servirent les Baals et les idoles. '
  '8':
  - type: text
    content: La colère de l'Eternel s'enflamma alors contre Israël et il les vendit à Cushan-Risheathaïm, le roi de Mésopotamie, de sorte qu'ils lui furent soumis pendant 8 ans.
  '9':
  - type: text
    content: 'Les Israélites crièrent à l''Eternel et l''Eternel fit surgir pour eux un libérateur qui les délivra. C''était Othniel, fils de Kenaz, le frère cadet de Caleb. '
