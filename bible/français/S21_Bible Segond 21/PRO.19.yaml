document_id: PRO.19,152
type_code: fra
verses:
  '1':
  - type: text
    content: Mieux vaut le pauvre qui marche dans l'intégrité
  - type: text
    content: que l'homme stupide aux lèvres fausses.
  '10':
  - type: text
    content: Il ne convient pas qu'un homme stupide vive dans les délices,
  - type: text
    content: encore moins qu'un esclave domine sur des chefs.
  '11':
  - type: text
    content: L'homme avisé est lent à la colère,
  - type: text
    content: il met sa gloire à passer par-dessus une offense.
  '12':
  - type: text
    content: La colère du roi est comme le rugissement d'un lion,
  - type: text
    content: et sa faveur comme la rosée sur l'herbe.
  '13':
  - type: text
    content: Un fils stupide est une calamité pour son père,
  - type: text
    content: et les querelles d'une femme sont une gouttière sans fin.
  '14':
  - type: text
    content: On peut hériter des parents une maison et des richesses,
  - type: text
    content: mais une femme prudente est un don de l'Eternel.
  '15':
  - type: text
    content: La paresse fait tomber dans un profond sommeil,
  - type: text
    content: et l'homme nonchalant connaîtra la faim.
  '16':
  - type: text
    content: Celui qui garde le commandement se garde lui-même;
  - type: text
    content: celui qui ne veille pas sur sa conduite mourra.
  '17':
  - type: text
    content: Celui qui accorde une faveur au pauvre prête à l'Eternel,
  - type: text
    content: qui lui rendra son bienfait.
  '18':
  - type: text
    content: Corrige ton fils, car il y a encore de l'espoir.
  - type: text
    content: Ne désire pas le faire mourir!
  '19':
  - type: text
    content: Celui que la colère emporte doit subir une sanction.
  - type: text
    content: Si tu la lui épargnes, tu l'encourages à recommencer.
  '2':
  - type: text
    content: Le manque de connaissance n'est bon pour personne,
  - type: text
    content: et celui qui précipite ses pas tombe dans le péché.
  '20':
  - type: text
    content: Ecoute les conseils et accepte l'instruction!
  - type: text
    content: Ainsi tu seras sage dans la suite de ta vie.
  '21':
  - type: text
    content: Il y a dans le cœur de l'homme beaucoup de projets,
  - type: text
    content: mais c'est le plan de l'Eternel qui s'accomplit.
  '22':
  - type: text
    content: Ce qui fait le charme d'un homme, c'est sa bonté.
  - type: text
    content: Mieux vaut un pauvre qu'un menteur.
  '23':
  - type: text
    content: La crainte de l'Eternel mène à la vie;
  - type: text
    content: on passe la nuit rassasié, sans être visité par le malheur.
  '24':
  - type: text
    content: Le paresseux plonge sa main dans le plat,
  - type: text
    content: et il ne la ramène même pas à sa bouche.
  '25':
  - type: text
    content: Frappe le moqueur, et celui qui manque d'expérience se montrera prudent; r
  - type: text
    content: eprends l'homme intelligent, il comprendra alors ce qu'est la connaissance.
  '26':
  - type: text
    content: Celui qui ruine son père et qui fait fuir sa mère
  - type: text
    content: est un fils qui fait honte, on rougit de lui.
  '27':
  - type: text
    content: Arrête, mon fils, d'écouter l'instruction,
  - type: text
    content: si c'est pour t'éloigner des paroles de la connaissance!
  '28':
  - type: text
    content: Un témoin sans valeur se moque du droit
  - type: text
    content: et la bouche des méchants est avide d'injustice.
  '29':
  - type: text
    content: Les jugements sont prêts pour les moqueurs,
  - type: text
    content: et les coups pour le dos des hommes stupides.
  '3':
  - type: text
    content: C'est la folie de l'homme qui pervertit sa voie,
  - type: text
    content: mais c'est contre l'Eternel que son cœur s'irrite.
  '4':
  - type: text
    content: La richesse procure un grand nombre d'amis,
  - type: text
    content: alors que le faible se retrouve séparé de son ami.
  '5':
  - type: text
    content: Le faux témoin ne restera pas impuni,
  - type: text
    content: celui qui dit des mensonges n'échappera pas à la sanction.
  '6':
  - type: text
    content: Ils sont nombreux, ceux qui flattent l'homme généreux.
  - type: text
    content: Tous sont les amis de celui qui fait des cadeaux.
  '7':
  - type: text
    content: Si tous les frères du pauvre le détestent,
  - type: text
    content: ses amis s'éloigneront d'autant plus volontiers de lui.
  - type: text
    content: Il aura beau les poursuivre de ses paroles, ils auront disparu.
  '8':
  - type: text
    content: Celui qui acquiert du bon sens s'aime lui-même;
  - type: text
    content: celui qui garde l'intelligence trouve le bonheur.
  '9':
  - type: text
    content: Le faux témoin ne restera pas impuni,
  - type: text
    content: celui qui dit des mensonges va à sa perte.
