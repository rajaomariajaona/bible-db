document_id: PRO.19,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mieux vaut le pauvre qui marche dans l'intégrité
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que l'homme stupide aux lèvres fausses.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il ne convient pas qu'un homme stupide vive dans les délices,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: encore moins qu'un esclave domine sur des chefs.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'homme avisé est lent à la colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il met sa gloire à passer par-dessus une offense.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La colère du roi est comme le rugissement d'un lion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sa faveur comme la rosée sur l'herbe.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un fils stupide est une calamité pour son père,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les querelles d'une femme sont une gouttière sans fin.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On peut hériter des parents une maison et des richesses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais une femme prudente est un don de l'Eternel.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La paresse fait tomber dans un profond sommeil,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'homme nonchalant connaîtra la faim.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui garde le commandement se garde lui-même;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui ne veille pas sur sa conduite mourra.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui accorde une faveur au pauvre prête à l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui lui rendra son bienfait.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Corrige ton fils, car il y a encore de l'espoir.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne désire pas le faire mourir!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui que la colère emporte doit subir une sanction.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu la lui épargnes, tu l'encourages à recommencer.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le manque de connaissance n'est bon pour personne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et celui qui précipite ses pas tombe dans le péché.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoute les conseils et accepte l'instruction!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi tu seras sage dans la suite de ta vie.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il y a dans le cœur de l'homme beaucoup de projets,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais c'est le plan de l'Eternel qui s'accomplit.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce qui fait le charme d'un homme, c'est sa bonté.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mieux vaut un pauvre qu'un menteur.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La crainte de l'Eternel mène à la vie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on passe la nuit rassasié, sans être visité par le malheur.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le paresseux plonge sa main dans le plat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il ne la ramène même pas à sa bouche.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Frappe le moqueur, et celui qui manque d'expérience se montrera prudent; r
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eprends l'homme intelligent, il comprendra alors ce qu'est la connaissance.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui ruine son père et qui fait fuir sa mère
  - type: usfm
    marker: q1
    children:
    - type: text
      text: est un fils qui fait honte, on rougit de lui.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Arrête, mon fils, d'écouter l'instruction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si c'est pour t'éloigner des paroles de la connaissance!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un témoin sans valeur se moque du droit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la bouche des méchants est avide d'injustice.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les jugements sont prêts pour les moqueurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les coups pour le dos des hommes stupides.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est la folie de l'homme qui pervertit sa voie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais c'est contre l'Eternel que son cœur s'irrite.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La richesse procure un grand nombre d'amis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors que le faible se retrouve séparé de son ami.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le faux témoin ne restera pas impuni,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui dit des mensonges n'échappera pas à la sanction.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont nombreux, ceux qui flattent l'homme généreux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous sont les amis de celui qui fait des cadeaux.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tous les frères du pauvre le détestent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses amis s'éloigneront d'autant plus volontiers de lui.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il aura beau les poursuivre de ses paroles, ils auront disparu.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui acquiert du bon sens s'aime lui-même;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui garde l'intelligence trouve le bonheur.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le faux témoin ne restera pas impuni,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui dit des mensonges va à sa perte.
