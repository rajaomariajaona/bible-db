document_id: PRO.19
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mieux vaut le pauvre qui marche dans l'intégrité
- type: usfm
  marker: q1
  children:
  - type: text
    text: que l'homme stupide aux lèvres fausses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Le manque de connaissance n'est bon pour personne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celui qui précipite ses pas tombe dans le péché.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C'est la folie de l'homme qui pervertit sa voie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais c'est contre l'Eternel que son cœur s'irrite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: La richesse procure un grand nombre d'amis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors que le faible se retrouve séparé de son ami.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Le faux témoin ne restera pas impuni,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui dit des mensonges n'échappera pas à la sanction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils sont nombreux, ceux qui flattent l'homme généreux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tous sont les amis de celui qui fait des cadeaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Si tous les frères du pauvre le détestent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses amis s'éloigneront d'autant plus volontiers de lui.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il aura beau les poursuivre de ses paroles, ils auront disparu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Celui qui acquiert du bon sens s'aime lui-même;
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui garde l'intelligence trouve le bonheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Le faux témoin ne restera pas impuni,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui dit des mensonges va à sa perte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il ne convient pas qu'un homme stupide vive dans les délices,
- type: usfm
  marker: q1
  children:
  - type: text
    text: encore moins qu'un esclave domine sur des chefs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L'homme avisé est lent à la colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il met sa gloire à passer par-dessus une offense.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: La colère du roi est comme le rugissement d'un lion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa faveur comme la rosée sur l'herbe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Un fils stupide est une calamité pour son père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les querelles d'une femme sont une gouttière sans fin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: On peut hériter des parents une maison et des richesses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais une femme prudente est un don de l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: La paresse fait tomber dans un profond sommeil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'homme nonchalant connaîtra la faim.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Celui qui garde le commandement se garde lui-même;
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui ne veille pas sur sa conduite mourra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Celui qui accorde une faveur au pauvre prête à l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui lui rendra son bienfait.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Corrige ton fils, car il y a encore de l'espoir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne désire pas le faire mourir!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Celui que la colère emporte doit subir une sanction.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si tu la lui épargnes, tu l'encourages à recommencer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ecoute les conseils et accepte l'instruction!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ainsi tu seras sage dans la suite de ta vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Il y a dans le cœur de l'homme beaucoup de projets,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais c'est le plan de l'Eternel qui s'accomplit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ce qui fait le charme d'un homme, c'est sa bonté.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mieux vaut un pauvre qu'un menteur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: La crainte de l'Eternel mène à la vie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: on passe la nuit rassasié, sans être visité par le malheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Le paresseux plonge sa main dans le plat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il ne la ramène même pas à sa bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Frappe le moqueur, et celui qui manque d'expérience se montrera prudent; r
- type: usfm
  marker: q1
  children:
  - type: text
    text: eprends l'homme intelligent, il comprendra alors ce qu'est la connaissance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Celui qui ruine son père et qui fait fuir sa mère
- type: usfm
  marker: q1
  children:
  - type: text
    text: est un fils qui fait honte, on rougit de lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Arrête, mon fils, d'écouter l'instruction,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si c'est pour t'éloigner des paroles de la connaissance!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Un témoin sans valeur se moque du droit
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la bouche des méchants est avide d'injustice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Les jugements sont prêts pour les moqueurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les coups pour le dos des hommes stupides.
