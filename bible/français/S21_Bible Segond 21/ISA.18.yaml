document_id: ISA.18,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie sur l'Ethiopie
  - type: text
    content: Malheur à toi, pays des grillons ailés
  - type: text
    content: situé de l'autre côté des fleuves de l'Ethiopie,
  '2':
  - type: text
    content: toi qui envoies des messagers par mer,
  - type: text
    content: dans des embarcations légères qui flottent sur l'eau!
  - type: text
    content: Allez donc, messagers rapides, trouver la nation grande et glabre,
  - type: text
    content: le peuple redouté bien au-delà de ses frontières,
  - type: text
    content: la nation puissante qui écrase tout
  - type: text
    content: et dont le territoire est traversé par des fleuves!
  '3':
  - type: text
    content: Vous tous, habitants du monde, vous qui peuplez la terre,
  - type: text
    content: lorsque l'étendard sera dressé sur les montagnes, regardez!
  - type: text
    content: Lorsque la trompette sonnera, écoutez!
  '4':
  - type: text
    content: 'En effet, voici ce que m''a dit l''Eternel:'
  - type: text
    content: «Je veux rester tranquille et regarder de ma place,
  - type: text
    content: pareil à la chaleur des rayons du soleil,
  - type: text
    content: au nuage porteur de rosée dans la chaude période de la moisson.»
  '5':
  - type: text
    content: Avant la récolte, quand la floraison sera terminée,
  - type: text
    content: quand le raisin commencera à mûrir et se transformera en grappe,
  - type: text
    content: il coupera les sarments avec des serpes,
  - type: text
    content: il enlèvera, il élaguera les branches.
  '6':
  - type: text
    content: Ils seront tous abandonnés aux oiseaux de proie des montagnes
  - type: text
    content: et aux bêtes de la terre;
  - type: text
    content: les oiseaux de proie passeront l'été sur leurs cadavres,
  - type: text
    content: et toutes les bêtes sauvages de la terre l'hiver.
  '7':
  - type: text
    content: A ce moment-là, des offrandes seront apportées à l'Eternel, le maître de l'univers,
  - type: text
    content: par le peuple grand et glabre,
  - type: text
    content: par le peuple redouté bien au-delà de ses frontières,
  - type: text
    content: par la nation puissante qui écrase tout
  - type: text
    content: et dont le territoire est traversé par des fleuves.
  - type: text
    content: Elles seront apportées à l'endroit où réside le nom de l'Eternel, le maître de l'univers, sur le mont Sion.
