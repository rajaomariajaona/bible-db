document_id: ISA.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie sur l'Ethiopie
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Malheur à toi, pays des grillons ailés
- type: usfm
  marker: q1
  children:
  - type: text
    text: situé de l'autre côté des fleuves de l'Ethiopie,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: toi qui envoies des messagers par mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans des embarcations légères qui flottent sur l'eau!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Allez donc, messagers rapides, trouver la nation grande et glabre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le peuple redouté bien au-delà de ses frontières,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la nation puissante qui écrase tout
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dont le territoire est traversé par des fleuves!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Vous tous, habitants du monde, vous qui peuplez la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lorsque l'étendard sera dressé sur les montagnes, regardez!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lorsque la trompette sonnera, écoutez!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'En effet, voici ce que m''a dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Je veux rester tranquille et regarder de ma place,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pareil à la chaleur des rayons du soleil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au nuage porteur de rosée dans la chaude période de la moisson.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Avant la récolte, quand la floraison sera terminée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand le raisin commencera à mûrir et se transformera en grappe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il coupera les sarments avec des serpes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il enlèvera, il élaguera les branches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils seront tous abandonnés aux oiseaux de proie des montagnes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et aux bêtes de la terre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les oiseaux de proie passeront l'été sur leurs cadavres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toutes les bêtes sauvages de la terre l'hiver.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: A ce moment-là, des offrandes seront apportées à l'Eternel, le maître de l'univers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: par le peuple grand et glabre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: par le peuple redouté bien au-delà de ses frontières,
- type: usfm
  marker: q1
  children:
  - type: text
    text: par la nation puissante qui écrase tout
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dont le territoire est traversé par des fleuves.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elles seront apportées à l'endroit où réside le nom de l'Eternel, le maître de l'univers, sur le mont Sion.
