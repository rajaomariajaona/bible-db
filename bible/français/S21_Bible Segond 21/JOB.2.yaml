document_id: JOB.2,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Deuxième épreuve
  - type: text
    content: 'Un autre jour, les fils de Dieu vinrent se présenter devant l''Eternel, et Satan vint aussi au milieu d''eux pour se présenter devant l''Eternel. '
  '10':
  - type: text
    content: 'Mais Job lui répondit: «Tu tiens le langage d''une folle. Nous acceptons le bien de la part de Dieu, et nous n''accepterions pas aussi le mal?»'
  - type: text
    content: Dans tout cela, Job ne pécha pas par ses lèvres.
  - type: heading
    content: Arrivée des amis de Job
  '11':
  - type: text
    content: 'Trois amis de Job apprirent tous les malheurs qui l''avaient frappé. Il s''agissait d''Eliphaz de Théman, de Bildad de Shuach et de Tsophar de Naama. Venus chacun de son pays, ils se concertèrent pour aller exprimer leur compassion à Job et le réconforter. '
  '12':
  - type: text
    content: 'Ils l''aperçurent de loin, mais ils ne le reconnurent pas. Ils se mirent alors à pleurer tout haut, déchirèrent leurs manteaux et jetèrent de la poussière en l''air au-dessus de leur tête. '
  '13':
  - type: text
    content: Pendant 7 jours et 7 nuits, ils restèrent assis par terre à côté de lui, sans lui dire un mot, car ils voyaient à quel point sa douleur était grande.
  '2':
  - type: text
    content: 'L''Eternel dit à Satan: «D''où viens-tu?» Satan répondit à l''Eternel: «De parcourir la terre et de m''y promener.» '
  '3':
  - type: text
    content: 'L''Eternel dit à Satan: «As-tu remarqué mon serviteur Job? Il n''y a personne comme lui sur la terre. C''est un homme intègre et droit. Il craint Dieu et se détourne du mal. Il persévère dans son intégrité et c''est sans raison que tu m''incites à le perdre.» '
  '4':
  - type: text
    content: 'Satan répondit à l''Eternel: «Peau contre peau! Tout ce qu''un homme possède, il est prêt à l''échanger contre sa vie. '
  '5':
  - type: text
    content: 'Mais porte donc la main contre lui, touche à ses os et à sa chair, et je suis sûr qu''il te maudira en face.» '
  '6':
  - type: text
    content: 'L''Eternel dit à Satan: «Le voici: je te le livre. Seulement, épargne sa vie.»'
  '7':
  - type: text
    content: 'Satan se retira alors de la présence de l''Eternel. Puis il frappa Job d''un ulcère purulent, depuis la plante des pieds jusqu''au sommet du crâne. '
  '8':
  - type: text
    content: 'Job prit un tesson pour se gratter et s''assit sur de la cendre. '
  '9':
  - type: text
    content: 'Sa femme lui dit: «Tu persévères dans ton intégrité? Maudis donc Dieu et meurs!» '
