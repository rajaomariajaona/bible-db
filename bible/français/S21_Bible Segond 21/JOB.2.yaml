document_id: JOB.2,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Deuxième épreuve
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Un autre jour, les fils de Dieu vinrent se présenter devant l''Eternel, et Satan vint aussi au milieu d''eux pour se présenter devant l''Eternel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Mais Job lui répondit: «Tu tiens le langage d''une folle. Nous acceptons le bien de la part de Dieu, et nous n''accepterions pas aussi le mal?»'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dans tout cela, Job ne pécha pas par ses lèvres.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Arrivée des amis de Job
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Trois amis de Job apprirent tous les malheurs qui l''avaient frappé. Il s''agissait d''Eliphaz de Théman, de Bildad de Shuach et de Tsophar de Naama. Venus chacun de son pays, ils se concertèrent pour aller exprimer leur compassion à Job et le réconforter. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ils l''aperçurent de loin, mais ils ne le reconnurent pas. Ils se mirent alors à pleurer tout haut, déchirèrent leurs manteaux et jetèrent de la poussière en l''air au-dessus de leur tête. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Pendant 7 jours et 7 nuits, ils restèrent assis par terre à côté de lui, sans lui dire un mot, car ils voyaient à quel point sa douleur était grande.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'L''Eternel dit à Satan: «D''où viens-tu?» Satan répondit à l''Eternel: «De parcourir la terre et de m''y promener.» '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'L''Eternel dit à Satan: «As-tu remarqué mon serviteur Job? Il n''y a personne comme lui sur la terre. C''est un homme intègre et droit. Il craint Dieu et se détourne du mal. Il persévère dans son intégrité et c''est sans raison que tu m''incites à le perdre.» '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Satan répondit à l''Eternel: «Peau contre peau! Tout ce qu''un homme possède, il est prêt à l''échanger contre sa vie. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Mais porte donc la main contre lui, touche à ses os et à sa chair, et je suis sûr qu''il te maudira en face.» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'L''Eternel dit à Satan: «Le voici: je te le livre. Seulement, épargne sa vie.»'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Satan se retira alors de la présence de l''Eternel. Puis il frappa Job d''un ulcère purulent, depuis la plante des pieds jusqu''au sommet du crâne. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Job prit un tesson pour se gratter et s''assit sur de la cendre. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Sa femme lui dit: «Tu persévères dans ton intégrité? Maudis donc Dieu et meurs!» '
