document_id: JAS.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'impartialité de la foi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Mes frères et sœurs, que votre foi en notre glorieux Seigneur Jésus-Christ soit libre de tout favoritisme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Supposez en effet qu''entre dans votre assemblée un homme portant un anneau d''or et des habits somptueux, et qu''entre aussi un pauvre aux habits crasseux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Si vous tournez les regards vers celui qui porte les habits somptueux pour lui dire: «Toi, assieds-toi ici à cette place d''honneur» et que vous disiez au pauvre: «Toi, tiens-toi là debout» ou bien: «Assieds-toi par terre, à mes pieds», '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ne faites-vous pas en vous-mêmes une distinction et ne devenez-vous pas des juges aux mauvais raisonnements?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ecoutez, mes frères et sœurs bien-aimés: Dieu n''a-t-il pas choisi ceux qui sont pauvres aux yeux du monde pour les rendre riches dans la foi et héritiers du royaume qu''il a promis à ceux qui l''aiment? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et vous, vous méprisez le pauvre! N''est-ce pas les riches qui vous oppriment et qui vous traînent devant les tribunaux? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: N'est-ce pas eux qui insultent le beau nom que vous portez?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Si vous accomplissez la loi royale d''après l''Ecriture: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu aimeras ton prochain comme toi-même
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu aimeras… toi-même: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lévitique 19.18
      metadata:
        usfm: LEV.19.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', vous faites bien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais si vous faites du favoritisme, vous commettez un péché; la loi vous dénonce comme étant coupables. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'De fait, la personne qui obéit à toute la loi mais qui pèche contre un seul commandement est en faute vis-à-vis de l''ensemble. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'En effet, celui qui a dit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu ne commettras pas d'adultère
  - type: text
    text: ' a aussi dit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu ne commettras pas de meurtre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu ne commettras… adultère… meurtre: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation du 7e et du 6e des dix commandements (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 20.13-14
      metadata:
        usfm: EXO.20.13+EXO.20.14
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 5.17-18
      metadata:
        usfm: DEU.5.17+DEU.5.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: . Si tu ne commets pas d'adultère mais que tu commettes un meurtre, tu es coupable d'infraction à la loi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Parlez et agissez comme des personnes appelées à être jugées par une loi de liberté, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: car le jugement est sans compassion pour qui n'a pas fait preuve de compassion. La compassion triomphe du jugement.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les œuvres de la foi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mes frères et sœurs, que sert-il à quelqu''un de dire qu''il a la foi, s''il n''a pas les œuvres? Cette foi peut-elle le sauver? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Si un frère ou une sœur sont nus et manquent de la nourriture de chaque jour, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'et que l''un de vous leur dise: «Partez en paix, mettez-vous au chaud et rassasiez-vous» sans pourvoir à leurs besoins physiques, à quoi cela sert-il? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il en va de même pour la foi: si elle ne produit pas d''œuvres, elle est morte en elle-même.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Mais quelqu''un dira: «Toi, tu as la foi, et moi, j''ai les œuvres.» Montre-moi ta foi sans les œuvres, et moi, c''est par mes œuvres que je te montrerai ma foi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tu crois qu'il y a un seul Dieu? Tu fais bien; les démons aussi le croient, et ils tremblent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Veux-tu reconnaître, homme sans intelligence, que la foi sans les œuvres est morte? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Notre ancêtre Abraham n''a-t-il pas été considéré comme juste sur la base de ses actes, lorsqu''il a offert son fils Isaac sur l''autel? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tu vois bien que sa foi agissait avec ses œuvres et que par les œuvres sa foi a été menée à la perfection. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ainsi s''est accompli ce que dit l''Ecriture: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Abraham eut confiance en Dieu et cela lui fut compté comme justice
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Abraham… justice: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Genèse 15.6
      metadata:
        usfm: GEN.15.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. Et il a été appelé ami de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Vous voyez [donc] que l''homme est déclaré juste sur la base de ses actes, et pas seulement de la foi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Rahab la prostituée n''a-t-elle pas, de la même manière, été considérée comme juste sur la base de ses actes, lorsqu''elle a accueilli les messagers et les a fait partir par un autre chemin? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: En effet, de même que le corps sans esprit est mort, de même la foi sans [les] œuvres est morte.
