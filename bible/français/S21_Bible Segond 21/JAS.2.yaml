document_id: JAS.2,152
type_code: fra
verses:
  '1':
  - type: heading
    content: L'impartialité de la foi
  - type: text
    content: 'Mes frères et sœurs, que votre foi en notre glorieux Seigneur Jésus-Christ soit libre de tout favoritisme. '
  '10':
  - type: text
    content: 'De fait, la personne qui obéit à toute la loi mais qui pèche contre un seul commandement est en faute vis-à-vis de l''ensemble. '
  '11':
  - type: text
    content: 'En effet, celui qui a dit: '
  - type: text
    content: Tu ne commettras pas d'adultère
  - type: text
    content: ' a aussi dit: '
  - type: text
    content: Tu ne commettras pas de meurtre
  - type: note
    content: 'Tu ne commettras… adultère… meurtre: citation du 7e et du 6e des dix commandements (Exode 20.13-14; Deutéronome 5.17-18).'
  - type: text
    content: . Si tu ne commets pas d'adultère mais que tu commettes un meurtre, tu es coupable d'infraction à la loi.
  '12':
  - type: text
    content: 'Parlez et agissez comme des personnes appelées à être jugées par une loi de liberté, '
  '13':
  - type: text
    content: car le jugement est sans compassion pour qui n'a pas fait preuve de compassion. La compassion triomphe du jugement.
  - type: heading
    content: Les œuvres de la foi
  '14':
  - type: text
    content: 'Mes frères et sœurs, que sert-il à quelqu''un de dire qu''il a la foi, s''il n''a pas les œuvres? Cette foi peut-elle le sauver? '
  '15':
  - type: text
    content: 'Si un frère ou une sœur sont nus et manquent de la nourriture de chaque jour, '
  '16':
  - type: text
    content: 'et que l''un de vous leur dise: «Partez en paix, mettez-vous au chaud et rassasiez-vous» sans pourvoir à leurs besoins physiques, à quoi cela sert-il? '
  '17':
  - type: text
    content: 'Il en va de même pour la foi: si elle ne produit pas d''œuvres, elle est morte en elle-même.'
  '18':
  - type: text
    content: 'Mais quelqu''un dira: «Toi, tu as la foi, et moi, j''ai les œuvres.» Montre-moi ta foi sans les œuvres, et moi, c''est par mes œuvres que je te montrerai ma foi. '
  '19':
  - type: text
    content: Tu crois qu'il y a un seul Dieu? Tu fais bien; les démons aussi le croient, et ils tremblent.
  '2':
  - type: text
    content: 'Supposez en effet qu''entre dans votre assemblée un homme portant un anneau d''or et des habits somptueux, et qu''entre aussi un pauvre aux habits crasseux. '
  '20':
  - type: text
    content: 'Veux-tu reconnaître, homme sans intelligence, que la foi sans les œuvres est morte? '
  '21':
  - type: text
    content: 'Notre ancêtre Abraham n''a-t-il pas été considéré comme juste sur la base de ses actes, lorsqu''il a offert son fils Isaac sur l''autel? '
  '22':
  - type: text
    content: 'Tu vois bien que sa foi agissait avec ses œuvres et que par les œuvres sa foi a été menée à la perfection. '
  '23':
  - type: text
    content: 'Ainsi s''est accompli ce que dit l''Ecriture: '
  - type: text
    content: Abraham eut confiance en Dieu et cela lui fut compté comme justice
  - type: note
    content: 'Abraham… justice: citation de Genèse 15.6.'
  - type: text
    content: '. Et il a été appelé ami de Dieu. '
  '24':
  - type: text
    content: 'Vous voyez [donc] que l''homme est déclaré juste sur la base de ses actes, et pas seulement de la foi. '
  '25':
  - type: text
    content: 'Rahab la prostituée n''a-t-elle pas, de la même manière, été considérée comme juste sur la base de ses actes, lorsqu''elle a accueilli les messagers et les a fait partir par un autre chemin? '
  '26':
  - type: text
    content: En effet, de même que le corps sans esprit est mort, de même la foi sans [les] œuvres est morte.
  '3':
  - type: text
    content: 'Si vous tournez les regards vers celui qui porte les habits somptueux pour lui dire: «Toi, assieds-toi ici à cette place d''honneur» et que vous disiez au pauvre: «Toi, tiens-toi là debout» ou bien: «Assieds-toi par terre, à mes pieds», '
  '4':
  - type: text
    content: ne faites-vous pas en vous-mêmes une distinction et ne devenez-vous pas des juges aux mauvais raisonnements?
  '5':
  - type: text
    content: 'Ecoutez, mes frères et sœurs bien-aimés: Dieu n''a-t-il pas choisi ceux qui sont pauvres aux yeux du monde pour les rendre riches dans la foi et héritiers du royaume qu''il a promis à ceux qui l''aiment? '
  '6':
  - type: text
    content: 'Et vous, vous méprisez le pauvre! N''est-ce pas les riches qui vous oppriment et qui vous traînent devant les tribunaux? '
  '7':
  - type: text
    content: N'est-ce pas eux qui insultent le beau nom que vous portez?
  '8':
  - type: text
    content: 'Si vous accomplissez la loi royale d''après l''Ecriture: '
  - type: text
    content: Tu aimeras ton prochain comme toi-même
  - type: note
    content: 'Tu aimeras… toi-même: citation de Lévitique 19.18.'
  - type: text
    content: ', vous faites bien. '
  '9':
  - type: text
    content: 'Mais si vous faites du favoritisme, vous commettez un péché; la loi vous dénonce comme étant coupables. '
