document_id: 1CO.7,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Réponses à des questions
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 7.1–16.24
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sur le mariage et le célibat
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au sujet de ce que vous m''avez écrit, il est bon pour l''homme de ne pas prendre de femme. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A ceux qui sont mariés j''adresse, non pas moi, mais le Seigneur, cette instruction: que la femme ne se sépare pas de son mari '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: – si elle est séparée de lui, qu'elle reste sans se remarier ou qu'elle se réconcilie avec son mari – et que le mari ne divorce pas de sa femme.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Aux autres, ce n'est pas le Seigneur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ce n''est pas le Seigneur: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: contrairement au verset 10, Paul ne renvoie pas ici à un enseignement de Jésus.
      marker-yv: yv-n
    - type: text
      text: ', c''est moi qui dis: si un frère a une femme non croyante et qu''elle soit d''accord d''habiter avec lui, qu''il ne divorce pas d''elle; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et si une femme a un mari non croyant et qu''il soit d''accord d''habiter avec elle, qu''elle ne divorce pas de son mari. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, le mari non croyant bénéficie de la sainteté de sa femme, et la femme non croyante bénéficie de la sainteté de son mari; autrement, vos enfants ne seraient pas purs, alors qu''en réalité ils sont saints. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si le non-croyant veut se séparer, qu''il le fasse; le frère ou la sœur n''est pas lié dans un tel cas. Dieu nous a appelés à vivre en paix. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, comment peux-tu savoir, femme, si tu sauveras ton mari? Ou comment peux-tu savoir, mari, si tu sauveras ta femme?
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Par ailleurs, que chacun vive selon la part que le Seigneur lui a attribuée, selon l''appel qu''il a reçu de Dieu. C''est ce que je prescris dans toutes les Eglises. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quelqu''un était-il circoncis quand il a été appelé? Qu''il ne cherche pas à le cacher. Quelqu''un était-il incirconcis quand il a été appelé? Qu''il ne se fasse pas circoncire. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La circoncision n''est rien et l''incirconcision n''est rien non plus, mais ce qui compte, c''est le respect des commandements de Dieu. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toutefois, pour éviter toute immoralité sexuelle, que chaque homme ait sa femme et que chaque femme ait son mari. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que chacun reste dans la condition qui était la sienne lorsqu''il a été appelé. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Etais-tu esclave quand tu as été appelé? Ne t''en inquiète pas mais, si tu peux devenir libre, profites-en plutôt. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, l''esclave qui a été appelé par le Seigneur est un affranchi du Seigneur; de même, l''homme libre qui a été appelé est un esclave de Christ. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous avez été rachetés à un grand prix: ne devenez pas esclaves des hommes. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Frères et sœurs, que chacun reste devant Dieu dans la condition qui était la sienne lorsqu'il a été appelé.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au sujet des personnes non mariées, je n''ai pas d''ordre du Seigneur, mais je donne un avis, en homme qui a reçu du Seigneur la grâce d''être digne de confiance. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici donc ce que j''estime bon, à cause des temps actuels de détresse: il est bon pour chacun de rester comme il est. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Es-tu lié à une femme? Ne cherche pas à rompre ce lien. N''es-tu pas lié à une femme? Ne cherche pas de femme. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si toutefois tu te maries, tu ne pèches pas, et si la jeune fille se marie, elle ne pèche pas. Cependant, les personnes mariées connaîtront des souffrances dans leur vie, et je voudrais vous les épargner.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce que je veux dire, frères et sœurs, c''est que le temps est court. Désormais, que ceux qui ont une femme soient comme s''ils n''en avaient pas, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que le mari rende à sa femme l''affection qu''il lui doit et que la femme agisse de même envers son mari. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ceux qui pleurent comme s''ils ne pleuraient pas, ceux qui se réjouissent comme s''ils ne se réjouissaient pas, ceux qui achètent comme s''ils ne possédaient pas, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et ceux qui jouissent de ce monde comme s''ils n''en jouissaient pas, car le monde dans sa forme actuelle passe. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, je voudrais que vous soyez sans inquiétude. Celui qui n''est pas marié se préoccupe des affaires du Seigneur, des moyens de plaire au Seigneur, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'alors que celui qui est marié se préoccupe des affaires de ce monde, des moyens de plaire à sa femme. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y a aussi une différence entre la femme non mariée et la jeune fille: celle qui n''est pas mariée se préoccupe des affaires du Seigneur, afin d''être sainte de corps et d''esprit, alors que celle qui est mariée se préoccupe des affaires de ce monde, des moyens de plaire à son mari.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je dis cela dans votre intérêt; ce n'est pas pour vous imposer des contraintes, mais pour vous montrer ce qui est convenable et à même de vous attacher au Seigneur sans tiraillements.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si quelqu''un estime agir de façon inconvenante envers sa fiancée en la laissant dépasser la fleur de l''âge et si tel doit être le cas, qu''il fasse comme il le veut. Il ne pèche pas, qu''ils se marient. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant à celui qui tient ferme dans son cœur, sans contrainte et avec l''exercice de sa propre volonté, et qui a décidé en lui-même de garder le célibat, il fait bien. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi, celui qui se marie [avec sa fiancée] fait bien, et celui qui ne se marie pas fait mieux.
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une femme est liée [par la loi] à son mari aussi longtemps qu''il est vivant; mais si le mari meurt, elle est libre de se remarier avec qui elle veut, à condition que ce soit dans le Seigneur. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce n''est pas la femme qui est maîtresse de son corps, mais son mari. De même, ce n''est pas le mari qui est maître de son corps, mais sa femme. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cependant, à mon avis, elle est plus heureuse si elle reste comme elle est. Et moi aussi, je crois avoir l'Esprit de Dieu.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne vous privez pas l''un de l''autre, si ce n''est d''un commun accord pour un temps, afin de vous consacrer [au jeûne et] à la prière; puis retournez ensemble, de peur que Satan ne vous tente à cause de votre manque de maîtrise. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je dis cela comme une concession, et non comme un ordre. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je voudrais que tous soient comme moi; mais chacun tient de Dieu un don particulier, l'un d'une manière, l'autre d'une autre.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A ceux qui ne sont pas mariés et aux veuves, je dis qu''il est bien pour eux de rester comme moi. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais s'ils ne peuvent pas se maîtriser, qu'ils se marient, car il vaut mieux se marier que de brûler de désir.
