document_id: EZK.15,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israël comparé au bois de la vigne
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole de l''Eternel m''a été adressée:'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Fils de l'homme, le bois de la vigne, qu'a-t-il de plus que tout autre bois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que les branches qui sont sur les arbres de la forêt?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tire-t-on de ce bois de quoi fabriquer quelque chose?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En tire-t-on un crochet pour y suspendre un objet?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au contraire, on le jette au feu pour qu'il le dévore;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le feu dévore ses deux extrémités, et son milieu finit calciné.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sera-t-il donc utile à quelque chose?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puisqu'on n'en faisait rien quand il était entier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on peut d'autant moins en faire quelque chose
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand le feu l'a dévoré et qu'il est calciné!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»C''est pourquoi, voici ce que dit le Seigneur, l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout comme je jette au feu le bois de la vigne
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour qu'il le dévore de préférence au bois de la forêt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'je jette au feu les habitants de Jérusalem:'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je me retournerai contre eux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils auront beau être sortis du feu, le feu les dévorera.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous reconnaîtrez que je suis l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand je m'en prendrai à eux.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai du pays un endroit désert
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu'ils ont été infidèles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare le Seigneur, l'Eternel.»
