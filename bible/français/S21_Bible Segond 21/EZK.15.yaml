document_id: EZK.15,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Israël comparé au bois de la vigne
  - type: text
    content: 'La parole de l''Eternel m''a été adressée:'
  '2':
  - type: text
    content: «Fils de l'homme, le bois de la vigne, qu'a-t-il de plus que tout autre bois,
  - type: text
    content: que les branches qui sont sur les arbres de la forêt?
  '3':
  - type: text
    content: Tire-t-on de ce bois de quoi fabriquer quelque chose?
  - type: text
    content: En tire-t-on un crochet pour y suspendre un objet?
  '4':
  - type: text
    content: Au contraire, on le jette au feu pour qu'il le dévore;
  - type: text
    content: le feu dévore ses deux extrémités, et son milieu finit calciné.
  - type: text
    content: Sera-t-il donc utile à quelque chose?
  '5':
  - type: text
    content: Puisqu'on n'en faisait rien quand il était entier,
  - type: text
    content: on peut d'autant moins en faire quelque chose
  - type: text
    content: quand le feu l'a dévoré et qu'il est calciné!
  '6':
  - type: text
    content: '»C''est pourquoi, voici ce que dit le Seigneur, l''Eternel:'
  - type: text
    content: Tout comme je jette au feu le bois de la vigne
  - type: text
    content: pour qu'il le dévore de préférence au bois de la forêt,
  - type: text
    content: 'je jette au feu les habitants de Jérusalem:'
  '7':
  - type: text
    content: je me retournerai contre eux;
  - type: text
    content: ils auront beau être sortis du feu, le feu les dévorera.
  - type: text
    content: Vous reconnaîtrez que je suis l'Eternel,
  - type: text
    content: quand je m'en prendrai à eux.
  '8':
  - type: text
    content: Je ferai du pays un endroit désert
  - type: text
    content: parce qu'ils ont été infidèles,
  - type: text
    content: déclare le Seigneur, l'Eternel.»
