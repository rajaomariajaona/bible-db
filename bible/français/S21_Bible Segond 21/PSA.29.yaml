document_id: PSA.29,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La toute-puissance de Dieu
  - type: text
    content: Psaume de David.
  - type: text
    content: Fils de Dieu, rendez à l'Eternel,
  - type: text
    content: rendez à l'Eternel gloire et honneur!
  '10':
  - type: text
    content: L'Eternel était sur son trône lors du déluge,
  - type: text
    content: l'Eternel règne éternellement sur son trône.
  '11':
  - type: text
    content: L'Eternel donne de la force à son peuple,
  - type: text
    content: l'Eternel bénit son peuple en lui procurant la paix.
  '2':
  - type: text
    content: Rendez à l'Eternel la gloire due à son nom,
  - type: text
    content: prosternez-vous devant l'Eternel avec des ornements sacrés!
  '3':
  - type: text
    content: La voix de l'Eternel retentit sur l'eau,
  - type: text
    content: le Dieu de gloire fait gronder le tonnerre;
  - type: text
    content: l'Eternel domine les grandes eaux.
  '4':
  - type: text
    content: La voix de l'Eternel est puissante,
  - type: text
    content: la voix de l'Eternel est majestueuse.
  '5':
  - type: text
    content: La voix de l'Eternel brise les cèdres,
  - type: text
    content: l'Eternel brise les cèdres du Liban.
  '6':
  - type: text
    content: Il fait bondir le Liban comme un veau,
  - type: text
    content: et le Sirion comme un jeune buffle.
  '7':
  - type: text
    content: La voix de l'Eternel fait jaillir des éclairs.
  '8':
  - type: text
    content: La voix de l'Eternel fait trembler le désert,
  - type: text
    content: l'Eternel fait trembler le désert de Kadès.
  '9':
  - type: text
    content: La voix de l'Eternel fait mettre bas les biches,
  - type: text
    content: elle dénude les forêts.
  - type: text
    content: 'Dans son palais, tout s''écrie: «Gloire!»'
