document_id: PSA.29
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La toute-puissance de Dieu
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fils de Dieu, rendez à l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: rendez à l'Eternel gloire et honneur!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Rendez à l'Eternel la gloire due à son nom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: prosternez-vous devant l'Eternel avec des ornements sacrés!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: La voix de l'Eternel retentit sur l'eau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Dieu de gloire fait gronder le tonnerre;
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'Eternel domine les grandes eaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: La voix de l'Eternel est puissante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la voix de l'Eternel est majestueuse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: La voix de l'Eternel brise les cèdres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'Eternel brise les cèdres du Liban.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il fait bondir le Liban comme un veau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le Sirion comme un jeune buffle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: La voix de l'Eternel fait jaillir des éclairs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: La voix de l'Eternel fait trembler le désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'Eternel fait trembler le désert de Kadès.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: La voix de l'Eternel fait mettre bas les biches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle dénude les forêts.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dans son palais, tout s''écrie: «Gloire!»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: L'Eternel était sur son trône lors du déluge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'Eternel règne éternellement sur son trône.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L'Eternel donne de la force à son peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'Eternel bénit son peuple en lui procurant la paix.
