document_id: PSA.29,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La toute-puissance de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Psaume de David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fils de Dieu, rendez à l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rendez à l'Eternel gloire et honneur!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel était sur son trône lors du déluge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'Eternel règne éternellement sur son trône.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel donne de la force à son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'Eternel bénit son peuple en lui procurant la paix.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rendez à l'Eternel la gloire due à son nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: prosternez-vous devant l'Eternel avec des ornements sacrés!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La voix de l'Eternel retentit sur l'eau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Dieu de gloire fait gronder le tonnerre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'Eternel domine les grandes eaux.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La voix de l'Eternel est puissante,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la voix de l'Eternel est majestueuse.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La voix de l'Eternel brise les cèdres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'Eternel brise les cèdres du Liban.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fait bondir le Liban comme un veau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le Sirion comme un jeune buffle.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La voix de l'Eternel fait jaillir des éclairs.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La voix de l'Eternel fait trembler le désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'Eternel fait trembler le désert de Kadès.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La voix de l'Eternel fait mettre bas les biches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle dénude les forêts.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dans son palais, tout s''écrie: «Gloire!»'
