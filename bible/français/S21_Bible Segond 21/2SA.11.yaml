document_id: 2SA.11,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Adultère et crime de David
  - type: text
    content: L'année suivante, à l'époque où les rois partent en campagne, David envoya Joab, avec ses serviteurs et tout Israël, semer la dévastation chez les Ammonites et faire le siège de Rabba. Quant à lui, il resta à Jérusalem.
  '10':
  - type: text
    content: 'On en informa David en lui disant: «Urie n''est pas descendu chez lui.» David dit à Urie: «N''arrives-tu pas de voyage? Pourquoi n''es-tu pas descendu chez toi?» '
  '11':
  - type: text
    content: 'Urie lui répondit: «L''arche de l''alliance ainsi qu''Israël et Juda habitent sous des tentes, mon seigneur Joab et les serviteurs de mon seigneur campent en rase campagne et moi, je rentrerais chez moi pour manger et boire et pour coucher avec ma femme! Aussi vrai que tu es vivant et que ton âme est vivante, je ne ferai pas cela.» '
  '12':
  - type: text
    content: 'David dit à Urie: «Reste ici aujourd''hui encore et demain je te laisserai repartir.» Urie resta à Jérusalem ce jour-là et le lendemain. '
  '13':
  - type: text
    content: David l'invita à manger et à boire en sa présence et il l'enivra. Le soir, Urie sortit pour s'étendre sur son lit avec les serviteurs de son maître, mais il ne descendit pas chez lui.
  '14':
  - type: text
    content: 'Le lendemain matin, David écrivit une lettre à Joab et il la lui fit parvenir par l''intermédiaire d''Urie. '
  '15':
  - type: text
    content: 'Il écrivit dans cette lettre: «Placez Urie au plus fort du combat, puis reculez derrière lui afin qu''il soit frappé et meure.» '
  '16':
  - type: text
    content: 'Au cours du siège de la ville, Joab plaça Urie à un endroit qu''il savait défendu par de vaillants soldats. '
  '17':
  - type: text
    content: 'Les habitants de la ville firent une sortie et livrèrent combat contre Joab. Plusieurs tombèrent parmi le peuple, parmi les serviteurs de David. Urie le Hittite fut lui aussi tué. '
  '18':
  - type: text
    content: 'Joab envoya un messager pour rapporter à David tout ce qui s''était passé dans le combat. '
  '19':
  - type: text
    content: 'Il donna cet ordre au messager: «Quand tu auras fini de raconter au roi tous les détails du combat, '
  '2':
  - type: text
    content: 'Un soir, David se leva de son lit. Comme il se promenait sur le toit du palais royal, il aperçut de là une femme qui se baignait et qui était très belle. '
  '20':
  - type: text
    content: 'peut-être se mettra-t-il en colère et te dira-t-il: ‘Pourquoi vous êtes-vous approchés de la ville pour combattre? Ne savez-vous pas qu''on peut lancer des projectiles du haut de la muraille? '
  '21':
  - type: text
    content: 'Qui a tué Abimélec, le fils de Jerubbésheth? C''est une femme qui a lancé sur lui, du haut de la muraille, un morceau de meule de moulin et il en est mort à Thébets! Pourquoi vous êtes-vous approchés de la muraille?’ Alors tu diras: ‘Ton serviteur Urie le Hittite est mort aussi.’»'
  '22':
  - type: text
    content: 'Le messager partit et, à son arrivée, il rapporta à David tout ce que Joab lui avait ordonné de dire. '
  '23':
  - type: text
    content: 'Il dit à David: «Ces gens ont pris l''avantage sur nous. Ils avaient fait une sortie contre nous dans la campagne et nous les avons repoussés jusqu''à la porte de la ville. '
  '24':
  - type: text
    content: 'Les archers ont tiré sur tes serviteurs du haut de la muraille et plusieurs des serviteurs du roi ont été tués. Ton serviteur Urie le Hittite est mort aussi.» '
  '25':
  - type: text
    content: 'David dit au messager: «Voici ce que tu diras à Joab: ‘Ne sois pas peiné de cette affaire, car l''épée dévore tantôt l''un, tantôt l''autre. Renforce ton combat contre cette ville et détruis-la.’ Quant à toi, encourage-le!»'
  '26':
  - type: text
    content: 'La femme d''Urie apprit que son mari était mort et elle le pleura. '
  '27':
  - type: text
    content: Quand sa période de deuil fut passée, David l'envoya chercher et l'accueillit chez lui. Elle devint sa femme et lui donna un fils. Ce que David avait fait déplut à l'Eternel.
  '3':
  - type: text
    content: 'David fit demander qui était cette femme et on lui dit: «N''est-ce pas Bath-Shéba, fille d''Eliam et femme d''Urie le Hittite?» '
  '4':
  - type: text
    content: 'David envoya alors des messagers la chercher. Elle vint vers lui et il coucha avec elle, alors qu''elle venait de se purifier après ses règles. Puis elle retourna chez elle. '
  '5':
  - type: text
    content: 'Cette femme tomba enceinte et elle fit dire à David: «Je suis enceinte.»'
  '6':
  - type: text
    content: 'Alors David fit dire à Joab: «Envoie-moi Urie le Hittite.» Et Joab envoya Urie à David. '
  '7':
  - type: text
    content: 'Urie se rendit vers David, qui l''interrogea sur l''état de Joab, du peuple et de la guerre. '
  '8':
  - type: text
    content: 'Puis David dit à Urie: «Descends chez toi et prends un moment de détente.» Urie sortit du palais royal, suivi d''un cadeau du roi. '
  '9':
  - type: text
    content: 'Mais il se coucha à la porte du palais royal, avec tous les serviteurs de son maître, et il ne descendit pas chez lui. '
