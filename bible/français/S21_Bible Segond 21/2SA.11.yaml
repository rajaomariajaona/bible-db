document_id: 2SA.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Adultère et crime de David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: L'année suivante, à l'époque où les rois partent en campagne, David envoya Joab, avec ses serviteurs et tout Israël, semer la dévastation chez les Ammonites et faire le siège de Rabba. Quant à lui, il resta à Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Un soir, David se leva de son lit. Comme il se promenait sur le toit du palais royal, il aperçut de là une femme qui se baignait et qui était très belle. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'David fit demander qui était cette femme et on lui dit: «N''est-ce pas Bath-Shéba, fille d''Eliam et femme d''Urie le Hittite?» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'David envoya alors des messagers la chercher. Elle vint vers lui et il coucha avec elle, alors qu''elle venait de se purifier après ses règles. Puis elle retourna chez elle. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Cette femme tomba enceinte et elle fit dire à David: «Je suis enceinte.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Alors David fit dire à Joab: «Envoie-moi Urie le Hittite.» Et Joab envoya Urie à David. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Urie se rendit vers David, qui l''interrogea sur l''état de Joab, du peuple et de la guerre. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Puis David dit à Urie: «Descends chez toi et prends un moment de détente.» Urie sortit du palais royal, suivi d''un cadeau du roi. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Mais il se coucha à la porte du palais royal, avec tous les serviteurs de son maître, et il ne descendit pas chez lui. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'On en informa David en lui disant: «Urie n''est pas descendu chez lui.» David dit à Urie: «N''arrives-tu pas de voyage? Pourquoi n''es-tu pas descendu chez toi?» '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Urie lui répondit: «L''arche de l''alliance ainsi qu''Israël et Juda habitent sous des tentes, mon seigneur Joab et les serviteurs de mon seigneur campent en rase campagne et moi, je rentrerais chez moi pour manger et boire et pour coucher avec ma femme! Aussi vrai que tu es vivant et que ton âme est vivante, je ne ferai pas cela.» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'David dit à Urie: «Reste ici aujourd''hui encore et demain je te laisserai repartir.» Urie resta à Jérusalem ce jour-là et le lendemain. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: David l'invita à manger et à boire en sa présence et il l'enivra. Le soir, Urie sortit pour s'étendre sur son lit avec les serviteurs de son maître, mais il ne descendit pas chez lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Le lendemain matin, David écrivit une lettre à Joab et il la lui fit parvenir par l''intermédiaire d''Urie. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il écrivit dans cette lettre: «Placez Urie au plus fort du combat, puis reculez derrière lui afin qu''il soit frappé et meure.» '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Au cours du siège de la ville, Joab plaça Urie à un endroit qu''il savait défendu par de vaillants soldats. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les habitants de la ville firent une sortie et livrèrent combat contre Joab. Plusieurs tombèrent parmi le peuple, parmi les serviteurs de David. Urie le Hittite fut lui aussi tué. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Joab envoya un messager pour rapporter à David tout ce qui s''était passé dans le combat. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il donna cet ordre au messager: «Quand tu auras fini de raconter au roi tous les détails du combat, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'peut-être se mettra-t-il en colère et te dira-t-il: ‘Pourquoi vous êtes-vous approchés de la ville pour combattre? Ne savez-vous pas qu''on peut lancer des projectiles du haut de la muraille? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Qui a tué Abimélec, le fils de Jerubbésheth? C''est une femme qui a lancé sur lui, du haut de la muraille, un morceau de meule de moulin et il en est mort à Thébets! Pourquoi vous êtes-vous approchés de la muraille?’ Alors tu diras: ‘Ton serviteur Urie le Hittite est mort aussi.’»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le messager partit et, à son arrivée, il rapporta à David tout ce que Joab lui avait ordonné de dire. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Il dit à David: «Ces gens ont pris l''avantage sur nous. Ils avaient fait une sortie contre nous dans la campagne et nous les avons repoussés jusqu''à la porte de la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les archers ont tiré sur tes serviteurs du haut de la muraille et plusieurs des serviteurs du roi ont été tués. Ton serviteur Urie le Hittite est mort aussi.» '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'David dit au messager: «Voici ce que tu diras à Joab: ‘Ne sois pas peiné de cette affaire, car l''épée dévore tantôt l''un, tantôt l''autre. Renforce ton combat contre cette ville et détruis-la.’ Quant à toi, encourage-le!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'La femme d''Urie apprit que son mari était mort et elle le pleura. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Quand sa période de deuil fut passée, David l'envoya chercher et l'accueillit chez lui. Elle devint sa femme et lui donna un fils. Ce que David avait fait déplut à l'Eternel.
