document_id: ISA.2,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Gloire future de Jérusalem
  - type: text
    content: Prophétie d'Esaïe, fils d'Amots, sur Juda et Jérusalem.
  '10':
  - type: text
    content: Entre dans les grottes,
  - type: text
    content: cache-toi dans la poussière
  - type: text
    content: pour échapper à la terreur que provoque l'Eternel
  - type: text
    content: et à la splendeur de sa majesté!
  '11':
  - type: text
    content: L'être humain sera abaissé, avec son regard hautain,
  - type: text
    content: la grandeur des hommes devra s'incliner.
  - type: text
    content: L'Eternel seul sera élevé, ce jour-là.
  '12':
  - type: text
    content: En effet, l'Eternel, le maître de l'univers, s'est réservé un jour
  - type: text
    content: contre tout homme orgueilleux et hautain,
  - type: text
    content: contre tous ceux qui s'élèvent, afin qu'ils soient abaissés,
  '13':
  - type: text
    content: contre tous les cèdres du Liban, quelles que soient leur taille et leur hauteur,
  - type: text
    content: et tous les chênes du Basan,
  '14':
  - type: text
    content: contre toutes les hautes montagnes
  - type: text
    content: et toutes les collines élevées,
  '15':
  - type: text
    content: contre toutes les hautes tours
  - type: text
    content: et toutes les murailles fortifiées,
  '16':
  - type: text
    content: contre tous les bateaux long-courriers
  - type: text
    content: et tous les navires splendides.
  '17':
  - type: text
    content: L'orgueil de l'homme devra s'incliner,
  - type: text
    content: 'sa grandeur sera abaissée:'
  - type: text
    content: l'Eternel seul sera élevé, ce jour-là.
  '18':
  - type: text
    content: Tous les faux dieux disparaîtront.
  '19':
  - type: text
    content: On entrera dans les grottes des rochers
  - type: text
    content: et on s'enfoncera dans la poussière
  - type: text
    content: pour échapper à la terreur que provoquera l'Eternel et à la splendeur de sa majesté,
  - type: text
    content: quand il se lèvera pour terrifier la terre.
  '2':
  - type: text
    content: '*Il arrivera, dans l''avenir,'
  - type: text
    content: que la montagne de la maison de l'Eternel
  - type: text
    content: sera fondée au sommet des montagnes.
  - type: text
    content: Elle s'élèvera au-dessus des collines
  - type: text
    content: et toutes les nations y afflueront.
  '20':
  - type: text
    content: Ce jour-là, les hommes jetteront
  - type: text
    content: aux taupes et aux chauves-souris
  - type: text
    content: leurs faux dieux en argent et en or,
  - type: text
    content: qu'ils s'étaient fabriqués pour les adorer.
  '21':
  - type: text
    content: Ils se glisseront dans les fentes des falaises
  - type: text
    content: et dans les creux des rochers
  - type: text
    content: pour échapper à la terreur de l'Eternel et à la splendeur de sa majesté,
  - type: text
    content: quand il se lèvera pour terrifier la terre.
  '22':
  - type: text
    content: Arrêtez de placer votre confiance dans l'être humain!
  - type: text
    content: Sa vie n'est qu'un souffle!
  - type: text
    content: Quelle est en effet sa valeur?
  '3':
  - type: text
    content: 'Des peuples s''y rendront en foule et diront:'
  - type: text
    content: «Venez, montons à la montagne de l'Eternel,
  - type: text
    content: à la maison du Dieu de Jacob!
  - type: text
    content: Il nous enseignera ses voies
  - type: text
    content: et nous marcherons dans ses sentiers.»
  - type: text
    content: En effet, c'est de Sion que sortira la loi,
  - type: text
    content: et de Jérusalem la parole de l'Eternel.
  '4':
  - type: text
    content: Il sera le juge des nations,
  - type: text
    content: l'arbitre d'un grand nombre de peuples.
  - type: text
    content: Ceux-ci mettront en pièces leurs épées pour en faire des socs de charrue,
  - type: text
    content: et leurs lances pour en faire des serpes.
  - type: text
    content: Aucune nation ne prendra plus les armes contre une autre
  - type: text
    content: et l'on n'apprendra plus à faire la guerre.
  - type: note
    content: 'Il arrivera… guerre: texte quasi identique en Michée 4.1-3.'
  '5':
  - type: text
    content: Famille de Jacob,
  - type: text
    content: venez et marchons à la lumière de l'Eternel!
  - type: heading
    content: Jugement des idolâtres et des orgueilleux
  '6':
  - type: text
    content: Oui, tu as abandonné ton peuple, la famille de Jacob,
  - type: text
    content: parce qu'ils sont remplis de l'Orient,
  - type: text
    content: de personnes pratiquant la magie comme les Philistins,
  - type: text
    content: parce qu'ils tendent la main aux enfants étrangers.
  '7':
  - type: text
    content: Son pays est rempli d'argent et d'or,
  - type: text
    content: de trésors sans fin;
  - type: text
    content: son pays est rempli de chevaux,
  - type: text
    content: de chars en nombre incalculable.
  '8':
  - type: text
    content: 'Son pays est rempli de faux dieux:'
  - type: text
    content: ils se prosternent devant ce que leurs mains ont fait,
  - type: text
    content: devant ce que leurs doigts ont fabriqué!
  '9':
  - type: text
    content: 'Les petits devront s''incliner et les grands seront abaissés:'
  - type: text
    content: tu ne leur pardonneras pas!
