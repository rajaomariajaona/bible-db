document_id: ISA.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Gloire future de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Prophétie d'Esaïe, fils d'Amots, sur Juda et Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '*Il arrivera, dans l''avenir,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: que la montagne de la maison de l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: sera fondée au sommet des montagnes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle s'élèvera au-dessus des collines
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toutes les nations y afflueront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Des peuples s''y rendront en foule et diront:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Venez, montons à la montagne de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la maison du Dieu de Jacob!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il nous enseignera ses voies
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nous marcherons dans ses sentiers.»
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, c'est de Sion que sortira la loi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de Jérusalem la parole de l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il sera le juge des nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'arbitre d'un grand nombre de peuples.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux-ci mettront en pièces leurs épées pour en faire des socs de charrue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leurs lances pour en faire des serpes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Aucune nation ne prendra plus les armes contre une autre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'on n'apprendra plus à faire la guerre.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2-4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il arrivera… guerre: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'texte quasi identique en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Michée 4.1-3
      metadata:
        usfm: MIC.4.1+MIC.4.2+MIC.4.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Famille de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: venez et marchons à la lumière de l'Eternel!
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jugement des idolâtres et des orgueilleux
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Oui, tu as abandonné ton peuple, la famille de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu'ils sont remplis de l'Orient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de personnes pratiquant la magie comme les Philistins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu'ils tendent la main aux enfants étrangers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Son pays est rempli d'argent et d'or,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de trésors sans fin;
- type: usfm
  marker: q1
  children:
  - type: text
    text: son pays est rempli de chevaux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de chars en nombre incalculable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Son pays est rempli de faux dieux:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se prosternent devant ce que leurs mains ont fait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: devant ce que leurs doigts ont fabriqué!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Les petits devront s''incliner et les grands seront abaissés:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu ne leur pardonneras pas!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Entre dans les grottes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: cache-toi dans la poussière
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour échapper à la terreur que provoque l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et à la splendeur de sa majesté!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L'être humain sera abaissé, avec son regard hautain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la grandeur des hommes devra s'incliner.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Eternel seul sera élevé, ce jour-là.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: En effet, l'Eternel, le maître de l'univers, s'est réservé un jour
- type: usfm
  marker: q1
  children:
  - type: text
    text: contre tout homme orgueilleux et hautain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: contre tous ceux qui s'élèvent, afin qu'ils soient abaissés,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: contre tous les cèdres du Liban, quelles que soient leur taille et leur hauteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous les chênes du Basan,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: contre toutes les hautes montagnes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toutes les collines élevées,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: contre toutes les hautes tours
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toutes les murailles fortifiées,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: contre tous les bateaux long-courriers
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tous les navires splendides.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: L'orgueil de l'homme devra s'incliner,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'sa grandeur sera abaissée:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'Eternel seul sera élevé, ce jour-là.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tous les faux dieux disparaîtront.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: On entrera dans les grottes des rochers
- type: usfm
  marker: q1
  children:
  - type: text
    text: et on s'enfoncera dans la poussière
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour échapper à la terreur que provoquera l'Eternel et à la splendeur de sa majesté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand il se lèvera pour terrifier la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ce jour-là, les hommes jetteront
- type: usfm
  marker: q1
  children:
  - type: text
    text: aux taupes et aux chauves-souris
- type: usfm
  marker: q1
  children:
  - type: text
    text: leurs faux dieux en argent et en or,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'ils s'étaient fabriqués pour les adorer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ils se glisseront dans les fentes des falaises
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dans les creux des rochers
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour échapper à la terreur de l'Eternel et à la splendeur de sa majesté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand il se lèvera pour terrifier la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Arrêtez de placer votre confiance dans l'être humain!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa vie n'est qu'un souffle!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quelle est en effet sa valeur?
