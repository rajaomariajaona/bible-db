document_id: GEN.8,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La sortie de l'arche
  - type: text
    content: 'Dieu se souvint de Noé, de tous les animaux et de tout le bétail qui étaient avec lui dans l''arche. Il fit passer un vent sur la terre et l''eau se calma. '
  '10':
  - type: text
    content: 'Il attendit encore 7 autres jours, puis il lâcha de nouveau la colombe hors de l''arche. '
  '11':
  - type: text
    content: 'La colombe revint vers lui sur le soir, et voici qu''une feuille d''olivier arrachée était dans son bec. Noé sut ainsi que l''eau avait baissé sur la terre. '
  '12':
  - type: text
    content: Il attendit encore 7 autres jours, puis il lâcha la colombe, mais elle ne revint plus vers lui.
  '13':
  - type: text
    content: 'L''an 601, le premier jour du premier mois, l''eau avait séché sur la terre. Noé retira le toit de l''arche. Il regarda et constata que la surface du sol avait séché. '
  '14':
  - type: text
    content: Le vingt-septième jour du deuxième mois, la terre fut sèche.
  '15':
  - type: text
    content: 'Alors Dieu parla à Noé: '
  '16':
  - type: text
    content: '«Sors de l''arche avec ta femme, tes fils et les femmes de tes fils. '
  '17':
  - type: text
    content: 'Fais sortir avec toi tous les animaux de toute espèce qui sont avec toi, tant les oiseaux que le bétail et tous les reptiles qui rampent sur la terre. Qu''ils pullulent sur la terre, qu''ils se reproduisent et deviennent nombreux sur la terre.» '
  '18':
  - type: text
    content: 'Noé sortit avec ses fils, sa femme et les femmes de ses fils. '
  '19':
  - type: text
    content: Tous les animaux, tous les reptiles, tous les oiseaux et tout ce qui se déplace sur la terre sortirent de l'arche en fonction de leur espèce.
  '2':
  - type: text
    content: 'Les sources de l''abîme et les écluses du ciel furent fermées et la pluie ne tomba plus du ciel. '
  '20':
  - type: text
    content: 'Noé construisit un autel en l''honneur de l''Eternel. Il prit de toutes les bêtes pures et de tous les oiseaux purs et offrit des holocaustes sur l''autel. '
  '21':
  - type: text
    content: 'L''Eternel perçut une odeur agréable et se dit en lui-même: «Je ne maudirai plus la terre à cause de l''homme, car l''orientation du cœur de l''homme est mauvaise dès sa jeunesse, et je ne frapperai plus tous les êtres vivants comme je l''ai fait. '
  '22':
  - type: text
    content: Tant que la terre subsistera, les semailles et la moisson, le froid et la chaleur, l'été et l'hiver, le jour et la nuit ne cesseront pas.»
  '3':
  - type: text
    content: 'L''eau se retira peu à peu de dessus la terre, si bien qu''elle baissa au bout de 150 jours. '
  '4':
  - type: text
    content: Le dix-septième jour du septième mois, l'arche s'arrêta sur les montagnes d'Ararat
  - type: note
    content: 'Ararat: nom d''une région montagneuse de Turquie orientale.'
  - type: text
    content: '. '
  '5':
  - type: text
    content: L'eau baissa progressivement jusqu'au dixième mois. Le premier jour du dixième mois, les sommets des montagnes apparurent.
  '6':
  - type: text
    content: 'Au bout de 40 jours, Noé ouvrit la fenêtre qu''il avait faite à l''arche. '
  '7':
  - type: text
    content: 'Il lâcha le corbeau et celui-ci sortit, faisant des allers et retours jusqu''à ce que l''eau ait séché sur la terre. '
  '8':
  - type: text
    content: 'Il lâcha aussi la colombe pour voir si l''eau avait baissé sur la terre, '
  '9':
  - type: text
    content: 'mais celle-ci ne trouva aucun endroit où se poser. Elle revint vers lui dans l''arche, car il y avait de l''eau sur toute la surface de la terre. Il avança la main, la prit et la fit rentrer vers lui dans l''arche. '
