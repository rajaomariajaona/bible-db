document_id: PSA.122,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vœux pour la paix de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Chant des montées, [de David.]
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je suis dans la joie quand on me dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Allons à la maison de l'Eternel!»
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Nos pas se sont arrêtés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans tes portes, Jérusalem!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Jérusalem, tu es construite
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme une ville qui forme un ensemble parfait.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: C'est là que montent les tribus, les tribus de l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – c'est la règle en Israël –
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour louer le nom de l'Eternel,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: car là se trouvent les trônes réservés à la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les trônes de la famille de David.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Demandez la paix de Jérusalem!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que ceux qui t'aiment jouissent du repos!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Que la paix règne dans tes murs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la tranquillité dans tes palais!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: A cause de mes frères et de mes amis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'je dirai: «Que la paix règne chez toi!»'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: A cause de la maison de l'Eternel, notre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je fais des vœux pour ton bonheur.
