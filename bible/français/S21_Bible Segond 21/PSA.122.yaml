document_id: PSA.122,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Vœux pour la paix de Jérusalem
  - type: text
    content: Chant des montées, [de David.]
  - type: text
    content: 'Je suis dans la joie quand on me dit:'
  - type: text
    content: «Allons à la maison de l'Eternel!»
  '2':
  - type: text
    content: Nos pas se sont arrêtés
  - type: text
    content: dans tes portes, Jérusalem!
  '3':
  - type: text
    content: Jérusalem, tu es construite
  - type: text
    content: comme une ville qui forme un ensemble parfait.
  '4':
  - type: text
    content: C'est là que montent les tribus, les tribus de l'Eternel
  - type: text
    content: – c'est la règle en Israël –
  - type: text
    content: pour louer le nom de l'Eternel,
  '5':
  - type: text
    content: car là se trouvent les trônes réservés à la justice,
  - type: text
    content: les trônes de la famille de David.
  '6':
  - type: text
    content: Demandez la paix de Jérusalem!
  - type: text
    content: Que ceux qui t'aiment jouissent du repos!
  '7':
  - type: text
    content: Que la paix règne dans tes murs,
  - type: text
    content: et la tranquillité dans tes palais!
  '8':
  - type: text
    content: A cause de mes frères et de mes amis,
  - type: text
    content: 'je dirai: «Que la paix règne chez toi!»'
  '9':
  - type: text
    content: A cause de la maison de l'Eternel, notre Dieu,
  - type: text
    content: je fais des vœux pour ton bonheur.
