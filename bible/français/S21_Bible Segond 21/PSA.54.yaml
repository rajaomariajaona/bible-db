document_id: PSA.54,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière confiante pour la délivrance
  - type: text
    content: 'Au chef de chœur, avec instruments à cordes. Cantique de David, '
  '2':
  - type: text
    content: 'lorsque les Ziphiens vinrent dire à Saül: «David est caché parmi nous.»'
  '3':
  - type: text
    content: O Dieu, sauve-moi par ton nom
  - type: text
    content: et rends-moi justice par ta puissance!
  '4':
  - type: text
    content: O Dieu, écoute ma prière,
  - type: text
    content: prête l'oreille aux paroles de ma bouche,
  '5':
  - type: text
    content: car des étrangers se sont attaqués à moi,
  - type: text
    content: des hommes violents en veulent à ma vie.
  - type: text
    content: 'Ils ne tiennent pas compte de Dieu. '
  - type: text
    content: – Pause.
  '6':
  - type: text
    content: Mais Dieu est mon secours,
  - type: text
    content: le Seigneur est le soutien de ma vie.
  '7':
  - type: text
    content: Le mal retombera sur mes adversaires.
  - type: text
    content: Réduis-les au silence, dans ta fidélité!
  '8':
  - type: text
    content: Je t'offrirai de bon cœur des sacrifices,
  - type: text
    content: je louerai ton nom, Eternel, car tu es bon.
  '9':
  - type: text
    content: Oui, il me délivre de toute détresse,
  - type: text
    content: et je regarde mes ennemis en face.
