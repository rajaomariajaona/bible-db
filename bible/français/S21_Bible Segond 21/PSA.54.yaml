document_id: PSA.54,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière confiante pour la délivrance
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'Au chef de chœur, avec instruments à cordes. Cantique de David, '
  '2':
  - type: usfm
    marker: d
    children:
    - type: text
      text: 'lorsque les Ziphiens vinrent dire à Saül: «David est caché parmi nous.»'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Dieu, sauve-moi par ton nom
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et rends-moi justice par ta puissance!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Dieu, écoute ma prière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: prête l'oreille aux paroles de ma bouche,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car des étrangers se sont attaqués à moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des hommes violents en veulent à ma vie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils ne tiennent pas compte de Dieu. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais Dieu est mon secours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Seigneur est le soutien de ma vie.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le mal retombera sur mes adversaires.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réduis-les au silence, dans ta fidélité!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je t'offrirai de bon cœur des sacrifices,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je louerai ton nom, Eternel, car tu es bon.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, il me délivre de toute détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je regarde mes ennemis en face.
