document_id: NUM.11,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Révoltes d'Israël dans le désert
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 11.1–25.18
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le feu de l'Eternel à Tabeéra
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Le peuple murmura, et cela déplut à l''Eternel: lorsqu''il l''entendit, sa colère s''enflamma. Le feu de l''Eternel s''alluma parmi eux et dévora une extrémité du camp. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Moïse entendit le peuple pleurer, chacun dans sa famille, à l''entrée de sa tente. La colère de l''Eternel s''enflamma fortement. Moïse en fut attristé, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'et il dit à l''Eternel: «Pourquoi fais-tu du mal à ton serviteur et pourquoi n''ai-je pas trouvé grâce à tes yeux, au point que tu m''imposes la charge de tout ce peuple? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Est-ce moi qui suis le père de ce peuple? Est-ce moi qui l''ai mis au monde pour que tu me dises: ‘Porte-le contre toi comme une nourrice porte un enfant’ jusqu''au pays que tu as juré à ses ancêtres de lui donner? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Où prendrai-je de la viande pour en donner à tout ce peuple? En effet, ils viennent pleurer près de moi en disant: ‘Donne-nous de la viande à manger!’ '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Je ne peux pas, à moi tout seul, porter tout ce peuple, car il est trop lourd pour moi. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Plutôt que de me traiter ainsi, tue-moi donc, si j'ai trouvé grâce à tes yeux, et que je ne voie pas mon malheur.»
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'L''Eternel dit à Moïse: «Rassemble auprès de moi 70 hommes pris parmi les anciens'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Anciens: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: fonction présente dans la plupart des peuples de l'Orient ancien, dont Israël, qui consistait notamment à diriger et conseiller le peuple.
      marker-yv: yv-n
    - type: text
      text: ' d''Israël, des hommes que tu connais comme anciens et responsables du peuple. Amène-les à la tente de la rencontre et qu''ils s''y présentent avec toi. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Je descendrai te parler là. Je prendrai de l''Esprit qui est sur toi et je le mettrai sur eux, afin qu''ils portent la charge du peuple avec toi et que tu ne la portes pas tout seul. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Tu diras au peuple: ‘Consacrez-vous pour demain. Vous mangerez de la viande, puisque vous avez pleuré aux oreilles de l''Eternel en disant: Qui nous fera manger de la viande? Nous étions bien en Egypte! L''Eternel vous donnera de la viande et vous en mangerez. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Vous en mangerez non pas un jour, ni 2 jours, ni 5 jours, ni 10 jours, ni 20 jours, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Le peuple poussa des cris vers Moïse. Moïse pria l''Eternel et le feu s''arrêta. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'mais un mois tout entier, jusqu''à ce qu''elle vous sorte par les narines et que vous en soyez dégoûtés. Cela arrivera parce que vous avez rejeté l''Eternel qui est au milieu de vous et parce que vous avez pleuré devant lui en disant: Pourquoi donc sommes-nous sortis d''Egypte?’»'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Moïse dit: «Le peuple au milieu duquel je me trouve compte 600''000 fantassins et toi, tu dis: ‘Je leur donnerai de la viande et ils en mangeront un mois tout entier’! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Devra-t-on égorger pour eux des brebis et des bœufs pour qu''ils en aient assez? Ou faudra-t-il rassembler pour eux tous les poissons de la mer pour qu''ils en aient assez?» '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'L''Eternel répondit à Moïse: «Le bras de l''Eternel serait-il trop court? Tu vas voir maintenant si ce que je t''ai dit arrivera ou non.»'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Moïse sortit rapporter au peuple les paroles de l''Eternel. Il rassembla 70 hommes pris parmi les anciens du peuple et les plaça autour de la tente. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: L'Eternel descendit dans la nuée et parla à Moïse. Il prit de l'Esprit qui était sur lui et le mit sur les 70 anciens. Dès que l'Esprit reposa sur eux, ceux-ci prophétisèrent, mais ce ne fut que momentané.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Il y eut deux hommes, l''un appelé Eldad, et l''autre Médad, qui étaient restés dans le camp et sur lesquels l''Esprit reposa. En effet, ils figuraient sur la liste, mais ils ne s''étaient pas rendus à la tente, et ils prophétisèrent dans le camp. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Un jeune garçon courut annoncer à Moïse: «Eldad et Médad prophétisent dans le camp.» '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Josué, fils de Nun, qui était au service de Moïse depuis sa jeunesse, prit la parole: «Moïse, mon seigneur, empêche-les-en!» '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Moïse lui répondit: «Es-tu jaloux pour moi? Si seulement tout le peuple de l''Eternel était composé de prophètes! Si seulement l''Eternel mettait son Esprit sur eux!» '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: On appela cet endroit Tabeéra
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tabeéra: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: proche du verbe s'allumer.
      marker-yv: yv-n
    - type: text
      text: ' parce que le feu de l''Eternel s''était allumé parmi eux.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israël réclame de la viande
    marker-yv: yv-h
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Et Moïse retourna dans le camp, ainsi que les anciens d'Israël.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'L''Eternel fit souffler de la mer un vent qui amena des cailles et les dispersa sur le camp, sur environ une journée de marche de chaque côté tout autour du camp. Il y en avait près d''un mètre au-dessus du sol. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Tout ce jour-là et toute la nuit, ainsi que toute la journée du lendemain, le peuple se leva et ramassa les cailles. Celui qui en avait ramassé le moins en avait un volume de 2200 litres. Ils les étendirent pour eux autour du camp. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'La viande était encore entre leurs dents et n''avait même pas encore été mâchée lorsque la colère de l''Eternel s''enflamma contre le peuple. L''Eternel frappa le peuple d''un très grand fléau. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: On appela cet endroit Kibroth-Hattaava
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.34 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Kibroth-Hattaava: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: littéralement tombeaux de la convoitise.
      marker-yv: yv-n
    - type: text
      text: ' parce qu''on y enterra les membres du peuple qui avaient éprouvé de la convoitise.'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: De Kibroth-Hattaava le peuple partit pour Hatséroth, où il s'arrêta.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Le ramassis de gens qui se trouvait au milieu d''Israël éprouva des désirs. Les Israélites eux-mêmes recommencèrent à pleurer et dirent: «Qui nous donnera de la viande à manger? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Nous nous souvenons des poissons que nous mangions en Egypte et qui ne nous coûtaient rien, des concombres, des melons, des poireaux, des oignons et des gousses d''ail. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Maintenant, notre gosier est desséché: plus rien! Nos yeux ne voient que de la manne.»'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'La manne avait la forme de la graine de coriandre et l''apparence du bdellium. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Le peuple se dispersait pour la ramasser. Il la broyait avec des meules ou la pilait dans un mortier; puis il la cuisait au pot ou en faisait des gâteaux. Elle avait le goût d''un gâteau à l''huile. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Quand la rosée descendait la nuit sur le camp, la manne y descendait aussi.
