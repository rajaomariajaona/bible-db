document_id: PRO.15,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paroles et attitudes
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Une réponse douce calme la fureur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis qu'une parole dure augmente la colère.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Celui qui abandonne le sentier doit s'attendre à une sévère correction;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui déteste le reproche mourra.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Le séjour des morts et le gouffre de perdition sont devant l'Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est d'autant plus le cas du cœur des hommes!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Le moqueur n'aime pas qu'on le reprenne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne va pas vers les sages.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Un cœur joyeux rend le visage plaisant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais quand le cœur est triste, l'esprit est abattu.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Un cœur intelligent recherche la connaissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que la bouche des hommes stupides se nourrit de folie.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tous les jours du malheureux sont mauvais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le cœur content est un festin continu.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Mieux vaut peu avec la crainte de l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'un grand trésor avec le trouble.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Mieux vaut un plat de légumes là où règne l'amour
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'un bœuf engraissé dans la maison de la haine.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Un homme violent pousse au conflit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que celui qui est lent à la colère apaise les disputes.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Le chemin du paresseux ressemble à une haie de ronces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que le sentier des hommes droits est tout préparé.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: La langue des sages rend la connaissance plaisante,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que la bouche des hommes stupides déverse la folie.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Un fils sage fait la joie de son père
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et un homme stupide méprise sa mère.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: La folie est une joie pour celui qui est dépourvu de bon sens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais un homme intelligent suit le droit chemin.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Les projets échouent en l'absence de délibération,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ils se réalisent quand il y a de nombreux conseillers.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: On éprouve de la joie à bien répondre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'une parole dite à propos est agréable!
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Le sentier de la vie mène en haut, il est pour l'homme avisé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin qu'il se détourne du séjour des morts qui est en bas.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: L'Eternel démolit la maison des orgueilleux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il préserve le domaine de la veuve.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Les mauvaises intentions font horreur à l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais les paroles bienveillantes sont pures à ses yeux.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Celui qui est assoiffé de profit trouble sa maison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais celui qui déteste les pots-de-vin vivra.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Le cœur du juste médite avant de répondre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que la bouche des méchants déverse des méchancetés.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: L'Eternel se tient loin des méchants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il écoute la prière des justes.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Les yeux de l'Eternel sont partout,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: observant les méchants autant que les bons.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Un regard lumineux réjouit le cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une bonne nouvelle fortifie le corps.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Certains reproches mènent à la vie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui les écoute séjournera parmi les sages.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Celui qui néglige l'instruction se méprise lui-même,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui écoute un reproche acquiert du bon sens.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: La crainte de l'Eternel enseigne la sagesse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'humilité précède la gloire.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Une parole porteuse de guérison est un arbre de vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que la langue perverse brise le cœur.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Le fou méprise l'instruction de son père,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais celui qui tient compte du reproche fait preuve de sagesse.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Il y a de grandes richesses dans la maison du juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors qu'il y a du trouble dans les profits que le méchant réalise.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Les lèvres des sages propagent la connaissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le cœur des hommes stupides n'est pas sûr.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Le sacrifice qu'offrent les méchants fait horreur à l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que la prière des hommes droits lui est agréable.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: La conduite du méchant fait horreur à l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: alors qu'il aime l'homme qui poursuit la justice.
