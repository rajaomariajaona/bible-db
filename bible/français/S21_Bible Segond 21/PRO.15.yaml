document_id: PRO.15,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Paroles et attitudes
  - type: text
    content: Une réponse douce calme la fureur,
  - type: text
    content: tandis qu'une parole dure augmente la colère.
  '10':
  - type: text
    content: Celui qui abandonne le sentier doit s'attendre à une sévère correction;
  - type: text
    content: celui qui déteste le reproche mourra.
  '11':
  - type: text
    content: Le séjour des morts et le gouffre de perdition sont devant l'Eternel.
  - type: text
    content: C'est d'autant plus le cas du cœur des hommes!
  '12':
  - type: text
    content: Le moqueur n'aime pas qu'on le reprenne,
  - type: text
    content: il ne va pas vers les sages.
  '13':
  - type: text
    content: Un cœur joyeux rend le visage plaisant,
  - type: text
    content: mais quand le cœur est triste, l'esprit est abattu.
  '14':
  - type: text
    content: Un cœur intelligent recherche la connaissance,
  - type: text
    content: tandis que la bouche des hommes stupides se nourrit de folie.
  '15':
  - type: text
    content: Tous les jours du malheureux sont mauvais,
  - type: text
    content: mais le cœur content est un festin continu.
  '16':
  - type: text
    content: Mieux vaut peu avec la crainte de l'Eternel
  - type: text
    content: qu'un grand trésor avec le trouble.
  '17':
  - type: text
    content: Mieux vaut un plat de légumes là où règne l'amour
  - type: text
    content: qu'un bœuf engraissé dans la maison de la haine.
  '18':
  - type: text
    content: Un homme violent pousse au conflit,
  - type: text
    content: tandis que celui qui est lent à la colère apaise les disputes.
  '19':
  - type: text
    content: Le chemin du paresseux ressemble à une haie de ronces,
  - type: text
    content: tandis que le sentier des hommes droits est tout préparé.
  '2':
  - type: text
    content: La langue des sages rend la connaissance plaisante,
  - type: text
    content: tandis que la bouche des hommes stupides déverse la folie.
  '20':
  - type: text
    content: Un fils sage fait la joie de son père
  - type: text
    content: et un homme stupide méprise sa mère.
  '21':
  - type: text
    content: La folie est une joie pour celui qui est dépourvu de bon sens,
  - type: text
    content: mais un homme intelligent suit le droit chemin.
  '22':
  - type: text
    content: Les projets échouent en l'absence de délibération,
  - type: text
    content: mais ils se réalisent quand il y a de nombreux conseillers.
  '23':
  - type: text
    content: On éprouve de la joie à bien répondre,
  - type: text
    content: et qu'une parole dite à propos est agréable!
  '24':
  - type: text
    content: Le sentier de la vie mène en haut, il est pour l'homme avisé
  - type: text
    content: afin qu'il se détourne du séjour des morts qui est en bas.
  '25':
  - type: text
    content: L'Eternel démolit la maison des orgueilleux,
  - type: text
    content: mais il préserve le domaine de la veuve.
  '26':
  - type: text
    content: Les mauvaises intentions font horreur à l'Eternel,
  - type: text
    content: mais les paroles bienveillantes sont pures à ses yeux.
  '27':
  - type: text
    content: Celui qui est assoiffé de profit trouble sa maison,
  - type: text
    content: mais celui qui déteste les pots-de-vin vivra.
  '28':
  - type: text
    content: Le cœur du juste médite avant de répondre,
  - type: text
    content: tandis que la bouche des méchants déverse des méchancetés.
  '29':
  - type: text
    content: L'Eternel se tient loin des méchants,
  - type: text
    content: mais il écoute la prière des justes.
  '3':
  - type: text
    content: Les yeux de l'Eternel sont partout,
  - type: text
    content: observant les méchants autant que les bons.
  '30':
  - type: text
    content: Un regard lumineux réjouit le cœur,
  - type: text
    content: une bonne nouvelle fortifie le corps.
  '31':
  - type: text
    content: Certains reproches mènent à la vie;
  - type: text
    content: celui qui les écoute séjournera parmi les sages.
  '32':
  - type: text
    content: Celui qui néglige l'instruction se méprise lui-même,
  - type: text
    content: celui qui écoute un reproche acquiert du bon sens.
  '33':
  - type: text
    content: La crainte de l'Eternel enseigne la sagesse
  - type: text
    content: et l'humilité précède la gloire.
  '4':
  - type: text
    content: Une parole porteuse de guérison est un arbre de vie,
  - type: text
    content: tandis que la langue perverse brise le cœur.
  '5':
  - type: text
    content: Le fou méprise l'instruction de son père,
  - type: text
    content: mais celui qui tient compte du reproche fait preuve de sagesse.
  '6':
  - type: text
    content: Il y a de grandes richesses dans la maison du juste,
  - type: text
    content: alors qu'il y a du trouble dans les profits que le méchant réalise.
  '7':
  - type: text
    content: Les lèvres des sages propagent la connaissance,
  - type: text
    content: mais le cœur des hommes stupides n'est pas sûr.
  '8':
  - type: text
    content: Le sacrifice qu'offrent les méchants fait horreur à l'Eternel,
  - type: text
    content: tandis que la prière des hommes droits lui est agréable.
  '9':
  - type: text
    content: La conduite du méchant fait horreur à l'Eternel,
  - type: text
    content: alors qu'il aime l'homme qui poursuit la justice.
