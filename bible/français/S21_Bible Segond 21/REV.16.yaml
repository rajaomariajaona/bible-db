document_id: REV.16,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Sept coupes
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 16.1–18.24
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les sept coupes versées
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis j''entendis une voix forte qui venait du temple et disait aux sept anges: «Allez verser sur la terre les [sept] coupes de la colère de Dieu.»'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le cinquième ange versa sa coupe sur le trône de la bête et son royaume fut plongé dans les ténèbres. Les hommes se mordaient la langue de douleur, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et ils blasphémèrent le Dieu du ciel à cause de leurs douleurs et de leurs ulcères, ils ne se repentirent pas de leurs actes.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le sixième ange versa sa coupe sur le grand fleuve, l''Euphrate, et le fleuve s''assécha pour préparer la voie aux rois qui viennent de l''Orient. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je vis sortir de la gueule du dragon, de la gueule de la bête et de la bouche du prétendu prophète trois esprits impurs semblables à des grenouilles. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce sont des esprits de démons qui accomplissent des signes miraculeux et qui vont vers les rois de toute la terre afin de les rassembler pour la bataille de ce grand jour du Dieu tout-puissant. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '– «Voici, je viens comme un voleur. Heureux celui qui reste vigilant et qui garde ses vêtements, afin de ne pas marcher nu et de ne pas laisser voir sa honte!» – '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils les rassemblèrent à l'endroit appelé en hébreu Harmaguédon.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le septième ange versa sa coupe dans l''air, et du temple du ciel sortit une voix forte; elle venait du trône et dit: «C''est fait!» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et il y eut des éclairs, des voix, des coups de tonnerre et un grand tremblement de terre, tel qu'il n'y en avait jamais eu de pareil depuis que l'homme est sur la terre.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La grande ville fut divisée en trois parties et les villes des nations s''écroulèrent. Dieu se souvint de Babylone la grande pour lui faire boire la coupe du vin de son ardente colère. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le premier ange partit et versa sa coupe sur la terre, et un ulcère mauvais et douloureux frappa les hommes qui portaient la marque de la bête et qui adoraient son image.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toutes les îles s''enfuirent et l''on ne retrouva plus les montagnes. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Une grosse grêle, dont les grêlons pesaient environ 40 kilos, tomba du ciel sur les hommes. Et les hommes blasphémèrent Dieu à cause du fléau de la grêle, parce que ce fléau était terrible.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le deuxième ange versa sa coupe sur la mer et elle devint du sang, comme le sang d'un mort; tous les êtres vivants qui étaient dans la mer moururent.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le troisième ange versa sa coupe sur les fleuves et sur les sources d''eau, et ils devinrent du sang. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors j''entendis l''ange en charge des eaux dire: «Tu es juste, toi qui es et qui étais, toi le saint, parce que tu as exercé ce jugement. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ont versé le sang des saints et des prophètes, et tu leur as donné du sang à boire; ils le méritent.» '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et j''entendis, de l''autel, une voix qui disait: «Oui, Seigneur Dieu tout-puissant, tes jugements sont vrais et justes.»'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le quatrième ange versa sa coupe sur le soleil et il lui fut donné de brûler les hommes par son feu. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les hommes furent brûlés par une grande chaleur et ils blasphémèrent le nom du Dieu qui a autorité sur ces fléaux, ils ne changèrent pas d'attitude pour lui rendre gloire.
