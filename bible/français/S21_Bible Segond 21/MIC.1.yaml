document_id: MIC.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Menaces contre Israël et Juda
  - type: text
    content: Parole de l'Eternel adressée à Michée de Morésheth durant les règnes de Jotham, Achaz et Ezéchias sur Juda, vision qu'il a eue sur Samarie et Jérusalem.
  '10':
  - type: text
    content: Ne l'annoncez pas dans Gath,
  - type: text
    content: ne pleurez surtout pas!
  - type: text
    content: Roulez-vous dans la poussière à Beth-Leaphra!
  '11':
  - type: text
    content: Passe, habitante de Shaphir, dans la nudité et la honte!
  - type: text
    content: L'habitante de Tsaanan n'ose pas sortir,
  - type: text
    content: le deuil de Beth-Haëtsel vous prive de son abri.
  '12':
  - type: text
    content: L'habitante de Maroth tremble pour son bien-être,
  - type: text
    content: car le malheur est venu de la part de l'Eternel
  - type: text
    content: jusqu'à la porte de Jérusalem.
  '13':
  - type: text
    content: Attelle les coursiers à ton char,
  - type: text
    content: habitante de Lakis!
  - type: text
    content: Tu as été pour la fille de Sion une première cause de péché,
  - type: text
    content: car en toi on a trouvé les transgressions d'Israël.
  '14':
  - type: text
    content: C'est pourquoi tu renonceras à Morésheth-Gath;
  - type: text
    content: les maisons d'Aczib seront une source trompeuse
  - type: text
    content: pour les rois d'Israël.
  '15':
  - type: text
    content: Je t'amènerai un nouveau maître, habitante de Marésha;
  - type: text
    content: la gloire d'Israël
  - type: note
    content: 'La gloire d''Israël: c''est-à-dire l''élite ou le roi d''Israël.'
  - type: text
    content: ' s''en ira jusqu''à Adullam.'
  '16':
  - type: text
    content: Rase-toi, coupe ta chevelure
  - type: text
    content: à cause de tes enfants chéris!
  - type: text
    content: Rends-toi chauve comme le vautour,
  - type: text
    content: car ils s'en vont en exil loin de toi.
  '2':
  - type: text
    content: Ecoutez, vous, tous les peuples!
  - type: text
    content: Sois attentive, terre, avec ce que tu contiens!
  - type: text
    content: Que le Seigneur, l'Eternel, soit témoin contre vous,
  - type: text
    content: le Seigneur qui est dans le palais de sa sainteté!
  '3':
  - type: text
    content: '*En effet, voici que l''Eternel sort de sa résidence.'
  - type: note
    content: 'En effet… résidence: même texte en Esaïe 26.21.'
  - type: text
    content: Il descend, il marche sur les hauteurs de la terre.
  '4':
  - type: text
    content: Sous ses pas les montagnes s'effondrent,
  - type: text
    content: les vallées s'entrouvrent,
  - type: text
    content: comme la cire qui fond au feu,
  - type: text
    content: comme l'eau qui coule sur une pente.
  '5':
  - type: text
    content: Et tout cela à cause de la révolte de Jacob
  - type: note
    content: 'Jacob: nom de l''ancêtre du peuple d''Israël.'
  - type: text
    content: ','
  - type: text
    content: à cause des péchés de la communauté d'Israël.
  - type: text
    content: Quelle est la révolte de Jacob? N'est-ce pas Samarie?
  - type: text
    content: Quels sont les hauts lieux de Juda? N'est-ce pas Jérusalem?
  '6':
  - type: text
    content: Je ferai de Samarie un tas de ruines dans les champs,
  - type: text
    content: un terrain pour planter de la vigne;
  - type: text
    content: je ferai rouler ses pierres dans la vallée,
  - type: text
    content: je mettrai à nu ses fondations.
  '7':
  - type: text
    content: Toutes ses sculptures sacrées seront brisées,
  - type: text
    content: tous ses salaires impurs seront livrés aux flammes,
  - type: text
    content: 'et je briserai toutes ses idoles:'
  - type: text
    content: rassemblées grâce au salaire de la prostitution,
  - type: text
    content: elles deviendront un salaire de prostitution.
  '8':
  - type: text
    content: C'est pourquoi je pleurerai, je me lamenterai,
  - type: text
    content: je marcherai déchaussé et nu,
  - type: text
    content: je pousserai des cris comme le chacal,
  - type: text
    content: et des gémissements comme l'autruche.
  '9':
  - type: text
    content: En effet, sa plaie est douloureuse;
  - type: text
    content: elle s'étend même à Juda,
  - type: text
    content: elle pénètre jusqu'à la porte de mon peuple,
  - type: text
    content: jusqu'à Jérusalem.
