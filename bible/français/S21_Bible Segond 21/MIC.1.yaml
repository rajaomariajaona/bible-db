document_id: MIC.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Menaces contre Israël et Juda
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Parole de l'Eternel adressée à Michée de Morésheth durant les règnes de Jotham, Achaz et Ezéchias sur Juda, vision qu'il a eue sur Samarie et Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ecoutez, vous, tous les peuples!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sois attentive, terre, avec ce que tu contiens!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que le Seigneur, l'Eternel, soit témoin contre vous,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le Seigneur qui est dans le palais de sa sainteté!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '*En effet, voici que l''Eternel sort de sa résidence.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'En effet… résidence: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'même texte en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 26.21
      metadata:
        usfm: ISA.26.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il descend, il marche sur les hauteurs de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Sous ses pas les montagnes s'effondrent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les vallées s'entrouvrent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme la cire qui fond au feu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme l'eau qui coule sur une pente.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Et tout cela à cause de la révolte de Jacob
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jacob: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: nom de l'ancêtre du peuple d'Israël.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause des péchés de la communauté d'Israël.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quelle est la révolte de Jacob? N'est-ce pas Samarie?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quels sont les hauts lieux de Juda? N'est-ce pas Jérusalem?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Je ferai de Samarie un tas de ruines dans les champs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un terrain pour planter de la vigne;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ferai rouler ses pierres dans la vallée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je mettrai à nu ses fondations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Toutes ses sculptures sacrées seront brisées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous ses salaires impurs seront livrés aux flammes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et je briserai toutes ses idoles:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: rassemblées grâce au salaire de la prostitution,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles deviendront un salaire de prostitution.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: C'est pourquoi je pleurerai, je me lamenterai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je marcherai déchaussé et nu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je pousserai des cris comme le chacal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des gémissements comme l'autruche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: En effet, sa plaie est douloureuse;
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle s'étend même à Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle pénètre jusqu'à la porte de mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu'à Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ne l'annoncez pas dans Gath,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne pleurez surtout pas!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Roulez-vous dans la poussière à Beth-Leaphra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Passe, habitante de Shaphir, dans la nudité et la honte!
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'habitante de Tsaanan n'ose pas sortir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le deuil de Beth-Haëtsel vous prive de son abri.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: L'habitante de Maroth tremble pour son bien-être,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car le malheur est venu de la part de l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu'à la porte de Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Attelle les coursiers à ton char,
- type: usfm
  marker: q1
  children:
  - type: text
    text: habitante de Lakis!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu as été pour la fille de Sion une première cause de péché,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car en toi on a trouvé les transgressions d'Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: C'est pourquoi tu renonceras à Morésheth-Gath;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les maisons d'Aczib seront une source trompeuse
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour les rois d'Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je t'amènerai un nouveau maître, habitante de Marésha;
- type: usfm
  marker: q1
  children:
  - type: text
    text: la gloire d'Israël
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La gloire d''Israël: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire l'élite ou le roi d'Israël.
    marker-yv: yv-n
  - type: text
    text: ' s''en ira jusqu''à Adullam.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Rase-toi, coupe ta chevelure
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de tes enfants chéris!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rends-toi chauve comme le vautour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ils s'en vont en exil loin de toi.
