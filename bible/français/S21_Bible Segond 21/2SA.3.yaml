document_id: 2SA.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Assassinat d'Abner
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: La guerre dura longtemps entre la famille de Saül et celle de David. David devenait de plus en plus fort, tandis que la famille de Saül s'affaiblissait de plus en plus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'David eut des fils à Hébron. Son aîné fut Amnon, qu''il eut d''Achinoam de Jizreel; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'le deuxième fut Kileab, d''Abigaïl de Carmel, la femme de Nabal; le troisième, Absalom, fils de Maaca, elle-même fille de Talmaï, roi de Gueshur; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'le quatrième, Adonija, fils de Haggith; le cinquième, Shephathia, fils d''Abithal; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: le sixième, Jithream, de sa femme Egla. Tels sont les fils que David eut à Hébron.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Durant la guerre entre la famille de Saül et celle de David, Abner avait tenu ferme pour la famille de Saül. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Or Saül avait eu une concubine du nom de Ritspa, qui était la fille d''Ajja. Ish-Bosheth dit à Abner: «Pourquoi as-tu eu des relations avec la concubine de mon père?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Abner fut très irrité des paroles d''Ish-Bosheth et répondit: «Suis-je une tête de chien à la solde de Juda? Je fais aujourd''hui preuve de bonté envers la famille de ton père Saül, envers ses frères et ses amis, je ne t''ai pas livré entre les mains de David, et tu me reproches maintenant une faute avec cette femme? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Que Dieu me traite avec la plus grande sévérité, si je n''agis pas vis-à-vis de David conformément à ce que l''Eternel lui a juré! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il a promis de transférer la royauté de la famille de Saül à la sienne et d''établir le trône de David sur Israël et sur Juda, depuis Dan jusqu''à Beer-Shéba.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ish-Bosheth n''osa pas répliquer un seul mot à Abner, parce qu''il avait peur de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Abner envoya des messagers à David pour lui dire de sa part: «A qui appartient le pays? Fais alliance avec moi et je t''aiderai à gagner la faveur de tout Israël.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il répondit: «Bien! Je vais faire alliance avec toi. Mais je te demande une chose: c''est de ne pas venir en ma présence à moins d''amener Mical, la fille de Saül, avec toi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Puis David envoya des messagers à Ish-Bosheth, le fils de Saül, pour lui dire: «Rends-moi ma femme Mical! Elle était devenue ma fiancée pour 100 prépuces de Philistins.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ish-Bosheth la fit prendre chez son mari Palthiel, fils de Laïsh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Son mari la suivit en pleurant jusqu''à Bachurim. Abner lui dit alors: «Va-t''en, retourne chez toi!» Et il retourna chez lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Abner eut un entretien avec les anciens d''Israël. Il leur dit: «Auparavant vous désiriez avoir David pour roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Agissez maintenant! En effet, l''Eternel a dit de lui: ‘C''est par David, mon serviteur, que je délivrerai mon peuple, Israël, de l''oppression des Philistins et de tous ses ennemis.’» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Abner parla aussi à la tribu de Benjamin et il alla rapporter à David à Hébron ce qu''avaient décidé Israël et toute la communauté de Benjamin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il arriva vers lui à Hébron, accompagné de 20 hommes, et David fit un festin en son honneur et en l''honneur de ses compagnons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Abner dit à David: «Je me lèverai et je partirai pour rassembler tout Israël vers mon seigneur le roi. Ils feront alliance avec toi et tu régneras partout où tu le désires.» David laissa partir Abner, qui s''en alla en paix.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Voici que Joab et les serviteurs de David revenaient d''une expédition, et ils ramenèrent un grand butin. Abner n''était plus auprès de David à Hébron, car celui-ci l''avait laissé partir, et il s''en était allé en paix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Lorsque Joab arriva avec toute sa troupe, on lui annonça: «Abner, fils de Ner, est venu trouver le roi. Celui-ci l''a laissé repartir et il s''en est allé en paix.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Joab se rendit chez le roi et dit: «Qu''as-tu fait? Abner est venu te trouver. Pourquoi l''as-tu laissé repartir en toute tranquillité? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tu connais Abner, fils de Ner! C''est pour te tromper qu''il est venu, pour connaître tes manœuvres et savoir tout ce que tu fais.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Après avoir quitté David, Joab envoya des messagers sur les traces d'Abner, et ils le ramenèrent de la citerne de Sira. David n'en savait rien.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Lorsque Abner fut de retour à Hébron, Joab le tira à l''écart à l''intérieur de la porte de la ville, comme pour lui parler en secret. Là il le frappa au ventre et le tua pour venger la mort de son frère Asaël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'David l''apprit par la suite et il dit alors: «Je suis pour toujours innocent, devant l''Eternel, du sang d''Abner, fils de Ner, et mon royaume l''est aussi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Que ce sang retombe sur Joab et sur toute sa famille! Qu'il y ait toujours chez lui quelqu'un qui soit atteint de blennorragie
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'De blennorragie: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: littéralement d'un écoulement, maladie sexuellement transmissible caractérisée par une infection purulente.
    marker-yv: yv-n
  - type: text
    text: ' ou de la lèpre, qui s''appuie sur un bâton, qui meure par l''épée ou qui manque de nourriture!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Ainsi, Joab et son frère Abishaï tuèrent Abner parce qu''il avait donné la mort à leur frère Asaël, à Gabaon, dans la bataille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'David dit à Joab et à tout le peuple qui était avec lui: «Déchirez vos habits, couvrez-vous de sacs et pleurez en marchant devant Abner!» Quant au roi David, il marcha derrière le cercueil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'On enterra Abner à Hébron. Le roi se mit à pleurer tout haut sur le tombeau d''Abner, et tout le peuple pleura. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Le roi composa une complainte sur Abner. Il dit: «Abner devait-il mourir comme un criminel? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Tu n'avais ni les mains attachées, ni les pieds emprisonnés! Tu es tombé comme on tombe devant des méchants.» Et tout le peuple se remit à pleurer sur Abner.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Tout le peuple s''approcha de David pour lui faire prendre de la nourriture pendant qu''il faisait encore jour, mais David fit le serment suivant: «Que Dieu me traite avec la plus grande sévérité, si je goûte du pain ou quoi que ce soit avant le coucher du soleil!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Tout le peuple prit connaissance de cette attitude et l''approuva. Ils approuvèrent tout ce qu''avait fait le roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Tout le peuple et tout Israël comprirent ce jour-là que ce n''était pas sur un ordre du roi qu''Abner, fils de Ner, avait été tué. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Le roi dit à ses serviteurs: «Ne savez-vous pas qu''un chef, un grand homme, est tombé aujourd''hui en Israël? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Je suis encore faible, même si j'ai été consacré roi par onction, et ces hommes, les fils de Tseruja, sont trop puissants pour moi. Que l'Eternel traite conformément à sa méchanceté celui qui fait le mal!»
