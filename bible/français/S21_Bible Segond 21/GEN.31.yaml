document_id: GEN.31,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Jacob entendit les propos des fils de Laban. Ils disaient: «Jacob a pris tout ce qui appartenait à notre père et c''est grâce aux biens de notre père qu''il s''est constitué toute cette richesse.» '
  '10':
  - type: text
    content: 'A l''époque où les brebis entraient en chaleur, j''ai levé les yeux et j''ai vu en rêve que les boucs qui s''accouplaient avec les brebis étaient rayés, tachetés et marquetés. '
  '11':
  - type: text
    content: 'L''ange de Dieu m''a dit en rêve: ‘Jacob!’ J''ai répondu: ‘Me voici!’ '
  '12':
  - type: text
    content: 'Il a dit: ‘Lève les yeux et regarde: tous les boucs qui s''accouplent avec les brebis sont rayés, tachetés et marquetés, car j''ai vu tout ce que te fait Laban. '
  '13':
  - type: text
    content: Je suis le Dieu de Béthel où tu as consacré par onction un monument, où tu m'as fait un vœu. Maintenant, lève-toi, quitte ce pays et retourne au pays de ta naissance.’»
  '14':
  - type: text
    content: 'Rachel et Léa lui répondirent: «Avons-nous encore une part et un héritage chez notre père? '
  '15':
  - type: text
    content: 'Ne sommes-nous pas considérées par lui comme des étrangères, puisqu''il nous a vendues et a même mangé notre argent? '
  '16':
  - type: text
    content: Toute la richesse que Dieu a enlevée à notre père nous appartient, à nous et à nos enfants. Fais maintenant tout ce que Dieu t'a dit.»
  '17':
  - type: text
    content: 'Jacob se leva donc et fit monter ses enfants et ses femmes sur les chameaux. '
  '18':
  - type: text
    content: 'Il emmena tout son troupeau et tous les biens qu''il possédait, le troupeau qui lui appartenait, dont il était devenu propriétaire à Paddan-Aram, et il se rendit vers son père Isaac au pays de Canaan. '
  '19':
  - type: text
    content: Laban était parti tondre ses brebis, et Rachel vola les théraphim
  - type: note
    content: 'Théraphim: figurines représentant les dieux protecteurs de la maison familiale, associées au culte familial des ancêtres dans les civilisations antiques.'
  - type: text
    content: ' de son père. '
  '2':
  - type: text
    content: 'Jacob remarqua aussi le visage de Laban: il n''avait plus la même attitude qu''avant vis-à-vis de lui. '
  '20':
  - type: text
    content: 'De son côté, Jacob trompa Laban l''Araméen en ne l''avertissant pas de son départ '
  '21':
  - type: text
    content: et s'enfuit avec tout ce qui lui appartenait. Il se leva, traversa l'Euphrate et se dirigea vers la région montagneuse de Galaad.
  - type: heading
    content: Jacob poursuivi par Laban
  '22':
  - type: text
    content: 'Trois jours plus tard, on annonça à Laban que Jacob s''était enfui. '
  '23':
  - type: text
    content: 'Il prit ses frères avec lui, le poursuivit durant sept jours de marche et le rattrapa dans la région montagneuse de Galaad. '
  '24':
  - type: text
    content: 'Cependant, au cours de la nuit Dieu apparut en rêve à Laban l''Araméen et lui dit: «Garde-toi de parler à Jacob, que ce soit en bien ou en mal!» '
  '25':
  - type: text
    content: Laban rattrapa donc Jacob alors que celui-ci avait planté sa tente sur la montagne. Laban planta aussi la sienne, avec ses frères, dans la région montagneuse de Galaad.
  '26':
  - type: text
    content: 'Alors Laban dit à Jacob: «Qu''as-tu fait? Pourquoi m''as-tu trompé et emmènes-tu mes filles comme des prisonnières de guerre? '
  '27':
  - type: text
    content: 'Pourquoi as-tu pris la fuite en cachette et m''as-tu trompé, au lieu de m''avertir? Je t''aurais laissé partir au milieu de la joie et des chants, au son du tambourin et de la harpe. '
  '28':
  - type: text
    content: 'Tu ne m''as pas permis d''embrasser mes petits-enfants et mes filles! Tu t''es comporté de façon stupide. '
  '29':
  - type: text
    content: 'Ma main est assez forte pour vous faire du mal, mais le Dieu de votre père m''a dit hier: ‘Garde-toi de parler à Jacob, que ce soit en bien ou en mal!’ '
  '3':
  - type: text
    content: 'C''est alors que l''Eternel dit à Jacob: «Retourne dans le pays de tes pères et dans ton lieu de naissance, et je serai avec toi.»'
  '30':
  - type: text
    content: Et maintenant que tu es parti parce que tu languissais après le foyer de ton père, pourquoi as-tu volé mes dieux?»
  '31':
  - type: text
    content: 'Jacob répondit à Laban: «C''est que j''avais peur. Je me suis dit que tu m''enlèverais peut-être tes filles. '
  '32':
  - type: text
    content: 'Quant à celui auprès duquel tu trouverais tes dieux, qu''il cesse de vivre! Devant les membres de notre parenté, reconnais ce qui t''appartient chez moi et prends-le.» Jacob ne savait pas que Rachel les avait volés. '
  '33':
  - type: text
    content: 'Laban entra dans la tente de Jacob, dans celle de Léa, dans celle des deux servantes, et il ne trouva rien. Il sortit de la tente de Léa et entra dans celle de Rachel. '
  '34':
  - type: text
    content: 'Rachel avait pris les théraphim, les avait mis sous le bât du chameau et s''était assise dessus. Laban fouilla toute la tente et ne trouva rien. '
  '35':
  - type: text
    content: 'Elle dit à son père: «Mon seigneur, ne te fâche pas si je ne peux pas me lever devant toi, car je suis indisposée.» Il chercha les théraphim et ne les trouva pas.'
  '36':
  - type: text
    content: 'Jacob se fâcha et chercha querelle à Laban. Il reprit la parole et lui dit: «Quel est mon crime, quel est mon péché, pour que tu me poursuives avec tant d''ardeur? '
  '37':
  - type: text
    content: 'Quand tu as fouillé toutes mes affaires, qu''as-tu trouvé des affaires de ta maison? Dépose-le ici devant nos parentés respectives, et qu''elles soient juges entre nous deux. '
  '38':
  - type: text
    content: 'Voilà 20 ans que j''ai passés chez toi. Tes brebis et tes chèvres n''ont pas avorté et je n''ai pas mangé les béliers de ton troupeau. '
  '39':
  - type: text
    content: 'Je ne t''ai pas rapporté de bête trouvée déchiquetée, j''en ai payé le dédommagement. Tu me redemandais ce qu''on me volait de jour et ce qu''on me volait de nuit. '
  '4':
  - type: text
    content: 'Jacob fit appeler Rachel et Léa aux champs, vers son troupeau. '
  '40':
  - type: text
    content: 'La chaleur me dévorait pendant le jour et le froid pendant la nuit, et le sommeil fuyait mes yeux. '
  '41':
  - type: text
    content: 'Voilà 20 ans que j''ai passés chez toi. Je t''ai servi 14 ans pour tes deux filles, 6 ans pour ton troupeau, et tu as changé dix fois mon salaire. '
  '42':
  - type: text
    content: Si le Dieu de mon père, le Dieu d'Abraham, celui que craint Isaac, n'avait pas été en ma faveur, tu m'aurais maintenant renvoyé les mains vides. Dieu a vu ma peine et le travail de mes mains, et hier il a prononcé son jugement.»
  '43':
  - type: text
    content: 'Laban répondit à Jacob: «Ces filles sont les miennes, ces enfants sont les miens, ce troupeau est le mien et tout ce que tu vois m''appartient. Que puis-je faire aujourd''hui pour mes filles ou pour leurs enfants, ceux qu''elles ont mis au monde? '
  '44':
  - type: text
    content: Viens maintenant! Concluons une alliance, toi et moi, et que quelque chose serve de témoignage entre nous!»
  '45':
  - type: text
    content: 'Jacob prit une pierre et la dressa en guise de monument. '
  '46':
  - type: text
    content: 'Jacob dit aux membres de sa parenté: «Ramassez des pierres.» Ils prirent des pierres et firent un tas. Ils mangèrent là sur le tas. '
  '47':
  - type: text
    content: 'Laban l''appela Jegar-Sahadutha, et Jacob l''appela Galed. '
  '48':
  - type: text
    content: 'Laban dit: «Que ce tas serve aujourd''hui de témoignage entre toi et moi!» C''est pourquoi on lui a donné le nom de Galed. '
  '49':
  - type: text
    content: 'On l''appelle aussi Mitspa, parce que Laban dit: «Que l''Eternel veille sur toi et sur moi, quand nous nous serons perdus de vue, tous les deux. '
  '5':
  - type: text
    content: 'Il leur dit: «Je vois au visage de votre père qu''il n''a plus la même attitude qu''avant envers moi. Cependant, le Dieu de mon père a été avec moi. '
  '50':
  - type: text
    content: 'Si tu maltraites mes filles et si tu prends encore d''autres femmes, ce n''est pas un homme qui sera avec nous, fais-y bien attention! C''est Dieu qui sera témoin entre toi et moi.» '
  '51':
  - type: text
    content: 'Laban dit à Jacob: «Vois ce tas de pierres et ce monument que j''ai placés entre toi et moi: '
  '52':
  - type: text
    content: 'ils seront témoins que je ne dépasserai pas ce tas dans ta direction et que, de ton côté, tu ne dépasseras pas ce tas et ce monument dans ma direction avec de mauvaises intentions. '
  '53':
  - type: text
    content: 'Que le Dieu d''Abraham et le Dieu de Nachor – c''est-à-dire le Dieu de leur ancêtre – soient juges entre nous!» Jacob prêta serment au nom de celui que craignait son père Isaac. '
  '54':
  - type: text
    content: Jacob offrit un sacrifice sur la montagne et invita les membres de sa parenté à manger. Ils mangèrent donc et passèrent la nuit sur la montagne.
  '6':
  - type: text
    content: 'Vous savez vous-mêmes que j''ai servi votre père de toute ma force. '
  '7':
  - type: text
    content: 'Quant à votre père, il m''a trompé et a changé dix fois mon salaire, mais Dieu ne lui a pas permis de me faire du mal. '
  '8':
  - type: text
    content: 'Quand il disait: ‘Les tachetés seront ton salaire’, toutes les brebis faisaient des petits tachetés, et quand il disait: ‘Les rayés seront ton salaire’, toutes les brebis faisaient des petits rayés. '
  '9':
  - type: text
    content: 'Dieu a pris à votre père son troupeau et me l''a donné. '
