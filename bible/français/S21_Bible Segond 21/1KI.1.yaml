document_id: 1KI.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Règne de Salomon
  - type: heading
    content: 1.1–11.43
  - type: heading
    content: Vieillesse de David et prétentions d'Adonija
  - type: text
    content: 'Le roi David était vieux, il était d''un âge avancé. On le couvrait d''habits, mais il ne parvenait pas à se réchauffer. '
  '10':
  - type: text
    content: Toutefois, il n'invita pas le prophète Nathan, ni Benaja, ni les vaillants hommes de David, ni son frère Salomon.
  - type: heading
    content: Désignation de Salomon comme roi
  '11':
  - type: text
    content: 'Alors Nathan dit à Bath-Shéba, la mère de Salomon: «N''as-tu pas appris qu''Adonija, le fils de Haggith, est devenu roi sans que notre seigneur David le sache? '
  '12':
  - type: text
    content: 'Va maintenant! Je vais te donner un conseil, afin que tu sauves ta vie et celle de ton fils Salomon. '
  '13':
  - type: text
    content: 'Va, entre chez le roi David et dis-lui: ‘Mon seigneur le roi, ne m''avais-tu pas juré, à moi ta servante, que ce serait mon fils Salomon qui régnerait après toi et que ce serait lui qui s''assiérait sur ton trône? Pourquoi donc Adonija est-il devenu roi?’ '
  '14':
  - type: text
    content: Tu seras encore là, en train de parler avec le roi, quand j'entrerai moi-même après toi, et je compléterai tes paroles.»
  '15':
  - type: text
    content: 'Bath-Shéba alla trouver le roi dans sa chambre. Il était très vieux et Abishag, la Sunamite, le servait. '
  '16':
  - type: text
    content: 'Bath-Shéba s''inclina et se prosterna devant le roi, qui lui dit: «Qu''as-tu?» '
  '17':
  - type: text
    content: 'Elle lui répondit: «Mon seigneur, tu avais juré à ta servante par l''Eternel, ton Dieu, que ce serait mon fils Salomon qui régnerait après toi et que ce serait lui qui s''assiérait sur ton trône. '
  '18':
  - type: text
    content: 'Et maintenant, voici que c''est Adonija qui est devenu roi et tu ne le sais pas, mon seigneur le roi! '
  '19':
  - type: text
    content: 'Il a sacrifié des bœufs, des veaux gras et des brebis en grande quantité, et il a invité tous les fils du roi ainsi que le prêtre Abiathar et Joab, le chef de l''armée, mais il n''a pas invité ton serviteur Salomon. '
  '2':
  - type: text
    content: 'Ses serviteurs lui dirent: «Que l''on cherche une jeune fille vierge pour toi, mon seigneur le roi. Qu''elle soit au service du roi, qu''elle le soigne et couche à ses côtés. Ainsi, mon seigneur le roi se réchauffera.» '
  '20':
  - type: text
    content: 'Mon seigneur le roi, tout Israël a les yeux fixés sur toi pour que tu lui annonces qui s''assiéra sur ton trône après toi. '
  '21':
  - type: text
    content: Sinon, lorsque mon seigneur le roi sera couché avec ses ancêtres, mon fils Salomon et moi serons traités comme des coupables.»
  '22':
  - type: text
    content: 'Elle parlait encore avec le roi quand le prophète Nathan arriva. '
  '23':
  - type: text
    content: 'On annonça au roi: «Voici Nathan le prophète!» Il entra dans la présence du roi et se prosterna devant lui, le visage contre terre. '
  '24':
  - type: text
    content: 'Puis Nathan dit: «Mon seigneur le roi, c''est donc toi qui as dit qu''Adonija régnerait après toi et que ce serait lui qui s''assiérait sur ton trône! '
  '25':
  - type: text
    content: 'En effet, il est descendu aujourd''hui sacrifier des bœufs, des veaux gras et des brebis en grande quantité, et il a invité tous les fils du roi ainsi que les chefs de l''armée et le prêtre Abiathar. Les voici en train de manger et de boire en sa présence, et ils disent: ‘Vive le roi Adonija!’ '
  '26':
  - type: text
    content: 'Mais il n''a invité ni moi, qui suis ton serviteur, ni le prêtre Tsadok, ni Benaja, le fils de Jehojada, ni ton serviteur Salomon. '
  '27':
  - type: text
    content: Est-ce bien sur ton ordre, mon seigneur le roi, que cela se passe ainsi, sans que tu aies annoncé à ton serviteur qui doit s'asseoir sur ton trône après toi?»
  '28':
  - type: text
    content: 'Le roi David répondit: «Appelez-moi Bath-Shéba!» Elle entra et se présenta devant le roi. '
  '29':
  - type: text
    content: 'Le roi prêta alors ce serment: «L''Eternel qui m''a délivré de toutes les détresses est vivant! '
  '3':
  - type: text
    content: 'On chercha dans tout le territoire d''Israël une fille jeune et belle, et l''on trouva Abishag, la Sunamite. On la conduisit auprès du roi. '
  '30':
  - type: text
    content: 'Je vais agir aujourd''hui conformément à ce que je t''ai juré par l''Eternel, le Dieu d''Israël, lorsque j''ai dit: ‘C''est ton fils Salomon qui régnera après moi, c''est lui qui s''assiéra sur mon trône à ma place.’» '
  '31':
  - type: text
    content: 'Bath-Shéba s''inclina le visage contre terre et se prosterna devant le roi. Puis elle dit: «Que mon seigneur le roi David vive éternellement!»'
  '32':
  - type: text
    content: 'Le roi David dit ensuite: «Appelez-moi le prêtre Tsadok, le prophète Nathan et Benaja, le fils de Jehojada.» Et ils entrèrent dans la présence du roi. '
  '33':
  - type: text
    content: 'Le roi leur dit: «Prenez avec vous les serviteurs de votre seigneur, faites monter mon fils Salomon sur ma mule et faites-le descendre à Guihon. '
  '34':
  - type: text
    content: 'Là, le prêtre Tsadok et le prophète Nathan le consacreront par onction comme roi sur Israël. Vous sonnerez de la trompette et vous direz: ‘Vive le roi Salomon!’ '
  '35':
  - type: text
    content: 'Vous remonterez en marchant derrière lui. Il viendra s''asseoir sur mon trône et il régnera à ma place. C''est lui que j''ai chargé d''être le chef d''Israël et de Juda.» '
  '36':
  - type: text
    content: 'Benaja, le fils de Jehojada, répondit au roi: «Amen! Que l''Eternel, le Dieu de mon seigneur le roi, parle ainsi! '
  '37':
  - type: text
    content: Que l'Eternel soit avec Salomon comme il a été avec mon seigneur le roi et qu'il rende son trône plus grand encore que celui de mon seigneur le roi David!»
  '38':
  - type: text
    content: Alors le prêtre Tsadok descendit avec le prophète Nathan ainsi qu'avec Benaja, le fils de Jehojada, les Kéréthiens et les Péléthiens
  - type: note
    content: 'Les Kéréthiens et les Péléthiens: membres de la garde rapprochée de David.'
  - type: text
    content: '. Ils firent monter Salomon sur la mule du roi David et le conduisirent à Guihon. '
  '39':
  - type: text
    content: 'Le prêtre Tsadok prit la corne d''huile dans le tabernacle et il consacra Salomon par onction. On sonna de la trompette et tout le peuple dit: «Vive le roi Salomon!» '
  '4':
  - type: text
    content: Cette jeune fille était très belle. Elle soigna le roi et le servit, mais le roi n'eut pas de relations sexuelles avec elle.
  '40':
  - type: text
    content: Tout le peuple monta après lui, en jouant de la flûte. Ils manifestaient une joie si grande que la terre tremblait sous leurs cris.
  '41':
  - type: text
    content: 'Adonija et tous les invités qui étaient avec lui entendirent tout cela au moment où ils finissaient de manger. Joab, entendant le son de la trompette, dit: «Pourquoi ce vacarme dans Jérusalem?» '
  '42':
  - type: text
    content: 'Il parlait encore lorsque Jonathan, le fils du prêtre Abiathar, arriva. Adonija lui dit: «Approche-toi, car tu es un vaillant homme et tu apportes de bonnes nouvelles.» '
  '43':
  - type: text
    content: '«Au contraire, répondit Jonathan à Adonija, notre seigneur le roi David a désigné Salomon comme roi. '
  '44':
  - type: text
    content: 'Il a envoyé avec lui le prêtre Tsadok, le prophète Nathan ainsi que Benaja, le fils de Jehojada, les Kéréthiens et les Péléthiens, et ils l''ont fait monter sur la mule du roi. '
  '45':
  - type: text
    content: 'Le prêtre Tsadok et le prophète Nathan l''ont consacré par onction comme roi à Guihon. Puis ils sont remontés de là-bas en manifestant leur joie et Jérusalem en est tout agitée. C''est ce bruit que vous avez entendu. '
  '46':
  - type: text
    content: 'Salomon s''est même assis sur le trône royal, '
  '47':
  - type: text
    content: 'et les serviteurs du roi sont venus bénir notre seigneur le roi David en disant: ‘Que Dieu rende le nom de Salomon plus célèbre que le tien et qu''il rende son trône plus grand que le tien!’ Alors le roi s''est prosterné sur son lit '
  '48':
  - type: text
    content: 'avant de déclarer: ‘Béni soit l''Eternel, le Dieu d''Israël, qui m''a donné aujourd''hui un successeur et qui m''a permis de le voir!’»'
  '49':
  - type: text
    content: 'Tous les invités d''Adonija furent terrifiés. Ils se levèrent et partirent, chacun de son côté. '
  '5':
  - type: text
    content: 'Adonija, le fils de Haggith, se laissa emporter par l''orgueil au point de dire: «C''est moi qui serai roi!» Il se procura un char et des cavaliers, ainsi que 50 hommes qui couraient devant lui. '
  '50':
  - type: text
    content: 'Adonija eut peur de Salomon. Il se leva aussi et partit s''accrocher aux cornes de l''autel. '
  '51':
  - type: text
    content: 'On vint dire à Salomon: «Voici qu''Adonija a peur de toi. Il tient les cornes de l''autel en disant: ‘Que le roi Salomon me jure aujourd''hui qu''il ne me fera pas mourir, moi son serviteur, par l''épée!’» '
  '52':
  - type: text
    content: 'Salomon dit: «S''il se comporte en homme de valeur, pas un de ses cheveux ne tombera par terre; mais si l''on trouve en lui de la méchanceté, il mourra.» '
  '53':
  - type: text
    content: 'Puis le roi Salomon envoya des hommes le faire descendre de l''autel. Il vint se prosterner devant le roi Salomon et Salomon lui dit: «Va chez toi!»'
  '6':
  - type: text
    content: 'Son père ne lui avait pas adressé un reproche de sa vie en lui disant: «Pourquoi agis-tu de cette manière?» De plus, Adonija était très beau et il était né après Absalom. '
  '7':
  - type: text
    content: 'Il eut un entretien avec Joab, le fils de Tseruja, ainsi qu''avec le prêtre Abiathar, et ils embrassèrent son parti. '
  '8':
  - type: text
    content: 'En revanche, ni le prêtre Tsadok, ni Benaja, le fils de Jehojada, ni le prophète Nathan, ni Shimeï, ni Reï, ni les vaillants hommes de David ne se rallièrent à lui. '
  '9':
  - type: text
    content: Adonija sacrifia des brebis, des bœufs et des veaux gras près de la pierre de Zohéleth, qui se trouve à côté d'En-Roguel
  - type: note
    content: 'En-Roguel: littéralement source du blanchisseur, située près de Jérusalem.'
  - type: text
    content: ', et il invita tous ses frères, les fils du roi, ainsi que tous les hommes de Juda qui étaient au service du roi. '
