document_id: PRO.22,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une bonne réputation est préférable à de grandes richesses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la grâce vaut mieux que l'or et l'argent.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chasse le moqueur et le conflit s'en ira avec lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la contestation et le mépris prendront fin.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui aime la pureté du cœur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: a la grâce sur les lèvres et le roi pour ami.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les yeux de l'Eternel veillent sur la connaissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il s'oppose aux propos du traître.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le paresseux dit: «Il y a un lion dehors!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je serai tué dans les rues!»
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La bouche des inconnues est une fosse profonde;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui contre qui l'Eternel est irrité y tombera.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La folie est attachée au cœur de l'enfant;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le bâton de la discipline l'éloignera de lui.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui exploite le faible pour augmenter son bien
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou qui donne au riche n'arrive qu'à la misère.
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Paroles des sages
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 22.17–24.34
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Attention aux relations
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tends l'oreille, écoute les paroles des sages!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Applique ton cœur à ma connaissance!
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, il est bon que tu les gardes au fond de toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'elles soient toutes présentes sur tes lèvres.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pour que ta confiance soit placée en l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je veux t'instruire aujourd'hui, oui, toi.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le riche et le pauvre se rencontrent:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est l'Eternel qui les a faits l'un et l'autre.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N'ai-je pas déjà mis par écrit à ton intention
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des conseils et des paroles de connaissance
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour t'enseigner des choses sûres, des paroles vraies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que tu répondes par des paroles vraies à celui qui t'envoie?
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne dépouille pas le faible parce qu'il est faible
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et n'écrase pas le malheureux à la porte de la ville
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ala porte de la ville: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'était le lieu des délibérations, des affaires et du tribunal.
      marker-yv: yv-n
    - type: text
      text: ','
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l'Eternel défendra leur cause
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et dépouillera de leur vie ceux qui les auront dépouillés.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne fréquente pas l'homme colérique,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne va pas avec l'homme violent!
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu risquerais de t'habituer à ses sentiers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils deviendraient un piège pour toi.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne figure pas parmi ceux qui prennent des engagements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'qui se portent garants pour des dettes:'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si tu n'as pas de quoi payer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pourquoi voudrais-tu qu'on enlève le lit sur lequel tu te couches?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne déplace pas la limite ancienne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celle que tes ancêtres ont fixée.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si tu vois un homme habile dans son travail,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est au service des rois qu'il se tiendra,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne restera pas au service de gens obscurs.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'homme prudent voit le mal et se met à l'abri,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ceux qui manquent d'expérience vont de l'avant et en subissent les conséquences.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le fruit de l'humilité, de la crainte de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est la richesse, la gloire et la vie.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des épines et des pièges sont sur la voie de l'homme faux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui veille sur lui-même s'en éloigne.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eduque l'enfant d'après la voie qu'il doit suivre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même quand il sera vieux, il ne s'en écartera pas.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le riche domine sur les pauvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et celui qui emprunte est l'esclave de celui qui prête.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui sème l'injustice moissonnera le malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le bâton de sa colère sera brisé.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'homme au regard bienveillant sera béni
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu'il donne de son pain au plus faible.
