document_id: PRO.22,152
type_code: fra
verses:
  '1':
  - type: text
    content: Une bonne réputation est préférable à de grandes richesses,
  - type: text
    content: et la grâce vaut mieux que l'or et l'argent.
  '10':
  - type: text
    content: Chasse le moqueur et le conflit s'en ira avec lui,
  - type: text
    content: la contestation et le mépris prendront fin.
  '11':
  - type: text
    content: Celui qui aime la pureté du cœur
  - type: text
    content: a la grâce sur les lèvres et le roi pour ami.
  '12':
  - type: text
    content: Les yeux de l'Eternel veillent sur la connaissance,
  - type: text
    content: mais il s'oppose aux propos du traître.
  '13':
  - type: text
    content: 'Le paresseux dit: «Il y a un lion dehors!'
  - type: text
    content: Je serai tué dans les rues!»
  '14':
  - type: text
    content: La bouche des inconnues est une fosse profonde;
  - type: text
    content: celui contre qui l'Eternel est irrité y tombera.
  '15':
  - type: text
    content: La folie est attachée au cœur de l'enfant;
  - type: text
    content: le bâton de la discipline l'éloignera de lui.
  '16':
  - type: text
    content: Celui qui exploite le faible pour augmenter son bien
  - type: text
    content: ou qui donne au riche n'arrive qu'à la misère.
  - type: heading
    content: Paroles des sages
  - type: heading
    content: 22.17–24.34
  - type: heading
    content: Attention aux relations
  '17':
  - type: text
    content: Tends l'oreille, écoute les paroles des sages!
  - type: text
    content: Applique ton cœur à ma connaissance!
  '18':
  - type: text
    content: En effet, il est bon que tu les gardes au fond de toi
  - type: text
    content: et qu'elles soient toutes présentes sur tes lèvres.
  '19':
  - type: text
    content: Pour que ta confiance soit placée en l'Eternel,
  - type: text
    content: je veux t'instruire aujourd'hui, oui, toi.
  '2':
  - type: text
    content: 'Le riche et le pauvre se rencontrent:'
  - type: text
    content: c'est l'Eternel qui les a faits l'un et l'autre.
  '20':
  - type: text
    content: N'ai-je pas déjà mis par écrit à ton intention
  - type: text
    content: des conseils et des paroles de connaissance
  '21':
  - type: text
    content: pour t'enseigner des choses sûres, des paroles vraies,
  - type: text
    content: afin que tu répondes par des paroles vraies à celui qui t'envoie?
  '22':
  - type: text
    content: Ne dépouille pas le faible parce qu'il est faible
  - type: text
    content: et n'écrase pas le malheureux à la porte de la ville
  - type: note
    content: 'Ala porte de la ville: c''était le lieu des délibérations, des affaires et du tribunal.'
  - type: text
    content: ','
  '23':
  - type: text
    content: car l'Eternel défendra leur cause
  - type: text
    content: et dépouillera de leur vie ceux qui les auront dépouillés.
  '24':
  - type: text
    content: Ne fréquente pas l'homme colérique,
  - type: text
    content: ne va pas avec l'homme violent!
  '25':
  - type: text
    content: Tu risquerais de t'habituer à ses sentiers
  - type: text
    content: et ils deviendraient un piège pour toi.
  '26':
  - type: text
    content: Ne figure pas parmi ceux qui prennent des engagements,
  - type: text
    content: 'qui se portent garants pour des dettes:'
  '27':
  - type: text
    content: si tu n'as pas de quoi payer,
  - type: text
    content: pourquoi voudrais-tu qu'on enlève le lit sur lequel tu te couches?
  '28':
  - type: text
    content: Ne déplace pas la limite ancienne,
  - type: text
    content: celle que tes ancêtres ont fixée.
  '29':
  - type: text
    content: Si tu vois un homme habile dans son travail,
  - type: text
    content: c'est au service des rois qu'il se tiendra,
  - type: text
    content: il ne restera pas au service de gens obscurs.
  '3':
  - type: text
    content: L'homme prudent voit le mal et se met à l'abri,
  - type: text
    content: mais ceux qui manquent d'expérience vont de l'avant et en subissent les conséquences.
  '4':
  - type: text
    content: Le fruit de l'humilité, de la crainte de l'Eternel,
  - type: text
    content: c'est la richesse, la gloire et la vie.
  '5':
  - type: text
    content: Des épines et des pièges sont sur la voie de l'homme faux;
  - type: text
    content: celui qui veille sur lui-même s'en éloigne.
  '6':
  - type: text
    content: Eduque l'enfant d'après la voie qu'il doit suivre!
  - type: text
    content: Même quand il sera vieux, il ne s'en écartera pas.
  '7':
  - type: text
    content: Le riche domine sur les pauvres,
  - type: text
    content: et celui qui emprunte est l'esclave de celui qui prête.
  '8':
  - type: text
    content: Celui qui sème l'injustice moissonnera le malheur,
  - type: text
    content: et le bâton de sa colère sera brisé.
  '9':
  - type: text
    content: L'homme au regard bienveillant sera béni
  - type: text
    content: parce qu'il donne de son pain au plus faible.
