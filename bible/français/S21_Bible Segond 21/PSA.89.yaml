document_id: PSA.89,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Alliance de Dieu avec David
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Cantique d'Ethan l'Ezrachite.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: C'est toi qui maîtrises l'orgueil de la mer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand ses vagues se soulèvent, c'est toi qui les calmes.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Tu as écrasé l'Egypte, tu l'as transpercée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu as dispersé tes ennemis par la puissance de ton bras.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: C'est à toi qu'appartient le ciel, à toi aussi la terre;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est toi qui as fondé le monde et ce qu'il contient.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Tu as créé le nord et le sud;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Thabor et l'Hermon acclament ton nom.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Ton bras est puissant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ta main forte, ta droite élevée.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: La justice et le droit forment la base de ton trône,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la bonté et la vérité sont devant toi.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Heureux le peuple qui sait t''acclamer:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il marche à ta lumière, Eternel,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: il se réjouit sans cesse à cause de ton nom
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tire gloire de ta justice,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: car c'est toi qui fais sa beauté et sa puissance;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est ta faveur qui relève notre force.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Notre protecteur est à l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: notre roi appartient au Saint d'Israël.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Je chanterai toujours les bontés de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ma bouche fera connaître ta fidélité de génération en génération.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tu as parlé à tes fidèles dans une vision,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tu as dit: «J''ai prêté secours à un héros,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'ai choisi du milieu du peuple un jeune homme.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: J'ai trouvé mon serviteur David,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je l'ai désigné par onction avec mon huile sainte.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Ma main le soutiendra
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mon bras le fortifiera.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: L'ennemi ne pourra pas le tromper,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni le méchant l'opprimer.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: J'écraserai ses adversaires devant lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je frapperai ceux qui le détestent.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Ma fidélité et ma bonté l'accompagneront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sa force grandira par mon nom.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: J'étendrai sa domination sur la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son pouvoir sur les fleuves.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Lui-même fera appel à moi: ‘Tu es mon père,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon Dieu et le rocher de mon salut!’
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Et moi, je ferai de lui le premier-né,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le plus haut placé des rois de la terre.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Je lui conserverai toujours ma bonté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mon alliance lui sera assurée.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Oui, je le dis: «La bonté est édifiée pour toujours;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu fondes ta fidélité dans le ciel.»
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Je lui donnerai une descendance éternelle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son trône durera autant que le ciel.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Si ses fils abandonnent ma loi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne marchent pas suivant mes règles,
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: s'ils violent mes prescriptions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne respectent pas mes commandements,
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: je punirai leurs transgressions avec le bâton
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leurs fautes par des coups,
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: mais je ne lui retirerai pas ma bonté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je ne trahirai pas ma fidélité,
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: je ne violerai pas mon alliance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je ne changerai pas ce qui est sorti de mes lèvres.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: J'ai prêté une fois serment par ma sainteté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne mentirai pas à David.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Sa descendance subsistera toujours;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: son trône sera pareil au soleil devant moi,
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: comme la lune il sera établi éternellement.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le témoin qui est dans le ciel est fidèle.» '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Et pourtant, tu as rejeté, tu as repoussé celui que tu avais désigné par onction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu t'es irrité contre lui!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: J'ai fait alliance avec celui que j'ai choisi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'j''ai fait ce serment à mon serviteur David:'
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Tu as rompu l'alliance avec ton serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu as déshonoré sa couronne en la jetant par terre.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Tu as détruit toutes ses murailles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu as mis en ruine ses forteresses.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Tous les passants le dépouillent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est un objet de mépris pour ses voisins.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Tu as fortifié ses adversaires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu as réjoui tous ses ennemis;
  '44':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: tu as fait reculer le tranchant de son épée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu ne l'as pas soutenu dans le combat.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Tu as mis fin à sa splendeur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu as jeté son trône à terre;
  '46':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: tu as abrégé sa jeunesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tu l''as couvert de honte. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: Jusqu'à quand, Eternel, resteras-tu caché?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu'à quand ta fureur brûlera-t-elle comme le feu?
  '48':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: Rappelle-toi quelle est la durée de ma vie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour quel néant tu as créé tous les hommes.
  '49':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: Quel homme peut vivre sans voir la mort?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Qui peut sauver son âme du séjour des morts? '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: «J'affermirai ta descendance pour toujours
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et j''établirai ton trône pour l''éternité.» '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '50':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: Où sont, Seigneur, tes bontés d'autrefois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celles que, dans ta fidélité, tu avais promises par serment à David?
  '51':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: Souviens-toi, Seigneur, de la honte de tes serviteurs!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Souviens-toi que j'ai la charge de tous ces peuples nombreux!
  '52':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: Souviens-toi des insultes de tes ennemis, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de leurs insultes contre les pas de celui que tu as désigné par onction!
  '53':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: Béni soit éternellement l'Eternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Amen! Amen!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Le ciel célèbre tes merveilles, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ta fidélité dans l'assemblée des saints.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: En effet, qui, dans le ciel, peut se comparer à l'Eternel?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui est semblable à toi parmi les fils de Dieu?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Dieu est redoutable dans la grande assemblée des saints,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est terrible pour tous ceux qui l'entourent.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Eternel, Dieu de l'univers, qui est puissant comme toi?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, ta fidélité t'environne.
