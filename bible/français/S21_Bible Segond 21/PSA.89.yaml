document_id: PSA.89,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Alliance de Dieu avec David
  - type: text
    content: Cantique d'Ethan l'Ezrachite.
  '10':
  - type: text
    content: C'est toi qui maîtrises l'orgueil de la mer;
  - type: text
    content: quand ses vagues se soulèvent, c'est toi qui les calmes.
  '11':
  - type: text
    content: Tu as écrasé l'Egypte, tu l'as transpercée,
  - type: text
    content: tu as dispersé tes ennemis par la puissance de ton bras.
  '12':
  - type: text
    content: C'est à toi qu'appartient le ciel, à toi aussi la terre;
  - type: text
    content: c'est toi qui as fondé le monde et ce qu'il contient.
  '13':
  - type: text
    content: Tu as créé le nord et le sud;
  - type: text
    content: le Thabor et l'Hermon acclament ton nom.
  '14':
  - type: text
    content: Ton bras est puissant,
  - type: text
    content: ta main forte, ta droite élevée.
  '15':
  - type: text
    content: La justice et le droit forment la base de ton trône,
  - type: text
    content: la bonté et la vérité sont devant toi.
  '16':
  - type: text
    content: 'Heureux le peuple qui sait t''acclamer:'
  - type: text
    content: il marche à ta lumière, Eternel,
  '17':
  - type: text
    content: il se réjouit sans cesse à cause de ton nom
  - type: text
    content: et tire gloire de ta justice,
  '18':
  - type: text
    content: car c'est toi qui fais sa beauté et sa puissance;
  - type: text
    content: c'est ta faveur qui relève notre force.
  '19':
  - type: text
    content: Notre protecteur est à l'Eternel,
  - type: text
    content: notre roi appartient au Saint d'Israël.
  '2':
  - type: text
    content: Je chanterai toujours les bontés de l'Eternel,
  - type: text
    content: ma bouche fera connaître ta fidélité de génération en génération.
  '20':
  - type: text
    content: Tu as parlé à tes fidèles dans une vision,
  - type: text
    content: 'tu as dit: «J''ai prêté secours à un héros,'
  - type: text
    content: j'ai choisi du milieu du peuple un jeune homme.
  '21':
  - type: text
    content: J'ai trouvé mon serviteur David,
  - type: text
    content: je l'ai désigné par onction avec mon huile sainte.
  '22':
  - type: text
    content: Ma main le soutiendra
  - type: text
    content: et mon bras le fortifiera.
  '23':
  - type: text
    content: L'ennemi ne pourra pas le tromper,
  - type: text
    content: ni le méchant l'opprimer.
  '24':
  - type: text
    content: J'écraserai ses adversaires devant lui
  - type: text
    content: et je frapperai ceux qui le détestent.
  '25':
  - type: text
    content: Ma fidélité et ma bonté l'accompagneront,
  - type: text
    content: et sa force grandira par mon nom.
  '26':
  - type: text
    content: J'étendrai sa domination sur la mer,
  - type: text
    content: et son pouvoir sur les fleuves.
  '27':
  - type: text
    content: 'Lui-même fera appel à moi: ‘Tu es mon père,'
  - type: text
    content: mon Dieu et le rocher de mon salut!’
  '28':
  - type: text
    content: Et moi, je ferai de lui le premier-né,
  - type: text
    content: le plus haut placé des rois de la terre.
  '29':
  - type: text
    content: Je lui conserverai toujours ma bonté,
  - type: text
    content: et mon alliance lui sera assurée.
  '3':
  - type: text
    content: 'Oui, je le dis: «La bonté est édifiée pour toujours;'
  - type: text
    content: tu fondes ta fidélité dans le ciel.»
  '30':
  - type: text
    content: Je lui donnerai une descendance éternelle,
  - type: text
    content: et son trône durera autant que le ciel.
  '31':
  - type: text
    content: Si ses fils abandonnent ma loi
  - type: text
    content: et ne marchent pas suivant mes règles,
  '32':
  - type: text
    content: s'ils violent mes prescriptions
  - type: text
    content: et ne respectent pas mes commandements,
  '33':
  - type: text
    content: je punirai leurs transgressions avec le bâton
  - type: text
    content: et leurs fautes par des coups,
  '34':
  - type: text
    content: mais je ne lui retirerai pas ma bonté
  - type: text
    content: et je ne trahirai pas ma fidélité,
  '35':
  - type: text
    content: je ne violerai pas mon alliance
  - type: text
    content: et je ne changerai pas ce qui est sorti de mes lèvres.
  '36':
  - type: text
    content: J'ai prêté une fois serment par ma sainteté,
  - type: text
    content: je ne mentirai pas à David.
  '37':
  - type: text
    content: Sa descendance subsistera toujours;
  - type: text
    content: son trône sera pareil au soleil devant moi,
  '38':
  - type: text
    content: comme la lune il sera établi éternellement.
  - type: text
    content: 'Le témoin qui est dans le ciel est fidèle.» '
  - type: text
    content: – Pause.
  '39':
  - type: text
    content: Et pourtant, tu as rejeté, tu as repoussé celui que tu avais désigné par onction,
  - type: text
    content: tu t'es irrité contre lui!
  '4':
  - type: text
    content: J'ai fait alliance avec celui que j'ai choisi,
  - type: text
    content: 'j''ai fait ce serment à mon serviteur David:'
  '40':
  - type: text
    content: Tu as rompu l'alliance avec ton serviteur,
  - type: text
    content: tu as déshonoré sa couronne en la jetant par terre.
  '41':
  - type: text
    content: Tu as détruit toutes ses murailles,
  - type: text
    content: tu as mis en ruine ses forteresses.
  '42':
  - type: text
    content: Tous les passants le dépouillent,
  - type: text
    content: il est un objet de mépris pour ses voisins.
  '43':
  - type: text
    content: Tu as fortifié ses adversaires,
  - type: text
    content: tu as réjoui tous ses ennemis;
  '44':
  - type: text
    content: tu as fait reculer le tranchant de son épée
  - type: text
    content: et tu ne l'as pas soutenu dans le combat.
  '45':
  - type: text
    content: Tu as mis fin à sa splendeur
  - type: text
    content: et tu as jeté son trône à terre;
  '46':
  - type: text
    content: tu as abrégé sa jeunesse,
  - type: text
    content: 'tu l''as couvert de honte. '
  - type: text
    content: – Pause.
  '47':
  - type: text
    content: Jusqu'à quand, Eternel, resteras-tu caché?
  - type: text
    content: Jusqu'à quand ta fureur brûlera-t-elle comme le feu?
  '48':
  - type: text
    content: Rappelle-toi quelle est la durée de ma vie
  - type: text
    content: et pour quel néant tu as créé tous les hommes.
  '49':
  - type: text
    content: Quel homme peut vivre sans voir la mort?
  - type: text
    content: 'Qui peut sauver son âme du séjour des morts? '
  - type: text
    content: – Pause.
  '5':
  - type: text
    content: «J'affermirai ta descendance pour toujours
  - type: text
    content: 'et j''établirai ton trône pour l''éternité.» '
  - type: text
    content: – Pause.
  '50':
  - type: text
    content: Où sont, Seigneur, tes bontés d'autrefois,
  - type: text
    content: celles que, dans ta fidélité, tu avais promises par serment à David?
  '51':
  - type: text
    content: Souviens-toi, Seigneur, de la honte de tes serviteurs!
  - type: text
    content: Souviens-toi que j'ai la charge de tous ces peuples nombreux!
  '52':
  - type: text
    content: Souviens-toi des insultes de tes ennemis, Eternel,
  - type: text
    content: de leurs insultes contre les pas de celui que tu as désigné par onction!
  '53':
  - type: text
    content: Béni soit éternellement l'Eternel!
  - type: text
    content: Amen! Amen!
  '6':
  - type: text
    content: Le ciel célèbre tes merveilles, Eternel,
  - type: text
    content: et ta fidélité dans l'assemblée des saints.
  '7':
  - type: text
    content: En effet, qui, dans le ciel, peut se comparer à l'Eternel?
  - type: text
    content: Qui est semblable à toi parmi les fils de Dieu?
  '8':
  - type: text
    content: Dieu est redoutable dans la grande assemblée des saints,
  - type: text
    content: il est terrible pour tous ceux qui l'entourent.
  '9':
  - type: text
    content: Eternel, Dieu de l'univers, qui est puissant comme toi?
  - type: text
    content: Eternel, ta fidélité t'environne.
