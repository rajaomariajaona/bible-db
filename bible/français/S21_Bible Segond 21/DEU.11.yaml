document_id: DEU.11,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Promesses et menaces
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Tu aimeras l''Eternel, ton Dieu, et tu respecteras toujours ses ordres, ses prescriptions, ses règles et ses commandements. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, le pays que tu vas posséder n''est pas comme l''Egypte d''où vous êtes sortis: tu jetais ta semence dans les champs et tu devais les irriguer toi-même, comme un jardin potager. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le pays que vous allez posséder est un pays de montagnes et de vallées, qui boit l''eau de pluie du ciel. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C'est un pays dont l'Eternel, ton Dieu, prend soin et sur lequel l'Eternel, ton Dieu, a constamment les yeux, du début à la fin de l'année.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Si vous obéissez aux commandements que je vous prescris aujourd''hui, si vous aimez l''Eternel, votre Dieu, et si vous le servez de tout votre cœur et de toute votre âme, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'je donnerai au moment voulu la pluie à votre pays, les premières et les dernières pluies, et tu récolteras ton blé, ton vin nouveau et ton huile. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je mettrai aussi dans tes champs de l''herbe pour ton bétail et tu mangeras à satiété. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Veillez bien sur vous-mêmes: ne vous laissez pas persuader, dans votre cœur, de vous détourner pour servir d''autres dieux et vous prosterner devant eux. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La colère de l'Eternel s'enflammerait alors contre vous. Il fermerait le ciel et il n'y aurait pas de pluie. La terre ne donnerait plus ses produits et vous mourriez bien vite dans le bon pays que l'Eternel vous donne.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Mettez mes commandements dans votre cœur et dans votre âme. Vous les attacherez comme un signe sur vos mains et ils seront comme une marque entre vos yeux. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous les enseignerez à vos enfants et vous leur en parlerez quand tu seras chez toi, quand tu seras en voyage, quand tu te coucheras et quand tu te lèveras. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Reconnaissez aujourd''hui – car je ne parle pas à vos enfants, qui n''ont pas connu ni vu tout cela – la façon dont l''Eternel votre Dieu vous a éduqués, sa grandeur, sa puissance et sa force, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu les écriras sur les montants de la porte de ta maison et sur les portes de tes villes. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors votre vie et celle de vos enfants dans le pays que l''Eternel a juré à vos ancêtres de leur donner dureront aussi longtemps que le ciel au-dessus de la terre. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, si vous respectez tous les commandements que je vous prescris, si vous les mettez en pratique en aimant l''Eternel, votre Dieu, en marchant dans toutes ses voies et en vous attachant à lui, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'l''Eternel chassera toutes ces nations devant vous et vous vous rendrez maîtres de nations plus grandes et plus puissantes que vous. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout endroit que foulera la plante de votre pied vous appartiendra: votre frontière s''étendra du désert au Liban et de l''Euphrate jusqu''à la mer Méditerranée. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Personne ne vous résistera. Comme il vous l'a promis, l'Eternel, votre Dieu, répandra la frayeur et la peur vis-à-vis de vous sur tout le pays où vous marcherez.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Regarde! Je mets aujourd''hui devant vous la bénédiction et la malédiction: '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'la bénédiction si vous obéissez aux commandements de l''Eternel, votre Dieu, que je vous prescris aujourd''hui; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'la malédiction si vous n''obéissez pas aux commandements de l''Eternel, votre Dieu, et si vous vous détournez de la voie que je vous prescris aujourd''hui pour suivre d''autres dieux, des dieux que vous ne connaissez pas. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque l''Eternel, ton Dieu, t''aura fait entrer dans le pays dont tu vas prendre possession, tu prononceras la bénédiction sur le mont Garizim et la malédiction sur le mont Ebal. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les signes et les actes qu''il a accomplis au milieu de l''Egypte contre le pharaon, roi d''Egypte, et contre tout son pays. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ces montagnes ne se situent-elles pas de l''autre côté du Jourdain, en direction de l''ouest, dans le pays des Cananéens qui habitent dans la plaine vis-à-vis de Guilgal, près des chênes de Moré? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous allez passer le Jourdain pour entrer en possession du pays que l''Eternel, votre Dieu, vous donne. Vous le posséderez et vous y habiterez. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous respecterez et mettrez en pratique toutes les prescriptions et les règles que je vous prescris aujourd'hui.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Reconnaissez ce qu''il a fait à l''armée égyptienne, à ses chevaux et à ses chars, la façon dont il a fait couler sur eux l''eau de la mer des Roseaux, lorsqu''ils vous poursuivaient, et les a détruits pour toujours. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Reconnaissez ce qu''il a fait pour vous dans le désert jusqu''à votre arrivée ici, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ce qu''il a fait à Dathan et à Abiram, les fils d''Eliab, descendants de Ruben, la façon dont la terre s''est entrouverte et les a engloutis, avec leurs familles et leurs tentes et tous leurs partisans, au milieu de tout Israël. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Oui, ce sont vos yeux qui ont vu toutes les grandes choses que l''Eternel a faites. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous respecterez donc tous les commandements que je vous prescris aujourd''hui afin d''avoir la force de prendre possession du pays dont vous allez vous emparer, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et afin de vivre longtemps sur le territoire que l''Eternel a juré à vos ancêtres de leur donner, à eux et à leur descendance. C''est un pays où coulent le lait et le miel. '
