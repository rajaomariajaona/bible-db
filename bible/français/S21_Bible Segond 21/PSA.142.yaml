document_id: PSA.142,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière dans la détresse
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Cantique de David, lorsqu'il se trouvait dans la grotte. Prière.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A pleine voix je crie à l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à pleine voix j'implore l'Eternel.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je lui expose ma plainte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je lui raconte ma détresse.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand mon esprit est abattu en moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi, tu connais mon sentier.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur la route où je marche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on m'a tendu un piège.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Regarde à droite et constate-le:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: personne ne me reconnaît,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne sais plus où trouver refuge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: personne ne s'inquiète pour ma vie.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, c'est à toi que je crie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je dis: «Tu es mon abri,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ma part au pays des vivants.»
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sois attentif à mes cris,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je suis bien faible!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Délivre-moi de ceux qui me poursuivent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils sont plus forts que moi!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fais-moi sortir de ma prison
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que je célèbre ton nom!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les justes viendront m'entourer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand tu m'auras fait du bien.
