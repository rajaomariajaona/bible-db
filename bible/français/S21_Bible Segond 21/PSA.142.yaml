document_id: PSA.142
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière dans la détresse
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Cantique de David, lorsqu'il se trouvait dans la grotte. Prière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: A pleine voix je crie à l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à pleine voix j'implore l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Je lui expose ma plainte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je lui raconte ma détresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Quand mon esprit est abattu en moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi, tu connais mon sentier.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sur la route où je marche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on m'a tendu un piège.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Regarde à droite et constate-le:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: personne ne me reconnaît,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne sais plus où trouver refuge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: personne ne s'inquiète pour ma vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Eternel, c'est à toi que je crie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je dis: «Tu es mon abri,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ma part au pays des vivants.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Sois attentif à mes cris,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je suis bien faible!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Délivre-moi de ceux qui me poursuivent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ils sont plus forts que moi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Fais-moi sortir de ma prison
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin que je célèbre ton nom!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les justes viendront m'entourer
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand tu m'auras fait du bien.
