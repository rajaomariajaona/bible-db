document_id: PSA.142,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière dans la détresse
  - type: text
    content: Cantique de David, lorsqu'il se trouvait dans la grotte. Prière.
  '2':
  - type: text
    content: A pleine voix je crie à l'Eternel,
  - type: text
    content: à pleine voix j'implore l'Eternel.
  '3':
  - type: text
    content: Je lui expose ma plainte,
  - type: text
    content: je lui raconte ma détresse.
  '4':
  - type: text
    content: Quand mon esprit est abattu en moi,
  - type: text
    content: toi, tu connais mon sentier.
  - type: text
    content: Sur la route où je marche,
  - type: text
    content: on m'a tendu un piège.
  '5':
  - type: text
    content: 'Regarde à droite et constate-le:'
  - type: text
    content: personne ne me reconnaît,
  - type: text
    content: je ne sais plus où trouver refuge,
  - type: text
    content: personne ne s'inquiète pour ma vie.
  '6':
  - type: text
    content: Eternel, c'est à toi que je crie.
  - type: text
    content: 'Je dis: «Tu es mon abri,'
  - type: text
    content: ma part au pays des vivants.»
  '7':
  - type: text
    content: Sois attentif à mes cris,
  - type: text
    content: car je suis bien faible!
  - type: text
    content: Délivre-moi de ceux qui me poursuivent,
  - type: text
    content: car ils sont plus forts que moi!
  '8':
  - type: text
    content: Fais-moi sortir de ma prison
  - type: text
    content: afin que je célèbre ton nom!
  - type: text
    content: Les justes viendront m'entourer
  - type: text
    content: quand tu m'auras fait du bien.
