document_id: PSA.5,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La justice et la bonté de Dieu
  - type: text
    content: Au chef de chœur, avec les flûtes. Psaume de David.
  '10':
  - type: text
    content: car il n'y a pas de sincérité dans leur bouche;
  - type: text
    content: ils ne pensent qu'à détruire,
  - type: text
    content: '*leur gosier est une tombe ouverte,'
  - type: text
    content: leur langue prononce des paroles flatteuses
  - type: note
    content: 'Leur gosier… flatteuses: cité en Romains 3.13a.'
  - type: text
    content: .
  '11':
  - type: text
    content: Traite-les comme des coupables, ô Dieu,
  - type: text
    content: que leurs projets provoquent leur chute!
  - type: text
    content: Chasse-les à cause de leurs nombreux péchés,
  - type: text
    content: de leur révolte contre toi.
  '12':
  - type: text
    content: Alors tous ceux qui se confient en toi se réjouiront,
  - type: text
    content: ils seront pour toujours dans l'allégresse,
  - type: text
    content: et tu les protégeras; tu seras un sujet de joie
  - type: text
    content: pour ceux qui aiment ton nom,
  '13':
  - type: text
    content: car tu bénis le juste, Eternel,
  - type: text
    content: tu l'entoures de ta grâce comme d'un bouclier.
  '2':
  - type: text
    content: Prête l'oreille à mes paroles, Eternel,
  - type: text
    content: écoute mes gémissements!
  '3':
  - type: text
    content: Sois attentif à mes cris, mon roi et mon Dieu!
  - type: text
    content: C'est à toi que j'adresse ma prière.
  '4':
  - type: text
    content: Eternel, le matin tu entends ma voix,
  - type: text
    content: le matin je me tourne vers toi et j'attends,
  '5':
  - type: text
    content: car tu n'es pas un Dieu qui prenne plaisir à la méchanceté.
  - type: text
    content: Le mal n'a pas sa place auprès de toi,
  '6':
  - type: text
    content: les vantards ne peuvent résister devant ton regard.
  - type: text
    content: Tu détestes tous ceux qui commettent l'injustice,
  '7':
  - type: text
    content: tu fais disparaître les menteurs;
  - type: text
    content: l'Eternel a horreur des assassins et des trompeurs.
  '8':
  - type: text
    content: Mais moi, par ta grande bonté, je vais à ta maison,
  - type: text
    content: je me prosterne dans ton saint temple avec la crainte qui t'est due.
  '9':
  - type: text
    content: Eternel, conduis-moi dans ta justice, à cause de mes adversaires,
  - type: text
    content: aplanis ta voie devant moi,
