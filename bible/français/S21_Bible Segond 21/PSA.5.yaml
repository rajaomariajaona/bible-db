document_id: PSA.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La justice et la bonté de Dieu
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur, avec les flûtes. Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Prête l'oreille à mes paroles, Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: écoute mes gémissements!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Sois attentif à mes cris, mon roi et mon Dieu!
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est à toi que j'adresse ma prière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Eternel, le matin tu entends ma voix,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le matin je me tourne vers toi et j'attends,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: car tu n'es pas un Dieu qui prenne plaisir à la méchanceté.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le mal n'a pas sa place auprès de toi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: les vantards ne peuvent résister devant ton regard.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu détestes tous ceux qui commettent l'injustice,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: tu fais disparaître les menteurs;
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'Eternel a horreur des assassins et des trompeurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mais moi, par ta grande bonté, je vais à ta maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je me prosterne dans ton saint temple avec la crainte qui t'est due.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Eternel, conduis-moi dans ta justice, à cause de mes adversaires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aplanis ta voie devant moi,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: car il n'y a pas de sincérité dans leur bouche;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ne pensent qu'à détruire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '*leur gosier est une tombe ouverte,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: leur langue prononce des paroles flatteuses
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Leur gosier… flatteuses: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 3.13a
      metadata:
        usfm: ROM.3.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Traite-les comme des coupables, ô Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que leurs projets provoquent leur chute!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chasse-les à cause de leurs nombreux péchés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de leur révolte contre toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Alors tous ceux qui se confient en toi se réjouiront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils seront pour toujours dans l'allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu les protégeras; tu seras un sujet de joie
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour ceux qui aiment ton nom,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: car tu bénis le juste, Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu l'entoures de ta grâce comme d'un bouclier.
