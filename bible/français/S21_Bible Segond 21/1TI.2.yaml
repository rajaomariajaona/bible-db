document_id: 1TI.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière et attitude dans l'Eglise
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'J''encourage donc avant tout à faire des demandes, des prières, des supplications, des prières de reconnaissance pour tous les hommes, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: pour les rois et pour tous ceux qui exercent l'autorité, afin que nous puissions mener une vie paisible et tranquille, en toute piété
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Piété: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: le mot grec désigne une attitude de respect et d'amour envers Dieu ou envers les parents qui s'exprime par l'accomplissement des devoirs religieux et une conduite appropriée.
    marker-yv: yv-n
  - type: text
    text: ' et en tout respect. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Voilà ce qui est bon et agréable devant Dieu notre Sauveur, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'lui qui désire que tous les hommes soient sauvés et parviennent à la connaissance de la vérité. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'En effet, il y a un seul Dieu et il y a aussi un seul médiateur entre Dieu et les hommes: un homme, Jésus-Christ, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'qui s''est donné lui-même en rançon pour tous. Tel est le témoignage rendu au moment voulu '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: et pour lequel j'ai été établi prédicateur et apôtre – je dis la vérité [devant Christ], je ne mens pas – chargé d'enseigner les non-Juifs dans la foi et la vérité.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Je veux donc que les hommes prient en tout lieu en élevant des mains pures
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'En élevant des mains pures: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire dans de saines dispositions; les Juifs levaient les mains pour prier.
    marker-yv: yv-n
  - type: text
    text: ', sans colère ni arrière-pensées. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'De même, je veux [aussi] que les femmes, habillées d''une manière décente, se parent avec pudeur et simplicité, non avec des tresses, de l''or, des perles ou des toilettes somptueuses, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'mais plutôt avec des œuvres bonnes, comme cela convient à des femmes qui affirment honorer Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Que la femme s''instruise paisiblement, dans une entière soumission. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je ne lui permets pas d''enseigner et de dominer sur l''homme, mais je lui demande de garder une attitude paisible. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'En effet, Adam a été formé le premier, Eve ensuite. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Et Adam n''a pas été trompé, alors que la femme, trompée, s''est rendue coupable d''une transgression. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Cependant, elle sera sauvée à travers sa descendance si elle persévère avec simplicité dans la foi, l'amour et la progression dans la sainteté.
