document_id: 1TI.2,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière et attitude dans l'Eglise
  - type: text
    content: 'J''encourage donc avant tout à faire des demandes, des prières, des supplications, des prières de reconnaissance pour tous les hommes, '
  '10':
  - type: text
    content: 'mais plutôt avec des œuvres bonnes, comme cela convient à des femmes qui affirment honorer Dieu. '
  '11':
  - type: text
    content: 'Que la femme s''instruise paisiblement, dans une entière soumission. '
  '12':
  - type: text
    content: 'Je ne lui permets pas d''enseigner et de dominer sur l''homme, mais je lui demande de garder une attitude paisible. '
  '13':
  - type: text
    content: 'En effet, Adam a été formé le premier, Eve ensuite. '
  '14':
  - type: text
    content: 'Et Adam n''a pas été trompé, alors que la femme, trompée, s''est rendue coupable d''une transgression. '
  '15':
  - type: text
    content: Cependant, elle sera sauvée à travers sa descendance si elle persévère avec simplicité dans la foi, l'amour et la progression dans la sainteté.
  '2':
  - type: text
    content: pour les rois et pour tous ceux qui exercent l'autorité, afin que nous puissions mener une vie paisible et tranquille, en toute piété
  - type: note
    content: 'Piété: le mot grec désigne une attitude de respect et d''amour envers Dieu ou envers les parents qui s''exprime par l''accomplissement des devoirs religieux et une conduite appropriée.'
  - type: text
    content: ' et en tout respect. '
  '3':
  - type: text
    content: 'Voilà ce qui est bon et agréable devant Dieu notre Sauveur, '
  '4':
  - type: text
    content: 'lui qui désire que tous les hommes soient sauvés et parviennent à la connaissance de la vérité. '
  '5':
  - type: text
    content: 'En effet, il y a un seul Dieu et il y a aussi un seul médiateur entre Dieu et les hommes: un homme, Jésus-Christ, '
  '6':
  - type: text
    content: 'qui s''est donné lui-même en rançon pour tous. Tel est le témoignage rendu au moment voulu '
  '7':
  - type: text
    content: et pour lequel j'ai été établi prédicateur et apôtre – je dis la vérité [devant Christ], je ne mens pas – chargé d'enseigner les non-Juifs dans la foi et la vérité.
  '8':
  - type: text
    content: Je veux donc que les hommes prient en tout lieu en élevant des mains pures
  - type: note
    content: 'En élevant des mains pures: c''est-à-dire dans de saines dispositions; les Juifs levaient les mains pour prier.'
  - type: text
    content: ', sans colère ni arrière-pensées. '
  '9':
  - type: text
    content: 'De même, je veux [aussi] que les femmes, habillées d''une manière décente, se parent avec pudeur et simplicité, non avec des tresses, de l''or, des perles ou des toilettes somptueuses, '
