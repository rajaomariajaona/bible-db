document_id: 2CO.9,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fruits de la générosité
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Il est superflu que je vous écrive au sujet de ce service en faveur des saints. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Que celui qui '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: fournit de la semence au semeur et du pain pour sa nourriture
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Fournit… nourriture: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 55.10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' vous fournisse et vous multiplie la semence, et qu''il augmente les fruits de votre justice. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ainsi vous serez enrichis à tout point de vue pour toutes sortes d''actes de générosité qui, par notre intermédiaire, feront monter des prières de reconnaissance vers Dieu. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'En effet, le service de cette collecte ne pourvoit pas seulement aux besoins des saints, il fait aussi abonder les prières de reconnaissance envers Dieu. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'A travers l''expérience qu''ils font de ce service, ils célèbrent la gloire de Dieu à cause de l''obéissance dont vous faites preuve dans votre adhésion à l''Evangile de Christ et de votre générosité dans la solidarité avec eux et avec tous. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Et ils prient pour vous parce qu''ils ont une vive affection pour vous, à cause de la grâce surabondante que Dieu vous a faite. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Que Dieu soit remercié pour son don incomparable!
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Je connais, en effet, votre bonne volonté: je m''en montre fier pour vous auprès des Macédoniens en affirmant que l''Achaïe est prête depuis l''année dernière, et votre zèle a stimulé la plupart d''entre eux. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'J''envoie cependant les frères afin que l''éloge que nous avons fait de vous ne soit pas démenti sur ce point et que vous soyez prêts, comme je l''ai affirmé. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Je ne voudrais pas, si les Macédoniens m''accompagnent et ne vous trouvent pas prêts, que cette belle assurance tourne à notre honte, pour ne pas dire à la vôtre. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: J'ai donc jugé nécessaire d'encourager les frères à se rendre chez vous avant moi pour s'occuper de l'offrande que vous aviez promise. Ainsi, elle sera prête comme une vraie bénédiction, et non comme une manifestation de votre soif de posséder.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Sachez-le, celui qui sème peu moissonnera peu et celui qui sème abondamment moissonnera abondamment. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Que chacun donne comme il l''a décidé dans son cœur, sans regret ni contrainte, car Dieu aime celui qui donne avec joie. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Dieu peut vous combler de toutes ses grâces afin que vous possédiez toujours à tout point de vue de quoi satisfaire à tous vos besoins et que vous ayez encore en abondance pour toute œuvre bonne, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'comme il est écrit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Il a distribué ses bienfaits, il a donné aux pauvres; sa justice subsiste à toujours
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il a distribué… toujours: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 112.9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
