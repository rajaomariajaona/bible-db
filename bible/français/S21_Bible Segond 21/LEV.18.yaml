    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Transmets ces instructions aux Israélites: Je suis l''Eternel, votre Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Vous ne ferez pas ce qui se fait en Egypte où vous avez habité, et vous ne ferez pas ce qui se fait dans le pays de Canaan où je vous conduis. Vous ne suivrez pas leurs coutumes. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Vous mettrez en pratique mes règles et vous respecterez mes prescriptions, c''est elles que vous suivrez. Je suis l''Eternel, votre Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Vous respecterez mes prescriptions et mes règles. *L'homme qui les mettra en pratique vivra par elles.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''homme… par elles: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Néhémie 9.29
      metadata:
        usfm: NEH.9.29
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 10.5
      metadata:
        usfm: ROM.10.5
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Galates 3.12
      metadata:
        usfm: GAL.3.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' Je suis l''Eternel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: »Aucun de vous ne s'approchera d'un membre de sa proche parenté pour dévoiler sa nudité
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.6-18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Dévoiler sa nudité: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire s'unir à lui par des relations sexuelles occasionnelles ou dans le cadre du mariage.
    marker-yv: yv-n
  - type: text
    text: '. Je suis l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tu ne dévoileras pas la nudité de ton père, ni celle de ta mère: c''est ta mère, tu ne dévoileras pas sa nudité. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tu ne dévoileras pas la nudité de la femme de ton père: c''est la nudité de ton père.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '»Tu ne dévoileras pas la nudité de ta sœur, fille de ton père ou fille de ta mère, qu''elle soit née dans la maison ou en dehors de la maison. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tu ne dévoileras pas la nudité de la fille de ton fils ni de la fille de ta fille, car c''est ta nudité. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tu ne dévoileras pas la nudité de la fille de la femme de ton père, née de ton père: c''est ta sœur.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '»Tu ne dévoileras pas la nudité de la sœur de ton père: c''est la proche parente de ton père. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tu ne dévoileras pas la nudité de la sœur de ta mère, car c''est la proche parente de ta mère. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tu ne dévoileras pas la nudité du frère de ton père, tu ne t''approcheras pas de sa femme: c''est ta tante. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tu ne dévoileras pas la nudité de ta belle-fille: c''est la femme de ton fils, tu ne dévoileras pas sa nudité. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tu ne dévoileras pas la nudité de la femme de ton frère: c''est la nudité de ton frère.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '»Tu ne dévoileras pas la nudité d''une femme et de sa fille; tu n''épouseras pas non plus la fille de son fils ou celle de sa fille pour dévoiler leur nudité: ce sont tes proches parentes, ce serait un crime. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tu n'épouseras pas la sœur de ta femme, ce serait exciter une rivalité en dévoilant sa nudité à côté de ta femme pendant sa vie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '»Tu ne t''approcheras pas d''une femme pendant qu''elle est impure à cause de ses règles pour dévoiler sa nudité. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tu ne coucheras pas avec la femme de ton prochain pour te rendre impur avec elle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: »Tu ne livreras aucun de tes enfants pour le sacrifier à Moloc
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Moloc: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dieu des Ammonites pour le culte duquel on brûlait des enfants.
    marker-yv: yv-n
  - type: text
    text: ' et tu ne déshonoreras pas ainsi le nom de ton Dieu. Je suis l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tu ne coucheras pas avec un homme comme on couche avec une femme: c''est une pratique abominable. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tu ne coucheras pas avec une bête pour te rendre impur avec elle, la femme non plus ne s''approchera pas d''une bête pour se prostituer à elle: c''est une pratique abominable.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '»Ne vous rendez impurs par aucune de ces pratiques, car c''est par elles que les nations que je vais chasser devant vous se sont rendues impures. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Le pays est devenu impur et j''interviendrai contre lui à cause de son péché; il vomira ses habitants. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Vous, vous respecterez mes prescriptions et mes règles et vous ne commettrez aucun de ces actes abominables, ni l''Israélite ni l''étranger en séjour parmi vous. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'En effet, toutes ces pratiques abominables, les hommes qui ont habité le pays avant vous les ont commises et le pays en est devenu impur. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Que le pays n''ait pas à vous vomir parce que vous l''aurez rendu impur, comme il a vomi les nations qui l''habitaient avant vous. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'En effet, tous ceux qui commettront l''une de ces pratiques abominables seront exclus du milieu de leur peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Vous respecterez mes commandements sans pratiquer aucune des coutumes abominables qui se pratiquaient avant vous; vous ne vous rendrez pas impurs en les pratiquant. Je suis l'Eternel, votre Dieu.»
