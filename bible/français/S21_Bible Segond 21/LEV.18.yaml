  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu ne coucheras pas avec un homme comme on couche avec une femme: c''est une pratique abominable. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu ne coucheras pas avec une bête pour te rendre impur avec elle, la femme non plus ne s''approchera pas d''une bête pour se prostituer à elle: c''est une pratique abominable.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Ne vous rendez impurs par aucune de ces pratiques, car c''est par elles que les nations que je vais chasser devant vous se sont rendues impures. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le pays est devenu impur et j''interviendrai contre lui à cause de son péché; il vomira ses habitants. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous, vous respecterez mes prescriptions et mes règles et vous ne commettrez aucun de ces actes abominables, ni l''Israélite ni l''étranger en séjour parmi vous. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, toutes ces pratiques abominables, les hommes qui ont habité le pays avant vous les ont commises et le pays en est devenu impur. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que le pays n''ait pas à vous vomir parce que vous l''aurez rendu impur, comme il a vomi les nations qui l''habitaient avant vous. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, tous ceux qui commettront l''une de ces pratiques abominables seront exclus du milieu de leur peuple. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous ne ferez pas ce qui se fait en Egypte où vous avez habité, et vous ne ferez pas ce qui se fait dans le pays de Canaan où je vous conduis. Vous ne suivrez pas leurs coutumes. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous respecterez mes commandements sans pratiquer aucune des coutumes abominables qui se pratiquaient avant vous; vous ne vous rendrez pas impurs en les pratiquant. Je suis l'Eternel, votre Dieu.»
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous mettrez en pratique mes règles et vous respecterez mes prescriptions, c''est elles que vous suivrez. Je suis l''Eternel, votre Dieu. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous respecterez mes prescriptions et mes règles. *L'homme qui les mettra en pratique vivra par elles.
