document_id: LEV.18,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les unions sexuelles interdites
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '10':
  - type: text
    content: 'Tu ne dévoileras pas la nudité de la fille de ton fils ni de la fille de ta fille, car c''est ta nudité. '
  '11':
  - type: text
    content: 'Tu ne dévoileras pas la nudité de la fille de la femme de ton père, née de ton père: c''est ta sœur.'
  '12':
  - type: text
    content: '»Tu ne dévoileras pas la nudité de la sœur de ton père: c''est la proche parente de ton père. '
  '13':
  - type: text
    content: 'Tu ne dévoileras pas la nudité de la sœur de ta mère, car c''est la proche parente de ta mère. '
  '14':
  - type: text
    content: 'Tu ne dévoileras pas la nudité du frère de ton père, tu ne t''approcheras pas de sa femme: c''est ta tante. '
  '15':
  - type: text
    content: 'Tu ne dévoileras pas la nudité de ta belle-fille: c''est la femme de ton fils, tu ne dévoileras pas sa nudité. '
  '16':
  - type: text
    content: 'Tu ne dévoileras pas la nudité de la femme de ton frère: c''est la nudité de ton frère.'
  '17':
  - type: text
    content: '»Tu ne dévoileras pas la nudité d''une femme et de sa fille; tu n''épouseras pas non plus la fille de son fils ou celle de sa fille pour dévoiler leur nudité: ce sont tes proches parentes, ce serait un crime. '
  '18':
  - type: text
    content: Tu n'épouseras pas la sœur de ta femme, ce serait exciter une rivalité en dévoilant sa nudité à côté de ta femme pendant sa vie.
  '19':
  - type: text
    content: '»Tu ne t''approcheras pas d''une femme pendant qu''elle est impure à cause de ses règles pour dévoiler sa nudité. '
  '2':
  - type: text
    content: '«Transmets ces instructions aux Israélites: Je suis l''Eternel, votre Dieu. '
  '20':
  - type: text
    content: Tu ne coucheras pas avec la femme de ton prochain pour te rendre impur avec elle.
  '21':
  - type: text
    content: »Tu ne livreras aucun de tes enfants pour le sacrifier à Moloc
  - type: note
    content: 'Moloc: dieu des Ammonites pour le culte duquel on brûlait des enfants.'
  - type: text
    content: ' et tu ne déshonoreras pas ainsi le nom de ton Dieu. Je suis l''Eternel. '
  '22':
  - type: text
    content: 'Tu ne coucheras pas avec un homme comme on couche avec une femme: c''est une pratique abominable. '
  '23':
  - type: text
    content: 'Tu ne coucheras pas avec une bête pour te rendre impur avec elle, la femme non plus ne s''approchera pas d''une bête pour se prostituer à elle: c''est une pratique abominable.'
  '24':
  - type: text
    content: '»Ne vous rendez impurs par aucune de ces pratiques, car c''est par elles que les nations que je vais chasser devant vous se sont rendues impures. '
  '25':
  - type: text
    content: 'Le pays est devenu impur et j''interviendrai contre lui à cause de son péché; il vomira ses habitants. '
  '26':
  - type: text
    content: 'Vous, vous respecterez mes prescriptions et mes règles et vous ne commettrez aucun de ces actes abominables, ni l''Israélite ni l''étranger en séjour parmi vous. '
  '27':
  - type: text
    content: 'En effet, toutes ces pratiques abominables, les hommes qui ont habité le pays avant vous les ont commises et le pays en est devenu impur. '
  '28':
  - type: text
    content: 'Que le pays n''ait pas à vous vomir parce que vous l''aurez rendu impur, comme il a vomi les nations qui l''habitaient avant vous. '
  '29':
  - type: text
    content: 'En effet, tous ceux qui commettront l''une de ces pratiques abominables seront exclus du milieu de leur peuple. '
  '3':
  - type: text
    content: 'Vous ne ferez pas ce qui se fait en Egypte où vous avez habité, et vous ne ferez pas ce qui se fait dans le pays de Canaan où je vous conduis. Vous ne suivrez pas leurs coutumes. '
  '30':
  - type: text
    content: Vous respecterez mes commandements sans pratiquer aucune des coutumes abominables qui se pratiquaient avant vous; vous ne vous rendrez pas impurs en les pratiquant. Je suis l'Eternel, votre Dieu.»
  '4':
  - type: text
    content: 'Vous mettrez en pratique mes règles et vous respecterez mes prescriptions, c''est elles que vous suivrez. Je suis l''Eternel, votre Dieu. '
  '5':
  - type: text
    content: Vous respecterez mes prescriptions et mes règles. *L'homme qui les mettra en pratique vivra par elles.
  - type: note
    content: 'L''homme… par elles: cité en Néhémie 9.29; Romains 10.5; Galates 3.12.'
  - type: text
    content: ' Je suis l''Eternel.'
  '6':
  - type: text
    content: »Aucun de vous ne s'approchera d'un membre de sa proche parenté pour dévoiler sa nudité
  - type: note
    content: 'Dévoiler sa nudité: c''est-à-dire s''unir à lui par des relations sexuelles occasionnelles ou dans le cadre du mariage.'
  - type: text
    content: '. Je suis l''Eternel. '
  '7':
  - type: text
    content: 'Tu ne dévoileras pas la nudité de ton père, ni celle de ta mère: c''est ta mère, tu ne dévoileras pas sa nudité. '
  '8':
  - type: text
    content: 'Tu ne dévoileras pas la nudité de la femme de ton père: c''est la nudité de ton père.'
  '9':
  - type: text
    content: '»Tu ne dévoileras pas la nudité de ta sœur, fille de ton père ou fille de ta mère, qu''elle soit née dans la maison ou en dehors de la maison. '
