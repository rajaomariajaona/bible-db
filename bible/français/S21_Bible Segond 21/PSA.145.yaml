document_id: PSA.145,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Hymne à la puissance et à la bonté de Dieu
  - type: text
    content: Louange, de David.
  - type: text
    content: Je proclamerai ta grandeur, mon Dieu, mon roi,
  - type: text
    content: et je bénirai ton nom pour toujours et à perpétuité.
  '10':
  - type: text
    content: Toutes tes œuvres te loueront, Eternel,
  - type: text
    content: et tes fidèles te béniront;
  '11':
  - type: text
    content: ils diront la gloire de ton règne,
  - type: text
    content: ils proclameront ta puissance,
  '12':
  - type: text
    content: pour faire connaître aux hommes ta puissance
  - type: text
    content: et la splendeur glorieuse de ton règne.
  '13':
  - type: text
    content: Ton règne est un règne éternel,
  - type: text
    content: et ta domination subsiste dans toutes les générations.
  '14':
  - type: text
    content: L'Eternel soutient tous ceux qui tombent,
  - type: text
    content: il redresse tous ceux qui sont courbés.
  '15':
  - type: text
    content: Tous regardent avec espoir vers toi,
  - type: text
    content: et tu leur donnes la nourriture au moment voulu.
  '16':
  - type: text
    content: Tu ouvres ta main
  - type: text
    content: et tu combles de biens tout ce qui vit.
  '17':
  - type: text
    content: L'Eternel est juste dans toutes ses voies
  - type: text
    content: et bon dans toutes ses œuvres.
  '18':
  - type: text
    content: L'Eternel est près de tous ceux qui font appel à lui,
  - type: text
    content: de tous ceux qui font appel à lui avec sincérité.
  '19':
  - type: text
    content: Il accomplit les désirs de ceux qui le craignent,
  - type: text
    content: il entend leur cri et les sauve.
  '2':
  - type: text
    content: Chaque jour je te bénirai,
  - type: text
    content: et je célébrerai ton nom pour toujours et à perpétuité.
  '20':
  - type: text
    content: L'Eternel garde tous ceux qui l'aiment,
  - type: text
    content: mais il détruira tous les méchants.
  '21':
  - type: text
    content: Que ma bouche dise la louange de l'Eternel
  - type: text
    content: et que toute créature bénisse son saint nom,
  - type: text
    content: pour toujours et à perpétuité!
  '3':
  - type: text
    content: L'Eternel est grand et digne de recevoir toute louange,
  - type: text
    content: sa grandeur est insondable.
  '4':
  - type: text
    content: Que chaque génération célèbre tes œuvres
  - type: text
    content: et proclame ton extraordinaire façon d'agir!
  '5':
  - type: text
    content: Je dirai la splendeur glorieuse de ta majesté,
  - type: text
    content: je chanterai tes merveilles.
  '6':
  - type: text
    content: On parlera de ta puissance redoutable
  - type: text
    content: et je raconterai ta grandeur.
  '7':
  - type: text
    content: On proclamera le souvenir de ton immense bonté,
  - type: text
    content: on célébrera ta justice.
  '8':
  - type: text
    content: L'Eternel fait grâce, il est rempli de compassion,
  - type: text
    content: il est lent à la colère et plein de bonté.
  '9':
  - type: text
    content: L'Eternel est bon envers tous,
  - type: text
    content: sa compassion s'étend à toutes ses œuvres.
