document_id: PSA.145,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Hymne à la puissance et à la bonté de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Louange, de David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je proclamerai ta grandeur, mon Dieu, mon roi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je bénirai ton nom pour toujours et à perpétuité.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Toutes tes œuvres te loueront, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tes fidèles te béniront;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ils diront la gloire de ton règne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils proclameront ta puissance,
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: pour faire connaître aux hommes ta puissance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la splendeur glorieuse de ton règne.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ton règne est un règne éternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ta domination subsiste dans toutes les générations.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: L'Eternel soutient tous ceux qui tombent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il redresse tous ceux qui sont courbés.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tous regardent avec espoir vers toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu leur donnes la nourriture au moment voulu.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Tu ouvres ta main
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu combles de biens tout ce qui vit.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: L'Eternel est juste dans toutes ses voies
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et bon dans toutes ses œuvres.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: L'Eternel est près de tous ceux qui font appel à lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de tous ceux qui font appel à lui avec sincérité.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Il accomplit les désirs de ceux qui le craignent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il entend leur cri et les sauve.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Chaque jour je te bénirai,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je célébrerai ton nom pour toujours et à perpétuité.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: L'Eternel garde tous ceux qui l'aiment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il détruira tous les méchants.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Que ma bouche dise la louange de l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que toute créature bénisse son saint nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour toujours et à perpétuité!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: L'Eternel est grand et digne de recevoir toute louange,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa grandeur est insondable.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Que chaque génération célèbre tes œuvres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et proclame ton extraordinaire façon d'agir!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Je dirai la splendeur glorieuse de ta majesté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je chanterai tes merveilles.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: On parlera de ta puissance redoutable
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je raconterai ta grandeur.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: On proclamera le souvenir de ton immense bonté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on célébrera ta justice.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: L'Eternel fait grâce, il est rempli de compassion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est lent à la colère et plein de bonté.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: L'Eternel est bon envers tous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa compassion s'étend à toutes ses œuvres.
