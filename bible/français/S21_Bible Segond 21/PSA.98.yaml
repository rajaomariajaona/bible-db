document_id: PSA.98,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Louange universelle au juste Juge
  - type: text
    content: Psaume.
  - type: text
    content: Chantez en l'honneur de l'Eternel un cantique nouveau,
  - type: text
    content: car il a fait des merveilles!
  - type: text
    content: Sa main droite et son bras saint lui ont assuré la victoire.
  '2':
  - type: text
    content: L'Eternel a fait connaître son salut,
  - type: text
    content: il a révélé sa justice sous les yeux des nations.
  '3':
  - type: text
    content: '*Il s''est souvenu de sa bonté'
  - type: note
    content: 'Il s''est souvenu de sa bonté: cité dans le cantique de Marie en Luc 1.54.'
  - type: text
    content: ' et de sa fidélité envers la communauté d''Israël.'
  - type: text
    content: Jusqu'aux extrémités de la terre, on a vu le salut de notre Dieu.
  '4':
  - type: text
    content: Poussez des cris de joie en l'honneur de l'Eternel, habitants de toute la terre!
  - type: text
    content: Faites éclater votre allégresse et chantez!
  '5':
  - type: text
    content: Chantez en l'honneur de l'Eternel avec la harpe,
  - type: text
    content: avec la harpe, au son de tous les instruments!
  '6':
  - type: text
    content: Au son des trompettes et du cor,
  - type: text
    content: poussez des cris de joie en présence du roi, de l'Eternel!
  '7':
  - type: text
    content: Que la mer retentisse avec tout ce qu'elle contient,
  - type: text
    content: le monde et ceux qui l'habitent,
  '8':
  - type: text
    content: que les fleuves battent des mains,
  - type: text
    content: qu'avec eux les montagnes poussent des cris de joie
  '9':
  - type: text
    content: devant l'Eternel, car il vient pour juger la terre. Il jugera le monde avec justice,
  - type: text
    content: et les peuples avec droiture.
