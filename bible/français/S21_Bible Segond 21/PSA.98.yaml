document_id: PSA.98
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Louange universelle au juste Juge
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Psaume.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chantez en l'honneur de l'Eternel un cantique nouveau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il a fait des merveilles!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Sa main droite et son bras saint lui ont assuré la victoire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: L'Eternel a fait connaître son salut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a révélé sa justice sous les yeux des nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '*Il s''est souvenu de sa bonté'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '98.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il s''est souvenu de sa bonté: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité dans le cantique de Marie en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luc 1.54
      metadata:
        usfm: LUK.1.54
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et de sa fidélité envers la communauté d''Israël.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jusqu'aux extrémités de la terre, on a vu le salut de notre Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Poussez des cris de joie en l'honneur de l'Eternel, habitants de toute la terre!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faites éclater votre allégresse et chantez!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Chantez en l'honneur de l'Eternel avec la harpe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec la harpe, au son de tous les instruments!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Au son des trompettes et du cor,
- type: usfm
  marker: q1
  children:
  - type: text
    text: poussez des cris de joie en présence du roi, de l'Eternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Que la mer retentisse avec tout ce qu'elle contient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le monde et ceux qui l'habitent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: que les fleuves battent des mains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'avec eux les montagnes poussent des cris de joie
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: devant l'Eternel, car il vient pour juger la terre. Il jugera le monde avec justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les peuples avec droiture.
