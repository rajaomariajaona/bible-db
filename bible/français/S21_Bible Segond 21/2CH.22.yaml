      marker-yv: yv-n
    - type: text
      text: ' avait tué tous ses aînés. C''est ainsi qu''Achazia, fils de Joram, le roi de Juda, devint roi. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand Athalie, la mère d''Achazia, vit que son fils était mort, elle se leva et fit disparaître toute la descendance royale de la communauté de Juda. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cependant Joshabeath, la fille du roi, prit Joas, le fils d''Achazia, et l''enleva du groupe des fils du roi quand on les fit mourir. Elle le mit avec sa nourrice dans une chambre à coucher du temple. Joshabeath, fille du roi Joram, femme du prêtre Jehojada et sœur d''Achazia, le cacha ainsi à Athalie, et celle-ci ne le fit pas mourir. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il resta 6 ans caché avec eux dans la maison de Dieu, tandis qu'Athalie régnait sur le pays.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Achazia avait 22 ans lorsqu'il devint roi et il régna un an à Jérusalem. Sa mère s'appelait Athalie et c'était la petite-fille d'Omri.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il marcha lui aussi sur les voies de la famille d''Achab, car sa mère le poussait au mal par ses conseils. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il fit donc ce qui est mal aux yeux de l'Eternel comme la famille d'Achab, car il y trouva après la mort de son père des conseillers pour sa perte.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Suivant leur conseil, il partit avec Joram, le fils d''Achab, roi d''Israël, en guerre contre Hazaël, le roi de Syrie, à Ramoth en Galaad. Les Syriens blessèrent Joram. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Joram repartit à Jizreel pour se faire soigner des blessures que les Syriens lui avaient infligées à Rama, lorsqu'il se battait contre Hazaël, le roi de Syrie. Achazia, fils de Joram et roi de Juda, descendit alors pour voir Joram, fils d'Achab, à Jizreel, parce qu'il était blessé.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Par la volonté de Dieu, ce fut pour sa ruine qu''Achazia se rendit auprès de Joram. Une fois arrivé, il sortit avec Joram vers Jéhu, petit-fils de Nimshi, que l''Eternel avait désigné par onction pour exterminer la famille d''Achab. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors qu''il exerçait la justice contre la famille d''Achab, Jéhu rencontra les chefs de Juda et les neveux d''Achazia qui étaient au service d''Achazia, et il les tua. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il rechercha Achazia et on s''empara de lui dans Samarie, où il s''était caché. On l''amena auprès de Jéhu et on le fit mourir. Puis on l''enterra, car on se disait: «C''est le petit-fils de Josaphat, qui, lui, cherchait l''Eternel de tout son cœur.» Et il ne resta personne de la famille d''Achazia qui soit apte à régner.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règne d'Athalie
    marker-yv: yv-h
