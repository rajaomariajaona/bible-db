document_id: ECC.10,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Réflexions sur la folie
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Les mouches mortes infectent et font fermenter l''huile du parfumeur; de même, un peu de folie l''emporte sur la sagesse et sur la gloire. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: s'il a usé la hache et ne l'a pas aiguisée, il devra redoubler de force. La sagesse a l'avantage de donner le succès.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Si le serpent mord faute d'avoir été charmé, le charmeur n'a aucun avantage.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Les paroles du sage sont pleines de grâce, tandis que les lèvres de l''homme stupide causent sa perte: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'dès le début, ce qu''il profère n''est que folie, et la fin de son discours est plus délirante encore. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Le fou multiplie les paroles. Pourtant, l''homme ne sait pas ce qui arrivera, et qui peut lui annoncer ce qui existera après lui? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Le travail des hommes stupides les fatigue, eux qui ne savent même pas comment se rendre à la ville.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Malheur à toi, pays dont le roi est un enfant et dont les chefs se goinfrent dès le matin! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Tu es heureux, pays dont le roi est d''origine noble et dont les chefs mangent au moment convenable, pour prendre des forces et non pour s''adonner à la boisson! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Quand les mains sont paresseuses, le toit s''effondre; quand elles sont négligentes, la maison a des gouttières. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: On prépare des repas pour s'amuser, le vin rend la vie joyeuse et l'argent a réponse à tout.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Le cœur du sage le conduit du bon côté, et le cœur de l''homme stupide du mauvais côté. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ne maudis pas le roi, même en pensée, et ne maudis pas le riche dans la chambre où tu couches, car l'oiseau pourrait en emporter le son, l'animal ailé pourrait répéter tes paroles.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Quand le fou marche sur un chemin, comme il manque de bon sens, il révèle à tous qu''il est un fou. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Si un dirigeant s'attaque à toi, ne quitte pas ta position, car le calme évite de grands péchés.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il y a un mal que j''ai vu sous le soleil, comme un péché involontaire commis par celui qui gouverne: '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'la folie occupe de nombreux postes élevés tandis que des riches sont assis dans l''abaissement. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: J'ai vu des esclaves montés sur des chevaux et des chefs en train de marcher comme des esclaves.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Celui qui creuse une fosse y tombera et celui qui démolit un mur sera mordu par un serpent. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Celui qui remue des pierres sera blessé par elles et celui qui fend du bois s''expose au danger: '
