document_id: AMO.6,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Corruption et inconscience des grands
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malheur à ceux qui vivent tranquilles dans Sion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et en sécurité sur la montagne de Samarie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à ces grands de la première des nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: auprès desquels va la communauté d'Israël!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsqu'un parent prendra un mort pour le brûler
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'il enlèvera de la maison les ossements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'il dira à celui qui est au fond de la maison:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Y a-t-il encore quelqu'un avec toi?»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Cet homme répondra: «Personne»'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et l''autre dira: «Silence!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce n'est pas le moment de prononcer le nom de l'Eternel.»
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oui, voici que l''Eternel donne des ordres:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il fera tomber en ruine les grandes maisons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les petites se lézarderont.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-ce que les chevaux courent sur un rocher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: est-ce qu'on y laboure avec des bœufs?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi avez-vous changé le droit en poison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le fruit de la justice en absinthe?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous vous réjouissez de ce qui n'est que néant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'vous dites: «N''est-ce pas par notre force'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que nous avons acquis de la puissance?»
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est pourquoi je ferai surgir contre vous, communauté d'Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une nation qui vous opprimera depuis l'entrée de Hamath
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu'au torrent du désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l'Eternel, le Dieu de l'univers.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Passez à Calné et regardez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: allez de là jusqu'à Hamath la grande,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'puis descendez à Gath chez les Philistins:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ces villes sont-elles plus prospères que vos deux royaumes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leur territoire est-il plus étendu que le vôtre?
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vous croyez éloigner le jour du malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais vous faites approcher le règne de la violence.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se reposent sur des lits d'ivoire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont vautrés sur leurs divans,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils mangent les agneaux du troupeau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les veaux mis à l'engrais.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils improvisent au son du luth,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils se croient habiles comme David sur les instruments de musique.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils boivent le vin dans de larges coupes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont recours à la meilleure huile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ils ne s'attristent pas de la ruine de Joseph.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est pourquoi ils partiront en exil en tête des prisonniers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les cris de joie de ces paresseux cesseront.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Seigneur, l'Eternel, l'a juré par lui-même,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'c''est une déclaration de l''Eternel, le Dieu de l''univers:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «J'ai en horreur l'orgueil de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je déteste ses palais.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je livrerai la ville et tout ce qu'elle contient.»
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S'il reste dix hommes dans une maison, ils mourront.
