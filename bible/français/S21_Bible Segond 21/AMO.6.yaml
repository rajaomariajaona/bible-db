document_id: AMO.6,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Corruption et inconscience des grands
  - type: text
    content: Malheur à ceux qui vivent tranquilles dans Sion
  - type: text
    content: et en sécurité sur la montagne de Samarie,
  - type: text
    content: à ces grands de la première des nations
  - type: text
    content: auprès desquels va la communauté d'Israël!
  '10':
  - type: text
    content: Lorsqu'un parent prendra un mort pour le brûler
  - type: text
    content: et qu'il enlèvera de la maison les ossements,
  - type: text
    content: 'il dira à celui qui est au fond de la maison:'
  - type: text
    content: «Y a-t-il encore quelqu'un avec toi?»
  - type: text
    content: 'Cet homme répondra: «Personne»'
  - type: text
    content: 'et l''autre dira: «Silence!'
  - type: text
    content: Ce n'est pas le moment de prononcer le nom de l'Eternel.»
  '11':
  - type: text
    content: 'Oui, voici que l''Eternel donne des ordres:'
  - type: text
    content: il fera tomber en ruine les grandes maisons,
  - type: text
    content: et les petites se lézarderont.
  '12':
  - type: text
    content: Est-ce que les chevaux courent sur un rocher,
  - type: text
    content: est-ce qu'on y laboure avec des bœufs?
  - type: text
    content: Pourquoi avez-vous changé le droit en poison,
  - type: text
    content: et le fruit de la justice en absinthe?
  '13':
  - type: text
    content: Vous vous réjouissez de ce qui n'est que néant,
  - type: text
    content: 'vous dites: «N''est-ce pas par notre force'
  - type: text
    content: que nous avons acquis de la puissance?»
  '14':
  - type: text
    content: C'est pourquoi je ferai surgir contre vous, communauté d'Israël,
  - type: text
    content: une nation qui vous opprimera depuis l'entrée de Hamath
  - type: text
    content: jusqu'au torrent du désert,
  - type: text
    content: déclare l'Eternel, le Dieu de l'univers.
  '2':
  - type: text
    content: Passez à Calné et regardez,
  - type: text
    content: allez de là jusqu'à Hamath la grande,
  - type: text
    content: 'puis descendez à Gath chez les Philistins:'
  - type: text
    content: ces villes sont-elles plus prospères que vos deux royaumes,
  - type: text
    content: et leur territoire est-il plus étendu que le vôtre?
  '3':
  - type: text
    content: Vous croyez éloigner le jour du malheur,
  - type: text
    content: mais vous faites approcher le règne de la violence.
  '4':
  - type: text
    content: Ils se reposent sur des lits d'ivoire,
  - type: text
    content: ils sont vautrés sur leurs divans,
  - type: text
    content: ils mangent les agneaux du troupeau,
  - type: text
    content: les veaux mis à l'engrais.
  '5':
  - type: text
    content: Ils improvisent au son du luth,
  - type: text
    content: ils se croient habiles comme David sur les instruments de musique.
  '6':
  - type: text
    content: Ils boivent le vin dans de larges coupes,
  - type: text
    content: ils ont recours à la meilleure huile,
  - type: text
    content: mais ils ne s'attristent pas de la ruine de Joseph.
  '7':
  - type: text
    content: C'est pourquoi ils partiront en exil en tête des prisonniers,
  - type: text
    content: et les cris de joie de ces paresseux cesseront.
  '8':
  - type: text
    content: Le Seigneur, l'Eternel, l'a juré par lui-même,
  - type: text
    content: 'c''est une déclaration de l''Eternel, le Dieu de l''univers:'
  - type: text
    content: «J'ai en horreur l'orgueil de Jacob,
  - type: text
    content: et je déteste ses palais.
  - type: text
    content: Je livrerai la ville et tout ce qu'elle contient.»
  '9':
  - type: text
    content: S'il reste dix hommes dans une maison, ils mourront.
