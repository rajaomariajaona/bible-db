document_id: NUM.10,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les deux trompettes en argent
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '10':
  - type: text
    content: Dans vos jours de joie, lors de vos fêtes et de vos débuts de mois, vous sonnerez de la trompette en offrant vos holocaustes et vos sacrifices de communion, et cela vous servira de souvenir devant votre Dieu. Je suis l'Eternel, votre Dieu.»
  - type: heading
    content: Départ du Sinaï
  '11':
  - type: text
    content: 'Le vingtième jour du deuxième mois de la deuxième année, la nuée s''éleva au-dessus du tabernacle du témoignage. '
  '12':
  - type: text
    content: 'Les Israélites partirent alors du désert du Sinaï, selon l''ordre fixé pour leur marche. La nuée s''arrêta dans le désert de Paran. '
  '13':
  - type: text
    content: C'est le premier départ qu'ils effectuèrent conformément à l'ordre que l'Eternel avait donné par l'intermédiaire de Moïse.
  '14':
  - type: text
    content: 'L''étendard du camp des Judéens partit le premier avec ses corps d''armée. Le corps d''armée de Juda était commandé par Nachshon, fils d''Amminadab, '
  '15':
  - type: text
    content: 'celui de la tribu d''Issacar par Nathanaël, fils de Tsuar, '
  '16':
  - type: text
    content: celui de la tribu de Zabulon par Eliab, fils de Hélon.
  '17':
  - type: text
    content: Le tabernacle fut démonté et les descendants de Guershon et de Merari partirent en le portant.
  '18':
  - type: text
    content: 'L''étendard du camp de Ruben partit avec ses corps d''armée. Le corps d''armée de Ruben était commandé par Elitsur, fils de Shedéur, '
  '19':
  - type: text
    content: 'celui de la tribu de Siméon par Shelumiel, fils de Tsurishaddaï, '
  '2':
  - type: text
    content: '«Fais-toi deux trompettes en argent. Tu les feras en argent battu. Elles te serviront pour convoquer l''assemblée et pour signaler le départ des camps. '
  '20':
  - type: text
    content: celui de la tribu de Gad par Eliasaph, fils de Déuel.
  '21':
  - type: text
    content: Les Kehathites partirent en portant les ustensiles sacrés. On dressait le tabernacle en attendant leur arrivée.
  '22':
  - type: text
    content: 'L''étendard du camp d''Ephraïm partit avec ses corps d''armée. Le corps d''armée d''Ephraïm était commandé par Elishama, fils d''Ammihud, '
  '23':
  - type: text
    content: 'celui de la tribu de Manassé par Gamliel, fils de Pedahtsur, '
  '24':
  - type: text
    content: celui de la tribu de Benjamin par Abidan, fils de Guideoni.
  '25':
  - type: text
    content: 'L''étendard du camp de Dan partit avec ses corps d''armée: il formait l''arrière-garde de tous les camps. Le corps d''armée de Dan était commandé par Ahiézer, fils d''Ammishaddaï, '
  '26':
  - type: text
    content: 'celui de la tribu d''Aser par Paguiel, fils d''Ocran, '
  '27':
  - type: text
    content: celui de la tribu de Nephthali par Ahira, fils d'Enan.
  '28':
  - type: text
    content: Tel fut l'ordre d'après lequel les Israélites se mirent en marche selon leurs corps d'armée. C'est ainsi qu'ils partirent.
  '29':
  - type: text
    content: 'Moïse dit à Hobab, le fils de son beau-père madianite Réuel: «Nous partons pour l''endroit que l''Eternel a déclaré vouloir nous donner. Viens avec nous et nous te ferons du bien, car l''Eternel a promis de faire du bien à Israël.» '
  '3':
  - type: text
    content: 'Quand on en sonnera, toute l''assemblée se réunira près de toi, à l''entrée de la tente de la rencontre. '
  '30':
  - type: text
    content: 'Hobab lui répondit: «Je ne viendrai pas, j''irai au contraire dans mon pays et dans ma patrie.» '
  '31':
  - type: text
    content: 'Moïse dit: «Ne nous quitte pas, je t''en prie. Puisque tu connais les endroits où nous campons dans le désert, tu nous serviras de guide. '
  '32':
  - type: text
    content: Et si tu viens avec nous, nous te ferons jouir du bien que l'Eternel nous fera.»
  '33':
  - type: text
    content: 'Ils partirent de la montagne de l''Eternel et marchèrent trois jours. L''arche de l''alliance de l''Eternel partit devant eux et fit une marche de trois jours pour leur chercher un lieu de repos. '
  '34':
  - type: text
    content: La nuée de l'Eternel se trouvait au-dessus d'eux pendant le jour lorsqu'ils partaient du camp.
  '35':
  - type: text
    content: 'Quand l''arche partait, Moïse disait: *«Lève-toi, Eternel, et que tes ennemis soient dispersés! Que ceux qui te détestent prennent la fuite devant toi!»'
  - type: note
    content: 'Lève-toi… toi: repris au Psaume 68.2.'
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'Et quand on la posait, il disait: «Reviens, Eternel, vers les dizaines et dizaines de milliers d''Israël!»'
  '4':
  - type: text
    content: 'Si l''on ne sonne que d''une trompette, les princes, les chefs des milliers d''Israël, se réuniront près de toi. '
  '5':
  - type: text
    content: 'Quand vous sonnerez avec éclat, ceux qui campent à l''est partiront. '
  '6':
  - type: text
    content: 'Quand vous sonnerez avec éclat pour la deuxième fois, ceux qui campent au sud partiront; on sonnera avec éclat pour leur départ. '
  '7':
  - type: text
    content: 'Vous sonnerez aussi pour convoquer l''assemblée, mais pas avec éclat. '
  '8':
  - type: text
    content: 'Les fils d''Aaron, les prêtres, sonneront de la trompette. Ce sera une prescription perpétuelle pour vous au fil des générations. '
  '9':
  - type: text
    content: 'Dans votre pays, lorsque vous irez à la guerre contre l''ennemi qui vous combattra, vous sonnerez de la trompette avec éclat. Ainsi vous vous rappellerez au souvenir de l''Eternel, votre Dieu, et vous serez délivrés de vos ennemis. '
