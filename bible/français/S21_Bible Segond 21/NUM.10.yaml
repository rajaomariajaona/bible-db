document_id: NUM.10,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les deux trompettes en argent
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel dit à Moïse: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dans vos jours de joie, lors de vos fêtes et de vos débuts de mois, vous sonnerez de la trompette en offrant vos holocaustes et vos sacrifices de communion, et cela vous servira de souvenir devant votre Dieu. Je suis l'Eternel, votre Dieu.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Départ du Sinaï
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le vingtième jour du deuxième mois de la deuxième année, la nuée s''éleva au-dessus du tabernacle du témoignage. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Israélites partirent alors du désert du Sinaï, selon l''ordre fixé pour leur marche. La nuée s''arrêta dans le désert de Paran. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C'est le premier départ qu'ils effectuèrent conformément à l'ordre que l'Eternel avait donné par l'intermédiaire de Moïse.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''étendard du camp des Judéens partit le premier avec ses corps d''armée. Le corps d''armée de Juda était commandé par Nachshon, fils d''Amminadab, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'celui de la tribu d''Issacar par Nathanaël, fils de Tsuar, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: celui de la tribu de Zabulon par Eliab, fils de Hélon.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le tabernacle fut démonté et les descendants de Guershon et de Merari partirent en le portant.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''étendard du camp de Ruben partit avec ses corps d''armée. Le corps d''armée de Ruben était commandé par Elitsur, fils de Shedéur, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'celui de la tribu de Siméon par Shelumiel, fils de Tsurishaddaï, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Fais-toi deux trompettes en argent. Tu les feras en argent battu. Elles te serviront pour convoquer l''assemblée et pour signaler le départ des camps. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: celui de la tribu de Gad par Eliasaph, fils de Déuel.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les Kehathites partirent en portant les ustensiles sacrés. On dressait le tabernacle en attendant leur arrivée.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''étendard du camp d''Ephraïm partit avec ses corps d''armée. Le corps d''armée d''Ephraïm était commandé par Elishama, fils d''Ammihud, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'celui de la tribu de Manassé par Gamliel, fils de Pedahtsur, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: celui de la tribu de Benjamin par Abidan, fils de Guideoni.
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''étendard du camp de Dan partit avec ses corps d''armée: il formait l''arrière-garde de tous les camps. Le corps d''armée de Dan était commandé par Ahiézer, fils d''Ammishaddaï, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'celui de la tribu d''Aser par Paguiel, fils d''Ocran, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: celui de la tribu de Nephthali par Ahira, fils d'Enan.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tel fut l'ordre d'après lequel les Israélites se mirent en marche selon leurs corps d'armée. C'est ainsi qu'ils partirent.
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse dit à Hobab, le fils de son beau-père madianite Réuel: «Nous partons pour l''endroit que l''Eternel a déclaré vouloir nous donner. Viens avec nous et nous te ferons du bien, car l''Eternel a promis de faire du bien à Israël.» '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand on en sonnera, toute l''assemblée se réunira près de toi, à l''entrée de la tente de la rencontre. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hobab lui répondit: «Je ne viendrai pas, j''irai au contraire dans mon pays et dans ma patrie.» '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse dit: «Ne nous quitte pas, je t''en prie. Puisque tu connais les endroits où nous campons dans le désert, tu nous serviras de guide. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et si tu viens avec nous, nous te ferons jouir du bien que l'Eternel nous fera.»
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils partirent de la montagne de l''Eternel et marchèrent trois jours. L''arche de l''alliance de l''Eternel partit devant eux et fit une marche de trois jours pour leur chercher un lieu de repos. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La nuée de l'Eternel se trouvait au-dessus d'eux pendant le jour lorsqu'ils partaient du camp.
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand l''arche partait, Moïse disait: *«Lève-toi, Eternel, et que tes ennemis soient dispersés! Que ceux qui te détestent prennent la fuite devant toi!»'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.35 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Lève-toi… toi: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'repris au '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 68.2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et quand on la posait, il disait: «Reviens, Eternel, vers les dizaines et dizaines de milliers d''Israël!»'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si l''on ne sonne que d''une trompette, les princes, les chefs des milliers d''Israël, se réuniront près de toi. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand vous sonnerez avec éclat, ceux qui campent à l''est partiront. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand vous sonnerez avec éclat pour la deuxième fois, ceux qui campent au sud partiront; on sonnera avec éclat pour leur départ. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous sonnerez aussi pour convoquer l''assemblée, mais pas avec éclat. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fils d''Aaron, les prêtres, sonneront de la trompette. Ce sera une prescription perpétuelle pour vous au fil des générations. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dans votre pays, lorsque vous irez à la guerre contre l''ennemi qui vous combattra, vous sonnerez de la trompette avec éclat. Ainsi vous vous rappellerez au souvenir de l''Eternel, votre Dieu, et vous serez délivrés de vos ennemis. '
