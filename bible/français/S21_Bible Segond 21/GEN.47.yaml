document_id: GEN.47
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La famille de Jacob dans la région de Gosen
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Joseph alla avertir le pharaon et lui dit: «Mes frères et mon père sont venus du pays de Canaan avec leurs brebis, leurs bœufs et tout ce qui leur appartient; ils sont dans la région de Gosen.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il avait pris cinq de ses frères et il les présenta au pharaon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le pharaon leur dit: «Quelle est votre occupation?» Ils répondirent au pharaon: «Tes serviteurs sont bergers, tout comme l''étaient leurs ancêtres.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils dirent encore au pharaon: «Nous tes serviteurs, nous sommes venus pour séjourner dans le pays parce qu''il n''y a plus de pâturage pour notre bétail. En effet, la famine pèse lourdement sur le pays de Canaan. Veuille donc autoriser tes serviteurs à s''installer dans la région de Gosen!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le pharaon dit à Joseph: «Ton père et tes frères sont venus vers toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: L'Egypte est devant toi. Installe ton père et tes frères dans la meilleure partie du pays. Qu'ils habitent dans la région de Gosen. Et si tu sais qu'il y a parmi eux des hommes capables, confie-leur la responsabilité de mes troupeaux.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Joseph fit venir son père Jacob et le présenta au pharaon. Jacob bénit le pharaon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le pharaon dit à Jacob: «Quel âge as-tu?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Jacob répondit au pharaon: «Ma vie errante dure depuis 130 ans. Elle a été courte et mauvaise, et elle n''a pas atteint la durée de la vie errante de mes ancêtres.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Jacob bénit encore le pharaon et se retira de devant lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Joseph installa son père et ses frères, il leur donna une propriété en Egypte dans la meilleure partie du pays, dans la région de Ramsès, conformément aux ordres du pharaon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Joseph fournit du pain à son père et à ses frères ainsi qu'à toute la famille de son père, en tenant compte du nombre d'enfants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il n''y avait plus de pain dans tout le pays, car la famine était très grande. L''Egypte et le pays de Canaan dépérissaient à cause de la famine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Joseph récolta tout l''argent disponible en Egypte et dans le pays de Canaan et versé en échange de blé, et il le fit entrer dans la maison du pharaon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Quand l''argent de l''Egypte et du pays de Canaan fut épuisé, tous les Egyptiens vinrent trouver Joseph en disant: «Donne-nous du pain! Pourquoi mourrions-nous sous tes yeux? En effet, il n''y a plus d''argent.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Joseph dit: «Donnez vos troupeaux et je vous donnerai du pain en échange de votre bétail, s''il n''y a plus d''argent.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ils amenèrent leurs troupeaux à Joseph et celui-ci leur donna du pain en échange des chevaux, des troupeaux de brebis et de bœufs et des ânes. Il leur fournit ainsi du pain cette année-là en échange de tous leurs troupeaux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Lorsque cette année fut passée, l''année suivante ils vinrent trouver Joseph et lui dirent: «Nous ne te cacherons pas, seigneur, que l''argent est épuisé et que nos troupeaux de bétail sont déjà en ta possession, seigneur. Il ne reste plus rien devant toi, seigneur, si ce n''est notre corps et nos terres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Pourquoi mourrions-nous sous tes yeux, nous et nos terres? Achète-nous avec nos terres en échange de pain et nous serons au service du pharaon, nous et nos terres. Donne-nous de quoi semer afin que nous restions en vie et ne mourions pas, et que nos terres ne soient pas dévastées.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Joseph acheta toutes les terres de l''Egypte pour le pharaon. En effet, les Egyptiens vendirent chacun leur champ parce que la famine les pressait. C''est ainsi que le pays devint la propriété du pharaon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Quant à la population, il la déplaça dans les villes, d''un bout à l''autre des frontières de l''Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il n''y eut que les terres des prêtres qu''il n''acheta pas, parce qu''il y avait une prescription du pharaon en leur faveur: ils vivaient du revenu que leur assurait le pharaon, c''est pourquoi ils ne vendirent pas leurs terres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Joseph dit au peuple: «Je vous ai achetés aujourd''hui, ainsi que vos terres, pour le pharaon. Voici de la semence pour vous et vous pourrez ensemencer le sol. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Vous donnerez un cinquième de la récolte au pharaon et vous aurez les quatre autres parties pour ensemencer les champs et pour vous nourrir, vous, vos enfants et les membres de votre foyer.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ils dirent: «Tu nous sauves la vie! Si nous trouvons grâce à tes yeux, seigneur, nous serons esclaves du pharaon.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Joseph fit de cela une prescription, en vigueur aujourd'hui encore, d'après laquelle un cinquième du revenu des terres de l'Egypte appartient au pharaon. Seules les terres des prêtres n'appartiennent pas au pharaon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Quant à Israël, il s'installa donc en Egypte dans la région de Gosen. Ils acquirent des propriétés, eurent des enfants et devinrent très nombreux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Jacob vécut 17 ans en Egypte, et la durée de sa vie fut de 147 ans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Lorsque Israël approcha du moment de sa mort, il appela son fils Joseph et lui dit: «Si j''ai trouvé grâce à tes yeux, mets ta main sous ma cuisse et jure que tu feras preuve de bonté et de fidélité envers moi en ne m''enterrant pas en Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Quand je serai couché en compagnie de mes ancêtres, tu me transporteras à l''extérieur de l''Egypte et tu m''enterreras dans le tombeau familial.» Joseph répondit: «J''agirai conformément à ta parole.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Jacob dit: «Jure-le-moi!» Et Joseph le lui jura. Puis Israël *se prosterna à la tête de son lit'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '47.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Se prosterna… lit: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hébreux 11.21
      metadata:
        usfm: HEB.11.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' d''après la Septante.'
    marker-yv: yv-n
  - type: text
    text: .
