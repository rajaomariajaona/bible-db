document_id: ZEC.10,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les bergers et le troupeau
  - type: text
    content: 'Demandez à l''Eternel la pluie, à l''époque de la pluie du printemps:'
  - type: text
    content: c'est l'Eternel qui produit les orages.
  - type: text
    content: Il vous accordera une pluie abondante,
  - type: text
    content: il donnera à chacun de l'herbe dans son champ.
  '10':
  - type: text
    content: Je les ramènerai d'Egypte
  - type: text
    content: et je les rassemblerai de l'Assyrie.
  - type: text
    content: Je les ferai venir au pays de Galaad et au Liban,
  - type: text
    content: et l'espace ne leur suffira pas.
  '11':
  - type: text
    content: Il passera la mer de la détresse,
  - type: text
    content: il frappera les flots de la mer,
  - type: text
    content: et toutes les profondeurs du Nil seront à sec.
  - type: text
    content: L'orgueil de l'Assyrie sera abattu
  - type: text
    content: et le sceptre de l'Egypte disparaîtra.
  '12':
  - type: text
    content: Je les fortifierai en l'Eternel,
  - type: text
    content: et ils marcheront en son nom,
  - type: text
    content: déclare l'Eternel.
  '2':
  - type: text
    content: En effet, les théraphim
  - type: note
    content: 'Les théraphim: voir la note sur Genèse 31.19.'
  - type: text
    content: ' ont des paroles vides,'
  - type: text
    content: les devins prophétisent des faussetés,
  - type: text
    content: les rêves mentent et leur consolation est illusoire.
  - type: text
    content: C'est pourquoi ils sont errants *comme un troupeau,
  - type: text
    content: ils sont malheureux parce qu'il n'y a pas de berger
  - type: note
    content: 'Comme… berger: voir Nombres 27.17 et la note.'
  - type: text
    content: .
  '3':
  - type: text
    content: Ma colère s'est enflammée contre les bergers,
  - type: text
    content: et j'interviendrai contre les boucs.
  - type: text
    content: Oui, l'Eternel, le maître de l'univers, visite son troupeau, la communauté de Juda,
  - type: text
    content: et il en fera comme son cheval d'honneur dans la bataille.
  '4':
  - type: text
    content: De Juda sortira la pierre angulaire, le piquet, l'arc de guerre,
  - type: text
    content: de lui sortiront tous les chefs ensemble.
  '5':
  - type: text
    content: 'Ils seront pareils à des héros qui piétinent dans la bataille la boue des rues:'
  - type: text
    content: ils combattront, parce que l'Eternel sera avec eux,
  - type: text
    content: et leurs ennemis, quoique montés sur des chevaux, seront couverts de honte.
  '6':
  - type: text
    content: Je fortifierai la communauté de Juda
  - type: text
    content: et je délivrerai la famille de Joseph.
  - type: text
    content: Je les ramènerai, car j'ai compassion d'eux,
  - type: text
    content: et ils seront comme si je ne les avais pas rejetés,
  - type: text
    content: car je suis l'Eternel, leur Dieu, et je leur répondrai.
  '7':
  - type: text
    content: Ephraïm sera pareil à un héros;
  - type: text
    content: leur cœur aura la joie que donne le vin.
  - type: text
    content: Leurs fils le verront et seront dans l'allégresse,
  - type: text
    content: leur cœur se réjouira en l'Eternel.
  '8':
  - type: text
    content: Je sifflerai et je les rassemblerai, car je les rachète,
  - type: text
    content: et ils seront aussi nombreux qu'autrefois.
  '9':
  - type: text
    content: Quand je les aurai dispersés parmi les peuples,
  - type: text
    content: au loin ils se souviendront de moi;
  - type: text
    content: ils vivront avec leurs enfants et ils reviendront.
