document_id: ZEC.10,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les bergers et le troupeau
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Demandez à l''Eternel la pluie, à l''époque de la pluie du printemps:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est l'Eternel qui produit les orages.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il vous accordera une pluie abondante,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il donnera à chacun de l'herbe dans son champ.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Je les ramènerai d'Egypte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je les rassemblerai de l'Assyrie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les ferai venir au pays de Galaad et au Liban,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'espace ne leur suffira pas.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Il passera la mer de la détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il frappera les flots de la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et toutes les profondeurs du Nil seront à sec.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'orgueil de l'Assyrie sera abattu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le sceptre de l'Egypte disparaîtra.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Je les fortifierai en l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils marcheront en son nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l'Eternel.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: En effet, les théraphim
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Les théraphim: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir la note sur '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Genèse 31.19
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' ont des paroles vides,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les devins prophétisent des faussetés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les rêves mentent et leur consolation est illusoire.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est pourquoi ils sont errants *comme un troupeau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont malheureux parce qu'il n'y a pas de berger
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Comme… berger: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nombres 27.17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' et la note.'
      marker-yv: yv-n
    - type: text
      text: .
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ma colère s'est enflammée contre les bergers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j'interviendrai contre les boucs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, l'Eternel, le maître de l'univers, visite son troupeau, la communauté de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il en fera comme son cheval d'honneur dans la bataille.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: De Juda sortira la pierre angulaire, le piquet, l'arc de guerre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de lui sortiront tous les chefs ensemble.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ils seront pareils à des héros qui piétinent dans la bataille la boue des rues:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils combattront, parce que l'Eternel sera avec eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leurs ennemis, quoique montés sur des chevaux, seront couverts de honte.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Je fortifierai la communauté de Juda
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je délivrerai la famille de Joseph.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les ramènerai, car j'ai compassion d'eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils seront comme si je ne les avais pas rejetés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je suis l'Eternel, leur Dieu, et je leur répondrai.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ephraïm sera pareil à un héros;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leur cœur aura la joie que donne le vin.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs fils le verront et seront dans l'allégresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leur cœur se réjouira en l'Eternel.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Je sifflerai et je les rassemblerai, car je les rachète,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils seront aussi nombreux qu'autrefois.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Quand je les aurai dispersés parmi les peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au loin ils se souviendront de moi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils vivront avec leurs enfants et ils reviendront.
