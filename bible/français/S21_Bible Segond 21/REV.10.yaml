document_id: REV.10,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le petit livre
  - type: text
    content: 'Puis je vis un [autre] ange puissant descendre du ciel, enveloppé d''une nuée. Au-dessus de sa tête était l''arc-en-ciel; son visage était comme le soleil et ses jambes comme des colonnes de feu. '
  '10':
  - type: text
    content: 'Je pris le petit livre de la main de l''ange et '
  - type: text
    content: je l'avalai. Dans ma bouche, il fut doux comme du miel
  - type: note
    content: 'Je l''avalai… miel: renvoi à Ezéchiel 3.3.'
  - type: text
    content: ', mais quand je l''eus avalé, mon ventre fut rempli d''amertume. '
  '11':
  - type: text
    content: 'Puis on me dit: «Il faut que tu prophétises de nouveau sur un grand nombre de peuples, de nations, de langues et de rois.»'
  '2':
  - type: text
    content: 'Il tenait dans sa main un petit livre ouvert. Il posa son pied droit sur la mer et son pied gauche sur la terre, '
  '3':
  - type: text
    content: 'et il cria d''une voix forte, comme un lion qui rugit. Quand il eut crié, les sept tonnerres firent entendre leur voix. '
  '4':
  - type: text
    content: 'Quand les sept tonnerres eurent fini de parler, j''allais écrire, mais j''entendis du ciel une voix qui disait: «Marque du sceau du secret ce qu''ont dit les sept tonnerres, ne l''écris pas.»'
  '5':
  - type: text
    content: 'Alors l''ange que j''avais vu debout sur la mer et sur la terre leva sa main [droite] vers le ciel '
  '6':
  - type: text
    content: 'et jura par celui qui vit aux siècles des siècles, qui a créé le ciel et ce qui s''y trouve, la terre et ce qui s''y trouve ainsi que la mer et ce qui s''y trouve: «Il n''y aura plus de délai, '
  '7':
  - type: text
    content: mais quand viendront les jours où l'on entendra le septième ange sonner de la trompette, le mystère de Dieu s'accomplira, comme il l'a annoncé à ses serviteurs les prophètes.»
  '8':
  - type: text
    content: 'La voix que j''avais entendue du ciel me parla de nouveau et me dit: «Va, prends le petit livre ouvert dans la main de l''ange qui se tient debout sur la mer et sur la terre.» '
  '9':
  - type: text
    content: 'J''allai donc vers l''ange et lui demandai de me donner le petit livre. Il me dit: «Prends-le et avale-le; il sera amer dans ton ventre, mais dans ta bouche il sera doux comme du miel.» '
