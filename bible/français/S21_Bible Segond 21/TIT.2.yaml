document_id: TIT.2,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Instructions à transmettre aux chrétiens
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant à toi, dis ce qui correspond à la saine doctrine. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ni commettre le moindre vol, mais à se montrer toujours dignes de confiance, afin d'honorer pleinement la doctrine de Dieu notre Sauveur.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, la grâce de Dieu, source de salut pour tous les hommes, a été révélée. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle nous enseigne à renoncer à un mode de vie impie et aux convoitises de ce monde et à vivre dans le temps présent conformément à la sagesse, la justice et la piété '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'en attendant notre bienheureuse espérance, la manifestation de la gloire de notre grand Dieu et Sauveur Jésus-Christ. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il s'est donné lui-même pour nous afin de nous racheter de toute faute et de se faire un peuple qui lui appartienne, purifié et zélé pour de belles œuvres.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dis ces choses, encourage et reprends avec une pleine autorité. Que personne ne te méprise.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dis que les vieillards doivent être sobres, respectables, réfléchis, solides dans la foi, l''amour et la persévérance. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De même, les femmes âgées doivent se comporter comme il convient à des servantes de Dieu. Elles ne doivent pas être médisantes ni esclaves de la boisson, mais enseigner ce qui est bien. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi elles apprendront aux jeunes femmes à aimer leur mari et leurs enfants, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: à se montrer réfléchies et pures, à s'occuper de leur foyer, être pleines de bonté et se soumettre à leur mari, afin que la parole de Dieu ne soit pas calomniée.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Encourage de même les jeunes gens à se montrer réfléchis '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'en étant toi-même à tout point de vue un modèle de belles œuvres. Dans ton enseignement, fais preuve de pureté, de sérieux [et d''intégrité]. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Que ta parole soit saine et irréprochable, afin que nos opposants soient couverts de honte, n'ayant aucun mal à dire de nous.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Encourage les esclaves à se soumettre à leurs maîtres, à leur être agréables en tout, à ne pas les contredire '
