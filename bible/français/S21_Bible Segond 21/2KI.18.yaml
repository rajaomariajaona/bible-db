document_id: 2KI.18,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Jusqu'à la chute du royaume de Juda
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 18.1–25.30
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règne d'Ezéchias sur Juda
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La troisième année du règne d''Osée, fils d''Ela, sur Israël, Ezéchias, fils d''Achaz, le roi de Juda, devint roi. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il la prit au bout de 3 ans, la sixième année du règne d''Ezéchias, qui était la neuvième année du règne d''Osée sur Israël. C''est à ce moment-là que Samarie fut prise. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi d''Assyrie exila les Israélites en Assyrie et il les conduisit à Chalach ainsi que sur les rives du Chabor, le fleuve de Gozan, et dans les villes des Mèdes. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cela arriva parce qu'ils n'avaient pas écouté l'Eternel, leur Dieu, et qu'ils avaient violé son alliance, parce qu'ils n'avaient pas écouté ni mis en pratique tout ce qu'avait ordonné Moïse, le serviteur de l'Eternel.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tentative d'invasion assyrienne
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La quatorzième année du règne d''Ezéchias, Sanchérib, le roi d''Assyrie, monta contre toutes les villes fortifiées de Juda et s''empara d''elles. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ezéchias, le roi de Juda, envoya dire au roi d''Assyrie à Lakis: «J''ai commis une faute! Eloigne-toi de moi. Ce que tu m''imposeras, je le supporterai.» Le roi d''Assyrie imposa à Ezéchias, le roi de Juda, un tribut de 9 tonnes d''argent et 900 kilos d''or. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ezéchias donna tout l''argent qui se trouvait dans la maison de l''Eternel et dans les trésors du palais royal. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce fut alors qu'Ezéchias, le roi de Juda, enleva les lames d'or dont il avait couvert les portes et les linteaux du temple de l'Eternel pour les donner au roi d'Assyrie.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toutefois, le roi d''Assyrie envoya de Lakis à Jérusalem, vers le roi Ezéchias, Tharthan, Rab-Saris et Rabshaké avec une puissante armée. Ils montèrent et arrivèrent à Jérusalem. Une fois montés et arrivés, ils s''arrêtèrent à l''aqueduc du réservoir supérieur, sur le chemin du champ du teinturier. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils appelèrent le roi. Le chef du palais royal, Eliakim, le fils de Hilkija, se rendit vers eux avec Shebna, le secrétaire, et l'archiviste Joach, fils d'Asaph.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rabshaké leur annonça: «Transmettez à Ezéchias: ‘Voici ce que dit le grand roi, le roi d''Assyrie: Sur quoi repose donc ta confiance? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il avait 25 ans lorsqu'il devint roi et il régna 29 ans à Jérusalem. Sa mère s'appelait Abi et c'était la fille de Zacharie.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu as dit qu''il fallait pour la guerre de la prudence et de la force, mais ce ne sont que des paroles en l''air. En qui donc as-tu placé ta confiance pour oser te révolter contre moi? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu l''as placée dans l''Egypte, tu as pris pour soutien ce roseau cassé qui pénètre et transperce la main de celui qui s''appuie dessus! Voilà ce qu''est le pharaon, le roi d''Egypte, pour tous ceux qui se confient en lui.’ '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Peut-être me direz-vous: ‘C''est en l''Eternel, notre Dieu, que nous plaçons notre confiance.’ Mais n''est-ce pas lui dont Ezéchias a fait disparaître les hauts lieux et les autels en disant à Juda et à Jérusalem: ‘Vous vous prosternerez devant cet autel à Jérusalem’? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant, passe un accord avec mon seigneur, le roi d''Assyrie, et je te donnerai 2000 chevaux, si tu peux fournir des cavaliers pour les monter. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comment pourrais-tu repousser un seul chef, même parmi les serviteurs les moins importants, de mon seigneur? Comment peux-tu mettre ta confiance dans l''Egypte pour les chars et pour les cavaliers? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'D''ailleurs, est-ce sans l''accord de l''Eternel que je suis monté contre cet endroit pour le détruire? L''Eternel m''a dit: ‘Monte contre ce pays et détruis-le!’»'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eliakim, fils de Hilkija, Shebna et Joach dirent à Rabshaké: «Parle à tes serviteurs en araméen, car nous comprenons cette langue, et ne nous parle pas en hébreu. En effet, le peuple qui se trouve sur la muraille entend tout.» '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rabshaké leur répondit: «Est-ce à ton seigneur et à toi que mon seigneur m''a envoyé dire ces paroles? N''est-ce pas à ces hommes assis sur la muraille pour manger leurs excréments et boire leur urine avec vous?»'
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Rabshaké prit position et cria à pleine voix en hébreu: «Ecoutez la parole du grand roi, du roi d''Assyrie! '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que dit le roi: ‘Qu''Ezéchias ne vous trompe pas! En effet, il ne pourra pas vous délivrer de ma domination.’ '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit ce qui est droit aux yeux de l''Eternel, entièrement comme l''avait fait son ancêtre David. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qu''Ezéchias ne vous amène pas à vous confier en l''Eternel en disant: ‘L''Eternel nous délivrera et cette ville ne sera pas livrée entre les mains du roi d''Assyrie.’ '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'N''écoutez pas Ezéchias, car voici ce que dit le roi d''Assyrie: ‘Faites la paix avec moi, sortez de la ville vers moi, et chacun de vous mangera des fruits de sa vigne et de son figuier, chacun boira de l''eau de sa citerne. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ensuite, je viendrai vous emmener dans un pays pareil au vôtre, dans un pays de blé et de vin, un pays de pain et de vignes, un pays d''oliviers à huile et de miel, et vous vivrez, vous ne mourrez pas. N''écoutez donc pas Ezéchias, car il pourrait vous pousser dans une mauvaise direction en affirmant: L''Eternel nous délivrera. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les dieux des autres nations ont-ils délivré chacun son pays de la domination du roi d''Assyrie? '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Où sont les dieux de Hamath et d''Arpad? Où sont les dieux de Sepharvaïm, d''Héna et d''Ivva? Ont-ils délivré Samarie de ma domination? '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Parmi tous les dieux de ces pays, quels sont ceux qui ont délivré leur pays de ma domination, pour que l'Eternel puisse en délivrer Jérusalem?’»
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le peuple garda le silence, il ne lui répondit pas un mot, car le roi avait donné cet ordre: «Vous ne lui répondrez pas.» '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le chef du palais royal, Eliakim, fils de Hilkija, Shebna, le secrétaire, et l'archiviste Joach, fils d'Asaph, vinrent trouver Ezéchias, les habits déchirés, et lui rapportèrent les paroles de Rabshaké.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit disparaître les hauts lieux, brisa les statues, abattit les idoles et mit en pièces le serpent de bronze que Moïse avait fabriqué, car les Israélites avaient jusqu''alors brûlé des parfums devant lui; on l''appelait Nehushtan. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il mit sa confiance dans l''Eternel, le Dieu d''Israël. De tous les rois de Juda qui lui succédèrent ou qui le précédèrent, aucun ne fut pareil à lui. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il s''attacha à l''Eternel sans se détourner de lui et il se conforma aux commandements qu''il avait prescrits à Moïse. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel fut avec Ezéchias qui réussit dans toutes ses entreprises. Il se révolta contre le roi d''Assyrie et ne lui fut plus asservi. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il porta des coups aux Philistins jusqu'à Gaza et dévasta leur territoire, aussi bien les simples tours de garde que les villes fortifiées.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La quatrième année du règne d''Ezéchias, qui était la septième année du règne d''Osée, fils d''Ela, sur Israël, Salmanasar, le roi d''Assyrie, monta contre Samarie et l''assiégea. '
