document_id: EST.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Démarche d'Esther auprès du roi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Trois jours plus tard, Esther mit sa tenue royale et se tint debout dans la cour intérieure du palais, devant les appartements du roi. Celui-ci était assis sur son trône royal dans le palais royal, face à l''entrée du bâtiment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Lorsqu''il vit la reine Esther debout dans la cour, elle gagna sa faveur et il lui tendit le sceptre en or qu''il tenait. Esther s''approcha et toucha le bout du sceptre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le roi lui dit: «Qu''as-tu, reine Esther, et que désires-tu? Même si tu réclames la moitié du royaume, elle te sera donnée.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Esther répondit: «Si tu le juges bon, roi, j''aimerais que tu viennes aujourd''hui avec Haman au banquet que j''ai organisé pour toi.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le roi dit alors: «Allez sans tarder chercher Haman pour répondre à l''invitation d''Esther», et il se rendit avec Haman au banquet que celle-ci avait préparé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Pendant qu''on buvait le vin, le roi dit à Esther: «Quel est l''objet de ta demande? Il te sera accordé. Que désires-tu? Même si tu réclames la moitié du royaume, tu l''obtiendras.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Esther répondit: «Ce que je demande et ce que je désire? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Si j'ai trouvé grâce à tes yeux et si tu juges bon de m'accorder l'objet de ma demande et de satisfaire mon désir, j'aimerais que tu viennes avec Haman au festin que j'organiserai pour vous, et c'est demain que je répondrai à ta proposition.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Hostilité d'Haman envers Mardochée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ce jour-là, Haman repartit content, dans de joyeuses dispositions. Mais lorsqu''il vit que Mardochée, toujours à la porte du roi, ne se levait toujours pas et ne tremblait toujours pas devant lui, il fut rempli de colère contre lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il parvint néanmoins à se contenir et rentra chez lui. Puis il envoya chercher ses amis et sa femme Zéresh, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'et il leur exposa point par point la valeur de ses richesses, le grand nombre de ses fils, toute l''importance et tout le pouvoir que le roi lui avait accordés en le plaçant au-dessus de tous les princes et de ses propres serviteurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il ajouta: «Je suis même le seul que la reine Esther ait admis avec le roi au banquet qu''elle a organisé et je suis encore invité pour demain chez elle en compagnie du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Cependant, tout cela n''a aucune valeur pour moi aussi longtemps que je verrai Mardochée, le Juif, assis à la porte du roi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Sa femme Zéresh et tous ses amis lui suggérèrent alors: «Fais préparer une potence de 25 mètres de haut et demain matin demande au roi qu''on y pende Mardochée. Tu pourras ensuite accompagner dans la joie le roi au banquet.» Haman trouva le conseil bon et fit préparer la potence.'
