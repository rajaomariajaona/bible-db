document_id: EST.5,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Démarche d'Esther auprès du roi
  - type: text
    content: 'Trois jours plus tard, Esther mit sa tenue royale et se tint debout dans la cour intérieure du palais, devant les appartements du roi. Celui-ci était assis sur son trône royal dans le palais royal, face à l''entrée du bâtiment. '
  '10':
  - type: text
    content: 'Il parvint néanmoins à se contenir et rentra chez lui. Puis il envoya chercher ses amis et sa femme Zéresh, '
  '11':
  - type: text
    content: 'et il leur exposa point par point la valeur de ses richesses, le grand nombre de ses fils, toute l''importance et tout le pouvoir que le roi lui avait accordés en le plaçant au-dessus de tous les princes et de ses propres serviteurs. '
  '12':
  - type: text
    content: 'Il ajouta: «Je suis même le seul que la reine Esther ait admis avec le roi au banquet qu''elle a organisé et je suis encore invité pour demain chez elle en compagnie du roi. '
  '13':
  - type: text
    content: 'Cependant, tout cela n''a aucune valeur pour moi aussi longtemps que je verrai Mardochée, le Juif, assis à la porte du roi.» '
  '14':
  - type: text
    content: 'Sa femme Zéresh et tous ses amis lui suggérèrent alors: «Fais préparer une potence de 25 mètres de haut et demain matin demande au roi qu''on y pende Mardochée. Tu pourras ensuite accompagner dans la joie le roi au banquet.» Haman trouva le conseil bon et fit préparer la potence.'
  '2':
  - type: text
    content: 'Lorsqu''il vit la reine Esther debout dans la cour, elle gagna sa faveur et il lui tendit le sceptre en or qu''il tenait. Esther s''approcha et toucha le bout du sceptre. '
  '3':
  - type: text
    content: 'Le roi lui dit: «Qu''as-tu, reine Esther, et que désires-tu? Même si tu réclames la moitié du royaume, elle te sera donnée.» '
  '4':
  - type: text
    content: 'Esther répondit: «Si tu le juges bon, roi, j''aimerais que tu viennes aujourd''hui avec Haman au banquet que j''ai organisé pour toi.»'
  '5':
  - type: text
    content: 'Le roi dit alors: «Allez sans tarder chercher Haman pour répondre à l''invitation d''Esther», et il se rendit avec Haman au banquet que celle-ci avait préparé. '
  '6':
  - type: text
    content: 'Pendant qu''on buvait le vin, le roi dit à Esther: «Quel est l''objet de ta demande? Il te sera accordé. Que désires-tu? Même si tu réclames la moitié du royaume, tu l''obtiendras.» '
  '7':
  - type: text
    content: 'Esther répondit: «Ce que je demande et ce que je désire? '
  '8':
  - type: text
    content: Si j'ai trouvé grâce à tes yeux et si tu juges bon de m'accorder l'objet de ma demande et de satisfaire mon désir, j'aimerais que tu viennes avec Haman au festin que j'organiserai pour vous, et c'est demain que je répondrai à ta proposition.»
  - type: heading
    content: Hostilité d'Haman envers Mardochée
  '9':
  - type: text
    content: 'Ce jour-là, Haman repartit content, dans de joyeuses dispositions. Mais lorsqu''il vit que Mardochée, toujours à la porte du roi, ne se levait toujours pas et ne tremblait toujours pas devant lui, il fut rempli de colère contre lui. '
