document_id: ECC.6,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Insatisfaction de l'homme
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Il y a un mal que j''ai vu sous le soleil et qui est fréquent parmi les hommes: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ce qui existe a déjà été appelé par son nom, et l''on sait ce qu''est l''homme: il est incapable de contester avec celui qui est plus fort que lui. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'S''il y a beaucoup de paroles, il y a beaucoup d''absurdités. Quel avantage l''homme en retire-t-il? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Qui sait en effet ce qui est bon pour l'homme dans la vie, tout au long de sa vie sans consistance qu'il traverse comme une ombre? Et qui peut annoncer à l'homme ce qui existera après lui sous le soleil?
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Dieu a pu donner des richesses, des biens et de la gloire à un homme, et rien de ce qu''il désire ne lui manque, mais Dieu ne lui laisse pas le pouvoir d''en jouir. Oui, c''est un étranger qui en jouira. C''est de la fumée et c''est un mal douloureux. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Même si un homme avait 100 fils et vivait un grand nombre d''années, même s''il prolongeait son existence, si son âme ne s''est pas rassasiée de bonheur et si, de plus, il n''a pas de sépulture, j''affirme qu''un enfant mort-né est plus heureux que lui. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'En effet, il est venu comme une vapeur et repart dans l''obscurité, et son nom restera sous un voile d''obscurité; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'il n''a pas vu, pas connu le soleil, et il a plus de repos que cet homme. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: A quoi bon vivre deux fois 1000 ans sans jouir du bonheur? Tous ne vont-ils pas au même endroit?
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Tout le travail de l''homme est pour sa bouche, et pourtant ses désirs ne sont jamais satisfaits. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'En effet, quel avantage le sage a-t-il sur l''homme stupide? A quoi sert-il à un pauvre de savoir se conduire dans la vie? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ce que les yeux voient est préférable à ce que recherche l''âme. Cela aussi, c''est de la fumée et cela revient à poursuivre le vent. '
