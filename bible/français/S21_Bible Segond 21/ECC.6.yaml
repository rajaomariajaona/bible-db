document_id: ECC.6,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Insatisfaction de l'homme
  - type: text
    content: 'Il y a un mal que j''ai vu sous le soleil et qui est fréquent parmi les hommes: '
  '10':
  - type: text
    content: 'Ce qui existe a déjà été appelé par son nom, et l''on sait ce qu''est l''homme: il est incapable de contester avec celui qui est plus fort que lui. '
  '11':
  - type: text
    content: 'S''il y a beaucoup de paroles, il y a beaucoup d''absurdités. Quel avantage l''homme en retire-t-il? '
  '12':
  - type: text
    content: Qui sait en effet ce qui est bon pour l'homme dans la vie, tout au long de sa vie sans consistance qu'il traverse comme une ombre? Et qui peut annoncer à l'homme ce qui existera après lui sous le soleil?
  '2':
  - type: text
    content: 'Dieu a pu donner des richesses, des biens et de la gloire à un homme, et rien de ce qu''il désire ne lui manque, mais Dieu ne lui laisse pas le pouvoir d''en jouir. Oui, c''est un étranger qui en jouira. C''est de la fumée et c''est un mal douloureux. '
  '3':
  - type: text
    content: 'Même si un homme avait 100 fils et vivait un grand nombre d''années, même s''il prolongeait son existence, si son âme ne s''est pas rassasiée de bonheur et si, de plus, il n''a pas de sépulture, j''affirme qu''un enfant mort-né est plus heureux que lui. '
  '4':
  - type: text
    content: 'En effet, il est venu comme une vapeur et repart dans l''obscurité, et son nom restera sous un voile d''obscurité; '
  '5':
  - type: text
    content: 'il n''a pas vu, pas connu le soleil, et il a plus de repos que cet homme. '
  '6':
  - type: text
    content: A quoi bon vivre deux fois 1000 ans sans jouir du bonheur? Tous ne vont-ils pas au même endroit?
  '7':
  - type: text
    content: 'Tout le travail de l''homme est pour sa bouche, et pourtant ses désirs ne sont jamais satisfaits. '
  '8':
  - type: text
    content: 'En effet, quel avantage le sage a-t-il sur l''homme stupide? A quoi sert-il à un pauvre de savoir se conduire dans la vie? '
  '9':
  - type: text
    content: 'Ce que les yeux voient est préférable à ce que recherche l''âme. Cela aussi, c''est de la fumée et cela revient à poursuivre le vent. '
