document_id: JOB.26,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Intervention n° 9 de Job
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Job prit la parole et dit:'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: »Il a tracé un cercle à la surface de l'eau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à la frontière entre la lumière et les ténèbres.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Les piliers du ciel sont ébranlés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont effarés quand il menace.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Par sa force il dompte la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par son intelligence il en brise l'orgueil.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Son souffle donne au ciel la sérénité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa main transperce le serpent fuyard.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: »Si tout cela ne représente qu'un aperçu de sa manière de faire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le faible écho qui nous en parvient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui pourra comprendre le tonnerre de sa puissance?»
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: «Comme tu sais bien venir en aide au faible!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quel beau secours tu prêtes au bras qui n'a plus de force!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Comme tu sais bien conseiller celui qui manque de sagesse!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quel grand discernement tu fais apparaître!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: A qui s'adressent tes paroles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui est-ce qui t'inspire?
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: »Les défunts tremblent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au-dessous de l'eau et des créatures qui l'habitent.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Devant Dieu le séjour des morts se retrouve nu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le gouffre de perdition est sans protection.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: C'est lui qui déploie le nord sur le vide,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui suspend la terre sur le vide.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Il enferme l'eau dans ses nuages
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans qu'ils se déchirent sous son poids.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Il recouvre son trône
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en déployant sa nuée sur lui.
