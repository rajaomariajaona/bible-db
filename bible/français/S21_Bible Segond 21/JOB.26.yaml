document_id: JOB.26,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Intervention n° 9 de Job
  - type: text
    content: 'Job prit la parole et dit:'
  '10':
  - type: text
    content: »Il a tracé un cercle à la surface de l'eau,
  - type: text
    content: à la frontière entre la lumière et les ténèbres.
  '11':
  - type: text
    content: Les piliers du ciel sont ébranlés,
  - type: text
    content: ils sont effarés quand il menace.
  '12':
  - type: text
    content: Par sa force il dompte la mer,
  - type: text
    content: par son intelligence il en brise l'orgueil.
  '13':
  - type: text
    content: Son souffle donne au ciel la sérénité,
  - type: text
    content: sa main transperce le serpent fuyard.
  '14':
  - type: text
    content: »Si tout cela ne représente qu'un aperçu de sa manière de faire,
  - type: text
    content: le faible écho qui nous en parvient,
  - type: text
    content: qui pourra comprendre le tonnerre de sa puissance?»
  '2':
  - type: text
    content: «Comme tu sais bien venir en aide au faible!
  - type: text
    content: Quel beau secours tu prêtes au bras qui n'a plus de force!
  '3':
  - type: text
    content: Comme tu sais bien conseiller celui qui manque de sagesse!
  - type: text
    content: Quel grand discernement tu fais apparaître!
  '4':
  - type: text
    content: A qui s'adressent tes paroles
  - type: text
    content: et qui est-ce qui t'inspire?
  '5':
  - type: text
    content: »Les défunts tremblent
  - type: text
    content: au-dessous de l'eau et des créatures qui l'habitent.
  '6':
  - type: text
    content: Devant Dieu le séjour des morts se retrouve nu,
  - type: text
    content: le gouffre de perdition est sans protection.
  '7':
  - type: text
    content: C'est lui qui déploie le nord sur le vide,
  - type: text
    content: qui suspend la terre sur le vide.
  '8':
  - type: text
    content: Il enferme l'eau dans ses nuages
  - type: text
    content: sans qu'ils se déchirent sous son poids.
  '9':
  - type: text
    content: Il recouvre son trône
  - type: text
    content: en déployant sa nuée sur lui.
