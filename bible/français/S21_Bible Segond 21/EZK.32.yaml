document_id: EZK.32,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Complainte sur le pharaon et l'Egypte
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'La douzième année, le premier jour du douzième mois, la parole de l''Eternel m''a été adressée: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Je frapperai de consternation beaucoup de peuples à cause de toi, leurs rois seront horrifiés à cause de ce qui t'arrive. Quand j'agiterai mon épée devant eux, à chaque instant ils auront peur pour leur vie, lorsque le jour de ta chute sera venu.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '»En effet, voici ce que dit le Seigneur, l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'épée du roi de Babylone fondra sur toi.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Je ferai tomber ta foule bruyante par l'épée de guerriers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui sont tous les plus violents parmi les nations.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils anéantiront l'orgueil de l'Egypte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et toute sa foule bruyante sera exterminée.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Je ferai disparaître tout son bétail des abords des grandes eaux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles ne seront plus remuées par le pied de l'homme
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni par le sabot des bêtes.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: C'est alors que je calmerai son eau
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que je ferai couler ses fleuves aussi tranquillement que l'huile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare le Seigneur, l'Eternel,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: quand j'aurai fait de l'Egypte un sujet de consternation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une terre vidée de tout ce qu'elle contient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand j'aurai frappé tous ceux qui l'habitent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et ils reconnaîtront que je suis l'Eternel.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: »Voilà la complainte que l'on chantera.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sont les filles des nations qui l'entonneront.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles la chanteront sur l'Egypte et sur toute sa foule bruyante,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare le Seigneur, l'Eternel.»
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'La douzième année, le quinzième jour du mois, la parole de l''Eternel m''a été adressée: '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: «Fils de l'homme, plains la foule bruyante de l'Egypte, puis précipite-la avec les autres nations prestigieuses dans les profondeurs de la terre, avec ceux qui descendent dans la tombe!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: »Te crois-tu plus admirable que les autres?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Descends et couche-toi avec les incirconcis!
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '«Fils de l''homme, prononce une complainte sur le pharaon, le roi d''Egypte! Tu lui diras:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Tu ressemblais à un jeune lion parmi les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu étais comme un crocodile dans les mers.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu t'élançais dans tes fleuves
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu rendais leur eau trouble avec tes pattes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu agitais leur cours.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Ils tomberont au milieu des victimes de l'épée.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L''épée est à disposition:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: entraînez l'Egypte et toute sa foule bruyante!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Les guerriers les plus braves lui adresseront la parole
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au milieu du séjour des morts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ainsi que ceux qui étaient ses alliés:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Ils sont descendus, ils sont ensevelis, les incirconcis
  - type: usfm
    marker: q1
    children:
    - type: text
      text: victimes de l'épée!’
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: »Là se trouve l'Assyrien avec toutes ses troupes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: entouré de ses tombeaux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous sont morts, victimes de l'épée.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Leurs tombeaux ont été placés dans les profondeurs de la fosse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les troupes autour de son tombeau.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous sont morts, victimes de l'épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eux qui semaient la terreur sur la terre des vivants.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: »Là se trouve Elam, avec toute sa foule bruyante
  - type: usfm
    marker: q1
    children:
    - type: text
      text: autour de son tombeau.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous sont morts, victimes de l'épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eux qui sont descendus incirconcis dans les profondeurs de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eux qui semaient la terreur sur la terre des vivants.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils portent leur humiliation avec ceux qui sont descendus dans la tombe.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: On a placé son lit parmi les morts avec toute sa foule bruyante,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au milieu de ses tombeaux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ces incirconcis ont été victimes de l'épée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu'ils semaient la terreur sur la terre des vivants.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils portent leur humiliation avec ceux qui sont descendus dans la tombe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont été placés parmi les morts.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: »Là se trouvent Méshec, Tubal et toute leur foule bruyante,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: entourés de leurs tombeaux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous ces incirconcis ont été victimes de l'épée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu'ils semaient la terreur sur la terre des vivants.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Ils n'ont pas été ensevelis avec les guerriers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui sont tombés parmi les incirconcis.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont descendus au séjour des morts avec leurs armes de guerre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on a mis leur épée sous leur tête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais leurs fautes resteront sur leurs ossements
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu'ils ont terrorisé des guerriers sur la terre des vivants.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: »Toi aussi, tu seras brisé au milieu des incirconcis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu seras enseveli avec ceux qui ont été victimes de l'épée.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: '»Là se trouvent Edom, ses rois et tous ses princes: malgré leur vaillance, ils ont été placés avec les victimes de l''épée, ils ont été ensevelis avec les incirconcis, avec ceux qui descendent dans la tombe.'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Voici ce que dit le Seigneur, l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lors du rassemblement de nombreux peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'étendrai mon piège sur toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils te remonteront dans mon filet.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: '»Là se trouvent tous les souverains du nord et tous les Sidoniens: ils sont descendus vers les morts, tout honteux, malgré la terreur qu''inspirait leur vaillance. Ces incirconcis sont ensevelis avec les victimes de l''épée, ils portent leur humiliation avec ceux qui sont descendus dans la tombe.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: '»En les voyant, le pharaon sera consolé du sort de toute sa foule bruyante, puisque lui et toute son armée seront victimes de l''épée, déclare le Seigneur, l''Eternel. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: En effet, je propage ma terreur sur la terre des vivants, et le pharaon et toute sa foule bruyante seront ensevelis au milieu des incirconcis avec les victimes de l'épée, déclare le Seigneur, l'Eternel.»
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Je te jetterai sur la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te lancerai à la surface des champs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je ferai habiter sur toi tous les oiseaux du ciel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j'amènerai les bêtes de toute la terre à se rassasier de toi.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: J'exposerai ta chair sur les montagnes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je remplirai les vallées de tes restes.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: J'arroserai de ton sang le pays où tu nages,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu'aux montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les lits des cours d'eau seront remplis de toi.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: »Quand tu t'éteindras, je voilerai le ciel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j'obscurcirai ses étoiles.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je couvrirai le soleil de nuages
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la lune ne donnera plus sa lumière.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: J'obscurcirai à cause de toi tout ce qui brille dans le ciel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je couvrirai ton pays de ténèbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare le Seigneur, l'Eternel.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '»Je contrarierai beaucoup de peuples quand je reporterai les effets de ton désastre sur les nations, sur des pays que tu ne connais pas. '
