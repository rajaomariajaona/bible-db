document_id: EZK.32,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Complainte sur le pharaon et l'Egypte
  - type: text
    content: 'La douzième année, le premier jour du douzième mois, la parole de l''Eternel m''a été adressée: '
  '10':
  - type: text
    content: Je frapperai de consternation beaucoup de peuples à cause de toi, leurs rois seront horrifiés à cause de ce qui t'arrive. Quand j'agiterai mon épée devant eux, à chaque instant ils auront peur pour leur vie, lorsque le jour de ta chute sera venu.
  '11':
  - type: text
    content: '»En effet, voici ce que dit le Seigneur, l''Eternel:'
  - type: text
    content: L'épée du roi de Babylone fondra sur toi.
  '12':
  - type: text
    content: Je ferai tomber ta foule bruyante par l'épée de guerriers
  - type: text
    content: qui sont tous les plus violents parmi les nations.
  - type: text
    content: Ils anéantiront l'orgueil de l'Egypte
  - type: text
    content: et toute sa foule bruyante sera exterminée.
  '13':
  - type: text
    content: Je ferai disparaître tout son bétail des abords des grandes eaux;
  - type: text
    content: elles ne seront plus remuées par le pied de l'homme
  - type: text
    content: ni par le sabot des bêtes.
  '14':
  - type: text
    content: C'est alors que je calmerai son eau
  - type: text
    content: et que je ferai couler ses fleuves aussi tranquillement que l'huile,
  - type: text
    content: déclare le Seigneur, l'Eternel,
  '15':
  - type: text
    content: quand j'aurai fait de l'Egypte un sujet de consternation,
  - type: text
    content: une terre vidée de tout ce qu'elle contient,
  - type: text
    content: quand j'aurai frappé tous ceux qui l'habitent.
  - type: text
    content: Et ils reconnaîtront que je suis l'Eternel.
  '16':
  - type: text
    content: »Voilà la complainte que l'on chantera.
  - type: text
    content: Ce sont les filles des nations qui l'entonneront.
  - type: text
    content: Elles la chanteront sur l'Egypte et sur toute sa foule bruyante,
  - type: text
    content: déclare le Seigneur, l'Eternel.»
  '17':
  - type: text
    content: 'La douzième année, le quinzième jour du mois, la parole de l''Eternel m''a été adressée: '
  '18':
  - type: text
    content: «Fils de l'homme, plains la foule bruyante de l'Egypte, puis précipite-la avec les autres nations prestigieuses dans les profondeurs de la terre, avec ceux qui descendent dans la tombe!
  '19':
  - type: text
    content: »Te crois-tu plus admirable que les autres?
  - type: text
    content: Descends et couche-toi avec les incirconcis!
  '2':
  - type: text
    content: '«Fils de l''homme, prononce une complainte sur le pharaon, le roi d''Egypte! Tu lui diras:'
  - type: text
    content: »Tu ressemblais à un jeune lion parmi les nations,
  - type: text
    content: tu étais comme un crocodile dans les mers.
  - type: text
    content: Tu t'élançais dans tes fleuves
  - type: text
    content: et tu rendais leur eau trouble avec tes pattes,
  - type: text
    content: tu agitais leur cours.
  '20':
  - type: text
    content: Ils tomberont au milieu des victimes de l'épée.
  - type: text
    content: 'L''épée est à disposition:'
  - type: text
    content: entraînez l'Egypte et toute sa foule bruyante!
  '21':
  - type: text
    content: Les guerriers les plus braves lui adresseront la parole
  - type: text
    content: au milieu du séjour des morts,
  - type: text
    content: 'ainsi que ceux qui étaient ses alliés:'
  - type: text
    content: ‘Ils sont descendus, ils sont ensevelis, les incirconcis
  - type: text
    content: victimes de l'épée!’
  '22':
  - type: text
    content: »Là se trouve l'Assyrien avec toutes ses troupes,
  - type: text
    content: entouré de ses tombeaux.
  - type: text
    content: Tous sont morts, victimes de l'épée.
  '23':
  - type: text
    content: Leurs tombeaux ont été placés dans les profondeurs de la fosse,
  - type: text
    content: et les troupes autour de son tombeau.
  - type: text
    content: Tous sont morts, victimes de l'épée,
  - type: text
    content: eux qui semaient la terreur sur la terre des vivants.
  '24':
  - type: text
    content: »Là se trouve Elam, avec toute sa foule bruyante
  - type: text
    content: autour de son tombeau.
  - type: text
    content: Tous sont morts, victimes de l'épée,
  - type: text
    content: eux qui sont descendus incirconcis dans les profondeurs de la terre,
  - type: text
    content: eux qui semaient la terreur sur la terre des vivants.
  - type: text
    content: Ils portent leur humiliation avec ceux qui sont descendus dans la tombe.
  '25':
  - type: text
    content: On a placé son lit parmi les morts avec toute sa foule bruyante,
  - type: text
    content: au milieu de ses tombeaux.
  - type: text
    content: Tous ces incirconcis ont été victimes de l'épée
  - type: text
    content: parce qu'ils semaient la terreur sur la terre des vivants.
  - type: text
    content: Ils portent leur humiliation avec ceux qui sont descendus dans la tombe,
  - type: text
    content: ils ont été placés parmi les morts.
  '26':
  - type: text
    content: »Là se trouvent Méshec, Tubal et toute leur foule bruyante,
  - type: text
    content: entourés de leurs tombeaux.
  - type: text
    content: Tous ces incirconcis ont été victimes de l'épée
  - type: text
    content: parce qu'ils semaient la terreur sur la terre des vivants.
  '27':
  - type: text
    content: Ils n'ont pas été ensevelis avec les guerriers,
  - type: text
    content: ceux qui sont tombés parmi les incirconcis.
  - type: text
    content: Ils sont descendus au séjour des morts avec leurs armes de guerre,
  - type: text
    content: on a mis leur épée sous leur tête,
  - type: text
    content: mais leurs fautes resteront sur leurs ossements
  - type: text
    content: parce qu'ils ont terrorisé des guerriers sur la terre des vivants.
  '28':
  - type: text
    content: »Toi aussi, tu seras brisé au milieu des incirconcis,
  - type: text
    content: tu seras enseveli avec ceux qui ont été victimes de l'épée.
  '29':
  - type: text
    content: '»Là se trouvent Edom, ses rois et tous ses princes: malgré leur vaillance, ils ont été placés avec les victimes de l''épée, ils ont été ensevelis avec les incirconcis, avec ceux qui descendent dans la tombe.'
  '3':
  - type: text
    content: 'Voici ce que dit le Seigneur, l''Eternel:'
  - type: text
    content: Lors du rassemblement de nombreux peuples,
  - type: text
    content: j'étendrai mon piège sur toi
  - type: text
    content: et ils te remonteront dans mon filet.
  '30':
  - type: text
    content: '»Là se trouvent tous les souverains du nord et tous les Sidoniens: ils sont descendus vers les morts, tout honteux, malgré la terreur qu''inspirait leur vaillance. Ces incirconcis sont ensevelis avec les victimes de l''épée, ils portent leur humiliation avec ceux qui sont descendus dans la tombe.'
  '31':
  - type: text
    content: '»En les voyant, le pharaon sera consolé du sort de toute sa foule bruyante, puisque lui et toute son armée seront victimes de l''épée, déclare le Seigneur, l''Eternel. '
  '32':
  - type: text
    content: En effet, je propage ma terreur sur la terre des vivants, et le pharaon et toute sa foule bruyante seront ensevelis au milieu des incirconcis avec les victimes de l'épée, déclare le Seigneur, l'Eternel.»
  '4':
  - type: text
    content: Je te jetterai sur la terre,
  - type: text
    content: je te lancerai à la surface des champs.
  - type: text
    content: Je ferai habiter sur toi tous les oiseaux du ciel
  - type: text
    content: et j'amènerai les bêtes de toute la terre à se rassasier de toi.
  '5':
  - type: text
    content: J'exposerai ta chair sur les montagnes
  - type: text
    content: et je remplirai les vallées de tes restes.
  '6':
  - type: text
    content: J'arroserai de ton sang le pays où tu nages,
  - type: text
    content: jusqu'aux montagnes,
  - type: text
    content: et les lits des cours d'eau seront remplis de toi.
  '7':
  - type: text
    content: »Quand tu t'éteindras, je voilerai le ciel
  - type: text
    content: et j'obscurcirai ses étoiles.
  - type: text
    content: Je couvrirai le soleil de nuages
  - type: text
    content: et la lune ne donnera plus sa lumière.
  '8':
  - type: text
    content: J'obscurcirai à cause de toi tout ce qui brille dans le ciel
  - type: text
    content: et je couvrirai ton pays de ténèbres,
  - type: text
    content: déclare le Seigneur, l'Eternel.
  '9':
  - type: text
    content: '»Je contrarierai beaucoup de peuples quand je reporterai les effets de ton désastre sur les nations, sur des pays que tu ne connais pas. '
