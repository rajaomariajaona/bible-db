document_id: 2SA.10,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Affront des Ammonites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Après cela, le roi des Ammonites mourut et son fils Hanun devint roi à sa place. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Il plaça le reste du peuple sous le commandement de son frère Abishaï, pour qu''il s''oppose aux Ammonites. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Il lui dit: «Si les Syriens sont plus forts que moi, tu viendras à mon secours, et si les Ammonites sont plus forts que toi, je viendrai au tien. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Sois fort, montrons du courage pour notre peuple et pour les villes de notre Dieu, et que l''Eternel fasse ce qui lui semblera bon!» '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Joab s''avança avec sa troupe pour attaquer les Syriens, et ceux-ci prirent la fuite devant lui. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Quand les Ammonites virent que les Syriens s'étaient enfuis, ils prirent eux aussi la fuite devant Abishaï et rentrèrent dans la ville. Joab s'éloigna des Ammonites et revint à Jérusalem.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Voyant qu''ils avaient été battus par Israël, les Syriens regroupèrent leurs forces. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Hadadézer envoya chercher les Syriens qui habitaient de l''autre côté de l''Euphrate. Ils arrivèrent à Hélam, avec à leur tête Shobac, le chef de l''armée d''Hadadézer. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'On l''annonça à David, qui rassembla tout Israël, passa le Jourdain et vint à Hélam. Les Syriens se rangèrent en ordre de bataille face à David et combattirent contre lui, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'mais ils prirent la fuite devant Israël. David tua parmi eux l''équipage de 700 chars et 40''000 cavaliers. Il frappa aussi Shobac, le chef de leur armée, qui mourut sur place. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tous les rois soumis à Hadadézer, se voyant battus par Israël, firent la paix avec les Israélites et leur furent asservis. Quant aux Syriens, ils n'osèrent plus se porter au secours des Ammonites.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'David se dit: «Je vais montrer de la bonté envers Hanun, le fils de Nachash, tout comme son père en a montré envers moi.» Et il envoya ses serviteurs le consoler au sujet de son père. Lorsque les serviteurs de David arrivèrent dans le pays des Ammonites, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'les chefs des Ammonites dirent à leur maître Hanun: «Penses-tu que ce soit pour honorer ton père que David t''envoie des consolateurs? N''est-ce pas pour faire une reconnaissance de la ville, pour l''explorer et la détruire, qu''il envoie ses serviteurs vers toi?» '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Alors Hanun arrêta les serviteurs de David, leur fit raser la moitié de la barbe et fit couper leurs habits par le milieu jusqu''en haut des cuisses. Puis il les renvoya. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'On en informa David et il envoya des messagers à leur rencontre, car ces hommes étaient couverts de honte. Le roi leur fit dire: «Restez à Jéricho jusqu''à ce que votre barbe ait repoussé et ne revenez qu''ensuite.»'
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Voyant qu''ils avaient provoqué le dégoût de David, les Ammonites firent engager 20''000 fantassins chez les Syriens de Beth-Rehob et chez ceux de Tsoba, 1000 hommes chez le roi de Maaca et 12''000 chez les habitants de Tob. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'A cette nouvelle, David envoya contre eux Joab et toute l''armée, les hommes vaillants. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Les Ammonites sortirent de leurs villes et se rangèrent en ordre de bataille à l'entrée de la ville. Les Syriens de Tsoba et de Rehob ainsi que les hommes de Tob et de Maaca étaient à part dans la campagne.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Joab vit qu''il avait à combattre par-devant et par-derrière. Il choisit alors sur toute l''élite d''Israël un groupe qu''il plaça en face des Syriens. '
