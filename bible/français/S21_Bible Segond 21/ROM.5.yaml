document_id: ROM.5,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Fruits de la justice obtenue par la foi
  - type: text
    content: 'Ainsi donc, déclarés justes sur la base de la foi, nous avons la paix avec Dieu par l''intermédiaire de notre Seigneur Jésus-Christ; '
  '10':
  - type: text
    content: 'En effet, si nous avons été réconciliés avec Dieu grâce à la mort de son Fils lorsque nous étions ses ennemis, nous serons à bien plus forte raison sauvés par sa vie maintenant que nous sommes réconciliés. '
  '11':
  - type: text
    content: Bien plus, nous plaçons notre fierté en Dieu par notre Seigneur Jésus-Christ, par qui maintenant nous avons reçu la réconciliation.
  '12':
  - type: text
    content: 'C''est pourquoi, de même que par un seul homme le péché est entré dans le monde, et par le péché la mort, de même la mort a atteint tous les hommes parce que tous ont péché. '
  '13':
  - type: text
    content: 'En effet, avant que la loi ne soit donnée, le péché était déjà dans le monde. Or, le péché n''est pas pris en compte quand il n''y a pas de loi. '
  '14':
  - type: text
    content: 'Pourtant la mort a régné depuis Adam jusqu''à Moïse, même sur ceux qui n''avaient pas péché par une transgression semblable à celle d''Adam, qui est l''image de celui qui devait venir. '
  '15':
  - type: text
    content: 'Mais il y a une différence entre le don gratuit et la faute. En effet, si beaucoup sont morts par la faute d''un seul, la grâce de Dieu et le don de la grâce qui vient d''un seul homme, Jésus-Christ, ont bien plus abondamment été déversés sur beaucoup. '
  '16':
  - type: text
    content: 'Et il y a une différence entre ce don et les conséquences du péché d''un seul. En effet, c''est après un seul péché que le jugement a entraîné la condamnation, tandis que le don gratuit entraîne l''acquittement après un grand nombre de fautes. '
  '17':
  - type: text
    content: Si par un seul homme, par la faute d'un seul, la mort a régné, ceux qui reçoivent avec abondance la grâce et le don de la justice régneront à bien plus forte raison dans la vie par Jésus-Christ lui seul.
  '18':
  - type: text
    content: 'Ainsi donc, de même que par une seule faute la condamnation a atteint tous les hommes, de même par un seul acte d''acquittement la justification qui donne la vie s''étend à tous les hommes. '
  '19':
  - type: text
    content: 'En effet, tout comme par la désobéissance d''un seul homme beaucoup ont été rendus pécheurs, beaucoup seront rendus justes par l''obéissance d''un seul. '
  '2':
  - type: text
    content: 'c''est aussi par son intermédiaire que nous avons accès par la foi à cette grâce, dans laquelle nous tenons ferme, et nous plaçons notre fierté dans l''espérance de prendre part à la gloire de Dieu. '
  '20':
  - type: text
    content: 'L''intervention de la loi a entraîné la multiplication des fautes, mais là où le péché s''est multiplié, la grâce a surabondé. '
  '21':
  - type: text
    content: Ainsi, de même que le péché a régné par la mort, de même la grâce règne par la justice pour la vie éternelle, par Jésus-Christ notre Seigneur.
  '3':
  - type: text
    content: 'Bien plus, nous sommes fiers même de nos détresses, sachant que la détresse produit la persévérance, '
  '4':
  - type: text
    content: 'la persévérance la victoire dans l''épreuve, et la victoire dans l''épreuve l''espérance. '
  '5':
  - type: text
    content: Or cette espérance ne trompe pas, parce que l'amour de Dieu est déversé dans notre cœur par le Saint-Esprit qui nous a été donné.
  '6':
  - type: text
    content: 'En effet, alors que nous étions encore sans force, Christ est mort pour des pécheurs au moment fixé. '
  '7':
  - type: text
    content: 'A peine mourrait-on pour un juste; peut-être accepterait-on de mourir pour quelqu''un de bien. '
  '8':
  - type: text
    content: 'Mais voici comment Dieu prouve son amour envers nous: alors que nous étions encore des pécheurs, Christ est mort pour nous. '
  '9':
  - type: text
    content: 'Puisque nous sommes maintenant considérés comme justes grâce à son sang, nous serons à bien plus forte raison sauvés par lui de la colère de Dieu. '
