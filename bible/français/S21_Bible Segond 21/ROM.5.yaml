document_id: ROM.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fruits de la justice obtenue par la foi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ainsi donc, déclarés justes sur la base de la foi, nous avons la paix avec Dieu par l''intermédiaire de notre Seigneur Jésus-Christ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'c''est aussi par son intermédiaire que nous avons accès par la foi à cette grâce, dans laquelle nous tenons ferme, et nous plaçons notre fierté dans l''espérance de prendre part à la gloire de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Bien plus, nous sommes fiers même de nos détresses, sachant que la détresse produit la persévérance, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'la persévérance la victoire dans l''épreuve, et la victoire dans l''épreuve l''espérance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Or cette espérance ne trompe pas, parce que l'amour de Dieu est déversé dans notre cœur par le Saint-Esprit qui nous a été donné.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'En effet, alors que nous étions encore sans force, Christ est mort pour des pécheurs au moment fixé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'A peine mourrait-on pour un juste; peut-être accepterait-on de mourir pour quelqu''un de bien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais voici comment Dieu prouve son amour envers nous: alors que nous étions encore des pécheurs, Christ est mort pour nous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Puisque nous sommes maintenant considérés comme justes grâce à son sang, nous serons à bien plus forte raison sauvés par lui de la colère de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'En effet, si nous avons été réconciliés avec Dieu grâce à la mort de son Fils lorsque nous étions ses ennemis, nous serons à bien plus forte raison sauvés par sa vie maintenant que nous sommes réconciliés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Bien plus, nous plaçons notre fierté en Dieu par notre Seigneur Jésus-Christ, par qui maintenant nous avons reçu la réconciliation.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'C''est pourquoi, de même que par un seul homme le péché est entré dans le monde, et par le péché la mort, de même la mort a atteint tous les hommes parce que tous ont péché. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'En effet, avant que la loi ne soit donnée, le péché était déjà dans le monde. Or, le péché n''est pas pris en compte quand il n''y a pas de loi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Pourtant la mort a régné depuis Adam jusqu''à Moïse, même sur ceux qui n''avaient pas péché par une transgression semblable à celle d''Adam, qui est l''image de celui qui devait venir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mais il y a une différence entre le don gratuit et la faute. En effet, si beaucoup sont morts par la faute d''un seul, la grâce de Dieu et le don de la grâce qui vient d''un seul homme, Jésus-Christ, ont bien plus abondamment été déversés sur beaucoup. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et il y a une différence entre ce don et les conséquences du péché d''un seul. En effet, c''est après un seul péché que le jugement a entraîné la condamnation, tandis que le don gratuit entraîne l''acquittement après un grand nombre de fautes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Si par un seul homme, par la faute d'un seul, la mort a régné, ceux qui reçoivent avec abondance la grâce et le don de la justice régneront à bien plus forte raison dans la vie par Jésus-Christ lui seul.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ainsi donc, de même que par une seule faute la condamnation a atteint tous les hommes, de même par un seul acte d''acquittement la justification qui donne la vie s''étend à tous les hommes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'En effet, tout comme par la désobéissance d''un seul homme beaucoup ont été rendus pécheurs, beaucoup seront rendus justes par l''obéissance d''un seul. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'L''intervention de la loi a entraîné la multiplication des fautes, mais là où le péché s''est multiplié, la grâce a surabondé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ainsi, de même que le péché a régné par la mort, de même la grâce règne par la justice pour la vie éternelle, par Jésus-Christ notre Seigneur.
