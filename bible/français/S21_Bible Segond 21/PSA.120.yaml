document_id: PSA.120,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La souffrance de l'exilé
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Chant des montées.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans ma détresse, c'est à l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que j'ai crié, et il m'a répondu.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Eternel, délivre-moi des lèvres fausses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de la langue trompeuse!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Que te donnera l'Eternel et que t'ajoutera-t-il,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: langue trompeuse?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Les flèches aiguës du guerrier
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec des charbons ardents de genêt!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Malheur à moi! J'ai dû séjourner à Méshec,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: habiter parmi les tentes de Kédar!
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: J'ai habité trop longtemps
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec ceux qui détestent la paix.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Je suis pour la paix, mais quand j'en parle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont pour la guerre.
