document_id: PSA.120,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La souffrance de l'exilé
  - type: text
    content: Chant des montées.
  - type: text
    content: Dans ma détresse, c'est à l'Eternel
  - type: text
    content: que j'ai crié, et il m'a répondu.
  '2':
  - type: text
    content: Eternel, délivre-moi des lèvres fausses,
  - type: text
    content: de la langue trompeuse!
  '3':
  - type: text
    content: Que te donnera l'Eternel et que t'ajoutera-t-il,
  - type: text
    content: langue trompeuse?
  '4':
  - type: text
    content: Les flèches aiguës du guerrier
  - type: text
    content: avec des charbons ardents de genêt!
  '5':
  - type: text
    content: Malheur à moi! J'ai dû séjourner à Méshec,
  - type: text
    content: habiter parmi les tentes de Kédar!
  '6':
  - type: text
    content: J'ai habité trop longtemps
  - type: text
    content: avec ceux qui détestent la paix.
  '7':
  - type: text
    content: Je suis pour la paix, mais quand j'en parle,
  - type: text
    content: ils sont pour la guerre.
