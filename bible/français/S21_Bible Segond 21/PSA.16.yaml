document_id: PSA.16,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Récompense et certitude du juste
  - type: text
    content: Hymne de David.
  - type: text
    content: Garde-moi, ô Dieu, car *je cherche refuge en toi
  - type: note
    content: 'Je cherche refuge en toi: placé dans la bouche de Christ en Hébreux 2.13; cf. Esaïe 8.17 et la note.'
  - type: text
    content: '!'
  '10':
  - type: text
    content: car tu *n'abandonneras pas mon âme au séjour des morts,
  - type: text
    content: tu ne permettras pas que ton bien-aimé connaisse la décomposition
  - type: note
    content: 'N''abandonneras… décomposition: cité en Actes 2.31; 13.35.'
  - type: text
    content: .
  '11':
  - type: text
    content: Tu me fais connaître le sentier de la vie;
  - type: text
    content: il y a d'abondantes joies dans ta présence
  - type: note
    content: 'J''ai constamment… dans ta présence: cité en Actes 2.25-28 comme annonçant la résurrection de Jésus.'
  - type: text
    content: ','
  - type: text
    content: un bonheur éternel à ta droite.
  '2':
  - type: text
    content: 'Je dis à l''Eternel: «Tu es mon Seigneur,'
  - type: text
    content: tu es mon bien suprême.»
  '3':
  - type: text
    content: Les saints qui sont dans le pays,
  - type: text
    content: les hommes pieux, sont l'objet de toute mon affection.
  '4':
  - type: text
    content: On multiplie les idoles, on court après les dieux étrangers,
  - type: text
    content: mais moi, je ne verse pas d'offrandes de sang en leur honneur,
  - type: text
    content: je ne mets pas leur nom sur mes lèvres.
  '5':
  - type: text
    content: Eternel, c'est toi qui es ma part et la coupe où je bois,
  - type: text
    content: c'est toi qui m'assures mon lot.
  '6':
  - type: text
    content: Un héritage délicieux m'est attribué,
  - type: text
    content: une belle possession m'est accordée.
  '7':
  - type: text
    content: Je bénis l'Eternel, car il me conseille;
  - type: text
    content: même la nuit mon cœur m'instruit.
  '8':
  - type: text
    content: '*J''ai constamment l''Eternel devant moi;'
  - type: text
    content: quand il est à ma droite, je ne suis pas ébranlé.
  '9':
  - type: text
    content: C'est pourquoi mon cœur est dans la joie, et mon esprit dans l'allégresse.
  - type: text
    content: Même mon corps reposera en sécurité,
