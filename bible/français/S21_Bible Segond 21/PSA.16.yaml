document_id: PSA.16,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Récompense et certitude du juste
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Hymne de David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Garde-moi, ô Dieu, car *je cherche refuge en toi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je cherche refuge en toi: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'placé dans la bouche de Christ en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hébreux 2.13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '; cf. '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 8.17
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' et la note.'
      marker-yv: yv-n
    - type: text
      text: '!'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tu *n'abandonneras pas mon âme au séjour des morts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu ne permettras pas que ton bien-aimé connaisse la décomposition
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'N''abandonneras… décomposition: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Actes 2.31
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ; 13.35.
      marker-yv: yv-n
    - type: text
      text: .
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu me fais connaître le sentier de la vie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il y a d'abondantes joies dans ta présence
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.8-11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'J''ai constamment… dans ta présence: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: cité en Actes 2.25-28 comme annonçant la résurrection de Jésus.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un bonheur éternel à ta droite.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je dis à l''Eternel: «Tu es mon Seigneur,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu es mon bien suprême.»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les saints qui sont dans le pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les hommes pieux, sont l'objet de toute mon affection.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On multiplie les idoles, on court après les dieux étrangers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais moi, je ne verse pas d'offrandes de sang en leur honneur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne mets pas leur nom sur mes lèvres.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, c'est toi qui es ma part et la coupe où je bois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est toi qui m'assures mon lot.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un héritage délicieux m'est attribué,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une belle possession m'est accordée.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je bénis l'Eternel, car il me conseille;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: même la nuit mon cœur m'instruit.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*J''ai constamment l''Eternel devant moi;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand il est à ma droite, je ne suis pas ébranlé.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est pourquoi mon cœur est dans la joie, et mon esprit dans l'allégresse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même mon corps reposera en sécurité,
