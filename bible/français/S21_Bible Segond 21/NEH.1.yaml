document_id: NEH.1,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Mandat de Néhémie
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 1.1–2.20
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tristesse de Néhémie
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Paroles de Néhémie, fils de Hacalia.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Durant le mois de Kisleu, la vingtième année du règne d'Artaxerxès
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Du règne d''Artaxerxès: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: non exprimé en hébreu, déduit de 2.1.
      marker-yv: yv-n
    - type: text
      text: ', alors que je me trouvais à Suse, la capitale, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils sont tes serviteurs et ton peuple, ceux que tu as rachetés par ta grande puissance et ta force. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Seigneur, prête donc une oreille attentive à la prière de ton serviteur et à celle de tes serviteurs qui prennent plaisir à craindre ton nom! Donne du succès à la démarche de ton serviteur, permets-lui de gagner la compassion de cet homme!»
  - type: usfm
    marker: p
    children:
    - type: text
      text: J'étais le responsable des boissons du roi.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hanani, l''un de mes frères, est arrivé avec quelques hommes de Juda. Je les ai interrogés au sujet des Juifs rescapés de la déportation et au sujet de Jérusalem. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils m''ont répondu: «Les rescapés de la déportation se retrouvent là, dans la province, au comble du malheur et du déshonneur. La muraille de Jérusalem est pleine de brèches et ses portes ont été réduites en cendres.»'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A cette nouvelle, je me suis assis, j''ai pleuré et j''ai porté le deuil durant des jours, jeûnant et priant devant le Dieu du ciel. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai dit:'
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Eternel, Dieu du ciel, Dieu grand et redoutable, toi qui conserves ton alliance et ta bonté à ceux qui t''aiment et qui respectent tes commandements, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'je t''en prie, prête-moi une oreille attentive et que tes yeux soient ouverts! Ecoute la prière que moi, ton serviteur, je t''adresse en ce moment! Jour et nuit, j''intercède pour tes serviteurs les Israélites en confessant leurs péchés, ceux que nous avons commis contre toi. Oui, ma famille et moi, nous avons péché. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C'est certain, nous nous sommes mal comportés envers toi, nous n'avons pas respecté les commandements, les prescriptions et les règles que tu avais donnés à ton serviteur Moïse.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Souviens-toi donc de la parole que tu as ordonné à ton serviteur Moïse de prononcer: ‘Si vous vous montrez infidèles, je vous disperserai moi-même parmi les peuples, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais si vous revenez à moi, si vous respectez mes commandements et les mettez en pratique, alors, même si vous êtes exilés à l''extrémité du ciel, je vous rassemblerai de là et je vous ramènerai à l''endroit que j''ai choisi pour y faire résider mon nom.’ '
