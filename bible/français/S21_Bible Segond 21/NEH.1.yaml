document_id: NEH.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Mandat de Néhémie
  - type: heading
    content: 1.1–2.20
  - type: heading
    content: Tristesse de Néhémie
  - type: text
    content: Paroles de Néhémie, fils de Hacalia.
  - type: text
    content: Durant le mois de Kisleu, la vingtième année du règne d'Artaxerxès
  - type: note
    content: 'Du règne d''Artaxerxès: non exprimé en hébreu, déduit de 2.1.'
  - type: text
    content: ', alors que je me trouvais à Suse, la capitale, '
  '10':
  - type: text
    content: 'Ils sont tes serviteurs et ton peuple, ceux que tu as rachetés par ta grande puissance et ta force. '
  '11':
  - type: text
    content: Seigneur, prête donc une oreille attentive à la prière de ton serviteur et à celle de tes serviteurs qui prennent plaisir à craindre ton nom! Donne du succès à la démarche de ton serviteur, permets-lui de gagner la compassion de cet homme!»
  - type: text
    content: J'étais le responsable des boissons du roi.
  '2':
  - type: text
    content: 'Hanani, l''un de mes frères, est arrivé avec quelques hommes de Juda. Je les ai interrogés au sujet des Juifs rescapés de la déportation et au sujet de Jérusalem. '
  '3':
  - type: text
    content: 'Ils m''ont répondu: «Les rescapés de la déportation se retrouvent là, dans la province, au comble du malheur et du déshonneur. La muraille de Jérusalem est pleine de brèches et ses portes ont été réduites en cendres.»'
  '4':
  - type: text
    content: 'A cette nouvelle, je me suis assis, j''ai pleuré et j''ai porté le deuil durant des jours, jeûnant et priant devant le Dieu du ciel. '
  '5':
  - type: text
    content: 'J''ai dit:'
  - type: text
    content: '«Eternel, Dieu du ciel, Dieu grand et redoutable, toi qui conserves ton alliance et ta bonté à ceux qui t''aiment et qui respectent tes commandements, '
  '6':
  - type: text
    content: 'je t''en prie, prête-moi une oreille attentive et que tes yeux soient ouverts! Ecoute la prière que moi, ton serviteur, je t''adresse en ce moment! Jour et nuit, j''intercède pour tes serviteurs les Israélites en confessant leurs péchés, ceux que nous avons commis contre toi. Oui, ma famille et moi, nous avons péché. '
  '7':
  - type: text
    content: C'est certain, nous nous sommes mal comportés envers toi, nous n'avons pas respecté les commandements, les prescriptions et les règles que tu avais donnés à ton serviteur Moïse.
  '8':
  - type: text
    content: '»Souviens-toi donc de la parole que tu as ordonné à ton serviteur Moïse de prononcer: ‘Si vous vous montrez infidèles, je vous disperserai moi-même parmi les peuples, '
  '9':
  - type: text
    content: 'mais si vous revenez à moi, si vous respectez mes commandements et les mettez en pratique, alors, même si vous êtes exilés à l''extrémité du ciel, je vous rassemblerai de là et je vous ramènerai à l''endroit que j''ai choisi pour y faire résider mon nom.’ '
