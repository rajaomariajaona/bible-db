document_id: JHN.6,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Multiplication des pains pour 5000 hommes
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Après cela, Jésus s''en alla de l''autre côté du lac de Galilée, ou lac de Tibériade. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Jésus dit: «Faites asseoir ces gens.» Il y avait beaucoup d''herbe à cet endroit. Ils s''assirent donc, au nombre d''environ 5000 hommes. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Jésus prit les pains, remercia Dieu et les distribua [aux disciples, qui les donnèrent] à ceux qui étaient là; il leur distribua de même des poissons, autant qu''ils en voulurent. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Lorsqu''ils furent rassasiés, il dit à ses disciples: «Ramassez les morceaux qui restent, afin que rien ne se perde.» '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ils les ramassèrent donc et ils remplirent douze paniers avec les morceaux qui restaient des cinq pains d'orge après que tous eurent mangé.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'A la vue du signe miraculeux que Jésus avait fait, ces gens disaient: «Cet homme est vraiment le prophète qui doit venir dans le monde.» '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Cependant Jésus, sachant qu'ils allaient venir l'enlever pour le faire roi, se retira de nouveau sur la montagne, tout seul.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Le soir venu, ses disciples descendirent au bord du lac. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Ils montèrent dans une barque pour traverser le lac et se rendre à Capernaüm. Il faisait déjà nuit et Jésus ne les avait pas encore rejoints. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Le vent soufflait avec violence et le lac était agité. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Après avoir ramé environ cinq kilomètres, ils virent Jésus qui marchait sur l''eau et s''approchait de la barque, et ils eurent peur. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Une grande foule le suivait, parce que les gens voyaient les signes miraculeux qu''il faisait sur les malades. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Mais Jésus leur dit: «C''est moi, n''ayez pas peur!» '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ils voulurent alors le prendre dans la barque, et aussitôt celle-ci aborda à l'endroit où ils allaient.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus, le pain de vie
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Le lendemain, la foule restée de l''autre côté du lac remarqua qu''il n''y avait eu là qu''une seule barque et que Jésus n''était pas monté dedans avec ses disciples, mais que ceux-ci étaient partis seuls. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'D''autres barques arrivèrent de Tibériade près de l''endroit où ils avaient mangé le pain après que le Seigneur eut remercié Dieu. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Quand les gens s''aperçurent que ni Jésus ni ses disciples n''étaient là, ils montèrent dans ces barques et allèrent à Capernaüm à la recherche de Jésus. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ils le trouvèrent de l''autre côté du lac et lui dirent: «Maître, quand es-tu venu ici?» '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Jésus leur répondit: «En vérité, en vérité, je vous le dis, vous me cherchez non parce que vous avez vu des signes, mais parce que vous avez mangé du pain et que vous avez été rassasiés. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Travaillez, non pour la nourriture périssable, mais pour celle qui subsiste pour la vie éternelle, celle que le Fils de l'homme vous donnera, car c'est lui que le Père, Dieu lui-même, a marqué de son empreinte
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Son empreinte: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: l'empreinte d'un sceau (bague ou objet cylindrique), apposée sur un document, servait à le protéger, à l'authentifier ou à signaler son propriétaire.
      marker-yv: yv-n
    - type: text
      text: '.» '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Ils lui dirent: «Que devons-nous faire pour accomplir les œuvres de Dieu?» '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Jésus leur répondit: «L''œuvre de Dieu, c''est que vous croyiez en celui qu''il a envoyé.» '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Jésus monta sur la montagne, et là il s''assit avec ses disciples. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: '«Quel signe miraculeux fais-tu donc, lui dirent-ils, afin que nous le voyions et que nous croyions en toi? Que fais-tu? '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Nos ancêtres ont mangé la manne
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.31 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Manne: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'nourriture accordée chaque jour, durant 40 ans, par Dieu aux Israélites après leur sortie d''Egypte, pendant leur parcours dans le désert (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Exode 16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' dans le désert, comme cela est écrit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Il leur a donné le pain du ciel à manger
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Il leur… manger: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 78.24
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: »
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Jésus leur dit: «En vérité, en vérité, je vous le dis, ce n''est pas Moïse qui vous a donné le pain du ciel, mais c''est mon Père qui vous donne le vrai pain du ciel. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'En effet, le pain de Dieu, c''est celui qui descend du ciel et qui donne la vie au monde.» '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ils lui dirent alors: «Seigneur, donne-nous toujours ce pain-là!»'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Jésus leur dit: «C''est moi qui suis le pain de la vie. Celui qui vient à moi n''aura jamais faim et celui qui croit en moi n''aura jamais soif. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Mais, je vous l''ai dit, vous m''avez vu et pourtant vous ne croyez pas. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Tous ceux que le Père me donne viendront à moi et je ne mettrai pas dehors celui qui vient à moi. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'En effet, je suis descendu du ciel pour faire non pas ma volonté, mais celle de celui qui m''a envoyé. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: '[Or, la volonté du Père qui m''a envoyé,] c''est que je ne perde aucun de tous ceux qu''il m''a donnés, mais que je les ressuscite le dernier jour. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Or la Pâque, la fête juive, était proche.
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: En effet, la volonté de mon Père, c'est que toute personne qui voit le Fils et croit en lui ait la vie éternelle, et moi, je la ressusciterai le dernier jour.»
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Les Juifs murmuraient à son sujet parce qu''il avait dit: «Je suis le pain descendu du ciel», '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'et ils disaient: «N''est-ce pas Jésus, le fils de Joseph, celui dont nous connaissons le père et la mère? Comment donc peut-il dire: ‘Je suis descendu du ciel’?» '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Jésus leur répondit: «Ne murmurez pas entre vous. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Personne ne peut venir à moi, à moins que le Père qui m''a envoyé ne l''attire, et moi, je le ressusciterai le dernier jour. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Il est écrit dans les prophètes: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Ils seront tous enseignés de Dieu
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.45 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ils seront… Dieu: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 54.13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' Ainsi donc, toute personne qui a entendu le Père et s''est laissé instruire vient à moi. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'C''est que personne n''a vu le Père, sauf celui qui vient de Dieu; lui, il a vu le Père. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'En vérité, en vérité, je vous le dis, celui qui croit [en moi] a la vie éternelle. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Je suis le pain de la vie. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: 'Vos ancêtres ont mangé la manne dans le désert et ils sont morts. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Jésus leva les yeux et vit une grande foule venir vers lui. Il dit à Philippe: «Où achèterons-nous des pains pour que ces gens aient à manger?» '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Voici comment est le pain qui descend du ciel: celui qui en mange ne mourra pas. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: Je suis le pain vivant descendu du ciel. Si quelqu'un mange de ce pain, il vivra éternellement, et le pain que je donnerai, c'est mon corps, [que je donnerai] pour la vie du monde.»
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Là-dessus, les Juifs se mirent à discuter vivement entre eux, disant: «Comment peut-il nous donner son corps à manger?» '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: 'Jésus leur dit: «En vérité, en vérité, je vous le dis, si vous ne mangez pas le corps du Fils de l''homme et si vous ne buvez pas son sang, vous n''avez pas la vie en vous-mêmes. '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'Celui qui mange mon corps et qui boit mon sang a la vie éternelle, et moi, je le ressusciterai le dernier jour. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'En effet, mon corps est vraiment une nourriture et mon sang est vraiment une boisson. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: 'Celui qui mange mon corps et qui boit mon sang demeure en moi, et moi je demeure en lui. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'Tout comme le Père qui est vivant m''a envoyé et que je vis grâce au Père, ainsi celui qui me mange vivra grâce à moi. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: Voilà comment est le pain descendu du ciel. Il n'est pas comme [la manne que vos] ancêtres ont mangée; eux sont morts, mais celui qui mange de ce pain vivra éternellement.»
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: 'Jésus dit ces paroles alors qu''il enseignait dans une synagogue, à Capernaüm. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Il disait cela pour le mettre à l''épreuve, car lui-même savait ce qu''il allait faire. '
  '60':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '60'
    - type: text
      text: 'Après l''avoir entendu, beaucoup de ses disciples dirent: «Cette parole est dure. Qui peut l''écouter?» '
  '61':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '61'
    - type: text
      text: 'Jésus savait en lui-même que ses disciples murmuraient à ce sujet. Il leur dit: «Cela vous scandalise? '
  '62':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '62'
    - type: text
      text: 'Si vous voyiez le Fils de l''homme monter là où il était auparavant! '
  '63':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '63'
    - type: text
      text: 'C''est l''Esprit qui fait vivre, l''homme n''arrive à rien. Les paroles que je vous dis sont Esprit et vie, '
  '64':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '64'
    - type: text
      text: 'mais il y en a parmi vous quelques-uns qui ne croient pas.» En effet, Jésus savait dès le début qui étaient ceux qui ne croyaient pas et qui était celui qui le trahirait. '
  '65':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '65'
    - type: text
      text: 'Il ajouta: «Voilà pourquoi je vous ai dit que personne ne peut venir à moi à moins que cela ne lui soit donné par mon Père.» '
  '66':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '66'
    - type: text
      text: Dès ce moment, beaucoup de ses disciples se retirèrent et arrêtèrent de marcher avec lui.
  '67':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '67'
    - type: text
      text: 'Jésus dit alors aux douze: «Et vous, ne voulez-vous pas aussi vous en aller?» '
  '68':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '68'
    - type: text
      text: 'Simon Pierre lui répondit: «Seigneur, à qui irions-nous? Tu as les paroles de la vie éternelle. '
  '69':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '69'
    - type: text
      text: 'Et nous, nous croyons et nous savons que tu es le Messie, le Fils du Dieu vivant.» '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Philippe lui répondit: «Les pains qu''on aurait pour 200 pièces d''argent ne suffiraient pas pour que chacun en reçoive un peu.» '
  '70':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '70'
    - type: text
      text: 'Jésus leur répondit: «N''est-ce pas moi qui vous ai choisis, vous les douze? Et l''un de vous est un diable!» '
  '71':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '71'
    - type: text
      text: Il parlait de Judas l'Iscariot
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.71 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Iscariot: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire homme de Karioth, ville de Judée.
      marker-yv: yv-n
    - type: text
      text: ', fils de Simon, car c''était lui qui allait le trahir, lui, l''un des douze.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Un de ses disciples, André, le frère de Simon Pierre, lui dit: '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '«Il y a ici un jeune garçon qui a cinq pains d''orge et deux poissons, mais qu''est-ce que cela pour tant de monde?» '
