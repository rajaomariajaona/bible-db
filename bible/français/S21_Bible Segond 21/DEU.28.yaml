document_id: DEU.28,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Bénédictions en perspective
  - type: text
    content: '»Si tu obéis à l''Eternel, ton Dieu, en respectant et en mettant en pratique tous ses commandements que je te prescris aujourd''hui, l''Eternel, ton Dieu, te donnera la supériorité sur toutes les nations de la terre. '
  '10':
  - type: text
    content: Tous les peuples de la terre verront que tu es appelé du nom de l'Eternel et ils auront peur de toi.
  '11':
  - type: text
    content: '»L''Eternel te comblera de biens en multipliant tes enfants, les portées de tes troupeaux et le produit de ton sol dans le territoire qu''il a juré à tes ancêtres de te donner. '
  '12':
  - type: text
    content: 'L''Eternel t''ouvrira son bon trésor, le ciel, pour envoyer au moment voulu la pluie sur ton pays et pour bénir tout le travail de tes mains. Tu prêteras à beaucoup de nations et tu ne feras pas d''emprunt. '
  '13':
  - type: text
    content: 'L''Eternel fera de toi la tête et non la queue, tu seras toujours en haut et jamais en bas, lorsque tu obéiras aux commandements de l''Eternel, ton Dieu, que je te prescris aujourd''hui pour que tu les respectes et les mettes en pratique, '
  '14':
  - type: text
    content: et lorsque tu ne t'écarteras ni à droite ni à gauche de tous les commandements que je vous donne aujourd'hui pour suivre d'autres dieux et les servir.
  - type: heading
    content: Malédictions en perspective
  '15':
  - type: text
    content: '»En revanche, si tu n''obéis pas à l''Eternel, ton Dieu, en respectant et mettant en pratique tous ses commandements et toutes ses prescriptions, que je te donne aujourd''hui, voici toutes les malédictions qui t''atteindront et seront ton lot:'
  '16':
  - type: text
    content: '»Tu seras maudit dans la ville et dans les champs. '
  '17':
  - type: text
    content: 'Ta corbeille et ta huche seront maudites. '
  '18':
  - type: text
    content: Tes enfants, le produit de ton sol, les portées de ton gros et de ton petit bétail, tout cela sera maudit.
  '19':
  - type: text
    content: »Tu seras maudit à ton arrivée et à ton départ.
  '2':
  - type: text
    content: 'Voici toutes les bénédictions qui se déverseront sur toi et seront ton lot lorsque tu obéiras à l''Eternel, ton Dieu:'
  '20':
  - type: text
    content: '»L''Eternel enverra contre toi la malédiction, le trouble et la menace, au milieu de toutes les entreprises où tu t''engageras, jusqu''à ce que tu sois détruit et disparaisses – ce ne sera pas long – à cause de la méchanceté de tes agissements, qui t''aura amené à m''abandonner. '
  '21':
  - type: text
    content: 'L''Eternel attachera la peste à toi jusqu''à ce qu''elle t''élimine du territoire dont tu vas entrer en possession. '
  '22':
  - type: text
    content: L'Eternel te frappera de dépérissement, de fièvre, d'inflammation, de chaleur brûlante, de dessèchement, de rouille et de nielle
  - type: note
    content: 'De rouille et de nielle: maladies des céréales.'
  - type: text
    content: '. Tout cela te poursuivra jusqu''à ce que tu disparaisses. '
  '23':
  - type: text
    content: 'Le ciel au-dessus de ta tête sera de bronze, et la terre sous tes pieds sera de fer. '
  '24':
  - type: text
    content: En guise de pluie, l'Eternel enverra à ton pays du sable et de la poussière et il en descendra du ciel sur toi jusqu'à ce que tu sois détruit.
  '25':
  - type: text
    content: '»L''Eternel te fera battre par tes ennemis. Tu sortiras contre eux par un seul chemin et c''est par sept chemins que tu fuiras devant eux. Tu seras un objet d''effroi pour tous les royaumes de la terre. '
  '26':
  - type: text
    content: 'Ton cadavre servira de nourriture à tous les oiseaux du ciel et aux bêtes de la terre, et il n''y aura personne pour les troubler. '
  '27':
  - type: text
    content: 'L''Eternel te frappera de l''ulcère qui a frappé les Egyptiens, d''hémorroïdes, de gale et de teigne, et tu ne pourras pas en guérir. '
  '28':
  - type: text
    content: 'L''Eternel te frappera de délire, d''aveuglement, d''affolement, '
  '29':
  - type: text
    content: 'et tu tâtonneras en plein midi comme l''aveugle dans l''obscurité. Tu n''auras pas de succès dans tes entreprises et tu seras tous les jours exploité, pillé, sans personne pour venir à ton secours. '
  '3':
  - type: text
    content: '»Tu seras béni dans la ville et dans les champs. '
  '30':
  - type: text
    content: 'Tu auras une fiancée et c''est un autre homme qui couchera avec elle; tu construiras une maison et tu ne l''habiteras pas; tu planteras une vigne et tu n''en jouiras pas. '
  '31':
  - type: text
    content: 'Ton bœuf sera égorgé sous tes yeux et tu n''en mangeras pas; ton âne sera enlevé devant toi et on ne te le rendra pas. Tes brebis seront données à tes ennemis et il n''y aura personne pour venir à ton secours. '
  '32':
  - type: text
    content: 'Tes fils et tes filles seront livrés à un autre peuple, tes yeux le verront et languiront constamment après eux, mais ta main restera sans force. '
  '33':
  - type: text
    content: 'Un peuple que tu n''auras pas connu mangera le produit de ton sol et de ton travail, et tu seras tous les jours exploité et écrasé. '
  '34':
  - type: text
    content: 'Le spectacle que tu auras sous les yeux te rendra fou. '
  '35':
  - type: text
    content: 'L''Eternel te frappera aux genoux et aux cuisses d''un ulcère malin dont tu ne pourras guérir, il te frappera depuis la plante du pied jusqu''au sommet de la tête. '
  '36':
  - type: text
    content: 'L''Eternel vous enverra, toi et le roi que tu auras établi sur toi, vers une nation que vous n''aurez pas connue, ni toi ni tes ancêtres. Et là, tu serviras d''autres dieux, du bois et de la pierre. '
  '37':
  - type: text
    content: Tu seras un sujet d'étonnement, de proverbe et de raillerie parmi tous les peuples chez qui l'Eternel te conduira.
  '38':
  - type: text
    content: '»Tu répandras beaucoup de semence sur ton champ et tu feras une faible récolte car les sauterelles la dévoreront. '
  '39':
  - type: text
    content: 'Tu planteras des vignes, tu les cultiveras, et tu ne boiras pas de vin ni ne feras de récolte car les vers la mangeront. '
  '4':
  - type: text
    content: 'Tes enfants, le produit de ton sol, les portées de tes troupeaux, de ton gros et de ton petit bétail, tout cela sera béni. '
  '40':
  - type: text
    content: 'Tu auras des oliviers sur tout ton territoire et tu ne t''enduiras pas d''huile car tes olives tomberont. '
  '41':
  - type: text
    content: 'Tu auras des fils et des filles et ils ne seront pas à toi car ils partiront en déportation. '
  '42':
  - type: text
    content: 'Les insectes prendront possession de tous tes arbres et du produit de ton sol. '
  '43':
  - type: text
    content: 'L''étranger en séjour chez toi s''élèvera toujours plus au-dessus de toi et toi, tu descendras toujours plus bas. '
  '44':
  - type: text
    content: 'Il te fera des prêts et toi, tu ne pourras pas lui en faire. Il sera la tête et toi la queue. '
  '45':
  - type: text
    content: 'Toutes ces malédictions t''atteindront. Elles te poursuivront et seront ton lot jusqu''à ce que tu sois détruit, parce que tu n''auras pas obéi à l''Eternel, ton Dieu, parce que tu n''auras pas respecté ses commandements et ses prescriptions qu''il te donne. '
  '46':
  - type: text
    content: Elles seront à toujours pour tes descendants et toi comme des signes et des prodiges.
  '47':
  - type: text
    content: '»Pour n''avoir pas, au milieu de l''abondance générale, servi l''Eternel, ton Dieu, avec joie et de bon cœur, '
  '48':
  - type: text
    content: 'tu serviras, au milieu de la faim, de la soif, de la nudité et des privations générales, les ennemis que l''Eternel enverra contre toi. Il t''imposera une domination inflexible jusqu''à ce qu''il t''ait détruit. '
  '49':
  - type: text
    content: 'L''Eternel fera partir de loin, des extrémités de la terre, une nation qui fondra sur toi d''un vol d''aigle. Ce sera une nation dont tu ne comprendras pas la langue, '
  '5':
  - type: text
    content: Ta corbeille et ta huche seront bénies.
  '50':
  - type: text
    content: 'une nation au visage dur, qui n''aura ni respect pour le vieillard ni pitié pour l''enfant. '
  '51':
  - type: text
    content: 'Elle mangera les portées de tes troupeaux et le produit de ton sol jusqu''à ce que tu sois détruit. Elle ne te laissera ni blé, ni vin nouveau, ni huile, ni portées de ton gros et de ton petit bétail, jusqu''à ce qu''elle t''ait fait disparaître. '
  '52':
  - type: text
    content: Elle t'assiégera dans toutes tes villes jusqu'à ce que tes murailles tombent, ces hautes et fortes murailles dans lesquelles tu auras placé ta confiance sur tout ton territoire. Elle t'assiégera dans toutes tes villes, dans tout le pays que l'Eternel, ton Dieu, te donne.
  '53':
  - type: text
    content: '»Au milieu de l''angoisse et de la détresse où te réduira ton ennemi, tu mangeras tes enfants, la chair des fils et des filles que l''Eternel, ton Dieu, t''aura donnés. '
  '54':
  - type: text
    content: 'L''homme le plus délicat et le plus raffiné parmi vous aura un regard dépourvu de pitié pour son frère, pour la femme qui repose sur sa poitrine, pour ceux de ses enfants qu''il aura épargnés. '
  '55':
  - type: text
    content: 'A aucun d''eux il ne donnera à manger de la chair de ses enfants dont il fait sa nourriture, parce qu''il ne lui restera plus rien au milieu de l''angoisse et de la détresse où te réduira ton ennemi dans toutes tes villes. '
  '56':
  - type: text
    content: 'La femme la plus délicate et la plus raffinée parmi vous, celle qui par raffinement et délicatesse n''essayait même pas de poser à terre la plante de son pied, aura un regard dépourvu de pitié pour le mari qui repose sur sa poitrine, pour son fils et pour sa fille, '
  '57':
  - type: text
    content: et même pour le nouveau-né sorti de son ventre, pour les enfants qu'elle mettra au monde. En effet, manquant de tout, elle en fera secrètement sa nourriture au milieu de l'angoisse et de la détresse où ton ennemi te réduira dans tes villes.
  '58':
  - type: text
    content: '»Si tu ne veilles pas à mettre en pratique toutes les paroles de cette loi, qui sont écrites dans ce livre, à craindre ce nom glorieux et redoutable, celui de l''Eternel, ton Dieu, '
  '59':
  - type: text
    content: 'l''Eternel te frappera, toi et ta descendance, de fléaux extraordinaires. Il te frappera de fléaux importants et durables, de maladies graves et tenaces. '
  '6':
  - type: text
    content: '»Tu seras béni à ton arrivée et à ton départ. '
  '60':
  - type: text
    content: 'Il amènera sur toi toutes les maladies d''Egypte devant lesquelles tu tremblais et elles s''attacheront à toi. '
  '61':
  - type: text
    content: 'Et même, l''Eternel fera venir sur toi, jusqu''à ce que tu sois détruit, toutes sortes de maladies et de fléaux qui ne sont pas mentionnés dans le livre de cette loi. '
  '62':
  - type: text
    content: 'Après avoir été aussi nombreux que les étoiles du ciel, vous ne resterez qu''en petit nombre, parce que tu n''auras pas obéi à l''Eternel, ton Dieu. '
  '63':
  - type: text
    content: 'De même que l''Eternel prenait plaisir à vous faire du bien et à vous multiplier, de même il prendra plaisir à vous faire disparaître et à vous détruire. Vous serez arrachés du territoire dont tu vas entrer en possession. '
  '64':
  - type: text
    content: 'L''Eternel te dispersera parmi tous les peuples, d''une extrémité de la terre à l''autre, et là, tu serviras d''autres dieux que ni toi ni tes ancêtres n''avez connus, du bois et de la pierre. '
  '65':
  - type: text
    content: 'Parmi ces nations, tu ne seras pas tranquille et tu n''auras pas un lieu de repos pour la plante de tes pieds. L''Eternel te donnera un cœur inquiet, des yeux affaiblis, une âme découragée. '
  '66':
  - type: text
    content: 'Ta vie sera comme suspendue à un fil devant toi, tu trembleras la nuit et le jour, tu n''auras pas confiance dans l''existence. '
  '67':
  - type: text
    content: 'A cause de la frayeur qui remplira ton cœur et du spectacle que tes yeux verront, tu diras le matin: ‘Si seulement c''était le soir!’ et tu diras le soir: ‘Si seulement c''était le matin!’ '
  '68':
  - type: text
    content: 'L''Eternel te ramènera par bateaux en Egypte, par le chemin dont je t''avais dit: ‘Tu ne le reverras plus!’ Là, vous vous vendrez vous-mêmes à vos ennemis comme esclaves et servantes, et il n''y aura personne pour vous acheter.»'
  - type: heading
    content: Renouvellement de l'alliance
  '69':
  - type: text
    content: Voici les paroles de l'alliance que l'Eternel ordonna à Moïse de conclure avec les Israélites dans le pays de Moab, en plus de l'alliance qu'il avait conclue avec eux à Horeb.
  '7':
  - type: text
    content: L'Eternel te donnera la victoire sur les ennemis qui se dresseront contre toi. Ils sortiront contre toi par un seul chemin et c'est par sept chemins qu'ils fuiront devant toi.
  '8':
  - type: text
    content: »L'Eternel ordonnera à la bénédiction d'être avec toi dans tes greniers et dans toutes tes entreprises. Il te bénira dans le pays que l'Eternel, ton Dieu, te donne.
  '9':
  - type: text
    content: '»Tu seras pour l''Eternel un peuple saint, comme il te l''a juré, lorsque tu respecteras les commandements de l''Eternel, ton Dieu, et que tu marcheras dans ses voies. '
