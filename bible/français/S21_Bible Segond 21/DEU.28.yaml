document_id: DEU.28
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Bénédictions en perspective
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Si tu obéis à l''Eternel, ton Dieu, en respectant et en mettant en pratique tous ses commandements que je te prescris aujourd''hui, l''Eternel, ton Dieu, te donnera la supériorité sur toutes les nations de la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici toutes les bénédictions qui se déverseront sur toi et seront ton lot lorsque tu obéiras à l''Eternel, ton Dieu:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '»Tu seras béni dans la ville et dans les champs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tes enfants, le produit de ton sol, les portées de tes troupeaux, de ton gros et de ton petit bétail, tout cela sera béni. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ta corbeille et ta huche seront bénies.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '»Tu seras béni à ton arrivée et à ton départ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: L'Eternel te donnera la victoire sur les ennemis qui se dresseront contre toi. Ils sortiront contre toi par un seul chemin et c'est par sept chemins qu'ils fuiront devant toi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: »L'Eternel ordonnera à la bénédiction d'être avec toi dans tes greniers et dans toutes tes entreprises. Il te bénira dans le pays que l'Eternel, ton Dieu, te donne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '»Tu seras pour l''Eternel un peuple saint, comme il te l''a juré, lorsque tu respecteras les commandements de l''Eternel, ton Dieu, et que tu marcheras dans ses voies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tous les peuples de la terre verront que tu es appelé du nom de l'Eternel et ils auront peur de toi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '»L''Eternel te comblera de biens en multipliant tes enfants, les portées de tes troupeaux et le produit de ton sol dans le territoire qu''il a juré à tes ancêtres de te donner. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L''Eternel t''ouvrira son bon trésor, le ciel, pour envoyer au moment voulu la pluie sur ton pays et pour bénir tout le travail de tes mains. Tu prêteras à beaucoup de nations et tu ne feras pas d''emprunt. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'L''Eternel fera de toi la tête et non la queue, tu seras toujours en haut et jamais en bas, lorsque tu obéiras aux commandements de l''Eternel, ton Dieu, que je te prescris aujourd''hui pour que tu les respectes et les mettes en pratique, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: et lorsque tu ne t'écarteras ni à droite ni à gauche de tous les commandements que je vous donne aujourd'hui pour suivre d'autres dieux et les servir.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Malédictions en perspective
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '»En revanche, si tu n''obéis pas à l''Eternel, ton Dieu, en respectant et mettant en pratique tous ses commandements et toutes ses prescriptions, que je te donne aujourd''hui, voici toutes les malédictions qui t''atteindront et seront ton lot:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '»Tu seras maudit dans la ville et dans les champs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ta corbeille et ta huche seront maudites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tes enfants, le produit de ton sol, les portées de ton gros et de ton petit bétail, tout cela sera maudit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: »Tu seras maudit à ton arrivée et à ton départ.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '»L''Eternel enverra contre toi la malédiction, le trouble et la menace, au milieu de toutes les entreprises où tu t''engageras, jusqu''à ce que tu sois détruit et disparaisses – ce ne sera pas long – à cause de la méchanceté de tes agissements, qui t''aura amené à m''abandonner. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'L''Eternel attachera la peste à toi jusqu''à ce qu''elle t''élimine du territoire dont tu vas entrer en possession. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: L'Eternel te frappera de dépérissement, de fièvre, d'inflammation, de chaleur brûlante, de dessèchement, de rouille et de nielle
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'De rouille et de nielle: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: maladies des céréales.
    marker-yv: yv-n
  - type: text
    text: '. Tout cela te poursuivra jusqu''à ce que tu disparaisses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Le ciel au-dessus de ta tête sera de bronze, et la terre sous tes pieds sera de fer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: En guise de pluie, l'Eternel enverra à ton pays du sable et de la poussière et il en descendra du ciel sur toi jusqu'à ce que tu sois détruit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '»L''Eternel te fera battre par tes ennemis. Tu sortiras contre eux par un seul chemin et c''est par sept chemins que tu fuiras devant eux. Tu seras un objet d''effroi pour tous les royaumes de la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ton cadavre servira de nourriture à tous les oiseaux du ciel et aux bêtes de la terre, et il n''y aura personne pour les troubler. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'L''Eternel te frappera de l''ulcère qui a frappé les Egyptiens, d''hémorroïdes, de gale et de teigne, et tu ne pourras pas en guérir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'L''Eternel te frappera de délire, d''aveuglement, d''affolement, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'et tu tâtonneras en plein midi comme l''aveugle dans l''obscurité. Tu n''auras pas de succès dans tes entreprises et tu seras tous les jours exploité, pillé, sans personne pour venir à ton secours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Tu auras une fiancée et c''est un autre homme qui couchera avec elle; tu construiras une maison et tu ne l''habiteras pas; tu planteras une vigne et tu n''en jouiras pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ton bœuf sera égorgé sous tes yeux et tu n''en mangeras pas; ton âne sera enlevé devant toi et on ne te le rendra pas. Tes brebis seront données à tes ennemis et il n''y aura personne pour venir à ton secours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tes fils et tes filles seront livrés à un autre peuple, tes yeux le verront et languiront constamment après eux, mais ta main restera sans force. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Un peuple que tu n''auras pas connu mangera le produit de ton sol et de ton travail, et tu seras tous les jours exploité et écrasé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Le spectacle que tu auras sous les yeux te rendra fou. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'L''Eternel te frappera aux genoux et aux cuisses d''un ulcère malin dont tu ne pourras guérir, il te frappera depuis la plante du pied jusqu''au sommet de la tête. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'L''Eternel vous enverra, toi et le roi que tu auras établi sur toi, vers une nation que vous n''aurez pas connue, ni toi ni tes ancêtres. Et là, tu serviras d''autres dieux, du bois et de la pierre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Tu seras un sujet d'étonnement, de proverbe et de raillerie parmi tous les peuples chez qui l'Eternel te conduira.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: '»Tu répandras beaucoup de semence sur ton champ et tu feras une faible récolte car les sauterelles la dévoreront. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Tu planteras des vignes, tu les cultiveras, et tu ne boiras pas de vin ni ne feras de récolte car les vers la mangeront. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Tu auras des oliviers sur tout ton territoire et tu ne t''enduiras pas d''huile car tes olives tomberont. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Tu auras des fils et des filles et ils ne seront pas à toi car ils partiront en déportation. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Les insectes prendront possession de tous tes arbres et du produit de ton sol. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'L''étranger en séjour chez toi s''élèvera toujours plus au-dessus de toi et toi, tu descendras toujours plus bas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Il te fera des prêts et toi, tu ne pourras pas lui en faire. Il sera la tête et toi la queue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Toutes ces malédictions t''atteindront. Elles te poursuivront et seront ton lot jusqu''à ce que tu sois détruit, parce que tu n''auras pas obéi à l''Eternel, ton Dieu, parce que tu n''auras pas respecté ses commandements et ses prescriptions qu''il te donne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Elles seront à toujours pour tes descendants et toi comme des signes et des prodiges.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: '»Pour n''avoir pas, au milieu de l''abondance générale, servi l''Eternel, ton Dieu, avec joie et de bon cœur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'tu serviras, au milieu de la faim, de la soif, de la nudité et des privations générales, les ennemis que l''Eternel enverra contre toi. Il t''imposera une domination inflexible jusqu''à ce qu''il t''ait détruit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'L''Eternel fera partir de loin, des extrémités de la terre, une nation qui fondra sur toi d''un vol d''aigle. Ce sera une nation dont tu ne comprendras pas la langue, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'une nation au visage dur, qui n''aura ni respect pour le vieillard ni pitié pour l''enfant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Elle mangera les portées de tes troupeaux et le produit de ton sol jusqu''à ce que tu sois détruit. Elle ne te laissera ni blé, ni vin nouveau, ni huile, ni portées de ton gros et de ton petit bétail, jusqu''à ce qu''elle t''ait fait disparaître. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: Elle t'assiégera dans toutes tes villes jusqu'à ce que tes murailles tombent, ces hautes et fortes murailles dans lesquelles tu auras placé ta confiance sur tout ton territoire. Elle t'assiégera dans toutes tes villes, dans tout le pays que l'Eternel, ton Dieu, te donne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: '»Au milieu de l''angoisse et de la détresse où te réduira ton ennemi, tu mangeras tes enfants, la chair des fils et des filles que l''Eternel, ton Dieu, t''aura donnés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'L''homme le plus délicat et le plus raffiné parmi vous aura un regard dépourvu de pitié pour son frère, pour la femme qui repose sur sa poitrine, pour ceux de ses enfants qu''il aura épargnés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'A aucun d''eux il ne donnera à manger de la chair de ses enfants dont il fait sa nourriture, parce qu''il ne lui restera plus rien au milieu de l''angoisse et de la détresse où te réduira ton ennemi dans toutes tes villes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'La femme la plus délicate et la plus raffinée parmi vous, celle qui par raffinement et délicatesse n''essayait même pas de poser à terre la plante de son pied, aura un regard dépourvu de pitié pour le mari qui repose sur sa poitrine, pour son fils et pour sa fille, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: et même pour le nouveau-né sorti de son ventre, pour les enfants qu'elle mettra au monde. En effet, manquant de tout, elle en fera secrètement sa nourriture au milieu de l'angoisse et de la détresse où ton ennemi te réduira dans tes villes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '58'
  - type: text
    text: '»Si tu ne veilles pas à mettre en pratique toutes les paroles de cette loi, qui sont écrites dans ce livre, à craindre ce nom glorieux et redoutable, celui de l''Eternel, ton Dieu, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '59'
  - type: text
    text: 'l''Eternel te frappera, toi et ta descendance, de fléaux extraordinaires. Il te frappera de fléaux importants et durables, de maladies graves et tenaces. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '60'
  - type: text
    text: 'Il amènera sur toi toutes les maladies d''Egypte devant lesquelles tu tremblais et elles s''attacheront à toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '61'
  - type: text
    text: 'Et même, l''Eternel fera venir sur toi, jusqu''à ce que tu sois détruit, toutes sortes de maladies et de fléaux qui ne sont pas mentionnés dans le livre de cette loi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: text
    text: 'Après avoir été aussi nombreux que les étoiles du ciel, vous ne resterez qu''en petit nombre, parce que tu n''auras pas obéi à l''Eternel, ton Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '63'
  - type: text
    text: 'De même que l''Eternel prenait plaisir à vous faire du bien et à vous multiplier, de même il prendra plaisir à vous faire disparaître et à vous détruire. Vous serez arrachés du territoire dont tu vas entrer en possession. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '64'
  - type: text
    text: 'L''Eternel te dispersera parmi tous les peuples, d''une extrémité de la terre à l''autre, et là, tu serviras d''autres dieux que ni toi ni tes ancêtres n''avez connus, du bois et de la pierre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '65'
  - type: text
    text: 'Parmi ces nations, tu ne seras pas tranquille et tu n''auras pas un lieu de repos pour la plante de tes pieds. L''Eternel te donnera un cœur inquiet, des yeux affaiblis, une âme découragée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '66'
  - type: text
    text: 'Ta vie sera comme suspendue à un fil devant toi, tu trembleras la nuit et le jour, tu n''auras pas confiance dans l''existence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '67'
  - type: text
    text: 'A cause de la frayeur qui remplira ton cœur et du spectacle que tes yeux verront, tu diras le matin: ‘Si seulement c''était le soir!’ et tu diras le soir: ‘Si seulement c''était le matin!’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '68'
  - type: text
    text: 'L''Eternel te ramènera par bateaux en Egypte, par le chemin dont je t''avais dit: ‘Tu ne le reverras plus!’ Là, vous vous vendrez vous-mêmes à vos ennemis comme esclaves et servantes, et il n''y aura personne pour vous acheter.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Renouvellement de l'alliance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '69'
  - type: text
    text: Voici les paroles de l'alliance que l'Eternel ordonna à Moïse de conclure avec les Israélites dans le pays de Moab, en plus de l'alliance qu'il avait conclue avec eux à Horeb.
