document_id: DEU.16,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La Pâque
  - type: text
    content: '»Observe le mois des épis et célèbre la Pâque en l''honneur de l''Eternel, ton Dieu. En effet, c''est au cours du mois des épis que l''Eternel, ton Dieu, t''a fait sortir d''Egypte, pendant la nuit. '
  '10':
  - type: text
    content: 'puis tu célébreras la fête des semaines en l''honneur de l''Eternel, ton Dieu, et tu feras des offrandes volontaires en fonction des bénédictions qu''il t''aura accordées. '
  '11':
  - type: text
    content: 'Tu te réjouiras devant l''Eternel, ton Dieu, à l''endroit que l''Eternel, ton Dieu, choisira pour y faire résider son nom, toi, ton fils et ta fille, ton esclave et ta servante, le Lévite qui habitera dans ta ville, ainsi que l''étranger, l''orphelin et la veuve qui seront au milieu de toi. '
  '12':
  - type: text
    content: Tu te souviendras que tu as été esclave en Egypte et tu respecteras ces prescriptions et les mettras en pratique.
  - type: heading
    content: La fête des tentes
  '13':
  - type: text
    content: '»Tu célébreras la fête des tentes pendant 7 jours, au moment où tu récolteras le produit de ton aire de battage et de ton pressoir. '
  '14':
  - type: text
    content: 'Tu te réjouiras à cette fête, toi, ton fils et ta fille, ton esclave et ta servante, ainsi que le Lévite, l''étranger, l''orphelin et la veuve qui seront dans ta ville. '
  '15':
  - type: text
    content: Tu célébreras la fête pendant 7 jours en l'honneur de l'Eternel, ton Dieu, à l'endroit que l'Eternel choisira. En effet, l'Eternel, ton Dieu, te bénira dans toutes tes récoltes et dans tout le travail de tes mains, et tu te livreras entièrement à la joie.
  '16':
  - type: text
    content: '»Trois fois par an, tous les hommes parmi vous se présenteront devant l''Eternel, ton Dieu, à l''endroit qu''il choisira: à la fête des pains sans levain, à la fête des semaines et à la fête des tentes. On ne paraîtra pas devant l''Eternel les mains vides. '
  '17':
  - type: text
    content: Chacun donnera ce qu'il pourra, en fonction des bénédictions que l'Eternel, ton Dieu, t'aura accordées.
  - type: heading
    content: Institution des juges
  '18':
  - type: text
    content: '»Tu établiras des juges et des magistrats dans toutes les villes que l''Eternel, ton Dieu, te donne, selon tes tribus, et ils jugeront le peuple avec justice. '
  '19':
  - type: text
    content: 'Tu ne porteras aucune atteinte au droit, tu ne feras pas preuve de partialité et tu n''accepteras pas de pots-de-vin, car ils aveuglent les yeux des sages et corrompent les paroles des justes. '
  '2':
  - type: text
    content: 'Tu feras le sacrifice de la Pâque en l''honneur de l''Eternel, ton Dieu, en prenant dans ton petit et ton gros bétail, à l''endroit que l''Eternel choisira pour y faire résider son nom. '
  '20':
  - type: text
    content: Tu chercheras à respecter parfaitement la justice afin de vivre et de posséder le pays que l'Eternel, ton Dieu, te donne.
  - type: heading
    content: Avertissements contre l'idolâtrie
  '21':
  - type: text
    content: '»Tu ne fixeras aucun poteau sacré en bois à côté de l''autel que tu feras pour l''Eternel, ton Dieu. '
  '22':
  - type: text
    content: 'Tu ne dresseras pas de statues: l''Eternel, ton Dieu, les déteste.'
  '3':
  - type: text
    content: 'Pendant la fête, tu ne mangeras pas de pain levé, mais tu mangeras durant 7 jours des pains sans levain, du pain de misère, car c''est avec précipitation que tu es sorti d''Egypte. Ce sera le cas afin que tu te souviennes toute ta vie du jour où tu es sorti d''Egypte. '
  '4':
  - type: text
    content: 'On ne verra pas chez toi de levain, sur tout ton territoire, pendant 7 jours. Aucune partie des victimes que tu sacrifieras le soir du premier jour ne sera gardée pendant la nuit jusqu''au matin. '
  '5':
  - type: text
    content: 'Tu ne pourras pas faire le sacrifice de la Pâque à n''importe lequel des endroits que l''Eternel, ton Dieu, te donne pour y habiter. '
  '6':
  - type: text
    content: 'C''est à l''endroit que l''Eternel, ton Dieu, choisira pour y faire résider son nom que tu feras le sacrifice de la Pâque. Tu le feras le soir, au coucher du soleil, au même moment que ta sortie d''Egypte. '
  '7':
  - type: text
    content: 'Tu feras cuire la victime et tu la mangeras à l''endroit que l''Eternel, ton Dieu, choisira. Le matin, tu pourras repartir et t''en aller vers tes tentes. '
  '8':
  - type: text
    content: Pendant 6 jours tu mangeras des pains sans levain, et le septième jour il y aura une assemblée solennelle en l'honneur de l'Eternel, ton Dieu. Tu ne feras aucun travail.
  - type: heading
    content: La fête des semaines
  '9':
  - type: text
    content: '»Tu compteras 7 semaines. Dès que la faucille sera mise dans les blés, tu commenceras à compter 7 semaines, '
