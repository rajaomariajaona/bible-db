document_id: DEU.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La Pâque
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Observe le mois des épis et célèbre la Pâque en l''honneur de l''Eternel, ton Dieu. En effet, c''est au cours du mois des épis que l''Eternel, ton Dieu, t''a fait sortir d''Egypte, pendant la nuit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Tu feras le sacrifice de la Pâque en l''honneur de l''Eternel, ton Dieu, en prenant dans ton petit et ton gros bétail, à l''endroit que l''Eternel choisira pour y faire résider son nom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Pendant la fête, tu ne mangeras pas de pain levé, mais tu mangeras durant 7 jours des pains sans levain, du pain de misère, car c''est avec précipitation que tu es sorti d''Egypte. Ce sera le cas afin que tu te souviennes toute ta vie du jour où tu es sorti d''Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'On ne verra pas chez toi de levain, sur tout ton territoire, pendant 7 jours. Aucune partie des victimes que tu sacrifieras le soir du premier jour ne sera gardée pendant la nuit jusqu''au matin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tu ne pourras pas faire le sacrifice de la Pâque à n''importe lequel des endroits que l''Eternel, ton Dieu, te donne pour y habiter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'C''est à l''endroit que l''Eternel, ton Dieu, choisira pour y faire résider son nom que tu feras le sacrifice de la Pâque. Tu le feras le soir, au coucher du soleil, au même moment que ta sortie d''Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tu feras cuire la victime et tu la mangeras à l''endroit que l''Eternel, ton Dieu, choisira. Le matin, tu pourras repartir et t''en aller vers tes tentes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Pendant 6 jours tu mangeras des pains sans levain, et le septième jour il y aura une assemblée solennelle en l'honneur de l'Eternel, ton Dieu. Tu ne feras aucun travail.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fête des semaines
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '»Tu compteras 7 semaines. Dès que la faucille sera mise dans les blés, tu commenceras à compter 7 semaines, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'puis tu célébreras la fête des semaines en l''honneur de l''Eternel, ton Dieu, et tu feras des offrandes volontaires en fonction des bénédictions qu''il t''aura accordées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tu te réjouiras devant l''Eternel, ton Dieu, à l''endroit que l''Eternel, ton Dieu, choisira pour y faire résider son nom, toi, ton fils et ta fille, ton esclave et ta servante, le Lévite qui habitera dans ta ville, ainsi que l''étranger, l''orphelin et la veuve qui seront au milieu de toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tu te souviendras que tu as été esclave en Egypte et tu respecteras ces prescriptions et les mettras en pratique.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La fête des tentes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '»Tu célébreras la fête des tentes pendant 7 jours, au moment où tu récolteras le produit de ton aire de battage et de ton pressoir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tu te réjouiras à cette fête, toi, ton fils et ta fille, ton esclave et ta servante, ainsi que le Lévite, l''étranger, l''orphelin et la veuve qui seront dans ta ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tu célébreras la fête pendant 7 jours en l'honneur de l'Eternel, ton Dieu, à l'endroit que l'Eternel choisira. En effet, l'Eternel, ton Dieu, te bénira dans toutes tes récoltes et dans tout le travail de tes mains, et tu te livreras entièrement à la joie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '»Trois fois par an, tous les hommes parmi vous se présenteront devant l''Eternel, ton Dieu, à l''endroit qu''il choisira: à la fête des pains sans levain, à la fête des semaines et à la fête des tentes. On ne paraîtra pas devant l''Eternel les mains vides. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Chacun donnera ce qu'il pourra, en fonction des bénédictions que l'Eternel, ton Dieu, t'aura accordées.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Institution des juges
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '»Tu établiras des juges et des magistrats dans toutes les villes que l''Eternel, ton Dieu, te donne, selon tes tribus, et ils jugeront le peuple avec justice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tu ne porteras aucune atteinte au droit, tu ne feras pas preuve de partialité et tu n''accepteras pas de pots-de-vin, car ils aveuglent les yeux des sages et corrompent les paroles des justes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tu chercheras à respecter parfaitement la justice afin de vivre et de posséder le pays que l'Eternel, ton Dieu, te donne.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Avertissements contre l'idolâtrie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '»Tu ne fixeras aucun poteau sacré en bois à côté de l''autel que tu feras pour l''Eternel, ton Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tu ne dresseras pas de statues: l''Eternel, ton Dieu, les déteste.'
