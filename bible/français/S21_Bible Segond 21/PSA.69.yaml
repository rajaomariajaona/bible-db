document_id: PSA.69,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière du juste opprimé
  - type: text
    content: Au chef de chœur, sur la mélodie «Les lis». De David.
  '10':
  - type: text
    content: car *le zèle de ta maison me dévore
  - type: note
    content: 'Le zèle… dévore: cité en Jean 2.17 à propos de la purification du temple par Jésus.'
  - type: text
    content: ','
  - type: text
    content: et *les injures de ceux qui t'insultent tombent sur moi
  - type: note
    content: 'Les injures… sur moi: cité en Romains 15.3 à propos de l''attitude de Christ.'
  - type: text
    content: .
  '11':
  - type: text
    content: Je pleure et je jeûne,
  - type: text
    content: et c'est ce qui m'attire les insultes.
  '12':
  - type: text
    content: Je prends un sac pour habit
  - type: text
    content: et je suis l'objet de leurs moqueries.
  '13':
  - type: text
    content: Ceux qui sont assis à la porte parlent contre moi,
  - type: text
    content: et les buveurs de liqueurs fortes se moquent de moi dans leurs chansons.
  '14':
  - type: text
    content: Mais moi je t'adresse ma prière, Eternel!
  - type: text
    content: 'C''est le moment favorable, ô Dieu, par ta grande bonté:'
  - type: text
    content: réponds-moi en m'accordant ton fidèle secours!
  '15':
  - type: text
    content: Retire-moi de la boue, et que je n'enfonce plus,
  - type: text
    content: que je sois délivré de mes ennemis et de l'eau profonde!
  '16':
  - type: text
    content: Que le courant ne m'emporte plus,
  - type: text
    content: que le gouffre ne m'engloutisse pas
  - type: text
    content: et que la tombe ne se referme pas sur moi!
  '17':
  - type: text
    content: Réponds-moi, Eternel, car ta bonté est immense!
  - type: text
    content: Dans tes grandes compassions, tourne les regards vers moi
  '18':
  - type: text
    content: et ne cache pas ton visage à ton serviteur!
  - type: text
    content: 'Je suis dans la détresse: réponds-moi vite!'
  '19':
  - type: text
    content: Approche-toi de moi, rachète-moi,
  - type: text
    content: libère-moi, à cause de mes ennemis!
  '2':
  - type: text
    content: Sauve-moi, ô Dieu,
  - type: text
    content: car l'eau menace ma vie.
  '20':
  - type: text
    content: Tu sais qu'on m'insulte, qu'on me déshonore, qu'on me couvre de honte;
  - type: text
    content: tous mes adversaires sont devant toi.
  '21':
  - type: text
    content: L'insulte me brise le cœur, et je suis anéanti;
  - type: text
    content: j'attends de la pitié, mais il n'y en a pas,
  - type: text
    content: des consolateurs, et je n'en trouve aucun.
  '22':
  - type: text
    content: Ils mettent du poison dans ma nourriture,
  - type: text
    content: et pour apaiser ma soif ils me donnent du vinaigre.
  '23':
  - type: text
    content: '*Que leur table soit pour eux un piège,'
  - type: text
    content: et leur prospérité une entrave!
  '24':
  - type: text
    content: Que leurs yeux s'obscurcissent pour ne plus voir!
  - type: text
    content: Fais-leur constamment courber le dos!
  - type: note
    content: 'Que leur table… le dos: cité en Romains 11.9-10 d''après la Septante.'
  '25':
  - type: text
    content: Déverse ta fureur sur eux
  - type: text
    content: et que ton ardente colère les atteigne!
  '26':
  - type: text
    content: '*Que leur domaine devienne désert,'
  - type: text
    content: que plus personne n'habite
  - type: note
    content: 'Que leur… n''habite: cité en Actes 1.20.'
  - type: text
    content: ' dans leurs tentes!'
  '27':
  - type: text
    content: En effet, ils poursuivent celui que tu frappes,
  - type: text
    content: ils racontent les souffrances de ceux que tu as blessés.
  '28':
  - type: text
    content: Ajoute cette faute à leurs fautes
  - type: text
    content: et qu'ils n'aient aucune part à ta justice!
  '29':
  - type: text
    content: Qu'ils soient effacés du livre de vie
  - type: text
    content: et ne soient pas inscrits avec les justes!
  '3':
  - type: text
    content: J'enfonce dans la boue, sans trouver de terrain stable;
  - type: text
    content: je suis tombé dans l'eau profonde, et le courant m'emporte.
  '30':
  - type: text
    content: Moi, je suis malheureux et souffrant.
  - type: text
    content: O Dieu, que ton secours me mette en sécurité!
  '31':
  - type: text
    content: Je célébrerai le nom de Dieu par un chant,
  - type: text
    content: 'je proclamerai ta grandeur par des louanges:'
  '32':
  - type: text
    content: voilà ce qui est agréable à l'Eternel, plus qu'un bœuf, un taureau
  - type: text
    content: avec cornes et sabots.
  '33':
  - type: text
    content: Les humbles le voient et se réjouissent.
  - type: text
    content: Vous qui cherchez Dieu, que votre cœur vive,
  '34':
  - type: text
    content: car l'Eternel écoute les pauvres,
  - type: text
    content: et il ne méprise pas les siens quand ils sont prisonniers.
  '35':
  - type: text
    content: Que le ciel et la terre le célèbrent,
  - type: text
    content: ainsi que les mers et tout ce qui y vit,
  '36':
  - type: text
    content: car Dieu sauvera Sion, et il reconstruira les villes de Juda;
  - type: text
    content: on s'y établira et on les possédera.
  '37':
  - type: text
    content: La descendance de ses serviteurs en fera son héritage,
  - type: text
    content: et ceux qui aiment son nom y habiteront.
  '4':
  - type: text
    content: Je m'épuise à crier, mon gosier se dessèche,
  - type: text
    content: mes yeux se fatiguent dans l'attente de mon Dieu.
  '5':
  - type: text
    content: Ils sont plus nombreux que les cheveux de ma tête,
  - type: text
    content: '*ceux qui me détestent sans raison'
  - type: note
    content: 'Ceux… raison: même idée au Psaume 35.19, cité en Jean 15.25.'
  - type: text
    content: ; ils sont
  - type: text
    content: puissants, ceux qui veulent me réduire au silence,
  - type: text
    content: qui sont à tort mes ennemis.
  - type: text
    content: Ce que je n'ai pas volé, il faut que je le rende.
  '6':
  - type: text
    content: O Dieu, tu connais ma folie,
  - type: text
    content: et mes fautes ne te sont pas cachées.
  '7':
  - type: text
    content: Que ceux qui espèrent en toi ne soient pas honteux à cause de moi, Seigneur, Eternel, maître de l'univers!
  - type: text
    content: Que ceux qui te cherchent ne rougissent pas à cause de moi, Dieu d'Israël!
  '8':
  - type: text
    content: En effet, c'est pour toi que je supporte l'insulte,
  - type: text
    content: que la honte couvre mon visage.
  '9':
  - type: text
    content: Je suis devenu un étranger pour mes frères,
  - type: text
    content: un inconnu pour les fils de ma mère,
