document_id: PSA.69
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière du juste opprimé
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur, sur la mélodie «Les lis». De David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Sauve-moi, ô Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car l'eau menace ma vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: J'enfonce dans la boue, sans trouver de terrain stable;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je suis tombé dans l'eau profonde, et le courant m'emporte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je m'épuise à crier, mon gosier se dessèche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mes yeux se fatiguent dans l'attente de mon Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils sont plus nombreux que les cheveux de ma tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: '*ceux qui me détestent sans raison'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '69.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ceux… raison: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'même idée au '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 35.19
      metadata:
        usfm: PSA.35.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jean 15.25
      metadata:
        usfm: JHN.15.25
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ; ils sont
- type: usfm
  marker: q1
  children:
  - type: text
    text: puissants, ceux qui veulent me réduire au silence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui sont à tort mes ennemis.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce que je n'ai pas volé, il faut que je le rende.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: O Dieu, tu connais ma folie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mes fautes ne te sont pas cachées.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Que ceux qui espèrent en toi ne soient pas honteux à cause de moi, Seigneur, Eternel, maître de l'univers!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Que ceux qui te cherchent ne rougissent pas à cause de moi, Dieu d'Israël!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: En effet, c'est pour toi que je supporte l'insulte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que la honte couvre mon visage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je suis devenu un étranger pour mes frères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un inconnu pour les fils de ma mère,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: car *le zèle de ta maison me dévore
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '69.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le zèle… dévore: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jean 2.17
      metadata:
        usfm: JHN.2.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' à propos de la purification du temple par Jésus.'
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: et *les injures de ceux qui t'insultent tombent sur moi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '69.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les injures… sur moi: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 15.3
      metadata:
        usfm: ROM.15.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' à propos de l''attitude de Christ.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je pleure et je jeûne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c'est ce qui m'attire les insultes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je prends un sac pour habit
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je suis l'objet de leurs moqueries.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ceux qui sont assis à la porte parlent contre moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les buveurs de liqueurs fortes se moquent de moi dans leurs chansons.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mais moi je t'adresse ma prière, Eternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'C''est le moment favorable, ô Dieu, par ta grande bonté:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: réponds-moi en m'accordant ton fidèle secours!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Retire-moi de la boue, et que je n'enfonce plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que je sois délivré de mes ennemis et de l'eau profonde!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Que le courant ne m'emporte plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que le gouffre ne m'engloutisse pas
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que la tombe ne se referme pas sur moi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Réponds-moi, Eternel, car ta bonté est immense!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dans tes grandes compassions, tourne les regards vers moi
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: et ne cache pas ton visage à ton serviteur!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je suis dans la détresse: réponds-moi vite!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Approche-toi de moi, rachète-moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: libère-moi, à cause de mes ennemis!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Tu sais qu'on m'insulte, qu'on me déshonore, qu'on me couvre de honte;
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous mes adversaires sont devant toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: L'insulte me brise le cœur, et je suis anéanti;
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'attends de la pitié, mais il n'y en a pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des consolateurs, et je n'en trouve aucun.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ils mettent du poison dans ma nourriture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour apaiser ma soif ils me donnent du vinaigre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '*Que leur table soit pour eux un piège,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur prospérité une entrave!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Que leurs yeux s'obscurcissent pour ne plus voir!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais-leur constamment courber le dos!
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '69.23-24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Que leur table… le dos: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 11.9-10
      metadata:
        usfm: ROM.11.9+ROM.11.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' d''après la Septante.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Déverse ta fureur sur eux
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que ton ardente colère les atteigne!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '*Que leur domaine devienne désert,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: que plus personne n'habite
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '69.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Que leur… n''habite: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Actes 1.20
      metadata:
        usfm: ACT.1.20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' dans leurs tentes!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: En effet, ils poursuivent celui que tu frappes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils racontent les souffrances de ceux que tu as blessés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ajoute cette faute à leurs fautes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu'ils n'aient aucune part à ta justice!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Qu'ils soient effacés du livre de vie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne soient pas inscrits avec les justes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Moi, je suis malheureux et souffrant.
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Dieu, que ton secours me mette en sécurité!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Je célébrerai le nom de Dieu par un chant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'je proclamerai ta grandeur par des louanges:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: voilà ce qui est agréable à l'Eternel, plus qu'un bœuf, un taureau
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec cornes et sabots.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Les humbles le voient et se réjouissent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous qui cherchez Dieu, que votre cœur vive,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: car l'Eternel écoute les pauvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il ne méprise pas les siens quand ils sont prisonniers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Que le ciel et la terre le célèbrent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ainsi que les mers et tout ce qui y vit,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: car Dieu sauvera Sion, et il reconstruira les villes de Juda;
- type: usfm
  marker: q1
  children:
  - type: text
    text: on s'y établira et on les possédera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: La descendance de ses serviteurs en fera son héritage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ceux qui aiment son nom y habiteront.
