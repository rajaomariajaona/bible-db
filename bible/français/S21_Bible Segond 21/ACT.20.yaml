document_id: ACT.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'Evangile à Troas
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque le tumulte eut cessé, Paul fit venir les disciples [et les encouragea], puis il prit congé d''eux et partit pour la Macédoine. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il parcourut cette région en adressant de nombreuses paroles d''encouragement aux croyants et se rendit en Grèce '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'où il séjourna trois mois. Il était sur le point d''embarquer pour la Syrie, mais comme les Juifs formaient un complot contre lui, il décida de repartir par la Macédoine. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il avait pour l''accompagner [jusqu''en Asie] Sopater de Bérée, [fils de Pyrrhus,] Aristarque et Secundus de Thessalonique, Gaïus de Derbe, Timothée, ainsi que Tychique et Trophime, originaires d''Asie. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ceux-ci prirent les devants et nous attendirent à Troas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: De notre côté, après la fête des pains sans levain, nous avons embarqué à Philippes et, au bout de 5 jours, nous les avons rejoints à Troas où nous avons passé 7 jours.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le dimanche, nous étions réunis pour rompre le pain. Comme il devait partir le lendemain, Paul s''entretenait avec les disciples, et il a prolongé son discours jusqu''à minuit. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il y avait beaucoup de lampes dans la chambre à l''étage où nous étions rassemblés. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Or, un jeune homme du nom d''Eutychus était assis sur le bord de la fenêtre. Il s''est profondément endormi pendant le long discours de Paul et, entraîné par le sommeil, il est tombé du troisième étage. Quand on a cherché à le relever, il était mort. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mais Paul est descendu, s''est penché sur lui et l''a pris dans ses bras en disant: «Ne vous inquiétez pas, car son âme est en lui.» '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ensuite il est remonté, a rompu le pain et a mangé. Il a poursuivi ses entretiens jusqu''à l''aube, puis il est parti. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le jeune homme a été ramené vivant, à leur grande consolation.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quant à nous, nous avons pris les devants pour embarquer sur un bateau à destination d''Assos. Nous devions y reprendre Paul, conformément à ses instructions, car il voulait faire la route à pied. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Lorsqu''il nous a rejoints à Assos, nous l''avons pris à bord et sommes allés à Mytilène. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: De là, continuant par la mer, nous sommes arrivés le lendemain en face de Chios. Le jour suivant nous sommes passés par Samos, et le jour d'après nous sommes arrivés à Milet.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Paul et les anciens d'Ephèse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Paul avait décidé de passer au large d''Ephèse sans s''y arrêter afin de ne pas perdre de temps en Asie; il se dépêchait en effet pour être, si possible, le jour de la Pentecôte à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Cependant, de Milet, il a envoyé chercher à Ephèse les anciens de l''Eglise. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Lorsqu''ils sont arrivés vers lui, il leur a dit:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Vous savez de quelle manière je me suis toujours comporté avec vous, depuis le jour où j''ai mis le pied en Asie: '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'j''ai servi le Seigneur en toute humilité, avec [beaucoup de] larmes et au milieu des épreuves que provoquaient pour moi les complots des Juifs. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Vous savez que, sans rien cacher, je vous ai annoncé et enseigné tout ce qui vous était utile, en public et dans les maisons, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: en appelant les Juifs et les non-Juifs à changer d'attitude en se tournant vers Dieu et à croire en notre Seigneur Jésus[-Christ].
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '»Et maintenant, voici que, lié par l''Esprit, je vais à Jérusalem sans savoir ce qui m''y arrivera. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Je sais seulement que, de ville en ville, l''Esprit saint m''avertit que des liens et des souffrances m''attendent. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Mais je n''y attache aucune importance et je ne considère pas ma vie comme précieuse, pourvu que j''accomplisse [avec joie] ma course et le ministère que le Seigneur Jésus m''a confié: annoncer la bonne nouvelle de la grâce de Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '»Désormais, je le sais, vous ne verrez plus mon visage, vous tous au milieu de qui j''ai passé en prêchant le royaume [de Dieu]. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'C''est pourquoi je vous déclare aujourd''hui que je suis pur du sang de vous tous, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'car je vous ai annoncé tout le plan de Dieu sans rien en cacher. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Faites donc bien attention à vous-mêmes et à tout le troupeau dont le Saint-Esprit vous a confié la responsabilité; prenez soin de l''Eglise de Dieu qu''il s''est acquise par son propre sang. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Je sais qu''après mon départ des loups cruels s''introduiront parmi vous, et ils n''épargneront pas le troupeau; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'de vos propres rangs surgiront des hommes qui donneront des enseignements pervertis pour entraîner les disciples à leur suite. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Restez donc vigilants et souvenez-vous que durant 3 ans, nuit et jour, je n'ai pas cessé d'avertir avec larmes chacun de vous.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '»Et maintenant, [frères,] je vous confie à Dieu et au message de sa grâce, lui qui a le pouvoir d''édifier et de [vous] donner un héritage avec tous les saints. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Je n''ai désiré ni l''argent, ni l''or, ni les habits de personne. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Vous le savez vous-mêmes, les mains que voici ont pourvu à mes besoins et à ceux de mes compagnons. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'En tout, je vous ai montré qu''il faut travailler ainsi pour soutenir les faibles et se rappeler les paroles du Seigneur Jésus, puisqu''il a lui-même dit: ‘Il y a plus de bonheur à donner qu''à recevoir.’»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Après avoir dit cela, il s''est mis à genoux et a prié avec eux tous. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Tous ont alors fondu en larmes; ils se jetaient au cou de Paul et l''embrassaient, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: attristés surtout parce qu'il avait dit qu'ils ne verraient plus son visage. Puis ils l'ont accompagné jusqu'au bateau.
