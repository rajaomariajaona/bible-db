document_id: ACT.20,152
type_code: fra
verses:
  '1':
  - type: heading
    content: L'Evangile à Troas
  - type: text
    content: 'Lorsque le tumulte eut cessé, Paul fit venir les disciples [et les encouragea], puis il prit congé d''eux et partit pour la Macédoine. '
  '10':
  - type: text
    content: 'Mais Paul est descendu, s''est penché sur lui et l''a pris dans ses bras en disant: «Ne vous inquiétez pas, car son âme est en lui.» '
  '11':
  - type: text
    content: 'Ensuite il est remonté, a rompu le pain et a mangé. Il a poursuivi ses entretiens jusqu''à l''aube, puis il est parti. '
  '12':
  - type: text
    content: Le jeune homme a été ramené vivant, à leur grande consolation.
  '13':
  - type: text
    content: 'Quant à nous, nous avons pris les devants pour embarquer sur un bateau à destination d''Assos. Nous devions y reprendre Paul, conformément à ses instructions, car il voulait faire la route à pied. '
  '14':
  - type: text
    content: 'Lorsqu''il nous a rejoints à Assos, nous l''avons pris à bord et sommes allés à Mytilène. '
  '15':
  - type: text
    content: De là, continuant par la mer, nous sommes arrivés le lendemain en face de Chios. Le jour suivant nous sommes passés par Samos, et le jour d'après nous sommes arrivés à Milet.
  - type: heading
    content: Paul et les anciens d'Ephèse
  '16':
  - type: text
    content: 'Paul avait décidé de passer au large d''Ephèse sans s''y arrêter afin de ne pas perdre de temps en Asie; il se dépêchait en effet pour être, si possible, le jour de la Pentecôte à Jérusalem. '
  '17':
  - type: text
    content: 'Cependant, de Milet, il a envoyé chercher à Ephèse les anciens de l''Eglise. '
  '18':
  - type: text
    content: 'Lorsqu''ils sont arrivés vers lui, il leur a dit:'
  - type: text
    content: '«Vous savez de quelle manière je me suis toujours comporté avec vous, depuis le jour où j''ai mis le pied en Asie: '
  '19':
  - type: text
    content: 'j''ai servi le Seigneur en toute humilité, avec [beaucoup de] larmes et au milieu des épreuves que provoquaient pour moi les complots des Juifs. '
  '2':
  - type: text
    content: 'Il parcourut cette région en adressant de nombreuses paroles d''encouragement aux croyants et se rendit en Grèce '
  '20':
  - type: text
    content: 'Vous savez que, sans rien cacher, je vous ai annoncé et enseigné tout ce qui vous était utile, en public et dans les maisons, '
  '21':
  - type: text
    content: en appelant les Juifs et les non-Juifs à changer d'attitude en se tournant vers Dieu et à croire en notre Seigneur Jésus[-Christ].
  '22':
  - type: text
    content: '»Et maintenant, voici que, lié par l''Esprit, je vais à Jérusalem sans savoir ce qui m''y arrivera. '
  '23':
  - type: text
    content: 'Je sais seulement que, de ville en ville, l''Esprit saint m''avertit que des liens et des souffrances m''attendent. '
  '24':
  - type: text
    content: 'Mais je n''y attache aucune importance et je ne considère pas ma vie comme précieuse, pourvu que j''accomplisse [avec joie] ma course et le ministère que le Seigneur Jésus m''a confié: annoncer la bonne nouvelle de la grâce de Dieu.'
  '25':
  - type: text
    content: '»Désormais, je le sais, vous ne verrez plus mon visage, vous tous au milieu de qui j''ai passé en prêchant le royaume [de Dieu]. '
  '26':
  - type: text
    content: 'C''est pourquoi je vous déclare aujourd''hui que je suis pur du sang de vous tous, '
  '27':
  - type: text
    content: 'car je vous ai annoncé tout le plan de Dieu sans rien en cacher. '
  '28':
  - type: text
    content: 'Faites donc bien attention à vous-mêmes et à tout le troupeau dont le Saint-Esprit vous a confié la responsabilité; prenez soin de l''Eglise de Dieu qu''il s''est acquise par son propre sang. '
  '29':
  - type: text
    content: 'Je sais qu''après mon départ des loups cruels s''introduiront parmi vous, et ils n''épargneront pas le troupeau; '
  '3':
  - type: text
    content: 'où il séjourna trois mois. Il était sur le point d''embarquer pour la Syrie, mais comme les Juifs formaient un complot contre lui, il décida de repartir par la Macédoine. '
  '30':
  - type: text
    content: 'de vos propres rangs surgiront des hommes qui donneront des enseignements pervertis pour entraîner les disciples à leur suite. '
  '31':
  - type: text
    content: Restez donc vigilants et souvenez-vous que durant 3 ans, nuit et jour, je n'ai pas cessé d'avertir avec larmes chacun de vous.
  '32':
  - type: text
    content: '»Et maintenant, [frères,] je vous confie à Dieu et au message de sa grâce, lui qui a le pouvoir d''édifier et de [vous] donner un héritage avec tous les saints. '
  '33':
  - type: text
    content: 'Je n''ai désiré ni l''argent, ni l''or, ni les habits de personne. '
  '34':
  - type: text
    content: 'Vous le savez vous-mêmes, les mains que voici ont pourvu à mes besoins et à ceux de mes compagnons. '
  '35':
  - type: text
    content: 'En tout, je vous ai montré qu''il faut travailler ainsi pour soutenir les faibles et se rappeler les paroles du Seigneur Jésus, puisqu''il a lui-même dit: ‘Il y a plus de bonheur à donner qu''à recevoir.’»'
  '36':
  - type: text
    content: 'Après avoir dit cela, il s''est mis à genoux et a prié avec eux tous. '
  '37':
  - type: text
    content: 'Tous ont alors fondu en larmes; ils se jetaient au cou de Paul et l''embrassaient, '
  '38':
  - type: text
    content: attristés surtout parce qu'il avait dit qu'ils ne verraient plus son visage. Puis ils l'ont accompagné jusqu'au bateau.
  '4':
  - type: text
    content: 'Il avait pour l''accompagner [jusqu''en Asie] Sopater de Bérée, [fils de Pyrrhus,] Aristarque et Secundus de Thessalonique, Gaïus de Derbe, Timothée, ainsi que Tychique et Trophime, originaires d''Asie. '
  '5':
  - type: text
    content: Ceux-ci prirent les devants et nous attendirent à Troas.
  '6':
  - type: text
    content: De notre côté, après la fête des pains sans levain, nous avons embarqué à Philippes et, au bout de 5 jours, nous les avons rejoints à Troas où nous avons passé 7 jours.
  '7':
  - type: text
    content: 'Le dimanche, nous étions réunis pour rompre le pain. Comme il devait partir le lendemain, Paul s''entretenait avec les disciples, et il a prolongé son discours jusqu''à minuit. '
  '8':
  - type: text
    content: 'Il y avait beaucoup de lampes dans la chambre à l''étage où nous étions rassemblés. '
  '9':
  - type: text
    content: 'Or, un jeune homme du nom d''Eutychus était assis sur le bord de la fenêtre. Il s''est profondément endormi pendant le long discours de Paul et, entraîné par le sommeil, il est tombé du troisième étage. Quand on a cherché à le relever, il était mort. '
