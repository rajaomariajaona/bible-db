document_id: 1KI.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Construction du temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ce fut 480 ans après la sortie d'Egypte des Israélites que Salomon commença de construire la maison destinée à l'Eternel, la quatrième année de son règne sur Israël, durant le mois de Ziv, qui est le deuxième mois.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'La maison que le roi Salomon construisit en l''honneur de l''Eternel avait 30 mètres de long, 10 de large et 15 de haut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le portique situé devant le lieu saint du temple avait 10 mètres de long, correspondant à la largeur du temple, et 5 de profondeur sur le devant du temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le roi fit au temple des fenêtres solidement grillagées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il construisit contre le mur du temple des étages circulaires, qui faisaient le tour des murs du temple, du lieu saint et du sanctuaire. Il fit des chambres latérales tout autour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L''étage inférieur était large de 2 mètres et demi, celui du milieu de 3 et le troisième de 3 et demi. En effet, il ménagea des retraits tout autour du temple, à l''extérieur, afin que la charpente ne pénètre pas dans les murs du temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Lorsqu''on construisit le temple, on se servit de pierres toutes taillées. On n''entendit ni marteau, ni hache, ni aucun instrument en fer dans le temple pendant qu''on le construisait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L''entrée des chambres de l''étage inférieur se trouvait sur le côté droit du temple. On montait à l''étage du milieu par un escalier tournant, et de l''étage du milieu au troisième. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Lorsqu''il eut fini de construire le temple, Salomon lui fit un plafond de planches et de poutres de cèdre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il donna 2 mètres et demi de hauteur à chacun des étages qui faisaient tout le tour du temple, et il les rattacha à la maison par des poutres de cèdre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L''Eternel adressa la parole à Salomon: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '«Te voilà en train de construire ce temple! Si tu suis mes prescriptions, si tu mets mes règles en pratique, si tu respectes et gardes tous mes commandements, j''accomplirai la promesse que j''ai faite à ton père David envers toi: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: j'habiterai au milieu des Israélites et je n'abandonnerai pas mon peuple, Israël.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Lorsqu''il eut fini de construire le temple, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Salomon revêtit ses murs intérieurs de planches de cèdre, depuis le sol jusqu''au plafond. Il revêtit ainsi de bois l''intérieur et il couvrit le sol de la maison de planches de cyprès. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il revêtit de planches de cèdre les 10 mètres du fond du temple, depuis le sol jusqu''en haut des murs, et il réserva cet espace pour en faire le sanctuaire, le lieu très saint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les 20 mètres sur le devant formaient la maison, c''est-à-dire le temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le cèdre à l''intérieur de la maison présentait des sculptures de coloquintes et de fleurs entrouvertes. Tout était en cèdre, on ne voyait aucune pierre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Salomon établit le sanctuaire à l''intérieur, au milieu du temple, pour y placer l''arche de l''alliance de l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Il avait 10 mètres de long, 10 de large et 10 de haut, et Salomon le couvrit d''or pur. Il fit devant le sanctuaire un autel en cèdre et le couvrit d''or. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il couvrit d''or pur l''intérieur du temple et il fit passer le voile dans des chaînettes d''or devant le sanctuaire, qu''il couvrit d''or. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Il couvrit d'or tout le temple, le temple tout entier, et il couvrit d'or tout l'autel qui se trouvait devant le sanctuaire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Il fit dans le sanctuaire deux chérubins en olivier sauvage, hauts de 5 mètres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Chacune des deux ailes d''un chérubin faisait 2 mètres et demi, ce qui faisait 5 mètres de l''extrémité d''une de ses ailes à l''autre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Le second chérubin faisait aussi 5 mètres. La mesure et la forme des deux chérubins étaient identiques. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'La hauteur de chacun des deux était de 5 mètres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Salomon plaça les chérubins au milieu du temple, à l''intérieur. Leurs ailes étaient déployées: l''aile du premier touchait l''un des murs, et celle du second l''autre mur; les bouts de leurs autres ailes se touchaient au milieu du temple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Salomon couvrit d'or les chérubins.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Il fit sculpter sur tout le pourtour des murs de la maison, à l''intérieur et à l''extérieur, des chérubins, des palmes et des fleurs entrouvertes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Il couvrit d'or le sol de la maison, à l'intérieur et à l'extérieur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Il fit à l''entrée du sanctuaire une porte à deux battants, en olivier sauvage. L''encadrement avec les poteaux équivalait à un cinquième du mur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Les deux battants étaient en olivier sauvage. Il y fit sculpter des chérubins, des palmes et des fleurs entrouvertes, et il les couvrit d'or. Il plaqua aussi de l'or sur les chérubins et sur les palmes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'De même, il fit pour la porte du temple des poteaux en olivier sauvage, qui faisaient le quart de la dimension du mur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'et deux battants en cyprès. Chacun des battants était formé de deux planches pivotantes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Il y fit sculpter des chérubins, des palmes et des fleurs entrouvertes, et il les couvrit d'or qu'il étendit sur la sculpture.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Il construisit le parvis intérieur grâce à trois rangées de pierres de taille et une rangée de poutres de cèdre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'La quatrième année du règne de Salomon, au mois de Ziv, les fondations de la maison de l''Eternel furent posées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: La onzième année, au mois de Bul, qui est le huitième mois, elle fut terminée dans toutes ses parties et elle fut telle qu'elle devait être. On mit 7 ans à la construire.
