document_id: PSA.116,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Louange pour la délivrance accordée
  - type: text
    content: J'aime l'Eternel, car il entend
  - type: text
    content: ma voix, mes supplications.
  '10':
  - type: text
    content: '*J''avais confiance, même lorsque je disais'
  - type: note
    content: 'J''avais… disais: cité en 2 Corinthiens 4.13 d''après la Septante.'
  - type: text
    content: ':'
  - type: text
    content: «Je suis plongé dans le malheur!»
  '11':
  - type: text
    content: 'Dans mon angoisse, je disais:'
  - type: text
    content: «Tous les hommes sont des menteurs.»
  '12':
  - type: text
    content: Comment pourrais-je rendre à l'Eternel
  - type: text
    content: tous ses bienfaits envers moi?
  '13':
  - type: text
    content: Je lèverai la coupe des délivrances
  - type: text
    content: et je ferai appel au nom de l'Eternel,
  '14':
  - type: text
    content: j'accomplirai mes vœux envers l'Eternel
  - type: text
    content: en présence de tout son peuple.
  '15':
  - type: text
    content: Elle a du prix aux yeux de l'Eternel,
  - type: text
    content: la mort de ses fidèles.
  '16':
  - type: text
    content: Ecoute-moi, Eternel, car je suis ton serviteur,
  - type: text
    content: ton serviteur, le fils de ta servante!
  - type: text
    content: 'Tu as détaché mes liens:'
  '17':
  - type: text
    content: je t'offrirai un sacrifice de reconnaissance
  - type: text
    content: et je ferai appel au nom de l'Eternel;
  '18':
  - type: text
    content: j'accomplirai mes vœux envers l'Eternel
  - type: text
    content: en présence de tout son peuple,
  '19':
  - type: text
    content: dans les parvis de la maison de l'Eternel,
  - type: text
    content: au milieu de toi, Jérusalem.
  - type: text
    content: Louez l'Eternel!
  '2':
  - type: text
    content: Oui, il a penché son oreille vers moi
  - type: text
    content: et je ferai appel à lui toute ma vie.
  '3':
  - type: text
    content: Les liens de la mort m'avaient enserré,
  - type: text
    content: et les angoisses du séjour des morts s'étaient emparées de moi;
  - type: text
    content: j'étais accablé par la détresse et la douleur,
  '4':
  - type: text
    content: 'mais j''ai fait appel au nom de l''Eternel:'
  - type: text
    content: «Eternel, sauve-moi!»
  '5':
  - type: text
    content: L'Eternel fait grâce et il est juste,
  - type: text
    content: notre Dieu est rempli de compassion.
  '6':
  - type: text
    content: L'Eternel garde ceux qui manquent d'expérience;
  - type: text
    content: j'étais affaibli, et il m'a sauvé.
  '7':
  - type: text
    content: Retrouve le repos, mon âme,
  - type: text
    content: car l'Eternel t'a fait du bien!
  '8':
  - type: text
    content: Oui, tu as délivré mon âme de la mort,
  - type: text
    content: mes yeux des larmes,
  - type: text
    content: mes pieds de la chute.
  '9':
  - type: text
    content: Je marcherai devant l'Eternel
  - type: text
    content: au pays des vivants.
