document_id: PSA.116
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Louange pour la délivrance accordée
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: J'aime l'Eternel, car il entend
- type: usfm
  marker: q1
  children:
  - type: text
    text: ma voix, mes supplications.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Oui, il a penché son oreille vers moi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je ferai appel à lui toute ma vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Les liens de la mort m'avaient enserré,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les angoisses du séjour des morts s'étaient emparées de moi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'étais accablé par la détresse et la douleur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'mais j''ai fait appel au nom de l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Eternel, sauve-moi!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: L'Eternel fait grâce et il est juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: notre Dieu est rempli de compassion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: L'Eternel garde ceux qui manquent d'expérience;
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'étais affaibli, et il m'a sauvé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Retrouve le repos, mon âme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car l'Eternel t'a fait du bien!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Oui, tu as délivré mon âme de la mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mes yeux des larmes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mes pieds de la chute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je marcherai devant l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: au pays des vivants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '*J''avais confiance, même lorsque je disais'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '116.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'J''avais… disais: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Corinthiens 4.13
      metadata:
        usfm: 2CO.4.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' d''après la Septante.'
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Je suis plongé dans le malheur!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dans mon angoisse, je disais:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Tous les hommes sont des menteurs.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Comment pourrais-je rendre à l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous ses bienfaits envers moi?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je lèverai la coupe des délivrances
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je ferai appel au nom de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: j'accomplirai mes vœux envers l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: en présence de tout son peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Elle a du prix aux yeux de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la mort de ses fidèles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ecoute-moi, Eternel, car je suis ton serviteur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ton serviteur, le fils de ta servante!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu as détaché mes liens:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: je t'offrirai un sacrifice de reconnaissance
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je ferai appel au nom de l'Eternel;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: j'accomplirai mes vœux envers l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: en présence de tout son peuple,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: dans les parvis de la maison de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au milieu de toi, Jérusalem.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Louez l'Eternel!
