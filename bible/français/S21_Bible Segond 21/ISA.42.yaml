document_id: ISA.42,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le serviteur de l'Eternel
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '*Voici mon serviteur, celui que je soutiendrai,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui que j'ai choisi et qui a toute mon approbation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'ai mis mon Esprit sur lui;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il révélera le droit aux nations.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Chantez un cantique nouveau en l'honneur de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: chantez ses louanges depuis les extrémités de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous qui naviguez sur la mer et vous qui la remplissez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: îles et habitants des îles!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Que le désert et ses villes fassent entendre leur voix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi que les villages occupés par Kédar!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que les habitants de Séla expriment leur allégresse!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que du sommet des montagnes retentissent des cris de joie!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Qu'on donne gloire à l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que dans les îles on proclame ses louanges!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: L'Eternel sort, pareil à un héros,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: son zèle passionné le fait surgir comme un homme de guerre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il pousse des cris, des cris de guerre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il montre sa force contre ses ennemis.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: J'ai longtemps gardé le silence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je me suis tu, je me suis retenu de parler,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais désormais, je vais crier comme une femme en train d'accoucher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je serai haletant et je soufflerai tout à la fois.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Je dévasterai montagnes et collines
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j'en ferai sécher toute la verdure;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je changerai les fleuves en îles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je mettrai les étangs à sec.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Je ferai marcher les aveugles sur un chemin qu'ils ne connaissent pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je les conduirai par des sentiers qu'ils ignoraient;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je changerai les ténèbres en lumière devant eux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je redresserai les passages tortueux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà ce que je ferai, et je ne les abandonnerai pas.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Ils reculeront, couverts de honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui placent leur confiance dans les sculptures sacrées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ceux qui disent aux statues en métal fondu:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «C'est vous qui êtes nos dieux!»
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Sourds, écoutez! Aveugles, regardez et voyez!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Qui est aveugle? N'est-ce pas mon serviteur?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Y a-t-il plus sourd que mon messager, celui que j'envoie?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Y a-t-il plus aveugle que le bénéficiaire de mon alliance de paix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: plus aveugle que le serviteur de l'Eternel?
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Il ne criera pas, il ne haussera pas le ton
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne fera pas entendre sa voix dans les rues.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Tu as vu beaucoup de choses, mais tu n'y as pas prêté attention.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a ouvert les oreilles, mais il n'a rien entendu.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: L'Eternel a pris plaisir, à cause de sa justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à rendre la loi grande et magnifique,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: et c'est un peuple pillé et dépouillé!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On les a tous enchaînés dans des trous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: plongés dans des cachots.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On les pille et personne ne les délivre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on les dépouille et personne n'ordonne de rendre ce qu'on leur a pris.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Qui de vous prêtera l'oreille à cela?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui se montrera attentif pour écouter, à l'avenir?
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Qui a livré Jacob au pillage
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Israël aux pillards? N'est-ce pas l'Eternel?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est que nous avons péché contre lui.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils n'ont pas voulu marcher dans ses voies
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et n'ont pas écouté son enseignement.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Alors, il a déversé sur son peuple toute l'ardeur de sa colère
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la violence de la guerre. Elle l'a embrasé de tous côtés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais Israël n'a rien compris.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle l'a incendié, mais il ne l'a pas pris à cœur.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Il ne cassera pas le roseau abîmé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et n'éteindra pas la mèche qui fume encore,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais c'est en toute vérité qu'il révélera le droit.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Il ne faiblira pas et ne se relâchera pas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu'à ce qu'il ait instauré le droit sur la terre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les îles placeront leur attente dans sa loi.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.1-4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les versets 1 à 4 (ou 1 à 9) de ce chapitre, cités en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matthieu 12.18-21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', constituent le premier de ce qu''on appelle en général les «quatre chants du serviteur de l''Eternel». Les autres se trouvent en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 49.1-6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (ou 1-13), '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 50.4-9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (ou 4-11) et '
      - type: text
        text: 52.13–53.12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Voici ce que dit l'Eternel, le Dieu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui a créé le ciel et l'a déployé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui a disposé la terre et tout ce qu'elle produit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui donne la respiration à ceux qui la peuplent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'le souffle à ceux qui y marchent:'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Moi, l'Eternel, je t'ai appelé en toute justice
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je te tiendrai fermement par la main.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te garderai et je t'établirai pour que tu sois l'alliance du peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la lumière des nations,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: pour que tu ouvres les yeux des aveugles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que tu fasses sortir le détenu de prison
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de leur cachot les habitants des ténèbres.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Je suis l'Eternel, voilà quel est mon nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je ne donnerai pas ma gloire à un autre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni la louange qui m'est due aux sculptures sacrées.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Les premiers événements se sont produits
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je vous en révèle de nouveaux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant qu'ils ne soient en germe, je vous les annonce.
