document_id: ISA.42,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le serviteur de l'Eternel
  - type: text
    content: '*Voici mon serviteur, celui que je soutiendrai,'
  - type: text
    content: celui que j'ai choisi et qui a toute mon approbation.
  - type: text
    content: J'ai mis mon Esprit sur lui;
  - type: text
    content: il révélera le droit aux nations.
  '10':
  - type: text
    content: Chantez un cantique nouveau en l'honneur de l'Eternel,
  - type: text
    content: chantez ses louanges depuis les extrémités de la terre,
  - type: text
    content: vous qui naviguez sur la mer et vous qui la remplissez,
  - type: text
    content: îles et habitants des îles!
  '11':
  - type: text
    content: Que le désert et ses villes fassent entendre leur voix,
  - type: text
    content: ainsi que les villages occupés par Kédar!
  - type: text
    content: Que les habitants de Séla expriment leur allégresse!
  - type: text
    content: Que du sommet des montagnes retentissent des cris de joie!
  '12':
  - type: text
    content: Qu'on donne gloire à l'Eternel
  - type: text
    content: et que dans les îles on proclame ses louanges!
  '13':
  - type: text
    content: L'Eternel sort, pareil à un héros,
  - type: text
    content: son zèle passionné le fait surgir comme un homme de guerre.
  - type: text
    content: Il pousse des cris, des cris de guerre,
  - type: text
    content: il montre sa force contre ses ennemis.
  '14':
  - type: text
    content: J'ai longtemps gardé le silence,
  - type: text
    content: je me suis tu, je me suis retenu de parler,
  - type: text
    content: mais désormais, je vais crier comme une femme en train d'accoucher,
  - type: text
    content: je serai haletant et je soufflerai tout à la fois.
  '15':
  - type: text
    content: Je dévasterai montagnes et collines
  - type: text
    content: et j'en ferai sécher toute la verdure;
  - type: text
    content: je changerai les fleuves en îles
  - type: text
    content: et je mettrai les étangs à sec.
  '16':
  - type: text
    content: Je ferai marcher les aveugles sur un chemin qu'ils ne connaissent pas,
  - type: text
    content: je les conduirai par des sentiers qu'ils ignoraient;
  - type: text
    content: je changerai les ténèbres en lumière devant eux
  - type: text
    content: et je redresserai les passages tortueux.
  - type: text
    content: Voilà ce que je ferai, et je ne les abandonnerai pas.
  '17':
  - type: text
    content: Ils reculeront, couverts de honte,
  - type: text
    content: ceux qui placent leur confiance dans les sculptures sacrées,
  - type: text
    content: 'ceux qui disent aux statues en métal fondu:'
  - type: text
    content: «C'est vous qui êtes nos dieux!»
  '18':
  - type: text
    content: Sourds, écoutez! Aveugles, regardez et voyez!
  '19':
  - type: text
    content: Qui est aveugle? N'est-ce pas mon serviteur?
  - type: text
    content: Y a-t-il plus sourd que mon messager, celui que j'envoie?
  - type: text
    content: Y a-t-il plus aveugle que le bénéficiaire de mon alliance de paix,
  - type: text
    content: plus aveugle que le serviteur de l'Eternel?
  '2':
  - type: text
    content: Il ne criera pas, il ne haussera pas le ton
  - type: text
    content: et ne fera pas entendre sa voix dans les rues.
  '20':
  - type: text
    content: Tu as vu beaucoup de choses, mais tu n'y as pas prêté attention.
  - type: text
    content: Il a ouvert les oreilles, mais il n'a rien entendu.
  '21':
  - type: text
    content: L'Eternel a pris plaisir, à cause de sa justice,
  - type: text
    content: à rendre la loi grande et magnifique,
  '22':
  - type: text
    content: et c'est un peuple pillé et dépouillé!
  - type: text
    content: On les a tous enchaînés dans des trous,
  - type: text
    content: plongés dans des cachots.
  - type: text
    content: On les pille et personne ne les délivre,
  - type: text
    content: on les dépouille et personne n'ordonne de rendre ce qu'on leur a pris.
  '23':
  - type: text
    content: Qui de vous prêtera l'oreille à cela?
  - type: text
    content: Qui se montrera attentif pour écouter, à l'avenir?
  '24':
  - type: text
    content: Qui a livré Jacob au pillage
  - type: text
    content: et Israël aux pillards? N'est-ce pas l'Eternel?
  - type: text
    content: C'est que nous avons péché contre lui.
  - type: text
    content: Ils n'ont pas voulu marcher dans ses voies
  - type: text
    content: et n'ont pas écouté son enseignement.
  '25':
  - type: text
    content: Alors, il a déversé sur son peuple toute l'ardeur de sa colère
  - type: text
    content: et la violence de la guerre. Elle l'a embrasé de tous côtés,
  - type: text
    content: mais Israël n'a rien compris.
  - type: text
    content: Elle l'a incendié, mais il ne l'a pas pris à cœur.
  '3':
  - type: text
    content: Il ne cassera pas le roseau abîmé
  - type: text
    content: et n'éteindra pas la mèche qui fume encore,
  - type: text
    content: mais c'est en toute vérité qu'il révélera le droit.
  '4':
  - type: text
    content: Il ne faiblira pas et ne se relâchera pas
  - type: text
    content: jusqu'à ce qu'il ait instauré le droit sur la terre.
  - type: text
    content: Les îles placeront leur attente dans sa loi.
  - type: note
    content: Les versets 1 à 4 (ou 1 à 9) de ce chapitre, cités en Matthieu 12.18-21, constituent le premier de ce qu'on appelle en général les «quatre chants du serviteur de l'Eternel». Les autres se trouvent en 49.1-6 (ou 1-13), 50.4-9 (ou 4-11) et 52.13–53.12.
  '5':
  - type: text
    content: Voici ce que dit l'Eternel, le Dieu
  - type: text
    content: qui a créé le ciel et l'a déployé,
  - type: text
    content: qui a disposé la terre et tout ce qu'elle produit
  - type: text
    content: et qui donne la respiration à ceux qui la peuplent,
  - type: text
    content: 'le souffle à ceux qui y marchent:'
  '6':
  - type: text
    content: Moi, l'Eternel, je t'ai appelé en toute justice
  - type: text
    content: et je te tiendrai fermement par la main.
  - type: text
    content: Je te garderai et je t'établirai pour que tu sois l'alliance du peuple,
  - type: text
    content: la lumière des nations,
  '7':
  - type: text
    content: pour que tu ouvres les yeux des aveugles,
  - type: text
    content: pour que tu fasses sortir le détenu de prison
  - type: text
    content: et de leur cachot les habitants des ténèbres.
  '8':
  - type: text
    content: Je suis l'Eternel, voilà quel est mon nom,
  - type: text
    content: et je ne donnerai pas ma gloire à un autre
  - type: text
    content: ni la louange qui m'est due aux sculptures sacrées.
  '9':
  - type: text
    content: Les premiers événements se sont produits
  - type: text
    content: et je vous en révèle de nouveaux;
  - type: text
    content: avant qu'ils ne soient en germe, je vous les annonce.
