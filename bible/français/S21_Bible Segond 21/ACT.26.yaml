document_id: ACT.26
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Agrippa dit à Paul: «Il t''est permis de parler pour ta défense.» Paul tendit la main et plaida sa cause ainsi: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Je m''estime heureux, roi Agrippa, d''avoir aujourd''hui à me défendre devant toi de toutes les accusations portées contre moi par des Juifs, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: car tu connais parfaitement leurs coutumes et leurs discussions. Je te prie donc de m'écouter avec patience.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '»Comment je me suis comporté dès ma jeunesse, tous les Juifs le savent, puisque j''ai vécu dès le début au milieu de mon peuple à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Me connaissant depuis longtemps, ils savent, s''ils veulent bien en témoigner, que j''ai vécu en pharisien, selon le parti le plus strict de notre religion. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Et maintenant je suis traduit en justice parce que j''espère en la promesse que Dieu a faite à nos ancêtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Cette promesse, nos douze tribus espèrent en obtenir l''accomplissement en rendant nuit et jour avec ardeur un culte à Dieu. Et c''est à cause de cette espérance, roi, que je suis accusé par des Juifs! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Pourquoi donc vous semble-t-il incroyable que Dieu ressuscite des morts?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '»Pour ma part, j''avais cru devoir agir vigoureusement contre le nom de Jésus de Nazareth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'C''est ce que j''ai fait à Jérusalem. J''ai jeté en prison beaucoup de chrétiens, car j''en avais reçu le pouvoir des chefs des prêtres, et quand on les condamnait à mort, je votais contre eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Dans toutes les synagogues, je les ai souvent fait punir et je les forçais à blasphémer. Dans l''excès de ma fureur contre eux, je les ai même persécutés jusque dans les villes étrangères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'C''est ainsi que je me suis rendu à Damas avec les pleins pouvoirs et un mandat des chefs des prêtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Vers le milieu du jour, roi, alors que j''étais en chemin, j''ai vu resplendir autour de moi et de mes compagnons de route une lumière venant du ciel, plus éblouissante que le soleil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nous sommes tous tombés par terre et j''ai entendu une voix qui me disait en langue hébraïque: ‘Saul, Saul, pourquoi me persécutes-tu? Il te serait dur de te rebeller contre les aiguillons.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'J''ai répondu: ‘Qui es-tu, Seigneur?’ Et le Seigneur a dit: ‘Je suis Jésus, celui que tu persécutes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mais lève-toi et tiens-toi debout, car je te suis apparu pour faire de toi le serviteur et le témoin de ce que tu as vu et de ce que je te montrerai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Je t''ai choisi du milieu de ce peuple et des non-Juifs, vers qui je t''envoie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Je t'envoie leur ouvrir les yeux pour qu'ils passent des ténèbres à la lumière et de la puissance de Satan à Dieu, pour qu'ils reçoivent, par la foi en moi, le pardon des péchés et une part d'héritage avec les saints.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '»C''est pourquoi, roi Agrippa, je n''ai pas résisté à la vision céleste. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Aux habitants de Damas d''abord, puis à ceux de Jérusalem, dans toute la Judée et aux non-Juifs, j''ai annoncé qu''ils devaient se repentir et se tourner vers Dieu en adoptant une manière d''agir qui confirme leur changement d''attitude. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Voilà pourquoi les Juifs m''ont arrêté dans le temple et ont essayé de me tuer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais, grâce à l''aide de Dieu, j''ai continué jusqu''à aujourd''hui de rendre témoignage devant les petits et les grands. Je ne dis rien d''autre que ce que les prophètes et Moïse ont déclaré devoir arriver: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: que le Messie souffrirait, qu'il serait le premier à ressusciter et qu'il annoncerait la lumière au peuple juif et aux non-Juifs.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Alors qu''il parlait ainsi pour sa défense, Festus dit à haute voix: «Tu es fou, Paul! Ton grand savoir te fait déraisonner.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '«Je ne suis pas fou, très excellent Festus, répliqua Paul. Ce sont au contraire des paroles de vérité et de bon sens que je prononce. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Le roi est au courant de ces faits et je lui en parle librement car je suis persuadé qu''il n''en ignore rien. En effet, ce n''est pas en cachette que cela s''est passé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Crois-tu aux prophètes, roi Agrippa? Je sais que tu y crois.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Agrippa dit à Paul: «Tu vas bientôt me persuader de devenir chrétien!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Paul répondit: «Que ce soit pour bientôt ou que ce soit pour plus tard, je prie Dieu que non seulement toi, mais encore tous ceux qui m''écoutent aujourd''hui, vous deveniez comme moi, à l''exception de ces chaînes!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: '[Quand Paul eut dit cela,] le roi, le gouverneur, Bérénice et ceux qui étaient assis avec eux se levèrent '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'et se retirèrent. Ils se disaient les uns aux autres: «Cet homme n''a rien fait qui mérite la mort ou la prison.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Agrippa dit à Festus: «Cet homme aurait pu être relâché s''il n''en avait pas appelé à l''empereur.»'
