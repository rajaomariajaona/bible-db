document_id: LEV.6,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Instructions aux prêtres sur les sacrifices
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '10':
  - type: text
    content: 'On ne le cuira pas avec du levain. C''est la part que je leur ai donnée de mes offrandes passées par le feu. C''est une chose très sainte, tout comme le sacrifice d''expiation et le sacrifice de culpabilité. '
  '11':
  - type: text
    content: 'Tout homme parmi les descendants d''Aaron en mangera. C''est une prescription perpétuelle pour vous au fil des générations, au sujet des offrandes passées par le feu pour l''Eternel: tous ceux qui y toucheront seront saints.»'
  '12':
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '13':
  - type: text
    content: '«Voici l''offrande qu''Aaron et ses fils feront à l''Eternel, le jour où ils recevront l''onction: 2 litres de fleur de farine comme offrande perpétuelle, moitié le matin et moitié le soir. '
  '14':
  - type: text
    content: 'On la préparera à la poêle avec de l''huile et tu l''apporteras frite. Tu la présenteras aussi cuite et en morceaux comme une offrande dont l''odeur est agréable à l''Eternel. '
  '15':
  - type: text
    content: 'Le prêtre issu d''Aaron qui sera consacré par onction pour lui succéder fera aussi cette offrande. C''est une prescription perpétuelle devant l''Eternel: on la brûlera en entier. '
  '16':
  - type: text
    content: Toute offrande d'un prêtre sera brûlée en entier; on ne la mangera pas.»
  '17':
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '18':
  - type: text
    content: '«Transmets ces instructions à Aaron et à ses descendants: Voici la loi du sacrifice d''expiation. C''est à l''endroit où l''on égorge l''holocauste que sera égorgée devant l''Eternel la victime pour le sacrifice d''expiation. C''est une chose très sainte. '
  '19':
  - type: text
    content: 'Le prêtre qui offrira la victime expiatoire la mangera. Elle sera mangée dans un lieu saint, dans le parvis de la tente de la rencontre. '
  '2':
  - type: text
    content: '«Donne cet ordre à Aaron et à ses descendants: Voici la loi de l''holocauste. L''holocauste restera sur le foyer de l''autel toute la nuit jusqu''au matin et le feu brûlera sur l''autel. '
  '20':
  - type: text
    content: 'Tous ceux qui en toucheront la viande seront saints. S''il en rejaillit du sang sur un vêtement, la place sur laquelle il aura rejailli sera lavée dans un lieu saint. '
  '21':
  - type: text
    content: 'Le vase de terre dans lequel elle aura cuit sera brisé; si c''est dans un vase en bronze qu''elle a cuit, il sera nettoyé et lavé dans l''eau. '
  '22':
  - type: text
    content: 'Tout homme parmi les prêtres en mangera. C''est une chose très sainte. '
  '23':
  - type: text
    content: 'Mais on ne mangera aucune victime dont le sang aura été apporté dans la tente de la rencontre pour faire l''expiation dans le sanctuaire: elle sera brûlée au feu.'
  '3':
  - type: text
    content: 'Le prêtre mettra sa tunique de lin et mettra des caleçons sur son corps, il enlèvera la cendre faite par le feu qui aura brûlé l''holocauste sur l''autel et il la déposera près de l''autel. '
  '4':
  - type: text
    content: 'Puis il quittera ses vêtements et en mettra d''autres pour porter la cendre à l''extérieur du camp, dans un endroit pur. '
  '5':
  - type: text
    content: 'Le feu brûlera sur l''autel, il ne s''éteindra pas. Chaque matin, le prêtre y allumera du bois, arrangera l''holocauste et brûlera la graisse des sacrifices de communion. '
  '6':
  - type: text
    content: Le feu brûlera constamment sur l'autel, il ne s'éteindra pas.
  '7':
  - type: text
    content: '»Voici la loi de l''offrande. Les descendants d''Aaron la présenteront devant l''Eternel, devant l''autel. '
  '8':
  - type: text
    content: 'Le prêtre prélèvera une poignée de la fleur de farine et de l''huile avec tout l''encens ajouté à l''offrande et il brûlera cela sur l''autel comme souvenir dont l''odeur est agréable à l''Eternel. '
  '9':
  - type: text
    content: 'Aaron et ses descendants mangeront ce qui restera de l''offrande; ils le mangeront sans levain, dans un lieu saint, dans le parvis de la tente de la rencontre. '
