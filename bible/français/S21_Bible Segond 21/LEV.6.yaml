document_id: LEV.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Instructions aux prêtres sur les sacrifices
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Donne cet ordre à Aaron et à ses descendants: Voici la loi de l''holocauste. L''holocauste restera sur le foyer de l''autel toute la nuit jusqu''au matin et le feu brûlera sur l''autel. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le prêtre mettra sa tunique de lin et mettra des caleçons sur son corps, il enlèvera la cendre faite par le feu qui aura brûlé l''holocauste sur l''autel et il la déposera près de l''autel. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Puis il quittera ses vêtements et en mettra d''autres pour porter la cendre à l''extérieur du camp, dans un endroit pur. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le feu brûlera sur l''autel, il ne s''éteindra pas. Chaque matin, le prêtre y allumera du bois, arrangera l''holocauste et brûlera la graisse des sacrifices de communion. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Le feu brûlera constamment sur l'autel, il ne s'éteindra pas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '»Voici la loi de l''offrande. Les descendants d''Aaron la présenteront devant l''Eternel, devant l''autel. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le prêtre prélèvera une poignée de la fleur de farine et de l''huile avec tout l''encens ajouté à l''offrande et il brûlera cela sur l''autel comme souvenir dont l''odeur est agréable à l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Aaron et ses descendants mangeront ce qui restera de l''offrande; ils le mangeront sans levain, dans un lieu saint, dans le parvis de la tente de la rencontre. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'On ne le cuira pas avec du levain. C''est la part que je leur ai donnée de mes offrandes passées par le feu. C''est une chose très sainte, tout comme le sacrifice d''expiation et le sacrifice de culpabilité. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tout homme parmi les descendants d''Aaron en mangera. C''est une prescription perpétuelle pour vous au fil des générations, au sujet des offrandes passées par le feu pour l''Eternel: tous ceux qui y toucheront seront saints.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '«Voici l''offrande qu''Aaron et ses fils feront à l''Eternel, le jour où ils recevront l''onction: 2 litres de fleur de farine comme offrande perpétuelle, moitié le matin et moitié le soir. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'On la préparera à la poêle avec de l''huile et tu l''apporteras frite. Tu la présenteras aussi cuite et en morceaux comme une offrande dont l''odeur est agréable à l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le prêtre issu d''Aaron qui sera consacré par onction pour lui succéder fera aussi cette offrande. C''est une prescription perpétuelle devant l''Eternel: on la brûlera en entier. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Toute offrande d'un prêtre sera brûlée en entier; on ne la mangera pas.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '«Transmets ces instructions à Aaron et à ses descendants: Voici la loi du sacrifice d''expiation. C''est à l''endroit où l''on égorge l''holocauste que sera égorgée devant l''Eternel la victime pour le sacrifice d''expiation. C''est une chose très sainte. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le prêtre qui offrira la victime expiatoire la mangera. Elle sera mangée dans un lieu saint, dans le parvis de la tente de la rencontre. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tous ceux qui en toucheront la viande seront saints. S''il en rejaillit du sang sur un vêtement, la place sur laquelle il aura rejailli sera lavée dans un lieu saint. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le vase de terre dans lequel elle aura cuit sera brisé; si c''est dans un vase en bronze qu''elle a cuit, il sera nettoyé et lavé dans l''eau. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tout homme parmi les prêtres en mangera. C''est une chose très sainte. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mais on ne mangera aucune victime dont le sang aura été apporté dans la tente de la rencontre pour faire l''expiation dans le sanctuaire: elle sera brûlée au feu.'
