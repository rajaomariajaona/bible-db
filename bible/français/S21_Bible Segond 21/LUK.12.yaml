document_id: LUK.12,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Pendant ce temps, les gens s''étaient rassemblés par milliers, au point de s''écraser les uns les autres. Jésus se mit à dire à ses disciples: «Avant tout, méfiez-vous du levain des pharisiens, qui est l''hypocrisie. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Toute personne qui dira une parole contre le Fils de l'homme, cela lui sera pardonné; mais celui qui aura blasphémé contre le Saint-Esprit, le pardon ne lui sera pas accordé.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '»Quand on vous conduira dans les synagogues, ou devant les magistrats et les autorités, ne vous inquiétez pas de la manière dont vous vous défendrez ni de ce que vous direz. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: En effet, le Saint-Esprit vous enseignera au moment même ce qu'il faudra dire.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les biens matériels
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Du milieu de la foule, quelqu''un dit à Jésus: «Maître, dis à mon frère de partager notre héritage avec moi.» '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Jésus lui répondit: «Qui m''a établi pour être votre juge ou pour faire vos partages?» '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Puis il leur dit: «Gardez-vous avec soin de toute soif de posséder, car la vie d''un homme ne dépend pas de ses biens, même s''il est dans l''abondance.» '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Il leur dit cette parabole: «Les terres d''un homme riche avaient beaucoup rapporté. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Il raisonnait en lui-même, disant: ‘Que vais-je faire? En effet, je n''ai pas de place pour rentrer ma récolte. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Voici ce que je vais faire, se dit-il: j''abattrai mes greniers, j''en construirai de plus grands, j''y amasserai toute ma récolte et tous mes biens, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'et je dirai à mon âme: Mon âme, tu as beaucoup de biens en réserve pour de nombreuses années; repose-toi, mange, bois et réjouis-toi.’ '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il n''y a rien de caché qui ne doive être découvert, ni de secret qui ne doive être connu. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Mais Dieu lui dit: ‘Homme dépourvu de bon sens! Cette nuit même, ton âme te sera redemandée, et ce que tu as préparé, pour qui cela sera-t-il?’ '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Voilà quelle est la situation de celui qui amasse des trésors pour lui-même et qui n'est pas riche pour Dieu.»
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Jésus dit ensuite à ses disciples: «C''est pourquoi je vous le dis: ne vous inquiétez pas pour votre vie de ce que vous mangerez, ni pour votre corps de ce dont vous serez habillés. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'La vie est plus que la nourriture et le corps plus que le vêtement. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Observez les corbeaux: ils ne sèment pas et ne moissonnent pas, ils n''ont ni cave ni grenier, et Dieu les nourrit. Vous valez beaucoup plus que les oiseaux! '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Qui de vous peut, par ses inquiétudes, ajouter un instant à la durée de sa vie? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Si donc vous ne pouvez rien faire, même pour si peu, pourquoi vous inquiétez-vous du reste? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Observez comment poussent les plus belles fleurs: elles ne travaillent pas et ne tissent pas; cependant je vous dis que Salomon'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Salomon: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: l'un des plus grands rois d'Israël, fils de David.
      marker-yv: yv-n
    - type: text
      text: ' lui-même, dans toute sa gloire, n''a pas eu d''aussi belles tenues que l''une d''elles. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Si Dieu habille ainsi l''herbe qui est aujourd''hui dans les champs et qui demain sera jetée au feu, il le fera d''autant plus volontiers pour vous, gens de peu de foi! '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Et vous, ne cherchez pas ce que vous mangerez ni ce que vous boirez et ne soyez pas inquiets. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'C''est pourquoi tout ce que vous aurez dit dans l''obscurité sera entendu en plein jour et ce que vous aurez dit à l''oreille dans les chambres sera proclamé sur les toits. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'En effet, tout cela, ce sont les membres des autres peuples du monde qui le recherchent. Votre Père sait que vous en avez besoin. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Recherchez plutôt le royaume de Dieu et [tout] cela vous sera donné en plus. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: N'aie pas peur, petit troupeau, car votre Père a trouvé bon de vous donner le royaume.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: '»Vendez ce que vous possédez et faites don de l''argent. Faites-vous des bourses qui ne s''usent pas, un trésor inépuisable dans le ciel, où le voleur n''approche pas et où la mite ne détruit pas. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: En effet, là où est votre trésor, là aussi sera votre cœur.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Appel à être prêts
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: '»Mettez une ceinture à votre taille et tenez vos lampes allumées. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Soyez comme des hommes qui attendent que leur maître revienne des noces, afin de lui ouvrir dès qu''il arrivera et frappera. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Heureux ces serviteurs que le maître, à son arrivée, trouvera éveillés! Je vous le dis en vérité, il mettra sa ceinture, les fera prendre place à table et s''approchera pour les servir. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Qu''il arrive au milieu ou vers la fin de la nuit, heureux sont ces serviteurs, s''il les trouve éveillés! '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Vous le savez bien, si le maître de la maison connaissait l''heure à laquelle le voleur doit venir, il resterait éveillé et ne laisserait pas percer les murs de sa maison. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Je vous le dis, à vous qui êtes mes amis: ne redoutez pas ceux qui tuent le corps et qui, après cela, ne peuvent rien faire de plus. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Vous [donc] aussi, tenez-vous prêts, car le Fils de l'homme viendra à l'heure où vous n'y penserez pas.»
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Pierre lui dit: «Seigneur, est-ce à nous que tu adresses cette parabole, ou bien à tout le monde?» '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Le Seigneur dit: «Quel est donc l''intendant fidèle et prudent que le maître établira responsable de ses employés pour leur donner la nourriture au moment voulu? '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Heureux le serviteur que son maître, à son arrivée, trouvera occupé à son travail! '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: 'Je vous le dis en vérité, il l''établira responsable de tous ses biens. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Mais si ce serviteur se dit en lui-même: ‘Mon maître tarde à venir’, s''il se met à battre les autres serviteurs et servantes, à manger, à boire et à s''enivrer, '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'alors le maître de ce serviteur viendra le jour où il ne s''y attend pas et à l''heure qu''il ne connaît pas. Il le punira sévèrement et lui fera partager le sort des infidèles. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Le serviteur qui a connu la volonté de son maître mais qui n''a rien préparé ni fait pour s''y conformer sera battu d''un grand nombre de coups. '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: En revanche, celui qui ne l'a pas connue et qui a fait des choses dignes de punition sera battu de peu de coups. On demandera beaucoup à qui l'on a beaucoup donné, et l'on exigera davantage de celui à qui l'on a beaucoup confié.
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: '»Je suis venu jeter un feu sur la terre; combien je voudrais qu''il soit déjà allumé! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Je vais vous montrer qui vous devez redouter: redoutez celui qui, après avoir tué, a le pouvoir de jeter en enfer. Oui, je vous le dis, c''est lui que vous devez redouter. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Il y a un baptême dont je dois être baptisé, et quelle angoisse pour moi jusqu''à ce qu''il soit accompli! '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Pensez-vous que je sois venu apporter la paix sur la terre? Non, vous dis-je, mais la division. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'En effet, désormais, s''il y a cinq personnes dans une famille, elles seront divisées, trois contre deux et deux contre trois, '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
    - type: text
      text: le père contre le fils et le fils contre le père, la mère contre la fille et la fille contre la mère, la belle-mère contre la belle-fille et la belle-fille contre la belle-mère.»
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '54'
    - type: text
      text: 'Il dit encore aux foules: «Quand vous voyez un nuage se lever à l''ouest, vous dites aussitôt: ‘La pluie vient’, et c''est ce qui se passe. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '55'
    - type: text
      text: 'Quand vous voyez souffler le vent du sud, vous dites: ‘Il fera chaud’, et c''est ce qui arrive. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '56'
    - type: text
      text: 'Hypocrites! Vous savez reconnaître l''aspect de la terre et du ciel; comment se fait-il que vous ne reconnaissiez pas ce temps-ci? '
  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: text
      text: 'Et pourquoi ne discernez-vous pas par vous-mêmes ce qui est juste? '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '58'
    - type: text
      text: 'Lorsque tu vas avec ton adversaire devant le magistrat, tâche en chemin de t''arranger avec lui, de peur qu''il ne te traîne devant le juge, que le juge ne te livre à l''officier de justice et que celui-ci ne te mette en prison. '
  '59':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '59'
    - type: text
      text: Je te le dis, tu n'en sortiras pas avant d'avoir payé jusqu'au dernier centime.»
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ne vend-on pas cinq moineaux pour deux petites pièces? Cependant, aucun d''eux n''est oublié devant Dieu. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Même vos cheveux sont tous comptés. N''ayez donc pas peur: vous valez plus que beaucoup de moineaux.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: '»Je vous le dis, toute personne qui se déclarera pour moi devant les hommes, le Fils de l''homme se déclarera aussi pour elle devant les anges de Dieu; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'mais celui qui m''aura renié devant les hommes sera renié devant les anges de Dieu. '
