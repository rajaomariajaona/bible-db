document_id: LUK.12,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Pendant ce temps, les gens s''étaient rassemblés par milliers, au point de s''écraser les uns les autres. Jésus se mit à dire à ses disciples: «Avant tout, méfiez-vous du levain des pharisiens, qui est l''hypocrisie. '
  '10':
  - type: text
    content: Toute personne qui dira une parole contre le Fils de l'homme, cela lui sera pardonné; mais celui qui aura blasphémé contre le Saint-Esprit, le pardon ne lui sera pas accordé.
  '11':
  - type: text
    content: '»Quand on vous conduira dans les synagogues, ou devant les magistrats et les autorités, ne vous inquiétez pas de la manière dont vous vous défendrez ni de ce que vous direz. '
  '12':
  - type: text
    content: En effet, le Saint-Esprit vous enseignera au moment même ce qu'il faudra dire.»
  - type: heading
    content: Les biens matériels
  '13':
  - type: text
    content: 'Du milieu de la foule, quelqu''un dit à Jésus: «Maître, dis à mon frère de partager notre héritage avec moi.» '
  '14':
  - type: text
    content: 'Jésus lui répondit: «Qui m''a établi pour être votre juge ou pour faire vos partages?» '
  '15':
  - type: text
    content: 'Puis il leur dit: «Gardez-vous avec soin de toute soif de posséder, car la vie d''un homme ne dépend pas de ses biens, même s''il est dans l''abondance.» '
  '16':
  - type: text
    content: 'Il leur dit cette parabole: «Les terres d''un homme riche avaient beaucoup rapporté. '
  '17':
  - type: text
    content: 'Il raisonnait en lui-même, disant: ‘Que vais-je faire? En effet, je n''ai pas de place pour rentrer ma récolte. '
  '18':
  - type: text
    content: 'Voici ce que je vais faire, se dit-il: j''abattrai mes greniers, j''en construirai de plus grands, j''y amasserai toute ma récolte et tous mes biens, '
  '19':
  - type: text
    content: 'et je dirai à mon âme: Mon âme, tu as beaucoup de biens en réserve pour de nombreuses années; repose-toi, mange, bois et réjouis-toi.’ '
  '2':
  - type: text
    content: 'Il n''y a rien de caché qui ne doive être découvert, ni de secret qui ne doive être connu. '
  '20':
  - type: text
    content: 'Mais Dieu lui dit: ‘Homme dépourvu de bon sens! Cette nuit même, ton âme te sera redemandée, et ce que tu as préparé, pour qui cela sera-t-il?’ '
  '21':
  - type: text
    content: Voilà quelle est la situation de celui qui amasse des trésors pour lui-même et qui n'est pas riche pour Dieu.»
  '22':
  - type: text
    content: 'Jésus dit ensuite à ses disciples: «C''est pourquoi je vous le dis: ne vous inquiétez pas pour votre vie de ce que vous mangerez, ni pour votre corps de ce dont vous serez habillés. '
  '23':
  - type: text
    content: 'La vie est plus que la nourriture et le corps plus que le vêtement. '
  '24':
  - type: text
    content: 'Observez les corbeaux: ils ne sèment pas et ne moissonnent pas, ils n''ont ni cave ni grenier, et Dieu les nourrit. Vous valez beaucoup plus que les oiseaux! '
  '25':
  - type: text
    content: 'Qui de vous peut, par ses inquiétudes, ajouter un instant à la durée de sa vie? '
  '26':
  - type: text
    content: 'Si donc vous ne pouvez rien faire, même pour si peu, pourquoi vous inquiétez-vous du reste? '
  '27':
  - type: text
    content: 'Observez comment poussent les plus belles fleurs: elles ne travaillent pas et ne tissent pas; cependant je vous dis que Salomon'
  - type: note
    content: 'Salomon: l''un des plus grands rois d''Israël, fils de David.'
  - type: text
    content: ' lui-même, dans toute sa gloire, n''a pas eu d''aussi belles tenues que l''une d''elles. '
  '28':
  - type: text
    content: 'Si Dieu habille ainsi l''herbe qui est aujourd''hui dans les champs et qui demain sera jetée au feu, il le fera d''autant plus volontiers pour vous, gens de peu de foi! '
  '29':
  - type: text
    content: 'Et vous, ne cherchez pas ce que vous mangerez ni ce que vous boirez et ne soyez pas inquiets. '
  '3':
  - type: text
    content: 'C''est pourquoi tout ce que vous aurez dit dans l''obscurité sera entendu en plein jour et ce que vous aurez dit à l''oreille dans les chambres sera proclamé sur les toits. '
  '30':
  - type: text
    content: 'En effet, tout cela, ce sont les membres des autres peuples du monde qui le recherchent. Votre Père sait que vous en avez besoin. '
  '31':
  - type: text
    content: 'Recherchez plutôt le royaume de Dieu et [tout] cela vous sera donné en plus. '
  '32':
  - type: text
    content: N'aie pas peur, petit troupeau, car votre Père a trouvé bon de vous donner le royaume.
  '33':
  - type: text
    content: '»Vendez ce que vous possédez et faites don de l''argent. Faites-vous des bourses qui ne s''usent pas, un trésor inépuisable dans le ciel, où le voleur n''approche pas et où la mite ne détruit pas. '
  '34':
  - type: text
    content: En effet, là où est votre trésor, là aussi sera votre cœur.
  - type: heading
    content: Appel à être prêts
  '35':
  - type: text
    content: '»Mettez une ceinture à votre taille et tenez vos lampes allumées. '
  '36':
  - type: text
    content: 'Soyez comme des hommes qui attendent que leur maître revienne des noces, afin de lui ouvrir dès qu''il arrivera et frappera. '
  '37':
  - type: text
    content: 'Heureux ces serviteurs que le maître, à son arrivée, trouvera éveillés! Je vous le dis en vérité, il mettra sa ceinture, les fera prendre place à table et s''approchera pour les servir. '
  '38':
  - type: text
    content: 'Qu''il arrive au milieu ou vers la fin de la nuit, heureux sont ces serviteurs, s''il les trouve éveillés! '
  '39':
  - type: text
    content: 'Vous le savez bien, si le maître de la maison connaissait l''heure à laquelle le voleur doit venir, il resterait éveillé et ne laisserait pas percer les murs de sa maison. '
  '4':
  - type: text
    content: 'Je vous le dis, à vous qui êtes mes amis: ne redoutez pas ceux qui tuent le corps et qui, après cela, ne peuvent rien faire de plus. '
  '40':
  - type: text
    content: Vous [donc] aussi, tenez-vous prêts, car le Fils de l'homme viendra à l'heure où vous n'y penserez pas.»
  '41':
  - type: text
    content: 'Pierre lui dit: «Seigneur, est-ce à nous que tu adresses cette parabole, ou bien à tout le monde?» '
  '42':
  - type: text
    content: 'Le Seigneur dit: «Quel est donc l''intendant fidèle et prudent que le maître établira responsable de ses employés pour leur donner la nourriture au moment voulu? '
  '43':
  - type: text
    content: 'Heureux le serviteur que son maître, à son arrivée, trouvera occupé à son travail! '
  '44':
  - type: text
    content: 'Je vous le dis en vérité, il l''établira responsable de tous ses biens. '
  '45':
  - type: text
    content: 'Mais si ce serviteur se dit en lui-même: ‘Mon maître tarde à venir’, s''il se met à battre les autres serviteurs et servantes, à manger, à boire et à s''enivrer, '
  '46':
  - type: text
    content: 'alors le maître de ce serviteur viendra le jour où il ne s''y attend pas et à l''heure qu''il ne connaît pas. Il le punira sévèrement et lui fera partager le sort des infidèles. '
  '47':
  - type: text
    content: 'Le serviteur qui a connu la volonté de son maître mais qui n''a rien préparé ni fait pour s''y conformer sera battu d''un grand nombre de coups. '
  '48':
  - type: text
    content: En revanche, celui qui ne l'a pas connue et qui a fait des choses dignes de punition sera battu de peu de coups. On demandera beaucoup à qui l'on a beaucoup donné, et l'on exigera davantage de celui à qui l'on a beaucoup confié.
  '49':
  - type: text
    content: '»Je suis venu jeter un feu sur la terre; combien je voudrais qu''il soit déjà allumé! '
  '5':
  - type: text
    content: 'Je vais vous montrer qui vous devez redouter: redoutez celui qui, après avoir tué, a le pouvoir de jeter en enfer. Oui, je vous le dis, c''est lui que vous devez redouter. '
  '50':
  - type: text
    content: 'Il y a un baptême dont je dois être baptisé, et quelle angoisse pour moi jusqu''à ce qu''il soit accompli! '
  '51':
  - type: text
    content: 'Pensez-vous que je sois venu apporter la paix sur la terre? Non, vous dis-je, mais la division. '
  '52':
  - type: text
    content: 'En effet, désormais, s''il y a cinq personnes dans une famille, elles seront divisées, trois contre deux et deux contre trois, '
  '53':
  - type: text
    content: le père contre le fils et le fils contre le père, la mère contre la fille et la fille contre la mère, la belle-mère contre la belle-fille et la belle-fille contre la belle-mère.»
  '54':
  - type: text
    content: 'Il dit encore aux foules: «Quand vous voyez un nuage se lever à l''ouest, vous dites aussitôt: ‘La pluie vient’, et c''est ce qui se passe. '
  '55':
  - type: text
    content: 'Quand vous voyez souffler le vent du sud, vous dites: ‘Il fera chaud’, et c''est ce qui arrive. '
  '56':
  - type: text
    content: 'Hypocrites! Vous savez reconnaître l''aspect de la terre et du ciel; comment se fait-il que vous ne reconnaissiez pas ce temps-ci? '
  '57':
  - type: text
    content: 'Et pourquoi ne discernez-vous pas par vous-mêmes ce qui est juste? '
  '58':
  - type: text
    content: 'Lorsque tu vas avec ton adversaire devant le magistrat, tâche en chemin de t''arranger avec lui, de peur qu''il ne te traîne devant le juge, que le juge ne te livre à l''officier de justice et que celui-ci ne te mette en prison. '
  '59':
  - type: text
    content: Je te le dis, tu n'en sortiras pas avant d'avoir payé jusqu'au dernier centime.»
  '6':
  - type: text
    content: 'Ne vend-on pas cinq moineaux pour deux petites pièces? Cependant, aucun d''eux n''est oublié devant Dieu. '
  '7':
  - type: text
    content: 'Même vos cheveux sont tous comptés. N''ayez donc pas peur: vous valez plus que beaucoup de moineaux.'
  '8':
  - type: text
    content: '»Je vous le dis, toute personne qui se déclarera pour moi devant les hommes, le Fils de l''homme se déclarera aussi pour elle devant les anges de Dieu; '
  '9':
  - type: text
    content: 'mais celui qui m''aura renié devant les hommes sera renié devant les anges de Dieu. '
