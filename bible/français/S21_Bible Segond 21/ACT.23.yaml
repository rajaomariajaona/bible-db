document_id: ACT.23,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Les regards fixés sur le sanhédrin, Paul dit: «Mes frères, c''est en toute bonne conscience que je me suis conduit devant Dieu jusqu''à aujourd''hui.» '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Comme le débat devenait vif, le commandant eut peur que Paul ne soit mis en pièces par ces hommes, et il ordonna aux soldats de descendre pour l'enlever du milieu d'eux et le conduire à la forteresse.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Transfert de Paul à Césarée
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'La nuit suivante, le Seigneur apparut à Paul et dit: «Prends courage, [Paul]: de même que tu as rendu témoignage de ce qui me concerne à Jérusalem, il faut aussi que tu rendes témoignage à Rome.» '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Le jour venu, quelques Juifs formèrent un complot et s''engagèrent, sous peine de malédiction contre eux-mêmes, à ne rien manger ni boire tant qu''ils n''auraient pas tué Paul. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ceux qui formèrent cette conspiration étaient plus de 40. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ils allèrent trouver les chefs des prêtres et les anciens pour leur dire: «Nous nous sommes engagés, sous peine de malédiction contre nous-mêmes, à ne rien manger avant d''avoir tué Paul. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Vous donc, maintenant, adressez-vous avec le sanhédrin au commandant romain pour qu'il l'amène [demain] devant vous, sous prétexte d'examiner son cas plus en détail; de notre côté, nous sommes prêts à le mettre à mort avant qu'il n'arrive ici.»
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Mais le fils de la sœur de Paul entendit parler du guet-apens et il alla dans la forteresse en informer Paul. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Paul appela l''un des officiers romains et dit: «Conduis ce jeune homme vers le commandant, car il a quelque chose à lui rapporter.» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'L''officier prit le jeune homme avec lui, le conduisit vers le commandant et dit: «Le prisonnier Paul m''a appelé et m''a prié de t''amener ce jeune homme qui a quelque chose à te dire.» '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Le commandant prit le jeune homme par la main, se retira à l''écart et l''interrogea: «Qu''as-tu à m''annoncer?» '
  '2':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Le grand-prêtre Ananias ordonna à ceux qui étaient près de lui de le frapper sur la bouche. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Il répondit: «Les Juifs ont convenu de te demander d''amener Paul demain devant le sanhédrin, sous prétexte d''enquêter plus en détail sur son cas. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Ne te fie pas à eux, car plus de 40 d'entre eux lui dressent un guet-apens et se sont engagés, sous peine de malédiction contre eux-mêmes, à ne rien manger ni boire avant de l'avoir tué; maintenant ils sont prêts et n'attendent que ton accord.»
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Le commandant renvoya le jeune homme après lui avoir recommandé: «Ne dis à personne que tu m''as dévoilé cela.» '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ensuite il appela deux officiers et dit: «Tenez prêts, dès neuf heures du soir, 200 soldats, 70 cavaliers et 200 archers pour aller jusqu''à Césarée. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Préparez aussi des chevaux pour conduire Paul sain et sauf au gouverneur Félix.» '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Il écrivit la lettre suivante: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '«Claude Lysias au très excellent gouverneur Félix, salut! '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Cet homme dont les Juifs s''étaient emparés allait être tué par eux. Je suis alors intervenu avec des soldats et le leur ai arraché, car j''avais appris qu''il était romain. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Voulant connaître le motif pour lequel ils l''accusaient, je l''ai amené devant leur tribunal. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'J''ai découvert qu''il était accusé au sujet de questions relatives à leur loi, mais qu''il n''avait commis aucune faute qui mérite la mort ou la prison. '
  '3':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Alors Paul lui dit: «C''est toi que Dieu va frapper, muraille blanchie! Tu sièges pour me juger conformément à la loi et tu violes la loi en ordonnant qu''on me frappe!» '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Puis, informé que les Juifs préparaient un complot contre lui, je te l'ai immédiatement envoyé en faisant savoir à ses accusateurs qu'ils devront porter plainte contre lui devant toi. [Adieu.]»
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Conformément à l''ordre qu''ils avaient reçu, les soldats prirent Paul et le conduisirent pendant la nuit jusqu''à Antipatris. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Le lendemain, ils laissèrent les cavaliers poursuivre la route avec lui et retournèrent à la forteresse. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Arrivés à Césarée, les cavaliers remirent la lettre au gouverneur et lui présentèrent Paul. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Après avoir lu la lettre, le gouverneur demanda de quelle province venait Paul. Apprenant qu''il était originaire de la Cilicie, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'il lui dit: «Je t''entendrai quand tes accusateurs seront venus.» Puis il ordonna de le garder dans le prétoire d''Hérode.'
  '4':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Ceux qui étaient près de lui dirent: «Tu insultes le grand-prêtre de Dieu!» '
  '5':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Paul répondit: «Frères, je ne savais pas que c''était le grand-prêtre. En effet, il est écrit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu ne parleras pas mal du chef de ton peuple.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu ne… peuple: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Exode 22.27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: »
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Sachant qu''une partie de l''assemblée était composée de sadducéens et l''autre de pharisiens, Paul s''écria dans le sanhédrin: «Mes frères, je suis pharisien, fils de pharisien. C''est à cause de l''espérance de la résurrection des morts que je suis mis en jugement.» '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Quand il eut dit cela, un débat surgit entre les pharisiens et les sadducéens, et l''assemblée se divisa. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'En effet, les sadducéens disent qu''il n''y a ni résurrection, ni ange, ni esprit, tandis que les pharisiens affirment le contraire. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Il y eut une grande clameur et les spécialistes de la loi membres du parti des pharisiens se levèrent. Ils s''engagèrent avec force dans le débat en disant: «Nous ne trouvons rien de mal chez cet homme. Et si un esprit ou un ange lui avait parlé? [Ne combattons pas contre Dieu.]» '
