document_id: PSA.88,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Lamentation dans le malheur
  - type: text
    content: Chant, psaume des descendants de Koré. Au chef de chœur, à chanter sur la flûte. Cantique d'Héman l'Ezrachite.
  '10':
  - type: text
    content: Mes yeux sont usés par la souffrance;
  - type: text
    content: tous les jours, je fais appel à toi, Eternel,
  - type: text
    content: je tends les mains vers toi.
  '11':
  - type: text
    content: Est-ce pour les morts que tu fais des miracles?
  - type: text
    content: 'Les défunts se lèvent-ils pour te louer? '
  - type: text
    content: – Pause.
  '12':
  - type: text
    content: Parle-t-on de ta bonté dans la tombe,
  - type: text
    content: de ta fidélité dans le gouffre de perdition?
  '13':
  - type: text
    content: Tes miracles sont-ils connus dans les ténèbres,
  - type: text
    content: et ta justice au pays de l'oubli?
  '14':
  - type: text
    content: Et moi, c'est toi, Eternel, que j'appelle au secours.
  - type: text
    content: Le matin, ma prière s'adresse à toi.
  '15':
  - type: text
    content: Pourquoi, Eternel, me rejettes-tu?
  - type: text
    content: Pourquoi me caches-tu ton visage?
  '16':
  - type: text
    content: Je suis malheureux et mourant depuis ma jeunesse,
  - type: text
    content: je subis tes terreurs et je suis bouleversé.
  '17':
  - type: text
    content: Tes fureurs passent sur moi,
  - type: text
    content: tes terreurs me réduisent au silence;
  '18':
  - type: text
    content: elles m'encerclent tout le jour comme de l'eau,
  - type: text
    content: elles me cernent de tous côtés.
  '19':
  - type: text
    content: Tu as éloigné mes amis et mes proches de moi;
  - type: text
    content: mes intimes, ce sont les ténèbres.
  '2':
  - type: text
    content: Eternel, Dieu de mon salut,
  - type: text
    content: jour et nuit je crie devant toi.
  '3':
  - type: text
    content: Que ma prière parvienne jusqu'à toi!
  - type: text
    content: Prête l'oreille à mes supplications,
  '4':
  - type: text
    content: car mon âme est saturée de malheurs,
  - type: text
    content: et ma vie s'approche du séjour des morts.
  '5':
  - type: text
    content: On me compte parmi ceux qui descendent dans la tombe,
  - type: text
    content: je suis comme un homme qui n'a plus de force.
  '6':
  - type: text
    content: Je suis étendu parmi les morts,
  - type: text
    content: semblable à ceux qui sont tués et couchés dans la tombe, à ceux dont tu ne te souviens plus
  - type: text
    content: et qui sont séparés de toi.
  '7':
  - type: text
    content: Tu m'as jeté dans un gouffre profond,
  - type: text
    content: dans les ténèbres, dans les abîmes.
  '8':
  - type: text
    content: Ta fureur pèse lourdement sur moi,
  - type: text
    content: 'et tu m''accables des vagues de ta colère. '
  - type: text
    content: – Pause.
  '9':
  - type: text
    content: Tu as éloigné mes intimes de moi,
  - type: text
    content: tu as fait de moi un objet d'horreur pour eux;
  - type: text
    content: je suis enfermé et je ne peux pas sortir.
