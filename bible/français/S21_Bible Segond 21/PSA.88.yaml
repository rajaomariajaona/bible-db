document_id: PSA.88,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Lamentation dans le malheur
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Chant, psaume des descendants de Koré. Au chef de chœur, à chanter sur la flûte. Cantique d'Héman l'Ezrachite.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mes yeux sont usés par la souffrance;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les jours, je fais appel à toi, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je tends les mains vers toi.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Est-ce pour les morts que tu fais des miracles?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Les défunts se lèvent-ils pour te louer? '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Parle-t-on de ta bonté dans la tombe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de ta fidélité dans le gouffre de perdition?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Tes miracles sont-ils connus dans les ténèbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ta justice au pays de l'oubli?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Et moi, c'est toi, Eternel, que j'appelle au secours.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le matin, ma prière s'adresse à toi.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Pourquoi, Eternel, me rejettes-tu?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi me caches-tu ton visage?
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Je suis malheureux et mourant depuis ma jeunesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je subis tes terreurs et je suis bouleversé.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tes fureurs passent sur moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tes terreurs me réduisent au silence;
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: elles m'encerclent tout le jour comme de l'eau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles me cernent de tous côtés.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tu as éloigné mes amis et mes proches de moi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mes intimes, ce sont les ténèbres.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Eternel, Dieu de mon salut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jour et nuit je crie devant toi.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Que ma prière parvienne jusqu'à toi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prête l'oreille à mes supplications,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: car mon âme est saturée de malheurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ma vie s'approche du séjour des morts.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: On me compte parmi ceux qui descendent dans la tombe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je suis comme un homme qui n'a plus de force.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Je suis étendu parmi les morts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: semblable à ceux qui sont tués et couchés dans la tombe, à ceux dont tu ne te souviens plus
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui sont séparés de toi.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tu m'as jeté dans un gouffre profond,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans les ténèbres, dans les abîmes.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Ta fureur pèse lourdement sur moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et tu m''accables des vagues de ta colère. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Tu as éloigné mes intimes de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu as fait de moi un objet d'horreur pour eux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je suis enfermé et je ne peux pas sortir.
