document_id: HOS.6,152
type_code: fra
verses:
  '1':
  - type: text
    content: «Venez, retournons à l'Eternel!
  - type: text
    content: En effet, il a déchiré, mais il nous guérira,
  - type: text
    content: il a frappé, mais il bandera nos plaies.
  '10':
  - type: text
    content: 'Dans la communauté d''Israël j''ai vu des choses horribles:'
  - type: text
    content: là Ephraïm se prostitue, Israël se rend impur.
  '11':
  - type: text
    content: Pour toi aussi, Juda, une moisson est préparée,
  - type: text
    content: quand je ramènerai les déportés de mon peuple.
  '2':
  - type: text
    content: Il nous rendra la vie dans deux jours,
  - type: text
    content: le troisième jour il nous relèvera
  - type: text
    content: et nous vivrons devant lui.
  '3':
  - type: text
    content: Connaissons, cherchons à connaître l'Eternel!
  - type: text
    content: Sa venue est aussi certaine que celle de l'aurore.
  - type: text
    content: Il viendra pour nous comme la pluie,
  - type: text
    content: comme la dernière pluie qui arrose la terre.»
  '4':
  - type: text
    content: Que puis-je te faire, Ephraïm?
  - type: text
    content: Que puis-je te faire, Juda?
  - type: text
    content: Votre attachement est pareil à la nuée du matin,
  - type: text
    content: à la rosée qui se dissipe très vite.
  '5':
  - type: text
    content: C'est pourquoi je les frapperai par les prophètes,
  - type: text
    content: je les tuerai par les paroles de ma bouche,
  - type: text
    content: et mes jugements éclateront comme la lumière.
  '6':
  - type: text
    content: En effet, *je prends plaisir à la bonté et non aux sacrifices
  - type: note
    content: 'Je prends… sacrifices: cité par Jésus en Matthieu 9.13; 12.7.'
  - type: text
    content: ','
  - type: text
    content: à la connaissance de Dieu plus qu'aux holocaustes.
  '7':
  - type: text
    content: Comme Adam ils ont violé l'alliance;
  - type: text
    content: c'est alors qu'ils m'ont été infidèles.
  '8':
  - type: text
    content: Galaad est une ville de fauteurs de troubles,
  - type: text
    content: elle porte des traces de sang.
  '9':
  - type: text
    content: La troupe des prêtres est comme une bande en embuscade,
  - type: text
    content: ils commettent des assassinats sur le chemin de Sichem.
  - type: text
    content: Oui, ils se livrent au crime.
