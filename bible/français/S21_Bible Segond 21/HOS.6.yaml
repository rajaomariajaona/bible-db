document_id: HOS.6,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: «Venez, retournons à l'Eternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, il a déchiré, mais il nous guérira,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a frappé, mais il bandera nos plaies.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Dans la communauté d''Israël j''ai vu des choses horribles:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: là Ephraïm se prostitue, Israël se rend impur.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Pour toi aussi, Juda, une moisson est préparée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand je ramènerai les déportés de mon peuple.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Il nous rendra la vie dans deux jours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le troisième jour il nous relèvera
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et nous vivrons devant lui.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Connaissons, cherchons à connaître l'Eternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa venue est aussi certaine que celle de l'aurore.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il viendra pour nous comme la pluie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme la dernière pluie qui arrose la terre.»
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Que puis-je te faire, Ephraïm?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que puis-je te faire, Juda?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Votre attachement est pareil à la nuée du matin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à la rosée qui se dissipe très vite.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: C'est pourquoi je les frapperai par les prophètes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je les tuerai par les paroles de ma bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mes jugements éclateront comme la lumière.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: En effet, *je prends plaisir à la bonté et non aux sacrifices
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je prends… sacrifices: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité par Jésus en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matthieu 9.13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12.7'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à la connaissance de Dieu plus qu'aux holocaustes.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Comme Adam ils ont violé l'alliance;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est alors qu'ils m'ont été infidèles.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Galaad est une ville de fauteurs de troubles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle porte des traces de sang.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: La troupe des prêtres est comme une bande en embuscade,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils commettent des assassinats sur le chemin de Sichem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, ils se livrent au crime.
