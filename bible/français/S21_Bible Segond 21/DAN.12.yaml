document_id: DAN.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Appel à la persévérance
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: »A cette époque-là se dressera Michel, le grand chef, celui qui veille sur les enfants de ton peuple. *Ce sera une période de détresse telle qu'il n'y en aura pas eu de pareille depuis qu'une nation existe jusqu'à cette époque-là.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ce sera… époque-là: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité par Jésus en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 24.21
      metadata:
        usfm: MAT.24.21
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Marc 13.19
      metadata:
        usfm: MRK.13.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' A ce moment-là, ceux de ton peuple qu''on trouvera inscrits dans le livre seront sauvés. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Beaucoup de ceux qui dorment dans la poussière de la terre se réveilleront, les uns pour la vie éternelle, les autres pour la honte, pour l''horreur éternelle. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ceux qui auront été perspicaces brilleront comme la splendeur du ciel, et ceux qui auront enseigné la justice à beaucoup brilleront comme les étoiles, pour toujours et à perpétuité. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Quant à toi, Daniel, tiens ces paroles cachées et marque le livre du sceau du secret jusqu'au moment de la fin! Beaucoup seront perplexes, mais la connaissance augmentera.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Moi, Daniel, je regardais et j''ai vu deux autres hommes se tenir debout, l''un sur une rive du fleuve, l''autre sur l''autre rive. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L''un d''eux a dit à l''homme habillé de lin, qui se tenait au-dessus de l''eau du fleuve: «Quand viendra la fin de ces événements extraordinaires?» '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et j''ai entendu l''homme habillé de lin, celui qui se tenait au-dessus de l''eau du fleuve: il a levé sa main droite et sa main gauche vers le ciel et il a juré par celui qui vit éternellement que ce serait dans un temps, deux temps et la moitié d''un temps, et que tout cela prendrait fin quand la force du peuple saint serait entièrement épuisée.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'J''ai entendu, mais sans comprendre, et j''ai dit: «Mon seigneur, quelle sera l''issue de tout cela?» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il a répondu: «Vas-y, Daniel, car ces paroles seront tenues cachées et marquées du sceau du secret jusqu''au moment de la fin. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Beaucoup seront purifiés, épurés et affinés. Les méchants feront le mal et aucun d''eux ne comprendra, tandis que ceux qui seront perspicaces comprendront. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Depuis le moment où le sacrifice perpétuel sera supprimé et où l''abominable dévastation sera dressée, il y aura 1290 jours. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Heureux celui qui attendra et qui arrivera jusqu''à 1335 jours! '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Quant à toi, marche vers ta fin! Tu te reposeras et tu seras debout pour recevoir ton héritage à la fin des jours.»
