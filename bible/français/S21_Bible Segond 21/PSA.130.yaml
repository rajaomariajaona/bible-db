document_id: PSA.130,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Attente de l'intervention de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Chant des montées.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du fond du gouffre, je fais appel à toi, Eternel!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Seigneur, écoute-moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tes oreilles soient attentives
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à mes supplications!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Si tu tenais compte de nos fautes, Eternel, Seigneur, qui pourrait subsister?
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mais le pardon se trouve auprès de toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin qu'on te craigne.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: J'espère en l'Eternel de toute mon âme
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je m'attends à sa promesse.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Je compte sur le Seigneur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: plus que les gardes n'attendent le matin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: oui, plus que les gardes n'attendent le matin.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Israël, mets ton espoir en l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c'est auprès de l'Eternel que se trouve la bonté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est auprès de lui que se trouve une généreuse libération.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: C'est lui qui rachètera Israël
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de toutes ses fautes.
