document_id: PSA.130,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Attente de l'intervention de Dieu
  - type: text
    content: Chant des montées.
  - type: text
    content: Du fond du gouffre, je fais appel à toi, Eternel!
  '2':
  - type: text
    content: Seigneur, écoute-moi!
  - type: text
    content: Que tes oreilles soient attentives
  - type: text
    content: à mes supplications!
  '3':
  - type: text
    content: Si tu tenais compte de nos fautes, Eternel, Seigneur, qui pourrait subsister?
  '4':
  - type: text
    content: Mais le pardon se trouve auprès de toi
  - type: text
    content: afin qu'on te craigne.
  '5':
  - type: text
    content: J'espère en l'Eternel de toute mon âme
  - type: text
    content: et je m'attends à sa promesse.
  '6':
  - type: text
    content: Je compte sur le Seigneur
  - type: text
    content: plus que les gardes n'attendent le matin,
  - type: text
    content: oui, plus que les gardes n'attendent le matin.
  '7':
  - type: text
    content: Israël, mets ton espoir en l'Eternel,
  - type: text
    content: car c'est auprès de l'Eternel que se trouve la bonté,
  - type: text
    content: c'est auprès de lui que se trouve une généreuse libération.
  '8':
  - type: text
    content: C'est lui qui rachètera Israël
  - type: text
    content: de toutes ses fautes.
