document_id: EZK.34
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jugement des bergers infidèles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La parole de l''Eternel m''a été adressée: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Fils de l''homme, prophétise contre les bergers d''Israël! Prophétise et dis-leur, à ces bergers: ‘Voici ce que dit le Seigneur, l''Eternel: Malheur aux bergers d''Israël qui ne prennent soin que d''eux-mêmes! N''est-ce pas des brebis que les bergers devraient prendre soin? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Vous mangez la graisse, vous vous habillez de laine, vous abattez les bêtes dodues, mais vous ne prenez pas soin des brebis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Vous n''avez pas assisté les bêtes affaiblies, vous n''avez pas soigné celle qui était malade ni pansé celle qui était blessée, vous n''avez pas ramené celle qui s''était égarée ni cherché celle qui était perdue, mais vous les avez dominées avec violence et cruauté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Elles se sont éparpillées parce qu''elles n''avaient pas de berger. Elles sont devenues la nourriture de toutes les bêtes sauvages et elles se sont éparpillées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Mes brebis sont en train d'errer sur toutes les montagnes et sur toutes les hautes collines, mes brebis sont éparpillées sur toute la surface du pays, mais personne ne s'occupe d'elles, personne ne va à leur recherche.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '»C''est pourquoi, bergers, écoutez la parole de l''Eternel! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Aussi vrai que je suis vivant, déclare le Seigneur, l''Eternel, parce que mes brebis sont devenues un butin et la nourriture de toutes les bêtes sauvages, faute de berger, parce que mes bergers ne se sont pas occupés de mes brebis, parce qu''ils ont pris soin d''eux-mêmes au lieu de prendre soin de mes brebis, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'à cause de cela, bergers, écoutez la parole de l''Eternel! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Voici ce que dit le Seigneur, l''Eternel: Je m''en prends aux bergers. Je retirerai mes brebis de leurs mains, je ne les laisserai plus prendre soin des brebis et ils ne pourront plus en profiter pour eux-mêmes. J''arracherai mes brebis de leur bouche et elles ne leur serviront plus de nourriture.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le vrai berger d'Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '»En effet, voici ce que dit le Seigneur, l''Eternel: Je m''occuperai moi-même de mes brebis, je veillerai sur elles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tout comme un berger part à la recherche de son troupeau quand il se trouve au milieu de ses brebis et qu''elles sont dispersées, je veillerai sur mes brebis et je les arracherai de tous les endroits où elles ont été éparpillées un jour de ténèbres et d''obscurité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Je les ferai sortir des divers peuples, je les rassemblerai des divers pays et je les ramènerai sur leur territoire. Je les conduirai sur les montagnes d''Israël, le long des cours d''eau et dans tous les endroits habités du pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Je les conduirai dans un bon pâturage et leur domaine se trouvera sur les hautes montagnes d''Israël. Là elles se reposeront dans un domaine agréable, et elles brouteront dans de riches pâturages sur les montagnes d''Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'C''est moi qui prendrai soin de mes brebis, c''est moi qui les ferai se reposer, déclare le Seigneur, l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: J'irai à la recherche de celle qui est perdue, je ramènerai celle qui s'est égarée, je panserai celle qui est blessée et j'assisterai celle qui est affaiblie. En revanche, je détruirai celles qui sont grasses et vigoureuses. Je veux prendre soin d'elles avec équité.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '»Quant à vous, mes brebis, voici ce que dit le Seigneur, l''Eternel: Je vais faire le tri entre les bêtes, entre les béliers et les boucs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'N''est-ce pas suffisant pour vous de brouter dans un bon pâturage? Faut-il encore que vous piétiniez l''herbe qui reste? N''est-ce pas suffisant pour vous de boire une eau limpide? Faut-il encore que vous troubliez le reste avec vos pieds? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Et mes brebis doivent brouter ce que vos pieds ont piétiné, boire ce que vos pieds ont troublé!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '»C''est pourquoi, voici ce que leur dit le Seigneur, l''Eternel: Je vais moi-même faire le tri entre la bête qui est grasse et celle qui est maigre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Puisque vous avez bousculé les autres avec le flanc et l''épaule, puisque vous avez frappé avec vos cornes toutes les brebis affaiblies, jusqu''à ce que vous les ayez chassées et éparpillées, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'je vais porter secours à mes brebis afin qu''elles ne soient plus un butin, et je vais faire le tri entre les bêtes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Je vais mettre à leur tête un seul berger – et il prendra soin d''elles – mon serviteur David. C''est lui qui prendra soin d''elles et qui sera un berger pour elles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Moi, l'Eternel, je serai leur Dieu, et mon serviteur David sera un prince au milieu d'elles. C'est moi, l'Eternel, qui ai parlé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '»Je conclurai avec elles une alliance de paix et je ferai disparaître les bêtes féroces du pays. Mes brebis habiteront en sécurité dans le désert et pourront dormir dans les forêts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Je ferai d''elles et des alentours de ma colline une source de bénédiction. J''enverrai la pluie au moment voulu. Ce seront des pluies de bénédiction. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'L''arbre des champs donnera son fruit et la terre ses récoltes, et elles vivront en sécurité sur leur territoire. Elles reconnaîtront que je suis l''Eternel, quand je briserai la domination exercée sur elles et les délivrerai de ceux qui les asservissent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Elles ne seront plus pillées par les nations et les animaux sauvages ne les mangeront plus. Elles habiteront en sécurité: il n''y aura plus personne pour les effrayer.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '»J''installerai pour elles une plantation réputée, si bien qu''elles ne seront plus emportées par la faim dans le pays et n''auront plus à supporter l''humiliation que leur font subir les nations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Elles reconnaîtront alors que moi, l''Eternel, leur Dieu, je suis avec elles, et qu''elles, la communauté d''Israël, elles sont mon peuple, déclare le Seigneur, l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Vous, mes brebis, brebis dont je suis le berger, vous êtes des hommes, et moi, je suis votre Dieu, déclare le Seigneur, l'Eternel.»
