document_id: ZEC.9,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: L'avenir messianique
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 9.1–14.21
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Venue du roi et victoire sur les nations
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Message.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La parole de l'Eternel est au pays de Hadrac,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle s'arrête sur Damas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l'Eternel a le regard sur tous les hommes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme sur toutes les tribus d'Israël.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je supprimerai les chars d'Ephraïm
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les chevaux de Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les arcs de guerre seront brisés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il annoncera la paix aux nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il dominera d'une mer à l'autre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: depuis l'Euphrate jusqu'aux extrémités de la terre.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quant à toi, à cause de ton alliance scellée par le sang,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ferai sortir tes prisonniers de la fosse où il n'y a pas d'eau.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Retournez à la forteresse, prisonniers pleins d'espérance!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aujourd'hui encore je le déclare,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te rendrai le double.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, je bande Juda comme un arc,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je m'arme d'Ephraïm comme d'une flèche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je soulèverai tes fils, Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre tes fils, Grèce.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je te rendrai pareille à l'épée d'un héros.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel apparaîtra au-dessus d'eux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sa flèche partira comme l'éclair.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Seigneur, l'Eternel, sonnera de la trompette,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il s'avancera dans l'ouragan du sud.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel, le maître de l'univers, les protégera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils dévoreront, ils écraseront les pierres de la fronde;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils boiront, ils seront bruyants comme s'ils étaient ivres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils seront pleins comme une coupe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme les angles de l'autel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Les angles de l''autel: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: où l'on versait les libations, offrandes de produits liquides.
      marker-yv: yv-n
    - type: text
      text: .
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce jour-là, l'Eternel, leur Dieu, les sauvera
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme le troupeau de son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils sont les pierres d'un diadème,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils brilleront dans son pays.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh! quel est son bonheur! Quelle est sa beauté!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le blé fera prospérer les jeunes gens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le vin nouveau les jeunes filles.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle s'arrête aussi sur Hamath, à la frontière de Damas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur Tyr et Sidon, avec toute leur sagesse.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tyr s'est construit une forteresse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle a amassé l'argent comme la poussière
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'or comme la boue des rues,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le Seigneur s'en emparera.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il précipitera sa puissance dans la mer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et elle sera dévorée par le feu.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Askalon le verra, et elle aura peur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Gaza aussi, et elle se tordra de douleur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi qu'Ekron, car son appui fera sa honte.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le roi disparaîtra de Gaza,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Askalon ne sera plus habitée.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un bâtard s'établira dans Asdod,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j'abattrai l'orgueil des Philistins.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'arracherai le sang de sa bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les plats abominables de ses dents;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lui aussi sera un reste pour notre Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il sera pareil à un chef en Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ekron sera pareil à un Jébusien
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jébusien: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nom des anciens habitants de Jérusalem.
      marker-yv: yv-n
    - type: text
      text: .
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je camperai autour de ma maison pour la défendre contre une armée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre ceux qui passent et repassent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'oppresseur ne viendra plus vers eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car maintenant j'ai le regard sur elle.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Réjouis-toi, fille de Sion!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lance des acclamations, fille de Jérusalem!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*Voici ton roi qui vient à toi;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est juste et victorieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est humble et monté sur un âne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur un ânon, le petit d'une ânesse.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Voici ton roi… ânesse: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité partiellement en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matthieu 21.5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jean 12.15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' à propos de l''entrée triomphale de Jésus à Jérusalem.'
      marker-yv: yv-n
