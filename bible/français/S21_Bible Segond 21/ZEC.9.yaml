document_id: ZEC.9,152
type_code: fra
verses:
  '1':
  - type: heading
    content: L'avenir messianique
  - type: heading
    content: 9.1–14.21
  - type: heading
    content: Venue du roi et victoire sur les nations
  - type: text
    content: Message.
  - type: text
    content: La parole de l'Eternel est au pays de Hadrac,
  - type: text
    content: elle s'arrête sur Damas,
  - type: text
    content: car l'Eternel a le regard sur tous les hommes
  - type: text
    content: comme sur toutes les tribus d'Israël.
  '10':
  - type: text
    content: Je supprimerai les chars d'Ephraïm
  - type: text
    content: et les chevaux de Jérusalem,
  - type: text
    content: les arcs de guerre seront brisés.
  - type: text
    content: Il annoncera la paix aux nations,
  - type: text
    content: et il dominera d'une mer à l'autre,
  - type: text
    content: depuis l'Euphrate jusqu'aux extrémités de la terre.
  '11':
  - type: text
    content: Quant à toi, à cause de ton alliance scellée par le sang,
  - type: text
    content: je ferai sortir tes prisonniers de la fosse où il n'y a pas d'eau.
  '12':
  - type: text
    content: Retournez à la forteresse, prisonniers pleins d'espérance!
  - type: text
    content: Aujourd'hui encore je le déclare,
  - type: text
    content: je te rendrai le double.
  '13':
  - type: text
    content: En effet, je bande Juda comme un arc,
  - type: text
    content: je m'arme d'Ephraïm comme d'une flèche,
  - type: text
    content: et je soulèverai tes fils, Sion,
  - type: text
    content: contre tes fils, Grèce.
  - type: text
    content: Je te rendrai pareille à l'épée d'un héros.
  '14':
  - type: text
    content: L'Eternel apparaîtra au-dessus d'eux
  - type: text
    content: et sa flèche partira comme l'éclair.
  - type: text
    content: Le Seigneur, l'Eternel, sonnera de la trompette,
  - type: text
    content: il s'avancera dans l'ouragan du sud.
  '15':
  - type: text
    content: L'Eternel, le maître de l'univers, les protégera,
  - type: text
    content: ils dévoreront, ils écraseront les pierres de la fronde;
  - type: text
    content: ils boiront, ils seront bruyants comme s'ils étaient ivres,
  - type: text
    content: ils seront pleins comme une coupe,
  - type: text
    content: comme les angles de l'autel
  - type: note
    content: 'Les angles de l''autel: où l''on versait les libations, offrandes de produits liquides.'
  - type: text
    content: .
  '16':
  - type: text
    content: Ce jour-là, l'Eternel, leur Dieu, les sauvera
  - type: text
    content: comme le troupeau de son peuple,
  - type: text
    content: car ils sont les pierres d'un diadème,
  - type: text
    content: ils brilleront dans son pays.
  '17':
  - type: text
    content: Oh! quel est son bonheur! Quelle est sa beauté!
  - type: text
    content: Le blé fera prospérer les jeunes gens,
  - type: text
    content: et le vin nouveau les jeunes filles.
  '2':
  - type: text
    content: Elle s'arrête aussi sur Hamath, à la frontière de Damas,
  - type: text
    content: sur Tyr et Sidon, avec toute leur sagesse.
  '3':
  - type: text
    content: Tyr s'est construit une forteresse.
  - type: text
    content: Elle a amassé l'argent comme la poussière
  - type: text
    content: et l'or comme la boue des rues,
  '4':
  - type: text
    content: mais le Seigneur s'en emparera.
  - type: text
    content: Il précipitera sa puissance dans la mer,
  - type: text
    content: et elle sera dévorée par le feu.
  '5':
  - type: text
    content: Askalon le verra, et elle aura peur,
  - type: text
    content: Gaza aussi, et elle se tordra de douleur,
  - type: text
    content: ainsi qu'Ekron, car son appui fera sa honte.
  - type: text
    content: Le roi disparaîtra de Gaza,
  - type: text
    content: et Askalon ne sera plus habitée.
  '6':
  - type: text
    content: Un bâtard s'établira dans Asdod,
  - type: text
    content: et j'abattrai l'orgueil des Philistins.
  '7':
  - type: text
    content: J'arracherai le sang de sa bouche,
  - type: text
    content: les plats abominables de ses dents;
  - type: text
    content: lui aussi sera un reste pour notre Dieu,
  - type: text
    content: il sera pareil à un chef en Juda,
  - type: text
    content: Ekron sera pareil à un Jébusien
  - type: note
    content: 'Jébusien: nom des anciens habitants de Jérusalem.'
  - type: text
    content: .
  '8':
  - type: text
    content: Je camperai autour de ma maison pour la défendre contre une armée,
  - type: text
    content: contre ceux qui passent et repassent,
  - type: text
    content: et l'oppresseur ne viendra plus vers eux,
  - type: text
    content: car maintenant j'ai le regard sur elle.
  '9':
  - type: text
    content: Réjouis-toi, fille de Sion!
  - type: text
    content: Lance des acclamations, fille de Jérusalem!
  - type: text
    content: '*Voici ton roi qui vient à toi;'
  - type: text
    content: il est juste et victorieux,
  - type: text
    content: il est humble et monté sur un âne,
  - type: text
    content: sur un ânon, le petit d'une ânesse.
  - type: note
    content: 'Voici ton roi… ânesse: cité partiellement en Matthieu 21.5 et Jean 12.15 à propos de l''entrée triomphale de Jésus à Jérusalem.'
