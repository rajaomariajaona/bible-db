document_id: 1TI.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Qualifications des responsables de l'Eglise
  - type: text
    content: 'Cette parole est certaine: si quelqu''un aspire à la charge de responsable, c''est une belle tâche qu''il désire. '
  '10':
  - type: text
    content: 'Qu''on les mette d''abord à l''épreuve et qu''ils exercent ensuite leur ministère, s''ils sont sans reproche. '
  '11':
  - type: text
    content: 'De même, les femmes doivent être respectables, non médisantes, sobres, fidèles en tout. '
  '12':
  - type: text
    content: 'Les diacres doivent être fidèles à leur femme et bien diriger leurs enfants et leur propre maison. '
  '13':
  - type: text
    content: En effet, ceux qui ont bien rempli leur service gagnent l'estime de tous et une grande assurance dans la foi en Jésus-Christ.
  - type: heading
    content: Ep 2.19-22 (Jn 1.1, 14; Rm 1.4; 16.25-26)
  '14':
  - type: text
    content: 'Je t''écris cela avec l''espoir de te rejoindre bientôt. '
  '15':
  - type: text
    content: 'Cependant, si j''ai du retard, tu sauras ainsi comment il faut se conduire dans la maison de Dieu qui est l''Eglise du Dieu vivant, pilier et soutien de la vérité. '
  '16':
  - type: text
    content: 'Et tous le reconnaissent, le mystère de la piété est grand: Dieu est apparu comme un homme, sa justice a été révélée par l''Esprit, il a été vu des anges, proclamé parmi les nations, on a cru en lui dans le monde, il a été élevé dans la gloire.'
  '2':
  - type: text
    content: 'Il faut donc que le responsable soit irréprochable, fidèle à sa femme, sobre, réfléchi, réglé dans sa conduite, hospitalier, capable d''enseigner. '
  '3':
  - type: text
    content: 'Il ne doit pas être buveur, violent [ni attiré par le gain], mais au contraire doux, pacifique et désintéressé. '
  '4':
  - type: text
    content: 'Il faut qu''il dirige bien sa propre maison et qu''il tienne ses enfants dans la soumission et un entier respect. '
  '5':
  - type: text
    content: 'En effet, si quelqu''un ne sait pas diriger sa propre maison, comment prendra-t-il soin de l''Eglise de Dieu? '
  '6':
  - type: text
    content: 'Il ne doit pas non plus être un nouveau converti, de peur qu''aveuglé par l''orgueil il ne tombe sous le même jugement que le diable. '
  '7':
  - type: text
    content: Il faut enfin qu'il reçoive un bon témoignage de la part des gens de l'extérieur, afin de ne pas tomber dans le discrédit et dans les pièges du diable.
  '8':
  - type: text
    content: 'Les diacres eux aussi doivent être respectables, n''avoir qu''une parole et ne pas s''adonner à la boisson ni être attirés par le gain. '
  '9':
  - type: text
    content: Ils doivent garder le mystère
  - type: note
    content: 'Le mystère: terme tiré du vocabulaire religieux des Grecs, qui désigne dans le Nouveau Testament la vérité ou l''action de Dieu tenue cachée pendant des siècles pour être enfin portée à la connaissance de tous.'
  - type: text
    content: ' de la foi avec une conscience pure. '
