document_id: 1TI.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Qualifications des responsables de l'Eglise
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Cette parole est certaine: si quelqu''un aspire à la charge de responsable, c''est une belle tâche qu''il désire. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il faut donc que le responsable soit irréprochable, fidèle à sa femme, sobre, réfléchi, réglé dans sa conduite, hospitalier, capable d''enseigner. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il ne doit pas être buveur, violent [ni attiré par le gain], mais au contraire doux, pacifique et désintéressé. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il faut qu''il dirige bien sa propre maison et qu''il tienne ses enfants dans la soumission et un entier respect. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'En effet, si quelqu''un ne sait pas diriger sa propre maison, comment prendra-t-il soin de l''Eglise de Dieu? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il ne doit pas non plus être un nouveau converti, de peur qu''aveuglé par l''orgueil il ne tombe sous le même jugement que le diable. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il faut enfin qu'il reçoive un bon témoignage de la part des gens de l'extérieur, afin de ne pas tomber dans le discrédit et dans les pièges du diable.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les diacres eux aussi doivent être respectables, n''avoir qu''une parole et ne pas s''adonner à la boisson ni être attirés par le gain. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ils doivent garder le mystère
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le mystère: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: terme tiré du vocabulaire religieux des Grecs, qui désigne dans le Nouveau Testament la vérité ou l'action de Dieu tenue cachée pendant des siècles pour être enfin portée à la connaissance de tous.
    marker-yv: yv-n
  - type: text
    text: ' de la foi avec une conscience pure. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Qu''on les mette d''abord à l''épreuve et qu''ils exercent ensuite leur ministère, s''ils sont sans reproche. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'De même, les femmes doivent être respectables, non médisantes, sobres, fidèles en tout. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les diacres doivent être fidèles à leur femme et bien diriger leurs enfants et leur propre maison. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: En effet, ceux qui ont bien rempli leur service gagnent l'estime de tous et une grande assurance dans la foi en Jésus-Christ.
- type: usfm
  marker: r
  children:
  - type: text
    text: Ep 2.19-22 (Jn 1.1, 14; Rm 1.4; 16.25-26)
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Je t''écris cela avec l''espoir de te rejoindre bientôt. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Cependant, si j''ai du retard, tu sauras ainsi comment il faut se conduire dans la maison de Dieu qui est l''Eglise du Dieu vivant, pilier et soutien de la vérité. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et tous le reconnaissent, le mystère de la piété est grand: Dieu est apparu comme un homme, sa justice a été révélée par l''Esprit, il a été vu des anges, proclamé parmi les nations, on a cru en lui dans le monde, il a été élevé dans la gloire.'
