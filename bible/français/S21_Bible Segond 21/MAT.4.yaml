document_id: MAT.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tentation de Jésus-Christ
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Puis Jésus fut emmené par l''Esprit dans le désert pour être tenté par le diable. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Après avoir jeûné 40 jours et 40 nuits, il eut faim. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le tentateur s''approcha et lui dit: «Si tu es le Fils de Dieu, ordonne que ces pierres deviennent des pains.» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jésus répondit: «Il est écrit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: L'homme ne vivra pas de pain seulement, mais de toute parole qui sort de la bouche de Dieu
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''homme… de Dieu: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 8.3
      metadata:
        usfm: DEU.8.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le diable le transporta alors dans la ville sainte, le plaça au sommet du temple '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'et lui dit: «Si tu es le Fils de Dieu, jette-toi en bas! En effet, il est écrit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Il donnera des ordres à ses anges à ton sujet et ils te porteront sur les mains, de peur que ton pied ne heurte une pierre
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il donnera… pierre: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 91.11-12
      metadata:
        usfm: PSA.91.11+PSA.91.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '» '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jésus lui dit: «Il est aussi écrit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu ne provoqueras pas le Seigneur, ton Dieu
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu ne… ton Dieu: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 6.16
      metadata:
        usfm: DEU.6.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: »
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le diable le transporta encore sur une montagne très élevée, lui montra tous les royaumes du monde et leur gloire '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'et lui dit: «Je te donnerai tout cela, si tu te prosternes pour m''adorer.» '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jésus lui dit alors: «Retire-toi, Satan! En effet, il est écrit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: C'est le Seigneur, ton Dieu, que tu adoreras et c'est lui seul que tu serviras
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'C''est le… serviras: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 6.13
      metadata:
        usfm: DEU.6.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '» '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Alors le diable le laissa. Et voici que des anges s'approchèrent de Jésus et le servirent.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Début du ministère de Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Lorsqu''il apprit que Jean avait été arrêté, Jésus se retira en Galilée. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il quitta Nazareth et vint habiter à Capernaüm, ville située près du lac, dans le territoire de Zabulon et de Nephthali, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'afin que s''accomplisse ce qu''avait annoncé le prophète Esaïe: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Territoire de Zabulon et de Nephthali, route de la mer, région située de l'autre côté du Jourdain, Galilée à la population étrangère!
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Le peuple assis dans les ténèbres a vu une grande lumière, et sur ceux qui se trouvaient dans le pays de l'ombre de la mort une lumière s'est levée
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.15-16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Territoire… levée: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: text
      text: Esaïe 8.23–9.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dès ce moment, Jésus commença à prêcher et à dire: «Changez d''attitude, car le royaume des cieux est proche.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Comme il marchait le long du lac de Galilée, il vit deux frères, Simon, appelé Pierre, et son frère André, qui jetaient un filet dans le lac; c''étaient en effet des pêcheurs. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il leur dit: «Suivez-moi et je ferai de vous des pêcheurs d''hommes.» '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Aussitôt, ils laissèrent les filets et le suivirent. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il alla plus loin et vit deux autres frères, Jacques, fils de Zébédée, et son frère Jean, qui étaient dans une barque avec leur père Zébédée et qui réparaient leurs filets. Il les appela, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: et aussitôt ils laissèrent la barque et leur père et le suivirent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Jésus parcourait toute la Galilée; il enseignait dans les synagogues
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Synagogues: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: lieux de rencontre fréquentés par les Juifs, le sabbat et les jours de fête, pour prier et pour entendre la lecture et l'explication des livres de l'Ancien Testament. Tout membre mâle de l'assistance pouvait être invité à prendre la parole.
    marker-yv: yv-n
  - type: text
    text: ', proclamait la bonne nouvelle du royaume et guérissait toute maladie et toute infirmité parmi le peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Sa réputation gagna toute la Syrie et on lui amenait tous ceux qui souffraient de maladies et de douleurs de divers genres, des démoniaques, des épileptiques, des paralysés; et il les guérissait. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: De grandes foules le suivirent, venues de la Galilée, de la Décapole, de Jérusalem, de la Judée et de l'autre côté du Jourdain.
