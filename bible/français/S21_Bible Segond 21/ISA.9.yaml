document_id: ISA.9
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Le peuple qui marchait dans les ténèbres
- type: usfm
  marker: q1
  children:
  - type: text
    text: a vu une grande lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur ceux qui habitaient le pays de l'ombre de la mort
- type: usfm
  marker: q1
  children:
  - type: text
    text: une lumière a brillé.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.23–9.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le territoire… brillé: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 4.15-16
      metadata:
        usfm: MAT.4.15+MAT.4.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' à propos du ministère de Jésus en Galilée, région du nord d''Israël depuis toujours caractérisée par un mélange de populations, et partiellement en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luc 1.79
      metadata:
        usfm: LUK.1.79
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tu rends la nation nombreuse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu augmentes sa joie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle se réjouit devant toi comme on le fait lors de la moisson,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme on jubile au partage du butin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: En effet, le fardeau qui pesait sur elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le gourdin qui frappait son dos,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le bâton de celui qui l'opprimait,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu les brises comme tu l'as fait lors de la victoire sur Madian.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Oui, toute chaussure portée dans la bataille
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tout habit roulé dans le sang
- type: usfm
  marker: q1
  children:
  - type: text
    text: seront livrés aux flammes
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour être réduits en cendres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: En effet, un enfant nous est né, un fils nous a été donné,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la souveraineté reposera sur son épaule;
- type: usfm
  marker: q1
  children:
  - type: text
    text: on l'appellera merveilleux conseiller, Dieu puissant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Père éternel, Prince de la paix.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Etendre la souveraineté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: donner une paix sans fin au trône de David et à son royaume,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'affermir et le soutenir par le droit et par la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'dès maintenant et pour toujours:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: voilà ce que fera le zèle de l'Eternel, le maître de l'univers.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jugement d'Israël et de Juda
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le Seigneur envoie une parole contre Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et elle tombe sur Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le peuple tout entier en aura connaissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ephraïm et les habitants de Samarie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'eux qui disent avec orgueil et arrogance:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: «Des briques sont tombées?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous construirons en pierres de taille.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Des sycomores ont été coupés?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous les remplacerons par des cèdres.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: L'Eternel fait alors triompher contre eux les ennemis de Retsin
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et arme leurs ennemis:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: les Syriens à l'est, les Philistins à l'ouest.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils dévorent Israël à pleine bouche.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais malgré tout cela, sa colère ne se détourne pas
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa puissance est encore déployée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: C'est que le peuple ne revient pas à celui qui le frappe
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne recherche pas l'Eternel, le maître de l'univers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Aussi l'Eternel arrachera-t-il d'Israël la tête et la queue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la branche de palmier et le roseau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout cela le même jour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: – L'ancien et le magistrat, c'est la tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le prophète qui propage le mensonge, c'est la queue. –
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Les conducteurs de ce peuple l'égarent
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ceux qui se laissent conduire par eux se perdent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: C'est pourquoi le Seigneur ne peut se réjouir en pensant à ses jeunes gens
- type: usfm
  marker: q1
  children:
  - type: text
    text: et n'aura pas pitié de leurs orphelins et de leurs veuves.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, tous sont des impies et des méchants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toutes les bouches ne savent que proférer des absurdités.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais malgré tout cela, sa colère ne se détourne pas
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa puissance est encore déployée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: En effet, la méchanceté brûle comme un feu
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui dévore ronces et buissons épineux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle embrase les buissons de la forêt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: d'où s'élèvent des colonnes de fumée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: C'est à cause de la colère de l'Eternel, le maître de l'univers, que le pays est embrasé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et le peuple alimente lui-même ce feu:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: personne n'épargne son frère;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: on pille à droite, mais on a encore faim;
- type: usfm
  marker: q1
  children:
  - type: text
    text: on dévore à gauche, mais on n'est pas rassasié;
- type: usfm
  marker: q1
  children:
  - type: text
    text: chacun se met à manger son propre bras.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Manassé dévore Ephraïm, Ephraïm Manassé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ensemble ils fondent sur Juda.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mais malgré tout cela, sa colère ne se détourne pas
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa puissance est encore déployée.
