document_id: ISA.9,152
type_code: fra
verses:
  '1':
  - type: text
    content: Le peuple qui marchait dans les ténèbres
  - type: text
    content: a vu une grande lumière,
  - type: text
    content: sur ceux qui habitaient le pays de l'ombre de la mort
  - type: text
    content: une lumière a brillé.
  - type: note
    content: 'Le territoire… brillé: cité en Matthieu 4.15-16 à propos du ministère de Jésus en Galilée, région du nord d''Israël depuis toujours caractérisée par un mélange de populations, et partiellement en Luc 1.79.'
  '10':
  - type: text
    content: L'Eternel fait alors triompher contre eux les ennemis de Retsin
  - type: text
    content: 'et arme leurs ennemis:'
  '11':
  - type: text
    content: les Syriens à l'est, les Philistins à l'ouest.
  - type: text
    content: Ils dévorent Israël à pleine bouche.
  - type: text
    content: Mais malgré tout cela, sa colère ne se détourne pas
  - type: text
    content: et sa puissance est encore déployée.
  '12':
  - type: text
    content: C'est que le peuple ne revient pas à celui qui le frappe
  - type: text
    content: et ne recherche pas l'Eternel, le maître de l'univers.
  '13':
  - type: text
    content: Aussi l'Eternel arrachera-t-il d'Israël la tête et la queue,
  - type: text
    content: la branche de palmier et le roseau,
  - type: text
    content: tout cela le même jour.
  '14':
  - type: text
    content: – L'ancien et le magistrat, c'est la tête,
  - type: text
    content: et le prophète qui propage le mensonge, c'est la queue. –
  '15':
  - type: text
    content: Les conducteurs de ce peuple l'égarent
  - type: text
    content: et ceux qui se laissent conduire par eux se perdent.
  '16':
  - type: text
    content: C'est pourquoi le Seigneur ne peut se réjouir en pensant à ses jeunes gens
  - type: text
    content: et n'aura pas pitié de leurs orphelins et de leurs veuves.
  - type: text
    content: En effet, tous sont des impies et des méchants,
  - type: text
    content: et toutes les bouches ne savent que proférer des absurdités.
  - type: text
    content: Mais malgré tout cela, sa colère ne se détourne pas
  - type: text
    content: et sa puissance est encore déployée.
  '17':
  - type: text
    content: En effet, la méchanceté brûle comme un feu
  - type: text
    content: qui dévore ronces et buissons épineux;
  - type: text
    content: elle embrase les buissons de la forêt,
  - type: text
    content: d'où s'élèvent des colonnes de fumée.
  '18':
  - type: text
    content: C'est à cause de la colère de l'Eternel, le maître de l'univers, que le pays est embrasé,
  - type: text
    content: 'et le peuple alimente lui-même ce feu:'
  - type: text
    content: personne n'épargne son frère;
  '19':
  - type: text
    content: on pille à droite, mais on a encore faim;
  - type: text
    content: on dévore à gauche, mais on n'est pas rassasié;
  - type: text
    content: chacun se met à manger son propre bras.
  '2':
  - type: text
    content: Tu rends la nation nombreuse,
  - type: text
    content: tu augmentes sa joie;
  - type: text
    content: elle se réjouit devant toi comme on le fait lors de la moisson,
  - type: text
    content: comme on jubile au partage du butin.
  '20':
  - type: text
    content: Manassé dévore Ephraïm, Ephraïm Manassé,
  - type: text
    content: et ensemble ils fondent sur Juda.
  - type: text
    content: Mais malgré tout cela, sa colère ne se détourne pas
  - type: text
    content: et sa puissance est encore déployée.
  '3':
  - type: text
    content: En effet, le fardeau qui pesait sur elle,
  - type: text
    content: le gourdin qui frappait son dos,
  - type: text
    content: le bâton de celui qui l'opprimait,
  - type: text
    content: tu les brises comme tu l'as fait lors de la victoire sur Madian.
  '4':
  - type: text
    content: Oui, toute chaussure portée dans la bataille
  - type: text
    content: et tout habit roulé dans le sang
  - type: text
    content: seront livrés aux flammes
  - type: text
    content: pour être réduits en cendres.
  '5':
  - type: text
    content: En effet, un enfant nous est né, un fils nous a été donné,
  - type: text
    content: et la souveraineté reposera sur son épaule;
  - type: text
    content: on l'appellera merveilleux conseiller, Dieu puissant,
  - type: text
    content: Père éternel, Prince de la paix.
  '6':
  - type: text
    content: Etendre la souveraineté,
  - type: text
    content: donner une paix sans fin au trône de David et à son royaume,
  - type: text
    content: l'affermir et le soutenir par le droit et par la justice,
  - type: text
    content: 'dès maintenant et pour toujours:'
  - type: text
    content: voilà ce que fera le zèle de l'Eternel, le maître de l'univers.
  - type: heading
    content: Jugement d'Israël et de Juda
  '7':
  - type: text
    content: Le Seigneur envoie une parole contre Jacob,
  - type: text
    content: et elle tombe sur Israël.
  '8':
  - type: text
    content: Le peuple tout entier en aura connaissance,
  - type: text
    content: Ephraïm et les habitants de Samarie,
  - type: text
    content: 'eux qui disent avec orgueil et arrogance:'
  '9':
  - type: text
    content: «Des briques sont tombées?
  - type: text
    content: Nous construirons en pierres de taille.
  - type: text
    content: Des sycomores ont été coupés?
  - type: text
    content: Nous les remplacerons par des cèdres.»
