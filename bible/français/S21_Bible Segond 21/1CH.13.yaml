document_id: 1CH.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dépôt de l'arche chez Obed-Edom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'David tint conseil avec les chefs de milliers et de centaines, avec tous les princes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'puis il dit à toute l''assemblée d''Israël: «Si vous le trouvez bon et si cela vient de l''Eternel, notre Dieu, envoyons partout des messagers vers nos autres frères, dans toutes les régions d''Israël, ainsi que vers les prêtres et les Lévites dans leurs villes et les territoires attenants, afin qu''ils se joignent à nous, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'et ramenons vers nous l''arche de notre Dieu, car nous ne nous en sommes pas occupés à l''époque de Saül.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Toute l'assemblée décida d'agir de cette manière, car cela parut juste à tout le peuple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'David rassembla tout Israël, depuis le Shichor, le fleuve d''Egypte, jusqu''à l''entrée de Hamath, pour faire venir de Kirjath-Jearim l''arche de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Puis, avec tout Israël, il monta à Baala, c''est-à-dire Kirjath-Jearim, qui appartient à Juda, pour faire monter de là l''arche de Dieu, à laquelle est associé le nom de l''Eternel qui siège entre les chérubins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils mirent ce coffre de Dieu sur un char neuf et l''emportèrent depuis la maison d''Abinadab. C''étaient Uzza et Achjo qui conduisaient le char. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: David et tout Israël dansaient de toute leur force devant Dieu en chantant et en jouant de la harpe, du luth, du tambourin, des cymbales et de la trompette.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Lorsqu''ils furent arrivés à l''aire de battage de Kidon, Uzza tendit la main pour retenir l''arche, parce que les bœufs la faisaient pencher. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'La colère de l''Eternel s''enflamma contre lui et l''Eternel le frappa parce qu''il avait porté la main sur l''arche. Uzza mourut là, devant Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'David fut troublé de ce que l''Eternel avait infligé une telle punition à Uzza et cet endroit a été appelé jusqu''à aujourd''hui Pérets-Uzza. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'David eut peur de Dieu, ce jour-là, et il se dit: «Comment pourrais-je faire entrer chez moi l''arche de Dieu?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'David ne prit pas l''arche chez lui, dans la ville de David, et il la fit conduire dans la maison d''Obed-Edom, un homme de Gath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: L'arche de Dieu resta 3 mois dans la maison d'Obed-Edom, chez lui, et l'Eternel bénit sa famille ainsi que tout ce qui lui appartenait.
