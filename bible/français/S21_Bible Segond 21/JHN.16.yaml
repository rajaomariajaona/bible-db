document_id: JHN.16
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Je vous ai dit cela afin que vous ne trébuchiez pas. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'On vous exclura des synagogues, et même l''heure vient où tous ceux qui vous feront mourir croiront offrir un culte à Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ils agiront ainsi parce qu'ils n'ont connu ni le Père ni moi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '»Je vous ai dit cela afin que, l''heure venue, vous vous souveniez que je vous l''ai dit. Je ne vous en ai pas parlé dès le début parce que j''étais avec vous. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Maintenant je m''en vais vers celui qui m''a envoyé et aucun de vous ne me demande: ‘Où vas-tu?’ '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Mais parce que je vous ai parlé ainsi, la tristesse a rempli votre cœur. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Cependant, je vous dis la vérité: il vaut mieux pour vous que je m''en aille. En effet, si je ne m''en vais pas, le défenseur ne viendra pas vers vous; mais, si je m''en vais, je vous l''enverrai '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'et, quand il sera venu, il convaincra le monde en ce qui concerne le péché, la justice et le jugement: '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'en ce qui concerne le péché, parce qu''ils ne croient pas en moi; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'la justice, parce que je vais auprès de mon Père et que vous ne me verrez plus; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: le jugement, parce que le prince de ce monde est jugé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '»J''ai encore beaucoup de choses à vous dire, mais vous ne pouvez pas les supporter maintenant. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quand le défenseur sera venu, l''Esprit de la vérité, il vous conduira dans toute la vérité, car il ne parlera pas de lui-même, mais il dira tout ce qu''il aura entendu et vous annoncera les choses à venir. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il révélera ma gloire parce qu''il prendra de ce qui est à moi et vous l''annoncera. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tout ce que le Père possède est aussi à moi; voilà pourquoi j''ai dit qu''il prend de ce qui est à moi et qu''il vous l''annoncera. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Encore un peu de temps et vous ne me verrez plus, et puis encore un peu de temps et vous me reverrez, [parce que je vais auprès du Père].»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors quelques-uns de ses disciples se dirent entre eux: «Que veut-il nous dire par: ‘Encore un peu de temps et vous ne me verrez plus, et puis encore un peu de temps et vous me reverrez’ et: ‘Parce que je vais auprès du Père’?» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils disaient donc: «Que signifie ce qu''il dit: ‘Encore un peu de temps’? Nous ne savons pas de quoi il parle.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jésus comprit qu''ils voulaient l''interroger et il leur dit: «Vous vous interrogez les uns les autres sur ce que j''ai dit: ‘Encore un peu de temps et vous ne me verrez plus, et puis encore un peu de temps et vous me reverrez.’ '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'En vérité, en vérité, je vous le dis, vous pleurerez et vous vous lamenterez, tandis que le monde se réjouira; vous serez dans la tristesse, mais votre tristesse se changera en joie. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Lorsqu''une femme accouche, elle éprouve de la tristesse parce que son heure de souffrance est venue, mais, lorsqu''elle a donné le jour à l''enfant, elle ne se souvient plus de la douleur à cause de sa joie d''avoir mis un enfant au monde. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Vous donc aussi, vous êtes maintenant dans la tristesse, mais je vous reverrai et votre cœur se réjouira, et votre joie, personne ne vous l''enlèvera. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ce jour-là, vous ne m''interrogerez plus sur rien. En vérité, en vérité, je vous le dis, [tout] ce que vous demanderez au Père en mon nom, il vous le donnera. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Jusqu'à présent, vous n'avez rien demandé en mon nom. Demandez et vous recevrez, afin que votre joie soit complète.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '»Je vous ai parlé en paraboles. L''heure vient où je ne vous parlerai plus en paraboles, mais où je vous parlerai ouvertement du Père. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ce jour-là, vous demanderez en mon nom, et je ne vous dis pas que je prierai le Père pour vous. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'En effet, le Père lui-même vous aime parce que vous m''avez aimé et que vous avez cru que je suis sorti de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Je suis sorti du Père et je suis venu dans le monde; maintenant je quitte le monde et je retourne vers le Père.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ses disciples lui dirent: «Vois! Maintenant tu parles ouvertement et tu n''emploies aucune parabole. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Maintenant nous savons que tu sais tout et que tu n''as pas besoin qu''on t''interroge; c''est pourquoi nous croyons que tu es sorti de Dieu.» '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Jésus leur répondit: «Vous croyez juste maintenant? '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Voici que l''heure vient, et elle est [déjà] venue, où vous serez dispersés chacun de votre côté et me laisserez seul. Cependant, je ne suis pas seul, car le Père est avec moi. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Je vous ai dit cela afin que vous ayez la paix en moi. Vous aurez à souffrir dans le monde, mais prenez courage: moi, j''ai vaincu le monde.»'
