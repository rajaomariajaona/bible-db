document_id: JHN.16,152
type_code: fra
verses:
  '1':
  - type: text
    content: '»Je vous ai dit cela afin que vous ne trébuchiez pas. '
  '10':
  - type: text
    content: 'la justice, parce que je vais auprès de mon Père et que vous ne me verrez plus; '
  '11':
  - type: text
    content: le jugement, parce que le prince de ce monde est jugé.
  '12':
  - type: text
    content: '»J''ai encore beaucoup de choses à vous dire, mais vous ne pouvez pas les supporter maintenant. '
  '13':
  - type: text
    content: 'Quand le défenseur sera venu, l''Esprit de la vérité, il vous conduira dans toute la vérité, car il ne parlera pas de lui-même, mais il dira tout ce qu''il aura entendu et vous annoncera les choses à venir. '
  '14':
  - type: text
    content: 'Il révélera ma gloire parce qu''il prendra de ce qui est à moi et vous l''annoncera. '
  '15':
  - type: text
    content: 'Tout ce que le Père possède est aussi à moi; voilà pourquoi j''ai dit qu''il prend de ce qui est à moi et qu''il vous l''annoncera. '
  '16':
  - type: text
    content: Encore un peu de temps et vous ne me verrez plus, et puis encore un peu de temps et vous me reverrez, [parce que je vais auprès du Père].»
  '17':
  - type: text
    content: 'Alors quelques-uns de ses disciples se dirent entre eux: «Que veut-il nous dire par: ‘Encore un peu de temps et vous ne me verrez plus, et puis encore un peu de temps et vous me reverrez’ et: ‘Parce que je vais auprès du Père’?» '
  '18':
  - type: text
    content: 'Ils disaient donc: «Que signifie ce qu''il dit: ‘Encore un peu de temps’? Nous ne savons pas de quoi il parle.»'
  '19':
  - type: text
    content: 'Jésus comprit qu''ils voulaient l''interroger et il leur dit: «Vous vous interrogez les uns les autres sur ce que j''ai dit: ‘Encore un peu de temps et vous ne me verrez plus, et puis encore un peu de temps et vous me reverrez.’ '
  '2':
  - type: text
    content: 'On vous exclura des synagogues, et même l''heure vient où tous ceux qui vous feront mourir croiront offrir un culte à Dieu. '
  '20':
  - type: text
    content: 'En vérité, en vérité, je vous le dis, vous pleurerez et vous vous lamenterez, tandis que le monde se réjouira; vous serez dans la tristesse, mais votre tristesse se changera en joie. '
  '21':
  - type: text
    content: 'Lorsqu''une femme accouche, elle éprouve de la tristesse parce que son heure de souffrance est venue, mais, lorsqu''elle a donné le jour à l''enfant, elle ne se souvient plus de la douleur à cause de sa joie d''avoir mis un enfant au monde. '
  '22':
  - type: text
    content: 'Vous donc aussi, vous êtes maintenant dans la tristesse, mais je vous reverrai et votre cœur se réjouira, et votre joie, personne ne vous l''enlèvera. '
  '23':
  - type: text
    content: 'Ce jour-là, vous ne m''interrogerez plus sur rien. En vérité, en vérité, je vous le dis, [tout] ce que vous demanderez au Père en mon nom, il vous le donnera. '
  '24':
  - type: text
    content: Jusqu'à présent, vous n'avez rien demandé en mon nom. Demandez et vous recevrez, afin que votre joie soit complète.
  '25':
  - type: text
    content: '»Je vous ai parlé en paraboles. L''heure vient où je ne vous parlerai plus en paraboles, mais où je vous parlerai ouvertement du Père. '
  '26':
  - type: text
    content: 'Ce jour-là, vous demanderez en mon nom, et je ne vous dis pas que je prierai le Père pour vous. '
  '27':
  - type: text
    content: 'En effet, le Père lui-même vous aime parce que vous m''avez aimé et que vous avez cru que je suis sorti de Dieu. '
  '28':
  - type: text
    content: Je suis sorti du Père et je suis venu dans le monde; maintenant je quitte le monde et je retourne vers le Père.»
  '29':
  - type: text
    content: 'Ses disciples lui dirent: «Vois! Maintenant tu parles ouvertement et tu n''emploies aucune parabole. '
  '3':
  - type: text
    content: Ils agiront ainsi parce qu'ils n'ont connu ni le Père ni moi.
  '30':
  - type: text
    content: 'Maintenant nous savons que tu sais tout et que tu n''as pas besoin qu''on t''interroge; c''est pourquoi nous croyons que tu es sorti de Dieu.» '
  '31':
  - type: text
    content: 'Jésus leur répondit: «Vous croyez juste maintenant? '
  '32':
  - type: text
    content: 'Voici que l''heure vient, et elle est [déjà] venue, où vous serez dispersés chacun de votre côté et me laisserez seul. Cependant, je ne suis pas seul, car le Père est avec moi. '
  '33':
  - type: text
    content: 'Je vous ai dit cela afin que vous ayez la paix en moi. Vous aurez à souffrir dans le monde, mais prenez courage: moi, j''ai vaincu le monde.»'
  '4':
  - type: text
    content: '»Je vous ai dit cela afin que, l''heure venue, vous vous souveniez que je vous l''ai dit. Je ne vous en ai pas parlé dès le début parce que j''étais avec vous. '
  '5':
  - type: text
    content: 'Maintenant je m''en vais vers celui qui m''a envoyé et aucun de vous ne me demande: ‘Où vas-tu?’ '
  '6':
  - type: text
    content: 'Mais parce que je vous ai parlé ainsi, la tristesse a rempli votre cœur. '
  '7':
  - type: text
    content: 'Cependant, je vous dis la vérité: il vaut mieux pour vous que je m''en aille. En effet, si je ne m''en vais pas, le défenseur ne viendra pas vers vous; mais, si je m''en vais, je vous l''enverrai '
  '8':
  - type: text
    content: 'et, quand il sera venu, il convaincra le monde en ce qui concerne le péché, la justice et le jugement: '
  '9':
  - type: text
    content: 'en ce qui concerne le péché, parce qu''ils ne croient pas en moi; '
