document_id: PRO.24
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ne sois pas jaloux des hommes méchants
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne désire pas être en leur compagnie,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: car leur cœur médite la ruine
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leurs lèvres ne cherchent qu'à provoquer le trouble.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C'est par la sagesse qu'une maison est construite
- type: usfm
  marker: q1
  children:
  - type: text
    text: et par l'intelligence qu'elle s'affermit;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: c'est par la connaissance que les chambres se remplissent
- type: usfm
  marker: q1
  children:
  - type: text
    text: de toutes sortes de biens précieux et agréables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Un homme sage est plein de force,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celui qui a de la connaissance consolide sa puissance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Oui, il te faut de bonnes directives pour faire la guerre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la victoire tient au grand nombre de conseillers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: La sagesse est inaccessible au fou,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n'ouvrira pas la bouche à la porte de la ville.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Celui qui médite de faire le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on l'appelle un conspirateur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L'intention de la folie, c'est le péché,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le moqueur fait horreur aux hommes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Si tu faiblis, le jour de la détresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ta force est bien dérisoire.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Appel à la justice
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Délivre ceux qu'on traîne à la mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: retiens ceux qu'on amène tout tremblants pour les tuer!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Si tu dis: «Ah, nous ne savions pas!»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui évalue les cœurs n'a-t-il rien compris?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui veille sur toi ne sait-il pas tout?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il paiera à chacun le salaire de ses actes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mon fils, mange du miel, car il est bon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Un rayon de miel sera doux à ton palais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'De même, connais la sagesse pour le bien de ton âme:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: si tu la trouves, il y a un avenir
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ton espérance ne pourra pas être brisée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ne te tiens pas comme le méchant en embuscade devant le domaine du juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne dévaste pas son habitation!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: En effet, sept fois le juste tombe, mais il se relève.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand les méchants trébuchent, en revanche, ils sont précipités dans le malheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ne te réjouis pas lorsque ton ennemi tombe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que ton cœur ne soit pas dans l'allégresse quand il trébuche!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: L'Eternel le verrait, cela lui déplairait
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il détournerait sa colère de lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Ne t'irrite pas à cause de ceux qui font le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne porte pas envie aux méchants,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: car il n'y a pas d'avenir pour celui qui fait le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la lampe des méchants s'éteindra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Mon fils, crains l'Eternel et le roi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne fréquente pas les hommes remuants,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: car leur ruine surviendra soudain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui connaît le malheur des uns et des autres?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Voici encore ce qui vient des sages:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il n'est pas bien d'être partial dans un jugement.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Celui qui dit au méchant: «Tu es juste»,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: les peuples le maudissent, les nations s'indignent contre lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ainsi, ceux qui le punissent s'en trouvent bien
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le bonheur vient sur eux comme une bénédiction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Une réponse franche est comme une embrassade.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Arrange tes affaires à l'extérieur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: prends soin de ton champ!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ensuite tu construiras ta maison.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Ne témoigne pas sans raison contre ton prochain!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voudrais-tu employer tes lèvres à tromper?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ne dis pas: «Je lui rendrai la pareille,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je paierai à chacun le salaire de ses actes.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Je suis passé près du champ d'un paresseux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'près de la vigne d''un homme dépourvu de bon sens:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: les épines y poussaient partout,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les ronces couvraient le sol et son mur de pierres était écroulé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: J'ai regardé bien attentivement
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et j''ai tiré instruction de ce que j''ai vu:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: tu veux somnoler un peu, te reposer encore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: juste croiser les mains pour dormir?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Voilà que la pauvreté te surprend comme un rôdeur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la misère comme un homme armé.
