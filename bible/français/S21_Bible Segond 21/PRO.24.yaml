document_id: PRO.24,152
type_code: fra
verses:
  '1':
  - type: text
    content: Ne sois pas jaloux des hommes méchants
  - type: text
    content: et ne désire pas être en leur compagnie,
  '10':
  - type: text
    content: Si tu faiblis, le jour de la détresse,
  - type: text
    content: ta force est bien dérisoire.
  - type: heading
    content: Appel à la justice
  '11':
  - type: text
    content: Délivre ceux qu'on traîne à la mort,
  - type: text
    content: retiens ceux qu'on amène tout tremblants pour les tuer!
  '12':
  - type: text
    content: 'Si tu dis: «Ah, nous ne savions pas!»'
  - type: text
    content: celui qui évalue les cœurs n'a-t-il rien compris?
  - type: text
    content: Celui qui veille sur toi ne sait-il pas tout?
  - type: text
    content: Il paiera à chacun le salaire de ses actes.
  '13':
  - type: text
    content: Mon fils, mange du miel, car il est bon.
  - type: text
    content: Un rayon de miel sera doux à ton palais.
  '14':
  - type: text
    content: 'De même, connais la sagesse pour le bien de ton âme:'
  - type: text
    content: si tu la trouves, il y a un avenir
  - type: text
    content: et ton espérance ne pourra pas être brisée.
  '15':
  - type: text
    content: Ne te tiens pas comme le méchant en embuscade devant le domaine du juste,
  - type: text
    content: ne dévaste pas son habitation!
  '16':
  - type: text
    content: En effet, sept fois le juste tombe, mais il se relève.
  - type: text
    content: Quand les méchants trébuchent, en revanche, ils sont précipités dans le malheur.
  '17':
  - type: text
    content: Ne te réjouis pas lorsque ton ennemi tombe,
  - type: text
    content: et que ton cœur ne soit pas dans l'allégresse quand il trébuche!
  '18':
  - type: text
    content: L'Eternel le verrait, cela lui déplairait
  - type: text
    content: et il détournerait sa colère de lui.
  '19':
  - type: text
    content: Ne t'irrite pas à cause de ceux qui font le mal,
  - type: text
    content: ne porte pas envie aux méchants,
  '2':
  - type: text
    content: car leur cœur médite la ruine
  - type: text
    content: et leurs lèvres ne cherchent qu'à provoquer le trouble.
  '20':
  - type: text
    content: car il n'y a pas d'avenir pour celui qui fait le mal,
  - type: text
    content: la lampe des méchants s'éteindra.
  '21':
  - type: text
    content: Mon fils, crains l'Eternel et le roi!
  - type: text
    content: Ne fréquente pas les hommes remuants,
  '22':
  - type: text
    content: car leur ruine surviendra soudain,
  - type: text
    content: et qui connaît le malheur des uns et des autres?
  '23':
  - type: text
    content: 'Voici encore ce qui vient des sages:'
  - type: text
    content: il n'est pas bien d'être partial dans un jugement.
  '24':
  - type: text
    content: 'Celui qui dit au méchant: «Tu es juste»,'
  - type: text
    content: les peuples le maudissent, les nations s'indignent contre lui.
  '25':
  - type: text
    content: Ainsi, ceux qui le punissent s'en trouvent bien
  - type: text
    content: et le bonheur vient sur eux comme une bénédiction.
  '26':
  - type: text
    content: Une réponse franche est comme une embrassade.
  '27':
  - type: text
    content: Arrange tes affaires à l'extérieur,
  - type: text
    content: prends soin de ton champ!
  - type: text
    content: Ensuite tu construiras ta maison.
  '28':
  - type: text
    content: Ne témoigne pas sans raison contre ton prochain!
  - type: text
    content: Voudrais-tu employer tes lèvres à tromper?
  '29':
  - type: text
    content: 'Ne dis pas: «Je lui rendrai la pareille,'
  - type: text
    content: je paierai à chacun le salaire de ses actes.»
  '3':
  - type: text
    content: C'est par la sagesse qu'une maison est construite
  - type: text
    content: et par l'intelligence qu'elle s'affermit;
  '30':
  - type: text
    content: Je suis passé près du champ d'un paresseux,
  - type: text
    content: 'près de la vigne d''un homme dépourvu de bon sens:'
  '31':
  - type: text
    content: les épines y poussaient partout,
  - type: text
    content: les ronces couvraient le sol et son mur de pierres était écroulé.
  '32':
  - type: text
    content: J'ai regardé bien attentivement
  - type: text
    content: 'et j''ai tiré instruction de ce que j''ai vu:'
  '33':
  - type: text
    content: tu veux somnoler un peu, te reposer encore,
  - type: text
    content: juste croiser les mains pour dormir?
  '34':
  - type: text
    content: Voilà que la pauvreté te surprend comme un rôdeur,
  - type: text
    content: et la misère comme un homme armé.
  '4':
  - type: text
    content: c'est par la connaissance que les chambres se remplissent
  - type: text
    content: de toutes sortes de biens précieux et agréables.
  '5':
  - type: text
    content: Un homme sage est plein de force,
  - type: text
    content: et celui qui a de la connaissance consolide sa puissance.
  '6':
  - type: text
    content: Oui, il te faut de bonnes directives pour faire la guerre,
  - type: text
    content: et la victoire tient au grand nombre de conseillers.
  '7':
  - type: text
    content: La sagesse est inaccessible au fou,
  - type: text
    content: il n'ouvrira pas la bouche à la porte de la ville.
  '8':
  - type: text
    content: Celui qui médite de faire le mal,
  - type: text
    content: on l'appelle un conspirateur.
  '9':
  - type: text
    content: L'intention de la folie, c'est le péché,
  - type: text
    content: et le moqueur fait horreur aux hommes.
