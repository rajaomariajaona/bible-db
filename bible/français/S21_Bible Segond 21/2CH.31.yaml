document_id: 2CH.31
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fonctions des prêtres et des Lévites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lorsque tout cela fut terminé, tous les Israélites qui étaient présents partirent pour les villes de Juda; ils brisèrent les statues, abattirent les poteaux sacrés et démolirent entièrement les hauts lieux et les autels dans tout Juda et Benjamin ainsi que dans Ephraïm et Manassé. Puis tous les Israélites retournèrent dans leurs villes, chacun dans sa propriété.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ezéchias rétablit les classes des prêtres et des Lévites d''après leurs divisions, chacun selon sa fonction. Il fit cela pour les prêtres et Lévites, pour les holocaustes et les sacrifices de communion, pour le service, le chant et la louange aux portes du camp de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le roi donna une partie de ses biens pour les holocaustes: pour les holocaustes du matin et du soir, et pour ceux des sabbats, des débuts de mois et des fêtes, conformément à ce qui est écrit dans la loi de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Puis il ordonna au peuple, aux habitants de Jérusalem, de donner aux prêtres et aux Lévites la part qui leur était destinée, afin qu''ils restent fermement attachés à la loi de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Une fois cette consigne transmise, les Israélites donnèrent en abondance les premières récoltes de blé, de vin nouveau, d''huile, de miel et de tous les produits des champs. Ils apportèrent aussi en abondance la dîme de tout. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les Israélites et les Judéens qui habitaient dans les villes de Juda donnèrent eux aussi la dîme du gros et du petit bétail ainsi que la dîme des offrandes saintes consacrées à l''Eternel, leur Dieu, et on en fit plusieurs tas. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'On commença à former ces tas le troisième mois et les termina le septième mois. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ezéchias et les chefs vinrent voir les tas et ils bénirent l''Eternel et son peuple, Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ezéchias interrogea les prêtres et les Lévites à propos de ces tas. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Alors le grand-prêtre Azaria, de la famille de Tsadok, lui répondit: «Depuis qu''on a commencé d''apporter les offrandes dans la maison de l''Eternel, nous avons mangé à satiété, en laissant beaucoup de restes, car l''Eternel a béni son peuple; et le reste est avec cet amoncellement.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ezéchias donna l''ordre de préparer des salles dans la maison de l''Eternel et on les prépara. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'On y apporta fidèlement les prélèvements, la dîme et les offrandes consacrées. Le Lévite Conania en eut la responsabilité, et son frère Shimeï était son adjoint. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jehiel, Azazia, Nachath, Asaël, Jerimoth, Jozabad, Eliel, Jismakia, Machath et Benaja officiaient comme surveillants sous la direction de Conania et de son frère Shimeï, sur ordre du roi Ezéchias et d''Azaria, le chef de la maison de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Le Lévite Koré, fils de Jimna, portier à l''est, était responsable des offrandes faites spontanément à Dieu; il devait distribuer ce qui était présenté à l''Eternel à titre de prélèvement et les choses très saintes. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Eden, Minjamin, Josué, Shemaeja, Amaria et Shecania étaient placés sous sa direction, dans les villes des prêtres, pour faire fidèlement les distributions à leurs frères, grands et petits, selon leurs divisions: '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'en plus des hommes enregistrés dès l''âge de 3 ans, ils faisaient ces distributions à tous ceux qui entraient dans la maison de l''Eternel suivant les exigences de chaque jour pour y accomplir leur service, selon leurs fonctions et leurs divisions. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'La généalogie des prêtres était enregistrée d''après leur famille et on comptait les Lévites âgés de 20 ans et plus, selon leurs fonctions et leurs divisions. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils devaient enregistrer leurs petits enfants, leur femme, leurs fils et leurs filles pour toute l''assemblée, car ils se consacraient fidèlement au service du sanctuaire. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Quant aux prêtres, aux descendants d'Aaron qui vivaient dans les campagnes environnant leurs villes, il y avait dans chaque ville des hommes nominativement désignés pour distribuer les parts destinées à tous les prêtres et à tous les Lévites enregistrés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'C''est ainsi qu''Ezéchias agit dans tout Juda. Il fit ce qui est bien, ce qui est droit, ce qui est vrai, devant l''Eternel, son Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dans tout ce qu'il entreprit en faveur du service de la maison de Dieu, de la loi et des commandements, il agit en recherchant son Dieu de tout son cœur, et il connut le succès.
