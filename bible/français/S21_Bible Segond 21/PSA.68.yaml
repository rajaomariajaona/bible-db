document_id: PSA.68,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Chant de triomphe et de gloire
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Au chef de chœur. Psaume, chant de David.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as fait tomber une pluie bienfaisante, ô Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu as fortifié ton peuple épuisé.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton troupeau a habité dans le pays
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que dans ta bonté, ô Dieu, tu avais préparé pour les malheureux.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Seigneur dit une parole,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les messagères de bonnes nouvelles sont légion.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les rois des armées fuient, ils fuient,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et celle qui reste à la maison partage le butin.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tandis que vous êtes couchés au milieu des étables,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les ailes de la colombe sont couvertes d'argent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son plumage est d'un jaune d'or.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsque le Tout-Puissant a dispersé les rois dans le pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il neigeait sur le Tsalmon.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Montagne de Dieu, montagne du Basan,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: montagne aux nombreuses cimes, montagne du Basan,
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pourquoi, montagnes aux nombreuses cimes, êtes-vous jalouses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de la montagne que Dieu a choisie pour résidence?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cependant, l'Eternel en fera sa demeure à perpétuité.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les chars de Dieu se comptent par dizaines de milliers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par milliers de milliers;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Seigneur est au milieu d'eux sur le Sinaï, dans le sanctuaire.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*Tu es monté sur les hauteurs, tu as emmené des prisonniers,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu as pris des dons parmi les hommes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '68.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu es monté… les hommes: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ephésiens 4.8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 9 à propos du don de la grâce.'
      marker-yv: yv-n
    - type: text
      text: ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les rebelles aussi habiteront près de l'Eternel Dieu.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*Dieu se lève, ses ennemis se dispersent'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses adversaires prennent la fuite devant lui.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '68.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dieu se lève… devant lui: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: correspond aux paroles de Moïse lors du départ de l'arche de l'alliance (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nombres 10.35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Béni soit le Seigneur chaque jour!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Dieu porte nos fardeaux, il nous sauve. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu est pour nous le Dieu des délivrances,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est l'Eternel, le Seigneur, qui peut nous préserver de la mort.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, Dieu brisera la tête de ses ennemis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le crâne chevelu de ceux qui vivent dans le péché.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le Seigneur dit: «Je les ramènerai du Basan,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je les ramènerai du fond de la mer,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que tu plonges ton pied dans le sang
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que la langue de tes chiens ait part au carnage des ennemis.»
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils voient ta marche, ô Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la marche de mon Dieu, de mon roi, dans le sanctuaire.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En tête vont les chanteurs, puis ceux qui jouent des instruments,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au milieu des jeunes filles qui battent du tambourin.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Bénissez Dieu dans les assemblées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: bénissez le Seigneur, descendants d'Israël!
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà Benjamin, le plus jeune, qui domine sur eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les chefs de Juda et leur troupe,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les chefs de Zabulon, les chefs de Nephthali.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ton Dieu ordonne que tu sois fort:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: fortifie, ô Dieu, ce que tu as fait pour nous!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme la fumée se dissipe, tu les dissipes;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme la cire fond au feu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les méchants disparaissent devant Dieu.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De ton temple tu règnes sur Jérusalem.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les rois t'apporteront des présents.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Menace l'animal des roseaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la troupe des taureaux avec les veaux des peuples,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui se prosternent avec des pièces d'argent!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Disperse les peuples qui aiment la guerre!
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Des grands viennent de l'Egypte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'Ethiopie accourt, les mains tendues vers Dieu.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Royaumes de la terre, chantez en l'honneur de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'célébrez le Seigneur! '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chantez celui qui s'avance dans le ciel, le ciel ancien!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici qu'il fait retentir sa voix, sa voix puissante.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Proclamez la force de Dieu!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa majesté s'étend sur Israël, et sa force éclate dans le ciel.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De ton sanctuaire, ô Dieu, tu es redoutable.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le Dieu d'Israël donne force et puissance à son peuple.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Béni soit Dieu!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais les justes se réjouissent, ils triomphent devant Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont transportés de joie.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chantez en l'honneur de Dieu, célébrez son nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: préparez le chemin à celui qui s'avance à travers les déserts!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L''Eternel est son nom: réjouissez-vous devant lui!'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le père des orphelins, le défenseur des veuves,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est Dieu dans sa sainte demeure.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu donne un foyer à ceux qui sont solitaires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il délivre les prisonniers et les rend heureux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: seuls les rebelles habitent des lieux arides.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Dieu, tu es sorti à la tête de ton peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tu as marché dans le désert. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors la terre a tremblé, le ciel aussi a déversé son eau devant Dieu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Sinaï lui-même a tremblé devant Dieu, le Dieu d'Israël.
