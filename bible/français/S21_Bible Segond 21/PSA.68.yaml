document_id: PSA.68,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Chant de triomphe et de gloire
  - type: text
    content: Au chef de chœur. Psaume, chant de David.
  '10':
  - type: text
    content: Tu as fait tomber une pluie bienfaisante, ô Dieu,
  - type: text
    content: tu as fortifié ton peuple épuisé.
  '11':
  - type: text
    content: Ton troupeau a habité dans le pays
  - type: text
    content: que dans ta bonté, ô Dieu, tu avais préparé pour les malheureux.
  '12':
  - type: text
    content: Le Seigneur dit une parole,
  - type: text
    content: et les messagères de bonnes nouvelles sont légion.
  '13':
  - type: text
    content: Les rois des armées fuient, ils fuient,
  - type: text
    content: et celle qui reste à la maison partage le butin.
  '14':
  - type: text
    content: Tandis que vous êtes couchés au milieu des étables,
  - type: text
    content: les ailes de la colombe sont couvertes d'argent
  - type: text
    content: et son plumage est d'un jaune d'or.
  '15':
  - type: text
    content: Lorsque le Tout-Puissant a dispersé les rois dans le pays,
  - type: text
    content: il neigeait sur le Tsalmon.
  '16':
  - type: text
    content: Montagne de Dieu, montagne du Basan,
  - type: text
    content: montagne aux nombreuses cimes, montagne du Basan,
  '17':
  - type: text
    content: pourquoi, montagnes aux nombreuses cimes, êtes-vous jalouses
  - type: text
    content: de la montagne que Dieu a choisie pour résidence?
  - type: text
    content: Cependant, l'Eternel en fera sa demeure à perpétuité.
  '18':
  - type: text
    content: Les chars de Dieu se comptent par dizaines de milliers,
  - type: text
    content: par milliers de milliers;
  - type: text
    content: le Seigneur est au milieu d'eux sur le Sinaï, dans le sanctuaire.
  '19':
  - type: text
    content: '*Tu es monté sur les hauteurs, tu as emmené des prisonniers,'
  - type: text
    content: tu as pris des dons parmi les hommes
  - type: note
    content: 'Tu es monté… les hommes: cité en Ephésiens 4.8, 9 à propos du don de la grâce.'
  - type: text
    content: ;
  - type: text
    content: les rebelles aussi habiteront près de l'Eternel Dieu.
  '2':
  - type: text
    content: '*Dieu se lève, ses ennemis se dispersent'
  - type: text
    content: et ses adversaires prennent la fuite devant lui.
  - type: note
    content: 'Dieu se lève… devant lui: correspond aux paroles de Moïse lors du départ de l''arche de l''alliance (Nombres 10.35).'
  '20':
  - type: text
    content: Béni soit le Seigneur chaque jour!
  - type: text
    content: 'Dieu porte nos fardeaux, il nous sauve. '
  - type: text
    content: – Pause.
  '21':
  - type: text
    content: Dieu est pour nous le Dieu des délivrances,
  - type: text
    content: c'est l'Eternel, le Seigneur, qui peut nous préserver de la mort.
  '22':
  - type: text
    content: Oui, Dieu brisera la tête de ses ennemis,
  - type: text
    content: le crâne chevelu de ceux qui vivent dans le péché.
  '23':
  - type: text
    content: 'Le Seigneur dit: «Je les ramènerai du Basan,'
  - type: text
    content: je les ramènerai du fond de la mer,
  '24':
  - type: text
    content: afin que tu plonges ton pied dans le sang
  - type: text
    content: et que la langue de tes chiens ait part au carnage des ennemis.»
  '25':
  - type: text
    content: Ils voient ta marche, ô Dieu,
  - type: text
    content: la marche de mon Dieu, de mon roi, dans le sanctuaire.
  '26':
  - type: text
    content: En tête vont les chanteurs, puis ceux qui jouent des instruments,
  - type: text
    content: au milieu des jeunes filles qui battent du tambourin.
  '27':
  - type: text
    content: Bénissez Dieu dans les assemblées,
  - type: text
    content: bénissez le Seigneur, descendants d'Israël!
  '28':
  - type: text
    content: Voilà Benjamin, le plus jeune, qui domine sur eux,
  - type: text
    content: les chefs de Juda et leur troupe,
  - type: text
    content: les chefs de Zabulon, les chefs de Nephthali.
  '29':
  - type: text
    content: 'Ton Dieu ordonne que tu sois fort:'
  - type: text
    content: fortifie, ô Dieu, ce que tu as fait pour nous!
  '3':
  - type: text
    content: Comme la fumée se dissipe, tu les dissipes;
  - type: text
    content: comme la cire fond au feu,
  - type: text
    content: les méchants disparaissent devant Dieu.
  '30':
  - type: text
    content: De ton temple tu règnes sur Jérusalem.
  - type: text
    content: Les rois t'apporteront des présents.
  '31':
  - type: text
    content: Menace l'animal des roseaux,
  - type: text
    content: la troupe des taureaux avec les veaux des peuples,
  - type: text
    content: qui se prosternent avec des pièces d'argent!
  - type: text
    content: Disperse les peuples qui aiment la guerre!
  '32':
  - type: text
    content: Des grands viennent de l'Egypte;
  - type: text
    content: l'Ethiopie accourt, les mains tendues vers Dieu.
  '33':
  - type: text
    content: Royaumes de la terre, chantez en l'honneur de Dieu,
  - type: text
    content: 'célébrez le Seigneur! '
  - type: text
    content: – Pause.
  '34':
  - type: text
    content: Chantez celui qui s'avance dans le ciel, le ciel ancien!
  - type: text
    content: Voici qu'il fait retentir sa voix, sa voix puissante.
  '35':
  - type: text
    content: Proclamez la force de Dieu!
  - type: text
    content: Sa majesté s'étend sur Israël, et sa force éclate dans le ciel.
  '36':
  - type: text
    content: De ton sanctuaire, ô Dieu, tu es redoutable.
  - type: text
    content: Le Dieu d'Israël donne force et puissance à son peuple.
  - type: text
    content: Béni soit Dieu!
  '4':
  - type: text
    content: Mais les justes se réjouissent, ils triomphent devant Dieu,
  - type: text
    content: ils sont transportés de joie.
  '5':
  - type: text
    content: Chantez en l'honneur de Dieu, célébrez son nom,
  - type: text
    content: préparez le chemin à celui qui s'avance à travers les déserts!
  - type: text
    content: 'L''Eternel est son nom: réjouissez-vous devant lui!'
  '6':
  - type: text
    content: Le père des orphelins, le défenseur des veuves,
  - type: text
    content: c'est Dieu dans sa sainte demeure.
  '7':
  - type: text
    content: Dieu donne un foyer à ceux qui sont solitaires,
  - type: text
    content: il délivre les prisonniers et les rend heureux;
  - type: text
    content: seuls les rebelles habitent des lieux arides.
  '8':
  - type: text
    content: O Dieu, tu es sorti à la tête de ton peuple,
  - type: text
    content: 'tu as marché dans le désert. '
  - type: text
    content: – Pause.
  '9':
  - type: text
    content: Alors la terre a tremblé, le ciel aussi a déversé son eau devant Dieu;
  - type: text
    content: le Sinaï lui-même a tremblé devant Dieu, le Dieu d'Israël.
