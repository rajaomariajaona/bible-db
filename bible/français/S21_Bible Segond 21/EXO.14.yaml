document_id: EXO.14,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L''Eternel dit à Moïse: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Le pharaon approchait. Les Israélites levèrent les yeux et virent que les Egyptiens étaient en marche derrière eux. Ils éprouvèrent une grande frayeur et crièrent à l''Eternel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ils dirent à Moïse: «Est-ce parce qu''il n''y avait pas de tombeaux en Egypte que tu nous as emmenés dans le désert pour y mourir? Que nous as-tu fait en nous faisant sortir d''Egypte? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'N''est-ce pas précisément ce que nous te disions en Egypte: ‘Laisse-nous servir les Egyptiens, car nous préférons être esclaves des Egyptiens plutôt que de mourir dans le désert’?» '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Moïse répondit au peuple: «N''ayez pas peur, restez en place et regardez la délivrance que l''Eternel va vous accorder aujourd''hui. En effet, les Egyptiens que vous voyez aujourd''hui, vous ne les verrez plus jamais. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: C'est l'Eternel qui combattra pour vous. Quant à vous, gardez le silence!»
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'L''Eternel dit à Moïse: «Pourquoi ces cris? Dis aux Israélites de se remettre en marche. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Et toi, lève ton bâton, tends ta main sur la mer et fends-la; ainsi les Israélites pénétreront au milieu de la mer à pied sec. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Quant à moi, je vais endurcir le cœur des Egyptiens pour qu''ils y pénètrent après eux, et le pharaon ainsi que toute son armée, ses chars et ses cavaliers feront éclater ma gloire. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Les Egyptiens sauront que je suis l'Eternel quand le pharaon, ses chars et ses cavaliers auront fait éclater ma gloire.»
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'L''ange de Dieu, qui marchait devant le camp d''Israël, quitta cette position et marcha derrière eux, et la colonne de nuée qui les précédait fit de même. '
  '2':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '«Parle aux Israélites; qu''ils reviennent camper devant Pi-Hahiroth, entre Migdol et la mer, vis-à-vis de Baal-Tsephon; c''est en face de cet endroit que vous camperez, près de la mer. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Elle se plaça entre le camp des Egyptiens et le camp d'Israël. Cette nuée était obscure d'un côté, et de l'autre elle éclairait la nuit. De toute la nuit, les deux camps ne s'approchèrent pas l'un de l'autre.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Moïse tendit sa main sur la mer et l''Eternel refoula la mer au moyen d''un vent d''est qui souffla avec violence toute la nuit; il assécha la mer et l''eau se partagea. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Les Israélites pénétrèrent au milieu de la mer à pied sec et l''eau formait comme une muraille à leur droite et à leur gauche. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Les Egyptiens les poursuivirent, tous les chevaux du pharaon avec ses chars et ses cavaliers pénétrèrent après eux au milieu de la mer. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Très tôt le matin, l''Eternel regarda le camp des Egyptiens depuis la colonne de feu et de nuée, et il sema le désordre dans le camp des Egyptiens. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Il fit dévier les roues de leurs chars et rendit ainsi leur conduite difficile. Les Egyptiens dirent alors: «Prenons la fuite devant Israël, car l''Eternel combat pour lui contre nous.»'
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'L''Eternel dit à Moïse: «Tends ta main sur la mer et l''eau reviendra sur les Egyptiens, sur leurs chars et leurs cavaliers.» '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Moïse tendit sa main sur la mer. Vers le matin, la mer reprit sa place. Les Egyptiens prirent la fuite à son approche, mais l''Eternel les précipita au milieu de la mer. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'L''eau revint et couvrit les chars, les cavaliers et toute l''armée du pharaon qui avaient pénétré dans la mer après les Israélites. Il n''y eut pas un seul rescapé. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Quant aux Israélites, ils marchèrent à pied sec au milieu de la mer et l'eau formait comme une muraille à leur droite et à leur gauche.
  '3':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Le pharaon dira des Israélites: ‘Ils sont perdus dans le pays, prisonniers du désert.’ '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ce jour-là, l''Eternel sauva Israël de la main des Egyptiens. Israël vit les Egyptiens morts sur le rivage de la mer, '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: et il vit la main puissante que l'Eternel avait dirigée contre les Egyptiens. Le peuple craignit l'Eternel et il eut confiance en l'Eternel et en son serviteur Moïse.
  '4':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: J'endurcirai le cœur du pharaon et il les poursuivra; mais le pharaon et toute son armée serviront à faire éclater ma gloire et les Egyptiens sauront que je suis l'Eternel.»
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout se passa ainsi. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'On annonça au roi d''Egypte que le peuple avait pris la fuite. Alors les dispositions de cœur du pharaon et de ses serviteurs envers le peuple changèrent. Ils se dirent: «Qu''avons-nous fait en laissant partir Israël? Nous n''aurons plus ses services!» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Le pharaon attela son char et prit son peuple avec lui. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Il prit 600 chars d''élite ainsi que tous les chars de l''Egypte, chacun avec ses combattants. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'L''Eternel endurcit le cœur du pharaon, roi d''Egypte, et le pharaon poursuivit les Israélites. Pourtant, les Israélites étaient sortis ouvertement d''Egypte. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Les Egyptiens les poursuivirent et tous les chevaux et les chars du pharaon, ses cavaliers et son armée les rattrapèrent alors qu'ils campaient près de la mer, vers Pi-Hahiroth, vis-à-vis de Baal-Tsephon.
