document_id: PSA.15,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Portrait du juste
  - type: text
    content: Psaume de David.
  - type: text
    content: Eternel, qui séjournera dans ta tente?
  - type: text
    content: Qui demeurera sur ta montagne sainte?
  '2':
  - type: text
    content: Celui qui marche dans l'intégrité, pratique la justice
  - type: text
    content: et dit ce qu'il pense vraiment.
  '3':
  - type: text
    content: Il ne calomnie pas avec sa langue,
  - type: text
    content: il ne fait pas de mal à son semblable,
  - type: text
    content: et il ne jette pas le déshonneur sur son prochain.
  '4':
  - type: text
    content: Il regarde avec répulsion l'homme au comportement méprisable,
  - type: text
    content: mais il honore ceux qui craignent l'Eternel.
  - type: text
    content: Il ne se rétracte pas, s'il fait un serment à son préjudice,
  '5':
  - type: text
    content: il n'exige pas d'intérêt de son argent,
  - type: text
    content: et il n'accepte pas de don contre l'innocent.
  - type: text
    content: Celui qui se conduit ainsi ne sera jamais ébranlé.
