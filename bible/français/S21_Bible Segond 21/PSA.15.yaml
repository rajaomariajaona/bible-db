document_id: PSA.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Portrait du juste
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Psaume de David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, qui séjournera dans ta tente?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui demeurera sur ta montagne sainte?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Celui qui marche dans l'intégrité, pratique la justice
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dit ce qu'il pense vraiment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il ne calomnie pas avec sa langue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne fait pas de mal à son semblable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il ne jette pas le déshonneur sur son prochain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il regarde avec répulsion l'homme au comportement méprisable,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il honore ceux qui craignent l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il ne se rétracte pas, s'il fait un serment à son préjudice,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: il n'exige pas d'intérêt de son argent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il n'accepte pas de don contre l'innocent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui se conduit ainsi ne sera jamais ébranlé.
