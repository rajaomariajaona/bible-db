document_id: EXO.20,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les dix commandements
  - type: text
    content: 'Alors Dieu prononça toutes ces paroles: '
  '10':
  - type: text
    content: 'Mais le septième jour est le jour du repos de l''Eternel, ton Dieu. Tu ne feras aucun travail, ni toi, ni ton fils, ni ta fille, ni ton esclave, ni ta servante, ni ton bétail, ni l''étranger qui habite chez toi. '
  '11':
  - type: text
    content: En effet, en 6 jours l'Eternel *a fait le ciel, la terre, la mer et tout ce qui s'y trouve
  - type: note
    content: 'Afait… trouve: même présentation au Psaume 146.6, citée en Actes 4.24; 14.15.'
  - type: text
    content: ', et *il s''est reposé le septième jour'
  - type: note
    content: 'Il s''est… jour: renvoi à Genèse 2.2.'
  - type: text
    content: . Voilà pourquoi l'Eternel a béni le jour du repos et en a fait un jour saint.
  '12':
  - type: text
    content: '*»Honore ton père et ta mère afin de vivre longtemps dans le pays que l''Eternel, ton Dieu, te donne.'
  '13':
  - type: text
    content: »Tu ne commettras pas de meurtre.
  '14':
  - type: text
    content: »Tu ne commettras pas d'adultère.
  '15':
  - type: text
    content: »Tu ne commettras pas de vol.
  '16':
  - type: text
    content: »Tu ne porteras pas de faux témoignage contre ton prochain.
  '17':
  - type: text
    content: »Tu ne convoiteras pas
  - type: note
    content: 'Honore… convoiteras pas: commandements cités tout ou partie en Matthieu 5.21, 27; 15.4; 19.18-19; Marc 7.10; 10.19; Luc 18.20; Romains 7.7; 13.9; Ephésiens 6.2-3; Jacques 2.11.'
  - type: text
    content: ' la maison de ton prochain; tu ne convoiteras pas la femme de ton prochain, ni son esclave, ni sa servante, ni son bœuf, ni son âne, ni quoi que ce soit qui lui appartienne.»'
  '18':
  - type: text
    content: 'Tout le peuple entendait les coups de tonnerre et le son de la trompette et voyait les flammes de la montagne fumante. A ce spectacle, le peuple tremblait et se tenait à bonne distance. '
  '19':
  - type: text
    content: 'Ils dirent à Moïse: «Parle-nous, toi, et nous écouterons; mais que Dieu ne nous parle pas, sinon nous mourrions.» '
  '2':
  - type: text
    content: «Je suis l'Eternel, ton Dieu, qui t'ai fait sortir d'Egypte, de la maison d'esclavage.
  '20':
  - type: text
    content: 'Moïse dit au peuple: «N''ayez pas peur, car c''est pour vous mettre à l''épreuve que Dieu est venu et c''est pour que vous ayez sa crainte devant les yeux afin de ne pas pécher.» '
  '21':
  - type: text
    content: Le peuple restait à bonne distance, mais Moïse s'approcha de la nuée où se trouvait Dieu.
  '22':
  - type: text
    content: 'L''Eternel annonça à Moïse: «Voici ce que tu diras aux Israélites: ‘Vous avez vu que je vous ai parlé depuis le ciel. '
  '23':
  - type: text
    content: 'Vous ne ferez pas de dieux en argent et en or pour me les associer; vous ne vous en ferez pas. '
  '24':
  - type: text
    content: 'C''est un autel en terre que tu me construiras et tu y offriras tes holocaustes et tes sacrifices de communion, tes pièces de petit et de gros bétail. Partout où je rappellerai mon nom, je viendrai vers toi et te bénirai. '
  '25':
  - type: text
    content: 'Si tu me construis un autel de pierre, tu ne le feras pas en pierres taillées, car en passant ton ciseau sur la pierre, tu la rendrais profane. '
  '26':
  - type: text
    content: Tu ne monteras pas à mon autel par des marches afin de ne pas dévoiler ta nudité.’
  '3':
  - type: text
    content: »Tu n'auras pas d'autres dieux devant moi.
  '4':
  - type: text
    content: '»Tu ne te feras pas de sculpture sacrée ni de représentation de ce qui est en haut dans le ciel, en bas sur la terre et dans l''eau plus bas que la terre. '
  '5':
  - type: text
    content: 'Tu ne te prosterneras pas devant elles et tu ne les serviras pas, car moi, l''Eternel, ton Dieu, je suis un Dieu jaloux. Je punis la faute des pères sur les enfants jusqu''à la troisième et la quatrième génération de ceux qui me détestent, '
  '6':
  - type: text
    content: et j'agis avec bonté jusqu'à 1000 générations envers ceux qui m'aiment et qui respectent mes commandements.
  '7':
  - type: text
    content: »Tu n'utiliseras pas le nom de l'Eternel, ton Dieu, à la légère, car l'Eternel ne laissera pas impuni celui qui utilisera son nom à la légère.
  '8':
  - type: text
    content: '»Souviens-toi de faire du jour du repos un jour saint. '
  '9':
  - type: text
    content: 'Pendant 6 jours, tu travailleras et tu feras tout ce que tu dois faire. '
