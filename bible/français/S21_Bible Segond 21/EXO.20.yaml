    - type: text
      text: Les dix commandements
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Dieu prononça toutes ces paroles: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais le septième jour est le jour du repos de l''Eternel, ton Dieu. Tu ne feras aucun travail, ni toi, ni ton fils, ni ta fille, ni ton esclave, ni ta servante, ni ton bétail, ni l''étranger qui habite chez toi. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, en 6 jours l'Eternel *a fait le ciel, la terre, la mer et tout ce qui s'y trouve
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.11 '
      - type: usfm
