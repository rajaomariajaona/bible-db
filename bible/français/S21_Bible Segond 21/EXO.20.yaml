    - type: text
      text: ' la maison de ton prochain; tu ne convoiteras pas la femme de ton prochain, ni son esclave, ni sa servante, ni son bœuf, ni son âne, ni quoi que ce soit qui lui appartienne.»'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout le peuple entendait les coups de tonnerre et le son de la trompette et voyait les flammes de la montagne fumante. A ce spectacle, le peuple tremblait et se tenait à bonne distance. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils dirent à Moïse: «Parle-nous, toi, et nous écouterons; mais que Dieu ne nous parle pas, sinon nous mourrions.» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Je suis l'Eternel, ton Dieu, qui t'ai fait sortir d'Egypte, de la maison d'esclavage.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse dit au peuple: «N''ayez pas peur, car c''est pour vous mettre à l''épreuve que Dieu est venu et c''est pour que vous ayez sa crainte devant les yeux afin de ne pas pécher.» '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Le peuple restait à bonne distance, mais Moïse s'approcha de la nuée où se trouvait Dieu.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel annonça à Moïse: «Voici ce que tu diras aux Israélites: ‘Vous avez vu que je vous ai parlé depuis le ciel. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous ne ferez pas de dieux en argent et en or pour me les associer; vous ne vous en ferez pas. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est un autel en terre que tu me construiras et tu y offriras tes holocaustes et tes sacrifices de communion, tes pièces de petit et de gros bétail. Partout où je rappellerai mon nom, je viendrai vers toi et te bénirai. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si tu me construis un autel de pierre, tu ne le feras pas en pierres taillées, car en passant ton ciseau sur la pierre, tu la rendrais profane. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu ne monteras pas à mon autel par des marches afin de ne pas dévoiler ta nudité.’
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Tu n'auras pas d'autres dieux devant moi.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Tu ne te feras pas de sculpture sacrée ni de représentation de ce qui est en haut dans le ciel, en bas sur la terre et dans l''eau plus bas que la terre. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu ne te prosterneras pas devant elles et tu ne les serviras pas, car moi, l''Eternel, ton Dieu, je suis un Dieu jaloux. Je punis la faute des pères sur les enfants jusqu''à la troisième et la quatrième génération de ceux qui me détestent, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et j'agis avec bonté jusqu'à 1000 générations envers ceux qui m'aiment et qui respectent mes commandements.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Tu n'utiliseras pas le nom de l'Eternel, ton Dieu, à la légère, car l'Eternel ne laissera pas impuni celui qui utilisera son nom à la légère.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Souviens-toi de faire du jour du repos un jour saint. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant 6 jours, tu travailleras et tu feras tout ce que tu dois faire. '
