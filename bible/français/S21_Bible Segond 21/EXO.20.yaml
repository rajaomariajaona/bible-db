        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', et *il s''est reposé le septième jour'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il s''est… jour: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'renvoi à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Genèse 2.2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: . Voilà pourquoi l'Eternel a béni le jour du repos et en a fait un jour saint.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '*»Honore ton père et ta mère afin de vivre longtemps dans le pays que l''Eternel, ton Dieu, te donne.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Tu ne commettras pas de meurtre.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Tu ne commettras pas d'adultère.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Tu ne commettras pas de vol.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Tu ne porteras pas de faux témoignage contre ton prochain.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Tu ne convoiteras pas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
