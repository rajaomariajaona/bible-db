document_id: EXO.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les dix commandements
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Alors Dieu prononça toutes ces paroles: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Je suis l'Eternel, ton Dieu, qui t'ai fait sortir d'Egypte, de la maison d'esclavage.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: »Tu n'auras pas d'autres dieux devant moi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '»Tu ne te feras pas de sculpture sacrée ni de représentation de ce qui est en haut dans le ciel, en bas sur la terre et dans l''eau plus bas que la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tu ne te prosterneras pas devant elles et tu ne les serviras pas, car moi, l''Eternel, ton Dieu, je suis un Dieu jaloux. Je punis la faute des pères sur les enfants jusqu''à la troisième et la quatrième génération de ceux qui me détestent, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: et j'agis avec bonté jusqu'à 1000 générations envers ceux qui m'aiment et qui respectent mes commandements.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: »Tu n'utiliseras pas le nom de l'Eternel, ton Dieu, à la légère, car l'Eternel ne laissera pas impuni celui qui utilisera son nom à la légère.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '»Souviens-toi de faire du jour du repos un jour saint. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Pendant 6 jours, tu travailleras et tu feras tout ce que tu dois faire. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Mais le septième jour est le jour du repos de l''Eternel, ton Dieu. Tu ne feras aucun travail, ni toi, ni ton fils, ni ta fille, ni ton esclave, ni ta servante, ni ton bétail, ni l''étranger qui habite chez toi. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: En effet, en 6 jours l'Eternel *a fait le ciel, la terre, la mer et tout ce qui s'y trouve
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Afait… trouve: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'même présentation au '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 146.6
      metadata:
        usfm: PSA.146.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', citée en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Actes 4.24
      metadata:
        usfm: ACT.4.24
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14.15'
      metadata:
        usfm: ACT.14.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', et *il s''est reposé le septième jour'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il s''est… jour: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'renvoi à '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Genèse 2.2
      metadata:
        usfm: GEN.2.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: . Voilà pourquoi l'Eternel a béni le jour du repos et en a fait un jour saint.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '*»Honore ton père et ta mère afin de vivre longtemps dans le pays que l''Eternel, ton Dieu, te donne.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: »Tu ne commettras pas de meurtre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: »Tu ne commettras pas d'adultère.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: »Tu ne commettras pas de vol.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: »Tu ne porteras pas de faux témoignage contre ton prochain.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: »Tu ne convoiteras pas
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.12-17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Honore… convoiteras pas: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'commandements cités tout ou partie en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 5.21
      metadata:
        usfm: MAT.5.21
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '27'
      metadata:
        usfm: MAT.5.27
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '15.4'
      metadata:
        usfm: MAT.15.4
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 19.18-19
      metadata:
        usfm: MAT.19.18+MAT.19.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Marc 7.10
      metadata:
        usfm: MRK.7.10
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '10.19'
      metadata:
        usfm: MRK.10.19
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Luc 18.20
      metadata:
        usfm: LUK.18.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 7.7
      metadata:
        usfm: ROM.7.7
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '13.9'
      metadata:
        usfm: ROM.13.9
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ephésiens 6.2-3
      metadata:
        usfm: EPH.6.2+EPH.6.3
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jacques 2.11
      metadata:
        usfm: JAS.2.11
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' la maison de ton prochain; tu ne convoiteras pas la femme de ton prochain, ni son esclave, ni sa servante, ni son bœuf, ni son âne, ni quoi que ce soit qui lui appartienne.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Tout le peuple entendait les coups de tonnerre et le son de la trompette et voyait les flammes de la montagne fumante. A ce spectacle, le peuple tremblait et se tenait à bonne distance. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ils dirent à Moïse: «Parle-nous, toi, et nous écouterons; mais que Dieu ne nous parle pas, sinon nous mourrions.» '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Moïse dit au peuple: «N''ayez pas peur, car c''est pour vous mettre à l''épreuve que Dieu est venu et c''est pour que vous ayez sa crainte devant les yeux afin de ne pas pécher.» '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Le peuple restait à bonne distance, mais Moïse s'approcha de la nuée où se trouvait Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'L''Eternel annonça à Moïse: «Voici ce que tu diras aux Israélites: ‘Vous avez vu que je vous ai parlé depuis le ciel. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Vous ne ferez pas de dieux en argent et en or pour me les associer; vous ne vous en ferez pas. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'C''est un autel en terre que tu me construiras et tu y offriras tes holocaustes et tes sacrifices de communion, tes pièces de petit et de gros bétail. Partout où je rappellerai mon nom, je viendrai vers toi et te bénirai. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Si tu me construis un autel de pierre, tu ne le feras pas en pierres taillées, car en passant ton ciseau sur la pierre, tu la rendrais profane. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tu ne monteras pas à mon autel par des marches afin de ne pas dévoiler ta nudité.’
