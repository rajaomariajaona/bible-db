document_id: JER.31
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: A ce moment-là, déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je serai le Dieu de toutes les familles d'Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et eux, ils seront mon peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a trouvé grâce dans le désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le peuple des rescapés de l'épée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël marche vers son lieu de repos.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'De loin, l''Eternel s''est montré à moi:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Je t'aime d'un amour éternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est pourquoi je te conserve ma bonté.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je te rétablirai encore et tu seras rétablie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jeune fille d'Israël!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu resplendiras encore avec tes tambourins
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu te mêleras aux danses de ceux qui manifestent leur joie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tu planteras encore des vignes sur les montagnes de Samarie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les planteurs accompliront leur tâche et profiteront de la récolte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'En effet, il y aura un jour où les gardes crieront dans la région montagneuse d''Ephraïm:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Levez-vous, montons à Sion vers l'Eternel, notre Dieu!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'car voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Poussez des cris de joie à propos de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: éclatez d'allégresse avec la plus importante des nations!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Faites retentir votre voix, chantez des louanges et dites:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Eternel, délivre ton peuple, ce qui reste d'Israël!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Je vais les ramener du pays du nord,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je les rassemblerai des extrémités de la terre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parmi eux figureront l'aveugle et le boiteux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la femme enceinte et celle qui accouche.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ensemble ils forment une grande assemblée, ils reviennent ici.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ils reviennent en pleurant, mais je les conduis au milieu de leurs supplications.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les conduis vers des torrents d'eau
- type: usfm
  marker: q1
  children:
  - type: text
    text: par un chemin tout droit où ils ne trébucheront pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, je suis un père pour Israël
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Ephraïm est mon premier-né.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nations, écoutez la parole de l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et annoncez-la dans les îles lointaines!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Dites:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Celui qui a dispersé Israël le rassemblera
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le gardera comme un berger garde son troupeau.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: En effet, l'Eternel a libéré Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il l'a racheté à celui qui était plus fort que lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ils viendront et pousseront des cris de joie sur les hauteurs de Sion.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils accourront vers les biens de l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: le blé, le vin nouveau, l'huile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le petit et le gros bétail.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leur vie sera pareille à un jardin arrosé
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ne dépériront plus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Alors les jeunes filles se réjouiront en dansant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les jeunes hommes et les vieillards se réjouiront ensemble.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je changerai leur deuil en joie et je les consolerai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je les rendrai joyeux après leurs chagrins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je gaverai les prêtres de graisse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mon peuple sera rassasié grâce à mes biens, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '*On a entendu des cris à Rama,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'des lamentations et des pleurs amers:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est Rachel qui pleure ses enfants
- type: usfm
  marker: q1
  children:
  - type: text
    text: et n'a pas voulu être consolée à propos de ses enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu'ils ne sont plus là.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'On a entendu… là: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 2.18
      metadata:
        usfm: MAT.2.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' en rapport avec le massacre perpétré par Hérode après la naissance de Jésus-Christ.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Retiens tes pleurs
- type: usfm
  marker: q1
  children:
  - type: text
    text: ainsi que les larmes de tes yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il y aura une compensation pour ta peine, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils reviendront du pays de l'ennemi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il y a de l''espoir pour ton avenir, déclare l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: tes enfants reviendront dans leur territoire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'J''entends clairement Ephraïm se lamenter:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Tu m'as corrigé et je me suis laissé corriger,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pareil à un jeune taureau qui n'a pas encore été dressé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fais-moi revenir et je reviendrai,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu es l'Eternel, mon Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Revenu à de meilleures intentions, je regrette mon attitude.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Après avoir pris conscience de mon état, je me frappe la cuisse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis honteux, rempli d'humiliation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je dois porter le déshonneur de ma jeunesse.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ephraïm est-il donc pour moi un fils chéri,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un enfant qui fait mon plaisir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que chaque fois que je parle contre lui son souvenir reste si fort en moi?
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est que je suis profondément bouleversé quand il est question de lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ressens beaucoup de compassion pour lui, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Dresse-toi des poteaux indicateurs, place des points de repère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: prête attention à la route, au chemin que tu as suivi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Reviens, jeune fille d'Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: reviens dans ces villes qui t'appartiennent!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Jusqu'à quand resteras-tu dans l'errance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fille rebelle?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'En effet, l''Eternel crée une chose nouvelle sur la terre:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: la femme tourne autour de l'homme.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand j'aurai ramené leurs déportés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'on dira encore ces paroles dans le pays de Juda et dans ses villes:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Que l'Eternel te bénisse, domaine de la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sainte montagne!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Là s'installeront ensemble les habitants de Juda et de toutes ses villes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les cultivateurs et les nomades.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: En effet, je désaltère celui qui est fatigué
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je rassasie tous ceux qui dépérissent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Là-dessus je me suis réveillé et j'ai ouvert les yeux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon sommeil m'avait fait du bien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Voici que les jours viennent, déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: où j'accorderai à la communauté d'Israël et à celle de Juda
- type: usfm
  marker: q1
  children:
  - type: text
    text: une foule d'hommes et de bêtes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: De même que j'ai veillé sur eux
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour arracher, démolir, ruiner, détruire et faire du mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de même je veillerai sur eux pour construire et pour planter,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Durant ces jours-là, on ne dira plus:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ce sont les pères qui ont mangé des raisins verts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ce sont les enfants qui ont eu mal aux dents.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Chacun mourra en raison de sa faute.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand un homme mangera des raisins verts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il aura lui-même mal aux dents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '*Voici que les jours viennent, déclare l''Eternel,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: où je conclurai avec la communauté d'Israël et la communauté de Juda
- type: usfm
  marker: q1
  children:
  - type: text
    text: une alliance nouvelle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Elle ne sera pas comme l'alliance que j'ai conclue avec leurs ancêtres
- type: usfm
  marker: q1
  children:
  - type: text
    text: le jour où je les ai pris par la main
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour les faire sortir d'Egypte.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eux, ils ont violé mon alliance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors que moi, j'étais leur maître, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Mais voici l'alliance que je ferai avec la communauté d'Israël
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'après ces jours-là, déclare l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je mettrai ma loi à l'intérieur d'eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je l'écrirai dans leur cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je serai leur Dieu
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils seront mon peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Personne n'enseignera plus son prochain
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ni son frère en disant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Vous devez connaître l'Eternel!»
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tous me connaîtront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: depuis le plus petit jusqu'au plus grand d'entre eux, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, je pardonnerai leur faute
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je ne me souviendrai plus de leur péché.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '31.31-34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Texte cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hébreux 8.8-13
      metadata:
        usfm: HEB.8.8+HEB.8.9+HEB.8.10+HEB.8.11+HEB.8.12+HEB.8.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' et partiellement en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hébreux 10.16-17
      metadata:
        usfm: HEB.10.16+HEB.10.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' à propos de l''alliance conclue en Jésus-Christ.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Voici ce que dit l'Eternel, celui qui a donné le soleil comme lumière du jour,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui a donné comme règle à la lune et aux étoiles d'être des lumières dans la nuit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui agite la mer et fait gronder ses vagues,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'lui dont le nom est l''Eternel, le maître de l''univers:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Il faudrait que ces lois s'interrompent devant moi, déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que la descendance d'Israël cesse aussi pour toujours d'exister en tant que nation devant moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il faudrait que le ciel, là-haut, puisse être mesuré,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que les fondations de la terre, là-dessous, puissent être explorées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que moi je rejette toute la descendance d'Israël
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de tout ce qu'ils ont fait, déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Les jours viennent, déclare l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: où la ville sera reconstruite pour l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: depuis la tour de Hananeel jusqu'à la porte de l'angle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: En face d'elle, on tendra encore le ruban à mesurer
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu'à la colline de Gareb,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puis il tournera du côté de Goath.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Toute la vallée où sont déversés les cadavres et les cendres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toutes les cultures qui s'étendent jusqu'au torrent du Cédron,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu'à l'angle de la porte des chevaux à l'est,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout sera consacré à l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne sera plus jamais ni dévasté ni détruit.
