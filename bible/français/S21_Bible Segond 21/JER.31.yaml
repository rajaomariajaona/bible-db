document_id: JER.31,152
type_code: fra
verses:
  '1':
  - type: text
    content: A ce moment-là, déclare l'Eternel,
  - type: text
    content: je serai le Dieu de toutes les familles d'Israël,
  - type: text
    content: et eux, ils seront mon peuple.
  '10':
  - type: text
    content: Nations, écoutez la parole de l'Eternel
  - type: text
    content: et annoncez-la dans les îles lointaines!
  - type: text
    content: 'Dites:'
  - type: text
    content: «Celui qui a dispersé Israël le rassemblera
  - type: text
    content: et le gardera comme un berger garde son troupeau.»
  '11':
  - type: text
    content: En effet, l'Eternel a libéré Jacob,
  - type: text
    content: il l'a racheté à celui qui était plus fort que lui.
  '12':
  - type: text
    content: Ils viendront et pousseront des cris de joie sur les hauteurs de Sion.
  - type: text
    content: 'Ils accourront vers les biens de l''Eternel:'
  - type: text
    content: le blé, le vin nouveau, l'huile,
  - type: text
    content: le petit et le gros bétail.
  - type: text
    content: Leur vie sera pareille à un jardin arrosé
  - type: text
    content: et ils ne dépériront plus.
  '13':
  - type: text
    content: Alors les jeunes filles se réjouiront en dansant,
  - type: text
    content: les jeunes hommes et les vieillards se réjouiront ensemble.
  - type: text
    content: Je changerai leur deuil en joie et je les consolerai,
  - type: text
    content: je les rendrai joyeux après leurs chagrins.
  '14':
  - type: text
    content: Je gaverai les prêtres de graisse
  - type: text
    content: et mon peuple sera rassasié grâce à mes biens, déclare l'Eternel.
  '15':
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: '*On a entendu des cris à Rama,'
  - type: text
    content: 'des lamentations et des pleurs amers:'
  - type: text
    content: c'est Rachel qui pleure ses enfants
  - type: text
    content: et n'a pas voulu être consolée à propos de ses enfants,
  - type: text
    content: parce qu'ils ne sont plus là.
  - type: note
    content: 'On a entendu… là: cité en Matthieu 2.18 en rapport avec le massacre perpétré par Hérode après la naissance de Jésus-Christ.'
  '16':
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: Retiens tes pleurs
  - type: text
    content: ainsi que les larmes de tes yeux,
  - type: text
    content: car il y aura une compensation pour ta peine, déclare l'Eternel.
  - type: text
    content: Ils reviendront du pays de l'ennemi.
  '17':
  - type: text
    content: 'Il y a de l''espoir pour ton avenir, déclare l''Eternel:'
  - type: text
    content: tes enfants reviendront dans leur territoire.
  '18':
  - type: text
    content: 'J''entends clairement Ephraïm se lamenter:'
  - type: text
    content: «Tu m'as corrigé et je me suis laissé corriger,
  - type: text
    content: pareil à un jeune taureau qui n'a pas encore été dressé.
  - type: text
    content: Fais-moi revenir et je reviendrai,
  - type: text
    content: car tu es l'Eternel, mon Dieu.
  '19':
  - type: text
    content: Revenu à de meilleures intentions, je regrette mon attitude.
  - type: text
    content: Après avoir pris conscience de mon état, je me frappe la cuisse.
  - type: text
    content: Je suis honteux, rempli d'humiliation,
  - type: text
    content: car je dois porter le déshonneur de ma jeunesse.»
  '2':
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: Il a trouvé grâce dans le désert,
  - type: text
    content: le peuple des rescapés de l'épée.
  - type: text
    content: Israël marche vers son lieu de repos.
  '20':
  - type: text
    content: Ephraïm est-il donc pour moi un fils chéri,
  - type: text
    content: un enfant qui fait mon plaisir,
  - type: text
    content: pour que chaque fois que je parle contre lui son souvenir reste si fort en moi?
  - type: text
    content: C'est que je suis profondément bouleversé quand il est question de lui,
  - type: text
    content: je ressens beaucoup de compassion pour lui, déclare l'Eternel.
  '21':
  - type: text
    content: Dresse-toi des poteaux indicateurs, place des points de repère,
  - type: text
    content: prête attention à la route, au chemin que tu as suivi!
  - type: text
    content: Reviens, jeune fille d'Israël,
  - type: text
    content: reviens dans ces villes qui t'appartiennent!
  '22':
  - type: text
    content: Jusqu'à quand resteras-tu dans l'errance,
  - type: text
    content: fille rebelle?
  - type: text
    content: 'En effet, l''Eternel crée une chose nouvelle sur la terre:'
  - type: text
    content: la femme tourne autour de l'homme.
  '23':
  - type: text
    content: 'Voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël:'
  - type: text
    content: Quand j'aurai ramené leurs déportés,
  - type: text
    content: 'on dira encore ces paroles dans le pays de Juda et dans ses villes:'
  - type: text
    content: «Que l'Eternel te bénisse, domaine de la justice,
  - type: text
    content: sainte montagne!»
  '24':
  - type: text
    content: Là s'installeront ensemble les habitants de Juda et de toutes ses villes,
  - type: text
    content: les cultivateurs et les nomades.
  '25':
  - type: text
    content: En effet, je désaltère celui qui est fatigué
  - type: text
    content: et je rassasie tous ceux qui dépérissent.
  '26':
  - type: text
    content: Là-dessus je me suis réveillé et j'ai ouvert les yeux.
  - type: text
    content: Mon sommeil m'avait fait du bien.
  '27':
  - type: text
    content: Voici que les jours viennent, déclare l'Eternel,
  - type: text
    content: où j'accorderai à la communauté d'Israël et à celle de Juda
  - type: text
    content: une foule d'hommes et de bêtes.
  '28':
  - type: text
    content: De même que j'ai veillé sur eux
  - type: text
    content: pour arracher, démolir, ruiner, détruire et faire du mal,
  - type: text
    content: de même je veillerai sur eux pour construire et pour planter,
  - type: text
    content: déclare l'Eternel.
  '29':
  - type: text
    content: 'Durant ces jours-là, on ne dira plus:'
  - type: text
    content: «Ce sont les pères qui ont mangé des raisins verts,
  - type: text
    content: mais ce sont les enfants qui ont eu mal aux dents.»
  '3':
  - type: text
    content: 'De loin, l''Eternel s''est montré à moi:'
  - type: text
    content: «Je t'aime d'un amour éternel,
  - type: text
    content: c'est pourquoi je te conserve ma bonté.»
  '30':
  - type: text
    content: Chacun mourra en raison de sa faute.
  - type: text
    content: Quand un homme mangera des raisins verts,
  - type: text
    content: il aura lui-même mal aux dents.
  '31':
  - type: text
    content: '*Voici que les jours viennent, déclare l''Eternel,'
  - type: text
    content: où je conclurai avec la communauté d'Israël et la communauté de Juda
  - type: text
    content: une alliance nouvelle.
  '32':
  - type: text
    content: Elle ne sera pas comme l'alliance que j'ai conclue avec leurs ancêtres
  - type: text
    content: le jour où je les ai pris par la main
  - type: text
    content: pour les faire sortir d'Egypte.
  - type: text
    content: Eux, ils ont violé mon alliance,
  - type: text
    content: alors que moi, j'étais leur maître, déclare l'Eternel.
  '33':
  - type: text
    content: Mais voici l'alliance que je ferai avec la communauté d'Israël
  - type: text
    content: 'après ces jours-là, déclare l''Eternel:'
  - type: text
    content: je mettrai ma loi à l'intérieur d'eux,
  - type: text
    content: je l'écrirai dans leur cœur,
  - type: text
    content: je serai leur Dieu
  - type: text
    content: et ils seront mon peuple.
  '34':
  - type: text
    content: Personne n'enseignera plus son prochain
  - type: text
    content: 'ni son frère en disant:'
  - type: text
    content: «Vous devez connaître l'Eternel!»
  - type: text
    content: car tous me connaîtront,
  - type: text
    content: depuis le plus petit jusqu'au plus grand d'entre eux, déclare l'Eternel.
  - type: text
    content: En effet, je pardonnerai leur faute
  - type: text
    content: et je ne me souviendrai plus de leur péché.
  - type: note
    content: Texte cité en Hébreux 8.8-13 et partiellement en Hébreux 10.16-17 à propos de l'alliance conclue en Jésus-Christ.
  '35':
  - type: text
    content: Voici ce que dit l'Eternel, celui qui a donné le soleil comme lumière du jour,
  - type: text
    content: qui a donné comme règle à la lune et aux étoiles d'être des lumières dans la nuit,
  - type: text
    content: qui agite la mer et fait gronder ses vagues,
  - type: text
    content: 'lui dont le nom est l''Eternel, le maître de l''univers:'
  '36':
  - type: text
    content: Il faudrait que ces lois s'interrompent devant moi, déclare l'Eternel,
  - type: text
    content: pour que la descendance d'Israël cesse aussi pour toujours d'exister en tant que nation devant moi.
  '37':
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: Il faudrait que le ciel, là-haut, puisse être mesuré,
  - type: text
    content: que les fondations de la terre, là-dessous, puissent être explorées,
  - type: text
    content: pour que moi je rejette toute la descendance d'Israël
  - type: text
    content: à cause de tout ce qu'ils ont fait, déclare l'Eternel.
  '38':
  - type: text
    content: Les jours viennent, déclare l'Eternel,
  - type: text
    content: où la ville sera reconstruite pour l'Eternel,
  - type: text
    content: depuis la tour de Hananeel jusqu'à la porte de l'angle.
  '39':
  - type: text
    content: En face d'elle, on tendra encore le ruban à mesurer
  - type: text
    content: jusqu'à la colline de Gareb,
  - type: text
    content: puis il tournera du côté de Goath.
  '4':
  - type: text
    content: Je te rétablirai encore et tu seras rétablie,
  - type: text
    content: jeune fille d'Israël!
  - type: text
    content: Tu resplendiras encore avec tes tambourins
  - type: text
    content: et tu te mêleras aux danses de ceux qui manifestent leur joie.
  '40':
  - type: text
    content: Toute la vallée où sont déversés les cadavres et les cendres,
  - type: text
    content: toutes les cultures qui s'étendent jusqu'au torrent du Cédron,
  - type: text
    content: jusqu'à l'angle de la porte des chevaux à l'est,
  - type: text
    content: tout sera consacré à l'Eternel
  - type: text
    content: et ne sera plus jamais ni dévasté ni détruit.
  '5':
  - type: text
    content: Tu planteras encore des vignes sur les montagnes de Samarie.
  - type: text
    content: Les planteurs accompliront leur tâche et profiteront de la récolte.
  '6':
  - type: text
    content: 'En effet, il y aura un jour où les gardes crieront dans la région montagneuse d''Ephraïm:'
  - type: text
    content: «Levez-vous, montons à Sion vers l'Eternel, notre Dieu!»
  '7':
  - type: text
    content: 'car voici ce que dit l''Eternel:'
  - type: text
    content: Poussez des cris de joie à propos de Jacob,
  - type: text
    content: éclatez d'allégresse avec la plus importante des nations!
  - type: text
    content: 'Faites retentir votre voix, chantez des louanges et dites:'
  - type: text
    content: «Eternel, délivre ton peuple, ce qui reste d'Israël!»
  '8':
  - type: text
    content: Je vais les ramener du pays du nord,
  - type: text
    content: je les rassemblerai des extrémités de la terre.
  - type: text
    content: Parmi eux figureront l'aveugle et le boiteux,
  - type: text
    content: la femme enceinte et celle qui accouche.
  - type: text
    content: Ensemble ils forment une grande assemblée, ils reviennent ici.
  '9':
  - type: text
    content: Ils reviennent en pleurant, mais je les conduis au milieu de leurs supplications.
  - type: text
    content: Je les conduis vers des torrents d'eau
  - type: text
    content: par un chemin tout droit où ils ne trébucheront pas.
  - type: text
    content: En effet, je suis un père pour Israël
  - type: text
    content: et Ephraïm est mon premier-né.
