document_id: JOS.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Liste des rois vaincus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici les rois que les Israélites battirent et dont ils possédèrent le pays de l'autre côté du Jourdain, du côté du soleil levant, depuis le torrent de l'Arnon jusqu'au mont Hermon, avec toute la plaine située à l'est.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il y avait Sihon, le roi des Amoréens, qui habitait à Hesbon. Il dominait sur la moitié de Galaad, depuis Aroër, qui se trouve au bord du torrent de l''Arnon, au milieu de la vallée, jusqu''au torrent du Jabbok, qui marquait la frontière avec les Ammonites; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'sur la plaine qui va jusqu''au lac de Génésareth à l''est et jusqu''à la mer de la plaine, la mer Morte, à l''est vers Beth-Jeshimoth; et, du côté du sud, sur le pied du Pisga. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il y avait aussi Og, le roi du Basan, l''un des derniers Rephaïm, qui habitait à Ashtaroth et à Edréï. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il dominait sur le mont Hermon, sur Salca, sur tout le Basan jusqu'à la frontière des Gueshuriens et des Maacathiens et sur la moitié de Galaad jusqu'à la frontière de Sihon, roi de Hesbon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Moïse, le serviteur de l'Eternel, et les Israélites les battirent. Puis Moïse, serviteur de l'Eternel, donna leur pays en possession aux Rubénites, aux Gadites et à la moitié de la tribu de Manassé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Voici les rois que Josué et les Israélites battirent de ce côté-ci du Jourdain, à l''ouest, depuis Baal-Gad dans la vallée du Liban jusqu''à la montagne pelée qui s''élève vers Séir. Josué donna leur pays en possession aux tribus d''Israël, à chacune sa portion, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: dans la montagne, dans la vallée, dans la plaine, sur les coteaux, dans le désert et dans le sud. C'était le pays des Hittites, des Amoréens, des Cananéens, des Phéréziens, des Héviens et des Jébusiens.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il y avait le roi de Jéricho, le roi d''Aï, près de Béthel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'le roi de Jérusalem, le roi d''Hébron, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'le roi de Jarmuth, le roi de Lakis, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'le roi d''Eglon, le roi de Guézer, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'le roi de Debir, le roi de Guéder, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'le roi de Horma, le roi d''Arad, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'le roi de Libna, le roi d''Adullam, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'le roi de Makkéda, le roi de Béthel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'le roi de Tappuach, le roi de Hépher, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'le roi d''Aphek, le roi de Lasharon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'le roi de Madon, le roi de Hatsor, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'le roi de Shimron-Meron, le roi d''Acshaph, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'le roi de Thaanac, le roi de Meguiddo, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'le roi de Kédesh, le roi de Jokneam, au Carmel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'le roi de Dor, sur les hauteurs de Dor, le roi de Gojim, près de Guilgal, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'le roi de Thirtsa. Nombre total de ces rois: 31.'
