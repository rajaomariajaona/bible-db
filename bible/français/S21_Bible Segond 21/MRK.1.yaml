document_id: MRK.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: De Jean-Baptiste à Jésus
  - type: heading
    content: 1.1-20
  - type: heading
    content: Ministère de Jean-Baptiste
  - type: text
    content: Voici le commencement de l'Evangile de Jésus-Christ
  - type: note
    content: 'Jésus: littéralement l''Eternel sauve, l''Eternel délivre. Christ: littéralement oint, correspond à l''hébreu qui a donné Messie. Les Juifs attendaient, d''après les promesses de l''Ancien Testament, la venue de l''oint de Dieu qui leur apporterait la délivrance.'
  - type: text
    content: ', Fils de Dieu, '
  '10':
  - type: text
    content: 'Au moment où il sortait de l''eau, il vit le ciel s''ouvrir et l''Esprit descendre sur lui comme une colombe, '
  '11':
  - type: text
    content: 'et une voix se fit entendre du ciel: «Tu es mon Fils bien-aimé, tu as toute mon approbation.»'
  '12':
  - type: text
    content: 'Aussitôt, l''Esprit poussa Jésus dans le désert '
  '13':
  - type: text
    content: où il passa 40 jours, tenté par Satan. Il était avec les bêtes sauvages et les anges le servaient.
  - type: heading
    content: Premiers disciples de Jésus
  '14':
  - type: text
    content: 'Après que Jean eut été arrêté, Jésus alla en Galilée. Il proclamait la bonne nouvelle [du royaume] de Dieu '
  '15':
  - type: text
    content: 'et disait: «Le moment est arrivé et le royaume de Dieu est proche. Changez d''attitude et croyez à la bonne nouvelle!»'
  '16':
  - type: text
    content: 'Comme il marchait le long du lac de Galilée, il vit Simon et André, frère de Simon, qui jetaient un filet dans le lac; c''étaient en effet des pêcheurs. '
  '17':
  - type: text
    content: 'Jésus leur dit: «Suivez-moi, et je ferai de vous des pêcheurs d''hommes.» '
  '18':
  - type: text
    content: 'Aussitôt, ils laissèrent leurs filets et le suivirent. '
  '19':
  - type: text
    content: 'Il alla un peu plus loin et vit Jacques, fils de Zébédée, et son frère Jean, qui étaient eux aussi dans une barque et réparaient les filets. '
  '2':
  - type: text
    content: 'conformément à ce qui est écrit dans les prophètes: '
  - type: text
    content: Voici, j'envoie mon messager devant toi pour te préparer le chemin.
  - type: text
    content: ' '
  '20':
  - type: text
    content: Aussitôt, il les appela; ils laissèrent leur père Zébédée dans la barque avec les ouvriers et le suivirent.
  - type: heading
    content: Ministère de Jésus en Galilée
  - type: heading
    content: 1.21–9.50
  - type: heading
    content: Miracles à Capernaüm
  '21':
  - type: text
    content: 'Ils se rendirent à Capernaüm. Dès le jour du sabbat, Jésus entra dans la synagogue et se mit à enseigner. '
  '22':
  - type: text
    content: On était frappé par son enseignement, car il enseignait avec autorité, et non pas comme les spécialistes de la loi.
  '23':
  - type: text
    content: 'Il y avait dans leur synagogue un homme qui avait un esprit impur. Il s''écria: '
  '24':
  - type: text
    content: '«[Ah!] Que nous veux-tu, Jésus de Nazareth? Es-tu venu pour nous perdre? Je sais qui tu es: le Saint de Dieu.» '
  '25':
  - type: text
    content: 'Jésus le menaça en disant: «Tais-toi et sors de cet homme.» '
  '26':
  - type: text
    content: 'L''esprit impur sortit de cet homme en le secouant violemment et en poussant un grand cri. '
  '27':
  - type: text
    content: 'Tous furent si effrayés qu''ils se demandaient les uns aux autres: «Qu''est-ce que ceci? Quel est ce nouvel enseignement? Il commande avec autorité même aux esprits impurs, et ils lui obéissent!» '
  '28':
  - type: text
    content: Et sa réputation gagna aussitôt toute la région de la Galilée.
  '29':
  - type: text
    content: 'En sortant de la synagogue, ils se rendirent avec Jacques et Jean à la maison de Simon et d''André. '
  '3':
  - type: text
    content: 'C''est la voix de celui qui crie dans le désert: ‘Préparez le chemin du Seigneur, rendez ses sentiers droits.’'
  - type: note
    content: 'Voici… droits: citation de Malachie 3.1 complétée par Esaïe 40.3.'
  '30':
  - type: text
    content: 'La belle-mère de Simon était couchée avec de la fièvre; aussitôt on parla d''elle à Jésus. '
  '31':
  - type: text
    content: Il s'approcha, la fit lever en lui prenant la main, et [à l'instant] la fièvre la quitta. Puis elle se mit à les servir.
  '32':
  - type: text
    content: 'Le soir, après le coucher du soleil, on lui amena tous les malades et les démoniaques. '
  '33':
  - type: text
    content: 'Toute la ville était rassemblée devant la porte. '
  '34':
  - type: text
    content: Il guérit beaucoup de personnes qui souffraient de diverses maladies; il chassa aussi beaucoup de démons, et il ne leur permettait pas de parler, parce qu'ils le connaissaient.
  - type: heading
    content: Guérisons en Galilée
  '35':
  - type: text
    content: 'Vers le matin, alors qu''il faisait encore très sombre, il se leva et sortit pour aller dans un endroit désert où il pria. '
  '36':
  - type: text
    content: 'Simon et ceux qui étaient avec lui se mirent à sa recherche; '
  '37':
  - type: text
    content: 'quand ils l''eurent trouvé, ils lui dirent: «Tout le monde te cherche.» '
  '38':
  - type: text
    content: 'Il leur répondit: «Allons [ailleurs,] dans les villages voisins, afin que j''y prêche aussi, car c''est pour cela que je suis sorti.» '
  '39':
  - type: text
    content: Et il prêchait dans leurs synagogues par toute la Galilée et chassait les démons.
  '4':
  - type: text
    content: Jean parut; il baptisait dans le désert et prêchait le baptême de repentance
  - type: note
    content: 'Repentance: désignant littéralement un changement de pensée, le mot renvoie à une transformation radicale de la personne, qui renonce à ses attitudes fautives pour adopter un nouveau comportement et une nouvelle perspective, conformes à la volonté de Dieu.'
  - type: text
    content: ' pour le pardon des péchés. '
  '40':
  - type: text
    content: 'Un lépreux vint à lui et, se jetant à genoux, lui dit en suppliant: «Si tu le veux, tu peux me rendre pur.» '
  '41':
  - type: text
    content: 'Rempli de compassion, Jésus tendit la main, le toucha et dit: «Je le veux, sois pur.» '
  '42':
  - type: text
    content: 'Aussitôt la lèpre le quitta et il fut purifié. '
  '43':
  - type: text
    content: 'Jésus le renvoya sur-le-champ avec de sévères recommandations; '
  '44':
  - type: text
    content: 'il lui dit: «Fais bien attention de ne [rien] dire à personne, mais va te montrer au prêtre et présente pour ta purification ce que Moïse a prescrit, afin que cela leur serve de témoignage.» '
  '45':
  - type: text
    content: Cependant cet homme, une fois parti, se mit à proclamer partout la nouvelle et à la propager, de sorte que Jésus ne pouvait plus entrer publiquement dans une ville. Il se tenait dehors, dans des lieux déserts, et l'on venait à lui de partout.
  '5':
  - type: text
    content: Toute la région de Judée et tous les habitants de Jérusalem se rendaient vers lui. Reconnaissant publiquement leurs péchés, ils se faisaient baptiser par lui dans l'eau du Jourdain.
  '6':
  - type: text
    content: 'Jean portait un vêtement en poil de chameau et une ceinture de cuir autour de la taille. Il se nourrissait de sauterelles et de miel sauvage. '
  '7':
  - type: text
    content: 'Il proclamait: «Après moi vient celui qui est plus puissant que moi, et je ne suis pas digne de me baisser pour détacher la courroie de ses sandales. '
  '8':
  - type: text
    content: Moi, je vous ai baptisés d'eau; lui, il vous baptisera du Saint-Esprit.»
  '9':
  - type: text
    content: 'A cette époque-là, Jésus vint de Nazareth en Galilée, et il fut baptisé par Jean dans le Jourdain. '
