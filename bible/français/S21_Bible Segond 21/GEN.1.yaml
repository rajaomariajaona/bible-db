document_id: GEN.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La création
  - type: heading
    content: 1.1–4.26
  - type: heading
    content: Création du ciel et de la terre
  - type: text
    content: 'Au commencement, Dieu créa le ciel et la terre. '
  '10':
  - type: text
    content: 'Dieu appela le sec terre, et la masse des eaux mers. Dieu vit que c''était bon. '
  '11':
  - type: text
    content: 'Puis Dieu dit: «Que la terre produise de la verdure, de l''herbe à graine, des arbres fruitiers qui donnent du fruit selon leur espèce et qui contiennent leur semence sur la terre!» Et cela se passa ainsi: '
  '12':
  - type: text
    content: 'la terre produisit de la verdure, de l''herbe à graine selon son espèce et des arbres qui donnent du fruit et contiennent leur semence selon leur espèce. Dieu vit que c''était bon. '
  '13':
  - type: text
    content: Il y eut un soir et il y eut un matin. Ce fut le troisième jour.
  '14':
  - type: text
    content: 'Dieu dit: «Qu''il y ait des luminaires dans l''étendue du ciel pour séparer le jour de la nuit! Ils serviront de signes pour marquer les époques, les jours et les années, '
  '15':
  - type: text
    content: 'ainsi que de luminaires dans l''étendue du ciel pour éclairer la terre.» Et cela se passa ainsi: '
  '16':
  - type: text
    content: 'Dieu fit les deux grands luminaires, le plus grand pour présider au jour et le plus petit pour présider à la nuit. Il fit aussi les étoiles. '
  '17':
  - type: text
    content: 'Dieu les plaça dans l''étendue du ciel pour éclairer la terre, '
  '18':
  - type: text
    content: 'pour dominer sur le jour et la nuit et pour séparer la lumière des ténèbres. Dieu vit que c''était bon. '
  '19':
  - type: text
    content: Il y eut un soir et il y eut un matin. Ce fut le quatrième jour.
  '2':
  - type: text
    content: La terre n'était que chaos et vide. Il y avait des ténèbres à la surface de l'abîme et l'Esprit de Dieu planait au-dessus de l'eau.
  '20':
  - type: text
    content: 'Dieu dit: «Que l''eau pullule d''animaux vivants et que des oiseaux volent dans le ciel au-dessus de la terre!» '
  '21':
  - type: text
    content: 'Dieu créa les grands poissons et tous les animaux vivants capables de se déplacer: l''eau en pullula selon leur espèce. Il créa aussi tous les oiseaux selon leur espèce. Dieu vit que c''était bon, '
  '22':
  - type: text
    content: 'et il les bénit en disant: «Reproduisez-vous, devenez nombreux et remplissez les mers, et que les oiseaux se multiplient sur la terre!» '
  '23':
  - type: text
    content: Il y eut un soir et il y eut un matin. Ce fut le cinquième jour.
  '24':
  - type: text
    content: 'Dieu dit: «Que la terre produise des animaux vivants selon leur espèce: du bétail, des reptiles et des animaux terrestres selon leur espèce.» Et cela se passa ainsi. '
  '25':
  - type: text
    content: Dieu fit les animaux terrestres selon leur espèce, le bétail selon son espèce et tous les reptiles de la terre selon leur espèce. Dieu vit que c'était bon.
  - type: heading
    content: Création de l'être humain et repos
  '26':
  - type: text
    content: 'Puis Dieu dit: «Faisons l''homme à notre image, à notre ressemblance! Qu''il domine sur les poissons de la mer, sur les oiseaux du ciel, sur le bétail, sur toute la terre et sur tous les reptiles qui rampent sur la terre.» '
  '27':
  - type: text
    content: Dieu créa l'homme à son image, il le créa à l'image de Dieu. *Il créa l'homme et la femme.
  - type: note
    content: 'Il créa l''homme et la femme: repris en 5.2 et cité en Matthieu 19.4; Marc 10.6.'
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Dieu les bénit et leur dit: «Reproduisez-vous, devenez nombreux, remplissez la terre et soumettez-la! Dominez sur les poissons de la mer, sur les oiseaux du ciel et sur tout animal qui se déplace sur la terre!» '
  '29':
  - type: text
    content: 'Dieu dit aussi: «Je vous donne toute herbe à graine sur toute la surface de la terre, ainsi que tout arbre portant des fruits avec pépins ou noyau: ce sera votre nourriture. '
  '3':
  - type: text
    content: 'Dieu dit: «Qu''il y ait de la lumière!» et il y eut de la lumière. '
  '30':
  - type: text
    content: 'A tout animal de la terre, à tout oiseau du ciel et à tout ce qui se déplace sur la terre, à ce qui est animé de vie, je donne toute herbe verte pour nourriture.» Et cela se passa ainsi. '
  '31':
  - type: text
    content: Dieu regarda tout ce qu'il avait fait, et il constata que c'était très bon. Il y eut un soir et il y eut un matin. Ce fut le sixième jour.
  '4':
  - type: text
    content: 'Dieu vit que la lumière était bonne, et il sépara la lumière des ténèbres. '
  '5':
  - type: text
    content: Dieu appela la lumière jour, et les ténèbres nuit. Il y eut un soir et il y eut un matin. Ce fut le premier jour.
  '6':
  - type: text
    content: 'Dieu dit: «Qu''il y ait une étendue entre les eaux pour les séparer les unes des autres!» '
  '7':
  - type: text
    content: 'Dieu fit l''étendue et sépara ainsi l''eau qui est au-dessous de l''étendue de celle qui est au-dessus. Cela se passa ainsi. '
  '8':
  - type: text
    content: Dieu appela l'étendue ciel. Il y eut un soir et il y eut un matin. Ce fut le deuxième jour.
  '9':
  - type: text
    content: 'Dieu dit: «Que les eaux qui sont au-dessous du ciel se rassemblent à un seul endroit et que le sec apparaisse!» Et cela se passa ainsi. '
