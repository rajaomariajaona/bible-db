document_id: JOB.19,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Intervention n° 6 de Job
  - type: text
    content: 'Job prit la parole et dit:'
  '10':
  - type: text
    content: Il m'a brisé à tout point de vue et je m'en vais,
  - type: text
    content: il a arraché mon espérance comme un arbre.
  '11':
  - type: text
    content: Il s'est enflammé de colère contre moi,
  - type: text
    content: il m'a traité comme l'un de ses adversaires.
  '12':
  - type: text
    content: Ses troupes viennent en masse,
  - type: text
    content: elles ont construit une route jusqu'à moi,
  - type: text
    content: elles ont installé leur camp autour de ma tente.
  '13':
  - type: text
    content: »Il a éloigné mes frères de moi.
  - type: text
    content: Ceux qui me connaissent se détournent de moi comme des étrangers.
  '14':
  - type: text
    content: Je suis abandonné de mes proches,
  - type: text
    content: ceux que je connais m'oublient.
  '15':
  - type: text
    content: Ceux qui séjournent chez moi et mes servantes me considèrent comme un étranger,
  - type: text
    content: je ne suis plus à leurs yeux qu'un inconnu.
  '16':
  - type: text
    content: J'appelle mon serviteur et il ne répond pas,
  - type: text
    content: je dois me mettre à le supplier.
  '17':
  - type: text
    content: Mon haleine est repoussante pour ma femme
  - type: text
    content: et je provoque le dégoût de mes propres frères.
  '18':
  - type: text
    content: Même des gamins me méprisent;
  - type: text
    content: si je me lève, je suis la cible de leurs insultes.
  '19':
  - type: text
    content: Tous ceux à qui je confiais mes secrets m'ont en horreur,
  - type: text
    content: ceux que j'aimais se sont tournés contre moi.
  '2':
  - type: text
    content: «Jusqu'à quand me tourmenterez-vous
  - type: text
    content: et m'écraserez-vous par vos discours?
  '20':
  - type: text
    content: Je n'ai plus que la peau et les os,
  - type: text
    content: il ne me reste que les gencives.
  '21':
  - type: text
    content: »Ayez pitié, ayez pitié de moi, vous, mes amis!
  - type: text
    content: En effet, c'est la main de Dieu qui m'a frappé.
  '22':
  - type: text
    content: Pourquoi me poursuivez-vous comme Dieu le fait?
  - type: text
    content: Pourquoi n'en avez-vous jamais assez de vous attaquer à moi?
  '23':
  - type: text
    content: »Si seulement mes paroles pouvaient être écrites,
  - type: text
    content: si seulement elles pouvaient être enregistrées dans un livre!
  '24':
  - type: text
    content: Je voudrais qu'elles soient pour toujours gravées dans le roc
  - type: text
    content: avec un burin de fer et avec du plomb.
  '25':
  - type: text
    content: »Pour ma part, je sais que celui qui me rachète est vivant
  - type: text
    content: et qu'il se lèvera le dernier sur la terre.
  '26':
  - type: text
    content: Quand ma peau aura été détruite, en personne je contemplerai Dieu.
  '27':
  - type: text
    content: C'est lui que je contemplerai, et il me sera favorable.
  - type: text
    content: Mes yeux le verront, et non ceux d'un autre.
  - type: text
    content: Au plus profond de moi, je n'en peux plus d'attendre.
  '28':
  - type: text
    content: '»Vous direz alors: ‘Pourquoi le poursuivions-nous?’'
  - type: text
    content: quand on découvrira le bien-fondé de ma cause.
  '29':
  - type: text
    content: 'Redoutez pour vous l''épée:'
  - type: text
    content: les punitions par l'épée sont terribles!
  - type: text
    content: Vous reconnaîtrez ainsi qu'il y a un jugement.»
  '3':
  - type: text
    content: Voilà dix fois que vous cherchez à me confondre.
  - type: text
    content: N'avez-vous pas honte de m'agresser de cette manière?
  '4':
  - type: text
    content: »Même si j'avais vraiment commis une faute,
  - type: text
    content: cela ne regarderait que moi.
  '5':
  - type: text
    content: Si vous voulez vous grandir à mes dépens,
  - type: text
    content: si vous voulez tirer argument contre moi de mon déshonneur,
  '6':
  - type: text
    content: sachez alors que c'est Dieu qui m'accable
  - type: text
    content: et m'enveloppe de son filet.
  '7':
  - type: text
    content: »Je dénonce la violence dont je suis victime et personne ne répond,
  - type: text
    content: j'appelle au secours et il n'y a personne pour me rendre justice!
  '8':
  - type: text
    content: Il m'a barré la route et je ne peux passer,
  - type: text
    content: il a couvert mes sentiers de ténèbres.
  '9':
  - type: text
    content: Il m'a dépouillé de ma gloire,
  - type: text
    content: il a retiré la couronne de ma tête.
