document_id: JOB.19
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Intervention n° 6 de Job
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Job prit la parole et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Jusqu'à quand me tourmenterez-vous
- type: usfm
  marker: q1
  children:
  - type: text
    text: et m'écraserez-vous par vos discours?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Voilà dix fois que vous cherchez à me confondre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: N'avez-vous pas honte de m'agresser de cette manière?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: »Même si j'avais vraiment commis une faute,
- type: usfm
  marker: q1
  children:
  - type: text
    text: cela ne regarderait que moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Si vous voulez vous grandir à mes dépens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si vous voulez tirer argument contre moi de mon déshonneur,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: sachez alors que c'est Dieu qui m'accable
- type: usfm
  marker: q1
  children:
  - type: text
    text: et m'enveloppe de son filet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: »Je dénonce la violence dont je suis victime et personne ne répond,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'appelle au secours et il n'y a personne pour me rendre justice!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il m'a barré la route et je ne peux passer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a couvert mes sentiers de ténèbres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il m'a dépouillé de ma gloire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a retiré la couronne de ma tête.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il m'a brisé à tout point de vue et je m'en vais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a arraché mon espérance comme un arbre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il s'est enflammé de colère contre moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il m'a traité comme l'un de ses adversaires.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ses troupes viennent en masse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles ont construit une route jusqu'à moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles ont installé leur camp autour de ma tente.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: »Il a éloigné mes frères de moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ceux qui me connaissent se détournent de moi comme des étrangers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je suis abandonné de mes proches,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux que je connais m'oublient.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ceux qui séjournent chez moi et mes servantes me considèrent comme un étranger,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne suis plus à leurs yeux qu'un inconnu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: J'appelle mon serviteur et il ne répond pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je dois me mettre à le supplier.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mon haleine est repoussante pour ma femme
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je provoque le dégoût de mes propres frères.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Même des gamins me méprisent;
- type: usfm
  marker: q1
  children:
  - type: text
    text: si je me lève, je suis la cible de leurs insultes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tous ceux à qui je confiais mes secrets m'ont en horreur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ceux que j'aimais se sont tournés contre moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Je n'ai plus que la peau et les os,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne me reste que les gencives.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: »Ayez pitié, ayez pitié de moi, vous, mes amis!
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, c'est la main de Dieu qui m'a frappé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Pourquoi me poursuivez-vous comme Dieu le fait?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi n'en avez-vous jamais assez de vous attaquer à moi?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: »Si seulement mes paroles pouvaient être écrites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si seulement elles pouvaient être enregistrées dans un livre!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Je voudrais qu'elles soient pour toujours gravées dans le roc
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec un burin de fer et avec du plomb.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: »Pour ma part, je sais que celui qui me rachète est vivant
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qu'il se lèvera le dernier sur la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Quand ma peau aura été détruite, en personne je contemplerai Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: C'est lui que je contemplerai, et il me sera favorable.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mes yeux le verront, et non ceux d'un autre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au plus profond de moi, je n'en peux plus d'attendre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '»Vous direz alors: ‘Pourquoi le poursuivions-nous?’'
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand on découvrira le bien-fondé de ma cause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Redoutez pour vous l''épée:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: les punitions par l'épée sont terribles!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous reconnaîtrez ainsi qu'il y a un jugement.»
