document_id: JOS.1,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Conquête du pays promis
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 1.1–12.24
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Josué à la tête d'Israël
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après la mort de Moïse, le serviteur de l''Eternel, l''Eternel dit à Josué, fils de Nun et assistant de Moïse: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué donna cet ordre aux officiers du peuple: '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Parcourez le camp, et voici ce que vous ordonnerez au peuple: ‘Préparez-vous des provisions, car dans trois jours vous passerez le Jourdain pour aller conquérir le pays dont l''Eternel, votre Dieu, vous donne la possession.’»'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué dit aux Rubénites, aux Gadites et à la demi-tribu de Manassé: '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Rappelez-vous ce que vous a prescrit Moïse, le serviteur de l''Eternel, quand il a dit: ‘L''Eternel, votre Dieu, vous a accordé du repos et vous a donné ce pays.’ '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vos femmes, vos petits enfants et vos troupeaux resteront dans le pays que vous a donné Moïse de ce côté-ci du Jourdain; mais vous tous, les hommes vaillants, vous passerez en ordre de bataille devant vos frères et vous les aiderez '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'jusqu''à ce que l''Eternel ait accordé du repos à vos frères comme à vous et qu''ils soient aussi en possession du pays que l''Eternel, votre Dieu, leur donne. Alors vous reviendrez prendre possession du pays qui est votre propriété et que Moïse, le serviteur de l''Eternel, vous a donné de ce côté-ci du Jourdain, à l''est.» '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils répondirent à Josué: «Nous ferons tout ce que tu nous as ordonné et nous irons partout où tu nous enverras. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous t''obéirons entièrement, comme nous avons obéi à Moïse. Que l''Eternel, ton Dieu, veuille seulement être avec toi comme il a été avec Moïse! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tout homme qui sera rebelle à ton ordre et qui n'obéira pas à tout ce que tu lui ordonneras sera puni de mort. Seulement, fortifie-toi et prends courage!»
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Mon serviteur Moïse est mort. Maintenant, lève-toi, passe le Jourdain avec tout ce peuple pour entrer dans le pays que je donne aux Israélites. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout lieu que foulera la plante de votre pied, je vous le donne, comme je l''ai dit à Moïse. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Votre territoire ira depuis le désert et le Liban jusqu''au grand fleuve, jusqu''à l''Euphrate, tout le pays des Hittites et jusqu''à la mer Méditerranée vers le soleil couchant. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Personne ne pourra te résister tant que tu vivras. Je serai avec toi comme j'ai été avec Moïse. *Je ne te délaisserai pas et je ne t'abandonnerai pas.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je ne… t''abandonnerai pas: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'reprise de la promesse de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deutéronome 31.8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' citée en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hébreux 13.5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Fortifie-toi et prends courage, car c''est toi qui mettras ce peuple en possession du pays que j''ai juré à leurs ancêtres de leur donner. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Seulement, fortifie-toi et aie bon courage en te conformant fidèlement à toute la loi que Moïse, mon serviteur, t''a prescrite. Ne t''en écarte ni à droite ni à gauche afin de réussir où que tu ailles. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que ce livre de la loi ne s''éloigne pas de toi! Médite-le jour et nuit pour agir avec fidélité conformément à tout ce qui y est écrit, car c''est alors que tu auras du succès dans tes entreprises, c''est alors que tu réussiras. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne t''ai-je pas ordonné: ‘Fortifie-toi et prends courage’? Ne sois pas effrayé ni épouvanté, car l''Eternel, ton Dieu, est avec toi où que tu ailles.»'
