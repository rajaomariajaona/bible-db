document_id: JOB.32,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Intervention d'Elihu
  - type: heading
    content: 32.1–37.24
  - type: heading
    content: Reproches à Job et à ses amis
  - type: text
    content: 'Ces trois hommes cessèrent de répondre à Job parce qu''il se considérait comme juste. '
  '10':
  - type: text
    content: 'Voilà pourquoi je dis: ‘Ecoute-moi!'
  - type: text
    content: Moi aussi, je vais exprimer mon opinion.’
  '11':
  - type: text
    content: »J'ai attendu la fin de vos discours,
  - type: text
    content: j'ai prêté l'oreille à vos raisonnements
  - type: text
    content: jusqu'à ce que vous ayez fait le tour de la question.
  '12':
  - type: text
    content: Je vous ai accordé toute mon attention,
  - type: text
    content: et je constate qu'aucun de vous ne l'a convaincu,
  - type: text
    content: pas un de vous n'a répondu à ses propos.
  '13':
  - type: text
    content: 'Ne dites pas cependant:'
  - type: text
    content: '‘Nous avons trouvé la sagesse:'
  - type: text
    content: c'est Dieu qui peut le confondre, et non un homme!’
  '14':
  - type: text
    content: »Il ne s'est pas adressé directement à moi,
  - type: text
    content: aussi lui répondrai-je tout autrement que vous.
  '15':
  - type: text
    content: Ils sont effrayés, ils ne répondent plus!
  - type: text
    content: Les mots leur manquent!
  '16':
  - type: text
    content: J'ai attendu qu'ils aient fini leurs discours.
  - type: text
    content: Puisqu'ils s'arrêtent et ne savent que répliquer,
  '17':
  - type: text
    content: à mon tour je vais répondre,
  - type: text
    content: moi aussi je vais exprimer mon opinion.
  '18':
  - type: text
    content: En effet, je suis rempli de paroles,
  - type: text
    content: mon esprit me presse.
  '19':
  - type: text
    content: A l'intérieur de moi, c'est comme du vin sous pression,
  - type: text
    content: comme des outres neuves prêtes à éclater.
  '2':
  - type: text
    content: 'Alors Elihu, fils de Barakeel, originaire de Buz et membre du clan de Ram, se mit en colère. Il se mit en colère contre Job parce qu''il se prétendait juste devant Dieu, '
  '20':
  - type: text
    content: Je dois parler pour me soulager,
  - type: text
    content: je dois ouvrir mes lèvres pour répondre.
  '21':
  - type: text
    content: Je ne ferai preuve d'aucun favoritisme
  - type: text
    content: et je ne flatterai personne.
  '22':
  - type: text
    content: 'De fait, je ne sais pas flatter:'
  - type: text
    content: mon créateur m'enlèverait bien vite.
  '3':
  - type: text
    content: 'et il se mit en colère contre ses trois amis parce qu''ils ne trouvaient rien à répondre et condamnaient ainsi Dieu. '
  '4':
  - type: text
    content: 'Comme ils étaient plus âgés que lui, Elihu avait attendu jusqu''à ce moment pour parler à Job. '
  '5':
  - type: text
    content: Lorsqu'il vit que les trois hommes n'avaient plus rien à dire, il se mit en colère.
  '6':
  - type: text
    content: 'Elihu, fils de Barakeel, originaire de Buz, prit la parole et dit:'
  - type: text
    content: «Je suis jeune et vous êtes des vieillards.
  - type: text
    content: Voilà pourquoi j'étais intimidé et j'avais peur
  - type: text
    content: de vous exprimer mon opinion.
  '7':
  - type: text
    content: 'Je me disais: ‘L''expérience parlera,'
  - type: text
    content: le grand nombre d'années fera connaître la sagesse.’
  '8':
  - type: text
    content: Mais en réalité, dans l'homme, c'est l'Esprit
  - type: note
    content: 'L''Esprit: ou l''esprit.'
  - type: text
    content: ','
  - type: text
    content: le souffle du Tout-Puissant qui donne la capacité de comprendre.
  '9':
  - type: text
    content: Ce n'est pas le grand nombre d'années qui procure la sagesse,
  - type: text
    content: ce n'est pas la vieillesse qui permet de discerner ce qui est juste.
