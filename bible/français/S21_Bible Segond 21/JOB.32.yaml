document_id: JOB.32
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Intervention d'Elihu
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 32.1–37.24
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Reproches à Job et à ses amis
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ces trois hommes cessèrent de répondre à Job parce qu''il se considérait comme juste. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Alors Elihu, fils de Barakeel, originaire de Buz et membre du clan de Ram, se mit en colère. Il se mit en colère contre Job parce qu''il se prétendait juste devant Dieu, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'et il se mit en colère contre ses trois amis parce qu''ils ne trouvaient rien à répondre et condamnaient ainsi Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Comme ils étaient plus âgés que lui, Elihu avait attendu jusqu''à ce moment pour parler à Job. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Lorsqu'il vit que les trois hommes n'avaient plus rien à dire, il se mit en colère.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Elihu, fils de Barakeel, originaire de Buz, prit la parole et dit:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Je suis jeune et vous êtes des vieillards.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voilà pourquoi j'étais intimidé et j'avais peur
- type: usfm
  marker: q1
  children:
  - type: text
    text: de vous exprimer mon opinion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Je me disais: ‘L''expérience parlera,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: le grand nombre d'années fera connaître la sagesse.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mais en réalité, dans l'homme, c'est l'Esprit
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''Esprit: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ou l'esprit.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: le souffle du Tout-Puissant qui donne la capacité de comprendre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ce n'est pas le grand nombre d'années qui procure la sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce n'est pas la vieillesse qui permet de discerner ce qui est juste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Voilà pourquoi je dis: ‘Ecoute-moi!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi aussi, je vais exprimer mon opinion.’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: »J'ai attendu la fin de vos discours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ai prêté l'oreille à vos raisonnements
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu'à ce que vous ayez fait le tour de la question.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je vous ai accordé toute mon attention,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je constate qu'aucun de vous ne l'a convaincu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pas un de vous n'a répondu à ses propos.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Ne dites pas cependant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: '‘Nous avons trouvé la sagesse:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est Dieu qui peut le confondre, et non un homme!’
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: »Il ne s'est pas adressé directement à moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aussi lui répondrai-je tout autrement que vous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ils sont effrayés, ils ne répondent plus!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les mots leur manquent!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: J'ai attendu qu'ils aient fini leurs discours.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puisqu'ils s'arrêtent et ne savent que répliquer,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: à mon tour je vais répondre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: moi aussi je vais exprimer mon opinion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: En effet, je suis rempli de paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon esprit me presse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: A l'intérieur de moi, c'est comme du vin sous pression,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme des outres neuves prêtes à éclater.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Je dois parler pour me soulager,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je dois ouvrir mes lèvres pour répondre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Je ne ferai preuve d'aucun favoritisme
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je ne flatterai personne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'De fait, je ne sais pas flatter:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon créateur m'enlèverait bien vite.
