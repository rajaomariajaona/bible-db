document_id: 1CO.14,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Objectif et exercice des dons
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Recherchez l'amour. Aspirez aussi aux dons spirituels, mais surtout à la prophétie.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si nombreuses que puissent être les diverses langues dans le monde, aucune [d''entre elles] n''est dépourvue de signification. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si donc je ne connais pas le sens d''une langue, je serai un étranger pour celui qui parle, et celui qui parle sera un étranger pour moi. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous de même, puisque vous aspirez aux dons spirituels, cherchez à posséder avec abondance ceux qui édifient l'Eglise!
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est pourquoi, que celui qui parle en langue prie afin de pouvoir interpréter. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, si je prie en langue, mon esprit est en prière, mais mon intelligence est stérile. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que faire donc? Je prierai avec mon esprit, mais je prierai aussi avec mon intelligence; je chanterai avec mon esprit, mais je chanterai aussi avec mon intelligence. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, si tu prononces une bénédiction avec ton esprit seulement, comment celui qui fait partie des simples auditeurs pourra-t-il répondre «Amen!» à ta prière de reconnaissance, puisqu''il ne sait pas ce que tu dis? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Certes, tu prononces une belle prière de reconnaissance, mais l''autre n''est pas édifié. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je remercie [mon] Dieu de ce que je parle en langues plus que vous tous. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais, dans l'Eglise, j'aime mieux dire 5 paroles avec mon intelligence afin d'instruire aussi les autres, plutôt que 10'000 paroles en langue.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, celui qui parle en langue ne parle pas aux hommes mais à Dieu, car personne ne le comprend, et c''est en esprit qu''il dit des paroles mystérieuses. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Frères et sœurs, ne raisonnez pas comme des enfants. Au contraire, pour le mal, soyez des bébés, mais par rapport au raisonnement, soyez des adultes. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il est écrit dans la loi: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: C'est par des hommes d'une autre langue et par des lèvres étrangères que je parlerai à ce peuple, et même ainsi, ils ne m'écouteront pas
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'C''est par… m''écouteront pas: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 28.11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', dit le Seigneur.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Par conséquent, les langues sont un signe non pour les croyants, mais pour les non-croyants; la prophétie, quant à elle, est un signe non pour les non-croyants, mais pour les croyants. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si donc, alors que l''Eglise entière est rassemblée, tous parlent en langues et qu''il entre de simples auditeurs ou des non-croyants, ne diront-ils pas que vous êtes fous? '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En revanche, si tous prophétisent et qu''un non-croyant ou un simple auditeur entre, il est convaincu de péché par tous, il est jugé par tous; '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '[ainsi] les secrets de son cœur sont dévoilés, et il tombera alors le visage contre terre pour adorer Dieu en déclarant que '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Dieu est réellement au milieu de vous
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dieu est… vous: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 45.14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' qui prophétise cette réaction de la part des peuples étrangers vis-à-vis d''Israël.'
      marker-yv: yv-n
    - type: text
      text: .
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Que faire donc, frères et sœurs? Lorsque vous vous réunissez, chacun [de vous] peut apporter un cantique, un enseignement, une révélation, une langue ou une interprétation. Que tout se fasse pour l''édification. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Y en a-t-il qui parlent en langue, que deux ou trois au plus parlent, chacun à son tour, et que quelqu''un interprète. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S''il n''y a pas d''interprète, qu''on se taise dans l''Eglise et qu''on parle à soi-même et à Dieu. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant aux prophètes, que deux ou trois parlent, et que les autres évaluent leur message. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui prophétise, au contraire, parle aux hommes, les édifie, les encourage, les réconforte. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et si un autre membre de l''assistance a une révélation, que le premier se taise. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, vous pouvez tous prophétiser l'un après l'autre, afin que tous soient instruits et que tous soient encouragés.
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''esprit des prophètes est soumis aux prophètes, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car Dieu n''est pas un Dieu de désordre, mais de paix. Comme dans toutes les Eglises des saints, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'que vos femmes se taisent dans les assemblées, car il ne leur est pas permis d''y parler, mais elles doivent se soumettre, comme le dit aussi la loi. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si elles veulent s''instruire sur quelque chose, qu''elles interrogent leur mari à la maison, car il est inconvenant pour une femme de parler dans l''Eglise. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Serait-ce de chez vous que la parole de Dieu est sortie? Ou est-ce à vous seuls qu'elle est parvenue?
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si quelqu''un croit être prophète ou dirigé par l''Esprit, qu''il reconnaisse dans ce que je vous écris un commandement du Seigneur. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et si quelqu'un l'ignore, qu'il l'ignore!
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi donc, frères et sœurs, aspirez au don de prophétie et n''empêchez pas de parler en langues, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Celui qui parle en langue s'édifie lui-même, alors que celui qui prophétise édifie l'Eglise.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mais que tout se fasse convenablement et avec ordre.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je désire que vous parliez tous en langues, mais encore plus que vous prophétisiez. Celui qui prophétise est plus important que celui qui parle en langues, à moins que ce dernier n''interprète pour que l''Eglise reçoive une édification. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et maintenant, frères et sœurs, en quoi vous serais-je utile si je venais chez vous en parlant en langues au lieu de vous apporter une parole de révélation, de connaissance, de prophétie ou d'enseignement?
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si les objets inanimés qui rendent un son, comme une flûte ou une harpe, ne rendent pas des sons distincts, comment reconnaîtra-t-on la mélodie jouée sur eux? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et si la trompette rend un son confus, qui se préparera au combat? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il en va de même pour vous: si votre langue ne donne pas une parole intelligible, comment saura-t-on ce que vous dites? En effet, vous parlerez en l''air.'
