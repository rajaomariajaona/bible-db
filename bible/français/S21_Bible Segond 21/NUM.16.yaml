document_id: NUM.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Révolte de Koré, Dathan et Abiram
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Koré, fils de Jitsehar et descendant de Kehath, le fils de Lévi, se révolta avec Dathan et Abiram, fils d''Eliab, et On, fils de Péleth, tous trois rubénites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ils se soulevèrent contre Moïse avec 250 Israélites, des princes de l''assemblée, de ceux que l''on convoquait à l''assemblée et qui étaient des hommes respectés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ils se rassemblèrent contre Moïse et Aaron et leur dirent: «En voilà assez! En effet, tous les membres de l''assemblée sont saints et l''Eternel est au milieu d''eux. Pourquoi vous élevez-vous au-dessus de l''assemblée de l''Eternel?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Quand Moïse eut entendu cela, il tomba le visage contre terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il dit à Koré et à toute sa bande: «Demain matin, *l''Eternel fera connaître qui lui appartient'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''Eternel… appartient: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Timothée 2.19
      metadata:
        usfm: 2TI.2.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' d''après la Septante.'
    marker-yv: yv-n
  - type: text
    text: ' et qui est saint, et il le fera approcher de lui. Il fera approcher de lui celui qu''il choisira. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Faites ceci: prenez des brûle-parfums, Koré et toute sa bande; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'demain, mettez-y du feu et déposez-y du parfum devant l''Eternel. Celui que l''Eternel choisira, c''est celui qui est saint. En voilà assez, descendants de Lévi!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Moïse dit à Koré: «Ecoutez donc, descendants de Lévi! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Cela ne vous suffit-il pas que le Dieu d''Israël vous ait choisis dans l''assemblée d''Israël pour vous faire approcher de lui, afin que vous soyez employés au service du tabernacle de l''Eternel et que vous vous présentiez devant l''assemblée pour la servir? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il vous a fait approcher de lui, toi et tous tes frères, les descendants de Lévi, et vous voulez encore remplir la fonction de prêtre! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: C'est à cause de cela que toi et toute ta bande, vous vous liguez contre l'Eternel! En effet, qui est Aaron pour que vous murmuriez contre lui?»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Moïse fit appeler Dathan et Abiram, fils d''Eliab, mais ils dirent: «Nous ne monterons pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Cela ne suffit-il pas que tu nous aies fait sortir d''un pays où coulent le lait et le miel pour nous faire mourir au désert? Faut-il encore que tu domines sur nous? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Ce n'est pas dans un pays où coulent le lait et le miel que tu nous as conduits, ce ne sont pas des champs et des vignes que tu nous as donnés en possession. Penses-tu pouvoir rendre ces gens aveugles? Nous ne viendrons pas.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Moïse fut très irrité et dit à l''Eternel: «Ne prête pas attention à leur offrande. Je ne leur ai pas même pris un âne et je n''ai fait de mal à aucun d''eux.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Moïse dit à Koré: «Toi et toute ta bande, tenez-vous demain devant l''Eternel, toi et eux, ainsi qu''Aaron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Prenez chacun votre brûle-parfum, mettez-y du parfum et présentez chacun votre brûle-parfum devant l''Eternel. Il y aura 250 brûle-parfums; Aaron et toi, vous prendrez aussi chacun le vôtre.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils prirent chacun leur brûle-parfum, y mirent du feu et y déposèrent du parfum, et ils se tinrent à l''entrée de la tente de la rencontre avec Moïse et Aaron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Koré convoqua toute l''assemblée contre Moïse et Aaron, à l''entrée de la tente de la rencontre. Alors la gloire de l''Eternel apparut à toute l''assemblée, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'et l''Eternel dit à Moïse et à Aaron: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '«Séparez-vous de cette assemblée, que je les détruise en un instant.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ils tombèrent le visage contre terre et dirent: «O Dieu, Dieu qui donnes le souffle à toute créature! Un seul homme a péché et c''est contre toute l''assemblée que tu t''irriterais?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: «Ordonne à l'assemblée de se retirer loin de l'habitation de Koré, de Dathan et d'Abiram.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Moïse se leva et alla vers Dathan et Abiram, suivi des anciens d''Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il dit à l''assemblée: «Eloignez-vous de la tente de ces méchants hommes et ne touchez à rien de ce qui leur appartient. Sinon vous seriez vous aussi supprimés à cause de tous leurs péchés.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ils se retirèrent loin de l'habitation de Koré, de Dathan et d'Abiram. Dathan et Abiram sortirent et se tinrent à l'entrée de leur tente avec leur femme, leurs fils et leurs petits-enfants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Moïse dit: «Voici comment vous reconnaîtrez que c''est l''Eternel qui m''a envoyé pour accomplir toutes ces choses et que je n''agis pas de ma propre initiative: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'si ces gens meurent comme le reste des hommes, s''ils subissent le sort commun à tous les hommes, ce n''est pas l''Eternel qui m''a envoyé; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: en revanche, si l'Eternel accomplit un acte extraordinaire, si la terre s'entrouvre pour les engloutir avec tout ce qui leur appartient et qu'ils descendent vivants dans le séjour des morts, vous saurez alors que ces gens ont méprisé l'Eternel.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Il finissait de prononcer toutes ces paroles lorsque le sol se fendit sous eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'La terre s''entrouvrit et les engloutit, eux et leur famille, avec tous les partisans de Koré et tous leurs biens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ils descendirent vivants dans le séjour des morts, eux et tout ce qui leur appartenait. La terre les recouvrit et ils disparurent du milieu de l''assemblée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Tous les Israélites qui étaient autour d''eux s''enfuirent à leur cri. Ils se disaient en effet: «Fuyons, sinon la terre nous engloutira!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Un feu jaillit, venu de l'Eternel, et dévora les 250 hommes qui offraient le parfum.
