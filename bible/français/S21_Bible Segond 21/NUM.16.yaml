document_id: NUM.16,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Révolte de Koré, Dathan et Abiram
  - type: text
    content: 'Koré, fils de Jitsehar et descendant de Kehath, le fils de Lévi, se révolta avec Dathan et Abiram, fils d''Eliab, et On, fils de Péleth, tous trois rubénites. '
  '10':
  - type: text
    content: 'Il vous a fait approcher de lui, toi et tous tes frères, les descendants de Lévi, et vous voulez encore remplir la fonction de prêtre! '
  '11':
  - type: text
    content: C'est à cause de cela que toi et toute ta bande, vous vous liguez contre l'Eternel! En effet, qui est Aaron pour que vous murmuriez contre lui?»
  '12':
  - type: text
    content: 'Moïse fit appeler Dathan et Abiram, fils d''Eliab, mais ils dirent: «Nous ne monterons pas. '
  '13':
  - type: text
    content: 'Cela ne suffit-il pas que tu nous aies fait sortir d''un pays où coulent le lait et le miel pour nous faire mourir au désert? Faut-il encore que tu domines sur nous? '
  '14':
  - type: text
    content: Ce n'est pas dans un pays où coulent le lait et le miel que tu nous as conduits, ce ne sont pas des champs et des vignes que tu nous as donnés en possession. Penses-tu pouvoir rendre ces gens aveugles? Nous ne viendrons pas.»
  '15':
  - type: text
    content: 'Moïse fut très irrité et dit à l''Eternel: «Ne prête pas attention à leur offrande. Je ne leur ai pas même pris un âne et je n''ai fait de mal à aucun d''eux.»'
  '16':
  - type: text
    content: 'Moïse dit à Koré: «Toi et toute ta bande, tenez-vous demain devant l''Eternel, toi et eux, ainsi qu''Aaron. '
  '17':
  - type: text
    content: 'Prenez chacun votre brûle-parfum, mettez-y du parfum et présentez chacun votre brûle-parfum devant l''Eternel. Il y aura 250 brûle-parfums; Aaron et toi, vous prendrez aussi chacun le vôtre.» '
  '18':
  - type: text
    content: 'Ils prirent chacun leur brûle-parfum, y mirent du feu et y déposèrent du parfum, et ils se tinrent à l''entrée de la tente de la rencontre avec Moïse et Aaron. '
  '19':
  - type: text
    content: 'Koré convoqua toute l''assemblée contre Moïse et Aaron, à l''entrée de la tente de la rencontre. Alors la gloire de l''Eternel apparut à toute l''assemblée, '
  '2':
  - type: text
    content: 'Ils se soulevèrent contre Moïse avec 250 Israélites, des princes de l''assemblée, de ceux que l''on convoquait à l''assemblée et qui étaient des hommes respectés. '
  '20':
  - type: text
    content: 'et l''Eternel dit à Moïse et à Aaron: '
  '21':
  - type: text
    content: '«Séparez-vous de cette assemblée, que je les détruise en un instant.» '
  '22':
  - type: text
    content: 'Ils tombèrent le visage contre terre et dirent: «O Dieu, Dieu qui donnes le souffle à toute créature! Un seul homme a péché et c''est contre toute l''assemblée que tu t''irriterais?» '
  '23':
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '24':
  - type: text
    content: «Ordonne à l'assemblée de se retirer loin de l'habitation de Koré, de Dathan et d'Abiram.»
  '25':
  - type: text
    content: 'Moïse se leva et alla vers Dathan et Abiram, suivi des anciens d''Israël. '
  '26':
  - type: text
    content: 'Il dit à l''assemblée: «Eloignez-vous de la tente de ces méchants hommes et ne touchez à rien de ce qui leur appartient. Sinon vous seriez vous aussi supprimés à cause de tous leurs péchés.» '
  '27':
  - type: text
    content: Ils se retirèrent loin de l'habitation de Koré, de Dathan et d'Abiram. Dathan et Abiram sortirent et se tinrent à l'entrée de leur tente avec leur femme, leurs fils et leurs petits-enfants.
  '28':
  - type: text
    content: 'Moïse dit: «Voici comment vous reconnaîtrez que c''est l''Eternel qui m''a envoyé pour accomplir toutes ces choses et que je n''agis pas de ma propre initiative: '
  '29':
  - type: text
    content: 'si ces gens meurent comme le reste des hommes, s''ils subissent le sort commun à tous les hommes, ce n''est pas l''Eternel qui m''a envoyé; '
  '3':
  - type: text
    content: 'Ils se rassemblèrent contre Moïse et Aaron et leur dirent: «En voilà assez! En effet, tous les membres de l''assemblée sont saints et l''Eternel est au milieu d''eux. Pourquoi vous élevez-vous au-dessus de l''assemblée de l''Eternel?»'
  '30':
  - type: text
    content: en revanche, si l'Eternel accomplit un acte extraordinaire, si la terre s'entrouvre pour les engloutir avec tout ce qui leur appartient et qu'ils descendent vivants dans le séjour des morts, vous saurez alors que ces gens ont méprisé l'Eternel.»
  '31':
  - type: text
    content: 'Il finissait de prononcer toutes ces paroles lorsque le sol se fendit sous eux. '
  '32':
  - type: text
    content: 'La terre s''entrouvrit et les engloutit, eux et leur famille, avec tous les partisans de Koré et tous leurs biens. '
  '33':
  - type: text
    content: 'Ils descendirent vivants dans le séjour des morts, eux et tout ce qui leur appartenait. La terre les recouvrit et ils disparurent du milieu de l''assemblée. '
  '34':
  - type: text
    content: 'Tous les Israélites qui étaient autour d''eux s''enfuirent à leur cri. Ils se disaient en effet: «Fuyons, sinon la terre nous engloutira!» '
  '35':
  - type: text
    content: Un feu jaillit, venu de l'Eternel, et dévora les 250 hommes qui offraient le parfum.
  '4':
  - type: text
    content: 'Quand Moïse eut entendu cela, il tomba le visage contre terre. '
  '5':
  - type: text
    content: 'Il dit à Koré et à toute sa bande: «Demain matin, *l''Eternel fera connaître qui lui appartient'
  - type: note
    content: 'L''Eternel… appartient: cité en 2 Timothée 2.19 d''après la Septante.'
  - type: text
    content: ' et qui est saint, et il le fera approcher de lui. Il fera approcher de lui celui qu''il choisira. '
  '6':
  - type: text
    content: 'Faites ceci: prenez des brûle-parfums, Koré et toute sa bande; '
  '7':
  - type: text
    content: 'demain, mettez-y du feu et déposez-y du parfum devant l''Eternel. Celui que l''Eternel choisira, c''est celui qui est saint. En voilà assez, descendants de Lévi!» '
  '8':
  - type: text
    content: 'Moïse dit à Koré: «Ecoutez donc, descendants de Lévi! '
  '9':
  - type: text
    content: 'Cela ne vous suffit-il pas que le Dieu d''Israël vous ait choisis dans l''assemblée d''Israël pour vous faire approcher de lui, afin que vous soyez employés au service du tabernacle de l''Eternel et que vous vous présentiez devant l''assemblée pour la servir? '
