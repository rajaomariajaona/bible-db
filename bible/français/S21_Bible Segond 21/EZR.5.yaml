document_id: EZR.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Reprise de la construction du temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les prophètes Aggée et Zacharie, le fils d''Iddo, prophétisèrent à l''intention des Juifs qui se trouvaient en Juda et à Jérusalem, au nom du Dieu d''Israël qui était avec eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Alors Zorobabel, fils de Shealthiel, et Josué, fils de Jotsadak, se levèrent et commencèrent à reconstruire la maison de Dieu à Jérusalem. Les prophètes de Dieu étaient à leurs côtés pour les soutenir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'A la même époque, Thathnaï, qui était gouverneur de la région située à l''ouest de l''Euphrate, Shethar-Boznaï et leurs associés vinrent les trouver et leur demandèrent: «Qui vous a donné l''autorisation de reconstruire ce temple et de relever ces murs?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Nous leur avons donc dit quels étaient les noms des hommes qui reconstruisaient cet édifice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Cependant, Dieu veillait sur les anciens des Juifs et on laissa continuer les travaux pendant l'envoi d'un rapport à Darius et jusqu'à la réception d'une lettre sur cette affaire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Voici la copie de la lettre envoyée au roi Darius par Thathnaï, gouverneur de la région située à l''ouest de l''Euphrate, Shethar-Boznaï et ses associés d''Apharsac qui habitaient cette région. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils lui adressèrent un rapport dont voici la teneur:'
- type: usfm
  marker: p
  children:
  - type: text
    text: '«Tous nos vœux de paix, roi Darius! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Roi, tu dois savoir que nous nous sommes rendus dans la province de Juda à la maison du grand Dieu. Or, elle est reconstruite en pierres de taille et le bois est posé contre les murs; ce travail est effectué avec soin et progresse rapidement entre leurs mains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nous avons interrogé les anciens en leur demandant: ‘Qui vous a donné l''autorisation de reconstruire ce temple et de relever ces murs?’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nous leur avons même demandé leurs noms pour te les faire connaître en te donnant par écrit ceux des hommes qui sont à leur tête.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '»Voici la réponse qu''ils nous ont faite: ‘Nous sommes les serviteurs du Dieu du ciel et de la terre, et nous reconstruisons le temple qui avait été construit il y a bien longtemps. C''était un grand roi d''Israël qui l''avait construit et terminé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais nos ancêtres ont irrité le Dieu du ciel, de sorte qu''il les a soumis à la domination du Babylonien Nebucadnetsar, roi de Babylone, qui a détruit ce temple et exilé le peuple à Babylone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Toutefois, la première année de son règne sur Babylone, le roi Cyrus a donné l''ordre de reconstruire cette maison de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il a même retiré du temple de Babylone les ustensiles en or et en argent de la maison de Dieu, que Nebucadnetsar avait enlevés du temple de Jérusalem et amenés dans le temple de Babylone; il les a fait remettre au dénommé Sheshbatsar, qu''il a désigné gouverneur, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'et il lui a ordonné de prendre ces ustensiles, d''aller les déposer dans le temple de Jérusalem et de reconstruire la maison de Dieu sur son emplacement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ce Sheshbatsar est donc venu, il a posé les fondations de la maison de Dieu à Jérusalem et, depuis ce moment jusqu'à maintenant, elle est en construction, sans avoir encore été terminée.’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: »Maintenant, si le roi le juge bon, que l'on fasse des recherches dans le dépôt des trésors royaux à Babylone, pour vérifier si le roi Cyrus a effectivement donné l'ordre de reconstruire cette maison de Dieu à Jérusalem. Que le roi nous fasse connaître ensuite quelle est sa volonté concernant cette affaire.»
