document_id: ACT.8
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Saul approuvait l''exécution d''Etienne. Ce jour-là, une grande persécution éclata contre l''Eglise de Jérusalem et tous, à l''exception des apôtres, se dispersèrent dans les diverses régions de Judée et de Samarie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Des hommes pieux enterrèrent Etienne et le pleurèrent beaucoup. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Quant à Saul, il cherchait à détruire l''Eglise: il pénétrait dans les maisons, en arrachait hommes et femmes et les faisait jeter en prison.'
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Témoignage en Judée et environs
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 8.4–12.25
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'Evangile en Samarie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ceux qui avaient été dispersés allaient de lieu en lieu et annonçaient la bonne nouvelle de la parole. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Philippe descendit dans la ville de Samarie et y prêcha le Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les foules tout entières étaient attentives à ce que disait Philippe, lorsqu''elles apprirent et virent les signes miraculeux qu''il accomplissait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'En effet, des esprits impurs sortaient de beaucoup de démoniaques en poussant de grands cris et beaucoup de paralysés et de boiteux étaient guéris. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il y eut une grande joie dans cette ville.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Un homme du nom de Simon se trouvait déjà dans la ville. Se présentant comme un personnage important, il exerçait la magie et provoquait l''étonnement du peuple samaritain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tous, du plus petit jusqu''au plus grand, l''écoutaient attentivement et disaient: «Cet homme est la puissance de Dieu, [celle qui s''appelle] la grande.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils l''écoutaient attentivement parce qu''il les avait depuis longtemps étonnés par ses actes de magie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Mais, quand ils eurent cru à Philippe qui leur annonçait la bonne nouvelle du royaume de Dieu et du nom de Jésus-Christ, hommes et femmes se firent baptiser. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Simon lui-même crut aussi et, après avoir été baptisé, il ne quittait plus Philippe; il voyait avec étonnement les [grands] miracles et signes qui s'accomplissaient.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les apôtres qui étaient à Jérusalem apprirent que les habitants de la Samarie avaient fait bon accueil à la parole de Dieu, et ils leur envoyèrent Pierre et Jean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ceux-ci descendirent et prièrent pour eux afin qu''ils reçoivent le Saint-Esprit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'En effet, il n''était encore descendu sur aucun d''eux; ils avaient seulement été baptisés au nom du Seigneur Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Alors Pierre et Jean posèrent les mains sur eux et ils reçurent le Saint-Esprit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Voyant que l''Esprit [saint] était donné lorsque les apôtres posaient les mains sur les gens, Simon leur offrit de l''argent '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'en disant: «Accordez-moi aussi ce pouvoir afin que celui sur lequel je poserai les mains reçoive le Saint-Esprit.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Mais Pierre lui dit: «Que ton argent soit perdu avec toi, puisque tu as cru que le don de Dieu s''achète à prix d''argent! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tu n''as ni part ni héritage dans cette affaire, car ton cœur n''est pas droit devant Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Renonce donc à ta méchanceté et prie le Seigneur pour que cette pensée de ton cœur te soit pardonnée, si c''est possible. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'En effet, je vois que tu es rempli d''amertume et prisonnier du mal.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Simon répondit: «Priez vous-mêmes le Seigneur pour moi, afin qu''il ne m''arrive rien de ce que vous avez dit.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Après avoir rendu témoignage et prêché la parole du Seigneur, Pierre et Jean retournèrent à Jérusalem, annonçant la bonne nouvelle dans beaucoup de villages des Samaritains.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'Evangile annoncé à un eunuque éthiopien
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Un ange du Seigneur s''adressa à Philippe en disant: «Lève-toi et va en direction du sud, sur le chemin qui descend de Jérusalem à Gaza, celui qui est désert.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il se leva et partit. Or un eunuque éthiopien, haut fonctionnaire de Candace, la reine d''Ethiopie, et administrateur de tous ses trésors, était venu à Jérusalem pour adorer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Il repartait, assis sur son char, et lisait le prophète Esaïe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'L''Esprit dit à Philippe: «Avance et approche-toi de ce char.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Philippe accourut et entendit l''Ethiopien lire le prophète Esaïe. Il lui dit: «Comprends-tu ce que tu lis?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'L''homme répondit: «Comment le pourrais-je, si personne ne me l''explique?» et invita Philippe à monter et à s''asseoir avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Le passage de l''Ecriture qu''il lisait était celui-ci: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Il a été conduit comme une brebis à l'abattoir et, pareil à un agneau muet devant celui qui le tond, il n'ouvre pas la bouche.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Dans son humiliation, la justice lui a été refusée. Et sa génération, qui en parlera? En effet, sa vie a été supprimée de la terre.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.32-33 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il a été… la terre: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 53.7-8
      metadata:
        usfm: ISA.53.7+ISA.53.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'L''eunuque dit à Philippe: «Je t''en prie, à propos de qui le prophète dit-il cela? Est-ce à propos de lui-même ou de quelqu''un d''autre?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Alors Philippe prit la parole et, en partant de ce texte de l'Ecriture, il lui annonça la bonne nouvelle de Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Comme ils continuaient leur chemin, ils arrivèrent à un point d''eau. L''eunuque dit: «Voici de l''eau. Qu''est-ce qui empêche que je sois baptisé?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: '[Philippe dit: «Si tu crois de tout ton cœur, cela est possible.» L''eunuque répondit: «Je crois que Jésus-Christ est le Fils de Dieu.»] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Il fit arrêter le char. Philippe et l''eunuque descendirent tous les deux dans l''eau et Philippe baptisa l''eunuque. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Quand ils furent sortis de l''eau, l''Esprit du Seigneur enleva Philippe et l''eunuque ne le vit plus. Il poursuivit sa route tout joyeux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Philippe se retrouva dans Azot, puis il alla jusqu'à Césarée en évangélisant toutes les villes par lesquelles il passait.
