document_id: ACT.8,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Saul approuvait l''exécution d''Etienne. Ce jour-là, une grande persécution éclata contre l''Eglise de Jérusalem et tous, à l''exception des apôtres, se dispersèrent dans les diverses régions de Judée et de Samarie. '
  '10':
  - type: text
    content: 'Tous, du plus petit jusqu''au plus grand, l''écoutaient attentivement et disaient: «Cet homme est la puissance de Dieu, [celle qui s''appelle] la grande.» '
  '11':
  - type: text
    content: 'Ils l''écoutaient attentivement parce qu''il les avait depuis longtemps étonnés par ses actes de magie. '
  '12':
  - type: text
    content: 'Mais, quand ils eurent cru à Philippe qui leur annonçait la bonne nouvelle du royaume de Dieu et du nom de Jésus-Christ, hommes et femmes se firent baptiser. '
  '13':
  - type: text
    content: Simon lui-même crut aussi et, après avoir été baptisé, il ne quittait plus Philippe; il voyait avec étonnement les [grands] miracles et signes qui s'accomplissaient.
  '14':
  - type: text
    content: 'Les apôtres qui étaient à Jérusalem apprirent que les habitants de la Samarie avaient fait bon accueil à la parole de Dieu, et ils leur envoyèrent Pierre et Jean. '
  '15':
  - type: text
    content: 'Ceux-ci descendirent et prièrent pour eux afin qu''ils reçoivent le Saint-Esprit. '
  '16':
  - type: text
    content: 'En effet, il n''était encore descendu sur aucun d''eux; ils avaient seulement été baptisés au nom du Seigneur Jésus. '
  '17':
  - type: text
    content: Alors Pierre et Jean posèrent les mains sur eux et ils reçurent le Saint-Esprit.
  '18':
  - type: text
    content: 'Voyant que l''Esprit [saint] était donné lorsque les apôtres posaient les mains sur les gens, Simon leur offrit de l''argent '
  '19':
  - type: text
    content: 'en disant: «Accordez-moi aussi ce pouvoir afin que celui sur lequel je poserai les mains reçoive le Saint-Esprit.» '
  '2':
  - type: text
    content: 'Des hommes pieux enterrèrent Etienne et le pleurèrent beaucoup. '
  '20':
  - type: text
    content: 'Mais Pierre lui dit: «Que ton argent soit perdu avec toi, puisque tu as cru que le don de Dieu s''achète à prix d''argent! '
  '21':
  - type: text
    content: 'Tu n''as ni part ni héritage dans cette affaire, car ton cœur n''est pas droit devant Dieu. '
  '22':
  - type: text
    content: 'Renonce donc à ta méchanceté et prie le Seigneur pour que cette pensée de ton cœur te soit pardonnée, si c''est possible. '
  '23':
  - type: text
    content: 'En effet, je vois que tu es rempli d''amertume et prisonnier du mal.» '
  '24':
  - type: text
    content: 'Simon répondit: «Priez vous-mêmes le Seigneur pour moi, afin qu''il ne m''arrive rien de ce que vous avez dit.»'
  '25':
  - type: text
    content: Après avoir rendu témoignage et prêché la parole du Seigneur, Pierre et Jean retournèrent à Jérusalem, annonçant la bonne nouvelle dans beaucoup de villages des Samaritains.
  - type: heading
    content: L'Evangile annoncé à un eunuque éthiopien
  '26':
  - type: text
    content: 'Un ange du Seigneur s''adressa à Philippe en disant: «Lève-toi et va en direction du sud, sur le chemin qui descend de Jérusalem à Gaza, celui qui est désert.» '
  '27':
  - type: text
    content: 'Il se leva et partit. Or un eunuque éthiopien, haut fonctionnaire de Candace, la reine d''Ethiopie, et administrateur de tous ses trésors, était venu à Jérusalem pour adorer. '
  '28':
  - type: text
    content: 'Il repartait, assis sur son char, et lisait le prophète Esaïe. '
  '29':
  - type: text
    content: 'L''Esprit dit à Philippe: «Avance et approche-toi de ce char.» '
  '3':
  - type: text
    content: 'Quant à Saul, il cherchait à détruire l''Eglise: il pénétrait dans les maisons, en arrachait hommes et femmes et les faisait jeter en prison.'
  - type: heading
    content: Témoignage en Judée et environs
  - type: heading
    content: 8.4–12.25
  - type: heading
    content: L'Evangile en Samarie
  '30':
  - type: text
    content: 'Philippe accourut et entendit l''Ethiopien lire le prophète Esaïe. Il lui dit: «Comprends-tu ce que tu lis?» '
  '31':
  - type: text
    content: 'L''homme répondit: «Comment le pourrais-je, si personne ne me l''explique?» et invita Philippe à monter et à s''asseoir avec lui. '
  '32':
  - type: text
    content: 'Le passage de l''Ecriture qu''il lisait était celui-ci: '
  - type: text
    content: Il a été conduit comme une brebis à l'abattoir et, pareil à un agneau muet devant celui qui le tond, il n'ouvre pas la bouche.
  - type: text
    content: ' '
  '33':
  - type: text
    content: Dans son humiliation, la justice lui a été refusée. Et sa génération, qui en parlera? En effet, sa vie a été supprimée de la terre.
  - type: note
    content: 'Il a été… la terre: citation d''Esaïe 53.7-8.'
  '34':
  - type: text
    content: 'L''eunuque dit à Philippe: «Je t''en prie, à propos de qui le prophète dit-il cela? Est-ce à propos de lui-même ou de quelqu''un d''autre?» '
  '35':
  - type: text
    content: Alors Philippe prit la parole et, en partant de ce texte de l'Ecriture, il lui annonça la bonne nouvelle de Jésus.
  '36':
  - type: text
    content: 'Comme ils continuaient leur chemin, ils arrivèrent à un point d''eau. L''eunuque dit: «Voici de l''eau. Qu''est-ce qui empêche que je sois baptisé?» '
  '37':
  - type: text
    content: '[Philippe dit: «Si tu crois de tout ton cœur, cela est possible.» L''eunuque répondit: «Je crois que Jésus-Christ est le Fils de Dieu.»] '
  '38':
  - type: text
    content: 'Il fit arrêter le char. Philippe et l''eunuque descendirent tous les deux dans l''eau et Philippe baptisa l''eunuque. '
  '39':
  - type: text
    content: 'Quand ils furent sortis de l''eau, l''Esprit du Seigneur enleva Philippe et l''eunuque ne le vit plus. Il poursuivit sa route tout joyeux. '
  '4':
  - type: text
    content: 'Ceux qui avaient été dispersés allaient de lieu en lieu et annonçaient la bonne nouvelle de la parole. '
  '40':
  - type: text
    content: Philippe se retrouva dans Azot, puis il alla jusqu'à Césarée en évangélisant toutes les villes par lesquelles il passait.
  '5':
  - type: text
    content: 'Philippe descendit dans la ville de Samarie et y prêcha le Christ. '
  '6':
  - type: text
    content: 'Les foules tout entières étaient attentives à ce que disait Philippe, lorsqu''elles apprirent et virent les signes miraculeux qu''il accomplissait. '
  '7':
  - type: text
    content: 'En effet, des esprits impurs sortaient de beaucoup de démoniaques en poussant de grands cris et beaucoup de paralysés et de boiteux étaient guéris. '
  '8':
  - type: text
    content: Il y eut une grande joie dans cette ville.
  '9':
  - type: text
    content: 'Un homme du nom de Simon se trouvait déjà dans la ville. Se présentant comme un personnage important, il exerçait la magie et provoquait l''étonnement du peuple samaritain. '
