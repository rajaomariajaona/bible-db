document_id: REV.20
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Satan enchaîné et relâché
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Puis je vis un ange descendre du ciel. Il tenait à la main la clé de l''abîme et une grande chaîne. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il s''empara du dragon, le serpent ancien, qui est le diable et Satan, l''enchaîna pour 1000 ans '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: et le jeta dans l'abîme. Il ferma et scella l'entrée au-dessus de lui afin qu'il n'égare plus les nations, jusqu'à ce que les 1000 ans soient passés. Après cela, il faut qu'il soit relâché pour un peu de temps.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ensuite je vis des trônes, et ceux qui s''y assirent reçurent le pouvoir de juger. Je vis aussi l''âme de ceux qui avaient été décapités à cause du témoignage de Jésus et à cause de la parole de Dieu, tous ceux qui n''avaient pas adoré la bête ni son image et qui n''avaient pas reçu sa marque sur le front ni sur la main. Ils revinrent à la vie et ils régnèrent avec Christ pendant 1000 ans. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '[Les autres morts ne revinrent pas à la vie avant que les 1000 ans soient passés.] C''est la première résurrection. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Heureux et saints ceux qui ont part à la première résurrection! La seconde mort n'a pas de pouvoir sur eux, mais ils seront prêtres de Dieu et de Christ et ils régneront avec lui pendant 1000 ans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Quand les 1000 ans seront passés, Satan sera relâché de sa prison '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: et il sortira pour égarer les nations qui sont aux quatre coins de la terre, Gog et Magog, afin de les rassembler pour la guerre; elles sont aussi nombreuses que le sable de la mer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ils montèrent sur toute la surface de la terre et ils encerclèrent le camp des saints et la ville bien-aimée. Mais un feu [venu de Dieu] descendit du ciel et les dévora. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Le diable, qui les égarait, fut jeté dans l'étang de feu et de soufre où sont la bête et le prétendu prophète. Et ils seront tourmentés jour et nuit, aux siècles des siècles.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le jugement dernier
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Je vis alors un grand trône blanc et celui qui y était assis. La terre et le ciel s''enfuirent loin de lui et l''on ne trouva plus de place pour eux. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je vis les morts, les grands et les petits, debout devant le trône. Des livres furent ouverts. Un autre livre fut aussi ouvert: le livre de vie. Les morts furent jugés conformément à leurs œuvres, d''après ce qui était écrit dans ces livres. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'La mer rendit les morts qu''elle contenait, la mort et le séjour des morts rendirent aussi leurs morts, et chacun fut jugé conformément à sa manière d''agir. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Puis la mort et le séjour des morts furent jetés dans l''étang de feu. L''étang de feu, c''est la seconde mort. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tous ceux qui ne furent pas trouvés inscrits dans le livre de vie furent jetés dans l'étang de feu.
