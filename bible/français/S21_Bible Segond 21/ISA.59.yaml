document_id: ISA.59
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Crimes et jugement de Juda
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Non, le bras de l'Eternel n'est pas devenu trop court pour sauver,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni son oreille trop dure pour entendre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: mais ce sont vos fautes qui ont fait séparation
- type: usfm
  marker: q1
  children:
  - type: text
    text: entre vous et votre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce sont vos péchés qui vous l'ont caché
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'ont empêché de vous écouter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: En effet, vos mains sont souillées de sang
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vos doigts de crimes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vos lèvres profèrent le mensonge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: votre langue fait entendre le mal.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Personne ne fait appel à la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: personne ne plaide avec droiture.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils s'appuient sur le vide et disent des faussetés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils conçoivent le trouble et donnent naissance au crime.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils font éclore des œufs de vipère
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tissent des toiles d'araignée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Celui qui mange de leurs œufs meurt
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, si l'on en écrase un, c'est un serpent qui sort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Leurs toiles ne servent pas à faire un habit
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ne peuvent se couvrir du fruit de leur travail.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne commettent que l'injustice
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leurs mains sont pleines d'actes de violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '*Leurs pieds courent au mal'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et s'empressent de verser le sang innocent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leurs pensées sont orientées vers l'injustice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la destruction et le malheur marquent leur passage.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ils ne connaissent pas le chemin de la paix
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '59.7-8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Leurs pieds… paix: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité partiellement en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 3.15-17
      metadata:
        usfm: ROM.3.15+ROM.3.16+ROM.3.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le droit est absent de leur parcours.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils empruntent des sentiers tortueux:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui y marche ne connaît pas la paix.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Voilà pourquoi le droit reste loin de nous
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la justice ne nous atteint pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous attendions la lumière et voici les ténèbres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la clarté et voici que nous marchons dans l'obscurité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Nous tâtonnons comme des aveugles le long d'un mur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous tâtonnons comme ceux qui n'ont pas d'yeux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous trébuchons à midi comme en pleine nuit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au milieu de l'abondance nous ressemblons à des morts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nous grognons tous comme des ours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous gémissons sans cesse comme des colombes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous attendions un juste jugement, mais il n'est pas là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le salut, mais il est loin de nous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Oui, nos transgressions sont nombreuses devant toi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nos péchés témoignent contre nous;
- type: usfm
  marker: q1
  children:
  - type: text
    text: nos transgressions font corps avec nous
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nous reconnaissons nos fautes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Nous avons eu un comportement coupable envers l'Eternel, nous l'avons trahi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous nous sommes détournés de notre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous avons parlé exploitation et révolte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nous avons conçu et médité dans le cœur des paroles mensongères,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: si bien que le droit s'est retiré et la justice se tient éloignée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lorsque la vérité trébuche sur la place publique,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la droiture ne peut approcher.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: La vérité est devenue rare
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celui qui s'écarte du mal est victime de pillages.
- type: usfm
  marker: q1
  children:
  - type: text
    text: L'Eternel voit avec indignation
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'il n'y a plus de droiture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il constate qu'il n'y a personne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est consterné en voyant qu'il n'y a personne pour intercéder,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors son bras lui assure le salut et sa justice lui sert de soutien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il enfile la justice comme une cuirasse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et met sur sa tête le casque du salut;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il prend la vengeance pour vêtement
- type: usfm
  marker: q1
  children:
  - type: text
    text: et s'enveloppe du zèle comme d'un manteau.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il paiera à chacun le salaire qu''il mérite:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: la colère à ses adversaires
- type: usfm
  marker: q1
  children:
  - type: text
    text: ', le salaire qu''ils méritent à ses ennemis;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il paiera aussi aux îles le salaire qu'elles méritent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: On craindra le nom de l'Eternel à l'ouest
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa gloire à l'est.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand l'adversaire surgira, pareil à un fleuve,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'Esprit de l'Eternel le mettra en fuite.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '*Le libérateur viendra pour Sion,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour ceux de Jacob qui renoncent à leur révolte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Quant à moi, telle sera mon alliance avec eux
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '59.20-21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le libérateur… avec eux: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 11.26-27
      metadata:
        usfm: ROM.11.26+ROM.11.27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon Esprit, qui repose sur toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mes paroles, celles que j'ai mises dans ta bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne quitteront pas ta bouche, ni celle de tes enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni celle de tes petits-enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit l'Eternel, dès maintenant et pour toujours.
