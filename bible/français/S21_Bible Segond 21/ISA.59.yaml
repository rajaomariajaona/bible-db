document_id: ISA.59,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Crimes et jugement de Juda
  - type: text
    content: Non, le bras de l'Eternel n'est pas devenu trop court pour sauver,
  - type: text
    content: ni son oreille trop dure pour entendre,
  '10':
  - type: text
    content: Nous tâtonnons comme des aveugles le long d'un mur,
  - type: text
    content: nous tâtonnons comme ceux qui n'ont pas d'yeux.
  - type: text
    content: Nous trébuchons à midi comme en pleine nuit.
  - type: text
    content: Au milieu de l'abondance nous ressemblons à des morts.
  '11':
  - type: text
    content: Nous grognons tous comme des ours,
  - type: text
    content: nous gémissons sans cesse comme des colombes.
  - type: text
    content: Nous attendions un juste jugement, mais il n'est pas là,
  - type: text
    content: le salut, mais il est loin de nous.
  '12':
  - type: text
    content: Oui, nos transgressions sont nombreuses devant toi
  - type: text
    content: et nos péchés témoignent contre nous;
  - type: text
    content: nos transgressions font corps avec nous
  - type: text
    content: et nous reconnaissons nos fautes.
  '13':
  - type: text
    content: Nous avons eu un comportement coupable envers l'Eternel, nous l'avons trahi,
  - type: text
    content: nous nous sommes détournés de notre Dieu,
  - type: text
    content: nous avons parlé exploitation et révolte,
  - type: text
    content: nous avons conçu et médité dans le cœur des paroles mensongères,
  '14':
  - type: text
    content: si bien que le droit s'est retiré et la justice se tient éloignée.
  - type: text
    content: Lorsque la vérité trébuche sur la place publique,
  - type: text
    content: la droiture ne peut approcher.
  '15':
  - type: text
    content: La vérité est devenue rare
  - type: text
    content: et celui qui s'écarte du mal est victime de pillages.
  - type: text
    content: L'Eternel voit avec indignation
  - type: text
    content: qu'il n'y a plus de droiture.
  '16':
  - type: text
    content: Il constate qu'il n'y a personne,
  - type: text
    content: il est consterné en voyant qu'il n'y a personne pour intercéder,
  - type: text
    content: alors son bras lui assure le salut et sa justice lui sert de soutien.
  '17':
  - type: text
    content: Il enfile la justice comme une cuirasse
  - type: text
    content: et met sur sa tête le casque du salut;
  - type: text
    content: il prend la vengeance pour vêtement
  - type: text
    content: et s'enveloppe du zèle comme d'un manteau.
  '18':
  - type: text
    content: 'Il paiera à chacun le salaire qu''il mérite:'
  - type: text
    content: la colère à ses adversaires
  - type: text
    content: ', le salaire qu''ils méritent à ses ennemis;'
  - type: text
    content: il paiera aussi aux îles le salaire qu'elles méritent.
  '19':
  - type: text
    content: On craindra le nom de l'Eternel à l'ouest
  - type: text
    content: et sa gloire à l'est.
  - type: text
    content: Quand l'adversaire surgira, pareil à un fleuve,
  - type: text
    content: l'Esprit de l'Eternel le mettra en fuite.
  '2':
  - type: text
    content: mais ce sont vos fautes qui ont fait séparation
  - type: text
    content: entre vous et votre Dieu,
  - type: text
    content: ce sont vos péchés qui vous l'ont caché
  - type: text
    content: et l'ont empêché de vous écouter.
  '20':
  - type: text
    content: '*Le libérateur viendra pour Sion,'
  - type: text
    content: pour ceux de Jacob qui renoncent à leur révolte,
  - type: text
    content: déclare l'Eternel.
  '21':
  - type: text
    content: Quant à moi, telle sera mon alliance avec eux
  - type: note
    content: 'Le libérateur… avec eux: cité en Romains 11.26-27.'
  - type: text
    content: ', dit l''Eternel:'
  - type: text
    content: mon Esprit, qui repose sur toi,
  - type: text
    content: et mes paroles, celles que j'ai mises dans ta bouche,
  - type: text
    content: ne quitteront pas ta bouche, ni celle de tes enfants,
  - type: text
    content: ni celle de tes petits-enfants,
  - type: text
    content: dit l'Eternel, dès maintenant et pour toujours.
  '3':
  - type: text
    content: En effet, vos mains sont souillées de sang
  - type: text
    content: et vos doigts de crimes,
  - type: text
    content: vos lèvres profèrent le mensonge,
  - type: text
    content: votre langue fait entendre le mal.
  '4':
  - type: text
    content: Personne ne fait appel à la justice,
  - type: text
    content: personne ne plaide avec droiture.
  - type: text
    content: Ils s'appuient sur le vide et disent des faussetés,
  - type: text
    content: ils conçoivent le trouble et donnent naissance au crime.
  '5':
  - type: text
    content: Ils font éclore des œufs de vipère
  - type: text
    content: et tissent des toiles d'araignée.
  - type: text
    content: Celui qui mange de leurs œufs meurt
  - type: text
    content: et, si l'on en écrase un, c'est un serpent qui sort.
  '6':
  - type: text
    content: Leurs toiles ne servent pas à faire un habit
  - type: text
    content: et ils ne peuvent se couvrir du fruit de leur travail.
  - type: text
    content: Ils ne commettent que l'injustice
  - type: text
    content: et leurs mains sont pleines d'actes de violence.
  '7':
  - type: text
    content: '*Leurs pieds courent au mal'
  - type: text
    content: et s'empressent de verser le sang innocent.
  - type: text
    content: Leurs pensées sont orientées vers l'injustice,
  - type: text
    content: la destruction et le malheur marquent leur passage.
  '8':
  - type: text
    content: Ils ne connaissent pas le chemin de la paix
  - type: note
    content: 'Leurs pieds… paix: cité partiellement en Romains 3.15-17.'
  - type: text
    content: et le droit est absent de leur parcours.
  - type: text
    content: 'Ils empruntent des sentiers tortueux:'
  - type: text
    content: celui qui y marche ne connaît pas la paix.
  '9':
  - type: text
    content: Voilà pourquoi le droit reste loin de nous
  - type: text
    content: et la justice ne nous atteint pas.
  - type: text
    content: Nous attendions la lumière et voici les ténèbres,
  - type: text
    content: la clarté et voici que nous marchons dans l'obscurité.
