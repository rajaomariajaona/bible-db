document_id: MIC.5,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Naissance et règne du Messie
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: '*Et toi, Bethléhem Ephrata,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui es petite parmi les villes de Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de toi sortira pour moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui dominera sur Israël
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Et toi… Israël: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Matthieu 2.6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' par les spécialistes de la loi pour préciser le lieu de naissance du Messie.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et dont l'origine remonte loin dans le passé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à l'éternité.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Je supprimerai les villes de ton pays
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je renverserai toutes tes forteresses.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Je supprimerai de chez toi la magie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu n'auras plus de devins;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: je supprimerai du milieu de toi tes idoles et tes statues,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu ne te prosterneras plus devant ce que tes mains ont fabriqué.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: J'arracherai du milieu de toi tes poteaux sacrés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je détruirai tes villes.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: J'exercerai ma vengeance avec colère, avec fureur, contre les nations
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui n'ont pas écouté.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: C'est pourquoi il livrera son peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu'au moment où accouchera celle qui doit accoucher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le reste de ses frères
  - type: usfm
    marker: q1
    children:
    - type: text
      text: reviendra auprès des Israélites.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Il se présentera et les conduira avec la force de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec la majesté du nom de l'Eternel, son Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils auront une habitation assurée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car sa grandeur sera reconnue jusqu'aux extrémités de la terre.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: C'est lui qui ramènera la paix.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lorsque l'Assyrien viendra dans notre pays
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'il pénétrera dans nos palais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous enverrons contre lui sept bergers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et huit princes du peuple.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ils conduiront avec l'épée le pays d'Assyrie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le pays de Nimrod à l'intérieur de ses portes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il nous délivrera ainsi de l'Assyrien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsqu'il viendra dans notre pays
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'il pénétrera sur notre territoire.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Le reste de Jacob sera, au milieu des peuples nombreux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pareil à une rosée qui vient de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'pareil à des gouttes d''eau sur l''herbe:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles ne comptent pas sur l'homme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles ne dépendent pas des humains.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Le reste de Jacob sera parmi les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au milieu des peuples nombreux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pareil à un lion parmi les bêtes de la forêt,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'pareil à un lionceau parmi les troupeaux de brebis:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lorsqu'il passe, il piétine et déchire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans personne pour délivrer ses victimes.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Que ta main se lève sur tes adversaires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que tous tes ennemis soient supprimés!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Ce jour-là, déclare l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je supprimerai du milieu de toi tes chevaux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je détruirai tes chars.
