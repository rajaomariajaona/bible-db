document_id: MIC.5,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Naissance et règne du Messie
  - type: text
    content: '*Et toi, Bethléhem Ephrata,'
  - type: text
    content: qui es petite parmi les villes de Juda,
  - type: text
    content: de toi sortira pour moi
  - type: text
    content: celui qui dominera sur Israël
  - type: note
    content: 'Et toi… Israël: cité en Matthieu 2.6 par les spécialistes de la loi pour préciser le lieu de naissance du Messie.'
  - type: text
    content: et dont l'origine remonte loin dans le passé,
  - type: text
    content: à l'éternité.
  '10':
  - type: text
    content: Je supprimerai les villes de ton pays
  - type: text
    content: et je renverserai toutes tes forteresses.
  '11':
  - type: text
    content: Je supprimerai de chez toi la magie
  - type: text
    content: et tu n'auras plus de devins;
  '12':
  - type: text
    content: je supprimerai du milieu de toi tes idoles et tes statues,
  - type: text
    content: et tu ne te prosterneras plus devant ce que tes mains ont fabriqué.
  '13':
  - type: text
    content: J'arracherai du milieu de toi tes poteaux sacrés
  - type: text
    content: et je détruirai tes villes.
  '14':
  - type: text
    content: J'exercerai ma vengeance avec colère, avec fureur, contre les nations
  - type: text
    content: qui n'ont pas écouté.
  '2':
  - type: text
    content: C'est pourquoi il livrera son peuple
  - type: text
    content: jusqu'au moment où accouchera celle qui doit accoucher,
  - type: text
    content: et le reste de ses frères
  - type: text
    content: reviendra auprès des Israélites.
  '3':
  - type: text
    content: Il se présentera et les conduira avec la force de l'Eternel,
  - type: text
    content: avec la majesté du nom de l'Eternel, son Dieu,
  - type: text
    content: et ils auront une habitation assurée,
  - type: text
    content: car sa grandeur sera reconnue jusqu'aux extrémités de la terre.
  '4':
  - type: text
    content: C'est lui qui ramènera la paix.
  - type: text
    content: Lorsque l'Assyrien viendra dans notre pays
  - type: text
    content: et qu'il pénétrera dans nos palais,
  - type: text
    content: nous enverrons contre lui sept bergers
  - type: text
    content: et huit princes du peuple.
  '5':
  - type: text
    content: Ils conduiront avec l'épée le pays d'Assyrie
  - type: text
    content: et le pays de Nimrod à l'intérieur de ses portes.
  - type: text
    content: Il nous délivrera ainsi de l'Assyrien,
  - type: text
    content: lorsqu'il viendra dans notre pays
  - type: text
    content: et qu'il pénétrera sur notre territoire.
  '6':
  - type: text
    content: Le reste de Jacob sera, au milieu des peuples nombreux,
  - type: text
    content: pareil à une rosée qui vient de l'Eternel,
  - type: text
    content: 'pareil à des gouttes d''eau sur l''herbe:'
  - type: text
    content: elles ne comptent pas sur l'homme,
  - type: text
    content: elles ne dépendent pas des humains.
  '7':
  - type: text
    content: Le reste de Jacob sera parmi les nations,
  - type: text
    content: au milieu des peuples nombreux,
  - type: text
    content: pareil à un lion parmi les bêtes de la forêt,
  - type: text
    content: 'pareil à un lionceau parmi les troupeaux de brebis:'
  - type: text
    content: lorsqu'il passe, il piétine et déchire
  - type: text
    content: sans personne pour délivrer ses victimes.
  '8':
  - type: text
    content: Que ta main se lève sur tes adversaires,
  - type: text
    content: et que tous tes ennemis soient supprimés!
  '9':
  - type: text
    content: Ce jour-là, déclare l'Eternel,
  - type: text
    content: je supprimerai du milieu de toi tes chevaux
  - type: text
    content: et je détruirai tes chars.
