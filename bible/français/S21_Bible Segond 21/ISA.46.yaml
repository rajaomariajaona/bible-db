document_id: ISA.46,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Action souveraine de Dieu
  - type: text
    content: Bel s'écroule, Nebo tombe.
  - type: text
    content: On place ces statues sur des animaux, sur des bêtes.
  - type: text
    content: Vous les portiez et voilà qu'elles sont chargées
  - type: text
    content: comme un fardeau pour l'animal fatigué!
  '10':
  - type: text
    content: Je révèle dès le début ce qui doit arriver,
  - type: text
    content: et longtemps à l'avance ce qui n'est pas encore mis en œuvre.
  - type: text
    content: 'Je dis: «Mon projet se réalisera'
  - type: text
    content: et je mettrai en œuvre tout ce que je désire.»
  '11':
  - type: text
    content: C'est moi qui appelle de l'est un oiseau de proie,
  - type: text
    content: d'une terre lointaine l'homme chargé de réaliser mon projet.
  - type: text
    content: Ce que j'ai dit, je le ferai arriver;
  - type: text
    content: ce que j'ai prévu, je le mettrai en œuvre.
  '12':
  - type: text
    content: Ecoutez-moi, hommes au cœur endurci,
  - type: text
    content: vous qui êtes éloignés de la justice!
  '13':
  - type: text
    content: 'Je fais approcher ma justice: elle n''est pas loin.'
  - type: text
    content: 'Je fais approcher mon salut: il ne se fera pas attendre.'
  - type: text
    content: Je mettrai le salut dans Sion,
  - type: text
    content: je montrerai toute ma splendeur à Israël.
  '2':
  - type: text
    content: Ils sont tombés, ils se sont écroulés ensemble,
  - type: text
    content: ils sont incapables de préserver leur image
  - type: text
    content: et partent eux-mêmes en déportation.
  '3':
  - type: text
    content: Ecoutez-moi, famille de Jacob,
  - type: text
    content: vous tous qui restez de la communauté d'Israël!
  - type: text
    content: Je me suis chargé de vous depuis le ventre de votre mère,
  - type: text
    content: je vous ai portés dès avant votre naissance!
  '4':
  - type: text
    content: Jusqu'à votre vieillesse je serai le même,
  - type: text
    content: jusqu'à vos cheveux blancs je vous soutiendrai.
  - type: text
    content: Comme je l'ai déjà fait, je veux encore vous porter,
  - type: text
    content: vous soutenir et vous préserver.
  '5':
  - type: text
    content: A qui me comparerez-vous pour faire de nous des égaux?
  - type: text
    content: A qui me ferez-vous ressembler pour nous assimiler?
  '6':
  - type: text
    content: Ils versent l'or de leur bourse
  - type: text
    content: et pèsent l'argent à la balance,
  - type: text
    content: ils paient un orfèvre pour qu'il leur en fasse un dieu,
  - type: text
    content: puis ils se prosternent devant lui. Oui, ils l'adorent!
  '7':
  - type: text
    content: Ils le portent, ils le chargent sur l'épaule,
  - type: text
    content: 'ils le déposent à sa place et il y reste:'
  - type: text
    content: il est incapable de quitter sa place.
  - type: text
    content: 'On a beau crier, il ne répond pas:'
  - type: text
    content: il est incapable de vous sauver de votre détresse.
  '8':
  - type: text
    content: Souvenez-vous de cela et montrez-vous courageux!
  - type: text
    content: Vous qui êtes des rebelles, réfléchissez-y!
  '9':
  - type: text
    content: Souvenez-vous des tout premiers événements!
  - type: text
    content: En effet, c'est moi qui suis Dieu et il n'y en a pas d'autre.
  - type: text
    content: Je suis Dieu et personne n'est comparable à moi.
