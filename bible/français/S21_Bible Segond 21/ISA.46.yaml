document_id: ISA.46
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Action souveraine de Dieu
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Bel s'écroule, Nebo tombe.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On place ces statues sur des animaux, sur des bêtes.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous les portiez et voilà qu'elles sont chargées
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un fardeau pour l'animal fatigué!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ils sont tombés, ils se sont écroulés ensemble,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sont incapables de préserver leur image
- type: usfm
  marker: q1
  children:
  - type: text
    text: et partent eux-mêmes en déportation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ecoutez-moi, famille de Jacob,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous tous qui restez de la communauté d'Israël!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je me suis chargé de vous depuis le ventre de votre mère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je vous ai portés dès avant votre naissance!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Jusqu'à votre vieillesse je serai le même,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu'à vos cheveux blancs je vous soutiendrai.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comme je l'ai déjà fait, je veux encore vous porter,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous soutenir et vous préserver.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: A qui me comparerez-vous pour faire de nous des égaux?
- type: usfm
  marker: q1
  children:
  - type: text
    text: A qui me ferez-vous ressembler pour nous assimiler?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils versent l'or de leur bourse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pèsent l'argent à la balance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils paient un orfèvre pour qu'il leur en fasse un dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: puis ils se prosternent devant lui. Oui, ils l'adorent!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ils le portent, ils le chargent sur l'épaule,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'ils le déposent à sa place et il y reste:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est incapable de quitter sa place.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'On a beau crier, il ne répond pas:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est incapable de vous sauver de votre détresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Souvenez-vous de cela et montrez-vous courageux!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous qui êtes des rebelles, réfléchissez-y!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Souvenez-vous des tout premiers événements!
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, c'est moi qui suis Dieu et il n'y en a pas d'autre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis Dieu et personne n'est comparable à moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Je révèle dès le début ce qui doit arriver,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et longtemps à l'avance ce qui n'est pas encore mis en œuvre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je dis: «Mon projet se réalisera'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je mettrai en œuvre tout ce que je désire.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: C'est moi qui appelle de l'est un oiseau de proie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: d'une terre lointaine l'homme chargé de réaliser mon projet.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ce que j'ai dit, je le ferai arriver;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce que j'ai prévu, je le mettrai en œuvre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ecoutez-moi, hommes au cœur endurci,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous qui êtes éloignés de la justice!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Je fais approcher ma justice: elle n''est pas loin.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Je fais approcher mon salut: il ne se fera pas attendre.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je mettrai le salut dans Sion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je montrerai toute ma splendeur à Israël.
