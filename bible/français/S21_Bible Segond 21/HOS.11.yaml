document_id: HOS.11
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Amour et appel de Dieu
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 11.1–14.10
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les soins de Dieu pour Israël
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Quand Israël était jeune, je l'aimais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et *j'ai appelé mon fils à sortir d'Egypte
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'J''ai appelé… d''Egypte: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Matthieu 2.15
      metadata:
        usfm: MAT.2.15
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' comme accompli par Jésus.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Mais ils se sont éloignés de ceux qui les appelaient,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ont offert des sacrifices aux Baals
- type: usfm
  marker: q1
  children:
  - type: text
    text: et fait brûler de l'encens en l'honneur des idoles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: C'est moi qui ai guidé les pas d'Ephraïm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui l'ai pris par les bras,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ils n'ont pas vu que je les guérissais.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je les ai tirés avec des liens d'humanité, avec des cordages d'amour.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'ai été pour eux pareil à celui qui soulève la pièce d'attelage pesant sur la bouche
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je leur ai présenté de la nourriture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils ne retourneront pas en Egypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais l'Assyrien sera leur roi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu'ils ont refusé de revenir à moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: L'épée fondra sur leurs villes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: exterminera, détruira leurs soutiens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause des projets qu'ils ont eus.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Mon peuple est enclin à s'éloigner de moi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: on les rappelle vers le Très-Haut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais aucun d'eux ne se lève.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Comment te traiterai-je, Ephraïm?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Faut-il que je te livre à l'ennemi, Israël?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dois-je te traiter comme Adma,
- type: usfm
  marker: q1
  children:
  - type: text
    text: te rendre semblable à Tseboïm
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Adma… Tseboïm: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: villes détruites avec Sodome et Gomorrhe.
    marker-yv: yv-n
  - type: text
    text: '?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis tout bouleversé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je suis rempli de compassion.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je n'agirai pas en fonction de l'ardeur de ma colère.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je renonce à détruire Ephraïm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je suis Dieu, et non pas un homme.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis saint au milieu de toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne viendrai pas avec colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ils suivront l'Eternel qui rugira comme un lion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il rugira, et des enfants accourront de la mer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ils accourront de l'Egypte, pareils à un oiseau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de l'Assyrie, pareils à une colombe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je les ferai habiter dans leurs maisons, déclare l'Eternel.
