document_id: HOS.11,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Amour et appel de Dieu
  - type: heading
    content: 11.1–14.10
  - type: heading
    content: Les soins de Dieu pour Israël
  - type: text
    content: Quand Israël était jeune, je l'aimais,
  - type: text
    content: et *j'ai appelé mon fils à sortir d'Egypte
  - type: note
    content: 'J''ai appelé… d''Egypte: cité en Matthieu 2.15 comme accompli par Jésus.'
  - type: text
    content: .
  '10':
  - type: text
    content: Ils suivront l'Eternel qui rugira comme un lion,
  - type: text
    content: car il rugira, et des enfants accourront de la mer.
  '11':
  - type: text
    content: Ils accourront de l'Egypte, pareils à un oiseau,
  - type: text
    content: et de l'Assyrie, pareils à une colombe,
  - type: text
    content: et je les ferai habiter dans leurs maisons, déclare l'Eternel.
  '2':
  - type: text
    content: Mais ils se sont éloignés de ceux qui les appelaient,
  - type: text
    content: ils ont offert des sacrifices aux Baals
  - type: text
    content: et fait brûler de l'encens en l'honneur des idoles.
  '3':
  - type: text
    content: C'est moi qui ai guidé les pas d'Ephraïm,
  - type: text
    content: qui l'ai pris par les bras,
  - type: text
    content: mais ils n'ont pas vu que je les guérissais.
  '4':
  - type: text
    content: Je les ai tirés avec des liens d'humanité, avec des cordages d'amour.
  - type: text
    content: J'ai été pour eux pareil à celui qui soulève la pièce d'attelage pesant sur la bouche
  - type: text
    content: et je leur ai présenté de la nourriture.
  '5':
  - type: text
    content: Ils ne retourneront pas en Egypte,
  - type: text
    content: mais l'Assyrien sera leur roi,
  - type: text
    content: parce qu'ils ont refusé de revenir à moi.
  '6':
  - type: text
    content: L'épée fondra sur leurs villes,
  - type: text
    content: exterminera, détruira leurs soutiens,
  - type: text
    content: à cause des projets qu'ils ont eus.
  '7':
  - type: text
    content: Mon peuple est enclin à s'éloigner de moi;
  - type: text
    content: on les rappelle vers le Très-Haut,
  - type: text
    content: mais aucun d'eux ne se lève.
  '8':
  - type: text
    content: Comment te traiterai-je, Ephraïm?
  - type: text
    content: Faut-il que je te livre à l'ennemi, Israël?
  - type: text
    content: Dois-je te traiter comme Adma,
  - type: text
    content: te rendre semblable à Tseboïm
  - type: note
    content: 'Adma… Tseboïm: villes détruites avec Sodome et Gomorrhe.'
  - type: text
    content: '?'
  - type: text
    content: Je suis tout bouleversé,
  - type: text
    content: je suis rempli de compassion.
  '9':
  - type: text
    content: Je n'agirai pas en fonction de l'ardeur de ma colère.
  - type: text
    content: Je renonce à détruire Ephraïm,
  - type: text
    content: car je suis Dieu, et non pas un homme.
  - type: text
    content: Je suis saint au milieu de toi,
  - type: text
    content: je ne viendrai pas avec colère.
