document_id: JHN.13
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Dernières instructions de Jésus à ses disciples
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 13.1–17.26
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus lave les pieds de ses disciples
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Avant la fête de la Pâque, Jésus, sachant que son heure était venue de passer de ce monde au Père et ayant aimé ceux qui lui appartenaient dans le monde, les aima jusqu''à l''extrême. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'C''était pendant le souper. Le diable avait déjà mis dans le cœur de Judas l''Iscariot, fils de Simon, l''intention de le trahir. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Jésus savait que le Père avait tout remis entre ses mains, qu''il était venu de Dieu et qu''il retournait vers Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il se leva de table, quitta ses vêtements et prit un linge qu''il mit autour de sa taille. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Ensuite il versa de l''eau dans un bassin et il commença à laver les pieds des disciples et à les essuyer avec le linge qu''il avait autour de la taille. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il arriva donc vers Simon Pierre qui lui dit: «Toi, Seigneur, tu me laves les pieds!» '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Jésus lui répondit: «Ce que je fais, tu ne le sais pas maintenant, mais tu le comprendras par la suite.» '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Pierre lui dit: «Non, jamais tu ne me laveras les pieds.» Jésus lui répondit: «Si je ne te lave pas, tu n''auras pas de part avec moi.» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Simon Pierre lui dit: «Seigneur, non seulement les pieds, mais encore les mains et la tête!» '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jésus lui dit: «Celui qui s''est baigné n''a besoin que de se laver les pieds pour être entièrement pur, et vous êtes purs, mais pas tous.» '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'En effet, il connaissait celui qui était prêt à le trahir; voilà pourquoi il dit: «Vous n''êtes pas tous purs.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Après leur avoir lavé les pieds, il reprit ses vêtements, se remit à table et leur dit: «Comprenez-vous ce que je vous ai fait? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Vous m''appelez Maître et Seigneur, et vous avez raison, car je le suis. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Si donc je vous ai lavé les pieds, moi, le Seigneur et le Maître, vous devez aussi vous laver les pieds les uns aux autres, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'car je vous ai donné un exemple afin que vous fassiez comme je vous ai fait. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'En vérité, en vérité, je vous le dis, le serviteur n''est pas plus grand que son seigneur, ni l''apôtre plus grand que celui qui l''a envoyé. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Si vous savez cela, vous êtes heureux, pourvu que vous le mettiez en pratique.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '»Je ne parle pas de vous tous: je connais ceux que j''ai choisis. Mais il faut que l''Ecriture s''accomplisse: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Celui qui mange le pain avec moi a levé son talon contre moi.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Celui qui… contre moi: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 41.10
      metadata:
        usfm: PSA.41.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Je vous le dis déjà maintenant, avant que cela n''arrive, afin que, lorsque cela arrivera, vous croyiez que '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: moi, je suis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Moi, je suis: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'allusion au nom que Dieu s''est donné quand il s''est révélé à Moïse en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 3.14
      metadata:
        usfm: EXO.3.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: En vérité, en vérité, je vous le dis, qui reçoit celui que j'aurai envoyé me reçoit, moi, et qui me reçoit reçoit celui qui m'a envoyé.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Après avoir dit ces paroles, Jésus fut profondément troublé, et il déclara solennellement: «En vérité, en vérité, je vous le dis, l''un de vous me trahira.» '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les disciples se regardaient les uns les autres, sans savoir de qui il parlait. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Un des disciples, celui que Jésus aimait, était à table à côté de Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Simon Pierre lui fit donc signe de demander qui était celui dont parlait Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Ce disciple se pencha vers Jésus et lui dit: «Seigneur, qui est-ce?» '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jésus répondit: «C''est celui à qui je donnerai le morceau que je vais tremper.» Puis il trempa le morceau et le donna à Judas, fils de Simon, l''Iscariot. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Dès que Judas eut pris le morceau, Satan entra en lui. Jésus lui dit: «Ce que tu fais, fais-le rapidement.» '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Aucun de ceux qui étaient à table ne comprit pourquoi il lui disait cela. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Comme Judas tenait la bourse, quelques-uns pensaient que Jésus lui disait: «Achète ce dont nous avons besoin pour la fête» ou qu''il lui demandait de donner quelque chose aux pauvres. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Après avoir pris le morceau, Judas sortit aussitôt. Il faisait nuit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Lorsque Judas fut sorti, Jésus dit: «Maintenant, la gloire du Fils de l''homme a été révélée et la gloire de Dieu a été révélée en lui. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '[Si la gloire de Dieu a été révélée en lui,] Dieu aussi révélera sa gloire en lui-même, et il la révélera très bientôt. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Mes petits enfants, je suis encore avec vous pour un peu de temps. Vous me chercherez, et ce que j''ai dit aux Juifs: ‘Vous ne pouvez pas venir où je vais’, je vous le dis à vous aussi maintenant. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Je vous donne un commandement nouveau: Aimez-vous les uns les autres. Comme je vous ai aimés, vous aussi, aimez-vous les uns les autres. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'C''est à cela que tous reconnaîtront que vous êtes mes disciples: si vous avez de l''amour les uns pour les autres.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Simon Pierre lui dit: «Seigneur, où vas-tu?» Jésus répondit: «Tu ne peux pas me suivre maintenant là où je vais, mais tu m''y suivras plus tard.» '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: '«Seigneur, lui dit Pierre, pourquoi ne puis-je pas te suivre maintenant? Je donnerai ma vie pour toi.» '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Jésus répondit: «Tu donneras ta vie pour moi? En vérité, en vérité, je te le dis, le coq ne chantera pas avant que tu ne m''aies renié trois fois.'
