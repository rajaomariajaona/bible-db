document_id: JHN.13,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Dernières instructions de Jésus à ses disciples
  - type: heading
    content: 13.1–17.26
  - type: heading
    content: Jésus lave les pieds de ses disciples
  - type: text
    content: 'Avant la fête de la Pâque, Jésus, sachant que son heure était venue de passer de ce monde au Père et ayant aimé ceux qui lui appartenaient dans le monde, les aima jusqu''à l''extrême. '
  '10':
  - type: text
    content: 'Jésus lui dit: «Celui qui s''est baigné n''a besoin que de se laver les pieds pour être entièrement pur, et vous êtes purs, mais pas tous.» '
  '11':
  - type: text
    content: 'En effet, il connaissait celui qui était prêt à le trahir; voilà pourquoi il dit: «Vous n''êtes pas tous purs.»'
  '12':
  - type: text
    content: 'Après leur avoir lavé les pieds, il reprit ses vêtements, se remit à table et leur dit: «Comprenez-vous ce que je vous ai fait? '
  '13':
  - type: text
    content: 'Vous m''appelez Maître et Seigneur, et vous avez raison, car je le suis. '
  '14':
  - type: text
    content: 'Si donc je vous ai lavé les pieds, moi, le Seigneur et le Maître, vous devez aussi vous laver les pieds les uns aux autres, '
  '15':
  - type: text
    content: 'car je vous ai donné un exemple afin que vous fassiez comme je vous ai fait. '
  '16':
  - type: text
    content: 'En vérité, en vérité, je vous le dis, le serviteur n''est pas plus grand que son seigneur, ni l''apôtre plus grand que celui qui l''a envoyé. '
  '17':
  - type: text
    content: Si vous savez cela, vous êtes heureux, pourvu que vous le mettiez en pratique.
  '18':
  - type: text
    content: '»Je ne parle pas de vous tous: je connais ceux que j''ai choisis. Mais il faut que l''Ecriture s''accomplisse: '
  - type: text
    content: Celui qui mange le pain avec moi a levé son talon contre moi.
  - type: note
    content: 'Celui qui… contre moi: citation du Psaume 41.10.'
  - type: text
    content: ' '
  '19':
  - type: text
    content: 'Je vous le dis déjà maintenant, avant que cela n''arrive, afin que, lorsque cela arrivera, vous croyiez que '
  - type: text
    content: moi, je suis
  - type: note
    content: 'Moi, je suis: allusion au nom que Dieu s''est donné quand il s''est révélé à Moïse en Exode 3.14.'
  - type: text
    content: '. '
  '2':
  - type: text
    content: 'C''était pendant le souper. Le diable avait déjà mis dans le cœur de Judas l''Iscariot, fils de Simon, l''intention de le trahir. '
  '20':
  - type: text
    content: En vérité, en vérité, je vous le dis, qui reçoit celui que j'aurai envoyé me reçoit, moi, et qui me reçoit reçoit celui qui m'a envoyé.»
  '21':
  - type: text
    content: 'Après avoir dit ces paroles, Jésus fut profondément troublé, et il déclara solennellement: «En vérité, en vérité, je vous le dis, l''un de vous me trahira.» '
  '22':
  - type: text
    content: 'Les disciples se regardaient les uns les autres, sans savoir de qui il parlait. '
  '23':
  - type: text
    content: 'Un des disciples, celui que Jésus aimait, était à table à côté de Jésus. '
  '24':
  - type: text
    content: 'Simon Pierre lui fit donc signe de demander qui était celui dont parlait Jésus. '
  '25':
  - type: text
    content: 'Ce disciple se pencha vers Jésus et lui dit: «Seigneur, qui est-ce?» '
  '26':
  - type: text
    content: 'Jésus répondit: «C''est celui à qui je donnerai le morceau que je vais tremper.» Puis il trempa le morceau et le donna à Judas, fils de Simon, l''Iscariot. '
  '27':
  - type: text
    content: 'Dès que Judas eut pris le morceau, Satan entra en lui. Jésus lui dit: «Ce que tu fais, fais-le rapidement.» '
  '28':
  - type: text
    content: 'Aucun de ceux qui étaient à table ne comprit pourquoi il lui disait cela. '
  '29':
  - type: text
    content: 'Comme Judas tenait la bourse, quelques-uns pensaient que Jésus lui disait: «Achète ce dont nous avons besoin pour la fête» ou qu''il lui demandait de donner quelque chose aux pauvres. '
  '3':
  - type: text
    content: 'Jésus savait que le Père avait tout remis entre ses mains, qu''il était venu de Dieu et qu''il retournait vers Dieu. '
  '30':
  - type: text
    content: Après avoir pris le morceau, Judas sortit aussitôt. Il faisait nuit.
  '31':
  - type: text
    content: 'Lorsque Judas fut sorti, Jésus dit: «Maintenant, la gloire du Fils de l''homme a été révélée et la gloire de Dieu a été révélée en lui. '
  '32':
  - type: text
    content: '[Si la gloire de Dieu a été révélée en lui,] Dieu aussi révélera sa gloire en lui-même, et il la révélera très bientôt. '
  '33':
  - type: text
    content: 'Mes petits enfants, je suis encore avec vous pour un peu de temps. Vous me chercherez, et ce que j''ai dit aux Juifs: ‘Vous ne pouvez pas venir où je vais’, je vous le dis à vous aussi maintenant. '
  '34':
  - type: text
    content: 'Je vous donne un commandement nouveau: Aimez-vous les uns les autres. Comme je vous ai aimés, vous aussi, aimez-vous les uns les autres. '
  '35':
  - type: text
    content: 'C''est à cela que tous reconnaîtront que vous êtes mes disciples: si vous avez de l''amour les uns pour les autres.»'
  '36':
  - type: text
    content: 'Simon Pierre lui dit: «Seigneur, où vas-tu?» Jésus répondit: «Tu ne peux pas me suivre maintenant là où je vais, mais tu m''y suivras plus tard.» '
  '37':
  - type: text
    content: '«Seigneur, lui dit Pierre, pourquoi ne puis-je pas te suivre maintenant? Je donnerai ma vie pour toi.» '
  '38':
  - type: text
    content: 'Jésus répondit: «Tu donneras ta vie pour moi? En vérité, en vérité, je te le dis, le coq ne chantera pas avant que tu ne m''aies renié trois fois.'
  '4':
  - type: text
    content: 'Il se leva de table, quitta ses vêtements et prit un linge qu''il mit autour de sa taille. '
  '5':
  - type: text
    content: 'Ensuite il versa de l''eau dans un bassin et il commença à laver les pieds des disciples et à les essuyer avec le linge qu''il avait autour de la taille. '
  '6':
  - type: text
    content: 'Il arriva donc vers Simon Pierre qui lui dit: «Toi, Seigneur, tu me laves les pieds!» '
  '7':
  - type: text
    content: 'Jésus lui répondit: «Ce que je fais, tu ne le sais pas maintenant, mais tu le comprendras par la suite.» '
  '8':
  - type: text
    content: 'Pierre lui dit: «Non, jamais tu ne me laveras les pieds.» Jésus lui répondit: «Si je ne te lave pas, tu n''auras pas de part avec moi.» '
  '9':
  - type: text
    content: 'Simon Pierre lui dit: «Seigneur, non seulement les pieds, mais encore les mains et la tête!» '
