document_id: PSA.107,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Cinquième livre
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 107–150
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La grâce divine
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Louez l'Eternel, car il est bon!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, sa bonté dure éternellement.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Ceux qui habitaient dans les ténèbres et l'ombre de la mort
  - type: usfm
    marker: q1
    children:
    - type: text
      text: étaient prisonniers de la misère et des chaînes
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: parce qu'ils s'étaient révoltés contre les paroles de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce qu'ils avaient méprisé le conseil du Très-Haut.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Il a humilié leur cœur par la souffrance: ils trébuchaient, et personne ne les secourait.'
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Dans leur détresse, ils ont crié à l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et il les a délivrés de leurs angoisses:'
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: il les a fait sortir des ténèbres et de l'ombre de la mort,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a arraché leurs liens.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Qu'ils louent l'Eternel pour sa bonté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour ses merveilles en faveur des hommes,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: car il a mis les portes de bronze en pièces,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a brisé les verrous en fer.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Les fous! Par leur conduite coupable
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et par leurs fautes, ils s'étaient rendus malheureux.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Ils avaient en horreur toute nourriture
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et touchaient aux portes de la mort.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Dans leur détresse, ils ont crié à l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et il les a délivrés de leurs angoisses:'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Que les rachetés de l'Eternel le disent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qu'il a rachetés du pouvoir de l'ennemi
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: il a envoyé sa parole et les a guéris,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il les a fait échapper à la tombe.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Qu'ils louent l'Eternel pour sa bonté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour ses merveilles en faveur des hommes!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Qu'ils offrent des sacrifices de reconnaissance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'ils racontent quelle est sa façon d'agir avec des cris de joie!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Ceux qui étaient partis en mer sur leur bateau
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et travaillaient sur les grandes eaux,
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: ceux-là ont vu la façon d'agir de l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses merveilles en haute mer.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: D'un mot, il a fait souffler un vent de tempête
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui a soulevé les vagues de la mer.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Ils montaient vers le ciel, ils descendaient dans l'abîme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils étaient angoissés face au danger;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: saisis de vertige, ils titubaient comme un homme ivre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et toute leur habileté était réduite à néant.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Dans leur détresse, ils ont crié à l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et il les a délivrés de leurs angoisses:'
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: il a arrêté la tempête, ramené le calme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les vagues se sont calmées.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: et qu'il a rassemblés de tous les pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de l'est et de l'ouest, du nord et du sud!
  '30':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: Ils se sont réjouis de ce qu'elles s'étaient apaisées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'Eternel les a conduits au port désiré.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Qu'ils louent l'Eternel pour sa bonté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour ses merveilles en faveur des hommes!
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Qu'ils proclament sa grandeur dans l'assemblée du peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'ils le célèbrent dans la réunion des anciens!
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Il change les fleuves en désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les sources d'eau en zone aride,
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: le pays fertile en pays salé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '107.34 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Salé: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: et donc stérile.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de la méchanceté de ses habitants.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Il change le désert en étang,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la terre aride en sources d'eau,
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: et il y établit ceux qui sont affamés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils fondent une ville pour l'habiter,
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ils ensemencent des champs, plantent des vignes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils en récoltent les fruits.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Il les bénit, ils deviennent très nombreux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il ne fait pas diminuer leur bétail.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: D'autres sont diminués et humiliés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par l'oppression, le malheur et le tourment.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ils erraient dans le désert, en chemin dans les lieux arides,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans trouver de ville où ils puissent habiter.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Dieu déverse le mépris sur les grands
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les fait errer dans des déserts sans chemin,
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: mais il délivre le pauvre de sa misère.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il rend les familles aussi nombreuses que des troupeaux.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Les hommes droits le voient et se réjouissent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que toute injustice est réduite au silence.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Que celui qui est sage observe cela,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'il soit attentif aux bontés de l'Eternel!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Ils souffraient de la faim et de la soif;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leur âme était abattue.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Dans leur détresse, ils ont crié à l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et il les a délivrés de leurs angoisses:'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: il les a conduits par un chemin bien droit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour qu'ils arrivent dans une ville où ils puissent habiter.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Qu'ils louent l'Eternel pour sa bonté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour ses merveilles en faveur des hommes,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: car il a désaltéré les assoiffés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a comblé de biens les affamés.
