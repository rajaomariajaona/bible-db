document_id: PSA.107,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Cinquième livre
  - type: heading
    content: 107–150
  - type: heading
    content: La grâce divine
  - type: text
    content: Louez l'Eternel, car il est bon!
  - type: text
    content: Oui, sa bonté dure éternellement.
  '10':
  - type: text
    content: Ceux qui habitaient dans les ténèbres et l'ombre de la mort
  - type: text
    content: étaient prisonniers de la misère et des chaînes
  '11':
  - type: text
    content: parce qu'ils s'étaient révoltés contre les paroles de Dieu,
  - type: text
    content: parce qu'ils avaient méprisé le conseil du Très-Haut.
  '12':
  - type: text
    content: 'Il a humilié leur cœur par la souffrance: ils trébuchaient, et personne ne les secourait.'
  '13':
  - type: text
    content: Dans leur détresse, ils ont crié à l'Eternel,
  - type: text
    content: 'et il les a délivrés de leurs angoisses:'
  '14':
  - type: text
    content: il les a fait sortir des ténèbres et de l'ombre de la mort,
  - type: text
    content: il a arraché leurs liens.
  '15':
  - type: text
    content: Qu'ils louent l'Eternel pour sa bonté
  - type: text
    content: et pour ses merveilles en faveur des hommes,
  '16':
  - type: text
    content: car il a mis les portes de bronze en pièces,
  - type: text
    content: il a brisé les verrous en fer.
  '17':
  - type: text
    content: Les fous! Par leur conduite coupable
  - type: text
    content: et par leurs fautes, ils s'étaient rendus malheureux.
  '18':
  - type: text
    content: Ils avaient en horreur toute nourriture
  - type: text
    content: et touchaient aux portes de la mort.
  '19':
  - type: text
    content: Dans leur détresse, ils ont crié à l'Eternel,
  - type: text
    content: 'et il les a délivrés de leurs angoisses:'
  '2':
  - type: text
    content: Que les rachetés de l'Eternel le disent,
  - type: text
    content: ceux qu'il a rachetés du pouvoir de l'ennemi
  '20':
  - type: text
    content: il a envoyé sa parole et les a guéris,
  - type: text
    content: il les a fait échapper à la tombe.
  '21':
  - type: text
    content: Qu'ils louent l'Eternel pour sa bonté
  - type: text
    content: et pour ses merveilles en faveur des hommes!
  '22':
  - type: text
    content: Qu'ils offrent des sacrifices de reconnaissance
  - type: text
    content: et qu'ils racontent quelle est sa façon d'agir avec des cris de joie!
  '23':
  - type: text
    content: Ceux qui étaient partis en mer sur leur bateau
  - type: text
    content: et travaillaient sur les grandes eaux,
  '24':
  - type: text
    content: ceux-là ont vu la façon d'agir de l'Eternel
  - type: text
    content: et ses merveilles en haute mer.
  '25':
  - type: text
    content: D'un mot, il a fait souffler un vent de tempête
  - type: text
    content: qui a soulevé les vagues de la mer.
  '26':
  - type: text
    content: Ils montaient vers le ciel, ils descendaient dans l'abîme,
  - type: text
    content: ils étaient angoissés face au danger;
  '27':
  - type: text
    content: saisis de vertige, ils titubaient comme un homme ivre,
  - type: text
    content: et toute leur habileté était réduite à néant.
  '28':
  - type: text
    content: Dans leur détresse, ils ont crié à l'Eternel,
  - type: text
    content: 'et il les a délivrés de leurs angoisses:'
  '29':
  - type: text
    content: il a arrêté la tempête, ramené le calme,
  - type: text
    content: et les vagues se sont calmées.
  '3':
  - type: text
    content: et qu'il a rassemblés de tous les pays,
  - type: text
    content: de l'est et de l'ouest, du nord et du sud!
  '30':
  - type: text
    content: Ils se sont réjouis de ce qu'elles s'étaient apaisées,
  - type: text
    content: et l'Eternel les a conduits au port désiré.
  '31':
  - type: text
    content: Qu'ils louent l'Eternel pour sa bonté
  - type: text
    content: et pour ses merveilles en faveur des hommes!
  '32':
  - type: text
    content: Qu'ils proclament sa grandeur dans l'assemblée du peuple
  - type: text
    content: et qu'ils le célèbrent dans la réunion des anciens!
  '33':
  - type: text
    content: Il change les fleuves en désert,
  - type: text
    content: les sources d'eau en zone aride,
  '34':
  - type: text
    content: le pays fertile en pays salé
  - type: note
    content: 'Salé: et donc stérile.'
  - type: text
    content: ','
  - type: text
    content: à cause de la méchanceté de ses habitants.
  '35':
  - type: text
    content: Il change le désert en étang,
  - type: text
    content: la terre aride en sources d'eau,
  '36':
  - type: text
    content: et il y établit ceux qui sont affamés.
  - type: text
    content: Ils fondent une ville pour l'habiter,
  '37':
  - type: text
    content: ils ensemencent des champs, plantent des vignes,
  - type: text
    content: et ils en récoltent les fruits.
  '38':
  - type: text
    content: Il les bénit, ils deviennent très nombreux,
  - type: text
    content: et il ne fait pas diminuer leur bétail.
  '39':
  - type: text
    content: D'autres sont diminués et humiliés
  - type: text
    content: par l'oppression, le malheur et le tourment.
  '4':
  - type: text
    content: Ils erraient dans le désert, en chemin dans les lieux arides,
  - type: text
    content: sans trouver de ville où ils puissent habiter.
  '40':
  - type: text
    content: Dieu déverse le mépris sur les grands
  - type: text
    content: et les fait errer dans des déserts sans chemin,
  '41':
  - type: text
    content: mais il délivre le pauvre de sa misère.
  - type: text
    content: Il rend les familles aussi nombreuses que des troupeaux.
  '42':
  - type: text
    content: Les hommes droits le voient et se réjouissent,
  - type: text
    content: tandis que toute injustice est réduite au silence.
  '43':
  - type: text
    content: Que celui qui est sage observe cela,
  - type: text
    content: et qu'il soit attentif aux bontés de l'Eternel!
  '5':
  - type: text
    content: Ils souffraient de la faim et de la soif;
  - type: text
    content: leur âme était abattue.
  '6':
  - type: text
    content: Dans leur détresse, ils ont crié à l'Eternel,
  - type: text
    content: 'et il les a délivrés de leurs angoisses:'
  '7':
  - type: text
    content: il les a conduits par un chemin bien droit,
  - type: text
    content: pour qu'ils arrivent dans une ville où ils puissent habiter.
  '8':
  - type: text
    content: Qu'ils louent l'Eternel pour sa bonté
  - type: text
    content: et pour ses merveilles en faveur des hommes,
  '9':
  - type: text
    content: car il a désaltéré les assoiffés,
  - type: text
    content: il a comblé de biens les affamés.
