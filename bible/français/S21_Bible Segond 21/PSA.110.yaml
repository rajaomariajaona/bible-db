document_id: PSA.110,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Messie, roi et prêtre
  - type: text
    content: Psaume de David.
  - type: text
    content: '*L''Eternel a déclaré à mon Seigneur:'
  - type: text
    content: «Assieds-toi à ma droite
  - type: text
    content: jusqu'à ce que j'aie fait de tes ennemis ton marchepied.»
  - type: note
    content: 'L''Eternel… marchepied: cité à de multiples reprises dans le Nouveau Testament en rapport avec Christ (Matthieu 22.44; 26.64; Marc 12.36; 14.62; Luc 20.42-43; 22.69; Actes 2.34-35; 1 Corinthiens 15.25; Hébreux 1.13; 5.6; etc.).'
  '2':
  - type: text
    content: 'L''Eternel étendra de Sion le sceptre de ta puissance:'
  - type: text
    content: domine au milieu de tes ennemis!
  '3':
  - type: text
    content: Ton peuple est plein d'ardeur, quand tu rassembles ton armée;
  - type: text
    content: avec des ornements sacrés, du sein de l'aurore,
  - type: text
    content: ta jeunesse vient à toi comme une rosée.
  '4':
  - type: text
    content: '*L''Eternel l''a juré, et il ne se rétractera pas:'
  - type: text
    content: «Tu es prêtre pour toujours
  - type: text
    content: à la manière de Melchisédek.»
  - type: note
    content: 'L''Eternel… Melchisédek: cité en Hébreux 5.6; 6.20; 7.17, 21 comme s''appliquant à Christ, dont le ministère de prêtre est supérieur à celui des prêtres lévitiques. Melchisédek: roi de Salem et prêtre du Dieu très-haut qui a béni Abram (Genèse 14.18-20).'
  '5':
  - type: text
    content: Le Seigneur est à ta droite,
  - type: text
    content: il écrase des rois le jour de sa colère.
  '6':
  - type: text
    content: 'Il exerce la justice parmi les nations: tout est rempli de cadavres,'
  - type: text
    content: il écrase des chefs sur tout le territoire.
  '7':
  - type: text
    content: Il boit au torrent pendant la marche,
  - type: text
    content: c'est pourquoi il relève la tête.
