document_id: 2CH.19
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Quant à Josaphat, le roi de Juda, il revint en paix chez lui à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le voyant Jéhu, fils de Hanani, alla à la rencontre du roi Josaphat et lui dit: «Doit-on venir en aide au méchant et aimes-tu ceux qui détestent l''Eternel? A cause de cela, l''Eternel est irrité contre toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Cependant, il a trouvé de bonnes choses en toi, car tu as fait disparaître du pays les poteaux sacrés et tu as appliqué ton cœur à chercher Dieu.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Réforme de la justice
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Josaphat se réinstalla à Jérusalem, puis il se remit à visiter le peuple, depuis Beer-Shéba jusqu'à la région montagneuse d'Ephraïm, et il le fit revenir à l'Eternel, le Dieu de ses ancêtres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il établit des juges dans le pays, dans chacune des villes fortifiées de Juda, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'et il dit aux juges: «Faites attention à votre manière d''agir, car ce n''est pas pour les hommes que vous prononcerez des jugements, c''est pour l''Eternel, et il sera près de vous quand vous rendrez votre verdict. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Maintenant, que la crainte de l'Eternel soit sur vous. Veillez sur vos actes, car il n'y a chez l'Eternel, notre Dieu, ni injustice, ni favoritisme, ni acceptation de pots-de-vin.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'A Jérusalem aussi, Josaphat avait établi des Lévites, des prêtres et des chefs de famille pour Israël, pour l''application du droit de l''Eternel et les contestations. Ils revinrent alors à Jérusalem, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'et voici les ordres qu''il leur donna: «Vous agirez dans la crainte de l''Eternel, avec fidélité et avec intégrité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dans toute cause que vous soumettront vos frères établis dans leurs villes, en rapport avec un meurtre, une loi, un commandement, des prescriptions et des règles, vous les éclairerez. Ainsi, ils n''offenseront pas l''Eternel et sa colère n''éclatera pas contre eux et vous. Agissez de cette manière et vous ne commettrez pas d''offense. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Vous avez à votre tête le grand-prêtre Amaria pour toutes les affaires de l'Eternel et le chef de la communauté de Juda Zebadia, fils d'Ismaël, pour toutes les affaires du roi. Vous avez aussi à vos côtés des Lévites comme magistrats. Montrez-vous forts et agissez, et que l'Eternel soit avec celui qui fera le bien!»
