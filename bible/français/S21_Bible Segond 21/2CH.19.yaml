document_id: 2CH.19,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Quant à Josaphat, le roi de Juda, il revint en paix chez lui à Jérusalem. '
  '10':
  - type: text
    content: 'Dans toute cause que vous soumettront vos frères établis dans leurs villes, en rapport avec un meurtre, une loi, un commandement, des prescriptions et des règles, vous les éclairerez. Ainsi, ils n''offenseront pas l''Eternel et sa colère n''éclatera pas contre eux et vous. Agissez de cette manière et vous ne commettrez pas d''offense. '
  '11':
  - type: text
    content: Vous avez à votre tête le grand-prêtre Amaria pour toutes les affaires de l'Eternel et le chef de la communauté de Juda Zebadia, fils d'Ismaël, pour toutes les affaires du roi. Vous avez aussi à vos côtés des Lévites comme magistrats. Montrez-vous forts et agissez, et que l'Eternel soit avec celui qui fera le bien!»
  '2':
  - type: text
    content: 'Le voyant Jéhu, fils de Hanani, alla à la rencontre du roi Josaphat et lui dit: «Doit-on venir en aide au méchant et aimes-tu ceux qui détestent l''Eternel? A cause de cela, l''Eternel est irrité contre toi. '
  '3':
  - type: text
    content: Cependant, il a trouvé de bonnes choses en toi, car tu as fait disparaître du pays les poteaux sacrés et tu as appliqué ton cœur à chercher Dieu.»
  - type: heading
    content: Réforme de la justice
  '4':
  - type: text
    content: Josaphat se réinstalla à Jérusalem, puis il se remit à visiter le peuple, depuis Beer-Shéba jusqu'à la région montagneuse d'Ephraïm, et il le fit revenir à l'Eternel, le Dieu de ses ancêtres.
  '5':
  - type: text
    content: 'Il établit des juges dans le pays, dans chacune des villes fortifiées de Juda, '
  '6':
  - type: text
    content: 'et il dit aux juges: «Faites attention à votre manière d''agir, car ce n''est pas pour les hommes que vous prononcerez des jugements, c''est pour l''Eternel, et il sera près de vous quand vous rendrez votre verdict. '
  '7':
  - type: text
    content: Maintenant, que la crainte de l'Eternel soit sur vous. Veillez sur vos actes, car il n'y a chez l'Eternel, notre Dieu, ni injustice, ni favoritisme, ni acceptation de pots-de-vin.»
  '8':
  - type: text
    content: 'A Jérusalem aussi, Josaphat avait établi des Lévites, des prêtres et des chefs de famille pour Israël, pour l''application du droit de l''Eternel et les contestations. Ils revinrent alors à Jérusalem, '
  '9':
  - type: text
    content: 'et voici les ordres qu''il leur donna: «Vous agirez dans la crainte de l''Eternel, avec fidélité et avec intégrité. '
