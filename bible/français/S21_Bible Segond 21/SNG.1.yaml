document_id: SNG.1,152
type_code: fra
verses:
  '1':
  - type: text
    content: Cantique des cantiques de Salomon.
  - type: heading
    content: La jeune femme
  '10':
  - type: text
    content: Tes joues sont charmantes avec des bijoux,
  - type: text
    content: ton cou est charmant avec des colliers.
  - type: heading
    content: Les filles de Jérusalem
  '11':
  - type: text
    content: Nous te ferons des bijoux en or
  - type: text
    content: avec des points en argent.
  - type: heading
    content: La jeune femme
  '12':
  - type: text
    content: Tandis que le roi est dans son entourage,
  - type: text
    content: mon nard diffuse son parfum.
  '13':
  - type: text
    content: Mon bien-aimé est pour moi un bouquet de myrrhe.
  - type: text
    content: Il passera la nuit entre mes seins.
  '14':
  - type: text
    content: Mon bien-aimé est pour moi une grappe de henné
  - type: text
    content: des vignes d'En-Guédi.
  - type: heading
    content: Le jeune homme
  '15':
  - type: text
    content: Que tu es belle, mon amie, que tu es belle!
  - type: text
    content: Tes yeux sont des colombes.
  - type: heading
    content: La jeune femme
  '16':
  - type: text
    content: Que tu es beau, mon bien-aimé, que tu es agréable!
  - type: text
    content: Notre lit, c'est la verdure.
  '17':
  - type: text
    content: Les solives de nos maisons sont des cèdres,
  - type: text
    content: nos lambris sont des cyprès.
  '2':
  - type: text
    content: Qu'il m'embrasse des baisers de sa bouche!
  - type: text
    content: Oui, ton amour est meilleur que le vin,
  '3':
  - type: text
    content: tes parfums ont une odeur agréable.
  - type: text
    content: Ton nom même est un parfum qui se diffuse.
  - type: text
    content: Voilà pourquoi les jeunes filles t'aiment.
  '4':
  - type: text
    content: Entraîne-moi derrière toi! Courons!
  - type: text
    content: Le roi m'a introduite dans ses appartements.
  - type: heading
    content: Les filles de Jérusalem
  - type: text
    content: Réjouissons-nous, soyons dans l'allégresse à cause de toi!
  - type: text
    content: Célébrons ton amour plus que le vin!
  - type: text
    content: C'est avec raison que l'on t'aime.
  - type: heading
    content: La jeune femme
  '5':
  - type: text
    content: Je suis noire, mais je suis charmante, filles de Jérusalem,
  - type: text
    content: autant que les tentes de Kédar, que les pavillons de Salomon.
  '6':
  - type: text
    content: 'Ne prêtez pas attention à mon teint noir:'
  - type: text
    content: c'est le soleil qui m'a brûlée.
  - type: text
    content: Les fils de ma mère se sont irrités contre moi
  - type: text
    content: et ils ont fait de moi la gardienne des vignes,
  - type: text
    content: mais ma vigne à moi, je ne l'ai pas gardée.
  '7':
  - type: text
    content: Toi que mon cœur aime, révèle-moi
  - type: text
    content: où tu conduis ton troupeau,
  - type: text
    content: où tu le fais se reposer à midi!
  - type: text
    content: Pourquoi, en effet, serais-je comme une femme voilée
  - type: text
    content: près des troupeaux de tes compagnons?
  - type: heading
    content: Les filles de Jérusalem
  '8':
  - type: text
    content: Si tu ne le sais pas, toi la plus belle des femmes,
  - type: text
    content: sors sur les traces du petit bétail
  - type: text
    content: et conduis tes chevreaux
  - type: text
    content: près des abris des bergers!
  - type: heading
    content: Le jeune homme
  '9':
  - type: text
    content: C'est à une jument attelée aux chars du pharaon
  - type: text
    content: que je te compare, mon amie.
