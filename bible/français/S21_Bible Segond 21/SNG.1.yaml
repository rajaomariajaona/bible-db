document_id: SNG.1
type_code: fra
segments:
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Cantique des cantiques de Salomon.
- type: usfm
  marker: sp
  children:
  - type: text
    text: La jeune femme
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Qu'il m'embrasse des baisers de sa bouche!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, ton amour est meilleur que le vin,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: tes parfums ont une odeur agréable.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ton nom même est un parfum qui se diffuse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voilà pourquoi les jeunes filles t'aiment.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Entraîne-moi derrière toi! Courons!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le roi m'a introduite dans ses appartements.
- type: usfm
  marker: sp
  children:
  - type: text
    text: Les filles de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: text
    text: Réjouissons-nous, soyons dans l'allégresse à cause de toi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Célébrons ton amour plus que le vin!
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est avec raison que l'on t'aime.
- type: usfm
  marker: sp
  children:
  - type: text
    text: La jeune femme
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je suis noire, mais je suis charmante, filles de Jérusalem,
- type: usfm
  marker: q1
  children:
  - type: text
    text: autant que les tentes de Kédar, que les pavillons de Salomon.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ne prêtez pas attention à mon teint noir:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est le soleil qui m'a brûlée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les fils de ma mère se sont irrités contre moi
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils ont fait de moi la gardienne des vignes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ma vigne à moi, je ne l'ai pas gardée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Toi que mon cœur aime, révèle-moi
- type: usfm
  marker: q1
  children:
  - type: text
    text: où tu conduis ton troupeau,
- type: usfm
  marker: q1
  children:
  - type: text
    text: où tu le fais se reposer à midi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi, en effet, serais-je comme une femme voilée
- type: usfm
  marker: q1
  children:
  - type: text
    text: près des troupeaux de tes compagnons?
- type: usfm
  marker: sp
  children:
  - type: text
    text: Les filles de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Si tu ne le sais pas, toi la plus belle des femmes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sors sur les traces du petit bétail
- type: usfm
  marker: q1
  children:
  - type: text
    text: et conduis tes chevreaux
- type: usfm
  marker: q1
  children:
  - type: text
    text: près des abris des bergers!
- type: usfm
  marker: sp
  children:
  - type: text
    text: Le jeune homme
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: C'est à une jument attelée aux chars du pharaon
- type: usfm
  marker: q1
  children:
  - type: text
    text: que je te compare, mon amie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tes joues sont charmantes avec des bijoux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ton cou est charmant avec des colliers.
- type: usfm
  marker: sp
  children:
  - type: text
    text: Les filles de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Nous te ferons des bijoux en or
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec des points en argent.
- type: usfm
  marker: sp
  children:
  - type: text
    text: La jeune femme
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Tandis que le roi est dans son entourage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon nard diffuse son parfum.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Mon bien-aimé est pour moi un bouquet de myrrhe.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il passera la nuit entre mes seins.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mon bien-aimé est pour moi une grappe de henné
- type: usfm
  marker: q1
  children:
  - type: text
    text: des vignes d'En-Guédi.
- type: usfm
  marker: sp
  children:
  - type: text
    text: Le jeune homme
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Que tu es belle, mon amie, que tu es belle!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tes yeux sont des colombes.
- type: usfm
  marker: sp
  children:
  - type: text
    text: La jeune femme
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Que tu es beau, mon bien-aimé, que tu es agréable!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Notre lit, c'est la verdure.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Les solives de nos maisons sont des cèdres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: nos lambris sont des cyprès.
