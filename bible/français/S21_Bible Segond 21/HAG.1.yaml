document_id: HAG.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Appel à reconstruire le temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La deuxième année du règne de Darius, le premier jour du sixième mois, la parole de l''Eternel fut adressée par l''intermédiaire du prophète Aggée au gouverneur de Juda Zorobabel, fils de Shealthiel, et au grand-prêtre Josué, fils de Jotsadak: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Voici ce que dit l''Eternel, le maître de l''univers: Ce peuple prétend: ‘Il n''est pas encore venu, le moment de reconstruire la maison de l''Eternel.’ '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Et pourtant, la parole de l''Eternel leur était adressée par l''intermédiaire du prophète Aggée: '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ‘Est-ce le moment pour vous d'habiter vos maisons lambrissées, quand ce temple est détruit?’
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '»Voici ce que dit maintenant l''Eternel, le maître de l''univers: Réfléchissez attentivement à votre conduite! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Vous semez beaucoup et vous récoltez peu; vous mangez et vous n'êtes pas rassasiés; vous buvez et vous n'êtes pas désaltérés; vous êtes habillés et vous n'avez pas chaud; le salaire de celui qui travaille tombe dans un sac percé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '»Voici ce que dit l''Eternel, le maître de l''univers:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Réfléchissez attentivement à votre conduite!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Montez sur la montagne, apportez du bois
- type: usfm
  marker: q1
  children:
  - type: text
    text: et construisez le temple!
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'en aurai de la joie et je serai honoré,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Vous comptiez sur beaucoup, et vous avez eu peu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous l'avez rentré chez vous, mais j'ai soufflé dessus.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi? déclare l'Eternel, le maître de l'univers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause de ma maison qui est détruite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que vous vous empressez chacun pour votre maison.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Voilà pourquoi le ciel a retenu la rosée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la terre ses produits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: J'ai appelé la sécheresse sur le pays, sur les montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur le blé, sur le vin nouveau, sur l'huile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur les produits du sol,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur les hommes et sur les bêtes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur tout le travail de vos mains.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Zorobabel, fils de Shealthiel, le grand-prêtre Josué, fils de Jotsadak, et tout le reste du peuple écoutèrent la voix de l''Eternel, leur Dieu, et les paroles du prophète Aggée, conformément à la mission que l''Eternel, leur Dieu, lui avait confiée. Et le peuple fut saisi de crainte devant l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Aggée, le messager de l''Eternel, dit au peuple d''après l''ordre de l''Eternel: «Je suis moi-même avec vous, déclare l''Eternel.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'L''Eternel réveilla l''esprit du gouverneur de Juda Zorobabel, fils de Shealthiel, l''esprit du grand-prêtre Josué, fils de Jotsadak, et l''esprit de tout le reste du peuple. Ils vinrent et ils se mirent à l''œuvre dans la maison de l''Eternel, le maître de l''univers, leur Dieu, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: le vingt-quatrième jour du sixième mois, la deuxième année du règne de Darius.
