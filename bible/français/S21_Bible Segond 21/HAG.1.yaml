document_id: HAG.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Appel à reconstruire le temple
  - type: text
    content: 'La deuxième année du règne de Darius, le premier jour du sixième mois, la parole de l''Eternel fut adressée par l''intermédiaire du prophète Aggée au gouverneur de Juda Zorobabel, fils de Shealthiel, et au grand-prêtre Josué, fils de Jotsadak: '
  '10':
  - type: text
    content: Voilà pourquoi le ciel a retenu la rosée,
  - type: text
    content: et la terre ses produits.
  '11':
  - type: text
    content: J'ai appelé la sécheresse sur le pays, sur les montagnes,
  - type: text
    content: sur le blé, sur le vin nouveau, sur l'huile,
  - type: text
    content: sur les produits du sol,
  - type: text
    content: sur les hommes et sur les bêtes,
  - type: text
    content: sur tout le travail de vos mains.»
  '12':
  - type: text
    content: 'Zorobabel, fils de Shealthiel, le grand-prêtre Josué, fils de Jotsadak, et tout le reste du peuple écoutèrent la voix de l''Eternel, leur Dieu, et les paroles du prophète Aggée, conformément à la mission que l''Eternel, leur Dieu, lui avait confiée. Et le peuple fut saisi de crainte devant l''Eternel. '
  '13':
  - type: text
    content: 'Aggée, le messager de l''Eternel, dit au peuple d''après l''ordre de l''Eternel: «Je suis moi-même avec vous, déclare l''Eternel.»'
  '14':
  - type: text
    content: 'L''Eternel réveilla l''esprit du gouverneur de Juda Zorobabel, fils de Shealthiel, l''esprit du grand-prêtre Josué, fils de Jotsadak, et l''esprit de tout le reste du peuple. Ils vinrent et ils se mirent à l''œuvre dans la maison de l''Eternel, le maître de l''univers, leur Dieu, '
  '15':
  - type: text
    content: le vingt-quatrième jour du sixième mois, la deuxième année du règne de Darius.
  '2':
  - type: text
    content: '«Voici ce que dit l''Eternel, le maître de l''univers: Ce peuple prétend: ‘Il n''est pas encore venu, le moment de reconstruire la maison de l''Eternel.’ '
  '3':
  - type: text
    content: 'Et pourtant, la parole de l''Eternel leur était adressée par l''intermédiaire du prophète Aggée: '
  '4':
  - type: text
    content: ‘Est-ce le moment pour vous d'habiter vos maisons lambrissées, quand ce temple est détruit?’
  '5':
  - type: text
    content: '»Voici ce que dit maintenant l''Eternel, le maître de l''univers: Réfléchissez attentivement à votre conduite! '
  '6':
  - type: text
    content: Vous semez beaucoup et vous récoltez peu; vous mangez et vous n'êtes pas rassasiés; vous buvez et vous n'êtes pas désaltérés; vous êtes habillés et vous n'avez pas chaud; le salaire de celui qui travaille tombe dans un sac percé.
  '7':
  - type: text
    content: '»Voici ce que dit l''Eternel, le maître de l''univers:'
  - type: text
    content: Réfléchissez attentivement à votre conduite!
  '8':
  - type: text
    content: Montez sur la montagne, apportez du bois
  - type: text
    content: et construisez le temple!
  - type: text
    content: J'en aurai de la joie et je serai honoré,
  - type: text
    content: dit l'Eternel.
  '9':
  - type: text
    content: Vous comptiez sur beaucoup, et vous avez eu peu;
  - type: text
    content: vous l'avez rentré chez vous, mais j'ai soufflé dessus.
  - type: text
    content: Pourquoi? déclare l'Eternel, le maître de l'univers.
  - type: text
    content: A cause de ma maison qui est détruite,
  - type: text
    content: tandis que vous vous empressez chacun pour votre maison.
