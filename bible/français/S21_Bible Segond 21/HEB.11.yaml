document_id: HEB.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Exemples de foi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Or la foi, c''est la ferme assurance des choses qu''on espère, la démonstration de celles qu''on ne voit pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'C''est à cause d''elle que les anciens ont reçu un témoignage favorable. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Par la foi, nous comprenons que l'univers a été formé par la parole de Dieu, de sorte que le monde visible n'a pas été fait à partir des choses visibles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: C'est par la foi qu'Abel a offert à Dieu un sacrifice plus grand que celui de Caïn; c'est grâce à elle qu'il a été déclaré juste, car Dieu approuvait ses offrandes, et c'est par elle qu'il parle encore bien qu'étant mort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'C''est à cause de sa foi qu''Hénoc a été enlevé pour échapper à la mort, et '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: on ne l'a plus retrouvé parce que Dieu l'avait enlevé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'On ne l''a plus… enlevé: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Genèse 5.24
      metadata:
        usfm: GEN.5.24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' d''après la Septante.'
    marker-yv: yv-n
  - type: text
    text: '. Avant d''être enlevé, il avait en effet reçu le témoignage qu''il était agréable à Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Or, sans la foi, il est impossible d'être agréable à Dieu, car il faut que celui qui s'approche de lui croie que Dieu existe et qu'il récompense ceux qui le cherchent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: C'est par la foi que Noé, averti des événements que l'on ne voyait pas encore et rempli d'une crainte respectueuse, a construit une arche pour sauver sa famille. C'est par elle qu'il a condamné le monde et est devenu héritier de la justice qui s'obtient par la foi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'C''est par la foi qu''Abraham a obéi lorsque Dieu l''a appelé et qu''il est parti pour le pays qu''il devait recevoir en héritage. Et il est parti sans savoir où il allait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'C''est par la foi qu''il est venu s''installer dans le pays promis comme dans un pays étranger. Il y a habité sous des tentes, ainsi qu''Isaac et Jacob, les cohéritiers de la même promesse, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: car il attendait la cité qui a de solides fondations, celle dont Dieu est l'architecte et le constructeur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'C''est aussi par la foi que Sara elle-même a été rendue capable d''avoir une descendance. Malgré son âge avancé, elle a donné naissance à un enfant parce qu''elle a cru à la fidélité de celui qui avait fait la promesse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: C'est pourquoi d'un seul homme, pourtant déjà marqué par la mort, est née une descendance
  - type: usfm
    marker: qt
    children:
    - type: text
      text: aussi nombreuse que les étoiles du ciel, pareille au sable qui est au bord de la mer et qu'on ne peut compter
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Aussi… compter: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Genèse 22.17
      metadata:
        usfm: GEN.22.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' complétée par Genèse 32.13.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'C''est dans la foi qu''ils sont tous morts, sans avoir reçu les biens promis, mais ils les ont vus et salués de loin, et ils ont reconnu qu''ils étaient étrangers et voyageurs sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ceux qui parlent ainsi montrent qu''ils cherchent une patrie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'S''ils avaient eu la nostalgie de celle qu''ils avaient quittée, ils auraient eu le temps d''y retourner. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Mais en réalité, ils désirent une meilleure patrie, c'est-à-dire la patrie céleste. C'est pourquoi Dieu n'a pas honte d'être appelé leur Dieu, car il leur a préparé une cité
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Une cité: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'c''est-à-dire la Jérusalem céleste (voir '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12.22'
      metadata:
        usfm: HEB.12.22
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Apocalypse 21
      metadata:
        usfm: REV.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'C''est par la foi qu''Abraham a offert Isaac lorsqu''il a été mis à l''épreuve. Oui, il a offert son fils unique en sacrifice, bien qu''il ait reçu les promesses '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'et que Dieu lui ait dit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: C'est par Isaac qu'une descendance te sera assurée
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'C''est par… assurée: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Genèse 21.12
      metadata:
        usfm: GEN.21.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il pensait que Dieu était capable même de le ressusciter des morts. C'est pourquoi il a retrouvé son fils par une sorte de résurrection.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: C'est par la foi qu'Isaac a béni Jacob et Esaü en vue de l'avenir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'C''est par la foi que Jacob, au moment de sa mort, a béni chacun des fils de Joseph et '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: s'est prosterné, appuyé sur l'extrémité de son bâton
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'S''est… bâton: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Genèse 47.31
      metadata:
        usfm: GEN.47.31
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' d''après la Septante.'
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: C'est par la foi que Joseph, à la fin de sa vie, a fait mention de la sortie d'Egypte des Israélites et a donné des ordres au sujet de ses ossements.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: C'est par la foi que Moïse, à sa naissance, a été caché pendant trois mois par ses parents. Ils avaient en effet vu que l'enfant était beau, et ils n'ont pas eu peur de l'ordre du roi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''ordre du roi: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: le roi d'Egypte avait ordonné de tuer tous les enfants de sexe masculin qui naissaient parmi les Israélites.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'C''est par la foi que Moïse, devenu grand, a refusé d''être appelé fils de la fille du pharaon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il préférait être maltraité avec le peuple de Dieu plutôt que d''avoir momentanément la jouissance du péché. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il considérait l''humiliation attachée au Messie comme une richesse plus grande que les trésors de l''Egypte, car il avait le regard fixé sur la récompense à venir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: C'est par la foi qu'il a quitté l'Egypte sans craindre la colère du roi, car il s'est montré déterminé, comme s'il voyait celui qui est invisible.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: C'est par la foi qu'il a célébré la Pâque et versé du sang afin que le destructeur
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le destructeur: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: probablement un ange chargé d'exécuter le jugement de Dieu.
    marker-yv: yv-n
  - type: text
    text: ' ne touche pas aux premiers-nés des Israélites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: C'est par la foi qu'ils ont traversé la mer Rouge comme un terrain sec, tandis que les Egyptiens ont été engloutis lorsqu'ils ont tenté de passer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: C'est par la foi que les murailles de Jéricho sont tombées après que le peuple en avait fait le tour pendant sept jours.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: C'est par la foi que Rahab, la prostituée, n'est pas morte avec les non-croyants, parce qu'elle avait accueilli les espions avec bienveillance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Et que dirais-je encore? Le temps me manquerait en effet pour parler de Gédéon, de Barak, de Samson, de Jephthé, de David, de Samuel et des prophètes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Par la foi, ils ont vaincu des royaumes, exercé la justice, obtenu la réalisation de promesses, fermé la gueule de lions, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'éteint la puissance du feu, échappé au tranchant de l''épée, repris des forces après une maladie, été vaillants à la guerre, mis en fuite des armées étrangères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Des femmes ont retrouvé leurs morts par la résurrection. D''autres ont été torturés et n''ont pas accepté de délivrance afin d''obtenir une meilleure résurrection. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'D''autres encore ont subi les moqueries et le fouet, les chaînes et la prison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Ils ont été lapidés, sciés, [mis à l''épreuve]. Ils sont morts tués par l''épée. Ils sont allés d''un endroit à l''autre, habillés de peaux de brebis ou de chèvre, privés de tout, persécutés, maltraités, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'eux dont le monde n''était pas digne. Ils erraient dans les déserts et les montagnes, dans les grottes et les abris de la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Tous ceux-là, bien qu''ayant reçu un bon témoignage grâce à leur foi, n''ont pas obtenu ce qui leur était promis, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: car Dieu avait en vue quelque chose de meilleur pour nous. Ainsi, ils ne devaient pas parvenir sans nous à la perfection.
