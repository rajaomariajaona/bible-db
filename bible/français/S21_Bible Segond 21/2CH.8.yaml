document_id: 2CH.8,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Travaux de construction de Salomon
  - type: text
    content: 'Au bout de 20 ans, Salomon avait construit la maison de l''Eternel et son palais. '
  '10':
  - type: text
    content: Les chefs des officiers dont disposait le roi Salomon étaient au nombre de 250; ils avaient autorité sur le peuple.
  '11':
  - type: text
    content: 'Salomon fit monter la fille du pharaon de la ville de David jusque dans la maison qu''il lui avait construite, car il dit: «Ma femme n''habitera pas dans la maison de David, roi d''Israël, parce que les lieux où est entrée l''arche de l''Eternel sont saints.»'
  '12':
  - type: text
    content: 'Salomon offrit dès lors des holocaustes à l''Eternel sur l''autel de l''Eternel qu''il avait construit devant le portique. '
  '13':
  - type: text
    content: 'Il offrait ce qui était prescrit par Moïse pour chaque jour, pour les sabbats, pour les débuts de mois et pour les fêtes, trois fois par année, lors de la fête des pains sans levain, de la fête des semaines et de la fête des tentes. '
  '14':
  - type: text
    content: 'Il suivit la règle établie par son père David pour installer les classes des prêtres dans leur service et les Lévites dans leur charge. Celle-ci consistait à louer l''Eternel et à faire le service suivant les exigences de chaque jour en présence des prêtres. Il répartit aussi les portiers entre les diverses portes, d''après leur classe, car c''était ce qu''avait ordonné David, l''homme de Dieu. '
  '15':
  - type: text
    content: On ne s'écarta en rien de l'ordre du roi à propos des prêtres et des Lévites, pas même pour ce qui concernait les trésors.
  '16':
  - type: text
    content: Tout le travail de Salomon fut solidement affermi, depuis le jour où l'on posa les fondations de la maison de l'Eternel jusqu'à celui où elle fut terminée. C'est ainsi que la maison de l'Eternel fut terminée.
  '17':
  - type: text
    content: 'Salomon partit alors pour Etsjon-Guéber et Elath, sur les bords de la mer des Roseaux, dans le pays d''Edom. '
  '18':
  - type: text
    content: Et Hiram lui envoya, par l'intermédiaire de ses serviteurs, des bateaux ainsi que des serviteurs qui étaient des marins expérimentés. Ils allèrent avec les serviteurs de Salomon à Ophir et ils en rapportèrent plus de 13 tonnes d'or qu'ils remirent au roi Salomon.
  '2':
  - type: text
    content: 'Il reconstruisit alors les villes que lui avait données Hiram et y installa des Israélites. '
  '3':
  - type: text
    content: 'Salomon marcha contre Hamath-Tsoba et s''en empara. '
  '4':
  - type: text
    content: 'Il reconstruisit Thadmor dans le désert, ainsi que toutes les villes qui servaient d''entrepôts dans la région de Hamath. '
  '5':
  - type: text
    content: 'Il reconstruisit Beth-Horon-la-haute et Beth-Horon-la-basse – des villes fortifiées, munies de murailles, de portes et de verrous – '
  '6':
  - type: text
    content: 'Baalath et toutes les villes qui lui servaient d''entrepôts, toutes les villes destinées à accueillir les chars, celles réservées à la cavalerie, ainsi que tout ce qu''il lui plut de construire à Jérusalem, au Liban et sur tout le territoire dont il était le souverain. '
  '7':
  - type: text
    content: 'Il y avait toute une population, issue des Hittites, des Amoréens, des Phéréziens, des Héviens et des Jébusiens, qui avait survécu et qui ne faisait pas partie d''Israël. '
  '8':
  - type: text
    content: 'Leurs descendants étaient restés après eux dans le pays, parce que les Israélites ne les avaient pas détruits. Salomon les enrôla pour la corvée, statut qui leur est resté jusqu''à aujourd''hui. '
  '9':
  - type: text
    content: 'En revanche, Salomon n''employa aucun des Israélites comme esclave pour ses travaux: ils étaient des hommes de guerre, les chefs de ses écuyers, les commandants de ses chars et de sa cavalerie. '
