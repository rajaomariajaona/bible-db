document_id: RUT.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Attachement de Ruth pour Naomi
  - type: text
    content: 'A l''époque des juges, il y eut une famine dans le pays. Un homme de Bethléhem de Juda partit avec sa femme et ses deux fils s''installer dans le pays de Moab. '
  '10':
  - type: text
    content: 'et lui dirent: «Non, nous irons avec toi vers ton peuple.» '
  '11':
  - type: text
    content: 'Naomi dit: «Retournez chez vous, mes filles! Pourquoi viendriez-vous avec moi? Suis-je encore en état d''avoir des fils qui puissent devenir vos maris? '
  '12':
  - type: text
    content: 'Retournez chez vous, mes filles, allez-y! Je suis trop vieille pour me remarier. Et même si je disais: ‘J''ai de l''espérance’, même si cette nuit j''étais avec un homme et que je mette au monde des fils, '
  '13':
  - type: text
    content: 'attendriez-vous pour cela qu''ils aient grandi, refuseriez-vous pour cela de vous marier? Non, mes filles, car à cause de vous je suis dans une grande amertume parce que l''Eternel est intervenu contre moi.» '
  '14':
  - type: text
    content: Elles se remirent à pleurer tout haut. Orpa embrassa sa belle-mère, mais Ruth lui resta attachée.
  '15':
  - type: text
    content: 'Naomi dit à Ruth: «Tu vois, ta belle-sœur est retournée vers son peuple et vers ses dieux; retourne chez toi comme elle!» '
  '16':
  - type: text
    content: 'Ruth répondit: «Ne me pousse pas à te laisser, à repartir loin de toi! Où tu iras j''irai, où tu habiteras j''habiterai; ton peuple sera mon peuple et ton Dieu sera mon Dieu; '
  '17':
  - type: text
    content: 'où tu mourras je mourrai et j''y serai enterrée. Que l''Eternel me traite avec la plus grande sévérité si autre chose que la mort me sépare de toi!» '
  '18':
  - type: text
    content: La voyant décidée à l'accompagner, Naomi cessa d'insister auprès d'elle.
  '19':
  - type: text
    content: 'Elles firent ensemble le voyage jusqu''à leur arrivée à Bethléhem. Lorsqu''elles entrèrent dans Bethléhem, toute la ville fut dans l''agitation à cause d''elles. Les femmes disaient: «Est-ce bien Naomi?» '
  '2':
  - type: text
    content: 'Le nom de cet homme était Elimélec, celui de sa femme Naomi, et ses deux fils s''appelaient Machlon et Kiljon; ils étaient éphratiens, de Bethléhem en Juda. Arrivés au pays de Moab, ils s''y établirent. '
  '20':
  - type: text
    content: 'Elle leur dit: «Ne m''appelez pas Naomi, appelez-moi Mara'
  - type: note
    content: 'Naomi: vient d''un mot qui signifie beauté, douceur. Mara: littéralement amère.'
  - type: text
    content: ', car le Tout-Puissant m''a remplie d''amertume. '
  '21':
  - type: text
    content: J'étais dans l'abondance à mon départ et l'Eternel me ramène les mains vides. Pourquoi m'appelleriez-vous Naomi, après que l'Eternel s'est prononcé contre moi, après que le Tout-Puissant a provoqué mon malheur?»
  '22':
  - type: text
    content: C'est ainsi que Naomi et sa belle-fille, Ruth la Moabite, revinrent du pays de Moab. Elles arrivèrent à Bethléhem au début de la moisson de l'orge.
  '3':
  - type: text
    content: 'Elimélec, le mari de Naomi, mourut et elle resta avec ses deux fils. '
  '4':
  - type: text
    content: 'Ils prirent des femmes moabites – l''une s''appelait Orpa et l''autre Ruth – et ils habitèrent là environ 10 ans. '
  '5':
  - type: text
    content: Machlon et Kiljon moururent aussi tous les deux et Naomi resta privée de ses deux fils et de son mari.
  '6':
  - type: text
    content: 'Alors elle se leva, elle et ses belles-filles, afin de quitter le pays de Moab. En effet, elle y avait appris que l''Eternel était intervenu en faveur de son peuple et lui avait donné du pain. '
  '7':
  - type: text
    content: Elle partit de l'endroit où elle habitait, accompagnée de ses deux belles-filles, et elle se mit en route pour retourner dans le pays de Juda.
  '8':
  - type: text
    content: 'Naomi dit à ses deux belles-filles: «Allez-y, retournez chacune dans la famille de votre mère! Que l''Eternel agisse avec bonté envers vous, comme vous l''avez fait envers ceux qui sont morts et envers moi! '
  '9':
  - type: text
    content: 'Que l''Eternel fasse trouver à chacune du repos dans la maison d''un mari!» Puis elle les embrassa. Elles se mirent à pleurer tout haut '
