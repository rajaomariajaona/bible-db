document_id: RUT.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Attachement de Ruth pour Naomi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A l''époque des juges, il y eut une famine dans le pays. Un homme de Bethléhem de Juda partit avec sa femme et ses deux fils s''installer dans le pays de Moab. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le nom de cet homme était Elimélec, celui de sa femme Naomi, et ses deux fils s''appelaient Machlon et Kiljon; ils étaient éphratiens, de Bethléhem en Juda. Arrivés au pays de Moab, ils s''y établirent. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Elimélec, le mari de Naomi, mourut et elle resta avec ses deux fils. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils prirent des femmes moabites – l''une s''appelait Orpa et l''autre Ruth – et ils habitèrent là environ 10 ans. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Machlon et Kiljon moururent aussi tous les deux et Naomi resta privée de ses deux fils et de son mari.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Alors elle se leva, elle et ses belles-filles, afin de quitter le pays de Moab. En effet, elle y avait appris que l''Eternel était intervenu en faveur de son peuple et lui avait donné du pain. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Elle partit de l'endroit où elle habitait, accompagnée de ses deux belles-filles, et elle se mit en route pour retourner dans le pays de Juda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Naomi dit à ses deux belles-filles: «Allez-y, retournez chacune dans la famille de votre mère! Que l''Eternel agisse avec bonté envers vous, comme vous l''avez fait envers ceux qui sont morts et envers moi! '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Que l''Eternel fasse trouver à chacune du repos dans la maison d''un mari!» Puis elle les embrassa. Elles se mirent à pleurer tout haut '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'et lui dirent: «Non, nous irons avec toi vers ton peuple.» '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Naomi dit: «Retournez chez vous, mes filles! Pourquoi viendriez-vous avec moi? Suis-je encore en état d''avoir des fils qui puissent devenir vos maris? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Retournez chez vous, mes filles, allez-y! Je suis trop vieille pour me remarier. Et même si je disais: ‘J''ai de l''espérance’, même si cette nuit j''étais avec un homme et que je mette au monde des fils, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'attendriez-vous pour cela qu''ils aient grandi, refuseriez-vous pour cela de vous marier? Non, mes filles, car à cause de vous je suis dans une grande amertume parce que l''Eternel est intervenu contre moi.» '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Elles se remirent à pleurer tout haut. Orpa embrassa sa belle-mère, mais Ruth lui resta attachée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Naomi dit à Ruth: «Tu vois, ta belle-sœur est retournée vers son peuple et vers ses dieux; retourne chez toi comme elle!» '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ruth répondit: «Ne me pousse pas à te laisser, à repartir loin de toi! Où tu iras j''irai, où tu habiteras j''habiterai; ton peuple sera mon peuple et ton Dieu sera mon Dieu; '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'où tu mourras je mourrai et j''y serai enterrée. Que l''Eternel me traite avec la plus grande sévérité si autre chose que la mort me sépare de toi!» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: La voyant décidée à l'accompagner, Naomi cessa d'insister auprès d'elle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Elles firent ensemble le voyage jusqu''à leur arrivée à Bethléhem. Lorsqu''elles entrèrent dans Bethléhem, toute la ville fut dans l''agitation à cause d''elles. Les femmes disaient: «Est-ce bien Naomi?» '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Elle leur dit: «Ne m''appelez pas Naomi, appelez-moi Mara'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Naomi: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'vient d''un mot qui signifie beauté, douceur. '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Mara: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: littéralement amère.
    marker-yv: yv-n
  - type: text
    text: ', car le Tout-Puissant m''a remplie d''amertume. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: J'étais dans l'abondance à mon départ et l'Eternel me ramène les mains vides. Pourquoi m'appelleriez-vous Naomi, après que l'Eternel s'est prononcé contre moi, après que le Tout-Puissant a provoqué mon malheur?»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: C'est ainsi que Naomi et sa belle-fille, Ruth la Moabite, revinrent du pays de Moab. Elles arrivèrent à Bethléhem au début de la moisson de l'orge.
