document_id: LEV.5
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Lorsque quelqu''un, après avoir été mis sous serment comme témoin, péchera en ne déclarant pas ce qu''il a vu ou ce qu''il sait, il restera chargé de sa faute. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Lorsque quelqu''un, sans y prêter attention, touchera une chose impure comme le cadavre d''un animal impur, que ce soit d''une bête sauvage ou domestique ou bien d''un reptile, il deviendra lui-même impur et il se rendra coupable. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Ou lorsque, sans y prêter attention, il touchera une souillure humaine quelconque et qu''il s''en aperçoive plus tard, il en sera coupable. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Lorsque quelqu'un, en parlant à la légère, jurera de faire du mal ou du bien et que, sans y avoir prêté attention d'abord, il s'en aperçoive plus tard, il sera coupable.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '»Celui donc qui se rendra coupable de l''une de ces choses confessera son péché. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Puis il offrira à l''Eternel en réparation pour le péché qu''il a commis une femelle de petit bétail, une brebis ou une chèvre, comme victime expiatoire. Et le prêtre fera pour lui l''expiation de son péché. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'S''il n''a pas de quoi se procurer une brebis ou une chèvre, il offrira à l''Eternel en réparation pour son péché deux tourterelles ou deux jeunes pigeons, l''un comme victime expiatoire, l''autre comme holocauste. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il les apportera au prêtre, qui sacrifiera d''abord celui qui doit servir de victime expiatoire. Le prêtre lui ouvrira la tête avec l''ongle près de la nuque, sans la séparer. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il fera sur un côté de l''autel l''aspersion du sang de la victime expiatoire et l''on versera le reste du sang au pied de l''autel. C''est un sacrifice d''expiation. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il fera de l'autre oiseau un holocauste, d'après les règles établies. C'est ainsi que le prêtre fera pour cet homme l'expiation du péché qu'il a commis, et le pardon lui sera accordé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '»S''il n''a pas de quoi se procurer deux tourterelles ou deux jeunes pigeons, il apportera en offrande pour son péché 2 litres de fleur de farine comme offrande d''expiation. Il ne mettra pas d''huile dessus et il n''y ajoutera pas d''encens, car c''est une offrande d''expiation. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il l''apportera au prêtre. Le prêtre en prendra une poignée comme souvenir et la brûlera sur l''autel, comme les offrandes passées par le feu pour l''Eternel. C''est une offrande d''expiation. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: C'est ainsi que le prêtre fera pour cet homme l'expiation du péché qu'il a commis envers une de ces choses, et le pardon lui sera accordé. Ce qui restera de l'offrande sera pour le prêtre, comme dans le cas de l'offrande en don.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le sacrifice de culpabilité
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '«Lorsque quelqu''un commettra une infidélité et péchera involontairement envers ce qui est consacré à l''Eternel, il offrira en sacrifice de culpabilité à l''Eternel pour son péché un bélier sans défaut, pris dans le troupeau sur la base de ton estimation en pièces d''argent, d''après la valeur étalon du sanctuaire. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il donnera, en y ajoutant un cinquième, la valeur de ce dont il a frustré le sanctuaire, et il remettra cela au prêtre. Le prêtre fera pour lui l'expiation avec le bélier offert en sacrifice de culpabilité, et le pardon lui sera accordé.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '»Lorsque quelqu''un péchera en faisant sans le savoir, contre l''un des commandements de l''Eternel, des choses qui ne doivent pas se faire, il se rendra coupable et sera chargé de sa faute. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il présentera au prêtre en sacrifice de culpabilité un bélier sans défaut, pris du troupeau d''après ton estimation. Le prêtre fera pour lui l''expiation de la faute qu''il a commise sans le savoir, et le pardon lui sera accordé. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: C'est un sacrifice de culpabilité. Cet homme s'était rendu coupable envers l'Eternel.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '«Lorsque quelqu''un péchera et commettra une infidélité envers l''Eternel en mentant à son prochain au sujet d''un dépôt, d''un objet confié à sa garde ou volé, en lui extorquant quelque chose, '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'en niant avoir trouvé un objet perdu ou en faisant un faux serment à propos de n''importe quel péché que peut commettre un homme, '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'lorsqu''il péchera ainsi et se rendra coupable, il restituera l''objet qu''il a volé, ce qu''il a extorqué, le dépôt qui lui avait été confié, l''objet perdu qu''il a trouvé, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ou tout objet à propos duquel il a fait un faux serment. Il le restituera intégralement, y ajoutera un cinquième et le remettra à son propriétaire le jour même où il offrira son sacrifice de culpabilité
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Où il… culpabilité: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ou où il sera reconnu coupable.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il présentera au prêtre, en sacrifice de culpabilité à l''Eternel pour son péché, un bélier sans défaut pris du troupeau d''après ton estimation. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Le prêtre fera pour lui l'expiation devant l'Eternel, et le pardon lui sera accordé, quelle que soit la faute dont il se sera rendu coupable.»
