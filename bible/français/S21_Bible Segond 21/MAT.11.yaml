document_id: MAT.11,152
type_code: fra
verses:
  '1':
  - type: text
    content: Lorsque Jésus eut fini de donner ses instructions à ses douze disciples, il partit de là pour enseigner et prêcher dans leurs villes.
  - type: heading
    content: Jean-Baptiste vu par Jésus
  '10':
  - type: text
    content: '[car] c''est celui à propos duquel il est écrit: '
  - type: text
    content: Voici, j'envoie mon messager devant toi pour te préparer le chemin
  - type: text
    content: .
  - type: note
    content: 'Voici… chemin: citation de Malachie 3.1.'
  '11':
  - type: text
    content: '»Je vous le dis en vérité, parmi ceux qui sont nés de femmes, il n''est venu personne de plus grand que Jean-Baptiste. Cependant, le plus petit dans le royaume des cieux est plus grand que lui. '
  '12':
  - type: text
    content: 'Depuis l''époque de Jean-Baptiste jusqu''à présent, le royaume des cieux est assailli avec force, et des violents s''en emparent. '
  '13':
  - type: text
    content: 'En effet, tous les prophètes et la loi ont prophétisé jusqu''à Jean. '
  '14':
  - type: text
    content: Si vous voulez bien l'accepter, c'est lui l'Elie qui devait venir
  - type: note
    content: 'L''Elie qui devait venir: le prophète Malachie (5e siècle av. J.-C.) avait prédit l''envoi du prophète Elie avant le jour de l''Eternel (Malachie 3.23).'
  - type: text
    content: '. '
  '15':
  - type: text
    content: Que celui qui a des oreilles pour entendre entende.
  '16':
  - type: text
    content: '»A qui comparerai-je cette génération? Elle ressemble à des enfants assis sur des places publiques et qui s''adressent à d''autres enfants '
  '17':
  - type: text
    content: 'en disant: ‘Nous vous avons joué de la flûte et vous n''avez pas dansé, nous [vous] avons entonné des chants funèbres et vous ne vous êtes pas lamentés.’ '
  '18':
  - type: text
    content: 'En effet, Jean est venu, il ne mange pas et ne boit pas, et l''on dit: ‘Il a un démon.’ '
  '19':
  - type: text
    content: 'Le Fils de l''homme est venu, il mange et il boit, et l''on dit: ‘C''est un glouton et un buveur, un ami des collecteurs d''impôts et des pécheurs.’ Mais la sagesse a été reconnue juste par ses enfants.»'
  '2':
  - type: text
    content: Or, dans sa prison, Jean
  - type: note
    content: 'Jean: Jean-Baptiste, arrêté par Hérode. Voir 14.3.'
  - type: text
    content: ' avait entendu parler de ce que faisait Christ. Il envoya deux de ses disciples lui demander: '
  '20':
  - type: text
    content: 'Alors Jésus se mit à faire des reproches aux villes dans lesquelles avaient eu lieu la plupart de ses miracles, parce qu''elles n''avaient pas changé d''attitude: '
  '21':
  - type: text
    content: «Malheur à toi, Chorazin, malheur à toi, Bethsaïda, car si les miracles accomplis au milieu de vous l'avaient été dans Tyr et dans Sidon, il y a longtemps que leurs habitants se seraient repentis
  - type: note
    content: 'Se seraient repentis: même verbe grec que avaient changé d''attitude (verset 20).'
  - type: text
    content: ', habillés d''un sac et assis dans la cendre'
  - type: note
    content: 'Habillés… cendre: tenue et attitude exprimant le deuil ou la tristesse.'
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'C''est pourquoi je vous le dis: le jour du jugement, Tyr et Sidon seront traitées moins sévèrement que vous. '
  '23':
  - type: text
    content: 'Et toi, Capernaüm, seras-tu élevée jusqu''au ciel? Non. Tu seras abaissée jusqu''au séjour des morts, car si les miracles accomplis au milieu de toi l''avaient été dans Sodome, elle subsisterait encore aujourd''hui. '
  '24':
  - type: text
    content: 'C''est pourquoi je vous le dis: le jour du jugement, le pays de Sodome sera traité moins sévèrement que toi.»'
  '25':
  - type: text
    content: 'A ce moment-là, Jésus prit la parole et dit: «Je te suis reconnaissant, Père, Seigneur du ciel et de la terre, de ce que tu as caché ces choses aux sages et aux intelligents et les as révélées aux enfants. '
  '26':
  - type: text
    content: 'Oui, Père, je te suis reconnaissant car c''est ce que tu as voulu. '
  '27':
  - type: text
    content: Mon Père m'a tout donné, et personne ne connaît le Fils, si ce n'est le Père; personne non plus ne connaît le Père, si ce n'est le Fils et celui à qui le Fils veut le révéler.
  '28':
  - type: text
    content: '»Venez à moi, vous tous qui êtes fatigués et courbés sous un fardeau, et je vous donnerai du repos. '
  '29':
  - type: text
    content: 'Acceptez mes exigences et laissez-vous instruire par moi, car je suis doux et humble de cœur, et '
  - type: text
    content: vous trouverez le repos pour votre âme
  - type: note
    content: 'Vous trouverez… âme: renvoi à Jérémie 6.16.'
  - type: text
    content: '. '
  '3':
  - type: text
    content: '«Es-tu celui qui doit venir ou devons-nous en attendre un autre?» '
  '30':
  - type: text
    content: En effet, mes exigences sont bonnes et mon fardeau léger.»
  '4':
  - type: text
    content: 'Jésus leur répondit: «Allez rapporter à Jean ce que vous entendez et ce que vous voyez: '
  '5':
  - type: text
    content: les aveugles voient, les boiteux marchent
  - type: text
    content: ', les lépreux sont purifiés, '
  - type: text
    content: les sourds entendent
  - type: text
    content: ', les morts ressuscitent et '
  - type: text
    content: la bonne nouvelle est annoncée aux pauvres
  - type: note
    content: 'Les aveugles… pauvres: Jésus répond à Jean en faisant allusion à des textes du prophète Esaïe (Esaïe 35.5-6 et 61.1) qui décrivent l''époque messianique et le serviteur de l''Eternel.'
  - type: text
    content: '. '
  '6':
  - type: text
    content: Heureux celui pour qui je ne représenterai pas un obstacle!»
  '7':
  - type: text
    content: 'Comme ils s''en allaient, Jésus se mit à dire à la foule au sujet de Jean: «Qu''êtes-vous allés voir au désert? Un roseau agité par le vent? '
  '8':
  - type: text
    content: 'Mais qu''êtes-vous allés voir? Un homme habillé de [tenues] élégantes? Ceux qui portent des tenues élégantes sont dans les maisons des rois. '
  '9':
  - type: text
    content: 'Qu''êtes-vous donc allés voir? Un prophète? Oui, je vous le dis, et plus qu''un prophète, '
