document_id: MAT.11
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lorsque Jésus eut fini de donner ses instructions à ses douze disciples, il partit de là pour enseigner et prêcher dans leurs villes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jean-Baptiste vu par Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Or, dans sa prison, Jean
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jean: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jean-Baptiste, arrêté par Hérode. Voir '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '14.3'
      metadata:
        usfm: MAT.14.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' avait entendu parler de ce que faisait Christ. Il envoya deux de ses disciples lui demander: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '«Es-tu celui qui doit venir ou devons-nous en attendre un autre?» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Jésus leur répondit: «Allez rapporter à Jean ce que vous entendez et ce que vous voyez: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: les aveugles voient, les boiteux marchent
  - type: text
    text: ', les lépreux sont purifiés, '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: les sourds entendent
  - type: text
    text: ', les morts ressuscitent et '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: la bonne nouvelle est annoncée aux pauvres
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Les aveugles… pauvres: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jésus répond à Jean en faisant allusion à des textes du prophète Esaïe (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 35.5-6
      metadata:
        usfm: ISA.35.5+ISA.35.6
    - type: text
      text: ' et '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '61.1'
      metadata:
        usfm: ISA.61.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) qui décrivent l'époque messianique et le serviteur de l'Eternel.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Heureux celui pour qui je ne représenterai pas un obstacle!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Comme ils s''en allaient, Jésus se mit à dire à la foule au sujet de Jean: «Qu''êtes-vous allés voir au désert? Un roseau agité par le vent? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais qu''êtes-vous allés voir? Un homme habillé de [tenues] élégantes? Ceux qui portent des tenues élégantes sont dans les maisons des rois. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Qu''êtes-vous donc allés voir? Un prophète? Oui, je vous le dis, et plus qu''un prophète, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '[car] c''est celui à propos duquel il est écrit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Voici, j'envoie mon messager devant toi pour te préparer le chemin
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Voici… chemin: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Malachie 3.1
      metadata:
        usfm: MAL.3.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '»Je vous le dis en vérité, parmi ceux qui sont nés de femmes, il n''est venu personne de plus grand que Jean-Baptiste. Cependant, le plus petit dans le royaume des cieux est plus grand que lui. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Depuis l''époque de Jean-Baptiste jusqu''à présent, le royaume des cieux est assailli avec force, et des violents s''en emparent. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'En effet, tous les prophètes et la loi ont prophétisé jusqu''à Jean. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Si vous voulez bien l'accepter, c'est lui l'Elie qui devait venir
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''Elie qui devait venir: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: le prophète Malachie (5e siècle av. J.-C.) avait prédit l'envoi du prophète Elie avant le jour de l'Eternel (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Malachie 3.23
      metadata:
        usfm: MAL.3.23
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Que celui qui a des oreilles pour entendre entende.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '»A qui comparerai-je cette génération? Elle ressemble à des enfants assis sur des places publiques et qui s''adressent à d''autres enfants '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'en disant: ‘Nous vous avons joué de la flûte et vous n''avez pas dansé, nous [vous] avons entonné des chants funèbres et vous ne vous êtes pas lamentés.’ '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'En effet, Jean est venu, il ne mange pas et ne boit pas, et l''on dit: ‘Il a un démon.’ '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le Fils de l''homme est venu, il mange et il boit, et l''on dit: ‘C''est un glouton et un buveur, un ami des collecteurs d''impôts et des pécheurs.’ Mais la sagesse a été reconnue juste par ses enfants.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Alors Jésus se mit à faire des reproches aux villes dans lesquelles avaient eu lieu la plupart de ses miracles, parce qu''elles n''avaient pas changé d''attitude: '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: «Malheur à toi, Chorazin, malheur à toi, Bethsaïda, car si les miracles accomplis au milieu de vous l'avaient été dans Tyr et dans Sidon, il y a longtemps que leurs habitants se seraient repentis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Se seraient repentis: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: même verbe grec que avaient changé d'attitude (verset 20).
    marker-yv: yv-n
  - type: text
    text: ', habillés d''un sac et assis dans la cendre'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Habillés… cendre: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tenue et attitude exprimant le deuil ou la tristesse.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'C''est pourquoi je vous le dis: le jour du jugement, Tyr et Sidon seront traitées moins sévèrement que vous. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Et toi, Capernaüm, seras-tu élevée jusqu''au ciel? Non. Tu seras abaissée jusqu''au séjour des morts, car si les miracles accomplis au milieu de toi l''avaient été dans Sodome, elle subsisterait encore aujourd''hui. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'C''est pourquoi je vous le dis: le jour du jugement, le pays de Sodome sera traité moins sévèrement que toi.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'A ce moment-là, Jésus prit la parole et dit: «Je te suis reconnaissant, Père, Seigneur du ciel et de la terre, de ce que tu as caché ces choses aux sages et aux intelligents et les as révélées aux enfants. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Oui, Père, je te suis reconnaissant car c''est ce que tu as voulu. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Mon Père m'a tout donné, et personne ne connaît le Fils, si ce n'est le Père; personne non plus ne connaît le Père, si ce n'est le Fils et celui à qui le Fils veut le révéler.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '»Venez à moi, vous tous qui êtes fatigués et courbés sous un fardeau, et je vous donnerai du repos. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Acceptez mes exigences et laissez-vous instruire par moi, car je suis doux et humble de cœur, et '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: vous trouverez le repos pour votre âme
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Vous trouverez… âme: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'renvoi à '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jérémie 6.16
      metadata:
        usfm: JER.6.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: En effet, mes exigences sont bonnes et mon fardeau léger.»
