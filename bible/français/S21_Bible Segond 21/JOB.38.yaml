document_id: JOB.38,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Intervention de Dieu
  - type: heading
    content: 38.1–42.17
  - type: heading
    content: Description des œuvres divines
  - type: text
    content: 'L''Eternel répondit à Job du milieu de la tempête. Il dit:'
  '10':
  - type: text
    content: quand je lui ai fixé des limites
  - type: text
    content: et imposé verrou et portes,
  '11':
  - type: text
    content: 'quand j''ai dit: ‘Tu pourras venir jusqu''ici, tu n''iras pas plus loin.'
  - type: text
    content: Ici s'arrêtera l'orgueil de tes vagues’?
  '12':
  - type: text
    content: »Depuis que tu existes, as-tu donné des ordres au matin?
  - type: text
    content: As-tu montré sa place à l'aurore
  '13':
  - type: text
    content: pour qu'elle attrape les bords de la terre
  - type: text
    content: et que les méchants en tombent?
  '14':
  - type: text
    content: Tout se transforme alors, comme l'argile qui reçoit une empreinte,
  - type: text
    content: et l'ensemble se présente comme paré d'un habit.
  '15':
  - type: text
    content: Quant aux méchants, ils sont privés de leur lumière,
  - type: text
    content: et le bras prêt à agir est brisé.
  '16':
  - type: text
    content: »As-tu pénétré jusqu'aux sources de la mer?
  - type: text
    content: T'es-tu promené dans les profondeurs du gouffre?
  '17':
  - type: text
    content: Les portes de la mort t'ont-elles été dévoilées?
  - type: text
    content: As-tu vu les portes de l'ombre de la mort?
  '18':
  - type: text
    content: As-tu perçu toute la largeur de la terre?
  - type: text
    content: Déclare-le, si tu sais tout cela!
  '19':
  - type: text
    content: »Où est donc le chemin qui conduit à l'habitation de la lumière?
  - type: text
    content: Et les ténèbres, où ont-elles leur domicile
  '2':
  - type: text
    content: «Qui est celui qui obscurcit mes plans
  - type: text
    content: par des discours dépourvus de savoir?
  '20':
  - type: text
    content: pour que tu puisses les conduire vers leur territoire
  - type: text
    content: et discerner les sentiers qui mènent chez elles?
  '21':
  - type: text
    content: Tu le sais, puisque tu étais déjà né
  - type: text
    content: et que le nombre de tes jours est si grand!
  '22':
  - type: text
    content: »Es-tu parvenu jusqu'aux réserves de neige?
  - type: text
    content: As-tu vu les dépôts de grêle
  '23':
  - type: text
    content: que je tiens en réserve pour les moments de détresse,
  - type: text
    content: pour les jours de guerre et de bataille?
  '24':
  - type: text
    content: Par quel chemin la lumière se divise-t-elle
  - type: text
    content: et le vent d'est déferle-t-il sur la terre?
  '25':
  - type: text
    content: Qui a ouvert un passage pour les averses,
  - type: text
    content: un chemin pour l'éclair et le tonnerre,
  '26':
  - type: text
    content: pour que la pluie tombe sur une terre sans habitants,
  - type: text
    content: sur un désert où il n'y a pas d'êtres humains,
  '27':
  - type: text
    content: pour qu'elle rassasie les endroits solitaires
  - type: text
    content: et arides et fasse pousser et sortir l'herbe?
  '28':
  - type: text
    content: »La pluie a-t-elle un père?
  - type: text
    content: Qui donc fait naître les gouttes de rosée?
  '29':
  - type: text
    content: De quel ventre est sortie la glace
  - type: text
    content: et qui a donné naissance au givre,
  '3':
  - type: text
    content: Mets donc une ceinture autour de ta taille comme un vaillant homme!
  - type: text
    content: Je t'interrogerai et tu me renseigneras.
  '30':
  - type: text
    content: pour que l'eau se déguise en pierre
  - type: text
    content: et que la surface du gouffre reste figée?
  '31':
  - type: text
    content: »Peux-tu serrer les liens des Pléiades
  - type: text
    content: ou détacher les cordages d'Orion?
  '32':
  - type: text
    content: Fais-tu paraître au moment voulu les constellations du zodiaque
  - type: text
    content: et conduis-tu la Grande Ourse avec ses petits?
  '33':
  - type: text
    content: Connais-tu les règles du ciel?
  - type: text
    content: Peux-tu instaurer l'autorité de Dieu sur la terre?
  '34':
  - type: text
    content: Peux-tu élever ta voix jusqu'aux nuages
  - type: text
    content: pour que des torrents d'eau te couvrent?
  '35':
  - type: text
    content: As-tu lancé des éclairs? Sont-ils partis?
  - type: text
    content: 'Te disent-ils: ‘Nous voici’?'
  '36':
  - type: text
    content: »Qui a mis la sagesse au fond du cœur
  - type: text
    content: ou donné l'intelligence à l'esprit?
  '37':
  - type: text
    content: Qui a la sagesse nécessaire pour compter les nuages?
  - type: text
    content: Qui peut faire pencher les cruches du ciel
  '38':
  - type: text
    content: pour provoquer des coulées de boue
  - type: text
    content: et coller ensemble les mottes de terre?
  - type: heading
    content: Les soins divins pour les animaux
  '39':
  - type: text
    content: »Chasses-tu la proie pour la lionne
  - type: text
    content: et satisfais-tu l'appétit des lionceaux
  '4':
  - type: text
    content: »Où étais-tu quand j'ai fondé la terre?
  - type: text
    content: Déclare-le, puisque tu es si intelligent!
  '40':
  - type: text
    content: quand ils sont couchés dans leur tanière,
  - type: text
    content: quand ils sont aux aguets dans leur repaire?
  '41':
  - type: text
    content: Qui prépare au corbeau sa nourriture
  - type: text
    content: quand ses petits crient vers Dieu
  - type: text
    content: et vacillent, affamés?
  '5':
  - type: text
    content: Qui a fixé ses dimensions? Tu le sais, n'est-ce pas?
  - type: text
    content: Ou qui a déplié le ruban à mesurer sur elle?
  '6':
  - type: text
    content: Sur quoi ses bases reposent-elles?
  - type: text
    content: Ou qui en a posé la pierre angulaire
  '7':
  - type: text
    content: alors que les étoiles du matin éclataient ensemble en chants d'allégresse
  - type: text
    content: et que tous les fils de Dieu poussaient des cris de joie?
  '8':
  - type: text
    content: »Qui a bloqué la mer avec des portes
  - type: text
    content: quand, dans son jaillissement, elle est sortie du ventre maternel,
  '9':
  - type: text
    content: quand j'ai fait des nuages son habit
  - type: text
    content: et de l'obscurité ses langes,
