document_id: JOB.38
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Intervention de Dieu
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 38.1–42.17
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Description des œuvres divines
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel répondit à Job du milieu de la tempête. Il dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «Qui est celui qui obscurcit mes plans
- type: usfm
  marker: q1
  children:
  - type: text
    text: par des discours dépourvus de savoir?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mets donc une ceinture autour de ta taille comme un vaillant homme!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je t'interrogerai et tu me renseigneras.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: »Où étais-tu quand j'ai fondé la terre?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Déclare-le, puisque tu es si intelligent!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Qui a fixé ses dimensions? Tu le sais, n'est-ce pas?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou qui a déplié le ruban à mesurer sur elle?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Sur quoi ses bases reposent-elles?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ou qui en a posé la pierre angulaire
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: alors que les étoiles du matin éclataient ensemble en chants d'allégresse
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que tous les fils de Dieu poussaient des cris de joie?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: »Qui a bloqué la mer avec des portes
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand, dans son jaillissement, elle est sortie du ventre maternel,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: quand j'ai fait des nuages son habit
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de l'obscurité ses langes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: quand je lui ai fixé des limites
- type: usfm
  marker: q1
  children:
  - type: text
    text: et imposé verrou et portes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'quand j''ai dit: ‘Tu pourras venir jusqu''ici, tu n''iras pas plus loin.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ici s'arrêtera l'orgueil de tes vagues’?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: »Depuis que tu existes, as-tu donné des ordres au matin?
- type: usfm
  marker: q1
  children:
  - type: text
    text: As-tu montré sa place à l'aurore
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: pour qu'elle attrape les bords de la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que les méchants en tombent?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Tout se transforme alors, comme l'argile qui reçoit une empreinte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'ensemble se présente comme paré d'un habit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Quant aux méchants, ils sont privés de leur lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le bras prêt à agir est brisé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: »As-tu pénétré jusqu'aux sources de la mer?
- type: usfm
  marker: q1
  children:
  - type: text
    text: T'es-tu promené dans les profondeurs du gouffre?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Les portes de la mort t'ont-elles été dévoilées?
- type: usfm
  marker: q1
  children:
  - type: text
    text: As-tu vu les portes de l'ombre de la mort?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: As-tu perçu toute la largeur de la terre?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Déclare-le, si tu sais tout cela!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: »Où est donc le chemin qui conduit à l'habitation de la lumière?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et les ténèbres, où ont-elles leur domicile
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: pour que tu puisses les conduire vers leur territoire
- type: usfm
  marker: q1
  children:
  - type: text
    text: et discerner les sentiers qui mènent chez elles?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tu le sais, puisque tu étais déjà né
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que le nombre de tes jours est si grand!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: »Es-tu parvenu jusqu'aux réserves de neige?
- type: usfm
  marker: q1
  children:
  - type: text
    text: As-tu vu les dépôts de grêle
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: que je tiens en réserve pour les moments de détresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour les jours de guerre et de bataille?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Par quel chemin la lumière se divise-t-elle
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le vent d'est déferle-t-il sur la terre?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Qui a ouvert un passage pour les averses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un chemin pour l'éclair et le tonnerre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: pour que la pluie tombe sur une terre sans habitants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur un désert où il n'y a pas d'êtres humains,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: pour qu'elle rassasie les endroits solitaires
- type: usfm
  marker: q1
  children:
  - type: text
    text: et arides et fasse pousser et sortir l'herbe?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: »La pluie a-t-elle un père?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui donc fait naître les gouttes de rosée?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: De quel ventre est sortie la glace
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui a donné naissance au givre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: pour que l'eau se déguise en pierre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et que la surface du gouffre reste figée?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: »Peux-tu serrer les liens des Pléiades
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou détacher les cordages d'Orion?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Fais-tu paraître au moment voulu les constellations du zodiaque
- type: usfm
  marker: q1
  children:
  - type: text
    text: et conduis-tu la Grande Ourse avec ses petits?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Connais-tu les règles du ciel?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Peux-tu instaurer l'autorité de Dieu sur la terre?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Peux-tu élever ta voix jusqu'aux nuages
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que des torrents d'eau te couvrent?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: As-tu lancé des éclairs? Sont-ils partis?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Te disent-ils: ‘Nous voici’?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: »Qui a mis la sagesse au fond du cœur
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou donné l'intelligence à l'esprit?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Qui a la sagesse nécessaire pour compter les nuages?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui peut faire pencher les cruches du ciel
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: pour provoquer des coulées de boue
- type: usfm
  marker: q1
  children:
  - type: text
    text: et coller ensemble les mottes de terre?
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les soins divins pour les animaux
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: »Chasses-tu la proie pour la lionne
- type: usfm
  marker: q1
  children:
  - type: text
    text: et satisfais-tu l'appétit des lionceaux
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: quand ils sont couchés dans leur tanière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand ils sont aux aguets dans leur repaire?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: Qui prépare au corbeau sa nourriture
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand ses petits crient vers Dieu
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vacillent, affamés?
