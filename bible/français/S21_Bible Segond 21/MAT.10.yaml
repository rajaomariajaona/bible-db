document_id: MAT.10,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Puis Jésus appela ses douze disciples et leur donna le pouvoir de chasser les esprits impurs et de guérir toute maladie et toute infirmité. '
  '10':
  - type: text
    content: ni sac pour le voyage, ni deux chemises, ni sandales, ni bâton, car l'ouvrier mérite sa nourriture.
  '11':
  - type: text
    content: '»Dans chaque ville ou village où vous arrivez, informez-vous pour savoir qui est digne de vous accueillir et restez chez lui jusqu''à votre départ. '
  '12':
  - type: text
    content: 'En entrant dans la maison, saluez ses habitants '
  '13':
  - type: text
    content: 'et, s''ils en sont dignes, que votre paix vienne sur eux; mais, s''ils n''en sont pas dignes, que votre paix revienne à vous. '
  '14':
  - type: text
    content: Lorsqu'on ne vous accueillera pas et qu'on n'écoutera pas vos paroles, sortez de cette maison ou de cette ville et secouez la poussière de vos pieds
  - type: note
    content: 'Secouez… pieds: les Juifs avaient l''habitude de secouer la poussière de leurs pieds en quittant une ville non juive; ils exprimaient ainsi leur séparation d''avec ceux qui n''adoraient pas le vrai Dieu.'
  - type: text
    content: '. '
  '15':
  - type: text
    content: Je vous le dis en vérité, le jour du jugement, le pays de Sodome et de Gomorrhe
  - type: note
    content: 'Sodome… Gomorrhe: villes connues pour leur immoralité et punies par Dieu à l''époque d''Abraham.'
  - type: text
    content: ' sera traité moins sévèrement que cette ville-là.'
  '16':
  - type: text
    content: '»Voici que je vous envoie comme des brebis au milieu des loups. Soyez donc prudents comme les serpents et purs comme les colombes. '
  '17':
  - type: text
    content: 'Méfiez-vous des hommes, car ils vous livreront aux tribunaux et vous fouetteront dans leurs synagogues. '
  '18':
  - type: text
    content: 'A cause de moi vous serez conduits devant des gouverneurs et devant des rois pour leur apporter votre témoignage, à eux et aux non-Juifs. '
  '19':
  - type: text
    content: 'Mais, quand on vous fera arrêter, ne vous inquiétez ni de la manière dont vous parlerez ni de ce que vous direz: ce que vous aurez à dire vous sera donné au moment même. '
  '2':
  - type: text
    content: 'Voici les noms des douze apôtres: le premier, Simon, appelé Pierre, et André, son frère; Jacques, fils de Zébédée, et Jean, son frère; '
  '20':
  - type: text
    content: En effet, ce n'est pas vous qui parlerez, c'est l'Esprit de votre Père qui parlera en vous.
  '21':
  - type: text
    content: '»Le frère livrera son frère à la mort et le père son enfant; les enfants se soulèveront contre leurs parents et les feront mourir. '
  '22':
  - type: text
    content: 'Vous serez détestés de tous à cause de mon nom, mais celui qui persévérera jusqu''à la fin sera sauvé. '
  '23':
  - type: text
    content: Quand on vous persécutera dans une ville, fuyez dans une autre. Je vous le dis en vérité, vous n'aurez pas fini de parcourir les villes d'Israël avant que le Fils de l'homme ne vienne.
  '24':
  - type: text
    content: '»Le disciple n''est pas supérieur au maître, ni le serviteur supérieur à son seigneur. '
  '25':
  - type: text
    content: Il suffit au disciple d'être traité comme son maître, et au serviteur comme son seigneur. S'ils ont appelé le maître de la maison Béelzébul
  - type: note
    content: 'Béelzébul: terme de mépris pour désigner Satan.'
  - type: text
    content: ', ils appelleront d''autant plus volontiers ainsi les gens de sa maison! '
  '26':
  - type: text
    content: 'N''ayez donc pas peur d''eux, car il n''y a rien de caché qui ne doive être découvert, ni de secret qui ne doive être connu. '
  '27':
  - type: text
    content: 'Ce que je vous dis dans les ténèbres, dites-le en plein jour; et ce qui vous est dit à l''oreille, proclamez-le sur les toits. '
  '28':
  - type: text
    content: Ne redoutez pas ceux qui tuent le corps mais qui ne peuvent pas tuer l'âme. Redoutez plutôt celui qui peut faire périr l'âme et le corps en enfer
  - type: note
    content: 'Celui… en enfer: c''est-à-dire Dieu.'
  - type: text
    content: '. '
  '29':
  - type: text
    content: 'Ne vend-on pas deux moineaux pour une petite pièce? Cependant, pas un ne tombe par terre sans l''accord de votre Père. '
  '3':
  - type: text
    content: 'Philippe et Barthélémy; Thomas et Matthieu, le collecteur d''impôts; Jacques, fils d''Alphée, et [Lebbée, surnommé] Thaddée; '
  '30':
  - type: text
    content: 'Même vos cheveux sont tous comptés. '
  '31':
  - type: text
    content: 'N''ayez donc pas peur: vous valez plus que beaucoup de moineaux.'
  '32':
  - type: text
    content: '»C''est pourquoi, toute personne qui se déclarera publiquement pour moi, je me déclarerai moi aussi pour elle devant mon Père céleste; '
  '33':
  - type: text
    content: mais celui qui me reniera devant les hommes, je le renierai moi aussi devant mon Père céleste.
  '34':
  - type: text
    content: '»Ne croyez pas que je sois venu apporter la paix sur la terre! Je ne suis pas venu apporter la paix, mais l''épée, '
  '35':
  - type: text
    content: 'car je suis venu mettre la division entre l''homme et son père, entre la fille et sa mère, entre la belle-fille et sa belle-mère, '
  '36':
  - type: text
    content: 'et '
  - type: text
    content: l'on aura pour ennemis les membres de sa famille
  - type: note
    content: 'L''on aura… famille: citation de Michée 7.6.'
  - type: text
    content: '. '
  '37':
  - type: text
    content: 'Celui qui aime son père ou sa mère plus que moi n''est pas digne de moi, et celui qui aime son fils ou sa fille plus que moi n''est pas digne de moi. '
  '38':
  - type: text
    content: 'Celui qui ne prend pas sa croix et ne me suit pas n''est pas digne de moi. '
  '39':
  - type: text
    content: Celui qui conservera sa vie la perdra, et celui qui perdra sa vie à cause de moi la retrouvera.
  '4':
  - type: text
    content: Simon le Cananite
  - type: note
    content: 'Cananite: terme qui désignait le membre d''un parti de patriotes juifs créé afin de résister aux Romains ou, plus généralement, une personne zélée pour la loi de Moïse.'
  - type: text
    content: ' et Judas l''Iscariot'
  - type: note
    content: 'Iscariot: c''est-à-dire homme de Karioth, ville de Judée.'
  - type: text
    content: ', celui qui trahit Jésus. '
  '40':
  - type: text
    content: '»Si quelqu''un vous accueille, c''est moi qu''il accueille, et celui qui m''accueille accueille celui qui m''a envoyé. '
  '41':
  - type: text
    content: 'Celui qui accueille un prophète en qualité de prophète recevra une récompense de prophète, et celui qui accueille un juste en qualité de juste recevra une récompense de juste. '
  '42':
  - type: text
    content: Et si quelqu'un donne à boire ne serait-ce qu'un verre d'eau froide à l'un de ces petits parce qu'il est mon disciple, je vous le dis en vérité, il ne perdra pas sa récompense.»
  '5':
  - type: text
    content: 'Ce sont les douze que Jésus envoya, après leur avoir donné les instructions suivantes: «N''allez pas vers les non-Juifs et n''entrez pas dans les villes des Samaritains. '
  '6':
  - type: text
    content: Allez plutôt vers les brebis perdues de la communauté
  - type: note
    content: 'Communauté: ou famille, littéralement maison.'
  - type: text
    content: ' d''Israël. '
  '7':
  - type: text
    content: 'En chemin, prêchez en disant: ‘Le royaume des cieux est proche.’ '
  '8':
  - type: text
    content: 'Guérissez les malades, [ressuscitez les morts,] purifiez les lépreux, chassez les démons. Vous avez reçu gratuitement, donnez gratuitement. '
  '9':
  - type: text
    content: 'Ne prenez ni or, ni argent, ni monnaie dans vos ceintures, '
