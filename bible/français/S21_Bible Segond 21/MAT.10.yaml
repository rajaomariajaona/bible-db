document_id: MAT.10,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Puis Jésus appela ses douze disciples et leur donna le pouvoir de chasser les esprits impurs et de guérir toute maladie et toute infirmité. '
  '10':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ni sac pour le voyage, ni deux chemises, ni sandales, ni bâton, car l'ouvrier mérite sa nourriture.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: '»Dans chaque ville ou village où vous arrivez, informez-vous pour savoir qui est digne de vous accueillir et restez chez lui jusqu''à votre départ. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'En entrant dans la maison, saluez ses habitants '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'et, s''ils en sont dignes, que votre paix vienne sur eux; mais, s''ils n''en sont pas dignes, que votre paix revienne à vous. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Lorsqu'on ne vous accueillera pas et qu'on n'écoutera pas vos paroles, sortez de cette maison ou de cette ville et secouez la poussière de vos pieds
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Secouez… pieds: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: les Juifs avaient l'habitude de secouer la poussière de leurs pieds en quittant une ville non juive; ils exprimaient ainsi leur séparation d'avec ceux qui n'adoraient pas le vrai Dieu.
      marker-yv: yv-n
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Je vous le dis en vérité, le jour du jugement, le pays de Sodome et de Gomorrhe
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sodome… Gomorrhe: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: villes connues pour leur immoralité et punies par Dieu à l'époque d'Abraham.
      marker-yv: yv-n
    - type: text
      text: ' sera traité moins sévèrement que cette ville-là.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '»Voici que je vous envoie comme des brebis au milieu des loups. Soyez donc prudents comme les serpents et purs comme les colombes. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Méfiez-vous des hommes, car ils vous livreront aux tribunaux et vous fouetteront dans leurs synagogues. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'A cause de moi vous serez conduits devant des gouverneurs et devant des rois pour leur apporter votre témoignage, à eux et aux non-Juifs. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Mais, quand on vous fera arrêter, ne vous inquiétez ni de la manière dont vous parlerez ni de ce que vous direz: ce que vous aurez à dire vous sera donné au moment même. '
  '2':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Voici les noms des douze apôtres: le premier, Simon, appelé Pierre, et André, son frère; Jacques, fils de Zébédée, et Jean, son frère; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: En effet, ce n'est pas vous qui parlerez, c'est l'Esprit de votre Père qui parlera en vous.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: '»Le frère livrera son frère à la mort et le père son enfant; les enfants se soulèveront contre leurs parents et les feront mourir. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Vous serez détestés de tous à cause de mon nom, mais celui qui persévérera jusqu''à la fin sera sauvé. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Quand on vous persécutera dans une ville, fuyez dans une autre. Je vous le dis en vérité, vous n'aurez pas fini de parcourir les villes d'Israël avant que le Fils de l'homme ne vienne.
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: '»Le disciple n''est pas supérieur au maître, ni le serviteur supérieur à son seigneur. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Il suffit au disciple d'être traité comme son maître, et au serviteur comme son seigneur. S'ils ont appelé le maître de la maison Béelzébul
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Béelzébul: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: terme de mépris pour désigner Satan.
      marker-yv: yv-n
    - type: text
      text: ', ils appelleront d''autant plus volontiers ainsi les gens de sa maison! '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'N''ayez donc pas peur d''eux, car il n''y a rien de caché qui ne doive être découvert, ni de secret qui ne doive être connu. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ce que je vous dis dans les ténèbres, dites-le en plein jour; et ce qui vous est dit à l''oreille, proclamez-le sur les toits. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Ne redoutez pas ceux qui tuent le corps mais qui ne peuvent pas tuer l'âme. Redoutez plutôt celui qui peut faire périr l'âme et le corps en enfer
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Celui… en enfer: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire Dieu.
      marker-yv: yv-n
    - type: text
      text: '. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Ne vend-on pas deux moineaux pour une petite pièce? Cependant, pas un ne tombe par terre sans l''accord de votre Père. '
  '3':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Philippe et Barthélémy; Thomas et Matthieu, le collecteur d''impôts; Jacques, fils d''Alphée, et [Lebbée, surnommé] Thaddée; '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Même vos cheveux sont tous comptés. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'N''ayez donc pas peur: vous valez plus que beaucoup de moineaux.'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: '»C''est pourquoi, toute personne qui se déclarera publiquement pour moi, je me déclarerai moi aussi pour elle devant mon Père céleste; '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: mais celui qui me reniera devant les hommes, je le renierai moi aussi devant mon Père céleste.
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: '»Ne croyez pas que je sois venu apporter la paix sur la terre! Je ne suis pas venu apporter la paix, mais l''épée, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'car je suis venu mettre la division entre l''homme et son père, entre la fille et sa mère, entre la belle-fille et sa belle-mère, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'et '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: l'on aura pour ennemis les membres de sa famille
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.36 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'L''on aura… famille: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Michée 7.6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Celui qui aime son père ou sa mère plus que moi n''est pas digne de moi, et celui qui aime son fils ou sa fille plus que moi n''est pas digne de moi. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Celui qui ne prend pas sa croix et ne me suit pas n''est pas digne de moi. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Celui qui conservera sa vie la perdra, et celui qui perdra sa vie à cause de moi la retrouvera.
  '4':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Simon le Cananite
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Cananite: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: terme qui désignait le membre d'un parti de patriotes juifs créé afin de résister aux Romains ou, plus généralement, une personne zélée pour la loi de Moïse.
      marker-yv: yv-n
    - type: text
      text: ' et Judas l''Iscariot'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Iscariot: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire homme de Karioth, ville de Judée.
      marker-yv: yv-n
    - type: text
      text: ', celui qui trahit Jésus. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: '»Si quelqu''un vous accueille, c''est moi qu''il accueille, et celui qui m''accueille accueille celui qui m''a envoyé. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Celui qui accueille un prophète en qualité de prophète recevra une récompense de prophète, et celui qui accueille un juste en qualité de juste recevra une récompense de juste. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Et si quelqu'un donne à boire ne serait-ce qu'un verre d'eau froide à l'un de ces petits parce qu'il est mon disciple, je vous le dis en vérité, il ne perdra pas sa récompense.»
  '5':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ce sont les douze que Jésus envoya, après leur avoir donné les instructions suivantes: «N''allez pas vers les non-Juifs et n''entrez pas dans les villes des Samaritains. '
  '6':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Allez plutôt vers les brebis perdues de la communauté
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Communauté: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ou famille, littéralement maison.
      marker-yv: yv-n
    - type: text
      text: ' d''Israël. '
  '7':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'En chemin, prêchez en disant: ‘Le royaume des cieux est proche.’ '
  '8':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Guérissez les malades, [ressuscitez les morts,] purifiez les lépreux, chassez les démons. Vous avez reçu gratuitement, donnez gratuitement. '
  '9':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ne prenez ni or, ni argent, ni monnaie dans vos ceintures, '
