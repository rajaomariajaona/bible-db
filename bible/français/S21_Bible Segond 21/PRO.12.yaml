document_id: PRO.12
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Celui qui aime l'instruction aime la connaissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui déteste le reproche est un idiot.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: L'homme de bien obtient la faveur de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais le conspirateur est condamné.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: L'homme ne s'affermit pas par la méchanceté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le juste ne sera pas déraciné.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Une femme de valeur est une couronne pour son mari,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celle qui fait honte est comme une carie dans ses os.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les justes ne pensent qu'à respecter le droit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les intentions des méchants ne sont que tromperie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Les paroles des méchants sont des embuscades meurtrières,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que la bouche des hommes droits les délivre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: On renverse les méchants et ils ne sont plus là,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que la maison des justes reste debout.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Un homme est estimé en raison de son bon sens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celui qui a l'esprit pervers est l'objet du mépris.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mieux vaut être de condition modeste et avoir un serviteur
- type: usfm
  marker: q1
  children:
  - type: text
    text: que de faire l'important et de manquer de pain.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Le juste connaît bien son bétail,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais le cœur des méchants est cruel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Celui qui cultive son terrain est rassasié de pain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui poursuit des réalités sans valeur manque de bon sens.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le méchant convoite la part des hommes mauvais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que la racine des justes est généreuse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Le péché des lèvres prend l'homme mauvais au piège,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que le juste peut sortir de la détresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Grâce au fruit de la bouche on est rassasié de biens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et chacun sera récompensé de ses actes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le fou et le sage
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: La voie qu'emprunte le fou est droite à ses yeux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il est sage d'écouter les conseils.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Un fou manifeste immédiatement sa colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui couvre un affront est un homme prudent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Celui qui dit la vérité proclame la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le faux témoin la tromperie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Celui qui parle à la légère blesse comme une épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que la langue des sages apporte la guérison.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: La lèvre qui dit la vérité est affermie pour toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que la langue mensongère ne subsiste qu'un instant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: La tromperie est dans le cœur de ceux qui méditent le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais la joie est pour ceux qui conseillent la paix.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Aucun trouble n'atteint le juste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que les méchants sont accablés de maux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Les lèvres mensongères font horreur à l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que ceux qui agissent avec fidélité lui sont agréables.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: L'homme prudent cache sa connaissance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que le cœur des hommes stupides proclame leur folie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: La main des personnes actives dominera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que la main nonchalante sera astreinte à la corvée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: L'homme peut rabattre l'inquiétude qui est dans son cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais une bonne parole la fera tourner en joie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Le juste apprend de son prochain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais la voie qu'empruntent les méchants les égare.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: L'homme nonchalant ne rôtit pas son gibier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais l'activité procure à l'homme des biens précieux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: La vie est dans le sentier de la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: son chemin ne conduit pas à la mort.
