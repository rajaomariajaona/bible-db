document_id: PRO.12,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui aime l'instruction aime la connaissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui déteste le reproche est un idiot.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le juste connaît bien son bétail,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le cœur des méchants est cruel.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui cultive son terrain est rassasié de pain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais celui qui poursuit des réalités sans valeur manque de bon sens.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le méchant convoite la part des hommes mauvais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que la racine des justes est généreuse.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le péché des lèvres prend l'homme mauvais au piège,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que le juste peut sortir de la détresse.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Grâce au fruit de la bouche on est rassasié de biens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et chacun sera récompensé de ses actes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le fou et le sage
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La voie qu'emprunte le fou est droite à ses yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il est sage d'écouter les conseils.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un fou manifeste immédiatement sa colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais celui qui couvre un affront est un homme prudent.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui dit la vérité proclame la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le faux témoin la tromperie.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui parle à la légère blesse comme une épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que la langue des sages apporte la guérison.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La lèvre qui dit la vérité est affermie pour toujours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que la langue mensongère ne subsiste qu'un instant.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'homme de bien obtient la faveur de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le conspirateur est condamné.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La tromperie est dans le cœur de ceux qui méditent le mal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la joie est pour ceux qui conseillent la paix.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Aucun trouble n'atteint le juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que les méchants sont accablés de maux.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les lèvres mensongères font horreur à l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que ceux qui agissent avec fidélité lui sont agréables.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'homme prudent cache sa connaissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que le cœur des hommes stupides proclame leur folie.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La main des personnes actives dominera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que la main nonchalante sera astreinte à la corvée.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'homme peut rabattre l'inquiétude qui est dans son cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais une bonne parole la fera tourner en joie.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le juste apprend de son prochain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais la voie qu'empruntent les méchants les égare.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'homme nonchalant ne rôtit pas son gibier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais l'activité procure à l'homme des biens précieux.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La vie est dans le sentier de la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: son chemin ne conduit pas à la mort.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'homme ne s'affermit pas par la méchanceté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le juste ne sera pas déraciné.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Une femme de valeur est une couronne pour son mari,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais celle qui fait honte est comme une carie dans ses os.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les justes ne pensent qu'à respecter le droit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les intentions des méchants ne sont que tromperie.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les paroles des méchants sont des embuscades meurtrières,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que la bouche des hommes droits les délivre.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On renverse les méchants et ils ne sont plus là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que la maison des justes reste debout.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un homme est estimé en raison de son bon sens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et celui qui a l'esprit pervers est l'objet du mépris.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mieux vaut être de condition modeste et avoir un serviteur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que de faire l'important et de manquer de pain.
