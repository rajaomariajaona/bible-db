document_id: 2SA.22,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Cantique de délivrance de David
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'David adressa les paroles de ce chant à l''Eternel après qu''il l''eut délivré de tous ses ennemis et de Saül. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: »Il a incliné le ciel et il est descendu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une épaisse nuée sous ses pieds.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Il était monté sur un chérubin et il volait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il apparaissait monté sur les ailes du vent.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Il faisait des ténèbres une tente autour de lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'était un amas d'eau, de sombres nuages.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Une lumière éclatante le précédait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d'où provenaient tout brûlants des charbons de feu.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: »L'Eternel a tonné du haut du ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le Très-Haut a fait retentir sa voix.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Il a lancé des flèches et dispersé mes ennemis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a lancé des éclairs et les a mis en déroute.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: »Le fond de la mer est apparu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les fondements du monde ont été découverts
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à la menace de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au souffle de ses narines.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Il est intervenu d'en haut, il m'a pris,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il m'a retiré des grandes eaux.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Il m'a délivré de mon adversaire puissant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de mes ennemis qui étaient plus forts que moi.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: »Ils m'avaient surpris lorsque j'étais dans la détresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais l'Eternel a été mon appui.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «L'Eternel est mon rocher, ma forteresse, mon libérateur.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Il m'a mis au large,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il m'a sauvé, parce qu'il m'aime.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: »L'Eternel m'a récompensé de ma justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il m'a traité conformément à la pureté de mes mains,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: car j'ai suivi les voies de l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je n'ai pas été coupable envers mon Dieu.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Toutes ses règles ont été devant moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je ne me suis pas écarté de ses prescriptions.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: J'ai été intègre envers lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je me suis tenu en garde contre mon péché.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Alors l'Eternel m'a traité conformément à ma justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à la pureté qu'il a vue chez moi.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: »Avec celui qui est fidèle tu te montres fidèle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec l'homme intègre tu agis avec intégrité,
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: avec celui qui est pur tu te montres pur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et avec l'homme faux tu te montres habile.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Tu sauves le peuple qui s'humilie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu abaisses ton regard sur les orgueilleux.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Oui, tu es ma lumière, Eternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel éclaire mes ténèbres.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Dieu est mon rocher où je trouve un abri,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon bouclier et la force qui me sauve,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon rempart et mon refuge.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon Sauveur, tu me garantis de la violence.
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: »Avec toi je me précipite sur une troupe tout armée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec mon Dieu je franchis une muraille.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Les voies de Dieu sont droites,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la parole de l'Eternel est pure;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est un bouclier pour tous ceux qui se confient en lui.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: »Qui est Dieu en dehors de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui est un rocher, sinon notre Dieu?
  '33':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: C'est Dieu qui est ma puissante forteresse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui me conduit dans une voie droite.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Il rend mes pieds aussi agiles que ceux des biches,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il me fait tenir debout sur les hauteurs.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Il exerce mes mains au combat
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mes bras tendent l'arc en bronze.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: »Tu me donnes le bouclier de ton salut,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je deviens grand par ta bonté.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Tu élargis le chemin sous mes pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mes pieds ne trébuchent pas.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: Je poursuis mes ennemis et je les détruis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne reviens pas avant de les avoir exterminés.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: Je les frappe, je les brise, et ils ne se relèvent plus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils tombent sous mes pieds.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Loué soit l'Eternel! Je crie à lui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je suis délivré de mes ennemis.
  '40':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: Tu me donnes de la force pour le combat,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu fais plier sous moi mes adversaires.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: Tu mets mes ennemis en fuite devant moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je réduis au silence ceux qui me détestent.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: Ils regardent autour d'eux, et personne pour les sauver!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils crient à l'Eternel, et il ne leur répond pas!
  '43':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: Je les réduis en miettes, je les rends pareils à la poussière de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je les écrase, je les piétine comme la boue des rues.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: »Tu me délivres des révoltes de mon peuple;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu me gardes à la tête des nations;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un peuple que je ne connaissais pas m'est soumis.
  '45':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: Les étrangers me flattent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils m'obéissent au premier ordre.
  '46':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: Les étrangers perdent courage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sortent en tremblant de leurs forteresses.
  '47':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: »L'Eternel est vivant! Béni soit mon rocher!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que l'on dise la grandeur de Dieu, le rocher de mon salut!
  '48':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: C'est le Dieu qui m'accorde la vengeance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui m'asservit les peuples,
  '49':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: text
      text: qui me fait échapper à mes ennemis!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Tu m'élèves au-dessus de mes adversaires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu me sauves de l'homme violent.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: »Oui, les flots de la mort m'avaient enserré,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les torrents dévastateurs m'avaient épouvanté.
  '50':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: '*C''est pourquoi je te louerai parmi les nations, Eternel,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je chanterai à la gloire de ton nom.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.50 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'C''est pourquoi… nom: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Romains 15.9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (= '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 18.50
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '51':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: »Il accorde de grandes délivrances à son roi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il agit avec bonté envers celui qu'il a désigné par onction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: envers David et sa descendance, pour toujours.»
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Les liens du séjour des morts m'avaient entouré,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les pièges de la mort m'avaient surpris.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: »Dans ma détresse, j'ai fait appel à l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'ai appelé mon Dieu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de son palais, il a entendu ma voix,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon cri est parvenu à ses oreilles.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: La terre a été ébranlée, elle a tremblé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les fondements du ciel ont vacillé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont été ébranlés, parce qu'il était irrité.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Une fumée s'élevait de ses narines
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et un feu dévorant sortait de sa bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec des charbons embrasés.
