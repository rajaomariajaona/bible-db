document_id: 2KI.19,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Délivrance de Jérusalem
  - type: text
    content: 'A l''écoute de ce rapport, le roi Ezéchias déchira ses habits, se couvrit d''un sac et alla dans la maison de l''Eternel. '
  '10':
  - type: text
    content: 'avec l''ordre de dire à Ezéchias, le roi de Juda: «Que ton Dieu, celui dans lequel tu places ta confiance, ne te trompe pas en prétendant que Jérusalem ne sera pas livrée entre les mains du roi d''Assyrie. '
  '11':
  - type: text
    content: 'Tu as bien appris ce que les rois d''Assyrie ont fait à tous les pays, la manière dont ils les ont voués à la destruction. Et toi, tu serais délivré? '
  '12':
  - type: text
    content: 'Les dieux des nations que mes prédécesseurs ont détruites les ont-ils délivrées? Considère ce qui est arrivé à Gozan, Charan, Retseph et aux Edénites qui se trouvent à Telassar! '
  '13':
  - type: text
    content: Où sont les rois de Hamath, d'Arpad, de la ville de Sepharvaïm, d'Héna et d'Ivva?»
  '14':
  - type: text
    content: 'Ezéchias prit la lettre de la main des messagers et la lut. Puis il monta à la maison de l''Eternel et la déroula devant l''Eternel. '
  '15':
  - type: text
    content: 'Il lui adressa cette prière: «Eternel, Dieu d''Israël, toi qui sièges entre les chérubins'
  - type: note
    content: 'Chérubins: allusion à l''arche de l''alliance, sur laquelle étaient sculptés des chérubins (êtres angéliques) et qui était le lieu que Dieu avait défini comme lieu de rencontre avec son peuple (Exode 25.18-22).'
  - type: text
    content: ', c''est toi qui es le seul Dieu de tous les royaumes de la terre, c''est toi qui as fait le ciel et la terre. '
  '16':
  - type: text
    content: 'Eternel, tends l''oreille et écoute! Eternel, ouvre tes yeux et regarde! Ecoute les paroles de Sanchérib, lui qui a envoyé Rabshaké pour insulter le Dieu vivant! '
  '17':
  - type: text
    content: 'Il est vrai, Eternel, que les rois d''Assyrie ont dévasté les nations et leur territoire '
  '18':
  - type: text
    content: 'et qu''ils ont jeté leurs dieux dans le feu, mais ce n''étaient pas des dieux: ils avaient été fabriqués par la main des hommes, c''était du bois et de la pierre. Voilà pourquoi ils ont pu les faire disparaître. '
  '19':
  - type: text
    content: Maintenant, Eternel, notre Dieu, délivre-nous de Sanchérib et que tous les royaumes de la terre reconnaissent que c'est toi seul, Eternel, qui es Dieu!»
  '2':
  - type: text
    content: 'Il envoya Eliakim, le chef du palais royal, Shebna, le secrétaire, et les plus anciens des prêtres, tous couverts de sacs, vers le prophète Esaïe, fils d''Amots. '
  '20':
  - type: text
    content: 'Alors Esaïe, fils d''Amots, fit dire à Ezéchias: «Voici ce que dit l''Eternel, le Dieu d''Israël: J''ai entendu la prière que tu m''as adressée au sujet de Sanchérib, le roi d''Assyrie. '
  '21':
  - type: text
    content: 'Voici la parole que l''Eternel a prononcée contre lui:'
  - type: text
    content: »Elle te méprise, elle se moque de toi,
  - type: text
    content: la vierge, la fille de Sion.
  - type: text
    content: Elle hoche la tête sur toi,
  - type: text
    content: la fille de Jérusalem.
  '22':
  - type: text
    content: Qui as-tu défié et insulté?
  - type: text
    content: A qui t'es-tu attaqué par tes paroles?
  - type: text
    content: Tu as lancé un regard insolent
  - type: text
    content: sur le Saint d'Israël!
  '23':
  - type: text
    content: Par l'intermédiaire de tes messagers
  - type: text
    content: 'tu as défié le Seigneur, tu as dit:'
  - type: text
    content: ‘C'est grâce à mes nombreux chars
  - type: text
    content: que j'ai gravi le sommet des montagnes,
  - type: text
    content: les pentes du Liban.
  - type: text
    content: Je couperai les plus grands de ses cèdres,
  - type: text
    content: les plus beaux de ses cyprès,
  - type: text
    content: et j'atteindrai sa dernière cime,
  - type: text
    content: sa forêt pareille à un verger.
  '24':
  - type: text
    content: J'ai creusé des puits et j'ai bu de l'eau étrangère.
  - type: text
    content: Je mettrai à sec, avec la plante de mes pieds,
  - type: text
    content: tous les fleuves de l'Egypte.’
  '25':
  - type: text
    content: »N'as-tu pas appris que j'ai préparé ces événements depuis longtemps,
  - type: text
    content: que je les ai prévus dans un lointain passé?
  - type: text
    content: Maintenant j'ai permis qu'ils s'accomplissent
  - type: text
    content: et que tu transformes des villes fortifiées en tas de ruines.
  '26':
  - type: text
    content: Leurs habitants sont impuissants,
  - type: text
    content: épouvantés et pleins de honte,
  - type: text
    content: ils sont comme l'herbe des champs et la tendre verdure,
  - type: text
    content: comme le gazon des toits
  - type: text
    content: et le blé qui sèche avant d'être mûr.
  '27':
  - type: text
    content: »Mais je sais quand tu t'assieds, quand tu sors et quand tu entres,
  - type: text
    content: et quand tu es furieux contre moi.
  '28':
  - type: text
    content: Oui, tu es furieux contre moi
  - type: text
    content: et ton arrogance est montée à mes oreilles.
  - type: text
    content: C'est pourquoi je vais mettre mon anneau à tes narines et mon mors entre tes lèvres,
  - type: text
    content: et je vais te faire repartir par le chemin que tu as pris à l'aller.
  '29':
  - type: text
    content: '»Voici ce qui te servira de signe: on mangera cette année ce que produit le grain tombé en terre, et une deuxième année ce qui pousse tout seul, mais la troisième année semez, moissonnez, plantez des vignes et mangez-en le fruit! '
  '3':
  - type: text
    content: 'Ils lui dirent: «Voici ce que dit Ezéchias: Ce jour est un jour d''angoisse, de punition et de honte, car les enfants sont près de sortir du ventre maternel et il n''y a pas de force pour l''accouchement. '
  '30':
  - type: text
    content: 'Les rescapés de la communauté de Juda, ceux qui seront restés, plongeront de nouvelles racines vers le bas et porteront du fruit vers le haut. '
  '31':
  - type: text
    content: En effet, un reste sortira de Jérusalem, et du mont Sion des rescapés. Voilà ce que fera le zèle de l'Eternel, le maître de l'univers.
  '32':
  - type: text
    content: '»C''est pourquoi, voici ce que dit l''Eternel à l''intention du roi d''Assyrie: Il n''entrera pas dans cette ville, il n''y tirera pas de flèches, il ne lui opposera pas de boucliers et ne construira pas de retranchements contre elle. '
  '33':
  - type: text
    content: 'Il repartira par le chemin qu''il a pris à l''aller et il n''entrera pas dans cette ville, déclare l''Eternel. '
  '34':
  - type: text
    content: Je protégerai cette ville pour la sauver à cause de moi-même et à cause de mon serviteur David.»
  '35':
  - type: text
    content: Cette nuit-là, l'ange de l'Eternel sortit et frappa 185'000 hommes dans le camp des Assyriens. Quand on se leva le matin, ce n'étaient plus que des cadavres.
  '36':
  - type: text
    content: 'Alors Sanchérib, le roi d''Assyrie, leva le camp et repartit, et il resta à Ninive. '
  '37':
  - type: text
    content: Un jour où il était prosterné dans le temple de son dieu Nisroc, ses fils Adrammélec et Sharetser le frappèrent de l'épée avant de se réfugier au pays d'Ararat. Son fils Esar-Haddon devint roi à sa place.
  '4':
  - type: text
    content: Peut-être l'Eternel, ton Dieu, a-t-il entendu toutes les paroles de Rabshaké, l'homme que le roi d'Assyrie, son seigneur, a envoyé pour insulter le Dieu vivant, et peut-être l'Eternel, ton Dieu, punira-t-il les paroles qu'il a entendues. Fais donc monter une prière pour le reste qui subsiste encore!»
  '5':
  - type: text
    content: 'Les serviteurs du roi Ezéchias allèrent donc trouver Esaïe, '
  '6':
  - type: text
    content: 'et celui-ci leur dit: «Vous transmettrez le message suivant à votre maître: ‘Voici ce que dit l''Eternel: Ne te laisse pas effrayer par les paroles que tu as entendues et par lesquelles les serviteurs du roi d''Assyrie m''ont insulté. '
  '7':
  - type: text
    content: Je vais mettre en lui un état d'esprit tel que, sur une nouvelle qu'il recevra, il retournera dans son pays, et là-bas je le ferai tomber par l'épée.’»
  '8':
  - type: text
    content: 'Rabshaké se retira et alla rejoindre le roi d''Assyrie au beau milieu de son combat contre Libna, car il avait appris son départ de Lakis. '
  '9':
  - type: text
    content: 'C''est alors que le roi d''Assyrie reçut une nouvelle en rapport avec Tirhaka, le roi d''Ethiopie. On lui dit: «Voici qu''il s''est mis en marche pour te faire la guerre.» Le roi d''Assyrie envoya de nouveau des messagers à Ezéchias '
