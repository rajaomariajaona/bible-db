document_id: 2KI.19,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Délivrance de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'A l''écoute de ce rapport, le roi Ezéchias déchira ses habits, se couvrit d''un sac et alla dans la maison de l''Eternel. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'avec l''ordre de dire à Ezéchias, le roi de Juda: «Que ton Dieu, celui dans lequel tu places ta confiance, ne te trompe pas en prétendant que Jérusalem ne sera pas livrée entre les mains du roi d''Assyrie. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Tu as bien appris ce que les rois d''Assyrie ont fait à tous les pays, la manière dont ils les ont voués à la destruction. Et toi, tu serais délivré? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Les dieux des nations que mes prédécesseurs ont détruites les ont-ils délivrées? Considère ce qui est arrivé à Gozan, Charan, Retseph et aux Edénites qui se trouvent à Telassar! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Où sont les rois de Hamath, d'Arpad, de la ville de Sepharvaïm, d'Héna et d'Ivva?»
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ezéchias prit la lettre de la main des messagers et la lut. Puis il monta à la maison de l''Eternel et la déroula devant l''Eternel. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Il lui adressa cette prière: «Eternel, Dieu d''Israël, toi qui sièges entre les chérubins'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Chérubins: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: allusion à l'arche de l'alliance, sur laquelle étaient sculptés des chérubins (êtres angéliques) et qui était le lieu que Dieu avait défini comme lieu de rencontre avec son peuple (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Exode 25.18-22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ', c''est toi qui es le seul Dieu de tous les royaumes de la terre, c''est toi qui as fait le ciel et la terre. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Eternel, tends l''oreille et écoute! Eternel, ouvre tes yeux et regarde! Ecoute les paroles de Sanchérib, lui qui a envoyé Rabshaké pour insulter le Dieu vivant! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Il est vrai, Eternel, que les rois d''Assyrie ont dévasté les nations et leur territoire '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'et qu''ils ont jeté leurs dieux dans le feu, mais ce n''étaient pas des dieux: ils avaient été fabriqués par la main des hommes, c''était du bois et de la pierre. Voilà pourquoi ils ont pu les faire disparaître. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Maintenant, Eternel, notre Dieu, délivre-nous de Sanchérib et que tous les royaumes de la terre reconnaissent que c'est toi seul, Eternel, qui es Dieu!»
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il envoya Eliakim, le chef du palais royal, Shebna, le secrétaire, et les plus anciens des prêtres, tous couverts de sacs, vers le prophète Esaïe, fils d''Amots. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Alors Esaïe, fils d''Amots, fit dire à Ezéchias: «Voici ce que dit l''Eternel, le Dieu d''Israël: J''ai entendu la prière que tu m''as adressée au sujet de Sanchérib, le roi d''Assyrie. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Voici la parole que l''Eternel a prononcée contre lui:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Elle te méprise, elle se moque de toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la vierge, la fille de Sion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle hoche la tête sur toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la fille de Jérusalem.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Qui as-tu défié et insulté?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A qui t'es-tu attaqué par tes paroles?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as lancé un regard insolent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur le Saint d'Israël!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Par l'intermédiaire de tes messagers
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tu as défié le Seigneur, tu as dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘C'est grâce à mes nombreux chars
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que j'ai gravi le sommet des montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les pentes du Liban.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je couperai les plus grands de ses cèdres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les plus beaux de ses cyprès,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j'atteindrai sa dernière cime,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa forêt pareille à un verger.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: J'ai creusé des puits et j'ai bu de l'eau étrangère.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je mettrai à sec, avec la plante de mes pieds,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les fleuves de l'Egypte.’
  '25':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: »N'as-tu pas appris que j'ai préparé ces événements depuis longtemps,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que je les ai prévus dans un lointain passé?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maintenant j'ai permis qu'ils s'accomplissent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que tu transformes des villes fortifiées en tas de ruines.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Leurs habitants sont impuissants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: épouvantés et pleins de honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont comme l'herbe des champs et la tendre verdure,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme le gazon des toits
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le blé qui sèche avant d'être mûr.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: »Mais je sais quand tu t'assieds, quand tu sors et quand tu entres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et quand tu es furieux contre moi.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Oui, tu es furieux contre moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ton arrogance est montée à mes oreilles.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est pourquoi je vais mettre mon anneau à tes narines et mon mors entre tes lèvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je vais te faire repartir par le chemin que tu as pris à l'aller.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: '»Voici ce qui te servira de signe: on mangera cette année ce que produit le grain tombé en terre, et une deuxième année ce qui pousse tout seul, mais la troisième année semez, moissonnez, plantez des vignes et mangez-en le fruit! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ils lui dirent: «Voici ce que dit Ezéchias: Ce jour est un jour d''angoisse, de punition et de honte, car les enfants sont près de sortir du ventre maternel et il n''y a pas de force pour l''accouchement. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Les rescapés de la communauté de Juda, ceux qui seront restés, plongeront de nouvelles racines vers le bas et porteront du fruit vers le haut. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: En effet, un reste sortira de Jérusalem, et du mont Sion des rescapés. Voilà ce que fera le zèle de l'Eternel, le maître de l'univers.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: '»C''est pourquoi, voici ce que dit l''Eternel à l''intention du roi d''Assyrie: Il n''entrera pas dans cette ville, il n''y tirera pas de flèches, il ne lui opposera pas de boucliers et ne construira pas de retranchements contre elle. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Il repartira par le chemin qu''il a pris à l''aller et il n''entrera pas dans cette ville, déclare l''Eternel. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Je protégerai cette ville pour la sauver à cause de moi-même et à cause de mon serviteur David.»
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Cette nuit-là, l'ange de l'Eternel sortit et frappa 185'000 hommes dans le camp des Assyriens. Quand on se leva le matin, ce n'étaient plus que des cadavres.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Alors Sanchérib, le roi d''Assyrie, leva le camp et repartit, et il resta à Ninive. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: Un jour où il était prosterné dans le temple de son dieu Nisroc, ses fils Adrammélec et Sharetser le frappèrent de l'épée avant de se réfugier au pays d'Ararat. Son fils Esar-Haddon devint roi à sa place.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Peut-être l'Eternel, ton Dieu, a-t-il entendu toutes les paroles de Rabshaké, l'homme que le roi d'Assyrie, son seigneur, a envoyé pour insulter le Dieu vivant, et peut-être l'Eternel, ton Dieu, punira-t-il les paroles qu'il a entendues. Fais donc monter une prière pour le reste qui subsiste encore!»
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Les serviteurs du roi Ezéchias allèrent donc trouver Esaïe, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'et celui-ci leur dit: «Vous transmettrez le message suivant à votre maître: ‘Voici ce que dit l''Eternel: Ne te laisse pas effrayer par les paroles que tu as entendues et par lesquelles les serviteurs du roi d''Assyrie m''ont insulté. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Je vais mettre en lui un état d'esprit tel que, sur une nouvelle qu'il recevra, il retournera dans son pays, et là-bas je le ferai tomber par l'épée.’»
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Rabshaké se retira et alla rejoindre le roi d''Assyrie au beau milieu de son combat contre Libna, car il avait appris son départ de Lakis. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'C''est alors que le roi d''Assyrie reçut une nouvelle en rapport avec Tirhaka, le roi d''Ethiopie. On lui dit: «Voici qu''il s''est mis en marche pour te faire la guerre.» Le roi d''Assyrie envoya de nouveau des messagers à Ezéchias '
