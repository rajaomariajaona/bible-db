document_id: 2SA.21,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Vengeance des Gabaonites
  - type: text
    content: 'Au cours du règne de David, il y eut une famine qui dura 3 ans. David rechercha l''Eternel et l''Eternel dit: «C''est à cause de Saül et de sa famille sanguinaire, c''est parce qu''il a fait mourir les Gabaonites.» '
  '10':
  - type: text
    content: 'Ritspa, fille d''Ajja, prit un sac qu''elle étendit sous elle contre le rocher, depuis le début de la moisson jusqu''à ce que la pluie tombe du ciel sur les corps. Elle empêcha les oiseaux du ciel de s''approcher d''eux pendant la journée, et les bêtes sauvages pendant la nuit. '
  '11':
  - type: text
    content: 'On informa David de ce qu''avait fait Ritspa, fille d''Ajja et concubine de Saül. '
  '12':
  - type: text
    content: 'Alors David alla prendre les ossements de Saül et de son fils Jonathan chez les habitants de Jabès en Galaad. Ceux-ci les avaient en effet enlevés de la place de Beth-Shan, où les Philistins les avaient suspendus après avoir battu Saül à Guilboa. '
  '13':
  - type: text
    content: 'Il emporta de là les ossements de Saül et ceux de son fils Jonathan. On rassembla aussi les ossements de ceux qui avaient été pendus. '
  '14':
  - type: text
    content: On enterra les ossements de Saül et de son fils Jonathan dans le territoire de Benjamin, à Tséla, dans le tombeau de Kis, le père de Saül. On fit tout ce que le roi avait ordonné. Après cela, Dieu fut apaisé envers le pays.
  - type: heading
    content: Derniers exploits contre les Philistins
  '15':
  - type: text
    content: 'Les Philistins firent encore la guerre à Israël. David descendit avec ses serviteurs et ils livrèrent combat contre les Philistins. David eut une défaillance, '
  '16':
  - type: text
    content: 'et Jishbi-Benob, un descendant de Rapha, eut l''idée de le tuer. Il avait une lance en bronze qui pesait plus de 3 kilos et il était muni d''une épée neuve. '
  '17':
  - type: text
    content: 'Abishaï, fils de Tseruja, vint au secours de David et frappa le Philistin à mort. Alors les hommes de David prêtèrent le serment suivant: «Tu ne sortiras plus avec nous pour combattre et ainsi tu ne risqueras pas d''éteindre la lampe d''Israël.»'
  '18':
  - type: text
    content: Après cela, il y eut encore une bataille contre les Philistins à Gob. C'est alors que Sibbecaï le Hushatite tua Saph, qui était un descendant de Rapha.
  '19':
  - type: text
    content: Il y eut encore une bataille contre les Philistins à Gob. Elchanan, fils de Jaaré-Oreguim, originaire de Bethléhem, y tua Goliath
  - type: note
    content: Le Goliath dont il est question est, d'après 1 Chroniques 20.5, le frère de celui que David a tué.
  - type: text
    content: ', un homme de Gath qui avait une lance dont le bois avait la grosseur d''un cylindre de métier à tisser.'
  '2':
  - type: text
    content: 'Le roi appela les Gabaonites pour leur parler. – Les Gabaonites ne faisaient pas partie des Israélites, c''étaient des survivants des Amoréens. Les Israélites s''étaient engagés envers eux par un serment, pourtant Saül avait cherché à les frapper, dans son zèle pour les Israélites et les Judéens. – '
  '20':
  - type: text
    content: 'Il y eut encore une bataille à Gath. Il s''y trouva un homme de haute taille, qui avait 6 doigts à chaque main et à chaque pied – 24 en tout – et qui était aussi un descendant de Rapha. '
  '21':
  - type: text
    content: Il lança un défi à Israël et Jonathan, fils de Shimea, le frère de David, le tua.
  '22':
  - type: text
    content: Ces quatre hommes étaient des descendants de Rapha qui habitaient à Gath. Ils tombèrent sous les coups de David et de ses serviteurs.
  '3':
  - type: text
    content: 'David dit aux Gabaonites: «Que puis-je faire pour vous? Avec quoi puis-je faire expiation afin que vous bénissiez l''héritage de l''Eternel?» '
  '4':
  - type: text
    content: 'Les Gabaonites lui répondirent: «Ce n''est pas pour nous une question d''argent et d''or avec Saül et sa famille, et ce n''est pas à nous de faire mourir quelqu''un en Israël.» Le roi demanda: «Que voulez-vous donc que je fasse pour vous?» '
  '5':
  - type: text
    content: 'Ils répondirent au roi: «Puisque cet homme a voulu nous exterminer et qu''il avait le projet de nous détruire pour nous éliminer de tout le territoire d''Israël, '
  '6':
  - type: text
    content: 'qu''on nous livre sept de ses descendants et nous les pendrons devant l''Eternel à Guibea, la ville de Saül, celui que l''Eternel avait choisi.» Et le roi dit: «Je vous les livrerai.»'
  '7':
  - type: text
    content: 'Le roi épargna Mephibosheth, le fils de Jonathan et le petit-fils de Saül, à cause du serment que Jonathan, le fils de Saül, et lui-même avaient prêté ensemble devant l''Eternel. '
  '8':
  - type: text
    content: 'Toutefois, le roi prit les deux fils que Ritspa, fille d''Ajja, avait donnés à Saül, Armoni et Mephibosheth, ainsi que les cinq fils que Mérab, fille de Saül, avait donnés à Adriel de Mehola, fils de Barzillaï. '
  '9':
  - type: text
    content: Il les livra entre les mains des Gabaonites et ceux-ci les pendirent sur la montagne, devant l'Eternel. Ils furent tués tous les sept ensemble. Ils furent mis à mort dans les tout premiers jours de la moisson de l'orge.
