document_id: PSA.72
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La gloire d'un royaume juste
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: De Salomon.
- type: usfm
  marker: q1
  children:
  - type: text
    text: O Dieu, donne au roi de juger comme toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: donne ton esprit de justice au fils du roi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Qu'il juge ton peuple avec justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les malheureux qui t'appartiennent conformément au droit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Que les montagnes apportent la paix au peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les collines aussi, par l'effet de ta justice!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Il fera droit aux malheureux du peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il sauvera les enfants du pauvre et il écrasera l'oppresseur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: On te craindra, tant que le soleil brillera,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tant que la lune éclairera, de génération en génération.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il sera pareil à une pluie qui tombe sur un terrain fauché,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à des ondées qui arrosent la campagne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Sous son règne, le juste fleurira,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la paix sera grande tant que la lune éclairera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Il dominera d'une mer à l'autre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de l'Euphrate aux extrémités de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Devant lui les habitants du désert plieront le genou
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses ennemis lécheront la poussière.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Les rois de Tarsis et des îles amèneront des offrandes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les rois de Séba et de Saba apporteront leur tribut.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Tous les rois se prosterneront devant lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toutes les nations le serviront,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: car il délivrera le pauvre qui crie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le malheureux que personne n'aide.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Il aura pitié du faible et du pauvre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il sauvera la vie des pauvres;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: il les rachètera de l'oppression et de la violence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur sang aura de la valeur à ses yeux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Que le roi vive! On lui donnera de l'or de Séba,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on priera pour lui sans cesse, on le bénira tout le jour.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Les blés abonderont dans le pays, au sommet des montagnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leurs épis s'agiteront comme les arbres du Liban;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les hommes fleuriront dans les villes comme l'herbe de la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Que son nom subsiste toujours,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'il se perpétue aussi longtemps que le soleil!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Par lui on se bénira mutuellement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toutes les nations le diront heureux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Béni soit l'Eternel Dieu, le Dieu d'Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui seul fait des merveilles!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Que son nom glorieux soit béni éternellement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que toute la terre soit remplie de sa gloire!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Amen! Amen!
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Fin des prières de David, fils d'Isaï.
