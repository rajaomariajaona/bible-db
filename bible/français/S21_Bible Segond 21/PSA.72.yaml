document_id: PSA.72,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La gloire d'un royaume juste
  - type: text
    content: De Salomon.
  - type: text
    content: O Dieu, donne au roi de juger comme toi,
  - type: text
    content: donne ton esprit de justice au fils du roi!
  '10':
  - type: text
    content: Les rois de Tarsis et des îles amèneront des offrandes,
  - type: text
    content: les rois de Séba et de Saba apporteront leur tribut.
  '11':
  - type: text
    content: Tous les rois se prosterneront devant lui,
  - type: text
    content: toutes les nations le serviront,
  '12':
  - type: text
    content: car il délivrera le pauvre qui crie
  - type: text
    content: et le malheureux que personne n'aide.
  '13':
  - type: text
    content: Il aura pitié du faible et du pauvre,
  - type: text
    content: et il sauvera la vie des pauvres;
  '14':
  - type: text
    content: il les rachètera de l'oppression et de la violence,
  - type: text
    content: et leur sang aura de la valeur à ses yeux.
  '15':
  - type: text
    content: Que le roi vive! On lui donnera de l'or de Séba,
  - type: text
    content: on priera pour lui sans cesse, on le bénira tout le jour.
  '16':
  - type: text
    content: Les blés abonderont dans le pays, au sommet des montagnes,
  - type: text
    content: et leurs épis s'agiteront comme les arbres du Liban;
  - type: text
    content: les hommes fleuriront dans les villes comme l'herbe de la terre.
  '17':
  - type: text
    content: Que son nom subsiste toujours,
  - type: text
    content: qu'il se perpétue aussi longtemps que le soleil!
  - type: text
    content: Par lui on se bénira mutuellement,
  - type: text
    content: et toutes les nations le diront heureux.
  '18':
  - type: text
    content: Béni soit l'Eternel Dieu, le Dieu d'Israël,
  - type: text
    content: qui seul fait des merveilles!
  '19':
  - type: text
    content: Que son nom glorieux soit béni éternellement,
  - type: text
    content: que toute la terre soit remplie de sa gloire!
  - type: text
    content: Amen! Amen!
  '2':
  - type: text
    content: Qu'il juge ton peuple avec justice,
  - type: text
    content: et les malheureux qui t'appartiennent conformément au droit.
  '20':
  - type: text
    content: Fin des prières de David, fils d'Isaï.
  '3':
  - type: text
    content: Que les montagnes apportent la paix au peuple,
  - type: text
    content: et les collines aussi, par l'effet de ta justice!
  '4':
  - type: text
    content: Il fera droit aux malheureux du peuple,
  - type: text
    content: il sauvera les enfants du pauvre et il écrasera l'oppresseur.
  '5':
  - type: text
    content: On te craindra, tant que le soleil brillera,
  - type: text
    content: tant que la lune éclairera, de génération en génération.
  '6':
  - type: text
    content: Il sera pareil à une pluie qui tombe sur un terrain fauché,
  - type: text
    content: à des ondées qui arrosent la campagne.
  '7':
  - type: text
    content: Sous son règne, le juste fleurira,
  - type: text
    content: et la paix sera grande tant que la lune éclairera.
  '8':
  - type: text
    content: Il dominera d'une mer à l'autre,
  - type: text
    content: et de l'Euphrate aux extrémités de la terre.
  '9':
  - type: text
    content: Devant lui les habitants du désert plieront le genou
  - type: text
    content: et ses ennemis lécheront la poussière.
