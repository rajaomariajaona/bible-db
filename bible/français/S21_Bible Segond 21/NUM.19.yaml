document_id: NUM.19
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La vache rousse et l'eau de purification
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Moïse et à Aaron: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Voici ce que prescrit la loi que l''Eternel a donnée: Parle aux Israélites et qu''ils t''amènent une vache rousse sans tache, sans défaut corporel, qui n''ait jamais encore porté de joug'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Joug: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: barre en bois posée sur la nuque des bêtes pour les atteler ensemble.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Vous la remettrez au prêtre Eléazar. Il la fera sortir du camp et on l''égorgera devant lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Le prêtre Eléazar prendra du sang de la vache avec le doigt et il en aspergera 7 fois le devant de la tente de la rencontre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'On brûlera la vache sous ses yeux. On brûlera sa peau, sa viande et son sang, ainsi que ses excréments. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le prêtre prendra du bois de cèdre, de l''hysope et du cramoisi, et il les jettera au milieu des flammes qui brûleront la vache. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le prêtre lavera ses vêtements, il lavera son corps dans l''eau, puis il rentrera dans le camp. Il sera impur jusqu''au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Celui qui aura brûlé la vache lavera ses vêtements et son corps dans l''eau. Il sera impur jusqu''au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Un homme pur rassemblera les cendres de la vache et les déposera à l''extérieur du camp, dans un endroit pur. On les gardera pour l''assemblée des Israélites afin de les utiliser pour faire l''eau de purification. C''est une eau expiatoire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Celui qui aura rassemblé les cendres de la vache lavera ses vêtements. Il sera impur jusqu'au soir. Ce sera une prescription perpétuelle pour les Israélites et pour l'étranger en séjour parmi eux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '»Si quelqu''un touche un cadavre, celui d''un être humain quel qu''il soit, il sera impur pendant 7 jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il se purifiera avec cette eau le troisième et le septième jour, et il sera pur. En revanche, s''il ne se purifie pas le troisième et le septième jour, il ne sera pas pur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Toute personne qui touche un cadavre, celui d'un être humain mort, sans se purifier rend impur le tabernacle de l'Eternel. Elle sera exclue d'Israël. Comme l'eau de purification n'a pas été versée sur elle, elle est impure et son impureté reste sur elle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '»Voici la loi. Lorsqu''un homme mourra dans une tente, toute personne qui entrera dans la tente ou s''y trouvera sera impure pendant 7 jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tout récipient ouvert, sur lequel il n''y a pas de couvercle attaché, sera impur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Toute personne qui touchera dans les champs un homme tué par l''épée ou mort de manière naturelle, des os humains ou un tombeau, sera impure pendant 7 jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'On prendra, pour la personne impure, des cendres de la victime expiatoire qui a été brûlée et on mettra dessus de l''eau vive dans un vase. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Un homme pur prendra de l''hysope et la trempera dans l''eau. Puis il en aspergera la tente, tous les ustensiles, les personnes qui sont là ainsi que la personne qui a touché des os, un homme mort de manière violente ou naturelle ou un tombeau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Celui qui est pur aspergera la personne impure le troisième et le septième jour, et il la purifiera le septième jour. Il lavera ses vêtements, se lavera dans l''eau, et le soir il sera pur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Un homme impur qui ne se purifiera pas sera exclu de l''assemblée, car il rend impur le sanctuaire de l''Eternel. Comme l''eau de purification n''a pas été versée sur lui, il est impur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ce sera pour eux une prescription perpétuelle. Celui qui fera l''aspersion avec l''eau de purification lavera ses vêtements et celui qui touchera l''eau de purification sera impur jusqu''au soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tout ce que touchera la personne impure sera impur et, si quelqu'un la touche, il sera impur jusqu'au soir.»
