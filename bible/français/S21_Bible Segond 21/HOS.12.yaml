document_id: HOS.12,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Israël et son ancêtre Jacob
  - type: text
    content: Ephraïm m'entoure de mensonge,
  - type: text
    content: et la communauté d'Israël de tromperie.
  - type: text
    content: Juda est encore sans frein vis-à-vis de Dieu,
  - type: text
    content: vis-à-vis du Saint fidèle.
  '10':
  - type: text
    content: Et moi, je suis l'Eternel, ton Dieu depuis l'Egypte;
  - type: text
    content: je te ferai encore habiter sous des tentes, comme les jours de fête.
  '11':
  - type: text
    content: J'ai parlé aux prophètes,
  - type: text
    content: j'ai multiplié les visions
  - type: text
    content: et par les prophètes j'ai proposé des paraboles.
  '12':
  - type: text
    content: Si Galaad n'est que trouble, ils seront certainement réduits à rien.
  - type: text
    content: Ils sacrifient des bœufs à Guilgal!
  - type: text
    content: Même leurs autels seront comme des tas de ruines
  - type: text
    content: sur les sillons des champs.
  '13':
  - type: text
    content: Jacob s'est enfui au pays d'Aram,
  - type: text
    content: Israël a servi pour une femme,
  - type: text
    content: et pour une femme il a gardé les troupeaux.
  '14':
  - type: text
    content: Par un prophète l'Eternel a fait sortir Israël d'Egypte,
  - type: text
    content: et par un prophète Israël a été gardé.
  '15':
  - type: text
    content: 'Ephraïm a amèrement irrité l''Eternel:'
  - type: text
    content: son Seigneur rejettera sur lui tout le sang qu'il a versé,
  - type: text
    content: il fera retomber sur lui son mépris.
  '2':
  - type: text
    content: Ephraïm se nourrit de vent et poursuit le vent d'est;
  - type: text
    content: chaque jour il multiplie le mensonge et la violence.
  - type: text
    content: Il fait alliance avec l'Assyrie
  - type: text
    content: et on porte de l'huile en Egypte.
  '3':
  - type: text
    content: L'Eternel est aussi en procès avec Juda,
  - type: text
    content: et il interviendra contre Jacob en fonction de sa conduite,
  - type: text
    content: il lui paiera un salaire conforme à ses agissements.
  '4':
  - type: text
    content: Dans le ventre maternel, Jacob a attrapé son frère par le talon
  - type: text
    content: et, devenu homme, il a lutté avec Dieu.
  '5':
  - type: text
    content: Il a lutté avec l'ange, et il a été vainqueur,
  - type: text
    content: il a pleuré et lui a adressé des supplications.
  - type: text
    content: Jacob l'avait trouvé à Béthel,
  - type: text
    content: et c'est là que Dieu nous a parlé.
  '6':
  - type: text
    content: L'Eternel est le Dieu de l'univers;
  - type: text
    content: son nom est l'Eternel.
  '7':
  - type: text
    content: Et toi, reviens à ton Dieu,
  - type: text
    content: garde la bonté et la justice,
  - type: text
    content: et espère toujours en ton Dieu!
  '8':
  - type: text
    content: 'Ephraïm est un marchand qui a dans sa main des balances fausses:'
  - type: text
    content: il aime tromper
  '9':
  - type: text
    content: 'et il dit: «En vérité, je me suis enrichi,'
  - type: text
    content: j'ai acquis de la fortune,
  - type: text
    content: mais c'est entièrement le produit de mon travail.
  - type: text
    content: On ne trouvera chez moi aucune faute, rien qui soit un péché.»
