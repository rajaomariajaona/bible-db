document_id: HOS.12,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Israël et son ancêtre Jacob
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraïm m'entoure de mensonge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la communauté d'Israël de tromperie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Juda est encore sans frein vis-à-vis de Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vis-à-vis du Saint fidèle.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et moi, je suis l'Eternel, ton Dieu depuis l'Egypte;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te ferai encore habiter sous des tentes, comme les jours de fête.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'ai parlé aux prophètes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'ai multiplié les visions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et par les prophètes j'ai proposé des paraboles.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si Galaad n'est que trouble, ils seront certainement réduits à rien.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sacrifient des bœufs à Guilgal!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Même leurs autels seront comme des tas de ruines
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur les sillons des champs.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jacob s'est enfui au pays d'Aram,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël a servi pour une femme,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour une femme il a gardé les troupeaux.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Par un prophète l'Eternel a fait sortir Israël d'Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et par un prophète Israël a été gardé.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ephraïm a amèrement irrité l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: son Seigneur rejettera sur lui tout le sang qu'il a versé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il fera retomber sur lui son mépris.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraïm se nourrit de vent et poursuit le vent d'est;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: chaque jour il multiplie le mensonge et la violence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fait alliance avec l'Assyrie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et on porte de l'huile en Egypte.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel est aussi en procès avec Juda,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il interviendra contre Jacob en fonction de sa conduite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il lui paiera un salaire conforme à ses agissements.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans le ventre maternel, Jacob a attrapé son frère par le talon
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et, devenu homme, il a lutté avec Dieu.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a lutté avec l'ange, et il a été vainqueur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a pleuré et lui a adressé des supplications.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jacob l'avait trouvé à Béthel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c'est là que Dieu nous a parlé.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel est le Dieu de l'univers;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: son nom est l'Eternel.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et toi, reviens à ton Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: garde la bonté et la justice,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et espère toujours en ton Dieu!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ephraïm est un marchand qui a dans sa main des balances fausses:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il aime tromper
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et il dit: «En vérité, je me suis enrichi,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: j'ai acquis de la fortune,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais c'est entièrement le produit de mon travail.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On ne trouvera chez moi aucune faute, rien qui soit un péché.»
