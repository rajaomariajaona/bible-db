document_id: HOS.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israël et son ancêtre Jacob
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Ephraïm m'entoure de mensonge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la communauté d'Israël de tromperie.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Juda est encore sans frein vis-à-vis de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vis-à-vis du Saint fidèle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ephraïm se nourrit de vent et poursuit le vent d'est;
- type: usfm
  marker: q1
  children:
  - type: text
    text: chaque jour il multiplie le mensonge et la violence.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il fait alliance avec l'Assyrie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et on porte de l'huile en Egypte.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: L'Eternel est aussi en procès avec Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il interviendra contre Jacob en fonction de sa conduite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il lui paiera un salaire conforme à ses agissements.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Dans le ventre maternel, Jacob a attrapé son frère par le talon
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, devenu homme, il a lutté avec Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il a lutté avec l'ange, et il a été vainqueur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a pleuré et lui a adressé des supplications.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Jacob l'avait trouvé à Béthel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c'est là que Dieu nous a parlé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: L'Eternel est le Dieu de l'univers;
- type: usfm
  marker: q1
  children:
  - type: text
    text: son nom est l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Et toi, reviens à ton Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: garde la bonté et la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et espère toujours en ton Dieu!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ephraïm est un marchand qui a dans sa main des balances fausses:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il aime tromper
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'et il dit: «En vérité, je me suis enrichi,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ai acquis de la fortune,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais c'est entièrement le produit de mon travail.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On ne trouvera chez moi aucune faute, rien qui soit un péché.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Et moi, je suis l'Eternel, ton Dieu depuis l'Egypte;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je te ferai encore habiter sous des tentes, comme les jours de fête.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: J'ai parlé aux prophètes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ai multiplié les visions
- type: usfm
  marker: q1
  children:
  - type: text
    text: et par les prophètes j'ai proposé des paraboles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Si Galaad n'est que trouble, ils seront certainement réduits à rien.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils sacrifient des bœufs à Guilgal!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Même leurs autels seront comme des tas de ruines
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur les sillons des champs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Jacob s'est enfui au pays d'Aram,
- type: usfm
  marker: q1
  children:
  - type: text
    text: Israël a servi pour une femme,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour une femme il a gardé les troupeaux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Par un prophète l'Eternel a fait sortir Israël d'Egypte,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et par un prophète Israël a été gardé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ephraïm a amèrement irrité l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: son Seigneur rejettera sur lui tout le sang qu'il a versé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il fera retomber sur lui son mépris.
