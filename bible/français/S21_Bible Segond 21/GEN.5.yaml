document_id: GEN.5,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Histoire de Noé
  - type: heading
    content: 5.1–11.9
  - type: heading
    content: Descendance d'Adam par Seth jusqu'à Noé
  - type: text
    content: 'Voici le livre de l''histoire d''Adam. Lorsque Dieu créa l''homme, il le fit à la ressemblance de Dieu. '
  '10':
  - type: text
    content: 'Enosh vécut 815 ans après la naissance de Kénan et il eut des fils et des filles. '
  '11':
  - type: text
    content: Enosh vécut en tout 905 ans, puis il mourut.
  '12':
  - type: text
    content: 'A l''âge de 70 ans, Kénan eut pour fils Mahalaleel. '
  '13':
  - type: text
    content: 'Kénan vécut 840 ans après la naissance de Mahalaleel et il eut des fils et des filles. '
  '14':
  - type: text
    content: Kénan vécut en tout 910 ans, puis il mourut.
  '15':
  - type: text
    content: 'A l''âge de 65 ans, Mahalaleel eut pour fils Jéred. '
  '16':
  - type: text
    content: 'Mahalaleel vécut 830 ans après la naissance de Jéred et il eut des fils et des filles. '
  '17':
  - type: text
    content: Mahalaleel vécut en tout 895 ans, puis il mourut.
  '18':
  - type: text
    content: 'A l''âge de 162 ans, Jéred eut pour fils Hénoc. '
  '19':
  - type: text
    content: 'Jéred vécut 800 ans après la naissance d''Hénoc et il eut des fils et des filles. '
  '2':
  - type: text
    content: '*Il créa l''homme et la femme'
  - type: note
    content: 'Il créa… femme: reprise de 1.27 (voir la note).'
  - type: text
    content: ' et les bénit. Il les appela êtres humains lorsqu''ils furent créés.'
  '20':
  - type: text
    content: Jéred vécut en tout 962 ans, puis il mourut.
  '21':
  - type: text
    content: 'A l''âge de 65 ans, Hénoc eut pour fils Metushélah. '
  '22':
  - type: text
    content: 'Hénoc marcha avec Dieu 300 ans après la naissance de Metushélah et il eut des fils et des filles. '
  '23':
  - type: text
    content: 'Hénoc vécut en tout 365 ans. '
  '24':
  - type: text
    content: Hénoc marcha avec Dieu, puis *il ne fut plus là, parce que Dieu l'avait pris
  - type: note
    content: 'Il ne fut… pris: cité en Hébreux 11.5.'
  - type: text
    content: .
  '25':
  - type: text
    content: 'A l''âge de 187 ans, Metushélah eut pour fils Lémec. '
  '26':
  - type: text
    content: 'Metushélah vécut 782 ans après la naissance de Lémec et il eut des fils et des filles. '
  '27':
  - type: text
    content: Metushélah vécut en tout 969 ans, puis il mourut.
  '28':
  - type: text
    content: 'A l''âge de 182 ans, Lémec eut un fils. '
  '29':
  - type: text
    content: Il l'appela Noé
  - type: note
    content: 'Noé: littéralement repos.'
  - type: text
    content: ' en disant: «Celui-ci nous consolera de notre travail et de la peine que ce sol procure à nos mains parce que l''Eternel l''a maudit.» '
  '3':
  - type: text
    content: 'A l''âge de 130 ans, Adam eut un fils à sa ressemblance, à son image, et il l''appela Seth. '
  '30':
  - type: text
    content: 'Lémec vécut 595 ans après la naissance de Noé et il eut des fils et des filles. '
  '31':
  - type: text
    content: Lémec vécut en tout 777 ans, puis il mourut.
  '32':
  - type: text
    content: Noé était âgé de 500 ans quand il eut Sem, Cham et Japhet.
  '4':
  - type: text
    content: 'Adam vécut 800 ans après la naissance de Seth et il eut des fils et des filles. '
  '5':
  - type: text
    content: Adam vécut en tout 930 ans, puis il mourut.
  '6':
  - type: text
    content: 'A l''âge de 105 ans, Seth eut pour fils Enosh. '
  '7':
  - type: text
    content: 'Seth vécut 807 ans après la naissance d''Enosh et il eut des fils et des filles. '
  '8':
  - type: text
    content: Seth vécut en tout 912 ans, puis il mourut.
  '9':
  - type: text
    content: 'A l''âge de 90 ans, Enosh eut pour fils Kénan. '
