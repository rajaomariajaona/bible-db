document_id: GEN.5
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Histoire de Noé
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 5.1–11.9
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Descendance d'Adam par Seth jusqu'à Noé
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici le livre de l''histoire d''Adam. Lorsque Dieu créa l''homme, il le fit à la ressemblance de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '*Il créa l''homme et la femme'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il créa… femme: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'reprise de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '1.27'
      metadata:
        usfm: GEN.1.27
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (voir la note).'
    marker-yv: yv-n
  - type: text
    text: ' et les bénit. Il les appela êtres humains lorsqu''ils furent créés.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'A l''âge de 130 ans, Adam eut un fils à sa ressemblance, à son image, et il l''appela Seth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Adam vécut 800 ans après la naissance de Seth et il eut des fils et des filles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Adam vécut en tout 930 ans, puis il mourut.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'A l''âge de 105 ans, Seth eut pour fils Enosh. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Seth vécut 807 ans après la naissance d''Enosh et il eut des fils et des filles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Seth vécut en tout 912 ans, puis il mourut.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'A l''âge de 90 ans, Enosh eut pour fils Kénan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Enosh vécut 815 ans après la naissance de Kénan et il eut des fils et des filles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Enosh vécut en tout 905 ans, puis il mourut.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'A l''âge de 70 ans, Kénan eut pour fils Mahalaleel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Kénan vécut 840 ans après la naissance de Mahalaleel et il eut des fils et des filles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Kénan vécut en tout 910 ans, puis il mourut.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'A l''âge de 65 ans, Mahalaleel eut pour fils Jéred. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Mahalaleel vécut 830 ans après la naissance de Jéred et il eut des fils et des filles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Mahalaleel vécut en tout 895 ans, puis il mourut.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'A l''âge de 162 ans, Jéred eut pour fils Hénoc. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jéred vécut 800 ans après la naissance d''Hénoc et il eut des fils et des filles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Jéred vécut en tout 962 ans, puis il mourut.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'A l''âge de 65 ans, Hénoc eut pour fils Metushélah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hénoc marcha avec Dieu 300 ans après la naissance de Metushélah et il eut des fils et des filles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Hénoc vécut en tout 365 ans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Hénoc marcha avec Dieu, puis *il ne fut plus là, parce que Dieu l'avait pris
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il ne fut… pris: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Hébreux 11.5
      metadata:
        usfm: HEB.11.5
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'A l''âge de 187 ans, Metushélah eut pour fils Lémec. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Metushélah vécut 782 ans après la naissance de Lémec et il eut des fils et des filles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Metushélah vécut en tout 969 ans, puis il mourut.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'A l''âge de 182 ans, Lémec eut un fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Il l'appela Noé
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Noé: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: littéralement repos.
    marker-yv: yv-n
  - type: text
    text: ' en disant: «Celui-ci nous consolera de notre travail et de la peine que ce sol procure à nos mains parce que l''Eternel l''a maudit.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Lémec vécut 595 ans après la naissance de Noé et il eut des fils et des filles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Lémec vécut en tout 777 ans, puis il mourut.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Noé était âgé de 500 ans quand il eut Sem, Cham et Japhet.
