document_id: JHN.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus et la femme samaritaine
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le Seigneur apprit que les pharisiens avaient entendu dire qu''il faisait et baptisait plus de disciples que Jean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '– A vrai dire Jésus ne baptisait pas lui-même, mais c''étaient ses disciples qui le faisaient. – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors il quitta la Judée et retourna en Galilée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Comme il devait traverser la Samarie, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'il arriva dans une ville de Samarie appelée Sychar, près du champ que Jacob avait donné à son fils Joseph. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Là se trouvait le puits de Jacob. Jésus, fatigué du voyage, était assis au bord du puits. C'était environ midi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Une femme de Samarie vint puiser de l''eau. Jésus lui dit: «Donne-moi à boire.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'En effet, ses disciples étaient allés à la ville pour acheter de quoi manger. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'La femme samaritaine lui dit: «Comment? Toi qui es juif, tu me demandes à boire, à moi qui suis une femme samaritaine?» - Les Juifs, en effet, n''ont pas de relations avec les Samaritains. - '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Jésus lui répondit: «Si tu savais quel est le cadeau de Dieu et qui est celui qui te dit: ‘Donne-moi à boire’, tu lui aurais toi-même demandé à boire et il t''aurait donné de l''eau vive.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '«Seigneur, lui dit la femme, tu n''as rien pour puiser et le puits est profond. D''où aurais-tu donc cette eau vive? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Es-tu, toi, plus grand que notre ancêtre Jacob qui nous a donné ce puits et qui a bu de son eau, lui-même, ses fils et ses troupeaux?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jésus lui répondit: «Toute personne qui boit de cette eau-ci aura encore soif. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'En revanche, celui qui boira de l''eau que je lui donnerai n''aura plus jamais soif et l''eau que je lui donnerai deviendra en lui une source d''eau qui jaillira jusque dans la vie éternelle.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'La femme lui dit: «Seigneur, donne-moi cette eau afin que je n''aie plus soif et que je n''aie plus à venir puiser ici.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '«Va appeler ton mari, lui dit Jésus, et reviens ici.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'La femme répondit: «Je n''ai pas de mari.» Jésus lui dit: «Tu as bien fait de dire: ‘Je n''ai pas de mari’, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'car tu as eu cinq maris et l''homme que tu as maintenant n''est pas ton mari. En cela tu as dit la vérité.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '«Seigneur, lui dit la femme, je vois que tu es un prophète. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Nos ancêtres ont adoré sur cette montagne et vous dites, vous, que l''endroit où il faut adorer est à Jérusalem.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '«Femme, lui dit Jésus, crois-moi, l''heure vient où ce ne sera ni sur cette montagne ni à Jérusalem que vous adorerez le Père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Vous adorez ce que vous ne connaissez pas; nous, nous adorons ce que nous connaissons, car le salut vient des Juifs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mais l''heure vient, et elle est déjà là, où les vrais adorateurs adoreront le Père en esprit et en vérité. En effet, ce sont là les adorateurs que recherche le Père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dieu est Esprit et il faut que ceux qui l''adorent l''adorent en esprit et en vérité.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'La femme lui dit: «Je sais que le Messie doit venir, celui que l''on appelle Christ. Quand il sera venu, il nous annoncera tout.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jésus lui dit: «Je le suis, moi qui te parle.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Là-dessus arrivèrent ses disciples, et ils étaient étonnés de ce qu''il parlait avec une femme. Toutefois, aucun ne dit: «Que lui demandes-tu?» ou: «Pourquoi parles-tu avec elle?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Alors la femme laissa sa cruche, s''en alla dans la ville et dit aux habitants: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '«Venez voir un homme qui m''a dit [tout] ce que j''ai fait. Ne serait-il pas le Messie?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ils sortirent de la ville et vinrent vers lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Pendant ce temps, les disciples le pressaient en disant: «Maître, mange.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Mais il leur dit: «J''ai à manger une nourriture que vous ne connaissez pas.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Les disciples se disaient donc les uns aux autres: «Quelqu''un lui aurait-il apporté à manger?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Jésus leur dit: «Ma nourriture est de faire la volonté de celui qui m''a envoyé et d''accomplir son œuvre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ne dites-vous pas qu''il y a encore quatre mois jusqu''à la moisson? Eh bien, je vous le dis, levez les yeux et regardez les champs: ils sont déjà blancs pour la moisson. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Celui qui moissonne reçoit un salaire et amasse du fruit pour la vie éternelle, afin que celui qui sème et celui qui moissonne se réjouissent ensemble. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'En effet, en cela cette parole est vraie: ‘L''un sème et l''autre moissonne.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Je vous ai envoyés récolter une moisson qui ne vous a pas demandé de travail; d'autres ont travaillé et vous êtes entrés dans leur travail.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Beaucoup de Samaritains de cette ville crurent en Jésus à cause des paroles de la femme qui rendait ce témoignage: «Il m''a dit tout ce que j''ai fait.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Ainsi donc, quand ils vinrent le trouver, les Samaritains le prièrent de rester avec eux. Il resta là deux jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Un bien plus grand nombre crurent à cause des paroles de Jésus, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'et ils disaient à la femme: «Ce n''est plus seulement à cause de ce que tu as dit que nous croyons, car nous l''avons entendu nous-mêmes et nous savons qu''il est vraiment [le Messie,] le Sauveur du monde.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guérison du fils d'un officier
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Après ces deux jours, Jésus partit de là pour se rendre en Galilée, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'car il avait déclaré lui-même qu''un prophète n''est pas honoré dans sa propre patrie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Lorsqu''il arriva en Galilée, il fut bien accueilli par les Galiléens qui avaient vu tout ce qu''il avait fait à Jérusalem pendant la fête. En effet, eux aussi étaient allés à la fête. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Jésus retourna donc à Cana en Galilée, où il avait changé l''eau en vin. Il y avait à Capernaüm un officier du roi dont le fils était malade. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Quand il apprit que Jésus était venu de Judée en Galilée, il alla le trouver et le pria de descendre guérir son fils, car il était sur le point de mourir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Jésus lui dit: «Si vous ne voyez pas des signes et des prodiges, vous ne croirez donc pas?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'L''officier du roi lui dit: «Seigneur, descends avant que mon enfant ne meure!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: '«Vas-y, lui dit Jésus, ton fils vit.» Cet homme crut à la parole que Jésus lui avait dite et s''en alla. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Il était déjà en train de redescendre lorsque ses serviteurs vinrent à sa rencontre et lui dirent: «Ton enfant vit.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Il leur demanda à quelle heure il était allé mieux et ils lui dirent: «C''est hier, à une heure de l''après-midi, que la fièvre l''a quitté.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Le père reconnut que c''était à cette heure-là que Jésus lui avait dit: «Ton fils vit.» Alors il crut, lui et toute sa famille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Jésus fit ce deuxième signe miraculeux après être revenu de Judée en Galilée.
