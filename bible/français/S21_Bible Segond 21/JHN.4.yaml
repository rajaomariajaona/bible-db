document_id: JHN.4,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus et la femme samaritaine
  - type: text
    content: 'Le Seigneur apprit que les pharisiens avaient entendu dire qu''il faisait et baptisait plus de disciples que Jean. '
  '10':
  - type: text
    content: 'Jésus lui répondit: «Si tu savais quel est le cadeau de Dieu et qui est celui qui te dit: ‘Donne-moi à boire’, tu lui aurais toi-même demandé à boire et il t''aurait donné de l''eau vive.» '
  '11':
  - type: text
    content: '«Seigneur, lui dit la femme, tu n''as rien pour puiser et le puits est profond. D''où aurais-tu donc cette eau vive? '
  '12':
  - type: text
    content: 'Es-tu, toi, plus grand que notre ancêtre Jacob qui nous a donné ce puits et qui a bu de son eau, lui-même, ses fils et ses troupeaux?» '
  '13':
  - type: text
    content: 'Jésus lui répondit: «Toute personne qui boit de cette eau-ci aura encore soif. '
  '14':
  - type: text
    content: 'En revanche, celui qui boira de l''eau que je lui donnerai n''aura plus jamais soif et l''eau que je lui donnerai deviendra en lui une source d''eau qui jaillira jusque dans la vie éternelle.» '
  '15':
  - type: text
    content: 'La femme lui dit: «Seigneur, donne-moi cette eau afin que je n''aie plus soif et que je n''aie plus à venir puiser ici.» '
  '16':
  - type: text
    content: '«Va appeler ton mari, lui dit Jésus, et reviens ici.» '
  '17':
  - type: text
    content: 'La femme répondit: «Je n''ai pas de mari.» Jésus lui dit: «Tu as bien fait de dire: ‘Je n''ai pas de mari’, '
  '18':
  - type: text
    content: 'car tu as eu cinq maris et l''homme que tu as maintenant n''est pas ton mari. En cela tu as dit la vérité.» '
  '19':
  - type: text
    content: '«Seigneur, lui dit la femme, je vois que tu es un prophète. '
  '2':
  - type: text
    content: '– A vrai dire Jésus ne baptisait pas lui-même, mais c''étaient ses disciples qui le faisaient. – '
  '20':
  - type: text
    content: 'Nos ancêtres ont adoré sur cette montagne et vous dites, vous, que l''endroit où il faut adorer est à Jérusalem.» '
  '21':
  - type: text
    content: '«Femme, lui dit Jésus, crois-moi, l''heure vient où ce ne sera ni sur cette montagne ni à Jérusalem que vous adorerez le Père. '
  '22':
  - type: text
    content: 'Vous adorez ce que vous ne connaissez pas; nous, nous adorons ce que nous connaissons, car le salut vient des Juifs. '
  '23':
  - type: text
    content: 'Mais l''heure vient, et elle est déjà là, où les vrais adorateurs adoreront le Père en esprit et en vérité. En effet, ce sont là les adorateurs que recherche le Père. '
  '24':
  - type: text
    content: 'Dieu est Esprit et il faut que ceux qui l''adorent l''adorent en esprit et en vérité.» '
  '25':
  - type: text
    content: 'La femme lui dit: «Je sais que le Messie doit venir, celui que l''on appelle Christ. Quand il sera venu, il nous annoncera tout.» '
  '26':
  - type: text
    content: 'Jésus lui dit: «Je le suis, moi qui te parle.»'
  '27':
  - type: text
    content: 'Là-dessus arrivèrent ses disciples, et ils étaient étonnés de ce qu''il parlait avec une femme. Toutefois, aucun ne dit: «Que lui demandes-tu?» ou: «Pourquoi parles-tu avec elle?» '
  '28':
  - type: text
    content: 'Alors la femme laissa sa cruche, s''en alla dans la ville et dit aux habitants: '
  '29':
  - type: text
    content: '«Venez voir un homme qui m''a dit [tout] ce que j''ai fait. Ne serait-il pas le Messie?» '
  '3':
  - type: text
    content: 'Alors il quitta la Judée et retourna en Galilée. '
  '30':
  - type: text
    content: Ils sortirent de la ville et vinrent vers lui.
  '31':
  - type: text
    content: 'Pendant ce temps, les disciples le pressaient en disant: «Maître, mange.» '
  '32':
  - type: text
    content: 'Mais il leur dit: «J''ai à manger une nourriture que vous ne connaissez pas.» '
  '33':
  - type: text
    content: 'Les disciples se disaient donc les uns aux autres: «Quelqu''un lui aurait-il apporté à manger?» '
  '34':
  - type: text
    content: 'Jésus leur dit: «Ma nourriture est de faire la volonté de celui qui m''a envoyé et d''accomplir son œuvre. '
  '35':
  - type: text
    content: 'Ne dites-vous pas qu''il y a encore quatre mois jusqu''à la moisson? Eh bien, je vous le dis, levez les yeux et regardez les champs: ils sont déjà blancs pour la moisson. '
  '36':
  - type: text
    content: 'Celui qui moissonne reçoit un salaire et amasse du fruit pour la vie éternelle, afin que celui qui sème et celui qui moissonne se réjouissent ensemble. '
  '37':
  - type: text
    content: 'En effet, en cela cette parole est vraie: ‘L''un sème et l''autre moissonne.’ '
  '38':
  - type: text
    content: Je vous ai envoyés récolter une moisson qui ne vous a pas demandé de travail; d'autres ont travaillé et vous êtes entrés dans leur travail.»
  '39':
  - type: text
    content: 'Beaucoup de Samaritains de cette ville crurent en Jésus à cause des paroles de la femme qui rendait ce témoignage: «Il m''a dit tout ce que j''ai fait.» '
  '4':
  - type: text
    content: 'Comme il devait traverser la Samarie, '
  '40':
  - type: text
    content: 'Ainsi donc, quand ils vinrent le trouver, les Samaritains le prièrent de rester avec eux. Il resta là deux jours. '
  '41':
  - type: text
    content: 'Un bien plus grand nombre crurent à cause des paroles de Jésus, '
  '42':
  - type: text
    content: 'et ils disaient à la femme: «Ce n''est plus seulement à cause de ce que tu as dit que nous croyons, car nous l''avons entendu nous-mêmes et nous savons qu''il est vraiment [le Messie,] le Sauveur du monde.»'
  - type: heading
    content: Guérison du fils d'un officier
  '43':
  - type: text
    content: 'Après ces deux jours, Jésus partit de là pour se rendre en Galilée, '
  '44':
  - type: text
    content: 'car il avait déclaré lui-même qu''un prophète n''est pas honoré dans sa propre patrie. '
  '45':
  - type: text
    content: 'Lorsqu''il arriva en Galilée, il fut bien accueilli par les Galiléens qui avaient vu tout ce qu''il avait fait à Jérusalem pendant la fête. En effet, eux aussi étaient allés à la fête. '
  '46':
  - type: text
    content: 'Jésus retourna donc à Cana en Galilée, où il avait changé l''eau en vin. Il y avait à Capernaüm un officier du roi dont le fils était malade. '
  '47':
  - type: text
    content: 'Quand il apprit que Jésus était venu de Judée en Galilée, il alla le trouver et le pria de descendre guérir son fils, car il était sur le point de mourir. '
  '48':
  - type: text
    content: 'Jésus lui dit: «Si vous ne voyez pas des signes et des prodiges, vous ne croirez donc pas?» '
  '49':
  - type: text
    content: 'L''officier du roi lui dit: «Seigneur, descends avant que mon enfant ne meure!» '
  '5':
  - type: text
    content: 'il arriva dans une ville de Samarie appelée Sychar, près du champ que Jacob avait donné à son fils Joseph. '
  '50':
  - type: text
    content: '«Vas-y, lui dit Jésus, ton fils vit.» Cet homme crut à la parole que Jésus lui avait dite et s''en alla. '
  '51':
  - type: text
    content: 'Il était déjà en train de redescendre lorsque ses serviteurs vinrent à sa rencontre et lui dirent: «Ton enfant vit.» '
  '52':
  - type: text
    content: 'Il leur demanda à quelle heure il était allé mieux et ils lui dirent: «C''est hier, à une heure de l''après-midi, que la fièvre l''a quitté.» '
  '53':
  - type: text
    content: 'Le père reconnut que c''était à cette heure-là que Jésus lui avait dit: «Ton fils vit.» Alors il crut, lui et toute sa famille. '
  '54':
  - type: text
    content: Jésus fit ce deuxième signe miraculeux après être revenu de Judée en Galilée.
  '6':
  - type: text
    content: Là se trouvait le puits de Jacob. Jésus, fatigué du voyage, était assis au bord du puits. C'était environ midi.
  '7':
  - type: text
    content: 'Une femme de Samarie vint puiser de l''eau. Jésus lui dit: «Donne-moi à boire.» '
  '8':
  - type: text
    content: 'En effet, ses disciples étaient allés à la ville pour acheter de quoi manger. '
  '9':
  - type: text
    content: 'La femme samaritaine lui dit: «Comment? Toi qui es juif, tu me demandes à boire, à moi qui suis une femme samaritaine?» - Les Juifs, en effet, n''ont pas de relations avec les Samaritains. - '
