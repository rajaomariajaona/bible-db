document_id: 2CH.5,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Transport de l'arche
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi fut terminé tout le travail que Salomon avait fait faire pour la maison de l'Eternel. Il apporta ce que son père David avait consacré, l'argent, l'or et tous les ustensiles, et le déposa dans les trésors de la maison de Dieu.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il n'y avait dans l'arche que les deux tables que Moïse y avait déposées à Horeb, lorsque l'Eternel avait fait alliance avec les Israélites, à leur sortie d'Egypte.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les prêtres sortirent du lieu saint. – En effet, tous les prêtres présents s''étaient consacrés sans tenir compte de l''ordre des classes. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les Lévites qui étaient musiciens, Asaph, Héman, Jeduthun, leurs fils et leurs frères se tenaient, habillés de fin lin, à l''est de l''autel avec des cymbales, des luths et des harpes. Il y avait avec eux 120 prêtres chargés de sonner de la trompette. – '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A ce moment-là, ceux qui sonnaient de la trompette et ceux qui chantaient, s''unissant d''un même accord pour célébrer et louer l''Eternel, firent retentir les trompettes, les cymbales et les autres instruments, et ils célébrèrent l''Eternel par ces paroles: «Il est bon, oui, sa bonté dure éternellement!» Alors le temple, la maison de l''Eternel, fut rempli d''une nuée. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les prêtres ne purent pas reprendre leur service à cause de la nuée. La gloire de l'Eternel remplissait en effet la maison de Dieu.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Alors Salomon rassembla à Jérusalem les anciens d'Israël et tous les chefs des tribus, les chefs de famille des Israélites, pour déplacer l'arche de l'alliance de l'Eternel depuis la ville de David, c'est-à-dire Sion.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tous les hommes d'Israël se réunirent auprès du roi pour la fête des tentes, qui se célèbre le septième mois.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque tous les anciens d''Israël furent arrivés, les Lévites portèrent l''arche. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils transportèrent l''arche, la tente de la rencontre ainsi que tous les ustensiles sacrés qui étaient dans la tente. Ce furent les prêtres et les Lévites qui les transportèrent. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi Salomon et toute l''assemblée d''Israël convoquée auprès de lui se tinrent devant l''arche. Ils sacrifièrent des brebis et des bœufs, en si grand nombre qu''ils ne purent être ni comptés ni recensés. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les prêtres amenèrent l''arche de l''alliance de l''Eternel à sa place, dans le sanctuaire du temple, dans le lieu très saint, sous les ailes des chérubins. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les chérubins avaient les ailes étendues sur l''emplacement occupé par l''arche et ils couvraient le coffre et ses barres. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On avait donné aux barres une longueur telle que leurs extrémités se voyaient à une certaine distance de l''arche, devant le sanctuaire, mais pas de l''extérieur. Telle a été la place de l''arche jusqu''à aujourd''hui. '
