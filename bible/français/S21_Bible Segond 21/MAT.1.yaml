document_id: MAT.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Naissance de Jésus et début de son ministère
  - type: heading
    content: 1.1–4.25
  - type: heading
    content: Généalogie et naissance de Jésus-Christ
  - type: text
    content: 'Voici la généalogie de Jésus-Christ, fils de David, fils d''Abraham. '
  '10':
  - type: text
    content: 'Ezéchias eut pour fils Manassé; Manassé eut Amon; Amon eut Josias; '
  '11':
  - type: text
    content: Josias eut pour descendants Jéconias et ses frères, à l'époque de la déportation à Babylone.
  '12':
  - type: text
    content: 'Après la déportation à Babylone, Jéconias eut pour fils Shealthiel; Shealthiel eut Zorobabel; '
  '13':
  - type: text
    content: 'Zorobabel eut pour fils Abiud; Abiud eut Eliakim; Eliakim eut Azor; '
  '14':
  - type: text
    content: 'Azor eut pour fils Sadok; Sadok eut Achim; Achim eut Eliud; '
  '15':
  - type: text
    content: 'Eliud eut pour fils Eléazar; Eléazar eut Matthan; Matthan eut Jacob; '
  '16':
  - type: text
    content: Jacob eut pour fils Joseph, l'époux de Marie, de laquelle est né Jésus, qu'on appelle le Christ
  - type: note
    content: 'Le Christ: c''est-à-dire l''oint de Dieu ou le Messie que les Juifs attendaient et qui, d''après l''Ancien Testament, devait apporter la délivrance et exercer une autorité universelle.'
  - type: text
    content: .
  '17':
  - type: text
    content: Il y a donc en tout 14 générations depuis Abraham jusqu'à David, 14 générations depuis David jusqu'à la déportation à Babylone et 14 générations depuis la déportation à Babylone jusqu'au Christ.
  '18':
  - type: text
    content: 'Voici de quelle manière arriva la naissance de Jésus-Christ. Marie, sa mère, était fiancée à Joseph; or, avant qu''ils aient habité ensemble, elle se trouva enceinte par l''action du Saint-Esprit. '
  '19':
  - type: text
    content: 'Joseph, son fiancé, qui était un homme juste et qui ne voulait pas l''exposer au déshonneur, se proposa de rompre secrètement avec elle. '
  '2':
  - type: text
    content: 'Abraham eut pour fils Isaac; Isaac eut Jacob; Jacob eut Juda et ses frères; '
  '20':
  - type: text
    content: 'Comme il y pensait, un ange du Seigneur lui apparut dans un rêve et dit: «Joseph, descendant de David, n''aie pas peur de prendre Marie pour femme, car l''enfant qu''elle porte vient du Saint-Esprit. '
  '21':
  - type: text
    content: Elle mettra au monde un fils et tu lui donneras le nom de Jésus
  - type: note
    content: 'Jésus: nom qui signifie l''Eternel sauve, l''Eternel délivre.'
  - type: text
    content: ' car c''est lui qui sauvera son peuple de ses péchés.»'
  '22':
  - type: text
    content: 'Tout cela arriva afin que s''accomplisse ce que le Seigneur avait annoncé par le prophète: '
  '23':
  - type: text
    content: La vierge sera enceinte, elle mettra au monde un fils et on l'appellera Emmanuel
  - type: note
    content: 'La vierge… Emmanuel: citation d''Esaïe 7.14 (8e siècle av. J.-C.).'
  - type: text
    content: ', ce qui signifie «Dieu avec nous».'
  '24':
  - type: text
    content: 'A son réveil, Joseph fit ce que l''ange du Seigneur lui avait ordonné et il prit sa femme chez lui, '
  '25':
  - type: text
    content: mais il n'eut pas de relations conjugales avec elle jusqu'à ce qu'elle ait mis au monde un fils [premier-né] auquel il donna le nom de Jésus.
  '3':
  - type: text
    content: 'Juda eut Pérets et Zérach de Tamar; Pérets eut Hetsrom; Hetsrom eut Aram; '
  '4':
  - type: text
    content: 'Aram eut pour fils Aminadab; Aminadab eut Nachshon; Nachshon eut Salmon; '
  '5':
  - type: text
    content: 'Salmon eut Boaz de Rahab; Boaz eut Obed de Ruth; '
  '6':
  - type: text
    content: Obed eut pour fils Isaï; Isaï eut David.
  - type: text
    content: 'Le roi David eut Salomon de la femme d''Urie; '
  '7':
  - type: text
    content: 'Salomon eut pour fils Roboam; Roboam eut Abija; Abija eut Asa; '
  '8':
  - type: text
    content: 'Asa eut pour fils Josaphat; Josaphat eut Joram; Joram eut Ozias; '
  '9':
  - type: text
    content: 'Ozias eut pour fils Jotham; Jotham eut Achaz; Achaz eut Ezéchias; '
