document_id: MAT.1,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Naissance de Jésus et début de son ministère
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 1.1–4.25
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Généalogie et naissance de Jésus-Christ
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici la généalogie de Jésus-Christ, fils de David, fils d''Abraham. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ezéchias eut pour fils Manassé; Manassé eut Amon; Amon eut Josias; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Josias eut pour descendants Jéconias et ses frères, à l'époque de la déportation à Babylone.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après la déportation à Babylone, Jéconias eut pour fils Shealthiel; Shealthiel eut Zorobabel; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Zorobabel eut pour fils Abiud; Abiud eut Eliakim; Eliakim eut Azor; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Azor eut pour fils Sadok; Sadok eut Achim; Achim eut Eliud; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Eliud eut pour fils Eléazar; Eléazar eut Matthan; Matthan eut Jacob; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Jacob eut pour fils Joseph, l'époux de Marie, de laquelle est né Jésus, qu'on appelle le Christ
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le Christ: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire l'oint de Dieu ou le Messie que les Juifs attendaient et qui, d'après l'Ancien Testament, devait apporter la délivrance et exercer une autorité universelle.
      marker-yv: yv-n
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il y a donc en tout 14 générations depuis Abraham jusqu'à David, 14 générations depuis David jusqu'à la déportation à Babylone et 14 générations depuis la déportation à Babylone jusqu'au Christ.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici de quelle manière arriva la naissance de Jésus-Christ. Marie, sa mère, était fiancée à Joseph; or, avant qu''ils aient habité ensemble, elle se trouva enceinte par l''action du Saint-Esprit. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Joseph, son fiancé, qui était un homme juste et qui ne voulait pas l''exposer au déshonneur, se proposa de rompre secrètement avec elle. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abraham eut pour fils Isaac; Isaac eut Jacob; Jacob eut Juda et ses frères; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme il y pensait, un ange du Seigneur lui apparut dans un rêve et dit: «Joseph, descendant de David, n''aie pas peur de prendre Marie pour femme, car l''enfant qu''elle porte vient du Saint-Esprit. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elle mettra au monde un fils et tu lui donneras le nom de Jésus
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jésus: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: nom qui signifie l'Eternel sauve, l'Eternel délivre.
      marker-yv: yv-n
    - type: text
      text: ' car c''est lui qui sauvera son peuple de ses péchés.»'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout cela arriva afin que s''accomplisse ce que le Seigneur avait annoncé par le prophète: '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: La vierge sera enceinte, elle mettra au monde un fils et on l'appellera Emmanuel
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'La vierge… Emmanuel: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 7.14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (8e siècle av. J.-C.).'
      marker-yv: yv-n
    - type: text
      text: ', ce qui signifie «Dieu avec nous».'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A son réveil, Joseph fit ce que l''ange du Seigneur lui avait ordonné et il prit sa femme chez lui, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: mais il n'eut pas de relations conjugales avec elle jusqu'à ce qu'elle ait mis au monde un fils [premier-né] auquel il donna le nom de Jésus.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Juda eut Pérets et Zérach de Tamar; Pérets eut Hetsrom; Hetsrom eut Aram; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aram eut pour fils Aminadab; Aminadab eut Nachshon; Nachshon eut Salmon; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salmon eut Boaz de Rahab; Boaz eut Obed de Ruth; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Obed eut pour fils Isaï; Isaï eut David.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi David eut Salomon de la femme d''Urie; '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Salomon eut pour fils Roboam; Roboam eut Abija; Abija eut Asa; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Asa eut pour fils Josaphat; Josaphat eut Joram; Joram eut Ozias; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ozias eut pour fils Jotham; Jotham eut Achaz; Achaz eut Ezéchias; '
