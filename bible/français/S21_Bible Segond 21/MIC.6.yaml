document_id: MIC.6,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Procès de l'Eternel avec son peuple
  - type: text
    content: 'Ecoutez donc ce que dit l''Eternel:'
  - type: text
    content: «Lève-toi, plaide devant les montagnes
  - type: text
    content: et que les collines entendent ta voix!»
  '10':
  - type: text
    content: «Y a-t-il encore dans la maison du méchant
  - type: text
    content: des trésors mal acquis
  - type: text
    content: et une mesure trop petite et maudite?
  '11':
  - type: text
    content: Est-on pur avec des balances fausses
  - type: text
    content: et avec de faux poids dans le sac?
  '12':
  - type: text
    content: Ses riches sont pleins de violence,
  - type: text
    content: ses habitants profèrent le mensonge,
  - type: text
    content: et leur langue n'est que tromperie dans leur bouche.
  '13':
  - type: text
    content: »C'est pourquoi je te frapperai par la souffrance,
  - type: text
    content: je te dévasterai à cause de tes péchés.
  '14':
  - type: text
    content: Tu mangeras sans te rassasier,
  - type: text
    content: et la faim régnera chez toi;
  - type: text
    content: tu feras des réserves mais tu ne les sauveras pas,
  - type: text
    content: et ce que tu sauveras, je le livrerai à l'épée.
  '15':
  - type: text
    content: Tu sèmeras mais tu ne moissonneras pas,
  - type: text
    content: tu presseras l'olive mais tu ne te parfumeras pas d'huile,
  - type: text
    content: tu feras couler le jus de raisin mais tu ne boiras pas de vin.
  '16':
  - type: text
    content: On respecte les coutumes d'Omri
  - type: text
    content: et toute la manière d'agir de la famille d'Achab
  - type: note
    content: Sur les rois d'Israël Achab et son père Omri, voir 1 Rois 16.23–22.40. Ils n'ont pas respecté les commandements de Dieu et ont favorisé le culte d'idoles.
  - type: text
    content: ','
  - type: text
    content: vous marchez d'après leurs conseils.
  - type: text
    content: C'est pourquoi je te livrerai à la destruction,
  - type: text
    content: je ferai de tes habitants un sujet de moquerie,
  - type: text
    content: et vous supporterez le déshonneur de mon peuple.»
  '2':
  - type: text
    content: Ecoutez le procès de l'Eternel, montagnes,
  - type: text
    content: et vous, solides fondations de la terre!
  - type: text
    content: En effet, l'Eternel a un procès avec son peuple,
  - type: text
    content: 'il veut plaider contre Israël:'
  '3':
  - type: text
    content: «Mon peuple, que t'ai-je fait?
  - type: text
    content: En quoi t'ai-je fatigué? Réponds-moi!
  '4':
  - type: text
    content: En effet, je t'ai fait sortir d'Egypte,
  - type: text
    content: je t'ai délivré de la maison d'esclavage,
  - type: text
    content: et j'ai envoyé devant toi Moïse, Aaron et Miriam.
  '5':
  - type: text
    content: Mon peuple, rappelle-toi ce que projetait Balak, roi de Moab,
  - type: text
    content: et ce que lui a répondu Balaam, fils de Beor,
  - type: text
    content: rappelle-toi le chemin de Sittim à Guilgal,
  - type: text
    content: afin de reconnaître les bienfaits de l'Eternel.»
  '6':
  - type: text
    content: «Avec quoi me présenterai-je devant l'Eternel
  - type: text
    content: pour m'humilier devant le Dieu très-haut?
  - type: text
    content: Me présenterai-je avec des holocaustes,
  - type: text
    content: avec des veaux d'un an?
  '7':
  - type: text
    content: L'Eternel acceptera-t-il des milliers de béliers,
  - type: text
    content: des quantités de torrents d'huile?
  - type: text
    content: Donnerai-je mon fils aîné pour ma révolte,
  - type: text
    content: mon enfant pour mon propre péché?»
  '8':
  - type: text
    content: On t'a fait connaître, homme, ce qui est bien
  - type: text
    content: 'et ce que l''Eternel demande de toi:'
  - type: text
    content: c'est que tu mettes en pratique le droit,
  - type: text
    content: que tu aimes la bonté
  - type: text
    content: et que tu marches humblement avec ton Dieu.
  '9':
  - type: text
    content: L'Eternel interpelle la ville,
  - type: text
    content: et celui qui est sage craindra ton nom.
  - type: text
    content: Ecoutez la menace et celui qui l'envoie!
