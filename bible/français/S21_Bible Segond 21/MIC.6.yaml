document_id: MIC.6,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Procès de l'Eternel avec son peuple
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ecoutez donc ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Lève-toi, plaide devant les montagnes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que les collines entendent ta voix!»
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Y a-t-il encore dans la maison du méchant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des trésors mal acquis
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et une mesure trop petite et maudite?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Est-on pur avec des balances fausses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et avec de faux poids dans le sac?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ses riches sont pleins de violence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses habitants profèrent le mensonge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leur langue n'est que tromperie dans leur bouche.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »C'est pourquoi je te frapperai par la souffrance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te dévasterai à cause de tes péchés.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu mangeras sans te rassasier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la faim régnera chez toi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu feras des réserves mais tu ne les sauveras pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ce que tu sauveras, je le livrerai à l'épée.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu sèmeras mais tu ne moissonneras pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu presseras l'olive mais tu ne te parfumeras pas d'huile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu feras couler le jus de raisin mais tu ne boiras pas de vin.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On respecte les coutumes d'Omri
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et toute la manière d'agir de la famille d'Achab
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sur les rois d''Israël Achab et son père Omri, voir '
      - type: text
        text: 1 Rois 16.23–22.40
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Ils n'ont pas respecté les commandements de Dieu et ont favorisé le culte d'idoles.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous marchez d'après leurs conseils.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est pourquoi je te livrerai à la destruction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ferai de tes habitants un sujet de moquerie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous supporterez le déshonneur de mon peuple.»
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoutez le procès de l'Eternel, montagnes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous, solides fondations de la terre!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, l'Eternel a un procès avec son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'il veut plaider contre Israël:'
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Mon peuple, que t'ai-je fait?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En quoi t'ai-je fatigué? Réponds-moi!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, je t'ai fait sortir d'Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je t'ai délivré de la maison d'esclavage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et j'ai envoyé devant toi Moïse, Aaron et Miriam.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon peuple, rappelle-toi ce que projetait Balak, roi de Moab,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ce que lui a répondu Balaam, fils de Beor,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: rappelle-toi le chemin de Sittim à Guilgal,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin de reconnaître les bienfaits de l'Eternel.»
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Avec quoi me présenterai-je devant l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour m'humilier devant le Dieu très-haut?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Me présenterai-je avec des holocaustes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec des veaux d'un an?
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel acceptera-t-il des milliers de béliers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des quantités de torrents d'huile?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Donnerai-je mon fils aîné pour ma révolte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon enfant pour mon propre péché?»
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On t'a fait connaître, homme, ce qui est bien
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et ce que l''Eternel demande de toi:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est que tu mettes en pratique le droit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que tu aimes la bonté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que tu marches humblement avec ton Dieu.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel interpelle la ville,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et celui qui est sage craindra ton nom.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoutez la menace et celui qui l'envoie!
