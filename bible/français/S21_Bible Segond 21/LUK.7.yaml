document_id: LUK.7,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Guérison d'un esclave à Capernaüm
  - type: text
    content: 'Après avoir prononcé toutes ces paroles devant le peuple qui l''écoutait, Jésus entra dans Capernaüm. '
  '10':
  - type: text
    content: De retour à la maison, les personnes envoyées par l'officier trouvèrent l'esclave [qui avait été malade] en bonne santé.
  - type: heading
    content: Résurrection à Naïn
  '11':
  - type: text
    content: 'Le jour suivant, Jésus alla dans une ville appelée Naïn; ses disciples [en assez grand nombre] et une grande foule faisaient route avec lui. '
  '12':
  - type: text
    content: 'Lorsqu''il fut près de la porte de la ville, voici qu''on portait en terre un mort, fils unique de sa mère qui était veuve; beaucoup d''habitants de la ville l''accompagnaient. '
  '13':
  - type: text
    content: 'En voyant la femme, le Seigneur fut rempli de compassion pour elle et lui dit: «Ne pleure pas!» '
  '14':
  - type: text
    content: 'Il s''approcha et toucha le cercueil; ceux qui le portaient s''arrêtèrent. Il dit: «Jeune homme, je te le dis, lève-toi!» '
  '15':
  - type: text
    content: 'Et le mort s''assit et se mit à parler. Jésus le rendit à sa mère. '
  '16':
  - type: text
    content: 'Tous furent saisis de crainte et ils rendaient gloire à Dieu en disant: «Un grand prophète a surgi parmi nous» et: «Dieu a visité son peuple.» '
  '17':
  - type: text
    content: Cette déclaration sur Jésus se propagea dans toute la Judée et dans toute la région.
  - type: heading
    content: Jean-Baptiste vu par Jésus
  '18':
  - type: text
    content: 'Jean fut informé de tout cela par ses disciples. '
  '19':
  - type: text
    content: 'Il en appela deux qu''il envoya vers Jésus pour lui dire: «Es-tu celui qui doit venir ou devons-nous en attendre un autre?» '
  '2':
  - type: text
    content: 'Un officier romain avait un esclave auquel il était très attaché et qui était malade, sur le point de mourir. '
  '20':
  - type: text
    content: 'Arrivés vers Jésus, ils dirent: «Jean-Baptiste nous a envoyés vers toi pour te demander: ‘Es-tu celui qui doit venir ou devons-nous en attendre un autre?’» '
  '21':
  - type: text
    content: 'A ce moment-là, Jésus guérit de nombreuses personnes de maladies, d''infirmités et d''esprits mauvais et il rendit la vue à bien des aveugles. '
  '22':
  - type: text
    content: 'Puis il leur répondit: «Allez rapporter à Jean ce que vous avez vu et entendu: '
  - type: text
    content: les aveugles voient, les boiteux marchent
  - type: text
    content: ', les lépreux sont purifiés, '
  - type: text
    content: les sourds entendent
  - type: text
    content: ', les morts ressuscitent, '
  - type: text
    content: la bonne nouvelle est annoncée aux pauvres
  - type: note
    content: 'Les aveugles… pauvres: citation d''extraits d''Esaïe 35.5-6 et 61.1, passages relatifs à l’ère messianique et au serviteur de l''Eternel (le Messie).'
  - type: text
    content: '. '
  '23':
  - type: text
    content: Heureux celui pour qui je ne représenterai pas un obstacle!»
  '24':
  - type: text
    content: 'Lorsque les messagers de Jean furent partis, Jésus se mit à dire à la foule au sujet de Jean: «Qu''êtes-vous allés voir au désert? Un roseau agité par le vent? '
  '25':
  - type: text
    content: 'Mais qu''êtes-vous allés voir? Un homme habillé de tenues élégantes? Ceux qui portent des tenues somptueuses et qui vivent dans le luxe se trouvent dans les maisons des rois. '
  '26':
  - type: text
    content: 'Qu''êtes-vous donc allés voir? Un prophète? Oui, je vous le dis, et plus qu''un prophète. '
  '27':
  - type: text
    content: 'C''est celui à propos duquel il est écrit: '
  - type: text
    content: Voici, j'envoie mon messager devant toi pour te préparer le chemin.
  - type: note
    content: 'Voici… chemin: citation de Malachie 3.1.'
  '28':
  - type: text
    content: '»Je vous le dis, parmi ceux qui sont nés de femmes, aucun [prophète] n''est plus grand que Jean[-Baptiste]. Cependant, le plus petit dans le royaume de Dieu est plus grand que lui. '
  '29':
  - type: text
    content: 'Tout le peuple qui l''a entendu et même les collecteurs d''impôts ont reconnu la justice de Dieu en se faisant baptiser du baptême de Jean; '
  '3':
  - type: text
    content: 'Il entendit parler de Jésus et il lui envoya quelques anciens des Juifs pour lui demander de venir guérir son esclave. '
  '30':
  - type: text
    content: 'mais les pharisiens et les professeurs de la loi, en ne se faisant pas baptiser par lui, ont rejeté le plan de Dieu pour eux. '
  '31':
  - type: text
    content: 'A qui donc comparerai-je les hommes de cette génération, à qui ressemblent-ils? '
  '32':
  - type: text
    content: 'Ils ressemblent à des enfants assis sur la place publique, qui se parlent les uns aux autres et disent: ‘Nous vous avons joué de la flûte et vous n''avez pas dansé; nous avons entonné des chants funèbres et vous n''avez pas pleuré.’ '
  '33':
  - type: text
    content: 'En effet, Jean-Baptiste est venu, il ne mange pas de pain et ne boit pas de vin, et vous dites: ‘Il a un démon.’ '
  '34':
  - type: text
    content: 'Le Fils de l''homme est venu, il mange et il boit, et vous dites: ‘C''est un glouton et un buveur, un ami des collecteurs d''impôts et des pécheurs.’ '
  '35':
  - type: text
    content: Mais la sagesse a été reconnue juste par tous ses enfants.»
  - type: heading
    content: Une femme verse du parfum sur Jésus
  '36':
  - type: text
    content: 'Un pharisien invita Jésus à manger avec lui. Jésus entra dans la maison du pharisien et se mit à table. '
  '37':
  - type: text
    content: 'Une femme pécheresse qui se trouvait dans la ville apprit qu''il était à table dans la maison du pharisien. Elle apporta un vase plein de parfum '
  '38':
  - type: text
    content: 'et se tint derrière, aux pieds de Jésus. Elle pleurait, et bientôt elle lui mouilla les pieds de ses larmes, puis les essuya avec ses cheveux, les embrassa et versa le parfum sur eux. '
  '39':
  - type: text
    content: 'Quand le pharisien qui avait invité Jésus vit cela, il se dit en lui-même: «Si cet homme était prophète, il saurait qui est celle qui le touche et de quel genre de femme il s''agit, il saurait que c''est une pécheresse.» '
  '4':
  - type: text
    content: 'Ils arrivèrent vers Jésus et le supplièrent avec insistance, disant: «Il mérite que tu lui accordes cela, '
  '40':
  - type: text
    content: 'Jésus prit la parole et lui dit: «Simon, j''ai quelque chose à te dire.» «Maître, parle», répondit-il. '
  '41':
  - type: text
    content: '«Un créancier avait deux débiteurs: l''un d''eux lui devait 500 pièces d''argent, et l''autre 50. '
  '42':
  - type: text
    content: 'Comme ils n''avaient pas de quoi le rembourser, il leur remit à tous deux leur dette. Lequel des deux l''aimera le plus?» '
  '43':
  - type: text
    content: 'Simon répondit: «Celui, je pense, auquel il a remis la plus grosse somme.» Jésus lui dit: «Tu as bien jugé.» '
  '44':
  - type: text
    content: 'Puis il se tourna vers la femme et dit à Simon: «Tu vois cette femme? Je suis entré dans ta maison et tu ne m''as pas donné d''eau pour me laver les pieds; mais elle, elle les a mouillés de ses larmes et les a essuyés avec ses cheveux. '
  '45':
  - type: text
    content: 'Tu ne m''as pas donné de baiser; mais elle, depuis que je suis entré, elle n''a pas cessé de m''embrasser les pieds. '
  '46':
  - type: text
    content: 'Tu n''as pas versé d''huile sur ma tête; mais elle, elle a versé du parfum sur mes pieds. '
  '47':
  - type: text
    content: C'est pourquoi je te le dis, ses nombreux péchés ont été pardonnés, puisqu'elle a beaucoup aimé
  - type: note
    content: 'Puisqu''elle a beaucoup aimé: l''attitude de cette femme envers Christ démontrait qu''elle avait conscience de ses péchés et de son besoin de pardon.'
  - type: text
    content: '. Mais celui à qui l''on pardonne peu aime peu.» '
  '48':
  - type: text
    content: 'Et il dit à la femme: «Tes péchés sont pardonnés.» '
  '49':
  - type: text
    content: 'Les invités se mirent à dire en eux-mêmes: «Qui est cet homme qui pardonne même les péchés?» '
  '5':
  - type: text
    content: 'car il aime notre nation et c''est lui qui a fait construire notre synagogue.» '
  '50':
  - type: text
    content: 'Mais Jésus dit à la femme: «Ta foi t''a sauvée. Pars dans la paix!»'
  '6':
  - type: text
    content: 'Jésus partit avec eux. Il n''était plus très loin de la maison quand l''officier envoya des amis [vers lui] pour lui dire: «Seigneur, ne prends pas tant de peine, car je ne suis pas digne que tu entres sous mon toit. '
  '7':
  - type: text
    content: 'C''est aussi pour cela que je n''ai pas jugé bon d''aller en personne vers toi. Mais dis un mot et mon serviteur sera guéri. '
  '8':
  - type: text
    content: 'En effet, moi aussi je suis un homme soumis à des supérieurs et j''ai des soldats sous mes ordres; je dis à l''un: ‘Pars!’ et il part, à un autre: ‘Viens!’ et il vient, et à mon esclave: ‘Fais ceci!’ et il le fait.» '
  '9':
  - type: text
    content: 'Lorsque Jésus entendit ces paroles, il admira l''officier et, se tournant vers la foule qui le suivait, il dit: «Je vous le dis, même en Israël je n''ai pas trouvé une aussi grande foi.» '
