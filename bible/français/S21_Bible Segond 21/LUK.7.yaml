document_id: LUK.7,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Guérison d'un esclave à Capernaüm
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après avoir prononcé toutes ces paroles devant le peuple qui l''écoutait, Jésus entra dans Capernaüm. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: De retour à la maison, les personnes envoyées par l'officier trouvèrent l'esclave [qui avait été malade] en bonne santé.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Résurrection à Naïn
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le jour suivant, Jésus alla dans une ville appelée Naïn; ses disciples [en assez grand nombre] et une grande foule faisaient route avec lui. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu''il fut près de la porte de la ville, voici qu''on portait en terre un mort, fils unique de sa mère qui était veuve; beaucoup d''habitants de la ville l''accompagnaient. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En voyant la femme, le Seigneur fut rempli de compassion pour elle et lui dit: «Ne pleure pas!» '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il s''approcha et toucha le cercueil; ceux qui le portaient s''arrêtèrent. Il dit: «Jeune homme, je te le dis, lève-toi!» '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et le mort s''assit et se mit à parler. Jésus le rendit à sa mère. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous furent saisis de crainte et ils rendaient gloire à Dieu en disant: «Un grand prophète a surgi parmi nous» et: «Dieu a visité son peuple.» '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Cette déclaration sur Jésus se propagea dans toute la Judée et dans toute la région.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jean-Baptiste vu par Jésus
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jean fut informé de tout cela par ses disciples. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il en appela deux qu''il envoya vers Jésus pour lui dire: «Es-tu celui qui doit venir ou devons-nous en attendre un autre?» '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un officier romain avait un esclave auquel il était très attaché et qui était malade, sur le point de mourir. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Arrivés vers Jésus, ils dirent: «Jean-Baptiste nous a envoyés vers toi pour te demander: ‘Es-tu celui qui doit venir ou devons-nous en attendre un autre?’» '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A ce moment-là, Jésus guérit de nombreuses personnes de maladies, d''infirmités et d''esprits mauvais et il rendit la vue à bien des aveugles. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il leur répondit: «Allez rapporter à Jean ce que vous avez vu et entendu: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: les aveugles voient, les boiteux marchent
    - type: text
      text: ', les lépreux sont purifiés, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: les sourds entendent
    - type: text
      text: ', les morts ressuscitent, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: la bonne nouvelle est annoncée aux pauvres
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Les aveugles… pauvres: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'extraits d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 35.5-6
      - type: text
        text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '61.1'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', passages relatifs à l’ère messianique et au serviteur de l''Eternel (le Messie).'
      marker-yv: yv-n
    - type: text
      text: '. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Heureux celui pour qui je ne représenterai pas un obstacle!»
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque les messagers de Jean furent partis, Jésus se mit à dire à la foule au sujet de Jean: «Qu''êtes-vous allés voir au désert? Un roseau agité par le vent? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais qu''êtes-vous allés voir? Un homme habillé de tenues élégantes? Ceux qui portent des tenues somptueuses et qui vivent dans le luxe se trouvent dans les maisons des rois. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qu''êtes-vous donc allés voir? Un prophète? Oui, je vous le dis, et plus qu''un prophète. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est celui à propos duquel il est écrit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Voici, j'envoie mon messager devant toi pour te préparer le chemin.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Voici… chemin: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Malachie 3.1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Je vous le dis, parmi ceux qui sont nés de femmes, aucun [prophète] n''est plus grand que Jean[-Baptiste]. Cependant, le plus petit dans le royaume de Dieu est plus grand que lui. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout le peuple qui l''a entendu et même les collecteurs d''impôts ont reconnu la justice de Dieu en se faisant baptiser du baptême de Jean; '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il entendit parler de Jésus et il lui envoya quelques anciens des Juifs pour lui demander de venir guérir son esclave. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais les pharisiens et les professeurs de la loi, en ne se faisant pas baptiser par lui, ont rejeté le plan de Dieu pour eux. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A qui donc comparerai-je les hommes de cette génération, à qui ressemblent-ils? '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils ressemblent à des enfants assis sur la place publique, qui se parlent les uns aux autres et disent: ‘Nous vous avons joué de la flûte et vous n''avez pas dansé; nous avons entonné des chants funèbres et vous n''avez pas pleuré.’ '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, Jean-Baptiste est venu, il ne mange pas de pain et ne boit pas de vin, et vous dites: ‘Il a un démon.’ '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le Fils de l''homme est venu, il mange et il boit, et vous dites: ‘C''est un glouton et un buveur, un ami des collecteurs d''impôts et des pécheurs.’ '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais la sagesse a été reconnue juste par tous ses enfants.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Une femme verse du parfum sur Jésus
    marker-yv: yv-h
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Un pharisien invita Jésus à manger avec lui. Jésus entra dans la maison du pharisien et se mit à table. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une femme pécheresse qui se trouvait dans la ville apprit qu''il était à table dans la maison du pharisien. Elle apporta un vase plein de parfum '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et se tint derrière, aux pieds de Jésus. Elle pleurait, et bientôt elle lui mouilla les pieds de ses larmes, puis les essuya avec ses cheveux, les embrassa et versa le parfum sur eux. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand le pharisien qui avait invité Jésus vit cela, il se dit en lui-même: «Si cet homme était prophète, il saurait qui est celle qui le touche et de quel genre de femme il s''agit, il saurait que c''est une pécheresse.» '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils arrivèrent vers Jésus et le supplièrent avec insistance, disant: «Il mérite que tu lui accordes cela, '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus prit la parole et lui dit: «Simon, j''ai quelque chose à te dire.» «Maître, parle», répondit-il. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Un créancier avait deux débiteurs: l''un d''eux lui devait 500 pièces d''argent, et l''autre 50. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme ils n''avaient pas de quoi le rembourser, il leur remit à tous deux leur dette. Lequel des deux l''aimera le plus?» '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Simon répondit: «Celui, je pense, auquel il a remis la plus grosse somme.» Jésus lui dit: «Tu as bien jugé.» '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis il se tourna vers la femme et dit à Simon: «Tu vois cette femme? Je suis entré dans ta maison et tu ne m''as pas donné d''eau pour me laver les pieds; mais elle, elle les a mouillés de ses larmes et les a essuyés avec ses cheveux. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu ne m''as pas donné de baiser; mais elle, depuis que je suis entré, elle n''a pas cessé de m''embrasser les pieds. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu n''as pas versé d''huile sur ma tête; mais elle, elle a versé du parfum sur mes pieds. '
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C'est pourquoi je te le dis, ses nombreux péchés ont été pardonnés, puisqu'elle a beaucoup aimé
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.47 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Puisqu''elle a beaucoup aimé: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: l'attitude de cette femme envers Christ démontrait qu'elle avait conscience de ses péchés et de son besoin de pardon.
      marker-yv: yv-n
    - type: text
      text: '. Mais celui à qui l''on pardonne peu aime peu.» '
  '48':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il dit à la femme: «Tes péchés sont pardonnés.» '
  '49':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les invités se mirent à dire en eux-mêmes: «Qui est cet homme qui pardonne même les péchés?» '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car il aime notre nation et c''est lui qui a fait construire notre synagogue.» '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Jésus dit à la femme: «Ta foi t''a sauvée. Pars dans la paix!»'
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus partit avec eux. Il n''était plus très loin de la maison quand l''officier envoya des amis [vers lui] pour lui dire: «Seigneur, ne prends pas tant de peine, car je ne suis pas digne que tu entres sous mon toit. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est aussi pour cela que je n''ai pas jugé bon d''aller en personne vers toi. Mais dis un mot et mon serviteur sera guéri. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, moi aussi je suis un homme soumis à des supérieurs et j''ai des soldats sous mes ordres; je dis à l''un: ‘Pars!’ et il part, à un autre: ‘Viens!’ et il vient, et à mon esclave: ‘Fais ceci!’ et il le fait.» '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Jésus entendit ces paroles, il admira l''officier et, se tournant vers la foule qui le suivait, il dit: «Je vous le dis, même en Israël je n''ai pas trouvé une aussi grande foi.» '
