document_id: HEB.2,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'C''est pourquoi nous devons d''autant plus nous attacher au message que nous avons entendu, de peur d''être entraînés à notre perte. '
  '10':
  - type: text
    content: 'En effet, celui pour qui et par qui toute chose existe voulait conduire à la gloire beaucoup de fils; il lui convenait donc de qualifier parfaitement par des souffrances l''auteur de leur salut. '
  '11':
  - type: text
    content: 'De fait, celui qui procure la sainteté et ceux qui en bénéficient ont tous une seule et même origine, c''est pourquoi il n''a pas honte de les appeler ses frères '
  '12':
  - type: text
    content: 'lorsqu''il dit: '
  - type: text
    content: J'annoncerai ton nom à mes frères, je te célébrerai au milieu de l'assemblée.
  - type: note
    content: 'J''annoncerai… l''assemblée: citation du Psaume 22.23.'
  - type: text
    content: ' '
  '13':
  - type: text
    content: 'Et encore: '
  - type: text
    content: Je me confierai en lui.
  - type: text
    content: 'Et enfin: '
  - type: text
    content: Me voici, moi et les enfants que Dieu m'a donnés.
  - type: note
    content: 'Je me confierai… m''a donnés: citation d''Esaïe 8.17-18.'
  '14':
  - type: text
    content: 'Puisque ces enfants ont en commun la condition humaine, lui-même l''a aussi partagée, de façon similaire. Ainsi, par sa mort, il a pu rendre impuissant celui qui exerçait le pouvoir de la mort, c''est-à-dire le diable, '
  '15':
  - type: text
    content: 'et libérer tous ceux que la peur de la mort retenait leur vie durant dans l''esclavage. '
  '16':
  - type: text
    content: 'En effet, assurément, ce n''est pas à des anges qu''il vient en aide, mais bien à la descendance d''Abraham. '
  '17':
  - type: text
    content: 'Par conséquent, il devait devenir semblable en tout à ses frères afin d''être un grand-prêtre rempli de compassion et fidèle dans le service de Dieu pour faire l''expiation des péchés du peuple. '
  '18':
  - type: text
    content: En effet, comme il a souffert lui-même lorsqu'il a été tenté, il peut secourir ceux qui sont tentés.
  '2':
  - type: text
    content: 'En effet, puisque la parole annoncée par l''intermédiaire des anges a été confirmée et que toute transgression et toute désobéissance ont reçu une juste sanction, '
  '3':
  - type: text
    content: 'comment échapperons-nous si nous négligeons un si grand salut? Ce salut, annoncé d''abord par le Seigneur, nous a été confirmé par ceux qui l''ont entendu. '
  '4':
  - type: text
    content: Dieu a appuyé leur témoignage par des signes, des prodiges et divers miracles, ainsi que par les dons du Saint-Esprit distribués conformément à sa volonté.
  '5':
  - type: text
    content: 'En effet, ce n''est pas à l''autorité d''anges que Dieu a soumis le monde à venir dont nous parlons. '
  '6':
  - type: text
    content: 'Quelqu''un a d''ailleurs rendu quelque part ce témoignage: '
  - type: text
    content: Qu'est-ce que l'homme, pour que tu te souviennes de lui, ou le fils de l'homme, pour que tu prennes soin de lui?
  - type: text
    content: ' '
  '7':
  - type: text
    content: Tu l'as abaissé pour un peu de temps au-dessous des anges, tu l'as couronné de gloire et d'honneur [et tu lui as donné la domination sur ce que tes mains ont fait],
  - type: text
    content: ' '
  '8':
  - type: text
    content: tu as tout mis sous ses pieds.
  - type: note
    content: 'Qu''est-ce… pieds: citation du Psaume 8.5-7.'
  - type: text
    content: ' En effet, en lui soumettant toute chose, Dieu n''a rien laissé qui échappe à son autorité. Maintenant pourtant, nous ne voyons pas encore que tout lui soit soumis. '
  '9':
  - type: text
    content: 'Toutefois, celui qui a été '
  - type: text
    content: abaissé pour un peu de temps au-dessous des anges
  - type: text
    content: ', Jésus, nous le voyons '
  - type: text
    content: couronné de gloire et d'honneur
  - type: text
    content: à cause de la mort qu'il a soufferte. Ainsi, par la grâce de Dieu, il a connu la mort pour tout être humain.
