document_id: HEB.2,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'C''est pourquoi nous devons d''autant plus nous attacher au message que nous avons entendu, de peur d''être entraînés à notre perte. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'En effet, celui pour qui et par qui toute chose existe voulait conduire à la gloire beaucoup de fils; il lui convenait donc de qualifier parfaitement par des souffrances l''auteur de leur salut. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'De fait, celui qui procure la sainteté et ceux qui en bénéficient ont tous une seule et même origine, c''est pourquoi il n''a pas honte de les appeler ses frères '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'lorsqu''il dit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: J'annoncerai ton nom à mes frères, je te célébrerai au milieu de l'assemblée.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'J''annoncerai… l''assemblée: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 22.23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Et encore: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Je me confierai en lui.
    - type: text
      text: 'Et enfin: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Me voici, moi et les enfants que Dieu m'a donnés.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je me confierai… m''a donnés: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 8.17-18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Puisque ces enfants ont en commun la condition humaine, lui-même l''a aussi partagée, de façon similaire. Ainsi, par sa mort, il a pu rendre impuissant celui qui exerçait le pouvoir de la mort, c''est-à-dire le diable, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'et libérer tous ceux que la peur de la mort retenait leur vie durant dans l''esclavage. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'En effet, assurément, ce n''est pas à des anges qu''il vient en aide, mais bien à la descendance d''Abraham. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Par conséquent, il devait devenir semblable en tout à ses frères afin d''être un grand-prêtre rempli de compassion et fidèle dans le service de Dieu pour faire l''expiation des péchés du peuple. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: En effet, comme il a souffert lui-même lorsqu'il a été tenté, il peut secourir ceux qui sont tentés.
  '2':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'En effet, puisque la parole annoncée par l''intermédiaire des anges a été confirmée et que toute transgression et toute désobéissance ont reçu une juste sanction, '
  '3':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'comment échapperons-nous si nous négligeons un si grand salut? Ce salut, annoncé d''abord par le Seigneur, nous a été confirmé par ceux qui l''ont entendu. '
  '4':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Dieu a appuyé leur témoignage par des signes, des prodiges et divers miracles, ainsi que par les dons du Saint-Esprit distribués conformément à sa volonté.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'En effet, ce n''est pas à l''autorité d''anges que Dieu a soumis le monde à venir dont nous parlons. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Quelqu''un a d''ailleurs rendu quelque part ce témoignage: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Qu'est-ce que l'homme, pour que tu te souviennes de lui, ou le fils de l'homme, pour que tu prennes soin de lui?
    - type: text
      text: ' '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu l'as abaissé pour un peu de temps au-dessous des anges, tu l'as couronné de gloire et d'honneur [et tu lui as donné la domination sur ce que tes mains ont fait],
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: tu as tout mis sous ses pieds.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.6-8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qu''est-ce… pieds: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 8.5-7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' En effet, en lui soumettant toute chose, Dieu n''a rien laissé qui échappe à son autorité. Maintenant pourtant, nous ne voyons pas encore que tout lui soit soumis. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Toutefois, celui qui a été '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: abaissé pour un peu de temps au-dessous des anges
    - type: text
      text: ', Jésus, nous le voyons '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: couronné de gloire et d'honneur
    - type: text
      text: à cause de la mort qu'il a soufferte. Ainsi, par la grâce de Dieu, il a connu la mort pour tout être humain.
