document_id: 1KI.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne d'Abijam sur Juda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La dix-huitième année du règne de Jéroboam, fils de Nebath, Abijam devint roi sur Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il régna 3 ans à Jérusalem. Sa mère s'appelait Maaca et c'était la petite-fille d'Absalom.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il se livra à tous les péchés que son père avait commis avant lui, il ne s''attacha pas sans réserve à l''Eternel, son Dieu, comme l''avait fait son ancêtre David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Toutefois, à cause de David, l''Eternel, son Dieu, lui donna un successeur à Jérusalem en établissant son fils après lui et en laissant subsister Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'En effet, David avait fait ce qui est droit aux yeux de l''Eternel et il ne s''était détourné d''aucun de ses commandements durant toute sa vie, excepté dans l''affaire d''Urie le Hittite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il y eut néanmoins guerre entre Roboam et Jéroboam pendant toute la vie de Roboam.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le reste des actes d'Abijam, tout ce qu'il a accompli, cela est décrit dans les annales des rois de Juda. Il y eut guerre entre Abijam et Jéroboam.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Abijam se coucha avec ses ancêtres et on l'enterra dans la ville de David. Son fils Asa devint roi à sa place.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne d'Asa sur Juda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'La vingtième année du règne de Jéroboam sur Israël, Asa devint roi de Juda. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Il régna 41 ans à Jérusalem. Sa grand-mère s'appelait Maaca, c'était la petite-fille d'Absalom.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Asa fit ce qui est droit aux yeux de l''Eternel, comme son ancêtre David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il fit disparaître du pays les prostitués et il élimina toutes les idoles que ses ancêtres avaient fabriquées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il retira même le titre de reine mère à Maaca, sa grand-mère, parce qu''elle avait fait une idole en l''honneur d''Astarté. Asa abattit son idole et la brûla au bord du torrent du Cédron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Cependant, les hauts lieux ne disparurent pas, même si Asa s''attacha sans réserve à l''Eternel pendant toute sa vie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Il déposa dans la maison de l''Eternel les offrandes consacrées par son père et par lui-même: de l''argent, de l''or et divers objets.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il y eut guerre entre Asa et Baesha, le roi d''Israël, pendant toute leur vie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Baesha, le roi d''Israël, monta contre Juda, et il fortifia Rama pour empêcher les hommes d''Asa, le roi de Juda, d''effectuer quelque manœuvre que ce soit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Asa prit alors tout l''argent et tout l''or qui étaient restés dans les trésors de la maison de l''Eternel, ainsi que les trésors du palais royal, et il les remit à ses serviteurs. Puis il les envoya trouver Ben-Hadad, fils de Thabrimmon et petit-fils de Hezjon, le roi de Syrie, qui habitait à Damas. Le roi Asa lui fit dire: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '«Qu''il y ait une alliance entre toi et moi, comme il en a existé une entre ton père et le mien! Vois, je t''envoie de l''argent et de l''or en cadeau. Va rompre ton alliance avec Baesha, le roi d''Israël, afin qu''il s''éloigne de moi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ben-Hadad écouta le roi Asa: il envoya les chefs de son armée contre les villes d''Israël et il conquit Ijjon, Dan, Abel-Beth-Maaca et tout Kinneroth, en plus de tout le pays de Nephthali. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Lorsque Baesha l''apprit, il cessa de fortifier Rama et resta à Thirtsa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Le roi Asa convoqua tout Juda, sans exempter personne, et ils emportèrent les pierres et le bois que Baesha employait à la construction de Rama. Il s'en servit pour fortifier Guéba de Benjamin et Mitspa.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tout le reste des actes d'Asa, tous ses exploits et tout ce qu'il a accompli, ainsi que les villes qu'il a construites, cela est décrit dans les annales des rois de Juda. Toutefois, durant sa vieillesse, il eut les pieds malades.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Asa se coucha avec ses ancêtres et il fut enterré à leurs côtés dans la ville de son ancêtre David. Son fils Josaphat devint roi à sa place.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne de Nadab sur Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Nadab, le fils de Jéroboam, devint roi d'Israël, la deuxième année du règne d'Asa sur Juda. Il régna 2 ans sur Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il fit ce qui est mal aux yeux de l''Eternel et il marcha sur la voie de son père en se livrant aux péchés que celui-ci avait fait commettre à Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Baesha, le fils d''Achija, de la tribu d''Issacar, conspira contre lui et le tua à Guibbethon, une ville qui appartenait aux Philistins, pendant que Nadab et tout Israël en faisaient le siège. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Baesha le mit à mort la troisième année du règne d''Asa sur Juda, et il devint roi à sa place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Lorsqu''il fut roi, il frappa toute la famille de Jéroboam; il ne laissa aucun survivant, conformément à la parole que l''Eternel avait dite par son serviteur Achija de Silo. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Cela arriva à cause des péchés que Jéroboam avait commis et qu''il avait fait commettre à Israël, irritant ainsi l''Eternel, le Dieu d''Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Le reste des actes de Nadab, tout ce qu'il a accompli, cela est décrit dans les annales des rois d'Israël.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne de Baesha sur Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Il y eut guerre entre Asa et Baesha, le roi d'Israël, pendant toute leur vie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: La troisième année du règne d'Asa sur Juda, Baesha, le fils d'Achija, devint roi de l'ensemble d'Israël à Thirtsa. Il régna 24 ans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Il fit ce qui est mal aux yeux de l'Eternel et il marcha sur la voie de Jéroboam en se livrant aux péchés que celui-ci avait fait commettre à Israël.
