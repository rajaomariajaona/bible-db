document_id: 1KI.15,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Règne d'Abijam sur Juda
  - type: text
    content: 'La dix-huitième année du règne de Jéroboam, fils de Nebath, Abijam devint roi sur Juda. '
  '10':
  - type: text
    content: Il régna 41 ans à Jérusalem. Sa grand-mère s'appelait Maaca, c'était la petite-fille d'Absalom.
  '11':
  - type: text
    content: 'Asa fit ce qui est droit aux yeux de l''Eternel, comme son ancêtre David. '
  '12':
  - type: text
    content: 'Il fit disparaître du pays les prostitués et il élimina toutes les idoles que ses ancêtres avaient fabriquées. '
  '13':
  - type: text
    content: 'Il retira même le titre de reine mère à Maaca, sa grand-mère, parce qu''elle avait fait une idole en l''honneur d''Astarté. Asa abattit son idole et la brûla au bord du torrent du Cédron. '
  '14':
  - type: text
    content: 'Cependant, les hauts lieux ne disparurent pas, même si Asa s''attacha sans réserve à l''Eternel pendant toute sa vie. '
  '15':
  - type: text
    content: 'Il déposa dans la maison de l''Eternel les offrandes consacrées par son père et par lui-même: de l''argent, de l''or et divers objets.'
  '16':
  - type: text
    content: 'Il y eut guerre entre Asa et Baesha, le roi d''Israël, pendant toute leur vie. '
  '17':
  - type: text
    content: 'Baesha, le roi d''Israël, monta contre Juda, et il fortifia Rama pour empêcher les hommes d''Asa, le roi de Juda, d''effectuer quelque manœuvre que ce soit. '
  '18':
  - type: text
    content: 'Asa prit alors tout l''argent et tout l''or qui étaient restés dans les trésors de la maison de l''Eternel, ainsi que les trésors du palais royal, et il les remit à ses serviteurs. Puis il les envoya trouver Ben-Hadad, fils de Thabrimmon et petit-fils de Hezjon, le roi de Syrie, qui habitait à Damas. Le roi Asa lui fit dire: '
  '19':
  - type: text
    content: '«Qu''il y ait une alliance entre toi et moi, comme il en a existé une entre ton père et le mien! Vois, je t''envoie de l''argent et de l''or en cadeau. Va rompre ton alliance avec Baesha, le roi d''Israël, afin qu''il s''éloigne de moi.» '
  '2':
  - type: text
    content: Il régna 3 ans à Jérusalem. Sa mère s'appelait Maaca et c'était la petite-fille d'Absalom.
  '20':
  - type: text
    content: 'Ben-Hadad écouta le roi Asa: il envoya les chefs de son armée contre les villes d''Israël et il conquit Ijjon, Dan, Abel-Beth-Maaca et tout Kinneroth, en plus de tout le pays de Nephthali. '
  '21':
  - type: text
    content: 'Lorsque Baesha l''apprit, il cessa de fortifier Rama et resta à Thirtsa. '
  '22':
  - type: text
    content: Le roi Asa convoqua tout Juda, sans exempter personne, et ils emportèrent les pierres et le bois que Baesha employait à la construction de Rama. Il s'en servit pour fortifier Guéba de Benjamin et Mitspa.
  '23':
  - type: text
    content: Tout le reste des actes d'Asa, tous ses exploits et tout ce qu'il a accompli, ainsi que les villes qu'il a construites, cela est décrit dans les annales des rois de Juda. Toutefois, durant sa vieillesse, il eut les pieds malades.
  '24':
  - type: text
    content: Asa se coucha avec ses ancêtres et il fut enterré à leurs côtés dans la ville de son ancêtre David. Son fils Josaphat devint roi à sa place.
  - type: heading
    content: Règne de Nadab sur Israël
  '25':
  - type: text
    content: Nadab, le fils de Jéroboam, devint roi d'Israël, la deuxième année du règne d'Asa sur Juda. Il régna 2 ans sur Israël.
  '26':
  - type: text
    content: 'Il fit ce qui est mal aux yeux de l''Eternel et il marcha sur la voie de son père en se livrant aux péchés que celui-ci avait fait commettre à Israël. '
  '27':
  - type: text
    content: 'Baesha, le fils d''Achija, de la tribu d''Issacar, conspira contre lui et le tua à Guibbethon, une ville qui appartenait aux Philistins, pendant que Nadab et tout Israël en faisaient le siège. '
  '28':
  - type: text
    content: 'Baesha le mit à mort la troisième année du règne d''Asa sur Juda, et il devint roi à sa place. '
  '29':
  - type: text
    content: 'Lorsqu''il fut roi, il frappa toute la famille de Jéroboam; il ne laissa aucun survivant, conformément à la parole que l''Eternel avait dite par son serviteur Achija de Silo. '
  '3':
  - type: text
    content: 'Il se livra à tous les péchés que son père avait commis avant lui, il ne s''attacha pas sans réserve à l''Eternel, son Dieu, comme l''avait fait son ancêtre David. '
  '30':
  - type: text
    content: 'Cela arriva à cause des péchés que Jéroboam avait commis et qu''il avait fait commettre à Israël, irritant ainsi l''Eternel, le Dieu d''Israël. '
  '31':
  - type: text
    content: Le reste des actes de Nadab, tout ce qu'il a accompli, cela est décrit dans les annales des rois d'Israël.
  - type: heading
    content: Règne de Baesha sur Israël
  '32':
  - type: text
    content: Il y eut guerre entre Asa et Baesha, le roi d'Israël, pendant toute leur vie.
  '33':
  - type: text
    content: La troisième année du règne d'Asa sur Juda, Baesha, le fils d'Achija, devint roi de l'ensemble d'Israël à Thirtsa. Il régna 24 ans.
  '34':
  - type: text
    content: Il fit ce qui est mal aux yeux de l'Eternel et il marcha sur la voie de Jéroboam en se livrant aux péchés que celui-ci avait fait commettre à Israël.
  '4':
  - type: text
    content: 'Toutefois, à cause de David, l''Eternel, son Dieu, lui donna un successeur à Jérusalem en établissant son fils après lui et en laissant subsister Jérusalem. '
  '5':
  - type: text
    content: 'En effet, David avait fait ce qui est droit aux yeux de l''Eternel et il ne s''était détourné d''aucun de ses commandements durant toute sa vie, excepté dans l''affaire d''Urie le Hittite. '
  '6':
  - type: text
    content: Il y eut néanmoins guerre entre Roboam et Jéroboam pendant toute la vie de Roboam.
  '7':
  - type: text
    content: Le reste des actes d'Abijam, tout ce qu'il a accompli, cela est décrit dans les annales des rois de Juda. Il y eut guerre entre Abijam et Jéroboam.
  '8':
  - type: text
    content: Abijam se coucha avec ses ancêtres et on l'enterra dans la ville de David. Son fils Asa devint roi à sa place.
  - type: heading
    content: Règne d'Asa sur Juda
  '9':
  - type: text
    content: 'La vingtième année du règne de Jéroboam sur Israël, Asa devint roi de Juda. '
