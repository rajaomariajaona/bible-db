document_id: ISA.63
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Un jour de vengeance
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Qui est celui-ci? Il arrive d'Edom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de Botsra, en habits rouges.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui est celui-ci? Eclatant dans sa tenue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il s'avance avec toute sa force.
- type: usfm
  marker: q1
  children:
  - type: text
    text: «C'est moi qui parle avec justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ai le pouvoir de sauver.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Pourquoi tes habits sont-ils rouges,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tes vêtements pareils à ceux de l'homme qui écrase le raisin dans une cuve?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: «J'ai été seul à travailler au pressoir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans personne d'aucun peuple avec moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les ai piétinés dans ma colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je les ai écrasés dans ma fureur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leur sang a jailli sur mes vêtements
- type: usfm
  marker: q1
  children:
  - type: text
    text: et j'ai sali tous mes habits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: En effet, un jour de vengeance était sur mon cœur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'année de mes rachetés était arrivée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: J'ai regardé, mais il n'y avait personne pour m'aider.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'étais consterné, mais il n'y avait personne pour me soutenir.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Alors mon bras m'a assuré le salut
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ma fureur m'a servi de soutien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: J'ai piétiné des peuples dans ma colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je les ai rendus ivres dans ma fureur
- type: usfm
  marker: q1
  children:
  - type: text
    text: et j'ai fait couler leur sang par terre.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rappel du passé
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je rappellerai les bontés de l'Eternel, ses actes dignes de louange,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout ce qu'il a fait pour nous.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je dirai tous les bienfaits qu'il a accordés à la communauté d'Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: conformément à ses compassions et à la richesse de ses bontés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il avait dit: «Assurément, ils sont mon peuple,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: des enfants qui ne s'adonneront pas au mensonge»,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il a été un sauveur pour eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Dans toutes leurs détresses, il a souffert avec eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'ange qui est devant lui les a sauvés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est lui-même qui les a rachetés, dans son amour et sa compassion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et constamment, par le passé, il les a soutenus et portés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Cependant, ils se sont révoltés, ils ont attristé son Esprit saint,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de sorte qu'il s'est transformé pour eux en ennemi, il a lui-même combattu contre eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Alors son peuple s'est souvenu des jours passés, de l'époque de Moïse.
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Où est-il, celui qui les a fait ressortir de la mer
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec les bergers de son troupeau?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Où est-il, celui qui mettait son Esprit saint au milieu d'eux?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Où est-il, celui qui envoyait son bras splendide
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la droite de Moïse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui a fendu l'eau devant eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: se faisant ainsi une réputation éternelle?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Où est-il, celui qui les a conduits dans les profondeurs de l'eau
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un cheval dans le désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans même qu'ils trébuchent?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Comme à un troupeau qui gagne la vallée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'Esprit de l'Eternel leur a accordé le repos.»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voilà comment tu conduisais ton peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: te faisant ainsi une réputation splendide.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière du peuple
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: «Regarde du haut du ciel et constate la situation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'du haut de ta sainte et splendide résidence:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: où sont passés ton zèle et ta puissance?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ta profonde tendresse et tes compassions
- type: usfm
  marker: q1
  children:
  - type: text
    text: envers moi ne se font plus sentir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: C'est toi, cependant, qui es notre père.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, Abraham ne nous connaît pas
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Israël ignore qui nous sommes;
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est toi, Eternel, qui es notre père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est toi qui, depuis toujours, t'appelles notre libérateur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: »Eternel, pourquoi nous fais-tu errer loin de tes voies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pourquoi endurcis-tu notre cœur pour qu'il ne te craigne pas?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Reviens à cause de tes serviteurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause des tribus qui t'appartiennent!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ton peuple saint n'a été que peu de temps en possession du pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et nos adversaires ont piétiné ton sanctuaire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Nous sommes depuis longtemps comme un peuple sur lequel tu n'exerces pas ta souveraineté
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui n'est pas appelé de ton nom.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si seulement tu déchirais le ciel et descendais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les montagnes s'effondreraient devant toi!
