document_id: ISA.63,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Un jour de vengeance
  - type: text
    content: Qui est celui-ci? Il arrive d'Edom,
  - type: text
    content: de Botsra, en habits rouges.
  - type: text
    content: Qui est celui-ci? Eclatant dans sa tenue,
  - type: text
    content: il s'avance avec toute sa force.
  - type: text
    content: «C'est moi qui parle avec justice,
  - type: text
    content: qui ai le pouvoir de sauver.»
  '10':
  - type: text
    content: Cependant, ils se sont révoltés, ils ont attristé son Esprit saint,
  - type: text
    content: de sorte qu'il s'est transformé pour eux en ennemi, il a lui-même combattu contre eux.
  '11':
  - type: text
    content: Alors son peuple s'est souvenu des jours passés, de l'époque de Moïse.
  - type: text
    content: «Où est-il, celui qui les a fait ressortir de la mer
  - type: text
    content: avec les bergers de son troupeau?
  - type: text
    content: Où est-il, celui qui mettait son Esprit saint au milieu d'eux?
  '12':
  - type: text
    content: Où est-il, celui qui envoyait son bras splendide
  - type: text
    content: à la droite de Moïse,
  - type: text
    content: qui a fendu l'eau devant eux,
  - type: text
    content: se faisant ainsi une réputation éternelle?
  '13':
  - type: text
    content: Où est-il, celui qui les a conduits dans les profondeurs de l'eau
  - type: text
    content: comme un cheval dans le désert,
  - type: text
    content: sans même qu'ils trébuchent?
  '14':
  - type: text
    content: Comme à un troupeau qui gagne la vallée,
  - type: text
    content: l'Esprit de l'Eternel leur a accordé le repos.»
  - type: text
    content: Voilà comment tu conduisais ton peuple,
  - type: text
    content: te faisant ainsi une réputation splendide.
  - type: heading
    content: Prière du peuple
  '15':
  - type: text
    content: «Regarde du haut du ciel et constate la situation,
  - type: text
    content: 'du haut de ta sainte et splendide résidence:'
  - type: text
    content: où sont passés ton zèle et ta puissance?
  - type: text
    content: Ta profonde tendresse et tes compassions
  - type: text
    content: envers moi ne se font plus sentir.
  '16':
  - type: text
    content: C'est toi, cependant, qui es notre père.
  - type: text
    content: En effet, Abraham ne nous connaît pas
  - type: text
    content: et Israël ignore qui nous sommes;
  - type: text
    content: c'est toi, Eternel, qui es notre père,
  - type: text
    content: c'est toi qui, depuis toujours, t'appelles notre libérateur.
  '17':
  - type: text
    content: »Eternel, pourquoi nous fais-tu errer loin de tes voies,
  - type: text
    content: pourquoi endurcis-tu notre cœur pour qu'il ne te craigne pas?
  - type: text
    content: Reviens à cause de tes serviteurs,
  - type: text
    content: à cause des tribus qui t'appartiennent!
  '18':
  - type: text
    content: Ton peuple saint n'a été que peu de temps en possession du pays,
  - type: text
    content: et nos adversaires ont piétiné ton sanctuaire.
  '19':
  - type: text
    content: Nous sommes depuis longtemps comme un peuple sur lequel tu n'exerces pas ta souveraineté
  - type: text
    content: et qui n'est pas appelé de ton nom.
  - type: text
    content: Si seulement tu déchirais le ciel et descendais,
  - type: text
    content: les montagnes s'effondreraient devant toi!
  '2':
  - type: text
    content: Pourquoi tes habits sont-ils rouges,
  - type: text
    content: tes vêtements pareils à ceux de l'homme qui écrase le raisin dans une cuve?
  '3':
  - type: text
    content: «J'ai été seul à travailler au pressoir,
  - type: text
    content: sans personne d'aucun peuple avec moi.
  - type: text
    content: Je les ai piétinés dans ma colère,
  - type: text
    content: je les ai écrasés dans ma fureur.
  - type: text
    content: Leur sang a jailli sur mes vêtements
  - type: text
    content: et j'ai sali tous mes habits.
  '4':
  - type: text
    content: En effet, un jour de vengeance était sur mon cœur
  - type: text
    content: et l'année de mes rachetés était arrivée.
  '5':
  - type: text
    content: J'ai regardé, mais il n'y avait personne pour m'aider.
  - type: text
    content: J'étais consterné, mais il n'y avait personne pour me soutenir.
  - type: text
    content: Alors mon bras m'a assuré le salut
  - type: text
    content: et ma fureur m'a servi de soutien.
  '6':
  - type: text
    content: J'ai piétiné des peuples dans ma colère,
  - type: text
    content: je les ai rendus ivres dans ma fureur
  - type: text
    content: et j'ai fait couler leur sang par terre.»
  - type: heading
    content: Rappel du passé
  '7':
  - type: text
    content: Je rappellerai les bontés de l'Eternel, ses actes dignes de louange,
  - type: text
    content: tout ce qu'il a fait pour nous.
  - type: text
    content: Je dirai tous les bienfaits qu'il a accordés à la communauté d'Israël,
  - type: text
    content: conformément à ses compassions et à la richesse de ses bontés.
  '8':
  - type: text
    content: 'Il avait dit: «Assurément, ils sont mon peuple,'
  - type: text
    content: des enfants qui ne s'adonneront pas au mensonge»,
  - type: text
    content: et il a été un sauveur pour eux.
  '9':
  - type: text
    content: Dans toutes leurs détresses, il a souffert avec eux,
  - type: text
    content: et l'ange qui est devant lui les a sauvés.
  - type: text
    content: C'est lui-même qui les a rachetés, dans son amour et sa compassion,
  - type: text
    content: et constamment, par le passé, il les a soutenus et portés.
