document_id: JOB.5
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: »Crie donc! Mais y aura-t-il quelqu'un pour te répondre?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vers lequel des saints
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Saints: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: probable renvoi aux anges de Dieu (compris ainsi par la Septante).
    marker-yv: yv-n
  - type: text
    text: ' te tourneras-tu?'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: C'est l'exaspération qui tue le fou,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est la jalousie qui fait mourir l'ignorant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: J'ai vu le fou prendre racine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et soudain j'ai voué son domaine à la malédiction.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ses fils s'éloignent du salut;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils sont écrasés à la porte de la ville sans personne pour les délivrer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Sa moisson est dévorée par des affamés
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui viennent l'enlever jusque dans les ronces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et un piège guette ses richesses.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: De fait, l'injustice ne sort pas de la poussière
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le malheur ne pousse pas du sol.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: L'homme naît pour souffrir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout comme les étincelles s'élèvent pour voler.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: »Quant à moi, je rechercherais Dieu
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c'est à Dieu que j'exposerais ma cause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: C'est lui l'auteur de grandeurs qu'il est impossible d'explorer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de merveilles si nombreuses qu'il est impossible de les compter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: C'est lui qui verse la pluie à la surface de la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui envoie l'eau sur les campagnes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il relève ceux qui sont abattus
- type: usfm
  marker: q1
  children:
  - type: text
    text: et élève jusqu'au salut ceux qui sont dans le deuil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: C'est lui qui réduit à néant les projets des hommes rusés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si bien que leurs mains ne peuvent les faire réussir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '*Il prend les sages à leur propre ruse'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il prend… ruse: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Corinthiens 3.19
      metadata:
        usfm: 1CO.3.19
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et il devance les intentions des plus astucieux:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ils rencontrent les ténèbres au beau milieu de la journée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils tâtonnent en plein midi comme dans la nuit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Il sauve le pauvre de l'épée qui sort de leur bouche
- type: usfm
  marker: q1
  children:
  - type: text
    text: et de leur puissante oppression.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Ainsi, il y a de l'espérance pour le faible,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que l'injustice doit fermer la bouche.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: »Il est heureux, l'homme que Dieu corrige.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne rejette pas l'instruction du Tout-Puissant!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: En effet, c'est lui qui inflige la blessure, mais il la soigne.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il frappe, mais c'est sa main qui guérit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Six fois il te délivrera de la détresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sept fois le mal ne t'atteindra pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il te sauvera de la mort pendant la famine
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des coups de l'épée pendant la guerre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Tu seras à l'abri des agressions de la langue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu n'auras pas peur quand viendra la dévastation.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Tu te moqueras de la dévastation aussi bien que de la famine
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tu n'auras pas à redouter les animaux,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: car tu auras une alliance avec les pierres des champs
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les bêtes sauvages seront en paix avec toi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: »Tu connaîtras la paix dans ton foyer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu inspecteras ton domaine et il ne te manquera rien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tu verras une nombreuse descendance
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tes rejetons pousseront comme l'herbe des champs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Tu entreras dans la tombe encore plein de vigueur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout comme les épis sont engrangés le moment venu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Voilà ce que nous avons découvert, telle est la situation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: A toi de la comprendre et d'en tirer profit.»
