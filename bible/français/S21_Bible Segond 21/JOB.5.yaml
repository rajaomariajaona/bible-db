document_id: JOB.5,152
type_code: fra
verses:
  '1':
  - type: text
    content: »Crie donc! Mais y aura-t-il quelqu'un pour te répondre?
  - type: text
    content: Vers lequel des saints
  - type: note
    content: 'Saints: probable renvoi aux anges de Dieu (compris ainsi par la Septante).'
  - type: text
    content: ' te tourneras-tu?'
  '10':
  - type: text
    content: C'est lui qui verse la pluie à la surface de la terre,
  - type: text
    content: qui envoie l'eau sur les campagnes.
  '11':
  - type: text
    content: Il relève ceux qui sont abattus
  - type: text
    content: et élève jusqu'au salut ceux qui sont dans le deuil.
  '12':
  - type: text
    content: C'est lui qui réduit à néant les projets des hommes rusés,
  - type: text
    content: si bien que leurs mains ne peuvent les faire réussir.
  '13':
  - type: text
    content: '*Il prend les sages à leur propre ruse'
  - type: note
    content: 'Il prend… ruse: cité en 1 Corinthiens 3.19.'
  - type: text
    content: 'et il devance les intentions des plus astucieux:'
  '14':
  - type: text
    content: ils rencontrent les ténèbres au beau milieu de la journée,
  - type: text
    content: ils tâtonnent en plein midi comme dans la nuit.
  '15':
  - type: text
    content: Il sauve le pauvre de l'épée qui sort de leur bouche
  - type: text
    content: et de leur puissante oppression.
  '16':
  - type: text
    content: Ainsi, il y a de l'espérance pour le faible,
  - type: text
    content: tandis que l'injustice doit fermer la bouche.
  '17':
  - type: text
    content: »Il est heureux, l'homme que Dieu corrige.
  - type: text
    content: Ne rejette pas l'instruction du Tout-Puissant!
  '18':
  - type: text
    content: En effet, c'est lui qui inflige la blessure, mais il la soigne.
  - type: text
    content: Il frappe, mais c'est sa main qui guérit.
  '19':
  - type: text
    content: Six fois il te délivrera de la détresse,
  - type: text
    content: et sept fois le mal ne t'atteindra pas.
  '2':
  - type: text
    content: C'est l'exaspération qui tue le fou,
  - type: text
    content: c'est la jalousie qui fait mourir l'ignorant.
  '20':
  - type: text
    content: Il te sauvera de la mort pendant la famine
  - type: text
    content: et des coups de l'épée pendant la guerre.
  '21':
  - type: text
    content: Tu seras à l'abri des agressions de la langue,
  - type: text
    content: tu n'auras pas peur quand viendra la dévastation.
  '22':
  - type: text
    content: Tu te moqueras de la dévastation aussi bien que de la famine
  - type: text
    content: et tu n'auras pas à redouter les animaux,
  '23':
  - type: text
    content: car tu auras une alliance avec les pierres des champs
  - type: text
    content: et les bêtes sauvages seront en paix avec toi.
  '24':
  - type: text
    content: »Tu connaîtras la paix dans ton foyer.
  - type: text
    content: Tu inspecteras ton domaine et il ne te manquera rien.
  '25':
  - type: text
    content: Tu verras une nombreuse descendance
  - type: text
    content: et tes rejetons pousseront comme l'herbe des champs.
  '26':
  - type: text
    content: Tu entreras dans la tombe encore plein de vigueur,
  - type: text
    content: tout comme les épis sont engrangés le moment venu.
  '27':
  - type: text
    content: Voilà ce que nous avons découvert, telle est la situation.
  - type: text
    content: A toi de la comprendre et d'en tirer profit.»
  '3':
  - type: text
    content: J'ai vu le fou prendre racine,
  - type: text
    content: et soudain j'ai voué son domaine à la malédiction.
  '4':
  - type: text
    content: Ses fils s'éloignent du salut;
  - type: text
    content: ils sont écrasés à la porte de la ville sans personne pour les délivrer.
  '5':
  - type: text
    content: Sa moisson est dévorée par des affamés
  - type: text
    content: qui viennent l'enlever jusque dans les ronces,
  - type: text
    content: et un piège guette ses richesses.
  '6':
  - type: text
    content: De fait, l'injustice ne sort pas de la poussière
  - type: text
    content: et le malheur ne pousse pas du sol.
  '7':
  - type: text
    content: L'homme naît pour souffrir,
  - type: text
    content: tout comme les étincelles s'élèvent pour voler.
  '8':
  - type: text
    content: »Quant à moi, je rechercherais Dieu
  - type: text
    content: et c'est à Dieu que j'exposerais ma cause.
  '9':
  - type: text
    content: C'est lui l'auteur de grandeurs qu'il est impossible d'explorer,
  - type: text
    content: de merveilles si nombreuses qu'il est impossible de les compter.
