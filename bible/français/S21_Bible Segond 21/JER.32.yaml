document_id: JER.32,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Achat d'un champ par Jérémie
  - type: text
    content: Voici la parole adressée à Jérémie de la part de l'Eternel, la dixième année du règne de Sédécias sur Juda, qui était aussi la dix-huitième année du règne de Nebucadnetsar.
  '10':
  - type: text
    content: 'J''ai écrit un contrat, l''ai cacheté devant des témoins, puis j''ai pesé l''argent dans une balance. '
  '11':
  - type: text
    content: 'J''ai pris ensuite le contrat de vente qui était cacheté, avec ses dispositions générales et ses clauses, ainsi que celui qui était ouvert. '
  '12':
  - type: text
    content: 'J''ai remis le contrat de vente à Baruc, fils de Nérija et petit-fils de Machséja, en présence de Hanameel, le fils de mon oncle, des témoins qui avaient signé le contrat de vente et de tous les Judéens qui se trouvaient dans la cour de la prison. '
  '13':
  - type: text
    content: 'Devant eux j''ai donné cet ordre à Baruc: '
  '14':
  - type: text
    content: '‘Voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël: Prends ces documents, le contrat de vente qui est cacheté et celui qui est ouvert, et mets-les dans un vase de terre afin qu''ils se conservent longtemps. '
  '15':
  - type: text
    content: 'En effet, voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël: On achètera encore des maisons, des champs et des vignes, dans ce pays.’'
  '16':
  - type: text
    content: '»Après avoir remis le contrat de vente à Baruc, fils de Nérija, j''ai adressé cette prière à l''Eternel:'
  '17':
  - type: text
    content: ‘Seigneur Eternel,
  - type: text
    content: c'est toi qui as fait le ciel et la terre
  - type: text
    content: par ta grande puissance et ta force.
  - type: text
    content: Rien n'est trop difficile pour toi.
  '18':
  - type: text
    content: Tu fais preuve de bonté jusqu'à la millième génération
  - type: text
    content: et tu fais payer la faute des pères à leurs enfants après eux.
  - type: text
    content: Tu es le Dieu grand et puissant
  - type: text
    content: qui as pour nom l'Eternel, le maître de l'univers.
  '19':
  - type: text
    content: Tu es un excellent conseiller, généreux dans ton activité,
  - type: text
    content: toi qui examines toutes les voies des humains
  - type: text
    content: pour traiter chacun conformément à sa conduite,
  - type: text
    content: en fonction de ses agissements.
  '2':
  - type: text
    content: 'L''armée du roi de Babylone faisait alors le siège de Jérusalem et le prophète Jérémie était enfermé dans la cour de la prison qui se trouvait dans le palais du roi de Juda. '
  '20':
  - type: text
    content: »Tu as accompli des signes et des miracles en Egypte jusqu'à aujourd'hui,
  - type: text
    content: ainsi qu'en Israël et parmi les hommes,
  - type: text
    content: et tu t'es fait la réputation qui est la tienne aujourd'hui.
  '21':
  - type: text
    content: Tu as fait sortir d'Egypte ton peuple, Israël,
  - type: text
    content: avec des signes et des miracles, avec puissance et force,
  - type: text
    content: en provoquant une grande terreur.
  '22':
  - type: text
    content: Tu leur as donné ce pays,
  - type: text
    content: celui que tu avais promis à leurs ancêtres de leur donner,
  - type: text
    content: un pays où coulent le lait et le miel.
  '23':
  - type: text
    content: Ils sont venus et en ont pris possession.
  - type: text
    content: »Cependant, ils n'ont pas écouté ce que tu leur disais,
  - type: text
    content: ils n'ont pas respecté ta loi,
  - type: text
    content: ils n'ont pas fait tout ce que tu leur avais ordonné de faire.
  - type: text
    content: 'C''est alors que tu as fait fondre sur eux tous ces malheurs:'
  '24':
  - type: text
    content: voici qu'on construit des remblais contre la ville pour s'en emparer,
  - type: text
    content: Jérusalem est livrée aux Babyloniens qui l'attaquent,
  - type: text
    content: livrée à l'épée, à la famine et à la peste! Ce que tu as annoncé arrive, et tu le vois bien.
  '25':
  - type: text
    content: Pourtant, Seigneur Eternel, tu m'as ordonné
  - type: text
    content: de m'acheter un champ avec de l'argent, de le faire devant témoins,
  - type: text
    content: et ce alors que la ville est livrée aux Babyloniens!’»
  '26':
  - type: text
    content: 'La parole de l''Eternel fut adressée à Jérémie:'
  '27':
  - type: text
    content: «C'est moi qui suis l'Eternel, le Dieu de toute créature.
  - type: text
    content: Y a-t-il quoi que ce soit de trop difficile pour moi?
  '28':
  - type: text
    content: 'C''est pourquoi, voici ce que dit l''Eternel:'
  - type: text
    content: Je vais livrer cette ville entre les mains des Babyloniens
  - type: text
    content: et de Nebucadnetsar, le roi de Babylone; il s'en emparera.
  '29':
  - type: text
    content: Les Babyloniens qui attaquent cette ville parviendront à y entrer;
  - type: text
    content: ils y mettront le feu et la brûleront,
  - type: text
    content: ainsi que les maisons où, sur les toits, ils ont fait brûler de l'encens en l'honneur de Baal
  - type: text
    content: et versé des offrandes liquides en l'honneur d'autres dieux,
  - type: text
    content: de sorte qu'ils m'ont irrité.
  '3':
  - type: text
    content: 'Sédécias, roi de Juda, l''avait fait enfermer en lui adressant ce reproche: «Pourquoi prophétises-tu comme tu le fais? En effet, tu affirmes: ‘Voici ce que dit l''Eternel: Je vais livrer cette ville entre les mains du roi de Babylone et il s''en emparera. '
  '30':
  - type: text
    content: En effet, les Israélites et les Judéens
  - type: text
    content: n'ont fait que ce qui est mal à mes yeux, et ce depuis leur jeunesse.
  - type: text
    content: Les Israélites n'ont fait que m'irriter
  - type: text
    content: par leur manière d'agir, déclare l'Eternel.
  '31':
  - type: text
    content: »Oui, cette ville a provoqué ma colère et ma fureur
  - type: text
    content: depuis le jour où ils l'ont construite jusqu'à aujourd'hui;
  - type: text
    content: aussi, je ne veux plus la voir
  '32':
  - type: text
    content: à cause de tout le mal que les Israélites et les Judéens
  - type: text
    content: ont fait au point de m'irriter,
  - type: text
    content: eux, leurs rois, leurs chefs, leurs prêtres et leurs prophètes,
  - type: text
    content: les hommes de Juda aussi bien que les habitants de Jérusalem.
  '33':
  - type: text
    content: Ils m'ont tourné le dos, ils ont arrêté de me regarder en face.
  - type: text
    content: Pourtant on les a enseignés, encore et encore, inlassablement,
  - type: text
    content: mais ils n'ont pas voulu tenir compte de la correction.
  '34':
  - type: text
    content: Ils ont placé leurs monstrueuses idoles
  - type: text
    content: dans le temple auquel mon nom est associé,
  - type: text
    content: de manière à le rendre impur.
  '35':
  - type: text
    content: Ils ont construit des hauts lieux en l'honneur de Baal, dans la vallée de Ben-Hinnom,
  - type: text
    content: pour offrir leurs fils et leurs filles en sacrifice à Moloc.
  - type: text
    content: Cela, je ne l'avais pas ordonné,
  - type: text
    content: 'cela ne m''était pas venu à la pensée:'
  - type: text
    content: commettre de telles horreurs
  - type: text
    content: pour faire pécher Juda!
  '36':
  - type: text
    content: »Et maintenant, voici ce que dit l'Eternel, le Dieu d'Israël,
  - type: text
    content: à l'intention de cette ville, que vous présentez
  - type: text
    content: comme livrée entre les mains du roi de Babylone,
  - type: text
    content: 'vaincue par l''épée, la famine et la peste:'
  '37':
  - type: text
    content: Je vais les rassembler de tous les pays où je les ai chassés
  - type: text
    content: en raison de ma colère, ma fureur et ma grande indignation.
  - type: text
    content: Je les ramènerai ici
  - type: text
    content: et je ferai en sorte qu'ils y habitent en sécurité.
  '38':
  - type: text
    content: '*Ils seront mon peuple'
  - type: text
    content: et moi, je serai leur Dieu.
  - type: note
    content: 'Ils seront… Dieu: affirmation reprise de Lévitique 26.12 et appliquée aux chrétiens en 2 Corinthiens 6.16.'
  '39':
  - type: text
    content: Je leur donnerai un seul cœur et un seul chemin
  - type: text
    content: afin qu'ils aient toujours la crainte de moi,
  - type: text
    content: pour leur bonheur et celui de leurs enfants après eux.
  '4':
  - type: text
    content: 'Sédécias, roi de Juda, n''échappera pas aux Babyloniens, mais il est certain qu''il sera livré entre les mains du roi de Babylone, il devra lui parler en face et le voir de ses yeux. '
  '40':
  - type: text
    content: Je conclurai avec eux une alliance éternelle,
  - type: text
    content: d'après laquelle je ne renoncerai plus à eux
  - type: text
    content: mais leur ferai du bien
  - type: text
    content: et mettrai la crainte qui m'est due dans leur cœur,
  - type: text
    content: pour qu'ils ne se détournent plus de moi.
  '41':
  - type: text
    content: Je prendrai plaisir à leur faire du bien
  - type: text
    content: et je les enracinerai vraiment dans ce pays,
  - type: text
    content: de tout mon cœur et de toute mon âme.
  '42':
  - type: text
    content: '»En effet, voici ce que dit l''Eternel:'
  - type: text
    content: De même que j'ai fait venir tous ces grands malheurs contre ce peuple,
  - type: text
    content: de même je ferai venir sur eux tout le bien que je leur promets.
  '43':
  - type: text
    content: On achètera des champs, dans ce pays
  - type: text
    content: que vous présentez
  - type: text
    content: comme une ruine sans hommes ni bêtes,
  - type: text
    content: livrée entre les mains des Babyloniens.
  '44':
  - type: text
    content: On achètera des champs avec de l'argent,
  - type: text
    content: on écrira des contrats, on les cachètera, on prendra des témoins
  - type: text
    content: dans le pays de Benjamin et les environs de Jérusalem,
  - type: text
    content: dans les villes de Juda, dans celles de la montagne,
  - type: text
    content: de la plaine et du sud,
  - type: text
    content: car je ramènerai leurs déportés, déclare l'Eternel.»
  '5':
  - type: text
    content: Nebucadnetsar emmènera Sédécias à Babylone où il restera jusqu'à ce que je m'occupe de lui, déclare l'Eternel. Si vous combattez les Babyloniens, vous n'aurez aucun succès.’»
  '6':
  - type: text
    content: 'Jérémie dit: «Voici la parole que l''Eternel m''a adressée: '
  '7':
  - type: text
    content: '‘Hanameel, le fils de ton oncle Shallum, va venir te trouver pour te demander d''acheter son champ qui se trouve à Anathoth, car tu as un droit de rachat pour l''acquérir.’ '
  '8':
  - type: text
    content: 'Effectivement, Hanameel, le fils de mon oncle, est venu me trouver dans la cour de la prison, conformément à la parole de l''Eternel, et m''a dit: ‘Je t''en prie, achète mon champ qui se trouve à Anathoth, dans le pays de Benjamin, car tu as un droit d''héritage et de rachat. Achète-le donc!’ J''ai alors su que c''était bien une parole de l''Eternel. '
  '9':
  - type: text
    content: 'J''ai donc acheté le champ de Hanameel, le fils de mon oncle, qui est à Anathoth, et je lui ai pesé l''argent, soit 17 pièces d''argent. '
