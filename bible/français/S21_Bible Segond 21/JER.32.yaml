document_id: JER.32,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Achat d'un champ par Jérémie
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Voici la parole adressée à Jérémie de la part de l'Eternel, la dixième année du règne de Sédécias sur Juda, qui était aussi la dix-huitième année du règne de Nebucadnetsar.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai écrit un contrat, l''ai cacheté devant des témoins, puis j''ai pesé l''argent dans une balance. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai pris ensuite le contrat de vente qui était cacheté, avec ses dispositions générales et ses clauses, ainsi que celui qui était ouvert. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai remis le contrat de vente à Baruc, fils de Nérija et petit-fils de Machséja, en présence de Hanameel, le fils de mon oncle, des témoins qui avaient signé le contrat de vente et de tous les Judéens qui se trouvaient dans la cour de la prison. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Devant eux j''ai donné cet ordre à Baruc: '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘Voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël: Prends ces documents, le contrat de vente qui est cacheté et celui qui est ouvert, et mets-les dans un vase de terre afin qu''ils se conservent longtemps. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël: On achètera encore des maisons, des champs et des vignes, dans ce pays.’'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Après avoir remis le contrat de vente à Baruc, fils de Nérija, j''ai adressé cette prière à l''Eternel:'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Seigneur Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est toi qui as fait le ciel et la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par ta grande puissance et ta force.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Rien n'est trop difficile pour toi.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu fais preuve de bonté jusqu'à la millième génération
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu fais payer la faute des pères à leurs enfants après eux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es le Dieu grand et puissant
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui as pour nom l'Eternel, le maître de l'univers.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es un excellent conseiller, généreux dans ton activité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi qui examines toutes les voies des humains
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour traiter chacun conformément à sa conduite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en fonction de ses agissements.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''armée du roi de Babylone faisait alors le siège de Jérusalem et le prophète Jérémie était enfermé dans la cour de la prison qui se trouvait dans le palais du roi de Juda. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Tu as accompli des signes et des miracles en Egypte jusqu'à aujourd'hui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi qu'en Israël et parmi les hommes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu t'es fait la réputation qui est la tienne aujourd'hui.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu as fait sortir d'Egypte ton peuple, Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec des signes et des miracles, avec puissance et force,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en provoquant une grande terreur.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu leur as donné ce pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui que tu avais promis à leurs ancêtres de leur donner,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un pays où coulent le lait et le miel.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont venus et en ont pris possession.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Cependant, ils n'ont pas écouté ce que tu leur disais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils n'ont pas respecté ta loi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils n'ont pas fait tout ce que tu leur avais ordonné de faire.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C''est alors que tu as fait fondre sur eux tous ces malheurs:'
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voici qu'on construit des remblais contre la ville pour s'en emparer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jérusalem est livrée aux Babyloniens qui l'attaquent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: livrée à l'épée, à la famine et à la peste! Ce que tu as annoncé arrive, et tu le vois bien.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourtant, Seigneur Eternel, tu m'as ordonné
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de m'acheter un champ avec de l'argent, de le faire devant témoins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ce alors que la ville est livrée aux Babyloniens!’»
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'La parole de l''Eternel fut adressée à Jérémie:'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «C'est moi qui suis l'Eternel, le Dieu de toute créature.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Y a-t-il quoi que ce soit de trop difficile pour moi?
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C''est pourquoi, voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais livrer cette ville entre les mains des Babyloniens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de Nebucadnetsar, le roi de Babylone; il s'en emparera.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les Babyloniens qui attaquent cette ville parviendront à y entrer;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils y mettront le feu et la brûleront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi que les maisons où, sur les toits, ils ont fait brûler de l'encens en l'honneur de Baal
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et versé des offrandes liquides en l'honneur d'autres dieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de sorte qu'ils m'ont irrité.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sédécias, roi de Juda, l''avait fait enfermer en lui adressant ce reproche: «Pourquoi prophétises-tu comme tu le fais? En effet, tu affirmes: ‘Voici ce que dit l''Eternel: Je vais livrer cette ville entre les mains du roi de Babylone et il s''en emparera. '
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, les Israélites et les Judéens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: n'ont fait que ce qui est mal à mes yeux, et ce depuis leur jeunesse.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les Israélites n'ont fait que m'irriter
  - type: usfm
    marker: q1
    children:
    - type: text
      text: par leur manière d'agir, déclare l'Eternel.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Oui, cette ville a provoqué ma colère et ma fureur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: depuis le jour où ils l'ont construite jusqu'à aujourd'hui;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aussi, je ne veux plus la voir
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de tout le mal que les Israélites et les Judéens
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ont fait au point de m'irriter,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eux, leurs rois, leurs chefs, leurs prêtres et leurs prophètes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les hommes de Juda aussi bien que les habitants de Jérusalem.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils m'ont tourné le dos, ils ont arrêté de me regarder en face.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourtant on les a enseignés, encore et encore, inlassablement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ils n'ont pas voulu tenir compte de la correction.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont placé leurs monstrueuses idoles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans le temple auquel mon nom est associé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de manière à le rendre impur.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont construit des hauts lieux en l'honneur de Baal, dans la vallée de Ben-Hinnom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour offrir leurs fils et leurs filles en sacrifice à Moloc.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cela, je ne l'avais pas ordonné,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'cela ne m''était pas venu à la pensée:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: commettre de telles horreurs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour faire pécher Juda!
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Et maintenant, voici ce que dit l'Eternel, le Dieu d'Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à l'intention de cette ville, que vous présentez
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme livrée entre les mains du roi de Babylone,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'vaincue par l''épée, la famine et la peste:'
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais les rassembler de tous les pays où je les ai chassés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en raison de ma colère, ma fureur et ma grande indignation.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je les ramènerai ici
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je ferai en sorte qu'ils y habitent en sécurité.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*Ils seront mon peuple'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et moi, je serai leur Dieu.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '32.38 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ils seront… Dieu: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'affirmation reprise de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lévitique 26.12
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' et appliquée aux chrétiens en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Corinthiens 6.16
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je leur donnerai un seul cœur et un seul chemin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin qu'ils aient toujours la crainte de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour leur bonheur et celui de leurs enfants après eux.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sédécias, roi de Juda, n''échappera pas aux Babyloniens, mais il est certain qu''il sera livré entre les mains du roi de Babylone, il devra lui parler en face et le voir de ses yeux. '
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je conclurai avec eux une alliance éternelle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: d'après laquelle je ne renoncerai plus à eux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais leur ferai du bien
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et mettrai la crainte qui m'est due dans leur cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour qu'ils ne se détournent plus de moi.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je prendrai plaisir à leur faire du bien
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je les enracinerai vraiment dans ce pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de tout mon cœur et de toute mon âme.
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»En effet, voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De même que j'ai fait venir tous ces grands malheurs contre ce peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de même je ferai venir sur eux tout le bien que je leur promets.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On achètera des champs, dans ce pays
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que vous présentez
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme une ruine sans hommes ni bêtes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: livrée entre les mains des Babyloniens.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On achètera des champs avec de l'argent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on écrira des contrats, on les cachètera, on prendra des témoins
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans le pays de Benjamin et les environs de Jérusalem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans les villes de Juda, dans celles de la montagne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de la plaine et du sud,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je ramènerai leurs déportés, déclare l'Eternel.»
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Nebucadnetsar emmènera Sédécias à Babylone où il restera jusqu'à ce que je m'occupe de lui, déclare l'Eternel. Si vous combattez les Babyloniens, vous n'aurez aucun succès.’»
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jérémie dit: «Voici la parole que l''Eternel m''a adressée: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '‘Hanameel, le fils de ton oncle Shallum, va venir te trouver pour te demander d''acheter son champ qui se trouve à Anathoth, car tu as un droit de rachat pour l''acquérir.’ '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Effectivement, Hanameel, le fils de mon oncle, est venu me trouver dans la cour de la prison, conformément à la parole de l''Eternel, et m''a dit: ‘Je t''en prie, achète mon champ qui se trouve à Anathoth, dans le pays de Benjamin, car tu as un droit d''héritage et de rachat. Achète-le donc!’ J''ai alors su que c''était bien une parole de l''Eternel. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai donc acheté le champ de Hanameel, le fils de mon oncle, qui est à Anathoth, et je lui ai pesé l''argent, soit 17 pièces d''argent. '
