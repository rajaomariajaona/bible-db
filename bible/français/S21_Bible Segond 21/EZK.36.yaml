document_id: EZK.36,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Rétablissement d'Israël
  - type: text
    content: '»Et toi, fils de l''homme, prophétise à l''intention des montagnes d''Israël! Tu diras: Montagnes d''Israël, écoutez la parole de l''Eternel! '
  '10':
  - type: text
    content: 'Je vais augmenter votre population d''hommes, la communauté d''Israël tout entière. Les villes seront habitées et l''on reconstruira sur les ruines. '
  '11':
  - type: text
    content: 'Je vais augmenter votre population d''hommes et d''animaux: ils se reproduiront et deviendront nombreux. Je vous peuplerai comme par le passé et je vous ferai plus de bien qu''auparavant. Vous reconnaîtrez alors que je suis l''Eternel. '
  '12':
  - type: text
    content: Sur toi, terre d'Israël, je ferai marcher des hommes, mon peuple, Israël, et ils te posséderont. Tu seras leur héritage et tu arrêteras de les priver d'enfants.
  '13':
  - type: text
    content: '»Voici ce que dit le Seigneur, l''Eternel: Certains disent: ‘Tu es un pays qui dévore les hommes, tu prives ta nation d''enfants.’ '
  '14':
  - type: text
    content: 'A cause de cela, tu ne dévoreras plus d''hommes, tu ne priveras plus ta nation d''enfants, déclare le Seigneur, l''Eternel. '
  '15':
  - type: text
    content: Je ne te ferai plus entendre les humiliations des nations et tu n'auras plus à supporter les insultes des peuples. Tu n'affaibliras plus ta nation, déclare le Seigneur, l'Eternel.»
  '16':
  - type: text
    content: 'La parole de l''Eternel m''a été adressée: '
  '17':
  - type: text
    content: '«Fils de l''homme, les membres de la communauté d''Israël habitaient sur leur terre, mais ils l''ont rendue impure par leur conduite et leurs agissements. Leur conduite a été devant moi pareille à l''impureté d''une femme pendant ses règles. '
  '18':
  - type: text
    content: 'Alors j''ai déversé ma fureur sur eux à cause du sang qu''ils avaient versé dans le pays et des idoles par lesquelles ils l''avaient rendu impur. '
  '19':
  - type: text
    content: 'Je les ai éparpillés parmi les nations et ils ont été dispersés dans divers pays. Je les ai jugés conformément à leur conduite et à leurs agissements. '
  '2':
  - type: text
    content: 'Voici ce que dit le Seigneur, l''Eternel: L''ennemi a dit à propos de vous: ‘C''est bien fait! Ces hauteurs millénaires sont en notre possession.’ '
  '20':
  - type: text
    content: 'Arrivés chez les nations où ils devaient se rendre, ils ont déshonoré mon saint nom puisqu''on disait d''eux: ‘C''est le peuple de l''Eternel, c''est de son pays qu''ils sont sortis.’ '
  '21':
  - type: text
    content: Alors j'ai voulu épargner mon saint nom, que la communauté d'Israël déshonorait dans les nations où elle s'était rendue.
  '22':
  - type: text
    content: '»C''est pourquoi, annonce à la communauté d''Israël: Voici ce que dit le Seigneur, l''Eternel: Ce n''est pas à cause de vous que j''interviens, communauté d''Israël, mais c''est pour mon saint nom, puisque vous l''avez déshonoré dans les nations où vous vous êtes rendus. '
  '23':
  - type: text
    content: 'Je démontrerai la sainteté de mon grand nom qui a été déshonoré parmi les nations, puisque vous l''avez déshonoré au milieu d''elles, et les nations reconnaîtront que je suis l''Eternel, déclare le Seigneur, l''Eternel, quand à travers vous je manifesterai ma sainteté sous leurs yeux. '
  '24':
  - type: text
    content: Je vous arracherai aux nations, je vous rassemblerai de tous les pays et je vous ramènerai sur votre territoire.
  '25':
  - type: text
    content: '»Je vous aspergerai d''eau pure et vous serez purifiés. Je vous purifierai de toutes vos impuretés et de toutes vos idoles. '
  '26':
  - type: text
    content: 'Je vous donnerai un cœur nouveau et je mettrai en vous un esprit nouveau. Je retirerai de votre corps le cœur de pierre et je vous donnerai un cœur de chair. '
  '27':
  - type: text
    content: 'C''est mon Esprit que je mettrai en vous. Ainsi, je vous ferai suivre mes prescriptions, garder et respecter mes règles. '
  '28':
  - type: text
    content: Vous habiterez le pays que j'ai donné à vos ancêtres, vous serez mon peuple et je serai votre Dieu.
  '29':
  - type: text
    content: '»Je vous sauverai de toutes vos impuretés. Je ferai apparaître le blé et je le multiplierai, je ne vous frapperai plus de famine. '
  '3':
  - type: text
    content: 'C''est pourquoi, prophétise! Tu annonceras: ‘Voici ce que dit le Seigneur, l''Eternel: Puisqu''on vous a dévastées et harcelées de tous côtés pour que vous deveniez la propriété des autres nations, puisque vous avez été l''objet de commérages et de racontars populaires, '
  '30':
  - type: text
    content: 'Je multiplierai les fruits des arbres et les produits des champs afin que vous ne connaissiez plus le déshonneur de la famine parmi les nations. '
  '31':
  - type: text
    content: 'Alors vous vous souviendrez de votre mauvaise conduite et de vos agissements incorrects. Vous vous prendrez vous-mêmes en dégoût à cause de vos fautes et de vos pratiques abominables. '
  '32':
  - type: text
    content: Ce n'est pas à cause de vous que j'interviens, déclare le Seigneur, l'Eternel, sachez-le bien! Ayez honte et rougissez de votre conduite, communauté d'Israël!
  '33':
  - type: text
    content: '»Voici ce que dit le Seigneur, l''Eternel: Le jour où je vous purifierai de toutes vos fautes, je repeuplerai les villes et les ruines seront relevées. '
  '34':
  - type: text
    content: 'La terre dévastée sera cultivée, au lieu d''être un désert aux yeux de tous les passants. '
  '35':
  - type: text
    content: 'Alors on dira: ‘Cette terre dévastée est devenue pareille à un jardin d''Eden, et ces villes qui étaient en ruine, désertes et abattues sont maintenant fortifiées et habitées.’ '
  '36':
  - type: text
    content: Alors les nations qui resteront autour de vous reconnaîtront que c'est moi, l'Eternel, qui ai reconstruit ce qui était abattu et planté ce qui était dévasté. Moi, l'Eternel, j'ai parlé, et j'agirai.
  '37':
  - type: text
    content: '»Voici ce que dit le Seigneur, l''Eternel: Je me laisserai de nouveau consulter par la communauté d''Israël afin d''agir en leur faveur et je multiplierai les hommes comme un troupeau. '
  '38':
  - type: text
    content: Les villes en ruine seront remplies de troupeaux d'êtres humains pareils aux troupeaux consacrés, aux troupeaux de Jérusalem pendant ses fêtes. Ils reconnaîtront alors que je suis l'Eternel.»
  '4':
  - type: text
    content: montagnes d'Israël, écoutez la parole du Seigneur, de l'Eternel!’
  - type: text
    content: '»Voici ce que dit le Seigneur, l''Eternel, aux montagnes et aux collines, aux cours d''eau et aux vallées, aux ruines désertes et aux villes abandonnées qui ont été livrées au pillage et à la moquerie des autres nations environnantes, '
  '5':
  - type: text
    content: 'voici ce que dit le Seigneur, l''Eternel: Dans le feu de ma jalousie, je parle contre les autres nations et contre Edom tout entier, eux qui se sont attribué mon pays en propriété, le cœur tout joyeux et la hargne dans l''âme, afin d''en piller les pâturages.'
  '6':
  - type: text
    content: '»C''est pourquoi, prophétise à propos du territoire d''Israël! Tu annonceras aux montagnes et aux collines, aux cours d''eau et aux vallées: ‘Voici ce que dit le Seigneur, l''Eternel: Me voici! Je parle de cette manière à cause de ma jalousie et de ma fureur, parce que vous devez supporter l''humiliation que vous font subir les nations.’ '
  '7':
  - type: text
    content: 'C''est pourquoi, voici ce que dit le Seigneur, l''Eternel: Je m''y engage moi-même, les nations qui vous entourent devront à leur tour supporter leur humiliation. '
  '8':
  - type: text
    content: 'Quant à vous, montagnes d''Israël, vous ferez pousser vos branches et vous porterez vos fruits pour mon peuple, Israël, car ils vont bientôt revenir. '
  '9':
  - type: text
    content: 'Je m''occupe de vous, je me tourne vers vous et vous serez cultivées et ensemencées. '
