document_id: EZK.36
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rétablissement d'Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Et toi, fils de l''homme, prophétise à l''intention des montagnes d''Israël! Tu diras: Montagnes d''Israël, écoutez la parole de l''Eternel! '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici ce que dit le Seigneur, l''Eternel: L''ennemi a dit à propos de vous: ‘C''est bien fait! Ces hauteurs millénaires sont en notre possession.’ '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'C''est pourquoi, prophétise! Tu annonceras: ‘Voici ce que dit le Seigneur, l''Eternel: Puisqu''on vous a dévastées et harcelées de tous côtés pour que vous deveniez la propriété des autres nations, puisque vous avez été l''objet de commérages et de racontars populaires, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: montagnes d'Israël, écoutez la parole du Seigneur, de l'Eternel!’
- type: usfm
  marker: p
  children:
  - type: text
    text: '»Voici ce que dit le Seigneur, l''Eternel, aux montagnes et aux collines, aux cours d''eau et aux vallées, aux ruines désertes et aux villes abandonnées qui ont été livrées au pillage et à la moquerie des autres nations environnantes, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'voici ce que dit le Seigneur, l''Eternel: Dans le feu de ma jalousie, je parle contre les autres nations et contre Edom tout entier, eux qui se sont attribué mon pays en propriété, le cœur tout joyeux et la hargne dans l''âme, afin d''en piller les pâturages.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '»C''est pourquoi, prophétise à propos du territoire d''Israël! Tu annonceras aux montagnes et aux collines, aux cours d''eau et aux vallées: ‘Voici ce que dit le Seigneur, l''Eternel: Me voici! Je parle de cette manière à cause de ma jalousie et de ma fureur, parce que vous devez supporter l''humiliation que vous font subir les nations.’ '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'C''est pourquoi, voici ce que dit le Seigneur, l''Eternel: Je m''y engage moi-même, les nations qui vous entourent devront à leur tour supporter leur humiliation. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Quant à vous, montagnes d''Israël, vous ferez pousser vos branches et vous porterez vos fruits pour mon peuple, Israël, car ils vont bientôt revenir. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Je m''occupe de vous, je me tourne vers vous et vous serez cultivées et ensemencées. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Je vais augmenter votre population d''hommes, la communauté d''Israël tout entière. Les villes seront habitées et l''on reconstruira sur les ruines. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Je vais augmenter votre population d''hommes et d''animaux: ils se reproduiront et deviendront nombreux. Je vous peuplerai comme par le passé et je vous ferai plus de bien qu''auparavant. Vous reconnaîtrez alors que je suis l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Sur toi, terre d'Israël, je ferai marcher des hommes, mon peuple, Israël, et ils te posséderont. Tu seras leur héritage et tu arrêteras de les priver d'enfants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '»Voici ce que dit le Seigneur, l''Eternel: Certains disent: ‘Tu es un pays qui dévore les hommes, tu prives ta nation d''enfants.’ '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'A cause de cela, tu ne dévoreras plus d''hommes, tu ne priveras plus ta nation d''enfants, déclare le Seigneur, l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Je ne te ferai plus entendre les humiliations des nations et tu n'auras plus à supporter les insultes des peuples. Tu n'affaibliras plus ta nation, déclare le Seigneur, l'Eternel.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'La parole de l''Eternel m''a été adressée: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '«Fils de l''homme, les membres de la communauté d''Israël habitaient sur leur terre, mais ils l''ont rendue impure par leur conduite et leurs agissements. Leur conduite a été devant moi pareille à l''impureté d''une femme pendant ses règles. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors j''ai déversé ma fureur sur eux à cause du sang qu''ils avaient versé dans le pays et des idoles par lesquelles ils l''avaient rendu impur. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Je les ai éparpillés parmi les nations et ils ont été dispersés dans divers pays. Je les ai jugés conformément à leur conduite et à leurs agissements. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Arrivés chez les nations où ils devaient se rendre, ils ont déshonoré mon saint nom puisqu''on disait d''eux: ‘C''est le peuple de l''Eternel, c''est de son pays qu''ils sont sortis.’ '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Alors j'ai voulu épargner mon saint nom, que la communauté d'Israël déshonorait dans les nations où elle s'était rendue.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '»C''est pourquoi, annonce à la communauté d''Israël: Voici ce que dit le Seigneur, l''Eternel: Ce n''est pas à cause de vous que j''interviens, communauté d''Israël, mais c''est pour mon saint nom, puisque vous l''avez déshonoré dans les nations où vous vous êtes rendus. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Je démontrerai la sainteté de mon grand nom qui a été déshonoré parmi les nations, puisque vous l''avez déshonoré au milieu d''elles, et les nations reconnaîtront que je suis l''Eternel, déclare le Seigneur, l''Eternel, quand à travers vous je manifesterai ma sainteté sous leurs yeux. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Je vous arracherai aux nations, je vous rassemblerai de tous les pays et je vous ramènerai sur votre territoire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: '»Je vous aspergerai d''eau pure et vous serez purifiés. Je vous purifierai de toutes vos impuretés et de toutes vos idoles. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Je vous donnerai un cœur nouveau et je mettrai en vous un esprit nouveau. Je retirerai de votre corps le cœur de pierre et je vous donnerai un cœur de chair. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'C''est mon Esprit que je mettrai en vous. Ainsi, je vous ferai suivre mes prescriptions, garder et respecter mes règles. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Vous habiterez le pays que j'ai donné à vos ancêtres, vous serez mon peuple et je serai votre Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '»Je vous sauverai de toutes vos impuretés. Je ferai apparaître le blé et je le multiplierai, je ne vous frapperai plus de famine. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Je multiplierai les fruits des arbres et les produits des champs afin que vous ne connaissiez plus le déshonneur de la famine parmi les nations. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Alors vous vous souviendrez de votre mauvaise conduite et de vos agissements incorrects. Vous vous prendrez vous-mêmes en dégoût à cause de vos fautes et de vos pratiques abominables. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Ce n'est pas à cause de vous que j'interviens, déclare le Seigneur, l'Eternel, sachez-le bien! Ayez honte et rougissez de votre conduite, communauté d'Israël!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '»Voici ce que dit le Seigneur, l''Eternel: Le jour où je vous purifierai de toutes vos fautes, je repeuplerai les villes et les ruines seront relevées. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'La terre dévastée sera cultivée, au lieu d''être un désert aux yeux de tous les passants. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Alors on dira: ‘Cette terre dévastée est devenue pareille à un jardin d''Eden, et ces villes qui étaient en ruine, désertes et abattues sont maintenant fortifiées et habitées.’ '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Alors les nations qui resteront autour de vous reconnaîtront que c'est moi, l'Eternel, qui ai reconstruit ce qui était abattu et planté ce qui était dévasté. Moi, l'Eternel, j'ai parlé, et j'agirai.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: '»Voici ce que dit le Seigneur, l''Eternel: Je me laisserai de nouveau consulter par la communauté d''Israël afin d''agir en leur faveur et je multiplierai les hommes comme un troupeau. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Les villes en ruine seront remplies de troupeaux d'êtres humains pareils aux troupeaux consacrés, aux troupeaux de Jérusalem pendant ses fêtes. Ils reconnaîtront alors que je suis l'Eternel.»
