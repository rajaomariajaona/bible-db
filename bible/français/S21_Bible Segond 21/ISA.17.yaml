document_id: ISA.17
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie sur la Syrie
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Message sur Damas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Damas sera supprimée; elle ne sera plus une ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle ne sera qu'un tas de ruines.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Les villes qui dépendent d'Aroër seront abandonnées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: livrées aux troupeaux;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils y coucheront, sans plus personne pour les effrayer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Il est réglé, le sort de la forteresse d'Ephraïm,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'du royaume de Damas et du reste de la Syrie:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est identique à celui de la gloire des Israélites,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l'Eternel, le maître de l'univers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ce jour-là, la gloire de Jacob diminuera
- type: usfm
  marker: q1
  children:
  - type: text
    text: et son embonpoint fondra.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ce sera comme lorsque le moissonneur récolte les gerbes de blé
- type: usfm
  marker: q1
  children:
  - type: text
    text: en attrapant les épis avec sa main,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme lorsqu'on ramasse les épis oubliés
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans la vallée des Rephaïm,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'il en restera quelques grappillons, comme quand on secoue l''olivier:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 2, 3 olives tout en haut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 4, 5 dans les branches porteuses de fruits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare l'Eternel, le Dieu d'Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ce jour-là, l'homme portera ses regards sur son créateur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ses yeux se tourneront vers le Saint d'Israël.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Son regard ne se portera plus sur les autels,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qu'il a faits de ses mains,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il ne contemplera plus ce que ses doigts ont fabriqué,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les poteaux sacrés et les piliers consacrés au soleil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ce jour-là, ses villes fortifiées seront abandonnées
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme forêts et sommets l'ont été
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'à l''approche des Israélites:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce sera un désert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: En effet, tu as oublié le Dieu qui était ton Sauveur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu ne t'es pas souvenu du rocher qui te servait de refuge.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est pourquoi tu as planté des jardins d'agrément,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as semé des plantes étrangères.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le jour où tu les as mises en terre, tu les as vues grandir;
- type: usfm
  marker: q1
  children:
  - type: text
    text: le matin même, tu les as vues bourgeonner,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais la récolte s'est enfuie au moment de la maladie
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le mal est sans remède.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Quel malheur! Quel vacarme font les peuples, dans leur nombre!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leur vacarme est pareil au grondement de la mer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quel tapage font les nations!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Leur tapage est pareil à celui d'une eau puissante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Les nations font le même tapage que les grandes eaux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cependant, il les menace et elles s'enfuient très loin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: chassées comme la paille des montagnes par le souffle du vent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un tourbillon de poussière devant une tempête.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Quand vient le soir, c'est une ruine soudaine;
- type: usfm
  marker: q1
  children:
  - type: text
    text: avant le matin, il ne reste plus rien!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voilà quelle est la part réservée à ceux qui nous dépouillent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quel est le sort de ceux qui nous pillent.
