document_id: ISA.17,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie sur la Syrie
  - type: text
    content: Message sur Damas.
  - type: text
    content: Damas sera supprimée; elle ne sera plus une ville,
  - type: text
    content: elle ne sera qu'un tas de ruines.
  '10':
  - type: text
    content: En effet, tu as oublié le Dieu qui était ton Sauveur,
  - type: text
    content: tu ne t'es pas souvenu du rocher qui te servait de refuge.
  - type: text
    content: C'est pourquoi tu as planté des jardins d'agrément,
  - type: text
    content: tu as semé des plantes étrangères.
  '11':
  - type: text
    content: Le jour où tu les as mises en terre, tu les as vues grandir;
  - type: text
    content: le matin même, tu les as vues bourgeonner,
  - type: text
    content: mais la récolte s'est enfuie au moment de la maladie
  - type: text
    content: et le mal est sans remède.
  '12':
  - type: text
    content: Quel malheur! Quel vacarme font les peuples, dans leur nombre!
  - type: text
    content: Leur vacarme est pareil au grondement de la mer.
  - type: text
    content: Quel tapage font les nations!
  - type: text
    content: Leur tapage est pareil à celui d'une eau puissante.
  '13':
  - type: text
    content: Les nations font le même tapage que les grandes eaux.
  - type: text
    content: Cependant, il les menace et elles s'enfuient très loin,
  - type: text
    content: chassées comme la paille des montagnes par le souffle du vent,
  - type: text
    content: comme un tourbillon de poussière devant une tempête.
  '14':
  - type: text
    content: Quand vient le soir, c'est une ruine soudaine;
  - type: text
    content: avant le matin, il ne reste plus rien!
  - type: text
    content: Voilà quelle est la part réservée à ceux qui nous dépouillent,
  - type: text
    content: quel est le sort de ceux qui nous pillent.
  '2':
  - type: text
    content: Les villes qui dépendent d'Aroër seront abandonnées,
  - type: text
    content: livrées aux troupeaux;
  - type: text
    content: ils y coucheront, sans plus personne pour les effrayer.
  '3':
  - type: text
    content: Il est réglé, le sort de la forteresse d'Ephraïm,
  - type: text
    content: 'du royaume de Damas et du reste de la Syrie:'
  - type: text
    content: il est identique à celui de la gloire des Israélites,
  - type: text
    content: déclare l'Eternel, le maître de l'univers.
  '4':
  - type: text
    content: Ce jour-là, la gloire de Jacob diminuera
  - type: text
    content: et son embonpoint fondra.
  '5':
  - type: text
    content: Ce sera comme lorsque le moissonneur récolte les gerbes de blé
  - type: text
    content: en attrapant les épis avec sa main,
  - type: text
    content: comme lorsqu'on ramasse les épis oubliés
  - type: text
    content: dans la vallée des Rephaïm,
  '6':
  - type: text
    content: 'il en restera quelques grappillons, comme quand on secoue l''olivier:'
  - type: text
    content: 2, 3 olives tout en haut,
  - type: text
    content: 4, 5 dans les branches porteuses de fruits,
  - type: text
    content: déclare l'Eternel, le Dieu d'Israël.
  '7':
  - type: text
    content: Ce jour-là, l'homme portera ses regards sur son créateur,
  - type: text
    content: ses yeux se tourneront vers le Saint d'Israël.
  '8':
  - type: text
    content: Son regard ne se portera plus sur les autels,
  - type: text
    content: qu'il a faits de ses mains,
  - type: text
    content: et il ne contemplera plus ce que ses doigts ont fabriqué,
  - type: text
    content: les poteaux sacrés et les piliers consacrés au soleil.
  '9':
  - type: text
    content: Ce jour-là, ses villes fortifiées seront abandonnées
  - type: text
    content: comme forêts et sommets l'ont été
  - type: text
    content: 'à l''approche des Israélites:'
  - type: text
    content: ce sera un désert.
