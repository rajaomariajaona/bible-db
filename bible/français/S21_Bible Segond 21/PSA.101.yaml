document_id: PSA.101,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Règne d'un roi intègre
  - type: text
    content: Psaume de David.
  - type: text
    content: Je chanterai la bonté et le droit;
  - type: text
    content: c'est toi, Eternel, que je célébrerai.
  '2':
  - type: text
    content: Je serai attentif à la voie des hommes intègres.
  - type: text
    content: Quand viendras-tu vers moi?
  - type: text
    content: Je marcherai avec un cœur intègre
  - type: text
    content: au milieu des miens.
  '3':
  - type: text
    content: Je ne mettrai rien de mauvais devant mes yeux.
  - type: text
    content: 'Je déteste la conduite des pécheurs:'
  - type: text
    content: elle n'aura aucune prise sur moi.
  '4':
  - type: text
    content: Le cœur pervers s'éloignera de moi;
  - type: text
    content: je ne veux pas connaître le méchant.
  '5':
  - type: text
    content: Celui qui dénigre en secret son prochain, je le réduirai au silence;
  - type: text
    content: celui qui a le regard hautain et un cœur orgueilleux, je ne le supporterai pas.
  '6':
  - type: text
    content: J'aurai les yeux sur les fidèles du pays
  - type: text
    content: pour qu'ils habitent près de moi;
  - type: text
    content: celui qui marche dans la voie des hommes intègres sera à mon service.
  '7':
  - type: text
    content: Celui qui se livre à la fraude n'habitera pas dans ma maison;
  - type: text
    content: celui qui dit des mensonges ne se tiendra pas devant moi.
  '8':
  - type: text
    content: Chaque matin, je réduirai au silence tous les méchants du pays,
  - type: text
    content: pour supprimer de la ville de l'Eternel
  - type: text
    content: tous ceux qui commettent l'injustice.
