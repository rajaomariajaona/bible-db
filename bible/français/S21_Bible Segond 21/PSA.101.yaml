document_id: PSA.101,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règne d'un roi intègre
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Psaume de David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je chanterai la bonté et le droit;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est toi, Eternel, que je célébrerai.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Je serai attentif à la voie des hommes intègres.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand viendras-tu vers moi?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je marcherai avec un cœur intègre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au milieu des miens.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Je ne mettrai rien de mauvais devant mes yeux.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je déteste la conduite des pécheurs:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle n'aura aucune prise sur moi.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Le cœur pervers s'éloignera de moi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ne veux pas connaître le méchant.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Celui qui dénigre en secret son prochain, je le réduirai au silence;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui a le regard hautain et un cœur orgueilleux, je ne le supporterai pas.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: J'aurai les yeux sur les fidèles du pays
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour qu'ils habitent près de moi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui marche dans la voie des hommes intègres sera à mon service.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Celui qui se livre à la fraude n'habitera pas dans ma maison;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui dit des mensonges ne se tiendra pas devant moi.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Chaque matin, je réduirai au silence tous les méchants du pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour supprimer de la ville de l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous ceux qui commettent l'injustice.
