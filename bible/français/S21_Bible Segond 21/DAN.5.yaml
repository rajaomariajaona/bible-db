document_id: DAN.5,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Chute de Babylone
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Le roi Belshatsar donna un grand festin à ses hauts fonctionnaires au nombre de 1000, et il but du vin en leur présence. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Alertée par les paroles du roi et de ses hauts fonctionnaires, la reine entra dans la salle du festin et dit: «Roi, puisses-tu vivre toujours! Ne te laisse pas terrifier par tes pensées et ne change pas de couleur! '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Il y a dans ton royaume un homme qui a en lui l''esprit des dieux saints. Déjà à l''époque de ton prédécesseur, on a trouvé chez lui des lumières, de l''intelligence et une sagesse semblable à la sagesse des dieux. Aussi, le roi Nebucadnetsar l''a désigné chef suprême des magiciens, des astrologues, des prêtres chaldéens et des devins. C''est ce qu''a fait ton prédécesseur sur le trône. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: En effet, on a trouvé chez lui, chez Daniel appelé Beltshatsar par le roi, un esprit supérieur, de la connaissance et de l'intelligence, la faculté d'interpréter les rêves, d'expliquer les énigmes et de résoudre les questions difficiles. Que Daniel soit donc convoqué et il révélera l'explication.»
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Alors Daniel fut conduit devant le roi. Le roi s''adressa à lui: «Es-tu Daniel, l''un des exilés de Juda que mon prédécesseur sur le trône a fait venir de Juda? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'J''ai appris à ton sujet que tu as en toi l''esprit des dieux et qu''on trouve chez toi des lumières, de l''intelligence et une sagesse extraordinaire. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'On vient d''amener devant moi les sages et les astrologues afin qu''ils lisent cette inscription et m''en fassent connaître l''explication, mais ils n''ont pas été capables de révéler l''explication des mots. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: J'ai appris que tu peux donner des explications et résoudre des questions difficiles. Maintenant, si tu peux lire cette inscription et m'en faire connaître l'explication, tu seras habillé de pourpre, tu porteras un collier en or à ton cou et tu auras la troisième place dans le gouvernement du royaume.»
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Daniel répondit devant le roi: «Garde tes dons pour toi et accorde tes récompenses à un autre! Je lirai néanmoins l''inscription au roi et je lui en ferai connaître l''explication. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Roi, le Dieu très-haut avait donné à ton prédécesseur Nebucadnetsar la royauté, la grandeur, la gloire et la majesté. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'A cause de la grandeur qu''il lui avait donnée, tous les peuples, les nations, les hommes de toute langue tremblaient et avaient peur devant lui. Le roi faisait mourir ceux qu''il voulait et laissait la vie à ceux qu''il voulait. Il donnait une position élevée à ceux qu''il voulait et abaissait ceux qu''il voulait. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Sous l''effet du vin, Belshatsar ordonna que l''on apporte les coupes en or et en argent que son prédécesseur Nebucadnetsar avait enlevées du temple de Jérusalem. C''était afin que le roi et ses hauts fonctionnaires, ainsi que ses femmes et ses concubines, s''en servent pour boire. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Cependant, lorsque son cœur s''est rempli d''orgueil et que son esprit s''est obstiné jusqu''à l''arrogance, il a été précipité de son trône royal et dépouillé de sa gloire. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Il a été chassé du milieu des hommes, son cœur est devenu semblable à celui des bêtes et il a habité avec les ânes sauvages. On lui a donné de l'herbe à manger, comme aux bœufs, et son corps a été trempé de la rosée du ciel, et ce jusqu'à ce qu'il reconnaisse que le Dieu très-haut domine sur toute royauté humaine et la donne à qui il le désire.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '»Et toi, Belshatsar, son successeur, tu n''as pas humilié ton cœur, alors que tu savais tout cela. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'C''est contre le Seigneur du ciel que tu t''es dressé. Tu as fait apporter devant toi les coupes de son temple et vous les avez utilisées pour boire du vin, toi et tes hauts fonctionnaires, ainsi que tes femmes et tes concubines. Tu as célébré les dieux en argent, en or, en bronze, en fer, en bois et en pierre, qui ne voient pas, qui n''entendent pas et qui ne savent rien, et tu n''as pas donné gloire au Dieu qui tient dans sa main ton souffle et tous tes chemins. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: C'est pourquoi il a envoyé cette partie de main qui a tracé cette inscription.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: '»Voici l''inscription qui a été tracée: ‘Compté, compté, pesé et divisé.’ '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Et voici l''explication de ces mots. Compté: Dieu a fait les comptes de ton règne et y a mis fin. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Pesé: tu as été pesé dans la balance et tu as été trouvé léger. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Divisé: ton royaume sera divisé et donné aux Mèdes et aux Perses.»'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: Aussitôt Belshatsar ordonna qu'on habille Daniel de pourpre, qu'on lui mette au cou un collier en or et qu'on proclame qu'il aurait la troisième place dans le gouvernement du royaume.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'On apporta alors les coupes en or qui avaient été enlevées du temple, de la maison de Dieu à Jérusalem, et le roi, ses hauts fonctionnaires, ses femmes et ses concubines les utilisèrent pour boire. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: La même nuit, Belshatsar, le roi des Babyloniens, fut tué.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ils burent du vin et ils célébrèrent les dieux en or, en argent, en bronze, en fer, en bois et en pierre.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'A ce moment-là apparurent les doigts d''une main humaine et ils écrivirent, devant le chandelier, sur le plâtre du mur du palais royal. Le roi vit cette partie de main qui écrivait. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Il changea alors de couleur, terrifié par ses pensées. Les jointures de ses hanches se relâchèrent et ses genoux se heurtèrent l''un contre l''autre. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Le roi cria avec force de faire venir les astrologues, les prêtres chaldéens et les devins. Puis, prenant la parole, il dit aux sages de Babylone: «Celui qui lira cette inscription et m''en révélera l''explication sera habillé de pourpre, portera un collier en or à son cou et aura la troisième place dans le gouvernement du royaume.» '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Tous les sages du roi entrèrent, mais ils furent incapables de lire l''inscription et d''en faire connaître l''explication au roi. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Le roi Belshatsar fut alors très effrayé et changea de couleur, et ses hauts fonctionnaires furent consternés.
