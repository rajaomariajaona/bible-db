document_id: 2SA.4,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Assassinat d'Ish-Bosheth
  - type: text
    content: Lorsque le fils de Saül
  - type: note
    content: 'Le fils de Saül: c''est-à-dire Ish-Bosheth.'
  - type: text
    content: ' apprit qu''Abner était mort à Hébron, ses mains restèrent sans force et tout Israël fut épouvanté. '
  '10':
  - type: text
    content: 'Celui qui est venu me dire: ‘Saül est mort’ et qui croyait m''annoncer une bonne nouvelle, je l''ai fait arrêter et tuer à Tsiklag pour lui donner le salaire de son message. '
  '11':
  - type: text
    content: 'Quand des méchants comme vous ont assassiné un homme juste dans sa maison et sur son lit, c''est d''autant plus volontiers que je vous redemanderai son sang, que vous avez versé, et vous ferai disparaître de la terre!» '
  '12':
  - type: text
    content: David ordonna alors à ses jeunes serviteurs de les tuer. Ils leur coupèrent les mains et les pieds et les suspendirent au bord de l'étang d'Hébron. Puis ils prirent la tête d'Ish-Bosheth et l'enterrèrent dans le tombeau d'Abner à Hébron.
  '2':
  - type: text
    content: 'Le fils de Saül avait deux chefs de bandes. L''un s''appelait Baana, et l''autre Récab; ils étaient les fils de Rimmon de Beéroth, membres de la tribu de Benjamin. Beéroth était en effet considérée comme faisant partie de Benjamin, '
  '3':
  - type: text
    content: 'et les Beérothiens s''étaient réfugiés à Guitthaïm, où ils ont habité jusqu''à aujourd''hui. '
  '4':
  - type: text
    content: Jonathan, le fils de Saül, avait un fils handicapé aux deux jambes. Il était âgé de 5 ans lorsque arriva de Jizreel la nouvelle de la mort de Saül et de Jonathan; sa nourrice le prit et s'enfuit, et comme elle se dépêchait de fuir, il tomba et resta estropié. Son nom était Mephibosheth.
  '5':
  - type: text
    content: 'Or, les fils de Rimmon de Beéroth, Récab et Baana, se rendirent à l''heure la plus chaude de la journée à la maison d''Ish-Bosheth, alors que celui-ci était couché pour la sieste de midi. '
  '6':
  - type: text
    content: 'Ils pénétrèrent jusqu''au milieu de la maison en apportant du blé et le frappèrent au ventre. Puis Récab et son frère Baana se sauvèrent. '
  '7':
  - type: text
    content: 'Ils entrèrent donc dans la maison pendant qu''il était étendu sur son lit dans sa chambre à coucher, le frappèrent à mort et lui coupèrent la tête. Ils prirent sa tête et marchèrent toute la nuit sur le chemin de la plaine. '
  '8':
  - type: text
    content: 'Ils apportèrent la tête d''Ish-Bosheth à David, à Hébron, et ils dirent au roi: «Voici la tête d''Ish-Bosheth, le fils de Saül, ton ennemi, qui en voulait à ta vie. L''Eternel venge aujourd''hui le roi, mon seigneur, de Saül et de sa descendance.» '
  '9':
  - type: text
    content: 'David répondit à Récab et à son frère Baana, les fils de Rimmon de Beéroth: «L''Eternel qui m''a délivré de tout danger est vivant! '
