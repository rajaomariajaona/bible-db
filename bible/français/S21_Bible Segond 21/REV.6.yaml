document_id: REV.6,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ouverture des six premiers sceaux
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Je vis alors l''Agneau ouvrir un des sept sceaux et j''entendis l''un des quatre êtres vivants dire d''une voix de tonnerre: «Viens.» '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ils crièrent d''une voix forte: «Jusqu''à quand, Maître saint et véritable, tarderas-tu à faire justice et à venger notre sang sur les habitants de la terre?» '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Une robe blanche fut donnée à chacun d'eux et ils reçurent l'ordre de rester en repos un petit moment encore, jusqu'à ce que le nombre de leurs compagnons de service et de leurs frères et sœurs qui devaient être mis à mort comme eux soit au complet.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Je regardai quand l''Agneau ouvrit le sixième sceau, et il y eut un grand tremblement de terre. Le soleil devint noir comme un sac de crin, la lune entière devint comme du sang, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'et les étoiles du ciel tombèrent sur la terre, comme les figues vertes d''un figuier secoué par un vent violent. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Le ciel se retira comme un livre qu''on enroule et toutes les montagnes et les îles furent écartées de leur place. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Les rois de la terre, les grands, les chefs militaires, les riches, les puissants, tous les esclaves et les hommes libres se cachèrent dans les cavernes et dans les rochers des montagnes. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Et '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: ils disaient aux montagnes
    - type: text
      text: 'et aux rochers: «'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tombez sur nous
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ils disaient… sur nous: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'renvoi à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Osée 10.8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' et cachez-nous loin de celui qui est assis sur le trône et loin de la colère de l''Agneau. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: En effet, le grand jour de sa colère est venu, et qui peut résister?»
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Je regardai et je vis apparaître un cheval blanc. Celui qui le montait avait un arc; une couronne lui fut donnée et il partit en vainqueur et pour remporter la victoire.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Quand il ouvrit le deuxième sceau, j''entendis le deuxième être vivant dire: «Viens.» '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Et un autre cheval, rouge feu, apparut. Celui qui le montait reçut le pouvoir d'enlever la paix de la terre afin que les hommes s'entretuent, et une grande épée lui fut donnée.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Quand l''Agneau ouvrit le troisième sceau, j''entendis le troisième être vivant dire: «Viens.» Je regardai et je vis apparaître un cheval noir. Celui qui le montait tenait une balance à la main. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Et j''entendis [comme] une voix dire, au milieu des quatre êtres vivants: «Une mesure de blé pour une pièce d''argent et trois mesures d''orge pour une pièce d''argent'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les denrées citées coûtent 10 à 12 fois plus cher que leur prix normal.
      marker-yv: yv-n
    - type: text
      text: ', mais ne touche pas à l''huile et au vin.»'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Quand il ouvrit le quatrième sceau, j''entendis le quatrième être vivant dire: «Viens.» '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Je regardai et je vis un cheval verdâtre. Celui qui le montait avait pour nom «la Mort», et le séjour des morts l'accompagnait. Ils reçurent le pouvoir, sur le quart de la terre, de faire mourir les hommes par l'épée, par la famine, par la peste et par les bêtes sauvages de la terre.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Quand il ouvrit le cinquième sceau, je vis sous l''autel l''âme de ceux qui avaient été mis à mort à cause de la parole de Dieu et à cause du témoignage qu''ils avaient rendu. '
