document_id: MRK.12,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Parabole des vignerons
  - type: text
    content: 'Jésus se mit ensuite à leur parler en paraboles: «Un homme planta une vigne. Il l''entoura d''une haie, creusa un pressoir et construisit une tour. Puis il la loua à des vignerons et quitta le pays. '
  '10':
  - type: text
    content: '»N''avez-vous pas lu cette parole de l''Ecriture: '
  - type: text
    content: La pierre qu'ont rejetée ceux qui construisaient est devenue la pierre angulaire;
  - type: text
    content: ' '
  '11':
  - type: text
    content: c'est l'œuvre du Seigneur, et c'est un prodige à nos yeux
  - type: note
    content: 'La pierre… yeux: citation du Psaume 118.22-23.'
  - type: text
    content: ?»
  '12':
  - type: text
    content: Ils cherchaient à l'arrêter, mais ils redoutaient les réactions de la foule. Ils avaient compris que c'était pour eux que Jésus avait dit cette parabole. Ils le laissèrent alors et s'en allèrent.
  - type: heading
    content: Tentatives de piéger Jésus
  '13':
  - type: text
    content: 'Ils envoyèrent auprès de Jésus quelques pharisiens et des hérodiens, afin de le prendre au piège de ses propres paroles. '
  '14':
  - type: text
    content: 'Ils vinrent lui dire: «Maître, nous savons que tes paroles sont vraies et que tu ne te laisses influencer par personne, car tu ne regardes pas à l''apparence des gens et tu enseignes le chemin de Dieu en toute vérité. Est-il permis, ou non, de payer l''impôt à l''empereur? Devons-nous payer ou ne pas payer?» '
  '15':
  - type: text
    content: 'Mais Jésus, connaissant leur hypocrisie, leur répondit: «Pourquoi me tendez-vous un piège? Apportez-moi une pièce de monnaie afin que je la voie.» '
  '16':
  - type: text
    content: 'Ils en apportèrent une. Jésus leur demanda: «De qui porte-t-elle l''effigie et l''inscription?» «De l''empereur», lui répondirent-ils. '
  '17':
  - type: text
    content: 'Alors il leur dit: «Rendez à l''empereur ce qui est à l''empereur et à Dieu ce qui est à Dieu.» Et ils furent dans l''étonnement à son sujet.'
  '18':
  - type: text
    content: Les sadducéens
  - type: note
    content: 'Sadducéens: membres d''un courant du judaïsme souvent associé aux prêtres et à l''aristocratie.'
  - type: text
    content: ', qui disent qu''il n''y a pas de résurrection, vinrent auprès de Jésus et lui posèrent cette question: '
  '19':
  - type: text
    content: '«Maître, voici ce que Moïse nous a prescrit: '
  - type: text
    content: Si un homme meurt
  - type: text
    content: et laisse une femme
  - type: text
    content: sans avoir d'enfants, son frère épousera la veuve et donnera une descendance à son frère
  - type: text
    content: .
  - type: note
    content: 'Si un homme… son frère: citation de Deutéronome 25.5.'
  - type: text
    content: ' '
  '2':
  - type: text
    content: 'Le moment venu, il envoya un serviteur vers les vignerons pour recevoir d''eux une part de récolte de la vigne. '
  '20':
  - type: text
    content: 'Or, il y avait sept frères. Le premier s''est marié et est mort sans laisser de descendance. '
  '21':
  - type: text
    content: 'Le deuxième a pris la veuve pour femme et est mort sans laisser de descendance. Il en est allé de même pour le troisième, '
  '22':
  - type: text
    content: 'et aucun des sept n''a laissé de descendance. Après eux tous, la femme est morte aussi. '
  '23':
  - type: text
    content: 'A la résurrection, duquel d''entre eux sera-t-elle la femme? En effet, les sept l''ont eue pour épouse.» '
  '24':
  - type: text
    content: 'Jésus leur répondit: «N''êtes-vous pas dans l''erreur parce que vous ne connaissez ni les Ecritures ni la puissance de Dieu? '
  '25':
  - type: text
    content: 'En effet, à la résurrection, les hommes et les femmes ne se marieront pas, mais ils seront comme les anges dans le ciel. '
  '26':
  - type: text
    content: 'En ce qui concerne la résurrection des morts, n''avez-vous pas lu dans le livre de Moïse ce que Dieu lui a dit, dans l''épisode du buisson: '
  - type: text
    content: Je suis le Dieu d'Abraham, le Dieu d'Isaac et le Dieu de Jacob
  - type: note
    content: 'Je suis… Jacob: citation d''Exode 3.6.'
  - type: text
    content: '? '
  '27':
  - type: text
    content: Dieu n'est pas le Dieu des morts, mais des vivants. Vous êtes complètement dans l'erreur.»
  '28':
  - type: text
    content: 'Un des spécialistes de la loi, qui les avait entendus discuter, vit que Jésus avait bien répondu aux sadducéens. Il s''approcha et lui demanda: «Quel est le premier de tous les commandements?» '
  '29':
  - type: text
    content: 'Jésus répondit: «Voici le premier: '
  - type: text
    content: Ecoute, Israël, le Seigneur, notre Dieu, est l'unique Seigneur
  - type: note
    content: 'Ecoute… Seigneur: citation de Deutéronome 6.4.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Ils s''emparèrent de lui, le battirent et le renvoyèrent les mains vides. '
  '30':
  - type: text
    content: et tu aimeras le Seigneur, ton Dieu, de tout ton cœur, de toute ton âme, de toute ta pensée et de toute ta force
  - type: note
    content: 'Tu aimeras… ta force: citation de Deutéronome 6.5.'
  - type: text
    content: '. '
  '31':
  - type: text
    content: 'Voici le deuxième: '
  - type: text
    content: Tu aimeras ton prochain comme toi-même.
  - type: note
    content: 'Tu aimeras… toi-même: citation de Lévitique 19.18.'
  - type: text
    content: ' Il n''y a pas d''autre commandement plus grand que ceux-là.» '
  '32':
  - type: text
    content: 'Le spécialiste de la loi lui dit: «Bien, maître. Tu as dit avec vérité que '
  - type: text
    content: Dieu est unique
  - type: text
    content: ', qu'''
  - type: text
    content: il n'y en a pas d'autre que lui
  - type: note
    content: 'Il n''y en a pas d''autre que lui: conséquence de la citation faite précédemment, explicitement formulée en Deutéronome 4.35.'
  - type: text
    content: ' '
  '33':
  - type: text
    content: 'et que '
  - type: text
    content: l'aimer de tout son cœur, de toute son intelligence, [de toute son âme] et de toute sa force, et aimer son prochain comme soi-même
  - type: text
    content: ', c''est plus que tous les holocaustes et tous les sacrifices.» '
  '34':
  - type: text
    content: 'Voyant qu''il avait répondu avec intelligence, Jésus lui dit: «Tu n''es pas loin du royaume de Dieu.» Personne n''osa plus lui poser de questions.'
  - type: heading
    content: Reproches de Jésus aux chefs religieux
  '35':
  - type: text
    content: 'Jésus continuait à enseigner dans le temple; il dit: «Comment les spécialistes de la loi peuvent-ils dire que le Messie est le fils de David'
  - type: note
    content: 'Fils de David: voir la note 10.47.'
  - type: text
    content: '? '
  '36':
  - type: text
    content: '[En effet,] David lui-même, animé par l''Esprit saint, a dit: '
  - type: text
    content: 'Le Seigneur a dit à mon Seigneur: ‘Assieds-toi à ma droite jusqu''à ce que j''aie fait de tes ennemis ton marchepied.’'
  - type: note
    content: 'Le Seigneur… marchepied: citation du Psaume 110.1.'
  - type: text
    content: ' '
  '37':
  - type: text
    content: David lui-même l'appelle Seigneur. Comment peut-il donc être son fils?» Et une grande foule l'écoutait avec plaisir.
  '38':
  - type: text
    content: 'Il leur disait dans son enseignement: «Attention aux spécialistes de la loi qui aiment se promener en longues robes et être salués sur les places publiques! '
  '39':
  - type: text
    content: 'Ils recherchent les sièges d''honneur dans les synagogues et les meilleures places dans les festins; '
  '4':
  - type: text
    content: 'Il envoya de nouveau vers eux un autre serviteur; ils [lui jetèrent des pierres,] le frappèrent à la tête et l''insultèrent. '
  '40':
  - type: text
    content: ils dépouillent les veuves de leurs biens tout en faisant pour l'apparence de longues prières. Ils seront jugés plus sévèrement.»
  '41':
  - type: text
    content: 'Jésus était assis vis-à-vis du tronc et regardait comment la foule y mettait de l''argent. De nombreux riches mettaient beaucoup. '
  '42':
  - type: text
    content: 'Une pauvre veuve vint aussi; elle y mit deux petites pièces, une toute petite somme. '
  '43':
  - type: text
    content: 'Alors Jésus appela ses disciples et leur dit: «Je vous le dis en vérité, cette pauvre veuve a donné plus que tous ceux qui ont mis dans le tronc, '
  '44':
  - type: text
    content: car tous ont pris de leur superflu pour mettre dans le tronc, tandis qu'elle, elle a mis de son nécessaire, tout ce qu'elle possédait, tout ce qu'elle avait pour vivre.»
  '5':
  - type: text
    content: 'Il en envoya un troisième et ils le tuèrent, puis beaucoup d''autres qu''ils battirent ou tuèrent. '
  '6':
  - type: text
    content: 'Il avait encore un fils bien-aimé; il l''envoya vers eux en dernier, disant: ‘Ils auront du respect pour mon fils.’ '
  '7':
  - type: text
    content: 'Mais ces vignerons dirent entre eux: ‘Voilà l''héritier. Venez, tuons-le et l''héritage sera à nous.’ '
  '8':
  - type: text
    content: 'Et ils s''emparèrent de lui, le tuèrent et le jetèrent hors de la vigne. '
  '9':
  - type: text
    content: Que fera donc le maître de la vigne? Il viendra, fera mourir les vignerons et donnera la vigne à d'autres.
