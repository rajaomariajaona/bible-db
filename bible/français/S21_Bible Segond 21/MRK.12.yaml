document_id: MRK.12,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Parabole des vignerons
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jésus se mit ensuite à leur parler en paraboles: «Un homme planta une vigne. Il l''entoura d''une haie, creusa un pressoir et construisit une tour. Puis il la loua à des vignerons et quitta le pays. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '»N''avez-vous pas lu cette parole de l''Ecriture: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: La pierre qu'ont rejetée ceux qui construisaient est devenue la pierre angulaire;
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: c'est l'œuvre du Seigneur, et c'est un prodige à nos yeux
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.10-11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'La pierre… yeux: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 118.22-23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ?»
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Ils cherchaient à l'arrêter, mais ils redoutaient les réactions de la foule. Ils avaient compris que c'était pour eux que Jésus avait dit cette parabole. Ils le laissèrent alors et s'en allèrent.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tentatives de piéger Jésus
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ils envoyèrent auprès de Jésus quelques pharisiens et des hérodiens, afin de le prendre au piège de ses propres paroles. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ils vinrent lui dire: «Maître, nous savons que tes paroles sont vraies et que tu ne te laisses influencer par personne, car tu ne regardes pas à l''apparence des gens et tu enseignes le chemin de Dieu en toute vérité. Est-il permis, ou non, de payer l''impôt à l''empereur? Devons-nous payer ou ne pas payer?» '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Mais Jésus, connaissant leur hypocrisie, leur répondit: «Pourquoi me tendez-vous un piège? Apportez-moi une pièce de monnaie afin que je la voie.» '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ils en apportèrent une. Jésus leur demanda: «De qui porte-t-elle l''effigie et l''inscription?» «De l''empereur», lui répondirent-ils. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Alors il leur dit: «Rendez à l''empereur ce qui est à l''empereur et à Dieu ce qui est à Dieu.» Et ils furent dans l''étonnement à son sujet.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Les sadducéens
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sadducéens: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: membres d'un courant du judaïsme souvent associé aux prêtres et à l'aristocratie.
      marker-yv: yv-n
    - type: text
      text: ', qui disent qu''il n''y a pas de résurrection, vinrent auprès de Jésus et lui posèrent cette question: '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: '«Maître, voici ce que Moïse nous a prescrit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Si un homme meurt
    - type: text
      text: et laisse une femme
    - type: usfm
      marker: qt
      children:
      - type: text
        text: sans avoir d'enfants, son frère épousera la veuve et donnera une descendance à son frère
    - type: text
      text: .
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Si un homme… son frère: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deutéronome 25.5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Le moment venu, il envoya un serviteur vers les vignerons pour recevoir d''eux une part de récolte de la vigne. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Or, il y avait sept frères. Le premier s''est marié et est mort sans laisser de descendance. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Le deuxième a pris la veuve pour femme et est mort sans laisser de descendance. Il en est allé de même pour le troisième, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'et aucun des sept n''a laissé de descendance. Après eux tous, la femme est morte aussi. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'A la résurrection, duquel d''entre eux sera-t-elle la femme? En effet, les sept l''ont eue pour épouse.» '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Jésus leur répondit: «N''êtes-vous pas dans l''erreur parce que vous ne connaissez ni les Ecritures ni la puissance de Dieu? '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'En effet, à la résurrection, les hommes et les femmes ne se marieront pas, mais ils seront comme les anges dans le ciel. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'En ce qui concerne la résurrection des morts, n''avez-vous pas lu dans le livre de Moïse ce que Dieu lui a dit, dans l''épisode du buisson: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Je suis le Dieu d'Abraham, le Dieu d'Isaac et le Dieu de Jacob
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je suis… Jacob: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Exode 3.6
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Dieu n'est pas le Dieu des morts, mais des vivants. Vous êtes complètement dans l'erreur.»
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Un des spécialistes de la loi, qui les avait entendus discuter, vit que Jésus avait bien répondu aux sadducéens. Il s''approcha et lui demanda: «Quel est le premier de tous les commandements?» '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Jésus répondit: «Voici le premier: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Ecoute, Israël, le Seigneur, notre Dieu, est l'unique Seigneur
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.29 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ecoute… Seigneur: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deutéronome 6.4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ils s''emparèrent de lui, le battirent et le renvoyèrent les mains vides. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: et tu aimeras le Seigneur, ton Dieu, de tout ton cœur, de toute ton âme, de toute ta pensée et de toute ta force
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.30 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu aimeras… ta force: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deutéronome 6.5
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Voici le deuxième: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu aimeras ton prochain comme toi-même.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.31 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu aimeras… toi-même: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lévitique 19.18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' Il n''y a pas d''autre commandement plus grand que ceux-là.» '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Le spécialiste de la loi lui dit: «Bien, maître. Tu as dit avec vérité que '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Dieu est unique
    - type: text
      text: ', qu'''
    - type: usfm
      marker: qt
      children:
      - type: text
        text: il n'y en a pas d'autre que lui
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.32 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il n''y en a pas d''autre que lui: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'conséquence de la citation faite précédemment, explicitement formulée en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deutéronome 4.35
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'et que '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: l'aimer de tout son cœur, de toute son intelligence, [de toute son âme] et de toute sa force, et aimer son prochain comme soi-même
    - type: text
      text: ', c''est plus que tous les holocaustes et tous les sacrifices.» '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Voyant qu''il avait répondu avec intelligence, Jésus lui dit: «Tu n''es pas loin du royaume de Dieu.» Personne n''osa plus lui poser de questions.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Reproches de Jésus aux chefs religieux
    marker-yv: yv-h
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Jésus continuait à enseigner dans le temple; il dit: «Comment les spécialistes de la loi peuvent-ils dire que le Messie est le fils de David'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.35 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Fils de David: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir la note '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '10.47'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: '[En effet,] David lui-même, animé par l''Esprit saint, a dit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'Le Seigneur a dit à mon Seigneur: ‘Assieds-toi à ma droite jusqu''à ce que j''aie fait de tes ennemis ton marchepied.’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.36 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le Seigneur… marchepied: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 110.1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: David lui-même l'appelle Seigneur. Comment peut-il donc être son fils?» Et une grande foule l'écoutait avec plaisir.
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Il leur disait dans son enseignement: «Attention aux spécialistes de la loi qui aiment se promener en longues robes et être salués sur les places publiques! '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Ils recherchent les sièges d''honneur dans les synagogues et les meilleures places dans les festins; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il envoya de nouveau vers eux un autre serviteur; ils [lui jetèrent des pierres,] le frappèrent à la tête et l''insultèrent. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: ils dépouillent les veuves de leurs biens tout en faisant pour l'apparence de longues prières. Ils seront jugés plus sévèrement.»
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Jésus était assis vis-à-vis du tronc et regardait comment la foule y mettait de l''argent. De nombreux riches mettaient beaucoup. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: 'Une pauvre veuve vint aussi; elle y mit deux petites pièces, une toute petite somme. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Alors Jésus appela ses disciples et leur dit: «Je vous le dis en vérité, cette pauvre veuve a donné plus que tous ceux qui ont mis dans le tronc, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: car tous ont pris de leur superflu pour mettre dans le tronc, tandis qu'elle, elle a mis de son nécessaire, tout ce qu'elle possédait, tout ce qu'elle avait pour vivre.»
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Il en envoya un troisième et ils le tuèrent, puis beaucoup d''autres qu''ils battirent ou tuèrent. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Il avait encore un fils bien-aimé; il l''envoya vers eux en dernier, disant: ‘Ils auront du respect pour mon fils.’ '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Mais ces vignerons dirent entre eux: ‘Voilà l''héritier. Venez, tuons-le et l''héritage sera à nous.’ '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Et ils s''emparèrent de lui, le tuèrent et le jetèrent hors de la vigne. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Que fera donc le maître de la vigne? Il viendra, fera mourir les vignerons et donnera la vigne à d'autres.
