document_id: ISA.25,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière de reconnaissance
  - type: text
    content: Eternel, tu es mon Dieu;
  - type: text
    content: je proclamerai ta grandeur, je célébrerai ton nom,
  - type: text
    content: car tu as accompli des merveilles.
  - type: text
    content: Tu es parfaitement fidèle aux décisions prises depuis longtemps.
  '10':
  - type: text
    content: En effet, la main de l'Eternel repose sur cette montagne
  - type: text
    content: et Moab est piétiné sur place,
  - type: text
    content: tout comme on le fait pour la paille dans une fosse à purin.
  '11':
  - type: text
    content: Dans cette fosse, Moab tend les mains
  - type: text
    content: comme le nageur le fait pour nager,
  - type: text
    content: mais l'Eternel abat son orgueil
  - type: text
    content: et ses manœuvres.
  '12':
  - type: text
    content: Il abat, il précipite les fortifications inaccessibles de tes murs par terre,
  - type: text
    content: il leur fait mordre la poussière.
  '2':
  - type: text
    content: En effet, tu as transformé la ville en décombres,
  - type: text
    content: la ville fortifiée en un tas de ruines.
  - type: text
    content: Le palais des étrangers est détruit,
  - type: text
    content: plus jamais il ne sera reconstruit.
  '3':
  - type: text
    content: Voilà pourquoi des peuples puissants te donnent gloire,
  - type: text
    content: les villes de nations violentes te craignent.
  '4':
  - type: text
    content: Tu as été un refuge pour le plus faible,
  - type: text
    content: un refuge pour le malheureux dans la détresse,
  - type: text
    content: un abri contre l'orage,
  - type: text
    content: une ombre contre la chaleur.
  - type: text
    content: En effet, le souffle des hommes violents
  - type: text
    content: est pareil à l'ouragan qui frappe une muraille.
  '5':
  - type: text
    content: Tout comme tu domptes la chaleur sur une terre brûlante,
  - type: text
    content: tu as dompté le tapage des étrangers.
  - type: text
    content: Tout comme la chaleur est contrecarrée par l'ombre d'un nuage,
  - type: text
    content: les chants de triomphe des hommes violents ont été contrecarrés.
  '6':
  - type: text
    content: Sur cette montagne, l'Eternel, le maître de l'univers, prépare pour tous les peuples
  - type: text
    content: un festin de plats succulents,
  - type: text
    content: un festin de bons vins,
  - type: text
    content: de plats succulents, pleins de moelle,
  - type: text
    content: de bons vins clarifiés.
  '7':
  - type: text
    content: Sur cette montagne, il détruira le voile qui est tendu sur tous les peuples,
  - type: text
    content: la couverture qui est déployée sur toutes les nations.
  '8':
  - type: text
    content: '*Il engloutira la mort pour toujours.'
  - type: note
    content: 'Il engloutira… toujours: renvoi à cette affirmation en 1 Corinthiens 15.54 pour annoncer la victoire finale sur la mort.'
  - type: text
    content: Le Seigneur, l'Eternel, essuiera les larmes de tous les visages,
  - type: text
    content: il fera disparaître de la terre la honte de son peuple.
  - type: text
    content: Oui, l'Eternel l'a décrété.
  '9':
  - type: text
    content: 'On dira, ce jour-là: «Voici notre Dieu, celui en qui nous avons espéré'
  - type: text
    content: 'et qui nous sauve: c''est l''Eternel, c''est en lui que nous avons espéré.'
  - type: text
    content: Soyons dans l'allégresse et réjouissons-nous de son salut!»
