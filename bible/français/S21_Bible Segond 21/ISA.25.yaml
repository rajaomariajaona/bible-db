document_id: ISA.25
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière de reconnaissance
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Eternel, tu es mon Dieu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: je proclamerai ta grandeur, je célébrerai ton nom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu as accompli des merveilles.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es parfaitement fidèle aux décisions prises depuis longtemps.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: En effet, tu as transformé la ville en décombres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la ville fortifiée en un tas de ruines.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le palais des étrangers est détruit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: plus jamais il ne sera reconstruit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Voilà pourquoi des peuples puissants te donnent gloire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les villes de nations violentes te craignent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tu as été un refuge pour le plus faible,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un refuge pour le malheureux dans la détresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un abri contre l'orage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une ombre contre la chaleur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, le souffle des hommes violents
- type: usfm
  marker: q1
  children:
  - type: text
    text: est pareil à l'ouragan qui frappe une muraille.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Tout comme tu domptes la chaleur sur une terre brûlante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu as dompté le tapage des étrangers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout comme la chaleur est contrecarrée par l'ombre d'un nuage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les chants de triomphe des hommes violents ont été contrecarrés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Sur cette montagne, l'Eternel, le maître de l'univers, prépare pour tous les peuples
- type: usfm
  marker: q1
  children:
  - type: text
    text: un festin de plats succulents,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un festin de bons vins,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de plats succulents, pleins de moelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de bons vins clarifiés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Sur cette montagne, il détruira le voile qui est tendu sur tous les peuples,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la couverture qui est déployée sur toutes les nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '*Il engloutira la mort pour toujours.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il engloutira… toujours: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'renvoi à cette affirmation en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Corinthiens 15.54
      metadata:
        usfm: 1CO.15.54
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' pour annoncer la victoire finale sur la mort.'
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le Seigneur, l'Eternel, essuiera les larmes de tous les visages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il fera disparaître de la terre la honte de son peuple.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, l'Eternel l'a décrété.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'On dira, ce jour-là: «Voici notre Dieu, celui en qui nous avons espéré'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et qui nous sauve: c''est l''Eternel, c''est en lui que nous avons espéré.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Soyons dans l'allégresse et réjouissons-nous de son salut!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: En effet, la main de l'Eternel repose sur cette montagne
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Moab est piétiné sur place,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout comme on le fait pour la paille dans une fosse à purin.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Dans cette fosse, Moab tend les mains
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme le nageur le fait pour nager,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais l'Eternel abat son orgueil
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses manœuvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Il abat, il précipite les fortifications inaccessibles de tes murs par terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il leur fait mordre la poussière.
