document_id: PSA.74,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Supplication après la destruction du temple
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Cantique d'Asaph.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi, ô Dieu, nous rejettes-tu définitivement?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourquoi t'irrites-tu contre le troupeau dont tu es le berger?
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Jusqu'à quand, ô Dieu, l'adversaire va-t-il proférer ses insultes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'ennemi mépriser sans cesse ton nom?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Pourquoi retires-tu ta main, ta main droite?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sors-la! Détruis l'adversaire!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Dieu est mon roi depuis les temps anciens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lui qui accomplit des délivrances sur toute la terre.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Tu as fendu la mer par ta puissance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu as brisé les têtes des monstres sur les eaux;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: tu as écrasé la tête du léviathan
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '74.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Léviathan: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: monstre marin redoutable.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu l'as donné pour nourriture aux habitants du désert.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Tu as fait jaillir des sources et des torrents,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu as mis à sec des fleuves qui n'arrêtaient jamais de couler.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: A toi appartient le jour, à toi appartient la nuit;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu as établi la lune et le soleil.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Tu as fixé toutes les limites de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu as formé l'été et l'hiver.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Souviens-toi que l'ennemi insulte l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'un peuple rempli de folie méprise ton nom!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ne livre pas aux bêtes la vie de ta tourterelle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: n'oublie pas définitivement le sort des malheureux qui t'appartiennent,
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Souviens-toi de ton peuple que tu as acquis autrefois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que tu as racheté pour en faire une tribu qui t'appartienne!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Souviens-toi du mont Sion où tu faisais ta résidence!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: prête attention à ton alliance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car les endroits retirés du pays sont pleins de repaires de brigands!
  '21':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Que l'opprimé ne fasse pas demi-tour, couvert de honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que le malheureux et le pauvre célèbrent ton nom!
  '22':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Lève-toi, ô Dieu, défends ta cause,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: souviens-toi des insultes que le fou t'adresse chaque jour!
  '23':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: N'oublie pas les cris de tes adversaires,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le tapage sans cesse grandissant de ceux qui s'attaquent à toi!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Porte tes pas vers ces endroits toujours en ruine!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'ennemi a tout dévasté dans le sanctuaire,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: tes adversaires ont rugi au milieu de ton temple;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont établi pour signes leurs signes
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '74.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ces signes sont soit les étendards des ennemis, soit les statues de leurs dieux.
      marker-yv: yv-n
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: On les a vus pareils à ceux qui lèvent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la hache dans une épaisse forêt,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: quand ils ont brisé toutes les sculptures
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à coups de masses et de marteaux.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Ils ont mis le feu à ton sanctuaire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont abattu, profané la demeure de ton nom.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ils disaient dans leur cœur:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Traitons-les tous avec violence!»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont brûlé dans le pays tous les lieux saints.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Nous ne voyons plus nos signes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n'y a plus de prophète,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et personne parmi nous qui sache jusqu'à quand…
