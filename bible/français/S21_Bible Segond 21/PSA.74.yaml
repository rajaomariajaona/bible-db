document_id: PSA.74,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Supplication après la destruction du temple
  - type: text
    content: Cantique d'Asaph.
  - type: text
    content: Pourquoi, ô Dieu, nous rejettes-tu définitivement?
  - type: text
    content: Pourquoi t'irrites-tu contre le troupeau dont tu es le berger?
  '10':
  - type: text
    content: Jusqu'à quand, ô Dieu, l'adversaire va-t-il proférer ses insultes,
  - type: text
    content: et l'ennemi mépriser sans cesse ton nom?
  '11':
  - type: text
    content: Pourquoi retires-tu ta main, ta main droite?
  - type: text
    content: Sors-la! Détruis l'adversaire!
  '12':
  - type: text
    content: Dieu est mon roi depuis les temps anciens,
  - type: text
    content: lui qui accomplit des délivrances sur toute la terre.
  '13':
  - type: text
    content: Tu as fendu la mer par ta puissance,
  - type: text
    content: tu as brisé les têtes des monstres sur les eaux;
  '14':
  - type: text
    content: tu as écrasé la tête du léviathan
  - type: note
    content: 'Léviathan: monstre marin redoutable.'
  - type: text
    content: ','
  - type: text
    content: tu l'as donné pour nourriture aux habitants du désert.
  '15':
  - type: text
    content: Tu as fait jaillir des sources et des torrents,
  - type: text
    content: tu as mis à sec des fleuves qui n'arrêtaient jamais de couler.
  '16':
  - type: text
    content: A toi appartient le jour, à toi appartient la nuit;
  - type: text
    content: tu as établi la lune et le soleil.
  '17':
  - type: text
    content: Tu as fixé toutes les limites de la terre,
  - type: text
    content: tu as formé l'été et l'hiver.
  '18':
  - type: text
    content: Souviens-toi que l'ennemi insulte l'Eternel
  - type: text
    content: et qu'un peuple rempli de folie méprise ton nom!
  '19':
  - type: text
    content: Ne livre pas aux bêtes la vie de ta tourterelle,
  - type: text
    content: n'oublie pas définitivement le sort des malheureux qui t'appartiennent,
  '2':
  - type: text
    content: Souviens-toi de ton peuple que tu as acquis autrefois,
  - type: text
    content: que tu as racheté pour en faire une tribu qui t'appartienne!
  - type: text
    content: Souviens-toi du mont Sion où tu faisais ta résidence!
  '20':
  - type: text
    content: prête attention à ton alliance,
  - type: text
    content: car les endroits retirés du pays sont pleins de repaires de brigands!
  '21':
  - type: text
    content: Que l'opprimé ne fasse pas demi-tour, couvert de honte,
  - type: text
    content: que le malheureux et le pauvre célèbrent ton nom!
  '22':
  - type: text
    content: Lève-toi, ô Dieu, défends ta cause,
  - type: text
    content: souviens-toi des insultes que le fou t'adresse chaque jour!
  '23':
  - type: text
    content: N'oublie pas les cris de tes adversaires,
  - type: text
    content: le tapage sans cesse grandissant de ceux qui s'attaquent à toi!
  '3':
  - type: text
    content: Porte tes pas vers ces endroits toujours en ruine!
  - type: text
    content: L'ennemi a tout dévasté dans le sanctuaire,
  '4':
  - type: text
    content: tes adversaires ont rugi au milieu de ton temple;
  - type: text
    content: ils ont établi pour signes leurs signes
  - type: note
    content: Ces signes sont soit les étendards des ennemis, soit les statues de leurs dieux.
  - type: text
    content: .
  '5':
  - type: text
    content: On les a vus pareils à ceux qui lèvent
  - type: text
    content: la hache dans une épaisse forêt,
  '6':
  - type: text
    content: quand ils ont brisé toutes les sculptures
  - type: text
    content: à coups de masses et de marteaux.
  '7':
  - type: text
    content: Ils ont mis le feu à ton sanctuaire,
  - type: text
    content: ils ont abattu, profané la demeure de ton nom.
  '8':
  - type: text
    content: 'Ils disaient dans leur cœur:'
  - type: text
    content: «Traitons-les tous avec violence!»
  - type: text
    content: Ils ont brûlé dans le pays tous les lieux saints.
  '9':
  - type: text
    content: Nous ne voyons plus nos signes,
  - type: text
    content: il n'y a plus de prophète,
  - type: text
    content: et personne parmi nous qui sache jusqu'à quand…
