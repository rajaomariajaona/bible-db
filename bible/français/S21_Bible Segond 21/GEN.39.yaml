document_id: GEN.39,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Joseph chez Potiphar
  - type: text
    content: 'Quant à Joseph, on l''avait fait descendre en Egypte et Potiphar, l''officier du pharaon qui était chef des gardes, un Egyptien, l''avait acheté aux Ismaélites qui l''y avaient fait descendre. '
  '10':
  - type: text
    content: 'Elle parlait tous les jours à Joseph, mais il ne l''écoutait pas et refusait de coucher avec elle, d''être avec elle. '
  '11':
  - type: text
    content: 'Un jour, il était entré dans la maison pour accomplir son travail et il n''y avait là aucun des gens de la maison. '
  '12':
  - type: text
    content: 'Elle l''attrapa par son habit en disant: «Couche avec moi!» Il lui laissa son habit dans la main et sortit. '
  '13':
  - type: text
    content: 'Lorsqu''elle vit qu''il lui avait laissé son habit dans la main et qu''il s''était enfui dehors, '
  '14':
  - type: text
    content: 'elle appela les gens de sa maison et leur dit: «Regardez! Il nous a amené un Hébreu pour abuser de nous. Cet homme s''est approché de moi pour coucher avec moi, mais j''ai poussé de grands cris. '
  '15':
  - type: text
    content: 'Quand il a entendu que je me mettais à crier, il a laissé son habit à côté de moi et est sorti.» '
  '16':
  - type: text
    content: 'Elle posa l''habit de Joseph à côté d''elle jusqu''à ce que son maître rentre à la maison, '
  '17':
  - type: text
    content: 'et elle lui tint alors ce discours: «L''esclave hébreu que tu nous as amené s''est approché de moi pour abuser de moi. '
  '18':
  - type: text
    content: 'Comme je me suis mise à crier, il a laissé son habit à côté de moi et s''est enfui dehors.» '
  '19':
  - type: text
    content: 'En entendant les affirmations de sa femme qui lui disait: «Voilà ce que m''a fait ton esclave», le maître de Joseph fut enflammé de colère. '
  '2':
  - type: text
    content: 'L''Eternel fut avec Joseph et la réussite l''accompagna. Il habitait dans la maison de son maître égyptien. '
  '20':
  - type: text
    content: Il s'empara de Joseph et le mit en prison, à l'endroit où les prisonniers du roi étaient enfermés. Il resta donc là, en prison.
  - type: heading
    content: Joseph en prison
  '21':
  - type: text
    content: 'L''Eternel fut avec Joseph et étendit sa bonté sur lui. Il lui fit gagner la faveur du chef de la prison. '
  '22':
  - type: text
    content: 'Celui-ci plaça sous son autorité tous les détenus qui étaient dans la prison, et tout ce qu''on y faisait passait par lui. '
  '23':
  - type: text
    content: Le chef de la prison ne s'occupait pas du tout de ce qui était sous la responsabilité de Joseph, parce que l'Eternel était avec lui et faisait réussir ce qu'il entreprenait.
  '3':
  - type: text
    content: 'Son maître vit que l''Eternel était avec lui et que tout ce qu''il entreprenait, l''Eternel le faisait réussir entre ses mains, '
  '4':
  - type: text
    content: 'et Joseph trouva grâce aux yeux de son maître: il l''employa à son service, l''établit responsable de sa maison et lui confia tous ses biens. '
  '5':
  - type: text
    content: 'Dès que Potiphar l''eut établi responsable de sa maison et de tous ses biens, l''Eternel bénit la maison de cet Egyptien à cause de Joseph, et la bénédiction de l''Eternel reposa sur tous ses biens, que ce soit à la maison ou aux champs. '
  '6':
  - type: text
    content: Il abandonna tous ses biens entre les mains de Joseph et il ne prenait connaissance de rien avec lui, sauf de sa propre nourriture. Or, Joseph était beau à tout point de vue.
  '7':
  - type: text
    content: 'Après cela, la femme de son maître porta les yeux sur Joseph et dit: «Couche avec moi!» '
  '8':
  - type: text
    content: 'Il refusa et lui dit: «Mon maître ne prend connaissance de rien avec moi dans la maison, il m''a confié tous ses biens. '
  '9':
  - type: text
    content: 'Personne n''est plus grand que moi dans cette maison et il ne m''a rien interdit, sauf toi parce que tu es sa femme. Comment pourrais-je commettre un aussi grand mal et pécher contre Dieu?» '
