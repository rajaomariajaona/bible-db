document_id: EXO.27
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'autel des holocaustes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Tu feras l''autel en bois d''acacia. Sa longueur et sa largeur seront de 2 mètres et demi, il sera carré. Sa hauteur sera d''un mètre et demi. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Aux 4 coins, tu feras des cornes qui sortiront de l''autel et tu le couvriras de bronze. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu feras pour l''autel des cendriers, des pelles, des bassins, des fourchettes et des brûle-parfums; tu feras tous ses ustensiles en bronze. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tu feras à l''autel une grille en bronze, en forme de treillis, et tu mettras 4 anneaux de bronze aux 4 coins du treillis. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tu le placeras sous le rebord de l''autel, dans la partie inférieure, et il arrivera à mi-hauteur de l''autel. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tu feras des barres pour l''autel, des barres en bois d''acacia, et tu les couvriras de bronze. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'On passera les barres dans les anneaux et elles seront des deux côtés de l''autel quand on le portera. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tu le feras creux, avec des planches. Il sera fait tel qu'il t'est montré sur la montagne.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le parvis et son entrée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '»Tu feras le parvis du tabernacle. Du côté sud, pour former cette cour, il y aura des toiles en fin lin retors sur une longueur de 50 mètres pour ce premier côté, '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'avec 20 colonnes reposant sur 20 bases en bronze. Les crochets des colonnes et leurs tringles seront en argent. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Du côté nord, il y aura également des toiles sur une longueur de 50 mètres, avec 20 colonnes et leurs 20 bases en bronze. Les crochets des colonnes et leurs tringles seront en argent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '»Du côté ouest, il y aura pour la largeur du parvis 25 mètres de toiles, avec 10 colonnes et leurs 10 bases. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Du côté est, sur les 25 mètres de largeur du parvis, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'il y aura 7 mètres et demi de toiles pour une aile, avec 3 colonnes et leurs 3 bases, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'et 7 mètres et demi de toiles pour la seconde aile, avec 3 colonnes et leurs 3 bases. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Pour la porte du parvis, il y aura un rideau de 10 mètres bleu, pourpre et cramoisi avec du fin lin retors, un ouvrage de broderie, avec 4 colonnes et leurs 4 bases.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '»Toutes les colonnes qui forment l''enceinte du parvis auront des tringles en argent, des crochets en argent et des bases en bronze. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'La longueur du parvis sera de 50 mètres, sa largeur de 25 de chaque côté, et sa hauteur de 2 mètres et demi; les toiles seront en fin lin retors, et les bases en bronze. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Tous les ustensiles destinés au service du tabernacle, tous ses pieux ainsi que tous les pieux du parvis seront en bronze.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'huile pour les lampes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '»Tu ordonneras aux Israélites de t''apporter, pour le chandelier, de l''huile pure d''olives concassées, afin d''entretenir constamment les lampes. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: C'est dans la tente de la rencontre, devant le voile qui cache le témoignage, qu'Aaron et ses fils la prépareront pour que les lampes brûlent du soir au matin en présence de l'Eternel. C'est une prescription perpétuelle pour les Israélites au fil des générations.
