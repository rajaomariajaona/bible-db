document_id: ISA.39
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Délégation de Babylone auprès d'Ezéchias
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A la même époque, le roi de Babylone Merodac-Baladan, fils de Baladan, envoya une lettre et un cadeau à Ezéchias, car il avait appris sa maladie et son rétablissement. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Cela réjouit tant Ezéchias qu'il montra aux envoyés tous les endroits où étaient ses objets de valeur, l'argent et l'or, les aromates et l'huile précieuse, tout son arsenal et tout ce qui se trouvait dans ses trésors. Ezéchias leur montra absolument tout dans son palais et sur tout son territoire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le prophète Esaïe vint ensuite trouver le roi Ezéchias et lui demanda: «Qu''ont dit ces gens-là et d''où sont-ils venus pour te voir?» Ezéchias répondit: «Ils sont venus d''un pays éloigné, de Babylone, pour me voir.» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Esaïe ajouta: «Qu''ont-ils vu dans ton palais?» Ezéchias répondit: «Ils ont vu tout ce qu''il y a chez moi, je leur ai montré absolument tout dans mes trésors.» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Alors Esaïe dit à Ezéchias: «Ecoute la parole de l''Eternel, le maître de l''univers! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les jours viendront où l''on emportera à Babylone tout ce qu''il y a chez toi et que tes ancêtres ont accumulé jusqu''à aujourd''hui. Il n''en restera rien, dit l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'De plus, on prendra plusieurs de tes fils, de ceux qui sont issus de toi et dont tu es le père, pour faire d''eux des eunuques dans le palais du roi de Babylone.» '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ezéchias répondit à Esaïe: «La parole de l''Eternel, que tu viens de dire, est bonne. En effet, ajouta-t-il, il y aura paix et sécurité pendant ma vie.»'
