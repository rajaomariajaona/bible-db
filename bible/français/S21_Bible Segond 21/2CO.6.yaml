document_id: 2CO.6,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Puisque nous travaillons avec Dieu, nous vous encourageons vivement à ne pas accueillir la grâce de Dieu sans résultat. '
  '10':
  - type: text
    content: comme attristés, et pourtant nous sommes toujours joyeux; comme pauvres, et pourtant nous en enrichissons beaucoup; comme n'ayant rien, alors que nous possédons tout.
  - type: heading
    content: Appel à la sainteté
  '11':
  - type: text
    content: 'Nous vous avons parlé ouvertement, Corinthiens, nous vous avons largement ouvert notre cœur. '
  '12':
  - type: text
    content: 'Vous n''y êtes pas à l''étroit, mais c''est votre cœur qui s''est rétréci. '
  '13':
  - type: text
    content: Rendez-nous la pareille – je vous parle comme à mes enfants – ouvrez-nous, vous aussi, votre cœur!
  '14':
  - type: text
    content: 'Ne formez pas un attelage disparate avec des incroyants. En effet, quelle relation y a-t-il entre la justice et le mal? Ou qu''y a-t-il de commun entre la lumière et les ténèbres? '
  '15':
  - type: text
    content: 'Quel accord y a-t-il entre Christ et le diable? Ou quelle part le croyant a-t-il avec l''incroyant? '
  '16':
  - type: text
    content: 'Quel rapport peut-il y avoir entre le temple de Dieu et les idoles? En effet, vous êtes le temple du Dieu vivant, comme Dieu l''a dit: '
  - type: text
    content: J'habiterai et je marcherai au milieu d'eux; je serai leur Dieu et ils seront mon peuple.
  - type: note
    content: 'J''habiterai… peuple: citation de Lévitique 26.11, 12.'
  - type: text
    content: ' '
  '17':
  - type: text
    content: 'C''est pourquoi, '
  - type: text
    content: sortez du milieu d'eux et séparez-vous, dit le Seigneur; ne touchez pas à ce qui est impur et je vous accueillerai.
  - type: note
    content: 'Sortez… accueillerai: citation combinant Esaïe 52.11 et Ezéchiel 20.41.'
  - type: text
    content: ' '
  '18':
  - type: text
    content: Je serai pour vous un père et vous serez pour moi des fils et des filles
  - type: note
    content: 'Je serai… filles: adaptation de 2 Samuel 7.14.'
  - type: text
    content: ', dit le Seigneur tout-puissant.'
  '2':
  - type: text
    content: 'En effet, il dit: '
  - type: text
    content: Au moment favorable je t'ai exaucé, le jour du salut je t'ai secouru.
  - type: note
    content: 'Au moment… secouru: citation d''Esaïe 49.8.'
  - type: text
    content: ' Voici maintenant le moment favorable, voici maintenant le jour du salut. '
  '3':
  - type: text
    content: 'En rien et pour personne nous ne voulons représenter un obstacle, afin que notre service soit sans reproche. '
  '4':
  - type: text
    content: 'Au contraire, nous nous recommandons nous-mêmes à tout point de vue comme serviteurs de Dieu par une grande persévérance dans les souffrances, les détresses, les angoisses, '
  '5':
  - type: text
    content: 'sous les coups, dans les prisons, les émeutes, les travaux pénibles, les privations de sommeil et de nourriture. '
  '6':
  - type: text
    content: 'Nous nous recommandons aussi par la pureté, la connaissance, la patience, la bonté, par l''Esprit saint, par un amour sincère, '
  '7':
  - type: text
    content: 'par la parole de vérité, par la puissance de Dieu, par les armes offensives et défensives de la justice, '
  '8':
  - type: text
    content: 'que ce soit au milieu de la gloire ou du déshonneur, au milieu d''une mauvaise ou d''une bonne réputation. Nous sommes considérés comme des imposteurs, quoique disant la vérité; '
  '9':
  - type: text
    content: 'comme des inconnus, quoique bien connus; comme des mourants, et pourtant nous vivons. Nous sommes comme condamnés, et pourtant pas mis à mort; '
