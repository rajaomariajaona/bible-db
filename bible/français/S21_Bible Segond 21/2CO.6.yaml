document_id: 2CO.6,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Puisque nous travaillons avec Dieu, nous vous encourageons vivement à ne pas accueillir la grâce de Dieu sans résultat. '
  '10':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: comme attristés, et pourtant nous sommes toujours joyeux; comme pauvres, et pourtant nous en enrichissons beaucoup; comme n'ayant rien, alors que nous possédons tout.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Appel à la sainteté
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous vous avons parlé ouvertement, Corinthiens, nous vous avons largement ouvert notre cœur. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous n''y êtes pas à l''étroit, mais c''est votre cœur qui s''est rétréci. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Rendez-nous la pareille – je vous parle comme à mes enfants – ouvrez-nous, vous aussi, votre cœur!
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne formez pas un attelage disparate avec des incroyants. En effet, quelle relation y a-t-il entre la justice et le mal? Ou qu''y a-t-il de commun entre la lumière et les ténèbres? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quel accord y a-t-il entre Christ et le diable? Ou quelle part le croyant a-t-il avec l''incroyant? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quel rapport peut-il y avoir entre le temple de Dieu et les idoles? En effet, vous êtes le temple du Dieu vivant, comme Dieu l''a dit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: J'habiterai et je marcherai au milieu d'eux; je serai leur Dieu et ils seront mon peuple.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'J''habiterai… peuple: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Lévitique 26.11
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '12'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est pourquoi, '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: sortez du milieu d'eux et séparez-vous, dit le Seigneur; ne touchez pas à ce qui est impur et je vous accueillerai.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sortez… accueillerai: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation combinant '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 52.11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' et '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Ezéchiel 20.41
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Je serai pour vous un père et vous serez pour moi des fils et des filles
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je serai… filles: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'adaptation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Samuel 7.14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', dit le Seigneur tout-puissant.'
  '2':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'En effet, il dit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Au moment favorable je t'ai exaucé, le jour du salut je t'ai secouru.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Au moment… secouru: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 49.8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' Voici maintenant le moment favorable, voici maintenant le jour du salut. '
  '3':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'En rien et pour personne nous ne voulons représenter un obstacle, afin que notre service soit sans reproche. '
  '4':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Au contraire, nous nous recommandons nous-mêmes à tout point de vue comme serviteurs de Dieu par une grande persévérance dans les souffrances, les détresses, les angoisses, '
  '5':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'sous les coups, dans les prisons, les émeutes, les travaux pénibles, les privations de sommeil et de nourriture. '
  '6':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'Nous nous recommandons aussi par la pureté, la connaissance, la patience, la bonté, par l''Esprit saint, par un amour sincère, '
  '7':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'par la parole de vérité, par la puissance de Dieu, par les armes offensives et défensives de la justice, '
  '8':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'que ce soit au milieu de la gloire ou du déshonneur, au milieu d''une mauvaise ou d''une bonne réputation. Nous sommes considérés comme des imposteurs, quoique disant la vérité; '
  '9':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'comme des inconnus, quoique bien connus; comme des mourants, et pourtant nous vivons. Nous sommes comme condamnés, et pourtant pas mis à mort; '
