document_id: 2CO.8,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Instructions pour la collecte
  - type: heading
    content: 8.1–9.15
  - type: heading
    content: Exemple des Eglises de Macédoine et mission de Tite
  - type: text
    content: 'Par ailleurs, frères et sœurs, nous vous faisons connaître la grâce que Dieu a accordée aux Eglises de la Macédoine: '
  '10':
  - type: text
    content: 'C''est un avis que je donne à ce sujet et c''est ce qui vous convient, puisque dès l''année dernière vous avez été les premiers non seulement à faire une collecte, mais aussi à la vouloir. '
  '11':
  - type: text
    content: 'Menez-la donc maintenant à bien afin que sa réalisation corresponde, en fonction de vos moyens, à l''empressement que vous avez mis à la vouloir. '
  '12':
  - type: text
    content: 'Quand la bonne volonté existe, on est bien accueilli en fonction de ce que l''on a, et non de ce que l''on n''a pas. '
  '13':
  - type: text
    content: 'En effet, il ne s''agit pas de vous exposer à la détresse pour en soulager d''autres, mais de suivre un principe d''égalité: '
  '14':
  - type: text
    content: 'dans les circonstances actuelles votre abondance pourvoira à leurs besoins, afin que leur abondance aussi pourvoie à vos besoins. C''est ainsi qu''il y aura égalité, '
  '15':
  - type: text
    content: 'conformément à ce qui est écrit: '
  - type: text
    content: Celui qui avait ramassé beaucoup n'avait rien de trop et celui qui avait ramassé peu ne manquait de rien
  - type: text
    content: .
  - type: note
    content: 'Celui qui… de rien: citation d''Exode 16.18.'
  '16':
  - type: text
    content: 'Que Dieu soit remercié, lui qui a mis dans le cœur de Tite le même zèle pour vous! '
  '17':
  - type: text
    content: 'En effet, il a accepté notre demande et c''est même avec un nouveau zèle et de son plein gré qu''il part chez vous. '
  '18':
  - type: text
    content: 'Nous envoyons avec lui le frère dont toutes les Eglises font l''éloge pour son annonce de l''Evangile. '
  '19':
  - type: text
    content: 'Il a de plus été choisi par les Eglises pour être notre compagnon de voyage dans ce geste de générosité que nous accomplissons à la gloire du Seigneur [lui-même] et en témoignage de notre bonne volonté. '
  '2':
  - type: text
    content: 'au milieu même de la grande épreuve de leur souffrance, leur joie débordante et leur pauvreté profonde les ont conduits à faire preuve d''une très grande générosité. '
  '20':
  - type: text
    content: 'Nous voulons en effet éviter qu''on nous critique au sujet de la forte somme dont nous avons la charge, '
  '21':
  - type: text
    content: 'car nous recherchons ce qui est bien non seulement devant le Seigneur, mais aussi devant les hommes. '
  '22':
  - type: text
    content: 'Avec eux nous envoyons notre frère, dont nous avons souvent, à bien des occasions, pu apprécier le zèle, et il en montre plus encore cette fois à cause de sa grande confiance en vous. '
  '23':
  - type: text
    content: 'En ce qui concerne Tite, il est mon associé et mon collaborateur auprès de vous; quant à nos frères, ils sont les envoyés des Eglises, la gloire de Christ. '
  '24':
  - type: text
    content: A la vue des Eglises, donnez-leur donc la preuve de votre amour et montrez-leur que nous avons raison d'être fiers de vous.
  '3':
  - type: text
    content: 'Je l''atteste, ils ont donné volontairement selon leurs moyens, et même au-delà de leurs moyens, '
  '4':
  - type: text
    content: 'et c''est avec beaucoup d''insistance qu''ils nous ont demandé la grâce de prendre part à ce service en faveur des saints. '
  '5':
  - type: text
    content: Ils ont fait plus que ce que nous espérions, car ils se sont d'abord donnés eux-mêmes au Seigneur, puis à nous, par la volonté de Dieu.
  '6':
  - type: text
    content: 'Nous avons donc encouragé Tite à parachever, chez vous aussi, ce geste de générosité, comme il l''avait d''ailleurs commencé. '
  '7':
  - type: text
    content: 'De votre côté, vous avez tout en abondance: la foi, la parole, la connaissance, le zèle à tout point de vue et l''amour pour nous. Faites en sorte que la même abondance se manifeste dans cet acte de grâce. '
  '8':
  - type: text
    content: 'Je ne dis pas cela pour donner un ordre, mais pour éprouver la sincérité de votre amour par l''exemple du zèle des autres. '
  '9':
  - type: text
    content: 'En effet, vous connaissez la grâce de notre Seigneur Jésus-Christ: pour vous il s''est fait pauvre alors qu''il était riche, afin que par sa pauvreté vous soyez enrichis.'
