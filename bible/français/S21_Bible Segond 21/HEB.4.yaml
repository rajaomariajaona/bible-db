document_id: HEB.4,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Redoutons donc, alors que la promesse d''entrer dans son repos reste valable, que l''un de vous ne semble être resté en arrière. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: En effet, celui qui entre dans le repos de Dieu se repose lui aussi de son activité, tout comme Dieu s'est reposé de la sienne.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Empressons-nous donc d''entrer dans ce repos afin que personne ne tombe en donnant le même exemple de désobéissance. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'En effet, la parole de Dieu est vivante et efficace, plus tranchante que toute épée à deux tranchants, pénétrante jusqu''à séparer âme et esprit, jointures et moelles; elle juge les sentiments et les pensées du cœur. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Aucune créature n''est cachée devant lui: tout est nu et découvert aux yeux de celui à qui nous devons rendre compte.'
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Supériorité de Christ le grand-prêtre
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 4.14–10.22
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Christ supérieur aux grands-prêtres lévitiques
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ainsi, puisque nous avons un souverain grand-prêtre qui a traversé le ciel, Jésus, le Fils de Dieu, restons fermement attachés à la foi que nous professons. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'En effet, nous n''avons pas un grand-prêtre incapable de compatir à nos faiblesses; au contraire, il a été tenté en tout point comme nous, mais sans commettre de péché. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: Approchons-nous donc avec assurance du trône de la grâce afin d'obtenir compassion et de trouver grâce pour être secourus au moment opportun.
  '2':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'En effet, cette bonne nouvelle nous a été annoncée aussi bien qu''à eux, mais la parole qu''ils ont entendue ne leur a servi à rien parce qu''ils n''étaient pas unis dans la foi à ceux qui ont écouté. '
  '3':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Quant à nous qui avons cru, nous entrons dans le repos, dans la mesure où Dieu a dit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: 'J''ai juré dans ma colère: ‘Ils n''entreront pas dans mon repos!’'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'J''ai juré… repos: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'reprise de la citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 95.11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '3.11'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: ' Pourtant, son travail était terminé depuis la création du monde. '
  '4':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'En effet, il a parlé quelque part ainsi au sujet du septième jour: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Et Dieu se reposa de toute son activité le septième jour.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Et Dieu… jour: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Genèse 2.2
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '5':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Et dans ce passage il dit encore: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Ils n'entreront pas dans mon repos!
    - type: text
      text: ' '
  '6':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Ainsi, certains ont encore la possibilité d''y entrer, et les premiers à recevoir cette bonne nouvelle n''ont pas accédé au repos à cause de leur désobéissance. '
  '7':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'C''est pourquoi Dieu fixe de nouveau un jour – aujourd''hui – en disant bien longtemps après par David cette parole déjà citée: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Aujourd'hui, si vous entendez sa voix, n'endurcissez pas votre cœur.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Aujourd''hui… cœur: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'reprise de la citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 95.7-8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' (voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 3.7-8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Si Josué
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Josué: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: successeur de Moïse à la tête d'Israël; c'est lui qui a fait entrer le peuple dans le pays promis.
      marker-yv: yv-n
    - type: text
      text: ' leur avait effectivement donné le repos, Dieu ne parlerait pas après cela d''un autre jour. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Il reste donc un repos de sabbat pour le peuple de Dieu. '
