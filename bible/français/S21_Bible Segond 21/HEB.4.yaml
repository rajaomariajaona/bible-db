document_id: HEB.4,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Redoutons donc, alors que la promesse d''entrer dans son repos reste valable, que l''un de vous ne semble être resté en arrière. '
  '10':
  - type: text
    content: En effet, celui qui entre dans le repos de Dieu se repose lui aussi de son activité, tout comme Dieu s'est reposé de la sienne.
  '11':
  - type: text
    content: 'Empressons-nous donc d''entrer dans ce repos afin que personne ne tombe en donnant le même exemple de désobéissance. '
  '12':
  - type: text
    content: 'En effet, la parole de Dieu est vivante et efficace, plus tranchante que toute épée à deux tranchants, pénétrante jusqu''à séparer âme et esprit, jointures et moelles; elle juge les sentiments et les pensées du cœur. '
  '13':
  - type: text
    content: 'Aucune créature n''est cachée devant lui: tout est nu et découvert aux yeux de celui à qui nous devons rendre compte.'
  - type: heading
    content: Supériorité de Christ le grand-prêtre
  - type: heading
    content: 4.14–10.22
  - type: heading
    content: Christ supérieur aux grands-prêtres lévitiques
  '14':
  - type: text
    content: 'Ainsi, puisque nous avons un souverain grand-prêtre qui a traversé le ciel, Jésus, le Fils de Dieu, restons fermement attachés à la foi que nous professons. '
  '15':
  - type: text
    content: 'En effet, nous n''avons pas un grand-prêtre incapable de compatir à nos faiblesses; au contraire, il a été tenté en tout point comme nous, mais sans commettre de péché. '
  '16':
  - type: text
    content: Approchons-nous donc avec assurance du trône de la grâce afin d'obtenir compassion et de trouver grâce pour être secourus au moment opportun.
  '2':
  - type: text
    content: 'En effet, cette bonne nouvelle nous a été annoncée aussi bien qu''à eux, mais la parole qu''ils ont entendue ne leur a servi à rien parce qu''ils n''étaient pas unis dans la foi à ceux qui ont écouté. '
  '3':
  - type: text
    content: 'Quant à nous qui avons cru, nous entrons dans le repos, dans la mesure où Dieu a dit: '
  - type: text
    content: 'J''ai juré dans ma colère: ‘Ils n''entreront pas dans mon repos!’'
  - type: note
    content: 'J''ai juré… repos: reprise de la citation du Psaume 95.11 (voir 3.11).'
  - type: text
    content: ' Pourtant, son travail était terminé depuis la création du monde. '
  '4':
  - type: text
    content: 'En effet, il a parlé quelque part ainsi au sujet du septième jour: '
  - type: text
    content: Et Dieu se reposa de toute son activité le septième jour.
  - type: note
    content: 'Et Dieu… jour: citation de Genèse 2.2.'
  - type: text
    content: ' '
  '5':
  - type: text
    content: 'Et dans ce passage il dit encore: '
  - type: text
    content: Ils n'entreront pas dans mon repos!
  - type: text
    content: ' '
  '6':
  - type: text
    content: 'Ainsi, certains ont encore la possibilité d''y entrer, et les premiers à recevoir cette bonne nouvelle n''ont pas accédé au repos à cause de leur désobéissance. '
  '7':
  - type: text
    content: 'C''est pourquoi Dieu fixe de nouveau un jour – aujourd''hui – en disant bien longtemps après par David cette parole déjà citée: '
  - type: text
    content: Aujourd'hui, si vous entendez sa voix, n'endurcissez pas votre cœur.
  - type: note
    content: 'Aujourd''hui… cœur: reprise de la citation du Psaume 95.7-8 (voir 3.7-8).'
  '8':
  - type: text
    content: Si Josué
  - type: note
    content: 'Josué: successeur de Moïse à la tête d''Israël; c''est lui qui a fait entrer le peuple dans le pays promis.'
  - type: text
    content: ' leur avait effectivement donné le repos, Dieu ne parlerait pas après cela d''un autre jour. '
  '9':
  - type: text
    content: 'Il reste donc un repos de sabbat pour le peuple de Dieu. '
