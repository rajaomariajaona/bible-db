document_id: EXO.39
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Confection des tenues des prêtres
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Avec les étoffes teintes en bleu, en pourpre et en cramoisi, on fit les vêtements pour le service dans le sanctuaire, ainsi que les vêtements sacrés pour Aaron, comme l'Eternel l'avait ordonné à Moïse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'On fit l''éphod en or, en fil bleu, pourpre et cramoisi et en fin lin retors. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'On martela des lames d''or et on les coupa en fils, que l''on entrelaça dans les étoffes teintes en bleu, en pourpre et en cramoisi et dans le fin lin, selon l''art du brodeur. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'On y fit des bretelles qui le reliaient, et c''est ainsi qu''il était assemblé par ses deux extrémités. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L''écharpe était du même matériau que l''éphod et fixée sur lui. Elle était en or, en fil bleu, pourpre et cramoisi et en fin lin retors, comme l''Eternel l''avait ordonné à Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'On entoura des pierres d''onyx de montures en or et on y grava les noms des fils d''Israël, comme on grave les cachets. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: On les mit sur les bretelles de l'éphod en souvenir des fils d'Israël, comme l'Eternel l'avait ordonné à Moïse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'On fit le pectoral selon l''art du brodeur, avec le même matériau que l''éphod, en or, en fil bleu, pourpre et cramoisi et en fin lin retors. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il était carré et on le fit double. Sa longueur et sa largeur étaient de 25 centimètres, et il était double. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'On le garnit de 4 rangées de pierres; première rangée: une sardoine, une topaze, une émeraude; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'deuxième rangée: une escarboucle, un saphir, un diamant; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'troisième rangée: une opale, une agate, une améthyste; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'quatrième rangée: une chrysolithe, un onyx, un jaspe. Ces pierres étaient enchâssées dans leurs montures en or. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il y en avait 12, d''après les noms des fils d''Israël. Elles étaient gravées comme des cachets, chacune avec le nom de l''une des 12 tribus. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'On fit sur le pectoral des chaînettes en or pur, tressées en forme de cordons. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'On fit 2 montures en or et 2 anneaux en or et on mit les 2 anneaux aux 2 extrémités du pectoral. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'On passa les 2 cordons d''or dans les 2 anneaux placés aux 2 extrémités du pectoral. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'On fixa par-devant les bouts des 2 cordons aux 2 montures placées sur les bretelles de l''éphod. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'On fit encore 2 anneaux en or, que l''on mit aux 2 extrémités du pectoral, sur le bord intérieur appliqué contre l''éphod. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'On fit 2 autres anneaux en or, que l''on mit au bas des 2 bretelles de l''éphod, sur le devant, près de la jointure, au-dessus de l''écharpe de l''éphod. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: On attacha le pectoral par ses anneaux aux anneaux de l'éphod avec un cordon bleu, afin que le pectoral soit au-dessus de l'écharpe de l'éphod et qu'il ne puisse pas se séparer de l'éphod, comme l'Eternel l'avait ordonné à Moïse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'On fit la robe de l''éphod, entièrement tissée d''étoffe bleue. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Au milieu de la robe, il y avait une ouverture comme l''encolure d''un habit en cuir, et cette ouverture était ourlée tout autour afin que la robe ne se déchire pas. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'On mit sur la bordure de la robe des grenades de couleur bleue, pourpre et cramoisie, en fil retors. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'On fit des clochettes en or pur et on les mit entre les grenades sur tout le tour de la bordure de la robe, on les intercala entre les grenades: '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: une clochette et une grenade, une clochette et une grenade, sur tout le tour de la bordure de la robe destinée au service, comme l'Eternel l'avait ordonné à Moïse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'On fit les tuniques tissées en fin lin pour Aaron et pour ses fils. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'On fit aussi la tiare en fin lin et les coiffes en fin lin pour marquer l''honneur de leur rang, les caleçons en lin, en fin lin retors, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: la ceinture en fin lin retors brodée et de couleur bleue, pourpre et cramoisie, comme l'Eternel l'avait ordonné à Moïse.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'On fit la lame, le diadème sacré, en or pur et l''on y écrivit, comme on grave un cachet: «Sainteté à l''Eternel.» '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: On l'attacha avec un cordon bleu en haut de la tiare, comme l'Eternel l'avait ordonné à Moïse.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Inspection des travaux
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: C'est ainsi que l'on mena à terme tous les travaux du tabernacle, de la tente de la rencontre. Les Israélites firent tout ce que l'Eternel avait ordonné à Moïse, ils s'y conformèrent exactement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'On amena le tabernacle à Moïse: la tente et tout ce qui en dépendait, les agrafes, les planches, les barres, les colonnes et les bases; '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'la couverture de peaux de béliers teintes en rouge, la couverture de peaux de dauphins et le voile de séparation; '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'l''arche du témoignage et ses barres, ainsi que le propitiatoire; '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'la table, tous ses ustensiles et les pains consacrés; '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'le chandelier d''or pur, ses lampes, les lampes préparées, tous ses ustensiles et l''huile pour le chandelier; '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'l''autel d''or, l''huile d''onction et le parfum odoriférant, et le rideau de l''entrée de la tente; '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'l''autel de bronze, sa grille de bronze, ses barres et tous ses ustensiles; la cuve avec sa base; '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'les toiles du parvis, ses colonnes, ses bases et le rideau de la porte de cette cour, ses cordages, ses pieux, ainsi que tous les ustensiles pour le service du tabernacle, pour la tente de la rencontre; '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: les vêtements de service pour le sanctuaire, les vêtements sacrés pour le grand-prêtre Aaron et ceux de ses fils pour leurs fonctions en tant que prêtres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Les Israélites firent tous ces travaux en se conformant à tous les ordres que l''Eternel avait donnés à Moïse. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Moïse examina tout le travail et vit qu'ils l'avaient fait comme l'Eternel l'avait ordonné, ils l'avaient fait exactement ainsi. Alors Moïse les bénit.
