document_id: GEN.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'appel d'Abram
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Abram: «*Quitte ton pays, ta patrie et ta famille et va dans le pays que je te montrerai.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.1'
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Quitte… montrerai: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité par Etienne dans son discours en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Actes 7.3
      metadata:
        usfm: ACT.7.3
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Je ferai de toi une grande nation, je te bénirai, je rendrai ton nom grand et tu seras une source de bénédiction. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Je bénirai ceux qui te béniront et je maudirai ceux qui te maudiront, et *toutes les familles de la terre seront bénies en toi
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Toutes… toi: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cité par l'apôtre Paul en Galates 3.8 comme preuve que les non-Juifs étaient destinés à être déclarés justes par la foi.
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Abram partit conformément à la parole de l''Eternel, et Lot partit avec lui. Abram était âgé de 75 ans lorsqu''il quitta Charan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il prit sa femme Saraï et Lot, le fils de son frère. Il prit aussi tous les biens et les serviteurs dont ils étaient devenus propriétaires à Charan, et ils partirent pour se rendre dans le pays de Canaan, où ils arrivèrent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Abram traversa le pays jusqu''à l''endroit appelé Sichem, jusqu''aux chênes de Moré. Les Cananéens occupaient alors le pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'L''Eternel apparut à Abram et dit: «C''est à ta descendance'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ta descendance: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Paul renvoie à ce passage en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Galates 3.16
      metadata:
        usfm: GAL.3.16
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' en insistant sur le fait que le mot est au singulier.'
    marker-yv: yv-n
  - type: text
    text: ' que je donnerai ce pays.» Abram construisit là un autel en l''honneur de l''Eternel qui lui était apparu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il partit de là vers la région montagneuse qui se trouve à l''est de Béthel et il dressa ses tentes. Béthel était à l''ouest et Aï à l''est. Là, il construisit un autel en l''honneur de l''Eternel et fit appel au nom de l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Puis Abram continua par étapes en direction du Néguev
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Néguev: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: région située au sud d'Israël.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Abram en Egypte
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il y eut une famine dans le pays et Abram descendit en Egypte pour y séjourner, car la famine pesait lourdement sur le pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Comme il était sur le point d''entrer en Egypte, il dit à sa femme Saraï: «Ecoute-moi! Je sais que tu es une belle femme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Quand les Egyptiens te verront, ils diront: ‘C''est sa femme’ et ils me tueront, tandis que toi, ils te laisseront en vie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Présente-toi donc comme ma sœur afin que je sois bien traité à cause de toi et que je reste en vie grâce à toi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Lorsque Abram fut arrivé en Egypte, les Egyptiens virent que la femme était très belle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les intendants du pharaon la virent et la vantèrent au pharaon, si bien que la femme fut emmenée chez le pharaon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il traita bien Abram à cause d''elle et Abram reçut des brebis, des bœufs, des ânes, des serviteurs et des servantes, des ânesses et des chameaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Cependant, l''Eternel frappa le pharaon et sa famille de grands fléaux à cause de Saraï, la femme d''Abram. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors le pharaon appela Abram et dit: «Qu''est-ce que tu m''as fait? Pourquoi ne m''as-tu pas informé que c''est ta femme? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Pourquoi as-tu prétendu que c''était ta sœur? De ce fait, je l''ai prise pour femme! Voici maintenant ta femme. Prends-la et va-t''en!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Et le pharaon donna l'ordre à ses gens de le renvoyer, lui et sa femme, avec tout ce qui lui appartenait.
