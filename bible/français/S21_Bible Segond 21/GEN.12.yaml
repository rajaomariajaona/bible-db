document_id: GEN.12,152
type_code: fra
verses:
  '1':
  - type: heading
    content: L'appel d'Abram
  - type: text
    content: 'L''Eternel dit à Abram: «*Quitte ton pays, ta patrie et ta famille et va dans le pays que je te montrerai.'
  - type: note
    content: 'Quitte… montrerai: cité par Etienne dans son discours en Actes 7.3.'
  - type: text
    content: ' '
  '10':
  - type: text
    content: 'Il y eut une famine dans le pays et Abram descendit en Egypte pour y séjourner, car la famine pesait lourdement sur le pays. '
  '11':
  - type: text
    content: 'Comme il était sur le point d''entrer en Egypte, il dit à sa femme Saraï: «Ecoute-moi! Je sais que tu es une belle femme. '
  '12':
  - type: text
    content: 'Quand les Egyptiens te verront, ils diront: ‘C''est sa femme’ et ils me tueront, tandis que toi, ils te laisseront en vie. '
  '13':
  - type: text
    content: 'Présente-toi donc comme ma sœur afin que je sois bien traité à cause de toi et que je reste en vie grâce à toi.» '
  '14':
  - type: text
    content: 'Lorsque Abram fut arrivé en Egypte, les Egyptiens virent que la femme était très belle. '
  '15':
  - type: text
    content: 'Les intendants du pharaon la virent et la vantèrent au pharaon, si bien que la femme fut emmenée chez le pharaon. '
  '16':
  - type: text
    content: 'Il traita bien Abram à cause d''elle et Abram reçut des brebis, des bœufs, des ânes, des serviteurs et des servantes, des ânesses et des chameaux. '
  '17':
  - type: text
    content: 'Cependant, l''Eternel frappa le pharaon et sa famille de grands fléaux à cause de Saraï, la femme d''Abram. '
  '18':
  - type: text
    content: 'Alors le pharaon appela Abram et dit: «Qu''est-ce que tu m''as fait? Pourquoi ne m''as-tu pas informé que c''est ta femme? '
  '19':
  - type: text
    content: 'Pourquoi as-tu prétendu que c''était ta sœur? De ce fait, je l''ai prise pour femme! Voici maintenant ta femme. Prends-la et va-t''en!» '
  '2':
  - type: text
    content: 'Je ferai de toi une grande nation, je te bénirai, je rendrai ton nom grand et tu seras une source de bénédiction. '
  '20':
  - type: text
    content: Et le pharaon donna l'ordre à ses gens de le renvoyer, lui et sa femme, avec tout ce qui lui appartenait.
  '3':
  - type: text
    content: Je bénirai ceux qui te béniront et je maudirai ceux qui te maudiront, et *toutes les familles de la terre seront bénies en toi
  - type: note
    content: 'Toutes… toi: cité par l''apôtre Paul en Galates 3.8 comme preuve que les non-Juifs étaient destinés à être déclarés justes par la foi.'
  - type: text
    content: .»
  '4':
  - type: text
    content: 'Abram partit conformément à la parole de l''Eternel, et Lot partit avec lui. Abram était âgé de 75 ans lorsqu''il quitta Charan. '
  '5':
  - type: text
    content: Il prit sa femme Saraï et Lot, le fils de son frère. Il prit aussi tous les biens et les serviteurs dont ils étaient devenus propriétaires à Charan, et ils partirent pour se rendre dans le pays de Canaan, où ils arrivèrent.
  '6':
  - type: text
    content: 'Abram traversa le pays jusqu''à l''endroit appelé Sichem, jusqu''aux chênes de Moré. Les Cananéens occupaient alors le pays. '
  '7':
  - type: text
    content: 'L''Eternel apparut à Abram et dit: «C''est à ta descendance'
  - type: note
    content: 'Ta descendance: Paul renvoie à ce passage en Galates 3.16 en insistant sur le fait que le mot est au singulier.'
  - type: text
    content: ' que je donnerai ce pays.» Abram construisit là un autel en l''honneur de l''Eternel qui lui était apparu. '
  '8':
  - type: text
    content: 'Il partit de là vers la région montagneuse qui se trouve à l''est de Béthel et il dressa ses tentes. Béthel était à l''ouest et Aï à l''est. Là, il construisit un autel en l''honneur de l''Eternel et fit appel au nom de l''Eternel. '
  '9':
  - type: text
    content: Puis Abram continua par étapes en direction du Néguev
  - type: note
    content: 'Néguev: région située au sud d''Israël.'
  - type: text
    content: .
  - type: heading
    content: Abram en Egypte
