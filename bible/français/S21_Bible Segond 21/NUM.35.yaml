document_id: NUM.35,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les 48 villes réservées aux Lévites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L''Eternel dit à Moïse dans les plaines de Moab, près du Jourdain, vis-à-vis de Jéricho: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '«Transmets ces instructions aux Israélites: Lorsque vous aurez passé le Jourdain et que vous serez entrés dans le pays de Canaan, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'vous vous établirez des villes qui vous servent de villes de refuge. L''auteur d''un homicide, celui qui aura tué quelqu''un involontairement, pourra s''y enfuir. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Ces villes vous serviront de refuge contre le vengeur du sang, afin que l''auteur de l''homicide ne soit pas mis à mort avant d''avoir comparu devant l''assemblée pour être jugé. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Parmi les villes que vous donnerez, 6 vous serviront de villes de refuge. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Vous donnerez 3 villes de l''autre côté du Jourdain et 3 dans le pays de Canaan. Ce seront des villes de refuge. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Ces 6 villes serviront de refuge aux Israélites, à l'étranger et à l'immigré qui se trouve parmi vous. Là pourra s'enfuir tout homme qui aura tué quelqu'un involontairement.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '»Si un homme frappe son prochain avec un instrument de fer et que mort s''ensuive, c''est un meurtrier. Le meurtrier sera puni de mort. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'S''il le frappe en tenant à la main une pierre qui puisse provoquer la mort et que mort s''ensuive, c''est un meurtrier. Le meurtrier sera puni de mort. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'S''il le frappe en tenant à la main un instrument de bois qui puisse provoquer la mort et que mort s''ensuive, c''est un meurtrier. Le meurtrier sera puni de mort. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Le vengeur du sang fera mourir le meurtrier; quand il le rencontrera, il le tuera. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: '«Ordonne aux Israélites d''accorder aux Lévites, sur l''héritage qu''eux-mêmes posséderont, des villes où ils puissent habiter. Vous leur donnerez aussi un territoire autour de ces villes. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Si un homme pousse son prochain par haine envers lui ou jette quelque chose sur lui avec préméditation et que mort s''ensuive, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ou bien s'il le frappe de la main par hostilité envers lui et que mort s'ensuive, celui qui a frappé sera puni de mort, c'est un meurtrier. Le vengeur du sang tuera le meurtrier quand il le rencontrera.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '»Mais supposons qu''un homme pousse son prochain par accident et non par hostilité envers lui, ou bien qu''il jette quelque chose sur lui sans préméditation, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'ou encore qu''il fasse tomber sur lui sans le voir une pierre qui puisse provoquer la mort, et que mort s''ensuive, alors qu''il n''éprouvait pas de haine contre l''autre et ne cherchait pas à lui faire du mal. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Voici les règles d''après lesquelles l''assemblée jugera entre celui qui a tué et le vengeur du sang. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'L''assemblée délivrera l''auteur de l''homicide de la main du vengeur du sang et le fera retourner dans la ville de refuge où il s''était enfui. Il y restera jusqu''à la mort du grand-prêtre qu''on a consacré par onction avec l''huile sainte. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Si l''auteur de l''homicide quitte le territoire de la ville de refuge où il s''est enfui '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'et que le vengeur du sang le rencontre à l''extérieur du territoire de la ville de refuge et le tue, il ne sera pas coupable de meurtre. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: En effet, l'auteur de l'homicide doit rester dans sa ville de refuge jusqu'à la mort du grand-prêtre. Ce n'est qu'après la mort du grand-prêtre qu'il pourra retourner dans sa propriété.
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: »Voici les prescriptions relatives au droit et valables pour vous au fil des générations, où que vous habitiez.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Ils auront les villes pour y habiter et leurs environs seront pour leur bétail, pour leurs biens et pour tous leurs animaux. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: »Si un homme en tue un autre, c'est sur la déposition de plusieurs témoins qu'on le mettra à mort. Un seul témoin ne suffira pas pour faire condamner quelqu'un à mort.
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: '»Vous n''accepterez pas de rançon en échange de la vie d''un meurtrier qui mérite la mort: il sera puni de mort. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Vous n''accepterez pas de rançon qui lui permette de s''enfuir dans sa ville de refuge et de retourner habiter ailleurs dans le pays après la mort du prêtre. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Vous ne souillerez pas le pays où vous serez. En effet, le sang souille le pays. La seule façon pour le pays d''expier le sang qui y sera versé sera de verser le sang du meurtrier. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: Vous ne rendrez pas impur le pays où vous allez vous installer et au milieu duquel j'habiterai, car je suis l'Eternel, qui habite au milieu des Israélites.»
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Les environs des villes que vous donnerez aux Lévites s''étendront sur 500 mètres à partir du mur de la ville et tout autour. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: A l'extérieur de la ville, vous mesurerez 1000 mètres pour le côté est, 1000 mètres pour le côté sud, 1000 mètres pour le côté ouest et 1000 mètres pour le côté nord. La ville sera au milieu de ce carré. Cela formera leur territoire autour des villes.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '»Parmi les villes que vous donnerez aux Lévites, il y aura 6 villes de refuge, où l''auteur d''un homicide pourra s''enfuir, et 42 autres villes. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Total des villes que vous donnerez aux Lévites: 48 villes, avec leurs environs. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Les villes que vous donnerez étant prises sur les propriétés des Israélites, ceux qui en ont le plus en donneront plus et ceux qui en ont moins en donneront moins; chacun donnera une partie de ses villes aux Lévites proportionnellement à l'héritage qu'il possédera.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les 6 villes de refuge
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'L''Eternel dit à Moïse: '
