document_id: 1CH.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Premiers habitants de Jérusalem après l'exil
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Tous les Israélites étaient enregistrés sur des listes généalogiques et inscrits dans le livre des rois d''Israël. Puis les habitants de Juda furent exilés à Babylone à cause de leurs infidélités. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Les premiers habitants à retrouver leurs possessions et leurs villes furent des Israélites, les prêtres, les Lévites et les serviteurs du temple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'A Jérusalem s''installèrent des Judéens, des Benjaminites, des Ephraïmites et des Manassites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Parmi les descendants de Pérets, le fils de Juda, figurait Uthaï, fils d''Ammihud et descendant d''Omri, d''Imri et de Bani. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Parmi les Shilonites figuraient Asaja, l''aîné, et ses fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Parmi les descendants de Zérach figurait Jeuel. Avec leurs frères, ils étaient 690 en tout. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Parmi les Benjaminites figuraient Sallu, fils de Meshullam et descendant d''Hodavia et d''Assenua, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jibneja, fils de Jerocham, Ela, fils d''Uzzi et petit-fils de Micri, Meshullam, fils de Shephathia et descendant de Reuel et de Jibnija. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Avec leurs frères, dans leur lignée, ils étaient 956 en tout. Tous ces hommes étaient des chefs de famille.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Parmi les prêtres figuraient Jedaeja, Jehojarib, Jakin, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Azaria, fils de Hilkija et descendant de Meshullam, Tsadok, Merajoth et Achithub, qui était responsable de la maison de Dieu, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Adaja, fils de Jerocham et descendant de Pashhur et Malkija, ainsi que Maesaï, fils d''Adiel et descendant de Jachzéra, Meshullam, Meshillémith et Immer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Avec leurs frères, qui étaient chefs de leurs familles, ils étaient 1760 en tout. C'étaient des hommes vaillants, chargés du service de la maison de Dieu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Parmi les Lévites figuraient Shemaeja, fils de Hashub et descendant d''Azrikam et Hashabia, qui était un descendant de Merari, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Bakbakkar, Héresh, Galal, Matthania, fils de Michée et descendant de Zicri et Asaph, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Abdias, fils de Shemaeja et descendant de Galal et Jeduthun, ainsi que Bérékia, fils d'Asa et petit-fils d'Elkana, qui habitait dans les villages des Nethophathiens.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Comme portiers, il y avait Shallum, Akkub, Thalmon, Achiman et leurs frères; Shallum était leur chef, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'et jusqu''à présent ils se tiennent à la porte du roi, à l''est. C''étaient eux les portiers du camp des Lévites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Shallum, fils de Koré et descendant d''Ebiasaph et de Koré, ainsi que ses frères, membres de la même famille, les Koréites, remplissaient les fonctions de gardiens des entrées de la tente. Leurs ancêtres avaient gardé l''entrée du camp de l''Eternel, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'et Phinées, le fils d''Eléazar, avait été leur chef, par le passé, car l''Eternel était avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Zacharie, fils de Meshélémia, était portier à l''entrée de la tente de la rencontre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ils étaient en tout 212, choisis comme portiers et enregistrés dans les généalogies d''après leurs villages; c''étaient David et Samuel le voyant qui les avaient établis dans leurs fonctions permanentes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Eux et leurs enfants étaient responsables de garder les portes de la maison de l''Eternel, du tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Les portiers étaient postés des quatre côtés: à l''est, à l''ouest, au nord et au sud. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Leurs frères, qui habitaient dans leurs villages, devaient de temps à autre venir auprès d''eux pendant sept jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'En effet, ces quatre chefs des portiers, ces Lévites, étaient toujours en fonctions. Ils étaient en outre responsables des chambres et des trésors de la maison de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Ils passaient la nuit dans les environs de la maison de Dieu, car ils en avaient la garde et devaient l'ouvrir chaque matin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Quelques-uns des Lévites étaient responsables des ustensiles du service, qu''ils comptaient en les rentrant et en les sortant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'D''autres étaient chargés des ustensiles, de tous les ustensiles du sanctuaire, et de la fleur de farine, du vin, de l''huile, de l''encens et des aromates. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'C''étaient des fils de prêtres qui faisaient les mélanges pour les parfums aromatiques. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Matthithia, l''un des Lévites, fils aîné de Shallum le Koréite, s''occupait des gâteaux cuits sur la plaque. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Quelques-uns de leurs frères, des Kehathites, étaient chargés de préparer pour chaque sabbat les pains consacrés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Les chefs de famille des Lévites qui étaient musiciens habitaient dans les chambres. Ils étaient dispensés des autres fonctions parce qu''ils étaient à l''œuvre jour et nuit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Tels étaient les chefs de famille des Lévites en fonction de leur lignée. Ils habitaient à Jérusalem.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Généalogie de Saül et de Jonathan
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Le père de Gabaon, Jeïel, habitait à Gabaon et sa femme s''appelait Maaca. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Abdon était son fils aîné, puis venaient Tsur, Kis, Baal, Ner, Nadab, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Guedor, Achjo, Zacharie et Mikloth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Mikloth eut pour fils Shimeam. Contrairement à leurs frères, ils habitaient à Jérusalem avec leurs frères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ner eut pour fils Kis; Kis eut Saül; Saül eut Jonathan, Malki-Shua, Abinadab et Eshbaal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Fils de Jonathan: Merib-Baal. Merib-Baal eut pour fils Michée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Fils de Michée: Pithon, Mélec, Thachréa. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Achaz eut pour fils Jaera; Jaera eut Alémeth, Azmaveth et Zimri; Zimri eut Motsa; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Motsa eut Binea, lui-même père de Rephaja, père d''Eleasa, père d''Atsel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Atsel eut six fils, dont voici les noms: Azrikam, Bocru, Ismaël, Shearia, Abdias et Hanan. Ce sont là les fils d''Atsel.'
