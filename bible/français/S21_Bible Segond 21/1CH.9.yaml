document_id: 1CH.9,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Premiers habitants de Jérusalem après l'exil
  - type: text
    content: 'Tous les Israélites étaient enregistrés sur des listes généalogiques et inscrits dans le livre des rois d''Israël. Puis les habitants de Juda furent exilés à Babylone à cause de leurs infidélités. '
  '10':
  - type: text
    content: 'Parmi les prêtres figuraient Jedaeja, Jehojarib, Jakin, '
  '11':
  - type: text
    content: 'Azaria, fils de Hilkija et descendant de Meshullam, Tsadok, Merajoth et Achithub, qui était responsable de la maison de Dieu, '
  '12':
  - type: text
    content: 'Adaja, fils de Jerocham et descendant de Pashhur et Malkija, ainsi que Maesaï, fils d''Adiel et descendant de Jachzéra, Meshullam, Meshillémith et Immer. '
  '13':
  - type: text
    content: Avec leurs frères, qui étaient chefs de leurs familles, ils étaient 1760 en tout. C'étaient des hommes vaillants, chargés du service de la maison de Dieu.
  '14':
  - type: text
    content: 'Parmi les Lévites figuraient Shemaeja, fils de Hashub et descendant d''Azrikam et Hashabia, qui était un descendant de Merari, '
  '15':
  - type: text
    content: 'Bakbakkar, Héresh, Galal, Matthania, fils de Michée et descendant de Zicri et Asaph, '
  '16':
  - type: text
    content: Abdias, fils de Shemaeja et descendant de Galal et Jeduthun, ainsi que Bérékia, fils d'Asa et petit-fils d'Elkana, qui habitait dans les villages des Nethophathiens.
  '17':
  - type: text
    content: 'Comme portiers, il y avait Shallum, Akkub, Thalmon, Achiman et leurs frères; Shallum était leur chef, '
  '18':
  - type: text
    content: 'et jusqu''à présent ils se tiennent à la porte du roi, à l''est. C''étaient eux les portiers du camp des Lévites. '
  '19':
  - type: text
    content: 'Shallum, fils de Koré et descendant d''Ebiasaph et de Koré, ainsi que ses frères, membres de la même famille, les Koréites, remplissaient les fonctions de gardiens des entrées de la tente. Leurs ancêtres avaient gardé l''entrée du camp de l''Eternel, '
  '2':
  - type: text
    content: Les premiers habitants à retrouver leurs possessions et leurs villes furent des Israélites, les prêtres, les Lévites et les serviteurs du temple.
  '20':
  - type: text
    content: 'et Phinées, le fils d''Eléazar, avait été leur chef, par le passé, car l''Eternel était avec lui. '
  '21':
  - type: text
    content: 'Zacharie, fils de Meshélémia, était portier à l''entrée de la tente de la rencontre. '
  '22':
  - type: text
    content: 'Ils étaient en tout 212, choisis comme portiers et enregistrés dans les généalogies d''après leurs villages; c''étaient David et Samuel le voyant qui les avaient établis dans leurs fonctions permanentes. '
  '23':
  - type: text
    content: 'Eux et leurs enfants étaient responsables de garder les portes de la maison de l''Eternel, du tabernacle. '
  '24':
  - type: text
    content: 'Les portiers étaient postés des quatre côtés: à l''est, à l''ouest, au nord et au sud. '
  '25':
  - type: text
    content: 'Leurs frères, qui habitaient dans leurs villages, devaient de temps à autre venir auprès d''eux pendant sept jours. '
  '26':
  - type: text
    content: 'En effet, ces quatre chefs des portiers, ces Lévites, étaient toujours en fonctions. Ils étaient en outre responsables des chambres et des trésors de la maison de Dieu. '
  '27':
  - type: text
    content: Ils passaient la nuit dans les environs de la maison de Dieu, car ils en avaient la garde et devaient l'ouvrir chaque matin.
  '28':
  - type: text
    content: 'Quelques-uns des Lévites étaient responsables des ustensiles du service, qu''ils comptaient en les rentrant et en les sortant. '
  '29':
  - type: text
    content: 'D''autres étaient chargés des ustensiles, de tous les ustensiles du sanctuaire, et de la fleur de farine, du vin, de l''huile, de l''encens et des aromates. '
  '3':
  - type: text
    content: 'A Jérusalem s''installèrent des Judéens, des Benjaminites, des Ephraïmites et des Manassites. '
  '30':
  - type: text
    content: 'C''étaient des fils de prêtres qui faisaient les mélanges pour les parfums aromatiques. '
  '31':
  - type: text
    content: 'Matthithia, l''un des Lévites, fils aîné de Shallum le Koréite, s''occupait des gâteaux cuits sur la plaque. '
  '32':
  - type: text
    content: Quelques-uns de leurs frères, des Kehathites, étaient chargés de préparer pour chaque sabbat les pains consacrés.
  '33':
  - type: text
    content: 'Les chefs de famille des Lévites qui étaient musiciens habitaient dans les chambres. Ils étaient dispensés des autres fonctions parce qu''ils étaient à l''œuvre jour et nuit. '
  '34':
  - type: text
    content: Tels étaient les chefs de famille des Lévites en fonction de leur lignée. Ils habitaient à Jérusalem.
  - type: heading
    content: Généalogie de Saül et de Jonathan
  '35':
  - type: text
    content: 'Le père de Gabaon, Jeïel, habitait à Gabaon et sa femme s''appelait Maaca. '
  '36':
  - type: text
    content: 'Abdon était son fils aîné, puis venaient Tsur, Kis, Baal, Ner, Nadab, '
  '37':
  - type: text
    content: 'Guedor, Achjo, Zacharie et Mikloth. '
  '38':
  - type: text
    content: 'Mikloth eut pour fils Shimeam. Contrairement à leurs frères, ils habitaient à Jérusalem avec leurs frères. '
  '39':
  - type: text
    content: 'Ner eut pour fils Kis; Kis eut Saül; Saül eut Jonathan, Malki-Shua, Abinadab et Eshbaal. '
  '4':
  - type: text
    content: 'Parmi les descendants de Pérets, le fils de Juda, figurait Uthaï, fils d''Ammihud et descendant d''Omri, d''Imri et de Bani. '
  '40':
  - type: text
    content: 'Fils de Jonathan: Merib-Baal. Merib-Baal eut pour fils Michée. '
  '41':
  - type: text
    content: 'Fils de Michée: Pithon, Mélec, Thachréa. '
  '42':
  - type: text
    content: 'Achaz eut pour fils Jaera; Jaera eut Alémeth, Azmaveth et Zimri; Zimri eut Motsa; '
  '43':
  - type: text
    content: 'Motsa eut Binea, lui-même père de Rephaja, père d''Eleasa, père d''Atsel. '
  '44':
  - type: text
    content: 'Atsel eut six fils, dont voici les noms: Azrikam, Bocru, Ismaël, Shearia, Abdias et Hanan. Ce sont là les fils d''Atsel.'
  '5':
  - type: text
    content: 'Parmi les Shilonites figuraient Asaja, l''aîné, et ses fils. '
  '6':
  - type: text
    content: 'Parmi les descendants de Zérach figurait Jeuel. Avec leurs frères, ils étaient 690 en tout. '
  '7':
  - type: text
    content: 'Parmi les Benjaminites figuraient Sallu, fils de Meshullam et descendant d''Hodavia et d''Assenua, '
  '8':
  - type: text
    content: 'Jibneja, fils de Jerocham, Ela, fils d''Uzzi et petit-fils de Micri, Meshullam, fils de Shephathia et descendant de Reuel et de Jibnija. '
  '9':
  - type: text
    content: Avec leurs frères, dans leur lignée, ils étaient 956 en tout. Tous ces hommes étaient des chefs de famille.
