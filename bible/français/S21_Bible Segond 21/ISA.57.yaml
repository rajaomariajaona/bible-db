document_id: ISA.57,152
type_code: fra
verses:
  '1':
  - type: text
    content: Le juste disparaît et personne ne prend cela à cœur,
  - type: text
    content: les hommes de bien sont enlevés et personne ne comprend
  - type: text
    content: que c'est à cause du mal que le juste est enlevé.
  '10':
  - type: text
    content: A force de marcher tu te fatigues,
  - type: text
    content: 'mais tu ne te dis pas: «C''est sans espoir!»'
  - type: text
    content: Tu parviens encore à trouver des ressources,
  - type: text
    content: aussi ne montres-tu pas de signe de faiblesse.
  '11':
  - type: text
    content: Qui redoutais-tu, de qui avais-tu peur pour me tromper,
  - type: text
    content: pour ne pas te souvenir ni te soucier de moi?
  - type: text
    content: N'ai-je pas gardé le silence, et même depuis longtemps?
  - type: text
    content: Et de moi, tu n'as pas peur.
  '12':
  - type: text
    content: Je vais révéler ta justice
  - type: text
    content: et tes actes, mais ils ne te seront d'aucune utilité.
  '13':
  - type: text
    content: Quand tu crieras, que ton ramassis d'idoles vienne te délivrer!
  - type: text
    content: En réalité, le vent les emportera toutes, un souffle les enlèvera.
  - type: text
    content: En revanche, celui qui cherche refuge en moi héritera du pays
  - type: text
    content: et prendra possession de ma montagne sainte.
  - type: heading
    content: Promesses de paix et de guérison
  '14':
  - type: text
    content: 'On dira alors: «Préparez, préparez, dégagez un chemin,'
  - type: text
    content: enlevez tout obstacle du chemin de mon peuple!»
  '15':
  - type: text
    content: En effet, voici ce que dit le Très-Haut,
  - type: text
    content: 'celui dont l''habitation est éternelle et le nom saint:'
  - type: text
    content: J'habite dans les hauteurs et la sainteté,
  - type: text
    content: mais je suis aussi avec l'homme brisé et abattu
  - type: text
    content: afin de redonner vie à l'esprit abattu,
  - type: text
    content: afin de redonner vie au cœur brisé.
  '16':
  - type: text
    content: Non, je ne veux pas lancer éternellement des accusations,
  - type: text
    content: je ne veux pas m'irriter indéfiniment,
  - type: text
    content: car il est trop faible devant moi, l'esprit,
  - type: text
    content: le souffle des êtres que j'ai moi-même faits.
  '17':
  - type: text
    content: C'est à cause de ses profits criminels que je me suis irrité et que je l'ai frappé.
  - type: text
    content: Je me suis caché, dans mon indignation,
  - type: text
    content: et le rebelle a suivi le chemin que lui indiquait son cœur.
  '18':
  - type: text
    content: J'ai vu sa conduite,
  - type: text
    content: mais je le guérirai.
  - type: text
    content: Je le guiderai
  - type: text
    content: et je lui assurerai une pleine consolation, à lui et à ceux qui sont en deuil à cause de lui.
  '19':
  - type: text
    content: Je ferai naître la louange sur leurs lèvres,
  - type: text
    content: je donnerai la paix, oui *la paix à celui qui est loin et à celui qui est près
  - type: note
    content: 'La paix… près: cité en Ephésiens 2.17 en rapport avec l''œuvre de Jésus-Christ qui réunit les Juifs et les non-Juifs.'
  - type: text
    content: ', dit l''Eternel, et je les guérirai.'
  '2':
  - type: text
    content: Il entrera dans la paix et trouvera le repos sur son lit,
  - type: text
    content: celui qui aura marché dans la droiture.
  '20':
  - type: text
    content: Quant aux méchants, ils seront pareils à la mer agitée
  - type: text
    content: qui ne peut se calmer
  - type: text
    content: 'et dont l''eau soulève la vase et la saleté:'
  '21':
  - type: text
    content: il n'y a pas de paix pour les méchants, dit mon Dieu.
  '3':
  - type: text
    content: Mais vous, approchez-vous ici, fils de l'astrologue,
  - type: text
    content: vous qui descendez d'un père adultère et d'une mère prostituée!
  '4':
  - type: text
    content: De qui vous moquez-vous?
  - type: text
    content: Contre qui ouvrez-vous une large bouche
  - type: text
    content: et tirez-vous la langue?
  - type: text
    content: N'êtes-vous pas des enfants désobéissants,
  - type: text
    content: une famille de menteurs?
  '5':
  - type: text
    content: Vous brûlez de désir près des térébinthes, sous tout arbre verdoyant,
  - type: text
    content: et vous égorgez les enfants dans les vallées,
  - type: text
    content: sous les fentes des rochers!
  '6':
  - type: text
    content: C'est dans les pierres polies d'un ravin qu'est ta part.
  - type: text
    content: Voilà, oui, voilà quel est ton lot!
  - type: text
    content: C'est en leur honneur que tu verses des offrandes,
  - type: text
    content: que tu offres des sacrifices.
  - type: text
    content: Puis-je être insensible à cela?
  '7':
  - type: text
    content: Sur une grande et haute montagne, tu dresses ton lit.
  - type: text
    content: C'est aussi là que tu montes pour offrir des sacrifices.
  '8':
  - type: text
    content: Derrière la porte et ses montants, tu as installé ton amulette.
  - type: text
    content: En effet, en cachette de moi tu te déshabilles,
  - type: text
    content: tu montes sur ton lit et tu y fais de la place; tu fais alliance
  - type: text
    content: avec ceux dont tu aimes partager le lit, tu contemples leur nudité.
  '9':
  - type: text
    content: Puis, tu vas trouver le roi avec de l'huile,
  - type: text
    content: tu multiplies tes parfums,
  - type: text
    content: tu envoies tes messagers très loin,
  - type: text
    content: tu descends jusqu'au séjour des morts.
