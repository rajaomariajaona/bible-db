document_id: ISA.57
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Le juste disparaît et personne ne prend cela à cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les hommes de bien sont enlevés et personne ne comprend
- type: usfm
  marker: q1
  children:
  - type: text
    text: que c'est à cause du mal que le juste est enlevé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Il entrera dans la paix et trouvera le repos sur son lit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui aura marché dans la droiture.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Mais vous, approchez-vous ici, fils de l'astrologue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous qui descendez d'un père adultère et d'une mère prostituée!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: De qui vous moquez-vous?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Contre qui ouvrez-vous une large bouche
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tirez-vous la langue?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N'êtes-vous pas des enfants désobéissants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une famille de menteurs?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Vous brûlez de désir près des térébinthes, sous tout arbre verdoyant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous égorgez les enfants dans les vallées,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sous les fentes des rochers!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: C'est dans les pierres polies d'un ravin qu'est ta part.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voilà, oui, voilà quel est ton lot!
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est en leur honneur que tu verses des offrandes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que tu offres des sacrifices.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puis-je être insensible à cela?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Sur une grande et haute montagne, tu dresses ton lit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est aussi là que tu montes pour offrir des sacrifices.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Derrière la porte et ses montants, tu as installé ton amulette.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En effet, en cachette de moi tu te déshabilles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu montes sur ton lit et tu y fais de la place; tu fais alliance
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec ceux dont tu aimes partager le lit, tu contemples leur nudité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Puis, tu vas trouver le roi avec de l'huile,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu multiplies tes parfums,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu envoies tes messagers très loin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu descends jusqu'au séjour des morts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: A force de marcher tu te fatigues,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'mais tu ne te dis pas: «C''est sans espoir!»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu parviens encore à trouver des ressources,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aussi ne montres-tu pas de signe de faiblesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Qui redoutais-tu, de qui avais-tu peur pour me tromper,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour ne pas te souvenir ni te soucier de moi?
- type: usfm
  marker: q1
  children:
  - type: text
    text: N'ai-je pas gardé le silence, et même depuis longtemps?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et de moi, tu n'as pas peur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je vais révéler ta justice
- type: usfm
  marker: q1
  children:
  - type: text
    text: et tes actes, mais ils ne te seront d'aucune utilité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Quand tu crieras, que ton ramassis d'idoles vienne te délivrer!
- type: usfm
  marker: q1
  children:
  - type: text
    text: En réalité, le vent les emportera toutes, un souffle les enlèvera.
- type: usfm
  marker: q1
  children:
  - type: text
    text: En revanche, celui qui cherche refuge en moi héritera du pays
- type: usfm
  marker: q1
  children:
  - type: text
    text: et prendra possession de ma montagne sainte.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Promesses de paix et de guérison
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'On dira alors: «Préparez, préparez, dégagez un chemin,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: enlevez tout obstacle du chemin de mon peuple!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: En effet, voici ce que dit le Très-Haut,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'celui dont l''habitation est éternelle et le nom saint:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'habite dans les hauteurs et la sainteté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais je suis aussi avec l'homme brisé et abattu
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin de redonner vie à l'esprit abattu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin de redonner vie au cœur brisé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Non, je ne veux pas lancer éternellement des accusations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne veux pas m'irriter indéfiniment,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il est trop faible devant moi, l'esprit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le souffle des êtres que j'ai moi-même faits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: C'est à cause de ses profits criminels que je me suis irrité et que je l'ai frappé.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je me suis caché, dans mon indignation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le rebelle a suivi le chemin que lui indiquait son cœur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: J'ai vu sa conduite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais je le guérirai.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je le guiderai
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je lui assurerai une pleine consolation, à lui et à ceux qui sont en deuil à cause de lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Je ferai naître la louange sur leurs lèvres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je donnerai la paix, oui *la paix à celui qui est loin et à celui qui est près
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '57.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La paix… près: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Ephésiens 2.17
      metadata:
        usfm: EPH.2.17
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' en rapport avec l''œuvre de Jésus-Christ qui réunit les Juifs et les non-Juifs.'
    marker-yv: yv-n
  - type: text
    text: ', dit l''Eternel, et je les guérirai.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Quant aux méchants, ils seront pareils à la mer agitée
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui ne peut se calmer
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et dont l''eau soulève la vase et la saleté:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: il n'y a pas de paix pour les méchants, dit mon Dieu.
