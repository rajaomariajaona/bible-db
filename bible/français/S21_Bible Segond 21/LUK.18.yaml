document_id: LUK.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parabole de la veuve et du juge
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus leur dit une parabole pour montrer qu''ils devaient toujours prier, sans se décourager. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il dit: «Il y avait dans une ville un juge qui ne craignait pas Dieu et qui n''avait d''égards pour personne. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il y avait aussi dans cette ville une veuve qui venait lui dire: ‘Rends-moi justice contre ma partie adverse.’ '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pendant longtemps il refusa. Mais ensuite il se dit: ‘Même si je ne crains pas Dieu et n''ai d''égards pour personne, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'puisque cette veuve me fatigue, je vais lui rendre justice afin qu''elle ne vienne pas sans cesse me déranger.’» '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le Seigneur ajouta: «Ecoutez ce que dit le juge injuste. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Et Dieu ne fera-t-il pas justice à ceux qu''il a choisis et qui crient à lui jour et nuit? Les fera-t-il attendre? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Je vous le dis, il leur fera rapidement justice. Mais, quand le Fils de l'homme viendra, trouvera-t-il la foi sur la terre?»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Parabole du pharisien et du collecteur d'impôts
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il dit encore cette parabole, à l''intention de certaines personnes qui étaient convaincues d''être justes et qui méprisaient les autres: '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '«Deux hommes montèrent au temple pour prier; l''un était un pharisien, l''autre un collecteur d''impôts. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Le pharisien, debout, faisait cette prière en lui-même: ‘O Dieu, je te remercie de ce que je ne suis pas comme les autres hommes, qui sont voleurs, injustes, adultères, ou même comme ce collecteur d''impôts. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Je jeûne deux fois par semaine et je donne la dîme de tous mes revenus.’ '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le collecteur d''impôts, lui, se tenait à distance et n''osait même pas lever les yeux au ciel, mais il se frappait la poitrine en disant: ‘O Dieu, aie pitié de moi, qui suis un pécheur.’ '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je vous le dis, lorsque ce dernier descendit chez lui, il était considéré comme juste, mais pas le pharisien. En effet, toute personne qui s'élève sera abaissée, et celle qui s'abaisse sera élevée.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les petits enfants et l'homme riche
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Des gens lui amenaient même de tout petits enfants afin qu''il les touche, mais les disciples, en voyant cela, leur firent des reproches. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Jésus appela les enfants et dit: «Laissez les petits enfants venir à moi et ne les en empêchez pas, car le royaume de Dieu est pour ceux qui leur ressemblent. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Je vous le dis en vérité, celui qui n'accueille pas le royaume de Dieu comme un petit enfant n'y entrera pas.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Un chef interrogea Jésus et dit: «Bon maître, que dois-je faire pour hériter de la vie éternelle?» '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Jésus lui répondit: «Pourquoi m''appelles-tu bon? Personne n''est bon, si ce n''est Dieu seul. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tu connais les commandements: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu ne commettras pas d'adultère; tu ne commettras pas de meurtre; tu ne commettras pas de vol; tu ne porteras pas de faux témoignage; honore ton père et ta mère
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu ne commettras… mère: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation de cinq des dix commandements (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 20.12-16
      metadata:
        usfm: EXO.20.12+EXO.20.13+EXO.20.14+EXO.20.15+EXO.20.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 5.16-20
      metadata:
        usfm: DEU.5.16+DEU.5.17+DEU.5.18+DEU.5.19+DEU.5.20
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '» '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '«J''ai respecté tous ces commandements dès ma jeunesse», dit-il. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Après avoir entendu [cela], Jésus lui dit: «Il te manque encore une chose: vends tout ce que tu as, distribue-le aux pauvres, et tu auras un trésor dans le ciel. Puis viens et suis-moi.» '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Lorsqu''il entendit ces paroles, l''homme devint tout triste, car il était très riche. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Voyant qu''il était devenu tout triste, Jésus dit: «Qu''il est difficile à ceux qui ont des richesses d''entrer dans le royaume de Dieu! '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'En effet, il est plus facile à un chameau de passer par un trou d''aiguille qu''à un riche d''entrer dans le royaume de Dieu.» '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ceux qui l''écoutaient dirent: «Qui donc peut être sauvé?» '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Jésus répondit: «Ce qui est impossible aux hommes est possible à Dieu.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Pierre dit alors: «Voici, nous avons tout quitté et nous t''avons suivi.» '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Jésus leur dit: «Je vous le dis en vérité, personne n''aura quitté à cause du royaume de Dieu sa maison ou sa femme, ses frères, ses parents ou ses enfants '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: sans recevoir beaucoup plus dans le temps présent et, dans le monde à venir, la vie éternelle.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Jésus prit les douze avec lui et leur dit: «Nous montons à Jérusalem et tout ce qui a été écrit par les prophètes au sujet du Fils de l''homme va s''accomplir. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'En effet, il sera livré aux non-Juifs, on se moquera de lui, on l''insultera, on crachera sur lui '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'et, après l''avoir fouetté, on le fera mourir; le troisième jour il ressuscitera.» '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Mais les disciples ne comprirent rien à cela: c''était pour eux un langage obscur, des paroles dont ils ne saisissaient pas le sens.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus à Jéricho
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Comme Jésus était près de Jéricho, un aveugle était assis au bord du chemin et mendiait. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Il entendit la foule passer et demanda ce qui se passait. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'On lui dit: «C''est Jésus de Nazareth qui passe.» '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Alors il cria: «Jésus, Fils de David'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.38 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Fils de David: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'titre donné au Messie, le Sauveur attendu par les Juifs, sur la base notamment de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 2 Samuel 7.12-16
      metadata:
        usfm: 2SA.7.12+2SA.7.13+2SA.7.14+2SA.7.15+2SA.7.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 9.5-6
      metadata:
        usfm: ISA.9.5+ISA.9.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', aie pitié de moi!» '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Ceux qui marchaient devant le reprenaient pour le faire taire, mais il criait beaucoup plus fort: «Fils de David, aie pitié de moi!» '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Jésus s''arrêta et ordonna qu''on le lui amène; quand il fut près de lui, il lui demanda: '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: '«Que veux-tu que je fasse pour toi?» Il répondit: «Seigneur, que je retrouve la vue.» '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Jésus lui dit: «Retrouve la vue, ta foi t''a sauvé.» '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Il retrouva immédiatement la vue et suivit Jésus en célébrant la gloire de Dieu. Voyant cela, tout le peuple se mit à adresser des louanges à Dieu.
