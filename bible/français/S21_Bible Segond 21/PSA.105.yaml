document_id: PSA.105,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La fidélité de Dieu envers Israël
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l'Eternel, faites appel à son nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: faites connaître ses hauts faits parmi les peuples!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il l'a érigé en prescription pour Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en alliance éternelle pour Israël,
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'quand il a dit: «Je te donnerai le pays de Canaan,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est l'héritage qui vous est attribué.»
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils étaient alors peu nombreux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: très peu nombreux, et étrangers dans le pays.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils erraient d'une nation à l'autre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et d'un royaume vers un autre peuple,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il n'a laissé personne les opprimer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et il a puni des rois à cause d''eux:'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ne touchez pas à ceux que j'ai désignés par onction
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne faites pas de mal à mes prophètes!»
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '105.1-15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Texte quasi identique en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 1 Chroniques 16.8-22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a appelé la famine sur le pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a coupé tout moyen de subsistance.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Il a envoyé un homme devant eux:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Joseph, qui a été vendu comme esclave.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On a attaché ses pieds avec des chaînes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on a enserré son cou dans du fer,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu'au moment où est arrivé ce qu'il avait annoncé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et où la parole de l''Eternel l''a justifié:'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Chantez en son honneur, jouez de vos instruments en son honneur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: célébrez toutes ses merveilles!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le roi l'a fait libérer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le dominateur des peuples l'a relâché;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il l'a établi seigneur sur sa maison
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et maître de tous ses biens,
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin qu'il puisse à son gré diriger ses princes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et enseigner la sagesse à ses anciens.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ensuite, Israël est venu en Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jacob a séjourné dans le pays de Cham.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu a donné de nombreux enfants à son peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'a rendu plus puissant que ses adversaires.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a changé le cœur des Egyptiens, au point qu'ils ont détesté son peuple
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'ils ont traité ses serviteurs avec perfidie.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a envoyé Moïse, son serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et Aaron, qu'il avait choisi.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils ont accompli par son pouvoir des prodiges en Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ont fait des miracles dans le pays de Cham.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a envoyé des ténèbres et fait venir l'obscurité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils n'ont pas été rebelles à sa parole.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a changé leur eau en sang
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et fait mourir leurs poissons.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Placez votre fierté dans son saint nom!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le cœur de ceux qui cherchent l'Eternel se réjouisse!
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le pays a pullulé de grenouilles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusque dans les chambres de leurs rois.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur son ordre, les mouches venimeuses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les moustiques ont envahi tout leur territoire.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au lieu de pluie, il a envoyé de la grêle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de la foudre dans leur pays.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a frappé leurs vignes et leurs figuiers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et brisé les arbres de leur territoire.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sur son ordre, les sauterelles sont arrivées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des sauterelles innombrables.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles ont dévoré toute l'herbe dans leur pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles ont dévoré tous les produits des champs.
  '36':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a frappé tous les premiers-nés dans leur pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les aînés de tous leurs enfants.
  '37':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a fait sortir son peuple avec de l'argent et de l'or,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et personne ne trébuchait parmi ses tribus.
  '38':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les Egyptiens se sont réjouis de leur départ,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils étaient saisis de terreur devant les Israélites.
  '39':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a étendu la nuée pour les protéger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le feu pour éclairer la nuit.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ayez recours à l'Eternel et à sa force,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: recherchez constamment sa présence!
  '40':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A leur demande, il a fait venir des cailles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il les a rassasiés du pain du ciel.
  '41':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a ouvert le rocher et de l'eau a coulé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle s'est déversée comme un fleuve dans les lieux arides,
  '42':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il s'est souvenu de sa parole sainte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et d'Abraham, son serviteur.
  '43':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a fait sortir son peuple dans l'allégresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qu'il a choisis au milieu des cris de joie.
  '44':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il leur a donné les terres des nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils ont tiré profit du travail des peuples,
  '45':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin qu'ils gardent ses prescriptions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'ils respectent ses lois.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l'Eternel!
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Souvenez-vous des merveilles qu'il a accomplies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de ses miracles et de ses jugements,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: descendants d'Abraham, son serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: enfants de Jacob, qu'il a choisis!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel est notre Dieu;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses jugements s'exercent sur toute la terre.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il se rappelle toujours son alliance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: son mot d'ordre pour 1000 générations,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le pacte qu'il a traité avec Abraham,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le serment qu'il a fait à Isaac.
