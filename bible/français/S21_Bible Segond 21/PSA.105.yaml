document_id: PSA.105,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La fidélité de Dieu envers Israël
  - type: text
    content: Louez l'Eternel, faites appel à son nom,
  - type: text
    content: faites connaître ses hauts faits parmi les peuples!
  '10':
  - type: text
    content: Il l'a érigé en prescription pour Jacob,
  - type: text
    content: en alliance éternelle pour Israël,
  '11':
  - type: text
    content: 'quand il a dit: «Je te donnerai le pays de Canaan,'
  - type: text
    content: c'est l'héritage qui vous est attribué.»
  '12':
  - type: text
    content: Ils étaient alors peu nombreux,
  - type: text
    content: très peu nombreux, et étrangers dans le pays.
  '13':
  - type: text
    content: Ils erraient d'une nation à l'autre
  - type: text
    content: et d'un royaume vers un autre peuple,
  '14':
  - type: text
    content: mais il n'a laissé personne les opprimer,
  - type: text
    content: 'et il a puni des rois à cause d''eux:'
  '15':
  - type: text
    content: «Ne touchez pas à ceux que j'ai désignés par onction
  - type: text
    content: et ne faites pas de mal à mes prophètes!»
  - type: note
    content: Texte quasi identique en 1 Chroniques 16.8-22.
  '16':
  - type: text
    content: Il a appelé la famine sur le pays,
  - type: text
    content: il a coupé tout moyen de subsistance.
  '17':
  - type: text
    content: 'Il a envoyé un homme devant eux:'
  - type: text
    content: Joseph, qui a été vendu comme esclave.
  '18':
  - type: text
    content: On a attaché ses pieds avec des chaînes,
  - type: text
    content: on a enserré son cou dans du fer,
  '19':
  - type: text
    content: jusqu'au moment où est arrivé ce qu'il avait annoncé
  - type: text
    content: 'et où la parole de l''Eternel l''a justifié:'
  '2':
  - type: text
    content: Chantez en son honneur, jouez de vos instruments en son honneur,
  - type: text
    content: célébrez toutes ses merveilles!
  '20':
  - type: text
    content: le roi l'a fait libérer,
  - type: text
    content: le dominateur des peuples l'a relâché;
  '21':
  - type: text
    content: il l'a établi seigneur sur sa maison
  - type: text
    content: et maître de tous ses biens,
  '22':
  - type: text
    content: afin qu'il puisse à son gré diriger ses princes
  - type: text
    content: et enseigner la sagesse à ses anciens.
  '23':
  - type: text
    content: Ensuite, Israël est venu en Egypte,
  - type: text
    content: Jacob a séjourné dans le pays de Cham.
  '24':
  - type: text
    content: Dieu a donné de nombreux enfants à son peuple
  - type: text
    content: et l'a rendu plus puissant que ses adversaires.
  '25':
  - type: text
    content: Il a changé le cœur des Egyptiens, au point qu'ils ont détesté son peuple
  - type: text
    content: et qu'ils ont traité ses serviteurs avec perfidie.
  '26':
  - type: text
    content: Il a envoyé Moïse, son serviteur,
  - type: text
    content: et Aaron, qu'il avait choisi.
  '27':
  - type: text
    content: Ils ont accompli par son pouvoir des prodiges en Egypte,
  - type: text
    content: ils ont fait des miracles dans le pays de Cham.
  '28':
  - type: text
    content: Il a envoyé des ténèbres et fait venir l'obscurité,
  - type: text
    content: et ils n'ont pas été rebelles à sa parole.
  '29':
  - type: text
    content: Il a changé leur eau en sang
  - type: text
    content: et fait mourir leurs poissons.
  '3':
  - type: text
    content: Placez votre fierté dans son saint nom!
  - type: text
    content: Que le cœur de ceux qui cherchent l'Eternel se réjouisse!
  '30':
  - type: text
    content: Le pays a pullulé de grenouilles,
  - type: text
    content: jusque dans les chambres de leurs rois.
  '31':
  - type: text
    content: Sur son ordre, les mouches venimeuses
  - type: text
    content: et les moustiques ont envahi tout leur territoire.
  '32':
  - type: text
    content: Au lieu de pluie, il a envoyé de la grêle,
  - type: text
    content: de la foudre dans leur pays.
  '33':
  - type: text
    content: Il a frappé leurs vignes et leurs figuiers,
  - type: text
    content: et brisé les arbres de leur territoire.
  '34':
  - type: text
    content: Sur son ordre, les sauterelles sont arrivées,
  - type: text
    content: des sauterelles innombrables.
  '35':
  - type: text
    content: Elles ont dévoré toute l'herbe dans leur pays,
  - type: text
    content: elles ont dévoré tous les produits des champs.
  '36':
  - type: text
    content: Il a frappé tous les premiers-nés dans leur pays,
  - type: text
    content: les aînés de tous leurs enfants.
  '37':
  - type: text
    content: Il a fait sortir son peuple avec de l'argent et de l'or,
  - type: text
    content: et personne ne trébuchait parmi ses tribus.
  '38':
  - type: text
    content: Les Egyptiens se sont réjouis de leur départ,
  - type: text
    content: car ils étaient saisis de terreur devant les Israélites.
  '39':
  - type: text
    content: Il a étendu la nuée pour les protéger,
  - type: text
    content: et le feu pour éclairer la nuit.
  '4':
  - type: text
    content: Ayez recours à l'Eternel et à sa force,
  - type: text
    content: recherchez constamment sa présence!
  '40':
  - type: text
    content: A leur demande, il a fait venir des cailles,
  - type: text
    content: et il les a rassasiés du pain du ciel.
  '41':
  - type: text
    content: Il a ouvert le rocher et de l'eau a coulé,
  - type: text
    content: elle s'est déversée comme un fleuve dans les lieux arides,
  '42':
  - type: text
    content: car il s'est souvenu de sa parole sainte
  - type: text
    content: et d'Abraham, son serviteur.
  '43':
  - type: text
    content: Il a fait sortir son peuple dans l'allégresse,
  - type: text
    content: ceux qu'il a choisis au milieu des cris de joie.
  '44':
  - type: text
    content: Il leur a donné les terres des nations,
  - type: text
    content: et ils ont tiré profit du travail des peuples,
  '45':
  - type: text
    content: afin qu'ils gardent ses prescriptions
  - type: text
    content: et qu'ils respectent ses lois.
  - type: text
    content: Louez l'Eternel!
  '5':
  - type: text
    content: Souvenez-vous des merveilles qu'il a accomplies,
  - type: text
    content: de ses miracles et de ses jugements,
  '6':
  - type: text
    content: descendants d'Abraham, son serviteur,
  - type: text
    content: enfants de Jacob, qu'il a choisis!
  '7':
  - type: text
    content: L'Eternel est notre Dieu;
  - type: text
    content: ses jugements s'exercent sur toute la terre.
  '8':
  - type: text
    content: Il se rappelle toujours son alliance,
  - type: text
    content: son mot d'ordre pour 1000 générations,
  '9':
  - type: text
    content: le pacte qu'il a traité avec Abraham,
  - type: text
    content: le serment qu'il a fait à Isaac.
