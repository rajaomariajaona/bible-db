document_id: 2CH.4,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Fabrication du mobilier du temple
  - type: text
    content: Il fit un autel en bronze long de 10 mètres, large de 10 et haut de 5.
  '10':
  - type: text
    content: Il plaça la cuve du côté droit [du temple], au sud-est.
  '11':
  - type: text
    content: 'Huram fabriqua encore les cendriers, les pelles et les coupes. C''est ainsi qu''Huram termina le travail que le roi Salomon lui avait fait faire pour la maison de Dieu: '
  '12':
  - type: text
    content: 'deux colonnes, avec les deux chapiteaux et leurs bourrelets sur le sommet des colonnes; les deux treillis, pour couvrir les deux bourrelets des chapiteaux sur le sommet des colonnes; '
  '13':
  - type: text
    content: 'les 400 grenades pour les deux treillis, deux rangées de grenades par treillis, pour couvrir les deux bourrelets des chapiteaux sur le sommet des colonnes. '
  '14':
  - type: text
    content: 'Il fit les bases avec les bassins qui vont dessus; '
  '15':
  - type: text
    content: 'la cuve et les 12 bœufs qui vont sous elle; '
  '16':
  - type: text
    content: 'les cendriers, les pelles et les fourchettes. Tous ces ustensiles que le roi Salomon fit faire à Huram-Abi pour la maison de l''Eternel étaient en bronze poli. '
  '17':
  - type: text
    content: 'Le roi les fit fondre dans la plaine du Jourdain, dans un sol argileux, entre Succoth et Tseréda. '
  '18':
  - type: text
    content: Salomon fit tous ces ustensiles en si grande quantité que l'on ne vérifia pas le poids du bronze utilisé.
  '19':
  - type: text
    content: 'Salomon fit encore tous les autres ustensiles pour la maison de Dieu: l''autel en or; les tables sur lesquelles on mettait les pains consacrés; '
  '2':
  - type: text
    content: 'Il fit la cuve en métal fondu. Elle faisait 5 mètres d''un bord à l''autre et était entièrement ronde. Elle faisait 2 mètres et demi de haut et on pouvait mesurer sa circonférence avec un cordon de 15 mètres. '
  '20':
  - type: text
    content: 'les chandeliers et leurs lampes en or pur, qu''on devait allumer d''après la règle établie devant le sanctuaire, '
  '21':
  - type: text
    content: 'avec les fleurs, les lampes et les mouchettes en or, en or très pur; '
  '22':
  - type: text
    content: les couteaux, les coupes, les tasses et les brûle-parfums en or pur; les gonds en or pour la porte située à l'intérieur du temple, à l'entrée du lieu très saint, et pour la porte de la salle située à l'entrée du temple.
  '3':
  - type: text
    content: 'Des images de bœufs en faisaient le tour, sous le rebord, 20 par mètre, sur tout le pourtour de la cuve; disposés sur deux rangs, les bœufs avaient été fondus avec elle d''une seule pièce. '
  '4':
  - type: text
    content: 'Elle était posée sur 12 bœufs, 3 tournés vers le nord, 3 vers l''ouest, 3 vers le sud et 3 vers l''est; la cuve reposait sur eux et toute la partie postérieure de leur corps était à l''intérieur. '
  '5':
  - type: text
    content: Elle était épaisse de 8 centimètres et son bord, pareil à celui d'une coupe, avait la forme d'une fleur de lis. Elle pouvait contenir 66'000 litres.
  '6':
  - type: text
    content: Il fit 10 bassins et il en plaça 5 à droite et 5 à gauche, pour qu'ils servent aux purifications. On y lavait le matériel des holocaustes, tandis que la cuve était réservée aux ablutions des prêtres.
  '7':
  - type: text
    content: Il fabriqua 10 chandeliers en or d'après les règles établies et il les plaça dans le temple, 5 à droite et 5 à gauche.
  '8':
  - type: text
    content: Il fit 10 tables et il les plaça dans le temple, 5 à droite et 5 à gauche. Il fit 100 coupes en or.
  '9':
  - type: text
    content: Il fit le parvis des prêtres ainsi que le grand parvis avec ses portes, dont il couvrit de bronze les battants.
