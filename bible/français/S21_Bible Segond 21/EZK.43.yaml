document_id: EZK.43
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La gloire de l'Eternel dans le temple
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Il m''a conduit à l''entrée, à celle qui était orientée à l''est. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'J''ai vu la gloire du Dieu d''Israël venir depuis l''est. Sa voix était pareille au bruit des grandes eaux et la terre resplendissait de sa gloire. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Cette apparition était semblable à celle que j'avais vue lorsque j'étais venu pour détruire la ville
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '43.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'J''étais venu pour détruire la ville: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: le message du prophète qui annonçait la destruction de Jérusalem est mis sur le même plan que la destruction proprement dite.
    marker-yv: yv-n
  - type: text
    text: ', elle ressemblait à la vision que j''avais eue près du fleuve Kebar. Alors je suis tombé le visage contre terre.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'La gloire de l''Eternel a pénétré dans le temple en passant par l''entrée qui est orientée à l''est. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L''Esprit m''a alors enlevé et m''a conduit dans le parvis intérieur. J''ai vu que la gloire de l''Eternel remplissait le temple. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: J'ai entendu quelqu'un me parler depuis le temple, tandis que l'homme se tenait près de moi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il m''a dit: «Fils de l''homme, voici l''emplacement de mon trône, l''endroit où je poserai la plante de mes pieds. C''est là que j''habiterai pour toujours au milieu des Israélites. La communauté d''Israël et ses rois ne porteront plus atteinte à la pureté de mon saint nom par leurs prostitutions et par les cadavres de leurs rois sur leurs hauts lieux. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils mettaient leur seuil près de mon seuil, les montants de leurs portes près des montants de mes portes, de sorte qu''il n''y avait plus qu''un mur entre moi et eux. Ils ont ainsi porté atteinte à la pureté de mon saint nom par les pratiques abominables auxquelles ils se sont adonnés. C''est pourquoi je les ai dévorés dans ma colère. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Désormais, ils éloigneront de moi leurs prostitutions et les cadavres de leurs rois, si bien que j'habiterai pour toujours au milieu d'eux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '»Toi, fils de l''homme, décris ce temple à la communauté d''Israël! Qu''ils rougissent de leurs fautes et mesurent le plan! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'S''ils rougissent de tout ce qu''ils ont fait, fais-leur connaître la forme de ce temple, sa disposition, ses issues et ses entrées, toutes ses formes et toutes les prescriptions le concernant, toutes ses formes et toutes les lois le concernant. Mets-les par écrit sous leurs yeux afin qu''ils retiennent toutes ses formes et toutes les prescriptions le concernant et s''y conforment. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Voici la loi concernant le temple: au sommet de la montagne, tout l''espace qui l''entoure est très saint. Telle est la loi du temple.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'autel des sacrifices et les offrandes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Voici les dimensions de l''autel. Les mesures étalons employées étaient plus longues de 8 centimètres que la mesure ordinaire. La base de l''autel faisait 50 centimètres de haut et 50 centimètres de large, avec un rebord tout autour qui avait 25 centimètres de largeur. C''était le support de l''autel. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Depuis la base, au ras du sol, jusqu''au socle inférieur il y avait un mètre sur 50 centimètres de largeur, et depuis le petit jusqu''au grand socle il y avait 2 mètres sur 50 centimètres de largeur. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le sommet de l''autel était à 2 mètres, et quatre cornes montaient du foyer. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le foyer faisait 6 mètres de long, 6 mètres de large, et formait un carré par ses quatre côtés. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Le socle avait 7 mètres de longueur sur 7 mètres de largeur, sur les quatre côtés, et le rebord qui l'entourait mesurait 25 centimètres. Sa base faisait 50 centimètres tout autour, et son escalier était orienté vers l'est.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il m''a dit: «Fils de l''homme, voici ce que dit le Seigneur, l''Eternel: Telles sont les prescriptions relatives à l''autel pour le jour où on le construira afin d''y offrir les holocaustes et d''y verser du sang. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tu donneras aux prêtres, aux Lévites qui sont issus de Tsadok et qui s''approchent de moi pour me servir, déclare le Seigneur, l''Eternel, un jeune taureau pour le sacrifice d''expiation. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tu prendras de son sang et tu en mettras sur les quatre cornes de l''autel, sur les quatre angles du socle et sur le rebord qui l''entoure. Tu purifieras ainsi l''autel du péché et tu feras pour lui le rite d''expiation. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tu prendras le taureau destiné au sacrifice d''expiation et on le brûlera dans un endroit réservé du temple, à l''extérieur du sanctuaire. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le deuxième jour, tu offriras un bouc sans défaut en sacrifice d''expiation. On purifiera ainsi l''autel du péché, tout comme on l''aura purifié avec le taureau. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Quand tu auras fini de le purifier du péché, tu offriras un jeune taureau sans défaut et un bélier du troupeau sans défaut. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tu les présenteras devant l''Eternel. Les prêtres jetteront du sel sur eux et les offriront en holocauste à l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Pendant sept jours tu offriras chaque jour un bouc en sacrifice d''expiation. On sacrifiera aussi un jeune taureau et un bélier du troupeau, tous les deux sans défaut. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Pendant sept jours on fera le rite d''expiation et la purification de l''autel. C''est ainsi qu''on le mettra en fonction. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Lorsqu'on arrivera au bout de cette période, dès le huitième jour et après, les prêtres offriront vos holocaustes et vos sacrifices de communion sur l'autel, et je vous serai favorable, déclare le Seigneur, l'Eternel.»
