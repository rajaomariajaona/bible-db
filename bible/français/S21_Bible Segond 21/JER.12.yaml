document_id: JER.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Perplexité de Jérémie et réponse de Dieu
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: «Tu es trop juste, Eternel, pour que je lance des accusations contre toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je veux néanmoins parler de justice avec toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi la voie des méchants conduit-elle au succès?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi tous les traîtres vivent-ils en paix?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Tu les as plantés, ils ont donc pris racine.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils vont bien, ils produisent donc du fruit.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es près de leur bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais éloigné de ce qu'ils sont.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Et toi, Eternel, tu me connais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'tu me vois, tu examines mon cœur: il est avec toi.'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Réserve-les comme des brebis qu'on doit égorger
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mets-les à part pour le jour du carnage!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Jusqu'à quand le pays sera-t-il endeuillé
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'herbe de tous les champs sera-t-elle desséchée?
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause de la méchanceté de ses habitants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les bêtes et les oiseaux disparaissent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Ils disent: ‘Il ne verra pas notre fin.’»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: «Si tu cours avec des piétons et qu'ils te fatiguent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comment pourras-tu lutter avec des chevaux?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Et si tu ne te sens en sécurité que dans une région paisible,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que feras-tu sur les rives luxuriantes du Jourdain?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: En effet, tes frères et ta famille te trahissent eux aussi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eux aussi, ils crient à pleine voix derrière toi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne les crois pas quand ils te diront des paroles amicales.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: »J'ai abandonné mon temple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ai délaissé mon héritage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ai livré l'objet de mon amour aux mains de ses ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Mon héritage s'est comporté envers moi comme un lion dans la forêt,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a poussé ses rugissements contre moi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est pourquoi je l'ai pris en haine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Mon héritage a été pour moi un rapace tacheté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aussi les autres rapaces viennent-ils de tous côtés contre lui.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Venez, rassemblez tous les animaux sauvages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: amenez-les pour le festin!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: De nombreux bergers ont détruit ma vigne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ont piétiné mon champ.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ont réduit le champ de mes délices
- type: usfm
  marker: q1
  children:
  - type: text
    text: en un désert inhabité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: On en a fait une terre dévastée.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est en deuil, il est en ruine devant moi.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tout le pays est dévasté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que personne ne l'a pris à cœur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Sur toutes les hauteurs du désert arrivent les dévastateurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car l'épée de l'Eternel dévore le pays d'un bout à l'autre.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il n'y a de paix pour personne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ils ont semé du blé et ils récoltent des ronces,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se sont fatigués sans que cela leur soit utile
- type: usfm
  marker: q1
  children:
  - type: text
    text: . Si vous devez avoir honte de vos récoltes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est à cause de la colère ardente de l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: »Voici ce que je dis, moi l'Eternel, sur tous mes méchants voisins
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'qui attaquent l''héritage que j''ai donné à mon peuple, Israël:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je vais les arracher de leur terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leur arracher la communauté de Juda.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Mais, après les avoir arrachés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'aurai de nouveau compassion d'eux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les ferai revenir
- type: usfm
  marker: q1
  children:
  - type: text
    text: chacun dans son héritage, chacun dans son pays.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Et si, de la même manière qu'ils ont enseigné à mon peuple à prêter serment au nom de Baal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils apprennent sincèrement à suivre les voies de mon peuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'jusqu''à prêter serment par mon nom en disant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘L'Eternel est vivant’,
- type: usfm
  marker: q1
  children:
  - type: text
    text: alors ils auront leur place au milieu de mon peuple.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: En revanche, s'ils n'écoutent rien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'arracherai une telle nation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je l'arracherai, je la ferai disparaître, déclare l'Eternel.»
