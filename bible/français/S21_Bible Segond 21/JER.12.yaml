document_id: JER.12,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Perplexité de Jérémie et réponse de Dieu
  - type: text
    content: «Tu es trop juste, Eternel, pour que je lance des accusations contre toi.
  - type: text
    content: Je veux néanmoins parler de justice avec toi.
  - type: text
    content: Pourquoi la voie des méchants conduit-elle au succès?
  - type: text
    content: Pourquoi tous les traîtres vivent-ils en paix?
  '10':
  - type: text
    content: De nombreux bergers ont détruit ma vigne,
  - type: text
    content: ils ont piétiné mon champ.
  - type: text
    content: Ils ont réduit le champ de mes délices
  - type: text
    content: en un désert inhabité.
  '11':
  - type: text
    content: On en a fait une terre dévastée.
  - type: text
    content: Il est en deuil, il est en ruine devant moi.
  - type: text
    content: Tout le pays est dévasté,
  - type: text
    content: parce que personne ne l'a pris à cœur.
  '12':
  - type: text
    content: Sur toutes les hauteurs du désert arrivent les dévastateurs,
  - type: text
    content: car l'épée de l'Eternel dévore le pays d'un bout à l'autre.
  - type: text
    content: Il n'y a de paix pour personne.
  '13':
  - type: text
    content: Ils ont semé du blé et ils récoltent des ronces,
  - type: text
    content: ils se sont fatigués sans que cela leur soit utile
  - type: text
    content: . Si vous devez avoir honte de vos récoltes,
  - type: text
    content: c'est à cause de la colère ardente de l'Eternel.
  '14':
  - type: text
    content: »Voici ce que je dis, moi l'Eternel, sur tous mes méchants voisins
  - type: text
    content: 'qui attaquent l''héritage que j''ai donné à mon peuple, Israël:'
  - type: text
    content: Je vais les arracher de leur terre
  - type: text
    content: et leur arracher la communauté de Juda.
  '15':
  - type: text
    content: Mais, après les avoir arrachés,
  - type: text
    content: j'aurai de nouveau compassion d'eux.
  - type: text
    content: Je les ferai revenir
  - type: text
    content: chacun dans son héritage, chacun dans son pays.
  '16':
  - type: text
    content: Et si, de la même manière qu'ils ont enseigné à mon peuple à prêter serment au nom de Baal,
  - type: text
    content: ils apprennent sincèrement à suivre les voies de mon peuple,
  - type: text
    content: 'jusqu''à prêter serment par mon nom en disant:'
  - type: text
    content: ‘L'Eternel est vivant’,
  - type: text
    content: alors ils auront leur place au milieu de mon peuple.
  '17':
  - type: text
    content: En revanche, s'ils n'écoutent rien,
  - type: text
    content: j'arracherai une telle nation,
  - type: text
    content: je l'arracherai, je la ferai disparaître, déclare l'Eternel.»
  '2':
  - type: text
    content: Tu les as plantés, ils ont donc pris racine.
  - type: text
    content: Ils vont bien, ils produisent donc du fruit.
  - type: text
    content: Tu es près de leur bouche,
  - type: text
    content: mais éloigné de ce qu'ils sont.
  '3':
  - type: text
    content: Et toi, Eternel, tu me connais,
  - type: text
    content: 'tu me vois, tu examines mon cœur: il est avec toi.'
  - type: text
    content: Réserve-les comme des brebis qu'on doit égorger
  - type: text
    content: et mets-les à part pour le jour du carnage!
  '4':
  - type: text
    content: Jusqu'à quand le pays sera-t-il endeuillé
  - type: text
    content: et l'herbe de tous les champs sera-t-elle desséchée?
  - type: text
    content: A cause de la méchanceté de ses habitants,
  - type: text
    content: les bêtes et les oiseaux disparaissent.
  - type: text
    content: 'Ils disent: ‘Il ne verra pas notre fin.’»'
  '5':
  - type: text
    content: «Si tu cours avec des piétons et qu'ils te fatiguent,
  - type: text
    content: comment pourras-tu lutter avec des chevaux?
  - type: text
    content: Et si tu ne te sens en sécurité que dans une région paisible,
  - type: text
    content: que feras-tu sur les rives luxuriantes du Jourdain?
  '6':
  - type: text
    content: En effet, tes frères et ta famille te trahissent eux aussi.
  - type: text
    content: Eux aussi, ils crient à pleine voix derrière toi.
  - type: text
    content: Ne les crois pas quand ils te diront des paroles amicales.
  '7':
  - type: text
    content: »J'ai abandonné mon temple,
  - type: text
    content: j'ai délaissé mon héritage,
  - type: text
    content: j'ai livré l'objet de mon amour aux mains de ses ennemis.
  '8':
  - type: text
    content: Mon héritage s'est comporté envers moi comme un lion dans la forêt,
  - type: text
    content: il a poussé ses rugissements contre moi;
  - type: text
    content: c'est pourquoi je l'ai pris en haine.
  '9':
  - type: text
    content: Mon héritage a été pour moi un rapace tacheté,
  - type: text
    content: aussi les autres rapaces viennent-ils de tous côtés contre lui.
  - type: text
    content: Venez, rassemblez tous les animaux sauvages,
  - type: text
    content: amenez-les pour le festin!
