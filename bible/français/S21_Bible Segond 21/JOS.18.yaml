document_id: JOS.18,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Plan de partage des territoires non attribués
  - type: text
    content: Toute l'assemblée des Israélites se réunit à Silo, et ils y installèrent la tente de la rencontre. Le pays leur était soumis.
  '10':
  - type: text
    content: Josué procéda pour eux à un tirage au sort à Silo devant l'Eternel et il partagea le pays entre les Israélites en donnant à chacun sa portion.
  - type: heading
    content: Territoire accordé à Benjamin
  '11':
  - type: text
    content: Le sort tomba sur les clans de la tribu de Benjamin et le territoire qui leur fut attribué par tirage au sort se trouvait entre celui des descendants de Juda et celui des descendants de Joseph.
  '12':
  - type: text
    content: 'Du côté nord, leur frontière partait du Jourdain. Elle montait au nord de Jéricho, s''élevait dans la montagne vers l''ouest et débouchait sur le désert de Beth-Aven. '
  '13':
  - type: text
    content: Elle passait de là par Luz, au sud de Luz, c'est-à-dire Béthel, et elle descendait à Atharoth-Addar par-dessus la montagne qui est au sud de Beth-Horon-la-basse.
  '14':
  - type: text
    content: Du côté ouest, la frontière se prolongeait et tournait au sud depuis la montagne qui se trouve en face de Beth-Horon. Elle continuait vers le sud et débouchait sur Kirjath-Baal, c'est-à-dire Kirjath-Jearim, une ville appartenant aux Judéens. C'était le côté ouest.
  '15':
  - type: text
    content: 'Le côté sud commençait à l''extrémité de Kirjath-Jearim. La frontière se prolongeait vers l''ouest jusqu''à la source des eaux de Nephthoach. '
  '16':
  - type: text
    content: 'Elle descendait à l''extrémité de la montagne qui se trouve en face de la vallée de Ben-Hinnom, au nord de la vallée des Rephaïm. Elle descendait par la vallée de Hinnom, sur le côté sud des Jébusiens, jusqu''à En-Roguel. '
  '17':
  - type: text
    content: 'Elle se dirigeait vers le nord à En-Shémesh, puis à Gueliloth, qui fait face à la montée d''Adummim, et elle descendait à la pierre de Bohan, fils de Ruben. '
  '18':
  - type: text
    content: 'Elle passait sur le côté nord en face d''Araba, descendait à Araba '
  '19':
  - type: text
    content: 'et continuait sur le côté nord de Beth-Hogla pour déboucher sur la langue nord de la mer Morte, vers l''embouchure du Jourdain au sud. C''était la frontière sud. '
  '2':
  - type: text
    content: 'Il restait sept tribus israélites qui n''avaient pas encore reçu leur héritage. '
  '20':
  - type: text
    content: Du côté de l'est, le Jourdain formait la limite. Tel fut l'héritage des clans des Benjaminites, avec ses frontières de tous les côtés.
  '21':
  - type: text
    content: 'Les villes des clans de la tribu de Benjamin étaient Jéricho, Beth-Hogla, Emek-Ketsits, '
  '22':
  - type: text
    content: 'Beth-Araba, Tsemaraïm, Béthel, '
  '23':
  - type: text
    content: 'Avvim, Para, Ophra, '
  '24':
  - type: text
    content: 'Kephar-Ammonaï, Ophni et Guéba, soit 12 villes avec leurs villages. '
  '25':
  - type: text
    content: 'Gabaon, Rama, Beéroth, '
  '26':
  - type: text
    content: 'Mitspé, Kephira, Motsa, '
  '27':
  - type: text
    content: 'Rékem, Jirpeel, Thareala, '
  '28':
  - type: text
    content: Tséla, Eleph, Jébus, c'est-à-dire Jérusalem, Guibeath et Kirjath, soit 14 villes avec leurs villages. Tel fut l'héritage des clans des Benjaminites.
  '3':
  - type: text
    content: 'Josué dit aux Israélites: «Jusqu''à quand négligerez-vous de prendre possession du pays que l''Eternel, le Dieu de vos ancêtres, vous a donné? '
  '4':
  - type: text
    content: 'Choisissez trois hommes par tribu, pour que je leur confie une mission. Ils se lèveront, parcourront le pays, traceront un plan en vue du partage et reviendront vers moi. '
  '5':
  - type: text
    content: 'Ils diviseront le pays en sept parts. Juda restera dans son territoire au sud et la famille de Joseph restera dans son territoire au nord. '
  '6':
  - type: text
    content: 'Quant à vous, vous tracerez un plan du pays en sept parts et vous me l''apporterez ici. Je procéderai à un tirage au sort pour vous devant l''Eternel, notre Dieu. '
  '7':
  - type: text
    content: 'Toutefois, il n''y aura pas de part pour les Lévites au milieu de vous, car leur héritage, c''est la fonction de prêtres de l''Eternel. En outre, Gad, Ruben et la demi-tribu de Manassé ont reçu leur héritage, que Moïse, serviteur de l''Eternel, leur a donné de l''autre côté du Jourdain, à l''est.» '
  '8':
  - type: text
    content: 'Lorsque ces hommes se levèrent et partirent pour tracer un plan du pays, Josué leur donna cet ordre: «Allez parcourir le pays, tracez-en un plan et revenez vers moi. Je procéderai alors à un tirage au sort pour vous devant l''Eternel, à Silo.» '
  '9':
  - type: text
    content: 'Ces hommes partirent, parcoururent le pays et en tracèrent, d''après les villes, un plan en sept parts dans un livre. Puis ils revinrent vers Josué dans le camp à Silo. '
