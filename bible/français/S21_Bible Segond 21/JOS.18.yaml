document_id: JOS.18,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Plan de partage des territoires non attribués
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Toute l'assemblée des Israélites se réunit à Silo, et ils y installèrent la tente de la rencontre. Le pays leur était soumis.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Josué procéda pour eux à un tirage au sort à Silo devant l'Eternel et il partagea le pays entre les Israélites en donnant à chacun sa portion.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Territoire accordé à Benjamin
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Le sort tomba sur les clans de la tribu de Benjamin et le territoire qui leur fut attribué par tirage au sort se trouvait entre celui des descendants de Juda et celui des descendants de Joseph.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Du côté nord, leur frontière partait du Jourdain. Elle montait au nord de Jéricho, s''élevait dans la montagne vers l''ouest et débouchait sur le désert de Beth-Aven. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Elle passait de là par Luz, au sud de Luz, c'est-à-dire Béthel, et elle descendait à Atharoth-Addar par-dessus la montagne qui est au sud de Beth-Horon-la-basse.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Du côté ouest, la frontière se prolongeait et tournait au sud depuis la montagne qui se trouve en face de Beth-Horon. Elle continuait vers le sud et débouchait sur Kirjath-Baal, c'est-à-dire Kirjath-Jearim, une ville appartenant aux Judéens. C'était le côté ouest.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Le côté sud commençait à l''extrémité de Kirjath-Jearim. La frontière se prolongeait vers l''ouest jusqu''à la source des eaux de Nephthoach. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Elle descendait à l''extrémité de la montagne qui se trouve en face de la vallée de Ben-Hinnom, au nord de la vallée des Rephaïm. Elle descendait par la vallée de Hinnom, sur le côté sud des Jébusiens, jusqu''à En-Roguel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Elle se dirigeait vers le nord à En-Shémesh, puis à Gueliloth, qui fait face à la montée d''Adummim, et elle descendait à la pierre de Bohan, fils de Ruben. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Elle passait sur le côté nord en face d''Araba, descendait à Araba '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'et continuait sur le côté nord de Beth-Hogla pour déboucher sur la langue nord de la mer Morte, vers l''embouchure du Jourdain au sud. C''était la frontière sud. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il restait sept tribus israélites qui n''avaient pas encore reçu leur héritage. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Du côté de l'est, le Jourdain formait la limite. Tel fut l'héritage des clans des Benjaminites, avec ses frontières de tous les côtés.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Les villes des clans de la tribu de Benjamin étaient Jéricho, Beth-Hogla, Emek-Ketsits, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Beth-Araba, Tsemaraïm, Béthel, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Avvim, Para, Ophra, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Kephar-Ammonaï, Ophni et Guéba, soit 12 villes avec leurs villages. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Gabaon, Rama, Beéroth, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Mitspé, Kephira, Motsa, '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Rékem, Jirpeel, Thareala, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Tséla, Eleph, Jébus, c'est-à-dire Jérusalem, Guibeath et Kirjath, soit 14 villes avec leurs villages. Tel fut l'héritage des clans des Benjaminites.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Josué dit aux Israélites: «Jusqu''à quand négligerez-vous de prendre possession du pays que l''Eternel, le Dieu de vos ancêtres, vous a donné? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Choisissez trois hommes par tribu, pour que je leur confie une mission. Ils se lèveront, parcourront le pays, traceront un plan en vue du partage et reviendront vers moi. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ils diviseront le pays en sept parts. Juda restera dans son territoire au sud et la famille de Joseph restera dans son territoire au nord. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Quant à vous, vous tracerez un plan du pays en sept parts et vous me l''apporterez ici. Je procéderai à un tirage au sort pour vous devant l''Eternel, notre Dieu. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Toutefois, il n''y aura pas de part pour les Lévites au milieu de vous, car leur héritage, c''est la fonction de prêtres de l''Eternel. En outre, Gad, Ruben et la demi-tribu de Manassé ont reçu leur héritage, que Moïse, serviteur de l''Eternel, leur a donné de l''autre côté du Jourdain, à l''est.» '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Lorsque ces hommes se levèrent et partirent pour tracer un plan du pays, Josué leur donna cet ordre: «Allez parcourir le pays, tracez-en un plan et revenez vers moi. Je procéderai alors à un tirage au sort pour vous devant l''Eternel, à Silo.» '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ces hommes partirent, parcoururent le pays et en tracèrent, d''après les villes, un plan en sept parts dans un livre. Puis ils revinrent vers Josué dans le camp à Silo. '
