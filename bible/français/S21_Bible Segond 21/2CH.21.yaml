document_id: 2CH.21,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Règne de Joram
  - type: text
    content: Josaphat se coucha avec ses ancêtres et il fut enterré à leurs côtés dans la ville de David. Son fils Joram devint roi à sa place.
  '10':
  - type: text
    content: La rébellion d'Edom contre l'autorité de Juda a duré jusqu'à aujourd'hui. Libna se révolta aussi à la même époque contre son autorité, parce qu'il avait abandonné l'Eternel, le Dieu de ses ancêtres.
  '11':
  - type: text
    content: 'Joram fit même des hauts lieux dans les montagnes de Juda. Il poussa les habitants de Jérusalem à la prostitution et il égara Juda. '
  '12':
  - type: text
    content: 'Il reçut un écrit du prophète Elie qui affirmait: «Voici ce que dit l''Eternel, le Dieu de ton ancêtre David: Parce que tu n''as pas marché sur les voies de ton père Josaphat ni sur celles d''Asa, roi de Juda, '
  '13':
  - type: text
    content: 'mais que tu as marché sur la voie des rois d''Israël, parce que tu as poussé Juda et les habitants de Jérusalem à la prostitution, comme l''a fait la famille d''Achab vis-à-vis d''Israël, et parce que tu as même fait mourir tes frères, qui étaient meilleurs que toi et formaient ta propre famille, '
  '14':
  - type: text
    content: 'l''Eternel va frapper ton peuple, tes fils, tes femmes et tout ce qui t''appartient d''un grand fléau. '
  '15':
  - type: text
    content: Quant à toi, il va te frapper de grandes souffrances. Tu auras une maladie des intestins qui s'aggravera de jour en jour, au point que tes intestins sortiront de toi à cause de la maladie.»
  '16':
  - type: text
    content: 'Et l''Eternel réveilla contre Joram l''esprit des Philistins et des Arabes qui sont voisins des Ethiopiens. '
  '17':
  - type: text
    content: Ils montèrent contre Juda, y lancèrent une attaque et emmenèrent avec eux toutes les richesses qui se trouvaient dans le palais du roi, y compris ses fils et ses femmes, de sorte qu'il ne lui resta pas d'autre fils que Joachaz
  - type: note
    content: 'Joachaz: appelé Achazia en 22.1.'
  - type: text
    content: ', le plus jeune d''entre eux. '
  '18':
  - type: text
    content: 'Après tout cela, l''Eternel le frappa d''une maladie des intestins qui était incurable. '
  '19':
  - type: text
    content: Elle s'aggrava de jour en jour et, vers la fin de la deuxième année, les intestins de Joram sortirent en raison de la maladie. Il mourut dans de violentes souffrances et son peuple ne brûla pas de parfums en son honneur, comme il l'avait fait pour ses ancêtres.
  '2':
  - type: text
    content: 'Joram avait des frères, d''autres fils de Josaphat: Azaria, Jehiel, Zacharie, Azaria, Micaël et Shephathia. Ils étaient tous fils de Josaphat, le roi de Juda. '
  '20':
  - type: text
    content: Il avait 32 ans lorsqu'il devint roi et il régna 8 ans à Jérusalem. Il partit sans être regretté et on l'enterra dans la ville de David, mais pas dans les tombeaux des rois.
  '3':
  - type: text
    content: 'Leur père leur avait donné des cadeaux considérables en argent, en or et en objets précieux, avec des villes fortifiées en Juda. Quant au royaume, il l''avait donné à Joram parce qu''il était l''aîné. '
  '4':
  - type: text
    content: Lorsque Joram eut pris possession du royaume de son père et qu'il se fut fortifié, il fit mourir par l'épée tous ses frères ainsi que des chefs d'Israël.
  '5':
  - type: text
    content: Joram avait 32 ans lorsqu'il devint roi et il régna 8 ans à Jérusalem.
  '6':
  - type: text
    content: 'Il marcha sur la voie des rois d''Israël comme l''avait fait la famille d''Achab – sa femme était en effet une fille d''Achab – et il fit ce qui est mal aux yeux de l''Eternel. '
  '7':
  - type: text
    content: Toutefois, l'Eternel ne voulut pas détruire la famille de David à cause de l'alliance qu'il avait conclue avec David et de la promesse qu'il avait faite de lui donner toujours un successeur, ainsi qu'à ses descendants.
  '8':
  - type: text
    content: 'A son époque, les Edomites se révoltèrent contre l''autorité de Juda et se donnèrent un roi. '
  '9':
  - type: text
    content: 'Joram partit avec ses chefs et tous ses chars. Il s''était levé de nuit et il battit les Edomites qui l''encerclaient ainsi que les chefs des chars. '
