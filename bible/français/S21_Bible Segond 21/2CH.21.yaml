document_id: 2CH.21
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne de Joram
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Josaphat se coucha avec ses ancêtres et il fut enterré à leurs côtés dans la ville de David. Son fils Joram devint roi à sa place.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Joram avait des frères, d''autres fils de Josaphat: Azaria, Jehiel, Zacharie, Azaria, Micaël et Shephathia. Ils étaient tous fils de Josaphat, le roi de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Leur père leur avait donné des cadeaux considérables en argent, en or et en objets précieux, avec des villes fortifiées en Juda. Quant au royaume, il l''avait donné à Joram parce qu''il était l''aîné. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Lorsque Joram eut pris possession du royaume de son père et qu'il se fut fortifié, il fit mourir par l'épée tous ses frères ainsi que des chefs d'Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Joram avait 32 ans lorsqu'il devint roi et il régna 8 ans à Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il marcha sur la voie des rois d''Israël comme l''avait fait la famille d''Achab – sa femme était en effet une fille d''Achab – et il fit ce qui est mal aux yeux de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Toutefois, l'Eternel ne voulut pas détruire la famille de David à cause de l'alliance qu'il avait conclue avec David et de la promesse qu'il avait faite de lui donner toujours un successeur, ainsi qu'à ses descendants.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'A son époque, les Edomites se révoltèrent contre l''autorité de Juda et se donnèrent un roi. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Joram partit avec ses chefs et tous ses chars. Il s''était levé de nuit et il battit les Edomites qui l''encerclaient ainsi que les chefs des chars. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: La rébellion d'Edom contre l'autorité de Juda a duré jusqu'à aujourd'hui. Libna se révolta aussi à la même époque contre son autorité, parce qu'il avait abandonné l'Eternel, le Dieu de ses ancêtres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Joram fit même des hauts lieux dans les montagnes de Juda. Il poussa les habitants de Jérusalem à la prostitution et il égara Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il reçut un écrit du prophète Elie qui affirmait: «Voici ce que dit l''Eternel, le Dieu de ton ancêtre David: Parce que tu n''as pas marché sur les voies de ton père Josaphat ni sur celles d''Asa, roi de Juda, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'mais que tu as marché sur la voie des rois d''Israël, parce que tu as poussé Juda et les habitants de Jérusalem à la prostitution, comme l''a fait la famille d''Achab vis-à-vis d''Israël, et parce que tu as même fait mourir tes frères, qui étaient meilleurs que toi et formaient ta propre famille, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'l''Eternel va frapper ton peuple, tes fils, tes femmes et tout ce qui t''appartient d''un grand fléau. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Quant à toi, il va te frapper de grandes souffrances. Tu auras une maladie des intestins qui s'aggravera de jour en jour, au point que tes intestins sortiront de toi à cause de la maladie.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et l''Eternel réveilla contre Joram l''esprit des Philistins et des Arabes qui sont voisins des Ethiopiens. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Ils montèrent contre Juda, y lancèrent une attaque et emmenèrent avec eux toutes les richesses qui se trouvaient dans le palais du roi, y compris ses fils et ses femmes, de sorte qu'il ne lui resta pas d'autre fils que Joachaz
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Joachaz: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'appelé Achazia en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '22.1'
      metadata:
        usfm: 2CH.22.1
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ', le plus jeune d''entre eux. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Après tout cela, l''Eternel le frappa d''une maladie des intestins qui était incurable. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Elle s'aggrava de jour en jour et, vers la fin de la deuxième année, les intestins de Joram sortirent en raison de la maladie. Il mourut dans de violentes souffrances et son peuple ne brûla pas de parfums en son honneur, comme il l'avait fait pour ses ancêtres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il avait 32 ans lorsqu'il devint roi et il régna 8 ans à Jérusalem. Il partit sans être regretté et on l'enterra dans la ville de David, mais pas dans les tombeaux des rois.
