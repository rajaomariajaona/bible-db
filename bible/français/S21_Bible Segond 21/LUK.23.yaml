document_id: LUK.23,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus devant le gouverneur romain et le roi Hérode
  - type: text
    content: 'Ils se levèrent tous et conduisirent Jésus devant Pilate. '
  '10':
  - type: text
    content: 'Les chefs des prêtres et les spécialistes de la loi étaient présents et accusaient violemment Jésus. '
  '11':
  - type: text
    content: 'Alors Hérode, avec ses gardes, le traita avec mépris et se moqua de lui. Puis, après lui avoir mis un habit magnifique, il le renvoya à Pilate. '
  '12':
  - type: text
    content: Ce jour-là, Pilate et Hérode devinrent amis, d'ennemis qu'ils étaient auparavant.
  '13':
  - type: text
    content: 'Pilate rassembla les chefs des prêtres, les magistrats et le peuple '
  '14':
  - type: text
    content: 'et leur dit: «Vous m''avez amené cet homme sous prétexte qu''il excitait le peuple à la révolte. Or, je l''ai interrogé devant vous et je ne l''ai trouvé coupable d''aucun des actes dont vous l''accusez; '
  '15':
  - type: text
    content: 'Hérode non plus, puisqu''il nous l''a renvoyé. Ainsi cet homme n''a rien fait qui soit digne de mort. '
  '16':
  - type: text
    content: Je vais donc le relâcher après l'avoir fait fouetter.»
  '17':
  - type: text
    content: '[A chaque fête, il devait leur relâcher un prisonnier.] '
  '18':
  - type: text
    content: 'Ils s''écrièrent tous ensemble: «Fais mourir celui-ci et relâche-nous Barabbas.» '
  '19':
  - type: text
    content: 'Cet homme avait été mis en prison pour une émeute qui avait eu lieu dans la ville et pour un meurtre. '
  '2':
  - type: text
    content: 'Ils se mirent à l''accuser, disant: «Nous avons trouvé cet homme qui sème le désordre dans notre nation; il empêche de payer les impôts à l''empereur et se présente lui-même comme le Messie, le roi.» '
  '20':
  - type: text
    content: 'Pilate [leur] parla de nouveau dans l''intention de relâcher Jésus, '
  '21':
  - type: text
    content: 'mais ils criaient: «Crucifie-le, crucifie-le!» '
  '22':
  - type: text
    content: 'Pour la troisième fois, Pilate leur dit: «Quel mal a-t-il fait? Je n''ai rien trouvé en lui qui mérite la mort. Je vais donc le relâcher après l''avoir fait fouetter.» '
  '23':
  - type: text
    content: 'Cependant ils insistaient à grands cris, demandant qu''il soit crucifié, et leurs cris l''emportèrent, [avec ceux des chefs des prêtres.] '
  '24':
  - type: text
    content: 'Pilate décida de leur accorder ce qu''ils demandaient. '
  '25':
  - type: text
    content: Il relâcha celui qui avait été mis en prison pour émeute et pour meurtre, et qu'ils réclamaient, et il livra Jésus à leur volonté.
  - type: heading
    content: Crucifixion et mort de Jésus
  '26':
  - type: text
    content: 'Comme ils l''emmenaient, ils s''emparèrent d''un certain Simon de Cyrène, qui revenait des champs, et ils le chargèrent de la croix pour qu''il la porte derrière Jésus. '
  '27':
  - type: text
    content: 'Il était suivi par une grande foule composée de membres du peuple et de femmes qui se frappaient la poitrine et se lamentaient sur lui. '
  '28':
  - type: text
    content: 'Jésus se tourna vers elles et dit: «Femmes de Jérusalem, ne pleurez pas sur moi, mais pleurez sur vous et sur vos enfants. '
  '29':
  - type: text
    content: 'En effet, voici que viennent des jours où l''on dira: ‘Heureuses celles qui sont stériles, heureuses celles qui n''ont pas eu d''enfant et celles qui n''ont pas allaité!’ '
  '3':
  - type: text
    content: 'Pilate lui demanda: «Es-tu le roi des Juifs?» Jésus lui répondit: «Tu le dis.»'
  '30':
  - type: text
    content: Alors on se mettra à
  - type: text
    content: 'dire aux montagnes: ‘Tombez sur nous!’ et aux collines: ‘Couvrez-nous!’'
  - type: note
    content: 'Dire… Couvrez-nous: citation d''Osée 10.8.'
  - type: text
    content: ' '
  '31':
  - type: text
    content: En effet, si l'on traite ainsi le bois vert, qu'arrivera-t-il au bois sec?»
  '32':
  - type: text
    content: 'On conduisait aussi deux malfaiteurs qui devaient être mis à mort avec lui. '
  '33':
  - type: text
    content: Lorsqu'ils furent arrivés à l'endroit appelé «le Crâne», ils le crucifièrent là ainsi que les deux malfaiteurs, l'un à droite, l'autre à gauche.
  '34':
  - type: text
    content: '[Jésus dit: «Père, pardonne-leur, car ils ne savent pas ce qu''ils font.»] Ils se partagèrent ses vêtements en tirant au sort. '
  '35':
  - type: text
    content: 'Le peuple se tenait là et regardait. Les magistrats eux-mêmes se moquaient de Jésus [avec eux] en disant: «Il en a sauvé d''autres; qu''il se sauve lui-même, s''il est le Messie choisi par Dieu!» '
  '36':
  - type: text
    content: 'Les soldats aussi se moquaient de lui; ils s''approchaient pour lui présenter du vinaigre '
  '37':
  - type: text
    content: 'en disant: «Si tu es le roi des Juifs, sauve-toi toi-même!» '
  '38':
  - type: text
    content: 'Il y avait au-dessus de lui cette inscription [écrite en grec, en latin et en hébreu]: «Celui-ci est le roi des Juifs.»'
  '39':
  - type: text
    content: 'L''un des malfaiteurs crucifiés avec lui l''insultait en disant: «Si tu es le Messie, sauve-toi toi-même, et nous avec toi!» '
  '4':
  - type: text
    content: 'Pilate dit aux chefs des prêtres et à la foule: «Je ne trouve chez cet homme aucun motif de le condamner.» '
  '40':
  - type: text
    content: 'Mais l''autre le reprenait et disait: «N''as-tu aucune crainte de Dieu, toi qui subis la même condamnation? '
  '41':
  - type: text
    content: 'Pour nous, ce n''est que justice, puisque nous recevons ce qu''ont mérité nos actes, mais celui-ci n''a rien fait de mal.» '
  '42':
  - type: text
    content: 'Et il dit à Jésus: «[Seigneur,] souviens-toi de moi quand tu viendras régner.» '
  '43':
  - type: text
    content: 'Jésus lui répondit: «Je te le dis en vérité, aujourd''hui tu seras avec moi dans le paradis.»'
  '44':
  - type: text
    content: 'C''était déjà presque midi, et il y eut des ténèbres sur tout le pays jusqu''à trois heures de l''après-midi. '
  '45':
  - type: text
    content: 'Le soleil s''obscurcit et le voile du temple se déchira par le milieu. '
  '46':
  - type: text
    content: 'Jésus s''écria d''une voix forte: «Père, '
  - type: text
    content: je remets mon esprit entre tes mains
  - type: note
    content: 'Je remets… mains: citation du Psaume 31.6.'
  - type: text
    content: .» Après avoir dit ces paroles, il expira.
  '47':
  - type: text
    content: 'Voyant ce qui était arrivé, l''officier romain rendit gloire à Dieu en disant: «Certainement, cet homme était juste.» '
  '48':
  - type: text
    content: 'Après avoir vu ce qui était arrivé, tous ceux qui en foule assistaient à ce spectacle repartirent en se frappant la poitrine. '
  '49':
  - type: text
    content: Tous ceux qui connaissaient Jésus, et en particulier les femmes qui l'avaient accompagné depuis la Galilée, étaient restés à distance et regardaient ce qui se passait.
  - type: heading
    content: Mise au tombeau du corps de Jésus
  '5':
  - type: text
    content: 'Mais ils insistèrent en disant: «Il excite le peuple à la révolte en enseignant dans toute la Judée, depuis la Galilée où il a commencé et jusqu''ici.»'
  '50':
  - type: text
    content: 'Il y avait un membre du sanhédrin du nom de Joseph; homme bon et juste, '
  '51':
  - type: text
    content: 'il ne s''était pas associé à la décision et aux actes des autres. Il était d''Arimathée, ville des Juifs, et il attendait lui aussi le royaume de Dieu. '
  '52':
  - type: text
    content: 'Il alla trouver Pilate et demanda le corps de Jésus. '
  '53':
  - type: text
    content: 'Il le descendit de la croix, l''enveloppa dans un drap de lin et le déposa dans un tombeau taillé dans la roche, où personne n''avait encore été mis. '
  '54':
  - type: text
    content: C'était le jour de la préparation du sabbat, le sabbat allait commencer.
  '55':
  - type: text
    content: 'Des femmes qui étaient venues de la Galilée avec Jésus accompagnèrent Joseph. Elles virent le tombeau et la manière dont le corps de Jésus y fut déposé. '
  '56':
  - type: text
    content: Puis elles repartirent et préparèrent des aromates et des parfums. Le jour du sabbat elles se reposèrent, comme le prescrit la loi.
  '6':
  - type: text
    content: 'A ces mots, Pilate demanda si cet homme était galiléen. '
  '7':
  - type: text
    content: 'Lorsqu''il apprit qu''il relevait bien de l''autorité d''Hérode, il le lui envoya, car lui aussi se trouvait à Jérusalem ces jours-là. '
  '8':
  - type: text
    content: 'Lorsque Hérode vit Jésus, il en eut une grande joie, car depuis longtemps il désirait le voir à cause de tout ce qu''il avait entendu dire de lui, et il espérait le voir faire un signe miraculeux. '
  '9':
  - type: text
    content: 'Il lui posa beaucoup de questions, mais Jésus ne lui répondit rien. '
