document_id: LUK.23
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus devant le gouverneur romain et le roi Hérode
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ils se levèrent tous et conduisirent Jésus devant Pilate. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Ils se mirent à l''accuser, disant: «Nous avons trouvé cet homme qui sème le désordre dans notre nation; il empêche de payer les impôts à l''empereur et se présente lui-même comme le Messie, le roi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Pilate lui demanda: «Es-tu le roi des Juifs?» Jésus lui répondit: «Tu le dis.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pilate dit aux chefs des prêtres et à la foule: «Je ne trouve chez cet homme aucun motif de le condamner.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Mais ils insistèrent en disant: «Il excite le peuple à la révolte en enseignant dans toute la Judée, depuis la Galilée où il a commencé et jusqu''ici.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'A ces mots, Pilate demanda si cet homme était galiléen. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Lorsqu''il apprit qu''il relevait bien de l''autorité d''Hérode, il le lui envoya, car lui aussi se trouvait à Jérusalem ces jours-là. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Lorsque Hérode vit Jésus, il en eut une grande joie, car depuis longtemps il désirait le voir à cause de tout ce qu''il avait entendu dire de lui, et il espérait le voir faire un signe miraculeux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il lui posa beaucoup de questions, mais Jésus ne lui répondit rien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les chefs des prêtres et les spécialistes de la loi étaient présents et accusaient violemment Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Alors Hérode, avec ses gardes, le traita avec mépris et se moqua de lui. Puis, après lui avoir mis un habit magnifique, il le renvoya à Pilate. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ce jour-là, Pilate et Hérode devinrent amis, d'ennemis qu'ils étaient auparavant.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Pilate rassembla les chefs des prêtres, les magistrats et le peuple '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'et leur dit: «Vous m''avez amené cet homme sous prétexte qu''il excitait le peuple à la révolte. Or, je l''ai interrogé devant vous et je ne l''ai trouvé coupable d''aucun des actes dont vous l''accusez; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Hérode non plus, puisqu''il nous l''a renvoyé. Ainsi cet homme n''a rien fait qui soit digne de mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Je vais donc le relâcher après l'avoir fait fouetter.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '[A chaque fête, il devait leur relâcher un prisonnier.] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils s''écrièrent tous ensemble: «Fais mourir celui-ci et relâche-nous Barabbas.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Cet homme avait été mis en prison pour une émeute qui avait eu lieu dans la ville et pour un meurtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Pilate [leur] parla de nouveau dans l''intention de relâcher Jésus, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'mais ils criaient: «Crucifie-le, crucifie-le!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Pour la troisième fois, Pilate leur dit: «Quel mal a-t-il fait? Je n''ai rien trouvé en lui qui mérite la mort. Je vais donc le relâcher après l''avoir fait fouetter.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Cependant ils insistaient à grands cris, demandant qu''il soit crucifié, et leurs cris l''emportèrent, [avec ceux des chefs des prêtres.] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Pilate décida de leur accorder ce qu''ils demandaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Il relâcha celui qui avait été mis en prison pour émeute et pour meurtre, et qu'ils réclamaient, et il livra Jésus à leur volonté.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Crucifixion et mort de Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Comme ils l''emmenaient, ils s''emparèrent d''un certain Simon de Cyrène, qui revenait des champs, et ils le chargèrent de la croix pour qu''il la porte derrière Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il était suivi par une grande foule composée de membres du peuple et de femmes qui se frappaient la poitrine et se lamentaient sur lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Jésus se tourna vers elles et dit: «Femmes de Jérusalem, ne pleurez pas sur moi, mais pleurez sur vous et sur vos enfants. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'En effet, voici que viennent des jours où l''on dira: ‘Heureuses celles qui sont stériles, heureuses celles qui n''ont pas eu d''enfant et celles qui n''ont pas allaité!’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Alors on se mettra à
  - type: usfm
    marker: qt
    children:
    - type: text
      text: 'dire aux montagnes: ‘Tombez sur nous!’ et aux collines: ‘Couvrez-nous!’'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Dire… Couvrez-nous: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Osée 10.8
      metadata:
        usfm: HOS.10.8
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: En effet, si l'on traite ainsi le bois vert, qu'arrivera-t-il au bois sec?»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'On conduisait aussi deux malfaiteurs qui devaient être mis à mort avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Lorsqu'ils furent arrivés à l'endroit appelé «le Crâne», ils le crucifièrent là ainsi que les deux malfaiteurs, l'un à droite, l'autre à gauche.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: '[Jésus dit: «Père, pardonne-leur, car ils ne savent pas ce qu''ils font.»] Ils se partagèrent ses vêtements en tirant au sort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Le peuple se tenait là et regardait. Les magistrats eux-mêmes se moquaient de Jésus [avec eux] en disant: «Il en a sauvé d''autres; qu''il se sauve lui-même, s''il est le Messie choisi par Dieu!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Les soldats aussi se moquaient de lui; ils s''approchaient pour lui présenter du vinaigre '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'en disant: «Si tu es le roi des Juifs, sauve-toi toi-même!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Il y avait au-dessus de lui cette inscription [écrite en grec, en latin et en hébreu]: «Celui-ci est le roi des Juifs.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'L''un des malfaiteurs crucifiés avec lui l''insultait en disant: «Si tu es le Messie, sauve-toi toi-même, et nous avec toi!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Mais l''autre le reprenait et disait: «N''as-tu aucune crainte de Dieu, toi qui subis la même condamnation? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Pour nous, ce n''est que justice, puisque nous recevons ce qu''ont mérité nos actes, mais celui-ci n''a rien fait de mal.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Et il dit à Jésus: «[Seigneur,] souviens-toi de moi quand tu viendras régner.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'Jésus lui répondit: «Je te le dis en vérité, aujourd''hui tu seras avec moi dans le paradis.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'C''était déjà presque midi, et il y eut des ténèbres sur tout le pays jusqu''à trois heures de l''après-midi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Le soleil s''obscurcit et le voile du temple se déchira par le milieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Jésus s''écria d''une voix forte: «Père, '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: je remets mon esprit entre tes mains
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.46 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je remets… mains: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation du '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 31.6
      metadata:
        usfm: PSA.31.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .» Après avoir dit ces paroles, il expira.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Voyant ce qui était arrivé, l''officier romain rendit gloire à Dieu en disant: «Certainement, cet homme était juste.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Après avoir vu ce qui était arrivé, tous ceux qui en foule assistaient à ce spectacle repartirent en se frappant la poitrine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: Tous ceux qui connaissaient Jésus, et en particulier les femmes qui l'avaient accompagné depuis la Galilée, étaient restés à distance et regardaient ce qui se passait.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mise au tombeau du corps de Jésus
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Il y avait un membre du sanhédrin du nom de Joseph; homme bon et juste, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'il ne s''était pas associé à la décision et aux actes des autres. Il était d''Arimathée, ville des Juifs, et il attendait lui aussi le royaume de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Il alla trouver Pilate et demanda le corps de Jésus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Il le descendit de la croix, l''enveloppa dans un drap de lin et le déposa dans un tombeau taillé dans la roche, où personne n''avait encore été mis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: C'était le jour de la préparation du sabbat, le sabbat allait commencer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'Des femmes qui étaient venues de la Galilée avec Jésus accompagnèrent Joseph. Elles virent le tombeau et la manière dont le corps de Jésus y fut déposé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: Puis elles repartirent et préparèrent des aromates et des parfums. Le jour du sabbat elles se reposèrent, comme le prescrit la loi.
