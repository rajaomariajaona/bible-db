document_id: EXO.29,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Consécration des prêtres
  - type: text
    content: '»Voici ce que tu feras pour les consacrer afin qu''ils soient à mon service en tant que prêtres. Prends un jeune taureau et deux béliers sans défaut. '
  '10':
  - type: text
    content: '»Tu amèneras le taureau devant la tente de la rencontre, et Aaron et ses fils poseront leurs mains sur sa tête. '
  '11':
  - type: text
    content: 'Tu égorgeras le taureau devant l''Eternel, à l''entrée de la tente de la rencontre. '
  '12':
  - type: text
    content: 'Tu prendras de son sang, tu en mettras avec ton doigt sur les cornes de l''autel, puis tu verseras tout le sang au pied de l''autel. '
  '13':
  - type: text
    content: 'Tu prendras toute la graisse qui couvre les entrailles, le grand lobe du foie, les deux rognons et la graisse qui les entoure, et tu brûleras cela sur l''autel. '
  '14':
  - type: text
    content: Mais tu brûleras au feu à l'extérieur du camp la viande du taureau, sa peau et ses excréments. C'est un sacrifice pour le péché.
  '15':
  - type: text
    content: '»Tu prendras l''un des béliers, et Aaron et ses fils poseront leurs mains sur sa tête. '
  '16':
  - type: text
    content: 'Tu égorgeras le bélier, tu prendras son sang et tu le verseras sur le pourtour de l''autel. '
  '17':
  - type: text
    content: 'Tu couperas le bélier en morceaux et tu laveras les entrailles et les pattes, que tu mettras sur les morceaux et sur sa tête. '
  '18':
  - type: text
    content: Tu brûleras tout le bélier sur l'autel. C'est un holocauste à l'Eternel, un sacrifice brûlé au feu dont l'odeur est agréable à l'Eternel.
  '19':
  - type: text
    content: '»Tu prendras l''autre bélier, et Aaron et ses fils poseront leurs mains sur sa tête. '
  '2':
  - type: text
    content: 'Avec de la fleur de farine de blé, fais des pains sans levain, des gâteaux sans levain pétris à l''huile et des galettes sans levain arrosées d''huile. '
  '20':
  - type: text
    content: 'Tu égorgeras le bélier, tu prendras de son sang, tu en mettras sur le lobe de l''oreille droite d''Aaron et sur le lobe de l''oreille droite de ses fils, sur le pouce de leur main droite et sur le gros orteil de leur pied droit, et tu verseras le sang sur le pourtour de l''autel. '
  '21':
  - type: text
    content: 'Tu prendras du sang qui sera sur l''autel et de l''huile d''onction, et tu en aspergeras Aaron et ses vêtements, ses fils et leurs vêtements. C''est ainsi que seront consacrés Aaron et ses vêtements, ses fils et leurs vêtements. '
  '22':
  - type: text
    content: 'Tu prendras la graisse du bélier, la queue, la graisse qui couvre les entrailles, le grand lobe du foie, les deux rognons avec la graisse qui les entoure ainsi que la cuisse droite. En effet, c''est un bélier de consécration. '
  '23':
  - type: text
    content: 'Tu prendras aussi, dans la corbeille de pains sans levain placée devant l''Eternel, un gâteau de pain, un gâteau à l''huile et une galette. '
  '24':
  - type: text
    content: 'Tu mettras toutes ces choses sur les mains d''Aaron et sur celles de ses fils, et tu feras le geste de présentation devant l''Eternel. '
  '25':
  - type: text
    content: 'Tu les retireras ensuite de leurs mains et tu les brûleras sur l''autel, par-dessus l''holocauste. C''est un sacrifice passé par le feu devant l''Eternel, dont l''odeur est agréable à l''Eternel. '
  '26':
  - type: text
    content: 'Tu prendras la poitrine du bélier qui aura servi à la consécration d''Aaron et tu feras le geste de présentation devant l''Eternel: ce sera ta portion. '
  '27':
  - type: text
    content: 'Tu consacreras la poitrine et la cuisse du bélier qui aura servi à la consécration d''Aaron et de ses fils, la poitrine en faisant le geste de présentation, l''épaule à titre de prélèvement. '
  '28':
  - type: text
    content: Elles appartiendront à Aaron et à ses fils, par une prescription perpétuelle que respecteront les Israélites, car c'est une offrande prélevée et, dans les sacrifices de communion des Israélites, l'offrande prélevée sera pour l'Eternel.
  '29':
  - type: text
    content: '»Les vêtements sacrés d''Aaron seront pour ses descendants après lui. Ils les mettront lorsqu''on les désignera par onction et qu''on les établira dans leurs fonctions. '
  '3':
  - type: text
    content: Tu les offriras dans une corbeille en même temps que le jeune taureau et les deux béliers.
  '30':
  - type: text
    content: Ils seront portés pendant 7 jours par celui de ses fils qui lui succédera en tant que grand-prêtre et qui pénétrera dans la tente de la rencontre pour faire le service dans le lieu très saint.
  '31':
  - type: text
    content: '»Tu prendras le bélier de consécration et tu en feras cuire la viande dans un lieu saint. '
  '32':
  - type: text
    content: 'Aaron et ses fils mangeront la viande du bélier et le pain qui sera dans la corbeille à l''entrée de la tente de la rencontre. '
  '33':
  - type: text
    content: 'Ils mangeront ainsi ce qui aura servi d''expiation pour leur entrée en fonction et leur consécration. Aucune personne étrangère à la fonction de prêtre n''en mangera, car ce sont des choses saintes. '
  '34':
  - type: text
    content: S'il reste de la viande de consécration et du pain jusqu'au matin, tu brûleras ce reste au feu. Personne ne le mangera, car c'est une chose sainte.
  '35':
  - type: text
    content: '»Tu agiras envers Aaron et ses fils conformément à tous les ordres que je t''ai donnés. Tu emploieras 7 jours à les établir dans leurs fonctions. '
  '36':
  - type: text
    content: 'Tu offriras chaque jour un taureau en sacrifice pour le péché, pour l''expiation. Tu purifieras l''autel par cette expiation et tu verseras de l''huile dessus pour le consacrer. '
  '37':
  - type: text
    content: Pendant 7 jours, tu feras des expiations sur l'autel et tu le consacreras. Ainsi l'autel sera très saint et tout ce qui le touchera sera saint.
  - type: heading
    content: L'holocauste perpétuel
  '38':
  - type: text
    content: '»Voici ce que tu offriras sur l''autel: 2 agneaux d''un an, et ce chaque jour, de façon constante. '
  '39':
  - type: text
    content: 'Tu offriras l''un des agneaux le matin et l''autre au coucher du soleil. '
  '4':
  - type: text
    content: '»Tu feras avancer Aaron et ses fils vers l''entrée de la tente de la rencontre et tu les laveras avec de l''eau. '
  '40':
  - type: text
    content: 'Avec le premier agneau, tu offriras 2 litres de fleur de farine pétrie dans un litre d''huile d''olives concassées, ainsi qu''une offrande d''un litre de vin. '
  '41':
  - type: text
    content: 'Tu offriras le second agneau au coucher du soleil, avec une offrande végétale et une offrande liquide identiques à celles du matin. C''est un sacrifice brûlé au feu dont l''odeur est agréable à l''Eternel. '
  '42':
  - type: text
    content: 'Voilà l''holocauste perpétuel que vous offrirez au fil des générations à l''entrée de la tente de la rencontre, devant l''Eternel. C''est là que je vous rencontrerai et que je te parlerai. '
  '43':
  - type: text
    content: 'J''y rencontrerai les Israélites et ma gloire fera de cet endroit un lieu saint. '
  '44':
  - type: text
    content: 'Je consacrerai la tente de la rencontre et l''autel, je consacrerai Aaron et ses descendants pour qu''ils soient à mon service en tant que prêtres. '
  '45':
  - type: text
    content: '*J''habiterai au milieu des Israélites et je serai leur Dieu.'
  - type: note
    content: 'J''habiterai… Dieu: repris en Lévitique 26.11, 12 (voir la note).'
  - type: text
    content: ' '
  '46':
  - type: text
    content: Ils reconnaîtront que je suis l'Eternel, leur Dieu, qui les ai fait sortir d'Egypte pour habiter au milieu d'eux. Je suis l'Eternel, leur Dieu.
  '5':
  - type: text
    content: 'Tu prendras les vêtements, tu habilleras Aaron de la tunique, de la robe de l''éphod, de l''éphod et du pectoral et tu mettras sur lui l''écharpe de l''éphod. '
  '6':
  - type: text
    content: 'Tu poseras la tiare sur sa tête et tu placeras le diadème sacré sur la tiare. '
  '7':
  - type: text
    content: 'Tu prendras l''huile d''onction, tu en verseras sur sa tête et tu le consacreras par onction. '
  '8':
  - type: text
    content: 'Tu feras approcher ses fils et tu les habilleras des tuniques. '
  '9':
  - type: text
    content: Tu mettras une ceinture à Aaron et à ses fils et tu attacheras des coiffes aux fils d'Aaron. La fonction de prêtre leur appartiendra par une prescription perpétuelle. Ainsi, tu établiras Aaron et ses fils dans leurs fonctions.
