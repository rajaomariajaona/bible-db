document_id: EXO.29
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Consécration des prêtres
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Voici ce que tu feras pour les consacrer afin qu''ils soient à mon service en tant que prêtres. Prends un jeune taureau et deux béliers sans défaut. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Avec de la fleur de farine de blé, fais des pains sans levain, des gâteaux sans levain pétris à l''huile et des galettes sans levain arrosées d''huile. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Tu les offriras dans une corbeille en même temps que le jeune taureau et les deux béliers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '»Tu feras avancer Aaron et ses fils vers l''entrée de la tente de la rencontre et tu les laveras avec de l''eau. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tu prendras les vêtements, tu habilleras Aaron de la tunique, de la robe de l''éphod, de l''éphod et du pectoral et tu mettras sur lui l''écharpe de l''éphod. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Tu poseras la tiare sur sa tête et tu placeras le diadème sacré sur la tiare. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tu prendras l''huile d''onction, tu en verseras sur sa tête et tu le consacreras par onction. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Tu feras approcher ses fils et tu les habilleras des tuniques. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Tu mettras une ceinture à Aaron et à ses fils et tu attacheras des coiffes aux fils d'Aaron. La fonction de prêtre leur appartiendra par une prescription perpétuelle. Ainsi, tu établiras Aaron et ses fils dans leurs fonctions.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '»Tu amèneras le taureau devant la tente de la rencontre, et Aaron et ses fils poseront leurs mains sur sa tête. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tu égorgeras le taureau devant l''Eternel, à l''entrée de la tente de la rencontre. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tu prendras de son sang, tu en mettras avec ton doigt sur les cornes de l''autel, puis tu verseras tout le sang au pied de l''autel. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tu prendras toute la graisse qui couvre les entrailles, le grand lobe du foie, les deux rognons et la graisse qui les entoure, et tu brûleras cela sur l''autel. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Mais tu brûleras au feu à l'extérieur du camp la viande du taureau, sa peau et ses excréments. C'est un sacrifice pour le péché.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '»Tu prendras l''un des béliers, et Aaron et ses fils poseront leurs mains sur sa tête. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Tu égorgeras le bélier, tu prendras son sang et tu le verseras sur le pourtour de l''autel. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tu couperas le bélier en morceaux et tu laveras les entrailles et les pattes, que tu mettras sur les morceaux et sur sa tête. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tu brûleras tout le bélier sur l'autel. C'est un holocauste à l'Eternel, un sacrifice brûlé au feu dont l'odeur est agréable à l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '»Tu prendras l''autre bélier, et Aaron et ses fils poseront leurs mains sur sa tête. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tu égorgeras le bélier, tu prendras de son sang, tu en mettras sur le lobe de l''oreille droite d''Aaron et sur le lobe de l''oreille droite de ses fils, sur le pouce de leur main droite et sur le gros orteil de leur pied droit, et tu verseras le sang sur le pourtour de l''autel. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Tu prendras du sang qui sera sur l''autel et de l''huile d''onction, et tu en aspergeras Aaron et ses vêtements, ses fils et leurs vêtements. C''est ainsi que seront consacrés Aaron et ses vêtements, ses fils et leurs vêtements. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tu prendras la graisse du bélier, la queue, la graisse qui couvre les entrailles, le grand lobe du foie, les deux rognons avec la graisse qui les entoure ainsi que la cuisse droite. En effet, c''est un bélier de consécration. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tu prendras aussi, dans la corbeille de pains sans levain placée devant l''Eternel, un gâteau de pain, un gâteau à l''huile et une galette. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tu mettras toutes ces choses sur les mains d''Aaron et sur celles de ses fils, et tu feras le geste de présentation devant l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Tu les retireras ensuite de leurs mains et tu les brûleras sur l''autel, par-dessus l''holocauste. C''est un sacrifice passé par le feu devant l''Eternel, dont l''odeur est agréable à l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tu prendras la poitrine du bélier qui aura servi à la consécration d''Aaron et tu feras le geste de présentation devant l''Eternel: ce sera ta portion. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Tu consacreras la poitrine et la cuisse du bélier qui aura servi à la consécration d''Aaron et de ses fils, la poitrine en faisant le geste de présentation, l''épaule à titre de prélèvement. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Elles appartiendront à Aaron et à ses fils, par une prescription perpétuelle que respecteront les Israélites, car c'est une offrande prélevée et, dans les sacrifices de communion des Israélites, l'offrande prélevée sera pour l'Eternel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '»Les vêtements sacrés d''Aaron seront pour ses descendants après lui. Ils les mettront lorsqu''on les désignera par onction et qu''on les établira dans leurs fonctions. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Ils seront portés pendant 7 jours par celui de ses fils qui lui succédera en tant que grand-prêtre et qui pénétrera dans la tente de la rencontre pour faire le service dans le lieu très saint.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '»Tu prendras le bélier de consécration et tu en feras cuire la viande dans un lieu saint. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Aaron et ses fils mangeront la viande du bélier et le pain qui sera dans la corbeille à l''entrée de la tente de la rencontre. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Ils mangeront ainsi ce qui aura servi d''expiation pour leur entrée en fonction et leur consécration. Aucune personne étrangère à la fonction de prêtre n''en mangera, car ce sont des choses saintes. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: S'il reste de la viande de consécration et du pain jusqu'au matin, tu brûleras ce reste au feu. Personne ne le mangera, car c'est une chose sainte.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: '»Tu agiras envers Aaron et ses fils conformément à tous les ordres que je t''ai donnés. Tu emploieras 7 jours à les établir dans leurs fonctions. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Tu offriras chaque jour un taureau en sacrifice pour le péché, pour l''expiation. Tu purifieras l''autel par cette expiation et tu verseras de l''huile dessus pour le consacrer. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Pendant 7 jours, tu feras des expiations sur l'autel et tu le consacreras. Ainsi l'autel sera très saint et tout ce qui le touchera sera saint.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'holocauste perpétuel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: '»Voici ce que tu offriras sur l''autel: 2 agneaux d''un an, et ce chaque jour, de façon constante. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Tu offriras l''un des agneaux le matin et l''autre au coucher du soleil. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Avec le premier agneau, tu offriras 2 litres de fleur de farine pétrie dans un litre d''huile d''olives concassées, ainsi qu''une offrande d''un litre de vin. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Tu offriras le second agneau au coucher du soleil, avec une offrande végétale et une offrande liquide identiques à celles du matin. C''est un sacrifice brûlé au feu dont l''odeur est agréable à l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Voilà l''holocauste perpétuel que vous offrirez au fil des générations à l''entrée de la tente de la rencontre, devant l''Eternel. C''est là que je vous rencontrerai et que je te parlerai. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: 'J''y rencontrerai les Israélites et ma gloire fera de cet endroit un lieu saint. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Je consacrerai la tente de la rencontre et l''autel, je consacrerai Aaron et ses descendants pour qu''ils soient à mon service en tant que prêtres. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: '*J''habiterai au milieu des Israélites et je serai leur Dieu.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.45 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'J''habiterai… Dieu: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'repris en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lévitique 26.11
      metadata:
        usfm: LEV.26.11
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '12'
      metadata:
        usfm: LEV.26.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (voir la note).'
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: Ils reconnaîtront que je suis l'Eternel, leur Dieu, qui les ai fait sortir d'Egypte pour habiter au milieu d'eux. Je suis l'Eternel, leur Dieu.
