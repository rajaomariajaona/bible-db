document_id: 2CH.32,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Tentative d'invasion par Sanchérib
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Après ces événements et ces actes de fidélité arriva Sanchérib, le roi d''Assyrie. Il pénétra en Juda et assiégea les villes fortifiées, dans l''intention de s''en emparer. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: '«Voici ce que dit Sanchérib, roi d''Assyrie: Sur quoi repose votre confiance pour que vous restiez dans une Jérusalem assiégée? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ezéchias ne vous pousse-t-il pas à vous livrer à la mort par la famine et par la soif quand il affirme: ‘L''Eternel, notre Dieu, nous délivrera du roi d''Assyrie’? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'N''est-ce pas lui, Ezéchias, qui a fait disparaître les hauts lieux et les autels de l''Eternel et qui a donné cet ordre à Juda et à Jérusalem: ‘Vous vous prosternerez devant un seul autel et c''est sur lui que vous brûlerez les parfums’? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ne savez-vous pas ce que nous avons fait, mes prédécesseurs et moi, à tous les peuples des autres pays? Les dieux des nations de ces pays ont-ils pu délivrer leur pays de ma domination? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Parmi tous les dieux des nations que mes prédécesseurs ont vouées à la destruction, quel est celui qui a pu délivrer son peuple de ma domination, pour que votre Dieu puisse vous en délivrer? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Qu'Ezéchias ne vous trompe donc pas et ne vous pousse pas dans cette direction! Ne vous fiez pas à lui, car aucun dieu d'aucune nation ni d'aucun royaume n'a pu délivrer son peuple de ma domination ni de celle de mes prédécesseurs. Votre Dieu sera d'autant moins capable de vous délivrer de ma domination!»
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Les serviteurs de Sanchérib continuèrent à parler contre l''Eternel Dieu et contre son serviteur Ezéchias. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Sanchérib avait aussi écrit une lettre insultante pour l''Eternel, le Dieu d''Israël, en s''exprimant ainsi contre lui: «Les dieux des nations des autres pays n''ont pas délivré leur peuple de ma domination. Il en ira exactement de même pour le Dieu d''Ezéchias: il ne délivrera pas son peuple de ma domination.» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Les serviteurs de Sanchérib crièrent d''une voix forte en s''adressant dans la langue des Juifs à la population de Jérusalem qui se trouvait sur la muraille, et cela afin de semer la peur et l''épouvante parmi eux et de pouvoir ainsi s''emparer de la ville. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Ils parlèrent du Dieu de Jérusalem comme des dieux des autres peuples de la terre, qui sont fabriqués par les mains de l'homme.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Voyant que Sanchérib était venu et voulait attaquer Jérusalem, Ezéchias '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Le roi Ezéchias et le prophète Esaïe, fils d''Amots, se mirent à prier à ce sujet, ils crièrent au ciel. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Alors l''Eternel envoya un ange. Il fit disparaître du camp du roi d''Assyrie tous les vaillants hommes, les princes et les chefs. Et le roi retourna couvert de honte dans son pays. Il entra dans le temple de son dieu et là, quelques-uns de ses propres enfants le firent tomber par l''épée. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ainsi, l''Eternel sauva Ezéchias et les habitants de Jérusalem de la domination de Sanchérib, roi d''Assyrie, et de celle de tous ses ennemis, et il les protégea contre ceux qui les entouraient. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: Beaucoup de gens apportèrent des offrandes à l'Eternel à Jérusalem, ainsi que des cadeaux de valeur à Ezéchias, roi de Juda. Celui-ci fut, depuis lors, tenu en haute estime parmi toutes les nations.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Maladie et guérison d'Ezéchias
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'A cette époque-là, Ezéchias fut atteint d''une maladie mortelle. Il pria l''Eternel, et l''Eternel lui adressa la parole et lui accorda un signe. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Cependant, Ezéchias ne répondit pas au bienfait qu''il avait reçu, car son cœur devint orgueilleux, si bien que la colère de l''Eternel reposa sur lui, sur Juda et sur Jérusalem. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: Alors Ezéchias s'humilia de son orgueil, de même que les habitants de Jérusalem, de sorte que la colère de l'Eternel ne vint pas sur eux pendant la vie d'Ezéchias.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Ezéchias eut beaucoup de richesses et de gloire. Il se fit des réserves d''argent, d''or, de pierres précieuses, d''aromates, de boucliers et de tous les objets qu''on peut désirer, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'des entrepôts pour les récoltes de blé, de vin nouveau et d''huile, des étables pour toutes les sortes de bétail et des troupeaux pour les étables. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Il se construisit des villes et il eut de nombreux troupeaux de petit et de gros bétail. En effet, Dieu lui avait donné des biens considérables. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'tint conseil avec ses chefs et ses hommes vaillants afin de boucher les sources d''eau qui se trouvaient à l''extérieur de la ville, et ils le soutinrent. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Ce fut aussi lui, Ezéchias, qui boucha l''issue supérieure des eaux de Guihon pour les diriger plus bas vers l''ouest de la ville de David. Ezéchias réussit dans tout ce qu''il entreprenait. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: Cependant, lorsque les chefs de Babylone lui envoyèrent des ambassadeurs pour s'informer du signe qui avait eu lieu dans le pays, Dieu l'abandonna pour le mettre à l'épreuve afin de connaître tout ce qui était dans son cœur.
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: Le reste des actes d'Ezéchias et sa piété, cela est décrit dans la vision du prophète Esaïe, fils d'Amots, et dans les annales des rois de Juda et d'Israël.
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: Ezéchias se coucha avec ses ancêtres et on l'enterra sur la montée des tombeaux des descendants de David; tout Juda et les habitants de Jérusalem lui rendirent honneur à sa mort. Son fils Manassé devint roi à sa place.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Une foule de gens se rassemblèrent et ils bouchèrent toutes les sources et le ruisseau qui coule au milieu de la région. «Pourquoi, disaient-ils, les rois d''Assyrie trouveraient-ils à leur arrivée de l''eau en abondance?» '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ezéchias prit courage. Il répara toutes les brèches faites à la muraille et suréleva les tours ainsi que l''autre muraille, à l''extérieur, fortifia la terrasse de Millo dans la ville de David et prépara un grand nombre d''armes et de boucliers. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Il désigna des chefs militaires à la tête du peuple, puis il les réunit autour de lui sur la place de la porte de la ville et toucha leur cœur en disant: '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: '«Fortifiez-vous et soyez pleins de courage! N''ayez pas peur et ne vous laissez pas effrayer face au roi d''Assyrie et à toute la foule qui est avec lui, car avec nous il y a plus qu''avec lui. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Avec lui il y a un bras de chair, tandis qu'avec nous il y a l'Eternel, notre Dieu, qui nous aidera et qui combattra pour nous.» Le peuple eut confiance dans les paroles d'Ezéchias, roi de Juda.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Après cela, Sanchérib, roi d''Assyrie, envoya ses serviteurs à Jérusalem, pendant que lui-même attaquait Lakis avec toutes ses forces. Il les envoya vers Ezéchias, roi de Juda, et vers tous les Judéens qui se trouvaient à Jérusalem pour leur transmettre ce message: '
