document_id: LEV.14
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La purification de la lèpre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Voici quelle sera la loi sur le lépreux pour le jour de sa purification. On l''amènera devant le prêtre. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le prêtre sortira du camp et examinera le lépreux. Si le lépreux est guéri de la plaie de la lèpre, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'le prêtre ordonnera que l''on prenne, pour celui qui doit être purifié, deux oiseaux vivants et purs, du bois de cèdre, du cramoisi et de l''hysope. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le prêtre ordonnera qu''on égorge l''un des oiseaux sur un vase de terre, sur de l''eau vive. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il prendra l''oiseau vivant, le bois de cèdre, le cramoisi et l''hysope, et il les trempera avec l''oiseau vivant dans le sang de l''oiseau égorgé sur l''eau vive. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il fera 7 fois l'aspersion sur celui qui doit être purifié de la lèpre. Puis il le déclarera pur et lâchera l'oiseau vivant dans les champs.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '»Celui qui se purifie lavera ses vêtements, rasera tous ses poils et se baignera dans l''eau. Il sera pur. Ensuite il pourra entrer dans le camp, mais il restera 7 jours à l''extérieur de sa tente. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Le septième jour, il rasera tous ses poils, sa tête, sa barbe, ses sourcils, il rasera tous ses poils. Il lavera ses vêtements et baignera son corps dans l''eau, et il sera pur. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le huitième jour, il prendra deux agneaux sans défaut et une brebis d''un an sans défaut, une offrande de 6 litres et demi de fleur de farine pétrie à l''huile et 3 décilitres d''huile. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le prêtre qui fait la purification présentera l'homme qui se purifie et tous ces éléments devant l'Eternel, à l'entrée de la tente de la rencontre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '»Le prêtre prendra l''un des agneaux et l''offrira en sacrifice de culpabilité avec les 3 décilitres d''huile. Il fera avec eux le geste de présentation devant l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il égorgera l''agneau à l''endroit où l''on égorge les victimes expiatoires et les holocaustes, dans le lieu saint. En effet, dans le sacrifice de culpabilité comme dans le sacrifice d''expiation, la victime est pour le prêtre. C''est une chose très sainte. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Le prêtre prendra du sang de la victime de culpabilité. Il en mettra sur le lobe de l''oreille droite de celui qui se purifie, sur le pouce de sa main droite et sur le gros orteil de son pied droit. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le prêtre prendra la mesure d''huile et il en versera dans le creux de sa main gauche. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il trempera le doigt de sa main droite dans l''huile qui est dans le creux de sa main gauche et il fera avec le doigt 7 fois l''aspersion de l''huile devant l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il mettra de l''huile qui lui reste dans la main sur le lobe de l''oreille droite de celui qui se purifie, sur le pouce de sa main droite et sur le gros orteil de son pied droit, par-dessus le sang de la victime de culpabilité. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le prêtre mettra ce qui lui reste d''huile dans la main sur la tête de celui qui se purifie afin de faire l''expiation pour lui devant l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Puis il offrira le sacrifice d''expiation et il fera l''expiation pour celui qui se purifie de sa souillure. Ensuite il égorgera l''holocauste. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Il offrira sur l'autel l'holocauste et l'offrande. C'est ainsi que le prêtre fera l'expiation pour cette personne et elle sera pure.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '»Si la personne est pauvre et ne dispose pas de moyens suffisants, elle prendra un seul agneau, qui sera offert en sacrifice de culpabilité avec le geste de présentation et avec lequel on fera l''expiation pour elle. Elle prendra 2 litres de fleur de farine pétrie à l''huile pour l''offrande et 3 décilitres d''huile. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Elle prendra aussi deux tourterelles ou deux jeunes pigeons, en fonction de ses moyens, l''un pour le sacrifice d''expiation, l''autre pour l''holocauste. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Le huitième jour, elle apportera tous ces éléments au prêtre à l'entrée de la tente de la rencontre, devant l'Eternel, pour sa purification.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '»Le prêtre prendra l''agneau destiné au sacrifice de culpabilité et les 3 décilitres d''huile, et il fera avec eux le geste de présentation devant l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il égorgera l''agneau du sacrifice de culpabilité, prendra du sang de la victime de culpabilité et en mettra sur le lobe de l''oreille droite de celui qui se purifie, sur le pouce de sa main droite et sur le gros orteil de son pied droit. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Le prêtre versera de l''huile dans le creux de sa main gauche. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Il fera avec le doigt de sa main droite 7 fois l''aspersion de l''huile qui est dans sa main gauche devant l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Il mettra de l''huile qui est dans sa main sur le lobe de l''oreille droite de celui qui se purifie, sur le pouce de sa main droite et sur le gros orteil de son pied droit, là où il a mis du sang de la victime de culpabilité. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Le prêtre mettra ce qui lui reste d''huile dans la main sur la tête de celui qui se purifie afin de faire l''expiation pour lui devant l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Puis il offrira l''une des tourterelles ou l''un des jeunes pigeons que la personne aura pu se procurer, '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: l'un en sacrifice d'expiation, l'autre en holocauste avec l'offrande. C'est ainsi qu'il fera l'expiation devant l'Eternel pour celui qui se purifie.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Telle est la loi pour la purification de celui qui a une plaie de lèpre et qui ne dispose pas de moyens suffisants.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La lèpre des maisons
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'L''Eternel dit à Moïse et à Aaron: '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: '«Lorsque vous serez entrés dans le pays de Canaan dont je vous donne la possession, si je mets une plaie de lèpre sur une maison du pays que vous posséderez, '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'le propriétaire de la maison ira le déclarer au prêtre en disant: ‘J''aperçois comme une plaie dans ma maison.’ '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Avant d'entrer dans la maison pour examiner la plaie, le prêtre ordonnera qu'on la vide afin que tout ce qu'elle contient ne devienne pas impur. Après cela, il entrera pour examiner la maison.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: '»Le prêtre examinera la plaie. S''il voit qu''elle se présente sur les murs de la maison sous forme de cavités verdâtres ou rougeâtres qui font un creux dans le mur, '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'il sortira de la maison et, quand il sera à la porte, il fera fermer la maison pour 7 jours. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Il y retournera le septième jour. S''il voit que la plaie s''est étendue sur les murs de la maison, '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'il ordonnera qu''on enlève les pierres attaquées de la plaie et qu''on les jette à l''extérieur de la ville, dans un endroit impur. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Il fera racler tout l''intérieur de la maison et l''on jettera à l''extérieur de la ville, dans un endroit impur, la poussière qu''on aura raclée. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: On prendra d'autres pierres que l'on mettra à la place des premières et l'on prendra un autre mortier pour recrépir la maison.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: '»Si la plaie apparaît de nouveau dans la maison après qu''on a enlevé les pierres, raclé et recrépi la maison, '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'le prêtre y retournera. S''il voit que la plaie s''est étendue dans la maison, c''est une lèpre durable dans la maison. Elle est impure. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'On démolira la maison, les pierres, le bois et tout le mortier de la maison. On portera ces éléments à l''extérieur de la ville dans un endroit impur. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Si quelqu''un est entré dans la maison pendant toute la période où elle était fermée, il sera impur jusqu''au soir. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: Si quelqu'un y a couché, il lavera ses vêtements. Si quelqu'un y a mangé, il lavera aussi ses vêtements.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: '»Si le prêtre qui est retourné dans la maison voit que la plaie ne s''est pas étendue après que la maison a été recrépie, il déclarera la maison pure, car la plaie est guérie. '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Il prendra deux oiseaux, du bois de cèdre, du cramoisi et de l''hysope pour purifier la maison. '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Il égorgera l''un des oiseaux sur un vase de terre, sur de l''eau vive. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Il prendra le bois de cèdre, l''hysope, le cramoisi et l''oiseau vivant, les trempera dans le sang de l''oiseau égorgé et dans l''eau vive et fera 7 fois l''aspersion sur la maison. '
  - type: usfm
    marker: v
    metadata:
      v: '52'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Il purifiera la maison avec le sang de l''oiseau, l''eau vive, l''oiseau vivant, le bois de cèdre, l''hysope et le cramoisi. '
  - type: usfm
    marker: v
    metadata:
      v: '53'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: Il lâchera l'oiseau vivant à l'extérieur de la ville, dans les champs. C'est ainsi qu'il fera l'expiation pour la maison et elle sera pure.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '54'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: 'Telle est la loi pour toute plaie de lèpre et pour la teigne, '
  - type: usfm
    marker: v
    metadata:
      v: '55'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '55'
  - type: text
    text: 'pour la lèpre des vêtements et des maisons, '
  - type: usfm
    marker: v
    metadata:
      v: '56'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '56'
  - type: text
    text: 'pour les grosseurs, les dartres et les taches: '
  - type: usfm
    marker: v
    metadata:
      v: '57'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '57'
  - type: text
    text: elle enseigne quand une chose est impure et quand elle est pure. Telle est la loi sur la lèpre.
