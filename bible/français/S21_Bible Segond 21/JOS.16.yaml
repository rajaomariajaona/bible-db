document_id: JOS.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Territoire accordé à Ephraïm
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'La part attribuée par tirage au sort aux fils de Joseph s''étendait depuis le Jourdain près de Jéricho, à l''est des eaux de Jéricho. La frontière suivait le désert qui monte de Jéricho à Béthel en passant par la montagne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Elle continuait de Béthel à Luz et passait vers la frontière des Arkiens par Atharoth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Puis elle descendait à l''ouest vers la frontière des Japhléthiens jusqu''à celle de Beth-Horon-la-basse et jusqu''à Guézer pour déboucher sur la mer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Voilà l'héritage que reçurent les fils de Joseph, Manassé et Ephraïm.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Voici le territoire des clans des Ephraïmites.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'La frontière de leur héritage était, à l''est, Atharoth-Addar et allait jusqu''à Beth-Horon-la-haute. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Elle continuait du côté de l''ouest en partant vers Micmethath au nord, tournait à l''est vers Thaanath-Silo et passait dans la direction de l''est par Janoach. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'De Janoach elle descendait à Atharoth et à Naaratha, touchait Jéricho et se prolongeait jusqu''au Jourdain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: De Tappuach elle allait vers l'ouest au torrent de Kana pour déboucher sur la mer.
- type: usfm
  marker: p
  children:
  - type: text
    text: Tel fut l'héritage des clans de la tribu d'Ephraïm.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les Ephraïmites avaient aussi des villes qui leur furent réservées au milieu de l'héritage des Manassites, toutes avec leurs villages.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ils ne chassèrent pas les Cananéens qui habitaient à Guézer, et les Cananéens ont habité au milieu d'Ephraïm jusqu'à aujourd'hui, tout en étant soumis à des corvées d'esclaves.
