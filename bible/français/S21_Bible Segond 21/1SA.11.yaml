document_id: 1SA.11,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Victoire de Saül sur les Ammonites
  - type: text
    content: 'Nachash l''Ammonite vint assiéger Jabès en Galaad. Tous les habitants de Jabès dirent à Nachash: «Conclus une alliance avec nous et nous te servirons.» '
  '10':
  - type: text
    content: 'Ils dirent aux Ammonites: «Demain nous nous livrerons à vous et vous nous traiterez comme vous voudrez.»'
  '11':
  - type: text
    content: Le lendemain, Saül divisa le peuple en 3 groupes. Ils pénétrèrent dans le camp des Ammonites tôt le matin, et ils leur portèrent des coups jusqu'à la chaleur du jour. Ceux qui purent leur échapper furent dispersés au point qu'il n'en resta pas deux ensemble.
  '12':
  - type: text
    content: 'Le peuple dit à Samuel: «Quels sont les hommes qui refusaient de voir Saül régner sur eux? Livrez-les-nous et nous les ferons mourir.» '
  '13':
  - type: text
    content: 'Mais Saül dit: «Personne ne sera mis à mort aujourd''hui, car aujourd''hui l''Eternel a accompli une délivrance en Israël.» '
  '14':
  - type: text
    content: 'Samuel dit au peuple: «Venez, allons à Guilgal pour y confirmer la royauté.» '
  '15':
  - type: text
    content: Tout le peuple se rendit à Guilgal et ils y sacrèrent Saül roi devant l'Eternel. Ils y offrirent des sacrifices de communion devant l'Eternel, et Saül et tous les hommes d'Israël s'y livrèrent à de grandes réjouissances.
  '2':
  - type: text
    content: 'Mais Nachash l''Ammonite leur répondit: «Je traiterai avec vous à condition de vous crever à tous l''œil droit et de jeter ainsi la honte sur tout Israël.» '
  '3':
  - type: text
    content: 'Les anciens de Jabès lui dirent: «Accorde-nous une trêve de sept jours afin que nous envoyions des messagers dans tout le territoire d''Israël. Si personne ne vient nous secourir, nous nous livrerons à toi.» '
  '4':
  - type: text
    content: Les messagers arrivèrent à Guibea, la ville de Saül, et firent au peuple le récit de ces événements. Tout le peuple se mit alors à pleurer tout haut.
  '5':
  - type: text
    content: 'A ce moment, Saül revint des champs, derrière ses bœufs. Il demanda: «Qu''a donc le peuple, à pleurer ainsi?» On lui raconta ce qu''avaient dit les habitants de Jabès. '
  '6':
  - type: text
    content: 'L''Esprit de Dieu vint sur Saül lorsqu''il entendit cela, et sa colère s''enflamma fortement. '
  '7':
  - type: text
    content: 'Il prit une paire de bœufs, les coupa en morceaux et les envoya par l''intermédiaire de messagers dans tout le territoire d''Israël en disant: «Si quelqu''un ne marche pas à la suite de Saül et de Samuel, ses bœufs seront traités de la même manière.» La terreur de l''Eternel s''empara du peuple et il se mit en marche comme un seul homme. '
  '8':
  - type: text
    content: 'Saül le passa en revue à Bézek: les Israélites étaient 300''000, et les hommes de Juda 30''000. '
  '9':
  - type: text
    content: 'Ils annoncèrent aux messagers qui étaient venus: «Voici ce que vous direz aux habitants de Jabès en Galaad: ‘Demain vous aurez du secours, quand le soleil sera à son zénith.’» Les messagers portèrent cette nouvelle aux habitants de Jabès, qui furent remplis de joie. '
