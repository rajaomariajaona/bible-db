document_id: 1SA.11
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Victoire de Saül sur les Ammonites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Nachash l''Ammonite vint assiéger Jabès en Galaad. Tous les habitants de Jabès dirent à Nachash: «Conclus une alliance avec nous et nous te servirons.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mais Nachash l''Ammonite leur répondit: «Je traiterai avec vous à condition de vous crever à tous l''œil droit et de jeter ainsi la honte sur tout Israël.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Les anciens de Jabès lui dirent: «Accorde-nous une trêve de sept jours afin que nous envoyions des messagers dans tout le territoire d''Israël. Si personne ne vient nous secourir, nous nous livrerons à toi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les messagers arrivèrent à Guibea, la ville de Saül, et firent au peuple le récit de ces événements. Tout le peuple se mit alors à pleurer tout haut.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'A ce moment, Saül revint des champs, derrière ses bœufs. Il demanda: «Qu''a donc le peuple, à pleurer ainsi?» On lui raconta ce qu''avaient dit les habitants de Jabès. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'L''Esprit de Dieu vint sur Saül lorsqu''il entendit cela, et sa colère s''enflamma fortement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il prit une paire de bœufs, les coupa en morceaux et les envoya par l''intermédiaire de messagers dans tout le territoire d''Israël en disant: «Si quelqu''un ne marche pas à la suite de Saül et de Samuel, ses bœufs seront traités de la même manière.» La terreur de l''Eternel s''empara du peuple et il se mit en marche comme un seul homme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Saül le passa en revue à Bézek: les Israélites étaient 300''000, et les hommes de Juda 30''000. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ils annoncèrent aux messagers qui étaient venus: «Voici ce que vous direz aux habitants de Jabès en Galaad: ‘Demain vous aurez du secours, quand le soleil sera à son zénith.’» Les messagers portèrent cette nouvelle aux habitants de Jabès, qui furent remplis de joie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils dirent aux Ammonites: «Demain nous nous livrerons à vous et vous nous traiterez comme vous voudrez.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Le lendemain, Saül divisa le peuple en 3 groupes. Ils pénétrèrent dans le camp des Ammonites tôt le matin, et ils leur portèrent des coups jusqu'à la chaleur du jour. Ceux qui purent leur échapper furent dispersés au point qu'il n'en resta pas deux ensemble.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le peuple dit à Samuel: «Quels sont les hommes qui refusaient de voir Saül régner sur eux? Livrez-les-nous et nous les ferons mourir.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Mais Saül dit: «Personne ne sera mis à mort aujourd''hui, car aujourd''hui l''Eternel a accompli une délivrance en Israël.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Samuel dit au peuple: «Venez, allons à Guilgal pour y confirmer la royauté.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tout le peuple se rendit à Guilgal et ils y sacrèrent Saül roi devant l'Eternel. Ils y offrirent des sacrifices de communion devant l'Eternel, et Saül et tous les hommes d'Israël s'y livrèrent à de grandes réjouissances.
