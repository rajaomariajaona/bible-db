document_id: HOS.13,152
type_code: fra
verses:
  '1':
  - type: heading
    content: L'Eternel, seul vrai soutien d'Israël
  - type: text
    content: Lorsque Ephraïm parlait, c'était une terreur;
  - type: text
    content: il était puissant en Israël,
  - type: text
    content: mais il s'est rendu coupable en adorant Baal, et il est mort.
  '10':
  - type: text
    content: Où donc est ton roi?
  - type: text
    content: Qu'il te délivre dans toutes tes villes!
  - type: text
    content: 'Où sont tes juges, ceux auxquels tu disais:'
  - type: text
    content: ‘Donne-moi un roi et des princes’?
  '11':
  - type: text
    content: Je t'ai donné un roi dans ma colère,
  - type: text
    content: je le reprendrai dans ma fureur.
  '12':
  - type: text
    content: La faute d'Ephraïm est gardée,
  - type: text
    content: son péché est mis en réserve.
  '13':
  - type: text
    content: Les douleurs de celle qui accouche viendront pour lui,
  - type: text
    content: mais c'est un enfant stupide
  - type: text
    content: qui, le moment voulu, refuse de sortir du ventre maternel.
  '14':
  - type: text
    content: Je les libérerai du pouvoir du séjour des morts,
  - type: text
    content: je les rachèterai de la mort.
  - type: text
    content: '*Mort, où est ton fléau?'
  - type: text
    content: Séjour des morts, où est ton pouvoir de destruction?
  - type: note
    content: 'Mort… destruction: cité en 1 Corinthiens 15.55.'
  - type: text
    content: Le regret se cache à mes regards!
  '15':
  - type: text
    content: Ephraïm a beau prospérer au milieu de ses frères,
  - type: text
    content: le vent d'est viendra, le vent de l'Eternel se lèvera du désert,
  - type: text
    content: mettra ses sources à sec et fera cesser de couler ses fontaines.
  - type: text
    content: On pillera le trésor de tous les objets précieux.
  '2':
  - type: text
    content: 'Maintenant ils continuent à pécher:'
  - type: text
    content: ils se font avec leur argent des idoles en métal fondu,
  - type: text
    content: des idoles de leur invention;
  - type: text
    content: toutes sont l'œuvre des artisans.
  - type: text
    content: 'On dit à leur sujet:'
  - type: text
    content: «Ceux qui offrent des sacrifices rendent hommage à des veaux!»
  '3':
  - type: text
    content: Voilà pourquoi ils seront pareils à la nuée du matin,
  - type: text
    content: à la rosée qui se dissipe très vite,
  - type: text
    content: à des brins de paille emportés par le vent hors de l'aire de battage,
  - type: text
    content: à la fumée qui sort d'une fenêtre.
  '4':
  - type: text
    content: Moi, je suis l'Eternel, ton Dieu depuis l'Egypte.
  - type: text
    content: Tu ne connaîtras pas d'autre Dieu que moi,
  - type: text
    content: et il n'y a pas d'autre sauveur que moi.
  '5':
  - type: text
    content: Je t'ai connu dans le désert,
  - type: text
    content: dans une terre aride.
  '6':
  - type: text
    content: Ils se sont rassasiés dans leurs pâturages,
  - type: text
    content: ils se sont rassasiés, et leur cœur est devenu orgueilleux.
  - type: text
    content: Voilà pourquoi ils m'ont oublié.
  '7':
  - type: text
    content: Je serai pour eux pareil à un lion,
  - type: text
    content: 'à une panthère: je les épierai sur la route.'
  '8':
  - type: text
    content: Je les attaquerai comme une ourse à qui l'on a enlevé ses petits
  - type: text
    content: et je déchirerai l'enveloppe de leur cœur.
  - type: text
    content: Je les dévorerai comme une lionne,
  - type: text
    content: les bêtes sauvages les mettront en pièces.
  '9':
  - type: text
    content: Ce qui cause ta ruine, Israël,
  - type: text
    content: c'est que tu as été contre moi, contre celui qui pouvait te secourir.
