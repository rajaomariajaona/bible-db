document_id: HOS.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'Eternel, seul vrai soutien d'Israël
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Lorsque Ephraïm parlait, c'était une terreur;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il était puissant en Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais il s'est rendu coupable en adorant Baal, et il est mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Maintenant ils continuent à pécher:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se font avec leur argent des idoles en métal fondu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des idoles de leur invention;
- type: usfm
  marker: q1
  children:
  - type: text
    text: toutes sont l'œuvre des artisans.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'On dit à leur sujet:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ceux qui offrent des sacrifices rendent hommage à des veaux!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Voilà pourquoi ils seront pareils à la nuée du matin,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la rosée qui se dissipe très vite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à des brins de paille emportés par le vent hors de l'aire de battage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à la fumée qui sort d'une fenêtre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Moi, je suis l'Eternel, ton Dieu depuis l'Egypte.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu ne connaîtras pas d'autre Dieu que moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il n'y a pas d'autre sauveur que moi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Je t'ai connu dans le désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans une terre aride.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Ils se sont rassasiés dans leurs pâturages,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils se sont rassasiés, et leur cœur est devenu orgueilleux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voilà pourquoi ils m'ont oublié.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Je serai pour eux pareil à un lion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'à une panthère: je les épierai sur la route.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Je les attaquerai comme une ourse à qui l'on a enlevé ses petits
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je déchirerai l'enveloppe de leur cœur.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je les dévorerai comme une lionne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les bêtes sauvages les mettront en pièces.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ce qui cause ta ruine, Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est que tu as été contre moi, contre celui qui pouvait te secourir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Où donc est ton roi?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qu'il te délivre dans toutes tes villes!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Où sont tes juges, ceux auxquels tu disais:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘Donne-moi un roi et des princes’?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Je t'ai donné un roi dans ma colère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je le reprendrai dans ma fureur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: La faute d'Ephraïm est gardée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: son péché est mis en réserve.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Les douleurs de celle qui accouche viendront pour lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais c'est un enfant stupide
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui, le moment voulu, refuse de sortir du ventre maternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Je les libérerai du pouvoir du séjour des morts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je les rachèterai de la mort.
- type: usfm
  marker: q1
  children:
  - type: text
    text: '*Mort, où est ton fléau?'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Séjour des morts, où est ton pouvoir de destruction?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Mort… destruction: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: 1 Corinthiens 15.55
      metadata:
        usfm: 1CO.15.55
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le regret se cache à mes regards!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ephraïm a beau prospérer au milieu de ses frères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le vent d'est viendra, le vent de l'Eternel se lèvera du désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mettra ses sources à sec et fera cesser de couler ses fontaines.
- type: usfm
  marker: q1
  children:
  - type: text
    text: On pillera le trésor de tous les objets précieux.
