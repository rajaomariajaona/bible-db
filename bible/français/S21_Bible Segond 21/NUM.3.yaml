document_id: NUM.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Recensement et clans des Lévites
  - type: text
    content: Voici l'histoire d'Aaron et de Moïse à l'époque où l'Eternel parla à Moïse sur le mont Sinaï.
  '10':
  - type: text
    content: Mais c'est Aaron et ses fils que tu établiras responsables de leur fonction de prêtres. Si quelqu'un d'autre y prend part, il sera puni de mort.»
  '11':
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '12':
  - type: text
    content: '«J''ai pris les Lévites du milieu des Israélites, à la place de tous les premiers-nés des Israélites, et les Lévites m''appartiennent. '
  '13':
  - type: text
    content: 'En effet, tout premier-né m''appartient. Le jour où j''ai frappé tous les premiers-nés en Egypte, je me suis consacré tous les premiers-nés en Israël, aussi bien des hommes que des animaux: ils m''appartiendront. Je suis l''Eternel.»'
  '14':
  - type: text
    content: 'L''Eternel dit à Moïse dans le désert du Sinaï: '
  '15':
  - type: text
    content: '«Fais le dénombrement des Lévites en fonction de leur famille, de leur clan. Tu feras le dénombrement de tous les hommes âgés d''un mois et plus.» '
  '16':
  - type: text
    content: Moïse les dénombra sur l'ordre de l'Eternel, il se conforma à cet ordre.
  '17':
  - type: text
    content: 'Voici les fils de Lévi cités par leur nom: Guershon, Kehath et Merari. '
  '18':
  - type: text
    content: 'Voici le nom des fils de Guershon en fonction de leur clan: Libni et Shimeï. '
  '19':
  - type: text
    content: 'Voici les fils de Kehath en fonction de leur clan: Amram, Jitsehar, Hébron et Uziel, '
  '2':
  - type: text
    content: 'Voici le nom des fils d''Aaron: Nadab, l''aîné, Abihu, Eléazar et Ithamar. '
  '20':
  - type: text
    content: 'ainsi que les fils de Merari en fonction de leur clan: Machli et Mushi. Tels sont les clans de Lévi en fonction de leur famille.'
  '21':
  - type: text
    content: 'De Guershon descendent les clans de Libni et de Shimeï; tels sont les clans des Guershonites. '
  '22':
  - type: text
    content: 'En comptant tous les hommes âgés d''un mois et plus, on dénombra 7500 personnes. '
  '23':
  - type: text
    content: 'Les clans des Guershonites campaient derrière le tabernacle à l''ouest. '
  '24':
  - type: text
    content: 'Le chef de famille des Guershonites était Eliasaph, fils de Laël. '
  '25':
  - type: text
    content: 'Pour ce qui concerne la tente de la rencontre, les descendants de Guershon étaient responsables du tabernacle et de la tente, de la couverture, du rideau qui est à l''entrée de la tente de la rencontre, '
  '26':
  - type: text
    content: des toiles du parvis, du rideau de l'entrée du parvis qui entoure le tabernacle et l'autel, ainsi que de tous les cordages destinés au service du tabernacle.
  '27':
  - type: text
    content: 'De Kehath descendent les clans des Amramites, des Jitseharites, des Hébronites et des Uziélites; tels sont les clans des Kehathites. '
  '28':
  - type: text
    content: 'En comptant tous les hommes âgés d''un mois et plus, il y en eut 8600 qui furent chargés de la responsabilité du sanctuaire. '
  '29':
  - type: text
    content: 'Les clans des descendants de Kehath campaient au côté sud du tabernacle. '
  '3':
  - type: text
    content: 'Tel est le nom des fils d''Aaron; ils furent désignés par onction comme prêtres et établis dans leurs fonctions en tant que prêtres. '
  '30':
  - type: text
    content: 'Le chef de famille pour les clans des Kehathites était Elitsaphan, fils d''Uziel. '
  '31':
  - type: text
    content: 'Ils étaient responsables de l''arche, de la table, du chandelier, des autels, des ustensiles du sanctuaire avec lesquels on fait le service, du voile et de tout ce qui en dépend. '
  '32':
  - type: text
    content: Le chef des chefs des Lévites était Eléazar, le fils du prêtre Aaron. Il supervisait les hommes chargés de la responsabilité du sanctuaire.
  '33':
  - type: text
    content: 'De Merari descendent les clans de Machli et de Mushi; tels sont les clans des Merarites. '
  '34':
  - type: text
    content: 'En comptant tous les hommes âgés d''un mois et plus, on dénombra 6200 personnes. '
  '35':
  - type: text
    content: 'Le chef de famille pour les clans de Merari était Tsuriel, fils d''Abihaïl. Ils campaient du côté nord du tabernacle. '
  '36':
  - type: text
    content: 'Les fils de Merari avaient la surveillance et la responsabilité des planches du tabernacle, de ses barres, de ses colonnes et leurs bases, de tous ses ustensiles et de tout ce qui en dépend, '
  '37':
  - type: text
    content: des colonnes placées sur tout le pourtour du parvis, de leurs bases, leurs pieux et leurs cordages.
  '38':
  - type: text
    content: Moïse, Aaron et ses fils campaient devant le tabernacle, à l'est, devant la tente de la rencontre, du côté du soleil levant. Ils étaient chargés de la responsabilité du sanctuaire au nom des Israélites. Si quelqu'un d'autre s'en approchait, il devait être puni de mort.
  '39':
  - type: text
    content: Moïse et Aaron dénombrèrent au total parmi les Lévites, sur l'ordre de l'Eternel et en fonction de leur clan, 22'000 hommes âgés d'un mois et plus.
  - type: heading
    content: Rachat des premiers-nés
  '4':
  - type: text
    content: Nadab et Abihu moururent devant l'Eternel lorsqu'ils apportèrent du feu étranger devant lui, dans le désert du Sinaï. Ils n'avaient pas de fils. Eléazar et Ithamar officièrent comme prêtres aux côtés de leur père Aaron.
  '40':
  - type: text
    content: 'L''Eternel dit à Moïse: «Fais le dénombrement de tous les premiers-nés de sexe masculin âgés d''un mois et plus parmi les Israélites et compte-les d''après leurs noms. '
  '41':
  - type: text
    content: 'Tu prendras les Lévites pour moi, l''Eternel, à la place de tous les premiers-nés des Israélites, et le bétail des Lévites à la place de tous les premiers-nés du bétail des Israélites.» '
  '42':
  - type: text
    content: 'Moïse fit le dénombrement de tous les premiers-nés parmi les Israélites, conformément à l''ordre que l''Eternel lui avait donné. '
  '43':
  - type: text
    content: On dénombra au total, en comptant les noms des hommes âgés d'un mois et plus, 22'273 premiers-nés.
  '44':
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '45':
  - type: text
    content: '«Prends les Lévites à la place de tous les premiers-nés des Israélites et le bétail des Lévites à la place de leur bétail. Les Lévites m''appartiennent. Je suis l''Eternel. '
  '46':
  - type: text
    content: 'Pour le rachat des 273 qui dépassent le nombre des Lévites parmi les premiers-nés des Israélites, '
  '47':
  - type: text
    content: 'tu prendras 5 pièces par personne. Tu les prendras d''après la valeur étalon du sanctuaire, qui est de 10 grammes. '
  '48':
  - type: text
    content: 'Tu donneras l''argent à Aaron et à ses fils pour le rachat de ceux qui sont en trop par rapport au nombre des Lévites.» '
  '49':
  - type: text
    content: 'Moïse prit l''argent pour le rachat de ceux qui dépassaient le nombre des premiers-nés rachetés par les Lévites; '
  '5':
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '50':
  - type: text
    content: 'il prit l''argent des premiers-nés des Israélites: 1365 pièces, d''après la valeur étalon du sanctuaire. '
  '51':
  - type: text
    content: Moïse donna l'argent du rachat à Aaron et à ses fils, suivant l'ordre de l'Eternel; il se conforma à l'ordre que l'Eternel lui avait donné.
  '6':
  - type: text
    content: '«Fais approcher la tribu de Lévi et mets-la à la disposition du prêtre Aaron pour qu''elle soit à son service. '
  '7':
  - type: text
    content: 'Ils assumeront sa tâche et celle de toute l''assemblée devant la tente de la rencontre en effectuant le service du tabernacle. '
  '8':
  - type: text
    content: 'Ils auront la responsabilité de tous les ustensiles de la tente de la rencontre et assumeront la tâche des Israélites en effectuant le service du tabernacle. '
  '9':
  - type: text
    content: 'Tu donneras les Lévites à Aaron et à ses fils; ils lui seront donnés comme des dons de la part des Israélites. '
