document_id: NUM.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Recensement et clans des Lévites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Voici l'histoire d'Aaron et de Moïse à l'époque où l'Eternel parla à Moïse sur le mont Sinaï.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici le nom des fils d''Aaron: Nadab, l''aîné, Abihu, Eléazar et Ithamar. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tel est le nom des fils d''Aaron; ils furent désignés par onction comme prêtres et établis dans leurs fonctions en tant que prêtres. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Nadab et Abihu moururent devant l'Eternel lorsqu'ils apportèrent du feu étranger devant lui, dans le désert du Sinaï. Ils n'avaient pas de fils. Eléazar et Ithamar officièrent comme prêtres aux côtés de leur père Aaron.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '«Fais approcher la tribu de Lévi et mets-la à la disposition du prêtre Aaron pour qu''elle soit à son service. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils assumeront sa tâche et celle de toute l''assemblée devant la tente de la rencontre en effectuant le service du tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils auront la responsabilité de tous les ustensiles de la tente de la rencontre et assumeront la tâche des Israélites en effectuant le service du tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tu donneras les Lévites à Aaron et à ses fils; ils lui seront donnés comme des dons de la part des Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Mais c'est Aaron et ses fils que tu établiras responsables de leur fonction de prêtres. Si quelqu'un d'autre y prend part, il sera puni de mort.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '«J''ai pris les Lévites du milieu des Israélites, à la place de tous les premiers-nés des Israélites, et les Lévites m''appartiennent. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'En effet, tout premier-né m''appartient. Le jour où j''ai frappé tous les premiers-nés en Egypte, je me suis consacré tous les premiers-nés en Israël, aussi bien des hommes que des animaux: ils m''appartiendront. Je suis l''Eternel.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'L''Eternel dit à Moïse dans le désert du Sinaï: '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '«Fais le dénombrement des Lévites en fonction de leur famille, de leur clan. Tu feras le dénombrement de tous les hommes âgés d''un mois et plus.» '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Moïse les dénombra sur l'ordre de l'Eternel, il se conforma à cet ordre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Voici les fils de Lévi cités par leur nom: Guershon, Kehath et Merari. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Voici le nom des fils de Guershon en fonction de leur clan: Libni et Shimeï. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Voici les fils de Kehath en fonction de leur clan: Amram, Jitsehar, Hébron et Uziel, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'ainsi que les fils de Merari en fonction de leur clan: Machli et Mushi. Tels sont les clans de Lévi en fonction de leur famille.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'De Guershon descendent les clans de Libni et de Shimeï; tels sont les clans des Guershonites. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'En comptant tous les hommes âgés d''un mois et plus, on dénombra 7500 personnes. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Les clans des Guershonites campaient derrière le tabernacle à l''ouest. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Le chef de famille des Guershonites était Eliasaph, fils de Laël. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Pour ce qui concerne la tente de la rencontre, les descendants de Guershon étaient responsables du tabernacle et de la tente, de la couverture, du rideau qui est à l''entrée de la tente de la rencontre, '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: des toiles du parvis, du rideau de l'entrée du parvis qui entoure le tabernacle et l'autel, ainsi que de tous les cordages destinés au service du tabernacle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'De Kehath descendent les clans des Amramites, des Jitseharites, des Hébronites et des Uziélites; tels sont les clans des Kehathites. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'En comptant tous les hommes âgés d''un mois et plus, il y en eut 8600 qui furent chargés de la responsabilité du sanctuaire. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Les clans des descendants de Kehath campaient au côté sud du tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Le chef de famille pour les clans des Kehathites était Elitsaphan, fils d''Uziel. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Ils étaient responsables de l''arche, de la table, du chandelier, des autels, des ustensiles du sanctuaire avec lesquels on fait le service, du voile et de tout ce qui en dépend. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Le chef des chefs des Lévites était Eléazar, le fils du prêtre Aaron. Il supervisait les hommes chargés de la responsabilité du sanctuaire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'De Merari descendent les clans de Machli et de Mushi; tels sont les clans des Merarites. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'En comptant tous les hommes âgés d''un mois et plus, on dénombra 6200 personnes. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Le chef de famille pour les clans de Merari était Tsuriel, fils d''Abihaïl. Ils campaient du côté nord du tabernacle. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Les fils de Merari avaient la surveillance et la responsabilité des planches du tabernacle, de ses barres, de ses colonnes et leurs bases, de tous ses ustensiles et de tout ce qui en dépend, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: des colonnes placées sur tout le pourtour du parvis, de leurs bases, leurs pieux et leurs cordages.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Moïse, Aaron et ses fils campaient devant le tabernacle, à l'est, devant la tente de la rencontre, du côté du soleil levant. Ils étaient chargés de la responsabilité du sanctuaire au nom des Israélites. Si quelqu'un d'autre s'en approchait, il devait être puni de mort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: Moïse et Aaron dénombrèrent au total parmi les Lévites, sur l'ordre de l'Eternel et en fonction de leur clan, 22'000 hommes âgés d'un mois et plus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rachat des premiers-nés
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'L''Eternel dit à Moïse: «Fais le dénombrement de tous les premiers-nés de sexe masculin âgés d''un mois et plus parmi les Israélites et compte-les d''après leurs noms. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Tu prendras les Lévites pour moi, l''Eternel, à la place de tous les premiers-nés des Israélites, et le bétail des Lévites à la place de tous les premiers-nés du bétail des Israélites.» '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Moïse fit le dénombrement de tous les premiers-nés parmi les Israélites, conformément à l''ordre que l''Eternel lui avait donné. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: On dénombra au total, en comptant les noms des hommes âgés d'un mois et plus, 22'273 premiers-nés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: '«Prends les Lévites à la place de tous les premiers-nés des Israélites et le bétail des Lévites à la place de leur bétail. Les Lévites m''appartiennent. Je suis l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Pour le rachat des 273 qui dépassent le nombre des Lévites parmi les premiers-nés des Israélites, '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'tu prendras 5 pièces par personne. Tu les prendras d''après la valeur étalon du sanctuaire, qui est de 10 grammes. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Tu donneras l''argent à Aaron et à ses fils pour le rachat de ceux qui sont en trop par rapport au nombre des Lévites.» '
  - type: usfm
    marker: v
    metadata:
      v: '49'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Moïse prit l''argent pour le rachat de ceux qui dépassaient le nombre des premiers-nés rachetés par les Lévites; '
  - type: usfm
    marker: v
    metadata:
      v: '50'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'il prit l''argent des premiers-nés des Israélites: 1365 pièces, d''après la valeur étalon du sanctuaire. '
  - type: usfm
    marker: v
    metadata:
      v: '51'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: Moïse donna l'argent du rachat à Aaron et à ses fils, suivant l'ordre de l'Eternel; il se conforma à l'ordre que l'Eternel lui avait donné.
