document_id: JER.6,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Péchés de Juda et annonce du jugement
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Fuyez du milieu de Jérusalem, descendants de Benjamin!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sonnez de la trompette à Tekoa,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: élevez un signal à Beth-Hakkérem,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car le malheur vous guette du nord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ce sera un grand désastre.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A qui parler et qui prendre à témoin pour qu'on m'écoute?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur oreille est vraiment incirconcise,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont incapables d'être attentifs.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La parole de l'Eternel est vraiment pour eux synonyme de honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils n'y trouvent aucun plaisir.»
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Je suis rempli de la colère de l'Eternel, je n'arrive plus à la contenir.»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Déverse-la sur l'enfant dans la rue
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sur les assemblées où se retrouvent les jeunes gens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l'homme et la femme seront pris,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi que l'ancien et celui qui arrive à la fin de son parcours.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leurs maisons passeront à d'autres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les champs et les femmes aussi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand je déploierai ma puissance contre les habitants du pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare l'Eternel.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, du plus petit d'entre eux jusqu'au plus grand,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous sont assoiffés de profit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Depuis le prophète jusqu'au prêtre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous pratiquent le mensonge.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ils remédient superficiellement au désastre de mon peuple:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Tout va bien! Tout va bien!’ disent-ils,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais rien ne va.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Ils devraient être couverts de honte parce qu'ils ont commis des horreurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais ils ne rougissent même pas, ils ne connaissent même pas la honte.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est pourquoi ils tomberont avec ceux qui tombent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils trébucheront lorsque j'interviendrai contre eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dit l'Eternel.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»Voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Placez-vous sur les chemins, regardez
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et renseignez-vous sur les pistes qui ont toujours été suivies.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quelle est la bonne voie? Marchez-y
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et *vous trouverez le repos pour votre âme
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Vous… âme: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: même propos dans la bouche de Jésus en Matthieu 11.29.
      marker-yv: yv-n
    - type: text
      text: '!»'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais ils répondent: «Nous n''y marcherons pas.»'
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '«J''ai désigné des personnes chargées de veiller sur vous:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Faites attention au son de la trompette!’»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais ils répondent: «Nous n''écouterons pas.»'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «C'est pourquoi écoutez, nations!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sache ce qui est en elle, assemblée des peuples!
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoute, terre! Retiens bien que je fais venir le malheur sur ce peuple.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sera le fruit de ses pensées,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car ils n'ont pas fait attention à mes paroles
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils ont méprisé ma loi.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La belle et délicate fille de Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je la réduis au silence!
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je n'ai pas besoin de l'encens qui vient de Séba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du roseau aromatique d'un pays lointain.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vos holocaustes ne me plaisent pas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vos sacrifices ne me sont pas agréables.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»C''est pourquoi, voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais mettre des obstacles devant ce peuple;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: père et fils, voisin et ami trébucheront ensemble contre eux, et ce sera leur perte.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»Voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un peuple vient du pays du nord,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une grande nation se met en mouvement depuis les extrémités de la terre.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils empoignent l'arc et le javelot,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont cruels et ne montrent aucune compassion.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Leur voix gronde comme la mer.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils sont montés sur des chevaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: prêts à combattre comme un seul homme
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre toi, fille de Sion!»
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «En apprenant la nouvelle,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nous baissons les bras.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'angoisse s'empare de nous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pareille à la douleur d'une femme qui accouche.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne sortez pas dans les champs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: n'allez pas sur les chemins,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car là se trouve l'épée de l'ennemi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la terreur règne de tous côtés.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Fille de mon peuple, habille-toi d'un sac et roule-toi dans la cendre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: prends le deuil comme pour un fils unique,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: verse des larmes, des larmes pleines d'amertume,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c'est de façon soudaine que le dévastateur viendra sur nous.»
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Je t'ai désigné pour surveiller mon peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que tu lui résistes comme une forteresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que tu connaisses et examines leur conduite.»
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ce sont tous des rebelles invétérés; ils marchent dans la médisance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont durs comme le bronze et le fer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont tous corrompus.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le soufflet est brûlant;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mis au feu, le plomb disparaît.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais c''est pour rien que le fondeur travaille:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les mauvais éléments ne se détachent pas.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Vers elle s'avancent des bergers et leurs troupeaux;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils dressent leurs tentes contre elle de tous côtés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'chacun donne en pâture ce qu''il a à portée de main:'
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On les appelle ‘argent méprisable’,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car l'Eternel les méprise.»
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Préparez-vous à l'attaquer!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Levez-vous! Montons à l'assaut au milieu du jour!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malheureusement pour nous, le jour baisse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les ombres du soir s'allongent.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Levez-vous! Montons à l'assaut pendant la nuit
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et détruisons ses palais!’
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»En effet, voici ce que dit l''Eternel, le maître de l''univers:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Abattez les arbres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: élevez des remblais contre Jérusalem!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est la ville contre laquelle il faut intervenir;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n'y a que tyrannie au milieu d'elle.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle offre sa méchanceté
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme un puits offre son eau.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce qu'on entend d'elle ne fait état que de violence et de persécution,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je vois sans cesse de la souffrance et des blessures.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Remets-toi en question, Jérusalem!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sinon je m'éloignerai de toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je ferai de toi un désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un pays inhabité!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici ce que dit l''Eternel, le maître de l''univers:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme dans une vigne, on fera un grappillage soigneux des restes d'Israël.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Comme le vendangeur, repasse ta main sur les sarments!
