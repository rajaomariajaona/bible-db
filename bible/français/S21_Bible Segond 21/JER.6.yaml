document_id: JER.6,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Péchés de Juda et annonce du jugement
  - type: text
    content: »Fuyez du milieu de Jérusalem, descendants de Benjamin!
  - type: text
    content: Sonnez de la trompette à Tekoa,
  - type: text
    content: élevez un signal à Beth-Hakkérem,
  - type: text
    content: car le malheur vous guette du nord,
  - type: text
    content: et ce sera un grand désastre.
  '10':
  - type: text
    content: A qui parler et qui prendre à témoin pour qu'on m'écoute?
  - type: text
    content: Leur oreille est vraiment incirconcise,
  - type: text
    content: ils sont incapables d'être attentifs.
  - type: text
    content: La parole de l'Eternel est vraiment pour eux synonyme de honte,
  - type: text
    content: ils n'y trouvent aucun plaisir.»
  '11':
  - type: text
    content: «Je suis rempli de la colère de l'Eternel, je n'arrive plus à la contenir.»
  - type: text
    content: «Déverse-la sur l'enfant dans la rue
  - type: text
    content: et sur les assemblées où se retrouvent les jeunes gens,
  - type: text
    content: car l'homme et la femme seront pris,
  - type: text
    content: ainsi que l'ancien et celui qui arrive à la fin de son parcours.
  '12':
  - type: text
    content: Leurs maisons passeront à d'autres,
  - type: text
    content: les champs et les femmes aussi,
  - type: text
    content: quand je déploierai ma puissance contre les habitants du pays,
  - type: text
    content: déclare l'Eternel.
  '13':
  - type: text
    content: En effet, du plus petit d'entre eux jusqu'au plus grand,
  - type: text
    content: tous sont assoiffés de profit.
  - type: text
    content: Depuis le prophète jusqu'au prêtre,
  - type: text
    content: tous pratiquent le mensonge.
  '14':
  - type: text
    content: 'Ils remédient superficiellement au désastre de mon peuple:'
  - type: text
    content: ‘Tout va bien! Tout va bien!’ disent-ils,
  - type: text
    content: mais rien ne va.
  '15':
  - type: text
    content: »Ils devraient être couverts de honte parce qu'ils ont commis des horreurs,
  - type: text
    content: mais ils ne rougissent même pas, ils ne connaissent même pas la honte.
  - type: text
    content: C'est pourquoi ils tomberont avec ceux qui tombent,
  - type: text
    content: ils trébucheront lorsque j'interviendrai contre eux,
  - type: text
    content: dit l'Eternel.
  '16':
  - type: text
    content: '»Voici ce que dit l''Eternel:'
  - type: text
    content: Placez-vous sur les chemins, regardez
  - type: text
    content: et renseignez-vous sur les pistes qui ont toujours été suivies.
  - type: text
    content: Quelle est la bonne voie? Marchez-y
  - type: text
    content: et *vous trouverez le repos pour votre âme
  - type: note
    content: 'Vous… âme: même propos dans la bouche de Jésus en Matthieu 11.29.'
  - type: text
    content: '!»'
  - type: text
    content: 'Mais ils répondent: «Nous n''y marcherons pas.»'
  '17':
  - type: text
    content: '«J''ai désigné des personnes chargées de veiller sur vous:'
  - type: text
    content: ‘Faites attention au son de la trompette!’»
  - type: text
    content: 'Mais ils répondent: «Nous n''écouterons pas.»'
  '18':
  - type: text
    content: «C'est pourquoi écoutez, nations!
  - type: text
    content: Sache ce qui est en elle, assemblée des peuples!
  '19':
  - type: text
    content: Ecoute, terre! Retiens bien que je fais venir le malheur sur ce peuple.
  - type: text
    content: Ce sera le fruit de ses pensées,
  - type: text
    content: car ils n'ont pas fait attention à mes paroles
  - type: text
    content: et ils ont méprisé ma loi.
  '2':
  - type: text
    content: La belle et délicate fille de Sion,
  - type: text
    content: je la réduis au silence!
  '20':
  - type: text
    content: Je n'ai pas besoin de l'encens qui vient de Séba,
  - type: text
    content: du roseau aromatique d'un pays lointain.
  - type: text
    content: Vos holocaustes ne me plaisent pas
  - type: text
    content: et vos sacrifices ne me sont pas agréables.
  '21':
  - type: text
    content: '»C''est pourquoi, voici ce que dit l''Eternel:'
  - type: text
    content: Je vais mettre des obstacles devant ce peuple;
  - type: text
    content: père et fils, voisin et ami trébucheront ensemble contre eux, et ce sera leur perte.
  '22':
  - type: text
    content: '»Voici ce que dit l''Eternel:'
  - type: text
    content: Un peuple vient du pays du nord,
  - type: text
    content: une grande nation se met en mouvement depuis les extrémités de la terre.
  '23':
  - type: text
    content: Ils empoignent l'arc et le javelot,
  - type: text
    content: ils sont cruels et ne montrent aucune compassion.
  - type: text
    content: Leur voix gronde comme la mer.
  - type: text
    content: Ils sont montés sur des chevaux,
  - type: text
    content: prêts à combattre comme un seul homme
  - type: text
    content: contre toi, fille de Sion!»
  '24':
  - type: text
    content: «En apprenant la nouvelle,
  - type: text
    content: nous baissons les bras.
  - type: text
    content: L'angoisse s'empare de nous,
  - type: text
    content: pareille à la douleur d'une femme qui accouche.
  '25':
  - type: text
    content: Ne sortez pas dans les champs,
  - type: text
    content: n'allez pas sur les chemins,
  - type: text
    content: car là se trouve l'épée de l'ennemi
  - type: text
    content: et la terreur règne de tous côtés.
  '26':
  - type: text
    content: Fille de mon peuple, habille-toi d'un sac et roule-toi dans la cendre,
  - type: text
    content: prends le deuil comme pour un fils unique,
  - type: text
    content: verse des larmes, des larmes pleines d'amertume,
  - type: text
    content: car c'est de façon soudaine que le dévastateur viendra sur nous.»
  '27':
  - type: text
    content: «Je t'ai désigné pour surveiller mon peuple,
  - type: text
    content: pour que tu lui résistes comme une forteresse,
  - type: text
    content: pour que tu connaisses et examines leur conduite.»
  '28':
  - type: text
    content: «Ce sont tous des rebelles invétérés; ils marchent dans la médisance,
  - type: text
    content: ils sont durs comme le bronze et le fer,
  - type: text
    content: ils sont tous corrompus.
  '29':
  - type: text
    content: Le soufflet est brûlant;
  - type: text
    content: mis au feu, le plomb disparaît.
  - type: text
    content: 'Mais c''est pour rien que le fondeur travaille:'
  - type: text
    content: les mauvais éléments ne se détachent pas.
  '3':
  - type: text
    content: Vers elle s'avancent des bergers et leurs troupeaux;
  - type: text
    content: ils dressent leurs tentes contre elle de tous côtés,
  - type: text
    content: 'chacun donne en pâture ce qu''il a à portée de main:'
  '30':
  - type: text
    content: On les appelle ‘argent méprisable’,
  - type: text
    content: car l'Eternel les méprise.»
  '4':
  - type: text
    content: ‘Préparez-vous à l'attaquer!
  - type: text
    content: Levez-vous! Montons à l'assaut au milieu du jour!
  - type: text
    content: Malheureusement pour nous, le jour baisse,
  - type: text
    content: les ombres du soir s'allongent.
  '5':
  - type: text
    content: Levez-vous! Montons à l'assaut pendant la nuit
  - type: text
    content: et détruisons ses palais!’
  '6':
  - type: text
    content: '»En effet, voici ce que dit l''Eternel, le maître de l''univers:'
  - type: text
    content: Abattez les arbres,
  - type: text
    content: élevez des remblais contre Jérusalem!
  - type: text
    content: C'est la ville contre laquelle il faut intervenir;
  - type: text
    content: il n'y a que tyrannie au milieu d'elle.
  '7':
  - type: text
    content: Elle offre sa méchanceté
  - type: text
    content: comme un puits offre son eau.
  - type: text
    content: Ce qu'on entend d'elle ne fait état que de violence et de persécution,
  - type: text
    content: je vois sans cesse de la souffrance et des blessures.
  '8':
  - type: text
    content: »Remets-toi en question, Jérusalem!
  - type: text
    content: Sinon je m'éloignerai de toi,
  - type: text
    content: je ferai de toi un désert,
  - type: text
    content: un pays inhabité!
  '9':
  - type: text
    content: 'Voici ce que dit l''Eternel, le maître de l''univers:'
  - type: text
    content: Comme dans une vigne, on fera un grappillage soigneux des restes d'Israël.
  - type: text
    content: Comme le vendangeur, repasse ta main sur les sarments!
