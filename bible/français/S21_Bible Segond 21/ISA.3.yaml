document_id: ISA.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jugement des habitants de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Le Seigneur, l'Eternel, le maître de l'univers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: va retirer de Jérusalem et de Juda
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout appui et toute ressource,
- type: usfm
  marker: q1
  children:
  - type: text
    text: toute ressource de pain et toute ressource d'eau,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: le héros et l'homme de guerre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le juge et le prophète, le devin et l'ancien,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: le chef de cinquantaine et le magistrat,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le conseiller, l'habile artisan et l'expert en magie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je leur donnerai des garçons pour chefs
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des gamins capricieux domineront sur eux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L''oppression sera réciproque parmi le peuple:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: chacun opprimera son prochain;
- type: usfm
  marker: q1
  children:
  - type: text
    text: le jeune garçon maltraitera le vieillard,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le vaurien celui qui jouit des honneurs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Un homme ira jusqu''à s''emparer de son frère dans la maison paternelle:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Tu as un habit, tu seras donc notre chef!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Prends en main ces décombres!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le jour même il répondra: «Je ne suis pas médecin'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il n'y a ni pain ni habit dans ma maison.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ne me désignez pas comme chef du peuple!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Oui, Jérusalem trébuche
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Juda s'écroule,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que leurs paroles et leur manière d'agir sont dirigées contre l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: défiant ses glorieux regards.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: L'expression de leur visage témoigne contre eux
- type: usfm
  marker: q1
  children:
  - type: text
    text: et, comme l'a fait Sodome, ils dévoilent leur péché sans rien en cacher.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Malheur à eux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ils préparent eux-mêmes leur perte!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Dites au sujet du juste: «Cela ira bien»,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il jouira du fruit de son activité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Malheur au méchant! Il connaîtra le malheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il récoltera le salaire de ses actes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Mon peuple a pour oppresseurs des enfants
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des femmes dominent sur lui.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon peuple, ceux qui te conduisent t'égarent
- type: usfm
  marker: q1
  children:
  - type: text
    text: et détruisent la voie dans laquelle tu marches.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: L'Eternel se présente pour plaider,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il est debout pour juger les peuples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: L'Eternel entre en jugement
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'avec les anciens de son peuple et avec ses chefs:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Vous avez dévasté la vigne!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les biens volés au pauvre sont dans vos maisons!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: De quel droit piétinez-vous mon peuple
- type: usfm
  marker: q1
  children:
  - type: text
    text: et écrasez-vous la dignité des pauvres?»
- type: usfm
  marker: q1
  children:
  - type: text
    text: déclare le Seigneur, l'Eternel, le maître de l'univers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'L''Eternel dit: Les filles de Sion sont orgueilleuses'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et marchent le cou tendu
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le regard effronté,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elles vont à petits pas
- type: usfm
  marker: q1
  children:
  - type: text
    text: et font résonner les boucles qui ornent leurs pieds.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: A cause de cela, le Seigneur rendra chauve le sommet de leur tête,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'Eternel dégarnira leur front.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ce jour-là, le Seigneur enlèvera les boucles qui servent d'ornement à leurs pieds,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ainsi que les filets et les croissants,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: les boucles d'oreilles, les bracelets et les voiles,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: les diadèmes, les chaînettes des pieds et les ceintures,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les boîtes à parfums et les amulettes,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: les bagues et les anneaux du nez,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: les habits précieux et les larges robes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les manteaux et les sacs à main,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: les tissus fins et les chemises fines,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les turbans et les châles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Au lieu de parfum, il y aura de la pourriture;
- type: usfm
  marker: q1
  children:
  - type: text
    text: au lieu de ceinture, une corde;
- type: usfm
  marker: q1
  children:
  - type: text
    text: au lieu de cheveux bouclés, une tête chauve;
- type: usfm
  marker: q1
  children:
  - type: text
    text: au lieu d'un large manteau, un sac étroit;
- type: usfm
  marker: q1
  children:
  - type: text
    text: une marque faite au fer rouge au lieu de la beauté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Tes hommes tomberont sous l'épée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tes héros tomberont au cours du combat.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Les portes de Sion gémiront et seront dans le deuil.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dépouillée, elle s'assiéra par terre.
