document_id: ISA.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Jugement des habitants de Jérusalem
  - type: text
    content: Le Seigneur, l'Eternel, le maître de l'univers,
  - type: text
    content: va retirer de Jérusalem et de Juda
  - type: text
    content: tout appui et toute ressource,
  - type: text
    content: toute ressource de pain et toute ressource d'eau,
  '10':
  - type: text
    content: 'Dites au sujet du juste: «Cela ira bien»,'
  - type: text
    content: car il jouira du fruit de son activité.
  '11':
  - type: text
    content: Malheur au méchant! Il connaîtra le malheur,
  - type: text
    content: car il récoltera le salaire de ses actes.
  '12':
  - type: text
    content: Mon peuple a pour oppresseurs des enfants
  - type: text
    content: et des femmes dominent sur lui.
  - type: text
    content: Mon peuple, ceux qui te conduisent t'égarent
  - type: text
    content: et détruisent la voie dans laquelle tu marches.
  '13':
  - type: text
    content: L'Eternel se présente pour plaider,
  - type: text
    content: il est debout pour juger les peuples.
  '14':
  - type: text
    content: L'Eternel entre en jugement
  - type: text
    content: 'avec les anciens de son peuple et avec ses chefs:'
  - type: text
    content: «Vous avez dévasté la vigne!
  - type: text
    content: Les biens volés au pauvre sont dans vos maisons!
  '15':
  - type: text
    content: De quel droit piétinez-vous mon peuple
  - type: text
    content: et écrasez-vous la dignité des pauvres?»
  - type: text
    content: déclare le Seigneur, l'Eternel, le maître de l'univers.
  '16':
  - type: text
    content: 'L''Eternel dit: Les filles de Sion sont orgueilleuses'
  - type: text
    content: et marchent le cou tendu
  - type: text
    content: et le regard effronté,
  - type: text
    content: elles vont à petits pas
  - type: text
    content: et font résonner les boucles qui ornent leurs pieds.
  '17':
  - type: text
    content: A cause de cela, le Seigneur rendra chauve le sommet de leur tête,
  - type: text
    content: l'Eternel dégarnira leur front.
  '18':
  - type: text
    content: Ce jour-là, le Seigneur enlèvera les boucles qui servent d'ornement à leurs pieds,
  - type: text
    content: ainsi que les filets et les croissants,
  '19':
  - type: text
    content: les boucles d'oreilles, les bracelets et les voiles,
  '2':
  - type: text
    content: le héros et l'homme de guerre,
  - type: text
    content: le juge et le prophète, le devin et l'ancien,
  '20':
  - type: text
    content: les diadèmes, les chaînettes des pieds et les ceintures,
  - type: text
    content: les boîtes à parfums et les amulettes,
  '21':
  - type: text
    content: les bagues et les anneaux du nez,
  '22':
  - type: text
    content: les habits précieux et les larges robes,
  - type: text
    content: les manteaux et les sacs à main,
  '23':
  - type: text
    content: les tissus fins et les chemises fines,
  - type: text
    content: les turbans et les châles.
  '24':
  - type: text
    content: Au lieu de parfum, il y aura de la pourriture;
  - type: text
    content: au lieu de ceinture, une corde;
  - type: text
    content: au lieu de cheveux bouclés, une tête chauve;
  - type: text
    content: au lieu d'un large manteau, un sac étroit;
  - type: text
    content: une marque faite au fer rouge au lieu de la beauté.
  '25':
  - type: text
    content: Tes hommes tomberont sous l'épée,
  - type: text
    content: tes héros tomberont au cours du combat.
  '26':
  - type: text
    content: Les portes de Sion gémiront et seront dans le deuil.
  - type: text
    content: Dépouillée, elle s'assiéra par terre.
  '3':
  - type: text
    content: le chef de cinquantaine et le magistrat,
  - type: text
    content: le conseiller, l'habile artisan et l'expert en magie.
  '4':
  - type: text
    content: Je leur donnerai des garçons pour chefs
  - type: text
    content: et des gamins capricieux domineront sur eux.
  '5':
  - type: text
    content: 'L''oppression sera réciproque parmi le peuple:'
  - type: text
    content: chacun opprimera son prochain;
  - type: text
    content: le jeune garçon maltraitera le vieillard,
  - type: text
    content: et le vaurien celui qui jouit des honneurs.
  '6':
  - type: text
    content: 'Un homme ira jusqu''à s''emparer de son frère dans la maison paternelle:'
  - type: text
    content: «Tu as un habit, tu seras donc notre chef!
  - type: text
    content: Prends en main ces décombres!»
  '7':
  - type: text
    content: 'Le jour même il répondra: «Je ne suis pas médecin'
  - type: text
    content: et il n'y a ni pain ni habit dans ma maison.
  - type: text
    content: Ne me désignez pas comme chef du peuple!»
  '8':
  - type: text
    content: Oui, Jérusalem trébuche
  - type: text
    content: et Juda s'écroule,
  - type: text
    content: parce que leurs paroles et leur manière d'agir sont dirigées contre l'Eternel,
  - type: text
    content: défiant ses glorieux regards.
  '9':
  - type: text
    content: L'expression de leur visage témoigne contre eux
  - type: text
    content: et, comme l'a fait Sodome, ils dévoilent leur péché sans rien en cacher.
  - type: text
    content: Malheur à eux,
  - type: text
    content: car ils préparent eux-mêmes leur perte!
