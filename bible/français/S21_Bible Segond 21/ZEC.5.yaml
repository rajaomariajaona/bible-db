document_id: ZEC.5
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vision d'un rouleau volant
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'J''ai de nouveau levé les yeux et j''ai vu un rouleau de manuscrits voler. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il m''a dit: «Que vois-tu?» J''ai répondu: «Je vois un rouleau qui vole. Il a 10 mètres de long et 5 de large.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il m''a dit: «C''est la malédiction qui se propage sur tout le pays; d''après une face tout voleur sera chassé d''ici, et d''après l''autre tout parjure sera chassé d''ici. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Je la propage, déclare l'Eternel, le maître de l'univers, afin qu'elle entre dans la maison du voleur et de celui qui jure faussement en mon nom, afin qu'elle s'y installe et la détruise avec sa charpente et ses pierres.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Vision d'une femme
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L''ange qui me parlait s''est avancé et m''a dit: «Lève les yeux et regarde ce qui sort là!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'J''ai répondu: «Qu''est-ce que c''est?» Il m''a répondu: «C''est la mesure à grains qui sort.» Il a ajouté: «C''est l''objet de leurs regards dans tout le pays.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Un disque en plomb a été soulevé et il y avait une femme assise au milieu de cette mesure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L''ange a dit: «C''est la méchanceté.» Il l''a repoussée dans la mesure et a jeté le disque en plomb sur l''ouverture.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'J''ai levé les yeux et vu deux femmes apparaître. Le vent soufflait dans leurs ailes – elles avaient des ailes comme celles de la cigogne – et elles ont soulevé la mesure entre la terre et le ciel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'J''ai dit à l''ange qui me parlait: «Où emportent-elles la mesure à grains?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il m''a répondu: «Elles vont lui construire une maison dans le pays de Shinear'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Shinear: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire Babylone.
    marker-yv: yv-n
  - type: text
    text: . Quand elle sera prête, elle sera déposée là sur sa base.»
