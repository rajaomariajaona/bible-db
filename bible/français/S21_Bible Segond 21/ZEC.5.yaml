document_id: ZEC.5,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Vision d'un rouleau volant
  - type: text
    content: 'J''ai de nouveau levé les yeux et j''ai vu un rouleau de manuscrits voler. '
  '10':
  - type: text
    content: 'J''ai dit à l''ange qui me parlait: «Où emportent-elles la mesure à grains?» '
  '11':
  - type: text
    content: 'Il m''a répondu: «Elles vont lui construire une maison dans le pays de Shinear'
  - type: note
    content: 'Shinear: c''est-à-dire Babylone.'
  - type: text
    content: . Quand elle sera prête, elle sera déposée là sur sa base.»
  '2':
  - type: text
    content: 'Il m''a dit: «Que vois-tu?» J''ai répondu: «Je vois un rouleau qui vole. Il a 10 mètres de long et 5 de large.» '
  '3':
  - type: text
    content: 'Il m''a dit: «C''est la malédiction qui se propage sur tout le pays; d''après une face tout voleur sera chassé d''ici, et d''après l''autre tout parjure sera chassé d''ici. '
  '4':
  - type: text
    content: Je la propage, déclare l'Eternel, le maître de l'univers, afin qu'elle entre dans la maison du voleur et de celui qui jure faussement en mon nom, afin qu'elle s'y installe et la détruise avec sa charpente et ses pierres.»
  - type: heading
    content: Vision d'une femme
  '5':
  - type: text
    content: 'L''ange qui me parlait s''est avancé et m''a dit: «Lève les yeux et regarde ce qui sort là!» '
  '6':
  - type: text
    content: 'J''ai répondu: «Qu''est-ce que c''est?» Il m''a répondu: «C''est la mesure à grains qui sort.» Il a ajouté: «C''est l''objet de leurs regards dans tout le pays.» '
  '7':
  - type: text
    content: 'Un disque en plomb a été soulevé et il y avait une femme assise au milieu de cette mesure. '
  '8':
  - type: text
    content: 'L''ange a dit: «C''est la méchanceté.» Il l''a repoussée dans la mesure et a jeté le disque en plomb sur l''ouverture.'
  '9':
  - type: text
    content: 'J''ai levé les yeux et vu deux femmes apparaître. Le vent soufflait dans leurs ailes – elles avaient des ailes comme celles de la cigogne – et elles ont soulevé la mesure entre la terre et le ciel. '
