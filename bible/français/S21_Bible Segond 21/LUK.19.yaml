document_id: LUK.19,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Jésus était entré dans Jéricho et traversait la ville. '
  '10':
  - type: text
    content: En effet, le Fils de l'homme est venu chercher et sauver ce qui était perdu.»
  - type: heading
    content: Parabole des serviteurs et des récompenses
  '11':
  - type: text
    content: 'Comme la foule écoutait cela, Jésus ajouta une parabole. En effet, il était près de Jérusalem et l''on croyait que le royaume de Dieu allait apparaître immédiatement. '
  '12':
  - type: text
    content: 'Il dit donc: «Un homme de haute naissance partait dans un pays lointain pour se faire désigner roi et revenir ensuite. '
  '13':
  - type: text
    content: 'Il appela dix de ses serviteurs, leur remit 10 pièces d''or et leur dit: ‘Faites-les fructifier jusqu''à ce que je revienne.’ '
  '14':
  - type: text
    content: 'Cependant, ses concitoyens le détestaient et ils envoyèrent une délégation après lui pour dire: ‘Nous ne voulons pas que cet homme règne sur nous.’ '
  '15':
  - type: text
    content: 'Lorsqu''il fut de retour après avoir été désigné roi, il fit venir les serviteurs auxquels il avait donné l''argent afin de savoir quels bénéfices chacun avait faits. '
  '16':
  - type: text
    content: 'Le premier se présenta et dit: ‘Seigneur, ta pièce d''or en a rapporté 10.’ '
  '17':
  - type: text
    content: 'Il lui dit: ‘C''est bien, bon serviteur. Parce que tu as été fidèle dans une petite chose, reçois le gouvernement de 10 villes.’ '
  '18':
  - type: text
    content: 'Le deuxième vint et dit: ‘Seigneur, ta pièce d''or en a produit 5.’ '
  '19':
  - type: text
    content: 'Il lui dit: ‘Toi aussi, sois établi responsable de 5 villes.’ '
  '2':
  - type: text
    content: 'Or, un homme riche appelé Zachée, chef des collecteurs d''impôts, '
  '20':
  - type: text
    content: 'Un autre vint et dit: ‘Seigneur, voici ta pièce d''or que j''ai gardée dans un linge. '
  '21':
  - type: text
    content: 'En effet, j''avais peur de toi parce que tu es un homme sévère; tu prends ce que tu n''as pas déposé et tu moissonnes ce que tu n''as pas semé.’ '
  '22':
  - type: text
    content: 'Il lui dit: ‘Je vais te juger sur tes propres paroles, mauvais serviteur; tu savais que je suis un homme sévère, que je prends ce que je n''ai pas déposé et que je moissonne ce que je n''ai pas semé. '
  '23':
  - type: text
    content: 'Pourquoi donc n''as-tu pas mis mon argent dans une banque, afin qu''à mon retour je le retire avec un intérêt?’ '
  '24':
  - type: text
    content: 'Puis il dit à ceux qui étaient là: ‘Enlevez-lui la pièce d''or et donnez-la à celui qui en a 10.’ '
  '25':
  - type: text
    content: 'Ils lui dirent: ‘Seigneur, il a déjà 10 pièces d''or.’ '
  '26':
  - type: text
    content: '‘Je vous le dis, répondit-il, on donnera à toute personne qui a, mais à celui qui n''a pas on enlèvera même ce qu''il a. '
  '27':
  - type: text
    content: Quant à mes ennemis qui n'ont pas voulu que je règne sur eux, amenez-les ici et mettez-les à mort devant moi.’»
  - type: heading
    content: Entrée triomphale de Jésus à Jérusalem
  '28':
  - type: text
    content: 'Après avoir dit cela, Jésus marcha devant la foule pour monter à Jérusalem. '
  '29':
  - type: text
    content: 'Lorsqu''il approcha de Bethphagé et de Béthanie, vers la colline appelée mont des Oliviers, Jésus envoya deux de ses disciples '
  '3':
  - type: text
    content: 'cherchait à voir qui était Jésus, mais il n''y parvenait pas à cause de la foule, car il était de petite taille. '
  '30':
  - type: text
    content: 'en leur disant: «Allez au village qui est en face. Quand vous y serez entrés, vous trouverez un ânon attaché sur lequel personne n''est encore jamais monté. Détachez-le et amenez-le. '
  '31':
  - type: text
    content: 'Si quelqu''un vous demande: ‘Pourquoi le détachez-vous?’ vous [lui] répondrez: ‘Le Seigneur en a besoin.’»'
  '32':
  - type: text
    content: 'Ceux qui étaient envoyés partirent et trouvèrent tout comme Jésus le leur avait dit. '
  '33':
  - type: text
    content: 'Comme ils détachaient l''ânon, ses maîtres leur dirent: «Pourquoi détachez-vous l''ânon?» '
  '34':
  - type: text
    content: 'Ils répondirent: «Le Seigneur en a besoin» '
  '35':
  - type: text
    content: 'et ils amenèrent l''ânon à Jésus. Après avoir jeté leurs manteaux sur son dos, ils firent monter Jésus. '
  '36':
  - type: text
    content: 'A mesure qu''il avançait, les gens étendaient leurs vêtements sur le chemin. '
  '37':
  - type: text
    content: 'Déjà il approchait de Jérusalem, vers la descente du mont des Oliviers. Alors toute la foule des disciples, remplis de joie, se mirent à adresser à haute voix des louanges à Dieu pour tous les miracles qu''ils avaient vus. '
  '38':
  - type: text
    content: 'Ils disaient: «'
  - type: text
    content: Béni soit le roi qui vient au nom du Seigneur!
  - type: note
    content: 'Béni… Seigneur: citation du Psaume 118.26.'
  - type: text
    content: ' Paix dans le ciel et gloire dans les lieux très hauts!» '
  '39':
  - type: text
    content: 'Du milieu de la foule, quelques pharisiens dirent à Jésus: «Maître, reprends tes disciples.» '
  '4':
  - type: text
    content: 'Il courut en avant et monta sur un sycomore pour voir Jésus, parce qu''il devait passer par là. '
  '40':
  - type: text
    content: 'Il répondit: «Je vous le dis, si eux se taisent, les pierres crieront!»'
  '41':
  - type: text
    content: 'Quand il approcha de la ville et qu''il la vit, Jésus pleura sur elle et dit: '
  '42':
  - type: text
    content: '«Si seulement tu avais toi aussi reconnu, aujourd''hui, ce qui peut te donner la paix! Mais maintenant, cela est caché à tes yeux. '
  '43':
  - type: text
    content: 'Des jours viendront pour toi où tes ennemis t''entoureront d''ouvrages fortifiés, t''encercleront et te serreront de tous côtés. '
  '44':
  - type: text
    content: Ils te détruiront, toi et tes enfants au milieu de toi, et ils ne laisseront pas en toi pierre sur pierre, parce que tu n'as pas reconnu le moment où tu as été visitée.»
  - type: heading
    content: Jésus dans le temple
  '45':
  - type: text
    content: 'Jésus entra dans le temple et se mit à en chasser les marchands. '
  '46':
  - type: text
    content: 'Il leur dit: «Il est écrit: '
  - type: text
    content: Mon temple sera une maison de prière
  - type: note
    content: 'Mon temple… prière: citation d''Esaïe 56.7.'
  - type: text
    content: ', mais vous, vous en avez fait '
  - type: text
    content: une caverne de voleurs
  - type: note
    content: 'Une caverne de voleurs: expression tirée de Jérémie 7.11.'
  - type: text
    content: .»
  '47':
  - type: text
    content: 'Il enseignait tous les jours dans le temple. Les chefs des prêtres, les spécialistes de la loi et les chefs du peuple cherchaient à le faire mourir; '
  '48':
  - type: text
    content: mais ils ne savaient pas comment s'y prendre, car tout le peuple l'écoutait, suspendu à ses lèvres.
  '5':
  - type: text
    content: 'Lorsque Jésus fut arrivé à cet endroit, il leva les yeux, [le vit] et lui dit: «Zachée, dépêche-toi de descendre, car il faut que je m''arrête aujourd''hui chez toi.» '
  '6':
  - type: text
    content: 'Zachée s''empressa de descendre et l''accueillit avec joie. '
  '7':
  - type: text
    content: 'En voyant cela, tous murmuraient en disant: «Il est allé loger chez un homme pécheur.» '
  '8':
  - type: text
    content: 'Mais Zachée, se tenant devant le Seigneur, lui dit: «Seigneur, je donne aux pauvres la moitié de mes biens et, si j''ai causé du tort à quelqu''un, je lui rends le quadruple.» '
  '9':
  - type: text
    content: 'Alors Jésus dit à son propos: «Le salut est entré aujourd''hui dans cette maison, parce que lui aussi est un fils d''Abraham. '
