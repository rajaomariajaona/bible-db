document_id: LUK.19,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jésus était entré dans Jéricho et traversait la ville. '
  '10':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: En effet, le Fils de l'homme est venu chercher et sauver ce qui était perdu.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Parabole des serviteurs et des récompenses
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Comme la foule écoutait cela, Jésus ajouta une parabole. En effet, il était près de Jérusalem et l''on croyait que le royaume de Dieu allait apparaître immédiatement. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Il dit donc: «Un homme de haute naissance partait dans un pays lointain pour se faire désigner roi et revenir ensuite. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Il appela dix de ses serviteurs, leur remit 10 pièces d''or et leur dit: ‘Faites-les fructifier jusqu''à ce que je revienne.’ '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Cependant, ses concitoyens le détestaient et ils envoyèrent une délégation après lui pour dire: ‘Nous ne voulons pas que cet homme règne sur nous.’ '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Lorsqu''il fut de retour après avoir été désigné roi, il fit venir les serviteurs auxquels il avait donné l''argent afin de savoir quels bénéfices chacun avait faits. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Le premier se présenta et dit: ‘Seigneur, ta pièce d''or en a rapporté 10.’ '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Il lui dit: ‘C''est bien, bon serviteur. Parce que tu as été fidèle dans une petite chose, reçois le gouvernement de 10 villes.’ '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Le deuxième vint et dit: ‘Seigneur, ta pièce d''or en a produit 5.’ '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Il lui dit: ‘Toi aussi, sois établi responsable de 5 villes.’ '
  '2':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Or, un homme riche appelé Zachée, chef des collecteurs d''impôts, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Un autre vint et dit: ‘Seigneur, voici ta pièce d''or que j''ai gardée dans un linge. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'En effet, j''avais peur de toi parce que tu es un homme sévère; tu prends ce que tu n''as pas déposé et tu moissonnes ce que tu n''as pas semé.’ '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Il lui dit: ‘Je vais te juger sur tes propres paroles, mauvais serviteur; tu savais que je suis un homme sévère, que je prends ce que je n''ai pas déposé et que je moissonne ce que je n''ai pas semé. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Pourquoi donc n''as-tu pas mis mon argent dans une banque, afin qu''à mon retour je le retire avec un intérêt?’ '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Puis il dit à ceux qui étaient là: ‘Enlevez-lui la pièce d''or et donnez-la à celui qui en a 10.’ '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Ils lui dirent: ‘Seigneur, il a déjà 10 pièces d''or.’ '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: '‘Je vous le dis, répondit-il, on donnera à toute personne qui a, mais à celui qui n''a pas on enlèvera même ce qu''il a. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: Quant à mes ennemis qui n'ont pas voulu que je règne sur eux, amenez-les ici et mettez-les à mort devant moi.’»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Entrée triomphale de Jésus à Jérusalem
    marker-yv: yv-h
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Après avoir dit cela, Jésus marcha devant la foule pour monter à Jérusalem. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Lorsqu''il approcha de Bethphagé et de Béthanie, vers la colline appelée mont des Oliviers, Jésus envoya deux de ses disciples '
  '3':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'cherchait à voir qui était Jésus, mais il n''y parvenait pas à cause de la foule, car il était de petite taille. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'en leur disant: «Allez au village qui est en face. Quand vous y serez entrés, vous trouverez un ânon attaché sur lequel personne n''est encore jamais monté. Détachez-le et amenez-le. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Si quelqu''un vous demande: ‘Pourquoi le détachez-vous?’ vous [lui] répondrez: ‘Le Seigneur en a besoin.’»'
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Ceux qui étaient envoyés partirent et trouvèrent tout comme Jésus le leur avait dit. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'Comme ils détachaient l''ânon, ses maîtres leur dirent: «Pourquoi détachez-vous l''ânon?» '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: 'Ils répondirent: «Le Seigneur en a besoin» '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'et ils amenèrent l''ânon à Jésus. Après avoir jeté leurs manteaux sur son dos, ils firent monter Jésus. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'A mesure qu''il avançait, les gens étendaient leurs vêtements sur le chemin. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Déjà il approchait de Jérusalem, vers la descente du mont des Oliviers. Alors toute la foule des disciples, remplis de joie, se mirent à adresser à haute voix des louanges à Dieu pour tous les miracles qu''ils avaient vus. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Ils disaient: «'
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Béni soit le roi qui vient au nom du Seigneur!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.38 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Béni… Seigneur: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 118.26
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' Paix dans le ciel et gloire dans les lieux très hauts!» '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Du milieu de la foule, quelques pharisiens dirent à Jésus: «Maître, reprends tes disciples.» '
  '4':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il courut en avant et monta sur un sycomore pour voir Jésus, parce qu''il devait passer par là. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: text
      text: 'Il répondit: «Je vous le dis, si eux se taisent, les pierres crieront!»'
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
      text: 'Quand il approcha de la ville et qu''il la vit, Jésus pleura sur elle et dit: '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '42'
    - type: text
      text: '«Si seulement tu avais toi aussi reconnu, aujourd''hui, ce qui peut te donner la paix! Mais maintenant, cela est caché à tes yeux. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '43'
    - type: text
      text: 'Des jours viendront pour toi où tes ennemis t''entoureront d''ouvrages fortifiés, t''encercleront et te serreront de tous côtés. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '44'
    - type: text
      text: Ils te détruiront, toi et tes enfants au milieu de toi, et ils ne laisseront pas en toi pierre sur pierre, parce que tu n'as pas reconnu le moment où tu as été visitée.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus dans le temple
    marker-yv: yv-h
  '45':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '45'
    - type: text
      text: 'Jésus entra dans le temple et se mit à en chasser les marchands. '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '46'
    - type: text
      text: 'Il leur dit: «Il est écrit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Mon temple sera une maison de prière
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.46 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Mon temple… prière: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: citation d'
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 56.7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ', mais vous, vous en avez fait '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: une caverne de voleurs
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.46 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Une caverne de voleurs: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'expression tirée de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jérémie 7.11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .»
  '47':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '47'
    - type: text
      text: 'Il enseignait tous les jours dans le temple. Les chefs des prêtres, les spécialistes de la loi et les chefs du peuple cherchaient à le faire mourir; '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: mais ils ne savaient pas comment s'y prendre, car tout le peuple l'écoutait, suspendu à ses lèvres.
  '5':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Lorsque Jésus fut arrivé à cet endroit, il leva les yeux, [le vit] et lui dit: «Zachée, dépêche-toi de descendre, car il faut que je m''arrête aujourd''hui chez toi.» '
  '6':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Zachée s''empressa de descendre et l''accueillit avec joie. '
  '7':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'En voyant cela, tous murmuraient en disant: «Il est allé loger chez un homme pécheur.» '
  '8':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Mais Zachée, se tenant devant le Seigneur, lui dit: «Seigneur, je donne aux pauvres la moitié de mes biens et, si j''ai causé du tort à quelqu''un, je lui rends le quadruple.» '
  '9':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Alors Jésus dit à son propos: «Le salut est entré aujourd''hui dans cette maison, parce que lui aussi est un fils d''Abraham. '
