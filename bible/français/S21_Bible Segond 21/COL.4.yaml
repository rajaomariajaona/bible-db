document_id: COL.4
type_code: fra
segments:
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Maîtres, accordez à vos esclaves ce qui est juste et équitable, sachant que vous aussi vous avez un maître dans le ciel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dernières instructions
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Persévérez dans la prière, veillez-y dans une attitude de reconnaissance. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Priez en même temps pour nous: que Dieu nous ouvre une porte pour la parole afin que je puisse annoncer le mystère de Christ, à cause duquel je suis emprisonné, '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: et que je le fasse connaître de la façon dont je dois en parler.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Conduisez-vous avec sagesse envers les gens de l''extérieur et rachetez le temps. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Que votre parole soit toujours pleine de grâce et assaisonnée de sel, afin que vous sachiez comment il faut répondre à chacun.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Salutations
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tychique, qui est notre frère bien-aimé, un serviteur fidèle et mon compagnon de service dans le Seigneur, vous informera de tout ce qui me concerne. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je vous l''envoie exprès pour qu''il prenne de vos nouvelles et réconforte votre cœur. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Je l'envoie avec Onésime, le fidèle et bien-aimé frère qui est l'un des vôtres. Ils vous informeront de tout ce qui se passe ici.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Aristarque, mon compagnon de détention, vous salue, ainsi que Marc, le cousin de Barnabas, au sujet duquel vous avez reçu des instructions: s''il vient chez vous, faites-lui bon accueil. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Jésus, appelé Justus, vous salue aussi. Ils sont parmi les circoncis les seuls qui travaillent avec moi pour le royaume de Dieu et ils ont été un grand encouragement pour moi. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Epaphras, qui est l''un des vôtres, vous salue. Serviteur de [Jésus-]Christ, il ne cesse de combattre pour vous dans ses prières afin que vous teniez bon, comme des hommes mûrs, pleinement disposés à faire toute la volonté de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Je lui rends en effet ce témoignage: il se dépense sans compter pour vous, pour ceux de Laodicée et pour ceux de Hiérapolis. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Luc, le médecin bien-aimé, vous salue, ainsi que Démas.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Saluez les frères et sœurs qui sont à Laodicée, ainsi que Nymphas et l'Eglise qui est dans sa maison.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Lorsque cette lettre aura été lue chez vous, faites en sorte qu''elle soit aussi lue dans l''Eglise des Laodicéens. Lisez à votre tour celle qui vous arrivera de Laodicée. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dites à Archippe: «Veille sur le service que tu as reçu dans le Seigneur afin de bien l''accomplir.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Je vous salue, moi Paul, de ma propre main. Souvenez-vous de ma condition de prisonnier. Que la grâce soit avec vous!
