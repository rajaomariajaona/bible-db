document_id: MRK.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Multiplication des pains pour 4000 hommes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Ces jours-là, une foule [très] nombreuse s''était [de nouveau] réunie et n''avait pas de quoi manger. Jésus appela ses disciples et leur dit: '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '«Je suis rempli de compassion pour cette foule, car voilà trois jours qu''ils sont près de moi, et ils n''ont rien à manger. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Si je les renvoie chez eux à jeun, les forces leur manqueront en chemin, car quelques-uns d''entre eux sont venus de loin.» '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ses disciples lui répondirent: «Comment pourrait-on leur donner assez de pains à manger, ici, dans un endroit désert?» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Jésus leur demanda: «Combien avez-vous de pains?» «Sept», répondirent-ils. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Alors il fit asseoir la foule par terre, prit les sept pains et, après avoir remercié Dieu, il les rompit et les donna à ses disciples pour les distribuer; et ils les distribuèrent à la foule. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils avaient encore quelques petits poissons; Jésus [les] bénit et les fit aussi distribuer. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils mangèrent et furent rassasiés, et l''on emporta sept corbeilles pleines des morceaux qui restaient. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ceux qui mangèrent étaient environ 4000. Ensuite Jésus les renvoya.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Aussitôt il monta dans la barque avec ses disciples et se rendit dans la région de Dalmanutha. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Les pharisiens arrivèrent, se mirent à discuter avec Jésus et, pour le mettre à l''épreuve, lui demandèrent un signe venant du ciel. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jésus soupira profondément dans son esprit et dit: «Pourquoi cette génération demande-t-elle un signe? Je vous le dis en vérité, il ne sera pas donné de signe à cette génération.» '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Puis il les quitta et remonta [dans la barque] pour passer sur l'autre rive.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les disciples avaient oublié de prendre des pains; ils n''en avaient qu''un seul avec eux dans la barque. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Jésus leur fit cette recommandation: «Attention, méfiez-vous du levain des pharisiens et du levain d''Hérode.» '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Les disciples raisonnaient entre eux [et disaient]: «C''est parce que nous n''avons pas de pains.» '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jésus, le sachant, leur dit: «Pourquoi raisonnez-vous sur le fait que vous n''avez pas de pains? Ne comprenez-vous pas et ne saisissez-vous pas encore? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Avez-vous [encore] le cœur endurci? '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Vous avez des yeux et vous ne voyez pas? Vous avez des oreilles et vous n'entendez pas?
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Vous avez des yeux… n''entendez pas: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Jérémie 5.21
      metadata:
        usfm: JER.5.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' Ne vous rappelez-vous pas? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Quand j''ai rompu les cinq pains pour les 5000 hommes, combien de paniers pleins de morceaux avez-vous emportés?» «Douze», lui répondirent-ils. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '«Et quand j''ai rompu les sept [pains] pour les 4000 hommes, combien de corbeilles pleines de morceaux avez-vous emportées?» «Sept», répondirent-ils. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Et il leur dit: «[Comment] se fait-il que vous ne compreniez pas [encore]?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ils se rendirent à Bethsaïda; on amena un aveugle vers Jésus et on le supplia de le toucher. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Il prit l''aveugle par la main et le conduisit à l''extérieur du village; puis il lui mit de la salive sur les yeux, posa les mains sur lui et lui demanda s''il voyait quelque chose. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il regarda et dit: «J''aperçois les gens, je les vois comme des arbres, et ils marchent.» '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Jésus lui mit de nouveau les mains sur les yeux et, quand l''aveugle regarda fixement, il fut guéri et vit tout distinctement. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Alors Jésus le renvoya chez lui en disant: «N''entre pas dans le village [et n''en parle à personne].»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pierre reconnaît Jésus comme le Messie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Jésus s''en alla avec ses disciples dans les villages voisins de Césarée de Philippe. Il leur posa en chemin cette question: «Qui suis-je, d''après les hommes?» '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Ils répondirent: «Jean-Baptiste; d''après certains, Elie; d''après d''autres, l''un des prophètes.» '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '«Et d''après vous, qui suis-je?» leur demanda-t-il. Pierre lui répondit: «Tu es le Messie.» '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Jésus leur recommanda sévèrement de n'en parler à personne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Alors il commença à leur enseigner qu''il fallait que le Fils de l''homme souffre beaucoup, qu''il soit rejeté par les anciens, par les chefs des prêtres et par les spécialistes de la loi, qu''il soit mis à mort et qu''il ressuscite trois jours après. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il leur disait cela ouvertement. Alors Pierre le prit à part et se mit à le reprendre, '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'mais Jésus se retourna, regarda ses disciples et réprimanda Pierre en disant: «Arrière, Satan, car tes pensées ne sont pas les pensées de Dieu, mais celles des hommes.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Puis il appela la foule avec ses disciples et il leur dit: «Si quelqu''un veut être mon disciple, qu''il renonce à lui-même, qu''il se charge de sa croix et qu''il me suive! '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'En effet, celui qui voudra sauver sa vie la perdra, mais celui qui la perdra à cause de moi et de la bonne nouvelle la sauvera. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Et que servira-t-il à un homme de gagner le monde entier, s''il perd son âme? '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Que donnera un homme en échange de son âme? '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: En effet, celui qui aura honte de moi et de mes paroles au milieu de cette génération adultère et pécheresse, le Fils de l'homme aura aussi honte de lui quand il viendra dans la gloire de son Père avec les saints anges.»
