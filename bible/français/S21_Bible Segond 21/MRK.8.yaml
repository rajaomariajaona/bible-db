document_id: MRK.8,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Multiplication des pains pour 4000 hommes
  - type: text
    content: 'Ces jours-là, une foule [très] nombreuse s''était [de nouveau] réunie et n''avait pas de quoi manger. Jésus appela ses disciples et leur dit: '
  '10':
  - type: text
    content: 'Aussitôt il monta dans la barque avec ses disciples et se rendit dans la région de Dalmanutha. '
  '11':
  - type: text
    content: 'Les pharisiens arrivèrent, se mirent à discuter avec Jésus et, pour le mettre à l''épreuve, lui demandèrent un signe venant du ciel. '
  '12':
  - type: text
    content: 'Jésus soupira profondément dans son esprit et dit: «Pourquoi cette génération demande-t-elle un signe? Je vous le dis en vérité, il ne sera pas donné de signe à cette génération.» '
  '13':
  - type: text
    content: Puis il les quitta et remonta [dans la barque] pour passer sur l'autre rive.
  '14':
  - type: text
    content: 'Les disciples avaient oublié de prendre des pains; ils n''en avaient qu''un seul avec eux dans la barque. '
  '15':
  - type: text
    content: 'Jésus leur fit cette recommandation: «Attention, méfiez-vous du levain des pharisiens et du levain d''Hérode.» '
  '16':
  - type: text
    content: 'Les disciples raisonnaient entre eux [et disaient]: «C''est parce que nous n''avons pas de pains.» '
  '17':
  - type: text
    content: 'Jésus, le sachant, leur dit: «Pourquoi raisonnez-vous sur le fait que vous n''avez pas de pains? Ne comprenez-vous pas et ne saisissez-vous pas encore? '
  '18':
  - type: text
    content: 'Avez-vous [encore] le cœur endurci? '
  - type: text
    content: Vous avez des yeux et vous ne voyez pas? Vous avez des oreilles et vous n'entendez pas?
  - type: note
    content: 'Vous avez des yeux… n''entendez pas: citation de Jérémie 5.21.'
  - type: text
    content: ' Ne vous rappelez-vous pas? '
  '19':
  - type: text
    content: 'Quand j''ai rompu les cinq pains pour les 5000 hommes, combien de paniers pleins de morceaux avez-vous emportés?» «Douze», lui répondirent-ils. '
  '2':
  - type: text
    content: '«Je suis rempli de compassion pour cette foule, car voilà trois jours qu''ils sont près de moi, et ils n''ont rien à manger. '
  '20':
  - type: text
    content: '«Et quand j''ai rompu les sept [pains] pour les 4000 hommes, combien de corbeilles pleines de morceaux avez-vous emportées?» «Sept», répondirent-ils. '
  '21':
  - type: text
    content: 'Et il leur dit: «[Comment] se fait-il que vous ne compreniez pas [encore]?»'
  '22':
  - type: text
    content: 'Ils se rendirent à Bethsaïda; on amena un aveugle vers Jésus et on le supplia de le toucher. '
  '23':
  - type: text
    content: 'Il prit l''aveugle par la main et le conduisit à l''extérieur du village; puis il lui mit de la salive sur les yeux, posa les mains sur lui et lui demanda s''il voyait quelque chose. '
  '24':
  - type: text
    content: 'Il regarda et dit: «J''aperçois les gens, je les vois comme des arbres, et ils marchent.» '
  '25':
  - type: text
    content: 'Jésus lui mit de nouveau les mains sur les yeux et, quand l''aveugle regarda fixement, il fut guéri et vit tout distinctement. '
  '26':
  - type: text
    content: 'Alors Jésus le renvoya chez lui en disant: «N''entre pas dans le village [et n''en parle à personne].»'
  - type: heading
    content: Pierre reconnaît Jésus comme le Messie
  '27':
  - type: text
    content: 'Jésus s''en alla avec ses disciples dans les villages voisins de Césarée de Philippe. Il leur posa en chemin cette question: «Qui suis-je, d''après les hommes?» '
  '28':
  - type: text
    content: 'Ils répondirent: «Jean-Baptiste; d''après certains, Elie; d''après d''autres, l''un des prophètes.» '
  '29':
  - type: text
    content: '«Et d''après vous, qui suis-je?» leur demanda-t-il. Pierre lui répondit: «Tu es le Messie.» '
  '3':
  - type: text
    content: 'Si je les renvoie chez eux à jeun, les forces leur manqueront en chemin, car quelques-uns d''entre eux sont venus de loin.» '
  '30':
  - type: text
    content: Jésus leur recommanda sévèrement de n'en parler à personne.
  '31':
  - type: text
    content: 'Alors il commença à leur enseigner qu''il fallait que le Fils de l''homme souffre beaucoup, qu''il soit rejeté par les anciens, par les chefs des prêtres et par les spécialistes de la loi, qu''il soit mis à mort et qu''il ressuscite trois jours après. '
  '32':
  - type: text
    content: 'Il leur disait cela ouvertement. Alors Pierre le prit à part et se mit à le reprendre, '
  '33':
  - type: text
    content: 'mais Jésus se retourna, regarda ses disciples et réprimanda Pierre en disant: «Arrière, Satan, car tes pensées ne sont pas les pensées de Dieu, mais celles des hommes.»'
  '34':
  - type: text
    content: 'Puis il appela la foule avec ses disciples et il leur dit: «Si quelqu''un veut être mon disciple, qu''il renonce à lui-même, qu''il se charge de sa croix et qu''il me suive! '
  '35':
  - type: text
    content: 'En effet, celui qui voudra sauver sa vie la perdra, mais celui qui la perdra à cause de moi et de la bonne nouvelle la sauvera. '
  '36':
  - type: text
    content: 'Et que servira-t-il à un homme de gagner le monde entier, s''il perd son âme? '
  '37':
  - type: text
    content: 'Que donnera un homme en échange de son âme? '
  '38':
  - type: text
    content: En effet, celui qui aura honte de moi et de mes paroles au milieu de cette génération adultère et pécheresse, le Fils de l'homme aura aussi honte de lui quand il viendra dans la gloire de son Père avec les saints anges.»
  '4':
  - type: text
    content: 'Ses disciples lui répondirent: «Comment pourrait-on leur donner assez de pains à manger, ici, dans un endroit désert?» '
  '5':
  - type: text
    content: 'Jésus leur demanda: «Combien avez-vous de pains?» «Sept», répondirent-ils. '
  '6':
  - type: text
    content: 'Alors il fit asseoir la foule par terre, prit les sept pains et, après avoir remercié Dieu, il les rompit et les donna à ses disciples pour les distribuer; et ils les distribuèrent à la foule. '
  '7':
  - type: text
    content: 'Ils avaient encore quelques petits poissons; Jésus [les] bénit et les fit aussi distribuer. '
  '8':
  - type: text
    content: 'Ils mangèrent et furent rassasiés, et l''on emporta sept corbeilles pleines des morceaux qui restaient. '
  '9':
  - type: text
    content: Ceux qui mangèrent étaient environ 4000. Ensuite Jésus les renvoya.
