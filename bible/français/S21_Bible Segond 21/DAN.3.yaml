document_id: DAN.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dans la fournaise
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le roi Nebucadnetsar fit une statue en or, haute de 30 mètres et large de 3 mètres. Il la dressa dans la vallée de Dura, dans la province de Babylone. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Le roi Nebucadnetsar fit rassembler les administrateurs, les intendants, les gouverneurs, les conseillers, les trésoriers, les jurisconsultes, les juges et tous les magistrats des provinces pour qu''ils se rendent à la dédicace de la statue qu''il avait dressée. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Alors les administrateurs, les intendants, les gouverneurs, les conseillers, les trésoriers, les jurisconsultes, les juges et tous les magistrats des provinces se rassemblèrent pour la dédicace de la statue que le roi Nebucadnetsar avait dressée. Ils se tinrent debout devant la statue que Nebucadnetsar avait dressée. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Un héraut cria à pleine voix: «Voici ce qu''on vous ordonne, peuples, nations, hommes de toute langue: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'au moment où vous entendrez le son de la trompette, de la flûte, de la guitare, de la petite et de la grande harpes, de la cornemuse et des instruments de musique de toute sorte, vous vous prosternerez et vous adorerez la statue d''or que le roi Nebucadnetsar a dressée. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Si quelqu'un ne se prosterne pas et ne l'adore pas, il sera jeté à l'instant même au milieu d'une fournaise ardente.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: C'est pourquoi, au moment où tous les peuples entendirent le son de la trompette, de la flûte, de la guitare, de la petite et de la grande harpes et des instruments de musique de toute sorte, tous les peuples, les nations et les hommes de toute langue se prosternèrent et adorèrent la statue en or que le roi Nebucadnetsar avait dressée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'A ce moment-là, profitant de l''occasion, quelques Babyloniens se présentèrent pour accuser les Juifs. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ils prirent la parole et dirent au roi Nebucadnetsar: «Roi, puisses-tu vivre toujours! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'D''après l''ordre que tu as toi-même donné, tous ceux qui entendaient le son de la trompette, de la flûte, de la guitare, de la petite et de la grande harpes, de la cornemuse et des instruments de toute sorte devaient se prosterner et adorer la statue en or. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'D''après le même ordre, si quelqu''un ne se prosternait pas pour adorer la statue, il devait être jeté au milieu d''une fournaise ardente. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Or, il y a des Juifs à qui tu as confié l''administration de la province de Babylone: Shadrak, Méshak et Abed-Nego. Ces hommes ne tiennent aucun compte de ton ordre, roi. Ils ne servent pas tes dieux et n''adorent pas la statue en or que tu as dressée.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Alors Nebucadnetsar, irrité et furieux, donna l''ordre de faire venir Shadrak, Méshak et Abed-Nego. Ces hommes furent donc amenés devant le roi. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Nebucadnetsar prit la parole et leur dit: «Est-il vrai, Shadrak, Méshak et Abed-Nego, que vous ne servez pas mes dieux et que vous n''adorez pas la statue en or que j''ai dressée? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Maintenant, tenez-vous prêts et, au moment où vous entendrez le son de la trompette, de la flûte, de la guitare, de la petite et de la grande harpes, de la cornemuse et des instruments de toute sorte, vous vous prosternerez et vous adorerez la statue que j'ai faite. Si vous ne l'adorez pas, vous serez immédiatement jetés au milieu d'une fournaise ardente. Quel est le dieu qui pourra alors vous délivrer de mon pouvoir?»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Shadrak, Méshak et Abed-Nego répliquèrent au roi Nebucadnetsar: «Nous n''avons pas besoin de te répondre là-dessus. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Notre Dieu, celui que nous servons, peut nous délivrer de la fournaise ardente, et il nous délivrera de ton pouvoir, roi. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Et même s'il ne le faisait pas, sache, roi, que nous ne servirons pas tes dieux et que nous n'adorerons pas la statue en or que tu as dressée.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Nebucadnetsar fut alors rempli de colère. Il changea de visage vis-à-vis de Shadrak, Méshak et Abed-Nego. Reprenant la parole, il ordonna de chauffer la fournaise sept fois plus que d''habitude. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Puis il ordonna à quelques soldats particulièrement forts de son armée d''attacher Shadrak, Méshak et Abed-Nego et de les jeter dans la fournaise ardente. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Ces hommes furent alors attachés, habillés de leurs caleçons, de leurs tuniques, de leurs manteaux et de leurs autres vêtements, et ils furent jetés au milieu de la fournaise ardente. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Comme l''ordre du roi était catégorique et que la fournaise était extraordinairement chauffée, la flamme tua les hommes qui y avaient jeté Shadrak, Méshak et Abed-Nego. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Quant aux trois hommes en question, Shadrak, Méshak et Abed-Nego, ils tombèrent ligotés au milieu de la fournaise ardente.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Le roi Nebucadnetsar fut alors effrayé et se leva subitement. Il prit la parole et dit à ses conseillers: «N''avons-nous pas jeté trois hommes ligotés au milieu du feu?» Ils répondirent au roi: «Certainement, roi!» '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il reprit: «Eh bien, j''aperçois quatre hommes dépourvus de liens qui marchent au milieu du feu, porteurs d''aucune blessure, et le quatrième ressemble à un fils des dieux.» '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nebucadnetsar s''approcha ensuite de l''entrée de la fournaise ardente et dit: «Shadrak, Méshak et Abed-Nego, serviteurs du Dieu très-haut, sortez et venez!» Shadrak, Méshak et Abed-Nego sortirent alors du milieu du feu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Les administrateurs, les intendants, les gouverneurs et les conseillers du roi se rassemblèrent. Ils virent que le feu n''avait eu aucun pouvoir sur le corps de ces hommes, que les cheveux de leur tête n''avaient pas brûlé, que leurs habits n''étaient pas abîmés et qu''ils ne sentaient même pas le feu. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Nebucadnetsar prit la parole et dit: «Béni soit le Dieu de Shadrak, de Méshak et d''Abed-Nego! Il a envoyé son ange et a délivré ses serviteurs qui ont placé leur confiance en lui. Ils n''ont pas hésité à enfreindre l''ordre du roi et à risquer leur vie plutôt que de servir et d''adorer un autre dieu que leur Dieu! '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Voici maintenant l''ordre que je donne: si quelqu''un, quels que soient son peuple, sa nation et sa langue, parle de façon légère du Dieu de Shadrak, de Méshak et d''Abed-Nego, il sera mis en pièces et sa maison sera transformée en un tas de décombres. En effet, il n''y a aucun autre dieu capable de délivrer comme lui.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Après cela, le roi fit prospérer Shadrak, Méshak et Abed-Nego dans la province de Babylone.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rêve à propos d'un grand arbre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Le roi Nebucadnetsar adressa ce message aux hommes de tout peuple, toute nation et toute langue habitant tout l''Empire: «Que la paix vous soit donnée en abondance! '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il m''a semblé bon de vous faire connaître les signes et les miracles que le Dieu très-haut a accomplis vis-à-vis de moi. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Que ses signes sont grands! Que ses miracles sont puissants! Son règne est un règne éternel et sa domination dure de génération en génération.
