document_id: NUM.25,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Idolâtrie dans les plaines de Moab
  - type: text
    content: 'Israël était installé à Sittim. Le peuple commença alors à se livrer à la débauche avec les femmes moabites. '
  '10':
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '11':
  - type: text
    content: '«Phinées, fils d''Eléazar et petit-fils du prêtre Aaron, a détourné ma fureur des Israélites, parce qu''il a été animé de mon zèle au milieu d''eux. Ainsi je n''ai pas, dans ma colère, détruit les Israélites. '
  '12':
  - type: text
    content: 'C''est pourquoi tu diras que je conclus une alliance de paix avec lui. '
  '13':
  - type: text
    content: Cette alliance, conclue avec lui et avec sa descendance après lui, lui assure pour toujours la fonction de prêtre, parce qu'il a été zélé pour son Dieu et qu'il a fait l'expiation pour les Israélites.»
  '14':
  - type: text
    content: 'L''Israélite qui fut tué avec la Madianite s''appelait Zimri. Il était fils de Salu et chef de famille des Siméonites. '
  '15':
  - type: text
    content: La femme madianite qui fut tuée s'appelait Cozbi. Elle était la fille de Tsur, un chef de peuplades issues d'une famille madianite.
  '16':
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '17':
  - type: text
    content: '«Traite les Madianites en ennemis et tuez-les. '
  '18':
  - type: text
    content: En effet, ils se sont montrés vos ennemis en vous séduisant par leurs ruses dans les affaires de Peor et de Cozbi, la fille d'un chef madianite, leur sœur, tuée le jour du fléau qui a surgi à l'occasion de Peor.»
  '2':
  - type: text
    content: 'Elles invitèrent le peuple aux sacrifices en l''honneur de leurs dieux et le peuple mangea et se prosterna devant leurs dieux. '
  '3':
  - type: text
    content: Israël s'attacha au dieu Baal-Peor
  - type: note
    content: 'Baal-Peor: divinité des Moabites adorée sur le mont Peor.'
  - type: text
    content: ' et la colère de l''Eternel s''enflamma contre Israël. '
  '4':
  - type: text
    content: 'L''Eternel dit à Moïse: «Rassemble tous les chefs du peuple et fais pendre les coupables devant l''Eternel en face du soleil, afin que la colère ardente de l''Eternel se détourne d''Israël.» '
  '5':
  - type: text
    content: 'Moïse dit aux juges d''Israël: «Que chacun de vous tue ceux des siens qui se sont attachés à Baal-Peor.»'
  '6':
  - type: text
    content: 'Un Israélite vint amener une Madianite vers ses frères, sous les yeux de Moïse et de toute l''assemblée des Israélites, alors qu''ils étaient en train de pleurer à l''entrée de la tente de la rencontre. '
  '7':
  - type: text
    content: 'A cette vue, Phinées, fils d''Eléazar et petit-fils du prêtre Aaron, se leva au milieu de l''assemblée et prit une lance dans sa main. '
  '8':
  - type: text
    content: 'Il suivit l''homme d''Israël dans sa tente et il les transperça tous les deux, l''homme d''Israël puis la femme, dans le bas-ventre. Le fléau s''arrêta alors parmi les Israélites. '
  '9':
  - type: text
    content: Il y eut 24'000 morts suite à ce fléau.
