document_id: NUM.25
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Idolâtrie dans les plaines de Moab
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Israël était installé à Sittim. Le peuple commença alors à se livrer à la débauche avec les femmes moabites. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Elles invitèrent le peuple aux sacrifices en l''honneur de leurs dieux et le peuple mangea et se prosterna devant leurs dieux. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Israël s'attacha au dieu Baal-Peor
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Baal-Peor: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: divinité des Moabites adorée sur le mont Peor.
    marker-yv: yv-n
  - type: text
    text: ' et la colère de l''Eternel s''enflamma contre Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'L''Eternel dit à Moïse: «Rassemble tous les chefs du peuple et fais pendre les coupables devant l''Eternel en face du soleil, afin que la colère ardente de l''Eternel se détourne d''Israël.» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Moïse dit aux juges d''Israël: «Que chacun de vous tue ceux des siens qui se sont attachés à Baal-Peor.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Un Israélite vint amener une Madianite vers ses frères, sous les yeux de Moïse et de toute l''assemblée des Israélites, alors qu''ils étaient en train de pleurer à l''entrée de la tente de la rencontre. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'A cette vue, Phinées, fils d''Eléazar et petit-fils du prêtre Aaron, se leva au milieu de l''assemblée et prit une lance dans sa main. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il suivit l''homme d''Israël dans sa tente et il les transperça tous les deux, l''homme d''Israël puis la femme, dans le bas-ventre. Le fléau s''arrêta alors parmi les Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il y eut 24'000 morts suite à ce fléau.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '«Phinées, fils d''Eléazar et petit-fils du prêtre Aaron, a détourné ma fureur des Israélites, parce qu''il a été animé de mon zèle au milieu d''eux. Ainsi je n''ai pas, dans ma colère, détruit les Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'C''est pourquoi tu diras que je conclus une alliance de paix avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Cette alliance, conclue avec lui et avec sa descendance après lui, lui assure pour toujours la fonction de prêtre, parce qu'il a été zélé pour son Dieu et qu'il a fait l'expiation pour les Israélites.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'L''Israélite qui fut tué avec la Madianite s''appelait Zimri. Il était fils de Salu et chef de famille des Siméonites. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: La femme madianite qui fut tuée s'appelait Cozbi. Elle était la fille de Tsur, un chef de peuplades issues d'une famille madianite.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'L''Eternel dit à Moïse: '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '«Traite les Madianites en ennemis et tuez-les. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: En effet, ils se sont montrés vos ennemis en vous séduisant par leurs ruses dans les affaires de Peor et de Cozbi, la fille d'un chef madianite, leur sœur, tuée le jour du fléau qui a surgi à l'occasion de Peor.»
