document_id: ACT.12,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Arrestation et libération de Pierre
  - type: text
    content: 'A cette époque-là, le roi Hérode se mit à maltraiter des membres de l''Eglise, '
  '10':
  - type: text
    content: Ils passèrent la première garde, puis la seconde, et ils arrivèrent à la porte de fer qui mène à la ville. La porte s'ouvrit d'elle-même devant eux; ils sortirent et s'avancèrent dans une rue. Aussitôt l'ange quitta Pierre.
  '11':
  - type: text
    content: 'Revenu à lui-même, Pierre dit: «Maintenant, je sais vraiment que le Seigneur a envoyé son ange et qu''il m''a délivré du pouvoir d''Hérode et de tout ce que le peuple juif attendait.» '
  '12':
  - type: text
    content: 'Après avoir réfléchi, il se dirigea vers la maison de Marie, la mère de Jean, surnommé Marc, où beaucoup de personnes étaient réunies et priaient. '
  '13':
  - type: text
    content: 'Il frappa à la porte d''entrée et une servante appelée Rhode s''approcha pour écouter. '
  '14':
  - type: text
    content: 'Elle reconnut la voix de Pierre et, dans sa joie, au lieu d''ouvrir, elle courut annoncer que Pierre se tenait devant la porte. '
  '15':
  - type: text
    content: 'Ils lui dirent: «Tu es folle», mais elle soutenait que c''était bien vrai. Ils dirent alors: «C''est son ange.» '
  '16':
  - type: text
    content: 'Cependant Pierre continuait à frapper. Ils ouvrirent et furent stupéfaits de le voir. '
  '17':
  - type: text
    content: 'De la main, il leur fit signe de se taire et il [leur] raconta comment le Seigneur l''avait tiré de la prison. Il ajouta: «Annoncez-le à Jacques et aux frères et sœurs.» Puis il sortit et s''en alla dans un autre endroit.'
  '18':
  - type: text
    content: 'Quand il fit jour, il y eut une grande agitation parmi les soldats: qu''était donc devenu Pierre? '
  '19':
  - type: text
    content: Hérode le fit rechercher, mais on ne le trouva pas. Il interrogea les gardes et donna l'ordre de les faire exécuter. Ensuite il quitta la Judée et descendit à Césarée pour y séjourner.
  '2':
  - type: text
    content: 'et il fit mourir par l''épée Jacques, le frère de Jean. '
  '20':
  - type: text
    content: 'Hérode était en conflit avec les Tyriens et les Sidoniens. Mais ils vinrent le trouver d''un commun accord et, après avoir gagné Blastus, le responsable de sa chambre, ils demandèrent la paix parce que leur région dépendait de celle du roi pour son ravitaillement. '
  '21':
  - type: text
    content: 'Le jour fixé, Hérode, habillé de sa tenue royale, était assis sur son trône et leur adressait publiquement un discours. '
  '22':
  - type: text
    content: 'Le peuple s''écria: «C''est la voix d''un dieu et non d''un être humain!» '
  '23':
  - type: text
    content: Un ange du Seigneur le frappa immédiatement parce qu'il n'avait pas donné gloire à Dieu. Il mourut rongé par des vers.
  '24':
  - type: text
    content: Quant à la parole de Dieu, elle se propageait de plus en plus.
  '25':
  - type: text
    content: Une fois leur mission à Jérusalem accomplie, Barnabas et Saul repartirent, emmenant avec eux Jean, surnommé Marc.
  '3':
  - type: text
    content: 'Quand il vit que cela plaisait aux Juifs, il fit encore arrêter Pierre. – C''était pendant la fête des pains sans levain. – '
  '4':
  - type: text
    content: 'Après l''avoir fait arrêter et jeter en prison, il le mit sous la garde de quatre escouades de quatre soldats chacune; il avait l''intention de le faire comparaître devant le peuple après la Pâque. '
  '5':
  - type: text
    content: Pierre était donc gardé dans la prison et l'Eglise adressait d'ardentes prières à Dieu pour lui.
  '6':
  - type: text
    content: 'La nuit qui précédait le jour où Hérode allait le faire comparaître, Pierre, attaché avec deux chaînes, dormait entre deux soldats; des sentinelles postées devant la porte gardaient la prison. '
  '7':
  - type: text
    content: 'Soudain, un ange du Seigneur survint et une lumière resplendit dans la cellule. L''ange réveilla Pierre en le frappant au côté et lui dit: «Lève-toi vite!» Les chaînes tombèrent de ses mains. '
  '8':
  - type: text
    content: 'Puis l''ange lui dit: «Mets ta ceinture et tes sandales.» C''est ce qu''il fit. L''ange lui dit encore: «Mets ton manteau et suis-moi.» '
  '9':
  - type: text
    content: 'Pierre sortit et le suivit, sans savoir que ce que l''ange faisait était réel: il croyait avoir une vision. '
