document_id: ACT.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Arrestation et libération de Pierre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A cette époque-là, le roi Hérode se mit à maltraiter des membres de l''Eglise, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'et il fit mourir par l''épée Jacques, le frère de Jean. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Quand il vit que cela plaisait aux Juifs, il fit encore arrêter Pierre. – C''était pendant la fête des pains sans levain. – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Après l''avoir fait arrêter et jeter en prison, il le mit sous la garde de quatre escouades de quatre soldats chacune; il avait l''intention de le faire comparaître devant le peuple après la Pâque. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Pierre était donc gardé dans la prison et l'Eglise adressait d'ardentes prières à Dieu pour lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'La nuit qui précédait le jour où Hérode allait le faire comparaître, Pierre, attaché avec deux chaînes, dormait entre deux soldats; des sentinelles postées devant la porte gardaient la prison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Soudain, un ange du Seigneur survint et une lumière resplendit dans la cellule. L''ange réveilla Pierre en le frappant au côté et lui dit: «Lève-toi vite!» Les chaînes tombèrent de ses mains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Puis l''ange lui dit: «Mets ta ceinture et tes sandales.» C''est ce qu''il fit. L''ange lui dit encore: «Mets ton manteau et suis-moi.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Pierre sortit et le suivit, sans savoir que ce que l''ange faisait était réel: il croyait avoir une vision. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ils passèrent la première garde, puis la seconde, et ils arrivèrent à la porte de fer qui mène à la ville. La porte s'ouvrit d'elle-même devant eux; ils sortirent et s'avancèrent dans une rue. Aussitôt l'ange quitta Pierre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Revenu à lui-même, Pierre dit: «Maintenant, je sais vraiment que le Seigneur a envoyé son ange et qu''il m''a délivré du pouvoir d''Hérode et de tout ce que le peuple juif attendait.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Après avoir réfléchi, il se dirigea vers la maison de Marie, la mère de Jean, surnommé Marc, où beaucoup de personnes étaient réunies et priaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il frappa à la porte d''entrée et une servante appelée Rhode s''approcha pour écouter. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Elle reconnut la voix de Pierre et, dans sa joie, au lieu d''ouvrir, elle courut annoncer que Pierre se tenait devant la porte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Ils lui dirent: «Tu es folle», mais elle soutenait que c''était bien vrai. Ils dirent alors: «C''est son ange.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Cependant Pierre continuait à frapper. Ils ouvrirent et furent stupéfaits de le voir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'De la main, il leur fit signe de se taire et il [leur] raconta comment le Seigneur l''avait tiré de la prison. Il ajouta: «Annoncez-le à Jacques et aux frères et sœurs.» Puis il sortit et s''en alla dans un autre endroit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Quand il fit jour, il y eut une grande agitation parmi les soldats: qu''était donc devenu Pierre? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Hérode le fit rechercher, mais on ne le trouva pas. Il interrogea les gardes et donna l'ordre de les faire exécuter. Ensuite il quitta la Judée et descendit à Césarée pour y séjourner.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Hérode était en conflit avec les Tyriens et les Sidoniens. Mais ils vinrent le trouver d''un commun accord et, après avoir gagné Blastus, le responsable de sa chambre, ils demandèrent la paix parce que leur région dépendait de celle du roi pour son ravitaillement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le jour fixé, Hérode, habillé de sa tenue royale, était assis sur son trône et leur adressait publiquement un discours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le peuple s''écria: «C''est la voix d''un dieu et non d''un être humain!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Un ange du Seigneur le frappa immédiatement parce qu'il n'avait pas donné gloire à Dieu. Il mourut rongé par des vers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Quant à la parole de Dieu, elle se propageait de plus en plus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Une fois leur mission à Jérusalem accomplie, Barnabas et Saul repartirent, emmenant avec eux Jean, surnommé Marc.
