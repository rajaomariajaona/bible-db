document_id: DAN.11,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: '»Quant à moi, la première année de règne de Darius le Mède, je me tenais auprès de lui pour lui donner force et protection. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Ses fils se mettront en campagne et rassembleront d''immenses troupes. Elles viendront et déferleront comme un torrent, déborderont, puis reviendront et pousseront les hostilités jusqu''à la forteresse du roi du sud. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi du sud s''irritera, il sortira et combattra contre le roi du nord; il mobilisera une grande troupe et les troupes du roi du nord seront livrées à son pouvoir. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cette troupe sera fière et le cœur du roi du sud se remplira d''orgueil. Il fera des dizaines de milliers de victimes, mais il ne triomphera pas. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, le roi du nord reviendra et mobilisera une grande troupe, plus nombreuse que la première. Au bout de quelque temps, de quelques années, il se mettra en marche avec une grande armée et de grandes richesses.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»A cette époque-là, beaucoup se dresseront contre le roi du sud. Des hommes violents issus de ton peuple se soulèveront pour accomplir la vision, et ils trébucheront. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi du nord viendra. Il construira des remblais et s''emparera des villes fortifiées. Les troupes du sud et l''élite du roi ne résisteront pas, elles n''en auront pas la force. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Celui qui marchera contre lui fera ce qu''il voudra sans que personne ne lui résiste. Il s''arrêtera dans le plus beau des pays, exterminant tout ce qui tombera sous sa main. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il formera le projet d''arriver avec toutes les forces de son royaume et de conclure un accord avec le roi du sud; il lui donnera sa fille en mariage dans l''intention de détruire sa royauté, mais cela n''arrivera pas et il n''obtiendra pas ce qu''il voulait. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il s''orientera vers les îles et en prendra beaucoup, mais un chef militaire mettra fin à la honte qu''il voulait lui attirer et la fera retomber sur lui. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il se dirigera ensuite vers les forteresses de son pays où il trébuchera et tombera, et on ne le trouvera plus.
  '2':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: Maintenant, je vais t'annoncer la vérité.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Conflits entre puissances
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Il y aura encore trois rois qui régneront sur la Perse. Le quatrième amassera plus de richesses que tous les autres et, quand il aura gagné en force grâce à ses richesses, il soulèvera tout le monde contre le royaume de Grèce. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: »Celui qui le remplacera fera venir un oppresseur dans la plus belle partie du royaume, mais il sera brisé en quelques jours, et ce ne sera ni par la colère ni par la guerre.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Profanation du sanctuaire
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Un homme méprisé prendra sa place sans qu''on lui ait donné la dignité royale. Il arrivera dans une période de tranquillité et s''emparera du royaume grâce à des intrigues. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les troupes qui déferleront comme un torrent seront submergées devant lui et brisées, de même que le chef de l''alliance. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une fois qu''on se sera rallié à lui, il recourra à la tromperie. Il se mettra en marche et aura le dessus avec peu de monde. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il pénétrera en toute tranquillité dans les endroits les plus fertiles de la province; il fera ce que n''avaient pas fait ses prédécesseurs ni ses ancêtres: il distribuera le butin, les biens et les richesses. Il formera des plans contre les forteresses, et cela pendant un certain temps. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A la tête d''une grande armée, il déploiera sa force et son courage contre le roi du sud. Ce dernier s''engagera dans la guerre avec une grande et très puissante armée, mais il ne résistera pas, car on formera des plans contre lui: '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'ceux qui mangeront des plats servis à sa table causeront sa perte. Son armée se dissoudra et les morts tomberont en grand nombre. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les deux rois chercheront dans leur cœur à faire du mal, et à la même table ils parleront avec fausseté. Mais cela ne réussira pas, car la fin n'arrivera qu'au moment fixé.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Il retournera dans son pays avec de grandes richesses. Dans son cœur, il aura des intentions hostiles contre l''alliance sainte. Il agira contre elle avant de retourner dans son pays. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au moment fixé, il marchera de nouveau contre le sud, mais cette fois-là cela ne se passera pas comme la première fois. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cependant, un roi vaillant se dressera. Il dominera avec une grande puissance et fera ce qu''il voudra. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Des bateaux venus de l''ouest avanceront contre lui. Découragé, il rebroussera chemin, puis dans sa rage il agira contre l''alliance sainte. Il reviendra et traitera avec bienveillance ceux qui auront abandonné l''alliance sainte. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Des troupes se présenteront sur son ordre et elles souilleront le sanctuaire, la forteresse. Elles feront cesser le sacrifice perpétuel et dresseront l''abominable dévastation. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il corrompra par des flatteries ceux qui violent l''alliance, mais les membres du peuple qui connaîtront leur Dieu agiront avec fermeté, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et les plus perspicaces donneront instruction à beaucoup. Ils se heurteront pour un temps à l''épée et à la flamme, à la déportation et au pillage. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Durant cette période ils recevront un peu d''aide et beaucoup se rallieront à eux de façon hypocrite. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quelques-uns des hommes perspicaces trébucheront afin d'être affinés, purifiés et épurés jusqu'au moment de la fin, car elle n'arrivera qu'au moment fixé.
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Le roi fera ce qu''il voudra. Il sera plein d''arrogance, se grandira au-dessus de tous les dieux et prononcera des paroles extraordinaires contre le Dieu des dieux. Il prospérera jusqu''à ce que la colère soit à son comble, car ce qui est décidé s''accomplira. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il ne prêtera attention ni aux dieux de ses ancêtres, ni à celui que désirent les femmes. Il ne prêtera attention à aucun dieu, car il se grandira au-dessus de tous. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est le dieu des forteresses qu''il honorera sur son piédestal. A ce dieu que ne connaissaient pas ses ancêtres, il rendra hommage avec de l''or et de l''argent, avec des pierres précieuses et des objets de valeur. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est avec ce dieu étranger qu''il agira contre les endroits fortifiés, et il comblera d''honneurs ceux qui le reconnaîtront: il leur donnera la domination sur beaucoup et leur distribuera des terres en guise de récompense.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Une fois qu'il se sera dressé, son royaume sera brisé et divisé aux quatre coins du ciel. Son royaume n'appartiendra pas à ses descendants et ne sera pas aussi puissant que le sien, car il sera déchiré et passera à d'autres qu'eux.
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Au moment de la fin, le roi du sud l''affrontera, et le roi du nord fondra sur lui comme une tempête, avec des chars et des cavaliers, ainsi que de nombreux bateaux. Il pénétrera dans tous les pays, déferlera comme un torrent et débordera. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il pénétrera dans le plus beau des pays et beaucoup trébucheront, mais voici ceux qui seront délivrés de son pouvoir: Edom, Moab et les principaux des Ammonites. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il étendra son pouvoir sur divers pays et l''Egypte n''y échappera pas: '
  '43':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il se rendra maître des trésors d''or et d''argent et de tous les biens précieux de l''Egypte. Les Libyens et les Ethiopiens marcheront à sa suite. '
  '44':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Des nouvelles de l''est et du nord le troubleront et il partira, dans une grande colère, détruire et exterminer beaucoup d''hommes. '
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il dressera les tentes de son palais entre les mers, vers la glorieuse et sainte montagne. Puis il arrivera à sa fin sans que personne ne l'aide.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Le roi du sud deviendra fort. Mais un de ses chefs sera plus fort que lui et exercera sa propre domination, une domination puissante. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Au bout de quelques années ils concluront une alliance et la fille du roi du sud s'unira au roi du nord pour concrétiser leur accord. Mais elle ne tiendra pas le coup et ni lui ni son armée ne pourront résister. Elle sera cédée avec ceux qui l'auront amenée, avec son père et avec celui qui aura été son soutien à cette époque-là.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Un rejeton de même racine qu''elle se dressera à sa place. Il viendra attaquer l''armée du roi du nord et pénétrera dans sa forteresse. Il interviendra contre eux et deviendra puissant. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il enlèvera même et transportera en Egypte leurs dieux et leurs idoles en métal fondu, ainsi que leurs objets précieux en argent et en or. Puis il restera quelques années à distance du roi du nord. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Celui-ci marchera contre le royaume du roi du sud, mais il devra revenir dans son territoire.
