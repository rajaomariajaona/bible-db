document_id: JER.10,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'Eternel et les idoles
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ecoutez la parole que l'Eternel vous adresse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: communauté d'Israël!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais c'est l'Eternel qui est le vrai Dieu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Lui, il est un Dieu vivant, et il est roi pour l'éternité.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terre tremble devant sa colère,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les nations ne supportent pas sa fureur.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»Vous leur tiendrez ce langage:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Les dieux qui n'ont pas fait le ciel et la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: disparaîtront de la terre et de dessous le ciel.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est lui qui a fait la terre par sa puissance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a fondé le monde par sa sagesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a déployé le ciel par son intelligence.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A sa voix, l'eau gronde dans le ciel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fait monter les nuages des extrémités de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il déclenche les éclairs et la pluie, il tire le vent de ses trésors.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout homme est dépassé, même les plus savants.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout orfèvre est honteux de sa sculpture sacrée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'car son idole n''est que mensonge:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le souffle de la vie n'habite pas dans les idoles.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elles sont sans consistance, ridicules.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand ce sera le moment d'intervenir contre elles, elles disparaîtront.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui est le bien de Jacob n'est pas comme elles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c'est lui qui a tout façonné.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël est la tribu qui lui appartient.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel, le maître de l'univers, voilà quel est son nom.’
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'approche de la punition
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Ramasse tes affaires qui traînent par terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toi qui te trouves en état de siège,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'car voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ‘Cette fois-ci je vais expédier au loin les habitants du pays.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais provoquer leur détresse pour qu'on les capture.’»
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Malheur à moi! Je suis brisée!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma plaie est douloureuse!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et moi qui disais: ‘C''est une calamité,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais je la supporterai’!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N'imitez pas la conduite des nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne vous laissez pas effrayer par les signes du ciel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce que les nations sont effrayées par eux.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ma tente est dévastée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous mes cordages sont coupés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes fils m'ont quittée, ils ne sont plus là.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je n'ai personne qui dresse de nouveau ma tente,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui relève mes abris en toile.»
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C''est que les bergers ont été stupides:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils n'ont pas cherché l'Eternel.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà pourquoi ils n'ont pas agi intelligemment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: voilà pourquoi tous leurs troupeaux sont dispersés.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est le bruit d'une rumeur, elle arrive,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est un grand tremblement qui vient du pays du nord
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour réduire les villes de Juda en un désert,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en un repaire de chacals.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je sais, Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que l'être humain n'a pas autorité sur la voie qu'il suit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce n'est pas à l'homme qui marche de diriger ses pas.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Corrige-moi, Eternel, mais dans une juste mesure
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et non dans ta colère! Sinon, tu m'affaiblirais trop.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Déverse ta fureur sur les nations qui ne te connaissent pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur les peuples qui ne font pas appel à toi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, ils dévorent Jacob, ils le dévorent, ils l'exterminent
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et dévastent son domaine.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, les coutumes des peuples sont vides de sens.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C''est du bois qu''on coupe dans la forêt:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la main de l'ouvrier le travaille avec la hache,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on l'embellit avec de l'argent et de l'or,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on le fixe avec des clous et des marteaux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour qu'il ne bouge pas.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ces dieux ressemblent à un poteau massif:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ne parlent pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il faut bien qu'on les porte, puisqu'ils ne peuvent pas marcher!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N'ayez pas peur d'eux, car ils ne peuvent faire aucun mal;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont même incapables de faire du bien.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Personne n'est semblable à toi, Eternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu es grand, et ta puissance contribue à la grandeur de ta réputation.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*Qui pourrait ne pas te craindre, roi des nations?'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qui pourrait… nations: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Apocalypse 15.3-4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dans le cantique de Moïse et de l''Agneau.'
      marker-yv: yv-n
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, c'est à toi que la crainte est due,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car parmi tous les sages des nations et dans tous leurs royaumes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: personne n'est semblable à toi.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tous, sans exception, sont idiots et stupides.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'instruction des idoles, ce n'est que du bois!
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: On fait venir des lames d'argent de Tarsis, et de l'or d'Uphaz.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'ouvrier et la main de l'orfèvre les travaillent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les habits de ces dieux sont de pourpre violette et rouge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous sont l'œuvre d'habiles artisans.
