document_id: JER.10,152
type_code: fra
verses:
  '1':
  - type: heading
    content: L'Eternel et les idoles
  - type: text
    content: «Ecoutez la parole que l'Eternel vous adresse,
  - type: text
    content: communauté d'Israël!
  '10':
  - type: text
    content: Mais c'est l'Eternel qui est le vrai Dieu.
  - type: text
    content: Lui, il est un Dieu vivant, et il est roi pour l'éternité.
  - type: text
    content: La terre tremble devant sa colère,
  - type: text
    content: et les nations ne supportent pas sa fureur.
  '11':
  - type: text
    content: '»Vous leur tiendrez ce langage:'
  - type: text
    content: ‘Les dieux qui n'ont pas fait le ciel et la terre
  - type: text
    content: disparaîtront de la terre et de dessous le ciel.
  '12':
  - type: text
    content: C'est lui qui a fait la terre par sa puissance.
  - type: text
    content: Il a fondé le monde par sa sagesse,
  - type: text
    content: il a déployé le ciel par son intelligence.
  '13':
  - type: text
    content: A sa voix, l'eau gronde dans le ciel.
  - type: text
    content: Il fait monter les nuages des extrémités de la terre,
  - type: text
    content: il déclenche les éclairs et la pluie, il tire le vent de ses trésors.
  '14':
  - type: text
    content: Tout homme est dépassé, même les plus savants.
  - type: text
    content: Tout orfèvre est honteux de sa sculpture sacrée,
  - type: text
    content: 'car son idole n''est que mensonge:'
  - type: text
    content: le souffle de la vie n'habite pas dans les idoles.
  '15':
  - type: text
    content: Elles sont sans consistance, ridicules.
  - type: text
    content: Quand ce sera le moment d'intervenir contre elles, elles disparaîtront.
  '16':
  - type: text
    content: Celui qui est le bien de Jacob n'est pas comme elles,
  - type: text
    content: car c'est lui qui a tout façonné.
  - type: text
    content: Israël est la tribu qui lui appartient.
  - type: text
    content: L'Eternel, le maître de l'univers, voilà quel est son nom.’
  - type: heading
    content: L'approche de la punition
  '17':
  - type: text
    content: »Ramasse tes affaires qui traînent par terre,
  - type: text
    content: toi qui te trouves en état de siège,
  '18':
  - type: text
    content: 'car voici ce que dit l''Eternel:'
  - type: text
    content: ‘Cette fois-ci je vais expédier au loin les habitants du pays.
  - type: text
    content: Je vais provoquer leur détresse pour qu'on les capture.’»
  '19':
  - type: text
    content: «Malheur à moi! Je suis brisée!
  - type: text
    content: Ma plaie est douloureuse!
  - type: text
    content: 'Et moi qui disais: ‘C''est une calamité,'
  - type: text
    content: mais je la supporterai’!
  '2':
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: N'imitez pas la conduite des nations,
  - type: text
    content: ne vous laissez pas effrayer par les signes du ciel
  - type: text
    content: parce que les nations sont effrayées par eux.
  '20':
  - type: text
    content: Ma tente est dévastée,
  - type: text
    content: tous mes cordages sont coupés.
  - type: text
    content: Mes fils m'ont quittée, ils ne sont plus là.
  - type: text
    content: Je n'ai personne qui dresse de nouveau ma tente,
  - type: text
    content: qui relève mes abris en toile.»
  '21':
  - type: text
    content: 'C''est que les bergers ont été stupides:'
  - type: text
    content: ils n'ont pas cherché l'Eternel.
  - type: text
    content: Voilà pourquoi ils n'ont pas agi intelligemment,
  - type: text
    content: voilà pourquoi tous leurs troupeaux sont dispersés.
  '22':
  - type: text
    content: C'est le bruit d'une rumeur, elle arrive,
  - type: text
    content: c'est un grand tremblement qui vient du pays du nord
  - type: text
    content: pour réduire les villes de Juda en un désert,
  - type: text
    content: en un repaire de chacals.
  '23':
  - type: text
    content: Je sais, Eternel,
  - type: text
    content: que l'être humain n'a pas autorité sur la voie qu'il suit.
  - type: text
    content: Ce n'est pas à l'homme qui marche de diriger ses pas.
  '24':
  - type: text
    content: Corrige-moi, Eternel, mais dans une juste mesure
  - type: text
    content: et non dans ta colère! Sinon, tu m'affaiblirais trop.
  '25':
  - type: text
    content: Déverse ta fureur sur les nations qui ne te connaissent pas,
  - type: text
    content: sur les peuples qui ne font pas appel à toi!
  - type: text
    content: En effet, ils dévorent Jacob, ils le dévorent, ils l'exterminent
  - type: text
    content: et dévastent son domaine.
  '3':
  - type: text
    content: En effet, les coutumes des peuples sont vides de sens.
  - type: text
    content: 'C''est du bois qu''on coupe dans la forêt:'
  - type: text
    content: la main de l'ouvrier le travaille avec la hache,
  '4':
  - type: text
    content: on l'embellit avec de l'argent et de l'or,
  - type: text
    content: on le fixe avec des clous et des marteaux
  - type: text
    content: pour qu'il ne bouge pas.
  '5':
  - type: text
    content: 'Ces dieux ressemblent à un poteau massif:'
  - type: text
    content: ils ne parlent pas.
  - type: text
    content: Il faut bien qu'on les porte, puisqu'ils ne peuvent pas marcher!
  - type: text
    content: N'ayez pas peur d'eux, car ils ne peuvent faire aucun mal;
  - type: text
    content: ils sont même incapables de faire du bien.
  '6':
  - type: text
    content: »Personne n'est semblable à toi, Eternel!
  - type: text
    content: Tu es grand, et ta puissance contribue à la grandeur de ta réputation.
  '7':
  - type: text
    content: '*Qui pourrait ne pas te craindre, roi des nations?'
  - type: note
    content: 'Qui pourrait… nations: cité en Apocalypse 15.3-4 dans le cantique de Moïse et de l''Agneau.'
  - type: text
    content: Oui, c'est à toi que la crainte est due,
  - type: text
    content: car parmi tous les sages des nations et dans tous leurs royaumes,
  - type: text
    content: personne n'est semblable à toi.
  '8':
  - type: text
    content: Tous, sans exception, sont idiots et stupides.
  - type: text
    content: L'instruction des idoles, ce n'est que du bois!
  '9':
  - type: text
    content: On fait venir des lames d'argent de Tarsis, et de l'or d'Uphaz.
  - type: text
    content: L'ouvrier et la main de l'orfèvre les travaillent.
  - type: text
    content: Les habits de ces dieux sont de pourpre violette et rouge,
  - type: text
    content: tous sont l'œuvre d'habiles artisans.
