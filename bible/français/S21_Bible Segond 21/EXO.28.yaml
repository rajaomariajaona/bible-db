document_id: EXO.28
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les vêtements du grand-prêtre
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: »Fais approcher de toi ton frère Aaron et ses fils, prends-les parmi les Israélites pour qu'ils me servent en tant que prêtres. Il s'agit d'Aaron et de ses fils Nadab, Abihu, Eléazar et Ithamar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: '»Tu feras à ton frère Aaron des vêtements sacrés pour marquer son importance et son rang. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu parleras à tous les artisans, que j''ai remplis d''un esprit d''habileté, et ils feront les vêtements qu''Aaron portera lorsqu''il sera consacré et lorsqu''il remplira la fonction de prêtre pour moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voici les vêtements qu''ils feront: un pectoral'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Pectoral: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: pièce d'étoffe carrée et double portée sur le devant de l'éphod et garnie de 12 pierres avec les noms des fils de Jacob.
    marker-yv: yv-n
  - type: text
    text: ', un éphod'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ephod: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: deux pièces de tissu reliées par des bretelles.
    marker-yv: yv-n
  - type: text
    text: ', une robe, une tunique brodée, une tiare et une écharpe. Ils feront des vêtements sacrés destinés à ton frère Aaron et à ses fils lorsqu''ils rempliront la fonction de prêtres pour moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Ils emploieront de l'or, des étoffes teintes en bleu, en pourpre, en cramoisi, et du fin lin.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'éphod
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: '»Ils feront l''éphod en or, en fil bleu, pourpre et cramoisi, et en fin lin retors. Il sera fait selon l''art du brodeur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'On y fera 2 bretelles qui le relieront par ses 2 bords; c''est ainsi qu''il sera assemblé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'L''écharpe sera faite du même matériau que l''éphod et fixée sur lui; elle sera en or, en fil bleu, pourpre et cramoisi, et en fin lin retors. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tu prendras 2 pierres d''onyx et tu y graveras les noms des fils d''Israël, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: '6 noms sur une pierre et les 6 autres sur la seconde pierre, d''après leur ordre de naissance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tu graveras les noms des fils d''Israël sur les deux pierres, comme le fait un graveur de pierres, un graveur de cachets, et tu les entoureras de montures en or. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tu mettras les deux pierres sur les bretelles de l''éphod en souvenir des fils d''Israël et c''est comme souvenir qu''Aaron portera leurs noms devant l''Eternel sur ses deux épaules. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tu feras des montures en or '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ainsi que 2 chaînettes en or pur, que tu tresseras en forme de cordons, et tu fixeras aux montures les chaînettes ainsi tressées.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le pectoral
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '»Tu feras le pectoral du jugement selon l''art du brodeur. Tu le feras avec le même matériau que l''éphod, en or, en fil bleu, pourpre et cramoisi, et en fin lin retors. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Il sera carré et double; sa longueur et sa largeur seront de 25 centimètres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Tu y enchâsseras une garniture de 4 rangées de pierres; première rangée: une sardoine, une topaze, une émeraude; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'deuxième rangée: une escarboucle, un saphir, un diamant; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'troisième rangée: une opale, une agate, une améthyste; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'quatrième rangée: une chrysolithe, un onyx, un jaspe. Ces pierres seront enchâssées dans leurs montures en or. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il y en aura 12, d''après les noms des fils d''Israël. Elles seront gravées comme des cachets, chacune avec le nom de l''une des 12 tribus. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tu feras sur le pectoral des chaînettes en or pur, tressées en forme de cordons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tu feras 2 anneaux en or sur le pectoral et tu les mettras aux 2 extrémités du pectoral. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Tu passeras les 2 cordons en or dans les 2 anneaux placés aux 2 extrémités du pectoral; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'et tu fixeras par-devant les bouts des 2 cordons aux 2 montures placées sur les bretelles de l''éphod. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Tu feras encore 2 anneaux en or, que tu mettras aux 2 extrémités du pectoral, sur le bord intérieur appliqué contre l''éphod. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Et tu feras 2 autres anneaux en or, que tu mettras au bas des 2 bretelles de l''éphod, sur le devant, près de leur point d''attache, au-dessus de l''écharpe de l''éphod. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'On attachera le pectoral par ses anneaux aux anneaux de l''éphod avec un cordon bleu, afin que le pectoral soit au-dessus de l''écharpe de l''éphod et qu''il ne puisse pas se séparer de l''éphod. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Lorsque Aaron entrera dans le sanctuaire, il portera sur son cœur les noms des fils d''Israël, gravés sur le pectoral du jugement, pour en garder à toujours le souvenir devant l''Eternel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tu placeras dans le pectoral du jugement l'urim et le thummim
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '28.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''urim et le thummim: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: objets mal connus dont le grand-prêtre se servait pour connaître la volonté de Dieu pour le peuple.
    marker-yv: yv-n
  - type: text
    text: ', et ils seront sur le cœur d''Aaron lorsqu''il se présentera devant l''Eternel. Ainsi, Aaron portera constamment sur son cœur le jugement des Israélites lorsqu''il se présentera devant l''Eternel.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La robe de l'éphod
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '»Tu feras la robe de l''éphod entièrement en étoffe bleue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Au milieu, il y aura une ouverture pour la tête, et cette ouverture aura tout autour un ourlet tissé, comme l''encolure d''un habit en cuir, afin que la robe ne se déchire pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Tout autour de la bordure, en bas, tu feras des grenades de couleur bleue, pourpre et cramoisie intercalées avec des clochettes en or: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'une clochette en or et une grenade, une clochette en or et une grenade, sur toute la bordure de la robe. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Aaron la portera pour faire le service. Quand il entrera dans le sanctuaire devant l'Eternel et quand il en sortira, on entendra le son des clochettes et il ne mourra pas.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le diadème sacré et la tenue des prêtres
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: '»Tu feras une lame en or pur et tu y graveras, comme le fait un graveur de cachet: ‘Sainteté à l''Eternel.’ '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Tu l''attacheras avec un cordon bleu sur la tiare, sur le devant de la tiare. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: Elle sera sur le front d'Aaron, ainsi Aaron sera chargé des fautes commises par les Israélites lorsqu'ils m'apporteront toutes leurs saintes offrandes; elle sera constamment sur son front devant l'Eternel pour qu'il leur soit favorable.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: »Tu feras la tunique en fin lin; tu feras une tiare en fin lin et une ceinture brodée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: '»Pour les fils d''Aaron tu feras des tuniques ainsi que des ceintures et des coiffes pour marquer leur importance et l''honneur de leur rang. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Tu en revêtiras ton frère Aaron et ses fils avec lui. Tu les désigneras par onction, tu les établiras dans leurs fonctions, tu les consacreras et ils seront à mon service en tant que prêtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Fais-leur des caleçons en lin pour couvrir leur nudité; ils iront des reins aux cuisses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Aaron et ses fils les porteront quand ils entreront dans la tente de la rencontre ou quand ils s'approcheront de l'autel pour faire le service dans le sanctuaire; ainsi ils ne se rendront pas coupables et ne mourront pas. C'est une prescription perpétuelle pour Aaron et pour ses descendants après lui.
