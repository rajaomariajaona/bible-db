document_id: EXO.28,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les vêtements du grand-prêtre
  - type: text
    content: »Fais approcher de toi ton frère Aaron et ses fils, prends-les parmi les Israélites pour qu'ils me servent en tant que prêtres. Il s'agit d'Aaron et de ses fils Nadab, Abihu, Eléazar et Ithamar.
  '10':
  - type: text
    content: '6 noms sur une pierre et les 6 autres sur la seconde pierre, d''après leur ordre de naissance. '
  '11':
  - type: text
    content: 'Tu graveras les noms des fils d''Israël sur les deux pierres, comme le fait un graveur de pierres, un graveur de cachets, et tu les entoureras de montures en or. '
  '12':
  - type: text
    content: 'Tu mettras les deux pierres sur les bretelles de l''éphod en souvenir des fils d''Israël et c''est comme souvenir qu''Aaron portera leurs noms devant l''Eternel sur ses deux épaules. '
  '13':
  - type: text
    content: 'Tu feras des montures en or '
  '14':
  - type: text
    content: ainsi que 2 chaînettes en or pur, que tu tresseras en forme de cordons, et tu fixeras aux montures les chaînettes ainsi tressées.
  - type: heading
    content: Le pectoral
  '15':
  - type: text
    content: '»Tu feras le pectoral du jugement selon l''art du brodeur. Tu le feras avec le même matériau que l''éphod, en or, en fil bleu, pourpre et cramoisi, et en fin lin retors. '
  '16':
  - type: text
    content: 'Il sera carré et double; sa longueur et sa largeur seront de 25 centimètres. '
  '17':
  - type: text
    content: 'Tu y enchâsseras une garniture de 4 rangées de pierres; première rangée: une sardoine, une topaze, une émeraude; '
  '18':
  - type: text
    content: 'deuxième rangée: une escarboucle, un saphir, un diamant; '
  '19':
  - type: text
    content: 'troisième rangée: une opale, une agate, une améthyste; '
  '2':
  - type: text
    content: '»Tu feras à ton frère Aaron des vêtements sacrés pour marquer son importance et son rang. '
  '20':
  - type: text
    content: 'quatrième rangée: une chrysolithe, un onyx, un jaspe. Ces pierres seront enchâssées dans leurs montures en or. '
  '21':
  - type: text
    content: 'Il y en aura 12, d''après les noms des fils d''Israël. Elles seront gravées comme des cachets, chacune avec le nom de l''une des 12 tribus. '
  '22':
  - type: text
    content: 'Tu feras sur le pectoral des chaînettes en or pur, tressées en forme de cordons. '
  '23':
  - type: text
    content: 'Tu feras 2 anneaux en or sur le pectoral et tu les mettras aux 2 extrémités du pectoral. '
  '24':
  - type: text
    content: 'Tu passeras les 2 cordons en or dans les 2 anneaux placés aux 2 extrémités du pectoral; '
  '25':
  - type: text
    content: 'et tu fixeras par-devant les bouts des 2 cordons aux 2 montures placées sur les bretelles de l''éphod. '
  '26':
  - type: text
    content: 'Tu feras encore 2 anneaux en or, que tu mettras aux 2 extrémités du pectoral, sur le bord intérieur appliqué contre l''éphod. '
  '27':
  - type: text
    content: 'Et tu feras 2 autres anneaux en or, que tu mettras au bas des 2 bretelles de l''éphod, sur le devant, près de leur point d''attache, au-dessus de l''écharpe de l''éphod. '
  '28':
  - type: text
    content: 'On attachera le pectoral par ses anneaux aux anneaux de l''éphod avec un cordon bleu, afin que le pectoral soit au-dessus de l''écharpe de l''éphod et qu''il ne puisse pas se séparer de l''éphod. '
  '29':
  - type: text
    content: 'Lorsque Aaron entrera dans le sanctuaire, il portera sur son cœur les noms des fils d''Israël, gravés sur le pectoral du jugement, pour en garder à toujours le souvenir devant l''Eternel. '
  '3':
  - type: text
    content: 'Tu parleras à tous les artisans, que j''ai remplis d''un esprit d''habileté, et ils feront les vêtements qu''Aaron portera lorsqu''il sera consacré et lorsqu''il remplira la fonction de prêtre pour moi. '
  '30':
  - type: text
    content: Tu placeras dans le pectoral du jugement l'urim et le thummim
  - type: note
    content: 'L''urim et le thummim: objets mal connus dont le grand-prêtre se servait pour connaître la volonté de Dieu pour le peuple.'
  - type: text
    content: ', et ils seront sur le cœur d''Aaron lorsqu''il se présentera devant l''Eternel. Ainsi, Aaron portera constamment sur son cœur le jugement des Israélites lorsqu''il se présentera devant l''Eternel.'
  - type: heading
    content: La robe de l'éphod
  '31':
  - type: text
    content: '»Tu feras la robe de l''éphod entièrement en étoffe bleue. '
  '32':
  - type: text
    content: 'Au milieu, il y aura une ouverture pour la tête, et cette ouverture aura tout autour un ourlet tissé, comme l''encolure d''un habit en cuir, afin que la robe ne se déchire pas. '
  '33':
  - type: text
    content: 'Tout autour de la bordure, en bas, tu feras des grenades de couleur bleue, pourpre et cramoisie intercalées avec des clochettes en or: '
  '34':
  - type: text
    content: 'une clochette en or et une grenade, une clochette en or et une grenade, sur toute la bordure de la robe. '
  '35':
  - type: text
    content: Aaron la portera pour faire le service. Quand il entrera dans le sanctuaire devant l'Eternel et quand il en sortira, on entendra le son des clochettes et il ne mourra pas.
  - type: heading
    content: Le diadème sacré et la tenue des prêtres
  '36':
  - type: text
    content: '»Tu feras une lame en or pur et tu y graveras, comme le fait un graveur de cachet: ‘Sainteté à l''Eternel.’ '
  '37':
  - type: text
    content: 'Tu l''attacheras avec un cordon bleu sur la tiare, sur le devant de la tiare. '
  '38':
  - type: text
    content: Elle sera sur le front d'Aaron, ainsi Aaron sera chargé des fautes commises par les Israélites lorsqu'ils m'apporteront toutes leurs saintes offrandes; elle sera constamment sur son front devant l'Eternel pour qu'il leur soit favorable.
  '39':
  - type: text
    content: »Tu feras la tunique en fin lin; tu feras une tiare en fin lin et une ceinture brodée.
  '4':
  - type: text
    content: 'Voici les vêtements qu''ils feront: un pectoral'
  - type: note
    content: 'Pectoral: pièce d''étoffe carrée et double portée sur le devant de l''éphod et garnie de 12 pierres avec les noms des fils de Jacob.'
  - type: text
    content: ', un éphod'
  - type: note
    content: 'Ephod: deux pièces de tissu reliées par des bretelles.'
  - type: text
    content: ', une robe, une tunique brodée, une tiare et une écharpe. Ils feront des vêtements sacrés destinés à ton frère Aaron et à ses fils lorsqu''ils rempliront la fonction de prêtres pour moi. '
  '40':
  - type: text
    content: '»Pour les fils d''Aaron tu feras des tuniques ainsi que des ceintures et des coiffes pour marquer leur importance et l''honneur de leur rang. '
  '41':
  - type: text
    content: 'Tu en revêtiras ton frère Aaron et ses fils avec lui. Tu les désigneras par onction, tu les établiras dans leurs fonctions, tu les consacreras et ils seront à mon service en tant que prêtres. '
  '42':
  - type: text
    content: 'Fais-leur des caleçons en lin pour couvrir leur nudité; ils iront des reins aux cuisses. '
  '43':
  - type: text
    content: Aaron et ses fils les porteront quand ils entreront dans la tente de la rencontre ou quand ils s'approcheront de l'autel pour faire le service dans le sanctuaire; ainsi ils ne se rendront pas coupables et ne mourront pas. C'est une prescription perpétuelle pour Aaron et pour ses descendants après lui.
  '5':
  - type: text
    content: Ils emploieront de l'or, des étoffes teintes en bleu, en pourpre, en cramoisi, et du fin lin.
  - type: heading
    content: L'éphod
  '6':
  - type: text
    content: '»Ils feront l''éphod en or, en fil bleu, pourpre et cramoisi, et en fin lin retors. Il sera fait selon l''art du brodeur. '
  '7':
  - type: text
    content: 'On y fera 2 bretelles qui le relieront par ses 2 bords; c''est ainsi qu''il sera assemblé. '
  '8':
  - type: text
    content: 'L''écharpe sera faite du même matériau que l''éphod et fixée sur lui; elle sera en or, en fil bleu, pourpre et cramoisi, et en fin lin retors. '
  '9':
  - type: text
    content: 'Tu prendras 2 pierres d''onyx et tu y graveras les noms des fils d''Israël, '
