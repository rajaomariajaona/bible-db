document_id: MAT.16,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'Les pharisiens et les sadducéens abordèrent Jésus et, pour le mettre à l''épreuve, lui demandèrent de leur faire voir un signe venant du ciel. '
  '10':
  - type: text
    content: 'ni les sept pains des 4000 hommes et combien de corbeilles vous avez emportées? '
  '11':
  - type: text
    content: 'Comment ne comprenez-vous pas que ce n''est pas de pains que je vous ai parlé? Méfiez-vous du levain des pharisiens et des sadducéens.» '
  '12':
  - type: text
    content: Alors ils comprirent que ce n'était pas du levain du pain qu'il leur avait dit de se méfier, mais de l'enseignement des pharisiens et des sadducéens.
  - type: heading
    content: Pierre reconnaît Jésus comme le Messie
  '13':
  - type: text
    content: 'Jésus arriva dans le territoire de Césarée de Philippe. Il demanda à ses disciples: «Qui suis-je, d''après les hommes, moi le Fils de l''homme?» '
  '14':
  - type: text
    content: 'Ils répondirent: «Les uns disent que tu es Jean-Baptiste; les autres, Elie; les autres, Jérémie ou l''un des prophètes.» '
  '15':
  - type: text
    content: '«Et d''après vous, qui suis-je?» leur dit-il. '
  '16':
  - type: text
    content: 'Simon Pierre répondit: «Tu es le Messie, le Fils du Dieu vivant.»'
  '17':
  - type: text
    content: 'Jésus reprit la parole et lui dit: «Tu es heureux, Simon, fils de Jonas, car ce n''est pas une pensée humaine qui t''a révélé cela, mais c''est mon Père céleste. '
  '18':
  - type: text
    content: 'Et moi, je te dis que tu es Pierre et que sur ce rocher je construirai mon Eglise, et les portes du séjour des morts ne l''emporteront pas sur elle. '
  '19':
  - type: text
    content: 'Je te donnerai les clés du royaume des cieux: ce que tu lieras sur la terre aura été lié au ciel et ce que tu délieras sur la terre aura été délié au ciel.» '
  '2':
  - type: text
    content: 'Jésus leur répondit: «[Le soir, vous dites: ‘Il fera beau, car le ciel est rouge’, et le matin: '
  '20':
  - type: text
    content: Alors il ordonna aux disciples de ne dire à personne qu'il était le Messie.
  '21':
  - type: text
    content: 'Dès ce moment, Jésus commença à montrer à ses disciples qu''il devait aller à Jérusalem, beaucoup souffrir de la part des anciens, des chefs des prêtres et des spécialistes de la loi, être mis à mort et ressusciter le troisième jour. '
  '22':
  - type: text
    content: 'Alors Pierre le prit à part et se mit à le reprendre en disant: «Que Dieu t''en garde, Seigneur! Cela ne t''arrivera pas.» '
  '23':
  - type: text
    content: 'Mais Jésus se retourna et dit à Pierre: «Arrière, Satan, tu es un piège pour moi, car tes pensées ne sont pas les pensées de Dieu, mais celles des hommes.»'
  '24':
  - type: text
    content: 'Alors Jésus dit à ses disciples: «Si quelqu''un veut être mon disciple, qu''il renonce à lui-même, qu''il se charge de sa croix et qu''il me suive! '
  '25':
  - type: text
    content: 'En effet, celui qui voudra sauver sa vie la perdra, mais celui qui la perdra à cause de moi la retrouvera. '
  '26':
  - type: text
    content: 'Que servira-t-il à un homme de gagner le monde entier, s''il perd son âme? Ou que pourra donner un homme en échange de son âme? '
  '27':
  - type: text
    content: 'En effet, le Fils de l''homme va venir dans la gloire de son Père, avec ses anges, et alors '
  - type: text
    content: il traitera chacun conformément à sa manière d'agir
  - type: note
    content: 'Il traitera… d''agir: principe repris de Psaume 62.13; Proverbes 24.12.'
  - type: text
    content: '. '
  '28':
  - type: text
    content: Je vous le dis en vérité, quelques-uns de ceux qui sont ici ne mourront pas avant d'avoir vu le Fils de l'homme venir dans son règne.»
  '3':
  - type: text
    content: '‘Il y aura de l''orage aujourd''hui, car le ciel est d''un rouge sombre.’ Hypocrites! Vous savez discerner l''aspect du ciel et vous ne pouvez pas discerner les signes des temps.] '
  '4':
  - type: text
    content: Une génération mauvaise et adultère réclame un signe, il ne lui sera pas donné d'autre signe que celui de Jonas [le prophète].» Puis il les quitta et s'en alla.
  '5':
  - type: text
    content: 'En passant sur l''autre rive, les disciples avaient oublié de prendre des pains. '
  '6':
  - type: text
    content: 'Jésus leur dit: «Attention, méfiez-vous du levain des pharisiens et des sadducéens.» '
  '7':
  - type: text
    content: 'Les disciples raisonnaient en eux-mêmes et disaient: «C''est parce que nous n''avons pas pris de pains.» '
  '8':
  - type: text
    content: 'Jésus, le sachant, leur dit: «Hommes de peu de foi, pourquoi raisonnez-vous en vous-mêmes sur le fait que vous n''avez pas pris de pains? '
  '9':
  - type: text
    content: 'Ne comprenez-vous pas encore et ne vous rappelez-vous plus les cinq pains des 5000 hommes et combien de paniers vous avez emportés, '
