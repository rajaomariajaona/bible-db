document_id: MAT.16
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les pharisiens et les sadducéens abordèrent Jésus et, pour le mettre à l''épreuve, lui demandèrent de leur faire voir un signe venant du ciel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Jésus leur répondit: «[Le soir, vous dites: ‘Il fera beau, car le ciel est rouge’, et le matin: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '‘Il y aura de l''orage aujourd''hui, car le ciel est d''un rouge sombre.’ Hypocrites! Vous savez discerner l''aspect du ciel et vous ne pouvez pas discerner les signes des temps.] '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Une génération mauvaise et adultère réclame un signe, il ne lui sera pas donné d'autre signe que celui de Jonas [le prophète].» Puis il les quitta et s'en alla.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'En passant sur l''autre rive, les disciples avaient oublié de prendre des pains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Jésus leur dit: «Attention, méfiez-vous du levain des pharisiens et des sadducéens.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les disciples raisonnaient en eux-mêmes et disaient: «C''est parce que nous n''avons pas pris de pains.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Jésus, le sachant, leur dit: «Hommes de peu de foi, pourquoi raisonnez-vous en vous-mêmes sur le fait que vous n''avez pas pris de pains? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ne comprenez-vous pas encore et ne vous rappelez-vous plus les cinq pains des 5000 hommes et combien de paniers vous avez emportés, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'ni les sept pains des 4000 hommes et combien de corbeilles vous avez emportées? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Comment ne comprenez-vous pas que ce n''est pas de pains que je vous ai parlé? Méfiez-vous du levain des pharisiens et des sadducéens.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Alors ils comprirent que ce n'était pas du levain du pain qu'il leur avait dit de se méfier, mais de l'enseignement des pharisiens et des sadducéens.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Pierre reconnaît Jésus comme le Messie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Jésus arriva dans le territoire de Césarée de Philippe. Il demanda à ses disciples: «Qui suis-je, d''après les hommes, moi le Fils de l''homme?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils répondirent: «Les uns disent que tu es Jean-Baptiste; les autres, Elie; les autres, Jérémie ou l''un des prophètes.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '«Et d''après vous, qui suis-je?» leur dit-il. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Simon Pierre répondit: «Tu es le Messie, le Fils du Dieu vivant.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Jésus reprit la parole et lui dit: «Tu es heureux, Simon, fils de Jonas, car ce n''est pas une pensée humaine qui t''a révélé cela, mais c''est mon Père céleste. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Et moi, je te dis que tu es Pierre et que sur ce rocher je construirai mon Eglise, et les portes du séjour des morts ne l''emporteront pas sur elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Je te donnerai les clés du royaume des cieux: ce que tu lieras sur la terre aura été lié au ciel et ce que tu délieras sur la terre aura été délié au ciel.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Alors il ordonna aux disciples de ne dire à personne qu'il était le Messie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Dès ce moment, Jésus commença à montrer à ses disciples qu''il devait aller à Jérusalem, beaucoup souffrir de la part des anciens, des chefs des prêtres et des spécialistes de la loi, être mis à mort et ressusciter le troisième jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Alors Pierre le prit à part et se mit à le reprendre en disant: «Que Dieu t''en garde, Seigneur! Cela ne t''arrivera pas.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mais Jésus se retourna et dit à Pierre: «Arrière, Satan, tu es un piège pour moi, car tes pensées ne sont pas les pensées de Dieu, mais celles des hommes.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Alors Jésus dit à ses disciples: «Si quelqu''un veut être mon disciple, qu''il renonce à lui-même, qu''il se charge de sa croix et qu''il me suive! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'En effet, celui qui voudra sauver sa vie la perdra, mais celui qui la perdra à cause de moi la retrouvera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Que servira-t-il à un homme de gagner le monde entier, s''il perd son âme? Ou que pourra donner un homme en échange de son âme? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'En effet, le Fils de l''homme va venir dans la gloire de son Père, avec ses anges, et alors '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: il traitera chacun conformément à sa manière d'agir
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il traitera… d''agir: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'principe repris de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Psaume 62.13
      metadata:
        usfm: PSA.62.13
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Proverbes 24.12
      metadata:
        usfm: PRO.24.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Je vous le dis en vérité, quelques-uns de ceux qui sont ici ne mourront pas avant d'avoir vu le Fils de l'homme venir dans son règne.»
