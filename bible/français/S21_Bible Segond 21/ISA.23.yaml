document_id: ISA.23
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prophétie sur Tyr
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Message sur Tyr.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lamentez-vous, bateaux long-courriers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'car elle est violemment détruite: plus de maisons, plus d''entrée!'
- type: usfm
  marker: q1
  children:
  - type: text
    text: C'est de Kittim que la nouvelle leur est parvenue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Soyez muets de terreur, habitants de l’île
- type: usfm
  marker: q1
  children:
  - type: text
    text: et vous, marchands de Sidon, qui parcourez la mer pour la combler!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Amenées à travers les vastes eaux, les céréales du Shichor
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Shichor: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: peut-être un autre nom du Nil, qui désigne ici par extension l'Egypte.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: les moissons permises par le Nil, constituaient son revenu;
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle était le marché des nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Sois couverte de honte, Sidon!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'En effet, voici ce que dit la mer, la forteresse de la mer:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Je ne me suis pas tortillée de douleur, je n'ai pas accouché,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je n'ai pas élevé de jeunes hommes ni pris soin de jeunes filles.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Quand les Egyptiens apprendront la nouvelle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils trembleront comme pour Tyr.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Traversez la mer jusqu'à Tarsis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: lamentez-vous, habitants de l’île!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Est-ce là votre ville joyeuse?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Son origine était très ancienne
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses pas l'amenaient à s'établir loin de chez elle.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Qui a pris cette décision contre Tyr, elle qui distribuait les couronnes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle dont les marchands étaient des princes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dont les commerçants étaient les plus importants de toute la terre?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: C'est l'Eternel, le maître de l'univers, qui a pris cette décision
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour briser l'orgueil de tous ceux qu'on honore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour humilier tous ceux qu'on juge importants sur la terre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Parcours ton pays comme le fait le Nil,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fille de Tarsis
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tarsis: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: colonie phénicienne, désormais débarrassée de la tutelle de Tyr.
    marker-yv: yv-n
  - type: text
    text: '! Il n''y a plus de limitation!'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L'Eternel a déployé sa puissance contre la mer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a fait trembler des royaumes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a donné l'ordre, à l'intention de Canaan, de démolir ses places fortes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il a dit: «Tu ne continueras plus à te livrer à la joie,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: vierge violée, fille de Sidon!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu auras beau te lever pour traverser jusqu'à Kittim,
- type: usfm
  marker: q1
  children:
  - type: text
    text: même là il n'y aura pas de paix pour toi.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Regarde le pays des Babyloniens, ce peuple qui n''en était pas un:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: les Assyriens l'ont destiné aux habitants du désert;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils ont érigé des tours pour en faire le siège, ont démoli ses palais,
- type: usfm
  marker: q1
  children:
  - type: text
    text: en ont fait une ruine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Lamentez-vous, bateaux long-courriers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car votre lieu de refuge est détruit!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ce jour-là et pendant 70 ans,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la durée de vie d'un roi, Tyr tombera dans l'oubli.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Au bout de 70 ans, le sort de Tyr sera pareil
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'à celui de la prostituée dont parle la chanson:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: «Prends une harpe, fais le tour de la ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: prostituée oubliée!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Joue bien de ton instrument, chante sans cesse
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour qu'on se souvienne de toi!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Au bout de 70 ans, l'Eternel interviendra pour Tyr
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et elle retournera à son salaire impur:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle se prostituera avec tous les royaumes du monde,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sur toute la surface de la terre,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: mais ses revenus et son salaire impur seront consacrés à l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Ils ne seront ni entassés ni mis en réserve,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ses revenus permettront de fournir de la nourriture à satiété
- type: usfm
  marker: q1
  children:
  - type: text
    text: et des habits magnifiques à ceux qui habitent devant l'Eternel.
