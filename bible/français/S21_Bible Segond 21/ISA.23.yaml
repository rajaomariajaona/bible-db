document_id: ISA.23,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prophétie sur Tyr
  - type: text
    content: Message sur Tyr.
  - type: text
    content: Lamentez-vous, bateaux long-courriers,
  - type: text
    content: 'car elle est violemment détruite: plus de maisons, plus d''entrée!'
  - type: text
    content: C'est de Kittim que la nouvelle leur est parvenue.
  '10':
  - type: text
    content: Parcours ton pays comme le fait le Nil,
  - type: text
    content: fille de Tarsis
  - type: note
    content: 'Tarsis: colonie phénicienne, désormais débarrassée de la tutelle de Tyr.'
  - type: text
    content: '! Il n''y a plus de limitation!'
  '11':
  - type: text
    content: L'Eternel a déployé sa puissance contre la mer,
  - type: text
    content: il a fait trembler des royaumes,
  - type: text
    content: il a donné l'ordre, à l'intention de Canaan, de démolir ses places fortes.
  '12':
  - type: text
    content: 'Il a dit: «Tu ne continueras plus à te livrer à la joie,'
  - type: text
    content: vierge violée, fille de Sidon!
  - type: text
    content: Tu auras beau te lever pour traverser jusqu'à Kittim,
  - type: text
    content: même là il n'y aura pas de paix pour toi.»
  '13':
  - type: text
    content: 'Regarde le pays des Babyloniens, ce peuple qui n''en était pas un:'
  - type: text
    content: les Assyriens l'ont destiné aux habitants du désert;
  - type: text
    content: ils ont érigé des tours pour en faire le siège, ont démoli ses palais,
  - type: text
    content: en ont fait une ruine.
  '14':
  - type: text
    content: Lamentez-vous, bateaux long-courriers,
  - type: text
    content: car votre lieu de refuge est détruit!
  '15':
  - type: text
    content: Ce jour-là et pendant 70 ans,
  - type: text
    content: la durée de vie d'un roi, Tyr tombera dans l'oubli.
  - type: text
    content: Au bout de 70 ans, le sort de Tyr sera pareil
  - type: text
    content: 'à celui de la prostituée dont parle la chanson:'
  '16':
  - type: text
    content: «Prends une harpe, fais le tour de la ville,
  - type: text
    content: prostituée oubliée!
  - type: text
    content: Joue bien de ton instrument, chante sans cesse
  - type: text
    content: pour qu'on se souvienne de toi!»
  '17':
  - type: text
    content: Au bout de 70 ans, l'Eternel interviendra pour Tyr
  - type: text
    content: 'et elle retournera à son salaire impur:'
  - type: text
    content: elle se prostituera avec tous les royaumes du monde,
  - type: text
    content: sur toute la surface de la terre,
  '18':
  - type: text
    content: mais ses revenus et son salaire impur seront consacrés à l'Eternel.
  - type: text
    content: Ils ne seront ni entassés ni mis en réserve,
  - type: text
    content: car ses revenus permettront de fournir de la nourriture à satiété
  - type: text
    content: et des habits magnifiques à ceux qui habitent devant l'Eternel.
  '2':
  - type: text
    content: Soyez muets de terreur, habitants de l’île
  - type: text
    content: et vous, marchands de Sidon, qui parcourez la mer pour la combler!
  '3':
  - type: text
    content: Amenées à travers les vastes eaux, les céréales du Shichor
  - type: note
    content: 'Shichor: peut-être un autre nom du Nil, qui désigne ici par extension l''Egypte.'
  - type: text
    content: ','
  - type: text
    content: les moissons permises par le Nil, constituaient son revenu;
  - type: text
    content: elle était le marché des nations.
  '4':
  - type: text
    content: Sois couverte de honte, Sidon!
  - type: text
    content: 'En effet, voici ce que dit la mer, la forteresse de la mer:'
  - type: text
    content: «Je ne me suis pas tortillée de douleur, je n'ai pas accouché,
  - type: text
    content: je n'ai pas élevé de jeunes hommes ni pris soin de jeunes filles.»
  '5':
  - type: text
    content: Quand les Egyptiens apprendront la nouvelle,
  - type: text
    content: ils trembleront comme pour Tyr.
  '6':
  - type: text
    content: Traversez la mer jusqu'à Tarsis,
  - type: text
    content: lamentez-vous, habitants de l’île!
  '7':
  - type: text
    content: Est-ce là votre ville joyeuse?
  - type: text
    content: Son origine était très ancienne
  - type: text
    content: et ses pas l'amenaient à s'établir loin de chez elle.
  '8':
  - type: text
    content: Qui a pris cette décision contre Tyr, elle qui distribuait les couronnes,
  - type: text
    content: elle dont les marchands étaient des princes,
  - type: text
    content: dont les commerçants étaient les plus importants de toute la terre?
  '9':
  - type: text
    content: C'est l'Eternel, le maître de l'univers, qui a pris cette décision
  - type: text
    content: pour briser l'orgueil de tous ceux qu'on honore,
  - type: text
    content: pour humilier tous ceux qu'on juge importants sur la terre.
