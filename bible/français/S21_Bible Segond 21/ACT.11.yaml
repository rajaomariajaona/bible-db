document_id: ACT.11
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Les apôtres et les frères qui étaient en Judée apprirent que les non-Juifs avaient eux aussi fait bon accueil à la parole de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Et lorsque Pierre monta à Jérusalem, ceux qui étaient circoncis lui adressèrent des reproches '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'en disant: «Tu es entré chez des incirconcis et tu as mangé avec eux!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pierre se mit à leur exposer dans l''ordre tout ce qui s''était passé. Il dit: '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: '«J''étais dans la ville de Jaffa et, pendant que je priais, j''ai eu en extase une vision: un objet qui ressemblait à une grande nappe attachée aux quatre coins descendait du ciel et venait jusqu''à moi. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Je l''ai examiné attentivement et j''ai vu les quadrupèdes de la terre, les bêtes sauvages et les reptiles ainsi que les oiseaux du ciel. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Puis j''ai entendu une voix qui me disait: ‘Lève-toi, Pierre, tue et mange!’ '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais j''ai dit: ‘Certainement pas, Seigneur, car jamais rien de souillé ni d''impur n''est entré dans ma bouche.’ '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Pour la deuxième fois la voix s''est fait entendre du ciel: ‘Ce que Dieu a déclaré pur, toi, ne le considère pas comme impur.’ '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Cela est arrivé trois fois, puis tout a été retiré dans le ciel. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Et voilà qu''à l''instant même, trois hommes envoyés de Césarée vers moi sont arrivés à la maison où j''étais. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'L''Esprit m''a dit de partir avec eux sans hésiter. Les six frères que voici m''ont accompagné et nous sommes entrés dans la maison de Corneille. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Cet homme nous a raconté comment il avait vu l''ange se présenter à lui dans sa maison et [lui] dire: ‘Envoie quelqu''un à Jaffa et fais venir Simon, surnommé Pierre; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'il te dira un message par lequel tu seras sauvé, toi et toute ta famille.’ '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Lorsque j''ai commencé à parler, le Saint-Esprit est descendu sur eux, comme sur nous au début. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Et je me suis souvenu de cette parole du Seigneur: ‘Jean a baptisé d''eau, mais vous, vous serez baptisés du Saint-Esprit.’ '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Puisque Dieu leur a accordé le même don qu'à nous qui avons cru au Seigneur Jésus-Christ, qui étais-je, moi, pour m'opposer à Dieu?»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Après avoir entendu cela, ils se calmèrent et se mirent à célébrer la gloire de Dieu en disant: «Dieu a donc aussi accordé aux non-Juifs la possibilité de changer d''attitude afin d''avoir la vie.»'
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'Evangile à Antioche de Syrie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ceux qui avaient été dispersés lors de la persécution survenue après la mort d''Etienne allèrent jusqu''en Phénicie, dans l''île de Chypre et à Antioche; mais ils n''annonçaient la parole qu''aux Juifs. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Cependant, certains d''entre eux, qui étaient originaires de Chypre et de Cyrène, vinrent à Antioche et s''adressèrent [aussi] aux non-Juifs pour leur annoncer la bonne nouvelle du Seigneur Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: La main du Seigneur était avec eux et un grand nombre de personnes crurent et se tournèrent vers le Seigneur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'La nouvelle en parvint aux oreilles des membres de l''Eglise de Jérusalem et ils envoyèrent Barnabas jusqu''à Antioche. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'A son arrivée, lorsqu''il vit la grâce de Dieu, il en éprouva de la joie. Il les encourageait tous à rester attachés au Seigneur d''un cœur ferme, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'car c''était un homme de bien, plein d''Esprit saint et de foi. Une foule assez nombreuse s''attacha au Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Barnabas se rendit ensuite à Tarse pour aller chercher Saul. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Quand il l'eut trouvé, il l'amena à Antioche. Pendant toute une année, ils participèrent aux réunions de l'Eglise et ils enseignèrent beaucoup de personnes. C'est à Antioche que, pour la première fois, les disciples furent appelés chrétiens.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'A cette époque-là, des prophètes descendirent de Jérusalem à Antioche. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'L''un d''eux, du nom d''Agabus, se leva et annonça par l''Esprit qu''il y aurait une grande famine sur toute la terre. Elle arriva, en effet, sous l''empereur Claude. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Les disciples décidèrent d''envoyer, chacun selon ses moyens, un secours aux frères et sœurs qui habitaient la Judée. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: C'est ce qu'ils firent en l'envoyant aux anciens par l'intermédiaire de Barnabas et de Saul.
