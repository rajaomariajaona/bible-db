document_id: 2KI.13
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne de Joachaz sur Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: La vingt-troisième année du règne de Joas, le fils d'Achazia, sur Juda, Joachaz, le fils de Jéhu, devint roi d'Israël à Samarie. Il régna 17 ans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il fit ce qui est mal aux yeux de l''Eternel; il commit les mêmes péchés que Jéroboam, fils de Nebath, qui avait fait pécher Israël, et il ne s''en détourna pas. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'La colère de l''Eternel s''enflamma contre Israël et il les livra entre les mains de Hazaël, le roi de Syrie, et de son fils Ben-Hadad, et ce de façon durable. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Joachaz implora l''Eternel. L''Eternel lui répondit, car il vit l''oppression sous laquelle le roi de Syrie tenait Israël, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'et il donna un libérateur à Israël. Les Israélites échappèrent à la domination des Syriens et habitèrent tranquillement chez eux comme avant. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Cependant, ils ne se détournèrent pas des péchés de la famille de Jéroboam qui avait fait pécher Israël, ils persistèrent sur cette voie; le poteau d'Astarté
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Astarté: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir la note sur '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Juges 2.13
      metadata:
        usfm: JDG.2.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' était même dressé à Samarie. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: De toute l'armée de Joachaz, l'Eternel ne lui avait laissé que 50 cavaliers, 10 chars et 10'000 fantassins, car le roi de Syrie les avait détruits et les avait rendus pareils à la poussière qu'on piétine.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Le reste des actes de Joachaz, tout ce qu'il a accompli et ses exploits, cela est décrit dans les annales des rois d'Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Joachaz se coucha avec ses ancêtres et on l'enterra à Samarie. Son fils Joas devint roi à sa place.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne de Joas sur Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: La trente-septième année du règne de Joas sur Juda, Joas, le fils de Joachaz, devint roi d'Israël à Samarie. Il régna 16 ans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Il fit ce qui est mal aux yeux de l'Eternel; il ne se détourna d'aucun des péchés de Jéroboam, fils de Nebath, qui avait fait pécher Israël, il persista sur cette voie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le reste des actes de Joas, tout ce qu'il a accompli, ses exploits et la guerre qu'il a menée contre Amatsia, le roi de Juda, cela est décrit dans les annales des rois d'Israël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Joas se coucha avec ses ancêtres et Jéroboam s'assit sur son trône. Joas fut enterré à Samarie avec les rois d'Israël.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mort d'Elisée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors qu''Elisée était atteint de la maladie dont il mourut, Joas, le roi d''Israël, descendit vers lui, pleura contre lui et dit: «Mon père! Mon père! Char et cavalerie d''Israël!» '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Elisée lui dit: «Prends un arc et des flèches.» Et il prit un arc et des flèches. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Puis Elisée dit au roi d''Israël: «Bande l''arc avec ta main.» Quand il l''eut fait, Elisée posa ses mains sur celles du roi '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'et dit: «Ouvre la fenêtre à l''est.» Et il l''ouvrit. Elisée dit: «Tire.» Et il tira. Elisée dit: «C''est une flèche de victoire de la part de l''Eternel, une flèche de victoire contre les Syriens. Tu battras les Syriens à Aphek jusqu''à leur extermination.» '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Elisée dit encore: «Prends les flèches.» Et il les prit. Elisée dit au roi d''Israël: «Frappe contre terre.» Il frappa 3 fois et s''arrêta. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'L''homme de Dieu s''irrita contre lui et dit: «Il fallait frapper 5 ou 6 fois; alors tu aurais battu les Syriens jusqu''à leur extermination. Désormais, tu ne les battras que 3 fois.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Elisée mourut et on l''enterra. L''année suivante, des troupes de Moabites pénétrèrent dans le pays. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: On était en train d'enterrer un homme quand on aperçut une de ces troupes, et on jeta l'homme dans le tombeau d'Elisée. En touchant les ossements d'Elisée, l'homme reprit vie et se leva sur ses pieds.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Hazaël, le roi de Syrie, avait opprimé Israël pendant toute la vie de Joachaz. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Mais l''Eternel leur fit grâce et eut compassion d''eux, il se tourna vers eux à cause de son alliance avec Abraham, Isaac et Jacob. Jusqu''à présent, il n''a pas voulu les détruire et il ne les a pas rejetés loin de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Hazaël, le roi de Syrie, mourut et son fils Ben-Hadad devint roi à sa place. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Joas, le fils de Joachaz, reprit à Ben-Hadad, le fils de Hazaël, les villes enlevées par Hazaël à son père Joachaz, pendant la guerre. Joas le battit 3 fois et récupéra les villes d'Israël.
