document_id: 2KI.13,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Règne de Joachaz sur Israël
  - type: text
    content: La vingt-troisième année du règne de Joas, le fils d'Achazia, sur Juda, Joachaz, le fils de Jéhu, devint roi d'Israël à Samarie. Il régna 17 ans.
  '10':
  - type: text
    content: La trente-septième année du règne de Joas sur Juda, Joas, le fils de Joachaz, devint roi d'Israël à Samarie. Il régna 16 ans.
  '11':
  - type: text
    content: Il fit ce qui est mal aux yeux de l'Eternel; il ne se détourna d'aucun des péchés de Jéroboam, fils de Nebath, qui avait fait pécher Israël, il persista sur cette voie.
  '12':
  - type: text
    content: Le reste des actes de Joas, tout ce qu'il a accompli, ses exploits et la guerre qu'il a menée contre Amatsia, le roi de Juda, cela est décrit dans les annales des rois d'Israël.
  '13':
  - type: text
    content: Joas se coucha avec ses ancêtres et Jéroboam s'assit sur son trône. Joas fut enterré à Samarie avec les rois d'Israël.
  - type: heading
    content: Mort d'Elisée
  '14':
  - type: text
    content: 'Alors qu''Elisée était atteint de la maladie dont il mourut, Joas, le roi d''Israël, descendit vers lui, pleura contre lui et dit: «Mon père! Mon père! Char et cavalerie d''Israël!» '
  '15':
  - type: text
    content: 'Elisée lui dit: «Prends un arc et des flèches.» Et il prit un arc et des flèches. '
  '16':
  - type: text
    content: 'Puis Elisée dit au roi d''Israël: «Bande l''arc avec ta main.» Quand il l''eut fait, Elisée posa ses mains sur celles du roi '
  '17':
  - type: text
    content: 'et dit: «Ouvre la fenêtre à l''est.» Et il l''ouvrit. Elisée dit: «Tire.» Et il tira. Elisée dit: «C''est une flèche de victoire de la part de l''Eternel, une flèche de victoire contre les Syriens. Tu battras les Syriens à Aphek jusqu''à leur extermination.» '
  '18':
  - type: text
    content: 'Elisée dit encore: «Prends les flèches.» Et il les prit. Elisée dit au roi d''Israël: «Frappe contre terre.» Il frappa 3 fois et s''arrêta. '
  '19':
  - type: text
    content: 'L''homme de Dieu s''irrita contre lui et dit: «Il fallait frapper 5 ou 6 fois; alors tu aurais battu les Syriens jusqu''à leur extermination. Désormais, tu ne les battras que 3 fois.»'
  '2':
  - type: text
    content: 'Il fit ce qui est mal aux yeux de l''Eternel; il commit les mêmes péchés que Jéroboam, fils de Nebath, qui avait fait pécher Israël, et il ne s''en détourna pas. '
  '20':
  - type: text
    content: 'Elisée mourut et on l''enterra. L''année suivante, des troupes de Moabites pénétrèrent dans le pays. '
  '21':
  - type: text
    content: On était en train d'enterrer un homme quand on aperçut une de ces troupes, et on jeta l'homme dans le tombeau d'Elisée. En touchant les ossements d'Elisée, l'homme reprit vie et se leva sur ses pieds.
  '22':
  - type: text
    content: 'Hazaël, le roi de Syrie, avait opprimé Israël pendant toute la vie de Joachaz. '
  '23':
  - type: text
    content: 'Mais l''Eternel leur fit grâce et eut compassion d''eux, il se tourna vers eux à cause de son alliance avec Abraham, Isaac et Jacob. Jusqu''à présent, il n''a pas voulu les détruire et il ne les a pas rejetés loin de lui. '
  '24':
  - type: text
    content: 'Hazaël, le roi de Syrie, mourut et son fils Ben-Hadad devint roi à sa place. '
  '25':
  - type: text
    content: Joas, le fils de Joachaz, reprit à Ben-Hadad, le fils de Hazaël, les villes enlevées par Hazaël à son père Joachaz, pendant la guerre. Joas le battit 3 fois et récupéra les villes d'Israël.
  '3':
  - type: text
    content: 'La colère de l''Eternel s''enflamma contre Israël et il les livra entre les mains de Hazaël, le roi de Syrie, et de son fils Ben-Hadad, et ce de façon durable. '
  '4':
  - type: text
    content: 'Joachaz implora l''Eternel. L''Eternel lui répondit, car il vit l''oppression sous laquelle le roi de Syrie tenait Israël, '
  '5':
  - type: text
    content: 'et il donna un libérateur à Israël. Les Israélites échappèrent à la domination des Syriens et habitèrent tranquillement chez eux comme avant. '
  '6':
  - type: text
    content: Cependant, ils ne se détournèrent pas des péchés de la famille de Jéroboam qui avait fait pécher Israël, ils persistèrent sur cette voie; le poteau d'Astarté
  - type: note
    content: 'Astarté: voir la note sur Juges 2.13.'
  - type: text
    content: ' était même dressé à Samarie. '
  '7':
  - type: text
    content: De toute l'armée de Joachaz, l'Eternel ne lui avait laissé que 50 cavaliers, 10 chars et 10'000 fantassins, car le roi de Syrie les avait détruits et les avait rendus pareils à la poussière qu'on piétine.
  '8':
  - type: text
    content: Le reste des actes de Joachaz, tout ce qu'il a accompli et ses exploits, cela est décrit dans les annales des rois d'Israël.
  '9':
  - type: text
    content: Joachaz se coucha avec ses ancêtres et on l'enterra à Samarie. Son fils Joas devint roi à sa place.
  - type: heading
    content: Règne de Joas sur Israël
