document_id: PRO.6,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le danger de se porter garant
  - type: text
    content: Mon fils, si tu t'es porté garant pour ton prochain,
  - type: text
    content: si tu t'es engagé pour autrui,
  '10':
  - type: text
    content: Tu veux somnoler un peu, te reposer encore,
  - type: text
    content: juste croiser les mains pour dormir?
  '11':
  - type: text
    content: Voilà que la pauvreté te surprend comme un rôdeur,
  - type: text
    content: et la misère comme un homme armé.
  - type: heading
    content: L'homme double
  '12':
  - type: text
    content: Le vaurien, l'homme injuste,
  - type: text
    content: marche la fausseté aux lèvres.
  '13':
  - type: text
    content: Il lance des clins d'œil, s'exprime du pied,
  - type: text
    content: fait des signes avec ses doigts.
  '14':
  - type: text
    content: La perversité est dans son cœur,
  - type: text
    content: il médite constamment le mal,
  - type: text
    content: il provoque des conflits.
  '15':
  - type: text
    content: C'est pourquoi la ruine le surprendra soudain,
  - type: text
    content: tout d'un coup il sera brisé sans remède.
  '16':
  - type: text
    content: Il y a six choses que l'Eternel déteste,
  - type: text
    content: 'et même sept dont il a horreur:'
  '17':
  - type: text
    content: les yeux hautains, la langue menteuse,
  - type: text
    content: les mains qui versent le sang innocent,
  '18':
  - type: text
    content: le cœur qui médite des projets injustes,
  - type: text
    content: les pieds qui se dépêchent de courir au mal,
  '19':
  - type: text
    content: le faux témoin qui dit des mensonges
  - type: text
    content: et celui qui provoque des conflits entre frères.
  - type: heading
    content: Les conséquences de l'adultère
  '2':
  - type: text
    content: si tu te trouves piégé par les paroles de ta bouche,
  - type: text
    content: si tu es prisonnier de tes propres paroles,
  '20':
  - type: text
    content: Mon fils, garde le commandement de ton père
  - type: text
    content: et ne rejette pas l'enseignement de ta mère!
  '21':
  - type: text
    content: Lie-les constamment sur ton cœur,
  - type: text
    content: attache-les à ton cou!
  '22':
  - type: text
    content: Ils te dirigeront dans ta marche,
  - type: text
    content: ils te garderont dans ton lit,
  - type: text
    content: ils te parleront à ton réveil.
  '23':
  - type: text
    content: En effet, le commandement est une lampe et l'enseignement une lumière,
  - type: text
    content: et les avertissements de l'instruction sont le chemin de la vie.
  '24':
  - type: text
    content: Ils te préserveront de la femme mauvaise,
  - type: text
    content: des flatteries de l'inconnue.
  '25':
  - type: text
    content: Ne convoite pas sa beauté dans ton cœur,
  - type: text
    content: ne te laisse pas prendre par ses œillades!
  '26':
  - type: text
    content: En effet, pour la femme prostituée on se réduit à un morceau de pain
  - type: text
    content: et la femme mariée capture une vie précieuse.
  '27':
  - type: text
    content: Peut-on prendre du feu contre soi
  - type: text
    content: sans que les habits ne s'enflamment?
  '28':
  - type: text
    content: Peut-on marcher sur des charbons ardents
  - type: text
    content: sans se brûler les pieds?
  '29':
  - type: text
    content: 'Il en va de même pour celui qui s''approche de la femme de son prochain:'
  - type: text
    content: celui qui la touche ne restera pas impuni.
  '3':
  - type: text
    content: 'fais donc ceci, mon fils: dégage-toi,'
  - type: text
    content: puisque tu es tombé au pouvoir de ton prochain.
  - type: text
    content: Va le supplier et insister auprès de lui,
  '30':
  - type: text
    content: On ne méprise pas le voleur qui vole
  - type: text
    content: pour s'alimenter, parce qu'il a faim,
  '31':
  - type: text
    content: mais, si on le trouve, il fait une restitution au septuple,
  - type: text
    content: il donne tous les biens de sa maison.
  '32':
  - type: text
    content: Celui qui commet un adultère avec une femme manque de bon sens.
  - type: text
    content: 'Il veut se détruire lui-même, celui qui agit de cette manière:'
  '33':
  - type: text
    content: il ne trouvera que blessures et déshonneur,
  - type: text
    content: et sa honte ne s'effacera pas.
  '34':
  - type: text
    content: En effet, la jalousie rend un homme furieux,
  - type: text
    content: et il est sans pitié, le jour de la vengeance;
  '35':
  - type: text
    content: il n'accepte aucune rançon
  - type: text
    content: et il ne cède pas, même si tu multiplies les cadeaux.
  '4':
  - type: text
    content: n'accorde ni sommeil à tes yeux
  - type: text
    content: ni repos à tes paupières,
  '5':
  - type: text
    content: dégage-toi comme la gazelle de la main du chasseur,
  - type: text
    content: comme l'oiseau de la main de l'oiseleur.
  - type: heading
    content: La paresse
  '6':
  - type: text
    content: Va vers la fourmi, paresseux!
  - type: text
    content: 'Observe son comportement et deviens sage:'
  '7':
  - type: text
    content: elle n'a ni chef,
  - type: text
    content: ni inspecteur, ni supérieur;
  '8':
  - type: text
    content: en été elle prépare sa nourriture,
  - type: text
    content: pendant la moisson elle récolte de quoi manger.
  '9':
  - type: text
    content: Paresseux, jusqu'à quand resteras-tu couché?
  - type: text
    content: Quand te lèveras-tu de ton sommeil?
