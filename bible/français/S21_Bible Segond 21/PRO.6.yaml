document_id: PRO.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le danger de se porter garant
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Mon fils, si tu t'es porté garant pour ton prochain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si tu t'es engagé pour autrui,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: si tu te trouves piégé par les paroles de ta bouche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si tu es prisonnier de tes propres paroles,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'fais donc ceci, mon fils: dégage-toi,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: puisque tu es tombé au pouvoir de ton prochain.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Va le supplier et insister auprès de lui,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: n'accorde ni sommeil à tes yeux
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni repos à tes paupières,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: dégage-toi comme la gazelle de la main du chasseur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme l'oiseau de la main de l'oiseleur.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La paresse
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Va vers la fourmi, paresseux!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Observe son comportement et deviens sage:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: elle n'a ni chef,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ni inspecteur, ni supérieur;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: en été elle prépare sa nourriture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pendant la moisson elle récolte de quoi manger.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Paresseux, jusqu'à quand resteras-tu couché?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand te lèveras-tu de ton sommeil?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Tu veux somnoler un peu, te reposer encore,
- type: usfm
  marker: q1
  children:
  - type: text
    text: juste croiser les mains pour dormir?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Voilà que la pauvreté te surprend comme un rôdeur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la misère comme un homme armé.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'homme double
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Le vaurien, l'homme injuste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: marche la fausseté aux lèvres.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Il lance des clins d'œil, s'exprime du pied,
- type: usfm
  marker: q1
  children:
  - type: text
    text: fait des signes avec ses doigts.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: La perversité est dans son cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il médite constamment le mal,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il provoque des conflits.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: C'est pourquoi la ruine le surprendra soudain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout d'un coup il sera brisé sans remède.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Il y a six choses que l'Eternel déteste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et même sept dont il a horreur:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: les yeux hautains, la langue menteuse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les mains qui versent le sang innocent,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: le cœur qui médite des projets injustes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les pieds qui se dépêchent de courir au mal,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: le faux témoin qui dit des mensonges
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celui qui provoque des conflits entre frères.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les conséquences de l'adultère
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Mon fils, garde le commandement de ton père
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ne rejette pas l'enseignement de ta mère!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Lie-les constamment sur ton cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: attache-les à ton cou!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ils te dirigeront dans ta marche,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils te garderont dans ton lit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils te parleront à ton réveil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: En effet, le commandement est une lampe et l'enseignement une lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les avertissements de l'instruction sont le chemin de la vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Ils te préserveront de la femme mauvaise,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des flatteries de l'inconnue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Ne convoite pas sa beauté dans ton cœur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne te laisse pas prendre par ses œillades!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: En effet, pour la femme prostituée on se réduit à un morceau de pain
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la femme mariée capture une vie précieuse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Peut-on prendre du feu contre soi
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans que les habits ne s'enflamment?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Peut-on marcher sur des charbons ardents
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans se brûler les pieds?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Il en va de même pour celui qui s''approche de la femme de son prochain:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui la touche ne restera pas impuni.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: On ne méprise pas le voleur qui vole
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour s'alimenter, parce qu'il a faim,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: mais, si on le trouve, il fait une restitution au septuple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il donne tous les biens de sa maison.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Celui qui commet un adultère avec une femme manque de bon sens.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Il veut se détruire lui-même, celui qui agit de cette manière:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: il ne trouvera que blessures et déshonneur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa honte ne s'effacera pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: En effet, la jalousie rend un homme furieux,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il est sans pitié, le jour de la vengeance;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: il n'accepte aucune rançon
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il ne cède pas, même si tu multiplies les cadeaux.
