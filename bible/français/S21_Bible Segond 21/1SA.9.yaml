document_id: 1SA.9,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saül auprès de Samuel à Rama
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y avait un homme de Benjamin, appelé Kis. Il était fils d''Abiel, petit-fils de Tseror, descendant de Becorath, d''Aphiach, lui-même fils d''un Benjaminite. C''était un vaillant guerrier. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saül dit à son serviteur: «Tu as raison. Viens, allons-y!» Et ils se rendirent à la ville où se trouvait l''homme de Dieu.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors qu''ils montaient à la ville, ils rencontrèrent des jeunes filles sorties pour puiser de l''eau et ils leur demandèrent: «Le voyant est-il ici?» '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elles leur répondirent: «Oui, il est devant toi, mais dépêche-toi: il est venu aujourd''hui en ville parce qu''il y a un sacrifice pour le peuple sur le haut lieu'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le haut lieu: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: les Israélites ont suivi les coutumes des populations cananéennes en érigeant des autels sur des collines (ou d'autres sites en plein air); à cette époque-là, il n'y avait plus de sanctuaire central pour le culte de l'Eternel, après l'épisode de la prise de l'arche de l'alliance à Silo (chapitres 4–7).
      marker-yv: yv-n
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dès que vous serez entrés dans la ville, vous pourrez le trouver avant qu''il ne monte au haut lieu pour manger. En effet, le peuple ne mangera pas avant son arrivée, parce qu''il doit bénir le sacrifice; après cela seulement, les invités mangeront. Montez donc, car vous le trouverez maintenant.» '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils montèrent alors à la ville. Ils étaient arrivés au milieu de la ville quand ils rencontrèrent Samuel qui sortait pour monter au haut lieu. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, un jour avant l''arrivée de Saül, l''Eternel avait averti Samuel en disant: '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Demain, à cette heure-ci, je t''enverrai un homme du pays de Benjamin. Tu le désigneras par onction comme chef de mon peuple, d''Israël. Il sauvera mon peuple de l''oppression des Philistins. En effet, j''ai regardé mon peuple parce que son cri est venu jusqu''à moi.» '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Samuel eut aperçu Saül, l''Eternel lui dit: «Voici l''homme dont je t''ai parlé, c''est lui qui régnera sur mon peuple.»'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saül s''approcha de Samuel au milieu de la porte de la ville et lui dit: «Indique-moi, je t''en prie, où se trouve la maison du voyant.» '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel répondit à Saül: «C''est moi qui suis le voyant. Monte devant moi au haut lieu et vous mangerez aujourd''hui avec moi. Je te laisserai partir demain, après t''avoir donné réponse pour tout ce qui te préoccupe. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Il avait un fils du nom de Saül, qui était jeune et beau, plus beau que tous les Israélites, et qui les dépassait tous d'une tête.
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne t''inquiète pas pour les ânesses que tu as perdues il y a trois jours, car elles sont retrouvées. Et pour qui est réservé tout ce qu''il y a de précieux en Israël? N''est-ce pas pour toi et pour toute ta famille?» '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saül répondit: «Ne suis-je pas benjaminite, membre de l''une des plus petites tribus d''Israël, et mon clan n''est-il pas le plus insignifiant de tous ceux que compte la tribu de Benjamin? Pourquoi donc me tiens-tu ce discours?»'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel prit Saül et son serviteur, les fit entrer dans la salle et leur donna une place à la tête des invités. Il y avait là une trentaine d''hommes. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Samuel dit au cuisinier: «Sers la portion que je t''ai donnée en te disant de la mettre à part.» '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le cuisinier préleva la cuisse et ce qui l''entoure, et il la servit à Saül. Samuel dit: «Voici ce qui a été réservé. Sers-toi et mange, car on l''a gardé pour toi lorsque j''ai invité le peuple.» Ainsi, Saül mangea avec Samuel ce jour-là.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils redescendirent du haut lieu à la ville et Samuel s''entretint avec Saül sur la terrasse du toit. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis ils se levèrent de bon matin. A l''aurore, Samuel appela Saül sur le toit en disant: «Viens et je te laisserai partir.» Saül se leva et ils sortirent tous les deux, Samuel et lui. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand ils furent descendus à la limite de la ville, Samuel dit à Saül: «Dis à ton serviteur de passer devant nous.» Le serviteur passa devant. «Arrête-toi maintenant, reprit Samuel, et je vais te faire connaître la parole de Dieu.»'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les ânesses de Kis, le père de Saül, s''égarèrent et Kis dit à son fils Saül: «Prends avec toi l''un des serviteurs, lève-toi et va à la recherche des ânesses.» '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saül traversa la région montagneuse d''Ephraïm et le pays de Shalisha sans les trouver; ils passèrent par le pays de Shaalim et elles n''y étaient pas; ils parcoururent le pays de Benjamin et ils ne les trouvèrent pas. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils étaient arrivés dans le pays de Tsuph, lorsque Saül dit au serviteur qui l''accompagnait: «Viens, retournons chez nous. Sinon mon père oubliera les ânesses et s''inquiétera pour nous.» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le serviteur lui dit: «Il y a dans cette ville un homme de Dieu, et c''est un homme estimé. Tout ce qu''il dit arrive à coup sûr. Allons-y donc! Peut-être nous fera-t-il connaître le chemin que nous devons prendre.» '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saül dit à son serviteur: «Mais si nous y allons, qu''apporterons-nous à l''homme de Dieu? En effet, il n''y a plus de provisions dans nos sacs et nous n''avons aucun cadeau à lui offrir. Qu''avons-nous?» '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le serviteur reprit la parole et dit à Saül: «J''ai sur moi un peu d''argent; je le donnerai à l''homme de Dieu et il nous indiquera notre chemin.» '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand on allait consulter Dieu, on disait autrefois en Israël: «Venez, allons trouver le voyant!» Celui qu''on appelle aujourd''hui «prophète» s''appelait en effet autrefois «voyant». '
