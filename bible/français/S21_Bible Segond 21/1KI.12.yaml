document_id: 1KI.12
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Le schisme et ses suites
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 12.1–22.54
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Accession au trône de Roboam et Jéroboam
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Roboam se rendit à Sichem, car tout Israël y était venu pour le proclamer roi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Lorsque Jéroboam, le fils de Nebath, l''apprit, il se trouvait encore en Egypte, où il s''était enfui loin du roi Salomon, et c''était là qu''il était installé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'On le fit appeler. Jéroboam et toute l''assemblée d''Israël vinrent alors trouver Roboam et lui dirent: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '«Ton père a exercé une dure domination sur nous. Quant à toi, maintenant, allège le dur service et la domination particulièrement lourde que nous a imposés ton père, et nous te servirons.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il leur répondit: «Allez-vous-en et revenez vers moi dans 3 jours.» Et le peuple s''en alla.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le roi Roboam consulta les anciens qui avaient été au service de son père Salomon pendant sa vie. Il leur demanda: «Que me conseillez-vous de répondre à ce peuple?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Voici ce qu''ils lui dirent: «Si aujourd''hui tu as une attitude de serviteur envers ce peuple, si tu te montres à leur service et si tu leur réponds de façon positive en leur adressant des paroles bienveillantes, ils seront pour toujours tes serviteurs.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais Roboam délaissa le conseil que lui donnaient les anciens et consulta les jeunes qui avaient grandi avec lui et qui faisaient partie de son entourage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il leur demanda: «Que me conseillez-vous de répondre à ce peuple? Ils me tiennent ce langage: ‘Allège la domination que ton père nous a imposée!’» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Voici ce que lui dirent les jeunes qui avaient grandi avec lui: «Le peuple t''a tenu ce langage: ‘Ton père nous a imposé une domination particulièrement lourde, mais toi, allège son poids!’ De ton côté, dis-leur: ‘Mon petit doigt est plus gros que les reins de mon père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mon père vous a imposé une domination particulièrement lourde, eh bien, moi je la rendrai plus lourde encore. Lui vous a punis avec des fouets, moi je vous punirai avec des fouets munis de pointes.’»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jéroboam et tout le peuple vinrent trouver Roboam le troisième jour, conformément à ce qu''avait dit le roi: «Revenez vers moi dans 3 jours.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le roi répondit avec dureté au peuple. Il délaissa le conseil que lui avaient donné les anciens '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'et leur dit, d''après le conseil des jeunes: «Mon père vous a imposé une domination particulièrement lourde, moi je la rendrai plus lourde encore. Lui vous a punis avec des fouets, moi je vous punirai avec des fouets munis de pointes.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ainsi, le roi n'écouta pas le peuple. Cela fut en effet conduit par l'Eternel pour que s'accomplisse la parole qu'il avait dite par l'intermédiaire d'Achija de Silo à Jéroboam, le fils de Nebath.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Lorsque tous les membres du peuple d''Israël virent que le roi ne les écoutait pas, ils lui répondirent: «Quelle part avons-nous avec David? Nous n''avons pas d''héritage avec le fils d''Isaï! A tes tentes, Israël! Maintenant, occupe-toi des tiens, David!» Et Israël retourna dans ses tentes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les Israélites qui habitaient les villes de Juda furent les seuls qui reconnurent Roboam comme roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors le roi Roboam envoya Adoram, qui était préposé aux corvées, vers les Israélites, mais ils le lapidèrent et il mourut. Le roi Roboam s''empressa de monter sur un char pour se réfugier à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: C'est ainsi qu'Israël s'est détaché de la famille de David jusqu'à aujourd'hui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Lorsqu'ils apprirent que Jéroboam était de retour, les Israélites le firent venir à leur assemblée et ils le proclamèrent roi sur tout Israël. Ils ne suivirent pas la famille de David, à la seule exception de la tribu de Juda.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'A son arrivée à Jérusalem, Roboam rassembla toute la communauté de Juda et la tribu de Benjamin, soit 180''000 hommes d''élite aptes à la guerre, pour qu''ils combattent contre la communauté d''Israël afin de la ramener sous sa domination, lui qui était le fils de Salomon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais la parole de Dieu fut adressée à Shemaeja, l''homme de Dieu: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '«Parle à Roboam, le fils de Salomon et le roi de Juda, ainsi qu''à toute la communauté de Juda et de Benjamin et au reste du peuple. Annonce-leur: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: '‘Voici ce que dit l''Eternel: Ne montez pas faire la guerre à vos frères, les Israélites! Que chacun de vous reparte chez lui, car c''est de moi que vient cette situation.’» Ils obéirent à la parole de l''Eternel et firent demi-tour, se conformant à la parole de l''Eternel.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règne de Jéroboam sur Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Jéroboam fortifia Sichem, dans la région montagneuse d'Ephraïm, et il s'y installa; puis il la quitta et construisit Penuel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Jéroboam dit dans son cœur: «La royauté pourrait bien désormais revenir à la famille de David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Si les membres de ce peuple montent à Jérusalem pour faire des sacrifices dans la maison de l''Eternel, leur cœur retournera à leur seigneur, à Roboam, le roi de Juda. Ils me tueront alors et retourneront à Roboam, le roi de Juda.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Après avoir demandé conseil, le roi fabriqua deux veaux d''or et dit au peuple: «Cela fait assez longtemps que vous montez à Jérusalem. *Israël, voici tes dieux qui t''ont fait sortir d''Egypte.'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Israël… d''Egypte: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: mêmes mots dans la bouche des Israélites lors de l'épisode du veau d'or au pied du Sinaï (
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 32.4
      metadata:
        usfm: EXO.32.4
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Il plaça l''un de ces veaux à Béthel et donna l''autre à Dan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Cela fut une cause de péché. Le peuple marcha devant l''un des veaux jusqu''à Dan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Jéroboam y établit un centre de hauts lieux et il institua des prêtres pris dans l'ensemble du peuple, qui ne faisaient pas partie des Lévites
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Lévites: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tribu à laquelle les fonctions liées au culte de l'Eternel étaient réservées.
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il instaura, le quinzième jour du huitième mois, une fête pareille à celle qui se célébrait en Juda et il offrit des sacrifices sur l''autel. Il agit de la même manière à Béthel afin que l''on y offre des sacrifices aux veaux qu''il avait faits, et il y plaça les prêtres des hauts lieux qu''il avait institués. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Le quinzième jour du huitième mois, mois qu'il avait choisi de lui-même, il offrit des sacrifices sur l'autel qu'il avait érigé à Béthel. Il fit une fête pour les Israélites et il monta sur l'autel pour brûler des parfums.
