document_id: 1KI.12,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le schisme et ses suites
  - type: heading
    content: 12.1–22.54
  - type: heading
    content: Accession au trône de Roboam et Jéroboam
  - type: text
    content: Roboam se rendit à Sichem, car tout Israël y était venu pour le proclamer roi.
  '10':
  - type: text
    content: 'Voici ce que lui dirent les jeunes qui avaient grandi avec lui: «Le peuple t''a tenu ce langage: ‘Ton père nous a imposé une domination particulièrement lourde, mais toi, allège son poids!’ De ton côté, dis-leur: ‘Mon petit doigt est plus gros que les reins de mon père. '
  '11':
  - type: text
    content: Mon père vous a imposé une domination particulièrement lourde, eh bien, moi je la rendrai plus lourde encore. Lui vous a punis avec des fouets, moi je vous punirai avec des fouets munis de pointes.’»
  '12':
  - type: text
    content: 'Jéroboam et tout le peuple vinrent trouver Roboam le troisième jour, conformément à ce qu''avait dit le roi: «Revenez vers moi dans 3 jours.» '
  '13':
  - type: text
    content: 'Le roi répondit avec dureté au peuple. Il délaissa le conseil que lui avaient donné les anciens '
  '14':
  - type: text
    content: 'et leur dit, d''après le conseil des jeunes: «Mon père vous a imposé une domination particulièrement lourde, moi je la rendrai plus lourde encore. Lui vous a punis avec des fouets, moi je vous punirai avec des fouets munis de pointes.» '
  '15':
  - type: text
    content: Ainsi, le roi n'écouta pas le peuple. Cela fut en effet conduit par l'Eternel pour que s'accomplisse la parole qu'il avait dite par l'intermédiaire d'Achija de Silo à Jéroboam, le fils de Nebath.
  '16':
  - type: text
    content: 'Lorsque tous les membres du peuple d''Israël virent que le roi ne les écoutait pas, ils lui répondirent: «Quelle part avons-nous avec David? Nous n''avons pas d''héritage avec le fils d''Isaï! A tes tentes, Israël! Maintenant, occupe-toi des tiens, David!» Et Israël retourna dans ses tentes. '
  '17':
  - type: text
    content: 'Les Israélites qui habitaient les villes de Juda furent les seuls qui reconnurent Roboam comme roi. '
  '18':
  - type: text
    content: 'Alors le roi Roboam envoya Adoram, qui était préposé aux corvées, vers les Israélites, mais ils le lapidèrent et il mourut. Le roi Roboam s''empressa de monter sur un char pour se réfugier à Jérusalem. '
  '19':
  - type: text
    content: C'est ainsi qu'Israël s'est détaché de la famille de David jusqu'à aujourd'hui.
  '2':
  - type: text
    content: 'Lorsque Jéroboam, le fils de Nebath, l''apprit, il se trouvait encore en Egypte, où il s''était enfui loin du roi Salomon, et c''était là qu''il était installé. '
  '20':
  - type: text
    content: Lorsqu'ils apprirent que Jéroboam était de retour, les Israélites le firent venir à leur assemblée et ils le proclamèrent roi sur tout Israël. Ils ne suivirent pas la famille de David, à la seule exception de la tribu de Juda.
  '21':
  - type: text
    content: 'A son arrivée à Jérusalem, Roboam rassembla toute la communauté de Juda et la tribu de Benjamin, soit 180''000 hommes d''élite aptes à la guerre, pour qu''ils combattent contre la communauté d''Israël afin de la ramener sous sa domination, lui qui était le fils de Salomon. '
  '22':
  - type: text
    content: 'Mais la parole de Dieu fut adressée à Shemaeja, l''homme de Dieu: '
  '23':
  - type: text
    content: '«Parle à Roboam, le fils de Salomon et le roi de Juda, ainsi qu''à toute la communauté de Juda et de Benjamin et au reste du peuple. Annonce-leur: '
  '24':
  - type: text
    content: '‘Voici ce que dit l''Eternel: Ne montez pas faire la guerre à vos frères, les Israélites! Que chacun de vous reparte chez lui, car c''est de moi que vient cette situation.’» Ils obéirent à la parole de l''Eternel et firent demi-tour, se conformant à la parole de l''Eternel.'
  - type: heading
    content: Règne de Jéroboam sur Israël
  '25':
  - type: text
    content: Jéroboam fortifia Sichem, dans la région montagneuse d'Ephraïm, et il s'y installa; puis il la quitta et construisit Penuel.
  '26':
  - type: text
    content: 'Jéroboam dit dans son cœur: «La royauté pourrait bien désormais revenir à la famille de David. '
  '27':
  - type: text
    content: 'Si les membres de ce peuple montent à Jérusalem pour faire des sacrifices dans la maison de l''Eternel, leur cœur retournera à leur seigneur, à Roboam, le roi de Juda. Ils me tueront alors et retourneront à Roboam, le roi de Juda.» '
  '28':
  - type: text
    content: 'Après avoir demandé conseil, le roi fabriqua deux veaux d''or et dit au peuple: «Cela fait assez longtemps que vous montez à Jérusalem. *Israël, voici tes dieux qui t''ont fait sortir d''Egypte.'
  - type: note
    content: 'Israël… d''Egypte: mêmes mots dans la bouche des Israélites lors de l''épisode du veau d''or au pied du Sinaï (Exode 32.4).'
  - type: text
    content: '» '
  '29':
  - type: text
    content: 'Il plaça l''un de ces veaux à Béthel et donna l''autre à Dan. '
  '3':
  - type: text
    content: 'On le fit appeler. Jéroboam et toute l''assemblée d''Israël vinrent alors trouver Roboam et lui dirent: '
  '30':
  - type: text
    content: 'Cela fut une cause de péché. Le peuple marcha devant l''un des veaux jusqu''à Dan. '
  '31':
  - type: text
    content: Jéroboam y établit un centre de hauts lieux et il institua des prêtres pris dans l'ensemble du peuple, qui ne faisaient pas partie des Lévites
  - type: note
    content: 'Lévites: tribu à laquelle les fonctions liées au culte de l''Eternel étaient réservées.'
  - type: text
    content: '. '
  '32':
  - type: text
    content: 'Il instaura, le quinzième jour du huitième mois, une fête pareille à celle qui se célébrait en Juda et il offrit des sacrifices sur l''autel. Il agit de la même manière à Béthel afin que l''on y offre des sacrifices aux veaux qu''il avait faits, et il y plaça les prêtres des hauts lieux qu''il avait institués. '
  '33':
  - type: text
    content: Le quinzième jour du huitième mois, mois qu'il avait choisi de lui-même, il offrit des sacrifices sur l'autel qu'il avait érigé à Béthel. Il fit une fête pour les Israélites et il monta sur l'autel pour brûler des parfums.
  '4':
  - type: text
    content: '«Ton père a exercé une dure domination sur nous. Quant à toi, maintenant, allège le dur service et la domination particulièrement lourde que nous a imposés ton père, et nous te servirons.» '
  '5':
  - type: text
    content: 'Il leur répondit: «Allez-vous-en et revenez vers moi dans 3 jours.» Et le peuple s''en alla.'
  '6':
  - type: text
    content: 'Le roi Roboam consulta les anciens qui avaient été au service de son père Salomon pendant sa vie. Il leur demanda: «Que me conseillez-vous de répondre à ce peuple?» '
  '7':
  - type: text
    content: 'Voici ce qu''ils lui dirent: «Si aujourd''hui tu as une attitude de serviteur envers ce peuple, si tu te montres à leur service et si tu leur réponds de façon positive en leur adressant des paroles bienveillantes, ils seront pour toujours tes serviteurs.» '
  '8':
  - type: text
    content: 'Mais Roboam délaissa le conseil que lui donnaient les anciens et consulta les jeunes qui avaient grandi avec lui et qui faisaient partie de son entourage. '
  '9':
  - type: text
    content: 'Il leur demanda: «Que me conseillez-vous de répondre à ce peuple? Ils me tiennent ce langage: ‘Allège la domination que ton père nous a imposée!’» '
