document_id: PSA.113,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Bonté de Dieu pour les faibles
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l'Eternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Serviteurs de l'Eternel, louez,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: louez le nom de l'Eternel!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le nom de l'Eternel soit béni,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dès maintenant et pour toujours!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Du lever du soleil jusqu'à son coucher,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que le nom de l'Eternel soit célébré!
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel domine toutes les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa gloire s'élève plus haut que le ciel.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui est semblable à l'Eternel, notre Dieu?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il a sa demeure en haut,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et il s'abaisse pour regarder
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le ciel et la terre.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De la poussière il relève le faible, du fumier il retire le pauvre,
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour les faire asseoir avec les grands,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec les grands de son peuple.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il donne une famille à celle qui était stérile,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il fait d'elle une mère joyeuse au milieu de ses enfants.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Louez l'Eternel!
