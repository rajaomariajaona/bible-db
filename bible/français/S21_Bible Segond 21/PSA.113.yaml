document_id: PSA.113,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Bonté de Dieu pour les faibles
  - type: text
    content: Louez l'Eternel!
  - type: text
    content: Serviteurs de l'Eternel, louez,
  - type: text
    content: louez le nom de l'Eternel!
  '2':
  - type: text
    content: Que le nom de l'Eternel soit béni,
  - type: text
    content: dès maintenant et pour toujours!
  '3':
  - type: text
    content: Du lever du soleil jusqu'à son coucher,
  - type: text
    content: que le nom de l'Eternel soit célébré!
  '4':
  - type: text
    content: L'Eternel domine toutes les nations,
  - type: text
    content: sa gloire s'élève plus haut que le ciel.
  '5':
  - type: text
    content: Qui est semblable à l'Eternel, notre Dieu?
  - type: text
    content: Il a sa demeure en haut,
  '6':
  - type: text
    content: et il s'abaisse pour regarder
  - type: text
    content: le ciel et la terre.
  '7':
  - type: text
    content: De la poussière il relève le faible, du fumier il retire le pauvre,
  '8':
  - type: text
    content: pour les faire asseoir avec les grands,
  - type: text
    content: avec les grands de son peuple.
  '9':
  - type: text
    content: Il donne une famille à celle qui était stérile,
  - type: text
    content: il fait d'elle une mère joyeuse au milieu de ses enfants.
  - type: text
    content: Louez l'Eternel!
