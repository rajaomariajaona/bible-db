document_id: 2KI.24,152
type_code: fra
verses:
  '1':
  - type: text
    content: 'A son époque, Nebucadnetsar, le roi de Babylone, partit en campagne. Jojakim lui fut asservi pendant 3 ans, mais il se révolta de nouveau contre lui. '
  '10':
  - type: text
    content: 'C''est à cette époque que les serviteurs de Nebucadnetsar, le roi de Babylone, montèrent contre Jérusalem, et la ville fut en état de siège. '
  '11':
  - type: text
    content: 'Nebucadnetsar, le roi de Babylone, arriva devant la ville pendant que ses serviteurs en faisaient le siège. '
  '12':
  - type: text
    content: 'Alors Jojakin, le roi de Juda, sortit vers le roi de Babylone avec sa mère, ses serviteurs, ses chefs et ses eunuques et le roi de Babylone le fit prisonnier. C''était la huitième année de son règne. '
  '13':
  - type: text
    content: 'Il emporta de là tous les trésors de la maison de l''Eternel ainsi que ceux du palais royal, il brisa tous les ustensiles en or que Salomon, le roi d''Israël, avait faits dans le temple de l''Eternel. Cela se passa comme l''Eternel l''avait annoncé. '
  '14':
  - type: text
    content: 'Il emmena en exil tout Jérusalem, tous les chefs et tous les hommes vaillants. Il y eut 10''000 exilés, avec tous les charpentiers et les serruriers. Il ne resta que les pauvres du pays. '
  '15':
  - type: text
    content: 'Il exila Jojakin à Babylone et il emmena en exil de Jérusalem à Babylone la mère du roi, ses femmes, ses eunuques et les grands du pays, '
  '16':
  - type: text
    content: 'tous les guerriers au nombre de 7000, ainsi que les charpentiers et les serruriers au nombre de 1000, tous ceux qui étaient des hommes vaillants, aptes à la guerre. Le roi de Babylone les fit venir en exil à Babylone, '
  '17':
  - type: text
    content: et il établit roi à la place de Jojakin son oncle Matthania, dont il changea le nom en Sédécias.
  - type: heading
    content: Règne de Sédécias sur Juda
  '18':
  - type: text
    content: Sédécias avait 21 ans lorsqu'il devint roi et il régna 11 ans à Jérusalem. Sa mère s'appelait Hamuthal et c'était la fille de Jérémie, de Libna.
  '19':
  - type: text
    content: 'Il fit ce qui est mal aux yeux de l''Eternel, entièrement comme l''avait fait Jojakim. '
  '2':
  - type: text
    content: 'Alors l''Eternel envoya contre Jojakim des troupes de Babyloniens, des troupes de Syriens, des troupes de Moabites et des troupes d''Ammonites. L''Eternel les envoya contre Juda pour le détruire, conformément à la parole qu''il avait prononcée par l''intermédiaire de ses serviteurs les prophètes. '
  '20':
  - type: text
    content: 'Cela arriva à cause de la colère de l''Eternel contre Jérusalem et contre Juda: il était si irrité qu''il voulait les rejeter loin de lui. Sédécias se révolta contre le roi de Babylone.'
  '3':
  - type: text
    content: 'Tout cela arriva uniquement sur l''ordre de l''Eternel: il voulait éloigner Juda de lui à cause de tous les péchés commis par Manassé '
  '4':
  - type: text
    content: et à cause du sang innocent que Manassé avait versé et dont il avait rempli Jérusalem. L'Eternel ne voulut pas pardonner.
  '5':
  - type: text
    content: Le reste des actes de Jojakim, tout ce qu'il a accompli, cela est décrit dans les annales des rois de Juda.
  '6':
  - type: text
    content: Jojakim se coucha avec ses ancêtres. Son fils Jojakin devint roi à sa place.
  '7':
  - type: text
    content: Le roi d'Egypte ne quitta plus son pays, car le roi de Babylone avait pris tout ce qui lui appartenait, depuis le torrent d'Egypte jusqu'à l'Euphrate.
  - type: heading
    content: Règne de Jojakin sur Juda
  '8':
  - type: text
    content: Jojakin avait 18 ans lorsqu'il devint roi et il régna 3 mois à Jérusalem. Sa mère s'appelait Nehushtha et c'était la fille d'Elnathan, de Jérusalem.
  '9':
  - type: text
    content: Il fit ce qui est mal aux yeux de l'Eternel, entièrement comme l'avait fait son père.
