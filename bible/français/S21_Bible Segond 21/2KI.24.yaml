document_id: 2KI.24,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'A son époque, Nebucadnetsar, le roi de Babylone, partit en campagne. Jojakim lui fut asservi pendant 3 ans, mais il se révolta de nouveau contre lui. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'C''est à cette époque que les serviteurs de Nebucadnetsar, le roi de Babylone, montèrent contre Jérusalem, et la ville fut en état de siège. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Nebucadnetsar, le roi de Babylone, arriva devant la ville pendant que ses serviteurs en faisaient le siège. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Alors Jojakin, le roi de Juda, sortit vers le roi de Babylone avec sa mère, ses serviteurs, ses chefs et ses eunuques et le roi de Babylone le fit prisonnier. C''était la huitième année de son règne. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Il emporta de là tous les trésors de la maison de l''Eternel ainsi que ceux du palais royal, il brisa tous les ustensiles en or que Salomon, le roi d''Israël, avait faits dans le temple de l''Eternel. Cela se passa comme l''Eternel l''avait annoncé. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Il emmena en exil tout Jérusalem, tous les chefs et tous les hommes vaillants. Il y eut 10''000 exilés, avec tous les charpentiers et les serruriers. Il ne resta que les pauvres du pays. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Il exila Jojakin à Babylone et il emmena en exil de Jérusalem à Babylone la mère du roi, ses femmes, ses eunuques et les grands du pays, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'tous les guerriers au nombre de 7000, ainsi que les charpentiers et les serruriers au nombre de 1000, tous ceux qui étaient des hommes vaillants, aptes à la guerre. Le roi de Babylone les fit venir en exil à Babylone, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: et il établit roi à la place de Jojakin son oncle Matthania, dont il changea le nom en Sédécias.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règne de Sédécias sur Juda
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Sédécias avait 21 ans lorsqu'il devint roi et il régna 11 ans à Jérusalem. Sa mère s'appelait Hamuthal et c'était la fille de Jérémie, de Libna.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Il fit ce qui est mal aux yeux de l''Eternel, entièrement comme l''avait fait Jojakim. '
  '2':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Alors l''Eternel envoya contre Jojakim des troupes de Babyloniens, des troupes de Syriens, des troupes de Moabites et des troupes d''Ammonites. L''Eternel les envoya contre Juda pour le détruire, conformément à la parole qu''il avait prononcée par l''intermédiaire de ses serviteurs les prophètes. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Cela arriva à cause de la colère de l''Eternel contre Jérusalem et contre Juda: il était si irrité qu''il voulait les rejeter loin de lui. Sédécias se révolta contre le roi de Babylone.'
  '3':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tout cela arriva uniquement sur l''ordre de l''Eternel: il voulait éloigner Juda de lui à cause de tous les péchés commis par Manassé '
  '4':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: et à cause du sang innocent que Manassé avait versé et dont il avait rempli Jérusalem. L'Eternel ne voulut pas pardonner.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Le reste des actes de Jojakim, tout ce qu'il a accompli, cela est décrit dans les annales des rois de Juda.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Jojakim se coucha avec ses ancêtres. Son fils Jojakin devint roi à sa place.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Le roi d'Egypte ne quitta plus son pays, car le roi de Babylone avait pris tout ce qui lui appartenait, depuis le torrent d'Egypte jusqu'à l'Euphrate.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règne de Jojakin sur Juda
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Jojakin avait 18 ans lorsqu'il devint roi et il régna 3 mois à Jérusalem. Sa mère s'appelait Nehushtha et c'était la fille d'Elnathan, de Jérusalem.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Il fit ce qui est mal aux yeux de l'Eternel, entièrement comme l'avait fait son père.
