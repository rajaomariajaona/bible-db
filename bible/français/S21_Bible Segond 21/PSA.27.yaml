document_id: PSA.27
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le triomphe de la foi
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: De David.
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'L''Eternel est ma lumière et mon salut:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: de qui aurais-je peur?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'L''Eternel est le soutien de ma vie:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui devrais-je redouter?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Quand des méchants s'avancent contre moi
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour faire de moi leur proie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce sont eux, mes persécuteurs et mes ennemis,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui trébuchent et tombent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Si une armée prend position contre moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon cœur n'éprouve aucune crainte.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si une guerre s'élève contre moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je reste malgré cela plein de confiance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Je demande à l''Eternel une chose, que je désire ardemment:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je voudrais habiter toute ma vie dans la maison de l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour contempler la beauté de l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et pour admirer son temple,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: car il me protégera dans son tabernacle, le jour du malheur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il me cachera sous l'abri de sa tente,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il m'élèvera sur un rocher.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Déjà ma tête se dresse au-dessus des ennemis qui m'entourent.
- type: usfm
  marker: q1
  children:
  - type: text
    text: J'offrirai des sacrifices dans sa tente avec des cris de joie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je chanterai, je célébrerai l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Eternel, écoute ma voix, car je fais appel à toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aie pitié de moi et exauce-moi!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mon cœur dit de ta part:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Recherchez-moi!»
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je te recherche, Eternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Ne me cache pas ton visage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne repousse pas avec colère ton serviteur!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Tu es mon secours: ne me laisse pas, ne m''abandonne pas,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu de mon salut!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Même si mon père et ma mère viennent à m'abandonner,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'Eternel m'accueillera.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Eternel, enseigne-moi ta voie,
- type: usfm
  marker: q1
  children:
  - type: text
    text: conduis-moi dans le sentier de la droiture,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause de mes ennemis.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Ne me livre pas à la merci de mes adversaires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car de faux témoins s'attaquent à moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: des hommes qui ne respirent que la violence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Oh! si je n'étais pas sûr de voir la bonté de l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: au pays des vivants…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Espère en l'Eternel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Fortifie-toi et que ton cœur s'affermisse!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Espère en l'Eternel!
