document_id: PSA.27,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le triomphe de la foi
  - type: text
    content: De David.
  - type: text
    content: 'L''Eternel est ma lumière et mon salut:'
  - type: text
    content: de qui aurais-je peur?
  - type: text
    content: 'L''Eternel est le soutien de ma vie:'
  - type: text
    content: qui devrais-je redouter?
  '10':
  - type: text
    content: Même si mon père et ma mère viennent à m'abandonner,
  - type: text
    content: l'Eternel m'accueillera.
  '11':
  - type: text
    content: Eternel, enseigne-moi ta voie,
  - type: text
    content: conduis-moi dans le sentier de la droiture,
  - type: text
    content: à cause de mes ennemis.
  '12':
  - type: text
    content: Ne me livre pas à la merci de mes adversaires,
  - type: text
    content: car de faux témoins s'attaquent à moi,
  - type: text
    content: des hommes qui ne respirent que la violence.
  '13':
  - type: text
    content: Oh! si je n'étais pas sûr de voir la bonté de l'Eternel
  - type: text
    content: au pays des vivants…
  '14':
  - type: text
    content: Espère en l'Eternel!
  - type: text
    content: Fortifie-toi et que ton cœur s'affermisse!
  - type: text
    content: Espère en l'Eternel!
  '2':
  - type: text
    content: Quand des méchants s'avancent contre moi
  - type: text
    content: pour faire de moi leur proie,
  - type: text
    content: ce sont eux, mes persécuteurs et mes ennemis,
  - type: text
    content: qui trébuchent et tombent.
  '3':
  - type: text
    content: Si une armée prend position contre moi,
  - type: text
    content: mon cœur n'éprouve aucune crainte.
  - type: text
    content: Si une guerre s'élève contre moi,
  - type: text
    content: je reste malgré cela plein de confiance.
  '4':
  - type: text
    content: 'Je demande à l''Eternel une chose, que je désire ardemment:'
  - type: text
    content: je voudrais habiter toute ma vie dans la maison de l'Eternel,
  - type: text
    content: pour contempler la beauté de l'Eternel
  - type: text
    content: et pour admirer son temple,
  '5':
  - type: text
    content: car il me protégera dans son tabernacle, le jour du malheur,
  - type: text
    content: il me cachera sous l'abri de sa tente,
  - type: text
    content: il m'élèvera sur un rocher.
  '6':
  - type: text
    content: Déjà ma tête se dresse au-dessus des ennemis qui m'entourent.
  - type: text
    content: J'offrirai des sacrifices dans sa tente avec des cris de joie,
  - type: text
    content: je chanterai, je célébrerai l'Eternel.
  '7':
  - type: text
    content: Eternel, écoute ma voix, car je fais appel à toi,
  - type: text
    content: aie pitié de moi et exauce-moi!
  '8':
  - type: text
    content: 'Mon cœur dit de ta part:'
  - type: text
    content: «Recherchez-moi!»
  - type: text
    content: Je te recherche, Eternel!
  '9':
  - type: text
    content: Ne me cache pas ton visage,
  - type: text
    content: ne repousse pas avec colère ton serviteur!
  - type: text
    content: 'Tu es mon secours: ne me laisse pas, ne m''abandonne pas,'
  - type: text
    content: Dieu de mon salut!
