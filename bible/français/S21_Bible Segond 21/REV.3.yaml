document_id: REV.3
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lettre à l'Eglise de Sardes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Ecris à l''ange de l''Eglise de Sardes: ‘Voici ce que dit celui qui a les sept esprits de Dieu et les sept étoiles: Je connais tes œuvres. Je sais que tu passes pour être vivant, mais tu es mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Sois vigilant et affermis le reste, qui est sur le point de mourir, car je n''ai pas trouvé tes œuvres parfaites devant mon Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Rappelle-toi donc comment tu as accepté et entendu la parole, garde-la et repens-toi. Si tu ne restes pas vigilant, je viendrai comme un voleur, sans que tu saches à quelle heure je viendrai te surprendre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Cependant, tu as à Sardes quelques personnes qui n''ont pas souillé leurs vêtements; elles marcheront avec moi en vêtements blancs parce qu''elles en sont dignes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le vainqueur sera habillé de vêtements blancs; je n''effacerai pas son nom du livre de vie et je le reconnaîtrai devant mon Père et devant ses anges. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Que celui qui a des oreilles écoute ce que l'Esprit dit aux Eglises.’
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lettre à l'Eglise de Philadelphie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '»Ecris à l''ange de l''Eglise de Philadelphie: ‘Voici ce que dit le Saint, le Véritable, celui qui a la clé de David, celui qui ouvre et personne ne pourra fermer, celui qui ferme et personne ne pourra ouvrir: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Je connais tes œuvres. Voici, j''ai mis devant toi une porte ouverte que personne ne peut refermer, parce que tu as peu de puissance et que tu as gardé ma parole sans renier mon nom. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Je te donne des membres de la synagogue de Satan qui se prétendent juifs sans l''être et qui mentent. Je les ferai venir se prosterner à tes pieds et reconnaître que je t''ai aimé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Parce que tu as gardé mon ordre de persévérer, je te garderai aussi à l''heure de la tentation qui va venir sur le monde entier pour mettre à l''épreuve les habitants de la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Je viens bientôt. Tiens ferme ce que tu as, afin que personne ne prenne ta couronne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Du vainqueur je ferai un pilier dans le temple de mon Dieu, et il n''en sortira plus jamais. J''écrirai sur lui le nom de mon Dieu, celui de la ville de mon Dieu, la nouvelle Jérusalem qui descend du ciel, d''auprès de mon Dieu, ainsi que mon nom nouveau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Que celui qui a des oreilles écoute ce que l'Esprit dit aux Eglises.’
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lettre à l'Eglise de Laodicée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: '»Ecris à l''ange de l''Eglise de Laodicée: ‘Voici ce que dit l''Amen, le témoin fidèle et véritable, l''auteur de la création de Dieu: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Je connais tes œuvres. Je sais que tu n''es ni froid ni bouillant. Si seulement tu étais froid ou bouillant! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Ainsi, parce que tu es tiède et que tu n''es ni froid ni bouillant, je vais te vomir de ma bouche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'En effet, tu dis: Je suis riche, je me suis enrichi et je n''ai besoin de rien, et tu ne sais pas que tu es malheureux, misérable, pauvre, aveugle et nu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Je te conseille donc d''acheter chez moi de l''or purifié par le feu afin que tu deviennes vraiment riche, des vêtements blancs afin que tu sois habillé et qu''on ne voie plus la honte de ta nudité, ainsi qu''un remède à appliquer sur tes yeux afin que tu voies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Moi, je reprends et je corrige tous ceux que j''aime. Aie donc du zèle et repens-toi! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Voici, je me tiens à la porte et je frappe. Si quelqu''un entend ma voix et ouvre la porte, j''entrerai chez lui, je souperai avec lui et lui avec moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Le vainqueur, je le ferai asseoir avec moi sur mon trône, tout comme moi aussi j''ai vaincu et me suis assis avec mon Père sur son trône. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Que celui qui a des oreilles écoute ce que l'Esprit dit aux Eglises.’»
