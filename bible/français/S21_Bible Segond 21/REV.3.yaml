document_id: REV.3,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Lettre à l'Eglise de Sardes
  - type: text
    content: '»Ecris à l''ange de l''Eglise de Sardes: ‘Voici ce que dit celui qui a les sept esprits de Dieu et les sept étoiles: Je connais tes œuvres. Je sais que tu passes pour être vivant, mais tu es mort. '
  '10':
  - type: text
    content: 'Parce que tu as gardé mon ordre de persévérer, je te garderai aussi à l''heure de la tentation qui va venir sur le monde entier pour mettre à l''épreuve les habitants de la terre. '
  '11':
  - type: text
    content: 'Je viens bientôt. Tiens ferme ce que tu as, afin que personne ne prenne ta couronne. '
  '12':
  - type: text
    content: 'Du vainqueur je ferai un pilier dans le temple de mon Dieu, et il n''en sortira plus jamais. J''écrirai sur lui le nom de mon Dieu, celui de la ville de mon Dieu, la nouvelle Jérusalem qui descend du ciel, d''auprès de mon Dieu, ainsi que mon nom nouveau. '
  '13':
  - type: text
    content: Que celui qui a des oreilles écoute ce que l'Esprit dit aux Eglises.’
  - type: heading
    content: Lettre à l'Eglise de Laodicée
  '14':
  - type: text
    content: '»Ecris à l''ange de l''Eglise de Laodicée: ‘Voici ce que dit l''Amen, le témoin fidèle et véritable, l''auteur de la création de Dieu: '
  '15':
  - type: text
    content: 'Je connais tes œuvres. Je sais que tu n''es ni froid ni bouillant. Si seulement tu étais froid ou bouillant! '
  '16':
  - type: text
    content: 'Ainsi, parce que tu es tiède et que tu n''es ni froid ni bouillant, je vais te vomir de ma bouche. '
  '17':
  - type: text
    content: 'En effet, tu dis: Je suis riche, je me suis enrichi et je n''ai besoin de rien, et tu ne sais pas que tu es malheureux, misérable, pauvre, aveugle et nu. '
  '18':
  - type: text
    content: 'Je te conseille donc d''acheter chez moi de l''or purifié par le feu afin que tu deviennes vraiment riche, des vêtements blancs afin que tu sois habillé et qu''on ne voie plus la honte de ta nudité, ainsi qu''un remède à appliquer sur tes yeux afin que tu voies. '
  '19':
  - type: text
    content: 'Moi, je reprends et je corrige tous ceux que j''aime. Aie donc du zèle et repens-toi! '
  '2':
  - type: text
    content: 'Sois vigilant et affermis le reste, qui est sur le point de mourir, car je n''ai pas trouvé tes œuvres parfaites devant mon Dieu. '
  '20':
  - type: text
    content: 'Voici, je me tiens à la porte et je frappe. Si quelqu''un entend ma voix et ouvre la porte, j''entrerai chez lui, je souperai avec lui et lui avec moi. '
  '21':
  - type: text
    content: 'Le vainqueur, je le ferai asseoir avec moi sur mon trône, tout comme moi aussi j''ai vaincu et me suis assis avec mon Père sur son trône. '
  '22':
  - type: text
    content: Que celui qui a des oreilles écoute ce que l'Esprit dit aux Eglises.’»
  '3':
  - type: text
    content: 'Rappelle-toi donc comment tu as accepté et entendu la parole, garde-la et repens-toi. Si tu ne restes pas vigilant, je viendrai comme un voleur, sans que tu saches à quelle heure je viendrai te surprendre. '
  '4':
  - type: text
    content: 'Cependant, tu as à Sardes quelques personnes qui n''ont pas souillé leurs vêtements; elles marcheront avec moi en vêtements blancs parce qu''elles en sont dignes. '
  '5':
  - type: text
    content: 'Le vainqueur sera habillé de vêtements blancs; je n''effacerai pas son nom du livre de vie et je le reconnaîtrai devant mon Père et devant ses anges. '
  '6':
  - type: text
    content: Que celui qui a des oreilles écoute ce que l'Esprit dit aux Eglises.’
  - type: heading
    content: Lettre à l'Eglise de Philadelphie
  '7':
  - type: text
    content: '»Ecris à l''ange de l''Eglise de Philadelphie: ‘Voici ce que dit le Saint, le Véritable, celui qui a la clé de David, celui qui ouvre et personne ne pourra fermer, celui qui ferme et personne ne pourra ouvrir: '
  '8':
  - type: text
    content: 'Je connais tes œuvres. Voici, j''ai mis devant toi une porte ouverte que personne ne peut refermer, parce que tu as peu de puissance et que tu as gardé ma parole sans renier mon nom. '
  '9':
  - type: text
    content: 'Je te donne des membres de la synagogue de Satan qui se prétendent juifs sans l''être et qui mentent. Je les ferai venir se prosterner à tes pieds et reconnaître que je t''ai aimé. '
