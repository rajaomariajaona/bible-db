document_id: EXO.13,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Consécration des premiers-nés à l'Eternel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel dit à Moïse: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu respecteras cette prescription au moment fixé d'année en année.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Quand l''Eternel t''aura fait entrer dans le pays des Cananéens, comme il l''a juré à toi et à tes ancêtres, et qu''il te l''aura donné, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '*tu consacreras tout premier-né à l''Eternel'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu consacreras… l''Eternel: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Luc 2.23
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' à propos de la présentation de Jésus dans le temple de Jérusalem.'
      marker-yv: yv-n
    - type: text
      text: ', même tout premier-né des animaux que tu auras: les mâles appartiennent à l''Eternel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu rachèteras avec un agneau tout premier-né de l''âne. Si tu ne le rachètes pas, tu lui briseras la nuque. Tu rachèteras aussi tout premier-né de tes fils. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et lorsque ton fils te demandera un jour: ‘Que signifie cela?’ tu lui répondras: ‘Par sa main puissante, l''Eternel nous a fait sortir d''Egypte, de la maison d''esclavage; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et, comme le pharaon s''obstinait à ne pas nous laisser partir, l''Eternel a fait mourir tous les premiers-nés en Egypte, depuis les premiers-nés des hommes jusqu''aux premiers-nés des animaux. Voilà pourquoi j''offre en sacrifice à l''Eternel tout premier-né des mâles et rachète tout premier-né de mes fils.’ '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce sera comme un signe sur ta main et comme une marque entre tes yeux, qui rappellera que l'Eternel nous a fait sortir d'Egypte par sa main puissante.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Passage de la mer des Roseaux
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque le pharaon laissa partir le peuple, Dieu ne le conduisit pas par le chemin qui passait par le pays des Philistins, même si c''était le plus direct. Dieu se dit en effet: «Le peuple pourrait éprouver des regrets en rencontrant la guerre et retourner en Egypte.» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu fit donc faire au peuple un détour par le chemin du désert, vers la mer des Roseaux. Les Israélites étaient partis d''Egypte en ordre de bataille '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et Moïse avait pris avec lui les ossements de Joseph, car ce dernier l''avait fait jurer aux fils d''Israël en disant: «Quand Dieu interviendra pour vous, vous ferez remonter mes ossements loin d''ici avec vous.»'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Genèse 50.25
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Consacre-moi tout aîné, tout premier-né parmi les Israélites, tant des hommes que des animaux: il m''appartient.»'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils partirent de Succoth et campèrent à Etham, à l''extrémité du désert. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel allait devant eux, le jour dans une colonne de nuée pour les guider sur leur chemin, et la nuit dans une colonne de feu pour les éclairer, afin qu''ils puissent marcher jour et nuit. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: La colonne de nuée ne se retirait pas de devant le peuple pendant le jour, ni la colonne de feu pendant la nuit.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse dit au peuple: «Souvenez-vous de ce jour où vous êtes sortis d''Egypte, de la maison d''esclavage. En effet, c''est par sa main puissante que l''Eternel vous en a fait sortir. On ne mangera pas de pain levé. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous sortez aujourd''hui, au cours du mois des épis. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand l''Eternel t''aura fait entrer dans le pays des Cananéens, des Hittites, des Amoréens, des Héviens et des Jébusiens, qu''il a juré à tes ancêtres de te donner, pays où coulent le lait et le miel, tu rendras ce culte à l''Eternel au cours de ce même mois. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pendant 7 jours tu mangeras des pains sans levain et le septième jour il y aura une fête en l''honneur de l''Eternel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On mangera des pains sans levain pendant les 7 jours. On ne verra pas chez toi de pain levé ni de levain, sur tout ton territoire. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu diras alors à ton fils: ‘C''est en mémoire de ce que l''Eternel a fait pour moi lorsque je suis sorti d''Egypte.’ '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce sera pour toi comme un signe sur ta main et comme un souvenir entre tes yeux, afin que la loi de l''Eternel soit dans ta bouche. En effet, c''est par sa main puissante que l''Eternel t''a fait sortir d''Egypte. '
