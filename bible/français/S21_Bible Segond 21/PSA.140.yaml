document_id: PSA.140,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière pour être protégé des persécuteurs
  - type: text
    content: Au chef de chœur. Psaume de David.
  '10':
  - type: text
    content: Que le péché de leurs lèvres retombe
  - type: text
    content: sur la tête de ceux qui m'encerclent!
  '11':
  - type: text
    content: Que des charbons ardents soient déversés sur eux!
  - type: text
    content: Qu'ils soient précipités dans le feu,
  - type: text
    content: dans des gouffres d'où ils ne se relèvent plus!
  '12':
  - type: text
    content: Le calomniateur ne subsistera pas sur la terre,
  - type: text
    content: et l'homme violent sera sans répit pourchassé par le malheur.
  '13':
  - type: text
    content: Je le sais, l'Eternel fait droit au malheureux,
  - type: text
    content: il rend justice aux pauvres.
  '14':
  - type: text
    content: Oui, les justes célébreront ton nom,
  - type: text
    content: les hommes droits habiteront en ta présence.
  '2':
  - type: text
    content: Eternel, délivre-moi des hommes méchants,
  - type: text
    content: préserve-moi des hommes violents!
  '3':
  - type: text
    content: Ils méditent le mal dans leur cœur
  - type: text
    content: et sont toujours prêts à faire la guerre.
  '4':
  - type: text
    content: Ils aiguisent leur langue comme un serpent,
  - type: text
    content: '*ils ont sur les lèvres un venin de vipère'
  - type: note
    content: 'Ils ont… vipère: cité en Romains 3.13 dans la description de l''humanité coupable.'
  - type: text
    content: '. '
  - type: text
    content: – Pause.
  '5':
  - type: text
    content: Eternel, garde-moi des mains du méchant,
  - type: text
    content: préserve-moi des hommes violents!
  - type: text
    content: Ils méditent de me faire tomber.
  '6':
  - type: text
    content: Des orgueilleux me préparent un piège avec des cordes,
  - type: text
    content: ils déploient un filet le long du chemin
  - type: text
    content: ', ils me tendent une embuscade. '
  - type: text
    content: – Pause.
  '7':
  - type: text
    content: 'Je dis à l''Eternel: «Tu es mon Dieu!»'
  - type: text
    content: Eternel, prête l'oreille à mes supplications!
  '8':
  - type: text
    content: Eternel, Seigneur, mon puissant Sauveur,
  - type: text
    content: tu protèges ma tête le jour du combat.
  '9':
  - type: text
    content: Eternel, n'accomplis pas les désirs du méchant,
  - type: text
    content: 'ne laisse pas réussir ses projets, car il en tirerait de l''orgueil. '
  - type: text
    content: – Pause.
