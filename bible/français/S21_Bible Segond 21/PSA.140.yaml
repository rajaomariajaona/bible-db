document_id: PSA.140,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière pour être protégé des persécuteurs
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Au chef de chœur. Psaume de David.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Que le péché de leurs lèvres retombe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur la tête de ceux qui m'encerclent!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Que des charbons ardents soient déversés sur eux!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'ils soient précipités dans le feu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans des gouffres d'où ils ne se relèvent plus!
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Le calomniateur ne subsistera pas sur la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'homme violent sera sans répit pourchassé par le malheur.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Je le sais, l'Eternel fait droit au malheureux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il rend justice aux pauvres.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Oui, les justes célébreront ton nom,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les hommes droits habiteront en ta présence.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Eternel, délivre-moi des hommes méchants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: préserve-moi des hommes violents!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Ils méditent le mal dans leur cœur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sont toujours prêts à faire la guerre.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Ils aiguisent leur langue comme un serpent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*ils ont sur les lèvres un venin de vipère'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '140.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ils ont… vipère: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Romains 3.13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' dans la description de l''humanité coupable.'
      marker-yv: yv-n
    - type: text
      text: '. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Eternel, garde-moi des mains du méchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: préserve-moi des hommes violents!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils méditent de me faire tomber.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Des orgueilleux me préparent un piège avec des cordes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils déploient un filet le long du chemin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ', ils me tendent une embuscade. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Je dis à l''Eternel: «Tu es mon Dieu!»'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eternel, prête l'oreille à mes supplications!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Eternel, Seigneur, mon puissant Sauveur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu protèges ma tête le jour du combat.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Eternel, n'accomplis pas les désirs du méchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ne laisse pas réussir ses projets, car il en tirerait de l''orgueil. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
