    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Levez vos mains vers le sanctuaire
- type: usfm
  marker: q1
  children:
  - type: text
    text: et bénissez l'Eternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Que l'Eternel te bénisse de Sion,
- type: usfm
  marker: q1
