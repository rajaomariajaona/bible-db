document_id: PSA.134,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Appel à la louange
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Chant des montées.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oh! Bénissez l'Eternel, vous tous, serviteurs de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui vous tenez dans la maison de l'Eternel pendant les nuits!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Levez vos mains vers le sanctuaire
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et bénissez l'Eternel!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que l'Eternel te bénisse de Sion,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: lui qui a fait le ciel et la terre!
