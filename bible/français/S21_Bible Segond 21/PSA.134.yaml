document_id: PSA.134,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Appel à la louange
  - type: text
    content: Chant des montées.
  - type: text
    content: Oh! Bénissez l'Eternel, vous tous, serviteurs de l'Eternel,
  - type: text
    content: qui vous tenez dans la maison de l'Eternel pendant les nuits!
  '2':
  - type: text
    content: Levez vos mains vers le sanctuaire
  - type: text
    content: et bénissez l'Eternel!
  '3':
  - type: text
    content: Que l'Eternel te bénisse de Sion,
  - type: text
    content: lui qui a fait le ciel et la terre!
