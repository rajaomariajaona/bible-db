document_id: HAB.2,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je veux être à mon poste
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et me tenir sur la tour.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je veux veiller pour voir ce que l'Eternel me dira
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ce que je répliquerai
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je répliquerai: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: la réponse de Dieu apparaîtra dans la parole du prophète.
      marker-yv: yv-n
    - type: text
      text: ' à mes reproches.'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est la honte de ta maison que tu as décidée
  - type: usfm
    marker: q1
    children:
    - type: text
      text: en détruisant des peuples nombreux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et c'est contre toi-même que tu as péché.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, la pierre crie du milieu de la muraille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le bois de la charpente lui répond.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malheur à celui qui construit une ville avec le sang,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui fonde une ville avec le crime!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cela ne vient-il pas de l'Eternel, le maître de l'univers?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*Des peuples travaillent pour du feu,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des nations s'épuisent pour du vide.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Des peuples… vide: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'même affirmation en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Jérémie 51.58
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, *la terre sera remplie de la connaissance de la gloire de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout comme le fond de la mer est recouvert par l'eau.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'La terre… l''eau: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'texte quasi identique en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 11.9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malheur à celui qui fait boire son prochain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à toi qui verses ton outre pour l'enivrer
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin de voir sa nudité!
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu t'es rassasié de mépris plus que de gloire;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: bois aussi toi-même et découvre-toi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu boiras la coupe de la main droite de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la honte souillera ta gloire.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, les violences faites contre le Liban retomberont sur toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les dévastations des bêtes t'effraieront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: parce que tu as versé le sang des hommes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et commis des violences dans le pays
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre la ville et tous ses habitants.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A quoi sert une sculpture sacrée, pour qu'un ouvrier la façonne?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A quoi sert une idole en métal fondu et qui enseigne le mensonge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que l'ouvrier qui l'a faite place en elle sa confiance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au point de fabriquer des faux dieux muets?
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Malheur à celui qui dit à un morceau de bois: «Lève-toi!»'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ou à une pierre muette: «Réveille-toi!»'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Donnera-t-elle instruction?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elle est garnie d'or et d'argent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il n'y a en elle aucun souffle de vie.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'L''Eternel m''a répondu et a dit:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Mets la vision par écrit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: grave-la sur des tables
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin qu'on la lise couramment.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Eternel, lui, est dans son saint temple.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que toute la terre fasse silence devant lui!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, c'est encore une vision qui concerne un moment fixé;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle parle de la fin et ne mentira pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si elle tarde, attends-la,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car *elle s'accomplira, elle s'accomplira certainement.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il est plein d'orgueil, celui dont l'âme n'est pas droite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais *le juste vivra par sa foi
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.3-4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Elle s''accomplira… sa foi: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hébreux 10.37-38
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' d''après la Septante et partiellement (fin du verset 4) en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Romains 1.17
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Galates 3.11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: .»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Causes du jugement de l'oppresseur
    marker-yv: yv-h
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Certes le vin est traître:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'arrogant ne reste pas tranquille,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il élargit sa bouche comme le séjour des morts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est insatiable comme la mort;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il accueille toutes les nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il rassemble auprès de lui tous les peuples.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mais tous feront de lui un sujet de proverbes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de moqueries et d'énigmes.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'On dira: «Malheur à celui qui accumule ce qui n''est pas à lui!'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu'à quand?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malheur à celui qui augmente le fardeau de ses dettes.»
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes créanciers ne vont-ils pas se lever tout à coup?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes oppresseurs ne vont-ils pas se réveiller?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu deviendras leur proie.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Puisque tu as pillé beaucoup de nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout le reste des peuples te pillera.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, tu as versé le sang des hommes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu as commis des violences dans le pays
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre la ville et tous ses habitants.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Malheur à celui qui amasse pour sa maison des gains malhonnêtes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin de placer son nid sur les hauteurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour se garantir de l'atteinte du malheur!
