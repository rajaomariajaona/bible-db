document_id: HAB.2,152
type_code: fra
verses:
  '1':
  - type: text
    content: Je veux être à mon poste
  - type: text
    content: et me tenir sur la tour.
  - type: text
    content: Je veux veiller pour voir ce que l'Eternel me dira
  - type: text
    content: et ce que je répliquerai
  - type: note
    content: 'Je répliquerai: la réponse de Dieu apparaîtra dans la parole du prophète.'
  - type: text
    content: ' à mes reproches.'
  '10':
  - type: text
    content: C'est la honte de ta maison que tu as décidée
  - type: text
    content: en détruisant des peuples nombreux,
  - type: text
    content: et c'est contre toi-même que tu as péché.
  '11':
  - type: text
    content: En effet, la pierre crie du milieu de la muraille,
  - type: text
    content: et le bois de la charpente lui répond.
  '12':
  - type: text
    content: Malheur à celui qui construit une ville avec le sang,
  - type: text
    content: qui fonde une ville avec le crime!
  '13':
  - type: text
    content: Cela ne vient-il pas de l'Eternel, le maître de l'univers?
  - type: text
    content: '*Des peuples travaillent pour du feu,'
  - type: text
    content: des nations s'épuisent pour du vide.
  - type: note
    content: 'Des peuples… vide: même affirmation en Jérémie 51.58.'
  '14':
  - type: text
    content: En effet, *la terre sera remplie de la connaissance de la gloire de l'Eternel,
  - type: text
    content: tout comme le fond de la mer est recouvert par l'eau.
  - type: note
    content: 'La terre… l''eau: texte quasi identique en Esaïe 11.9.'
  '15':
  - type: text
    content: Malheur à celui qui fait boire son prochain,
  - type: text
    content: à toi qui verses ton outre pour l'enivrer
  - type: text
    content: afin de voir sa nudité!
  '16':
  - type: text
    content: Tu t'es rassasié de mépris plus que de gloire;
  - type: text
    content: bois aussi toi-même et découvre-toi!
  - type: text
    content: Tu boiras la coupe de la main droite de l'Eternel,
  - type: text
    content: et la honte souillera ta gloire.
  '17':
  - type: text
    content: Oui, les violences faites contre le Liban retomberont sur toi
  - type: text
    content: et les dévastations des bêtes t'effraieront,
  - type: text
    content: parce que tu as versé le sang des hommes
  - type: text
    content: et commis des violences dans le pays
  - type: text
    content: contre la ville et tous ses habitants.
  '18':
  - type: text
    content: A quoi sert une sculpture sacrée, pour qu'un ouvrier la façonne?
  - type: text
    content: A quoi sert une idole en métal fondu et qui enseigne le mensonge,
  - type: text
    content: pour que l'ouvrier qui l'a faite place en elle sa confiance
  - type: text
    content: au point de fabriquer des faux dieux muets?
  '19':
  - type: text
    content: 'Malheur à celui qui dit à un morceau de bois: «Lève-toi!»'
  - type: text
    content: 'ou à une pierre muette: «Réveille-toi!»'
  - type: text
    content: Donnera-t-elle instruction?
  - type: text
    content: Elle est garnie d'or et d'argent,
  - type: text
    content: mais il n'y a en elle aucun souffle de vie.
  '2':
  - type: text
    content: 'L''Eternel m''a répondu et a dit:'
  - type: text
    content: «Mets la vision par écrit,
  - type: text
    content: grave-la sur des tables
  - type: text
    content: afin qu'on la lise couramment.
  '20':
  - type: text
    content: L'Eternel, lui, est dans son saint temple.
  - type: text
    content: Que toute la terre fasse silence devant lui!
  '3':
  - type: text
    content: En effet, c'est encore une vision qui concerne un moment fixé;
  - type: text
    content: elle parle de la fin et ne mentira pas.
  - type: text
    content: Si elle tarde, attends-la,
  - type: text
    content: car *elle s'accomplira, elle s'accomplira certainement.
  '4':
  - type: text
    content: Il est plein d'orgueil, celui dont l'âme n'est pas droite,
  - type: text
    content: mais *le juste vivra par sa foi
  - type: note
    content: 'Elle s''accomplira… sa foi: cité en Hébreux 10.37-38 d''après la Septante et partiellement (fin du verset 4) en Romains 1.17; Galates 3.11.'
  - type: text
    content: .»
  - type: heading
    content: Causes du jugement de l'oppresseur
  '5':
  - type: text
    content: 'Certes le vin est traître:'
  - type: text
    content: l'arrogant ne reste pas tranquille,
  - type: text
    content: il élargit sa bouche comme le séjour des morts,
  - type: text
    content: il est insatiable comme la mort;
  - type: text
    content: il accueille toutes les nations,
  - type: text
    content: il rassemble auprès de lui tous les peuples.
  '6':
  - type: text
    content: Mais tous feront de lui un sujet de proverbes,
  - type: text
    content: de moqueries et d'énigmes.
  - type: text
    content: 'On dira: «Malheur à celui qui accumule ce qui n''est pas à lui!'
  - type: text
    content: Jusqu'à quand?
  - type: text
    content: Malheur à celui qui augmente le fardeau de ses dettes.»
  '7':
  - type: text
    content: Tes créanciers ne vont-ils pas se lever tout à coup?
  - type: text
    content: Tes oppresseurs ne vont-ils pas se réveiller?
  - type: text
    content: Tu deviendras leur proie.
  '8':
  - type: text
    content: Puisque tu as pillé beaucoup de nations,
  - type: text
    content: tout le reste des peuples te pillera.
  - type: text
    content: En effet, tu as versé le sang des hommes,
  - type: text
    content: tu as commis des violences dans le pays
  - type: text
    content: contre la ville et tous ses habitants.
  '9':
  - type: text
    content: Malheur à celui qui amasse pour sa maison des gains malhonnêtes
  - type: text
    content: afin de placer son nid sur les hauteurs,
  - type: text
    content: pour se garantir de l'atteinte du malheur!
