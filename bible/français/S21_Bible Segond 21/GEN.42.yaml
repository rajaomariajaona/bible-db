document_id: GEN.42,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les frères de Joseph en Egypte
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Voyant qu''il y avait du blé en Egypte, Jacob dit à ses fils: «Pourquoi vous regardez-vous les uns les autres?» '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ils lui répondirent: «Non, seigneur, tes serviteurs sont venus pour acheter du blé. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Nous sommes tous les fils d''un même homme. Nous sommes sincères! Nous tes serviteurs, nous ne sommes pas des espions.» '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Il leur dit: «Pas du tout, c''est pour examiner les points faibles du pays que vous êtes venus.» '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ils répondirent: «Nous tes serviteurs, nous étions douze frères, fils du même homme dans le pays de Canaan. Le plus jeune est aujourd''hui avec notre père et il y en a un qui n''est plus là.» '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Joseph leur dit: «C''est ce que je viens de vous dire: vous êtes des espions. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Voici comment votre sincérité sera vérifiée: par la vie du pharaon, vous ne sortirez pas d''ici avant que votre jeune frère ne soit venu. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Envoyez l''un de vous chercher votre frère pendant que vous, vous resterez prisonniers. Vos affirmations seront ainsi vérifiées et je saurai si la vérité est de votre côté. Sinon, par la vie du pharaon, c''est que vous êtes des espions.» '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Puis il les mit trois jours en prison ensemble.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Le troisième jour, Joseph leur dit: «Faites ce que je vous dis et vous vivrez. Je crains Dieu! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Si vous êtes sincères, qu''un seul de vous reste enfermé dans cette prison. Quant aux autres, partez, emportez du blé pour nourrir vos familles. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il ajouta: «J''ai appris qu''il y avait du blé en Egypte. Descendez-y pour nous en acheter afin que nous restions en vie et ne mourions pas.»'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Puis amenez-moi votre jeune frère. Ainsi, vos affirmations seront vérifiées et vous ne mourrez pas.» C'est ce qu'ils firent.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Ils se dirent alors l''un à l''autre: «Oui, nous avons été coupables envers notre frère. Nous avons bien vu sa détresse quand il nous demandait grâce, et nous ne l''avons pas écouté. C''est pour cela que cette détresse nous frappe.» '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Ruben répliqua: «Ne vous disais-je pas de ne pas commettre de faute envers cet enfant? Mais vous n''avez pas écouté, et voici que son sang nous est redemandé.» '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Ils ne savaient pas que Joseph comprenait, car il se servait d''un interprète avec eux. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Il s'éloigna d'eux pour pleurer, puis il revint leur parler. Il prit parmi eux Siméon et le fit enchaîner sous leurs yeux.
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Joseph ordonna qu''on remplisse de blé leurs sacs, qu''on remette l''argent de chacun dans son sac et qu''on leur donne des provisions pour la route, et c''est ce qu''on fit. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Quant à eux, ils chargèrent le blé sur leurs ânes et partirent. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'L''un d''eux ouvrit son sac pour donner du fourrage à son âne, à l''endroit où ils passèrent la nuit, et il vit l''argent à l''entrée du sac. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Il dit à ses frères: «On m''a rendu mon argent et le voici dans mon sac.» Alors le cœur leur manqua et ils se dirent l''un à l''autre en tremblant: «Qu''est-ce que Dieu nous a fait?»'
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Une fois vers leur père Jacob dans le pays de Canaan, ils lui racontèrent tout ce qui leur était arrivé. Ils dirent: '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Dix frères de Joseph descendirent en Egypte pour acheter du blé. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: '«L''homme qui est le seigneur du pays nous a parlé durement et nous a pris pour des espions. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: text
      text: 'Nous lui avons dit: ‘Nous sommes sincères, nous ne sommes pas des espions. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: text
      text: 'Nous étions douze frères, fils du même père. L''un n''est plus là et le plus jeune est aujourd''hui avec notre père dans le pays de Canaan.’ '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: text
      text: 'L''homme qui est le seigneur du pays nous a alors dit: ‘Voici comment je saurai si vous êtes sincères. Laissez l''un de vos frères avec moi, prenez de quoi nourrir vos familles et repartez, '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: text
      text: puis amenez-moi votre jeune frère. Je saurai ainsi que vous n'êtes pas des espions, que vous êtes sincères. Je vous rendrai votre frère et vous pourrez librement parcourir le pays.’»
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: Lorsqu'ils vidèrent leurs sacs, ils constatèrent que le paquet d'argent de chacun était dans son sac. Ils virent, eux et leur père, leurs paquets d'argent et ils eurent peur.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Leur père Jacob leur dit: «Vous me privez de mes enfants! Joseph n''est plus là, Siméon n''est plus là et vous prendriez Benjamin! C''est sur moi que tout cela retombe.» '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Ruben dit à son père: «Si je ne te ramène pas Benjamin, tu pourras faire mourir mes deux fils. Confie-le-moi et je te le ramènerai.» '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'Jacob dit: «Mon fils ne descendra pas avec vous, car son frère est mort et il ne reste que lui. S''il lui arrivait un malheur pendant le voyage que vous allez faire, vous feriez descendre avec douleur mes cheveux blancs dans le séjour des morts.»'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Jacob n''envoya pas avec eux Benjamin, le frère de Joseph, car il avait peur qu''il ne lui arrive un malheur. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Les fils d'Israël se joignirent à d'autres arrivants pour acheter du blé, car la famine régnait dans le pays de Canaan.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Quant à Joseph, il exerçait le pouvoir sur le pays. C''était lui qui vendait du blé à toute la population du pays. Les frères de Joseph vinrent et se prosternèrent devant lui le visage contre terre. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Quand Joseph vit ses frères, il les reconnut, mais il se comporta en étranger vis-à-vis d''eux. Il leur parla durement et leur dit: «D''où venez-vous?» Ils répondirent: «Du pays de Canaan, pour acheter des vivres.» '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Si Joseph reconnut ses frères, eux ne le reconnurent pas.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Joseph se souvint des rêves qu''il avait eus à leur sujet et leur dit: «Vous êtes des espions. C''est pour examiner les points faibles du pays que vous êtes venus.» '
