document_id: LEV.16,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La sainteté
  - type: heading
    content: 16.1–27.34
  - type: heading
    content: Le jour des expiations
  - type: text
    content: 'L''Eternel parla à Moïse après la mort des deux fils d''Aaron qui étaient morts en se présentant devant l''Eternel. '
  '10':
  - type: text
    content: Le bouc tiré au sort pour Azazel sera placé vivant devant l'Eternel, afin de servir à faire l'expiation et d'être lâché dans le désert pour Azazel.
  '11':
  - type: text
    content: '»Aaron offrira son taureau expiatoire et fera l''expiation pour lui et pour sa famille. Il égorgera son taureau expiatoire. '
  '12':
  - type: text
    content: 'Il prendra un brûle-parfum plein de charbons ardents pris sur l''autel devant l''Eternel et deux poignées de parfum odoriférant en poudre, et il portera ces éléments derrière le voile. '
  '13':
  - type: text
    content: 'Il mettra le parfum sur le feu devant l''Eternel, afin que la nuée du parfum couvre le propitiatoire qui est sur le témoignage, et il ne mourra pas. '
  '14':
  - type: text
    content: Il prendra du sang du taureau et fera l'aspersion avec son doigt sur le devant du propitiatoire, du côté est; il fera avec son doigt 7 fois l'aspersion du sang devant le propitiatoire.
  '15':
  - type: text
    content: '»Il égorgera le bouc expiatoire pour le peuple et en portera le sang derrière le voile. Il fera avec ce sang comme il a fait avec le sang du taureau: il en fera l''aspersion sur le propitiatoire et devant le propitiatoire.'
  '16':
  - type: text
    content: '»C''est ainsi qu''il fera l''expiation pour le sanctuaire à cause des impuretés des Israélites et de toutes les transgressions par lesquelles ils ont péché. Il fera de même pour la tente de la rencontre, qui est établie avec eux au milieu de leurs impuretés. '
  '17':
  - type: text
    content: 'Il n''y aura personne dans la tente de la rencontre lorsqu''il entrera pour faire l''expiation dans le sanctuaire, jusqu''à ce qu''il en sorte. Il fera l''expiation pour lui et sa famille, ainsi que pour toute l''assemblée d''Israël. '
  '18':
  - type: text
    content: 'Lorsqu''il sortira, il ira vers l''autel qui est devant l''Eternel et il fera l''expiation pour l''autel. Il prendra du sang du taureau et du bouc, et il en mettra sur les cornes du pourtour de l''autel. '
  '19':
  - type: text
    content: Il fera avec son doigt 7 fois l'aspersion du sang sur l'autel. Il le purifiera et le reconsacrera à cause des impuretés des Israélites.
  '2':
  - type: text
    content: 'L''Eternel dit à Moïse: «Dis à ton frère Aaron de ne pas entrer à n''importe quel moment dans la partie du sanctuaire située derrière le voile, devant le propitiatoire'
  - type: note
    content: 'Propitiatoire: couvercle de l''arche de l''alliance. Le mot hébreu signifie aussi expiation, le terme français insiste sur le fait que Dieu s''y montrait favorable.'
  - type: text
    content: ' qui recouvre l''arche, sinon il mourrait. En effet, j''apparaîtrai dans la nuée sur le propitiatoire.'
  '20':
  - type: text
    content: '»Lorsque Aaron aura fini de faire l''expiation pour le sanctuaire, pour la tente de la rencontre et pour l''autel, il fera approcher le bouc vivant. '
  '21':
  - type: text
    content: 'Il posera ses deux mains sur la tête du bouc vivant et confessera sur lui toutes les fautes des Israélites et toutes les transgressions par lesquelles ils ont péché; il les mettra sur la tête du bouc, puis il le chassera dans le désert avec l''aide d''un homme prêt pour cette fonction. '
  '22':
  - type: text
    content: Le bouc emportera sur lui toutes leurs fautes dans une terre aride, il sera chassé dans le désert.
  '23':
  - type: text
    content: '»Aaron entrera dans la tente de la rencontre; il quittera les vêtements de lin qu''il avait mis en entrant dans le sanctuaire et les déposera là. '
  '24':
  - type: text
    content: 'Il lavera son corps avec de l''eau dans un endroit saint et reprendra ses vêtements. Puis il sortira, offrira son holocauste et l''holocauste du peuple, et fera l''expiation pour lui et pour le peuple. '
  '25':
  - type: text
    content: 'Il brûlera sur l''autel la graisse de la victime expiatoire. '
  '26':
  - type: text
    content: Celui qui aura chassé le bouc pour Azazel lavera ses vêtements et lavera son corps dans l'eau; après cela, il rentrera dans le camp.
  '27':
  - type: text
    content: '»On emportera à l''extérieur du camp le taureau expiatoire et le bouc expiatoire dont on a porté le sang dans le sanctuaire pour faire l''expiation, et l''on brûlera au feu leur peau, leur viande et leurs excréments. '
  '28':
  - type: text
    content: Celui qui les brûlera lavera ses vêtements et lavera son corps dans l'eau; après cela, il rentrera dans le camp.
  '29':
  - type: text
    content: '»C''est pour vous une prescription perpétuelle: le dixième jour du septième mois, vous vous humilierez, vous ne ferez aucun travail, ni l''Israélite ni l''étranger en séjour parmi vous. '
  '3':
  - type: text
    content: '»Voici de quelle manière Aaron entrera dans le sanctuaire. Il prendra un jeune taureau pour le sacrifice d''expiation et un bélier pour l''holocauste. '
  '30':
  - type: text
    content: 'En effet, ce jour-là on fera l''expiation pour vous afin de vous purifier: vous serez purifiés de tous vos péchés devant l''Eternel. '
  '31':
  - type: text
    content: Ce sera pour vous un sabbat, un jour de repos, et vous vous humilierez. C'est une prescription perpétuelle.
  '32':
  - type: text
    content: '»Celui qui fera l''expiation, c''est le prêtre désigné par onction et établi dans ses fonctions pour succéder à son père en tant que grand-prêtre; il mettra des vêtements de lin, des vêtements sacrés. '
  '33':
  - type: text
    content: 'Il fera l''expiation pour le saint sanctuaire, il fera l''expiation pour la tente de la rencontre et pour l''autel, et il fera l''expiation pour les prêtres et pour tout le peuple de l''assemblée. '
  '34':
  - type: text
    content: 'Ce sera pour vous une prescription perpétuelle: une fois par année se fera l''expiation pour les Israélites, à cause de leurs péchés.» On fit ce que l''Eternel avait ordonné à Moïse.'
  '4':
  - type: text
    content: 'Il mettra la tunique sacrée de lin et portera sur son corps des caleçons de lin. Il mettra une ceinture de lin et se couvrira la tête d''une tiare de lin. Ce sont les vêtements sacrés dont il s''habillera après avoir lavé son corps dans l''eau. '
  '5':
  - type: text
    content: 'Il recevra de l''assemblée des Israélites deux boucs pour le sacrifice d''expiation et un bélier pour l''holocauste. '
  '6':
  - type: text
    content: 'Aaron offrira son taureau expiatoire et il fera l''expiation pour lui et pour sa famille. '
  '7':
  - type: text
    content: 'Il prendra les deux boucs et les placera devant l''Eternel, à l''entrée de la tente de la rencontre. '
  '8':
  - type: text
    content: 'Il tirera au sort entre les deux boucs: l''un sera pour l''Eternel et l''autre pour Azazel'
  - type: note
    content: 'Azazel: le sens et l''origine du mot sont discutés. La Vulgate a traduit «bouc émissaire» et la Septante «celui qui renvoie (les fléaux)».'
  - type: text
    content: '. '
  '9':
  - type: text
    content: 'Il fera approcher le bouc tiré au sort pour l''Eternel et il l''offrira en sacrifice d''expiation. '
