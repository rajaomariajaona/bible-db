document_id: LEV.16
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: La sainteté
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 16.1–27.34
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le jour des expiations
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'L''Eternel parla à Moïse après la mort des deux fils d''Aaron qui étaient morts en se présentant devant l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'L''Eternel dit à Moïse: «Dis à ton frère Aaron de ne pas entrer à n''importe quel moment dans la partie du sanctuaire située derrière le voile, devant le propitiatoire'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Propitiatoire: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: couvercle de l'arche de l'alliance. Le mot hébreu signifie aussi expiation, le terme français insiste sur le fait que Dieu s'y montrait favorable.
    marker-yv: yv-n
  - type: text
    text: ' qui recouvre l''arche, sinon il mourrait. En effet, j''apparaîtrai dans la nuée sur le propitiatoire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '»Voici de quelle manière Aaron entrera dans le sanctuaire. Il prendra un jeune taureau pour le sacrifice d''expiation et un bélier pour l''holocauste. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Il mettra la tunique sacrée de lin et portera sur son corps des caleçons de lin. Il mettra une ceinture de lin et se couvrira la tête d''une tiare de lin. Ce sont les vêtements sacrés dont il s''habillera après avoir lavé son corps dans l''eau. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il recevra de l''assemblée des Israélites deux boucs pour le sacrifice d''expiation et un bélier pour l''holocauste. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Aaron offrira son taureau expiatoire et il fera l''expiation pour lui et pour sa famille. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Il prendra les deux boucs et les placera devant l''Eternel, à l''entrée de la tente de la rencontre. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Il tirera au sort entre les deux boucs: l''un sera pour l''Eternel et l''autre pour Azazel'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Azazel: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: le sens et l'origine du mot sont discutés. La Vulgate a traduit «bouc émissaire» et la Septante «celui qui renvoie (les fléaux)».
    marker-yv: yv-n
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il fera approcher le bouc tiré au sort pour l''Eternel et il l''offrira en sacrifice d''expiation. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Le bouc tiré au sort pour Azazel sera placé vivant devant l'Eternel, afin de servir à faire l'expiation et d'être lâché dans le désert pour Azazel.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: '»Aaron offrira son taureau expiatoire et fera l''expiation pour lui et pour sa famille. Il égorgera son taureau expiatoire. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il prendra un brûle-parfum plein de charbons ardents pris sur l''autel devant l''Eternel et deux poignées de parfum odoriférant en poudre, et il portera ces éléments derrière le voile. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il mettra le parfum sur le feu devant l''Eternel, afin que la nuée du parfum couvre le propitiatoire qui est sur le témoignage, et il ne mourra pas. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Il prendra du sang du taureau et fera l'aspersion avec son doigt sur le devant du propitiatoire, du côté est; il fera avec son doigt 7 fois l'aspersion du sang devant le propitiatoire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '»Il égorgera le bouc expiatoire pour le peuple et en portera le sang derrière le voile. Il fera avec ce sang comme il a fait avec le sang du taureau: il en fera l''aspersion sur le propitiatoire et devant le propitiatoire.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '»C''est ainsi qu''il fera l''expiation pour le sanctuaire à cause des impuretés des Israélites et de toutes les transgressions par lesquelles ils ont péché. Il fera de même pour la tente de la rencontre, qui est établie avec eux au milieu de leurs impuretés. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il n''y aura personne dans la tente de la rencontre lorsqu''il entrera pour faire l''expiation dans le sanctuaire, jusqu''à ce qu''il en sorte. Il fera l''expiation pour lui et sa famille, ainsi que pour toute l''assemblée d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Lorsqu''il sortira, il ira vers l''autel qui est devant l''Eternel et il fera l''expiation pour l''autel. Il prendra du sang du taureau et du bouc, et il en mettra sur les cornes du pourtour de l''autel. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Il fera avec son doigt 7 fois l'aspersion du sang sur l'autel. Il le purifiera et le reconsacrera à cause des impuretés des Israélites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '»Lorsque Aaron aura fini de faire l''expiation pour le sanctuaire, pour la tente de la rencontre et pour l''autel, il fera approcher le bouc vivant. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il posera ses deux mains sur la tête du bouc vivant et confessera sur lui toutes les fautes des Israélites et toutes les transgressions par lesquelles ils ont péché; il les mettra sur la tête du bouc, puis il le chassera dans le désert avec l''aide d''un homme prêt pour cette fonction. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Le bouc emportera sur lui toutes leurs fautes dans une terre aride, il sera chassé dans le désert.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '»Aaron entrera dans la tente de la rencontre; il quittera les vêtements de lin qu''il avait mis en entrant dans le sanctuaire et les déposera là. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il lavera son corps avec de l''eau dans un endroit saint et reprendra ses vêtements. Puis il sortira, offrira son holocauste et l''holocauste du peuple, et fera l''expiation pour lui et pour le peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il brûlera sur l''autel la graisse de la victime expiatoire. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Celui qui aura chassé le bouc pour Azazel lavera ses vêtements et lavera son corps dans l'eau; après cela, il rentrera dans le camp.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '»On emportera à l''extérieur du camp le taureau expiatoire et le bouc expiatoire dont on a porté le sang dans le sanctuaire pour faire l''expiation, et l''on brûlera au feu leur peau, leur viande et leurs excréments. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Celui qui les brûlera lavera ses vêtements et lavera son corps dans l'eau; après cela, il rentrera dans le camp.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: '»C''est pour vous une prescription perpétuelle: le dixième jour du septième mois, vous vous humilierez, vous ne ferez aucun travail, ni l''Israélite ni l''étranger en séjour parmi vous. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'En effet, ce jour-là on fera l''expiation pour vous afin de vous purifier: vous serez purifiés de tous vos péchés devant l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Ce sera pour vous un sabbat, un jour de repos, et vous vous humilierez. C'est une prescription perpétuelle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: '»Celui qui fera l''expiation, c''est le prêtre désigné par onction et établi dans ses fonctions pour succéder à son père en tant que grand-prêtre; il mettra des vêtements de lin, des vêtements sacrés. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Il fera l''expiation pour le saint sanctuaire, il fera l''expiation pour la tente de la rencontre et pour l''autel, et il fera l''expiation pour les prêtres et pour tout le peuple de l''assemblée. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Ce sera pour vous une prescription perpétuelle: une fois par année se fera l''expiation pour les Israélites, à cause de leurs péchés.» On fit ce que l''Eternel avait ordonné à Moïse.'
