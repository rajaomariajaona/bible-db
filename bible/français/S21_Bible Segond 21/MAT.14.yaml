document_id: MAT.14,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Exécution de Jean-Baptiste
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: A cette époque-là, Hérode le tétrarque
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tétrarque: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: titre donné par les Romains aux princes de moins grande importance que les rois. C'étaient les Romains qui, en tant que puissance occupante, nommaient et destituaient les rois et autres roitelets des territoires placés sous leur autorité.
      marker-yv: yv-n
    - type: text
      text: ' entendit parler de Jésus, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et il envoya décapiter Jean dans la prison. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Sa tête fut apportée sur un plat et donnée à la jeune fille, qui l''apporta à sa mère. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les disciples de Jean vinrent prendre son corps et l'ensevelirent. Puis ils allèrent l'annoncer à Jésus.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Multiplication des pains pour 5000 hommes
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A cette nouvelle, Jésus partit de là dans une barque pour se retirer à l''écart dans un endroit désert; l''ayant appris, la foule sortit des villes et le suivit à pied. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand Jésus sortit de la barque, il vit une grande foule et fut rempli de compassion pour elle, et il guérit les malades.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le soir venu, les disciples s''approchèrent de lui et dirent: «Cet endroit est désert et l''heure est déjà avancée; renvoie la foule, afin qu''elle aille dans les villages pour s''acheter des vivres.» '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur répondit: «Ils n''ont pas besoin de s''en aller. Donnez-leur vous-mêmes à manger!» '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais ils lui dirent: «Nous n''avons ici que cinq pains et deux poissons.» '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Apportez-les-moi ici», leur dit Jésus. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il fit asseoir la foule sur l''herbe, prit les cinq pains et les deux poissons, leva les yeux vers le ciel et prononça la prière de bénédiction. Puis il rompit les pains et les donna aux disciples, qui les distribuèrent à la foule. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et il dit à ses serviteurs: «C''est Jean-Baptiste! Il est ressuscité, et c''est pour cela qu''il a le pouvoir de faire des miracles.»'
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous mangèrent et furent rassasiés, et l''on emporta douze paniers pleins des morceaux qui restaient. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ceux qui avaient mangé étaient environ 5000 hommes, sans compter les femmes et les enfants.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aussitôt après, Jésus obligea les disciples à monter dans la barque et à le précéder sur l''autre rive pendant qu''il renverrait la foule. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Quand il l'eut renvoyée, il monta sur la montagne pour prier à l'écart et, le soir venu, il était là seul.
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La barque se trouvait déjà au milieu du lac, battue par les vagues, car le vent était contraire. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A la fin de la nuit, Jésus alla vers eux en marchant sur le lac. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand les disciples le virent marcher sur le lac, ils furent affolés et dirent: «C''est un fantôme!» et, dans leur frayeur, ils poussèrent des cris. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus leur dit aussitôt: «Rassurez-vous, c''est moi. N''ayez pas peur!» '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pierre lui répondit: «Seigneur, si c''est toi, ordonne-moi d''aller vers toi sur l''eau.» '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui dit: «Viens!» Pierre sortit de la barque et marcha sur l''eau pour aller vers Jésus, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, Hérode avait fait arrêter Jean; il l''avait enchaîné et mis en prison à cause d''Hérodiade, la femme de son frère Philippe, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'mais, voyant que le vent était fort, il eut peur et, comme il commençait à s''enfoncer, il s''écria: «Seigneur, sauve-moi!» '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Aussitôt Jésus tendit la main, l''empoigna et lui dit: «Homme de peu de foi, pourquoi as-tu douté?» '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils montèrent dans la barque, et le vent tomba. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ceux qui étaient dans la barque vinrent se prosterner devant Jésus en disant: «Tu es vraiment le Fils de Dieu.»'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après avoir traversé le lac, ils arrivèrent dans la région de Génésareth. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les habitants de cet endroit reconnurent Jésus; ils envoyèrent des messagers dans tous les environs et on lui amena tous les malades. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils le suppliaient de leur permettre seulement de toucher le bord de son vêtement, et tous ceux qui le touchèrent furent guéris.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'car Jean lui disait: «Il ne t''est pas permis de l''avoir pour femme.» '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il voulait le faire mourir, mais il redoutait les réactions de la foule parce qu''elle considérait Jean comme un prophète. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or, lorsqu''on célébra l''anniversaire d''Hérode, la fille d''Hérodiade dansa au milieu des invités et plut à Hérode, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'de sorte qu''il promit avec serment de lui donner ce qu''elle demanderait. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A l''instigation de sa mère, elle dit: «Donne-moi ici, sur un plat, la tête de Jean-Baptiste.» '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi fut attristé, mais, à cause de ses serments et des invités, il ordonna de la lui donner '
