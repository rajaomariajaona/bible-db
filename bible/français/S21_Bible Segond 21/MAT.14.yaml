document_id: MAT.14,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Exécution de Jean-Baptiste
  - type: text
    content: A cette époque-là, Hérode le tétrarque
  - type: note
    content: 'Tétrarque: titre donné par les Romains aux princes de moins grande importance que les rois. C''étaient les Romains qui, en tant que puissance occupante, nommaient et destituaient les rois et autres roitelets des territoires placés sous leur autorité.'
  - type: text
    content: ' entendit parler de Jésus, '
  '10':
  - type: text
    content: 'et il envoya décapiter Jean dans la prison. '
  '11':
  - type: text
    content: 'Sa tête fut apportée sur un plat et donnée à la jeune fille, qui l''apporta à sa mère. '
  '12':
  - type: text
    content: Les disciples de Jean vinrent prendre son corps et l'ensevelirent. Puis ils allèrent l'annoncer à Jésus.
  - type: heading
    content: Multiplication des pains pour 5000 hommes
  '13':
  - type: text
    content: 'A cette nouvelle, Jésus partit de là dans une barque pour se retirer à l''écart dans un endroit désert; l''ayant appris, la foule sortit des villes et le suivit à pied. '
  '14':
  - type: text
    content: Quand Jésus sortit de la barque, il vit une grande foule et fut rempli de compassion pour elle, et il guérit les malades.
  '15':
  - type: text
    content: 'Le soir venu, les disciples s''approchèrent de lui et dirent: «Cet endroit est désert et l''heure est déjà avancée; renvoie la foule, afin qu''elle aille dans les villages pour s''acheter des vivres.» '
  '16':
  - type: text
    content: 'Jésus leur répondit: «Ils n''ont pas besoin de s''en aller. Donnez-leur vous-mêmes à manger!» '
  '17':
  - type: text
    content: 'Mais ils lui dirent: «Nous n''avons ici que cinq pains et deux poissons.» '
  '18':
  - type: text
    content: '«Apportez-les-moi ici», leur dit Jésus. '
  '19':
  - type: text
    content: 'Il fit asseoir la foule sur l''herbe, prit les cinq pains et les deux poissons, leva les yeux vers le ciel et prononça la prière de bénédiction. Puis il rompit les pains et les donna aux disciples, qui les distribuèrent à la foule. '
  '2':
  - type: text
    content: 'et il dit à ses serviteurs: «C''est Jean-Baptiste! Il est ressuscité, et c''est pour cela qu''il a le pouvoir de faire des miracles.»'
  '20':
  - type: text
    content: 'Tous mangèrent et furent rassasiés, et l''on emporta douze paniers pleins des morceaux qui restaient. '
  '21':
  - type: text
    content: Ceux qui avaient mangé étaient environ 5000 hommes, sans compter les femmes et les enfants.
  '22':
  - type: text
    content: 'Aussitôt après, Jésus obligea les disciples à monter dans la barque et à le précéder sur l''autre rive pendant qu''il renverrait la foule. '
  '23':
  - type: text
    content: Quand il l'eut renvoyée, il monta sur la montagne pour prier à l'écart et, le soir venu, il était là seul.
  '24':
  - type: text
    content: 'La barque se trouvait déjà au milieu du lac, battue par les vagues, car le vent était contraire. '
  '25':
  - type: text
    content: 'A la fin de la nuit, Jésus alla vers eux en marchant sur le lac. '
  '26':
  - type: text
    content: 'Quand les disciples le virent marcher sur le lac, ils furent affolés et dirent: «C''est un fantôme!» et, dans leur frayeur, ils poussèrent des cris. '
  '27':
  - type: text
    content: 'Jésus leur dit aussitôt: «Rassurez-vous, c''est moi. N''ayez pas peur!» '
  '28':
  - type: text
    content: 'Pierre lui répondit: «Seigneur, si c''est toi, ordonne-moi d''aller vers toi sur l''eau.» '
  '29':
  - type: text
    content: 'Jésus lui dit: «Viens!» Pierre sortit de la barque et marcha sur l''eau pour aller vers Jésus, '
  '3':
  - type: text
    content: 'En effet, Hérode avait fait arrêter Jean; il l''avait enchaîné et mis en prison à cause d''Hérodiade, la femme de son frère Philippe, '
  '30':
  - type: text
    content: 'mais, voyant que le vent était fort, il eut peur et, comme il commençait à s''enfoncer, il s''écria: «Seigneur, sauve-moi!» '
  '31':
  - type: text
    content: 'Aussitôt Jésus tendit la main, l''empoigna et lui dit: «Homme de peu de foi, pourquoi as-tu douté?» '
  '32':
  - type: text
    content: 'Ils montèrent dans la barque, et le vent tomba. '
  '33':
  - type: text
    content: 'Ceux qui étaient dans la barque vinrent se prosterner devant Jésus en disant: «Tu es vraiment le Fils de Dieu.»'
  '34':
  - type: text
    content: 'Après avoir traversé le lac, ils arrivèrent dans la région de Génésareth. '
  '35':
  - type: text
    content: 'Les habitants de cet endroit reconnurent Jésus; ils envoyèrent des messagers dans tous les environs et on lui amena tous les malades. '
  '36':
  - type: text
    content: Ils le suppliaient de leur permettre seulement de toucher le bord de son vêtement, et tous ceux qui le touchèrent furent guéris.
  '4':
  - type: text
    content: 'car Jean lui disait: «Il ne t''est pas permis de l''avoir pour femme.» '
  '5':
  - type: text
    content: 'Il voulait le faire mourir, mais il redoutait les réactions de la foule parce qu''elle considérait Jean comme un prophète. '
  '6':
  - type: text
    content: 'Or, lorsqu''on célébra l''anniversaire d''Hérode, la fille d''Hérodiade dansa au milieu des invités et plut à Hérode, '
  '7':
  - type: text
    content: 'de sorte qu''il promit avec serment de lui donner ce qu''elle demanderait. '
  '8':
  - type: text
    content: 'A l''instigation de sa mère, elle dit: «Donne-moi ici, sur un plat, la tête de Jean-Baptiste.» '
  '9':
  - type: text
    content: 'Le roi fut attristé, mais, à cause de ses serments et des invités, il ordonna de la lui donner '
