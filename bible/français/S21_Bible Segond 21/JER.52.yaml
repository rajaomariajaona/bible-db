document_id: JER.52,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Récit de la chute de Jérusalem
  - type: heading
    content: 52.1-34
  - type: heading
    content: Siège et prise de Jérusalem
  - type: text
    content: Sédécias avait 21 ans lorsqu'il devint roi et il régna 11 ans à Jérusalem. Sa mère s'appelait Hamuthal et c'était la fille de Jérémie, de Libna.
  '10':
  - type: text
    content: 'Le roi de Babylone fit égorger les fils de Sédécias en sa présence; il fit aussi égorger tous les chefs de Juda à Ribla. '
  '11':
  - type: text
    content: Puis il fit crever les yeux à Sédécias et le fit attacher avec des chaînes en bronze. Le roi de Babylone le conduisit à Babylone et le jeta en prison, jusqu'au jour de sa mort.
  '12':
  - type: text
    content: 'Le dixième jour du cinquième mois – c''était la dix-neuvième année du règne de Nebucadnetsar sur Babylone – Nebuzaradan, le chef des gardes qui était au service du roi de Babylone, pénétra dans Jérusalem. '
  '13':
  - type: text
    content: 'Il brûla la maison de l''Eternel, le palais royal et toutes les maisons de Jérusalem. Il livra aux flammes toutes les maisons d''une certaine importance. '
  '14':
  - type: text
    content: Toute l'armée babylonienne qui accompagnait le chef des gardes démolit la totalité des murailles formant l'enceinte de Jérusalem.
  '15':
  - type: text
    content: 'Nebuzaradan, le chef des gardes, emmena en exil une partie des pauvres du peuple, les membres du peuple qui étaient restés dans la ville, ceux qui s''étaient déjà rendus au roi de Babylone et tout le reste des artisans. '
  '16':
  - type: text
    content: Toutefois, Nebuzaradan, le chef des gardes, laissa comme vignerons et comme agriculteurs une partie des pauvres du pays.
  '17':
  - type: text
    content: 'Les Babyloniens brisèrent les colonnes en bronze qui étaient dans la maison de l''Eternel, ainsi que les bases et la cuve en bronze qui s''y trouvaient, et ils en emportèrent tout le bronze à Babylone. '
  '18':
  - type: text
    content: 'Ils prirent les cendriers, les pelles, les couteaux, les coupes, les tasses et tous les ustensiles en bronze qu''on utilisait pour le culte. '
  '19':
  - type: text
    content: 'Le chef des gardes prit encore les bassins, les brûle-parfums, les coupes, les cendriers, les chandeliers, les tasses et les gobelets, aussi bien ce qui était en or que ce qui était en argent. '
  '2':
  - type: text
    content: 'Il fit ce qui est mal aux yeux de l''Eternel, entièrement comme l''avait fait Jojakim. '
  '20':
  - type: text
    content: 'Quant aux deux colonnes, à la cuve et aux 12 bœufs en bronze qui servaient de base, ceux que le roi Salomon avait faits pour la maison de l''Eternel, il était impossible de peser le bronze de tous ces éléments. '
  '21':
  - type: text
    content: 'La hauteur d''une colonne était de 9 mètres et l''on pouvait en faire le tour avec un cordon de 6 mètres. Elle était creuse, derrière une épaisseur de bronze de 8 centimètres. '
  '22':
  - type: text
    content: 'Il y avait au-dessus un chapiteau en bronze. Il était haut de 2 mètres et demi; autour du chapiteau il y avait un treillis et des grenades, le tout en bronze. Il en allait de même pour la seconde colonne, aussi avec des grenades. '
  '23':
  - type: text
    content: Il y avait 96 grenades de chaque côté et un total de 100 grenades autour du treillis.
  '24':
  - type: text
    content: 'Le chef des gardes captura le grand-prêtre Seraja, le prêtre adjoint Sophonie et les trois gardiens de l''entrée. '
  '25':
  - type: text
    content: 'Dans la ville, il captura un eunuque qui commandait aux hommes de guerre, 7 hommes qui faisaient partie des conseillers du roi et qu''on trouva dans la ville, le secrétaire du chef de l''armée chargé d''enrôler la population du pays, ainsi que 60 hommes pris parmi la population du pays qu''on trouva dans la ville. '
  '26':
  - type: text
    content: 'Nebuzaradan, le chef des gardes, les captura et les conduisit vers le roi de Babylone à Ribla, '
  '27':
  - type: text
    content: et le roi de Babylone les frappa à mort à Ribla, dans le pays de Hamath. C'est ainsi que Juda partit en exil loin de sa terre.
  '28':
  - type: text
    content: 'Voici la population que Nebucadnetsar emmena en exil: la septième année de son règne, 3023 Juifs; '
  '29':
  - type: text
    content: 'la dix-huitième année de son règne, il emmena de Jérusalem 832 personnes; '
  '3':
  - type: text
    content: 'Cela arriva à cause de la colère de l''Eternel contre Jérusalem et contre Juda: il était si irrité qu''il voulait les rejeter loin de lui. Sédécias se révolta contre le roi de Babylone.'
  '30':
  - type: text
    content: la vingt-troisième année de son règne, Nebuzaradan, le chef des gardes, emmena en exil 745 Juifs. Cela fait un total de 4600 personnes.
  - type: heading
    content: Libération de Jojakin
  '31':
  - type: text
    content: 'La trente-septième année de l''exil de Jojakin, roi de Juda, le vingt-cinquième jour du douzième mois, Evil-Merodac, le roi de Babylone, releva la tête du roi de Juda Jojakin et le fit sortir de prison. C''était la première année de son règne. '
  '32':
  - type: text
    content: 'Il lui parla avec bonté et lui donna une place supérieure à celle des autres rois retenus avec lui à Babylone. '
  '33':
  - type: text
    content: 'Il lui fit changer ses habits de prisonnier et Jojakin mangea à sa table tout le reste de sa vie. '
  '34':
  - type: text
    content: Le roi de Babylone pourvut constamment à son entretien journalier durant tout le reste de sa vie, jusqu'au jour de sa mort.
  '4':
  - type: text
    content: 'Alors, la neuvième année du règne de Sédécias, le dixième jour du dixième mois, Nebucadnetsar, le roi de Babylone, vint avec toute son armée attaquer Jérusalem. Ils installèrent leur camp devant elle et construisirent des retranchements tout autour d''elle. '
  '5':
  - type: text
    content: Le siège de la ville dura jusqu'à la onzième année du règne de Sédécias.
  '6':
  - type: text
    content: 'Le neuvième jour du quatrième mois, la famine était si forte dans la ville qu''il n''y avait plus de pain pour la population du pays. '
  '7':
  - type: text
    content: 'Alors on fit une brèche dans les remparts de la ville et tous les hommes de guerre s''enfuirent et sortirent de la ville pendant la nuit en passant par la porte située entre les deux murailles près du jardin du roi, alors même que les Babyloniens encerclaient la ville. Les fuyards prirent le chemin de la plaine. '
  '8':
  - type: text
    content: 'Cependant, l''armée babylonienne poursuivit le roi et rattrapa Sédécias dans les plaines de Jéricho. Toute son armée se dispersa loin de lui. '
  '9':
  - type: text
    content: 'Ils s''emparèrent du roi et le firent monter vers le roi de Babylone à Ribla, dans le pays de Hamath. Nebucadnetsar prononça des jugements contre lui. '
