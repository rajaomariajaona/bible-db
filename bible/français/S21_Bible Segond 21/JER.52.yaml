document_id: JER.52
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Récit de la chute de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 52.1-34
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Siège et prise de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Sédécias avait 21 ans lorsqu'il devint roi et il régna 11 ans à Jérusalem. Sa mère s'appelait Hamuthal et c'était la fille de Jérémie, de Libna.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il fit ce qui est mal aux yeux de l''Eternel, entièrement comme l''avait fait Jojakim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Cela arriva à cause de la colère de l''Eternel contre Jérusalem et contre Juda: il était si irrité qu''il voulait les rejeter loin de lui. Sédécias se révolta contre le roi de Babylone.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Alors, la neuvième année du règne de Sédécias, le dixième jour du dixième mois, Nebucadnetsar, le roi de Babylone, vint avec toute son armée attaquer Jérusalem. Ils installèrent leur camp devant elle et construisirent des retranchements tout autour d''elle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Le siège de la ville dura jusqu'à la onzième année du règne de Sédécias.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le neuvième jour du quatrième mois, la famine était si forte dans la ville qu''il n''y avait plus de pain pour la population du pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors on fit une brèche dans les remparts de la ville et tous les hommes de guerre s''enfuirent et sortirent de la ville pendant la nuit en passant par la porte située entre les deux murailles près du jardin du roi, alors même que les Babyloniens encerclaient la ville. Les fuyards prirent le chemin de la plaine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Cependant, l''armée babylonienne poursuivit le roi et rattrapa Sédécias dans les plaines de Jéricho. Toute son armée se dispersa loin de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ils s''emparèrent du roi et le firent monter vers le roi de Babylone à Ribla, dans le pays de Hamath. Nebucadnetsar prononça des jugements contre lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le roi de Babylone fit égorger les fils de Sédécias en sa présence; il fit aussi égorger tous les chefs de Juda à Ribla. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Puis il fit crever les yeux à Sédécias et le fit attacher avec des chaînes en bronze. Le roi de Babylone le conduisit à Babylone et le jeta en prison, jusqu'au jour de sa mort.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Le dixième jour du cinquième mois – c''était la dix-neuvième année du règne de Nebucadnetsar sur Babylone – Nebuzaradan, le chef des gardes qui était au service du roi de Babylone, pénétra dans Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il brûla la maison de l''Eternel, le palais royal et toutes les maisons de Jérusalem. Il livra aux flammes toutes les maisons d''une certaine importance. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Toute l'armée babylonienne qui accompagnait le chef des gardes démolit la totalité des murailles formant l'enceinte de Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Nebuzaradan, le chef des gardes, emmena en exil une partie des pauvres du peuple, les membres du peuple qui étaient restés dans la ville, ceux qui s''étaient déjà rendus au roi de Babylone et tout le reste des artisans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Toutefois, Nebuzaradan, le chef des gardes, laissa comme vignerons et comme agriculteurs une partie des pauvres du pays.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les Babyloniens brisèrent les colonnes en bronze qui étaient dans la maison de l''Eternel, ainsi que les bases et la cuve en bronze qui s''y trouvaient, et ils en emportèrent tout le bronze à Babylone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils prirent les cendriers, les pelles, les couteaux, les coupes, les tasses et tous les ustensiles en bronze qu''on utilisait pour le culte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le chef des gardes prit encore les bassins, les brûle-parfums, les coupes, les cendriers, les chandeliers, les tasses et les gobelets, aussi bien ce qui était en or que ce qui était en argent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Quant aux deux colonnes, à la cuve et aux 12 bœufs en bronze qui servaient de base, ceux que le roi Salomon avait faits pour la maison de l''Eternel, il était impossible de peser le bronze de tous ces éléments. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'La hauteur d''une colonne était de 9 mètres et l''on pouvait en faire le tour avec un cordon de 6 mètres. Elle était creuse, derrière une épaisseur de bronze de 8 centimètres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il y avait au-dessus un chapiteau en bronze. Il était haut de 2 mètres et demi; autour du chapiteau il y avait un treillis et des grenades, le tout en bronze. Il en allait de même pour la seconde colonne, aussi avec des grenades. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Il y avait 96 grenades de chaque côté et un total de 100 grenades autour du treillis.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Le chef des gardes captura le grand-prêtre Seraja, le prêtre adjoint Sophonie et les trois gardiens de l''entrée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Dans la ville, il captura un eunuque qui commandait aux hommes de guerre, 7 hommes qui faisaient partie des conseillers du roi et qu''on trouva dans la ville, le secrétaire du chef de l''armée chargé d''enrôler la population du pays, ainsi que 60 hommes pris parmi la population du pays qu''on trouva dans la ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Nebuzaradan, le chef des gardes, les captura et les conduisit vers le roi de Babylone à Ribla, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: et le roi de Babylone les frappa à mort à Ribla, dans le pays de Hamath. C'est ainsi que Juda partit en exil loin de sa terre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Voici la population que Nebucadnetsar emmena en exil: la septième année de son règne, 3023 Juifs; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'la dix-huitième année de son règne, il emmena de Jérusalem 832 personnes; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: la vingt-troisième année de son règne, Nebuzaradan, le chef des gardes, emmena en exil 745 Juifs. Cela fait un total de 4600 personnes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Libération de Jojakin
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'La trente-septième année de l''exil de Jojakin, roi de Juda, le vingt-cinquième jour du douzième mois, Evil-Merodac, le roi de Babylone, releva la tête du roi de Juda Jojakin et le fit sortir de prison. C''était la première année de son règne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Il lui parla avec bonté et lui donna une place supérieure à celle des autres rois retenus avec lui à Babylone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Il lui fit changer ses habits de prisonnier et Jojakin mangea à sa table tout le reste de sa vie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Le roi de Babylone pourvut constamment à son entretien journalier durant tout le reste de sa vie, jusqu'au jour de sa mort.
