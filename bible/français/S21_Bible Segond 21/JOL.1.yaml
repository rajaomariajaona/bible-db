document_id: JOL.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Une invasion dévastatrice
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Parole de l'Eternel adressée à Joël, fils de Pethuel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ecoutez ceci, anciens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Anciens: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: terme pouvant désigner les responsables du peuple ou les vieillards.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: prêtez l'oreille, vous tous, habitants du pays!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Est-il déjà arrivé quelque chose de pareil durant votre vie
- type: usfm
  marker: q1
  children:
  - type: text
    text: ou celle de vos ancêtres?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Racontez-le à vos enfants,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que vos enfants le racontent à leurs enfants
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leurs enfants à la génération qui suivra!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Ce qu'a laissé la chenille, la sauterelle l'a dévoré;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce qu'a laissé la sauterelle, le grillon l'a dévoré;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce qu'a laissé le grillon, le criquet l'a dévoré.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Réveillez-vous, ivrognes, et pleurez!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Vous tous, buveurs de vin, lamentez-vous
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que le vin nouveau vous est enlevé de la bouche!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: En effet, un peuple est venu fondre sur mon pays.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il est puissant et innombrable.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il a les dents d'un lion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les mâchoires d'une lionne.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il a dévasté ma vigne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il a ravagé mon figuier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il l'a dépouillé, abattu.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les rameaux de la vigne ont blanchi.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Lamente-toi, comme la jeune femme qui s'habille d'un sac
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour pleurer le fiancé de sa jeunesse!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les offrandes végétales et liquides ont disparu de la maison de l'Eternel;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les prêtres, les serviteurs de l'Eternel, sont dans le deuil.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Les champs sont dévastés,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la terre est attristée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car les blés sont détruits,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le vin nouveau est perdu, l'huile est desséchée.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Les laboureurs sont consternés, les vignerons se lamentent
- type: usfm
  marker: q1
  children:
  - type: text
    text: à cause du blé et de l'orge,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce que la moisson des champs est perdue.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: La vigne est desséchée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: le figuier flétri; le grenadier, le palmier, le pommier,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les arbres des champs sont desséchés.
- type: usfm
  marker: q1
  children:
  - type: text
    text: La joie a cessé parmi les hommes!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Prêtres, couvrez-vous de sacs et pleurez!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Lamentez-vous, serviteurs de l'autel!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Venez, passez la nuit habillés de sacs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: serviteurs de mon Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car les offrandes végétales et liquides ont été retenues loin de la maison de votre Dieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Proclamez un jeûne, une assemblée solennelle!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Rassemblez les anciens, tous les habitants du pays,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans la maison de l'Eternel, votre Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et criez à l'Eternel!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Quel jour terrible!
- type: usfm
  marker: q1
  children:
  - type: text
    text: '*Oui, le jour de l''Eternel est proche,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il vient comme une dévastation décidée par le Tout-Puissant.
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Oui… Tout-Puissant: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'même texte en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 13.6
      metadata:
        usfm: ISA.13.6
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: La nourriture n'est-elle pas enlevée sous nos yeux?
- type: usfm
  marker: q1
  children:
  - type: text
    text: La joie et l'allégresse n'ont-elles pas disparu de la maison de notre Dieu?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Les semences ont séché sous les mottes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les greniers sont vides,
- type: usfm
  marker: q1
  children:
  - type: text
    text: les entrepôts sont en ruine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il n'y a pas de blé.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Comme les bêtes gémissent!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les troupeaux de bœufs sont effrayés
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu'ils n'ont plus de pâturage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et même les troupeaux de brebis dépérissent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: C'est vers toi que je crie, Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car le feu a dévoré les plaines du désert
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la flamme a brûlé tous les arbres des champs.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Les bêtes sauvages crient aussi vers toi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car les torrents sont à sec
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le feu a dévoré les plaines du désert.
