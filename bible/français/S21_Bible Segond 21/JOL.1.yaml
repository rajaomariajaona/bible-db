document_id: JOL.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Une invasion dévastatrice
  - type: text
    content: Parole de l'Eternel adressée à Joël, fils de Pethuel.
  '10':
  - type: text
    content: Les champs sont dévastés,
  - type: text
    content: la terre est attristée,
  - type: text
    content: car les blés sont détruits,
  - type: text
    content: le vin nouveau est perdu, l'huile est desséchée.
  '11':
  - type: text
    content: Les laboureurs sont consternés, les vignerons se lamentent
  - type: text
    content: à cause du blé et de l'orge,
  - type: text
    content: parce que la moisson des champs est perdue.
  '12':
  - type: text
    content: La vigne est desséchée,
  - type: text
    content: le figuier flétri; le grenadier, le palmier, le pommier,
  - type: text
    content: tous les arbres des champs sont desséchés.
  - type: text
    content: La joie a cessé parmi les hommes!
  '13':
  - type: text
    content: Prêtres, couvrez-vous de sacs et pleurez!
  - type: text
    content: Lamentez-vous, serviteurs de l'autel!
  - type: text
    content: Venez, passez la nuit habillés de sacs,
  - type: text
    content: serviteurs de mon Dieu,
  - type: text
    content: car les offrandes végétales et liquides ont été retenues loin de la maison de votre Dieu.
  '14':
  - type: text
    content: Proclamez un jeûne, une assemblée solennelle!
  - type: text
    content: Rassemblez les anciens, tous les habitants du pays,
  - type: text
    content: dans la maison de l'Eternel, votre Dieu,
  - type: text
    content: et criez à l'Eternel!
  '15':
  - type: text
    content: Quel jour terrible!
  - type: text
    content: '*Oui, le jour de l''Eternel est proche,'
  - type: text
    content: il vient comme une dévastation décidée par le Tout-Puissant.
  - type: note
    content: 'Oui… Tout-Puissant: même texte en Esaïe 13.6.'
  '16':
  - type: text
    content: La nourriture n'est-elle pas enlevée sous nos yeux?
  - type: text
    content: La joie et l'allégresse n'ont-elles pas disparu de la maison de notre Dieu?
  '17':
  - type: text
    content: Les semences ont séché sous les mottes,
  - type: text
    content: les greniers sont vides,
  - type: text
    content: les entrepôts sont en ruine,
  - type: text
    content: car il n'y a pas de blé.
  '18':
  - type: text
    content: Comme les bêtes gémissent!
  - type: text
    content: Les troupeaux de bœufs sont effrayés
  - type: text
    content: parce qu'ils n'ont plus de pâturage,
  - type: text
    content: et même les troupeaux de brebis dépérissent.
  '19':
  - type: text
    content: C'est vers toi que je crie, Eternel,
  - type: text
    content: car le feu a dévoré les plaines du désert
  - type: text
    content: et la flamme a brûlé tous les arbres des champs.
  '2':
  - type: text
    content: Ecoutez ceci, anciens
  - type: note
    content: 'Anciens: terme pouvant désigner les responsables du peuple ou les vieillards.'
  - type: text
    content: ','
  - type: text
    content: prêtez l'oreille, vous tous, habitants du pays!
  - type: text
    content: Est-il déjà arrivé quelque chose de pareil durant votre vie
  - type: text
    content: ou celle de vos ancêtres?
  '20':
  - type: text
    content: Les bêtes sauvages crient aussi vers toi,
  - type: text
    content: car les torrents sont à sec
  - type: text
    content: et le feu a dévoré les plaines du désert.
  '3':
  - type: text
    content: Racontez-le à vos enfants,
  - type: text
    content: que vos enfants le racontent à leurs enfants
  - type: text
    content: et leurs enfants à la génération qui suivra!
  '4':
  - type: text
    content: Ce qu'a laissé la chenille, la sauterelle l'a dévoré;
  - type: text
    content: ce qu'a laissé la sauterelle, le grillon l'a dévoré;
  - type: text
    content: ce qu'a laissé le grillon, le criquet l'a dévoré.
  '5':
  - type: text
    content: Réveillez-vous, ivrognes, et pleurez!
  - type: text
    content: Vous tous, buveurs de vin, lamentez-vous
  - type: text
    content: parce que le vin nouveau vous est enlevé de la bouche!
  '6':
  - type: text
    content: En effet, un peuple est venu fondre sur mon pays.
  - type: text
    content: Il est puissant et innombrable.
  - type: text
    content: Il a les dents d'un lion,
  - type: text
    content: les mâchoires d'une lionne.
  '7':
  - type: text
    content: Il a dévasté ma vigne,
  - type: text
    content: il a ravagé mon figuier,
  - type: text
    content: il l'a dépouillé, abattu.
  - type: text
    content: Les rameaux de la vigne ont blanchi.
  '8':
  - type: text
    content: Lamente-toi, comme la jeune femme qui s'habille d'un sac
  - type: text
    content: pour pleurer le fiancé de sa jeunesse!
  '9':
  - type: text
    content: Les offrandes végétales et liquides ont disparu de la maison de l'Eternel;
  - type: text
    content: les prêtres, les serviteurs de l'Eternel, sont dans le deuil.
