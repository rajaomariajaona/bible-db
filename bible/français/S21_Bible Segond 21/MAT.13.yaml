document_id: MAT.13,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Paraboles du royaume des cieux 13.1-53
  - type: heading
    content: Le semeur et les terrains
  - type: text
    content: 'Ce jour-là, Jésus sortit de la maison et s''assit au bord du lac. '
  '10':
  - type: text
    content: 'Les disciples s''approchèrent et lui dirent: «Pourquoi leur parles-tu en paraboles?» '
  '11':
  - type: text
    content: 'Jésus [leur] répondit: «Parce qu''il vous a été donné, à vous, de connaître les mystères du royaume des cieux, mais qu''à eux cela n''a pas été donné. '
  '12':
  - type: text
    content: 'En effet, on donnera à celui qui a et il sera dans l''abondance, mais à celui qui n''a pas on enlèvera même ce qu''il a. '
  '13':
  - type: text
    content: 'C''est pourquoi je leur parle en paraboles, parce qu''en voyant ils ne voient pas et qu''en entendant ils n''entendent pas et ne comprennent pas. '
  '14':
  - type: text
    content: 'Pour eux s''accomplit cette prophétie d''Esaïe: '
  - type: text
    content: Vous aurez beau entendre, vous ne comprendrez pas, vous aurez beau regarder, vous ne verrez pas.
  - type: text
    content: ' '
  '15':
  - type: text
    content: En effet, le cœur de ce peuple est devenu insensible; ils se sont bouché les oreilles et ils ont fermé les yeux de peur que leurs yeux ne voient, que leurs oreilles n'entendent, que leur cœur ne comprenne, qu'ils ne se convertissent et que je ne les guérisse
  - type: text
    content: .
  - type: note
    content: 'Vous aurez… guérisse: citation d''Esaïe 6.9-10.'
  - type: text
    content: ' '
  '16':
  - type: text
    content: 'Mais heureux sont vos yeux parce qu''ils voient, et vos oreilles parce qu''elles entendent! '
  '17':
  - type: text
    content: Je vous le dis en vérité, beaucoup de prophètes et de justes ont désiré voir ce que vous voyez et ne l'ont pas vu, entendre ce que vous entendez et ne l'ont pas entendu.
  '18':
  - type: text
    content: '»Vous donc, écoutez ce que signifie la parabole du semeur. '
  '19':
  - type: text
    content: Lorsqu'un homme entend la parole du royaume et ne la comprend pas, le mauvais
  - type: note
    content: 'Le mauvais: c''est-à-dire le diable.'
  - type: text
    content: ' vient et enlève ce qui a été semé dans son cœur: cet homme est celui qui a reçu la semence le long du chemin. '
  '2':
  - type: text
    content: 'La foule se rassembla autour de lui, si nombreuse qu''il monta dans une barque où il s''assit. Toute la foule se tenait sur le rivage. '
  '20':
  - type: text
    content: 'Celui qui a reçu la semence dans le sol pierreux, c''est celui qui entend la parole et l''accepte aussitôt avec joie; '
  '21':
  - type: text
    content: 'mais il n''a pas de racines en lui-même, il est l''homme d''un moment et, dès que surviennent les difficultés ou la persécution à cause de la parole, il trébuche. '
  '22':
  - type: text
    content: 'Celui qui a reçu la semence parmi les ronces, c''est celui qui entend la parole, mais les préoccupations de ce monde et l''attrait trompeur des richesses étouffent cette parole et la rendent infructueuse. '
  '23':
  - type: text
    content: Celui qui a reçu la semence dans la bonne terre, c'est celui qui entend la parole et la comprend; il porte du fruit avec un rapport de 100, 60 ou 30 pour 1.»
  - type: heading
    content: La mauvaise herbe et le bon grain
  '24':
  - type: text
    content: 'Il leur proposa une autre parabole: «Le royaume des cieux ressemble à un homme qui avait semé une bonne semence dans son champ. '
  '25':
  - type: text
    content: 'Mais, pendant que les gens dormaient, son ennemi vint, sema de la mauvaise herbe parmi le blé et s''en alla. '
  '26':
  - type: text
    content: 'Lorsque le blé eut poussé et donné du fruit, la mauvaise herbe apparut aussi. '
  '27':
  - type: text
    content: 'Les serviteurs du maître de la maison vinrent lui dire: ‘Seigneur, n''as-tu pas semé une bonne semence dans ton champ? Comment se fait-il donc qu''il y ait de la mauvaise herbe?’ '
  '28':
  - type: text
    content: 'Il leur répondit: ‘C''est un ennemi qui a fait cela.’ Les serviteurs lui dirent: ‘Veux-tu que nous allions l''arracher?’ '
  '29':
  - type: text
    content: '‘Non, dit-il, de peur qu''en arrachant la mauvaise herbe vous ne déraciniez en même temps le blé. '
  '3':
  - type: text
    content: Il leur parla en paraboles
  - type: note
    content: 'Paraboles: histoires visant à faire comprendre une vérité spirituelle au moyen d''un exemple tiré de la vie courante.'
  - type: text
    content: ' sur beaucoup de choses. Il dit: '
  '30':
  - type: text
    content: 'Laissez l''un et l''autre pousser ensemble jusqu''à la moisson et, au moment de la moisson, je dirai aux moissonneurs: Arrachez d''abord la mauvaise herbe et liez-la en gerbes pour la brûler, mais amassez le blé dans mon grenier.’»'
  - type: heading
    content: La graine de moutarde et le levain
  '31':
  - type: text
    content: 'Il leur proposa une autre parabole: «Le royaume des cieux ressemble à une graine de moutarde qu''un homme a prise et semée dans son champ. '
  '32':
  - type: text
    content: C'est la plus petite de toutes les semences, mais quand elle a poussé, elle est plus grande que les légumes et devient un arbre, de sorte que les oiseaux du ciel viennent habiter dans ses branches.»
  '33':
  - type: text
    content: 'Il leur dit cette autre parabole: «Le royaume des cieux ressemble à du levain qu''une femme a pris et mis dans trois mesures de farine pour faire lever toute la pâte.»'
  '34':
  - type: text
    content: 'Jésus dit toutes ces choses en paraboles à la foule, et il ne lui parlait pas sans parabole '
  '35':
  - type: text
    content: 'afin que s''accomplisse ce que le prophète avait annoncé: '
  - type: text
    content: J'ouvrirai ma bouche pour parler en paraboles, je proclamerai des choses cachées depuis la création [du monde]
  - type: text
    content: .
  - type: note
    content: 'J''ouvrirai… du monde: citation du Psaume 78.2.'
  - type: heading
    content: Explication de la parabole de la mauvaise herbe
  '36':
  - type: text
    content: 'Alors Jésus renvoya la foule et entra dans la maison. Ses disciples s''approchèrent de lui en disant: «Explique-nous la parabole de la mauvaise herbe dans le champ.» '
  '37':
  - type: text
    content: 'Il [leur] répondit: «Celui qui sème la bonne semence, c''est le Fils de l''homme; '
  '38':
  - type: text
    content: le champ, c'est le monde; la bonne semence, ce sont les enfants du royaume; la mauvaise herbe, ce sont les enfants du mal
  - type: note
    content: 'Du mal: ou du mauvais (c''est-à-dire le diable).'
  - type: text
    content: '; '
  '39':
  - type: text
    content: 'l''ennemi qui l''a semée, c''est le diable; la moisson, c''est la fin du monde; les moissonneurs, ce sont les anges. '
  '4':
  - type: text
    content: '«Un semeur sortit pour semer. Comme il semait, une partie de la semence tomba le long du chemin; les oiseaux vinrent et la mangèrent. '
  '40':
  - type: text
    content: 'Tout comme on arrache la mauvaise herbe et la jette au feu, on fera de même à la fin du monde: '
  '41':
  - type: text
    content: 'le Fils de l''homme enverra ses anges; ils arracheront de son royaume tous les pièges et ceux qui commettent le mal, '
  '42':
  - type: text
    content: 'et ils les jetteront dans la fournaise de feu où il y aura des pleurs et des grincements de dents. '
  '43':
  - type: text
    content: Alors les justes resplendiront comme le soleil dans le royaume de leur Père. Que celui qui a des oreilles [pour entendre] entende.
  - type: heading
    content: Comparaisons diverses
  '44':
  - type: text
    content: »Le royaume des cieux ressemble [encore] à un trésor caché dans un champ. L'homme qui l'a trouvé le cache et, dans sa joie, il va vendre tout ce qu'il possède et achète ce champ.
  '45':
  - type: text
    content: '»Le royaume des cieux ressemble encore à un marchand qui cherche de belles perles. '
  '46':
  - type: text
    content: Lorsqu'il a trouvé une perle de grande valeur, il est allé vendre tout ce qu'il possédait et l'a achetée.
  '47':
  - type: text
    content: '»Le royaume des cieux ressemble encore à un filet jeté dans la mer et qui ramène des poissons de toutes sortes. '
  '48':
  - type: text
    content: 'Quand il est rempli, les pêcheurs le tirent sur le rivage et s''asseyent; puis ils mettent dans des paniers ce qui est bon et jettent ce qui est mauvais. '
  '49':
  - type: text
    content: 'Il en ira de même à la fin du monde: les anges viendront séparer les méchants d''avec les justes '
  '5':
  - type: text
    content: 'Une autre partie tomba dans un sol pierreux où elle n''avait pas beaucoup de terre; elle leva aussitôt, parce qu''elle ne trouva pas un terrain profond, '
  '50':
  - type: text
    content: et les jetteront dans la fournaise de feu, où il y aura des pleurs et des grincements de dents.»
  '51':
  - type: text
    content: '[Jésus leur dit:] «Avez-vous compris tout cela?» «Oui, [Seigneur]», répondirent-ils. '
  '52':
  - type: text
    content: 'Et il leur dit: «C''est pourquoi, tout spécialiste de la loi instruit de ce qui concerne le royaume des cieux ressemble à un maître de maison qui tire de son trésor des choses nouvelles et des choses anciennes.» '
  '53':
  - type: text
    content: Lorsque Jésus eut fini de dire ces paraboles, il partit de là.
  - type: heading
    content: Fin du ministère de Jésus en Galilée et au-delà
  - type: heading
    content: 13.54–18.35
  - type: heading
    content: Jésus rejeté à Nazareth
  '54':
  - type: text
    content: 'Il se rendit dans sa patrie, et il enseignait dans la synagogue, de sorte que ceux qui l''entendirent étaient étonnés et disaient: «D''où lui viennent cette sagesse et ces miracles? '
  '55':
  - type: text
    content: 'N''est-il pas le fils du charpentier? N''est-ce pas Marie qui est sa mère? Jacques, Joseph, Simon et Jude ne sont-ils pas ses frères? '
  '56':
  - type: text
    content: 'Et ses sœurs ne sont-elles pas toutes parmi nous? D''où lui vient donc tout cela?» '
  '57':
  - type: text
    content: 'Et il représentait un obstacle pour eux. Mais Jésus leur dit: «Un prophète n''est méprisé que dans sa patrie et dans sa famille.» '
  '58':
  - type: text
    content: Il ne fit pas beaucoup de miracles à cet endroit à cause de leur incrédulité.
  '6':
  - type: text
    content: 'mais quand le soleil parut, elle fut brûlée et sécha, faute de racines. '
  '7':
  - type: text
    content: 'Une autre partie tomba parmi les ronces; les ronces poussèrent et l''étouffèrent. '
  '8':
  - type: text
    content: 'Une autre partie tomba dans la bonne terre; elle donna du fruit avec un rapport de 100, 60 ou 30 pour 1. '
  '9':
  - type: text
    content: Que celui qui a des oreilles [pour entendre] entende.»
