document_id: PSA.39,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La fragilité de l'homme
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Au chef de chœur, à Jeduthun. Psaume de David.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je reste muet, je n'ouvre pas la bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c'est toi qui agis.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Détourne tes coups de moi!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je m'épuise sous les attaques de ta main.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tu corriges l'homme en le punissant de sa faute,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu détruis comme la teigne ce qu'il a de plus cher.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oui, tout homme n''est qu''un souffle. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ecoute ma prière, Eternel, et prête l'oreille à mes cris!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne sois pas insensible à mes larmes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car je suis un étranger chez toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un résident temporaire, comme tous mes ancêtres.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Détourne ton regard de moi et laisse-moi respirer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant que je m'en aille et que je disparaisse!
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je disais: «Je veillerai sur ma conduite'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de peur de pécher en paroles;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je mettrai un frein à mes lèvres
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tant que le méchant sera devant moi.»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis resté muet, dans le silence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je me suis tu, quoique malheureux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ma douleur était vive.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon cœur brûlait au fond de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mes pensées étaient comme un feu brûlant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et la parole est venue sur ma langue:'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Eternel, fais-moi connaître quand finira ma vie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quel est le nombre de mes jours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que je sache combien je suis peu de chose.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voici, tu as donné à mes jours la largeur de la main,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ma vie est comme un rien devant toi.»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oui, même vigoureux, l''homme n''est qu''un souffle. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oui, l''homme va et vient comme une ombre:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il s'agite, mais c'est pour du vent;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il amasse des richesses, et il ignore qui les recevra.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Maintenant, Seigneur, que puis-je espérer?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est en toi qu'est mon espérance.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Délivre-moi de toutes mes transgressions!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne m'expose pas aux insultes du fou!
