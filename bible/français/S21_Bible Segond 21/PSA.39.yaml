document_id: PSA.39,152
type_code: fra
verses:
  '1':
  - type: heading
    content: La fragilité de l'homme
  - type: text
    content: Au chef de chœur, à Jeduthun. Psaume de David.
  '10':
  - type: text
    content: Je reste muet, je n'ouvre pas la bouche,
  - type: text
    content: car c'est toi qui agis.
  '11':
  - type: text
    content: Détourne tes coups de moi!
  - type: text
    content: Je m'épuise sous les attaques de ta main.
  '12':
  - type: text
    content: Tu corriges l'homme en le punissant de sa faute,
  - type: text
    content: tu détruis comme la teigne ce qu'il a de plus cher.
  - type: text
    content: 'Oui, tout homme n''est qu''un souffle. '
  - type: text
    content: – Pause.
  '13':
  - type: text
    content: Ecoute ma prière, Eternel, et prête l'oreille à mes cris!
  - type: text
    content: Ne sois pas insensible à mes larmes,
  - type: text
    content: car je suis un étranger chez toi,
  - type: text
    content: un résident temporaire, comme tous mes ancêtres.
  '14':
  - type: text
    content: Détourne ton regard de moi et laisse-moi respirer,
  - type: text
    content: avant que je m'en aille et que je disparaisse!
  '2':
  - type: text
    content: 'Je disais: «Je veillerai sur ma conduite'
  - type: text
    content: de peur de pécher en paroles;
  - type: text
    content: je mettrai un frein à mes lèvres
  - type: text
    content: tant que le méchant sera devant moi.»
  '3':
  - type: text
    content: Je suis resté muet, dans le silence,
  - type: text
    content: je me suis tu, quoique malheureux,
  - type: text
    content: et ma douleur était vive.
  '4':
  - type: text
    content: Mon cœur brûlait au fond de moi,
  - type: text
    content: mes pensées étaient comme un feu brûlant,
  - type: text
    content: 'et la parole est venue sur ma langue:'
  '5':
  - type: text
    content: «Eternel, fais-moi connaître quand finira ma vie,
  - type: text
    content: quel est le nombre de mes jours,
  - type: text
    content: afin que je sache combien je suis peu de chose.
  '6':
  - type: text
    content: Voici, tu as donné à mes jours la largeur de la main,
  - type: text
    content: et ma vie est comme un rien devant toi.»
  - type: text
    content: 'Oui, même vigoureux, l''homme n''est qu''un souffle. '
  - type: text
    content: – Pause.
  '7':
  - type: text
    content: 'Oui, l''homme va et vient comme une ombre:'
  - type: text
    content: il s'agite, mais c'est pour du vent;
  - type: text
    content: il amasse des richesses, et il ignore qui les recevra.
  '8':
  - type: text
    content: Maintenant, Seigneur, que puis-je espérer?
  - type: text
    content: C'est en toi qu'est mon espérance.
  '9':
  - type: text
    content: Délivre-moi de toutes mes transgressions!
  - type: text
    content: Ne m'expose pas aux insultes du fou!
