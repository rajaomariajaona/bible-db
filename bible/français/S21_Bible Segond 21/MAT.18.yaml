document_id: MAT.18,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Petits et grands dans le royaume des cieux
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A ce moment-là, les disciples s''approchèrent de Jésus et dirent: «Qui donc est le plus grand dans le royaume des cieux?» '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Faites bien attention de ne pas mépriser un seul de ces petits, car je vous dis que leurs anges dans le ciel sont continuellement en présence de mon Père céleste. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '[En effet, le Fils de l''homme est venu sauver ce qui était perdu.]'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Qu''en pensez-vous? Si un homme a 100 brebis et que l''une d''elles se perde, ne laisse-t-il pas les 99 autres sur les montagnes pour aller chercher celle qui s''est perdue? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et s''il la trouve, je vous le dis en vérité, il en a plus de joie que des 99 qui ne se sont pas perdues. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: De même, ce n'est pas la volonté de votre Père céleste qu'il se perde un seul de ces petits.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le pardon
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Si ton frère a péché [contre toi], va et reprends-le seul à seul. S''il t''écoute, tu as gagné ton frère. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais s''il ne t''écoute pas, prends avec toi une ou deux personnes, afin que '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: toute l'affaire se règle sur la déclaration de deux ou de trois témoins
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Toute… témoins: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'principe cité de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deutéronome 19.15
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S''il refuse de les écouter, dis-le à l''Eglise; et s''il refuse aussi d''écouter l''Eglise, qu''il soit à tes yeux comme le membre d''un autre peuple et le collecteur d''impôts. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je vous le dis en vérité, tout ce que vous lierez sur la terre aura été lié au ciel et tout ce que vous délierez sur la terre aura été délié au ciel.
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Je vous dis encore que si deux d''entre vous s''accordent sur la terre pour demander quoi que ce soit, cela leur sera accordé par mon Père céleste. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus appela un petit enfant, le plaça au milieu d''eux '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, là où deux ou trois sont rassemblés en mon nom, je suis au milieu d'eux.»
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Pierre s''approcha de Jésus et lui dit: «Seigneur, combien de fois pardonnerai-je à mon frère, lorsqu''il péchera contre moi? Est-ce que ce sera jusqu''à 7 fois?» '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jésus lui dit: «Je ne te dis pas jusqu''à 7 fois, mais jusqu''à 70 fois 7 fois.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»C''est pourquoi, le royaume des cieux ressemble à un roi qui voulut régler ses comptes avec ses serviteurs. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand il se mit à l''œuvre, on lui en amena un qui devait 10''000 sacs d''argent. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme il n''avait pas de quoi payer, son maître ordonna de le vendre, lui, sa femme, ses enfants et tout ce qu''il avait, afin d''être remboursé de cette dette. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le serviteur se jeta par terre et se prosterna devant lui en disant: ‘[Seigneur,] prends patience envers moi et je te paierai tout.’ '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rempli de compassion, le maître de ce serviteur le laissa partir et lui remit la dette. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Une fois sorti, ce serviteur rencontra un de ses compagnons qui lui devait 100 pièces d''argent. Il l''attrapa à la gorge et se mit à l''étrangler en disant: ‘Paie ce que tu me dois.’ '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Son compagnon tomba [à ses pieds] en le suppliant: ‘Prends patience envers moi et je te paierai.’ '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et dit: «Je vous le dis en vérité, si vous ne vous convertissez pas et si vous ne devenez pas comme les petits enfants, vous n''entrerez pas dans le royaume des cieux. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais l''autre ne voulut pas et alla le faire jeter en prison jusqu''à ce qu''il ait payé ce qu''il devait. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A la vue de ce qui était arrivé, ses compagnons furent profondément attristés, et ils allèrent raconter à leur maître tout ce qui s''était passé. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le maître fit appeler ce serviteur et lui dit: ‘Méchant serviteur, je t''avais remis en entier ta dette parce que tu m''en avais supplié. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ne devais-tu pas, toi aussi, avoir pitié de ton compagnon comme j''ai eu pitié de toi?’ '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et son maître, irrité, le livra aux bourreaux jusqu''à ce qu''il ait payé tout ce qu''il devait. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C'est ainsi que mon Père céleste vous traitera, si chacun de vous ne pardonne pas à son frère de tout son cœur.»
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est pourquoi, celui qui se rendra humble comme ce petit enfant sera le plus grand dans le royaume des cieux, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et celui qui accueille en mon nom un petit enfant comme celui-ci m''accueille moi-même. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais si quelqu'un fait trébucher un seul de ces petits qui croient en moi, il vaudrait mieux pour lui qu'on suspende à son cou une meule de moulin et qu'on le jette au fond de la mer.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Malheur au monde à cause des pièges! Les pièges sont inévitables, mais malheur à l''homme qui en est responsable! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si ta main ou ton pied te poussent à mal agir, coupe-les et jette-les loin de toi. Mieux vaut pour toi entrer dans la vie boiteux ou manchot que d''avoir deux pieds ou deux mains et d''être jeté dans le feu éternel. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et si ton œil te pousse à mal agir, arrache-le et jette-le loin de toi. Mieux vaut pour toi entrer dans la vie avec un seul œil que d'avoir deux yeux et d'être jeté dans l'enfer de feu.
