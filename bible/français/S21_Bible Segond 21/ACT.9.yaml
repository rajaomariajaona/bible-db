document_id: ACT.9,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Conversion de Saul
  - type: text
    content: 'Quant à Saul, il respirait toujours la menace et le meurtre contre les disciples du Seigneur. Il se rendit chez le grand-prêtre '
  '10':
  - type: text
    content: 'Or, il y avait à Damas un disciple du nom d''Ananias. Le Seigneur lui dit dans une vision: «Ananias!» Il répondit: «Me voici, Seigneur!» '
  '11':
  - type: text
    content: 'Le Seigneur lui dit alors: «Lève-toi, va dans la rue qu''on appelle la droite et, dans la maison de Judas, demande un dénommé Saul de Tarse. En effet, il prie '
  '12':
  - type: text
    content: 'et il a vu en vision un homme appelé Ananias entrer et poser les mains sur lui afin qu''il retrouve la vue.» '
  '13':
  - type: text
    content: 'Ananias répondit: «Seigneur, j''ai appris de beaucoup tout le mal que cet homme a fait à tes saints'
  - type: note
    content: 'Tes saints: manière de désigner les chrétiens en tant que personnes consacrées à Dieu et appelées à avoir le comportement qui découle de leur appartenance à ce Dieu.'
  - type: text
    content: ' à Jérusalem, '
  '14':
  - type: text
    content: 'et ici il a pleins pouvoirs, de la part des chefs des prêtres, pour arrêter tous ceux qui font appel à toi.» '
  '15':
  - type: text
    content: 'Mais le Seigneur lui dit: «Vas-y, car cet homme est un instrument que j''ai choisi pour faire connaître mon nom aux non-Juifs, aux rois et aux Israélites. '
  '16':
  - type: text
    content: Je lui montrerai tout ce qu'il doit souffrir pour moi.»
  '17':
  - type: text
    content: 'Ananias partit. Une fois entré dans la maison, il posa les mains sur Saul en disant: «Saul mon frère, le Seigneur, [le Jésus] qui t''est apparu sur le chemin par lequel tu venais, m''a envoyé pour que tu retrouves la vue et que tu sois rempli du Saint-Esprit.» '
  '18':
  - type: text
    content: 'Aussitôt il tomba comme des écailles de ses yeux et il retrouva la vue. Il se leva et fut baptisé; '
  '19':
  - type: text
    content: 'après avoir pris de la nourriture, il retrouva des forces. Il resta quelques jours avec les disciples qui étaient à Damas '
  '2':
  - type: text
    content: et lui demanda des lettres pour les synagogues de Damas afin de pouvoir arrêter et amener à Jérusalem les partisans de cet enseignement qu'il trouverait, hommes ou femmes.
  '20':
  - type: text
    content: 'et se mit aussitôt à proclamer dans les synagogues que Jésus est le Fils de Dieu. '
  '21':
  - type: text
    content: 'Tous ceux qui l''entendaient étaient stupéfaits et disaient: «N''est-ce pas l''homme qui persécutait à Jérusalem ceux qui font appel à ce nom-là et n''est-il pas venu ici pour les arrêter et les conduire devant les chefs des prêtres?» '
  '22':
  - type: text
    content: Cependant Saul se fortifiait de plus en plus, et il confondait les Juifs qui habitaient Damas en démontrant que Jésus est le Messie.
  '23':
  - type: text
    content: 'Au bout d''un certain temps, les Juifs se concertèrent pour le supprimer, '
  '24':
  - type: text
    content: 'mais leur complot parvint à la connaissance de Saul. On gardait les portes jour et nuit afin de pouvoir le tuer. '
  '25':
  - type: text
    content: Cependant, une nuit, les disciples le prirent et le descendirent le long de la muraille, assis dans une corbeille.
  '26':
  - type: text
    content: 'Arrivé à Jérusalem, Saul essaya de se joindre aux disciples, mais tous avaient peur de lui car ils ne croyaient pas qu''il était un disciple. '
  '27':
  - type: text
    content: 'Alors Barnabas le prit avec lui, le conduisit vers les apôtres et leur raconta comment, sur le chemin, Saul avait vu le Seigneur qui lui avait parlé et avec quelle assurance il avait prêché à Damas au nom de Jésus. '
  '28':
  - type: text
    content: 'Saul allait et venait avec eux dans Jérusalem et s''exprimait en toute assurance au nom du Seigneur. '
  '29':
  - type: text
    content: Il parlait aussi et discutait avec les Hellénistes
  - type: note
    content: 'Hellénistes: Juifs ayant vécu en dehors du territoire d''Israël et parlant le grec.'
  - type: text
    content: ', mais ceux-ci cherchaient à le supprimer. '
  '3':
  - type: text
    content: 'Comme il était en chemin et qu''il approchait de Damas, tout à coup, une lumière qui venait du ciel resplendit autour de lui. '
  '30':
  - type: text
    content: L'ayant appris, les frères l'emmenèrent à Césarée et le firent partir pour Tarse.
  - type: heading
    content: Miracles à Lydde et Jaffa
  '31':
  - type: text
    content: L'Eglise était en paix dans toute la Judée, la Galilée et la Samarie; elle s'édifiait, marchait dans la crainte du Seigneur et grandissait grâce à l'aide du Saint-Esprit.
  '32':
  - type: text
    content: 'Comme Pierre parcourait tout le pays, il descendit aussi rendre visite aux saints qui habitaient à Lydde. '
  '33':
  - type: text
    content: 'Il y trouva un homme appelé Enée, qui était couché sur un lit depuis 8 ans parce qu''il était paralysé. '
  '34':
  - type: text
    content: 'Pierre lui dit: «Enée, Jésus-Christ te guérit. Lève-toi et fais toi-même ton lit!» Aussitôt il se leva. '
  '35':
  - type: text
    content: Tous les habitants de Lydde et du Saron le virent et se convertirent au Seigneur.
  '36':
  - type: text
    content: 'Il y avait à Jaffa, parmi les disciples, une femme appelée Tabitha, ce qui signifie «gazelle». Elle faisait beaucoup de bien et donnait de son argent aux autres. '
  '37':
  - type: text
    content: 'Elle tomba malade à cette époque-là et mourut. Après l''avoir lavée, on la déposa dans une chambre à l''étage. '
  '38':
  - type: text
    content: 'Or Lydde est près de Jaffa et les disciples avaient appris que Pierre s''y trouvait; ils envoyèrent donc [deux hommes] vers lui pour le supplier de venir jusque chez eux sans tarder. '
  '39':
  - type: text
    content: 'Pierre se leva et partit avec eux. A son arrivée, on le conduisit dans la chambre à l''étage. Toutes les veuves l''entourèrent en pleurant et lui montrèrent toutes les robes et les manteaux que faisait Tabitha quand elle était avec elles. '
  '4':
  - type: text
    content: 'Il tomba par terre et entendit une voix lui dire: «Saul, Saul, pourquoi me persécutes-tu?» '
  '40':
  - type: text
    content: 'Pierre fit sortir tout le monde, se mit à genoux et pria. Puis il se tourna vers le corps et dit: «Tabitha, lève-toi!» Elle ouvrit les yeux et, quand elle vit Pierre, elle s''assit. '
  '41':
  - type: text
    content: 'Il lui donna la main et la fit lever. Il appela ensuite les saints et les veuves et la leur présenta vivante. '
  '42':
  - type: text
    content: 'Cela fut connu de tout Jaffa et beaucoup crurent au Seigneur. '
  '43':
  - type: text
    content: Pierre resta quelque temps à Jaffa, chez un tanneur qui s'appelait Simon.
  '5':
  - type: text
    content: 'Il répondit: «Qui es-tu, Seigneur?» Et le Seigneur dit: «Moi, je suis Jésus, celui que tu persécutes. '
  '6':
  - type: text
    content: 'Lève-toi, entre dans la ville et on te dira ce que tu dois faire.» '
  '7':
  - type: text
    content: 'Les hommes qui l''accompagnaient s''arrêtèrent, muets de stupeur; ils entendaient bien la voix, mais ils ne voyaient personne. '
  '8':
  - type: text
    content: 'Saul se releva de terre. Malgré ses yeux ouverts, il ne voyait rien; on le prit par la main pour le conduire à Damas. '
  '9':
  - type: text
    content: Il resta trois jours sans voir et il ne mangea ni ne but rien.
