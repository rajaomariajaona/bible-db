document_id: DEU.22,152
type_code: fra
verses:
  '1':
  - type: text
    content: »Si tu vois le bœuf ou la brebis de ton frère
  - type: note
    content: 'Frère: au sens de prochain, compatriote.'
  - type: text
    content: ' en train d''errer, tu ne les ignoreras pas, tu les ramèneras à ton frère. '
  '10':
  - type: text
    content: »Tu ne laboureras pas avec un bœuf et un âne attelés ensemble.
  '11':
  - type: text
    content: »Tu ne porteras pas un vêtement tissé de diverses espèces de fils, de laine et de lin réunis ensemble.
  '12':
  - type: text
    content: »Tu mettras des franges aux quatre coins du vêtement dont tu te couvriras.
  '13':
  - type: text
    content: '»Supposons qu''un homme, qui a épousé une femme et s''est uni à elle, se mette ensuite à la détester, '
  '14':
  - type: text
    content: 'à lui attribuer des actes criminels et à porter atteinte à sa réputation en disant: ‘J''ai épousé cette femme, je me suis approché d''elle et je ne l''ai pas trouvée vierge.’ '
  '15':
  - type: text
    content: 'Alors le père et la mère de la jeune femme prendront les preuves de sa virginité et les produiront devant les anciens de la ville, à la porte. '
  '16':
  - type: text
    content: 'Le père de la jeune femme dira aux anciens: ‘J''ai donné ma fille en mariage à cet homme et il s''est mis à la détester. '
  '17':
  - type: text
    content: 'Il lui attribue des actes criminels en disant qu''il n''a pas trouvé ma fille vierge. Or voici les preuves de la virginité de ma fille.’ Et ses parents déplieront son drap devant les anciens de la ville. '
  '18':
  - type: text
    content: 'Les anciens de la ville s''empareront alors de cet homme et le puniront. '
  '19':
  - type: text
    content: 'De plus, parce qu''il a porté atteinte à la réputation d''une vierge d''Israël, ils le condamneront à une amende de 100 pièces d''argent, qu''ils donneront au père de la jeune femme. Elle restera sa femme et il ne pourra pas la renvoyer tant qu''il vivra. '
  '2':
  - type: text
    content: 'Si ton frère n''habite pas près de toi et que tu ne le connaisses pas, tu prendras l''animal chez toi et il restera avec toi jusqu''à ce que ton frère le réclame. Alors tu le lui rendras. '
  '20':
  - type: text
    content: 'En revanche, si le fait est vrai et que la jeune femme ne s''est pas trouvée vierge, '
  '21':
  - type: text
    content: on la fera sortir à l'entrée de la maison de son père. Elle sera lapidée par les habitants de la ville, elle sera punie de mort parce qu'elle a commis un acte odieux en Israël en se prostituant dans la maison de son père. Tu extirperas ainsi le mal du milieu d'Israël.
  '22':
  - type: text
    content: '»Si l''on trouve un homme en train de coucher avec une femme mariée, ils mourront tous les deux: l''homme qui a couché avec la femme, ainsi que la femme. Tu extirperas ainsi le mal du milieu d''Israël.'
  '23':
  - type: text
    content: '»Si une jeune fille vierge est fiancée et qu''un homme la rencontre dans la ville et couche avec elle, '
  '24':
  - type: text
    content: 'vous les conduirez tous les deux à la porte de la ville. Vous les lapiderez, ils seront punis de mort, la jeune fille pour n''avoir pas crié dans la ville, et l''homme pour avoir déshonoré la femme de son prochain. Tu extirperas ainsi le mal du milieu de toi. '
  '25':
  - type: text
    content: 'Mais si c''est dans les champs que cet homme rencontre la jeune femme fiancée, s''empare d''elle et couche avec elle, seul l''homme qui aura couché avec elle sera puni de mort. '
  '26':
  - type: text
    content: 'Tu ne feras rien à la jeune fille. Elle n''est pas coupable d''un crime digne de mort, car c''est le même cas que celui où un homme se jette sur son prochain et lui enlève la vie. '
  '27':
  - type: text
    content: La jeune fille fiancée que cet homme a rencontrée dans les champs a pu crier sans qu'il y ait eu personne pour la secourir.
  '28':
  - type: text
    content: '»Si un homme rencontre une jeune fille vierge non fiancée, s''empare d''elle et couche avec elle, et qu''on vienne à les surprendre, '
  '29':
  - type: text
    content: l'homme qui aura couché avec la jeune fille donnera 50 pièces d'argent au père de celle-ci. De plus, parce qu'il l'a déshonorée, il la prendra pour femme et il ne pourra pas la renvoyer, tant qu'il vivra.
  '3':
  - type: text
    content: 'Tu feras de même pour son âne, pour son vêtement, pour tout objet qu''il aurait perdu et que tu trouverais. Tu n''as pas le droit de les ignorer. '
  '4':
  - type: text
    content: Si tu vois l'âne ou le bœuf de ton frère tombé sur le chemin, tu ne l'ignoreras pas, tu l'aideras à le relever.
  '5':
  - type: text
    content: »Une femme ne portera pas une tenue d'homme et un homme ne mettra pas des vêtements de femme, car celui qui fait cela est en horreur à l'Eternel, ton Dieu.
  '6':
  - type: text
    content: '»Si tu rencontres en chemin un nid d''oiseau, sur l''arbre ou par terre, avec des petits ou des œufs et la mère couchée sur les petits ou sur les œufs, tu ne prendras pas la mère et les petits. '
  '7':
  - type: text
    content: Tu laisseras partir la mère et tu ne prendras que les petits, afin d'être heureux et de vivre longtemps.
  '8':
  - type: text
    content: »Si tu construis une maison neuve, tu feras une balustrade autour de ton toit afin de ne pas charger ta maison de sang dans le cas où quelqu'un en tomberait.
  '9':
  - type: text
    content: »Tu ne sèmeras pas diverses semences dans ta vigne, sinon tu devras consacrer aussi bien le produit de tes semailles que celui de la vigne.
