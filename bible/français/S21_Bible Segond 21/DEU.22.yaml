document_id: DEU.22,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: »Si tu vois le bœuf ou la brebis de ton frère
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Frère: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au sens de prochain, compatriote.
      marker-yv: yv-n
    - type: text
      text: ' en train d''errer, tu ne les ignoreras pas, tu les ramèneras à ton frère. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: »Tu ne laboureras pas avec un bœuf et un âne attelés ensemble.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: »Tu ne porteras pas un vêtement tissé de diverses espèces de fils, de laine et de lin réunis ensemble.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: »Tu mettras des franges aux quatre coins du vêtement dont tu te couvriras.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: '»Supposons qu''un homme, qui a épousé une femme et s''est uni à elle, se mette ensuite à la détester, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'à lui attribuer des actes criminels et à porter atteinte à sa réputation en disant: ‘J''ai épousé cette femme, je me suis approché d''elle et je ne l''ai pas trouvée vierge.’ '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Alors le père et la mère de la jeune femme prendront les preuves de sa virginité et les produiront devant les anciens de la ville, à la porte. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Le père de la jeune femme dira aux anciens: ‘J''ai donné ma fille en mariage à cet homme et il s''est mis à la détester. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Il lui attribue des actes criminels en disant qu''il n''a pas trouvé ma fille vierge. Or voici les preuves de la virginité de ma fille.’ Et ses parents déplieront son drap devant les anciens de la ville. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Les anciens de la ville s''empareront alors de cet homme et le puniront. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'De plus, parce qu''il a porté atteinte à la réputation d''une vierge d''Israël, ils le condamneront à une amende de 100 pièces d''argent, qu''ils donneront au père de la jeune femme. Elle restera sa femme et il ne pourra pas la renvoyer tant qu''il vivra. '
  '2':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Si ton frère n''habite pas près de toi et que tu ne le connaisses pas, tu prendras l''animal chez toi et il restera avec toi jusqu''à ce que ton frère le réclame. Alors tu le lui rendras. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'En revanche, si le fait est vrai et que la jeune femme ne s''est pas trouvée vierge, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: on la fera sortir à l'entrée de la maison de son père. Elle sera lapidée par les habitants de la ville, elle sera punie de mort parce qu'elle a commis un acte odieux en Israël en se prostituant dans la maison de son père. Tu extirperas ainsi le mal du milieu d'Israël.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: '»Si l''on trouve un homme en train de coucher avec une femme mariée, ils mourront tous les deux: l''homme qui a couché avec la femme, ainsi que la femme. Tu extirperas ainsi le mal du milieu d''Israël.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: '»Si une jeune fille vierge est fiancée et qu''un homme la rencontre dans la ville et couche avec elle, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'vous les conduirez tous les deux à la porte de la ville. Vous les lapiderez, ils seront punis de mort, la jeune fille pour n''avoir pas crié dans la ville, et l''homme pour avoir déshonoré la femme de son prochain. Tu extirperas ainsi le mal du milieu de toi. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Mais si c''est dans les champs que cet homme rencontre la jeune femme fiancée, s''empare d''elle et couche avec elle, seul l''homme qui aura couché avec elle sera puni de mort. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Tu ne feras rien à la jeune fille. Elle n''est pas coupable d''un crime digne de mort, car c''est le même cas que celui où un homme se jette sur son prochain et lui enlève la vie. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: La jeune fille fiancée que cet homme a rencontrée dans les champs a pu crier sans qu'il y ait eu personne pour la secourir.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: '»Si un homme rencontre une jeune fille vierge non fiancée, s''empare d''elle et couche avec elle, et qu''on vienne à les surprendre, '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: l'homme qui aura couché avec la jeune fille donnera 50 pièces d'argent au père de celle-ci. De plus, parce qu'il l'a déshonorée, il la prendra pour femme et il ne pourra pas la renvoyer, tant qu'il vivra.
  '3':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tu feras de même pour son âne, pour son vêtement, pour tout objet qu''il aurait perdu et que tu trouverais. Tu n''as pas le droit de les ignorer. '
  '4':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Si tu vois l'âne ou le bœuf de ton frère tombé sur le chemin, tu ne l'ignoreras pas, tu l'aideras à le relever.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: »Une femme ne portera pas une tenue d'homme et un homme ne mettra pas des vêtements de femme, car celui qui fait cela est en horreur à l'Eternel, ton Dieu.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: '»Si tu rencontres en chemin un nid d''oiseau, sur l''arbre ou par terre, avec des petits ou des œufs et la mère couchée sur les petits ou sur les œufs, tu ne prendras pas la mère et les petits. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Tu laisseras partir la mère et tu ne prendras que les petits, afin d'être heureux et de vivre longtemps.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: »Si tu construis une maison neuve, tu feras une balustrade autour de ton toit afin de ne pas charger ta maison de sang dans le cas où quelqu'un en tomberait.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: »Tu ne sèmeras pas diverses semences dans ta vigne, sinon tu devras consacrer aussi bien le produit de tes semailles que celui de la vigne.
