document_id: HEB.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Supériorité de Christ le Fils
  - type: heading
    content: 1.1–4.13
  - type: heading
    content: Christ supérieur aux anges
  - type: text
    content: 'Après avoir autrefois, à de nombreuses reprises et de bien des manières, parlé à nos ancêtres par les prophètes, '
  '10':
  - type: text
    content: 'Et: '
  - type: text
    content: C'est toi, Seigneur, qui au commencement as fondé la terre, et le ciel est l'œuvre de tes mains.
  - type: text
    content: ' '
  '11':
  - type: text
    content: Eux, ils disparaîtront, tandis que toi, tu restes là. Ils vieilliront tous comme un vêtement.
  - type: text
    content: ' '
  '12':
  - type: text
    content: Tu les enrouleras comme un manteau, ils seront remplacés [comme un vêtement]. Mais toi, tu es toujours le même et ton existence n'aura pas de fin.
  - type: note
    content: 'C''est toi… pas de fin: citation du Psaume 102.26-28.'
  '13':
  - type: text
    content: 'Enfin, auquel des anges a-t-il déjà dit: '
  - type: text
    content: Assieds-toi à ma droite jusqu'à ce que j'aie fait de tes ennemis ton marchepied
  - type: note
    content: 'Assieds-toi… marchepied: citation du Psaume 110.1.'
  - type: text
    content: '? '
  '14':
  - type: text
    content: Les anges ne sont-ils pas tous des esprits au service de Dieu, envoyés pour apporter de l'aide à ceux qui vont hériter du salut?
  '2':
  - type: text
    content: 'Dieu, dans ces jours qui sont les derniers, nous a parlé par le Fils. Il l''a établi héritier de toute chose et c''est par lui aussi qu''il a créé l''univers. '
  '3':
  - type: text
    content: 'Le Fils est le reflet de sa gloire et l''expression de sa personne, il soutient tout par sa parole puissante. Après avoir accompli [au travers de lui-même] la purification de nos péchés, il s''est assis à la droite de la majesté divine dans les lieux très hauts. '
  '4':
  - type: text
    content: 'Il est ainsi devenu d''autant supérieur aux anges qu''il a hérité d''un nom bien plus remarquable encore que le leur. '
  '5':
  - type: text
    content: 'En effet, auquel des anges Dieu a-t-il déjà dit: '
  - type: text
    content: Tu es mon Fils, je t'ai engendré aujourd'hui
  - type: note
    content: 'Tu es… aujourd''hui: citation du Psaume 2.7.'
  - type: text
    content: '? Et encore: '
  - type: text
    content: Je serai pour lui un père et il sera pour moi un fils
  - type: note
    content: 'Je serai… un fils: citation de 2 Samuel 7.14.'
  - type: text
    content: '? '
  '6':
  - type: text
    content: Par contre, lorsqu'il introduit le premier-né
  - type: note
    content: 'Le premier-né: c''est-à-dire Jésus-Christ.'
  - type: text
    content: ' dans le monde, il dit: '
  - type: text
    content: Que tous les anges de Dieu se prosternent devant lui!
  - type: note
    content: 'Que tous… lui: citation du Psaume 97.7.'
  '7':
  - type: text
    content: 'De plus, au sujet des anges, il dit: '
  - type: text
    content: Il fait de ses anges des esprits, et de ses serviteurs une flamme de feu.
  - type: note
    content: 'Il fait… feu: citation du Psaume 104.4.'
  - type: text
    content: ' '
  '8':
  - type: text
    content: 'Mais il dit au Fils: '
  - type: text
    content: Ton trône, ô Dieu, est éternel. Le sceptre de ton règne est un sceptre de justice.
  - type: text
    content: ' '
  '9':
  - type: text
    content: Tu as aimé la justice et tu as détesté la méchanceté; c'est pourquoi, ô Dieu, ton Dieu t'a désigné par onction comme roi, de préférence à tes compagnons, avec une huile de joie.
  - type: note
    content: 'Ton trône… joie: citation du Psaume 45.7-8.'
  - type: text
    content: ' '
