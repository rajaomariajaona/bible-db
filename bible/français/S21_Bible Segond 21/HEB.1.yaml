document_id: HEB.1,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: Supériorité de Christ le Fils
    marker-yv: yv-h
  - type: usfm
    marker: mr
    children:
    - type: text
      text: 1.1–4.13
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Christ supérieur aux anges
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Après avoir autrefois, à de nombreuses reprises et de bien des manières, parlé à nos ancêtres par les prophètes, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: C'est toi, Seigneur, qui au commencement as fondé la terre, et le ciel est l'œuvre de tes mains.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Eux, ils disparaîtront, tandis que toi, tu restes là. Ils vieilliront tous comme un vêtement.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu les enrouleras comme un manteau, ils seront remplacés [comme un vêtement]. Mais toi, tu es toujours le même et ton existence n'aura pas de fin.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10-12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'C''est toi… pas de fin: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 102.26-28
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Enfin, auquel des anges a-t-il déjà dit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Assieds-toi à ma droite jusqu'à ce que j'aie fait de tes ennemis ton marchepied
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Assieds-toi… marchepied: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 110.1
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Les anges ne sont-ils pas tous des esprits au service de Dieu, envoyés pour apporter de l'aide à ceux qui vont hériter du salut?
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu, dans ces jours qui sont les derniers, nous a parlé par le Fils. Il l''a établi héritier de toute chose et c''est par lui aussi qu''il a créé l''univers. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le Fils est le reflet de sa gloire et l''expression de sa personne, il soutient tout par sa parole puissante. Après avoir accompli [au travers de lui-même] la purification de nos péchés, il s''est assis à la droite de la majesté divine dans les lieux très hauts. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il est ainsi devenu d''autant supérieur aux anges qu''il a hérité d''un nom bien plus remarquable encore que le leur. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'En effet, auquel des anges Dieu a-t-il déjà dit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu es mon Fils, je t'ai engendré aujourd'hui
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu es… aujourd''hui: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 2.7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '? Et encore: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Je serai pour lui un père et il sera pour moi un fils
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Je serai… un fils: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Samuel 7.14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '? '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Par contre, lorsqu'il introduit le premier-né
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le premier-né: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire Jésus-Christ.
      marker-yv: yv-n
    - type: text
      text: ' dans le monde, il dit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Que tous les anges de Dieu se prosternent devant lui!
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Que tous… lui: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 97.7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De plus, au sujet des anges, il dit: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Il fait de ses anges des esprits, et de ses serviteurs une flamme de feu.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il fait… feu: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 104.4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais il dit au Fils: '
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Ton trône, ô Dieu, est éternel. Le sceptre de ton règne est un sceptre de justice.
    - type: text
      text: ' '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: qt
      children:
      - type: text
        text: Tu as aimé la justice et tu as détesté la méchanceté; c'est pourquoi, ô Dieu, ton Dieu t'a désigné par onction comme roi, de préférence à tes compagnons, avec une huile de joie.
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.8-9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ton trône… joie: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'citation du '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Psaume 45.7-8
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ' '
