document_id: 1SA.21
type_code: fra
segments:
- type: usfm
  marker: nb
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: David se leva et partit, et Jonathan rentra en ville.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Fuite de David à Nob et à Gath
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'David se rendit à Nob vers le prêtre Achimélec. Celui-ci courut effrayé à sa rencontre et lui demanda: «Pourquoi es-tu seul et n''y a-t-il personne avec toi?» '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'David répondit au prêtre Achimélec: «Le roi m''a donné un ordre et m''a dit: ‘Que personne ne sache rien de l''affaire pour laquelle je t''envoie ni de l''ordre que je t''ai donné.’ J''ai fixé un rendez-vous à mes hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Maintenant qu''as-tu sous la main? Donne-moi cinq pains ou ce que tu trouveras.» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le prêtre répondit à David: «Je n''ai pas de pain ordinaire sous la main, mais je peux te donner du pain consacré, à condition que tes hommes n''aient pas eu de relations avec des femmes récemment!» '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'David répondit au prêtre: «Nous n''avons pas eu de relations avec des femmes, comme toujours quand je pars en campagne. Les affaires de mes hommes sont consacrées, même si une expédition a un caractère profane. Elles le seront d''autant plus aujourd''hui.» '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Alors le prêtre lui donna du pain consacré, car il n'y avait là pas d'autre pain. On l'avait retiré de devant l'Eternel pour le remplacer par du pain chaud au moment où on l'avait pris.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ce jour-là, un des serviteurs de Saül était présent, enfermé qu'il était au service de l'Eternel. C'était un Edomite du nom de Doëg, qui était le chef des bergers de Saül.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'David dit à Achimélec: «N''as-tu pas sous la main une lance ou une épée? En effet, je n''ai pris avec moi ni mon épée ni mes armes, parce que l''ordre du roi était urgent.» '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le prêtre répondit: «Il y a l''épée de Goliath, le Philistin, que tu as tué dans la vallée d''Ela. Elle est enveloppée dans un drap derrière l''éphod. Si tu veux la prendre, prends-la, car il n''y en a pas d''autre ici.» David répliqua: «Il n''y en a pas de pareille. Donne-la-moi.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'David se leva et s''enfuit le jour même loin de Saül. Il arriva chez Akish, le roi de Gath. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les serviteurs d''Akish lui dirent: «N''est-ce pas David, le roi du pays? N''est-ce pas celui en l''honneur de qui l''on chantait en dansant: ‘Saül a frappé ses 1000, et David ses 10''000’?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'David prit ces paroles à cœur et éprouva une grande peur vis-à-vis d''Akish, le roi de Gath. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il fit semblant d''être fou sous leurs yeux et accomplit des actes de démence devant eux. Il faisait des marques sur les battants des portes et laissait couler sa salive sur sa barbe. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Akish dit à ses serviteurs: «Vous voyez bien que cet homme a perdu la raison. Pourquoi me l''amenez-vous? '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Est-ce que je manque de fous, pour que vous m'ameniez celui-ci et me rendiez témoin de ses actes de démence? Faut-il qu'il entre dans ma maison?»
