document_id: 1SA.21,152
type_code: fra
verses:
  '1':
  - type: text
    content: David se leva et partit, et Jonathan rentra en ville.
  - type: heading
    content: Fuite de David à Nob et à Gath
  '10':
  - type: text
    content: 'Le prêtre répondit: «Il y a l''épée de Goliath, le Philistin, que tu as tué dans la vallée d''Ela. Elle est enveloppée dans un drap derrière l''éphod. Si tu veux la prendre, prends-la, car il n''y en a pas d''autre ici.» David répliqua: «Il n''y en a pas de pareille. Donne-la-moi.»'
  '11':
  - type: text
    content: 'David se leva et s''enfuit le jour même loin de Saül. Il arriva chez Akish, le roi de Gath. '
  '12':
  - type: text
    content: 'Les serviteurs d''Akish lui dirent: «N''est-ce pas David, le roi du pays? N''est-ce pas celui en l''honneur de qui l''on chantait en dansant: ‘Saül a frappé ses 1000, et David ses 10''000’?»'
  '13':
  - type: text
    content: 'David prit ces paroles à cœur et éprouva une grande peur vis-à-vis d''Akish, le roi de Gath. '
  '14':
  - type: text
    content: 'Il fit semblant d''être fou sous leurs yeux et accomplit des actes de démence devant eux. Il faisait des marques sur les battants des portes et laissait couler sa salive sur sa barbe. '
  '15':
  - type: text
    content: 'Akish dit à ses serviteurs: «Vous voyez bien que cet homme a perdu la raison. Pourquoi me l''amenez-vous? '
  '16':
  - type: text
    content: Est-ce que je manque de fous, pour que vous m'ameniez celui-ci et me rendiez témoin de ses actes de démence? Faut-il qu'il entre dans ma maison?»
  '2':
  - type: text
    content: 'David se rendit à Nob vers le prêtre Achimélec. Celui-ci courut effrayé à sa rencontre et lui demanda: «Pourquoi es-tu seul et n''y a-t-il personne avec toi?» '
  '3':
  - type: text
    content: 'David répondit au prêtre Achimélec: «Le roi m''a donné un ordre et m''a dit: ‘Que personne ne sache rien de l''affaire pour laquelle je t''envoie ni de l''ordre que je t''ai donné.’ J''ai fixé un rendez-vous à mes hommes. '
  '4':
  - type: text
    content: 'Maintenant qu''as-tu sous la main? Donne-moi cinq pains ou ce que tu trouveras.» '
  '5':
  - type: text
    content: 'Le prêtre répondit à David: «Je n''ai pas de pain ordinaire sous la main, mais je peux te donner du pain consacré, à condition que tes hommes n''aient pas eu de relations avec des femmes récemment!» '
  '6':
  - type: text
    content: 'David répondit au prêtre: «Nous n''avons pas eu de relations avec des femmes, comme toujours quand je pars en campagne. Les affaires de mes hommes sont consacrées, même si une expédition a un caractère profane. Elles le seront d''autant plus aujourd''hui.» '
  '7':
  - type: text
    content: Alors le prêtre lui donna du pain consacré, car il n'y avait là pas d'autre pain. On l'avait retiré de devant l'Eternel pour le remplacer par du pain chaud au moment où on l'avait pris.
  '8':
  - type: text
    content: Ce jour-là, un des serviteurs de Saül était présent, enfermé qu'il était au service de l'Eternel. C'était un Edomite du nom de Doëg, qui était le chef des bergers de Saül.
  '9':
  - type: text
    content: 'David dit à Achimélec: «N''as-tu pas sous la main une lance ou une épée? En effet, je n''ai pris avec moi ni mon épée ni mes armes, parce que l''ordre du roi était urgent.» '
