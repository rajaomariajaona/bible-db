document_id: SNG.7,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les filles de Jérusalem
  - type: text
    content: Reviens, reviens, Sulamite!
  - type: text
    content: Reviens, reviens afin que nous puissions te regarder!
  - type: text
    content: Qu'avez-vous à regarder la Sulamite
  - type: text
    content: comme la danse de deux camps?
  - type: heading
    content: Le jeune homme
  '10':
  - type: text
    content: et ton palais comme un vin excellent!
  - type: heading
    content: La jeune femme
  - type: text
    content: Il coule aisément pour mon bien-aimé
  - type: text
    content: et glisse sur les lèvres de ceux qui s'endorment!
  '11':
  - type: text
    content: Je suis à mon bien-aimé
  - type: text
    content: et son désir se porte vers moi.
  '12':
  - type: text
    content: Viens, mon bien-aimé, sortons dans la campagne
  - type: text
    content: pour passer la nuit au village!
  '13':
  - type: text
    content: Dès le matin nous irons aux vignes
  - type: text
    content: pour voir si la vigne pousse, si la fleur s'ouvre,
  - type: text
    content: si les grenadiers fleurissent.
  - type: text
    content: Là je te donnerai mon amour.
  '14':
  - type: text
    content: Les mandragores diffusent leur parfum,
  - type: text
    content: à nos portes se trouvent tous les meilleurs fruits,
  - type: text
    content: nouveaux et anciens.
  - type: text
    content: Mon bien-aimé, je les ai gardés pour toi.
  '2':
  - type: text
    content: Que tes pieds sont beaux dans tes sandales, fille de prince!
  - type: text
    content: Les contours de tes hanches sont comme des ornements,
  - type: text
    content: œuvre des mains d'un artiste.
  '3':
  - type: text
    content: Ton bassin est une coupe arrondie
  - type: text
    content: où le vin parfumé ne manque pas.
  - type: text
    content: Ton ventre est un tas de blé
  - type: text
    content: entouré de lis.
  '4':
  - type: text
    content: Tes deux seins sont comme deux faons,
  - type: text
    content: comme les jumeaux d'une gazelle.
  '5':
  - type: text
    content: Ton cou est comme une tour d'ivoire.
  - type: text
    content: Tes yeux sont comme les étangs de Hesbon,
  - type: text
    content: près de la porte de Bath-Rabbim.
  - type: text
    content: Ton nez est comme la tour du Liban
  - type: text
    content: qui monte la garde face à Damas.
  '6':
  - type: text
    content: Ta tête se dresse aussi fièrement que le Carmel
  - type: text
    content: et les cheveux de ta tête sont comme la pourpre.
  - type: text
    content: Un roi est prisonnier de boucles!
  '7':
  - type: text
    content: Que tu es belle, que tu es agréable,
  - type: text
    content: mon amour, au milieu des délices!
  '8':
  - type: text
    content: Ta taille ressemble au palmier,
  - type: text
    content: et tes seins à des grappes.
  '9':
  - type: text
    content: 'Je me dis: «Je veux monter sur le palmier'
  - type: text
    content: pour attraper ses grappes!»
  - type: text
    content: Que tes seins soient comme les grappes de la vigne,
  - type: text
    content: le parfum de ton souffle comme celui des pommes
