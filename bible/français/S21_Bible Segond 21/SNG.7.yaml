document_id: SNG.7,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: sp
    children:
    - type: text
      text: Les filles de Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reviens, reviens, Sulamite!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Reviens, reviens afin que nous puissions te regarder!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'avez-vous à regarder la Sulamite
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme la danse de deux camps?
  - type: usfm
    marker: sp
    children:
    - type: text
      text: Le jeune homme
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ton palais comme un vin excellent!
  - type: usfm
    marker: sp
    children:
    - type: text
      text: La jeune femme
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il coule aisément pour mon bien-aimé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et glisse sur les lèvres de ceux qui s'endorment!
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis à mon bien-aimé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son désir se porte vers moi.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Viens, mon bien-aimé, sortons dans la campagne
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour passer la nuit au village!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dès le matin nous irons aux vignes
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour voir si la vigne pousse, si la fleur s'ouvre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si les grenadiers fleurissent.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Là je te donnerai mon amour.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les mandragores diffusent leur parfum,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à nos portes se trouvent tous les meilleurs fruits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nouveaux et anciens.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mon bien-aimé, je les ai gardés pour toi.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tes pieds sont beaux dans tes sandales, fille de prince!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les contours de tes hanches sont comme des ornements,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: œuvre des mains d'un artiste.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton bassin est une coupe arrondie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: où le vin parfumé ne manque pas.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton ventre est un tas de blé
  - type: usfm
    marker: q1
    children:
    - type: text
      text: entouré de lis.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes deux seins sont comme deux faons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme les jumeaux d'une gazelle.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton cou est comme une tour d'ivoire.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tes yeux sont comme les étangs de Hesbon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: près de la porte de Bath-Rabbim.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ton nez est comme la tour du Liban
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui monte la garde face à Damas.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta tête se dresse aussi fièrement que le Carmel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les cheveux de ta tête sont comme la pourpre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un roi est prisonnier de boucles!
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tu es belle, que tu es agréable,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mon amour, au milieu des délices!
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ta taille ressemble au palmier,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tes seins à des grappes.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je me dis: «Je veux monter sur le palmier'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour attraper ses grappes!»
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que tes seins soient comme les grappes de la vigne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le parfum de ton souffle comme celui des pommes
