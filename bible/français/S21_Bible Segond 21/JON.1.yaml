document_id: JON.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Mission et fuite de Jonas
  - type: text
    content: 'La parole de l''Eternel fut adressée à Jonas, fils d''Amitthaï: '
  '10':
  - type: text
    content: 'Ces hommes furent saisis d''une grande crainte et lui dirent: «Pourquoi as-tu fait cela?» Ils surent en effet qu''il fuyait loin de la présence de l''Eternel parce qu''il le leur déclara. '
  '11':
  - type: text
    content: 'Ils lui dirent: «Que te ferons-nous pour que la mer se calme envers nous?» En effet, la mer était de plus en plus déchaînée. '
  '12':
  - type: text
    content: 'Il leur répondit: «Prenez-moi et jetez-moi dans la mer, et la mer se calmera envers vous, car je sais que c''est moi qui attire sur vous cette grande tempête.»'
  '13':
  - type: text
    content: 'Ces hommes ramèrent pour gagner la terre ferme, mais ils ne purent pas y arriver parce que la mer était toujours plus déchaînée contre eux. '
  '14':
  - type: text
    content: 'Alors ils s''adressèrent à l''Eternel et dirent: «Eternel, ne nous fais pas mourir à cause de la vie de cet homme et ne nous charge pas du sang innocent! En effet toi, Eternel, tu fais ce que tu veux.» '
  '15':
  - type: text
    content: 'Puis ils prirent Jonas et le jetèrent dans la mer. Et la fureur de la mer s''apaisa. '
  '16':
  - type: text
    content: Ces hommes furent saisis d'une grande crainte de l'Eternel. Ils offrirent un sacrifice à l'Eternel et firent des vœux.
  '2':
  - type: text
    content: «Lève-toi, va à Ninive
  - type: note
    content: 'Ninive: capitale de l''Empire assyrien, la puissance ennemie montante.'
  - type: text
    content: ', la grande ville, et crie contre elle, car sa méchanceté est montée jusqu''à moi.»'
  '3':
  - type: text
    content: Jonas se leva pour s'enfuir à Tarsis
  - type: note
    content: Tarsisn'a pas été localisée de façon certaine; cependant cette ville se trouvait loin d'Israël, peut-être en Espagne.
  - type: text
    content: ', loin de la présence de l''Eternel. Il descendit à Jaffa, et il trouva un bateau qui allait à Tarsis. Il paya le prix du transport et s''embarqua pour aller avec les passagers à Tarsis, loin de la présence de l''Eternel.'
  '4':
  - type: text
    content: 'L''Eternel fit souffler sur la mer un vent impétueux, et il s''éleva sur la mer une si grande tempête que le bateau menaçait de faire naufrage. '
  '5':
  - type: text
    content: 'Les marins eurent peur; ils implorèrent chacun leur dieu, et ils jetèrent dans la mer les objets qui étaient sur le bateau afin de l''alléger. Jonas était descendu au fond du bateau, s''était couché et dormait profondément. '
  '6':
  - type: text
    content: 'Le capitaine s''approcha de lui et lui dit: «Pourquoi dors-tu? Lève-toi, fais appel à ton Dieu! Peut-être voudra-t-il penser à nous et nous ne mourrons pas.» '
  '7':
  - type: text
    content: 'Puis ils se dirent l''un à l''autre: «Venez, tirons au sort pour savoir qui nous attire ce malheur.» Ils tirèrent au sort, et le sort tomba sur Jonas.'
  '8':
  - type: text
    content: 'Alors ils lui dirent: «Dis-nous qui nous attire ce malheur. Quelle est ton occupation et d''où viens-tu? Quel est ton pays et de quel peuple es-tu?» '
  '9':
  - type: text
    content: 'Il leur répondit: «Je suis hébreu et je crains l''Eternel, le Dieu du ciel, qui a fait la mer et la terre.» '
