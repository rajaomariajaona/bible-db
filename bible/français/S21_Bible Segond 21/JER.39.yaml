document_id: JER.39
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Chute de Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: La neuvième année du règne de Sédécias sur Juda, le dixième mois, Nebucadnetsar, le roi de Babylone, vint avec toute son armée devant Jérusalem et en fit le siège.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'La onzième année du règne de Sédécias, le neuvième jour du quatrième mois, une brèche fut percée dans les remparts de la ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tous les chefs du roi de Babylone entrèrent et s''installèrent à la porte du milieu. Il y avait Nergal-Sharetser, Samgar-Nebu, Sarsekim, le chef des eunuques, Nergal-Sharetser, le chef des mages, et tous les autres chefs du roi de Babylone. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dès que Sédécias, roi de Juda, et tous les hommes de guerre les virent, ils prirent la fuite. Ils sortirent de la ville pendant la nuit, en passant par le chemin du jardin du roi, par la porte située entre les deux murailles, et ils prirent le chemin de la plaine. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Cependant, l''armée babylonienne les poursuivit et rattrapa Sédécias dans les plaines de Jéricho. Ils s''emparèrent de lui et le firent monter vers Nebucadnetsar, roi de Babylone, à Ribla, dans le pays de Hamath. Nebucadnetsar prononça des jugements contre lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le roi de Babylone fit égorger les fils de Sédécias à Ribla, en sa présence. Il fit aussi égorger tous les grands de Juda, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: puis il fit crever les yeux à Sédécias et le fit attacher avec des chaînes en bronze pour le conduire à Babylone.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les Babyloniens brûlèrent le palais royal et les maisons du peuple, et ils démolirent les murailles de Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Nebuzaradan, le chef des gardes, emmena en exil à Babylone les membres du peuple qui étaient restés dans la ville et ceux qui s''étaient rendus à lui, ceux qui avaient survécu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Cependant, il laissa dans le pays de Juda quelques-uns des plus pauvres du peuple, ceux qui ne possédaient rien, et il leur donna ce jour-là des vignes et des champs.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sort de Jérémie et d'Ebed-Mélec
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Nebucadnetsar, roi de Babylone, avait donné, en en confiant la responsabilité à Nebuzaradan, le chef des gardes, cet ordre au sujet de Jérémie: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '«Prends-le et veille sur lui. Ne lui fais aucun mal, mais agis vis-à-vis de lui comme il te le dira.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Nebuzaradan, le chef des gardes, Nebushazban, le chef des eunuques, Nergal-Sharetser, le chef des mages, et tous les chefs du roi de Babylone '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: envoyèrent donc chercher Jérémie dans la cour de la prison et le confièrent à Guedalia, fils d'Achikam et petit-fils de Shaphan, pour qu'il l'emmène chez lui. Ainsi, Jérémie put habiter au milieu du peuple.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'La parole de l''Eternel avait été adressée à Jérémie, alors qu''il était encore enfermé dans la cour de la prison: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: '«Va dire à Ebed-Mélec, l''Ethiopien: ‘Voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël: Je vais faire venir sur cette ville les paroles que j''ai prononcées, pour lui faire du mal et non du bien. Ce jour-là, tu assisteras personnellement à leur accomplissement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Cependant, ce jour-là, je te délivrerai, déclare l''Eternel, et tu ne seras pas livré entre les mains des hommes qui te font si peur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Sois sûr que je te sauverai et que tu ne mourras pas par l'épée. Ta vie sera ta part de butin parce que tu as eu confiance en moi, déclare l'Eternel.’»
