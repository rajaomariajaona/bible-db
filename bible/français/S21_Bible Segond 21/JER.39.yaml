document_id: JER.39,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Chute de Jérusalem
  - type: text
    content: La neuvième année du règne de Sédécias sur Juda, le dixième mois, Nebucadnetsar, le roi de Babylone, vint avec toute son armée devant Jérusalem et en fit le siège.
  '10':
  - type: text
    content: Cependant, il laissa dans le pays de Juda quelques-uns des plus pauvres du peuple, ceux qui ne possédaient rien, et il leur donna ce jour-là des vignes et des champs.
  - type: heading
    content: Sort de Jérémie et d'Ebed-Mélec
  '11':
  - type: text
    content: 'Nebucadnetsar, roi de Babylone, avait donné, en en confiant la responsabilité à Nebuzaradan, le chef des gardes, cet ordre au sujet de Jérémie: '
  '12':
  - type: text
    content: '«Prends-le et veille sur lui. Ne lui fais aucun mal, mais agis vis-à-vis de lui comme il te le dira.» '
  '13':
  - type: text
    content: 'Nebuzaradan, le chef des gardes, Nebushazban, le chef des eunuques, Nergal-Sharetser, le chef des mages, et tous les chefs du roi de Babylone '
  '14':
  - type: text
    content: envoyèrent donc chercher Jérémie dans la cour de la prison et le confièrent à Guedalia, fils d'Achikam et petit-fils de Shaphan, pour qu'il l'emmène chez lui. Ainsi, Jérémie put habiter au milieu du peuple.
  '15':
  - type: text
    content: 'La parole de l''Eternel avait été adressée à Jérémie, alors qu''il était encore enfermé dans la cour de la prison: '
  '16':
  - type: text
    content: '«Va dire à Ebed-Mélec, l''Ethiopien: ‘Voici ce que dit l''Eternel, le maître de l''univers, le Dieu d''Israël: Je vais faire venir sur cette ville les paroles que j''ai prononcées, pour lui faire du mal et non du bien. Ce jour-là, tu assisteras personnellement à leur accomplissement. '
  '17':
  - type: text
    content: 'Cependant, ce jour-là, je te délivrerai, déclare l''Eternel, et tu ne seras pas livré entre les mains des hommes qui te font si peur. '
  '18':
  - type: text
    content: Sois sûr que je te sauverai et que tu ne mourras pas par l'épée. Ta vie sera ta part de butin parce que tu as eu confiance en moi, déclare l'Eternel.’»
  '2':
  - type: text
    content: 'La onzième année du règne de Sédécias, le neuvième jour du quatrième mois, une brèche fut percée dans les remparts de la ville. '
  '3':
  - type: text
    content: 'Tous les chefs du roi de Babylone entrèrent et s''installèrent à la porte du milieu. Il y avait Nergal-Sharetser, Samgar-Nebu, Sarsekim, le chef des eunuques, Nergal-Sharetser, le chef des mages, et tous les autres chefs du roi de Babylone. '
  '4':
  - type: text
    content: 'Dès que Sédécias, roi de Juda, et tous les hommes de guerre les virent, ils prirent la fuite. Ils sortirent de la ville pendant la nuit, en passant par le chemin du jardin du roi, par la porte située entre les deux murailles, et ils prirent le chemin de la plaine. '
  '5':
  - type: text
    content: 'Cependant, l''armée babylonienne les poursuivit et rattrapa Sédécias dans les plaines de Jéricho. Ils s''emparèrent de lui et le firent monter vers Nebucadnetsar, roi de Babylone, à Ribla, dans le pays de Hamath. Nebucadnetsar prononça des jugements contre lui. '
  '6':
  - type: text
    content: 'Le roi de Babylone fit égorger les fils de Sédécias à Ribla, en sa présence. Il fit aussi égorger tous les grands de Juda, '
  '7':
  - type: text
    content: puis il fit crever les yeux à Sédécias et le fit attacher avec des chaînes en bronze pour le conduire à Babylone.
  '8':
  - type: text
    content: 'Les Babyloniens brûlèrent le palais royal et les maisons du peuple, et ils démolirent les murailles de Jérusalem. '
  '9':
  - type: text
    content: 'Nebuzaradan, le chef des gardes, emmena en exil à Babylone les membres du peuple qui étaient restés dans la ville et ceux qui s''étaient rendus à lui, ceux qui avaient survécu. '
