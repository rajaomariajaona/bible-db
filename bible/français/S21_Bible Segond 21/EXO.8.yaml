document_id: EXO.8,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'L''Eternel dit à Moïse: «Dis à Aaron: ‘Tends la main, avec ton bâton, sur les rivières, les ruisseaux et les étangs, et fais-en monter les grenouilles sur l''Egypte.’» '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'On en fit des tas et des tas, et le pays fut infecté. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Voyant qu'il y avait du répit, le pharaon rendit son cœur plus insensible encore et n'écouta pas Moïse et Aaron. Cela se passa comme l'Eternel l'avait dit.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Fléau n° 3: les moustiques'
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'L''Eternel dit à Moïse: «Dis à Aaron: ‘Tends ton bâton et frappe la poussière de la terre.’ Elle se changera en moustiques dans toute l''Egypte.» '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'C''est ce qu''ils firent. Aaron tendit la main avec son bâton et frappa la poussière de la terre. Elle fut changée en moustiques sur les hommes et sur les animaux. Toute la poussière de la terre fut changée en moustiques, dans toute l''Egypte. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Les magiciens employèrent leurs sortilèges pour produire les moustiques, mais ils n''y parvinrent pas. Les moustiques étaient sur les hommes et sur les animaux. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Les magiciens dirent au pharaon: «C''est le doigt de Dieu!» Le cœur du pharaon s''endurcit et il n''écouta pas Moïse et Aaron. Cela se passa comme l''Eternel l''avait dit.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Fléau n° 4: les mouches venimeuses'
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'L''Eternel dit à Moïse: «Lève-toi de bon matin et présente-toi devant le pharaon; il sortira pour aller près de l''eau. Tu lui annonceras: ‘Voici ce que dit l''Eternel: Laisse partir mon peuple afin qu''il me serve. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Si tu ne laisses pas partir mon peuple, j''enverrai les mouches venimeuses contre toi, contre tes serviteurs, ton peuple et tes maisons. Les maisons des Egyptiens seront remplies de mouches et le sol en sera couvert. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Cependant, ce jour-là, je traiterai de manière différente la région de Gosen où habite mon peuple: il n''y aura pas de mouches là-bas afin que tu saches que moi, l''Eternel, je suis présent dans cette région'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Suis présent dans cette région: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ou occupe ton pays ou règne sur la terre, littéralement (suis) à l'intérieur de la terre.
      marker-yv: yv-n
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Je placerai une séparation entre mon peuple et le tien. Ce signe sera pour demain.’» '
  '2':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Aaron tendit sa main sur les cours d''eau de l''Egypte et les grenouilles en sortirent et recouvrirent l''Egypte. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: C'est ce que fit l'Eternel. Une grande quantité de mouches venimeuses vint dans la maison du pharaon et de ses serviteurs, et toute l'Egypte fut dévastée par les mouches.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Le pharaon appela Moïse et Aaron et dit: «Allez-y, offrez des sacrifices à votre Dieu dans le pays.» '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Moïse répondit: «Il n''est pas convenable d''agir ainsi. En effet, nous offririons à l''Eternel, notre Dieu, des sacrifices qui font horreur aux Egyptiens. Et si nous offrons sous les yeux des Egyptiens des sacrifices qui leur font horreur, ne nous lanceront-ils pas des pierres? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Nous ferons trois journées de marche dans le désert et alors nous offrirons des sacrifices à l''Eternel, notre Dieu, conformément à ce qu''il nous dira.» '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Le pharaon dit: «Je vous laisserai partir pour offrir des sacrifices à l''Eternel, votre Dieu, dans le désert. Seulement, vous ne vous éloignerez pas en y allant. Priez pour moi!» '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Moïse répondit: «Dès que je serai sorti de chez toi, je prierai l''Eternel. Demain, les mouches s''éloigneront du pharaon, de ses serviteurs et de son peuple. Mais que le pharaon ne nous trompe plus en refusant de laisser le peuple partir pour offrir des sacrifices à l''Eternel!» '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Moïse sortit de chez le pharaon et pria l''Eternel. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'L''Eternel fit ce que demandait Moïse et les mouches s''éloignèrent du pharaon, de ses serviteurs et de son peuple. Il n''en resta pas une. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: Cependant, cette fois encore, le pharaon rendit son cœur insensible et ne laissa pas partir le peuple.
  '3':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Cependant les magiciens en firent autant par leurs sortilèges: ils firent monter les grenouilles sur l''Egypte.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Le pharaon appela Moïse et Aaron et dit: «Priez l''Eternel afin qu''il éloigne les grenouilles de moi et de mon peuple, et je laisserai le peuple partir pour offrir des sacrifices à l''Eternel.» '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Moïse dit au pharaon: «A toi l''honneur de me fixer le moment où je dois prier pour toi, pour tes serviteurs et pour ton peuple afin que l''Eternel éloigne les grenouilles de toi et de tes maisons. Il n''en restera que dans le fleuve.» '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Il répondit: «Demain.» Moïse dit: «Cela se passera comme cela afin que tu saches qu''il n''y a personne qui soit pareil à l''Eternel, notre Dieu. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Les grenouilles s''éloigneront de toi et de tes maisons, de tes serviteurs et de ton peuple. Il n''en restera que dans le fleuve.» '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Moïse et Aaron sortirent de chez le pharaon. Puis Moïse cria à l''Eternel à cause des grenouilles dont il avait frappé le pharaon. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'L''Eternel fit ce que demandait Moïse et les grenouilles moururent dans les maisons, les cours intérieures et les champs. '
