document_id: EXO.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Naissance et fuite de Moïse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Un homme de la famille de Lévi avait pris pour femme une Lévite. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Cette femme fut enceinte et mit au monde un fils. Elle vit qu''il était beau et elle le cacha pendant trois mois. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Lorsqu''elle ne put plus le garder caché, elle prit une caisse de jonc, qu''elle enduisit de bitume et de poix; puis elle y mit l''enfant et le déposa parmi les roseaux sur la rive du fleuve. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: La sœur de l'enfant se posta à une certaine distance pour savoir ce qui lui arriverait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Or, la fille du pharaon descendit au fleuve pour se baigner tandis que ses servantes se promenaient le long du fleuve. Elle vit la caisse au milieu des roseaux et envoya sa servante la prendre. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Quand elle l''ouvrit, elle vit l''enfant: c''était un petit garçon qui pleurait. Prise de pitié pour lui, elle dit: «C''est un enfant des Hébreux!» '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Alors la sœur de l''enfant dit à la fille du pharaon: «Veux-tu que j''aille te chercher une nourrice parmi les femmes des Hébreux afin qu''elle allaite cet enfant pour toi?» '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: '«Vas-y», lui répondit la fille du pharaon. Et la jeune fille alla chercher la mère de l''enfant. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'La fille du pharaon lui dit: «Emporte cet enfant et allaite-le pour moi; je te donnerai ton salaire.» La femme prit l''enfant et l''allaita. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Quand il eut grandi, elle l'amena à la fille du pharaon et il fut un fils pour elle. Elle l'appela Moïse, «car, dit-elle, je l'ai retiré de l'eau.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Une fois devenu grand, Moïse sortit vers ses frères
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ses frères: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire les Israélites.
    marker-yv: yv-n
  - type: text
    text: ' et vit leurs pénibles travaux. Il vit un Egyptien frapper un Hébreu, un de ses frères. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il regarda de tous côtés, vit qu''il n''y avait personne et tua l''Egyptien qu''il cacha dans le sable. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quand il sortit le jour suivant, il vit deux Hébreux se battre. Il dit à celui qui avait tort: «Pourquoi frappes-tu ton prochain?» '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Cet homme répondit alors: *«Qui t''a établi chef et juge sur nous? Est-ce pour me tuer que tu me parles, tout comme tu as tué l''Egyptien?»'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Qui t''a… l''Egyptien: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Actes 7.27-28
      metadata:
        usfm: ACT.7.27+ACT.7.28
    - type: text
      text: ', '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '35'
      metadata:
        usfm: ACT.7.35
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' par Etienne.'
    marker-yv: yv-n
  - type: text
    text: ' Moïse eut peur et se dit: «L''affaire est certainement connue.» '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Le pharaon apprit ce qui s'était passé et il chercha à faire mourir Moïse, mais Moïse s'enfuit loin de lui et s'installa dans le pays de Madian. Il s'arrêta près d'un puits.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Le prêtre de Madian avait sept filles. Celles-ci vinrent puiser de l''eau et elles remplirent les abreuvoirs pour faire boire le troupeau de leur père. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les bergers arrivèrent et les chassèrent. Alors Moïse se leva, prit leur défense et fit boire leur troupeau. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Quand elles furent de retour chez Réuel, leur père, il demanda: «Pourquoi revenez-vous si vite aujourd''hui?» '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Elles répondirent: «Un Egyptien nous a délivrées de la main des bergers; il nous a même puisé de l''eau et a fait boire le troupeau.» '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Réuel dit à ses filles: «Où est-il? Pourquoi avez-vous laissé cet homme? Allez l''appeler pour qu''il vienne prendre un repas.» '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Moïse décida de s''installer chez cet homme, qui lui donna en mariage sa fille Séphora. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Elle mit au monde un fils, qu'il appela Guershom «car, dit-il, je suis en exil dans un pays étranger.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Appel de Moïse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Longtemps après, le roi d''Egypte mourut. Les Israélites gémissaient du fond de l''esclavage, ils poussaient des cris. Leurs appels montèrent du fond de l''esclavage jusqu''à Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Dieu entendit leurs gémissements et se souvint de son alliance avec Abraham, Isaac et Jacob. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Dieu vit les Israélites, il comprit leur situation.
