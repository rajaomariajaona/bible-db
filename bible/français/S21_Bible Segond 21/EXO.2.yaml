document_id: EXO.2,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Naissance et fuite de Moïse
  - type: text
    content: 'Un homme de la famille de Lévi avait pris pour femme une Lévite. '
  '10':
  - type: text
    content: Quand il eut grandi, elle l'amena à la fille du pharaon et il fut un fils pour elle. Elle l'appela Moïse, «car, dit-elle, je l'ai retiré de l'eau.»
  '11':
  - type: text
    content: Une fois devenu grand, Moïse sortit vers ses frères
  - type: note
    content: 'Ses frères: c''est-à-dire les Israélites.'
  - type: text
    content: ' et vit leurs pénibles travaux. Il vit un Egyptien frapper un Hébreu, un de ses frères. '
  '12':
  - type: text
    content: 'Il regarda de tous côtés, vit qu''il n''y avait personne et tua l''Egyptien qu''il cacha dans le sable. '
  '13':
  - type: text
    content: 'Quand il sortit le jour suivant, il vit deux Hébreux se battre. Il dit à celui qui avait tort: «Pourquoi frappes-tu ton prochain?» '
  '14':
  - type: text
    content: 'Cet homme répondit alors: *«Qui t''a établi chef et juge sur nous? Est-ce pour me tuer que tu me parles, tout comme tu as tué l''Egyptien?»'
  - type: note
    content: 'Qui t''a… l''Egyptien: cité en Actes 7.27-28, 35 par Etienne.'
  - type: text
    content: ' Moïse eut peur et se dit: «L''affaire est certainement connue.» '
  '15':
  - type: text
    content: Le pharaon apprit ce qui s'était passé et il chercha à faire mourir Moïse, mais Moïse s'enfuit loin de lui et s'installa dans le pays de Madian. Il s'arrêta près d'un puits.
  '16':
  - type: text
    content: 'Le prêtre de Madian avait sept filles. Celles-ci vinrent puiser de l''eau et elles remplirent les abreuvoirs pour faire boire le troupeau de leur père. '
  '17':
  - type: text
    content: 'Les bergers arrivèrent et les chassèrent. Alors Moïse se leva, prit leur défense et fit boire leur troupeau. '
  '18':
  - type: text
    content: 'Quand elles furent de retour chez Réuel, leur père, il demanda: «Pourquoi revenez-vous si vite aujourd''hui?» '
  '19':
  - type: text
    content: 'Elles répondirent: «Un Egyptien nous a délivrées de la main des bergers; il nous a même puisé de l''eau et a fait boire le troupeau.» '
  '2':
  - type: text
    content: 'Cette femme fut enceinte et mit au monde un fils. Elle vit qu''il était beau et elle le cacha pendant trois mois. '
  '20':
  - type: text
    content: 'Réuel dit à ses filles: «Où est-il? Pourquoi avez-vous laissé cet homme? Allez l''appeler pour qu''il vienne prendre un repas.» '
  '21':
  - type: text
    content: 'Moïse décida de s''installer chez cet homme, qui lui donna en mariage sa fille Séphora. '
  '22':
  - type: text
    content: Elle mit au monde un fils, qu'il appela Guershom «car, dit-il, je suis en exil dans un pays étranger.»
  - type: heading
    content: Appel de Moïse
  '23':
  - type: text
    content: 'Longtemps après, le roi d''Egypte mourut. Les Israélites gémissaient du fond de l''esclavage, ils poussaient des cris. Leurs appels montèrent du fond de l''esclavage jusqu''à Dieu. '
  '24':
  - type: text
    content: 'Dieu entendit leurs gémissements et se souvint de son alliance avec Abraham, Isaac et Jacob. '
  '25':
  - type: text
    content: Dieu vit les Israélites, il comprit leur situation.
  '3':
  - type: text
    content: 'Lorsqu''elle ne put plus le garder caché, elle prit une caisse de jonc, qu''elle enduisit de bitume et de poix; puis elle y mit l''enfant et le déposa parmi les roseaux sur la rive du fleuve. '
  '4':
  - type: text
    content: La sœur de l'enfant se posta à une certaine distance pour savoir ce qui lui arriverait.
  '5':
  - type: text
    content: 'Or, la fille du pharaon descendit au fleuve pour se baigner tandis que ses servantes se promenaient le long du fleuve. Elle vit la caisse au milieu des roseaux et envoya sa servante la prendre. '
  '6':
  - type: text
    content: 'Quand elle l''ouvrit, elle vit l''enfant: c''était un petit garçon qui pleurait. Prise de pitié pour lui, elle dit: «C''est un enfant des Hébreux!» '
  '7':
  - type: text
    content: 'Alors la sœur de l''enfant dit à la fille du pharaon: «Veux-tu que j''aille te chercher une nourrice parmi les femmes des Hébreux afin qu''elle allaite cet enfant pour toi?» '
  '8':
  - type: text
    content: '«Vas-y», lui répondit la fille du pharaon. Et la jeune fille alla chercher la mère de l''enfant. '
  '9':
  - type: text
    content: 'La fille du pharaon lui dit: «Emporte cet enfant et allaite-le pour moi; je te donnerai ton salaire.» La femme prit l''enfant et l''allaita. '
