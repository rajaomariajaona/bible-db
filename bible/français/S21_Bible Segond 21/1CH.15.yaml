document_id: 1CH.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Transport de l'arche à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'David se construisit des maisons dans la ville de David. Il prépara aussi un emplacement pour l''arche de Dieu et dressa une tente pour l''abriter. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il dit alors: «L''arche de Dieu ne doit être portée que par les Lévites, car c''est eux que l''Eternel a choisis pour porter son coffre et en faire à toujours le service.» '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Puis David rassembla tout Israël à Jérusalem pour faire monter l''arche de l''Eternel à la place qu''il lui avait préparée. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'David rassembla les descendants d''Aaron et les Lévites. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Pour les Kehathites, il y eut Uriel, le chef, et 120 de ses frères; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'pour les Merarites, Asaja, le chef, et 220 de ses frères; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'pour les Guershonites, Joël, le chef, et 130 de ses frères; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'pour les descendants d''Elitsaphan, Shemaeja, le chef, et 200 de ses frères; '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'pour les descendants d''Hébron, Eliel, le chef, et 80 de ses frères; '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: pour les descendants d'Uziel, Amminadab, le chef, et 112 de ses frères.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'David appela les prêtres Tsadok et Abiathar ainsi que les Lévites Uriel, Asaja, Joël, Shemaeja, Eliel et Amminadab. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il leur dit: «Vous êtes les chefs de famille des Lévites. Consacrez-vous, avec vos frères, et faites monter l''arche de l''Eternel, du Dieu d''Israël, à l''emplacement que je lui ai préparé. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Parce que vous n'y étiez pas la première fois, l'Eternel, notre Dieu, nous a frappés. En effet, nous ne l'avions pas recherché conformément aux règles.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les prêtres et les Lévites se consacrèrent pour faire monter l''arche de l''Eternel, du Dieu d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les fils des Lévites portèrent l''arche de Dieu sur leurs épaules avec des barres, comme Moïse l''avait ordonné d''après la parole de l''Eternel. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Puis David dit aux chefs des Lévites de disposer leurs frères musiciens avec leurs instruments de musique, des luths, des harpes et des cymbales, qu''ils devaient faire retentir de sons éclatants en signe de réjouissance. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les Lévites mirent donc en place Héman, fils de Joël; Asaph, fils de Bérékia, un de ses frères; et, parmi les Merarites, leurs frères, Ethan, fils de Kushaja; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'puis avec eux leurs frères de second rang, les portiers Zacharie, Ben, Jaaziel, Shemiramoth, Jehiel, Unni, Eliab, Benaja, Maaséja, Matthithia, Eliphelé, Miknéja, Obed-Edom et Jeïel. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Les musiciens Héman, Asaph et Ethan devaient faire retentir des cymbales en bronze. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Zacharie, Aziel, Shemiramoth, Jehiel, Unni, Eliab, Maaséja et Benaja avaient des luths pour les sopranos. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Quant à Matthithia, Eliphelé, Miknéja, Obed-Edom, Jeïel et Azazia, ils avaient des harpes à huit cordes pour conduire le chant. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Kenania, chef musicien parmi les Lévites, dirigeait la musique, car il en avait les compétences. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Bérékia et Elkana étaient des portiers chargés de veiller sur l''arche. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Les prêtres Shebania, Josaphat, Nathanaël, Amasaï, Zacharie, Benaja et Eliézer sonnaient de la trompette devant l'arche de Dieu. Obed-Edom et Jechija étaient aussi des portiers chargés de veiller sur l'arche.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'David, les anciens d''Israël et les chefs de milliers se mirent en route pour faire monter l''arche de l''alliance de l''Eternel depuis la maison d''Obed-Edom, et ce au milieu des réjouissances. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Ce fut avec l''aide de Dieu que les Lévites portèrent l''arche de l''alliance de l''Eternel, et l''on sacrifia 7 taureaux et 7 béliers. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'David était habillé d''un manteau de fin lin, de même que tous les Lévites chargés de porter l''arche, les chantres et Kenania, le chef des musiciens. David portait aussi un éphod en lin. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Tout Israël fit monter l'arche de l'alliance de l'Eternel avec des cris de joie, au son des clairons, des trompettes et des cymbales et en faisant retentir les luths et les harpes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Mical, la fille de Saül, regardait par la fenêtre lorsque l'arche de l'alliance de l'Eternel pénétra dans la ville de David et, en voyant le roi David sauter et danser, elle éprouva du mépris pour lui dans son cœur.
