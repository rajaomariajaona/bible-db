document_id: DEU.15
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'année sabbatique
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: '»Tous les 7 ans, tu effectueras une remise des dettes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Voici comment elle s''effectuera. Quand on aura proclamé la remise des dettes en l''honneur de l''Eternel, tout créancier qui aura fait un prêt à son prochain renoncera à son droit. Il n''imposera pas de contrainte à son prochain et compatriote pour le paiement de sa dette. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tu pourras imposer des contraintes à l''étranger, mais tu renonceras à ton droit pour ce qui t''appartiendra chez ton compatriote. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Toutefois, il n''y aura pas de pauvre chez toi, car l''Eternel te bénira dans le pays que l''Eternel, ton Dieu, te fera posséder en héritage, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'pourvu seulement que tu obéisses à l''Eternel, ton Dieu, en mettant soigneusement en pratique les commandements que je te prescris aujourd''hui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: L'Eternel, ton Dieu, te bénira comme il te l'a dit. Tu prêteras à beaucoup de nations et tu ne feras pas d'emprunt, tu domineras sur beaucoup de nations et elles ne domineront pas sur toi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '»S''il y a chez toi, parmi tes frères et dans l''une de tes villes, un pauvre dans le pays que l''Eternel, ton Dieu, te donne, tu n''endurciras pas ton cœur et tu ne fermeras pas ta main devant ton frère pauvre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Au contraire, tu lui ouvriras ta main et tu lui prêteras de quoi pourvoir à ses besoins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Veille bien à ne pas te montrer assez méchant pour dire dans ton cœur: ‘La septième année, l''année de la remise des dettes, approche!’ Veille bien à ne pas avoir un regard mauvais envers ton frère pauvre, au point de ne rien lui donner. Il crierait à l''Eternel contre toi et tu te chargerais d''un péché. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Donne-lui et que ton cœur ne rechigne pas à le faire, car, à cause de cela, l''Eternel, ton Dieu, te bénira dans tous tes travaux et dans toutes tes entreprises. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il y aura toujours des pauvres dans le pays. C''est pourquoi je te donne ce commandement: tu ouvriras ta main à ton frère, à celui qui vit dans la misère et la pauvreté dans ton pays.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: '»Si l''un de tes frères hébreux, homme ou femme, se vend à toi, il te servira 6 ans, mais la septième année, tu le renverras libre de chez toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Et lorsque tu le renverras libre de chez toi, tu ne le renverras pas les mains vides. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Tu lui feras des cadeaux tirés de ton petit bétail, de ton aire de battage, de ton pressoir, de ce que tu auras grâce à la bénédiction de l''Eternel, ton Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Tu te souviendras que tu as été esclave en Egypte et que l''Eternel, ton Dieu, t''a racheté. Voilà pourquoi je te donne aujourd''hui ce commandement. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Si ton esclave te dit: ‘Je ne veux pas sortir de chez toi’, parce qu''il t''aime, toi et ta famille, et qu''il se trouve bien chez toi, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'alors tu prendras un poinçon et tu lui perceras l''oreille contre la porte. Ainsi il sera pour toujours ton esclave. Tu feras de même pour ta servante. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Tu ne devras pas trouver difficile de le renvoyer libre de chez toi, car il t'a servi 6 ans et il t'a rapporté le double d'un salarié. Alors l'Eternel, ton Dieu, te bénira dans tout ce que tu feras.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les premiers-nés des animaux
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: '»Tu consacreras à l''Eternel, ton Dieu, tout premier-né mâle qui naîtra dans ton gros et dans ton petit bétail. Tu ne travailleras pas avec le premier-né de ton bœuf et tu ne tondras pas le premier-né de tes brebis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tu le mangeras chaque année avec ta famille devant l''Eternel, ton Dieu, à l''endroit qu''il choisira. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'S''il a un défaut, s''il est boiteux, aveugle ou atteint d''une tare quelconque, tu ne l''offriras pas en sacrifice à l''Eternel, ton Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Tu le mangeras dans ta ville. La personne impure et la personne pure en mangeront l''une et l''autre, comme on mange de la gazelle et du cerf. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Seulement, tu ne mangeras pas son sang. Tu le verseras sur la terre comme de l'eau.
