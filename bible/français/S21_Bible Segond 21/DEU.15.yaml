document_id: DEU.15,152
type_code: fra
verses:
  '1':
  - type: heading
    content: L'année sabbatique
  - type: text
    content: '»Tous les 7 ans, tu effectueras une remise des dettes. '
  '10':
  - type: text
    content: 'Donne-lui et que ton cœur ne rechigne pas à le faire, car, à cause de cela, l''Eternel, ton Dieu, te bénira dans tous tes travaux et dans toutes tes entreprises. '
  '11':
  - type: text
    content: 'Il y aura toujours des pauvres dans le pays. C''est pourquoi je te donne ce commandement: tu ouvriras ta main à ton frère, à celui qui vit dans la misère et la pauvreté dans ton pays.'
  '12':
  - type: text
    content: '»Si l''un de tes frères hébreux, homme ou femme, se vend à toi, il te servira 6 ans, mais la septième année, tu le renverras libre de chez toi. '
  '13':
  - type: text
    content: 'Et lorsque tu le renverras libre de chez toi, tu ne le renverras pas les mains vides. '
  '14':
  - type: text
    content: 'Tu lui feras des cadeaux tirés de ton petit bétail, de ton aire de battage, de ton pressoir, de ce que tu auras grâce à la bénédiction de l''Eternel, ton Dieu. '
  '15':
  - type: text
    content: 'Tu te souviendras que tu as été esclave en Egypte et que l''Eternel, ton Dieu, t''a racheté. Voilà pourquoi je te donne aujourd''hui ce commandement. '
  '16':
  - type: text
    content: 'Si ton esclave te dit: ‘Je ne veux pas sortir de chez toi’, parce qu''il t''aime, toi et ta famille, et qu''il se trouve bien chez toi, '
  '17':
  - type: text
    content: 'alors tu prendras un poinçon et tu lui perceras l''oreille contre la porte. Ainsi il sera pour toujours ton esclave. Tu feras de même pour ta servante. '
  '18':
  - type: text
    content: Tu ne devras pas trouver difficile de le renvoyer libre de chez toi, car il t'a servi 6 ans et il t'a rapporté le double d'un salarié. Alors l'Eternel, ton Dieu, te bénira dans tout ce que tu feras.
  - type: heading
    content: Les premiers-nés des animaux
  '19':
  - type: text
    content: '»Tu consacreras à l''Eternel, ton Dieu, tout premier-né mâle qui naîtra dans ton gros et dans ton petit bétail. Tu ne travailleras pas avec le premier-né de ton bœuf et tu ne tondras pas le premier-né de tes brebis. '
  '2':
  - type: text
    content: 'Voici comment elle s''effectuera. Quand on aura proclamé la remise des dettes en l''honneur de l''Eternel, tout créancier qui aura fait un prêt à son prochain renoncera à son droit. Il n''imposera pas de contrainte à son prochain et compatriote pour le paiement de sa dette. '
  '20':
  - type: text
    content: 'Tu le mangeras chaque année avec ta famille devant l''Eternel, ton Dieu, à l''endroit qu''il choisira. '
  '21':
  - type: text
    content: 'S''il a un défaut, s''il est boiteux, aveugle ou atteint d''une tare quelconque, tu ne l''offriras pas en sacrifice à l''Eternel, ton Dieu. '
  '22':
  - type: text
    content: 'Tu le mangeras dans ta ville. La personne impure et la personne pure en mangeront l''une et l''autre, comme on mange de la gazelle et du cerf. '
  '23':
  - type: text
    content: Seulement, tu ne mangeras pas son sang. Tu le verseras sur la terre comme de l'eau.
  '3':
  - type: text
    content: 'Tu pourras imposer des contraintes à l''étranger, mais tu renonceras à ton droit pour ce qui t''appartiendra chez ton compatriote. '
  '4':
  - type: text
    content: 'Toutefois, il n''y aura pas de pauvre chez toi, car l''Eternel te bénira dans le pays que l''Eternel, ton Dieu, te fera posséder en héritage, '
  '5':
  - type: text
    content: 'pourvu seulement que tu obéisses à l''Eternel, ton Dieu, en mettant soigneusement en pratique les commandements que je te prescris aujourd''hui. '
  '6':
  - type: text
    content: L'Eternel, ton Dieu, te bénira comme il te l'a dit. Tu prêteras à beaucoup de nations et tu ne feras pas d'emprunt, tu domineras sur beaucoup de nations et elles ne domineront pas sur toi.
  '7':
  - type: text
    content: '»S''il y a chez toi, parmi tes frères et dans l''une de tes villes, un pauvre dans le pays que l''Eternel, ton Dieu, te donne, tu n''endurciras pas ton cœur et tu ne fermeras pas ta main devant ton frère pauvre. '
  '8':
  - type: text
    content: 'Au contraire, tu lui ouvriras ta main et tu lui prêteras de quoi pourvoir à ses besoins. '
  '9':
  - type: text
    content: 'Veille bien à ne pas te montrer assez méchant pour dire dans ton cœur: ‘La septième année, l''année de la remise des dettes, approche!’ Veille bien à ne pas avoir un regard mauvais envers ton frère pauvre, au point de ne rien lui donner. Il crierait à l''Eternel contre toi et tu te chargerais d''un péché. '
