document_id: JAS.1,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Adresse et salutation
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'De la part de Jacques, serviteur de Dieu et du Seigneur Jésus-Christ, aux douze tribus dispersées: salut!'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La mise à l'épreuve de la foi
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Que le riche, au contraire, se montre fier de son abaissement, car il disparaîtra comme la fleur de l''herbe. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Le soleil se lève avec son ardente chaleur, il dessèche l'herbe, sa fleur tombe et toute sa beauté s'évanouit. De même, le riche se flétrira dans ses entreprises.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Appel à vivre la parole de vérité
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Heureux l'homme qui tient bon face à la tentation car, après avoir fait ses preuves, il recevra la couronne de la vie que le Seigneur a promise à ceux qui l'aiment.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Que personne, lorsqu''il est tenté, ne dise: «C''est Dieu qui me tente», car Dieu ne peut pas être tenté par le mal et il ne tente lui-même personne. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Mais chacun est tenté quand il est attiré et entraîné par ses propres désirs. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: Puis le désir, lorsqu'il est encouragé, donne naissance au péché et le péché, parvenu à son plein développement, a pour fruit la mort.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ne vous y trompez pas, mes frères et sœurs bien-aimés: '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: tout bienfait et tout don parfait viennent d'en haut; ils descendent du Père des lumières
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Père des lumières: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: c'est-à-dire Dieu, peut-être par allusion à son activité de créateur des astres et luminaires.
      marker-yv: yv-n
    - type: text
      text: ', en qui il n''y a ni changement ni l''ombre d''une variation. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: Conformément à sa volonté, il nous a donné la vie par la parole de vérité afin que nous soyons en quelque sorte les premières de ses créatures.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ainsi donc, mes frères et sœurs bien-aimés, que chacun soit prompt à écouter, lent à parler, lent à se mettre en colère, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Mes frères et sœurs, considérez comme un sujet de joie complète les diverses épreuves auxquelles vous pouvez être exposés, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'car la colère de l''homme n''accomplit pas la justice de Dieu. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: C'est pourquoi, rejetez toute souillure et tout débordement dû à la méchanceté, et accueillez avec douceur la parole qui a été plantée en vous et qui peut sauver votre âme.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Mettez en pratique la parole et ne vous contentez pas de l''écouter en vous trompant vous-mêmes par de faux raisonnements. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'En effet, si quelqu''un écoute la parole et ne la met pas en pratique, il ressemble à un homme qui regarde son visage dans un miroir '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'et qui, après s''être observé, s''en va et oublie aussitôt comment il était. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: Mais celui qui a plongé les regards dans la loi parfaite, la loi de la liberté, et qui a persévéré, celui qui n'a pas oublié ce qu'il a entendu mais qui se met au travail, celui-là sera heureux dans son activité.
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Si quelqu''un [parmi vous] croit être religieux alors qu''il ne tient pas sa langue en bride mais trompe son propre cœur, sa religion est sans valeur. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: La religion pure et sans tache devant Dieu notre Père consiste à s'occuper des orphelins et des veuves dans leur détresse et à ne pas se laisser souiller par le monde.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'sachant que la mise à l''épreuve de votre foi produit la persévérance. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Mais il faut que la persévérance accomplisse parfaitement sa tâche afin que vous soyez parfaitement qualifiés, sans défaut, et qu'il ne vous manque rien.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Si l''un de vous manque de sagesse, qu''il la demande à Dieu, qui donne à tous simplement et sans faire de reproche, et elle lui sera donnée. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Mais qu''il la demande avec foi, sans douter, car celui qui doute ressemble aux vagues de la mer que le vent soulève et agite de tous côtés. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Qu''un tel homme ne s''imagine pas qu''il recevra quelque chose du Seigneur: '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: c'est un homme partagé, instable dans toute sa conduite.
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Que le frère de condition humble tire fierté de son élévation. '
