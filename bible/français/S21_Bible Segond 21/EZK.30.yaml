document_id: EZK.30,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: 'La parole de l''Eternel m''a été adressée: '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Voici ce que dit le Seigneur, l''Eternel: Je mettrai fin à l''abondance des Egyptiens par l''intermédiaire de Nebucadnetsar, le roi de Babylone. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lui et son peuple, la plus violente des nations, seront envoyés pour détruire le pays. Ils tireront l''épée contre l''Egypte et rempliront le pays de victimes. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J'assécherai le delta du Nil, je vendrai le pays à des hommes mauvais, je dévasterai le pays et ce qu'il contient par l'intermédiaire d'étrangers. C'est moi, l'Eternel, qui ai parlé.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Voici ce que dit le Seigneur, l''Eternel: Je ferai disparaître les idoles et je supprimerai de Memphis les faux dieux; il n''y aura plus de prince en Egypte et je propagerai la terreur dans le pays. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je dévasterai Pathros, je mettrai le feu à Tsoan et je mettrai mes jugements en œuvre contre No. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je déverserai ma fureur sur Sin, la forteresse de l''Egypte, et j''éliminerai la foule bruyante de No. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je mettrai le feu à l''Egypte. Sin se tordra de douleur, No aura des brèches et Memphis sera conquise en plein jour par des ennemis. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les jeunes hommes d''On et de Pi-Béseth tomberont par l''épée et les habitants de ces villes partiront en déportation. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A Tachpanès le jour s''obscurcira, quand j''y briserai l''oppression exercée par l''Egypte et que l''orgueil qu''elle tirait de sa force aura disparu. Un nuage couvrira Tachpanès, et ses filles partiront en déportation. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Je mettrai mes jugements en œuvre contre l'Egypte, et ils reconnaîtront que je suis l'Eternel.»
  '2':
  - type: usfm
    marker: nb
    children:
    - type: text
      text: '«Fils de l''homme, prophétise! Tu annonceras: Voici ce que dit le Seigneur, l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: »Lamentez-vous! Ah! Quel jour!
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La onzième année, le septième jour du premier mois, la parole de l''Eternel m''a été adressée: '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: «Fils de l'homme, j'ai cassé le bras du pharaon, du roi d'Egypte, et on ne lui a pas mis d'attelle pour le guérir, on ne lui a pas mis de bandage pour le maintenir et le raffermir afin qu'il puisse manier l'épée.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»C''est pourquoi, voici ce que dit le Seigneur, l''Eternel: Je m''en prends au pharaon, au roi d''Egypte. Je lui fracturerai les bras, celui qui est en bon état et celui qui est déjà cassé, et je ferai tomber l''épée de sa main. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''éparpillerai les Egyptiens parmi les nations, je les disperserai dans divers pays. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je fortifierai les bras du roi de Babylone et je mettrai mon épée dans sa main. Je fracturerai les bras du pharaon et il gémira devant lui comme le font les mourants. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je fortifierai les bras du roi de Babylone, et les bras du pharaon tomberont. Ils reconnaîtront que je suis l''Eternel, quand je mettrai mon épée dans la main du roi de Babylone et qu''il la brandira contre l''Egypte. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: J'éparpillerai les Egyptiens parmi les nations, je les disperserai dans divers pays. Ils reconnaîtront alors que je suis l'Eternel.»
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: En effet, le jour est proche, le jour de l'Eternel est proche.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sera un jour de ténèbres, la période réservée aux nations.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'épée fondra sur l'Egypte
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'affolement s'emparera de l'Ethiopie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand les morts tomberont en Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand on enlèvera ses richesses
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que ses fondations seront détruites.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'Ethiopie, Puth, Lud, tout peuple mélangé, Cub
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les membres du pays de l'alliance
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tomberont par l'épée avec eux.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '»Voici ce que dit l''Eternel:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils tomberont, les soutiens de l'Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'orgueil qu'elle tirait de sa force s'éteindra.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De Migdol à Syène ils tomberont par l'épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclare le Seigneur, l'Eternel.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Ils seront dévastés au milieu des pays dévastés, et ses villes seront comptées parmi les villes en ruine. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils reconnaîtront que je suis l''Eternel, quand je mettrai le feu à l''Egypte et que tous ses alliés seront brisés. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ce jour-là, des messagers iront de ma part sur des bateaux pour effrayer l'Ethiopie malgré son sentiment de sécurité. L'affolement s'emparera d'eux lorsque le jour de l'Egypte sera venu, et le voici qui arrive!
