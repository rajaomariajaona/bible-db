document_id: PRO.29
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Des attitudes opposées
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: L'homme qui mérite des reproches et qui se montre réfractaire
- type: usfm
  marker: q1
  children:
  - type: text
    text: sera brisé tout d'un coup, sans remède.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Quand les justes se multiplient, le peuple est dans la joie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand le méchant domine, le peuple gémit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: L'homme qui aime la sagesse réjouit son père,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui fréquente des prostituées gaspille sa fortune.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Un roi affermit son pays par le droit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui multiplie les impôts le ruine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: L'homme qui flatte son prochain
- type: usfm
  marker: q1
  children:
  - type: text
    text: pose un piège sous ses pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: La transgression de l'homme méchant tend un piège,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais le juste triomphe et se réjouit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Le juste connaît la cause des plus faibles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que le méchant ne comprend pas la connaissance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Des moqueurs enflamment une ville,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que des sages calment la colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Si un homme sage entre en procès avec un fou,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il aura beau se fâcher ou rire, la paix n'aura jamais lieu.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Les hommes sanguinaires détestent l'homme intègre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que les hommes droits protègent sa vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: L'homme stupide affiche toute sa passion,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que le sage y met un frein.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Quand celui qui domine prête attention aux paroles mensongères,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous ses serviteurs sont méchants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le pauvre et l''oppresseur se rencontrent:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est l'Eternel qui éclaire la vue de l'un et de l'autre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Un roi qui juge les faibles en toute vérité
- type: usfm
  marker: q1
  children:
  - type: text
    text: aura son trône affermi pour toujours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Le bâton et le reproche procurent la sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que l'enfant livré à lui-même fait honte à sa mère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Quand les méchants prolifèrent, le péché prolifère,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais les justes verront leur chute.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Corrige ton fils et il te laissera en repos,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il fera tes délices.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Quand il n'y a pas de révélation, le peuple ne connaît aucune retenue,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais s'il respecte la loi, il est heureux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ce n''est pas par des paroles qu''on corrige un esclave:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: même s'il comprend, il n'obéit pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Si tu vois un homme parler sans réfléchir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il y a plus à attendre d'un homme stupide que de lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Si on gâte un esclave dès l'enfance,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il finit par se prendre pour un fils.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Le colérique pousse au conflit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'homme plein de fureur commet beaucoup de transgressions.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: L'orgueil d'un homme le conduira à l'humiliation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui est humble d'esprit obtiendra la gloire.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: Celui qui partage avec un voleur se déteste lui-même;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il entend bien la malédiction
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Malédiction: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'celle qu''on lance contre le voleur inconnu (cf. '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Juges 17.2
      metadata:
        usfm: JDG.17.2
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ', mais il n''avoue pas.'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: C'est un piège que de trembler devant les hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais se confier en l'Eternel procure la sécurité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Beaucoup recherchent la faveur de celui qui domine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais c'est l'Eternel qui rend justice à chacun.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: L'homme injuste fait horreur aux justes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et celui dont la voie est droite fait horreur aux méchants.
