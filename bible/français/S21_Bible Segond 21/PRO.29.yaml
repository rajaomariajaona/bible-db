document_id: PRO.29,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Des attitudes opposées
  - type: text
    content: L'homme qui mérite des reproches et qui se montre réfractaire
  - type: text
    content: sera brisé tout d'un coup, sans remède.
  '10':
  - type: text
    content: Les hommes sanguinaires détestent l'homme intègre,
  - type: text
    content: tandis que les hommes droits protègent sa vie.
  '11':
  - type: text
    content: L'homme stupide affiche toute sa passion,
  - type: text
    content: tandis que le sage y met un frein.
  '12':
  - type: text
    content: Quand celui qui domine prête attention aux paroles mensongères,
  - type: text
    content: tous ses serviteurs sont méchants.
  '13':
  - type: text
    content: 'Le pauvre et l''oppresseur se rencontrent:'
  - type: text
    content: c'est l'Eternel qui éclaire la vue de l'un et de l'autre.
  '14':
  - type: text
    content: Un roi qui juge les faibles en toute vérité
  - type: text
    content: aura son trône affermi pour toujours.
  '15':
  - type: text
    content: Le bâton et le reproche procurent la sagesse,
  - type: text
    content: tandis que l'enfant livré à lui-même fait honte à sa mère.
  '16':
  - type: text
    content: Quand les méchants prolifèrent, le péché prolifère,
  - type: text
    content: mais les justes verront leur chute.
  '17':
  - type: text
    content: Corrige ton fils et il te laissera en repos,
  - type: text
    content: il fera tes délices.
  '18':
  - type: text
    content: Quand il n'y a pas de révélation, le peuple ne connaît aucune retenue,
  - type: text
    content: mais s'il respecte la loi, il est heureux.
  '19':
  - type: text
    content: 'Ce n''est pas par des paroles qu''on corrige un esclave:'
  - type: text
    content: même s'il comprend, il n'obéit pas.
  '2':
  - type: text
    content: Quand les justes se multiplient, le peuple est dans la joie;
  - type: text
    content: quand le méchant domine, le peuple gémit.
  '20':
  - type: text
    content: Si tu vois un homme parler sans réfléchir,
  - type: text
    content: il y a plus à attendre d'un homme stupide que de lui.
  '21':
  - type: text
    content: Si on gâte un esclave dès l'enfance,
  - type: text
    content: il finit par se prendre pour un fils.
  '22':
  - type: text
    content: Le colérique pousse au conflit,
  - type: text
    content: l'homme plein de fureur commet beaucoup de transgressions.
  '23':
  - type: text
    content: L'orgueil d'un homme le conduira à l'humiliation,
  - type: text
    content: mais celui qui est humble d'esprit obtiendra la gloire.
  '24':
  - type: text
    content: Celui qui partage avec un voleur se déteste lui-même;
  - type: text
    content: il entend bien la malédiction
  - type: note
    content: 'Malédiction: celle qu''on lance contre le voleur inconnu (cf. Juges 17.2).'
  - type: text
    content: ', mais il n''avoue pas.'
  '25':
  - type: text
    content: C'est un piège que de trembler devant les hommes,
  - type: text
    content: mais se confier en l'Eternel procure la sécurité.
  '26':
  - type: text
    content: Beaucoup recherchent la faveur de celui qui domine,
  - type: text
    content: mais c'est l'Eternel qui rend justice à chacun.
  '27':
  - type: text
    content: L'homme injuste fait horreur aux justes,
  - type: text
    content: et celui dont la voie est droite fait horreur aux méchants.
  '3':
  - type: text
    content: L'homme qui aime la sagesse réjouit son père,
  - type: text
    content: mais celui qui fréquente des prostituées gaspille sa fortune.
  '4':
  - type: text
    content: Un roi affermit son pays par le droit,
  - type: text
    content: mais celui qui multiplie les impôts le ruine.
  '5':
  - type: text
    content: L'homme qui flatte son prochain
  - type: text
    content: pose un piège sous ses pas.
  '6':
  - type: text
    content: La transgression de l'homme méchant tend un piège,
  - type: text
    content: mais le juste triomphe et se réjouit.
  '7':
  - type: text
    content: Le juste connaît la cause des plus faibles,
  - type: text
    content: tandis que le méchant ne comprend pas la connaissance.
  '8':
  - type: text
    content: Des moqueurs enflamment une ville,
  - type: text
    content: tandis que des sages calment la colère.
  '9':
  - type: text
    content: Si un homme sage entre en procès avec un fou,
  - type: text
    content: il aura beau se fâcher ou rire, la paix n'aura jamais lieu.
