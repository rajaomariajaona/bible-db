document_id: ISA.27,152
type_code: fra
verses:
  '1':
  - type: text
    content: Ce jour-là, l'Eternel interviendra à l'aide de sa dure, grande et forte épée contre le léviathan, ce serpent fuyard, oui, contre le léviathan, ce serpent tortueux. Il tuera le monstre qui est dans la mer.
  - type: heading
    content: Annonce du rétablissement d'Israël
  '10':
  - type: text
    content: En effet, la ville fortifiée est solitaire,
  - type: text
    content: c'est une maison délaissée, abandonnée comme le désert.
  - type: text
    content: Le veau vient y brouter, il s'y couche et mange les branches.
  '11':
  - type: text
    content: Quand les rameaux sèchent, on les casse
  - type: text
    content: et des femmes viennent y mettre le feu.
  - type: text
    content: C'était un peuple dépourvu d'intelligence.
  - type: text
    content: Voilà pourquoi celui qui l'a fait n'a pas eu compassion de lui,
  - type: text
    content: celui qui l'a façonné ne lui a pas fait grâce.
  '12':
  - type: text
    content: Il arrivera, ce jour-là, que l'Eternel procédera à un battage
  - type: text
    content: depuis le cours de l'Euphrate jusqu'au torrent d'Egypte,
  - type: text
    content: et vous serez ramassés un à un, Israélites!
  '13':
  - type: text
    content: Ce jour-là, on sonnera de la grande trompette.
  - type: text
    content: Alors ceux qui étaient perdus en Assyrie
  - type: text
    content: ou réfugiés en Egypte reviendront
  - type: text
    content: et se prosterneront devant l'Eternel
  - type: text
    content: sur la montagne sainte, à Jérusalem.
  '2':
  - type: text
    content: Ce jour-là,
  - type: text
    content: entonnez à son intention un cantique sur la vigne excellente!
  '3':
  - type: text
    content: Moi l'Eternel, je suis son gardien, je l'arrose à chaque instant.
  - type: text
    content: De peur qu'on ne l'attaque,
  - type: text
    content: nuit et jour je veille sur elle.
  '4':
  - type: text
    content: Il n'y a pas de colère en moi,
  - type: text
    content: mais si je trouve des ronces et des buissons épineux à combattre,
  - type: text
    content: je marcherai contre eux, je les ferai disparaître tous ensemble,
  '5':
  - type: text
    content: à moins qu'on ne me prenne pour refuge,
  - type: text
    content: qu'on ne fasse la paix avec moi, oui, qu'on ne fasse la paix avec moi.
  '6':
  - type: text
    content: Dans l'avenir, Jacob prendra racine,
  - type: text
    content: Israël fera des fleurs et des rameaux
  - type: text
    content: et remplira la surface du monde de ses fruits.
  '7':
  - type: text
    content: L'Eternel l'a-t-il frappé comme il a frappé ceux qui le frappaient?
  - type: text
    content: L'a-t-il tué comme il a tué ceux qu'il tuait?
  '8':
  - type: text
    content: C'est avec mesure que tu l'as sanctionné de l'exil;
  - type: text
    content: l'Eternel l'a emporté par son souffle impétueux, un jour où soufflait le vent de l'est.
  '9':
  - type: text
    content: C'est ainsi que la faute de Jacob a été expiée,
  - type: text
    content: et voici le fruit *du pardon de son péché
  - type: note
    content: 'Du pardon… péché: cité d''après la Septante et en association avec 59.20-21 en Romains 11.27.'
  - type: text
    content: ':'
  - type: text
    content: quand il rend toutes les pierres des autels
  - type: text
    content: pareilles à des pierres de chaux transformées en poussière,
  - type: text
    content: les poteaux sacrés et les piliers consacrés au soleil ne se relèvent plus.
