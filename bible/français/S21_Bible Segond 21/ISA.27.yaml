document_id: ISA.27,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: nb
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Ce jour-là, l'Eternel interviendra à l'aide de sa dure, grande et forte épée contre le léviathan, ce serpent fuyard, oui, contre le léviathan, ce serpent tortueux. Il tuera le monstre qui est dans la mer.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Annonce du rétablissement d'Israël
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: En effet, la ville fortifiée est solitaire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est une maison délaissée, abandonnée comme le désert.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le veau vient y brouter, il s'y couche et mange les branches.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Quand les rameaux sèchent, on les casse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et des femmes viennent y mettre le feu.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'était un peuple dépourvu d'intelligence.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà pourquoi celui qui l'a fait n'a pas eu compassion de lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui l'a façonné ne lui a pas fait grâce.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: Il arrivera, ce jour-là, que l'Eternel procédera à un battage
  - type: usfm
    marker: q1
    children:
    - type: text
      text: depuis le cours de l'Euphrate jusqu'au torrent d'Egypte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous serez ramassés un à un, Israélites!
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: Ce jour-là, on sonnera de la grande trompette.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Alors ceux qui étaient perdus en Assyrie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ou réfugiés en Egypte reviendront
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et se prosterneront devant l'Eternel
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur la montagne sainte, à Jérusalem.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Ce jour-là,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: entonnez à son intention un cantique sur la vigne excellente!
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Moi l'Eternel, je suis son gardien, je l'arrose à chaque instant.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: De peur qu'on ne l'attaque,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: nuit et jour je veille sur elle.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Il n'y a pas de colère en moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais si je trouve des ronces et des buissons épineux à combattre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je marcherai contre eux, je les ferai disparaître tous ensemble,
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: à moins qu'on ne me prenne pour refuge,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'on ne fasse la paix avec moi, oui, qu'on ne fasse la paix avec moi.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Dans l'avenir, Jacob prendra racine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Israël fera des fleurs et des rameaux
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et remplira la surface du monde de ses fruits.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: L'Eternel l'a-t-il frappé comme il a frappé ceux qui le frappaient?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'a-t-il tué comme il a tué ceux qu'il tuait?
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: C'est avec mesure que tu l'as sanctionné de l'exil;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'Eternel l'a emporté par son souffle impétueux, un jour où soufflait le vent de l'est.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: C'est ainsi que la faute de Jacob a été expiée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et voici le fruit *du pardon de son péché
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Du pardon… péché: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité d''après la Septante et en association avec '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 59.20-21
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Romains 11.27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ':'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand il rend toutes les pierres des autels
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pareilles à des pierres de chaux transformées en poussière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les poteaux sacrés et les piliers consacrés au soleil ne se relèvent plus.
