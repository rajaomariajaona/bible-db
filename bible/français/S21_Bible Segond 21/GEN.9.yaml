document_id: GEN.9,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Noé et ses fils
  - type: text
    content: 'Dieu bénit Noé et ses fils. Il leur dit: «Reproduisez-vous, devenez nombreux et remplissez la terre. '
  '10':
  - type: text
    content: 'avec tous les êtres vivants qui sont avec vous, tant les oiseaux que le bétail et tous les animaux de la terre, avec tous ceux qui sont sortis de l''arche, avec tous les animaux de la terre. '
  '11':
  - type: text
    content: 'J''établis mon alliance avec vous: aucune créature ne sera plus supprimée par l''eau du déluge et il n''y aura plus de déluge pour détruire la terre.» '
  '12':
  - type: text
    content: 'Dieu dit: «Voici le signe de l''alliance que j''établis entre moi et vous, ainsi que tous les êtres vivants qui sont avec vous, pour toutes les générations: '
  '13':
  - type: text
    content: 'j''ai placé mon arc parmi les nuages et il servira de signe de l''alliance conclue entre moi et la terre. '
  '14':
  - type: text
    content: 'Quand j''aurai rassemblé des nuages au-dessus de la terre, l''arc apparaîtra parmi les nuages '
  '15':
  - type: text
    content: 'et je me souviendrai de mon alliance entre moi et vous ainsi que tous les êtres vivants de toute espèce: l''eau ne se transformera plus en déluge pour détruire toute créature. '
  '16':
  - type: text
    content: 'L''arc sera parmi les nuages et je le regarderai pour me souvenir de l''alliance éternelle entre Dieu et tous les êtres vivants de toute espèce qui se trouvent sur la terre.» '
  '17':
  - type: text
    content: 'Dieu dit à Noé: «Tel est le signe de l''alliance que j''établis entre moi et toute créature sur la terre.»'
  '18':
  - type: text
    content: 'Les fils de Noé qui sortirent de l''arche étaient Sem, Cham et Japhet. Cham fut le père de Canaan. '
  '19':
  - type: text
    content: Voilà quels sont les trois fils de Noé. Ce sont eux qui ont peuplé toute la terre.
  '2':
  - type: text
    content: 'Vous serez craints et redoutés de tout animal de la terre, de tout oiseau du ciel, de tout ce qui se déplace sur le sol et de tous les poissons de la mer: ils sont placés sous votre autorité. '
  '20':
  - type: text
    content: 'Noé commença à cultiver le sol et planta de la vigne. '
  '21':
  - type: text
    content: 'Il but du vin et devint ivre, si bien qu''il se dénuda au milieu de sa tente. '
  '22':
  - type: text
    content: 'Cham, le père de Canaan, vit la nudité de son père et en parla à ses deux frères qui se trouvaient à l''extérieur. '
  '23':
  - type: text
    content: 'Alors Sem et Japhet prirent un manteau, le mirent sur leurs épaules, marchèrent à reculons et couvrirent la nudité de leur père. Comme ils détournaient la tête, ils ne virent pas la nudité de leur père. '
  '24':
  - type: text
    content: 'Lorsqu''il eut fini de cuver son vin, Noé apprit ce que lui avait fait son fils cadet '
  '25':
  - type: text
    content: 'et dit: «Maudit soit Canaan! Qu''il soit le dernier des esclaves pour ses frères!» '
  '26':
  - type: text
    content: 'Il dit encore: «Béni soit l''Eternel, le Dieu de Sem, et que Canaan soit son esclave! '
  '27':
  - type: text
    content: Que Dieu élargisse le territoire de Japhet, qu'il habite dans les tentes de Sem et que Canaan soit son esclave!»
  '28':
  - type: text
    content: 'Noé vécut 350 ans après le déluge. '
  '29':
  - type: text
    content: Il vécut en tout 950 ans, puis il mourut.
  '3':
  - type: text
    content: 'Tout ce qui se déplace et qui vit vous servira de nourriture: je vous donne tout cela de la même manière que je vous ai donné l''herbe verte. '
  '4':
  - type: text
    content: 'Seulement, vous ne mangerez aucune viande avec sa vie, avec son sang. '
  '5':
  - type: text
    content: 'Sachez-le aussi, je redemanderai le sang de votre vie, je le redemanderai à tout animal. Et je redemanderai la vie de l''homme à l''homme, à l''homme qui est son frère. '
  '6':
  - type: text
    content: 'Si quelqu''un verse le sang de l''homme, son sang sera versé par l''homme, car Dieu a fait l''homme à son image. '
  '7':
  - type: text
    content: Quant à vous, reproduisez-vous et devenez nombreux, pullulez et multipliez-vous sur la terre.»
  '8':
  - type: text
    content: 'Dieu dit encore à Noé et à ses fils: '
  '9':
  - type: text
    content: '«J''établis mon alliance avec vous et avec votre descendance après vous, '
