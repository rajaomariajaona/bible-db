document_id: GEN.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Noé et ses fils
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Dieu bénit Noé et ses fils. Il leur dit: «Reproduisez-vous, devenez nombreux et remplissez la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Vous serez craints et redoutés de tout animal de la terre, de tout oiseau du ciel, de tout ce qui se déplace sur le sol et de tous les poissons de la mer: ils sont placés sous votre autorité. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tout ce qui se déplace et qui vit vous servira de nourriture: je vous donne tout cela de la même manière que je vous ai donné l''herbe verte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Seulement, vous ne mangerez aucune viande avec sa vie, avec son sang. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Sachez-le aussi, je redemanderai le sang de votre vie, je le redemanderai à tout animal. Et je redemanderai la vie de l''homme à l''homme, à l''homme qui est son frère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Si quelqu''un verse le sang de l''homme, son sang sera versé par l''homme, car Dieu a fait l''homme à son image. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Quant à vous, reproduisez-vous et devenez nombreux, pullulez et multipliez-vous sur la terre.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Dieu dit encore à Noé et à ses fils: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: '«J''établis mon alliance avec vous et avec votre descendance après vous, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'avec tous les êtres vivants qui sont avec vous, tant les oiseaux que le bétail et tous les animaux de la terre, avec tous ceux qui sont sortis de l''arche, avec tous les animaux de la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'J''établis mon alliance avec vous: aucune créature ne sera plus supprimée par l''eau du déluge et il n''y aura plus de déluge pour détruire la terre.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Dieu dit: «Voici le signe de l''alliance que j''établis entre moi et vous, ainsi que tous les êtres vivants qui sont avec vous, pour toutes les générations: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'j''ai placé mon arc parmi les nuages et il servira de signe de l''alliance conclue entre moi et la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Quand j''aurai rassemblé des nuages au-dessus de la terre, l''arc apparaîtra parmi les nuages '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'et je me souviendrai de mon alliance entre moi et vous ainsi que tous les êtres vivants de toute espèce: l''eau ne se transformera plus en déluge pour détruire toute créature. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'L''arc sera parmi les nuages et je le regarderai pour me souvenir de l''alliance éternelle entre Dieu et tous les êtres vivants de toute espèce qui se trouvent sur la terre.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Dieu dit à Noé: «Tel est le signe de l''alliance que j''établis entre moi et toute créature sur la terre.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Les fils de Noé qui sortirent de l''arche étaient Sem, Cham et Japhet. Cham fut le père de Canaan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Voilà quels sont les trois fils de Noé. Ce sont eux qui ont peuplé toute la terre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Noé commença à cultiver le sol et planta de la vigne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il but du vin et devint ivre, si bien qu''il se dénuda au milieu de sa tente. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Cham, le père de Canaan, vit la nudité de son père et en parla à ses deux frères qui se trouvaient à l''extérieur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Alors Sem et Japhet prirent un manteau, le mirent sur leurs épaules, marchèrent à reculons et couvrirent la nudité de leur père. Comme ils détournaient la tête, ils ne virent pas la nudité de leur père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Lorsqu''il eut fini de cuver son vin, Noé apprit ce que lui avait fait son fils cadet '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'et dit: «Maudit soit Canaan! Qu''il soit le dernier des esclaves pour ses frères!» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il dit encore: «Béni soit l''Eternel, le Dieu de Sem, et que Canaan soit son esclave! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: Que Dieu élargisse le territoire de Japhet, qu'il habite dans les tentes de Sem et que Canaan soit son esclave!»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Noé vécut 350 ans après le déluge. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Il vécut en tout 950 ans, puis il mourut.
