document_id: PSA.127,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le foyer que Dieu construit
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Chant des montées, de Salomon.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si une maison n'est pas construite par l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ceux qui la construisent travaillent inutilement;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si une ville n'est pas gardée par l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celui qui la garde veille inutilement.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est inutilement que vous vous levez tôt, que vous vous couchez tard
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et que vous mangez un pain gagné avec peine:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il en donne autant à ses bien-aimés pendant leur sommeil.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'héritage que l'Eternel donne, ce sont des fils;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les enfants sont une récompense.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les fils qu'un homme a dans sa jeunesse sont pareils
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'à des flèches dans la main d''un guerrier:'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: heureux l'homme qui en a rempli son carquois!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il n'aura pas honte quand il parlera
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec des ennemis à la porte de la ville.
