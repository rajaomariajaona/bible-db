document_id: PSA.127,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le foyer que Dieu construit
  - type: text
    content: Chant des montées, de Salomon.
  - type: text
    content: Si une maison n'est pas construite par l'Eternel,
  - type: text
    content: ceux qui la construisent travaillent inutilement;
  - type: text
    content: si une ville n'est pas gardée par l'Eternel,
  - type: text
    content: celui qui la garde veille inutilement.
  '2':
  - type: text
    content: C'est inutilement que vous vous levez tôt, que vous vous couchez tard
  - type: text
    content: 'et que vous mangez un pain gagné avec peine:'
  - type: text
    content: il en donne autant à ses bien-aimés pendant leur sommeil.
  '3':
  - type: text
    content: L'héritage que l'Eternel donne, ce sont des fils;
  - type: text
    content: les enfants sont une récompense.
  '4':
  - type: text
    content: Les fils qu'un homme a dans sa jeunesse sont pareils
  - type: text
    content: 'à des flèches dans la main d''un guerrier:'
  '5':
  - type: text
    content: heureux l'homme qui en a rempli son carquois!
  - type: text
    content: Il n'aura pas honte quand il parlera
  - type: text
    content: avec des ennemis à la porte de la ville.
