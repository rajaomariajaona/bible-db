document_id: 1SA.27
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: David chez les Philistins
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'David se dit: «Je serai un jour supprimé par Saül. Je n''ai rien de mieux à faire que de me réfugier au pays des Philistins afin que Saül renonce à me chercher encore dans tout le territoire d''Israël. Ainsi, je lui échapperai.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'David se leva avec ses 600 compagnons, et ils passèrent chez Akish, fils de Maoc, roi de Gath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'David et ses hommes restèrent à Gath vers Akish. Ils avaient chacun leur famille et David avait ses deux femmes, Achinoam de Jizreel et Abigaïl de Carmel, la femme de Nabal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Informé que David s'était enfui à Gath, Saül cessa de le chercher.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'David dit à Akish: «Si j''ai trouvé grâce à tes yeux, qu''on me donne dans l''une des villes du pays un endroit où je puisse habiter. Pourquoi ton serviteur habiterait-il avec toi dans la ville royale?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Ce jour-là, Akish lui donna Tsiklag. C''est pourquoi Tsiklag a appartenu aux rois de Juda jusqu''à aujourd''hui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: David resta dans le pays des Philistins durant un an et quatre mois.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'David et ses hommes montaient et faisaient des raids chez les Gueshuriens, les Guirziens et les Amalécites. Ces nations habitaient la région depuis l''Antiquité, du côté de Shur et jusqu''en Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'David dévasta cette région. Il ne laissait en vie ni homme ni femme et il enlevait les brebis, les bœufs, les ânes, les chameaux et les vêtements avant de retourner chez Akish. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Akish demandait: «Où avez-vous fait vos coups aujourd''hui?» David répondait: «Dans le sud de Juda, des Jerachmeélites et des Kéniens.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'David ne laissait ni homme ni femme en vie pour les amener à Gath. Il pensait en effet: «Ils pourraient parler contre nous et dire: ‘Voilà ce que David a fait.’» Ce fut sa manière d''agir durant tout le temps où il habita dans le pays des Philistins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Akish se fiait à David et se disait: «Il provoque le dégoût d''Israël, son peuple, et il sera pour toujours mon serviteur.»'
