document_id: MAL.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: L'amour de Dieu pour Israël
  - type: text
    content: Message, parole de l'Eternel adressée à Israël par l'intermédiaire de Malachie.
  '10':
  - type: text
    content: Lequel de vous fermera les portes
  - type: text
    content: pour que vous n'allumiez plus inutilement le feu sur mon autel?
  - type: text
    content: Je ne prends aucun plaisir en vous, dit l'Eternel, le maître de l'univers,
  - type: text
    content: et je n'accepte pas les offrandes de votre main.
  '11':
  - type: text
    content: En effet, du soleil levant au soleil couchant,
  - type: text
    content: mon nom est grand parmi les nations,
  - type: text
    content: et partout on fait brûler de l'encens en l'honneur de mon nom,
  - type: text
    content: on présente des offrandes pures.
  - type: text
    content: Oui, mon nom est grand parmi les nations,
  - type: text
    content: dit l'Eternel, le maître de l'univers,
  '12':
  - type: text
    content: mais vous, vous le déshonorez
  - type: text
    content: 'en déclarant: «La table de l''Eternel est souillée,'
  - type: text
    content: et ce qu'elle rapporte est une nourriture dérisoire.»
  '13':
  - type: text
    content: 'Vous dites: «Quel ennui!» et vous la dédaignez,'
  - type: text
    content: dit l'Eternel, le maître de l'univers.
  - type: text
    content: Cependant vous amenez des bêtes volées, boiteuses ou malades.
  - type: text
    content: Voilà les offrandes que vous faites!
  - type: text
    content: Puis-je les accepter de vos mains? dit l'Eternel.
  '14':
  - type: text
    content: Maudit soit le tricheur qui a dans son troupeau un mâle
  - type: text
    content: et qui offre et sacrifie au Seigneur une bête en mauvais état,
  - type: text
    content: car je suis un grand roi, dit l'Eternel, le maître de l'univers,
  - type: text
    content: et mon nom est craint parmi les nations.
  '2':
  - type: text
    content: Je vous ai aimés, dit l'Eternel,
  - type: text
    content: 'et vous dites: «En quoi nous as-tu aimés?»'
  - type: text
    content: Esaü n'est-il pas le frère de Jacob? déclare l'Eternel.
  - type: text
    content: Cependant *j'ai aimé Jacob
  '3':
  - type: text
    content: et j'ai détesté Esaü
  - type: note
    content: 'J''ai aimé… Esaü: cité en Romains 9.13.'
  - type: text
    content: ':'
  - type: text
    content: j'ai livré ses montagnes à la dévastation,
  - type: text
    content: son héritage aux chacals du désert.
  '4':
  - type: text
    content: 'Si Edom prétend: «Nous sommes détruits,'
  - type: text
    content: mais nous relèverons les ruines»,
  - type: text
    content: 'voici ce que dit l''Eternel, le maître de l''univers:'
  - type: text
    content: «Qu'ils construisent! Je démolirai
  - type: text
    content: et on les appellera ‘pays de la méchanceté’,
  - type: text
    content: ‘peuple contre lequel l'Eternel est irrité pour toujours’.»
  '5':
  - type: text
    content: Vos yeux le verront,
  - type: text
    content: 'et vous direz: «L''Eternel est grand,'
  - type: text
    content: même en dehors des frontières d'Israël!»
  - type: heading
    content: Le culte
  '6':
  - type: text
    content: Un fils honore son père, et un serviteur son maître.
  - type: text
    content: Si je suis père, où est l'honneur qui me revient?
  - type: text
    content: Si je suis maître, où est la crainte qui m'est due?
  - type: text
    content: dit l'Eternel, le maître de l'univers, à vous, les prêtres,
  - type: text
    content: qui méprisez mon nom
  - type: text
    content: 'et qui dites: «En quoi avons-nous méprisé ton nom?»'
  '7':
  - type: text
    content: Vous offrez sur mon autel des aliments impurs
  - type: text
    content: 'et vous dites: «En quoi t''avons-nous souillé?»'
  - type: text
    content: 'C''est en disant: «La table de l''Eternel est dérisoire.»'
  '8':
  - type: text
    content: Quand vous offrez en sacrifice une bête aveugle, n'est-ce pas mal?
  - type: text
    content: Quand vous offrez une bête boiteuse ou malade, n'est-ce pas mal?
  - type: text
    content: Offre-la donc à ton gouverneur!
  - type: text
    content: Te recevra-t-il bien, te fera-t-il bon accueil?
  - type: text
    content: dit l'Eternel, le maître de l'univers.
  '9':
  - type: text
    content: Et maintenant, priez Dieu pour qu'il ait pitié de nous!
  - type: text
    content: 'C''est de vous que cela vient:'
  - type: text
    content: vous recevra-t-il favorablement?
  - type: text
    content: dit l'Eternel, le maître de l'univers.
