document_id: MAL.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'amour de Dieu pour Israël
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Message, parole de l'Eternel adressée à Israël par l'intermédiaire de Malachie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je vous ai aimés, dit l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et vous dites: «En quoi nous as-tu aimés?»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Esaü n'est-il pas le frère de Jacob? déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cependant *j'ai aimé Jacob
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: et j'ai détesté Esaü
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2-3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'J''ai aimé… Esaü: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cité en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Romains 9.13
      metadata:
        usfm: ROM.9.13
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ':'
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ai livré ses montagnes à la dévastation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: son héritage aux chacals du désert.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Si Edom prétend: «Nous sommes détruits,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais nous relèverons les ruines»,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'voici ce que dit l''Eternel, le maître de l''univers:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Qu'ils construisent! Je démolirai
- type: usfm
  marker: q1
  children:
  - type: text
    text: et on les appellera ‘pays de la méchanceté’,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ‘peuple contre lequel l'Eternel est irrité pour toujours’.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Vos yeux le verront,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et vous direz: «L''Eternel est grand,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: même en dehors des frontières d'Israël!»
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le culte
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Un fils honore son père, et un serviteur son maître.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si je suis père, où est l'honneur qui me revient?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si je suis maître, où est la crainte qui m'est due?
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit l'Eternel, le maître de l'univers, à vous, les prêtres,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui méprisez mon nom
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et qui dites: «En quoi avons-nous méprisé ton nom?»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Vous offrez sur mon autel des aliments impurs
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et vous dites: «En quoi t''avons-nous souillé?»'
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'C''est en disant: «La table de l''Eternel est dérisoire.»'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Quand vous offrez en sacrifice une bête aveugle, n'est-ce pas mal?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quand vous offrez une bête boiteuse ou malade, n'est-ce pas mal?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Offre-la donc à ton gouverneur!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Te recevra-t-il bien, te fera-t-il bon accueil?
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit l'Eternel, le maître de l'univers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Et maintenant, priez Dieu pour qu'il ait pitié de nous!
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'C''est de vous que cela vient:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous recevra-t-il favorablement?
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit l'Eternel, le maître de l'univers.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Lequel de vous fermera les portes
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que vous n'allumiez plus inutilement le feu sur mon autel?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne prends aucun plaisir en vous, dit l'Eternel, le maître de l'univers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je n'accepte pas les offrandes de votre main.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: En effet, du soleil levant au soleil couchant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mon nom est grand parmi les nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et partout on fait brûler de l'encens en l'honneur de mon nom,
- type: usfm
  marker: q1
  children:
  - type: text
    text: on présente des offrandes pures.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Oui, mon nom est grand parmi les nations,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit l'Eternel, le maître de l'univers,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: mais vous, vous le déshonorez
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'en déclarant: «La table de l''Eternel est souillée,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ce qu'elle rapporte est une nourriture dérisoire.»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Vous dites: «Quel ennui!» et vous la dédaignez,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: dit l'Eternel, le maître de l'univers.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Cependant vous amenez des bêtes volées, boiteuses ou malades.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Voilà les offrandes que vous faites!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Puis-je les accepter de vos mains? dit l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Maudit soit le tricheur qui a dans son troupeau un mâle
- type: usfm
  marker: q1
  children:
  - type: text
    text: et qui offre et sacrifie au Seigneur une bête en mauvais état,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car je suis un grand roi, dit l'Eternel, le maître de l'univers,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mon nom est craint parmi les nations.
