document_id: PSA.95,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Invitation à l'adoration
  - type: text
    content: Venez, crions de joie en l'honneur de l'Eternel,
  - type: text
    content: poussons des cris de joie en l'honneur du rocher de notre salut!
  '10':
  - type: text
    content: Pendant 40 ans j'ai eu cette génération en dégoût
  - type: text
    content: 'et j''ai dit: «C''est un peuple dont le cœur s''égare, ils ne connaissent pas mes voies.»'
  '11':
  - type: text
    content: 'Aussi, j''ai juré dans ma colère:'
  - type: text
    content: «Ils n'entreront pas dans mon repos!»
  - type: note
    content: 'Aujourd''hui… mon repos: cité en Hébreux 3.7-11, avec reprise partielle en Hébreux 3.15; 4.3, 5, 7.'
  '2':
  - type: text
    content: Allons au-devant de lui avec des louanges,
  - type: text
    content: faisons retentir des chants en son honneur,
  '3':
  - type: text
    content: car l'Eternel est un grand Dieu,
  - type: text
    content: il est un grand roi au-dessus de tous les dieux.
  '4':
  - type: text
    content: Il tient dans sa main les profondeurs de la terre,
  - type: text
    content: et les sommets des montagnes sont à lui.
  '5':
  - type: text
    content: 'La mer est à lui: c''est lui qui l''a faite;'
  - type: text
    content: 'la terre aussi: ses mains l''ont formée.'
  '6':
  - type: text
    content: Venez, prosternons-nous et humilions-nous,
  - type: text
    content: plions le genou devant l'Eternel, notre créateur,
  '7':
  - type: text
    content: car il est notre Dieu
  - type: text
    content: et nous sommes le peuple dont il est le berger,
  - type: text
    content: le troupeau que sa main conduit.
  - type: text
    content: '*Aujourd''hui, si vous entendez sa voix,'
  '8':
  - type: text
    content: n'endurcissez pas votre cœur comme à Meriba,
  - type: text
    content: 'comme lors de la journée de Massa, dans le désert:'
  '9':
  - type: text
    content: là vos ancêtres m'ont provoqué,
  - type: text
    content: ils m'ont mis à l'épreuve, bien qu'ils m'aient vu agir.
