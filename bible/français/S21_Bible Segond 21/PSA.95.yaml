document_id: PSA.95,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Invitation à l'adoration
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Venez, crions de joie en l'honneur de l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: poussons des cris de joie en l'honneur du rocher de notre salut!
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Pendant 40 ans j'ai eu cette génération en dégoût
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et j''ai dit: «C''est un peuple dont le cœur s''égare, ils ne connaissent pas mes voies.»'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Aussi, j''ai juré dans ma colère:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: «Ils n'entreront pas dans mon repos!»
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '95.7-11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Aujourd''hui… mon repos: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hébreux 3.7-11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', avec reprise partielle en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Hébreux 3.15
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '4.3'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '5'
      - type: text
        text: ', '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: '7'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Allons au-devant de lui avec des louanges,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: faisons retentir des chants en son honneur,
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: car l'Eternel est un grand Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est un grand roi au-dessus de tous les dieux.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: Il tient dans sa main les profondeurs de la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les sommets des montagnes sont à lui.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'La mer est à lui: c''est lui qui l''a faite;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'la terre aussi: ses mains l''ont formée.'
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Venez, prosternons-nous et humilions-nous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: plions le genou devant l'Eternel, notre créateur,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: car il est notre Dieu
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et nous sommes le peuple dont il est le berger,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le troupeau que sa main conduit.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '*Aujourd''hui, si vous entendez sa voix,'
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: n'endurcissez pas votre cœur comme à Meriba,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'comme lors de la journée de Massa, dans le désert:'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: là vos ancêtres m'ont provoqué,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils m'ont mis à l'épreuve, bien qu'ils m'aient vu agir.
