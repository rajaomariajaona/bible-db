document_id: PRO.14
type_code: fra
segments:
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: La femme sage construit sa maison,
- type: usfm
  marker: q1
  children:
  - type: text
    text: la folle la démolit de ses propres mains.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Celui qui marche dans la droiture craint l'Eternel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui emprunte des voies tortueuses le méprise.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: La bouche du fou émet des paroles orgueilleuses,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que les lèvres des sages les en préservent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: S'il n'y a pas de bétail, la mangeoire est propre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais c'est à la vigueur des bœufs qu'on doit l'abondance des récoltes.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Un témoin fidèle ne ment pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis qu'un faux témoin dit des mensonges.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Le moqueur cherche la sagesse et ne la trouve pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais pour l'homme intelligent la connaissance est chose facile.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Eloigne-toi de l''homme stupide:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce n'est pas sur ses lèvres que tu aperçois la connaissance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: La sagesse de l'homme avisé, c'est de discerner sa voie;
- type: usfm
  marker: q1
  children:
  - type: text
    text: la folie des hommes stupides, c'est la tromperie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Les fous se moquent du péché,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais parmi les hommes droits se trouve la bienveillance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Le cœur connaît ses propres chagrins
- type: usfm
  marker: q1
  children:
  - type: text
    text: et un étranger est incapable de s'associer vraiment à sa joie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: La maison des méchants sera détruite,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que la tente des hommes droits sera florissante.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: La voie qui paraît droite à un homme
- type: usfm
  marker: q1
  children:
  - type: text
    text: peut finalement conduire à la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Au milieu même du rire le cœur peut être dans la peine,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la joie peut finir en tristesse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Celui dont le cœur s'égare se rassasie de ses voies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'homme de bien se rassasie de ce qui est en lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Celui qui manque d'expérience croit tout ce qu'on dit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais l'homme avisé est attentif à ses pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Le sage craint le mal et s'en détourne,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que l'homme stupide se montre arrogant et plein d'assurance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Le colérique fait des bêtises
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le conspirateur s'attire la haine.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Ceux qui manquent d'expérience ont la folie en héritage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais les hommes prudents se font une couronne de la connaissance.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Les mauvais doivent s'incliner devant les bons,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les méchants aux portes du juste.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Le pauvre est détesté même par son prochain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que les amis du riche sont nombreux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Celui qui méprise son prochain commet un péché,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais celui qui a pitié des plus humbles connaît le bonheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Ceux qui méditent le mal ne s'égarent-ils pas? La bonté et la vérité sont la part de ceux qui
- type: usfm
  marker: q1
  children:
  - type: text
    text: méditent le bien.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tout travail procure un profit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais les paroles en l'air ne mènent qu'à la misère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: La richesse est une couronne pour les sages;
- type: usfm
  marker: q1
  children:
  - type: text
    text: la folie des hommes stupides est toujours de la folie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Le témoin qui dit la vérité peut sauver des vies,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais le trompeur ne peut que dire des mensonges.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Celui qui craint l'Eternel possède un puissant appui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses enfants ont un refuge auprès de lui.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: La crainte de l'Eternel est une source de vie
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour détourner des pièges de la mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Quand le peuple est nombreux, c'est un honneur pour le roi;
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand la population manque, c'est la ruine du prince.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Celui qui est lent à la colère fait preuve d'une grande intelligence,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que celui qui s'énerve facilement proclame sa folie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Un cœur paisible est la vie du corps,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que l'envie est la carie des os.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Exploiter le faible, c'est insulter son créateur,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais faire grâce au pauvre, c'est l'honorer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Le méchant est renversé par sa méchanceté
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.32 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Par sa méchanceté: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ou par son malheur ou par le mal qu'il a commis.
    marker-yv: yv-n
  - type: text
    text: ','
- type: usfm
  marker: q1
  children:
  - type: text
    text: tandis que le juste trouve un refuge même dans sa mort.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Dans un cœur intelligent, la sagesse repose tranquillement,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais au milieu d'hommes stupides elle se fait remarquer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: La justice fait la grandeur d'une nation,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais le péché est le déshonneur des peuples.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: La faveur du roi est pour le serviteur avisé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et sa colère pour celui qui fait honte.
