document_id: PRO.14,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La femme sage construit sa maison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la folle la démolit de ses propres mains.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le cœur connaît ses propres chagrins
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et un étranger est incapable de s'associer vraiment à sa joie.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La maison des méchants sera détruite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que la tente des hommes droits sera florissante.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La voie qui paraît droite à un homme
  - type: usfm
    marker: q1
    children:
    - type: text
      text: peut finalement conduire à la mort.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Au milieu même du rire le cœur peut être dans la peine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la joie peut finir en tristesse.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui dont le cœur s'égare se rassasie de ses voies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'homme de bien se rassasie de ce qui est en lui.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui manque d'expérience croit tout ce qu'on dit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais l'homme avisé est attentif à ses pas.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le sage craint le mal et s'en détourne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que l'homme stupide se montre arrogant et plein d'assurance.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le colérique fait des bêtises
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le conspirateur s'attire la haine.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui manquent d'expérience ont la folie en héritage,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais les hommes prudents se font une couronne de la connaissance.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les mauvais doivent s'incliner devant les bons,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et les méchants aux portes du juste.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui marche dans la droiture craint l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais celui qui emprunte des voies tortueuses le méprise.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le pauvre est détesté même par son prochain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que les amis du riche sont nombreux.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui méprise son prochain commet un péché,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais celui qui a pitié des plus humbles connaît le bonheur.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ceux qui méditent le mal ne s'égarent-ils pas? La bonté et la vérité sont la part de ceux qui
  - type: usfm
    marker: q1
    children:
    - type: text
      text: méditent le bien.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Tout travail procure un profit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais les paroles en l'air ne mènent qu'à la misère.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La richesse est une couronne pour les sages;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la folie des hommes stupides est toujours de la folie.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le témoin qui dit la vérité peut sauver des vies,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le trompeur ne peut que dire des mensonges.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui craint l'Eternel possède un puissant appui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses enfants ont un refuge auprès de lui.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La crainte de l'Eternel est une source de vie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour détourner des pièges de la mort.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand le peuple est nombreux, c'est un honneur pour le roi;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand la population manque, c'est la ruine du prince.
  '29':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Celui qui est lent à la colère fait preuve d'une grande intelligence,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que celui qui s'énerve facilement proclame sa folie.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La bouche du fou émet des paroles orgueilleuses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que les lèvres des sages les en préservent.
  '30':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un cœur paisible est la vie du corps,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que l'envie est la carie des os.
  '31':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Exploiter le faible, c'est insulter son créateur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais faire grâce au pauvre, c'est l'honorer.
  '32':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le méchant est renversé par sa méchanceté
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.32 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Par sa méchanceté: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ou par son malheur ou par le mal qu'il a commis.
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que le juste trouve un refuge même dans sa mort.
  '33':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dans un cœur intelligent, la sagesse repose tranquillement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais au milieu d'hommes stupides elle se fait remarquer.
  '34':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La justice fait la grandeur d'une nation,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais le péché est le déshonneur des peuples.
  '35':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La faveur du roi est pour le serviteur avisé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sa colère pour celui qui fait honte.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: S'il n'y a pas de bétail, la mangeoire est propre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais c'est à la vigueur des bœufs qu'on doit l'abondance des récoltes.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Un témoin fidèle ne ment pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis qu'un faux témoin dit des mensonges.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le moqueur cherche la sagesse et ne la trouve pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais pour l'homme intelligent la connaissance est chose facile.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Eloigne-toi de l''homme stupide:'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce n'est pas sur ses lèvres que tu aperçois la connaissance.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La sagesse de l'homme avisé, c'est de discerner sa voie;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la folie des hommes stupides, c'est la tromperie.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les fous se moquent du péché,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais parmi les hommes droits se trouve la bienveillance.
