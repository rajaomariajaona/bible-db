document_id: PRO.14,152
type_code: fra
verses:
  '1':
  - type: text
    content: La femme sage construit sa maison,
  - type: text
    content: la folle la démolit de ses propres mains.
  '10':
  - type: text
    content: Le cœur connaît ses propres chagrins
  - type: text
    content: et un étranger est incapable de s'associer vraiment à sa joie.
  '11':
  - type: text
    content: La maison des méchants sera détruite,
  - type: text
    content: tandis que la tente des hommes droits sera florissante.
  '12':
  - type: text
    content: La voie qui paraît droite à un homme
  - type: text
    content: peut finalement conduire à la mort.
  '13':
  - type: text
    content: Au milieu même du rire le cœur peut être dans la peine,
  - type: text
    content: et la joie peut finir en tristesse.
  '14':
  - type: text
    content: Celui dont le cœur s'égare se rassasie de ses voies,
  - type: text
    content: et l'homme de bien se rassasie de ce qui est en lui.
  '15':
  - type: text
    content: Celui qui manque d'expérience croit tout ce qu'on dit,
  - type: text
    content: mais l'homme avisé est attentif à ses pas.
  '16':
  - type: text
    content: Le sage craint le mal et s'en détourne,
  - type: text
    content: tandis que l'homme stupide se montre arrogant et plein d'assurance.
  '17':
  - type: text
    content: Le colérique fait des bêtises
  - type: text
    content: et le conspirateur s'attire la haine.
  '18':
  - type: text
    content: Ceux qui manquent d'expérience ont la folie en héritage,
  - type: text
    content: mais les hommes prudents se font une couronne de la connaissance.
  '19':
  - type: text
    content: Les mauvais doivent s'incliner devant les bons,
  - type: text
    content: et les méchants aux portes du juste.
  '2':
  - type: text
    content: Celui qui marche dans la droiture craint l'Eternel,
  - type: text
    content: mais celui qui emprunte des voies tortueuses le méprise.
  '20':
  - type: text
    content: Le pauvre est détesté même par son prochain,
  - type: text
    content: tandis que les amis du riche sont nombreux.
  '21':
  - type: text
    content: Celui qui méprise son prochain commet un péché,
  - type: text
    content: mais celui qui a pitié des plus humbles connaît le bonheur.
  '22':
  - type: text
    content: Ceux qui méditent le mal ne s'égarent-ils pas? La bonté et la vérité sont la part de ceux qui
  - type: text
    content: méditent le bien.
  '23':
  - type: text
    content: Tout travail procure un profit,
  - type: text
    content: mais les paroles en l'air ne mènent qu'à la misère.
  '24':
  - type: text
    content: La richesse est une couronne pour les sages;
  - type: text
    content: la folie des hommes stupides est toujours de la folie.
  '25':
  - type: text
    content: Le témoin qui dit la vérité peut sauver des vies,
  - type: text
    content: mais le trompeur ne peut que dire des mensonges.
  '26':
  - type: text
    content: Celui qui craint l'Eternel possède un puissant appui,
  - type: text
    content: et ses enfants ont un refuge auprès de lui.
  '27':
  - type: text
    content: La crainte de l'Eternel est une source de vie
  - type: text
    content: pour détourner des pièges de la mort.
  '28':
  - type: text
    content: Quand le peuple est nombreux, c'est un honneur pour le roi;
  - type: text
    content: quand la population manque, c'est la ruine du prince.
  '29':
  - type: text
    content: Celui qui est lent à la colère fait preuve d'une grande intelligence,
  - type: text
    content: tandis que celui qui s'énerve facilement proclame sa folie.
  '3':
  - type: text
    content: La bouche du fou émet des paroles orgueilleuses,
  - type: text
    content: tandis que les lèvres des sages les en préservent.
  '30':
  - type: text
    content: Un cœur paisible est la vie du corps,
  - type: text
    content: tandis que l'envie est la carie des os.
  '31':
  - type: text
    content: Exploiter le faible, c'est insulter son créateur,
  - type: text
    content: mais faire grâce au pauvre, c'est l'honorer.
  '32':
  - type: text
    content: Le méchant est renversé par sa méchanceté
  - type: note
    content: 'Par sa méchanceté: ou par son malheur ou par le mal qu''il a commis.'
  - type: text
    content: ','
  - type: text
    content: tandis que le juste trouve un refuge même dans sa mort.
  '33':
  - type: text
    content: Dans un cœur intelligent, la sagesse repose tranquillement,
  - type: text
    content: mais au milieu d'hommes stupides elle se fait remarquer.
  '34':
  - type: text
    content: La justice fait la grandeur d'une nation,
  - type: text
    content: mais le péché est le déshonneur des peuples.
  '35':
  - type: text
    content: La faveur du roi est pour le serviteur avisé,
  - type: text
    content: et sa colère pour celui qui fait honte.
  '4':
  - type: text
    content: S'il n'y a pas de bétail, la mangeoire est propre,
  - type: text
    content: mais c'est à la vigueur des bœufs qu'on doit l'abondance des récoltes.
  '5':
  - type: text
    content: Un témoin fidèle ne ment pas,
  - type: text
    content: tandis qu'un faux témoin dit des mensonges.
  '6':
  - type: text
    content: Le moqueur cherche la sagesse et ne la trouve pas,
  - type: text
    content: mais pour l'homme intelligent la connaissance est chose facile.
  '7':
  - type: text
    content: 'Eloigne-toi de l''homme stupide:'
  - type: text
    content: ce n'est pas sur ses lèvres que tu aperçois la connaissance.
  '8':
  - type: text
    content: La sagesse de l'homme avisé, c'est de discerner sa voie;
  - type: text
    content: la folie des hommes stupides, c'est la tromperie.
  '9':
  - type: text
    content: Les fous se moquent du péché,
  - type: text
    content: mais parmi les hommes droits se trouve la bienveillance.
