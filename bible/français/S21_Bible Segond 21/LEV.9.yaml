document_id: LEV.9,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Premiers sacrifices offerts par Aaron et ses fils
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Le huitième jour, Moïse appela Aaron et ses fils, ainsi que les anciens d''Israël. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Il brûla sur l''autel la graisse, les rognons et le grand lobe du foie de la victime expiatoire, comme l''Eternel l''avait ordonné à Moïse. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: Mais il brûla dans un feu à l'extérieur du camp la viande et la peau.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Aaron égorgea l''holocauste. Ses fils lui présentèrent le sang et il le versa sur le pourtour de l''autel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Ils lui présentèrent l''holocauste coupé par morceaux avec la tête et il les brûla sur l''autel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: Il lava les entrailles et les pattes et les brûla sur l'autel, par-dessus l'holocauste.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Ensuite, Aaron offrit le sacrifice du peuple. Il prit le bouc pour le sacrifice expiatoire du peuple, l''égorgea et l''offrit en expiation, comme la première victime. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Il offrit l''holocauste en le sacrifiant conformément à la règle. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Il présenta l''offrande, en prit une poignée et la brûla sur l''autel, en plus de l''holocauste du matin. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Il égorgea le bœuf et le bélier en sacrifice de communion pour le peuple. Ses fils lui présentèrent le sang et il le versa sur le pourtour de l''autel. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Ils lui présentèrent la graisse du bœuf et du bélier, la queue, la graisse qui couvre les entrailles, les rognons et le grand lobe du foie; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Il dit à Aaron: «Prends un jeune veau pour le sacrifice d''expiation et un bélier pour l''holocauste, tous deux sans défaut, et sacrifie-les devant l''Eternel. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'ils mirent les graisses sur les poitrines et il brûla les graisses sur l''autel. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: Aaron fit devant l'Eternel le geste de présentation avec les poitrines et la cuisse droite, comme Moïse l'avait ordonné.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: Aaron leva ses mains vers le peuple et le bénit. Puis il descendit, après avoir offert le sacrifice d'expiation, l'holocauste et le sacrifice de communion.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Moïse et Aaron entrèrent dans la tente de la rencontre. Lorsqu''ils en sortirent, ils bénirent le peuple et la gloire de l''Eternel apparut à tout le peuple. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: Un feu sortit de devant l'Eternel et brûla l'holocauste et les graisses sur l'autel. Tout le peuple le vit, et ils poussèrent des cris de joie et se jetèrent le visage contre terre.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: 'Tu transmettras ces instructions aux Israélites: ‘Prenez un bouc pour le sacrifice d''expiation, un veau et un agneau âgés d''un an et sans défaut pour l''holocauste, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: un bœuf et un bélier pour le sacrifice de communion, afin de les sacrifier devant l'Eternel, ainsi qu'une offrande pétrie à l'huile. En effet, aujourd'hui l'Eternel vous apparaîtra.’»
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Ils amenèrent devant la tente de la rencontre ce que Moïse avait ordonné, et toute l''assemblée s''approcha et se tint devant l''Eternel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Moïse dit: «Vous ferez ce que l''Eternel a ordonné et la gloire de l''Eternel vous apparaîtra.» '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Il dit à Aaron: «Approche-toi de l''autel. Offre ton sacrifice d''expiation et ton holocauste et fais l''expiation pour toi et pour le peuple; offre aussi le sacrifice du peuple et fais l''expiation pour lui, comme l''Eternel l''a ordonné.»'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Aaron s''approcha de l''autel et égorgea le veau pour son sacrifice d''expiation. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ses fils lui présentèrent le sang. Il trempa son doigt dans le sang, en mit sur les cornes de l''autel et versa le sang au pied de l''autel. '
