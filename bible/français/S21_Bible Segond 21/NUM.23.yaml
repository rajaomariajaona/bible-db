document_id: NUM.23
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Oracles de Balaam
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Balaam dit à Balak: «Construis-moi ici 7 autels et prépare-moi ici 7 taureaux et 7 béliers.» '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Balak fit ce que Balaam avait dit, et Balak et Balaam offrirent un taureau et un bélier sur chaque autel. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Balaam dit à Balak: «Tiens-toi près de ton holocauste, tandis que je m''éloignerai. Peut-être que l''Eternel viendra à ma rencontre. Je te dirai alors ce qu''il me révélera.» Et il se rendit sur une hauteur. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Dieu vint à la rencontre de Balaam et Balaam lui dit: «J''ai dressé 7 autels et j''ai offert un taureau et un bélier sur chaque autel.» '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'L''Eternel mit des paroles dans la bouche de Balaam et lui dit: «Retourne vers Balak et transmets-lui ce message.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Balaam retourna vers Balak; celui-ci se tenait près de son holocauste avec tous les chefs de Moab.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Balaam prononça son oracle: «Balak m''a fait descendre d''Aram, le roi de Moab m''a fait descendre des montagnes de l''Orient. ‘Viens, maudis Jacob pour moi! Viens, irrite-toi contre Israël!’ '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Comment pourrais-je maudire celui que Dieu n''a pas maudit? Comment pourrais-je être irrité quand l''Eternel n''est pas irrité? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Je le vois du sommet des rochers, je le contemple du haut des collines: c''est un peuple qui habite à part et qui ne fait pas partie des nations. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Qui peut compter la poussière de Jacob
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Compter la poussière de Jacob: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'c''est-à-dire compter les descendants de Jacob, aussi nombreux que la poussière (voir '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Genèse 13.16
      metadata:
        usfm: GEN.13.16
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: '28.14'
      metadata:
        usfm: GEN.28.14
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' et dire à quel nombre correspond le quart d''Israël? Que je meure de la mort des justes et que ma fin soit semblable à la leur!»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Balak dit à Balaam: «Que m''as-tu fait? Je t''ai engagé pour maudire mon ennemi et voici que tu le bénis!» '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il répondit: «Ne veillerai-je pas à dire ce que l''Eternel met dans ma bouche?» '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Balak lui dit: «Viens donc avec moi à un autre endroit d''où tu le verras. Tu n''en verras qu''une partie, tu ne le verras pas dans son entier. Et de là maudis-le pour moi.» '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Balak conduisit Balaam au champ de Tsophim, sur le sommet du Pisga. Il construisit 7 autels et offrit un taureau et un bélier sur chaque autel. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Balaam dit à Balak: «Tiens-toi ici, près de ton holocauste, tandis que j''irai à la rencontre de Dieu.» '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'L''Eternel vint à la rencontre de Balaam. Il mit des paroles dans sa bouche et lui dit: «Retourne vers Balak et transmets ce message.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Balaam retourna vers Balak; celui-ci se tenait près de son holocauste avec les chefs de Moab. Balak lui demanda: «Qu''est-ce que l''Eternel a dit?»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Balaam prononça son oracle: «Lève-toi, Balak, écoute! Prête-moi l''oreille, fils de Tsippor! '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Dieu n'est pas un homme pour mentir, ni le fils d'un homme pour revenir sur sa décision. Ce qu'il a dit, ne le fera-t-il pas? Ce qu'il a déclaré, ne l'accomplira-t-il pas?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: '»Voici, j''ai reçu l''ordre de bénir: il a béni, je ne révoquerai pas sa décision. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il n''aperçoit pas de mal en Jacob, il ne voit pas d''injustice en Israël. L''Eternel, son Dieu, est avec lui; chez lui retentit l''acclamation réservée au roi. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Dieu les a fait sortir d'Egypte, il possède la force du buffle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: '»La magie ne peut rien contre Jacob, ni la divination contre Israël. Au moment fixé, on dit à Jacob et à Israël ce que Dieu a fait. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: C'est un peuple qui se lève comme une lionne et qui se dresse comme un lion. Il ne se couche pas tant qu'il n'a pas dévoré sa proie et bu le sang de ses victimes.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Balak dit à Balaam: «Si tu ne le maudis pas, au moins ne le bénis pas!» '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Balaam répondit à Balak: «Ne t''ai-je pas dit que je ferais tout ce que l''Eternel dirait?» '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Balak dit à Balaam: «Viens donc, je vais te conduire à un autre endroit. Peut-être Dieu trouvera-t-il bon que de là tu maudisses ce peuple pour moi.» '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Balak conduisit Balaam sur le sommet du Peor, d''où l''on domine le désert. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Balaam dit à Balak: «Construis-moi ici 7 autels et prépare-moi ici 7 taureaux et 7 béliers.» '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Balak fit ce que Balaam avait dit et offrit un taureau et un bélier sur chaque autel.
