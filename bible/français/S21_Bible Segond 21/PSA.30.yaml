document_id: PSA.30
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Louange après la délivrance
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Psaume, chant pour la dédicace de la maison. De David.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Je proclame ta grandeur, Eternel, car tu m'as relevé,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu n'as pas voulu que mes ennemis se réjouissent à mon sujet.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Eternel, mon Dieu, j'ai crié à toi, et tu m'as guéri.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Eternel, tu as fait remonter mon âme du séjour des morts,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu m'as fait revivre loin de ceux qui descendent dans la tombe.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Chantez en l'honneur de l'Eternel, vous qui l'aimez,
- type: usfm
  marker: q1
  children:
  - type: text
    text: célébrez par vos louanges sa sainteté,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: car sa colère dure un instant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'mais sa grâce toute la vie:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: le soir arrivent les pleurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le matin l'allégresse.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Je disais dans ma tranquillité:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Je ne serai jamais ébranlé!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Eternel, par ta grâce tu avais affermi ma montagne.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu t'es caché, et j'ai été épouvanté.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Eternel, j''ai crié à toi, j''ai imploré l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: «Que gagnes-tu à verser mon sang,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à me faire descendre dans la tombe?
- type: usfm
  marker: q1
  children:
  - type: text
    text: La poussière te célèbre-t-elle?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Raconte-t-elle ta fidélité?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Ecoute, Eternel, aie pitié de moi!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, secours-moi!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Et tu as changé mes lamentations en allégresse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tu m'as retiré mes habits de deuil pour me donner un habit de fête.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Ainsi mon cœur chante tes louanges et ne reste pas muet.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Eternel, mon Dieu, je te louerai toujours.
