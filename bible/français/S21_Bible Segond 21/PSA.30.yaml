document_id: PSA.30,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Louange après la délivrance
  - type: text
    content: Psaume, chant pour la dédicace de la maison. De David.
  '10':
  - type: text
    content: «Que gagnes-tu à verser mon sang,
  - type: text
    content: à me faire descendre dans la tombe?
  - type: text
    content: La poussière te célèbre-t-elle?
  - type: text
    content: Raconte-t-elle ta fidélité?
  '11':
  - type: text
    content: Ecoute, Eternel, aie pitié de moi!
  - type: text
    content: Eternel, secours-moi!»
  '12':
  - type: text
    content: Et tu as changé mes lamentations en allégresse,
  - type: text
    content: tu m'as retiré mes habits de deuil pour me donner un habit de fête.
  '13':
  - type: text
    content: Ainsi mon cœur chante tes louanges et ne reste pas muet.
  - type: text
    content: Eternel, mon Dieu, je te louerai toujours.
  '2':
  - type: text
    content: Je proclame ta grandeur, Eternel, car tu m'as relevé,
  - type: text
    content: tu n'as pas voulu que mes ennemis se réjouissent à mon sujet.
  '3':
  - type: text
    content: Eternel, mon Dieu, j'ai crié à toi, et tu m'as guéri.
  '4':
  - type: text
    content: Eternel, tu as fait remonter mon âme du séjour des morts,
  - type: text
    content: tu m'as fait revivre loin de ceux qui descendent dans la tombe.
  '5':
  - type: text
    content: Chantez en l'honneur de l'Eternel, vous qui l'aimez,
  - type: text
    content: célébrez par vos louanges sa sainteté,
  '6':
  - type: text
    content: car sa colère dure un instant,
  - type: text
    content: 'mais sa grâce toute la vie:'
  - type: text
    content: le soir arrivent les pleurs,
  - type: text
    content: et le matin l'allégresse.
  '7':
  - type: text
    content: 'Je disais dans ma tranquillité:'
  - type: text
    content: «Je ne serai jamais ébranlé!»
  '8':
  - type: text
    content: Eternel, par ta grâce tu avais affermi ma montagne.
  - type: text
    content: Tu t'es caché, et j'ai été épouvanté.
  '9':
  - type: text
    content: 'Eternel, j''ai crié à toi, j''ai imploré l''Eternel:'
