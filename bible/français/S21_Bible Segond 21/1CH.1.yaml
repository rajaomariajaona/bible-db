document_id: 1CH.1
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Listes généalogiques
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 1.1–9.44
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: D'Adam à Noé et ses descendants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Il y eut Adam, Seth, Enosh, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Kénan, Mahalaleel, Jéred, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Hénoc, Metushélah, Lémec, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Noé, Sem, Cham et Japhet.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Fils de Japhet: Gomer, Magog, Madaï, Javan, Tubal, Méshec et Tiras. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Fils de Gomer: Ashkenaz, Riphat et Togarma. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Fils de Javan: Elisha, Tarsis, Kittim et Dodanim.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Fils de Cham: Cush, Mitsraïm, Puth et Canaan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Fils de Cush: Saba, Havila, Sabta, Raema et Sabteca. Fils de Raema: Séba et Dedan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Cush eut pour fils Nimrod; c''est lui qui fut le premier homme puissant sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mitsraïm eut pour descendants les Ludim, les Ananim, les Lehabim, les Naphtuhim, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'les Patrusim, les Casluhim, dont sont issus les Philistins, et les Caphtorim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Canaan eut pour descendants Sidon, son fils aîné, et Heth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'ainsi que les Jébusiens, les Amoréens, les Guirgasiens, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'les Héviens, les Arkiens, les Siniens, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: les Arvadiens, les Tsemariens et les Hamathiens.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Fils de Sem: Elam, Assur, Arpacshad, Lud et Aram. [Fils d''Aram:] Uts, Hul, Guéter et Méshec. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Arpacshad eut pour fils Shélach, et Shélach eut Héber. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Héber eut deux fils. Le nom de l''un était Péleg, parce qu''à son époque la terre fut partagée, et celui de son frère était Jokthan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jokthan eut pour fils Almodad, Shéleph, Hatsarmaveth, Jérach, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Hadoram, Uzal, Dikla, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ebal, Abimaël, Séba, Ophir, Havila et Jobab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Tous ceux-là furent les fils de Jokthan.
- type: usfm
  marker: s1
  children:
  - type: text
    text: De Sem à Abraham et ses descendants
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il y eut Sem, Arpacshad, Shélach, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Héber, Péleg, Rehu, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Serug, Nachor, Térach '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: et Abram, c'est-à-dire Abraham.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Fils d''Abraham: Isaac et Ismaël.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Voici leur lignée: Nebajoth, le fils aîné d''Ismaël, Kédar, Adbeel, Mibsam, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Mishma, Duma, Massa, Hadad, Téma, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: Jethur, Naphish et Kedma. Ce sont là les fils d'Ismaël.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Fils de Ketura, la concubine d''Abraham: elle mit au monde Zimran, Jokshan, Medan, Madian, Jishbak et Shuach. Fils de Jokshan: Séba et Dedan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Fils de Madian: Epha, Epher, Hénoc, Abida et Eldaa. Tous ceux-là sont les descendants de Ketura.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Abraham eut pour fils Isaac. Fils d''Isaac: Esaü et Israël.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Fils d''Esaü: Eliphaz, Reuel, Jeush, Jaelam et Koré. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Fils d''Eliphaz: Théman, Omar, Tsephi, Gaetham, Kenaz, et de Thimna, Amalek. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Fils de Reuel: Nahath, Zérach, Shamma et Mizza.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Fils de Séir: Lothan, Shobal, Tsibeon, Ana, Dishon, Etser et Dishan. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Fils de Lothan: Hori et Homam. Sœur de Lothan: Thimna. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Fils de Shobal: Alvan, Manahath, Ebal, Shephi et Onam. Fils de Tsibeon: Ajja et Ana. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Fils d''Ana: Dishon. Fils de Dishon: Hemdan, Eshban, Jithran et Keran. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: 'Fils d''Etser: Bilhan, Zaavan et Akan. Fils de Dishan: Uts et Aran.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Rois et chefs d'Edom
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: Voici les rois qui ont régné dans le pays d'Edom
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.43 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Edom: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: c'est-à-dire Esaü, le frère de l'ancêtre d'Israël, Jacob (verset 34).
    marker-yv: yv-n
  - type: text
    text: ' avant que les Israélites n''aient un roi. Il y eut Béla, fils de Beor; le nom de sa ville était Dinhaba. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Béla mourut et Jobab, fils de Zérach, de Botsra, devint roi à sa place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'Jobab mourut et Husham, du pays des Thémanites, devint roi à sa place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Husham mourut et Hadad, fils de Bedad, devint roi à sa place. C''est lui qui battit les Madianites dans la campagne de Moab. Le nom de sa ville était Avith. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Hadad mourut et Samla, de Masréka, devint roi à sa place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: 'Samla mourut et Saül, de Rehoboth-Nahar, devint roi à sa place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '49'
  - type: text
    text: 'Saül mourut et Baal-Hanan, fils d''Acbor, devint roi à sa place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: text
    text: 'Baal-Hanan mourut et Hadad devint roi à sa place. Le nom de sa ville était Pahi et sa femme s''appelait Mehéthabeel; elle était la fille de Mathred et la petite-fille de Mézahab. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '51'
  - type: text
    text: 'Hadad mourut. Les chefs d''Edom furent alors Thimna, Alva, Jetheth, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '52'
  - type: text
    text: 'Oholibama, Ela, Pinon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '53'
  - type: text
    text: 'Kenaz, Théman, Mibtsar, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '54'
  - type: text
    text: Magdiel et Iram. Voilà quels sont les chefs d'Edom.
