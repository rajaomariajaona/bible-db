document_id: 1CH.1,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Listes généalogiques
  - type: heading
    content: 1.1–9.44
  - type: heading
    content: D'Adam à Noé et ses descendants
  - type: text
    content: 'Il y eut Adam, Seth, Enosh, '
  '10':
  - type: text
    content: 'Cush eut pour fils Nimrod; c''est lui qui fut le premier homme puissant sur la terre. '
  '11':
  - type: text
    content: 'Mitsraïm eut pour descendants les Ludim, les Ananim, les Lehabim, les Naphtuhim, '
  '12':
  - type: text
    content: 'les Patrusim, les Casluhim, dont sont issus les Philistins, et les Caphtorim. '
  '13':
  - type: text
    content: 'Canaan eut pour descendants Sidon, son fils aîné, et Heth, '
  '14':
  - type: text
    content: 'ainsi que les Jébusiens, les Amoréens, les Guirgasiens, '
  '15':
  - type: text
    content: 'les Héviens, les Arkiens, les Siniens, '
  '16':
  - type: text
    content: les Arvadiens, les Tsemariens et les Hamathiens.
  '17':
  - type: text
    content: 'Fils de Sem: Elam, Assur, Arpacshad, Lud et Aram. [Fils d''Aram:] Uts, Hul, Guéter et Méshec. '
  '18':
  - type: text
    content: 'Arpacshad eut pour fils Shélach, et Shélach eut Héber. '
  '19':
  - type: text
    content: 'Héber eut deux fils. Le nom de l''un était Péleg, parce qu''à son époque la terre fut partagée, et celui de son frère était Jokthan. '
  '2':
  - type: text
    content: 'Kénan, Mahalaleel, Jéred, '
  '20':
  - type: text
    content: 'Jokthan eut pour fils Almodad, Shéleph, Hatsarmaveth, Jérach, '
  '21':
  - type: text
    content: 'Hadoram, Uzal, Dikla, '
  '22':
  - type: text
    content: 'Ebal, Abimaël, Séba, Ophir, Havila et Jobab. '
  '23':
  - type: text
    content: Tous ceux-là furent les fils de Jokthan.
  - type: heading
    content: De Sem à Abraham et ses descendants
  '24':
  - type: text
    content: 'Il y eut Sem, Arpacshad, Shélach, '
  '25':
  - type: text
    content: 'Héber, Péleg, Rehu, '
  '26':
  - type: text
    content: 'Serug, Nachor, Térach '
  '27':
  - type: text
    content: et Abram, c'est-à-dire Abraham.
  '28':
  - type: text
    content: 'Fils d''Abraham: Isaac et Ismaël.'
  '29':
  - type: text
    content: 'Voici leur lignée: Nebajoth, le fils aîné d''Ismaël, Kédar, Adbeel, Mibsam, '
  '3':
  - type: text
    content: 'Hénoc, Metushélah, Lémec, '
  '30':
  - type: text
    content: 'Mishma, Duma, Massa, Hadad, Téma, '
  '31':
  - type: text
    content: Jethur, Naphish et Kedma. Ce sont là les fils d'Ismaël.
  '32':
  - type: text
    content: 'Fils de Ketura, la concubine d''Abraham: elle mit au monde Zimran, Jokshan, Medan, Madian, Jishbak et Shuach. Fils de Jokshan: Séba et Dedan. '
  '33':
  - type: text
    content: 'Fils de Madian: Epha, Epher, Hénoc, Abida et Eldaa. Tous ceux-là sont les descendants de Ketura.'
  '34':
  - type: text
    content: 'Abraham eut pour fils Isaac. Fils d''Isaac: Esaü et Israël.'
  '35':
  - type: text
    content: 'Fils d''Esaü: Eliphaz, Reuel, Jeush, Jaelam et Koré. '
  '36':
  - type: text
    content: 'Fils d''Eliphaz: Théman, Omar, Tsephi, Gaetham, Kenaz, et de Thimna, Amalek. '
  '37':
  - type: text
    content: 'Fils de Reuel: Nahath, Zérach, Shamma et Mizza.'
  '38':
  - type: text
    content: 'Fils de Séir: Lothan, Shobal, Tsibeon, Ana, Dishon, Etser et Dishan. '
  '39':
  - type: text
    content: 'Fils de Lothan: Hori et Homam. Sœur de Lothan: Thimna. '
  '4':
  - type: text
    content: Noé, Sem, Cham et Japhet.
  '40':
  - type: text
    content: 'Fils de Shobal: Alvan, Manahath, Ebal, Shephi et Onam. Fils de Tsibeon: Ajja et Ana. '
  '41':
  - type: text
    content: 'Fils d''Ana: Dishon. Fils de Dishon: Hemdan, Eshban, Jithran et Keran. '
  '42':
  - type: text
    content: 'Fils d''Etser: Bilhan, Zaavan et Akan. Fils de Dishan: Uts et Aran.'
  - type: heading
    content: Rois et chefs d'Edom
  '43':
  - type: text
    content: Voici les rois qui ont régné dans le pays d'Edom
  - type: note
    content: 'Edom: c''est-à-dire Esaü, le frère de l''ancêtre d''Israël, Jacob (verset 34).'
  - type: text
    content: ' avant que les Israélites n''aient un roi. Il y eut Béla, fils de Beor; le nom de sa ville était Dinhaba. '
  '44':
  - type: text
    content: 'Béla mourut et Jobab, fils de Zérach, de Botsra, devint roi à sa place. '
  '45':
  - type: text
    content: 'Jobab mourut et Husham, du pays des Thémanites, devint roi à sa place. '
  '46':
  - type: text
    content: 'Husham mourut et Hadad, fils de Bedad, devint roi à sa place. C''est lui qui battit les Madianites dans la campagne de Moab. Le nom de sa ville était Avith. '
  '47':
  - type: text
    content: 'Hadad mourut et Samla, de Masréka, devint roi à sa place. '
  '48':
  - type: text
    content: 'Samla mourut et Saül, de Rehoboth-Nahar, devint roi à sa place. '
  '49':
  - type: text
    content: 'Saül mourut et Baal-Hanan, fils d''Acbor, devint roi à sa place. '
  '5':
  - type: text
    content: 'Fils de Japhet: Gomer, Magog, Madaï, Javan, Tubal, Méshec et Tiras. '
  '50':
  - type: text
    content: 'Baal-Hanan mourut et Hadad devint roi à sa place. Le nom de sa ville était Pahi et sa femme s''appelait Mehéthabeel; elle était la fille de Mathred et la petite-fille de Mézahab. '
  '51':
  - type: text
    content: 'Hadad mourut. Les chefs d''Edom furent alors Thimna, Alva, Jetheth, '
  '52':
  - type: text
    content: 'Oholibama, Ela, Pinon, '
  '53':
  - type: text
    content: 'Kenaz, Théman, Mibtsar, '
  '54':
  - type: text
    content: Magdiel et Iram. Voilà quels sont les chefs d'Edom.
  '6':
  - type: text
    content: 'Fils de Gomer: Ashkenaz, Riphat et Togarma. '
  '7':
  - type: text
    content: 'Fils de Javan: Elisha, Tarsis, Kittim et Dodanim.'
  '8':
  - type: text
    content: 'Fils de Cham: Cush, Mitsraïm, Puth et Canaan. '
  '9':
  - type: text
    content: 'Fils de Cush: Saba, Havila, Sabta, Raema et Sabteca. Fils de Raema: Séba et Dedan. '
