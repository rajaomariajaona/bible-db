document_id: GAL.6,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Mise en pratique de la vie nouvelle
  - type: text
    content: 'Frères et sœurs, si un homme vient à être surpris en faute, vous qui êtes spirituels, redressez-le dans un esprit de douceur. Veille sur toi-même, de peur que toi aussi, tu ne sois tenté. '
  '10':
  - type: text
    content: Ainsi donc, pendant que nous en avons l'occasion, pratiquons le bien envers tous et en particulier envers nos proches dans la foi.
  - type: heading
    content: Conclusion et salutations
  '11':
  - type: text
    content: Voyez avec quelles grosses lettres je vous ai écrit de ma propre main.
  '12':
  - type: text
    content: 'Tous ceux qui veulent se faire bien voir par les hommes vous obligent à vous faire circoncire uniquement afin de ne pas être eux-mêmes persécutés pour la croix de Christ. '
  '13':
  - type: text
    content: 'En effet, les circoncis eux-mêmes ne respectent pas la loi, mais ils veulent que vous soyez circoncis afin de pouvoir tirer fierté de votre corps. '
  '14':
  - type: text
    content: 'En ce qui me concerne, jamais je ne tirerai fierté d''autre chose que de la croix de notre Seigneur Jésus-Christ. Par elle le monde est crucifié pour moi, comme je le suis pour le monde. '
  '15':
  - type: text
    content: 'En effet, [en Jésus-Christ,] ce qui a de l''importance, ce n''est ni la circoncision ni l''incirconcision, mais c''est le fait d''être une nouvelle créature. '
  '16':
  - type: text
    content: Paix et grâce sur tous ceux qui suivront cette règle et sur l'Israël de Dieu!
  '17':
  - type: text
    content: Que personne désormais ne me fasse de peine, car je porte sur mon corps les marques du [Seigneur] Jésus.
  '18':
  - type: text
    content: Frères et sœurs, que la grâce de notre Seigneur Jésus-Christ soit avec votre esprit! Amen!
  '2':
  - type: text
    content: 'Portez les fardeaux les uns des autres et accomplissez ainsi la loi de Christ. '
  '3':
  - type: text
    content: 'Si quelqu''un pense être quelque chose alors qu''il n''est rien, il se trompe lui-même. '
  '4':
  - type: text
    content: 'Que chacun examine ses propres œuvres, et alors il aura de quoi être fier par rapport à lui seul, et non par comparaison avec un autre, '
  '5':
  - type: text
    content: car chacun portera sa propre responsabilité.
  '6':
  - type: text
    content: 'Que celui à qui l''on enseigne la parole donne une part de tous ses biens à celui qui l''enseigne. '
  '7':
  - type: text
    content: 'Ne vous y trompez pas: on ne se moque pas de Dieu. Ce qu''un homme aura semé, il le récoltera aussi. '
  '8':
  - type: text
    content: 'Celui qui sème pour satisfaire sa nature propre récoltera d''elle la ruine, mais celui qui sème pour l''Esprit récoltera de l''Esprit la vie éternelle. '
  '9':
  - type: text
    content: 'Ne négligeons pas de faire le bien, car nous moissonnerons au moment convenable, si nous ne nous relâchons pas. '
