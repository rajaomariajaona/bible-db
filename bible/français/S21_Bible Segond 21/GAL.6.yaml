document_id: GAL.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mise en pratique de la vie nouvelle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Frères et sœurs, si un homme vient à être surpris en faute, vous qui êtes spirituels, redressez-le dans un esprit de douceur. Veille sur toi-même, de peur que toi aussi, tu ne sois tenté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Portez les fardeaux les uns des autres et accomplissez ainsi la loi de Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Si quelqu''un pense être quelque chose alors qu''il n''est rien, il se trompe lui-même. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Que chacun examine ses propres œuvres, et alors il aura de quoi être fier par rapport à lui seul, et non par comparaison avec un autre, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: car chacun portera sa propre responsabilité.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Que celui à qui l''on enseigne la parole donne une part de tous ses biens à celui qui l''enseigne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ne vous y trompez pas: on ne se moque pas de Dieu. Ce qu''un homme aura semé, il le récoltera aussi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Celui qui sème pour satisfaire sa nature propre récoltera d''elle la ruine, mais celui qui sème pour l''Esprit récoltera de l''Esprit la vie éternelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ne négligeons pas de faire le bien, car nous moissonnerons au moment convenable, si nous ne nous relâchons pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Ainsi donc, pendant que nous en avons l'occasion, pratiquons le bien envers tous et en particulier envers nos proches dans la foi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Conclusion et salutations
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Voyez avec quelles grosses lettres je vous ai écrit de ma propre main.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Tous ceux qui veulent se faire bien voir par les hommes vous obligent à vous faire circoncire uniquement afin de ne pas être eux-mêmes persécutés pour la croix de Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'En effet, les circoncis eux-mêmes ne respectent pas la loi, mais ils veulent que vous soyez circoncis afin de pouvoir tirer fierté de votre corps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'En ce qui me concerne, jamais je ne tirerai fierté d''autre chose que de la croix de notre Seigneur Jésus-Christ. Par elle le monde est crucifié pour moi, comme je le suis pour le monde. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'En effet, [en Jésus-Christ,] ce qui a de l''importance, ce n''est ni la circoncision ni l''incirconcision, mais c''est le fait d''être une nouvelle créature. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Paix et grâce sur tous ceux qui suivront cette règle et sur l'Israël de Dieu!
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Que personne désormais ne me fasse de peine, car je porte sur mon corps les marques du [Seigneur] Jésus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Frères et sœurs, que la grâce de notre Seigneur Jésus-Christ soit avec votre esprit! Amen!
