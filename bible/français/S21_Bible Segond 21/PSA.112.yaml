document_id: PSA.112,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le bonheur du juste
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: Louez l'Eternel!
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Heureux l'homme qui craint l'Eternel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui trouve un grand plaisir à ses commandements.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Le méchant le voit et s'irrite,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il grince des dents et perd courage.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les désirs des méchants sont réduits à néant.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: Sa descendance sera puissante sur la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la génération des hommes droits sera bénie.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: Le bien-être et la richesse sont dans sa maison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sa justice subsiste toujours.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: La lumière se lève dans les ténèbres pour les hommes droits,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour celui qui fait preuve de grâce, de compassion et de justice.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: Il est bon que l'homme fasse grâce et qu'il prête,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'il règle ses affaires conformément au droit,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: car il ne sera jamais ébranlé;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on se souviendra toujours du juste.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: Il ne redoute pas les mauvaises nouvelles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: son cœur est ferme, plein de confiance dans l'Eternel.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Son cœur est affermi, il n'éprouve aucune crainte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: au point qu'il regarde ses adversaires en face.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: '*Il distribue ses bienfaits, il donne aux pauvres,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sa justice subsiste à toujours
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '112.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il distribue… toujours: '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cité en '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: 2 Corinthiens 9.9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il relève la tête avec gloire.
