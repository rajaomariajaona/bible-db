document_id: PSA.112,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le bonheur du juste
  - type: text
    content: Louez l'Eternel!
  - type: text
    content: Heureux l'homme qui craint l'Eternel,
  - type: text
    content: qui trouve un grand plaisir à ses commandements.
  '10':
  - type: text
    content: Le méchant le voit et s'irrite,
  - type: text
    content: il grince des dents et perd courage.
  - type: text
    content: Les désirs des méchants sont réduits à néant.
  '2':
  - type: text
    content: Sa descendance sera puissante sur la terre,
  - type: text
    content: la génération des hommes droits sera bénie.
  '3':
  - type: text
    content: Le bien-être et la richesse sont dans sa maison,
  - type: text
    content: et sa justice subsiste toujours.
  '4':
  - type: text
    content: La lumière se lève dans les ténèbres pour les hommes droits,
  - type: text
    content: pour celui qui fait preuve de grâce, de compassion et de justice.
  '5':
  - type: text
    content: Il est bon que l'homme fasse grâce et qu'il prête,
  - type: text
    content: qu'il règle ses affaires conformément au droit,
  '6':
  - type: text
    content: car il ne sera jamais ébranlé;
  - type: text
    content: on se souviendra toujours du juste.
  '7':
  - type: text
    content: Il ne redoute pas les mauvaises nouvelles,
  - type: text
    content: son cœur est ferme, plein de confiance dans l'Eternel.
  '8':
  - type: text
    content: Son cœur est affermi, il n'éprouve aucune crainte,
  - type: text
    content: au point qu'il regarde ses adversaires en face.
  '9':
  - type: text
    content: '*Il distribue ses bienfaits, il donne aux pauvres,'
  - type: text
    content: sa justice subsiste à toujours
  - type: note
    content: 'Il distribue… toujours: cité en 2 Corinthiens 9.9.'
  - type: text
    content: ','
  - type: text
    content: il relève la tête avec gloire.
