document_id: JOB.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Intervention n° 3 de Job
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Job prit la parole et dit:'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: «C'est vrai, je sais bien que telle est la situation.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Comment l'homme pourrait-il être juste devant Dieu?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Si l'homme voulait contester avec Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne pourrait même pas lui donner une seule réponse sur mille.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: C'est à lui qu'appartiennent la sagesse et la toute-puissance.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui lui a déjà résisté sans subir de dommage?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: »C'est lui qui déplace les montagnes à l'improviste,
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui les bouleverse dans sa colère.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Il fait trembler la terre sur elle-même,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses piliers sont ébranlés.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Il donne ses ordres au soleil, et le soleil ne paraît pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il verrouille le ciel autour des étoiles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Tout seul, il déploie le ciel,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il marche sur les hauteurs de la mer.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Il a fait la Grande Ourse, Orion et les Pléiades,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ainsi que les constellations du sud.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: C'est lui l'auteur de grandeurs qu'il est impossible d'explorer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: de merveilles si nombreuses qu'il est impossible de les compter.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: »S'il passe près de moi, je ne le vois pas;
- type: usfm
  marker: q1
  children:
  - type: text
    text: s'il disparaît, je ne m'en aperçois pas.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: S'il arrache, qui s'y opposera?
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'Qui lui dira: ‘Que fais-tu?’'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Dieu ne retire pas sa colère;
- type: usfm
  marker: q1
  children:
  - type: text
    text: devant lui les appuis de l'orgueilleux s'effondrent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: »Et moi, comment pourrais-je lui répondre?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quels mots pourrais-je choisir pour argumenter avec lui?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Même si je suis juste, je ne répondrai pas.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je ne peux qu'implorer la grâce de mon juge.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Même si je faisais appel à lui et qu'il me réponde,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je ne croirais pas qu'il m'a écouté,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: puisqu'il m'assaille par une tempête
- type: usfm
  marker: q1
  children:
  - type: text
    text: et multiplie sans raison mes blessures.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: Il ne me laisse pas reprendre mon souffle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tant il me rassasie d'amertume.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Si je veux recourir à la force, voici qu'il est tout-puissant!
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si c'est au droit, qui me fera comparaître?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Même si je suis juste, ma bouche me condamnera;
- type: usfm
  marker: q1
  children:
  - type: text
    text: même si je suis intègre, elle me déclarera coupable.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: »Suis-je intègre? Je ne le sais pas moi-même.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis dégoûté de mon existence.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Qu'importe après tout? En effet, j'ose le dire,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il extermine l'homme intègre aussi bien que le méchant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Si un fléau donne subitement la mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il se moque de la détresse des innocents.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'La terre est livrée entre les mains du méchant:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: il aveugle ses juges.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Si ce n'est pas lui, qui est-ce donc?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: »Plus rapides qu'un coureur, mes jours
- type: usfm
  marker: q1
  children:
  - type: text
    text: prennent la fuite sans avoir vu le bonheur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Ils filent comme des barques de jonc,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pareils à l'aigle qui fonce sur sa proie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Si je dis: ‘Je veux oublier ma plainte,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: laisser ma tristesse, reprendre courage’,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: je reste effrayé par toutes mes douleurs.
- type: usfm
  marker: q1
  children:
  - type: text
    text: »Je sais que tu ne me considéreras pas comme innocent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: C'est moi qui serai jugé coupable.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Pourquoi me fatiguer inutilement?
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Si je me lavais dans la neige,
- type: usfm
  marker: q1
  children:
  - type: text
    text: si je purifiais mes mains avec du savon,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: tu me plongerais dans la boue
- type: usfm
  marker: q1
  children:
  - type: text
    text: et mes habits m'auraient en horreur.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: »Dieu n'est pas un homme comme moi, pour que je lui réponde,
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour que nous allions ensemble en justice.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: Il n'y a pas entre nous de médiateur
- type: usfm
  marker: q1
  children:
  - type: text
    text: qui pose sa main sur nous deux.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Qu'il retire son bâton de dessus moi,
- type: usfm
  marker: q1
  children:
  - type: text
    text: que ses terreurs ne me tourmentent plus!
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Alors je parlerai sans avoir peur de lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais ce n'est pas le cas et je reste seul avec moi-même.
