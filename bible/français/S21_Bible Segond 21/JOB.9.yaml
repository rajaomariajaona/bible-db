document_id: JOB.9,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Intervention n° 3 de Job
  - type: text
    content: 'Job prit la parole et dit:'
  '10':
  - type: text
    content: C'est lui l'auteur de grandeurs qu'il est impossible d'explorer,
  - type: text
    content: de merveilles si nombreuses qu'il est impossible de les compter.
  '11':
  - type: text
    content: »S'il passe près de moi, je ne le vois pas;
  - type: text
    content: s'il disparaît, je ne m'en aperçois pas.
  '12':
  - type: text
    content: S'il arrache, qui s'y opposera?
  - type: text
    content: 'Qui lui dira: ‘Que fais-tu?’'
  '13':
  - type: text
    content: Dieu ne retire pas sa colère;
  - type: text
    content: devant lui les appuis de l'orgueilleux s'effondrent.
  '14':
  - type: text
    content: »Et moi, comment pourrais-je lui répondre?
  - type: text
    content: Quels mots pourrais-je choisir pour argumenter avec lui?
  '15':
  - type: text
    content: Même si je suis juste, je ne répondrai pas.
  - type: text
    content: Je ne peux qu'implorer la grâce de mon juge.
  '16':
  - type: text
    content: Même si je faisais appel à lui et qu'il me réponde,
  - type: text
    content: je ne croirais pas qu'il m'a écouté,
  '17':
  - type: text
    content: puisqu'il m'assaille par une tempête
  - type: text
    content: et multiplie sans raison mes blessures.
  '18':
  - type: text
    content: Il ne me laisse pas reprendre mon souffle,
  - type: text
    content: tant il me rassasie d'amertume.
  '19':
  - type: text
    content: Si je veux recourir à la force, voici qu'il est tout-puissant!
  - type: text
    content: Si c'est au droit, qui me fera comparaître?
  '2':
  - type: text
    content: «C'est vrai, je sais bien que telle est la situation.
  - type: text
    content: Comment l'homme pourrait-il être juste devant Dieu?
  '20':
  - type: text
    content: Même si je suis juste, ma bouche me condamnera;
  - type: text
    content: même si je suis intègre, elle me déclarera coupable.
  '21':
  - type: text
    content: »Suis-je intègre? Je ne le sais pas moi-même.
  - type: text
    content: Je suis dégoûté de mon existence.
  '22':
  - type: text
    content: Qu'importe après tout? En effet, j'ose le dire,
  - type: text
    content: il extermine l'homme intègre aussi bien que le méchant.
  '23':
  - type: text
    content: Si un fléau donne subitement la mort,
  - type: text
    content: il se moque de la détresse des innocents.
  '24':
  - type: text
    content: 'La terre est livrée entre les mains du méchant:'
  - type: text
    content: il aveugle ses juges.
  - type: text
    content: Si ce n'est pas lui, qui est-ce donc?
  '25':
  - type: text
    content: »Plus rapides qu'un coureur, mes jours
  - type: text
    content: prennent la fuite sans avoir vu le bonheur.
  '26':
  - type: text
    content: Ils filent comme des barques de jonc,
  - type: text
    content: pareils à l'aigle qui fonce sur sa proie.
  '27':
  - type: text
    content: 'Si je dis: ‘Je veux oublier ma plainte,'
  - type: text
    content: laisser ma tristesse, reprendre courage’,
  '28':
  - type: text
    content: je reste effrayé par toutes mes douleurs.
  - type: text
    content: »Je sais que tu ne me considéreras pas comme innocent.
  '29':
  - type: text
    content: C'est moi qui serai jugé coupable.
  - type: text
    content: Pourquoi me fatiguer inutilement?
  '3':
  - type: text
    content: Si l'homme voulait contester avec Dieu,
  - type: text
    content: il ne pourrait même pas lui donner une seule réponse sur mille.
  '30':
  - type: text
    content: Si je me lavais dans la neige,
  - type: text
    content: si je purifiais mes mains avec du savon,
  '31':
  - type: text
    content: tu me plongerais dans la boue
  - type: text
    content: et mes habits m'auraient en horreur.
  '32':
  - type: text
    content: »Dieu n'est pas un homme comme moi, pour que je lui réponde,
  - type: text
    content: pour que nous allions ensemble en justice.
  '33':
  - type: text
    content: Il n'y a pas entre nous de médiateur
  - type: text
    content: qui pose sa main sur nous deux.
  '34':
  - type: text
    content: Qu'il retire son bâton de dessus moi,
  - type: text
    content: que ses terreurs ne me tourmentent plus!
  '35':
  - type: text
    content: Alors je parlerai sans avoir peur de lui,
  - type: text
    content: mais ce n'est pas le cas et je reste seul avec moi-même.
  '4':
  - type: text
    content: C'est à lui qu'appartiennent la sagesse et la toute-puissance.
  - type: text
    content: Qui lui a déjà résisté sans subir de dommage?
  '5':
  - type: text
    content: »C'est lui qui déplace les montagnes à l'improviste,
  - type: text
    content: qui les bouleverse dans sa colère.
  '6':
  - type: text
    content: Il fait trembler la terre sur elle-même,
  - type: text
    content: et ses piliers sont ébranlés.
  '7':
  - type: text
    content: Il donne ses ordres au soleil, et le soleil ne paraît pas;
  - type: text
    content: il verrouille le ciel autour des étoiles.
  '8':
  - type: text
    content: Tout seul, il déploie le ciel,
  - type: text
    content: il marche sur les hauteurs de la mer.
  '9':
  - type: text
    content: Il a fait la Grande Ourse, Orion et les Pléiades,
  - type: text
    content: ainsi que les constellations du sud.
