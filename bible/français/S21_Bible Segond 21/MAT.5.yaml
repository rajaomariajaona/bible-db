document_id: MAT.5,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le sermon sur la montagne
  - type: heading
    content: 5.1–7.29
  - type: heading
    content: Les béatitudes
  - type: text
    content: 'A la vue de ces foules, Jésus monta sur la montagne. Il s''assit et ses disciples s''approchèrent de lui. '
  '10':
  - type: text
    content: 'Heureux ceux qui sont persécutés pour la justice, car le royaume des cieux leur appartient! '
  '11':
  - type: text
    content: 'Heureux serez-vous lorsqu''on vous insultera, qu''on vous persécutera et qu''on dira faussement de vous toute sorte de mal à cause de moi. '
  '12':
  - type: text
    content: Réjouissez-vous et soyez dans l'allégresse, parce que votre récompense sera grande au ciel. En effet, c'est ainsi qu'on a persécuté les prophètes qui vous ont précédés.
  '13':
  - type: text
    content: '»Vous êtes le sel de la terre. Mais si le sel perd sa saveur, avec quoi la lui rendra-t-on? Il ne sert plus qu''à être jeté dehors et piétiné par les hommes. '
  '14':
  - type: text
    content: 'Vous êtes la lumière du monde. Une ville située sur une montagne ne peut pas être cachée, '
  '15':
  - type: text
    content: 'et on n''allume pas non plus une lampe pour la mettre sous un seau, mais on la met sur son support et elle éclaire tous ceux qui sont dans la maison. '
  '16':
  - type: text
    content: Que, de la même manière, votre lumière brille devant les hommes afin qu'ils voient votre belle manière d'agir et qu'ainsi ils célèbrent la gloire de votre Père céleste.
  - type: heading
    content: Christ et la loi
  '17':
  - type: text
    content: '»Ne croyez pas que je sois venu pour abolir la loi ou les prophètes; je suis venu non pour abolir, mais pour accomplir. '
  '18':
  - type: text
    content: 'En effet, je vous le dis en vérité, tant que le ciel et la terre n''auront pas disparu, pas une seule lettre ni un seul trait de lettre ne disparaîtra de la loi avant que tout ne soit arrivé. '
  '19':
  - type: text
    content: 'Celui donc qui violera l''un de ces plus petits commandements et qui enseignera aux hommes à faire de même sera appelé le plus petit dans le royaume des cieux; mais celui qui les mettra en pratique et les enseignera aux autres, celui-là sera appelé grand dans le royaume des cieux. '
  '2':
  - type: text
    content: 'Puis il prit la parole pour les enseigner; il dit:'
  '20':
  - type: text
    content: En effet, je vous le dis, si votre justice ne dépasse pas celle des spécialistes de la loi et des pharisiens, vous n'entrerez pas dans le royaume des cieux.
  '21':
  - type: text
    content: '»Vous avez appris qu''il a été dit aux anciens: ‘'
  - type: text
    content: Tu ne commettras pas de meurtre
  - type: note
    content: 'Tu… meurtre: citation du 6e des dix commandements (Exode 20.13; Deutéronome 5.17).'
  - type: text
    content: '; celui qui commet un meurtre mérite de passer en jugement.’ '
  '22':
  - type: text
    content: 'Mais moi je vous dis: Tout homme qui se met [sans raison] en colère contre son frère mérite de passer en jugement; celui qui traite son frère d''imbécile'
  - type: note
    content: 'Traite son frère d''imbécile: littéralement dit à son frère: ‘Raca’.'
  - type: text
    content: ' mérite d''être puni par le tribunal, et celui qui le traite de fou mérite d''être puni par le feu de l''enfer. '
  '23':
  - type: text
    content: 'Si donc tu présentes ton offrande vers l''autel et que là tu te souviennes que ton frère a quelque chose contre toi, '
  '24':
  - type: text
    content: 'laisse ton offrande devant l''autel et va d''abord te réconcilier avec ton frère, puis viens présenter ton offrande. '
  '25':
  - type: text
    content: 'Mets-toi rapidement d''accord avec ton adversaire, pendant que tu es en chemin avec lui, de peur qu''il ne te livre au juge, que le juge ne te livre à l''officier de justice et que tu ne sois mis en prison. '
  '26':
  - type: text
    content: Je te le dis en vérité, tu n'en sortiras pas avant d'avoir remboursé jusqu'au dernier centime.
  '27':
  - type: text
    content: '»Vous avez appris qu''il a été dit: '
  - type: text
    content: Tu ne commettras pas d'adultère
  - type: text
    content: .
  - type: note
    content: 'Tu… adultère: citation du 7e des dix commandements (Exode 20.14; Deutéronome 5.18).'
  - type: text
    content: ' '
  '28':
  - type: text
    content: 'Mais moi je vous dis: Tout homme qui regarde une femme pour la convoiter a déjà commis un adultère avec elle dans son cœur. '
  '29':
  - type: text
    content: 'Si ton œil droit te pousse à mal agir, arrache-le et jette-le loin de toi, car il vaut mieux pour toi subir la perte d''un seul de tes membres que de voir ton corps entier jeté en enfer. '
  '3':
  - type: text
    content: '«Heureux ceux qui reconnaissent leur pauvreté spirituelle, car le royaume des cieux leur appartient! '
  '30':
  - type: text
    content: Et si ta main droite te pousse à mal agir, coupe-la et jette-la loin de toi, car il vaut mieux pour toi subir la perte d'un seul de tes membres que de voir ton corps entier jeté en enfer.
  '31':
  - type: text
    content: '»Il a été dit: '
  - type: text
    content: Que celui qui renvoie sa femme lui donne une lettre de divorce
  - type: text
    content: .
  - type: note
    content: 'Que celui… divorce: citation de Deutéronome 24.1.'
  - type: text
    content: ' '
  '32':
  - type: text
    content: 'Mais moi, je vous dis: Celui qui renvoie sa femme, sauf pour cause d''infidélité, l''expose à devenir adultère, et celui qui épouse une femme divorcée commet un adultère.'
  '33':
  - type: text
    content: '»Vous avez encore appris qu''il a été dit aux anciens: '
  - type: text
    content: Tu ne violeras pas ton serment, mais tu accompliras ce que tu as promis au Seigneur
  - type: text
    content: .
  - type: note
    content: 'Tu ne… Seigneur: citation de Nombres 30.3.'
  - type: text
    content: ' '
  '34':
  - type: text
    content: 'Mais moi je vous dis de ne pas jurer du tout, ni par '
  - type: text
    content: le ciel
  - type: text
    content: ', parce que c''est '
  - type: text
    content: le trône de Dieu
  - type: text
    content: ', '
  '35':
  - type: text
    content: 'ni par '
  - type: text
    content: la terre
  - type: text
    content: ', parce que c'''
  - type: text
    content: est son marchepied
  - type: text
    content: ','
  - type: note
    content: 'Le ciel… marchepied: renvoi à Esaïe 66.1.'
  - type: text
    content: ' ni par Jérusalem, parce que c''est la ville du grand roi. '
  '36':
  - type: text
    content: 'Ne jure pas non plus par ta tête, car tu ne peux pas rendre blanc ou noir un seul cheveu. '
  '37':
  - type: text
    content: Que votre parole soit ‘oui’ pour oui, ‘non’ pour non; ce qu'on y ajoute vient du mal
  - type: note
    content: 'Du mal: ou du mauvais, c''est-à-dire du diable.'
  - type: text
    content: .
  '38':
  - type: text
    content: '»Vous avez appris qu''il a été dit: '
  - type: text
    content: Œil pour œil et dent pour dent
  - type: text
    content: .
  - type: note
    content: 'Œil… dent: citation d''Exode 21.24 (principe répété en Lévitique 24.20; Deutéronome 19.21).'
  - type: text
    content: ' '
  '39':
  - type: text
    content: 'Mais moi je vous dis de ne pas résister au méchant. Si quelqu''un te gifle sur la joue droite, tends-lui aussi l''autre. '
  '4':
  - type: text
    content: 'Heureux ceux qui pleurent, car ils seront consolés! '
  '40':
  - type: text
    content: 'Si quelqu''un veut te faire un procès et prendre ta chemise, laisse-lui encore ton manteau. '
  '41':
  - type: text
    content: 'Si quelqu''un te force à faire un kilomètre, fais-en deux avec lui. '
  '42':
  - type: text
    content: Donne à celui qui t'adresse une demande et ne te détourne pas de celui qui veut te faire un emprunt.
  '43':
  - type: text
    content: '»Vous avez appris qu''il a été dit: ‘'
  - type: text
    content: Tu aimeras ton prochain
  - type: note
    content: 'Tu aimeras ton prochain: citation de Lévitique 19.18.'
  - type: text
    content: ' et tu détesteras ton ennemi.’ '
  '44':
  - type: text
    content: 'Mais moi je vous dis: Aimez vos ennemis, [bénissez ceux qui vous maudissent, faites du bien à ceux qui vous détestent] et priez pour ceux [qui vous maltraitent et] qui vous persécutent, '
  '45':
  - type: text
    content: 'afin d''être les fils de votre Père céleste. En effet, il fait lever son soleil sur les méchants et sur les bons, et il fait pleuvoir sur les justes et sur les injustes. '
  '46':
  - type: text
    content: 'Si vous aimez ceux qui vous aiment, quelle récompense méritez-vous? Les collecteurs d''impôts n''agissent-ils pas de même? '
  '47':
  - type: text
    content: 'Et si vous saluez seulement vos frères, que faites-vous d''extraordinaire? Les membres des autres peuples n''agissent-ils pas de même? '
  '48':
  - type: text
    content: Soyez donc parfaits comme votre Père céleste est parfait.
  '5':
  - type: text
    content: 'Heureux ceux qui sont doux, car ils hériteront la terre! '
  '6':
  - type: text
    content: 'Heureux ceux qui ont faim et soif de la justice, car ils seront rassasiés! '
  '7':
  - type: text
    content: 'Heureux ceux qui font preuve de bonté, car on aura de la bonté pour eux! '
  '8':
  - type: text
    content: 'Heureux ceux qui ont le cœur pur, car ils verront Dieu! '
  '9':
  - type: text
    content: 'Heureux ceux qui procurent la paix, car ils seront appelés fils de Dieu! '
