document_id: MAT.5
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Le sermon sur la montagne
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 5.1–7.29
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les béatitudes
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'A la vue de ces foules, Jésus monta sur la montagne. Il s''assit et ses disciples s''approchèrent de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Puis il prit la parole pour les enseigner; il dit:'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '«Heureux ceux qui reconnaissent leur pauvreté spirituelle, car le royaume des cieux leur appartient! '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Heureux ceux qui pleurent, car ils seront consolés! '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Heureux ceux qui sont doux, car ils hériteront la terre! '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Heureux ceux qui ont faim et soif de la justice, car ils seront rassasiés! '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Heureux ceux qui font preuve de bonté, car on aura de la bonté pour eux! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Heureux ceux qui ont le cœur pur, car ils verront Dieu! '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Heureux ceux qui procurent la paix, car ils seront appelés fils de Dieu! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Heureux ceux qui sont persécutés pour la justice, car le royaume des cieux leur appartient! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Heureux serez-vous lorsqu''on vous insultera, qu''on vous persécutera et qu''on dira faussement de vous toute sorte de mal à cause de moi. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Réjouissez-vous et soyez dans l'allégresse, parce que votre récompense sera grande au ciel. En effet, c'est ainsi qu'on a persécuté les prophètes qui vous ont précédés.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: '»Vous êtes le sel de la terre. Mais si le sel perd sa saveur, avec quoi la lui rendra-t-on? Il ne sert plus qu''à être jeté dehors et piétiné par les hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Vous êtes la lumière du monde. Une ville située sur une montagne ne peut pas être cachée, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'et on n''allume pas non plus une lampe pour la mettre sous un seau, mais on la met sur son support et elle éclaire tous ceux qui sont dans la maison. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Que, de la même manière, votre lumière brille devant les hommes afin qu'ils voient votre belle manière d'agir et qu'ainsi ils célèbrent la gloire de votre Père céleste.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Christ et la loi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: '»Ne croyez pas que je sois venu pour abolir la loi ou les prophètes; je suis venu non pour abolir, mais pour accomplir. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'En effet, je vous le dis en vérité, tant que le ciel et la terre n''auront pas disparu, pas une seule lettre ni un seul trait de lettre ne disparaîtra de la loi avant que tout ne soit arrivé. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Celui donc qui violera l''un de ces plus petits commandements et qui enseignera aux hommes à faire de même sera appelé le plus petit dans le royaume des cieux; mais celui qui les mettra en pratique et les enseignera aux autres, celui-là sera appelé grand dans le royaume des cieux. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: En effet, je vous le dis, si votre justice ne dépasse pas celle des spécialistes de la loi et des pharisiens, vous n'entrerez pas dans le royaume des cieux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: '»Vous avez appris qu''il a été dit aux anciens: ‘'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu ne commettras pas de meurtre
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu… meurtre: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation du 6e des dix commandements (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Exode 20.13
        metadata:
          usfm: EXO.20.13
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deutéronome 5.17
        metadata:
          usfm: DEU.5.17
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: '; celui qui commet un meurtre mérite de passer en jugement.’ '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Mais moi je vous dis: Tout homme qui se met [sans raison] en colère contre son frère mérite de passer en jugement; celui qui traite son frère d''imbécile'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Traite son frère d''imbécile: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'littéralement dit à son frère: ‘'
      - type: usfm
        marker: tl
        children:
        - type: text
          text: Raca
      - type: text
        text: ’.
    marker-yv: yv-n
  - type: text
    text: ' mérite d''être puni par le tribunal, et celui qui le traite de fou mérite d''être puni par le feu de l''enfer. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Si donc tu présentes ton offrande vers l''autel et que là tu te souviennes que ton frère a quelque chose contre toi, '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'laisse ton offrande devant l''autel et va d''abord te réconcilier avec ton frère, puis viens présenter ton offrande. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Mets-toi rapidement d''accord avec ton adversaire, pendant que tu es en chemin avec lui, de peur qu''il ne te livre au juge, que le juge ne te livre à l''officier de justice et que tu ne sois mis en prison. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: Je te le dis en vérité, tu n'en sortiras pas avant d'avoir remboursé jusqu'au dernier centime.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '»Vous avez appris qu''il a été dit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu ne commettras pas d'adultère
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu… adultère: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation du 7e des dix commandements (
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Exode 20.14
        metadata:
          usfm: EXO.20.14
      - type: text
        text: '; '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deutéronome 5.18
        metadata:
          usfm: DEU.5.18
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Mais moi je vous dis: Tout homme qui regarde une femme pour la convoiter a déjà commis un adultère avec elle dans son cœur. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Si ton œil droit te pousse à mal agir, arrache-le et jette-le loin de toi, car il vaut mieux pour toi subir la perte d''un seul de tes membres que de voir ton corps entier jeté en enfer. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Et si ta main droite te pousse à mal agir, coupe-la et jette-la loin de toi, car il vaut mieux pour toi subir la perte d'un seul de tes membres que de voir ton corps entier jeté en enfer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '»Il a été dit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Que celui qui renvoie sa femme lui donne une lettre de divorce
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Que celui… divorce: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Deutéronome 24.1
        metadata:
          usfm: DEU.24.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Mais moi, je vous dis: Celui qui renvoie sa femme, sauf pour cause d''infidélité, l''expose à devenir adultère, et celui qui épouse une femme divorcée commet un adultère.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: '»Vous avez encore appris qu''il a été dit aux anciens: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu ne violeras pas ton serment, mais tu accompliras ce que tu as promis au Seigneur
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.33 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu ne… Seigneur: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Nombres 30.3
        metadata:
          usfm: NUM.30.3
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Mais moi je vous dis de ne pas jurer du tout, ni par '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: le ciel
  - type: text
    text: ', parce que c''est '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: le trône de Dieu
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'ni par '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: la terre
  - type: text
    text: ', parce que c'''
  - type: usfm
    marker: qt
    children:
    - type: text
      text: est son marchepied
  - type: text
    text: ','
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.34-35 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le ciel… marchepied: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'renvoi à '
      - type: usfm
        marker: ref
        children:
        - type: text
          text: Esaïe 66.1
        metadata:
          usfm: ISA.66.1
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' ni par Jérusalem, parce que c''est la ville du grand roi. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Ne jure pas non plus par ta tête, car tu ne peux pas rendre blanc ou noir un seul cheveu. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Que votre parole soit ‘oui’ pour oui, ‘non’ pour non; ce qu'on y ajoute vient du mal
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.37 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Du mal: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ou du mauvais, c'est-à-dire du diable.
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: '»Vous avez appris qu''il a été dit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Œil pour œil et dent pour dent
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.38 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Œil… dent: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Exode 21.24
      metadata:
        usfm: EXO.21.24
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' (principe répété en '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lévitique 24.20
      metadata:
        usfm: LEV.24.20
    - type: text
      text: '; '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 19.21
      metadata:
        usfm: DEU.19.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Mais moi je vous dis de ne pas résister au méchant. Si quelqu''un te gifle sur la joue droite, tends-lui aussi l''autre. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Si quelqu''un veut te faire un procès et prendre ta chemise, laisse-lui encore ton manteau. '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Si quelqu''un te force à faire un kilomètre, fais-en deux avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: text
    text: Donne à celui qui t'adresse une demande et ne te détourne pas de celui qui veut te faire un emprunt.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: text
    text: '»Vous avez appris qu''il a été dit: ‘'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Tu aimeras ton prochain
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.43 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu aimeras ton prochain: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Lévitique 19.18
      metadata:
        usfm: LEV.19.18
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' et tu détesteras ton ennemi.’ '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: text
    text: 'Mais moi je vous dis: Aimez vos ennemis, [bénissez ceux qui vous maudissent, faites du bien à ceux qui vous détestent] et priez pour ceux [qui vous maltraitent et] qui vous persécutent, '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: text
    text: 'afin d''être les fils de votre Père céleste. En effet, il fait lever son soleil sur les méchants et sur les bons, et il fait pleuvoir sur les justes et sur les injustes. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: text
    text: 'Si vous aimez ceux qui vous aiment, quelle récompense méritez-vous? Les collecteurs d''impôts n''agissent-ils pas de même? '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: text
    text: 'Et si vous saluez seulement vos frères, que faites-vous d''extraordinaire? Les membres des autres peuples n''agissent-ils pas de même? '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: text
    text: Soyez donc parfaits comme votre Père céleste est parfait.
