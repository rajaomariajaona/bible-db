document_id: EXO.26,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Les couvertures
  - type: text
    content: »Tu feras le tabernacle avec 10 tapis en fin lin retors
  - type: note
    content: 'Retors: tordu et retordu en plusieurs tours, et ainsi solide.'
  - type: text
    content: ' et des étoffes teintes en bleu, en pourpre et en cramoisi. Tu y représenteras des chérubins selon l''art du brodeur. '
  '10':
  - type: text
    content: 'Tu mettras 50 lacets sur le bord du tapis terminant le premier assemblage et 50 lacets sur le bord du tapis du second assemblage. '
  '11':
  - type: text
    content: 'Tu feras 50 agrafes en bronze et tu les feras entrer dans les lacets. Tu assembleras ainsi la tente et elle formera un tout. '
  '12':
  - type: text
    content: 'Comme il y aura du surplus dans les tapis de cette tenture, la moitié du tapis de reste retombera sur l''arrière du tabernacle. '
  '13':
  - type: text
    content: Les 2 demi-mètres qui resteront, de part et d'autre, sur la longueur des tapis de la tente retomberont sur les deux côtés du tabernacle pour le couvrir.
  '14':
  - type: text
    content: »Tu feras pour la tenture une couverture de peaux de béliers teintes en rouge et une couverture de peaux de dauphins. Elles viendront par-dessus.
  - type: heading
    content: Les planches et leurs bases
  '15':
  - type: text
    content: '»Tu feras des planches pour le tabernacle. Elles seront en bois d''acacia et placées debout. '
  '16':
  - type: text
    content: 'La longueur d''une planche sera de 5 mètres, et sa largeur de 75 centimètres. '
  '17':
  - type: text
    content: Il y aura à chaque planche 2 tenons parallèles; tu feras de même pour toutes les planches du tabernacle.
  '18':
  - type: text
    content: '»Tu feras 20 planches pour le côté sud du tabernacle. '
  '19':
  - type: text
    content: 'Tu feras 40 bases en argent à placer sous les 20 planches, 2 bases sous chaque planche, correspondant à ses 2 tenons. '
  '2':
  - type: text
    content: 'La longueur d''un tapis sera de 14 mètres et sa largeur de 2 mètres. La mesure sera la même pour tous les tapis. '
  '20':
  - type: text
    content: 'Tu feras 20 planches pour le deuxième côté du tabernacle, le côté nord, '
  '21':
  - type: text
    content: ainsi que leurs 40 bases en argent, 2 bases sous chaque planche.
  '22':
  - type: text
    content: '»Tu feras 6 planches pour le fond du tabernacle, le côté ouest. '
  '23':
  - type: text
    content: 'Tu feras 2 planches pour les angles du tabernacle, dans le fond; '
  '24':
  - type: text
    content: 'elles seront doubles depuis le bas et bien reliées à leur sommet par un anneau; il en ira de même pour les 2 planches placées aux 2 angles. '
  '25':
  - type: text
    content: Il y aura ainsi 8 planches avec leurs bases en argent, soit 16 bases, 2 sous chaque planche.
  '26':
  - type: text
    content: '»Tu feras 5 barres en bois d''acacia pour les planches d''un côté du tabernacle, '
  '27':
  - type: text
    content: '5 barres pour les planches du deuxième côté du tabernacle et 5 barres pour les planches du côté du tabernacle qui forme le fond, orienté à l''ouest. '
  '28':
  - type: text
    content: 'La barre du milieu traversera les planches d''une extrémité à l''autre. '
  '29':
  - type: text
    content: 'Tu couvriras les planches d''or, tu feras leurs anneaux destinés à recevoir les barres en or et tu couvriras les barres d''or. '
  '3':
  - type: text
    content: 'On attachera 5 de ces tapis ensemble; les 5 autres seront aussi attachés ensemble. '
  '30':
  - type: text
    content: Tu dresseras le tabernacle d'après le modèle qui t'est montré sur la montagne.
  - type: heading
    content: Les deux voiles
  '31':
  - type: text
    content: '»Tu feras un voile bleu, pourpre et cramoisi, et en fin lin retors. Il sera fait selon l''art du brodeur et l''on y représentera des chérubins. '
  '32':
  - type: text
    content: 'Tu le fixeras à 4 colonnes d''acacia couvertes d''or. Ces colonnes auront des crochets en or et reposeront sur 4 bases en argent. '
  '33':
  - type: text
    content: 'Tu mettras le voile sous les agrafes et c''est là, derrière le voile, que tu feras pénétrer l''arche du témoignage. Le voile vous servira de séparation entre le lieu saint et le lieu très saint. '
  '34':
  - type: text
    content: 'Tu mettras le propitiatoire sur l''arche du témoignage dans le lieu très saint. '
  '35':
  - type: text
    content: Tu placeras la table devant le voile et le chandelier en face d'elle, du côté sud du tabernacle; tu mettras la table du côté nord.
  '36':
  - type: text
    content: '»Pour l''entrée de la tente, tu feras un rideau bleu, pourpre et cramoisi, avec du fin lin retors. Ce sera un ouvrage de broderie. '
  '37':
  - type: text
    content: Tu feras pour ce rideau 5 colonnes en acacia et tu les couvriras d'or. Elles auront des crochets en or et tu fondras pour elles 5 bases en bronze.
  '4':
  - type: text
    content: 'Tu feras des lacets bleus sur le bord du tapis terminant le premier assemblage et tu feras de même sur le bord du tapis terminant le second assemblage. '
  '5':
  - type: text
    content: 'Tu mettras 50 lacets au premier tapis et 50 lacets sur le bord du tapis terminant le second assemblage; ces lacets correspondront les uns aux autres. '
  '6':
  - type: text
    content: Tu feras 50 agrafes en or et tu attacheras les tapis l'un à l'autre avec les agrafes. Ainsi le tabernacle formera un tout.
  '7':
  - type: text
    content: '»Tu feras des tapis en poil de chèvre qui serviront de tenture par-dessus le tabernacle. Tu en feras 11. '
  '8':
  - type: text
    content: 'La longueur d''un tapis sera de 15 mètres, et sa largeur de 2 mètres. La mesure sera la même pour les 11 tapis. '
  '9':
  - type: text
    content: 'Tu attacheras 5 de ces tapis, puis les 6 autres à part, et tu rabattras le sixième tapis sur le devant de la tente. '
