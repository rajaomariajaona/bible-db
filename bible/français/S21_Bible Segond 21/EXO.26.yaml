document_id: EXO.26
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les couvertures
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: »Tu feras le tabernacle avec 10 tapis en fin lin retors
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Retors: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: tordu et retordu en plusieurs tours, et ainsi solide.
    marker-yv: yv-n
  - type: text
    text: ' et des étoffes teintes en bleu, en pourpre et en cramoisi. Tu y représenteras des chérubins selon l''art du brodeur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'La longueur d''un tapis sera de 14 mètres et sa largeur de 2 mètres. La mesure sera la même pour tous les tapis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'On attachera 5 de ces tapis ensemble; les 5 autres seront aussi attachés ensemble. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tu feras des lacets bleus sur le bord du tapis terminant le premier assemblage et tu feras de même sur le bord du tapis terminant le second assemblage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tu mettras 50 lacets au premier tapis et 50 lacets sur le bord du tapis terminant le second assemblage; ces lacets correspondront les uns aux autres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Tu feras 50 agrafes en or et tu attacheras les tapis l'un à l'autre avec les agrafes. Ainsi le tabernacle formera un tout.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: '»Tu feras des tapis en poil de chèvre qui serviront de tenture par-dessus le tabernacle. Tu en feras 11. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'La longueur d''un tapis sera de 15 mètres, et sa largeur de 2 mètres. La mesure sera la même pour les 11 tapis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Tu attacheras 5 de ces tapis, puis les 6 autres à part, et tu rabattras le sixième tapis sur le devant de la tente. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tu mettras 50 lacets sur le bord du tapis terminant le premier assemblage et 50 lacets sur le bord du tapis du second assemblage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tu feras 50 agrafes en bronze et tu les feras entrer dans les lacets. Tu assembleras ainsi la tente et elle formera un tout. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Comme il y aura du surplus dans les tapis de cette tenture, la moitié du tapis de reste retombera sur l''arrière du tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Les 2 demi-mètres qui resteront, de part et d'autre, sur la longueur des tapis de la tente retomberont sur les deux côtés du tabernacle pour le couvrir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: »Tu feras pour la tenture une couverture de peaux de béliers teintes en rouge et une couverture de peaux de dauphins. Elles viendront par-dessus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les planches et leurs bases
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: '»Tu feras des planches pour le tabernacle. Elles seront en bois d''acacia et placées debout. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'La longueur d''une planche sera de 5 mètres, et sa largeur de 75 centimètres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Il y aura à chaque planche 2 tenons parallèles; tu feras de même pour toutes les planches du tabernacle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: '»Tu feras 20 planches pour le côté sud du tabernacle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tu feras 40 bases en argent à placer sous les 20 planches, 2 bases sous chaque planche, correspondant à ses 2 tenons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Tu feras 20 planches pour le deuxième côté du tabernacle, le côté nord, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ainsi que leurs 40 bases en argent, 2 bases sous chaque planche.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: '»Tu feras 6 planches pour le fond du tabernacle, le côté ouest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tu feras 2 planches pour les angles du tabernacle, dans le fond; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'elles seront doubles depuis le bas et bien reliées à leur sommet par un anneau; il en ira de même pour les 2 planches placées aux 2 angles. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: Il y aura ainsi 8 planches avec leurs bases en argent, soit 16 bases, 2 sous chaque planche.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: '»Tu feras 5 barres en bois d''acacia pour les planches d''un côté du tabernacle, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: '5 barres pour les planches du deuxième côté du tabernacle et 5 barres pour les planches du côté du tabernacle qui forme le fond, orienté à l''ouest. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'La barre du milieu traversera les planches d''une extrémité à l''autre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Tu couvriras les planches d''or, tu feras leurs anneaux destinés à recevoir les barres en or et tu couvriras les barres d''or. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Tu dresseras le tabernacle d'après le modèle qui t'est montré sur la montagne.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les deux voiles
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: '»Tu feras un voile bleu, pourpre et cramoisi, et en fin lin retors. Il sera fait selon l''art du brodeur et l''on y représentera des chérubins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tu le fixeras à 4 colonnes d''acacia couvertes d''or. Ces colonnes auront des crochets en or et reposeront sur 4 bases en argent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Tu mettras le voile sous les agrafes et c''est là, derrière le voile, que tu feras pénétrer l''arche du témoignage. Le voile vous servira de séparation entre le lieu saint et le lieu très saint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: 'Tu mettras le propitiatoire sur l''arche du témoignage dans le lieu très saint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: Tu placeras la table devant le voile et le chandelier en face d'elle, du côté sud du tabernacle; tu mettras la table du côté nord.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: '»Pour l''entrée de la tente, tu feras un rideau bleu, pourpre et cramoisi, avec du fin lin retors. Ce sera un ouvrage de broderie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: Tu feras pour ce rideau 5 colonnes en acacia et tu les couvriras d'or. Elles auront des crochets en or et tu fondras pour elles 5 bases en bronze.
