document_id: AMO.2,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Sur Moab
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: A cause de trois crimes de Moab,
  - type: text
    content: même de quatre, je ne reviens pas sur ma décision.
  - type: text
    content: Parce qu'il a brûlé, calciné les os du roi d'Edom,
  '10':
  - type: text
    content: Pourtant, je vous ai fait sortir d'Egypte
  - type: text
    content: et je vous ai conduits 40 ans dans le désert
  - type: text
    content: pour vous mettre en possession du pays des Amoréens,
  '11':
  - type: text
    content: j'ai fait surgir parmi vos fils des prophètes,
  - type: text
    content: et parmi vos jeunes hommes des naziréens
  - type: note
    content: 'Naziréens: c''est-à-dire des personnes qui faisaient vœu de consécration particulière à Dieu durant un certain temps (voir Nombres 6.1-21).'
  - type: text
    content: .
  - type: text
    content: N'est-ce pas le cas, Israélites? déclare l'Eternel.
  '12':
  - type: text
    content: Et vous avez fait boire du vin aux naziréens,
  - type: text
    content: 'et aux prophètes vous avez donné cet ordre:'
  - type: text
    content: «Ne prophétisez pas!»
  '13':
  - type: text
    content: Je vous écraserai
  - type: text
    content: comme un chariot chargé de gerbes écrase le sol.
  '14':
  - type: text
    content: Celui qui est agile ne pourra pas fuir,
  - type: text
    content: celui qui a de la force ne pourra pas
  - type: text
    content: s'en servir, et l'homme vaillant ne sauvera pas sa vie.
  '15':
  - type: text
    content: Celui qui manie l'arc ne résistera pas,
  - type: text
    content: celui qui a les pieds légers ne s'échappera pas
  - type: text
    content: et le cavalier ne sauvera pas sa vie.
  '16':
  - type: text
    content: Le plus courageux des guerriers
  - type: text
    content: s'enfuira nu ce jour-là, déclare l'Eternel.
  '2':
  - type: text
    content: j'enverrai le feu dans Moab;
  - type: text
    content: il dévorera les palais de Kerijoth
  - type: text
    content: et Moab mourra au milieu du tapage,
  - type: text
    content: au milieu des cris de guerre et du bruit de la trompette.
  '3':
  - type: text
    content: J'exterminerai le juge du milieu d'elle
  - type: text
    content: et je tuerai tous ses chefs avec lui, dit l'Eternel.
  - type: heading
    content: Sur Juda
  '4':
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: A cause de trois crimes de Juda,
  - type: text
    content: même de quatre, je ne reviens pas sur ma décision.
  - type: text
    content: Parce qu'ils ont méprisé la loi de l'Eternel
  - type: text
    content: et n'ont pas gardé ses prescriptions,
  - type: text
    content: parce qu'ils ont été égarés par les idoles mensongères
  - type: text
    content: que leurs ancêtres avaient adorées,
  '5':
  - type: text
    content: j'enverrai le feu dans Juda
  - type: text
    content: et il dévorera les palais de Jérusalem.
  - type: heading
    content: Sur Israël
  '6':
  - type: text
    content: 'Voici ce que dit l''Eternel:'
  - type: text
    content: A cause de trois crimes d'Israël,
  - type: text
    content: même de quatre, je ne reviens pas sur ma décision,
  - type: text
    content: parce qu'ils ont vendu le juste pour de l'argent,
  - type: text
    content: et le pauvre pour une paire de sandales.
  '7':
  - type: text
    content: Ils aspirent à voir la poussière de la terre sur la tête des faibles,
  - type: text
    content: et ils violent le droit des malheureux.
  - type: text
    content: Le fils et le père s'unissent à la même fille
  - type: text
    content: afin de déshonorer mon saint nom.
  '8':
  - type: text
    content: Ils s'étendent près de chaque autel sur des habits pris en gage,
  - type: text
    content: et ils boivent dans le temple de leurs dieux le vin de ceux qu'ils condamnent.
  '9':
  - type: text
    content: Et pourtant j'ai détruit devant eux les Amoréens,
  - type: text
    content: dont la hauteur égalait celle des cèdres
  - type: text
    content: et la force celle des chênes,
  - type: text
    content: j'ai détruit leurs fruits au-dessus
  - type: text
    content: et leurs racines en dessous.
