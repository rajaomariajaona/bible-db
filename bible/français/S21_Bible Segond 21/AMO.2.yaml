document_id: AMO.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sur Moab
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause de trois crimes de Moab,
- type: usfm
  marker: q1
  children:
  - type: text
    text: même de quatre, je ne reviens pas sur ma décision.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce qu'il a brûlé, calciné les os du roi d'Edom,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: j'enverrai le feu dans Moab;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il dévorera les palais de Kerijoth
- type: usfm
  marker: q1
  children:
  - type: text
    text: et Moab mourra au milieu du tapage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au milieu des cris de guerre et du bruit de la trompette.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: J'exterminerai le juge du milieu d'elle
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je tuerai tous ses chefs avec lui, dit l'Eternel.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sur Juda
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause de trois crimes de Juda,
- type: usfm
  marker: q1
  children:
  - type: text
    text: même de quatre, je ne reviens pas sur ma décision.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Parce qu'ils ont méprisé la loi de l'Eternel
- type: usfm
  marker: q1
  children:
  - type: text
    text: et n'ont pas gardé ses prescriptions,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu'ils ont été égarés par les idoles mensongères
- type: usfm
  marker: q1
  children:
  - type: text
    text: que leurs ancêtres avaient adorées,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: j'enverrai le feu dans Juda
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il dévorera les palais de Jérusalem.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sur Israël
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Voici ce que dit l''Eternel:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: A cause de trois crimes d'Israël,
- type: usfm
  marker: q1
  children:
  - type: text
    text: même de quatre, je ne reviens pas sur ma décision,
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu'ils ont vendu le juste pour de l'argent,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le pauvre pour une paire de sandales.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Ils aspirent à voir la poussière de la terre sur la tête des faibles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils violent le droit des malheureux.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Le fils et le père s'unissent à la même fille
- type: usfm
  marker: q1
  children:
  - type: text
    text: afin de déshonorer mon saint nom.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Ils s'étendent près de chaque autel sur des habits pris en gage,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ils boivent dans le temple de leurs dieux le vin de ceux qu'ils condamnent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: Et pourtant j'ai détruit devant eux les Amoréens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dont la hauteur égalait celle des cèdres
- type: usfm
  marker: q1
  children:
  - type: text
    text: et la force celle des chênes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ai détruit leurs fruits au-dessus
- type: usfm
  marker: q1
  children:
  - type: text
    text: et leurs racines en dessous.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Pourtant, je vous ai fait sortir d'Egypte
- type: usfm
  marker: q1
  children:
  - type: text
    text: et je vous ai conduits 40 ans dans le désert
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour vous mettre en possession du pays des Amoréens,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: j'ai fait surgir parmi vos fils des prophètes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et parmi vos jeunes hommes des naziréens
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Naziréens: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'c''est-à-dire des personnes qui faisaient vœu de consécration particulière à Dieu durant un certain temps (voir '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Nombres 6.1-21
      metadata:
        usfm: NUM.6.1+NUM.6.2+NUM.6.3+NUM.6.4+NUM.6.5+NUM.6.6+NUM.6.7+NUM.6.8+NUM.6.9+NUM.6.10+NUM.6.11+NUM.6.12+NUM.6.13+NUM.6.14+NUM.6.15+NUM.6.16+NUM.6.17+NUM.6.18+NUM.6.19+NUM.6.20+NUM.6.21
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: .
- type: usfm
  marker: q1
  children:
  - type: text
    text: N'est-ce pas le cas, Israélites? déclare l'Eternel.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Et vous avez fait boire du vin aux naziréens,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et aux prophètes vous avez donné cet ordre:'
- type: usfm
  marker: q1
  children:
  - type: text
    text: «Ne prophétisez pas!»
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Je vous écraserai
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un chariot chargé de gerbes écrase le sol.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Celui qui est agile ne pourra pas fuir,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui a de la force ne pourra pas
- type: usfm
  marker: q1
  children:
  - type: text
    text: s'en servir, et l'homme vaillant ne sauvera pas sa vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Celui qui manie l'arc ne résistera pas,
- type: usfm
  marker: q1
  children:
  - type: text
    text: celui qui a les pieds légers ne s'échappera pas
- type: usfm
  marker: q1
  children:
  - type: text
    text: et le cavalier ne sauvera pas sa vie.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Le plus courageux des guerriers
- type: usfm
  marker: q1
  children:
  - type: text
    text: s'enfuira nu ce jour-là, déclare l'Eternel.
