document_id: MRK.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le semeur et les terrains
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Jésus se mit de nouveau à enseigner au bord du lac. La foule se rassembla autour de lui, si nombreuse qu''il monta dans une barque où il s''assit, sur le lac. Toute la foule était à terre sur le rivage. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Il leur enseignait beaucoup de choses en paraboles. Il leur disait dans son enseignement: '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: '«Ecoutez! Un semeur sortit pour semer. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Comme il semait, une partie de la semence tomba le long du chemin; les oiseaux vinrent et la mangèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Une autre partie tomba dans un sol pierreux, où elle n''avait pas beaucoup de terre; elle leva aussitôt, parce qu''elle ne trouva pas un terrain profond, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'mais quand le soleil parut, elle fut brûlée et sécha, faute de racines. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Une autre partie tomba parmi les ronces; les ronces poussèrent et l''étouffèrent, et elle ne donna pas de fruit. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Une autre partie tomba dans la bonne terre; elle donna du fruit qui montait et se développait, avec un rapport de 30, 60 ou 100 pour 1.» '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Puis il dit: «Que celui qui a des oreilles pour entendre entende.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Lorsqu''il fut seul avec eux, ceux qui l''entouraient avec les douze l''interrogèrent sur cette parabole. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il leur dit: «C''est à vous qu''il a été donné de connaître le mystère du royaume de Dieu, mais pour ceux qui sont à l''extérieur tout est présenté en paraboles, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: afin qu'en regardant ils regardent et ne voient pas, et qu'en entendant ils entendent et ne comprennent pas, de peur qu'ils ne se convertissent et que leurs péchés ne soient pardonnés
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Afin qu''en… pardonnés: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: citation d'
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Esaïe 6.9-10
      metadata:
        usfm: ISA.6.9+ISA.6.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: .»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il leur dit encore: «Vous ne comprenez pas cette parabole? Comment donc comprendrez-vous toutes les autres? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Le semeur sème la parole. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Certains sont le long du chemin où la parole est semée: dès qu''ils l''ont entendue, Satan vient et enlève la parole qui a été semée en eux. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'De même, d''autres reçoivent la semence dans un sol pierreux: quand ils entendent la parole, ils l''acceptent aussitôt avec joie, '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'mais ils n''ont pas de racines en eux-mêmes, ils sont les hommes d''un moment et, dès que surviennent les difficultés ou la persécution à cause de la parole, ils trébuchent. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'D''autres encore reçoivent la semence parmi les ronces: ils entendent la parole, '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'mais les préoccupations de ce monde, l''attrait trompeur des richesses et les passions en tout genre pénètrent en eux, étouffent la parole et la rendent infructueuse. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'D''autres enfin reçoivent la semence dans la bonne terre: ce sont ceux qui entendent la parole, l''accueillent et portent du fruit, avec un rapport de 30, 60 ou 100 pour 1.»'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il leur dit encore: «Apporte-t-on la lampe pour la mettre sous un seau ou sous le lit? N''est-ce pas pour la mettre sur son support? '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Il n''y a en effet rien de caché qui ne doive être mis en lumière, rien de secret qui ne doive être mis au jour. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: Si quelqu'un a des oreilles pour entendre, qu'il entende.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Il leur dit encore: «Prêtez bien attention à ce que vous entendez. On utilisera pour vous la même mesure que celle dont vous vous serez servis, et on y ajoutera pour vous [qui écoutez]. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: En effet, on donnera à celui qui a, mais à celui qui n'a pas on enlèvera même ce qu'il a.»
- type: usfm
  marker: s1
  children:
  - type: text
    text: La semence et la graine de moutarde
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il dit encore: «Voici à quoi ressemble le royaume de Dieu. Il est semblable à un homme qui jette de la semence en terre; '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'qu''il dorme ou qu''il reste éveillé, nuit et jour la semence germe et pousse sans qu''il sache comment. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: '[En effet,] d''elle-même la terre produit d''abord l''herbe, puis l''épi, enfin le grain tout formé dans l''épi, '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: et, dès que le fruit est mûr, on y met la faucille, car c'est le moment de la moisson.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Il dit encore: «A quoi comparerons-nous le royaume de Dieu ou par quelle parabole le représenterons-nous? '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Il est comme une graine de moutarde: lorsqu''on la sème en terre, c''est la plus petite de toutes les semences qui sont sur la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: Mais lorsqu'elle a été semée, elle monte, devient plus grande que tous les légumes et développe de grandes branches, de sorte que les oiseaux du ciel peuvent habiter sous son ombre.»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'C''est par beaucoup de paraboles de ce genre qu''il leur annonçait la parole, dans la mesure où ils étaient capables de l''entendre. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: Il ne leur parlait pas sans parabole, mais en privé il expliquait tout à ses disciples.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus, plus fort que la nature et les démons
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Ce jour-là, le soir venu, Jésus leur dit: «Passons sur l''autre rive.» '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Après avoir renvoyé la foule, ils l''emmenèrent dans la barque où il se trouvait; il y avait aussi d''autres barques avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Un vent violent s''éleva et les vagues se jetaient sur la barque, au point qu''elle se remplissait déjà. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Et lui, il dormait à l''arrière sur le coussin. Ils le réveillèrent et lui dirent: «Maître, cela ne te fait rien que nous soyons en train de mourir?» '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Il se réveilla, menaça le vent et dit à la mer: «Silence! Tais-toi!» Le vent tomba et il y eut un grand calme. '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: 'Puis il leur dit: «Pourquoi êtes-vous si craintifs? Comment se fait-il que vous n''ayez pas de foi?» '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ils furent saisis d''une grande frayeur et ils se disaient les uns aux autres: «Qui est donc cet homme? Même le vent et la mer lui obéissent!»'
