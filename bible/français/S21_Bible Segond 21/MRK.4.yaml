document_id: MRK.4,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Le semeur et les terrains
  - type: text
    content: 'Jésus se mit de nouveau à enseigner au bord du lac. La foule se rassembla autour de lui, si nombreuse qu''il monta dans une barque où il s''assit, sur le lac. Toute la foule était à terre sur le rivage. '
  '10':
  - type: text
    content: 'Lorsqu''il fut seul avec eux, ceux qui l''entouraient avec les douze l''interrogèrent sur cette parabole. '
  '11':
  - type: text
    content: 'Il leur dit: «C''est à vous qu''il a été donné de connaître le mystère du royaume de Dieu, mais pour ceux qui sont à l''extérieur tout est présenté en paraboles, '
  '12':
  - type: text
    content: afin qu'en regardant ils regardent et ne voient pas, et qu'en entendant ils entendent et ne comprennent pas, de peur qu'ils ne se convertissent et que leurs péchés ne soient pardonnés
  - type: note
    content: 'Afin qu''en… pardonnés: citation d''Esaïe 6.9-10.'
  - type: text
    content: .»
  '13':
  - type: text
    content: 'Il leur dit encore: «Vous ne comprenez pas cette parabole? Comment donc comprendrez-vous toutes les autres? '
  '14':
  - type: text
    content: 'Le semeur sème la parole. '
  '15':
  - type: text
    content: 'Certains sont le long du chemin où la parole est semée: dès qu''ils l''ont entendue, Satan vient et enlève la parole qui a été semée en eux. '
  '16':
  - type: text
    content: 'De même, d''autres reçoivent la semence dans un sol pierreux: quand ils entendent la parole, ils l''acceptent aussitôt avec joie, '
  '17':
  - type: text
    content: 'mais ils n''ont pas de racines en eux-mêmes, ils sont les hommes d''un moment et, dès que surviennent les difficultés ou la persécution à cause de la parole, ils trébuchent. '
  '18':
  - type: text
    content: 'D''autres encore reçoivent la semence parmi les ronces: ils entendent la parole, '
  '19':
  - type: text
    content: 'mais les préoccupations de ce monde, l''attrait trompeur des richesses et les passions en tout genre pénètrent en eux, étouffent la parole et la rendent infructueuse. '
  '2':
  - type: text
    content: 'Il leur enseignait beaucoup de choses en paraboles. Il leur disait dans son enseignement: '
  '20':
  - type: text
    content: 'D''autres enfin reçoivent la semence dans la bonne terre: ce sont ceux qui entendent la parole, l''accueillent et portent du fruit, avec un rapport de 30, 60 ou 100 pour 1.»'
  '21':
  - type: text
    content: 'Il leur dit encore: «Apporte-t-on la lampe pour la mettre sous un seau ou sous le lit? N''est-ce pas pour la mettre sur son support? '
  '22':
  - type: text
    content: 'Il n''y a en effet rien de caché qui ne doive être mis en lumière, rien de secret qui ne doive être mis au jour. '
  '23':
  - type: text
    content: Si quelqu'un a des oreilles pour entendre, qu'il entende.»
  '24':
  - type: text
    content: 'Il leur dit encore: «Prêtez bien attention à ce que vous entendez. On utilisera pour vous la même mesure que celle dont vous vous serez servis, et on y ajoutera pour vous [qui écoutez]. '
  '25':
  - type: text
    content: En effet, on donnera à celui qui a, mais à celui qui n'a pas on enlèvera même ce qu'il a.»
  - type: heading
    content: La semence et la graine de moutarde
  '26':
  - type: text
    content: 'Il dit encore: «Voici à quoi ressemble le royaume de Dieu. Il est semblable à un homme qui jette de la semence en terre; '
  '27':
  - type: text
    content: 'qu''il dorme ou qu''il reste éveillé, nuit et jour la semence germe et pousse sans qu''il sache comment. '
  '28':
  - type: text
    content: '[En effet,] d''elle-même la terre produit d''abord l''herbe, puis l''épi, enfin le grain tout formé dans l''épi, '
  '29':
  - type: text
    content: et, dès que le fruit est mûr, on y met la faucille, car c'est le moment de la moisson.»
  '3':
  - type: text
    content: '«Ecoutez! Un semeur sortit pour semer. '
  '30':
  - type: text
    content: 'Il dit encore: «A quoi comparerons-nous le royaume de Dieu ou par quelle parabole le représenterons-nous? '
  '31':
  - type: text
    content: 'Il est comme une graine de moutarde: lorsqu''on la sème en terre, c''est la plus petite de toutes les semences qui sont sur la terre. '
  '32':
  - type: text
    content: Mais lorsqu'elle a été semée, elle monte, devient plus grande que tous les légumes et développe de grandes branches, de sorte que les oiseaux du ciel peuvent habiter sous son ombre.»
  '33':
  - type: text
    content: 'C''est par beaucoup de paraboles de ce genre qu''il leur annonçait la parole, dans la mesure où ils étaient capables de l''entendre. '
  '34':
  - type: text
    content: Il ne leur parlait pas sans parabole, mais en privé il expliquait tout à ses disciples.
  - type: heading
    content: Jésus, plus fort que la nature et les démons
  '35':
  - type: text
    content: 'Ce jour-là, le soir venu, Jésus leur dit: «Passons sur l''autre rive.» '
  '36':
  - type: text
    content: 'Après avoir renvoyé la foule, ils l''emmenèrent dans la barque où il se trouvait; il y avait aussi d''autres barques avec lui. '
  '37':
  - type: text
    content: 'Un vent violent s''éleva et les vagues se jetaient sur la barque, au point qu''elle se remplissait déjà. '
  '38':
  - type: text
    content: 'Et lui, il dormait à l''arrière sur le coussin. Ils le réveillèrent et lui dirent: «Maître, cela ne te fait rien que nous soyons en train de mourir?» '
  '39':
  - type: text
    content: 'Il se réveilla, menaça le vent et dit à la mer: «Silence! Tais-toi!» Le vent tomba et il y eut un grand calme. '
  '4':
  - type: text
    content: 'Comme il semait, une partie de la semence tomba le long du chemin; les oiseaux vinrent et la mangèrent. '
  '40':
  - type: text
    content: 'Puis il leur dit: «Pourquoi êtes-vous si craintifs? Comment se fait-il que vous n''ayez pas de foi?» '
  '41':
  - type: text
    content: 'Ils furent saisis d''une grande frayeur et ils se disaient les uns aux autres: «Qui est donc cet homme? Même le vent et la mer lui obéissent!»'
  '5':
  - type: text
    content: 'Une autre partie tomba dans un sol pierreux, où elle n''avait pas beaucoup de terre; elle leva aussitôt, parce qu''elle ne trouva pas un terrain profond, '
  '6':
  - type: text
    content: 'mais quand le soleil parut, elle fut brûlée et sécha, faute de racines. '
  '7':
  - type: text
    content: 'Une autre partie tomba parmi les ronces; les ronces poussèrent et l''étouffèrent, et elle ne donna pas de fruit. '
  '8':
  - type: text
    content: 'Une autre partie tomba dans la bonne terre; elle donna du fruit qui montait et se développait, avec un rapport de 30, 60 ou 100 pour 1.» '
  '9':
  - type: text
    content: 'Puis il dit: «Que celui qui a des oreilles pour entendre entende.»'
