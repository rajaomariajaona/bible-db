document_id: NUM.9,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La Pâque célébrée dans le désert du Sinaï
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel parla à Moïse dans le désert du Sinaï, le premier mois de la deuxième année après leur sortie d''Egypte. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '«Transmets ces instructions aux Israélites: Si l''un de vous ou de vos descendants est impur à cause d''un mort ou bien est en train d''effectuer un long voyage, il célébrera néanmoins la Pâque en l''honneur de l''Eternel. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est le quatorzième jour du deuxième mois qu''ils la célébreront, au coucher du soleil; ils la mangeront avec des pains sans levain et des herbes amères. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils n'en laisseront rien jusqu'au matin et ils ne briseront aucun de ses os. Ils la célébreront suivant toutes les prescriptions de la Pâque.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: '»Si quelqu''un qui est pur et n''est pas en voyage s''abstient de célébrer la Pâque, il sera exclu de son peuple. Cet homme-là supportera les conséquences de son péché parce qu''il n''a pas présenté l''offrande de l''Eternel au moment fixé. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Si un étranger en séjour chez vous célèbre la Pâque de l'Eternel, il se conformera aux prescriptions et aux règles de la Pâque. Vous aurez la même prescription pour l'étranger et pour l'Israélite.»
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La colonne de nuée
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le jour où le tabernacle fut dressé, la nuée couvrit le tabernacle, la tente de la rencontre. Depuis le soir jusqu''au matin, elle eut l''apparence d''un feu sur le tabernacle. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cela se passa constamment ainsi: la nuée couvrait le tabernacle et la nuit elle avait l''apparence d''un feu. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand la nuée s''élevait au-dessus de la tente, les Israélites partaient; ils campaient à l''endroit où s''arrêtait la nuée. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Israélites partaient sur l''ordre de l''Eternel et ils campaient sur l''ordre de l''Eternel. Ils campaient aussi longtemps que la nuée restait sur le tabernacle. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand la nuée restait longtemps sur le tabernacle, les Israélites obéissaient au commandement de l''Eternel et ne partaient pas. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il dit: «Que les Israélites célèbrent la Pâque au moment fixé. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand elle restait peu de jours sur le tabernacle, c''est sur l''ordre de l''Eternel qu''ils campaient et partaient. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si la nuée s''arrêtait du soir au matin et s''élevait le matin, ils repartaient. Si elle s''élevait après un jour et une nuit, ils partaient. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qu''elle s''arrête sur le tabernacle deux jours, un mois ou une année, les Israélites restaient à camper et ne partaient pas; et quand elle s''élevait, ils partaient. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C'est sur l'ordre de l'Eternel qu'ils campaient et partaient. Ils obéissaient au commandement de l'Eternel, conformément à l'ordre que l'Eternel avait donné par l'intermédiaire de Moïse.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Vous la célébrerez au moment fixé, le quatorzième jour de ce mois, au coucher du soleil. Vous la célébrerez conformément à toutes les prescriptions et les règles qui s'y rapportent.»
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse ordonna aux Israélites de célébrer la Pâque, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: et ils célébrèrent la Pâque le quatorzième jour du premier mois, au coucher du soleil, dans le désert du Sinaï. Les Israélites se conformèrent à tous les ordres que l'Eternel avait donnés à Moïse.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y eut des hommes qui étaient impurs à cause d''un mort et ne pouvaient donc pas célébrer la Pâque ce jour-là. Ils se présentèrent le jour même devant Moïse et Aaron '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et dirent à Moïse: «Nous sommes impurs à cause d''un mort. Pourquoi serions-nous privés de présenter au moment fixé l''offrande de l''Eternel parmi les Israélites?» '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moïse leur dit: «Attendez que je sache ce que l''Eternel vous ordonne.»'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''Eternel dit à Moïse: '
