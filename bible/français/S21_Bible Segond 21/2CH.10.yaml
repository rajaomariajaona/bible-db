document_id: 2CH.10
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: Juda à partir du schisme
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 10.1–36.23
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Division du royaume
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Roboam se rendit à Sichem, car tout Israël y était venu pour le proclamer roi.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Lorsque Jéroboam, le fils de Nebath, l''apprit, il se trouvait en Egypte, où il s''était enfui loin du roi Salomon, et il en revint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'On le fit appeler. Jéroboam et tout Israël vinrent alors trouver Roboam et lui dirent: '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: '«Ton père a exercé une dure domination sur nous. Maintenant, allège le dur service et la domination particulièrement lourde que nous a imposés ton père, et nous te servirons.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il leur répondit: «Revenez vers moi dans 3 jours.» Et le peuple s''en alla.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le roi Roboam consulta les anciens qui avaient été au service de son père Salomon pendant sa vie. Il leur demanda: «Que me conseillez-vous de répondre à ce peuple?» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Voici ce qu''ils lui dirent: «Si tu fais preuve de bonté envers ce peuple, si tu les accueilles favorablement en leur adressant des paroles bienveillantes, ils seront pour toujours tes serviteurs.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais Roboam délaissa le conseil que lui donnaient les anciens et consulta les jeunes qui avaient grandi avec lui et qui faisaient partie de son entourage. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Il leur demanda: «Que me conseillez-vous de répondre à ce peuple? Ils me tiennent ce langage: ‘Allège la domination que ton père nous a imposée!’» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Voici ce que lui dirent les jeunes qui avaient grandi avec lui: «Le peuple t''a tenu ce langage: ‘Ton père nous a imposé une domination particulièrement lourde, mais toi, allège son poids!’ De ton côté, dis-leur: ‘Mon petit doigt est plus gros que les reins de mon père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mon père vous a imposé une domination particulièrement lourde, eh bien, moi je la rendrai plus lourde encore. Lui vous a punis avec des fouets, moi je vous punirai avec des fouets munis de pointes.’»
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jéroboam et tout le peuple vinrent trouver Roboam le troisième jour, conformément à ce qu''avait dit le roi: «Revenez vers moi dans 3 jours.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le roi leur répondit avec dureté. Le roi Roboam délaissa le conseil des anciens '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'et leur dit, d''après le conseil des jeunes: «Mon père vous a imposé une domination particulièrement lourde, moi je la rendrai plus lourde encore. Lui vous a punis avec des fouets, moi je vous punirai avec des fouets munis de pointes.» '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Ainsi, le roi n'écouta pas le peuple. Cela fut en effet conduit par Dieu pour que s'accomplisse la parole que l'Eternel avait dite par l'intermédiaire d'Achija de Silo à Jéroboam, le fils de Nebath.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Comme le roi ne les écoutait pas, tous les membres du peuple d''Israël lui répondirent: «Quelle part avons-nous avec David? Nous n''avons pas d''héritage avec le fils d''Isaï! A tes tentes, Israël! Maintenant, occupe-toi des tiens, David!» Et tout Israël retourna dans ses tentes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les Israélites qui habitaient les villes de Juda furent les seuls qui reconnurent Roboam comme roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Alors le roi Roboam envoya Hadoram, qui était préposé aux corvées, vers les Israélites, mais ils le lapidèrent et il mourut. Le roi Roboam s''empressa de monter sur un char pour se réfugier à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: C'est ainsi qu'Israël s'est détaché de la famille de David jusqu'à aujourd'hui.
