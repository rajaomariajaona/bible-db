document_id: PSA.67
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Louange universelle à Dieu
  marker-yv: yv-h
- type: usfm
  marker: d
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: Au chef de chœur, avec instruments à cordes. Psaume, chant.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Que Dieu nous fasse grâce et nous bénisse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'qu''il fasse briller son visage sur nous! '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: Ainsi l'on connaîtra ta voie sur la terre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ton salut parmi toutes les nations.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Les peuples te louent, ô Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les peuples te louent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Les nations se réjouissent, elles sont dans l'allégresse, car tu juges les peuples avec droiture
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et tu conduis les nations sur la terre. '
  - type: usfm
    marker: qs
    children:
    - type: text
      text: – Pause.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: Les peuples te louent, ô Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: tous les peuples te louent.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: La terre donne ses produits;
- type: usfm
  marker: q1
  children:
  - type: text
    text: Dieu, notre Dieu, nous bénit.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: Dieu nous bénit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toutes les extrémités de la terre le craignent.
