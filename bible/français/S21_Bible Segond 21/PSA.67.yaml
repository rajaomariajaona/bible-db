document_id: PSA.67,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Louange universelle à Dieu
  - type: text
    content: Au chef de chœur, avec instruments à cordes. Psaume, chant.
  '2':
  - type: text
    content: Que Dieu nous fasse grâce et nous bénisse,
  - type: text
    content: 'qu''il fasse briller son visage sur nous! '
  - type: text
    content: – Pause.
  '3':
  - type: text
    content: Ainsi l'on connaîtra ta voie sur la terre
  - type: text
    content: et ton salut parmi toutes les nations.
  '4':
  - type: text
    content: Les peuples te louent, ô Dieu,
  - type: text
    content: tous les peuples te louent.
  '5':
  - type: text
    content: Les nations se réjouissent, elles sont dans l'allégresse, car tu juges les peuples avec droiture
  - type: text
    content: 'et tu conduis les nations sur la terre. '
  - type: text
    content: – Pause.
  '6':
  - type: text
    content: Les peuples te louent, ô Dieu,
  - type: text
    content: tous les peuples te louent.
  '7':
  - type: text
    content: La terre donne ses produits;
  - type: text
    content: Dieu, notre Dieu, nous bénit.
  '8':
  - type: text
    content: Dieu nous bénit,
  - type: text
    content: et toutes les extrémités de la terre le craignent.
