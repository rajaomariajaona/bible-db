document_id: PSA.67,152
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Louange universelle à Dieu
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: Au chef de chœur, avec instruments à cordes. Psaume, chant.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que Dieu nous fasse grâce et nous bénisse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'qu''il fasse briller son visage sur nous! '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ainsi l'on connaîtra ta voie sur la terre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ton salut parmi toutes les nations.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les peuples te louent, ô Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les peuples te louent.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les nations se réjouissent, elles sont dans l'allégresse, car tu juges les peuples avec droiture
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et tu conduis les nations sur la terre. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: – Pause.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les peuples te louent, ô Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les peuples te louent.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: La terre donne ses produits;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu, notre Dieu, nous bénit.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu nous bénit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et toutes les extrémités de la terre le craignent.
