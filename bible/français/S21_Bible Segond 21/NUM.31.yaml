document_id: NUM.31,152
type_code: fra
verses:
  '1':
  - type: heading
    content: Dernières responsabilités de Moïse
  - type: heading
    content: 31.1–36.13
  - type: heading
    content: Victoire sur Madian
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '10':
  - type: text
    content: 'Ils incendièrent toutes les villes qu''ils habitaient et tous leurs campements. '
  '11':
  - type: text
    content: 'Ils prirent tout le butin et toutes les prises de guerre, tant personnes que bêtes, '
  '12':
  - type: text
    content: et ils amenèrent les prisonniers, les prises de guerre et le butin à Moïse, au prêtre Eléazar et à l'assemblée des Israélites. Ceux-ci campaient dans les plaines de Moab près du Jourdain, vis-à-vis de Jéricho.
  '13':
  - type: text
    content: 'Moïse, le prêtre Eléazar et tous les princes de l''assemblée sortirent du camp à leur rencontre. '
  '14':
  - type: text
    content: 'Moïse s''irrita contre les commandants de l''armée, les chefs de milliers et les chefs de centaines qui revenaient de l''expédition. '
  '15':
  - type: text
    content: 'Il leur dit: «Comment! Vous avez laissé la vie à toutes les femmes! '
  '16':
  - type: text
    content: 'Ce sont justement elles qui, sur le conseil de Balaam, ont entraîné les Israélites à commettre l''infidélité envers l''Eternel, dans l''affaire de Peor; alors un fléau a éclaté dans l''assemblée de l''Eternel. '
  '17':
  - type: text
    content: 'Maintenant, tuez tout garçon parmi les petits enfants et tuez toute femme qui a connu un homme en couchant avec lui. '
  '18':
  - type: text
    content: Mais laissez en vie pour vous toutes les filles qui n'ont pas connu le lit d'un homme.
  '19':
  - type: text
    content: '»Quant à vous, campez pendant 7 jours hors du camp. Tous ceux parmi vous qui ont tué quelqu''un et tous ceux qui ont touché un mort se purifieront le troisième et le septième jour, ainsi que vos prisonniers. '
  '2':
  - type: text
    content: «Venge les Israélites des Madianites. Ensuite, tu iras rejoindre les tiens.»
  '20':
  - type: text
    content: Vous purifierez aussi tout vêtement, tout objet en cuir ou en poil de chèvre et tout ustensile en bois.»
  '21':
  - type: text
    content: 'Le prêtre Eléazar dit aux soldats qui étaient allés à la guerre: «Voici ce qu''ordonne la prescription que l''Eternel a transmise à Moïse: '
  '22':
  - type: text
    content: 'l''or, l''argent, le bronze, le fer, l''étain et le plomb, '
  '23':
  - type: text
    content: 'tout objet qui peut aller au feu, vous le ferez passer par le feu pour le rendre pur. Mais c''est par l''eau de purification que sera purifié tout ce qui ne peut pas aller au feu; vous le ferez passer dans l''eau. '
  '24':
  - type: text
    content: Vous laverez vos vêtements le septième jour et vous serez purs. Ensuite, vous pourrez entrer dans le camp.»
  '25':
  - type: text
    content: 'L''Eternel dit à Moïse: '
  '26':
  - type: text
    content: '«Fais, avec le prêtre Eléazar et les chefs de famille de l''assemblée, le compte du butin, des prises de guerre, tant personnes que bêtes. '
  '27':
  - type: text
    content: 'Partage les prises de guerre entre les combattants qui sont allés à l''armée et toute l''assemblée. '
  '28':
  - type: text
    content: 'Sur la part des soldats qui sont allés à l''armée, tu prélèveras une part pour l''Eternel à raison de un sur 500, tant des personnes que des bœufs, des ânes et des brebis. '
  '29':
  - type: text
    content: 'Vous le prendrez sur leur moitié, et tu le donneras au prêtre Eléazar comme une offrande à l''Eternel. '
  '3':
  - type: text
    content: 'Moïse dit au peuple: «Equipez parmi vous des hommes pour l''armée et qu''ils marchent contre Madian afin d''exécuter la vengeance de l''Eternel contre Madian. '
  '30':
  - type: text
    content: Sur la moitié qui revient aux Israélites, tu prendras un sur 50, tant des personnes que des bœufs, des ânes et des brebis, de tout animal, et tu le donneras aux Lévites qui ont la garde du tabernacle de l'Eternel.»
  '31':
  - type: text
    content: Moïse et le prêtre Eléazar firent ce que l'Eternel avait ordonné à Moïse.
  '32':
  - type: text
    content: 'Les prises de guerre, ce qui restait du pillage effectué par ceux qui avaient fait partie de l''armée, consistaient en 675''000 brebis, '
  '33':
  - type: text
    content: '72''000 bœufs, '
  '34':
  - type: text
    content: '61''000 ânes '
  '35':
  - type: text
    content: 'et 32''000 personnes, des femmes qui n''avaient pas connu le lit d''un homme. '
  '36':
  - type: text
    content: 'La moitié formait la part de ceux qui étaient allés à l''armée: 337''500 brebis, '
  '37':
  - type: text
    content: 'dont 675 pour la part de l''Eternel; '
  '38':
  - type: text
    content: '36''000 bœufs, dont 72 pour la part de l''Eternel; '
  '39':
  - type: text
    content: '30''500 ânes, dont 61 pour la part de l''Eternel; '
  '4':
  - type: text
    content: Vous enverrez à l'armée 1000 hommes par tribu, de toutes les tribus d'Israël.»
  '40':
  - type: text
    content: 'et 16''000 personnes, dont 32 pour la part de l''Eternel. '
  '41':
  - type: text
    content: 'Moïse donna au prêtre Eléazar la part réservée comme offrande à l''Eternel, conformément à ce que l''Eternel lui avait ordonné. '
  '42':
  - type: text
    content: 'La moitié qui revenait aux Israélites, séparée par Moïse de celle des hommes de l''armée, '
  '43':
  - type: text
    content: 'formait la part de l''assemblée: 337''500 brebis, '
  '44':
  - type: text
    content: '36''000 bœufs, '
  '45':
  - type: text
    content: '30''500 ânes '
  '46':
  - type: text
    content: 'et 16''000 personnes. '
  '47':
  - type: text
    content: Sur cette moitié qui revenait aux Israélites, Moïse prit un sur 50, tant des personnes que des animaux, et il le donna aux Lévites qui ont la garde du tabernacle de l'Eternel, conformément à ce que l'Eternel lui avait ordonné.
  '48':
  - type: text
    content: 'Les commandants des milliers de l''armée, les chefs de milliers et les chefs de centaines s''approchèrent de Moïse '
  '49':
  - type: text
    content: 'et lui dirent: «Tes serviteurs ont fait le compte des soldats qui étaient sous nos ordres et il ne manque pas un homme parmi nous. '
  '5':
  - type: text
    content: 'On choisit parmi les milliers d''Israël 1000 hommes par tribu, soit 12’000 hommes équipés pour la guerre. '
  '50':
  - type: text
    content: 'Comme offrande à l''Eternel, nous apportons chacun les objets d''or que nous avons trouvés – chaînettes, bracelets, anneaux, pendants d''oreilles et colliers – afin de faire l''expiation pour nous-mêmes devant l''Eternel.» '
  '51':
  - type: text
    content: 'Moïse et le prêtre Eléazar reçurent de leur main tous ces objets travaillés en or. '
  '52':
  - type: text
    content: 'Le poids total de l''or que les chefs de milliers et les chefs de centaines présentèrent à l''Eternel en offrande faite à titre de prélèvement était de 190 kilos. '
  '53':
  - type: text
    content: 'Les hommes de l''armée gardèrent chacun leur butin. '
  '54':
  - type: text
    content: Moïse et le prêtre Eléazar prirent l'or des chefs de milliers et des chefs de centaines et l'apportèrent à la tente de la rencontre, comme souvenir pour les Israélites devant l'Eternel.
  '6':
  - type: text
    content: 'Moïse envoya ces 1000 hommes par tribu à l''armée, et avec eux le fils du prêtre Eléazar, Phinées, qui portait les instruments sacrés et les trompettes retentissantes. '
  '7':
  - type: text
    content: 'Ils firent la guerre contre Madian, conformément à l''ordre que l''Eternel avait donné à Moïse, et ils tuèrent tous les hommes. '
  '8':
  - type: text
    content: 'En plus de ces victimes, ils tuèrent les rois de Madian: Evi, Rékem, Tsur, Hur et Réba, cinq rois de Madian. Ils tuèrent aussi par l''épée Balaam, fils de Beor. '
  '9':
  - type: text
    content: 'Les Israélites firent prisonnières les femmes des Madianites avec leurs petits enfants et ils pillèrent tout leur bétail, tous leurs troupeaux et toutes leurs richesses. '
