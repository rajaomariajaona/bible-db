document_id: ROM.12
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: La vie nouvelle
  marker-yv: yv-h
- type: usfm
  marker: mr
  children:
  - type: text
    text: 12.1–16.27
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: De nouveaux comportements
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Je vous encourage donc, frères et sœurs, par les compassions de Dieu, à offrir votre corps comme un sacrifice vivant, saint, agréable à Dieu. Ce sera de votre part un culte raisonnable. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Ne vous conformez pas au monde actuel, mais soyez transformés par le renouvellement de l'intelligence afin de discerner quelle est la volonté de Dieu, ce qui est bon, agréable et parfait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Par la grâce qui m''a été donnée, je dis à chacun de vous de ne pas avoir une trop haute opinion de lui-même, mais de garder des sentiments modestes, chacun selon la mesure de foi que Dieu lui a donnée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'En effet, de même que nous avons plusieurs membres dans un seul corps et que tous les membres n''ont pas la même fonction, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'de même, nous qui sommes plusieurs, nous formons un seul corps en Christ et nous sommes tous membres les uns des autres, chacun pour sa part. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Nous avons des dons différents, selon la grâce qui nous a été accordée. Si quelqu''un a le don de prophétie, qu''il l''exerce en accord avec la foi; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'si un autre est appelé à servir, qu''il se consacre à son service. Que celui qui enseigne se donne à son enseignement, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: et celui qui a le don d'encourager à l'encouragement. Que celui qui donne le fasse avec générosité, celui qui préside, avec zèle, et que celui qui exerce la bienveillance le fasse avec joie.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Que l''amour soit sans hypocrisie. Ayez le mal en horreur, attachez-vous au bien. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Par amour fraternel soyez pleins d''affection les uns pour les autres et rivalisez d''estime réciproque. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ayez du zèle, et non de la paresse. Soyez fervents d''esprit et servez le Seigneur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Réjouissez-vous dans l''espérance et soyez patients dans la détresse. Persévérez dans la prière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Pourvoyez aux besoins des saints et exercez l'hospitalité avec empressement.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Bénissez ceux qui vous persécutent, bénissez et ne maudissez pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Réjouissez-vous avec ceux qui se réjouissent, pleurez avec ceux qui pleurent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'Vivez en plein accord les uns avec les autres. N''aspirez pas à ce qui est élevé, mais laissez-vous attirer par ce qui est humble. '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Ne vous prenez pas pour des sages
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ne vous… sages: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Proverbes 3.7
      metadata:
        usfm: PRO.3.7
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Ne rendez à personne le mal pour le mal. Recherchez ce qui est bien devant tous les hommes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Si cela est possible, dans la mesure où cela dépend de vous, soyez en paix avec tous les hommes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Ne vous vengez pas vous-mêmes, bien-aimés, mais laissez agir la colère de Dieu, car il est écrit: '
  - type: usfm
    marker: qt
    children:
    - type: text
      text: C'est à moi qu'appartient la vengeance, c'est moi qui donnerai à chacun ce qu'il mérite, dit le Seigneur
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'C''est à moi… Seigneur: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Deutéronome 32.35
      metadata:
        usfm: DEU.32.35
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: qt
    children:
    - type: text
      text: Mais si ton ennemi a faim, donne-lui à manger, s'il a soif, donne-lui à boire, car en agissant ainsi, tu amasseras des charbons ardents sur sa tête
  - type: text
    text: .
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Mais si… tête: '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'citation de '
    - type: usfm
      marker: ref
      children:
      - type: text
        text: Proverbes 25.21-22
      metadata:
        usfm: PRO.25.21+PRO.25.22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: Ne te laisse pas vaincre par le mal, mais sois vainqueur du mal par le bien.
